metal sphere would discharge instantly if you held it in your bare hand (you'd be the conducting path to earth).", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": true}, {"question": "A car drives along and becomes positively charged. Explain mechanistically (a) why it charges and (b) why it stays charged. (2 steps)", "answer": "- Step 1: As the car moves, air molecules rub against its body surface — this is friction between two materials. Friction transfers electrons; here, the car loses electrons to the air. With fewer electrons than protons, the car is left positively charged.\n- Step 2: The car sits on rubber tyres, which are excellent insulators. There is no conducting path from the car's metal body to the ground, so the excess positive charge (i.e. the electron deficit) cannot be replenished — it stays trapped on the car.\n\nKey point: \"lose electrons to air\" — not to the road, because rubber blocks the road path.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "Why does fitting a thin metal strap that drags on the road stop a car from accumulating static charge? (2 steps)", "answer": "- Step 1: A metal strap is a conductor, so it provides a continuous path for electrons to flow between the car body and the ground.\n- Step 2: As charge tries to build up on the car, electrons can flow through the strap (in whichever direction restores neutrality) to or from the ground. The car is continuously **earthed**, so excess charge is bled away as fast as it forms.\n\nThe principle: \"earthing\" = giving excess charge a conducting route to a huge reservoir (the Earth), which is effectively infinite, so it just absorbs the charge.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "Name the only four materials that are attracted to a magnet, in the standard order.", "answer": "**Iron, steel, nickel, cobalt.** Steel counts because it is mostly iron (with a small amount of carbon) — the iron content is what gives it its magnetism. Everything else — copper, silver, aluminium, gold, wood, plastic — is **not** attracted at all. So if you see a metal that a magnet attracts, it must contain at least one of those four.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "What's the conceptual difference between a \"magnetically hard\" and a \"magnetically soft\" material, and which is used for what?", "answer": "A **magnetically hard** material (e.g. steel) is one whose magnetic alignment is difficult to change — once magnetised, it holds onto that magnetisation. This makes it ideal for **permanent magnets** that should stay magnetised indefinitely. A **magnetically soft** material (e.g. iron, also nickel and cobalt) has alignment that's easily set up *and* easily lost. This makes it ideal for **electromagnet cores**, where you want the magnetism to switch on instantly when current flows and switch off instantly when current stops.\n\nOne-line memory: hard = holds on; soft = switches.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": true}, {"question": "What is \"induced magnetism\", and why is it useful that a paperclip stuck to a magnet can then pick up a second paperclip? (3 steps)", "answer": "- Step 1: When a piece of soft magnetic material (like a paperclip) is placed inside another magnet's field, the field aligns the paperclip's internal magnetic domains, so the paperclip itself becomes a magnet temporarily.\n- Step 2: Once it is magnetised, the paperclip has its own N and S poles and can therefore exert magnetic force on other magnetic materials nearby — so it can attract a second paperclip.\n- Step 3: Because paperclips are made of soft iron/steel, the induced magnetism fades quickly once the original field is removed. This is induced magnetism — it demonstrates that a magnetic field can \"spread\" temporary magnetism through a chain of soft magnetic objects.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "Define a \"field\" in physics, using the precise wording an examiner expects. Why does this definition extend to gravitational, electric and magnetic fields equally well?", "answer": "A field is **a region in which something feels a force**. For a magnetic field specifically: \"a region in which a magnetic material, or a moving charged object, feels a force.\" The same template applies to gravity (region where a mass feels a force) and electric fields (region where a charge feels a force). The unifying idea is that a field is a *spatial map of force-per-something*: per unit mass for gravity, per unit charge for electric, per unit \"magnetic test object\" for magnetic. It abstracts the source away — you only care that, at this point in space, an appropriate test object would feel a force.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": true}, {"question": "State the four rules that magnetic field lines obey when drawn on a diagram. (4 steps)", "answer": "- Step 1: **Direction**: arrows always point from N to S outside the magnet — i.e. the direction a free North pole (or a positive test object) would be pushed.\n- Step 2: **Strength**: where lines are closer together, the field is stronger; where lines spread apart, the field is weaker.\n- Step 3: **Uniform field**: equally-spaced, parallel lines mean the field has the same strength and direction everywhere in that region.\n- Step 4: **No crossing**: field lines never cross. (If they did, there would be two different field directions at the same point, which is meaningless — the field has one direction at each point in space.)", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "For a single bar magnet, an exam may ask you to describe the field in three respects. What are they, and what's the answer for each? (3 steps)", "answer": "- Step 1: **Strength** — strongest at the two ends (the poles), because the field lines bunch up tightly there.\n- Step 2: **Direction** — outside the magnet, lines run from N to S (the way a free N pole would move).\n- Step 3: **Shape** — lines emerge from the N pole, loop round the outside of the magnet, and re-enter at the S pole, giving a roughly oval/\"circular-ish\" pattern around the bar.\n\nWhenever you see a field diagram, structure your answer around these three: **strength, direction, shape**.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "Why is it impossible to isolate a single magnetic north pole by cutting a bar magnet in half?", "answer": "When you cut a bar magnet, each piece is itself a complete magnet with both N and S poles. The deep reason (university-level, not examinable) is that magnetism originates from aligned electron spins / aligned magnetic domains inside the material. Every tiny domain is itself a mini-magnet with both poles. So no matter how finely you subdivide the magnet, you never reach a stage where only one pole exists — magnetic poles fundamentally come in pairs, unlike electric charge where + and − can be separated.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "A plotting compass and iron filings can both reveal a magnetic field — but they give you different information. What does each show, and what's the key limitation of iron filings? (3 steps)", "answer": "- Step 1: A **plotting compass** is a tiny pivoted bar magnet. Its red/N end aligns with the local field direction (pointing towards the nearest S pole), so it shows you both the **shape** of the field lines and the **direction** along them.\n- Step 2: **Iron filings**, sprinkled on paper above a magnet and gently tapped, become induced mini-magnets that line up along field lines. They reveal the **shape** of the pattern and where the field is **strong** (filings bunch up there).\n- Step 3: The crucial limitation: iron filings do NOT show direction — you can't tell which end is N and which is S from filings alone. To get direction you must use a compass.\n\nClassic exam question: \"What can iron filings not tell you?\" Answer: **direction**.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "How do you trace a single magnetic field line using a plotting compass, step by step? (3 steps)", "answer": "- Step 1: Place the compass somewhere near the magnet. Mark a small dot on the paper where the compass's N (red/pointy) end is aiming.\n- Step 2: Move the compass forward so that its *tail* now sits on the dot you just marked. Now mark a new dot where the N end is aiming next.\n- Step 3: Repeat: each new dot becomes the start of the next compass position. Join all the dots up with a smooth curve from the N pole, round the outside, to the S pole. That smooth curve is one field line, with the direction given by the compass arrows.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "Two bar magnets are placed with their N and S poles facing each other across a small gap, and fixed so they cannot move. What does the field look like in the gap, and why does this configuration in particular give a uniform field? (3 steps)", "answer": "- Step 1: Opposite poles attract, so the field lines leaving the N pole on one side go straight across the gap and enter the S pole on the other side.\n- Step 2: Because the lines emerging from a flat pole face are all parallel and the two faces are equally spaced from each other, the lines remain straight, parallel and equally spaced throughout the gap — that's the geometric signature of a **uniform field**.\n- Step 3: \"Fixed in place\" matters because otherwise the magnets would simply snap together; pinning them keeps the geometry — and hence the uniform field — stable.\n\nThis is exactly the set-up used later to test the motor effect: a wire is placed in this uniform field.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "What happens in the gap when two bar magnets are placed with **like poles** (e.g. N facing N) close together, and what's a \"neutral point\"? (3 steps)", "answer": "- Step 1: Like poles repel, so the field lines leaving one N pole bend outwards rather than crossing the gap — they curve away on each side instead of going straight across.\n- Step 2: At some specific point on the line between the two magnets, the field from one magnet exactly cancels the field from the other (equal magnitude, opposite direction). At that point the net magnetic field is zero — this is called a **neutral point**, often marked with a small cross on diagrams.\n- Step 3: This is mechanically the opposite of the N–S arrangement: instead of a uniform reinforcing field, you get cancellation in the middle.\n\nMental check: \"Imagine I'm a tiny N pole sitting in the middle — which way am I pushed?\" If both sides push you equally outward, the centre is a neutral point.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "Why does a compass needle \"point north\" even though it's really pointing at a magnetic south pole? (3 steps)", "answer": "- Step 1: A compass needle is itself a small bar magnet; its N (red) end is attracted to a magnetic S pole — opposite poles attract.\n- Step 2: The Earth behaves like a giant bar magnet flipped upside down: the magnetic **south** pole sits near the geographic **North** Pole, and the magnetic north pole sits near the geographic South Pole.\n- Step 3: So when your compass's N end points \"north\", it is physically being attracted to the magnetic SOUTH pole that happens to live near the geographic North. The colloquial label \"points north\" refers to the geographic direction, not the magnetic polarity at the destination.\n\nThis is one of the classic \"physics names are misleading\" cases.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": true}, {"question": "Why does Alex describe both \"conventional current\" and \"Earth's north\" as sign-convention traps, and what's the actual rule for each?", "answer": "Both are historical naming conventions that don't match the underlying physics. **Conventional current** is defined as the direction *positive* charge would flow — but the actual carriers in metals are electrons (negative), which move the *opposite* way. So current direction is **opposite to electron flow**. **Earth's \"north\"** is a geographic label, but magnetically that location is a **south** pole (which is why your compass's N end is drawn to it). The lesson: when answering a question, always translate the label into the actual physical polarity or carrier — don't trust the name alone.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": true}, {"question": "When a current flows through a straight wire, what is the shape and direction of the magnetic field around it, and what rule do you use to find the direction? (3 steps)", "answer": "- Step 1: **Shape**: the field lines form concentric circles around the wire, lying in planes perpendicular to the wire. The circles are tightly packed close to the wire (strong field) and spread out further away (weak field).\n- Step 2: **Direction (right-hand grip rule)**: point your right thumb along the direction of conventional current; your curled fingers then show the circulation direction of the field around the wire.\n- Step 3: As a concrete check: if the current goes *into* the page (away from you), then looking at it end-on, the field circles **clockwise** around the dot. If current comes out of the page, field circles anticlockwise.\n\nIt must be the **right** hand — using the left would give the opposite (incorrect) circulation.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "Why does winding a current-carrying wire into a tightly-packed coil (\"solenoid\") produce a much stronger field along the axis than a single straight wire? (3 steps)", "answer": "- Step 1: A single straight wire produces field circles around itself. Inside any one loop of wire, those circles all point through the loop in the *same* axial direction (by the right-hand grip rule applied to each segment of the loop).\n- Step 2: Stacking many loops side by side (a solenoid) means each loop contributes its own axial field at the centre — these contributions add up because they're all in the same direction inside.\n- Step 3: The result is a strong, roughly uniform field running along the inside of the solenoid, while outside the field resembles that of a bar magnet (lines leaving one end, looping round, entering the other).\n\nThis is why \"more coils\" is one of the three Cs for stronger electromagnets.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": true}, {"question": "State the three \"C\" ways to make an electromagnet stronger, and the physical reason each one works. (3 steps)", "answer": "- Step 1: **Current** — a larger current means more charge moving per second past any point, which directly scales up the field each segment of wire produces.\n- Step 2: **Coils** — adding more turns of wire in the same length means more wire contributing field at the same place; their axial fields add constructively along the solenoid axis.\n- Step 3: **Core** — inserting a soft-iron core inside the solenoid lets the iron become strongly magnetised by the field (induced magnetism). The iron's own field adds to the original field, channelling and concentrating the lines, often boosting the total field many times over.\n\nMemory anchor: all three start with C → **Current, Coils, Core**.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "A solenoid has current flowing around its coils in a particular direction. How do you find which end is the magnetic North? (2 steps)", "answer": "- Step 1: Use the right-hand grip rule, but applied to the coils rather than a straight wire: curl the **fingers** of your right hand in the direction the conventional current flows around the loops.\n- Step 2: Your **thumb** then points along the solenoid's axis towards its **N** end. The opposite end is S, and the external field lines run from N to S (just like a bar magnet).\n\nInside the solenoid, the field runs the other way — from S to N — completing the loop. This internal field is hidden in a permanent bar magnet but visible in a solenoid because you can imagine looking through the coils.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "Why would using a magnetically *hard* material like steel as a solenoid core be a poor design choice for an electromagnet you want to switch on and off? (2 steps)", "answer": "- Step 1: A magnetically hard material retains its magnetisation once aligned — that's exactly what makes it good for permanent magnets, but bad here.\n- Step 2: If you used steel as the core, when you cut the current the steel would remain magnetised, so the electromagnet would NOT switch off cleanly — it'd still attract things. With soft iron, the magnetisation collapses almost immediately when the current stops, so the device can be reliably switched.\n\nThe lesson: pick the material whose property matches the **function** you want — permanent vs switchable.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "What is the symbol and SI unit of magnetic flux density, and what does it physically measure?", "answer": "The symbol is **$$B$$** and the SI unit is the **tesla (T)**, equivalent to $$\\text{N A}^{-1}\\text{m}^{-1}$$. Physically, $$B$$ measures how strong the magnetic field is at a point — i.e. how closely bunched the field lines are. On a field diagram, regions with a high $$B$$ are where the lines crowd together (e.g. near a magnet's pole), and low-$$B$$ regions are where lines spread out. The unit \"tesla\" can be understood through the force on a current-carrying wire: 1 tesla is the field strength that would exert 1 newton of force on a 1-metre wire carrying 1 amp perpendicular to the field.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "The Earth's magnetic field is about $$5 \\times 10^{-5}$$ T at the UK surface, while a strong lab magnet might be a fraction of a tesla. What does this comparison tell you intuitively about what counts as a \"strong\" magnetic field? (2 steps)", "answer": "- Step 1: The Earth's field is roughly 50 microtesla — small enough that it only just rotates a compass needle but not strong enough to noticeably attract everyday objects.\n- Step 2: A \"fraction of a tesla\" (say 0.1–1 T) is thousands of times stronger than the Earth's field — that's the regime where you start seeing strong attraction of paperclips, deflection of electron beams, etc.\n\nSo on the tesla scale: microtesla = ambient/background; millitesla = ordinary magnets; tesla = serious laboratory equipment; many teslas = MRI scanners and superconducting magnets.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "Why does Alex coach you to say two objects \"interact\" in a magnetic field rather than guessing \"attract\" or \"repel\"?", "answer": "The verb you use must match what's actually happening. A magnet can either **attract** (opposite poles, or a non-magnetised soft magnetic material being induced) or **repel** (like poles facing). If you can't tell from the diagram or scenario which case you're in — e.g. the Magneto film clip where missiles hover and steer in all directions, which is neither a clean attraction nor a clean repulsion — saying \"interact\" or \"there is a magnetic force\" is always physically correct because it just asserts that a force exists, without committing to its direction. It's a defensive verb that avoids a wrong guess while still showing you understand a force is involved.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "In the Magneto X-Men clip, what's physically *possible* and what's the giveaway that it's not realistic? (2 steps)", "answer": "- Step 1: **Plausible parts**: there is clearly a very strong magnetic field involved, and the missiles do contain magnetic material (iron/steel), so a magnetic force on them is at least conceivable.\n- Step 2: **The giveaway**: a real magnetic field simply *attracts* magnetic objects toward higher field — it can't make them hover stationary, steer left and right, and reverse direction on command. Real magnetic interactions follow the field geometry; you'd see the missiles snap straight to the magnet's pole, not perform aerial choreography.\n\nThis is a model of an \"apply what you know\" question: list what's consistent with physics, then identify the specific behaviour that violates it.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": true}, {"question": "Why must the field around a current-carrying wire be circular, rather than, say, radial like an electric field from a point charge? (3 steps)", "answer": "- Step 1: A magnetic field is produced by *moving* charge. By symmetry, the field can't point along the wire (that would single out one direction along an otherwise symmetric line) and it can't point radially outward (no source/sink for magnetic field lines — they have no start/end, unlike electric fields).\n- Step 2: The only direction left that respects the symmetry of an infinitely long straight wire is **tangential** — i.e. circulating around the wire. So the field lines must form closed circles around the wire.\n- Step 3: This also matches the experimental fact that magnetic field lines are always closed loops (no magnetic monopoles to start/end on), which is consistent with circles wrapping around the wire.\n\nThis is a deeper reason that examiners won't ask for, but it's why the rule \"field circles the wire\" isn't arbitrary.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "Two field lines from the same magnet appear to cross at a point on a diagram. Why is this physically impossible?", "answer": "At any point in space the magnetic field has a single, definite direction — namely, the direction a free N pole would feel a force. A field line at that point is drawn tangent to that direction. If two field lines crossed, then at the crossing point the field would have to point in two different directions simultaneously, which is meaningless. So whenever you see crossing field lines on a student's diagram, it's a drawing error — the lines should curve smoothly past each other or merge into one.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": true}, {"question": "A student says, \"the iron filings show that the field around a bar magnet points from S to N.\" What two mistakes are buried in this statement? (2 steps)", "answer": "- Step 1: **Direction error**: outside a magnet, field lines point from **N to S**, not S to N. The student has the convention reversed.\n- Step 2: **Tool error**: iron filings cannot show direction at all — they only reveal the *shape* of the field lines (and where they're concentrated). To know which way the field points, you need a plotting compass. So even if the direction quoted had been right, you can't justify it from filings alone.\n\nTwo-for-one trap — both worth correcting.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "A current-carrying wire is bent into a single loop. By thinking of small segments of the loop and applying the right-hand grip rule to each, why does the field point through the loop in one consistent direction? (3 steps)", "answer": "- Step 1: Pick a small segment on, say, the top of the loop carrying current \"to the right\". The right-hand grip rule says the field circles that segment — in particular, inside the loop the field points \"into the page\", and above the segment it points \"out of the page\".\n- Step 2: Now pick the bottom of the loop, where current flows \"to the left\". Apply the rule again: inside the loop (above the bottom segment), the field again points \"into the page\".\n- Step 3: Going round every segment, the field contribution **inside** the loop is always in the same direction (into the page in this example), while outside the loop the contributions cancel or weaken. Result: a strong field through the loop, like a tiny bar magnet with N on one face and S on the other.\n\nThis is the building block of solenoid logic.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": true}, {"question": "A long bar magnet is cut into 100 short pieces. What is the magnetic structure of each piece, and what does this tell you about the microscopic origin of magnetism?", "answer": "Each of the 100 pieces is itself a complete bar magnet with its own N and S poles. No matter how many times you subdivide, you never isolate a lone pole — they always come in pairs. This implies that magnetism doesn't come from \"magnetic charge\" sitting at the poles (the way electric charge sits on objects). Instead, it comes from microscopic current-loops / aligned electron spins inside the material. Each tiny domain is itself a tiny magnetic dipole, so dividing the material just exposes more dipoles — never a single pole. This is a fundamental qualitative difference between electricity (charges can be isolated) and magnetism (dipoles cannot be split).", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": true}, {"question": "What's the difference between the *right*-hand grip rule (today's topic) and *Fleming's left*-hand rule (next lesson) — what does each tell you?", "answer": "The **right-hand grip rule** tells you about the **field** *produced by* a current-carrying wire: thumb along the current, curled fingers give the circular field direction around the wire. The **left-hand rule** (Fleming's) tells you about the **force** *experienced by* a current-carrying wire that has been placed in an external magnetic field: first finger = field, second finger = current, thumb = force/motion. They're two different rules for two different physical situations: one is \"current → makes field\"; the other is \"current in a field → feels force\". Different hands, different questions.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": true}, {"question": "A solenoid's external field looks just like a bar magnet's. What's the physical reason — and what's the one thing about the *internal* field that you can see in a solenoid but not in a bar magnet? (2 steps)", "answer": "- Step 1: Both are essentially many aligned magnetic dipoles in a line. In a bar magnet, the dipoles are aligned electron spins in the iron domains; in a solenoid, they are current loops of the coils. Either way, the external field lines emerge from one end (N), loop around, and return at the other (S) — same dipole-field shape.\n- Step 2: The new thing the solenoid shows you is the **interior field**: a strong, roughly uniform field running from the S end to the N end inside, completing the loop. A bar magnet has the same internal field, but you can't see between the atoms — the solenoid lets you literally look through the coils and see the internal field lines.\n\nThis is one of those rare cases where a model is more transparent than the real thing.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "In an electromagnet design, an engineer doubles the current and doubles the number of turns simultaneously. Qualitatively, what happens to the field strength inside the solenoid, and roughly by what factor?", "answer": "Both more current and more turns each increase the field by adding more \"current per unit length\" of solenoid. Roughly, doubling each one independently doubles the field, so doing both simultaneously gives about a factor of 4 increase. (The exact relation $$B = \\mu_0 n I$$ where $$n$$ is turns per unit length confirms this — the field is proportional to the product of current and turn density.) Qualitatively: stacking the two C-improvements multiplies their effects.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "A plotting compass is placed at the exact midpoint between two identical bar magnets arranged N facing N. Which way does the compass needle point, and why? (3 steps)", "answer": "- Step 1: At the midpoint, the field from the left N pole pushes a \"test N pole\" to the right (repulsion away from N). The field from the right N pole pushes the test N pole to the left (also repulsion).\n- Step 2: By symmetry these two pushes are equal in size and opposite in direction, so the net field at that point is **zero** — this is a neutral point.\n- Step 3: With no net field, the compass needle has no preferred direction from this arrangement. In practice it will align with whatever residual field exists (often the Earth's), but ideally — given only the two magnets — its orientation is undefined.\n\nThis is the conceptual test of \"where's the neutral point\" questions.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "Why does a permanent magnet attract an *unmagnetised* paperclip, even though the paperclip has no poles of its own?", "answer": "When the unmagnetised paperclip enters the magnet's field, its internal magnetic domains — which were randomly oriented — get aligned by the external field. This **induces** magnetism in the paperclip: the end of the paperclip closest to the magnet's N pole becomes a S pole (because the field aligns the domains to point \"into\" the magnet's N), and the far end becomes N. Now the magnet's N pole and the paperclip's induced S pole are next to each other, and opposite poles attract → the paperclip is pulled in. Once removed from the field, soft iron loses this alignment quickly and the paperclip is unmagnetised again.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": true}, {"question": "Imagine looking down the axis of a solenoid from one end and you see the current flowing **clockwise** around the loops. Is the end you're looking at a N or a S pole? (2 steps)", "answer": "- Step 1: Apply the right-hand grip rule for solenoids: curl the fingers of your right hand in the direction of current flow (clockwise as you see it). To do this, your **thumb must point away from you** (into the solenoid).\n- Step 2: The thumb points to the **N** end of the solenoid. Since your thumb points away from you, the N end is on the far side — meaning **the end you're looking at is S**.\n\nQuick rule of thumb: clockwise as you face it = S facing you; anticlockwise as you face it = N facing you.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": false}, {"question": "A bar magnet is held vertically with its N pole pointing down. A plotting compass is placed on the table directly below it. Which way does the compass's red (N) end point? (2 steps)", "answer": "- Step 1: The magnet's field lines emerge from its N pole (pointing downward, into the table region). So at the compass location, the magnetic field is roughly pointing straight down into the table, with the field lines diverging outward as they reach the surface.\n- Step 2: The compass needle's red end aligns with the field direction at that point. Since the field there points downward / radially outward (toward S poles elsewhere — but locally just downward from the N pole above), the compass needle will tip its red end as if to point down — but constrained to lie flat on the table, it'll point directly away from the point below the magnet (radially outward from beneath the N).\n\nConceptual lesson: a compass always tracks the local field direction, not the geographic \"north\" — that's only true in the absence of other magnets.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "Two field configurations are drawn: (A) lines that are straight, parallel, and equally spaced; (B) lines that are straight and parallel but get closer together as you move to the right. What's true about the field in each? (2 steps)", "answer": "- Step 1: Configuration **A** has constant spacing → constant field strength, and constant direction → this is a **uniform field**. The same force per unit \"test object\" would be felt at every point.\n- Step 2: Configuration **B** has parallel lines (so direction is the same everywhere — still uniform in direction) but the lines get closer together moving right — meaning the field gets **stronger** to the right. So B is *not* uniform in magnitude; it's a non-uniform field with a gradient in strength along one axis.\n\nCloser = stronger; equal spacing = uniform. Both conditions (parallel + equally spaced) are needed for a fully uniform field.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "Why is the field at the very ends of a bar magnet much stronger than at the middle of its long side, when looked at from just outside?", "answer": "The field lines must enter and leave the magnet at the pole faces (N and S). Geometrically, all the lines that thread through the inside of the magnet must funnel through the relatively small area of the pole faces — that's a lot of lines concentrated into a small region. At the middle of the long side, only a few lines pass close by (most have already curved up toward one of the poles), and they're spread over a larger surface. Result: lots of lines per unit area at the ends (high field), few lines per unit area at the middle (low field). The pole-face concentration is what makes \"magnetism strongest at the poles\" true geometrically.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": true}, {"question": "A bar magnet is brought close to a copper coin and to a steel coin. What happens in each case, and why?", "answer": "The **steel coin** is attracted — steel is iron-based and is one of the four magnetic materials, so its domains can be aligned by the magnet's field, induced magnetism develops, and opposite poles attract. The **copper coin** experiences essentially no force (in this static situation). Copper is not in the magnetic-material list — its electron configuration doesn't support permanent domain alignment, so no induced magnetism occurs. The lesson: only iron, steel, nickel, cobalt respond to a magnet by ordinary attraction. Everything else just sits there, no matter how strong the magnet is.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": true}, {"question": "Why is it conceptually wrong to say \"the magnet's field exerts a force on all metals\"?", "answer": "The word \"metals\" is too broad. A magnetic field exerts a force only on **magnetic materials** — and only iron, steel, nickel and cobalt qualify among common metals. Copper, aluminium, silver, gold, lead, zinc — all metals — are essentially non-magnetic and feel no significant force from a static magnet. The trap is conflating \"shiny, conductive metal\" with \"magnetic\": magnetism and electrical conductivity are different properties driven by different aspects of electron behaviour. (A current-carrying wire of *any* metal, however, will feel a force in a field — but that's the motor effect, a different mechanism involving moving charge.)", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": true}, {"question": "A wire carries current straight up out of a table. A plotting compass is placed on the table to the east of the wire. Which direction does the compass's N end point? (3 steps)", "answer": "- Step 1: Apply the right-hand grip rule: thumb pointing up (along the current), fingers curl around the wire. Looking down from above, the field circulates **anticlockwise** around the wire.\n- Step 2: At the compass location (east of the wire), the anticlockwise circulation means the field points **north** at that point (tangent to the circle, going round anticlockwise as seen from above).\n- Step 3: The compass's red/N end aligns with the field, so it points **north**.\n\n(If the compass were placed *west* of the wire, by the same logic, the field there would point south, and the compass N end would point south.)", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "Two identical electromagnets are made, but one has a soft-iron core and the other has just an air core (no iron inside the solenoid). Which is stronger, and why?", "answer": "The one with the **soft-iron core** is much stronger — typically by a factor of hundreds or thousands. The reason is induced magnetism: when current flows, the original solenoid field aligns the iron's domains, turning the core itself into a strong magnet. This induced magnetisation adds its own field to the original, dramatically boosting the total field. The air core has no domains to align, so you get only the modest field from the current alone. This is exactly why real electromagnets (relays, MRI machines, lifting magnets) almost always have an iron core.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": true}, {"question": "Why is it physically meaningful to call a region with \"evenly spaced parallel field lines\" uniform, in terms of what a test object would experience?", "answer": "\"Uniform\" means the field has the same magnitude and direction everywhere in the region. Parallel lines guarantee the **direction** is the same at every point (all lines point the same way). Equal spacing guarantees the **magnitude** is the same at every point (line density = field strength, so constant density = constant strength). Together, this means a magnetic test object placed anywhere in the uniform region would feel the same force, in the same direction. That's the practical importance: uniformity lets us write simple force equations like $$F = BIL$$ without worrying about how $$B$$ varies through the region.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": true}, {"question": "Why do you need to use your **right** hand, not your left, for the grip rule around a current-carrying wire? (2 steps)", "answer": "- Step 1: It's a convention tied to how conventional current is defined (the direction positive charge would flow). With that convention plus the right-hand rule, you get the physically correct field direction — verifiable experimentally by sprinkling iron filings and putting a compass around a wire.\n- Step 2: Using the left hand would give you the opposite circulation, which would be wrong. (Interestingly, the *left* hand is reserved for Fleming's left-hand rule, used for finding the force on a current-carrying wire in a field — a different question.) Using the wrong hand is one of the most common exam mistakes, so the gesture habit matters.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": false}, {"question": "A car with a metal earthing strap is replaced by a car with a *plastic* strap dragging on the ground. Does this prevent static build-up? Why or why not?", "answer": "No — a plastic strap does **not** prevent static build-up. Plastic is an insulator, so even though the strap touches the ground, no electrons can flow through it to or from the earth. The charge on the car body has no conducting path away, so it accumulates just as it did without any strap at all. The strap only works if it is a **conductor** (metal). The principle to internalise: earthing requires a continuous conducting path from the charged object to ground.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": false}, {"question": "Two electrons are placed close to one another in a vacuum. What do they do, and why?", "answer": "They **repel** each other. Both electrons carry negative charge, and like charges repel — a fundamental property of the electromagnetic interaction. The Coulomb force pushes them apart along the line joining them. (A common slip is to say \"attract\" because they're \"the same\" — but in electromagnetism, \"the same\" means \"the same sign of charge\", which means repulsion. Only **opposite** signs attract.)", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": true}, {"question": "A solenoid with a soft-iron core is switched on, used to pick up a steel ball, then switched off. Why does the steel ball fall off — but a magnetically *hard* steel ball might keep clinging slightly even after switch-off? (2 steps)", "answer": "- Step 1: While current flows, the solenoid magnetises the soft-iron core, which in turn induces magnetism in the steel ball — the ball becomes a temporary magnet attracted to the core. Switching off cuts the current, the core's induced field collapses almost instantly (because soft iron is magnetically soft), and the ball — having lost the field that was magnetising it — also demagnetises and falls.\n- Step 2: If the steel ball happens to be a *hardened* steel (magnetically hard), some of the alignment induced during the \"on\" phase can be retained — leaving the ball weakly magnetised after switch-off. It could then weakly stick to the (now also slightly residually magnetised) core. This is why real lifting electromagnets use specifically *soft* iron — to ensure clean release.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": true}, {"question": "When you sprinkle iron filings on paper above a bar magnet and tap, why do the filings line up along the field lines specifically (rather than, say, all gathering at the poles)? (2 steps)", "answer": "- Step 1: Each iron filing becomes a tiny induced magnet in the external field — it gets its own N and S poles aligned with the local field direction. Now it's a little bar magnet sitting in the field.\n- Step 2: A small magnet in a field experiences a torque that aligns it with the field direction (its N end pointing along the field). Tapping the paper momentarily breaks the friction holding each filing in place, letting it rotate until it aligns. Once aligned end-to-end with neighbours (N–S, N–S), they form chains along the field lines.\n\nSo filings reveal the *direction* of the field lines locally — but not which way along that line points N vs S, because each filing aligns with the line but doesn't tell you which end is which.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": true}, {"question": "A small bar magnet is placed inside a much larger uniform field. It rotates until it lines up with the field. Which way does it end up oriented — and why does this make sense from an energy standpoint? (3 steps)", "answer": "- Step 1: The small magnet aligns with its N end pointing along the field direction (i.e. towards a region where the field lines exit, or in the same direction as the field arrows).\n- Step 2: Mechanically: each pole feels a force — the N end is pushed along the field, the S end against the field. The two forces produce a torque that rotates the magnet until both poles lie along the field axis, with no further torque.\n- Step 3: Energetically: a magnetic dipole has lowest potential energy when aligned with the external field (parallel) and highest when antiparallel. Systems settle into minimum-energy configurations, so the magnet rotates to the parallel orientation and stays there.\n\nThis is exactly how a compass needle works — it's a small magnet finding the lowest-energy alignment with the local field.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": true}], "count": 52}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "Why can you only ever transfer negative charge (electrons) between everyday objects, never positive charge directly?", "answer": "The answer lies in atomic structure. Protons sit locked inside the nucleus, bound by the strong nuclear force — they are not mobile in any ordinary mechanical, chemical, or frictional process. Electrons, by contrast, orbit the nucleus and (especially outer-shell electrons) can be stripped away or gained relatively easily. So when we say \"an object became positively charged,\" what physically happened is that it *lost electrons* — it did not gain protons. This is why charging by friction always boils down to bookkeeping electrons between two surfaces, and why phrases like \"positive charge flowed onto it\" are loose shorthand for \"electrons flowed off it.\"", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": true}, {"question": "Two electrons are placed near each other in empty space. What happens, and what does this illustrate about the fundamental rule of electrostatics? (2 steps)", "answer": "- Step 1: Both electrons carry charge $$-1$$ (in units of $$e$$). They are *like charges* (same sign).\n- Step 2: Like charges repel — they push apart. Conversely, opposite charges attract. This is the most basic rule of electrostatics and underlies why neutral objects (equal protons and electrons) feel no net electric force: every attraction is cancelled by an equivalent repulsion.\n\nTakeaway: same sign → push away; opposite sign → pull together. No exceptions in electrostatics.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "When two insulators are rubbed together and one ends up positive, which way did the electrons move, and why does the \"positive\" object end up positive? (2 steps)", "answer": "- Step 1: Friction supplies enough energy to dislodge loosely-bound outer electrons. Electrons flow *from* one material *to* the other — which direction depends on the two materials (this is empirical; the question will tell you).\n- Step 2: The object that *lost* electrons now has fewer negative charges than its (unchanged) protons, so the net charge is positive. The object that *gained* electrons has an excess of negatives, so it's net negative. Crucially, no protons moved — only electrons.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": true}, {"question": "Why does a charged car sitting on rubber tyres stay charged, but a charged car with a metal strap touching the ground does not? (3 steps)", "answer": "- Step 1: Rubber is an *insulator* — its electrons are tightly bound and cannot drift through the material. So excess charge trapped on the car body has no conducting path through the tyres to the ground.\n- Step 2: A metal strap is a *conductor* — it contains free electrons that can flow easily. It connects the car body directly to the Earth (a huge reservoir of charge).\n- Step 3: Excess electrons (or, if positive, electrons flowing the other way to neutralise) drain through the strap into the ground. The car is continuously *earthed* and cannot accumulate charge.\n\nTakeaway: charge \"stays\" or \"leaves\" purely depending on whether there's a conducting path to earth.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": true}, {"question": "Name the only four materials that are magnetic. Why does steel count even though it's an alloy?", "answer": "The four are **iron, steel, nickel, cobalt**. Steel counts because it is *mostly iron* (with a small amount of carbon added for strength) — it's the iron content that gives it its magnetic behaviour. Anything else you might think of — silver, copper, aluminium, gold, wood, plastic — is *not* magnetic and feels no force from a magnet at all. A US 5-cent coin is literally called a \"nickel\" precisely because it contains nickel, which is magnetic.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "What is the difference between a \"magnetically hard\" and a \"magnetically soft\" material, and which is used for permanent magnets vs electromagnets? (3 steps)", "answer": "- Step 1: *Magnetically hard* means the material is difficult to magnetise but, once magnetised, **holds onto its magnetism** for a long time. Example: steel.\n- Step 2: *Magnetically soft* means the material magnetises easily and **loses its magnetism just as easily** when the external field is removed. Example: iron (also nickel, cobalt to some degree).\n- Step 3: Application choice follows directly:\n+ Permanent magnets → hard material (you want it to stay magnetic forever).\n+ Electromagnet cores → soft material (you want the magnetism to switch off the instant you cut the current).\n\nTakeaway: \"hard = holds on; soft = lets go.\"", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "What is \"induced magnetism,\" and why can a paperclip stuck to a magnet pick up a second paperclip? (3 steps)", "answer": "- Step 1: When a piece of magnetic material is placed inside an external magnetic field, the field temporarily aligns the material's internal magnetic structure (electron spins / domains). The piece itself becomes a magnet — this is *induced* magnetism.\n- Step 2: The first paperclip, now sitting in the field of a real magnet, becomes magnetised itself with its own N and S poles. It can therefore exert a magnetic force on a second paperclip.\n- Step 3: Because a paperclip is made of soft material (iron-based), the induced magnetism disappears the moment you remove it from the main magnet's field — the chain collapses.\n\nTakeaway: induced magnets are \"borrowed\" magnets that exist only while bathed in another field.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": true}, {"question": "Define a magnetic field, using the exact phrasing examiners want.", "answer": "A magnetic field is **a region in which a magnetic material, or a moving charged object, feels a force**. The key features of this definition are: (i) it's defined operationally — by what happens to test objects placed inside it; (ii) two kinds of object feel the force: magnetic *materials* (the four listed) *and* moving *charged* objects (stationary charges don't feel a magnetic force, only an electric one); (iii) it's a *region*, not a thing — fields fill space around their source.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": true}, {"question": "State the four rules for drawing magnetic field lines.", "answer": "- Step 1: **Direction**: arrows always point from N to S *outside* the magnet (and from S to N inside, completing the loop). The direction is \"the way a free N pole would be pushed.\"\n- Step 2: **Strength**: the closer the lines are bunched together, the stronger the field at that point. Lines crowd near the poles.\n- Step 3: **Uniformity**: equally-spaced, parallel lines mean the field has the same strength and direction everywhere in that region — a *uniform* field.\n- Step 4: **No crossing**: field lines never cross. (If they did, a test object at the crossing would feel a force in two directions at once, which is impossible.)", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "Where on a bar magnet is the field strongest, and how do you read this off a field-line diagram?", "answer": "The field is strongest at the **two ends** (the poles). On a field-line diagram, this shows up as the lines being most tightly bunched together right at the N and S ends — they fan out and spread apart as you move away. The \"closer lines = stronger field\" rule lets you read off relative strength anywhere on the diagram without numbers.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "If you cut a bar magnet in half, do you get a separate N pole and a separate S pole? Explain. (2 steps)", "answer": "- Step 1: No — you get *two complete smaller magnets*, each with its own N and S pole. Magnetic monopoles (isolated N or isolated S) have never been observed in nature.\n- Step 2: The deep reason (university-level, not examinable here): magnetism arises from aligned electron spins / aligned magnetic domains inside the material. Each domain is itself a tiny dipole with both N and S. Cut the material anywhere, and you simply expose new \"ends\" of the same internal alignment — you can never isolate one pole.\n\nTakeaway: poles always come in pairs; cutting just makes more pairs.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": true}, {"question": "Compare a plotting compass and iron filings as tools for visualising a magnetic field — what does each show, and what's the key limitation of iron filings? (3 steps)", "answer": "- Step 1: A **plotting compass** is itself a tiny pivoted bar magnet. Its red/N end points along the field line (towards the nearest S pole). Moving it step by step, you can trace out both the *shape* of field lines and their *direction* (which way the arrows go).\n- Step 2: **Iron filings** sprinkled on paper over a magnet line up along the field. Where the filings bunch up densely, the field is strong; the overall pattern reveals the *shape* of the field.\n- Step 3: The critical limitation: iron filings show **shape only, not direction** — you can see the lines but not which way the arrows point (you can't tell N from S). To get direction, you still need a compass.\n\nTakeaway: compass = shape + direction; filings = shape only.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": true}, {"question": "Why does the red/N end of a plotting compass point towards the geographic North Pole of the Earth — given that \"like poles repel\"? (3 steps)", "answer": "- Step 1: The compass needle is a small bar magnet; its red end is its *N* pole. Since opposite poles attract, the red N end is drawn towards a *magnetic S pole*.\n- Step 2: The Earth itself acts like a giant bar magnet, but flipped: there's a magnetic **south** pole sitting near the geographic North Pole, and a magnetic **north** near geographic South.\n- Step 3: So the compass's N end points to the Earth's magnetic south pole, which happens to be located near the geographic north — hence \"the compass points north\" is true geographically but magnetically the opposite. This is a *sign convention trap* examiners love.\n\nTakeaway: a compass points to a magnetic S pole, located near the geographic North Pole.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "Two bar magnets are placed a small distance apart with N facing S, fixed in place. What does the field in the gap look like, and why? (3 steps)", "answer": "- Step 1: Opposite poles attract, so field lines leave the N pole of one magnet and run straight across the gap into the S pole of the other.\n- Step 2: Because the lines run directly from one face to the other with no spreading, they are **straight, parallel, and equally spaced** in the gap.\n- Step 3: That pattern is exactly the definition of a **uniform field** — same strength and direction everywhere in the gap. This setup is the standard way to create a uniform B-field in the lab, and it's the configuration used later for the motor effect.\n\nTakeaway: opposite poles facing + fixed magnets = uniform field in the gap.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "Two bar magnets are placed with N facing N (like poles facing). What happens to the field between them, and what is the \"neutral point\"? (2 steps)", "answer": "- Step 1: Like poles repel — both N poles push field lines *away* from themselves. Lines from each magnet curve outwards and away from the centre.\n- Step 2: At the midpoint of the gap, the field from the left magnet points one way and the field from the right magnet points exactly the opposite way, with equal magnitude. They cancel exactly — this creates a **neutral point** where the net field is zero. On field-line diagrams this is often marked with a small cross. S facing S behaves identically.\n\nTakeaway: like poles facing → repulsion → neutral point in the middle where fields cancel.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "You're imagining yourself as a positive test charge sitting between two bar magnets. Why is this a useful trick for deciding the field pattern in two-magnet problems?", "answer": "A positive test object (or a free N pole) is pushed *along* the field direction. So at any point, asking \"which way would I be pushed?\" tells you the direction of the field there. In the N-S facing configuration, you'd be pushed in one consistent direction across the gap → uniform field. In the N-N or S-S configuration, the two pushes oppose each other and cancel at the midpoint → neutral point. This reasoning replaces memorisation: you derive the field pattern from the rule \"like repel, opposite attract\" applied at each location.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": true}, {"question": "What is unusual about Earth's \"north\" pole magnetically, and why is this a real exam trap? (2 steps)", "answer": "- Step 1: The *geographic* North Pole (the spin axis) is in the Arctic. But magnetically, that location is a **south** pole — Earth's giant internal bar magnet is essentially upside down relative to the geography.\n- Step 2: The trap: students say \"the compass points to magnetic north\" — which is wrong terminology even though the compass *does* point geographically northward. The correct statement is \"the compass's N end points to Earth's magnetic *south* pole, near geographic North.\" Combined with the other sign convention (conventional current flows opposite to electron motion), this is a recurring source of lost marks.\n\nTakeaway: geographic North = magnetic South.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": true}, {"question": "What is created around a straight wire when a current flows through it, and what shape does it take when viewed end-on? (2 steps)", "answer": "- Step 1: A current in a conductor produces a **magnetic field** around the wire. This is the foundation of electromagnetism — moving charge creates magnetism.\n- Step 2: The field lines form **concentric circles** centred on the wire, lying in planes perpendicular to the wire. Closer to the wire, the circles are bunched tightly (strong field); further away, they spread out (weaker field). Viewed end-on with current going into the page, the circles point *clockwise* (by the right-hand grip rule).\n\nTakeaway: current → circular field wrapping around the wire, weakening with distance.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "State the right-hand grip rule for the magnetic field around a current-carrying wire. What does each part of the hand represent? (2 steps)", "answer": "- Step 1: Make a \"thumbs up\" gesture with your **right** hand: thumb extended, fingers curled.\n- Step 2: Point the **thumb along the direction of conventional current** (positive charge flow, opposite to electron flow). Your **curled fingers** then show the direction the magnetic field lines circulate around the wire.\n\nIt must be the right hand — using the left hand reverses the field direction and gets you the wrong answer. (Next lesson's Fleming's *left*-hand rule is a different rule for a different quantity — keep them separate.)", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "Why must you use the *right* hand (not the left) for the grip rule around a current-carrying wire?", "answer": "It's a convention tied to how we define current direction (positive charge flow). The right hand encodes the physical reality that the magnetic field circulates in a specific rotational sense determined by the current direction — a consequence of how the laws of electromagnetism (ultimately Ampère's law) are written. Using the left hand would describe a field circulating the opposite way, which doesn't match experiment. The left hand is reserved for a *different* rule (Fleming's left-hand rule for force on a current in a field), so keeping them on separate hands prevents confusion.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": true}, {"question": "Three things make an electromagnet stronger, and they all start with the same letter. What are they and why does each one work? (3 steps)", "answer": "- Step 1: **Current** — increase the current $$I$$. A larger current means more moving charge per second, which produces a proportionally stronger magnetic field around the wire.\n- Step 2: **Coils** — add more turns of wire. Each loop contributes its own field, and winding the wire into a tight coil packs many loops into the same region of space. Their fields add up, concentrating the total field.\n- Step 3: **Core** — insert a soft-iron core inside the coil. The iron becomes magnetised by induction and channels/concentrates the field lines, dramatically boosting the field. Soft iron is chosen so the magnetism vanishes the moment the current is cut.\n\nTakeaway: more Current, more Coils, add a Core.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "What is a solenoid, and what does its external magnetic field look like? (2 steps)", "answer": "- Step 1: A **solenoid** is a long coil of wire wound in a tight spring/helix shape. When current flows, each loop contributes a field, and the loops collectively produce a strong overall magnetic field.\n- Step 2: The external field of a solenoid looks **just like a bar magnet's field** — lines emerge from one end (the N end), loop around the outside, and re-enter the other end (the S end). To an outside observer, you couldn't tell whether the field is from a permanent bar magnet or a solenoid carrying current.\n\nTakeaway: a solenoid externally mimics a bar magnet.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "How do you determine which end of a solenoid is the N pole using your right hand? (2 steps)", "answer": "- Step 1: Curl the fingers of your **right hand** in the direction the conventional current flows around the loops of the solenoid (follow the wire's coiling direction).\n- Step 2: Your extended **thumb** then points along the solenoid's axis towards the **N end**. The other end is the S pole. This is the same right-hand grip rule, just applied to the looped (rather than straight) geometry.\n\nTakeaway: fingers follow the current loops; thumb shows N.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "Inside a solenoid, what does the magnetic field look like, and why is this different from what you see outside a bar magnet?", "answer": "Inside a solenoid, the field is **strong, roughly uniform, and runs from S to N** (the opposite direction to the external field, because the field lines must form closed loops). The lines are straight and tightly packed along the central axis. This is the same internal structure a permanent bar magnet has — we just can't see inside the bar magnet. The solenoid makes the \"hidden\" interior field accessible, which is one reason it's the workhorse geometry for producing controlled, uniform B-fields in laboratory setups.\n\nTakeaway: inside any magnet (bar or solenoid), field runs S→N; outside, N→S. The lines form complete loops.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": true}, {"question": "What is the symbol $$B$$, what does it physically measure, and what is its SI unit? (3 steps)", "answer": "- Step 1: $$B$$ is **magnetic flux density**, also called magnetic field strength. It's the quantity that tells you how strong the magnetic field is at a particular point in space.\n- Step 2: Geometrically, $$B$$ corresponds to how closely the field lines are bunched together — high $$B$$ where lines crowd, low $$B$$ where they spread out. A field meter probe inserted into a field reads off the local $$B$$.\n- Step 3: SI unit: the **tesla** (T), where $$1 \\text{ T} = 1 \\text{ N A}^{-1} \\text{ m}^{-1}$$. For scale: Earth's field is about $$50 \\, \\mu\\text{T}$$, a fridge magnet is on the order of millitesla, and \"a fraction of a tesla\" is already considered a very strong lab magnet.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "Why does the unit of $$B$$ work out to $$\\text{N A}^{-1} \\text{ m}^{-1}$$? What physical equation makes this dimensional sense? (2 steps)", "answer": "- Step 1: $$B$$ is defined through the force on a current-carrying wire: $$F = BIL$$ (for a wire perpendicular to the field). Rearranging: $$B = F / (IL)$$.\n- Step 2: Force has units of newtons (N), current has amps (A), length has metres (m). So $$B$$ has units of $$\\text{N}/(\\text{A} \\cdot \\text{m}) = \\text{N A}^{-1} \\text{ m}^{-1}$$, which is given the special name tesla. The unit isn't a stand-alone definition — it falls naturally out of the force law that *defines* what $$B$$ means physically.\n\nTakeaway: tesla = newton per amp per metre, because that's the force law that defines $$B$$.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "When describing any magnetic field in an exam, which three properties should you structure your answer around?", "answer": "**Strength**, **direction**, and **shape**. Strength: where is the field strong/weak? (Read off line spacing — closer = stronger.) Direction: which way do the arrows point? (N→S outside; use a compass or right-hand rule.) Shape: what's the geometry of the lines? (Looping, circular, parallel, radial.) Structuring every field-description answer around these three guarantees you cover all the marks examiners are looking for.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "Why is the word \"interact\" safer than \"attract\" when describing a magnetic force in an uncertain situation?", "answer": "Because magnets and magnetic materials can attract *or* repel depending on pole orientation. If you say \"the magnet attracts the metal\" you're committing to one specific outcome that may or may not be correct (e.g. like poles repel). Saying \"the magnet causes the metal to interact\" or \"exerts a force on\" is always true wherever a force exists, regardless of whether it's attractive or repulsive. This is Alex's coaching point — when uncertain about the direction of the force, use a verb that only commits to \"a force exists\" without specifying its sign.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": true}, {"question": "In a film clip, a character makes metal objects hover and steer in arbitrary directions using a magnetic field. Which parts of this are physically possible, and which are not? (3 steps)", "answer": "- Step 1: **Physically possible**: a strong magnetic field exists; the metal objects are made of a magnetic material (iron/steel) so they feel a force from the field.\n- Step 2: **Physically false**: a simple magnet only attracts (or repels like poles). It pulls magnetic material directly along the field — it can't make objects hover stationary against gravity or steer them sideways in arbitrary directions without complex feedback control.\n- Step 3: Safe answer formulation: say the field causes the objects to \"interact\" (a force is exerted), but not that it can hold them in unsupported configurations or steer them — that's beyond what a static magnetic field can do.\n\nTakeaway: the metal-being-magnetic part is real; the precise control of motion is fictional.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "A car drives along a road and becomes positively charged. Did it gain or lose electrons, and where did they go? (2 steps)", "answer": "- Step 1: Positive charge means a *deficit* of electrons relative to protons. So the car **lost** electrons.\n- Step 2: The electrons went into the **air** (not the road). Friction between the moving car surface and air molecules transfers electrons; the question often confuses students into saying \"to the road,\" but rubber tyres are insulators and block that path. So the air carries the electrons away, leaving the car with net positive charge.\n\nTakeaway: friction with air strips electrons → car positive.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "A charged car has a metal strap fixed underneath that drags along the ground. Explain step-by-step how this prevents charge build-up. (3 steps)", "answer": "- Step 1: The metal strap is a **conductor** — its free electrons can flow easily through it. This is the property exploited here.\n- Step 2: The strap physically connects the car body (where charge accumulates) to the ground (the Earth, a vast charge reservoir). This creates a conducting path that bypasses the insulating rubber tyres.\n- Step 3: Excess charge (electrons, or their equivalent in opposite-direction flow if the car is positive) drains continuously through the strap to earth. The car is *earthed* the whole time it's moving, so charge has nowhere to accumulate.\n\nTakeaway: conductor + connection to earth = continuous discharge path.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "Why is it impossible for a charged car to lose its charge through the road via the rubber tyres?", "answer": "Rubber is an **insulator** — its electrons are tightly bound and cannot flow through the material. So even though the tyres physically touch the road (which itself isn't always a great conductor either, but ignore that), there's no conducting path through which electrons can drain from the car body to the Earth. The charge is trapped on the car. This is precisely the reason aircraft and fuel trucks use earthing straps — without them, accumulated static charge can spark and ignite fuel.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": true}, {"question": "Why do \"physics conventions get things the wrong way around\" with conventional current and Earth's poles?", "answer": "Two historical sign-convention traps: (1) **Conventional current** is defined as the direction *positive* charge would flow — but in metals, the actual moving charges are electrons, which move in the *opposite* direction. So when you write current arrows on a circuit, you're drawing the direction opposite to electron motion. (2) **Earth's \"north\" magnetic pole is actually a magnetic south pole** — the giant Earth-magnet is flipped relative to geography. Both conventions are too entrenched to change, so you just have to remember them. They're prime sources of lost marks on exam questions about direction.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": true}, {"question": "A current flows into the page through a straight wire. Sketch in words the magnetic field around it: which direction do the field circles go, and how is strength distributed? (2 steps)", "answer": "- Step 1: Apply the right-hand grip rule. Thumb points *into* the page (current direction); curled fingers then circulate **clockwise** as viewed from your side (looking at the page).\n- Step 2: The field lines are concentric circles centred on the wire, all going clockwise. Close to the wire they are tightly packed (strong field); as you move further out, they spread apart (weaker field). The field strength falls off with distance from the wire.\n\nTakeaway: current into page → clockwise field circles → weakens with distance.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "A solenoid carries current flowing anticlockwise when viewed from the right-hand end. Which end is N? (2 steps)", "answer": "- Step 1: Use the right-hand grip rule for solenoids: curl your fingers in the direction the current flows around the loops. Looking at the right-hand end from the right, current is anticlockwise — so your right hand's fingers curl that way only if your thumb points *to the left* (away from you).\n- Step 2: Therefore the thumb points away to the left-hand end of the solenoid. That makes the **left end the N pole** and the right end the S pole.\n\nTakeaway: curl right-hand fingers with the current loops; thumb finds N.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "You double the current through a solenoid but keep everything else the same. Qualitatively, what happens to the magnetic field strength? (2 steps)", "answer": "- Step 1: The field produced by a solenoid is proportional to the current (other things equal). Doubling the current roughly **doubles the field strength** $$B$$.\n- Step 2: This is one of the three \"C\"s — Current — and it's why electromagnets are so practical: you can dial the field strength up or down just by changing the current, unlike a permanent magnet which is fixed.\n\nTakeaway: $$B$$ scales linearly with $$I$$ for a solenoid (approximately, ignoring saturation of the core).", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "Why does inserting a soft-iron core inside a solenoid dramatically boost the field, and why specifically *soft* iron rather than hard steel? (2 steps)", "answer": "- Step 1: Iron is highly magnetisable — when placed in the solenoid's field, its internal domains align with the field, and the iron itself becomes a strong magnet. This induced magnetism adds to the solenoid's own field, multiplying the total $$B$$ by a large factor (often hundreds or thousands).\n- Step 2: We choose **soft** iron specifically because it loses its magnetism the instant the current is cut — the electromagnet truly switches \"off.\" If you used hard steel, the core would retain residual magnetism even after the current stopped, which defeats the purpose of an electromagnet (you want on/off control).\n\nTakeaway: core boosts field via induced magnetism; soft iron releases that magnetism on demand.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "Compare a permanent bar magnet and a current-carrying solenoid: what is the same, what is different? (3 steps)", "answer": "- Step 1: **Same external field shape**: both produce field lines that emerge from an N end, loop around the outside, and re-enter the S end. From the outside, you couldn't tell them apart.\n- Step 2: **Same internal field direction**: inside both, the field runs from S to N (completing the loops). In a bar magnet you can't see this, but in a solenoid you can probe inside and confirm it's strong and uniform.\n- Step 3: **Different controllability**: the bar magnet is permanent and unchangeable. The solenoid can be switched on/off, reversed (flip the current), strengthened (more current, coils, or add a core), or weakened — all by electrical means.\n\nTakeaway: same field pattern, but the electromagnet is tunable while the bar magnet is fixed.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "Today's lesson uses the **right** hand for the field around a wire. Next lesson uses the **left** hand for something different. Why two different hands, and what does each rule give you? (2 steps)", "answer": "- Step 1: The **right-hand grip rule** answers: *given the current, what direction is the magnetic field?* Thumb = current; fingers curl = field direction. This is for understanding the field a current produces.\n- Step 2: **Fleming's left-hand rule** (coming next lesson) answers a different question: *given a current in an existing magnetic field, which way is the force on the wire?* It uses three fingers of the left hand: thuMb = Motion/Force, First finger = Field, seCond finger = Current. Different physical question → different rule → different hand. Keeping them on opposite hands physically prevents you from mixing them up.\n\nTakeaway: right hand = field from a current; left hand = force on a current in a field.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "What is the equation that *defines* magnetic flux density $$B$$ through the force on a current-carrying wire, and what does each symbol mean? (3 steps)", "answer": "- Step 1: The defining equation is $$F = BIL \\sin \\theta$$, where:\n+ $$F$$ = force on the wire (newtons)\n+ $$B$$ = magnetic flux density (tesla)\n+ $$I$$ = current in the wire (amps)\n+ $$L$$ = length of wire in the field (metres)\n+ $$\\theta$$ = angle between the wire and the field direction\n- Step 2: When the wire is **perpendicular** to the field, $$\\sin \\theta = 1$$, and it reduces to the familiar $$F = BIL$$. When the wire is **parallel** to the field, $$\\sin \\theta = 0$$, and there's no force at all.\n- Step 3: For a moving point charge instead of a wire: $$F = Bqv \\sin \\theta$$, with $$q$$ the charge and $$v$$ the velocity. Same structure, same angle dependence.\n\n(You're not examined on this yet — but recognising it now sets up next lesson.)", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": false}, {"question": "A wire is laid exactly *along* (parallel to) a magnetic field and carries a current. What force does it experience, and why? (2 steps)", "answer": "- Step 1: Using $$F = BIL \\sin \\theta$$ with $$\\theta = 0°$$ (wire parallel to field): $$\\sin 0° = 0$$, so $$F = 0$$.\n- Step 2: Physically: the force on a moving charge in a magnetic field is perpendicular to both the velocity and the field. If the velocity (current direction) is *along* the field, there's no perpendicular component to push on — the geometry collapses and no force emerges. Maximum force occurs at $$\\theta = 90°$$ (wire perpendicular to field).\n\nTakeaway: parallel = no force; perpendicular = maximum force.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "You have two field-line diagrams. Diagram A shows lines bunched tightly at one end and spreading out as you move away. Diagram B shows lines that are straight, parallel, and equally spaced. What does each tell you about the field? (2 steps)", "answer": "- Step 1: **Diagram A** describes a **non-uniform** field that is strongest where the lines bunch (e.g. near the pole of a bar magnet) and weakens as you move into the region where lines spread out. Both strength and direction vary with position.\n- Step 2: **Diagram B** describes a **uniform** field — the spacing being equal means strength is the same everywhere, and the parallel orientation means direction is the same everywhere. This is the field configuration you get in the gap between two opposite-pole-facing fixed bar magnets, or inside a long solenoid.\n\nTakeaway: line spacing encodes strength variation; line orientation encodes direction.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": false}, {"question": "A student says \"iron filings show me which end of the magnet is N.\" What's wrong with this, and what should they use instead?", "answer": "Iron filings line up along field lines and bunch where the field is strong, so they reveal the *shape* of the field beautifully — but each filing is just a tiny piece of iron, not a magnet with a labelled N and S. There's nothing in the filing pattern to indicate which direction the arrows point along the lines, so you cannot identify which pole is N. To get direction, you need a **plotting compass**: its needle is a real magnet with a red N end that aligns *along* the field line and shows its direction unambiguously.\n\nTakeaway: filings = shape only; need a compass to identify N vs S.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": true}, {"question": "Why is the *internal* field of a solenoid roughly uniform, while the field of a single straight wire is not?", "answer": "A single straight wire produces concentric circular field lines that are crowded near the wire and spread out at distance — strength varies with position, so it's non-uniform. A solenoid is many loops stacked along an axis: inside, the contributions from all the loops add up in the *same direction* (along the axis), while contributions perpendicular to the axis from adjacent loops cancel. The result is that, away from the ends, the internal field has nearly the same magnitude and direction everywhere — approximately uniform. This is geometrically analogous to how stacking many small effects in superposition produces a smooth, large effect.\n\nTakeaway: superposition of many loops in a solenoid creates a uniform interior field.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": true}, {"question": "You're told a bar magnet's field is strongest at the poles. From a \"where do the lines come from\" perspective, why does this make sense? (2 steps)", "answer": "- Step 1: Field lines emerge from the N pole and
