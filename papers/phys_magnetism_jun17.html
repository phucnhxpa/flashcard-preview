<script>
const cards = [{"q": "In the structure of an atom, which particles are in the nucleus and what are their charges? Why can you never \"transfer positive charge\" between everyday objects? (3 steps)", "a": "- Step 1: The nucleus contains protons (charge $$+1$$ each) and neutrons (charge $$0$$). Electrons (charge $$-1$$ each) orbit outside the nucleus.\n- Step 2: Protons are locked inside the nucleus by the strong nuclear force. They cannot be removed or transferred between everyday objects through any ordinary process (rubbing, touching, etc.).\n- Step 3: Therefore, when charge is transferred between objects, only electrons move. If an object \"becomes positively charged,\" it didn't gain positive charge \u2014 it *lost* electrons. The remaining protons now outnumber the electrons, giving a net positive.\n+ A neutral object has equal protons and electrons, so charges cancel.\n+ This is why the phrasing \"transfer positive charge\" is physically wrong \u2014 you always transfer electrons.\n\nKey takeaway: Only electrons are mobile; \"gaining positive charge\" actually means \"losing electrons.\"", "source": "GLM 5.1"}, {"q": "Two insulators are rubbed together. One becomes positively charged and the other becomes negatively charged. What physically moved between them, and what happened to the number of protons in each object? (2 steps)", "a": "- Step 1: Electrons moved from one insulator to the other through friction. The object that *lost* electrons became positively charged (fewer electrons than protons); the object that *gained* electrons became negatively charged (more electrons than protons).\n- Step 2: The number of protons in each object did not change at all. Protons are locked in the nuclei and never move during everyday charging processes. Only the electron count changed.\n+ The direction of electron transfer depends on the two materials \u2014 an exam question will either tell you which way electrons go, or tell you the final sign so you can deduce it.\n+ If the rod becomes negative and the cloth positive, electrons went from cloth \u2192 rod.\n\nTakeaway: Charging by friction = electron transfer only; protons are spectators.", "source": "GLM 5.1"}, {"q": "A car drives along a road and becomes positively charged. Did it gain or lose electrons, and why can't the charge flow away through the tyres? (2 steps)", "a": "- Step 1: The car lost electrons (to the air, through friction). Losing electrons leaves it with more protons than electrons, so it has a net positive charge. The electrons went to the air \u2014 not to the road \u2014 because the rubber tyres block electron flow to the ground.\n- Step 2: Rubber is an excellent insulator. Charge cannot flow through an insulator, so the excess positive charge (the electron deficit) is trapped on the car. There is no conducting path to earth, so the charge remains.\n+ If the tyres were metal (conductors), the charge would immediately flow to earth and the car would stay neutral.\n+ This is exactly why static builds up on insulators but not on conductors.\n\nTakeaway: Insulators trap charge; conductors allow it to flow away.", "source": "GLM 5.1"}, {"q": "A metal strap is attached under a car so it drags on the road. How does this prevent static charge from building up on the car? (2 steps)", "a": "- Step 1: Metal is a conductor \u2014 it allows charge (electrons) to flow through it freely. The strap connects the car's body directly to the ground (earth).\n- Step 2: Any excess charge on the car now has a conducting path to flow to earth. Electrons can flow from the ground to the car (if the car is positive) or from the car to the ground (if the car is negative). The car is continuously earthed, so charge cannot build up.\n+ \"Earthing\" means providing a conducting path to the ground so excess charge can dissipate.\n+ Without the strap, the rubber tyres isolate the car; with the strap, the car is electrically connected to the ground.\n\nTakeaway: Earthing = conductor to ground = charge can flow away = no static buildup.", "source": "GLM 5.1"}, {"q": "Name all four magnetic materials. Why is steel on this list even though it is an alloy, not a pure element? (2 steps)", "a": "- Step 1: The four magnetic materials are: iron, steel, nickel, cobalt. These are the *only* materials attracted to a magnet \u2014 no others.\n- Step 2: Steel is an alloy (mostly iron with a little carbon). It is magnetic because of its iron content. The iron atoms in steel are what respond to a magnetic field, so the whole alloy counts as magnetic.\n+ Common trap: silver, copper, aluminium, and gold are metals but are NOT magnetic. Being metallic does not mean being magnetic.\n+ A US 5-cent coin is literally called a \"nickel\" \u2014 it's magnetic because it contains nickel, not silver.\n\nTakeaway: Only four materials are magnetic; steel qualifies because of its iron content.", "source": "GLM 5.1"}, {"q": "What is the difference between a magnetically hard material and a magnetically soft material? Give an example of each and explain which is used for permanent magnets vs electromagnets. (3 steps)", "a": "- Step 1: A magnetically hard material retains its magnetism for a long time once magnetised. Example: steel. This makes it ideal for permanent magnets \u2014 you want them to keep their field.\n- Step 2: A magnetically soft material gains magnetism easily but also loses it quickly when the external field is removed. Example: iron (also nickel, cobalt in pure form). This makes it ideal for electromagnets \u2014 you want to switch the magnetism on and off.\n- Step 3: The practical distinction: permanent magnets = hard materials (steel); electromagnets = soft materials (iron core), because you need the core to lose its magnetism when the current stops.\n+ \"Hard = holds on; soft = gains and loses easily\" is the one-line summary.\n+ If you used a hard material for an electromagnet core, it would stay magnetised even after you turned off the current \u2014 defeating the purpose.\n\nTakeaway: Hard materials hold magnetism (permanent); soft materials release it quickly (electromagnets).", "source": "GLM 5.1"}, {"q": "A paperclip is not a magnet on its own. But when you touch it to a bar magnet, it clings to the magnet AND can then pick up a second paperclip. What type of magnetism is this, and what happens if you remove the first paperclip from the magnet's field? (2 steps)", "a": "- Step 1: This is **induced magnetism**. When a piece of magnetic material (the paperclip, which is steel/iron) is placed inside another magnet's field, the field forces its magnetic domains to align, making it a magnet itself.\n- Step 2: Once you remove the paperclip from the magnet's field, if the paperclip is made of a soft material (like iron), it quickly loses its induced magnetism and can no longer pick up the second paperclip. If it were a hard material (like steel), it would retain some magnetism for longer.\n+ The second paperclip is itself being induced by the first paperclip's field \u2014 a chain reaction.\n+ Induced magnetism is always temporary for soft materials \u2014 it exists only while in the external field.\n\nTakeaway: Induced magnetism = becoming a magnet by being in another magnet's field; soft materials lose it when removed.", "source": "GLM 5.1"}, {"q": "What is the textbook definition of a magnetic field? Why does the definition mention \"a moving charged object\" in addition to \"a magnetic material\"? (2 steps)", "a": "- Step 1: A magnetic field is \"a region in which a magnetic material, or a moving charged object, feels a force.\" This is the exact phrasing to memorise.\n- Step 2: The definition includes \"moving charged object\" because magnetic fields exert forces on moving charges too \u2014 not just on magnetic materials. A stationary charge in a magnetic field feels no magnetic force, but a charge moving through the field does (this is the basis of the motor effect and $$F = Bqv\\sin\\theta$$, covered next lesson).\n+ A stationary electron near a magnet feels no force from the magnetic field, but an electron moving through the field does.\n+ This is why the full definition must include both categories of objects that feel a force.\n\nTakeaway: The field definition has two targets: magnetic materials AND moving charges \u2014 both feel forces in a magnetic field.", "source": "GLM 5.1"}, {"q": "State the four rules that magnetic field lines obey. For each rule, explain what physical information it encodes. (4 steps)", "a": "- Step 1: **Direction** \u2014 arrows always point from N to S (outside the magnet). This encodes the direction a free north pole (or a positive test object) would be pushed.\n- Step 2: **Strength** \u2014 the closer the lines, the stronger the field. Lines bunch up at the poles, so a bar magnet is strongest at its ends. This encodes field intensity spatially.\n- Step 3: **Uniform field** \u2014 equally-spaced, parallel lines mean the field is the same strength and direction everywhere. This is a special case of the strength rule: constant spacing = constant strength.\n- Step 4: **Field lines never cross** \u2014 if they did, it would mean the field points in two directions at once at the crossing point, which is physically impossible. A point in space can only have one field direction.\n+ Rule 2 is the most frequently tested: \"where is the field strongest?\" \u2192 \"where the lines are closest together.\"\n+ Rule 4 is a mathematical constraint, not just a drawing convention \u2014 it reflects physical reality.\n\nTakeaway: Field lines encode direction (N\u2192S), strength (spacing), uniformity (equal spacing), and uniqueness (no crossings).", "source": "GLM 5.1"}, {"q": "You cut a bar magnet exactly in half. Do you get one piece that is a north pole and one piece that is a south pole? Explain what you actually get and the deeper reason why. (3 steps)", "a": "- Step 1: No \u2014 you get TWO complete magnets, each with its own N and S pole. Cutting does not isolate a single pole.\n- Step 2: Each half has a new pole at the cut face (the opposite polarity to its original end) and retains its original pole at the other end. So the half that had the N end now has N at one end and a new S at the cut; the other half has S at one end and a new N at the cut.\n- Step 3: The deeper (university-level) reason: magnetism comes from aligned electron spins / aligned magnetic domains inside the material. You cannot separate the spin alignment into \"north\" and \"south\" halves \u2014 the alignment is a property of the bulk material, so each piece retains a full dipole.\n+ This means magnetic monopoles (isolated N or S poles) do not exist in ordinary matter.\n+ Alex showed this explanation then crossed it out \u2014 understand it for intuition, but don't write it in a GCSE/ESAT answer.\n\nTakeaway: You can never isolate a single magnetic pole; every piece of a magnet is a complete dipole.", "source": "GLM 5.1"}, {"q": "You are given a plotting compass and asked to trace a magnetic field line near a bar magnet. Describe the step-by-step procedure. What information does this method give you that iron filings cannot? (3 steps)", "a": "- Step 1: Place the plotting compass near the magnet. The compass needle is a tiny pivoted magnet \u2014 its red (N) end aligns along the field line. Mark a dot where the N end points.\n- Step 2: Move the compass so its tail (S end) sits on the dot you just made. Mark a new dot where the N end now points. Repeat this process, joining the dots, tracing from the N pole around to the S pole.\n- Step 3: The plotting compass gives you both the **shape** of the field (from the curve of dots) AND the **direction** (from which way the red end points). Iron filings only show shape \u2014 they cannot tell you which pole is N or S.\n+ The red/N end of the compass always points towards a magnetic south pole (or along the field line from N to S).\n+ This is why examiners ask \"what can't iron filings tell you?\" \u2014 answer: the direction / which pole is which.\n\nTakeaway: Compass = shape + direction; iron filings = shape only. Direction is the key advantage of the compass.", "source": "GLM 5.1"}, {"q": "Iron filings are sprinkled on paper above a magnet and the paper is gently tapped. What do you see, and what physical limitation does this method have compared to a plotting compass? (2 steps)", "a": "- Step 1: The iron filings align themselves along the field lines, revealing the **shape** of the magnetic field. Where the field is strong, the filings bunch together; where it's weak, they spread apart. Tapping helps them overcome friction and rotate into alignment.\n- Step 2: The limitation: iron filings show **shape** (and relative strength from bunching) but NOT **direction**. You cannot tell from a filing pattern which way the field points \u2014 you cannot distinguish N from S. For direction, you must use a plotting compass.\n+ Each tiny iron filing becomes a temporary induced magnet and aligns with the field, but it has no \"arrow\" on it.\n+ The filings are essentially thousands of tiny compass needles without a painted N end.\n\nTakeaway: Iron filings = beautiful shape map, but blind to direction; compass needed for N\u2192S information.", "source": "GLM 5.1"}, {"q": "Two bar magnets are arranged with opposite poles facing each other (N facing S). Describe the field in the gap between them. Why is this arrangement special? (3 steps)", "a": "- Step 1: The opposite poles attract each other. The field lines run straight across the gap from N to S \u2014 they don't curve or diverge in the gap region.\n- Step 2: In the gap, the field lines are straight, parallel, and equally spaced. This means the field has the same strength and direction everywhere in the gap \u2014 it is a **uniform field**.\n- Step 3: This arrangement is special because it is the standard setup for the motor effect (next lesson): a current-carrying wire placed in this uniform field experiences a force. The uniformity ensures the force is the same along the wire's length.\n+ The magnets must be fixed so they can't move \u2014 opposite poles attract and would snap together otherwise.\n+ \"Equal spacing = uniform\" is the key visual rule applied here.\n\nTakeaway: N facing S with fixed magnets = uniform field in the gap = the motor-effect setup.", "source": "GLM 5.1"}, {"q": "Two bar magnets are arranged with like poles facing each other (N facing N, or S facing S). What happens to the field in the gap between them, and what is a \"neutral point\"? (3 steps)", "a": "- Step 1: Like poles repel. Each magnet produces its own field pointing outward from its N pole (or inward toward its S pole). In the gap, the two fields push against each other.\n- Step 2: At the exact midpoint between the like poles, the two fields are equal in strength but opposite in direction \u2014 they cancel out completely. This point is called a **neutral point** (drawn as a cross $$\\times$$).\n- Step 3: Away from the neutral point, the field lines curve outward and away from the gap, being deflected by the repulsion. No straight, uniform field exists in the gap \u2014 unlike the opposite-pole arrangement.\n+ Imagine being a positive test charge in the middle: one N pole pushes you away, the other N pole also pushes you away from it \u2014 the forces are equal and opposite at the midpoint, so net force = 0.\n+ S facing S gives the same result: repulsion, neutral point in the middle.\n\nTakeaway: Like poles facing = repulsion, no uniform field, neutral point (zero field) at the centre.", "source": "GLM 5.1"}, {"q": "A compass needle's red end points towards geographic north on Earth. Does this mean the geographic North Pole is a magnetic north pole? Explain the twist. (3 steps)", "a": "- Step 1: No \u2014 the geographic North Pole is near a magnetic **south** pole. The compass needle's red (N) end is attracted to a magnetic south pole, which is why it points north.\n- Step 2: The Earth behaves like a giant bar magnet turned upside down: the magnetic south pole is located near the geographic North Pole, and the magnetic north pole is near the geographic South Pole.\n- Step 3: The compass needle (a small magnet) follows the Earth's field lines. Its N end is attracted towards the magnetic south pole (near geographic north), which is why we say \"a compass points north\" \u2014 even though magnetically it is pointing at a south pole.\n+ This is one of physics' sign-convention traps, like conventional current flowing opposite to electron flow.\n+ The UK's field is about $$50\\,\\mu\\text{T}$$, dipping into the ground at roughly $$65{-}70\u00b0$$ \u2014 not horizontal.\n\nTakeaway: Geographic North \u2248 magnetic south; the compass N end seeks a magnetic S pole, which happens to be \"up north.\"", "source": "GLM 5.1"}, {"q": "When a current flows through a straight conductor, what is created around the wire? What rule do you use to determine the direction, and how do you physically apply it? (3 steps)", "a": "- Step 1: A **magnetic field** is created around the wire. This is the principle of an **electromagnet** \u2014 a magnet created by electric current. The four-card chain: Current \u2192 Conductor \u2192 Magnetic field \u2192 Electromagnet.\n- Step 2: The direction of the circular magnetic field is found using the **right-hand grip rule**. Point your right thumb along the direction of conventional current; your curled fingers show the direction the field wraps around the wire.\n- Step 3: The field lines around a straight wire are concentric circles, getting weaker further from the wire. Viewed end-on with current going *into* the page, the field circles are **clockwise** (you can verify: right thumb points into page, fingers curl clockwise).\n+ It MUST be the right hand \u2014 this links to Fleming's rules coming next lesson (left hand for force, right hand for field direction).\n+ Stronger current = stronger field; further from wire = weaker field.\n\nTakeaway: Current in a wire \u2192 circular field; right-hand grip rule (thumb = current, fingers = field direction).", "source": "GLM 5.1"}, {"q": "A wire carries current flowing upward (away from the ground). Using the right-hand grip rule, which way does the magnetic field circle around the wire \u2014 clockwise or anticlockwise when viewed from above? (2 steps)", "a": "- Step 1: Point your right thumb upward (direction of conventional current). Your curled fingers wrap around the wire. When viewed from above (looking down along the current), your fingers curl **anticlockwise**.\n- Step 2: So the magnetic field circles anticlockwise when viewed from above. If you viewed from below (looking up at the wire), the circles would appear clockwise. The direction depends on your viewpoint, but the rule is consistent: thumb = current, fingers = field.\n+ This is a concrete application of the right-hand grip rule \u2014 always use your actual right hand.\n+ If the current reversed (flowing downward), the field would reverse too (clockwise from above).\n\nTakeaway: Right thumb along current; fingers give field direction. Upward current \u2192 anticlockwise from above.", "source": "GLM 5.1"}, {"q": "What are the three ways to make an electromagnet stronger? They all begin with the letter C \u2014 name and explain each. (3 steps)", "a": "- Step 1: **Current** \u2014 increase the current flowing through the wire. A larger current produces a stronger magnetic field (the field is proportional to the current).\n- Step 2: **Coils** \u2014 add more turns (coils) of wire. Winding the wire into a tight coil concentrates the field because you have more current-carrying wire in the same space, and the fields from each turn add together.\n- Step 3: **Core** \u2014 add a soft-iron core inside the coil. The iron is a magnetic material that channels and concentrates the field lines through it, greatly boosting the overall field strength. Iron is used (not steel) because it's magnetically soft \u2014 it loses magnetism when the current stops, allowing the electromagnet to switch off.\n+ The \"three Cs\" mnemonic (Current, Coils, Core) makes these easy to recall under exam pressure.\n+ Without the core, the solenoid still works but is much weaker \u2014 the core provides a huge boost.\n\nTakeaway: Stronger electromagnet = more Current, more Coils, add an iron Core.", "source": "GLM 5.1"}, {"q": "What is a solenoid? Describe the shape of its external field and explain how to determine which end is the north pole using the right-hand grip rule. (3 steps)", "a": "- Step 1: A solenoid is a coil of wire wound into a long spring shape. When current flows through it, it produces a magnetic field.\n- Step 2: The external field of a solenoid looks exactly like a bar magnet's field: field lines emerge from one end, loop around outside, and re-enter the other end. The solenoid is effectively a bar magnet you can switch on and off.\n- Step 3: To find which end is N, use the right-hand grip rule adapted for a coil: curl your right fingers in the direction the current flows around the coils; your thumb points to the **N** end. The other end is S, and external field lines run N\u2192S as expected.\n+ Inside the solenoid, the field is strong and approximately uniform, running S\u2192N (completing the loop). This internal field is the same as inside a permanent magnet \u2014 we just can't see inside a solid bar magnet.\n+ The solenoid's advantage over a bar magnet: you can control it (turn it on/off, change strength with current/coils/core).\n\nTakeaway: Solenoid = coil that acts like a switchable bar magnet; right-hand grip (fingers = current direction around coils, thumb = N end).", "source": "GLM 5.1"}, {"q": "What is the symbol for magnetic flux density, what is its SI unit, and how is the unit derived from the defining equation for the motor effect? (3 steps)", "a": "- Step 1: The symbol is **$$B$$**. Magnetic flux density (also called magnetic field strength) measures how strong the field is \u2014 how closely bunched the field lines are.\n- Step 2: The SI unit is the **tesla (T)**. For scale: the Earth's field is about $$50\\,\\mu\\text{T}$$; a fraction of a tesla is already very strong.\n- Step 3: The unit comes from the motor-effect equation $$F = BIL\\sin\\theta$$. Rearranging: $$B = \\frac{F}{IL\\sin\\theta}$$. With $$\\theta = 90\u00b0$$ (perpendicular), $$\\sin\\theta = 1$$, so $$B = \\frac{F}{IL}$$. Substituting SI units: $$\\frac{\\text{N}}{\\text{A}\\cdot\\text{m}}$$ = $$\\text{N}\\,\\text{A}^{-1}\\,\\text{m}^{-1}$$. So $$1\\,\\text{T} = 1\\,\\text{N}\\,\\text{A}^{-1}\\,\\text{m}^{-1}$$.\n+ You don't need to use the equation yet (next lesson), but recognising where the unit comes from helps it stick.\n+ A tesla is a large unit \u2014 most everyday magnets produce fields of milliteslas, not whole teslas.\n\nTakeaway: $$B$$ = magnetic flux density, unit tesla (T) = $$\\text{N}\\,\\text{A}^{-1}\\,\\text{m}^{-1}$$, derived from $$F = BIL$$.", "source": "GLM 5.1"}, {"q": "In the motor effect equation $$F = BIL\\sin\\theta$$, what does each symbol represent, and what happens when the wire is perpendicular to the field vs parallel to it? (3 steps)", "a": "- Step 1: $$F$$ = force on the wire (N), $$B$$ = magnetic flux density (T), $$I$$ = current in the wire (A), $$L$$ = length of wire in the field (m), $$\\theta$$ = angle between the magnetic field direction and the wire/current direction.\n- Step 2: When the wire is **perpendicular** to the field ($$\\theta = 90\u00b0$$), $$\\sin 90\u00b0 = 1$$, and the equation simplifies to $$F = BIL$$. This gives the **maximum** force \u2014 the full-strength motor effect.\n- Step 3: When the wire is **parallel** to the field ($$\\theta = 0\u00b0$$), $$\\sin 0\u00b0 = 0$$, so $$F = 0$$. No force acts on a wire carrying current along the field direction \u2014 the motor effect requires a component of current perpendicular to the field.\n+ This is a preview \u2014 the full treatment comes next lesson with Fleming's left-hand rule.\n+ For a moving charge, the analogous equation is $$F = Bqv\\sin\\theta$$, where $$q$$ is charge and $$v$$ is velocity.\n\nTakeaway: Maximum force when perpendicular ($$F = BIL$$); zero force when parallel \u2014 the angle matters.", "source": "GLM 5.1"}, {"q": "Today's lesson used the RIGHT-hand grip rule. Next lesson introduces Fleming's LEFT-hand rule. What does each rule determine, and why must you not mix them up? (2 steps)", "a": "- Step 1: The **right-hand grip rule** determines the *direction of the magnetic field* around a current-carrying wire or solenoid (thumb = current, fingers = field direction). It answers: \"which way does the field circle?\"\n- Step 2: **Fleming's left-hand rule** determines the *direction of the force* on a current-carrying conductor in a magnetic field (thumb = force, index = field, middle = current). It answers: \"which way is the wire pushed?\" These are two completely different questions \u2014 mixing up the hands would give you the wrong direction for the force.\n+ Right hand = field direction (from current); Left hand = force direction (from field + current).\n+ The reason for different hands relates to the cross-product in the underlying vector mathematics \u2014 but at this level, just memorise: right for field, left for force.\n\nTakeaway: Right hand \u2192 field from current; Left hand \u2192 force on current in field. Different hands for different jobs.", "source": "GLM 5.1"}, {"q": "A student says \"silver is magnetic because it's a metal.\" Is this correct? Explain why metallic does not mean magnetic, and list all the metals from the lesson that are NOT magnetic. (2 steps)", "a": "- Step 1: No \u2014 silver is not magnetic. Being a metal (a good conductor of electricity) has nothing to do with being magnetic (responding to a magnetic field). These are two completely different properties.\n- Step 2: The non-magnetic metals mentioned in the lesson are: silver, copper, and aluminium. None of these are attracted to a magnet despite being metals. Only iron, steel, nickel, and cobalt are magnetic.\n+ A coin might look \"silvery\" but if it's magnetic, it contains nickel \u2014 the US 5-cent \"nickel\" coin is an example.\n+ This is a common exam trap: students assume all metals are magnetic because they're metals.\n\nTakeaway: Metallic \u2260 magnetic. Only four materials are magnetic; many common metals (Cu, Ag, Al) are not.", "source": "GLM 5.1"}, {"q": "A student draws magnetic field lines that cross each other at one point. Why is this physically impossible? What would it mean if two field lines could cross? (2 steps)", "a": "- Step 1: Field lines never cross. If two field lines crossed at a point, it would mean that at that single point, the magnetic field points in two different directions simultaneously \u2014 which is physically impossible.\n- Step 2: At any point in space, the magnetic field has exactly one direction and one strength. A field line represents that unique direction. Two crossing lines would imply two different answers to \"which way would a compass point here?\" \u2014 which cannot happen.\n+ This is the same logic as for electric field lines and gravitational field lines \u2014 none of them can cross.\n+ The closest you get is a neutral point (like between two like poles), where the field is zero \u2014 but that's not a crossing, it's a cancellation.\n\nTakeaway: No crossing = no point has two field directions; the field is single-valued everywhere.", "source": "GLM 5.1"}, {"q": "A student says \"like charges attract.\" Is this correct? What is the actual rule, and give an example of each case (attraction and repulsion). (2 steps)", "a": "- Step 1: No \u2014 like charges **repel**. The rule is: opposite charges attract, like charges repel. This is one of the most fundamental rules in electrostatics.\n- Step 2: Examples: Two electrons (both negative = like charges) repel each other \u2014 they push away. An electron and a proton (negative and positive = opposite charges) attract each other \u2014 they pull together.\n+ During the warm-up, the question was \"what would two electrons do?\" \u2014 the answer is repel, not attract.\n+ The same rule applies to magnetic poles: opposite poles attract, like poles repel.\n\nTakeaway: Like repels, opposite attracts \u2014 for both charges and magnetic poles.", "source": "GLM 5.1"}, {"q": "A student looks at a bar magnet field diagram and says \"the field is strongest in the middle between the poles.\" Is this correct? How would you use the field lines to show the actual strength distribution? (2 steps)", "a": "- Step 1: No \u2014 the field is strongest at the **ends (poles)**, not the middle. The middle of the bar magnet has the weakest external field.\n- Step 2: On the field diagram, the lines are **closest together** at the poles (they bunch up there) and most spread apart at the middle. Since \"closer lines = stronger field,\" the bunching at the poles directly shows they are the strongest regions.\n+ This is the single most useful rule for reading field diagrams: just look at where lines are closest.\n+ Inside the magnet, the field is strong (S\u2192N), but externally, the ends dominate.\n\nTakeaway: Strongest at poles (lines bunched); weakest at the middle (lines spread) \u2014 read strength from line spacing.", "source": "GLM 5.1"}, {"q": "A student says \"a magnet always attracts any piece of metal towards it.\" Why is this statement wrong on two counts? (2 steps)", "a": "- Step 1: First count: a magnet only attracts **magnetic** metals (iron, steel, nickel, cobalt). It does not attract non-magnetic metals like copper, aluminium, or silver. So \"any piece of metal\" is wrong.\n- Step 2: Second count: even for magnetic materials, a magnet does not *always* attract. Like poles repel \u2014 if you bring a north pole near another north pole, they push apart. The safe, neutral word is \"interact\" \u2014 the magnet exerts a force, but it could be attraction or repulsion depending on the arrangement.\n+ Alex's coaching: when unsure whether it's push or pull, say the objects \"interact\" (there is a force) \u2014 this is always correct.\n+ The Magneto film clip illustrates this: a real magnet would attract metal straight in, not make it hover and steer in all directions.\n\nTakeaway: Magnets only attract magnetic metals, and even then, like poles repel \u2014 \"interact\" is the safe word.", "source": "GLM 5.1"}, {"q": "In the Magneto film clip from the lesson, Magneto appears to stop and steer missiles mid-air using his powers. What aspect of this could be physically plausible, and what is the definite giveaway that it's not realistic? (2 steps)", "a": "- Step 1: **Could be true**: a strong magnetic field could exert a force on magnetic materials. Missiles contain iron/steel, so a sufficiently powerful magnet could indeed attract (interact with) them. The basic premise \u2014 magnetic field acts on magnetic metal \u2014 is physically sound.\n- Step 2: **Definitely false**: a real magnet would simply *attract* the metal (pull it straight in). In the film, Magneto makes the missiles hover, stop, and steer in multiple directions \u2014 a simple magnet cannot push, steer, or levitate in that way. A magnet attracts; it doesn't provide controllable directional forces like that.\n+ The takeaway: describe the interaction neutrally as \"interact\" (there is some force) rather than assuming \"attract\" or \"repel\" \u2014 especially in complex scenarios.\n+ This is an exam technique: when uncertain about push vs pull, say \"interact\" \u2014 it's always safe.\n\nTakeaway: A magnet attracting metal = plausible; a magnet providing omnidirectional steering = impossible. \"Interact\" is the safe descriptor.", "source": "GLM 5.1"}, {"q": "When describing any magnetic field in an exam answer, what three properties should you always address? Give a brief description of each for a single bar magnet. (3 steps)", "a": "- Step 1: **Strength** \u2014 where is the field strongest and weakest? For a bar magnet: strongest at the two poles (ends), weakest at the middle.\n- Step 2: **Direction** \u2014 which way do the field lines point? For a bar magnet: from N to S on the outside (the way a free north pole would move).\n- Step 3: **Shape** \u2014 what is the overall pattern of the field lines? For a bar magnet: lines radiate out of the N end, loop round the outside in curved paths, and return into the S end (Alex described them as \"circular-ish\").\n+ Structuring your answer around these three guarantees you cover what examiners look for.\n+ This works for any field \u2014 gravitational, electric, or magnetic \u2014 always describe strength, direction, shape.\n\nTakeaway: Every field description = strength + direction + shape. For a bar magnet: strongest at ends, N\u2192S, looping curves.", "source": "GLM 5.1"}, {"q": "You are told a rod becomes positively charged after being rubbed with a cloth. How many electrons were transferred, and in which direction \u2014 from rod to cloth, or cloth to rod? (2 steps)", "a": "- Step 1: The rod is positively charged, meaning it has fewer electrons than protons. Therefore, it *lost* electrons. The electrons moved from the rod to the cloth.\n- Step 2: The cloth, having gained those electrons, is now negatively charged. The total charge is still conserved \u2014 the positive charge on the rod equals the negative charge on the cloth (equal and opposite).\n+ In an exam, the question will either tell you which material loses electrons, or tell you the final sign (positive/negative) so you can deduce the direction.\n+ \"Positive = lost electrons\" and \"negative = gained electrons\" \u2014 always.\n\nTakeaway: Positive charge = electron deficit = electrons left that object; negative = electron surplus = electrons arrived.", "source": "GLM 5.1"}, {"q": "Conventional current is defined as flowing in the direction positive charge would move. In a metal wire, what actually moves, and in which direction relative to conventional current? (2 steps)", "a": "- Step 1: In a metal wire, **electrons** (negative charges) are what actually move. They drift slowly through the metal lattice from the negative terminal towards the positive terminal.\n- Step 2: Conventional current is defined as flowing from positive to negative \u2014 which is the *opposite* direction to the actual electron flow. This is a historical sign convention (established before electrons were discovered) that physicists keep for consistency, even though it's \"backwards\" from reality.\n+ This is one of Alex's sign-convention traps \u2014 like the Earth's magnetic south pole being near geographic north.\n+ For the right-hand grip rule, always use conventional current direction (positive to negative), NOT electron flow direction.\n\nTakeaway: Conventional current = opposite to electron flow; always use conventional current direction for hand rules.", "source": "GLM 5.1"}, {"q": "You place a plotting compass near the S pole of a bar magnet. Which way does the compass needle's red (N) end point, and why? (2 steps)", "a": "- Step 1: The red (N) end of the compass needle points **towards** the S pole of the bar magnet. This is because opposite poles attract: the compass's N end is attracted to the magnet's S pole.\n- Step 2: Equivalently, the compass aligns along the field line, which points from N to S outside the magnet. Near the S pole, the field line is heading *into* the S pole, so the compass N end points inward towards S.\n+ Common trap: students guess the compass points \"north\" or towards the N pole \u2014 it actually points towards the S pole (the nearest one).\n+ On Earth, the compass N end points to the magnetic south pole near geographic north \u2014 same principle.\n\nTakeaway: Compass N end \u2192 attracted to magnetic S pole \u2192 points towards S; this is consistent with field lines running N\u2192S.", "source": "GLM 5.1"}, {"q": "Two students argue about what happens inside a solenoid. One says \"the field inside is zero.\" The other says \"the field inside is strong and uniform.\" Who is correct, and how does this compare to the inside of a permanent bar magnet? (3 steps)", "a": "- Step 1: The second student is correct. Inside a solenoid, the field is **strong and approximately uniform** \u2014 the field lines are straight, parallel, and closely spaced, running from the S end to the N end inside the coil.\n- Step 2: This internal field runs S\u2192N (completing the loop that runs N\u2192S on the outside). The field lines form complete closed loops: out of N, around outside, into S, through interior S\u2192N, back to N.\n- Step 3: A permanent bar magnet has the *same* internal field \u2014 we just can't see inside a solid magnet. The solenoid's advantage is that its hollow core lets us access and use this strong internal field (e.g., by placing a specimen inside).\n+ The solenoid's external field is identical to a bar magnet \u2014 you can't tell them apart from outside.\n+ Inside, the solenoid field is much more useful because you can put things in the hollow centre.\n\nTakeaway: Inside a solenoid = strong, uniform, S\u2192N field \u2014 same as inside any magnet, but accessible because it's hollow.", "source": "GLM 5.1"}, {"q": "A simple exercise: A straight wire carries a current of 2 A. A second identical wire is placed next to it carrying 6 A in the same direction. Which wire produces the stronger magnetic field, and roughly how many times stronger? (2 steps)", "a": "- Step 1: The magnetic field around a straight current-carrying wire is proportional to the current. Wire 2 carries 6 A while Wire 1 carries 2 A.\n- Step 2: Wire 2 produces a field that is $$\\frac{6}{2} = 3$$ times stronger than Wire 1. The field shape (concentric circles) is the same for both \u2014 only the strength (and the spacing of field lines) differs.\n+ This illustrates the \"Current\" part of the three-C strengtheners: more current = stronger field.\n+ The direction of the field would be the same (same current direction, same right-hand grip result).\n\nTakeaway: Field strength \u221d current; 3\u00d7 the current \u2192 3\u00d7 the field strength (same geometry).", "source": "GLM 5.1"}, {"q": "A simple exercise: You have a solenoid with 100 turns of wire. You rewire it with 300 turns in the same length. How does the magnetic field strength change, assuming the same current? (2 steps)", "a": "- Step 1: The magnetic field inside a solenoid is proportional to the number of turns per unit length. You've tripled the number of turns (100 \u2192 300) in the same length, so the turns per unit length has tripled.\n- Step 2: The field strength is roughly **3 times stronger**. This illustrates the \"Coils\" part of the three-C strengtheners: more turns = more wire carrying current in the same space = fields add up = stronger overall field.\n+ The field shape is unchanged (still looks like a bar magnet externally), but the lines are more closely spaced (stronger).\n+ If you also tripled the current, you'd get 9\u00d7 the field (3\u00d7 from coils \u00d7 3\u00d7 from current).\n\nTakeaway: More coils = stronger field; tripling turns triples the field (same current, same length).", "source": "GLM 5.1"}, {"q": "A simple exercise: You have a solenoid with no core (just air inside). You insert a soft-iron core. Does the field get stronger, weaker, or stay the same? Why? (2 steps)", "a": "- Step 1: The field gets **significantly stronger**. The soft-iron core is a magnetic material that channels and concentrates the field lines through it, greatly boosting the field.\n- Step 2: Iron has a much higher magnetic permeability than air. The field lines \"prefer\" to pass through iron rather than air, so they concentrate inside the core, making the flux density $$B$$ much larger in that region. This is the \"Core\" part of the three-C strengtheners.\n+ The core must be soft iron (not steel) so that the electromagnet can be switched off \u2014 the iron loses its magnetism when the current stops.\n+ Without the core, the solenoid still works but is much weaker \u2014 the core provides a dramatic boost.\n\nTakeaway: Iron core = channels field lines = much stronger electromagnet; soft iron allows switching off.", "source": "GLM 5.1"}, {"q": "A student says \"the Earth's geographic North Pole is a magnetic north pole \u2014 that's why compasses point there.\" Identify and correct the error. (2 steps)", "a": "- Step 1: The error: the geographic North Pole is near a **magnetic south pole**, not a magnetic north pole. The Earth's internal \"bar magnet\" is oriented upside down relative to the geographic poles.\n- Step 2: A compass needle's N (red) end is attracted to a magnetic south pole. Since a magnetic south pole sits near the geographic North Pole, the compass N end points towards geographic north \u2014 but magnetically, it's pointing at a south pole. The student has the attraction logic right but the pole identity wrong.\n+ This parallels the conventional-current trap: what \"seems\" right from everyday language (north = north) is actually backwards in the physics convention.\n+ If the Earth's magnetic south were truly at the geographic south, compasses would point south \u2014 but they don't.\n\nTakeaway: Geographic North \u2248 magnetic south; compass N seeks magnetic S, which happens to be \"up north.\"", "source": "GLM 5.1"}, {"q": "Why can't you use iron filings alone to determine which end of a bar magnet is north? What must you add to the experiment, and what would it show? (2 steps)", "a": "- Step 1: Iron filings align along the field lines and show the **shape** of the field, but they have no directional indicator \u2014 there is no \"arrow\" on a filing to show which way the field points. You see the curves but cannot tell which end is N or S.\n- Step 2: You must add a **plotting compass**. Place it near the magnet: the red (N) end of the compass needle points along the field line *towards* the S pole of the magnet. This tells you the direction (N\u2192S) and therefore identifies which end is N and which is S.\n+ This is a classic exam question: \"What can iron filings not show about a magnetic field?\" \u2192 Direction / which pole is which.\n+ Iron filings + compass together give the complete picture: shape from filings, direction from compass.\n\nTakeaway: Iron filings = shape only; compass = direction; combine both for a full field map.", "source": "GLM 5.1"}, {"q": "A charged car is stationary on rubber tyres. A second car with metal wheels sits on the same road. Which car would retain static charge longer, and why? (2 steps)", "a": "- Step 1: The car on **rubber tyres** would retain static charge longer. Rubber is an insulator \u2014 it does not allow charge to flow through it, so excess charge is trapped on the car body.\n- Step 2: The car with metal wheels would lose its charge almost immediately. Metal is a conductor, so the metal wheels provide a path for excess charge to flow to earth (the road surface). The charge would dissipate as fast as it builds up, so no static charge accumulates.\n+ This is the same principle as the metal strap under the car in Q5 \u2014 the strap acts as a conductor to earth the car.\n+ Insulators trap charge; conductors drain it \u2014 this is the fundamental distinction.\n\nTakeaway: Rubber (insulator) = trapped charge; metal (conductor) = charge flows to earth.", "source": "GLM 5.1"}, {"q": "A student uses the LEFT hand for the grip rule around a current-carrying wire and gets a clockwise field (viewed from above, current going up). What would the correct (right hand) result be, and why does the handedness matter? (2 steps)", "a": "- Step 1: Using the correct **right** hand: thumb up (current upward), fingers curl **anticlockwise** when viewed from above. The left hand gives the opposite (clockwise) \u2014 which is wrong.\n- Step 2: Handedness matters because the underlying physics (the Biot-Savart law, at university level) produces a specific cross-product direction. The right-hand rule captures this correctly; the left hand gives the reverse. Using the wrong hand gives a field direction that is 180\u00b0 wrong \u2014 the field would appear to circle the wrong way.\n+ This is why Alex emphasised \"it must be the right hand\" \u2014 the reason links to Fleming's rules coming next lesson.\n+ The left hand is reserved for Fleming's left-hand rule (force on a wire in a field) \u2014 a completely different rule.\n\nTakeaway: Right hand for field direction; wrong hand = wrong direction. Left hand is for force, not field.", "source": "GLM 5.1"}, {"q": "Synthesis question: A solenoid with a soft-iron core carries a current. You double the current and double the number of coils. You then reverse the direction of the current. Describe what happens to (a) the field strength, (b) the polarity of the solenoid, and (c) the ability to switch off the magnetism. (3 steps)", "a": "- Step 1: **(a) Field strength**: Doubling the current doubles the field contribution from current. Doubling the coils doubles the field contribution from turns. Combined, the field is roughly **4 times stronger** (2\u00d7 from current \u00d7 2\u00d7 from coils). The iron core continues to concentrate the field as before.\n- Step 2: **(b) Polarity**: Reversing the current reverses the direction of current flow around the coils. Applying the right-hand grip rule with reversed current, your thumb now points the opposite way \u2014 so the N and S ends **swap**. What was N becomes S, and vice versa.\n- Step 3: **(c) Switching off**: The soft-iron core is magnetically soft, so when the current is turned off, the core loses its magnetism quickly. The ability to switch off is unchanged \u2014 the core material (soft iron) determines this, not the current or coil count. If you had used a steel core (magnetically hard), the magnetism would persist after switching off.\n+ This question combines all three strengtheners (Current, Coils, Core) with the right-hand grip rule and hard/soft material knowledge.\n+ A steel core would ruin the \"switch off\" functionality \u2014 this is why electromagnets use soft iron.\n\nTakeaway: More current + more coils = stronger field; reverse current = swap poles; soft iron core = still switchable.", "source": "GLM 5.1"}, {"q": "Synthesis question: You are given a magnet of unknown polarity, a plotting compass, and some iron filings. Describe a complete procedure to fully map the magnet's field, identifying both the shape and the direction, and stating which pole is N. (3 steps)", "a": "- Step 1: **Shape**: Place the magnet under a sheet of paper. Sprinkle iron filings on top and gently tap. The filings align along the field lines, revealing the overall shape \u2014 where lines are close (strong field) and where they spread (weak field). Photograph or sketch the pattern.\n- Step 2: **Direction**: Place the plotting compass near one end of the magnet. The red (N) end of the compass needle points along the field line towards the magnet's S pole. Trace the field line by marking dots where the N end points, moving the compass tail to each successive dot, joining them into a continuous line from one pole to the other.\n- Step 3: **Identify N**: The end of the magnet that the compass N end points *away from* is the N pole (field lines leave N). The end the compass N end points *towards* is the S pole (field lines enter S). Alternatively, use the right-hand grip rule if the magnet were a solenoid \u2014 but for a permanent magnet, the compass method is definitive.\n+ Iron filings alone cannot identify N vs S \u2014 the compass is essential for direction.\n+ Together, filings + compass give the complete field map: shape, strength (from spacing), and direction.\n\nTakeaway: Full field map = filings (shape) + compass (direction) \u2192 identify N and S poles.", "source": "GLM 5.1"}, {"q": "Synthesis question: A student sets up two bar magnets with N facing N and places a plotting compass exactly at the midpoint between them. What does the compass do, and why? Relate this to the concept of a neutral point. (3 steps)", "a": "- Step 1: Each N pole produces a field pointing *away* from it. At the midpoint, the left N pole pushes a north test pole to the right, and the right N pole pushes a north test pole to the left. The two fields are equal in magnitude but opposite in direction.\n- Step 2: The fields cancel at the midpoint \u2014 this is the **neutral point** (drawn as a cross $$\\times$$). The net magnetic field is zero there.\n- Step 3: At a neutral point, the plotting compass has no field to align with, so the needle can point in any direction (or spin freely, depending on friction). There is no preferred orientation because $$B = 0$$ at that point.\n+ If you move the compass slightly off-centre towards one magnet, that magnet's field dominates and the needle swings to align with it.\n+ This is the \"like poles facing\" scenario \u2014 opposite poles facing would give a uniform field instead, with no neutral point.\n\nTakeaway: N facing N \u2192 neutral point at midpoint \u2192 compass has no field to follow \u2192 needle is unoriented.", "source": "GLM 5.1"}, {"q": "A student says \"if I put a compass at the neutral point between two N poles, it will point north.\" Why is this reasoning flawed? (2 steps)", "a": "- Step 1: At the neutral point, the magnetic fields from the two N poles cancel exactly, so the net field from the magnets is zero. The compass has no local field to align with.\n- Step 2: The compass *might* align with the Earth's very weak background field ($$\\sim 50\\,\\mu\\text{T}$$) if the magnets' fields cancel perfectly, but it would NOT point towards either magnet's N pole \u2014 there is no net field direction at the neutral point. The student's reasoning incorrectly assumes there's still a field direction at the neutral point.\n+ A neutral point is defined by zero net field \u2014 the compass cannot \"point\" in any magnetically meaningful direction from the magnets.\n+ In practice, the compass needle might settle in a random direction or respond to the Earth's field, but not to the magnets.\n\nTakeaway: Neutral point = zero net field = compass has nothing to align with from the magnets.", "source": "GLM 5.1"}, {"q": "Edge case: You have a solenoid with 1 turn of wire carrying 10 A, and another solenoid with 10 turns carrying 1 A (same length). Which produces a stronger field, or are they equal? (2 steps)", "a": "- Step 1: The field inside a solenoid is proportional to the product of turns per unit length ($$n$$) and current ($$I$$). Solenoid 1: $$n \\times I = 1 \\times 10 = 10$$ (in arbitrary units). Solenoid 2: $$n \\times I = 10 \\times 1 = 10$$.\n- Step 2: They produce **equal** field strength. The product $$nI$$ (ampere-turns) is the same for both. More turns compensates for less current, and vice versa. This is why the three strengtheners (Current, Coils, Core) are multiplicative \u2014 increasing either current or coils independently strengthens the field.\n+ This is why you can design electromagnets with different trade-offs: high current with few turns, or low current with many turns.\n+ Adding an iron core would boost both equally, since the core multiplies the field regardless.\n\nTakeaway: $$B \\propto nI$$ (ampere-turns); 10 turns \u00d7 1 A = 1 turn \u00d7 10 A \u2014 same field.", "source": "GLM 5.1"}, {"q": "A simple exercise: A wire carries 3 A and sits in a magnetic field of strength 2 T. The wire is 0.1 m long and perpendicular to the field. Calculate the force on the wire using $$F = BIL$$. (2 steps)", "a": "- Step 1: Since the wire is perpendicular to the field, $$\\theta = 90\u00b0$$ and $$\\sin\\theta = 1$$, so we use $$F = BIL$$ directly. Substitute: $$F = 2 \\times 3 \\times 0.1$$.\n- Step 2: $$F = 0.6\\,\\text{N}$$. The force is 0.6 newtons, directed perpendicular to both the field and the current (use Fleming's left-hand rule for the direction \u2014 covered next lesson).\n+ This is a preview exercise \u2014 the full treatment of the motor effect comes in the next lesson.\n+ If the wire were parallel to the field, $$F = 0$$ (no force when current and field are aligned).\n\nTakeaway: $$F = BIL$$ when perpendicular; plug in the numbers: $$2 \\times 3 \\times 0.1 = 0.6\\,\\text{N}$$.", "source": "GLM 5.1"}, {"q": "A simple exercise: An electron moves at $$4 \\times 10^6$$ m/s perpendicular to a magnetic field of $$0.5$$ T. The electron charge is $$1.6 \\times 10^{-19}$$ C. Using $$F = Bqv$$, roughly what order of magnitude is the force? (2 steps)", "a": "- Step 1: Since the velocity is perpendicular to the field, $$\\sin\\theta = 1$$, so $$F = Bqv$$. Substitute: $$F = 0.5 \\times 1.6 \\times 10^{-19} \\times 4 \\times 10^{6}$$.\n- Step 2: $$F = 0.5 \\times 1.6 \\times 4 \\times 10^{-19+6} = 0.5 \\times 6.4 \\times 10^{-13} = 3.2 \\times 10^{-13}\\,\\text{N}$$. This is an extremely small force (order $$10^{-13}$$ N), but it acts on a single electron with tiny mass ($$\\sim 10^{-30}$$ kg), so the resulting acceleration is enormous.\n+ This illustrates why charged particles curve dramatically in magnetic fields \u2014 even tiny forces produce huge accelerations for tiny masses.\n+ This is a preview of the A-level equation for force on a moving charge.\n\nTakeaway: $$F = Bqv$$ gives forces of order $$10^{-13}$$ N on single electrons \u2014 small in absolute terms, but enormous relative to the electron's mass.", "source": "GLM 5.1"}, {"q": "A student reasons: \"The Earth's field is about 50 \u03bcT. A fridge magnet is about 0.01 T. So a fridge magnet is about 200 times stronger than Earth's field.\" Is this reasoning correct? (2 steps)", "a": "- Step 1: Convert both to the same units. Earth's field: $$50\\,\\mu\\text{T} = 50 \\times 10^{-6}\\,\\text{T} = 5 \\times 10^{-5}\\,\\text{T}$$. Fridge magnet: $$0.01\\,\\text{T} = 1 \\times 10^{-2}\\,\\text{T}$$.\n- Step 2: Ratio: $$\\frac{1 \\times 10^{-2}}{5 \\times 10^{-5}} = \\frac{10^{-2}}{5 \\times 10^{-5}} = \\frac{1}{5} \\times 10^{3} = 200$$. Yes, the student is correct \u2014 the fridge magnet is about 200 times stronger than Earth's field.\n+ This gives you a sense of scale: even a weak everyday magnet vastly overpowers Earth's field, which is why compasses are deflected near magnets.\n+ A strong lab electromagnet can reach 1\u201310 T \u2014 tens of thousands of times Earth's field.\n\nTakeaway: Everyday magnets are hundreds of times stronger than Earth's field; tesla-scale fields are extremely powerful.", "source": "GLM 5.1"}, {"q": "Why does a compass needle point north on Earth but get deflected when brought near a bar magnet? Explain using the concept of field strength and superposition. (2 steps)", "a": "- Step 1: A compass needle aligns with the **net** magnetic field at its location. Far from any magnet, the only significant field is Earth's ($$\\sim 50\\,\\mu\\text{T}$$), so the needle aligns with it and points north.\n- Step 2: Near a bar magnet, the magnet's field (perhaps $$\\sim 10^{-2}$$ T, or ~200\u00d7 stronger) overwhelms Earth's weak field. The net field is dominated by the bar magnet, so the needle swings to align with the magnet's field instead. Earth's field is still there, but it's negligible in comparison \u2014 like trying to hear a whisper next to a loudspeaker.\n+ This is why you must keep magnets away from compasses for accurate navigation.\n+ At intermediate distances (where the magnet's field is comparable to Earth's), the needle points somewhere between the two \u2014 the net field is the vector sum of both.\n\nTakeaway: Compass aligns with the net field; a nearby magnet's field dominates Earth's weak field, deflecting the needle.", "source": "GLM 5.1"}, {"q": "An atom has protons, neutrons, and electrons. If an object is electrically neutral, what is the relationship between its protons and electrons, and why does this make the overall charge zero? (2 steps)", "a": "- Step 1: A neutral object has exactly the same number of protons as electrons. Each proton carries charge $$+1$$ and each electron carries charge $$-1$$, so they cancel pairwise: $$+1 + (-1) = 0$$ per pair.\n- Step 2: The total charge is the sum over all particles. With equal numbers, every proton's $$+1$$ is matched by an electron's $$-1$$, so the net charge sums to zero. Any imbalance (more protons than electrons, or vice versa) leaves a net nonzero charge.\n\nThe key insight: neutrality is a *balance*, not an absence of charge carriers \u2014 the charges are still there, they just cancel.", "source": "GLM 5.1"}, {"q": "When two objects become charged by contact or friction, only one type of particle actually moves between them. Which particle type moves, and why can the other type never be transferred between everyday objects? (2 steps)", "a": "- Step 1: Only **electrons** move between everyday objects. Electrons orbit outside the nucleus and are loosely bound enough that friction or contact can dislodge them and transfer them to another material.\n- Step 2: Protons are locked inside the nucleus, held by the strong nuclear force. You cannot \"transfer positive charge\" by moving protons \u2014 the phrase \"transfer positive charge\" is a misnomer. What actually happens is electrons leave, leaving behind an excess of protons (which makes the object positive), or electrons arrive, creating an excess of electrons (making it negative).\n\nTakeaway: you never move positive charge \u2014 you only ever move electrons. A positive object is one that has *lost* electrons, not one that has *gained* protons.", "source": "GLM 5.1"}, {"q": "Two electrons are placed near each other. Do they attract or repel, and what general rule does this illustrate? (2 steps)", "a": "- Step 1: Two electrons repel \u2014 they push away from each other. Both carry charge $$-1$$, so they are \"like charges.\"\n- Step 2: This illustrates the general rule: **like charges repel, opposite charges attract**. Two protons (both $$+1$$) also repel. An electron and a proton ($$-1$$ and $$+1$$) attract. The same rule applies to magnetic poles: like poles repel, opposite poles attract \u2014 but the mechanism is different (magnetism is not electrostatics).\n\nCommon misconception: students sometimes say \"like charges attract\" \u2014 this is wrong. Like charges *repel*.", "source": "GLM 5.1"}, {"q": "Two insulators are rubbed together (e.g., a cloth and a rod). Electrons transfer from the cloth to the rod. What are the final charge signs of each object, and how do you reason this from the electron transfer direction? (3 steps)", "a": "- Step 1: Identify what \"losing electrons\" means. Electrons carry $$-1$$ charge each. If the cloth *loses* electrons, it has fewer $$-1$$ charges than before, so its net charge shifts positive. The cloth becomes **positive**.\n- Step 2: Identify what \"gaining electrons\" means. The rod *receives* those electrons, so it has more $$-1$$ charges than before, shifting its net charge negative. The rod becomes **negative**.\n- Step 3: The two objects always end up with opposite charges, because the same electrons that leave one arrive at the other. Total charge is conserved: the cloth's $$+$$ exactly balances the rod's $$-$$, matching the number of transferred electrons.\n\n+ If electrons had transferred the other way (rod \u2192 cloth), the rod would be positive and the cloth negative. The direction depends on the materials \u2014 in an exam, the question will tell you which way, or give you the final sign so you can deduce it.", "source": "GLM 5.1"}, {"q": "After friction charges an object, why does the charge *stay* on it if the object is an insulator, but would *drain away* if it were a conductor? What is the physical difference between these two material types that explains this? (2 steps)", "a": "- Step 1: In a **conductor** (most metals), electrons are free to move throughout the material. If excess charge builds up, those free electrons can flow away through the material to any connected path \u2014 the charge redistributes and drains.\n- Step 2: In an **insulator** (rubber, plastic, dry air, wood), electrons are bound to their atoms and cannot flow. Excess charge that lands on (or leaves) an insulator is *trapped* \u2014 there is no conducting path for it to move along, so the charge stays where it was deposited.\n\n+ This is why a car on rubber tyres stays charged: the tyres are insulators, blocking any path to the ground. If the tyres were metal (conductors), the charge would flow away to earth almost instantly.", "source": "GLM 5.1"}, {"q": "What is \"earthing\" and how does it neutralise a charged object? Walk through the mechanism step by step. (3 steps)", "a": "- Step 1: Earthing means connecting a charged object to the **ground** (the Earth) using a **conductor** (a metal wire, strap, or chain). The Earth is so enormous that it can absorb or supply virtually unlimited charge without its own charge changing noticeably.\n- Step 2: Once a conducting path exists between the object and the ground, the excess electrons (if the object is negative) flow *through the conductor* down to the Earth. If the object is positive (deficient in electrons), electrons flow *up from the Earth* through the conductor to restore the balance.\n- Step 3: The result: the object returns to neutral (equal protons and electrons again). The key requirement is that the connection must be a **conductor** \u2014 an insulating connection would block the flow and fail to earth the object.\n\n+ Example: the metal strap under a charged car drags on the road, providing a conducting path. Excess charge on the car flows through the strap to the ground, continuously earthing the car so charge never builds up.", "source": "GLM 5.1"}, {"q": "A car driving on the road becomes positively charged. Did it gain or lose electrons? Why do the electrons transfer to the *air* rather than to the *road*? (3 steps)", "a": "- Step 1: A positive charge means fewer electrons than protons \u2014 the car **lost electrons**. It did *not* gain positive particles.\n- Step 2: As the car moves, air rubs against its surface (friction). This friction transfers electrons from the car's surface to the air molecules. The car loses electrons \u2192 positive; the air gains them \u2192 negative locally.\n- Step 3: Why not to the road? The car sits on **rubber tyres**, which are excellent **insulators**. Electrons cannot flow through rubber to reach the road. The air, however, contacts the car's metal body directly (the body is a conductor), so friction with the air is where the electron transfer happens.\n\n+ If the tyres were conductors, electrons could flow to the road and the car would earth itself continuously \u2014 no static buildup.", "source": "GLM 5.1"}, {"q": "After the positively charged car stops driving, the charge remains on it. Why can't the charge leak away through the tyres, and what single word describes the property of rubber that explains this? (2 steps)", "a": "- Step 1: Rubber is an **insulator** \u2014 it does not allow charge to flow through it. The excess positive charge (i.e., the deficit of electrons) on the car's metal body has no conducting path through the rubber tyres to reach the Earth.\n- Step 2: Because the charge is *trapped* by the insulating tyres, it stays on the car indefinitely (until something provides a conducting path, like a person touching it or a metal strap). The key word: **insulator** \u2014 charge cannot flow through an insulator, so it remains where it is.", "source": "GLM 5.1"}, {"q": "A metal strap is attached under the car and drags on the ground while the car moves. How does this prevent charge from building up, and what two properties of the strap make this work? (3 steps)", "a": "- Step 1: The strap is made of **metal**, which is a **conductor** \u2014 electrons can flow freely through it. This is the first key property.\n- Step 2: The strap physically touches the ground, creating a **continuous conducting path** from the car's metal body \u2192 through the metal strap \u2192 to the Earth. This is the second key property: it *connects* the car to earth.\n- Step 3: Any electrons that friction tries to remove from the car can now flow back up from the Earth through the strap (or any excess electrons can flow down). The car is **continuously earthed**, so charge cannot accumulate \u2014 it is constantly neutralised.\n\n+ Without the strap, the insulating rubber tyres block this path and charge builds up. With the strap, the conductor bypasses the insulator and keeps the car neutral.", "source": "GLM 5.1"}, {"q": "There are exactly four everyday materials that are magnetic (attracted to a magnet). Name all four, and explain why steel counts even though it is not a pure element. (2 steps)", "a": "- Step 1: The four magnetic materials are: **Iron, Steel, Nickel, Cobalt**. These are the *only* everyday materials a magnet can attract \u2014 everything else (wood, plastic, cotton, silver, copper, aluminium) is non-magnetic.\n- Step 2: Steel is an alloy of iron with a small amount of carbon. It is the **iron content** that makes steel magnetic \u2014 the iron atoms in the steel are what respond to the magnet's field. So \"anything metallic that is attracted to a magnet contains at least one of those four.\"\n\n+ Common trap: a US 5-cent coin is literally called a \"nickel\" because it is made of nickel \u2014 it is magnetic. Silver coins are *not* magnetic. Students often guess \"silver\" for magnetic coins \u2014 this is wrong.", "source": "GLM 5.1"}, {"q": "A student picks up a copper coin and a nickel coin near a magnet. One is attracted, the other is not. Which coin is attracted, and what general principle does this demonstrate about \"metallic\" vs \"magnetic\"? (2 steps)", "a": "- Step 1: The **nickel** coin is attracted \u2014 nickel is one of the four magnetic materials. The copper coin is *not* attracted \u2014 copper is metallic but non-magnetic.\n- Step 2: This demonstrates that **\"metallic\" does not mean \"magnetic.\"** Only the four specific materials (iron, steel, nickel, cobalt) are magnetic. Most metals (copper, aluminium, silver, gold, tin, lead) are non-magnetic and feel no force from a magnet. Being a good conductor of electricity does not make a material magnetic \u2014 these are independent properties.", "source": "GLM 5.1"}, {"q": "What is the difference between a permanent magnet and a temporary magnet, and what does \"magnetically hard\" vs \"magnetically soft\" mean in this context? (3 steps)", "a": "- Step 1: A **permanent magnet** keeps its magnetism indefinitely. It is made from a **magnetically hard** material \u2014 \"hard\" means the material *holds on* to its magnetism once it has been magnetised. Example: **steel**.\n- Step 2: A **temporary magnet** loses its magnetism quickly once the magnetising influence is removed. It is made from a **magnetically soft** material \u2014 \"soft\" means the material *gains and loses magnetism easily*. Example: **iron** (also nickel, cobalt in soft form).\n- Step 3: The one-line summary: **\"hard = holds on to magnetism (good for permanent magnets); soft = gains and loses it easily (good for electromagnets, where you want to switch it off).\"** The names \"hard\" and \"soft\" refer to magnetic persistence, not physical hardness.\n\n+ Edge case: an electromagnet uses a soft-iron core precisely *because* you want the magnetism to disappear when you switch off the current. If you used a steel (hard) core, it would stay magnetised even after switching off \u2014 defeating the purpose of an electromagnet.", "source": "GLM 5.1"}, {"q": "What is \"induced magnetism\"? Describe what happens when a piece of soft iron is placed near a permanent magnet, and what happens when the iron is removed from the field. (3 steps)", "a": "- Step 1: **Induced magnetism** occurs when a piece of magnetic material is placed inside another magnet's field and *becomes a magnet itself* \u2014 without being touched or rubbed. The external field forces the magnetic domains inside the material to align, turning it into a magnet.\n- Step 2: A classic example: a paperclip placed near a bar magnet becomes magnetised by induction and clings to the magnet. It can even then pick up a second paperclip (which is also induced to become a magnet).\n- Step 3: When the soft iron (or paperclip) is *removed* from the external field, a magnetically **soft** material loses its induced magnetism quickly \u2014 the domains randomise again. A **hard** material would retain it (becoming a permanent magnet). This is why soft materials are used for electromagnet cores.", "source": "GLM 5.1"}, {"q": "What is the textbook definition of a magnetic field? The definition mentions two types of objects that \"feel a force\" \u2014 what are they? (2 steps)", "a": "- Step 1: A magnetic field is: **\"a region in which a magnetic material, or a moving charged object, feels a force.\"** This is the exact wording from the specification and the definition Alex highlighted.\n- Step 2: The two categories are: (1) **magnetic materials** \u2014 iron, steel, nickel, cobalt experience a force when placed in the field; (2) **moving charged objects** \u2014 a charge that is *moving* (not stationary) through the field experiences a force. A stationary charge in a magnetic field feels *no* magnetic force \u2014 motion is required.\n\n+ This parallels the other two fields: a gravitational field is a region where a mass feels a force; an electric field is a region where a charge feels a force. The magnetic field is unique in requiring *motion* of the charge.", "source": "GLM 5.1"}, {"q": "Magnetic field lines (also called lines of force or magnetic flux lines) obey four rules. One rule is about direction, one about strength, one about uniformity, and one about geometry. State all four and explain the reasoning behind the rule that says \"field lines never cross.\" (3 steps)", "a": "- Step 1: The four rules are: (1) **Direction**: arrows always point from **N to S** outside the magnet \u2014 this is the direction a free north pole (or positive test object) would be pushed. (2) **Strength**: the **closer** the lines, the **stronger** the field. Lines bunch up at the poles, so a bar magnet is strongest at its ends. (3) **Uniform field**: equally-spaced, parallel lines = the field has the same strength and direction everywhere. (4) **Never cross**: field lines cannot intersect.\n- Step 2: Why can field lines never cross? At any point in space, the magnetic field has exactly **one direction** \u2014 the field vector points one way. If two lines crossed at a point, that would imply the field points in *two* different directions at the same location, which is physically impossible.\n- Step 3: This \"never cross\" rule applies to all vector field line representations (electric field lines also never cross). It is a direct consequence of the field being a well-defined vector at every point \u2014 no ambiguity in direction is allowed.", "source": "GLM 5.1"}, {"q": "If you look at the field-line diagram of a single bar magnet, what three properties should you always describe, and what are the answers for each one? (3 steps)", "a": "- Step 1: **Strength**: the field is strongest at the two **ends** (the poles). You see this because the field lines are closest together / most bunched up at the ends.\n- Step 2: **Direction**: the lines point from **N to S** on the outside of the magnet. This is the direction a free north pole would be pushed \u2014 away from N, toward S.\n- Step 3: **Shape**: the lines radiate out of the N end, loop round the outside in curved arcs, and return into the S end. Alex described the shape as \"circular-ish.\" The lines form closed loops \u2014 they continue inside the magnet from S back to N, completing the circuit.\n\n+ Exam technique: whenever a question shows you a field diagram, structure your answer around these three properties: strength, direction, shape. This ensures you hit all the mark points.", "source": "GLM 5.1"}, {"q": "You take a bar magnet and cut it exactly in half. Do you get an isolated north pole and an isolated south pole on the two halves? Explain what you actually get and the deeper reason why isolated poles cannot exist. (3 steps)", "a": "- Step 1: You do **not** get isolated poles. Each half becomes a **complete magnet** with its own N and S poles. The half that contained the original N end now has N at its tip and a new S at the cut face; the other half has S at its tip and a new N at the cut face.\n- Step 2: You can never separate N from S \u2014 cutting just creates smaller magnets, each with both poles. No matter how many times you cut, every piece has both a N and a S end. This is because magnetic poles always come in pairs (they are \"dipoles\").\n- Step 3: The deeper (university-level) reason: magnetism in materials comes from **aligned electron spins** / aligned **magnetic domains** inside the material. Each domain is itself a tiny dipole with both poles. You can't cut a domain to isolate one pole \u2014 so the macroscopic magnet always has both. Alex showed this explanation then crossed it out: it's real physics, but not examinable at GCSE/ESAT level. Understand it for intuition, don't write it in an exam answer.", "source": "GLM 5.1"}, {"q": "You want to trace a magnetic field line using a plotting compass. Describe the step-by-step procedure. What does the compass needle actually represent physically? (3 steps)", "a": "- Step 1: A plotting compass is a tiny pivoted **bar magnet**. Its red/pointy end is the compass's **N** pole. When placed in a field, this N end aligns along the field line, pointing in the field's direction (toward the magnet's S pole).\n- Step 2: Procedure: (1) Place the compass near the magnet; mark a dot where the N (red) pointer aims. (2) Move the compass so its tail sits on that dot; mark the new dot the pointer aims at. (3) Repeat, joining the dots, tracing all the way from the N pole round to the S pole.\n- Step 3: Each dot marks where the field line passes. The connected dots reconstruct one complete field line. By starting at different positions, you trace different lines and build up the full field pattern.", "source": "GLM 5.1"}, {"q": "A plotting compass and iron filings can both reveal a magnetic field pattern. What does each method show you, and what is the critical limitation of iron filings that means you still need a compass? (2 steps)", "a": "- Step 1: A **plotting compass** gives you both the **shape** of the field (where the lines go) and the **direction** (which way they point, N\u2192S). It is the more informative tool because it tells you everything.\n- Step 2: **Iron filings** show the **shape** only \u2014 where the field lines are and where the field is strong (filings bunch up where lines are close). But they **cannot show direction** \u2014 you cannot tell which end is N and which is S from filings alone. To get direction, you must still use a compass.\n\n+ Examiners love the question \"what can't iron filings tell you?\" \u2014 the answer is always: **the direction** / which pole is N vs S.", "source": "GLM 5.1"}, {"q": "You sprinkle iron filings on paper above a magnet and tap gently. The filings cluster densely near the poles and are sparse far away. What two pieces of information can you read from this pattern, and what can you NOT read? (2 steps)", "a": "- Step 1: You can read: (1) **Shape** \u2014 the filings line up to reveal the curved loop pattern of the field lines. (2) **Relative strength** \u2014 where filings are **bunched together** (near poles), the field is strong; where they are **sparse** (far from poles), the field is weak. Closer lines = stronger field.\n- Step 2: You **cannot** read **direction** \u2014 the filings align along the lines but don't indicate which way the arrows point (N\u2192S or S\u2192N). You'd need a compass to determine direction.", "source": "GLM 5.1"}, {"q": "A plotting compass is placed near the N pole of a bar magnet. Which end of the compass needle (red/N or white/S) points *toward* the magnet's N pole, and why might this seem counterintuitive? (3 steps)", "a": "- Step 1: The compass's **S** (white) end points toward the magnet's N pole. The compass's **N** (red) end points *away* from the magnet's N pole, toward the magnet's S pole.\n- Step 2: Why: the compass needle is itself a small bar magnet. Opposite poles attract. The magnet's N pole attracts the compass's S pole, and the magnet's S pole attracts the compass's N pole. So the red/N end of the compass always points toward the **magnetic S pole** of the external magnet (or toward the Earth's magnetic south, which is near geographic north).\n- Step 3: This seems counterintuitive because we say \"the compass points north\" \u2014 but the red end is actually pointing at a **magnetic south** pole. The compass's N end is *attracted* to S poles, not to N poles. This is a classic exam trap.", "source": "GLM 5.1"}, {"q": "You have two bar magnets and you arrange them in four possible ways across a gap. One arrangement produces a uniform field in the gap; the others do not. Which arrangement works, and what does the field look like in the gap? (2 steps)", "a": "- Step 1: The arrangement that produces a uniform field is **opposite poles facing each other**: N facing S (or equivalently S facing N from the other side). The poles attract, and the field lines run straight across the gap from one pole to the other.\n- Step 2: In the gap, the field lines are **straight, parallel, and equally spaced** \u2014 this is the definition of a uniform field (same strength and direction everywhere in the gap). The magnets must be **fixed** so they cannot move together (since opposite poles attract and would snap together if unrestrained).\n\n+ The other arrangements (N facing N, or S facing S) produce repulsion between like poles.
