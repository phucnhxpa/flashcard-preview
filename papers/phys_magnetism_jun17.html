rection ($$F$$). This rule answers: \"if a wire with current sits in a field, which way is it pushed?\"\n- Step 3: These are **completely different physical questions** — one asks about the field a current *creates*, the other asks about the force a current *experiences* in an existing field. Using the wrong hand gives the wrong answer to the wrong question. The right hand is for *creating* the field; the left hand is for *feeling* the force. This is trap #8 from the lesson: \"right hand for field, left hand for force.\"\n\nTakeaway: right-hand grip = field from current (creation); Fleming's left-hand = force on current in field (effect). Different hands, different questions — never swap them.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": true}, {"question": "You are asked to \"describe the magnetic field around a straight current-carrying wire.\" Using the three-property framework (strength, direction, shape), give the complete answer. (3 steps)", "answer": "- Step 1: **Shape**: the field lines form **concentric circles** centred on the wire. Each circle is a closed loop around the wire, with no beginning or end in the external space.\n- Step 2: **Direction**: the circles run in a specific direction determined by the right-hand grip rule — clockwise if current goes into the page, anticlockwise if current comes out. The direction is tangent to each circle at every point.\n- Step 3: **Strength**: the field is **strongest closest to the wire** (where the circles are most densely packed) and **weakens with distance** from the wire (circles become more spread apart). The strength decreases proportionally to $$\\frac{1}{r}$$ (distance from wire).\n\nTakeaway: shape = concentric circles; direction = right-hand grip rule; strength = strongest near wire, weakening with distance. Always answer with all three.", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": false}, {"question": "Simple exercise: A bar magnet has its N pole on the left and S pole on the right. A plotting compass is placed directly above the middle of the magnet (on the top side, equidistant from both poles). Which direction does the compass's N (red) end point — left, right, up, or down? Explain. (3 steps)", "answer": "- Step 1: The field lines above the middle of a bar magnet curve from N (left) to S (right), arching over the top. At the point directly above the centre, the field direction is approximately **rightward** (from N towards S, curving overhead).\n- Step 2: The compass's N (red) end aligns with the local field direction. Since the field at that location points rightward (towards S), the compass N end points **to the right** — towards the magnet's S pole.\n- Step 3: This reinforces the key rule: the compass N end points towards the magnet's **S pole** (following the N→S field direction), not towards the magnet's N pole. A common mistake is to assume the red end seeks \"north\" in all contexts — it seeks the field direction, which leads to S.\n\nTakeaway: above the magnet's middle, the field arcs from left (N) to right (S) — compass N end points right, towards S.", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": false}, {"question": "Simple exercise: Two bar magnets are arranged with N facing N (like poles facing across a small gap). A small magnetic material (e.g. an iron nail) is placed at the exact midpoint in the gap. Does the nail feel a net magnetic force, and if so, in which direction — or does something else happen? (3 steps)", "answer": "- Step 1: At the exact midpoint between two equal N poles, the **magnetic fields cancel** — this is a **neutral point** where the net field $$B = 0$$. Each N pole pushes a test N pole away from itself; at the midpoint, the push from the left N equals the push from the right N, and they are in opposite directions — net field is zero.\n- Step 2: An iron nail is a magnetic material that becomes magnetised by induction when placed in a field. But at the neutral point, there is **no external field to induce magnetism** in the nail. Without an external field, the nail doesn't become a magnet, and there is no force on it.\n- Step 3: So the nail feels **no net force** at the neutral point. It would not be attracted to either magnet. If you moved it slightly off-centre towards one of the N poles, it would enter a region of non-zero field, become induced, and be pulled towards that N pole — but at the exact midpoint, the field is zero and nothing happens.\n\nTakeaway: neutral point = zero field = no force on magnetic materials. The nail sits there unmagnetised and unmoved.", "source": "GLM 5.1 ③", "_id": "glm_3_45", "judge_pick": false}, {"question": "Simple exercise: A solenoid has 100 turns of wire and carries 2 A of current, producing a certain flux density $$B$$ inside. If you increase the current to 4 A but reduce the turns to 50 (keeping the solenoid the same length), does $$B$$ increase, decrease, or stay the same? (2 steps)", "answer": "- Step 1: The flux density inside a solenoid depends on both the current $$I$$ and the number of turns per unit length $$n = \\frac{N}{L}$$: $$B = \\mu_0 n I$$ (A-level formula). Here, doubling $$I$$ from 2 A to 4 A doubles one factor, but halving $$N$$ from 100 to 50 (same length) halves $$n$$, the other factor.\n- Step 2: The net effect: $$B_{\\text{new}} = \\mu_0 \\cdot \\frac{n}{2} \\cdot 2I = \\mu_0 n I = B_{\\text{original}}$$. Doubling current but halving turns-per-metre cancels out exactly — **$$B$$ stays the same**. The intuitive reading: more current pushes harder, but fewer turns means less wire concentrating the field — the two changes offset perfectly.\n\nTakeaway: $$B \\propto nI$$ (turns-per-metre × current). Doubling one and halving the other leaves $$B$$ unchanged.", "source": "GLM 5.1 ③", "_id": "glm_3_46", "judge_pick": false}, {"question": "Simple exercise: A wire 0.5 m long carries 3 A of current perpendicular to a magnetic field of flux density 0.2 T. Without doing the full arithmetic, estimate the order of magnitude of the force on the wire — is it millinewtons, newtons, or tens of newtons? (2 steps)", "answer": "- Step 1: Using $$F = BIL$$ (perpendicular, so $$\\sin\\theta = 1$$): $$F = 0.2 \\times 3 \\times 0.5$$. Mentally: $$0.2 \\times 3 = 0.6$$, then $$0.6 \\times 0.5 = 0.3$$. The force is **0.3 N** — on the order of **newtons** (specifically a fraction of a newton).\n- Step 2: This is a small but tangible force — enough to deflect a light wire visibly in a lab, but not enough to lift heavy objects. For perspective: 0.3 N is the weight of about 30 grams of mass ($$W = mg \\approx 0.03 \\times 10 = 0.3$$ N). So the motor effect with these parameters produces a force equivalent to holding a small coin — noticeable, but modest.\n\nTakeaway: with typical lab values ($$B \\sim 0.2$$ T, $$I \\sim 3$$ A, $$L \\sim 0.5$$ m), the force is on the order of ~0.3 N — fractional newtons, millinewtons-to-newtons scale.", "source": "GLM 5.1 ③", "_id": "glm_3_47", "judge_pick": false}, {"question": "A student rubs a plastic rod with a cloth and the rod becomes negatively charged. Then she touches the rod with her hand and it becomes neutral again. Explain each step: why the rod became negative, and why touching it neutralised it. (3 steps)", "answer": "- Step 1: Rubbing the plastic rod with cloth creates **friction**, which transfers electrons between the two materials. In this case, electrons move from the cloth to the rod (the direction depends on the materials — the question tells you the rod is negative, so electrons went to the rod). The rod **gains electrons** → becomes negatively charged; the cloth **loses electrons** → becomes positively charged.\n- Step 2: Plastic is an **insulator**, so the transferred electrons stay trapped on the rod's surface — they cannot flow away or redistribute through the material. This is why the charge persists on the rod after rubbing stops.\n- Step 3: When the student touches the rod with her hand, her body is a **conductor** (mostly water and ions) connected to the ground through her feet (also conducting). The excess electrons on the rod now have a **conducting path to earth** through her hand and body. The electrons flow away to ground, and the rod becomes **neutral** again — this is earthing in action, just like the metal strap under the car.\n\nTakeaway: friction transfers electrons (rod gains them → negative); touching provides a conducting path to earth → electrons drain away → neutral. Same physics as the car question.", "source": "GLM 5.1 ③", "_id": "glm_3_48", "judge_pick": false}, {"question": "Why is the statement \"protons transferred from the cloth to the rod\" always wrong in electrostatics explanations, even if the rod ends up positively charged? (2 steps)", "answer": "- Step 1: **Protons are locked inside atomic nuclei** — they are bound by the strong nuclear force and cannot leave the nucleus under any ordinary electrostatic process (rubbing, touching, earthing). Only **electrons**, which orbit outside the nucleus and are relatively loosely bound, can move between objects in everyday situations.\n- Step 2: When an object becomes positively charged, it has **lost electrons** (fewer negatives to balance the protons), not gained protons. The proton count stays exactly the same — it's the electron count that changes. So \"protons transferred\" is always the wrong explanation; the correct one is \"electrons transferred away from the object, leaving it with an excess of protons.\"\n\nTakeaway: positive charge = lost electrons, never gained protons. Protons don't move in electrostatics — only electrons transfer.", "source": "GLM 5.1 ③", "_id": "glm_3_49", "judge_pick": true}], "count": 50}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "List the four magnetic materials and explain why steel is classified as magnetically hard, while iron is magnetically soft. (3 steps)", "answer": "- Step 1: **Identify the four magnetic materials**: Iron, steel, nickel, and cobalt. These are the only materials attracted to a magnet.  \n- Step 2: **Magnetically hard vs. soft**: Steel (mostly iron with carbon) retains magnetism permanently (hard), making it suitable for permanent magnets. Iron loses magnetism quickly (soft), ideal for temporary magnets like electromagnets.  \n- Step 3: **Practical example**: A steel paperclip stays magnetized after touching a magnet, while an iron paperclip loses its magnetism once removed.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why does a compass needle point to the Earth’s magnetic south pole, and where is this pole located geographically?", "answer": "- A compass needle’s north pole is attracted to the Earth’s magnetic south pole. This pole lies near the geographic North Pole. The Earth’s magnetic field lines run from its magnetic south to magnetic north, so the compass aligns with these lines, pointing toward the magnetic south (geographic north).", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "Describe three key properties of magnetic field lines around a bar magnet and explain how these indicate field strength. (3 steps)", "answer": "- Step 1: **Direction**: Field lines point from north to south outside the magnet.  \n- Step 2: **Strength**: Closer lines indicate stronger fields, typically concentrated at the poles.  \n- Step 3: **Uniformity**: Equally spaced lines (e.g., between two magnets) imply a uniform field. Field lines never cross, ensuring a unique direction of force at any point.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Compare the use of a plotting compass and iron filings for mapping magnetic fields. What does each method reveal? (2 steps)", "answer": "- Step 1: **Plotting compass**: Shows both the shape and direction of the field (red end points toward the south pole of the magnet).  \n- Step 2: **Iron filings**: Reveal the field’s shape (lines bunch up where the field is strong) but not direction. Filings align with field lines but lack directional information.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "Why can’t you isolate a single magnetic pole by cutting a bar magnet in half?", "answer": "Cutting a magnet creates two smaller magnets, each with its own north and south pole. Magnetic domains (aligned electron spins) within the material ensure poles always occur in pairs. This fundamental property of magnetism (no monopoles) means isolated poles are impossible.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Explain how two bar magnets arranged with opposite poles facing produce a uniform magnetic field. (2 steps)", "answer": "- Step 1: **Opposite poles attract**: When fixed in place, the north pole of one magnet faces the south pole of the other.  \n- Step 2: **Field lines**: In the gap between them, field lines are straight, parallel, and equally spaced, indicating a uniform field strength and direction.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "State the right-hand grip rule for determining the direction of a magnetic field around a current-carrying wire. What do the thumb and fingers represent? (2 steps)", "answer": "- Step 1: **Thumb**: Points in the direction of conventional current (positive charge flow).  \n- Step 2: **Curled fingers**: Show the circular direction of the magnetic field around the wire. This rule applies to straight conductors and solenoids.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "How do the three factors (current, coils, core) strengthen an electromagnet? (3 steps)", "answer": "- Step 1: **Current**: Increasing current boosts the magnetic field strength proportionally.  \n- Step 2: **Coils**: More turns in the solenoid concentrate field lines, enhancing strength.  \n- Step 3: **Core**: A soft-iron core channels and amplifies the field, as iron’s magnetic domains align easily.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "What is magnetic flux density (B), and what is its SI unit? How does it relate to field line density?", "answer": "Magnetic flux density (B) measures the strength of a magnetic field. Its SI unit is the tesla (T). Higher B values correspond to denser field lines (closer spacing), while weaker fields have sparser lines (farther apart).", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "Why does a car gain a positive charge while moving, and why doesn’t this charge leak away through rubber tires?", "answer": "Friction between the car and air transfers electrons from the car to the air, leaving the car positively charged. Rubber tires are insulators, preventing charge from flowing to the ground. A metal strap (conductor) provides a path to earth the charge, preventing buildup.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}], "count": 10}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "What are the four magnetic materials, and why are they specifically magnetic? (3 steps)", "answer": "- Step 1: The four magnetic materials are **iron, steel, nickel, and cobalt**. Steel is included because it's primarily iron with carbon added, retaining magnetic properties.\n- Step 2: These materials are magnetic due to the alignment of **electron spins** (at the atomic level), creating **magnetic domains**. The d-orbital electrons in these transition metals can align their magnetic moments.\n+ Iron (Fe) has unpaired d-electrons allowing domain alignment\n+ Nickel (Ni) and cobalt (Co) similarly have unpaired d-electrons\n+ Steel (iron-carbon alloy) retains these properties\n- Step 3: Non-magnetic materials like copper or aluminum lack these unpaired electrons or have domains that don't readily align, making them unsuitable for magnetism.\n\n[Optional: The concept of ferromagnetism explains why these specific elements cluster near each other in the periodic table.]", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "How do permanent magnets differ from temporary magnets in terms of magnetic hardness, and why is this distinction important for applications?", "answer": "Permanent magnets are made from **magnetically hard materials** (like steel) that resist demagnetization, while temporary magnets are made from **magnetically soft materials** (like pure iron) that easily lose their magnetism. This distinction is crucial because permanent magnets are needed for applications requiring sustained magnetism (like loudspeakers), while temporary magnets are preferable when controlled magnetism is needed (like in electromagnets for cranes where you want to turn the magnetism off).", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Why does a compass needle point to the Earth's magnetic south pole rather than its magnetic north pole? (2 steps)", "answer": "- Step 1: A compass needle is a small magnet with a marked **north-seeking end (N)**. The N end of a magnet is attracted to the **south pole of a magnet**.\n- Step 2: The Earth behaves like a giant bar magnet with its magnetic south pole near the geographic North Pole. Therefore, the compass needle's north end points toward this magnetic south pole, which we conventionally describe as \"north.\"", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "How do field lines represent both the direction and strength of a magnetic field?", "answer": "Field lines represent magnetic fields with two key features: **direction** is shown by the arrowheads pointing from north to south pole (outside the magnet), and **strength** is indicated by the line density – closer lines mean a stronger field while widely spaced lines indicate weaker fields. Uniform fields have equally spaced, parallel lines throughout.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Why can't you create a single magnetic pole (monopole) by cutting a bar magnet in half? (3 steps)", "answer": "- Step 1: When you cut a bar magnet, you don't isolate poles but create two complete magnets, each with its own north and south pole. This happens because magnetism originates at the atomic level where each atom acts as a tiny dipole.\n- Step 2: At the microscopic scale, magnetic domains (regions of aligned atomic dipoles) reform in each piece to maintain dipole nature.\n+ Imagine cutting a solenoid – you get two smaller solenoids with complete magnetic circuits\n+ Even at the atomic level, no isolated magnetic charges exist\n- Step 3: This fundamental property of magnetism (dipole nature) explains why magnetic monopoles don't exist in classical physics, unlike electric monopoles (charges) in electrostatics.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "How do iron filings and plotting compasses differ in what they reveal about magnetic fields, and why is this distinction important for field analysis?", "answer": "Iron filings only show the **shape** of the magnetic field pattern by aligning with field lines but don't indicate direction. Plotting compasses, being small magnets, show both the **shape and direction** of the field (needle points north-south). This distinction is important because understanding field direction is crucial for applications like motor effect calculations where force direction matters.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Using two bar magnets, how would you create a uniform magnetic field, and what field line characteristics would you expect to see in this region? (3 steps)", "answer": "- Step 1: Place two bar magnets with opposite poles facing each other (N-S) a small distance apart and fix them in place to prevent attraction.\n- Step 2: In the gap between the magnets, the field lines from the north pole of one magnet will directly connect to the south pole of the other magnet.\n- Step 3: The uniform field region will have field lines that are straight, parallel, and equally spaced, indicating consistent field strength and direction throughout this region.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "How does the right-hand grip rule help determine the direction of the magnetic field around a current-carrying conductor?", "answer": "The right-hand grip rule states that if you point your thumb in the direction of the current, your curled fingers will show the direction of the magnetic field around the conductor. This rule helps visualize how the magnetic field forms concentric circles perpendicular to the current direction, with the field strength decreasing with distance from the wire.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "What are the three ways to strengthen an electromagnet, and why does each method work?", "answer": "Electromagnets can be strengthened by increasing the **current** (more charge flow creates a stronger field), adding more **coils** (concentrating field lines in a smaller space), or inserting a **soft iron core** (concentrating field lines and enhancing magnetism). Each method works by increasing the number of aligned magnetic domains or intensifying the magnetic field lines in the region.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "How does the magnetic field of a solenoid compare to that of a bar magnet, and how can you determine the north pole of a solenoid using the right-hand grip rule? (3 steps)", "answer": "- Step 1: The magnetic field outside a solenoid closely resembles that of a bar magnet with distinct north and south poles, field lines going from north to south outside and returning inside.\n- Step 2: To determine the north pole with the right-hand grip rule, curl your fingers in the direction of the current through the solenoid coils. Your thumb points to the north pole.\n- Step 3: Inside the solenoid, unlike a bar magnet, the field is uniform and runs from south to north, completing the magnetic circuit.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "What is magnetic flux density (B), what are its units, and how does it relate to the \"closeness\" of magnetic field lines?", "answer": "Magnetic flux density (B) is a measure of the strength of a magnetic field at a point, with units of tesla (T). It relates directly to the \"closeness\" of magnetic field lines - where field lines are closer together, the flux density is higher (stronger field), and where they are farther apart, the flux density is lower (weaker field).", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "Why does a car become positively charged when driving on the road, and why doesn't the charge dissipate through the rubber tires? (3 steps)", "answer": "- Step 1: As the car moves, friction between the car and the air causes electron transfer. The car loses electrons to the air, leaving it with a net positive charge.\n- Step 2: Rubber tires are excellent **insulators**, meaning they don't allow electric charge to flow through them easily.\n- Step 3: Without a conducting path to the ground, the positive charge remains on the car. A metal strap provides a conducting path to earth, allowing the charge to dissipate.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}, {"question": "How does the concept of a \"uniform field\" differ from a non-uniform field, and why are uniform fields particularly useful in physics experiments?", "answer": "A uniform field has the same strength and direction at all points within the field region, represented by equally spaced, parallel field lines. Non-uniform fields have varying strength and/or direction, represented by curved or unevenly spaced field lines. Uniform fields are particularly useful in physics experiments because they simplify calculations and provide consistent conditions, making them ideal for studying the motor effect and other magnetic interactions.", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": false}], "count": 13}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "What is the difference between a permanent magnet and a temporary magnet? Give an example of each material. (2 steps)", "answer": "- Step 1: A permanent magnet keeps its magnetism for a long time — it is made of a magnetically hard material like steel.\n- Step 2: A temporary magnet loses its magnetism quickly when removed from a magnetic field — it is made of a magnetically soft material like iron (or nickel, cobalt).\n+ Hard materials retain magnetism because their atomic domains stay aligned; soft materials gain and lose alignment easily.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "What is induced magnetism? Give an example from everyday life. (2 steps)", "answer": "- Step 1: Induced magnetism occurs when a piece of magnetic material is placed inside another magnet's field, causing it to become a magnet itself.\n- Step 2: A common example is a paperclip clinging to a permanent magnet — the paperclip becomes magnetized and can then pick up a second paperclip. When removed from the field, a soft material (like iron) loses its induced magnetism quickly.\n+ This is why you can chain multiple paperclips together hanging from one magnet — each becomes induced and attracts the next.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "State the textbook definition of a magnetic field. (1 step)", "answer": "A magnetic field is a region in which a magnetic material, or a moving charged object, feels a force. This is the same structure as electric fields (region where charges feel force) and gravitational fields (region where masses feel force) — all three are fundamental field types in physics.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "List the four rules that magnetic field lines (flux lines) always obey. (2 steps)", "answer": "- Step 1: Direction: arrows always point from N to S outside the magnet (the direction a free N pole would be pushed).\n- Step 2: Strength: the closer the lines, the stronger the field — they bunch up at the poles (the strongest points).\n+ Uniform field: equally-spaced, parallel lines mean the field is the same strength and direction everywhere.\n+ Field lines never cross each other — if they did, a point would have two different field directions at once.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "A bar magnet is shown on paper. How can you tell from the field lines (a) where the field is strongest, and (b) that it is a uniform field? (2 steps)", "answer": "- Step 1: (a) The field is strongest where the lines are closest together / most bunched — this is at the two ends (poles) of the magnet.\n- Step 2: (b) A uniform field is shown by field lines that are straight, parallel, and equally spaced — same strength and direction everywhere in that region.\n+ This is why two bar magnets with opposite poles facing create a uniform field in the gap between them.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "What happens when you cut a bar magnet in half? Why does this happen? (2 steps)", "answer": "- Step 1: Each half becomes a complete magnet with its own N and S pole — you can never isolate a single magnetic pole (monopole).\n- Step 2: This happens because magnetism comes from aligned electron spins or magnetic domains inside the material. Every piece of magnetic material has domains that create both poles together.\n+ This is a fundamental property: magnetic poles always come in pairs. (The domain explanation is university-level, but it explains why poles cannot exist alone.)", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "You are given a bar magnet and asked to plot its magnetic field. Describe exactly how to use a plotting compass to trace one complete field line. (3 steps)", "answer": "- Step 1: Place the compass near the N pole of the magnet; mark a dot where the N (red/pointed) end of the compass needle points.\n- Step 2: Move the compass so its tail sits on that dot; mark the new position the needle points to.\n- Step 3: Repeat this process, joining the dots, all the way from the N pole round to the S pole — the line you draw is one complete field line.\n+ The plotting compass gives you both the shape AND the direction of the field.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "Describe how to use iron filings to visualize a magnetic field. What information can iron filings give you, and what can they NOT tell you? (2 steps)", "answer": "- Step 1: Place the magnet under a sheet of paper; sprinkle iron filings evenly on top, then gently tap the paper. The filings align along the field lines, showing the field's shape.\n- Step 2: Iron filings show the shape of the field and where it is strong (filings bunch together) but they CANNOT show the direction — you cannot tell which end is N or S.\n+ To get direction, you must use a plotting compass instead (or in addition).", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "A student says iron filings show which pole is north and which is south. Explain why this is wrong. (1 step)", "answer": "Iron filings only show the shape and relative strength of a field (where lines bunch up = strong), but they give no information about direction. You cannot tell from filings alone which end is N or S — you need a plotting compass for that. This is a common exam trap.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "How do you create a uniform magnetic field using two bar magnets? Which arrangement works and why? (2 steps)", "answer": "- Step 1: Place two bar magnets with opposite poles facing each other (N facing S) a small distance apart, then fix them so they cannot move.\n- Step 2: In the gap between them, the field lines are straight, parallel, and equally spaced — this is a uniform field (same strength and direction everywhere).\n+ With like poles facing (N–N or S–S), the field lines repel each other and create a neutral point (where the field cancels to zero) in the middle — this is NOT uniform.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "What is a \"neutral point\" in the context of two bar magnets with like poles facing? (1 step)", "answer": "A neutral point is a location where the magnetic fields from the two like poles cancel each other out completely, resulting in zero net magnetic field. On a field diagram, this appears as a cross (×) where the field lines from each pole meet but do not pass through. This happens when N faces N or S faces S.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "A compass \"points north.\" Explain why this is actually magnetically incorrect, and what the compass is really pointing to. (2 steps)", "answer": "- Step 1: The Earth acts like a giant bar magnet, but it is magnetically reversed — there is a magnetic SOUTH pole near the geographic North Pole.\n- Step 2: A compass needle's N (red) end points towards a magnetic SOUTH pole. So the compass actually points to the Earth's magnetic south pole, which is located near the geographic North Pole.\n+ This is a deliberate sign convention that trips students up: we say the compass \"points north\" because it leads us geographically north, but magnetically it is pointing at a south pole.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "State the right-hand grip rule for finding the direction of the magnetic field around a straight current-carrying wire. (2 steps)", "answer": "- Step 1: Point your right thumb in the direction of the current (conventional current, from positive to negative).\n- Step 2: Your curled fingers show the direction of the circular magnetic field lines around the wire.\n+ This must be the RIGHT hand — it is a different rule from Fleming's left-hand rule (coming next lesson), which is for the force on a current in a magnetic field.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "A current flows upward in a vertical wire. Using the right-hand grip rule, which way do the magnetic field lines circle the wire — clockwise or counterclockwise when viewed from above? (2 steps)", "answer": "- Step 1: Point your right thumb upward (in the direction of the current).\n- Step 2: Looking from above, your curled fingers would be counterclockwise — so the field circles counterclockwise around an upward current.\n+ Conversely, a current going INTO the page (away from you) produces clockwise field lines. The key is to visualize from the correct viewpoint.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "What three ways can you make an electromagnet stronger? (All three begin with the same letter — what is it?) (1 step)", "answer": "All three begin with C:\n- Current: increase the current (more charge flow per second → stronger field)\n- Coils: add more turns/coils (more wire in the same space concentrates the field)\n- Core: add a soft iron core (the iron channels and concentrates the field lines, greatly boosting strength)\n\nThis is the standard \"3C\" list for electromagnet strength.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "What is a solenoid? Describe the magnetic field pattern inside and outside a solenoid. (2 steps)", "answer": "- Step 1: A solenoid is a coil of wire wound into a long spring shape (like a cylindrical helix).\n- Step 2: Outside the solenoid, the field looks just like a bar magnet's field — lines go from N to S. Inside, the field is strong, uniform (parallel lines), and runs from S to N (completing the loop).\n+ To find which end is N, use the right-hand grip rule: curl your fingers in the direction the current flows around the coils; your thumb points to the N end.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "You are looking at the end of a solenoid. The current in the coil appears to flow anticlockwise. Which end is the north pole? (2 steps)", "answer": "- Step 1: Using the right-hand grip rule: curl your fingers in the direction of the current (anticlockwise, as viewed from your perspective).\n- Step 2: Your thumb points away from you — so the end facing you is the SOUTH pole. The NORTH pole is at the opposite end (where your thumb would point if you could push through the coil).\n+ Remember: right hand, fingers follow current, thumb = N.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "What is the symbol for magnetic flux density, and what is its SI unit? Also write the unit in base units. (1 step)", "answer": "The symbol is B (bold or italic B). The SI unit is the tesla (T). In base units, 1 tesla = 1 N A⁻¹ m⁻¹ (one newton per ampere-meter). This comes from the motor effect equation F = BIL, where B = F/(IL).", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "A compass is placed near a bar magnet. The red (N) end of the compass needle points towards the magnet. Which pole of the magnet is it pointing to — north or south? Explain why. (2 steps)", "answer": "- Step 1: The compass needle is itself a small magnet. The red/pointed end is its N pole.\n- Step 2: Like poles repel, opposite poles attract. Since the compass N end is being attracted (pointing toward the magnet), it must be pointing to a magnetic SOUTH pole on the magnet.\n+ The red end points TOWARDS a south pole, AWAY from a north pole. This is the same logic as why a compass points north on Earth — it points to the magnetic south pole near the geographic north.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "A car becomes positively charged as it drives along a road. Explain what this means in terms of electrons, and why the charge stays on the car after it stops. (2 steps)", "answer": "- Step 1: A positive charge means the car has lost electrons (fewer electrons than protons). Friction between the car and the air transfers electrons from the car to the air — the car loses negative charge, becoming positively charged.\n- Step 2: The charge stays because the rubber tyres are insulators — charge cannot flow through rubber to the road (earth), so it is trapped on the car body.\n+ This is static electricity: electrons move, positive charge is just the absence of electrons.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "A metal strap is fixed under a car and drags along the ground. Explain how this prevents charge building up on the car. (1 step)", "answer": "The metal strap is a conductor that connects the car body to the ground (earth). This provides a conducting path for any excess charge (electrons) to flow away from the car into the ground — the car becomes \"earthed.\" As soon as charge starts to build up, it flows through the strap, preventing accumulation.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "Why can't you use the Earth's magnetic field to create a useful uniform field in a lab? (1 step)", "answer": "The Earth's magnetic field is very weak (about 50 μT in the UK) and is not uniform — the field lines curve around the Earth and point into the ground at an angle (dipping about 65–70° in the UK). A uniform field needs straight, parallel, equally-spaced lines, which Earth's field does not provide.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "A student says \"like poles attract and opposite poles repel.\" Explain why this is completely wrong. (1 step)", "answer": "This is the opposite of correct. Like poles (N–N or S–S) repel each other; opposite poles (N–S) attract each other. This is exactly like electric charges: like charges repel, opposite attract. The student has reversed both pairs.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "In the movie Magneto (X-Men), the villain uses magnetism to stop missiles and make them hover in mid-air. What part of this is physically possible, and what is definitely not possible with a real magnet? (2 steps)", "answer": "- Step 1: What could be true: the missiles contain magnetic materials (iron/steel), so a strong magnetic field can exert a force on them — this is real physics.\n- Step 2: What is definitely false: a simple magnet would only attract (pull) the metal straight toward it. A real magnet cannot make metal objects hover in place and steer in all directions — that would require precise control of multiple fields, which a single magnet cannot do.\n+ Alex's coaching tip: when unsure whether it's attraction or repulsion, say objects \"interact\" (there is a force) rather than guessing wrong.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "You have two bar magnets. In one arrangement the N pole of one faces the S pole of the other. In another arrangement, two N poles face each other. Describe the field in the gap between the magnets for both cases. (2 steps)", "answer": "- Step 1: Opposite poles facing (N–S): the field lines run straight across the gap from N to S — if the magnets are fixed, these lines are parallel and equally spaced = uniform field.\n- Step 2: Like poles facing (N–N or S–S): the field lines from each N pole repel each other and curve outward, leaving a neutral point (cross) in the middle where the field is zero — there is no uniform region.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "Why is soft iron preferred for the core of an electromagnet, rather than steel? (2 steps)", "answer": "- Step 1: Soft iron is magnetically \"soft\" — it gains and loses magnetism easily. When you turn the current on, it becomes strongly magnetized; when you turn the current off, it loses almost all its magnetism quickly.\n- Step 2: Steel is magnetically \"hard\" — it retains magnetism even after the external field is removed, so the electromagnet would stay partially magnetized when turned off (it would \"remember\" the field). For an electromagnet where you want to switch the field on and off, soft iron is essential.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "A wire carries a current horizontally from left to right. Sketch the magnetic field pattern around the wire, showing its shape and indicating how field strength varies with distance from the wire. (2 steps)", "answer": "- Step 1: The field consists of concentric circles centered on the wire. Using the right-hand grip rule: thumb right (current), fingers curl downward in front of the wire and upward behind it (viewed from above, circles go clockwise above the wire, anticlockwise below).\n- Step 2: Field strength decreases with distance from the wire — the circles get farther apart (weaker field) the further out you go. Right next to the wire, lines are closest = strongest field.\n+ This is the fundamental field pattern for any straight current-carrying conductor.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "When plotting a magnetic field, when would you choose to use iron filings instead of a plotting compass? What limitation must you remember? (1 step)", "answer": "Iron filings are faster for visualizing the overall shape of a field, especially for showing where field lines bunch up (strong regions). However, you must remember that iron filings cannot show the direction of the field — they only reveal the shape and relative strength. Use a plotting compass if the question asks for direction.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "A bar magnet is placed on a table. A plotting compass is placed near its north pole. In which direction will the compass needle point? (1 step)", "answer": "The compass needle's N (red) end will point AWAY from the magnet's north pole (since like poles repel). More specifically, it will point toward the magnet's south pole, following the field line that curves from the N pole round to the S pole. The red end always points toward a magnetic south pole.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "What is the difference between \"magnetic flux density\" and \"magnetic field strength\"? Are they the same thing? (1 step)", "answer": "In this context (Edexcel IAL), magnetic flux density (B) and magnetic field strength are the same quantity — B measures how concentrated the magnetic field lines are (field strength). The unit is tesla. Sometimes \"magnetic field strength\" is used loosely to mean the B field, but technically H is the magnetic field strength in some contexts — for this course, treat them as synonymous with B.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "Order these magnetic field strengths from weakest to strongest: (a) Earth's field (~50 μT), (b) a refrigerator magnet (~5 mT), (c) an MRI machine (~3 T). Explain your reasoning. (2 steps)", "answer": "- Step 1: Weakest to strongest: Earth (50 μT = 5×10⁻⁵ T) → refrigerator magnet (~5 mT = 5×10⁻³ T) → MRI (~3 T).\n- Step 2: The MRI field is about 60,000 times stronger than Earth's field and about 600 times stronger than a fridge magnet. This shows the huge range of magnetic strengths in practical applications.\n+ Note that even 3 T is considered \"very strong\" — most lab fields are fractions of a tesla.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "Why is it impossible to have a single magnetic pole (a \"monopole\")? (1 step)", "answer": "Magnetism arises from the alignment of atomic magnetic domains (or electron spins) within a material. Every domain has a north and south pole together — you cannot have one without the other. When you cut a magnet in half, you simply create two smaller dipoles, each with both poles. No known physics observation has ever found an isolated magnetic charge (monopole).", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "In the right-hand grip rule for a solenoid, what does each part of your hand represent? (1 step)", "answer": "- Thumb: points along the axis of the solenoid toward the NORTH pole.\n- Curled fingers: show the direction of the current flowing around the coil (the conventional current direction, from positive to negative terminal).\n+ This is the same principle as the straight wire rule, but wrapped around — thumb = N pole direction, fingers = current direction around the coils.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "A student argues that because the Earth has a \"North Magnetic Pole\" (near the Arctic), a compass should point to a magnetic north pole. How would you correct this misconception? (2 steps)", "answer": "- Step 1: The Earth actually has a magnetic SOUTH pole near the geographic North Pole — it is \"upside down\" compared to what we might expect.\n- Step 2: A compass needle's north (red) end is attracted to a magnetic south pole. So the compass points toward the Earth's magnetic south pole, which is near the geographic North Pole.\n+ This is a historical convention: we call the pole in the Arctic the \"North Magnetic Pole\" because compasses point there, but magnetically it is actually a south pole. This is analogous to conventional current being defined as the direction positive charges would flow (opposite to actual electron flow).\n```\n\n## JARGON TABLE\n\n| | What does it mean? |\n| --- | --- |\n| **Magnetic Materials** | |\n| Magnetic materials | Materials that are attracted to magnets: iron, steel, nickel, cobalt (only four) |\n| Permanent magnet | A magnet that retains its magnetism indefinitely; made of magnetically hard material (e.g., steel) |\n| Temporary magnet | A magnet that loses its magnetism quickly; made of magnetically soft material (e.g., iron) |\n| Induced magnetism | When a magnetic material becomes a magnet while placed in an external magnetic field |\n| Magnetically hard | Material that retains magnetism well (good for permanent magnets) |\n| Magnetically soft | Material that gains and loses magnetism easily (good for electromagnets) |\n| **Fields & Field Lines** | |\n| Magnetic field | A region where a magnetic material or moving charged object feels a force |\n| Field line (flux line) | A line drawn to represent the direction and strength of a magnetic field |\n| Uniform field | A field with the same strength and direction everywhere (parallel, equally-spaced lines) |\n| Magnetic flux density (B) | A measure of field strength; how closely field lines are bunched |\n| Tesla (T) | SI unit of magnetic flux density; 1 T = 1 N A⁻¹ m⁻¹ |\n| Neutral point | A point where magnetic fields cancel out (zero net field); appears as a cross on field diagrams |\n| **Plotting Methods** | |\n| Plotting compass | A small pivoted magnet used to trace field lines; gives shape AND direction |\n| Iron filings | Ferrous particles that align with magnetic fields; gives shape only, not direction |\n| **Electromagnetism** | |\n| Electromagnet | A magnet created by current flowing through a conductor |\n| Solenoid | A coil of wire wound in a spiral; produces a bar-magnet-like field |\n| Right-hand grip rule | Rule to find field direction: thumb = current, curled fingers = field direction |\n| **Earth's Magnetism** | |\n| Geographic North Pole | The true North Pole on maps (where Earth's axis points) |\n| Magnetic South Pole | The pole near the geographic North; compass N points toward it |\n| **Static Electricity** | |\n| Charging by friction | Transfer of electrons between two insulators when rubbed together |\n| Conductor | Material that allows charge to flow through it (e.g., metals) |\n| Insulator | Material that does not allow charge to flow (e.g., rubber, plastic) |\n| Earthing | Connecting a charged object to the ground via a conductor to remove excess charge |\n\n## FORMULA TABLE\n\n| $$LHS = ?$$ | Answer | Name / Hint |\n| --- | --- | --- |\n| **Magnetic Field Strength** | | |\n| $$B = ?$$ | $$B = \\frac{F}{IL}$$ | Definition of magnetic flux density; 1 T = 1 N A⁻¹ m⁻¹ |\n| **Force on Current (preview)** | | |\n| $$F = ?$$ | $$F = BIL \\sin\\theta$$ | Force on a current-carrying wire in a magnetic field (motor effect) |\n| **Force on Moving Charge (preview)** | | |\n| $$F = ?$$ | $$F = Bqv \\sin\\theta$$ | Force on a moving charge in a magnetic field |\n| **Field Strength Relationships** | | |\n| $$1 \\text{ T} = ?$$ | $$1 \\text{ N A}^{-1} \\text{ m}^{-1}$$ | Tesla in base units |\n| $$\\text{tesla to microtesla}$$ | $$1 \\text{ T} = 10^6 \\mu\\text{T}$$ | Unit conversion |\n| **Earth's Field** | | |\n| $$B_{\\text{Earth}} \\approx ?$$ | $$\\approx 5.0 \\times 10^{-5} \\text{ T} = 50 \\mu\\text{T}$$ | Typical UK Earth's magnetic field strength |", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}], "count": 34}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "A steel bar magnet can keep its magnetism for years, but an iron nail quickly loses its magnetism when removed from a magnetic field. Explain why, using the terms \"magnetically hard\" and \"magnetically soft.\" (2 steps)", "answer": "- Step 1: Steel is magnetically hard — it retains its magnetic alignment of domains even after the external field is removed, making it suitable for permanent magnets.\n- Step 2: Iron is magnetically soft — its domains easily align with an external field but quickly become random again when the field is removed, making it suitable for temporary magnets like electromagnets where you want to switch the magnetism off.\n+ Magnetically hard materials have strong domain retention; magnetically soft materials gain and lose magnetism easily.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "What is the textbook definition of a magnetic field? (1 step)", "answer": "- A **magnetic field** is a region in which a magnetic material, or a moving charged object, feels a force.\n+ This is one of three fields in physics (gravitational, electric, magnetic).\n+ The key idea: if something feels a force in a region, there is a field present.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "State the four rules for drawing magnetic field lines (lines of force). (1 step)", "answer": "- Step 1: **Direction** — arrows always point from N to S (outside the magnet). This is the direction a free N pole would be pushed.\n- Step 2: **Strength** — the closer the lines, the stronger the field. Lines bunch up at the poles (the ends).\n- Step 3: **Uniform field** — equally-spaced, parallel lines mean the field is the same strength and direction everywhere.\n- Step 4: **No crossing** — field lines never cross each other; if they did, a point would have two different field directions, which is impossible.\n+ These four rules are the foundation for reading and drawing any magnetic field diagram.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "A bar magnet is placed on a piece of paper, and iron filings are sprinkled around it. Where do the filings bunch up, and what does this tell you about the field strength? (1 step)", "answer": "- The iron filings bunch up most densely at the two ends (poles) of the magnet.\n+ This tells you the magnetic field is strongest at the poles — the field lines are closest together there.\n+ In the middle of the magnet (near the center), the filings are more spread out, indicating a weaker field.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "A student says iron filings can tell you the direction of a magnetic field. Is this true? Explain your answer. (2 steps)", "answer": "- Step 1: This is **false**. Iron filings only show the **shape** of the field — they align along the field lines but cannot show which direction the field is pointing.\n- Step 2: To find the direction, you must use a **plotting compass**, which has a tiny bar magnet inside it. Its red (N) pointer points along the field line towards a magnetic S pole.\n+ This is a common exam trick question: iron filings show where the field is strong (bunching) but not the direction (N or S).", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "Describe how to use a plotting compass to trace a magnetic field line from the N pole to the S pole of a bar magnet. (3 steps)", "answer": "- Step 1: Place the plotting compass near the N pole of the magnet. Mark the dot where the red (N) end of the compass needle points.\n- Step 2: Move the compass so that the tail of the needle sits exactly on the dot you just marked. Mark the new position where the needle points.\n- Step 3: Repeat this process, joining the dots as you go, until you reach the S pole. The connected line is one complete field line.\n+ Unlike iron filings, the plotting compass gives you both the shape AND the direction of the field.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "What is meant by a \"uniform magnetic field\"? How can you create one using two bar magnets? (2 steps)", "answer": "- Step 1: A uniform magnetic field means the field has the **same strength and direction everywhere** in that region. On a diagram, this appears as straight, equally-spaced, parallel field lines.\n- Step 2: To create one, place two bar magnets with **opposite poles facing** (N facing S) a small distance apart, and fix them so they cannot move. In the gap between them, the field lines are straight, parallel, and equally spaced — this is a uniform field.\n+ Like poles facing (N-N or S-S) create repulsion with a neutral point in the middle — not uniform.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "A compass is used in the UK. Which geographic direction does the red (N) end of the compass needle point to, and why? (2 steps)", "answer": "- Step 1: The red end points towards the **geographic North Pole** of the Earth.\n- Step 2: However, magnetically, this is because the Earth acts like a giant bar magnet with its **magnetic South pole** near the geographic North. Since opposite poles attract, the compass needle's N end is pulled towards the Earth's magnetic S pole.\n+ This is a classic trap: the \"North\" pole of a compass points to a magnetic SOUTH pole.\n+ The UK magnetic field is about 50 μT (microtesla), dipping into the ground at about 65–70°.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "State the right-hand grip rule for finding the direction of the magnetic field around a straight current-carrying wire. What does the thumb represent? What do the curled fingers represent? (1 step)", "answer": "- Step 1: Make a fist with your **right hand**. Stick your thumb up as if giving a thumbs-up.\n- Step 2: The **thumb** points in the direction of the **current** (conventional current, from + to −).\n- Step 3: The **curled fingers** show the direction of the **circular magnetic field** wrapping around the wire.\n+ This must be the RIGHT hand — the left hand is used for a different rule (Fleming's left-hand rule, coming in the next lesson).", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "A current flows upwards in a vertical wire. Looking from above (with current coming towards you), are the magnetic field circles clockwise or counterclockwise? (1 step)", "answer": "- If current comes **towards you** (out of the page), the field circles are **counterclockwise**.\n+ This follows directly from the right-hand grip rule: with thumb pointing towards you, your fingers curl counterclockwise.\n+ Conversely, if current goes **into the page** (away from you), the field circles are clockwise.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "Give three ways to make an electromagnet stronger, and explain why each works. (2 steps)", "answer": "- Step 1: **Increase the Current** — a bigger current produces a stronger magnetic field (field strength is proportional to current).\n- Step 2: **Add more Coils (turns)** — winding the wire into a tight coil concentrates the field, putting more wire in the same space so the effects add up.\n- Step 3: **Add an Iron Core** — a soft-iron core channels and concentrates the magnetic field lines, greatly boosting the field strength.\n+ All three begin with \"C\" — a handy mnemonic: **Current, Coils, Core**.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "What is a solenoid? Describe the magnetic field inside and outside a current-carrying solenoid. (2 steps)", "answer": "- Step 1: A **solenoid** is a coil of wire wound into a long spring shape. When current flows through it, it behaves like a bar magnet.\n- Step 2: **Externally**, the field looks exactly like a bar magnet's field — field lines emerge from one end (the N end) and loop back to the other end (the S end). Use the right-hand grip rule on the coil to find which end is N: curl your fingers in the direction of current around the coil; your thumb points to the N end.\n+ **Internally**, there is a strong, roughly uniform field running from S to N (completing the loop inside). A permanent bar magnet has the same internal field — we just cannot see it from the outside.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "What is the symbol for magnetic flux density, and what is its SI unit? Define this unit in terms of force, current, and length. (1 step)", "answer": "- The symbol is **B** (bold or italic B), and the SI unit is the **tesla (T)**.\n+ One tesla is defined as: **1 T = 1 N A⁻¹ m⁻¹** — the magnetic flux density when a wire carrying 1 ampere, placed perpendicular to the field, experiences a force of 1 newton per meter of length.\n+ For scale: the Earth's magnetic field is about 50 μT (microtesla); a fraction of a tesla is already very strong.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "A car becomes positively charged as it drives along a road. Explain whether the car gained or lost electrons, and why the charge remains on the car even after it stops. (2 steps)", "answer": "- Step 1: The car **lost electrons**. A positive charge means there are fewer electrons than protons. Friction between the car and the air transfers electrons from the car to the air, leaving the car positively charged.\n- Step 2: The charge remains because the car's **rubber tyres are insulators**. Charge cannot flow through rubber to reach the Earth, so the excess charge is trapped on the car.\n+ This is static electricity: electrons transfer, insulators trap the charge.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "A metal strap is fixed under a car and drags along the ground. Explain how this prevents charge from building up on the car. (2 steps)", "answer": "- Step 1: The metal strap is a **conductor**. It provides a conducting path from the car to the ground (Earth).\n- Step 2: When charge builds up on the car, it can now flow through the metal strap to the Earth — this is called **earthing**. The excess charge is safely removed, preventing any further buildup.\n+ This is why metal straps are used on fuel tankers — they prevent dangerous static charge accumulation.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "You cut a bar magnet in half. What do you get? Can you ever isolate a single magnetic pole (a lone N or S)? (1 step)", "answer": "- Each half becomes a **complete magnet** with its own N and S pole. You can never isolate a single magnetic pole — cutting a magnet always produces two smaller complete magnets.\n+ This is because magnetism arises from aligned electron spins or magnetic domains inside the material; each domain has both poles, so any piece big enough to contain domains will always have both poles.\n+ Physicists call this \"magnetic monopoles do not exist\" — and despite searches, none have ever been found.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "Two bar magnets are placed with their N poles facing each other. Describe what happens to the field lines between them, and explain what is meant by a \"neutral point.\" (2 steps)", "answer": "- Step 1: Like poles (N-N or S-S) **repel**. The field lines push away from each other and do not connect between the poles.\n- Step 2: At some point between the like poles, the two fields cancel completely — this is called a **neutral point** (or point of zero field). At this exact point, there is no magnetic force on a compass needle.\n+ On a diagram, a neutral point appears as a cross where field lines from both magnets meet but go no further.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "In the movie Magneto (X-Men), the villain stops missiles using magnetic force. What aspects of this are physically possible, and what is definitely false? (2 steps)", "answer": "- Step 1: **Possibly true**: The missiles contain magnetic materials (iron/steel), so a strong magnetic field could exert a force on them — they would be attracted to the magnet.\n- Step 2: **Definitely false**: A real magnet would simply pull the metal objects straight in (attract). In the film, the objects hover and steer in controlled directions, which no simple magnet can do. Real magnetism cannot make metal objects \"hover\" at a distance or be steered precisely like that.\n+ Alex's coaching tip: when unsure, say objects \"interact\" rather than guessing \"attract\" or \"repel\" — it's always safe to say there is a force.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": true}, {"question": "A wire carries current into the page (away from you) through a magnetic field. Using the right-hand grip rule, what is the direction of the circular magnetic field produced by the wire itself? (1 step)", "answer": "- With current going **into the page**, the magnetic field circles are **clockwise** (as seen from your position).\n+ To visualize: point your thumb into the page; your fingers curl clockwise. This is the field the current produces around itself, independent of any external field.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "What is \"induced magnetism\"? Give an example using a bar magnet and a paperclip. (2 steps)", "answer": "- Step 1: **Induced magnetism** occurs when a piece of magnetic material is placed inside another magnet's field, and it becomes a magnet itself — temporarily.\n- Step 2: Example: Place a bar magnet near a paperclip. The paperclip (made of steel/iron) becomes magnetized by induction. It is now attracted to the magnet, and it can even pick up a second paperclip. Remove the bar magnet, and a soft material (iron) quickly loses its induced magnetism; a hard material (steel) may retain some.\n+ This is why paperclips can chain together when hanging from a magnet — each induces magnetism in the next.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "An exam question shows two different magnetic field diagrams. The first has field lines very close together at the poles; the second has field lines evenly spaced across the entire page. Describe the field in each case. (1 step)", "answer": "- **First diagram**: The field is **strongest at the poles** (where lines are close together) and weaker elsewhere. This is typical of a single bar magnet.\n- **Second diagram**: The field is **uniform** — the same strength and direction everywhere, indicated by evenly-spaced, parallel lines.\n+ This is exactly the difference between a bar magnet's field and the uniform field between two opposite poles.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "A student says: \"The Earth is a huge magnet with its magnetic north pole at the geographic North Pole.\" Is this statement correct? If not, what is the correct description? (1 step)", "answer": "- This statement is **incorrect**. The Earth behaves like a giant bar magnet, but it is **upside down** compared to what most people think.\n+ The Earth's **geographic North** is actually near its **magnetic South pole** (not North). A compass points north because the compass N end is attracted to a magnetic South pole.\n+ This is one of two classic sign convention traps in physics (the other being conventional current direction being opposite to electron flow).", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "State the relationship between the strength of a magnetic field and the spacing of its field lines. How would you identify a uniform field from a diagram? (1 step)", "answer": "- **Closer lines = stronger field; wider apart = weaker field**. This is the fundamental rule for reading field strength from any field diagram.\n+ A **uniform field** is identified by field lines that are **straight, parallel, and equally spaced** — indicating the same strength and direction everywhere.\n+ This single relationship answers most \"compare the strength\" questions in exams.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "Why is the right-hand grip rule used for the field around a wire, rather than the left hand? (1 step)", "answer": "- The right-hand grip rule comes from the mathematical relationship between current direction and the magnetic field it produces. The direction is built into the definition of the right-hand rule.\n+ It must be the **right hand** specifically — using the left hand would give the opposite (wrong) direction. This is distinct from Fleming's left-hand rule (coming next lesson), which determines the direction of force on a current-carrying wire in a magnetic field.\n+ Alex's tip: \"RIGHT hand for the field, LEFT hand for the force\" — keep them straight.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "A copper wire is placed near a magnet but no current flows. Nothing happens. However, when current is switched on, the wire experiences a force. Explain why, using the concept of a magnetic field. (2 steps)", "answer": "- Step 1: A magnet produces a magnetic field around it — this is a permanent field from a permanent magnet.\n- Step 2: When current flows through the copper wire, it **creates its own magnetic field** around the wire. This field interacts with the field from the permanent magnet, resulting in a force on the wire. This is the beginning of the **motor effect** (which continues in the next lesson).\n+ No current = no field from the wire = no interaction = no force.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "What are the two key limitations of using iron filings to map a magnetic field? (1 step)", "answer": "- **Limitation 1**: Iron filings show the **shape** of the field (where field lines are) but not the **direction** (which end is N, which is S).\n- **Limitation 2**: Iron filings cannot easily distinguish between strong and weak regions quantitatively — they only show qualitative bunching.\n+ To get direction, you must use a plotting compass. This is a common exam question: \"What information can iron filings NOT give you?\" — answer: the direction.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "In the two-magnet arrangement that produces a uniform field, why must the magnets be \"fixed\" (not allowed to move)? (1 step)", "answer": "- If the magnets are not fixed, they will **attract each other** (opposite poles facing) and move together, changing the field in the gap.\n+ By fixing them in place (e.g., clamped or glued), you prevent them from moving, maintaining a constant gap with a stable, uniform field. This is essential for experiments like the motor effect where you need a consistent field to measure the force on a wire.\n+ In practice, uniform fields are often created using permanent magnet assemblies or electromagnets (Helmholtz coils) that are mechanically secured.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "A compass is placed exactly at the neutral point between two like poles (N-N). What does the compass show, and why? (1 step)", "answer": "- The compass needle **shows no preferred direction** — it may point any way or spin freely.\n+ This is because the two magnetic fields from the like poles **cancel exactly** at the neutral point. There is zero net magnetic field there, so no force acts on the compass needle to orient it.\n+ This is why field lines appear to cross (or stop) at neutral points — the field is zero.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "A bar magnet and a solenoid both produce similar external magnetic field patterns. Explain one key difference between the fields inside these two objects. (1 step)", "answer": "- Inside a **solenoid** (when current flows), there is a **strong, uniform field** running from S to N — this is visible if you could look inside the coil.\n+ Inside a **bar magnet**, the field also runs S to N, but we cannot see it from the outside. The key difference is that we can easily access and use the solenoid's internal field (e.g., to accelerate particles), whereas the bar magnet's internal field is hidden within the magnet material itself.\n+ The solenoid gives us control: we can turn its internal field on/off and change its strength by varying the current.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "Two objects are brought near a magnet: a copper coin and an iron nail. The copper is not attracted, but the iron is. Explain why, referring to the four magnetic materials. (2 steps)", "answer": "- Step 1: The copper coin is not attracted because **copper is not one of the four magnetic materials** (iron, steel, nickel, cobalt). Only these four metals are magnetic.\n- Step 2: The iron nail is attracted because **iron is a magnetic material** — it contains domains that can align with the external magnetic field, causing a force of attraction.\n+ This is a direct test of the fundamental fact: only iron, steel, nickel, and cobalt respond to magnets. Everything else (including copper, silver, aluminum, brass) is non-magnetic.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "A student claims that if you rub a plastic rod with cloth, you can transfer \"positive charge\" from the cloth to the rod. Explain why this wording is incorrect and what actually happens. (2 steps)", "answer": "- Step 1: **Protons never move** in everyday charging — they are locked in atomic nuclei. You cannot transfer \"positive charge\" because positive charge carriers (protons) cannot move through solids.\n- Step 2: What actually happens is that **electrons** transfer from one material to the other. If the rod ends up positive, it means it **lost electrons** (not gained positive charge). The cloth that gained those electrons becomes negatively charged.\n+ The wording \"positive charge moving\" is a common misconception. Always think in terms of electron transfer: lose electrons = become positive; gain electrons = become negative.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": true}, {"question": "A wire carrying current is placed in a uniform magnetic field. The wire is perpendicular to the field lines. What happens to the wire, and what determines the direction of the force? (1 step)", "answer": "- The wire experiences a **force** — this is the **motor effect**. The wire will move (or try to move) in a direction perpendicular to both the field and the current.\n+ The **direction** of this force is given by **Fleming's left-hand rule** (not the right-hand grip rule). This rule will be covered in detail in the next lesson.\n+ This is the key connection: the magnetic flux density B (in tesla) is defined through this force: F = BIL (when wire is perpendicular to the field).", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "In the PhET simulation Alex used, a field meter was placed in different positions around a magnet. The reading changed depending on where the meter was placed. What is the field meter actually measuring, and what does the reading represent? (1 step)", "answer": "- The field meter is measuring the **magnetic flux density (B)** — how strong the magnetic field is at that point.\n+ The reading corresponds to how **closely bunched the field lines are** at that location. Where field lines are close together (at the poles), B is high (strong field). Where lines are far apart, B is low (weak field).\n+ In the simulation, moving the meter closer to the poles gives a higher tesla reading; in the middle between poles, the reading is lower.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "Why is soft iron used as the core of an electromagnet rather than steel? (1 step)", "answer": "- **Soft iron** is magnetically soft — it gains magnetism easily when current flows but **loses it quickly** when the current is switched off. This allows you to turn the electromagnet on and off.\n+ **Steel** is magnetically hard — once magnetized, it keeps its magnetism (like a permanent magnet), so the electromagnet could not be easily turned off.\n+ This is why soft iron is the standard choice for controllable electromagnets (like in cranes, relays, and electric bells).", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "A bar magnet is placed under a sheet of paper. Iron filings are sprinkled on top, and the paper is gently tapped. The filings form a pattern of curved lines from N to S. If you placed a plotting compass at point X on one of these lines, which direction would its red (N) needle point? (1 step)", "answer": "- The red needle would point **along the field line**, towards the **S pole** of the magnet (or away from the N pole).\n+ Field lines show the direction a free N pole would be pushed — so a compass N end points in the same direction as the field line arrows, which is towards S.\n+ This is a classic test: compass N points to magnetic S.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "Draw or describe the field pattern when two bar magnets are arranged with their N poles facing each other but not touching. What feature marks the boundary between the two opposing fields? (1 step)", "answer": "- The field lines from each N pole **repel each other** and curve outward. In the space between them, there is a point where the two fields cancel completely — this is the **neutral point** (or point of zero field), often shown as a cross (×) on diagrams.\n+ No field lines pass through the neutral point — it's the boundary where the opposing fields meet and cancel.\n+ This contrasts with opposite poles facing (N-S), where field lines connect straight across, creating a uniform field.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "A long straight wire carries a current. At a distance of 2 cm from the wire, the magnetic field is measured. At 4 cm from the wire, what happens to the field strength? (1 step)", "answer": "- The field strength **decreases** with distance from the wire. Since the field lines are concentric circles that get further apart as you move away, the field is weaker further from the wire.\n+ Specifically, for a long straight wire, the magnetic field strength is inversely proportional to the distance from the wire (B ∝ 1/r). So at double the distance (4 cm vs 2 cm), the field is roughly half as strong.\n+ This is why coiling the wire into a solenoid (putting more wire in less space) concentrates the field — it increases the effective \"current density\" in a given region.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "In the car static electricity example, the air acts as the source of friction that transfers electrons. Why doesn't the charge transfer to the road through the tires? (1 step)", "answer": "- The tires are made of **rubber**, which is an **insulator**. Charge cannot flow through rubber to reach the road/earth.\n+ In contrast, the air (especially when the car is moving fast) can carry away or supply electrons — this is the friction that charges the car. The rubber creates an insulating barrier that traps the charge on the car.\n+ If the tires were conductive (like in some special cases), charge would leak away through the road, and the car would not build up static charge.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "A solenoid is connected to a battery. When the current is increased, what happens to the magnetic field inside the solenoid, and why? (1 step)", "answer": "- The magnetic field **gets stronger**. The field inside a solenoid is directly proportional to both the current and the number of turns per unit length (B ∝ nI).\n+ Increasing current increases the magnetic moment of each turn, and since the field from each turn adds up, the total field becomes stronger.\n+ This is one of the three \"C\"s for making electromagnets stronger: **Current** — increase it, and the field strengthens.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}], "count": 39}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "Why does rubbing two insulators together leave one positive and one negative, rather than creating new charge?", "answer": "Charge is never created — only electrons get transferred. Protons are locked inside the nucleus and cannot move between everyday objects, so the only way to \"charge\" something is to move electrons. When two insulators rub, friction strips electrons from one surface and deposits them on the other. The one that **loses** electrons is left with more protons than electrons → net **positive**. The one that **gains** electrons has more electrons than protons → net **negative**. The total charge of the system is unchanged — it's just been redistributed.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": true}, {"question": "A neutral object has equal numbers of protons and electrons. Why can you never \"transfer positive charge\" from one object to another? (2 steps)", "answer": "- Step 1: Positive charge lives on protons, and protons are bound inside the nucleus by the strong nuclear force. They do not detach in any ordinary mechanical process like rubbing.\n- Step 2: Electrons, however, are loosely held in the outer parts of the atom (especially valence electrons), so they CAN be transferred. So when we say \"an object became positive\", we really mean \"it lost electrons\" — never \"it gained protons\".\n\nThe takeaway: in everyday electrostatics, always describe charging in terms of electron movement.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "What is the difference between a conductor and an insulator in terms of why charge \"stays\" or \"leaks away\"?", "answer": "A **conductor** (most metals) has free electrons that can drift through the material — so any excess charge placed on it can flow away to earth or redistribute. An **insulator** (rubber, plastic, dry air, wood) has no free charges; electrons are tightly bound to their atoms, so excess charge is trapped where it was deposited. This is why a charged plastic rod stays charged for ages, but a charged
