 (excess of $$-1$$ charges).\n\n+ Contrast: the lesson's car example *lost* electrons → positive. This question flips it: *gaining* electrons → negative. The direction of electron transfer determines the sign.\n\nTakeaway: gain electrons = negative; lose electrons = positive. Always think about which side the electron count tips.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": false}, {"question": "A student is asked to describe the magnetic field between two opposite-pole magnets (N facing S). They write: \"The field is strong and points from S to N.\" Identify the error and give the correct description. (2 steps)", "answer": "- Step 1: The error is the **direction**. The student wrote \"S to N,\" but outside any magnet (including in the gap between two magnets), field lines point from **N to S**. In this arrangement, lines leave the N pole of one magnet, travel straight across the gap, and enter the S pole of the other magnet — so the direction in the gap is N→S.\n- Step 2: The correct full description: \"The field in the gap is **uniform** — straight, parallel, equally-spaced lines running from N to S. The field is the same strength and direction everywhere in the gap.\"\n\n+ This is the #3 trap from the lesson: field-line direction backwards. Always N→S externally.\n\nTakeaway: direction error is the most common slip; external direction is always N→S.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": false}, {"question": "Why is the statement \"iron filings show the direction of the magnetic field\" exam-trap wrong? What is the correct limitation, and what tool overcomes it? (2 steps)", "answer": "- Step 1: Iron filings show the **shape** of the field (where lines go, how they curve) and relative **strength** (where they bunch), but they do **not** show the **direction** (which way the arrows point, which pole is N vs S). A filing is a tiny induced magnet that aligns along the line, but it has no inherent \"red end\" or label — you cannot tell which end of the filing corresponds to N.\n- Step 2: The tool that overcomes this limitation is a **plotting compass**. The compass needle has a distinguishable red/pointy N end that always aligns with the field direction (pointing along N→S). The compass gives you both shape and direction.\n\n+ Exam question almost certainly asks: \"What can iron filings not show?\" Answer: direction / which pole is N or S.\n\nTakeaway: filings = shape only; compass = shape + direction.", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": false}, {"question": "You observe a magnetic field pattern where the lines curve, spread apart on one side, and bunch together on the other. Is this a uniform field? What single sentence test can you apply to any field diagram to check uniformity? (2 steps)", "answer": "- Step 1: This is **not** a uniform field. The lines are curved (direction changes from point to point) and unevenly spaced (strength varies — bunched = strong, spread = weak). A uniform field requires constant strength and constant direction everywhere.\n- Step 2: The single-sentence test: **\"Are the lines straight, parallel, and equally spaced with arrows all pointing the same way?\"** If yes → uniform. If any line curves, any spacing varies, or any arrow differs → non-uniform. This test catches all three failures: curved = direction change; unequal spacing = strength change; differing arrows = direction change.\n\nTakeaway: uniform = straight + parallel + equal spacing + same arrows. One deviation = non-uniform.", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": false}, {"question": "A solenoid has current circling clockwise as viewed from the right end. Using the right-hand grip rule, which end of the solenoid is the North pole? Walk through the hand gesture. (3 steps)", "answer": "- Step 1: Identify the current direction: viewed from the right end, the current circles **clockwise** around the coils.\n- Step 2: Apply the right-hand grip rule for a solenoid: **curl your right fingers in the direction the current circles** — clockwise as viewed from the right end. To curl your right fingers clockwise (from the right-end perspective), your fingers wrap from top → right → bottom → left.\n- Step 3: Your **right thumb** now points **away from you** (towards the left end of the solenoid). The thumb indicates the N pole, so the **left end is North** and the right end (where you're viewing from) is South.\n\n+ General rule: if current circles anticlockwise as viewed from an end, that end is N. If clockwise, that end is S. Here: clockwise from right end → right end is S → left end is N.\n\nTakeaway: clockwise from an end → that end is S; anticlockwise from an end → that end is N.", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": false}, {"question": "The equation $$F = BIl\\sin\\theta$$ defines the force on a current-carrying wire in a magnetic field. Even though you don't need the numbers yet, explain conceptually what each symbol represents and why $$\\sin\\theta$$ appears. (3 steps)", "answer": "- Step 1: The symbols:\n+ $$F$$ — the force on the wire (in newtons). This is the \"motor effect\" force that pushes the wire.\n+ $$B$$ — magnetic flux density (in tesla). How strong the field is.\n+ $$I$$ — current in the wire (in amperes). How much charge is flowing per second.\n+ $$l$$ — length of wire inside the field (in metres). How much wire is \"exposed\" to the field.\n- Step 2: $$\\theta$$ is the **angle between the wire and the magnetic field direction**. The force is maximum when the wire is **perpendicular** to the field ($$\\theta = 90^\\circ$$, $$\\sin 90^\\circ = 1$$) and zero when the wire is **parallel** to the field ($$\\theta = 0^\\circ$$, $$\\sin 0^\\circ = 0$$).\n- Step 3: The $$\\sin\\theta$$ factor appears because only the **perpendicular component** of the current relative to the field contributes to the force. A current running exactly along the field lines experiences no magnetic force — it \"slides along\" the field. The perpendicular component ($$I\\sin\\theta$$) is the part that \"cuts across\" the field and generates force. This is why the simple formula $$F = BIL$$ assumes $$\\theta = 90^\\circ$$ (wire perpendicular to field).\n\n+ Preview: next lesson covers this quantitatively. For now, recognise the equation and understand why perpendicular = maximum force.\n\nTakeaway: force depends on how \"crosswise\" the current cuts the field; $$\\sin\\theta$$ captures this geometry.", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": false}, {"question": "The unit of $$B$$ is the tesla, which equals $$\\text{N} \\, \\text{A}^{-1} \\, \\text{m}^{-1}$. Starting from the equation $$F = BIl$$ (with $$\\theta = 90^\\circ$$), show how this unit breakdown is derived. (3 steps)", "answer": "- Step 1: Rearrange $$F = BIl$$ to solve for $$B$$: $$B = \\frac{F}{Il}$$.\n- Step 2: Substitute the SI units of each quantity:\n+ $$F$$ is in newtons (N)\n+ $$I$$ is in amperes (A)\n+ $$l$$ is in metres (m)\n- Step 3: The unit of $$B$$ is therefore $$\\frac{\\text{N}}{\\text{A} \\times \\text{m}} = \\text{N} \\, \\text{A}^{-1} \\, \\text{m}^{-1}$$, which is defined as one tesla (T). So: $$1 \\, \\text{T} = 1 \\, \\text{N} \\, \\text{A}^{-1} \\, \\text{m}^{-1}$$.\n\n+ Physical reading: \"1 tesla is the field that produces 1 newton of force on 1 metre of wire carrying 1 ampere of current (perpendicular to the field).\"\n\nTakeaway: the tesla's unit breakdown comes directly from the defining equation $$B = F/(Il)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_50", "judge_pick": false}, {"question": "A student mixes up the two hand rules: they use the LEFT hand for the field around a wire, and the RIGHT hand for the force on the wire. What should each hand actually be used for, and what quantity does each rule determine? (2 steps)", "answer": "- Step 1: The **RIGHT-hand grip rule** is for the **magnetic field direction around a current-carrying wire or solenoid**. Thumb = current direction; curled fingers = field direction. This rule tells you *which way the field circles*.\n- Step 2: The **LEFT-hand rule (Fleming's)** is for the **force direction on a current-carrying wire in an external magnetic field** (the motor effect). First finger = field ($$B$$); second finger = current ($$I$$); thumb = force ($$F$$). This rule tells you *which way the wire is pushed*.\n\n+ The two rules answer different physical questions: right hand = \"what field does the current create?\" Left hand = \"what force does an existing field exert on the current?\" Different hands, different jobs.\n\nTakeaway: RIGHT hand = field from current; LEFT hand = force on current. Never swap them.", "source": "GLM 5.1 ②", "_id": "glm_2_51", "judge_pick": true}, {"question": "Conventional current is defined as flowing in the direction positive charge would move. In a metal wire, which particles actually move, and in which direction relative to conventional current? Why does this naming convention exist? (3 steps)", "answer": "- Step 1: In a metal wire, **electrons** are the particles that actually move (they are the mobile charge carriers in metals). Electrons carry negative charge, so they flow from the negative terminal towards the positive terminal of the supply.\n- Step 2: Conventional current is defined as flowing from **positive to negative** — the opposite direction to the electron flow. So in a metal wire, conventional current and electron flow are **antiparallel** (opposite directions).\n- Step 3: This convention exists because the definition of conventional current was established **before electrons were discovered** (in the early 1800s). Scientists assumed positive charge was moving. By the time electrons were identified (1897), the convention was deeply embedded in all existing equations, circuit diagrams, and hand rules. Changing it would have caused chaos, so we keep \"conventional current = positive to negative\" and simply remember that electrons go the other way.\n\n+ Parallel trap: Earth's \"geographic North\" is magnetically a South pole — another backwards naming convention from history.\n\nTakeaway: conventional current ≠ electron flow direction; both are historical conventions that must be kept straight.", "source": "GLM 5.1 ②", "_id": "glm_2_52", "judge_pick": true}, {"question": "You have two identical bar magnets. You place them with N facing N across a small gap. A student places a plotting compass exactly at the midpoint of the gap. What does the compass needle do, and why? (3 steps)", "answer": "- Step 1: At the midpoint between two like poles (N–N), the fields from each magnet are equal in magnitude (same distance, same magnet strength) but point in **opposite directions**. One N pole pushes the compass's N end away to the left; the other N pole pushes it away to the right.\n- Step 2: The two fields **cancel exactly** at the midpoint. The net magnetic field is zero: $$B = 0$$. This is the **neutral point**.\n- Step 3: A compass needle at a neutral point **spins freely and does not settle in any direction**, because there is no net field to align it. It might point in any random orientation depending on friction or small perturbations, but it will not show a consistent direction.\n\n+ If the compass is moved even slightly off-centre (towards one magnet), the nearer magnet's field dominates and the needle will snap to align with that field.\n\nTakeaway: neutral point = zero net field = compass has no preferred direction.", "source": "GLM 5.1 ②", "_id": "glm_2_53", "judge_pick": false}, {"question": "A magnetic field line diagram shows lines that are straight, parallel, and equally spaced, all pointing to the right. A 2 cm length of wire carrying 3 A of current is placed perpendicular to these lines in this region. Without calculating a number, describe qualitatively what happens to the wire and which rule you use to find the force direction. (2 steps)", "answer": "- Step 1: The wire experiences a **force** because it carries current and sits in a magnetic field, and it is perpendicular to the field ($$\\theta = 90^\\circ$$, so $$\\sin\\theta = 1$$, maximum force). The field is uniform, so the force is the same everywhere along the 2 cm length. The wire will be pushed in a direction perpendicular to *both* the field and the current.\n- Step 2: To find the force direction, use **Fleming's Left-Hand Rule** (not the right-hand grip rule — that's for the field *from* the current, not the force *on* the current). First finger = field direction (to the right); second finger = current direction (perpendicular to field, into or out of the page depending on setup); thumb = force direction (the remaining perpendicular direction).\n\n+ This is preview material for next lesson — the motor effect. The key insight: uniform field + perpendicular current = maximum, consistent force on the wire.\n\nTakeaway: wire in uniform field perpendicular to current = force; use LEFT hand for direction.", "source": "GLM 5.1 ②", "_id": "glm_2_54", "judge_pick": false}, {"question": "A student reasons: \"The Earth's geographic North Pole must be a magnetic North Pole because that's where the compass points.\" Identify the logical error and explain the correct magnetic identity of that location. (2 steps)", "answer": "- Step 1: The error is assuming that \"where the compass points\" must be the same magnetic polarity as the compass's pointing end. The compass's red end is a **magnetic North pole**. By the fundamental rule \"opposite poles attract,\" a North pole is attracted to a **South pole**. So the compass's N end points towards whatever magnetic pole is at that location — which must be a **South pole**.\n- Step 2: The correct identity: the location near the geographic North Pole is a **magnetic South pole**. The Earth's internal \"bar magnet\" is oriented with its South end pointing roughly towards geographic North. This is why the compass's N end points there — it is attracted to that magnetic South. The naming of \"geographic North\" is a human convention unrelated to magnetic polarity.\n\n+ The student's error is the same type as \"conventional current flows the way positive charge would move\" — a naming convention that contradicts the underlying physics if you don't think carefully.\n\nTakeaway: compass N end → attracted to magnetic S pole → geographic North = magnetic South.", "source": "GLM 5.1 ②", "_id": "glm_2_55", "judge_pick": true}, {"question": "You are asked: \"Describe the magnetic field produced by a current-carrying straight wire.\" Using the three-property framework (strength, direction, shape), give a complete answer. (3 steps)", "answer": "- Step 1: **Strength**: the field is strongest **closest to the wire** (lines are most densely packed there) and weakens with increasing distance from the wire (lines become more widely spaced). The field is non-uniform — it varies with radial distance.\n- Step 2: **Direction**: the field circles the wire. At any point, the field direction is **tangent to the circle** at that point, following the right-hand grip rule (thumb = current, fingers = field circulation direction). The direction reverses if the current reverses.\n- Step 3: **Shape**: the field lines form **concentric circles** centred on the wire, lying in planes perpendicular to the wire. Each circle is a closed loop (no start or end — the field circles endlessly around the current path).\n\n+ Contrast with a bar magnet: bar magnet lines loop N→S externally and S→N internally; wire lines are simple circles with no poles.\n\nTakeaway: wire field = concentric circles; strongest near wire; direction from right-hand grip; non-uniform.", "source": "GLM 5.1 ②", "_id": "glm_2_56", "judge_pick": false}, {"question": "Why is it physically impossible for a single isolated North pole (a \"magnetic monopole\") to exist, based on what you know about where magnetism originates in materials? Give the intuitive explanation (not the exam answer). (2 steps)", "answer": "- Step 1: Magnetism in everyday materials originates from **aligned magnetic domains** — tiny regions where groups of electron spins are all pointing the same way. Each domain is like a microscopic bar magnet with both a N and S end. When many domains align throughout a piece of iron, their N ends all point one way and their S ends all point the other way, creating the macroscopic magnet's two poles.\n- Step 2: Because the domains are distributed **throughout the entire volume** of the material, not concentrated at the ends, you cannot separate \"the N part\" from \"the S part.\" Cutting the magnet just creates a new boundary where S appears on one face and N on the other — each half still contains domains with both polarities. A magnetic monopole would require all the \"N-ness\" to be in one place with no compensating \"S-ness,\" which the domain structure cannot produce.\n\n+ University-level note: classical electromagnetism (Maxwell's equations) also forbids monopoles mathematically ($$\\nabla \\cdot B = 0$$). No monopole has ever been observed experimentally.\n\nTakeaway: domains fill the whole volume → both poles always coexist → no isolated monopole.", "source": "GLM 5.1 ②", "_id": "glm_2_57", "judge_pick": true}, {"question": "A straight wire carries current upward. You place a plotting compass on the *west* side of the wire. Which way does the compass's red (N) end point — towards you or away from you? Use the right-hand grip rule. (3 steps)", "answer": "- Step 1: Apply the right-hand grip rule: point your right thumb **upward** (current direction). Your curled fingers wrap around the wire, circling from the west side over the top to the east side and back under.\n- Step 2: At the **west** side of the wire, your curled fingers are pointing **away from you** (into the page, i.e. southward if north is out of the page). This is the field direction at that point.\n- Step 3: The compass's red (N) end aligns with the field direction, so it points **away from you** (into the page / southward) at the west side.\n\n+ Quick check: at the east side, the field points towards you (out of the page / northward). The circle is consistent — west side and east side have opposite field directions, both tangent to the circle.\n\nTakeaway: current up → west side field into page; east side field out of page. Right-hand grip confirms.", "source": "GLM 5.1 ②", "_id": "glm_2_58", "judge_pick": false}, {"question": "You have a solenoid with a soft-iron core inside. The current is flowing. You then reverse the direction of the current. What two changes happen to the solenoid's magnetic field? (2 steps)", "answer": "- Step 1: The **polarity reverses**: the end that was North becomes South, and the end that was South becomes North. Reversing the current reverses the direction the current circles around the coils, so the right-hand grip rule now gives the opposite thumb direction — the N pole swaps to the other end.\n- Step 2: The **field strength stays the same** (assuming the current magnitude is unchanged). The same number of turns, the same current magnitude, and the same iron core produce the same $$B$$ value — only the direction flips. The iron core's domains also reverse their alignment to follow the new field direction, so the core still amplifies the field by the same factor.\n\n+ Practical use: in AC motors, the current direction reverses every half-cycle, making the electromagnet's poles swap continuously — this drives rotation.\n\nTakeaway: reverse current = reverse polarity; same magnitude = same strength.", "source": "GLM 5.1 ②", "_id": "glm_2_59", "judge_pick": false}, {"question": "A permanent magnet and an electromagnet are placed side by side. A small iron filing is positioned between them and moves towards the electromagnet. A student concludes: \"The electromagnet must be stronger because the filing was attracted to it.\" Is this reasoning valid? What else could explain the observation? (2 steps)", "answer": "- Step 1: The reasoning is **not necessarily valid**. The filing moved towards the electromagnet, which means the net force on the filing pointed towards the electromagnet. This could indeed mean the electromagnet's field is stronger at the filing's position. But there is another possibility.\n- Step 2: The **permanent magnet could be pushing the filing away** (if the filing is near the permanent magnet's like pole, e.g. near its N end while the filing's induced N end faces it → repulsion). The filing could be moving towards the electromagnet not because the electromagnet is strong, but because the permanent magnet is *repelling* it. The net force = attraction from electromagnet + repulsion from permanent magnet, both pushing the filing the same way.\n\n+ This is why \"interact\" is safer than \"attract\" — you don't always know whether the force is attractive or repulsive from each source without more information.\n\nTakeaway: motion towards one magnet doesn't prove that magnet is stronger; the other magnet could be repelling.", "source": "GLM 5.1 ②", "_id": "glm_2_60", "judge_pick": false}, {"question": "What is the difference between \"magnetic flux density\" and \"magnetic field strength\" in the context of this chapter? Are they the same quantity or different quantities? (1 step)", "answer": "- Step 1: In the context of this IAL chapter, **magnetic flux density and magnetic field strength are the same quantity**, both represented by the symbol $$B$$ and both measured in tesla. They are two names for the same thing: how closely packed the magnetic field lines are, i.e. how strong the field is per unit area. The term \"flux density\" emphasises the \"lines per area\" interpretation; \"field strength\" emphasises the \"how much force\" interpretation. In more advanced physics (university level), these terms can refer to different quantities ($$B$$ vs $$H$$), but at A-level they are treated as synonymous.\n\n+ The data booklet and specification use $$B$$ for both names interchangeably.\n\nTakeaway: at this level, flux density = field strength = $$B$$ = tesla. Same thing, two names.", "source": "GLM 5.1 ②", "_id": "glm_2_61", "judge_pick": true}], "count": 62}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "What are the only four materials that a magnet can attract, and why does steel count even though it's not a pure element? (2 steps)", "answer": "- Step 1: The complete list of magnetic materials is: **iron, steel, nickel, cobalt**. These are the *only* four — no other everyday material (not copper, not aluminium, not silver, not gold) is attracted to a magnet.\n+ A common trap is guessing \"silver\" for a coin — a US 5-cent coin is literally called a \"nickel\" because it's made of nickel, which *is* magnetic. Silver is not.\n- Step 2: Steel counts because it is mostly iron with a small amount of carbon added. It is the **iron content** that makes steel magnetic — the carbon itself is non-magnetic, but it doesn't cancel out iron's magnetism. So \"anything metallic that is attracted to a magnet contains at least one of those four.\"\n\nTakeaway: the list is closed — four materials, no exceptions at this level.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "Copper and aluminium are metals, yet they are not magnetic. What does this tell us about the relationship between \"being a metal\" and \"being magnetic\"? (2 steps)", "answer": "- Step 1: Being a metal and being magnetic are **independent properties** — one does not imply the other. Most metals (copper, aluminium, silver, gold, lead, zinc…) are *not* magnetic. Only four specific metals/alloys (iron, steel, nickel, cobalt) are.\n- Step 2: The deep reason (university-level, but useful for intuition): magnetism in materials comes from the alignment of electron spins inside the atoms, forming \"domains.\" In iron, nickel, and cobalt, the electron configuration allows these domains to align and stay aligned. In copper and aluminium, the electron configuration does not allow stable domain alignment — so even though they conduct electricity perfectly, they cannot be permanent magnets. You don't need this detail for exams, but it explains *why* the list is so short.\n\nTakeaway: \"metal\" ≠ \"magnetic.\" The four magnetic materials are special because of their internal atomic structure.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "A permanent magnet keeps its magnetism; a temporary magnet loses it quickly. What material property links to each, and why does this make steel suited for permanent magnets while iron is suited for electromagnets? (3 steps)", "answer": "- Step 1: The linking property is **magnetic hardness vs softness**. A *magnetically hard* material (e.g. steel) retains its magnetism once it has been magnetised — it is difficult to magnetise but also difficult to demagnetise. A *magnetically soft* material (e.g. iron, also nickel and cobalt in pure form) is easy to magnetise but also easy to demagnetise — it loses magnetism quickly when the external field is removed.\n- Step 2: This is why steel is used for **permanent magnets** (e.g. bar magnets, compass needles) — you want them to stay magnetised forever. Iron is used for **electromagnet cores** — you want the magnetism to appear when the current is on and disappear when the current is off, so the electromagnet can be switched on and off.\n+ If you made an electromagnet with a steel core, it would stay magnetised even after you switched the current off — defeating the purpose of an electromagnet.\n- Step 3: The one-line memory hook: \"hard = holds on to magnetism (permanent); soft = gains and loses it easily (temporary / electromagnet).\"\n\nTakeaway: hard ↔ permanent, soft ↔ temporary — and the practical choice depends on whether you want the magnetism to persist or to be switchable.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "A paperclip is not a magnet on its own, but when you place it near a strong bar magnet it clings to the magnet and can even pick up a second paperclip. What name is given to this phenomenon, and why does the second paperclip fall when you remove the strong magnet? (3 steps)", "answer": "- Step 1: This phenomenon is called **induced magnetism**. When a piece of magnetic material (the paperclip, which is steel/iron) is placed inside another magnet's field, the field forces the domains inside the paperclip to align — the paperclip *becomes* a magnet itself, temporarily.\n- Step 2: The first paperclip's induced N pole is attracted to the bar magnet's S pole (or vice versa), so it clings. Because the first paperclip is now itself a magnet, it has its own field that can induce magnetism in the second paperclip — which then clings to the first one.\n- Step 3: When you remove the strong bar magnet, the first paperclip is no longer in an external field. Since paperclips are made of magnetically **soft** material (iron/steel alloy), the domains quickly randomise again — the induced magnetism disappears. The first paperclip stops being a magnet, so it can no longer hold the second one, and both fall.\n\nTakeaway: induced magnetism is temporary magnetism created by an external field; it vanishes when the field is removed (for soft materials).", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "The textbook definition of a magnetic field is \"a region in which a magnetic material, or a moving charged object, feels a force.\" Why are there two separate categories of things mentioned (magnetic materials *and* moving charges), and what happens if the charge is not moving? (3 steps)", "answer": "- Step 1: A magnetic field exerts a force on **two distinct categories**: (a) magnetic materials — things like iron, steel, nickel, cobalt that are attracted/repelled by the field; and (b) moving charged objects — a charge that is *moving* through the field feels a force. Both categories are listed because they are physically different mechanisms (domain alignment vs the Lorentz force), but both experience a force in the same field.\n- Step 2: The crucial qualifier is **\"moving\"**. A stationary charge in a magnetic field feels *no magnetic force at all*. The magnetic force on a charge depends on its velocity — the formula preview is $$F = Bqv\\sin\\theta$$, where $$v$$ is the speed. If $$v = 0$$, then $$F = 0$$.\n+ This is fundamentally different from an electric field, where a charge feels a force whether it's moving or stationary ($$F = qE$$, no velocity term).\n- Step 3: So the definition must include \"moving\" because it's the key distinction — a magnetic field does nothing to a static charge. The field only \"acts\" on a charge when there is relative motion between the charge and the field.\n\nTakeaway: \"moving\" is not optional in the definition — it's the reason magnetic forces exist at all for charges.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": true}, {"question": "Outside a bar magnet, field lines are drawn with arrows pointing from N to S. A common mistake is to reverse this. Conceptually, what does the arrow direction represent, and why must it go N→S rather than S→N? (3 steps)", "answer": "- Step 1: The arrow on a field line shows **the direction a free North pole would be pushed** if placed at that point. Since a N pole is repelled by the magnet's N end and attracted to the magnet's S end, the force on a free N pole points *away* from N and *towards* S — so the arrows run N→S outside the magnet.\n- Step 2: You can equivalently think of it as \"the direction a positive test object would move.\" This is the standard convention in all field diagrams (gravitational field lines point towards the mass, electric field lines point away from positive charge, magnetic field lines point away from N and towards S — always the direction of force on the \"test\" object).\n+ A free South pole would be pushed the opposite way (towards N, away from S), but we don't use S poles as the test object — the convention is fixed: field direction = force on a N pole / positive test.\n- Step 3: Inside the magnet, the field lines complete the loop and run S→N (from the S pole inside to the N pole inside), so the full loop is: out of N → through external space → into S → through interior → back to N. But for exam purposes, you almost always describe the *external* field, which is N→S.\n\nTakeaway: field arrows = force direction on a free N pole. A N pole is pushed *away* from N and *toward* S, hence N→S outside.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": true}, {"question": "On a field-line diagram, how do you visually determine where the magnetic field is strongest, and what physical reason causes the lines to bunch up there? (2 steps)", "answer": "- Step 1: The rule is: **closer lines = stronger field; farther apart lines = weaker field**. Where the lines are most densely packed (most lines per unit area), the field is strongest. For a bar magnet, the lines bunch up at the two poles (the ends) — so the field is strongest at the ends.\n- Step 2: The physical reason: field lines represent the *density* of the magnetic flux. Near the poles, the magnet is producing the most concentrated flux — all the lines emerge from a small area at the N end and converge into a small area at the S end. In the middle of the magnet's side, the lines are spread over a much larger area, so the field is weaker there. Think of it like water flow: if the same amount of water passes through a narrow pipe, the flow speed (intensity) is higher; if it spreads into a wide channel, the flow speed drops.\n\nTakeaway: line spacing is a visual code for field strength — dense = strong, sparse = weak.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": true}, {"question": "What three properties must you always describe when asked about a magnetic field, and what is the specific answer for each one for a single bar magnet? (2 steps)", "answer": "- Step 1: The three required properties are **strength, direction, and shape**. Alex emphasised this as the exam structure: any \"describe the field\" question should be answered with these three in mind.\n- Step 2: For a single bar magnet:\n+ **Strength** — strongest at the two ends (poles), weakest at the sides in the middle. Seen as lines bunching at the poles.\n+ **Direction** — arrows on the field lines point from N to S (outside the magnet), following the path a free N pole would take.\n+ **Shape** — lines radiate out of the N end, curve through the surrounding space in looping arcs, and re-enter the S end. Alex described them as \"circular-ish\" loops connecting N to S.\n\nTakeaway: always answer field-description questions with strength, direction, shape — it's the complete answer every time.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "Two field lines are drawn crossing at a point on a student's diagram. Why is this physically impossible, and what would it mean if it could happen? (2 steps)", "answer": "- Step 1: Field lines **never cross**. This is a fundamental rule. The reason: at any point in space, the magnetic field has exactly **one direction** — the field vector $$\\vec{B}$$ points one way. If two lines crossed, there would be two different directions at the same point, meaning the field would be pushing a N pole in two different directions simultaneously, which is impossible.\n- Step 2: If crossing were possible (it isn't), it would imply that a charged particle or a N pole at that point would feel two forces in different directions — the net force would be ambiguous, and the field wouldn't have a well-defined direction. Since a field is defined by the force it produces, and force has a unique direction at any point, crossing lines contradict the definition of a field.\n+ A \"neutral point\" (where the field is zero) is different from a crossing point. At a neutral point, the fields from two sources cancel to zero — there are no lines there at all (you mark it with a cross ×, meaning \"no field\"), not lines that cross.\n\nTakeaway: one point = one field direction = no crossing lines. A neutral point has zero field, not two crossing fields.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": true}, {"question": "If you cut a bar magnet exactly in half, do you get a separate N piece and a separate S piece? Explain what you actually get and the deeper reason why. (3 steps)", "answer": "- Step 1: You do **not** get a lone N pole or a lone S pole. Each half becomes a **complete, smaller magnet** with its own N end and S end. The cut face that was previously inside the magnet becomes a new pole — if you cut through the middle, the face near the original N becomes a new S, and the face near the original S becomes a new N.\n- Step 2: You can keep cutting and you will never isolate a single pole. This is because **magnetic monopoles do not exist** (as far as all known physics tells us). Magnetism always comes in N-S pairs — it is a *dipole* phenomenon.\n- Step 3: The deeper (university-level) reason that Alex showed then crossed out: magnetism in materials comes from **aligned electron spins** forming domains. Each electron's magnetic behaviour is itself a tiny dipole — it has both a N and S aspect. Since the source of magnetism is already dipolar at the microscopic level, you can never \"cut down\" to a single pole. Even a single electron is a dipole. This is not examinable at GCSE/ESAT/A-level, but it explains *why* the result is inevitable.\n\nTakeaway: cut a magnet → two smaller magnets, never a lone pole. Magnetic monopoles don't exist because the source (electron spins) is inherently dipolar.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": true}, {"question": "A plotting compass is used to trace field lines. What is a plotting compass physically, and why does its pointer align the way it does — which end points towards which pole of the bar magnet? (3 steps)", "answer": "- Step 1: A plotting compass is a **tiny pivoted bar magnet** — a small magnetic needle that can rotate freely on a pivot. Its red/pointy end is the needle's N pole; its other end is its S pole.\n- Step 2: When placed in a magnetic field, the compass needle aligns with the field direction at that point — its N end points along the field line (in the direction the field pushes a N pole). Since field lines run N→S outside the magnet, the compass's N (red) end points *towards* the magnet's **S pole** (because the field direction at that location leads towards S).\n+ This is a common trap: you might guess the red end points \"north\" or towards the magnet's N pole — it actually points towards the magnet's S pole, following the N→S field direction.\n- Step 3: To trace a full field line: place the compass near the N pole, mark a dot where the red end aims; move the compass so its tail sits on that dot, mark the new dot; repeat, joining the dots all the way to the S pole. The chain of dots traces one complete field line.\n\nTakeaway: the compass's N (red) end follows the field direction — which leads *towards* the magnet's S pole, not its N pole.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "Iron filings sprinkled on paper above a magnet reveal the field's shape beautifully, yet they have a critical limitation compared to a plotting compass. What can iron filings never show, and why? (3 steps)", "answer": "- Step 1: Iron filings show **the shape of the field** (where the lines are, how they curve) and **where the field is strong** (filings bunch together where the field is strong, spread apart where it's weak). Each filing becomes a tiny induced magnet and aligns with the local field direction, so collectively they trace out the field pattern.\n- Step 2: The critical limitation: iron filings **cannot show the direction** of the field — you cannot tell which end is N and which is S from an iron-filing pattern alone. A filing aligns along the field line, but it doesn't have a marked N/S end, so you can't see which way the arrow should point. The filing could point either way along the line and still be aligned.\n- Step 3: To determine direction, you **must** use a plotting compass (which has a marked N/red end that shows the field direction). Examiners specifically ask \"what can iron filings not tell you?\" — the answer is always: **the direction / which pole is N or S**.\n\nTakeaway: filings = shape + strength only; compass = shape + strength + direction. For direction, you need the compass.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": true}, {"question": "You have two bar magnets placed a small distance apart. Describe the arrangement that creates a uniform magnetic field in the gap, and explain why the opposite arrangement (like poles facing) fails to do so. (3 steps)", "answer": "- Step 1: A **uniform magnetic field** is one where the field has the same strength and the same direction at every point — visually, the field lines are **straight, parallel, and equally spaced**. To create one with two bar magnets: place them with **opposite poles facing each other** (N facing S across the gap), and fix them so they cannot move.\n- Step 2: Why this works: the N pole of one magnet and the S pole of the other attract each other. Their fields reinforce in the gap — both push a test N pole in the *same* direction (from N towards S). The lines run straight across the gap, equally spaced, because the combined field is consistent everywhere in that region.\n- Step 3: Why like poles facing (N–N or S–S) fails: like poles repel. Their fields push in *opposite* directions in the gap, creating a **neutral point** (marked with ×) in the centre where the fields cancel to zero. The lines curve away from each other instead of running straight — nowhere in the gap is the field uniform.\n+ Imagine yourself as a positive test charge sitting between two N poles: both push you away from their respective N ends, so in the exact middle the forces balance and you feel nothing — that's the neutral point.\n\nTakeaway: opposite poles facing → fields reinforce → uniform; like poles facing → fields oppose → neutral point, no uniformity.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "A compass needle on Earth points towards what we call \"geographic north.\" Paradoxically, it is pointing at a magnetic *south* pole. Explain this step by step — how does this make sense? (3 steps)", "answer": "- Step 1: The Earth behaves like a **giant bar magnet** tilted inside the planet, but it's oriented \"upside down\" compared to what you'd naively expect. The end of this giant magnet that sits near the **geographic North Pole** is actually a **magnetic south pole**.\n- Step 2: A compass needle is a small magnet. Its N (red) end is attracted to a magnetic **south** pole (opposite poles attract). So the needle's N end is attracted towards the Earth's magnetic south pole — which happens to be located near the geographic North Pole. The needle swings so its N end points \"north\" geographically, but magnetically it is pointing at a south pole.\n- Step 3: This is a sign-convention trap that mirrors the conventional-current vs electron-flow confusion. In both cases, the \"everyday\" name (current flows from + to −; compass points north) is opposite to the underlying physical direction (electrons move from − to +; the needle points at a magnetic S). Alex flagged both as places where \"physics people keep getting things the wrong way round\" — keep them straight.\n\nTakeaway: geographic north ≈ magnetic south. The compass N end seeks a magnetic S pole, which on Earth sits near geographic north.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "When a current flows through a straight wire, what is created around the wire, and what is the four-word chain (all starting with C) that summarises the cause-and-effect? (2 steps)", "answer": "- Step 1: When a **current** flows through a **conductor** (the wire), a **magnetic** field is created around the wire. A magnet produced this way is called an **electromagnet**. The four-word chain: **Current → Conductor → Magnetic → Electromagnet**.\n- Step 2: This is the foundational fact of electromagnetism: the field exists only while the current flows. Switch the current off → the field disappears. This is what makes electromagnets useful — you can switch them on and off, unlike permanent magnets. The field lines around a straight wire are **concentric circles** centred on the wire, getting weaker further out (lines are more spread apart at greater distance).\n\nTakeaway: current in a conductor creates a magnetic field → that's an electromagnet. No current, no field.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "You grip a current-carrying wire with your right hand, thumb pointing along the current. What does each part of your hand represent, and why must it be the *right* hand specifically? (3 steps)", "answer": "- Step 1: The **right-hand grip rule**: your **thumb** points along the direction of conventional current (from + to −); your **curled fingers** show the direction the circular magnetic field wraps around the wire. The field lines are concentric circles, and the fingers tell you whether they circle clockwise or anticlockwise when viewed from a particular angle.\n- Step 2: It must be the **right** hand because the physics of electromagnetism has a fixed handedness — the relationship between current direction and field direction is not arbitrary. If you used your left hand, your fingers would curl the opposite way, giving the wrong field direction. This is a sign convention rooted in the cross-product in the underlying mathematics ($$\\vec{B}$$ direction from $$\\vec{I}$$ follows a right-hand rule).\n- Step 3: This rule is specifically for finding **the field around a wire/solenoid**. Next lesson introduces a *different* rule — **Fleming's left-hand rule** — for finding **the force on a wire in a field**. Different hands, different purposes. Mixing them up is trap #8 from the lesson: right hand for field direction, left hand for force direction.\n\nTakeaway: right-hand grip → thumb = current, fingers = field direction. Right hand only. Left hand is for a different rule coming next.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "A straight wire carries current flowing *into* the page (drawn as ⊗). Sketching the circular field lines around this wire, are they clockwise or anticlockwise? Walk through the right-hand grip logic. (2 steps)", "answer": "- Step 1: Point your right thumb **into the page** (the current direction). With your thumb pointing away from you into the page, curl your right fingers naturally — they curl **clockwise** when viewed from your perspective (looking at the page).\n- Step 2: Therefore, the concentric circular field lines around a wire with current going into the page are **clockwise**. If the current were coming *out* of the page (⊙), your thumb would point towards you, and your fingers would curl anticlockwise — the field would be anticlockwise. This is the textbook check Alex confirmed.\n\nTakeaway: current into page → clockwise field; current out of page → anticlockwise field. Always verify with the right-hand grip.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "There are three ways to make an electromagnet stronger, and they all begin with the letter C. Name each one and explain the physical reason why it increases the field strength. (3 steps)", "answer": "- Step 1: The three strengtheners are: **Current** (increase it), **Coils** (add more turns of wire), **Core** (add a soft-iron core inside the coil).\n- Step 2: Physical reasons for each:\n+ **Current**: a larger current means more charge flowing per second → more moving charges creating the magnetic field → stronger field. The field strength is directly proportional to current ($$B \\propto I$$).\n+ **Coils**: winding the wire into a coil (solenoid) with more turns concentrates the field. Each turn of wire contributes its own circular field; with many turns stacked together, their fields superimpose and reinforce, producing a much stronger combined field in the same space. More turns = more wire carrying current in the same region = stronger.\n+ **Core**: inserting a soft-iron core inside the coil channels and concentrates the field lines. Iron is magnetically soft, so it becomes strongly magnetised by induction (its domains align with the coil's field), greatly amplifying the total field. Without the core, the field spreads into air (which doesn't amplify it); with the core, the iron's own induced magnetism adds to the coil's field.\n- Step 3: The mnemonic: **Current, Coils, Core** — all start with C, all make the electromagnet stronger. This is the list Alex asked you to memorise as a group.\n\nTakeaway: bigger current, more turns, iron core — each has a distinct physical mechanism, but all boost $$B$$.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "Why is a soft-iron core used inside an electromagnet coil rather than a steel core? What would go wrong with steel? (2 steps)", "answer": "- Step 1: A **soft-iron core** is magnetically soft — it is easy to magnetise (domains align readily when the coil's field is on) and easy to demagnetise (domains randomise quickly when the current is switched off). This means the electromagnet is strong when on and effectively off when the current stops — exactly what you want.\n- Step 2: A **steel core** would be magnetically hard. It would also strengthen the field while the current is on (steel contains iron), but when you switch the current off, the steel would **retain its magnetism** — the electromagnet would stay magnetised. You would lose the key advantage of an electromagnet: the ability to switch it on and off. The device would behave like a permanent magnet that happens to get slightly stronger when current flows.\n\nTakeaway: soft iron = switchable magnetism; steel = permanent magnetism that persists. Electromagnets need switchability, so soft iron is essential.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "A solenoid is a coil of wire wound into a long spring shape. What does its external magnetic field look like, and how do you determine which end acts as the N pole? (3 steps)", "answer": "- Step 1: The **external field** of a solenoid looks exactly like a **bar magnet's field** — the field lines emerge from one end, loop around the outside, and re-enter the other end. One end behaves as a N pole, the other as a S pole. This is why a solenoid is effectively an electromagnet with a bar-magnet-like field pattern.\n- Step 2: To find which end is N, use the **right-hand grip rule adapted for the solenoid**: curl your right fingers in the direction the **current flows around the coils** (follow the wire as it spirals); your right thumb then points towards the **N end** of the solenoid.\n+ If the current spirals anticlockwise when viewed from one end, your fingers curl anticlockwise and your thumb points towards you — that end is N. The other end is S.\n- Step 3: The external lines run N→S as expected. **Inside** the solenoid, there is a strong, roughly uniform field running **S→N** (completing the loop from the S end inside to the N end inside). This internal uniform field is a key feature that a bar magnet has too, but we can't see inside a solid magnet — the solenoid lets us access it.\n\nTakeaway: solenoid externally = bar magnet; N end found by right-hand grip (fingers = current direction in coils, thumb = N). Inside: strong, S→N, roughly uniform.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "Inside a solenoid, the field runs from S to N and is roughly uniform. Why is this internal field important for the motor effect (coming next lesson), and why can't we easily access this same region inside a solid bar magnet? (2 steps)", "answer": "- Step 1: The motor effect requires placing a **current-carrying wire inside a uniform magnetic field** so that the wire experiences a force ($$F = BIL$$). A solenoid's interior provides exactly this: a region of strong, roughly uniform field that you can physically reach (the solenoid is hollow — you can insert a wire inside it). This is why solenoids are practical for motors and other electromagnetic devices.\n- Step 2: A solid bar magnet has the same S→N internal field, but you **cannot access the inside** of a solid iron bar to place a wire there. The solenoid is essentially a \"bar magnet you can reach into\" — its hollow structure lets you use the internal field. Alternatively, you can create a uniform field *between* two flat magnets (opposite poles facing), which is the other common set-up for the motor effect.\n\nTakeaway: solenoid = accessible uniform field inside; solid bar magnet = same physics but physically inaccessible. Both produce uniform fields, but solenoids are practical for devices.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": true}, {"question": "The symbol $$B$$ represents magnetic flux density. What does this quantity actually measure, what is its SI unit, and why does the unit decompose as $$\\text{N}\\,\\text{A}^{-1}\\,\\text{m}^{-1}$$? (3 steps)", "answer": "- Step 1: **Magnetic flux density** ($$B$$) measures **how strong the magnetic field is** — i.e., how closely bunched the field lines are. A higher $$B$$ means more flux lines per unit area, meaning a stronger field that exerts larger forces. It is also called \"magnetic field strength\" in some contexts (though technically these are different quantities at university level, at A-level they are used interchangeably).\n- Step 2: The SI unit is the **tesla (T)**. For scale: the Earth's field is about $$50\\,\\mu\\text{T}$$ (very weak); a typical fridge magnet is a few millitesla; a strong lab electromagnet can reach ~1 T; the strongest continuous fields are ~10-45 T. Even a fraction of a tesla is already very strong — the tesla is a large unit.\n- Step 3: Why the unit decomposes as $$\\text{N}\\,\\text{A}^{-1}\\,\\text{m}^{-1}$$: this comes from the defining equation for the motor effect, $$F = BIL\\sin\\theta$$ (preview for next lesson). Rearranging: $$B = \\frac{F}{IL}$$ (when $$\\theta = 90°$$). Force is in newtons (N), current in amperes (A), length in metres (m) — so $$B$$ has units of $$\\frac{\\text{N}}{\\text{A}\\cdot\\text{m}} = \\text{N}\\,\\text{A}^{-1}\\,\\text{m}^{-1}$$, which is defined as one tesla. So 1 T = the field that produces 1 N of force on a 1 m wire carrying 1 A perpendicular to the field.\n\nTakeaway: $$B$$ = field strength (how dense the lines are); unit = tesla; 1 T = 1 N per (1 A × 1 m), from $$F = BIL$$.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "When a car drives along a road, it can become positively charged. Did the car gain or lose electrons, and why does \"transferring positive charge\" never happen in everyday electrostatics? (3 steps)", "answer": "- Step 1: The car **lost electrons**. Positive charge means fewer electrons than protons — the protons are still in the nuclei (they never move), but some electrons have departed, leaving an excess of positive charge. The rule: lose electrons → become positive; gain electrons → become negative.\n- Step 2: \"Transferring positive charge\" never happens in everyday electrostatics because **protons are locked inside the nucleus** — they cannot move between objects. Only electrons, which are on the outside of atoms and relatively free (especially in conductors), can transfer from one object to another. When we say \"the car becomes positive,\" we really mean \"the car lost some negative electrons, so the remaining protons dominate.\"\n- Step 3: The mechanism: as the car moves, **friction** between the car's surface and the air rubs electrons off the car onto the air molecules. The air gains electrons (becomes negative); the car loses them (becomes positive). Which way the electrons transfer depends on the materials — the exam will tell you or give you the final sign so you can deduce it.\n\nTakeaway: positive = lost electrons, not gained protons. Protons never transfer — only electrons move in electrostatics.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": true}, {"question": "After the car stops driving, the positive charge remains on it for a long time. Why can't the charge leak away through the tyres, and what physical property of the tyres is responsible? (2 steps)", "answer": "- Step 1: The tyres are made of **rubber**, which is an excellent **insulator**. An insulator does not let charge flow through it — electrons are not free to move in rubber. So the excess positive charge (the imbalance of protons and electrons) on the car's metal body has no conducting path through the tyres to reach the ground.\n- Step 2: The charge is effectively **trapped** on the car because the insulating tyres block all paths to earth. If the tyres were metal (conductors), the excess electrons from the ground would flow up through the tyres to neutralise the positive charge immediately. But rubber prevents this — so the charge persists.\n\nTakeaway: insulators trap charge; conductors allow charge to flow. Rubber tyres = insulator = charge stays.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "A metal strap dragging on the ground under the car prevents charge from building up. Explain the two-part mechanism: what does the strap provide, and what does it connect? (2 steps)", "answer": "- Step 1: The metal strap is a **conductor** — metal allows charge (electrons) to flow freely through it. This is the opposite of the rubber tyres (insulators). The strap provides a **conducting path** for charge to move.\n- Step 2: The strap **connects the car to the earth (ground)**. Any excess charge on the car can now flow through the strap to the ground (or electrons can flow up from the ground to neutralise positive charge). The car is continuously **earthed** — charge cannot build up because any imbalance is immediately drained away through the conducting path. The two mark points: (1) metal strap is a conductor; (2) it provides a path for charge to flow to earth, so charge is removed.\n\nTakeaway: earthing = connecting to ground via a conductor = charge drains away. The strap replaces the insulating tyre barrier with a conducting bridge.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "In the Magneto film clip, missiles are stopped and redirected mid-flight using a magnetic field. What aspects of this could be physically plausible, and what is the giveaway that makes it definitely unrealistic for a simple magnet? (3 steps)", "answer": "- Step 1: What *could* be true: a very strong magnetic field could exert a force on the missiles, provided the missiles contain **magnetic materials** (iron/steel in their structure). A magnet attracting a magnetic metal is real physics. So there could be some magnetic interaction — that part is not impossible.\n- Step 2: What is **definitely false**: a simple magnet always **attracts** magnetic materials — it pulls them straight in towards itself. In the film, Magneto makes the missiles hover, steer in arbitrary directions, and change course — this implies the field can push as well as pull in controlled directions, which a single static magnet cannot do. A magnet doesn't \"repel\" a piece of iron (unless you orient a like pole towards another magnet's pole, but a lump of iron isn't a magnet with a defined pole).\n- Step 3: The safe, exam-ready language: say the objects **\"interact\"** (there is a force) rather than committing to \"attract\" or \"repel\" when you're uncertain. Alex flagged \"interact\" as \"a word we're going to use a lot\" — it's always safe because it just means \"a force exists,\" without specifying direction.\n\nTakeaway: a magnet attracts magnetic metals (pull in) — it cannot steer them in arbitrary directions. When unsure, say \"interact\" (force exists) rather than guessing attract/repel.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": true}, {"question": "An atom is neutral when the number of protons equals the number of electrons. If an object has a charge of +2 (in arbitrary units), what has changed — the number of protons or the number of electrons, and by how many? (2 steps)", "answer": "- Step 1: The number of **protons has not changed at all** — protons are locked in the nucleus and cannot be transferred between objects. What has changed is the number of **electrons**: the object has **2 fewer electrons** than protons.\n- Step 2: Since each proton contributes +1 and each electron contributes −1, having 2 fewer electrons means 2 fewer negative charges to balance the positives — the net charge is +2. The calculation: charge = (number of protons) − (number of electrons). If originally $$p = e$$ (neutral), and now $$e = p - 2$$, then charge = $$p - (p-2) = +2$$.\n\nTakeaway: positive charge always means *fewer electrons*, never more protons. The proton count is fixed.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "\"Like charges repel, opposite charges attract\" — and the same rule applies to magnetic poles. A student writes \"two electrons attract each other.\" What is wrong with this, and what would two electrons actually do? (2 steps)", "answer": "- Step 1: Two electrons both carry **negative charge** — they are \"like charges.\" Like charges **repel**, not attract. So two electrons push each away from each other. The student's statement is backwards.\n- Step 2: The same logic applies to magnetic poles: two N poles repel, two S poles repel; a N and S pole attract. The rule is universal: like → repel, opposite → attract, whether you're talking about charges or poles. The trap is reversing it under pressure — Alex noted you said \"attract\" for two electrons during the warm-up, which is the classic mistake.\n\nTakeaway: like repels, opposite attracts — for charges and for poles. Two electrons = like charges = repulsion.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "Conventional current is defined as flowing from + to −, but electrons actually flow from − to +. These are opposite directions. The Earth's \"north\" is magnetically a south pole — also opposite to what you'd assume. What is the underlying theme connecting both confusions? (2 steps)", "answer": "- Step 1: Both are **sign conventions** that were established before the true physical direction was understood. Conventional current direction was defined historically (before electrons were discovered) as the direction positive charge would flow — it turned out that negative electrons carry the actual flow, going the opposite way. The Earth's \"north\" naming was geographic long before magnetism was understood — we called the top of the map \"north,\" then later discovered that the magnetic pole near geographic north is actually a south pole.\n- Step 2: The underlying theme: **everyday language and physical reality can point in opposite directions**, and both conventions persist because they're deeply embedded. You must keep both straight simultaneously: current direction = positive charge flow (opposite to electrons); compass \"north\" = magnetic south pole near geographic north. Alex called this \"physics people getting things the wrong way round\" — it's a systematic trap, not a random error.\n\nTakeaway: sign conventions can reverse everyday expectations. Know both the convention and the physical reality, and don't mix them.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": true}, {"question": "A neutral point (marked ×) appears in the field pattern between two bar magnets with like poles facing (N–N or S–S). What does \"neutral point\" mean in terms of the field strength and direction at that spot, and why does it occur exactly midway between equal magnets? (3 steps)", "answer": "- Step 1: A neutral point is a location where the **net magnetic field is zero** — the field strength $$B = 0$$ at that point. There is no force on any magnetic material or moving charge placed there (from these magnets). On a field diagram, you mark it with a cross (×) indicating \"no field lines pass through here.\"\n- Step 2: It occurs because the fields from the two magnets **cancel each other out** at that point. Each N pole pushes a test N pole away from itself; at the midpoint between two equal N poles, the push from the left equals the push from the right, and they are in opposite directions — so the net force (and net field) is zero.\n- Step 3: This is *different* from a point where field lines cross (which is impossible). At a neutral point, there are simply **no field lines at all** — the contributions from both sources sum to zero, so no line passes through. A crossing point would imply two non-zero fields pointing different ways at the same spot; a neutral point means the total field is zero.\n\nTakeaway: neutral point = $$B = 0$$ = fields cancel = no lines pass through. It's absence of field, not crossing of lines.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": true}, {"question": "You look at a field-line diagram and see straight, parallel, equally-spaced lines in a region. What three conclusions can you immediately draw about the field in that region? (2 steps)", "answer": "- Step 1: The three conclusions:\n+ **The field is uniform** — it has the same strength and direction at every point in that region.\n+ **The strength is constant** — equal spacing means the flux density ($$B$$) is the same everywhere (no variation in line density).\n+ **The direction is constant** — parallel lines mean the field vector points the same way everywhere (no curving, no changing direction).\n- Step 2: This is exactly the field pattern produced between two magnets with opposite poles facing (N facing S) in the gap. It's also the field inside a solenoid (approximately). Both are the standard set-ups for the motor effect, because a uniform field makes the force on a wire predictable and constant along its length.\n\nTakeaway: straight + parallel + equally spaced = uniform field = constant strength + constant direction. This is the \"ideal\" field for motor-effect experiments.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": false}, {"question": "The magnetic field around a straight current-carrying wire gets weaker as you move further from the wire. How can you see this on a field-line diagram, and what is the rough mathematical relationship between field strength and distance from the wire? (3 steps)", "answer": "- Step 1: On the diagram, the concentric circular field lines are **drawn farther apart** as they get further from the wire. Since \"closer lines = stronger field,\" the increasing spacing directly tells you the field is weakening with distance.\n- Step 2: The mathematical relationship (A-level preview): for a long straight wire, $$B \\propto \\frac{1}{r}$$ where $$r$$ is the distance from the wire. Doubling the distance halves the field strength. This is why the lines spread out — the same total flux is spread over circles of increasing circumference ($$2\\pi r$$), so the flux per unit area (density) decreases as $$\\frac{1}{r}$$.\n- Step 3: This $$\\frac{1}{r}$$ decay is faster than the $$\\frac{1}{r^2}$$ decay of electric and gravitational fields from point sources, but slower than no decay at all. It means the field is significant near the wire but drops off fairly quickly — at several centimetres from a typical current-carrying wire, the field is already quite weak.\n\nTakeaway: field lines spread apart → weaker field → $$B \\propto \\frac{1}{r}$$ for a straight wire. Visually: sparse circles far out = weak field.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": false}, {"question": "A student claims that \"a magnet always attracts any metal towards it.\" Give two reasons why this statement is wrong. (2 steps)", "answer": "- Step 1: First reason: a magnet only attracts **magnetic materials** (iron, steel, nickel, cobalt). Most metals — copper, aluminium, silver, gold, lead — are **not magnetic** and experience no force from the magnet at all. \"Any metal\" is far too broad.\n- Step 2: Second reason: even for magnetic materials, the interaction isn't always simple attraction. If you bring the **N pole** of one magnet near the **N pole** of another magnet, they **repel** — like poles repel. So a magnetic field can cause both attraction and repulsion depending on orientation. The safe word is \"interact\" (a force exists), not \"attract\" (which assumes a specific direction).\n\nTakeaway: \"always attracts any metal\" fails on both counts — most metals aren't magnetic, and like poles repel even magnetic materials.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "The formula $$F = BIL\\sin\\theta$$ gives the force on a current-carrying wire in a magnetic field. When is this force maximised, and when is it zero? Explain in terms of the angle $$\\theta$$ and the physical orientation of the wire. (3 steps)", "answer": "- Step 1: The force is **maximised** when $$\\sin\\theta = 1$$, which occurs at $$\\theta = 90°$$ — when the wire is **perpendicular** to the magnetic field direction. In this orientation, the full effect of the field acts on the wire: $$F = BIL$$ (maximum).\n- Step 2: The force is **zero** when $$\\sin\\theta = 0$$, which occurs at $$\\theta = 0°$$ (or 180°) — when the wire is **parallel** to the magnetic field direction. If the current flows along the same line as the field, there is no perpendicular component for the field to act on, and the force vanishes.\n- Step 3: The physical intuition: the magnetic force depends on the *cross-product* of the current direction and the field direction — it acts perpendicular to both. When the wire is perpendicular to the field, the cross-product magnitude is maximum. When they're parallel, the cross-product is zero (no perpendicular component exists). This is why the motor-effect set-up always places the wire perpendicular to the uniform field — to get maximum force.\n\nTakeaway: wire ⊥ field → max force ($$F = BIL$$); wire ∥ field → zero force. The angle matters because the force is perpendicular to both current and field.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": false}, {"question": "Arrange these in order of approximate magnetic flux density (weakest to strongest): the Earth's field, a fridge magnet, a strong laboratory electromagnet. Give rough order-of-magnitude values for each. (2 steps)", "answer": "- Step 1: The order from weakest to strongest: **Earth's field** (~$$50\\,\\mu\\text{T} = 5 \\times 10^{-5}\\,\\text{T}$$) → **fridge magnet** (~a few $$\\text{mT}$$, roughly $$10^{-3}\\,\\text{T}$$) → **strong lab electromagnet** (~$$1\\,\\text{T}$$ to perhaps $$10\\,\\text{T}$$).\n- Step 2: The key scale insight: the **tesla is a very large unit**. The Earth's entire magnetic field is only about 50 millionths of a tesla. A fridge magnet is already ~20 times stronger than the Earth's field. A 1 T electromagnet is ~20,000 times stronger than the Earth's field. So when you hear \"the field is 0.5 T,\" that is extremely strong in everyday terms — don't underestimate fractional tesla values.\n\nTakeaway: Earth ~$$10^{-5}$$ T, fridge ~$$10^{-3}$$ T, lab ~$$10^{0}$$ T. The tesla is huge — even 0.01 T is already 200× the Earth's field.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": false}, {"question": "A solenoid carries a current that spirals clockwise when viewed from the right end. Using the right-hand grip rule, which end of the solenoid is the N pole? Walk through the hand gesture. (3 steps)", "answer": "- Step 1: Look at the solenoid from the **right end**. The current spirals **clockwise** around the coils as seen from this end.\n- Step 2: Apply the right-hand grip rule for the solenoid: curl your right fingers in the direction the current flows around the coils. From the right end's perspective, the current is clockwise, so curl your right fingers clockwise. Your right thumb now points **away from you** — pointing towards the **left end** of the solenoid.\n- Step 3: Since your thumb points to the N pole, the **left end is N** and the **right end is S**. The external field lines emerge from the left (N) end, loop around, and re-enter the right (S) end — just like a bar magnet with N on the left.\n\nTakeaway: right-hand grip on solenoid — fingers follow current around coils, thumb points to N. Clockwise from one end → that end is S, the other is N.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": false}, {"question": "If you double the current through an electromagnet solenoid (keeping everything else the same), what happens to the magnetic flux density $$B$$ inside the solenoid, and why? (2 steps)", "answer": "- Step 1: The magnetic flux density **doubles** — $$B$$ is directly proportional to the current ($$B \\propto I$$). Double the current → double $$B$$. This is because each unit of current contributes equally to the field; twice as much charge flowing per second means twice as strong a field.\n- Step 2: This linear relationship comes from the underlying formula for a solenoid (A-level): $$B = \\mu_0 n I$$, where $$n$$ is the number of turns per metre and $$\\mu_0$$ is a constant. Since $$n$$ and $$\\mu_0$$ are unchanged, $$B$$ scales exactly with $$I$$. You don't need the formula yet, but the proportionality $$B \\propto I$$ is the key conceptual takeaway.\n\nTakeaway: double the current → double $$B$$. The relationship is linear, not quadratic or square-root — straightforward proportionality.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": false}, {"question": "A student traces a field line using a plotting compass near a bar magnet. She places the compass, marks where the N end points, then moves the compass tail to that dot and marks the new N-end position. Why must she move the *tail* (the S end) to the previous dot, not the N end? (2 steps)", "answer": "- Step 1: The compass needle's **N (red) end** points along the field direction — it shows where the field line goes next. The **tail (S end)** is where the field line has just come from. When you move the compass, you want to continue the line from where you last measured — so you place the **tail** on the previous dot, positioning the compass so it \"reads\" the field direction starting from that point.\n- Step 2: If you placed the N end on the previous dot instead, the compass would be oriented backwards — the N end would be forced to sit at a point where it was previously pointing *away* from, and the new reading would trace the field line in the wrong direction or jump to a different line. The method requires the tail on the old dot so the N end can swing freely to indicate the next point on the *same* line, extending it forward.\n\nTakeaway: tail on old dot, N end swings to show the next dot. This ensures you continue the same line in the correct direction.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": true}, {"question": "When two magnets with opposite poles facing (N opposite S) create a uniform field in the gap, the magnets themselves would naturally slide together and touch. Why must they be **fixed in place**, and what would happen to the uniform field if they moved together until they touched? (3 steps)", "answer": "- Step 1: Opposite poles **attract** each other — the N pole of one magnet pulls towards the S pole of the other. If the magnets are free to move, they will slide together and close the gap. They must be **fixed** (clamped or held) to maintain the separation that creates the gap where the uniform field exists.\n- Step 2: If the magnets moved together and touched, the **gap disappears** — there is no longer a region between them where the uniform field can be accessed. The two magnets essentially merge into one larger magnet, and the field becomes that of a single compound magnet — no longer a uniform region you can use.\n- Step 3: This is why practical set-ups for the motor effect use magnets that are firmly mounted (often on a U-shaped yoke or clamped frame). The uniform field in the gap is only available because the magnets are held apart against their natural attraction. The gap distance also affects the field strength — a narrower gap (with fixed magnets brought closer) has a slightly stronger uniform field (lines are denser in a smaller space).\n\nTakeaway: opposite poles attract → magnets must be fixed to keep the gap open. Without fixing, the gap closes and the uniform field vanishes.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": false}, {"question": "A wire carries current upwards (vertically). You place a plotting compass on a horizontal table next to the wire. Which way does the compass needle point — towards the wire, away from it, or circling around it? Explain using the right-hand grip rule. (3 steps)", "answer": "- Step 1: Apply the right-hand grip rule: point your right thumb **upwards** (current direction). Curl your right fingers around the wire — they curl **anticlockwise** when viewed from above (looking down from the top of the wire).\n- Step 2: The magnetic field lines are concentric circles around the wire, running anticlockwise (viewed from above). At any point on the horizontal table next to the wire, the field direction is **tangent to the circle** at that point — it doesn't point towards or away from the wire, it points *around* the wire.\n- Step 3: The compass needle aligns with the local field direction, so it points **tangent to the circle** — not towards or away from the wire, but along the circular field line at that location. If the compass is east of the wire (looking from above), the anticlockwise field points northward there, so the needle's N end points north. The compass essentially \"orbits\" directionally around the wire.\n\nTakeaway: the field circles the wire, so the compass points tangentially — around the wire, not towards/away from it.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": false}, {"question": "The lesson previewed two formulas: $$F = Bqv\\sin\\theta$$ (force on a moving charge) and $$F = BIL\\sin\\theta$$ (force on a current-carrying wire). Conceptually, why are these two formulas really the *same* physics expressed in two different ways? (3 steps)", "answer": "- Step 1: A current $$I$$ in a wire is, by definition, a stream of moving charges. Current $$I = \\frac{\\Delta Q}{\\Delta t}$$ — charge per unit time flowing through the wire. So a current-carrying wire is just **many charges moving together** through the wire's length $$L$$.\n- Step 2: For a single charge $$q$$ moving at speed $$v$$ through a field, the force is $$F = Bqv\\sin\\theta$$. For a wire of length $$L$$ carrying current $$I$$, the total charge passing through in time $$\\Delta t$$ is $$\\Delta Q = I\\Delta t$$, and the effective \"velocity\" of charge through length $$L$$ is $$v = \\frac{L}{\\Delta t}$$ (distance per time). Combining: total force on all charges = $$B \\cdot (I\\Delta t) \\cdot \\frac{L}{\\Delta t} \\cdot \\sin\\theta = BIL\\sin\\theta$$.\n- Step 3: The $$\\Delta t$$ cancels out, leaving $$F = BIL\\sin\\theta$$ — the wire formula is just the single-charge formula summed over all the charges in the wire. The two formulas are the same physics: a magnetic field exerts a force on a *moving* charge. The wire version aggregates that force over many charges moving in a confined path (the wire).\n\nTakeaway: $$F = Bqv\\sin\\theta$$ (one charge) and $$F = BIL\\sin\\theta$$ (wire = many charges) are the same underlying law — the wire formula is just the aggregate version.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": true}, {"question": "A positively charged particle sits completely still inside a strong magnetic field. Does it feel any magnetic force? What if the same particle moves through the field — what then changes? (2 steps)", "answer": "- Step 1: When the particle is **stationary** ($$v = 0$$), it feels **no magnetic force at all**. From the formula $$F = Bqv\\sin\\theta$$, if $$v = 0$$, then $$F = 0$$ regardless of how strong $$B$$ is or how large $$q$$ is. A magnetic field only acts on *moving* charges.\n- Step 2: When the particle **moves** ($$v > 0$$), it now feels a magnetic force. The faster it moves, the larger the force ($$F \\propto v$$). The force direction is perpendicular to both the velocity and the field (given by Fleming's left-hand rule, coming next lesson). This is the fundamental asymmetry between electric and magnetic fields: an electric field pushes any charge (moving or not); a magnetic field only pushes moving charges.\n\nTakeaway: stationary charge in $$B$$ → zero force; moving charge → force appears, proportional to speed. Magnetism requires motion.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": false}, {"question": "The lesson covered two different \"hand rules\": the right-hand grip rule (this lesson) and Fleming's left-hand rule (next lesson). What does each rule determine, and why is it critical not to mix up which hand to use? (3 steps)", "answer": "- Step 1: The **right-hand grip rule** determines the **direction of the magnetic field** created by a current. Thumb = current direction; curled fingers = field direction around the wire/solenoid. This rule answers: \"if I send current this way, which way does the field circle?\"\n- Step 2: **Fleming's left-hand rule** (next lesson) determines the **direction of the force** on a current-carrying wire (or moving charge) that is already inside an external magnetic field. First finger = field direction ($$B$$); second finger = current direction ($$I$$); thumb = force di
