 The field lines push apart and cancel in the middle, creating a **neutral point** (a spot where the field is zero) \u2014 definitely not uniform.", "source": "GLM 5.1"}, {"q": "Two bar magnets are arranged with their N poles facing each other across a gap (like poles facing). What appears in the middle of the gap, and why? (3 steps)", "a": "- Step 1: The two N poles **repel** each other (like poles repel). Their field lines push apart rather than connecting across the gap.\n- Step 2: In the exact middle of the gap, the two fields are equal in strength but point in **opposite directions** (one N pole pushes field lines leftward, the other pushes rightward). They cancel exactly at the midpoint.\n- Step 3: This cancellation point is called a **neutral point** \u2014 a location where the resultant magnetic field is zero. On a diagram, it is often marked with an **X** (cross). No force acts on a magnetic material placed at this exact spot.\n\n+ The same result occurs for S facing S \u2014 like poles always produce a neutral point between them.", "source": "GLM 5.1"}, {"q": "Why is the \"opposite poles facing\" arrangement of two bar magnets specifically chosen when setting up the motor effect experiment? What property of the field in the gap makes this essential? (2 steps)", "a": "- Step 1: The motor effect requires a **uniform magnetic field** \u2014 one where the strength and direction are the same everywhere in the region where the current-carrying wire is placed. Only the opposite-poles arrangement produces this.\n- Step 2: In a uniform field, the force on the wire ($$F = BIL$$) is the same at every point along the wire's length in the gap. If the field were non-uniform (varying strength or direction), the force would vary along the wire, making the calculation and the behaviour unpredictable. Uniformity gives a clean, constant force \u2014 which is what the motor effect equation assumes.", "source": "GLM 5.1"}, {"q": "A compass needle's red end points toward what we call \"geographic north.\" But magnetically, which type of pole is located near the geographic North Pole, and why does this mean the compass is actually pointing at a magnetic south? (3 steps)", "a": "- Step 1: The Earth behaves like a giant bar magnet, but **turned upside down**: the magnetic **SOUTH** pole is located near the geographic **North** Pole, and the magnetic **NORTH** pole is near the geographic **South** Pole.\n- Step 2: A compass needle is a small magnet. Its N (red) end is attracted to a magnetic **S** pole (opposite poles attract). So the red end points toward the Earth's magnetic south pole \u2014 which happens to be near geographic north.\n- Step 3: We say \"the compass points north\" as a geographic statement, but magnetically it is pointing at a **south pole**. This is one of the sign conventions that trips students: geographic north \u2260 magnetic north. The magnetic pole near geographic north is a **south** pole.\n\n+ The UK's field strength is about $$50 \\, \\mu\\text{T}$$ and the field lines dip into the ground at roughly $$65\u00b0$$\u2013$$70\u00b0$$ \u2014 they don't run horizontally because the magnetic poles are not at the same locations as the geographic poles.", "source": "GLM 5.1"}, {"q": "Physics has several \"sign conventions\" that seem backwards. Two were highlighted in this lesson: conventional current direction, and the Earth's magnetic pole naming. For each, explain what seems backwards and what the correct understanding is. (3 steps)", "a": "- Step 1: **Conventional current**: defined as flowing in the direction **positive** charge would move. But in real wires, it is **electrons** (negative) that actually flow, and they move in the *opposite* direction to conventional current. So the \"current direction\" arrows on diagrams point opposite to the actual electron motion.\n- Step 2: **Earth's magnetic poles**: the pole near geographic north is a magnetic **south** pole, and the pole near geographic south is a magnetic **north** pole. The naming seems backwards \u2014 \"north\" is magnetically south.\n- Step 3: Both are *conventions* \u2014 deliberate definitions that are useful but counterintuitive. They trip students because the everyday meaning (north = north, current flows from + to \u2212) clashes with the underlying physics. Keep both straight: current direction = direction of positive charge = opposite to electron flow; geographic north \u2248 magnetic south.", "source": "GLM 5.1"}, {"q": "The lesson introduced a four-keyword chain that explains how an electromagnet is created. All four keywords are connected, and two of them start with C. What is the full chain, and what does each link mean? (3 steps)", "a": "- Step 1: The chain is: **Current \u2192 Conductor \u2192 Magnetic field \u2192 Electromagnet**. Alex presented this as four cards to memorise.\n- Step 2: Each link: (1) **Current** must flow \u2014 without current, nothing happens. (2) The current flows through a **Conductor** (a wire) \u2014 you need a path for the current. (3) The result is a **Magnetic field** appears around the conductor. (4) A magnet created this way (from current) is called an **Electromagnet** \u2014 it only works while the current flows.\n- Step 3: The key difference from a permanent magnet: an electromagnet can be **switched on and off** by controlling the current. This is why electromagnets are useful \u2014 you can turn the magnetism on when needed and off when not. A permanent magnet cannot be switched off.", "source": "GLM 5.1"}, {"q": "You hold a straight wire carrying a current upward. Using the right-hand grip rule, how do you determine the direction of the magnetic field circling the wire, and why must you use your *right* hand specifically? (3 steps)", "a": "- Step 1: The **right-hand grip rule**: point your **thumb** in the direction of the **current** (upward in this case). Curl your **fingers** around the wire \u2014 the direction your fingers curl is the direction the circular magnetic field wraps around the wire.\n- Step 2: With current going upward, your right hand wraps around the wire with fingers curling from your perspective in a specific orientation. Looking from above (down at the wire), the field circles **anticlockwise** around the wire. Looking from below, they appear clockwise. The field forms **concentric circles** around the wire, weaker further from the wire.\n- Step 3: You must use the **right hand** because this rule is linked to the broader system of electromagnetic hand rules. The right-hand grip gives the *field direction from a current*. Fleming's **left-hand** rule (next lesson) gives the *force direction on a current in a field*. Using the wrong hand would give the wrong direction \u2014 this is one of the most common traps.", "source": "GLM 5.1"}, {"q": "A wire carries current straight *into* the page (away from you). Looking at the page end-on, do the magnetic field circles go clockwise or anticlockwise, and how do you work this out? (2 steps)", "a": "- Step 1: Use the right-hand grip rule. Point your right thumb **into the page** (the current direction). Your fingers curl around the wire \u2014 looking at the page from your perspective (the viewer's side), your fingers curl **clockwise**.\n- Step 2: The textbook confirmation: viewed end-on with current going **into the page**, the field circles are **clockwise**. If the current were coming **out of the page** (toward you), the circles would be **anticlockwise**. This is a standard result you can verify every time with the right-hand grip.", "source": "GLM 5.1"}, {"q": "The magnetic field around a straight current-carrying wire consists of concentric circles. How does the field strength change as you move further from the wire, and what does this look like on a field-line diagram? (2 steps)", "a": "- Step 1: The field gets **weaker** as you move further from the wire. Physically, the magnetic flux spreads over a larger circumference (the circles get bigger), so the flux density decreases with distance.\n- Step 2: On a diagram, the concentric circles are drawn **closer together near the wire** (strong field) and **further apart away from the wire** (weak field). This follows the general rule: closer lines = stronger field. The circles never stop (the field extends infinitely in principle), but they become negligibly weak far from the wire.", "source": "GLM 5.1"}, {"q": "There are three ways to make an electromagnet stronger, and all three start with the letter C. Name them and explain the physical reason each one increases the field strength. (3 steps)", "a": "- Step 1: **Current** \u2014 increase the current flowing through the wire. A larger current produces a stronger magnetic field around the conductor (the field is proportional to current, as captured in the motor effect equations).\n- Step 2: **Coils** \u2014 add more turns (coils) of wire. Winding the wire into a tight coil concentrates the field: each turn contributes its own circular field, and in a coil these fields **superpose** (add together), creating a much stronger combined field in the same space. More wire in the same volume = more field.\n- Step 3: **Core** \u2014 add an **iron core** inside the coil. A soft-iron core is a magnetic material that becomes an induced magnet when the coil's field acts on it. The iron **channels and concentrates** the field lines through itself, greatly boosting the overall field strength. The core must be **soft iron** (not steel) so the magnetism disappears when you switch off the current.", "source": "GLM 5.1"}, {"q": "An electromagnet designer chooses a soft-iron core rather than a steel core. What is the critical functional reason for this choice, and what would go wrong with a steel core? (2 steps)", "a": "- Step 1: Soft iron is **magnetically soft** \u2014 it gains magnetism easily when the field is on, and **loses it quickly** when the field is off (when current stops). This is exactly what you want in an electromagnet: switch the current on \u2192 magnet works; switch it off \u2192 magnetism disappears immediately.\n- Step 2: Steel is **magnetically hard** \u2014 it retains magnetism even after the magnetising field is removed. If you used a steel core, the electromagnet would stay magnetised after you switched off the current \u2014 it would become a permanent magnet. You would lose the key advantage of an electromagnet: the ability to **switch it off**.\n\n+ This is why the phrase \"soft = gains and loses easily (good for electromagnets)\" is the correct mental model. Hard materials are for permanent magnets; soft materials are for electromagnet cores.", "source": "GLM 5.1"}, {"q": "A solenoid is a coil of wire wound into a long spring shape. What does its *external* magnetic field look like, and how does this compare to a permanent bar magnet? (2 steps)", "a": "- Step 1: The solenoid's **external** field looks **exactly like a bar magnet's field** \u2014 the field lines emerge from one end (the N end), loop around the outside in curved arcs, and re-enter at the other end (the S end). The pattern is indistinguishable from a bar magnet's external pattern.\n- Step 2: The key difference is *control*: you can switch the solenoid's field on and off with the current, and vary its strength by adjusting current, turns, or core. A bar magnet's field is always on at fixed strength. But the *shape* of the external field is the same for both.", "source": "GLM 5.1"}, {"q": "You look at a solenoid from the right end and see the current flowing **anticlockwise** around the coils (viewed from that end). Using the right-hand grip rule for solenoids, which end (left or right) is the N pole? Walk through the hand rule. (3 steps)", "a": "- Step 1: For a solenoid, the adapted right-hand grip rule: **curl your fingers** in the direction the current flows around the coils, and your **thumb** points to the **N end** of the solenoid.\n- Step 2: Looking from the right end, the current flows anticlockwise. Curl your right hand fingers anticlockwise (as viewed from the right). Your right thumb now points **toward you** \u2014 i.e., toward the right end.\n- Step 3: Therefore the **right end** is the N pole. The left end is the S pole. External field lines emerge from the right (N) end and loop back to the left (S) end.\n\n+ If the current direction were reversed (clockwise from the right end), your thumb would point away from you (toward the left end), making the left end N. Reversing current swaps N and S \u2014 another sign convention to watch.", "source": "GLM 5.1"}, {"q": "Inside a solenoid, the magnetic field runs in a specific direction. Which way does it go (from which pole to which pole inside), and why is this necessary for the field lines to form closed loops? (2 steps)", "a": "- Step 1: Inside the solenoid, the field runs from **S to N** \u2014 opposite to the external direction (N to S). This is because magnetic field lines must form **closed loops**: they emerge from N externally, loop around, enter at S externally, and then continue through the interior from S back to N to complete the circuit.\n- Step 2: The internal field is also **strong** and **roughly uniform** (parallel, equally-spaced lines) \u2014 much more uniform than inside a bar magnet, because the coil geometry creates a consistent field throughout the interior. A permanent magnet has the same internal S\u2192N direction, but we simply can't see inside it.", "source": "GLM 5.1"}, {"q": "The symbol $$B$$ appears on the field meter in the PhET simulation and in the data booklet. What quantity does $$B$$ represent, what is its SI unit, and how does the unit's compound form ($$\\text{N} \\, \\text{A}^{-1} \\, \\text{m}^{-1}$$) connect to the definition of the tesla? (3 steps)", "a": "- Step 1: $$B$$ is the **magnetic flux density** (also called **magnetic field strength**). It measures how strong the field is \u2014 specifically, how closely bunched the field lines are per unit area. Higher $$B$$ = denser lines = stronger field.\n- Step 2: The SI unit is the **tesla** (T). For scale: the Earth's field is about $$50 \\, \\mu\\text{T}$$ ($$5.0 \\times 10^{-5} \\, \\text{T}$$). A fraction of a tesla is already very strong \u2014 laboratory magnets might reach 1\u201310 T.\n- Step 3: The compound form $$\\text{T} = \\text{N} \\, \\text{A}^{-1} \\, \\text{m}^{-1}$$ comes directly from the defining equation $$F = BIL$$ (motor effect). Rearranging: $$B = F / (IL)$$, so 1 tesla = 1 newton per (amp \u00d7 metre) = $$1 \\, \\text{N} \\, \\text{A}^{-1} \\, \\text{m}^{-1}$$. The unit is *defined* by the force a field exerts on a current-carrying wire.", "source": "GLM 5.1"}, {"q": "The lesson previewed two equations that will be studied in depth next session: $$F = BIL \\sin \\theta$$ and $$F = Bqv \\sin \\theta$$. What does each equation calculate, what does the $$\\sin \\theta$$ factor represent, and what happens in the simplest case where $$\\theta = 90\u00b0$$? (3 steps)", "a": "- Step 1: $$F = BIL \\sin \\theta$$ calculates the **force on a current-carrying wire** in a magnetic field. $$B$$ is flux density, $$I$$ is current, $$L$$ is the length of wire in the field. $$F = Bqv \\sin \\theta$$ calculates the **force on a single moving charge** in a magnetic field. $$q$$ is the charge, $$v$$ is its speed.\n- Step 2: $$\\theta$$ is the **angle between the field direction and the wire/velocity direction**. The force depends on this angle: when the wire is *perpendicular* to the field ($$\\theta = 90\u00b0$$), $$\\sin 90\u00b0 = 1$$ and the force is maximum. When the wire is *parallel* to the field ($$\\theta = 0\u00b0$$), $$\\sin 0\u00b0 = 0$$ and there is **no force at all**.\n- Step 3: In the simplest, most common case (wire perpendicular to field), $$\\sin \\theta = 1$$ and the equations reduce to $$F = BIL$$ and $$F = Bqv$$ \u2014 the forms you'll use most often. The $$\\sin \\theta$$ factor captures the geometric dependence: only the component of current/velocity that is *perpendicular* to the field contributes to the force.", "source": "GLM 5.1"}, {"q": "Today's lesson used the **right-hand grip rule** for the field around a wire/solenoid. Next lesson introduces **Fleming's left-hand rule** for the motor effect force. Why are there *two different* hand rules, and what fundamentally different question does each one answer? (2 steps)", "a": "- Step 1: The **right-hand grip rule** answers: \"given a current, what is the *direction of the magnetic field* it creates?\" It maps **current \u2192 field**. Thumb = current; fingers = field direction. This is about *creating* a field from a current.\n- Step 2: **Fleming's left-hand rule** answers: \"given a current already in an existing field, what is the *direction of the force* on the wire?\" It maps **field + current \u2192 force**. First finger = field; second finger = current; thumb = force. This is about *responding* to a field \u2014 the motor effect.\n+ These are two distinct physical questions: (1) \"I create a field \u2014 where does it go?\" (right hand), vs (2) \"A field acts on my wire \u2014 which way is it pushed?\" (left hand). Mixing them up (using left for field creation or right for force direction) gives wrong answers \u2014 this is trap #8 from the lesson.", "source": "GLM 5.1"}, {"q": "In the Magneto film clip analysis, Alex asked what could be physically true and what is definitely false about Magneto stopping missiles with magnetic powers. What could be true, what is definitely false, and what safe verb should you use when unsure? (3 steps)", "a": "- Step 1: **Could be true**: Magneto generates a strong magnetic field. The missiles contain magnetic metal (iron/steel), so a magnet *can* exert a force on them. A strong enough magnet could pull magnetic objects toward it \u2014 this part is physically plausible.\n- Step 2: **Definitely false**: In the film, Magneto makes objects hover and steer in all directions. A real magnet would **attract** magnetic metal (pull it straight in toward the magnet). You cannot make objects hover and manoeuvre in arbitrary directions with a simple magnetic field \u2014 magnets attract, they don't provide arbitrary directional control.\n- Step 3: The safe verb: when you're unsure whether a magnetic interaction is a push or a pull, say the objects **\"interact\"** \u2014 there is a force / an interaction. This is always correct and avoids guessing \"attract\" or \"repel\" incorrectly. Alex flagged \"interact\" as \"a word we're going to use a lot.\"", "source": "GLM 5.1"}, {"q": "When describing any field (magnetic, electric, gravitational) in an exam answer, Alex recommends you always structure your answer around exactly three properties. What are they, and why does hitting all three ensure you don't miss mark points? (2 steps)", "a": "- Step 1: The three properties are: **Strength**, **Direction**, and **Shape**. For a bar magnet: strength = strongest at the ends; direction = N\u2192S; shape = lines loop from N round to S outside, S\u2192N inside.\n- Step 2: Exam mark schemes often award separate marks for each property. If you only mention strength, you miss the direction and shape marks. By always checking \"have I said something about strength, direction, and shape?\", you systematically cover all the available marks. This is a general exam technique that works for any field description question.", "source": "GLM 5.1"}, {"q": "A student says: \"Like charges attract\" and \"Like magnetic poles attract.\" Are both statements correct, or is one (or both) wrong? Explain the correct rule for each case. (2 steps)", "a": "- Step 1: **Both statements are wrong.** The correct electrostatics rule is: **like charges repel, opposite charges attract**. Two electrons (both negative) repel; an electron and a proton attract. The correct magnetism rule is: **like poles repel, opposite poles attract**. Two N poles repel; N and S attract.\n- Step 2: The rules are analogous in form (like repel, opposite attract) but operate through different physical mechanisms \u2014 electrostatic force vs magnetic force. Confusing the direction of either rule is a common trap. The safe approach: both follow the same pattern \u2014 \"like repel, opposite attract\" \u2014 for both charges and poles.", "source": "GLM 5.1"}, {"q": "A student draws magnetic field lines pointing from S to N outside a magnet. Is this correct? If not, what is the correct direction and how should the student remember it? (2 steps)", "a": "- Step 1: This is **incorrect**. Outside a magnet, field lines point from **N to S** \u2014 this is the direction a free north pole would be pushed (away from N, toward S). Inside the magnet, they go S\u2192N to complete the loop.\n- Step 2: Memory aid: think of the field line as showing \"where a north pole would go.\" A north pole is repelled by N (pushed away) and attracted by S (pulled toward), so the arrow goes N\u2192S outside. Alternatively: the line exits the N pole end and enters the S pole end \u2014 always N\u2192S on the outside.", "source": "GLM 5.1"}, {"q": "A student claims that cutting a bar magnet in half would yield one piece that is purely a north pole and another that is purely a south pole. Why is this impossible, and what do you actually get? (2 steps)", "a": "- Step 1: This is impossible because **magnetic poles always come in pairs** (dipoles). You can never isolate a single pole \u2014 there is no such thing as a \"monopole\" in classical magnetism. Every magnet, no matter how small, has both a N and a S end.\n- Step 2: When you cut a bar magnet in half, each piece becomes a **complete magnet** with its own N and S poles. The cut face that was previously inside the magnet develops a new pole: the half with the original N tip gets a new S face at the cut; the half with the original S tip gets a new N face at the cut. You now have two smaller magnets, each with both poles.", "source": "GLM 5.1"}, {"q": "A neutral object has 100 protons. It loses 2 electrons through friction. What is the sign of its net charge afterward, and roughly how would you describe the magnitude \u2014 is it strongly charged or slightly charged relative to the total number of particles? (2 steps)", "a": "- Step 1: Losing electrons means fewer $$-1$$ charges than $$+1$$ charges. With 100 protons ($$+100$$) and now 98 electrons ($$-98$$), the net charge is $$+100 - 98 = +2$$. The object is **positive**.\n- Step 2: The magnitude is **tiny relative to the total** \u2014 only 2 out of 100 charge units are unbalanced (2% imbalance). Real static charges on everyday objects involve an extremely small fraction of the total electrons being transferred, but the electrostatic force is so strong that even this tiny imbalance produces noticeable effects (static cling, sparks).", "source": "GLM 5.1"}, {"q": "Two bar magnets are arranged with opposite poles facing across a small gap, and they are clamped so they can't move. A current-carrying wire is placed in the gap perpendicular to the field lines. Why is this specific setup (uniform field + perpendicular wire) the standard configuration for demonstrating the motor effect? (2 steps)", "a": "- Step 1: The **uniform field** (same $$B$$ everywhere in the gap) means the force on the wire is **constant** along its entire length within the gap. This makes $$F = BIL$$ apply cleanly \u2014 every segment of wire experiences the same force per unit length.\n- Step 2: The wire being **perpendicular** to the field means $$\\sin \\theta = 1$$ (maximum force). If the wire were parallel to the field ($$\\theta = 0$$), there would be **no force** at all ($$\\sin 0\u00b0 = 0$$). The perpendicular arrangement gives the strongest, most predictable force \u2014 ideal for a clear demonstration and a simple calculation.", "source": "GLM 5.1"}, {"q": "Compare a permanent magnet and an electromagnet. For each, state one capability the other lacks, and explain the physical reason for that difference. (3 steps)", "a": "- Step 1: A **permanent magnet** can produce a magnetic field **without any power source**. It is always \"on\" \u2014 its magnetism comes from the permanently aligned domains in the hard material. An electromagnet *cannot* do this: it needs a current (power supply) to create its field.\n- Step 2: An **electromagnet** can be **switched on and off** instantly by controlling the current, and its strength can be **varied** (adjust current, add/remove core). A permanent magnet *cannot* do this \u2014 its strength is fixed and it cannot be turned off (you'd need to heat it above its Curie temperature or physically damage it to demagnetise it).\n- Step 3: The physical reason: permanent magnets use **hard** materials whose domains stay aligned permanently; electromagnets use **soft** cores whose domains align only while the current's field is present. Hard = permanent but inflexible; soft = temporary but controllable. Each has advantages depending on the application.", "source": "GLM 5.1"}, {"q": "A student says: \"A magnet always attracts any metal toward it.\" Is this statement fully correct? Identify what is wrong and give the correct, more precise statement. (2 steps)", "a": "- Step 1: The statement is **not fully correct**. A magnet attracts only **magnetic** metals (iron, steel, nickel, cobalt). Most metals (copper, aluminium, silver, gold) are non-magnetic and experience no attractive force from a magnet.\n- Step 2: Even for magnetic metals, the statement is still oversimplified. A magnet does not *always* attract \u2014 **like poles repel**. If you bring the N pole of one magnet near the N pole of another, they push apart. The precise statement: \"a magnetic field makes magnetic materials **interact** \u2014 there is a force, which may be attraction or repulsion depending on the orientation of poles.\"", "source": "GLM 5.1"}, {"q": "When a car is positively charged from driving, and a person touches the car, they might feel a small shock. Walk through the physics of why this shock happens \u2014 what flows, in which direction, and through what? (3 steps)", "a": "- Step 1: The car is positively charged \u2014 it has a **deficit of electrons** (lost them to the air through friction). The person's body is roughly neutral (equal protons and electrons) and is a conductor (water and ions in the body allow charge flow).\n- Step 2: When the person touches the car's metal body, a **conducting path** is created from the car \u2192 through the person's body \u2192 to the Earth (the person is standing on the ground). Electrons flow **from the Earth through the person** toward the car to fill the deficit.\n- Step 3: The rapid flow of electrons through the person's skin at the point of contact is what creates the **shock** \u2014 a brief, high-current discharge as the car neutralises. This is exactly the earthing mechanism, but the \"conductor\" is the person's body instead of a metal strap. The shock proves that the charge was trapped on the car (insulated by rubber tyres) and only needed a conducting path to drain away.", "source": "GLM 5.1"}, {"q": "The lesson mentioned that the Earth's magnetic field in the UK has a strength of about $$50 \\, \\mu\\text{T}$$ and dips into the ground at roughly $$65\u00b0$$\u2013$$70\u00b0$$. Why does the field *dip* (not run horizontally), and what does this tell you about where the magnetic pole actually is relative to the UK? (2 steps)", "a": "- Step 1: The field lines **dip downward** because the UK is in the Northern Hemisphere, and the magnetic **south pole** (near geographic north) is *north* of the UK and also below the surface. The field lines converge toward that pole, so in the UK they angle downward into the ground \u2014 they are not horizontal.\n- Step 2: The dip angle (angle between the field and the horizontal) being $$65\u00b0$$\u2013$$70\u00b0$$ means the field is mostly vertical in the UK, with only a modest horizontal component. This is why a compass (which responds to the horizontal component) works, but the total field is much stronger than what the compass alone measures. Near the equator, the field would be more horizontal; near the poles, more vertical.", "source": "GLM 5.1"}, {"q": "You have a solenoid with a soft-iron core inside it. You switch on the current and the electromagnet becomes very strong. You then switch off the current. Walk through what happens to the iron core's magnetism and why this is the desired behaviour. (3 steps)", "a": "- Step 1: When the current is **on**, the coil's magnetic field acts on the soft-iron core. The iron is a magnetic material, so it becomes an **induced magnet** \u2014 its domains align with the coil's field, greatly concentrating and strengthening the overall field. This is the \"Core\" strengthening mechanism.\n- Step 2: When the current is **switched off**, the coil's field disappears instantly. The soft-iron core, being **magnetically soft**, loses its induced magnetism quickly \u2014 the domains randomise again because there is no external field to hold them aligned.\n- Step 3: This rapid loss of magnetism is the **desired behaviour** for an electromagnet: you want the magnetism to exist only while the current flows. If the core were steel (hard), it would retain magnetism after switching off \u2014 the electromagnet would become an unwanted permanent magnet. Soft iron gives you full control: on when you want it, off when you don't.", "source": "GLM 5.1"}, {"q": "A wire carries current to the right across a uniform magnetic field that points upward (from the floor toward the ceiling). Without calculating numbers, determine whether there is a force on the wire, and if so, in which rough direction (forward/backward/left/right/up/down)? Use the logic of what $$\\sin \\theta$$ tells you and Fleming's left-hand rule preview. (3 steps)", "a": "- Step 1: The wire (current to the right) is **perpendicular** to the field (upward). The angle $$\\theta = 90\u00b0$$ between them, so $$\\sin 90\u00b0 = 1$$ \u2014 there **is** a force, and it is the maximum possible for this $$B$$, $$I$$, and $$L$$.\n- Step 2: Fleming's left-hand rule (preview): First finger = field direction (upward); Second finger = current direction (to the right); Thumb = force direction. Set up your left hand: first finger points up, second finger points right \u2014 your thumb points **forward** (out of the page toward you, if current is rightward and field is upward on a standard diagram).\n- Step 3: The force is **perpendicular to both** the field and the current \u2014 this is always the case with the motor effect. The force does not push the wire along the current direction or along the field direction; it pushes it sideways (in the third perpendicular direction). This cross-product nature is captured by $$F = BIL \\sin \\theta$$ and Fleming's left hand.", "source": "GLM 5.1"}, {"q": "A charged particle sits stationary inside a strong magnetic field. Does it feel a magnetic force? What would have to change for it to experience a force? (2 steps)", "a": "- Step 1: A **stationary** charge in a magnetic field feels **no magnetic force**. The defining equation $$F = Bqv \\sin \\theta$$ requires velocity $$v$$ \u2014 if $$v = 0$$, then $$F = 0$$ regardless of how strong $$B$$ is or how large $$q$$ is.\n- Step 2: For the charge to experience a force, it must be **moving** ($$v \\neq 0$$), and its velocity must have a component **perpendicular** to the field ($$\\sin \\theta \\neq 0$$). This is why the field definition specifies \"a *moving* charged object feels a force\" \u2014 motion is essential. A stationary charge only feels forces from electric fields and gravity, never from magnetic fields.", "source": "GLM 5.1"}, {"q": "A student uses iron filings to map a magnetic field and then confidently states: \"The end where the filings are most bunched up must be the north pole.\" Is this reasoning valid? Explain what the filings actually reveal and what they cannot reveal. (2 steps)", "a": "- Step 1: The observation that filings bunch up at the poles is **correct** \u2014 the field is strongest at the poles, and filings concentrate where the field is strong. But the conclusion \"that end must be north\" is **invalid**.\n- Step 2: Iron filings show **shape and strength** (where the field is strong and the pattern of lines), but they **cannot show direction** \u2014 you cannot distinguish N from S using filings alone. Both poles have equally bunched filings; there is no directional indicator. To determine which pole is N, you need a **plotting compass**, whose N (red) end points toward the magnet's S pole, giving you directional information.", "source": "GLM 5.1"}, {"q": "The lesson stated that the four magnetic materials are iron, steel, nickel, cobalt \u2014 and \"no more.\" A student asks: \"What about neodymium? I've heard of neodymium magnets.\" How would you reconcile this within the GCSE/ESAT framework the lesson was taught at? (2 steps)", "a": "- Step 1: At GCSE/ESAT level, the specification lists exactly **four** magnetic materials: iron, steel, nickel, cobalt. For exam purposes, this is the list you memorise and use \u2014 \"only these four, no more.\"\n- Step 2: Neodymium magnets (NdFeB) are indeed real and extremely strong \u2014 they are an A-level/university reality. Neodymium is a rare-earth element that is ferromagnetic. But at the GCSE depth Alex was teaching, this is beyond the specification. The exam will only expect you to know the four listed materials. The lesson explicitly noted it was teaching at \"GCSE depth for the ESAT\" \u2014 so stick with the four, but understand that the full picture is richer at higher levels.", "source": "GLM 5.1"}, {"q": "You see a diagram of two bar magnets with N facing S across a gap. Between them, the field lines are straight, parallel, and equally spaced. A small compass is placed at three different positions within the gap. Will the compass needle point in the same direction at all three positions? Why or why not? (2 steps)", "a": "- Step 1: **Yes**, the compass needle will point in the same direction at all three positions. This is because the field is **uniform** \u2014 the same strength and direction everywhere in the gap. Straight, parallel, equally-spaced lines are the definition of a uniform field.\n- Step 2: In a uniform field, there is no variation \u2014 no curvature, no bunching, no change in direction. A compass needle (a small bar magnet) aligns with the local field direction, and since that direction is identical at every point in the gap, the needle always points the same way. This consistency is exactly why uniform fields are used for the motor effect: the force on a wire is predictable and constant throughout the region.", "source": "GLM 5.1"}, {"q": "A student is asked: \"Why does charge build up on a car driving on the road but not on a train running on metal rails?\" Using the concepts of insulators, conductors, and earthing, explain the difference. (3 steps)", "a": "- Step 1: The car rides on **rubber tyres** (insulators). Friction with the air transfers electrons off the car, making it positive. The insulating tyres block any path to the ground, so the charge is **trapped** and accumulates.\n- Step 2: The train runs on **metal rails** (conductors). The train's metal wheels and chassis are conductors, and the metal rails provide a continuous **conducting path to earth**. Any charge that builds up from friction immediately flows away through the wheels \u2192 rails \u2192 ground.\n- Step 3: The train is **continuously earthed** by its conducting contact with the rails, so charge cannot accumulate. The car is **insulated** from earth by its rubber tyres, so charge builds up. The difference is entirely about whether a conducting path to earth exists: conductor \u2192 charge drains; insulator \u2192 charge stays.", "source": "GLM 5.1"}, {"q": "You place a plotting compass on top of a sheet of paper, and below the paper runs a straight current-carrying wire (current going north, i.e., upward on the page). The compass needle deflects. Which way does the N (red) end of the compass point \u2014 east or west \u2014 and how do you work this out? (3 steps)", "a": "- Step 1: Use the right-hand grip rule for the wire. Point your right thumb **northward** (upward on the page = current direction). Your fingers curl around the wire: on the **east side** of the wire (right side), your fingers point **downward** (into the page); on the **west side** (left side), they point **upward** (out of the page). But we need the direction *on the paper surface* (horizontal plane).\n- Step 2: Looking at the paper from above: the magnetic field circles the wire. On the right (east) side of the wire, the field points **south** (downward on the page surface); on the left (west) side, the field points **north** (upward on the page). But more precisely: at any point on the paper near the wire, the field is tangent to a circle centred on the wire.\n- Step 3: Directly to the **east** of the wire, the field direction on the paper surface points **southward** (toward the bottom of the page). Directly to the **west**, it points **northward**. A compass placed just east of the wire would have its N (red) end pointing **south**; just west, it would point **north**. At a general position, the N end follows the circular field \u2014 anticlockwise around the wire when viewed from above with current going upward (north).", "source": "GLM 5.1"}];
function render() {
  const container = document.getElementById('cards');
  container.innerHTML = cards.map((c, i) => 
    '<div class="card" id="card-' + i + '">' +
    '<div class="card-header">' +
    '<input type="checkbox" class="card-select" data-id="' + i + '" checked onchange="updateCount()">' +
    '<div class="card-q">' + (i+1) + '. ' + escapeHtml(c.q) + '</div>' +
    '<span class="card-source">' + c.source + '</span>' +
    '</div>' +
    '<div class="card-answer" id="ans-' + i + '">' + formatAnswer(c.a) + '</div>' +
    '</div>'
  ).join('');
  updateCount();
}
function escapeHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatAnswer(t) {
  t = escapeHtml(t);
  t = t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  t = t.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>');
  return '<p>' + t + '</p>';
}
function toggleAll() { document.querySelectorAll('.card-answer').forEach(el => el.classList.toggle('show')); }
function selectAll() { document.querySelectorAll('.card-select').forEach(cb => { cb.checked = true; cb.closest('.card').classList.remove('deselected'); }); updateCount(); }
function deselectAll() { document.querySelectorAll('.card-select').forEach(cb => { cb.checked = false; cb.closest('.card').classList.add('deselected'); }); updateCount(); }
function updateCount() {
  const checked = document.querySelectorAll('.card-select:checked').length;
  document.getElementById('count').textContent = checked + ' selected';
  document.querySelectorAll('.card-select').forEach(cb => { cb.closest('.card').classList.toggle('deselected', !cb.checked); });
}
function exportSelected() {
  const selected = [];
  document.querySelectorAll('.card-select:checked').forEach(cb => {
    const idx = parseInt(cb.dataset.id);
    selected.push('## Q' + (selected.length + 1) + '\n**Q:** ' + cards[idx].q + '\n\n**A:** ' + cards[idx].a);
  });
  document.getElementById('exportText').value = selected.join('\n\n---\n\n');
  document.getElementById('exportArea').style.display = 'block';
}
render();
</script>
</body>
</html>
