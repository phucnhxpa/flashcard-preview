nt or doesn't satisfy the original problem's domain.\n- Step 3: Always state the reason for rejection: \"reject $$x = -\\tfrac{11}{6}$$ as we require $$x > 0$$ from the sketch.\" The rejection-reasoning is what earns the marks; merely choosing the right one without justification can lose accuracy marks.", "source": "Opus 4.7 ②", "_id": "opus_2_38"}, {"question": "Conceptual synthesis: In Q9, parts (a), (b), and (c) are deeply connected. Explain how the symmetry identities in (a) and the period compression in (b) are both needed to solve (c). (3 steps)", "answer": "- Step 1: Part (c) asks: where does $$\\sin 2x = p = \\sin \\alpha$$ on $$0° < x < 180°$$? The \"2x\" means we're working with the compressed wave from part (b) — the period is 180°, so we search within one full wave.\n- Step 2: The equation $$\\sin 2x = \\sin \\alpha$$ means $$2x$$ must be an angle whose sine equals $$\\sin \\alpha$$. The symmetry identity $$\\sin(180° - \\alpha) = \\sin \\alpha$$ from part (a) tells us there are exactly two such angles in one cycle: $$\\alpha$$ and $$180° - \\alpha$$.\n- Step 3: Setting $$2x = \\alpha$$ gives $$x = \\frac{\\alpha}{2}$$, and $$2x = 180° - \\alpha$$ gives $$x = 90° - \\frac{\\alpha}{2}$$. Without the symmetry identity, you'd miss the second root. Without understanding the period compression, you wouldn't know the valid range for $$2x$$ is $$0°$$ to $$360°$$. Both ideas are essential.", "source": "GLM 5.1 ③", "_id": "glm_3_53"}, {"question": "Integrate $$\\frac{3}{\\sqrt{x}} + 2x$$ and express each term in its simplest form. (3 steps)", "answer": "- Step 1: Rewrite with fractional/negative powers: $$\\frac{3}{\\sqrt{x}} = 3x^{-1/2}$$. So the integrand is $$3x^{-1/2} + 2x$$.\n- Step 2: For $$3x^{-1/2}$$: add 1 to the power ($$-\\frac{1}{2} + 1 = \\frac{1}{2}$$), divide by the new power ($$3 \\div \\frac{1}{2} = 6$$). Result: $$6x^{1/2} = 6\\sqrt{x}$$.\n- Step 3: For $$2x$$: add 1 to the power ($$1 + 1 = 2$$), divide by the new power ($$2 \\div 2 = 1$$). Result: $$x^2$$. Full answer: $$6\\sqrt{x} + x^2 + c$$.", "source": "GLM 5.1 ③", "_id": "glm_3_24"}, {"question": "Misconception probe: A student says \"Integration always makes the coefficient smaller because you divide.\" Give a counterexample showing this is false. (2 steps)", "answer": "- Step 1: Consider integrating $$2x^{-1/2}$$: the coefficient becomes $$2 \\div \\frac{1}{2} = 4$$, which is larger, not smaller. The coefficient grew because dividing by a fraction less than 1 multiplies the value.\n- Step 2: The student's intuition works for positive integer powers (e.g., $$\\int 6x^3 = \\frac{6}{4}x^4 = \\frac{3}{2}x^4$$, coefficient shrank from 6 to 1.5). But for fractional powers less than 1, dividing by the new power actually increases the coefficient. Always do the division explicitly — don't assume the direction.", "source": "GLM 5.1 ③", "_id": "glm_3_55"}, {"question": "Why does $$\\sin(180° - \\alpha) = \\sin\\alpha$$ make sense from the symmetry of the sine wave? (3 steps)", "answer": "- Step 1: The sine wave from $$0°$$ to $$180°$$ is symmetric about its midpoint $$x = 90°$$ — it rises to 1 at $$90°$$, then falls symmetrically.\n- Step 2: An angle $$\\alpha$$ and its supplement $$180° - \\alpha$$ are equidistant from $$90°$$ (one to the left, one to the right). Because of the symmetry, both have the same $$y$$-value on the wave.\n- Step 3: Hence $$\\sin\\alpha = \\sin(180° - \\alpha)$$. The intuition: the supplementary angle is the \"mirror partner\" of $$\\alpha$$ in the first half-cycle of sine, so they share the same sine value.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "A student reasons: \"In $$y = f(-x)$$, the $$-x$$ replaces $$x$$, so the asymptote $$y = 1$$ becomes $$y = -1$$.\" Identify the logical error in this reasoning. (2 steps)", "answer": "- Step 1: The error is conflating what happens to *inputs* with what happens to *outputs*. The $$-x$$ replaces the input to the function — it changes which x-value you evaluate, not what the output y-value is. The asymptote $$y = 1$$ describes the output (y-value) that the function approaches, not an x-value.\n- Step 2: A horizontal asymptote says \"as $$x \\to \\pm\\infty$$, $$f(x) \\to k$$.\" Under $$f(-x)$$, as $$x \\to +\\infty$$, the function evaluates at $$-\\infty$$, and vice versa — but the limiting y-value is still $$k$$. The direction of approach reverses, but the height does not change.\n\nThe correct intuition: horizontal asymptotes are only affected by *vertical* transformations ($$f(x) + a$$, $$-f(x)$$, $$af(x)$$). *Horizontal* transformations ($$f(-x)$$, $$f(x-a)$$, $$f(ax)$$) change the x-behavior but not the y-limits.", "source": "GLM 5.1 ①", "_id": "glm_1_13"}, {"question": "Edge case: What if $$\\alpha = 90°$$ in Q9? How many solutions does $$\\sin 2x = \\sin 90° = 1$$ have on $$0° < x < 180°$$? (3 steps)", "answer": "- Step 1: $$\\sin 2x = 1$$ means $$2x = 90°$$ (the only angle in $$[0°, 360°]$$ where sine equals 1). So $$x = 45°$$.\n- Step 2: Check the supplementary angle: $$2x = 180° - 90° = 90°$$ — this gives the same $$x = 45°$$, not a distinct second root. The two roots have merged into one.\n- Step 3: Only one solution: $$x = 45°$$. This is a degenerate case where the peak of the sine wave is exactly at the maximum, so the \"two roots\" coincide. The condition $$0° < \\alpha < 90°$$ in the question explicitly excludes this edge case to ensure two distinct roots.", "source": "GLM 5.1 ③", "_id": "glm_3_54"}, {"question": "In a triangle, how do you decide whether to take the acute or obtuse solution from $$\\sin^{-1}$$, and what geometric fact governs the choice? (3 steps)", "answer": "- Step 1: $$\\sin^{-1}$$ on a calculator returns only the acute angle in $$(0°, 90°)$$, but $$\\sin \\theta = \\sin(180° - \\theta)$$, so an obtuse supplement is also a valid solution.\n- Step 2: To decide which applies, use the geometric rule: *the largest angle is opposite the longest side*. If the side opposite your unknown angle is the longest, that angle must be the largest — and if another angle is already, say, $$25°$$, then the largest must exceed the remaining $$\\sim 77°$$, making it obtuse.\n- Step 3: So pick the supplement: $$x = 180° - \\sin^{-1}(\\text{value})$$. Always check the geometry first — never assume the acute answer is correct.", "source": "Opus 4.7 ②", "_id": "opus_2_5"}, {"question": "Misconception probe: A student sees $$\\sin 2x = p$$ and writes $$x = \\sin^{-1}(p) / 2$$ as the only answer. What have they missed? (2 steps)", "answer": "- Step 1: They've found the principal root correctly: $$2x = \\sin^{-1}(p)$$, so $$x = \\frac{\\sin^{-1}(p)}{2}$$. But $$\\sin \\theta = k$$ has two solutions per cycle: $$\\theta = \\sin^{-1}(k)$$ and $$\\theta = 180° - \\sin^{-1}(k)$$.\n- Step 2: The second root is $$2x = 180° - \\sin^{-1}(p)$$, giving $$x = 90° - \\frac{\\sin^{-1}(p)}{2}$$. Missing this second root loses the final marks. On a sine curve between 0° and 360°, every horizontal line (within range) hits the curve twice — you must find both intersections.", "source": "GLM 5.1 ③", "_id": "glm_3_57"}, {"question": "The transformation $$y = f(-x)$$ reflects the graph of $$y = f(x)$$ in which axis? Describe what happens to (a) the x-coordinates of all points, (b) the y-coordinates of all points, and (c) a horizontal asymptote $$y = k$$. (3 steps)", "answer": "- Step 1: $$y = f(-x)$$ reflects the graph in the **y-axis**. Every x-coordinate is negated ($$x \\mapsto -x$$), while every y-coordinate stays the same.\n- Step 2: Concretely: a point $$(a, b)$$ on $$y = f(x)$$ moves to $$(-a, b)$$ on $$y = f(-x)$$. The y-value is unchanged because you're still computing the same function output — just at the mirror-input.\n- Step 3: A horizontal asymptote $$y = k$$ is defined by y-values, not x-values. Since the transformation doesn't change y-values, the horizontal asymptote stays at $$y = k$$. On the script, writing $$y = 1 \\to y = -1$$ was the error — a horizontal asymptote cannot be moved by a purely horizontal reflection.", "source": "GLM 5.1 ①", "_id": "glm_1_12"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "When integrating $$x^n$$, what two operations do you perform on the power, and in what order? How does this differ from differentiating $$x^n$$? (2 steps)", "answer": "- Step 1: To integrate $$x^n$$: add 1 to the power first (getting $$n+1$$), then divide by that new power. So $$\\int x^n \\, dx = \\frac{x^{n+1}}{n+1}$$. The power goes *up*, and you divide.\n- Step 2: To differentiate $$x^n$$: multiply by the current power first, then subtract 1 from the power. So $$\\frac{d}{dx}x^n = nx^{n-1}$$. The power goes *down*, and you multiply.\n\nThe critical distinction: integration raises the power and divides; differentiation lowers the power and multiplies. On the exam, writing the direction wrong (as happened on Q1 — differentiating instead of integrating) turns every term incorrect — a full method error costing all accuracy marks.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": true}, {"question": "When integrating $$-3x^{-2}$$, the final result is $$+\\frac{3}{x}$$, not $$-\\frac{3}{x}$$. Walk through why the sign flips. (3 steps)", "answer": "- Step 1: Start with $$\\int -3x^{-2} \\, dx$$. Apply the rule: add 1 to the power ($$-2 + 1 = -1$$), then divide by the new power.\n- Step 2: $$-3 \\cdot \\frac{x^{-1}}{-1} = -3 \\cdot \\frac{1}{-1} \\cdot x^{-1} = (-3)(-1)x^{-1} = +3x^{-1}$$.\n- Step 3: Rewrite in positive power form: $$+3x^{-1} = +\\frac{3}{x}$$.\n\nThe sign flips because dividing by $$-1$$ turns $$-3$$ into $$+3$$. This is the single most common sign error in integration — whenever the new power is negative, dividing by it can flip the sign of the coefficient.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "Integrate $$2x^{-1/2}$$. Show how dividing by the new power $$\\frac{1}{2}$$ is equivalent to multiplying by 2, and state the final result. (3 steps)", "answer": "- Step 1: Add 1 to the power: $$-\\frac{1}{2} + 1 = +\\frac{1}{2}$$. So we get $$2 \\cdot \\frac{x^{1/2}}{1/2}$$.\n- Step 2: Dividing by $$\\frac{1}{2}$$ is the same as multiplying by 2: $$2 \\times \\frac{x^{1/2}}{1/2} = 2 \\times 2 \\times x^{1/2} = 4x^{1/2}$$.\n- Step 3: In surd notation: $$4x^{1/2} = 4\\sqrt{x}$$.\n\nThe general principle: when integrating a term with a fractional power, dividing by a fraction means multiplying by its reciprocal. So $$\\div \\frac{1}{2} = \\times 2$$, $$\\div \\frac{1}{3} = \\times 3$$. This is exactly where the \"missing power\" error in Q7(b) occurred — the $$2x^{-1/2}$$ term must become $$4x^{1/2}$$, not $$2x^{1/2}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": true}, {"question": "Why must every indefinite integral end with $$+ c$$, and what specific mark-scheme requirement does omitting it violate? (2 steps)", "answer": "- Step 1: Integration is the reverse of differentiation. When you differentiate any constant, it becomes 0 — so when integrating, you cannot recover the original constant. There is a *family* of curves, all differing by a vertical shift, and $$+ c$$ represents that unknown constant.\n- Step 2: On the Edexcel mark scheme, the final accuracy mark (A1) for an indefinite integral specifically requires \"fully correct and simplified with $$+ c$$ all on one line.\" Omitting $$+ c$$ loses that final mark — and scattering terms across multiple lines loses it too.\n\nThink of $$+ c$$ as the admission that integration can only recover the *shape* of the function, not its vertical position — that position is pinned down later by a boundary condition (like $$f(12) = 8\\sqrt{3}$$ in Q7).", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "Given $$\\int(10x^5 + 6x^3 - 3x^{-2}) \\, dx$$, explain the sign on the $$x^{-2}$$ term after integration and state why the answer must appear simplified on one line. (3 steps)", "answer": "- Step 1: Integrate each term separately using the power rule:\n+ $$\\int 10x^5 \\, dx = \\frac{10x^6}{6} = \\frac{5}{3}x^6$$\n+ $$\\int 6x^3 \\, dx = \\frac{6x^4}{4} = \\frac{3}{2}x^4$$\n+ $$\\int -3x^{-2} \\, dx = -3 \\cdot \\frac{x^{-1}}{-1} = +3x^{-1} = +\\frac{3}{x}$$\n- Step 2: The sign on the last term is *positive* because dividing $$-3$$ by $$-1$$ (the new power) gives $$+3$$. This is the sign flip from the negative-power rule.\n- Step 3: The mark scheme demands the final answer as one simplified expression: $$\\frac{5}{3}x^6 + \\frac{3}{2}x^4 + \\frac{3}{x} + c$$, all on one line. Scattered terms across multiple lines or unsimplified fractions lose the final accuracy mark.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "Given $$f'(x) = 2x^{-1/2} + Ax^{-2} + 3$$, differentiate to find $$f''(x)$$. Walk through each term, paying attention to how the coefficients change. (3 steps)", "answer": "- Step 1: Apply the power rule to each term — multiply by the power, then subtract 1 from the power.\n+ First term: $$\\frac{d}{dx}(2x^{-1/2}) = 2 \\times (-\\frac{1}{2}) \\times x^{-1/2 - 1} = -x^{-3/2}$$\n+ Second term: $$\\frac{d}{dx}(Ax^{-2}) = A \\times (-2) \\times x^{-2-1} = -2Ax^{-3}$$\n+ Third term: $$\\frac{d}{dx}(3) = 0$$\n- Step 2: Combine: $$f''(x) = -x^{-3/2} - 2Ax^{-3}$$.\n- Step 3: Notice the signs — both surviving terms are negative. The coefficient $$2$$ became $$-1$$ (from $$2 \\times -\\frac{1}{2}$$), and $$A$$ became $$-2A$$ (from $$A \\times -2$$). On the script, getting these coefficients wrong made the entire differentiation *invalid*, which scored 0 even though the final answer $$A = -4$$ was correct.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "If $$f''(4) = 0$$ and $$f''(x) = -x^{-3/2} - 2Ax^{-3}$$, walk through substituting $$x = 4$$ and solving for $$A$$. Show the evaluation of $$4^{-3/2}$$ and $$4^{-3}$$ explicitly. (4 steps)", "answer": "- Step 1: Substitute $$x = 4$$ into $$f''(x)$$: $$f''(4) = -4^{-3/2} - 2A \\cdot 4^{-3} = 0$$.\n- Step 2: Evaluate the powers of 4:\n+ $$4^{-3/2} = \\frac{1}{4^{3/2}} = \\frac{1}{(4^{1/2})^3} = \\frac{1}{2^3} = \\frac{1}{8}$$\n+ $$4^{-3} = \\frac{1}{4^3} = \\frac{1}{64}$$\n- Step 3: So $$-\\frac{1}{8} - 2A \\cdot \\frac{1}{64} = 0$$, which gives $$-\\frac{1}{8} - \\frac{2A}{64} = 0$$, i.e., $$-\\frac{1}{8} - \\frac{A}{32} = 0$$.\n- Step 4: Rearrange: $$-\\frac{A}{32} = \\frac{1}{8}$$, so $$A = -\\frac{32}{8} = -4$$.\n\nThe key insight: every step must be valid for the marks to count. On the script, the differentiation was wrong, so even arriving at $$A = -4$$ scored M0 A0 dM0 A0 — zero out of four.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "Given $$f'(x) = 2x^{-1/2} - 4x^{-2} + 3$$ and $$f(12) = 8\\sqrt{3}$$, explain the full process to find $$f(x)$$: integrate, then use the boundary condition to find $$c$$. Why is the fractional-power term the one most likely to be mishandled? (4 steps)", "answer": "- Step 1: Integrate each term of $$f'(x)$$:\n+ $$\\int 2x^{-1/2} \\, dx = 2 \\cdot \\frac{x^{1/2}}{1/2} = 4x^{1/2} = 4\\sqrt{x}$$\n+ $$\\int -4x^{-2} \\, dx = -4 \\cdot \\frac{x^{-1}}{-1} = +4x^{-1} = \\frac{4}{x}$$\n+ $$\\int 3 \\, dx = 3x$$\nSo $$f(x) = 4\\sqrt{x} + \\frac{4}{x} + 3x + c$$.\n- Step 2: The fractional-power term $$2x^{-1/2}$$ is the most error-prone because dividing by $$\\frac{1}{2}$$ (the new power) means multiplying by 2, turning the coefficient 2 into 4. Dropping this factor was the specific error on the script — writing $$2x^{1/2}$$ instead of $$4x^{1/2}$$.\n- Step 3: Substitute the boundary condition $$f(12) = 8\\sqrt{3}$$:\n+ $$4\\sqrt{12} + \\frac{4}{12} + 3(12) + c = 8\\sqrt{3}$$\n+ $$4 \\cdot 2\\sqrt{3} + \\frac{1}{3} + 36 + c = 8\\sqrt{3}$$\n+ $$8\\sqrt{3} + 36 + \\frac{1}{3} + c = 8\\sqrt{3}$$\n- Step 4: The $$8\\sqrt{3}$$ cancels on both sides, leaving $$c = -36 - \\frac{1}{3} = -\\frac{109}{3}$$. Hence $$f(x) = 4\\sqrt{x} + \\frac{4}{x} + 3x - \\frac{109}{3}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "In triangle ABC, side AB = 21 cm is opposite angle C, and side BC = 13 cm is opposite angle A = 25°. Write down the sine rule equation connecting these four quantities. (2 steps)", "answer": "- Step 1: The sine rule states that each side is proportional to the sine of its opposite angle: $$\\frac{a}{\\sin A} = \\frac{b}{\\sin B} = \\frac{c}{\\sin C}$$.\n- Step 2: Matching sides to their opposite angles: $$\\frac{BC}{\\sin A} = \\frac{AB}{\\sin C}$$, i.e., $$\\frac{13}{\\sin 25°} = \\frac{21}{\\sin x°}$$, where $$x = \\angle ACB$$.\n\nThe most common setup error is pairing a side with the wrong angle. Always verify: the side must be opposite the angle it pairs with — draw the triangle and check visually.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "If $$\\sin x = 0.6827$$ and $$x$$ is an angle in a triangle, there are two possible values of $$x$$ between 0° and 180°. Explain geometrically why, and state both values. (3 steps)", "answer": "- Step 1: The sine function is symmetric about 90° in the range 0° to 180°. For any value $$\\sin \\alpha = k$$ (where $$0 < k < 1$$), there is an acute angle $$\\alpha$$ and an obtuse angle $$180° - \\alpha$$ that both give the same sine value.\n- Step 2: This is the identity $$\\sin(180° - \\alpha) = \\sin \\alpha$$. On the unit circle, both angles have the same y-coordinate (height), hence the same sine.\n- Step 3: With $$\\sin x = 0.6827$$: the acute solution is $$x = \\sin^{-1}(0.6827) = 43.05°$$, and the obtuse solution is $$x = 180° - 43.05° = 136.95°$$.\n\nThis ambiguity is why triangle problems often include extra information (like \"AB is the longest side\") to tell you which angle to choose.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": true}, {"question": "In a triangle, if you know which side is the longest, how does that tell you whether the unknown angle is acute or obtuse? Apply this to the case where AB = 21 cm is the longest side and angle C is opposite AB. (2 steps)", "answer": "- Step 1: In any triangle, the largest angle is opposite the longest side (and the smallest angle is opposite the shortest side). This follows directly from the sine rule: since $$\\frac{a}{\\sin A}$$ is constant, a larger side means a larger $$\\sin A$$, and hence a larger angle.\n- Step 2: Since AB = 21 cm is the longest side, the angle opposite it (angle C) must be the largest angle in the triangle. Given that the other known angle is only 25°, angle C must be obtuse: $$x = 136.95°$$, not $$43.05°$$.\n\nWithout this clue, you would have to state both possible angles. The \"longest side\" information is the disambiguator — that's why the question deliberately includes it.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": true}, {"question": "In Q2, writing $$\\sin x = 0.6830$$ instead of $$0.6827$$ lost the accuracy mark in part (a). The follow-through then gave $$x = 136.93°$$ instead of $$136.95°$$ in part (b). Explain the mechanism: why does rounding early produce a different final answer, and what habit prevents this? (3 steps)", "answer": "- Step 1: The true value is $$\\sin x = 0.68269...$$. Rounded to 4 decimal places, this is $$0.6827$$. But rounding *up* to $$0.6830$$ introduces an error of about $$0.0003$$ in the sine value.\n- Step 2: When you then compute $$\\sin^{-1}(0.6830)$$, you get a slightly different acute angle than $$\\sin^{-1}(0.6827)$$. The obtuse supplement inherits this error: $$180° - 43.07°... = 136.93°$$ instead of $$136.95°$$.\n- Step 3: Prevention: carry the full calculator display (or stored value) through every intermediate step. Only round at the very end, to exactly the precision the question requests. If part (a) asks for 4 dp, compute with full accuracy, write 0.6827, and *store* the full value for use in part (b).\n\nThe mark scheme penalised the 4 dp slip in (a) but forgave the propagated error in (b) via follow-through. You still lost the (a) mark — and on a stricter mark scheme, you might lose both.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": true}, {"question": "The transformation $$y = f(-x)$$ reflects the graph of $$y = f(x)$$ in which axis? Describe what happens to (a) the x-coordinates of all points, (b) the y-coordinates of all points, and (c) a horizontal asymptote $$y = k$$. (3 steps)", "answer": "- Step 1: $$y = f(-x)$$ reflects the graph in the **y-axis**. Every x-coordinate is negated ($$x \\mapsto -x$$), while every y-coordinate stays the same.\n- Step 2: Concretely: a point $$(a, b)$$ on $$y = f(x)$$ moves to $$(-a, b)$$ on $$y = f(-x)$$. The y-value is unchanged because you're still computing the same function output — just at the mirror-input.\n- Step 3: A horizontal asymptote $$y = k$$ is defined by y-values, not x-values. Since the transformation doesn't change y-values, the horizontal asymptote stays at $$y = k$$. On the script, writing $$y = 1 \\to y = -1$$ was the error — a horizontal asymptote cannot be moved by a purely horizontal reflection.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": true}, {"question": "A student reasons: \"In $$y = f(-x)$$, the $$-x$$ replaces $$x$$, so the asymptote $$y = 1$$ becomes $$y = -1$$.\" Identify the logical error in this reasoning. (2 steps)", "answer": "- Step 1: The error is conflating what happens to *inputs* with what happens to *outputs*. The $$-x$$ replaces the input to the function — it changes which x-value you evaluate, not what the output y-value is. The asymptote $$y = 1$$ describes the output (y-value) that the function approaches, not an x-value.\n- Step 2: A horizontal asymptote says \"as $$x \\to \\pm\\infty$$, $$f(x) \\to k$$.\" Under $$f(-x)$$, as $$x \\to +\\infty$$, the function evaluates at $$-\\infty$$, and vice versa — but the limiting y-value is still $$k$$. The direction of approach reverses, but the height does not change.\n\nThe correct intuition: horizontal asymptotes are only affected by *vertical* transformations ($$f(x) + a$$, $$-f(x)$$, $$af(x)$$). *Horizontal* transformations ($$f(-x)$$, $$f(x-a)$$, $$f(ax)$$) change the x-behavior but not the y-limits.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": true}, {"question": "How does the transformation $$y = -f(x)$$ differ from $$y = f(-x)$$ in terms of (a) which axis the graph reflects in, (b) what happens to coordinates, and (c) what happens to a horizontal asymptote $$y = k$$? (3 steps)", "answer": "- Step 1: **Which axis**: $$y = -f(x)$$ reflects in the **x-axis** (vertical flip), while $$y = f(-x)$$ reflects in the **y-axis** (horizontal flip).\n- Step 2: **Coordinates**: Under $$-f(x)$$, a point $$(a, b)$$ moves to $$(a, -b)$$ — x unchanged, y negated. Under $$f(-x)$$, a point $$(a, b)$$ moves to $$(-a, b)$$ — x negated, y unchanged.\n- Step 3: **Horizontal asymptote**: Under $$-f(x)$$, the asymptote $$y = k$$ becomes $$y = -k$$ (because all y-values are negated). Under $$f(-x)$$, the asymptote $$y = k$$ stays $$y = k$$ (because y-values are unchanged).\n\nSummary: $$-f(x)$$ flips y-values → moves horizontal asymptotes. $$f(-x)$$ flips x-values → keeps horizontal asymptotes. On Q4(ii), the error was treating $$f(-x)$$ as if it were $$-f(x)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "For each transformation, state whether a horizontal asymptote $$y = k$$ changes, and if so, to what: (i) $$f(x) + a$$, (ii) $$f(x - a)$$, (iii) $$f(-x)$$, (iv) $$-f(x)$$, (v) $$af(x)$$. (2 steps)", "answer": "- Step 1: A horizontal asymptote describes the y-value the function approaches. It changes only when y-values are altered:\n+ (i) $$f(x) + a$$: shifts up by $$a$$ → asymptote becomes $$y = k + a$$ ✓ changes\n+ (ii) $$f(x - a)$$: horizontal shift only → asymptote stays $$y = k$$ ✗ unchanged\n+ (iii) $$f(-x)$$: horizontal reflection only → asymptote stays $$y = k$$ ✗ unchanged\n+ (iv) $$-f(x)$$: vertical reflection → asymptote becomes $$y = -k$$ ✓ changes\n+ (v) $$af(x)$$: vertical stretch → asymptote becomes $$y = ak$$ ✓ changes\n- Step 2: The rule of thumb: if the transformation modifies the *output* (y-values) of the function, the horizontal asymptote moves. If it only modifies the *input* (x-values), the horizontal asymptote is untouched.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "Explain why $$\\sin(180° - \\alpha) = \\sin \\alpha$$ using the symmetry of the sine curve. Where are both angles on the graph? (3 steps)", "answer": "- Step 1: On the sine curve $$y = \\sin x$$, the graph rises from 0 at $$x = 0°$$ to a peak of 1 at $$x = 90°$$, then falls symmetrically back to 0 at $$x = 180°$$. The curve is symmetric about the line $$x = 90°$$.\n- Step 2: If $$\\alpha$$ is an angle in the first quadrant (between 0° and 90°), then $$180° - \\alpha$$ is the mirror image of $$\\alpha$$ on the other side of $$x = 90°$$. By the symmetry of the curve, both angles have the same height (same y-value), so $$\\sin(180° - \\alpha) = \\sin \\alpha$$.\n- Step 3: Concretely: $$\\alpha = 30°$$ and $$180° - 30° = 150°$$ both give $$\\sin = 0.5$$. This is exactly the symmetry that creates the \"ambiguous case\" in the sine rule — two different angles with the same sine.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "Using the sine curve, explain why $$\\sin(-\\alpha) = -\\sin \\alpha$$ and why $$\\sin(180° + \\alpha) = -\\sin \\alpha$$. What visual feature of the graph produces both identities? (3 steps)", "answer": "- Step 1: The sine curve has **rotational symmetry** (point symmetry) about the origin. If you rotate the curve 180° around the origin, it maps onto itself. This means $$\\sin(-\\alpha) = -\\sin \\alpha$$: going left from the origin gives the negative of going right by the same amount.\n- Step 2: The sine curve also has rotational symmetry about the point $$(180°, 0)$$. Rotating around this point, the value at $$\\alpha$$ (in the first quadrant) maps to the value at $$180° + \\alpha$$ (in the third quadrant), with sign reversed. So $$\\sin(180° + \\alpha) = -\\sin \\alpha$$.\n- Step 3: Both identities come from the same underlying structure: sine is an *odd* function (symmetric through the origin), and its half-period shift flips the sign. In the range 0°–360°, the pattern is: first quadrant positive, second quadrant positive (by the $$180° - \\alpha$$ identity), third quadrant negative (by the $$180° + \\alpha$$ identity), fourth quadrant negative (by the $$-\\alpha$$ identity).", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": true}, {"question": "Express $$\\sin(\\alpha - 180°)$$ in terms of $$\\sin \\alpha$$ by combining the identities you know. Show two different routes to the answer. (3 steps)", "answer": "- Step 1: **Route 1 — using $$\\sin(-\\theta) = -\\sin \\theta$$ first**: Write $$\\sin(\\alpha - 180°) = \\sin(-(180° - \\alpha))$$. Apply the odd-function identity: $$= -\\sin(180° - \\alpha)$$. Then apply the supplementary-angle identity: $$= -\\sin \\alpha$$.\n- Step 2: **Route 2 — using $$\\sin(180° + \\theta) = -\\sin \\theta$$ first**: Write $$\\alpha - 180° = -(180° - \\alpha)$$. Let $$\\beta = 180° - \\alpha$$, so this is $$\\sin(-\\beta) = -\\sin \\beta = -\\sin(180° - \\alpha) = -\\sin \\alpha$$.\n- Step 3: Both routes give the same answer: $$\\sin(\\alpha - 180°) = -\\sin \\alpha$$. In Q9(a)(ii), this was the exact required step: $$\\sin(\\alpha - 180°) = -\\sin \\alpha = -p$$.\n\nThe key skill is chaining identities: when the angle doesn't match a standard form directly, rewrite it until it does.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "The function $$y = \\sin x$$ has period 360°. What is the period of $$y = \\sin(kx)$$, and why? Give the specific case for $$k = 2$$. (3 steps)", "answer": "- Step 1: The period is the smallest positive angle $$P$$ such that $$\\sin(k(x + P)) = \\sin(kx)$$ for all $$x$$. This requires $$kP = 360°$$, so $$P = \\frac{360°}{k}$$.\n- Step 2: The factor $$k$$ inside the argument *compresses* the graph horizontally by a factor of $$k$$. More oscillations fit into the same horizontal space — the wave repeats $$k$$ times as often.\n- Step 3: For $$k = 2$$: the period of $$\\sin 2x$$ is $$\\frac{360°}{2} = 180°$$. Two complete sine waves fit in the space where one wave of $$\\sin x$$ sat. On Q9(b), this was the required sketch — same amplitude (1), but twice as many oscillations.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "Given $$\\sin \\alpha = p$$ where $$0 < \\alpha < 90°$$, find all values of $$x$$ in $$0 < x < 180°$$ satisfying $$\\sin 2x = p$$. Walk through the logic step by step. (4 steps)", "answer": "- Step 1: We need $$\\sin 2x = \\sin \\alpha$$. Since $$0 < x < 180°$$, the argument $$2x$$ ranges over $$0 < 2x < 360°$$. So we're looking for all angles in 0°–360° whose sine equals $$\\sin \\alpha$$.\n- Step 2: In the range 0°–360°, the angles with $$\\sin \\theta = \\sin \\alpha$$ are: $$\\theta = \\alpha$$ (first quadrant) and $$\\theta = 180° - \\alpha$$ (second quadrant, by the supplementary-angle identity). No solutions in the third and fourth quadrants since $$\\sin$$ is negative there while $$\\sin \\alpha > 0$$.\n- Step 3: Set $$2x$$ equal to each solution:\n+ $$2x = \\alpha \\implies x = \\frac{\\alpha}{2}$$\n+ $$2x = 180° - \\alpha \\implies x = 90° - \\frac{\\alpha}{2}$$\n- Step 4: Verify both are in range: since $$0 < \\alpha < 90°$$, we have $$0 < \\frac{\\alpha}{2} < 45°$$ ✓ and $$45° < 90° - \\frac{\\alpha}{2} < 90°$$ ✓. Both lie in $$0 < x < 180°$$.\n\nThe common error is finding only one root. The double-angle inside creates twice the range for the argument, so two solutions exist where only one would appear for $$\\sin x = p$$.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "On Q7(a), the answer $$A = -4$$ was correct, but the differentiation steps producing it were invalid. The mark scheme awarded M0 A0 dM0 A0 — zero out of four. Explain the principle behind this and why it matters. (2 steps)", "answer": "- Step 1: The mark scheme awards method marks (M) for valid mathematical steps, and accuracy marks (A) for correct results arising from those steps. If the method is invalid — wrong differentiation, incorrect algebraic manipulation — then no method mark is awarded, and the accuracy marks that depend on it also cannot be earned, even if the final number happens to be right.\n- Step 2: This principle protects against guessing or calculator-only answers. The examiner must see a *valid route* to the answer. On Q7(a), the differentiation of $$2x^{-1/2}$$ and $$Ax^{-2}$$ was done incorrectly (powers not reduced properly), so the equation $$f''(4) = 0$$ was set up with wrong expressions — making the entire derivation invalid, regardless of the final number.\n\nThe exam habit: write every line of working carefully, especially differentiation and integration. A correct number from a broken process is worth exactly zero.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "When solving $$2u^2 - 15u - 50 = 0$$ (where $$u = x^2$$), you get $$u = 10$$ or $$u = -\\frac{5}{2}$$. Why must one root be rejected, and what must you write to earn the mark? (2 steps)", "answer": "- Step 1: Since $$u = x^2$$ and a squared real number is always non-negative, $$u = -\\frac{5}{2}$$ is impossible. There is no real $$x$$ such that $$x^2 = -2.5$$.\n- Step 2: To earn the rejection mark, you must *state the reason*: write something like \"reject $$u = -\\frac{5}{2}$$ since $$x^2 \\geq 0$$\" or \"since a square cannot be negative.\" Just crossing it out without explanation may not earn the mark.\n\nHarry's exact reasoning on the board: \"because a square is always non-negative.\" This is the kind of concise, mathematical justification the mark scheme looks for.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "An equation contains terms in $$x^{3/2}$$ and $$\\sqrt{x}$$ (i.e., $$x^{1/2}$$). Explain why the substitution $$u = \\sqrt{x}$$ converts this into a polynomial, and show what each term becomes. (3 steps)", "answer": "- Step 1: If $$u = \\sqrt{x}$$, then $$x = u^2$$. This means $$x^{1/2} = u$$ and $$x^{3/2} = (x^{1/2})^3 = u^3$$. Every fractional power of $$x$$ with denominator 2 becomes an integer power of $$u$$.\n- Step 2: For example, an equation like $$x^{3/2} + 8x^{1/2} - 24 = 0$$ becomes $$u^3 + 8u - 24 = 0$$ — a standard cubic in $$u$$ that can be solved by factor theorem or inspection.\n- Step 3: After finding the valid root(s) for $$u$$, convert back: $$u = \\sqrt{x} \\geq 0$$, so reject any negative roots for $$u$$. Then $$x = u^2$$. The substitution works because all the exponents in the original equation share the denominator 2, so expressing in terms of $$u$$ (where $$u^2 = x$$) clears all fractions.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "To simplify $$\\frac{9^{2x+1} \\cdot 3^{3x-3}}{27^{2x-a}}$$, the first step is to express every base as a power of 3. Show how 9 and 27 convert, then combine the exponents. (3 steps)", "answer": "- Step 1: Convert to base 3: $$9 = 3^2$$ and $$27 = 3^3$$. So $$9^{2x+1} = (3^2)^{2x+1} = 3^{4x+2}$$, $$3^{3x-3}$$ stays as is, and $$27^{2x-a} = (3^3)^{2x-a} = 3^{6x-3a}$$.\n- Step 2: Combine using the laws of indices — multiply by adding exponents in the numerator, divide by subtracting exponents:\n$$\\frac{3^{4x+2} \\cdot 3^{3x-3}}{3^{6x-3a}} = 3^{(4x+2)+(3x-3)-(6x-3a)}$$\n- Step 3: Simplify the exponent: $$(4x+2)+(3x-3)-(6x-3a) = 4x+2+3x-3-6x+3a = x - 1 + 3a$$. Final answer: $$3^{x-1+3a}$$.\n\nThe entire technique rests on one principle: express everything in terms of a single common base, then the problem reduces to adding and subtracting exponents.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "Compute $$4^{-3/2}$$ and $$4^{-3}$$ without a calculator, showing each step. These values appeared in Q7(a) when substituting $$x = 4$$ into $$f''(x)$$. (3 steps)", "answer": "- Step 1: For $$4^{-3/2}$$: a negative exponent means reciprocal, and the denominator 2 means square root. Work from the outside in:\n+ $$4^{-3/2} = \\frac{1}{4^{3/2}}$$\n+ $$4^{3/2} = (4^{1/2})^3 = 2^3 = 8$$\n+ So $$4^{-3/2} = \\frac{1}{8}$$\n- Step 2: For $$4^{-3}$$: $$4^{-3} = \\frac{1}{4^3} = \\frac{1}{64}$$.\n- Step 3: In the Q7(a) equation $$-\\frac{1}{8} - \\frac{A}{32} = 0$$, the $$\\frac{1}{8}$$ came from $$4^{-3/2}$$ and the $$\\frac{1}{32}$$ came from $$\\frac{2}{64} = \\frac{1}{32}$$ (since the term was $$2A \\cdot 4^{-3} = 2A \\cdot \\frac{1}{64} = \\frac{A}{32}$$).\n\nThe key skill: evaluate negative/fractional powers step by step — handle the sign (reciprocal), then the denominator of the fraction (root), then the numerator (power). Never try to do it all at once.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": true}, {"question": "Some exam questions state: \"In this question you must show all stages of your working. Solutions relying on calculator technology are not acceptable.\" What does this mean in practice, and what types of working are considered \"invalid\"? (2 steps)", "answer": "- Step 1: In practice, this means you must write out every algebraic step on paper: expanding brackets, factorising quadratics, applying formulae, simplifying surds. You cannot skip steps by computing the answer on your calculator and just writing the result. Even if your calculator can solve the quadratic, you must show the factorisation or quadratic formula working.\n- Step 2: \"Invalid\" working includes: writing an answer with no method shown; using a calculator's equation solver without showing the algebraic setup; differentiating or integrating incorrectly (even if the final number is right). The principle extends beyond the explicitly-flagged questions — on *any* question, a correct answer reached through invalid working can score 0, as demonstrated by Q7(a).", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "For the transformation $$y = f(x) - 2$$ applied to a curve with minimum $$P(-1, 0)$$, maximum $$Q(\\frac{2}{3}, 2)$$, and horizontal asymptote $$y = 1$$: state the new coordinates and the new asymptote. Why does the asymptote move? (3 steps)", "answer": "- Step 1: $$y = f(x) - 2$$ shifts the entire graph down by 2 units. Every y-coordinate decreases by 2; x-coordinates are unchanged.\n+ $$P(-1, 0) \\to (-1, -2)$$\n+ $$Q(\\frac{2}{3}, 2) \\to (\\frac{2}{3}, 0)$$\n+ Asymptote $$y = 1 \\to y = -1$$\n- Step 2: The asymptote moves because it is defined by y-values: \"the function approaches $$y = 1$$\" becomes \"the function approaches $$y = 1 - 2 = -1$$.\" A vertical translation shifts every horizontal feature down.\n- Step 3: The shape of the curve is unchanged — same hills and valleys, just sitting 2 units lower. This is what makes it a *translation* rather than a stretch or reflection.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "In Q7(b), when substituting $$f(12) = 8\\sqrt{3}$$, the term $$4\\sqrt{12} = 8\\sqrt{3}$$ appeared on the left side and $$8\\sqrt{3}$$ on the right. They cancelled completely. Is this a coincidence, or is there a reason the question was designed this way? (2 steps)", "answer": "- Step 1: It is by design. The question setter chose $$f(12) = 8\\sqrt{3}$$ precisely because $$4\\sqrt{12} = 4 \\cdot 2\\sqrt{3} = 8\\sqrt{3}$$. This makes the surd terms cancel, leaving only rational numbers to solve for $$c$$. Without this cancellation, the constant $$c$$ would contain a surd, making the final answer messier.\n- Step 2: The lesson: when a boundary condition seems to produce a \"nice\" cancellation, trust it and simplify eagerly. Compute $$4\\sqrt{12}$$ as $$8\\sqrt{3}$$ before substituting — don't leave it as $$4\\sqrt{12}$$ and hope it works out. This is also a sanity check: if the surd terms don't cancel when the question seems designed for them to, re-check your integration.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": true}, {"question": "Put the entire Q7 process in order: (i) integrate $$f'(x)$$ to get $$f(x)$$, (ii) differentiate $$f'(x)$$ to get $$f''(x)$$, (iii) use a boundary condition to find $$c$$, (iv) set $$f''(x) = 0$$ to find $$A$$. What is the correct sequence, and why? (3 steps)", "answer": "- Step 1: The correct sequence is: (ii) → (iv) → (i) → (iii). First, differentiate $$f'(x)$$ to get $$f''(x)$$, then use the condition $$f''(4) = 0$$ to find $$A$$. Only after $$A$$ is known can you integrate $$f'(x)$$ (which contains $$A$$) to get $$f(x)$$. Finally, use the boundary condition $$f(12) = 8\\sqrt{3}$$ to find $$c$$.\n- Step 2: The dependency chain is: $$f''(x)$$ depends on $$f'(x)$$ (given) → solving $$f''(4) = 0$$ gives $$A$$ → $$f(x)$$ depends on $$f'(x)$$ *and* $$A$$ → solving $$f(12) = 8\\sqrt{3}$$ gives $$c$$. You cannot skip ahead to integrate before knowing $$A$$, because the integral would contain the unknown $$A$$.\n- Step 3: The conceptual point: part (a) and part (b) are linked. Part (a) resolves the unknown in the integrand; part (b) uses that resolved value. On the script, both parts had errors — invalid differentiation in (a) and a dropped power in (b) — showing that each step must be executed correctly for the chain to hold.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "If $$\\sin \\alpha = p$$ where $$0 < \\alpha < 90°$$, express $$2\\sin(180° - \\alpha) + \\sin(\\alpha - 180°)$$ in terms of $$p$$ only. This combines two of the Q9(a) identities. (3 steps)", "answer": "- Step 1: Apply the supplementary-angle identity: $$\\sin(180° - \\alpha) = \\sin \\alpha = p$$. So $$2\\sin(180° - \\alpha) = 2p$$.\n- Step 2: Apply the chained identity: $$\\sin(\\alpha - 180°) = \\sin(-(180° - \\alpha)) = -\\sin(180° - \\alpha) = -\\sin \\alpha = -p$$.\n- Step 3: Combine: $$2p + (-p) = p$$.\n\nThis shows how the identities interact: the supplementary-angle identity preserves the sign, while the odd-function identity ($$\\sin(-\\theta) = -\\sin \\theta$$) flips it. Chaining them correctly is the core skill tested in Q9(a).", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "Integrate $$\\int(6x^2 + \\frac{5}{x^3}) \\, dx$$, simplifying fully with $$+ c$$. Identify which term requires careful sign handling. (2 steps)", "answer": "- Step 1: Rewrite $$\\frac{5}{x^3} = 5x^{-3}$$. Then integrate term by term:\n+ $$\\int 6x^2 \\, dx = \\frac{6x^3}{3} = 2x^3$$\n+ $$\\int 5x^{-3} \\, dx = 5 \\cdot \\frac{x^{-2}}{-2} = -\\frac{5}{2}x^{-2} = -\\frac{5}{2x^2}$$\n- Step 2: The second term requires careful sign handling: dividing by $$-2$$ flips the sign of the coefficient from $$+5$$ to $$-\\frac{5}{2}$$. Final answer: $$2x^3 - \\frac{5}{2x^2} + c$$.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": true}, {"question": "Given $$\\sin 40° = k$$, express $$\\sin 220°$$ in terms of $$k$$. (2 steps)", "answer": "- Step 1: $$220° = 180° + 40°$$. Using the identity $$\\sin(180° + \\alpha) = -\\sin \\alpha$$: $$\\sin 220° = \\sin(180° + 40°) = -\\sin 40° = -k$$.\n- Step 2: Geometrically, 220° is in the third quadrant (between 180° and 270°), where sine is negative. The identity confirms: the magnitude equals $$\\sin 40°$$ but the sign is negative.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "A curve has a maximum at $$(2, 3)$$ and a horizontal asymptote $$y = 1$$. State the new maximum coordinates and the new asymptote after the transformation $$y = -f(x)$$. (2 steps)", "answer": "- Step 1: $$y = -f(x)$$ reflects in the x-axis: x-coordinates unchanged, y-coordinates negated. The maximum $$(2, 3)$$ becomes $$(2, -3)$$ (now a minimum, since the curve is flipped).\n- Step 2: The horizontal asymptote $$y = 1$$ becomes $$y = -1$$ (all y-values are negated, including the limiting value). The key distinction from $$f(-x)$$: this transformation *does* move the horizontal asymptote because it changes y-values.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": false}, {"question": "In general, $$\\sin 2x = p$$ has two solutions in $$0 < x < 180°$$ when $$0 < p < 1$$. For what value of $$p$$ is there exactly one solution, and what is it? (2 steps)", "answer": "- Step 1: The two solutions are $$x = \\frac{\\alpha}{2}$$ and $$x = 90° - \\frac{\\alpha}{2}$$, where $$\\sin \\alpha = p$$. These coincide (giving one solution) when $$\\frac{\\alpha}{2} = 90° - \\frac{\\alpha}{2}$$, i.e., $$\\alpha = 90°$$.\n- Step 2: When $$\\alpha = 90°$$, $$p = \\sin 90° = 1$$, and the single solution is $$x = 45°$$. This is the peak of the sine wave — the only point where the two roots merge. For any $$p < 1$$, there are two distinct roots; for $$p = 1$$, exactly one; for $$p > 1$$, none.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": false}, {"question": "Before writing your final answer to any exam question, what six checks should you run? Name them all. (2 steps)", "answer": "- Step 1: The six checks from the A* execution-habits card:\n+ **Precision**: how many dp/sf? Or exact/surd form?\n+ **What is being asked**: a coordinate pair or a single value? An angle or its sine?\n+ **Which case**: obtuse or acute? Which root, and why is the other rejected?\n+ **Required form**: $$y = mx + c$$? $$a + b\\sqrt{5}$$? Integer coefficients?\n+ **Working**: does the question say \"show all stages\"? If so, no calculator-only lines.\n+ **Finish**: $$+ c$$ on indefinite integrals; every term simplified, on one line.\n- Step 2: These six checks catch the specific errors that lost marks on this paper: Q1 (wrong direction, no $$+ c$$), Q2 (wrong precision), Q4 (wrong curve shape — points alone don't score), Q7 (invalid working, dropped power), Q9 (wrong trig case). Running this checklist before every final line is the cheapest grade you will ever buy back.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}], "count": 36}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "When applying the power rule, what is the fundamental mechanical difference between differentiating $$ax^n$$ and integrating $$ax^n$$, and why are they opposite operations? (3 steps)", "answer": "- Step 1: The mechanical difference lies in what you do to the power $$n$$. To differentiate, you **multiply by the power** and **subtract 1** from it: $$\\frac{d}{dx}(ax^n) = anx^{n-1}$$. To integrate, you **add 1 to the power** and **divide by the new power**: $$\\int ax^n \\,dx = \\frac{ax^{n+1}}{n+1}$$.\n- Step 2: The reason they are opposite operations is the Fundamental Theorem of Calculus. Differentiation asks \"what is the gradient (rate of change) of the area accumulation?\", while integration asks \"what is the total area accumulated under this gradient curve?\".\n+ Differentiation strips a layer of the function's growth (reducing the power).\n+ Integration rebuilds that layer (increasing the power).\n- Step 3: Because they are inverses, integrating a derivative (or differentiating an integral) returns the original function (plus a constant). If you accidentally reduce the power while integrating, you are doing two differentiations in a row, which breaks the mathematical logic.\n\nTakeaway: Integration *raises* the power and *divides*; differentiation *lowers* the power and *multiplies* — they are inverse operations.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": true}, {"question": "When integrating $$-3x^{-2}$$, the final simplified term is $$+\\frac{3}{x}$$. Conceptually, where does the sign flip from negative to positive come from? (3 steps)", "answer": "- Step 1: Start with the integral: $$\\int -3x^{-2} \\,dx$$. Apply the power rule: add 1 to the power to get $$-2 + 1 = -1$$, and divide by the new power $$-1$$.\n- Step 2: The division by the new power is the source of the sign flip. You are dividing $$-3$$ by $$-1$$, which yields $$+3$$. So the coefficient becomes positive: $$\\frac{-3}{-1}x^{-1} = +3x^{-1}$$.\n+ A common mistake is to only add 1 to the power and forget to divide the coefficient by the new power, missing the sign flip entirely.\n- Step 3: Rewriting the negative power as a fraction confirms the logic: $$+3x^{-1} = +\\frac{3}{x}$$. The sign flip is purely an arithmetic consequence of dividing a negative coefficient by a negative new power.\n\nTakeaway: Dividing by a negative new power flips the sign of the coefficient — always carry the sign through the division step.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": true}, {"question": "If you blindly apply the integration power rule to $$x^{-1}$$, you get $$\\frac{x^0}{0}$$, which is undefined. What is the true antiderivative of $$x^{-1}$$, and why does the standard power rule break down here? (3 steps)", "answer": "- Step 1: The true antiderivative of $$x^{-1}$$ (or $$\\frac{1}{x}$$) is the natural logarithm, $$\\ln|x|$$, not a power function.\n- Step 2: The power rule breaks down because it assumes the derivative will lower the power by 1. If you differentiate $$\\ln(x)$$, you get $$\\frac{1}{x} = x^{-1}$$. There is no \"power lowering\" happening; the logarithm's derivative is a simple reciprocal.\n+ Conversely, think about differentiating $$x^n$$: you bring down an $$n$$ and drop the power. If you tried to differentiate something to get $$x^{-1}$$, the original power would have to be $$0$$ (since $$0 - 1 = -1$$). But the derivative of $$x^0 = 1$$ is $$0$$, not $$x^{-1}$$.\n- Step 3: Because there is no polynomial/power function whose derivative is $$x^{-1}$$, the power rule formula $$\\frac{x^{n+1}}{n+1}$$ fails at $$n=-1$$ (division by zero). The logarithm is the special function designed to fill this gap in the family of antiderivatives.\n\nTakeaway: $$x^{-1}$$ is the exception to the power rule — its integral is the natural logarithm, $$\\ln|x|$$.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": true}, {"question": "Integrate $$2x^{-1/2}$$ mentally. What is the resulting coefficient and power, and how do you perform the arithmetic quickly? (3 steps)", "answer": "- Step 1: Apply the integration power rule: add 1 to the power $$-\\frac{1}{2}$$ to get $$\\frac{1}{2}$$. Divide the coefficient $$2$$ by the new power $$\\frac{1}{2}$$.\n- Step 2: Dividing by $$\\frac{1}{2}$$ is the same as multiplying by its reciprocal, $$2$$. So, $$2 \\div \\frac{1}{2} = 2 \\times 2 = 4$$.\n- Step 3: Combine the new coefficient and power: the result is $$4x^{1/2}$$ (or $$4\\sqrt{x}$$). The coefficient doubles because you are dividing by a half.\n\nTakeaway: Dividing by a fractional power $$\\frac{1}{n}$$ is equivalent to multiplying by $$n$$ — use this to quickly flip fractions in your head.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "In an exam, a student uses a calculator to solve a quadratic and writes down only the final correct roots, but the question states \"you must show all stages of your working.\" Why does this score zero? (2 steps)", "answer": "- Step 1: Exam mark schemes are structured around Method (M) and Accuracy (A) marks. Method marks are awarded for demonstrating the required mathematical process (e.g., factorisation, substitution, using a formula).\n+ A correct answer with no working shows the *result* but not the *process*. The calculator did the work, not the student.\n- Step 2: Because the question explicitly forbids calculator-reliant solutions, the mark scheme will withhold all method marks. Without any method marks, the accuracy marks (which depend on valid methods) also drop to zero. Hence, a correct answer from invalid/invisible working yields M0 A0.\n\nTakeaway: Method marks pay for the journey, not just the destination; if the rubric bans calculators, invisible work earns zero credit.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": true}, {"question": "Why must we always add a constant of integration \"$$+c$$\" when finding an indefinite integral, and what happens visually if we forget it? (2 steps)", "answer": "- Step 1: Differentiation destroys vertical shift information. If you differentiate $$x^2$$, $$x^2 + 5$$, and $$x^2 - 10$$, they all yield $$2x$$. Therefore, when we reverse the process (integrate $$2x$$), we cannot know which original vertical shift existed.\n- Step 2: Visually, forgetting $$+c$$ means you only draw one specific curve (like $$x^2$$ passing through the origin). Adding $$+c$$ acknowledges that the true antiderivative is a whole *family* of curves — identical in shape but shifted vertically up or down by $$c$$ units. Forgetting it means you are missing infinitely many valid solutions.\n\nTakeaway: $$+c$$ represents the lost vertical translation information destroyed by differentiation.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": true}, {"question": "When sketching $$y = f(-x)$$, why does a horizontal asymptote (like $$y = k$$) remain completely unchanged, while a vertical asymptote (like $$x = a$$) moves? (3 steps)", "answer": "- Step 1: A horizontal asymptote $$y = k$$ describes the $$y$$-value the curve approaches as $$x$$ goes to infinity. The transformation $$f(-x)$$ reflects the graph across the $$y$$-axis, meaning you replace $$x$$ with $$-x$$. This changes the *direction* you travel to infinity (left instead of right), but the $$y$$-value you arrive at remains $$k$$.\n- Step 2: A vertical asymptote $$x = a$$ occurs where the function is undefined (e.g., division by zero at $$x=a$$). In $$f(-x)$$, the function is now undefined when the *input* is $$-a$$, because $$f(-(-a)) = f(a)$$ causes the same division by zero.\n- Step 3: Therefore, the vertical asymptote moves from $$x = a$$ to $$x = -a$$ (it reflects across the $$y$$-axis), but the horizontal asymptote stays at $$y = k$$ because the output values at the extremes don't change, just the direction you approach them from.\n\nTakeaway: Horizontal reflections ($$f(-x)$$) only move features tied to the $$x$$-coordinate (vertical asymptotes, $$x$$-intercepts); $$y$$-values at infinity are unaffected.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": true}, {"question": "How do horizontal and vertical asymptotes behave under the transformation $$y = -f(x)$$, and why is this different from $$y = f(-x)$$? (2 steps)", "answer": "- Step 1: Under $$y = -f(x)$$, the graph is reflected in the $$x$$-axis. This flips all $$y$$-values, so a horizontal asymptote $$y = k$$ becomes $$y = -k$$. However, the $$x$$-values causing undefined behavior (vertical asymptotes) remain exactly the same, so $$x = a$$ stays at $$x = a$$.\n- Step 2: This differs from $$y = f(-x)$$ because $$-f(x)$$ alters the *output* (flipping the sign of the whole function), which shifts horizontal targets, whereas $$f(-x)$$ alters the *input* (negating the argument before evaluating), which shifts horizontal positions and vertical targets.\n\nTakeaway: $$-f(x)$$ flips outputs (affects horizontal asymptotes and $$y$$-intercepts); $$f(-x)$$ negates inputs (affects vertical asymptotes and $$x$$-intercepts).", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "A curve $$y = f(x)$$ has a vertical asymptote at $$x = 3$$ and a horizontal asymptote at $$y = -2$$. State the equations of the asymptotes for the transformed curve $$y = -f(-x)$$. (2 steps)", "answer": "- Step 1: Break $$y = -f(-x)$$ into two reflections. The $$-x$$ inside reflects the graph horizontally: the vertical asymptote $$x = 3$$ moves to $$x = -3$$. The horizontal asymptote $$y = -2$$ is unaffected by the horizontal reflection and remains $$y = -2$$.\n- Step 2: The negative sign outside ($$-f$$) reflects the graph vertically: the horizontal asymptote $$y = -2$$ flips to $$y = 2$$. The vertical asymptote $$x = -3$$ is unaffected by the vertical reflection.\n+ Final result: Vertical asymptote is $$x = -3$$, horizontal asymptote is $$y = 2$$.\n\nTakeaway: Apply transformations sequentially: $$f(-x)$$ moves the vertical asymptote, then the outer $$-$$ sign moves the horizontal asymptote.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "When using the sine rule to find an angle, why does the \"ambiguous case\" exist, and how is it related to the unit circle? (2 steps)", "answer": "- Step 1: The sine rule can give you $$\\sin \\theta = k$$ (where $$0 < k < 1$$). To find $$\\theta$$, you take $$\\sin^{-1}(k)$$, which gives the principal acute angle. However, on the unit circle, sine corresponds to the $$y$$-coordinate.\n- Step 2: In the range $$0^\\circ$$ to $$180^\\circ$$, there are *two* points on the unit circle with the same positive $$y$$-coordinate: one in the first quadrant ($$\\theta$$) and one in the second quadrant ($$180^\\circ - \\theta$$). Both angles are mathematically valid solutions to $$\\sin \\theta = k$$, creating the ambiguous case.\n\nTakeaway: A positive sine value always corresponds to two possible angles in a triangle: an acute angle and its obtuse supplement.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": true}, {"question": "In a triangle, you use the sine rule and find $$\\sin x = 0.7$$. This gives a possible acute angle and a possible obtuse angle. If the question states that the side opposite angle $$x$$ is the *longest* side of the triangle, which angle must you choose and why? (2 steps)", "answer": "- Step 1: In any triangle, the longest side is always opposite the largest angle. If the side opposite angle $$x$$ is the longest, then angle $$x$$ must be the largest angle in the triangle.\n- Step 2: A triangle can only have at most one obtuse angle. If $$x$$ were the acute angle (say $$\\approx 44^\\circ$$), it would likely be smaller than the other angles, contradicting the fact that it must be the largest. Therefore, $$x$$ must be the obtuse angle ($$180^\\circ - 44^\\circ = 136^\\circ$$) to be the largest angle in the triangle.\n\nTakeaway: Geometric constraints (like \"longest side\") force the angle to be the largest, resolving the ambiguous case in favor of the obtuse angle.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "A student calculates a value as $$0.68269...$$ and rounds it to $$0.6830$$ for a 4 decimal place answer. The correct 4dp answer is $$0.6827$$. Conceptually, why does this early rounding error happen, and why is it dangerous in multi-part questions? (2 steps)", "answer": "- Step 1: The error happens because the student likely rounded to 3 significant figures or 3 decimal places first (getting $$0.683$$) and then appended a zero to make it \"4 decimal places\" ($$0.6830$$). True 4dp rounding looks at the 5th decimal digit to decide whether to round up the 4th digit. Here, the digit after the 2 is a 6, so it rounds up to $$0.6827$$.\n- Step 2: This is dangerous in multi-part questions because subsequent calculations use this flawed base number. Even though mark schemes often allow \"follow through\" errors (so you aren't penalized twice), your entire subsequent working is now based on a mathematically incorrect value, drifting further from the true answer.\n\nTakeaway: Always carry the full calculator display (full precision) through intermediate steps, and round only at the final answer to the exact requested format.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "Using the unit circle, explain why $$\\sin(180^\\circ - \\alpha) = \\sin(\\alpha)$$, but $$\\sin(180^\\circ + \\alpha) = -\\sin(\\alpha)$$. (3 steps)", "answer": "- Step 1: Imagine an angle $$\\alpha$$ in the first quadrant. Its sine is the positive $$y$$-coordinate of the point on the unit circle. Now, reflect this angle across the $$y$$-axis to get $$180^\\circ - \\alpha$$ in the second quadrant.\n- Step 2: Because the reflection is horizontal (across the $$y$$-axis), the $$y$$-coordinate remains exactly the same. Therefore, $$\\sin(180^\\circ - \\alpha) = \\sin(\\alpha)$$.\n- Step 3: Now, rotate the original angle by exactly $$180^\\circ$$ to get $$180^\\circ + \\alpha$$ in the third quadrant. This moves the point into the negative $$x$$ and negative $$y$$ territory. The $$y$$-coordinate is now the exact negative of the original, so $$\\sin(180^\\circ + \\alpha) = -\\sin(\\alpha)$$.\n\nTakeaway: Quadrant 2 mirrors Quadrant 1 across the $$y$$-axis (sine stays positive); Quadrant 3 mirrors Quadrant 1 through the origin (sine goes negative).", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": true}, {"question": "If $$\\sin(40^\\circ) = k$$, use symmetry identities to express $$\\sin(-140^\\circ)$$ in terms of $$k$$. (3 steps)", "answer": "- Step 1: Start with the odd property of sine: $$\\sin(-\\theta) = -\\sin(\\theta)$$. We can rewrite $$\\sin(-140^\\circ)$$ as $$-\\sin(140^\\circ)$$.\n- Step 2: Now, express $$140^\\circ$$ in terms of the given angle $$40^\\circ$$. Notice that $$140^\\circ = 180^\\circ - 40^\\circ$$. So, $$-\\sin(140^\\circ) = -\\sin(180^\\circ - 40^\\circ)$$.\n- Step 3: Apply the identity $$\\sin(180^\\circ - \\alpha) = \\sin(\\alpha)$$. This gives $$-\\sin(40^\\circ)$$. Since $$\\sin(40^\\circ) = k$$, the final answer is $$-k$$.\n\nTakeaway: Use the core identities to gradually reduce unknown angles to known reference angles, keeping track of sign changes at each step.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "Why does the graph of $$y = \\sin(2x)$$ have a period of $$180^\\circ$$ instead of $$360^\\circ$$, and how does this affect the number of complete waves in a $$360^\\circ$$ window? (3 steps)", "answer": "- Step 1: The period of a sine wave $$y = \\sin(bx)$$ is calculated as $$\\frac{360^\\circ}{|b|}$$. For $$y = \\sin(2x)$$, $$b = 2$$, so the period is $$\\frac{360^\\circ}{2} = 180^\\circ$$.\n- Step 2: Conceptually, the \"2x\" inside the function means the input $$x$$ is being multiplied by 2 before the sine function evaluates it. This means the function traverses the unit circle twice as fast as normal.\n+ For $$x$$ to go through a full $$360^\\circ$$ cycle on the unit circle, the actual input $$x$$ only needs to go from $$0$$ to $$180^\\circ$$ (because $$2 \\times 180^\\circ = 360^\\circ$$).\n- Step 3: Because the wave completes a full cycle in half the usual horizontal distance, two complete sine waves will fit into the standard $$0^\\circ$$ to $$360^\\circ$$ window.\n\nTakeaway: A multiplier inside the argument ($$bx$$) compresses the graph horizontally by a factor of $$b$$, multiplying the number of waves and dividing the period by $$b$$.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "You are solving $$\\sin(2x) = p$$ for $$0 < x < 180^\\circ$$. Why does this yield two solutions, whereas solving $$\\sin(x) = p$$ for $$0 < x < 180^\\circ$$ usually yields only one? (2 steps)", "answer": "- Step 1: The domain for $$x$$ is $$0 < x < 180^\\circ$$. Because the function is $$\\sin(2x)$$, the actual angle being evaluated by the sine function is $$2x$$. Multiply the domain by 2: the range for the inner angle $$2x$$ is $$0 < 2x < 360^\\circ$$.\n- Step 2: Within a full $$360^\\circ$$ cycle ($$0$$ to $$360^\\circ$$), a positive sine value $$p$$ occurs twice: once in the first quadrant (the principal angle) and once in the second quadrant (the supplementary angle). Since the inner angle $$2x$$ traverses a full circle, it hits both of these points, yielding two distinct values for $$2x$$, and thus two values for $$x$$.\n\nTakeaway: Always map the domain of $$x$$ to the domain of the *inner function* ($$2x$$, $$3x$$, etc.) to see how many full cycles and thus how many roots exist.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": true}, {"question": "Solve $$\\sin(2x) = \\sin(50^\\circ)$$ for $$0 < x < 180^\\circ$$. State the two values of $$x$$. (3 steps)", "answer": "- Step 1: The equation tells us the inner angle $$2x$$ has a sine equal to $$\\sin(50^\\circ)$$. The two angles in a $$360^\\circ$$ cycle with this sine are the principal angle $$50^\\circ$$ and its supplement $$180^\\circ - 50^\\circ = 130^\\circ$$. So, $$2x = 50^\\circ$$ or $$2x = 130^\\circ$$.\n- Step 2: Divide both angles by 2 to solve for $$x$$.\n+ $$2x = 50^\\circ \\implies x = 25^\\circ$$\n+ $$2x = 130^\\circ \\implies x = 65^\\circ$$\n- Step 3: Check against the domain $$0 < x < 180^\\circ$$. Both $$25^\\circ$$ and $$65^\\circ$$ fall well within the limits, confirming these are the only two valid roots.\n\nTakeaway: Find the two valid inner angles for the sine function, then divide by the coefficient to find $$x$$.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "When solving a quartic equation like $$2x^4 - 15x^2 - 50 = 0$$, you substitute $$u = x^2$$ to get $$2u^2 - 15u - 50 = 0$$. If this yields $$u = 10$$ and $$u = -2.5$$, which root must be rejected and for what fundamental mathematical reason? (2 steps)", "answer": "- Step 1: The substitution defines $$u = x^2$$. In the real number system, squaring any real number (positive or negative) always yields a non-negative result. Therefore, $$x^2 \\ge 0$$, which implies $$u \\ge 0$$.\n- Step 2: The root $$u = -2.5$$ violates this fundamental property because it is negative. There is no real number $$x$$ that can be squared to produce $$-2.5$$. Therefore, $$u = -2.5$$ is an extraneous root introduced by the quadratic structure and must be rejected, leaving only $$u = 10$$.\n\nTakeaway: When substituting $$u = x^2$$, immediately reject any negative roots for $$u$$ because a squared real number cannot be negative.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "After substituting $$u = \\sqrt{x}$$ to solve a polynomial, you factorise to get $$(u-2)(u^2 + 2u + 12) = 0$$. Why is the quadratic factor rejected, and what does its discriminant tell you about the graph of $$y = u^2 + 2u + 12$$? (2 steps)", "answer": "- Step 1: Calculate the discriminant of the quadratic factor $$u^2 + 2u + 12$$, which is $$b^2 - 4ac = (2)^2 - 4(1)(12) = 4 - 48 = -44$$. Because the discriminant is negative, there are no real roots for this quadratic.\n- Step 2: Graphically, a negative discriminant means the parabola $$y = u^2 + 2u + 12$$ never crosses the $$u$$-axis (the line $$y=0$$). Since it is a positive quadratic (opens upwards), it is always above the $$u$$-axis. Therefore, it never equals zero, and those roots do not exist in the real number system.\n\nTakeaway: A negative discriminant means the quadratic never touches the horizontal axis, so it can never equal zero — reject it.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": true}, {"question": "Why is it essential to express all bases to a common prime base when simplifying complex index expressions like $$\\frac{9^{2x+1} \\cdot 27^{3x-3}}{81^{2x-a}}$$? (2 steps)", "answer": "- Step 1: Bases like 9, 27, and 81 are not independent; they are all powers of the prime base 3 ($$9=3^2$$, $$27=3^3$$, $$81=3^4$$). The laws of indices (adding powers on multiplication, subtracting on division) *only* apply when the bases are identical.\n- Step 2: By converting everything to base 3, the expression becomes a single base raised to a giant combination of exponents: $$3^{2(2x+1)} \\cdot 3^{3(3x-3)} / 3^{4(2x-a)}$$. This collapses the entire fraction into a single term $$3^{\\text{algebraic expression}}$$, allowing you to simplify the algebra in the exponent easily.\n\nTakeaway: Different bases hide the true exponent relationships; converting to a common base unlocks the index laws.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": true}, {"question": "Simplify the expression $$\\frac{8^x \\cdot 4^{x+1}}{2^{2x}}$$ by converting to a common base and using index laws. (3 steps)", "answer": "- Step 1: Identify the common base. Both 8 and 4 are powers of 2. Rewrite them: $$8 = 2^3$$ and $$4 = 2^2$$.\n- Step 2: Substitute these into the expression: $$\\frac{(2^3)^x \\cdot (2^2)^{x+1}}{2^{2x}}$$. Apply the power-to-power rule (multiply exponents): $$\\frac{2^{3x} \\cdot 2^{2x+2}}{2^{2x}}$$.\n- Step 3: Combine the numerator by adding exponents: $$2^{3x + 2x + 2} = 2^{5x+2}$$. Then subtract the denominator's exponent: $$2^{(5x+2) - 2x} = 2^{3x+2}$$.\n\nTakeaway: Convert to the prime base, expand the exponents, then add/subtract them to collapse the expression.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}], "count": 21}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "When you integrate a term like $$5x^4$$, what happens to the power and coefficient, and why is this the *reverse* operation of differentiation? (3 steps)", "answer": "- Step 1: Differentiation of $$5x^4$$ would give $$5 \\times 4 \\times x^{4-1} = 20x^3$$ — you multiply by the power, then subtract 1 from the power. This is \"bring the power down, reduce the power.\"\n- Step 2: Integration is the undoing of that. To integrate $$5x^4$$: add 1 to the power to get 5, then divide by that new power: $$\\frac{5x^5}{5} = x^5$$. The logic is \"raise the power, divide by the new power.\"\n- Step 3: The reason this works is precisely because differentiation of $$x^5$$ gives $$5x^4$$ — so integrating $$5x^4$$ must return us to $$x^5 + c$$. Integration asks: \"what function, when differentiated, gives me this?\"\n\nThe directional arrows are: differentiate = power goes **down**, integrate = power goes **up**.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "When integrating $$-3x^{-2}$$, the result is $$+\\frac{3}{x}$$, not $$-\\frac{3}{x}$$. Why does the sign flip, and what is the general principle at work? (3 steps)", "answer": "- Step 1: Apply the power rule: add 1 to the power ($$-2 + 1 = -1$$), then divide by the new power ($$\\div -1$$). So we get $$-3 \\cdot \\frac{x^{-1}}{-1}$$.\n- Step 2: Dividing by $$-1$$ is the same as multiplying by $$-1$$, which flips the sign: $$-3 \\times \\frac{x^{-1}}{-1} = -3 \\times (-x^{-1}) = +3x^{-1}$$.\n- Step 3: Rewrite as a fraction: $$+3x^{-1} = +\\frac{3}{x}$$. The general principle: whenever you integrate a term with a negative power, dividing by that (negative) new power will flip the sign. The mistake is to mechanically raise the power without tracking the division step — that division by a negative number is where the sign change lives.\n\n**Key trap:** If the original coefficient is negative AND the new power is negative, two negatives cancel to positive.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "Integrate $$2x^{-1/2}$$. Walk through the fractional power arithmetic and explain why the coefficient doubles. (3 steps)", "answer": "- Step 1: Add 1 to the power: $$-\\frac{1}{2} + 1 = +\\frac{1}{2}$$. So the integrated power is $$x^{1/2}$$.\n- Step 2: Divide by the new power: $$2 \\div \\frac{1}{2} = 2 \\times 2 = 4$$. Dividing by a half is the same as multiplying by 2.\n- Step 3: Result: $$4x^{1/2} = 4\\sqrt{x} + c$$. The coefficient doubled because dividing by $$\\frac{1}{2}$$ is multiplication by 2. This is the \"missing power\" that cost marks — the fractional arithmetic must be done explicitly, not guessed.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": true}, {"question": "What is the one-word difference between the integration rule and the differentiation rule for powers, and what visual image can you use to never confuse them? (2 steps)", "answer": "- Step 1: Integration: \"add 1 to the power, divide by the new power.\" Differentiation: \"multiply by the power, subtract 1 from the power.\" The key words are **add** vs. **subtract** and **divide** vs. **multiply**.\n- Step 2: Visual image: think of integration as building **up** (power rises, you grow the expression) and differentiation as stripping **down** (power falls, you reduce the expression). On a graph, integration accumulates area (building up); differentiation finds the steepness (a single, stripped-down value at each point).\n\nBefore every calculus question, pause and ask: \"Am I building up (integrate) or stripping down (differentiate)?\"", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": true}, {"question": "Why must an indefinite integral always end with \"$$+ c$$\", and what would go wrong mathematically if you omitted it? (2 steps)", "answer": "- Step 1: Integration recovers a family of functions, not just one. If $$\\frac{dy}{dx} = 3x^2$$, then $$y = x^3 + c$$ for ANY constant $$c$$. All of $$x^3$$, $$x^3 + 5$$, $$x^3 - 17$$ differentiate to $$3x^2$$.\n- Step 2: Without $$+ c$$, you are claiming that only one specific antiderivative exists, which is false. The mark scheme typically awards a dedicated mark for $$+ c$$ — dropping it loses that mark. The constant represents the vertical translation ambiguity: the derivative only tells you the slope, not where the curve sits vertically.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "A student writes $$\\int 10x^5 \\, dx = 50x^4$$. What did they do, and what should they have done? (2 steps)", "answer": "- Step 1: They differentiated instead of integrating. $$50x^4$$ is the result of \"multiply by the power (×5) and subtract 1\" — that's the differentiation rule applied to $$10x^5$$.\n- Step 2: To integrate correctly: add 1 to the power ($$5+1=6$$), divide by the new power ($$\\div 6$$): $$\\frac{10x^6}{6} = \\frac{5}{3}x^6$$. This was exactly the Q1 error — 3 marks lost for applying the wrong rule direction.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "In the sine rule $$\\frac{\\sin A}{a} = \\frac{\\sin B}{b}$$, if side $$a$$ is the longest side of the triangle, what does that force about angle $$A$$, and why? (2 steps)", "answer": "- Step 1: In any triangle, the largest angle is always opposite the longest side. This follows directly from the geometry: a longer side \"stretches\" further, requiring a wider opening angle to reach its endpoints.\n- Step 2: If $$a$$ is the longest side, then angle $$A$$ is the largest angle. In a triangle where one angle exceeds 90°, it must be the largest angle — so if the question tells you the longest side, it's telling you which angle could be obtuse. This is the key that unlocks Q2(b): $$AB$$ being the longest side forces $$\\angle C$$ to be obtuse.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "Using the sine rule, you find $$\\sin x = 0.6827$$. The calculator gives $$\\sin^{-1}(0.6827) \\approx 43.05°$$. But the answer should be $$136.95°$$. Why are there two solutions, and how do you know which one to pick? (3 steps)", "answer": "- Step 1: The sine function is positive in both the first quadrant (0°–90°) and the second quadrant (90°–180°). So if $$\\sin x = k > 0$$, there are two candidates: $$x = \\sin^{-1}(k)$$ (acute) and $$x = 180° - \\sin^{-1}(k)$$ (obtuse).\n- Step 2: Here, the acute candidate is $$43.05°$$ and the obtuse candidate is $$180° - 43.05° = 136.95°$$. Both give the same sine value because of the identity $$\\sin(180° - \\alpha) = \\sin \\alpha$$.\n- Step 3: The question states that $$AB$$ is the longest side, so angle $$C$$ (opposite $$AB$$) is the largest angle — it must be obtuse. Therefore the answer is $$136.95°$$, not $$43.05°$$. The question's geometric constraint resolves the ambiguity; without it, both would be valid.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": true}, {"question": "Why does rounding $$0.68269...$$ to $$0.6830$$ (instead of $$0.6827$$) count as a mistake for \"4 decimal places,\" and what is the correct rounding procedure? (2 steps)", "answer": "- Step 1: Four decimal places means the fourth digit after the decimal point. The value is $$0.682\\underline{6}9...$$ — the fifth digit is 9, which rounds the fourth digit up from 6 to 7, giving $$0.6827$$. Writing $$0.6830$$ means you rounded to 3 decimal places and then padded with a zero — that's a different operation.\n- Step 2: The correct procedure: keep the full calculator display through all working, and only round at the very final answer to exactly the precision requested. Premature rounding at an intermediate step introduces error that propagates — here, it changed $$136.95°$$ into $$136.93°$$.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "For the transformation $$y = f(-x)$$, explain what happens to a horizontal asymptote $$y = k$$ and why. Contrast this with $$y = -f(x)$$. (3 steps)", "answer": "- Step 1: $$y = f(-x)$$ reflects the graph in the $$y$$-axis — it's a horizontal transformation. Every point $$(x, y)$$ moves to $$(-x, y)$$. The $$y$$-values are untouched.\n- Step 2: A horizontal asymptote $$y = k$$ says \"as $$x \\to \\pm\\infty$$, $$y \\to k$$.\" Under $$f(-x)$$, as $$x \\to +\\infty$$ the function now reads $$f(-\\infty)$$, which is the old left-tail behavior — but it still approaches $$y = k$$. The asymptote's $$y$$-value is unchanged because the transformation only swaps left and right; it doesn't move anything vertically. So $$y = 1$$ stays $$y = 1$$.\n- Step 3: For $$y = -f(x)$$, the graph reflects in the $$x$$-axis — every $$y$$-value flips sign. A horizontal asymptote $$y = k$$ becomes $$y = -k$$. This is a vertical transformation, so it moves horizontal features.\n\n**Rule:** Horizontal transformations ($$f(-x)$$, $$f(x-a)$$) move vertical asymptotes but leave horizontal asymptotes alone. Vertical transformations ($$-f(x)$$, $$f(x)+a$$) move horizontal asymptotes but leave vertical asymptotes alone.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": true}, {"question": "For $$y = f(x-3)$$, what happens to a vertical asymptote $$x = 5$$ and a horizontal asymptote $$y = 2$$? Explain why. (2 steps)", "answer": "- Step 1: $$f(x-3)$$ shifts the graph 3 units to the right. The vertical asymptote shifts too: $$x = 5 \\to x = 8$$. Anything that depends on the $$x$$-input position moves with the shift.\n- Step 2: The horizontal asymptote $$y = 2$$ is unaffected. As $$x \\to \\infty$$, the function values still approach 2 — shifting the input right doesn't change what value the tails approach, only where they start approaching it.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "In a transformation sketch question, you correctly label the new turning point coordinates but draw the wrong curve shape and wrong asymptote. Why does this score zero? (2 steps)", "answer": "- Step 1: The mark scheme awards marks for the shape of the curve and the equation of the asymptote. Coordinates are additional credit on top of a correct sketch. If the curve is wrong, the coordinates — even if numerically correct — are sitting on the wrong graph.\n- Step 2: The logic is: a correct answer attached to an incorrect method/graph is inconsistent. The examiner cannot verify you understood the transformation if the visual evidence (the curve) contradicts the numbers. Marks follow the method, not just the answer.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "State the three standard sine symmetry identities for angles related to $$\\alpha$$, and give a geometric picture for each. (3 steps)", "answer": "- Step 1: $$\\sin(180° - \\alpha) = \\sin \\alpha$$. Picture: the angles $$\\alpha$$ and $$180° - \\alpha$$ are supplements — they share the same reference triangle in the first and second quadrants. The vertical side (opposite) is the same length, so the sine is the same.\n- Step 2: $$\\sin(-\\alpha) = -\\sin \\alpha$$. Picture: reflecting an angle through the $$x$$-axis flips the vertical side from positive to negative. The opposite side changes sign, so the sine changes sign.\n- Step 3: $$\\sin(180° + \\alpha) = -\\sin \\alpha$$. Picture: the angle $$180° + \\alpha$$ is in the third quadrant. The vertical side is now below the $$x$$-axis (negative), so sine is negative. You can also see this as $$\\sin(180° + \\alpha) = \\sin(180° - (-\\alpha)) = \\sin(-\\alpha) = -\\sin \\alpha$$.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "Given $$\\sin \\alpha = p$$ where $$0 < \\alpha < 90°$$, express $$\\sin(\\alpha - 180°)$$ in terms of $$p$$. Walk through the symmetry step by step. (3 steps)", "answer": "- Step 1: Rewrite $$\\alpha - 180°$$ as $$-(180° - \\alpha)$$. This pulls out the negative sign so we can use the odd-function identity.\n- Step 2: Apply $$\\sin(-\\theta) = -\\sin \\theta$$: $$\\sin(-(180° - \\alpha)) = -\\sin(180° - \\alpha)$$.\n- Step 3: Apply $$\\sin(180° - \\alpha) = \\sin \\alpha = p$$: so $$-\\sin(180° - \\alpha) = -p$$. The answer is $$-p$$.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": true}, {"question": "Given $$\\sin \\alpha = p$$, express $$3 + \\sin(180° + \\alpha)$$ in terms of $$p$$. (2 steps)", "answer": "- Step 1: $$\\sin(180° + \\alpha) = -\\sin \\alpha = -p$$ by the third-quadrant identity.\n- Step 2: Therefore $$3 + \\sin(180° + \\alpha) = 3 + (-p) = 3 - p$$. The \"+180°\" puts you in the third quadrant where sine is negative; the constant 3 is outside the sine function and is unaffected.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "The graph $$y = \\sin 2x$$ has period 180°. Explain why, using the idea of horizontal compression. (3 steps)", "answer": "- Step 1: The basic $$y = \\sin x$$ completes one full wave (0 to peak to 0 to trough to 0) over $$360°$$. That's its period.\n- Step 2: Replacing $$x$$ with $$2x$$ means the function cycles twice as fast. When $$x$$ goes from $$0°$$ to $$180°$$, the argument $$2x$$ goes from $$0°$$ to $$360°$$ — a full cycle is already done.\n- Step 3: So the period is halved: $$360° \\div 2 = 180°$$. In the interval $$0° < x < 180°$$, you get one complete wave of $$\\sin 2x$$, and in $$0° < x < 360°$$ you get two full waves — \"two full waves in the same space\" as one wave of $$\\sin x$$.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "Solve $$\\sin 2x = p = \\sin \\alpha$$ on $$0 < x < 180°$$, where $$0 < \\alpha < 90°$$. Why are there exactly two solutions, and what are they? (3 steps)", "answer": "- Step 1: The equation $$
