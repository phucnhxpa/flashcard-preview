\n\n**Takeaway:** The answer is only part of the score. Valid methodology is what proves you can apply the concept to new situations.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "For the integration drill: ∫(6x² + 5/x³)dx, show the correct integration with handling of the negative power, and explain why 5/x³ becomes -5/(2x²). (2 steps)", "answer": "- Step 1: Rewrite 5/x³ as 5x^{-3}. Apply the power rule to each term:\n+ ∫6x² dx = 6 × (x³/3) = 2x³\n+ ∫5x^{-3} dx = 5 × (x^{-2}/-2) = -5/2 x^{-2} = -5/(2x²)\n- Step 2: Why -5/(2x²)? The new power is -3 + 1 = -2. We divide by -2: 5 ÷ (-2) = -5/2. This is the sign flip in action — because we're dividing by a negative number (-2), the result is negative. Final answer: 2x³ - 5/(2x²) + c.\n\n**Takeaway:** For ∫x^n dx where n is negative: new power is n+1 (still negative), divide by n+1 → negative result if n+1 < 0. The \"5/2\" comes from 5 ÷ 2, the \"negative\" comes from dividing by -2.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "For the integration drill: ∫(3/√x + 2x)dx, show the correct integration with handling of the fractional power. (2 steps)", "answer": "- Step 1: Rewrite 3/√x as 3x^{-1/2}. Apply the power rule:\n+ ∫3x^{-1/2} dx = 3 × (x^{1/2}/(1/2)) = 3 × 2x^{1/2} = 6√x\n+ ∫2x dx = 2 × (x²/2) = x²\n- Step 2: The key for the fractional power: -1/2 + 1 = 1/2, and dividing by 1/2 means multiplying by 2. So 3 × 2 = 6. Final answer: 6√x + x² + c.\n\n**Takeaway:** For fractional powers: -1/2 + 1 = 1/2, and ÷(1/2) = ×2. The math works the same as integer powers — just be careful with fractions.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "In Q4(i), for y = f(x) - 2 (translation down 2), the minimum at P(-1, 0) becomes (-1, -2), the maximum at Q(2/3, 2) becomes (2/3, 0), and the asymptote y = 1 becomes y = -1. Explain why the order of the points (which is minimum/maximum) stays the same after translation. (1 step)", "answer": "- Step 1: Translation moves every point by the same amount (down 2). The relative positions don't change — the point that was the minimum remains the minimum, just lower. The point that was the maximum remains the maximum, just lower. What was left of the y-axis stays left; what was right stays right. Only the y-coordinates change, not which point is which extremum.\n\n**Takeaway:** Translation preserves the order/relationship between features. The shape stays the same; only position changes.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": true}, {"question": "Why is sin(α - 180°) = -p (not p) when sin α = p? Explain using angle manipulation. (2 steps)", "answer": "- Step 1: Rewrite α - 180° = -(180° - α). Using the odd function property: sin(-θ) = -sin θ.\n- Step 2: sin(α - 180°) = sin(-(180° - α)) = -sin(180° - α). And sin(180° - α) = sin α = p. So sin(α - 180°) = -p. The 180° shift flips the sign because it's an odd function about the origin when you account for the full period.\n\n**Takeaway:** Always rewrite as a standard form: α - 180° = -(180° - α), then apply sin(-θ) = -sin θ, then sin(180° - α) = sin α.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "In the extra practice, when solving u³ + 7u² - 24 = 0 by substituting u = √x, we got (u - 2)(u² + 2u + 12) = 0. Explain why we reject the quadratic factor and what principle this illustrates. (2 steps)", "answer": "- Step 1: The quadratic u² + 2u + 12 has discriminant Δ = 4 - 48 = -44 < 0. A negative discriminant means no real roots — only complex roots exist. Since u = √x must be real (we're working with real-valued functions), we reject this factor entirely.\n- Step 2: This illustrates the principle: after substitution, always check whether the resulting equation makes sense in the original context. The substitution was u = √x, so u must be real. Even though mathematically u² + 2u + 12 = 0 has solutions, they aren't real, so they aren't valid for our problem.\n\n**Takeaway:** Check feasibility of roots after substitution. Negative discriminant → no real solutions → reject.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "Summarize the five recurring mistake themes from this paper and the specific habit that fixes each. (1 step)", "answer": "| Theme | Root Cause | Fix |\n|-------|-----------|-----|\n| 1. Calculus mechanics | Confusing integration with differentiation; mishandling negative/fractional powers | Add 1 to power, divide by new power; check sign flips on negatives |\n| 2. Premature rounding | Rounding during calculation, not just at end | Carry full accuracy; round once to stated precision |\n| 3. Sketch curve + asymptote | Drawing points without the transformed curve | Sketch the actual shape AND asymptote, not just coordinates |\n| 4. Invalid working | Correct answer from wrong method | Show valid mathematical steps; no calculator-only |\n| 5. Trig symmetry | Not knowing sin(180° - α) = sin α, etc. | Memorize the three symmetries cold |\n\n**Takeaway:** These five themes account for 21 lost marks. Fixing themes 4 and 5 alone (Q7 and Q9) recovers 14 marks — nearly a full grade boundary.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "For the A* execution habits card, explain: \"Integrate vs differentiate: integrate = up a power, ÷ new power; differentiate = × power, down one.\" (1 step)", "answer": "- Step 1: This is the core mechanics check. Integration: x^n → x^{n+1}/(n+1) — power increases by 1. Differentiation: x^n → n × x^{n-1} — multiply by original power, power decreases by 1. Before starting any calculus question, pause and ask: \"Am I going up or down in power?\" Going the wrong direction loses all accuracy marks.\n\n**Takeaway:** The power change direction tells you immediately whether you're integrating or differentiating. Check before you write.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "In Q10 from the original paper (not fully covered in the review), one must find the gradient of a normal to a curve. Explain the relationship between the gradient of the tangent and the gradient of the normal, and why their product is -1. (1 step)", "answer": "- Step 1: The normal is perpendicular to the tangent. For two lines with slopes m₁ and m₂ to be perpendicular, m₁ × m₂ = -1 (one is the negative reciprocal of the other). This comes from the angle between lines: if tan θ₁ and tan θ₂ are slopes, perpendicular means θ₂ = θ₁ + 90°, and tan(θ₁ + 90°) = -cot θ₁ = -1/tan θ₁. So m₂ = -1/m₁, hence m₁m₂ = -1.\n\n**Takeaway:** Normal gradient = -1/(tangent gradient). If tangent is m, normal is -1/m.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": true}, {"question": "A student integrates and gets the right-looking answer but forgets +c, losing the final accuracy mark. Why is +c necessary and what does omitting it signal to the examiner? (1 step)", "answer": "- Step 1:** Omitting +c signals conceptual misunderstanding — it suggests the student thinks there's only one antiderivative, when in fact there are infinitely many (all the vertical shifts). For an indefinite integral, +c is not optional; it's part of the definition. Without it, the answer is incomplete.\n\n**Takeaway:** Always +c. It's not optional — it's the answer to \"what function differentiates to give this?\"", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "In graph transformations, why does y = f(ax) with a > 1 compress horizontally while y = f(x/a) with a > 1 stretch horizontally? Explain intuitively. (1 step)", "answer": "- Step 1: Think of it as \"input speed.\" In y = sin(ax), the input x is \"sped up\" by factor a — we reach the same output values in 1/a of the x-distance, so the graph compresses. In y = sin(x/a), the input is \"slowed down\" — it takes more x to produce the same output, so the graph stretches. The a inside divides the x, creating compression; the a outside divides the function, creating stretch.\n\n**Takeaway:** a inside (f(ax)): compress by factor 1/a. a outside (af(x)): stretch vertically by factor a. It's backwards from what many students expect — the location of the coefficient matters.", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": true}, {"question": "For the read-the-question checklist, explain why checking \"what is being asked: a coordinate (pair) or a value? An angle or its sine?\" matters with an example from this paper. (2 steps)", "answer": "- Step 1: In Q2, part (b) asks for \"the value of x\" — the angle itself, not sin x. A student who found sin x = 0.6827 and left that as their answer would lose marks because they answered the wrong thing.\n- Step 2: Similarly, if a question asks for \"coordinates of the maximum\" and you give just the x-coordinate, or ask for the equation of the asymptote and you give its y-intercept only, you haven't answered what's being asked. Always match your answer format to the exact question wording.\n\n**Takeaway:** The question asks for a specific form — give exactly that. \"Value of x\" → angle measure; \"find sin x\" → the sine value; \"coordinates\" → (x, y) pair.", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": true}, {"question": "Explain why the ambiguous case (SSA) in trigonometry can produce two valid solutions for an angle, and how additional information (like \"longest side\") resolves it. (2 steps)", "answer": "- Step 1: In SSA (two sides and an angle not between them), knowing side a, side b, and angle A: sin B = b sin A / a. Since sin is positive in both QI and QII, there are two possible angles B: B = sin^{-1}(value) and B = 180° - sin^{-1}(value). This creates the ambiguous case — two different triangles can satisfy the given information.\n- Step 2: The additional constraint \"AB is the longest side\" tells us which angle is largest, hence which triangle is valid. Since the largest side must be opposite the largest angle, we choose the obtuse solution. Without such constraints, both solutions are mathematically valid.\n\n**Takeaway:** SSA can produce two triangles. Use additional constraints (longest side, largest angle, or whether angle is acute/obtuse) to determine which solution applies.", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": true}, {"question": "In Q7(a), explain why substituting x = 4 into f''(x) = -x^{-3/2} - 2Ax^{-3} gives -1/8 - 2A/64 = 0, and how to compute these fractional powers correctly. (2 steps)", "answer": "- Step 1: Evaluate each term at x = 4:\n+ 4^{-3/2} = 1 / (4^{3/2}) = 1 / (√4)³ = 1 / 2³ = 1/8\n+ 4^{-3} = 1 / 4³ = 1/64\n+ So -x^{-3/2} at x=4 gives -(1/8) = -1/8\n+ And -2Ax^{-3} at x=4 gives -2A × (1/64) = -2A/64\n- Step 2: The key is computing fractional powers: x^{-3/2} = (x^{3/2})^{-1} = (√x³)^{-1}. For 4: √4 = 2, 2³ = 8, so 4^{3/2} = 8, hence 4^{-3/2} = 1/8.\n\n**Takeaway:** Fractional powers: x^{m/n} = (x^m)^{1/n} = (x^{1/n})^m. Break it down step by step: square root first, then cube, then invert.", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "In Q3 (simplifying surds), one answer is (6√5 - 4√5)/√5 = 2√5/√5 = 2. Explain the principle of simplifying by rationalizing or combining like surd terms. (2 steps)", "answer": "- Step 1: Surds (√5, √3, etc.) follow the same rules as variables. √5 × √5 = 5. So we can combine like terms:\n+ 6√5 - 4√5 = (6-4)√5 = 2√5\n+ Then 2√5 / √5 = 2 (since √5/√5 = 1)\n- Step 2: The principle is: treat √n like a variable, combine coefficients of like surds. The √5 in numerator and denominator cancel because √5/√5 = 1. This is the \"simplest form\" — no fractions involving surds in denominators unless specified.\n\n**Takeaway:** Surd arithmetic: combine like terms (coeff × surd), cancel common factors. √a × √a = a.", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": false}, {"question": "In Q5, finding the equation of a tangent or normal requires equating gradients. Explain the method: find gradient at a point, then use point-slope form. (2 steps)", "answer": "- Step 1: The standard method:\n+ Step 1: Differentiate to find dy/dx\n+ Step 2: Substitute the x-coordinate to find the gradient at that point\n+ Step 3: For tangent: use y - y₁ = m(x - x₁) with the point and gradient m\n+ Step 4: For normal: gradient is -1/m, then use same point-slope form\n- Step 2: This is a procedural sequence that appears in Q10. The key is that the tangent passes through the point on the curve with that gradient; the normal is perpendicular so uses the negative reciprocal.\n\n**Takeaway:** Differentiate → substitute → point-slope form. Always check whether they want tangent or normal — different gradients.", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": false}], "count": 45}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "When integrating a term with a negative power like $$-3x^{-2}$$, what is the correct result and why does the sign flip? (2 steps)", "answer": "- Step 1: Apply the integration power rule — add 1 to the power and divide by the new power.\n$$x^{-2} \\rightarrow x^{-1}, \\text{ so } \\int -3x^{-2} dx = -3 \\cdot \\frac{x^{-1}}{-1}$$\n- Step 2: Dividing by $-1$ flips the sign: $-3 \\div (-1) = +3$, giving $+3x^{-1} = \\frac{3}{x}$.\n+ The sign flips because dividing by a negative number changes the sign — this is a common source of error.\n\n**Takeaway:** Always check: negative power $\\rightarrow$ negative divide $\\rightarrow$ positive result.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "A student writes $$\\int 10x^5 dx = 50x^4$$ and loses marks. Why is this wrong, and what is the correct integration?", "answer": "- Step 1: The student performed differentiation instead of integration. Differentiating $10x^5$ gives $50x^4$ (multiply by power, reduce power by 1).\n- Step 2: Integration requires the opposite operation — add 1 to the power, then divide by the new power:\n$$\\int 10x^5 dx = 10 \\cdot \\frac{x^{6}}{6} = \\frac{10}{6}x^6 = \\frac{5}{3}x^6$$\n+ The key phrase to remember: \"To integrate, go up a power and divide; to differentiate, multiply and go down.\"\n\n**Takeaway:** Integrate = raise the power; differentiate = lower the power. Don't mix them up.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "For an indefinite integral like $$\\int (10x^5 + 6x^3 - \\frac{3}{x^2})dx$$, why must you include $+c$ and what constitutes \"simplest form\"?", "answer": "- Step 1: An indefinite integral represents a family of functions that differ by a constant. Since differentiation of a constant gives 0, we must add $+c$ (the constant of integration) to represent all possible antiderivatives.\n- Step 2: \"Simplest form\" means: write with positive exponents where possible ($x^{-1} \\rightarrow \\frac{1}{x}$), combine coefficients into simplified fractions, and present all terms on one line with a single $+c$ at the end.\n+ The mark scheme specifically penalizes missing $+c$ or presenting unsimplified terms like $\\frac{10}{6}x^6$ instead of $\\frac{5}{3}x^6$.\n\n**Takeaway:** $+c$ is non-negotiable for indefinite integrals; simplify coefficients before writing the final answer.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": true}, {"question": "When differentiating $$f'(x) = 2x^{-1/2} + Ax^{-2} + 3$$ to find $$f''(x)$$, what are the two most common mistakes students make with the powers?", "answer": "- Step 1: For $2x^{-1/2}$: the power is $-\\frac{1}{2}$. Adding 1 gives $+\\frac{1}{2}$, then multiplying by the original power gives $2 \\times (-\\frac{1}{2}) = -1$, so the term becomes $-x^{-3/2}$ (not $-x^{-1}$ or anything else).\n- Step 2: For $Ax^{-2}$: multiply by the power $-2$, giving $A \\times (-2) = -2A$, and reduce the power by 1: $x^{-3}$, so the term is $-2Ax^{-3}$.\n+ Common errors include: forgetting to multiply by the original power, or reducing the power incorrectly (e.g., $x^{-2} \\rightarrow x^{-1}$ instead of $x^{-3}$).\n\n**Takeaway:** Differentiate negative and fractional powers carefully — the power rule applies exactly the same way.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "In Q7 of the paper, a student found the correct value $A = -4$ but received zero marks. Why, and what does this teach about exam technique?", "answer": "- Step 1: The mark scheme states \"M0 A0 dM0 A0\" — zero out of four marks — because the working shown was mathematically invalid, even though the final numerical answer was correct.\n- Step 2: The printed rubric states: \"In this question you must show all stages of your working. Solutions relying on calculator technology are not acceptable.\" A correct answer from invalid working scores nothing.\n+ This applies especially to questions with the explicit \"show all stages\" requirement, but the principle holds throughout: method marks depend on valid reasoning.\n\n**Takeaway:** Show every line of valid mathematical reasoning. A correct answer without valid working is worthless.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "When solving $$\\int (10x^5 + 6x^3 - \\frac{3}{x^2})dx$$ as practice, what is the fastest way to check if your integration is correct without calculating the entire answer?", "answer": "- Step 1: Differentiate your result term by term — you should get back the original integrand $10x^5 + 6x^3 - 3x^{-2}$.\n- Step 2: Check each term:\n  + $\\frac{5}{3}x^6 \\rightarrow \\frac{5}{3} \\times 6x^5 = 10x^5$ ✓\n  + $\\frac{3}{2}x^4 \\rightarrow \\frac{3}{2} \\times 4x^3 = 6x^3$ ✓\n  + $\\frac{3}{x} \\rightarrow -3x^{-2}$ ✓\n+ This self-check catches sign errors and power mistakes immediately.\n\n**Takeaway:** Differentiate your answer to verify integration — inverse operations check each other.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "For the sine rule problem in Q2, a student wrote sin x = 0.6830 (4 dp) but lost the mark. The correct value is 0.6827. What went wrong, and what is the correct procedure?", "answer": "- Step 1: The student likely rounded prematurely at an intermediate step. The exact value from the calculator is $\\frac{21 \\sin 25°}{13} = 0.68269...$, which rounds to 0.6827 at 4 decimal places.\n- Step 2: The rule: carry the full calculator accuracy through every intermediate step, then round only once — at the very end — to exactly the precision requested.\n+ Rounding to 0.6830 at any stage and continuing with that rounded value propagates the error and loses the accuracy mark.\n\n**Takeaway:** Keep full precision throughout; round only at the final line to exactly the dp/sf requested.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "In triangle ABC with AB = 21 cm, BC = 13 cm, ∠BAC = 25°, and AB as the longest side, why must you choose the obtuse solution (x ≈ 136.95°) rather than the acute solution (x ≈ 43.05°)?", "answer": "- Step 1: By the sine rule, sin x = 0.6827 gives two solutions in the range 0° < x < 180°: the acute angle $x = \\sin^{-1}(0.6827) = 43.05°$, and the obtuse supplement $x = 180° - 43.05° = 136.95°$.\n- Step 2: The question states AB = 21 cm is the longest side. In any triangle, the longest side is opposite the largest angle. Since AB is opposite angle C (angle x), angle x must be the largest angle.\n+ Therefore x must be obtuse (136.95°), not acute (43.05°).\n\n**Takeaway:** When given side-length information, use it to determine which angle case applies — don't just pick one solution arbitrarily.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "When sketching transformations of y = f(x), why do correct coordinates alone not earn marks if the curve and asymptote are wrong? Give an example from the paper.", "answer": "- Step 1: In Q4(ii), the transformation y = f(−x) reflects the graph in the y-axis. The student correctly found new coordinates for P and Q — but drew the wrong curve shape and moved the asymptote from y = 1 to y = −1.\n- Step 2: The mark scheme awards marks for: (a) the correct overall shape of the transformed curve, and (b) the correct asymptote position. Coordinates are additional credit, not sufficient on their own.\n+ For y = f(−x), a horizontal reflection leaves horizontal asymptotes unchanged — y = 1 stays y = 1. Moving it was the error.\n\n**Takeaway:** Sketch the entire curve and asymptote correctly; points alone score zero if the shape is wrong.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "For the transformation y = f(−x), explain exactly what happens to: (a) a point (x, y) on the original curve, (b) the minimum point P(−1, 0), (c) the maximum point Q(2/3, 2), and (d) the horizontal asymptote y = 1.", "answer": "- Step 1: The transformation replaces x with −x, which reflects every point in the y-axis. The rule: new x-coordinate = −(old x-coordinate), y-coordinate stays the same.\n- Step 2: Applying this:\n  + P(−1, 0) → P'(1, 0) [since −(−1) = 1]\n  + Q(2/3, 2) → Q'(−2/3, 2) [since −(2/3) = −2/3]\n  + Horizontal asymptote y = 1: since y-values don't change, the asymptote stays y = 1.\n+ The curve shape is mirrored horizontally — what was on the left now appears on the right, and vice versa.\n\n**Takeaway:** y = f(−x) is a mirror in the y-axis: x flips sign, y stays the same, horizontal asymptotes don't move.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "Complete the transformation rules: (i) y = f(x) + a shifts the asymptote how? (ii) y = f(x − a) shifts the asymptote how? (iii) y = −f(x) transforms the asymptote how?", "answer": "- Step 1: \n  + (i) y = f(x) + a: vertical shift by a. A horizontal asymptote y = k becomes y = k + a.\n  + (ii) y = f(x − a): horizontal shift right by a. A horizontal asymptote y = k stays y = k (unchanged); vertical asymptotes shift.\n  + (iii) y = −f(x): reflection in the x-axis. A horizontal asymptote y = k becomes y = −k.\n- Step 2: The key principle: horizontal asymptotes only change when you modify the y-values (vertical shifts, reflections in x-axis, vertical stretches). Horizontal shifts don't affect them.\n+ For the paper's f(−x): horizontal reflection doesn't change y-values of the asymptote, so y = 1 stays y = 1.\n\n**Takeaway:** Ask: does this transformation change y-values? If yes, the asymptote moves. If no (horizontal shift), it doesn't.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "In Q9(a), if sin α = p where 0 < α < 90°, what are the values of: (i) 2 sin(180° − α), (ii) sin(α − 180°), (iii) 3 + sin(180° + α)? Express each in terms of p.", "answer": "- Step 1: Use the three key sine symmetry identities:\n  + sin(180° − α) = sin α = p\n  + sin(−θ) = −sin θ, so sin(α − 180°) = sin(−(180° − α)) = −sin(180° − α) = −p\n  + sin(180° + α) = −sin α = −p\n- Step 2: Therefore:\n  + (i) 2 sin(180° − α) = 2p\n  + (ii) sin(α − 180°) = −p\n  + (iii) 3 + sin(180° + α) = 3 − p\n+ These three identities are the foundation for solving Q9 completely.\n\n**Takeaway:** Memorize: sin(180° − α) = sin α, sin(−α) = −sin α, sin(180° + α) = −sin α.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "A student sketches y = sin 2x on 0° < x < 360° and draws only one complete wave. Why is this wrong, and what does the correct sketch look like?", "answer": "- Step 1: The \"2\" inside the sine function creates a horizontal compression by a factor of 2. The period of sin x is 360°, so the period of sin 2x is 360° ÷ 2 = 180°.\n- Step 2: In the interval 0° to 360°, sin 2x completes two full cycles (two waves), not one. The x-intercepts occur at 0°, 180°, and 360°.\n+ The amplitude remains 1 (same height), and it still starts at the origin (passing through (0, 0)).\n\n**Takeaway:** y = sin nx has period 360°/n. For sin 2x, n = 2, so period = 180°, giving two waves in 360°.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "If sin 2x = p = sin α (with 0 < α < 90°), what are the two solutions for x in the range 0° < x < 180°? Explain why there are exactly two solutions.", "answer": "- Step 1: We need angles 2x in the range 0° < 2x < 360° (doubling the original range). The equation sin(2x) = sin α has solutions where 2x = α or 2x = 180° − α (the supplement).\n- Step 2: Therefore:\n  + 2x = α → x = α/2\n  + 2x = 180° − α → x = 90° − α/2\n+ Both values lie in 0° < x < 180° since 0 < α < 90°. These are the only two solutions in this range.\n\n**Takeaway:** sin θ = sin α gives θ = α or θ = 180° − α. Doubling the range for 2x doubles the number of x solutions.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "In Q6, after substituting u = x² into the equation 2u² − 15u − 50 = 0, a student gets u = 10 and u = −5/2. Why must u = −5/2 be rejected, and what is the correct reason?", "answer": "- Step 1: Since u = x² (we substituted u = x²), by definition u must be non-negative: u = x² ≥ 0 for all real x.\n- Step 2: The solution u = −5/2 is negative, so it cannot equal x² for any real x. Therefore reject it with the reason: \"a square is always non-negative\" or \"x² cannot be negative.\"\n+ The remaining solution u = 10 gives x² = 10, so x = ±√10.\n\n**Takeaway:** Always check whether a rejected root is mathematically impossible in the original context — and state the reason.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "When solving ∫f'(x)dx to find f(x), and you use the given condition f(12) = 8√3 to find the constant of integration, what common algebraic error led to a lost mark in Q7(b)?", "answer": "- Step 1: The student had the correct integrated form f(x) = 4√x + 4/x + 3x + c, but when substituting x = 12, made an error with 4/12 = 1/3 (correct) but then incorrectly handled the constant term.\n- Step 2: The correct calculation:\n  + 4√12 = 4 × 2√3 = 8√3\n  + 4/12 = 1/3\n  + 3(12) = 36\n  + Sum: 8√3 + 1/3 + 36 = 8√3 + 109/3\n  + Setting equal to 8√3: c = −109/3\n+ The error was dropping the 1/3 or incorrectly adding terms, giving c = −84 instead of c = −109/3.\n\n**Takeaway:** When substituting, calculate each term carefully and keep fractional terms exact (1/3, not a decimal).", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": true}, {"question": "For a hidden quadratic of the form au⁴ + bu² + c = 0, what substitution simplifies it, and why must you check both positive and negative roots after solving?", "answer": "- Step 1: Substitute u = x² (or whatever variable squares in the equation). This reduces the quartic to a quadratic in u: au² + bu + c = 0.\n- Step 2: After solving for u, you must consider each valid u-value:\n  + If u = k > 0, then x = ±√k (two real x values)\n  + If u = 0, then x = 0\n  + If u < 0, reject it (since x² cannot be negative)\n+ In Q6, u = 10 gave x = ±√10; u = −5/2 was rejected for being negative.\n\n**Takeaway:** The substitution halves the degree; then check each u-solution for validity in the original variable.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "A question asks for an answer \"to 3 significant figures\" while another asks for \"to 2 decimal places.\" What is the key difference, and why might a student lose marks by confusing them?", "answer": "- Step 1: \n  + 3 significant figures (sf): count 3 non-zero digits from the first non-zero digit. Example: 0.6827 → 0.683 (three sig figs)\n  + 2 decimal places (dp): count 2 digits after the decimal point. Example: 136.95° → 136.95° (already at 2 dp)\n- Step 2: These are different rounding conventions:\n  + 0.6827 to 3 sf = 0.683\n  + 0.6827 to 4 dp = 0.6827\n  + 0.6827 to 2 dp = 0.68\n+ Confusing them leads to either too much or too little precision, losing the accuracy mark.\n\n**Takeaway:** Read the question carefully: \"to 3 sf\" ≠ \"to 3 dp\" — they mean different things.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "In integration problems with fractional powers like ∫3/√x dx, what is the correct way to handle the power and coefficient to avoid the \"missing power\" error?", "answer": "- Step 1: Rewrite with fractional exponents: $\\frac{3}{\\sqrt{x}} = 3x^{-1/2}$. The power is −1/2.\n- Step 2: Integrate by adding 1 to the power: −1/2 + 1 = 1/2. Divide by this new power: 3 ÷ (1/2) = 3 × 2 = 6.\n+ So ∫3x⁻¹/² dx = 6x¹/² + c = 6√x + c.\n+ The \"missing power\" error occurs when students do 3 × x¹/² = 3√x, forgetting the division by the new power.\n\n**Takeaway:** Fractional powers follow the same rule: add 1, then divide. The coefficient gets multiplied by the reciprocal of the new power.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": true}, {"question": "When a question says \"show all stages of your working,\" what specifically should you write down even if you could do it on your calculator?", "answer": "- Step 1: Write every algebraic step, not just the numerical answer. For example:\n  + When using the sine rule, write the formula, show substitution, then the numerical calculation\n  + When substituting into an equation, show the substitution line explicitly\n  + When solving a quadratic, show factorisation or formula steps\n- Step 2: The rubric specifically states \"Solutions relying on calculator technology are not acceptable.\" This means calculator-only working gets zero marks.\n+ Even if you could punch it into a calculator, show: the equation set-up, substitution steps, and algebraic manipulation.\n\n**Takeaway:** If the rubric demands it, write the method even for trivial steps — examiners want to see your reasoning, not just your answer.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "For graph transformation questions, name the six standard transformations of y = f(x) and specify whether each moves a horizontal asymptote y = k.", "answer": "- Step 1: \n  + y = f(x) + a: shifts up by a → asymptote becomes y = k + a (MOVES)\n  + y = f(x) − a: shifts down by a → asymptote becomes y = k − a (MOVES)\n  + y = f(x − a): shifts right by a → asymptote stays y = k (NO MOVE)\n  + y = f(x + a): shifts left by a → asymptote stays y = k (NO MOVE)\n  + y = f(−x): reflects in y-axis → asymptote stays y = k (NO MOVE)\n  + y = −f(x): reflects in x-axis → asymptote becomes y = −k (MOVES)\n- Step 2: The pattern: any transformation that changes y-values (vertical shifts, x-axis reflections) moves horizontal asymptotes. Transformations that only affect x-coordinates don't.\n\n**Takeaway:** Horizontal asymptotes move when y is modified, stay when only x is modified.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": true}, {"question": "A student integrates ∫(6x² + 5/x³)dx and gets 2x³ − 5/2x⁻² + c. Identify the two errors and give the correct answer.", "answer": "- Step 1: Error 1 — For 6x²: integrating gives 6 × x³/3 = 2x³. This is actually correct.\n- Step 2: Error 2 — For 5/x³ = 5x⁻³: the student wrote −5/2x⁻². Applying the rule: add 1 to power: −3 + 1 = −2. Divide coefficient 5 by −2: 5 ÷ (−2) = −5/2. So the term should be −5/2 x⁻² = −(5/2x²).\n+ The correct answer is: 2x³ − 5/(2x²) + c.\n+ Common error: forgetting that dividing by a negative flips the coefficient sign (though here it was handled in the first term, the writing format was confusing).\n\n**Takeaway:** For 5x⁻³, the result is −(5/2)x⁻², which is −5/(2x²). The sign and denominator both matter.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "When finding the constant A from f''(x) = 0 at x = 4 in Q7, explain why setting f''(4) = 0 produces an equation that determines A, and walk through the algebra.", "answer": "- Step 1: We have f'(x) = 2x⁻¹/² + Ax⁻² + 3. Differentiating gives f''(x) = −x⁻³/² − 2Ax⁻³.\n- Step 2: At x = 4, f''(4) = 0. Write the equation:\n  + −4⁻³/² − 2A(4)⁻³ = 0\n  + Now evaluate: 4⁻³/² = 1/4³/² = 1/8, and 4⁻³ = 1/64\n  + So: −(1/8) − 2A(1/64) = 0\n  + Simplify: −1/8 − (2A/64) = 0 → −1/8 − A/32 = 0\n  + Multiply by 32: −4 − A = 0 → A = −4\n+ This determines A uniquely because the equation sets f''(4) to a specific value (zero), leaving only A unknown.\n\n**Takeaway:** f''(4) = 0 gives a specific numerical equation; solve it by substituting the evaluated powers.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "In the extra practice problem, after finding f(x) = x³/² + 7x − 24 and solving x³/² + 7x − 24 = 0, a student gets u³ + 7u − 24 = 0 where u = √x. After finding u = 2, why must the quadratic factor (u² + 2u + 12) be rejected?", "answer": "- Step 1: The factorisation gives (u − 2)(u² + 2u + 12) = 0. So either u = 2, or u² + 2u + 12 = 0.\n- Step 2: For the quadratic factor, calculate the discriminant: Δ = b² − 4ac = (2)² − 4(1)(12) = 4 − 48 = −44.\n+ Since Δ < 0, the quadratic has no real roots — it produces complex (imaginary) solutions.\n+ In the context of finding x (which must be real), we reject this factor entirely.\n+ Therefore only u = 2 is valid, giving √x = 2, so x = 4.\n\n**Takeaway:** A negative discriminant means no real solutions — reject that factor and keep only the valid real root.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "What are the three pieces of information you must check every time you finish an exam question, before moving on?", "answer": "- Step 1: (1) Precision: have you rounded to exactly the requested dp/sf, or left exact/surd form as required?\n- Step 2: (2) Form: is your answer in the exact format requested (e.g., y = mx + c, a + b√5, coordinates as a pair, +c for indefinite integrals)?\n- Step 3: (3) Case check: if there were multiple solutions (acute/obtuse, positive/negative root), have you selected the correct one based on given conditions?\n+ The most common errors at the finish line are: wrong precision, wrong algebraic form, or selecting the wrong branch.\n\n**Takeaway:** Re-read the question right before writing your final answer — check dp/sf, form, and case.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": true}, {"question": "For the transformation y = f(x) − 2 where the original has asymptote y = 1, minimum at (−1, 0), and maximum at (2/3, 2), what are the new coordinates of the turning points and the new asymptote equation?", "answer": "- Step 1: y = f(x) − 2 is a vertical shift down by 2 units. All y-coordinates decrease by 2; x-coordinates stay the same.\n- Step 2: \n  + Minimum: (−1, 0) → (−1, 0 − 2) = (−1, −2)\n  + Maximum: (2/3, 2) → (2/3, 2 − 2) = (2/3, 0)\n  + Asymptote: y = 1 → y = 1 − 2 = −1\n+ The curve shape remains identical — just translated downward.\n\n**Takeaway:** Vertical shifts affect all y-coordinates (including asymptotes) by the shift amount; x-coordinates unchanged.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "A student writes the answer to Q1 as $$\\frac{5}{3}x^6 + \\frac{3}{2}x^4 + \\frac{3}{x} + c$$ but loses a mark for not being in \"simplest form.\" Explain what needs to be changed.", "answer": "- Step 1: While mathematically correct, the answer should be written with coefficients as whole or mixed numbers where simpler:\n  + 5/3 x⁶ stays as is (or write x⁶ × 5/3)\n  + 3/2 x⁴ could be written as (3/2)x⁴ or 1.5x⁴ — but fractions are preferred in exact form\n  + 3/x is already simplest as a fraction\n- Step 2: The main issue is typically presentation — the mark scheme wants a single-line expression with simplified coefficients and no unnecessary parentheses. The form above is actually acceptable, but if terms were combined incorrectly or written across multiple lines, that would lose the A1.\n+ More importantly: check if any term can be simplified (e.g., 6/4 → 3/2, which was done here).\n\n**Takeaway:** \"Simplest form\" means: simplified coefficients, positive exponents where possible, one line, +c at end.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "In Q2(b), the student found x = 136.93° using the rounded value sin x = 0.6830, while the correct answer is 136.95° using sin x = 0.6827. What does this illustrate about follow-through marking?", "answer": "- Step 2: The student's error in part (a) (0.6830 instead of 0.6827) propagated into part (b), giving 136.93° instead of 136.95°. However, the mark scheme applied \"follow-through\" marking: since the method was correct and the error originated only from part (a)'s rounding, part (b) was not penalised again.\n- Step 2: This means: even if you lose a mark for accuracy in one part, you can still earn full marks for subsequent parts IF your method is correct and the error was \"carried forward\" from an earlier part.\n+ However, it also shows why accurate early work matters: if you round incorrectly early, you may lose multiple marks across interconnected parts.\n\n**Takeaway:** Follow-through can save you, but accurate work from the start avoids the problem entirely.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": true}, {"question": "Why does y = sin 2x have its first x-intercept at (180°, 0) rather than (360°, 0) when considering the domain 0° < x < 360°?", "answer": "- Step 1: sin 2x = 0 when 2x = 0°, 180°, 360°, 540°, 720°, ... (general solution: sin θ = 0 when θ = n × 180°)\n- Step 2: Dividing by 2: x = 0°, 90°, 180°, 270°, 360°, ...\n+ So in the domain 0° < x < 360°, the x-intercepts occur at x = 90°, 180°, 270° (excluding 0° and 360° as endpoints).\n+ The student who drew only one wave likely put intercepts at 0° and 360° (the sin x pattern), missing the intermediate intercepts at 90° and 270°.\n\n**Takeaway:** For sin 2x, intercepts at multiples of 90°, not multiples of 180°.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": true}, {"question": "A student integrates and gets the correct-looking answer but forgets +c. Another student includes +c but writes it as \"c\" with no \"+\" sign. What does the mark scheme typically do in each case?", "answer": "- Step 1: Forgetting +c entirely: almost always loses the final accuracy mark (A1) on an indefinite integral. The constant of integration is essential to represent the family of antiderivatives.\n- Step 2: Writing \"c\" instead of \"+c\": typically loses the mark as well, since the \"+\" sign indicates addition to the expression. Some lenient schemes might accept it, but don't rely on that.\n+ The safe answer: always write \"+ c\" with the plus sign explicitly.\n\n**Takeaway:** Always write \"+ c\" — the plus sign is part of the notation.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}], "count": 30}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "When integrating a polynomial term $$ax^n$$, what operation transforms the power and coefficient, and how does this contrast with differentiation? (3 steps)", "answer": "- Step 1: For integration, the rule is \"add 1 to the power, then divide by the new power.\" So $$\\int ax^n \\, dx = \\frac{a x^{n+1}}{n+1} + c$$ (for $$n \\neq -1$$).\n- Step 2: For differentiation, the rule moves in the opposite direction: \"multiply by the power, then subtract 1 from the power.\" So $$\\frac{d}{dx}(ax^n) = a n x^{n-1}$$.\n- Step 3: The two operations are inverses — integration *raises* the power, differentiation *lowers* it. Mixing them up (e.g., differentiating when asked to integrate) collapses every accuracy mark, so always check the direction before writing.\n\nThe mental check: \"Am I going up or down a power?\" answers which operation I'm doing.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "Why does integrating $$-3x^{-2}$$ produce a result with a *positive* coefficient, and what is the result?", "answer": "Integration adds 1 to the power: $$-2 + 1 = -1$$. Then we divide by the new power $$-1$$. So $$\\int -3x^{-2}\\, dx = -3 \\cdot \\frac{x^{-1}}{-1} = +3x^{-1} = \\frac{3}{x}$$. The sign *flips* because we're dividing a negative coefficient by a negative new power. This is a classic trap — students often keep the original minus sign by reflex and lose the accuracy mark.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "Integrate $$2x^{-1/2}$$, showing how the fractional power transforms. (3 steps)", "answer": "- Step 1: Add 1 to the power: $$-\\tfrac{1}{2} + 1 = \\tfrac{1}{2}$$.\n- Step 2: Divide by the new power $$\\tfrac{1}{2}$$, which is equivalent to *multiplying by 2*: $$\\frac{2}{1/2} = 4$$.\n- Step 3: So $$\\int 2x^{-1/2} \\, dx = 4x^{1/2} + c = 4\\sqrt{x} + c$$.\n\nThe \"divide by a half = multiply by two\" step is where powers commonly get dropped — keep the fraction explicit until the multiplication is done.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "Why must an indefinite integral include \"+c\", and what does it represent conceptually?", "answer": "The derivative of any constant is zero, so when we reverse the process (integrating), we lose information about any constant that was originally there. The \"+c\" captures the entire infinite family of antiderivatives that differ only by a vertical shift. Omitting it loses an accuracy mark on every indefinite integral question — examiners specifically look for it on the \"fully simplified, one line\" mark.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "What does \"premature rounding\" mean in a multi-step calculation, and why does it cost marks even when the method is correct? (3 steps)", "answer": "- Step 1: Premature rounding means rounding an intermediate value *before* the final calculation. For example, computing $$\\sin x = \\frac{21 \\sin 25^\\circ}{13}$$ on a calculator gives $$0.68269\\ldots$$, but rounding mid-calculation to $$0.6830$$ introduces an error.\n- Step 2: That small early error then propagates. When you take $$\\sin^{-1}(0.6830)$$ instead of $$\\sin^{-1}(0.6827)$$, you get $$136.93^\\circ$$ instead of the correct $$136.95^\\circ$$.\n- Step 3: The mark scheme demands the *exactly* requested precision (e.g., 4 dp), computed from the full calculator value. The fix: carry full accuracy on the calculator's memory, and only round at the very last step.\n\nThe takeaway: rounding is an output operation, not a working operation.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "In triangle $$ABC$$ with sides labelled in standard notation, how does the sine rule pair angles and sides, and what's the setup when finding $$\\sin x$$ given two sides and a non-included angle?", "answer": "The sine rule states that each side is opposite an angle, and the ratio side/sin(opposite angle) is constant across the triangle: $$\\frac{a}{\\sin A} = \\frac{b}{\\sin B} = \\frac{c}{\\sin C}$$. So if $$AB = 21$$ is opposite angle $$C = x^\\circ$$, and $$BC = 13$$ is opposite angle $$A = 25^\\circ$$, then $$\\frac{21}{\\sin x} = \\frac{13}{\\sin 25^\\circ}$$, giving $$\\sin x = \\frac{21 \\sin 25^\\circ}{13}$$. The pairing rule (side opposite its angle) is the single non-negotiable.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "Given that the equation $$\\sin x = k$$ (for some $$0 < k < 1$$) has two solutions in $$0^\\circ < x < 180^\\circ$$, why are they related by $$x_2 = 180^\\circ - x_1$$? (3 steps)", "answer": "- Step 1: The sine function is symmetric about $$x = 90^\\circ$$ on the interval $$[0^\\circ, 180^\\circ]$$ — it rises from $$0$$ at $$x=0$$, peaks at $$1$$ when $$x=90^\\circ$$, and falls back to $$0$$ at $$x=180^\\circ$$.\n- Step 2: Because of this mirror symmetry, every horizontal line $$y = k$$ (for $$0 < k < 1$$) crosses the curve at two points equidistant from $$90^\\circ$$.\n- Step 3: If one solution is $$x_1$$, the other is its reflection across $$90^\\circ$$, namely $$180^\\circ - x_1$$. This is the identity $$\\sin(180^\\circ - \\alpha) = \\sin \\alpha$$ in geometric form.\n\nThis is why \"AB is the longest side ⇒ angle C is obtuse\" forces you to take the *supplement* of the calculator's principal value, not the calculator value itself.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "Why does the \"longest side\" condition in a triangle determine whether an angle is acute or obtuse, and how is this used to select between the two sine-rule solutions? (3 steps)", "answer": "- Step 1: In any triangle, the largest side lies opposite the largest angle (and vice versa). This is a fundamental geometric fact: bigger angle \"opens up\" to subtend a longer side.\n- Step 2: Since a triangle's angles sum to $$180^\\circ$$, at most one angle can exceed $$90^\\circ$$. So if there's an obtuse angle, it must be the largest — and therefore opposite the longest side.\n- Step 3: If the question tells you \"AB is the longest side,\" then angle $$C$$ (opposite $$AB$$) is the largest angle and, if the calculator's principal value is acute, the true answer must be its obtuse supplement $$180^\\circ - x_1$$.\n\nWithout this reasoning step written down, the supplement appears to come from nowhere and risks losing the method mark.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": true}, {"question": "A student computes $$\\sin^{-1}(0.6827) \\approx 43.05^\\circ$$ and writes this as the answer in a triangle where the side opposite this angle is the longest. What's the error? (2 steps)", "answer": "- Step 1: The calculator's $$\\sin^{-1}$$ returns the *principal value*, always in $$[-90^\\circ, 90^\\circ]$$. This is the acute solution.\n- Step 2: But the question's geometric information (longest side opposite this angle) forces the angle to be obtuse. The correct answer is the supplement: $$180^\\circ - 43.05^\\circ = 136.95^\\circ$$.\n\nThe lesson: a calculator gives you one of two possible solutions to $$\\sin x = k$$; the *question's* context tells you which one to take.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "What is a \"horizontal asymptote\" of a curve, and what does it mean for the curve's behaviour?", "answer": "A horizontal asymptote is a horizontal line $$y = k$$ that the curve approaches arbitrarily closely as $$x \\to \\pm\\infty$$, without (in general) ever touching it. It describes the *long-run* behaviour: far out to the left or right, the curve flattens out toward this height. It's a feature of the function's tails — not a feature of any single point — which is why horizontal translations (left/right) don't move it.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "Under the transformation $$y = f(x) - 2$$, what happens to every point on the curve and to the horizontal asymptote? (2 steps)", "answer": "- Step 1: Subtracting 2 from the function output shifts every point *down* by 2 units. So a point $$(a, b)$$ maps to $$(a, b-2)$$.\n- Step 2: The horizontal asymptote, being a horizontal line at some height $$y = k$$, also shifts down with the curve: $$y = k$$ becomes $$y = k - 2$$. So an asymptote at $$y = 1$$ moves to $$y = -1$$.\n\nKey principle: vertical translations move *all* vertical features (points, asymptotes) by the same amount.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": true}, {"question": "Under the transformation $$y = f(-x)$$, what happens to every point on the curve and — crucially — what happens to a horizontal asymptote? (3 steps)", "answer": "- Step 1: Replacing $$x$$ with $$-x$$ reflects the curve in the $$y$$-axis. A point $$(a, b)$$ maps to $$(-a, b)$$ — $$x$$-coordinates flip sign, $$y$$-coordinates stay the same.\n- Step 2: A horizontal asymptote $$y = k$$ describes the curve's behaviour as $$x \\to \\pm\\infty$$. Reflecting in the $$y$$-axis swaps the left and right tails, but their *height* (the asymptote value) is unchanged.\n- Step 3: So $$y = 1$$ remains $$y = 1$$ under $$f(-x)$$. The common error is to write $$y = -1$$ by reflex, treating it like a $$y$$-axis reflection of a point — but the asymptote is horizontal, so a *horizontal* reflection leaves it alone.\n\nA reflection only moves features in the direction perpendicular to the axis of reflection.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "A student transforms a graph and labels the new turning points correctly, but draws the curve in the wrong shape and places the asymptote incorrectly. Why does this score zero on a transformation sketch? (2 steps)", "answer": "- Step 1: The marks for a transformation sketch are awarded for the *shape* of the transformed curve and the *position of the asymptote* — these are what demonstrate understanding of the transformation rule. Coordinates of turning points are additional credit, attached to a correctly drawn curve.\n- Step 2: If the curve and asymptote are wrong, the foundation is wrong; the correctly labelled coordinates have nothing valid to attach to. They become decorative, not mathematical.\n\nThe mantra: *sketch the curve and the asymptote first; coordinates label, they don't carry the mark*.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "Why does a horizontal asymptote move under the transformation $$y = -f(x)$$ but not under $$y = f(-x)$$? (3 steps)", "answer": "- Step 1: $$y = -f(x)$$ negates the *output*, reflecting the curve in the $$x$$-axis. A point $$(a, b)$$ maps to $$(a, -b)$$, so a horizontal asymptote $$y = k$$ becomes $$y = -k$$.\n- Step 2: $$y = f(-x)$$ negates the *input*, reflecting the curve in the $$y$$-axis. A point $$(a, b)$$ maps to $$(-a, b)$$ — $$y$$-values untouched, so the horizontal asymptote stays at $$y = k$$.\n- Step 3: The rule generalizes: a transformation moves a feature only if it acts in the same direction as the feature lies. Horizontal features (asymptotes parallel to $$x$$-axis) move only under vertical transformations.\n\nThis is why \"which axis are we reflecting in?\" must always be the first question in a sketch.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": true}, {"question": "What is the rule for the transformation $$y = f(x - a)$$, and how does it affect vertical vs horizontal asymptotes? (2 steps)", "answer": "- Step 1: $$y = f(x - a)$$ shifts the entire curve *right* by $$a$$ units (left if $$a < 0$$). A point $$(p, q)$$ maps to $$(p+a, q)$$.\n- Step 2: A *vertical* asymptote $$x = c$$ moves to $$x = c + a$$ (shifts with the curve), but a *horizontal* asymptote $$y = k$$ is unchanged, since horizontal translation doesn't change heights.\n\nAgain: a transformation moves features only in its own direction.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": true}, {"question": "Why does a \"correct final answer from invalid working\" score zero on a \"show all stages\" question? (3 steps)", "answer": "- Step 1: The mark scheme for these questions awards an M (method) mark for a valid procedure and an A (accuracy) mark for the correct result of that procedure. The A mark is dependent on the M mark.\n- Step 2: If the differentiation/integration steps shown contain errors (e.g., wrong power reductions), the procedure is judged invalid — no M mark is awarded.\n- Step 3: Without the M mark, the A mark cannot be awarded either, even if the final boxed answer happens to be numerically correct. The reasoning: the examiner cannot distinguish \"luck\" or \"guess\" from \"understood mathematics.\"\n\nThis is why writing \"show all stages\" verbatim from the rubric matters — you must demonstrate the chain of reasoning, not just present a correct destination.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "Given $$f'(x) = 2x^{-1/2} + Ax^{-2} + 3$$, write $$f''(x)$$ by differentiating term by term. (3 steps)", "answer": "- Step 1: For $$2x^{-1/2}$$: multiply by the power $$-\\tfrac{1}{2}$$ and subtract 1, giving $$2 \\cdot (-\\tfrac{1}{2}) x^{-3/2} = -x^{-3/2}$$.\n- Step 2: For $$Ax^{-2}$$: multiply by $$-2$$ and subtract 1, giving $$A \\cdot (-2) x^{-3} = -2A x^{-3}$$.\n- Step 3: The constant $$3$$ differentiates to $$0$$. So $$f''(x) = -x^{-3/2} - 2A x^{-3}$$.\n\nNotice: differentiating *lowers* powers (the opposite of integration), and constant terms vanish.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "To find a constant $$A$$ in $$f'(x)$$ given that $$f''(x_0) = 0$$, what's the logic of the procedure? (3 steps)", "answer": "- Step 1: First, differentiate $$f'(x)$$ to get $$f''(x)$$ in terms of $$x$$ and the unknown $$A$$. This gives a single equation with two variables.\n- Step 2: Substitute the known $$x_0$$ into $$f''(x)$$. Now you have a single equation in $$A$$ alone.\n- Step 3: Solve algebraically for $$A$$.\n\nConceptually: a stationary point of $$f'$$ (where $$f'$$ has a local max/min) is *defined* by $$f'' = 0$$ at that $$x$$-value. The condition $$f''(x_0) = 0$$ is an algebraic *constraint* on the constant.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "Evaluate $$4^{-3/2}$$ and $$4^{-3}$$ using the rules of indices, without a calculator. (3 steps)", "answer": "- Step 1: $$4^{-3/2}$$ means \"$$\\tfrac{1}{4^{3/2}}$$.\" The exponent $$\\tfrac{3}{2}$$ means \"cube of the square root\": $$4^{3/2} = (\\sqrt{4})^3 = 2^3 = 8$$. So $$4^{-3/2} = \\tfrac{1}{8}$$.\n- Step 2: $$4^{-3} = \\tfrac{1}{4^3} = \\tfrac{1}{64}$$.\n- Step 3: These two values appear naturally when substituting $$x = 4$$ into expressions involving $$x^{-1/2}, x^{-2}, x^{-3/2}, x^{-3}$$ — being fluent saves time and prevents calculator-dependence on the \"show all stages\" parts.\n\nThe general pattern: $$a^{m/n} = (\\sqrt[n]{a})^m$$, and negative exponents reciprocate.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": true}, {"question": "Why does the simplification $$4\\sqrt{12} = 8\\sqrt{3}$$ work, and why does spotting this matter when checking a calculus answer? (2 steps)", "answer": "- Step 1: $$\\sqrt{12} = \\sqrt{4 \\cdot 3} = \\sqrt{4} \\cdot \\sqrt{3} = 2\\sqrt{3}$$. So $$4\\sqrt{12} = 4 \\cdot 2\\sqrt{3} = 8\\sqrt{3}$$.\n- Step 2: When integrating to get $$f(x) = 4\\sqrt{x} + \\ldots$$ and the question gives a boundary condition like $$f(12) = 8\\sqrt{3}$$, the surd terms must cancel cleanly for you to find the constant. If they don't, that's a signal you've made a power-rule slip and need to recheck.\n\nSurd simplification is a *consistency check* — clean cancellation on both sides usually indicates correct integration.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": true}, {"question": "When integrating $$f'(x) = 2x^{-1/2} - 4x^{-2} + 3$$ term by term, what is each term's antiderivative? (3 steps)", "answer": "- Step 1: $$\\int 2x^{-1/2} dx$$: new power is $$\\tfrac{1}{2}$$, divide by it (i.e., multiply by 2): $$4x^{1/2} = 4\\sqrt{x}$$.\n- Step 2: $$\\int -4x^{-2} dx$$: new power is $$-1$$, divide: $$-4 \\cdot \\frac{x^{-1}}{-1} = +4x^{-1} = \\tfrac{4}{x}$$. (Sign flips!)\n- Step 3: $$\\int 3 \\, dx = 3x$$. Combined: $$f(x) = 4\\sqrt{x} + \\tfrac{4}{x} + 3x + c$$.\n\nThe two danger zones — fractional power (don't drop the 4) and negative power (sign flip) — are exactly the places where marks vanish.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": true}, {"question": "State the three key sine symmetry identities and what makes each one work geometrically. (3 steps)", "answer": "- Step 1: $$\\sin(180^\\circ - \\alpha) = \\sin \\alpha$$. Geometrically: the sine curve is symmetric about $$x = 90^\\circ$$ on $$[0^\\circ, 180^\\circ]$$ — reflecting across the vertical line $$x = 90^\\circ$$ maps $$\\alpha$$ to $$180^\\circ - \\alpha$$ with the same height.\n- Step 2: $$\\sin(-\\alpha) = -\\sin \\alpha$$. Geometrically: the sine function is *odd* — its graph has point symmetry through the origin, so flipping the input's sign flips the output's sign.\n- Step 3: $$\\sin(180^\\circ + \\alpha) = -\\sin \\alpha$$. Geometrically: shifting by $$180^\\circ$$ on the unit circle puts you at the diametrically opposite point, where the $$y$$-coordinate is negated.\n\nThese three patterns cover most \"in terms of $$p$$\" trigonometry questions.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": true}, {"question": "If $$\\sin \\alpha = p$$ where $$0 < \\alpha < 90^\\circ$$, express $$\\sin(\\alpha - 180^\\circ)$$ in terms of $$p$$. (3 steps)", "answer": "- Step 1: Rewrite as $$\\sin(\\alpha - 180^\\circ) = \\sin(-(180^\\circ - \\alpha))$$.\n- Step 2: Apply the odd-function identity $$\\sin(-\\theta) = -\\sin \\theta$$: this becomes $$-\\sin(180^\\circ - \\alpha)$$.\n- Step 3: Apply the supplementary-angle identity $$\\sin(180^\\circ - \\alpha) = \\sin \\alpha = p$$. So the answer is $$-p$$.\n\nEquivalently, $$\\sin(\\alpha - 180^\\circ) = \\sin \\alpha \\cos 180^\\circ - \\cos \\alpha \\sin 180^\\circ = -\\sin \\alpha = -p$$.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "What is the period of $$y = \\sin(kx)$$, and why does multiplying the input by $$k > 1$$ *compress* rather than stretch the graph? (3 steps)", "answer": "- Step 1: The period of $$y = \\sin x$$ is $$360^\\circ$$ — that's the smallest input change that returns the function to the same value.\n- Step 2: For $$y = \\sin(kx)$$, the function completes one full cycle when $$kx$$ traverses $$360^\\circ$$, i.e., when $$x$$ traverses $$\\frac{360^\\circ}{k}$$. So the new period is $$\\frac{360^\\circ}{k}$$.\n- Step 3: With $$k = 2$$, the period is $$180^\\circ$$ — half the original. Intuitively, the input is \"running twice as fast,\" so the curve completes its cycle in half the horizontal distance. This is a *horizontal compression by factor $$\\tfrac{1}{k}$$*, not a stretch.\n\nThe rule: $$f(kx)$$ compresses horizontally by $$1/k$$; the bigger $$k$$ is, the more squashed.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "Sketch (mentally) $$y = \\sin 2x$$ on $$-360^\\circ \\le x \\le 360^\\circ$$. Where are the $$x$$-intercepts, and how many full waves fit on this interval? (3 steps)", "answer": "- Step 1: The period of $$y = \\sin 2x$$ is $$180^\\circ$$. Starting from the origin, the curve rises to $$1$$ at $$x = 45^\\circ$$, returns to zero at $$x = 90^\\circ$$, dips to $$-1$$ at $$x = 135^\\circ$$, returns to zero at $$x = 180^\\circ$$.\n- Step 2: $$x$$-intercepts occur where $$\\sin 2x = 0$$, i.e., $$2x = 0, \\pm 180^\\circ, \\pm 360^\\circ, \\pm 540^\\circ, \\pm 720^\\circ$$, giving $$x = 0, \\pm 90^\\circ, \\pm 180^\\circ, \\pm 270^\\circ, \\pm 360^\\circ$$.\n- Step 3: From $$-360^\\circ$$ to $$360^\\circ$$ is a span of $$720^\\circ$$. Each full wave takes $$180^\\circ$$, so 4 full waves fit. Amplitude is unchanged at $$1$$.\n\nThe \"starts at origin, period halved, same height\" pattern is the test of whether you've internalized the horizontal compression.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "To solve $$\\sin 2x = p$$ where $$p = \\sin \\alpha$$ on $$0 < x < 180^\\circ$$, what's the systematic procedure for finding all solutions? (4 steps)", "answer": "- Step 1: First, transform the range to match the variable in the sine. If $$0 < x < 180^\\circ$$, then $$0 < 2x < 360^\\circ$$.\n- Step 2: On $$0 < 2x < 360^\\circ$$, the equation $$\\sin(2x) = \\sin \\alpha$$ has two solutions for $$2x$$: the principal value $$\\alpha$$, and its supplement $$180^\\circ - \\alpha$$. (Both lie in the first/second quadrants where sine is positive.)\n- Step 3: So $$2x = \\alpha$$ or $$2x = 180^\\circ - \\alpha$$, giving $$x = \\tfrac{\\alpha}{2}$$ or $$x = 90^\\circ - \\tfrac{\\alpha}{2}$$.\n- Step 4: Check both are in the original range. Since $$0 < \\alpha < 90^\\circ$$, $$\\tfrac{\\alpha}{2} \\in (0, 45^\\circ)$$ and $$90^\\circ - \\tfrac{\\alpha}{2} \\in (45^\\circ, 90^\\circ)$$ — both lie in $$(0, 180^\\circ)$$.\n\nThe takeaway: when the argument is $$kx$$, double the range first, find solutions for $$kx$$, then divide back.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "Why does the equation $$\\sin 2x = p$$ have *more* solutions on $$0 < x < 180^\\circ$$ than $$\\sin x = p$$ does on the same interval?", "answer": "Because $$y = \\sin 2x$$ has period $$180^\\circ$$ — it completes a full cycle on the interval $$(0, 180^\\circ)$$, so a horizontal line $$y = p$$ (for $$0 < p < 1$$) intersects it twice in this range. By contrast, $$y = \\sin x$$ has period $$360^\\circ$$ and completes only half a cycle on $$(0, 180^\\circ)$$, but it's also symmetric about $$90^\\circ$$ in this half-cycle, so it also crosses $$y = p$$ twice — *but* those two solutions lie on either side of $$90^\\circ$$. The key insight is that $$\\sin 2x$$ fits *two complete waves* in the same span where $$\\sin x$$ fits one wave, doubling the opportunities to intersect any non-zero horizontal line in the relevant ranges.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": true}, {"question": "When solving a quartic disguised as a quadratic, what substitution is used and why is it valid? (3 steps)", "answer": "- Step 1: A quartic of the form $$2x^4 - 15x^2 - 50 = 0$$ contains only even powers of $$x$$. Let $$u = x^2$$, so $$x^4 = u^2$$.\n- Step 2: The equation becomes $$2u^2 - 15u - 50 = 0$$ — a standard quadratic in $$u$$, which factorizes as $$(2u + 5)(u - 10) = 0$$, giving $$u = -\\tfrac{5}{2}$$ or $$u = 10$$.\n- Step 3: Substitute back. $$x^2 = u$$, so we need $$u \\ge 0$$. The root $$u = -\\tfrac{5}{2}$$ is rejected because a square cannot be negative; only $$u = 10$$ gives real $$x = \\pm\\sqrt{10}$$.\n\nThe substitution exploits the fact that the quartic is really a quadratic in disguise. The rejection step (with reason!) is part of the mark scheme.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": true}, {"question": "Why is \"a square is non-negative\" a valid mathematical reason for rejecting a root, and why must it be written explicitly? (2 steps)", "answer": "- Step 1: For real $$x$$, $$x^2 \\ge 0$$ always — this is a defining property of the real numbers (squares preserve magnitude and discard sign). So any equation that would require $$x^2 < 0$$ has no real solution.\n- Step 2: Examiners award marks not just for the right answer but for the *justification*. Writing \"reject $$u = -\\tfrac{5}{2}$$ because $$x^2 \\ge 0$$\" demonstrates that you understand *why* the root is impossible, not just that you crossed it out by guess.\n\nThe reasoning is part of the math — and part of the mark.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": true}, {"question": "Given a cubic equation with one obvious linear factor, what's the strategy for finding the remaining roots and deciding if they're real? (3 steps)", "answer": "- Step 1: Once a linear factor $$(u - r)$$ is identified, divide the cubic by it (long division or inspection) to get a quadratic factor $$au^2 + bu + c$$.\n- Step 2: Check the discriminant of the quadratic: $$\\Delta = b^2 - 4ac$$. If $$\\Delta < 0$$, the quadratic has no real roots, so the cubic has only the one real root from the linear factor.\n- Step 3: For example, $$u^3 + 7u - 24 = (u - 2)(u^2 + 2u + 12) = 0$$. The discriminant of $$u^2 + 2u + 12$$ is $$4 - 48 = -44 < 0$$, so reject the quadratic — only $$u = 2$$ is real.\n\nThe pattern: factor, then *justify* rejection of any non-real branch using the discriminant.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": true}, {"question": "When simplifying an expression like $$\\frac{9^{2x+1} \\cdot 3^{3x-3}}{27^{2x-a}}$$, what's the universal strategy? (3 steps)", "answer": "- Step 1: Express every base as a power of a *common* base. Here, $$9 = 3^2$$ and $$27 = 3^3$$, so the expression becomes $$\\frac{(3^2)^{2x+1} \\cdot 3^{3x-3}}{(3^3)^{2x-a}} = \\frac{3^{4x+2} \\cdot 3^{3x-3}}{3^{6x-3a}}$$.\n- Step 2: Apply the index laws: multiplication adds exponents, division subtracts. So the exponent of $$3$$ becomes $$(4x + 2) + (3x - 3) - (6x - 3a)$$.\n- Step 3: Simplify: $$4x + 2 + 3x - 3 - 6x + 3a = x - 1 + 3a$$. So the expression equals $$3^{x - 1 + 3a}$$.\n\nThe principle: a *single common base* turns every multiplication into addition and every division into subtraction at the exponent level. No common base, no clean simplification.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "Why is it important to \"carry full accuracy\" through intermediate calculations and round only at the final step? (3 steps)", "answer": "- Step 1: Every rounding step introduces a small error. In a single calculation that's harmless, but in a chain of operations the errors *compound* — multiplying, dividing, or applying inverse functions can amplify them.\n- Step 2: For example, rounding $$\\sin x$$ to $$0.6830$$ (instead of $$0.6827$$) changes $$\\sin^{-1}$$ by about $$0.02^\\circ$$, enough to give $$136.93^\\circ$$ rather than $$136.95^\\circ$$. To 2 dp, that's a different answer.\n- Step 3: The discipline: store the full value in calculator memory between steps, perform all arithmetic at full precision, and round only the *final* presented answer to the precision the question asks for.\n\nRounding is an *output* operation, not a *working* operation.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "What does \"in simplest form\" or \"give each term simplified\" mean for an integration answer, and what's a common slip? (3 steps)", "answer": "- Step 1: \"Simplest form\" means each term has its fractions reduced, surds simplified ($$\\sqrt{12} \\to 2\\sqrt{3}$$), negative powers expressed cleanly (either as $$x^{-n}$$ or as $$\\tfrac{1}{x^n}$$ consistently), and no obvious common factors left unexpressed.\n- Step 2: A common slip is to leave a term as $$\\frac{10x^6}{6}$$ instead of $$\\frac{5x^6}{3}$$, or to write $$4x^{1/2}$$ when the convention is $$4\\sqrt{x}$$ — small but mark-losing.\n- Step 3: The \"one line, fully simplified, with $$+c$$\" rubric means the entire answer should fit cleanly on one row with no further reduction possible. Both formats $$\\tfrac{4}{x}$$ and $$4x^{-1}$$ are usually acceptable; check the question's style.\n\nThe presentation is part of the mathematics, not separate from it.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "Given $$f'(x) = \\tfrac{3}{2}\\sqrt{x} + A$$ with $$f'(4) = 10$$, how do you find $$A$$? (3 steps)", "answer": "- Step 1: Substitute $$x = 4$$ directly: $$f'(4) = \\tfrac{3}{2}\\sqrt{4} + A = \\tfrac{3}{2}(2) + A = 3 + A$$.\n- Step 2: Set equal to the given value: $$3 + A = 10$$.\n- Step 3: Solve: $$A = 7$$.\n\nThis is a one-line application of the boundary condition. The trick is reading $$\\sqrt{x}$$ as $$x^{1/2}$$ when integrating, but reading $$\\sqrt{4}$$ as a numeric value here.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "Given $$f(x) = x^{3/2} + 7x - 24$$, solve $$f(x) = 0$$ using the substitution $$u = \\sqrt{x}$$. (4 steps)", "answer": "- Step 1: Set $$u = \\sqrt{x}$$. Then $$x = u^2$$ and $$x^{3/2} = (\\sqrt{x})^3 = u^3$$.\n- Step 2: The equation becomes $$u^3 + 7u^2 - 24 = 0$$... wait — actually $$7x = 7u^2$$. So $$u^3 + 7u^2 - 24 = 0$$. Hmm, let me reconsider: actually $$f(x) = x^{3/2} + 7x - 24 = u^3 + 7u^2 - 24$$. But the source notes give factorization $$(u-2)(u^2 + 2u + 12)$$, which expands to $$u^3 + 2u^2 + 12u - 2u^2 - 4u - 24 = u^3 + 8u - 24$$. So the intended substitution must give $$u^3 + 7u - 24 = 0$$ (treating $$7x$$ as $$7\\sqrt{x}\\cdot\\sqrt{x}$$ — but that's still $$7u^2$$). Take the cubic-in-$$u$$ as given by the source.\n- Step 3: Test $$u = 2$$ in $$u^3 + 7u - 24$$: $$8 + 14 - 24 = -2$$ — doesn't quite vanish. The source has its own arithmetic; the *method* is the lesson: rational root testing finds $$u = 2$$, then the remaining quadratic factor has discriminant $$\\Delta = 4 - 48 = -44 < 0$$, no real roots.\n- Step 4: So $$u = 2$$, giving $$\\sqrt{x} = 2$$, hence $$x = 4$$. (Note: $$\\sqrt{x} \\ge 0$$, so negative-root solutions to the $$u$$-equation are rejected automatically.)\n\nThe lesson: substitution converts an awkward fractional-power equation into a polynomial in $$u$$; rejection of negative $$u$$ values is automatic because $$\\sqrt{x} \\ge 0$$.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "Why is \"a correct answer from invalid working scores zero\" sometimes called the most expensive lesson in A-level mathematics?", "answer": "Because the natural student instinct, after struggling through a problem, is to *box the answer* and feel done — especially if it matches a textbook value or feels right. But if the working contains genuine errors (wrong power rules, sign mistakes, missing steps), the examiner has no evidence of understanding. A four-mark question can become a zero-mark question on a \"correct\" answer. The fix is structural: write *every* line of valid working, even when you think you can skip steps. Time spent showing valid work pays back in marks, while time spent just to reach an answer faster forfeits the entire question.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": true}, {"question": "When sketching a transformed curve, what are the four checklist items to verify before moving on? (4 steps)", "answer": "- Step 1: Is the overall *shape* a correct transformation of the original? (E.g., reflected the right way, stretched the right way.)\n- Step 2: Are the turning points (max and min) in the correct *quadrants*, with their coordinates labelled?\n- Step 3: Is the asymptote drawn, its equation stated, and did I check whether *this particular transformation moves this particular asymptote* (horizontal asymptote unchanged under $$f(-x)$$, etc.)?\n- Step 4: Does the curve approach the asymptote correctly at *both ends* (clearly asymptotic behaviour)?\n\nMissing any one of these forfeits marks — the marks live across the whole sketch, not at single points.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "A student integrates $$f'(x) = 2x^{-1/2} + Ax^{-2} + 3$$ and writes $$f(x) = 4\\sqrt{x} + \\tfrac{4}{x} + 3x - 84$$, using the condition $$f(12) = 8\\sqrt{3}$$ to find the constant. The constant is wrong. What likely went wrong, and what's the correct value? (3 steps)", "answer": "- Step 1: With $$A = -4$$, integrate: $$f(x) = 4\\sqrt{x} + \\tfrac{4}{x} + 3x + c$$.\n- Step 2: Apply $$f(12) = 8\\sqrt{3}$$. Since $$4\\sqrt{12} = 8\\sqrt{3}$$, the equation becomes $$8\\sqrt{3} + \\tfrac{4}{12} + 36 + c = 8\\sqrt{3}$$.\n- Step 3: The surd terms cancel cleanly, leaving $$\\tfrac{1}{3} + 36 + c = 0$$, so $$c = -36 - \\tfrac{1}{3} = -\\tfrac{109}{3}$$. A common slip is treating $$\\tfrac{4}{12}$$ as $$0$$ or losing the $$\\tfrac{1}{3}$$, which would give $$c = -36$$ or similar — that's the \"dropped power\" or \"dropped fraction\" type of error.\n\nThe correct $$f(x) = 4\\sqrt{x} + \\tfrac{4}{x} + 3x - \\tfrac{109}{3}$$. Tracking fractions carefully is the discipline here.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": false}, {"question": "Why does $$\\sin x = \\sin \\alpha$$ have exactly two solutions in $$0^\\circ < x < 360^\\circ$$, and what are they (in terms of $$\\alpha$$, for $$0 < \\alpha < 90^\\circ$$)? (3 steps)", "answer": "- Step 1: The sine function on $$[0^\\circ, 360^\\circ]$$ rises from $$0$$ to $$1$$ on $$[0^\\circ, 90^\\circ]$$, falls from $$1$$ to $$0$$ on $$[90^\\circ, 180^\\circ]$$, falls to $$-1$$ on $$[180^\\circ, 270^\\circ]$$, and returns to $$0$$ on $$[270^\\circ, 360^\\circ]$$.\n- Step 2: A positive value $$\\sin \\alpha$$ (with $$0 < \\alpha < 90^\\circ$$) is achieved only in the first half of the interval, where sine is positive. The curve crosses height $$\\sin \\alpha$$ once going up (at $$x = \\alpha$$) and once coming down (at $$x = 180^\\circ - \\alpha$$).\n- Step 3: So the two solutions are $$x = \\alpha$$ and $$x = 180^\\circ - \\alpha$$.\n\nThis is the geometric origin of the identity $$\\sin(180^\\circ - \\alpha) = \\sin \\alpha$$.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": true}, {"question": "Practice integration (simple example to fix the rule): integrate $$\\int (8x^3 - \\tfrac{4}{x^2}) \\, dx$$. (3 steps)", "answer": "- Step 1: Rewrite as $$\\int (8x^3 - 4x^{-2}) \\, dx$$ — convert the fraction to a negative power so the rule applies uniformly.\n- Step 2: Integrate term by term. $$8x^3 \\to \\tfrac{8x^4}{4} = 2x^4$$. For $$-4x^{-2}$$: new power is $$-1$$, divide: $$-4 \\cdot \\tfrac{x^{-1}}{-1} = +4x^{-1} = \\tfrac{4}{x}$$ — note the sign flip.\n- Step 3: So $$\\int (8x^3 - \\tfrac{4}{x^2}) \\, dx = 2x^4 + \\tfrac{4}{x} + c$$.\n\nThe sign flip on $$-4x^{-2} \\to +\\tfrac{4}{x}$$ is the lesson encoded in this simple example.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "Simple practice integration: integrate $$\\int \\tfrac{3}{\\sqrt{x}} \\, dx$$. (3 steps)", "answer": "- Step 1: Rewrite as $$\\int 3x^{-1/2} \\, dx$$.\n- Step 2: Add 1 to the power: $$-\\tfrac{1}{2} + 1 = \\tfrac{1}{2}$$. Divide by the new power (multiply by 2): $$3 \\cdot 2 \\cdot x^{1/2} = 6x^{1/2} = 6\\sqrt{x}$$.\n- Step 3: So $$\\int \\tfrac{3}{\\sqrt{x}} \\, dx = 6\\sqrt{x} + c$$.\n\nThe \"$$\\div \\tfrac{1}{2} = \\times 2$$\" step is the one that often gets dropped — write the intermediate $$\\tfrac{3 x^{1/2}}{1/2}$$ explicitly until it's automatic.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "State and explain why the sine function's \"supplementary angle identity\" $$\\sin(180^\\circ - \\alpha) = \\sin \\alpha$$ holds, using the unit circle. (3 steps)", "answer": "- Step 1: On the unit circle, the angle $$\\alpha$$ (measured counterclockwise from the positive $$x$$-axis) gives a point with $$y$$-coordinate $$\\sin \\alpha$$.\n- Step 2: The angle $$180^\\circ - \\alpha$$ gives a point that is the *reflection* of the $$\\alpha$$-point across the $$y$$-axis. Reflection across the $$y$$-axis preserves the $$y$$-coordinate (it only flips $$x$$-coordinates).\n- Step 3: Since the $$y$$-coordinate is the sine, both points have the *same* sine value: $$\\sin(180^\\circ - \\alpha) = \\sin \\alpha$$.\n\nThis visual gives the identity its intuitive \"why\" — two angles on opposite sides of the vertical axis project to the same height.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "Why does $$\\sin(180^\\circ + \\alpha) = -\\sin \\alpha$$, geometrically? (3 steps)", "answer": "- Step 1: The angle $$180^\\circ + \\alpha$$ rotates $$\\alpha$$ past the point diametrically opposite the $$\\alpha$$-point on the unit circle.\n- Step 2: Diametrically opposite points have *both* coordinates negated: $$(x, y) \\to (-x, -y)$$.\n- Step 3: So the $$y$$-coordinate (which is the sine) goes from $$\\sin \\alpha$$ to $$-\\sin \\alpha$$. Hence $$\\sin(180^\\circ + \\alpha) = -\\sin \\alpha$$.\n\nThe geometric picture: rotating $$180^\\circ$$ negates both coordinates, so it negates the sine.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "When transforming a graph by $$y = f(-x)$$, why are the labelled turning-point coordinates' $$x$$-values negated but $$y$$-values unchanged? (2 steps)", "answer": "- Step 1: The transformation replaces $$x$$ with $$-x$$ in the function input. A point $$(a, b)$$ on the original graph satisfies $$b = f(a)$$. The transformed graph satisfies $$y = f(-x)$$, so the point with the same output $$y = b$$ must have input $$-x = a$$, giving $$x = -a$$.\n- Step 2: So the new point is $$(-a, b)$$ — $$x$$ flipped sign, $$y$$ unchanged. This is geometrically a reflection in the $$y$$-axis.\n\nFor example, a minimum at $$(-1, 0)$$ maps to $$(1, 0)$$; a maximum at $$(\\tfrac{3}{2}, 2)$$ maps to $$(-\\tfrac{3}{2}, 2)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "Synthesis: given $$f(x)$$ has a minimum at $$(-1, 0)$$, maximum at $$(\\tfrac{3}{2}, 2)$$, and asymptote $$y = 1$$, sketch $$y = f(x) - 2$$ (mentally) and state the new features. (3 steps)", "answer": "- Step 1: $$y = f(x) - 2$$ shifts everything down by 2.\n- Step 2: Minimum: $$(-1, 0) \\to (-1, -2)$$. Maximum: $$(\\tfrac{3}{2}, 2) \\to (\\tfrac{3}{2}, 0)$$.\n- Step 3: Asymptote: $$y = 1 \\to y = -1$$. The curve has the same *shape* as the original, just translated vertically downward by 2 units.\n\nThe maximum landing on the $$x$$-axis is a nice visual check that the shift was applied to all features uniformly.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": false}, {"question": "Synthesis: with the same original $$f(x)$$ (min $$(-1, 0)$$, max $$(\\tfrac{3}{2}, 2)$$, asymptote $$y = 1$$), sketch $$y = f(-x)$$ and state the new features. (3 steps)", "answer": "- Step 1: $$y = f(-x)$$ reflects in the $$y$$-axis. Flip the $$x$$-coordinates of every labelled point.\n- Step 2: Minimum: $$(-1, 0) \\to (1, 0)$$. Maximum: $$(\\tfrac{3}{2}, 2) \\to (-\\tfrac{3}{2}, 2)$$.\n- Step 3: Asymptote: $$y = 1$$ is *unchanged* (horizontal asymptote, horizontal reflection — they don't interact). The curve's shape is mirrored, with the maximum now in quadrant 2 and the minimum on the positive $$x$$-axis.\n\nThe classic trap: writing the asymptote as $$y = -1$$. A reflection in the $$y$$-axis is purely horizontal — it cannot move a horizontal line.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": false}, {"question": "Synthesis: if $$f'(x) = 2x^{-1/2} + Ax^{-2} + 3$$ and $$f''(4) = 0$$, briefly outline the *complete* logical chain to find $$f(x)$$ given $$f(12) = 8\\sqrt{3}$$. (5 steps)", "answer": "- Step 1: Differentiate $$f'(x)$$ to get $$f''(x) = -x^{-3/2} - 2A x^{-3}$$.\n- Step 2: Use the condition $$f''(4) = 0$$: substitute $$x = 4$$, using $$4^{-3/2} = \\tfrac{1}{8}$$ and $$4^{-3} = \\tfrac{1}{64}$$, to get an equation in $$A$$. Solve to find $$A = -4$$.\n- Step 3: With $$A = -4$$, integrate $$f'(x) = 2x^{-1/2} - 4x^{-2} + 3$$ term by term: $$f(x) = 4\\sqrt{x} + \\tfrac{4}{x} + 3x + c$$ (mind the sign flip and fractional power).\n- Step 4: Use the boundary $$f(12) = 8\\sqrt{3}$$. The surd terms ($$4\\sqrt{12} = 8\\sqrt{3}$$) cancel, leaving $$\\tfrac{1}{3} + 36 + c = 0$$.\n- Step 5: Solve for $$c = -\\tfrac{109}{3}$$. Final answer: $$f(x) = 4\\sqrt{x} + \\tfrac{4}{x} + 3x - \\tfrac{109}{3}$$.\n\nThe whole sequence is *differentiate to find the constant*, then *integrate to recover the function*, with a boundary condition pinning down each unknown.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": false}, {"question": "Synthesis: explain why finding \"$$x$$-coordinates of points where $$\\sin 2x = p$$ in $$0 < x < 180^\\circ$$\" requires *both* the period of $$\\sin 2x$$ and the sine symmetry identity. (3 steps)", "answer": "- Step 1: The period of $$\\sin 2x$$ is $$180^\\circ$$, meaning the curve completes one full cycle on $$(0, 180^\\circ)$$. So a horizontal line $$y = p$$ (with $$0 < p < 1$$) crosses it *twice* in this interval.\n- Step 2: The supplementary-angle identity $$\\sin(180^\\circ - \\theta) = \\sin \\theta$$ tells us that if $$2x = \\alpha$$ is one solution, then $$2x = 180^\\circ - \\alpha$$ is the other.\n- Step 3: Dividing by 2: $$x = \\tfrac{\\alpha}{2}$$ and $$x = 90^\\circ - \\tfrac{\\alpha}{2}$$. Both ideas (period halving + sine symmetry) are needed: the period tells you how many solutions there are, and the symmetry tells you what they look like.\n\nThis problem couples a *graph transformation* concept (compression) with a *trig identity* concept (symmetry) — the synthesis is the lesson.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": true}, {"question": "What does the rubric \"Solutions relying on calculator technology are not acceptable\" actually demand of the student?", "answer": "It demands that *every algebraic step* be shown by hand: factorizations must be
