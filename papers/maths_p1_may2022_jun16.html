 written out, quadratic-formula applications must show the discriminant and roots step by step, simultaneous equations must be solved by elimination or substitution with visible working. It is not enough to write the final answer that a calculator would produce. Even if the answer is correct, an examiner who sees a \"leap\" from problem to answer cannot verify understanding and will award no method marks. The rubric flags questions where calculator-only routes are explicitly forbidden — and the discipline of showing working should be habitual on *every* question, not just those flagged.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": false}, {"question": "Why does the \"reject impossible root with a reason\" step matter for marks, even when the rejection is obvious to the student?", "answer": "Mark schemes typically award one mark for *identifying* both algebraic roots of a quadratic, and a separate mark for *correctly rejecting* the inadmissible one *with justification*. Saying \"$$u = -\\tfrac{5}{2}$$ is rejected because $$x^2 \\ge 0$$\" or \"$$u^2 + 2u + 12$$ has no real roots because the discriminant is $$-44 < 0$$\" demonstrates that the student understands the constraint, rather than having guessed which root to discard. Without the written justification, the rejection mark is forfeited — even if the final selected root is correct.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": true}, {"question": "Simple practice: differentiate $$g(x) = 5x^{-3} + 2x^{1/2}$$. (3 steps)", "answer": "- Step 1: For $$5x^{-3}$$: multiply by the power $$-3$$ and subtract 1, giving $$5 \\cdot (-3) x^{-4} = -15 x^{-4}$$.\n- Step 2: For $$2x^{1/2}$$: multiply by $$\\tfrac{1}{2}$$ and subtract 1, giving $$2 \\cdot \\tfrac{1}{2} x^{-1/2} = x^{-1/2}$$.\n- Step 3: So $$g'(x) = -15 x^{-4} + x^{-1/2} = -\\tfrac{15}{x^4} + \\tfrac{1}{\\sqrt{x}}$$.\n\nThe discipline: differentiation *lowers* powers (the opposite of integration), so $$x^{-3} \\to x^{-4}$$ (further into negative), $$x^{1/2} \\to x^{-1/2}$$ (across zero).", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": false}, {"question": "Without computing, state the precision required for each phrase and what it means: \"to 4 dp\", \"to 3 sf\", \"in exact form\", \"in surd form\".", "answer": "\"To 4 dp\" means 4 digits *after the decimal point* (e.g., $$0.6827$$). \"To 3 sf\" means 3 *significant figures* — counting from the first non-zero digit (e.g., $$0.683$$). \"In exact form\" means no decimal approximation — express the answer as a fraction, surd, or symbolic combination (e.g., $$\\tfrac{17}{3}$$, $$2\\sqrt{3}$$, $$\\pi/4$$). \"In surd form\" specifically requires the answer to include radicals like $$\\sqrt{n}$$ (e.g., $$2\\sqrt{3}$$, not $$3.4641$$). The question's phrasing dictates exactly what to give — substituting one for another loses the accuracy mark even if the numerical value is \"close.\"", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": true}, {"question": "What's the conceptual difference between $$\\sin^{-1}(k)$$ as computed by a calculator and the \"general solution\" of $$\\sin x = k$$?", "answer": "The calculator's $$\\sin^{-1}$$ (or arcsin) returns only the *principal value*, restricted to $$[-90^\\circ, 90^\\circ]$$ — one specific angle. But the equation $$\\sin x = k$$ has *infinitely many* solutions in general, related by the symmetries of sine: $$x = \\sin^{-1}(k) + 360^\\circ n$$ or $$x = 180^\\circ - \\sin^{-1}(k) + 360^\\circ n$$ for integer $$n$$. The student's job is to take the calculator's principal value and *expand* it to all solutions in the given range, applying the supplementary-angle and periodicity identities.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": false}, {"question": "Why must students always re-read the question before writing the final line?", "answer": "Because the question often dictates the *form* of the answer in ways easy to miss while solving: \"give your answer in the form $$y = mx + c$$,\" \"give $$a + b\\sqrt{5}$$ with $$a, b$$ rational,\" \"give integer coefficients,\" \"leave in exact form,\" \"+c on indefinite integrals,\" \"2 dp / 3 sf / 4 dp.\" A correct value in the wrong form loses the accuracy mark. The discipline: after solving, scan the question one final time to confirm the requested form, the requested precision, and any specific conditions (which root, which case). This habit is the cheapest way to recover marks.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": false}, {"question": "Simple transformation practice: a curve $$y = f(x)$$ has a peak at $$(2, 5)$$ and an asymptote $$y = 3$$. What are the new peak and asymptote for $$y = -f(x)$$? (2 steps)", "answer": "- Step 1: $$y = -f(x)$$ negates the output, reflecting in the $$x$$-axis. A point $$(a, b)$$ maps to $$(a, -b)$$. So the peak $$(2, 5)$$ maps to $$(2, -5)$$ — but a peak (maximum) becomes a *trough* (minimum) after $$y$$-axis-of-reflection inversion.\n- Step 2: The horizontal asymptote $$y = 3$$ becomes $$y = -3$$ (its height is negated).\n\nNote the qualitative change: peaks ↔ troughs, asymptote heights negated, but $$x$$-coordinates of all features unchanged.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": false}, {"question": "Critical thinking: a student answers $$\\sin x = \\tfrac{21 \\sin 25^\\circ}{13}$$ to 4 dp as $$0.6830$$. What's the systematic check they could have done to catch the error? (2 steps)", "answer": "- Step 1: Compute $$21 \\sin 25^\\circ \\approx 21 \\times 0.4226 \\approx 8.875$$ — keeping more decimals: $$8.8749$$.\n- Step 2: Divide by 13: $$8.8749 / 13 = 0.68269\\ldots$$ — to 4 dp this is $$0.6827$$, not $$0.6830$$. The error came from rounding $$\\sin 25^\\circ$$ too aggressively (e.g., to $$0.423$$) before multiplying.\n\nThe check: redo the calculation with one more decimal of intermediate precision and confirm the 4th decimal place agrees. If it doesn't, you've rounded too early.", "source": "Opus 4.7 ①", "_id": "opus_1_55", "judge_pick": false}, {"question": "Why does the discriminant test $$\\Delta = b^2 - 4ac < 0$$ imply \"no real roots,\" conceptually?", "answer": "The quadratic formula gives roots $$x = \\frac{-b \\pm \\sqrt{b^2 - 4ac}}{2a}$$. If $$b^2 - 4ac < 0$$, we need the square root of a negative number — which has no real value (only imaginary). So the formula produces no real numbers, meaning the parabola $$y = ax^2 + bx + c$$ never crosses the $$x$$-axis. Geometrically, the parabola sits entirely above (if $$a > 0$$) or below (if $$a < 0$$) the $$x$$-axis. Hence \"no real roots\" — and any factorization attempt of that quadratic will fail over the reals.", "source": "Opus 4.7 ①", "_id": "opus_1_56", "judge_pick": true}, {"question": "Conceptual: why does the transformation rule \"$$f(x - a)$$ shifts right by $$a$$\" (rather than left by $$a$$, as the minus sign might suggest)? (2 steps)", "answer": "- Step 1: Consider a point on the original graph: $$y = f(x)$$ is at height $$f(x_0)$$ when input is $$x_0$$. For the new graph $$y = f(x - a)$$ to have the same height $$f(x_0)$$, we need $$x - a = x_0$$, i.e., $$x = x_0 + a$$.\n- Step 2: So the new graph reaches the height $$f(x_0)$$ at $$x = x_0 + a$$ — that is, $$a$$ units to the *right* of where the original did. The minus sign inside the function \"compensates\" by shifting the input forward.\n\nThe mantra: replace $$x$$ with $$x - a$$ ⇒ shift right by $$a$$ (positive $$a$$). It's counterintuitive but consistent with the algebra.", "source": "Opus 4.7 ①", "_id": "opus_1_57", "judge_pick": true}, {"question": "When checking a sketch of $$y = \\sin 2x$$ against $$y = \\sin x$$, what specifically should differ and what should stay the same? (3 steps)", "answer": "- Step 1: *Amplitude* (maximum height of the wave) is the same: both reach $$1$$ and $$-1$$. Multiplying the input doesn't change the output range.\n- Step 2: *Period* is halved: $$\\sin x$$ has period $$360^\\circ$$; $$\\sin 2x$$ has period $$180^\\circ$$. So two complete waves of $$\\sin 2x$$ fit where one of $$\\sin x$$ sits.\n- Step 3: *Phase* (starting position) is the same: both start at the origin and rise initially.\n\nVisual test: do you see two full waves in $$0$$ to $$360^\\circ$$ for $$\\sin 2x$$, where there's one for $$\\sin x$$? If yes, the horizontal compression is correctly applied.", "source": "Opus 4.7 ①", "_id": "opus_1_58", "judge_pick": false}, {"question": "Application: solve $$\\sin 2x = \\tfrac{1}{2}$$ on $$0 < x < 180^\\circ$$. (4 steps)", "answer": "- Step 1: Translate the range: $$0 < x < 180^\\circ$$ becomes $$0 < 2x < 360^\\circ$$.\n- Step 2: Solve $$\\sin(2x) = \\tfrac{1}{2}$$ on $$(0, 360^\\circ)$$. The principal value is $$2x = 30^\\circ$$. The supplement is $$2x = 180^\\circ - 30^\\circ = 150^\\circ$$.\n- Step 3: Divide each by 2: $$x = 15^\\circ$$ and $$x = 75^\\circ$$.\n- Step 4: Verify both lie in $$0 < x < 180^\\circ$$ — they do.\n\nThis is the same procedure as the general \"$$\\sin 2x = p$$\" pattern: double the range, find both solutions, then divide by 2.", "source": "Opus 4.7 ①", "_id": "opus_1_59", "judge_pick": false}, {"question": "What's the *qualitative* effect of replacing $$x$$ with $$x/k$$ in a function (where $$k > 1$$)?", "answer": "Replacing $$x$$ with $$x/k$$ produces $$y = f(x/k)$$, which is a *horizontal stretch* by factor $$k$$. Conceptually: the input is \"running slower\" — to reach the same internal value, $$x$$ must travel $$k$$ times as far. So the curve is stretched outward horizontally. The period of $$\\sin(x/2)$$ is $$720^\\circ$$ (double the original), the period of $$\\sin(2x)$$ is $$180^\\circ$$ (half). The rule: $$f(kx)$$ compresses by $$1/k$$; $$f(x/k)$$ stretches by $$k$$.", "source": "Opus 4.7 ①", "_id": "opus_1_60", "judge_pick": false}], "count": 61}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "When integrating a polynomial term $$ax^n$$ using the power rule, what operation do you perform on the exponent, and why does this differ from differentiation? (3 steps)", "answer": "- Step 1: To integrate $$ax^n$$, you add 1 to the exponent and then divide by the new exponent: $$\\int ax^n \\, dx = \\frac{ax^{n+1}}{n+1} + c$$. This is the reverse of differentiation.\n- Step 2: To differentiate $$ax^n$$, you multiply by the exponent and then subtract 1: $$\\frac{d}{dx}(ax^n) = anx^{n-1}$$. The direction is opposite.\n+ Differentiation reduces the power (think: slope of a curve is \"flatter\" in degree)\n+ Integration raises the power (think: anti-derivative recovers the original function whose derivative was given)\n- Step 3: The key intuition is that integration and differentiation are inverse operations. If you differentiate $$x^{n+1}/(n+1)$$, you get $$x^n$$ back — which confirms the integration rule. Always pause to check: did I raise or lower the power?\n\nMixing up direction is the single most expensive calculus slip.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "Why does the term $$-3x^{-2}$$ integrate to a *positive* expression, and what is the resulting term? (3 steps)", "answer": "- Step 1: Apply the power rule: add 1 to the exponent. $$-2 + 1 = -1$$, so the new power is $$x^{-1}$$.\n- Step 2: Divide the coefficient by the new exponent: $$\\frac{-3}{-1} = +3$$. Notice the sign flips because we're dividing by a negative number.\n- Step 3: The result is $$+3x^{-1} = +\\frac{3}{x}$$. The intuition: integration of negative-power terms often flips signs, so always recompute the sign rather than trusting the original.\n\nSign-flip moments are silent mark-killers; verify by differentiating your answer back.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "When integrating $$2x^{-1/2}$$, what's the conceptual reason the answer becomes $$4x^{1/2}$$ rather than something like $$2x^{1/2}$$? (3 steps)", "answer": "- Step 1: Add 1 to the exponent: $$-\\frac{1}{2} + 1 = \\frac{1}{2}$$.\n- Step 2: Divide by the new exponent $$\\frac{1}{2}$$. Dividing by a half is the same as multiplying by 2, so $$\\frac{2}{1/2} = 4$$.\n- Step 3: Hence the result is $$4x^{1/2} = 4\\sqrt{x}$$. The intuition: fractional denominators in the power rule produce *multiplication*, not the small division you'd expect — this is where students often \"lose\" a factor of 2.\n\nDropped factors on fractional powers are a classic Q7-style slip.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "Why must indefinite integrals always include the constant $$+c$$, even if the question doesn't explicitly remind you? (2 steps)", "answer": "- Step 1: Differentiation destroys constants — any constant $$c$$ has derivative 0. So infinitely many functions share the same derivative, differing only by a constant.\n- Step 2: When we \"undo\" differentiation via integration, we cannot recover which specific constant was lost, so we represent the family of all possible anti-derivatives by writing $$+c$$. Omitting it loses the final accuracy mark, because the answer is no longer \"fully correct.\"", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": true}, {"question": "When using the sine rule, why must you carry the full calculator value through intermediate steps rather than rounding early? (3 steps)", "answer": "- Step 1: Each rounding step introduces a small error. When that rounded value is then used in further calculation (e.g. taking $$\\sin^{-1}$$ to find an angle), the error compounds and can shift the final digit.\n- Step 2: Concretely: if $$\\sin x = 0.68269...$$, rounding to $$0.6830$$ early and then inverting gives $$x \\approx 136.93°$$, but using the full value gives $$136.95°$$ — a difference in the second decimal place.\n- Step 3: The rule is: keep the full unrounded value in memory and only round at the *very last step*, to *exactly* the precision the question requests (e.g. 4 dp means 4, not 3 or 5).\n\nPremature rounding is a free mark lost — always carry, then round once at the end.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "In a triangle, how do you decide whether to take the acute or obtuse solution from $$\\sin^{-1}$$, and what geometric fact governs the choice? (3 steps)", "answer": "- Step 1: $$\\sin^{-1}$$ on a calculator returns only the acute angle in $$(0°, 90°)$$, but $$\\sin \\theta = \\sin(180° - \\theta)$$, so an obtuse supplement is also a valid solution.\n- Step 2: To decide which applies, use the geometric rule: *the largest angle is opposite the longest side*. If the side opposite your unknown angle is the longest, that angle must be the largest — and if another angle is already, say, $$25°$$, then the largest must exceed the remaining $$\\sim 77°$$, making it obtuse.\n- Step 3: So pick the supplement: $$x = 180° - \\sin^{-1}(\\text{value})$$. Always check the geometry first — never assume the acute answer is correct.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": true}, {"question": "In a triangle where one angle is $$25°$$ and the side opposite the unknown angle is the longest, why must the unknown angle be obtuse? (2 steps)", "answer": "- Step 1: In any triangle, the largest angle sits opposite the longest side. If the unknown angle's opposite side is the longest, the unknown is the largest angle.\n- Step 2: The three angles sum to $$180°$$. With one angle being $$25°$$, the remaining two sum to $$155°$$. For one of them to be the *largest* and also exceed the other, it must exceed half of $$155°$$, i.e. exceed $$77.5°$$ — but more importantly, it must exceed both other angles. Geometric inspection (or direct computation) confirms it lands in the obtuse range $$(90°, 180°)$$.\n\nThe key: \"longest side ↔ largest angle\" is the structural fact; the rest is arithmetic.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "Under the transformation $$y = f(x) - 2$$, what happens to (a) every point on the curve, and (b) a horizontal asymptote $$y = k$$? (2 steps)", "answer": "- Step 1: This is a *vertical* shift: every point $$(x, y)$$ on the original curve maps to $$(x, y - 2)$$. Both turning points slide down by 2 units; the shape and width are unchanged.\n- Step 2: A horizontal asymptote also shifts vertically by the same amount, so $$y = k$$ becomes $$y = k - 2$$. The intuition: the asymptote is just the long-term value of $$y$$, and we're subtracting 2 from every $$y$$-value — including the limiting one.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "Under the transformation $$y = f(-x)$$, why does a horizontal asymptote $$y = k$$ remain unchanged, while turning points move? (3 steps)", "answer": "- Step 1: $$f(-x)$$ replaces $$x$$ with $$-x$$, which is a reflection in the $$y$$-axis. It is a purely *horizontal* operation — every point $$(a, b)$$ maps to $$(-a, b)$$, so the $$y$$-coordinate is preserved.\n- Step 2: A horizontal asymptote $$y = k$$ is defined by the $$y$$-value the curve approaches as $$x \\to \\pm\\infty$$. Reflecting horizontally swaps \"$$x \\to +\\infty$$\" with \"$$x \\to -\\infty$$\", but the asymptotic $$y$$-value the curve tends to is still $$k$$. So $$y = k$$ stays $$y = k$$.\n- Step 3: Turning points, however, sit at specific $$x$$-coordinates, and those $$x$$-values get negated. A min at $$(-1, 0)$$ moves to $$(1, 0)$$; a max at $$(\\tfrac{3}{2}, 2)$$ moves to $$(-\\tfrac{3}{2}, 2)$$. The rule: horizontal transformations never move horizontal asymptotes.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "When sketching a graph transformation for marks, why is plotting only the new turning-point coordinates insufficient? (3 steps)", "answer": "- Step 1: Mark schemes award the bulk of credit for the *correct overall shape* and the *correct asymptote*, treating coordinate labels as additional confirmation — not the primary evidence.\n- Step 2: If your drawn curve has the wrong shape (e.g. wrong orientation, wrong asymptote position), the marker treats the sketch as incorrect even when the labelled points are right. You lose B-marks for shape and asymptote regardless.\n- Step 3: The takeaway: always check shape + asymptote + intercepts/turning points as three independent features. Sketch the curve carefully as a *whole*, not just dots on a page.\n\nCoordinates alone score nothing if the curve they sit on is wrong.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "Compare the effect of $$y = -f(x)$$ versus $$y = f(-x)$$ on a horizontal asymptote $$y = k$$. Why do they differ? (3 steps)", "answer": "- Step 1: $$y = -f(x)$$ is a reflection in the $$x$$-axis: every $$y$$-value is negated. So $$y = k$$ becomes $$y = -k$$ — the asymptote moves (unless $$k = 0$$).\n- Step 2: $$y = f(-x)$$ is a reflection in the $$y$$-axis: every $$x$$-value is negated, but $$y$$-values are unchanged. The asymptote $$y = k$$ stays at $$y = k$$.\n- Step 3: The general principle: vertical operations (reflecting in $$x$$-axis, shifting up/down) change horizontal asymptotes; horizontal operations (reflecting in $$y$$-axis, shifting left/right) leave them fixed. Always identify the *axis of operation* first.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": true}, {"question": "Why does writing a correct final answer following invalid working score zero marks under the IAL mark scheme? (3 steps)", "answer": "- Step 1: The exam is testing *mathematical reasoning*, not just answer-matching. Mark schemes award M (method), A (accuracy), and dM (dependent method) marks based on the *route* taken, not the destination.\n- Step 2: If the working contains an invalid algebraic step (e.g. differentiating incorrectly but luckily landing on the right number), the M-marks cannot be awarded because no valid method was demonstrated. The A-marks then depend on M, so they fall too.\n- Step 3: The principle: any answer \"from nowhere\" is treated as a guess. Show every line of valid working — even when the calculator could finish the problem — so the marker can trace your logic.\n\nA correct conclusion from broken logic is worth nothing.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "When $$f''(x) = 0$$ at a specific point, what does this tell you geometrically, and how does it let you find an unknown constant in $$f'(x)$$? (3 steps)", "answer": "- Step 1: $$f''(x) = 0$$ at a point means the curve $$y = f(x)$$ has *zero curvature* there — this is a point of inflection (or at minimum, a candidate for one). It says the rate of change of the gradient is momentarily zero.\n- Step 2: Computationally, if $$f'(x)$$ contains an unknown constant $$A$$, then $$f''(x)$$ also contains $$A$$. Setting $$f''(x_0) = 0$$ gives a single equation in $$A$$, which can be solved.\n- Step 3: The trick is differentiating $$f'(x)$$ *carefully* — especially terms with negative or fractional powers — and then substituting the given $$x$$-value. Mistakes in the differentiation step propagate and may give a correct $$A$$ by accident, but invalid working scores nothing.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "Given $$f'(x) = 2x^{-1/2} + Ax^{-2} + 3$$, what is $$f''(x)$$ symbolically? (2 steps)", "answer": "- Step 1: Differentiate each term using the power rule (multiply by power, subtract 1):\n+ $$2x^{-1/2} \\to 2 \\cdot (-\\tfrac{1}{2}) x^{-3/2} = -x^{-3/2}$$\n+ $$Ax^{-2} \\to A \\cdot (-2) x^{-3} = -2Ax^{-3}$$\n+ The constant $$3$$ differentiates to $$0$$.\n- Step 2: Combine: $$f''(x) = -x^{-3/2} - 2Ax^{-3}$$. The key vigilance points are the fractional exponent reducing to $$-3/2$$ (not $$-1/2$$) and the negative power becoming more negative.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "If you know $$f'(x)$$ contains a constant $$A$$ and $$f''(4) = 0$$, conceptually how do you solve for $$A$$ without doing heavy arithmetic? (3 steps)", "answer": "- Step 1: Write $$f''(x)$$ as a sum of two terms in $$x$$: one independent of $$A$$, one proportional to $$A$$. The equation $$f''(4) = 0$$ then has the form $$(\\text{constant}_1) + A \\cdot (\\text{constant}_2) = 0$$.\n- Step 2: Evaluate both constants by substituting $$x = 4$$. Each is a simple power of 4 (e.g. $$4^{-3/2} = 1/8$$, $$4^{-3} = 1/64$$), which can be done mentally if you know fractional-exponent values.\n- Step 3: Rearrange to isolate $$A$$: $$A = -(\\text{constant}_1) / (\\text{constant}_2)$$. The whole technique is structural — express the linear equation in $$A$$, then solve — rather than computational.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": true}, {"question": "When integrating $$f'(x)$$ to find $$f(x)$$ and then using a boundary condition $$f(x_0) = y_0$$ to find the constant of integration, what is the order of operations and why? (3 steps)", "answer": "- Step 1: First, integrate term by term to obtain $$f(x) = (\\text{antiderivative}) + c$$. The constant $$c$$ is the only unknown.\n- Step 2: Substitute the given boundary condition $$f(x_0) = y_0$$: plug $$x_0$$ into your expression and set the result equal to $$y_0$$. This gives a single linear equation in $$c$$.\n- Step 3: Solve for $$c$$ and write the final $$f(x)$$ with the constant explicit. The intuition: integration recovers $$f(x)$$ up to an additive constant, and the boundary condition pins down which member of the family is the right one.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "Why is it useful to simplify $$4\\sqrt{12}$$ before substituting it into an equation like $$f(12) = 8\\sqrt{3}$$? (3 steps)", "answer": "- Step 1: $$\\sqrt{12} = \\sqrt{4 \\cdot 3} = 2\\sqrt{3}$$, so $$4\\sqrt{12} = 4 \\cdot 2\\sqrt{3} = 8\\sqrt{3}$$.\n- Step 2: Substituting $$8\\sqrt{3}$$ directly into the equation $$f(12) = 8\\sqrt{3}$$ causes the surd terms to cancel cleanly, leaving a simple linear equation in rationals only.\n- Step 3: The principle: simplifying surds before substitution avoids messy intermediate expressions and exposes hidden cancellations. Surds rarely \"happen\" to match by coincidence — the question is usually designed so they do.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": true}, {"question": "State the three key sine symmetry identities for an angle $$\\alpha$$ with $$0 < \\alpha < 90°$$, and explain each visually using the sine wave.", "answer": "The three identities and their visual meanings:\n+ $$\\sin(180° - \\alpha) = \\sin \\alpha$$ — the sine wave is symmetric about $$x = 90°$$ in the first/second quadrants; an angle and its supplement have equal sine values (both positive).\n+ $$\\sin(-\\alpha) = -\\sin \\alpha$$ — sine is an odd function; the wave below the $$x$$-axis on the left mirrors the wave above on the right with opposite sign.\n+ $$\\sin(180° + \\alpha) = -\\sin \\alpha$$ — going past $$180°$$ moves into the third quadrant where sine is negative; the magnitude matches $$\\sin \\alpha$$ but the sign flips.\n\nThese three identities together describe how sine behaves in every quadrant.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": true}, {"question": "If $$\\sin \\alpha = p$$ with $$0 < \\alpha < 90°$$, express $$2\\sin(180° - \\alpha)$$, $$\\sin(\\alpha - 180°)$$, and $$3 + \\sin(180° + \\alpha)$$ in terms of $$p$$. (3 steps)", "answer": "- Step 1: $$2\\sin(180° - \\alpha) = 2\\sin\\alpha = 2p$$. Direct application of the supplementary-angle identity.\n- Step 2: $$\\sin(\\alpha - 180°) = \\sin(-(180° - \\alpha)) = -\\sin(180° - \\alpha) = -\\sin\\alpha = -p$$. The trick is recognising the negative argument and using odd symmetry.\n- Step 3: $$3 + \\sin(180° + \\alpha) = 3 + (-\\sin\\alpha) = 3 - p$$. The constant $$3$$ is unaffected; only the sine term flips sign.\n\nThe pattern: identify which quadrant the argument lands in, then apply the correct sign.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "Why does $$y = \\sin 2x$$ have period $$180°$$ instead of $$360°$$, and what does this mean visually? (3 steps)", "answer": "- Step 1: The function $$\\sin(\\theta)$$ completes one full cycle as $$\\theta$$ goes from $$0$$ to $$360°$$. In $$\\sin 2x$$, the argument is $$2x$$, so $$2x$$ ranges from $$0$$ to $$360°$$ as $$x$$ ranges only from $$0$$ to $$180°$$.\n- Step 2: Therefore one complete sine wave fits into $$180°$$ of $$x$$-values — half the original period. Equivalently, the graph is *compressed horizontally* by a factor of 2.\n- Step 3: Visually, you see two full sine waves in the interval $$0$$ to $$360°$$, where there used to be one. Amplitude is unchanged (still $$\\pm 1$$), and the curve still passes through the origin.\n\nThe general rule: $$y = \\sin(kx)$$ has period $$360°/k$$.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": true}, {"question": "To solve $$\\sin 2x = p = \\sin \\alpha$$ on $$0 < x < 180°$$, why are there exactly two solutions, and what are they? (3 steps)", "answer": "- Step 1: Let $$\\theta = 2x$$. Since $$x \\in (0°, 180°)$$, we have $$\\theta \\in (0°, 360°)$$. We need $$\\sin \\theta = \\sin \\alpha$$.\n- Step 2: Within $$0$$ to $$360°$$, $$\\sin\\theta = \\sin\\alpha$$ has two solutions: $$\\theta = \\alpha$$ (in the first quadrant) and $$\\theta = 180° - \\alpha$$ (in the second quadrant, by supplementary symmetry). Both lie in $$(0°, 360°)$$ since $$\\alpha < 90°$$.\n- Step 3: Convert back: $$x = \\theta/2$$, giving $$x = \\alpha/2$$ and $$x = 90° - \\alpha/2$$. Both lie in $$(0°, 180°)$$. The intuition: the doubled-frequency wave hits the level $$p$$ twice in the relevant interval.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "When solving a quartic by substituting $$u = x^2$$, why must you check that each solution $$u$$ is non-negative before back-substituting? (3 steps)", "answer": "- Step 1: The substitution $$u = x^2$$ implicitly assumes $$u \\geq 0$$, because the square of any real number is non-negative.\n- Step 2: If solving the quadratic in $$u$$ produces a negative root (e.g. $$u = -\\tfrac{5}{2}$$), that solution corresponds to $$x^2 = -\\tfrac{5}{2}$$, which has no real solutions — it must be rejected.\n- Step 3: The reason this matters for marks: the mark scheme explicitly looks for the *reason for rejection*, not just the act of discarding. Write something like \"reject $$u < 0$$ since $$x^2 \\geq 0$$.\" This earns the rigor mark.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "When solving a cubic via the substitution $$u = \\sqrt{x}$$ (so $$x^{3/2} = u^3$$, $$x = u^2$$), how do you know which solutions to keep? (3 steps)", "answer": "- Step 1: The substitution $$u = \\sqrt{x}$$ implicitly defines $$u \\geq 0$$ (the principal square root). Any solution with $$u < 0$$ must be rejected.\n- Step 2: Additionally, if the cubic factorises into a linear factor and a quadratic, check the quadratic's discriminant. If $$b^2 - 4ac < 0$$, the quadratic has no real roots — discard it entirely.\n- Step 3: Back-substitute the surviving non-negative $$u$$ values: $$x = u^2$$. State explicitly *why* you rejected each non-valid root (negative root, or negative discriminant), since the rejection reasoning earns marks.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "Why is a quadratic with a negative discriminant automatically rejected when looking for real roots? (2 steps)", "answer": "- Step 1: The discriminant $$b^2 - 4ac$$ appears under a square root in the quadratic formula $$x = \\frac{-b \\pm \\sqrt{b^2 - 4ac}}{2a}$$. If $$b^2 - 4ac < 0$$, taking its square root produces an imaginary number.\n- Step 2: For real-number problems (the entire IAL P1 syllabus), imaginary roots don't exist, so the quadratic factor has no real solutions and is discarded. Always say *why*: \"discriminant negative ⇒ no real roots.\"", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "When simplifying expressions like $$\\frac{9^{2x+1} \\cdot 3^{3x-3}}{27^{2x-a}}$$, what's the strategic first move? (3 steps)", "answer": "- Step 1: Rewrite every base as a power of the *smallest common base*. Here, $$9 = 3^2$$ and $$27 = 3^3$$, so the smallest common base is 3.\n- Step 2: Apply the power-of-a-power rule: $$(3^2)^{2x+1} = 3^{4x+2}$$ and $$(3^3)^{2x-a} = 3^{6x-3a}$$. Now everything is in base 3.\n- Step 3: Use index laws: when multiplying, add exponents; when dividing, subtract. The whole expression collapses to $$3^{(4x+2)+(3x-3)-(6x-3a)} = 3^{x-1+3a}$$. The strategic principle: reducing to a common base turns nested expressions into simple exponent arithmetic.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "Why is \"carry full accuracy, round once at the end\" the rule for IAL precision, rather than rounding at each step? (3 steps)", "answer": "- Step 1: Each rounding step introduces an error of up to half the last decimal place. When you chain operations (e.g. sine rule → arcsine), these errors compound multiplicatively.\n- Step 2: Even a small error in the 4th decimal place of $$\\sin x$$ can shift the final angle by enough to round to a different value (e.g. 136.93 vs 136.95). The displayed precision is then *not* the true precision.\n- Step 3: The professional practice: keep the full unrounded number in calculator memory, do all operations symbolically or with full precision, then round once at the final step to *exactly* the requested precision. Never copy a rounded intermediate value back into the calculator.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": true}, {"question": "Imagine a triangle with $$AB = 21$$, $$BC = 13$$, and $$\\angle BAC = 25°$$. Conceptually (without computing exact values), explain how you find $$\\angle ACB$$ and which root to choose. (3 steps)", "answer": "- Step 1: Apply the sine rule: $$\\frac{\\sin C}{AB} = \\frac{\\sin A}{BC}$$. Rearrange to find $$\\sin C = \\frac{AB \\cdot \\sin A}{BC} = \\frac{21 \\sin 25°}{13}$$. Since $$AB > BC$$, the ratio is greater than $$\\sin 25°$$, meaning $$C$$ is a larger angle than $$A$$.\n- Step 2: Take $$\\sin^{-1}$$ on a calculator to get the acute candidate (around $$43°$$). But sine has *two* solutions in $$(0°, 180°)$$: the acute angle and its supplement.\n- Step 3: Decide using geometry: $$AB$$ is the longest side, so $$\\angle C$$ (opposite $$AB$$) is the largest angle. Since $$\\angle A = 25°$$, and the largest must exceed roughly $$77°$$ to dominate, the obtuse supplement (around $$137°$$) is correct. Choose $$C = 180° - \\sin^{-1}(\\text{value})$$.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "A curve has a minimum at $$(-1, 0)$$, a maximum at $$(3/2, 2)$$, and a horizontal asymptote $$y = 1$$. Where do these features map under $$y = f(x) - 2$$? (3 steps)", "answer": "- Step 1: $$y = f(x) - 2$$ is a vertical translation by $$-2$$: every point $$(x, y)$$ moves to $$(x, y - 2)$$.\n- Step 2: Apply to each feature:\n+ Minimum $$(-1, 0) \\to (-1, -2)$$\n+ Maximum $$(3/2, 2) \\to (3/2, 0)$$\n+ Asymptote $$y = 1 \\to y = -1$$\n- Step 3: The shape is unchanged — it has just shifted bodily downward by 2. Sketch the same curve in its new vertical position; do not redraw differently.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "A curve has a minimum at $$(-1, 0)$$, a maximum at $$(3/2, 2)$$, and a horizontal asymptote $$y = 1$$. Where do these features map under $$y = f(-x)$$? (3 steps)", "answer": "- Step 1: $$y = f(-x)$$ reflects the graph in the $$y$$-axis: every point $$(x, y) \\to (-x, y)$$. The $$y$$-values stay the same; the $$x$$-values negate.\n- Step 2: Apply to each feature:\n+ Minimum $$(-1, 0) \\to (1, 0)$$\n+ Maximum $$(3/2, 2) \\to (-3/2, 2)$$\n+ Horizontal asymptote $$y = 1$$ remains $$y = 1$$ (since this is a horizontal operation, the horizontal asymptote is unchanged).\n- Step 3: The curve is the mirror image of the original across the $$y$$-axis. Notice the maximum is now in the second quadrant (left of $$y$$-axis) and the minimum is on the positive $$x$$-axis.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "For a problem flagged \"show all stages of your working — solutions relying on calculator technology are not acceptable,\" what kinds of steps are mandatory? (3 steps)", "answer": "- Step 1: Any algebraic manipulation must be written out: expansion, factorisation, substitution, combining like terms. The marker must see the route from one expression to the next.\n- Step 2: For quadratics or higher-order equations, show the factorisation or use of the formula explicitly — don't write \"solving gives $$x = 3$$\" without showing how. Justify rejected roots with a reason (negative square, negative discriminant, out of range).\n- Step 3: For trigonometric or surd manipulations, write the identity used (e.g. \"$$\\sin(180° - \\alpha) = \\sin\\alpha$$\") rather than typing values into a calculator. The principle: the exam tests reasoning; calculator-only answers score zero on these flagged questions.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "Why does the integral $$\\int(10x^5 + 6x^3 - 3x^{-2}) \\, dx$$ produce a sign flip on the last term, and what is the fully simplified result? (3 steps)", "answer": "- Step 1: Integrate each term using the power rule:\n+ $$10x^5 \\to \\frac{10x^6}{6} = \\frac{5}{3}x^6$$\n+ $$6x^3 \\to \\frac{6x^4}{4} = \\frac{3}{2}x^4$$\n+ $$-3x^{-2} \\to -3 \\cdot \\frac{x^{-1}}{-1} = +3x^{-1}$$ (the division by $$-1$$ flips the sign)\n- Step 2: The negative-power term's sign flip is the easy-to-miss detail: $$-3 \\div (-1) = +3$$.\n- Step 3: Combine and include $$+c$$ for indefinite integral: $$\\frac{5}{3}x^6 + \\frac{3}{2}x^4 + \\frac{3}{x} + c$$. Present all terms simplified on a single line — that's the format the A-mark demands.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "Suppose you're given $$f'(x) = \\frac{3}{2}\\sqrt{x} + A$$ with $$f'(4) = 10$$. How do you find $$A$$ in your head? (3 steps)", "answer": "- Step 1: Substitute $$x = 4$$ into $$f'(x)$$: $$f'(4) = \\frac{3}{2}\\sqrt{4} + A = \\frac{3}{2}(2) + A = 3 + A$$.\n- Step 2: Set equal to the given value: $$3 + A = 10$$, so $$A = 7$$.\n- Step 3: The trick is recognising $$\\sqrt{4} = 2$$ is a \"clean\" value — exam problems are usually designed so the substitution number gives easy arithmetic. Always check whether the given $$x$$-value produces a nice square root before reaching for a calculator.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "Why does substituting $$u = \\sqrt{x}$$ transform a cubic-like equation $$x^{3/2} + 7x - 24 = 0$$ into something more tractable? (3 steps)", "answer": "- Step 1: With $$u = \\sqrt{x}$$: $$x = u^2$$ and $$x^{3/2} = (\\sqrt{x})^3 = u^3$$. The fractional powers disappear.\n- Step 2: The equation becomes $$u^3 + 7u^2 - 24 = 0$$ — wait, more carefully: $$7x = 7u^2$$, so the equation is $$u^3 + 7u^2 - 24 = 0$$. (Note: if instead $$7x$$ remains as $$7u^2$$, the cubic becomes a polynomial in $$u$$ with integer powers, easier to factorise.)\n- Step 3: Factorise by inspection or rational-root theorem; reject any $$u < 0$$ (since $$u = \\sqrt{x} \\geq 0$$) or quadratic factors with negative discriminant. Back-substitute $$x = u^2$$ for the surviving roots. The strategy: substitution turns fractional powers into polynomials.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "When a sketch shows $$y = \\sin 2x$$ across an interval like $$-360° \\leq x \\leq 360°$$, where are the $$x$$-intercepts and what's the amplitude? (3 steps)", "answer": "- Step 1: $$\\sin 2x = 0$$ when $$2x = 0, \\pm 180°, \\pm 360°, \\pm 540°, \\pm 720°$$. Solving for $$x$$: $$x = 0, \\pm 90°, \\pm 180°, \\pm 270°, \\pm 360°$$.\n- Step 2: In the interval $$-360°$$ to $$360°$$, the intercepts are at $$x = -360°, -270°, -180°, -90°, 0°, 90°, 180°, 270°, 360°$$ — nine intercepts total (one every $$90°$$).\n- Step 3: Amplitude is unchanged at $$\\pm 1$$ (the coefficient outside the sine is 1). The curve oscillates between $$+1$$ and $$-1$$ with the doubled frequency — four full waves in the $$720°$$ interval.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "What's the conceptual difference between $$y = f(x - a)$$ and $$y = f(x) - a$$, and why is the sign behaviour different from what you might intuitively expect? (3 steps)", "answer": "- Step 1: $$y = f(x - a)$$ shifts the graph *horizontally right* by $$a$$ (counter-intuitive: minus inside means right shift). This is because the new function reaches the same output value at $$x = a$$ that the old one reached at $$x = 0$$.\n- Step 2: $$y = f(x) - a$$ shifts the graph *vertically down* by $$a$$. This is intuitive: subtracting $$a$$ from $$y$$ moves every point down by $$a$$.\n- Step 3: The principle: changes *inside* the function affect $$x$$ (horizontal) and behave inversely; changes *outside* affect $$y$$ (vertical) and behave directly. Always identify whether the modification is inside or outside the $$f(\\cdot)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "In a circular sector with radius $$r$$ and angle $$\\theta$$ (radians), what's the relationship between arc length and area, and why? (3 steps)", "answer": "- Step 1: Arc length: $$s = r\\theta$$. This is because the arc is a fraction $$\\theta/(2\\pi)$$ of the full circumference $$2\\pi r$$, giving $$\\theta r$$.\n- Step 2: Sector area: $$A = \\tfrac{1}{2}r^2\\theta$$. Similarly, it's the fraction $$\\theta/(2\\pi)$$ of the full circle area $$\\pi r^2$$, giving $$\\tfrac{1}{2}r^2\\theta$$.\n- Step 3: The intuition: both formulas come from \"fraction of full circle.\" Arc length scales linearly with $$r$$; area scales quadratically. To find $$\\theta$$ given an arc, use $$\\theta = s/r$$; to compute composite-shape areas, sum or subtract sector areas using $$A = \\tfrac{1}{2}r^2\\theta$$.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "When the question asks for \"the equation of a line in the form $$ax + by + c = 0$$ with integer coefficients,\" why is this format specifically demanded? (3 steps)", "answer": "- Step 1: This form (general form) avoids fractions and ambiguity. A line $$y = mx + c$$ might have non-integer $$m$$ or $$c$$, leading to messy expressions; clearing denominators produces $$ax + by + c = 0$$.\n- Step 2: Requiring integer coefficients pins down the form uniquely (up to a common factor or sign). Without this, equivalent forms like $$2x + 4y - 6 = 0$$ and $$x + 2y - 3 = 0$$ would both be \"correct.\"\n- Step 3: The practical method: derive the line in $$y = mx + c$$ form first, then multiply through by the LCM of all denominators to clear fractions, ensuring integer coefficients. Always check the question's required form before writing the final answer.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "Why does the normal to a curve at a point have gradient $$-1/m$$, where $$m$$ is the curve's gradient at that point? (3 steps)", "answer": "- Step 1: The tangent to the curve at the point has gradient $$m$$ (the value of $$dy/dx$$ at that point).\n- Step 2: The normal is perpendicular to the tangent. Two lines are perpendicular iff the product of their gradients is $$-1$$ (when neither is vertical).\n- Step 3: Therefore the normal's gradient is $$-1/m$$. Geometrically: rotating a tangent by $$90°$$ produces the normal, and the rotation transforms gradient $$m$$ into $$-1/m$$. This relationship lets you set up equations involving the normal whenever you can compute the curve's gradient.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "When solving a quadratic that arises from setting \"gradient of curve equals gradient of normal,\" and you get two roots, how do you decide which to keep? (3 steps)", "answer": "- Step 1: Check the geometric context: the question often specifies a region (e.g. \"$$x > 0$$\") or a sketch indicating which root makes physical sense.\n- Step 2: If the question mentions \"the positive root\" or \"from the sketch,\" use that constraint to discard the invalid root. Sometimes one root corresponds to a different intersection point or doesn't satisfy the original problem's domain.\n- Step 3: Always state the reason for rejection: \"reject $$x = -\\tfrac{11}{6}$$ as we require $$x > 0$$ from the sketch.\" The rejection-reasoning is what earns the marks; merely choosing the right one without justification can lose accuracy marks.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": true}, {"question": "Conceptually, why does completing the square for $$f(x) = 12 - \\tfrac{4}{3}(x+2)^2$$ reveal the maximum point immediately? (3 steps)", "answer": "- Step 1: The expression has the form $$f(x) = \\text{constant} - (\\text{positive coefficient})(x - h)^2$$. The squared term $$(x+2)^2$$ is non-negative for all $$x$$ and equals zero only when $$x = -2$$.\n- Step 2: Subtracting a non-negative quantity from $$12$$ produces a value $$\\leq 12$$. The maximum value is achieved when the squared term is zero, i.e. at $$x = -2$$, giving $$f(-2) = 12$$.\n- Step 3: So the maximum point is $$(-2, 12)$$, read directly from the completed-square form. The intuition: completed-square form $$a(x-h)^2 + k$$ exposes the vertex $$(h, k)$$ without calculus — the constants tell you where the parabola turns.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": false}, {"question": "When a question asks for a value \"in surd form\" (e.g. $$a + b\\sqrt{5}$$ with $$a, b$$ rational), why is this preferred over a decimal approximation? (3 steps)", "answer": "- Step 1: Surd form is exact — it represents the value precisely, with no rounding error. Decimal approximations lose information after the truncation point.\n- Step 2: For follow-on calculations (e.g. substitution into another equation), exact form prevents error propagation. A decimal might force you to keep more digits than you'd otherwise track.\n- Step 3: For marks: the question explicitly demanding surd form means the marker is looking for exact reasoning, not numerical estimation. Provide the surd form even if it looks more complex than a decimal — it shows mathematical control.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "Why does $$y = \\sin(-\\alpha) = -\\sin(\\alpha)$$, geometrically, on the unit circle? (3 steps)", "answer": "- Step 1: On the unit circle, the angle $$\\alpha$$ measured anticlockwise from the positive $$x$$-axis gives a point $$(\\cos\\alpha, \\sin\\alpha)$$. The $$y$$-coordinate of this point is $$\\sin\\alpha$$.\n- Step 2: The angle $$-\\alpha$$ is measured *clockwise* by the same amount, giving the point $$(\\cos\\alpha, -\\sin\\alpha)$$ — same $$x$$-coordinate (reflection in $$x$$-axis), opposite $$y$$-coordinate.\n- Step 3: Therefore $$\\sin(-\\alpha) = -\\sin\\alpha$$. The intuition: clockwise reflection across the $$x$$-axis flips the $$y$$-value but preserves $$x$$ — making sine odd and cosine even.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": false}, {"question": "What's the geometric meaning of $$\\sin(180° + \\alpha) = -\\sin\\alpha$$? (3 steps)", "answer": "- Step 1: Adding $$180°$$ to an angle $$\\alpha$$ rotates the corresponding point on the unit circle through half a turn — the point lands diametrically opposite.\n- Step 2: A diametric opposite point has both coordinates negated: $$(\\cos\\alpha, \\sin\\alpha) \\to (-\\cos\\alpha, -\\sin\\alpha)$$. The $$y$$-coordinate (which is sine) is therefore $$-\\sin\\alpha$$.\n- Step 3: Hence $$\\sin(180° + \\alpha) = -\\sin\\alpha$$ and $$\\cos(180° + \\alpha) = -\\cos\\alpha$$. The intuition: half-turn rotation flips both coordinates, which corresponds to negation of both sine and cosine.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": true}, {"question": "An asymptote $$y = 1$$ is described as the \"only\" asymptote of a curve. What does this tell you about the curve's behaviour, and why does this constrain the transformations you can apply? (3 steps)", "answer": "- Step 1: \"Only asymptote $$y = 1$$\" tells us:\n+ The curve approaches $$y = 1$$ as $$x \\to \\pm\\infty$$ (or possibly only one direction).\n+ There are no vertical asymptotes — the function is defined for all $$x$$.\n+ The line $$y = 1$$ is a horizontal feature that the curve never crosses (or crosses finitely and then approaches).\n- Step 2: Under vertical transformations (shifts/reflections in the $$y$$ direction), the asymptote moves: shift up by 2 → asymptote at $$y = 3$$; reflect in $$x$$-axis → asymptote at $$y = -1$$.\n- Step 3: Under horizontal transformations (shifts/reflections in the $$x$$ direction), the horizontal asymptote is *unchanged* — it remains $$y = 1$$. This is the most common transformation error: thinking that reflecting in the $$y$$-axis moves a horizontal asymptote (it does not).", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": false}, {"question": "Why does $$\\sin(180° - \\alpha) = \\sin\\alpha$$ make sense from the symmetry of the sine wave? (3 steps)", "answer": "- Step 1: The sine wave from $$0°$$ to $$180°$$ is symmetric about its midpoint $$x = 90°$$ — it rises to 1 at $$90°$$, then falls symmetrically.\n- Step 2: An angle $$\\alpha$$ and its supplement $$180° - \\alpha$$ are equidistant from $$90°$$ (one to the left, one to the right). Because of the symmetry, both have the same $$y$$-value on the wave.\n- Step 3: Hence $$\\sin\\alpha = \\sin(180° - \\alpha)$$. The intuition: the supplementary angle is the \"mirror partner\" of $$\\alpha$$ in the first half-cycle of sine, so they share the same sine value.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": true}, {"question": "Quick exer ou find $$c$$? (3 steps)", "answer": "- Step 1: Substitute $$x = 12$$ into your expression and set equal to $$8\\sqrt{3}$$:\n$$4\\sqrt{12} + \\frac{4}{12} + 3(12) + c = 8\\sqrt{3}$$.\n- Step 2: Simplify $$4\\sqrt{12} = 4 \\cdot 2\\sqrt{3} = 8\\sqrt{3}$$ — this lets the surd terms cancel cleanly. The equation becomes $$8\\sqrt{3} + \\frac{1}{3} + 36 + c = 8\\sqrt{3}$$.\n- Step 3: Cancel $$8\\sqrt{3}$$ from both sides: $$\\frac{1}{3} + 36 + c = 0$$, so $$c = -36 - \\frac{1}{3} = -\\frac{109}{3}$$. The key insight: the question is designed so the surds cancel — if your $$c$$ doesn't come out as a clean rational, check your arithmetic.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": false}, {"question": "What does the question phrase \"in simplest form\" demand, and what are the typical features marked? (3 steps)", "answer": "- Step 1: \"In simplest form\" requires:\n+ All fractions reduced to lowest terms (e.g. $$\\frac{10}{6} \\to \\frac{5}{3}$$).\n+ Negative powers rewritten as positive (e.g. $$3x^{-1} \\to \\frac{3}{x}$$, unless context favours powers).\n+ Surds simplified (e.g. $$\\sqrt{12} \\to 2\\sqrt{3}$$).\n+ Like terms combined and the constant $$+c$$ included for indefinite integrals.\n- Step 2: Format: present the final answer on a single line, with terms ordered cleanly (often descending in power, or grouped logically).\n- Step 3: The A1 mark specifically demands \"fully correct and simplified\" — leaving an unsimplified answer (like $$\\frac{10x^6}{6}$$ instead of $$\\frac{5}{3}x^6$$) loses the accuracy mark even if the underlying integration was right.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": true}, {"question": "Why is \"drawing the curve clearly asymptotic at both ends\" a marking criterion in a graph-sketching question? (3 steps)", "answer": "- Step 1: An asymptote is defined by the curve's behaviour as $$x \\to \\pm\\infty$$ (or as $$x$$ approaches a specific value). The marker needs visual evidence that you understand this limiting behaviour.\n- Step 2: If your sketch crosses the asymptote or fails to approach it (e.g. ends abruptly, curves back toward the axis), you've shown that you don't fully understand the asymptotic nature, and B-marks are lost.\n- Step 3: Best practice: extend the curve far enough on both sides that it visibly hugs the asymptote line, with the asymptote drawn as a dashed reference line. The shape near the asymptote is part of the evidence.", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": true}, {"question": "When you spot the pattern \"answer must be rational, but my calculation gives an irrational number,\" what's the diagnostic move? (2 steps)", "answer": "- Step 1: Re-check the surd simplification at every step. A common issue is failing to simplify $$\\sqrt{12} = 2\\sqrt{3}$$ or $$\\sqrt{48} = 4\\sqrt{3}$$, which causes the surd part of the answer to fail to cancel as the question intended.\n- Step 2: Also check for sign errors and dropped factors. Exam problems are usually designed so surds cancel out and rational answers emerge cleanly — if they don't, suspect arithmetic, not the question.", "source": "Opus 4.7 ②", "_id": "opus_2_51", "judge_pick": true}], "count": 52}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 13991, "out_tokens": 28978, "reasoning_chars": 50564, "cost_eur": 0.1068, "elapsed_s": 536, "content_chars": 39273}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 13992, "out_tokens": 10400, "reasoning_chars": 12008, "cost_eur": 0.047, "elapsed_s": 90, "content_chars": 24986}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 13992, "out_tokens": 16539, "reasoning_chars": 1564, "cost_eur": 0.0668, "elapsed_s": 132, "content_chars": 50847}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/mini const SK='maths_p1_may2022_jun16';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
