<script>
const DATA={"selected": [{"question": "For the graph transformation y = f(-x), one student correctly found the new coordinates of the turning points (P at (-1, 0) becomes (1, 0), Q at (2/3, 2) becomes (-2/3, 2)) but lost all 3 marks because the asymptote was wrong. Why does y = f(-x) leave the horizontal asymptote y = 1 unchanged? (2 steps)", "answer": "- Step 1: The transformation y = f(-x) reflects the graph in the y-axis — it changes the x-coordinate sign but leaves y-values unchanged. Every point (x, y) becomes (-x, y). This is a horizontal reflection only.\n- Step 2: The horizontal asymptote y = 1 represents a y-value that the graph approaches. Since y-values don't change in a y-axis reflection, the asymptote's y-coordinate stays at 1. The student incorrectly wrote y = 1 → y = -1, but that would happen with y = -f(x) (reflection in x-axis), not y = f(-x). The correct transformed asymptote remains y = 1.\n\n**Takeaway:** Know which transformations affect which asymptotes: y-axis reflection (f(-x)) → horizontal asymptote unchanged; x-axis reflection (-f(x)) → horizontal asymptote flips sign; vertical shifts → horizontal asymptote moves with the shift.", "source": "MiniMax ①", "_id": "minimax_1_8"}, {"question": "How does the period of $y = \\sin 2x$ differ from $y = \\sin x$, and why does solving $\\sin 2x = p$ in $0^\\circ < x < 180^\\circ$ yield two solutions? (3 steps)", "answer": "- Step 1: The period of $\\sin x$ is $360^\\circ$. For $\\sin 2x$, the coefficient $2$ compresses the graph horizontally by a factor of $2$, making the period $180^\\circ$.  \n- Step 2: Solve $\\sin 2x = p$:  \n  $2x = \\alpha \\implies x = \\alpha/2$ (acute solution), and  \n  $2x = 180^\\circ - \\alpha \\implies x = 90^\\circ - \\alpha/2$ (obtuse solution).  \n+ Since the period is $180^\\circ$, both solutions fall within $0^\\circ < x < 180^\\circ$.  \n- Step 3: Contrast with $\\sin x = p$: Only one solution ($x = \\alpha$) in $0^\\circ < x < 180^\\circ$ exists without the horizontal compression.  \n\n**Visual Intuition:** Doubling the angle inside the sine function creates two waves in the same interval, enabling two roots for a given $p$.", "source": "Qwen 3 ②", "_id": "qwen_2_2"}, {"question": "When solving a hidden quadratic like $$2u^2 - 15u - 50 = 0$$ (where $$u = x^2$$), you get $$u = 10$$ or $$u = -\\frac{5}{2}$$. Why must you reject $$u = -\\frac{5}{2}$$, and what reasoning must you write? (2 steps)", "answer": "- Step 1: Since $$u = x^2$$, the value $$u = -\\frac{5}{2}$$ would mean $$x^2 = -\\frac{5}{2}$$. But a squared real number can never be negative — squares are always non-negative.\n- Step 2: You must write: \"Reject $$u = -\\frac{5}{2}$$ since $$x^2 \\geq 0$$ for all real $$x$$.\" The reason is part of the mark. Stating just \"reject\" without justification loses the reasoning mark.", "source": "GLM 5.1 ③", "_id": "glm_3_20"}, {"question": "In Q2, writing $$\\sin x = 0.6830$$ instead of $$0.6827$$ lost the accuracy mark in part (a). The follow-through then gave $$x = 136.93°$$ instead of $$136.95°$$ in part (b). Explain the mechanism: why does rounding early produce a different final answer, and what habit prevents this? (3 steps)", "answer": "- Step 1: The true value is $$\\sin x = 0.68269...$$. Rounded to 4 decimal places, this is $$0.6827$$. But rounding *up* to $$0.6830$$ introduces an error of about $$0.0003$$ in the sine value.\n- Step 2: When you then compute $$\\sin^{-1}(0.6830)$$, you get a slightly different acute angle than $$\\sin^{-1}(0.6827)$$. The obtuse supplement inherits this error: $$180° - 43.07°... = 136.93°$$ instead of $$136.95°$$.\n- Step 3: Prevention: carry the full calculator display (or stored value) through every intermediate step. Only round at the very end, to exactly the precision the question requests. If part (a) asks for 4 dp, compute with full accuracy, write 0.6827, and *store* the full value for use in part (b).\n\nThe mark scheme penalised the 4 dp slip in (a) but forgave the propagated error in (b) via follow-through. You still lost the (a) mark — and on a stricter mark scheme, you might lose both.", "source": "GLM 5.1 ①", "_id": "glm_1_11"}, {"question": "To solve $$\\sin 2x = p$$ where $$p = \\sin \\alpha$$ on $$0 < x < 180^\\circ$$, what's the systematic procedure for finding all solutions? (4 steps)", "answer": "- Step 1: First, transform the range to match the variable in the sine. If $$0 < x < 180^\\circ$$, then $$0 < 2x < 360^\\circ$$.\n- Step 2: On $$0 < 2x < 360^\\circ$$, the equation $$\\sin(2x) = \\sin \\alpha$$ has two solutions for $$2x$$: the principal value $$\\alpha$$, and its supplement $$180^\\circ - \\alpha$$. (Both lie in the first/second quadrants where sine is positive.)\n- Step 3: So $$2x = \\alpha$$ or $$2x = 180^\\circ - \\alpha$$, giving $$x = \\tfrac{\\alpha}{2}$$ or $$x = 90^\\circ - \\tfrac{\\alpha}{2}$$.\n- Step 4: Check both are in the original range. Since $$0 < \\alpha < 90^\\circ$$, $$\\tfrac{\\alpha}{2} \\in (0, 45^\\circ)$$ and $$90^\\circ - \\tfrac{\\alpha}{2} \\in (45^\\circ, 90^\\circ)$$ — both lie in $$(0, 180^\\circ)$$.\n\nThe takeaway: when the argument is $$kx$$, double the range first, find solutions for $$kx$$, then divide back.", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "Why does the \"reject impossible root with a reason\" step matter for marks, even when the rejection is obvious to the student?", "answer": "Mark schemes typically award one mark for *identifying* both algebraic roots of a quadratic, and a separate mark for *correctly rejecting* the inadmissible one *with justification*. Saying \"$$u = -\\tfrac{5}{2}$$ is rejected because $$x^2 \\ge 0$$\" or \"$$u^2 + 2u + 12$$ has no real roots because the discriminant is $$-44 < 0$$\" demonstrates that the student understands the constraint, rather than having guessed which root to discard. Without the written justification, the rejection mark is forfeited — even if the final selected root is correct.", "source": "Opus 4.7 ①", "_id": "opus_1_49"}, {"question": "In Q2, the correct value is $$\\sin x = \\frac{21 \\sin 25^\\circ}{13} = 0.6827$$ to 4 decimal places, but one student wrote 0.6830 and lost the accuracy mark. Why is premature rounding fatal in accuracy-based questions? (2 steps)", "answer": "- Step 1: The question explicitly asks for \"4 decimal places\" — this is a precision requirement, not a suggestion. Writing 0.6830 is actually 4 decimal places, but it's the wrong 4 decimal places. The correct value 0.6827 comes from carrying full calculator precision (0.68269...) and rounding only at the final step.\n- Step 2: The student likely rounded during calculation: they might have used sin 25° ≈ 0.4226 (2 dp) internally, then multiplied by 21 and divided by 13, accumulating rounding error at each step. This \"intermediate rounding\" compounds errors. The rule: carry full calculator accuracy through every step, round only once at the end to exactly the precision requested.\n\n**Takeaway:** Precision requirements (dp, sf) mean carry full accuracy and round once at the end. Intermediate rounding introduces error that grows with each step.", "source": "MiniMax ①", "_id": "minimax_1_6"}, {"question": "If you blindly apply the integration power rule to $$x^{-1}$$, you get $$\\frac{x^0}{0}$$, which is undefined. What is the true antiderivative of $$x^{-1}$$, and why does the standard power rule break down here? (3 steps)", "answer": "- Step 1: The true antiderivative of $$x^{-1}$$ (or $$\\frac{1}{x}$$) is the natural logarithm, $$\\ln|x|$$, not a power function.\n- Step 2: The power rule breaks down because it assumes the derivative will lower the power by 1. If you differentiate $$\\ln(x)$$, you get $$\\frac{1}{x} = x^{-1}$$. There is no \"power lowering\" happening; the logarithm's derivative is a simple reciprocal.\n+ Conversely, think about differentiating $$x^n$$: you bring down an $$n$$ and drop the power. If you tried to differentiate something to get $$x^{-1}$$, the original power would have to be $$0$$ (since $$0 - 1 = -1$$). But the derivative of $$x^0 = 1$$ is $$0$$, not $$x^{-1}$$.\n- Step 3: Because there is no polynomial/power function whose derivative is $$x^{-1}$$, the power rule formula $$\\frac{x^{n+1}}{n+1}$$ fails at $$n=-1$$ (division by zero). The logarithm is the special function designed to fill this gap in the family of antiderivatives.\n\nTakeaway: $$x^{-1}$$ is the exception to the power rule — its integral is the natural logarithm, $$\\ln|x|$$.", "source": "GLM 5.1 ②", "_id": "glm_2_2"}, {"question": "Compare the effect of $$y = -f(x)$$ versus $$y = f(-x)$$ on a horizontal asymptote $$y = k$$. Why do they differ? (3 steps)", "answer": "- Step 1: $$y = -f(x)$$ is a reflection in the $$x$$-axis: every $$y$$-value is negated. So $$y = k$$ becomes $$y = -k$$ — the asymptote moves (unless $$k = 0$$).\n- Step 2: $$y = f(-x)$$ is a reflection in the $$y$$-axis: every $$x$$-value is negated, but $$y$$-values are unchanged. The asymptote $$y = k$$ stays at $$y = k$$.\n- Step 3: The general principle: vertical operations (reflecting in $$x$$-axis, shifting up/down) change horizontal asymptotes; horizontal operations (reflecting in $$y$$-axis, shifting left/right) leave them fixed. Always identify the *axis of operation* first.", "source": "Opus 4.7 ②", "_id": "opus_2_10"}, {"question": "For the transformation $$y = f(-x)$$, explain what happens to a horizontal asymptote $$y = k$$ and why. Contrast this with $$y = -f(x)$$. (3 steps)", "answer": "- Step 1: $$y = f(-x)$$ reflects the graph in the $$y$$-axis — it's a horizontal transformation. Every point $$(x, y)$$ moves to $$(-x, y)$$. The $$y$$-values are untouched.\n- Step 2: A horizontal asymptote $$y = k$$ says \"as $$x \\to \\pm\\infty$$, $$y \\to k$$.\" Under $$f(-x)$$, as $$x \\to +\\infty$$ the function now reads $$f(-\\infty)$$, which is the old left-tail behavior — but it still approaches $$y = k$$. The asymptote's $$y$$-value is unchanged because the transformation only swaps left and right; it doesn't move anything vertically. So $$y = 1$$ stays $$y = 1$$.\n- Step 3: For $$y = -f(x)$$, the graph reflects in the $$x$$-axis — every $$y$$-value flips sign. A horizontal asymptote $$y = k$$ becomes $$y = -k$$. This is a vertical transformation, so it moves horizontal features.\n\n**Rule:** Horizontal transformations ($$f(-x)$$, $$f(x-a)$$) move vertical asymptotes but leave horizontal asymptotes alone. Vertical transformations ($$-f(x)$$, $$f(x)+a$$) move horizontal asymptotes but leave vertical asymptotes alone.", "source": "GLM 5.1 ③", "_id": "glm_3_9"}, {"question": "When integrating $$-3x^{-2}$$, the final simplified term is $$+\\frac{3}{x}$$. Conceptually, where does the sign flip from negative to positive come from? (3 steps)", "answer": "- Step 1: Start with the integral: $$\\int -3x^{-2} \\,dx$$. Apply the power rule: add 1 to the power to get $$-2 + 1 = -1$$, and divide by the new power $$-1$$.\n- Step 2: The division by the new power is the source of the sign flip. You are dividing $$-3$$ by $$-1$$, which yields $$+3$$. So the coefficient becomes positive: $$\\frac{-3}{-1}x^{-1} = +3x^{-1}$$.\n+ A common mistake is to only add 1 to the power and forget to divide the coefficient by the new power, missing the sign flip entirely.\n- Step 3: Rewriting the negative power as a fraction confirms the logic: $$+3x^{-1} = +\\frac{3}{x}$$. The sign flip is purely an arithmetic consequence of dividing a negative coefficient by a negative new power.\n\nTakeaway: Dividing by a negative new power flips the sign of the coefficient — always carry the sign through the division step.", "source": "GLM 5.1 ②", "_id": "glm_2_1"}, {"question": "Why is \"a square is non-negative\" a valid mathematical reason for rejecting a root, and why must it be written explicitly? (2 steps)", "answer": "- Step 1: For real $$x$$, $$x^2 \\ge 0$$ always — this is a defining property of the real numbers (squares preserve magnitude and discard sign). So any equation that would require $$x^2 < 0$$ has no real solution.\n- Step 2: Examiners award marks not just for the right answer but for the *justification*. Writing \"reject $$u = -\\tfrac{5}{2}$$ because $$x^2 \\ge 0$$\" demonstrates that you understand *why* the root is impossible, not just that you crossed it out by guess.\n\nThe reasoning is part of the math — and part of the mark.", "source": "Opus 4.7 ①", "_id": "opus_1_28"}, {"question": "In Q4(i), for y = f(x) - 2 (translation down 2), the minimum at P(-1, 0) becomes (-1, -2), the maximum at Q(2/3, 2) becomes (2/3, 0), and the asymptote y = 1 becomes y = -1. Explain why the order of the points (which is minimum/maximum) stays the same after translation. (1 step)", "answer": "- Step 1: Translation moves every point by the same amount (down 2). The relative positions don't change — the point that was the minimum remains the minimum, just lower. The point that was the maximum remains the maximum, just lower. What was left of the y-axis stays left; what was right stays right. Only the y-coordinates change, not which point is which extremum.\n\n**Takeaway:** Translation preserves the order/relationship between features. The shape stays the same; only position changes.", "source": "MiniMax ①", "_id": "minimax_1_32"}, {"question": "Why is it useful to simplify $$4\\sqrt{12}$$ before substituting it into an equation like $$f(12) = 8\\sqrt{3}$$? (3 steps)", "answer": "- Step 1: $$\\sqrt{12} = \\sqrt{4 \\cdot 3} = 2\\sqrt{3}$$, so $$4\\sqrt{12} = 4 \\cdot 2\\sqrt{3} = 8\\sqrt{3}$$.\n- Step 2: Substituting $$8\\sqrt{3}$$ directly into the equation $$f(12) = 8\\sqrt{3}$$ causes the surd terms to cancel cleanly, leaving a simple linear equation in rationals only.\n- Step 3: The principle: simplifying surds before substitution avoids messy intermediate expressions and exposes hidden cancellations. Surds rarely \"happen\" to match by coincidence — the question is usually designed so they do.", "source": "Opus 4.7 ②", "_id": "opus_2_16"}, {"question": "In Q7(a), the student got $$A = -4$$ but scored 0/4. In Q7(b), the student's method was correct but a dropped power gave the wrong constant, and they scored 3/5. Why the difference in partial credit? (3 steps)", "answer": "- Step 1: In Q7(a), the *method itself* was invalid — the differentiation steps were wrong. The mark scheme couldn't award any method marks (M0), so all dependent accuracy marks also fell (A0, dM0, A0). A correct answer from invalid working = 0.\n- Step 2: In Q7(b), the *method was correct* (integrate, substitute, solve for $$c$$). The method marks (M1, dM1) were earned. The error was a slip in executing one step (dropping a power), which lost some accuracy marks (A0ft, A0) but the follow-through marks (A1ft) were still available.\n- Step 3: The lesson: a right method with a minor execution slip still earns partial credit. A wrong method earns nothing, even if the final number is right. Always get the method right first — then worry about arithmetic precision.", "source": "GLM 5.1 ③", "_id": "glm_3_43"}, {"question": "Why does $$y = \\sin 2x$$ have period $$180°$$ instead of $$360°$$, and what does this mean visually? (3 steps)", "answer": "- Step 1: The function $$\\sin(\\theta)$$ completes one full cycle as $$\\theta$$ goes from $$0$$ to $$360°$$. In $$\\sin 2x$$, the argument is $$2x$$, so $$2x$$ ranges from $$0$$ to $$360°$$ as $$x$$ ranges only from $$0$$ to $$180°$$.\n- Step 2: Therefore one complete sine wave fits into $$180°$$ of $$x$$-values — half the original period. Equivalently, the graph is *compressed horizontally* by a factor of 2.\n- Step 3: Visually, you see two full sine waves in the interval $$0$$ to $$360°$$, where there used to be one. Amplitude is unchanged (still $$\\pm 1$$), and the curve still passes through the origin.\n\nThe general rule: $$y = \\sin(kx)$$ has period $$360°/k$$.", "source": "Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "For graph transformation questions, name the six standard transformations of y = f(x) and specify whether each moves a horizontal asymptote y = k.", "answer": "- Step 1: \n  + y = f(x) + a: shifts up by a → asymptote becomes y = k + a (MOVES)\n  + y = f(x) − a: shifts down by a → asymptote becomes y = k − a (MOVES)\n  + y = f(x − a): shifts right by a → asymptote stays y = k (NO MOVE)\n  + y = f(x + a): shifts left by a → asymptote stays y = k (NO MOVE)\n  + y = f(−x): reflects in y-axis → asymptote stays y = k (NO MOVE)\n  + y = −f(x): reflects in x-axis → asymptote becomes y = −k (MOVES)\n- Step 2: The pattern: any transformation that changes y-values (vertical shifts, x-axis reflections) moves horizontal asymptotes. Transformations that only affect x-coordinates don't.\n\n**Takeaway:** Horizontal asymptotes move when y is modified, stay when only x is modified.", "source": "MiniMax ②", "_id": "minimax_2_20"}, {"question": "Explain why the ambiguous case (SSA) in trigonometry can produce two valid solutions for an angle, and how additional information (like \"longest side\") resolves it. (2 steps)", "answer": "- Step 1: In SSA (two sides and an angle not between them), knowing side a, side b, and angle A: sin B = b sin A / a. Since sin is positive in both QI and QII, there are two possible angles B: B = sin^{-1}(value) and B = 180° - sin^{-1}(value). This creates the ambiguous case — two different triangles can satisfy the given information.\n- Step 2: The additional constraint \"AB is the longest side\" tells us which angle is largest, hence which triangle is valid. Since the largest side must be opposite the largest angle, we choose the obtuse solution. Without such constraints, both solutions are mathematically valid.\n\n**Takeaway:** SSA can produce two triangles. Use additional constraints (longest side, largest angle, or whether angle is acute/obtuse) to determine which solution applies.", "source": "MiniMax ①", "_id": "minimax_1_41"}, {"question": "If you know $$f'(x)$$ contains a constant $$A$$ and $$f''(4) = 0$$, conceptually how do you solve for $$A$$ without doing heavy arithmetic? (3 steps)", "answer": "- Step 1: Write $$f''(x)$$ as a sum of two terms in $$x$$: one independent of $$A$$, one proportional to $$A$$. The equation $$f''(4) = 0$$ then has the form $$(\\text{constant}_1) + A \\cdot (\\text{constant}_2) = 0$$.\n- Step 2: Evaluate both constants by substituting $$x = 4$$. Each is a simple power of 4 (e.g. $$4^{-3/2} = 1/8$$, $$4^{-3} = 1/64$$), which can be done mentally if you know fractional-exponent values.\n- Step 3: Rearrange to isolate $$A$$: $$A = -(\\text{constant}_1) / (\\text{constant}_2)$$. The whole technique is structural — express the linear equation in $$A$$, then solve — rather than computational.", "source": "Opus 4.7 ②", "_id": "opus_2_14"}, {"question": "Compute $$4^{-3/2}$$ and $$4^{-3}$$ without a calculator, showing each step. These values appeared in Q7(a) when substituting $$x = 4$$ into $$f''(x)$$. (3 steps)", "answer": "- Step 1: For $$4^{-3/2}$$: a negative exponent means reciprocal, and the denominator 2 means square root. Work from the outside in:\n+ $$4^{-3/2} = \\frac{1}{4^{3/2}}$$\n+ $$4^{3/2} = (4^{1/2})^3 = 2^3 = 8$$\n+ So $$4^{-3/2} = \\frac{1}{8}$$\n- Step 2: For $$4^{-3}$$: $$4^{-3} = \\frac{1}{4^3} = \\frac{1}{64}$$.\n- Step 3: In the Q7(a) equation $$-\\frac{1}{8} - \\frac{A}{32} = 0$$, the $$\\frac{1}{8}$$ came from $$4^{-3/2}$$ and the $$\\frac{1}{32}$$ came from $$\\frac{2}{64} = \\frac{1}{32}$$ (since the term was $$2A \\cdot 4^{-3} = 2A \\cdot \\frac{1}{64} = \\frac{A}{32}$$).\n\nThe key skill: evaluate negative/fractional powers step by step — handle the sign (reciprocal), then the denominator of the fraction (root), then the numerator (power). Never try to do it all at once.", "source": "GLM 5.1 ①", "_id": "glm_1_25"}, {"question": "When a question says \"In this question you must show all stages of your working. Solutions relying on calculator technology are not acceptable,\" what specifically must you do differently? (2 steps)", "answer": "- Step 1: Write out every algebraic step on paper — factorisations, substitutions, power-rule applications — even if you could do them mentally or on a calculator. No \"magic number appears\" lines.\n- Step 2: When rejecting a root, state the mathematical reason (e.g., \"$$x^2 \\geq 0$$\" or \"discriminant < 0\"). When solving a quadratic, show the factorisation or formula, not just the solutions from a solver. The examiner needs to see the *method*, not just the *answer*.", "source": "GLM 5.1 ③", "_id": "glm_3_47"}, {"question": "In a triangle, if you know which side is the longest, how does that tell you whether the unknown angle is acute or obtuse? Apply this to the case where AB = 21 cm is the longest side and angle C is opposite AB. (2 steps)", "answer": "- Step 1: In any triangle, the largest angle is opposite the longest side (and the smallest angle is opposite the shortest side). This follows directly from the sine rule: since $$\\frac{a}{\\sin A}$$ is constant, a larger side means a larger $$\\sin A$$, and hence a larger angle.\n- Step 2: Since AB = 21 cm is the longest side, the angle opposite it (angle C) must be the largest angle in the triangle. Given that the other known angle is only 25°, angle C must be obtuse: $$x = 136.95°$$, not $$43.05°$$.\n\nWithout this clue, you would have to state both possible angles. The \"longest side\" information is the disambiguator — that's why the question deliberately includes it.", "source": "GLM 5.1 ①", "_id": "glm_1_10"}, {"question": "Using the unit circle, explain why $$\\sin(180^\\circ - \\alpha) = \\sin(\\alpha)$$, but $$\\sin(180^\\circ + \\alpha) = -\\sin(\\alpha)$$. (3 steps)", "answer": "- Step 1: Imagine an angle $$\\alpha$$ in the first quadrant. Its sine is the positive $$y$$-coordinate of the point on the unit circle. Now, reflect this angle across the $$y$$-axis to get $$180^\\circ - \\alpha$$ in the second quadrant.\n- Step 2: Because the reflection is horizontal (across the $$y$$-axis), the $$y$$-coordinate remains exactly the same. Therefore, $$\\sin(180^\\circ - \\alpha) = \\sin(\\alpha)$$.\n- Step 3: Now, rotate the original angle by exactly $$180^\\circ$$ to get $$180^\\circ + \\alpha$$ in the third quadrant. This moves the point into the negative $$x$$ and negative $$y$$ territory. The $$y$$-coordinate is now the exact negative of the original, so $$\\sin(180^\\circ + \\alpha) = -\\sin(\\alpha)$$.\n\nTakeaway: Quadrant 2 mirrors Quadrant 1 across the $$y$$-axis (sine stays positive); Quadrant 3 mirrors Quadrant 1 through the origin (sine goes negative).", "source": "GLM 5.1 ②", "_id": "glm_2_12"}, {"question": "Why does a horizontal asymptote move under the transformation $$y = -f(x)$$ but not under $$y = f(-x)$$? (3 steps)", "answer": "- Step 1: $$y = -f(x)$$ negates the *output*, reflecting the curve in the $$x$$-axis. A point $$(a, b)$$ maps to $$(a, -b)$$, so a horizontal asymptote $$y = k$$ becomes $$y = -k$$.\n- Step 2: $$y = f(-x)$$ negates the *input*, reflecting the curve in the $$y$$-axis. A point $$(a, b)$$ maps to $$(-a, b)$$ — $$y$$-values untouched, so the horizontal asymptote stays at $$y = k$$.\n- Step 3: The rule generalizes: a transformation moves a feature only if it acts in the same direction as the feature lies. Horizontal features (asymptotes parallel to $$x$$-axis) move only under vertical transformations.\n\nThis is why \"which axis are we reflecting in?\" must always be the first question in a sketch.", "source": "Opus 4.7 ①", "_id": "opus_1_13"}, {"question": "Why is \"carry full accuracy, round once at the end\" the rule for IAL precision, rather than rounding at each step? (3 steps)", "answer": "- Step 1: Each rounding step introduces an error of up to half the last decimal place. When you chain operations (e.g. sine rule → arcsine), these errors compound multiplicatively.\n- Step 2: Even a small error in the 4th decimal place of $$\\sin x$$ can shift the final angle by enough to round to a different value (e.g. 136.93 vs 136.95). The displayed precision is then *not* the true precision.\n- Step 3: The professional practice: keep the full unrounded number in calculator memory, do all operations symbolically or with full precision, then round once at the final step to *exactly* the requested precision. Never copy a rounded intermediate value back into the calculator.", "source": "Opus 4.7 ②", "_id": "opus_2_25"}, {"question": "A student sees $$y = f(-x)$$ and writes \"$$y = 1 \\Rightarrow y = 1(-1) = -1$$\" for the horizontal asymptote. What conceptual error are they making? (2 steps)", "answer": "- Step 1: They are treating the transformation as if it multiplies the output $$y$$ by $$-1$$, which would be $$y = -f(x)$$. But $$f(-x)$$ replaces the *input*, not the output.\n- Step 2: $$f(-x)$$ reflects the graph horizontally (in the $$y$$-axis). It doesn't negate or change $$y$$-values at all — it changes which $$x$$-value produces each $$y$$. A horizontal asymptote is a statement about $$y$$-values at extreme $$x$$; since $$y$$-values are unchanged, the asymptote stays the same.", "source": "GLM 5.1 ③", "_id": "glm_3_29"}, {"question": "Under the transformation $$y = f(x) - 2$$, what happens to every point on the curve and to the horizontal asymptote? (2 steps)", "answer": "- Step 1: Subtracting 2 from the function output shifts every point *down* by 2 units. So a point $$(a, b)$$ maps to $$(a, b-2)$$.\n- Step 2: The horizontal asymptote, being a horizontal line at some height $$y = k$$, also shifts down with the curve: $$y = k$$ becomes $$y = k - 2$$. So an asymptote at $$y = 1$$ moves to $$y = -1$$.\n\nKey principle: vertical translations move *all* vertical features (points, asymptotes) by the same amount.", "source": "Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "Given $$0 < \\alpha < 90°$$ and $$\\sin \\alpha = p$$, explain why $$x = 90° - \\frac{\\alpha}{2}$$ is a valid solution to $$\\sin 2x = p$$ on $$0° < x < 180°$$. (3 steps)", "answer": "- Step 1: We need $$\\sin 2x = \\sin \\alpha$$. One solution is $$2x = \\alpha$$ giving $$x = \\frac{\\alpha}{2}$$. The other is $$2x = 180° - \\alpha$$ (supplementary angle identity).\n- Step 2: From $$2x = 180° - \\alpha$$: $$x = 90° - \\frac{\\alpha}{2}$$. Since $$0° < \\alpha < 90°$$, we have $$0° < \\frac{\\alpha}{2} < 45°$$, so $$45° < 90° - \\frac{\\alpha}{2} < 90°$$.\n- Step 3: This value lies in the range $$0° < x < 180°$$, so it's valid. Both solutions are in range: $$x = \\frac{\\alpha}{2}$$ is in the first half of the first wave, and $$x = 90° - \\frac{\\alpha}{2}$$ is in the second half.", "source": "GLM 5.1 ③", "_id": "glm_3_46"}, {"question": "For the read-the-question checklist, explain why checking \"what is being asked: a coordinate (pair) or a value? An angle or its sine?\" matters with an example from this paper. (2 steps)", "answer": "- Step 1: In Q2, part (b) asks for \"the value of x\" — the angle itself, not sin x. A student who found sin x = 0.6827 and left that as their answer would lose marks because they answered the wrong thing.\n- Step 2: Similarly, if a question asks for \"coordinates of the maximum\" and you give just the x-coordinate, or ask for the equation of the asymptote and you give its y-intercept only, you haven't answered what's being asked. Always match your answer format to the exact question wording.\n\n**Takeaway:** The question asks for a specific form — give exactly that. \"Value of x\" → angle measure; \"find sin x\" → the sine value; \"coordinates\" → (x, y) pair.", "source": "MiniMax ①", "_id": "minimax_1_40"}, {"question": "When you spot the pattern \"answer must be rational, but my calculation gives an irrational number,\" what's the diagnostic move? (2 steps)", "answer": "- Step 1: Re-check the surd simplification at every step. A common issue is failing to simplify $$\\sqrt{12} = 2\\sqrt{3}$$ or $$\\sqrt{48} = 4\\sqrt{3}$$, which causes the surd part of the answer to fail to cancel as the question intended.\n- Step 2: Also check for sign errors and dropped factors. Exam problems are usually designed so surds cancel out and rational answers emerge cleanly — if they don't, suspect arithmetic, not the question.", "source": "Opus 4.7 ②", "_id": "opus_2_51"}, {"question": "Why does a correct answer reached through invalid working score zero marks, as happened in Q7(a)? What principle is the exam enforcing? (2 steps)", "answer": "- Step 1: The mark scheme awards marks for the method (M marks) and then the accuracy (A marks) that depends on that method. If the method is wrong, the M marks are lost, and the dependent A marks (dM, A) are also lost because they require the method as a prerequisite.\n- Step 2: The principle being enforced is: mathematics is about valid reasoning, not lucky guesses. A correct final answer from broken working shows the result was either memorized or coincidental — it does not demonstrate understanding. The exam rewards the *process*, not just the *destination*.", "source": "GLM 5.1 ③", "_id": "glm_3_17"}, {"question": "When integrating a term like $ x^n $, what is the rule for handling the power and coefficient? Contrast this with differentiation. (3 steps)", "answer": "- Step 1: **Integration**: Add 1 to the power, then divide by the new power.  \n  Example: $ \\int x^n dx = \\frac{x^{n+1}}{n+1} + C $ (for $ n \\neq -1 $).  \n- Step 2: **Differentiation**: Multiply by the original power, then subtract 1 from the power.  \n  Example: $ \\frac{d}{dx} x^n = n x^{n-1} $.  \n- Step 3: **Key contrast**: Integration increases the power (e.g., $ x^2 \\to x^3 $), while differentiation reduces it (e.g., $ x^3 \\to x^2 $). Sign errors often arise in negative/fractional powers (e.g., $ x^{-2} \\to -x^{-1} $ for integration, not $ x^{-1} $).  \n\n**Takeaway**: Always verify the direction of the operation (integrate vs differentiate) before manipulating powers.", "source": "Qwen 3 ①", "_id": "qwen_1_0"}, {"question": "Why does $$\\sin(180° - \\alpha) = \\sin \\alpha$$ but $$\\cos(180° - \\alpha) = -\\cos \\alpha$$? Give the quadrant picture. (2 steps)", "answer": "- Step 1: Angle $$180° - \\alpha$$ is in the second quadrant. In the second quadrant, sine is positive (the vertical/opposite side is above the $$x$$-axis) but cosine is negative (the horizontal/adjacent side is to the left of the $$y$$-axis).\n- Step 2: So $$\\sin(180° - \\alpha) = +\\sin \\alpha$$ (same magnitude, same sign) while $$\\cos(180° - \\alpha) = -\\cos \\alpha$$ (same magnitude, opposite sign). The reference angle is the same; only the signs differ by quadrant.", "source": "GLM 5.1 ③", "_id": "glm_3_31"}, {"question": "Integrate $$2x^{-1/2}$$. Walk through the fractional power arithmetic and explain why the coefficient doubles. (3 steps)", "answer": "- Step 1: Add 1 to the power: $$-\\frac{1}{2} + 1 = +\\frac{1}{2}$$. So the integrated power is $$x^{1/2}$$.\n- Step 2: Divide by the new power: $$2 \\div \\frac{1}{2} = 2 \\times 2 = 4$$. Dividing by a half is the same as multiplying by 2.\n- Step 3: Result: $$4x^{1/2} = 4\\sqrt{x} + c$$. The coefficient doubled because dividing by $$\\frac{1}{2}$$ is multiplication by 2. This is the \"missing power\" that cost marks — the fractional arithmetic must be done explicitly, not guessed.", "source": "GLM 5.1 ③", "_id": "glm_3_2"}, {"question": "Why is it essential to express all bases to a common prime base when simplifying complex index expressions like $$\\frac{9^{2x+1} \\cdot 27^{3x-3}}{81^{2x-a}}$$? (2 steps)", "answer": "- Step 1: Bases like 9, 27, and 81 are not independent; they are all powers of the prime base 3 ($$9=3^2$$, $$27=3^3$$, $$81=3^4$$). The laws of indices (adding powers on multiplication, subtracting on division) *only* apply when the bases are identical.\n- Step 2: By converting everything to base 3, the expression becomes a single base raised to a giant combination of exponents: $$3^{2(2x+1)} \\cdot 3^{3(3x-3)} / 3^{4(2x-a)}$$. This collapses the entire fraction into a single term $$3^{\\text{algebraic expression}}$$, allowing you to simplify the algebra in the exponent easily.\n\nTakeaway: Different bases hide the true exponent relationships; converting to a common base unlocks the index laws.", "source": "GLM 5.1 ②", "_id": "glm_2_19"}, {"question": "State the three key sine symmetry identities for an angle $$\\alpha$$ with $$0 < \\alpha < 90°$$, and explain each visually using the sine wave.", "answer": "The three identities and their visual meanings:\n+ $$\\sin(180° - \\alpha) = \\sin \\alpha$$ — the sine wave is symmetric about $$x = 90°$$ in the first/second quadrants; an angle and its supplement have equal sine values (both positive).\n+ $$\\sin(-\\alpha) = -\\sin \\alpha$$ — sine is an odd function; the wave below the $$x$$-axis on the left mirrors the wave above on the right with opposite sign.\n+ $$\\sin(180° + \\alpha) = -\\sin \\alpha$$ — going past $$180°$$ moves into the third quadrant where sine is negative; the magnitude matches $$\\sin \\alpha$$ but the sign flips.\n\nThese three identities together describe how sine behaves in every quadrant.", "source": "Opus 4.7 ②", "_id": "opus_2_17"}, {"question": "What is the one-word difference between the integration rule and the differentiation rule for powers, and what visual image can you use to never confuse them? (2 steps)", "answer": "- Step 1: Integration: \"add 1 to the power, divide by the new power.\" Differentiation: \"multiply by the power, subtract 1 from the power.\" The key words are **add** vs. **subtract** and **divide** vs. **multiply**.\n- Step 2: Visual image: think of integration as building **up** (power rises, you grow the expression) and differentiation as stripping **down** (power falls, you reduce the expression). On a graph, integration accumulates area (building up); differentiation finds the steepness (a single, stripped-down value at each point).\n\nBefore every calculus question, pause and ask: \"Am I building up (integrate) or stripping down (differentiate)?\"", "source": "GLM 5.1 ③", "_id": "glm_3_3"}, {"question": "A student writes $$\\int 6x^2 \\, dx = 2x^3 + c$$ and $$\\frac{d}{dx}[2x^3] = 6x^2$$. How does the second line verify the first, and what is this checking strategy called? (2 steps)", "answer": "- Step 1: Differentiating your integration answer should return the original integrand. Since $$\\frac{d}{dx}[2x^3] = 6x^2$$, which is exactly what we started with, the integration is confirmed correct.\n- Step 2: This is the **verification by differentiation** strategy. It's a powerful self-check: after every integration, quickly differentiate your answer mentally. If it doesn't match the original, you've made an error (wrong power, wrong coefficient, wrong sign). This habit would have caught the Q1 error immediately.", "source": "GLM 5.1 ③", "_id": "glm_3_39"}, {"question": "Why does y = sin 2x have its first x-intercept at (180°, 0) rather than (360°, 0) when considering the domain 0° < x < 360°?", "answer": "- Step 1: sin 2x = 0 when 2x = 0°, 180°, 360°, 540°, 720°, ... (general solution: sin θ = 0 when θ = n × 180°)\n- Step 2: Dividing by 2: x = 0°, 90°, 180°, 270°, 360°, ...\n+ So in the domain 0° < x < 360°, the x-intercepts occur at x = 90°, 180°, 270° (excluding 0° and 360° as endpoints).\n+ The student who drew only one wave likely put intercepts at 0° and 360° (the sin x pattern), missing the intermediate intercepts at 90° and 270°.\n\n**Takeaway:** For sin 2x, intercepts at multiples of 90°, not multiples of 180°.", "source": "MiniMax ②", "_id": "minimax_2_28"}, {"question": "What is the rule for the transformation $$y = f(x - a)$$, and how does it affect vertical vs horizontal asymptotes? (2 steps)", "answer": "- Step 1: $$y = f(x - a)$$ shifts the entire curve *right* by $$a$$ units (left if $$a < 0$$). A point $$(p, q)$$ maps to $$(p+a, q)$$.\n- Step 2: A *vertical* asymptote $$x = c$$ moves to $$x = c + a$$ (shifts with the curve), but a *horizontal* asymptote $$y = k$$ is unchanged, since horizontal translation doesn't change heights.\n\nAgain: a transformation moves features only in its own direction.", "source": "Opus 4.7 ①", "_id": "opus_1_14"}, {"question": "What are the three pieces of information you must check every time you finish an exam question, before moving on?", "answer": "- Step 1: (1) Precision: have you rounded to exactly the requested dp/sf, or left exact/surd form as required?\n- Step 2: (2) Form: is your answer in the exact format requested (e.g., y = mx + c, a + b√5, coordinates as a pair, +c for indefinite integrals)?\n- Step 3: (3) Case check: if there were multiple solutions (acute/obtuse, positive/negative root), have you selected the correct one based on given conditions?\n+ The most common errors at the finish line are: wrong precision, wrong algebraic form, or selecting the wrong branch.\n\n**Takeaway:** Re-read the question right before writing your final answer — check dp/sf, form, and case.", "source": "MiniMax ②", "_id": "minimax_2_24"}, {"question": "What does the question phrase \"in simplest form\" demand, and what are the typical features marked? (3 steps)", "answer": "- Step 1: \"In simplest form\" requires:\n+ All fractions reduced to lowest terms (e.g. $$\\frac{10}{6} \\to \\frac{5}{3}$$).\n+ Negative powers rewritten as positive (e.g. $$3x^{-1} \\to \\frac{3}{x}$$, unless context favours powers).\n+ Surds simplified (e.g. $$\\sqrt{12} \\to 2\\sqrt{3}$$).\n+ Like terms combined and the constant $$+c$$ included for indefinite integrals.\n- Step 2: Format: present the final answer on a single line, with terms ordered cleanly (often descending in power, or grouped logically).\n- Step 3: The A1 mark specifically demands \"fully correct and simplified\" — leaving an unsimplified answer (like $$\\frac{10x^6}{6}$$ instead of $$\\frac{5}{3}x^6$$) loses the accuracy mark even if the underlying integration was right.", "source": "Opus 4.7 ②", "_id": "opus_2_49"}, {"question": "Why does the integral of $ -3x^{-2} $ give $ +3x^{-1} $ instead of $ -3x^0 $? (2 steps)", "answer": "- Step 1: Apply the integration rule: Add 1 to the power and divide by the new power.  \n  $-3x^{-2} \\to -3 \\cdot \\frac{x^{-1}}{-1} = 3x^{-1}$.  \n- Step 2: The negative power inverts the sign during division:  \n  Dividing by $-1$ flips $-3$ to $+3$. This is why $ \\int -3x^{-2} dx = 3x^{-1} + C $.  \n\n**Takeaway**: Negative exponents amplify sign sensitivity during integration.", "source": "Qwen 3 ①", "_id": "qwen_1_1"}, {"question": "If $$\\sin x = 0.6827$$ and $$x$$ is an angle in a triangle, there are two possible values of $$x$$ between 0° and 180°. Explain geometrically why, and state both values. (3 steps)", "answer": "- Step 1: The sine function is symmetric about 90° in the range 0° to 180°. For any value $$\\sin \\alpha = k$$ (where $$0 < k < 1$$), there is an acute angle $$\\alpha$$ and an obtuse angle $$180° - \\alpha$$ that both give the same sine value.\n- Step 2: This is the identity $$\\sin(180° - \\alpha) = \\sin \\alpha$$. On the unit circle, both angles have the same y-coordinate (height), hence the same sine.\n- Step 3: With $$\\sin x = 0.6827$$: the acute solution is $$x = \\sin^{-1}(0.6827) = 43.05°$$, and the obtuse solution is $$x = 180° - 43.05° = 136.95°$$.\n\nThis ambiguity is why triangle problems often include extra information (like \"AB is the longest side\") to tell you which angle to choose.", "source": "GLM 5.1 ①", "_id": "glm_1_9"}, {"question": "Given $$\\sin \\alpha = p$$ where $$0 < \\alpha < 90°$$, express $$\\sin(\\alpha - 180°)$$ in terms of $$p$$. Walk through the symmetry step by step. (3 steps)", "answer": "- Step 1: Rewrite $$\\alpha - 180°$$ as $$-(180° - \\alpha)$$. This pulls out the negative sign so we can use the odd-function identity.\n- Step 2: Apply $$\\sin(-\\theta) = -\\sin \\theta$$: $$\\sin(-(180° - \\alpha)) = -\\sin(180° - \\alpha)$$.\n- Step 3: Apply $$\\sin(180° - \\alpha) = \\sin \\alpha = p$$: so $$-\\sin(180° - \\alpha) = -p$$. The answer is $$-p$$.", "source": "GLM 5.1 ③", "_id": "glm_3_13"}, {"question": "Why does the equation $$\\sin 2x = p$$ have *more* solutions on $$0 < x < 180^\\circ$$ than $$\\sin x = p$$ does on the same interval?", "answer": "Because $$y = \\sin 2x$$ has period $$180^\\circ$$ — it completes a full cycle on the interval $$(0, 180^\\circ)$$, so a horizontal line $$y = p$$ (for $$0 < p < 1$$) intersects it twice in this range. By contrast, $$y = \\sin x$$ has period $$360^\\circ$$ and completes only half a cycle on $$(0, 180^\\circ)$$, but it's also symmetric about $$90^\\circ$$ in this half-cycle, so it also crosses $$y = p$$ twice — *but* those two solutions lie on either side of $$90^\\circ$$. The key insight is that $$\\sin 2x$$ fits *two complete waves* in the same span where $$\\sin x$$ fits one wave, doubling the opportunities to intersect any non-zero horizontal line in the relevant ranges.", "source": "Opus 4.7 ①", "_id": "opus_1_26"}, {"question": "Integrate $$\\int(6x^2 + \\frac{5}{x^3}) \\, dx$$, simplifying fully with $$+ c$$. Identify which term requires careful sign handling. (2 steps)", "answer": "- Step 1: Rewrite $$\\frac{5}{x^3} = 5x^{-3}$$. Then integrate term by term:\n+ $$\\int 6x^2 \\, dx = \\frac{6x^3}{3} = 2x^3$$\n+ $$\\int 5x^{-3} \\, dx = 5 \\cdot \\frac{x^{-2}}{-2} = -\\frac{5}{2}x^{-2} = -\\frac{5}{2x^2}$$\n- Step 2: The second term requires careful sign handling: dividing by $$-2$$ flips the sign of the coefficient from $$+5$$ to $$-\\frac{5}{2}$$. Final answer: $$2x^3 - \\frac{5}{2x^2} + c$$.", "source": "GLM 5.1 ①", "_id": "glm_1_31"}, {"question": "What's the geometric meaning of $$\\sin(180° + \\alpha) = -\\sin\\alpha$$? (3 steps)", "answer": "- Step 1: Adding $$180°$$ to an angle $$\\alpha$$ rotates the corresponding point on the unit circle through half a turn — the point lands diametrically opposite.\n- Step 2: A diametric opposite point has both coordinates negated: $$(\\cos\\alpha, \\sin\\alpha) \\to (-\\cos\\alpha, -\\sin\\alpha)$$. The $$y$$-coordinate (which is sine) is therefore $$-\\sin\\alpha$$.\n- Step 3: Hence $$\\sin(180° + \\alpha) = -\\sin\\alpha$$ and $$\\cos(180° + \\alpha) = -\\cos\\alpha$$. The intuition: half-turn rotation flips both coordinates, which corresponds to negation of both sine and cosine.", "source": "Opus 4.7 ②", "_id": "opus_2_42"}, {"question": "When solving a quartic disguised as a quadratic, what substitution is used and why is it valid? (3 steps)", "answer": "- Step 1: A quartic of the form $$2x^4 - 15x^2 - 50 = 0$$ contains only even powers of $$x$$. Let $$u = x^2$$, so $$x^4 = u^2$$.\n- Step 2: The equation becomes $$2u^2 - 15u - 50 = 0$$ — a standard quadratic in $$u$$, which factorizes as $$(2u + 5)(u - 10) = 0$$, giving $$u = -\\tfrac{5}{2}$$ or $$u = 10$$.\n- Step 3: Substitute back. $$x^2 = u$$, so we need $$u \\ge 0$$. The root $$u = -\\tfrac{5}{2}$$ is rejected because a square cannot be negative; only $$u = 10$$ gives real $$x = \\pm\\sqrt{10}$$.\n\nThe substitution exploits the fact that the quartic is really a quadratic in disguise. The rejection step (with reason!) is part of the mark scheme.", "source": "Opus 4.7 ①", "_id": "opus_1_27"}, {"question": "Why does the discriminant test $$\\Delta = b^2 - 4ac < 0$$ imply \"no real roots,\" conceptually?", "answer": "The quadratic formula gives roots $$x = \\frac{-b \\pm \\sqrt{b^2 - 4ac}}{2a}$$. If $$b^2 - 4ac < 0$$, we need the square root of a negative number — which has no real value (only imaginary). So the formula produces no real numbers, meaning the parabola $$y = ax^2 + bx + c$$ never crosses the $$x$$-axis. Geometrically, the parabola sits entirely above (if $$a > 0$$) or below (if $$a < 0$$) the $$x$$-axis. Hence \"no real roots\" — and any factorization attempt of that quadratic will fail over the reals.", "source": "Opus 4.7 ①", "_id": "opus_1_56"}, {"question": "When sketching $$y = f(-x)$$, why does a horizontal asymptote (like $$y = k$$) remain completely unchanged, while a vertical asymptote (like $$x = a$$) moves? (3 steps)", "answer": "- Step 1: A horizontal asymptote $$y = k$$ describes the $$y$$-value the curve approaches as $$x$$ goes to infinity. The transformation $$f(-x)$$ reflects the graph across the $$y$$-axis, meaning you replace $$x$$ with $$-x$$. This changes the *direction* you travel to infinity (left instead of right), but the $$y$$-value you arrive at remains $$k$$.\n- Step 2: A vertical asymptote $$x = a$$ occurs where the function is undefined (e.g., division by zero at $$x=a$$). In $$f(-x)$$, the function is now undefined when the *input* is $$-a$$, because $$f(-(-a)) = f(a)$$ causes the same division by zero.\n- Step 3: Therefore, the vertical asymptote moves from $$x = a$$ to $$x = -a$$ (it reflects across the $$y$$-axis), but the horizontal asymptote stays at $$y = k$$ because the output values at the extremes don't change, just the direction you approach them from.\n\nTakeaway: Horizontal reflections ($$f(-x)$$) only move features tied to the $$x$$-coordinate (vertical asymptotes, $$x$$-intercepts); $$y$$-values at infinity are unaffected.", "source": "GLM 5.1 ②", "_id": "glm_2_6"}, {"question": "Synthesis: explain why finding \"$$x$$-coordinates of points where $$\\sin 2x = p$$ in $$0 < x < 180^\\circ$$\" requires *both* the period of $$\\sin 2x$$ and the sine symmetry identity. (3 steps)", "answer": "- Step 1: The period of $$\\sin 2x$$ is $$180^\\circ$$, meaning the curve completes one full cycle on $$(0, 180^\\circ)$$. So a horizontal line $$y = p$$ (with $$0 < p < 1$$) crosses it *twice* in this interval.\n- Step 2: The supplementary-angle identity $$\\sin(180^\\circ - \\theta) = \\sin \\theta$$ tells us that if $$2x = \\alpha$$ is one solution, then $$2x = 180^\\circ - \\alpha$$ is the other.\n- Step 3: Dividing by 2: $$x = \\tfrac{\\alpha}{2}$$ and $$x = 90^\\circ - \\tfrac{\\alpha}{2}$$. Both ideas (period halving + sine symmetry) are needed: the period tells you how many solutions there are, and the symmetry tells you what they look like.\n\nThis problem couples a *graph transformation* concept (compression) with a *trig identity* concept (symmetry) — the synthesis is the lesson.", "source": "Opus 4.7 ①", "_id": "opus_1_47"}, {"question": "Using the sine curve, explain why $$\\sin(-\\alpha) = -\\sin \\alpha$$ and why $$\\sin(180° + \\alpha) = -\\sin \\alpha$$. What visual feature of the graph produces both identities? (3 steps)", "answer": "- Step 1: The sine curve has **rotational symmetry** (point symmetry) about the origin. If you rotate the curve 180° around the origin, it maps onto itself. This means $$\\sin(-\\alpha) = -\\sin \\alpha$$: going left from the origin gives the negative of going right by the same amount.\n- Step 2: The sine curve also has rotational symmetry about the point $$(180°, 0)$$. Rotating around this point, the value at $$\\alpha$$ (in the first quadrant) maps to the value at $$180° + \\alpha$$ (in the third quadrant), with sign reversed. So $$\\sin(180° + \\alpha) = -\\sin \\alpha$$.\n- Step 3: Both identities come from the same underlying structure: sine is an *odd* function (symmetric through the origin), and its half-period shift flips the sign. In the range 0°–360°, the pattern is: first quadrant positive, second quadrant positive (by the $$180° - \\alpha$$ identity), third quadrant negative (by the $$180° + \\alpha$$ identity), fourth quadrant negative (by the $$-\\alpha$$ identity).", "source": "GLM 5.1 ①", "_id": "glm_1_17"}, {"question": "Given a cubic equation with one obvious linear factor, what's the strategy for finding the remaining roots and deciding if they're real? (3 steps)", "answer": "- Step 1: Once a linear factor $$(u - r)$$ is identified, divide the cubic by it (long division or inspection) to get a quadratic factor $$au^2 + bu + c$$.\n- Step 2: Check the discriminant of the quadratic: $$\\Delta = b^2 - 4ac$$. If $$\\Delta < 0$$, the quadratic has no real roots, so the cubic has only the one real root from the linear factor.\n- Step 3: For example, $$u^3 + 7u - 24 = (u - 2)(u^2 + 2u + 12) = 0$$. The discriminant of $$u^2 + 2u + 12$$ is $$4 - 48 = -44 < 0$$, so reject the quadratic — only $$u = 2$$ is real.\n\nThe pattern: factor, then *justify* rejection of any non-real branch using the discriminant.", "source": "Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "In graph transformations, why does y = f(ax) with a > 1 compress horizontally while y = f(x/a) with a > 1 stretch horizontally? Explain intuitively. (1 step)", "answer": "- Step 1: Think of it as \"input speed.\" In y = sin(ax), the input x is \"sped up\" by factor a — we reach the same output values in 1/a of the x-distance, so the graph compresses. In y = sin(x/a), the input is \"slowed down\" — it takes more x to produce the same output, so the graph stretches. The a inside divides the x, creating compression; the a outside divides the function, creating stretch.\n\n**Takeaway:** a inside (f(ax)): compress by factor 1/a. a outside (af(x)): stretch vertically by factor a. It's backwards from what many students expect — the location of the coefficient matters.", "source": "MiniMax ①", "_id": "minimax_1_39"}, {"question": "Explain why integrating $$x^n$$ requires adding 1 to the power and dividing by the new power, and why $$-3x^{-2}$$ integrates to $$\\frac{3}{x}$$. (3 steps)", "answer": "- Step 1: The fundamental idea is that differentiation and integration are inverse operations. When we differentiate $$x^n$$, we get $$nx^{n-1}$$. To reverse this, we need a function whose derivative gives us back the original power.\n- Step 2: If we integrate $$x^n$$, we want a function $$F(x)$$ such that $$F'(x) = x^n$$. Let $$F(x) = x^{n+1}$$. Differentiating: $$F'(x) = (n+1)x^n$$, so we need to divide by $$(n+1)$$ to get exactly $$x^n$$. Thus $$\\int x^n dx = \\frac{x^{n+1}}{n+1} + c$$.\n+ The \"add 1 to power, divide by new power\" rule comes directly from this reasoning\n- Step 3: For $$-3x^{-2}$$, we have $$n = -2$$. Adding 1: $$-2 + 1 = -1$$. Dividing by $$-1$$ gives $$-3 \\div (-1) = +3$$. The power becomes $$-1$$, so we get $$3x^{-1} = \\frac{3}{x}$$.\n+ The sign flips because dividing by a negative number changes the sign — this is a common source of error\n\n**Takeaway:** Integration raises the power; differentiation lowers it. Always check the sign when the original power is negative.", "source": "MiniMax ①", "_id": "minimax_1_0"}, {"question": "Why must we always add a constant of integration \"$$+c$$\" when finding an indefinite integral, and what happens visually if we forget it? (2 steps)", "answer": "- Step 1: Differentiation destroys vertical shift information. If you differentiate $$x^2$$, $$x^2 + 5$$, and $$x^2 - 10$$, they all yield $$2x$$. Therefore, when we reverse the process (integrate $$2x$$), we cannot know which original vertical shift existed.\n- Step 2: Visually, forgetting $$+c$$ means you only draw one specific curve (like $$x^2$$ passing through the origin). Adding $$+c$$ acknowledges that the true antiderivative is a whole *family* of curves — identical in shape but shifted vertically up or down by $$c$$ units. Forgetting it means you are missing infinitely many valid solutions.\n\nTakeaway: $$+c$$ represents the lost vertical translation information destroyed by differentiation.", "source": "GLM 5.1 ②", "_id": "glm_2_5"}, {"question": "Why does $$\\sin x = \\sin \\alpha$$ have exactly two solutions in $$0^\\circ < x < 360^\\circ$$, and what are they (in terms of $$\\alpha$$, for $$0 < \\alpha < 90^\\circ$$)? (3 steps)", "answer": "- Step 1: The sine function on $$[0^\\circ, 360^\\circ]$$ rises from $$0$$ to $$1$$ on $$[0^\\circ, 90^\\circ]$$, falls from $$1$$ to $$0$$ on $$[90^\\circ, 180^\\circ]$$, falls to $$-1$$ on $$[180^\\circ, 270^\\circ]$$, and returns to $$0$$ on $$[270^\\circ, 360^\\circ]$$.\n- Step 2: A positive value $$\\sin \\alpha$$ (with $$0 < \\alpha < 90^\\circ$$) is achieved only in the first half of the interval, where sine is positive. The curve crosses height $$\\sin \\alpha$$ once going up (at $$x = \\alpha$$) and once coming down (at $$x = 180^\\circ - \\alpha$$).\n- Step 3: So the two solutions are $$x = \\alpha$$ and $$x = 180^\\circ - \\alpha$$.\n\nThis is the geometric origin of the identity $$\\sin(180^\\circ - \\alpha) = \\sin \\alpha$$.", "source": "Opus 4.7 ①", "_id": "opus_1_38"}, {"question": "What is the correct method to find $ A $ from $ f''(x) = 0 $ in Q7(a)? Highlight the critical steps. (3 steps)", "answer": "- Step 1: Rewrite $ f'(x) = 2x^{-1/2} + Ax^{-2} + 3 $ as a sum of terms with explicit powers.  \n- Step 2: Differentiate term-by-term:  \n  $ f''(x) = -x^{-3/2} - 2A x^{-3} $.  \n- Step 3: Substitute $ x = 4 $ into $ f''(x) $:  \n  $ -4^{-3/2} - 2A \\cdot 4^{-3} = 0 \\Rightarrow -\\frac{1}{8} - \\frac{A}{32} = 0 \\Rightarrow A = -4 $.  \n\n**Critical error to avoid**: Invalid differentiation steps (e.g., incorrect power reduction) nullify the answer.", "source": "Qwen 3 ①", "_id": "qwen_1_7"}, {"question": "When using the sine rule to find an angle, why does the \"ambiguous case\" exist, and how is it related to the unit circle? (2 steps)", "answer": "- Step 1: The sine rule can give you $$\\sin \\theta = k$$ (where $$0 < k < 1$$). To find $$\\theta$$, you take $$\\sin^{-1}(k)$$, which gives the principal acute angle. However, on the unit circle, sine corresponds to the $$y$$-coordinate.\n- Step 2: In the range $$0^\\circ$$ to $$180^\\circ$$, there are *two* points on the unit circle with the same positive $$y$$-coordinate: one in the first quadrant ($$\\theta$$) and one in the second quadrant ($$180^\\circ - \\theta$$). Both angles are mathematically valid solutions to $$\\sin \\theta = k$$, creating the ambiguous case.\n\nTakeaway: A positive sine value always corresponds to two possible angles in a triangle: an acute angle and its obtuse supplement.", "source": "GLM 5.1 ②", "_id": "glm_2_9"}, {"question": "When integrating $$x^n$$, what two operations do you perform on the power, and in what order? How does this differ from differentiating $$x^n$$? (2 steps)", "answer": "- Step 1: To integrate $$x^n$$: add 1 to the power first (getting $$n+1$$), then divide by that new power. So $$\\int x^n \\, dx = \\frac{x^{n+1}}{n+1}$$. The power goes *up*, and you divide.\n- Step 2: To differentiate $$x^n$$: multiply by the current power first, then subtract 1 from the power. So $$\\frac{d}{dx}x^n = nx^{n-1}$$. The power goes *down*, and you multiply.\n\nThe critical distinction: integration raises the power and divides; differentiation lowers the power and multiplies. On the exam, writing the direction wrong (as happened on Q1 — differentiating instead of integrating) turns every term incorrect — a full method error costing all accuracy marks.", "source": "GLM 5.1 ①", "_id": "glm_1_0"}, {"question": "In integration problems with fractional powers like ∫3/√x dx, what is the correct way to handle the power and coefficient to avoid the \"missing power\" error?", "answer": "- Step 1: Rewrite with fractional exponents: $\\frac{3}{\\sqrt{x}} = 3x^{-1/2}$. The power is −1/2.\n- Step 2: Integrate by adding 1 to the power: −1/2 + 1 = 1/2. Divide by this new power: 3 ÷ (1/2) = 3 × 2 = 6.\n+ So ∫3x⁻¹/² dx = 6x¹/² + c = 6√x + c.\n+ The \"missing power\" error occurs when students do 3 × x¹/² = 3√x, forgetting the division by the new power.\n\n**Takeaway:** Fractional powers follow the same rule: add 1, then divide. The coefficient gets multiplied by the reciprocal of the new power.", "source": "MiniMax ②", "_id": "minimax_2_18"}, {"question": "Evaluate $$4^{-3/2}$$ and $$4^{-3}$$ using the rules of indices, without a calculator. (3 steps)", "answer": "- Step 1: $$4^{-3/2}$$ means \"$$\\tfrac{1}{4^{3/2}}$$.\" The exponent $$\\tfrac{3}{2}$$ means \"cube of the square root\": $$4^{3/2} = (\\sqrt{4})^3 = 2^3 = 8$$. So $$4^{-3/2} = \\tfrac{1}{8}$$.\n- Step 2: $$4^{-3} = \\tfrac{1}{4^3} = \\tfrac{1}{64}$$.\n- Step 3: These two values appear naturally when substituting $$x = 4$$ into expressions involving $$x^{-1/2}, x^{-2}, x^{-3/2}, x^{-3}$$ — being fluent saves time and prevents calculator-dependence on the \"show all stages\" parts.\n\nThe general pattern: $$a^{m/n} = (\\sqrt[n]{a})^m$$, and negative exponents reciprocate.", "source": "Opus 4.7 ①", "_id": "opus_1_18"}, {"question": "Why must indefinite integrals always include the constant $$+c$$, even if the question doesn't explicitly remind you? (2 steps)", "answer": "- Step 1: Differentiation destroys constants — any constant $$c$$ has derivative 0. So infinitely many functions share the same derivative, differing only by a constant.\n- Step 2: When we \"undo\" differentiation via integration, we cannot recover which specific constant was lost, so we represent the family of all possible anti-derivatives by writing $$+c$$. Omitting it loses the final accuracy mark, because the answer is no longer \"fully correct.\"", "source": "Opus 4.7 ②", "_id": "opus_2_3"}, {"question": "Integrate $$2x^{-1/2}$$. Show how dividing by the new power $$\\frac{1}{2}$$ is equivalent to multiplying by 2, and state the final result. (3 steps)", "answer": "- Step 1: Add 1 to the power: $$-\\frac{1}{2} + 1 = +\\frac{1}{2}$$. So we get $$2 \\cdot \\frac{x^{1/2}}{1/2}$$.\n- Step 2: Dividing by $$\\frac{1}{2}$$ is the same as multiplying by 2: $$2 \\times \\frac{x^{1/2}}{1/2} = 2 \\times 2 \\times x^{1/2} = 4x^{1/2}$$.\n- Step 3: In surd notation: $$4x^{1/2} = 4\\sqrt{x}$$.\n\nThe general principle: when integrating a term with a fractional power, dividing by a fraction means multiplying by its reciprocal. So $$\\div \\frac{1}{2} = \\times 2$$, $$\\div \\frac{1}{3} = \\times 3$$. This is exactly where the \"missing power\" error in Q7(b) occurred — the $$2x^{-1/2}$$ term must become $$4x^{1/2}$$, not $$2x^{1/2}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_2"}, {"question": "Using the sine rule, you find $$\\sin x = 0.6827$$. The calculator gives $$\\sin^{-1}(0.6827) \\approx 43.05°$$. But the answer should be $$136.95°$$. Why are there two solutions, and how do you know which one to pick? (3 steps)", "answer": "- Step 1: The sine function is positive in both the first quadrant (0°–90°) and the second quadrant (90°–180°). So if $$\\sin x = k > 0$$, there are two candidates: $$x = \\sin^{-1}(k)$$ (acute) and $$x = 180° - \\sin^{-1}(k)$$ (obtuse).\n- Step 2: Here, the acute candidate is $$43.05°$$ and the obtuse candidate is $$180° - 43.05° = 136.95°$$. Both give the same sine value because of the identity $$\\sin(180° - \\alpha) = \\sin \\alpha$$.\n- Step 3: The question states that $$AB$$ is the longest side, so angle $$C$$ (opposite $$AB$$) is the largest angle — it must be obtuse. Therefore the answer is $$136.95°$$, not $$43.05°$$. The question's geometric constraint resolves the ambiguity; without it, both would be valid.", "source": "GLM 5.1 ③", "_id": "glm_3_7"}, {"question": "Conceptual: why does the transformation rule \"$$f(x - a)$$ shifts right by $$a$$\" (rather than left by $$a$$, as the minus sign might suggest)? (2 steps)", "answer": "- Step 1: Consider a point on the original graph: $$y = f(x)$$ is at height $$f(x_0)$$ when input is $$x_0$$. For the new graph $$y = f(x - a)$$ to have the same height $$f(x_0)$$, we need $$x - a = x_0$$, i.e., $$x = x_0 + a$$.\n- Step 2: So the new graph reaches the height $$f(x_0)$$ at $$x = x_0 + a$$ — that is, $$a$$ units to the *right* of where the original did. The minus sign inside the function \"compensates\" by shifting the input forward.\n\nThe mantra: replace $$x$$ with $$x - a$$ ⇒ shift right by $$a$$ (positive $$a$$). It's counterintuitive but consistent with the algebra.", "source": "Opus 4.7 ①", "_id": "opus_1_57"}, {"question": "State the three key sine symmetry identities and what makes each one work geometrically. (3 steps)", "answer": "- Step 1: $$\\sin(180^\\circ - \\alpha) = \\sin \\alpha$$. Geometrically: the sine curve is symmetric about $$x = 90^\\circ$$ on $$[0^\\circ, 180^\\circ]$$ — reflecting across the vertical line $$x = 90^\\circ$$ maps $$\\alpha$$ to $$180^\\circ - \\alpha$$ with the same height.\n- Step 2: $$\\sin(-\\alpha) = -\\sin \\alpha$$. Geometrically: the sine function is *odd* — its graph has point symmetry through the origin, so flipping the input's sign flips the output's sign.\n- Step 3: $$\\sin(180^\\circ + \\alpha) = -\\sin \\alpha$$. Geometrically: shifting by $$180^\\circ$$ on the unit circle puts you at the diametrically opposite point, where the $$y$$-coordinate is negated.\n\nThese three patterns cover most \"in terms of $$p$$\" trigonometry questions.", "source": "Opus 4.7 ①", "_id": "opus_1_21"}, {"question": "Conceptual synthesis: A student differentiates $$f'(x)$$ to get $$f''(x)$$, sets $$f''(4) = 0$$, solves for $$A$$, then integrates $$f'(x)$$ to find $$f(x)$$ with a boundary condition. Explain the logical chain: why must differentiation come before the integration in this problem? (3 steps)", "answer": "- Step 1: The problem gives $$f'(x)$$ with an unknown constant $$A$$. To find $$A$$, we need an equation involving $$A$$ — and the only information given is that $$f''(4) = 0$$.\n- Step 2: $$f''(x)$$ is the derivative of $$f'(x)$$, so we must differentiate first to express $$f''(x)$$ in terms of $$A$$ and $$x$$. Then setting $$f''(4) = 0$$ gives us the equation to solve for $$A$$.\n- Step 3: Only after $$A$$ is determined can we integrate $$f'(x)$$ (now fully known) to get $$f(x)$$. The logic is: differentiate to unlock $$A$$ → substitute $$A$$ back → integrate to find $$f(x)$$. Reversing the order would mean integrating with an unknown $$A$$, which leaves the answer in terms of $$A$$ — useless until $$A$$ is found.", "source": "GLM 5.1 ③", "_id": "glm_3_51"}, {"question": "In Q7(b), when substituting $$f(12) = 8\\sqrt{3}$$, the term $$4\\sqrt{12} = 8\\sqrt{3}$$ appeared on the left side and $$8\\sqrt{3}$$ on the right. They cancelled completely. Is this a coincidence, or is there a reason the question was designed this way? (2 steps)", "answer": "- Step 1: It is by design. The question setter chose $$f(12) = 8\\sqrt{3}$$ precisely because $$4\\sqrt{12} = 4 \\cdot 2\\sqrt{3} = 8\\sqrt{3}$$. This makes the surd terms cancel, leaving only rational numbers to solve for $$c$$. Without this cancellation, the constant $$c$$ would contain a surd, making the final answer messier.\n- Step 2: The lesson: when a boundary condition seems to produce a \"nice\" cancellation, trust it and simplify eagerly. Compute $$4\\sqrt{12}$$ as $$8\\sqrt{3}$$ before substituting — don't leave it as $$4\\sqrt{12}$$ and hope it works out. This is also a sanity check: if the surd terms don't cancel when the question seems designed for them to, re-check your integration.", "source": "GLM 5.1 ①", "_id": "glm_1_28"}, {"question": "Why is \"drawing the curve clearly asymptotic at both ends\" a marking criterion in a graph-sketching question? (3 steps)", "answer": "- Step 1: An asymptote is defined by the curve's behaviour as $$x \\to \\pm\\infty$$ (or as $$x$$ approaches a specific value). The marker needs visual evidence that you understand this limiting behaviour.\n- Step 2: If your sketch crosses the asymptote or fails to approach it (e.g. ends abruptly, curves back toward the axis), you've shown that you don't fully understand the asymptotic nature, and B-marks are lost.\n- Step 3: Best practice: extend the curve far enough on both sides that it visibly hugs the asymptote line, with the asymptote drawn as a dashed reference line. The shape near the asymptote is part of the evidence.", "source": "Opus 4.7 ②", "_id": "opus_2_50"}, {"question": "Why does the \"longest side\" condition in a triangle determine whether an angle is acute or obtuse, and how is this used to select between the two sine-rule solutions? (3 steps)", "answer": "- Step 1: In any triangle, the largest side lies opposite the largest angle (and vice versa). This is a fundamental geometric fact: bigger angle \"opens up\" to subtend a longer side.\n- Step 2: Since a triangle's angles sum to $$180^\\circ$$, at most one angle can exceed $$90^\\circ$$. So if there's an obtuse angle, it must be the largest — and therefore opposite the longest side.\n- Step 3: If the question tells you \"AB is the longest side,\" then angle $$C$$ (opposite $$AB$$) is the largest angle and, if the calculator's principal value is acute, the true answer must be its obtuse supplement $$180^\\circ - x_1$$.\n\nWithout this reasoning step written down, the supplement appears to come from nowhere and risks losing the method mark.", "source": "Opus 4.7 ①", "_id": "opus_1_7"}, {"question": "Why is \"a correct answer from invalid working scores zero\" sometimes called the most expensive lesson in A-level mathematics?", "answer": "Because the natural student instinct, after struggling through a problem, is to *box the answer* and feel done — especially if it matches a textbook value or feels right. But if the working contains genuine errors (wrong power rules, sign mistakes, missing steps), the examiner has no evidence of understanding. A four-mark question can become a zero-mark question on a \"correct\" answer. The fix is structural: write *every* line of valid working, even when you think you can skip steps. Time spent showing valid work pays back in marks, while time spent just to reach an answer faster forfeits the entire question.", "source": "Opus 4.7 ①", "_id": "opus_1_35"}, {"question": "Conceptual synthesis: Why does premature rounding in part (a) of a multi-part question damage part (b) even when the method in (b) is correct? (2 steps)", "answer": "- Step 1: Part (b) typically uses the answer from part (a) as an input. If part (a)'s answer is slightly off (e.g., 0.6830 instead of 0.6827), that error propagates into every subsequent calculation.\n- Step 2: The mark scheme often awards \"follow-through\" marks for correct method in (b) even with a carried-forward error — but the final accuracy mark in (b) is still wrong because the input was wrong. The Q2 example: $$136.93°$$ instead of $$136.95°$$ — the method was right, but the seed was bad. Carry full accuracy throughout; round only at the very end.", "source": "GLM 5.1 ③", "_id": "glm_3_52"}, {"question": "When integrating $$f'(x) = 2x^{-1/2} - 4x^{-2} + 3$$ term by term, what is each term's antiderivative? (3 steps)", "answer": "- Step 1: $$\\int 2x^{-1/2} dx$$: new power is $$\\tfrac{1}{2}$$, divide by it (i.e., multiply by 2): $$4x^{1/2} = 4\\sqrt{x}$$.\n- Step 2: $$\\int -4x^{-2} dx$$: new power is $$-1$$, divide: $$-4 \\cdot \\frac{x^{-1}}{-1} = +4x^{-1} = \\tfrac{4}{x}$$. (Sign flips!)\n- Step 3: $$\\int 3 \\, dx = 3x$$. Combined: $$f(x) = 4\\sqrt{x} + \\tfrac{4}{x} + 3x + c$$.\n\nThe two danger zones — fractional power (don't drop the 4) and negative power (sign flip) — are exactly the places where marks vanish.", "source": "Opus 4.7 ①", "_id": "opus_1_20"}, {"question": "After substituting $$u = \\sqrt{x}$$ to solve a polynomial, you factorise to get $$(u-2)(u^2 + 2u + 12) = 0$$. Why is the quadratic factor rejected, and what does its discriminant tell you about the graph of $$y = u^2 + 2u + 12$$? (2 steps)", "answer": "- Step 1: Calculate the discriminant of the quadratic factor $$u^2 + 2u + 12$$, which is $$b^2 - 4ac = (2)^2 - 4(1)(12) = 4 - 48 = -44$$. Because the discriminant is negative, there are no real roots for this quadratic.\n- Step 2: Graphically, a negative discriminant means the parabola $$y = u^2 + 2u + 12$$ never crosses the $$u$$-axis (the line $$y=0$$). Since it is a positive quadratic (opens upwards), it is always above the $$u$$-axis. Therefore, it never equals zero, and those roots do not exist in the real number system.\n\nTakeaway: A negative discriminant means the quadratic never touches the horizontal axis, so it can never equal zero — reject it.", "source": "GLM 5.1 ②", "_id": "glm_2_18"}, {"question": "In Q2(b), the student found x = 136.93° using the rounded value sin x = 0.6830, while the correct answer is 136.95° using sin x = 0.6827. What does this illustrate about follow-through marking?", "answer": "- Step 2: The student's error in part (a) (0.6830 instead of 0.6827) propagated into part (b), giving 136.93° instead of 136.95°. However, the mark scheme applied \"follow-through\" marking: since the method was correct and the error originated only from part (a)'s rounding, part (b) was not penalised again.\n- Step 2: This means: even if you lose a mark for accuracy in one part, you can still earn full marks for subsequent parts IF your method is correct and the error was \"carried forward\" from an earlier part.\n+ However, it also shows why accurate early work matters: if you round incorrectly early, you may lose multiple marks across interconnected parts.\n\n**Takeaway:** Follow-through can save you, but accurate work from the start avoids the problem entirely.", "source": "MiniMax ②", "_id": "minimax_2_27"}, {"question": "When solving ∫f'(x)dx to find f(x), and you use the given condition f(12) = 8√3 to find the constant of integration, what common algebraic error led to a lost mark in Q7(b)?", "answer": "- Step 1: The student had the correct integrated form f(x) = 4√x + 4/x + 3x + c, but when substituting x = 12, made an error with 4/12 = 1/3 (correct) but then incorrectly handled the constant term.\n- Step 2: The correct calculation:\n  + 4√12 = 4 × 2√3 = 8√3\n  + 4/12 = 1/3\n  + 3(12) = 36\n  + Sum: 8√3 + 1/3 + 36 = 8√3 + 109/3\n  + Setting equal to 8√3: c = −109/3\n+ The error was dropping the 1/3 or incorrectly adding terms, giving c = −84 instead of c = −109/3.\n\n**Takeaway:** When substituting, calculate each term carefully and keep fractional terms exact (1/3, not a decimal).", "source": "MiniMax ②", "_id": "minimax_2_15"}, {"question": "In Q10 from the original paper (not fully covered in the review), one must find the gradient of a normal to a curve. Explain the relationship between the gradient of the tangent and the gradient of the normal, and why their product is -1. (1 step)", "answer": "- Step 1: The normal is perpendicular to the tangent. For two lines with slopes m₁ and m₂ to be perpendicular, m₁ × m₂ = -1 (one is the negative reciprocal of the other). This comes from the angle between lines: if tan θ₁ and tan θ₂ are slopes, perpendicular means θ₂ = θ₁ + 90°, and tan(θ₁ + 90°) = -cot θ₁ = -1/tan θ₁. So m₂ = -1/m₁, hence m₁m₂ = -1.\n\n**Takeaway:** Normal gradient = -1/(tangent gradient). If tangent is m, normal is -1/m.", "source": "MiniMax ①", "_id": "minimax_1_37"}, {"question": "Without computing, state the precision required for each phrase and what it means: \"to 4 dp\", \"to 3 sf\", \"in exact form\", \"in surd form\".", "answer": "\"To 4 dp\" means 4 digits *after the decimal point* (e.g., $$0.6827$$). \"To 3 sf\" means 3 *significant figures* — counting from the first non-zero digit (e.g., $$0.683$$). \"In exact form\" means no decimal approximation — express the answer as a fraction, surd, or symbolic combination (e.g., $$\\tfrac{17}{3}$$, $$2\\sqrt{3}$$, $$\\pi/4$$). \"In surd form\" specifically requires the answer to include radicals like $$\\sqrt{n}$$ (e.g., $$2\\sqrt{3}$$, not $$3.4641$$). The question's phrasing dictates exactly what to give — substituting one for another loses the accuracy mark even if the numerical value is \"close.\"", "source": "Opus 4.7 ①", "_id": "opus_1_51"}, {"question": "When applying the power rule, what is the fundamental mechanical difference between differentiating $$ax^n$$ and integrating $$ax^n$$, and why are they opposite operations? (3 steps)", "answer": "- Step 1: The mechanical difference lies in what you do to the power $$n$$. To differentiate, you **multiply by the power** and **subtract 1** from it: $$\\frac{d}{dx}(ax^n) = anx^{n-1}$$. To integrate, you **add 1 to the power** and **divide by the new power**: $$\\int ax^n \\,dx = \\frac{ax^{n+1}}{n+1}$$.\n- Step 2: The reason they are opposite operations is the Fundamental Theorem of Calculus. Differentiation asks \"what is the gradient (rate of change) of the area accumulation?\", while integration asks \"what is the total area accumulated under this gradient curve?\".\n+ Differentiation strips a layer of the function's growth (reducing the power).\n+ Integration rebuilds that layer (increasing the power).\n- Step 3: Because they are inverses, integrating a derivative (or differentiating an integral) returns the original function (plus a constant). If you accidentally reduce the power while integrating, you are doing two differentiations in a row, which breaks the mathematical logic.\n\nTakeaway: Integration *raises* the power and *divides*; differentiation *lowers* the power and *multiplies* — they are inverse operations.", "source": "GLM 5.1 ②", "_id": "glm_2_0"}, {"question": "Why does the simplification $$4\\sqrt{12} = 8\\sqrt{3}$$ work, and why does spotting this matter when checking a calculus answer? (2 steps)", "answer": "- Step 1: $$\\sqrt{12} = \\sqrt{4 \\cdot 3} = \\sqrt{4} \\cdot \\sqrt{3} = 2\\sqrt{3}$$. So $$4\\sqrt{12} = 4 \\cdot 2\\sqrt{3} = 8\\sqrt{3}$$.\n- Step 2: When integrating to get $$f(x) = 4\\sqrt{x} + \\ldots$$ and the question gives a boundary condition like $$f(12) = 8\\sqrt{3}$$, the surd terms must cancel cleanly for you to find the constant. If they don't, that's a signal you've made a power-rule slip and need to recheck.\n\nSurd simplification is a *consistency check* — clean cancellation on both sides usually indicates correct integration.", "source": "Opus 4.7 ①", "_id": "opus_1_19"}, {"question": "You are solving $$\\sin(2x) = p$$ for $$0 < x < 180^\\circ$$. Why does this yield two solutions, whereas solving $$\\sin(x) = p$$ for $$0 < x < 180^\\circ$$ usually yields only one? (2 steps)", "answer": "- Step 1: The domain for $$x$$ is $$0 < x < 180^\\circ$$. Because the function is $$\\sin(2x)$$, the actual angle being evaluated by the sine function is $$2x$$. Multiply the domain by 2: the range for the inner angle $$2x$$ is $$0 < 2x < 360^\\circ$$.\n- Step 2: Within a full $$360^\\circ$$ cycle ($$0$$ to $$360^\\circ$$), a positive sine value $$p$$ occurs twice: once in the first quadrant (the principal angle) and once in the second quadrant (the supplementary angle). Since the inner angle $$2x$$ traverses a full circle, it hits both of these points, yielding two distinct values for $$2x$$, and thus two values for $$x$$.\n\nTakeaway: Always map the domain of $$x$$ to the domain of the *inner function* ($$2x$$, $$3x$$, etc.) to see how many full cycles and thus how many roots exist.", "source": "GLM 5.1 ②", "_id": "glm_2_15"}, {"question": "For y = f(x) - 2 (vertical translation down 2), state the new coordinates of the minimum at P(-1, 0) and maximum at Q(2/3, 2), and the new asymptote. Why does the shape stay the same? (2 steps)", "answer": "- Step 1: A vertical translation affects only y-coordinates: subtract 2 from every y-value. P(-1, 0) → P'(-1, -2), Q(2/3, 2) → Q'(2/3, 0). The asymptote y = 1 also shifts down: y = 1 → y = -1.\n- Step 2: The shape stays identical because we're only moving every point down — the relationship between points and the curve's curvature don't change. Only the vertical position shifts. This is why translation is the simplest transformation: the curve's shape is preserved, just repositioned.\n\n**Takeaway:** Vertical translation: y-coordinates change, x-coordinates stay the same, shape preserved. Horizontal asymptote moves with the translation.", "source": "MiniMax ①", "_id": "minimax_1_10"}, {"question": "For an indefinite integral like $$\\int (10x^5 + 6x^3 - \\frac{3}{x^2})dx$$, why must you include $+c$ and what constitutes \"simplest form\"?", "answer": "- Step 1: An indefinite integral represents a family of functions that differ by a constant. Since differentiation of a constant gives 0, we must add $+c$ (the constant of integration) to represent all possible antiderivatives.\n- Step 2: \"Simplest form\" means: write with positive exponents where possible ($x^{-1} \\rightarrow \\frac{1}{x}$), combine coefficients into simplified fractions, and present all terms on one line with a single $+c$ at the end.\n+ The mark scheme specifically penalizes missing $+c$ or presenting unsimplified terms like $\\frac{10}{6}x^6$ instead of $\\frac{5}{3}x^6$.\n\n**Takeaway:** $+c$ is non-negotiable for indefinite integrals; simplify coefficients before writing the final answer.", "source": "MiniMax ②", "_id": "minimax_2_2"}, {"question": "In an exam, a student uses a calculator to solve a quadratic and writes down only the final correct roots, but the question states \"you must show all stages of your working.\" Why does this score zero? (2 steps)", "answer": "- Step 1: Exam mark schemes are structured around Method (M) and Accuracy (A) marks. Method marks are awarded for demonstrating the required mathematical process (e.g., factorisation, substitution, using a formula).\n+ A correct answer with no working shows the *result* but not the *process*. The calculator did the work, not the student.\n- Step 2: Because the question explicitly forbids calculator-reliant solutions, the mark scheme will withhold all method marks. Without any method marks, the accuracy marks (which depend on valid methods) also drop to zero. Hence, a correct answer from invalid/invisible working yields M0 A0.\n\nTakeaway: Method marks pay for the journey, not just the destination; if the rubric bans calculators, invisible work earns zero credit.", "source": "GLM 5.1 ②", "_id": "glm_2_4"}, {"question": "When solving a quadratic that arises from setting \"gradient of curve equals gradient of normal,\" and you get two roots, how do you decide which to keep? (3 steps)", "answer": "- Step 1: Check the geometric context: the question often specifies a region (e.g. \"$$x > 0$$\") or a sketch indicating which root makes physical sense.\n- Step 2: If the question mentions \"the positive root\" or \"from the sketch,\" use that constraint to discard the invalid root. Sometimes one root corresponds to a different intersection poi
