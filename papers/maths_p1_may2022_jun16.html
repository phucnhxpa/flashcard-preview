\\sin 2x = \\sin \\alpha$$ means the angle $$2x$$ must be an angle whose sine equals $$\\sin \\alpha$$. On $$0° < 2x < 360°$$ (since $$0° < x < 180°$$), there are two such angles: $$2x = \\alpha$$ and $$2x = 180° - \\alpha$$ (the supplementary angle, which has the same sine).\n- Step 2: From $$2x = \\alpha$$: $$x = \\frac{\\alpha}{2}$$. From $$2x = 180° - \\alpha$$: $$x = 90° - \\frac{\\alpha}{2}$$. Both lie in $$0° < x < 180°$$ because $$\\alpha$$ is between 0° and 90°, so both halves are between 0° and 45° (or 45° and 90°).\n- Step 3: There are no other solutions in range because the next candidates would be $$2x = 360° + \\alpha$$ (giving $$x > 180°$$) or $$2x = 360° - \\alpha$$ (also out of range). So exactly two solutions: $$x = \\frac{\\alpha}{2}$$ and $$x = 90° - \\frac{\\alpha}{2}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "Why does a correct answer reached through invalid working score zero marks, as happened in Q7(a)? What principle is the exam enforcing? (2 steps)", "answer": "- Step 1: The mark scheme awards marks for the method (M marks) and then the accuracy (A marks) that depends on that method. If the method is wrong, the M marks are lost, and the dependent A marks (dM, A) are also lost because they require the method as a prerequisite.\n- Step 2: The principle being enforced is: mathematics is about valid reasoning, not lucky guesses. A correct final answer from broken working shows the result was either memorized or coincidental — it does not demonstrate understanding. The exam rewards the *process*, not just the *destination*.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": true}, {"question": "Differentiate $$f'(x) = 2x^{-1/2} + Ax^{-2} + 3$$ to find $$f''(x)$$. Show each term's power rule application. (3 steps)", "answer": "- Step 1: For $$2x^{-1/2}$$: multiply by the power ($$2 \\times -\\frac{1}{2} = -1$$), reduce the power by 1 ($$-\\frac{1}{2} - 1 = -\\frac{3}{2}$$). Result: $$-x^{-3/2}$$.\n- Step 2: For $$Ax^{-2}$$: multiply by the power ($$A \\times (-2) = -2A$$), reduce the power by 1 ($$-2 - 1 = -3$$). Result: $$-2Ax^{-3}$$.\n- Step 3: The constant 3 differentiates to 0. Combining: $$f''(x) = -x^{-3/2} - 2Ax^{-3}$$. The common error is mishandling the fractional power ($$-\\frac{1}{2} - 1 \\neq -\\frac{1}{2}$$) or the negative power ($$-2 - 1 \\neq -1$$). Each subtraction must be done carefully.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "In Q7(a), setting $$f''(4) = 0$$ gives $$-4^{-3/2} - 2A \\cdot 4^{-3} = 0$$. Evaluate the powers $$4^{-3/2}$$ and $$4^{-3}$$ without a calculator. (3 steps)", "answer": "- Step 1: $$4^{-3/2}$$: the negative exponent means reciprocal, the $$\\frac{3}{2}$$ means cube after square-rooting. So $$4^{1/2} = 2$$, then $$2^3 = 8$$, so $$4^{3/2} = 8$$, and $$4^{-3/2} = \\frac{1}{8}$$.\n- Step 2: $$4^{-3}$$: $$4^3 = 64$$, so $$4^{-3} = \\frac{1}{64}$$.\n- Step 3: The equation becomes $$-\\frac{1}{8} - \\frac{2A}{64} = 0$$, i.e., $$-\\frac{1}{8} - \\frac{A}{32} = 0$$, giving $$A = -4$$.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "When solving a hidden quadratic like $$2u^2 - 15u - 50 = 0$$ (where $$u = x^2$$), you get $$u = 10$$ or $$u = -\\frac{5}{2}$$. Why must you reject $$u = -\\frac{5}{2}$$, and what reasoning must you write? (2 steps)", "answer": "- Step 1: Since $$u = x^2$$, the value $$u = -\\frac{5}{2}$$ would mean $$x^2 = -\\frac{5}{2}$$. But a squared real number can never be negative — squares are always non-negative.\n- Step 2: You must write: \"Reject $$u = -\\frac{5}{2}$$ since $$x^2 \\geq 0$$ for all real $$x$$.\" The reason is part of the mark. Stating just \"reject\" without justification loses the reasoning mark.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": true}, {"question": "After substituting $$u = \\sqrt{x}$$, you solve $$u^3 + 7u - 24 = 0$$ and factorise to $$(u-2)(u^2 + 2u + 12) = 0$$. Why is the quadratic factor rejected? (2 steps)", "answer": "- Step 1: The discriminant of $$u^2 + 2u + 12$$ is $$b^2 - 4ac = 4 - 48 = -44$$, which is negative.\n- Step 2: A negative discriminant means no real roots, so this factor yields no valid values of $$u$$. You must state this: \"Discriminant $$< 0$$, so no real roots — reject.\" Only $$u = 2$$ remains, giving $$\\sqrt{x} = 2$$, so $$x = 4$$.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "To simplify $$\\frac{9^{2x+1} \\cdot 3^{3x-3}}{27^{2x-a}}$$, what is the first step and why? Then give the final exponent in terms of $$x$$ and $$a$$. (3 steps)", "answer": "- Step 1: Convert everything to a common base. Since $$9 = 3^2$$ and $$27 = 3^3$$, rewrite: $$9^{2x+1} = (3^2)^{2x+1} = 3^{4x+2}$$, and $$27^{2x-a} = (3^3)^{2x-a} = 3^{6x-3a}$$.\n- Step 2: Now the expression is $$\\frac{3^{4x+2} \\cdot 3^{3x-3}}{3^{6x-3a}}$$. Use the index laws: multiply means add exponents in the numerator; divide means subtract the denominator's exponent.\n- Step 3: Numerator exponent: $$(4x+2) + (3x-3) = 7x - 1$$. Subtract denominator: $$(7x-1) - (6x-3a) = x - 1 + 3a$$. Final result: $$3^{x-1+3a}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "A student integrates $$f'(x) = 2x^{-1/2} + (-4)x^{-2} + 3$$ and writes the first term as $$2x^{1/2}$$ instead of $$4x^{1/2}$$. What step did they skip? (2 steps)", "answer": "- Step 1: They correctly added 1 to the power ($$-\\frac{1}{2} + 1 = \\frac{1}{2}$$) but forgot to divide by the new power. The rule says: raise the power, then divide by it.\n- Step 2: Dividing by $$\\frac{1}{2}$$ means multiplying by 2: $$2 \\div \\frac{1}{2} = 4$$, so the coefficient is 4, not 2. The result should be $$4x^{1/2} = 4\\sqrt{x}$$. This \"dropped power\" error cost 2 marks in Q7(b).", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "Integrate $$\\frac{3}{\\sqrt{x}} + 2x$$ and express each term in its simplest form. (3 steps)", "answer": "- Step 1: Rewrite with fractional/negative powers: $$\\frac{3}{\\sqrt{x}} = 3x^{-1/2}$$. So the integrand is $$3x^{-1/2} + 2x$$.\n- Step 2: For $$3x^{-1/2}$$: add 1 to the power ($$-\\frac{1}{2} + 1 = \\frac{1}{2}$$), divide by the new power ($$3 \\div \\frac{1}{2} = 6$$). Result: $$6x^{1/2} = 6\\sqrt{x}$$.\n- Step 3: For $$2x$$: add 1 to the power ($$1 + 1 = 2$$), divide by the new power ($$2 \\div 2 = 1$$). Result: $$x^2$$. Full answer: $$6\\sqrt{x} + x^2 + c$$.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": true}, {"question": "The mark scheme for Q1 says the final A1 mark requires \"fully correct and simplified with $$+c$$ all on one line.\" Why does presentation matter to this extent? (2 steps)", "answer": "- Step 1: The mark scheme is designed so that each mark tests a distinct skill. The final A1 tests whether you can present a complete, simplified answer — not a scattered collection of terms across multiple lines, some simplified, some not.\n- Step 2: \"All on one line\" ensures you've collected every term, simplified each one, and included the constant of integration. Scattered working might have the right pieces but fails to demonstrate you can assemble the full, clean answer. It's an execution discipline mark.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "You need to find $$c$$ in $$f(x) = 4\\sqrt{x} + \\frac{4}{x} + 3x + c$$ given $$f(12) = 8\\sqrt{3}$$. Show why the $$4\\sqrt{x}$$ term perfectly cancels with $$8\\sqrt{3}$$, and find $$c$$. (3 steps)", "answer": "- Step 1: Substitute $$x = 12$$: $$4\\sqrt{12} + \\frac{4}{12} + 3(12) + c = 8\\sqrt{3}$$. Simplify $$\\sqrt{12} = \\sqrt{4 \\times 3} = 2\\sqrt{3}$$, so $$4\\sqrt{12} = 4 \\times 2\\sqrt{3} = 8\\sqrt{3}$$.\n- Step 2: The $$8\\sqrt{3}$$ on the left exactly matches the $$8\\sqrt{3}$$ on the right, so they cancel. What remains: $$\\frac{1}{3} + 36 + c = 0$$.\n- Step 3: $$c = -36 - \\frac{1}{3} = -\\frac{108}{3} - \\frac{1}{3} = -\\frac{109}{3}$$. The key insight: the surd terms cancel perfectly because of the $$\\sqrt{12} = 2\\sqrt{3}$$ simplification — don't reach for the decimal approximation.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "A question says \"give your answer to 4 decimal places\" but you give it to 3 significant figures. Even if the digits happen to match, why is this technically wrong? (2 steps)", "answer": "- Step 1: \"4 decimal places\" and \"3 significant figures\" are different rounding specifications. They agree only by coincidence for certain numbers. The examiner is testing whether you can follow the requested format precisely.\n- Step 2: For example, $$0.6827$$ (4 dp) and $$0.683$$ (3 sf) differ in the last digit. Even when they match, you haven't demonstrated you understand the distinction. Always give exactly what's asked: dp, sf, exact, or surd form.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "For the transformation $$y = f(x) - 2$$ applied to a curve with asymptote $$y = 1$$, what is the new asymptote and why? (2 steps)", "answer": "- Step 1: $$y = f(x) - 2$$ is a vertical translation downward by 2 units. Every point on the graph, including points on the asymptote, moves down 2.\n- Step 2: The asymptote $$y = 1$$ becomes $$y = 1 - 2 = y = -1$$. Vertical shifts move horizontal asymptotes because they change the $$y$$-values that the graph approaches.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "A student sees $$y = f(-x)$$ and writes \"$$y = 1 \\Rightarrow y = 1(-1) = -1$$\" for the horizontal asymptote. What conceptual error are they making? (2 steps)", "answer": "- Step 1: They are treating the transformation as if it multiplies the output $$y$$ by $$-1$$, which would be $$y = -f(x)$$. But $$f(-x)$$ replaces the *input*, not the output.\n- Step 2: $$f(-x)$$ reflects the graph horizontally (in the $$y$$-axis). It doesn't negate or change $$y$$-values at all — it changes which $$x$$-value produces each $$y$$. A horizontal asymptote is a statement about $$y$$-values at extreme $$x$$; since $$y$$-values are unchanged, the asymptote stays the same.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": true}, {"question": "List all six standard graph transformations and classify each as \"horizontal\" or \"vertical.\" Which type moves horizontal asymptotes, and which type moves vertical asymptotes? (3 steps)", "answer": "- Step 1: Vertical transformations (affect $$y$$-values): $$y = f(x) + a$$ (shift up), $$y = f(x) - a$$ (shift down), $$y = -f(x)$$ (reflect in $$x$$-axis), $$y = af(x)$$ (vertical stretch).\n- Step 2: Horizontal transformations (affect $$x$$-input): $$y = f(x - a)$$ (shift right), $$y = f(-x)$$ (reflect in $$y$$-axis), $$y = f(ax)$$ (horizontal stretch/compression).\n- Step 3: Vertical transformations move **horizontal** asymptotes (they change the $$y$$-value being approached). Horizontal transformations move **vertical** asymptotes (they change the $$x$$-position of the vertical barrier). Each type leaves the other kind of asymptote unchanged.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": false}, {"question": "Why does $$\\sin(180° - \\alpha) = \\sin \\alpha$$ but $$\\cos(180° - \\alpha) = -\\cos \\alpha$$? Give the quadrant picture. (2 steps)", "answer": "- Step 1: Angle $$180° - \\alpha$$ is in the second quadrant. In the second quadrant, sine is positive (the vertical/opposite side is above the $$x$$-axis) but cosine is negative (the horizontal/adjacent side is to the left of the $$y$$-axis).\n- Step 2: So $$\\sin(180° - \\alpha) = +\\sin \\alpha$$ (same magnitude, same sign) while $$\\cos(180° - \\alpha) = -\\cos \\alpha$$ (same magnitude, opposite sign). The reference angle is the same; only the signs differ by quadrant.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": true}, {"question": "You're solving a problem and reach $$x^2 = -\\frac{5}{2}$$. A student writes \"$$x = \\pm\\sqrt{-\\frac{5}{2}}$$\" and continues. What should they do instead? (2 steps)", "answer": "- Step 1: Over the real numbers, there is no solution to $$x^2 = -\\frac{5}{2}$$ because a square cannot be negative. Writing the square root of a negative number as if it's a valid real solution is an error.\n- Step 2: The correct action: state \"Reject since $$x^2 \\geq 0$$ for real $$x$$\" and move on to the other root. The rejection with reason is what earns the mark — not just ignoring it silently.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "Integrate $$\\frac{4}{x^2}$$ and express the answer in simplest form with $$+c$$. (3 steps)", "answer": "- Step 1: Rewrite as a power: $$\\frac{4}{x^2} = 4x^{-2}$$.\n- Step 2: Add 1 to the power: $$-2 + 1 = -1$$. Divide by the new power: $$4 \\div (-1) = -4$$. Result: $$-4x^{-1}$$.\n- Step 3: Simplify: $$-4x^{-1} = -\\frac{4}{x}$$. Full answer: $$-\\frac{4}{x} + c$$. Note the sign flip: the original was positive (dividing by $$x^2$$), but dividing by $$-1$$ when integrating makes it negative.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": false}, {"question": "Differentiate $$x^{3/2} + 7x - 24$$ term by term. (3 steps)", "answer": "- Step 1: For $$x^{3/2}$$: multiply by the power $$\\frac{3}{2}$$, reduce the power by 1: $$\\frac{3}{2}x^{1/2}$$.\n- Step 2: For $$7x$$: multiply by 1, reduce the power by 1: $$7x^0 = 7$$. For $$-24$$: derivative of a constant is 0.\n- Step 3: Result: $$f'(x) = \\frac{3}{2}x^{1/2} + 7 = \\frac{3}{2}\\sqrt{x} + 7$$. This is the reverse of the integration in the extra practice problem — differentiation and integration are inverse processes.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": false}, {"question": "On a sketch of $$y = \\sin 2x$$ over $$0° \\leq x \\leq 360°$$, at what $$x$$-values does the curve cross the $$x$$-axis? Why? (3 steps)", "answer": "- Step 1: $$\\sin 2x = 0$$ when $$2x = 0°, 180°, 360°, 540°, 720°$$, i.e., when $$2x$$ is any multiple of 180°.\n- Step 2: Divide by 2: $$x = 0°, 90°, 180°, 270°, 360°$$. These are the intercepts.\n- Step 3: The pattern is: the intercepts are twice as dense as for $$\\sin x$$ (which has intercepts at $$0°, 180°, 360°$$). The halved period means the curve completes its cycle in half the distance, so it crosses zero twice as often.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": false}, {"question": "A question asks you to find $$f(x)$$ given $$f'(x)$$ and a boundary condition. What are the two distinct stages, and what is the purpose of the boundary condition? (3 steps)", "answer": "- Step 1: Stage 1 — Integrate $$f'(x)$$ term by term to get $$f(x)$$ with a \"$$+ c$$\" constant of integration. This gives the general family of antiderivatives.\n- Step 2: Stage 2 — Substitute the boundary condition (e.g., $$f(12) = 8\\sqrt{3}$$) into your expression to solve for $$c$$. This pins down which specific member of the family is the correct one.\n- Step 3: Without the boundary condition, $$c$$ could be anything — the problem would be incomplete. The boundary condition provides the one piece of extra information needed to determine the unique solution.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": false}, {"question": "Quick mental check: integrate $$-3x^{-2}$$. What is the sign of the result, and why? (2 steps)", "answer": "- Step 1: Power goes from $$-2$$ to $$-1$$. Divide by the new power $$-1$$: $$-3 \\div (-1) = +3$$.\n- Step 2: The sign flips from negative to positive because dividing by a negative power negates the coefficient. Answer: $$+3x^{-1} = +\\frac{3}{x} + c$$.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": false}, {"question": "Quick mental check: if $$f'(x) = 5x^{-3}$$, what is $$f''(x)$$? (2 steps)", "answer": "- Step 1: Differentiate $$5x^{-3}$$: multiply by the power ($$5 \\times (-3) = -15$$), reduce the power by 1 ($$-3 - 1 = -4$$).\n- Step 2: $$f''(x) = -15x^{-4}$$. The sign stays negative (negative × negative power = negative), and the magnitude increases from 5 to 15.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": false}, {"question": "A student writes $$\\int 6x^2 \\, dx = 2x^3 + c$$ and $$\\frac{d}{dx}[2x^3] = 6x^2$$. How does the second line verify the first, and what is this checking strategy called? (2 steps)", "answer": "- Step 1: Differentiating your integration answer should return the original integrand. Since $$\\frac{d}{dx}[2x^3] = 6x^2$$, which is exactly what we started with, the integration is confirmed correct.\n- Step 2: This is the **verification by differentiation** strategy. It's a powerful self-check: after every integration, quickly differentiate your answer mentally. If it doesn't match the original, you've made an error (wrong power, wrong coefficient, wrong sign). This habit would have caught the Q1 error immediately.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": true}, {"question": "The transformation $$y = 2f(x)$$ is applied to a curve with a maximum at $$(3, 4)$$ and a horizontal asymptote at $$y = 1$$. Find the new maximum and asymptote. (2 steps)", "answer": "- Step 1: $$y = 2f(x)$$ is a vertical stretch by factor 2. Every $$y$$-value is doubled. The maximum $$(3, 4)$$ becomes $$(3, 8)$$.\n- Step 2: The horizontal asymptote $$y = 1$$ also doubles: $$y = 2$$. Vertical stretches scale all $$y$$-values, including those approached asymptotically. The $$x$$-coordinates are unchanged.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": false}, {"question": "The transformation $$y = f(2x)$$ is applied to a curve with a maximum at $$(6, 4)$$ and a vertical asymptote at $$x = 5$$. Find the new maximum and asymptote. (3 steps)", "answer": "- Step 1: $$y = f(2x)$$ is a horizontal compression by factor 2. The graph reaches each $$y$$-value in half the $$x$$-distance. Every $$x$$-coordinate is halved.\n- Step 2: The maximum $$(6, 4)$$ becomes $$(3, 4)$$. The $$x$$-value halves; the $$y$$-value is unchanged because the transformation only affects the input.\n- Step 3: The vertical asymptote $$x = 5$$ becomes $$x = \\frac{5}{2}$$. Horizontal transformations move vertical asymptotes. The horizontal asymptote (if any) would be unchanged.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": false}, {"question": "Why is $$4^{-3/2} = \\frac{1}{8}$$? Break down the fractional negative exponent step by step. (3 steps)", "answer": "- Step 1: The denominator of the fraction ($$2$$) means take the square root: $$4^{1/2} = 2$$.\n- Step 2: The numerator ($$3$$) means cube: $$2^3 = 8$$. So $$4^{3/2} = 8$$.\n- Step 3: The negative sign means take the reciprocal: $$4^{-3/2} = \\frac{1}{4^{3/2}} = \\frac{1}{8}$$. The order doesn't matter: you can also think of it as $$(4^{-1})^{3/2} = \\left(\\frac{1}{4}\\right)^{3/2} = \\left(\\frac{1}{2}\\right)^3 = \\frac{1}{8}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": false}, {"question": "In Q7(a), the student got $$A = -4$$ but scored 0/4. In Q7(b), the student's method was correct but a dropped power gave the wrong constant, and they scored 3/5. Why the difference in partial credit? (3 steps)", "answer": "- Step 1: In Q7(a), the *method itself* was invalid — the differentiation steps were wrong. The mark scheme couldn't award any method marks (M0), so all dependent accuracy marks also fell (A0, dM0, A0). A correct answer from invalid working = 0.\n- Step 2: In Q7(b), the *method was correct* (integrate, substitute, solve for $$c$$). The method marks (M1, dM1) were earned. The error was a slip in executing one step (dropping a power), which lost some accuracy marks (A0ft, A0) but the follow-through marks (A1ft) were still available.\n- Step 3: The lesson: a right method with a minor execution slip still earns partial credit. A wrong method earns nothing, even if the final number is right. Always get the method right first — then worry about arithmetic precision.", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": true}, {"question": "Quick mental check: integrate $$5x^{-3}$$. What happens to the sign? (2 steps)", "answer": "- Step 1: Add 1 to the power: $$-3 + 1 = -2$$. Divide by the new power: $$5 \\div (-2) = -\\frac{5}{2}$$.\n- Step 2: Result: $$-\\frac{5}{2}x^{-2} + c = -\\frac{5}{2x^2} + c$$. The sign stays negative here because the original coefficient was positive, and dividing by $$-2$$ introduces one negative. (Contrast with Q38 where the original coefficient was also negative, giving two negatives = positive.)", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": false}, {"question": "Sketch the graph of $$y = \\sin 2x$$ over $$0° \\leq x \\leq 180°$$. Describe the shape, the starting point, the peak, and where it returns to zero. (3 steps)", "answer": "- Step 1: At $$x = 0°$$, $$\\sin(0) = 0$$ — the curve starts at the origin, just like $$\\sin x$$.\n- Step 2: The peak (amplitude 1) occurs when $$2x = 90°$$, i.e., $$x = 45°$$. The curve rises from the origin to $$(45°, 1)$$.\n- Step 3: It returns to zero when $$2x = 180°$$, i.e., $$x = 90°$$. Then it goes to a trough at $$x = 135°$$ (where $$2x = 270°$$, $$\\sin = -1$$) and back to zero at $$x = 180°$$. One complete sine wave in 180° — half the period of $$\\sin x$$.", "source": "GLM 5.1 ③", "_id": "glm_3_45", "judge_pick": false}, {"question": "Given $$0 < \\alpha < 90°$$ and $$\\sin \\alpha = p$$, explain why $$x = 90° - \\frac{\\alpha}{2}$$ is a valid solution to $$\\sin 2x = p$$ on $$0° < x < 180°$$. (3 steps)", "answer": "- Step 1: We need $$\\sin 2x = \\sin \\alpha$$. One solution is $$2x = \\alpha$$ giving $$x = \\frac{\\alpha}{2}$$. The other is $$2x = 180° - \\alpha$$ (supplementary angle identity).\n- Step 2: From $$2x = 180° - \\alpha$$: $$x = 90° - \\frac{\\alpha}{2}$$. Since $$0° < \\alpha < 90°$$, we have $$0° < \\frac{\\alpha}{2} < 45°$$, so $$45° < 90° - \\frac{\\alpha}{2} < 90°$$.\n- Step 3: This value lies in the range $$0° < x < 180°$$, so it's valid. Both solutions are in range: $$x = \\frac{\\alpha}{2}$$ is in the first half of the first wave, and $$x = 90° - \\frac{\\alpha}{2}$$ is in the second half.", "source": "GLM 5.1 ③", "_id": "glm_3_46", "judge_pick": true}, {"question": "When a question says \"In this question you must show all stages of your working. Solutions relying on calculator technology are not acceptable,\" what specifically must you do differently? (2 steps)", "answer": "- Step 1: Write out every algebraic step on paper — factorisations, substitutions, power-rule applications — even if you could do them mentally or on a calculator. No \"magic number appears\" lines.\n- Step 2: When rejecting a root, state the mathematical reason (e.g., \"$$x^2 \\geq 0$$\" or \"discriminant < 0\"). When solving a quadratic, show the factorisation or formula, not just the solutions from a solver. The examiner needs to see the *method*, not just the *answer*.", "source": "GLM 5.1 ③", "_id": "glm_3_47", "judge_pick": true}, {"question": "Before writing the final line of any exam answer, what five checks should you run? List them. (2 steps)", "answer": "- Step 1: (1) Precision — does the question ask for dp, sf, exact, or surd? (2) What's being asked — a coordinate pair or a single value? An angle or its sine? (3) Which case — acute or obtuse? Which root, and why is the other rejected?\n- Step 2: (4) Required form — is it \"$$y = mx + c$$\" or \"$$ax + by + c = 0$$\"? \"$$a + b\\sqrt{5}$$\"? (5) Completeness — did you include $$+c$$? Is every term simplified? Is everything on one line?", "source": "GLM 5.1 ③", "_id": "glm_3_48", "judge_pick": false}, {"question": "A curve has minimum $$(-1, 0)$$, maximum $$(\\frac{3}{2}, 2)$$, and asymptote $$y = 1$$. Under $$y = -f(x)$$, what are the new features? (3 steps)", "answer": "- Step 1: $$y = -f(x)$$ reflects in the $$x$$-axis. Every $$y$$-value changes sign. The minimum $$(-1, 0)$$ becomes $$(-1, 0)$$ — it's on the $$x$$-axis, so reflecting doesn't move it.\n- Step 2: The maximum $$(\\frac{3}{2}, 2)$$ becomes $$(\\frac{3}{2}, -2)$$ — now a minimum (flipped from peak to trough). The old minimum becomes the new maximum.\n- Step 3: The asymptote $$y = 1$$ becomes $$y = -1$$. Vertical reflections move horizontal asymptotes. The curve now approaches $$y = -1$$ at both ends, and the shape is the original flipped upside down.", "source": "GLM 5.1 ③", "_id": "glm_3_49", "judge_pick": false}, {"question": "Why is it that $$\\sin^{-1}(k)$$ on a calculator only ever gives you the acute angle, even when the obtuse angle is the correct answer? (2 steps)", "answer": "- Step 1: The calculator's $$\\sin^{-1}$$ function is defined to return the **principal value**, which for sine is in the range $$[-90°, 90°]$$. It always gives the first-quadrant (or fourth-quadrant for negative) answer.\n- Step 2: The obtuse solution (in the second quadrant) is never returned by $$\\sin^{-1}$$ directly. You must compute it yourself as $$180° - \\sin^{-1}(k)$$. The calculator is a tool that gives one root; the mathematics requires you to find both and then choose the correct one based on the problem's constraints.", "source": "GLM 5.1 ③", "_id": "glm_3_50", "judge_pick": false}, {"question": "Conceptual synthesis: A student differentiates $$f'(x)$$ to get $$f''(x)$$, sets $$f''(4) = 0$$, solves for $$A$$, then integrates $$f'(x)$$ to find $$f(x)$$ with a boundary condition. Explain the logical chain: why must differentiation come before the integration in this problem? (3 steps)", "answer": "- Step 1: The problem gives $$f'(x)$$ with an unknown constant $$A$$. To find $$A$$, we need an equation involving $$A$$ — and the only information given is that $$f''(4) = 0$$.\n- Step 2: $$f''(x)$$ is the derivative of $$f'(x)$$, so we must differentiate first to express $$f''(x)$$ in terms of $$A$$ and $$x$$. Then setting $$f''(4) = 0$$ gives us the equation to solve for $$A$$.\n- Step 3: Only after $$A$$ is determined can we integrate $$f'(x)$$ (now fully known) to get $$f(x)$$. The logic is: differentiate to unlock $$A$$ → substitute $$A$$ back → integrate to find $$f(x)$$. Reversing the order would mean integrating with an unknown $$A$$, which leaves the answer in terms of $$A$$ — useless until $$A$$ is found.", "source": "GLM 5.1 ③", "_id": "glm_3_51", "judge_pick": true}, {"question": "Conceptual synthesis: Why does premature rounding in part (a) of a multi-part question damage part (b) even when the method in (b) is correct? (2 steps)", "answer": "- Step 1: Part (b) typically uses the answer from part (a) as an input. If part (a)'s answer is slightly off (e.g., 0.6830 instead of 0.6827), that error propagates into every subsequent calculation.\n- Step 2: The mark scheme often awards \"follow-through\" marks for correct method in (b) even with a carried-forward error — but the final accuracy mark in (b) is still wrong because the input was wrong. The Q2 example: $$136.93°$$ instead of $$136.95°$$ — the method was right, but the seed was bad. Carry full accuracy throughout; round only at the very end.", "source": "GLM 5.1 ③", "_id": "glm_3_52", "judge_pick": true}, {"question": "Conceptual synthesis: In Q9, parts (a), (b), and (c) are deeply connected. Explain how the symmetry identities in (a) and the period compression in (b) are both needed to solve (c). (3 steps)", "answer": "- Step 1: Part (c) asks: where does $$\\sin 2x = p = \\sin \\alpha$$ on $$0° < x < 180°$$? The \"2x\" means we're working with the compressed wave from part (b) — the period is 180°, so we search within one full wave.\n- Step 2: The equation $$\\sin 2x = \\sin \\alpha$$ means $$2x$$ must be an angle whose sine equals $$\\sin \\alpha$$. The symmetry identity $$\\sin(180° - \\alpha) = \\sin \\alpha$$ from part (a) tells us there are exactly two such angles in one cycle: $$\\alpha$$ and $$180° - \\alpha$$.\n- Step 3: Setting $$2x = \\alpha$$ gives $$x = \\frac{\\alpha}{2}$$, and $$2x = 180° - \\alpha$$ gives $$x = 90° - \\frac{\\alpha}{2}$$. Without the symmetry identity, you'd miss the second root. Without understanding the period compression, you wouldn't know the valid range for $$2x$$ is $$0°$$ to $$360°$$. Both ideas are essential.", "source": "GLM 5.1 ③", "_id": "glm_3_53", "judge_pick": true}, {"question": "Edge case: What if $$\\alpha = 90°$$ in Q9? How many solutions does $$\\sin 2x = \\sin 90° = 1$$ have on $$0° < x < 180°$$? (3 steps)", "answer": "- Step 1: $$\\sin 2x = 1$$ means $$2x = 90°$$ (the only angle in $$[0°, 360°]$$ where sine equals 1). So $$x = 45°$$.\n- Step 2: Check the supplementary angle: $$2x = 180° - 90° = 90°$$ — this gives the same $$x = 45°$$, not a distinct second root. The two roots have merged into one.\n- Step 3: Only one solution: $$x = 45°$$. This is a degenerate case where the peak of the sine wave is exactly at the maximum, so the \"two roots\" coincide. The condition $$0° < \\alpha < 90°$$ in the question explicitly excludes this edge case to ensure two distinct roots.", "source": "GLM 5.1 ③", "_id": "glm_3_54", "judge_pick": true}, {"question": "Misconception probe: A student says \"Integration always makes the coefficient smaller because you divide.\" Give a counterexample showing this is false. (2 steps)", "answer": "- Step 1: Consider integrating $$2x^{-1/2}$$: the coefficient becomes $$2 \\div \\frac{1}{2} = 4$$, which is larger, not smaller. The coefficient grew because dividing by a fraction less than 1 multiplies the value.\n- Step 2: The student's intuition works for positive integer powers (e.g., $$\\int 6x^3 = \\frac{6}{4}x^4 = \\frac{3}{2}x^4$$, coefficient shrank from 6 to 1.5). But for fractional powers less than 1, dividing by the new power actually increases the coefficient. Always do the division explicitly — don't assume the direction.", "source": "GLM 5.1 ③", "_id": "glm_3_55", "judge_pick": true}, {"question": "Misconception probe: A student says \"Reflecting in the y-axis changes the sign of all coordinates.\" Is this correct? Give a specific counterexample. (2 steps)", "answer": "- Step 1: Reflecting in the $$y$$-axis sends $$(x, y) \\to (-x, y)$$. Only the $$x$$-coordinate changes sign; the $$y$$-coordinate is unchanged.\n- Step 2: Counterexample: the point $$(3, 5)$$ reflects to $$(-3, 5)$$ — the $$y$$-value is still 5. The student is confusing $$f(-x)$$ (y-axis reflection, only $$x$$ changes sign) with $$-f(x)$$ (x-axis reflection, only $$y$$ changes sign). These are fundamentally different transformations.", "source": "GLM 5.1 ③", "_id": "glm_3_56", "judge_pick": false}, {"question": "Misconception probe: A student sees $$\\sin 2x = p$$ and writes $$x = \\sin^{-1}(p) / 2$$ as the only answer. What have they missed? (2 steps)", "answer": "- Step 1: They've found the principal root correctly: $$2x = \\sin^{-1}(p)$$, so $$x = \\frac{\\sin^{-1}(p)}{2}$$. But $$\\sin \\theta = k$$ has two solutions per cycle: $$\\theta = \\sin^{-1}(k)$$ and $$\\theta = 180° - \\sin^{-1}(k)$$.\n- Step 2: The second root is $$2x = 180° - \\sin^{-1}(p)$$, giving $$x = 90° - \\frac{\\sin^{-1}(p)}{2}$$. Missing this second root loses the final marks. On a sine curve between 0° and 360°, every horizontal line (within range) hits the curve twice — you must find both intersections.", "source": "GLM 5.1 ③", "_id": "glm_3_57", "judge_pick": true}, {"question": "Simple exercise: Integrate $$8x^3 - \\frac{4}{x^2}$$. Give each term in simplest form on one line with $$+c$$. (3 steps)", "answer": "- Step 1: Rewrite: $$8x^3 - 4x^{-2}$$. Integrate each term: $$8x^3 \\to \\frac{8x^4}{4} = 2x^4$$.\n- Step 2: $$-4x^{-2} \\to -4 \\cdot \\frac{x^{-1}}{-1} = +4x^{-1} = +\\frac{4}{x}$$. Sign flips because dividing by $$-1$$.\n- Step 3: Full answer on one line: $$2x^4 + \\frac{4}{x} + c$$. Simplified, one line, with $$+c$$.", "source": "GLM 5.1 ③", "_id": "glm_3_58", "judge_pick": false}, {"question": "Simple exercise: The curve $$y = f(x)$$ has a maximum at $$(2, 5)$$, a minimum at $$(4, 1)$$, and a horizontal asymptote at $$y = 3$$. State the new features under $$y = f(-x)$$. (3 steps)", "answer": "- Step 1: $$f(-x)$$ reflects in the $$y$$-axis: $$x$$-coordinates change sign, $$y$$-coordinates unchanged. Maximum $$(-2, 5)$$, minimum $$(-4, 1)$$.\n- Step 2: The horizontal asymptote is unchanged: $$y = 3$$ stays $$y = 3$$. A y-axis reflection doesn't move horizontal features.\n- Step 3: The shape is the mirror image: what was on the right is now on the left. The maximum is now at $$(-2, 5)$$ and the minimum at $$(-4, 1)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_59", "judge_pick": false}, {"question": "Simple exercise: Given $$\\sin \\alpha = p$$ with $$0° < \\alpha < 90°$$, express $$2\\sin(180° - \\alpha)$$ in terms of $$p$$. (2 steps)", "answer": "- Step 1: Apply the symmetry identity: $$\\sin(180° - \\alpha) = \\sin \\alpha = p$$.\n- Step 2: Multiply by 2: $$2\\sin(180° - \\alpha) = 2p$$.", "source": "GLM 5.1 ③", "_id": "glm_3_60", "judge_pick": false}, {"question": "Simple exercise: $$\\frac{17}{3}$$ — state it to 2 decimal places, then state it exactly. When should you use each form? (2 steps)", "answer": "- Step 1: To 2 dp: $$17 \\div 3 = 5.6666... = 5.67$$ (2 dp). Exactly: $$\\frac{17}{3}$$.\n- Step 2: Use exact form when the question says \"exact\" or \"in simplest form\" or \"as a surd/fraction.\" Use the rounded form when the question specifies \"to 2 dp\" or \"to 3 sf.\" The question dictates the form — never round unless asked, and always round to exactly what's requested.", "source": "GLM 5.1 ③", "_id": "glm_3_61", "judge_pick": false}, {"question": "Simple exercise: $$\\sqrt{12}$$ — give the exact surd form and the value to 4 decimal places. (2 steps)", "answer": "- Step 1: Exact surd form: $$\\sqrt{12} = \\sqrt{4 \\times 3} = 2\\sqrt{3}$$. Factor out the largest perfect square.\n- Step 2: To 4 dp: $$2\\sqrt{3} \\approx 2 \\times 1.73205... = 3.4641$$. The exact form is preferred in algebraic working; the decimal form only when the question requests it.", "source": "GLM 5.1 ③", "_id": "glm_3_62", "judge_pick": false}, {"question": "Simple exercise: Differentiate $$3x^{1/2} - 5x^{-3} + 7$$. (3 steps)", "answer": "- Step 1: $$3x^{1/2}$$: multiply by $$\\frac{1}{2}$$, reduce power by 1: $$\\frac{3}{2}x^{-1/2}$$.\n- Step 2: $$-5x^{-3}$$: multiply by $$-3$$, reduce power by 1: $$+15x^{-4}$$. (The two negatives — coefficient $$-5$$ times power $$-3$$ — give positive 15.)\n- Step 3: Constant 7 differentiates to 0. Result: $$\\frac{3}{2}x^{-1/2} + 15x^{-4}$$, or equivalently $$\\frac{3}{2\\sqrt{x}} + \\frac{15}{x^4}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_63", "judge_pick": false}, {"question": "Simple exercise: On the interval $$0° < x < 180°$$, solve $$\\sin 2x = \\frac{\\sqrt{3}}{2}$$. (3 steps)", "answer": "- Step 1: We know $$\\sin 60° = \\frac{\\sqrt{3}}{2}$$. So $$2x = 60°$$ or $$2x = 180° - 60° = 120°$$.\n- Step 2: $$2x = 60° \\Rightarrow x = 30°$$. $$2x = 120° \\Rightarrow x = 60°$$. Both are in range.\n- Step 3: Check: $$\\sin(2 \\times 30°) = \\sin 60° = \\frac{\\sqrt{3}}{2}$$ ✓ and $$\\sin(2 \\times 60°) = \\sin 120° = \\frac{\\sqrt{3}}{2}$$ ✓. Two solutions: $$x = 30°$$ and $$x = 60°$$.", "source": "GLM 5.1 ③", "_id": "glm_3_64", "judge_pick": false}], "count": 65}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "When integrating a term like $ x^n $, what is the rule for handling the power and coefficient? Contrast this with differentiation. (3 steps)", "answer": "- Step 1: **Integration**: Add 1 to the power, then divide by the new power.  \n  Example: $ \\int x^n dx = \\frac{x^{n+1}}{n+1} + C $ (for $ n \\neq -1 $).  \n- Step 2: **Differentiation**: Multiply by the original power, then subtract 1 from the power.  \n  Example: $ \\frac{d}{dx} x^n = n x^{n-1} $.  \n- Step 3: **Key contrast**: Integration increases the power (e.g., $ x^2 \\to x^3 $), while differentiation reduces it (e.g., $ x^3 \\to x^2 $). Sign errors often arise in negative/fractional powers (e.g., $ x^{-2} \\to -x^{-1} $ for integration, not $ x^{-1} $).  \n\n**Takeaway**: Always verify the direction of the operation (integrate vs differentiate) before manipulating powers.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": true}, {"question": "Why does the integral of $ -3x^{-2} $ give $ +3x^{-1} $ instead of $ -3x^0 $? (2 steps)", "answer": "- Step 1: Apply the integration rule: Add 1 to the power and divide by the new power.  \n  $-3x^{-2} \\to -3 \\cdot \\frac{x^{-1}}{-1} = 3x^{-1}$.  \n- Step 2: The negative power inverts the sign during division:  \n  Dividing by $-1$ flips $-3$ to $+3$. This is why $ \\int -3x^{-2} dx = 3x^{-1} + C $.  \n\n**Takeaway**: Negative exponents amplify sign sensitivity during integration.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": true}, {"question": "How does the horizontal asymptote behave under a $ y = f(-x) $ transformation? Why?", "answer": "A horizontal asymptote $ y = k $ remains unchanged under $ y = f(-x) $.  \n- Horizontal reflections (like $ f(-x) $) only flip the graph left-to-right, preserving vertical behavior (asymptotes).  \n- Example: If $ f(x) $ approaches $ y = 1 $ as $ x \\to \\infty $, then $ f(-x) $ approaches $ y = 1 $ as $ x \\to -\\infty $.  \n\n**Misconception**: Horizontal asymptotes are unaffected by horizontal reflections.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Why is premature rounding (e.g., writing 0.6830 instead of 0.6827) problematic in exams?", "answer": "- Step 1: Exams specify precision (e.g., \"4 decimal places\") to ensure consistency.  \n- Step 2: Rounding too early introduces cumulative errors in subsequent calculations:  \n  Example: If $ \\sin x = 0.6827 $, but you use 0.6830, the inverse sine calculation becomes inaccurate ($ 43.05^\\circ $ vs $ 43.03^\\circ $).  \n- Step 3: Follow-through errors may be forgiven, but the initial mark for accuracy is lost.  \n\n**Takeaway**: Carry full calculator values until the final step, then round exactly as instructed.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "How does the period of $ y = \\sin 2x $ compare to $ y = \\sin x $? Why does this happen? (2 steps)", "answer": "- Step 1: The period of $ \\sin x $ is $ 360^\\circ $, while $ \\sin 2x $ has a period of $ 180^\\circ $.  \n- Step 2: The coefficient inside the sine function (e.g., 2 in $ \\sin 2x $) compresses the graph horizontally by a factor of 2. This halves the period:  \n  $ \\text{Period} = \\frac{360^\\circ}{2} = 180^\\circ $.  \n\n**Visual intuition**: Two full waves of $ \\sin 2x $ fit into the space of one wave of $ \\sin x $.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Why does $ \\sin(180^\\circ - \\alpha) = \\sin \\alpha $? Use symmetry to explain.", "answer": "- The sine curve is symmetric about $ 90^\\circ $ (for $ 0^\\circ < \\alpha < 90^\\circ $).  \n- $ \\sin(180^\\circ - \\alpha) $ reflects $ \\alpha $ across the line $ x = 90^\\circ $, landing in the second quadrant where sine remains positive.  \n- Example: $ \\sin 150^\\circ = \\sin(180^\\circ - 30^\\circ) = \\sin 30^\\circ = 0.5 $.  \n\n**Contrast**: $ \\sin(180^\\circ + \\alpha) = -\\sin \\alpha $ because it falls in the third quadrant where sine is negative.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "How many solutions does $ \\sin 2x = p $ have in $ 0^\\circ < x < 180^\\circ $? Why? (2 steps)", "answer": "- Step 1: The equation $ \\sin 2x = p $ implies $ 2x = \\alpha $ or $ 180^\\circ - \\alpha $, where $ \\alpha = \\sin^{-1} p $.  \n- Step 2: Solving for $ x $:  \n  $ x = \\frac{\\alpha}{2} $ and $ x = 90^\\circ - \\frac{\\alpha}{2} $.  \n  Both solutions lie in $ 0^\\circ < x < 180^\\circ $ because $ 0^\\circ < \\alpha < 90^\\circ $.  \n\n**Takeaway**: The double angle compresses solutions into the interval, yielding two distinct answers.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "What is the correct method to find $ A $ from $ f''(x) = 0 $ in Q7(a)? Highlight the critical steps. (3 steps)", "answer": "- Step 1: Rewrite $ f'(x) = 2x^{-1/2} + Ax^{-2} + 3 $ as a sum of terms with explicit powers.  \n- Step 2: Differentiate term-by-term:  \n  $ f''(x) = -x^{-3/2} - 2A x^{-3} $.  \n- Step 3: Substitute $ x = 4 $ into $ f''(x) $:  \n  $ -4^{-3/2} - 2A \\cdot 4^{-3} = 0 \\Rightarrow -\\frac{1}{8} - \\frac{A}{32} = 0 \\Rightarrow A = -4 $.  \n\n**Critical error to avoid**: Invalid differentiation steps (e.g., incorrect power reduction) nullify the answer.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": true}, {"question": "Why is it invalid to reject a root based on the discriminant of a factorized polynomial? Use Q6’s solution as an example.", "answer": "- Step 1: In Q6, $ 2u^2 - 15u - 50 = 0 $ factors to $ (2u + 5)(u - 10) = 0 $, giving $ u = 10 $ or $ u = -2.5 $.  \n- Step 2: $ u = -2.5 $ is rejected because $ u = x^2 \\geq 0 $ (squares are non-negative).  \n- Step 3: The discriminant of $ u^2 + 2u + 12 $ (from substitution) is negative, but this applies only after valid factorization. Invalid rejections (e.g., discarding roots without justification) lose marks.  \n\n**Takeaway**: Always state the reason for rejection (e.g., \"a square cannot be negative\").", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "How should you sketch $ y = f(-x) $ given a graph with minimum at $ (-1, 0) $ and asymptote $ y = 1 $?", "answer": "- Step 1: Reflect all coordinates across the y-axis:  \n  - New minimum: $ (1, 0) $.  \n  - New maximum: $ (-\\frac{3}{2}, 2) $.  \n- Step 2: Keep the horizontal asymptote $ y = 1 $ unchanged, as horizontal reflections do not affect horizontal asymptotes.  \n- Step 3: Draw the curve asymptotic to $ y = 1 $, ensuring the transformed points align with the reflected shape.  \n\n**Misconception**: Points alone are insufficient—focus on the curve’s shape and asymptote for full marks.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}], "count": 10}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Explain why integrating $-3x^{-2}$ results in $+3x^{-1} + c$ instead of $-3x^0 + c$, and how this misconception appeared in Q1's mistake. (3 steps)", "answer": "- Step 1: Recall the integration power rule: Add 1 to the exponent and divide by the new power.  \n- Step 2: Apply to $-3x^{-2}$:  \n  $-3 \\cdot \\frac{x^{-2+1}}{-2+1} = -3 \\cdot \\frac{x^{-1}}{-1} = +3x^{-1}$.  \n+ The negative exponent becomes -1 → 0 denominator, but dividing by -1 flips the sign.  \n- Step 3: Contrast with differentiation: Differentiating $x^{-2}$ would subtract 1 from the exponent, leading to $-2x^{-3}$, which explains why the user mistakenly reduced the exponent here.  \n\n**Key Insight:** The sign flips only when dividing by a negative coefficient (from adding 1 to the exponent). Differentiation steps are the reverse!", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Why does reflecting $y = f(x)$ across the y-axis (to get $y = f(-x)$) leave the horizontal asymptote unchanged? Use Q4(ii)'s error to explain.", "answer": "- Step 1: A horizontal asymptote describes the behavior of $y$ as $x \\to \\pm\\infty$.  \n- Step 2: Reflecting across the y-axis (substituting $x$ with $-x$) does not alter $y$-values at extreme $x$; it only reverses the direction of $x$.  \n+ Example: If $f(x) \\to 1$ as $x \\to \\infty$, then $f(-x) \\to 1$ as $x \\to -\\infty$.  \n- Step 3: In Q4(ii), the user incorrectly mirrored the asymptote from $y=1$ to $y=-1$ by treating it as a vertical shift, but horizontal asymptotes are invariant under horizontal reflections.  \n\n**Takeaway:** Horizontal asymptotes are unaffected by horizontal transformations (like reflections over the y-axis or horizontal stretches/compressions).", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "How does the period of $y = \\sin 2x$ differ from $y = \\sin x$, and why does solving $\\sin 2x = p$ in $0^\\circ < x < 180^\\circ$ yield two solutions? (3 steps)", "answer": "- Step 1: The period of $\\sin x$ is $360^\\circ$. For $\\sin 2x$, the coefficient $2$ compresses the graph horizontally by a factor of $2$, making the period $180^\\circ$.  \n- Step 2: Solve $\\sin 2x = p$:  \n  $2x = \\alpha \\implies x = \\alpha/2$ (acute solution), and  \n  $2x = 180^\\circ - \\alpha \\implies x = 90^\\circ - \\alpha/2$ (obtuse solution).  \n+ Since the period is $180^\\circ$, both solutions fall within $0^\\circ < x < 180^\\circ$.  \n- Step 3: Contrast with $\\sin x = p$: Only one solution ($x = \\alpha$) in $0^\\circ < x < 180^\\circ$ exists without the horizontal compression.  \n\n**Visual Intuition:** Doubling the angle inside the sine function creates two waves in the same interval, enabling two roots for a given $p$.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": true}, {"question": "Why did the sine rule calculation in Q2(a) lose a mark for accuracy, and how could this have been avoided?", "answer": "- Step 1: The question required $\\sin x$ to 4 decimal places. The user calculated $21 \\sin 25^\\circ / 13 \\approx 0.6830$, but the precise value is $0.6827$.  \n- Step 2: Premature rounding of intermediate steps (e.g., $\\sin 25^\\circ \\approx 0.4226$) introduced an error.  \n+ Fix: Carry the full calculator value (e.g., $\\sin 25^\\circ \\approx 0.42261826...$) through all steps, only rounding at the final answer.  \n- Step 3: In exams, always verify if rounding intermediate steps is allowed. For mark schemes, accuracy is assessed on the final answer, not intermediate steps.  \n\n**Rule:** Never round until the last line unless explicitly instructed.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Explain the sign error in Q7(b) when integrating $2x^{-1/2}$ and how it affects the constant $c$.", "answer": "- Step 1: Integrate $2x^{-1/2}$:  \n  $2 \\cdot \\frac{x^{-1/2 + 1}}{-1/2 + 1} = 2 \\cdot \\frac{x^{1/2}}{1/2} = 4x^{1/2}$.  \n+ The exponent increases from $-1/2$ to $1/2$, and dividing by $1/2$ multiplies the coefficient by $2$.  \n- Step 2: Dropping the fractional power (e.g., writing $4x$ instead of $4\\sqrt{x}$) leads to incorrect substitution in later steps.  \n- Step 3: In Q7(b), this error propagated into solving for $c$, resulting in $c = -84$ instead of $c = -109/3$.  \n\n**Takeaway:** Fractional powers and their conversion to roots are critical in both integration and substitution steps.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "What is the relationship between the symmetry of $\\sin(180^\\circ - \\alpha)$ and $\\sin(180^\\circ + \\alpha)$, and how does this apply to Q9(a)(iii)?", "answer": "- Step 1: $\\sin(180^\\circ - \\alpha) = \\sin \\alpha$ because sine is positive in the second quadrant.  \n- Step 2: $\\sin(180^\\circ + \\alpha) = -\\sin \\alpha$ because sine is negative in the third quadrant.  \n+ Example: If $\\sin \\alpha = p$, then $\\sin(180^\\circ + \\alpha) = -p$.  \n- Step 3: In Q9(a)(iii), $3 + \\sin(180^\\circ + \\alpha) = 3 + (-p) = 3 - p$.  \n\n**Key Insight:** Symmetry identities depend on the quadrant, which determines the sign.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}], "count": 6}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "Explain why integrating $$x^n$$ requires adding 1 to the power and dividing by the new power, and why $$-3x^{-2}$$ integrates to $$\\frac{3}{x}$$. (3 steps)", "answer": "- Step 1: The fundamental idea is that differentiation and integration are inverse operations. When we differentiate $$x^n$$, we get $$nx^{n-1}$$. To reverse this, we need a function whose derivative gives us back the original power.\n- Step 2: If we integrate $$x^n$$, we want a function $$F(x)$$ such that $$F'(x) = x^n$$. Let $$F(x) = x^{n+1}$$. Differentiating: $$F'(x) = (n+1)x^n$$, so we need to divide by $$(n+1)$$ to get exactly $$x^n$$. Thus $$\\int x^n dx = \\frac{x^{n+1}}{n+1} + c$$.\n+ The \"add 1 to power, divide by new power\" rule comes directly from this reasoning\n- Step 3: For $$-3x^{-2}$$, we have $$n = -2$$. Adding 1: $$-2 + 1 = -1$$. Dividing by $$-1$$ gives $$-3 \\div (-1) = +3$$. The power becomes $$-1$$, so we get $$3x^{-1} = \\frac{3}{x}$$.\n+ The sign flips because dividing by a negative number changes the sign — this is a common source of error\n\n**Takeaway:** Integration raises the power; differentiation lowers it. Always check the sign when the original power is negative.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": true}, {"question": "When integrating $$\\int(10x^5 + 6x^3 - \\frac{3}{x^2})dx$$, one student rewrote it correctly as $$\\int(10x^5 + 6x^3 - 3x^{-2})dx$$ but then differentiated instead of integrating, getting $$50x^4 + 18x^2 + 6x^{-1}$$. Explain the conceptual error and give the correct integral. (2 steps)", "answer": "- Step 1: The student confused the direction of calculus operations. Differentiation reduces each power by 1 (multiplying by the original power), while integration increases each power by 1 (dividing by the new power). The student's answer shows powers being reduced: $$x^5 \\to x^4$$, $$x^3 \\to x^2$$, $$x^{-2} \\to x^{-1}$$ — this is differentiation.\n- Step 2: The correct integration raises each power:\n+ $$\\int 10x^5 dx = \\frac{10x^6}{6} = \\frac{5x^6}{3}$$\n+ $$\\int 6x^3 dx = \\frac{6x^4}{4} = \\frac{3x^4}{2}$$\n+ $$\\int -3x^{-2} dx = -3 \\cdot \\frac{x^{-1}}{-1} = 3x^{-1} = \\frac{3}{x}$$\n+ Final answer: $$\\frac{5x^6}{3} + \\frac{3x^4}{2} + \\frac{3}{x} + c$$\n\n**Takeaway:** If your powers are getting smaller, you're differentiating. If they're getting larger, you're integrating.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "For the indefinite integral $$\\int(10x^5 + 6x^3 - \\frac{3}{x^2})dx$$, the mark scheme awards only 1 mark for rewriting $$\\frac{3}{x^2}$$ as $$3x^{-2}$$ but awards zero accuracy marks for the answer $$\\frac{5x^6}{3} + \\frac{3x^4}{2} + 3x + c$$. Why does this answer score zero accuracy marks? (2 steps)", "answer": "- Step 1: The mark scheme demands \"fully correct and simplified with +c all on one line.\" The student's answer has multiple issues: the terms are not combined on a single simplified line, and critically, the last term is wrong — they wrote $$3x$$ instead of $$\\frac{3}{x}$$.\n- Step 2: The term $$\\frac{3}{x}$$ must remain as a reciprocal ($$x^{-1}$$ or $$\\frac{3}{x}$$), not become $$3x$$. Writing $$3x$$ is the error of confusing $$x^{-1}$$ with $$x^1$$ — they are completely different. The correct answer is $$\\frac{5x^6}{3} + \\frac{3x^4}{2} + \\frac{3}{x} + c$$ or equivalently $$\\frac{5}{3}x^6 + \\frac{3}{2}x^4 + \\frac{3}{x} + c$$.\n\n**Takeaway:** \"Simplest form\" means no fractions within fractions, powers simplified, and the +c clearly shown. Never confuse $$x^{-1}$$ with $$x^1$$.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "In Q7, given $$f'(x) = \\frac{2}{\\sqrt{x}} + \\frac{A}{x^2} + 3$$ and $$f''(4) = 0$$, one student correctly found $$A = -4$$ but lost all 4 marks because their differentiation was invalid. Why does a correct final answer from invalid working score zero marks? (2 steps)", "answer": "- Step 1: The mark scheme principle is that examiners must verify the method, not just the answer. If the working is mathematically invalid, there's no way to confirm the student didn't obtain the answer by guessing, calculator manipulation, or flawed logic that happened to land on the right number.\n- Step 2: The student likely differentiated $$\\frac{2}{\\sqrt{x}} = 2x^{-1/2}$$ incorrectly (reducing the power by 1 instead of properly applying the power rule) or mishandled the constant. Even though $$-4$$ is the right answer, the invalid differentiation steps mean the answer cannot be credited. The valid route requires showing: $$f'(x) = 2x^{-1/2} + Ax^{-2} + 3$$, then $$f''(x) = 2(-\\frac{1}{2})x^{-3/2} + A(-2)x^{-3} = -x^{-3/2} - 2Ax^{-3}$$, then substituting $$x = 4$$ and solving.\n\n**Takeaway:** Always show valid working — the method matters as much as the answer, especially in \"show all stages\" questions.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "Differentiate $$f'(x) = 2x^{-1/2} + Ax^{-2} + 3$$ to find $$f''(x)$$, and then set $$f''(4) = 0$$ to find $$A$$. Show all steps with the powers handled correctly. (3 steps)", "answer": "- Step 1: Rewrite each term with proper power notation: $$2x^{-1/2} + Ax^{-2} + 3 = 2x^{-1/2} + A \\cdot x^{-2} + 3x^0$$\n- Step 2: Differentiate each term using the power rule: multiply by the power, subtract 1 from the power\n+ For $$2x^{-1/2}$$: $$2 \\cdot (-\\frac{1}{2}) x^{-3/2} = -x^{-3/2}$$\n+ For $$Ax^{-2}$$: $$A \\cdot (-2) x^{-3} = -2A x^{-3}$$\n+ For $$3$$: $$0$$ (derivative of a constant)\n+ So $$f''(x) = -x^{-3/2} - 2A x^{-3}$$\n- Step 3: Substitute $$x = 4$$ and set equal to 0:\n+ $$-4^{-3/2} - 2A \\cdot 4^{-3} = 0$$\n+ Calculate: $$4^{-3/2} = \\frac{1}{4^{3/2}} = \\frac{1}{8}$$ and $$4^{-3} = \\frac{1}{64}$$\n+ $$-\\frac{1}{8} - \\frac{2A}{64} = 0 \\Rightarrow -\\frac{1}{8} - \\frac{A}{32} = 0$$\n+ $$-\\frac{1}{8} = \\frac{A}{32} \\Rightarrow A = -4$$\n\n**Takeaway:** Fractional powers like $$x^{-1/2}$$ require careful handling. Remember: $$-1/2 - 1 = -3/2$$ for the new power.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "In Q7(b), one student integrated correctly but dropped a power, writing $$f(x) = 4\\sqrt{x} + \\frac{4}{x} + 3x + c$$ instead of the correct $$f(x) = 4\\sqrt{x} + \\frac{4}{x} + 3x - \\frac{109}{3}$$. Where did the power-dropping error occur? (2 steps)", "answer": "- Step 1: The error occurred in integrating the term $$\\frac{A}{x^2} = -\\frac{4}{x^2} = -4x^{-2}$$. The student likely wrote the result as $$\\frac{4}{x}$$ (which is $$4x^{-1}$$) instead of correctly recognizing that:\n+ $$-4x^{-2}$$ integrates to $$-4 \\cdot \\frac{x^{-1}}{-1} = 4x^{-1} = \\frac{4}{x}$$\n+ Wait — that actually gives $$\\frac{4}{x}$$, which looks right. Let me reconsider.\n- Step 2: Actually, the error is more subtle. The correct integration is:\n+ $$\\int 2x^{-1/2} dx = 2 \\cdot \\frac{x^{1/2}}{1/2} = 2 \\cdot 2x^{1/2} = 4x^{1/2} = 4\\sqrt{x}$$\n+ $$\\int -4x^{-2} dx = -4 \\cdot \\frac{x^{-1}}{-1} = 4x^{-1} = \\frac{4}{x}$$\n+ $$\\int 3 dx = 3x$$\n+ So the integral is $$4\\sqrt{x} + \\frac{4}{x} + 3x + c$$. The student got this part right.\n+ The error was in calculating the constant $$c$$ when substituting $$f(12) = 8\\sqrt{3}$$. The student likely made an arithmetic error or incorrectly simplified $$\\frac{4}{12} = \\frac{1}{3}$$ and then combined terms wrong.\n\n**Takeaway:** The integration itself is correct, but when substituting to find $$c$$, every term must be evaluated precisely. Check each substitution step carefully.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "In Q2, the correct value is $$\\sin x = \\frac{21 \\sin 25^\\circ}{13} = 0.6827$$ to 4 decimal places, but one student wrote 0.6830 and lost the accuracy mark. Why is premature rounding fatal in accuracy-based questions? (2 steps)", "answer": "- Step 1: The question explicitly asks for \"4 decimal places\" — this is a precision requirement, not a suggestion. Writing 0.6830 is actually 4 decimal places, but it's the wrong 4 decimal places. The correct value 0.6827 comes from carrying full calculator precision (0.68269...) and rounding only at the final step.\n- Step 2: The student likely rounded during calculation: they might have used sin 25° ≈ 0.4226 (2 dp) internally, then multiplied by 21 and divided by 13, accumulating rounding error at each step. This \"intermediate rounding\" compounds errors. The rule: carry full calculator accuracy through every step, round only once at the end to exactly the precision requested.\n\n**Takeaway:** Precision requirements (dp, sf) mean carry full accuracy and round once at the end. Intermediate rounding introduces error that grows with each step.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": true}, {"question": "In triangle ABC with AB = 21 cm, BC = 13 cm, ∠BAC = 25°, use the sine rule to find sin x° where x is at angle ACB. Given AB is the longest side, why must x be obtuse (136.95° not 43.05°)? (3 steps)", "answer": "- Step 1: Apply the sine rule: $$\\frac{\\sin A}{a} = \\frac{\\sin B}{b} = \\frac{\\sin C}{c}$$. Here $$\\frac{\\sin x}{21} = \\frac{\\sin 25^\\circ}{13}$$, so $$\\sin x = \\frac{21 \\sin 25^\\circ}{13} = 0.6827$$ (4 dp).\n- Step 2: The acute solution is $$x = \\sin^{-1}(0.6827) = 43.05^\\circ$$. However, sine is positive in both Quadrant I and Quadrant II, so the supplementary angle $$180^\\circ - 43.05^\\circ = 136.95^\\circ$$ also has sin = 0.6827.\n- Step 3: The question states \"AB is the longest side.\" In any triangle, the longest side is opposite the largest angle. Since AB = 21 cm > BC = 13 cm, angle C (opposite AB) must be the largest angle. Therefore angle C must be the obtuse solution 136.95°, not the acute 43.05°.\n\n**Takeaway:** When given side longest → angle largest → use obtuse solution. The key insight is in the question wording — always read for constraints that determine which case to take.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "For the graph transformation y = f(-x), one student correctly found the new coordinates of the turning points (P at (-1, 0) becomes (1, 0), Q at (2/3, 2) becomes (-2/3, 2)) but lost all 3 marks because the asymptote was wrong. Why does y = f(-x) leave the horizontal asymptote y = 1 unchanged? (2 steps)", "answer": "- Step 1: The transformation y = f(-x) reflects the graph in the y-axis — it changes the x-coordinate sign but leaves y-values unchanged. Every point (x, y) becomes (-x, y). This is a horizontal reflection only.\n- Step 2: The horizontal asymptote y = 1 represents a y-value that the graph approaches. Since y-values don't change in a y-axis reflection, the asymptote's y-coordinate stays at 1. The student incorrectly wrote y = 1 → y = -1, but that would happen with y = -f(x) (reflection in x-axis), not y = f(-x). The correct transformed asymptote remains y = 1.\n\n**Takeaway:** Know which transformations affect which asymptotes: y-axis reflection (f(-x)) → horizontal asymptote unchanged; x-axis reflection (-f(x)) → horizontal asymptote flips sign; vertical shifts → horizontal asymptote moves with the shift.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": true}, {"question": "For the original graph y = f(x) with minimum at P(-1, 0), maximum at Q(2/3, 2), and asymptote y = 1, sketch y = f(-x). State the new coordinates of P and Q, the asymptote, and describe the shape. (3 steps)", "answer": "- Step 1: The transformation y = f(-x) reflects in the y-axis: each point (x, y) → (-x, y). The minimum at P(-1, 0) becomes P'(1, 0), and the maximum at Q(2/3, 2) becomes Q'(-2/3, 2).\n- Step 2: The horizontal asymptote y = 1 stays unchanged (y-values don't change in y-axis reflection), so the asymptote remains y = 1.\n- Step 3: The overall shape is a mirror image of the original across the y-axis. The original had the minimum on the left of the y-axis and maximum on the right; after reflection, the maximum is now on the left (Quadrant II) and minimum on the right (Quadrant I). The curve approaches y = 1 at both ends, just mirrored.\n\n**Takeaway:** Sketch transformations systematically: transform each feature (turning points, intercepts, asymptotes) according to the transformation rule, then verify the overall shape makes sense.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "For y = f(x) - 2 (vertical translation down 2), state the new coordinates of the minimum at P(-1, 0) and maximum at Q(2/3, 2), and the new asymptote. Why does the shape stay the same? (2 steps)", "answer": "- Step 1: A vertical translation affects only y-coordinates: subtract 2 from every y-value. P(-1, 0) → P'(-1, -2), Q(2/3, 2) → Q'(2/3, 0). The asymptote y = 1 also shifts down: y = 1 → y = -1.\n- Step 2: The shape stays identical because we're only moving every point down — the relationship between points and the curve's curvature don't change. Only the vertical position shifts. This is why translation is the simplest transformation: the curve's shape is preserved, just repositioned.\n\n**Takeaway:** Vertical translation: y-coordinates change, x-coordinates stay the same, shape preserved. Horizontal asymptote moves with the translation.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": true}, {"question": "In Q9(a), given sin α = p where 0 < α < 90°, find in terms of p: (i) 2 sin(180° - α), (ii) sin(α - 180°), (iii) 3 + sin(180° + α). Explain using trig symmetry. (3 steps)", "answer": "- Step 1: Know the key sine symmetry identities:\n+ sin(180° - α) = sin α (sine is positive in QII, equal to the QI value)\n+ sin(-α) = -sin α (sine is odd: sin(-θ) = -sin θ)\n+ sin(180° + α) = -sin α (sine is negative in QIII)\n- Step 2: Apply each:\n+ (i) 2 sin(180° - α) = 2 × sin α = 2p\n+ (ii) sin(α - 180°) = sin(-(180° - α)) = -sin(180° - α) = -sin α = -p\n+ (iii) 3 + sin(180° + α) = 3 + (-sin α) = 3 - p\n- Step 3: These identities come from the unit circle: sin gives the y-coordinate. Reflecting across the y-axis (180° - α) keeps the same y-coordinate; rotating 180° flips the sign; shifting by additional α continues the pattern.\n\n**Takeaway:** Master the three essential symmetries: sin(180° - α) = sin α, sin(-α) = -sin α, sin(180° + α) = -sin α. These are the foundation for solving trig equations.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "Sketch y = sin 2x for 0° < x < 360°. What is the period and how does it compare to y = sin x? How many complete waves fit in 0° to 360°? (2 steps)", "answer": "- Step 1: The \"2\" inside the function (sin 2x) creates a horizontal compression by factor of 2. The period of sin x is 360°, so the period of sin 2x is 360° ÷ 2 = 180°. This is because sin(2x) completes a full cycle when 2x goes from 0° to 360°, i.e., when x goes from 0° to 180°.\n- Step 2: In the interval 0° to 360°, we now fit 2 complete waves (two periods of 180° each). The graph starts at the origin (0, 0), reaches amplitude 1 at 45°, returns to 0 at 90°, goes to -1 at 135°, back to 0 at 180°, then repeats. Key x-intercepts at 0°, 90°, 180°, 270°, 360°.\n\n**Takeaway:** y = sin(ax) has period 360°/a. The \"a\" compresses horizontally (makes period shorter). Two full waves of sin 2x fit where one wave of sin x fits.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "In Q9(c), given sin α = p and solving sin 2x = p for 0 < x < 180°, the solutions are x = α/2 and x = 90° - α/2. Explain why both solutions are valid and why there are no others in this range. (3 steps)", "answer": "- Step 1: We need to solve sin 2x = sin α = p. Let θ = 2x. Then sin θ = sin α. For 0 < x < 180°, we have 0 < θ < 360° (doubling the range).\n- Step 2: In the range 0° to 360°, sin θ = sin α has two solutions:\n+ θ = α (Quadrant I): gives x = α/2\n+ θ = 180° - α (Quadrant II, the supplement): gives x = (180° - α)/2 = 90° - α/2\nBoth are in the range because α is between 0° and 90°, so α/2 is between 0° and 45°, and 90° - α/2 is between 45° and 90° — both valid.\n- Step 3: There are no other solutions because:\n+ For θ in Quadrant III (180° to 360°), sin is negative, but p = sin α is positive (α in QI)\n+ For θ = α + 360° = 360° + α > 360°, outside our range\n+ So exactly two solutions in 0 < x < 180°.\n\n**Takeaway:** When solving sin θ = sin α in a range, always find both the QI solution (θ = α) and the QII solution (θ = 180° - α). Then divide by any coefficient to find x.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "In Q6, solving 2x⁴ - 15x² - 50 = 0 via substitution u = x² gives u = 10 or u = -5/2. Why must we reject u = -5/2 and what is the correct reasoning? (2 steps)", "answer": "- Step 1: The substitution u = x² transforms the quartic into a quadratic: 2u² - 15u - 50 = 0, which factors to (2u + 5)(u - 10) = 0. This gives u = 10 or u = -5/2.\n- Step 2: We reject u = -5/2 because u = x² represents a squared quantity. By definition, any real number squared is non-negative (≥ 0). Therefore x² cannot equal a negative number. We must state this rejection explicitly: \"Reject u = -5/2 because x² ≥ 0 for real x.\" This scores the method mark. The valid solution is u = 10, so x² = 10, giving x = ±√10.\n\n**Takeaway:** Always reject impossible roots with a reason. For u = x², reject negatives. For u = √x, reject negatives. The reason is part of the mark.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "For Q7(b), find f(x) given f'(x) = 2/√x + A/x² + 3 with A = -4, and f(12) = 8√3. Show how to find the constant c correctly, identifying where precision matters. (3 steps)", "answer": "- Step 1: Substitute A = -4 and integrate:\n+ f'(x) = 2x^{-1/2} - 4x^{-2} + 3\n+ ∫2x^{-1/2} dx = 2 × (x^{1/2}/(1/2)) = 4x^{1/2} = 4√x\n+ ∫-4x^{-2} dx = -4 × (x^{-1}/-1) = 4x^{-1} = 4/x\n+ ∫3 dx = 3x\n+ So f(x) = 4√x + 4/x + 3x + c\n- Step 2: Use f(12) = 8√3:\n+ 4√12 + 4/12 + 3(12) + c = 8√3\n+ Calculate each: √12 = 2√3, so 4√12 = 4 × 2√3 = 8√3 ✓\n+ 4/12 = 1/3\n+ 3(12) = 36\n+ So: 8√3 + 1/3 + 36 + c = 8√3\n+ Simplify: c = -36 - 1/3 = -(108/3 + 1/3) = -109/3\n- Step 3: Final answer: f(x) = 4√x + 4/x + 3x - 109/3\n\n**Takeaway:** When substituting, evaluate each term precisely. The 4√12 term exactly cancels 8√3, leaving just the constant terms. Watch for exact cancellations.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "In Q4(ii), the student drew the correct new coordinates for P and Q but got B0 B0 B0 (zero) for the sketch. Explain why coordinates alone don't score when the curve shape is wrong. (2 steps)", "answer": "- Step 1: The mark scheme allocates marks specifically for: (B1) correct shape/curve, (B1) correct asymptote, (B1) correct coordinates of turning points. These are separate assessment objectives — you need all three to score.\n- Step 2: The student got the coordinates right but drew the wrong curve (perhaps reflected incorrectly) and moved the asymptote (wrote y = 1 → y = -1). Since the curve and asymptote are wrong, those marks are lost. The coordinates being correct is necessary but not sufficient — the whole picture must be correct.\n\n**Takeaway:** In transformation sketches, you need three elements: (1) the correct transformed curve shape, (2) the correct asymptote (if any), (3) the correct coordinates. All three score independently.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "What are the rules for how each graph transformation affects horizontal and vertical asymptotes? (2 steps)", "answer": "- Step 1: Vertical asymptotes (x = k):\n+ y = f(x) + a: unchanged (vertical position doesn't affect x-values where denominator = 0)\n+ y = f(x) - a: unchanged\n+ y = f(x - a): shifts to x = a (horizontal shift)\n+ y = f(x + a): shifts to x = -a\n+ y = f(-x): unchanged (y-axis reflection doesn't create new vertical asymptotes)\n+ y = -f(x): unchanged\n- Step 2: Horizontal asymptotes (y = k):\n+ y = f(x) + a: shifts to y = k + a (moves with the graph)\n+ y = f(x) - a: shifts to y = k - a\n+ y = f(x - a): unchanged\n+ y = f(-x): unchanged (y-axis reflection doesn't change y-approach)\n+ y = -f(x): flips to y = -k (x-axis reflection changes y-approach)\n+ y = af(x): if a > 0, asymptote becomes y = ak; if a < 0, becomes y = ak\n\n**Takeaway:** Horizontal shifts affect vertical asymptotes; vertical shifts affect horizontal asymptotes. Reflections in y-axis keep horizontal asymptotes; reflections in x-axis flip them.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "In the extra calculus practice, given f'(x) = (3/2)√x + A with f'(4) = 10, find A. Then integrate to find f(x) given f(4) = 12, and solve f(x) = 0 using u = √x. Show all steps. (4 steps)", "answer": "- Step 1: Find A: f'(4) = (3/2)√4 + A = (3/2)(2) + A = 3 + A = 10, so A = 7.\n- Step 2: Integrate f'(x) = (3/2)x^{1/2} + 7:\n+ ∫(3/2)x^{1/2} dx = (3/2) × (x^{3/2}/(3/2)) = x^{3/2}\n+ ∫7 dx = 7x\n+ f(x) = x^{3/2} + 7x + c\n- Step 3: Find c using f(4) = 12: 4^{3/2} = (√4)³ = 2³ = 8, so 8 + 7(4) + c = 12 → 8 + 28 + c = 12 → c = -24. Thus f(x) = x^{3/2} + 7x - 24.\n- Step 4: Solve f(x) = 0 using u = √x (so x = u², x^{3/2} = u³):\n+ u³ + 7u² - 24 = 0 → (u - 2)(u² + 2u + 12) = 0\n+ u = 2 or u² + 2u + 12 = 0\n+ Quadratic: discriminant = 4 - 48 = -44 < 0, no real roots\n+ So u = 2, giving √x = 2, so x = 4.\n\n**Takeaway:** The u = √x substitution transforms equations with fractional powers into polynomials. Always check the quadratic factor for real roots — negative discriminant means no real solutions.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "For indices simplification like (9^{2x+1} × 27^{3x-3}) / 27^{2x-a}, explain how to simplify to a single base and then combine exponents. (2 steps)", "answer": "- Step 1: Express everything to a common base. Here base 3 is convenient: 9 = 3², 27 = 3³.\n+ 9^{2x+1} = (3²)^{2x+1} = 3^{4x+2}\n+ 27^{3x-3} = (3³)^{3x-3} = 3^{9x-9}\n+ 27^{2x-a} = (3³)^{2x-a} = 3^{6x-3a}\n- Step 2: Combine using exponent rules: when multiplying, add exponents; when dividing, subtract:\n+ Numerator: 3^{(4x+2)+(9x-9)} = 3^{13x-7}\n+ Divide by denominator: 3^{13x-7 - (6x-3a)} = 3^{13x-7-6x+3a} = 3^{7x-7+3a} = 3^{7(x-1)+3a}\n\n**Takeaway:** One common base, then add/subtract exponents. This is essential for solving exponential equations.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "In the integration drill, explain why ∫(-3x^{-2})dx = 3/x + c (not -3/x + c). What is the general rule for integrating negative powers? (2 steps)", "answer": "- Step 1: Using the power rule: ∫x^n dx = x^{n+1}/(n+1) + c, valid for n ≠ -1.\n+ Here n = -2, so n+1 = -1\n+ ∫(-3x^{-2})dx = -3 × x^{-1}/(-1) = -3 × (-1) × x^{-1} = 3x^{-1} = 3/x\n- Step 2: The key is that dividing by -1 flips the sign. The -3 outside gets multiplied by the -1 from the division, becoming +3. The general rule: when integrating x^n where n is negative, the result will have the opposite sign of the original if n+1 is negative (which it always is for n < -1).\n\n**Takeaway:** The sign flip happens because we're dividing by a negative number (n+1 when n < -1). Always check: negative power → add 1 → if result is negative, dividing gives negative of what you started with.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "Why must we include +c (the constant of integration) for indefinite integrals, and what does it represent conceptually? (1 step)", "answer": "- Step 1: Differentiation kills constants — d/dx(constant) = 0. When we integrate, we're reversing differentiation, so we can only recover the original function up to an unknown constant. That constant represents any vertical shift that would disappear upon differentiation. For example, both f(x) = x² + 5 and f(x) = x² - 3 have derivative 2x. Without additional information (like a point on the curve), we cannot determine which constant is correct.\n\n**Takeaway:** Always +c. The constant captures the \"lost information\" from differentiation — all vertical shifts look the same to the derivative.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "In Q2(b), the student got x = 136.93° instead of 136.95° because of the premature rounding in part (a). Explain the \"follow-through\" error principle and why it sometimes saves marks. (2 steps)", "answer": "- Step 1: Follow-through (ft) marks exist to avoid penalizing the same conceptual error twice. If you make a mistake in an earlier part that propagates into later parts, the later marks are sometimes awarded using your (incorrect) intermediate value, as long as the method was correct.\n- Step 2: In this case, the student used 0.6830 in part (b) instead of 0.6827, getting 136.93° instead of 136.95°. Since the method was correct and the error \"followed through\" from part (a), the marks in (b) were awarded despite the inaccuracy. However, part (a) itself was penalized for the rounding error. The principle: fix the early error to secure full marks in dependent parts.\n\n**Takeaway:** Follow-through can save marks in dependent parts, but the original error still costs. Fixing the root cause (precision in part a) fixes everything downstream.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "What does the rubric \"In this question you must show all stages of your working. Solutions relying on calculator technology are not acceptable\" mean, and how should you adapt your approach? (2 steps)", "answer": "- Step 1: This rubric appears in Q3 and Q6. It means you must write down the algebraic method step-by-step, not just type equations into your calculator and write the answer. Even if you could solve it on the calculator, you must show the valid mathematical route.\n- Step 2: What this looks like in practice:\n+ For simultaneous equations: show the substitution step, the rearrangement to standard form, the factorization or formula\n+ For quadratics: show the factorization or quadratic formula application\n+ Write every algebraic line, even if it's \"obvious\" — the examiner needs to see your method\n+ If the calculator could do it but you're not allowed to use it, write the working you'd do if the calculator didn't exist\n\n**Takeaway:** On \"show all stages\" questions, write the method as if you had no calculator. Every algebraic manipulation must be shown.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "For a triangle with sides 21 cm and 13 cm, and angle 25° opposite the 13 cm side, explain why we cannot simply use the cosine rule to find the other angles, and why the sine rule is appropriate. (2 steps)", "answer": "- Step 1: The cosine rule relates three sides and one angle: a² = b² + c² - 2bc cos A. It requires knowing two sides and the included angle to find the third side, or all three sides to find an angle. Here we know two sides and a non-included angle (21 cm and 25°, with 13 cm opposite), which is an AAS/SSA situation — not the SAS needed for cosine rule.\n- Step 2: The sine rule applies: a/sin A = b/sin B = c/sin C. We have side 13 cm opposite 25°, so we can directly find sin C = (21 sin 25°)/13. This is the SSA case (two sides and an angle not between them), which the sine rule handles. However, SSA can produce the ambiguous case (two possible angles), which is why Q2 requires choosing between acute and obtuse based on the \"longest side\" information.\n\n**Takeaway:** Use sine rule for AAS/SSA (two angles and a side, or two sides and an angle not between them). Use cosine rule for SAS (two sides and included angle) or SSS (all three sides).", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "A student integrates 5/x² and gets -5/x, but another student says this is wrong because \"the sign should stay negative.\" Explain who is correct and why. (2 steps)", "answer": "- Step 1: The correct answer is -5/x. Let's verify by differentiation: d/dx(-5/x) = d/dx(-5x^{-1}) = -5 × (-1)x^{-2} = 5x^{-2} = 5/x². This is correct — differentiating -5/x gives back 5/x².\n- Step 2: The student claiming \"the sign should stay negative\" is confusing the constant factor with the sign flip from the power rule. When integrating, we divide by the new power (n+1). If n+1 is negative (which happens when n ≤ -2), dividing flips the sign. Here n = -2, so n+1 = -1, dividing by -1 flips -5 to +5. The \"stay negative\" student is wrong — the power rule works regardless of sign.\n\n**Takeaway:** The sign flip is automatic from the division, not a separate rule to remember. Always apply \"add 1 to power, divide by new power\" — the sign takes care of itself.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "Explain the difference between precision requirements: \"to 4 decimal places,\" \"to 3 significant figures,\" \"exact form,\" and \"simplest form.\" When does each apply? (2 steps)", "answer": "- Step 1: \n+ 4 decimal places (4 dp): exactly 4 digits after the decimal point. Example: 0.6827\n+ 3 significant figures (3 sf): first non-zero digit and next two digits. Example: 0.683 (note: for numbers < 1, leading zeros don't count)\n+ Exact form: no rounding — surds, fractions, π, or exact decimals like 1/3. Example: √12 = 2√3\n+ Simplest form: fully simplified algebraic expression — combine like terms, write fractions as single terms, no unnecessary brackets\n- Step 2: The question specifies which form it wants. If it says nothing, exact is usually expected for algebraic answers. For numerical answers in context, check: \"to 4 dp\" → use dp; \"to 3 sf\" → use sf; \"exact\" → give surd/fraction; otherwise default to exact if possible.\n\n**Takeaway:** Match exactly what the question asks. 0.6830 is 4 dp but wrong value; 0.683 is 3 sf and might be right for that precision. Different requirements yield different answers.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "For the transformation y = f(x) + a (vertical translation up a), y = f(x) - a (down a), y = f(x - a) (right a), y = f(x + a) (left a), y = f(-x) (y-axis reflection), y = -f(x) (x-axis reflection), summarize the effect on coordinates of turning points. (1 step)", "answer": "| Transformation | Effect on point (x, y) | Effect on asymptotes |\n|----------------|----------------------|---------------------|\n| y = f(x) + a | (x, y + a) | Horizontal asymptote shifts up a |\n| y = f(x) - a | (x, y - a) | Horizontal asymptote shifts down a |\n| y = f(x - a) | (x + a, y) | Vertical asymptote shifts right a |\n| y = f(x + a) | (x - a, y) | Vertical asymptote shifts left a |\n| y = f(-x) | (-x, y) | Horizontal asymptote unchanged |\n| y = -f(x) | (x, -y) | Horizontal asymptote flips sign |\n\n**Takeaway:** Horizontal transformations affect x-coordinates; vertical transformations affect y-coordinates. Reflections flip the relevant coordinate sign.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "In Q9(b), one student sketched sin 2x with the correct period of 180° but drew it starting at (90°, 0) instead of (0, 0). Why is the starting point important and what is the correct starting behavior? (2 steps)", "answer": "- Step 1: sin 2x = 0 when 2x = 0°, 180°, 360°, ... so x = 0°, 90°, 180°, 270°, 360°. At x = 0°, sin(0) = 0, so the graph must pass through the origin (0, 0).\n- Step 2: The student who started at (90°, 0) likely confused the x-intercept with the starting point. The correct sketch passes through (0, 0), rises to (45°, 1), returns to (90°, 0), falls to (135°, -1), returns to (180°, 0). The period is 180°, and the shape is a standard sine wave compressed horizontally by factor 2.\n\n**Takeaway:** For y = sin 2x, always check: at x = 0, sin(0) = 0 → starts at origin. The first maximum is at x = 90°/2 = 45°, not at 90°.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "A student says \"I got the right answer so the method doesn't matter.\" Why is this fundamentally wrong in the context of exam marking? (1 step)", "answer": "- Step 1: Examiners must verify that you understand the correct mathematical process. A correct answer from invalid working could be: (a) guessed, (b) obtained by calculator only (not allowed in \"show all stages\" questions), (c) obtained by flawed logic that coincidentally gave the right number. In all cases, this demonstrates unreliable knowledge — tomorrow's problem might not yield to guessing. The mark scheme explicitly awards method marks (M), accuracy marks (A), and sometimes dependent method marks (dM). No method = no marks, regardless of answer.
