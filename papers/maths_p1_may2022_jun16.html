<script>
const cards = [{"q": "When applying the power rule, how does the direction of the operation (integration vs. differentiation) change the way you handle the exponent? (3 steps)", "a": "- Step 1: Differentiation is a \"reduce and multiply\" operation. You bring the power down as a multiplier and then subtract 1 from the exponent. For $$x^n$$, you get $$n \\cdot x^{n-1}$$. The exponent decreases.\n- Step 2: Integration is an \"increase and divide\" operation. You add 1 to the exponent to create a new power, and then you divide the coefficient by that new power. For $$x^n$$, you get $$\\frac{x^{n+1}}{n+1}$$. The exponent increases.\n- Step 3: The crucial distinction is the flow of the exponent: differentiation drives it down (subtracting 1), while integration drives it up (adding 1). Mixing these up reverses the entire operation.\n\nTakeaway: Differentiation shrinks the power; Integration inflates the power.", "source": "GLM 5.1"}, {"q": "When integrating a term with a negative power, such as $$-3x^{-2}$$, the sign often flips to positive in the final answer. Why does this happen mathematically? (3 steps)", "a": "- Step 1: Apply the integration power rule: add 1 to the power and divide by the new power. For $$-3x^{-2}$$, the new power is $$-2 + 1 = -1$$.\n- Step 2: Divide the coefficient by the new power. You are dividing $$-3$$ by $$-1$$.\n- Step 3: Dividing a negative by a negative yields a positive. $$-3 \\div -1 = +3$$. Therefore, the result is $$+3x^{-1}$$ or $$+\\frac{3}{x}$$. The sign flip is not magic; it is the direct result of dividing by the new, negative exponent.\n\nTakeaway: A negative power in the denominator of the integration rule causes a sign flip.", "source": "GLM 5.1"}, {"q": "How do you handle a fractional power, like $$x^{-1/2}$$, during integration? Walk through the creation of the new exponent and the division step. (3 steps)", "a": "- Step 1: Add 1 to the exponent. $$-\\frac{1}{2} + 1 = +\\frac{1}{2}$$. The new power is positive one-half.\n- Step 2: Divide the coefficient by the new power. Dividing by $$\\frac{1}{2}$$ is equivalent to multiplying by its reciprocal, 2.\n- Step 3: If the original coefficient was 2 (as in $$2x^{-1/2}$$), the new coefficient becomes $$2 \\times 2 = 4$$. The final term is $$4x^{1/2}$$ or $$4\\sqrt{x}$$.\n\nTakeaway: Dividing by a fraction inverts it; dividing by $$1/2$$ doubles the coefficient.", "source": "GLM 5.1"}, {"q": "Why is the constant of integration ($$+c$$) strictly necessary for indefinite integrals but absent in definite integration? (2 steps)", "a": "- Step 1: Indefinite integration asks for the *family* of antiderivatives. Because the derivative of any constant is 0, differentiating $$F(x) + 5$$ or $$F(x) - 12$$ yields the same $$f(x)$$. Therefore, reversing the process must account for all possible vertical shifts, represented by $$+c$$.\n- Step 2: Definite integration evaluates the antiderivative at two boundaries, $$F(b) - F(a)$$. If you added a constant $$+c$$, it would cancel out: $$(F(b) + c) - (F(a) + c) = F(b) - F(a)$$. Hence, it is unnecessary in definite integration.\n\nTakeaway: $$+c$$ represents the vertical ambiguity lost when a function is differentiated.", "source": "GLM 5.1"}, {"q": "A question asks for an answer to 4 decimal places. A student calculates an intermediate value of 0.68269, rounds it to 0.6830 for the next step, and gets a final answer of 136.93. The exact final answer is 136.95. What caused this discrepancy, and how is it prevented? (2 steps)", "a": "- Step 1: The discrepancy is caused by \"premature rounding.\" By rounding the intermediate value up (0.68269 -> 0.6830), the student introduced a small error. When this rounded value was used in a subsequent operation (like an inverse sine or subtraction), the error was amplified, shifting the final result.\n- Step 2: Prevention involves carrying full calculator accuracy (all digits the calculator holds) throughout the entire working process. You only round once, at the very end, to the precision requested by the question.\n\nTakeaway: Intermediate rounding acts as a multiplier of error; keep numbers exact until the final line.", "source": "GLM 5.1"}, {"q": "When sketching $$y = f(-x)$$, what happens to a horizontal asymptote defined as $$y = k$$? Explain conceptually. (2 steps)", "a": "- Step 1: The transformation $$y = f(-x)$$ reflects the graph across the y-axis. This is a horizontal transformation; it changes the x-coordinates of points (from $$x$$ to $$-x$$).\n- Step 2: A horizontal asymptote describes the behavior of the graph as $$x$$ approaches infinity or negative infinity. Reflecting the graph horizontally simply swaps the \"left\" and \"right\" behavior, but the y-value the graph approaches remains the same. Thus, $$y = k$$ stays $$y = k$$.\n\nTakeaway: Horizontal reflections do not move horizontal asymptotes.", "source": "GLM 5.1"}, {"q": "Compare the effect of the transformations $$y = f(-x)$$ and $$y = -f(x)$$ on a horizontal asymptote $$y = k$$. (2 steps)", "a": "- Step 1: $$y = f(-x)$$ is a reflection in the y-axis. It affects x-coordinates but leaves y-coordinates unchanged. Therefore, the horizontal asymptote $$y = k$$ remains unchanged at $$y = k$$.\n- Step 2: $$y = -f(x)$$ is a reflection in the x-axis. It affects y-coordinates by multiplying them by -1, leaving x-coordinates unchanged. Therefore, the horizontal asymptote $$y = k$$ is reflected to $$y = -k$$.\n\nTakeaway: Reflections parallel to an asymptote leave it alone; reflections perpendicular to it flip it.", "source": "GLM 5.1"}, {"q": "On an exam, a student uses an invalid algebraic step but arrives at the correct final answer. The mark scheme awards 0 marks. Why is the method valued over the correct number? (2 steps)", "a": "- Step 1: Mathematics assesses logical reasoning, not just numerical output. An invalid step indicates a fundamental misunderstanding of the rules (e.g., differentiating instead of integrating, or breaking algebraic laws).\n- Step 2: Arriving at the correct answer despite invalid logic is often coincidental (e.g., a sign error canceled out by another sign error). If marks were awarded, it would validate flawed logic, which cannot build reliably into more complex mathematics. The \"route\" must be valid.\n\nTakeaway: The correctness of the journey determines the value of the destination.", "source": "GLM 5.1"}, {"q": "Using the unit circle, explain why $$\\sin(180^\\circ - \\alpha) = \\sin(\\alpha)$$. (3 steps)", "a": "- Step 1: Imagine an angle $$\\alpha$$ in the first quadrant. Its sine value corresponds to the y-coordinate of the point on the unit circle.\n- Step 2: Now consider the angle $$180^\\circ - \\alpha$$, which sits in the second quadrant. This angle is the reflection of the first angle across the y-axis.\n- Step 3: Because it is a horizontal reflection, the x-coordinate changes sign, but the y-coordinate (the height) remains identical. Since sine measures the y-coordinate, $$\\sin(180^\\circ - \\alpha) = \\sin(\\alpha)$$.\n\nTakeaway: Angles symmetric about the y-axis share the same sine value.", "source": "GLM 5.1"}, {"q": "Explain the identity $$\\sin(-\\alpha) = -\\sin(\\alpha)$$ using the concept of the unit circle. (2 steps)", "a": "- Step 1: An angle $$-\\alpha$$ is the reflection of angle $$\\alpha$$ across the x-axis. It rotates clockwise instead of counter-clockwise.\n- Step 2: Reflecting across the x-axis keeps the x-coordinate (cosine) the same but flips the sign of the y-coordinate (sine). Therefore, the sine of the reflected angle is the negative of the original sine.\n\nTakeaway: Negating the angle negates the y-coordinate, which negates the sine.", "source": "GLM 5.1"}, {"q": "If $$\\sin(\\alpha) = p$$, what is $$\\sin(180^\\circ + \\alpha)$$ and why? (2 steps)", "a": "- Step 1: The angle $$180^\\circ + \\alpha$$ places you in the third quadrant, directly opposite the first quadrant angle $$\\alpha$$ (shifted by half a circle).\n- Step 2: This is a reflection through the origin. Both the x and y coordinates flip sign. Since sine corresponds to the y-coordinate, the sine value also flips sign. Thus, $$\\sin(180^\\circ + \\alpha) = -\\sin(\\alpha) = -p$$.\n\nTakeaway: Adding 180 degrees flips the point to the opposite side of the circle, negating both sine and cosine.", "source": "GLM 5.1"}, {"q": "How does changing the coefficient inside the sine function (e.g., from $$\\sin(x)$$ to $$\\sin(2x)$$) affect the period of the graph? (2 steps)", "a": "- Step 1: The period of a sine wave is the distance (in degrees or radians) it takes to complete one full cycle. The standard $$\\sin(x)$$ completes its cycle over $$360^\\circ$$ (or $$2\\pi$$).\n- Step 2: The coefficient inside acts as a horizontal scale factor. For $$\\sin(2x)$$, the input values reach $$360^\\circ$$ twice as fast (when $$x$$ is only $$180^\\circ$$). This compresses the graph horizontally by a factor of 2, reducing the period to $$180^\\circ$$.\n\nTakeaway: The coefficient inside the function divides the standard period.", "source": "GLM 5.1"}, {"q": "When solving $$\\sin(2x) = p$$ over the interval $$0 < x < 180^\\circ$$, why do you find twice as many solutions as solving $$\\sin(x) = p$$ over the same interval? (3 steps)", "a": "- Step 1: The interval for $$x$$ is $$0$$ to $$180^\\circ$$. However, because the argument is $$2x$$, the angle you are actually solving for inside the sine function ranges from $$2(0)=0^\\circ$$ to $$2(180^\\circ)=360^\\circ$$.\n- Step 2: Within the $$0^\\circ$$ to $$360^\\circ$$ range, a standard sine curve completes two full cycles (due to the compressed period).\n- Step 3: Each cycle will intersect the horizontal line $$y=p$$ once in the \"ascending\" half and once in the \"descending\" half. Two cycles mean two pairs of solutions, resulting in more roots than the single cycle of $$\\sin(x)$$.\n\nTakeaway: The bounds of the \"inner angle\" are stretched by the coefficient, fitting more cycles into the x-interval.", "source": "GLM 5.1"}, {"q": "When using substitution to solve a hidden quadratic (e.g., letting $$u = x^2$$), why must you reject solutions like $$u = -5$$? (2 steps)", "a": "- Step 1: The substitution defines the relationship between the new variable and the original variable. If $$u = x^2$$, then solving for $$x$$ requires calculating $$x = \\sqrt{u}$$.\n- Step 2: In the real number system, you cannot take the square root of a negative number. Since $$x^2$$ must be non-negative, $$u$$ must also be non-negative. A negative solution for $$u$$ corresponds to no real solution for $$x$$, so it is rejected.\n\nTakeaway: The domain of the substitution equation restricts the valid solutions of the new variable.", "source": "GLM 5.1"}, {"q": "Why is it effective to convert all bases to a common base when simplifying exponential expressions? (2 steps)", "a": "- Step 1: The laws of indices (like $$a^m \\cdot a^n = a^{m+n}$$ and $$(a^m)^n = a^{mn}$$) only work directly when the bases are identical. You cannot easily combine $$9^x$$ and $$27^x$$ using these rules.\n- Step 2: By expressing the numbers as powers of a common base (e.g., $$9 = 3^2$$ and $$27 = 3^3$$), you transform the expression into a single base raised to various powers. This allows you to collapse the expression into a single term using the multiplication and division laws of indices.\n\nTakeaway: A common base unlocks the algebraic laws of indices.", "source": "GLM 5.1"}, {"q": "In a graph transformation question, a student calculates the correct coordinates for the new turning points but draws the curve with the wrong shape and incorrect asymptotes. Why might this result in a score of 0? (2 steps)", "a": "- Step 1: Mark schemes for sketching typically allocate marks for the \"shape\" of the curve and the correct positioning of asymptotes first. Coordinates are often \"dependent\" marks or bonus marks.\n- Step 2: If the shape and asymptotes are wrong, the fundamental nature of the transformed function is misunderstood. Correct coordinates floating on a wrong graph represent a coincidence or a partial understanding (knowing point mapping but not function mapping), which the mark scheme penalizes heavily.\n\nTakeaway: The \"skeleton\" (shape/asymptotes) must be correct before the \"details\" (coordinates) carry weight.", "source": "GLM 5.1"}, {"q": "Exercise: Integrate the term $$-2x^{-3}$$. Focus on the sign and the power. (2 steps)", "a": "- Step 1: Increase the power by 1: $$-3 + 1 = -2$$.\n- Step 2: Divide the coefficient (-2) by the new power (-2). $$-2 \\div -2 = +1$$. The result is $$+x^{-2}$$ or $$+\\frac{1}{x^2}$$.", "source": "GLM 5.1"}, {"q": "Exercise: If $$\\sin(\\alpha) = 0.3$$, what is the value of $$\\sin(180^\\circ + \\alpha)$$? (1 step)", "a": "- Step 1: Adding 180 degrees moves the angle to the opposite quadrant, flipping the sign of the sine value. Therefore, $$\\sin(180^\\circ + \\alpha) = -\\sin(\\alpha) = -0.3$$.", "source": "GLM 5.1"}, {"q": "Exercise: A function $$f(x)$$ has a period of $$120^\\circ$$. What is the period of the function $$f(3x)$$? (1 step)", "a": "- Step 1: The coefficient inside the function (3) compresses the graph horizontally by a factor of 3. The new period is the original period divided by 3. $$120^\\circ / 3 = 40^\\circ$$.", "source": "GLM 5.1"}, {"q": "When integrating a term like $$10x^5$$, what happens to the power and coefficient, and why is this the reverse of differentiation? (3 steps)", "a": "- Step 1: To differentiate $$10x^5$$, you **multiply by the power** (\u00d75) and **subtract 1** from the power, giving $$50x^4$$. Integration is the **reverse**: you **add 1** to the power (5\u21926) and **divide by the new power** (\u00f76), giving $$\\frac{10x^6}{6} = \\frac{5x^6}{3}$$.\n- Step 2: The intuition: differentiation \"strips away\" a layer (\u00d7power, power\u22121), so integration \"adds it back\" (power+1, \u00f7new power). If you integrate and then differentiate, you must return to the original \u2014 this is the Fundamental Theorem of Calculus in action.\n+ Differentiation: multiply by power, then subtract 1 from power\n+ Integration: add 1 to power, then divide by the new power\n- Step 3: The critical habit: before writing anything, consciously ask \"am I integrating or differentiating?\" \u2014 the direction determines whether the power goes up or down. Mixing these up (as in Q1 on the paper) costs all accuracy marks.\n\nThe power goes **up** for integration, **down** for differentiation \u2014 always verify the direction first.", "source": "GLM 5.1"}, {"q": "When integrating $$-3x^{-2}$$, the result is $$+\\frac{3}{x}$$, not $$-\\frac{3}{x}$$. Why does the sign flip? (3 steps)", "a": "- Step 1: Apply the integration rule: add 1 to the power (\u22122 \u2192 \u22121), then divide by the new power. So $$\\int -3x^{-2}\\,dx = -3 \\cdot \\frac{x^{-1}}{-1}$$.\n- Step 2: Now simplify the coefficient: $$-3 \\div (-1) = +3$$. Dividing a negative by a negative produces a positive \u2014 that's where the sign flip comes from. So the result is $$+3x^{-1} = +\\frac{3}{x}$$.\n+ If the original coefficient is positive and the new power is negative (e.g., $$\\int 5x^{-2}\\,dx = 5 \\cdot \\frac{x^{-1}}{-1} = -\\frac{5}{x}$$), the sign flips the other way.\n+ The sign flip is purely arithmetic: it depends on the signs of both the original coefficient AND the new power.\n- Step 3: The general principle: when you divide by the new power, carry the sign through carefully. A negative new power (like \u22121) means dividing by \u22121, which flips the sign of whatever is in the numerator. This is the most common sign-error trap in integration of negative powers.\n\nAlways track the sign through the division step \u2014 the new power's sign determines whether a flip occurs.", "source": "GLM 5.1"}, {"q": "When integrating $$2x^{-1/2}$$, the result is $$4x^{1/2}$$. Walk through the fractional-power arithmetic that produces the \"4\" and the \"1/2.\" (3 steps)", "a": "- Step 1: Add 1 to the power: $$-\\frac{1}{2} + 1 = +\\frac{1}{2}$$. So the new power is $$\\frac{1}{2}$$.\n- Step 2: Divide by the new power: dividing by $$\\frac{1}{2}$$ is the same as multiplying by 2. So the coefficient becomes $$2 \\times 2 = 4$$.\n+ This is the key fractional-power insight: $$\\div\\frac{1}{2} = \\times 2$$, $$\\div\\frac{1}{3} = \\times 3$$, etc. Dividing by a fraction always inverts and multiplies.\n- Step 3: The result is $$4x^{1/2} = 4\\sqrt{x}$$. The \"missing power\" error on Q7(b) was exactly this: dropping the fractional power or mishandling the \u00f7(1/2) step. The coefficient doubles because you're dividing by one-half.\n\nFractional powers in integration: the \u00f7(fraction) step always amplifies the coefficient \u2014 dividing by a half doubles it.", "source": "GLM 5.1"}, {"q": "Why must you always include \"$$+c$$\" when evaluating an indefinite integral, and what happens if you omit it? (2 steps)", "a": "- Step 1: Differentiation destroys constant information \u2014 the derivative of $$x^2 + 5$$ and $$x^2 - 3$$ are both $$2x$$. So when reversing (integrating), there's no way to know what constant was lost. The \"$$+c$$\" represents this family of possible original functions.\n- Step 2: On the mark scheme, the final accuracy mark (A1) specifically requires \"fully correct and simplified with $$+c$$ all on one line.\" Omitting $$+c$$ loses that final mark. It's not optional decoration \u2014 it's mathematically necessary and exam-scored.\n\n$$+c$$ is not a formality \u2014 it's the acknowledgment that integration can only recover a function up to an additive constant.", "source": "GLM 5.1"}, {"q": "A question asks for an answer \"to 4 decimal places.\" You compute 0.68269... on your calculator. If you round to 3 decimal places first (getting 0.683) and then write that as 0.6830, what has gone wrong? (3 steps)", "a": "- Step 1: Rounding to 3 dp gives 0.683 (because the 4th digit is 6, which rounds the 2 up to 3). Then padding with a zero to make \"4 dp\" gives 0.6830 \u2014 but this is **not** the correct 4 dp value.\n- Step 2: The correct 4 dp value is obtained by looking at the **5th** decimal place of the full number 0.68269... The 5th digit is 9, which rounds the 4th digit (2) up to 3, giving 0.6827. This differs from 0.6830.\n+ 0.6830 vs 0.6827 \u2014 the difference is in the 3rd decimal place. This isn't a tiny rounding error; it's a wrong digit.\n- Step 3: The rule: carry the **full calculator accuracy** through all intermediate steps, and round **once**, at the very end, to the precision the question requests. Never round mid-calculation and then re-round. This is called \"premature rounding\" and it cost a mark on Q2(a).\n\nRound once, at the end, from full accuracy \u2014 never round an intermediate and then round again.", "source": "GLM 5.1"}, {"q": "In the sine rule $$\\frac{\\sin A}{a} = \\frac{\\sin B}{b}$$, if you find $$\\sin x = 0.6827$$ and the acute angle is $$43.05\u00b0$$, why might the actual angle be $$136.95\u00b0$$ instead? (3 steps)", "a": "- Step 1: The sine function is symmetric: $$\\sin \\theta = \\sin(180\u00b0 - \\theta)$$. So both $$\\theta = 43.05\u00b0$$ and $$\\theta = 180\u00b0 - 43.05\u00b0 = 136.95\u00b0$$ give the same sine value of 0.6827. This is the \"ambiguous case\" of the sine rule.\n- Step 2: To resolve the ambiguity, you must use additional information from the question. In Q2, the question stated that side $$AB$$ is the longest side. By the property of triangles, the longest side is opposite the largest angle.\n+ If $$AB$$ is the longest side, then the angle opposite it (angle $$C$$, i.e., angle $$x$$) must be the largest angle in the triangle.\n+ An angle of $$43.05\u00b0$$ could not be the largest if the triangle already has angles summing to 180\u00b0 \u2014 it's too small. But $$136.95\u00b0$$ is clearly the largest.\n- Step 3: Therefore, $$x = 136.95\u00b0$$ (obtuse), not $$43.05\u00b0$$ (acute). The key insight: the sine rule always gives two candidate angles; you must use geometric context to choose the correct one.\n\nThe sine rule produces two possible angles \u2014 always check whether the acute or obtuse solution is consistent with the triangle's geometry.", "source": "GLM 5.1"}, {"q": "When sketching $$y = f(-x)$$, a horizontal asymptote $$y = k$$ on the original curve stays as $$y = k$$. Why doesn't a reflection in the $$y$$-axis move a horizontal asymptote? (3 steps)", "a": "- Step 1: A horizontal asymptote $$y = k$$ means \"as $$x \\to \\pm\\infty$$, the function values approach $$k$$.\" It describes the **vertical** behavior (where the curve settles at the left and right extremes).\n- Step 2: The transformation $$y = f(-x)$$ replaces every $$x$$ with $$-x$$. This is a **horizontal** reflection \u2014 it flips the graph left-right. Horizontal changes affect where things are positioned along the $$x$$-axis, but they do not change the **$$y$$-values** the curve approaches.\n+ As $$x \\to +\\infty$$ in the new graph, we're evaluating $$f$$ at large negative inputs, which corresponds to the original graph's left tail \u2014 but that tail still approaches $$y = k$$.\n+ As $$x \\to -\\infty$$ in the new graph, we're evaluating $$f$$ at large positive inputs \u2014 the original right tail, also approaching $$y = k$$.\n- Step 3: Therefore both tails of the reflected curve still approach $$y = k$$. The asymptote is unchanged. On Q4(ii), writing $$y = 1 \\to y = -1$$ was the error \u2014 reflecting horizontally cannot move a horizontal target.\n\nHorizontal reflections flip left-right but cannot shift a horizontal asymptote \u2014 only vertical translations and vertical reflections can move horizontal asymptotes.", "source": "GLM 5.1"}, {"q": "For each transformation, determine whether a horizontal asymptote $$y = k$$ moves, and if so, where does it go? (2 steps)", "a": "- Step 1: Transformations that change $$y$$-values move horizontal asymptotes:\n+ $$y = f(x) + a$$: shifts up by $$a$$ \u2192 asymptote becomes $$y = k + a$$\n+ $$y = f(x) - a$$: shifts down by $$a$$ \u2192 asymptote becomes $$y = k - a$$\n+ $$y = -f(x)$$: reflects in $$x$$-axis \u2192 asymptote becomes $$y = -k$$\n+ $$y = af(x)$$: vertical stretch by factor $$a$$ \u2192 asymptote becomes $$y = ak$$\n- Step 2: Transformations that only change $$x$$-values do NOT move horizontal asymptotes:\n+ $$y = f(x - a)$$: horizontal shift \u2192 asymptote stays $$y = k$$\n+ $$y = f(-x)$$: horizontal reflection \u2192 asymptote stays $$y = k$$\n+ $$y = f(ax)$$: horizontal stretch/compression \u2192 asymptote stays $$y = k$$\n\nThe rule: if the transformation modifies the **output** ($$y$$-side), the horizontal asymptote moves. If it only modifies the **input** ($$x$$-side), the horizontal asymptote stays put.", "source": "GLM 5.1"}, {"q": "On an exam sketch of a graph transformation, getting the coordinates of turning points correct but drawing the wrong curve shape earns zero marks. Why? (2 steps)", "a": "- Step 1: The mark scheme awards marks for the **shape** of the curve and the **asymptote** first \u2014 these are the primary features (B-marks for correct curve, correct asymptote). The coordinates of turning points are additional credit (B-marks) that depend on the curve being correct.\n- Step 2: If the curve is wrong, the coordinates \u2014 even if numerically correct \u2014 are sitting on the wrong graph. They don't demonstrate understanding of the transformation. As Harry noted: \"coordinates alone don't score.\" The marks live in the shape and the asymptote; coordinates are extra.\n\nSketch the correct curve and asymptote first \u2014 points without the right curve are worthless.", "source": "GLM 5.1"}, {"q": "On Q7(a), the answer $$A = -4$$ was correct, but the mark scheme awarded M0 A0 dM0 A0 (zero out of four). Why does a correct answer from invalid working score nothing? (3 steps)", "a": "- Step 1: The mark scheme is structured as Method (M) \u2192 Accuracy (A) \u2192 dependent Method (dM) \u2192 final Accuracy (A). Each mark depends on the previous one being earned through **valid** work. If the method is invalid (M0), all downstream marks collapse.\n- Step 2: In Q7(a), the differentiation steps that produced $$A = -4$$ had incorrect power-rule applications. The right answer was coincidental \u2014 like guessing correctly on a multiple-choice question while using wrong reasoning. The examiner cannot verify understanding from invalid steps.\n+ This is especially enforced on questions with the rubric: \"In this question you must show all stages of your working. Solutions relying on calculator technology are not acceptable.\"\n- Step 3: The principle: the **process** is what's being assessed, not just the endpoint. A correct numerical answer without a valid route proves nothing about mathematical competence. You must show every step correctly \u2014 the answer alone is worthless.\n\nA correct answer from invalid working = 0 marks. The journey must be valid, not just the destination.", "source": "GLM 5.1"}, {"q": "Using the identity $$\\sin(180\u00b0 - \\alpha) = \\sin \\alpha$$, explain why this is true by thinking about the symmetry of the sine wave. (3 steps)", "a": "- Step 1: The sine wave $$y = \\sin \\theta$$ has a **peak at 90\u00b0** and is symmetric about this peak. This means the values at equal distances on either side of 90\u00b0 are identical.\n- Step 2: The angle $$\\alpha$$ is some angle between 0\u00b0 and 90\u00b0. The angle $$180\u00b0 - \\alpha$$ is the same distance from 90\u00b0 on the other side: $$90\u00b0 + (90\u00b0 - \\alpha)$$ vs $$90\u00b0 - (90\u00b0 - \\alpha)$$. By the mirror symmetry of the sine curve about $$\\theta = 90\u00b0$$, these two angles give the same sine value.\n+ Example: $$\\alpha = 30\u00b0$$ and $$180\u00b0 - 30\u00b0 = 150\u00b0$$. Both are 60\u00b0 from 90\u00b0 (one below, one above), so $$\\sin 30\u00b0 = \\sin 150\u00b0 = 0.5$$.\n- Step 3: This identity is the reason the sine rule has an \"ambiguous case\" \u2014 two different angles can produce the same sine value. It's also why Q9(a)(i) gives $$2\\sin(180\u00b0 - \\alpha) = 2\\sin\\alpha = 2p$$.\n\nThe sine wave is symmetric about 90\u00b0, so angles equidistant from 90\u00b0 on the same half-wave share the same sine value.", "source": "GLM 5.1"}, {"q": "Using the identity $$\\sin(-\\alpha) = -\\sin\\alpha$$, explain why this is true by thinking about the symmetry of the sine wave. (3 steps)", "a": "- Step 1: The sine wave $$y = \\sin\\theta$$ has **odd symmetry** (rotational symmetry about the origin). This means flipping the sign of the input flips the sign of the output.\n- Step 2: For a positive angle $$\\alpha$$, the point $$(\\alpha, \\sin\\alpha)$$ is in the first quadrant (positive $$x$$, positive $$y$$). The point $$(-\\alpha, \\sin(-\\alpha))$$ is the rotation of this point through 180\u00b0 about the origin, landing in the third quadrant with the same distance but negative $$y$$-value. So $$\\sin(-\\alpha) = -\\sin\\alpha$$.\n+ Example: $$\\sin(30\u00b0) = 0.5$$, so $$\\sin(-30\u00b0) = -0.5$$.\n- Step 3: This identity was needed for Q9(a)(ii): $$\\sin(\\alpha - 180\u00b0) = \\sin(-(180\u00b0 - \\alpha)) = -\\sin(180\u00b0 - \\alpha) = -\\sin\\alpha = -p$$, chaining two identities together.\n\nSine is an **odd function**: negating the input negates the output. This is the origin symmetry of the sine wave.", "source": "GLM 5.1"}, {"q": "Using the identity $$\\sin(180\u00b0 + \\alpha) = -\\sin\\alpha$$, explain why this is true by combining the two identities you already know. (3 steps)", "a": "- Step 1: Write $$180\u00b0 + \\alpha$$ as $$180\u00b0 - (-\\alpha)$$. Now apply the first identity: $$\\sin(180\u00b0 - (-\\alpha)) = \\sin(-\\alpha)$$.\n- Step 2: Now apply the second identity: $$\\sin(-\\alpha) = -\\sin\\alpha$$. Combining: $$\\sin(180\u00b0 + \\alpha) = -\\sin\\alpha$$.\n+ Geometrically: starting from 180\u00b0 and going further by $$\\alpha$$ takes you into the third quadrant, where sine is negative. The value has the same magnitude as $$\\sin\\alpha$$ but is negated.\n- Step 3: This was needed for Q9(a)(iii): $$3 + \\sin(180\u00b0 + \\alpha) = 3 + (-\\sin\\alpha) = 3 - p$$. The three identities form a complete toolkit for any sine symmetry question.\n\n$$\\sin(180\u00b0 + \\alpha) = -\\sin\\alpha$$ \u2014 going past 180\u00b0 flips the sign, because you're on the negative half of the sine wave.", "source": "GLM 5.1"}, {"q": "The graph $$y = \\sin 2x$$ has period 180\u00b0 instead of 360\u00b0. Why does the \"2\" inside the function halve the period? (3 steps)", "a": "- Step 1: The period of $$y = \\sin\\theta$$ is 360\u00b0 \u2014 the input must increase by 360\u00b0 to complete one full wave. For $$y = \\sin 2x$$, the input to the sine function is $$2x$$, not $$x$$.\n- Step 2: For $$2x$$ to increase by 360\u00b0, $$x$$ only needs to increase by 180\u00b0. So the curve completes one full wave in half the horizontal distance. This is a **horizontal compression** by factor 2.\n+ Think of it this way: the function \"runs through\" the sine wave twice as fast because the input is being doubled before the sine function sees it.\n+ General rule: $$y = \\sin(nx)$$ has period $$\\frac{360\u00b0}{n}$$. For $$n = 2$$, that's 180\u00b0.\n- Step 3: On Q9(b), this means two complete sine waves fit in the space where one wave of $$\\sin x$$ sat (0\u00b0 to 360\u00b0). The amplitude is still 1, and the curve still starts at the origin \u2014 only the horizontal spacing changes.\n\nThe coefficient inside the argument compresses the graph horizontally: $$y = \\sin(nx)$$ completes $$n$$ waves in the same space that $$y = \\sin x$$ completes one.", "source": "GLM 5.1"}, {"q": "Given $$\\sin\\alpha = p$$ with $$0 < \\alpha < 90\u00b0$$, solving $$\\sin 2x = p$$ on $$0 < x < 180\u00b0$$ gives two solutions: $$x = \\frac{\\alpha}{2}$$ and $$x = 90\u00b0 - \\frac{\\alpha}{2}$$. Why are there exactly two, and where do they come from? (3 steps)", "a": "- Step 1: The condition $$\\sin 2x = p = \\sin\\alpha$$ means $$2x$$ must be an angle whose sine equals $$\\sin\\alpha$$. By the symmetry identity, the two candidates in one full cycle (0\u00b0 to 360\u00b0) are $$2x = \\alpha$$ and $$2x = 180\u00b0 - \\alpha$$.\n- Step 2: Dividing by 2: $$x = \\frac{\\alpha}{2}$$ and $$x = \\frac{180\u00b0 - \\alpha}{2} = 90\u00b0 - \\frac{\\alpha}{2}$$. Both lie in the range $$0 < x < 180\u00b0$$ because $$0 < \\alpha < 90\u00b0$$ means both $$\\frac{\\alpha}{2}$$ and $$90\u00b0 - \\frac{\\alpha}{2}$$ are between 0\u00b0 and 90\u00b0.\n+ If the range had been $$0 < x < 360\u00b0$$, there would be four solutions (adding 180\u00b0 to each gives two more).\n- Step 3: The two solutions correspond to the **two peaks** of the compressed sine wave $$y = \\sin 2x$$ that reach height $$p$$ within the given interval. Each hump of the double-wave produces one intersection with the horizontal line $$y = p$$.\n\nTwo humps = two intersections = two solutions. The double-angle inside the sine creates twice as many solutions in the same interval.", "source": "GLM 5.1"}, {"q": "When solving a quartic like $$2x^4 - 15x^2 - 50 = 0$$, you substitute $$u = x^2$$ to get a quadratic. After solving, you get $$u = 10$$ and $$u = -\\frac{5}{2}$$. Why must you reject $$u = -\\frac{5}{2}$$? (2 steps)", "a": "- Step 1: The substitution was $$u = x^2$$. Since $$x^2$$ is a squared quantity, it can never be negative \u2014 a real number squared is always $$\\geq 0$$. So $$u = x^2 = -\\frac{5}{2}$$ is impossible.\n- Step 2: Therefore, only $$u = 10$$ is valid, giving $$x^2 = 10$$ and $$x = \\pm\\sqrt{10}$$. The rejection must be **stated with a reason** (\"because a square is always non-negative\") \u2014 the reason is part of the mark.\n\nWhen substituting $$u = x^2$$, any negative solution for $$u$$ must be rejected because squares cannot be negative \u2014 and you must say why.", "source": "GLM 5.1"}, {"q": "When solving a disguised cubic like $$u^3 + 7u - 24 = 0$$ (where $$u = \\sqrt{x}$$), you factorise to $$(u-2)(u^2 + 2u + 12) = 0$$. Why is the quadratic factor rejected? (3 steps)", "a": "- Step 1: Set the quadratic factor equal to zero: $$u^2 + 2u + 12 = 0$$. Check the discriminant: $$b^2 - 4ac = 4 - 48 = -44$$.\n- Step 2: A negative discriminant means the quadratic has **no real roots**. Since $$u = \\sqrt{x}$$ must be a real number, these solutions don't exist in our domain.\n+ Even if the discriminant were positive, you'd need to check whether the resulting $$u$$-values are non-negative (since $$u = \\sqrt{x} \\geq 0$$).\n- Step 3: Only $$u = 2$$ survives, giving $$\\sqrt{x} = 2$$, so $$x = 4$$. The rejection reason is: \"discriminant is negative, so no real roots.\" This reason earns the mark.\n\nAfter factorising, always check: does each factor produce valid (real, non-negative if applicable) solutions? State the reason for every rejection.", "source": "GLM 5.1"}, {"q": "To simplify $$\\frac{9^{2x+1} \\cdot 3^{3x-3}}{27^{2x-a}}$$, why is it essential to rewrite every base as a power of 3 first? (3 steps)", "a": "- Step 1: The expression has three different bases: 9, 3, and 27. The index laws (adding exponents when multiplying, subtracting when dividing) **only apply when the bases are identical**. You cannot combine $$9^{2x+1}$$ and $$3^{3x-3}$$ directly.\n- Step 2: Express each base as a power of 3: $$9 = 3^2$$ and $$27 = 3^3$$. Then $$9^{2x+1} = (3^2)^{2x+1} = 3^{4x+2}$$ and $$27^{2x-a} = (3^3)^{2x-a} = 3^{6x-3a}$$.\n+ The power-of-a-power rule: $$(a^m)^n = a^{mn}$$. So $$(3^2)^{2x+1} = 3^{2(2x+1)} = 3^{4x+2}$$.\n- Step 3: Now everything is base 3: $$\\frac{3^{4x+2} \\cdot 3^{3x-3}}{3^{6x-3a}} = 3^{(4x+2)+(3x-3)-(6x-3a)} = 3^{x-1+3a}$$. The common base unlocks all the index laws.\n\nOne common base \u2192 all index laws become available. Always identify the smallest prime base and convert everything to it.", "source": "GLM 5.1"}, {"q": "When differentiating $$f'(x) = 2x^{-1/2} + Ax^{-2} + 3$$ to get $$f''(x)$$, walk through what happens to each term and why the constant term vanishes. (3 steps)", "a": "- Step 1: Apply the power rule (multiply by power, subtract 1) to each term:\n+ $$2x^{-1/2}$$: multiply by $$-\\frac{1}{2}$$ \u2192 $$2 \\times (-\\frac{1}{2}) = -1$$; subtract 1 from power \u2192 $$-\\frac{1}{2} - 1 = -\\frac{3}{2}$$. Result: $$-x^{-3/2}$$.\n+ $$Ax^{-2}$$: multiply by $$-2$$ \u2192 $$-2A$$; subtract 1 from power \u2192 $$-2 - 1 = -3$$. Result: $$-2Ax^{-3}$$.\n- Step 2: The constant term 3: this is $$3x^0$$. Multiply by the power (0) \u2192 $$3 \\times 0 = 0$$. The entire term vanishes because the derivative of any constant is zero.\n- Step 3: So $$f''(x) = -x^{-3/2} - 2Ax^{-3}$$. Setting $$f''(4) = 0$$ and solving gives $$A = -4$$. Every step must be valid \u2014 the invalid differentiation on Q7(a) (incorrect power reductions) made the whole solution score zero.\n\nConstants vanish under differentiation because they represent horizontal lines (gradient zero). Every other term follows the power rule strictly.", "source": "GLM 5.1"}, {"q": "When integrating $$f'(x) = 2x^{-1/2} + Ax^{-2} + 3$$ (with $$A = -4$$) to get $$f(x)$$, walk through each term and identify where the \"dropped power\" error could occur. (3 steps)", "a": "- Step 1: Integrate each term (add 1 to power, divide by new power):\n+ $$2x^{-1/2}$$: power becomes $$-\\frac{1}{2}+1 = \\frac{1}{2}$$; divide by $$\\frac{1}{2}$$ (= \u00d72) \u2192 coefficient becomes 4. Result: $$4x^{1/2} = 4\\sqrt{x}$$.\n+ $$-4x^{-2}$$: power becomes $$-2+1 = -1$$; divide by $$-1$$ \u2192 coefficient becomes $$+4$$. Result: $$4x^{-1} = \\frac{4}{x}$$.\n+ $$3$$: this is $$3x^1$$ \u2192 integrate to $$\\frac{3x^2}{2}$$... Wait \u2014 no! $$3 = 3x^0$$, so power becomes $$0+1=1$$, divide by 1 \u2192 $$3x$$. Result: $$3x$$.\n- Step 2: The \"dropped power\" error on Q7(b) was specifically on the $$2x^{-1/2}$$ term. If you mishandle the fractional power (e.g., write $$\\frac{1}{2}+1 = \\frac{3}{2}$$ correctly but then forget to divide by $$\\frac{1}{2}$$, or drop the $$x^{1/2}$$ entirely), the coefficient or the power is wrong.\n+ The trap: fractional powers feel unfamiliar, so it's easy to skip the \"divide by new power\" step or miscalculate it.\n- Step 3: The full result is $$f(x) = 4\\sqrt{x} + \\frac{4}{x} + 3x + c$$. Then use the boundary condition $$f(12) = 8\\sqrt{3}$$ to find $$c = -\\frac{109}{3}$$. Every fractional-power step must be shown explicitly.\n\nFractional powers are the danger zone \u2014 the \"divide by the new power\" step is where marks are most often dropped. Show every fractional arithmetic step.", "source": "GLM 5.1"}, {"q": "What is the key difference between how a vertical translation and a horizontal reflection affect the coordinates of a point on a graph? (2 steps)", "a": "- Step 1: A vertical translation $$y = f(x) - 2$$ changes only the $$y$$-coordinate: $$(x, y) \\to (x, y-2)$$. The $$x$$-values stay the same because you're not modifying the input.\n- Step 2: A horizontal reflection $$y = f(-x)$$ changes only the $$x$$-coordinate: $$(x, y) \\to (-x, y)$$. The $$y$$-values stay the same because you're not modifying the output \u2014 you're evaluating the original function at the negated input.\n+ On Q4(ii): the point $$P(-1, 0)$$ becomes $$(1, 0)$$ (only $$x$$ flips), and $$Q(\\frac{2}{3}, 2)$$ becomes $$(-\\frac{2}{3}, 2)$$ (only $$x$$ flips).\n\nVertical changes affect $$y$$; horizontal changes affect $$x$$. Never mix which coordinate a transformation modifies.", "source": "GLM 5.1"}, {"q": "On the exam paper, the rubric states \"In this question you must show all stages of your working. Solutions relying on calculator technology are not acceptable.\" What exactly does this prohibit, and what does it require? (3 steps)", "a": "- Step 1: It **prohibits** writing down a calculator result without showing the mathematical steps that produced it. For example, you cannot just write \"$$A = -4$$\" from a solver without showing the differentiation, substitution, and algebra.\n- Step 2: It **requires** that every algebraic manipulation is written out: expanding, factorising, applying the power rule, substituting values, solving equations step by step. The examiner must be able to trace your logic from start to finish.\n+ Using a calculator to **check** your work is fine \u2014 the prohibition is on using it to **replace** working.\n- Step 3: Even on questions without this explicit rubric, the principle applies: a correct answer from invalid working scores 0. The rubric makes it explicit for certain questions, but the underlying rule is universal in Edexcel marking.\n\nShow the method, not just the answer \u2014 the calculator is a verification tool, not a replacement for mathematical reasoning.", "source": "GLM 5.1"}, {"q": "Why does the longest side of a triangle always sit opposite the largest angle? Give an intuitive geometric explanation. (2 steps)", "a": "- Step 1: Imagine a triangle with one very wide angle (close to 180\u00b0). To create such a wide angle, the two sides forming it must be spread far apart. The third side (opposite this wide angle) must stretch across this wide gap, making it the longest side.\n- Step 2: Conversely, a small angle means the two sides forming it are nearly on top of each other, so the opposite side barely needs to stretch \u2014 it's short. This is a direct geometric consequence: wider opening = longer span needed to connect the endpoints.\n\nLargest angle \u2194 longest side \u2014 they're always opposite each other because a wider angle requires a longer side to span the gap.", "source": "GLM 5.1"}, {"q": "In Q2(b), the question specifically states \"Given also that AB is the longest side of the triangle.\" Why is this sentence essential, and what would happen without it? (2 steps)", "a": "- Step 1: Without this information, the sine rule gives two valid angles: $$x = 43.05\u00b0$$ (acute) and $$x = 136.95\u00b0$$ (obtuse). Both are mathematically valid triangles \u2014 the sine rule alone cannot distinguish between them.\n- Step 2: The extra information resolves the ambiguity: if $$AB$$ is the longest side, then the angle opposite it ($$x$$) must be the largest angle. Since the triangle already has a 25\u00b0 angle, the largest angle must be obtuse (otherwise three acute angles couldn't have 136.95\u00b0 worth of \"room\"). So $$x = 136.95\u00b0$$.\n\nExam questions often embed the key to resolving ambiguity in a seemingly casual remark \u2014 always ask: \"What extra constraint does the question give me?\"", "source": "GLM 5.1"}, {"q": "When the mark scheme shows \"M1 A1ft dM1 A0ft A0,\" what does each letter and subscript mean? (3 steps)", "a": "- Step 1: **M** = Method mark (for using a correct method/approach), **A** = Accuracy mark (for getting a correct numerical/algebraic result). \"ft\" = follow-through (credit for correct work based on your earlier answer, even if that earlier answer was wrong).\n- Step 2: **dM** = dependent Method mark \u2014 this method mark can only be earned if the earlier M mark was earned. It \"depends\" on valid previous work. If M0, then dM0 automatically.\n- Step 3: In the Q7(b) profile M1 A1ft dM1 A0ft A0: the student earned the first method mark, got accuracy credit that follows through from their earlier error, earned the dependent method mark (since M1 was earned), but lost the final two accuracy marks due to the dropped power error. The \"ft\" marks mean the examiner carried their earlier mistake forward fairly.\n\nUnderstanding mark profiles tells you exactly where marks leak: M0 kills everything downstream, while A0ft means you're only penalised once for an earlier slip.", "source": "GLM 5.1"}, {"q": "The study notes identify five recurring mistake themes. Which single theme was the \"most expensive\" across the paper, and what are its three sub-aspects? (2 steps)", "a": "- Step 1: The most expensive theme was **Calculus mechanics: power-rule direction and negative/fractional powers**. It accounted for 9 of the 21 lost marks (Q1: \u22123, Q7(a): \u22124, Q7(b): \u22122).\n- Step 2: Its three sub-aspects are:\n+ **Direction**: integrating means powers go UP (add 1, divide by new power); differentiating means powers go DOWN (multiply by power, subtract 1). Mixing these up cost Q1.\n+ **Negative powers**: dividing by a negative new power flips the sign of the coefficient (e.g., $$-3x^{-2} \\to +3x^{-1}$$). Sign errors here cost Q7(a).\n+ **Fractional powers**: dividing by a fraction like $$\\frac{1}{2}$$ means multiplying by 2, amplifying the coefficient. Dropping or mishandling this cost Q7(b).\n\nCalculus mechanics is the biggest mark-leak \u2014 master the power rule in all three aspects (direction, sign, fractions) to recover the most marks.", "source": "GLM 5.1"}, {"q": "The study notes say \"The gap is execution + presentation, not understanding.\" What evidence supports this claim? (2 steps)", "a": "- Step 1: Q3, Q5, and Q6 scored essentially full marks (ticks throughout). This proves that when the execution is careful and every line is shown, the knowledge is fully sufficient for top marks.\n- Step 2: Of the five questions with lost marks, three (Q2, Q4, Q7) had the **right ideas** but were spoiled in execution: premature rounding, wrong asymptote, invalid working steps, dropped powers. Only Q9 involved genuinely missing concepts (trig symmetry). So the majority of lost marks came from execution discipline, not knowledge gaps.\n\nYou don't need to learn more maths \u2014 you need to execute what you know with more care and precision.", "source": "GLM 5.1"}, {"q": "What is the \"READ-THE-QUESTION checklist\" and what six items does it contain? Why is it needed before writing the final answer? (2 steps)", "a": "- Step 1: The checklist is a mental audit to run before starting and before writing the final line of any question. Its six items:\n+ **Precision**: how many dp/sf? Or exact/surd form?\n+ **What is being asked**: a coordinate pair or a value? An angle or its sine?\n+ **Which case**: obtuse or acute? Which root (and why reject the other)?\n+ **Required form**: \"$$y = mx + c$$\"? \"$$a + b\\sqrt{5}$$\"? Integer coefficients?\n+ **Working**: does the question say \"show all stages\"? If so, no calculator-only lines.\n+ **Finish**: $$+c$$ on indefinite integrals; every term simplified, on one line.\n- Step 2: It's needed before the final answer because most execution errors happen at the finish line: forgetting $$+c$$, rounding to the wrong precision, giving an angle when the sine was asked for, or omitting required working. The checklist catches these in the last 10% of each question.\n\nThe last 10% of each question is where most marks leak \u2014 the checklist is your safety net for that final stretch.", "source": "GLM 5.1"}, {"q": "For the transformation $$y = -f(x)$$, what happens to a point $$(a, b)$$ on the original curve, and what happens to a horizontal asymptote $$y = k$$? (2 steps)", "a": "- Step 1: The transformation negates the output: every $$y$$-value becomes $$-y$$. So the point $$(a, b)$$ moves to $$(a, -b)$$. The $$x$$-coordinate is unchanged; only the $$y$$-coordinate flips sign.\n- Step 2: The horizontal asymptote $$y = k$$ becomes $$y = -k$$, because the asymptote describes the $$y$$-value the curve approaches, and all $$y$$-values are negated. The curve is reflected in the $$x$$-axis \u2014 flipped upside down \u2014 so everything above the $$x$$-axis goes below and vice versa, including the asymptote.\n\n$$y = -f(x)$$: reflect in the $$x$$-axis. Points flip vertically, horizontal asymptotes flip sign, but $$x$$-positions and vertical asymptotes are unchanged.", "source": "GLM 5.1"}, {"q": "For the transformation $$y = f(x - a)$$, what happens to a point $$(b, c)$$ on the original curve, and does a horizontal asymptote move? Why or why not? (3 steps)", "a": "- Step 1: The transformation replaces $$x$$ with $$x - a$$, so to get the same output as the original at input $$b$$, we need $$x - a = b$$, meaning $$x = b + a$$. The point $$(b, c)$$ moves to $$(b + a, c)$$ \u2014 shifted **right** by $$a$$.\n+ The counterintuitive part: \"$$x - a$$\" shifts **right**, not left. The sign inside is opposite to the direction of shift.\n- Step 2: A horizontal asymptote $$y = k$$ does NOT move. The asymptote describes the $$y$$-value the curve approaches at extreme $$x$$-values. Shifting the curve horizontally doesn't change what height it settles at \u2014 it only changes where along the $$x$$-axis the settling happens.\n- Step 3: However, **vertical** asymptotes DO move. If the original has a vertical asymptote at $$x = d$$, then in $$y = f(x-a)$$, it shifts to $$x = d + a$$. Horizontal shifts move vertical features but not horizontal ones.\n\nHorizontal shifts move vertical features (points' $$x$$-coordinates, vertical asymptotes) but leave horizontal features ($$y$$-values, horizontal asymptotes) unchanged.", "source": "GLM 5.1"}, {"q": "When evaluating $$f(12) = 8\\sqrt{3}$$ to find the constant of integration, you encounter the term $$4\\sqrt{12}$$. Why must you simplify $$\\sqrt{12}$$ to $$2\\sqrt{3}$$ before solving for $$c$$? (3 steps)", "a": "- Step 1: $$4\\sqrt{12} = 4\\sqrt{4 \\times 3} = 4 \\times 2\\sqrt{3} = 8\\sqrt{3}$$. This is the same as the $$8\\sqrt{3}$$ on the other side of the equation.\n- Step 2: If you don't simplify, you'd write something like $$4\\sqrt{12} + \\frac{4}{12} + 36 + c = 8\\sqrt{3}$$, and you might not recognise that $$4\\sqrt{12} = 8\\sqrt{3}$$, leading to incorrect algebra when isolating $$c$$.\n+ On Q7(b), the simplification step was crucial: $$8\\sqrt{3}$$ cancels from both sides, leaving only rational terms and $$c$$ to solve.\n- Step 3: The general principle: always simplify surds to their simplest form ($$\\sqrt{12} = 2\\sqrt{3}$$, $$\\sqrt{8} = 2\\sqrt{2}$$, etc.) before substituting into equations. This makes cancellation visible and prevents arithmetic errors.\n\nSimplify surds before substituting \u2014 it reveals cancellations and prevents the algebraic errors that cost marks.", "source": "GLM 5.1"}, {"q": "The study notes recommend sitting P1, P2, M2, and S2 together in January rather than splitting units across sittings. What is the strategic reasoning behind grouping units? (2 steps)", "a": "- Step 1: When you sit units together, you can allocate revision time across all of them and benefit from overlapping content (e.g., P1 and P2 share calculus foundations; M2 builds on P1 mechanics). Splitting units across sittings means each sitting requires separate preparation, with less cross-pollination of skills.\n- Step 2: Additionally, sitting multiple units in one window means if you underperform on one, the others can compensate in the same results cycle. If you split and do poorly on a single unit in an earlier sitting, you carry that grade with no opportunity for same-cycle compensation.\n\nGrouping units in one sitting maximises content overlap benefits and provides same-cycle grade compensation \u2014 a strategic, not just academic, decision.", "source": "GLM 5.1"}, {"q": "A simple exercise: If $$\\sin\\alpha = p$$ and $$0 < \\alpha < 90\u00b0$$, what is $$\\sin(180\u00b0 - \\alpha) + \\sin(-\\alpha)$$ in terms of $$p$$? Walk through each identity. (2 steps)", "a": "- Step 1: $$\\sin(180\u00b0 - \\alpha) = \\sin\\alpha = p$$ (by the symmetry identity \u2014 angles equidistant from 90\u00b0 on the same half-wave share the same sine).\n- Step 2: $$\\sin(-\\alpha) = -\\sin\\alpha = -p$$ (by the odd-function identity \u2014 negating the input negates the output). So the sum is $$p + (-p) = 0$$.\n\nThe two identities cancel each other out \u2014 one preserves the sign, the other flips it.", "source": "GLM 5.1"}, {"q": "A simple exercise: If $$f(x) = x^3$$, what is the $$y$$-coordinate of the point $$(2, 8)$$ after the transformation $$y = f(-x)$$? What is its new $$x$$-coordinate? (2 steps)", "a": "- Step 1: The transformation $$y = f(-x)$$ replaces $$x$$ with $$-x$$. The new $$x$$-coordinate is $$-2$$ (the input is negated). The new $$y$$-coordinate is $$f(-2) = (-2)^3 = -8$$.\n- Step 2: Alternatively, think of it as reflecting $$(2, 8)$$ in the $$y$$-axis: $$(2, 8) \\to (-2, 8)$$... Wait \u2014 this is a common misconception! For $$f(x) = x^3$$, $$f(-x) = (-x)^3 = -x^3$$, so the $$y$$-value IS negated. The reflection interpretation works for even functions but not odd ones. The safe approach: always evaluate $$f(-x)$$ directly.\n\nFor $$y = f(-x)$$, the new point is $$(-x_{\\text{old}}, f(-x_{\\text{old}}))$$ \u2014 the $$y$$-value is whatever $$f$$ gives at the negated input, which may or may not equal the original $$y$$.", "source": "GLM 5.1"}, {"q": "A simple exercise: Integrate $$5x^{-3}$$ (just this one term). What is the result, and where could a sign error creep in? (2 steps)", "a": "- Step 1: Add 1 to the power: $$-3 + 1 = -2$$. Divide by the new power: $$5 \\div (-2) = -\\frac{5}{2}$$. Result: $$-\\frac{5}{2}x^{-2} + c$$.\n- Step 2: The sign error would be writing $$+\\frac{5}{2}x^{-2}$$ by forgetting that dividing a positive coefficient (5) by a negative power (\u22122) produces a negative result. The sign flip only happens when both the coefficient and the new power have the same sign (both negative \u2192 positive result), not when they differ.\n\n$$5 \\div (-2) = -2.5$$, not $$+2.5$$. The sign of the result depends on the signs of both the original coefficient AND the new power.", "source": "GLM 5.1"}, {"q": "A simple exercise: Simplify $$\\frac{4^3 \\cdot 2^5}{8^2}$$ by converting to a common base. What base do you choose and why? (3 steps)", "a": "- Step 1: The bases are 4, 2, and 8. The smallest prime base is 2, and all three are powers of 2: $$4 = 2^2$$, $$8 = 2^3$$.\n- Step 2: Convert: $$4^3 = (2^2)^3 = 2^6$$, $$2^5 = 2^5$$, $$8^2 = (2^3)^2 = 2^6$$. Now the expression is $$\\frac{2^6 \\cdot 2^5}{2^6}$$.\n- Step 3: Apply index laws: numerator is $$2^{6+5} = 2^{11}$$, then $$\\frac{2^{11}}{2^6} = 2^{11-6} = 2^5 = 32$$.\n\nAlways choose the smallest prime base \u2014 it's the \"atom\" that all the other bases are built from.", "source": "GLM 5.1"}, {"q": "A simple exercise: The equation $$x^4 - 9 = 0$$ is a hidden quadratic in disguise. What substitution would you use, and what must you check about the solutions? (2 steps)", "a": "- Step 1: Let $$u = x^2$$. Then the equation becomes $$u^2 - 9 = 0$$, which factors as $$(u-3)(u+3) = 0$$, giving $$u = 3$$ or $$u = -3$$.\n- Step 2: Since $$u = x^2 \\geq 0$$, reject $$u = -3$$ (a square cannot be negative). Only $$u = 3$$ is valid, giving $$x = \\pm\\sqrt{3}$$. The check: any negative solution for $$u = x^2$$ must be rejected with the reason \"since $$x^2 \\geq 0$$.\"\n\nSubstitute \u2192 solve \u2192 check validity \u2192 reject with reason. The rejection step is not optional \u2014 it's where marks are earned or lost.", "source": "GLM 5.1"}, {"q": "Why is it that $$y = f(ax)$$ (where $$a > 1$$) compresses the graph horizontally, while $$y = af(x)$$ stretches it vertically? Explain the mechanism in each case. (3 steps)", "a": "- Step 1: For $$y = f(ax)$$: the function \"sees\" the input $$ax$$ instead of $$x$$. When you move along the $$x$$-axis by 1 unit, the function advances by $$a$$ units of input. So it reaches the same feature (like a peak) in less horizontal distance \u2014 compression.\n+ Example: if the original peak is at $$x = 5$$, then $$f(2x)$$ peaks when $$2x = 5$$, i.e., $$x = 2.5$$. The peak moved closer to the origin.\n- Step 2: For $$y = af(x)$$: the function's output is multiplied by $$a$$. Every $$y$$-value is scaled by the same factor, pulling points further from the $$x$$-axis \u2014 vertical stretch.\n+ Example: if the original peak has height 3, then $$2f(x)$$ has height 6 at the same $$x$$-position.\n- Step 3: The key distinction: modifying the **input** ($$x$$-side) affects horizontal geometry (period, position of features); modifying the **output** ($$y$$-side) affects vertical geometry (amplitude, height of features, horizontal asymptotes).\n\nInput-side changes \u2192 horizontal effects. Output-side changes \u2192 vertical effects. Never confuse which side of $$f$$ the transformation acts on.", "source": "GLM 5.1"}, {"q": "Synthesis question: A curve $$y = f(x)$$ has a minimum at $$(3, -1)$$, a maximum at $$(-2, 4)$$, and a horizontal asymptote $$y = 2$$. State the coordinates of both turning points and the asymptote equation after the transformation $$y = -f(x) + 1$$. (3 steps)", "a": "- Step 1: $$y = -f(x)$$ reflects in the $$x$$-axis: every $$y$$-value negates. Then $$+1$$ shifts everything up by 1. Combined: new $$y = -y_{\\text{old}} + 1$$.\n- Step 2: Apply to each point:\n+ Minimum $$(3, -1)$$: new $$y = -(-1) + 1 = 2$$. New point: $$(3, 2)$$. This becomes a **maximum** (reflection flips min to max).\n+ Maximum $$(-2, 4)$$: new $$y = -(4) + 1 = -3$$. New point: $$(-2, -3)$$. This becomes a **minimum**.\n- Step 3: The horizontal asymptote $$y = 2$$: new $$y = -(2) + 1 = -1$$. Asymptote becomes $$y = -1$$. Both transformations affect the output side, so both move the horizontal asymptote.\n\n$$y = -f(x) + 1$$: reflect in $$x$$-axis then shift up 1. All $$y$$-values transform as $$y_{\\text{new}} = -y_{\\text{old}} + 1$$, including the asymptote.", "source": "GLM 5.1"}, {"q": "Synthesis question: Given $$\\sin\\alpha = p$$ with $$0 < \\alpha < 90\u00b0$$, find $$2\\sin(180\u00b0 + \\alpha) - \\sin(-\\alpha)$$ in terms of $$p$$. (3 steps)", "a": "- Step 1: $$\\sin(180\u00b0 + \\alpha) = -\\sin\\alpha = -p$$ (the \"past 180\u00b0\" identity \u2014 you're on the negative half of the sine wave).\n- Step 2: $$\\sin(-\\alpha) = -\\sin\\alpha = -p$$ (the odd-function identity).\n- Step 3: Substitute: $$2(-p) - (-p) = -2p + p = -p$$. The two identities produce the same intermediate value ($$-p$$), but the coefficients determine whether they reinforce or cancel.\n\nChaining trig identities: apply each identity separately, then combine the results algebraically. Don't try to skip steps \u2014 each identity is a mark-earner.", "source": "GLM 5.1"}, {"q": "Synthesis question: You integrate $$f'(x) = 3x^{-1/2} - 5x^{-2}$$ and get $$f(x) = 6x^{1/2} + 5x^{-1} + c$$. Check: is the sign on the second term correct? Walk through the integration of $$-5x^{-2}$$ carefully. (3 steps)", "a": "- Step 1: Integrate $$-5x^{-2}$$: add 1 to power \u2192 $$-2 + 1 = -1$$. Divide by the new power \u2192 $$-5 \\div (-1) = +5$$. Result: $$+5x^{-1}$$.\n- Step 2: Yes, the sign is correct! The original coefficient is $$-5$$ and the new power is $$-1$$. Dividing a negative by a negative gives a positive. So $$+5x^{-1} = +\\frac{5}{x}$$.\n- Step 3: The full integration: $$3x^{-1/2} \\to 3 \\cdot \\frac{x^{1/2}}{1/2} = 6x^{1/2}$$ (dividing by 1/2 = multiplying by 2). And $$-5x^{-2} \\to +5x^{-1}$$. So $$f(x) = 6\\sqrt{x} + \\frac{5}{x} + c$$ is fully correct.\n\nThe sign on $$-5x^{-2}$$ integrating to $$+5x^{-1}$$ is correct \u2014 negative \u00f7 negative = positive. Always verify by differentiating your answer back.", "source": "GLM 5.1"}, {"q": "Edge case: What happens to the \"ambiguous case\" of the sine rule when the angle in question is exactly 90\u00b0? Is there still ambiguity? (2 steps)", "a": "- Step 1: If $$\\sin x = 1$$ (i.e., $$x = 90\u00b0$$), then the other candidate angle would be $$180\u00b0 - 90\u00b0 = 90\u00b0$$. Both solutions are the same angle, so there is **no ambiguity** \u2014 the acute and obtuse candidates coincide.\n- Step 2: More generally, the ambiguous case only produces two genuinely different angles when $$0 < \\sin x < 1$$ (i.e., the angle is strictly between 0\u00b0 and 90\u00b0 or between 90\u00b0 and 180\u00b0, but not equal to either extreme). At $$\\sin x = 0$$ or $$\\sin x = 1$$, the two candidates collapse into one.\n\nThe ambiguous case vanishes at the extremes: when $$\\sin x = 0$$ (angle is 0\u00b0 or 180\u00b0) or $$\\sin x = 1$$ (angle is 90\u00b0), there's only one valid angle.", "source": "GLM 5.1"}, {"q": "Misconception probe: \"Since $$y = f(-x)$$ reflects the graph, the horizontal asymptote $$y = 3$$ should become $$y = -3$$.\" Why is this wrong? (2 steps)", "a": "- Step 1: The reflection in $$y = f(-x)$$ is a **horizontal** reflection (in the $$y$$-axis), not a vertical one. Horizontal reflections flip the graph left-right but do not change any $$y$$-values \u2014 they only change where along the $$x$$-axis each $$y$$-value occurs.\n- Step 2: A horizontal asymptote describes a **$$y$$-value** that the curve approaches. Since $$y$$-values are unchanged by a horizontal reflection, the asymptote stays at $$y = 3$$. To get $$y = -3$$, you would need a **vertical** reflection: $$y = -f(x)$$.\n\nHorizontal reflection \u2192 horizontal asymptote unchanged. Vertical reflection \u2192 horizontal asymptote flips sign. The direction of reflection determines which coordinates are affected.", "source": "GLM 5.1"}, {"q": "Misconception probe: \"Integration always makes the power of $$x$$ go up, so integrating $$x^{-1}$$ gives $$x^0 = 1$$.\" Why is this wrong, and what is the actual result? (3 steps)", "a": "- Step 1: Applying the rule mechanically: add 1 to the power \u2192 $$-1 + 1 = 0$$, divide by the new power \u2192 divide by 0. Division by zero is undefined, so the power rule **breaks down** for $$x^{-1}$$.\n- Step 2: The integral of $$x^{-1}$$ is a special case: $$\\int x^{-1}\\,dx = \\ln|x| + c$$. This is because the derivative of $$\\ln|x|$$ is $$\\frac{1}{x} = x^{-1}$$, which can be verified but not derived from the power rule.\n- Step 3: The power rule $$\\int x^n\\,dx = \\frac{x^{n+1}}{n+1} + c$$ is valid for all $$n \\neq -1$$. The case $$n = -1$$ is the one exception \u2014 it's the \"hole\" in the power rule where the formula would require division by zero.\n\n$$x^{-1}$$ is the one power the standard integration rule cannot handle \u2014 its integral is $$\\ln|x|$$, a fundamentally different function.", "source": "GLM 5.1"}, {"q": "Misconception probe: \"If I get the right final answer, I'll get full marks even if my working has some errors.\" Under what circumstances is this false? (2 steps)", "a": "- Step 1: This is false whenever the mark scheme requires valid method marks (M) before awarding accuracy marks (A). If your method is invalid (M0), all dependent marks collapse \u2014 even if the final number is correct. Q7(a) is the proof: $$A = -4$$ was right, but invalid differentiation earned 0/4.\n- Step 2: It's also false on any question with the rubric \"show all stages of your working; solutions relying on calculator technology are not acceptable.\" These questions explicitly require demonstrated valid method. Even on other questions, the general principle holds: examiners mark the process, not just the endpoint.\n\nRight answer + wrong working = 0 marks when method marks are required. The journey must be valid.", "source": "GLM 5.1"}, {"q": "The A* execution-habits card lists 8 items. One states: \"Reject impossible roots with a reason \u2014 square \u2265 0; negative discriminant.\" Give a concrete example of each type of rejection. (2 steps)", "a": "- Step 1: **Square \u2265 0**: From Q6, the substitution $$u = x^2$$ gave $$u = -\\frac{5}{2}$$. Since $$x^2 \\geq 0$$ for all real $$x$$, this value is impossible. Rejection reason: \"$$x^2$$ cannot be negative.\"\n- Step 2: **Negative discriminant**: From the extra practice, the factor $$u^2 + 2u + 12 = 0$$ has discriminant $$4 - 48 = -44 < 0$$. Since there are no real roots, this factor produces no valid solutions. Rejection reason: \"discriminant is negative, so no real roots.\"\n\nEach rejection type has a standard reason: \"square can't be negative\" or \"discriminant is negative.\" Always state it \u2014 the reason earns the mark.", "source": "GLM 5.1"}, {"q": "When sketching a transformed graph, the study notes say you must show the curve is \"clearly asymptotic at both ends.\" What does this mean visually, and why does it matter for marks? (2 steps)", "a": "- Step 1: \"Clearly asymptotic at both ends\" means the drawn curve must visibly approach the asymptote line as $$x \\to +\\infty$$ and as $$x \\to -\\infty$$ (or the relevant domain extremes). The curve should get closer and closer to the asymptote without touching or crossing it erratically.\n- Step 2: It matters because the mark scheme awards a B-mark specifically for the correct asymptote **and** the curve being drawn to approach it. A curve that drifts away from the asymptote, crosses it unnecessarily, or doesn't show the approaching behaviour fails to demonstrate understanding of what an asymptote means.\n\nAn asymptote isn't just a line you label \u2014 it's a line the curve must visibly approach. Draw the curve hugging the asymptote at both extremes.", "source": "GLM 5.1"}, {"q": "Simple exercise: The original curve has a minimum at $$(1, 3)$$ and a horizontal asymptote $$y = 5$$. After the transformation $$y = f(x) - 4$$, state the new minimum point and the new asymptote. (2 steps)", "a": "- Step 1: $$y = f(x) - 4$$ shifts everything down by 4. The minimum $$(1, 3)$$ becomes $$(1, 3-4) = (1, -1)$$. The $$x$$-coordinate is unchanged (vertical translation doesn't affect horizontal position).\n- Step 2: The horizontal asymptote $$y = 5$$ also shifts down by 4: $$y = 5 - 4 = 1$$. Vertical translations move all horizontal features (points' $$y$$-coordinates, horizontal asymptotes) by the same amount.\n\n$$y = f(x) - 4$$: everything drops by 4. Minimum becomes $$(1, -1)$$, asymptote becomes $$y = 1$$.", "source": "GLM 5.1"}, {"q": "Simple exercise: If $$y = \\sin x$$ has one complete wave in the interval $$0\u00b0$$ to $$360\u00b0$$, how many complete waves does $$y = \\sin 3x$$ have in the same interval, and what is its period? (2 steps)", "a": "- Step 1: The period of $$y = \\sin(nx)$$ is $$\\frac{360\u00b0}{n}$$. For $$n = 3$$, the period is $$\\frac{360\u00b0}{3} = 120\u00b0$$. Each wave takes 120\u00b0 of horizontal space.\n- Step 2: In the interval $$0\u00b0$$ to $$360\u00b0$$, the number of complete waves is $$\\frac{360\u00b0}{120\u00b0} = 3$$. So $$y = \\sin 3x$$ completes three full waves in the same space where $$\\sin x$$ completes one.\n\nGeneral rule: $$y = \\sin(nx)$$ fits $$n$$ waves in 360\u00b0, with period $$\\frac{360\u00b0}{n}$$. The \"n\" inside = n times as many waves.", "source": "GLM 5.1"}, {"q": "Simple exercise: Given $$f'(x) = 4x^{1/2} + 2x^{-2}$$, integrate to find $$f(x)$$. Show each fractional/negative power step. (3 steps)", "a": "- Step 1: $$4x^{1/2}$$: add 1 to power \u2192 $$\\frac{1}{2} + 1 = \\frac{3}{2}$$. Divide by new power \u2192 $$4 \\div \\frac{3}{2} = 4 \\times \\frac{2}{3} = \\frac{8}{3}$$. Result: $$\\frac{8}{3}x^{3/2}$$.\n- Step 2: $$2x^{-2}$$: add 1 to power \u2192 $$-2 + 1 = -1$$. Divide by new power \u2192 $$2 \\div (-1) = -2$$. Result: $$-2x^{-1} = -\\frac{2}{x}$$.\n- Step 3: Combine with $$+c$$: $$f(x) = \\frac{8}{3}x^{3/2} - \\frac{2}{x} + c$$. Note: the sign on the second term flipped from $$+2$$ to $$-2$$ because dividing by the negative power ($$-1$$) flips the sign.\n\n$$f(x) = \\frac{8}{3}x^{3/2} - \\frac{2}{x} + c$$ \u2014 the fractional power required \u00f7(3/2) = \u00d7(2/3), and the negative power required \u00f7(\u22121) which flipped the sign.", "source": "GLM 5.1"}, {"q": "The study notes identify Q9 (\u22128 marks) and Q7 (\u22126 marks) as accounting for 14 of the 21 lost marks. What specific habit fixes each, and why would fixing just these two move the grade \"a whole band\"? (2 steps)", "a": "- Step 1: Q9 (\u22128) is fixed by knowing **trig symmetry identities and double-angle period** cold \u2014 these are recallable facts, not skills that need practice. Q7 (\u22126) is fixed by **showing valid working** (not just correct answers) and **handling fractional/negative powers** correctly in integration.\n- Step 2: Moving from 29/75 to 43/75 (recovering those 14 marks) crosses from the D/E band into the B range. That's a two-grade jump from fixing just two habits. The remaining 7 lost marks (Q1, Q2, Q4) are smaller execution fixes that would push even higher.\n\n14 marks from two habits = a whole grade band. Q9 is knowledge (learn the identities), Q7 is discipline (show valid work, track powers carefully).", "source": "GLM 5.1"}, {"q": "Why is the substitution $$u = \\sqrt{x}$$ useful for equations containing terms like $$x^{3/2}$$ and $$x$$? What does each power become in terms of $$u$$? (2 steps)", "a": "- Step 1: If $$u = \\sqrt{x} = x^{1/2}$$, then $$x = u^2$$ and $$x^{3/2} = (x^{1/2})^3 = u^3$$. The fractional power becomes a clean integer power.\n- Step 2: Similarly, $$x = u^2$$ and any constant stays as is. So an equation like $$x^{3/2} + 7x - 24 = 0$$ becomes $$u^3 + 7u^2 - 24 = 0$$ \u2014 a standard cubic in $$u$$ that can be factorised normally. The substitution converts awkward fractional powers into integer powers.\n\n$$u = \\sqrt{x}$$ turns half-integer powers into integer powers: $$x^{1/2} \\to u$$, $$x \\to u^2$$, $$x^{3/2} \\to u^3$$, $$x^2 \\to u^4$$, etc.", "source": "GLM 5.1"}, {"q": "Synthesis: A question asks you to sketch $$y = 2f(x) - 3$$ where $$f(x)$$ has a maximum at $$(4, 5)$$, a minimum at $$(-1, -2)$$, and horizontal asymptote $$y = 1$$. Find all three transformed features. (3 steps)", "a": "- Step 1: Apply $$y = 2f(x)$$ first (vertical stretch by factor 2): all $$y$$-values double. Maximum becomes $$(4, 10)$$, minimum becomes $$(-1, -4)$$, asymptote becomes $$y = 2$$.\n- Step 2: Then apply $$-3$$ (shift down 3): subtract 3 from all $$y$$-values. Maximum becomes $$(4, 7)$$, minimum becomes $$(-1, -7)$$, asymptote becomes $$y = 2 - 3 = -1$$.\n- Step 3: Combined formula: new $$y = 2y_{\\text{old}} - 3$$. Check: max $$2(5)-3=7$$ \u2713, min $$2(-2)-3=-7$$ \u2713, asymptote $$2(1)-3=-1$$ \u2713. The shape is stretched vertically and shifted down \u2014 the maximum and minimum are both further from the new asymptote.\n\nFor combined output-side transformations, apply the formula $$y_{\\text{new}} = a \\cdot y_{\\text{old}} + b$$ to every $$y$$-value: turning points, asymptote, intercepts.", "source": "GLM 5.1"}, {"q": "The study notes mention that Q3 and Q6 carried the printed rubric about showing working. What types of questions typically carry this rubric, and why? (2 steps)", "a": "- Step 1: Questions that can be solved entirely on a calculator (e.g., solving simultaneous equations, finding roots of polynomials, evaluating definite integrals numerically) typically carry this rubric. The exam board wants to test your **algebraic method**, not your calculator skills.\n- Step 2: The reason: if a student can type equations into a solver and write the answer, the examiner cannot distinguish between someone who understands the algebra and someone who doesn't. The rubric forces you to demonstrate the mathematical process \u2014 substitution, factorisation, the quadratic formula \u2014 as evidence of understanding.\n\n\"Show all working\" rubric appears on calculator-solvable questions to ensure the algebra is tested, not bypassed.", "source": "GLM 5.1"}, {"q": "Counter-example probe: Is it ever possible for $$y = f(-x)$$ to change a horizontal asymptote? Under what special condition on $$f$$? (2 steps)", "a": "- Step 1: For a general function, no \u2014 $$y = f(-x)$$ is a horizontal reflection and does not change horizontal asymptotes. However, if $$f$$ is **not symmetric** in its approach to the asymptote, the left-tail and right-tail behaviours swap.\n- Step 2: The asymptote value itself doesn't change (both tails still approach the same $$y$$-value, just from opposite sides). But if the original function approaches $$y = k$$ from above on the right and from below on the left, then $$f(-x)$$ swaps these approaches. The **value** $$k$$ is unchanged \u2014 only the **manner** of approach may differ. So the asymptote equation stays the same.\n\nEven for asymmetric functions, $$y = f(-x)$$ does not change the horizontal asymptote's value \u2014 it only swaps the left and right approach behaviours.", "source": "GLM 5.1"}];
function render() {
  const container = document.getElementById('cards');
  container.innerHTML = cards.map((c, i) => 
    '<div class="card" id="card-' + i + '">' +
    '<div class="card-header">' +
    '<input type="checkbox" class="card-select" data-id="' + i + '" checked onchange="updateCount()">' +
    '<div class="card-q">' + (i+1) + '. ' + escapeHtml(c.q) + '</div>' +
    '<span class="card-source">' + c.source + '</span>' +
    '</div>' +
    '<div class="card-answer" id="ans-' + i + '">' + formatAnswer(c.a) + '</div>' +
    '</div>'
  ).join('');
  updateCount();
}
function escapeHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatAnswer(t) {
  t = escapeHtml(t);
  t = t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  t = t.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>');
  return '<p>' + t + '</p>';
}
function toggleAll() { document.querySelectorAll('.card-answer').forEach(el => el.classList.toggle('show')); }
function selectAll() { document.querySelectorAll('.card-select').forEach(cb => { cb.checked = true; cb.closest('.card').classList.remove('deselected'); }); updateCount(); }
function deselectAll() { document.querySelectorAll('.card-select').forEach(cb => { cb.checked = false; cb.closest('.card').classList.add('deselected'); }); updateCount(); }
function updateCount() {
  const checked = document.querySelectorAll('.card-select:checked').length;
  document.getElementById('count').textContent = checked + ' selected';
  document.querySelectorAll('.card-select').forEach(cb => { cb.closest('.card').classList.toggle('deselected', !cb.checked); });
}
function exportSelected() {
  const selected = [];
  document.querySelectorAll('.card-select:checked').forEach(cb => {
    const idx = parseInt(cb.dataset.id);
    selected.push('## Q' + (selected.length + 1) + '\n**Q:** ' + cards[idx].q + '\n\n**A:** ' + cards[idx].a);
  });
  document.getElementById('exportText').value = selected.join('\n\n---\n\n');
  document.getElementById('exportArea').style.display = 'block';
}
render();
</script>
</body>
