ms in the numerator is critical.\n- Step 2: Phuc dropped the minus sign. Harry's correction: \"Read the quotient rule from the formula book — the minus sign matters.\" The formula book has the minus sign, so there's no excuse for missing it. Dropping it would give $$7600e^{0.1t} + 400e^{0.3t}$$ instead of $$7600e^{0.1t} - 400e^{0.3t}$$, which would make finding the maximum impossible (setting a sum of positive terms to zero has no solution).\n\nTakeaway: Quotient rule has a minus sign: $$vu' - uv'$$. It's in the formula book. Don't drop it.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "Q5(b) — In the quotient-rule working, you encounter $$e^{0.1t} \\times e^{0.2t}$$. What does this simplify to, and why? (2 steps)", "answer": "- Step 1: $$e^{0.1t} \\times e^{0.2t} = e^{0.1t + 0.2t} = e^{0.3t}$$. When multiplying exponentials with the same base, you add the exponents.\n- Step 2: This comes up in the $$u \\cdot \\frac{dv}{dt}$$ term: $$4000e^{0.1t} \\times 0.2e^{0.2t} = 800e^{0.3t}$$. Recognising this index-law simplification keeps the expression manageable. If you leave it as $$e^{0.1t} \\cdot e^{0.2t}$$, you can't combine like terms later.\n\nTakeaway: $$e^{0.1t} \\cdot e^{0.2t} = e^{0.3t}$$. Add exponents when multiplying same-base exponentials.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "Q5(b) — Harry advised against rewriting $$\\frac{u}{v}$$ as $$u \\cdot v^{-1}$$ and using the product rule. Why is the quotient rule safer for this type of expression? (2 steps)", "answer": "- Step 1: While mathematically equivalent, the product rule on $$u \\cdot v^{-1}$$ requires you to differentiate $$v^{-1}$$ using the chain rule, introducing an extra step and an extra place to make a sign error (the derivative of $$v^{-1}$$ is $$-v^{-2}v'$$, and that minus sign is easy to lose).\n- Step 2: The quotient rule packages the subtraction and the $$v^2$$ denominator into one formula that's given in the formula book. You just read it off and substitute. Fewer steps = fewer errors. Harry's advice: use the tool that's in the formula book and has the fewest algebraic manipulations.\n\nTakeaway: For $$\\frac{u}{v}$$, use the quotient rule directly — it's in the formula book and avoids the extra chain-rule step.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "Q5(c) — When finding the maximum of $$N$$, you set $$\\frac{dN}{dt} = 0$$. The derivative is $$\\frac{7600e^{0.1t} - 400e^{0.3t}}{(19 + e^{0.2t})^2}$$. Why can you ignore the denominator? (2 steps)", "answer": "- Step 1: A fraction equals zero when its numerator equals zero (provided the denominator is not zero). So you only need $$7600e^{0.1T} - 400e^{0.3T} = 0$$.\n- Step 2: The denominator $$(19 + e^{0.2t})^2$$ can never be zero because $$e^{0.2t} > 0$$ for all $$t$$, so $$19 + e^{0.2t} > 19 > 0$$. Since the denominator is always positive, it never contributes a zero or a sign change. This is why you only need to solve the numerator.\n\nTakeaway: Denominator $$(19 + e^{0.2t})^2 > 0$$ always. Set only the numerator to zero.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": false}, {"question": "Q5(c) — After factoring out $$e^{0.1T}$$ from $$7600e^{0.1T} - 400e^{0.3T} = 0$$, you get $$e^{0.1T}(7600 - 400e^{0.2T}) = 0$$. Why do you reject $$e^{0.1T} = 0$$? (2 steps)", "answer": "- Step 1: $$e^{0.1T} = 0$$ has no real solution. The function $$e^x$$ is always positive for all real $$x$$ — it approaches zero as $$x \\to -\\infty$$ but never reaches it.\n- Step 2: Harry sketched $$y = e^x$$ to show it is always above the x-axis. Since $$e^{0.1T} > 0$$ for all $$T$$, it can never equal zero. Therefore, the only possibility is $$7600 - 400e^{0.2T} = 0$$, which gives $$e^{0.2T} = \\frac{7600}{400} = 19$$.\n\nTakeaway: $$e^x > 0$$ for all real $$x$$. Never accept $$e^{\\text{something}} = 0$$ as a solution.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": false}, {"question": "Q5(c) — The command word is \"show that $$e^{0.2T} = A$$.\" After deriving $$e^{0.2T} = 19$$, should you solve for $$T$$? Why or why not? (2 steps)", "answer": "- Step 1: No. Stop at $$e^{0.2T} = 19$$. The question says \"show that,\" which means demonstrate that the given equation holds. Once you've shown it, you're done with this part.\n- Step 2: Phuc pushed on to solve for $$T$$ and initially used $$\\log$$ (base 10) instead of $$\\ln$$. Both errors stem from not reading the command word. Solving for $$T$$ is what part (d) asks for, and the base is $$e$$, so $$\\ln$$ is the correct logarithm. Harry's correction: re-read the command — it only asks to show $$e^{0.2T} = 19$$, so stop there.\n\nTakeaway: \"Show that\" means stop at the shown line. Don't go further. Read the command word.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "Q5(c/d) — When you do need to solve $$e^{0.2T} = 19$$ for $$T$$, should you use $$\\log_{10}$$ or $$\\ln$$? How do you decide? (2 steps)", "answer": "- Step 1: Use $$\\ln$$ (natural logarithm), because the base of the exponential is $$e$$. Taking $$\\ln$$ of both sides: $$0.2T = \\ln 19$$, so $$T = \\frac{\\ln 19}{0.2}$$.\n- Step 2: Phuc initially wrote $$\\log$$ (base 10). While you could use $$\\log_{10}$$ — giving $$0.2T = \\log_{10}(19)/\\log_{10}(e)$$ — this is unnecessarily complicated and error-prone. When the base is $$e$$, $$\\ln$$ is the natural choice because $$\\ln(e^x) = x$$ directly. Using $$\\log_{10}$$ introduces an extra conversion factor.\n\nTakeaway: Base is $$e$$ → use $$\\ln$$. It's the inverse function that cancels $$e$$ directly.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": false}, {"question": "Q5(d) — Why must you substitute the stored (unrounded) value of $$T$$ back into the model, rather than a rounded value? (2 steps)", "answer": "- Step 1: $$T \\approx 14.72$$. If you round to $$T = 15$$ and substitute, you get a different (wrong) answer. If you round to $$T = 14.7$$, you get yet another answer. Each rounding introduces error that propagates through the exponential.\n- Step 2: Harry's rule: \"We only round at the very final answer. Use the stored value.\" Keep $$T$$ in your calculator's memory (or use the exact expression $$T = \\frac{\\ln 19}{0.2}$$) and substitute that into $$N$$. Only round the final $$N = 459$$ to the nearest whole number. Rounding early is a guaranteed way to lose accuracy marks.\n\nTakeaway: Round only the final answer. Substitute stored/unrounded values for all intermediate steps.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": false}, {"question": "Q5(d) — To compute the maximum $$N$$, you need $$e^{0.1T}$$. Given that $$e^{0.2T} = 19$$, how do you find $$e^{0.1T}$$ without computing $$T$$? (2 steps)", "answer": "- Step 1: Notice that $$0.1T = \\frac{1}{2}(0.2T)$$. So $$e^{0.1T} = e^{(0.2T)/2} = (e^{0.2T})^{1/2} = \\sqrt{e^{0.2T}}$$.\n- Step 2: Since $$e^{0.2T} = 19$$, we get $$e^{0.1T} = \\sqrt{19}$$. This avoids computing $$T$$ entirely. The denominator becomes $$19 + e^{0.2T} = 19 + 19 = 38$$. So $$N = \\frac{4000\\sqrt{19}}{38} = \\frac{4000}{38}\\sqrt{19} \\approx 458.83 \\approx 459$$.\n\nTakeaway: $$e^{0.1T} = \\sqrt{e^{0.2T}} = \\sqrt{19}$$. Use the relationship between exponents to avoid computing $$T$$.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": false}, {"question": "Q5 — The evidence pack contains a conflict: one source says the maximum is 959, another says 459. Which is correct, and how do you verify? (2 steps)", "answer": "- Step 1: The correct answer is 459. The official model is $$N = \\frac{4000e^{0.1t}}{19 + e^{0.2t}}$$. With $$e^{0.2T} = 19$$, we get $$N = \\frac{4000\\sqrt{19}}{38} \\approx 458.83 \\approx 459$$. The spoken transcript confirms Harry accepting \"459 is fine.\"\n- Step 2: The \"959\" comes from a transcription error where the denominator was mis-copied as $$19 + e^{0.1t}$$ (0.1 instead of 0.2). With that wrong denominator, the algebra gives a different (incorrect) result. Always verify against the official question paper, not against secondary transcriptions. When evidence conflicts, the paper is authoritative.\n\nTakeaway: 459 is correct. The \"959\" is a transcription error from a mis-copied denominator. Trust the official paper.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": false}, {"question": "Q1 — Although Q1 was not worked in this session, what type of question is it, and why should you prioritise it in independent practice? (2 steps)", "answer": "- Step 1: Q1 is a functions question involving $$f(x) = \\ln(x^2 + 3)$$ and $$g(x) = \\frac{3 + 5x}{x + 2}$$. The parts ask for: (a) the range of $$f$$, (b) the inverse $$g^{-1}$$, (c) the composite $$fg(0)$$, and (d) solving a composite-function equation exactly.\n- Step 2: These are standard opening marks (9 marks total) that test inverse functions, composite functions, and domain/range. They're typically straightforward if you know the methods, so they should be \"banker\" marks. Prioritise them because dropping marks on Q1 puts pressure on harder questions later.\n\nTakeaway: Q1 = functions (range, inverse, composite). Standard opener. Practise to secure these marks.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": false}, {"question": "When the question says \"solutions relying entirely on calculator technology are not acceptable,\" what does this require you to show in your working? (2 steps)", "answer": "- Step 1: You must show the algebraic steps that lead to your answer — the mathematical reasoning, not just a calculator output. For example, in Q3(c), you must show the differentiation step, the setting of $$\\frac{dV}{dt} = 50$$, and the logarithmic solving steps.\n- Step 2: You can use a calculator to evaluate the final numerical answer (e.g., $$T = 13$$), but the method must be visible. If you write only \"$$T = 13$$\" with no working, you score zero even if the answer is correct. The working proves you understand the method, not just that you can operate a solver.\n\nTakeaway: Show all algebraic steps. Calculator use is fine for evaluation, but the method must be on the page.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": false}, {"question": "Harry's recurring diagnostic — what did he identify as Phuc's main gap, and what was his prescribed fix? (2 steps)", "answer": "- Step 1: Formula recall is the main gap. Phuc forgot the sphere surface area, confused circle area with circumference, mixed up cylinder surface area with volume, and didn't know the $$a^{kx}$$ derivative rule. These are all formula-level gaps, not conceptual misunderstandings.\n- Step 2: Harry's fix: learn the ESAT \"cheat sheet\" with flashcards, and build fluency by doing \"8 to 10 papers\" so the formulae \"become second nature.\" The combination of spaced repetition (flashcards) and volume (past papers) moves formulae from recall to automaticity.\n\nTakeaway: Formula recall is the bottleneck. Fix it with flashcards + volume practice.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": false}, {"question": "Harry's exam-strategy advice — he said reaching A* in every module for October is \"going to be a real stretch.\" What alternative strategy did he suggest? (2 steps)", "answer": "- Step 1: Rather than entering all modules and risking low grades across the board, Harry suggested it may be \"safer to push some of these back\" and enter only the 3 or 4 modules you are most ready for.\n- Step 2: The logic: a low grade in a module can't be easily improved if it's already been certificated. Entering fewer modules but performing well in each is strategically better than entering all and getting mediocre results. The key constraint is the exam-entry deadline — Phuc needs to find this out from his centre so Harry can build \"a sensible plan.\"\n\nTakeaway: Quality over quantity. Enter modules you're ready for; defer the rest. Know your deadlines.", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": false}, {"question": "Harry's homework for the next session (19 July) includes a specific starter activity. What is it, and how should you prepare? (2 steps)", "answer": "- Step 1: Harry said: \"Next time I will ask you some questions as a starter\" — specifically on differentiation of power functions (the $$a^{kx}$$ rule). Expect to be tested on it at the beginning of the session.\n- Step 2: To prepare, drill the derivatives of $$2^x$$, $$3^x$$, $$3^{6x}$$, $$5^{2x}$$, $$1.12^t$$, and similar forms until they're automatic. The rule $$\\frac{d}{dx}(a^{kx}) = a^{kx} \\cdot k \\ln a$$ must be instant recall — no hesitation, no reaching for notes.\n\nTakeaway: Expect a differentiation starter drill. Know $$\\frac{d}{dx}(a^{kx}) = a^{kx} \\cdot k \\ln a$$ cold.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": false}, {"question": "The evidence pack flags a conflict in Q4(a) coefficients: one source says $$3\\sin 2x - 4\\cos 2x$$ (giving $$R = 5$$), while the official paper says $$\\sqrt{3}\\sin 2x - 3\\cos 2x$$. Which is authoritative, and why? (2 steps)", "answer": "- Step 1: The official paper is authoritative. The correct expression is $$\\sqrt{3}\\sin 2x - 3\\cos 2x$$, giving $$R = 2\\sqrt{3}$$ and $$\\alpha = \\frac{\\pi}{3}$$.\n- Step 2: The \"$$R = 5$$\" version comes from $$3\\sin 2x - 4\\cos 2x$$, which is a transcription error in one analysis segment. It contradicts both the official paper and the other analysis segment. When evidence conflicts, the question paper is the primary source — it's what students actually saw in the exam.\n\nTakeaway: The paper is the ground truth. $$\\sqrt{3}\\sin 2x - 3\\cos 2x$$, not $$3\\sin 2x - 4\\cos 2x$$.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": false}, {"question": "For Q2(b), there's a transcript/ledger conflict about whether Phuc completed the rearrangement. What does this conflict illustrate about evidence reliability, and what is the safest approach for your own revision? (2 steps)", "answer": "- Step 1: The transcript records Harry saying \"well done, and then we're there\" (completed with prompting), while the video ledger labels it only partial. This shows that secondary evidence (summaries, ledgers) can be inconsistent with primary evidence (the actual recording).\n- Step 2: For revision, the safest approach is to learn the full method (as reconstructed from the paper and Harry's hints) regardless of how far Phuc got. You need to be able to do the complete rearrangement independently: multiply by $$e^x x^2$$, expand, rearrange, factor $$x^3(2x+3)$$, divide, and cube-root. Don't rely on someone else's partial completion.\n\nTakeaway: Learn the full method yourself. Evidence conflicts don't change what you need to know.", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": false}, {"question": "Conceptual check — Why does $$e^x > 0$$ for all real $$x$$? Give both an algebraic and a visual argument. (2 steps)", "answer": "- Step 1: Algebraic argument: $$e^x$$ is defined as the limit $$\\lim_{n \\to \\infty}(1 + \\frac{x}{n})^n$$. For any real $$x$$ and large enough $$n$$, the base $$(1 + x/n) > 0$$, so a positive number raised to any power is positive. Alternatively, $$e^x = \\sum_{k=0}^{\\infty} \\frac{x^k}{k!} \\geq 1$$ for $$x \\geq 0$$, and for $$x < 0$$, $$e^x = \\frac{1}{e^{-x}} > 0$$ since $$e^{-x} > 0$$.\n- Step 2: Visual argument: the graph of $$y = e^x$$ is always above the x-axis. As $$x \\to +\\infty$$, $$e^x \\to +\\infty$$; as $$x \\to -\\infty$$, $$e^x \\to 0^+$$ (approaches zero from above). The graph never touches or crosses the x-axis. This is why $$e^{0.1T} = 0$$ has no solution — the exponential never reaches zero.\n\nTakeaway: $$e^x > 0$$ always. It approaches 0 but never reaches it. This is fundamental to rejecting spurious solutions.", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": true}, {"question": "Conceptual check — When minimising a fraction $$\\frac{k}{f(x)}$$ where $$k > 0$$ is constant, explain why maximising $$f(x)$$ minimises the fraction. What changes if $$k < 0$$? (2 steps)", "answer": "- Step 1: If $$k > 0$$, then $$\\frac{k}{f(x)}$$ decreases as $$f(x)$$ increases (dividing a positive number by a larger positive number gives a smaller result). So the minimum of the fraction occurs at the maximum of the denominator. This is the Q4(b)(i) strategy.\n- Step 2: If $$k < 0$$, the relationship reverses: $$\\frac{k}{f(x)}$$ becomes more negative (i.e., smaller) as $$f(x)$$ decreases (dividing a negative number by a smaller positive number gives a more negative result). So for $$k < 0$$, you'd minimise the fraction by minimising the denominator instead. Always check the sign of the numerator first.\n\nTakeaway: $$k > 0$$: min fraction = max denominator. $$k < 0$$: min fraction = min denominator. Check the sign of $$k$$.", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": true}, {"question": "Edge case — What if the denominator $$f(3x) + 4\\sqrt{3}$$ in Q4(b) could equal zero? How would that change the problem? (2 steps)", "answer": "- Step 1: If the denominator could equal zero, the function $$g(x)$$ would have vertical asymptotes and would be undefined at those points. The minimum wouldn't exist as a finite value — the function would tend to $$-\\infty$$ near the asymptote (if approached from one side).\n- Step 2: In Q4(b), the denominator is $$2\\sqrt{3}\\sin(6x - \\frac{\\pi}{3}) + 4\\sqrt{3}$$. The minimum value of the sine term is $$-1$$, giving a minimum denominator of $$-2\\sqrt{3} + 4\\sqrt{3} = 2\\sqrt{3} > 0$$. So the denominator is always positive and never zero — the function is well-defined for all $$x$$. This is why the \"minimise by maximising denominator\" strategy works safely here.\n\nTakeaway: Always check that the denominator stays positive. If it can reach zero, the fraction has asymptotes, not a finite minimum.", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": true}, {"question": "Mini-drill — Differentiate $$3^x$$ exactly. Walk through identifying $$a$$ and $$k$$. (2 steps)", "answer": "- Step 1: $$3^x = 3^{1 \\cdot x}$$, so $$a = 3$$, $$k = 1$$. This is the basic $$a^x$$ case.\n- Step 2: $$\\frac{d}{dx}(3^x) = 3^x \\cdot 1 \\cdot \\ln 3 = 3^x \\ln 3$$. The chain-rule factor $$k = 1$$ doesn't change anything, and the base-3 logarithm factor is $$\\ln 3$$.", "source": "GLM 5.1 ②", "_id": "glm_2_50", "judge_pick": false}, {"question": "Mini-drill — Differentiate $$5^{2x}$$ exactly. Walk through identifying $$a$$ and $$k$$. (2 steps)", "answer": "- Step 1: $$5^{2x}$$ has $$a = 5$$, $$k = 2$$. The exponent is $$2x$$, so the chain rule brings down $$k = 2$$.\n- Step 2: $$\\frac{d}{dx}(5^{2x}) = 5^{2x} \\cdot 2\\ln 5$$. The factor is $$k \\ln a = 2\\ln 5$$.", "source": "GLM 5.1 ②", "_id": "glm_2_51", "judge_pick": false}, {"question": "Synthesis — A question gives you $$\\log_3 V = 2t + 1$$ and asks for the rate of change of $$V$$ when $$t = 5$$. Outline the complete strategy without computing the final number. (4 steps)", "answer": "- Step 1: Identify the axes: the y-axis is $$\\log_3 V$$, the x-axis is $$t$$. The equation is already in straight-line form $$y = mx + c$$ with $$m = 2$$, $$c = 1$$.\n- Step 2: Convert to exponential form: raise 3 to both sides. $$V = 3^{2t+1} = 3^{2t} \\cdot 3^1 = 3 \\cdot (3^2)^t = 3 \\cdot 9^t$$. So $$a = 3$$, $$b = 9$$.\n- Step 3: \"Rate of change\" means differentiate. Using $$\\frac{d}{dt}(a \\cdot b^t) = a \\cdot b^t \\ln b$$: $$\\frac{dV}{dt} = 3 \\cdot 9^t \\ln 9$$. Keep the exact base 9, not a rounded decimal.\n- Step 4: Substitute $$t = 5$$ into the derivative and evaluate. Use the stored/exact form throughout; round only the final answer.\n\nTakeaway: Read axes → convert to $$ab^t$$ → differentiate exact base → substitute and round at the end.", "source": "GLM 5.1 ②", "_id": "glm_2_52", "judge_pick": false}, {"question": "Synthesis — A model gives $$P = \\frac{2000e^{0.05t}}{10 + e^{0.1t}}$$. Outline the strategy to find the maximum value of $$P$$, without computing the final number. (5 steps)", "answer": "- Step 1: Find $$\\frac{dP}{dt}$$ using the quotient rule. $$u = 2000e^{0.05t}$$, $$v = 10 + e^{0.1t}$$. Compute $$u' = 100e^{0.05t}$$, $$v' = 0.1e^{0.1t}$$. Apply $$\\frac{vu' - uv'}{v^2}$$. Keep the minus sign.\n- Step 2: Simplify the numerator. The cross-term $$u \\cdot v'$$ produces $$e^{0.05t} \\cdot e^{0.1t} = e^{0.15t}$$. Collect like terms in the numerator.\n- Step 3: Set $$\\frac{dP}{dt} = 0$$. The denominator $$(10 + e^{0.1t})^2$$ is always positive, so only the numerator matters. Factor out $$e^{0.05T}$$ (which is never zero) and solve the remaining factor.\n- Step 4: This gives an equation of the form $$e^{0.1T} = k$$ for some constant $$k$$. If the question says \"show that $$e^{0.1T} = k$$,\" stop here. If it asks for $$T$$, take $$\\ln$$: $$T = \\frac{\\ln k}{0.1}$$.\n- Step 5: Substitute back for the maximum $$P$$. Use the relationship $$e^{0.05T} = \\sqrt{e^{0.1T}} = \\sqrt{k}$$ to avoid computing $$T$$. Keep stored values; round only the final answer.\n\nTakeaway: Quotient rule → set numerator to zero → factor out exponential → solve → substitute back exactly.", "source": "GLM 5.1 ②", "_id": "glm_2_53", "judge_pick": false}, {"question": "Synthesis — You need to express $$5\\sin\\theta + 12\\cos\\theta$$ in the form $$R\\sin(\\theta + \\alpha)$$. Note the PLUS sign. How does this change the expansion compared to $$R\\sin(\\theta - \\alpha)$$? (3 steps)", "answer": "- Step 1: Expand $$R\\sin(\\theta + \\alpha) = R\\sin\\theta\\cos\\alpha + R\\cos\\theta\\sin\\alpha = (R\\cos\\alpha)\\sin\\theta + (R\\sin\\alpha)\\cos\\theta$$. Note: the second term is PLUS $$R\\sin\\alpha\\cos\\theta$$, because $$\\sin(\\theta + \\alpha)$$ has a plus sign in the compound-angle formula.\n- Step 2: Match with $$5\\sin\\theta + 12\\cos\\theta$$: $$R\\cos\\alpha = 5$$, $$R\\sin\\alpha = 12$$. Both right-hand sides are positive, confirming $$\\alpha$$ is in the first quadrant.\n- Step 3: The method is the same — divide for $$\\tan\\alpha = 12/5$$, square-and-add for $$R = 13$$. The key difference from the minus case is in the expansion: $$R\\sin(\\theta + \\alpha)$$ gives $$+R\\sin\\alpha\\cos\\theta$$, while $$R\\sin(\\theta - \\alpha)$$ gives $$-R\\sin\\alpha\\cos\\theta$$. Always expand from the formula book; don't assume the signs.\n\nTakeaway: The sign in $$R\\sin(\\theta \\pm \\alpha)$$ determines the sign of the $$\\cos\\theta$$ term. Always expand carefully.", "source": "GLM 5.1 ②", "_id": "glm_2_54", "judge_pick": false}, {"question": "Misconception probe — A student says: \"For the IVT, I just need to show $$f(1) < 0$$ and $$f(2) > 0$$, and that proves there's a root.\" What's missing? (2 steps)", "answer": "- Step 1: The continuity statement is missing. A sign change alone does not prove a root exists — the IVT requires the function to be continuous on the closed interval. Without continuity, the function could have a discontinuity (jump or asymptote) between the endpoints and skip over zero.\n- Step 2: Harry emphasised: \"You must remember sign change and continuity. Otherwise you'll only score one mark.\" The mark scheme allocates one mark for the sign change and one mark for stating continuity. Omitting continuity loses a mark and shows incomplete understanding of the theorem.\n\nTakeaway: IVT proof = sign change + continuity statement. Both are required for both marks.", "source": "GLM 5.1 ②", "_id": "glm_2_55", "judge_pick": false}, {"question": "Misconception probe — A student differentiates $$100(1.12)^t$$ and gets $$100(1.12)^t \\cdot t \\cdot \\ln(1.12)$$. What's wrong, and what should it be? (2 steps)", "answer": "- Step 1: The extra factor of $$t$$ is wrong. The derivative of $$a^{kt}$$ with respect to $$t$$ is $$a^{kt} \\cdot k \\ln a$$, not $$a^{kt} \\cdot t \\cdot \\ln a$$. The chain rule brings down the derivative of the exponent $$kt$$, which is $$k$$ (a constant), not $$t$$ (a variable).\n- Step 2: For $$100(1.12)^t = 100 \\cdot (1.12)^{1 \\cdot t}$$, the derivative is $$100 \\cdot (1.12)^t \\cdot 1 \\cdot \\ln(1.12) = 100(1.12)^t \\ln(1.12)$$. The $$k = 1$$ because the exponent is just $$t$$. The factor from the chain rule is always a constant ($$k$$), never the variable $$t$$.\n\nTakeaway: Chain rule on exponent gives constant $$k$$, not variable $$t$$. $$\\frac{d}{dt}(a^{kt}) = a^{kt} \\cdot k\\ln a$$.", "source": "GLM 5.1 ②", "_id": "glm_2_56", "judge_pick": true}, {"question": "Misconception probe — A student solving $$e^{0.2T} = 19$$ writes $$0.2T = \\log_{10}(19)$$. What's wrong? (2 steps)", "answer": "- Step 1: The base of the logarithm is wrong. Since the exponential has base $$e$$, the inverse function is $$\\ln$$ (natural logarithm), not $$\\log_{10}$$. The correct step is $$0.2T = \\ln 19$$.\n- Step 2: Using $$\\log_{10}$$ would give $$0.2T = \\log_{10}(19) / \\log_{10}(e)$$ by the change-of-base formula, which is a more complicated expression that evaluates to the same number but is not the natural or expected form. In an exam, writing $$\\log_{10}$$ when the base is $$e$$ suggests you don't recognise the relationship between $$e^x$$ and $$\\ln x$$.\n\nTakeaway: $$e^x = k \\Rightarrow x = \\ln k$$. The natural logarithm is the inverse of the exponential with base $$e$$.", "source": "GLM 5.1 ②", "_id": "glm_2_57", "judge_pick": false}, {"question": "Edge case — In the ESAT sphere-cylinder problem, what if the question said \"open cylinders\" instead of \"closed cylinders\"? How would the equation change? (2 steps)", "answer": "- Step 1: An open cylinder has no top, so it has only one circular end (the base) plus the curved side. The surface area becomes $$\\pi r^2 + 2\\pi rh$$ (one end, not two).\n- Step 2: The equation would change from $$4\\pi R^2 = 10(2\\pi r^2 + 2\\pi rh)$$ to $$4\\pi R^2 = 10(\\pi r^2 + 2\\pi rh)$$. This gives a different quadratic and a different answer. The word \"closed\" vs \"open\" changes the number of ends from 2 to 1, which is a significant algebraic difference. Always read this detail carefully.\n\nTakeaway: Closed = 2 ends ($$2\\pi r^2$$). Open = 1 end ($$\\pi r^2$$). One word changes the formula.", "source": "GLM 5.1 ②", "_id": "glm_2_58", "judge_pick": true}, {"question": "Harry's 10-point trap checklist — Trap #3 states that the derivative of $$a^{kx}$$ has the factor $$k\\ln a$$, never $$\\ln(kx)$$. Give a quick numerical sanity check that proves $$\\ln(kx)$$ is wrong. (2 steps)", "answer": "- Step 1: If the derivative of $$3^{6x}$$ were $$3^{6x} \\ln(6x)$$, then at $$x = 1$$ the derivative would be $$3^6 \\ln 6 \\approx 729 \\times 1.79 \\approx 1306$$. At $$x = 2$$, it would be $$3^{12} \\ln 12 \\approx 531441 \\times 2.48 \\approx 1{,}318{,}000$$.\n- Step 2: But if the derivative is $$3^{6x} \\cdot 6\\ln 3$$, then at $$x = 1$$ it's $$729 \\times 6.59 \\approx 4805$$ and at $$x = 2$$ it's $$531441 \\times 6.59 \\approx 3{,}502{,}000$$. The two formulas give completely different numbers. More importantly, $$\\ln(kx)$$ depends on $$x$$ in a way that contradicts the chain rule: the chain rule produces a constant factor ($$k$$), not a variable one ($$\\ln(kx)$$ grows with $$x$$).\n\nTakeaway: The factor $$k\\ln a$$ is constant. $$\\ln(kx)$$ varies with $$x$$. The chain rule gives a constant multiplier.", "source": "GLM 5.1 ②", "_id": "glm_2_59", "judge_pick": false}, {"question": "Harry's trap checklist — Trap #7: \"Quotient rule: keep the minus sign; it is in the formula book.\" Why is dropping the minus sign particularly catastrophic for finding maxima/minima? (2 steps)", "answer": "- Step 1: The quotient rule gives $$\\frac{vu' - uv'}{v^2}$$. If you write $$vu' + uv'$$ instead, the numerator becomes a sum of positive terms (when $$u, v, u', v' > 0$$), which can never equal zero. Setting $$\\frac{dN}{dt} = 0$$ would have no solution.\n- Step 2: This means you'd conclude the function has no maximum or minimum, which is wrong. In Q5, dropping the minus sign changes the numerator from $$7600e^{0.1t} - 400e^{0.3t}$$ (which equals zero at some $$T$$) to $$7600e^{0.1t} + 400e^{0.3t}$$ (which is always positive and never zero). The entire part (c) and (d) become impossible.\n\nTakeaway: Dropping the minus sign in the quotient rule can eliminate the existence of any stationary point. Always use the formula book version.", "source": "GLM 5.1 ②", "_id": "glm_2_60", "judge_pick": false}, {"question": "Harry's trap checklist — Trap #10: \"Read the command word: 'show that' means stop at the shown line.\" Give an example from Q5 of what happens if you ignore this. (2 steps)", "answer": "- Step 1: Q5(c) says \"show that $$e^{0.2T} = A$$.\" The correct response is to derive $$e^{0.2T} = 19$$ and stop. If you continue and solve for $$T = \\frac{\\ln 19}{0.2}$$, you've done extra work that earns no additional marks and wastes time.\n- Step 2: Worse, Phuc also used $$\\log_{10}$$ instead of $$\\ln$$ when solving for $$T$$, introducing an error that wouldn't have occurred if he'd stopped at the \"show that\" line. Over-solving \"show that\" questions creates extra opportunities for mistakes without gaining any marks.\n\nTakeaway: \"Show that\" = derive the given result and stop. Don't solve further.", "source": "GLM 5.1 ②", "_id": "glm_2_61", "judge_pick": false}, {"question": "Harry's trap checklist — Trap #1: \"IVT: state both sign change and continuity, or lose a mark.\" What exactly should you write for the continuity statement in a typical P3 question? (2 steps)", "answer": "- Step 1: Write something like: \"$$f$$ is continuous on $$[1, 2]$$\" or \"$$f$$ is continuous for all $$x$$ in the interval $$[1, 2]$$.\" This is a statement, not a proof — you don't need to prove continuity from first principles, just assert it.\n- Step 2: The justification is that $$f$$ is defined for all $$x$$ in $$[1, 2]$$ (check: any restrictions like $$x \\neq 0$$ don't affect this interval). In P3, functions made from polynomials, exponentials, and logarithms are continuous on their domains, so if the interval doesn't contain any domain exclusions, continuity holds. Just state it clearly.\n\nTakeaway: Write \"$$f$$ is continuous on $$[a, b]$$\" as a separate sentence after showing the sign change.", "source": "GLM 5.1 ②", "_id": "glm_2_62", "judge_pick": false}, {"question": "Harry's trap checklist — Trap #8: \"Models: $$e^0 = 1$$, keep the '+1'; use ln (base e), not $$\\log_{10}$$.\" Give two specific scenarios where this trap appears. (2 steps)", "answer": "- Step 1: Scenario 1: evaluating a model at $$t = 0$$. If the denominator is $$19 + e^{0.2 \\times 0} = 19 + e^0 = 19 + 1 = 20$$, forgetting that $$e^0 = 1$$ gives $$19 + 0 = 19$$, which is wrong. Phuc made this exact slip in Q5(a).\n- Step 2: Scenario 2: solving $$e^{0.2T} = 19$$. Taking $$\\log_{10}$$ instead of $$\\ln$$ gives a correct-but-inefficient expression and signals misunderstanding. The base is $$e$$, so the inverse is $$\\ln$$. Using $$\\log_{10}$$ requires the change-of-base formula and introduces unnecessary complexity and potential error.\n\nTakeaway: $$e^0 = 1$$ (never 0). Base $$e$$ → use $$\\ln$$. These are the two most common model-related slips.", "source": "GLM 5.1 ②", "_id": "glm_2_63", "judge_pick": false}, {"question": "Harry's trap checklist — Trap #5: \"Exact-value trig: square-and-add for R, divide for tan α; no decimals.\" Why does substituting a decimal α back to find R give a non-exact answer? (2 steps)", "answer": "- Step 1: If you compute $$\\alpha = \\tan^{-1}(\\sqrt{3}) \\approx 1.047$$ (a decimal) and then find $$R = \\frac{\\sqrt{3}}{\\cos(1.047)}$$, you're dividing by an approximation. The result is approximately $$3.464$$, which is close to $$2\\sqrt{3}$$ but not exact.\n- Step 2: The mark scheme requires the exact value $$R = 2\\sqrt{3}$$. A decimal approximation like 3.46 doesn't earn the exact-value mark. Square-and-add gives $$R = \\sqrt{12} = 2\\sqrt{3}$$ exactly, with no rounding at any step. The method matters for the mark, not just the approximate numerical answer.\n\nTakeaway: For exact values, square-and-add is the only safe method. Decimal substitution gives approximations, not exact values.", "source": "GLM 5.1 ②", "_id": "glm_2_64", "judge_pick": false}, {"question": "Harry's trap checklist — Trap #6: \"Radians mode; use $$\\tan^{-1}$$ for α, not $$\\sin^{-1}$$.\" Why is $$\\sin^{-1}$$ problematic for finding α? (2 steps)", "answer": "- Step 1: To use $$\\sin^{-1}$$, you'd need $$\\sin\\alpha = \\frac{b}{R}$$, which requires you to already know $$R$$. If you've computed $$R$$ with rounding errors, those errors propagate into $$\\alpha$$. Also, $$\\sin^{-1}$$ has ambiguity: $$\\sin\\alpha = \\sin(\\pi - \\alpha)$$, so you might pick the wrong quadrant.\n- Step 2: Using $$\\tan^{-1}(b/a)$$ only requires the original coefficients (which are exact), and the quadrant is determined by the signs of $$a$$ and $$b$$. Since $$R\\cos\\alpha = a$$ and $$R\\sin\\alpha = b$$, and $$R > 0$$, the signs of $$\\cos\\alpha$$ and $$\\sin\\alpha$$ match the signs of $$a$$ and $$b$$. This uniquely determines the quadrant of $$\\alpha$$, avoiding the ambiguity of $$\\sin^{-1}$$.\n\nTakeaway: $$\\tan^{-1}(b/a)$$ uses exact inputs and has clear quadrant determination. $$\\sin^{-1}$$ requires $$R$$ and has quadrant ambiguity.", "source": "GLM 5.1 ②", "_id": "glm_2_65", "judge_pick": true}, {"question": "Conceptual depth — In the ESAT sphere-cylinder problem, after forming the quadratic $$R^2 - 20rR - 5r^2 = 0$$, explain why the discriminant must be positive and what this tells you about the geometry. (2 steps)", "answer": "- Step 1: The discriminant is $$b^2 - 4ac = (20r)^2 - 4(1)(-5r^2) = 400r^2 + 20r^2 = 420r^2 > 0$$. It's positive because the $$c$$ term is negative ($$-5r^2$$), making $$-4ac = +20r^2$$, which adds to $$400r^2$$.\n- Step 2: Geometrically, a positive discriminant means two distinct real solutions for $$R$$ exist. This makes sense: the quadratic $$R^2 - 20rR - 5r^2 = 0$$ opens upward (coefficient of $$R^2$$ is positive) and has a negative constant term, so it must cross the $$R$$-axis twice — once at a negative $$R$$ and once at a positive $$R$$. The positive root is the physically meaningful one.\n\nTakeaway: Positive discriminant = two real roots. The geometry guarantees this because the quadratic opens upward with a negative intercept.", "source": "GLM 5.1 ②", "_id": "glm_2_66", "judge_pick": true}, {"question": "Conceptual depth — Why is the unrolled curved surface of a cylinder a rectangle with one side equal to the circumference, not the diameter? Give a physical intuition. (2 steps)", "answer": "- Step 1: Imagine a tin can. If you cut it vertically and unroll it flat, the resulting sheet wraps around the entire circular base. The length of this sheet must equal the distance around the circle — that's the circumference $$2\\pi r$$, not the diameter $$2r$$.\n- Step 2: The diameter only measures the \"width\" of the circle at its widest point, but the sheet has to cover the entire perimeter. Phuc said \"diameter,\" which would give a curved area of $$2r \\times h$$ — too small by a factor of $$\\pi$$. The circumference is $$\\pi$$ times the diameter, so using the diameter underestimates the curved area by a factor of $$\\pi$$.\n\nTakeaway: Unrolled curved side = circumference × height = $$2\\pi r \\times h$$. The circumference, not the diameter, is the length of the unrolled edge.", "source": "GLM 5.1 ②", "_id": "glm_2_67", "judge_pick": false}, {"question": "In Q3, the straight-line relationship is $$\\log_{10} V = 0.05t + 2$$. Conceptually, what does the gradient $$m = 0.05$$ represent in terms of the original variable $$V$$? (2 steps)", "answer": "- Step 1: The gradient $$m = 0.05$$ means that for each additional year, $$\\log_{10} V$$ increases by 0.05. This is a constant additive increase on the log scale.\n- Step 2: On the original scale, this translates to a constant **multiplicative** increase: each year, $$V$$ is multiplied by $$10^{0.05} \\approx 1.12$$. This is the hallmark of exponential growth — a constant percentage increase per unit time. The gradient on the log scale is the log of the growth factor: $$m = \\log_{10}(b)$$, so $$b = 10^m = 10^{0.05}$$.\n\nTakeaway: A straight line on a log scale means exponential growth. The gradient $$m$$ gives the growth factor via $$b = 10^m$$.", "source": "GLM 5.1 ②", "_id": "glm_2_68", "judge_pick": true}, {"question": "In Q5, the squirrel model $$N = \\frac{4000e^{0.1t}}{19 + e^{0.2t}}$$ has a maximum. Conceptually, why does a model of this form have a maximum, rather than growing forever? (2 steps)", "answer": "- Step 1: For small $$t$$, the denominator is approximately 20 (since $$e^{0.2t} \\approx 1$$), and the numerator grows like $$e^{0.1t}$$. So $$N$$ grows initially. But for large $$t$$, the denominator grows like $$e^{0.2t}$$ (which dominates the constant 19), so $$N \\approx \\frac{4000e^{0.1t}}{e^{0.2t}} = 4000e^{-0.1t}$$, which decays to zero.\n- Step 2: The numerator grows as $$e^{0.1t}$$ but the denominator grows faster (as $$e^{0.2t}$$). The denominator \"wins\" in the long run because its exponent is twice as large. This creates a rise-then-fall shape with a maximum in between. It's a logistic-type model: initial growth followed by saturation and decline.\n\nTakeaway: When the denominator's exponent exceeds the numerator's, the ratio eventually decays. This guarantees a maximum exists.", "source": "GLM 5.1 ②", "_id": "glm_2_69", "judge_pick": true}, {"question": "In Q5(d), after finding $$e^{0.2T} = 19$$, we computed $$e^{0.1T} = \\sqrt{19}$$ and the denominator $$= 19 + 19 = 38$$. Verify conceptually: why is the denominator exactly twice the numerator's exponential term? (2 steps)", "answer": "- Step 1: The denominator is $$19 + e^{0.2T}$$. Since $$e^{0.2T} = 19$$, the denominator is $$19 + 19 = 38 = 2 \\times 19 = 2e^{0.2T}$$.\n- Step 2: This happens because the maximum occurs when the exponential term in the denominator equals the constant term. At that point, the denominator is exactly twice the constant (or twice the exponential, since they're equal). This is a general property of models of the form $$\\frac{Ae^{kt}}{B + e^{2kt}}$$: the maximum occurs when $$e^{2kt} = B$$, making the denominator $$2B$$.\n\nTakeaway: At the maximum of $$\\frac{Ae^{kt}}{B + e^{2kt}}$$, the denominator equals $$2B$$. This is because $$e^{2kT} = B$$ at the stationary point.", "source": "GLM 5.1 ②", "_id": "glm_2_70", "judge_pick": false}, {"question": "Quick conceptual check — Is $$\\frac{d}{dx}(e^{kx})$$ the same as $$\\frac{d}{dx}(a^{kx})$$ when $$a = e$$? Verify by comparing both formulas. (2 steps)", "answer": "- Step 1: $$\\frac{d}{dx}(e^{kx}) = ke^{kx}$$ (from the standard rule, since $$\\frac{d}{dx}(e^u) = e^u \\cdot u'$$ and $$u' = k$$).\n- Step 2: $$\\frac{d}{dx}(a^{kx}) = a^{kx} \\cdot k\\ln a$$. Setting $$a = e$$: $$e^{kx} \\cdot k\\ln e = e^{kx} \\cdot k \\cdot 1 = ke^{kx}$$. Yes, they match. The $$a^{kx}$$ formula is the general case; the $$e^{kx}$$ formula is the special case where $$\\ln a = \\ln e = 1$$.\n\nTakeaway: $$e^{kx}$$ is the special case of $$a^{kx}$$ with $$a = e$$. Both formulas are consistent.", "source": "GLM 5.1 ②", "_id": "glm_2_71", "judge_pick": false}, {"question": "When the question says \"give the exact value,\" what does \"exact\" mean in Edexcel mark-scheme terms, and what forms are acceptable vs unacceptable? (2 steps)", "answer": "- Step 1: \"Exact\" means no rounding or decimal approximation. Acceptable forms include: integers, fractions, surds (like $$2\\sqrt{3}$$), multiples of $$\\pi$$ (like $$\\frac{\\pi}{3}$$), and expressions involving $$e$$ or $$\\ln$$ (like $$\\ln 19$$). Unacceptable: any decimal like 3.46, 1.047, or 1.12.\n- Step 2: In Q4(a), $$R = 2\\sqrt{3}$$ (exact) is correct but $$R = 3.46$$ is not. $$\\alpha = \\frac{\\pi}{3}$$ (exact) is correct but $$\\alpha = 1.047$$ is not. In Q3(b), $$b = 10^{0.05}$$ is exact and acceptable; $$b = 1.12$$ is the 3 s.f. approximation (the question specifically asked for 3 s.f. here, which is an exception to the exact-value rule for this part only).\n\nTakeaway: \"Exact\" = no decimals. Surds, $$\\pi$$-multiples, $$\\ln$$, and $$e$$ expressions are fine. Decimals are not.", "source": "GLM 5.1 ②", "_id": "glm_2_72", "judge_pick": false}, {"question": "In Q2(b), the rearrangement involves multiplying both sides by $$e^x x^2$$. Why is this valid (i.e., why doesn't it introduce spurious solutions or lose solutions)? (2 steps)", "answer": "- Step 1: Multiplying both sides of an equation by a non-zero expression is valid and doesn't change the solution set. We need to verify that $$e^x x^2 \\neq 0$$ for all $$x$$ in the domain.\n- Step 2: $$e^x > 0$$ for all real $$x$$ (always positive), and $$x^2 > 0$$ for all $$x \\neq 0$$ (the domain excludes $$x = 0$$). So $$e^x x^2 > 0$$ for all $$x$$ in the domain of $$f$$. Multiplying by a positive quantity preserves the equation exactly — no solutions are gained or lost.\n\nTakeaway: $$e^x x^2 > 0$$ on the domain, so multiplying by it is safe. Always check that your multiplier is non-zero on the domain.", "source": "GLM 5.1 ②", "_id": "glm_2_73", "judge_pick": true}, {"question": "In Q4(b)(ii), after finding the principal solution $$6x - \\frac{\\pi}{3} = \\frac{\\pi}{2}$$, the general solution is $$6x - \\frac{\\pi}{3} = \\frac{\\pi}{2} + 2n\\pi$$. Why is the period $$2\\pi$$ and not $$\\pi$$? (2 steps)", "answer": "- Step 1: The equation is $$\\sin(6x - \\frac{\\pi}{3}) = 1$$. The sine function has period $$2\\pi$$, meaning $$\\sin\\theta = \\sin(\\theta + 2\\pi)$$. So if $$\\theta = \\frac{\\pi}{2}$$ is a solution, then $$\\theta = \\frac{\\pi}{2} + 2n\\pi$$ gives all solutions.\n- Step 2: The period of $$2\\pi$$ is for the argument $$\\theta = 6x - \\frac{\\pi}{3}$$, not for $$x$$ itself. In terms of $$x$$, the period of $$\\sin(6x - \\frac{\\pi}{3})$$ is $$\\frac{2\\pi}{6} = \\frac{\\pi}{3}$$. But when solving $$\\sin\\theta = 1$$, we add $$2n\\pi$$ to $$\\theta$$ (not to $$x$$), then solve for $$x$$. The $$2n\\pi$$ comes from the periodicity of the sine function, not from the coefficient of $$x$$.\n\nTakeaway: When solving $$\\sin(\\text{something}) = 1$$, add $$2n\\pi$$ to the argument, then solve for $$x$$.", "source": "GLM 5.1 ②", "_id": "glm_2_74", "judge_pick": true}, {"question": "Strategy question — When you see a question that says \"express $$a\\sin\\theta + b\\cos\\theta$$ in the form $$R\\sin(\\theta - \\alpha)$$,\" what are the first three things you should write down before doing any calculation? (3 steps)", "answer": "- Step 1: Write the compound-angle expansion: $$R\\sin(\\theta - \\alpha) = R\\sin\\theta\\cos\\alpha - R\\cos\\theta\\sin\\alpha$$.\n- Step 2: Equate coefficients: $$R\\cos\\alpha = a$$ and $$R\\sin\\alpha = b$$. These are your two key equations.\n- Step 3: Plan your method: divide for $$\\tan\\alpha = \\frac{b}{a}$$, square-and-add for $$R = \\sqrt{a^2 + b^2}$$. Write this plan before computing, so you don't accidentally substitute a decimal for $$\\alpha$$ to find $$R$$.\n\nTakeaway: Expand → equate → plan (divide for α, square-and-add for R). Never substitute a decimal α.", "source": "GLM 5.1 ②", "_id": "glm_2_75", "judge_pick": false}, {"question": "Strategy question — When a question gives you a straight-line graph of \"$$\\log_{10} V$$ against $$t$$\" and asks you to express $$V$$ in the form $$ab^t$$, what is the complete sequence of steps? (4 steps)", "answer": "- Step 1: Read the axes correctly: y-axis is $$\\log_{10} V$$, x-axis is $$t$$. Write the equation as $$\\log_{10} V = mt + c$$, finding $$m$$ and $$c$$ from the given points.\n- Step 2: Raise 10 to both sides: $$V = 10^{mt+c}$$.\n- Step 3: Split the index: $$V = 10^{mt} \\times 10^c = 10^c \\times (10^m)^t$$. Identify $$a = 10^c$$ and $$b = 10^m$$.\n- Step 4: Keep $$a$$ and $$b$$ in exact form for any subsequent differentiation. Round only if the question specifically asks for a decimal approximation (like \"3 s.f.\").\n\nTakeaway: Read axes → raise 10 to both sides → split index → identify $$a = 10^c$$, $$b = 10^m$$. Keep exact for differentiation.", "source": "GLM 5.1 ②", "_id": "glm_2_76", "judge_pick": false}, {"question": "Strategy question — When a question asks you to find the maximum of a quotient model $$N = \\frac{u(t)}{v(t)}$$, what is the complete attack plan? (5 steps)", "answer": "- Step 1: Identify $$u$$ and $$v$$. Compute $$u'$$ and $$v'$$ separately, using the $$\\frac{d}{dt}(e^{kt}) = ke^{kt}$$ rule for exponential terms.\n- Step 2: Apply the quotient rule: $$\\frac{dN}{dt} = \\frac{vu' - uv'}{v^2}$$. Keep the minus sign. Simplify the numerator by combining exponential terms (e.g., $$e^{0.1t} \\cdot e^{0.2t} = e^{0.3t}$$).\n- Step 3: Set $$\\frac{dN}{dt} = 0$$. Note that the denominator is always positive (since $$v > 0$$), so only the numerator needs to equal zero. Factor out common exponential terms.\n- Step 4: Reject any solution of the form $$e^{(\\cdot)} = 0$$ (impossible). Solve the remaining equation. If the command says \"show that,\" stop at the shown result.\n- Step 5: For the maximum value, substitute back using relationships like $$e^{kT/2} = \\sqrt{e^{kT}}$$ to avoid computing $$T$$. Use stored values. Round only the final answer.\n\nTakeaway: Quotient rule → simplify → set numerator to zero → factor and reject impossibilities → substitute back exactly.", "source": "GLM 5.1 ②", "_id": "glm_2_77", "judge_pick": true}, {"question": "The circumference of a circle is $$2\\pi r$$. In the context of the cylinder surface-area derivation, what physical object does this represent? (2 steps)", "answer": "- Step 1: The circumference $$2\\pi r$$ is the length of the circular edge at the top (or bottom) of the cylinder. It's the distance you'd travel if you walked all the way around the rim.\n- Step 2: When you unroll the curved surface of the cylinder into a flat rectangle, one side of that rectangle has length equal to this circumference. The other side is the height $$h$$. So the curved surface area = circumference × height = $$2\\pi r \\times h = 2\\pi rh$$. Phuc incorrectly said this side was the \"diameter\" — the diameter is only the straight-across distance, not the full perimeter.\n\nTakeaway: Circumference = distance around the rim = one side of the unrolled rectangle. Not the diameter.", "source": "GLM 5.1 ②", "_id": "glm_2_78", "judge_pick": false}, {"question": "In Q3(c), the final answer for $$T$$ is 13 (nearest integer). The exact calculation gives $$T \\approx 12.756$$. If you had used the rounded base $$b = 1.12$$ instead of $$10^{0.05}$$, you'd get $$T \\approx 13.097$$. Both round to 13. Is it therefore acceptable to use the rounded base? Explain. (2 steps)", "answer": "- Step 1: No, it's not acceptable, even though the final answer coincidentally rounds the same way. The mark scheme requires appropriate working, and differentiating a rounded model is not appropriately exact. You're introducing a method error that happens to cancel out in this specific case.\n- Step 2: In a different question, the rounding error might not cancel. For example, if the true $$T$$ were 12.49 (rounding to 12) but the rounded-base calculation gave 12.51 (rounding to 13), you'd get the wrong answer. Relying on luck is not a valid exam strategy. The correct method — using the exact base — always works; the shortcut sometimes works.\n\nTakeaway: Using a rounded base is methodologically wrong even when the answer happens to match. Use exact values throughout.", "source": "GLM 5.1 ②", "_id": "glm_2_79", "judge_pick": true}, {"question": "In Q5(c), after factoring $$e^{0.1T}(7600 - 400e^{0.2T}) = 0$$, we reject $$e^{0.1T} = 0$$ and solve $$7600 - 400e^{0.2T} = 0$$. What would happen if we forgot to factor and instead tried to solve the original equation directly? (2 steps)", "answer": "- Step 1: The original equation is $$7600e^{0.1T} - 400e^{0.3T} = 0$$. Without factoring, you might try to isolate $$T$$ directly, but there's no obvious algebraic move. The equation has two different exponential terms with different exponents, and you can't combine them.\n- Step 2: Factoring out $$e^{0.1T}$$ is the key insight: it converts the equation from \"two different exponentials = 0\" to \"exponential × (constant - exponential) = 0,\" which can be solved by the zero-product property. This is a general strategy: when you have $$Ae^{pt} - Be^{qt} = 0$$ with $$p < q$$, factor out $$e^{pt}$$ to get $$e^{pt}(A - Be^{(q-p)t}) = 0$$.\n\nTakeaway: Factor out the smaller exponential to use the zero-product property. $$e^{pt}(A - Be^{(q-p)t}) = 0$$.", "source": "GLM 5.1 ②", "_id": "glm_2_80", "judge_pick": false}, {"question": "Harry mentioned that Phuc is now picking up on \"little details\" like \"nearest whole number\" and \"3 significant figures.\" Why do these command phrases matter for the final answer? (2 steps)", "answer": "- Step 1: \"Nearest whole number\" means round to 0 d.p. (e.g., 458.83 → 459). \"3 significant figures\" means round to 3 s.f. (e.g., 1.12201 → 1.12). These are different rounding specifications, and using the wrong one loses the final accuracy mark.\n- Step 2: The mark scheme typically awards the final mark only if the answer is rounded to the specified precision. Writing 458.83 when \"nearest whole number\" is asked for, or writing 1.122 when \"3 s.f.\" is asked for, would lose the mark. Always read the rounding instruction in the question and apply it to your final answer only.\n\nTakeaway: Read the rounding instruction. Apply it only to the final answer, not to intermediate steps.", "source": "GLM 5.1 ②", "_id": "glm_2_81", "judge_pick": false}, {"question": "When drawing a diagram for a 3D geometry problem (like the ESAT sphere-cylinder question), what did Harry's correction of Phuc's drawing illustrate about exam technique? (2 steps)", "answer": "- Step 1: Phuc drew a cylinder when asked for a sphere — he \"wrote the wrong one.\" Harry re-drew both solids separately and clearly labelled. Drawing the correct shape prevents you from using the wrong formula (if you draw a cylinder, you might reach for the cylinder formula instead of the sphere formula).\n- Step 2: A clear, labelled diagram serves as a reference for formula selection. Write the radius as $$R$$ for the sphere and $$r$$ for the cylinders to avoid confusing them. The diagram doesn't need to be artistic — it needs to be correct and labelled. A wrong diagram leads to wrong formulas and zero marks.\n\nTakeaway: Draw the correct shape and label all variables. The diagram is your formula-selection guide.", "source": "GLM 5.1 ②", "_id": "glm_2_82", "judge_pick": false}, {"question": "In the Q2(b) rearrangement, one of the steps is \"move $$\\frac{1}{x^2}$$ across\" to get $$\\frac{2x^2 + 3x - 4}{e^x} = \\frac{1}{x^2}$$ becoming $$\\frac{2x^2 + 3x - 4}{e^x} \\cdot x^2 = 1$$. What principle justifies this? (2 steps)", "answer": "- Step 1: When you have $$A = \\frac{1}{B}$$, multiplying both sides by $$B$$ gives $$AB = 1$$. Here $$A = \\frac{2x^2 + 3x - 4}{e^x}$$ and $$B = x^2$$. Since $$x \\neq 0$$ (given in the domain), $$x^2 > 0$$, so multiplication is valid.\n- Step 2: This is equivalent to \"cross-multiplying\": $$\\frac{2x^2 + 3x - 4}{e^x} = \\frac{1}{x^2}$$ becomes $$x^2(2x^2 + 3x - 4) = e^x$$. The key is that $$x^2 \\neq 0$$ on the domain, so no solution is lost or gained. Always check that your multiplier is non-zero before cross-multiplying.\n\nTakeaway: Cross-multiply to clear fractions, but verify the multiplier is non-zero on the domain.", "source": "GLM 5.1 ②", "_id": "glm_2_83", "judge_pick": false}, {"question": "In Q4(b)(i), the denominator of $$g(x)$$ is $$2\\sqrt{3}\\sin(6x - \\frac{\\pi}{3}) + 4\\sqrt{3}$$. The maximum of the sine is 1, giving a max denominator of $$6\\sqrt{3}$$. What is the minimum of the denominator, and does $$g(x)$$ have a maximum? (2 steps)", "answer": "- Step 1: The minimum of $$\\sin(6x - \\frac{\\pi}{3})$$ is $$-1$$, giving a minimum denominator of $$-2\\sqrt{3} + 4\\sqrt{3} = 2\\sqrt{3} > 0$$. The denominator is always positive (between $$2\\sqrt{3}$$ and $$6\\sqrt{3}$$).\n- Step 2: Since the denominator ranges from $$2\\sqrt{3}$$ (min) to $$6\\sqrt{3}$$ (max), the fraction $$\\frac{18}{\\text{denominator}}$$ ranges from $$\\frac{18}{6\\sqrt{3}} = \\sqrt{3}$$ (min) to $$\\frac{18}{2\\sqrt{3}} = \\frac{9}{\\sqrt{3}} = 3\\sqrt{3}$$ (max). So yes, $$g(x)$$ has a maximum of $$3\\sqrt{3}$$, occurring when the denominator is minimised (sine = $$-1$$).\n\nTakeaway: The fraction has both a min and max because the denominator is bounded and always positive. Min fraction = max denominator; max fraction = min denominator.", "source": "GLM 5.1 ②", "_id": "glm_2_84", "judge_pick": false}], "count": 85}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "ESAT warm-up — when a question asks for the \"surface area of a sphere,\" what is the formula, and what is the most common mistake with the exponent? (2 steps)", "answer": "- Step 1: The surface area of a sphere of radius $$R$$ is $$4\\pi R^2$$. This measures the total area of the \"outside skin\" of the 3-D shape.\n- Step 2: The most common mistake (Phuc's error) is writing $$4\\pi R$$ — dropping the square. The exponent 2 is essential; without it the units are wrong (length instead of area) and every downstream calculation fails.\n\nTakeaway: \"Don't forget the square\" — sphere SA = $$4\\pi R^2$$, not $$4\\pi R$$.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "What is the area of a circle, and what is the trap that catches students every year? (2 steps)", "answer": "- Step 1: Area of a circle = $$\\pi r^2$$.\n- Step 2: The trap is writing $$\\pi r$$ (confusing area with something else). $$\\pi r$$ is not any standard formula — circumference is $$2\\pi r$$, area is $$\\pi r^2$$. The square on the $$r$$ is what turns a length into an area.\n\nTakeaway: Area always has a squared radius; circumference does not.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "What is the circumference of a circle, and why does it matter for the surface area of a cylinder? (2 steps)", "answer": "- Step 1: Circumference = $$2\\pi r$$. This is the distance all the way around the circle.\n- Step 2: When you \"unroll\" the curved side of a cylinder into a rectangle, one side of that rectangle is the height $$h$$ and the other side is the circumference $$2\\pi r$$. Phuc mistakenly called this the \"diameter\" — but the unrolled length must wrap all the way around the circle, which is the circumference, not the diameter.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "What is the total surface area of a closed cylinder, and how do you derive it from first principles? (3 steps)", "answer": "- Step 1: A closed cylinder has two flat circular ends and one curved side. The two ends each have area $$\\pi r^2$$, so together they contribute $$2\\pi r^2$$.\n- Step 2: Unroll the curved side into a rectangle. Its dimensions are height $$h$$ by circumference $$2\\pi r$$, so the curved area = $$2\\pi r \\times h = 2\\pi rh$$.\n- Step 3: Total closed-cylinder surface area = $$2\\pi r^2 + 2\\pi rh$$.\n\nTakeaway: Never confuse this with the volume $$\\pi r^2 h$$ (cross-section × height). Phuc offered $$\\pi r^2 h$$ for surface area — that is the volume formula.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "What is the volume of a cylinder, and why is it a trap when a question asks for \"surface area\"? (2 steps)", "answer": "- Step 1: Volume of a cylinder = $$\\pi r^2 h$$ (base area × height).\n- Step 2: The trap: when asked for surface area, students sometimes write $$\\pi r^2 h$$ because it \"looks like a cylinder formula.\" But $$\\pi r^2 h$$ is volume (units of length³), not surface area (units of length²). Surface area = $$2\\pi r^2 + 2\\pi rh$$.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "ESAT warm-up — when setting up \"surface area of a sphere = total surface area of 10 closed cylinders,\" what is the most common mistake in writing the right-hand side? (2 steps)", "answer": "- Step 1: The correct right-hand side is $$10(2\\pi r^2 + 2\\pi rh)$$ — each closed cylinder has two ends plus the curved side, and there are 10 cylinders.\n- Step 2: The common mistake (Phuc's error) is writing only one circular end per cylinder: $$10(\\pi r^2 + 2\\pi rh)$$. A *closed* cylinder has both a top and a bottom, so you must include $$2\\pi r^2$$, not $$\\pi r^2$$.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "ESAT warm-up — after substituting $$h = 4R$$ into the sphere-cylinder equation and simplifying, you reach a quadratic in $$R$$. What is the quadratic, and why must you reject one root? (3 steps)", "answer": "- Step 1: Starting from $$4\\pi R^2 = 10(2\\pi r^2 + 2\\pi r(4R))$$, simplify to $$4\\pi R^2 = 20\\pi r^2 + 80\\pi rR$$, then divide by $$4\\pi$$: $$R^2 = 5r^2 + 20rR$$, giving $$R^2 - 20rR - 5r^2 = 0$$.\n- Step 2: Apply the quadratic formula with $$a=1$$, $$b=-20r$$, $$c=-5r^2$$: $$R = \\frac{20r \\pm \\sqrt{400r^2 + 20r^2}}{2} = \\frac{20r \\pm \\sqrt{420r^2}}{2}$$.\n- Step 3: Since $$\\sqrt{420} = 2\\sqrt{105}$$, this gives $$R = r(10 \\pm \\sqrt{105})$$. A radius must be positive, and $$10 - \\sqrt{105} < 0$$, so reject the negative root. Final answer: $$R = r(10 + \\sqrt{105})$$.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "ESAT warm-up — how do you simplify $$\\sqrt{420}$$ into exact surd form, and why does this matter for a multiple-choice ESAT question? (2 steps)", "answer": "- Step 1: Factor 420 as $$4 \\times 105$$. Then $$\\sqrt{420} = \\sqrt{4 \\times 105} = 2\\sqrt{105}$$. This is the exact form.\n- Step 2: For an ESAT multiple-choice question, the options will likely be expressed in exact surd form (e.g., $$r(10 + \\sqrt{105})$$). If you leave your answer as a decimal, you may not match any option. Always simplify surds to recognise the correct answer.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "P3 Q2(a) — when asked to \"show $$f(x)=0$$ has a root $$\\alpha \\in [1,2]$$,\" what are the TWO things you must state to earn both marks? (2 steps)", "answer": "- Step 1: **Sign change** — substitute the actual endpoints $$x=1$$ and $$x=2$$ into $$f(x)$$, show one value is positive and the other negative. Do not use values \"near\" the endpoints; use exactly 1 and 2.\n- Step 2: **Continuity** — explicitly state that $$f$$ is continuous on $$[1,2]$$. Harry's verbatim warning: \"The bit that everyone forgets is to mention that continuity. You must remember sign change and continuity. Otherwise you'll only score one mark.\"", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "P3 Q2(a) — why is continuity essential for the Intermediate Value Theorem, and what happens if you only state the sign change? (2 steps)", "answer": "- Step 1: A sign change alone does not guarantee a root — a discontinuous function can jump from negative to positive without crossing zero (e.g., $$f(x) = 1/x$$ on $$[-1,1]$$ has a sign change but no root at zero). Continuity ensures the function cannot \"skip\" over the x-axis.\n- Step 2: On the Edexcel mark scheme, stating only the sign change earns 1 mark out of 2. You must also state continuity to earn the second mark. This is a systematic trap that \"everyone forgets.\"", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "P3 Q2(a) — when checking for a root in $$[1,2]$$, why must you substitute the exact endpoints and not values \"near\" them? (2 steps)", "answer": "- Step 1: The Intermediate Value Theorem requires a sign change on a closed interval $$[a,b]$$. The theorem applies to the endpoints themselves, not to nearby values.\n- Step 2: If you substitute $$x=1.1$$ and $$x=1.9$$ instead of $$x=1$$ and $$x=2$$, you have not proven a root exists in $$[1,2]$$ — only in $$[1.1, 1.9]$$. The root could lie in the gap you excluded. Always use the stated endpoints.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "P3 Q2(b) — when rearranging $$f(x)=0$$ to reach a target iteration form, what is the first strategic thing you should do before any algebra? (2 steps)", "answer": "- Step 1: **Look at the target form.** Before manipulating anything, read what you're trying to reach. The target $$x = \\sqrt[3]{\\frac{e^x + 4x^2}{2x+3}}$$ tells you two crucial things: (i) there is a cube root, so you will need to cube-root both sides at some point; (ii) the denominator is $$2x+3$$, so you need to factor $$2x+3$$ out of the left side.\n- Step 2: Work *towards* the target, not away from it. Phuc multiplied out and got stuck because he wasn't guided by the target structure. Let the answer shape your algebra.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "P3 Q2(b) — in the rearrangement from $$f(x)=0$$ to the cube-root form, what is the key factoring step, and how does the target clue you in? (2 steps)", "answer": "- Step 1: After multiplying through by $$e^x x^2$$ and rearranging, you reach $$2x^4 + 3x^3 = e^x + 4x^2$$. The key step is factoring the left side as $$x^3(2x + 3) = e^x + 4x^2$$.\n- Step 2: The clue is the denominator $$2x+3$$ in the target. This tells you that $$2x+3$$ must be isolated on one side, so you need to factor it out of the left-hand expression. Then divide both sides by $$(2x+3)$$ to get $$x^3 = \\frac{e^x + 4x^2}{2x+3}$$, and cube-root both sides.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "P3 Q2(b) — when the target form has a cube root $$\\sqrt[3]{\\ldots}$$, what algebraic move must you make at the end, and why? (2 steps)", "answer": "- Step 1: When you have isolated $$x^3 = \\text{something}$$, take the cube root of both sides: $$x = \\sqrt[3]{\\text{something}}$$.\n- Step 2: This works because cubing and cube-rooting are inverse operations. The cube root in the target is Harry's cue: \"a cube root in the answer means cube root both sides.\" This is a reliable pattern — if the target has an $$n$$th root, you will need to raise both sides to the power $$1/n$$ at the appropriate stage.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "P3 Q3(a) — when a question says \"log₁₀V is plotted against t,\" what does this tell you about the axes, and what is the common mistake? (2 steps)", "answer": "- Step 1: \"log₁₀V against t\" means the y-axis is log₁₀V and the x-axis is t. The variable after \"against\" goes on the x-axis; the variable before \"against\" goes on the y-axis.\n- Step 2: The common mistake (Phuc's error) is writing the vertical variable as just $$V$$ or $$y$$. But the graph is of log₁₀V, not V. If you write the equation as $$V = mt + c$$, your entire model is wrong. The correct starting equation is $$\\log_{10} V = mt + c$$.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "P3 Q3(b) — after finding $$\\log_{10} V = 0.05t + 2$$, how do you convert this into the form $$V = ab^t$$? What index law is critical? (3 steps)", "answer": "- Step 1: Raise 10 to both sides: $$V = 10^{0.05t + 2}$$.\n- Step 2: Use the index law $$10^{p+q} = 10^p \\times 10^q$$ to split: $$V = 10^{0.05t} \\times 10^2 = 100 \\times 10^{0.05t}$$.\n- Step 3: Rewrite $$10^{0.05t} = (10^{0.05})^t$$, so $$V = 100 \\times (10^{0.05})^t$$. This gives $$a = 100$$ (exact) and $$b = 10^{0.05} \\approx 1.12$$ (to 3 s.f.).", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "P3 Q3(b) — why must you keep the exact base $$10^{0.05}$$ for part (c) instead of using the rounded value 1.12? (2 steps)", "answer": "- Step 1: Differentiating the rounded model $$V = 100(1.12)^t$$ gives a slightly different derivative than differentiating the exact model $$V = 100(10^{0.05})^t$$. The rounding error propagates through the differentiation and the subsequent equation-solving.\n- Step 2: In this question, both happen to round to $$T = 13$$, but that is luck, not method. The mark scheme requires \"solutions relying entirely on calculator technology are not acceptable\" — using a rounded base before differentiating is not appropriately exact. Carry the exact base through and round only the final answer.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "P3 Q3(c) — when a question says \"the rate of increase is £50/year,\" what two things does this tell you mathematically? (2 steps)", "answer": "- Step 1: \"Rate\" means differentiate. The rate of change of $$V$$ with respect to $$t$$ is $$\\frac{dV}{dt}$$. This is not an arithmetic series, not a percentage, not a ratio — it is a derivative. Phuc's trap was guessing \"arithmetic series.\"\n- Step 2: \"Increase\" means the rate is positive, so $$\\frac{dV}{dt} = +50$$, not $$-50$$. If the question said \"rate of decrease,\" you would set it to $$-50$$.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "What is the derivative of $$a^{kx}$$ with respect to $$x$$, and what is the most common mistake students make? (2 steps)", "answer": "- Step 1: $$\\frac{d}{dx}(a^{kx}) = a^{kx} \\cdot k \\ln a$$. The chain rule brings down the factor $$k$$ from the exponent, and the base-$$a$$ exponential rule brings down $$\\ln a$$.\n- Step 2: The most common mistake (Phuc's error for $$3^{6x}$$) is writing $$\\ln(kx)$$ instead of $$k \\ln a$$. For $$3^{6x}$$, the derivative is $$3^{6x} \\cdot 6 \\ln 3$$, NOT $$3^{6x} \\cdot \\ln(6x)$$. The $$\\ln$$ applies to the base $$a$$, not to the entire exponent expression.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "How do you differentiate $$3^{6x}$$, and what is the trap? (2 steps)", "answer": "- Step 1: Using $$\\frac{d}{dx}(a^{kx}) = a^{kx} \\cdot k \\ln a$$ with $$a=3$$, $$k=6$$: $$\\frac{d}{dx}(3^{6x}) = 3^{6x} \\cdot 6 \\ln 3$$.\n- Step 2: The trap is writing $$3^{6x} \\cdot \\ln(6x)$$. This is wrong because the derivative rule brings down $$k \\ln a$$ (a constant), not $$\\ln(kx)$$ (a function of $$x$$). The factor $$6\\ln 3$$ is a constant multiplier; it does not depend on $$x$$.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "How do you differentiate $$5^{2x}$$ with respect to $$x$$? (1 step answer)", "answer": "Using $$\\frac{d}{dx}(a^{kx}) = a^{kx} \\cdot k \\ln a$$ with $$a=5$$, $$k=2$$: $$\\frac{d}{dx}(5^{2x}) = 5^{2x} \\cdot 2 \\ln 5$$.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "How do you differentiate $$1.12^t$$ with respect to $$t$$? (1 step answer)", "answer": "Using $$\\frac{d}{dt}(a^{kt}) = a^{kt} \\cdot k \\ln a$$ with $$a=1.12$$, $$k=1$$: $$\\frac{d}{dt}(1.12^t) = 1.12^t \\cdot \\ln(1.12)$$. Since $$k=1$$, the factor is just $$\\ln a$$.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "How do you differentiate $$3^x$$ with respect to $$x$$? (1 step answer)", "answer": "Using $$\\frac{d}{dx}(a^x) = a^x \\ln a$$ with $$a=3$$: $$\\frac{d}{dx}(3^x) = 3^x \\ln 3$$. This is the special case of the $$a^{kx}$$ rule with $$k=1$$.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "P3 Q4(a) — when asked to express $$a\\sin\\theta - b\\cos\\theta$$ in the form $$R\\sin(\\theta - \\alpha)$$ with *exact* values of $$R$$ and $$\\alpha$$, what method must you use and what method must you avoid? (2 steps)", "answer": "- Step 1: **Use square-and-add for $$R$$ and division for $$\\tan\\alpha$$.** From $$R\\cos\\alpha = a$$ and $$R\\sin\\alpha = b$$: divide to get $$\\tan\\alpha = b/a$$, and square-and-add to get $$R = \\sqrt{a^2 + b^2}$$. Both give exact values.\n- Step 2: **Do not substitute a rounded decimal for $$\\alpha$$ to calculate $$R$$.** Harry's warning: \"Your method could be quite dangerous.\" If you find $$\\alpha \\approx 0.927$$ first and then compute $$R = a/\\cos(0.927)$$, the rounding error in $$\\alpha$$ corrupts $$R$$. Square-and-add avoids this entirely.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "P3 Q4(a) — when finding $$\\alpha$$ in the R-form, why must you use $$\\tan^{-1}$$ and not $$\\sin^{-1}$$? (2 steps)", "answer": "- Step 1: From the matched coefficients, you know both $$R\\sin\\alpha$$ and $$R\\cos\\alpha$$, so you know $$\\tan\\alpha = \\frac{R\\sin\\alpha}{R\\cos\\alpha}$$. Using $$\\tan^{-1}$$ of this ratio gives the correct $$\\alpha$$ directly.\n- Step 2: Using $$\\sin^{-1}$$ requires you to already know $$R$$ (since $$\\sin\\alpha = b/R$$). If you computed $$R$$ with rounding error, then $$\\sin^{-1}$$ amplifies that error. Also, $$\\sin^{-1}$$ has range issues (it can't distinguish quadrants I and II). $$\\tan^{-1}$$ with the correct ratio is the reliable method.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "P3 Q4(a) — when working with trigonometric R-form questions, what calculator mode must you be in, and what happens if you're not? (2 steps)", "answer": "- Step 1: You must be in **radians mode**. The angle $$\\alpha$$ in R-form problems is almost always in radians (e.g., $$\\alpha = \\pi/3$$), and the domain restriction $$0 < \\alpha < \\pi/2$$ is given in radians.\n- Step 2: If your calculator is in degrees mode, $$\\tan^{-1}(\\sqrt{3})$$ will give $$60°$$ instead of $$\\pi/3$$, and all subsequent calculations (solving trig equations, finding $$x$$) will be wrong. This is a silent killer — the calculator won't warn you. Always check the mode before starting.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "P3 Q4(a) — for $$\\sqrt{3}\\sin 2x - 3\\cos 2x = R\\sin(2x - \\alpha)$$, walk through finding exact $$R$$ and $$\\alpha$$. (3 steps)", "answer": "- Step 1: Expand the right side: $$R\\sin(2x-\\alpha) = R\\cos\\alpha\\sin 2x - R\\sin\\alpha\\cos 2x$$. Match coefficients: $$R\\cos\\alpha = \\sqrt{3}$$ and $$R\\sin\\alpha = 3$$.\n- Step 2: Divide: $$\\tan\\alpha = \\frac{3}{\\sqrt{3}} = \\sqrt{3}$$, so $$\\alpha = \\frac{\\pi}{3}$$ (in $$0 < \\alpha < \\frac{\\pi}{2}$$).\n- Step 3: Square-and-add: $$R^2(\\cos^2\\alpha + \\sin^2\\alpha) = 3 + 9 = 12$$, so $$R^2 = 12$$, giving $$R = \\sqrt{12} = 2\\sqrt{3}$$. Final form: $$f(x) = 2\\sqrt{3}\\sin\\left(2x - \\frac{\\pi}{3}\\right)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "P3 Q4(b)(i) — when minimising a fraction $$g(x) = \\frac{\\text{constant}}{f(3x) + C}$$, what is the strategic principle? (2 steps)", "answer": "- Step 1: The numerator is a fixed positive constant (here, 18). A fraction with a fixed positive numerator is **smallest when its denominator is largest**. So instead of differentiating $$g(x)$$, simply find the maximum of the denominator.\n- Step 2: The denominator is $$f(3x) + 4\\sqrt{3} = 2\\sqrt{3}\\sin\\left(6x - \\frac{\\pi}{3}\\right) + 4\\sqrt{3}$$. This is maximised when $$\\sin\\left(6x - \\frac{\\pi}{3}\\right) = 1$$, giving max denominator = $$2\\sqrt{3} + 4\\sqrt{3} = 6\\sqrt{3}$$. Then min $$g = \\frac{18}{6\\sqrt{3}} = \\frac{3}{\\sqrt{3}} = \\sqrt{3}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": true}, {"question": "P3 Q4(b)(i) — after finding the minimum of $$g(x)$$ as $$\\frac{3}{\\sqrt{3}}$$, what final step does the mark scheme expect? (2 steps)", "answer": "- Step 1: **Rationalise the denominator.** $$\\frac{3}{\\sqrt{3}} = \\frac{3}{\\sqrt{3}} \\times \\frac{\\sqrt{3}}{\\sqrt{3}} = \\frac{3\\sqrt{3}}{3} = \\sqrt{3}$$.\n- Step 2: The exact minimum is $$\\sqrt{3}$$. Edexcel expects exact values in simplest surd form. Leaving the answer as $$\\frac{3}{\\sqrt{3}}$$ may lose the final accuracy mark.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "P3 Q4(b)(ii) — to find the smallest positive $$x$$ where the minimum of $$g(x)$$ occurs, what equation do you solve, and how do you confirm it's the smallest? (3 steps)", "answer": "- Step 1: The minimum occurs when the denominator is maximised, i.e., when $$\\sin\\left(6x - \\frac{\\pi}{3}\\right) = 1$$. Set $$6x - \\frac{\\pi}{3} = \\frac{\\pi}{2}$$ (the principal solution where sine equals 1).\n- Step 2: Solve: $$6x = \\frac{\\pi}{2} + \\frac{\\pi}{3} = \\frac{5\\pi}{6}$$, so $$x = \\frac{5\\pi}{36}$$.\n- Step 3: The general solution is $$6x - \\frac{\\pi}{3} = \\frac{\\pi}{2} + 2n\\pi$$. The next solution ($$n=1$$) gives $$x = \\frac{5\\pi}{36} + \\frac{\\pi}{3} = \\frac{17\\pi}{36}$$, which is larger. So $$x = \\frac{5\\pi}{36}$$ is the smallest positive value. Harry sketched a sine wave to visually confirm this.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": false}, {"question": "P3 Q5(a) — when evaluating a model at $$t = 0$$ and the denominator contains $$19 + e^{0.2t}$$, what is the trap? (2 steps)", "answer": "- Step 1: At $$t = 0$$, $$e^{0.2 \\times 0} = e^0 = 1$$. The denominator becomes $$19 + 1 = 20$$, not just 19.\n- Step 2: The trap is \"losing the one\" — writing the denominator as just 19 because you forget that $$e^0 = 1$$. Harry's correction: \"Be careful not to lose the one.\" This gives $$N = \\frac{4000}{20} = 200$$ squirrels, not $$\\frac{4000}{19}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": false}, {"question": "P3 Q5(b) — when differentiating $$N = \\frac{4000e^{0.1t}}{19 + e^{0.2t}}$$ using the quotient rule, what is the most common sign error? (2 steps)", "answer": "- Step 1: The quotient rule is $$\\left(\\frac{u}{v}\\right)' = \\frac{vu' - uv'}{v^2}$$. Note the **minus sign** in the numerator — it is $$vu' - uv'$$, not $$vu' + uv'$$.\n- Step 2: Phuc dropped this minus sign. The correct numerator is $$(19 + e^{0.2t})(400e^{0.1t}) - (4000e^{0.1t})(0.2e^{0.2t})$$. Dropping the minus gives a wrong derivative and makes it impossible to find the correct maximum. Harry's advice: \"Read the quotient rule from the formula book — the minus sign matters.\"", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": false}, {"question": "P3 Q5(b) — why should you use the quotient rule rather than rewriting $$\\frac{u}{v}$$ as $$u \\cdot v^{-1}$$ and using the product rule? (2 steps)", "answer": "- Step 1: While both methods are mathematically valid, the quotient rule is safer for this shape because the minus sign is explicitly built into the formula $$\\frac{vu' - uv'}{v^2}$$. With the product rule on $$u \\cdot v^{-1}$$, you must correctly differentiate $$v^{-1}$$ (bringing down another minus sign from the chain rule), creating two minus signs to track.\n- Step 2: Harry advised: the quotient rule is in the formula book and is the standard tool for this fraction shape. Using it reduces the chance of sign errors. The product rule approach works but is more error-prone.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "P3 Q5(b) — when expanding the quotient-rule numerator for $$N = \\frac{4000e^{0.1t}}{19 + e^{0.2t}}$$, how do you combine the exponential terms? (2 steps)", "answer": "- Step 1: The numerator expands to $$(19 + e^{0.2t})(400e^{0.1t}) - (4000e^{0.1t})(0.2e^{0.2t}) = 7600e^{0.1t} + 400e^{0.3t} - 800e^{0.3t}$$.\n- Step 2: Combine like terms: $$400e^{0.3t} - 800e^{0.3t} = -400e^{0.3t}$$. The key index-law step is $$e^{0.1t} \\cdot e^{0.2t} = e^{(0.1+0.2)t} = e^{0.3t}$$. You add the exponents when multiplying exponentials with the same base.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": false}, {"question": "P3 Q5(c) — when finding the maximum by setting $$\\frac{dN}{dt} = 0$$, why can you ignore the denominator? (2 steps)", "answer": "- Step 1: The derivative is $$\\frac{dN}{dt} = \\frac{7600e^{0.1t} - 400e^{0.3t}}{(19 + e^{0.2t})^2}$$. A fraction equals zero when its numerator equals zero (provided the denominator is not zero).\n- Step 2: The denominator $$(19 + e^{0.2t})^2$$ is always positive because $$e^{0.2t} > 0$$ for all $$t$$, so $$19 + e^{0.2t} > 19 > 0$$, and squaring preserves positivity. Therefore the denominator can never be zero, and you only need to solve $$7600e^{0.1t} - 400e^{0.3t} = 0$$.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": false}, {"question": "P3 Q5(c) — after factoring the numerator as $$e^{0.1T}(7600 - 400e^{0.2T}) = 0$$, why do you reject $$e^{0.1T} = 0$$? (2 steps)", "answer": "- Step 1: The exponential function $$e^{0.1T}$$ is always positive for every real value of $$T$$. It approaches zero as $$T \\to -\\infty$$ but never actually reaches zero.\n- Step 2: Harry sketched $$y = e^x$$ to show it is always above the x-axis. Since $$e^{0.1T} > 0$$ for all $$T$$, the factor $$e^{0.1T}$$ can never equal zero, so you reject it and solve $$7600 - 400e^{0.2T} = 0$$ instead.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": false}, {"question": "P3 Q5(c) — the question says \"show that $$e^{0.2T} = A$$.\" What is the critical command-word trap here? (2 steps)", "answer": "- Step 1: \"Show that\" means you must stop once you have demonstrated the required result. You do NOT need to (and should not) solve for $$T$$.\n- Step 2: Phuc's trap was pushing on to solve for $$T$$ and initially using $$\\log_{10}$$ instead of $$\\ln$$. Part (c) only asks you to show $$e^{0.2T} = 19$$. Solving for $$T$$ is part (d). Over-reaching wastes time and introduces errors (wrong log base).", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": false}, {"question": "P3 Q5(c)/(d) — when solving $$e^{0.2T} = 19$$, why must you use $$\\ln$$ (natural log) and not $$\\log_{10}$$? (2 steps)", "answer": "- Step 1: The base of the exponential is $$e$$, so the inverse function is the natural logarithm $$\\ln$$. Taking $$\\ln$$ of both sides: $$0.2T = \\ln 19$$.\n- Step 2: Using $$\\log_{10}$$ would give $$0.2T = \\log_{10}(19) / \\log_{10}(e)$$, which is correct but unnecessarily complicated and error-prone. Phuc initially wrote $$\\log_{10}$$ — this is a common slip when the base is $$e$$. When the base is $$e$$, always use $$\\ln$$.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": false}, {"question": "P3 Q5(d) — what is the rounding rule Harry drilled, and what happens if you break it? (2 steps)", "answer": "- Step 1: **Round only at the very final answer.** Use the stored (unrounded) calculator value of $$T$$ when substituting back to find $$N$$. Harry: \"We only round at the very final answer... use the stored value.\"\n- Step 2: If you round $$T \\approx 14.72$$ to, say, $$T = 15$$ before substituting into $$N$$, the propagated error could change the final answer. In this problem, rounding $$T$$ to 15 gives a noticeably different $$N$$. Always keep full precision until the last step.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": false}, {"question": "P3 Q5(d) — given $$e^{0.2T} = 19$$, how do you efficiently compute $$e^{0.1T}$$ without finding $$T$$ first? (2 steps)", "answer": "- Step 1: Notice that $$e^{0.1T} = (e^{0.2T})^{1/2} = \\sqrt{e^{0.2T}}$$. Since $$e^{0.2T} = 19$$, we get $$e^{0.1T} = \\sqrt{19}$$.\n- Step 2: This avoids computing $$T = \\frac{\\ln 19}{0.2}$$ and then re-exponentiating. The denominator becomes $$19 + e^{0.2T} = 19 + 19 = 38$$, and the numerator is $$4000\\sqrt{19}$$. So $$N = \\frac{4000\\sqrt{19}}{38} \\approx 458.83 \\approx 459$$.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": false}, {"question": "P3 Q5(d) — what is the maximum number of squirrels, and why is the answer 459 and not 959? (2 steps)", "answer": "- Step 1: $$N = \\frac{4000\\sqrt{19}}{38} = \\frac{4000 \\times 4.3589\\ldots}{38} = \\frac{17435.6\\ldots}{38} = 458.83\\ldots$$, which rounds to 459.\n- Step 2: The value \"959\" is a transcription error from one analysis segment that mis-copied the denominator as $$19 + e^{0.1t}$$ instead of $$19 + e^{0.2t}$$. The official model and the spoken transcript both confirm 459. Always verify against the original question, not intermediate notes.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": false}, {"question": "What is the derivative of $$e^{kx}$$ w
