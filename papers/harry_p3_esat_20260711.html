per year\", how should this be translated into a derivative equation, and what is the common sign error?", "answer": "\"Rate\" translates to the derivative $$\\frac{dV}{dt}$$, and \"increase\" dictates a positive direction. You must set the derivative equal to a positive value: $$\\frac{dV}{dt} = +50$$. \n+ The common error is setting it to $$-50$$ (confusing increase with decrease/decay). \n+ Another trap is trying to use an arithmetic series or linear gradient formula instead of recognising that \"rate\" in a continuous model strictly means the instantaneous calculus derivative.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_12", "judge_pick": false}, {"question": "When expressing $$a \\sin \\theta - b \\cos \\theta$$ in the form $$R \\sin(\\theta - \\alpha)$$ and asked for *exact* values, what is the safest algebraic method to find $$R$$ and $$\\alpha$$ without losing precision? (2 steps)", "answer": "- Step 1: Expand $$R \\sin(\\theta - \\alpha)$$ using the compound angle formula and equate coefficients to get two simultaneous equations: $$R \\cos \\alpha = a$$ and $$R \\sin \\alpha = b$$.\n- Step 2: To find $$\\alpha$$, divide the sine equation by the cosine equation to get $$\\tan \\alpha = \\frac{b}{a}$$. To find $$R$$, square both equations and add them together to get $$R^2(\\cos^2 \\alpha + \\sin^2 \\alpha) = a^2 + b^2$$, simplifying to $$R = \\sqrt{a^2 + b^2}$$. Do *not* calculate a decimal $$\\alpha$$ and plug it back into a trig function to find $$R$$, as this introduces rounding errors.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "What is the geometric or vector intuition behind the R-formula identity $$a \\sin \\theta + b \\cos \\theta = R \\sin(\\theta + \\alpha)$$?", "answer": "It represents the projection of a static 2D vector onto a rotating axis. \n+ The coefficients $$a$$ and $$b$$ form a static vector $$(a, b)$$ with a fixed magnitude $$R = \\sqrt{a^2+b^2}$$ and a fixed angle $$\\alpha$$. \n+ The expression $$a \\sin \\theta + b \\cos \\theta$$ is mathematically equivalent to the dot product of this static vector with a rotating unit vector $$(\\sin \\theta, \\cos \\theta)$$. \n+ The maximum projection (the amplitude of the wave) is simply the vector's length $$R$$, and the phase shift is its angle $$\\alpha$$.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_14", "judge_pick": true}, {"question": "If you need to find the exact minimum of a function in the form $$g(x) = \\frac{C}{f(x) + K}$$ where $$C$$ and $$K$$ are positive constants, what is the conceptual shortcut to avoid using calculus?", "answer": "Since the numerator $$C$$ is a fixed positive number, the fraction $$g(x)$$ is minimised when its denominator is *maximised*. \n+ You just need to find the maximum value of the variable part $$f(x)$$. For example, if $$f(x) = A \\sin(\\dots)$$, its maximum value is simply $$A$$. \n+ Add the constant $$K$$ to this maximum to get the largest possible denominator ($$A + K$$), and then divide the numerator by it: $$\\text{min } g(x) = \\frac{C}{A + K}$$.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_15", "judge_pick": false}, {"question": "When solving a trigonometric equation like $$\\sin(6x - \\frac{\\pi}{3}) = 1$$ for the *smallest positive* $$x$$, how do you ensure you haven't missed a smaller valid solution from the general set? (2 steps)", "answer": "- Step 1: Set the argument to the principal value where the sine function equals 1, which is $$\\frac{\\pi}{2}$$. Solve $$6x - \\frac{\\pi}{3} = \\frac{\\pi}{2}$$ to get your primary candidate for $$x$$.\n- Step 2: Mentally check the next period by adding $$2\\pi$$ to the principal value (i.e., setting the argument to $$\\frac{5\\pi}{2}$$). Because adding $$2\\pi$$ strictly increases the argument, it will strictly increase the resulting $$x$$. Thus, as long as your primary candidate is positive, it is guaranteed to be the smallest positive solution.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_16", "judge_pick": false}, {"question": "When finding the phase shift $$\\alpha$$ in an R-formula question, what two specific calculator settings or functions must you strictly verify to avoid losing easy marks?", "answer": "+ **Radians Mode:** Ensure your calculator is set to Radians, not Degrees. R-formula phase shifts in A-Level mathematics are almost universally required in radians.\n+ **Inverse Tangent:** Use the $$\\tan^{-1}$$ function to find $$\\alpha$$ from the equation $$\\tan \\alpha = \\frac{b}{a}$$. Do not use $$\\sin^{-1}$$ or $$\\cos^{-1}$$, as their restricted principal ranges might return an angle in the wrong quadrant if the signs of $$a$$ and $$b$$ dictate a different quadrant.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_17", "judge_pick": false}, {"question": "When evaluating an exponential population model like $$N = \\frac{4000e^{0.1t}}{19 + e^{0.2t}}$$ at the start of the study ($$t=0$$), what specific arithmetic trap must you avoid in the denominator?", "answer": "The trap is incorrectly assuming that $$e^0 = 0$$. You must remember the fundamental index law that any non-zero base to the power of zero is one: $$e^0 = 1$$. Therefore, the denominator evaluates to $$19 + 1 = 20$$, not $$19$$. The initial population is correctly calculated as $$\\frac{4000(1)}{20} = 200$$.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_18", "judge_pick": false}, {"question": "When applying the quotient rule to differentiate $$N = \\frac{u}{v}$$, what is the most common sign error in the numerator, and how can you structurally prevent it?", "answer": "The most common error is dropping the minus sign, incorrectly writing the numerator as $$v u' + u v'$$. \n+ To structurally prevent this, explicitly write the full formula $$\\frac{v \\frac{du}{dt} - u \\frac{dv}{dt}}{v^2}$$ from the formula book before substituting any expressions. \n+ Always use parentheses around the $$u$$ and $$v$$ terms when they are compound expressions (e.g., $$(19 + e^{0.2t})(400e^{0.1t}) - (4000e^{0.1t})(0.2e^{0.2t})$$) to ensure the subtraction applies to the entire second product.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_19", "judge_pick": false}, {"question": "Conceptually, why does the quotient rule $$\\frac{d}{dx}\\left(\\frac{u}{v}\\right)$$ contain a minus sign in the numerator, whereas the product rule has a plus sign?", "answer": "The quotient rule is derived directly from the product rule applied to the expression $$u \\cdot v^{-1}$$. \n+ When you differentiate the $$v^{-1}$$ term using the chain rule, the power rule brings down a $$-1$$, resulting in $$-v^{-2} \\frac{dv}{dx}$$. \n+ This negative power is the fundamental mathematical origin of the minus sign in the quotient rule's numerator ($$v u' - u v'$$). It reflects the inverse relationship of the denominator.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_20", "judge_pick": true}, {"question": "If part (c) of a question says \"Show that at the maximum, $$e^{0.2T} = 19$$\", and part (d) asks \"Find the maximum number of squirrels\", what is the strict boundary you must observe in part (c)?", "answer": "You must stop your working exactly when you reach the line $$e^{0.2T} = 19$$. \n+ Do not take the natural log or solve for the decimal value of $$T$$ in part (c). \n+ Solving for $$T$$ prematurely wastes time and, more importantly, risks introducing rounding errors that will ruin your exact substitution in part (d). Part (d) is designed to be solved by substituting the exact expression $$e^{0.2T} = 19$$ back into the model.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_21", "judge_pick": false}, {"question": "When finding the maximum of an exponential model, you often factor the derivative's numerator to get an equation like $$e^{kx}(A - B e^{mx}) = 0$$. Why do you immediately reject the root $$e^{kx} = 0$$?", "answer": "The exponential function $$e^{kx}$$ is strictly positive for all real values of $$x$$ (i.e., $$e^{kx} > 0$$). \n+ Graphically, it has a horizontal asymptote at $$y=0$$ and never crosses the x-axis. \n+ Therefore, the equation $$e^{kx} = 0$$ has no real solutions. The only valid solutions for the turning points must come from setting the algebraic bracket $$(A - B e^{mx}) = 0$$.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_22", "judge_pick": true}, {"question": "If you know that $$e^{0.2T} = 19$$ at the maximum of a model, how do you efficiently find the value of $$e^{0.1T}$$ to substitute back into the original equation without calculating the decimal value of $$T$$ first?", "answer": "Use the index law $$(a^m)^n = a^{mn}$$. \n+ Recognise that the exponent $$0.1T$$ is exactly half of $$0.2T$$. \n+ Therefore, you can write $$e^{0.1T} = (e^{0.2T})^{1/2} = \\sqrt{e^{0.2T}}$$. \n+ Substituting the known value gives $$e^{0.1T} = \\sqrt{19}$$. This elegant algebraic trick avoids calculating, storing, and potentially rounding the decimal value of $$T$$.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_23", "judge_pick": true}, {"question": "When a multi-part modelling question asks for a final answer to the \"nearest whole number\", what is the golden rule for handling intermediate calculated values like time $$T$$?", "answer": "Never round intermediate values. \n+ If you calculate $$T = 14.72...$$, do not type $$14.72$$ into the next step. \n+ Store the exact, unrounded value in your calculator's memory (e.g., using the `ANS` button or storing it to a variable like `Alpha` `X`). \n+ Substitute this stored, full-precision value into the final equation, and only apply rounding to the very final result (e.g., $$458.83 \\rightarrow 459$$).", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_24", "judge_pick": false}], "count": 25}, "minimax_1": {"label": "MiniMax M3 ①", "cards": [{"question": "What are the two structural reasons the surface area of a sphere of radius $$R$$ is $$4\\pi R^2$$ (and not $$4\\pi R$$, $$\\pi R^2$$, or $$2\\pi R^2$$)? (2 steps)", "answer": "- Step 1: The exponent on $$R$$ must be 2 because area is a two-dimensional measure — any surface area formula scales with the **square** of the linear dimension, not the linear dimension itself. (This is why $$2\\pi r$$ — circumference — has just $$r$$ to the first power, but any *area* formula must have $$r^2$$ somewhere.)\n- Step 2: The \"$$4$$\" comes from the geometry of a sphere: every point on the surface is at distance $$R$$ from the centre, and integrating the surface area element (or equivalently, wrapping 4 circles of radius $$R$$ around the equator) gives exactly $$4\\pi R^2$$.\n+ The recurring trap: writing $$4\\pi R$$ (no square) treats the sphere as a one-dimensional object. Memorise that **area scales as length²** and the squared factor is non-negotiable.", "source": "MiniMax M3 ①", "_id": "minimax_1_0", "judge_pick": true}, {"question": "A closed cylinder has two flat circular ends AND a curved side. Write down the formula for the total surface area of a closed cylinder, explaining where each term comes from. (3 steps)", "answer": "- Step 1: The two flat ends are circles of area $$\\pi r^2$$ each, so the two ends together contribute $$2 \\times \\pi r^2 = 2\\pi r^2$$.\n- Step 2: Unroll the curved side into a rectangle. One dimension is the height $$h$$ (preserved from the cylinder). The other dimension is the *circumference* of the original circular cross-section, which is $$2\\pi r$$ — **NOT** the diameter. So the curved area is $$2\\pi r \\times h = 2\\pi rh$$.\n- Step 3: Add them: total surface area $$= 2\\pi r^2 + 2\\pi rh$$.\n+ The trap Phuc fell into: offering $$\\pi r^2 h$$ for surface area, but that's the **volume** (cross-section × height). Surface area has units of length²; volume has units of length³. Different dimensions, different formulas.", "source": "MiniMax M3 ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "In the ESAT warm-up, Phuc initially wrote $$4\\pi R^2 = 10(\\pi r^2 + 2\\pi rh)$$ — missing one of the circular ends. What's the correct setup, and why is this a critical structural mistake? (2 steps)", "answer": "- Step 1: A closed cylinder has **two** ends (top AND bottom), each a circle of area $$\\pi r^2$$, so the cylinder's surface area is $$2\\pi r^2 + 2\\pi rh$$, not $$\\pi r^2 + 2\\pi rh$$. Ten such cylinders contribute $$10(2\\pi r^2 + 2\\pi rh) = 20\\pi r^2 + 20\\pi rh$$.\n- Step 2: The correct equation is $$4\\pi R^2 = 20\\pi r^2 + 20\\pi rh$$. After substituting $$h = 4R$$ and dividing by $$4\\pi$$, this becomes $$R^2 = 5r^2 + 20rR$$, which rearranges to a **quadratic** in $$R$$: $$R^2 - 20rR - 5r^2 = 0$$.\n+ The structural lesson: when a shape is described as \"closed\" or \"solid\", count BOTH ends of every cylindrical or prismatic part. Visualise unrolling the curved surface to keep the geometry honest.", "source": "MiniMax M3 ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "When you have $$4\\pi R^2 = 20\\pi r^2 + 20\\pi rh$$ with $$h = 4R$$, what's the very first algebraic move, and why? (2 steps)", "answer": "- Step 1: Divide the entire equation by $$4\\pi$$. This is the natural simplification because the LHS is $$4\\pi R^2$$, and every term on the RHS has a factor of $$4\\pi$$ lurking in it: $$20\\pi r^2 = 4\\pi \\cdot 5r^2$$ and $$80\\pi rR = 4\\pi \\cdot 20rR$$.\n- Step 2: After dividing by $$4\\pi$$, the equation becomes $$R^2 = 5r^2 + 20rR$$, which you can rewrite as the quadratic $$R^2 - 20rR - 5r^2 = 0$$.\n+ The general rule: always look for the **common factor** across ALL terms first. Dividing the LHS cleanly is what transforms the equation into recognisable quadratic form — the gateway to the quadratic formula.", "source": "MiniMax M3 ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "After dividing by $$4\\pi$$, the equation becomes $$R^2 - 20rR - 5r^2 = 0$$. What does the quadratic formula give, and which root do you take? (3 steps)", "answer": "- Step 1: Apply the quadratic formula with $$a = 1$$, $$b = -20r$$, $$c = -5r^2$$:\n  $$R = \\frac{20r \\pm \\sqrt{(-20r)^2 - 4(1)(-5r^2)}}{2} = \\frac{20r \\pm \\sqrt{400r^2 + 20r^2}}{2} = \\frac{20r \\pm \\sqrt{420r^2}}{2}.$$\n- Step 2: Simplify $$\\sqrt{420r^2} = \\sqrt{4 \\cdot 105}\\, r = 2r\\sqrt{105}$$, so $$R = \\frac{20r \\pm 2r\\sqrt{105}}{2} = 10r \\pm r\\sqrt{105} = r(10 \\pm \\sqrt{105}).$$\n- Step 3: A radius is a length, so it must be positive. Since $$\\sqrt{105} \\approx 10.25$$, the root $$10 - \\sqrt{105} \\approx -0.247$$ is negative (impossible as a length). Take the + root: $$R = r(10 + \\sqrt{105})$$.\n+ Universal rule: when a quadratic in a physical quantity gives two roots, ALWAYS check which root is physically meaningful. A negative radius, time, or population has no interpretation — algebra alone isn't enough; physics filters the result.", "source": "MiniMax M3 ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "Harry's recurring advice on the ESAT warm-up was \"I think we need to know some key formulae.\" What are the five formulae he said Phuc must know cold, and what's the easiest way to remember each? (2 steps)", "answer": "- Step 1: The five formulae:\n  + **Circle area** = $$\\pi r^2$$ (NOT $$\\pi r$$)\n  + **Circle circumference** = $$2\\pi r$$\n  + **Sphere surface area** = $$4\\pi R^2$$\n  + **Closed cylinder surface area** = $$2\\pi r^2 + 2\\pi rh$$\n  + **Cylinder volume** = $$\\pi r^2 h$$\n- Step 2: Memory anchors:\n  + Area scales as $$r^2$$ (length squared), so any area formula has $$r^2$$.\n  + Circumference is \"around\" the circle, so $$2\\pi r$$ (linear in $$r$$).\n  + Sphere SA: imagine 4 circles wrapped around the equator, each of area $$\\pi R^2$$, giving $$4\\pi R^2$$.\n  + Closed cylinder SA: 2 circles ($$2\\pi r^2$$) + unrolled rectangle ($$2\\pi r \\times h = 2\\pi rh$$).\n  + Cylinder volume = base area × height = $$\\pi r^2 \\times h$$.\n+ Harry's diagnosis: Phuc's main gap is formula recall, and the fix is flashcards + drilling 8–10 papers until the formulae are \"second nature.\"", "source": "MiniMax M3 ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "In the Intermediate Value Theorem (Q2a), Phuc knew to look for a sign change but stopped there. What's the second thing that MUST appear in your written solution, and what happens if you forget it? (2 steps)", "answer": "- Step 1: You MUST also state that $$f$$ is **continuous** on the closed interval $$[1, 2]$$. Harry's exact words: \"The bit that everyone forgets is to mention that continuity.\"\n- Step 2: Without continuity, the IVT doesn't apply. The theorem is literally the statement that a continuous function on $$[a, b]$$ which changes sign must have a root in $$[a, b]$$. The continuity condition is half of the hypothesis; the sign change is the other half.\n+ Mark consequence: you score only 1 out of 2 (or 1 out of the IVT marks). Harry called this \"the bit that everyone forgets\" because it's the single most common reason students lose a mark on IVT.", "source": "MiniMax M3 ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "For the IVT on $$f(x) = \\frac{2x^2 + 3x - 4}{e^x} - \\frac{1}{x^2}$$, how do you decide the endpoints to use, and why do you actually substitute the *exact* endpoints (not \"near\" them)? (2 steps)", "answer": "- Step 1: The problem says to show the root $$\\alpha \\in [1, 2]$$, so the endpoints are forced: you must use $$x = 1$$ and $$x = 2$$, the literal endpoints of the interval. You can't pick $$1.2$$ or \"values near them\" — that's not what the question asks.\n- Step 2: Substituting the exact endpoints gives you specific sign information about $$f$$ on $$[1, 2]$$. The IVT then guarantees a root in $$[1, 2]$$ provided the function is continuous on $$[1, 2]$$ (which it is, since the only discontinuities are at $$x = 0$$, and $$0 \\notin [1, 2]$$).\n+ The discipline lesson: when a question says \"show $$\\alpha \\in [a, b]$$\", you MUST evaluate $$f$$ at exactly $$a$$ and $$b$$. Substituting approximate values destroys the proof structure, even if your numerical conclusion is the same.", "source": "MiniMax M3 ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "After computing the signs of $$f(a)$$ and $$f(b)$$ for the IVT, what's the standard conclusion sentence that should appear at the end of the working? (2 steps)", "answer": "- Step 1: Combine the two ingredients — sign change and continuity — into a single concluding statement. The standard form is:\n  *\"Since $$f$$ is continuous on $$[a, b]$$ and $$f(a)$$ and $$f(b)$$ have opposite signs, by the Intermediate Value Theorem there exists a root $$\\alpha \\in [a, b]$$ such that $$f(\\alpha) = 0$$.\"*\n- Step 2: This single sentence ties the working to the theorem, makes your proof structure explicit, and signals to the examiner that you know what you're doing. A bare \"so there's a root\" without invoking IVT loses marks.\n+ The lesson: don't let the working trail off. Close the argument with a sentence that **names the theorem, the interval, and the conclusion**. This is the difference between \"showing working\" and \"making a proof\".", "source": "MiniMax M3 ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "When asked to rearrange a \"show that $$f(x) = 0 \\Leftrightarrow x = (\\text{some form})$$\", what's the first thing you should do — before touching the algebra? (1 step)", "answer": "Look at the **target form** first. The target form tells you exactly which operations to use and in which order — the cube root, the denominator, the numerator structure all hint at the moves you need. \n+ Harry's exact words: \"look at the target for clues.\" This is the difference between blind algebraic manipulation (slow, error-prone) and directed rearrangement (fast, mechanical). The target form is your North Star.", "source": "MiniMax M3 ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "In the Q2(b) rearrangement, the target form has a cube root: $$x = \\sqrt[3]{\\frac{e^x + 4x^2}{2x + 3}}$$. What does the presence of a cube root in the target tell you to do with the equation at the appropriate moment? (1 step)", "answer": "The cube root in the target tells you to **cube-root both sides** of the equation at the moment when the LHS is $$x^3$$ (with no other powers of $$x$$ present). The cube root and the cube are inverse operations: $$\\sqrt[3]{x^3} = x$$. This is how you \"unlock\" the $$x^3$$ on the LHS.\n+ The general principle: a function in the target form corresponds to an inverse operation to apply. $$\\sqrt{\\,\\,}$$ in target → square both sides. $$\\ln$$ in target → exponentiate. $$\\log$$ in target → $$10^{(\\cdot)}$$. Always match the target's structure to its inverse move.", "source": "MiniMax M3 ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "In the Q2(b) rearrangement, after moving $$4x^2$$ across and before cube-rooting, the LHS is $$x^3(2x + 3)$$ and the RHS is $$e^x + 4x^2$$. How do you produce the $$(2x + 3)$$ factor on the LHS? (2 steps)", "answer": "- Step 1: Before moving $$4x^2$$ across, the LHS was $$2x^4 + 3x^3 - 4x^2$$. Look at the first two terms: $$2x^4 = x^3 \\cdot 2x$$ and $$3x^3 = x^3 \\cdot 3$$, so you can factor out $$x^3$$ to get $$x^3(2x + 3) - 4x^2$$.\n- Step 2: Once the $$-4x^2$$ is moved to the RHS, the LHS becomes exactly $$x^3(2x + 3)$$ — the form that, after dividing by $$(2x + 3)$$ and cube-rooting both sides, gives the target.\n+ The lesson: **factor the LHS to REVEAL the desired structure**. Don't multiply out and move terms blindly — at every step, ask \"what factor do I want to see here, and can I produce it?\"", "source": "MiniMax M3 ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "In the Q2(b) rearrangement, what's the role of multiplying through by $$e^x x^2$$? When is this kind of move appropriate? (2 steps)", "answer": "- Step 1: The original equation has denominators $$e^x$$ and $$x^2$$. Multiplying by their product $$e^x x^2$$ clears both denominators in one move, transforming $$\\frac{2x^2 + 3x - 4}{e^x} - \\frac{1}{x^2} = 0$$ into a polynomial-exponential form: $$2x^4 + 3x^3 - 4x^2 - e^x = 0$$.\n- Step 2: This is appropriate when the target form has no fractions (i.e., you want to consolidate terms). The general rule: multiply by the LCM of the denominators when you want to clear denominators.\n+ Caveat: never multiply by zero. Check that the LCM is non-zero on the domain. Here $$e^x x^2 \\neq 0$$ for any real $$x$$, so it's safe.", "source": "MiniMax M3 ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "In Q3, Phuc tried to use $$V$$ (or $$y$$) as the vertical variable when reading a graph of $$\\log_{10} V$$ against $$t$$. What's the correct reading, and how do you avoid this mistake? (2 steps)", "answer": "- Step 1: The phrase \"$$\\log_{10} V$$ against $$t$$\" tells you the y-axis is $$\\log_{10} V$$ (NOT $$V$$), and the x-axis is $$t$$. So the plotted points are $$(t, \\log_{10} V)$$ and the linear relationship is $$\\log_{10} V = mt + c$$, not $$V = mt + c$$.\n- Step 2: When the question says \"$$Y$$ against $$X$$\" or \"plot $$Y$$ against $$X$$\", $$Y$$ is what's on the vertical axis and $$X$$ on the horizontal. If there's a function of the variable (like $$\\log_{10} V$$, $$\\sin\\theta$$, $$\\sqrt{x}$$), that **function** is the $$Y$$ value, not the raw variable.\n+ The label of the axis is the plotted quantity. Mis-reading: assuming the variable name on the axis matches the variable name in the model. Always read the axis label **literally** — \"$$\\log_{10} V$$\" is a different thing from \"$$V$$\".", "source": "MiniMax M3 ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "Given a straight line through $$(0, 2)$$ and $$(5, 2.25)$$ on a plot of $$\\log_{10} V$$ against $$t$$, how do you find $$m$$ and $$c$$? (2 steps)", "answer": "- Step 1: The slope $$m = \\dfrac{2.25 - 2}{5 - 0} = \\dfrac{0.25}{5} = 0.05$$. The intercept $$c$$ is the value of $$\\log_{10} V$$ when $$t = 0$$, which is the y-coordinate of $$(0, 2)$$, so $$c = 2$$.\n- Step 2: Use the two endpoints that you can read from the graph or that are given. Here $$(0, 2)$$ and $$(5, 2.25)$$ are the given points, so $$m$$ and $$c$$ are determined directly without any estimation.\n+ Quick check: at $$t = 0$$, $$\\log_{10} V = c = 2$$, so $$V(0) = 10^2 = 100$$. The intercept tells you the initial value of the un-logged quantity — a useful sanity check.", "source": "MiniMax M3 ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "Once you have $$\\log_{10} V = 0.05t + 2$$, how do you \"undo the log\" to get $$V = ab^t$$? What's the role of index laws here? (2 steps)", "answer": "- Step 1: Exponentiate both sides with base 10: $$10^{\\log_{10} V} = 10^{0.05t + 2}$$. Since $$10^{\\log_{10} V} = V$$, the LHS becomes $$V$$. The RHS uses the index law $$10^{p+q} = 10^p \\cdot 10^q$$, giving $$V = 10^{0.05t} \\cdot 10^2$$.\n- Step 2: Recognise $$10^2 = 100 = a$$, and $$10^{0.05t} = (10^{0.05})^t = b^t$$ where $$b = 10^{0.05}$$. So $$V = 100 \\cdot (10^{0.05})^t$$, giving $$a = 100$$ (exact) and $$b = 10^{0.05}$$ (exact, $$\\approx 1.12$$ to 3 s.f.).\n+ The key index law: $$10^{mt+c} = 10^c \\cdot 10^{mt} = 10^c \\cdot (10^m)^t$$. Splitting the exponent is the bridge from a log model to an exponential model.", "source": "MiniMax M3 ①", "_id": "minimax_1_15", "judge_pick": true}, {"question": "Q3(b) says \"give $$a$$ exact, $$b$$ to 3 s.f.\" Q3(c) asks for a rate (derivative). Why must you keep the EXACT $$10^{0.05}$$ for differentiation, even though the question allows $$1.12$$ in part (b)? (2 steps)", "answer": "- Step 1: When you differentiate $$b^t$$, the result is $$b^t \\cdot \\ln(b)$$. If you plug in the rounded $$b = 1.12$$, you get an inexact answer because the error in $$b$$ gets compounded by the log and the exponential. The exact chain of reasoning is preserved only if you differentiate the exact $$10^{0.05}$$.\n- Step 2: The \"3 s.f.\" tolerance is for the DISPLAY of $$b$$ in part (b), not for use in subsequent parts. Once you move to part (c), use the calculator-stored value of $$b$$ (= $$10^{0.05}$$) for all further work, and only round the FINAL answer of part (c).\n+ Discipline lesson: a \"rounding instruction\" applies to the part it belongs to. If a later part doesn't repeat the instruction, default to the exact value. Carry exactness forward; round at the end of the problem, not at the end of each part.", "source": "MiniMax M3 ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "In Q3(c), Phuc's first instinct was \"arithmetic series\". What's wrong with that, and what's the correct interpretation of \"rate of increase\"? (2 steps)", "answer": "- Step 1: An \"arithmetic series\" is a sequence where consecutive differences are constant — that gives **linear** growth, not exponential. The model $$V = 100 \\cdot (10^{0.05})^t$$ is exponential, so a difference-of-terms approach makes no sense here.\n- Step 2: \"Rate of increase\" means $$\\dfrac{dV}{dt}$$ — the derivative of $$V$$ with respect to $$t$$. If the rate is $$+50$$ (increase), then $$\\dfrac{dV}{dt} = +50$$. If it were a decrease, the sign would be $$-50$$.\n+ Diagnostic: \"rate\" in any calculus context means **derivative**, always. Whether it's rate of change, rate of increase, rate of decrease — the language flags differentiation.", "source": "MiniMax M3 ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "State the rule for differentiating $$a^{kx}$$. What's the factor, and what common mistake do students make with it? (2 steps)", "answer": "- Step 1: $$\\dfrac{d}{dx}(a^{kx}) = a^{kx} \\cdot k \\cdot \\ln(a)$$. The factor is $$k \\cdot \\ln(a)$$ — both the multiplier $$k$$ from the exponent AND the natural log of the base $$a$$.\n- Step 2: Common mistake: writing $$\\dfrac{d}{dx}(a^{kx}) = a^{kx} \\cdot \\ln(kx)$$ or $$\\dfrac{d}{dx}(6^x) = 6^x \\cdot \\ln(6x)$$. Both are wrong. The correct form for $$6^x$$ is $$6^x \\cdot \\ln(6)$$, and for $$3^{6x}$$ it's $$3^{6x} \\cdot 6 \\cdot \\ln(3)$$. The $$x$$ appears nowhere in the factor — only the coefficient $$k$$ and the base $$a$$ do.\n+ Why $$\\ln(a)$$ and not $$\\ln(\\text{something with }x)$$? Because the antiderivative of $$1/u$$ is $$\\ln(u)$$. Setting $$u = a^{kx}$$, the chain rule gives $$\\frac{du}{dx} = a^{kx} \\cdot k \\cdot \\ln(a)$$. The log of the base is the constant that inverts the exponential.", "source": "MiniMax M3 ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "Use the chain rule to derive $$\\dfrac{d}{dx}(3^{6x})$$. What's the inner function, outer function, and how do they combine? (3 steps)", "answer": "- Step 1: Identify the structure: $$3^{6x}$$ is the outer function $$3^u$$ with inner function $$u = 6x$$. This is a composition: first multiply by 6, then exponentiate base 3.\n- Step 2: Apply the chain rule: $$\\dfrac{d}{dx}[3^{6x}] = \\dfrac{d}{du}(3^u) \\cdot \\dfrac{du}{dx} = 3^u \\cdot \\ln(3) \\cdot 6$$.\n- Step 3: Substitute back $$u = 6x$$: the result is $$3^{6x} \\cdot 6 \\cdot \\ln(3)$$. Phuc's mistake was writing $$\\ln(6x)$$ — confusing the inner function $$6x$$ with a log of $$x$$.\n+ The chain rule is mechanical: outer derivative × inner derivative. The \"$$\\ln$$\" you see comes from differentiating $$3^u$$, where $$u$$ is treated as the variable. Don't let the inner function (which happens to involve $$x$$) leak into the log.", "source": "MiniMax M3 ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "Why is differentiating $$a^{kx}$$ the same as differentiating $$e^{kx \\cdot \\ln(a)}$$? (2 steps)", "answer": "- Step 1: The identities $$a = e^{\\ln(a)}$$ and $$(e^m)^n = e^{mn}$$ let you rewrite $$a^{kx}$$ as $$(e^{\\ln(a)})^{kx} = e^{kx \\cdot \\ln(a)}$$. So $$a^{kx}$$ and $$e^{kx \\cdot \\ln(a)}$$ are literally the same function, just written differently.\n- Step 2: Differentiating $$e^{kx \\cdot \\ln(a)}$$ is a standard job: $$\\dfrac{d}{dx}(e^u) = e^u \\cdot \\dfrac{du}{dx}$$, where $$u = kx \\cdot \\ln(a)$$ and $$\\dfrac{du}{dx} = k \\cdot \\ln(a)$$. So $$\\dfrac{d}{dx}(a^{kx}) = e^{kx \\cdot \\ln(a)} \\cdot k \\cdot \\ln(a) = a^{kx} \\cdot k \\cdot \\ln(a)$$.\n+ This is the deep reason why the factor is $$k \\cdot \\ln(a)$$: it's just the chain rule applied to $$e^u$$ with $$u = kx \\cdot \\ln(a)$$. The \"magic\" rule is a special case of the standard exponential derivative.", "source": "MiniMax M3 ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "To write $$\\sqrt{3}\\sin(2x) - 3\\cos(2x)$$ in the form $$R\\sin(2x - \\alpha)$$, the first move is to expand $$R\\sin(2x - \\alpha)$$ using the compound-angle formula. What's the expansion, and how does it let you match coefficients? (2 steps)", "answer": "- Step 1: Apply the compound-angle formula:\n  $$R\\sin(2x - \\alpha) = R[\\sin(2x)\\cos\\alpha - \\cos(2x)\\sin\\alpha] = (R\\cos\\alpha)\\sin(2x) + (-R\\sin\\alpha)\\cos(2x).$$\n- Step 2: This is a linear combination of $$\\sin(2x)$$ and $$\\cos(2x)$$ with coefficients $$R\\cos\\alpha$$ and $$-R\\sin\\alpha$$. Matching with $$\\sqrt{3}\\sin(2x) - 3\\cos(2x)$$:\n  $$R\\cos\\alpha = \\sqrt{3}, \\quad R\\sin\\alpha = 3.$$\n  (The coefficient of $$\\cos(2x)$$ is $$-R\\sin\\alpha$$, so $$-R\\sin\\alpha = -3 \\Rightarrow R\\sin\\alpha = 3$$.)\n+ The expansion is the framework: it shows that $$R\\sin(2x - \\alpha)$$ is essentially \"a weighted sum of sin and cos\" with two unknowns ($$R$$ and $$\\alpha$$) tied together by the Pythagorean identity.", "source": "MiniMax M3 ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "Given $$R\\cos\\alpha = \\sqrt{3}$$ and $$R\\sin\\alpha = 3$$, what two operations give you $$R$$ and $$\\alpha$$ exactly? Why is \"substitute a decimal $$\\alpha$$ to get $$R$$\" dangerous? (3 steps)", "answer": "- Step 1: For $$R$$, **square and add**: $$(R\\cos\\alpha)^2 + (R\\sin\\alpha)^2 = R^2(\\cos^2\\alpha + \\sin^2\\alpha) = R^2 = (\\sqrt{3})^2 + 3^2 = 3 + 9 = 12$$, so $$R = \\sqrt{12} = \\sqrt{4 \\cdot 3} = 2\\sqrt{3}$$.\n- Step 2: For $$\\alpha$$, **divide**: $$\\tan\\alpha = \\dfrac{R\\sin\\alpha}{R\\cos\\alpha} = \\dfrac{3}{\\sqrt{3}} = \\sqrt{3}$$. With $$\\alpha \\in (0, \\pi/2)$$ (the standard range for R-form), $$\\tan\\alpha = \\sqrt{3}$$ gives $$\\alpha = \\pi/3$$.\n- Step 3: Substituting a decimal $$\\alpha$$ is dangerous because the rounding error in $$\\alpha$$ propagates into $$R$$ through $$R = a/\\cos\\alpha$$, giving an inexact $$R$$. Square-and-add and divide are exact operations that preserve surds.\n+ Harry's exact words: \"Your method could be quite dangerous.\" The danger is the **rounding chain**: a rounded $$\\alpha$$ produces a rounded $$\\cos\\alpha$$, which produces a rounded $$R$$, and the errors stack. Exact algebra is the only safe route for \"exact value\" questions.", "source": "MiniMax M3 ①", "_id": "minimax_1_22", "judge_pick": true}, {"question": "When you need $$\\alpha$$ from $$\\tan\\alpha = b/a$$, why use $$\\tan^{-1}$$ (and not $$\\sin^{-1}$$ or $$\\cos^{-1}$$), and what calculator mode matters? (2 steps)", "answer": "- Step 1: $$\\tan\\alpha = b/a$$ gives you the **ratio** of $$\\sin\\alpha$$ to $$\\cos\\alpha$$. To recover $$\\alpha$$, you must take the inverse of the ratio's defining function — that's $$\\tan^{-1}$$. $$\\sin^{-1}$$ would require you to know $$\\sin\\alpha$$ alone (you don't), and $$\\cos^{-1}$$ would require $$\\cos\\alpha$$ alone (you don't).\n- Step 2: Calculator mode: the angle is in **radians** (because the problem uses $$2x$$, not $$2x°$$). If your calculator is in degree mode, $$\\tan^{-1}(\\sqrt{3})$$ gives $$60°$$ numerically, but the answer should be $$\\pi/3 \\approx 1.047$$ rad. Always use radians for P3 trig work.\n+ A common trap: using $$\\sin^{-1}$$ because \"the formula book has $$\\sin^{-1}$$ for $$\\alpha$$\". The formula book is for the $$a\\cos\\theta + b\\sin\\theta$$ form, not for the $$R\\sin(2x - \\alpha)$$ form. Different formulas, different inverses.", "source": "MiniMax M3 ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "For $$g(x) = \\dfrac{18}{\\sqrt{3}\\sin(6x - \\pi/3) + 4\\sqrt{3}}$$, the numerator is fixed. How do you find the **minimum** of $$g$$? (2 steps)", "answer": "- Step 1: The numerator $$18$$ is a positive constant. The denominator $$\\sqrt{3}\\sin(6x - \\pi/3) + 4\\sqrt{3}$$ depends on $$x$$. To **minimise** a fraction with a fixed positive numerator, you **maximise the denominator**.\n- Step 2: The denominator is maximised when $$\\sin(6x - \\pi/3) = 1$$ (its maximum value). Plugging in: max denominator $$= \\sqrt{3}(1) + 4\\sqrt{3} = 5\\sqrt{3}$$, so min $$g = \\dfrac{18}{5\\sqrt{3}} = \\dfrac{18}{5\\sqrt{3}} \\cdot \\dfrac{\\sqrt{3}}{\\sqrt{3}} = \\dfrac{18\\sqrt{3}}{15} = \\dfrac{6\\sqrt{3}}{5}$$.\n+ General principle: for a fraction $$a/f(x)$$ with $$a > 0$$ fixed, $$\\min a/f(x) = a/\\max f(x)$$. For $$a < 0$$, the logic inverts. Always identify which quantity to extremise based on the sign of the numerator.", "source": "MiniMax M3 ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "Setting $$\\sin(6x - \\pi/3) = 1$$ gives $$6x - \\pi/3 = \\pi/2 + 2n\\pi$$. What's the smallest positive $$x$$, and how do you confirm it really is the smallest? (2 steps)", "answer": "- Step 1: Take the principal solution ($$n = 0$$): $$6x - \\pi/3 = \\pi/2 \\Rightarrow 6x = \\pi/2 + \\pi/3 = \\dfrac{3\\pi + 2\\pi}{6} = \\dfrac{5\\pi}{6} \\Rightarrow x = \\dfrac{5\\pi}{36}$$. The next solution ($$n = 1$$) gives $$6x = 5\\pi/6 + 2\\pi = 17\\pi/6$$, so $$x = 17\\pi/36$$ — clearly larger.\n- Step 2: To confirm: $$5\\pi/36 \\approx 0.436 > 0$$, so it's positive. $$17\\pi/36 \\approx 1.484$$ is the next one, and any further $$n$$ gives even larger $$x$$. So $$5\\pi/36$$ is the smallest positive solution.\n+ Sanity check: if the question asks for \"smallest $$x$$ in the given domain\", always take the principal solution first ($$n = 0$$) and check whether the next solution ($$n = 1$$) lies in the domain. If the domain is $$(0, \\pi)$$ or \"$$x > 0$$\", the principal solution is almost always the answer.", "source": "MiniMax M3 ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "In Q4(b)(i), the minimum was expressed as $$\\dfrac{6\\sqrt{3}}{5}$$. The denominator was $$\\sqrt{3}$$ in $$5\\sqrt{3}$$ — why is \"rationalising\" the denominator a thing in P3? (2 steps)", "answer": "- Step 1: The unwritten denominator of $$\\dfrac{1}{5\\sqrt{3}}$$ contains a surd. The standard convention in P3 (and most exam boards) is to write answers **without surds in the denominator** — a \"rationalised\" denominator. Multiplying $$\\dfrac{18}{5\\sqrt{3}}$$ by $$\\dfrac{\\sqrt{3}}{\\sqrt{3}}$$ gives $$\\dfrac{18\\sqrt{3}}{15} = \\dfrac{6\\sqrt{3}}{5}$$, which satisfies the convention.\n- Step 2: Mark-scheme reason: examiners expect a single canonical form. \"Rationalise the denominator\" is a soft rule that signals fluency. Even if the numerical value is the same, the form matters for full credit.\n+ The diagnostic: any answer of the form $$\\dfrac{a}{b\\sqrt{c}}$$ or $$\\dfrac{a}{\\sqrt{c}}$$ can be rationalised by multiplying by $$\\dfrac{\\sqrt{c}}{\\sqrt{c}}$$. Do it routinely; it's a free mark for presentation.", "source": "MiniMax M3 ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "In Q5, $$N = \\dfrac{4000e^{0.1t}}{19 + e^{0.2t}}$$. At $$t = 0$$, what does $$N$$ evaluate to, and what specific trap did Phuc fall into? (2 steps)", "answer": "- Step 1: Substitute $$t = 0$$: $$e^{0.1 \\cdot 0} = e^0 = 1$$ and $$e^{0.2 \\cdot 0} = e^0 = 1$$. So $$N = \\dfrac{4000 \\cdot 1}{19 + 1} = \\dfrac{4000}{20} = 200$$.\n- Step 2: Phuc's trap: he \"lost the one\" in the denominator — he wrote $$19 + e^0$$ as $$19$$ (forgetting that $$e^0 = 1$$ adds to the 19). The denominator must be $$19 + 1 = 20$$, not $$19$$.\n+ Universal rule: $$e^0 = 1$$, ALWAYS. This is a free evaluation that often catches students out. Whenever you see $$e$$ with a zero exponent, substitute $$1$$ without thinking.", "source": "MiniMax M3 ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "For $$N = \\dfrac{4000e^{0.1t}}{19 + e^{0.2t}}$$, write down the quotient rule formula and the values of $$u$$, $$v$$, $$\\dfrac{du}{dt}$$, $$\\dfrac{dv}{dt}$$. (2 steps)", "answer": "- Step 1: The quotient rule is $$\\dfrac{dN}{dt} = \\dfrac{v \\cdot \\frac{du}{dt} - u \\cdot \\frac{dv}{dt}}{v^2}$$. Here $$u = 4000e^{0.1t}$$ (numerator) and $$v = 19 + e^{0.2t}$$ (denominator).\n- Step 2: Differentiate each:\n  $$\\dfrac{du}{dt} = 4000 \\cdot 0.1 \\cdot e^{0.1t} = 400e^{0.1t}$$ (using $$\\frac{d}{dx}(e^{kx}) = k e^{kx}$$)\n  $$\\dfrac{dv}{dt} = 0 + 0.2 e^{0.2t} = 0.2 e^{0.2t}$$ (the constant 19 has derivative 0).\n+ Order matters in the quotient rule: it's $$v \\cdot \\frac{du}{dt} - u \\cdot \\frac{dv}{dt}$$, not $$u \\cdot \\frac{dv}{dt} - v \\cdot \\frac{du}{dt}$$. Phuc dropped the minus sign — that's the trap. The formula book has it; read it from there.", "source": "MiniMax M3 ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "In the quotient rule application, why is $$e^{0.1t} \\cdot e^{0.2t} = e^{0.3t}$$? (1 step)", "answer": "By the index law $$e^a \\cdot e^b = e^{a+b}$$. When you multiply exponentials with the same base, you **add the exponents**. Here $$a = 0.1t$$ and $$b = 0.2t$$, so $$a + b = 0.3t$$, and $$e^{0.1t} \\cdot e^{0.2t} = e^{0.3t}$$.\n+ This index law is the same one you use for $$x^a \\cdot x^b = x^{a+b}$$. For any base, multiplication of powers gives exponent addition. Recognising this simplifies the numerator: $$400 \\cdot 0.2 \\cdot e^{0.3t} = 0.2 \\cdot 400 \\cdot e^{0.3t} = 80 e^{0.3t}$$ — much easier than carrying two exponentials.", "source": "MiniMax M3 ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "Why did Harry advise using the quotient rule for $$N = \\dfrac{u}{v}$$, rather than rewriting as $$u \\cdot v^{-1}$$ and using the product rule? (2 steps)", "answer": "- Step 1: With $$u = 4000e^{0.1t}$$ and $$v = 19 + e^{0.2t}$$, rewriting as $$N = u \\cdot v^{-1}$$ means the product rule gives $$\\dfrac{dN}{dt} = u' \\cdot v^{-1} + u \\cdot (-v^{-2}) \\cdot v' = \\dfrac{u'}{v} - \\dfrac{u v'}{v^2}$$. To combine these into a single fraction, you need a common denominator $$v^2$$, which is extra algebraic work.\n- Step 2: The quotient rule gives the same answer in one step, and the formula is in the book. When the function is already in $$u/v$$ form, the quotient rule is structurally simpler — no rewriting, no combining fractions, no extra terms.\n+ Engineering lesson: choose the tool that matches the structure. **Quotient rule** for $$u/v$$; **product rule** for $$u \\cdot v$$; **chain rule** for $$f(g(x))$$. Don't rewrite to fit a different rule unless the rewriting actually simplifies things.", "source": "MiniMax M3 ①", "_id": "minimax_1_30", "judge_pick": true}, {"question": "At the maximum of $$N$$, why can you set $$\\dfrac{dN}{dt} = 0$$ and only look at the numerator? (2 steps)", "answer": "- Step 1: $$\\dfrac{dN}{dt} = \\dfrac{\\text{numerator}}{(19 + e^{0.2t})^2}$$. The denominator $$(19 + e^{0.2t})^2$$ is ALWAYS positive — the inside is 19 plus a positive exponential, so it's $$\\geq 20$$, and squaring keeps it positive. So the sign and zero-ness of $$\\frac{dN}{dt}$$ are entirely controlled by the numerator.\n- Step 2: For a fraction to equal zero, the numerator must be zero (since the denominator can't be zero or infinite). So $$\\dfrac{dN}{dt} = 0 \\Leftrightarrow 7600e^{0.1t} - 400e^{0.3t} = 0$$. The denominator's positivity lets you drop it from the equation.\n+ Diagnostic move: when setting a derivative to zero, always check if any part of the expression is \"always nonzero\" (constants, squares, exponentials). Such factors can be dropped, simplifying the algebra dramatically.", "source": "MiniMax M3 ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "In $$7600e^{0.1T} - 400e^{0.3T} = 0$$, factor out $$e^{0.1T}$$ and explain why you can't just say $$e^{0.1T} = 0$$. (2 steps)", "answer": "- Step 1: Factor: $$e^{0.1T} \\cdot (7600 - 400e^{0.2T}) = 0$$. This is a product of two terms. For the product to be zero, at least one factor must be zero.\n- Step 2: $$e^{0.1T} > 0$$ for ALL real $$T$$ (since $$e^{\\text{anything}} > 0$$). So $$e^{0.1T} \\neq 0$$, and the only way the product is zero is for the OTHER factor to be zero: $$7600 - 400e^{0.2T} = 0 \\Rightarrow e^{0.2T} = \\dfrac{7600}{400} = 19$$.\n+ Critical check: never \"solve\" an exponential by setting it to zero. $$e^x$$ is never zero. The \"always positive\" property of $$e^x$$ is your friend here — it tells you which factor must carry the zero.", "source": "MiniMax M3 ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "To solve $$e^{0.2T} = 19$$, you take the natural log of both sides. Why $$\\ln$$ (base $$e$$) and not $$\\log_{10}$$? (2 steps)", "answer": "- Step 1: $$\\ln$$ is the natural log, with base $$e$$. The defining property of $$\\ln$$ is that $$\\ln(e^x) = x$$ — i.e., $$\\ln$$ and the exponential $$e^{(\\cdot)}$$ are inverses. So $$\\ln(e^{0.2T}) = 0.2T$$, which immediately gives you $$T = \\ln(19)/0.2$$.\n- Step 2: $$\\log_{10}$$ has base 10. $$\\log_{10}(e^{0.2T}) = 0.2T \\cdot \\log_{10}(e) = 0.2T \\cdot (1/\\ln 10)$$, which is messier and would force a conversion through the change-of-base formula. Always use $$\\ln$$ when dealing with $$e^{(\\cdots)}$$.\n+ Phuc's trap: writing $$\\log$$ instead of $$\\ln$$. The base matters. If the exponential is base $$e$$, the log must be base $$e$$ (= $$\\ln$$). If the exponential is base 10, the log must be base 10. **Match the bases.**", "source": "MiniMax M3 ①", "_id": "minimax_1_33", "judge_pick": true}, {"question": "The \"show that\" in Q5(c) asks to show $$e^{0.2T} = 19$$. What should you do after reaching this line? (1 step)", "answer": "**STOP.** A \"show that\" command means prove the given statement is true. The target is $$e^{0.2T} = 19$$ — once you reach this, you're done. Do NOT solve for $$T$$ in this part; that's a separate question for part (d).\n+ The discipline: \"show that\" defines the **end** of the working, not a stepping stone. If the question then has a part (d) asking for $$T$$, that's where you continue. Phuc tried to push on to $$T$$ in part (c), which wasted time and was off-task. Read the command word carefully.", "source": "MiniMax M3 ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "In Q5(d), after solving $$0.2T = \\ln 19$$ to get $$T = \\ln 19 / 0.2$$, you need to substitute $$T$$ back into $$N$$. Why does Harry insist on using the **stored** (unrounded) value of $$T$$? (2 steps)", "answer": "- Step 1: If you round $$T$$ to (say) $$14.72$$ and substitute $$14.72$$ into $$N$$, the rounding error in $$T$$ gets EXPONENTIATED ($$e^{0.1T}$$) and added to a denominator involving $$e^{0.2T}$$. Small input errors become large output errors.\n- Step 2: Using the stored $$T = \\ln 19 / 0.2$$ (or pressing **Ans** on the calculator) gives the exact propagated value. Harry's rule: \"We only round at the very final answer, use the stored value.\"\n+ Concrete reason: the question asks for the maximum \"to the nearest whole number\". The rounding happens at the FINAL answer ($$N = 458.83\\ldots \\to 459$$). Round $$T$$? Maybe not at all. Round $$N$$? At the very last step.", "source": "MiniMax M3 ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "To evaluate $$N$$ at the maximum, Harry used a clever substitution: $$e^{0.1T} = (e^{0.2T})^{1/2} = \\sqrt{19}$$. Why is this valid, and what does it buy you? (2 steps)", "answer": "- Step 1: Validity: $$e^{0.1T} = e^{0.1T \\cdot 1}$$ and $$(e^{0.2T})^{1/2} = e^{0.2T/2} = e^{0.1T}$$. They are the same number, just written with different exponents. The substitution is a consequence of the index law $$(e^a)^{1/2} = e^{a/2}$$.\n- Step 2: What it buys you: at the maximum, you've shown $$e^{0.2T} = 19$$, so $$e^{0.1T} = \\sqrt{19}$$. Plugging in: $$N = \\dfrac{4000\\sqrt{19}}{19 + 19} = \\dfrac{4000\\sqrt{19}}{38}$$. This avoids ever computing $$T$$ numerically — the maximum is given in closed form using the relation $$e^{0.2T} = 19$$.\n+ This is the **algebraic-substitution trick**: when you have a constraint like $$e^{0.2T} = 19$$, USE it to eliminate $$T$$ from the expression, rather than solving for $$T$$ and plugging back. Cleaner, less error-prone, and shows fluency.", "source": "MiniMax M3 ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "What are the key P3 command words, and what's the expected response to each? (1 step)", "answer": "- **\"Show that\"** — Prove the given statement. **Stop at the shown line.**\n- **\"Find\" / \"Calculate\"** — Compute the value; show working.\n- **\"Hence\" / \"Hence, or otherwise\"** — Use the previous result. Don't restart from scratch.\n- **\"Exact value\"** — No decimals. Use surds, fractions, $$\\pi$$, etc. Square-and-add, divide.\n- **\"To 3 s.f.\" / \"Nearest integer\"** — Apply standard rounding at the FINAL answer.\n+ The discipline: read the command word, then read it again. The verb dictates the form of the response. \"Show that\" is not \"find\" — they have different expectations.", "source": "MiniMax M3 ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "What's Harry's \"round only at the very final answer\" rule, and what's the failure mode if you violate it? (2 steps)", "answer": "- Step 1: Carry exact or full-precision values throughout the working. Use **Ans** or stored calculator values for substitution. Only round when the question explicitly asks for a rounded answer (e.g., \"to 3 s.f.\" or \"to the nearest whole number\").\n- Step 2: Failure mode: rounding intermediate values compounds the error. If you round three times with errors of $$0.001$$ each, your final answer could be off by $$0.003$$. For exponentials, the errors can **amplify** — $$e^x$$ is steep, so a small error in $$x$$ becomes a large error in $$e^x$$. After several such roundings, your final answer could be off by 1 or more — enough to lose a mark.\n+ Sanity check: at the end, redo the calculation with the unrounded values to confirm the rounded answer is still consistent. If not, the rounding step is the culprit.", "source": "MiniMax M3 ①", "_id": "minimax_1_38", "judge_pick": true}, {"question": "Harry flagged \"calculator in radians mode\" as a recurring trap. Why does this matter for P3, and how do you set it up correctly? (2 steps)", "answer": "- Step 1: P3 uses **radian** measure for all angles. The compound-angle formulas, the small-angle approximations, the derivative $$\\frac{d}{dx}(\\sin x) = \\cos x$$ (which is cos $$x$$ ONLY in radians) — all require radian measure. If your calculator is in degree mode, the numerical values of trig functions and inverse trig functions will be wrong.\n- Step 2: Setup: most calculators have a **MODE** or **DRG** button. Select \"**R**\" or \"**RAD**\" before any P3 calculation. The R-form $$\\alpha$$ you compute (e.g., $$\\pi/3$$) is in radians — make sure your display matches.\n+ Diagnostic: if your inverse trig gives an answer in degrees (like 60 instead of $$\\pi/3$$), you're in the wrong mode. The numerical value of $$\\tan^{-1}(\\sqrt{3})$$ in degrees is 60; in radians it's $$\\pi/3 \\approx 1.047$$. The clean $$\\pi/3$$ is the giveaway that radians are active.", "source": "MiniMax M3 ①", "_id": "minimax_1_39", "judge_pick": false}, {"question": "Phuc's main gap is \"formula recall\" — he can do the algebra but forgets the sphere SA is $$4\\pi R^2$$ (not $$4\\pi R$$) and the $$a^{kx}$$ derivative. What's the strategic approach to fix this? (2 steps)", "answer": "- Step 1: Use **spaced repetition** with flashcards. Make one card per formula, with the formula name on one side and the formula (with units/context) on the other. Review daily, with the hard ones coming up more often. Harry's exact words: \"Learning formulae is something your flashcards could really help with.\"\n- Step 2: Build fluency through **volume**. Do 8–10 past papers. The repetition of seeing the formula in context — and the muscle memory of writing it correctly — is what makes it \"second nature.\" A formula you've used 50 times in practice doesn't need conscious recall in the exam.\n+ The two-pronged attack: deliberate memorisation (flashcards) + mass practice (papers). Memorisation alone gives brittle recall; practice alone is slow. Together, they build robust, automatic fluency.", "source": "MiniMax M3 ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "Q2(b) was a rearrangement problem with many algebraic steps. What's the general STRATEGY for such problems, beyond just \"do the algebra\"? (3 steps)", "answer": "- Step 1: **Look at the target form first.** The target tells you which operations to use. If the target has $$\\sqrt{\\,\\,}$$, you'll square; if it has a cube root, you'll cube-root; if it has a log, you'll exponentiate. The target is your North Star.\n- Step 2: Identify the structure that needs to be PRODUCED in the LHS. In Q2(b), the target had $$(2x + 3)$$ in the denominator, so the LHS needed to have $$(2x + 3)$$ as a factor at the right moment. Working backwards from the target, you can see what you need to construct.\n- Step 3: Plan a sequence of moves that progresses TOWARD the target — clearing denominators, grouping terms, factoring. Don't multiply out blindly; multiply out in a way that exposes the factor you need.\n+ The discipline: at every step, ask \"Am I closer to the target or further?\" If a move doesn't progress you toward the target, undo it and try a different approach.", "source": "MiniMax M3 ①", "_id": "minimax_1_41", "judge_pick": false}, {"question": "In Q3, the model is $$V = 100 \\cdot (10^{0.05})^t$$. In Q5, the model is $$N = \\dfrac{4000e^{0.1t}}{19 + e^{0.2t}}$$. Both are exponential. What's the contrast in how the derivative is computed? (2 steps)", "answer": "- Step 1: For Q3, $$V = a \\cdot b^t$$ is a **single exponential**, so $$\\dfrac{dV}{dt} = a \\cdot b^t \\cdot \\ln(b)$$ — a one-step job using the $$a^{kx}$$ rule. The key formula: $$\\dfrac{d}{dx}(a^{kx}) = a^{kx} \\cdot k \\cdot \\ln(a)$$.\n- Step 2: For Q5, $$N$$ is a **quotient** of exponentials (a rational function of exponentials), so $$\\dfrac{dN}{dt}$$ requires the **quotient rule**. The numerator $$u = 4000e^{0.1t}$$ and denominator $$v = 19 + e^{0.2t}$$ each have their own derivatives, and the rule $$\\dfrac{dN}{dt} = \\dfrac{v u' - u v'}{v^2}$$ applies.\n+ The diagnosis: identify the FORM of the function. If it's a single exponential, use the $$a^{kx}$$ rule. If it's a quotient of exponentials, use the quotient rule. If it's a sum/product, use the sum/product rule. **The structure dictates the tool.**", "source": "MiniMax M3 ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "\"Read the command word\" is generic advice, but applied to \"show that $$e^{0.2T} = 19$$\" specifically, what does it mean for the structure of your answer? (2 steps)", "answer": "- Step 1: Your answer is a CHAIN of equalities that **ends at** $$e^{0.2T} = 19$$. Every line must be a legitimate step, and the last line must match the target. The marker is checking whether you can DERIVE the given statement, not just reach it.\n- Step 2: You may use the answer in REVERSE — i.e., you can start from the derivative = 0 condition and work forward to $$e^{0.2T} = 19$$, OR you can start from $$e^{0.2T} = 19$$ and verify it satisfies the derivative = 0 condition. Either is valid, but the forward direction is more natural here.\n+ The structural discipline: the FINAL line is fixed by the \"show that\" command. Every preceding line is a step toward that line. If your last line isn't exactly the target, you've missed the point.", "source": "MiniMax M3 ①", "_id": "minimax_1_43", "judge_pick": true}, {"question": "A \"max\" question like Q5 has four sub-parts: starting value, derivative, \"show that\" for the critical point, and the maximum value. What's the conceptual chain that connects them? (2 steps)", "answer": "- Step 1: (a) gives the starting condition ($$t = 0$$). (b) gives the rate of change ($$\\frac{dN}{dt}$$). (c) sets $$\\frac{dN}{dt} = 0$$ to find the critical point — and a \"show that\" tells you to PROVE the critical point's defining equation. (d) uses the critical point to evaluate $$N$$ at the maximum.\n- Step 2: The chain is: **model → derivative → set derivative to zero → solve for the critical point → substitute back to get the value**. Each part is one step in this chain. Skipping a step or doing them out of order is the structural failure mode.\n+ The big picture: a \"max\" problem is a four-part machine. Each part feeds into the next. The model is given; you find the rate (derivative); you find where the rate is zero; you evaluate the function at that point. Memorise this scaffold and apply it to every max problem.", "source": "MiniMax M3 ①", "_id": "minimax_1_44", "judge_pick": true}, {"question": "In Q4(b), the function $$g(x)$$ has $$f(3x)$$ in the denominator, where $$f(x)$$ was given in part (a). What's the trick of recognising $$f(3x)$$ as \"the same function with $$x$$ replaced by $$3x$$\", and how does it simplify the work? (2 steps)", "answer": "- Step 1: Recognition: $$f(x) = 2\\sqrt{3}\\sin(2x - \\pi/3)$$, so $$f(3x)$$ means \"every $$x$$ in $$f$$ becomes a $$3x$$\". The $$2x$$ in the sin argument becomes $$2(3x) = 6x$$. So $$f(3x) = 2\\sqrt{3}\\sin(6x - \\pi/3)$$ — the same $$R$$ and $$\\alpha$$, but the inner angle is now $$6x$$.\n- Step 2: This avoids re-deriving $$R$$ and $$\\alpha$$ for $$f(3x)$$. The R-form is preserved under scaling the inner variable, so you can just write down the substitution directly. The minimum of $$g$$ follows from the maximum of $$f(3x) + 4\\sqrt{3}$$.\n+ The lesson: when a function is defined in one part and used in a later part, recognise that the same transformations apply with a substituted variable. The **structure** ($$R$$, $$\\alpha$$) doesn't change; only the inner argument's variable does.", "source": "MiniMax M3 ①", "_id": "minimax_1_45", "judge_pick": false}, {"question": "Phuc read \"$$\\log_{10} V$$ against $$t$$\" and tried to use $$V$$ as the vertical variable. What's the rule for reading axis labels? (2 steps)", "answer": "- Step 1: Rule: \"$$Y$$ against $$X$$\" means $$Y$$ is plotted on the vertical axis and $$X$$ on the horizontal. If $$Y$$ is given as a function of a variable (like $$\\log_{10} V$$), the LABEL of the axis is the function, not the bare variable.\n- Step 2: For \"$$\\log_{10} V$$ against $$t$$\", the y-axis is $$\\log_{10} V$$ (a number like 2 or 2.25) and the x-axis is $$t$$ (a number like 0 or 5). The points are $$(t, \\log_{10} V)$$, not $$(t, V)$$.\n+ Harry's correction: \"It's not $$V$$. Be careful.\" The axis label is the LITERAL quantity on the axis, including any functions applied. Mis-reading this throws off the entire linearisation.", "source": "MiniMax M3 ①", "_id": "minimax_1_46", "judge_pick": false}, {"question": "Phuc wrote $$\\dfrac{d}{dx}(36^x) = 36^x \\cdot \\ln(6x)$$. What's wrong with this, and what should it be? (2 steps)", "answer": "- Step 1: Error: $$\\ln(6x)$$ confuses the inner function (which would apply if we were differentiating $$\\ln$$ of something) with the log of the base. The base is 3 (not 6), and the multiplier on $$x$$ is 6 (a coefficient in the exponent, not a log argument).\n- Step 2: Correct: $$\\dfrac{d}{dx}(3^{6x}) = 3^{6x} \\cdot 6 \\cdot \\ln(3)$$. The factor is $$k \\cdot \\ln(a) = 6 \\cdot \\ln(3)$$, not $$\\ln(kx) = \\ln(6x)$$.\n+ The structure: $$3^{6x}$$ means \"base 3, exponent $$6x$$\". Differentiate using $$\\frac{d}{dx}(a^{kx}) = a^{kx} \\cdot k \\cdot \\ln(a)$$. The $$k$$ is the coefficient of $$x$$ in the exponent, the $$a$$ is the base. **Neither one is \"the inside of a log\".**", "source": "MiniMax M3 ①", "_id": "minimax_1_47", "judge_pick": false}, {"question": "Phuc offered $$\\pi r^2 h$$ as the surface area of a cylinder. What's the right answer, and why is the volume/surface area confusion common? (2 steps)", "answer": "- Step 1: Right answer: surface area $$= 2\\pi r^2 + 2\\pi rh$$ (two ends + curved side). Volume $$= \\pi r^2 h$$ (base area × height). The formulas look similar (both have $$\\pi r^2$$ and $$h$$), but they measure different things.\n- Step 2: The confusion: when a question says \"surface area of a cylinder\", students default to \"$$\\pi r^2 h$$\" because it has all three variables and is the most \"complete-looking\" formula. But the dimensions don't match: surface area has units of length², while $$\\pi r^2 h$$ has units of length³.\n+ **Dimensional check**: $$r$$ and $$h$$ are lengths, so $$\\pi r^2 h$$ is length³ (volume). Surface area is length². If your formula has the wrong dimensions, it's the wrong formula. Use units as a sanity check.", "source": "MiniMax M3 ①", "_id": "minimax_1_48", "judge_pick": false}, {"question": "Phuc wrote the cylinder's curved side as \"the diameter\" before being corrected to \"the circumference\". What's the geometric reasoning behind $$2\\pi r$$ (not $$2r$$) for the rectangle's length? (2 steps)", "answer": "- Step 1: When you unroll a cylinder's curved surface, the result is a rectangle. One dimension is the height $$h$$ (preserved from the cylinder). The other dimension is the distance \"around\" the original circular cross-section.\n- Step 2: \"Around the circle\" is the **circumference**, which is $$2\\pi r$$. The **diameter** ($$2r$$) is the distance **across** the circle, not around it. So the rectangle's other side is $$2\\pi r$$, and the curved area is $$2\\pi r \\cdot h = 2\\pi rh$$.\n+ Visual: imagine cutting a Pringles tube vertically and laying it flat. The width of the resulting rectangle is exactly the circumference of the original tube. Diameter would be too short by a factor of $$\\pi$$.", "source": "MiniMax M3 ①", "_id": "minimax_1_49", "judge_pick": true}, {"question": "Q2(c) was deferred in the lesson — \"we'll leave that one\". What's the structure of an iteration problem, and what's the standard procedure? (3 steps)", "answer": "- Step 1: Recognise the iteration form: $$x_{n+1} = g(x_n)$$ for some function $$g$$. In Q2(c), $$x_{n+1} = \\sqrt[3]{\\dfrac{e^{x_n} + 4x_n^2}{2x_n + 3}}$$. You're given $$x_1 = 1$$.\n- Step 2: Compute $$x_2 = g(x_1)$$, $$x_3 = g(x_2)$$, and so on. For Q2(c), the question asks for $$x_3$$ and $$\\alpha$$ to 4 d.p. (where $$\\alpha$$ is the root, i.e., the limit of the iteration).\n- Step 3: Use the calculator in radians, with the iteration function. Do **NOT** round intermediate $$x_n$$ values — carry full precision. The final $$\\alpha$$ is the value the iteration converges to.\n+ Discipline: this is mechanical once you have the form. The risk is rounding intermediate $$x_n$$ values, which slows convergence or shifts the limit. Use stored values throughout.", "source": "MiniMax M3 ①", "_id": "minimax_1_50", "judge_pick": false}, {"question": "When asked for \"smallest $$x$$\" in a trig equation like $$\\sin(6x - \\pi/3) = 1$$, what's the systematic procedure? (2 steps)", "answer": "- Step 1: Write the **general solution**: $$6x - \\pi/3 = \\pi/2 + 2n\\pi$$ for integer $$n$$. Solve for $$x$$: $$x = \\dfrac{\\pi/2 + \\pi/3 + 2n\\pi}{6} = \\dfrac{5\\pi/6 + 2n\\pi}{6} = \\dfrac{5\\pi}{36} + \\dfrac{n\\pi}{3}$$.\n- Step 2: The smallest positive $$x$$ is at $$n = 0$$: $$x = 5\\pi/36$$. Check the next one ($$n = 1$$): $$x = 5\\pi/36 + \\pi/3 = 5\\pi/36 + 12\\pi/36 = 17\\pi/36$$. If the question asks for smallest positive, the answer is $$5\\pi/36$$.\n+ Sanity check: is the principal solution positive? $$5\\pi/36 \\approx 0.436 > 0$$, so yes. If the question restricts to $$(0, \\pi/2)$$ or similar, check that the principal solution lies in the range.", "source": "MiniMax M3 ①", "_id": "minimax_1_51", "judge_pick": true}, {"question": "Why is it sometimes easier to find a max/min by inspection of the structure, rather than by formal differentiation? (2 steps)", "answer": "- Step 1: For functions of the form $$\\dfrac{a}{b + c \\cdot \\sin(kx + d)}$$ with $$a, b, c > 0$$, the maximum of the denominator is $$b + c$$ (when $$\\sin = 1$$), so the minimum of the function is $$\\dfrac{a}{b + c}$$. No calculus required.\n- Step 2: This \"structural\" approach is faster and more robust than differentiating, then setting the derivative to zero, then solving. The structure of the function tells you the answer directly.\n+ The lesson: before reaching for calculus, ask whether the function has a **transparent structure** that lets you read off the extremum. R-form + sin between $$-1$$ and 1 = ratio extremes at $$\\sin = \\pm 1$$.", "source": "MiniMax M3 ①", "_id": "minimax_1_52", "judge_pick": true}, {"question": "In a \"find the max\" problem, the natural sequence of operations is: (1) find $$\\frac{dN}{dt}$$, (2) set $$\\frac{dN}{dt} = 0$$, (3) solve for the critical point, (4) substitute back. What's the role of each step, and what can go wrong? (2 steps)", "answer": "- Step 1: (1) $$\\frac{dN}{dt}$$ gives the rate of change. (2) $$\\frac{dN}{dt} = 0$$ is the condition for an extremum (max or min). (3) Solving for $$T$$ (or whichever variable) gives the time of the extremum. (4) Substituting back gives the value of $$N$$ at that time.\n- Step 2: What can go wrong: forgetting the minus sign in the quotient rule, losing the \"1\" in $$e^0$$, using $$\\log_{10}$$ instead of $$\\ln$$, rounding $$T$$ before substituting, or (most commonly) confusing \"max\" with \"value of the rate\" — the **max VALUE of $$N$$**, not the max rate.\n+ Diagnostic: when you read \"maximum\", make sure your answer is the **maximum value of the function**, not the maximum rate. These are different things in non-linear models.", "source": "MiniMax M3 ①", "_id": "minimax_1_53", "judge_pick": false}, {"question": "What's the strategic importance of the formula booklet in P3, and which formulas should you still memorise? (2 steps)", "answer": "- Step 1: P3 provides a formula booklet with the quotient rule, product rule, R-form, and standard derivatives. You don't need to memorise THESE — just know WHERE they are and how to APPLY them.\n- Step 2: But the booklet does NOT contain: the specific shapes $$4\\pi R^2$$ and $$2\\pi r^2 + 2\\pi rh$$ (ESAT-style geometry), the $$\\frac{d}{dx}(a^{kx}) = a^{kx} \\cdot k \\cdot \\ln(a)$$ in a memorable form, and the algebraic tricks (like $$e^{0.1T} = \\sqrt{e^{0.2T}}$$) that the booklet's formulas don't capture.\n+ Strategic rule: the booklet is a **reference**, not a **substitute** for knowledge. Use it to confirm a formula or its sign, but the structural strategies (when to apply, what form to produce) must be in your head.", "source": "MiniMax M3 ①", "_id": "minimax_1_54", "judge_pick": false}, {"question": "Q4(a) requires $$R$$ and $$\\alpha$$ to be EXACT, not approximate. What's the general philosophy for \"exact value\" questions, and what tools are available? (2 steps)", "answer": "- Step 1: Exact means: in surd form, or in terms of $$\\pi$$, or as a fraction. The opposite of \"exact\" is \"decimal\" or \"rounded\". An \"exact value\" question has no tolerance for approximations — every step of your working must preserve exactness.\n- Step 2: Tools: **square-and-add** for $$R$$ (gives $$R^2 = a^2 + b^2$$, which is exact); **divide** for $$\\tan\\alpha$$ (gives a ratio that's exact); the **compound-angle formula** (preserves trigonometric exactness). Avoid: decimal substitutions, calculator approximations, \"rounding to nearest\" in the working.\n+ The discipline: if a question says \"exact\", the EXACT form is the target. The marker will compare your answer to a specific exact form (e.g., $$2\\sqrt{3}$$, $$\\pi/3$$) and accept nothing else.", "source": "MiniMax M3 ①", "_id": "minimax_1_55", "judge_pick": false}, {"question": "The \"show that\" structure of Q2(b) and Q5(c) is a recurring exam pattern. What's the meta-skill for handling it? (2 steps)", "answer": "- Step 1: A \"show that\" is a PROOF that the given statement follows from the working. The target line is FIXED; the question is whether you can DERIVE it. The marker watches every step to see if each transformation is legitimate.\n- Step 2: The skill is **backwards engineering**: read the target, identify what the LHS of the target would have to be in the previous step, and work out the inverse operation. E.g., if the target is $$x = \\sqrt[3]{\\text{stuff}}$$, the previous step must have been $$x^3 = \\text{stuff}$$, and the step before must have produced $$x^3$$ on the LHS.\n+ This is a fundamentally different mode from \"find\" — you're not optimising, you're CONSTRUCTING. The structure of your argument is what matters, not just the destination.", "source": "MiniMax M3 ①", "_id": "minimax_1_56", "judge_pick": true}, {"question": "When the question says \"show your working\" or \"show all stages of working\" (as in Q5), what's the implied standard? (2 steps)", "answer": "- Step 1: Every transformation must be on paper, with a clear equals sign or arrow. No \"magic\" steps where you skip from one form to another without showing the algebra.\n- Step 2: The marker should be able to follow your reasoning without filling in gaps. If a step involves a non-obvious manipulation (like factoring $$x^3(2x+3)$$ from $$2x^4 + 3x^3 - 4x^2$$), write it out explicitly. The implied standard: a competent peer should be able to read your work and verify each step.\n+ The trap: students often skip \"obvious\" steps that aren't actually obvious. If in doubt, write it out. The mark scheme may have 1–2 marks per explicit step; skipping a step loses those marks.", "source": "MiniMax M3 ①", "_id": "minimax_1_57", "judge_pick": false}, {"question": "In the Q2(b) rearrangement, the spoken transcript has Harry confirming \"we're there\" but the video ledger calls it \"partial\". This is an evidence conflict in the lesson guide. What does this tell you about how to study from transcripts vs. videos? (2 steps)", "answer": "- Step 1: Transcripts capture the **spoken** word, which includes confirmations and asides. Videos capture the **written** work, which shows what was actually written. The two can diverge — Harry may say \"we're there\" while the working on the board is still partial.\n- Step 2: For study purposes, BOTH sources should be checked. The transcript tells you what the tutor CONCLUDED, and the video tells you what was DEMONSTRATED. If they conflict, the demonstrated work is the more reliable indicator of what was actually achieved.\n+ This is a general lesson: in any educational source, the **written record** (notes, working, board) is more authoritative than the spoken word for \"what was done\". Spoken word is more authoritative for \"what was understood\".", "source": "MiniMax M3 ①", "_id": "minimax_1_58", "judge_pick": false}, {"question": "Harry's end-of-session advice was \"find out the October exam-entry deadlines\". Why is exam-entry awareness part of the strategic picture? (2 steps)", "answer": "- Step 1: Deadlines determine which modules you can ENTER for the October sitting. If a deadline passes, you can't sit that module until the next available exam window — a 6-month delay. For students aiming for A* across multiple modules, missing one deadline can derail the timeline.\n- Step 2: Harry's framing: \"I need to know the deadlines so we can build a sensible plan.\" The plan depends on the available exam windows. Entering too many modules risks low grades; entering too few delays the A*; missing a deadline is the worst of both.\n+ The strategic view: exam entry is a **commitment**. Each module entered is a promise of readiness. The deadline is the cutoff for that commitment. Plan around the deadline, not after it.", "source": "MiniMax M3 ①", "_id": "minimax_1_59", "judge_pick": false}, {"question": "What's the difference between a \"sign change\" proof (for IVT) and a \"show that\" proof (for rearrangement)? (2 steps)", "answer": "- Step 1: A sign change proof shows a root EXISTS by establishing that a continuous function changes sign over an interval. The conclusion is \"there exists $$\\alpha$$ such that $$f(\\alpha) = 0$$\". You don't compute the root.\n- Step 2: A \"show that\" proof establishes an **equivalence** — that $$f(x) = 0 \\Leftrightarrow x = \\text{some form}$$. This is stronger than existence; it gives you a way to **compute** the root via iteration. The conclusion is a different FORM of the same equation.\n+ The two have different end goals: existence (IVT) vs. computational form (show that). The IVT is a single application; the show-that is a chain of algebraic equivalences.", "source": "MiniMax M3 ①", "_id": "minimax_1_60", "judge_pick": true}, {"question": "In an iteration $$x_{n+1} = g(x_n)$$, why does the iteration converge (when it does) to a root of $$x = g(x)$$, which corresponds to $$f(x) = 0$$? (2 steps)", "answer": "- Step 1: If the iteration converges to a limit $$L$$, then $$L = \\lim x_{n+1} = \\lim g(x_n) = g(\\lim x_n) = g(L)$$ (assuming continuity of $$g$$). So $$L$$ satisfies $$L = g(L)$$.\n- Step 2: The original problem is $$f(x) = 0$$. The rearrangement shows $$f(x) = 0 \\Leftrightarrow x = g(x)$$. So $$L = g(L) \\Leftrightarrow f(L) = 0$$, i.e., $$L$$ is a root of $$f$$.\n+ This is the WHY of iteration methods: they \"search\" for the **fixed point** of $$g$$, which is also a root of $$f$$. Convergence is a separate question (depends on $$|g'(L)| < 1$$), but the limit, if it exists, is a root.", "source": "MiniMax M3 ①", "_id": "minimax_1_61", "judge_pick": true}, {"question": "What's the general procedure for setting up an iteration from $$f(x) = 0$$? (2 steps)", "answer": "- Step 1: Rearrange $$f(x) = 0$$ to $$x = g(x)$$ for some function $$g$$. The rearrangement should be \"stable\" — i.e., $$g$$ should be a contraction near the root ($$|g'(\\text{root})| < 1$$) for fast convergence.\n- Step 2: Define the iteration $$x_{n+1} = g(x_n)$$, choose a starting value $$x_1$$, and iterate. The iteration converges to the root if conditions are met.\n+ Pitfall: the choice of $$g$$ matters. A \"natural\" rearrangement may converge slowly or not at all. Choosing a good $$g$$ is sometimes an art; in P3, the question usually TELLS you the iteration to use.", "source": "MiniMax M3 ①", "_id": "minimax_1_62", "judge_pick": false}, {"question": "What's the deep reason that \"rate\" in calculus always means derivative, and why is \"increase\" vs. \"decrease\" the sign of the derivative? (2 steps)", "answer": "- Step 1: Rate of change of a quantity $$Q$$ with respect to time $$t$$ is, by definition, $$\\dfrac{dQ}{dt}$$ — how $$Q$$ changes per unit change in $$t$$. This is the derivative, regardless of context (population, temperature, share price, etc.).\n- Step 2: \"Increase\" means $$Q$$ is going UP, so $$\\dfrac{dQ}{dt} > 0$$ (positive). \"Decrease\" means $$Q$$ is going DOWN, so $$\\dfrac{dQ}{dt} < 0$$ (negative). The sign of the rate is the **sign** of the derivative, not a magnitude.\n+ Diagnostic: any time a problem says \"rate of [increase/decrease]\", substitute $$\\frac{dQ}{dt}$$ and set it equal to the given number with the appropriate sign. The \"increase\" or \"decrease\" is your sign indicator.", "source": "MiniMax M3 ①", "_id": "minimax_1_63", "judge_pick": true}, {"question": "In Q3(c), Phuc's wrong instinct was \"arithmetic series\". What's the conceptual gap that leads to this error, and how do you bridge it? (2 steps)", "answer": "- Step 1: An arithmetic series has **linear** growth — the change per step is constant, and the function is $$V = a + bt$$ (linear in $$t$$). An exponential series has the form $$V = ab^t$$ (exponential in $$t$$). These look similar at small $$t$$ but diverge dramatically.\n- Step 2: The conceptual gap: confusing the **sequence** of values ($$V(0), V(1), V(2), \\ldots$$) with the **function** $$V(t)$$. A sequence of values can be linear (arithmetic) or exponential (geometric). The question \"what is $$V(t)$$?\" is asking for the function, not just the sequence.\n+ Diagnostic: when a question gives a model $$V = ab^t$$ or $$V = ce^{kt}$$, the function is exponential, and any \"rate\" question requires differentiating exponentials — $$\\frac{d}{dt}(ab^t) = ab^t \\cdot \\ln(b)$$ or $$\\frac{d}{dt}(ce^{kt}) = cke^{kt}$$.", "source": "MiniMax M3 ①", "_id": "minimax_1_64", "judge_pick": true}, {"question": "Why is \"round only at the very final answer\" so important in **chained** calculations? (2 steps)", "answer": "- Step 1: Every rounding step introduces an error of up to half the last significant figure. In a chain of calculations, errors **compound** — they don't cancel. If you round three times with errors of $$0.001$$ each, your final answer could be off by $$0.003$$.\n- Step 2: For exponential or iterative calculations, the errors can **amplify**. $$e^x$$ is steep: a small error in $$x$$ becomes a large error in $$e^x$$. For Q3 and Q5, rounding $$T$$ before substituting into $$e^{0.1T}$$ propagates a much larger error into $$V$$ or $$N$$.\n+ The rule: store full precision, use **Ans** or stored values, and only round at the final answer. This is the standard of professional numerical work and is what the exam rewards.", "source": "MiniMax M3 ①", "_id": "minimax_1_65", "judge_pick": true}, {"question": "When the question says \"give $$b$$ to 3 s.f.\" and then a later part uses $$b$$, what's the rule for which $$b$$ to use? (2 steps)", "answer": "- Step 1: The 3 s.f. instruction applies to the **DISPLAY** in that part. It tells you how to WRITE $$b$$ in your answer to that part. It does NOT instruct you to use the rounded value in subsequent parts.\n- Step 2: In subsequent parts, use the calculator's **STORED** value of $$b$$ (the exact $$10^{0.05}$$), not the rounded $$1.12$$. The display rule was for the part it belonged to; the calculation rule is exactness.\n+ This is the difference between \"how to write\" and \"what to use\". The 3 s.f. is \"how to write\" in the answer box. The \"what to use\" is always the most exact value available.", "source": "MiniMax M3 ①", "_id": "minimax_1_66", "judge_pick": false}, {"question": "The lesson guide flags several \"evidence conflicts\" (Q2(b) status, Q4(a) coefficients, Q5 model, \"459 vs 959\" maximum). What should a student DO when a study source has flagged internal conflicts? (2 steps)", "answer": "- Step 1: Recognise that the lesson guide is honest about its own evidence base. The conflicts reflect discrepancies between the transcript, the video ledger, and the official paper. The guide flags them so the student can decide which source to trust.\n- Step 2: The decision rule: trust the **official paper** for question content (since that's what you'll be examined on), trust the **transcript** for tutor understanding, and use the **video ledger** as supplementary evidence. The flags tell you where extra care is needed.\n+ Pedagogical lesson: any study source may have errors. Cross-reference critical content (formulas, question wording, model specifications) with the authoritative source. The flags are invitations to verify, not signs of unreliability.", "source": "MiniMax M3 ①", "_id": "minimax_1_67", "judge_pick": false}, {"question": "In Q4(b)(i), the minimum of $$g$$ was found by maximising the denominator. But the function $$\\sin$$ is bounded between $$-1$$ and 1 — what's the maximum of $$\\sqrt{3}\\sin(6x - \\pi/3) + 4\\sqrt{3}$$? (2 steps)", "answer": "- Step 1: The expression is $$\\sqrt{3}\\sin(6x - \\pi/3) + 4\\sqrt{3} = \\sqrt{3}\\cdot[\\sin(6x - \\pi/3) + 4]$$. The maximum of $$\\sin$$ is 1, so the maximum of the bracket is $$1 + 4 = 5$$, and the maximum of the expression is $$\\sqrt{3} \\cdot 5 = 5\\sqrt{3}$$.\n- Step 2: So the maximum denominator is $$5\\sqrt{3}$$, and the minimum of $$g = \\dfrac{18}{5\\sqrt{3}}$$. Rationalising: $$\\dfrac{18}{5\\sqrt{3}} \\cdot \\dfrac{\\sqrt{3}}{\\sqrt{3}} = \\dfrac{18\\sqrt{3}}{15} = \\dfrac{6\\sqrt{3}}{5}$$.\n+ The bound $$\\sin \\leq 1$$ is the key. When you have $$a + b\\sin(\\theta)$$ with $$a, b > 0$$, the max is $$a + b$$ (when $$\\sin = 1$$) and the min is $$a - b$$ (when $$\\sin = -1$$). The constant is your \"$$a$$\" and the coefficient of $$\\sin$$ is your \"$$b$$\".", "source": "MiniMax M3 ①", "_id": "minimax_1_68", "judge_pick": false}, {"question": "Why does Phuc's mistake of \"$$\\pi r$$\" (without the square) happen, and what's the conceptual fix? (2 steps)", "answer": "- Step 1: The mistake comes from confusing **AREA** with **PERIMETER**. The perimeter of a circle (circumference) is $$2\\pi r$$, which has $$r$$ to the first power. The AREA is $$\\pi r^2$$, with $$r$$ to the second power. Mixing these up is a dimension error.\n- Step 2: The fix: every AREA formula scales as $$r^2$$ (length squared), and every LENGTH formula (perimeter, circumference) scales as $$r$$. Memorise this rule: $$\\pi r^2$$ for area, $$2\\pi r$$ for circumference. The exponent on $$r$$ is the dimension indicator.\n+ Quick test: does the formula give units of length² (area) or length (perimeter)? $$\\pi r^2 \\to \\text{length}^2 \\to \\text{area}$$. $$2\\pi r \\to \\text{length} \\to \\text{perimeter}$$. $$\\pi r \\to \\text{length} \\to$$ **neither** (it's wrong).", "source": "MiniMax M3 ①", "_id": "minimax_1_69", "judge_pick": false}, {"question": "For the quotient rule $$\\dfrac{vu' - uv'}{v^2}$$, what does the $$v^2$$ in the denominator represent geometrically or algebraically? (2 steps)", "answer": "- Step 1: Algebraically, $$v^2$$ comes from common-denominator work: if you have a fraction of fractions, you need a common denominator of $$v \\cdot v = v^2$$. Alternatively, from the product rule applied to $$u \\cdot v^{-1}$$: the derivative of $$v^{-1}$$ is $$-v^{-2} \\cdot v'$$, and combining $$u' \\cdot v^{-1}$$ with $$u \\cdot (-v^{-2} \\cdot v')$$ requires a common denominator of $$v^2$$.\n- Step 2: Geometrically, the $$v^2$$ captures the \"scaling\" of the rate. If $$v$$ is large, $$\\frac{d(u/v)}{dt}$$ is small in magnitude (the denominator \"swamps\" the changes). The $$v^2$$ is the squared denominator's contribution to this scaling.\n+ The
