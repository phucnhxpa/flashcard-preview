<script>
const DATA={"selected": [{"question": "Q2(a) IVT — When asked to show that $$f(x) = 0$$ has a root in the interval $$[1, 2]$$, what TWO things must you state to earn full marks? What happens if you omit one? (3 steps)", "answer": "- Step 1: **Sign change** — substitute the actual endpoints $$f(1)$$ and $$f(2)$$, show one is positive and the other negative.\n- Step 2: **Continuity** — explicitly state that $$f$$ is continuous on $$[1, 2]$$ (check that the function is defined for all $$x$$ in the interval; here $$x \\neq 0$$ causes no problem on $$[1,2]$$).\n- Step 3: Conclude: by the sign change and continuity, there exists a root $$\\alpha \\in [1, 2]$$.\n\nHarry's verbatim warning: \"The bit that everyone forgets is to mention that continuity. You must remember sign change and continuity. Otherwise you'll only score one mark.\" Omitting continuity loses a mark even if the sign change is correct.", "source": "GLM 5.1 ①", "_id": "glm_1_8"}, {"question": "Q2(a) IVT — Why is continuity a necessary hypothesis for the Intermediate Value Theorem? Give a counterexample showing that sign change alone is insufficient. (2 steps)", "answer": "- Step 1: The IVT says: if $$f$$ is continuous on $$[a,b]$$ and $$f(a)$$ and $$f(b)$$ have opposite signs, then there exists $$c \\in (a,b)$$ with $$f(c) = 0$$. Continuity ensures the function can't \"jump\" over zero.\n- Step 2: Counterexample: define $$f(x) = \\frac{1}{x}$$ on $$[-1, 1]$$. Then $$f(-1) = -1 < 0$$ and $$f(1) = 1 > 0$$ — there's a sign change. But $$f$$ is discontinuous at $$x = 0$$ (it has a vertical asymptote), and there is no $$c$$ with $$f(c) = 0$$. The function goes from $$-\\infty$$ to $$+\\infty$$ without ever equalling zero. This is exactly why the mark scheme requires you to state continuity.\n\nTakeaway: Without continuity, a sign change doesn't guarantee a root. That's why the exam demands both.", "source": "GLM 5.1 ②", "_id": "glm_2_9"}, {"question": "If a function has a sign change on $$[1,2]$$ but is not continuous there (e.g., a vertical asymptote), why might there be no root? Give a concrete mental picture. (2 steps)", "answer": "- Step 1: Consider a function that jumps from $$-5$$ to $$+5$$ at $$x = 1.5$$ with a vertical asymptote. It never crosses the $$x$$-axis; it leaps over it.\n- Step 2: Without continuity, the graph is not an unbroken curve, so the Intermediate Value Theorem does not apply. A sign change alone is insufficient to guarantee a zero.", "source": "Kimi K2.6 ②", "_id": "kimi_2_52"}, {"question": "[Q2(a) IVT, the two-marks rule] Harry said *\"you must, must remember sign change and continuity. Otherwise you'll only score one mark.\"* Why does the IVT require BOTH conditions, and what does each contribute? (3 steps)", "answer": "- Step 1: The Intermediate Value Theorem has two hypotheses that must both be verified:\n+ **Sign change**: $$f(a)$$ and $$f(b)$$ have opposite signs, so the graph crosses the $$x$$-axis somewhere between $$a$$ and $$b$$.\n+ **Continuity**: $$f$$ is continuous on $$[a, b]$$ — the graph has no jumps or holes, so once it crosses zero it actually reaches zero.\n- Step 2: Without the continuity condition, a function with a sign change could still jump over zero (e.g., $$f(x) = \\text{sgn}(x)$$ has a sign change at 0 but is not continuous there, and has no root).\n- Step 3: Without the sign change, continuity alone is not enough — a continuous function can stay entirely above the axis (e.g., $$f(x) = x^2 + 1$$ on $$[-1, 1]$$).\n+ Mark-winning conclusion line: *\"by the sign change and continuity, $$f(x) = 0$$ has a root $$\\alpha \\in [1, 2]$$.\"*\n\nTakeaway: IVT = sign change **AND** continuity — write both explicitly, or you lose a mark.", "source": "MiniMax M3 ②", "_id": "minimax_2_9"}, {"question": "If a function has a restricted domain (e.g., $$f(x)$$ is undefined at $$x = 0$$), how do you correctly justify continuity when applying the IVT on the interval $$[1, 2]$$? (P3 Q2a) (3 steps)", "answer": "- Step 1: Check if the point of discontinuity ($$x = 0$$) falls inside the interval you are testing ($$[1, 2]$$).\n- Step 2: Since $$0 \\notin [1, 2]$$, the function has no breaks, jumps, or asymptotes within this specific interval.\n- Step 3: State: \"$$f(x)$$ is continuous on $$[1, 2]$$ because it is defined for all $$x$$ in this interval\" (or \"the discontinuity at $$x=0$$ is outside the interval\").\n\nTakeaway: Continuity for the IVT only needs to hold *on the specific interval being tested*, not necessarily over the entire real line.", "source": "Qwen 3.7 Max ③", "_id": "qwen_3_7"}, {"question": "[Cross-cutting, IVT vs Rolle's theorem] Q2(a) uses IVT to prove a root exists. Why not use Rolle's theorem or the Mean Value Theorem instead? (2 steps)", "answer": "- Step 1: Rolle's theorem and the MVT require the function to be differentiable on the open interval and continuous on the closed interval — but they prove the existence of a point where $$f'(c) = 0$$, not where $$f(c) = 0$$.\n- Step 2: IVT is the right tool when you want to prove $$f(c) = 0$$ for some $$c$$. Rolle's theorem is for proving $$f'(c) = 0$$.\n+ Q2(a) asks for a root of $$f$$, so IVT is the natural choice.\n\nTakeaway: IVT proves $$f(c) = 0$$; Rolle/MVT prove $$f'(c) = 0$$. Match the theorem to what you're proving.", "source": "MiniMax M3 ②", "_id": "minimax_2_65"}, {"question": "[Cross-cutting, when to use IVT vs direct algebra] Q2(a) uses IVT to *show existence* of a root. Why can't you just solve $$f(x) = 0$$ algebraically here? (2 steps)", "answer": "- Step 1: $$f(x) = \\frac{2x^2 + 3x - 4}{e^x} - \\frac{1}{x^2}$$ has an $$e^x$$ in it, which makes algebraic solution (setting to zero and solving) essentially impossible in closed form.\n- Step 2: IVT is the right tool when:\n+ The equation has no closed-form solution (transcendental, like $$e^x$$).\n+ You only need to PROVE a root EXISTS in an interval, not find it exactly.\n+ Q2(c) then uses iteration to approximate the root numerically.\n\nTakeaway: IVT proves existence; iteration finds the root. Use IVT when the equation is transcendental and you only need \"is there a root?\".", "source": "MiniMax M3 ②", "_id": "minimax_2_58"}, {"question": "What's the difference between a \"sign change\" proof (for IVT) and a \"show that\" proof (for rearrangement)? (2 steps)", "answer": "- Step 1: A sign change proof shows a root EXISTS by establishing that a continuous function changes sign over an interval. The conclusion is \"there exists $$\\alpha$$ such that $$f(\\alpha) = 0$$\". You don't compute the root.\n- Step 2: A \"show that\" proof establishes an **equivalence** — that $$f(x) = 0 \\Leftrightarrow x = \\text{some form}$$. This is stronger than existence; it gives you a way to **compute** the root via iteration. The conclusion is a different FORM of the same equation.\n+ The two have different end goals: existence (IVT) vs. computational form (show that). The IVT is a single application; the show-that is a chain of algebraic equivalences.", "source": "MiniMax M3 ①", "_id": "minimax_1_60"}, {"question": "Conceptual check — Why does $$e^x > 0$$ for all real $$x$$? Give both an algebraic and a visual argument. (2 steps)", "answer": "- Step 1: Algebraic argument: $$e^x$$ is defined as the limit $$\\lim_{n \\to \\infty}(1 + \\frac{x}{n})^n$$. For any real $$x$$ and large enough $$n$$, the base $$(1 + x/n) > 0$$, so a positive number raised to any power is positive. Alternatively, $$e^x = \\sum_{k=0}^{\\infty} \\frac{x^k}{k!} \\geq 1$$ for $$x \\geq 0$$, and for $$x < 0$$, $$e^x = \\frac{1}{e^{-x}} > 0$$ since $$e^{-x} > 0$$.\n- Step 2: Visual argument: the graph of $$y = e^x$$ is always above the x-axis. As $$x \\to +\\infty$$, $$e^x \\to +\\infty$$; as $$x \\to -\\infty$$, $$e^x \\to 0^+$$ (approaches zero from above). The graph never touches or crosses the x-axis. This is why $$e^{0.1T} = 0$$ has no solution — the exponential never reaches zero.\n\nTakeaway: $$e^x > 0$$ always. It approaches 0 but never reaches it. This is fundamental to rejecting spurious solutions.", "source": "GLM 5.1 ②", "_id": "glm_2_47"}, {"question": "When finding the maximum of an exponential model, you often factor the derivative's numerator to get an equation like $$e^{kx}(A - B e^{mx}) = 0$$. Why do you immediately reject the root $$e^{kx} = 0$$?", "answer": "The exponential function $$e^{kx}$$ is strictly positive for all real values of $$x$$ (i.e., $$e^{kx} > 0$$). \n+ Graphically, it has a horizontal asymptote at $$y=0$$ and never crosses the x-axis. \n+ Therefore, the equation $$e^{kx} = 0$$ has no real solutions. The only valid solutions for the turning points must come from setting the algebraic bracket $$(A - B e^{mx}) = 0$$.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_22"}, {"question": "[Cross-cutting, the \"factor out the exponential\" pattern] In Q5(c), the move $$7600 e^{0.1T} - 400 e^{0.3T} = 0 \\Rightarrow e^{0.1T}(7600 - 400 e^{0.2T}) = 0$$ uses a general pattern. What's the pattern, and when does it apply? (2 steps)", "answer": "- Step 1: When an equation has the form $$A e^{kx} - B e^{mx} = 0$$ with $$k \\neq m$$, factor out the exponential with the SMALLER exponent:\n$$e^{kx}(A - B e^{(m-k)x}) = 0$$.\n- Step 2: Since $$e^{kx} > 0$$ always, the equation reduces to $$A - B e^{(m-k)x} = 0$$, i.e., $$e^{(m-k)x} = A/B$$.\n+ This pattern appears in many optimisation problems (Q5 squirrels, logistic-style models, etc.). Recognising it saves a step.\n\nTakeaway: factor out the smaller-exponential term, reject it ($$e^{(\\cdot)} > 0$$), solve the remaining equation.", "source": "MiniMax M3 ②", "_id": "minimax_2_70"}, {"question": "What's the deep reason that \"rate\" in calculus always means derivative, and why is \"increase\" vs. \"decrease\" the sign of the derivative? (2 steps)", "answer": "- Step 1: Rate of change of a quantity $$Q$$ with respect to time $$t$$ is, by definition, $$\\dfrac{dQ}{dt}$$ — how $$Q$$ changes per unit change in $$t$$. This is the derivative, regardless of context (population, temperature, share price, etc.).\n- Step 2: \"Increase\" means $$Q$$ is going UP, so $$\\dfrac{dQ}{dt} > 0$$ (positive). \"Decrease\" means $$Q$$ is going DOWN, so $$\\dfrac{dQ}{dt} < 0$$ (negative). The sign of the rate is the **sign** of the derivative, not a magnitude.\n+ Diagnostic: any time a problem says \"rate of [increase/decrease]\", substitute $$\\frac{dQ}{dt}$$ and set it equal to the given number with the appropriate sign. The \"increase\" or \"decrease\" is your sign indicator.", "source": "MiniMax M3 ①", "_id": "minimax_1_63"}, {"question": "In Q3(c), Phuc's wrong instinct was \"arithmetic series\". What's the conceptual gap that leads to this error, and how do you bridge it? (2 steps)", "answer": "- Step 1: An arithmetic series has **linear** growth — the change per step is constant, and the function is $$V = a + bt$$ (linear in $$t$$). An exponential series has the form $$V = ab^t$$ (exponential in $$t$$). These look similar at small $$t$$ but diverge dramatically.\n- Step 2: The conceptual gap: confusing the **sequence** of values ($$V(0), V(1), V(2), \\ldots$$) with the **function** $$V(t)$$. A sequence of values can be linear (arithmetic) or exponential (geometric). The question \"what is $$V(t)$$?\" is asking for the function, not just the sequence.\n+ Diagnostic: when a question gives a model $$V = ab^t$$ or $$V = ce^{kt}$$, the function is exponential, and any \"rate\" question requires differentiating exponentials — $$\\frac{d}{dt}(ab^t) = ab^t \\cdot \\ln(b)$$ or $$\\frac{d}{dt}(ce^{kt}) = cke^{kt}$$.", "source": "MiniMax M3 ①", "_id": "minimax_1_64"}, {"question": "Distinguish the three derivative rules: $$\\frac{d}{dx}a^x$$, $$\\frac{d}{dx}a^{kx}$$, and $$\\frac{d}{dx}e^{kx}$$. Why does $$e^{kx}$$ look simpler?", "answer": "- Step 1: $$\\frac{d}{dx}a^x = a^x\\ln a$$; $$\\frac{d}{dx}a^{kx} = a^{kx}k\\ln a$$.\n- Step 2: For base $$e$$: $$\\ln e = 1$$, so $$\\frac{d}{dx}e^{kx} = e^{kx}\\cdot k\\ln e = k\\,e^{kx}$$ — the $$\\ln$$ factor vanishes.\n- Step 3: This is *why* $$e$$ is the \"natural\" base: it's the unique base whose exponential differentiates to a clean multiple of itself with no log factor.\n\nTakeaway: $$e^{kx}$$ is the special case of $$a^{kx}$$ where $$\\ln a = 1$$, killing the log term.", "source": "Opus 4.8 ②", "_id": "opus_2_53"}, {"question": "Q3(c) — Why is the $$a^{kx}$$ derivative rule derived from rewriting $$a^{kx} = e^{kx \\ln a}$$? Walk through the intuition. (3 steps)", "answer": "- Step 1: We know how to differentiate $$e^{\\text{something}}$$: $$\\frac{d}{dx}(e^u) = e^u \\cdot u'$$. But we don't directly know how to differentiate $$a^{kx}$$ for arbitrary base $$a$$.\n- Step 2: Convert to base $$e$$: $$a^{kx} = e^{kx \\ln a}$$ (since $$a = e^{\\ln a}$$, so $$a^{kx} = (e^{\\ln a})^{kx} = e^{kx \\ln a}$$). Now the base is $$e$$, which we can differentiate.\n- Step 3: Differentiate: $$\\frac{d}{dx}(e^{kx \\ln a}) = e^{kx \\ln a} \\cdot k \\ln a = a^{kx} \\cdot k \\ln a$$. The $$k\\ln a$$ factor has two parts: $$k$$ from the chain rule (derivative of $$kx$$), and $$\\ln a$$ from the base conversion (the \"cost\" of switching from base $$a$$ to base $$e$$).\n\nThis derivation shows why the answer is $$a^{kx} \\cdot k \\ln a$$ and not $$a^{kx} \\cdot \\ln(kx)$$ — the logarithm acts on the base, not the exponent.", "source": "GLM 5.1 ①", "_id": "glm_1_44"}, {"question": "What is the general formula for $$\\frac{d}{dx}\\left(a^{kx}\\right)$$, and why does the factor $$k \\ln a$$ appear (not $$\\ln(kx)$$)? (2 steps)", "answer": "- Step 1: The formula is $$\\frac{d}{dx}\\left(a^{kx}\\right) = a^{kx} \\cdot k \\ln a$$. This follows from the chain rule: the derivative of the exponent $$kx$$ is $$k$$, and the derivative of $$a^{u}$$ with respect to $$u$$ is $$a^{u} \\ln a$$.\n- Step 2: The common error is to write $$\\ln(kx)$$, which confuses the base $$a$$ with the exponent. The factor depends only on the base $$a$$ and the multiplier $$k$$ in the exponent, not on the variable $$x$$ itself.", "source": "Kimi K2.6 ①", "_id": "kimi_1_20"}, {"question": "Misconception probe — A student differentiates $$100(1.12)^t$$ and gets $$100(1.12)^t \\cdot t \\cdot \\ln(1.12)$$. What's wrong, and what should it be? (2 steps)", "answer": "- Step 1: The extra factor of $$t$$ is wrong. The derivative of $$a^{kt}$$ with respect to $$t$$ is $$a^{kt} \\cdot k \\ln a$$, not $$a^{kt} \\cdot t \\cdot \\ln a$$. The chain rule brings down the derivative of the exponent $$kt$$, which is $$k$$ (a constant), not $$t$$ (a variable).\n- Step 2: For $$100(1.12)^t = 100 \\cdot (1.12)^{1 \\cdot t}$$, the derivative is $$100 \\cdot (1.12)^t \\cdot 1 \\cdot \\ln(1.12) = 100(1.12)^t \\ln(1.12)$$. The $$k = 1$$ because the exponent is just $$t$$. The factor from the chain rule is always a constant ($$k$$), never the variable $$t$$.\n\nTakeaway: Chain rule on exponent gives constant $$k$$, not variable $$t$$. $$\\frac{d}{dt}(a^{kt}) = a^{kt} \\cdot k\\ln a$$.", "source": "GLM 5.1 ②", "_id": "glm_2_56"}, {"question": "[Q3(c), the $$\\ln(kx)$$ trap] Phuc differentiated $$36^x$$ as $$36^x \\cdot \\ln(6x)$$. What's wrong with this, and what's the correct answer? (2 steps)", "answer": "- Step 1: $$36^x = (6^2)^x = 6^{2x}$$, so the rule gives $$\\frac{d}{dx} 6^{2x} = 6^{2x} \\cdot 2 \\ln 6 = 36^x \\cdot 2 \\ln 6 = 36^x \\cdot 12 \\ln 6$$.\n- Step 2: Phuc wrote $$\\ln(6x)$$ — that's nonsense; the rule never produces a logarithm of a polynomial. The chain rule brings down the exponent-multiplier $$k = 2$$, not a new logarithm.\n+ Correct: $$\\frac{d}{dx} 36^x = 36^x \\cdot 2 \\ln 6 = 12 \\ln 6 \\cdot 36^x$$.\n\nTakeaway: $$\\frac{d}{dx} a^{kx} = a^{kx} \\cdot k \\ln a$$, never $$a^{kx} \\cdot \\ln(kx)$$. The chain rule gives $$k$$, not a log.", "source": "MiniMax M3 ②", "_id": "minimax_2_22"}, {"question": "Q3(c) — What is the derivative rule for $$\\frac{d}{dx}(a^{kx})$$, and how does the chain rule produce the extra factor? (3 steps)", "answer": "- Step 1: Start from the base case: $$\\frac{d}{dx}(a^x) = a^x \\ln a$$. This comes from writing $$a^x = e^{x \\ln a}$$ and differentiating: $$\\frac{d}{dx} e^{x \\ln a} = \\ln a \\cdot e^{x \\ln a} = a^x \\ln a$$.\n- Step 2: For $$a^{kx}$$, apply the chain rule: let $$u = kx$$, so $$\\frac{d}{dx}(a^{kx}) = \\frac{d}{du}(a^u) \\cdot \\frac{du}{dx} = a^u \\ln a \\cdot k = a^{kx} \\cdot k \\ln a$$.\n- Step 3: The factor $$k$$ comes from the chain rule (derivative of the inner function $$kx$$). The factor $$\\ln a$$ comes from converting the exponential base from $$a$$ to $$e$$.\n\nResult: $$\\frac{d}{dx}(a^{kx}) = a^{kx} \\cdot k \\ln a$$.", "source": "GLM 5.1 ①", "_id": "glm_1_17"}, {"question": "P3 Q3(c) — when differentiating $$V = 100(10^{0.05})^t$$, walk through the full differentiation and explain why each factor appears. (3 steps)", "answer": "- Step 1: Write $$V = 100 \\cdot a^{kt}$$ where $$a = 10^{0.05}$$ and $$k = 1$$. The derivative is $$\\frac{dV}{dt} = 100 \\cdot a^{kt} \\cdot k\\ln a = 100 \\cdot (10^{0.05})^t \\cdot 1 \\cdot \\ln(10^{0.05})$$.\n- Step 2: Simplify $$\\ln(10^{0.05}) = 0.05\\ln 10$$ (using $$\\ln(a^k) = k\\ln a$$). So $$\\frac{dV}{dt} = 100 \\cdot 10^{0.05t} \\cdot 0.05\\ln 10 = 0.05\\ln 10 \\cdot V$$.\n- Step 3: The three factors are: 100 (the constant multiplier), $$10^{0.05t}$$ (the exponential itself, which always reappears), and $$0.05\\ln 10$$ (the chain-rule factor: $$k\\ln a$$ where $$k = 0.05$$ and $$a = 10$$).", "source": "GLM 5.1 ③", "_id": "glm_3_56"}, {"question": "Conceptually, why does the quotient rule $$\\frac{d}{dx}\\left(\\frac{u}{v}\\right)$$ contain a minus sign in the numerator, whereas the product rule has a plus sign?", "answer": "The quotient rule is derived directly from the product rule applied to the expression $$u \\cdot v^{-1}$$. \n+ When you differentiate the $$v^{-1}$$ term using the chain rule, the power rule brings down a $$-1$$, resulting in $$-v^{-2} \\frac{dv}{dx}$$. \n+ This negative power is the fundamental mathematical origin of the minus sign in the quotient rule's numerator ($$v u' - u v'$$). It reflects the inverse relationship of the denominator.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_20"}, {"question": "For the quotient rule $$\\dfrac{vu' - uv'}{v^2}$$, what does the $$v^2$$ in the denominator represent geometrically or algebraically? (2 steps)", "answer": "- Step 1: Algebraically, $$v^2$$ comes from common-denominator work: if you have a fraction of fractions, you need a common denominator of $$v \\cdot v = v^2$$. Alternatively, from the product rule applied to $$u \\cdot v^{-1}$$: the derivative of $$v^{-1}$$ is $$-v^{-2} \\cdot v'$$, and combining $$u' \\cdot v^{-1}$$ with $$u \\cdot (-v^{-2} \\cdot v')$$ requires a common denominator of $$v^2$$.\n- Step 2: Geometrically, the $$v^2$$ captures the \"scaling\" of the rate. If $$v$$ is large, $$\\frac{d(u/v)}{dt}$$ is small in magnitude (the denominator \"swamps\" the changes). The $$v^2$$ is the squared denominator's contribution to this scaling.\n+ The key takeaway: $$v^2$$ is what makes the dimensions work out. $$\\frac{dN}{dt}$$ has units of $$N/t$$. $$u$$ has units of $$N$$. $$v$$ has units of $$N$$. $$u \\cdot v'$$ has units of $$N \\cdot (N/t) = N^2/t$$. Dividing by $$v^2$$ ($$N^2$$) gives $$N/t$$. ✓", "source": "MiniMax M3 ①", "_id": "minimax_1_70"}, {"question": "Why did Harry advise using the quotient rule for $$N = \\dfrac{u}{v}$$, rather than rewriting as $$u \\cdot v^{-1}$$ and using the product rule? (2 steps)", "answer": "- Step 1: With $$u = 4000e^{0.1t}$$ and $$v = 19 + e^{0.2t}$$, rewriting as $$N = u \\cdot v^{-1}$$ means the product rule gives $$\\dfrac{dN}{dt} = u' \\cdot v^{-1} + u \\cdot (-v^{-2}) \\cdot v' = \\dfrac{u'}{v} - \\dfrac{u v'}{v^2}$$. To combine these into a single fraction, you need a common denominator $$v^2$$, which is extra algebraic work.\n- Step 2: The quotient rule gives the same answer in one step, and the formula is in the book. When the function is already in $$u/v$$ form, the quotient rule is structurally simpler — no rewriting, no combining fractions, no extra terms.\n+ Engineering lesson: choose the tool that matches the structure. **Quotient rule** for $$u/v$$; **product rule** for $$u \\cdot v$$; **chain rule** for $$f(g(x))$$. Don't rewrite to fit a different rule unless the rewriting actually simplifies things.", "source": "MiniMax M3 ①", "_id": "minimax_1_30"}, {"question": "Q5(b) — what is the single most common sign error in the quotient rule numerator, and how do you avoid it?", "answer": "- Step 1: The error is dropping the **minus sign**: writing $$v\\frac{du}{dt} + u\\frac{dv}{dt}$$ instead of $$v\\frac{du}{dt} - u\\frac{dv}{dt}$$.\n- Step 2: The numerator MUST be $$v u' - u v'$$ (in that order, with the minus).\n- Step 3: Fix: read the rule straight from the formula book each time rather than trusting memory.\n\nTakeaway: the quotient rule's minus sign is where marks are lost — copy it from the book.", "source": "Opus 4.8 ②", "_id": "opus_2_38"}, {"question": "If you know that $$e^{0.2T} = 19$$ at the maximum of a model, how do you efficiently find the value of $$e^{0.1T}$$ to substitute back into the original equation without calculating the decimal value of $$T$$ first?", "answer": "Use the index law $$(a^m)^n = a^{mn}$$. \n+ Recognise that the exponent $$0.1T$$ is exactly half of $$0.2T$$. \n+ Therefore, you can write $$e^{0.1T} = (e^{0.2T})^{1/2} = \\sqrt{e^{0.2T}}$$. \n+ Substituting the known value gives $$e^{0.1T} = \\sqrt{19}$$. This elegant algebraic trick avoids calculating, storing, and potentially rounding the decimal value of $$T$$.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_23"}, {"question": "Q4(b)(i) — Why is minimising a fraction with a constant positive numerator equivalent to maximising its denominator? Explain with a simple numerical example. (3 steps)", "answer": "- Step 1: For a fraction $$\\frac{c}{d}$$ where $$c > 0$$ is fixed, the value of the fraction decreases as $$d$$ increases. Example: $$\\frac{18}{6} = 3$$, $$\\frac{18}{9} = 2$$, $$\\frac{18}{18} = 1$$.\n- Step 2: In Q4(b), the numerator is 18 (fixed, positive) and the denominator contains a sine term that varies. To make the fraction as small as possible, make the denominator as large as possible.\n- Step 3: This \"flip\" principle only works when the numerator is a *fixed positive* constant. If the numerator were variable or negative, the relationship between numerator and fraction value would be different.\n\nThis is a strategic shortcut: instead of differentiating the whole fraction, you only need to find the maximum of the denominator — a much simpler problem.", "source": "GLM 5.1 ①", "_id": "glm_1_45"}, {"question": "Conceptual check — When minimising a fraction $$\\frac{k}{f(x)}$$ where $$k > 0$$ is constant, explain why maximising $$f(x)$$ minimises the fraction. What changes if $$k < 0$$? (2 steps)", "answer": "- Step 1: If $$k > 0$$, then $$\\frac{k}{f(x)}$$ decreases as $$f(x)$$ increases (dividing a positive number by a larger positive number gives a smaller result). So the minimum of the fraction occurs at the maximum of the denominator. This is the Q4(b)(i) strategy.\n- Step 2: If $$k < 0$$, the relationship reverses: $$\\frac{k}{f(x)}$$ becomes more negative (i.e., smaller) as $$f(x)$$ decreases (dividing a negative number by a smaller positive number gives a more negative result). So for $$k < 0$$, you'd minimise the fraction by minimising the denominator instead. Always check the sign of the numerator first.\n\nTakeaway: $$k > 0$$: min fraction = max denominator. $$k < 0$$: min fraction = min denominator. Check the sign of $$k$$.", "source": "GLM 5.1 ②", "_id": "glm_2_48"}, {"question": "Generalising Q4(b)(i): if $$g(x) = \\frac{k}{h(x)}$$ with $$k > 0$$, when is the minimum of $$g$$ equal to $$\\frac{k}{\\max h}$$, and when does this argument fail? (3 steps)", "answer": "- Step 1: The argument works whenever $$h(x)$$ is always positive. A positive denominator means the fraction decreases as the denominator increases, so the smallest fraction occurs at the largest denominator.\n- Step 2: The argument fails if $$h(x)$$ can be negative or zero. If $$h(x)$$ can be negative, the fraction could become arbitrarily negative (no minimum). If $$h(x)$$ can be zero, the fraction is undefined.\n- Step 3: In Q4, the denominator $$f(3x) + 4\\sqrt{3}$$ has minimum value $$2\\sqrt{3} > 0$$, so it is always positive and the shortcut is valid.", "source": "Kimi K2.6 ②", "_id": "kimi_2_57"}, {"question": "Why is it sometimes easier to find a max/min by inspection of the structure, rather than by formal differentiation? (2 steps)", "answer": "- Step 1: For functions of the form $$\\dfrac{a}{b + c \\cdot \\sin(kx + d)}$$ with $$a, b, c > 0$$, the maximum of the denominator is $$b + c$$ (when $$\\sin = 1$$), so the minimum of the function is $$\\dfrac{a}{b + c}$$. No calculus required.\n- Step 2: This \"structural\" approach is faster and more robust than differentiating, then setting the derivative to zero, then solving. The structure of the function tells you the answer directly.\n+ The lesson: before reaching for calculus, ask whether the function has a **transparent structure** that lets you read off the extremum. R-form + sin between $$-1$$ and 1 = ratio extremes at $$\\sin = \\pm 1$$.", "source": "MiniMax M3 ①", "_id": "minimax_1_52"}, {"question": "P3 Q4(b)(i) — when minimising a fraction $$g(x) = \\frac{\\text{constant}}{f(3x) + C}$$, what is the strategic principle? (2 steps)", "answer": "- Step 1: The numerator is a fixed positive constant (here, 18). A fraction with a fixed positive numerator is **smallest when its denominator is largest**. So instead of differentiating $$g(x)$$, simply find the maximum of the denominator.\n- Step 2: The denominator is $$f(3x) + 4\\sqrt{3} = 2\\sqrt{3}\\sin\\left(6x - \\frac{\\pi}{3}\\right) + 4\\sqrt{3}$$. This is maximised when $$\\sin\\left(6x - \\frac{\\pi}{3}\\right) = 1$$, giving max denominator = $$2\\sqrt{3} + 4\\sqrt{3} = 6\\sqrt{3}$$. Then min $$g = \\frac{18}{6\\sqrt{3}} = \\frac{3}{\\sqrt{3}} = \\sqrt{3}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_27"}, {"question": "What are the two structural reasons the surface area of a sphere of radius $$R$$ is $$4\\pi R^2$$ (and not $$4\\pi R$$, $$\\pi R^2$$, or $$2\\pi R^2$$)? (2 steps)", "answer": "- Step 1: The exponent on $$R$$ must be 2 because area is a two-dimensional measure — any surface area formula scales with the **square** of the linear dimension, not the linear dimension itself. (This is why $$2\\pi r$$ — circumference — has just $$r$$ to the first power, but any *area* formula must have $$r^2$$ somewhere.)\n- Step 2: The \"$$4$$\" comes from the geometry of a sphere: every point on the surface is at distance $$R$$ from the centre, and integrating the surface area element (or equivalently, wrapping 4 circles of radius $$R$$ around the equator) gives exactly $$4\\pi R^2$$.\n+ The recurring trap: writing $$4\\pi R$$ (no square) treats the sphere as a one-dimensional object. Memorise that **area scales as length²** and the squared factor is non-negotiable.", "source": "MiniMax M3 ①", "_id": "minimax_1_0"}, {"question": "[Cross-cutting, sphere SA derivation intuition] Why is the sphere surface area $$4\\pi R^2$$ and not something like $$2\\pi R^2$$? What's the geometric intuition? (2 steps)", "answer": "- Step 1: A sphere of radius $$R$$ has the same surface area as four great circles (each of area $$\\pi R^2$$). This is the \"Archimedes' hat-box\" theorem: the lateral surface area of a cylinder that just contains the sphere (radius $$R$$, height $$2R$$) equals $$2\\pi R \\cdot 2R = 4\\pi R^2$$, which is also the sphere's surface area.\n- Step 2: Alternatively, the sphere's surface area is the derivative of its volume with respect to $$R$$: $$\\frac{d}{dR}\\left(\\frac{4}{3}\\pi R^3\\right) = 4\\pi R^2$$. This is a general fact: $$\\frac{dV}{dR} = \\text{surface area}$$ for any solid of revolution.\n+ The $$4\\pi$$ factor (not $$2\\pi$$) is what makes the sphere special.\n\nTakeaway: sphere SA = $$4\\pi R^2$$ = derivative of sphere volume. The factor is 4, not 2, because the sphere wraps around twice relative to a flat circle.", "source": "MiniMax M3 ②", "_id": "minimax_2_64"}, {"question": "[Cross-cutting, sphere vs cylinder SA intuition] Why does a sphere have the LARGEST surface area for a given volume among all simple shapes, and why does this matter for the ESAT question? (2 steps)", "answer": "- Step 1: For a given volume, a sphere minimises surface area (isoperimetric inequality). Equivalently, for a given surface area, a sphere has the largest volume.\n- Step 2: In the ESAT question, the sphere's surface area equals 10 cylinders'. The sphere is \"efficient\" with its surface, so to match 10 cylinders' worth of area, the sphere has to be quite large ($$R \\approx 20r$$).\n+ This is why the answer has a factor of ~20, not ~1 — surface-area efficiency matters.\n\nTakeaway: spheres are surface-efficient. When a sphere's SA equals many cylinders' SA, the sphere must be large relative to each cylinder.", "source": "MiniMax M3 ②", "_id": "minimax_2_54"}, {"question": "Phuc wrote the cylinder's curved side as \"the diameter\" before being corrected to \"the circumference\". What's the geometric reasoning behind $$2\\pi r$$ (not $$2r$$) for the rectangle's length? (2 steps)", "answer": "- Step 1: When you unroll a cylinder's curved surface, the result is a rectangle. One dimension is the height $$h$$ (preserved from the cylinder). The other dimension is the distance \"around\" the original circular cross-section.\n- Step 2: \"Around the circle\" is the **circumference**, which is $$2\\pi r$$. The **diameter** ($$2r$$) is the distance **across** the circle, not around it. So the rectangle's other side is $$2\\pi r$$, and the curved area is $$2\\pi r \\cdot h = 2\\pi rh$$.\n+ Visual: imagine cutting a Pringles tube vertically and laying it flat. The width of the resulting rectangle is exactly the circumference of the original tube. Diameter would be too short by a factor of $$\\pi$$.", "source": "MiniMax M3 ①", "_id": "minimax_1_49"}, {"question": "[Cross-cutting, why the cylinder unrolls into a rectangle] Geometrically, why does unrolling the curved side of a cylinder give a rectangle (and not some other shape)? (2 steps)", "answer": "- Step 1: The curved surface is generated by moving a line segment of length $$h$$ (parallel to the axis) along a circle of radius $$r$$. Each point on the line traces a circle, and the line itself stays parallel to the axis.\n- Step 2: When you \"unroll\" this surface (cut along a vertical line and lay flat), the parallel line segments remain straight and parallel, and the circular path becomes a straight line of length $$2\\pi r$$ (the circumference). The result is a rectangle with sides $$h$$ and $$2\\pi r$$.\n+ This is why the curved area is $$2\\pi r h$$ — it's literally the area of a rectangle.\n\nTakeaway: cylinder curved side = rectangle (sides $$h$$ and $$2\\pi r$$). The unrolling works because the generator line stays parallel to the axis.", "source": "MiniMax M3 ②", "_id": "minimax_2_73"}, {"question": "What is the structural difference between the formula for the surface area of a cylinder and its volume, and what common misapplication does this prevent?", "answer": "The surface area of a closed cylinder is $$2\\pi r^2 + 2\\pi r h$$ (a sum of 2D areas), whereas the volume is $$\\pi r^2 h$$ (a 2D base area multiplied by a 1D height to yield 3D space). The common misapplication is offering $$\\pi r^2 h$$ when asked for surface area. This happens when a student conflates the \"prism volume\" rule (cross-section $$\\times$$ length) with surface area. Remember: surface area always involves adding the distinct boundary faces, while volume multiplies the base by the depth.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_2"}, {"question": "How do you derive the total surface area of a *closed* cylinder from first principles, and why is the word \"closed\" critical to the formula? (3 steps)", "answer": "- Step 1: Identify the flat ends. A cylinder has two circular ends, each with an area of $$\\pi r^2$$, giving a combined area of $$2\\pi r^2$$.\n- Step 2: Unroll the curved side. The curved surface unrolls into a rectangle where the height is the cylinder's height ($$h$$) and the width is the circumference of the base ($$2\\pi r$$). The area of this rectangle is $$2\\pi r h$$.\n- Step 3: Add the components. The total surface area is $$2\\pi r^2 + 2\\pi r h$$.\n+ The word \"closed\" dictates that both circular ends are included. If the problem specified an \"open\" cylinder (like a cup), you would omit one $$\\pi r^2$$ term.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_1"}, {"question": "What is the geometric or vector intuition behind the R-formula identity $$a \\sin \\theta + b \\cos \\theta = R \\sin(\\theta + \\alpha)$$?", "answer": "It represents the projection of a static 2D vector onto a rotating axis. \n+ The coefficients $$a$$ and $$b$$ form a static vector $$(a, b)$$ with a fixed magnitude $$R = \\sqrt{a^2+b^2}$$ and a fixed angle $$\\alpha$$. \n+ The expression $$a \\sin \\theta + b \\cos \\theta$$ is mathematically equivalent to the dot product of this static vector with a rotating unit vector $$(\\sin \\theta, \\cos \\theta)$$. \n+ The maximum projection (the amplitude of the wave) is simply the vector's length $$R$$, and the phase shift is its angle $$\\alpha$$.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_14"}, {"question": "P3 Q4(a) — when you square-and-add $$R\\cos\\alpha = \\sqrt{3}$$ and $$R\\sin\\alpha = 3$$, why does the $$\\cos^2\\alpha + \\sin^2\\alpha$$ term simplify? (2 steps)", "answer": "- Step 1: Squaring and adding: $$(R\\cos\\alpha)^2 + (R\\sin\\alpha)^2 = R^2\\cos^2\\alpha + R^2\\sin^2\\alpha = R^2(\\cos^2\\alpha + \\sin^2\\alpha)$$.\n- Step 2: By the Pythagorean identity, $$\\cos^2\\alpha + \\sin^2\\alpha = 1$$, so the expression simplifies to just $$R^2$$. This is *why* square-and-add works — the trig terms cancel perfectly, leaving only $$R$$. This is why it gives an exact value with no need to know $$\\alpha$$.", "source": "GLM 5.1 ③", "_id": "glm_3_102"}, {"question": "Given $$R\\cos\\alpha = \\sqrt{3}$$ and $$R\\sin\\alpha = 3$$, what two operations give you $$R$$ and $$\\alpha$$ exactly? Why is \"substitute a decimal $$\\alpha$$ to get $$R$$\" dangerous? (3 steps)", "answer": "- Step 1: For $$R$$, **square and add**: $$(R\\cos\\alpha)^2 + (R\\sin\\alpha)^2 = R^2(\\cos^2\\alpha + \\sin^2\\alpha) = R^2 = (\\sqrt{3})^2 + 3^2 = 3 + 9 = 12$$, so $$R = \\sqrt{12} = \\sqrt{4 \\cdot 3} = 2\\sqrt{3}$$.\n- Step 2: For $$\\alpha$$, **divide**: $$\\tan\\alpha = \\dfrac{R\\sin\\alpha}{R\\cos\\alpha} = \\dfrac{3}{\\sqrt{3}} = \\sqrt{3}$$. With $$\\alpha \\in (0, \\pi/2)$$ (the standard range for R-form), $$\\tan\\alpha = \\sqrt{3}$$ gives $$\\alpha = \\pi/3$$.\n- Step 3: Substituting a decimal $$\\alpha$$ is dangerous because the rounding error in $$\\alpha$$ propagates into $$R$$ through $$R = a/\\cos\\alpha$$, giving an inexact $$R$$. Square-and-add and divide are exact operations that preserve surds.\n+ Harry's exact words: \"Your method could be quite dangerous.\" The danger is the **rounding chain**: a rounded $$\\alpha$$ produces a rounded $$\\cos\\alpha$$, which produces a rounded $$R$$, and the errors stack. Exact algebra is the only safe route for \"exact value\" questions.", "source": "MiniMax M3 ①", "_id": "minimax_1_22"}, {"question": "[Cross-cutting, R-form vs other trig forms] Q4(a) uses the $$R\\sin(x - \\alpha)$$ form. What other forms exist (e.g., $$R\\cos(x + \\alpha)$$), and how do you choose? (2 steps)", "answer": "- Step 1: The four standard forms are:\n+ $$R\\sin(x - \\alpha)$$\n+ $$R\\sin(x + \\alpha)$$\n+ $$R\\cos(x - \\alpha)$$\n+ $$R\\cos(x + \\alpha)$$\n- Step 2: The choice is determined by the sign pattern of the original expression:\n+ \"$$\\sin x$$ positive, $$\\cos x$$ negative\" → $$R\\sin(x - \\alpha)$$ (so the expansion gives $$-R\\sin\\alpha \\cos x$$).\n+ \"$$\\sin x$$ positive, $$\\cos x$$ positive\" → $$R\\sin(x + \\alpha)$$.\n+ \"$$\\cos x$$ positive, $$\\sin x$$ negative\" → $$R\\cos(x + \\alpha)$$.\n+ Q4(a) had \"$$\\sin 2x$$ positive ($$\\sqrt{3}$$), $$\\cos 2x$$ negative ($$-3$$)\" → $$R\\sin(2x - \\alpha)$$.\n\nTakeaway: the form follows the signs. Negative $$\\cos$$ coefficient + positive $$\\sin$$ coefficient → $$R\\sin(x - \\alpha)$$.", "source": "MiniMax M3 ②", "_id": "minimax_2_56"}, {"question": "Harry's trap checklist — Trap #6: \"Radians mode; use $$\\tan^{-1}$$ for α, not $$\\sin^{-1}$$.\" Why is $$\\sin^{-1}$$ problematic for finding α? (2 steps)", "answer": "- Step 1: To use $$\\sin^{-1}$$, you'd need $$\\sin\\alpha = \\frac{b}{R}$$, which requires you to already know $$R$$. If you've computed $$R$$ with rounding errors, those errors propagate into $$\\alpha$$. Also, $$\\sin^{-1}$$ has ambiguity: $$\\sin\\alpha = \\sin(\\pi - \\alpha)$$, so you might pick the wrong quadrant.\n- Step 2: Using $$\\tan^{-1}(b/a)$$ only requires the original coefficients (which are exact), and the quadrant is determined by the signs of $$a$$ and $$b$$. Since $$R\\cos\\alpha = a$$ and $$R\\sin\\alpha = b$$, and $$R > 0$$, the signs of $$\\cos\\alpha$$ and $$\\sin\\alpha$$ match the signs of $$a$$ and $$b$$. This uniquely determines the quadrant of $$\\alpha$$, avoiding the ambiguity of $$\\sin^{-1}$$.\n\nTakeaway: $$\\tan^{-1}(b/a)$$ uses exact inputs and has clear quadrant determination. $$\\sin^{-1}$$ requires $$R$$ and has quadrant ambiguity.", "source": "GLM 5.1 ②", "_id": "glm_2_65"}, {"question": "Q4(a) — For the specific expression $$\\sqrt{3}\\sin 2x - 3\\cos 2x$$, find the exact values of $$R$$ and $$\\alpha$$ in the form $$R\\sin(2x - \\alpha)$$. (3 steps)", "answer": "- Step 1: Match coefficients: $$R\\cos\\alpha = \\sqrt{3}$$ and $$R\\sin\\alpha = 3$$.\n- Step 2: Divide for $$\\alpha$$: $$\\tan\\alpha = \\frac{3}{\\sqrt{3}} = \\sqrt{3}$$, so $$\\alpha = \\frac{\\pi}{3}$$ (since $$0 < \\alpha < \\frac{\\pi}{2}$$).\n- Step 3: Square-and-add for $$R$$: $$R^2 = (\\sqrt{3})^2 + 3^2 = 3 + 9 = 12$$, so $$R = \\sqrt{12} = 2\\sqrt{3}$$. Result: $$\\sqrt{3}\\sin 2x - 3\\cos 2x = 2\\sqrt{3}\\sin\\left(2x - \\frac{\\pi}{3}\\right)$$.\n\nTakeaway: $$R = 2\\sqrt{3}$$, $$\\alpha = \\frac{\\pi}{3}$$. Both are exact — no decimals anywhere.", "source": "GLM 5.1 ②", "_id": "glm_2_24"}, {"question": "When asked for \"smallest $$x$$\" in a trig equation like $$\\sin(6x - \\pi/3) = 1$$, what's the systematic procedure? (2 steps)", "answer": "- Step 1: Write the **general solution**: $$6x - \\pi/3 = \\pi/2 + 2n\\pi$$ for integer $$n$$. Solve for $$x$$: $$x = \\dfrac{\\pi/2 + \\pi/3 + 2n\\pi}{6} = \\dfrac{5\\pi/6 + 2n\\pi}{6} = \\dfrac{5\\pi}{36} + \\dfrac{n\\pi}{3}$$.\n- Step 2: The smallest positive $$x$$ is at $$n = 0$$: $$x = 5\\pi/36$$. Check the next one ($$n = 1$$): $$x = 5\\pi/36 + \\pi/3 = 5\\pi/36 + 12\\pi/36 = 17\\pi/36$$. If the question asks for smallest positive, the answer is $$5\\pi/36$$.\n+ Sanity check: is the principal solution positive? $$5\\pi/36 \\approx 0.436 > 0$$, so yes. If the question restricts to $$(0, \\pi/2)$$ or similar, check that the principal solution lies in the range.", "source": "MiniMax M3 ①", "_id": "minimax_1_51"}, {"question": "P3 Q4(b)(ii) — the general solution of $$\\sin\\theta = 1$$ is $$\\theta = \\frac{\\pi}{2} + 2n\\pi$$. Why is there no \"mirror\" solution (unlike $$\\sin\\theta = \\frac{1}{2}$$, which has two solutions per period)? (2 steps)", "answer": "- Step 1: For $$\\sin\\theta = k$$ with $$0 < k < 1$$, there are two solutions per period: $$\\theta = \\sin^{-1}(k)$$ and $$\\theta = \\pi - \\sin^{-1}(k)$$. These are the two points where the sine curve reaches height $$k$$.\n- Step 2: For $$\\sin\\theta = 1$$, the sine curve reaches its *peak* — there is only one point per period where this happens. The \"mirror\" solution would be $$\\pi - \\frac{\\pi}{2} = \\frac{\\pi}{2}$$, which is the same point. So there is genuinely only one solution per period, and the general solution is simply $$\\frac{\\pi}{2} + 2n\\pi$$.", "source": "GLM 5.1 ③", "_id": "glm_3_105"}, {"question": "In Q4(b)(ii), after finding the principal solution $$6x - \\frac{\\pi}{3} = \\frac{\\pi}{2}$$, the general solution is $$6x - \\frac{\\pi}{3} = \\frac{\\pi}{2} + 2n\\pi$$. Why is the period $$2\\pi$$ and not $$\\pi$$? (2 steps)", "answer": "- Step 1: The equation is $$\\sin(6x - \\frac{\\pi}{3}) = 1$$. The sine function has period $$2\\pi$$, meaning $$\\sin\\theta = \\sin(\\theta + 2\\pi)$$. So if $$\\theta = \\frac{\\pi}{2}$$ is a solution, then $$\\theta = \\frac{\\pi}{2} + 2n\\pi$$ gives all solutions.\n- Step 2: The period of $$2\\pi$$ is for the argument $$\\theta = 6x - \\frac{\\pi}{3}$$, not for $$x$$ itself. In terms of $$x$$, the period of $$\\sin(6x - \\frac{\\pi}{3})$$ is $$\\frac{2\\pi}{6} = \\frac{\\pi}{3}$$. But when solving $$\\sin\\theta = 1$$, we add $$2n\\pi$$ to $$\\theta$$ (not to $$x$$), then solve for $$x$$. The $$2n\\pi$$ comes from the periodicity of the sine function, not from the coefficient of $$x$$.\n\nTakeaway: When solving $$\\sin(\\text{something}) = 1$$, add $$2n\\pi$$ to the argument, then solve for $$x$$.", "source": "GLM 5.1 ②", "_id": "glm_2_74"}, {"question": "In Q3, the straight-line relationship is $$\\log_{10} V = 0.05t + 2$$. Conceptually, what does the gradient $$m = 0.05$$ represent in terms of the original variable $$V$$? (2 steps)", "answer": "- Step 1: The gradient $$m = 0.05$$ means that for each additional year, $$\\log_{10} V$$ increases by 0.05. This is a constant additive increase on the log scale.\n- Step 2: On the original scale, this translates to a constant **multiplicative** increase: each year, $$V$$ is multiplied by $$10^{0.05} \\approx 1.12$$. This is the hallmark of exponential growth — a constant percentage increase per unit time. The gradient on the log scale is the log of the growth factor: $$m = \\log_{10}(b)$$, so $$b = 10^m = 10^{0.05}$$.\n\nTakeaway: A straight line on a log scale means exponential growth. The gradient $$m$$ gives the growth factor via $$b = 10^m$$.", "source": "GLM 5.1 ②", "_id": "glm_2_68"}, {"question": "P3 — why does taking logs of $$V = ab^t$$ produce a straight line, and which variable becomes linear?", "answer": "- Step 1: Take $$\\log_{10}$$ of both sides: $$\\log_{10}V = \\log_{10}a + t\\log_{10}b$$.\n- Step 2: This has the form $$Y = c + mt$$ with $$Y = \\log_{10}V$$, intercept $$c = \\log_{10}a$$, gradient $$m = \\log_{10}b$$.\n- Step 3: So plotting $$\\log_{10}V$$ (not $$V$$) against $$t$$ linearises the exponential — the whole reason the graph is straight.\n\nLogs convert multiplicative (exponential) growth into additive (linear) form.", "source": "Opus 4.8 ①", "_id": "opus_1_52"}, {"question": "P3 Q3 — when the question says \"log₁₀V is plotted against t,\" what is the difference between this and \"V is plotted against t on log scale\"? (2 steps)", "answer": "- Step 1: \"log₁₀V against t\" means the y-axis literally represents the value $$\\log_{10}V$$. The plotted points are $$(t, \\log_{10}V)$$. The equation of the line is $$\\log_{10}V = mt + c$$.\n- Step 2: \"V against t on log scale\" means the y-axis shows $$V$$ but with a logarithmic spacing. The data points are $$(t, V)$$, but the axis is distorted so that exponential relationships appear linear. Both representations give the same straight line visually, but the equation you write down differs. In Edexcel, \"log₁₀V against t\" means write the equation with $$\\log_{10}V$$ as the dependent variable.", "source": "GLM 5.1 ③", "_id": "glm_3_103"}, {"question": "What is the general relationship $$\\log_b x = y \\Leftrightarrow \\,?$$, and when do you use it? (2 steps)", "answer": "- Step 1: $$\\log_b x = y \\Leftrightarrow x = b^y$$. This is the fundamental equivalence between logarithmic and exponential form. It is how you \"undo\" a logarithm.\n- Step 2: Use it whenever you need to convert between log form and index form. In Q3, converting $$\\log_{10}V = 0.05t + 2$$ to $$V = 10^{0.05t+2}$$ is a direct application of this relationship with $$b = 10$$.", "source": "GLM 5.1 ③", "_id": "glm_3_50"}, {"question": "When converting a linearised log equation $$\\log_{10} V = mt + c$$ back into the exponential model $$V = a b^t$$, what specific index law steps must you show to correctly identify $$a$$ and $$b$$? (P3 Q3b) (4 steps)", "answer": "- Step 1: Raise 10 to the power of both sides: $$V = 10^{mt + c}$$.\n- Step 2: Apply the addition index law ($$x^{p+q} = x^p \\cdot x^q$$) to split the exponent: $$V = 10^c \\cdot 10^{mt}$$.\n- Step 3: Apply the power-of-a-power index law ($$(x^p)^q = x^{pq}$$) to isolate $$t$$: $$V = 10^c \\cdot (10^m)^t$$.\n- Step 4: Match with $$V = a b^t$$ to identify $$a = 10^c$$ and $$b = 10^m$$.\n\nTakeaway: Systematically applying index laws separates the constant multiplier ($$a$$) from the base of the exponential growth ($$b$$).", "source": "Qwen 3.7 Max ③", "_id": "qwen_3_11"}, {"question": "Why is \"round only at the very final answer\" so important in **chained** calculations? (2 steps)", "answer": "- Step 1: Every rounding step introduces an error of up to half the last significant figure. In a chain of calculations, errors **compound** — they don't cancel. If you round three times with errors of $$0.001$$ each, your final answer could be off by $$0.003$$.\n- Step 2: For exponential or iterative calculations, the errors can **amplify**. $$e^x$$ is steep: a small error in $$x$$ becomes a large error in $$e^x$$. For Q3 and Q5, rounding $$T$$ before substituting into $$e^{0.1T}$$ propagates a much larger error into $$V$$ or $$N$$.\n+ The rule: store full precision, use **Ans** or stored values, and only round at the final answer. This is the standard of professional numerical work and is what the exam rewards.", "source": "MiniMax M3 ①", "_id": "minimax_1_65"}, {"question": "When differentiating an exponential model like $$V = 100(10^{0.05})^t$$ to find a specific time $$T$$, why must you use the exact base $$10^{0.05}$$ rather than its 3 s.f. rounded approximation $$1.12$$?", "answer": "Differentiation is highly sensitive to the base value because the derivative involves multiplying by $$\\ln(\\text{base})$$. If you round the base to $$1.12$$ before differentiating, you are calculating the rate of change for a *slightly different mathematical model*. While the final rounded answer might occasionally match by luck, the intermediate values and the exact gradient will be mathematically incorrect. Always carry the exact base through the calculus, and only round the final numerical answer for $$T$$.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_14"}, {"question": "In Q3(c), the final answer for $$T$$ is 13 (nearest integer). The exact calculation gives $$T \\approx 12.756$$. If you had used the rounded base $$b = 1.12$$ instead of $$10^{0.05}$$, you'd get $$T \\approx 13.097$$. Both round to 13. Is it therefore acceptable to use the rounded base? Explain. (2 steps)", "answer": "- Step 1: No, it's not acceptable, even though the final answer coincidentally rounds the same way. The mark scheme requires appropriate working, and differentiating a rounded model is not appropriately exact. You're introducing a method error that happens to cancel out in this specific case.\n- Step 2: In a different question, the rounding error might not cancel. For example, if the true $$T$$ were 12.49 (rounding to 12) but the rounded-base calculation gave 12.51 (rounding to 13), you'd get the wrong answer. Relying on luck is not a valid exam strategy. The correct method — using the exact base — always works; the shortcut sometimes works.\n\nTakeaway: Using a rounded base is methodologically wrong even when the answer happens to match. Use exact values throughout.", "source": "GLM 5.1 ②", "_id": "glm_2_79"}, {"question": "What's Harry's \"round only at the very final answer\" rule, and what's the failure mode if you violate it? (2 steps)", "answer": "- Step 1: Carry exact or full-precision values throughout the working. Use **Ans** or stored calculator values for substitution. Only round when the question explicitly asks for a rounded answer (e.g., \"to 3 s.f.\" or \"to the nearest whole number\").\n- Step 2: Failure mode: rounding intermediate values compounds the error. If you round three times with errors of $$0.001$$ each, your final answer could be off by $$0.003$$. For exponentials, the errors can **amplify** — $$e^x$$ is steep, so a small error in $$x$$ becomes a large error in $$e^x$$. After several such roundings, your final answer could be off by 1 or more — enough to lose a mark.\n+ Sanity check: at the end, redo the calculation with the unrounded values to confirm the rounded answer is still consistent. If not, the rounding step is the culprit.", "source": "MiniMax M3 ①", "_id": "minimax_1_38"}, {"question": "In Q5, the squirrel model $$N = \\frac{4000e^{0.1t}}{19 + e^{0.2t}}$$ has a maximum. Conceptually, why does a model of this form have a maximum, rather than growing forever? (2 steps)", "answer": "- Step 1: For small $$t$$, the denominator is approximately 20 (since $$e^{0.2t} \\approx 1$$), and the numerator grows like $$e^{0.1t}$$. So $$N$$ grows initially. But for large $$t$$, the denominator grows like $$e^{0.2t}$$ (which dominates the constant 19), so $$N \\approx \\frac{4000e^{0.1t}}{e^{0.2t}} = 4000e^{-0.1t}$$, which decays to zero.\n- Step 2: The numerator grows as $$e^{0.1t}$$ but the denominator grows faster (as $$e^{0.2t}$$). The denominator \"wins\" in the long run because its exponent is twice as large. This creates a rise-then-fall shape with a maximum in between. It's a logistic-type model: initial growth followed by saturation and decline.\n\nTakeaway: When the denominator's exponent exceeds the numerator's, the ratio eventually decays. This guarantees a maximum exists.", "source": "GLM 5.1 ②", "_id": "glm_2_69"}, {"question": "P3 Q5 — what is the value of $$N$$ as $$t \\to \\infty$$, and how can you see this from the model without calculation? (2 steps)", "answer": "- Step 1: As $$t \\to \\infty$$, $$e^{0.2t}$$ dominates the denominator, so $$N \\approx \\frac{4000e^{0.1t}}{e^{0.2t}} = 4000e^{-0.1t} \\to 0$$.\n- Step 2: The population eventually declines to zero because the denominator's exponential ($$e^{0.2t}$$) grows twice as fast as the numerator's ($$e^{0.1t}$$). The model predicts an initial rise, a peak at $$T \\approx 14.72$$, and then a long decline. This is a \"rise and fall\" model, not a logistic saturation model.", "source": "GLM 5.1 ③", "_id": "glm_3_101"}, {"question": "Mini-drill: for a quotient model $$N = \\frac{4000e^{0.1t}}{19+e^{0.2t}}$$, what is the qualitative shape of $$N$$ against $$t$$ (rise then fall), and why does a maximum exist?", "answer": "- Step 1: At $$t=0$$, $$N=200$$; as $$t$$ grows, the numerator grows like $$e^{0.1t}$$ but the denominator eventually grows faster like $$e^{0.2t}$$.\n- Step 2: Early on the numerator dominates so $$N$$ rises; later the denominator ($$e^{0.2t}$$, faster growth) dominates so $$N$$ falls.\n- Step 3: The competition between $$e^{0.1t}$$ (top) and $$e^{0.2t}$$ (bottom) forces a single turning point — the maximum at $$e^{0.2T}=19$$.\n\nTakeaway: a maximum arises because the denominator's faster exponential eventually overtakes the numerator's slower one.", "source": "Opus 4.8 ②", "_id": "opus_2_56"}, {"question": "[Q2(b), rearrangement strategy] When Q2(b) asks you to show $$f(x) = 0 \\iff x = \\sqrt[3]{\\frac{e^x + 4x^2}{2x + 3}}$$, what's the strategy Harry used — and why does \"look at the target\" work? (3 steps)", "answer": "- Step 1: Start from the easier side: set $$f(x) = 0$$ and rearrange. This is one direction of the $$\\iff$$.\n- Step 2: Read the **target form** for clues about what shape to aim for. The cube root on the RHS tells you the final move will be \"cube both sides\". The denominator $$2x + 3$$ tells you the left side should eventually contain a factor of $$(2x + 3)$$ to cancel.\n- Step 3: Work backwards from the target: aim to produce $$x^3(2x + 3) = e^x + 4x^2$$ on the left, then cube-root both sides to reach the target.\n+ Harry's verbal cue: *\"look at the target for clues\"*.\n\nTakeaway: in \"show that\" rearrangement questions, the target form is a roadmap — read the denominator and the outer function (cube root, square root, log) before you start manipulating.", "source": "MiniMax M3 ②", "_id": "minimax_2_12"}, {"question": "In rearranging $$2x^4 + 3x^3 = \\dots$$ to match a target denominator of $$(2x + 3)$$, what specific factoring trick bridges the gap between the expanded polynomial and the target form?", "answer": "The trick is to factor out the highest common power of $$x$$ that leaves the target denominator as the remaining bracket. Here, you factor out $$x^3$$ from the left side to get $$x^3(2x + 3)$$. This perfectly isolates the $$(2x + 3)$$ term, allowing you to divide both sides by $$(2x + 3)$$ to move it to the denominator on the right side, leaving just $$x^3$$ on the left, which is then ready to be cube-rooted.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_8"}, {"question": "[Cross-cutting, the \"what's the outer function?\" check] For Q2(b), the cube root on the RHS tells you the LAST step. What are the outer functions for other common \"show that\" targets? (2 steps)", "answer": "- Step 1: Match the outer function on the RHS to the LAST algebraic step:\n+ Cube root ($$\\sqrt[3]{\\cdot}$$) → cube both sides as the last step.\n+ Square root ($$\\sqrt{\\cdot}$$) → square both sides as the last step.\n+ $$\\log$$ → exponentiate as the last step.\n+ $$\\sin^{-1}, \\cos^{-1}, \\tan^{-1}$$ → take sine/cosine/tangent as the last step.\n- Step 2: The outer function tells you what the LHS should look like just before the last step:\n+ Cube root target → LHS should be a perfect cube.\n+ Square root target → LHS should be a perfect square (and non-negative).\n+ $$\\log$$ target → LHS should be a positive expression.\n\nTakeaway: read the outer function on the RHS of a \"show that\" target. It tells you the LAST step and the required shape of the LHS.", "source": "MiniMax M3 ②", "_id": "minimax_2_76"}, {"question": "The \"show that\" structure of Q2(b) and Q5(c) is a recurring exam pattern. What's the meta-skill for handling it? (2 steps)", "answer": "- Step 1: A \"show that\" is a PROOF that the given statement follows from the working. The target line is FIXED; the question is whether you can DERIVE it. The marker watches every step to see if each transformation is legitimate.\n- Step 2: The skill is **backwards engineering**: read the target, identify what the LHS of the target would have to be in the previous step, and work out the inverse operation. E.g., if the target is $$x = \\sqrt[3]{\\text{stuff}}$$, the previous step must have been $$x^3 = \\text{stuff}$$, and the step before must have produced $$x^3$$ on the LHS.\n+ This is a fundamentally different mode from \"find\" — you're not optimising, you're CONSTRUCTING. The structure of your argument is what matters, not just the destination.", "source": "MiniMax M3 ①", "_id": "minimax_1_56"}, {"question": "In Q2(b), the rearrangement involves multiplying both sides by $$e^x x^2$$. Why is this valid (i.e., why doesn't it introduce spurious solutions or lose solutions)? (2 steps)", "answer": "- Step 1: Multiplying both sides of an equation by a non-zero expression is valid and doesn't change the solution set. We need to verify that $$e^x x^2 \\neq 0$$ for all $$x$$ in the domain.\n- Step 2: $$e^x > 0$$ for all real $$x$$ (always positive), and $$x^2 > 0$$ for all $$x \\neq 0$$ (the domain excludes $$x = 0$$). So $$e^x x^2 > 0$$ for all $$x$$ in the domain of $$f$$. Multiplying by a positive quantity preserves the equation exactly — no solutions are gained or lost.\n\nTakeaway: $$e^x x^2 > 0$$ on the domain, so multiplying by it is safe. Always check that your multiplier is non-zero on the domain.", "source": "GLM 5.1 ②", "_id": "glm_2_73"}, {"question": "P3 Q2(b) — what is the complete sequence of algebraic moves from $$f(x) = 0$$ to the cube-root iteration form? (5 steps)", "answer": "- Step 1: Set $$f(x) = 0$$: $$\\frac{2x^2 + 3x - 4}{e^x} - \\frac{1}{x^2} = 0$$. Move $$\\frac{1}{x^2}$$ across: $$\\frac{2x^2 + 3x - 4}{e^x} = \\frac{1}{x^2}$$.\n- Step 2: Multiply both sides by $$e^x x^2$$ to clear denominators: $$x^2(2x^2 + 3x - 4) = e^x$$.\n- Step 3: Expand the left: $$2x^4 + 3x^3 - 4x^2 = e^x$$. Move $$4x^2$$ to the right: $$2x^4 + 3x^3 = e^x + 4x^2$$.\n- Step 4: Factor the left: $$x^3(2x + 3) = e^x + 4x^2$$. Divide by $$(2x + 3)$$: $$x^3 = \\frac{e^x + 4x^2}{2x + 3}$$.\n- Step 5: Cube-root both sides: $$x = \\sqrt[3]{\\frac{e^x + 4x^2}{2x + 3}}$$. The target is reached.", "source": "GLM 5.1 ③", "_id": "glm_3_93"}, {"question": "Conceptual depth — In the ESAT sphere-cylinder problem, after forming the quadratic $$R^2 - 20rR - 5r^2 = 0$$, explain why the discriminant must be positive and what this tells you about the geometry. (2 steps)", "answer": "- Step 1: The discriminant is $$b^2 - 4ac = (20r)^2 - 4(1)(-5r^2) = 400r^2 + 20r^2 = 420r^2 > 0$$. It's positive because the $$c$$ term is negative ($$-5r^2$$), making $$-4ac = +20r^2$$, which adds to $$400r^2$$.\n- Step 2: Geometrically, a positive discriminant means two distinct real solutions for $$R$$ exist. This makes sense: the quadratic $$R^2 - 20rR - 5r^2 = 0$$ opens upward (coefficient of $$R^2$$ is positive) and has a negative constant term, so it must cross the $$R$$-axis twice — once at a negative $$R$$ and once at a positive $$R$$. The positive root is the physically meaningful one.\n\nTakeaway: Positive discriminant = two real roots. The geometry guarantees this because the quadratic opens upward with a negative intercept.", "source": "GLM 5.1 ②", "_id": "glm_2_66"}, {"question": "When applying the quadratic formula to find a physical radius $$R$$ in terms of $$r$$, and you arrive at the roots $$R = r(10 \\pm \\sqrt{105})$$, why must you strictly choose the positive root and how do you justify it mathematically?", "answer": "You must choose $$R = r(10 + \\sqrt{105})$$ because a physical radius must be strictly positive ($$R > 0$$). To justify rejecting the minus root, observe that $$\\sqrt{105} > \\sqrt{100} = 10$$. Therefore, the expression $$(10 - \\sqrt{105})$$ evaluates to a negative number. Since $$r$$ is also a positive radius, the minus root yields a negative $$R$$, which is physically impossible.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_4"}, {"question": "[ESAT warm-up, quadratic recognition] After substituting $$h = 4R$$ and simplifying, the equation becomes $$R^2 - 20rR - 5r^2 = 0$$. How do you recognise that this is a quadratic in $$R$$ (not in $$r$$)? (2 steps)", "answer": "- Step 1: Look at the powers of $$R$$ alone. The equation has $$R^2$$ (degree 2), $$R$$ (degree 1), and a constant term $$-5r^2$$ (degree 0 in $$R$$). That's the shape of a quadratic.\n- Step 2: Treat $$r$$ as a known constant (a parameter), and apply the quadratic formula with $$a = 1$$, $$b = -20r$$, $$c = -5r^2$$.\n+ The discriminant is $$(-20r)^2 - 4(1)(-5r^2) = 400r^2 + 20r^2 = 420r^2$$, which gives $$R = \\frac{20r \\pm \\sqrt{420}\\,r}{2}$$.\n\nTakeaway: when one variable is the \"answer\" and the other is a parameter, the parameter lives in the coefficients — the quadratic formula still works, just with letters.", "source": "MiniMax M3 ②", "_id": "minimax_2_7"}, {"question": "ESAT warm-up — Derive $$R = r(10 + \\sqrt{105})$$ from the equation $$4\\pi R^2 = 10(2\\pi r^2 + 2\\pi r \\cdot 4R)$$. Summarise the key algebraic milestones. (4 steps)", "answer": "- Step 1: Expand RHS: $$10(2\\pi r^2 + 8\\pi r R) = 20\\pi r^2 + 80\\pi r R$$.\n- Step 2: Divide by $$4\\pi$$: $$R^2 = 5r^2 + 20rR$$. Rearrange: $$R^2 - 20rR - 5r^2 = 0$$.\n- Step 3: Quadratic formula: $$R = \\frac{20r \\pm \\sqrt{400r^2 + 20r^2}}{2} = \\frac{20r \\pm \\sqrt{420r^2}}{2} = \\frac{20r \\pm 2r\\sqrt{105}}{2} = r(10 \\pm \\sqrt{105})$$.\n- Step 4: Reject the negative root ($$10 - \\sqrt{105} < 0$$). Final answer: $$R = r(10 + \\sqrt{105})$$.\n\nThe key milestones are: simplify by dividing by $$4\\pi$$, form a standard quadratic, apply the formula, reject the negative root.", "source": "GLM 5.1 ①", "_id": "glm_1_59"}, {"question": "[Cross-cutting, \"show that\" vs \"find\"] Harry emphasised reading the command word. What's the difference between \"show that\" and \"find\", and how does it change your working? (2 steps)", "answer": "- Step 1: **\"Show that\"** asks you to derive a stated equation from prior work. You write the derivation clearly, and you STOP at the stated equation — solving further is wasted effort and may lose marks.\n- Step 2: **\"Find\"** (or \"calculate\" or \"determine\") asks you to produce a numerical or algebraic answer. You must solve fully and quote the answer.\n+ Q5(c) is \"show that $$e^{0.2T} = 19$$\" — stop at $$A = 19$$. Q5(d) is \"find the maximum number of squirrels\" — solve for $$N$$ and round.\n\nTakeaway: read the command word first. \"Show that\" = derive and stop; \"find\" = solve and quote.", "source": "MiniMax M3 ②", "_id": "minimax_2_43"}, {"question": "To solve $$e^{0.2T} = 19$$, you take the natural log of both sides. Why $$\\ln$$ (base $$e$$) and not $$\\log_{10}$$? (2 steps)", "answer": "- Step 1: $$\\ln$$ is the natural log, with base $$e$$. The defining property of $$\\ln$$ is that $$\\ln(e^x) = x$$ — i.e., $$\\ln$$ and the exponential $$e^{(\\cdot)}$$ are inverses. So $$\\ln(e^{0.2T}) = 0.2T$$, which immediately gives you $$T = \\ln(19)/0.2$$.\n- Step 2: $$\\log_{10}$$ has base 10. $$\\log_{10}(e^{0.2T}) = 0.2T \\cdot \\log_{10}(e) = 0.2T \\cdot (1/\\ln 10)$$, which is messier and would force a conversion through the change-of-base formula. Always use $$\\ln$$ when dealing with $$e^{(\\cdots)}$$.\n+ Phuc's trap: writing $$\\log$$ instead of $$\\ln$$. The base matters. If the exponential is base $$e$$, the log must be base $$e$$ (= $$\\ln$$). If the exponential is base 10, the log must be base 10. **Match the bases.**", "source": "MiniMax M3 ①", "_id": "minimax_1_33"}, {"question": "When evaluating an exponential population model like $$N = \\frac{4000e^{0.1t}}{19 + e^{0.2t}}$$ at the start of the study ($$t = 0$$), what is the specific \"losing the one\" trap in the denominator, and how do you avoid it? (P3 Q5a) (3 steps)", "answer": "- Step 1: Substitute $$t = 0$$ into the exponent: $$e^{0.2(0)} = e^0$$.\n- Step 2: Recall the fundamental index law that any non-zero base to the power of 0 is 1: $$e^0 = 1$$.\n- Step 3: The trap is thinking $$e^0 = 0$$ and writing the denominator as just $$19$$. You must explicitly write $$19 + 1 = 20$$.\n\nTakeaway: $$e^0 = 1$$, never 0. Always write out the \"+ 1\" explicitly when substituting $$t=0$$ into additive exponential denominators.", "source": "Qwen 3.7 Max ③", "_id": "qwen_3_19"}, {"question": "Why does the range of $$f(x)=\\ln(x^2+3)$$ start at $$\\ln 3$$ rather than $$-\\infty$$?", "answer": "- Step 1: The inside $$x^2 + 3$$ has a minimum of $$3$$ (when $$x=0$$), since $$x^2 \\ge 0$$.\n- Step 2: $$\\ln$$ is increasing, so its smallest output occurs at the smallest input: $$\\ln 3$$.\n- Step 3: As $$x \\to \\pm\\infty$$, $$x^2+3 \\to \\infty$$ so $$\\ln(\\ldots) \\to \\infty$$. Hence the range is $$f(x) \\ge \\ln 3$$.\n\nTakeaway: for composite ranges, find the range of the inner expression first, then push it through the outer function's behaviour.", "source": "Opus 4.8 ②", "_id": "opus_2_49"}, {"question": "When finding the maximum of a function defined by a quotient, $$\\frac{u(t)}{v(t)}$$, why is it sufficient to only set the numerator of the derivative to zero?", "answer": "The quotient rule gives the derivative as $$\\frac{v u' - u v'}{v^2}$$. For a fraction to equal zero, its numerator must be zero, provided the denominator is non-zero. Since the denominator here is $$v^2$$ (a squared real-valued function like $$(19 + e^{0.2t})^2$$), it is strictly positive and can never be zero. Therefore, the critical points are entirely determined by setting the numerator $$v u' - u v' = 0$$, allowing you to ignore the complex denominator completely.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_23"}, {"question": "Edge case — In the ESAT sphere-cylinder problem, what if the question said \"open cylinders\" instead of \"closed cylinders\"? How would the equation change? (2 steps)", "answer": "- Step 1: An open cylinder has no top, so it has only one circular end (the base) plus the curved side. The surface area becomes $$\\pi r^2 + 2\\pi rh$$ (one end, not two).\n- Step 2: The equation would change from $$4\\pi R^2 = 10(2\\pi r^2 + 2\\pi rh)$$ to $$4\\pi R^2 = 10(\\pi r^2 + 2\\pi rh)$$. This gives a different quadratic and a different answer. The word \"closed\" vs \"open\" changes the number of ends from 2 to 1, which is a significant algebraic difference. Always read this detail carefully.\n\nTakeaway: Closed = 2 ends ($$2\\pi r^2$$). Open = 1 end ($$\\pi r^2$$). One word changes the formula.", "source": "GLM 5.1 ②", "_id": "glm_2_58"}, {"question": "Edge case — What if the denominator $$f(3x) + 4\\sqrt{3}$$ in Q4(b) could equal zero? How would that change the problem? (2 steps)", "answer": "- Step 1: If the denominator could equal zero, the function $$g(x)$$ would have vertical asymptotes and would be undefined at those points. The minimum wouldn't exist as a finite value — the function would tend to $$-\\infty$$ near the asymptote (if approached from one side).\n- Step 2: In Q4(b), the denominator is $$2\\sqrt{3}\\sin(6x - \\frac{\\pi}{3}) + 4\\sqrt{3}$$. The minimum value of the sine term is $$-1$$, giving a minimum denominator of $$-2\\sqrt{3} + 4\\sqrt{3} = 2\\sqrt{3} > 0$$. So the denominator is always positive and never zero — the function is well-defined for all $$x$$. This is why the \"minimise by maximising denominator\" strategy works safely here.\n\nTakeaway: Always check that the denominator stays positive. If it can reach zero, the fraction has asymptotes, not a finite minimum.", "source": "GLM 5.1 ②", "_id": "glm_2_49"}, {"question": "[Cross-cutting, the \"what if the model had $$e^{0.2t}$$ in the numerator?\" counterfactual] Q5 has $$e^{0.1t}$$ in the numerator and $$e^{0.2t}$$ in the denominator. If both were $$e^{0.2t}$$, what would change? (2 steps)", "answer": "- Step 1: The numerator and denominator would have the SAME exponential factor, and the quotient rule would simplify (the exponentials cancel in the derivative, leaving a rational function).\n- Step 2: The maximum would still be at $$\\frac{dN}{dt} = 0$$, but the algebra would be different — the \"factor out the exponential\" pattern wouldn't apply.\n+ The current model (different exponents in num and denom) is the more interesting case and the one that requires the factor-out trick.\n\nTakeaway: different exponents in num and denom = factor-out trick needed. Same exponents = simpler cancellation.", "source": "MiniMax M3 ②", "_id": "minimax_2_79"}, {"question": "P3 Q3(c) — when differentiating $$V = 100(10^{0.05})^t$$, you get $$\\frac{dV}{dt} = 0.05\\ln(10) \\cdot V$$. What does this relationship $$\\frac{dV}{dt} \\propto V$$ tell you about the growth model? (2 steps)", "answer": "- Step 1: $$\\frac{dV}{dt} = 0.05\\ln(10) \\cdot V$$ means the rate of change is proportional to the current value. This is the defining property of exponential growth — the bigger the share price, the faster it grows (in absolute terms).\n- Step 2: This is why the \"rate of increase\" is £50/year at a specific time $$T$$ — as $$V$$ grows, the rate grows proportionally, so the rate hits any given value (like 50) at exactly one time. This is fundamentally different from linear growth where the rate is constant.", "source": "GLM 5.1 ③", "_id": "glm_3_97"}, {"question": "Once you have $$\\log_{10} V = 0.05t + 2$$, how do you \"undo the log\" to get $$V = ab^t$$? What's the role of index laws here? (2 steps)", "answer": "- Step 1: Exponentiate both sides with base 10: $$10^{\\log_{10} V} = 10^{0.05t + 2}$$. Since $$10^{\\log_{10} V} = V$$, the LHS becomes $$V$$. The RHS uses the index law $$10^{p+q} = 10^p \\cdot 10^q$$, giving $$V = 10^{0.05t} \\cdot 10^2$$.\n- Step 2: Recognise $$10^2 = 100 = a$$, and $$10^{0.05t} = (10^{0.05})^t = b^t$$ where $$b = 10^{0.05}$$. So $$V = 100 \\cdot (10^{0.05})^t$$, giving $$a = 100$$ (exact) and $$b = 10^{0.05}$$ (exact, $$\\approx 1.12$$ to 3 s.f.).\n+ The key index law: $$10^{mt+c} = 10^c \\cdot 10^{mt} = 10^c \\cdot (10^m)^t$$. Splitting the exponent is the bridge from a log model to an exponential model.", "source": "MiniMax M3 ①", "_id": "minimax_1_15"}, {"question": "\"Read the command word\" is generic advice, but applied to \"show that $$e^{0.2T} = 19$$\" specifically, what does it mean for the structure of your answer? (2 steps)", "answer": "- Step 1: Your answer is a CHAIN of equalities that **ends at** $$e^{0.2T} = 19$$. Every line must be a legitimate step, and the last line must match the target. The marker is checking whether you can DERIVE the given statement, not just reach it.\n- Step 2: You may use the answer in REVERSE — i.e., you can start from the derivative = 0 condition and work forward to $$e^{0.2T} = 19$$, OR you can start from $$e^{0.2T} = 19$$ and verify it satisfies the derivative = 0 condition. Either is valid, but the forward direction is more natural here.\n+ The structural discipline: the FINAL line is fixed by the \"show that\" command. Every preceding line is a step toward that line. If your last line isn't exactly the target, you've missed the point.", "source": "MiniMax M3 ①", "_id": "minimax_1_43"}, {"question": "[Cross-cutting, the \"stop here\" rule for multi-part questions] Q5(c) asks to show $$e^{0.2T} = 19$$; Q5(d) asks for the maximum number of squirrels. Why solve them in order and stop at the right place? (2 steps)", "answer": "- Step 1: Q5(d) depends on Q5(c) — you need $$e^{0.2T} = 19$$ to substitute back into $$N$$. If you solve for $$T$$ in Q5(c), you steal the \"show that\" credit and may get Q5(d) wrong if your $$T$$ has a rounding error.\n- Step 2: The right workflow is: do Q5(c) and stop at $$e^{0.2T} = 19$$; then in Q5(d), take $$\\ln$$ of both sides to get $$T$$, substitute back (using the stored value), and round only the final answer.\n+ Harry's rule: read each part's command word, do exactly what's asked, and use the previous part's result in the next.\n\nTakeaway: respect the part boundaries. \"Show that\" stops at the shown line; \"find\" uses the previous result and rounds at the end.", "source": "MiniMax M3 ②", "_id": "minimax_2_67"}, {"question": "In an iteration $$x_{n+1} = g(x_n)$$, why does the iteration converge (when it does) to a root of $$x = g(x)$$, which corresponds to $$f(x) = 0$$? (2 steps)", "answer": "- Step 1: If the iteration converges to a limit $$L$$, then $$L = \\lim x_{n+1} = \\lim g(x_n) = g(\\lim x_n) = g(L)$$ (assuming continuity of $$g$$). So $$L$$ satisfies $$L = g(L)$$.\n- Step 2: The original problem is $$f(x) = 0$$. The rearrangement shows $$f(x) = 0 \\Leftrightarrow x = g(x)$$. So $$L = g(L) \\Leftrightarrow f(L) = 0$$, i.e., $$L$$ is a root of $$f$$.\n+ This is the WHY of iteration methods: they \"search\" for the **fixed point** of $$g$$, which is also a root of $$f$$. Convergence is a separate question (depends on $$|g'(L)| < 1$$), but the limit, if it exists, is a root.", "source": "MiniMax M3 ①", "_id": "minimax_1_61"}, {"question": "[Cross-cutting, iteration convergence intuition] Q2(c) iteration $$x_{n+1} = \\sqrt[3]{\\frac{e^{x_n} + 4x_n^2}{2x_n + 3}}$$ with $$x_1 = 1$$. Why does this iteration converge, and what's the rough size of the limit? (2 steps)", "answer": "- Step 1: The iteration converges because the function $$g(x) = \\sqrt[3]{\\frac{e^x + 4x^2}{2x + 3}}$$ has derivative magnitude less than 1 near the fixed point (a standard fixed-point iteration condition). The Q2(a) IVT guarantees a root in $$[1, 2]$$, and the iteration finds it.\n- Step 2: Rough size: starting from $$x_1 = 1$$, the iterates will approach the root $$\\alpha \\in [1, 2]$$. The exact value (computed numerically) is around $$1.2$$–$$1.3$$ to 4 d.p.\n+ The point isn't the exact value — it's that the iteration converges to a value inside the IVT interval.\n\nTakeaway: iteration converges to a fixed point inside the IVT interval. The fixed point is the root you proved exists in Q2(a).", "source": "MiniMax M3 ②", "_id": "minimax_2_59"}, {"question": "[Cross-cutting, the \"log-linear\" three-step workflow] For a log-linear question (Q3 type), what's the three-step workflow from the graph to the final answer? (3 steps)", "answer": "- Step 1: **Read the graph** — extract the slope $$m$$ and intercept $$c$$ from two points (or read them directly if given).\n- Step 2: **Write the linear equation** — e.g., $$\\log_{10} V = 0.05t + 2$$. This is the \"log form\".\n- Step 3: **Exponentiate** — raise 10 to both sides, split the index, and write $$V = ab^t$$ with $$a = 10^c$$ and $$b = 10^m$$.\n+ Then differentiate $$V$$ with respect to $$t$$ using the $$a^{kx}$$ rule for \"rate\" sub-questions.\n\nTakeaway: log-linear = read slope/intercept → write log equation → exponentiate to recover $$V = ab^t$$. Three steps, always.", "source": "MiniMax M3 ②", "_id": "minimax_2_71"}, {"question": "Strategy question — When a question asks you to find the maximum of a quotient model $$N = \\frac{u(t)}{v(t)}$$, what is the complete attack plan? (5 steps)", "answer": "- Step 1: Identify $$u$$ and $$v$$. Compute $$u'$$ and $$v'$$ separately, using the $$\\frac{d}{dt}(e^{kt}) = ke^{kt}$$ rule for exponential terms.\n- Step 2: Apply the quotient rule: $$\\frac{dN}{dt} = \\frac{vu' - uv'}{v^2}$$. Keep the minus sign. Simplify the numerator by combining exponential terms (e.g., $$e^{0.1t} \\cdot e^{0.2t} = e^{0.3t}$$).\n- Step 3: Set $$\\frac{dN}{dt} = 0$$. Note that the denominator is always positive (since $$v > 0$$), so only the numerator needs to equal zero. Factor out common exponential terms.\n- Step 4: Reject any solution of the form $$e^{(\\cdot)} = 0$$ (impossible). Solve the remaining equation. If the command says \"show that,\" stop at the shown result.\n- Step 5: For the maximum value, substitute back using relationships like $$e^{kT/2} = \\sqrt{e^{kT}}$$ to avoid computing $$T$$. Use stored values. Round only the final answer.\n\nTakeaway: Quotient rule → simplify → set numerator to zero → factor and reject impossibilities → substitute back exactly.", "source": "GLM 5.1 ②", "_id": "glm_2_77"}, {"question": "A \"max\" question like Q5 has four sub-parts: starting value, derivative, \"show that\" for the critical point, and the maximum value. What's the conceptual chain that connects them? (2 steps)", "answer": "- Step 1: (a) gives the starting condition ($$t = 0$$). (b) gives the rate of change ($$\\frac{dN}{dt}$$). (c) sets $$\\frac{dN}{dt} = 0$$ to find the critical point — and a \"show that\" tells you to PROVE the critical point's defining equation. (d) uses the critical point to evaluate $$N$$ at the maximum.\n- Step 2: The chain is: **model → derivative → set derivative to zero → solve for the critical point → substitute back to get the value**. Each part is one step in this chain. Skipping a step or doing them out of order is the structural failure mode.\n+ The big picture: a \"max\" problem is a four-part machine. Each part feeds into the next. The model is given; you find the rate (derivative); you find where the rate is zero; you evaluate the function at that point. Memorise this scaffold and apply it to every max problem.", "source": "MiniMax M3 ①", "_id": "minimax_1_44"}, {"question": "P3 Q2(a) — for the function $$f(x) = \\frac{2x^2 + 3x - 4}{e^x} - \\frac{1}{x^2}$$, why is it continuous on $$[1, 2]$$, and what would make it discontinuous? (2 steps)", "answer": "- Step 1: $$f(x)$$ is continuous on $$[1, 2]$$ because both $$\\frac{2x^2 + 3x - 4}{e^x}$$ (a polynomial divided by a never-zero exponential) and $$\\frac{1}{x^2}$$ (defined for all $$x \\neq 0$$) are continuous on this interval. The only discontinuity is at $$x = 0$$, which is outside $$[1, 2]$$.\n- Step 2: If the interval included $$x = 0$$, the function would be discontinuous there (division by zero in $$\\frac{1}{x^2}$$), and the IVT would not apply. This is why you must check that the function is defined and continuous on the *entire* closed interval.", "source": "GLM 5.1 ③", "_id": "glm_3_86"}, {"question": "Q2(c) iteration $$x_{n+1} = \\sqrt[3]{\\frac{e^{x_n}+4x_n^2}{2x_n+3}}$$ with $$x_1=1$$ — what three practical precautions must you take when computing $$x_3$$ and $$\\alpha$$ to 4 d.p.? (3 steps)", "answer": "- Step 1: Keep the calculator in the correct mode (this involves $$e^x$$, so no radians/degrees confusion, but ensure exponential/scientific mode is right).\n- Step 2: Do NOT round intermediate iterates — carry full precision from $$x_2$$ into $$x_3$$, otherwise error compounds.\n- Step 3: Quote $$x_3$$ **and** $$\\alpha$$ each to 4 decimal places as the question demands.\n\nTakeaway: iteration accuracy depends entirely on not rounding mid-calculation; only round the final reported values.", "source": "Opus 4.8 ②", "_id": "opus_2_14"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "ESAT warm-up — When a question asks for the area of a circle, what is the formula, and what is the common mistake Phuc made? (2 steps)", "answer": "- Step 1: The area of a circle is $$\\pi r^2$$ — you must include the square on the $$r$$.\n- Step 2: The common mistake is writing $$\\pi r$$ (forgetting the square). $$\\pi r$$ is not an area at all; it has units of length, not length². The square is what converts a one-dimensional radius into a two-dimensional area.\n\nThe square on $$r$$ is non-negotiable — without it, the formula is dimensionally wrong.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"q
