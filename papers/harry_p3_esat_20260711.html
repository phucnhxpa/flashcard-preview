uestion": "ESAT warm-up — What is the surface area formula for a sphere of radius $$R$$, and how should you think about what it represents? (2 steps)", "answer": "- Step 1: The surface area of a sphere is $$4\\pi R^2$$. This covers the entire outside of the 3-D shape.\n- Step 2: Intuition — a sphere is the 3-D analogue of a circle. If a circle's area is $$\\pi r^2$$, then the sphere's total \"wrapping\" scales similarly but with the factor 4 (four hemispheres, or equivalently the integral of all infinitesimal surface patches). The key: don't forget the square on $$R$$.\n\nPhuc first wrote $$4\\pi r$$ (no square) and then said \"I forget this one.\" This formula must be learned cold.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "ESAT warm-up — How do you derive the curved-surface area of a closed cylinder of radius $$r$$ and height $$h$$? What is the common mistake with the rectangle's length? (3 steps)", "answer": "- Step 1: Imagine unrolling the curved side of the cylinder. It flattens into a rectangle.\n- Step 2: One side of that rectangle is the height $$h$$. The other side is the circumference of the circular base, $$2\\pi r$$ — NOT the diameter $$2r$$. Phuc incorrectly said \"diameter.\"\n- Step 3: Curved-surface area = $$h \\times 2\\pi r = 2\\pi r h$$.\n\nThe circumference $$2\\pi r$$ is the length you need because the rectangle wraps all the way around the circle — that's the full perimeter, not just the width.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "ESAT warm-up — What is the total surface area of a closed cylinder (including both flat ends and the curved side), and why must you include two circular ends? (3 steps)", "answer": "- Step 1: A closed cylinder has two flat circular ends (top and bottom), each of area $$\\pi r^2$$. Together: $$2\\pi r^2$$.\n- Step 2: The curved side unrolls to a rectangle of area $$2\\pi r h$$.\n- Step 3: Total surface area = $$2\\pi r^2 + 2\\pi r h$$.\n\nPhuc initially wrote only one $$\\pi r^2$$ (one circular end). A *closed* cylinder seals both ends — that's what \"closed\" means. If it were open-topped, you'd use $$\\pi r^2 + 2\\pi r h$$.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "ESAT warm-up — What is the volume of a cylinder, and how do you distinguish it from the surface area formula? (2 steps)", "answer": "- Step 1: Volume of a cylinder = $$\\pi r^2 h$$. This is cross-sectional area × height (the prism formula).\n- Step 2: Phuc offered $$\\pi r^2 h$$ when asked for surface area — he confused volume with surface area. The surface area is $$2\\pi r^2 + 2\\pi r h$$ (a sum of areas, no multiplication by $$h$$ on the $$\\pi r^2$$ terms).\n\nMental check: volume has units of length³ (one $$r^2$$ times $$h$$); surface area has units of length² (sum of flat and curved patches).", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "ESAT warm-up — When the problem says \"the surface area of a sphere equals the total surface area of 10 closed cylinders,\" what word equation do you write down FIRST before substituting anything? (2 steps)", "answer": "- Step 1: Write the word equation: (surface area of sphere) = 10 × (surface area of one cylinder).\n- Step 2: Then translate each phrase into its formula: $$4\\pi R^2 = 10(2\\pi r^2 + 2\\pi r h)$$.\n\nThe word equation is your bridge from English to algebra. It forces you to identify every component (sphere vs. cylinder, one cylinder vs. ten) before you touch any symbols. Phuc wrote an incomplete equation missing one circular end — the word equation would have caught that.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "ESAT warm-up — After setting up $$4\\pi R^2 = 10(2\\pi r^2 + 2\\pi r h)$$ and being told $$h = 4R$$, what algebraic simplification should you do immediately, and why? (3 steps)", "answer": "- Step 1: Substitute $$h = 4R$$: $$4\\pi R^2 = 10(2\\pi r^2 + 2\\pi r \\cdot 4R) = 10(2\\pi r^2 + 8\\pi r R) = 20\\pi r^2 + 80\\pi r R$$.\n- Step 2: Divide the entire equation by $$4\\pi$$ (every term contains $$4\\pi$$ as a factor): $$R^2 = 5r^2 + 20rR$$.\n- Step 3: Rearrange into a standard quadratic in $$R$$: $$R^2 - 20rR - 5r^2 = 0$$.\n\nDividing by the common factor early keeps the algebra clean and reduces the risk of arithmetic errors in the quadratic formula.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "ESAT warm-up — After forming the quadratic $$R^2 - 20rR - 5r^2 = 0$$, you apply the quadratic formula. Why must you take only the positive root, and what does the negative root represent? (2 steps)", "answer": "- Step 1: The quadratic formula gives $$R = r(10 \\pm \\sqrt{105})$$. The negative root gives $$R = r(10 - \\sqrt{105})$$, which is negative since $$\\sqrt{105} \\approx 10.25 > 10$$.\n- Step 2: A radius is a physical length and must be positive. The negative root is mathematically valid for the equation but physically meaningless, so reject it.\n\nAlways sanity-check roots against the physical context of the problem. $$R = r(10 + \\sqrt{105})$$ is the only admissible answer.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "Q2(a) IVT — When asked to show that $$f(x) = 0$$ has a root in the interval $$[1, 2]$$, what TWO things must you state to earn full marks? What happens if you omit one? (3 steps)", "answer": "- Step 1: **Sign change** — substitute the actual endpoints $$f(1)$$ and $$f(2)$$, show one is positive and the other negative.\n- Step 2: **Continuity** — explicitly state that $$f$$ is continuous on $$[1, 2]$$ (check that the function is defined for all $$x$$ in the interval; here $$x \\neq 0$$ causes no problem on $$[1,2]$$).\n- Step 3: Conclude: by the sign change and continuity, there exists a root $$\\alpha \\in [1, 2]$$.\n\nHarry's verbatim warning: \"The bit that everyone forgets is to mention that continuity. You must remember sign change and continuity. Otherwise you'll only score one mark.\" Omitting continuity loses a mark even if the sign change is correct.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": true}, {"question": "Q2(a) IVT — When substituting endpoints for the sign change, should you use values \"near\" the endpoints or the exact endpoints themselves? Why? (2 steps)", "answer": "- Step 1: Use the exact endpoints given in the interval — here $$x = 1$$ and $$x = 2$$, not values like 1.01 or 1.99.\n- Step 2: The Intermediate Value Theorem requires the sign change to occur *at the endpoints of the closed interval*. Substituting nearby values doesn't prove anything about the interval $$[1, 2]$$ — the root could lie between your \"near\" value and the actual endpoint.\n\nThe interval is your evidence. Use it precisely.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "Q2(b) — When rearranging $$f(x) = 0$$ to reach a target form, what is Harry's strategic principle for choosing your next algebraic move? (2 steps)", "answer": "- Step 1: **Look at the target form first** — it tells you what structure you're aiming for. The cube root in the target means you'll eventually cube-root both sides; the $$(2x+3)$$ in the denominator tells you to factor $$(2x+3)$$ out of the left side.\n- Step 2: Work backwards from the target to plan your moves, then execute forwards. Don't just multiply out and hope — Phuc tried that and got stuck.\n\nThe target is your roadmap. Before expanding anything, ask: \"what factor or operation does the target reveal?\"", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "Q2(b) — In the rearrangement from $$f(x) = 0$$ to the cube-root form, what is the key factorisation step that unlocks the solution, and how does the target clue you in? (3 steps)", "answer": "- Step 1: After multiplying by $$e^x x^2$$ and expanding, you reach $$2x^4 + 3x^3 = e^x + 4x^2$$.\n- Step 2: The target has $$(2x + 3)$$ in the denominator. This tells you to factor $$x^3(2x + 3)$$ from the left side: $$x^3(2x + 3) = e^x + 4x^2$$.\n- Step 3: Divide both sides by $$(2x + 3)$$ to isolate $$x^3$$, then cube-root both sides to reach the target.\n\nThe denominator $$(2x + 3)$$ in the target is the structural clue that $$(2x + 3)$$ must be factored out. Without this insight, you're lost in a sea of terms.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "Q2(b) — Why does the cube root appear in the final answer, and what operation produces it? (2 steps)", "answer": "- Step 1: After dividing by $$(2x + 3)$$, you have $$x^3 = \\frac{e^x + 4x^2}{2x + 3}$$. The variable $$x$$ is raised to the power 3.\n- Step 2: To isolate $$x$$, you cube-root both sides: $$x = \\sqrt[3]{\\frac{e^x + 4x^2}{2x + 3}}$$. The cube root is simply the inverse operation of cubing.\n\nWhenever the target form contains a root, ask: what power was applied to $$x$$, and what inverse operation undoes it?", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "Q3(a) — When the question says \"a graph of $$\\log_{10} V$$ against $$t$$,\" which variable goes on which axis? What was Phuc's mistake? (2 steps)", "answer": "- Step 1: \"$$\\log_{10} V$$ against $$t$$\" means the y-axis is $$\\log_{10} V$$ and the x-axis is $$t$$. The variable after \"against\" is always the x-axis (independent variable).\n- Step 2: Phuc tried to use $$V$$ (or $$y$$) as the vertical variable. The y-axis is NOT $$V$$ — it is $$\\log_{10} V$$. Writing $$V$$ on the y-axis would give the wrong gradient and intercept.\n\nThe word \"against\" is your axis-assignment instruction. Parse it carefully.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "Q3(b) — After finding $$\\log_{10} V = 0.05t + 2$$, how do you convert this into the form $$V = ab^t$$? What is the key index-law step? (3 steps)", "answer": "- Step 1: Raise 10 to both sides: $$V = 10^{0.05t + 2}$$.\n- Step 2: Use the index law $$10^{p+q} = 10^p \\times 10^q$$: $$V = 10^{0.05t} \\times 10^2 = 100 \\times 10^{0.05t}$$.\n- Step 3: Rewrite $$10^{0.05t} = (10^{0.05})^t$$ using $$(a^m)^n = a^{mn}$$. So $$V = 100 \\times (10^{0.05})^t$$, giving $$a = 100$$, $$b = 10^{0.05}$$.\n\nThe critical insight: $$10^{0.05t}$$ is NOT $$(10^{0.05})^t$$ until you apply the power-of-a-power law. This is what converts the linear-in-$$t$$ exponent into the $$b^t$$ form.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "Q3(b) — The exact base is $$b = 10^{0.05}$$, which rounds to 1.12 (3 s.f.). When should you use the exact value vs. the rounded value, and why? (2 steps)", "answer": "- Step 1: Use the rounded value $$b = 1.12$$ only for *reporting* the answer to part (b), since the question asks for $$b$$ to 3 s.f.\n- Step 2: For *differentiation* in part (c), you MUST carry the exact base $$10^{0.05}$$. Differentiating the rounded model $$V = 100(1.12)^t$$ gives $$T \\approx 13.10$$, while the exact model gives $$T \\approx 12.76$$. Both round to 13 here, but that's luck — rounding before differentiating introduces systematic error and is not appropriately exact.\n\nRound only at the final answer of each part. Never round a parameter that feeds into a later calculation.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "Q3(c) — When a question says \"the rate of increase is £50/year,\" what mathematical operation does \"rate\" trigger, and what does \"increase\" tell you about the sign? (2 steps)", "answer": "- Step 1: \"Rate\" triggers differentiation. \"Rate of increase of $$V$$\" means $$\\frac{dV}{dt}$$.\n- Step 2: \"Increase\" tells you the rate is positive: $$\\frac{dV}{dt} = +50$$, not $$-50$$. Phuc initially suggested an \"arithmetic series\" — that is a complete misread. The word \"rate\" in a calculus paper always means derivative.\n\nThe trap: seeing \"£50/year\" and thinking of simple additive sequences. In a modelling context with $$V = ab^t$$, \"rate\" is the derivative, not a common difference.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "Q3(c) — What is the derivative rule for $$\\frac{d}{dx}(a^{kx})$$, and how does the chain rule produce the extra factor? (3 steps)", "answer": "- Step 1: Start from the base case: $$\\frac{d}{dx}(a^x) = a^x \\ln a$$. This comes from writing $$a^x = e^{x \\ln a}$$ and differentiating: $$\\frac{d}{dx} e^{x \\ln a} = \\ln a \\cdot e^{x \\ln a} = a^x \\ln a$$.\n- Step 2: For $$a^{kx}$$, apply the chain rule: let $$u = kx$$, so $$\\frac{d}{dx}(a^{kx}) = \\frac{d}{du}(a^u) \\cdot \\frac{du}{dx} = a^u \\ln a \\cdot k = a^{kx} \\cdot k \\ln a$$.\n- Step 3: The factor $$k$$ comes from the chain rule (derivative of the inner function $$kx$$). The factor $$\\ln a$$ comes from converting the exponential base from $$a$$ to $$e$$.\n\nResult: $$\\frac{d}{dx}(a^{kx}) = a^{kx} \\cdot k \\ln a$$.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": true}, {"question": "Q3(c) — What is the common mistake when differentiating $$a^{kx}$$, and why is $$\\ln(kx)$$ wrong? (2 steps)", "answer": "- Step 1: The common mistake is writing $$\\frac{d}{dx}(a^{kx}) = a^{kx} \\ln(kx)$$ instead of $$a^{kx} \\cdot k \\ln a$$.\n- Step 2: $$\\ln(kx)$$ is wrong because the logarithm applies to the *base* $$a$$ (converting $$a^{kx} = e^{kx \\ln a}$$), not to the exponent $$kx$$. The $$k$$ comes from differentiating the inner function, and $$\\ln a$$ comes from rewriting the base — these are two separate contributions that multiply, not a single $$\\ln(kx)$$.\n\nPhuc differentiated $$3^{6x}$$ and wrote something involving $$\\ln(6x)$$ — this is the exact trap. The correct answer is $$3^{6x} \\cdot 6 \\ln 3$$.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "Quick drill — Differentiate $$3^x$$ exactly. (1 step)", "answer": "- Step 1: Using $$\\frac{d}{dx}(a^x) = a^x \\ln a$$ with $$a = 3$$: $$\\frac{d}{dx}(3^x) = 3^x \\ln 3$$.\n\nNo chain-rule factor needed because the exponent is just $$x$$ (i.e., $$k = 1$$).", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "Quick drill — Differentiate $$3^{6x}$$ exactly. What factor does the chain rule contribute? (2 steps)", "answer": "- Step 1: Using $$\\frac{d}{dx}(a^{kx}) = a^{kx} \\cdot k \\ln a$$ with $$a = 3$$, $$k = 6$$: $$\\frac{d}{dx}(3^{6x}) = 3^{6x} \\cdot 6 \\ln 3$$.\n- Step 2: The chain rule contributes the factor of 6 (derivative of the inner function $$6x$$). This is NOT $$\\ln(6x)$$ — Phuc's error. The 6 is a multiplicative constant from the chain rule, and $$\\ln 3$$ comes from the base conversion.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "Quick drill — Differentiate $$5^{2x}$$ exactly. (1 step)", "answer": "- Step 1: $$\\frac{d}{dx}(5^{2x}) = 5^{2x} \\cdot 2 \\ln 5$$. Here $$a = 5$$, $$k = 2$$: the chain rule brings down the 2, and the base conversion gives $$\\ln 5$$.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "Quick drill — Differentiate $$1.12^t$$ exactly. (1 step)", "answer": "- Step 1: $$\\frac{d}{dt}(1.12^t) = 1.12^t \\ln(1.12)$$. Here $$a = 1.12$$, $$k = 1$$, so no extra chain-rule factor — just the base-case formula $$a^t \\ln a$$.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "Q4(a) — When expressing $$a \\sin \\theta + b \\cos \\theta$$ in the form $$R \\sin(\\theta - \\alpha)$$, what is the first algebraic step and why? (3 steps)", "answer": "- Step 1: Expand $$R \\sin(\\theta - \\alpha)$$ using the compound-angle formula from the formula book: $$R \\sin(\\theta - \\alpha) = R \\sin \\theta \\cos \\alpha - R \\cos \\theta \\sin \\alpha$$.\n- Step 2: Group by $$\\sin \\theta$$ and $$\\cos \\theta$$: $$= (R \\cos \\alpha)\\sin \\theta - (R \\sin \\alpha)\\cos \\theta$$.\n- Step 3: Equate coefficients with the original expression $$a \\sin \\theta + b \\cos \\theta$$: $$R \\cos \\alpha = a$$ and $$R \\sin \\alpha = b$$.\n\nThis gives you two equations in two unknowns ($$R$$ and $$\\alpha$$), which you solve by dividing (for $$\\alpha$$) and squaring-and-adding (for $$R$$).", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "Q4(a) — To find the exact value of $$R$$ in the R-form, why must you use \"square and add\" instead of substituting a decimal $$\\alpha$$? (3 steps)", "answer": "- Step 1: Square and add: $$(R \\cos \\alpha)^2 + (R \\sin \\alpha)^2 = a^2 + b^2$$, so $$R^2(\\cos^2 \\alpha + \\sin^2 \\alpha) = a^2 + b^2$$, giving $$R = \\sqrt{a^2 + b^2}$$ exactly.\n- Step 2: If you find $$\\alpha$$ as a decimal first and then compute $$R = \\frac{a}{\\cos \\alpha}$$, you introduce rounding error at the $$\\alpha$$ stage, which propagates into $$R$$. Harry warned: \"Your method could be quite dangerous.\"\n- Step 3: For an \"exact value\" question, the mark scheme requires an exact method. Squaring-and-adding eliminates $$\\alpha$$ entirely and gives $$R$$ exactly from the original coefficients.\n\nNever substitute a rounded angle into a formula when an exact method is available.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "Q4(a) — To find the exact value of $$\\alpha$$ in the R-form, what operation do you perform on the two equated-coefficient equations, and why is $$\\tan^{-1}$$ preferred over $$\\sin^{-1}$$? (3 steps)", "answer": "- Step 1: Divide the two equations: $$\\frac{R \\sin \\alpha}{R \\cos \\alpha} = \\frac{b}{a}$$, so $$\\tan \\alpha = \\frac{b}{a}$$, giving $$\\alpha = \\tan^{-1}\\!\\left(\\frac{b}{a}\\right)$$.\n- Step 2: Using $$\\sin^{-1}$$ instead (e.g., $$\\alpha = \\sin^{-1}\\!\\left(\\frac{b}{R}\\right)$$) requires you to already know $$R$$, which may carry rounding error if computed as a decimal. Also, $$\\sin^{-1}$$ can't distinguish between $$\\alpha$$ and $$\\pi - \\alpha$$ in the wrong quadrant.\n- Step 3: $$\\tan^{-1}$$ uses only the original coefficients $$a$$ and $$b$$ (both given exactly), and the quadrant of $$\\alpha$$ is determined by the signs of $$a$$ and $$b$$. It is the safer, more direct route.\n\nPhuc used $$\\sin^{-1}$$ — Harry corrected him to use $$\\tan^{-1}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "Q4(a) — When computing $$\\alpha$$ on your calculator for an R-form question, what two calculator-mode pitfalls must you avoid? (2 steps)", "answer": "- Step 1: **Radians mode** — trig questions in A-level maths almost always require radians. If your calculator is in degrees, $$\\tan^{-1}$$ will give a wrong value.\n- Step 2: **Use $$\\tan^{-1}$$, not $$\\sin^{-1}$$** — Phuc reached for $$\\sin^{-1}$$. The $$\\tan^{-1}$$ method uses only the given coefficients and avoids quadrant ambiguity.\n\nBefore any trig calculation, check: is your calculator in radians? It should be the default for P3.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "Q4(b)(i) — When minimising a fraction $$g(x) = \\frac{\\text{positive constant}}{\\text{expression involving } \\sin}$$, what principle do you use, and why? (3 steps)", "answer": "- Step 1: The numerator is a fixed positive number (18 in this case). A fraction with a fixed positive numerator gets *smaller* when its denominator gets *larger*.\n- Step 2: So to minimise $$g(x)$$, you *maximise* the denominator. The denominator contains a sine term: $$2\\sqrt{3}\\sin\\!\\left(6x - \\frac{\\pi}{3}\\right) + 4\\sqrt{3}$$.\n- Step 3: The sine function has maximum value 1. Set $$\\sin\\!\\left(6x - \\frac{\\pi}{3}\\right) = 1$$, substitute into the denominator, and compute the minimum of $$g$$.\n\nThis \"flip\" — minimise the whole by maximising the part — is the key strategic insight. Never try to differentiate the fraction to find its minimum when the numerator is a constant; the sine-max approach is cleaner and exact.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "Q4(b)(i) — After finding the minimum of $$g(x)$$ as $$\\frac{18}{6\\sqrt{3}} = \\frac{3}{\\sqrt{3}}$$, what final simplification step is needed, and why? (2 steps)", "answer": "- Step 1: $$\\frac{3}{\\sqrt{3}}$$ has a surd in the denominator. Rationalise by multiplying top and bottom by $$\\sqrt{3}$$: $$\\frac{3}{\\sqrt{3}} \\times \\frac{\\sqrt{3}}{\\sqrt{3}} = \\frac{3\\sqrt{3}}{3} = \\sqrt{3}$$.\n- Step 2: The question asks for the *exact* minimum. $$\\sqrt{3}$$ is exact; $$\\frac{3}{\\sqrt{3}}$$ is also mathematically correct but not in simplest rationalised form. Exam mark schemes typically expect rationalised denominators.\n\nThe minimum value of $$g(x)$$ is $$\\sqrt{3}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "Q4(b)(ii) — To find the smallest positive $$x$$ where the minimum occurs, you set $$\\sin\\!\\left(6x - \\frac{\\pi}{3}\\right) = 1$$. What is the principal solution, and how do you confirm it gives the *smallest* $$x$$? (3 steps)", "answer": "- Step 1: $$\\sin \\theta = 1$$ when $$\\theta = \\frac{\\pi}{2}$$ (the principal solution). So $$6x - \\frac{\\pi}{3} = \\frac{\\pi}{2}$$.\n- Step 2: Solve: $$6x = \\frac{\\pi}{2} + \\frac{\\pi}{3} = \\frac{5\\pi}{6}$$, so $$x = \\frac{5\\pi}{36}$$.\n- Step 3: The general solution is $$6x - \\frac{\\pi}{3} = \\frac{\\pi}{2} + 2n\\pi$$. For $$n = 1$$, $$x = \\frac{5\\pi}{36} + \\frac{2\\pi}{6} = \\frac{17\\pi}{36}$$, which is larger. So $$x = \\frac{5\\pi}{36}$$ is the smallest positive value.\n\nHarry sketched a sine wave to visually confirm that the next solution (one full period later) is indeed larger. A quick sketch is a reliable sanity check.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "Q5(a) — When evaluating $$N = \\frac{4000e^0}{19 + e^0}$$ at $$t = 0$$, what is the trap with $$e^0$$, and how do you avoid it? (2 steps)", "answer": "- Step 1: $$e^0 = 1$$, NOT 0. So the numerator is $$4000 \\times 1 = 4000$$, and the denominator is $$19 + 1 = 20$$, giving $$N = 200$$.\n- Step 2: The trap is writing the denominator as just 19 (forgetting the \"+1\" from $$e^0$$). Harry's warning: \"Be careful not to lose the one.\" This is especially easy to miss when the other term in the denominator (19) dominates your attention.\n\nAlways explicitly write $$e^0 = 1$$ as a sub-step rather than jumping straight to the simplified fraction.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "Q5(b) — When applying the quotient rule $$\\left(\\frac{u}{v}\\right)' = \\frac{vu' - uv'}{v^2}$$, what is the critical sign pitfall, and why is the quotient rule preferred over rewriting as $$u \\cdot v^{-1}$$? (3 steps)", "answer": "- Step 1: The minus sign in $$vu' - uv'$$ is the pitfall. Phuc dropped it. The formula book has the minus sign — read it from there if unsure.\n- Step 2: If you rewrite $$\\frac{u}{v} = u \\cdot v^{-1}$$ and use the product rule, you get $$u' v^{-1} + u \\cdot (-1)v^{-2} \\cdot v' = \\frac{u'}{v} - \\frac{uv'}{v^2} = \\frac{vu' - uv'}{v^2}$$. This works but introduces more steps and more places to drop the minus sign from the $$(-1)$$ exponent.\n- Step 3: Harry's advice: the quotient rule is safer for this shape and is in the formula book. Use it directly rather than converting to a product rule problem.\n\nThe minus sign is the single most common error in quotient-rule questions. Write the formula down from the book before substituting.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": false}, {"question": "Q5(b) — In the quotient-rule application for $$N = \\frac{4000e^{0.1t}}{19 + e^{0.2t}}$$, after expanding the numerator you get terms like $$e^{0.1t} \\cdot e^{0.2t}$$. What index law simplifies this? (2 steps)", "answer": "- Step 1: $$e^{0.1t} \\cdot e^{0.2t} = e^{0.1t + 0.2t} = e^{0.3t}$$. When multiplying exponentials with the same base, add the exponents.\n- Step 2: This appears in both the $$vu'$$ and $$uv'$$ terms of the quotient rule. Collecting like terms: $$400e^{0.3t} - 800e^{0.3t} = -400e^{0.3t}$$. The minus sign from the quotient rule makes these terms subtract rather than add.\n\nThe combined exponent $$0.3t$$ is not a separate phenomenon — it's simply the sum of the two original exponents.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "Q5(c) — When finding the maximum of $$N(t)$$, you set $$\\frac{dN}{dt} = 0$$. The derivative has the form $$\\frac{\\text{numerator}}{(19 + e^{0.2t})^2}$$. Why can you ignore the denominator? (2 steps)", "answer": "- Step 1: A fraction equals zero if and only if its numerator equals zero (provided the denominator is non-zero). $$(19 + e^{0.2t})^2$$ is a square of a real number, so it is always positive and never zero.\n- Step 2: Therefore, setting $$\\frac{dN}{dt} = 0$$ reduces to setting only the numerator equal to zero: $$7600e^{0.1T} - 400e^{0.3T} = 0$$.\n\nThis simplification — ignoring a squared denominator that can never vanish — is standard for quotient-rule maxima/minima. Always check the denominator can't be zero before discarding it.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": false}, {"question": "Q5(c) — After setting the numerator $$7600e^{0.1T} - 400e^{0.3T} = 0$$, you factor out $$e^{0.1T}$$. Why can you reject $$e^{0.1T} = 0$$ as a solution? (2 steps)", "answer": "- Step 1: Factor: $$e^{0.1T}(7600 - 400e^{0.2T}) = 0$$. So either $$e^{0.1T} = 0$$ or $$7600 - 400e^{0.2T} = 0$$.\n- Step 2: $$e^{0.1T} > 0$$ for all real $$T$$. The exponential function $$e^x$$ is always strictly positive — it never touches zero. Harry sketched $$y = e^x$$ to emphasise this. So $$e^{0.1T} = 0$$ has no solution; reject it.\n\nThis leaves $$7600 - 400e^{0.2T} = 0$$, giving $$e^{0.2T} = 19$$.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": false}, {"question": "Q5(c) — The question says \"show that $$e^{0.2T} = A$$\" and you find $$A = 19$$. What command-word trap must you avoid here? (2 steps)", "answer": "- Step 1: \"Show that\" means you must stop at the line $$e^{0.2T} = 19$$. Do NOT go on to solve for $$T$$ by taking logs — that belongs in part (d).\n- Step 2: Phuc pushed on to solve for $$T$$ and also used $$\\log$$ (base 10) instead of $$\\ln$$. The base is $$e$$, so when you do eventually solve (in part d), you must use $$\\ln$$, not $$\\log_{10}$$.\n\nRead the command word: \"show that X\" means demonstrate X and stop. The next part will ask you to use X.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "Q5(c)/(d) — When solving $$e^{0.2T} = 19$$ for $$T$$, should you use $$\\log_{10}$$ or $$\\ln$$? How do you decide? (2 steps)", "answer": "- Step 1: The base of the exponential is $$e$$, so use $$\\ln$$ (the logarithm with base $$e$$). Taking $$\\ln$$ of both sides: $$0.2T = \\ln 19$$, so $$T = \\frac{\\ln 19}{0.2}$$.\n- Step 2: Using $$\\log_{10}$$ would give $$0.2T \\cdot \\log_{10} e = \\log_{10} 19$$, which is correct but unnecessarily complicated and error-prone. Phuc initially wrote $$\\log$$ (base 10) — Harry corrected him to use $$\\ln$$.\n\nRule: if the exponential base is $$e$$, use $$\\ln$$; if it's 10, use $$\\log_{10}$$. Match the log to the base.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": false}, {"question": "Q5(d) — When substituting back to find the maximum number of squirrels, what is the trick for computing $$e^{0.1T}$$ without finding $$T$$ first? (3 steps)", "answer": "- Step 1: You know $$e^{0.2T} = 19$$. Notice that $$e^{0.1T} = (e^{0.2T})^{1/2} = \\sqrt{e^{0.2T}} = \\sqrt{19}$$.\n- Step 2: The denominator is $$19 + e^{0.2T} = 19 + 19 = 38$$.\n- Step 3: So $$N = \\frac{4000\\sqrt{19}}{38}$$. This avoids computing $$T$$ at all for part (d), keeping everything exact until the final rounding.\n\nThis exponent-halving trick — using $$(e^{2k})^{1/2} = e^k$$ — is cleaner than finding $$T$$, substituting a decimal, and introducing rounding error.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": false}, {"question": "Q5(d) — What is Harry's rule about when to round, and what mistake does it prevent? (2 steps)", "answer": "- Step 1: Round only at the very final answer. Use the stored (unrounded) calculator value of $$T$$ when substituting back — never a rounded intermediate value.\n- Step 2: Phuc rounded $$T$$ before substituting back. If you round $$T \\approx 14.72$$ to 15 and then compute $$N$$, you get a noticeably different answer. The stored value preserves full precision.\n\nTechnique: after computing $$T = \\frac{\\ln 19}{0.2}$$, press Ans or store it, then use that stored value in the $$N$$ formula. Only round the final $$N = 459$$ to the nearest whole number.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": false}, {"question": "Q5(d) — The final answer is 459 squirrels. One analysis segment recorded \"959.\" What principle should you follow when your working gives a different answer from a remembered/recorded value? (2 steps)", "answer": "- Step 1: Trust the mathematics. $$\\frac{4000\\sqrt{19}}{38} = 458.83\\ldots \\to 459$$. The \"959\" was a transcription error (the denominator was also mis-copied as $$19 + e^{0.1t}$$ instead of $$19 + e^{0.2t}$$).\n- Step 2: When evidence conflicts, re-derive from the original model. The official model $$N = \\frac{4000e^{0.1t}}{19 + e^{0.2t}}$$ with $$e^{0.2T} = 19$$ unambiguously gives 459. Don't override your correct working with a garbled alternative.\n\nIf your derivation is clean and matches the question paper, trust it over conflicting notes.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": false}, {"question": "General exam technique — Harry identified formula recall as Phuc's \"main gap.\" What specific action did he prescribe, and how many papers did he recommend for fluency? (2 steps)", "answer": "- Step 1: Build flashcards for the ESAT \"cheat sheet\" formulae (sphere SA, cylinder SA, circle area, circumference, etc.) so that learning formulae becomes automatic. Harry: \"Learning formulae is something your flashcards could really help with.\"\n- Step 2: Do 8 to 10 full past papers to build fluency so the formulae \"become second nature.\" Volume of practice is the path from \"I forget this one\" to instant recall.\n\nFormula gaps cost marks across multiple question types. Fix them systematically, not per-question.", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": false}, {"question": "General exam technique — Harry warned about the \"show that\" command word. What does it mean, and what is the trap? (2 steps)", "answer": "- Step 1: \"Show that X\" means: derive X using correct working, and stop at X. You are demonstrating that X follows from the given information.\n- Step 2: The trap is going beyond X — e.g., solving for a variable, computing a numerical answer, or doing the next part's work. In Q5(c), \"show that $$e^{0.2T} = 19$$\" means stop there; don't solve for $$T$$. In Q2(a), \"show there is a root in [1,2]\" means give the IVT argument and conclude — don't find the root.\n\nOver-answering a \"show that\" wastes time and can lose the method mark if you skip the logical step that proves the required statement.", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": false}, {"question": "Q4(a) evidence conflict — One analysis segment recorded the coefficients as $$3\\sin 2x - 4\\cos 2x$$ (giving $$R = 5$$, $$\\alpha = 0.927$$), while the official paper has $$3\\sin 2x - \\sqrt{3}\\cos 2x$$. Which source is authoritative, and why? (2 steps)", "answer": "- Step 1: The official question paper is authoritative. It states $$f(x) = 3\\sin 2x - \\sqrt{3}\\cos 2x$$, giving $$R = 2\\sqrt{3}$$, $$\\alpha = \\frac{\\pi}{3}$$.\n- Step 2: The \"$$R = 5$$\" version is a transcription error from the video analysis. When any secondary source contradicts the official paper, always defer to the paper. This is why Harry emphasises using the actual paper, not notes about the paper.\n\nIf your R-form working gives a \"nice\" answer like $$R = 5$$ but the question asks for exact values involving $$\\sqrt{3}$$, double-check the original coefficients.", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": false}, {"question": "Q2(c) iteration — This part was explicitly skipped. When you eventually complete it, what three practical rules should you follow for iterative sequences? (3 steps)", "answer": "- Step 1: Keep your calculator in the correct mode (radians for trig iterations).\n- Step 2: Do not round intermediate iterates — use the Ans key or stored value to feed $$x_n$$ into the formula for $$x_{n+1}$$.\n- Step 3: Quote both $$x_3$$ and $$\\alpha$$ (the limit) each to 4 decimal places. The question specifies the precision; match it exactly.\n\nIteration is a calculator technique, but the marks come from correct setup and correct reporting of values at the specified precision.", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": false}, {"question": "Q3(c) — Why is the $$a^{kx}$$ derivative rule derived from rewriting $$a^{kx} = e^{kx \\ln a}$$? Walk through the intuition. (3 steps)", "answer": "- Step 1: We know how to differentiate $$e^{\\text{something}}$$: $$\\frac{d}{dx}(e^u) = e^u \\cdot u'$$. But we don't directly know how to differentiate $$a^{kx}$$ for arbitrary base $$a$$.\n- Step 2: Convert to base $$e$$: $$a^{kx} = e^{kx \\ln a}$$ (since $$a = e^{\\ln a}$$, so $$a^{kx} = (e^{\\ln a})^{kx} = e^{kx \\ln a}$$). Now the base is $$e$$, which we can differentiate.\n- Step 3: Differentiate: $$\\frac{d}{dx}(e^{kx \\ln a}) = e^{kx \\ln a} \\cdot k \\ln a = a^{kx} \\cdot k \\ln a$$. The $$k\\ln a$$ factor has two parts: $$k$$ from the chain rule (derivative of $$kx$$), and $$\\ln a$$ from the base conversion (the \"cost\" of switching from base $$a$$ to base $$e$$).\n\nThis derivation shows why the answer is $$a^{kx} \\cdot k \\ln a$$ and not $$a^{kx} \\cdot \\ln(kx)$$ — the logarithm acts on the base, not the exponent.", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": true}, {"question": "Q4(b)(i) — Why is minimising a fraction with a constant positive numerator equivalent to maximising its denominator? Explain with a simple numerical example. (3 steps)", "answer": "- Step 1: For a fraction $$\\frac{c}{d}$$ where $$c > 0$$ is fixed, the value of the fraction decreases as $$d$$ increases. Example: $$\\frac{18}{6} = 3$$, $$\\frac{18}{9} = 2$$, $$\\frac{18}{18} = 1$$.\n- Step 2: In Q4(b), the numerator is 18 (fixed, positive) and the denominator contains a sine term that varies. To make the fraction as small as possible, make the denominator as large as possible.\n- Step 3: This \"flip\" principle only works when the numerator is a *fixed positive* constant. If the numerator were variable or negative, the relationship between numerator and fraction value would be different.\n\nThis is a strategic shortcut: instead of differentiating the whole fraction, you only need to find the maximum of the denominator — a much simpler problem.", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": true}, {"question": "ESAT warm-up — When the problem gives a relationship like $$h = 4R$$ connecting two variables, at what stage of the solution should you substitute it, and why? (2 steps)", "answer": "- Step 1: Substitute the relationship *after* writing the full word equation with all formulae, but *before* solving. First write $$4\\pi R^2 = 10(2\\pi r^2 + 2\\pi r h)$$, then substitute $$h = 4R$$.\n- Step 2: Substituting too early (before the word equation) risks forgetting a term. Substituting too late (after attempting to solve in two variables) makes the algebra harder. The sweet spot: full equation first, then reduce variables.\n\nThe substitution $$h = 4R$$ converts a two-variable equation into a single-variable quadratic in $$R$$, which is solvable.", "source": "GLM 5.1 ①", "_id": "glm_1_46", "judge_pick": false}, {"question": "Q5(b) — When computing the quotient-rule derivative, Harry advised reading the formula from the formula book. What is the full formula, and where exactly does the minus sign appear? (2 steps)", "answer": "- Step 1: The quotient rule: if $$y = \\frac{u}{v}$$, then $$\\frac{dy}{dx} = \\frac{v \\frac{du}{dx} - u \\frac{dv}{dx}}{v^2}$$.\n- Step 2: The minus sign is between the two terms in the numerator: $$v \\cdot u'$$ MINUS $$u \\cdot v'$$. It is NOT a plus sign. Phuc dropped this minus, which flipped the sign of the entire numerator and would have given a wrong answer for the maximum.\n\nThe formula book has this formula. When in doubt, open the book and copy it verbatim — don't rely on memory for the sign.", "source": "GLM 5.1 ①", "_id": "glm_1_47", "judge_pick": false}, {"question": "Q3(a) — When finding the equation of a straight line through two points $$(x_1, y_1)$$ and $$(x_2, y_2)$$ on a log-linear graph, what is the gradient formula, and what was the calculation for the points $$(0, 2)$$ and $$(5, 2.25)$$? (2 steps)", "answer": "- Step 1: Gradient $$m = \\frac{y_2 - y_1}{x_2 - x_1} = \\frac{2.25 - 2}{5 - 0} = \\frac{0.25}{5} = 0.05$$. The intercept $$c$$ is the y-value when $$x = 0$$, so $$c = 2$$.\n- Step 2: The equation is $$\\log_{10} V = 0.05t + 2$$. Note: the y-values are $$\\log_{10} V$$, not $$V$$ itself. Reading the axes correctly (see Q14) is the prerequisite for this calculation.\n\nThe gradient 0.05 is small because the share price grows slowly — a 25% log-increase over 5 years corresponds to roughly 5% per year in log terms.", "source": "GLM 5.1 ①", "_id": "glm_1_48", "judge_pick": false}, {"question": "Q3(c) — After differentiating $$V = 100 \\times 10^{0.05t}$$ and setting $$\\frac{dV}{dt} = 50$$, why does the question say \"solutions relying entirely on calculator technology are not acceptable\"? What must you show? (2 steps)", "answer": "- Step 1: You must show the algebraic steps: write down the derivative using the $$a^{kx}$$ rule, set it equal to 50, isolate $$10^{0.05T}$$, and solve using logarithms. Simply typing the equation into a solver earns no method marks.\n- Step 2: The working must include: (i) the derivative formula applied correctly, (ii) the equation set up, (iii) logarithmic solving with $$\\log_{10}$$ or $$\\ln$$. Each step is a method mark; skipping to the answer loses them all.\n\n\"Show all stages of working\" / \"not entirely calculator\" means: write the algebra, don't just report the number.", "source": "GLM 5.1 ①", "_id": "glm_1_49", "judge_pick": false}, {"question": "Q5 overall — The model $$N = \\frac{4000e^{0.1t}}{19 + e^{0.2t}}$$ is a logistic-type model. What physical behaviour does this model capture, and why does it have a maximum? (3 steps)", "answer": "- Step 1: At small $$t$$, $$e^{0.2t}$$ is small, so the denominator ≈ 19, and $$N \\approx \\frac{4000}{19}e^{0.1t}$$ — exponential growth.\n- Step 2: At large $$t$$, $$e^{0.2t}$$ dominates the denominator, so $$N \\approx \\frac{4000e^{0.1t}}{e^{0.2t}} = 4000e^{-0.1t}$$ — exponential decay toward zero.\n- Step 3: The transition from growth to decay creates a peak (maximum). The numerator grows as $$e^{0.1t}$$ but the denominator grows faster (as $$e^{0.2t}$$), so eventually the denominator \"wins\" and $$N$$ decreases.\n\nThis is the logistic/sigmoidal shape: initial growth, saturation, then decline. The maximum occurs when the growth rate of the numerator exactly balances the growth rate of the denominator.", "source": "GLM 5.1 ①", "_id": "glm_1_50", "judge_pick": false}, {"question": "General — When a question asks for an answer \"to the nearest whole number\" or \"to 3 significant figures,\" when in your working should you apply that rounding? (2 steps)", "answer": "- Step 1: Apply rounding ONLY to the final answer you write in the answer box. All intermediate values should be kept exact or stored in your calculator at full precision.\n- Step 2: Rounding an intermediate value (like $$T$$ in Q5) and then using that rounded value in further calculations introduces compounding error. Harry: \"We only round at the very final answer... use the stored value.\"\n\nUse the Ans key or calculator memory to pass unrounded values between calculation steps.", "source": "GLM 5.1 ①", "_id": "glm_1_51", "judge_pick": false}, {"question": "Q4(a) — For the expression $$3\\sin 2x - \\sqrt{3}\\cos 2x = R\\sin(2x - \\alpha)$$, walk through the complete process of finding exact $$R$$ and $$\\alpha$$. (4 steps)", "answer": "- Step 1: Expand: $$R\\sin(2x - \\alpha) = R\\cos\\alpha \\cdot \\sin 2x - R\\sin\\alpha \\cdot \\cos 2x$$. Equate: $$R\\cos\\alpha = 3$$ and $$R\\sin\\alpha = \\sqrt{3}$$.\n- Step 2: Divide for $$\\alpha$$: $$\\tan\\alpha = \\frac{R\\sin\\alpha}{R\\cos\\alpha} = \\frac{\\sqrt{3}}{3} = \\frac{1}{\\sqrt{3}}$$, so $$\\alpha = \\frac{\\pi}{3}$$ (since $$0 < \\alpha < \\frac{\\pi}{2}$$).\n- Step 3: Square and add for $$R$$: $$R^2 = 3^2 + (\\sqrt{3})^2 = 9 + 3 = 12$$, so $$R = \\sqrt{12} = 2\\sqrt{3}$$.\n- Step 4: Final form: $$f(x) = 2\\sqrt{3}\\sin\\!\\left(2x - \\frac{\\pi}{3}\\right)$$.\n\nBoth $$R$$ and $$\\alpha$$ are exact — no decimals anywhere. This is what \"give exact values\" demands.", "source": "GLM 5.1 ①", "_id": "glm_1_52", "judge_pick": false}, {"question": "Q1 (functions) — This question was discussed but not worked. What topic does it cover, and why did Harry flag it for independent practice? (2 steps)", "answer": "- Step 1: Q1 covers functions: range of $$f$$, inverse function $$g^{-1}$$, composite function $$fg(0)$$, and solving a composite-condition equation for an exact value of $$a$$. These are standard opening marks on P3 papers.\n- Step 2: Harry flagged it because inverse-function and composite-function questions are \"standard opening marks\" — reliable, high-yield marks that should be automatic. Phuc had done part (a) but chose to move on, so the remaining parts need independent completion.\n\nDon't skip the \"easy\" opening questions in practice — they're where you bank marks quickly under time pressure.", "source": "GLM 5.1 ①", "_id": "glm_1_53", "judge_pick": false}, {"question": "Q2(b) — When rearranging $$f(x) = 0$$, Phuc multiplied out and got stuck. What was Harry's strategic correction, and how does it generalise? (2 steps)", "answer": "- Step 1: Harry's correction: don't just expand and hope — look at the target form for structural clues. The cube root tells you to cube-root both sides eventually; the $$(2x+3)$$ denominator tells you to factor $$(2x+3)$$ from the left.\n- Step 2: General principle: when a question says \"show that $$f(x) = 0$$ can be written as [target form],\" the target form is your guide. Before expanding anything, identify the key structures in the target (denominators, roots, powers) and engineer those structures in your working.\n\nWorking aimlessly from the starting equation is the trap. Work backwards from the target to plan, then execute forwards.", "source": "GLM 5.1 ①", "_id": "glm_1_54", "judge_pick": false}, {"question": "General — Harry mentioned that reaching A* standard in every module for October is \"going to be a real stretch\" if Phuc relies only on tutorials. What was his strategic advice about exam entries? (2 steps)", "answer": "- Step 1: It may be \"safer to push some of these back\" — enter only the 3 or 4 modules you are most ready for, rather than risking low grades across all modules.\n- Step 2: Independent study between sessions is essential. Tutorials alone cannot build the volume of practice needed (8–10 papers per module). The tutorials provide strategy and correction; the papers provide fluency and speed.\n\nQuality of entries matters more than quantity. A strong grade in 3 modules beats weak grades in 5.", "source": "GLM 5.1 ①", "_id": "glm_1_55", "judge_pick": false}, {"question": "Q5(c) — When you factor $$e^{0.1T}(7600 - 400e^{0.2T}) = 0$$ and reject $$e^{0.1T} = 0$$, what visual aid did Harry use to reinforce why $$e^x$$ can never be zero? (2 steps)", "answer": "- Step 1: Harry sketched the graph of $$y = e^x$$. It is always above the x-axis, approaching zero only as $$x \\to -\\infty$$ but never reaching it.\n- Step 2: This visual confirms that $$e^{0.1T} > 0$$ for all real $$T$$. No matter how negative $$T$$ gets, $$e^{0.1T}$$ is a small positive number, never zero. Therefore, $$e^{0.1T} = 0$$ has no solution and must be rejected.\n\nA quick sketch of $$y = e^x$$ is a powerful sanity check whenever you're tempted to set an exponential equal to zero.", "source": "GLM 5.1 ①", "_id": "glm_1_56", "judge_pick": false}, {"question": "Mini-drill — For $$N = \\frac{4000e^{0.1t}}{19 + e^{0.2t}}$$, what is the value of $$N$$ at $$t = 0$$, and what two sub-steps must you show? (2 steps)", "answer": "- Step 1: At $$t = 0$$: numerator = $$4000e^0 = 4000(1) = 4000$$; denominator = $$19 + e^0 = 19 + 1 = 20$$.\n- Step 2: $$N = \\frac{4000}{20} = 200$$. The two sub-steps are: (i) $$e^0 = 1$$ explicitly, (ii) $$19 + 1 = 20$$ (don't lose the \"+1\").\n\nThis is a 1-mark part but the $$e^0 = 1$$ trap can cost you the mark if you write $$19 + 0 = 19$$.", "source": "GLM 5.1 ①", "_id": "glm_1_57", "judge_pick": false}, {"question": "Mini-drill — Express $$\\sqrt{3}\\sin 2x - 3\\cos 2x$$ in the form $$R\\sin(2x - \\alpha)$$. What are the exact values of $$R$$ and $$\\alpha$$? (3 steps)", "answer": "- Step 1: Equate: $$R\\cos\\alpha = \\sqrt{3}$$, $$R\\sin\\alpha = 3$$. Divide: $$\\tan\\alpha = \\frac{3}{\\sqrt{3}} = \\sqrt{3}$$, so $$\\alpha = \\frac{\\pi}{3}$$.\n- Step 2: Square and add: $$R^2 = 3 + 9 = 12$$, so $$R = 2\\sqrt{3}$$.\n- Step 3: Answer: $$2\\sqrt{3}\\sin\\!\\left(2x - \\frac{\\pi}{3}\\right)$$.\n\nNote: this is the corrected version from the official paper. The erroneous \"$$3\\sin 2x - 4\\cos 2x$$\" version gives $$R = 5, \\alpha = 0.927$$ — always defer to the paper.", "source": "GLM 5.1 ①", "_id": "glm_1_58", "judge_pick": false}, {"question": "ESAT warm-up — Derive $$R = r(10 + \\sqrt{105})$$ from the equation $$4\\pi R^2 = 10(2\\pi r^2 + 2\\pi r \\cdot 4R)$$. Summarise the key algebraic milestones. (4 steps)", "answer": "- Step 1: Expand RHS: $$10(2\\pi r^2 + 8\\pi r R) = 20\\pi r^2 + 80\\pi r R$$.\n- Step 2: Divide by $$4\\pi$$: $$R^2 = 5r^2 + 20rR$$. Rearrange: $$R^2 - 20rR - 5r^2 = 0$$.\n- Step 3: Quadratic formula: $$R = \\frac{20r \\pm \\sqrt{400r^2 + 20r^2}}{2} = \\frac{20r \\pm \\sqrt{420r^2}}{2} = \\frac{20r \\pm 2r\\sqrt{105}}{2} = r(10 \\pm \\sqrt{105})$$.\n- Step 4: Reject the negative root ($$10 - \\sqrt{105} < 0$$). Final answer: $$R = r(10 + \\sqrt{105})$$.\n\nThe key milestones are: simplify by dividing by $$4\\pi$$, form a standard quadratic, apply the formula, reject the negative root.", "source": "GLM 5.1 ①", "_id": "glm_1_59", "judge_pick": true}, {"question": "General — Harry praised Phuc for picking up on \"little details\" like \"nearest whole number\" and \"3 significant figures.\" Why do these command phrases matter for marks? (2 steps)", "answer": "- Step 1: Each command phrase specifies the required precision. \"Nearest whole number\" means round to 0 dp; \"3 s.f.\" means round to 3 significant figures. Giving more or fewer decimal places than requested can lose the final accuracy mark.\n- Step 2: These are easy marks to drop if you're not paying attention. The maths might be perfect, but if you write 458.8 instead of 459 (nearest whole number), you lose the answer mark.\n\nAlways re-read the question's precision requirement before writing your final answer.", "source": "GLM 5.1 ①", "_id": "glm_1_60", "judge_pick": false}, {"question": "Q3(c) — Differentiate $$V = 100 \\times 10^{0.05t}$$ using the $$a^{kx}$$ rule. Show the exact derivative. (2 steps)", "answer": "- Step 1: Here $$a = 10$$, $$k = 0.05$$. Apply $$\\frac{d}{dt}(a^{kt}) = a^{kt} \\cdot k \\ln a$$: $$\\frac{dV}{dt} = 100 \\times 10^{0.05t} \\times 0.05 \\ln 10$$.\n- Step 2: Simplify: $$\\frac{dV}{dt} = 0.05 \\ln(10) \\times V$$, or equivalently $$5\\ln(10) \\times 10^{0.05t}$$. The exact form uses $$\\ln 10$$, not a decimal approximation.\n\nNote: differentiating $$100(1.12)^t$$ instead would give $$100 \\times 1.12^t \\times \\ln(1.12)$$, which is not the same function — the base has been rounded.", "source": "GLM 5.1 ①", "_id": "glm_1_61", "judge_pick": false}, {"question": "Q2(b) — Starting from $$\\frac{2x^2 + 3x - 4}{e^x} - \\frac{1}{x^2} = 0$$, what is the first algebraic move to begin the rearrangement? (2 steps)", "answer": "- Step 1: Move the $$\\frac{1}{x^2}$$ term to the other side: $$\\frac{2x^2 + 3x - 4}{e^x} = \\frac{1}{x^2}$$.\n- Step 2: This isolates the two sides so you can cross-multiply. Multiply both sides by $$e^x x^2$$: $$x^2(2x^2 + 3x - 4) = e^x$$, i.e., $$2x^4 + 3x^3 - 4x^2 = e^x$$.\n\nMoving the term first (rather than combining over a common denominator) keeps the algebra simpler and avoids unnecessary fractions.", "source": "GLM 5.1 ①", "_id": "glm_1_62", "judge_pick": false}, {"question": "General — What is the derivative of $$e^{kx}$$, and how does it compare to the derivative of $$a^{kx}$$? Why is the $$e^{kx}$$ version simpler? (2 steps)", "answer": "- Step 1: $$\\frac{d}{dx}(e^{kx}) = ke^{kx}$$. Compare: $$\\frac{d}{dx}(a^{kx}) = a^{kx} \\cdot k \\ln a$$.\n- Step 2: The $$e^{kx}$$ version is simpler because $$\\ln e = 1$$, so the $$\\ln a$$ factor disappears. This is precisely why we convert $$a^{kx} = e^{kx \\ln a}$$ before differentiating — the base-$$e$$ exponential differentiates cleanly.\n\nThe $$\\ln a$$ factor in the $$a^{kx}$$ rule is the \"cost\" of having a base other than $$e$$. When $$a = e$$, that cost is zero.", "source": "GLM 5.1 ①", "_id": "glm_1_63", "judge_pick": false}, {"question": "Q4(b)(i) — In the denominator $$2\\sqrt{3}\\sin\\!\\left(6x - \\frac{\\pi}{3}\\right) + 4\\sqrt{3}$$, explain why the maximum value of the denominator is $$6\\sqrt{3}$$, not $$2\\sqrt{3} + 4\\sqrt{3}$$. (2 steps)", "answer": "- Step 1: The sine term has maximum value 1, so the maximum of $$2\\sqrt{3}\\sin(\\ldots)$$ is $$2\\sqrt{3} \\times 1 = 2\\sqrt{3}$$. The constant term $$4\\sqrt{3}$$ doesn't change.\n- Step 2: Maximum denominator = $$2\\sqrt{3} + 4\\sqrt{3} = 6\\sqrt{3}$$. The key point: only the sine term varies; the constant is always present. The maximum of the *whole* denominator occurs when the variable part is at its maximum.\n\nThe minimum of the denominator would occur when $$\\sin = -1$$, giving $$-2\\sqrt{3} + 4\\sqrt{3} = 2\\sqrt{3}$$ — but the question asks for the minimum of the *fraction*, which corresponds to the maximum of the denominator.", "source": "GLM 5.1 ①", "_id": "glm_1_64", "judge_pick": false}, {"question": "ESAT warm-up — When solving a geometry modelling problem on a multiple-choice exam (like ESAT), what should you do if your derived answer doesn't exactly match any option? (2 steps)", "answer": "- Step 1: Check your formulae first — most mismatches come from using the wrong formula (e.g., $$\\pi r$$ instead of $$\\pi r^2$$, or confusing volume with surface area).\n- Step 2: If the formulae are correct, simplify your answer algebraically and compare with the options in a different form. For example, $$r(10 + \\sqrt{105})$$ might appear as $$10r + r\\sqrt{105}$$ or $$r\\sqrt{105} + 10r$$ in the options.\n\nThe ESAT option labels in this session were garbled, so the method (not the option letter) is what transfers. Trust your derivation.", "source": "GLM 5.1 ①", "_id": "glm_1_65", "judge_pick": false}, {"question": "General — Harry's next-lesson starter will test differentiation of power functions ($$a^{kx}$$ rule). What specific derivatives should you be able to produce instantly from memory? (1 step)", "answer": "- Step 1: The five drill derivatives: $$\\frac{d}{dx}(3^x) = 3^x \\ln 3$$; $$\\frac{d}{dx}(3^{6x}) = 3^{6x} \\cdot 6\\ln 3$$; $$\\frac{d}{dx}(5^{2x}) = 5^{2x} \\cdot 2\\ln 5$$; $$\\frac{d}{dt}(1.12^t) = 1.12^t \\ln(1.12)$$; $$\\frac{d}{dx}(e^{kx}) = ke^{kx}$$.\n\nThese must be automatic — no derivation, no hesitation. Harry will test these as a starter in the next session.", "source": "GLM 5.1 ①", "_id": "glm_1_66", "judge_pick": false}, {"question": "Q5(d) — After finding $$T = \\frac{\\ln 19}{0.2} \\approx 14.72$$, explain the full substitution strategy to find the maximum $$N$$ without rounding error. (3 steps)", "answer": "- Step 1: Store $$T$$ in your calculator (Ans or memory). Do not write down 14.72 and re-type it.\n- Step 2: Compute $$e^{0.1T}$$ using the stored value. Since $$e^{0.2T} = 19$$, you can also use $$e^{0.1T} = \\sqrt{19}$$ exactly.\n- Step 3: Compute $$N = \\frac{4000\\sqrt{19}}{38} = 458.83\\ldots$$, then round to 459 (nearest whole number). The rounding happens once, at the very end.\n\nThe stored-value technique and the exponent-halving trick both serve the same goal: avoid intermediate rounding that corrupts the final answer.", "source": "GLM 5.1 ①", "_id": "glm_1_67", "judge_pick": false}], "count": 68}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "ESAT warm-up — When you see \"surface area of a sphere,\" what is the formula, and what is the most common mistake students make with it? (2 steps)", "answer": "- Step 1: The surface area of a sphere of radius $$R$$ is $$4\\pi R^2$$. This measures the total area around the outside of the 3D shape — every point on the shell.\n- Step 2: The most common mistake is dropping the square and writing $$4\\pi R$$ (or even $$4\\pi r$$). Harry caught Phuc doing exactly this. The square is non-negotiable: area is always in square units, so the radius must be squared. If you wrote $$4\\pi R$$, the units would be length, not area — that's your sanity check.\n\nTakeaway: Sphere SA = $$4\\pi R^2$$, and the square is the thing everyone forgets.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "ESAT warm-up — What is the area of a circle, and what specific mistake did Phuc make that Harry corrected? (2 steps)", "answer": "- Step 1: The area of a circle is $$\\pi r^2$$. This is the 2D region enclosed.\n- Step 2: Phuc said \"π multiplied by r\" ($$\\pi r$$), which is wrong. $$\\pi r$$ has units of length (it's half the circumference), not area. The square on the $$r$$ is what turns a length into an area. This is the same class of error as the sphere surface area — always check that your area formula has a squared length inside.\n\nTakeaway: Circle area = $$\\pi r^2$$, not $$\\pi r$$. The square is never optional.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "ESAT warm-up — What is the surface area of a closed cylinder, and how do you derive it from first principles? (3 steps)", "answer": "- Step 1: A closed cylinder has three surfaces: two flat circular ends and one curved side. The total surface area is $$2\\pi r^2 + 2\\pi rh$$.\n- Step 2: The two flat ends are circles, each with area $$\\pi r^2$$, giving $$2 \\times \\pi r^2 = 2\\pi r^2$$.\n- Step 3: Unroll the curved side into a rectangle. One side of the rectangle is the height $$h$$; the other side is the circumference of the circle $$2\\pi r$$ (this is where Phuc said \"diameter\" — wrong, it's the circumference). So the curved area is $$2\\pi r \\times h = 2\\pi rh$$. Total: $$2\\pi r^2 + 2\\pi rh$$.\n\nTakeaway: Cylinder SA = two circles + unrolled rectangle = $$2\\pi r^2 + 2\\pi rh$$. The unrolled side has length equal to the circumference, not the diameter.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "ESAT warm-up — Phuc offered $$\\pi r^2 h$$ as the surface area of a cylinder. What is this actually, and why is confusing it with surface area dangerous? (2 steps)", "answer": "- Step 1: $$\\pi r^2 h$$ is the **volume** of the cylinder, not its surface area. It comes from cross-section × height (prism formula: area of circular base × height).\n- Step 2: Confusing volume with surface area loses all marks on an SA question. The surface area ($$2\\pi r^2 + 2\\pi rh$$) has two terms (ends + side), while volume ($$\\pi r^2 h$$) has one term. If your formula has only one term for a closed cylinder, you're computing volume, not surface area — stop and re-check.\n\nTakeaway: $$\\pi r^2 h$$ = volume. $$2\\pi r^2 + 2\\pi rh$$ = surface area. They are fundamentally different quantities.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "ESAT warm-up — When setting up \"surface area of a sphere equals total surface area of 10 closed cylinders,\" what is the word equation, and what detail about \"closed\" must you not miss? (2 steps)", "answer": "- Step 1: The word equation is: surface area of sphere = 10 × surface area of one cylinder, i.e. $$4\\pi R^2 = 10(2\\pi r^2 + 2\\pi rh)$$.\n- Step 2: The word \"closed\" means each cylinder has **two** circular ends, not one. Phuc initially wrote $$4\\pi R^2 = 10(\\pi r^2 + 2\\pi rh)$$ — only one end. Harry corrected: a closed cylinder has both a top and a bottom, so it's $$2\\pi r^2$$ for the ends, not $$\\pi r^2$$. Missing this gives the wrong quadratic and the wrong answer entirely.\n\nTakeaway: \"Closed\" = both ends. Write $$2\\pi r^2 + 2\\pi rh$$ per cylinder.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "ESAT warm-up — After substituting $$h = 4R$$ into the sphere-cylinder equation and simplifying, you get a quadratic in $$R$$. What is the quadratic, and why must you reject one root? (3 steps)", "answer": "- Step 1: Starting from $$4\\pi R^2 = 10(2\\pi r^2 + 8\\pi rR) = 20\\pi r^2 + 80\\pi rR$$. Divide throughout by $$4\\pi$$: $$R^2 = 5r^2 + 20rR$$.\n- Step 2: Rearrange to standard form: $$R^2 - 20rR - 5r^2 = 0$$. This is a quadratic in $$R$$ with coefficients $$a = 1$$, $$b = -20r$$, $$c = -5r^2$$.\n- Step 3: The quadratic formula gives two roots: $$R = r(10 + \\sqrt{105})$$ and $$R = r(10 - \\sqrt{105})$$. Since $$\\sqrt{105} \\approx 10.25$$, the second root is negative ($$10 - 10.25 < 0$$). A radius must be positive, so reject the negative root. The answer is $$R = r(10 + \\sqrt{105})$$.\n\nTakeaway: Always check the sign of roots for physical quantities. A negative radius is meaningless.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "ESAT warm-up — When simplifying $$\\sqrt{420r^2}$$ in the quadratic formula working, how do you extract the cleanest surd form? (2 steps)", "answer": "- Step 1: Factor out the largest perfect square from 420. Since $$420 = 4 \\times 105$$, and 4 is a perfect square: $$\\sqrt{420r^2} = \\sqrt{4 \\times 105 \\times r^2} = 2r\\sqrt{105}$$.\n- Step 2: This gives the numerator $$20r \\pm 2r\\sqrt{105}$$, which factors as $$2r(10 \\pm \\sqrt{105})$$, and dividing by 2 yields $$R = r(10 \\pm \\sqrt{105})$$. Always pull out perfect-square factors from under the surd to keep the expression simple and avoid decimal approximations.\n\nTakeaway: Factor out perfect squares from surds: $$\\sqrt{420} = 2\\sqrt{105}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "Q2(a) IVT — When showing $$f(x) = 0$$ has a root in $$[1, 2]$$, what TWO things must both appear to earn full marks, and what happens if you omit one? (2 steps)", "answer": "- Step 1: You must state **both**: (i) a sign change — substitute the actual endpoints $$f(1)$$ and $$f(2)$$, show one is positive and one is negative; (ii) continuity — state that $$f$$ is continuous on $$[1, 2]$$ (since it is defined for all $$x$$ in that interval; the $$x \\neq 0$$ restriction causes no problem).\n- Step 2: If you omit continuity, you lose a mark. Harry's verbatim warning: \"The bit that everyone forgets is to mention that continuity. You must, must remember sign change and continuity. Otherwise you'll only score one mark.\" The IVT requires continuity as a hypothesis — without it, a sign change does not guarantee a root (a discontinuous function can jump from negative to positive without crossing zero).\n\nTakeaway: IVT = sign change + continuity. Both are mandatory. Omitting continuity costs a mark.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "Q2(a) IVT — Why can't you substitute values \"near\" the endpoints instead of the actual endpoints 1 and 2? (2 steps)", "answer": "- Step 1: The question asks you to show a root exists in the **specific** interval $$[1, 2]$$. The IVT applies to a closed interval $$[a, b]$$, and you must evaluate at $$x = a$$ and $$x = b$$ — the actual endpoints.\n- Step 2: Using values like $$f(1.1)$$ and $$f(1.9)$$ doesn't prove anything about the interval $$[1, 2]$$ — it only proves something about $$[1.1, 1.9]$$. The root could lie in $$[1, 1.1)$$ or $$(1.9, 2]$$ and you'd miss it. Always use the exact endpoints given in the question.\n\nTakeaway: Substitute the stated endpoints, not nearby values.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "Q2(a) IVT — Why is continuity a necessary hypothesis for the Intermediate Value Theorem? Give a counterexample showing that sign change alone is insufficient. (2 steps)", "answer": "- Step 1: The IVT says: if $$f$$ is continuous on $$[a,b]$$ and $$f(a)$$ and $$f(b)$$ have opposite signs, then there exists $$c \\in (a,b)$$ with $$f(c) = 0$$. Continuity ensures the function can't \"jump\" over zero.\n- Step 2: Counterexample: define $$f(x) = \\frac{1}{x}$$ on $$[-1, 1]$$. Then $$f(-1) = -1 < 0$$ and $$f(1) = 1 > 0$$ — there's a sign change. But $$f$$ is discontinuous at $$x = 0$$ (it has a vertical asymptote), and there is no $$c$$ with $$f(c) = 0$$. The function goes from $$-\\infty$$ to $$+\\infty$$ without ever equalling zero. This is exactly why the mark scheme requires you to state continuity.\n\nTakeaway: Without continuity, a sign change doesn't guarantee a root. That's why the exam demands both.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": true}, {"question": "Q2(b) — When rearranging $$f(x) = 0$$ to reach a target form with a cube root, what strategy should you use before doing any algebra? (2 steps)", "answer": "- Step 1: Look at the target form first. The target has a cube root and a denominator $$(2x + 3)$$. These are structural clues. A cube root in the answer means at some point you will cube-root both sides. A denominator of $$(2x + 3)$$ means you will divide by $$(2x + 3)$$.\n- Step 2: Work backwards from the target to plan your algebra: to get a cube root, you need $$x^3 = (\\text{something})$$, then take the cube root. To get a denominator of $$(2x+3)$$, you need to factor $$(2x+3)$$ out of one side, then divide. This reverse-engineering approach prevents you from multiplying out and getting stuck, which is exactly what happened to Phuc.\n\nTakeaway: Read the target form first. Its structure tells you the key algebraic moves.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "Q2(b) — In the rearrangement from $$2x^4 + 3x^3 - 4x^2 = e^x$$, what key factorisation do you perform on the left side, and why? (2 steps)", "answer": "- Step 1: Factor out $$x^3$$ from the left: $$x^3(2x + 3) - 4x^2 = e^x$$. Then move the $$4x^2$$ to the right: $$x^3(2x + 3) = e^x + 4x^2$$.\n- Step 2: This factorisation is motivated by the target form: the denominator is $$(2x + 3)$$, so you need $$(2x + 3)$$ as a factor on one side so you can divide by it. Factoring out $$x^3$$ leaves $$(2x+3)$$ as the other factor, which is exactly what you need. Without this factorisation, the $$2x+3$$ is buried inside the expanded polynomial and you can't isolate it.\n\nTakeaway: Factor to expose the term that appears in the target's denominator.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "Q2(b) — After dividing by $$(2x+3)$$ to get $$x^3 = \\frac{e^x + 4x^2}{2x+3}$$, what is the final step to reach the target form with a cube root? (2 steps)", "answer": "- Step 1: Cube-root both sides. Since $$x^3 = \\frac{e^x + 4x^2}{2x+3}$$, taking the cube root gives $$x = \\sqrt[3]{\\frac{e^x + 4x^2}{2x+3}}$$.\n- Step 2: The cube root in the target form is the signal that this is the right move. Harry's cue: \"a cube root in the answer means cube-root both sides.\" This is a general principle: if the target has an $$n$$-th root, your last algebraic step is taking that $$n$$-th root of both sides.\n\nTakeaway: Target has $$\\sqrt[3]{\\phantom{x}}$$ → your final step is cube-rooting both sides.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "Q2(c) iteration — When performing iterative sequences like $$x_{n+1} = \\sqrt[3]{\\frac{e^{x_n} + 4x_n^2}{2x_n + 3}}$$, what are the three practical rules for calculator work? (3 steps)", "answer": "- Step 1: Do not round intermediate iterates. Each $$x_n$$ feeds into the next calculation, so rounding errors compound. Keep the full calculator display or use the ANS key.\n- Step 2: Keep the calculator in the correct mode (radians for any trig iteration; this particular one has no trig, but it's a habit to check).\n- Step 3: Quote each requested value ($$x_3$$ and $$\\alpha$$) to the specified number of decimal places (4 d.p. here). The final answer is rounded, but the stored value used for the next iteration is not.\n\nTakeaway: Never round intermediates; check calculator mode; round only the final reported values.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "Q3(a) — The question says \"a graph of $$\\log_{10} V$$ against $$t$$.\" What does \"against\" tell you about which variable goes on which axis? (2 steps)", "answer": "- Step 1: \"$$A$$ against $$B$$\" means $$A$$ is on the vertical (y) axis and $$B$$ is on the horizontal (x) axis. So here, $$\\log_{10} V$$ is on the y-axis and $$t$$ is on the x-axis.\n- Step 2: Phuc tried to use $$V$$ (or $$y$$) as the vertical variable, and Harry corrected: \"It's not V. Be careful.\" The y-axis is $$\\log_{10} V$$, not $$V$$. Writing the equation as $$\\log_{10} V = mt + c$$ (not $$V = mt + c$$) is critical — the straight-line relationship is between $$\\log_{10} V$$ and $$t$$, not between $$V$$ and $$t$$.\n\nTakeaway: \"$$A$$ against $$B$$\" → $$A$$ on y-axis, $$B$$ on x-axis. Read the axes from the question wording.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "Q3(b) — After finding $$\\log_{10} V = 0.05t + 2$$, how do you convert to the form $$V = ab^t$$? What index-law step is critical? (3 steps)", "answer": "- Step 1: Raise 10 to both sides: $$V = 10^{0.05t + 2}$$.\n- Step 2: Split the index using the law $$10^{p+q} = 10^p \\times 10^q$$: $$V = 10^{0.05t} \\times 10^2 = 100 \\times 10^{0.05t}$$.\n- Step 3: Rewrite $$10^{0.05t} = (10^{0.05})^t$$ using the law $$(a^k)^t = a^{kt}$$. So $$V = 100 \\times (10^{0.05})^t$$, giving $$a = 100$$ (exact) and $$b = 10^{0.05} \\approx 1.12$$ (3 s.f.). Phuc left $$10^{0.05t}$$ un-restructured — you must rewrite it as $$(10^{0.05})^t$$ to match the $$ab^t$$ template.\n\nTakeaway: $$10^{0.05t+2} = 100 \\times (10^{0.05})^t$$. Split the index, then restructure the power of $$t$$.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "Q3(b/c) — Why must you keep the exact base $$b = 10^{0.05}$$ for differentiation instead of using the rounded value $$b = 1.12$$? (2 steps)", "answer": "- Step 1: Differentiating $$V = 100 \\times (10^{0.05})^t$$ gives $$\\frac{dV}{dt} = 100 \\times (10^{0.05})^t \\times 0.05 \\ln 10$$. If you instead differentiate $$V = 100(1.12)^t$$, you get $$\\frac{dV}{dt} = 100(1.12)^t \\ln(1.12)$$.\n- Step 2: The rounded-base calculation gives $$T \\approx 13.10$$, while the exact-base calculation gives $$T \\approx 12.76$$. Both round to 13 here, but that's luck. In general, rounding the base before differentiation introduces a systematic error that compounds through the logarithm — the result may not round to the same integer. The mark scheme requires \"solutions relying entirely on calculator technology are not acceptable,\" and using a rounded base is exactly that kind of inappropriate approximation.\n\nTakeaway: Differentiate the exact base. Round only the final answer.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "Q3(c) — When a question says \"the rate of increase is £50/year,\" what does \"rate\" tell you to do mathematically, and what does \"increase\" tell you about the sign? (2 steps)", "answer": "- Step 1: \"Rate\" means differentiate. The rate of change of $$V$$ with respect to $$t$$ is $$\\frac{dV}{dt}$$. Phuc initially guessed \"arithmetic series\" — that is the trap. In calculus-based modelling questions, \"rate\" always signals differentiation.\n- Step 2: \"Increase\" means the rate is positive, so $$\\frac{dV}{dt} = +50$$, not $$-50$$. If the question said \"rate of decrease,\" you would set $$\\frac{dV}{dt} = -50$$. The sign matters because setting it to the wrong value gives the wrong $$T$$ entirely.\n\nTakeaway: \"Rate\" → differentiate. \"Increase\" → positive value. \"Decrease\" → negative value.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "What is the derivative of $$a^{kx}$$ with respect to $$x$$, and what is the most common mistake in how students write the chain-rule factor? (3 steps)", "answer": "- Step 1: $$\\frac{d}{dx}(a^{kx}) = a^{kx} \\cdot k \\ln a$$. The chain rule brings down the derivative of the exponent $$kx$$, which is $$k$$, and the derivative of $$a^u$$ with respect to $$u$$ is $$a^u \\ln a$$. Combined: $$k \\ln a$$.\n- Step 2: The most common mistake is writing $$\\ln(kx)$$ instead of $$k \\ln a$$. Phuc did this for $$3^{6x}$$, writing something involving $$\\ln(6x)$$. This is wrong because the chain rule acts on the exponent, not inside the logarithm. The derivative of the exponent $$6x$$ is 6; the logarithm is of the base $$a$$, not of the exponent.\n- Step 3: Quick sanity check: for $$e^{kx}$$, since $$\\ln e = 1$$, the formula gives $$e^{kx} \\cdot k$$, which matches the standard result. For $$a^x$$ ($$k=1$$), it gives $$a^x \\ln a$$, also correct. The general formula $$a^{kx} \\cdot k \\ln a$$ covers all cases.\n\nTakeaway: $$\\frac{d}{dx}(a^{kx}) = a^{kx} \\cdot k \\ln a$$. The factor is $$k \\ln a$$, never $$\\ln(kx)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "Without doing a full calculation, what is the derivative of $$3^{6x}$$? Walk through the logic. (2 steps)", "answer": "- Step 1: Identify $$a = 3$$ and $$k = 6$$. Apply the rule $$\\frac{d}{dx}(a^{kx}) = a^{kx} \\cdot k \\ln a$$.\n- Step 2: $$\\frac{d}{dx}(3^{6x}) = 3^{6x} \\cdot 6 \\ln 3$$. The chain rule brings down the 6 (derivative of the exponent $$6x$$), and the base-3 logarithm factor is $$\\ln 3$$. Phuc wrote something involving $$\\ln(6x)$$ — that would mean the derivative changes with $$x$$ in a completely different way, which is structurally wrong.\n\nTakeaway: $$3^{6x} \\to 3^{6x} \\cdot 6\\ln 3$$. The 6 comes from the chain rule on the exponent; $$\\ln 3$$ comes from the base.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "Without doing a full calculation, what is the derivative of $$5^{2x}$$? Identify $$a$$ and $$k$$ first. (2 steps)", "answer": "- Step 1: Here $$a = 5$$, $$k = 2$$. The function is $$a^{kx}$$ with these values.\n- Step 2: $$\\frac{d}{dx}(5^{2x}) = 5^{2x} \\cdot 2 \\ln 5$$. The chain rule contributes the factor $$k = 2$$, and the exponential-base derivative contributes $$\\ln 5$$.\n\nTakeaway: Identify $$a$$ and $$k$$, then apply $$a^{kx} \\cdot k \\ln a$$.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "Without doing a full calculation, what is the derivative of $$1.12^t$$ with respect to $$t$$? (2 steps)", "answer": "- Step 1: Here $$a = 1.12$$, $$k = 1$$ (the exponent is just $$t = 1 \\cdot t$$). This is the $$a^x$$ case.\n- Step 2: $$\\frac{d}{dt}(1.12^t) = 1.12^t \\ln(1.12)$$. Since $$k = 1$$, the chain-rule factor is just 1, and you get $$a^t \\ln a$$. Note: $$\\ln(1.12)$$ is negative since $$1.12 < e$$ — wait, no, $$\\ln(1.12) > 0$$ because $$1.12 > 1$$. It's approximately 0.113.\n\nTakeaway: $$1.12^t \\to 1.12^t \\ln(1.12)$$. The $$k = 1$$ case reduces to the basic $$a^x \\ln a$$ rule.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "Q4(a) — When expressing $$a\\sin\\theta - b\\cos\\theta$$ in the form $$R\\sin(\\theta - \\alpha)$$, what is the expansion, and how do you match coefficients? (3 steps)", "answer": "- Step 1: Expand using the compound-angle formula from the formula book: $$R\\sin(\\theta - \\alpha) = R\\sin\\theta\\cos\\alpha - R\\cos\\theta\\sin\\alpha$$.\n- Step 2: Group by $$\\sin\\theta$$ and $$\\cos\\theta$$: $$(R\\cos\\alpha)\\sin\\theta - (R\\sin\\alpha)\\cos\\theta$$.\n- Step 3: Match coefficients with the original expression $$a\\sin\\theta - b\\cos\\theta$$: $$R\\cos\\alpha = a$$ and $$R\\sin\\alpha = b$$. These two equations are your starting point for finding $$R$$ and $$\\alpha$$.\n\nTakeaway: Expand, group by sin and cos, then equate coefficients to get $$R\\cos\\alpha = a$$, $$R\\sin\\alpha = b$$.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "Q4(a) — Once you have $$R\\cos\\alpha = a$$ and $$R\\sin\\alpha = b$$, what two operations give you $$\\alpha$$ and $$R$$ respectively, and why must you use these specific methods for an \"exact value\" question? (3 steps)", "answer": "- Step 1: For $$\\alpha$$: divide the two equations. $$\\frac{R\\sin\\alpha}{R\\cos\\alpha} = \\tan\\alpha = \\frac{b}{a}$$. Then $$\\alpha = \\tan^{-1}(b/a)$$. This gives an exact angle when $$b/a$$ is a recognisable value.\n- Step 2: For $$R$$: square and add. $$(R\\cos\\alpha)^2 + (R\\sin\\alpha)^2 = a^2 + b^2$$, so $$R^2(\\cos^2\\alpha + \\sin^2\\alpha) = a^2 + b^2$$, giving $$R^2 = a^2 + b^2$$ and $$R = \\sqrt{a^2 + b^2}$$. This gives $$R$$ exactly without needing to know $$\\alpha$$.\n- Step 3: Harry's warning: \"Your method could be quite dangerous\" if you substitute a rounded decimal for $$\\alpha$$ into $$R = a/\\cos\\alpha$$ to find $$R$$. Rounding $$\\alpha$$ before computing $$R$$ introduces error that propagates and may give an inexact $$R$$. Square-and-add avoids this because it never requires $$\\alpha$$ at all.\n\nTakeaway: Divide for $$\\tan\\alpha$$, square-and-add for $$R$$. Never substitute a rounded $$\\alpha$$ to find $$R$$.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "Q4(a) — For the specific expression $$\\sqrt{3}\\sin 2x - 3\\cos 2x$$, find the exact values of $$R$$ and $$\\alpha$$ in the form $$R\\sin(2x - \\alpha)$$. (3 steps)", "answer": "- Step 1: Match coefficients: $$R\\cos\\alpha = \\sqrt{3}$$ and $$R\\sin\\alpha = 3$$.\n- Step 2: Divide for $$\\alpha$$: $$\\tan\\alpha = \\frac{3}{\\sqrt{3}} = \\sqrt{3}$$, so $$\\alpha = \\frac{\\pi}{3}$$ (since $$0 < \\alpha < \\frac{\\pi}{2}$$).\n- Step 3: Square-and-add for $$R$$: $$R^2 = (\\sqrt{3})^2 + 3^2 = 3 + 9 = 12$$, so $$R = \\sqrt{12} = 2\\sqrt{3}$$. Result: $$\\sqrt{3}\\sin 2x - 3\\cos 2x = 2\\sqrt{3}\\sin\\left(2x - \\frac{\\pi}{3}\\right)$$.\n\nTakeaway: $$R = 2\\sqrt{3}$$, $$\\alpha = \\frac{\\pi}{3}$$. Both are exact — no decimals anywhere.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": true}, {"question": "Q4(a) — Harry warned against using $$\\sin^{-1}$$ to find $$\\alpha$$. Why is $$\\tan^{-1}$$ the correct inverse trig function, and what calculator pitfall does this relate to? (2 steps)", "answer": "- Step 1: You find $$\\alpha$$ from $$\\tan\\alpha = b/a$$, so the correct inverse function is $$\\tan^{-1}(b/a)$$, not $$\\sin^{-1}$$. Using $$\\sin^{-1}$$ would require you to already know $$R$$ (since $$\\sin\\alpha = b/R$$), which introduces a circular dependency and potential rounding error if $$R$$ is approximate.\n- Step 2: Calculator pitfall: make sure the calculator is in **radians** mode. If it's in degrees, $$\\tan^{-1}(\\sqrt{3})$$ gives 60° instead of $$\\frac{\\pi}{3}$$, and the answer is wrong. Phuc was caught on calculator mode. Always check: P3 trig answers are almost always in radians.\n\nTakeaway: Use $$\\tan^{-1}$$ for $$\\alpha$$, and always verify your calculator is in radians.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "Q4(b)(i) — To find the exact minimum of $$g(x) = \\frac{18}{f(3x) + 4\\sqrt{3}}$$, what key insight about fractions simplifies the problem? (2 steps)", "answer": "- Step 1: The numerator 18 is a fixed positive constant. For a fraction with a fixed positive numerator, the fraction is **smallest when the denominator is largest**. So minimising $$g$$ is equivalent to maximising the denominator $$f(3x) + 4\\sqrt{3}$$.\n- Step 2: Since $$f(3x) = 2\\sqrt{3}\\sin\\left(6x - \\frac{\\pi}{3}\\right)$$, the denominator is $$2\\sqrt{3}\\sin\\left(6x - \\frac{\\pi}{3}\\right) + 4\\sqrt{3}$$. This is largest when the sine term equals 1 (its maximum), giving a maximum denominator of $$2\\sqrt{3}(1) + 4\\sqrt{3} = 6\\sqrt{3}$$. So minimum $$g = \\frac{18}{6\\sqrt{3}} = \\frac{3}{\\sqrt{3}} = \\sqrt{3}$$.\n\nTakeaway: Fixed positive numerator → minimise the fraction by maximising the denominator.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "Q4(b)(i) — After computing $$\\frac{3}{\\sqrt{3}}$$, why should you rationalise, and what is the result? (2 steps)", "answer": "- Step 1: Rationalising means multiplying numerator and denominator by $$\\sqrt{3}$$: $$\\frac{3}{\\sqrt{3}} \\times \\frac{\\sqrt{3}}{\\sqrt{3}} = \\frac{3\\sqrt{3}}{3} = \\sqrt{3}$$.\n- Step 2: The question asks for an \"exact\" value, and $$\\sqrt{3}$$ is the clean exact form. While $$\\frac{3}{\\sqrt{3}}$$ is technically also exact, surds in denominators are conventionally rationalised in exam answers. The rationalised form also makes it immediately clear that the minimum is $$\\sqrt{3} \\approx 1.73$$, which is a cleaner statement.\n\nTakeaway: $$\\frac{3}{\\sqrt{3}} = \\sqrt{3}$$. Always rationalise surd denominators for exact-value answers.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "Q4(b)(ii) — To find the smallest positive $$x$$ where the minimum of $$g$$ occurs, you set $$\\sin\\left(6x - \\frac{\\pi}{3}\\right) = 1$$. What is the principal solution, and how do you confirm it's the smallest? (3 steps)", "answer": "- Step 1: $$\\sin\\theta = 1$$ when $$\\theta = \\frac{\\pi}{2}$$ (the principal solution). So $$6x - \\frac{\\pi}{3} = \\frac{\\pi}{2}$$.\n- Step 2: Solve: $$6x = \\frac{\\pi}{2} + \\frac{\\pi}{3} = \\frac{3\\pi + 2\\pi}{6} = \\frac{5\\pi}{6}$$, giving $$x = \\frac{5\\pi}{36}$$.\n- Step 3: The general solution is $$6x - \\frac{\\pi}{3} = \\frac{\\pi}{2} + 2n\\pi$$, so $$x = \\frac{5\\pi}{36} + \\frac{n\\pi}{3}$$. The next solution ($$n = 1$$) gives $$x = \\frac{5\\pi}{36} + \\frac{12\\pi}{36} = \\frac{17\\pi}{36}$$, which is larger. So $$x = \\frac{5\\pi}{36}$$ is the smallest positive value. Harry sketched a sine wave to visually confirm this.\n\nTakeaway: Solve for the principal solution, then check the next one is larger.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "Q5(a) — When evaluating the squirrel model $$N = \\frac{4000e^{0.1t}}{19 + e^{0.2t}}$$ at $$t = 0$$, what is the trap, and what is the correct value? (2 steps)", "answer": "- Step 1: At $$t = 0$$: $$N = \\frac{4000e^0}{19 + e^0} = \\frac{4000 \\times 1}{19 + 1} = \\frac{4000}{20} = 200$$. The trap is forgetting that $$e^0 = 1$$, so the denominator is $$19 + 1 = 20$$, not just 19.\n- Step 2: Phuc slipped on the \"+1\" in the denominator. Harry's correction: \"Be careful not to lose the one.\" Writing $$e^0 = 1$$ explicitly before simplifying prevents this. The denominator becomes $$19 + 1 = 20$$, not 19.\n\nTakeaway: $$e^0 = 1$$. Write it out explicitly so you don't lose the \"+1\" in a sum.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "Q5(b) — When applying the quotient rule to $$N = \\frac{u}{v}$$ where $$u = 4000e^{0.1t}$$ and $$v = 19 + e^{0.2t}$$, what is the formula, and what sign must you not drop? (2 steps)", "answer": "- Step 1: The quotient rule is $$\\frac{dN}{dt} = \\frac{v\\frac{du}{dt} - u\\frac{dv}{dt}}{v^2}$$. The minus sign between the two ter
