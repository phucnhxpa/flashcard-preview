ith respect to $$x$$, and how does it differ from the $$a^{kx}$$ rule? (2 steps)", "answer": "- Step 1: $$\\frac{d}{dx}(e^{kx}) = ke^{kx}$$. This is the special case of the $$a^{kx}$$ rule where $$a = e$$, since $$\\ln e = 1$$, so $$k\\ln a = k \\cdot 1 = k$$.\n- Step 2: The $$a^{kx}$$ rule gives $$a^{kx} \\cdot k \\ln a$$, which includes the extra factor $$\\ln a$$. For $$e^{kx}$$, this factor is just 1, making the derivative simpler. Students sometimes forget the $$\\ln a$$ factor for non-$$e$$ bases — that's why the general rule must be memorised separately.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": false}, {"question": "What is the quotient rule formula, and where can you find it in the exam? (2 steps)", "answer": "- Step 1: $$\\left(\\frac{u}{v}\\right)' = \\frac{vu' - uv'}{v^2}$$. The order is \"v times u' minus u times v', all over v squared.\" The minus sign is critical.\n- Step 2: This formula is in the Edexcel formula book. Harry's advice: when in doubt, open the formula book and copy it exactly. Do not try to derive it from memory during the exam — the sign and order are too easy to get wrong.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": false}, {"question": "P3 Q2(c) — when performing iteration $$x_{n+1} = f(x_n)$$, what are the three practical rules to avoid errors? (3 steps)", "answer": "- Step 1: **Do not round intermediate iterates.** Keep the full calculator display (or stored value) for each $$x_n$$. Rounding $$x_2$$ before computing $$x_3$$ introduces cumulative error.\n- Step 2: **Keep the calculator in the correct mode** (radians for trig iterations, correct decimal places for display).\n- Step 3: **Quote each required value to the specified accuracy** (e.g., $$x_3$$ and $$\\alpha$$ each to 4 d.p.). The final answer must be stated to the requested precision, but intermediate steps use full precision.", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": false}, {"question": "P3 Q3 — the question states \"solutions relying entirely on calculator technology are not acceptable.\" What does this mean for how you must present your work? (2 steps)", "answer": "- Step 1: You must show the algebraic steps that lead to your answer. For example, when solving $$100 \\cdot 10^{0.05T} \\cdot 0.05\\ln 10 = 50$$, you must show the rearrangement to $$10^{0.05T} = \\frac{10}{\\ln 10}$$ and then $$T = \\frac{\\log_{10}(10/\\ln 10)}{0.05}$$.\n- Step 2: Simply writing $$T = 13$$ from a calculator solver with no working earns no marks. Every step — taking logs, dividing, simplifying — must appear on paper. The calculator checks your answer; the working earns the marks.", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": false}, {"question": "P3 Q3(b) — what is the index law $$10^{p+q} = \\,?$$, and why is it essential for converting log form to exponential form? (2 steps)", "answer": "- Step 1: $$10^{p+q} = 10^p \\times 10^q$$. This is the product rule for indices: when you add exponents, you multiply the powers.\n- Step 2: When you have $$\\log_{10}V = 0.05t + 2$$ and raise 10 to both sides, you get $$V = 10^{0.05t + 2}$$. Without the index law, you're stuck with a single messy exponent. Applying it: $$V = 10^{0.05t} \\times 10^2 = 100 \\times 10^{0.05t}$$, which separates the constant $$a = 100$$ from the variable part.", "source": "GLM 5.1 ③", "_id": "glm_3_45", "judge_pick": false}, {"question": "P3 Q3(b) — how do you rewrite $$10^{0.05t}$$ in the form $$b^t$$, and what is the exact value of $$b$$? (2 steps)", "answer": "- Step 1: Use the power-of-a-power law: $$10^{0.05t} = (10^{0.05})^t$$. So $$b = 10^{0.05}$$.\n- Step 2: The exact value of $$b$$ is $$10^{0.05}$$. To 3 significant figures, $$10^{0.05} = 1.12201\\ldots \\approx 1.12$$. But keep the exact form $$10^{0.05}$$ for differentiation in part (c).", "source": "GLM 5.1 ③", "_id": "glm_3_46", "judge_pick": false}, {"question": "P3 Q4(a) — when expanding $$R\\sin(2x - \\alpha)$$, what is the compound-angle formula, and what is the sign pattern? (2 steps)", "answer": "- Step 1: $$R\\sin(2x - \\alpha) = R\\sin 2x\\cos\\alpha - R\\cos 2x\\sin\\alpha$$. The minus sign in the argument produces a minus between the two terms.\n- Step 2: Match coefficients: the coefficient of $$\\sin 2x$$ is $$R\\cos\\alpha$$, and the coefficient of $$\\cos 2x$$ is $$R\\sin\\alpha$$ (with a minus sign already in the expansion, so if the original expression is $$a\\sin 2x - b\\cos 2x$$, then $$R\\cos\\alpha = a$$ and $$R\\sin\\alpha = b$$).", "source": "GLM 5.1 ③", "_id": "glm_3_47", "judge_pick": false}, {"question": "P3 Q4 — when the question says \"give the exact values of $$R$$ and $$\\alpha$$,\" what does \"exact\" prohibit? (2 steps)", "answer": "- Step 1: \"Exact\" means the answer must be in surd form or in terms of $$\\pi$$, not a decimal. $$R = 2\\sqrt{3}$$ is exact; $$R = 3.46$$ is not. $$\\alpha = \\pi/3$$ is exact; $$\\alpha = 1.05$$ is not.\n- Step 2: This is why you must use square-and-add and division (which preserve exactness) rather than finding a decimal $$\\alpha$$ first and then computing $$R$$ from it (which introduces rounding). Harry: \"Your method could be quite dangerous\" if you substitute a decimal.", "source": "GLM 5.1 ③", "_id": "glm_3_48", "judge_pick": false}, {"question": "P3 Q4(b)(ii) — when solving $$\\sin\\theta = 1$$, what is the general solution, and how do you use it to find the smallest positive $$x$$? (3 steps)", "answer": "- Step 1: $$\\sin\\theta = 1$$ when $$\\theta = \\frac{\\pi}{2} + 2n\\pi$$ for integer $$n$$. This is the general solution.\n- Step 2: Here $$\\theta = 6x - \\frac{\\pi}{3}$$, so $$6x - \\frac{\\pi}{3} = \\frac{\\pi}{2} + 2n\\pi$$, giving $$6x = \\frac{5\\pi}{6} + 2n\\pi$$, so $$x = \\frac{5\\pi}{36} + \\frac{n\\pi}{3}$$.\n- Step 3: For the smallest positive $$x$$, set $$n = 0$$: $$x = \\frac{5\\pi}{36}$$. Check $$n = 1$$ gives a larger value. Always verify by checking the next value of $$n$$.", "source": "GLM 5.1 ③", "_id": "glm_3_49", "judge_pick": false}, {"question": "What is the general relationship $$\\log_b x = y \\Leftrightarrow \\,?$$, and when do you use it? (2 steps)", "answer": "- Step 1: $$\\log_b x = y \\Leftrightarrow x = b^y$$. This is the fundamental equivalence between logarithmic and exponential form. It is how you \"undo\" a logarithm.\n- Step 2: Use it whenever you need to convert between log form and index form. In Q3, converting $$\\log_{10}V = 0.05t + 2$$ to $$V = 10^{0.05t+2}$$ is a direct application of this relationship with $$b = 10$$.", "source": "GLM 5.1 ③", "_id": "glm_3_50", "judge_pick": true}, {"question": "P3 Q5(c) — when you factor the numerator $$7600e^{0.1T} - 400e^{0.3T} = 0$$, what is the factored form, and why is factoring better than dividing? (2 steps)", "answer": "- Step 1: Factor out the common factor $$400e^{0.1T}$$: $$400e^{0.1T}(19 - e^{0.2T}) = 0$$. (Or equivalently, $$e^{0.1T}(7600 - 400e^{0.2T}) = 0$$.)\n- Step 2: Factoring is better than dividing both sides by $$e^{0.1T}$$ because dividing by a variable expression requires you to first check it's not zero. Factoring makes both factors explicit: $$e^{0.1T} = 0$$ (rejected) or $$19 - e^{0.2T} = 0$$ (solved). This is more rigorous and avoids the logical error of dividing by something that could be zero.", "source": "GLM 5.1 ③", "_id": "glm_3_51", "judge_pick": false}, {"question": "ESAT/P3 — what is the key fact about $$e^x$$ that you use twice in Q5: once to reject a factor and once to guarantee a denominator is non-zero? (2 steps)", "answer": "- Step 1: $$e^x > 0$$ for all real $$x$$. The exponential function is always strictly positive — it never equals zero and never goes negative.\n- Step 2: This fact is used (i) to reject $$e^{0.1T} = 0$$ when solving the numerator equation (since $$e^{0.1T}$$ can never be zero), and (ii) to guarantee the denominator $$(19 + e^{0.2t})^2 > 0$$ for all $$t$$ (since $$e^{0.2t} > 0$$, the denominator is always positive and never zero).", "source": "GLM 5.1 ③", "_id": "glm_3_52", "judge_pick": false}, {"question": "P3 exam technique — Harry says \"formula recall is the main gap.\" What is his recommended strategy for fixing this, and how many papers does he suggest? (2 steps)", "answer": "- Step 1: Build flashcards for the key formulae (sphere SA, cylinder SA, circle area/circumference, $$a^{kx}$$ derivative, quotient rule). Harry: \"Learning formulae is something your flashcards could really help with.\"\n- Step 2: Do 8 to 10 past papers to build fluency so the formulae \"become second nature.\" Volume of practice creates automaticity — you should be able to write down the sphere surface area without thinking.", "source": "GLM 5.1 ③", "_id": "glm_3_53", "judge_pick": false}, {"question": "P3 exam technique — what does Harry say about exam entry strategy when you're not fully prepared for all modules? (2 steps)", "answer": "- Step 1: Reaching A* standard in every module for October is \"going to be a real stretch\" if you rely only on tutorials. Independent study between sessions is essential.\n- Step 2: It may be \"safer to push some of these back\" and enter only the 3 or 4 modules you are most ready for, rather than risk low grades across the board. Strategic entry is better than over-entering and getting low marks.", "source": "GLM 5.1 ③", "_id": "glm_3_54", "judge_pick": false}, {"question": "P3 Q5 — what is the complete list of traps in this single question, and which step does each trap appear at? (4 steps)", "answer": "- Step 1: **Trap at part (a):** $$e^0 = 1$$, so the denominator is $$19 + 1 = 20$$, not 19. \"Don't lose the one.\"\n- Step 2: **Trap at part (b):** The quotient rule has a minus sign ($$vu' - uv'$$). Dropping it gives a wrong derivative.\n- Step 3: **Trap at part (c):** \"Show that\" means stop at $$e^{0.2T} = 19$$. Don't solve for $$T$$. And use $$\\ln$$, not $$\\log_{10}$$, because the base is $$e$$.\n- Step 4: **Trap at part (d):** Round only at the final answer. Substitute the stored value of $$T$$, not a rounded one.", "source": "GLM 5.1 ③", "_id": "glm_3_55", "judge_pick": false}, {"question": "P3 Q3(c) — when differentiating $$V = 100(10^{0.05})^t$$, walk through the full differentiation and explain why each factor appears. (3 steps)", "answer": "- Step 1: Write $$V = 100 \\cdot a^{kt}$$ where $$a = 10^{0.05}$$ and $$k = 1$$. The derivative is $$\\frac{dV}{dt} = 100 \\cdot a^{kt} \\cdot k\\ln a = 100 \\cdot (10^{0.05})^t \\cdot 1 \\cdot \\ln(10^{0.05})$$.\n- Step 2: Simplify $$\\ln(10^{0.05}) = 0.05\\ln 10$$ (using $$\\ln(a^k) = k\\ln a$$). So $$\\frac{dV}{dt} = 100 \\cdot 10^{0.05t} \\cdot 0.05\\ln 10 = 0.05\\ln 10 \\cdot V$$.\n- Step 3: The three factors are: 100 (the constant multiplier), $$10^{0.05t}$$ (the exponential itself, which always reappears), and $$0.05\\ln 10$$ (the chain-rule factor: $$k\\ln a$$ where $$k = 0.05$$ and $$a = 10$$).", "source": "GLM 5.1 ③", "_id": "glm_3_56", "judge_pick": true}, {"question": "P3 Q4(b)(i) — why is minimising a fraction with a constant numerator equivalent to maximising the denominator? Give the intuition. (2 steps)", "answer": "- Step 1: For a fraction $$\\frac{c}{D}$$ where $$c > 0$$ is constant, as $$D$$ increases, the fraction decreases (you're dividing the same number by a bigger number). This is a monotonic relationship: bigger denominator → smaller fraction.\n- Step 2: Therefore the minimum of $$\\frac{c}{D}$$ occurs at the same $$x$$-value where $$D$$ is maximised. This avoids differentiating a complex fraction — you only need to find the maximum of the denominator, which for a trig expression is simply where the sine equals 1.", "source": "GLM 5.1 ③", "_id": "glm_3_57", "judge_pick": false}, {"question": "P3 Q2(b) — in the rearrangement, what is the purpose of multiplying both sides by $$e^x x^2$$, and how do you know to do it? (2 steps)", "answer": "- Step 1: The original equation has $$e^x$$ in the denominator and $$x^{-2}$$ (i.e., $$\\frac{1}{x^2}$$) as a separate term. Multiplying by $$e^x x^2$$ clears both denominators in one step, converting the equation into a polynomial-exponential form.\n- Step 2: You know to do this because the target form has no fractions on the left side ($$x^3 = \\ldots$$), so you need to eliminate denominators. Multiplying by the least common multiple of all denominators ($$e^x x^2$$) is the standard algebraic move for clearing fractions.", "source": "GLM 5.1 ③", "_id": "glm_3_58", "judge_pick": false}, {"question": "P3 Q3(a) — when finding the equation of a straight line through two points $$(x_1, y_1)$$ and $$(x_2, y_2)$$, what is the gradient formula, and what is the intercept shortcut? (2 steps)", "answer": "- Step 1: Gradient $$m = \\frac{y_2 - y_1}{x_2 - x_1}$$. For points $$(0, 2)$$ and $$(5, 2.25)$$: $$m = \\frac{2.25 - 2}{5 - 0} = \\frac{0.25}{5} = 0.05$$.\n- Step 2: When one point is on the y-axis (i.e., $$x = 0$$), its y-coordinate is the intercept $$c$$ directly. Here $$(0, 2)$$ gives $$c = 2$$. So $$\\log_{10}V = 0.05t + 2$$.", "source": "GLM 5.1 ③", "_id": "glm_3_59", "judge_pick": false}, {"question": "P3 Q5(b) — when differentiating $$u = 4000e^{0.1t}$$, what is $$u'$$, and what is the common mistake with the coefficient? (2 steps)", "answer": "- Step 1: $$u' = 4000 \\cdot 0.1 \\cdot e^{0.1t} = 400e^{0.1t}$$. The chain rule brings down the 0.1 from the exponent.\n- Step 2: The common mistake is forgetting the 0.1 and writing $$u' = 4000e^{0.1t}$$ (missing the factor of 0.1). This would make the entire derivative wrong. Always remember: for $$e^{kt}$$, the derivative is $$ke^{kt}$$, so the $$k$$ comes down as a multiplier.", "source": "GLM 5.1 ③", "_id": "glm_3_60", "judge_pick": false}, {"question": "P3 Q5(b) — when differentiating $$v = 19 + e^{0.2t}$$, what is $$v'$$? (1 step answer)", "answer": "$$v' = 0 + 0.2e^{0.2t} = 0.2e^{0.2t}$$. The derivative of the constant 19 is zero, and the derivative of $$e^{0.2t}$$ is $$0.2e^{0.2t}$$ (chain rule brings down the 0.2).", "source": "GLM 5.1 ③", "_id": "glm_3_61", "judge_pick": false}, {"question": "P3 exam technique — Harry praised Phuc for picking up on \"little details.\" What are two examples of such details that appear in this paper? (2 steps)", "answer": "- Step 1: \"Nearest whole number\" — in Q5(d), the answer 458.83... must be rounded to 459, not left as 458.83. Reading the command \"nearest whole number\" and obeying it is a detail that costs marks if missed.\n- Step 2: \"3 significant figures\" — in Q3(b), the base must be reported as 1.12 (3 s.f.), not 1.122 or 1.1. The required precision is stated in the question; missing it loses the final accuracy mark.", "source": "GLM 5.1 ③", "_id": "glm_3_62", "judge_pick": false}, {"question": "P3 Q4(a) — what is the compound-angle expansion for $$R\\sin(2x - \\alpha)$$, and what would change if it were $$R\\sin(2x + \\alpha)$$ instead? (2 steps)", "answer": "- Step 1: $$R\\sin(2x - \\alpha) = R\\sin 2x\\cos\\alpha - R\\cos 2x\\sin\\alpha$$. The minus sign in the argument produces a minus between the two terms.\n- Step 2: For $$R\\sin(2x + \\alpha) = R\\sin 2x\\cos\\alpha + R\\cos 2x\\sin\\alpha$$. The plus sign in the argument produces a plus between the terms. The sign between the two expanded terms is always the same as the sign in the argument. This determines whether $$R\\sin\\alpha$$ matches the coefficient of $$\\cos 2x$$ with a plus or minus.", "source": "GLM 5.1 ③", "_id": "glm_3_63", "judge_pick": false}, {"question": "P3 Q2(b) — after reaching $$2x^4 + 3x^3 - 4x^2 = e^x$$, what is the next algebraic move, and how does the target form guide you? (2 steps)", "answer": "- Step 1: Move $$4x^2$$ to the right side: $$2x^4 + 3x^3 = e^x + 4x^2$$. This isolates all the polynomial terms on the left.\n- Step 2: The target has $$2x + 3$$ in the denominator, so factor the left side to expose this factor: $$x^3(2x + 3) = e^x + 4x^2$$. Then divide both sides by $$(2x + 3)$$ to get $$x^3 = \\frac{e^x + 4x^2}{2x + 3}$$. The target form is your roadmap.", "source": "GLM 5.1 ③", "_id": "glm_3_64", "judge_pick": false}, {"question": "P3 Q5 — what is the complete model $$N(t)$$, and what does each part represent physically? (2 steps)", "answer": "- Step 1: $$N = \\frac{4000e^{0.1t}}{19 + e^{0.2t}}$$. The numerator $$4000e^{0.1t}$$ represents exponential growth in the squirrel population (or food supply), and the denominator $$19 + e^{0.2t}$$ represents a limiting factor that grows faster (exponent 0.2 > 0.1).\n- Step 2: Because the denominator grows faster than the numerator, the fraction eventually levels off — this is a saturation model. The population grows quickly at first but approaches a maximum carrying capacity. The maximum occurs when the growth rate of the numerator balances the growth rate of the denominator.", "source": "GLM 5.1 ③", "_id": "glm_3_65", "judge_pick": false}, {"question": "P3 Q3(c) — walk through solving $$0.05\\ln(10) \\cdot V = 50$$ for $$T$$, showing why you must use $$\\log_{10}$$ at a specific step. (3 steps)", "answer": "- Step 1: Since $$V = 100 \\cdot 10^{0.05T}$$, substitute: $$0.05\\ln(10) \\cdot 100 \\cdot 10^{0.05T} = 50$$, so $$10^{0.05T} = \\frac{50}{5\\ln 10} = \\frac{10}{\\ln 10}$$.\n- Step 2: To solve $$10^{0.05T} = \\frac{10}{\\ln 10}$$, take $$\\log_{10}$$ of both sides (since the base is 10): $$0.05T = \\log_{10}\\left(\\frac{10}{\\ln 10}\\right)$$.\n- Step 3: $$T = \\frac{\\log_{10}(10/\\ln 10)}{0.05} \\approx 12.756 \\approx 13$$. Note: you use $$\\log_{10}$$ here because the base is 10, but in Q5 you use $$\\ln$$ because the base is $$e$$. Match the log to the base.", "source": "GLM 5.1 ③", "_id": "glm_3_66", "judge_pick": false}, {"question": "P3 Q1 — although not worked in the session, what type of question is it, and why should you prioritise it in independent practice? (2 steps)", "answer": "- Step 1: Q1 covers functions: range of $$f$$, inverse function $$g^{-1}$$, composite function $$fg(0)$$, and solving a composite equation for an exact value. These are standard opening marks on P3 papers.\n- Step 2: Prioritise it because inverse-function and composite-function questions are reliable 8–9 mark earners — they test procedure (finding inverses, substituting into composites) rather than insight. These are marks you should never drop, so practise until automatic.", "source": "GLM 5.1 ③", "_id": "glm_3_67", "judge_pick": false}, {"question": "P3 Q2(c) — the iteration was skipped. What is the iteration formula, the starting value, and what must you find? (2 steps)", "answer": "- Step 1: The iteration is $$x_{n+1} = \\sqrt[3]{\\frac{e^{x_n} + 4x_n^2}{2x_n + 3}}$$ with $$x_1 = 1$$. You must find $$x_3$$ and the root $$\\alpha$$ to 4 decimal places.\n- Step 2: Compute $$x_2$$ from $$x_1 = 1$$, then $$x_3$$ from $$x_2$$, using full calculator precision. Continue iterating until the value stabilises to 4 d.p. — that stabilised value is $$\\alpha$$. Do not round intermediate iterates.", "source": "GLM 5.1 ③", "_id": "glm_3_68", "judge_pick": false}, {"question": "P3 exam technique — what is Harry's homework plan for the next session (19 July), and what will he test as a starter? (2 steps)", "answer": "- Step 1: Harry will ask differentiation-of-power-functions questions as a starter at the beginning of the 19 July session. Expect to be tested on the $$a^{kx}$$ derivative rule cold.\n- Step 2: The assigned homework includes: differentiation revision, learning the ESAT geometry formulae (using the cheat sheet and flashcards), and completing the P3 June 2024 paper. The Q2(c) iteration was also invited to be completed and sent to Harry.", "source": "GLM 5.1 ③", "_id": "glm_3_69", "judge_pick": false}, {"question": "ESAT warm-up — when the problem says \"10 solid closed cylinders,\" what does \"closed\" tell you about the surface area formula? (2 steps)", "answer": "- Step 1: \"Closed\" means each cylinder has both a top and a bottom circular face. The surface area includes both ends: $$2\\pi r^2$$ for the two circles, plus $$2\\pi rh$$ for the curved side.\n- Step 2: If the cylinders were \"open,\" you would only include one circular end ($$\\pi r^2$$) or none. The word \"closed\" is the trigger to use the full formula $$2\\pi r^2 + 2\\pi rh$$. Missing this word was Phuc's error — he used only one end.", "source": "GLM 5.1 ③", "_id": "glm_3_70", "judge_pick": false}, {"question": "P3 Q4(b)(ii) — Harry sketched a sine wave to confirm the smallest $$x$$. Why is a sketch useful here, and what does it show? (2 steps)", "answer": "- Step 1: A sine wave sketch shows all the points where $$\\sin\\theta = 1$$ visually — they occur at the peaks of the wave, spaced $$2\\pi$$ apart. This lets you see that the first peak (principal solution) gives the smallest $$x$$.\n- Step 2: The sketch confirms that the next solution ($$n = 1$$) is at $$x = \\frac{17\\pi}{36}$$, which is clearly further along the x-axis than $$x = \\frac{5\\pi}{36}$$. Without the sketch, you might worry about whether a smaller positive solution exists. The sketch gives visual certainty.", "source": "GLM 5.1 ③", "_id": "glm_3_71", "judge_pick": false}, {"question": "P3 Q5(d) — when substituting back to find the maximum $$N$$, you need $$e^{0.1T}$$ and $$e^{0.2T}$$. Given $$e^{0.2T} = 19$$, what are both values? (2 steps)", "answer": "- Step 1: $$e^{0.2T} = 19$$ (given from part (c)). The denominator is $$19 + e^{0.2T} = 19 + 19 = 38$$.\n- Step 2: $$e^{0.1T} = (e^{0.2T})^{1/2} = \\sqrt{19}$$. The numerator is $$4000e^{0.1T} = 4000\\sqrt{19}$$. So $$N = \\frac{4000\\sqrt{19}}{38} \\approx 458.83 \\approx 459$$.", "source": "GLM 5.1 ③", "_id": "glm_3_72", "judge_pick": false}, {"question": "P3 Q3(c) — Phuc suggested \"arithmetic series\" when he saw \"rate of increase.\" Why is this wrong, and what is the correct interpretation? (2 steps)", "answer": "- Step 1: An arithmetic series has a constant difference between terms (e.g., adding 50 each year). But the model $$V = 100(10^{0.05})^t$$ is exponential — the increase each year is proportional to the current value, not constant.\n- Step 2: \"Rate of increase\" in calculus means the instantaneous rate of change, which is the derivative $$\\frac{dV}{dt}$$. Setting $$\\frac{dV}{dt} = 50$$ finds the time when the share price is rising at exactly £50 per year. This is a calculus problem, not a series problem.", "source": "GLM 5.1 ③", "_id": "glm_3_73", "judge_pick": false}, {"question": "P3 Q4(a) — one analysis segment recorded the coefficients as $$3\\sin 2x - 4\\cos 2x$$ (giving $$R = 5$$), but the official paper has $$\\sqrt{3}\\sin 2x - 3\\cos 2x$$. What is the lesson here? (2 steps)", "answer": "- Step 1: Always verify against the official question paper, not against transcribed notes or secondary sources. Transcription errors happen — coefficients are easily miscopied.\n- Step 2: With the wrong coefficients, you get $$R = 5$$ and $$\\alpha = 0.927$$, which are completely different from the correct $$R = 2\\sqrt{3}$$ and $$\\alpha = \\pi/3$$. Every downstream answer (the minimum of $$g(x)$$, the smallest $$x$$) would be wrong. The paper is authoritative.", "source": "GLM 5.1 ③", "_id": "glm_3_74", "judge_pick": false}, {"question": "P3 Q5 — one analysis segment mis-copied the denominator as $$19 + e^{0.1t}$$ instead of $$19 + e^{0.2t}$$. How would this change the problem, and what is the principle? (2 steps)", "answer": "- Step 1: With $$19 + e^{0.1t}$$ in the denominator, the numerator and denominator would have the same exponential rate ($$e^{0.1t}$$), and the model would behave very differently — it would not have a maximum in the same way. The correct denominator $$19 + e^{0.2t}$$ grows faster than the numerator, creating the saturation behaviour.\n- Step 2: The principle: always read the exponents directly from the question paper. A single digit change (0.1 → 0.2) fundamentally alters the model's behaviour. Cross-check every exponent against the original paper.", "source": "GLM 5.1 ③", "_id": "glm_3_75", "judge_pick": false}, {"question": "P3 Q2(b) — there is a transcript/ledger conflict about whether Phuc completed the rearrangement. How does the guide resolve this, and what is the principle for handling evidence conflicts? (2 steps)", "answer": "- Step 1: The primary spoken transcript records Harry confirming \"well done, and then we're there\" — indicating completion with prompting. The video-evidence ledger calls it partial. The guide treats it as \"completed with prompting\" based on the transcript, which is the more direct evidence.\n- Step 2: The principle: when evidence sources conflict, flag the conflict explicitly and prefer the most direct/primary source (the spoken transcript over a secondary analysis ledger). The genuinely skipped item is Q2(c), which was explicitly left and not reached.", "source": "GLM 5.1 ③", "_id": "glm_3_76", "judge_pick": false}, {"question": "P3 Q3(c) — when solving for $$T$$ and the answer must be \"the nearest integer,\" what is the final step, and what is the trap? (2 steps)", "answer": "- Step 1: Compute $$T = \\frac{\\log_{10}(10/\\ln 10)}{0.05} \\approx 12.756$$. The nearest integer is 13.\n- Step 2: The trap is giving $$T = 12.756$$ (unrounded) or $$T = 12.8$$ (wrong rounding) instead of $$T = 13$$. The question says \"nearest integer,\" so you must round to the nearest whole number. Always read the required precision from the question.", "source": "GLM 5.1 ③", "_id": "glm_3_77", "judge_pick": false}, {"question": "P3 Q4(b)(i) — the minimum of $$g(x)$$ is $$\\sqrt{3}$$. Walk through the rationalisation step and explain why it's necessary. (2 steps)", "answer": "- Step 1: The raw answer is $$\\frac{18}{6\\sqrt{3}} = \\frac{3}{\\sqrt{3}}$$. Rationalise by multiplying numerator and denominator by $$\\sqrt{3}$$: $$\\frac{3\\sqrt{3}}{3} = \\sqrt{3}$$.\n- Step 2: Edexcel mark schemes require surd answers in rationalised form. $$\\frac{3}{\\sqrt{3}}$$ has a surd in the denominator, which is not considered simplified. $$\\sqrt{3}$$ is the standard exact form. Failing to rationalise may lose the final mark.", "source": "GLM 5.1 ③", "_id": "glm_3_78", "judge_pick": false}, {"question": "P3 Q5(c) — when the numerator of $$\\frac{dN}{dt}$$ is $$7600e^{0.1T} - 400e^{0.3T}$$, show the step that produces $$e^{0.2T} = 19$$. (3 steps)", "answer": "- Step 1: Set the numerator to zero: $$7600e^{0.1T} - 400e^{0.3T} = 0$$. Factor out $$400e^{0.1T}$$: $$400e^{0.1T}(19 - e^{0.2T}) = 0$$.\n- Step 2: Since $$e^{0.1T} > 0$$ always, reject that factor. Solve $$19 - e^{0.2T} = 0$$.\n- Step 3: $$e^{0.2T} = 19$$. This is the \"show that\" result. Stop here for part (c) — do not solve for $$T$$.", "source": "GLM 5.1 ③", "_id": "glm_3_79", "judge_pick": false}, {"question": "P3 Q4(b)(i) — what is the maximum value of the denominator $$2\\sqrt{3}\\sin\\left(6x - \\frac{\\pi}{3}\\right) + 4\\sqrt{3}$$, and why? (2 steps)", "answer": "- Step 1: The sine function has range $$[-1, 1]$$, so its maximum value is 1. The denominator is maximised when $$\\sin\\left(6x - \\frac{\\pi}{3}\\right) = 1$$.\n- Step 2: Maximum denominator = $$2\\sqrt{3}(1) + 4\\sqrt{3} = 2\\sqrt{3} + 4\\sqrt{3} = 6\\sqrt{3}$$. This is a constant — it doesn't depend on $$x$$. The minimum of $$g(x)$$ is then $$\\frac{18}{6\\sqrt{3}} = \\sqrt{3}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_80", "judge_pick": false}, {"question": "P3 exam technique — what is the \"read the command word\" trap, and what are two examples from this paper? (2 steps)", "answer": "- Step 1: The command word tells you exactly what to do and where to stop. \"Show that\" means prove the given result and stop — do not go further. \"Find\" means compute a numerical answer. \"Write down\" means no working needed.\n- Step 2: Example 1: Q5(c) says \"show that $$e^{0.2T} = A$$\" — Phuc pushed on to solve for $$T$$, which is part (d). Example 2: Q5(d) says \"nearest whole number\" — you must round to an integer, not leave a decimal.", "source": "GLM 5.1 ③", "_id": "glm_3_81", "judge_pick": false}, {"question": "P3 Q3(c) — when you have $$10^{0.05T} = \\frac{10}{\\ln 10}$$, why do you take $$\\log_{10}$$ (not $$\\ln$$) of both sides? (2 steps)", "answer": "- Step 1: The base of the exponential is 10, so the inverse function is $$\\log_{10}$$. Taking $$\\log_{10}$$: $$0.05T = \\log_{10}\\left(\\frac{10}{\\ln 10}\\right)$$.\n- Step 2: You could use $$\\ln$$ instead ($$0.05T = \\frac{\\ln(10/\\ln 10)}{\\ln 10}$$), but this is more complex and error-prone. The principle: match the logarithm to the base of the exponential. Base 10 → $$\\log_{10}$$; base $$e$$ → $$\\ln$$.", "source": "GLM 5.1 ③", "_id": "glm_3_82", "judge_pick": false}, {"question": "ESAT warm-up — when you reach a quadratic in $$R$$ with coefficients involving $$r$$, how do you apply the quadratic formula, and what determines which root to keep? (3 steps)", "answer": "- Step 1: Treat $$r$$ as a constant and $$R$$ as the variable. For $$R^2 - 20rR - 5r^2 = 0$$: $$a = 1$$, $$b = -20r$$, $$c = -5r^2$$.\n- Step 2: Apply the formula: $$R = \\frac{20r \\pm \\sqrt{400r^2 + 20r^2}}{2} = \\frac{20r \\pm \\sqrt{420r^2}}{2} = \\frac{20r \\pm r\\sqrt{420}}{2}$$.\n- Step 3: Since $$R$$ is a radius, it must be positive. The root with the minus sign gives $$R = r(10 - \\sqrt{105}) < 0$$ (since $$\\sqrt{105} > 10$$), so reject it. Keep the positive root: $$R = r(10 + \\sqrt{105})$$.", "source": "GLM 5.1 ③", "_id": "glm_3_83", "judge_pick": false}, {"question": "P3 Q5(b) — in the quotient rule expansion, the term $$400e^{0.3t}$$ appears. Where does the 0.3 come from? (2 steps)", "answer": "- Step 1: It comes from multiplying $$e^{0.1t}$$ and $$e^{0.2t}$$: when you multiply exponentials with the same base, you add the exponents. $$e^{0.1t} \\times e^{0.2t} = e^{(0.1+0.2)t} = e^{0.3t}$$.\n- Step 2: This appears in the $$uv'$$ term of the quotient rule: $$u = 4000e^{0.1t}$$ and $$v' = 0.2e^{0.2t}$$, so $$uv' = 4000e^{0.1t} \\times 0.2e^{0.2t} = 800e^{0.3t}$$. The index law $$e^a \\cdot e^b = e^{a+b}$$ is what creates the 0.3.", "source": "GLM 5.1 ③", "_id": "glm_3_84", "judge_pick": false}, {"question": "P3 Q4(a) — when matching coefficients of $$\\sqrt{3}\\sin 2x - 3\\cos 2x$$ with $$R\\sin(2x - \\alpha)$$, what are the two equations you write down, and why must you be careful about signs? (2 steps)", "answer": "- Step 1: Expanding: $$R\\sin(2x - \\alpha) = (R\\cos\\alpha)\\sin 2x - (R\\sin\\alpha)\\cos 2x$$. Matching: $$R\\cos\\alpha = \\sqrt{3}$$ and $$R\\sin\\alpha = 3$$.\n- Step 2: The sign care: the original expression has $$-3\\cos 2x$$, and the expansion has $$-(R\\sin\\alpha)\\cos 2x$$. So $$R\\sin\\alpha = 3$$ (positive), not $$-3$$. The minus sign is already accounted for in the expansion. A common error is to set $$R\\sin\\alpha = -3$$, which would put $$\\alpha$$ in the wrong quadrant.", "source": "GLM 5.1 ③", "_id": "glm_3_85", "judge_pick": false}, {"question": "P3 Q2(a) — for the function $$f(x) = \\frac{2x^2 + 3x - 4}{e^x} - \\frac{1}{x^2}$$, why is it continuous on $$[1, 2]$$, and what would make it discontinuous? (2 steps)", "answer": "- Step 1: $$f(x)$$ is continuous on $$[1, 2]$$ because both $$\\frac{2x^2 + 3x - 4}{e^x}$$ (a polynomial divided by a never-zero exponential) and $$\\frac{1}{x^2}$$ (defined for all $$x \\neq 0$$) are continuous on this interval. The only discontinuity is at $$x = 0$$, which is outside $$[1, 2]$$.\n- Step 2: If the interval included $$x = 0$$, the function would be discontinuous there (division by zero in $$\\frac{1}{x^2}$$), and the IVT would not apply. This is why you must check that the function is defined and continuous on the *entire* closed interval.", "source": "GLM 5.1 ③", "_id": "glm_3_86", "judge_pick": true}, {"question": "P3 Q5 — what is the derivative of $$e^{0}$$, and why is this relevant to part (a)? (2 steps)", "answer": "- Step 1: $$e^0 = 1$$ is a constant, so its derivative is 0. But in part (a), you are not differentiating — you are *evaluating* the model at $$t = 0$$.\n- Step 2: The relevance is that $$e^{0.1 \\times 0} = e^0 = 1$$ and $$e^{0.2 \\times 0} = e^0 = 1$$. Both exponentials evaluate to 1 at $$t = 0$$. The trap is forgetting this and treating $$e^0$$ as 0, which would give a denominator of 19 instead of 20.", "source": "GLM 5.1 ③", "_id": "glm_3_87", "judge_pick": false}, {"question": "P3 Q3 — the question says \"solutions relying entirely on calculator technology are not acceptable.\" If you use a calculator to check your answer, is that acceptable? (2 steps)", "answer": "- Step 1: Yes — using a calculator to *verify* your answer is fine. The prohibition is against presenting an answer with no algebraic working, as if the calculator solved it for you.\n- Step 2: You must show the method: the differentiation step, setting the derivative equal to 50, the algebraic rearrangement, and the log-taking step. The calculator can confirm $$T \\approx 12.756$$, but the marks are in the working, not the number.", "source": "GLM 5.1 ③", "_id": "glm_3_88", "judge_pick": false}, {"question": "P3 Q4(b)(i) — what is the minimum value of the denominator $$2\\sqrt{3}\\sin\\left(6x - \\frac{\\pi}{3}\\right) + 4\\sqrt{3}$$, and why does this matter for the *maximum* of $$g(x)$$? (2 steps)", "answer": "- Step 1: The minimum of the denominator occurs when $$\\sin\\left(6x - \\frac{\\pi}{3}\\right) = -1$$, giving $$2\\sqrt{3}(-1) + 4\\sqrt{3} = 2\\sqrt{3}$$.\n- Step 2: Since $$g(x) = \\frac{18}{\\text{denominator}}$$, the *maximum* of $$g(x)$$ occurs when the denominator is *minimised*. So max $$g = \\frac{18}{2\\sqrt{3}} = \\frac{9}{\\sqrt{3}} = 3\\sqrt{3}$$. This question only asked for the minimum, but understanding both directions is key for full mastery.", "source": "GLM 5.1 ③", "_id": "glm_3_89", "judge_pick": false}, {"question": "P3 Q5(d) — why is it important that the answer is 459 and not 458? What rounding rule applies? (2 steps)", "answer": "- Step 1: $$N = 458.83\\ldots$$ The digit after the decimal point is 8, which is ≥ 5, so rounding to the nearest whole number gives 459, not 458.\n- Step 2: The rounding rule is standard: if the first discarded digit is 5 or more, round up. \"Nearest whole number\" means round to the closest integer. 458.83 is closer to 459 than to 458. Getting this wrong loses the final accuracy mark.", "source": "GLM 5.1 ③", "_id": "glm_3_90", "judge_pick": false}, {"question": "P3 Q4(a) — when the question specifies $$0 < \\alpha < \\frac{\\pi}{2}$$, what does this tell you about the quadrant, and why does it matter? (2 steps)", "answer": "- Step 1: $$0 < \\alpha < \\frac{\\pi}{2}$$ means $$\\alpha$$ is in the first quadrant, where both sine and cosine are positive. This confirms that $$R\\cos\\alpha > 0$$ and $$R\\sin\\alpha > 0$$, so $$R > 0$$ and both matched coefficients are positive.\n- Step 2: This matters because $$\\tan^{-1}$$ returns a value in $$(-\\frac{\\pi}{2}, \\frac{\\pi}{2})$$, and for a positive ratio it returns a first-quadrant angle. The domain restriction confirms this is correct. Without the restriction, you might need to check whether $$\\alpha$$ is in a different quadrant.", "source": "GLM 5.1 ③", "_id": "glm_3_91", "judge_pick": false}, {"question": "P3 Q5(c) — when you reach $$e^{0.2T} = 19$$, the question says \"show that $$e^{0.2T} = A$$\" and asks you to find $$A$$. What is $$A$$, and what must you NOT do? (2 steps)", "answer": "- Step 1: $$A = 19$$. The question is asking you to identify the constant, not to solve for $$T$$.\n- Step 2: Do NOT take $$\\ln$$ of both sides, do NOT solve for $$T$$, do NOT write $$T = \\frac{\\ln 19}{0.2}$$. Part (c) only asks you to show the form and state $$A$$. Solving for $$T$$ is part (d). Over-reaching is the trap.", "source": "GLM 5.1 ③", "_id": "glm_3_92", "judge_pick": false}, {"question": "P3 Q2(b) — what is the complete sequence of algebraic moves from $$f(x) = 0$$ to the cube-root iteration form? (5 steps)", "answer": "- Step 1: Set $$f(x) = 0$$: $$\\frac{2x^2 + 3x - 4}{e^x} - \\frac{1}{x^2} = 0$$. Move $$\\frac{1}{x^2}$$ across: $$\\frac{2x^2 + 3x - 4}{e^x} = \\frac{1}{x^2}$$.\n- Step 2: Multiply both sides by $$e^x x^2$$ to clear denominators: $$x^2(2x^2 + 3x - 4) = e^x$$.\n- Step 3: Expand the left: $$2x^4 + 3x^3 - 4x^2 = e^x$$. Move $$4x^2$$ to the right: $$2x^4 + 3x^3 = e^x + 4x^2$$.\n- Step 4: Factor the left: $$x^3(2x + 3) = e^x + 4x^2$$. Divide by $$(2x + 3)$$: $$x^3 = \\frac{e^x + 4x^2}{2x + 3}$$.\n- Step 5: Cube-root both sides: $$x = \\sqrt[3]{\\frac{e^x + 4x^2}{2x + 3}}$$. The target is reached.", "source": "GLM 5.1 ③", "_id": "glm_3_93", "judge_pick": true}, {"question": "P3 Q3(b) — what is the exact value of $$a$$ in $$V = ab^t$$, and why is it exact rather than approximate? (2 steps)", "answer": "- Step 1: From $$\\log_{10}V = 0.05t + 2$$, raising 10 to both sides and splitting: $$V = 100 \\times (10^{0.05})^t$$. So $$a = 100$$.\n- Step 2: $$a = 100$$ is exact because it comes directly from $$10^2 = 100$$ — no rounding is involved. The base $$b = 10^{0.05} \\approx 1.12$$ is the one that gets rounded to 3 s.f. The constant $$a$$ is an integer and should be reported exactly.", "source": "GLM 5.1 ③", "_id": "glm_3_94", "judge_pick": false}, {"question": "P3 exam technique — what is the \"calculator handwriting\" trap Harry flagged, and how do you avoid it? (2 steps)", "answer": "- Step 1: Phuc mis-read his own handwritten \"3\" as \"1\" when entering it into the calculator. Poor handwriting leads to wrong calculator inputs, which produce wrong answers with no warning.\n- Step 2: Avoid it by writing digits clearly and distinctly, and double-checking each number against the question paper before pressing Enter. A single misread digit can propagate through an entire multi-step calculation.", "source": "GLM 5.1 ③", "_id": "glm_3_95", "judge_pick": false}, {"question": "P3 Q5 — the model $$N = \\frac{4000e^{0.1t}}{19 + e^{0.2t}}$$ has a maximum. Intuitively, why does a maximum exist rather than the population growing forever? (2 steps)", "answer": "- Step 1: The numerator grows as $$e^{0.1t}$$ and the denominator grows as $$e^{0.2t}$$ (for large $$t$$). Since the denominator grows faster, the fraction eventually decreases: $$N \\approx \\frac{4000e^{0.1t}}{e^{0.2t}} = 4000e^{-0.1t} \\to 0$$ as $$t \\to \\infty$$.\n- Step 2: At small $$t$$, the denominator is roughly constant (≈ 20), so $$N$$ grows. At large $$t$$, the denominator dominates and $$N$$ shrinks. Between these two regimes, $$N$$ must reach a peak — this is the maximum. It represents the carrying capacity of the environment.", "source": "GLM 5.1 ③", "_id": "glm_3_96", "judge_pick": false}, {"question": "P3 Q3(c) — when differentiating $$V = 100(10^{0.05})^t$$, you get $$\\frac{dV}{dt} = 0.05\\ln(10) \\cdot V$$. What does this relationship $$\\frac{dV}{dt} \\propto V$$ tell you about the growth model? (2 steps)", "answer": "- Step 1: $$\\frac{dV}{dt} = 0.05\\ln(10) \\cdot V$$ means the rate of change is proportional to the current value. This is the defining property of exponential growth — the bigger the share price, the faster it grows (in absolute terms).\n- Step 2: This is why the \"rate of increase\" is £50/year at a specific time $$T$$ — as $$V$$ grows, the rate grows proportionally, so the rate hits any given value (like 50) at exactly one time. This is fundamentally different from linear growth where the rate is constant.", "source": "GLM 5.1 ③", "_id": "glm_3_97", "judge_pick": true}, {"question": "P3 Q4(b)(i) — when finding the minimum of $$g(x) = \\frac{18}{f(3x) + 4\\sqrt{3}}$$, why is it wrong to differentiate $$g(x)$$ and set it to zero? (2 steps)", "answer": "- Step 1: You *could* differentiate $$g(x)$$ using the chain rule and quotient rule, but it would be extremely messy — you'd need to differentiate the R-form expression inside the denominator, set up a complex equation, and solve it.\n- Step 2: The strategic shortcut: since the numerator is a positive constant, minimising the fraction = maximising the denominator. The denominator's maximum is trivially found (sine = 1). This transforms a hard calculus problem into a simple trig observation. Always look for this shortcut when the numerator is constant.", "source": "GLM 5.1 ③", "_id": "glm_3_98", "judge_pick": false}, {"question": "P3 Q5(b) — the quotient rule gives $$\\frac{dN}{dt} = \\frac{7600e^{0.1t} - 400e^{0.3t}}{(19 + e^{0.2t})^2}$$. How can you quickly verify this is dimensionally consistent? (2 steps)", "answer": "- Step 1: $$N$$ has units of \"number of squirrels,\" so $$\\frac{dN}{dt}$$ has units of \"squirrels per year.\" The numerator: $$7600e^{0.1t}$$ has the same units as $$4000e^{0.1t}$$ (squirrels × per-year), and $$400e^{0.3t}$$ similarly. Both terms in the numerator have the same units, so they can be combined.\n- Step 2: The denominator $$(19 + e^{0.2t})^2$$ is dimensionless (19 is a pure number and $$e^{0.2t}$$ is dimensionless). So the overall fraction has units of \"squirrels per year\" — consistent with $$\\frac{dN}{dt}$$. This quick check catches errors like forgetting the square on the denominator.", "source": "GLM 5.1 ③", "_id": "glm_3_99", "judge_pick": false}, {"question": "P3 Q2(b) — when the target form has $$x$$ isolated on the left ($$x = \\ldots$$), what does this tell you about the algebraic strategy? (2 steps)", "answer": "- Step 1: The target has $$x$$ alone on the left, so your goal is to isolate $$x$$ on one side and everything else on the other. Every algebraic move should serve this purpose.\n- Step 2: Specifically: clear denominators (multiply by $$e^x x^2$$), collect all terms with $$x$$ on one side, factor to expose the target's denominator ($$2x+3$$), divide by it, and then take the cube root. Each step is motivated by \"what gets me closer to $$x$$ alone on the left?\"", "source": "GLM 5.1 ③", "_id": "glm_3_100", "judge_pick": false}, {"question": "P3 Q5 — what is the value of $$N$$ as $$t \\to \\infty$$, and how can you see this from the model without calculation? (2 steps)", "answer": "- Step 1: As $$t \\to \\infty$$, $$e^{0.2t}$$ dominates the denominator, so $$N \\approx \\frac{4000e^{0.1t}}{e^{0.2t}} = 4000e^{-0.1t} \\to 0$$.\n- Step 2: The population eventually declines to zero because the denominator's exponential ($$e^{0.2t}$$) grows twice as fast as the numerator's ($$e^{0.1t}$$). The model predicts an initial rise, a peak at $$T \\approx 14.72$$, and then a long decline. This is a \"rise and fall\" model, not a logistic saturation model.", "source": "GLM 5.1 ③", "_id": "glm_3_101", "judge_pick": true}, {"question": "P3 Q4(a) — when you square-and-add $$R\\cos\\alpha = \\sqrt{3}$$ and $$R\\sin\\alpha = 3$$, why does the $$\\cos^2\\alpha + \\sin^2\\alpha$$ term simplify? (2 steps)", "answer": "- Step 1: Squaring and adding: $$(R\\cos\\alpha)^2 + (R\\sin\\alpha)^2 = R^2\\cos^2\\alpha + R^2\\sin^2\\alpha = R^2(\\cos^2\\alpha + \\sin^2\\alpha)$$.\n- Step 2: By the Pythagorean identity, $$\\cos^2\\alpha + \\sin^2\\alpha = 1$$, so the expression simplifies to just $$R^2$$. This is *why* square-and-add works — the trig terms cancel perfectly, leaving only $$R$$. This is why it gives an exact value with no need to know $$\\alpha$$.", "source": "GLM 5.1 ③", "_id": "glm_3_102", "judge_pick": true}, {"question": "P3 Q3 — when the question says \"log₁₀V is plotted against t,\" what is the difference between this and \"V is plotted against t on log scale\"? (2 steps)", "answer": "- Step 1: \"log₁₀V against t\" means the y-axis literally represents the value $$\\log_{10}V$$. The plotted points are $$(t, \\log_{10}V)$$. The equation of the line is $$\\log_{10}V = mt + c$$.\n- Step 2: \"V against t on log scale\" means the y-axis shows $$V$$ but with a logarithmic spacing. The data points are $$(t, V)$$, but the axis is distorted so that exponential relationships appear linear. Both representations give the same straight line visually, but the equation you write down differs. In Edexcel, \"log₁₀V against t\" means write the equation with $$\\log_{10}V$$ as the dependent variable.", "source": "GLM 5.1 ③", "_id": "glm_3_103", "judge_pick": true}, {"question": "P3 Q5(c) — when factoring $$7600e^{0.1T} - 400e^{0.3T}$$, what common factor do you pull out, and why that specific one? (2 steps)", "answer": "- Step 1: Pull out $$400e^{0.1T}$$: $$400e^{0.1T}(19 - e^{0.2T})$$. The 400 is the GCD of 7600 and 400, and $$e^{0.1T}$$ is the common exponential factor (since $$e^{0.3T} = e^{0.1T} \\cdot e^{0.2T}$$).\n- Step 2: This factoring is strategic: it separates the equation into a factor that is always positive ($$400e^{0.1T}$$) and a factor that can equal zero ($$19 - e^{0.2T}$$). This immediately tells you which factor to solve and which to reject.", "source": "GLM 5.1 ③", "_id": "glm_3_104", "judge_pick": false}, {"question": "P3 Q4(b)(ii) — the general solution of $$\\sin\\theta = 1$$ is $$\\theta = \\frac{\\pi}{2} + 2n\\pi$$. Why is there no \"mirror\" solution (unlike $$\\sin\\theta = \\frac{1}{2}$$, which has two solutions per period)? (2 steps)", "answer": "- Step 1: For $$\\sin\\theta = k$$ with $$0 < k < 1$$, there are two solutions per period: $$\\theta = \\sin^{-1}(k)$$ and $$\\theta = \\pi - \\sin^{-1}(k)$$. These are the two points where the sine curve reaches height $$k$$.\n- Step 2: For $$\\sin\\theta = 1$$, the sine curve reaches its *peak* — there is only one point per period where this happens. The \"mirror\" solution would be $$\\pi - \\frac{\\pi}{2} = \\frac{\\pi}{2}$$, which is the same point. So there is genuinely only one solution per period, and the general solution is simply $$\\frac{\\pi}{2} + 2n\\pi$$.", "source": "GLM 5.1 ③", "_id": "glm_3_105", "judge_pick": true}, {"question": "P3 Q5 — what is the value of $$N$$ at $$t = 0$$, and how does this serve as a sanity check for the model? (2 steps)", "answer": "- Step 1: $$N(0) = \\frac{4000e^0}{19 + e^0} = \\frac{4000}{20} = 200$$ squirrels. This is the starting population.\n- Step 2: As a sanity check: 200 is a reasonable starting population for squirrels (not 0, not millions). If you got $$N(0) = \\frac{4000}{19} \\approx 210.5$$ (forgetting $$e^0 = 1$$), the answer is close but wrong. If you got $$N(0) = 0$$ (forgetting $$e^0 = 1$$ entirely), that's clearly absurd for a starting population. Always ask: \"does this answer make physical sense?\"", "source": "GLM 5.1 ③", "_id": "glm_3_106", "judge_pick": false}, {"question": "P3 Q3(c) — the derivative $$\\frac{dV}{dt} = 0.05\\ln(10) \\cdot V$$ means the rate is proportional to $$V$$. If $$V = 200$$ at $$t = 0$$, what is the initial rate, and does this make sense? (2 steps)", "answer": "- Step 1: At $$t = 0$$, $$V = 100$$ (from part (b): $$a = 100$$). The initial rate is $$\\frac{dV}{dt}\\big|_{t=0} = 0.05\\ln(10) \\times 100 = 5\\ln(10) \\approx 11.5$$ £/year.\n- Step 2: This makes sense: the share price starts at £100 and grows at about £11.50/year initially. By the time $$T \\approx 13$$, the price has grown enough that the rate reaches £50/year. The rate increases over time because it's proportional to the (growing) price.", "source": "GLM 5.1 ③", "_id": "glm_3_107", "judge_pick": false}, {"question": "P3 Q2(a) — what is the Intermediate Value Theorem (IVT) in plain English, and what is its logical structure? (2 steps)", "answer": "- Step 1: The IVT says: if a continuous function takes a negative value and a positive value on an interval, then it must equal zero somewhere in between. Intuitively, a continuous curve cannot jump from below the x-axis to above it without crossing.\n- Step 2: Logical structure for exam answers: (1) Compute $$f(a)$$ and $$f(b)$$ — show one is negative and one is positive (sign change). (2) State that $$f$$ is continuous on $$[a, b]$$. (3) Conclude: by the IVT, there exists $$\\alpha \\in (a, b)$$ such that $$f(\\alpha) = 0$$. All three parts are required for full marks.", "source": "GLM 5.1 ③", "_id": "glm_3_108", "judge_pick": false}, {"question": "P3 Q4(a) — when the question says $$R > 0$$, what does this rule out, and why is it stated? (2 steps)", "answer": "- Step 1: $$R > 0$$ rules out the negative square root when computing $$R = \\sqrt{a^2 + b^2}$$. Since $$R$$ represents an amplitude, it must be positive by convention.\n- Step 2: It is stated because $$R^2 = a^2 + b^2$$ has two solutions: $$R = +\\sqrt{a^2+b^2}$$ and $$R = -\\sqrt{a^2+b^2}$$. Without the constraint, a student might write $$R = -2\\sqrt{3}$$, which would be mathematically valid but conventionally wrong. The constraint removes the ambiguity.", "source": "GLM 5.1 ③", "_id": "glm_3_109", "judge_pick": false}, {"question": "P3 Q5(d) — when computing the maximum $$N$$, you substitute $$e^{0.1T} = \\sqrt{19}$$ and $$e^{0.2T} = 19$$. Why is it better to use these exact relationships rather than computing $$T$$ first? (2 steps)", "answer": "- Step 1: Using the exact relationships avoids the rounding error that comes from computing $$T = \\frac{\\ln 19}{0.2} \\approx 14.72$$ and then re-exponentiating. Each rounding step introduces error.\n- Step 2: Direct substitution: $$N = \\frac{4000\\sqrt{19}}{19 + 19} = \\frac{4000\\sqrt{19}}{38}$$. This uses only exact values. If you compute $$T$$ first, round it, and then compute $$e^{0.1T}$$, the rounding error in $$T$$ propagates into $$e^{0.1T}$$ and then into $$N$$. The direct method is both faster and more accurate.", "source": "GLM 5.1 ③", "_id": "glm_3_110", "judge_pick": false}], "count": 111}, "qwen_1": {"label": "Qwen 3.7 Max ①", "cards": [{"question": "When calculating the surface area of 3D solids in ESAT or P3 modelling, what is the common formula recall trap regarding the base of a cylinder, and how do you conceptually distinguish the two related formulas?", "answer": "The trap is writing the area of a circle as $$\\pi r$$ instead of $$\\pi r^2$$. Conceptually, $$\\pi r^2$$ measures the 2D space enclosed by the circle (area), which requires squaring the 1D length ($$r$$). In contrast, $$2\\pi r$$ measures the 1D distance around the edge (circumference). When unrolling a cylinder's curved surface, the width of the resulting rectangle is the circumference ($$2\\pi r$$), but the flat circular ends require the area formula ($$\\pi r^2$$). Forgetting the square conflates a 1D boundary length with a 2D surface area.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "How do you derive the total surface area of a *closed* cylinder from first principles, and why is the word \"closed\" critical to the formula? (3 steps)", "answer": "- Step 1: Identify the flat ends. A cylinder has two circular ends, each with an area of $$\\pi r^2$$, giving a combined area of $$2\\pi r^2$$.\n- Step 2: Unroll the curved side. The curved surface unrolls into a rectangle where the height is the cylinder's height ($$h$$) and the width is the circumference of the base ($$2\\pi r$$). The area of this rectangle is $$2\\pi r h$$.\n- Step 3: Add the components. The total surface area is $$2\\pi r^2 + 2\\pi r h$$.\n+ The word \"closed\" dictates that both circular ends are included. If the problem specified an \"open\" cylinder (like a cup), you would omit one $$\\pi r^2$$ term.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_1", "judge_pick": true}, {"question": "What is the structural difference between the formula for the surface area of a cylinder and its volume, and what common misapplication does this prevent?", "answer": "The surface area of a closed cylinder is $$2\\pi r^2 + 2\\pi r h$$ (a sum of 2D areas), whereas the volume is $$\\pi r^2 h$$ (a 2D base area multiplied by a 1D height to yield 3D space). The common misapplication is offering $$\\pi r^2 h$$ when asked for surface area. This happens when a student conflates the \"prism volume\" rule (cross-section $$\\times$$ length) with surface area. Remember: surface area always involves adding the distinct boundary faces, while volume multiplies the base by the depth.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_2", "judge_pick": true}, {"question": "What is the exact formula for the surface area of a sphere, and what specific transcription error must you avoid when writing it under exam pressure?", "answer": "The exact formula is $$4\\pi R^2$$. The specific transcription error is writing $$4\\pi R$$ (forgetting the square). This error usually happens when a student mentally rhymes \"four pi r\" without visualising that surface area is a 2D measure, which strictly requires the radius to be squared. Always write the square explicitly to avoid losing marks in ESAT or P3 geometry setups.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "When a problem states \"The surface area of a sphere equals the total surface area of 10 closed cylinders\", what is the precise algebraic setup, and what hidden variable substitution is usually required next? (2 steps)", "answer": "- Step 1: Set up the equation using the exact formulas for both solids: $$4\\pi R^2 = 10(2\\pi r^2 + 2\\pi r h)$$. Ensure you use the *closed* cylinder formula (including the $$2\\pi r^2$$ ends).\n- Step 2: Look for a linking variable in the problem text (e.g., \"height $$h = 4R$$\"). Substitute this relationship into the equation immediately to reduce the system to two variables (e.g., $$R$$ and $$r$$), allowing you to solve for one in terms of the other.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "After forming a quadratic equation for a geometric radius (e.g., $$R^2 - 20rR - 5r^2 = 0$$), the quadratic formula yields one positive and one negative root. What is the physical justification for rejecting the negative root?", "answer": "In geometric modelling, variables representing physical lengths, such as a radius ($$R$$) or height ($$h$$), must be strictly positive ($$R > 0$$). A negative radius has no physical meaning in standard Euclidean geometry. Therefore, you must explicitly reject the negative root and state that because $$R$$ is a physical length, only the positive solution is valid.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "To prove a function $$f(x)$$ has a root in the interval $$[a, b]$$ using the Intermediate Value Theorem, what TWO distinct mathematical statements must you explicitly write down to secure full marks? (2 steps)", "answer": "- Step 1: Demonstrate a **sign change**. Calculate and state the exact values of $$f(a)$$ and $$f(b)$$, explicitly showing that one is positive and the other is negative (i.e., $$f(a) \\times f(b) < 0$$).\n- Step 2: State **continuity**. Explicitly write that \"$$f(x)$$ is continuous on the interval $$[a, b]$$\". \n+ *Takeaway:* Examiners will cap your score at 1 mark if you only show the sign change. The theorem fundamentally relies on the function not having any jumps or asymptotes in the interval, so stating continuity is mandatory.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "When asked to \"Show that $$f(x) = 0$$ can be written as $$x = \\sqrt[3]{\\dots}$$\", what is the most efficient strategic approach to guide your algebraic manipulation?", "answer": "The most efficient strategy is **target-driven rearrangement**. Instead of blindly isolating $$x$$, look at the target form for structural clues. If the target has a cube root, your immediate algebraic goal is to isolate an $$x^3$$ term on one side of the equation, and then cube-root both sides as your final step. This prevents you from getting stuck taking premature square roots or dividing by the wrong terms.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "In rearranging $$2x^4 + 3x^3 = \\dots$$ to match a target denominator of $$(2x + 3)$$, what specific factoring trick bridges the gap between the expanded polynomial and the target form?", "answer": "The trick is to factor out the highest common power of $$x$$ that leaves the target denominator as the remaining bracket. Here, you factor out $$x^3$$ from the left side to get $$x^3(2x + 3)$$. This perfectly isolates the $$(2x + 3)$$ term, allowing you to divide both sides by $$(2x + 3)$$ to move it to the denominator on the right side, leaving just $$x^3$$ on the left, which is then ready to be cube-rooted.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_8", "judge_pick": true}, {"question": "If a question states \"a graph of $$\\log_{10} V$$ against $$t$$\", how should you assign the variables to the $$x$$ and $$y$$ axes, and what common variable-assignment trap must you avoid?", "answer": "The phrase \"against\" dictates the axes: the variable *after* \"against\" is the independent variable ($$x$$-axis), and the variable *before* it is the dependent variable ($$y$$-axis). Therefore, the $$x$$-axis is $$t$$ and the $$y$$-axis is $$\\log_{10} V$$. The trap is using $$V$$ or a generic $$y$$ as the vertical variable. You must treat the entire expression \"$$\\log_{10} V$$\" as the single $$y$$-variable when calculating the gradient and intercept.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "When converting the linearised equation $$\\log_{10} V = 0.05t + 2$$ into the exponential model $$V = ab^t$$, what index law trick is required to isolate the base $$b$$? (2 steps)", "answer": "- Step 1: Undo the logarithm by raising 10 to the power of both sides: $$V = 10^{0.05t + 2}$$.\n- Step 2: Apply the index law $$x^{m+n} = x^m \\cdot x^n$$ to split the exponent: $$V = 10^{0.05t} \\cdot 10^2$$. Then, apply the power-of-a-power rule $$(x^m)^n = x^{mn}$$ to rewrite $$10^{0.05t}$$ as $$(10^{0.05})^t$$. \n+ This yields $$V = 100(10^{0.05})^t$$, perfectly matching the $$V = ab^t$$ structure where $$a = 100$$ and $$b = 10^{0.05}$$.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "In an exponential growth model $$V(t)$$, how do you mathematically translate the phrase \"the rate of increase is £50 per year\", and what sign error is commonly made here? (2 steps)", "answer": "- Step 1: Translate \"rate\" to the first derivative with respect to time: $$\\frac{dV}{dt}$$.\n- Step 2: Translate \"increase\" to a positive value. Set the derivative equal to $$+50$$.\n+ *Pitfall:* Students often write $$-50$$, confusing \"rate of increase\" with \"rate of decay\" or misinterpreting the gradient of a decreasing function. \"Increase\" strictly implies a positive gradient.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "What is the exact derivative of $$a^{kx}$$ with respect to $$x$$, and how does the chain rule manifest in this specific formula?", "answer": "The exact derivative is $$\\frac{d}{dx}(a^{kx}) = a^{kx} \\cdot k \\ln a$$. The chain rule manifests as the multiplier $$k$$. The standard derivative of $$a^x$$ is $$a^x \\ln a$$. When the exponent is a linear function $$kx$$, you must multiply by the derivative of the inner function (which is $$k$$). Forgetting the $$k$$ and just writing $$a^{kx} \\ln(kx)$$ or $$a^{kx} \\ln a$$ is a fundamental failure to apply the chain rule.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "What is the correct derivative of $$3^{6x}$$, and why is writing $$3^{6x} \\ln(6x)$$ a fundamental misapplication of the chain rule?", "answer": "The correct derivative is $$3^{6x} \\cdot 6 \\ln 3$$. Writing $$3^{6x} \\ln(6x)$$ is incorrect because the natural logarithm applies *only* to the base of the exponential function (which is 3), not to the entire exponent. The chain rule requires you to pull down the derivative of the exponent (which is 6) as a coefficient, while the base remains inside the logarithm.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "When differentiating an exponential model like $$V = 100(10^{0.05})^t$$ to find a specific time $$T$$, why must you use the exact base $$10^{0.05}$$ rather than its 3 s.f. rounded approximation $$1.12$$?", "answer": "Differentiation is highly sensitive to the base value because the derivative involves multiplying by $$\\ln(\\text{base})$$. If you round the base to $$1.12$$ before differentiating, you are calculating the rate of change for a *slightly different mathematical model*. While the final rounded answer might occasionally match by luck, the intermediate values and the exact gradient will be mathematically incorrect. Always carry the exact base through the calculus, and only round the final numerical answer for $$T$$.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_14", "judge_pick": true}, {"question": "When expressing $$a \\sin \\theta - b \\cos \\theta$$ in the form $$R \\sin(\\theta - \\alpha)$$, what two-step algebraic strategy guarantees *exact* values for $$R$$ and $$\\alpha$$ without rounding errors? (2 steps)", "answer": "- Step 1: To find $$\\alpha$$, divide the sine coefficient equation ($$R \\cos \\alpha = a$$) into the cosine coefficient equation ($$R \\sin \\alpha = b$$) to get $$\\tan \\alpha = \\frac{b}{a}$$, then use the exact inverse tangent.\n- Step 2: To find $$R$$, square both coefficient equations and add them together. This uses the identity $$\\cos^2 \\alpha + \\sin^2 \\alpha = 1$$ to yield $$R^2 = a^2 + b^2$$, giving an exact radical for $$R$$.\n+ *Takeaway:* Dividing isolates $$\\alpha$$ via tangent; squaring-and-adding isolates $$R$$ via the Pythagorean identity, completely bypassing decimal approximations.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_15", "judge_pick": false}, {"question": "Why is it considered \"dangerous\" to find $$R$$ by substituting a calculator's decimal value of $$\\alpha$$ into $$R \\cos \\alpha = a$$ in an R-form question?", "answer": "It is dangerous because the calculator's value for $$\\alpha$$ is inherently a rounded decimal approximation. When you divide $$a$$ by this rounded $$\\cos \\alpha$$, the rounding error propagates and magnifies, resulting in an inexact value for $$R$$. If the question demands exact values (e.g., in surd form), this method will fail to produce the correct radical and will lose accuracy marks. Squaring and adding the coefficients avoids this trap entirely.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_16", "judge_pick": false}, {"question": "When calculating the phase shift $$\\alpha$$ in an R-form question, what two specific calculator settings/functions must you verify to avoid losing marks?", "answer": "First, ensure your calculator is in **Radians** mode, as trigonometric calculus and R-form angles in A-Level are strictly measured in radians unless degrees are explicitly requested. Second, use the **$$\\tan^{-1}$$** (inverse tangent) function to find $$\\alpha$$ from $$\\tan \\alpha = \\frac{b}{a}$$. A common slip is accidentally using $$\\sin^{-1}$$ or $$\\cos^{-1}$$ with the wrong coefficient, which yields an incorrect angle.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_17", "judge_pick": false}, {"question": "To find the exact minimum of a function like $$g(x) = \\frac{k}{R \\sin(cx) + d}$$ (where $$k, R, d > 0$$), what is the conceptual strategy regarding the denominator, and what value must the sine term take? (2 steps)", "answer": "- Step 1: Recognise that for a fraction with a constant positive numerator, the fraction is minimised when its denominator is **maximised**.\n- Step 2: Since the maximum value of the sine function is $$+1$$, set $$\\sin(cx) = 1$$ to maximise the denominator, yielding the minimum value of $$g(x)$$ as $$\\frac{k}{R(1) + d}$$.\n+ *Takeaway:* You don't need to differentiate the fraction; analysing the bounds of the trigonometric component in the denominator directly gives the global extremum.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_18", "judge_pick": false}, {"question": "After setting a sine function to its maximum to find an optimal $$x$$, how do you ensure you have found the *smallest positive* $$x$$ rather than just any valid solution?", "answer": "Set the angle to the **principal value** for the maximum of sine, which is $$\\frac{\\pi}{2}$$. Solve for $$x$$ from this primary branch. To verify it is the smallest positive value, conceptually sketch the sine wave or add $$2\\pi$$ to the angle to find the next solution ($$n=1$$). The principal value branch will always yield the smallest positive $$x$$ provided the resulting $$x$$ is greater than zero; if it's negative, you add the period ($$\\frac{2\\pi}{c}$$) to shift it into the positive domain.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_19", "judge_pick": false}, {"question": "When evaluating an exponential population model like $$N = \\frac{A}{B + e^{kt}}$$ at the start of the study ($$t=0$$), what specific arithmetic trap occurs in the denominator?", "answer": "The trap is evaluating $$e^0$$ as $$0$$ instead of $$1$$. Students often see the $$e^{kt}$$ term and assume it vanishes at $$t=0$$, writing the denominator as just $$B$$. However, any non-zero base to the power of zero is $$1$$. Therefore, the denominator evaluates to $$B + 1$$. Forgetting the \"+1\" leads to an incorrect initial population value.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_20", "judge_pick": false}, {"question": "When differentiating a complex fraction like $$N = \\frac{4000e^{0.1t}}{19 + e^{0.2t}}$$, why is the quotient rule strategically safer than rewriting it as $$4000e^{0.1t}(19 + e^{0.2t})^{-1}$$ and using the product rule?", "answer": "The quotient rule is strategically safer because it is a direct, single-step formula provided in the formula book, minimising the cognitive load during an exam. Rewriting it for the product rule requires applying the chain rule to the negative exponent $$(19 + e^{0.2t})^{-1}$$, which introduces multiple opportunities to drop a negative sign, forget the inner derivative ($$0.2e^{0.2t}$$), or mess up the algebraic expansion when combining the two terms over a common denominator.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_21", "judge_pick": false}, {"question": "In the quotient rule formula $$\\frac{vu' - uv'}{v^2}$$, what specific sign error frequently occurs in the numerator when both $$u$$ and $$v$$ are positive exponential functions?", "answer": "The most frequent error is dropping the **minus sign** in the middle of the numerator, writing $$vu' + uv'$$ instead. Because exponential functions and their derivatives are always positive, the terms $$vu'$$ and $$uv'$$ are both positive. If you forget the minus sign, you add them together instead of subtracting, which completely alters the roots of the derivative and leads to an incorrect maximum/minimum. Always write the formula with the minus sign explicitly before substituting.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_22", "judge_pick": false}, {"question": "When finding the maximum of a function defined by a quotient, $$\\frac{u(t)}{v(t)}$$, why is it sufficient to only set the numerator of the derivative to zero?", "answer": "The quotient rule gives the derivative as $$\\frac{v u' - u v'}{v^2}$$. For a fraction to equal zero, its numerator must be zero, provided the denominator is non-zero. Since the denominator here is $$v^2$$ (a squared real-valued function like $$(19 + e^{0.2t})^2$$), it is strictly positive and can never be zero. Therefore, the critical points are entirely determined by setting the numerator $$v u' - u v' = 0$$, allowing you to ignore the complex denominator completely.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_23", "judge_pick": true}, {"question": "When solving an equation like $$e^{0.1T}(7600 - 400e^{0.2T}) = 0$$ for a maximum, why can you immediately discard the solution $$e^{0.1T} = 0$$?", "answer": "The exponential function $$e^{x}$$ is strictly positive for all real numbers $$x$$ (its range is $$(0, \\infty)$$). It has a horizontal asymptote at $$y=0$$ but never actually touches or crosses the x-axis. Therefore, $$e^{0.1T}$$ can never equal zero. Recognising this allows you to safely divide both sides by $$e^{0.1T}$$ to isolate the algebraic part of the equation ($$7600 - 400e^{0.2T} = 0$$) without losing any valid roots.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_24", "judge_pick": false}, {"question": "If a multi-part question asks you to \"Show that $$e^{0.2T} = 19$$\" in part (c), and then \"Find the maximum value\" in part (d), what strict boundary must you observe at the end of part (c)?", "answer": "You must **stop exactly at the shown line**. The command word \"Show that\" dictates that your goal is solely to arrive at the given expression ($$e^{0.2T} = 19$$). Do not solve for $$T$$ in part (c). Solving for $$T$$ prematurely wastes time, clutters your working, and risks making an arithmetic error that could cost you the \"show that\" mark if your final line doesn't match the required target. Save the calculation of $$T$$ strictly for part (d).", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_25", "judge_pick": false}, {"question": "When solving an equation of the form $$e^{kT} = A$$ for $$T$$, which specific logarithmic function must you use, and why is using $$\\log_{10}$$ technically incorrect (even if it yields the right answer after base conversion)?", "answer": "You must use the **natural logarithm ($$\\ln$$)**, because the base of the exponential is $$e$$. The natural logarithm is the exact inverse function of $$e^x$$. Using $$\\log_{10}$$ requires applying the change-of-base formula or dividing by $$\\log_{10}(e)$$, which introduces unnecessary steps and increases the risk of calculator entry errors. In A-Level marking schemes, applying $$\\ln$$ directly to base-$$e$$ equations is the expected standard method.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_26", "judge_pick": false}, {"question": "In a multi-part calculus model where you find a critical time $$T$$ and then substitute it back to find a maximum population $$N$$, what is the strict rule for rounding $$T$$?", "answer": "The strict rule is to **never round intermediate values**. You must store the exact, unrounded value of $$T$$ in your calculator's memory (using the `Ans` or `Alpha` `X` function) and substitute that stored value back into the original model for $$N$$. Only round the final answer for $$N$$ to the required precision (e.g., nearest whole number). Rounding $$T$$ prematurely causes compounding errors that can push the final population value across a rounding boundary, losing the final accuracy mark.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_27", "judge_pick": false}, {"question": "If you know that $$e^{0.2T} = 19$$ at a maximum point, what algebraic trick allows you to find the exact value of the numerator's exponential term $$e^{0.1T}$$ without calculating $$T$$ first?", "answer": "The trick is to use index laws to express the required term as a power of the known term. Since $$0.1T$$ is exactly half of $$0.2T$$, you can write $$e^{0.1T} = (e^{0.2T})^{1/2} = \\sqrt{e^{0.2T}}$$. Substituting the known value gives $$e^{0.1T} = \\sqrt{19}$$. This allows you to calculate the exact maximum population algebraically without ever needing to evaluate the decimal value of $$T$$.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_28", "judge_pick": false}], "count": 29}, "qwen_2": {"label": "Qwen 3.7 Max ②", "cards": [{"question": "How do you derive the curved surface area of a cylinder from first principles to ensure you don't confuse it with the volume or use the wrong length measurement?", "answer": "- Step 1: Visualise \"unrolling\" the curved side of the cylinder into a flat 2D rectangle.\n- Step 2: Identify the dimensions of this rectangle. The height of the rectangle is the height of the cylinder, $$h$$. The width of the rectangle is the circumference of the circular base, which is $$2\\pi r$$ (a common trap is using the diameter, $$2r$$, or just $$\\pi r$$).\n- Step 3: Multiply the dimensions to get the curved area: $$2\\pi r \\times h = 2\\pi rh$$. To get the total surface area of a *closed* cylinder, you must then add the two flat circular ends ($$2 \\times \\pi r^2$$), yielding $$2\\pi r^2 + 2\\pi rh$$.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "When an ESAT or modelling question mentions \"10 closed cylinders\", what specific term must you include in the surface area equation that is frequently forgotten, and why? (2 steps)", "answer": "- Step 1: Recognise the keyword \"closed\". This means the cylinder is a solid bound object with two flat circular ends (a top and a bottom), not just a hollow tube.\n- Step 2: Include the area of both ends, which is $$2\\pi r^2$$, in your surface area formula. The full expression must be $$2\\pi r^2 + 2\\pi rh$$. If you only use the curved surface ($$2\\pi rh$$) or forget one end ($$\\pi r^2 + 2\\pi rh$$), your initial equation will be fundamentally wrong, costing you method and accuracy marks.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "In a problem equating the surface area of a solid sphere to the total surface area of 10 closed cylinders, what is the correct initial algebraic equation before substituting any height constraints?", "answer": "The correct equation is $$4\\pi R^2 = 10(2\\pi r^2 + 2\\pi rh)$$. \n+ The left side is the sphere's total surface area ($$4\\pi R^2$$, ensuring you square the radius $$R$$). \n+ The right side is 10 times the *closed* cylinder surface area. \n+ A common pitfall is writing the sphere area as $$4\\pi R$$ (missing the square) or the cylinder area as just the volume ($$\\pi r^2 h$$).", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "When solving the equation $$4\\pi R^2 = 10(2\\pi r^2 + 8\\pi rR)$$ for $$R$$ in terms of $$r$$, what is the most efficient algebraic first step before applying the quadratic formula? (2 steps)", "answer": "- Step 1: Divide the entire equation by the common factor $$4\\pi$$ to drastically simplify the coefficients. This reduces the equation to $$R^2 = 5r^2 + 20rR$$.\n- Step 2: Rearrange all terms to one side to form a standard quadratic equation in terms of the variable $$R$$ (treating $$r$$ as a constant): $$R^2 - 20rR - 5r^2 = 0$$. Now you can cleanly apply the quadratic formula with $$a=1$$, $$b=-20r$$, and $$c=-5r^2$$.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "When applying the quadratic formula to find a physical radius $$R$$ in terms of $$r$$, and you arrive at the roots $$R = r(10 \\pm \\sqrt{105})$$, why must you strictly choose the positive root and how do you justify it mathematically?", "answer": "You must choose $$R = r(10 + \\sqrt{105})$$ because a physical radius must be strictly positive ($$R > 0$$). To justify rejecting the minus root, observe that $$\\sqrt{105} > \\sqrt{100} = 10$$. Therefore, the expression $$(10 - \\sqrt{105})$$ evaluates to a negative number. Since $$r$$ is also a positive radius, the minus root yields a negative $$R$$, which is physically impossible.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_4", "judge_pick": true}, {"question": "To show a root exists in a given interval $$[a, b]$$ using the Intermediate Value Theorem (IVT), what two distinct conditions must you explicitly state in your working to guarantee full marks? (2 steps)", "answer": "- Step 1: Demonstrate a **sign change** by evaluating the function at the exact endpoints of the interval, $$f(a)$$ and $$f(b)$$. Show that one value is strictly positive and the other is strictly negative (e.g., $$f(1) < 0$$ and $$f(2) > 0$$).\n- Step 2: Explicitly state the word **continuity**. You must write that the function is continuous on the interval $$[a, b]$$. Examiners specifically look for this keyword; omitting it typically costs you a mark, even if the sign change is correct.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Conceptually, why is the \"continuity\" condition strictly required for the Intermediate Value Theorem, even if a clear sign change is observed between $$f(a)$$ and $$f(b)$$?", "answer": "A sign change only guarantees a root if the function's graph is an unbroken curve. If the function is discontinuous—for example, if it has a vertical asymptote like $$f(x) = \\frac{1}{x}$$ between $$x = -1$$ and $$x = 1$$—the graph can jump from negative to positive without ever actually crossing the x-axis. In such cases, $$f(x) = 0$$ has no solution. Stating continuity ensures the graph is unbroken and must physically intersect the axis.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "When asked to rearrange an equation like $$f(x) = 0$$ into a specific, complex iteration form such as $$x = \\sqrt[3]{\\frac{e^x + 4x^2}{2x + 3}}$$, what is the best strategic approach to avoid getting stuck in algebraic loops? (3 steps)", "answer": "- Step 1: Look at the target form for structural clues. The outer cube root implies you need to isolate an $$x^3$$ term; the specific denominator $$(2x+3)$$ implies you need to factor it out from the numerator's terms.\n- Step 2: Isolate the components. Move the non-matching terms (like $$x^2$$ and $$e^x$$) to opposite sides of the equation, then factor out the highest common power of $$x$$ (e.g., factor $$x^3$$ out of $$2x^4 + 3x^3$$ to get $$x^3(2x+3)$$).\n- Step 3: Divide by the factored bracket to isolate $$x^3$$, then apply the inverse operation (cube root both sides) to match the target form exactly.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "In a straight-line linearisation question, if the problem states \"a graph of $$\\log_{10} V$$ against $$t$$\", what is the most common variable misidentification trap and how do you avoid it?", "answer": "The trap is writing the vertical axis variable as just $$V$$ or a generic $$y$$. You must explicitly use $$\\log_{10} V$$ as the y-variable in your linear equation. The correct equation of the line is $$\\log_{10} V = mt + c$$. If you write $$V = mt + c$$, your subsequent gradient and intercept calculations will be mathematically invalid for the logarithmic model.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "When converting the linearised equation $$\\log_{10} V = 0.05t + 2$$ into the exponential form $$V = ab^t$$, how do you correctly split the index to identify the exact base $$b$$? (2 steps)", "answer": "- Step 1: Raise 10 to the power of both sides to undo the logarithm: $$V = 10^{0.05t + 2}$$.\n- Step 2: Use the index law $$10^{p+q} = 10^p \\cdot 10^q$$ to split the expression into $$V = 10^2 \\cdot 10^{0.05t}$$. Then apply the power-of-a-power rule to get $$V = 100 \\cdot (10^{0.05})^t$$. By matching this to $$V = ab^t$$, you identify $$a = 100$$ and the exact base $$b = 10^{0.05}$$.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "Why is it mathematically dangerous to round the exact base $$b = 10^{0.05}$$ to $$1.12$$ *before* differentiating the model $$V = 100(10^{0.05})^t$$ to find a rate of change?", "answer": "Differentiating a rounded base introduces compounding rounding errors into the derivative. The exact derivative relies on the exact natural log of the base: $$\\frac{dV}{dt} = 100 \\cdot 10^{0.05t} \\cdot 0.05 \\ln 10$$. If you use the rounded $$1.12$$, you get $$100 \\cdot 1.12^t \\cdot \\ln(1.12)$$, which yields a slightly different (and technically incorrect) exact rate. Always differentiate the exact algebraic form and round only the final numerical answer.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "What is the exact derivative of $$a^{kx}$$ with respect to $$x$$, and what is the most common notational pitfall students make with the logarithm term?", "answer": "The exact derivative is $$a^{kx} \\cdot k \\ln a$$. \n+ The most common pitfall is writing $$\\ln(kx)$$ or $$\\ln(ax)$$ instead of $$k \\ln a$$. \n+ Conceptually, the chain rule brings down the constant coefficient $$k$$ from the exponent, and the standard derivative of $$a^x$$ provides the $$\\ln a$$ multiplier. The argument of the logarithm is strictly the base $$a$$, not the entire exponent.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_11", "judge_pick": false}, {"question": "When a modelling question states \"the rate of increase is £50
