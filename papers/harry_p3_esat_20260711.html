produce the working without the guide.\n- Step 2: For each non-\"Solved\" status, prioritise by marks-at-stake and question-type frequency:\n+ \"Completed with prompting\" → redo closed-book; if you can't, it's effectively deferred.\n+ \"Discussed only\" → do from scratch in your own time (these are usually high-yield standard types).\n+ \"Deferred\" → do from scratch; these are the highest priority because you have no worked solution.\n\nTakeaway: status-safe review = redo \"Solved\" closed-book, treat \"with prompting\" as a self-test, do \"Discussed only\" and \"Deferred\" from scratch.", "source": "MiniMax M3 ②", "_id": "minimax_2_83", "judge_pick": false}, {"question": "[Cross-cutting, the \"what's the next lesson's starter?\" prediction] Harry said \"next time I will ask you some questions as a starter\" on differentiation of $$a^{kx}$$. What should Phuc revise to be ready? (2 steps)", "answer": "- Step 1: Revise the $$a^{kx}$$ derivative rule: $$\\frac{d}{dx} a^{kx} = a^{kx} \\cdot k \\ln a$$. Drill it on:\n+ $$3^x, 36^x, 5^{2x}, 1.12^t, e^{kx}$$.\n+ Practice both the rule itself and applying it to a function like $$V = 100 \\cdot 10^{0.05t}$$.\n- Step 2: Revise the chain rule (the factor $$k$$ comes from the chain rule, not from a log). The trap to avoid: $$\\ln(kx)$$.\n\nTakeaway: next-lesson starter = $$a^{kx}$$ derivative. Drill the rule and the chain-rule factor; avoid the $$\\ln(kx)$$ trap.", "source": "MiniMax M3 ②", "_id": "minimax_2_84", "judge_pick": false}], "count": 85}, "opus_1": {"label": "Opus 4.8 ①", "cards": [{"question": "ESAT warm-up — when a question asks for the surface area of a *closed* cylinder, what does \"closed\" tell you to include, and what is the resulting formula?", "answer": "- Step 1: \"Closed\" means the cylinder has both circular ends capped, so you must count **two** circular faces, not zero and not one.\n- Step 2: The two flat ends contribute $$2 \\times \\pi r^2 = 2\\pi r^2$$.\n- Step 3: The curved side, unrolled, is a rectangle of height $$h$$ and width equal to the circumference $$2\\pi r$$, contributing $$2\\pi r h$$.\n- Total: $$2\\pi r^2 + 2\\pi r h$$.\n\nThe word \"closed\" is the trigger to remember the $$2\\pi r^2$$ term — an open cylinder (like a can with no lid) would only have one end.", "source": "Opus 4.8 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "ESAT — what is the common misconception of writing the surface area of a cylinder as $$\\pi r^2 h$$, and how do you catch it?", "answer": "- Step 1: $$\\pi r^2 h$$ is the **volume** of a cylinder (cross-sectional area $$\\pi r^2$$ multiplied by length $$h$$ — the \"prism\" formula), not the surface area.\n- Step 2: Surface area is a sum of 2-D areas (units of length²), whereas volume has units of length³. A quick dimensional check: $$\\pi r^2 h$$ has three length factors → it must be a volume.\n- Step 3: The correct surface area for a closed cylinder is $$2\\pi r^2 + 2\\pi r h$$.\n\nSanity trick: if your \"surface area\" has three lengths multiplied, you've written a volume.", "source": "Opus 4.8 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "ESAT — a student writes the area of a circle as $$\\pi r$$. What is wrong, and what is the correct formula for area vs. circumference?", "answer": "- Step 1: $$\\pi r$$ is dimensionally a length, not an area — the classic slip is \"forgetting the square\".\n- Step 2: Area of a circle $$= \\pi r^2$$ (the square is essential).\n- Step 3: Circumference $$= 2\\pi r$$ — this is the *length* around the circle, and it is what becomes the width of the unrolled curved side of a cylinder.\n\nHarry's line: \"Not just $$\\pi r$$, $$\\pi r^2$$ — don't forget the square.\"", "source": "Opus 4.8 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "ESAT — what is the surface area of a sphere of radius $$R$$, and what does it represent geometrically? What is the common recall error?", "answer": "- Step 1: Surface area of a sphere $$= 4\\pi R^2$$ — the whole outside area of the 3-D shape.\n- Step 2: The common error is writing $$4\\pi R$$ (forgetting the square), which is dimensionally a length, not an area.\n- Step 3: Like the circle, the tell-tale is the missing square: a genuine area must have two length factors, so $$R^2$$ must appear.", "source": "Opus 4.8 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "ESAT surface-area problem — what is the transferable 4-step *method* Harry stressed for \"sphere surface area = 10 closed cylinders, find R\"? (4 steps)", "answer": "- Step 1: Know the two solid formulae cold: sphere $$= 4\\pi R^2$$, closed cylinder $$= 2\\pi r^2 + 2\\pi r h$$.\n- Step 2: Write the word equation and substitute the given constraint $$h = 4R$$ to eliminate $$h$$.\n- Step 3: Simplify (divide through by common factors like $$4\\pi$$) and rearrange into a **quadratic in $$R$$**.\n- Step 4: Solve the quadratic and keep the **positive root** (a radius cannot be negative).\n\nThe insight: the geometry reduces to a quadratic once you substitute the height relation — Harry's whole point was \"we need to know some key formulae.\"", "source": "Opus 4.8 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "ESAT — after setting $$4\\pi R^2 = 10(2\\pi r^2 + 2\\pi r h)$$ with $$h = 4R$$, why do you divide through by $$4\\pi$$ before solving, and what quadratic form results?", "answer": "- Step 1: Dividing by the common factor $$4\\pi$$ clears the $$\\pi$$'s and shrinks the coefficients, making the algebra cleaner and less error-prone.\n- Step 2: After substituting $$h=4R$$: $$4\\pi R^2 = 20\\pi r^2 + 80\\pi r R$$. Dividing by $$4\\pi$$ gives $$R^2 = 5r^2 + 20rR$$.\n- Step 3: Collect all terms on one side: $$R^2 - 20rR - 5r^2 = 0$$ — a quadratic in $$R$$ where $$r$$ is treated as a constant coefficient.\n\nTreating $$r$$ as a constant is the key mental move: you're solving *for $$R$$ in terms of $$r$$*.", "source": "Opus 4.8 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "ESAT — when solving $$R^2 - 20rR - 5r^2 = 0$$ by the quadratic formula, why must you reject one of the two roots?", "answer": "- Step 1: The two roots are $$R = r(10 \\pm \\sqrt{105})$$.\n- Step 2: Since $$\\sqrt{105} \\approx 10.2 > 10$$, the minus root $$r(10 - \\sqrt{105})$$ is **negative**.\n- Step 3: $$R$$ is a radius — a physical length that must be positive — so you discard the negative root and take $$R = r(10 + \\sqrt{105})$$.\n\nAlways sense-check the sign against the physical meaning of the variable.", "source": "Opus 4.8 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "ESAT — the on-screen multiple-choice option labels were garbled in the evidence. What is the reliable strategy for a multiple-choice surface-area question when you can't trust the option display?", "answer": "- Step 1: Do the full derivation on paper independently of the options — trust your own algebra, not the possibly-mis-transcribed labels.\n- Step 2: Compute the exact answer, e.g. $$R = r(10 + \\sqrt{105})$$.\n- Step 3: Then *match* your derived value to whichever lettered option carries it on the day.\n\nThe method (know formulae → substitute → quadratic → positive root) is transferable; the option letter is just a look-up at the end.", "source": "Opus 4.8 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "P3 Q2(a) — the paper says \"show $$f(x)=0$$ has a root $$\\alpha \\in [1,2]$$\". Which theorem is this, and what TWO things must both appear to score full marks?", "answer": "- Step 1: This is the **Intermediate Value Theorem (IVT)**.\n- Step 2: You must show a **sign change**: substitute the actual endpoints $$f(1)$$ and $$f(2)$$, write down both values, and note one is positive and one is negative.\n- Step 3: You must state **continuity**: $$f$$ is continuous on $$[1,2]$$.\n- Conclusion: by the sign change together with continuity, there is a root $$\\alpha$$ in $$[1,2]$$.\n\nHarry: \"The bit that everyone forgets is continuity... otherwise you'll only score one mark.\"", "source": "Opus 4.8 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "P3 Q2(a) IVT — why is stating \"sign change\" alone insufficient? What could go wrong without continuity?", "answer": "- Step 1: A sign change only *suggests* a crossing; without continuity a function could \"jump\" over zero (e.g. a discontinuity or asymptote between the endpoints) and never actually equal zero.\n- Step 2: Continuity guarantees the function cannot skip a value — it must pass through every value between $$f(1)$$ and $$f(2)$$, including $$0$$.\n- Step 3: Only the combination \"sign change **and** continuity\" logically forces a root, which is why the mark scheme demands both.", "source": "Opus 4.8 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "P3 Q2(a) — a subtle pitfall when substituting endpoints for an IVT argument. What must you use, and what must you NOT use?", "answer": "- Step 1: Use the **actual endpoints** $$f(1)$$ and $$f(2)$$ exactly — not values \"near\" them like $$f(1.01)$$ or $$f(1.9)$$.\n- Step 2: The theorem is stated on the closed interval $$[1,2]$$, so the sign evidence must come from the interval's genuine boundaries.\n- Step 3: Show both computed values explicitly so the examiner can see the sign change, then conclude.", "source": "Opus 4.8 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "P3 Q2(b) — the target form is $$x = \\sqrt[3]{\\frac{e^x+4x^2}{2x+3}}$$. What is Harry's overarching strategy for a \"show that it rearranges to...\" question?", "answer": "- Step 1: **Look at the target and work towards it** — treat the answer as a map of what your algebra should produce.\n- Step 2: Two structural cues in the target: a **cube root** means you will \"cube-root both sides\" at the end; a $$2x+3$$ in the denominator means you should aim to **factor $$x^3(2x+3)$$** out of one side.\n- Step 3: Reverse-engineer: clear fractions, expand, collect terms so the target's numerator and denominator emerge naturally.\n\nThe target form is a hint sheet, not just a destination.", "source": "Opus 4.8 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "P3 Q2(b) — starting from $$\\frac{2x^2+3x-4}{e^x} - \\frac{1}{x^2} = 0$$, what is the first algebraic move and why?", "answer": "- Step 1: Move $$\\frac{1}{x^2}$$ across: $$\\frac{2x^2+3x-4}{e^x} = \\frac{1}{x^2}$$.\n- Step 2: Cross-multiply (multiply by $$e^x x^2$$) to clear both denominators at once: $$x^2(2x^2+3x-4) = e^x$$.\n- Step 3: This gives a polynomial-times-$$x^2$$ on the left equal to $$e^x$$ on the right, setting up the expansion toward the target.\n\nClearing all fractions first turns the equation into something you can regroup cleanly.", "source": "Opus 4.8 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "P3 Q2(b) — after reaching $$2x^4 + 3x^3 = e^x + 4x^2$$, what is the key factorisation trick that gets you to the target, and how does the target denominator tell you to do it?", "answer": "- Step 1: The target denominator $$2x+3$$ signals you should factor the left side into $$x^3(2x+3)$$.\n- Step 2: Indeed $$2x^4 + 3x^3 = x^3(2x+3)$$ — factoring $$x^3$$ pulls out exactly the required $$(2x+3)$$.\n- Step 3: Divide by $$(2x+3)$$: $$x^3 = \\frac{e^x+4x^2}{2x+3}$$, then cube-root both sides.\n\nThe presence of $$2x+3$$ in the answer is what tells you the left side must factor as $$x^3(2x+3)$$.", "source": "Opus 4.8 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "P3 Q2(c) — when you finally run the iteration $$x_{n+1} = \\sqrt[3]{\\frac{e^{x_n}+4x_n^2}{2x_n+3}}$$ with $$x_1=1$$, what three procedural cautions apply?", "answer": "- Step 1: Keep the calculator in the **correct mode** (this involves $$e^x$$, so no radian/degree issue, but ensure no leftover setting corrupts the exponential).\n- Step 2: **Do not round intermediate iterates** — carry full precision from $$x_1 \\to x_2 \\to x_3$$, otherwise error accumulates.\n- Step 3: Quote both $$x_3$$ and $$\\alpha$$ each to **4 decimal places** as the command specifies.", "source": "Opus 4.8 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "P3 Q3(a) — the graph is \"$$\\log_{10}V$$ against $$t$$\". What is the first correction Harry makes about the axes, and why does it matter?", "answer": "- Step 1: The **$$y$$-axis is $$\\log_{10}V$$**, not $$V$$ (and not $$y$$); the $$x$$-axis is $$t$$.\n- Step 2: The line equation must be written in the *linearised* variable: $$\\log_{10}V = mt + c$$, treating $$\\log_{10}V$$ as the vertical coordinate.\n- Step 3: If you mistakenly plot $$V$$ vertically, the \"straight line\" property is lost — the whole point of taking logs is that $$V=ab^t$$ becomes linear only in $$\\log_{10}V$$.\n\nHarry: \"It's not $$V$$. Be careful.\"", "source": "Opus 4.8 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "P3 Q3(a) — line through $$(0,2)$$ and $$(5, 2.25)$$ in the $$(t, \\log_{10}V)$$ plane. How do you read off the gradient and intercept, and what's the resulting equation?", "answer": "- Step 1: Gradient $$m = \\frac{2.25 - 2}{5 - 0} = \\frac{0.25}{5} = 0.05$$.\n- Step 2: The intercept $$c$$ is the $$\\log_{10}V$$ value at $$t=0$$, which is directly the point $$(0,2)$$, so $$c=2$$.\n- Step 3: $$\\log_{10}V = 0.05t + 2$$.\n\nReading $$c$$ straight from the $$t=0$$ point saves an algebra step.", "source": "Opus 4.8 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "P3 Q3(b) — to convert $$\\log_{10}V = 0.05t + 2$$ into the form $$V = ab^t$$, what is the index-law strategy?", "answer": "- Step 1: Raise 10 to each side to undo the base-10 log: $$V = 10^{0.05t + 2}$$.\n- Step 2: Split the index using $$10^{p+q} = 10^p \\cdot 10^q$$: $$V = 10^{0.05t} \\cdot 10^2$$.\n- Step 3: Recognise $$10^{0.05t} = (10^{0.05})^t$$, so $$V = 100 \\cdot (10^{0.05})^t$$, giving $$a = 100$$ and $$b = 10^{0.05}$$.\n\nSplitting the exponent is what separates the constant $$a=10^2$$ from the base $$b=10^{0.05}$$.", "source": "Opus 4.8 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "P3 Q3(b) — the base is $$b = 10^{0.05} = 1.12$$ (3 s.f.). Why must you *keep the exact $$10^{0.05}$$* rather than the rounded 1.12 for the next part?", "answer": "- Step 1: Part (b) only requires 3 s.f., but part (c) requires **differentiating** the model.\n- Step 2: Differentiating the rounded base $$100(1.12)^t$$ propagates the rounding error into the derivative and the final answer — \"rounding the base before differentiating is not appropriately exact\".\n- Step 3: Carry the exact $$10^{0.05}$$ through the differentiation and round **only** the final $$T$$.\n\nThe reported $$1.12$$ is presentation; the working must use exact values.", "source": "Opus 4.8 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "P3 Q3(c) — the phrase \"rate of increase\" appears. What operation does \"rate\" trigger, and what did Phuc wrongly guess?", "answer": "- Step 1: \"Rate\" $$\\Rightarrow$$ **differentiate** — you need $$\\frac{dV}{dt}$$.\n- Step 2: Phuc's trap was suggesting an \"arithmetic series\" — wrong topic entirely; this is calculus, not sequences.\n- Step 3: \"Increase\" additionally tells you to set the derivative equal to a **positive** value ($$+50$$, not $$-50$$).\n\nTrigger map: \"rate\" = derivative; \"increase\" = positive sign.", "source": "Opus 4.8 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "P3 — what is the general rule for differentiating $$a^{kx}$$ (base $$a$$, coefficient $$k$$), and how does the chain rule produce the $$k$$?", "answer": "- Step 1: The base rule is $$\\frac{d}{dx}a^x = a^x \\ln a$$.\n- Step 2: For $$a^{kx}$$, the inner function is $$kx$$; by the chain rule you multiply by its derivative $$k$$.\n- Step 3: Result: $$\\frac{d}{dx}a^{kx} = a^{kx} \\cdot k \\ln a$$ — the $$k$$ is \"brought down\" by the chain rule.", "source": "Opus 4.8 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "P3 differentiation — a student differentiates $$3^{6x}$$ and writes something involving $$\\ln(6x)$$. What is the mistake and the correct answer?", "answer": "- Step 1: The factor from the exponent is **$$k \\ln a$$**, i.e. $$6\\ln 3$$ — a *product* of the coefficient and the log of the base — **never** $$\\ln(6x)$$ or $$\\ln(kx)$$.\n- Step 2: $$\\ln(6x)$$ wrongly folds the variable into the log; but $$6$$ is a constant coefficient of $$x$$ and $$3$$ is the base — they play completely different roles.\n- Step 3: Correct: $$\\frac{d}{dx}3^{6x} = 3^{6x} \\cdot 6\\ln 3$$.\n\nMemorise: the multiplier is $$k \\ln a$$, never $$\\ln(kx)$$.", "source": "Opus 4.8 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "P3 mini-drill — differentiate each exactly: $$3^x$$, $$5^{2x}$$, $$1.12^t$$. (3 steps)", "answer": "- Step 1: $$\\frac{d}{dx}3^x = 3^x \\ln 3$$ (base rule, $$k=1$$).\n- Step 2: $$\\frac{d}{dx}5^{2x} = 5^{2x} \\cdot 2\\ln 5$$ (chain rule brings down $$k=2$$).\n- Step 3: $$\\frac{d}{dt}1.12^t = 1.12^t \\ln(1.12)$$ (base rule with base 1.12).\n\nEach is \"the function itself $$\\times$$ (coefficient of $$x$$) $$\\times$$ ln(base).\"", "source": "Opus 4.8 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "P3 Q3(c) — after differentiating $$V = 100 \\cdot 10^{0.05t}$$ and setting $$\\frac{dV}{dt} = 50$$, why is showing the algebra essential rather than just using a calculator solve?", "answer": "- Step 1: The paper states \"solutions relying entirely on calculator technology are not acceptable\" — a common P3 constraint.\n- Step 2: You must display the log manipulation: from $$100 \\cdot 10^{0.05T} \\cdot 0.05\\ln 10 = 50$$, isolate $$10^{0.05T}$$, then take $$\\log_{10}$$ of both sides to reach $$0.05T = \\log_{10}(\\cdot)$$.\n- Step 3: Solve for $$T = 12.755\\ldots \\Rightarrow T = 13$$ (nearest integer), with all algebraic steps visible.\n\nShow-your-working is a scored requirement, not optional.", "source": "Opus 4.8 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "P3 Q3(c) — the note says differentiating the *rounded* $$1.12^t$$ still gives $$T=13$$ here. Why is Harry adamant this is \"luck, not method\"?", "answer": "- Step 1: With the rounded base you get $$T = 13.097\\ldots$$; with the exact base $$T = 12.756\\ldots$$ — different values that happen to round to the same integer.\n- Step 2: The agreement is coincidental to this particular question; in another problem the rounded base could round to a different integer and lose marks.\n- Step 3: The disciplined habit — carry exact values, round only at the end — is what generalises reliably.\n\nNever rely on a rounding coincidence to bail out a sloppy method.", "source": "Opus 4.8 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "P3 Q4(a) — express $$\\sqrt{3}\\sin 2x - 3\\cos 2x$$ as $$R\\sin(2x-\\alpha)$$. What is the compound-angle expansion you match against?", "answer": "- Step 1: From the formula book, $$R\\sin(2x-\\alpha) = R\\sin 2x\\cos\\alpha - R\\cos 2x\\sin\\alpha$$.\n- Step 2: Group by $$\\sin 2x$$ and $$\\cos 2x$$: $$= (R\\cos\\alpha)\\sin 2x - (R\\sin\\alpha)\\cos 2x$$.\n- Step 3: Match coefficients with $$\\sqrt{3}\\sin 2x - 3\\cos 2x$$: $$R\\cos\\alpha = \\sqrt{3}$$ and $$R\\sin\\alpha = 3$$.\n\nThe minus sign in $$R\\sin(2x-\\alpha)$$ aligns with the $$-\\cos$$ term, so both matched coefficients are positive.", "source": "Opus 4.8 ①", "_id": "opus_1_25", "judge_pick": false}, {"question": "P3 Q4(a) — for an \"exact value\" R-form question, why is Harry's method (square-and-add for R, divide for tan α) essential, and why is substituting a decimal α \"dangerous\"?", "answer": "- Step 1: **Square and add** the two matched coefficients: $$R^2(\\cos^2\\alpha + \\sin^2\\alpha) = (\\sqrt 3)^2 + 3^2 = 12$$, so $$R = \\sqrt{12} = 2\\sqrt3$$ — an *exact surd*.\n- Step 2: **Divide** the coefficients: $$\\tan\\alpha = \\frac{R\\sin\\alpha}{R\\cos\\alpha} = \\frac{3}{\\sqrt 3} = \\sqrt 3$$, so $$\\alpha = \\frac{\\pi}{3}$$ — exact.\n- Step 3: If you instead compute a decimal $$\\alpha$$ first and back-substitute to get $$R$$, you inject rounding error and can't guarantee the exact surd — \"your method could be quite dangerous.\"\n\nSquare-and-add exploits $$\\cos^2+\\sin^2=1$$ to eliminate $$\\alpha$$ entirely, giving $$R$$ cleanly.", "source": "Opus 4.8 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "P3 Q4(a) — two calculator/handwriting pitfalls Harry flagged when finding $$\\alpha$$. What are they?", "answer": "- Step 1: Use $$\\tan^{-1}$$ for $$\\alpha$$ (since $$\\tan\\alpha = b/a$$), **not** $$\\sin^{-1}$$ — Phuc slipped into the inverse sine.\n- Step 2: Keep the calculator in **radians** (the answer is $$\\pi/3$$, an exact radian value).\n- Step 3: Check your own handwriting — Phuc mis-read his \"3\" as a \"1\", which corrupts the coefficient matching.\n\nNeat digits + right inverse function + radians = correct exact $$\\alpha$$.", "source": "Opus 4.8 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "P3 Q4(b)(i) — to find the minimum of $$g(x) = \\frac{18}{f(3x) + 4\\sqrt3}$$, what is the counter-intuitive principle?", "answer": "- Step 1: The numerator 18 is a fixed positive constant.\n- Step 2: A fraction with a fixed positive top is **smallest when its denominator is largest** — you minimise $$g$$ by maximising the denominator.\n- Step 3: The denominator is largest when the sine term inside $$f(3x)$$ reaches its maximum value of $$1$$.\n\nMinimise the whole thing by *maximising* the part on the bottom — invert the objective.", "source": "Opus 4.8 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "P3 Q4(b)(i) — with $$f(3x) = 2\\sqrt3\\sin(6x - \\tfrac{\\pi}{3})$$, find the exact minimum of $$g(x) = \\frac{18}{2\\sqrt3\\sin(6x-\\pi/3) + 4\\sqrt3}$$. (3 steps)", "answer": "- Step 1: Max denominator uses $$\\sin(6x - \\tfrac\\pi3) = 1$$: $$2\\sqrt3(1) + 4\\sqrt3 = 6\\sqrt3$$.\n- Step 2: So $$\\min g = \\frac{18}{6\\sqrt3} = \\frac{3}{\\sqrt3}$$.\n- Step 3: Rationalise: $$\\frac{3}{\\sqrt3} \\cdot \\frac{\\sqrt3}{\\sqrt3} = \\frac{3\\sqrt3}{3} = \\sqrt3$$.\n\nExact minimum $$= \\sqrt3$$ — always rationalise the surd for the final \"exact value\".", "source": "Opus 4.8 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "P3 Q4(b)(i) — a subtlety: when computing $$f(3x)$$ from $$f(x) = 2\\sqrt3\\sin(2x - \\pi/3)$$, what replaces the argument, and what's the resulting frequency?", "answer": "- Step 1: Substitute $$x \\to 3x$$ inside $$f$$, so $$2x$$ becomes $$2(3x) = 6x$$.\n- Step 2: The phase $$-\\tfrac\\pi3$$ is unchanged: $$f(3x) = 2\\sqrt3\\sin(6x - \\tfrac\\pi3)$$.\n- Step 3: The frequency tripled ($$2 \\to 6$$), which matters in part (ii) when solving for the smallest $$x$$.\n\nOnly the multiple of $$x$$ changes; $$R$$ and $$\\alpha$$ carry through.", "source": "Opus 4.8 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "P3 Q4(b)(ii) — to find the smallest positive $$x$$ giving the minimum, what equation do you set, and how do you pick the smallest solution?", "answer": "- Step 1: The minimum occurs where $$\\sin(6x - \\tfrac\\pi3) = 1$$, so set $$6x - \\tfrac\\pi3 = \\tfrac\\pi2$$ (the principal solution).\n- Step 2: Solve: $$6x = \\tfrac\\pi2 + \\tfrac\\pi3 = \\tfrac{5\\pi}{6}$$, so $$x = \\tfrac{5\\pi}{36}$$.\n- Step 3: The general solution is $$\\tfrac\\pi2 + 2n\\pi$$; the next value ($$n=1$$) gives a larger $$x = \\tfrac{17\\pi}{36}$$, so $$\\tfrac{5\\pi}{36}$$ is the smallest positive.\n\nSketching the sine wave confirms which solution is smallest — Harry drew it to check.", "source": "Opus 4.8 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "P3 Q4(b)(ii) — why does taking $$6x - \\pi/3 = \\pi/2$$ (rather than another value where sine equals 1) give the smallest $$x$$?", "answer": "- Step 1: $$\\sin\\theta = 1$$ at $$\\theta = \\tfrac\\pi2, \\tfrac\\pi2 + 2\\pi, \\tfrac\\pi2 + 4\\pi, \\ldots$$ — the smallest such $$\\theta$$ is $$\\tfrac\\pi2$$.\n- Step 2: Since $$6x = \\theta + \\tfrac\\pi3$$ is increasing in $$x$$, the smallest $$\\theta$$ gives the smallest $$x$$.\n- Step 3: Adding any $$2\\pi$$ to $$\\theta$$ only increases $$x$$, so the principal value is optimal.\n\nSmallest angle → smallest $$x$$, because the map $$x \\mapsto 6x - \\pi/3$$ is monotonic increasing.", "source": "Opus 4.8 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "P3 Q5(a) — for $$N = \\frac{4000e^{0.1t}}{19 + e^{0.2t}}$$, find the population at the start. What single fact must you not \"lose\"?", "answer": "- Step 1: \"At the start\" means $$t = 0$$.\n- Step 2: The key fact: $$e^0 = 1$$, so numerator $$= 4000(1) = 4000$$ and denominator $$= 19 + 1 = 20$$.\n- Step 3: $$N = \\frac{4000}{20} = 200$$ squirrels.\n\nHarry: \"Be careful not to lose the one\" — the $$+1$$ in the denominator comes from $$e^0 = 1$$, not zero.", "source": "Opus 4.8 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "P3 Q5(b) — the model is a fraction $$\\frac{u}{v}$$. Why did Harry recommend the quotient rule over rewriting as $$uv^{-1}$$ with the product rule?", "answer": "- Step 1: Both are mathematically valid, but for this *shape* the quotient rule is safer and less error-prone.\n- Step 2: The quotient rule is printed in the formula book, so you can copy it directly rather than reconstruct a product-rule-plus-chain-rule chain.\n- Step 3: Rewriting $$v^{-1}$$ invites sign and index slips; the quotient rule keeps the structure explicit.\n\nUse the tool that's in the formula book and matches the shape.", "source": "Opus 4.8 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "P3 Q5(b) — state the quotient rule and the single most common error Phuc made applying it.", "answer": "- Step 1: $$\\left(\\frac{u}{v}\\right)' = \\frac{v u' - u v'}{v^2}$$.\n- Step 2: The critical error is **dropping the minus sign** in the numerator — Phuc wrote a plus.\n- Step 3: The $$-$$ before $$u v'$$ is essential; read it straight from the formula book to avoid the slip.\n\nHarry: \"the minus sign matters.\"", "source": "Opus 4.8 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "P3 Q5(b) — differentiating $$u = 4000e^{0.1t}$$ and $$v = 19 + e^{0.2t}$$, where do the numbers 400 and 0.2 come from?", "answer": "- Step 1: $$\\frac{d}{dt}e^{kt} = k e^{kt}$$, so the exponent coefficient \"comes down\" as a multiplier.\n- Step 2: $$u' = 4000 \\cdot 0.1 \\cdot e^{0.1t} = 400 e^{0.1t}$$ (the 0.1 comes down, times 4000).\n- Step 3: $$v' = 0.2 e^{0.2t}$$ (the 0.2 comes down; the constant 19 differentiates to 0).\n\nThe chain-rule factor for $$e^{kt}$$ is simply $$k$$.", "source": "Opus 4.8 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "P3 Q5(b) — when combining $$e^{0.1t}$$ and $$e^{0.2t}$$ terms in the numerator, what index law simplifies the products?", "answer": "- Step 1: $$e^{0.1t} \\cdot e^{0.2t} = e^{0.1t + 0.2t} = e^{0.3t}$$ — add the exponents.\n- Step 2: This appears when expanding $$v u' - u v'$$: the cross terms produce $$e^{0.3t}$$.\n- Step 3: The numerator simplifies to $$7600e^{0.1t} - 400e^{0.3t}$$ over $$(19+e^{0.2t})^2$$.\n\nWatch the $$e^{0.3t}$$ appearing — a common place to lose track of exponent arithmetic.", "source": "Opus 4.8 ①", "_id": "opus_1_37", "judge_pick": false}, {"question": "P3 Q5(c) — \"at the maximum, show $$e^{0.2T} = 19$$\". Why can you ignore the denominator when setting the derivative to zero?", "answer": "- Step 1: The maximum requires $$\\frac{dN}{dt} = 0$$, i.e. $$\\frac{\\text{numerator}}{(19+e^{0.2T})^2} = 0$$.\n- Step 2: A fraction equals zero only when its **numerator** is zero; the denominator $$(19+e^{0.2T})^2$$ is always strictly positive and can never be zero.\n- Step 3: So only the numerator $$7600e^{0.1T} - 400e^{0.3T} = 0$$ matters.\n\nThe squared denominator being non-zero lets you discard it entirely.", "source": "Opus 4.8 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "P3 Q5(c) — from $$e^{0.1T}(7600 - 400e^{0.2T}) = 0$$, why do you reject the factor $$e^{0.1T} = 0$$?", "answer": "- Step 1: Factor $$e^{0.1T}$$ out of the numerator: $$e^{0.1T}(7600 - 400e^{0.2T}) = 0$$.\n- Step 2: The exponential $$e^{0.1T} > 0$$ for **all** real $$T$$ — it never reaches zero (Harry sketched $$y=e^x$$ to show it's always positive).\n- Step 3: So the only way for the product to be zero is $$7600 - 400e^{0.2T} = 0$$, giving $$e^{0.2T} = \\frac{7600}{400} = 19$$.\n\n$$e^{\\text{anything}} > 0$$ is the fact that lets you cancel the exponential factor.", "source": "Opus 4.8 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "P3 Q5(c) — the command is \"show $$e^{0.2T} = 19$$\". Why did Harry stop Phuc from solving for $$T$$ here, and what does \"show that\" discipline require?", "answer": "- Step 1: The command word is **\"show that\"**, and the target is precisely the line $$e^{0.2T} = 19$$ — you stop when you reach it.\n- Step 2: Pushing on to solve for $$T$$ wastes time and risks error on a part that doesn't ask for it.\n- Step 3: Solving for $$T$$ is reserved for part (d); respecting the boundary of each command word is the exam discipline.\n\nRead the command word: \"show that...\" means stop at the shown line.", "source": "Opus 4.8 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "P3 Q5(d) — solving $$e^{0.2T} = 19$$ for $$T$$, which log must you use and why not $$\\log_{10}$$?", "answer": "- Step 1: The base of the exponential is $$e$$, so the **natural log $$\\ln$$** is the matching inverse: $$0.2T = \\ln 19$$.\n- Step 2: Using $$\\log_{10}$$ would force an extra conversion factor and is the wrong inverse for base $$e$$ — Phuc initially wrote base-10.\n- Step 3: $$T = \\frac{\\ln 19}{0.2} \\approx 14.72$$ (keep stored, unrounded).\n\nMatch the log to the base: base $$e \\Rightarrow \\ln$$.", "source": "Opus 4.8 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "P3 Q5(d) — after finding $$T$$, what is the clever substitution shortcut to evaluate $$e^{0.1T}$$ without re-computing from $$T$$?", "answer": "- Step 1: You already know $$e^{0.2T} = 19$$ from part (c).\n- Step 2: Note $$e^{0.1T} = (e^{0.2T})^{1/2} = \\sqrt{19}$$ — half the exponent means a square root.\n- Step 3: The denominator becomes $$19 + e^{0.2T} = 19 + 19 = 38$$, so $$N = \\frac{4000\\sqrt{19}}{38} = 458.83\\ldots \\Rightarrow 459$$.\n\nReuse the exact relation $$e^{0.2T}=19$$ instead of substituting a rounded $$T$$ — cleaner and exact.", "source": "Opus 4.8 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "P3 Q5(d) — the \"round only at the end\" principle. Why must you substitute the *stored* value of $$T$$, not a rounded $$T$$?", "answer": "- Step 1: Rounding $$T \\approx 14.72$$ to, say, 15 and substituting back would produce a wrong $$N$$.\n- Step 2: The maximum is sensitive to $$T$$; premature rounding corrupts the final population count.\n- Step 3: Carry the full stored calculator value (or use the exact $$e^{0.2T}=19$$ shortcut) and round **only** the final $$N$$ to the nearest whole number.\n\nHarry: \"We only round at the very final answer... use the stored value.\"", "source": "Opus 4.8 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "P3 Q5(d) — why is the answer 459 and not 959? (evidence note)", "answer": "- Step 1: The official model $$N = \\frac{4000e^{0.1t}}{19 + e^{0.2t}}$$ gives $$\\frac{4000\\sqrt{19}}{38} = 458.83\\ldots \\to 459$$.\n- Step 2: The \"959\" arose from an analysis segment that mis-copied the denominator as $$19 + e^{0.1t}$$ (wrong exponent) — a transcription error.\n- Step 3: The spoken transcript confirms Harry accepting \"459 is fine\". Use 459.\n\nThe lesson: verify you're using the *correct model* before computing.", "source": "Opus 4.8 ①", "_id": "opus_1_44", "judge_pick": false}, {"question": "P3 Q1 (functions) — this question was only discussed, not worked. What types of sub-parts does it contain, and why should you prioritise it in independent practice?", "answer": "- Step 1: With $$f(x) = \\ln(x^2+3)$$ and $$g(x) = \\frac{3+5x}{x+2}$$, the parts are: (a) range of $$f$$, (b) find $$g^{-1}$$, (c) find $$fg(0)$$, (d) exact value from a composite condition.\n- Step 2: These are inverse-function and composite-function skills — standard **opening marks** in P3.\n- Step 3: Because they're reliable early marks, they deserve independent drilling even though the tutorial skipped them.\n\nNever leave \"easy opening\" question types unpractised.", "source": "Opus 4.8 ①", "_id": "opus_1_45", "judge_pick": false}, {"question": "General P3 technique — Harry named formula recall as Phuc's *main* gap. What was his two-part fix?", "answer": "- Step 1: **Flashcards** for the formulae (sphere/cylinder/circle geometry and the $$a^{kx}$$ derivative) to memorise them cold.\n- Step 2: **Volume of practice** — do \"8 to 10 papers\" so the formulae \"become second nature\" through repeated use.\n- Step 3: The philosophy: fluency comes from both spaced memorisation *and* application under exam conditions.\n\nRecall + reps = automaticity.", "source": "Opus 4.8 ①", "_id": "opus_1_46", "judge_pick": false}, {"question": "P3 exam technique — what is the general \"command word\" discipline Harry drilled across Q5(c) and (d)?", "answer": "- Step 1: Read the command word before deciding how far to go.\n- Step 2: \"Show that [target]\" means produce exactly that line and **stop** — don't over-solve.\n- Step 3: The instruction to solve/round/evaluate comes only when a later part explicitly asks (e.g. (d) asks for the maximum value).\n\nMatching effort to the command word prevents wasted work and lost marks.", "source": "Opus 4.8 ①", "_id": "opus_1_47", "judge_pick": false}, {"question": "P3 — what is the derivative rule for $$e^{kx}$$, and how does it differ structurally from the $$a^{kx}$$ rule?", "answer": "- Step 1: $$\\frac{d}{dx}e^{kx} = k e^{kx}$$ — because $$\\ln e = 1$$, so the general $$a^{kx}k\\ln a$$ collapses to just $$k e^{kx}$$.\n- Step 2: For a general base $$a$$, you keep the $$\\ln a$$ factor: $$\\frac{d}{dx}a^{kx} = a^{kx}k\\ln a$$.\n- Step 3: The special case $$a = e$$ is cleaner precisely because $$\\ln e = 1$$ removes the log factor.\n\n$$e$$ is the \"natural\" base because its log-factor is 1.", "source": "Opus 4.8 ①", "_id": "opus_1_48", "judge_pick": false}, {"question": "P3 R-form — general recall: for $$R\\sin(x - \\alpha) = a\\sin x - b\\cos x$$, how do you extract $$R$$ and $$\\alpha$$ exactly?", "answer": "- Step 1: Match coefficients: $$R\\cos\\alpha = a$$, $$R\\sin\\alpha = b$$.\n- Step 2: $$R = \\sqrt{a^2 + b^2}$$ (square and add, using $$\\cos^2+\\sin^2=1$$).\n- Step 3: $$\\tan\\alpha = \\frac{b}{a}$$ (divide the equations), so $$\\alpha = \\tan^{-1}(b/a)$$.\n\nThese two operations give exact surd/radian answers with no rounding.", "source": "Opus 4.8 ①", "_id": "opus_1_49", "judge_pick": false}, {"question": "P3 exam strategy — Harry's end-of-session advice on October module entries. What was the strategic recommendation and its rationale?", "answer": "- Step 1: Aiming for A* in *every* module in October is \"a real stretch\" if relying only on tutorials — independent study between sessions is essential.\n- Step 2: It may be safer to **push some modules back** and enter only the 3 or 4 you're most ready for.\n- Step 3: Rationale: better to secure strong grades in fewer modules than risk low grades by spreading too thin.\n\nPrioritise readiness over quantity when planning entries.", "source": "Opus 4.8 ①", "_id": "opus_1_50", "judge_pick": false}, {"question": "P3 — the \"little details\" Harry praised Phuc for finally catching. Give examples of these detail-traps that cost marks.", "answer": "- Step 1: \"Nearest whole number\" — round the final population to an integer (459, not 458.83).\n- Step 2: \"3 significant figures\" — report $$b = 1.12$$ to the specified precision.\n- Step 3: These instruction-word details (rounding precision, exact vs decimal, which log) are frequently where careful students separate from careless ones.\n\nReading and obeying the precision instruction is itself a scored skill.", "source": "Opus 4.8 ①", "_id": "opus_1_51", "judge_pick": false}, {"question": "P3 — why does taking logs of $$V = ab^t$$ produce a straight line, and which variable becomes linear?", "answer": "- Step 1: Take $$\\log_{10}$$ of both sides: $$\\log_{10}V = \\log_{10}a + t\\log_{10}b$$.\n- Step 2: This has the form $$Y = c + mt$$ with $$Y = \\log_{10}V$$, intercept $$c = \\log_{10}a$$, gradient $$m = \\log_{10}b$$.\n- Step 3: So plotting $$\\log_{10}V$$ (not $$V$$) against $$t$$ linearises the exponential — the whole reason the graph is straight.\n\nLogs convert multiplicative (exponential) growth into additive (linear) form.", "source": "Opus 4.8 ①", "_id": "opus_1_52", "judge_pick": true}], "count": 53}, "opus_2": {"label": "Opus 4.8 ②", "cards": [{"question": "ESAT surface-area modelling — what are the two distinct components of the surface area of a *closed* cylinder, and how do you derive each?", "answer": "- Step 1: Identify the flat ends. A closed cylinder has two circular ends, each of area $$\\pi r^2$$, giving $$2\\pi r^2$$.\n- Step 2: Derive the curved side. Mentally \"unroll\" the curved surface into a rectangle. One side is the height $$h$$; the other side is the circumference $$2\\pi r$$ (NOT the diameter). So the curved area $$= 2\\pi r \\times h = 2\\pi r h$$.\n- Step 3: Add them: total closed-cylinder surface area $$= 2\\pi r^2 + 2\\pi r h$$.\n\nThe key insight: unrolling turns a curved 3-D surface into a flat rectangle whose dimensions you already know — circumference × height.", "source": "Opus 4.8 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "In the ESAT warm-up, a student wrote $$\\pi r^2 h$$ as the surface area of a cylinder. What is the misconception, and what is $$\\pi r^2 h$$ actually?", "answer": "- Step 1: Recognise that $$\\pi r^2 h$$ is the **volume** of a cylinder, not its surface area.\n- Step 2: Understand why: a cylinder is a prism, and volume of any prism = (cross-sectional area) × (length). The cross-section is a circle of area $$\\pi r^2$$, and the length is $$h$$, hence $$\\pi r^2 h$$.\n- Step 3: Contrast: surface area is a 2-D \"skin\" quantity ($$2\\pi r^2 + 2\\pi r h$$), whereas volume is a 3-D \"filling\" quantity. Confusing the two is a classic recall failure.\n\nTakeaway: area formulas have dimensions of length², volume has length³ — a dimensional sanity check catches this instantly.", "source": "Opus 4.8 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "What is the single most common error students make when writing down the surface area of a sphere, and what is the correct formula?", "answer": "- Step 1: The error is writing $$4\\pi R$$ (forgetting the square), or confusing it with a circle's circumference/area.\n- Step 2: The correct formula is $$A = 4\\pi R^2$$ — the total area around the whole outside of the 3-D shape.\n- Step 3: Harry's fix mantra: \"Don't forget the square.\" Just as circle area is $$\\pi r^2$$ (not $$\\pi r$$), sphere surface area carries the square because it is an area, dimensionally length².", "source": "Opus 4.8 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "A student wrote \"$$\\pi$$ multiplied by $$r$$\" ($$\\pi r$$) for the area of a circle. What did they confuse, and what are the correct two circle formulas?", "answer": "- Step 1: $$\\pi r$$ is neither — it's a mangled half of the circumference.\n- Step 2: Area of a circle $$= \\pi r^2$$ (keep the square).\n- Step 3: Circumference $$= 2\\pi r$$ (this is the *length* around the edge, used as the unrolled curved side of a cylinder).\n\nThe habit to build: whenever you see \"$$\\pi r$$\", ask \"is this an area (needs $$r^2$$) or a length (has one power of $$r$$)?\"", "source": "Opus 4.8 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "ESAT: \"surface area of a sphere equals total surface area of 10 closed cylinders.\" What is the very first equation you write before substituting anything, and what's the trap in writing it? (3 steps)", "answer": "- Step 1: Write the word equation first: surface area of sphere = 10 × (surface area of one cylinder).\n- Step 2: The trap is using only ONE circular end for the cylinder. Because the cylinder is **closed**, it has TWO ends, so use $$2\\pi r^2 + 2\\pi r h$$, not $$\\pi r^2 + 2\\pi r h$$.\n- Step 3: The full equation is $$4\\pi R^2 = 10\\left(2\\pi r^2 + 2\\pi r h\\right)$$.\n\nTakeaway: the word \"closed\" is the trigger that forces both ends into the formula.", "source": "Opus 4.8 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "ESAT sphere-vs-cylinders problem: after forming $$4\\pi R^2 = 10(2\\pi r^2 + 2\\pi r h)$$ with $$h = 4R$$, what is the strategy to reach an equation you can solve for $$R$$? (4 steps)", "answer": "- Step 1: Substitute $$h = 4R$$: $$4\\pi R^2 = 10(2\\pi r^2 + 2\\pi r(4R)) = 20\\pi r^2 + 80\\pi r R$$.\n- Step 2: Divide throughout by $$4\\pi$$ to clear common factors: $$R^2 = 5r^2 + 20rR$$.\n- Step 3: Recognise this is a **quadratic in $$R$$** (treat $$r$$ as a constant): rearrange to $$R^2 - 20rR - 5r^2 = 0$$.\n- Step 4: Apply the quadratic formula with $$a=1$$, $$b=-20r$$, $$c=-5r^2$$, then keep only the positive root.\n\nTakeaway: the transferable trick is to treat $$r$$ as a constant so the messy equation becomes a standard quadratic in $$R$$.", "source": "Opus 4.8 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "In the ESAT problem, the quadratic formula gives $$R = \\frac{20r \\pm 2r\\sqrt{105}}{2}$$. Which root do you keep and why?", "answer": "- Step 1: Simplify to $$R = r(10 \\pm \\sqrt{105})$$.\n- Step 2: Since $$\\sqrt{105} \\approx 10.25 > 10$$, the minus root gives a negative $$R$$.\n- Step 3: A radius must be positive, so reject the negative root and take $$R = r(10 + \\sqrt{105})$$.\n\nTakeaway: whenever a physical quantity (radius, length, time) emerges from a quadratic, always discard the non-physical (negative) root and state *why*.", "source": "Opus 4.8 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "In the ESAT surface-area quadratic, how do you simplify $$\\sqrt{420r^2}$$ to an exact surd form?", "answer": "- Step 1: Factor out the perfect square: $$420 = 4 \\times 105$$.\n- Step 2: So $$\\sqrt{420r^2} = \\sqrt{4 \\times 105 \\times r^2} = 2r\\sqrt{105}$$.\n- Step 3: This lets the $$2$$ in the denominator of the quadratic formula cancel cleanly, giving $$R = r(10 \\pm \\sqrt{105})$$.\n\nTakeaway: for exact-surd answers, always pull out the largest perfect-square factor before simplifying.", "source": "Opus 4.8 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "Q2(a) — the question says \"show $$f(x)=0$$ has a root $$\\alpha \\in [1,2]$$.\" What two things MUST both appear in your answer to score both marks? (3 steps)", "answer": "- Step 1: A **sign change** — substitute the actual endpoints $$f(1)$$ and $$f(2)$$, write both values, and show one is positive and one is negative.\n- Step 2: A statement of **continuity** — \"$$f$$ is continuous on $$[1,2]$$\" (defined for all $$x$$ there; $$x \\ne 0$$ causes no problem inside the interval).\n- Step 3: A conclusion — \"by the sign change and continuity, there is a root $$\\alpha$$ in $$[1,2]$$.\"\n\nHarry's warning: \"The bit that everyone forgets is continuity. Otherwise you'll only score one mark.\"", "source": "Opus 4.8 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "Why is stating \"continuity\" essential to the Intermediate Value Theorem argument — what could go wrong without it?", "answer": "- Step 1: The IVT guarantees a root only if the function is continuous between the endpoints.\n- Step 2: If $$f$$ were discontinuous, it could jump from negative to positive *without* passing through zero (e.g. across an asymptote), so a sign change alone would NOT prove a root.\n- Step 3: Therefore the sign change is meaningless as proof unless you first establish continuity. This is why the mark scheme demands both.\n\nTakeaway: continuity is what forces the graph to physically cross the axis; the sign change alone is not enough.", "source": "Opus 4.8 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "Q2(a) IVT — why must you substitute the *exact endpoints* $$f(1)$$ and $$f(2)$$ rather than values \"near\" them?", "answer": "- Step 1: The theorem's conclusion is about the interval whose endpoints you evaluate. Using $$f(1)$$ and $$f(2)$$ proves a root in $$[1,2]$$.\n- Step 2: If you use, say, $$f(1.1)$$ and $$f(1.9)$$, you've proved a root in a *different* interval — not the one asked for.\n- Step 3: Using the exact endpoints keeps the logic airtight and matches the interval the question specifies.\n\nTakeaway: the interval in the question dictates exactly which points you substitute — no approximations.", "source": "Opus 4.8 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "Q2(b) — \"show $$f(x)=0$$ can be written as $$x = \\sqrt[3]{\\frac{e^x+4x^2}{2x+3}}$$.\" What is Harry's overarching strategy for a \"show it rearranges to...\" question?", "answer": "- Step 1: **Look at the target form and work towards it** — the answer tells you what shape to aim for.\n- Step 2: A cube root in the target ($$\\sqrt[3]{\\ }$$) tells you the final move is \"cube-root both sides\", so at some point you must produce $$x^3 = (\\text{something})$$.\n- Step 3: The $$2x+3$$ in the denominator tells you to factor $$x^3(2x+3)$$ out of the left-hand side before dividing.\n\nTakeaway: in \"show that\" rearrangements, the target's structure (cube root, denominator, etc.) is a map of the moves you need.", "source": "Opus 4.8 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "Q2(b) — starting from $$\\frac{2x^2+3x-4}{e^x} - \\frac{1}{x^2} = 0$$, what is the first algebraic move to clear the fractions? (3 steps)", "answer": "- Step 1: Move the second term across: $$\\frac{2x^2+3x-4}{e^x} = \\frac{1}{x^2}$$.\n- Step 2: Cross-multiply (multiply by $$e^x x^2$$): $$x^2(2x^2+3x-4) = e^x$$.\n- Step 3: Expand: $$2x^4 + 3x^3 - 4x^2 = e^x$$.\n\nTakeaway: clearing denominators first turns the equation into a polynomial-vs-exponential form you can then rearrange toward the target.", "source": "Opus 4.8 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "Q2(b) — from $$2x^4 + 3x^3 - 4x^2 = e^x$$, how do you engineer the factor $$x^3(2x+3)$$ needed for the target? (3 steps)", "answer": "- Step 1: Move the $$-4x^2$$ to the right: $$2x^4 + 3x^3 = e^x + 4x^2$$.\n- Step 2: Factor $$x^3$$ from the left: $$x^3(2x + 3) = e^x + 4x^2$$.\n- Step 3: Divide by $$(2x+3)$$, then cube-root: $$x^3 = \\frac{e^x+4x^2}{2x+3} \\Rightarrow x = \\sqrt[3]{\\frac{e^x+4x^2}{2x+3}}$$.\n\nTakeaway: the denominator of the target ($$2x+3$$) is your clue to factor exactly that expression out of the left side.", "source": "Opus 4.8 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "Q2(c) iteration $$x_{n+1} = \\sqrt[3]{\\frac{e^{x_n}+4x_n^2}{2x_n+3}}$$ with $$x_1=1$$ — what three practical precautions must you take when computing $$x_3$$ and $$\\alpha$$ to 4 d.p.? (3 steps)", "answer": "- Step 1: Keep the calculator in the correct mode (this involves $$e^x$$, so no radians/degrees confusion, but ensure exponential/scientific mode is right).\n- Step 2: Do NOT round intermediate iterates — carry full precision from $$x_2$$ into $$x_3$$, otherwise error compounds.\n- Step 3: Quote $$x_3$$ **and** $$\\alpha$$ each to 4 decimal places as the question demands.\n\nTakeaway: iteration accuracy depends entirely on not rounding mid-calculation; only round the final reported values.", "source": "Opus 4.8 ②", "_id": "opus_2_14", "judge_pick": true}, {"question": "Q3(a) — the graph is \"$$\\log_{10}V$$ against $$t$$.\" What is the trap in identifying the variables, and how do you correctly assign axes?", "answer": "- Step 1: The trap is writing $$V$$ (or $$y$$) as the vertical variable. Harry: \"It's not $$V$$. Be careful.\"\n- Step 2: \"$$\\log_{10}V$$ against $$t$$\" means the **$$y$$-axis is $$\\log_{10}V$$** and the **$$x$$-axis is $$t$$**.\n- Step 3: So the straight line is $$\\log_{10}V = mt + c$$, a linear relationship in the *log* of $$V$$, not in $$V$$ itself.\n\nTakeaway: \"A against B\" always means A is vertical, B is horizontal — read it literally.", "source": "Opus 4.8 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "Q3(a) — the line passes through $$(0,2)$$ and $$(5,2.25)$$. How do you get the equation $$\\log_{10}V = 0.05t + 2$$? (3 steps)", "answer": "- Step 1: Gradient $$m = \\frac{2.25 - 2}{5 - 0} = \\frac{0.25}{5} = 0.05$$.\n- Step 2: Intercept $$c = 2$$ — read directly since the point $$(0,2)$$ lies on the $$y$$-axis.\n- Step 3: Assemble: $$\\log_{10}V = 0.05t + 2$$.\n\nTakeaway: linearising a graph reduces the problem to ordinary straight-line \"gradient + intercept\" work.", "source": "Opus 4.8 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "Q3(b) — to convert $$\\log_{10}V = 0.05t + 2$$ into $$V = ab^t$$, what is the key operation and how do you split the index? (3 steps)", "answer": "- Step 1: Raise 10 to each side to undo $$\\log_{10}$$: $$V = 10^{0.05t + 2}$$.\n- Step 2: Split the index using $$10^{p+q} = 10^p \\cdot 10^q$$: $$V = 10^{0.05t} \\cdot 10^2$$.\n- Step 3: Restructure $$10^{0.05t} = (10^{0.05})^t$$ to match $$ab^t$$: $$V = 100 \\cdot (10^{0.05})^t$$, so $$a = 100$$, $$b = 10^{0.05}$$.\n\nTakeaway: the index law $$10^{p+q}=10^p 10^q$$ separates the constant part (giving $$a$$) from the $$t$$-part (giving $$b^t$$).", "source": "Opus 4.8 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "Q3(b) — why must you report $$b = 1.12$$ (3 s.f.) for part (b) but keep the *exact* value $$10^{0.05}$$ for part (c)?", "answer": "- Step 1: Part (b) only asks for $$b$$ to 3 s.f., so $$10^{0.05} = 1.12201\\ldots = 1.12$$.\n- Step 2: But part (c) requires differentiating the model, and rounding the base *before* differentiating introduces error — it is not \"appropriately exact.\"\n- Step 3: Therefore carry $$10^{0.05}$$ (equivalently $$V = 100 \\cdot 10^{0.05t}$$) into the derivative and round only the final answer.\n\nTakeaway: never differentiate a rounded quantity; the exact base must survive until after differentiation.", "source": "Opus 4.8 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "Q3(c) — the word \"rate of increase\" appears. What operation does \"rate\" signal, and what sign trap follows from \"increase\"?", "answer": "- Step 1: \"Rate\" $$\\Rightarrow$$ differentiate — compute $$\\frac{dV}{dt}$$. (The trap here: a student suggested an \"arithmetic series\" — wrong.)\n- Step 2: \"Increase\" $$\\Rightarrow$$ the rate equals a *positive* value, so set $$\\frac{dV}{dt} = +50$$, not $$-50$$.\n- Step 3: Solve the resulting equation for $$t = T$$.\n\nTakeaway: \"rate\" = derivative; \"increase/decrease\" fixes the sign of that derivative.", "source": "Opus 4.8 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "What is the general rule for differentiating $$a^{kx}$$, and what factor does the chain rule bring down?", "answer": "- Step 1: Base rule: $$\\frac{d}{dx}a^x = a^x \\ln a$$.\n- Step 2: With $$kx$$ in the exponent, the chain rule brings down the constant $$k$$: $$\\frac{d}{dx}a^{kx} = a^{kx} \\cdot k \\ln a$$.\n- Step 3: The multiplier is **$$k\\ln a$$**, never $$\\ln(kx)$$ — the $$k$$ comes down as a *factor*, and $$\\ln$$ acts only on the base $$a$$.\n\nTakeaway: differentiating $$a^{kx}$$ = (the same term) × ($$k$$) × ($$\\ln$$ of the base).", "source": "Opus 4.8 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "A common error: differentiating $$3^{6x}$$ as \"$$\\ln(6x)$$\". What is the correct derivative and why is $$\\ln(6x)$$ wrong?", "answer": "- Step 1: Correct: $$\\frac{d}{dx}3^{6x} = 3^{6x} \\cdot 6\\ln 3$$.\n- Step 2: The $$6$$ comes down as a plain factor (chain rule on the exponent), and $$\\ln$$ applies to the **base 3**, giving $$\\ln 3$$.\n- Step 3: Writing $$\\ln(6x)$$ wrongly puts the whole exponent inside a log — this confuses the rule for $$a^{kx}$$ with the rule for $$\\ln(\\text{something})$$.\n\nTakeaway: $$\\ln$$ acts on the base only; the coefficient of $$x$$ becomes a separate multiplying factor.", "source": "Opus 4.8 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "Differentiate each exactly (mental drill): $$3^x$$, $$5^{2x}$$, $$1.12^t$$. What is the pattern?", "answer": "- Step 1: $$\\frac{d}{dx}3^x = 3^x \\ln 3$$ ($$k=1$$, so just $$\\times\\ln 3$$).\n- Step 2: $$\\frac{d}{dx}5^{2x} = 5^{2x} \\cdot 2\\ln 5$$ (bring down $$k=2$$).\n- Step 3: $$\\frac{d}{dt}1.12^t = 1.12^t \\ln(1.12)$$ ($$k=1$$).\n\nPattern: (same term) × ($$k$$) × ($$\\ln$$ base). The coefficient of the variable is $$k$$; $$\\ln$$ always hugs the base.", "source": "Opus 4.8 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "Q3(c) — differentiating $$V = 100 \\cdot 10^{0.05t}$$, why does $$\\frac{dV}{dt}$$ come out as $$0.05\\ln(10)\\,V$$?", "answer": "- Step 1: Apply the $$a^{kx}$$ rule with base $$10$$ and $$k = 0.05$$: $$\\frac{dV}{dt} = 100 \\cdot 10^{0.05t} \\cdot 0.05\\ln 10$$.\n- Step 2: Notice $$100 \\cdot 10^{0.05t} = V$$ itself, so $$\\frac{dV}{dt} = 0.05\\ln(10)\\,V$$.\n- Step 3: This exponential-growth signature — derivative proportional to the function — is characteristic of $$V = ab^t$$ models.\n\nTakeaway: for exponential models, the derivative is always a constant multiple of the original function.", "source": "Opus 4.8 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "Q3(c) — why does the exam say \"solutions relying entirely on calculator technology are not acceptable,\" and how do you comply when solving $$100\\cdot10^{0.05T}\\cdot0.05\\ln10 = 50$$?", "answer": "- Step 1: The rubric bars solve-button answers; you must **show algebra**.\n- Step 2: Isolate the exponential: $$10^{0.05T} = \\frac{50}{5\\ln 10} = \\frac{10}{\\ln 10}$$.\n- Step 3: Take $$\\log_{10}$$: $$0.05T = \\log_{10}\\!\\left(\\frac{10}{\\ln 10}\\right)$$, then $$T = \\frac{\\log_{10}(10/\\ln 10)}{0.05} \\approx 12.76 \\Rightarrow T = 13$$.\n\nTakeaway: display the log step explicitly so the working is method-based, not calculator-based.", "source": "Opus 4.8 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "Q3(c) — Harry notes that differentiating the *rounded* $$V = 100(1.12)^t$$ gives $$T = 13.10\\ldots$$ while the exact base gives $$T = 12.76\\ldots$$, both rounding to 13. Why is this \"luck, not method\"?", "answer": "- Step 1: Both happen to round to 13 in this case, so the final integer answer coincides.\n- Step 2: But rounding the base *before* differentiating is mathematically not \"appropriately exact\" — the intermediate value $$T$$ is genuinely different (13.10 vs 12.76).\n- Step 3: In another problem the two could round to different integers, costing marks. So always carry the exact base.\n\nTakeaway: getting the right answer from a wrong method is coincidence; examiners reward the exact method.", "source": "Opus 4.8 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "Q4(a) — to express $$\\sqrt{3}\\sin 2x - 3\\cos 2x$$ as $$R\\sin(2x-\\alpha)$$, what expansion do you write first and how do you match coefficients? (3 steps)", "answer": "- Step 1: Expand from the formula book: $$R\\sin(2x-\\alpha) = R\\cos\\alpha\\,\\sin 2x - R\\sin\\alpha\\,\\cos 2x$$.\n- Step 2: Match the $$\\sin 2x$$ coefficient: $$R\\cos\\alpha = \\sqrt{3}$$.\n- Step 3: Match the $$\\cos 2x$$ coefficient: $$R\\sin\\alpha = 3$$.\n\nTakeaway: the expansion is what lets you equate coefficients — always write it before comparing.", "source": "Opus 4.8 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "Q4(a) — Harry warns \"your method could be quite dangerous\" against a certain approach for exact $$R$$. What is the dangerous method and what is the safe one?", "answer": "- Step 1: The dangerous method: find $$\\alpha$$ as a decimal, then substitute it into $$R\\cos\\alpha = \\sqrt3$$ to get $$R$$ — this injects rounding error into an \"exact value\" answer.\n- Step 2: The safe method for $$R$$: **square and add**. $$(R\\cos\\alpha)^2 + (R\\sin\\alpha)^2 = R^2(\\cos^2\\alpha+\\sin^2\\alpha) = R^2$$, using the Pythagorean identity.\n- Step 3: So $$R = \\sqrt{(\\sqrt3)^2 + 3^2} = \\sqrt{3+9} = \\sqrt{12} = 2\\sqrt3$$ — fully exact.\n\nTakeaway: for exact $$R$$, square-and-add exploits $$\\cos^2+\\sin^2=1$$; never route through a rounded $$\\alpha$$.", "source": "Opus 4.8 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "Q4(a) — what is the safe method for finding $$\\alpha$$ exactly, and why does dividing the two coefficient equations work?", "answer": "- Step 1: Divide the equations: $$\\frac{R\\sin\\alpha}{R\\cos\\alpha} = \\frac{3}{\\sqrt3}$$.\n- Step 2: The $$R$$ cancels and $$\\frac{\\sin\\alpha}{\\cos\\alpha} = \\tan\\alpha$$, so $$\\tan\\alpha = \\frac{3}{\\sqrt3} = \\sqrt3$$.\n- Step 3: Hence $$\\alpha = \\tan^{-1}(\\sqrt3) = \\frac{\\pi}{3}$$ (within $$0<\\alpha<\\frac\\pi2$$).\n\nTakeaway: dividing removes $$R$$ and leaves $$\\tan\\alpha$$ exactly; this is why you always use $$\\tan^{-1}$$, not $$\\sin^{-1}$$, for $$\\alpha$$.", "source": "Opus 4.8 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "Q4(a) — two calculator pitfalls: which inverse function must you use for $$\\alpha$$, and what mode must the calculator be in?", "answer": "- Step 1: Use $$\\tan^{-1}$$ for $$\\alpha$$ (because $$\\tan\\alpha$$ is what dividing the coefficients gives), NOT $$\\sin^{-1}$$.\n- Step 2: Keep the calculator in **radians** — the answer $$\\frac\\pi3$$ is a radian value, and degrees mode would give a wrong-looking answer.\n- Step 3: Also double-check handwriting: a student misread their own \"3\" as \"1\", which corrupts the coefficient matching.\n\nTakeaway: exact-trig answers in $$\\pi$$ demand radians mode and $$\\tan^{-1}$$; sloppy digits sink the whole question.", "source": "Opus 4.8 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "Q4(a) — there is a flagged transcription error claiming the expression was $$3\\sin 2x - 4\\cos 2x$$ giving $$R=5, \\alpha=0.927$$. Why is this rejected, and what is authoritative?", "answer": "- Step 1: The official question paper (WMA13/01, 21 Oct 2025) is authoritative for the coefficients.\n- Step 2: The paper gives $$\\sqrt3\\sin 2x - 3\\cos 2x$$, yielding $$R = 2\\sqrt3$$ and $$\\alpha = \\frac\\pi3$$.\n- Step 3: The \"$$R=5$$\" version came from a mis-transcribed segment; the second segment and the paper both agree, so it is a transcription error, not used.\n\nTakeaway: when evidence conflicts, the official paper overrides transcript/analysis artefacts.", "source": "Opus 4.8 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "Q4(b)(i) — to find the minimum of $$g(x) = \\frac{18}{f(3x)+4\\sqrt3}$$ where the numerator is a fixed positive constant, what is the key insight? (3 steps)", "answer": "- Step 1: A fraction with a fixed positive numerator is **smallest when its denominator is largest** — this is the core trick.\n- Step 2: So instead of minimising $$g$$ directly, **maximise the denominator** $$f(3x) + 4\\sqrt3$$.\n- Step 3: Since $$f(3x) = 2\\sqrt3\\sin(6x - \\frac\\pi3)$$, the denominator is largest when $$\\sin(6x-\\frac\\pi3) = 1$$ (its max value).\n\nTakeaway: \"minimise a fraction\" → \"maximise the denominator\" whenever the top is a fixed positive number.", "source": "Opus 4.8 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "Q4(b)(i) — with $$\\sin(6x-\\frac\\pi3)=1$$, how do you compute the exact minimum value of $$g$$ and rationalise it? (3 steps)", "answer": "- Step 1: Max denominator $$= 2\\sqrt3(1) + 4\\sqrt3 = 6\\sqrt3$$.\n- Step 2: So $$\\min g = \\frac{18}{6\\sqrt3} = \\frac{3}{\\sqrt3}$$.\n- Step 3: Rationalise: $$\\frac{3}{\\sqrt3}\\cdot\\frac{\\sqrt3}{\\sqrt3} = \\frac{3\\sqrt3}{3} = \\sqrt3$$.\n\nTakeaway: leave surds rationalised for \"exact value\" answers — $$\\min g = \\sqrt3$$.", "source": "Opus 4.8 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "Q4(b)(i) — when you replace $$x$$ with $$3x$$ inside $$f(x) = 2\\sqrt3\\sin(2x-\\frac\\pi3)$$, what does $$f(3x)$$ become and why?", "answer": "- Step 1: $$f(3x)$$ means substitute $$3x$$ everywhere $$x$$ appears, so $$2x \\to 2(3x) = 6x$$.\n- Step 2: The phase $$-\\frac\\pi3$$ is unchanged (it's a constant), giving $$f(3x) = 2\\sqrt3\\sin(6x - \\frac\\pi3)$$.\n- Step 3: The amplitude $$2\\sqrt3$$ is also unchanged — only the argument's $$x$$-coefficient scales.\n\nTakeaway: composing $$f(3x)$$ scales the frequency (2 → 6) but leaves amplitude and phase constant.", "source": "Opus 4.8 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "Q4(b)(ii) — to find the *smallest* $$x$$ giving the minimum of $$g$$, what equation do you solve and how do you get the smallest positive solution? (3 steps)", "answer": "- Step 1: Set the sine to its maximum: $$\\sin(6x-\\frac\\pi3) = 1 \\Rightarrow 6x - \\frac\\pi3 = \\frac\\pi2$$ (principal solution; general is $$\\frac\\pi2 + 2n\\pi$$).\n- Step 2: Solve: $$6x = \\frac\\pi2 + \\frac\\pi3 = \\frac{3\\pi+2\\pi}{6} = \\frac{5\\pi}{6}$$, so $$x = \\frac{5\\pi}{36}$$.\n- Step 3: Sketch the sine wave to confirm the next solution ($$n=1$$ gives $$x = \\frac{17\\pi}{36}$$) is larger, so $$\\frac{5\\pi}{36}$$ is the smallest positive value.\n\nTakeaway: for \"smallest $$x$$\", take the principal solution and verify against the next general-solution value with a sketch.", "source": "Opus 4.8 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "Q4(b)(ii) — why is sketching a sine wave a useful confirmation step when finding the smallest solution?", "answer": "- Step 1: The general solution has infinitely many values ($$\\frac\\pi2 + 2n\\pi$$ inside), and it's easy to accidentally pick a larger one.\n- Step 2: A sketch shows where $$\\sin$$ first reaches 1 for positive argument, visually confirming the first (smallest) $$x$$.\n- Step 3: It guards against sign/ordering errors and gives a quick sanity check that $$n=0$$ is indeed smallest.\n\nTakeaway: a quick graph turns an abstract \"smallest solution\" claim into a visible, checkable fact.", "source": "Opus 4.8 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "Q5(a) — squirrel model $$N = \\frac{4000e^{0.1t}}{19 + e^{0.2t}}$$; find $$N$$ at the start. What substitution and what is the \"+1\" trap? (3 steps)", "answer": "- Step 1: \"At the start\" means $$t = 0$$: substitute to get $$N = \\frac{4000e^0}{19 + e^0}$$.\n- Step 2: The trap: $$e^0 = 1$$ (not 0), so the denominator is $$19 + 1 = 20$$, NOT 19. Harry: \"be careful not to lose the one.\"\n- Step 3: So $$N = \\frac{4000(1)}{20} = 200$$ squirrels.\n\nTakeaway: $$e^0 = 1$$ — always add that \"+1\" to the constant in the denominator.", "source": "Opus 4.8 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "Q5(b) — to differentiate $$N = \\frac{4000e^{0.1t}}{19+e^{0.2t}}$$, why does Harry insist on the quotient rule over rewriting as $$u v^{-1}$$ and using the product rule?", "answer": "- Step 1: The quotient rule $$\\frac{d}{dt}\\frac uv = \\frac{v\\frac{du}{dt} - u\\frac{dv}{dt}}{v^2}$$ is **in the formula book**, so you can read it off directly.\n- Step 2: Rewriting as $$u v^{-1}$$ and using the product rule multiplies the chance of sign and index errors for this shape.\n- Step 3: The quotient rule is safer and structurally matches a fraction — fewer moving parts.\n\nTakeaway: for a clean fraction, use the formula-book quotient rule; don't manufacture extra algebra.", "source": "Opus 4.8 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "Q5(b) — what is the single most common sign error in the quotient rule numerator, and how do you avoid it?", "answer": "- Step 1: The error is dropping the **minus sign**: writing $$v\\frac{du}{dt} + u\\frac{dv}{dt}$$ instead of $$v\\frac{du}{dt} - u\\frac{dv}{dt}$$.\n- Step 2: The numerator MUST be $$v u' - u v'$$ (in that order, with the minus).\n- Step 3: Fix: read the rule straight from the formula book each time rather than trusting memory.\n\nTakeaway: the quotient rule's minus sign is where marks are lost — copy it from the book.", "source": "Opus 4.8 ②", "_id": "opus_2_38", "judge_pick": true}, {"question": "Q5(b) — differentiating $$u = 4000e^{0.1t}$$ and $$v = 19 + e^{0.2t}$$, what does each derivative become and what index-law simplification appears in the product $$u'v$$ vs $$uv'$$? (3 steps)", "answer": "- Step 1: $$\\frac{du}{dt} = 4000 \\cdot 0.1 e^{0.1t} = 400e^{0.1t}$$ (the 0.1 comes down); $$\\frac{dv}{dt} = 0.2e^{0.2t}$$.\n- Step 2: In the numerator, $$u\\frac{dv}{dt}$$ produces $$e^{0.1t}\\cdot e^{0.2t} = e^{0.3t}$$ (add the exponents).\n- Step 3: This gives numerator $$= 7600e^{0.1t} - 400e^{0.3t}$$ over $$(19+e^{0.2t})^2$$.\n\nTakeaway: watch for $$e^{0.1t}\\cdot e^{0.2t} = e^{0.3t}$$ — adding exponents is where terms combine.", "source": "Opus 4.8 ②", "_id": "opus_2_39", "judge_pick": false}, {"question": "Q5(c) — \"maximum at $$t=T$$\" — what condition do you set, and why does only the numerator of $$\\frac{dN}{dt}$$ matter?", "answer": "- Step 1: At a maximum, $$\\frac{dN}{dt} = 0$$.\n- Step 2: A fraction equals zero only when its numerator is zero (the denominator $$(19+e^{0.2t})^2$$ can never be zero, being a square of a positive quantity).\n- Step 3: So set the numerator $$7600e^{0.1T} - 400e^{0.3T} = 0$$ and ignore the denominator.\n\nTakeaway: to solve \"$$\\frac{dN}{dt}=0$$\" for a quotient, set only the numerator to zero.", "source": "Opus 4.8 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "Q5(c) — from $$7600e^{0.1T} - 400e^{0.3T}=0$$, how do you factor out $$e^{0.1T}$$ and why can you reject the factor $$e^{0.1T}=0$$? (3 steps)", "answer": "- Step 1: Factor: $$e^{0.1T}(7600 - 400e^{0.2T}) = 0$$ (note $$e^{0.3T} = e^{0.1T}\\cdot e^{0.2T}$$).\n- Step 2: Reject $$e^{0.1T} = 0$$ because $$e^x > 0$$ for all real $$x$$ — an exponential is never zero. (Harry sketched $$y=e^x$$ to show this.)\n- Step 3: So the bracket must be zero: $$7600 - 400e^{0.2T} = 0$$.\n\nTakeaway: $$e^{\\text{anything}}$$ is always positive, so any factor $$e^{(\\ldots)}=0$$ is automatically discarded.", "source": "Opus 4.8 ②", "_id": "opus_2_41", "judge_pick": false}, {"question": "Q5(c) — after $$7600 - 400e^{0.2T}=0$$, how do you reach the \"show\" target $$e^{0.2T}=19$$, and where must you STOP?", "answer": "- Step 1: Rearrange: $$e^{0.2T} = \\frac{7600}{400} = 19$$, so $$A = 19$$.\n- Step 2: **Stop here.** The command word is \"show that $$e^{0.2T} = 19$$\" — you must not solve for $$T$$ in this part.\n- Step 3: Solving for $$T$$ (taking ln) belongs to part (d); doing it early wastes time and risks confusion.\n\nTakeaway: \"show that ...\" means reach exactly the stated line and stop — no further.", "source": "Opus 4.8 ②", "_id": "opus_2_42", "judge_pick": false}, {"question": "Q5(c) — a student initially wrote $$\\log$$ (base 10) rather than $$\\ln$$ when working with the exponential model. What is the rule for choosing the log base?", "answer": "- Step 1: The model uses base $$e$$ (via $$e^{0.2T}$$), so you must take the **natural log $$\\ln$$** to undo it.\n- Step 2: $$\\ln$$ is the inverse of $$e^x$$ (since $$\\ln e = 1$$), which cleanly cancels the exponential.\n- Step 3: Using $$\\log_{10}$$ would leave an extra $$\\ln 10 / \\log_{10}$$ conversion factor and is the wrong tool for a base-$$e$$ exponential.\n\nTakeaway: base-$$e$$ exponentials demand $$\\ln$$; base-10 exponentials demand $$\\log_{10}$$ — match the log to the base.", "source": "Opus 4.8 ②", "_id": "opus_2_43", "judge_pick": false}, {"question": "Q5(d) — to find the maximum $$N$$, you need $$T$$ from $$e^{0.2T}=19$$. Why must you keep $$T$$ unrounded (stored), and what's the rounding trap? (3 steps)", "answer": "- Step 1: $$0.2T = \\ln 19 \\Rightarrow T = \\frac{\\ln 19}{0.2} \\approx 14.72$$ — but store the full value, don't round.\n- Step 2: The trap: rounding $$T$$ before substituting back into $$N$$ propagates error into the final answer.\n- Step 3: Harry's rule: \"we only round at the very final answer... use the stored value.\"\n\nTakeaway: round exactly once, at the very end — feed the stored $$T$$ back into $$N$$.", "source": "Opus 4.8 ②", "_id": "opus_2_44", "judge_pick": false}, {"question": "Q5(d) — a slick shortcut: instead of substituting a numerical $$T$$, how can you use $$e^{0.2T}=19$$ directly to evaluate $$N$$? (3 steps)", "answer": "- Step 1: Note $$e^{0.1T} = (e^{0.2T})^{1/2} = \\sqrt{19}$$ — use the known value of $$e^{0.2T}$$.\n- Step 2: The denominator $$= 19 + e^{0.2T} = 19 + 19 = 38$$.\n- Step 3: So $$N = \\frac{4000\\sqrt{19}}{38} = 458.83\\ldots \\Rightarrow 459$$ squirrels.\n\nTakeaway: exploiting $$e^{0.1T} = \\sqrt{e^{0.2T}}$$ avoids any rounding of $$T$$ entirely — the cleanest exact route.", "source": "Opus 4.8 ②", "_id": "opus_2_45", "judge_pick": false}, {"question": "Q5(d) — there is a flagged conflict between the answers \"459\" and \"959\". Which is correct and why?", "answer": "- Step 1: The correct answer is **459**: the official model $$N = \\frac{4000e^{0.1t}}{19+e^{0.2t}}$$ gives $$\\frac{4000\\sqrt{19}}{38} = 458.83\\ldots \\to 459$$, and the spoken transcript confirms \"459 is fine.\"\n- Step 2: \"959\" came from an analysis segment that mis-copied the denominator as $$19 + e^{0.1t}$$ — a transcription error.\n- Step 3: The paper and transcript agree on 459, so that is authoritative.\n\nTakeaway: cross-check final answers against the official model; a mis-copied denominator produces a wildly wrong maximum.", "source": "Opus 4.8 ②", "_id": "opus_2_46", "judge_pick": false}, {"question": "Q5(d) asks for the maximum \"to the nearest whole number.\" Why is this \"little detail\" worth attention, and how do you handle $$458.83$$?", "answer": "- Step 1: The command explicitly requests nearest whole number, so leaving a decimal loses the accuracy mark.\n- Step 2: $$458.83\\ldots$$ rounds up to $$459$$ (since $$.83 > .5$$).\n- Step 3: Harry praised Phuc for now catching these details (nearest whole number, 3 s.f.) — they are easy marks lost by inattention.\n\nTakeaway: always obey the precision instruction in the command word; it's a free-but-fragile mark.", "source": "Opus 4.8 ②", "_id": "opus_2_47", "judge_pick": false}, {"question": "Q1 functions: $$f(x) = \\ln(x^2+3)$$ and $$g(x) = \\frac{3+5x}{x+2}$$. What are the standard sub-question types you should prioritise practising, even though this question was only \"discussed\"?", "answer": "- Step 1: Range of $$f$$ — analyse the output of $$\\ln(x^2+3)$$ given $$x^2+3 \\ge 3$$.\n- Step 2: Inverse $$g^{-1}$$ — swap and rearrange for $$x$$ in terms of $$y$$.\n- Step 3: Composite $$fg(0)$$ and finding an exact value $$a$$ under a composite condition — evaluate inner then outer.\n\nTakeaway: inverse-function and composite-function questions are standard opening marks — prioritise them in independent practice.", "source": "Opus 4.8 ②", "_id": "opus_2_48", "judge_pick": false}, {"question": "Why does the range of $$f(x)=\\ln(x^2+3)$$ start at $$\\ln 3$$ rather than $$-\\infty$$?", "answer": "- Step 1: The inside $$x^2 + 3$$ has a minimum of $$3$$ (when $$x=0$$), since $$x^2 \\ge 0$$.\n- Step 2: $$\\ln$$ is increasing, so its smallest output occurs at the smallest input: $$\\ln 3$$.\n- Step 3: As $$x \\to \\pm\\infty$$, $$x^2+3 \\to \\infty$$ so $$\\ln(\\ldots) \\to \\infty$$. Hence the range is $$f(x) \\ge \\ln 3$$.\n\nTakeaway: for composite ranges, find the range of the inner expression first, then push it through the outer function's behaviour.", "source": "Opus 4.8 ②", "_id": "opus_2_49", "judge_pick": true}, {"question": "Harry named formula recall as Phuc's \"main gap.\" What two-part fix did he prescribe for making formulae \"second nature\"?", "answer": "- Step 1: Learn the ESAT/geometry \"cheat sheet\" with **flashcards** — spaced repetition drills the sphere/cylinder/circle formulae and the $$a^{kx}$$ derivative.\n- Step 2: Build **fluency by volume** — do \"8 to 10 papers\" so the formulae and methods become automatic.\n- Step 3: The principle: recall gaps are cured by repeated retrieval (flashcards) plus repeated application (papers), not by re-reading.\n\nTakeaway: retrieval practice + high paper volume = formulae become reflexive.", "source": "Opus 4.8 ②", "_id": "opus_2_50", "judge_pick": false}, {"question": "Command-word discipline: what does \"show that...\" tell you about where to stop, using Q5(c) as the example?", "answer": "- Step 1: \"Show that $$e^{0.2T} = 19$$\" defines the exact endpoint of your working — you present reasoning that arrives at that line.\n- Step 2: Going further (solving for $$T$$) is unnecessary and risks introducing errors or wasting time.\n- Step 3: The subsequent part (d) is where solving for $$T$$ belongs — the paper structures it deliberately.\n\nTakeaway: read the command word for the finish line; \"show that X\" means produce X and stop.", "source": "Opus 4.8 ②", "_id": "opus_2_51", "judge_pick": false}, {"question": "What is Harry's exam-strategy advice about entering multiple modules for October, and the reasoning behind it?", "answer": "- Step 1: Reaching A* in *every* module for October is \"a real stretch\" if relying only on tutorials — independent study between sessions is essential.\n- Step 2: It may be safer to \"push some back\" and enter only the 3–4 modules you're most ready for.\n- Step 3: Rationale: entering unprepared risks low grades; a focused subset protects your overall profile.\n\nTakeaway: prioritise depth over breadth — enter only modules you can genuinely secure.", "source": "Opus 4.8 ②", "_id": "opus_2_52", "judge_pick": false}, {"question": "Distinguish the three derivative rules: $$\\frac{d}{dx}a^x$$, $$\\frac{d}{dx}a^{kx}$$, and $$\\frac{d}{dx}e^{kx}$$. Why does $$e^{kx}$$ look simpler?", "answer": "- Step 1: $$\\frac{d}{dx}a^x = a^x\\ln a$$; $$\\frac{d}{dx}a^{kx} = a^{kx}k\\ln a$$.\n- Step 2: For base $$e$$: $$\\ln e = 1$$, so $$\\frac{d}{dx}e^{kx} = e^{kx}\\cdot k\\ln e = k\\,e^{kx}$$ — the $$\\ln$$ factor vanishes.\n- Step 3: This is *why* $$e$$ is the \"natural\" base: it's the unique base whose exponential differentiates to a clean multiple of itself with no log factor.\n\nTakeaway: $$e^{kx}$$ is the special case of $$a^{kx}$$ where $$\\ln a = 1$$, killing the log term.", "source": "Opus 4.8 ②", "_id": "opus_2_53", "judge_pick": true}, {"question": "Why does \"surface area of a sphere = $$4\\pi R^2$$\" use a capital $$R$$ in the ESAT problem while cylinders use lowercase $$r$$?", "answer": "- Step 1: It is a labelling convention to distinguish the two different radii: the sphere's radius $$R$$ and each cylinder's radius $$r$$.\n- Step 2: This matters because the final answer relates them: $$R = r(10+\\sqrt{105})$$ — one radius expressed in terms of the other.\n- Step 3: Keeping symbols distinct prevents you from accidentally cancelling or equating the two radii.\n\nTakeaway: distinct symbols for distinct radii keep a two-solid comparison problem unambiguous.", "source": "Opus 4.8 ②", "_id": "opus_2_54", "judge_pick": false}, {"question": "In the ESAT problem, why is it valid to divide the whole equation $$4\\pi R^2 = 20\\pi r^2 + 80\\pi r R$$ by $$4\\pi$$?", "answer": "- Step 1: $$4\\pi$$ is a common non-zero factor of every term ($$4\\pi R^2$$, $$20\\pi r^2 = 4\\pi \\cdot 5r^2$$, $$80\\pi rR = 4\\pi\\cdot20rR$$).\n- Step 2: Dividing by a non-zero constant preserves the equation and clears the clutter of $$\\pi$$.\n- Step 3: Result: $$R^2 = 5r^2 + 20rR$$ — a much cleaner quadratic to rearrange.\n\nTakeaway: cancel the largest common numerical/constant factor early to simplify before solving.", "source": "Opus 4.8 ②", "_id": "opus_2_55", "judge_pick": false}, {"question": "Mini-drill: for a quotient model $$N = \\frac{4000e^{0.1t}}{19+e^{0.2t}}$$, what is the qualitative shape of $$N$$ against $$t$$ (rise then fall), and why does a maximum exist?", "answer": "- Step 1: At $$t=0$$, $$N=200$$; as $$t$$ grows, the numerator grows like $$e^{0.1t}$$ but the denominator eventually grows faster like $$e^{0.2t}$$.\n- Step 2: Early on the numerator dominates so $$N$$ rises; later the denominator ($$e^{0.2t}$$, faster growth) dominates
