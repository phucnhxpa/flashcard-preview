key takeaway: $$v^2$$ is what makes the dimensions work out. $$\\frac{dN}{dt}$$ has units of $$N/t$$. $$u$$ has units of $$N$$. $$v$$ has units of $$N$$. $$u \\cdot v'$$ has units of $$N \\cdot (N/t) = N^2/t$$. Dividing by $$v^2$$ ($$N^2$$) gives $$N/t$$. ✓", "source": "MiniMax M3 ①", "_id": "minimax_1_70", "judge_pick": true}, {"question": "In Q5(b), after applying the quotient rule, the numerator is $$7600e^{0.1t} - 400e^{0.3t}$$. What's the algebra that simplifies this to a factored form? (2 steps)", "answer": "- Step 1: Factor out the common term $$e^{0.1t}$$ (the smaller exponent, or any common factor):\n  $$7600e^{0.1t} - 400e^{0.3t} = e^{0.1t} \\cdot \\left[7600 - 400 \\cdot e^{0.3t - 0.1t}\\right] = e^{0.1t} \\cdot \\left[7600 - 400 e^{0.2t}\\right].$$\n- Step 2: Now the equation $$e^{0.1t} \\cdot \\left[7600 - 400 e^{0.2t}\\right] = 0$$ becomes a product of two factors. Since $$e^{0.1t} > 0$$ always, drop it: $$7600 - 400 e^{0.2t} = 0$$, giving $$e^{0.2t} = \\dfrac{7600}{400} = 19$$.\n+ The factoring is the key step. Factoring out $$e^{0.1t}$$ is the move that **exposes** the $$\\left[7600 - 400 e^{0.2t}\\right] = 0$$ condition. Without factoring, the equation looks uncrackable.", "source": "MiniMax M3 ①", "_id": "minimax_1_71", "judge_pick": false}, {"question": "Harry's diagnostic was that Phuc's \"main gap is formula recall\". But Phuc could DO the algebra (e.g., he could compute the quotient rule if reminded of the form). What's the deeper skill behind \"formula recall\", and how does it differ from \"knowing the formula\"? (2 steps)", "answer": "- Step 1: \"Knowing a formula\" means you can **recite** it when prompted. \"Formula recall\" means you can **select and apply** the right formula without prompting, in the context of a problem. The difference is recognition: a student who \"knows\" $$4\\pi R^2$$ but writes $$4\\pi R$$ doesn't have the formula loaded into their problem-solving routine.\n- Step 2: The deeper skill is **pattern recognition**: when you see \"sphere\", your brain should AUTOMATICALLY output \"$$4\\pi R^2$$\". This requires repeated exposure in context, not just rote memorisation. The flashcards + paper-drilling strategy is designed to build this automatic pattern matching.\n+ Meta-lesson: memorisation is necessary but not sufficient. The goal is to make the formula part of your problem-SOLVING vocabulary, not just your memory. This requires **context-rich practice**.", "source": "MiniMax M3 ①", "_id": "minimax_1_72", "judge_pick": false}], "count": 73}, "minimax_2": {"label": "MiniMax M3 ②", "cards": [{"question": "[ESAT warm-up, Phuc trap] Phuc wrote the area of a circle as $$\\pi r$$ instead of $$\\pi r^2$$. Why is this a critical error, and what is the correct formula Harry insisted on?", "answer": "- Step 1: Recall what \"area\" means dimensionally. Area has units of length squared (e.g., $$\\text{m}^2$$), so any area formula must contain a squared factor.\n- Step 2: The area of a circle comes from $$A = \\pi \\cdot r \\cdot r = \\pi r^2$$, because the radius is swept around the centre and the \"$$r \\cdot r$$\" appears twice in the construction (circumference × radius / 2).\n- Step 3: Harry's verbatim correction was: *\"Pi r squared. . . don't forget the square. Not just $$\\pi r$$, $$\\pi r^2$$.\"*\n- Step 4: A common trap is to confuse area ($$\\pi r^2$$) with circumference ($$2\\pi r$$) — both contain $$\\pi$$ and $$r$$, but only area is squared.\n\nTakeaway: any time you see \"area\" plus a circle, write $$\\pi r^2$$ first; if you write $$\\pi r$$, you've grabbed the wrong formula.", "source": "MiniMax M3 ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "[ESAT warm-up, sphere vs cylinder] Harry's first correction was that Phuc wrote the sphere surface area as $$4\\pi r$$ (no square). What is the correct formula, and what does it represent geometrically? (2 steps)", "answer": "- Step 1: The surface area of a sphere of radius $$R$$ is $$A = 4\\pi R^2$$. The $$R^2$$ is essential — Harry's correction was *\"don't forget the square\"*.\n- Step 2: Geometrically, $$4\\pi R^2$$ is the total area of the entire outside of the 3-D shape — every point on the sphere's surface is at distance $$R$$ from the centre, and integrating this over the sphere gives the $$4\\pi R^2$$ factor.\n+ It is NOT the volume (which is $$\\tfrac{4}{3}\\pi R^3$$) and NOT the circumference of an equator (which is $$2\\pi R$$).\n+ The capital $$R$$ is just a convention to distinguish the sphere's radius from the cylinder's radius $$r$$ when both appear in the same problem.\n\nTakeaway: $$4\\pi R^2$$ = total outside area; the square is non-negotiable.", "source": "MiniMax M3 ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "[ESAT warm-up, cylinder surface area] Phuc offered $$\\pi r^2 h$$ as the surface area of a closed cylinder. Why is this wrong, and what is the correct expression Harry derived on the board? (3 steps)", "answer": "- Step 1: $$\\pi r^2 h$$ is the **volume** of a cylinder (cross-section area $$\\pi r^2$$ times height $$h$$), not its surface area. Harry pointed this out: *\"that is the volume (prism: cross-section × height)\"*.\n- Step 2: A closed cylinder has three pieces of surface — two flat circular ends plus one curved side.\n+ Two ends: $$2 \\times \\pi r^2 = 2\\pi r^2$$.\n+ Curved side (unrolled into a rectangle): one side is the height $$h$$, the other is the circumference $$2\\pi r$$, so curved area $$= 2\\pi r \\cdot h = 2\\pi r h$$.\n- Step 3: Total surface area $$= 2\\pi r^2 + 2\\pi r h$$.\n\nTakeaway: any time you see \"closed cylinder\" surface area, write the two ends plus the curved side separately — never collapse them into one term.", "source": "MiniMax M3 ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "[ESAT warm-up, unrolled rectangle trick] Why is the curved side of a cylinder equal to $$2\\pi r h$$, and where does the factor $$2\\pi r$$ come from? (2 steps)", "answer": "- Step 1: Imagine slicing the cylinder vertically and unrolling the curved wall flat. It becomes a rectangle.\n+ One side of the rectangle is the cylinder's height $$h$$ (this side stays the same when you unroll).\n+ The other side is the distance around the circle — i.e., the circumference $$2\\pi r$$.\n- Step 2: Area of a rectangle = length × width, so curved area $$= (2\\pi r) \\times h = 2\\pi r h$$.\n+ Phuc's mistake was to say the unrolled length is the \"diameter\" $$2r$$ — Harry corrected this to the circumference $$2\\pi r$$.\n\nTakeaway: the curved side's long edge is the circumference, not the diameter — that single $$\\pi$$ is what makes cylinder surface area questions go wrong.", "source": "MiniMax M3 ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "[ESAT warm-up, missing-end trap] Phuc wrote $$4\\pi R^2 = 10\\pi r^2 + 2\\pi r h$$ for the sphere = 10 cylinders problem. Why is this missing one piece, and what is the corrected equation? (2 steps)", "answer": "- Step 1: A closed cylinder has **two** circular ends, so its surface area is $$2\\pi r^2 + 2\\pi r h$$, NOT $$\\pi r^2 + 2\\pi r h$$.\n- Step 2: With 10 such cylinders, the total cylinder surface area is $$10(2\\pi r^2 + 2\\pi r h) = 20\\pi r^2 + 20\\pi r h$$.\n+ Corrected word equation: $$4\\pi R^2 = 10(2\\pi r^2 + 2\\pi r h)$$.\n\nTakeaway: always count both ends of a closed cylinder — a missing $$2\\pi r^2$$ term is the single most common slip on this question type.", "source": "MiniMax M3 ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "[ESAT warm-up, word-to-equation] What's the very first thing you write down when an ESAT-style question says \"the surface area of a solid sphere of radius $$R$$ equals the total surface area of $$n$$ closed cylinders\"? (2 steps)", "answer": "- Step 1: Translate the English into a word equation first, before any algebra: **sphere SA = $$n$$ × (cylinder SA)**. This isolates the modelling step from the algebra.\n- Step 2: Then substitute the two formulae you know cold: $$4\\pi R^2 = n \\cdot (2\\pi r^2 + 2\\pi r h)$$.\n+ For the lesson's problem, $$n = 10$$ and $$h = 4R$$, giving $$4\\pi R^2 = 10(2\\pi r^2 + 2\\pi r \\cdot 4R)$$.\n\nTakeaway: write the word equation in plain English first — it forces you to ask \"is this the surface area or the volume?\" before any algebra locks in.", "source": "MiniMax M3 ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "[ESAT warm-up, why substitute $$h = 4R$$ before collecting terms?] In the sphere = 10 cylinders problem, why does Harry substitute $$h = 4R$$ immediately, before forming the quadratic in $$R$$? (2 steps)", "answer": "- Step 1: The question asks for $$R$$ in terms of $$r$$. If you leave $$h$$ in the equation, you have three unknowns ($$R, r, h$$) and one equation — unsolvable as stated.\n- Step 2: The given relation $$h = 4R$$ is the bridge that lets you eliminate $$h$$ and reduce the equation to two unknowns. After substitution, the only variables left are $$R$$ and $$r$$, which you can then collect into a quadratic in $$R$$.\n\nTakeaway: always substitute any given geometric relation as the very first algebraic step — it tells you which variable is \"the unknown\" and which is \"a parameter\".", "source": "MiniMax M3 ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "[ESAT warm-up, quadratic recognition] After substituting $$h = 4R$$ and simplifying, the equation becomes $$R^2 - 20rR - 5r^2 = 0$$. How do you recognise that this is a quadratic in $$R$$ (not in $$r$$)? (2 steps)", "answer": "- Step 1: Look at the powers of $$R$$ alone. The equation has $$R^2$$ (degree 2), $$R$$ (degree 1), and a constant term $$-5r^2$$ (degree 0 in $$R$$). That's the shape of a quadratic.\n- Step 2: Treat $$r$$ as a known constant (a parameter), and apply the quadratic formula with $$a = 1$$, $$b = -20r$$, $$c = -5r^2$$.\n+ The discriminant is $$(-20r)^2 - 4(1)(-5r^2) = 400r^2 + 20r^2 = 420r^2$$, which gives $$R = \\frac{20r \\pm \\sqrt{420}\\,r}{2}$$.\n\nTakeaway: when one variable is the \"answer\" and the other is a parameter, the parameter lives in the coefficients — the quadratic formula still works, just with letters.", "source": "MiniMax M3 ②", "_id": "minimax_2_7", "judge_pick": true}, {"question": "[ESAT warm-up, choosing the root] After applying the quadratic formula, you get $$R = r(10 \\pm \\sqrt{105})$$. Why must you take the **positive** root, and what would happen if you took the negative one? (2 steps)", "answer": "- Step 1: A radius is a length — by definition it must be positive. The negative root $$r(10 - \\sqrt{105}) \\approx r(10 - 10.25) \\approx -0.25r$$ is negative, which is physically impossible for a radius.\n- Step 2: Even in pure algebra, when the unknown represents a length or a count, the negative root is rejected. The convention is to take the root with the same sign as the linear coefficient (here $$+20r$$), giving $$R = r(10 + \\sqrt{105})$$.\n\nTakeaway: in any \"find a length/area/count\" question with two algebraic roots, the negative one is always rejected — pick the + sign.", "source": "MiniMax M3 ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "[Q2(a) IVT, the two-marks rule] Harry said *\"you must, must remember sign change and continuity. Otherwise you'll only score one mark.\"* Why does the IVT require BOTH conditions, and what does each contribute? (3 steps)", "answer": "- Step 1: The Intermediate Value Theorem has two hypotheses that must both be verified:\n+ **Sign change**: $$f(a)$$ and $$f(b)$$ have opposite signs, so the graph crosses the $$x$$-axis somewhere between $$a$$ and $$b$$.\n+ **Continuity**: $$f$$ is continuous on $$[a, b]$$ — the graph has no jumps or holes, so once it crosses zero it actually reaches zero.\n- Step 2: Without the continuity condition, a function with a sign change could still jump over zero (e.g., $$f(x) = \\text{sgn}(x)$$ has a sign change at 0 but is not continuous there, and has no root).\n- Step 3: Without the sign change, continuity alone is not enough — a continuous function can stay entirely above the axis (e.g., $$f(x) = x^2 + 1$$ on $$[-1, 1]$$).\n+ Mark-winning conclusion line: *\"by the sign change and continuity, $$f(x) = 0$$ has a root $$\\alpha \\in [1, 2]$$.\"*\n\nTakeaway: IVT = sign change **AND** continuity — write both explicitly, or you lose a mark.", "source": "MiniMax M3 ②", "_id": "minimax_2_9", "judge_pick": true}, {"question": "[Q2(a), evaluating the endpoints] For Q2(a), $$f(x) = \\frac{2x^2 + 3x - 4}{e^x} - \\frac{1}{x^2}$$ on $$[1, 2]$$. Why must you evaluate $$f(1)$$ and $$f(2)$$ at the **endpoints** themselves, not at \"values near\" them? (2 steps)", "answer": "- Step 1: The IVT requires a sign change **on the closed interval** $$[a, b]$$. The endpoints $$a$$ and $$b$$ are the only points guaranteed to be in the interval; \"values near\" them may fall outside.\n- Step 2: Substituting the actual endpoints gives definite numerical signs (one positive, one negative), which is the cleanest proof. The IVT then guarantees a root somewhere strictly between (or equal to) those endpoints.\n+ Harry's verbal cue: \"use the actual endpoints, not values 'near' them\".\n\nTakeaway: always evaluate the IVT at the literal endpoints of the given interval — never at nearby values.", "source": "MiniMax M3 ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "[Q2(a), continuity check] For Q2(a), why is continuity on $$[1, 2]$$ \"free\" — i.e., why don't you have to do any work to justify it? (2 steps)", "answer": "- Step 1: The function $$f(x) = \\frac{2x^2 + 3x - 4}{e^x} - \\frac{1}{x^2}$$ is built from polynomials ($$\\text{continuous everywhere}$$), exponentials ($$\\text{continuous everywhere}$$), and reciprocals (continuous except at zero).\n- Step 2: The only discontinuity would be at $$x = 0$$, but $$0 \\notin [1, 2]$$. On the interval $$[1, 2]$$, every piece is continuous, so $$f$$ is continuous there.\n+ For IVT marks, you still have to **state** \"$$f$$ is continuous on $$[1, 2]$$\" — but you don't have to prove it from scratch.\n\nTakeaway: continuity on a closed interval is usually obvious — but you must still **write the sentence** to earn the mark.", "source": "MiniMax M3 ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "[Q2(b), rearrangement strategy] When Q2(b) asks you to show $$f(x) = 0 \\iff x = \\sqrt[3]{\\frac{e^x + 4x^2}{2x + 3}}$$, what's the strategy Harry used — and why does \"look at the target\" work? (3 steps)", "answer": "- Step 1: Start from the easier side: set $$f(x) = 0$$ and rearrange. This is one direction of the $$\\iff$$.\n- Step 2: Read the **target form** for clues about what shape to aim for. The cube root on the RHS tells you the final move will be \"cube both sides\". The denominator $$2x + 3$$ tells you the left side should eventually contain a factor of $$(2x + 3)$$ to cancel.\n- Step 3: Work backwards from the target: aim to produce $$x^3(2x + 3) = e^x + 4x^2$$ on the left, then cube-root both sides to reach the target.\n+ Harry's verbal cue: *\"look at the target for clues\"*.\n\nTakeaway: in \"show that\" rearrangement questions, the target form is a roadmap — read the denominator and the outer function (cube root, square root, log) before you start manipulating.", "source": "MiniMax M3 ②", "_id": "minimax_2_12", "judge_pick": true}, {"question": "[Q2(b), cube-root trigger] In Q2(b), the target has a cube root on the RHS. What's the algebraic move that \"cube root\" forces you to make, and at what stage of the rearrangement do you do it? (2 steps)", "answer": "- Step 1: A cube root on the RHS means the LHS (before cube-rooting) must be a perfect cube in $$x$$. So your rearrangement must isolate $$x^3 = (\\text{something})$$ as the penultimate step.\n- Step 2: The cube-root move is the **last** step — only do it after everything else is in the form $$x^3 = \\text{expression}$$. Earlier cube-rooting would just create more nested radicals.\n\nTakeaway: cube root / square root / log on the RHS = the LAST step of the rearrangement, not the first.", "source": "MiniMax M3 ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "[Q2(b), factor recognition] In Q2(b), the target denominator is $$2x + 3$$. How does seeing this denominator tell you to factor the LHS as $$x^3(2x + 3)$$ before dividing? (2 steps)", "answer": "- Step 1: To get $$2x + 3$$ in the denominator of the cube-root target, you must divide by $$2x + 3$$ at some point. The only way that division is \"clean\" is if $$2x + 3$$ is already a factor of the LHS expression.\n- Step 2: So the rearrangement step is to factor the LHS as $$x^3(2x + 3) = (\\text{stuff})$$, then divide both sides by $$2x + 3$$ to leave $$x^3 = \\frac{(\\text{stuff})}{2x + 3}$$, then cube-root.\n+ Harry's verbal cue: *\"the $$2x + 3$$ in the denominator tells you to factor $$x^3(2x + 3)$$ out of the left side\"*.\n\nTakeaway: when a \"show that\" target has a denominator, work out what factor must be on the LHS so the division comes out clean.", "source": "MiniMax M3 ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "[Q2(c), iteration setup] Q2(c) was deferred, but the iteration formula is given: $$x_{n+1} = \\sqrt[3]{\\frac{e^{x_n} + 4x_n^2}{2x_n + 3}}$$ with $$x_1 = 1$$. What two calculator-mode traps does Harry warn about for any iteration like this? (2 steps)", "answer": "- Step 1: **Radians mode** — the iteration contains $$e^{x_n}$$, which is fine in any mode, but if you ever add trig terms you must be in radians. Set radians as the default before you start.\n- Step 2: **Don't round intermediate iterates** — store each $$x_n$$ in the calculator's Ans memory (or use the table mode) and only quote the final $$x_3$$ and $$\\alpha$$ to 4 d.p. at the end.\n+ The two most common slips on iteration questions are wrong calculator mode and premature rounding.\n\nTakeaway: iteration = radians + no intermediate rounding. Set both up before pressing \"=\".", "source": "MiniMax M3 ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "[Q3(a), reading the axes] Q3(a) gives a graph of $$\\log_{10} V$$ against $$t$$. Phuc tried to use $$V$$ (or $$y$$) as the vertical variable. What's the correct axis label, and why does this matter for the equation? (2 steps)", "answer": "- Step 1: \"log₁₀ V against t\" means the y-axis label is $$\\log_{10} V$$ and the x-axis label is $$t$$. The variable on the vertical axis is $$\\log_{10} V$$, NOT $$V$$.\n- Step 2: This matters because the equation of the line is $$\\log_{10} V = mt + c$$, not $$V = mt + c$$. Writing $$V$$ instead of $$\\log_{10} V$$ would give an equation that's off by a factor of $$10^{(\\cdot)}$$, and the subsequent exponentiation in part (b) would silently fail.\n+ Harry's verbal cue: *\"It's not $$V$$. Be careful.\"*\n\nTakeaway: when a question says \"log V against t\", the equation is in $$\\log V$$, not $$V$$ — re-read the axis label before writing the line equation.", "source": "MiniMax M3 ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "[Q3(a), slope-intercept from two points] Q3(a) gives the line through $$(0, 2)$$ and $$(5, 2.25)$$. What's the quick way to get the gradient $$m$$ and intercept $$c$$ without re-deriving the point-slope form? (2 steps)", "answer": "- Step 1: The point $$(0, 2)$$ is the y-intercept, so $$c = 2$$ immediately — no calculation needed.\n- Step 2: The gradient is rise over run: $$m = \\frac{2.25 - 2}{5 - 0} = \\frac{0.25}{5} = 0.05$$.\n+ Then $$\\log_{10} V = 0.05t + 2$$ is the line equation.\n\nTakeaway: any time a \"log-linear\" question gives a point on the y-axis, that point IS the intercept — don't waste a step computing it.", "source": "MiniMax M3 ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "[Q3(b), undoing the log] Q3(b) asks you to write $$\\log_{10} V = 0.05t + 2$$ as $$V = ab^t$$. What's the index-law move that takes you from the log form to the exponential form? (2 steps)", "answer": "- Step 1: Raise 10 to both sides: $$V = 10^{0.05t + 2}$$.\n- Step 2: Split the index using $$10^{p+q} = 10^p \\cdot 10^q$$:\n$$V = 10^{0.05t} \\cdot 10^2 = 100 \\cdot (10^{0.05})^t = 100 \\cdot (10^{0.05})^t$$.\n+ So $$a = 100$$ (exact) and $$b = 10^{0.05}$$ (exact, ≈ 1.12 to 3 s.f.).\n\nTakeaway: $$\\log_b x = y \\iff x = b^y$$. To undo a log, exponentiate with the same base; then split the index into the constant part ($$a$$) and the variable part ($$b^t$$).", "source": "MiniMax M3 ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "[Q3(b), exact base vs rounded base] Why does Harry insist you keep the exact base $$b = 10^{0.05}$$ for part (c), even though part (b) only requires $$b$$ to 3 s.f.? (2 steps)", "answer": "- Step 1: Part (c) requires you to differentiate $$V = 100 \\cdot b^t$$ and then solve an equation. Differentiating the rounded value $$b \\approx 1.12$$ introduces a small error that propagates through the algebra.\n- Step 2: Carrying the exact $$10^{0.05}$$ through differentiation gives an exact derivative; rounding only at the very final answer (when you quote $$T$$) keeps the result \"appropriately exact\".\n+ In this problem the rounded-base answer is also 13 (luck), but the marks are for the method, not the lucky coincidence.\n\nTakeaway: round only at the final answer; keep exact symbolic values through every intermediate step.", "source": "MiniMax M3 ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "[Q3(c), \"rate\" trigger] Q3(c) says \"the rate of increase is £50/yr\". What's the first formula you write down — and what sign do you use? (2 steps)", "answer": "- Step 1: \"Rate\" = derivative. The first line is $$\\frac{dV}{dt} = 50$$.\n- Step 2: The word \"increase\" forces the **positive** sign. If the question had said \"rate of decrease\", you would set $$\\frac{dV}{dt} = -50$$.\n+ Phuc's trap was to guess an \"arithmetic series\" — Harry corrected: *\"rate means differentiate\"*.\n\nTakeaway: \"rate of increase\" → $$\\frac{dV}{dt} = +\\text{(value)}$$; \"rate of decrease\" → $$-$$; \"rate of change\" → either, depending on context.", "source": "MiniMax M3 ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "[Q3(c), $$a^{kx}$$ differentiation rule] What's the rule for differentiating $$a^{kx}$$ where $$a$$ is a positive constant and $$k$$ is a constant multiplier on $$x$$? (2 steps)", "answer": "- Step 1: $$\\frac{d}{dx} a^x = a^x \\ln a$$ (this is the base rule from the formula book).\n- Step 2: Apply the chain rule: the inner derivative of $$kx$$ is $$k$$, so $$\\frac{d}{dx} a^{kx} = a^{kx} \\cdot k \\ln a$$.\n+ The factor is $$k \\ln a$$ — never $$\\ln(kx)$$, never $$a^{kx-1}$$.\n\nTakeaway: derivative of $$a^{kx}$$ is \"the original, times $$k$$ times $$\\ln a$$\" — the chain rule brings down the $$k$$.", "source": "MiniMax M3 ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "[Q3(c), the $$\\ln(kx)$$ trap] Phuc differentiated $$36^x$$ as $$36^x \\cdot \\ln(6x)$$. What's wrong with this, and what's the correct answer? (2 steps)", "answer": "- Step 1: $$36^x = (6^2)^x = 6^{2x}$$, so the rule gives $$\\frac{d}{dx} 6^{2x} = 6^{2x} \\cdot 2 \\ln 6 = 36^x \\cdot 2 \\ln 6 = 36^x \\cdot 12 \\ln 6$$.\n- Step 2: Phuc wrote $$\\ln(6x)$$ — that's nonsense; the rule never produces a logarithm of a polynomial. The chain rule brings down the exponent-multiplier $$k = 2$$, not a new logarithm.\n+ Correct: $$\\frac{d}{dx} 36^x = 36^x \\cdot 2 \\ln 6 = 12 \\ln 6 \\cdot 36^x$$.\n\nTakeaway: $$\\frac{d}{dx} a^{kx} = a^{kx} \\cdot k \\ln a$$, never $$a^{kx} \\cdot \\ln(kx)$$. The chain rule gives $$k$$, not a log.", "source": "MiniMax M3 ②", "_id": "minimax_2_22", "judge_pick": true}, {"question": "[Q3(c), warm-up drill mental model] Without doing the algebra, what are the derivatives of $$3^x, 36^x, 5^{2x}, 1.12^t$$? (2 steps)", "answer": "- Step 1: Apply $$\\frac{d}{dx} a^{kx} = a^{kx} \\cdot k \\ln a$$ mechanically:\n+ $$\\frac{d}{dx} 3^x = 3^x \\ln 3$$ (here $$k = 1$$).\n+ $$\\frac{d}{dx} 36^x = 36^x \\cdot 2 \\ln 6 = 12 \\ln 6 \\cdot 36^x$$.\n+ $$\\frac{d}{dx} 5^{2x} = 5^{2x} \\cdot 2 \\ln 5$$.\n- Step 2: For $$1.12^t$$, the variable is $$t$$, so $$\\frac{d}{dt} 1.12^t = 1.12^t \\ln(1.12)$$.\n+ The pattern: \"the original, times the exponent-multiplier, times $$\\ln(\\text{base})$$\".\n\nTakeaway: drill these until automatic — Harry set this as a starter for the next lesson. The shape is always \"original × multiplier × ln(base)\".", "source": "MiniMax M3 ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "[Q4(a), R-form setup] Q4(a) asks you to write $$\\sqrt{3}\\sin 2x - 3\\cos 2x$$ as $$R\\sin(2x - \\alpha)$$. What's the first formula you expand, and what does it give you? (2 steps)", "answer": "- Step 1: Expand the target using the compound-angle formula:\n$$R\\sin(2x - \\alpha) = R\\sin 2x \\cos\\alpha - R\\cos 2x \\sin\\alpha = (R\\cos\\alpha)\\sin 2x - (R\\sin\\alpha)\\cos 2x$$.\n- Step 2: Match coefficients with $$\\sqrt{3}\\sin 2x - 3\\cos 2x$$:\n+ $$R\\cos\\alpha = \\sqrt{3}$$\n+ $$R\\sin\\alpha = 3$$\n+ These two equations are the system you solve for $$R$$ and $$\\alpha$$.\n\nTakeaway: the compound-angle expansion is the bridge from \"$$R\\sin(2x - \\alpha)$$\" to \"two simultaneous equations in $$R\\cos\\alpha, R\\sin\\alpha$$\" — never try to guess $$R, \\alpha$$ by inspection.", "source": "MiniMax M3 ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "[Q4(a), square-and-add for exact $$R$$] After matching coefficients in Q4(a), why does Harry use square-and-add to find $$R$$ rather than substituting a decimal $$\\alpha$$? (3 steps)", "answer": "- Step 1: Square both equations and add:\n$$(R\\cos\\alpha)^2 + (R\\sin\\alpha)^2 = (\\sqrt{3})^2 + 3^2 \\Rightarrow R^2(\\cos^2\\alpha + \\sin^2\\alpha) = 3 + 9 = 12$$.\n- Step 2: Use $$\\cos^2\\alpha + \\sin^2\\alpha = 1$$ to get $$R^2 = 12$$, so $$R = \\sqrt{12} = 2\\sqrt{3}$$ exactly.\n- Step 3: If you instead substituted a decimal $$\\alpha$$ (rounded to a few d.p.), the resulting $$R$$ would inherit that rounding error — and the question demands an **exact** value.\n+ Harry's warning: *\"for an exact value question, do not substitute a rounded decimal for $$\\alpha$$ to get $$R$$ — your method could be quite dangerous.\"*\n\nTakeaway: square-and-add gives an exact $$R$$; decimal-$$ \\alpha $$ gives a contaminated $$R$$. Choose square-and-add whenever the question says \"exact\".", "source": "MiniMax M3 ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "[Q4(a), divide for exact $$\\tan\\alpha$$] After finding $$R$$ in Q4(a), how do you get $$\\alpha$$ exactly, and which inverse-trig button do you press? (2 steps)", "answer": "- Step 1: Divide the two matched-coefficient equations:\n$$\\tan\\alpha = \\frac{R\\sin\\alpha}{R\\cos\\alpha} = \\frac{3}{\\sqrt{3}} = \\sqrt{3}$$.\n- Step 2: The exact value is $$\\alpha = \\frac{\\pi}{3}$$ (since $$\\tan(\\pi/3) = \\sqrt{3}$$). On the calculator, use $$\\tan^{-1}$$ (NOT $$\\sin^{-1}$$) — the inverse-tangent button — in **radians** mode.\n+ The ratio gives $$\\tan\\alpha$$ exactly, so $$\\alpha$$ is one of the standard angles — no decimal needed.\n\nTakeaway: for exact $$\\alpha$$, divide the equations to get $$\\tan\\alpha$$, recognise the standard angle, and use $$\\tan^{-1}$$ in radians.", "source": "MiniMax M3 ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "[Q4(a), $$\\tan^{-1}$$ vs $$\\sin^{-1}$$ trap] Phuc used $$\\sin^{-1}$$ to find $$\\alpha$$ in Q4(a). Why is this wrong, and what should you use instead? (2 steps)", "answer": "- Step 1: $$\\alpha$$ comes from $$\\tan\\alpha = \\frac{\\sin\\alpha \\text{ coefficient}}{\\cos\\alpha \\text{ coefficient}}$$. The inverse function that recovers an angle from its tangent is $$\\tan^{-1}$$, not $$\\sin^{-1}$$.\n- Step 2: $$\\sin^{-1}$$ recovers an angle from its sine, which would give the wrong $$\\alpha$$ unless the equation happened to be in sine form.\n+ Calculator pitfall: make sure the calculator is in **radians**, not degrees, before pressing $$\\tan^{-1}$$.\n\nTakeaway: in $$R\\sin(x - \\alpha)$$ form, always use $$\\tan^{-1}$$ for $$\\alpha$$. Match the inverse function to the trig ratio that appears.", "source": "MiniMax M3 ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "[Q4(b)(i), minimise-by-maximise trick] Q4(b)(i) has $$g(x) = \\frac{18}{\\sqrt{3}\\sin 6x - \\frac{\\pi}{3} + 4\\sqrt{3}}$$. Why does the minimum of $$g$$ occur when the denominator is **maximised**, not minimised? (2 steps)", "answer": "- Step 1: $$g(x)$$ is a positive constant (18) divided by a positive expression. As the denominator grows, the fraction shrinks.\n- Step 2: To minimise the fraction, you maximise the denominator. The denominator is largest when the sine term hits its peak value, $$\\sin(6x - \\pi/3) = 1$$.\n+ Then the max denominator is $$\\sqrt{3}(1) + 4\\sqrt{3} = 5\\sqrt{3}$$... wait, recalculate: $$\\sqrt{3}(1) + 4\\sqrt{3} = 5\\sqrt{3}$$? Actually with the original form $$\\sqrt{3}\\sin 6x + (-\\pi/3) + 4\\sqrt{3}$$ — at sine = 1, denominator = $$\\sqrt{3}(1) + 4\\sqrt{3} = 5\\sqrt{3}$$... let me re-check: the original is $$2\\sqrt{3}\\sin(6x - \\pi/3) + 4\\sqrt{3}$$ — at sine = 1, denominator = $$2\\sqrt{3} + 4\\sqrt{3} = 6\\sqrt{3}$$, giving min $$g = 18/(6\\sqrt{3}) = \\sqrt{3}$$.\n\nTakeaway: minimise a positive fraction = maximise its positive denominator. Always check the sign of the numerator first.", "source": "MiniMax M3 ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "[Q4(b)(ii), smallest-x trick] After finding that $$\\sin(6x - \\pi/3) = 1$$ minimises $$g$$, how do you find the **smallest positive** $$x$$ that achieves this? (3 steps)", "answer": "- Step 1: Set the sine argument equal to the principal value: $$6x - \\pi/3 = \\pi/2$$ (since $$\\sin\\theta = 1 \\iff \\theta = \\pi/2 + 2n\\pi$$).\n- Step 2: Solve for $$x$$: $$6x = \\pi/2 + \\pi/3 = 3\\pi/6 + 2\\pi/6 = 5\\pi/6$$, so $$x = 5\\pi/36$$.\n- Step 3: To confirm this is the smallest positive $$x$$, take $$n = 0$$ in the general solution $$x = 5\\pi/36 + n\\pi/3$$. The next solution ($$n = 1$$) is $$5\\pi/36 + 12\\pi/36 = 17\\pi/36$$, which is larger.\n+ Harry sketched a sine wave to verify visually that the next peak is indeed further along.\n\nTakeaway: when \"smallest $$x$$\" is asked, take $$n = 0$$ in the general solution — and always check by sketching or by plugging in the next $$n$$.", "source": "MiniMax M3 ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "[Q5(a), $$e^0 = 1$$ trap] Phuc slipped on the \"+1\" in the denominator of $$N = \\frac{4000 e^{0.1t}}{19 + e^{0.2t}}$$ at $$t = 0$$. What's the trap, and what's the correct value? (2 steps)", "answer": "- Step 1: At $$t = 0$$, $$e^{0.1 \\cdot 0} = e^0 = 1$$ and $$e^{0.2 \\cdot 0} = e^0 = 1$$. So the denominator is $$19 + 1 = 20$$, NOT $$19 + 0 = 19$$.\n- Step 2: The numerator is $$4000 \\cdot 1 = 4000$$, so $$N = 4000 / 20 = 200$$.\n+ Harry's correction: *\"be careful not to lose the one: $$e^0 = 1$$.\"*\n\nTakeaway: $$e^0 = 1$$ always — any exponential with a zero exponent equals 1, including the ones hiding in denominators.", "source": "MiniMax M3 ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "[Q5(b), quotient rule minus sign] Phuc dropped the minus sign when applying the quotient rule to $$N = \\frac{u}{v}$$ with $$u = 4000 e^{0.1t}, v = 19 + e^{0.2t}$$. What's the correct formula, and where does the minus come from? (2 steps)", "answer": "- Step 1: The quotient rule from the formula book is:\n$$\\left(\\frac{u}{v}\\right)' = \\frac{v \\cdot u' - u \\cdot v'}{v^2}$$.\n+ The minus sign is between the two products in the numerator — it is NOT optional.\n- Step 2: For the squirrel model:\n$$u' = 400 e^{0.1t}$$ (the 0.1 comes down),\n$$v' = 0.2 e^{0.2t}$$ (the 0.2 comes down),\nso $$\\frac{dN}{dt} = \\frac{(19 + e^{0.2t})(400 e^{0.1t}) - (4000 e^{0.1t})(0.2 e^{0.2t})}{(19 + e^{0.2t})^2}$$.\n\nTakeaway: quotient rule numerator is \"$$v u' - u v'$$\" — write the minus sign explicitly every time, even if you think you can remember it.", "source": "MiniMax M3 ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "[Q5(b), why not product rule?] Why does Harry say \"the quotient rule is safer for this shape and is in the formula book\" rather than rewriting $$u/v$$ as $$u v^{-1}$$ and using the product rule? (2 steps)", "answer": "- Step 1: Rewriting $$u/v = u v^{-1}$$ requires differentiating $$v^{-1}$$, which gives $$-v^{-2} v'$$ — an extra minus sign that is easy to drop.\n- Step 2: The quotient rule keeps the structure \"$$u$$ over $$v$$\" intact and has the minus sign built in. Less algebra, fewer slip opportunities.\n+ Harry's rule of thumb: if the function is given as a fraction, use the quotient rule; only convert to product rule if the function is already in product form.\n\nTakeaway: when the function is presented as a fraction, the quotient rule is the safer default — the formula book version has the sign built in.", "source": "MiniMax M3 ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "[Q5(c), why factor out $$e^{0.1T}$$?] After setting the derivative numerator to zero, you get $$7600 e^{0.1T} - 400 e^{0.3T} = 0$$. Why factor out $$e^{0.1T}$$ rather than dividing both sides by it directly? (2 steps)", "answer": "- Step 1: $$e^{0.1T} > 0$$ for ALL real $$T$$ (the exponential is always positive). So you can divide by it without changing the equation — but factoring first makes the structure visible.\n- Step 2: Factoring gives $$e^{0.1T}(7600 - 400 e^{0.2T}) = 0$$. Since $$e^{0.1T} \\neq 0$$, the only way the product is zero is if $$7600 - 400 e^{0.2T} = 0$$, i.e., $$e^{0.2T} = 19$$.\n+ Harry sketched $$y = e^x$$ to show it's always positive — this justifies \"reject $$e^{0.1T} = 0$$\".\n\nTakeaway: when an exponential factor is \"stuck\" in a product set equal to zero, factor it out and reject it as a solution — then solve the remaining equation.", "source": "MiniMax M3 ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "[Q5(c), \"show that\" stop signal] Q5(c) says \"show that $$e^{0.2T} = A$$\". Why does Harry insist Phuc stop at $$A = 19$$ and not solve for $$T$$ here? (2 steps)", "answer": "- Step 1: The command word \"show that\" means \"demonstrate that the stated equation is true, by deriving it from what you've already shown\". The job ends when the stated equation appears.\n- Step 2: Part (d) is the part that asks for $$T$$ (and then the maximum number of squirrels). If you solve for $$T$$ in part (c), you steal marks from part (d) and may also lose the \"show that\" credit if your derivation looks rushed.\n+ Read the command word first: \"show that\" = stop at the shown line; \"find\" or \"calculate\" = solve fully.\n\nTakeaway: \"show that\" = derive the stated equation and stop. Solving further is wasted effort that risks losing marks.", "source": "MiniMax M3 ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "[Q5(d), round only at the end] Phuc rounded $$T$$ before substituting back into $$N$$. Harry corrected: *\"we only round at the very final answer. . . use the stored value.\"* Why does intermediate rounding contaminate the answer? (2 steps)", "answer": "- Step 1: $$T = \\ln 19 / 0.2 \\approx 14.724$$. If you round to $$T \\approx 15$$ and substitute back, you compute $$N$$ at a slightly wrong time, getting a slightly wrong maximum.\n- Step 2: Using the stored unrounded $$T$$ (or, equivalently, substituting $$e^{0.2T} = 19$$ symbolically) gives the exact maximum $$\\frac{4000\\sqrt{19}}{38} \\approx 458.83$$, which rounds to 459.\n+ Harry's rule: round only at the very last step, when you write the final boxed answer.\n\nTakeaway: store the unrounded value in calculator memory; round only when you write the final answer. Intermediate rounding silently corrupts everything downstream.", "source": "MiniMax M3 ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "[Q5(d), $$\\ln$$ vs $$\\log_{10}$$] After showing $$e^{0.2T} = 19$$, why use $$\\ln$$ (natural log) to solve for $$T$$, not $$\\log_{10}$$? (2 steps)", "answer": "- Step 1: The base of the exponent is $$e$$, so the inverse function is $$\\ln$$ (the natural log, base $$e$$). The identity $$\\ln(e^x) = x$$ requires the bases to match.\n- Step 2: Using $$\\log_{10}$$ would give $$0.2T = \\log_{10}(19)$$, which is wrong by a factor of $$\\ln 10$$.\n+ Phuc initially wrote \"log\" (base 10) — Harry corrected to $$\\ln$$ because the base is $$e$$.\n\nTakeaway: if the exponent base is $$e$$, take $$\\ln$$; if the exponent base is 10, take $$\\log_{10}$$. Match the log base to the exponent base.", "source": "MiniMax M3 ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "[Q5(d), algebraic shortcut at the substitution] After showing $$e^{0.2T} = 19$$, the substitution back into $$N$$ uses $$e^{0.1T} = \\sqrt{19}$$. Why is this shortcut valid, and what does it avoid? (2 steps)", "answer": "- Step 1: $$e^{0.1T} = (e^{0.2T})^{1/2} = \\sqrt{19}$$ — the half-exponent follows from the exponent laws.\n- Step 2: This avoids having to compute $$T = \\ln 19 / 0.2 \\approx 14.724$$, then $$e^{0.1 \\cdot 14.724}$$ numerically (which would require a stored unrounded $$T$$).\n+ With the shortcut: $$N = \\frac{4000 \\sqrt{19}}{19 + 19} = \\frac{4000\\sqrt{19}}{38} \\approx 458.83 \\Rightarrow 459$$.\n\nTakeaway: when an exponent appears at two different powers (here 0.1 and 0.2), use the exponent law to relate them — don't compute the time numerically if you don't have to.", "source": "MiniMax M3 ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "[Cross-cutting, continuity check for IVT] Before applying the IVT, what's the one-line continuity check you should always make? (1 step)", "answer": "- Step 1: Verify the function has no discontinuities (jumps, holes, vertical asymptotes) inside the closed interval $$[a, b]$$. For rational functions, check that no denominator is zero on $$[a, b]$$; for logs, check the argument is positive on $$[a, b]$$; for trig, continuity is automatic.\n+ If there's a discontinuity inside the interval, IVT does NOT apply — you must split the interval or use a different argument.\n\nTakeaway: continuity check = scan the interval for any \"illegal\" points (zero denominators, negative log arguments, etc.). If you find one, IVT fails on that interval.", "source": "MiniMax M3 ②", "_id": "minimax_2_38", "judge_pick": false}, {"question": "[Cross-cutting, calculator mode pitfall] For Q3, Q4, Q5, what calculator mode must be set, and what goes wrong if it's wrong? (2 steps)", "answer": "- Step 1: **Radians** mode is required for any calculation involving $$\\pi$$ in the answer (Q4's $$\\pi/3$$, Q5's $$\\ln 19 / 0.2$$ would be unaffected but the trig in Q4 would be wrong).\n- Step 2: If the calculator is in degrees, $$\\tan^{-1}(\\sqrt{3})$$ returns $$60°$$ instead of $$\\pi/3$$, contaminating the exact-value answer.\n+ Harry's rule: set radians as the default at the start of every paper; never trust the previous paper's mode.\n\nTakeaway: radians mode for any question with $$\\pi$$ in the answer. Set it once at the start; don't switch mid-paper.", "source": "MiniMax M3 ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "[Cross-cutting, formula book discipline] Harry repeatedly said \"read it from the formula book\" for the quotient rule and the $$a^{kx}$$ derivative. Why is this habit important, and what does it prevent? (2 steps)", "answer": "- Step 1: The formula book gives the exact statement, including the minus sign (quotient rule) and the factor $$k \\ln a$$ ($$a^{kx}$$ derivative). Reciting from memory is where signs and factors get dropped.\n- Step 2: Phuc's two biggest slips — dropping the minus sign in the quotient rule and writing $$\\ln(kx)$$ for the derivative — are both memory errors that a formula-book glance would prevent.\n+ Harry's rule: for any non-trivial formula (quotient rule, product rule, $$a^{kx}$$ derivative), glance at the formula book before writing it down.\n\nTakeaway: the formula book is a check against memory errors. Glance at it for any formula you haven't written five times today.", "source": "MiniMax M3 ②", "_id": "minimax_2_40", "judge_pick": false}, {"question": "[Cross-cutting, ESAT formula cheat sheet] Harry sent Phuc an ESAT \"cheat sheet\" of geometry formulae. What's on it, and why is \"learn these cold\" the right strategy? (2 steps)", "answer": "- Step 1: The cheat sheet contains the five core formulae:\n+ Circle area: $$\\pi r^2$$\n+ Circumference: $$2\\pi r$$\n+ Sphere surface area: $$4\\pi R^2$$\n+ Closed-cylinder surface area: $$2\\pi r^2 + 2\\pi r h$$\n+ Cylinder volume: $$\\pi r^2 h$$\n- Step 2: ESAT questions are timed and multiple-choice — there's no time to derive any of these from scratch. Recall must be automatic.\n+ Harry's prescription: flashcards + 8 to 10 papers of practice to make the formulae \"second nature\".\n\nTakeaway: ESAT geometry formulae are recall, not derivation. Memorise them cold before the exam.", "source": "MiniMax M3 ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "[Cross-cutting, \"8 to 10 papers\" strategy] Harry said fluency comes from volume — \"8 to 10 papers\" of practice. Why is paper volume the right metric for P3, not \"understand every line\"? (2 steps)", "answer": "- Step 1: P3 has a fixed set of question types (IVT, R-form, log-linearisation, quotient-rule optimisation, iteration). Each paper samples these types in similar proportions.\n- Step 2: After 8–10 papers, the question-type recognition becomes automatic — you see \"rate\" and write the derivative, you see \"R sin form\" and expand the compound angle. This frees working memory for the actual algebra.\n+ Harry's diagnosis: Phuc's main gap is formula recall, not conceptual understanding. Volume-of-practice fixes recall.\n\nTakeaway: P3 is a recognition + recall game. Paper volume builds the recognition; flashcards build the recall.", "source": "MiniMax M3 ②", "_id": "minimax_2_42", "judge_pick": false}, {"question": "[Cross-cutting, \"show that\" vs \"find\"] Harry emphasised reading the command word. What's the difference between \"show that\" and \"find\", and how does it change your working? (2 steps)", "answer": "- Step 1: **\"Show that\"** asks you to derive a stated equation from prior work. You write the derivation clearly, and you STOP at the stated equation — solving further is wasted effort and may lose marks.\n- Step 2: **\"Find\"** (or \"calculate\" or \"determine\") asks you to produce a numerical or algebraic answer. You must solve fully and quote the answer.\n+ Q5(c) is \"show that $$e^{0.2T} = 19$$\" — stop at $$A = 19$$. Q5(d) is \"find the maximum number of squirrels\" — solve for $$N$$ and round.\n\nTakeaway: read the command word first. \"Show that\" = derive and stop; \"find\" = solve and quote.", "source": "MiniMax M3 ②", "_id": "minimax_2_43", "judge_pick": true}, {"question": "[Cross-cutting, \"nearest whole number\" / \"3 s.f.\" precision] Harry praised Phuc for now picking up on \"little details\" like nearest whole number and 3 significant figures. Why do these matter, and what's the trap? (2 steps)", "answer": "- Step 1: The precision requested in the question determines how you round the final answer. \"Nearest whole number\" → round to integer; \"3 s.f.\" → 3 significant figures; \"exact\" → leave in surd/log form.\n- Step 2: The trap is rounding too early (Q5(d) trap — Phuc rounded $$T$$ before substituting) or rounding to the wrong precision (e.g., quoting 458.83 instead of 459 for \"nearest whole number\").\n+ Harry's habit: read the precision word in the question, then round only at the final answer.\n\nTakeaway: precision words (\"nearest whole number\", \"3 s.f.\", \"exact\") are part of the question. Match your final rounding to them.", "source": "MiniMax M3 ②", "_id": "minimax_2_44", "judge_pick": false}, {"question": "[Cross-cutting, evidence conflict — Q5 denominator] The revision guide flags a conflict: one analysis segment mis-copied the Q5 denominator as $$19 + e^{0.1t}$$ and the final answer as \"959\". What's the correct model and answer, and how do you tell which version is authoritative? (2 steps)", "answer": "- Step 1: The authoritative source is the official WMA13/01 paper (21 Oct 2025), which gives $$N = \\frac{4000 e^{0.1t}}{19 + e^{0.2t}}$$. The spoken transcript confirms the answer \"459 is fine\".\n- Step 2: When in doubt, the official paper overrides any analysis segment. The \"959\" / \"$$19 + e^{0.1t}$$\" version is a transcription error flagged in the revision guide, not a competing interpretation.\n+ Harry's evidence-based rule: trust the official paper and the spoken transcript; flag any analysis-segment contradictions as errors.\n\nTakeaway: when sources conflict, the official paper wins. Transcription errors are flagged, not adopted.", "source": "MiniMax M3 ②", "_id": "minimax_2_45", "judge_pick": false}, {"question": "[Cross-cutting, evidence conflict — Q4(a) coefficients] The revision guide flags a conflict: one segment recorded $$3\\sin 2x - 4\\cos 2x$$ (giving $$R = 5$$); the official paper has $$\\sqrt{3}\\sin 2x - 3\\cos 2x$$ (giving $$R = 2\\sqrt{3}$$). What's the authoritative version? (1 step)", "answer": "- Step 1: The official WMA13/01 paper gives $$\\sqrt{3}\\sin 2x - 3\\cos 2x$$, so $$R = 2\\sqrt{3}$$ and $$\\alpha = \\pi/3$$. The \"$$R = 5$$\" version is a transcription error in one analysis segment and is not used.\n+ Harry's rule: the paper is authoritative; analysis-segment slips are flagged but don't override.\n\nTakeaway: in any past-paper review, the paper text beats the analysis notes. Flag conflicts, don't average them.", "source": "MiniMax M3 ②", "_id": "minimax_2_46", "judge_pick": false}, {"question": "[Cross-cutting, status-safe paper review] Q1 (functions $$f, g$$) was \"discussed only\" — Phuc said he had done part (a) and chose to move on. What does \"discussed only\" mean for your revision, and what's the priority? (2 steps)", "answer": "- Step 1: \"Discussed only\" means the question appeared on screen but no worked solution was produced in the session. The student is expected to complete it independently.\n- Step 2: For P3, inverse-function and composite-function questions are standard opening marks (range of $$f$$, $$g^{-1}$$, $$fg(0)$$). Prioritise Q1 in independent practice because it's low-difficulty, high-mark-yield.\n+ Harry's framing: \"prioritise it in independent practice because inverse-function and composite-function questions are standard opening marks.\"\n\nTakeaway: \"discussed only\" items are revision priorities — they're standard question types with reliable marks, and you have no worked solution to fall back on.", "source": "MiniMax M3 ②", "_id": "minimax_2_47", "judge_pick": false}, {"question": "[Cross-cutting, deferred vs skipped] Q2(c) was \"deferred\" (explicitly left for later); Q2(b) was \"completed with prompting\" (transcript/ledger conflict). What does each status mean for your follow-up? (2 steps)", "answer": "- Step 1: **Deferred** = the question was named but explicitly not started. You must complete it from scratch in your own time (Q2(c) iteration: find $$x_3$$ and $$\\alpha$$ to 4 d.p.).\n- Step 2: **Completed with prompting** = the question was worked through with tutor hints, but the transcript and the video ledger disagree on whether it was fully reached. Re-do it closed-book to confirm you can do it unaided.\n+ Harry's prescription: Q2(c) is homework; Q2(b) is a self-test of \"can I do this without prompts?\".\n\nTakeaway: deferred = do from scratch; completed-with-prompting = re-do closed-book to confirm independence.", "source": "MiniMax M3 ②", "_id": "minimax_2_48", "judge_pick": false}, {"question": "[Cross-cutting, sign convention in \"rate of increase\"] The trap in Q3(c) was setting $$\\frac{dV}{dt} = -50$$ instead of $$+50$$. What's the rule for sign in \"rate of increase/decrease\" questions? (2 steps)", "answer": "- Step 1: \"Rate of **increase**\" = the quantity is going UP, so $$\\frac{d(\\text{quantity})}{dt} = +\\text{(value)}$$.\n- Step 2: \"Rate of **decrease**\" = the quantity is going DOWN, so $$\\frac{d(\\text{quantity})}{dt} = -\\text{(value)}$$.\n+ Phuc initially guessed \"arithmetic series\" — the trap is that \"rate\" sounds like a sequence term, but in calculus it always means a derivative.\n\nTakeaway: \"rate\" = derivative. The word \"increase\" forces +; \"decrease\" forces −. Match the sign to the direction.", "source": "MiniMax M3 ②", "_id": "minimax_2_49", "judge_pick": false}, {"question": "[Cross-cutting, Phuc's recurring gap] Harry's diagnosis was: \"formula recall is the main gap.\" What three formulae did Phuc slip on most, and what's the fix? (2 steps)", "answer": "- Step 1: The three recurring slips were:\n+ Sphere surface area (wrote $$4\\pi r$$, missing the square).\n+ Cylinder surface area (wrote $$\\pi r^2 h$$, which is the volume).\n+ The $$a^{kx}$$ derivative (wrote $$\\ln(kx)$$ instead of $$k \\ln a$$).\n- Step 2: The fix is flashcards + paper volume. The ESAT geometry cheat sheet covers the first two; the P3 formula book covers the third (with a glance-before-writing habit).\n+ Harry's prescription: \"learning formulae is something your flashcards could really help with\" — and 8 to 10 papers of practice to make them second nature.\n\nTakeaway: formula recall is built by flashcards (cold memorisation) + paper volume (automatic recall under time pressure). Both are needed.", "source": "MiniMax M3 ②", "_id": "minimax_2_50", "judge_pick": false}, {"question": "[Cross-cutting, exam-entry timing] Harry flagged that Phuc should find out the October exam-entry deadlines from his centre, and that entering all modules \"is going to be a real stretch\". What's the strategic point? (2 steps)", "answer": "- Step 1: Exam entries have hard deadlines; missing them means waiting for the next sitting. Harry needs the deadlines to build a \"sensible plan\" for which modules to enter.\n- Step 2: Strategically, it may be safer to enter only the 3–4 modules Phuc is most ready for (rather than all of them at A* standard), because low grades on rushed modules hurt more than deferred modules.\n+ Harry's framing: \"it may be safer to push some of these back\" — independent study between sessions is essential, not optional.\n\nTakeaway: exam entry is a strategic choice, not just an administrative one. Enter modules you're ready for; defer the rest.", "source": "MiniMax M3 ②", "_id": "minimax_2_51", "judge_pick": false}, {"question": "[Cross-cutting, \"little details\" Harry praised] Harry praised Phuc for now picking up on \"little details\" — nearest whole number, 3 s.f. — after the October paper. What's the meta-skill here, and how does it transfer? (2 steps)", "answer": "- Step 1: The meta-skill is **reading the question carefully** — including the precision words, the command words (\"show that\" vs \"find\"), and the rounding instructions.\n- Step 2: This transfers to every question: read the last line of the question before starting the algebra, and check your final answer matches the requested form.\n+ Harry's observation: this is a recent improvement for Phuc, and it's exactly the kind of detail that separates a B from an A*.\n\nTakeaway: read the question's last line (precision, command word, units) before starting the algebra. Match your final answer to the requested form.", "source": "MiniMax M3 ②", "_id": "minimax_2_52", "judge_pick": false}, {"question": "[Cross-cutting, sphere/cylinder physical interpretation] For the ESAT warm-up, why is the \"sphere = 10 cylinders\" question physically meaningful, and what does the answer $$R = r(10 + \\sqrt{105})$$ tell you about the size relationship? (2 steps)", "answer": "- Step 1: Physically, the question asks: how big does a single sphere have to be (in terms of cylinder radius $$r$$) so that its surface area equals 10 closed cylinders of height $$4R$$?\n- Step 2: The answer $$R \\approx r \\cdot 20.25$$, so the sphere's radius is about 20 times the cylinder's radius. This makes sense: 10 cylinders have 10 × (curved side + 2 ends) of area, which is a lot of surface for one sphere to match.\n+ The exact expression $$r(10 + \\sqrt{105})$$ comes from the quadratic formula with the positive root.\n\nTakeaway: the physical interpretation checks the algebra — if the answer said \"$$R \\approx r/20$$\", you'd know something went wrong.", "source": "MiniMax M3 ②", "_id": "minimax_2_53", "judge_pick": false}, {"question": "[Cross-cutting, sphere vs cylinder SA intuition] Why does a sphere have the LARGEST surface area for a given volume among all simple shapes, and why does this matter for the ESAT question? (2 steps)", "answer": "- Step 1: For a given volume, a sphere minimises surface area (isoperimetric inequality). Equivalently, for a given surface area, a sphere has the largest volume.\n- Step 2: In the ESAT question, the sphere's surface area equals 10 cylinders'. The sphere is \"efficient\" with its surface, so to match 10 cylinders' worth of area, the sphere has to be quite large ($$R \\approx 20r$$).\n+ This is why the answer has a factor of ~20, not ~1 — surface-area efficiency matters.\n\nTakeaway: spheres are surface-efficient. When a sphere's SA equals many cylinders' SA, the sphere must be large relative to each cylinder.", "source": "MiniMax M3 ②", "_id": "minimax_2_54", "judge_pick": true}, {"question": "[Cross-cutting, log-linearisation graph recognition] Q3 gives a graph of $$\\log_{10} V$$ vs $$t$$ as a straight line. What's the underlying model, and how do you recognise a \"log-linear\" question from the wording? (2 steps)", "answer": "- Step 1: The underlying model is exponential: $$V = ab^t$$. Taking $$\\log_{10}$$ of both sides gives $$\\log_{10} V = \\log_{10} a + t \\log_{10} b$$, which is linear in $$t$$ with slope $$\\log_{10} b$$ and intercept $$\\log_{10} a$$.\n- Step 2: Recognise a log-linear question from phrases like:\n+ \"A graph of $$\\log V$$ against $$t$$ is a straight line\"\n+ \"$$V$$ grows exponentially with $$t$$\"\n+ \"Find $$V$$ in the form $$ab^t$$ given the log-linear plot\"\n+ The trick is the \"log\" word — it forces you to exponentiate to recover $$V$$.\n\nTakeaway: \"log-linear graph\" = exponential model underneath. Exponentiate to recover $$V = ab^t$$.", "source": "MiniMax M3 ②", "_id": "minimax_2_55", "judge_pick": false}, {"question": "[Cross-cutting, R-form vs other trig forms] Q4(a) uses the $$R\\sin(x - \\alpha)$$ form. What other forms exist (e.g., $$R\\cos(x + \\alpha)$$), and how do you choose? (2 steps)", "answer": "- Step 1: The four standard forms are:\n+ $$R\\sin(x - \\alpha)$$\n+ $$R\\sin(x + \\alpha)$$\n+ $$R\\cos(x - \\alpha)$$\n+ $$R\\cos(x + \\alpha)$$\n- Step 2: The choice is determined by the sign pattern of the original expression:\n+ \"$$\\sin x$$ positive, $$\\cos x$$ negative\" → $$R\\sin(x - \\alpha)$$ (so the expansion gives $$-R\\sin\\alpha \\cos x$$).\n+ \"$$\\sin x$$ positive, $$\\cos x$$ positive\" → $$R\\sin(x + \\alpha)$$.\n+ \"$$\\cos x$$ positive, $$\\sin x$$ negative\" → $$R\\cos(x + \\alpha)$$.\n+ Q4(a) had \"$$\\sin 2x$$ positive ($$\\sqrt{3}$$), $$\\cos 2x$$ negative ($$-3$$)\" → $$R\\sin(2x - \\alpha)$$.\n\nTakeaway: the form follows the signs. Negative $$\\cos$$ coefficient + positive $$\\sin$$ coefficient → $$R\\sin(x - \\alpha)$$.", "source": "MiniMax M3 ②", "_id": "minimax_2_56", "judge_pick": true}, {"question": "[Cross-cutting, \"rate\" vs \"rate of change\"] What's the difference between \"rate\", \"rate of change\", and \"rate of increase\", and which is which in Q3(c)? (2 steps)", "answer": "- Step 1: All three phrases point to a derivative, but they differ in sign and direction:\n+ **\"Rate of change\"** = $$\\frac{dV}{dt}$$ (could be positive or negative; just the derivative).\n+ **\"Rate of increase\"** = $$\\frac{dV}{dt}$$ with the SIGN forced positive (the quantity is going up).\n+ **\"Rate\"** (alone) = usually $$\\frac{dV}{dt}$$, and the sign is determined by context.\n- Step 2: Q3(c) says \"rate of increase is £50/yr\", so $$\\frac{dV}{dt} = +50$$ (positive, because it's an increase).\n+ If it had said \"rate of decrease\", you'd set $$\\frac{dV}{dt} = -50$$.\n\nTakeaway: \"rate of increase\" = positive derivative; \"rate of decrease\" = negative derivative; \"rate of change\" = derivative (sign from context).", "source": "MiniMax M3 ②", "_id": "minimax_2_57", "judge_pick": false}, {"question": "[Cross-cutting, when to use IVT vs direct algebra] Q2(a) uses IVT to *show existence* of a root. Why can't you just solve $$f(x) = 0$$ algebraically here? (2 steps)", "answer": "- Step 1: $$f(x) = \\frac{2x^2 + 3x - 4}{e^x} - \\frac{1}{x^2}$$ has an $$e^x$$ in it, which makes algebraic solution (setting to zero and solving) essentially impossible in closed form.\n- Step 2: IVT is the right tool when:\n+ The equation has no closed-form solution (transcendental, like $$e^x$$).\n+ You only need to PROVE a root EXISTS in an interval, not find it exactly.\n+ Q2(c) then uses iteration to approximate the root numerically.\n\nTakeaway: IVT proves existence; iteration finds the root. Use IVT when the equation is transcendental and you only need \"is there a root?\".", "source": "MiniMax M3 ②", "_id": "minimax_2_58", "judge_pick": true}, {"question": "[Cross-cutting, iteration convergence intuition] Q2(c) iteration $$x_{n+1} = \\sqrt[3]{\\frac{e^{x_n} + 4x_n^2}{2x_n + 3}}$$ with $$x_1 = 1$$. Why does this iteration converge, and what's the rough size of the limit? (2 steps)", "answer": "- Step 1: The iteration converges because the function $$g(x) = \\sqrt[3]{\\frac{e^x + 4x^2}{2x + 3}}$$ has derivative magnitude less than 1 near the fixed point (a standard fixed-point iteration condition). The Q2(a) IVT guarantees a root in $$[1, 2]$$, and the iteration finds it.\n- Step 2: Rough size: starting from $$x_1 = 1$$, the iterates will approach the root $$\\alpha \\in [1, 2]$$. The exact value (computed numerically) is around $$1.2$$–$$1.3$$ to 4 d.p.\n+ The point isn't the exact value — it's that the iteration converges to a value inside the IVT interval.\n\nTakeaway: iteration converges to a fixed point inside the IVT interval. The fixed point is the root you proved exists in Q2(a).", "source": "MiniMax M3 ②", "_id": "minimax_2_59", "judge_pick": true}, {"question": "[Cross-cutting, \"exact value\" vs \"decimal\" precision] Q4(a) asks for \"exact values\" of $$R$$ and $$\\alpha$$. Why is a decimal answer wrong, and what's the only way to get an exact answer? (2 steps)", "answer": "- Step 1: \"Exact value\" means the answer must be in surd or standard-angle form (e.g., $$2\\sqrt{3}, \\pi/3$$). A decimal like $$R = 3.464$$ is an approximation, not an exact value, and loses marks.\n- Step 2: The only way to get exact values is algebraic:\n+ For $$R$$: square-and-add the matched coefficients (gives $$R^2 = 12$$ exactly).\n+ For $$\\alpha$$: divide to get $$\\tan\\alpha = \\sqrt{3}$$ exactly, recognise the standard angle $$\\pi/3$$.\n+ Harry's warning: *\"your method could be quite dangerous\"* if you substitute a decimal $$\\alpha$$ to get $$R$$.\n\nTakeaway: exact value = algebraic method (square-and-add, divide for $$\\tan$$). Decimals are approximations and lose marks on exact-value questions.", "source": "MiniMax M3 ②", "_id": "minimax_2_60", "judge_pick": false}, {"question": "[Cross-cutting, quotient rule vs product rule for $$u/v$$] When is the quotient rule clearly preferable to rewriting $$u/v = u v^{-1}$$ and using the product rule? (2 steps)", "answer": "- Step 1: The quotient rule is preferable when:\n+ The function is presented as a fraction (Q5: $$N = u/v$$).\n+ The denominator is non-constant (so the product rule would require differentiating $$v^{-1}$$).\n+ The formula book has the quotient rule on the formula page (so no memorisation needed).\n- Step 2: The product rule is preferable when:\n+ The function is already a product (e.g., $$y = x^2 \\sin x$$).\n+ Rewriting as a fraction would make it more complex (e.g., $$y = \\frac{\\sin x}{x}$$ is fine as a quotient, but $$y = x^2 \\sin x$$ is clearly a product).\n+ Harry's rule: stay with the form the function is given in.\n\nTakeaway: use the quotient rule for fractions, product rule for products. Don't rewrite one into the other unless it simplifies.", "source": "MiniMax M3 ②", "_id": "minimax_2_61", "judge_pick": false}, {"question": "[Cross-cutting, \"substitute stored value\" technique] In Q5(d), Harry said \"use the stored value\" of $$T$$. What does this mean in calculator practice, and why does it matter? (2 steps)", "answer": "- Step 1: On a scientific calculator, after computing $$T = \\ln 19 / 0.2$$, the unrounded value sits in the calculator's memory (Ans on most calculators). When you substitute $$T$$ into $$N = \\frac{4000 e^{0.1T}}{19 + e^{0.2T}}$$, you press \"Ans\" instead of typing the rounded $$T \\approx 14.724$$.\n- Step 2: This preserves the full precision of $$T$$ through the substitution. Typing the rounded value would lose 3–4 significant figures and could shift the final answer by 1 (here, 458.83 vs 458.5, which still rounds to 459, but in other questions it might not).\n+ Harry's rule: round only at the very final answer; use the stored value everywhere else.\n\nTakeaway: use the calculator's Ans (or stored variable) for intermediate substitutions. Round only when writing the final answer.", "source": "MiniMax M3 ②", "_id": "minimax_2_62", "judge_pick": false}, {"question": "[Cross-cutting, Q4(b)(i) rationalisation check] Q4(b)(i) gives min $$g = \\frac{18}{6\\sqrt{3}} = \\frac{3}{\\sqrt{3}}$$, which rationalises to $$\\sqrt{3}$$. What's the rationalisation step, and why is it needed? (2 steps)", "answer": "- Step 1: $$\\frac{3}{\\sqrt{3}} \\cdot \\frac{\\sqrt{3}}{\\sqrt{3}} = \\frac{3\\sqrt{3}}{3} = \\sqrt{3}$$. The rationalisation removes the surd from the denominator.\n- Step 2: Edexcel mark schemes typically require \"exact\" answers in surd form with no surds in the denominator. Leaving $$\\frac{3}{\\sqrt{3}}$$ would lose a mark for \"incorrect form\".\n+ The rationalisation is one line: multiply top and bottom by $$\\sqrt{3}$$.\n\nTakeaway: exact-value answers should have no surds in the denominator. Multiply by the surd to rationalise.", "source": "MiniMax M3 ②", "_id": "minimax_2_63", "judge_pick": false}, {"question": "[Cross-cutting, sphere SA derivation intuition] Why is the sphere surface area $$4\\pi R^2$$ and not something like $$2\\pi R^2$$? What's the geometric intuition? (2 steps)", "answer": "- Step 1: A sphere of radius $$R$$ has the same surface area as four great circles (each of area $$\\pi R^2$$). This is the \"Archimedes' hat-box\" theorem: the lateral surface area of a cylinder that just contains the sphere (radius $$R$$, height $$2R$$) equals $$2\\pi R \\cdot 2R = 4\\pi R^2$$, which is also the sphere's surface area.\n- Step 2: Alternatively, the sphere's surface area is the derivative of its volume with respect to $$R$$: $$\\frac{d}{dR}\\left(\\frac{4}{3}\\pi R^3\\right) = 4\\pi R^2$$. This is a general fact: $$\\frac{dV}{dR} = \\text{surface area}$$ for any solid of revolution.\n+ The $$4\\pi$$ factor (not $$2\\pi$$) is what makes the sphere special.\n\nTakeaway: sphere SA = $$4\\pi R^2$$ = derivative of sphere volume. The factor is 4, not 2, because the sphere wraps around twice relative to a flat circle.", "source": "MiniMax M3 ②", "_id": "minimax_2_64", "judge_pick": true}, {"question": "[Cross-cutting, IVT vs Rolle's theorem] Q2(a) uses IVT to prove a root exists. Why not use Rolle's theorem or the Mean Value Theorem instead? (2 steps)", "answer": "- Step 1: Rolle's theorem and the MVT require the function to be differentiable on the open interval and continuous on the closed interval — but they prove the existence of a point where $$f'(c) = 0$$, not where $$f(c) = 0$$.\n- Step 2: IVT is the right tool when you want to prove $$f(c) = 0$$ for some $$c$$. Rolle's theorem is for proving $$f'(c) = 0$$.\n+ Q2(a) asks for a root of $$f$$, so IVT is the natural choice.\n\nTakeaway: IVT proves $$f(c) = 0$$; Rolle/MVT prove $$f'(c) = 0$$. Match the theorem to what you're proving.", "source": "MiniMax M3 ②", "_id": "minimax_2_65", "judge_pick": true}, {"question": "[Cross-cutting, \"show that\" credit and the working] When a question says \"show that $$X = Y$$\", how much working do you need to show? (2 steps)", "answer": "- Step 1: You need to show every algebraic step from the given information to the stated equation. The examiner is checking that you can DERIVE the equation, not just verify it.\n- Step 2: Skipping steps (e.g., \"by inspection, $$e^{0.2T} = 19$$\") loses marks even if the final equation is correct. The working IS the credit.\n+ Harry's habit: write every step explicitly, even the obvious ones.\n\nTakeaway: \"show that\" = full working. Every algebraic step from given to stated equation is on the page.", "source": "MiniMax M3 ②", "_id": "minimax_2_66", "judge_pick": false}, {"question": "[Cross-cutting, the \"stop here\" rule for multi-part questions] Q5(c) asks to show $$e^{0.2T} = 19$$; Q5(d) asks for the maximum number of squirrels. Why solve them in order and stop at the right place? (2 steps)", "answer": "- Step 1: Q5(d) depends on Q5(c) — you need $$e^{0.2T} = 19$$ to substitute back into $$N$$. If you solve for $$T$$ in Q5(c), you steal the \"show that\" credit and may get Q5(d) wrong if your $$T$$ has a rounding error.\n- Step 2: The right workflow is: do Q5(c) and stop at $$e^{0.2T} = 19$$; then in Q5(d), take $$\\ln$$ of both sides to get $$T$$, substitute back (using the stored value), and round only the final answer.\n+ Harry's rule: read each part's command word, do exactly what's asked, and use the previous part's result in the next.\n\nTakeaway: respect the part boundaries. \"Show that\" stops at the shown line; \"find\" uses the previous result and rounds at the end.", "source": "MiniMax M3 ②", "_id": "minimax_2_67", "judge_pick": true}, {"question": "[Cross-cutting, the \"what does the question want?\" check] Before starting any P3 question, what's the one-sentence self-check you should do? (2 steps)", "answer": "- Step 1: Read the LAST line of the question. Identify:\n+ The command word (\"show that\", \"find\", \"calculate\", \"determine\").\n+ The precision (\"exact\", \"3 s.f.\", \"nearest whole number\").\n+ The variable being asked for.\n- Step 2: Match your working to all three:\n+ Command word → how much working to show.\n+ Precision → how to round the final answer.\n+ Variable → what to solve for.\n+ Harry's habit: this is the \"little details\" check that separates B from A*.\n\nTakeaway: read the last line first. Command word + precision + variable = what the question wants.", "source": "MiniMax M3 ②", "_id": "minimax_2_68", "judge_pick": false}, {"question": "[Cross-cutting, Phuc's IVT slip and the fix] Phuc \"knew the sign-change idea but stopped there\" on Q2(a), losing a mark for missing continuity. What's the one-sentence fix? (1 step)", "answer": "- Step 1: After writing the sign change, add the sentence: *\"Since $$f$$ is continuous on $$[1, 2]$$ (it has no discontinuities in this interval), by the Intermediate Value Theorem there exists $$\\alpha \\in [1, 2]$$ such that $$f(\\alpha) = 0$$.\"*\n+ The continuity sentence is the second mark; skipping it costs a full mark on a 2-mark question.\n\nTakeaway: IVT = sign change + continuity + conclusion. Write all three sentences, every time.", "source": "MiniMax M3 ②", "_id": "minimax_2_69", "judge_pick": false}, {"question": "[Cross-cutting, the \"factor out the exponential\" pattern] In Q5(c), the move $$7600 e^{0.1T} - 400 e^{0.3T} = 0 \\Rightarrow e^{0.1T}(7600 - 400 e^{0.2T}) = 0$$ uses a general pattern. What's the pattern, and when does it apply? (2 steps)", "answer": "- Step 1: When an equation has the form $$A e^{kx} - B e^{mx} = 0$$ with $$k \\neq m$$, factor out the exponential with the SMALLER exponent:\n$$e^{kx}(A - B e^{(m-k)x}) = 0$$.\n- Step 2: Since $$e^{kx} > 0$$ always, the equation reduces to $$A - B e^{(m-k)x} = 0$$, i.e., $$e^{(m-k)x} = A/B$$.\n+ This pattern appears in many optimisation problems (Q5 squirrels, logistic-style models, etc.). Recognising it saves a step.\n\nTakeaway: factor out the smaller-exponential term, reject it ($$e^{(\\cdot)} > 0$$), solve the remaining equation.", "source": "MiniMax M3 ②", "_id": "minimax_2_70", "judge_pick": true}, {"question": "[Cross-cutting, the \"log-linear\" three-step workflow] For a log-linear question (Q3 type), what's the three-step workflow from the graph to the final answer? (3 steps)", "answer": "- Step 1: **Read the graph** — extract the slope $$m$$ and intercept $$c$$ from two points (or read them directly if given).\n- Step 2: **Write the linear equation** — e.g., $$\\log_{10} V = 0.05t + 2$$. This is the \"log form\".\n- Step 3: **Exponentiate** — raise 10 to both sides, split the index, and write $$V = ab^t$$ with $$a = 10^c$$ and $$b = 10^m$$.\n+ Then differentiate $$V$$ with respect to $$t$$ using the $$a^{kx}$$ rule for \"rate\" sub-questions.\n\nTakeaway: log-linear = read slope/intercept → write log equation → exponentiate to recover $$V = ab^t$$. Three steps, always.", "source": "MiniMax M3 ②", "_id": "minimax_2_71", "judge_pick": true}, {"question": "[Cross-cutting, the \"differentiate $$e^{kx}$$\" rule] What's the derivative of $$e^{kx}$$, and how does it relate to the $$a^{kx}$$ rule? (2 steps)", "answer": "- Step 1: $$\\frac{d}{dx} e^{kx} = k e^{kx}$$ (the chain rule brings down the $$k$$, and the derivative of $$e^u$$ is $$e^u \\cdot u'$$).\n- Step 2: This is a special case of the $$a^{kx}$$ rule with $$a = e$$ and $$\\ln a = \\ln e = 1$$, so $$a^{kx} \\cdot k \\ln a = e^{kx} \\cdot k \\cdot 1 = k e^{kx}$$.\n+ The $$e^{kx}$$ rule is simpler because $$\\ln e = 1$$ — no log factor.\n\nTakeaway: $$\\frac{d}{dx} e^{kx} = k e^{kx}$$ (no log factor). This is the $$a^{kx}$$ rule with $$a = e$$.", "source": "MiniMax M3 ②", "_id": "minimax_2_72", "judge_pick": false}, {"question": "[Cross-cutting, why the cylinder unrolls into a rectangle] Geometrically, why does unrolling the curved side of a cylinder give a rectangle (and not some other shape)? (2 steps)", "answer": "- Step 1: The curved surface is generated by moving a line segment of length $$h$$ (parallel to the axis) along a circle of radius $$r$$. Each point on the line traces a circle, and the line itself stays parallel to the axis.\n- Step 2: When you \"unroll\" this surface (cut along a vertical line and lay flat), the parallel line segments remain straight and parallel, and the circular path becomes a straight line of length $$2\\pi r$$ (the circumference). The result is a rectangle with sides $$h$$ and $$2\\pi r$$.\n+ This is why the curved area is $$2\\pi r h$$ — it's literally the area of a rectangle.\n\nTakeaway: cylinder curved side = rectangle (sides $$h$$ and $$2\\pi r$$). The unrolling works because the generator line stays parallel to the axis.", "source": "MiniMax M3 ②", "_id": "minimax_2_73", "judge_pick": true}, {"question": "[Cross-cutting, the \"what's the unknown?\" check] For the ESAT sphere = cylinders problem, the question asks for $$R$$ in terms of $$r$$. What's the implication for the algebra? (2 steps)", "answer": "- Step 1: \"$$R$$ in terms of $$r$$\" means $$r$$ is a parameter (a known constant) and $$R$$ is the unknown. The final answer should have $$R$$ on one side and $$r$$ (and possibly numbers) on the other.\n- Step 2: This determines the variable you solve the quadratic for. With $$a = 1, b = -20r, c = -5r^2$$, the quadratic formula gives $$R = \\frac{20r \\pm \\sqrt{420}\\,r}{2} = r(10 \\pm \\sqrt{105})$$.\n+ The answer has $$R$$ isolated and $$r$$ as the parameter — exactly what the question asked.\n\nTakeaway: \"in terms of $$r$$\" = $$r$$ is a parameter, the unknown is the other variable. Solve for the unknown, leaving the parameter as a letter.", "source": "MiniMax M3 ②", "_id": "minimax_2_74", "judge_pick": false}, {"question": "[Cross-cutting, the \"factor the LHS\" pattern in \"show that\" rearrangements] Q2(b) factors the LHS as $$x^3(2x + 3) = e^x + 4x^2$$. What's the general pattern for \"show that\" rearrangements with a denominator on the RHS? (3 steps)", "answer": "- Step 1: Read the target form. Identify the denominator on the RHS (here $$2x + 3$$) and the outer function (here cube root).\n- Step 2: Work backwards: to get the denominator $$2x + 3$$, the LHS must have $$(2x + 3)$$ as a factor. So factor the LHS to expose this factor.\n- Step 3: Divide both sides by the factor, then apply the outer function (cube root) to both sides.\n+ The pattern: target form → required factor → factor the LHS → divide → apply outer function.\n\nTakeaway: \"show that\" with a denominator on the RHS = factor the LHS to expose that denominator, then divide, then apply the outer function last.", "source": "MiniMax M3 ②", "_id": "minimax_2_75", "judge_pick": false}, {"question": "[Cross-cutting, the \"what's the outer function?\" check] For Q2(b), the cube root on the RHS tells you the LAST step. What are the outer functions for other common \"show that\" targets? (2 steps)", "answer": "- Step 1: Match the outer function on the RHS to the LAST algebraic step:\n+ Cube root ($$\\sqrt[3]{\\cdot}$$) → cube both sides as the last step.\n+ Square root ($$\\sqrt{\\cdot}$$) → square both sides as the last step.\n+ $$\\log$$ → exponentiate as the last step.\n+ $$\\sin^{-1}, \\cos^{-1}, \\tan^{-1}$$ → take sine/cosine/tangent as the last step.\n- Step 2: The outer function tells you what the LHS should look like just before the last step:\n+ Cube root target → LHS should be a perfect cube.\n+ Square root target → LHS should be a perfect square (and non-negative).\n+ $$\\log$$ target → LHS should be a positive expression.\n\nTakeaway: read the outer function on the RHS of a \"show that\" target. It tells you the LAST step and the required shape of the LHS.", "source": "MiniMax M3 ②", "_id": "minimax_2_76", "judge_pick": true}, {"question": "[Cross-cutting, the \"why is the sphere SA $$4\\pi R^2$$ and not $$2\\pi R^2$$?\" intuition] A common student error is to think the sphere SA is \"twice the great circle area\" ($$2\\pi R^2$$). Why is it actually four times, not two? (2 steps)", "answer": "- Step 1: A sphere has TWO \"halves\" (top and bottom), each resembling a hemisphere. The SA of a hemisphere is $$2\\pi R^2$$ (half of $$4\\pi R^2$$, plus the equatorial disk for a closed hemisphere).\n- Step 2: A full sphere is two hemispheres joined at the equator. The equatorial disks cancel (they're internal, not surface), so the total is $$2 \\times 2\\pi R^2 = 4\\pi R^2$$.\n+ The \"twice the great circle\" intuition gives $$2\\pi R^2$$, which is HALF the actual sphere SA. The correct factor is 4, not 2.\n\nTakeaway: sphere SA = 4 × great-circle area, not 2 ×. The factor 4 comes from two hemispheres, each contributing $$2\\pi R^2$$.", "source": "MiniMax M3 ②", "_id": "minimax_2_77", "judge_pick": false}, {"question": "[Cross-cutting, the \"what if the question said 'rate of decrease'?\" counterfactual] Q3(c) says \"rate of increase\". If it had said \"rate of decrease\", what would change in the working? (2 steps)", "answer": "- Step 1: The derivative equation would be $$\\frac{dV}{dt} = -50$$ instead of $$+50$$. Everything else (the differentiation of $$V$$, the algebra, the final $$T$$) stays the same.\n- Step 2: The sign of the equation is the ONLY change. The method (differentiate, set equal to the rate, solve for $$T$$) is identical.\n+ The trap is missing the sign flip — \"decrease\" forces a negative derivative.\n\nTakeaway: \"rate of decrease\" = $$-50$$ in the derivative equation. The method is identical; only the sign changes.", "source": "MiniMax M3 ②", "_id": "minimax_2_78", "judge_pick": false}, {"question": "[Cross-cutting, the \"what if the model had $$e^{0.2t}$$ in the numerator?\" counterfactual] Q5 has $$e^{0.1t}$$ in the numerator and $$e^{0.2t}$$ in the denominator. If both were $$e^{0.2t}$$, what would change? (2 steps)", "answer": "- Step 1: The numerator and denominator would have the SAME exponential factor, and the quotient rule would simplify (the exponentials cancel in the derivative, leaving a rational function).\n- Step 2: The maximum would still be at $$\\frac{dN}{dt} = 0$$, but the algebra would be different — the \"factor out the exponential\" pattern wouldn't apply.\n+ The current model (different exponents in num and denom) is the more interesting case and the one that requires the factor-out trick.\n\nTakeaway: different exponents in num and denom = factor-out trick needed. Same exponents = simpler cancellation.", "source": "MiniMax M3 ②", "_id": "minimax_2_79", "judge_pick": true}, {"question": "[Cross-cutting, the \"what does 'second nature' mean for formulae?\"] Harry said the formulae should \"become second nature\". What does this look like in practice? (2 steps)", "answer": "- Step 1: \"Second nature\" means you can write the formula without thinking — like writing your own name. The test: can you write $$\\frac{d}{dx} a^{kx} = a^{kx} k \\ln a$$ in under 3 seconds, with the correct factor in the correct place?\n- Step 2: In practice, this is built by:\n+ Flashcards for cold memorisation (formula on one side, name on the other).\n+ Paper volume for automatic recall under time pressure (8–10 papers).\n+ A formula-book glance before writing any non-trivial formula.\n\nTakeaway: \"second nature\" = 3-second recall. Built by flashcards + paper volume + formula-book glances.", "source": "MiniMax M3 ②", "_id": "minimax_2_80", "judge_pick": false}, {"question": "[Cross-cutting, the \"evidence-based\" revision principle] The revision guide flags conflicts in the evidence pack (e.g., \"959\" vs \"459\", \"$$R = 5$$\" vs \"$$R = 2\\sqrt{3}$$\"). What's the principle for resolving these? (2 steps)", "answer": "- Step 1: The official paper is authoritative. Any analysis-segment transcription that contradicts the paper is flagged as an error, not adopted.\n- Step 2: The spoken transcript is the next-most-reliable source (it captures the tutor's verbal confirmation). Video-ledger notes are checked against the transcript; conflicts are flagged.\n+ The principle: trust the paper and the transcript; flag analysis errors; don't average conflicting sources.\n\nTakeaway: official paper > spoken transcript > analysis ledger. Flag conflicts; don't blend them.", "source": "MiniMax M3 ②", "_id": "minimax_2_81", "judge_pick": false}, {"question": "[Cross-cutting, the \"Phuc trap\" catalogue] Across the lesson, Phuc made several recurring errors. What's the catalogue, and what's the one-line fix for each? (2 steps)", "answer": "- Step 1: The catalogue:\n+ $$\\pi r$$ instead of $$\\pi r^2$$ (circle area) → write the square.\n+ $$4\\pi r$$ instead of $$4\\pi R^2$$ (sphere SA) → write the square on $$R$$.\n+ $$\\pi r^2 h$$ instead of $$2\\pi r^2 + 2\\pi r h$$ (cylinder SA) → two ends + curved side.\n+ $$\\ln(kx)$$ instead of $$k \\ln a$$ ($$a^{kx}$$ derivative) → chain rule brings $$k$$, not a log.\n+ Dropped minus sign in quotient rule → glance at formula book.\n+ Rounded $$T$$ before substituting → use stored value.\n- Step 2: The one-line fix for all of them: **write the formula from the formula book / cheat sheet, not from memory**. Memory is where the slips happen.\n\nTakeaway: every Phuc trap is a memory error. The fix is formula-book glances and flashcards, not \"try harder\".", "source": "MiniMax M3 ②", "_id": "minimax_2_82", "judge_pick": false}, {"question": "[Cross-cutting, the \"status-safe paper review\" workflow] The revision guide uses statuses like \"Solved\", \"Completed with prompting\", \"Discussed only\", \"Deferred\". What's the workflow for using these statuses in revision? (2 steps)", "answer": "- Step 1: For each \"Solved\" question, redo it closed-book to confirm you can re
