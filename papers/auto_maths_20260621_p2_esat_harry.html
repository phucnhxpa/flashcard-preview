<script>
const DATA={"selected": [{"question": "For the graph transformation $$y = f(x) + a$$, what geometric transformation is applied to the graph of $$y = f(x)$$, and why does the sign of $$a$$ work the way it does?", "answer": "- Step 1: The transformation is a vertical translation by the vector $$\\begin{pmatrix} 0 \\\\ a \\end{pmatrix}$$.\n- Step 2: If we add $$a$$ to the output of the function, every point $$(x, y)$$ on the original graph moves to $$(x, y + a)$$.\n+ If $$a > 0$$, the $$y$$-coordinate increases, so the graph shifts upward.\n+ If $$a < 0$$, the $$y$$-coordinate decreases, so the graph shifts downward.\n- Step 3: This makes intuitive sense because the $$y$$-axis represents the output value; directly modifying the output shifts the graph vertically in the direction of the sign.\n\nTakeaway: Adding a constant outside the function affects the $$y$$-values directly, resulting in a vertical shift.", "source": "GLM 5.1", "_id": "sel_0"}, {"question": "For the graph transformation $$y = f(x + a)$$, what geometric transformation is applied, and why is the horizontal shift seemingly \"backwards\" (opposite to the sign of $$a$$)? (2 steps)", "answer": "- Step 1: The transformation is a horizontal translation by the vector $$\\begin{pmatrix} -a \\\\ 0 \\end{pmatrix}$$.\n- Step 2: To understand the \"backwards\" sign, consider what input $$x$$ is required to get the same output as the original $$x=0$$. We need $$x + a = 0$$, which means $$x = -a$$.\n+ For example, in $$y = f(x + 2)$$, the point that used to be at $$x = 0$$ now occurs at $$x = -2$$. The entire graph has shifted left by 2.\nTakeaway: Transformations inside the function argument affect the input required to achieve a given output, shifting the graph in the opposite direction to compensate.", "source": "GLM 5.1", "_id": "sel_1"}, {"question": "For the graph transformation $$y = f(ax)$$, why is the horizontal stretch scale factor $$1/a$$ rather than $$a$$? (2 steps)", "answer": "- Step 1: A stretch scale factor describes how much the graph expands or compresses relative to the original. If $$a > 1$$, we are feeding inputs into the function faster, so the graph compresses horizontally.\n- Step 2: To find where the original point at $$x=1$$ has moved, set the argument equal to 1: $$ax = 1$$, giving $$x = 1/a$$.\n+ The point has moved from $$x=1$$ to $$x=1/a$$, meaning the graph has been stretched by a factor of $$1/a$$.\n+ For example, $$y = f(2x)$$ compresses the graph horizontally by a factor of $$1/2$$ (scale factor $$1/2$$).\nTakeaway: Inside transformations affect the input; multiplying $$x$$ by $$a$$ requires a smaller input to achieve the same output, hence the horizontal scale factor is $$1/a$$.", "source": "GLM 5.1", "_id": "sel_2"}, {"question": "What are the two reflection transformations for $$y = f(x)$$, and what do their equations tell you about which axis is involved? (2 steps)", "answer": "- Step 1: $$y = -f(x)$$ reflects the graph in the $$x$$-axis. The negative sign is applied to the output ($$y$$), so the $$y$$-values flip their sign while the $$x$$-values stay the same.\n- Step 2: $$y = f(-x)$$ reflects the graph in the $$y$$-axis. The negative sign is applied to the input ($$x$$), so the $$x$$-values flip their sign while the $$y$$-values stay the same.\nTakeaway: A negative sign outside the function flips vertically ($$x$$-axis reflection); a negative sign inside the function flips horizontally ($$y$$-axis reflection).", "source": "GLM 5.1", "_id": "sel_3"}, {"question": "When applying a sequence of transformations to a function, such as $$y = 2f(3x - 1) + 4$$, what is the correct order to apply them, and why? (3 steps)", "answer": "- Step 1: The correct order is to work from the \"inside out\". First apply the innermost transformation to the input, then the outer transformations to the output.\n- Step 2: For $$y = 2f(3x - 1) + 4$$, we peel off the layers:\n+ Start with $$f(x) \\rightarrow f(x - 1)$$: translate right by 1.\n+ Then $$f(x - 1) \\rightarrow f(3x - 1)$$: horizontal stretch by scale factor $$1/3$$.\n+ Then $$f(3x - 1) \\rightarrow 2f(3x - 1)$$: vertical stretch by scale factor 2.\n+ Finally $$2f(3x - 1) \\rightarrow 2f(3x - 1) + 4$$: translate up by 4.\n- Step 3: This order matters because composite transformations are nested functions. Changing the order of operations (e.g., stretching before translating vs translating before stretching) yields different results, just like in algebra where $$2(x+3) \\neq 2x + 3$$.\nTakeaway: Always apply transformations layer by layer, starting from the argument of $$f$$ and moving outwards to the final $$+$$ or $$\\times$$ operations.", "source": "GLM 5.1", "_id": "sel_4"}, {"question": "If a sequence of transformations is applied to $$y = f(x)$$ to get $$y = g(x)$$, how do you find the inverse transformation that maps $$y = g(x)$$ back to $$y = f(x)$$? (2 steps)", "answer": "- Step 1: Find the inverse by reversing the order of the sequence AND reversing each individual operation.\n- Step 2: For example, if the original sequence was \"translate right by 2, then vertical stretch by 3\", the inverse is \"vertical shrink by $$1/3$$, then translate left by 2\".\n+ Reversing operations: translation by $$\\begin{pmatrix} 2 \\\\ 0 \\end{pmatrix}$$ becomes $$\\begin{pmatrix} -2 \\\\ 0 \\end{pmatrix}$$; stretch factor 3 becomes $$1/3$$.\n+ Reversing order: you undo the last thing you did first.\nTakeaway: Undoing a sequence is like taking off shoes and socks: you put socks on first, then shoes; you must take shoes off first, then socks.", "source": "GLM 5.1", "_id": "sel_5"}, {"question": "Why does $$f(2x + 3)$$ represent a different transformation sequence than $$f(2(x + 3))$$, and how do you correctly factorise $$f(2x + 3)$$ to find the translation? (2 steps)", "answer": "- Step 1: The order of operations matters. In $$f(2x + 3)$$, the input is multiplied by 2 first, then 3 is added. In $$f(2(x + 3))$$, 3 is added first, then multiplied by 2.\n- Step 2: To find the horizontal translation for $$f(2x + 3)$$, you must factorise the coefficient of $$x$$: $$f(2x + 3) = f(2(x + 3/2))$$.\n+ This shows the sequence is: translate left by $$3/2$$, then horizontal stretch by $$1/2$$.\n+ If you mistakenly thought it was $$f(2(x+3))$$, you would think the translation is by 3, which is incorrect because it violates the order of operations.\nTakeaway: Always factorise the coefficient of $$x$$ inside the function argument to correctly identify the horizontal translation and preserve the proper sequence.", "source": "GLM 5.1", "_id": "sel_6"}, {"question": "Given $$y = f(x)$$ has a maximum at $$(2, 5)$$, what are the new coordinates of this maximum after the transformation $$y = 2f(x - 1) + 3$$? (2 steps)", "answer": "- Step 1: The transformation $$y = 2f(x - 1) + 3$$ involves a horizontal translation right by 1, a vertical stretch by factor 2, and a vertical translation up by 3.\n- Step 2: Apply these to the point $$(2, 5)$$:\n+ Horizontal translation right by 1: $$x$$-coordinate becomes $$2 + 1 = 3$$.\n+ Vertical stretch by factor 2: $$y$$-coordinate becomes $$5 \\times 2 = 10$$.\n+ Vertical translation up by 3: $$y$$-coordinate becomes $$10 + 3 = 13$$.\n+ The new maximum is at $$(3, 13)$$.\nTakeaway: Apply transformations to coordinates by directly adjusting $$x$$ (for horizontal changes) and $$y$$ (for vertical changes) in the order they occur.", "source": "GLM 5.1", "_id": "sel_7"}, {"question": "What transformation maps the graph of $$y = f(3x)$$ back to the graph of $$y = f(x)$$? (2 steps)", "answer": "- Step 1: The transformation $$y = f(3x)$$ is a horizontal stretch by scale factor $$1/3$$. To map it back to $$y = f(x)$$, we need to undo this stretch.\n- Step 2: The inverse of a horizontal stretch by $$1/3$$ is a horizontal stretch by scale factor 3.\n+ Algebraically, if we replace $$x$$ with $$3x$$ in $$y = f(3x)$$, we get $$y = f(3(\\frac{x}{3})) = f(x)$$. Replacing $$x$$ with $$x/3$$ (which is equivalent to a stretch by factor 3) restores the original function.\nTakeaway: To undo a horizontal stretch by factor $$1/a$$, apply a horizontal stretch by factor $$a$$.", "source": "GLM 5.1", "_id": "sel_8"}, {"question": "Intuitively, what does the conditional probability $$P(A \\mid B)$$ represent, and how does it differ from $$P(A \\cap B)$$? (2 steps)", "answer": "- Step 1: $$P(A \\mid B)$$ is the probability of event $$A$$ occurring, given that event $$B$$ has already occurred. It restricts our sample space only to the outcomes where $$B$$ happens.\n- Step 2: $$P(A \\cap B)$$ is the probability that both $$A$$ and $$B$$ happen out of the entire original sample space. $$P(A \\mid B)$$ takes the probability of both happening and divides it by the probability of the new restricted sample space $$B$$, giving $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$.\nTakeaway: $$P(A \\cap B)$$ is a fraction of the whole universe; $$P(A \\mid B)$$ is a fraction of the restricted universe $$B$$.", "source": "GLM 5.1", "_id": "sel_9"}, {"question": "What does it mean for two events $$A$$ and $$B$$ to be independent, and how does this simplify the formula for $$P(A \\cap B)$$? (2 steps)", "answer": "- Step 1: Events $$A$$ and $$B$$ are independent if the occurrence of one does not affect the probability of the other. This means $$P(A \\mid B) = P(A)$$.\n- Step 2: Substituting this into the conditional probability formula $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$, we get $$P(A) = \\frac{P(A \\cap B)}{P(B)}$$.\n+ Rearranging gives $$P(A \\cap B) = P(A) \\times P(B)$$.\nTakeaway: The multiplication rule $$P(A \\cap B) = P(A)P(B)$$ is a *consequence* of independence, not a definition to be used blindly on all events.", "source": "GLM 5.1", "_id": "sel_10"}, {"question": "Why is it a critical error to use $$P(A \\cap B) = P(A) \\times P(B)$$ for events that are not independent? What is the correct formula for $$P(A \\cap B)$$ in general? (2 steps)", "answer": "- Step 1: $$P(A) \\times P(B)$$ assumes that the probability of $$A$$ is the same whether $$B$$ happens or not (independence). If $$A$$ and $$B$$ are dependent (e.g., drawing cards without replacement), the occurrence of $$B$$ changes the probability of $$A$$.\n- Step 2: The correct general formula is derived from the conditional probability definition: $$P(A \\cap B) = P(A \\mid B) \\times P(B)$$. This accounts for the fact that $$A$$'s probability might change once $$B$$ is known.\nTakeaway: Only multiply probabilities for \"AND\" events if you have explicitly verified or assumed independence; otherwise, use the conditional probability formula.", "source": "GLM 5.1", "_id": "sel_11"}, {"question": "When using a tree diagram to calculate probabilities, what are the rules for combining probabilities along branches and across endpoints? (2 steps)", "answer": "- Step 1: Multiply along branches for \"AND\" events. If you follow a path to a specific endpoint, multiply the probabilities on the branches to find the probability of that entire sequence happening.\n- Step 2: Add across endpoints for \"OR\" events. If an event can happen in multiple ways (multiple paths), add the probabilities of those distinct endpoints together.\nTakeaway: Multiply for \"AND\" (along paths), add for \"OR\" (across paths).", "source": "GLM 5.1", "_id": "sel_12"}, {"question": "Bag A has 1 red and 1 blue ball. Bag B has 2 red balls. You flip a coin: Heads means pick from Bag A, Tails from Bag B. What is the probability of drawing a red ball, and how does this use tree diagram rules? (3 steps)", "answer": "- Step 1: The paths to drawing a red ball are: (Heads AND Red from A) OR (Tails AND Red from B).\n- Step 2: Calculate each path by multiplying along branches:\n+ P(Heads) = $$1/2$$. P(Red | A) = $$1/2$$. So P(Heads and Red) = $$1/2 \\times 1/2 = 1/4$$.\n+ P(Tails) = $$1/2$$. P(Red | B) = $$1$$. So P(Tails and Red) = $$1/2 \\times 1 = 1/2$$.\n- Step 3: Add the probabilities of the two paths (add across endpoints): $$1/4 + 1/2 = 3/4$$.\nTakeaway: This exercise demonstrates multiplying along branches for joint probabilities and adding across endpoints for total probability.", "source": "GLM 5.1", "_id": "sel_13"}, {"question": "In the trapezium rule formula $$\\int_a^b y \\, dx \\approx \\frac{h}{2} [y_0 + 2(y_1 + \\dots + y_{n-1}) + y_n]$$, what is the intuitive meaning of the $$y$$ terms and why are the middle terms multiplied by 2? (2 steps)", "answer": "- Step 1: The $$y$$ terms ($$y_0, y_1, \\dots, y_n$$) are the heights of the vertical lines at each strip boundary. Each trapezium is formed by two adjacent heights.\n- Step 2: The middle heights ($$y_1$$ to $$y_{n-1}$$) are shared by two adjacent trapeziums: the right edge of one trapezium and the left edge of the next. Since the area of each trapezium is calculated separately and summed, these middle heights are counted twice, hence the factor of 2. The first ($$y_0$$) and last ($$y_n$$) heights are only part of one trapezium each.\nTakeaway: The factor of 2 comes from the overlapping edges of adjacent trapeziums when their areas are summed.", "source": "GLM 5.1", "_id": "sel_14"}, {"question": "In the trapezium rule, what is the critical difference between the number of strips ($$n$$) and the number of $$y$$-values, and why does this often cause errors? (2 steps)", "answer": "- Step 1: If you have $$n$$ strips, you divide the interval into $$n$$ sections, which requires $$n+1$$ boundaries (points). These boundaries correspond to the $$y$$-values: $$y_0, y_1, \\dots, y_n$$.\n- Step 2: The common error is confusing the number of $$y$$-values with the number of strips. For example, if a question gives you 5 $$y$$-values, you only have 4 strips (like 4 fence panels requiring 5 fence posts). Always use the number of *strips* $$n$$ in the formula $$h = \\frac{b-a}{n}$$.\nTakeaway: Number of $$y$$-values = Number of strips + 1. Strips are the gaps, $$y$$-values are the boundaries.", "source": "GLM 5.1", "_id": "sel_15"}, {"question": "If you are asked to estimate an integral using 1 strip (the minimum possible for the trapezium rule), how many $$y$$-values do you need, and what does the formula look like? (2 steps)", "answer": "- Step 1: With $$n = 1$$ strip, you have $$n + 1 = 2$$ $$y$$-values: $$y_0$$ and $$y_1$$.\n- Step 2: The formula becomes $$\\frac{h}{2}[y_0 + 2(y_1 + \\dots + y_{n-1}) + y_n] = \\frac{h}{2}[y_0 + y_1]$$, since there are no \"middle\" terms to double.\n+ This is simply the area of a single trapezium: $$\\frac{1}{2} \\times \\text{width} \\times (\\text{left height} + \\text{right height})$$, where width is the strip width $$h$$.\nTakeaway: The edge case of $$n=1$$ reduces the trapezium rule back to the simple area of a single trapezium.", "source": "GLM 5.1", "_id": "sel_16"}, {"question": "If you estimate $$\\int_0^4 \\sqrt{x} \\, dx$$ using 4 strips, what is the value of $$h$$ (strip width) and how many $$y$$-values do you calculate? (2 steps)", "answer": "- Step 1: The strip width $$h$$ is calculated using $$h = \\frac{b - a}{n}$$. Here, $$a = 0, b = 4, n = 4$$.\n+ $$h = \\frac{4 - 0}{4} = 1$$.\n- Step 2: The number of $$y$$-values is $$n + 1 = 4 + 1 = 5$$.\n+ The $$x$$-values for these $$y$$-values would be $$0, 1, 2, 3, 4$$.\nTakeaway: Always calculate $$h$$ using strips $$n$$, and remember you need one more $$y$$-value than the number of strips.", "source": "GLM 5.1", "_id": "sel_17"}, {"question": "When proving a cubic has exactly one real root by factorising it into a linear and quadratic factor, what condition on the quadratic factor guarantees exactly one real root for the cubic? (2 steps)", "answer": "- Step 1: Factorise the cubic as $$f(x) = (ax + b)(cx^2 + dx + e)$$. The linear factor $$(ax + b)$$ always gives exactly one real root at $$x = -b/a$$.\n- Step 2: The quadratic factor $$(cx^2 + dx + e)$$ will have real roots only if its discriminant $$\\Delta = d^2 - 4ce$$ is greater than or equal to 0.\n+ If $$\\Delta < 0$$, the quadratic has no real roots. Since the linear factor gives one root and the quadratic gives none, the cubic has exactly one real root total.\nTakeaway: A cubic has exactly one real root if it can be split into a linear factor (1 root) and a quadratic factor with a negative discriminant (0 real roots).", "source": "GLM 5.1", "_id": "sel_18"}, {"question": "If a cubic function cannot be easily factorised, how can you use calculus to prove it has exactly one real root? (3 steps)", "answer": "- Step 1: Differentiate the cubic function to find $$f'(x)$$.\n- Step 2: Determine the sign of $$f'(x)$$ for all real $$x$$.\n+ If $$f'(x) > 0$$ for all $$x$$, the function is strictly increasing.\n+ If $$f'(x) < 0$$ for all $$x$$, the function is strictly decreasing.\n- Step 3: A strictly monotonic (always increasing or always decreasing) continuous function will cross the $$x$$-axis exactly once. Since a cubic approaches $$-\\infty$$ on one side and $$+\\infty$$ on the other (or vice versa), it must cross the axis, and because it never turns around, it can only cross it once.\nTakeaway: If the derivative never changes sign, the cubic has no turning points and therefore cannot cross the axis more than once.", "source": "GLM 5.1", "_id": "sel_19"}, {"question": "Why does a strictly increasing function ($$f'(x) > 0$$ for all $$x$$) guarantee exactly one real root, rather than zero roots? (2 steps)", "answer": "- Step 1: A strictly increasing function always goes upwards as $$x$$ increases. For a cubic, as $$x \\rightarrow -\\infty$$, $$f(x) \\rightarrow -\\infty$$, and as $$x \\rightarrow +\\infty$$, $$f(x) \\rightarrow +\\infty$$.\n- Step 2: Because the function starts at negative infinity and ends at positive infinity, it must cross the $$y=0$$ line at least once (by the Intermediate Value Theorem). Since it is strictly increasing, it can never come back down to cross it again.\nTakeaway: The end behavior of a cubic combined with a lack of turning points guarantees exactly one intersection with the $$x$$-axis.", "source": "GLM 5.1", "_id": "sel_20"}, {"question": "If you find that $$f'(x) = 0$$ for some value of $$x$$ in a cubic, does this mean the cubic must have multiple distinct real roots? (2 steps)", "answer": "- Step 1: No, $$f'(x) = 0$$ only indicates a stationary point (a local maximum, minimum, or point of inflection).\n- Step 2: A cubic can have a stationary point and still only cross the $$x$$-axis once. For example, if both the local max and local min are above the $$x$$-axis, the cubic only crosses once from below to above (or vice versa if both are below).\n+ A stationary point only guarantees multiple roots if the function crosses the axis, turns around, and crosses again.\nTakeaway: A turning point means the graph \"flattens,\" but it doesn't force the graph to cross the axis multiple times.", "source": "GLM 5.1", "_id": "sel_21"}, {"question": "Prove that $$f(x) = x^3 + 3x - 5$$ has exactly one real root using calculus. (3 steps)", "answer": "- Step 1: Find the derivative: $$f'(x) = 3x^2 + 3$$.\n- Step 2: Analyze the sign of $$f'(x)$$. Since $$x^2 \\ge 0$$ for all real $$x$$, $$3x^2 \\ge 0$$. Thus, $$f'(x) = 3x^2 + 3 \\ge 3 > 0$$ for all $$x$$.\n- Step 3: Since $$f'(x) > 0$$ for all $$x$$, the function is strictly increasing. As a cubic, it goes from $$-\\infty$$ to $$+\\infty$$, so it must cross the $$x$$-axis exactly once. Therefore, it has exactly one real root.\nTakeaway: Showing the derivative is always positive (or always negative) proves the function is monotonic, which restricts the number of real roots to exactly one.", "source": "GLM 5.1", "_id": "sel_22"}, {"question": "What are the general solution sets for $$\\sin \\theta = \\sin \\alpha$$ and $$\\tan \\theta = \\tan \\alpha$$, and why do they differ? (2 steps)", "answer": "- Step 1: For $$\\sin \\theta = \\sin \\alpha$$, the solutions are $$\\theta = \\alpha$$ and $$\\theta = 180^\\circ - \\alpha$$ (or $$\\pi - \\alpha$$). This is because sine has a line of symmetry at $$\\theta = 90^\\circ$$, so angles equidistant from $$90^\\circ$$ have the same sine.\n- Step 2: For $$\\tan \\theta = \\tan \\alpha$$, the solutions are $$\\theta = \\alpha + 180^\\circ k$$ (or $$\\alpha + \\pi k$$). Tangent has a period of $$180^\\circ$$ ($$\\pi$$), so it repeats exactly every $$180^\\circ$$, unlike sine which requires a reflection to find the second solution in a $$360^\\circ$$ cycle.\nTakeaway: Sine requires a reflection ($$180^\\circ - \\alpha$$); tangent just requires adding the period ($$180^\\circ$$).", "source": "GLM 5.1", "_id": "sel_23"}, {"question": "For the equation $$\\cos \\theta = \\cos \\alpha$$, what are the two solutions within a $$360^\\circ$$ cycle, and what symmetry property of cosine generates the second solution? (2 steps)", "answer": "- Step 1: The two solutions are $$\\theta = \\alpha$$ and $$\\theta = 360^\\circ - \\alpha$$.\n- Step 2: Cosine is an even function, meaning it has a line of symmetry along the $$y$$-axis. This means $$\\cos(\\theta) = \\cos(-\\theta)$$. Since angles are typically kept positive, $$-\\alpha$$ is equivalent to $$360^\\circ - \\alpha$$.\n+ Visually, on the unit circle, the angle $$\\alpha$$ and the angle $$360^\\circ - \\alpha$$ have the same horizontal ($$x$$) coordinate, which represents cosine.\nTakeaway: The second cosine solution comes from the even symmetry of the cosine wave (or the horizontal symmetry of the unit circle).", "source": "GLM 5.1", "_id": "sel_24"}, {"question": "Why is it incorrect to simply add $$180^\\circ$$ to find the second solution for $$\\cos \\theta = \\cos \\alpha$$, like we do for $$\\tan \\theta$$? (2 steps)", "answer": "- Step 1: Adding $$180^\\circ$$ to an angle reflects it through the origin on the unit circle. This flips both the $$x$$ and $$y$$ coordinates, changing the sign of both cosine and sine.\n- Step 2: Cosine only stays the same if we reflect across the $$x$$-axis (which changes $$y$$ to $$-y$$ but keeps $$x$$ the same). This corresponds to $$360^\\circ - \\alpha$$, not $$\\alpha + 180^\\circ$$.\n+ For example, $$\\cos(60^\\circ) = 0.5$$, but $$\\cos(60^\\circ + 180^\\circ) = \\cos(240^\\circ) = -0.5$$.\nTakeaway: $$\\cos(\\theta)$$ and $$\\cos(\\theta + 180^\\circ)$$ have opposite signs; the correct second solution is $$360^\\circ - \\theta$$.", "source": "GLM 5.1", "_id": "sel_25"}, {"question": "If solving $$\\cos \\theta = 1$$ for $$0 \\le \\theta < 360^\\circ$$, how many distinct solutions are there, and why doesn't the formula $$\\theta = 360^\\circ - \\alpha$$ give a second distinct solution? (2 steps)", "answer": "- Step 1: There is exactly one solution: $$\\theta = 0^\\circ$$.\n- Step 2: Using the formula, the second solution would be $$\\theta = 360^\\circ - 0^\\circ = 360^\\circ$$. However, the range is $$0 \\le \\theta < 360^\\circ$$, so $$360^\\circ$$ is excluded (it's the same position as $$0^\\circ$$ on the circle).\n+ This happens because at the maximum and minimum points of the cosine wave, the two \"symmetrical\" branches touch at exactly the same point.\nTakeaway: At $$\\theta = 0^\\circ$$ or $$180^\\circ$$, the two cosine solutions merge into one, so be careful with your range boundaries.", "source": "GLM 5.1", "_id": "sel_26"}, {"question": "Solve $$\\cos 2\\theta = 0.5$$ for $$0 \\le \\theta < 360^\\circ$$. How does the substitution $$u = 2\\theta$$ help ensure you don't miss solutions? (3 steps)", "answer": "- Step 1: Let $$u = 2\\theta$$. Since $$0 \\le \\theta < 360^\\circ$$, the new range for $$u$$ is $$0 \\le u < 720^\\circ$$. We must look for solutions in this wider range because $$2\\theta$$ covers two full cycles.\n- Step 2: Find the solutions for $$\\cos u = 0.5$$ in $$0 \\le u < 720^\\circ$$.\n+ Principal solution: $$u = 60^\\circ$$.\n+ Second solution in first cycle: $$u = 360^\\circ - 60^\\circ = 300^\\circ$$.\n+ Third solution (second cycle): $$u = 360^\\circ + 60^\\circ = 420^\\circ$$.\n+ Fourth solution (second cycle): $$u = 360^\\circ + 300^\\circ = 660^\\circ$$.\n- Step 3: Convert back to $$\\theta$$ by dividing by 2: $$\\theta = 30^\\circ, 150^\\circ, 210^\\circ, 330^\\circ$$.\nTakeaway: Always expand the range when dealing with $$n\\theta$$. For $$\\cos n\\theta$$, you need $$2n$$ solutions in the expanded range to find all solutions in the original range.", "source": "GLM 5.1", "_id": "sel_27"}, {"question": "When verifying an algebraic identity by substituting a simple value like $$x = 0$$, what does a successful check prove, and what are its limitations? (2 steps)", "answer": "- Step 1: A successful check (e.g., both sides equal 5 when $$x=0$$) proves that the identity *could* be correct, and it definitely rules out a sign error or constant term error affecting that specific value.\n- Step 2: However, it does not prove the identity is true for all $$x$$. The two sides could just happen to agree at $$x=0$$ but differ at $$x=1$$.\n+ For example, $$2x + 3$$ and $$x^2 - x + 3$$ both equal 3 when $$x=0$$, but are not identical expressions.\nTakeaway: Substitution is a quick sanity check to catch obvious errors, not a rigorous proof. It confirms possibility, not certainty.", "source": "GLM 5.1", "_id": "sel_28"}, {"question": "When comparing coefficients to prove an identity, why must you set up equations for *every* power of $$x$$, and what happens if you skip one? (2 steps)", "answer": "- Step 1: Two polynomials are identical if and only if the coefficients of corresponding powers of $$x$$ are identical on both sides. Setting up equations for each power (e.g., $$x^3, x^2, x^1, x^0$$) systematically verifies this condition.\n- Step 2: If you skip a power, you leave a \"gap\" in your proof. The coefficients for the powers you checked might match, but the skipped power might have different coefficients, making the identity false.\n+ For example, $$3x^2 + 2x + 1$$ and $$5x^3 + 3x^2 + 2x + 1$$ match for $$x^2, x^1, x^0$$, but fail for $$x^3$$.\nTakeaway: Comparing coefficients is exhaustive; you must check every term to ensure no hidden discrepancies exist.", "source": "GLM 5.1", "_id": "sel_29"}, {"question": "In a timed multiple-choice exam like the ESAT, why is it often better to use estimation or elimination rather than exact calculation? (2 steps)", "answer": "- Step 1: The ESAT allows approximately 2 minutes per question. Exact calculations, especially with complex fractions or large numbers, consume valuable time and increase the risk of arithmetic errors.\n- Step 2: Estimation allows you to quickly gauge the order of magnitude or the sign of the answer, often eliminating 2-3 options instantly. If only one option is positive and your estimation shows the answer must be positive, you don't need to calculate the exact value.\nTakeaway: Use conceptual understanding and number sense to eliminate wrong answers; only calculate exactly if estimation doesn't yield a single clear choice.", "source": "GLM 5.1", "_id": "sel_30"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "For the graph transformation $$y = f(x) + a$$, what geometric transformation is applied to the graph of $$y = f(x)$$, and why does the sign of $$a$$ work the way it does?", "answer": "- Step 1: The transformation is a vertical translation by the vector $$\\begin{pmatrix} 0 \\\\ a \\end{pmatrix}$$.\n- Step 2: If we add $$a$$ to the output of the function, every point $$(x, y)$$ on the original graph moves to $$(x, y + a)$$.\n+ If $$a > 0$$, the $$y$$-coordinate increases, so the graph shifts upward.\n+ If $$a < 0$$, the $$y$$-coordinate decreases, so the graph shifts downward.\n- Step 3: This makes intuitive sense because the $$y$$-axis represents the output value; directly modifying the output shifts the graph vertically in the direction of the sign.\n\nTakeaway: Adding a constant outside the function affects the $$y$$-values directly, resulting in a vertical shift.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": true}, {"question": "For the graph transformation $$y = f(x + a)$$, what geometric transformation is applied, and why is the horizontal shift seemingly \"backwards\" (opposite to the sign of $$a$$)? (2 steps)", "answer": "- Step 1: The transformation is a horizontal translation by the vector $$\\begin{pmatrix} -a \\\\ 0 \\end{pmatrix}$$.\n- Step 2: To understand the \"backwards\" sign, consider what input $$x$$ is required to get the same output as the original $$x=0$$. We need $$x + a = 0$$, which means $$x = -a$$.\n+ For example, in $$y = f(x + 2)$$, the point that used to be at $$x = 0$$ now occurs at $$x = -2$$. The entire graph has shifted left by 2.\nTakeaway: Transformations inside the function argument affect the input required to achieve a given output, shifting the graph in the opposite direction to compensate.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": true}, {"question": "For the graph transformation $$y = f(ax)$$, why is the horizontal stretch scale factor $$1/a$$ rather than $$a$$? (2 steps)", "answer": "- Step 1: A stretch scale factor describes how much the graph expands or compresses relative to the original. If $$a > 1$$, we are feeding inputs into the function faster, so the graph compresses horizontally.\n- Step 2: To find where the original point at $$x=1$$ has moved, set the argument equal to 1: $$ax = 1$$, giving $$x = 1/a$$.\n+ The point has moved from $$x=1$$ to $$x=1/a$$, meaning the graph has been stretched by a factor of $$1/a$$.\n+ For example, $$y = f(2x)$$ compresses the graph horizontally by a factor of $$1/2$$ (scale factor $$1/2$$).\nTakeaway: Inside transformations affect the input; multiplying $$x$$ by $$a$$ requires a smaller input to achieve the same output, hence the horizontal scale factor is $$1/a$$.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": true}, {"question": "What are the two reflection transformations for $$y = f(x)$$, and what do their equations tell you about which axis is involved? (2 steps)", "answer": "- Step 1: $$y = -f(x)$$ reflects the graph in the $$x$$-axis. The negative sign is applied to the output ($$y$$), so the $$y$$-values flip their sign while the $$x$$-values stay the same.\n- Step 2: $$y = f(-x)$$ reflects the graph in the $$y$$-axis. The negative sign is applied to the input ($$x$$), so the $$x$$-values flip their sign while the $$y$$-values stay the same.\nTakeaway: A negative sign outside the function flips vertically ($$x$$-axis reflection); a negative sign inside the function flips horizontally ($$y$$-axis reflection).", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": true}, {"question": "When applying a sequence of transformations to a function, such as $$y = 2f(3x - 1) + 4$$, what is the correct order to apply them, and why? (3 steps)", "answer": "- Step 1: The correct order is to work from the \"inside out\". First apply the innermost transformation to the input, then the outer transformations to the output.\n- Step 2: For $$y = 2f(3x - 1) + 4$$, we peel off the layers:\n+ Start with $$f(x) \\rightarrow f(x - 1)$$: translate right by 1.\n+ Then $$f(x - 1) \\rightarrow f(3x - 1)$$: horizontal stretch by scale factor $$1/3$$.\n+ Then $$f(3x - 1) \\rightarrow 2f(3x - 1)$$: vertical stretch by scale factor 2.\n+ Finally $$2f(3x - 1) \\rightarrow 2f(3x - 1) + 4$$: translate up by 4.\n- Step 3: This order matters because composite transformations are nested functions. Changing the order of operations (e.g., stretching before translating vs translating before stretching) yields different results, just like in algebra where $$2(x+3) \\neq 2x + 3$$.\nTakeaway: Always apply transformations layer by layer, starting from the argument of $$f$$ and moving outwards to the final $$+$$ or $$\\times$$ operations.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": true}, {"question": "If a sequence of transformations is applied to $$y = f(x)$$ to get $$y = g(x)$$, how do you find the inverse transformation that maps $$y = g(x)$$ back to $$y = f(x)$$? (2 steps)", "answer": "- Step 1: Find the inverse by reversing the order of the sequence AND reversing each individual operation.\n- Step 2: For example, if the original sequence was \"translate right by 2, then vertical stretch by 3\", the inverse is \"vertical shrink by $$1/3$$, then translate left by 2\".\n+ Reversing operations: translation by $$\\begin{pmatrix} 2 \\\\ 0 \\end{pmatrix}$$ becomes $$\\begin{pmatrix} -2 \\\\ 0 \\end{pmatrix}$$; stretch factor 3 becomes $$1/3$$.\n+ Reversing order: you undo the last thing you did first.\nTakeaway: Undoing a sequence is like taking off shoes and socks: you put socks on first, then shoes; you must take shoes off first, then socks.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": true}, {"question": "Why does $$f(2x + 3)$$ represent a different transformation sequence than $$f(2(x + 3))$$, and how do you correctly factorise $$f(2x + 3)$$ to find the translation? (2 steps)", "answer": "- Step 1: The order of operations matters. In $$f(2x + 3)$$, the input is multiplied by 2 first, then 3 is added. In $$f(2(x + 3))$$, 3 is added first, then multiplied by 2.\n- Step 2: To find the horizontal translation for $$f(2x + 3)$$, you must factorise the coefficient of $$x$$: $$f(2x + 3) = f(2(x + 3/2))$$.\n+ This shows the sequence is: translate left by $$3/2$$, then horizontal stretch by $$1/2$$.\n+ If you mistakenly thought it was $$f(2(x+3))$$, you would think the translation is by 3, which is incorrect because it violates the order of operations.\nTakeaway: Always factorise the coefficient of $$x$$ inside the function argument to correctly identify the horizontal translation and preserve the proper sequence.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": true}, {"question": "Given $$y = f(x)$$ has a maximum at $$(2, 5)$$, what are the new coordinates of this maximum after the transformation $$y = 2f(x - 1) + 3$$? (2 steps)", "answer": "- Step 1: The transformation $$y = 2f(x - 1) + 3$$ involves a horizontal translation right by 1, a vertical stretch by factor 2, and a vertical translation up by 3.\n- Step 2: Apply these to the point $$(2, 5)$$:\n+ Horizontal translation right by 1: $$x$$-coordinate becomes $$2 + 1 = 3$$.\n+ Vertical stretch by factor 2: $$y$$-coordinate becomes $$5 \\times 2 = 10$$.\n+ Vertical translation up by 3: $$y$$-coordinate becomes $$10 + 3 = 13$$.\n+ The new maximum is at $$(3, 13)$$.\nTakeaway: Apply transformations to coordinates by directly adjusting $$x$$ (for horizontal changes) and $$y$$ (for vertical changes) in the order they occur.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": true}, {"question": "What transformation maps the graph of $$y = f(3x)$$ back to the graph of $$y = f(x)$$? (2 steps)", "answer": "- Step 1: The transformation $$y = f(3x)$$ is a horizontal stretch by scale factor $$1/3$$. To map it back to $$y = f(x)$$, we need to undo this stretch.\n- Step 2: The inverse of a horizontal stretch by $$1/3$$ is a horizontal stretch by scale factor 3.\n+ Algebraically, if we replace $$x$$ with $$3x$$ in $$y = f(3x)$$, we get $$y = f(3(\\frac{x}{3})) = f(x)$$. Replacing $$x$$ with $$x/3$$ (which is equivalent to a stretch by factor 3) restores the original function.\nTakeaway: To undo a horizontal stretch by factor $$1/a$$, apply a horizontal stretch by factor $$a$$.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": true}, {"question": "Intuitively, what does the conditional probability $$P(A \\mid B)$$ represent, and how does it differ from $$P(A \\cap B)$$? (2 steps)", "answer": "- Step 1: $$P(A \\mid B)$$ is the probability of event $$A$$ occurring, given that event $$B$$ has already occurred. It restricts our sample space only to the outcomes where $$B$$ happens.\n- Step 2: $$P(A \\cap B)$$ is the probability that both $$A$$ and $$B$$ happen out of the entire original sample space. $$P(A \\mid B)$$ takes the probability of both happening and divides it by the probability of the new restricted sample space $$B$$, giving $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$.\nTakeaway: $$P(A \\cap B)$$ is a fraction of the whole universe; $$P(A \\mid B)$$ is a fraction of the restricted universe $$B$$.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": true}, {"question": "What does it mean for two events $$A$$ and $$B$$ to be independent, and how does this simplify the formula for $$P(A \\cap B)$$? (2 steps)", "answer": "- Step 1: Events $$A$$ and $$B$$ are independent if the occurrence of one does not affect the probability of the other. This means $$P(A \\mid B) = P(A)$$.\n- Step 2: Substituting this into the conditional probability formula $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$, we get $$P(A) = \\frac{P(A \\cap B)}{P(B)}$$.\n+ Rearranging gives $$P(A \\cap B) = P(A) \\times P(B)$$.\nTakeaway: The multiplication rule $$P(A \\cap B) = P(A)P(B)$$ is a *consequence* of independence, not a definition to be used blindly on all events.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": true}, {"question": "Why is it a critical error to use $$P(A \\cap B) = P(A) \\times P(B)$$ for events that are not independent? What is the correct formula for $$P(A \\cap B)$$ in general? (2 steps)", "answer": "- Step 1: $$P(A) \\times P(B)$$ assumes that the probability of $$A$$ is the same whether $$B$$ happens or not (independence). If $$A$$ and $$B$$ are dependent (e.g., drawing cards without replacement), the occurrence of $$B$$ changes the probability of $$A$$.\n- Step 2: The correct general formula is derived from the conditional probability definition: $$P(A \\cap B) = P(A \\mid B) \\times P(B)$$. This accounts for the fact that $$A$$'s probability might change once $$B$$ is known.\nTakeaway: Only multiply probabilities for \"AND\" events if you have explicitly verified or assumed independence; otherwise, use the conditional probability formula.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": true}, {"question": "When using a tree diagram to calculate probabilities, what are the rules for combining probabilities along branches and across endpoints? (2 steps)", "answer": "- Step 1: Multiply along branches for \"AND\" events. If you follow a path to a specific endpoint, multiply the probabilities on the branches to find the probability of that entire sequence happening.\n- Step 2: Add across endpoints for \"OR\" events. If an event can happen in multiple ways (multiple paths), add the probabilities of those distinct endpoints together.\nTakeaway: Multiply for \"AND\" (along paths), add for \"OR\" (across paths).", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": true}, {"question": "Bag A has 1 red and 1 blue ball. Bag B has 2 red balls. You flip a coin: Heads means pick from Bag A, Tails from Bag B. What is the probability of drawing a red ball, and how does this use tree diagram rules? (3 steps)", "answer": "- Step 1: The paths to drawing a red ball are: (Heads AND Red from A) OR (Tails AND Red from B).\n- Step 2: Calculate each path by multiplying along branches:\n+ P(Heads) = $$1/2$$. P(Red | A) = $$1/2$$. So P(Heads and Red) = $$1/2 \\times 1/2 = 1/4$$.\n+ P(Tails) = $$1/2$$. P(Red | B) = $$1$$. So P(Tails and Red) = $$1/2 \\times 1 = 1/2$$.\n- Step 3: Add the probabilities of the two paths (add across endpoints): $$1/4 + 1/2 = 3/4$$.\nTakeaway: This exercise demonstrates multiplying along branches for joint probabilities and adding across endpoints for total probability.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": true}, {"question": "In the trapezium rule formula $$\\int_a^b y \\, dx \\approx \\frac{h}{2} [y_0 + 2(y_1 + \\dots + y_{n-1}) + y_n]$$, what is the intuitive meaning of the $$y$$ terms and why are the middle terms multiplied by 2? (2 steps)", "answer": "- Step 1: The $$y$$ terms ($$y_0, y_1, \\dots, y_n$$) are the heights of the vertical lines at each strip boundary. Each trapezium is formed by two adjacent heights.\n- Step 2: The middle heights ($$y_1$$ to $$y_{n-1}$$) are shared by two adjacent trapeziums: the right edge of one trapezium and the left edge of the next. Since the area of each trapezium is calculated separately and summed, these middle heights are counted twice, hence the factor of 2. The first ($$y_0$$) and last ($$y_n$$) heights are only part of one trapezium each.\nTakeaway: The factor of 2 comes from the overlapping edges of adjacent trapeziums when their areas are summed.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": true}, {"question": "In the trapezium rule, what is the critical difference between the number of strips ($$n$$) and the number of $$y$$-values, and why does this often cause errors? (2 steps)", "answer": "- Step 1: If you have $$n$$ strips, you divide the interval into $$n$$ sections, which requires $$n+1$$ boundaries (points). These boundaries correspond to the $$y$$-values: $$y_0, y_1, \\dots, y_n$$.\n- Step 2: The common error is confusing the number of $$y$$-values with the number of strips. For example, if a question gives you 5 $$y$$-values, you only have 4 strips (like 4 fence panels requiring 5 fence posts). Always use the number of *strips* $$n$$ in the formula $$h = \\frac{b-a}{n}$$.\nTakeaway: Number of $$y$$-values = Number of strips + 1. Strips are the gaps, $$y$$-values are the boundaries.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": true}, {"question": "If you are asked to estimate an integral using 1 strip (the minimum possible for the trapezium rule), how many $$y$$-values do you need, and what does the formula look like? (2 steps)", "answer": "- Step 1: With $$n = 1$$ strip, you have $$n + 1 = 2$$ $$y$$-values: $$y_0$$ and $$y_1$$.\n- Step 2: The formula becomes $$\\frac{h}{2}[y_0 + 2(y_1 + \\dots + y_{n-1}) + y_n] = \\frac{h}{2}[y_0 + y_1]$$, since there are no \"middle\" terms to double.\n+ This is simply the area of a single trapezium: $$\\frac{1}{2} \\times \\text{width} \\times (\\text{left height} + \\text{right height})$$, where width is the strip width $$h$$.\nTakeaway: The edge case of $$n=1$$ reduces the trapezium rule back to the simple area of a single trapezium.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": true}, {"question": "If you estimate $$\\int_0^4 \\sqrt{x} \\, dx$$ using 4 strips, what is the value of $$h$$ (strip width) and how many $$y$$-values do you calculate? (2 steps)", "answer": "- Step 1: The strip width $$h$$ is calculated using $$h = \\frac{b - a}{n}$$. Here, $$a = 0, b = 4, n = 4$$.\n+ $$h = \\frac{4 - 0}{4} = 1$$.\n- Step 2: The number of $$y$$-values is $$n + 1 = 4 + 1 = 5$$.\n+ The $$x$$-values for these $$y$$-values would be $$0, 1, 2, 3, 4$$.\nTakeaway: Always calculate $$h$$ using strips $$n$$, and remember you need one more $$y$$-value than the number of strips.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": true}, {"question": "When proving a cubic has exactly one real root by factorising it into a linear and quadratic factor, what condition on the quadratic factor guarantees exactly one real root for the cubic? (2 steps)", "answer": "- Step 1: Factorise the cubic as $$f(x) = (ax + b)(cx^2 + dx + e)$$. The linear factor $$(ax + b)$$ always gives exactly one real root at $$x = -b/a$$.\n- Step 2: The quadratic factor $$(cx^2 + dx + e)$$ will have real roots only if its discriminant $$\\Delta = d^2 - 4ce$$ is greater than or equal to 0.\n+ If $$\\Delta < 0$$, the quadratic has no real roots. Since the linear factor gives one root and the quadratic gives none, the cubic has exactly one real root total.\nTakeaway: A cubic has exactly one real root if it can be split into a linear factor (1 root) and a quadratic factor with a negative discriminant (0 real roots).", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": true}, {"question": "If a cubic function cannot be easily factorised, how can you use calculus to prove it has exactly one real root? (3 steps)", "answer": "- Step 1: Differentiate the cubic function to find $$f'(x)$$.\n- Step 2: Determine the sign of $$f'(x)$$ for all real $$x$$.\n+ If $$f'(x) > 0$$ for all $$x$$, the function is strictly increasing.\n+ If $$f'(x) < 0$$ for all $$x$$, the function is strictly decreasing.\n- Step 3: A strictly monotonic (always increasing or always decreasing) continuous function will cross the $$x$$-axis exactly once. Since a cubic approaches $$-\\infty$$ on one side and $$+\\infty$$ on the other (or vice versa), it must cross the axis, and because it never turns around, it can only cross it once.\nTakeaway: If the derivative never changes sign, the cubic has no turning points and therefore cannot cross the axis more than once.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": true}, {"question": "Why does a strictly increasing function ($$f'(x) > 0$$ for all $$x$$) guarantee exactly one real root, rather than zero roots? (2 steps)", "answer": "- Step 1: A strictly increasing function always goes upwards as $$x$$ increases. For a cubic, as $$x \\rightarrow -\\infty$$, $$f(x) \\rightarrow -\\infty$$, and as $$x \\rightarrow +\\infty$$, $$f(x) \\rightarrow +\\infty$$.\n- Step 2: Because the function starts at negative infinity and ends at positive infinity, it must cross the $$y=0$$ line at least once (by the Intermediate Value Theorem). Since it is strictly increasing, it can never come back down to cross it again.\nTakeaway: The end behavior of a cubic combined with a lack of turning points guarantees exactly one intersection with the $$x$$-axis.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": true}, {"question": "If you find that $$f'(x) = 0$$ for some value of $$x$$ in a cubic, does this mean the cubic must have multiple distinct real roots? (2 steps)", "answer": "- Step 1: No, $$f'(x) = 0$$ only indicates a stationary point (a local maximum, minimum, or point of inflection).\n- Step 2: A cubic can have a stationary point and still only cross the $$x$$-axis once. For example, if both the local max and local min are above the $$x$$-axis, the cubic only crosses once from below to above (or vice versa if both are below).\n+ A stationary point only guarantees multiple roots if the function crosses the axis, turns around, and crosses again.\nTakeaway: A turning point means the graph \"flattens,\" but it doesn't force the graph to cross the axis multiple times.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": true}, {"question": "Prove that $$f(x) = x^3 + 3x - 5$$ has exactly one real root using calculus. (3 steps)", "answer": "- Step 1: Find the derivative: $$f'(x) = 3x^2 + 3$$.\n- Step 2: Analyze the sign of $$f'(x)$$. Since $$x^2 \\ge 0$$ for all real $$x$$, $$3x^2 \\ge 0$$. Thus, $$f'(x) = 3x^2 + 3 \\ge 3 > 0$$ for all $$x$$.\n- Step 3: Since $$f'(x) > 0$$ for all $$x$$, the function is strictly increasing. As a cubic, it goes from $$-\\infty$$ to $$+\\infty$$, so it must cross the $$x$$-axis exactly once. Therefore, it has exactly one real root.\nTakeaway: Showing the derivative is always positive (or always negative) proves the function is monotonic, which restricts the number of real roots to exactly one.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": true}, {"question": "What are the general solution sets for $$\\sin \\theta = \\sin \\alpha$$ and $$\\tan \\theta = \\tan \\alpha$$, and why do they differ? (2 steps)", "answer": "- Step 1: For $$\\sin \\theta = \\sin \\alpha$$, the solutions are $$\\theta = \\alpha$$ and $$\\theta = 180^\\circ - \\alpha$$ (or $$\\pi - \\alpha$$). This is because sine has a line of symmetry at $$\\theta = 90^\\circ$$, so angles equidistant from $$90^\\circ$$ have the same sine.\n- Step 2: For $$\\tan \\theta = \\tan \\alpha$$, the solutions are $$\\theta = \\alpha + 180^\\circ k$$ (or $$\\alpha + \\pi k$$). Tangent has a period of $$180^\\circ$$ ($$\\pi$$), so it repeats exactly every $$180^\\circ$$, unlike sine which requires a reflection to find the second solution in a $$360^\\circ$$ cycle.\nTakeaway: Sine requires a reflection ($$180^\\circ - \\alpha$$); tangent just requires adding the period ($$180^\\circ$$).", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": true}, {"question": "For the equation $$\\cos \\theta = \\cos \\alpha$$, what are the two solutions within a $$360^\\circ$$ cycle, and what symmetry property of cosine generates the second solution? (2 steps)", "answer": "- Step 1: The two solutions are $$\\theta = \\alpha$$ and $$\\theta = 360^\\circ - \\alpha$$.\n- Step 2: Cosine is an even function, meaning it has a line of symmetry along the $$y$$-axis. This means $$\\cos(\\theta) = \\cos(-\\theta)$$. Since angles are typically kept positive, $$-\\alpha$$ is equivalent to $$360^\\circ - \\alpha$$.\n+ Visually, on the unit circle, the angle $$\\alpha$$ and the angle $$360^\\circ - \\alpha$$ have the same horizontal ($$x$$) coordinate, which represents cosine.\nTakeaway: The second cosine solution comes from the even symmetry of the cosine wave (or the horizontal symmetry of the unit circle).", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": true}, {"question": "Why is it incorrect to simply add $$180^\\circ$$ to find the second solution for $$\\cos \\theta = \\cos \\alpha$$, like we do for $$\\tan \\theta$$? (2 steps)", "answer": "- Step 1: Adding $$180^\\circ$$ to an angle reflects it through the origin on the unit circle. This flips both the $$x$$ and $$y$$ coordinates, changing the sign of both cosine and sine.\n- Step 2: Cosine only stays the same if we reflect across the $$x$$-axis (which changes $$y$$ to $$-y$$ but keeps $$x$$ the same). This corresponds to $$360^\\circ - \\alpha$$, not $$\\alpha + 180^\\circ$$.\n+ For example, $$\\cos(60^\\circ) = 0.5$$, but $$\\cos(60^\\circ + 180^\\circ) = \\cos(240^\\circ) = -0.5$$.\nTakeaway: $$\\cos(\\theta)$$ and $$\\cos(\\theta + 180^\\circ)$$ have opposite signs; the correct second solution is $$360^\\circ - \\theta$$.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": true}, {"question": "If solving $$\\cos \\theta = 1$$ for $$0 \\le \\theta < 360^\\circ$$, how many distinct solutions are there, and why doesn't the formula $$\\theta = 360^\\circ - \\alpha$$ give a second distinct solution? (2 steps)", "answer": "- Step 1: There is exactly one solution: $$\\theta = 0^\\circ$$.\n- Step 2: Using the formula, the second solution would be $$\\theta = 360^\\circ - 0^\\circ = 360^\\circ$$. However, the range is $$0 \\le \\theta < 360^\\circ$$, so $$360^\\circ$$ is excluded (it's the same position as $$0^\\circ$$ on the circle).\n+ This happens because at the maximum and minimum points of the cosine wave, the two \"symmetrical\" branches touch at exactly the same point.\nTakeaway: At $$\\theta = 0^\\circ$$ or $$180^\\circ$$, the two cosine solutions merge into one, so be careful with your range boundaries.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": true}, {"question": "Solve $$\\cos 2\\theta = 0.5$$ for $$0 \\le \\theta < 360^\\circ$$. How does the substitution $$u = 2\\theta$$ help ensure you don't miss solutions? (3 steps)", "answer": "- Step 1: Let $$u = 2\\theta$$. Since $$0 \\le \\theta < 360^\\circ$$, the new range for $$u$$ is $$0 \\le u < 720^\\circ$$. We must look for solutions in this wider range because $$2\\theta$$ covers two full cycles.\n- Step 2: Find the solutions for $$\\cos u = 0.5$$ in $$0 \\le u < 720^\\circ$$.\n+ Principal solution: $$u = 60^\\circ$$.\n+ Second solution in first cycle: $$u = 360^\\circ - 60^\\circ = 300^\\circ$$.\n+ Third solution (second cycle): $$u = 360^\\circ + 60^\\circ = 420^\\circ$$.\n+ Fourth solution (second cycle): $$u = 360^\\circ + 300^\\circ = 660^\\circ$$.\n- Step 3: Convert back to $$\\theta$$ by dividing by 2: $$\\theta = 30^\\circ, 150^\\circ, 210^\\circ, 330^\\circ$$.\nTakeaway: Always expand the range when dealing with $$n\\theta$$. For $$\\cos n\\theta$$, you need $$2n$$ solutions in the expanded range to find all solutions in the original range.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": true}, {"question": "When verifying an algebraic identity by substituting a simple value like $$x = 0$$, what does a successful check prove, and what are its limitations? (2 steps)", "answer": "- Step 1: A successful check (e.g., both sides equal 5 when $$x=0$$) proves that the identity *could* be correct, and it definitely rules out a sign error or constant term error affecting that specific value.\n- Step 2: However, it does not prove the identity is true for all $$x$$. The two sides could just happen to agree at $$x=0$$ but differ at $$x=1$$.\n+ For example, $$2x + 3$$ and $$x^2 - x + 3$$ both equal 3 when $$x=0$$, but are not identical expressions.\nTakeaway: Substitution is a quick sanity check to catch obvious errors, not a rigorous proof. It confirms possibility, not certainty.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": true}, {"question": "When comparing coefficients to prove an identity, why must you set up equations for *every* power of $$x$$, and what happens if you skip one? (2 steps)", "answer": "- Step 1: Two polynomials are identical if and only if the coefficients of corresponding powers of $$x$$ are identical on both sides. Setting up equations for each power (e.g., $$x^3, x^2, x^1, x^0$$) systematically verifies this condition.\n- Step 2: If you skip a power, you leave a \"gap\" in your proof. The coefficients for the powers you checked might match, but the skipped power might have different coefficients, making the identity false.\n+ For example, $$3x^2 + 2x + 1$$ and $$5x^3 + 3x^2 + 2x + 1$$ match for $$x^2, x^1, x^0$$, but fail for $$x^3$$.\nTakeaway: Comparing coefficients is exhaustive; you must check every term to ensure no hidden discrepancies exist.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": true}, {"question": "In a timed multiple-choice exam like the ESAT, why is it often better to use estimation or elimination rather than exact calculation? (2 steps)", "answer": "- Step 1: The ESAT allows approximately 2 minutes per question. Exact calculations, especially with complex fractions or large numbers, consume valuable time and increase the risk of arithmetic errors.\n- Step 2: Estimation allows you to quickly gauge the order of magnitude or the sign of the answer, often eliminating 2-3 options instantly. If only one option is positive and your estimation shows the answer must be positive, you don't need to calculate the exact value.\nTakeaway: Use conceptual understanding and number sense to eliminate wrong answers; only calculate exactly if estimation doesn't yield a single clear choice.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": true}]}, "glm_2": {"label": "GLM 5.1 ②", "cards": []}, "glm_3": {"label": "GLM 5.1 ③", "cards": []}, "qwen_1": {"label": "Qwen 3 235B ①", "cards": []}, "qwen_2": {"label": "Qwen 3 235B ②", "cards": []}, "minimax_1": {"label": "MiniMax M1 ①", "cards": []}, "minimax_2": {"label": "MiniMax M1 ②", "cards": []}, "deepseek_1": {"label": "DeepSeek V3.1 ①", "cards": []}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 3996, "out_tokens": 17380, "reasoning_chars": 31180, "cost_eur": 0.1353, "elapsed_s": 738.2, "content_chars": 29215}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 0, "out_tokens": 0, "reasoning_chars": 0, "cost_eur": 0.0, "elapsed_s": 0.2371983528137207, "content_chars": 0, "error": "HTTP 403"}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 0, "out_tokens": 0, "reasoning_chars": 0, "cost_eur": 0.0, "elapsed_s": 0.3332951068878174, "content_chars": 0, "error": "HTTP 403"}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.7, "in_tokens": 0, "out_tokens": 0, "reasoning_chars": 0, "cost_eur": 0.0, "elapsed_s": 0.04176616668701172, "content_chars": 0, "error": "HTTP 403"}, "qwen_2": {"run": 2, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.8, "in_tokens": 0, "out const SK='auto_maths_20260621_p2_esat_harry';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}
function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}
function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}
function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}
function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}
function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}
function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
