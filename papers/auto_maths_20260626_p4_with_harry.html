ive exponent means \"reciprocal of the positive power,\" not \"negative of the power.\"\n- Step 2: The mistake comes from confusing $$2^{-2}$$ with $$-2^2$$. The former is $$\\frac{1}{4}$$ (exponentiation with a negative power), the latter is $$-4$$ (negation of a square). The notation is similar but the operations are completely different: $$a^{-n} = \\frac{1}{a^n}$$, while $$-(a^n)$$ is negation.\n\nTakeaway: Negative exponent → reciprocal. Negative sign in front → negation. These are fundamentally different.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": true}, {"question": "In the integrating factor method, why do we *not* include a constant of integration when computing $$\\int P(x)\\,dx$$ to form the IF? (2 steps)", "answer": "- Step 1: If we wrote $$\\text{IF} = e^{\\int P(x)\\,dx + C} = e^C \\cdot e^{\\int P(x)\\,dx}$$, the factor $$e^C$$ is just a positive constant. When we multiply the entire ODE by IF, this constant appears on every term and cancels out when we solve for $$y$$.\n- Step 2: Since the constant doesn't affect the final answer, we conventionally set it to zero (i.e., take $$C = 0$$) for simplicity. The \"lost\" constant of integration is recovered later when we integrate the right-hand side after applying the IF.\n\nTakeaway: The IF constant cancels, so we omit it. The actual integration constant comes from the final integration step.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": true}, {"question": "A student solving $$\\frac{dy}{dx} = \\frac{2x}{y}$$ separates to get $$y \\, dy = 2x \\, dx$$ and integrates to $$\\frac{y^2}{2} = x^2 + C$$. They then write the general solution as $$y = \\sqrt{2x^2 + 2C}$$. What is a cleaner way to write this, and why? (2 steps)", "answer": "- Step 1: Since $$C$$ is an arbitrary constant, $$2C$$ is also an arbitrary constant. We can replace $$2C$$ with a new constant, say $$K$$, giving $$y^2 = 2x^2 + K$$, or equivalently $$y^2 - 2x^2 = K$$.\n- Step 2: This is cleaner because: (a) it avoids nested square roots and arbitrary constants inside them, (b) it makes applying initial conditions simpler (just substitute and solve for $$K$$), and (c) it avoids the issue of $$\\pm$$ when taking the square root — the implicit form $$y^2 - 2x^2 = K$$ represents the whole family of solutions.\n\nTakeaway: Keep the solution in implicit form unless explicitly asked to solve for $$y$$. Renaming constants keeps things tidy.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": false}, {"question": "A point lies on the curve $$4x^2 + 2xy - 2xy + y^2 = 24$$ with gradient 2. After solving, you get two possible values for $$b$$ (the $$y$$-coordinate): one positive, one negative. The question states that $$b > 0$$. Why must you explicitly reject the negative value, and what happens if you don't? (2 steps)", "answer": "- Step 1: The condition $$b > 0$$ (or equivalently, the point is in a region where $$y$$ is positive) is a constraint from the problem. Both solutions satisfy the algebraic equations, but only one satisfies all the given conditions. The negative value is extraneous — it corresponds to a point on a different part of the curve that doesn't meet the stated requirements.\n- Step 2: If you don't reject it, you'd list two points as answers, one of which is wrong. In an exam, this loses the final accuracy mark. Always check solutions against all stated conditions, not just the equations you solved.\n\nTakeaway: Algebra gives candidates; constraints select the valid one. Always check and reject extraneous solutions.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": false}, {"question": "Quick conceptual check: if $$\\frac{dy}{dx} = e^{x} \\cdot y^2$$, is this separable or does it require the integrating factor? How do you know? (2 steps)", "answer": "- Step 1: Rewrite as $$\\frac{dy}{dx} = e^x \\cdot y^2$$. The right side is a product of a pure function of $$x$$ ($$e^x$$) and a pure function of $$y$$ ($$y^2$$). This is the separable form $$f(x) \\cdot g(y)$$.\n- Step 2: It is separable. Divide both sides by $$y^2$$ and multiply by $$dx$$: $$\\frac{1}{y^2}\\,dy = e^x\\,dx$$. Integrate both sides: $$\\int y^{-2}\\,dy = \\int e^x\\,dx$$, giving $$-\\frac{1}{y} = e^x + C$$. The integrating factor is *not* needed here — the equation is not linear in $$y$$ (it has $$y^2$$), so the IF method doesn't even apply.\n\nTakeaway: Separable equations can be nonlinear in $$y$$. The IF method requires the equation to be *linear* in $$y$$.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": false}, {"question": "Quick check: if $$\\frac{dy}{dx} + 3y = e^x$$, is this separable or does it require the integrating factor? Identify $$P(x)$$ and $$Q(x)$$. (2 steps)", "answer": "- Step 1: Try to separate: $$\\frac{dy}{dx} = e^x - 3y$$. The right side is *not* a product of a pure function of $$x$$ and a pure function of $$y$$ — it's a sum/difference involving both $$x$$ and $$y$$. You cannot factor it into $$f(x) \\cdot g(y)$$. So it's not separable.\n- Step 2: The equation is linear in $$y$$ (no $$y^2$$, $$\\sin y$$, etc.) and is in the standard form $$\\frac{dy}{dx} + P(x)y = Q(x)$$ with $$P(x) = 3$$ and $$Q(x) = e^x$$. Use the integrating factor: $$\\text{IF} = e^{\\int 3\\,dx} = e^{3x}$$.\n\nTakeaway: If the right side can't be factored into $$f(x) \\cdot g(y)$$ but the equation is linear in $$y$$, use the integrating factor.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": false}, {"question": "When computing the volume of revolution $$V = \\pi \\int_a^b y^2 \\, dx$$, a student substitutes $$y = f(x)$$ and gets $$V = \\pi \\int_a^b [f(x)]^2 \\, dx$$. They then try to compute $$\\int [f(x)]^2 \\, dx$$ by writing $$\\left[\\int f(x)\\,dx\\right]^2$$. Why is this wrong? (2 steps)", "answer": "- Step 1: Integration and squaring do not commute. $$\\int [f(x)]^2 \\, dx$$ means: first square the function, then integrate the result. $$\\left[\\int f(x)\\,dx\\right]^2$$ means: first integrate the function, then square the result. These are different operations producing different results.\n- Step 2: Simple counterexample: $$f(x) = x$$ on $$[0,1]$$. Then $$\\int_0^1 x^2\\,dx = \\frac{1}{3}$$, but $$\\left[\\int_0^1 x\\,dx\\right]^2 = \\left[\\frac{1}{2}\\right]^2 = \\frac{1}{4}$$. The values differ. You must square the function *first*, then integrate.\n\nTakeaway: Square the function, then integrate. Never integrate then square.", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": true}, {"question": "You're asked to find the volume when $$y = \\sqrt{x}$$ from $$x = 0$$ to $$x = 4$$ is rotated about the $$x$$-axis. Set up (but don't fully compute) the integral, and explain each piece. (2 steps)", "answer": "- Step 1: The volume formula is $$V = \\pi \\int_0^4 y^2 \\, dx$$. Substitute $$y = \\sqrt{x}$$: $$y^2 = x$$. So the integral becomes $$V = \\pi \\int_0^4 x \\, dx$$.\n- Step 2: Each piece: $$\\pi$$ accounts for the circular cross-section; $$y^2 = x$$ is the area of the disc at position $$x$$ (radius $$= \\sqrt{x}$$, area $$= \\pi x$$); $$dx$$ is the thickness of the disc; the limits 0 to 4 define the range of $$x$$. Integrating: $$V = \\pi \\left[\\frac{x^2}{2}\\right]_0^4 = \\pi \\cdot 8 = 8\\pi$$.\n\nTakeaway: Volume of revolution = sum of disc areas × thickness. Substitute for $$y^2$$, then integrate.", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": false}], "count": 45}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Why does the area ratio between consecutive squares in the nested squares problem remain constant at 5/9? (3 steps)", "answer": "- Step 1: **Geometry of the inner square**  \nEach square is formed by connecting points 1/3 along the original square's sides. Choosing side length 3 for simplicity, the inner square's side forms the hypotenuse of a right triangle with legs 1 and 2:  \n$$ \\text{Inner side} = \\sqrt{1^2 + 2^2} = \\sqrt{5} $$  \n\n- Step 2: **Area ratio derivation**  \nOriginal square area: $ 3^2 = 9 $. Inner square area: $ (\\sqrt{5})^2 = 5 $. Ratio:  \n$$ \\frac{\\text{Inner Area}}{\\text{Original Area}} = \\frac{5}{9} $$  \n\n- Step 3: **Iterative process**  \nRepeating the process applies the same ratio to the new square. For the 4th square:  \n$$ \\left(\\frac{5}{9}\\right)^3 = \\frac{125}{729} $$  \n+ This constancy arises from similarity: each square is scaled by $ \\sqrt{5}/3 $, so areas scale by $ (5/9) $.\n\n**Key takeaway:** The ratio depends only on the geometric construction, not absolute size.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why must polynomial long division express $ \\frac{5x+3}{x+2} $ as $ 5 + \\frac{-7}{x+2} $ instead of $ 5(x+2) - 7 $? (2 steps)", "answer": "- Step 1: **Division structure**  \nPolynomial division separates the quotient and remainder:  \n$$ \\text{Dividend} = (\\text{Divisor} \\times \\text{Quotient}) + \\text{Remainder} $$  \nHere:  \n$$ 5x + 3 = (x+2)(5) + (-7) $$  \n\n- Step 2: **Expression form**  \nDividing both sides by $ x+2 $:  \n$$ \\frac{5x+3}{x+2} = 5 + \\frac{-7}{x+2} $$  \n+ The remainder must be written as a fraction over the divisor to maintain algebraic integrity for graph transformations.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "Why is the domain of $ g^{-1}(x) $ equal to the range of $ g(x) $? (1 step)", "answer": "By definition, the inverse function $ g^{-1} $ reverses the mapping of $ g $. If $ g $ maps $ x \\rightarrow y $, then $ g^{-1} $ maps $ y \\rightarrow x $. Therefore, the outputs of $ g $ (its range) become the inputs of $ g^{-1} $ (its domain).  \n+ Misconception: Confusing domain/range notation (e.g., writing $ x < 5 $ vs. $ y < 5 $ for the inverse).", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Why does implicit differentiation require the product rule for $ \\frac{d}{dx}(xy) $? (2 steps)", "answer": "- Step 1: **Dependence on $ x $**  \nSince $ y $ is a function of $ x $, both terms in $ xy $ vary with $ x $. The product rule applies:  \n$$ \\frac{d}{dx}(xy) = x \\cdot \\frac{dy}{dx} + y \\cdot \\frac{dx}{dx} = x\\frac{dy}{dx} + y $$  \n\n- Step 2: **Bracket importance**  \nForgetting brackets around $ x\\frac{dy}{dx} + y $ during rearrangement leads to sign errors. Example:  \n$$ 2xy \\rightarrow 2\\left(x\\frac{dy}{dx} + y\\right) $$", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "Why does the integral $ \\int \\sqrt{u} \\, du $ use the power rule instead of $ \\ln u $? (2 steps)", "answer": "- Step 1: **Power rule applicability**  \nFor $ \\sqrt{u} = u^{1/2} $, increase exponent by 1 and divide:  \n$$ \\int u^{1/2} \\, du = \\frac{u^{3/2}}{3/2} + C = \\frac{2}{3}u^{3/2} + C $$  \n\n- Step 2: **Avoiding ln confusion**  \nThe integral $ \\int \\frac{1}{u} \\, du = \\ln |u| + C $ applies only to $ u^{-1} $. For $ u^{n} $ where $ n \\neq -1 $, the power rule is correct.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Why does the binomial expansion of $ (2 + 5x)^{-2} $ require factoring out 2 first? (2 steps)", "answer": "- Step 1: **Formal requirement**  \nThe general binomial formula $ (1 + a)^n $ requires the first term to be 1. Factor out 2:  \n$$ (2 + 5x)^{-2} = 2^{-2}\\left(1 + \\frac{5x}{2}\\right)^{-2} $$  \n\n- Step 2: **Convergence range**  \nThe expansion converges only when $ \\left|\\frac{5x}{2}\\right| < 1 $, which simplifies to $ |x| < \\frac{2}{5} $. Factoring ensures this condition is met.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "Why must the limits of integration reverse when substitution yields $ u_{\\text{new}} = 3 $ at $ \\theta = \\pi/2 $? (1 step)", "answer": "The substitution $ u = 3 + \\cos\\theta $ makes $ u $ decrease as $ \\theta $ increases from 0 to $ \\pi/2 $. Since integration bounds must follow the original direction, the lower limit becomes 4 (from $ \\theta = 0 $) and the upper limit becomes 3 (from $ \\theta = \\pi/2 $), preserving the integral's sign.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Why is the volume of revolution formula $ V = \\pi \\int y^2 dx $? (1 step)", "answer": "Visualizing the solid as composed of infinitesimal disks perpendicular to the axis of rotation:  \n- Each disk has radius $ y $ and thickness $ dx $.  \n- Area of disk: $ \\pi y^2 $.  \n- Integrating over $ x $ sums volumes: $ V = \\pi \\int y^2 dx $.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "Why does solving $ \\frac{dy}{dx} = 2 $ for point $ P(a,b) $ on curve $ 4x^2 + 2xy - 2xy = ... $ require two equations? (2 steps)", "answer": "- Step 1: **Gradient equation**  \nDifferentiating implicitly gives $ \\frac{dy}{dx} = \\frac{12 - 4x + 2y}{y - x} $. Setting $ \\frac{dy}{dx} = 2 $ yields one equation: $ 2a + b = 12 - 2a $.  \n\n- Step 2: **Curve membership**  \nSince $ P(a,b) $ lies on the curve, substituting $ x = a $, $ y = b $ into the curve equation provides the second equation. Without this, there are infinitely many solutions for $ a $ and $ b $.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "Why is the final answer for vector intersection written as coordinates instead of a column vector? (1 step)", "answer": "Exam conventions require coordinates in row form (e.g., $ (a,b,c) $) to distinguish between position vectors and coordinate points. A column vector represents a vector, not a point location.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}], "count": 10}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "A square design has points 1/3 along sides, creating a smaller square. Process repeats. If the first square has side 3, what's the side length of the smaller square using Pythagoras? (3 steps)", "answer": "- Step 1: Identify right triangle with legs 1 and 2 (1/3 and 2/3 of original side 3)\n- Step 2: Apply Pythagoras: √(1² + 2²) = √5\n- Step 3: Confirm smaller square side = √5, area = (√5)² = 5\n\nFirst calculation in iterative geometric ratio problem", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Given Q1 result: original area 9, smaller square area 5. What's the area ratio between successive squares? Why is this ratio consistent for any initial size?", "answer": "- Step 1: Ratio = 5/9 (smaller/original)\n- Step 2: Ratio depends on points' relative position (1/3), not absolute size\n- Step 3: Geometric progression: Each iteration multiplies area by 5/9, making ratio universal\n\nThis ratio forms the basis for iterative area calculations", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Find area of 4th square as fraction of original. How many times is the 5/9 ratio applied? (2 steps)", "answer": "- Step 1: (5/9)³ = 5³/9³ = 125/729\n- Step 2: 5³=125 and 9³=729 must be memorized for time-sensitive exams\n\nFinal result of iterative geometric problem", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "Given g(x) = (5x+3)/(x+2), why is polynomial long division needed to find range? (2 steps)", "answer": "- Step 1: Division reveals transformation of -1/x form: 5 - 7/(x+2)\n- Step 2: Identifies vertical asymptote (x=-2) and horizontal asymptote (y=5)\n\nCritical for graph transformation identification", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "For g(x) = 5 - 7/(x+2), why is range y < 5 when domain x > -2? (3 steps)", "answer": "- Step 1: -7/(x+2) < 0 for x > -2 (positive denominator)\n- Step 2: 5 + negative value < 5\n- Step 3: Approaches 5 from below as x → ∞\n\nAsymptote behavior under translation", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "Why does inverse function g⁻¹ have domain x < 5? (2 steps)", "answer": "- Step 1: Original function range y < 5 becomes inverse's domain\n- Step 2: Domain must be stated as \"x < 5\", range as \"y < ...\"\n\nDomain-range relationship for inverse functions", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Why write (5x+3)/(x+2) as 5 - 7/(x+2) rather than 5(x+2)-7? (3 steps)", "answer": "- Step 1: Division form quotient + remainder/divisor required\n- Step 2: 5(x+2) - 7 is intermediate step, not final form\n- Step 3: Final form reveals graph transformation pattern\n\nPolynomial division proper form requirement", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "Implicit differentiation: Why is product rule needed for d(xy)/dx? (2 steps)", "answer": "- Step 1: Both x and y vary, so d(xy)/dx = x(dy/dx) + y\n- Step 2: Must use brackets: [x(dy/dx) + y]\n\nProduct rule application in implicit differentiation", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "For dy/dx = (12 - 4x + 2y)/(y - x), why are TWO equations needed for point P(a,b) with gradient 2? (3 steps)", "answer": "- Step 1: First equation: Substitute gradient 2 into expression\n- Step 2: Second equation: Point lies on original curve\n- Step 3: Two equations solve for two variables a and b\n\nSimultaneous equations from curve conditions", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "Vectors: Why set R1 = R2 at intersection point? (2 steps)", "answer": "- Step 1: Position vectors must be equal at intersection\n- Step 2: Forms three component equations to solve\n\nVector equation basis for line intersection", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "Why write final vector intersection as coordinates (x,y,z) rather than column vector? (1 step)", "answer": "- Step 1: Exam specifications require coordinate form, not vector notation\n\nAnswer format requirement for vector questions", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "Integration by substitution: Why transform limits when substituting u = 3 + cosθ? (2 steps)", "answer": "- Step 1: u depends on θ, so limits must reflect this relationship\n- Step 2: θ=0 gives u=4, θ=π/2 gives u=3, order preserved in substitution\n\nLimit transformation in definite integrals", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}, {"question": "Why can't cosθ be treated as constant in ∫u^(1/2)cosθ du? (2 steps)", "answer": "- Step 1: cosθ = u - 3 from substitution\n- Step 2: Must substitute back in terms of u to maintain variable relationship\n\nVariable dependency in substitution", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": false}, {"question": "Why is ∫u^(-1/2)du not ln|u|? (2 steps)", "answer": "- Step 1: Power rule applies when n ≠ -1: ∫u^ndu = (u^(n+1))/(n+1)\n- Step 2: For n = -1, then ∫u^(-1)du = ln|u|, but here n = -1/2\n\nPower rule vs logarithmic integral distinction", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "Binomial expansion: Why use bottom formula for (2 + 5x)^-2? (3 steps)", "answer": "- Step 1: Top formula only for positive integer powers\n- Step 2: Bottom formula works for any real n including negatives\n- Step 3: Factor to make leading coefficient 1: 2^-2(1 + 5x/2)^-2\n\nBinomial formula selection criteria", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": false}], "count": 15}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "For the function g(x) = (5x+3)/(x+2) with domain x > -2, what is the range of g(x)? Explain using polynomial long division. (3 steps)", "answer": "- Step 1: Perform polynomial long division: (5x+3) ÷ (x+2). The quotient is 5, and remainder is -7. So g(x) = 5 + (-7)/(x+2) = 5 - 7/(x+2).\n- Step 2: This is a transformation of -7/(x+2). The parent graph -1/x has vertical asymptote x=0 and horizontal asymptote y=0. The transformation x+2 shifts vertical asymptote to x=-2; multiplying by 7 stretches vertically; subtracting from 5 shifts horizontal asymptote to y=5.\n- Step 3: For x > -2 (the given domain), the graph exists to the right of the vertical asymptote. Since -7/(x+2) is always negative, g(x) < 5. The range is y < 5.\n\n**Takeaway:** Polynomial long division reveals the asymptotes and behaviour — the range comes from what y-values the function actually takes.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "If g(x) = 5 - 7/(x+2) with domain x > -2, what is the domain of the inverse function g⁻¹(x)? Why must you write it with x, not y? (2 steps)", "answer": "- Step 1: The range of the original function becomes the domain of the inverse. From Q2, the range of g(x) is y < 5. Therefore, the domain of g⁻¹ is x < 5.\n- Step 2: Domain ALWAYS uses the variable x; range ALWAYS uses the variable y. This is an exam convention — writing \"y < 5\" for domain loses a mark.\n\n**Takeaway:** Range of f → domain of f⁻¹, and use the correct variable (x for domain, y for range).", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "When differentiating the term 2xy implicitly with respect to x, what does it become and why must you use brackets? (2 steps)", "answer": "- Step 1: Use the product rule: d(xy)/dx = x·(dy/dx) + y·(1). So 2xy becomes 2[x·(dy/dx) + y] = 2x(dy/dx) + 2y.\n- Step 2: You MUST write brackets around the product rule expansion: [x(dy/dx) + y]. Forgetting brackets causes sign errors when rearranging to isolate dy/dx later.\n\n**Takeaway:** The product rule gives TWO terms — always keep them grouped with brackets until you finish differentiating all terms.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "For the curve 4x² + 2xy - 2y² = 24, find dy/dx in terms of x and y. (4 steps)", "answer": "- Step 1: Differentiate each term with respect to x:\n   - 4x² → 8x\n   - 2xy → 2[x(dy/dx) + y] = 2x(dy/dx) + 2y (product rule)\n   - -2y² → -4y(dy/dx) (chain rule: d(y²)/dy = 2y, then multiply by dy/dx)\n   - 24 → 0\n- Step 2: Collect: 8x + 2x(dy/dx) + 2y - 4y(dy/dx) = 0\n- Step 3: Group dy/dx terms: 2x(dy/dx) - 4y(dy/dx) + 8x + 2y = 0\n- Step 4: Factor: (2x - 4y)(dy/dx) + 8x + 2y = 0 → dy/dx = -(8x + 2y)/(2x - 4y) = (12 - 4x + 2y)/(y - x) after simplifying by 2 and rearranging\n\n**Takeaway:** Implicit differentiation treats y as a function of x — every y term gets multiplied by dy/dx via chain rule.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "A point P(a,b) lies on the curve 4x² + 2xy - 2y² = 24 and has gradient dy/dx = 2. Why do you need TWO equations to find (a,b), and what are they? (2 steps)", "answer": "- Step 1: Substituting gradient 2 into dy/dx = (12 - 4a + 2b)/(b - a) = 2 gives one equation: 12 - 4a + 2b = 2b - 2a, which simplifies to 4a + b = 12. This has TWO unknowns (a and b), so ONE equation isn't enough.\n- Step 2: The second equation comes from the fact that P lies ON the curve: substitute x=a, y=b into 4a² + 2ab - 2b² = 24. Now you have simultaneous equations to solve for both a and b.\n\n**Takeaway:** \"Point P lies on the curve\" always gives the second equation — it's not just extra information, it's essential for solving.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "Two lines in 3D space are given by their vector equations. How do you find their intersection point? (3 steps)", "answer": "- Step 1: Set the position vectors equal: R₁ = R₂. This gives three component equations (one for each of x, y, z coordinates).\n- Step 2: Solve any TWO of the three equations simultaneously (using calculator or elimination) to find the parameters. Use the third equation as a check.\n- Step 3: Substitute back to find the intersection coordinates. Write the answer as coordinates (a,b,c), NOT as a column vector — exam convention requires row/coordinates form.\n\n**Takeaway:** Three equations, two parameters — solve any two and verify with the third. Always give final answer in coordinate form.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "For the integral ∫₀^{π/2} sin(2θ) / (3 + cosθ)² dθ, using u = 3 + cosθ, what are the new limits and why does the order reverse? (3 steps)", "answer": "- Step 1: Transform the limits using u = 3 + cosθ:\n   - When θ = 0: u = 3 + cos(0) = 3 + 1 = 4\n   - When θ = π/2: u = 3 + cos(π/2) = 3 + 0 = 3\n- Step 2: The lower limit corresponds to θ = 0 → u = 4; upper limit corresponds to θ = π/2 → u = 3. The order reverses because cos decreases from 1 to 0 as θ increases from 0 to π/2.\n- Step 3: Write the integral with new limits: ∫₄³ (stuff) du. You must preserve this order — the integral from 4 to 3 is negative, which matches the original.\n\n**Takeaway:** When substituting, always transform BOTH limits. The new upper limit may be smaller than the new lower limit — this is fine, just keep the order.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "In the substitution u = 3 + cosθ, why can't you treat cosθ as a constant when integrating? What should you do instead? (2 steps)", "answer": "- Step 1: cosθ is NOT a constant — it varies with θ. You cannot factor it out of the integral. This was a common error: trying to take \"cosθ\" outside as if it were a number.\n- Step 2: Instead, use the substitution relationship: since u = 3 + cosθ, then cosθ = u - 3. Replace all cosθ terms in the integrand with (u - 3).\n\n**Takeaway:** Any term depending on the variable of integration must be expressed in terms of the new variable u before integrating.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "After simplifying the integral with u = 3 + cosθ, you obtain ∫(u - 3)/u^{1/2} du. How do you integrate this? (2 steps)", "answer": "- Step 1: Split the fraction: (u/u^{1/2}) - (3/u^{1/2}) = u^{1/2} - 3u^{-1/2}.\n- Step 2: Use the power rule (NOT logarithm): ∫u^{1/2} du = (2/3)u^{3/2}; ∫3u^{-1/2} du = 3 × 2u^{1/2} = 6u^{1/2}. So the integral = (2/3)u^{3/2} - 6u^{1/2} + C.\n\n**Takeaway:** If the power is not -1, use the power rule (raise power by 1, divide by new power). Only use ln|u| when the power becomes exactly -1.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "Expand (2 + 5x)⁻² using the binomial series. Why can't you use the standard (1 + x)ⁿ formula directly? (3 steps)", "answer": "- Step 1: The standard binomial formula requires the first term to be 1. So factor out the 2: (2 + 5x)⁻² = 2⁻²(1 + 5x/2)⁻² = (1/4)(1 + (5x/2))⁻².\n- Step 2: Use the general binomial formula with n = -2: (1 + u)ⁿ = 1 + n u + n(n-1)/2! u² + n(n-1)(n-2)/3! u³ + ... where n = -2 and u = 5x/2.\n- Step 3: Compute first terms: 1 + (-2)(5x/2) + (-2)(-3)/2 × (5x/2)² = 1 - 5x + (15/4)(25x²/4) = 1 - 5x + (375/16)x² + ... Then multiply by 1/4.\n\n**Takeaway:** For negative (or fractional) powers, you MUST use the general binomial formula (bottom version in formula book), not the integer-only version.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": true}, {"question": "What is the range of convergence for the binomial series expansion of (2 + 5x)⁻²? How do you find it? (2 steps)", "answer": "- Step 1: After factoring, we have (1 + 5x/2)⁻². The binomial series converges when |5x/2| < 1, i.e., |x| < 2/5.\n- Step 2: This comes from the general term containing (5x/2)^k — for convergence, this must tend to zero as k → ∞, which requires |5x/2| < 1.\n\n**Takeaway:** The convergence condition is always |coefficient × x| < 1 after factoring to (1 + something).", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "Write the formula for the volume of revolution when rotating a curve y = f(x) about the x-axis from x = a to x = b. What if you rotate about the y-axis instead? (2 steps)", "answer": "- For rotation about the x-axis: V = π∫_{a}^{b} y² dx = π∫_{a}^{b} [f(x)]² dx\n- For rotation about the y-axis: V = π∫_{c}^{d} x² dy (where x is expressed as a function of y, or use x = g(y))\n- For rotation by angle θ (instead of full 2π): V = (θ/2π) × π∫y² dx = (θ/2)∫y² dx (where θ is in radians)\n\n**Takeaway:** The variable in the integral matches the axis of rotation: dx for x-axis, dy for y-axis. The function gets squared.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "Solve the separable differential equation dy/dx = x·y². (3 steps)", "answer": "- Step 1: Rearrange to separate variables: dy/y² = x dx\n- Step 2: Integrate both sides: ∫y⁻² dy = ∫x dx\n- Step 3: Apply power rule: -y⁻¹ = x²/2 + C, or y = -1/(x²/2 + C)\n\n**Takeaway:** For separable equations, get all y terms on one side, all x terms on the other, then integrate both sides.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "Solve the first-order linear differential equation dy/dx + 2xy = 3x using an integrating factor. (4 steps)", "answer": "- Step 1: Identify P(x) = 2 and Q(x) = 3x. The integrating factor IF = e^{∫P dx} = e^{∫2 dx} = e^{2x}.\n- Step 2: Multiply both sides by IF: e^{2x}dy/dx + 2xe^{2x}y = 3xe^{2x}\n- Step 3: Recognize left side as d/dx[y·e^{2x}]: d/dx[y·e^{2x}] = 3xe^{2x}\n- Step 4: Integrate: y·e^{2x} = ∫3xe^{2x} dx. Use integration by parts or substitution to find y = (3/2 - 3/(4x) + Ce^{-2x}) ... (complete the integration)\n\n**Takeaway:** The integrating factor IF = e^{∫P dx} turns the left side into the derivative of (y × IF).", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "In composite functions, how do you correctly form fg(x) vs gf(x)? What is a common mistake? (2 steps)", "answer": "- Step 1: fg(x) means apply g first, then f: fg(x) = f(g(x)). The notation reads right-to-left — g is the inner function, f is the outer.\n- Step 2: A common mistake is reversing the order — writing f(g(x)) as g(f(x)). Also, students sometimes apply the outer function to both sides of an equation incorrectly, losing track of which function is applied to which expression.\n\n**Takeaway:** Always read composite notation from right to left: fg = \"f after g\", gf = \"g after f\".", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "When writing polynomial long division like (5x+3)/(x+2), what is the correct form to use for finding asymptotes, and what is a common error? (2 steps)", "answer": "- Step 1: Write as quotient + remainder/divisor: (5x+3)/(x+2) = 5 + (-7)/(x+2). This shows the horizontal asymptote y=5 and vertical asymptote x=-2.\n- Step 2: A common error is writing it as 5(x+2) - 7 instead of 5 + (-7)/(x+2). The key is the remainder must be divided by the divisor, not just written as a term.\n\n**Takeaway:** For asymptote analysis, always express as quotient + remainder/divisor — this reveals the horizontal asymptote (quotient constant).", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": true}, {"question": "For the nested squares problem, if instead of 1/3, the points were marked at 1/2 along each side, what would be the area ratio of each successive square? (2 steps)", "answer": "- Step 1: With side length 1 for the outer square, marking at 1/2 creates a diagonal across the square. Using coordinates: vertices at (0,½), (½,0), (1,½), (½,1) — the inner square is actually a diamond with side length √[(½)² + (½)²] = √(1/2).\n- Step 2: Area = (√(1/2))² = 1/2. Outer area = 1. Ratio = 1/2. Each successive square is half the area of the previous one.\n\n**Takeaway:** Different fractions along the side produce different area ratios — the geometry always involves Pythagoras or coordinate geometry.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "In the implicit differentiation result dy/dx = (12 - 4x + 2y)/(y - x), what happens when y = x? What does this represent geometrically? (2 steps)", "answer": "- Step 1: When y = x, the denominator y - x = 0, so dy/dx is undefined (vertical tangent or asymptote in the slope).\n- Step 2: Geometrically, this means the curve has a vertical tangent line at points where y = x. You cannot find a finite gradient at such points — the tangent is vertical (slope → ∞).\n\n**Takeaway:** A zero denominator in dy/dx indicates a vertical tangent — the curve is locally steep/vertical there.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "Why is it important to show all steps in vector intersection problems, even if using a calculator's simultaneous equations solver? (2 steps)", "answer": "- Step 1: The exam awards method marks for setting up the three component equations correctly. Even if the calculator gives the answer instantly, you need to show the setup: equating x-components, y-components, and z-components.\n- Step 2: Additionally, you must write the final intersection point as coordinates (a,b,c), not as a column vector — this is an explicit exam requirement and is often missed.\n\n**Takeaway:** Calculator efficiency doesn't replace showing your setup — and always present the final answer in the required format.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}], "count": 19}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "In a nested squares problem where points are joined 1/3 along each side of a square to form a smaller square, and this process is repeated, what is the area of the fourth square as a fraction of the original? (3 steps)", "answer": "- Step 1: Pick a convenient length for the outer square side. Let this length = 3 (chosen because 1/3 of 3 = 1, making the inner square vertices easy to locate). The inner square's diagonal runs from a point 1 unit from a corner along one side to a point 1 unit along the adjacent side.\n- Step 2: Use Pythagoras to find the inner square's side length. The diagonal forms a right triangle with legs of length 1 and 2 (from corner to 1/3 point, then 1/3 point to adjacent 1/3 point). So inner side = $$\\sqrt{1^2 + 2^2} = \\sqrt{5}$$.\n- Step 3: Area ratio = inner area ÷ outer area = $$(\\sqrt{5})^2 \\div 3^2 = 5 \\div 9 = \\frac{5}{9}$$. For the fourth square, this ratio cubed: $$\\left(\\frac{5}{9}\\right)^3 = \\frac{125}{729}$$.\n\nThe pattern is geometric — each iteration multiplies by the same ratio.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "Why can we assume the area ratio in a nested squares problem is independent of the actual size of the original square? What are the implications for choosing convenient lengths?", "answer": "The ratio between areas of similar shapes depends only on the ratio of their corresponding linear dimensions, not their absolute size. If we scale the entire figure by a factor k, all lengths scale by k, but the ratio of any two areas scales by k² ÷ k² = 1 (cancels out).\n\nThis means we can choose any convenient length that makes the calculation easiest. In the 1/3-along-sides case, choosing side length = 3 (so 1/3 = 1) gives integer coordinates (0, 1), (1, 0), etc., making Pythagoras trivial. Picking side = 1 would give fractions like 1/3.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "For the function g(x) = (5x+3)/(x+2) with domain x > -2, what is the range of g(x)? Explain using polynomial long division. (3 steps)", "answer": "- Step 1: Perform polynomial long division: divide 5x+3 by x+2. 5x ÷ x = 5. Multiply back: 5(x+2) = 5x+10. Subtract: (5x+3) - (5x+10) = -7. So g(x) = 5 + (-7)/(x+2) = 5 - 7/(x+2).\n- Step 2: This is a transformation of y = -1/x. The -7 gives a vertical stretch by factor 7 (and flips the branch), x+2 translates 2 units right, and +5 translates 5 units up. The vertical asymptote is x = -2, horizontal asymptote is y = 5.\n- Step 3: For x > -2 (the right-hand branch), as x → -2⁺, -7/(x+2) → -∞, so g(x) → -∞. As x → ∞, -7/(x+2) → 0⁻, so g(x) → 5⁻. The function approaches but never reaches y = 5. Therefore, range is y < 5 (or in interval notation: (-∞, 5)).", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "If the range of a function g(x) is y < 5, what is the domain of its inverse function g⁻¹(x)? Why is it important to distinguish between domain and range notation?", "answer": "By definition, the domain of the inverse function equals the range of the original function, and vice versa. So the domain of g⁻¹ is x < 5.\n\nIt matters enormously whether you write \"x < 5\" or \"y < 5\": domain uses x, range uses y. Swapping these loses a mark. So you'd write \"domain of g⁻¹: x < 5\" explicitly.\n\nThis is because when we invert, we swap the roles of input and output — what was an output (y-values) becomes an input (x-values).", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "When expressing g(x) = (5x+3)/(x+2) in polynomial long division form, why is it wrong to write 5(x+2) - 7 instead of 5 + (-7)/(x+2)? What format is required? (2 steps)", "answer": "- Step 1: The form \"5(x+2) - 7\" expands to 5x + 10 - 7 = 5x + 3, which equals the numerator correctly. However, this hasn't actually performed the division — it's just rewritten the numerator algebraically. It doesn't show the quotient + remainder/divisor form.\n- Step 2: The correct form is \"quotient + remainder/divisor\" = 5 + (-7)/(x+2). This explicitly shows that g(x) = 5 + (-7)/(x+2), revealing it's a transformed reciprocal function with horizontal asymptote y = 5 and vertical asymptote x = -2. This form is essential for identifying the graph's behavior.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "For implicit differentiation of 2xy, why must we use the product rule, and what is the correct expansion including brackets? (2 steps)", "answer": "- Step 1: In implicit differentiation, y is treated as a function of x (y = f(x)), so when we differentiate xy, the product rule is required because both x and y vary with respect to x.\n- Step 2: The correct product rule expansion is: d(xy)/dx = x·(dy/dx) + y·1. The brackets around the entire expansion [x(dy/dx) + y] are critical. Without them, when rearranging to solve for dy/dx, sign errors occur. For example, forgetting brackets might lead to incorrectly moving terms.\n\nThe expansion literally says: differentiate the first factor (x → 1) times the second plus the first times differentiate the second (y → dy/dx).", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "In a question where point P(a,b) lies on a curve and the gradient at P equals 2, why do we have TWO equations in a and b, not just one? What are these equations?", "answer": "We have two unknowns (a and b), so we need two equations:\n\n- Equation 1 comes from the gradient condition: substituting dy/dx = 2 at point (a,b) into the derivative formula gives one equation involving a and b.\n- Equation 2 comes from the fact that P lies ON the curve — we substitute x = a, y = b into the curve equation itself.\n\nA common mistake is only using the gradient condition and getting stuck with one equation in two unknowns. Students forget that \"P lies on the curve\" is the second piece of information providing the second equation.\n\nFor example, if the curve is 4x² + y² = 20 and gradient = 2 at P, we get: 4a + b = 12 from gradient, AND 4a² + b² = 20 from curve membership.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "When solving two lines in 3D that intersect at point P, how do we set up the equations? What three equations form, and why can we solve them using only two of them? (3 steps)", "answer": "- Step 1: Represent each line in vector form R = a + λd. At the intersection point P, the position vectors are equal: R₁ = R₂. This gives one vector equation.\n- Step 2: Write the three component equations by equating x, y, and z components separately. For example: 2+λ = -1+2μ, -1+4λ = β-μ, 3+2λ = 6+7μ.\n- Step 3: We have three equations in three unknowns (λ, μ, and any constant like β). However, if solving for intersection coordinates, we only need λ and μ — two equations suffice. The third equation acts as a check or can determine a parameter like β.\n\nIn the exam, use your calculator's simultaneous equation solver (unless banned), then substitute back to find the intersection point.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "When finding the intersection point of two lines in vector form, why must the final answer be written as coordinates (a,b,c) rather than as a column vector?", "answer": "The exam specification explicitly requires coordinates in row form, not column vector form. While mathematically equivalent, the answer format is a procedural requirement. Writing a column vector when coordinates are expected loses marks.\n\nFor example, write: \"P has coordinates (3, -1, 7)\" not \"$$\\begin{pmatrix}3 \\\\ -1 \\\\ 7\\end{pmatrix}$$\" unless the question explicitly asks for vector form.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "In the integral ∫(from 0 to π/2) sin(2θ)/(3+cosθ)² dθ with substitution u = 3 + cosθ, what are the correct transformed limits? (3 steps)", "answer": "- Step 1: When θ = 0, u = 3 + cos(0) = 3 + 1 = 4.\n- Step 2: When θ = π/2, u = 3 + cos(π/2) = 3 + 0 = 3.\n- Step 3: The limits swap order: lower limit becomes 4, upper limit becomes 3. This happens because du/dθ = -sin θ < 0 over [0, π/2], so u decreases as θ increases. The order must be preserved to maintain the integral's sign. DO NOT assume the bigger number goes on top.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "In integration by substitution, why can't we treat cos θ as a constant when it appears inside an integral with respect to θ? What is the correct approach?", "answer": "cos θ is NOT a constant — it's a variable that depends on θ. You cannot factor it out of the integral because its value changes as θ changes. This is a common error.\n\nThe correct approach: use the substitution relationship u = 3 + cos θ to express cos θ in terms of u: cos θ = u - 3. Then substitute this expression wherever cos θ appears.\n\nFor example, after simplifying the integral using du/dθ = -sin θ, we might get something like ∫ (cos θ)/√u du. Replace cos θ with (u - 3), giving ∫ (u - 3)/√u du.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "After substituting in an integral and simplifying, you obtain ∫ (u^(1/2) - 3u^(-1/2)) du. Is this an logarithmic integral? What is the correct integration method? (2 steps)", "answer": "- Step 1: No, this is NOT a logarithmic integral. Logarithms appear when we integrate 1/u (i.e., u^(-1)), not when we have other powers of u. These are simple power functions.\n- Step 2: Use the power rule: ∫ u^n du = u^(n+1)/(n+1) + C, provided n ≠ -1.\n\nSo: ∫ u^(1/2) du = (2/3)u^(3/2), and ∫ (-3)u^(-1/2) du = -3 × (2)u^(1/2) = -6u^(1/2).\n\nThe key is raising the power by 1 and dividing by the new power — this works for any n ≠ -1.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "When expanding (2 + 5x)^(-2) using the binomial series, why can't we use the standard binomial formula for positive integers? What must we do first? (3 steps)", "answer": "- Step 1: The standard binomial formula (top of formula book page) only works for n = 1, 2, 3, ... (positive integers). Since n = -2 is negative, we MUST use the \"n can be any real number\" version (bottom of formula book page).\n- Step 2: This formula requires the first term to be 1 (inside the bracket). Currently we have (2 + 5x)^(-2), with first term 2. We must factor out the 2: (2 + 5x)^(-2) = 2^(-2) × (1 + (5x/2))^(-2).\n- Step 3: Now apply the general binomial series: (1 + u)^n = 1 + n u + n(n-1)/2! × u² + ... with n = -2 and u = 5x/2.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "What is the range of validity (convergence interval) for the binomial expansion of (1 + 5x/2)^(-2)? How is this determined from the formula?", "answer": "For the general binomial series to converge, we require |u| < 1, where u is the variable term inside the bracket. Here u = 5x/2.\n\nSo |5x/2| < 1 means |x| < 2/5.\n\nThis is because the binomial series for non-integer (or negative) n is an infinite series analogous to a geometric series, which converges only when |u| < 1. If |x| ≥ 2/5, the series diverges.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "What is the formula for the volume of revolution when rotating a curve y = f(x) about the x-axis? How does it change for rotation about the y-axis or through an angle θ? (2 steps)", "answer": "- Step 1: About the x-axis: V = π∫[y²]dx (from a to b). About the y-axis: V = π∫[x²]dy. The key is: square the function that describes the radius, then integrate with respect to the variable of rotation.\n- Step 2: When rotating through an angle θ (in radians) rather than full 360°, the volume is proportional to the angle: V = (θ/2π) × (π∫r²dr) = (θ/2)∫r²dr. For rotation about x-axis through angle θ: V = (θ/2)∫[f(x)]² dx. The full rotation (θ = 2π) gives the standard formula.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "For a separable differential equation dy/dx = f(x)g(y), how do we solve it? What is the general solution method?", "answer": "- Step 1: Rearrange to separate variables: dy/g(y) = f(x)dx. All y terms go on one side, all x terms on the other.\n- Step 2: Integrate both sides: ∫[1/g(y)] dy = ∫f(x) dx.\n- Step 3: Evaluate both integrals and combine with the constant of integration to get the general solution.\n\nFor example, dy/dx = 2xy becomes dy/y = 2x dx. Integrating: ln|y| = x² + C. So y = Ae^(x²).", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "For a first-order linear differential equation dy/dx + P(x)y = Q(x), what is an integrating factor and how does it help solve the equation? (2 steps)", "answer": "- Step 1: The integrating factor (IF) is μ(x) = e^(∫P(x)dx). This is a function that, when multiplied through the entire equation, turns the left-hand side into something that can be integrated directly.\n- Step 2: Multiply the entire equation by μ(x): μ(dy/dx) + μP(x)y = μQ(x). By construction, the left-hand side now equals d/dx[μy]. So d/dx[μy] = μQ(x). Integrate both sides: μy = ∫μQ(x)dx + C. Finally, solve for y: y = (1/μ)[∫μQ(x)dx + C].\n\nThe integrating factor \"linearises\" the equation by creating a perfect derivative on the left.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "In composite function problems like finding fg(x) where f(x) = ln(x) and g(x) = e^(2a), what is the correct order of composition? What is a common mistake?", "answer": "- Step 1: fg(x) means \"f followed by g\" — apply f first, then apply g to the result. fg(x) = g(f(x)). If f(x) = ln(x) and g(x) = e^(2a), then fg(x) = g(f(x)) = e^(2·f(x)) = e^(2·ln(x)) = e^(ln(x²)) = x².\n- Step 2: A common mistake is reversing the order: computing gf(x) = f(g(x)) = ln(e^(2a)) = 2a instead of x². The notation fg means apply f to x, then apply g to that result.\n\nThe confusion often arises when both functions involve transformations. Remember: the rightmost function in fg(x) is applied first.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "For the function y = (5x+3)/(x+2), describe the graph transformation from y = -1/x to get y = 5 - 7/(x+2). What are the asymptotes?", "answer": "- Step 1: Start with y = -1/x. This has vertical asymptote x = 0 and horizontal asymptote y = 0.\n- Step 2: The transformation sequence:\n  - Multiply by 7: y = -7/x → vertical stretch by factor 7 (also flips the branch)\n  - Inside the bracket (x → x+2): translate 2 units right → vertical asymptote at x = -2\n  - Outside (add 5): translate 5 units up → horizontal asymptote at y = 5\n- Step 3: So y = 5 - 7/(x+2) has vertical asymptote x = -2 and horizontal asymptote y = 5. For the restricted domain x > -2, we're on the right branch only, approaching y = 5 from below.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "In implicit differentiation, after applying the product rule to terms like 2xy and collecting dy/dx terms, why is it important to factor out dy/dx before dividing? What common errors occur?", "answer": "- Step 1: After differentiating 4x² + 2xy - 2xy² = 24, you get terms like 8x + 2[x(dy/dx) + y] - 2[x(2y·dy/dx) + y²] = 0. Collecting dy/dx terms gives (2x - 4xy)dy/dx + (8x + 2y - 2y²) = 0.\n- Step 2: Factor out dy/dx: dy/dx(2x - 4xy) = 2y² - 8x - 2y. Then divide: dy/dx = (2y² - 8x - 2y)/(2x - 4xy).\n- Common errors: Forgetting brackets in product rule expansion (should be [x·dy/dx + y], not x·dy/dx + y); sign errors when moving terms to the other side; not simplifying by dividing by common factors (like 2) at the end.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "Why does the ratio of consecutive terms in a geometric sequence remain constant, and how does this apply to finding the area of the nth nested square?", "answer": "In a geometric sequence, each term is obtained by multiplying the previous term by a fixed ratio r. If the first area is A₁ and the ratio is r = 5/9, then:\n- Area of square 1: A₁ (original)\n- Area of square 2: A₁ × r\n- Area of square 3: A₁ × r²\n- Area of square n: A₁ × r^(n-1)\n\nFor the fourth square relative to the first: A₄/A₁ = r³ = (5/9)³ = 125/729. The geometric nature comes from similarity — each inner square is similar to the previous one (same shape, scaled size), so area scales by the square of the linear scale factor, which is constant.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "In vectors, when solving for intersection of two lines with parameters λ and μ, why do we sometimes need to find a third variable (like β) in the line equations? How is this different from finding λ and μ?", "answer": "- Step 1: The third variable (like β in \"R = (-1, β-μ, 6+7μ)\") is a fixed parameter defining one of the lines — it's not a free parameter like λ or μ. It must be determined from the intersection condition.\n- Step 2: When solving R₁ = R₂, we get three equations in λ, μ, and β. Solve any two for λ and μ (e.g., equations from x and z components), then substitute into the third equation (y-component) to solve for β.\n- Step 3: The question typically asks to find β AND the coordinates of P. So after finding β, substitute λ (or μ) back into either line's equation to get the intersection point coordinates.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "When using u-substitution in integration, why must we also transform the differential (dθ = -du/sin θ)? What happens if we forget to do this?", "answer": "- Step 1: When we substitute u = f(x), we're changing the variable of integration. The derivative du/dx = f'(x) gives us the relationship between differentials: du = f'(x)dx, or dx = du/f'(x).\n- Step 2: In the sin(2θ) example: u = 3 + cos θ, so du/dθ = -sin θ. Rearranging: dθ = -du/sin θ. This factor must multiply the integrand when we substitute.\n- If you forget this and just replace dθ with du, you miss the -1/sin θ factor, giving an entirely wrong answer. The differential transformation is essential to preserve the equality of the integral.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "For the binomial expansion (2 + 5x)^(-2), write out the first three non-zero terms. What pattern emerges in the coefficients? (3 steps)", "answer": "- Step 1: Factor: (2 + 5x)^(-2) = 2^(-2)(1 + 5x/2)^(-2) = (1/4)(1 + 5x/2)^(-2)\n- Step 2: Apply binomial series with n = -2, u = 5x/2:\n  - (1 + u)^(-2) = 1 + (-2)u + (-2)(-3)/2! × u² + (-2)(-3)(-4)/3! × u³ + ...\n  - = 1 - 2u + 3u² - 4u³ + ...\n- Step 3: Substitute u = 5x/2:\n  - = 1 - 2(5x/2) + 3(5x/2)² - 4(5x/2)³ + ...\n  - = 1 - 5x + (75/4)x² - (125/2)x³ + ...\n\nThen multiply by 1/4: = 1/4 - (5/4)x + (75/16)x² - (125/8)x³ + ...", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "Explain why the binomial series for (1 + u)^n converges only when |u| < 1 for non-integer n. What happens when |u| ≥ 1?", "answer": "- Step 1: The general binomial series for non-integer n is: 1 + n u + n(n-1)/2! × u² + n(n-1)(n-2)/3! × u³ + ... This is analogous to the geometric series 1 + u + u² + u³ + ... which converges only for |u| < 1.\n- Step 2: For non-integer n, the series is infinite (not terminating). Similar to the geometric series, as n → ∞, terms grow unless |u| < 1. When |u| ≥ 1, the terms don't tend to zero, so the series diverges.\n- For integer n ≥ 0, the series terminates after n+1 terms, so it's a polynomial and converges for all x. This is why the formula book has two versions — one for positive integers (terminating), one for any real n (potentially infinite).", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": true}, {"question": "A curve is rotated about the x-axis between x = a and x = b. If the rotation is only through an angle of 60° rather than full 360°, how does the volume formula change? What is the volume in terms of the full rotation volume?", "answer": "- Step 1: The full rotation volume is V_full = π∫[f(x)]² dx from a to b.\n- Step 2: Rotating through angle θ (in radians) gives volume proportional to θ/2π (the fraction of the full circle): V_θ = (θ/(2π)) × V_full = (θ/2)∫[f(x)]² dx.\n- Step 3: For θ = 60° = π/3 radians: V = (π/3)/2 × ∫[f(x)]² dx = (π/6)∫[f(x)]² dx = (1/3) × V_full (since π/6 = (1/3) × π).\n\nSo rotating 60° (1/6 of a full circle) gives 1/6 of the full volume: V = (1/6) × V_full.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "Solve the differential equation dy/dx = xy with y(0) = 2. What type of equation is this and what method applies? (3 steps)", "answer": "- Step 1: This is a separable differential equation. Separate variables: dy/y = x dx.\n- Step 2: Integrate both sides: ∫(1/y) dy = ∫x dx → ln|y| = x²/2 + C.\n- Step 3: Use initial condition y(0) = 2: ln|2| = 0 + C → C = ln 2. So ln|y| = x²/2 + ln 2. Then |y| = e^(x²/2 + ln 2) = e^(x²/2) × 2 = 2e^(x²/2). Since y(0) = 2 > 0, y = 2e^(x²/2).\n\nThis is an exponential growth function where the rate of growth is proportional to both y and x.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "Find the integrating factor and solve dy/dx + (2/x)y = x². (3 steps)", "answer": "- Step 1: Identify P(x) = 2/x. The integrating factor is μ(x) = e^(∫P dx) = e^(∫2/x dx) = e^(2 ln|x|) = |x²| = x² (for x > 0).\n- Step 2: Multiply through by μ: x²(dy/dx) + x²(2/x)y = x² × x² → x² dy/dx + 2xy = x⁴. The left side is d/dx[x²y].\n- Step 3: So d/dx[x²y] = x⁴. Integrate: x²y = ∫x⁴ dx = x⁵/5 + C. Therefore, y = x³/5 + Cx^(-2).\n\nCheck: differentiate this to verify it satisfies the original equation.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "In the ESAT exam, why is it important to know key squares and cubes (like 5³ = 125, 9³ = 729) without calculating? How does this help with time pressure?", "answer": "ESAT has significant time pressure — typically 1 minute per question or less. The nested squares problem requires cubing 5/9: (5/9)³ = 125/729.\n\nIf you know 5³ = 125 and 9³ = 729 immediately, you save 30-60 seconds. Over 20-25 questions, this can save 10-20 minutes.\n\nKey memorization: squares up to 20² = 400, cubes up to 10³ = 1000, and common powers like 2⁴ = 16, 2⁵ = 32, 2⁶ = 64, etc. These appear frequently in ESAT-style questions involving ratios, areas, and algebraic manipulation.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "For the curve 4x² + xy - y² = 20 with gradient 2 at point P(a,b), set up the simultaneous equations to find coordinates of P. (2 steps)", "answer": "- Step 1: From the implicit differentiation result (using product rule on xy): dy/dx = (8x + y)/(x - 2y). Set equal to 2 at (a,b): (8a + b)/(a - 2b) = 2 → 8a + b = 2a - 4b → 6a + 5b = 0, or equivalently b = -6a/5.\n- Step 2: Point P lies on the curve: 4a² + ab - b² = 20. Substitute b = -6a/5: 4a² + a(-6a/5) - (-6a/5)² = 20 → 4a² - (6/5)a² - (36/25)a² = 20. Multiply by 25: 100a² - 30a² - 36a² = 500 → 34a² = 500 → a² = 250/17. Then find b from b = -6a/5.\n\nTwo equations from two different pieces of information: gradient condition + curve membership.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}], "count": 30}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "In a \"nested squares\" problem (joining points 1/3 along each side to form a smaller square), why is it legitimate to *pick* the side length to be 1 (or any number) rather than calling it $$x$$?", "answer": "The question asks for a *fraction* (ratio) of areas, not an absolute area. Since the ratio is dimensionless and scale-invariant — meaning scaling the whole figure by any factor $$k$$ multiplies every area by $$k^2$$, which cancels in the ratio — the final answer is independent of the chosen length. So we choose the most convenient number (here, the third-segment $$=1$$, full side $$=3$$) to avoid algebraic clutter.\n\n*Whenever a problem asks for a ratio or fraction, choose convenient numbers.*", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "For the nested-square design (joining 1/3 points), set the small segment to 1. Explain conceptually how Pythagoras gives the inner-square side length and what the area ratio (inner:outer) is. (3 steps)", "answer": "- Step 1: The full side is $$3$$. Joining a 1/3 point on one side to a 1/3 point on the next side creates a right triangle with legs $$1$$ and $$2$$ (since the side splits as $$1+2$$).\n- Step 2: The hypotenuse of this triangle IS the side of the inner square, so inner side $$= \\sqrt{1^2 + 2^2} = \\sqrt{5}$$.\n- Step 3: Inner area $$= 5$$, outer area $$= 9$$, so ratio $$= 5/9$$.\n\n*Each iteration multiplies the area by $$5/9$$ — the ratio between consecutive squares is constant.*", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "If each new square in a repeating \"1/3-point\" construction has area $$5/9$$ of the previous one, how do you express the area of the $$n$$-th square as a fraction of the original?", "answer": "- Step 1: Going from square 1 to square 2 multiplies by $$5/9$$ once.\n- Step 2: Square 3 needs another factor of $$5/9$$, giving $$(5/9)^2$$.\n- Step 3: Square $$n$$ requires $$n-1$$ applications of the ratio, so its area is $$(5/9)^{n-1}$$ times the original. The 4th square is $$(5/9)^3 = 125/729$$.\n\n*The iteration count is one less than the square number — common off-by-one trap.*", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "Why does Harry recommend memorising key squares and cubes (like $$5^3 = 125$$, $$9^3 = 729$$) for ESAT-style questions?", "answer": "ESAT is time-pressured, and questions often funnel you into needing $$n^2$$ or $$n^3$$ at the end. If you must compute $$5\\times 5 \\times 5$$ longhand, you've lost ~30 seconds per question. Memorising small cubes turns a multi-step calculation into instant recognition — the marks are the same, but the time saved compounds across the paper.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "When dividing $$5x+3$$ by $$x+2$$, why must the answer be written as $$5 + \\dfrac{-7}{x+2}$$ rather than $$5(x+2) - 7$$? (3 steps)", "answer": "- Step 1: Polynomial long division produces *quotient + remainder/divisor* — it's a rewrite of the **fraction**, not the numerator.\n- Step 2: $$5(x+2)-7$$ is just the original numerator $$5x+3$$ rewritten — it's not a different form of the *function* $$(5x+3)/(x+2)$$ unless you divide everything by $$x+2$$.\n- Step 3: Dividing through gives $$\\frac{5(x+2)}{x+2} - \\frac{7}{x+2} = 5 - \\frac{7}{x+2}$$. This form reveals the function as a transformation of $$-1/x$$, which is what's needed for graphing.\n\n*The whole point of long division is to turn an improper rational function into a constant + a simpler fraction.*", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": true}, {"question": "Express $$g(x) = \\dfrac{5x+3}{x+2}$$ as a transformation of a known graph family. What family is it in and which transformations apply? (3 steps)", "answer": "- Step 1: Long division gives $$g(x) = 5 - \\dfrac{7}{x+2}$$, i.e. $$5 + 7\\cdot\\left(-\\dfrac{1}{x+2}\\right)$$.\n- Step 2: Base graph is $$h(x) = -1/x$$ (note the minus — opposite branches to $$1/x$$).\n- Step 3: Transformations applied to $$h$$:\n+ Inside bracket $$x+2$$ → translation 2 units **left**\n+ Multiplied by 7 outside → vertical stretch ×7\n+ $$+5$$ outside → translation 5 units **up**\n\n*Asymptotes shift accordingly: vertical from $$x=0$$ to $$x=-2$$; horizontal from $$y=0$$ to $$y=5$$.*", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "For $$g(x) = 5 - \\dfrac{7}{x+2}$$ with domain $$x > -2$$, what is the range, and why is $$y=5$$ excluded?", "answer": "- Step 1: The horizontal asymptote is $$y=5$$ (as $$x\\to\\infty$$, the $$-7/(x+2)$$ term $$\\to 0$$).\n- Step 2: For $$x > -2$$, the denominator $$x+2$$ is positive, so $$-7/(x+2)$$ is **negative**, meaning $$g(x) < 5$$ always.\n- Step 3: $$y=5$$ is an asymptote — approached but never reached. Range: $$y < 5$$.\n\n*Asymptotes are limits, not values — that's why strict inequality.*", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "Why does the range of the original function become the *domain* of its inverse?", "answer": "- Step 1: An inverse $$g^{-1}$$ reverses the role of input and output: if $$g: x \\mapsto y$$, then $$g^{-1}: y \\mapsto x$$.\n- Step 2: The set of $$y$$-values that $$g$$ actually produces is its range. These are precisely the inputs $$g^{-1}$$ can accept.\n- Step 3: So domain of $$g^{-1}$$ = range of $$g$$. Similarly, range of $$g^{-1}$$ = domain of $$g$$.\n\n*Graphically, reflecting $$y=g(x)$$ in the line $$y=x$$ swaps the horizontal and vertical extents.*", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": true}, {"question": "A student found the inverse function's equation but lost a mark. What did they forget, and why is this a recurring trap?", "answer": "They forgot to state the **domain** of the inverse. Many exam questions only say \"find the inverse function\" without explicitly saying \"state its domain\" — students treat \"function\" as just the equation, but a function is technically a rule *plus* a domain. Examiners reserve a mark for the domain. Always state it.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "When stating a domain you must write $$x < \\ldots$$ and for a range $$y < \\ldots$$ — why is using the wrong letter marked wrong?", "answer": "Domain refers to input values (conventionally labelled $$x$$), range to output values (conventionally $$y$$ or $$f(x)$$). Writing $$y < 5$$ for a domain implies the function's outputs are bounded, which is a different claim. The notation encodes meaning, so swapping the variable letter changes the mathematical statement and the mark is lost.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "When forming $$fg(x)$$, which function acts first, and why is order critical? (3 steps)", "answer": "- Step 1: Read right to left: $$fg(x) = f(g(x))$$. The **inner** function $$g$$ acts first on $$x$$.\n- Step 2: The output of $$g$$ is then fed into $$f$$.\n- Step 3: If you accidentally compute $$g(f(x))$$ instead — e.g. you wrap $$\\ln$$ around an already-$$\\ln$$ expression — you get a totally different equation (the example in the tutorial produced $$\\ln$$ on both sides incorrectly).\n\n*Memory aid: in $$fg(x)$$, $$g$$ is \"closer to $$x$$\" so $$g$$ touches $$x$$ first.*", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": true}, {"question": "When implicitly differentiating a product like $$xy$$ with respect to $$x$$, why is bracketing the product-rule result essential? (3 steps)", "answer": "- Step 1: $$\\dfrac{d}{dx}(xy) = x\\dfrac{dy}{dx} + y$$ — a sum of two terms.\n- Step 2: If this product appears with a coefficient (e.g. $$-2xy$$), forgetting brackets gives $$-2x\\dfrac{dy}{dx} + y$$ instead of $$-2\\left(x\\dfrac{dy}{dx} + y\\right) = -2x\\dfrac{dy}{dx} - 2y$$.\n- Step 3: The missing minus sign on the $$2y$$ produces a sign error that cascades through every later step — a notorious mark-loser.\n\n*Always write the product-rule output in brackets, then distribute the coefficient.*", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "Why does differentiating $$y^2$$ with respect to $$x$$ give $$2y\\dfrac{dy}{dx}$$ rather than $$2y$$?", "answer": "- Step 1: $$y$$ is itself a function of $$x$$, so $$y^2$$ is a composite function of $$x$$.\n- Step 2: By the chain rule, $$\\dfrac{d}{dx}[y^2] = \\dfrac{d(y^2)}{dy}\\cdot\\dfrac{dy}{dx} = 2y\\cdot\\dfrac{dy}{dx}$$.\n- Step 3: The extra $$dy/dx$$ factor is the chain-rule \"tail\" — it's what distinguishes implicit from explicit differentiation.\n\n*If you ever differentiate $$y$$-terms and get no $$dy/dx$$ appearing, you've forgotten the chain rule.*", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": true}, {"question": "After implicit differentiation gives $$\\dfrac{dy}{dx} = \\dfrac{12 - 4x + 2y}{y - x}$$ and a point $$P(a,b)$$ has gradient 2, you have one equation in two unknowns. Where does the *second* equation come from? (3 steps)", "answer": "- Step 1: The condition \"gradient = 2 at $$P$$\" gives equation ①: substitute $$x=a, y=b, \\frac{dy}{dx}=2$$ into the gradient formula.\n- Step 2: The **hidden** condition is that \"P lies on the curve\" — this is independent information not yet used.\n- Step 3: Substituting $$x=a, y=b$$ into the original curve equation gives equation ②. Two equations + two unknowns ⇒ solvable.\n\n*Whenever a problem names a point on a curve, the curve equation is automatically one of your equations.*", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": true}, {"question": "A student finds $$2a+b = 12-2a$$ from a gradient condition and gets stuck — what's the fix?", "answer": "- Step 1: Tidy first: $$4a + b = 12$$, giving $$b = 12-4a$$.\n- Step 2: Substitute this expression for $$b$$ into the curve equation (the second equation provided by \"P lies on the curve\").\n- Step 3: This produces a single equation in $$a$$ alone — typically a quadratic — solve for $$a$$, then back-substitute for $$b$$.\n\n*The substitution method turns two equations in two unknowns into one equation in one unknown.*", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "When two lines $$L_1$$ and $$L_2$$ intersect at point $$P$$, what is the starting equation, and why does it give three scalar equations? (3 steps)", "answer": "- Step 1: At the intersection point, the **position vectors** from the origin must be equal: $$\\mathbf{r}_1 = \\mathbf{r}_2$$.\n- Step 2: Each side is a 3D vector with components $$(x, y, z)$$. Two vectors are equal iff their components are individually equal.\n- Step 3: This yields three scalar equations (one per component), typically in the parameters $$\\lambda, \\mu$$ and possibly other unknowns.\n\n*Vector equation = component-wise system; never forget the third component.*", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "In a 3D-line intersection problem, you get 3 equations in 3 unknowns ($$\\lambda, \\mu, \\beta$$). Why might you solve only two equations first (say eqs 1 and 3), then use the third?", "answer": "- Step 1: If $$\\beta$$ appears in only one equation (say eq 2), the other two contain just $$\\lambda, \\mu$$.\n- Step 2: Solve eqs 1 & 3 for $$\\lambda, \\mu$$ as a clean 2×2 system (calculator-friendly).\n- Step 3: Substitute these into eq 2 to find $$\\beta$$.\n\n*Strategy: isolate the cleanest subsystem first, then use the remaining equation as a \"downstream\" check or to extract the trickier unknown.*", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "When using a calculator's simultaneous-equation solver, why must equations be rewritten into a specific format like $$a\\lambda + b\\mu = c$$?", "answer": "- Step 1: The solver expects coefficients in a fixed pattern: variable 1, then variable 2, then constant.\n- Step 2: All like terms must be on one side, all constants on the other, in the **same order** in each equation.\n- Step 3: Mixing the order (e.g. $$\\mu$$ before $$\\lambda$$ in one row, after in another) will input a transposed coefficient matrix and give wrong answers.\n\n*Always line up your equations vertically before entering into the solver.*", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "Why must the final answer for the coordinates of an intersection point $$P$$ be written as $$(a,b,c)$$ and not as a column vector?", "answer": "A column vector represents a *direction* or *displacement* in space, whereas $$(a,b,c)$$ denotes a specific point (a location). The exam mark scheme distinguishes coordinates from vectors — writing a column vector at the end is treated as not having answered \"find the coordinates\", and the final mark is lost.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "Conceptually, why does the substitution $$u = 3 + \\cos\\theta$$ turn a trigonometric integral into a power-rule integral?", "answer": "- Step 1: The original integrand has $$\\cos\\theta$$ tangled inside (e.g. under a square root). The substitution names that whole inner expression $$u$$.\n- Step 2: $$du = -\\sin\\theta\\, d\\theta$$ — and the integrand also conveniently contains $$\\sin\\theta$$ (often hidden in $$\\sin 2\\theta = 2\\sin\\theta\\cos\\theta$$), which cancels nicely with $$du$$.\n- Step 3: What's left is a clean function of $$u$$ (often $$u^{1/2}$$ or $$u^{-1/2}$$), integrable by the power rule.\n\n*Substitution is \"renaming the awkward chunk and letting its derivative absorb the rest\".*", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "Why is $$\\sin 2\\theta = 2\\sin\\theta\\cos\\theta$$ so often the *key* to making a substitution $$u = a + \\cos\\theta$$ work? (3 steps)", "answer": "- Step 1: The substitution requires $$du = -\\sin\\theta\\, d\\theta$$, so you need a $$\\sin\\theta$$ factor in the integrand.\n- Step 2: $$\\sin 2\\theta$$ doesn't contain $$\\sin\\theta$$ literally — but the double-angle identity unfolds it into $$2\\sin\\theta\\cos\\theta$$.\n- Step 3: Now $$\\sin\\theta$$ cancels with the $$\\sin\\theta$$ from $$d\\theta$$, and the leftover $$\\cos\\theta$$ gets replaced via $$\\cos\\theta = u - 3$$.\n\n*Identities are bridges: they convert what you *have* into what the substitution *needs*.*", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": true}, {"question": "When changing limits in a substitution from $$\\theta$$-limits to $$u$$-limits, why might the \"bigger number\" end up at the *bottom*, not the top? (3 steps)", "answer": "- Step 1: Limits aren't ranked by size — they're tied to **direction of integration**. Bottom limit = where $$\\theta$$ starts; top limit = where $$\\theta$$ ends.\n- Step 2: For $$u = 3 + \\cos\\theta$$: at $$\\theta=0$$, $$u = 4$$; at $$\\theta=\\pi/2$$, $$u = 3$$. So as $$\\theta$$ goes $$0 \\to \\pi/2$$, $$u$$ goes $$4 \\to 3$$ (decreasing).\n- Step 3: Therefore bottom limit is 4, top limit is 3 — even though 3 < 4.\n\n*Preserve the start→end correspondence, not size order. Reversing limits introduces a sign error.*", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": true}, {"question": "In an integral with respect to $$u$$, why can't you \"factor out\" $$\\cos\\theta$$ from the integrand?", "answer": "- Step 1: $$\\cos\\theta$$ is a **function of $$\\theta$$**, hence a function of $$u$$ (via $$\\cos\\theta = u-3$$). It is not constant with respect to $$u$$.\n- Step 2: Only constants (numbers independent of the integration variable) can be pulled outside an integral.\n- Step 3: The fix is to *substitute*: replace $$\\cos\\theta$$ with its $$u$$-expression so the integrand is purely a function of $$u$$.\n\n*\"Constant\" means constant relative to the variable of integration, not just constant-looking.*", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "After simplification you obtain $$\\int u^{1/2} - 3u^{-1/2}\\, du$$. A student says \"ah, the $$u^{-1/2}$$ part integrates to $$\\ln$$\" — why is this wrong? (3 steps)", "answer": "- Step 1: $$\\ln$$ only appears when the power is exactly $$-1$$ (i.e. $$\\int u^{-1}\\, du = \\ln|u|$$).\n- Step 2: $$u^{-1/2}$$ has power $$-1/2$$, not $$-1$$, so the standard power rule applies: add 1 to the power, divide by new power.\n- Step 3: $$\\int u^{-1/2}\\, du = \\dfrac{u^{1/2}}{1/2} = 2u^{1/2}$$. Similarly $$\\int u^{1/2}\\, du = \\dfrac{2}{3}u^{3/2}$$.\n\n*The ln-trap: only $$n=-1$$ breaks the power rule. Every other power, including fractions and other negatives, works normally.*", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "Why must you split $$\\dfrac{u-3}{\\sqrt{u}}$$ as $$u^{1/2} - 3u^{-1/2}$$ *before* integrating, rather than integrating the fraction directly?", "answer": "- Step 1: There is no quotient rule for integration — a fraction like $$(u-3)/\\sqrt{u}$$ has no standard antiderivative as written.\n- Step 2: Splitting: $$\\dfrac{u}{u^{1/2}} - \\dfrac{3}{u^{1/2}} = u^{1/2} - 3u^{-1/2}$$ using $$u^a/u^b = u^{a-b}$$.\n- Step 3: Each term is now a single power of $$u$$, integrable by the power rule.\n\n*Algebraic preprocessing is half the work in integration — make the integrand a *sum* of standard forms.*", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "Why does the binomial expansion for $$(2+5x)^{-2}$$ require the \"general $$n$$\" formula and not the \"positive integer $$n$$\" version? (3 steps)", "answer": "- Step 1: The top formula (Pascal-style) has finitely many terms because $$\\binom{n}{k}$$ vanishes once $$k > n$$ — this needs $$n \\in \\mathbb{Z}^+$$.\n- Step 2: For $$n=-2$$ (or fractions, negatives in general), $$\\binom{n}{k}$$ never terminates, giving an infinite series.\n- Step 3: The \"bottom\" formula $$(1+x)^n = 1 + nx + \\dfrac{n(n-1)}{2!}x^2 + \\ldots$$ accommodates any real $$n$$ but only converges for $$|x|<1$$ — that's the P3/P4 form.\n\n*Negative or fractional powers ⇒ infinite series, with a convergence restriction.*", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": true}, {"question": "Before applying the \"general $$n$$\" binomial formula to $$(2+5x)^{-2}$$, why must you factor out the 2? (3 steps)", "answer": "- Step 1: The formula $$(1+X)^n$$ requires the constant term inside the bracket to be exactly **1**, not 2.\n- Step 2: Factor: $$(2+5x)^{-2} = \\left[2(1 + \\tfrac{5x}{2})\\right]^{-2} = 2^{-2}\\left(1 + \\tfrac{5x}{2}\\right)^{-2}$$.\n- Step 3: Now the bracket has the required form with $$X = 5x/2$$, and the $$2^{-2} = 1/4$$ comes outside as a constant multiplier.\n\n*Always reshape into \"$$(1 + \\text{something})^n$$\" before applying the formula — the leading \"1\" is non-negotiable.*", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "For the expansion $$(1 + \\tfrac{5x}{2})^{-2}$$, what is the range of validity (convergence), and where does it come from? (3 steps)", "answer": "- Step 1: The binomial series for $$(1+X)^n$$ converges only when $$|X| < 1$$.\n- Step 2: Here $$X = 5x/2$$, so the requirement becomes $$|5x/2| < 1$$.\n- Step 3: Solving: $$|x| < 2/5$$. Outside this range, the infinite series diverges and does not represent the function.\n\n*Always state the range of validity — examiners often allocate a mark to it.*", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "Why do *negative* and *fractional* binomial expansions produce *infinite* series, while positive-integer powers terminate?", "answer": "- Step 1: Successive coefficients involve $$n, n-1, n-2, \\ldots$$\n- Step 2: If $$n$$ is a positive integer (say $$n=3$$), one of the factors eventually becomes $$0$$ (when $$n-k = 0$$), killing all later terms — finite expansion.\n- Step 3: If $$n$$ is negative or fractional, the chain $$n(n-1)(n-2)\\ldots$$ never hits zero, so coefficients never vanish — infinite series, with an associated convergence condition.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": true}, {"question": "What is the volume-of-revolution formula for rotating $$y = f(x)$$ about the $$x$$-axis through a full $$2\\pi$$, and what's the geometric intuition? (3 steps)", "answer": "- Step 1: $$V = \\pi \\int_a^b y^2\\, dx$$.\n- Step 2: Intuition: slice the solid into thin disks perpendicular to the $$x$$-axis. Each disk has radius $$y = f(x)$$ and thickness $$dx$$, so volume $$= \\pi y^2 \\, dx$$.\n- Step 3: Integrating sums up all disks from $$x=a$$ to $$x=b$$ — like stacking coins of varying radius.\n\n*$$\\pi r^2$$ is the disk area; integration is the stacking.*", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "For rotation about the $$y$$-axis, why does the formula become $$V = \\pi\\int x^2\\, dy$$?", "answer": "- Step 1: By symmetry of the disk argument, but now slices are perpendicular to the $$y$$-axis.\n- Step 2: Each disk has radius $$x$$ (horizontal distance from the $$y$$-axis) and thickness $$dy$$.\n- Step 3: Volume of slice $$= \\pi x^2\\, dy$$; you must express $$x$$ as a function of $$y$$ and integrate over the appropriate $$y$$-range.\n\n*Swap the roles of $$x$$ and $$y$$ — the structure of the formula mirrors which axis you spin around.*", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "If you only rotate through angle $$\\theta$$ (not a full revolution), how does the volume formula change? Why is the relationship linear in $$\\theta$$?", "answer": "- Step 1: Full revolution is $$2\\pi$$ radians; partial rotation by $$\\theta$$ keeps the same disk cross-sections but only sweeps a fraction $$\\theta/(2\\pi)$$ of each disk.\n- Step 2: Volume scales linearly with angle: $$V_\\theta = \\dfrac{\\theta}{2\\pi}\\cdot V_{2\\pi} = \\dfrac{\\theta}{2}\\int y^2\\, dx$$.\n- Step 3: Linearity holds because each \"wedge\" of a disk has area proportional to angle — no curvature in the angular direction.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "For the separable ODE $$\\dfrac{dy}{dx} = f(x)g(y)$$, why can we treat $$dy$$ and $$dx$$ as if they were algebraic quantities to separate?", "answer": "- Step 1: Strictly, $$dy/dx$$ is *not* a fraction — but the separation procedure is justified by the chain rule + the substitution rule of integration.\n- Step 2: Rearranging to $$\\dfrac{1}{g(y)}\\, dy = f(x)\\, dx$$ and integrating both sides is shorthand for: integrate the left in $$y$$ and the right in $$x$$, then equate (up to a constant).\n- Step 3: The result is an *implicit* solution relating $$x$$ and $$y$$, which you may then solve for $$y$$ if possible.\n\n*Treating differentials algebraically is a calculational convenience, formally justified.*", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "For the linear ODE $$\\dfrac{dy}{dx} + P(x)y = Q(x)$$, why does multiplying by the integrating factor $$\\mu = e^{\\int P\\, dx}$$ collapse the LHS into a single derivative? (3 steps)", "answer": "- Step 1: Multiply through by $$\\mu$$: $$\\mu \\dfrac{dy}{dx} + \\mu P y = \\mu Q$$.\n- Step 2: Note $$\\dfrac{d\\mu}{dx} = P\\mu$$ (by chain rule on the exponent). So the LHS is exactly $$\\dfrac{d}{dx}(\\mu y)$$ by the product rule.\n- Step 3: We now have $$\\dfrac{d}{dx}(\\mu y) = \\mu Q$$, which integrates directly: $$\\mu y = \\int \\mu Q\\, dx + C$$.\n\n*The IF is engineered so the LHS becomes a perfect product-rule derivative — that's the who
