\\end{pmatrix}$$ and loses a mark. What should they have written instead, and why? (2 steps)", "answer": "- Step 1: The question asks for the **coordinates** of $$P$$, which must be written as a row: **$$(7, -5, 3)$$**. A column vector is a different mathematical object (it represents a directed magnitude, not a location label).\n- Step 2: In exam marking, \"coordinates\" specifically means the ordered triple notation $$(x, y, z)$$. Writing a column vector suggests you've found a *direction* rather than a *point*. The distinction matters: coordinates identify a position; column vectors represent displacement.\n\nWhen asked for \"coordinates,\" write $$(a, b, c)$$ — never a column vector. Read the question's wording carefully.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "Line $$L_1: \\mathbf{r} = (1, 0, 2) + \\lambda(1, 1, 1)$$ and $$L_2: \\mathbf{r} = (0, 1, 1) + \\mu(1, 0, 1)$$ intersect. Set up the three component equations (don't solve). (2 steps)", "answer": "- Step 1: Write both position vectors in component form: $$\\mathbf{r}_1 = (1+\\lambda, 0+\\lambda, 2+\\lambda)$$ and $$\\mathbf{r}_2 = (0+\\mu, 1+0\\mu, 1+\\mu) = (\\mu, 1, 1+\\mu)$$.\n- Step 2: Equate components: **Equation 1:** $$1 + \\lambda = \\mu$$. **Equation 2:** $$\\lambda = 1$$. **Equation 3:** $$2 + \\lambda = 1 + \\mu$$. Equation 2 immediately gives $$\\lambda = 1$$, then Equation 1 gives $$\\mu = 2$$, and Equation 3 verifies: $$2+1 = 1+2 = 3$$ ✓.\n\nSetup is always: expand both vectors, equate component-by-component. The solving can be by hand or calculator.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "Why is the identity $$\\sin(2\\theta) = 2\\sin\\theta\\cos\\theta$$ essential for the integration-by-substitution problem, and what would happen without it? (2 steps)", "answer": "- Step 1: The integral contains $$\\sin(2\\theta)$$, which is a function of a *double angle*. The substitution $$u = 3 + \\cos\\theta$$ replaces $$\\cos\\theta$$ but has no direct replacement for $$\\sin(2\\theta)$$. The identity splits $$\\sin(2\\theta)$$ into $$2\\sin\\theta\\cos\\theta$$, exposing a $$\\cos\\theta$$ (replaceable by $$u-3$$) and a $$\\sin\\theta$$ (cancellable with the $$\\sin\\theta$$ from $$d\\theta$$).\n- Step 2: Without the identity, $$\\sin(2\\theta)$$ remains an opaque function of $$2\\theta$$ that can't be expressed in terms of $$u = 3+\\cos\\theta$$ alone. You'd be stuck with a mixed $$\\theta$$ and $$u$$ integrand that can't be integrated.\n\nThe double-angle identity is the key that unlocks the substitution. It converts one stubborn function into two pieces that each have a role in the substitution machinery.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "Given the substitution $$u = 3 + \\cos\\theta$$, what is $$\\frac{du}{d\\theta}$$, and how do you use it to replace $$d\\theta$$ in the integral? (3 steps)", "answer": "- Step 1: Differentiate: $$\\frac{du}{d\\theta} = 0 + (-\\sin\\theta) = -\\sin\\theta$$.\n- Step 2: Rearrange to express $$d\\theta$$: $$d\\theta = \\frac{du}{-\\sin\\theta} = -\\frac{1}{\\sin\\theta}du$$.\n- Step 3: In the integral, replace $$d\\theta$$ with $$-\\frac{1}{\\sin\\theta}du$$. The $$\\sin\\theta$$ in this expression will cancel with the $$\\sin\\theta$$ from the $$\\sin(2\\theta) = 2\\sin\\theta\\cos\\theta$$ expansion — this cancellation is why the substitution works cleanly.\n\n$$\\frac{du}{d\\theta} = -\\sin\\theta$$ → $$d\\theta = -\\frac{du}{\\sin\\theta}$$ → the negative sign and the $$\\sin\\theta$$ denominator are both crucial for what follows.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "Using $$u = 3 + \\cos\\theta$$, transform the limits $$\\theta = 0$$ and $$\\theta = \\frac{\\pi}{2}$$ into u-limits. What are they, and which one goes on the bottom of the integral? (3 steps)", "answer": "- Step 1: When $$\\theta = 0$$: $$u = 3 + \\cos(0) = 3 + 1 = 4$$. When $$\\theta = \\frac{\\pi}{2}$$: $$u = 3 + \\cos\\left(\\frac{\\pi}{2}\\right) = 3 + 0 = 3$$.\n- Step 2: The original integral has $$\\theta = 0$$ as the **bottom** limit and $$\\theta = \\frac{\\pi}{2}$$ as the **top** limit. You must preserve this mapping: whatever the bottom $$\\theta$$-limit maps to becomes the bottom $$u$$-limit.\n- Step 3: Therefore: bottom limit = $$u = 4$$, top limit = $$u = 3$$. The bigger number is on the **bottom** — this is correct and must not be \"fixed\" by swapping.\n\nPreserve the mapping, not the \"bigger on top\" habit. $$\\theta=0$$ (bottom) → $$u=4$$ (bottom). $$\\theta=\\pi/2$$ (top) → $$u=3$$ (top).", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "A student sees limits 4 (bottom) and 3 (top) and swaps them so 3 is on bottom and 4 on top, reasoning \"the bigger number should be on top.\" Why is this wrong? (2 steps)", "answer": "- Step 1: The \"bigger on top\" convention is NOT a mathematical rule — it's a habit from problems where limits happen to map that way. The actual rule is: **preserve the order of the original limits**. The bottom limit in $$\\theta$$ maps to the bottom limit in $$u$$; the top maps to the top.\n- Step 2: Swapping the limits changes the sign of the integral (by the fundamental theorem: $$\\int_a^b = -\\int_b^a$$). If you swap AND also have a negative sign from $$d\\theta = -du/\\sin\\theta$$, you might accidentally double-cancel or double-apply a sign change, getting the wrong final answer.\n\nNever swap limits to make them \"look nice.\" Map bottom→bottom, top→top. Handle any sign issues from $$d\\theta$$ explicitly instead.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "After substituting, the integrand contains $$\\cos\\theta$$ alongside terms in $$u$$. A student tries to factor $$\\cos\\theta$$ out of the integral as if it were a constant. Why is this a critical error? (2 steps)", "answer": "- Step 1: $$\\cos\\theta$$ is a **variable** — it depends on $$\\theta$$, which varies across the integration range from 0 to $$\\frac{\\pi}{2}$$. At $$\\theta=0$$, $$\\cos\\theta=1$$; at $$\\theta=\\frac{\\pi}{2}$$, $$\\cos\\theta=0$$. It is not a fixed number you can pull out.\n- Step 2: You can only factor a constant out of an integral. Factoring a variable \"out\" treats it as if it has one fixed value, completely misrepresenting the integral. Instead, you must *substitute* $$\\cos\\theta = u - 3$$ (from the substitution definition) to express everything in terms of $$u$$.\n\n$$\\cos\\theta$$ varies from 1 to 0 across this integral. It MUST be replaced by $$u - 3$$, never factored out. Any function of the integration variable is a variable, not a constant.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": false}, {"question": "How do you eliminate $$\\cos\\theta$$ from the integrand after substitution $$u = 3 + \\cos\\theta$$? (2 steps)", "answer": "- Step 1: From the substitution equation $$u = 3 + \\cos\\theta$$, rearrange: $$\\cos\\theta = u - 3$$.\n- Step 2: Replace every occurrence of $$\\cos\\theta$$ in the integrand with $$u - 3$$. Now the entire integrand is expressed purely in terms of $$u$$ and $$du$$, with no $$\\theta$$ remaining — and you can integrate using standard u-methods.\n\nThe substitution gives you a two-way street: $$u = 3 + \\cos\\theta$$ lets you replace $$\\cos\\theta$$ with $$u - 3$$. Always rearrange to express the old variable in terms of the new one.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": false}, {"question": "After simplification, the integrand becomes $$-2(u - 3)u^{-1/2}$$, which a student splits as $$-2\\left(u^{1/2} - 3u^{-1/2}\\right)$$ and then integrates each term as a natural log. What's wrong? (3 steps)", "answer": "- Step 1: The student confused the **power rule** with the **log rule**. The log rule $$\\int \\frac{1}{u}\\,du = \\ln|u|$$ applies ONLY when the integrand is exactly $$u^{-1}$$ (power of −1). Here we have $$u^{1/2}$$ and $$u^{-1/2}$$ — powers of $$+1/2$$ and $$-1/2$$, not $$-1$$.\n- Step 2: The power rule applies: $$\\int u^n\\,du = \\frac{u^{n+1}}{n+1}$$ for any $$n \\neq -1$$. For $$u^{1/2}$$: $$n = 1/2$$, so $$\\int u^{1/2}\\,du = \\frac{u^{3/2}}{3/2} = \\frac{2}{3}u^{3/2}$$.\n- Step 3: For $$u^{-1/2}$$: $$n = -1/2$$, so $$\\int u^{-1/2}\\,du = \\frac{u^{1/2}}{1/2} = 2u^{1/2}$$ (times the coefficient 3 gives $$6u^{1/2}$$). Neither term involves $$\\ln$$.\n\nDecision rule: is the power $$n = -1$$? → use $$\\ln|u|$$. Is the power anything else? → use power rule: raise by 1, divide by new power. $$u^{-1/2}$$ is NOT $$u^{-1}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "Simplify $$\\frac{u}{u^{1/2}}$$ and $$\\frac{3}{u^{1/2}}$$ using power laws, then state the integral of each (ignoring coefficients and limits for now). (3 steps)", "answer": "- Step 1: $$\\frac{u}{u^{1/2}} = u^{1 - 1/2} = u^{1/2}$$ (subtract powers when dividing). $$\\frac{3}{u^{1/2}} = 3u^{-1/2}$$ (reciprocal = negative power).\n- Step 2: $$\\int u^{1/2}\\,du = \\frac{u^{3/2}}{3/2} = \\frac{2}{3}u^{3/2}$$ (power rule: $$n=1/2$$, raise to $$3/2$$, divide by $$3/2$$).\n- Step 3: $$\\int 3u^{-1/2}\\,du = 3 \\cdot \\frac{u^{1/2}}{1/2} = 3 \\cdot 2u^{1/2} = 6u^{1/2}$$ (power rule: $$n=-1/2$$, raise to $$1/2$$, divide by $$1/2$$).\n\nPower law simplification first, then power rule integration. Never jump to $$\\ln$$ unless the power is exactly $$-1$$.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": false}, {"question": "The integrand after full substitution is $$-2\\int_4^3 \\left(u^{1/2} - 3u^{-1/2}\\right)du$$, with the bottom limit larger than the top. Does this automatically mean the final answer is negative? Explain the two sign sources. (3 steps)", "answer": "- Step 1: There are two potential sign sources: (a) the coefficient $$-2$$ outside the integral, and (b) the reversed limits (bottom > top). By the fundamental theorem, $$\\int_4^3 f(u)\\,du = -\\int_3^4 f(u)\\,du$$, so reversed limits introduce a negative sign.\n- Step 2: Combining: the overall expression is $$-2 \\times \\left(-\\int_3^4 (u^{1/2} - 3u^{-1/2})\\,du\\right) = 2\\int_3^4 (u^{1/2} - 3u^{-1/2})\\,du$$. The two negatives cancel.\n- Step 3: Over the range $$[3,4]$$, $$u^{1/2} - 3u^{-1/2}$$ is positive (at $$u=4$$: $$2 - 1.5 = 0.5$$; at $$u=3$$: $$\\sqrt{3} - 3/\\sqrt{3} \\approx 1.73 - 1.73 = 0$$). So the integral is positive, and multiplied by 2 gives a positive final answer.\n\nTwo sign sources can cancel. Don't assume \"reversed limits = negative answer.\" Track every sign explicitly: coefficient, limit order, and integrand sign over the range.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": true}, {"question": "In the Edexcel formula book, two binomial expansion formulas are given. The \"top version\" has a finite number of terms and requires $$n$$ to be a positive integer. The \"bottom version\" is an infinite series valid for any real $$n$$. Why does the top version *terminate* while the bottom version *doesn't*? (3 steps)", "answer": "- Step 1: The top version computes $$\\binom{n}{k}$$ using factorials: $$\\binom{n}{k} = \\frac{n!}{k!(n-k)!}$$, which is only defined when $$n$$ is a non-negative integer. Terms like $$\\binom{5}{6}$$ equal zero because the factorial definition gives zero when $$k > n$$.\n- Step 2: When $$n$$ is a positive integer, once $$k$$ exceeds $$n$$, every subsequent term is zero — the series *terminates* at the $$(n+1)$$-th term. This gives the familiar finite expansion like $$(1+x)^5 = 1 + 5x + 10x^2 + ... + x^5$$.\n- Step 3: The bottom version uses the product formula $$\\frac{n(n-1)(n-2)\\cdots(n-k+1)}{k!}$$, which never produces zero for non-integer or negative $$n$$ (since $$n-k+1$$ never reaches zero). The series continues indefinitely — it's an infinite series that only converges when $$|x| < 1$$.\n\nFor P3/P4: always use the bottom version. It handles negative and fractional powers. The top version is for P1/P2 (positive integer powers only).", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": true}, {"question": "The bottom binomial formula requires the bracket to start with **1**, i.e., $$(1 + ax)^n$$. For $$(2 + 5x)^{-2}$$, why can't you apply the formula directly, and what must you do first? (3 steps)", "answer": "- Step 1: The formula's terms involve powers of the \"second part\" ($$ax$$): $$1 + n(ax) + \\frac{n(n-1)}{2!}(ax)^2 + \\cdots$$. The leading 1 is essential — it's the first term of the expansion, and all subsequent terms are multiples of $$ax$$.\n- Step 2: If the bracket starts with 2 (i.e., $$(2 + 5x)^{-2}$$), the formula doesn't apply directly because there's no \"1\" for the first term to anchor to. You'd get incorrect terms.\n- Step 3: Factor out the 2: $$(2 + 5x)^{-2} = [2(1 + \\frac{5x}{2})]^{-2} = 2^{-2} \\cdot (1 + \\frac{5x}{2})^{-2} = \\frac{1}{4}(1 + \\frac{5x}{2})^{-2}$$. Now the bracket starts with 1, and you apply the binomial formula to $$(1 + \\frac{5x}{2})^{-2}$$, then multiply everything by $$\\frac{1}{4}$$.\n\nAlways factor out the leading coefficient to make the bracket start with 1. The power applies to the factored-out constant too: $$[c(1+ax)]^n = c^n(1+ax)^n$$.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": true}, {"question": "After writing $$(2+5x)^{-2} = \\frac{1}{4}\\left(1 + \\frac{5x}{2}\\right)^{-2}$$, you apply the binomial formula with $$n = -2$$ and $$a = \\frac{5}{2}$$. What are the first three terms of the expansion of $$(1 + \\frac{5x}{2})^{-2}$$ (before multiplying by $$\\frac{1}{4}$$)? (3 steps)", "answer": "- Step 1: The general term is $$\\frac{n(n-1)(n-2)\\cdots(n-k+1)}{k!}\\left(\\frac{5x}{2}\\right)^k$$, with $$n = -2$$.\n- Step 2: First term ($$k=0$$): $$1$$. Second term ($$k=1$$): $$(-2)\\cdot\\frac{5x}{2} = -5x$$. Third term ($$k=2$$): $$\\frac{(-2)(-3)}{2!}\\cdot\\left(\\frac{5x}{2}\\right)^2 = \\frac{6}{2}\\cdot\\frac{25x^2}{4} = 3\\cdot\\frac{25x^2}{4} = \\frac{75x^2}{4}$$.\n- Step 3: So $$(1+\\frac{5x}{2})^{-2} \\approx 1 - 5x + \\frac{75x^2}{4} + \\cdots$$, and the full expansion of $$(2+5x)^{-2}$$ is $$\\frac{1}{4}\\left(1 - 5x + \\frac{75x^2}{4} + \\cdots\\right) = \\frac{1}{4} - \\frac{5x}{4} + \\frac{75x^2}{16} + \\cdots$$.\n\nWith negative $$n$$, the coefficients alternate in sign initially but can flip: $$(-2)(-3) = +6$$ makes the third term positive. Track signs carefully through each factor.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": false}, {"question": "The binomial expansion of $$(1 + \\frac{5x}{2})^{-2}$$ is only valid for $$\\left|\\frac{5x}{2}\\right| < 1$$. Derive the range of $$x$$ for which the original expansion of $$(2+5x)^{-2}$$ is valid. (2 steps)", "answer": "- Step 1: The convergence condition for $$(1+ax)^n$$ (bottom formula) is $$|ax| < 1$$. Here $$a = \\frac{5}{2}$$, so the condition is $$\\left|\\frac{5x}{2}\\right| < 1$$.\n- Step 2: Multiply both sides by 2: $$|5x| < 2$$. Divide by 5: $$|x| < \\frac{2}{5}$$, i.e., $$-\\frac{2}{5} < x < \\frac{2}{5}$$. This is the validity range for the expansion of $$(2+5x)^{-2}$$.\n\nThe validity range depends on what's inside the bracket after factoring: $$|ax| < 1$$ where $$a$$ is the coefficient of $$x$$ in $$(1+ax)^n$$, NOT the original coefficient 5.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": false}, {"question": "A student expands $$(3 - 2x)^{-1}$$ and claims it's valid for $$|x| < 3$$. Is this correct? If not, derive the correct range. (3 steps)", "answer": "- Step 1: First factor out the leading coefficient: $$(3-2x)^{-1} = 3^{-1}(1 - \\frac{2x}{3})^{-1} = \\frac{1}{3}(1 - \\frac{2x}{3})^{-1}$$.\n- Step 2: The bracket is $$(1 + ax)^n$$ with $$a = -\\frac{2}{3}$$ (note the negative sign is part of $$a$$). Convergence requires $$|ax| < 1$$: $$\\left|-\\frac{2x}{3}\\right| < 1$$, which simplifies to $$\\frac{2|x|}{3} < 1$$.\n- Step 3: Multiply by 3: $$2|x| < 3$$. Divide by 2: $$|x| < \\frac{3}{2}$$, NOT $$|x| < 3$$. The student forgot to factor out the 3 first — they applied $$|x| < \\frac{1}{\\text{leading coefficient}}$$ incorrectly.\n\nValidity range: $$|x| < \\frac{1}{|a|}$$ where $$a$$ is the coefficient of $$x$$ *inside the bracket after factoring*, not the original coefficient.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": true}, {"question": "What is the formula for the volume of revolution when a curve $$y = f(x)$$ is rotated fully (360°) about the x-axis, and what is the intuitive geometric reason for the $$y^2$$? (3 steps)", "answer": "- Step 1: The formula is $$V = \\pi\\int_a^b y^2\\,dx$$. At each x-value, the curve gives a y-value, and rotating the point $$(x, y)$$ around the x-axis traces out a circle of radius $$|y|$$.\n- Step 2: The area of that circular cross-section (disc) is $$\\pi r^2 = \\pi y^2$$ (since $$r = |y|$$). Integrating these disc areas from $$x=a$$ to $$x=b$$ sums them up, giving the total volume.\n- Step 3: Hence the $$y^2$$ comes from the circular disc area formula: radius = y, area = $$\\pi y^2$$. Without squaring, you'd be summing circumferences ($$\\pi y$$), not areas — that gives a surface-area-like quantity, not volume.\n\n$$y^2$$ because: disc radius = $$y$$ → disc area = $$\\pi y^2$$ → stack discs → volume = $$\\pi\\int y^2\\,dx$$.", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": false}, {"question": "If you rotate a curve about the *y-axis* instead of the x-axis, what changes in the volume formula, and why? (3 steps)", "answer": "- Step 1: Now each y-value produces a circular disc of radius $$|x|$$ (the x-coordinate is the distance from the y-axis). Disc area = $$\\pi x^2$$.\n- Step 2: You integrate along the y-axis (stacking discs as y increases), so the variable of integration is $$y$$: $$V = \\pi\\int_c^d x^2\\,dy$$.\n- Step 3: If the curve is given as $$y = f(x)$$, you must express $$x^2$$ in terms of $$y$$ (or use $$x = f^{-1}(y)$$) and change the limits to y-values. Alternatively, if the curve is naturally given as $$x = g(y)$$, substitute directly.\n\nRotation axis determines: (1) which variable is the radius ($$y$$ for x-axis, $$x$$ for y-axis), (2) which variable you integrate with respect to ($$dx$$ for x-axis, $$dy$$ for y-axis).", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": false}, {"question": "If a curve is rotated by angle $$\\theta$$ (not a full 360°) about the x-axis, how does the volume formula adjust, and what's the intuitive reasoning? (3 steps)", "answer": "- Step 1: A full rotation (360° = $$2\\pi$$ radians) gives volume $$V = \\pi\\int y^2\\,dx$$. The $$\\pi$$ comes from the full disc area $$\\pi r^2$$, which itself comes from the full circle circumference integral.\n- Step 2: A partial rotation by angle $$\\theta$$ (in radians) sweeps out a *sector* of each disc, not a full disc. The sector area is proportional to the angle: sector area = $$\\frac{\\theta}{2\\pi} \\times \\pi y^2 = \\frac{\\theta}{2}y^2$$.\n- Step 3: So the partial-rotation volume is $$V = \\frac{\\theta}{2}\\int_a^b y^2\\,dx$$. For full rotation ($$\\theta = 2\\pi$$): $$V = \\frac{2\\pi}{2}\\int y^2\\,dx = \\pi\\int y^2\\,dx$$, recovering the standard formula.\n\nVolume is proportional to rotation angle: $$V_{\\theta} = \\frac{\\theta}{2\\pi} \\times V_{2\\pi} = \\frac{\\theta}{2}\\int y^2\\,dx$$. Half rotation ($$\\theta = \\pi$$) gives half the volume.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": true}, {"question": "A separable differential equation has the form $$\\frac{dy}{dx} = f(x)g(y)$$. What does \"separable\" mean, and what is the solution method? (3 steps)", "answer": "- Step 1: \"Separable\" means you can algebraically separate the x-parts and y-parts onto opposite sides of the equation. Rewrite as $$\\frac{dy}{g(y)} = f(x)\\,dx$$ — all y's (including $$dy$$) on one side, all x's (including $$dx$$) on the other.\n- Step 2: Integrate both sides: $$\\int\\frac{dy}{g(y)} = \\int f(x)\\,dx$$. Each side is now an ordinary integral in a single variable.\n- Step 3: Evaluate both integrals, add a constant of integration (only needed on one side), and if required, solve for $$y$$ explicitly or leave in implicit form.\n\nSeparable = \"pull apart\" the variables. Once separated, each side is a standard single-variable integral. The constant of integration appears once (not on both sides — that would create two constants that merge into one).", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": false}, {"question": "A student solving $$\\frac{dy}{dx} = xy$$ writes $$\\int dy = \\int x\\,dx$$ and gets $$y = \\frac{x^2}{2} + C$$. What separation step did they skip, and what's the correct approach? (3 steps)", "answer": "- Step 1: The equation $$\\frac{dy}{dx} = xy$$ is separable: divide both sides by $$y$$ to get $$\\frac{1}{y}\\frac{dy}{dx} = x$$, then rewrite as $$\\frac{dy}{y} = x\\,dx$$.\n- Step 2: The student forgot to divide by $$y$$ — they moved $$dy$$ alone to the left but left $$y$$ on the right. This gives the wrong integral structure.\n- Step 3: Correct integration: $$\\int\\frac{dy}{y} = \\int x\\,dx$$ → $$\\ln|y| = \\frac{x^2}{2} + C$$ → $$y = Ae^{x^2/2}$$ (exponential growth, not quadratic). The student's answer $$y = x^2/2 + C$$ is a parabola — completely wrong behaviour for this ODE.\n\nSeparation means ALL y-factors go with $$dy$$, ALL x-factors go with $$dx$$. Don't just move $$dy$$ — move the entire y-dependent part.", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": false}, {"question": "For a first-order linear ODE in standard form $$\\frac{dy}{dx} + P(x)y = Q(x)$$, what is the integrating factor, and why does multiplying by it make the left side a perfect derivative? (4 steps)", "answer": "- Step 1: The **integrating factor** (IF) is $$e^{\\int P(x)\\,dx}$$ — compute the integral of $$P(x)$$, then exponentiate.\n- Step 2: Multiply the entire ODE by the IF: $$e^{\\int P\\,dx}\\frac{dy}{dx} + P(x)e^{\\int P\\,dx}y = Q(x)e^{\\int P\\,dx}$$.\n- Step 3: The left side is now exactly $$\\frac{d}{dx}\\left[y \\cdot e^{\\int P\\,dx}\\right]$$ by the product rule: differentiate $$y \\cdot IF$$ and you get $$IF\\cdot\\frac{dy}{dx} + y\\cdot\\frac{d(IF)}{dx} = IF\\cdot\\frac{dy}{dx} + y\\cdot P\\cdot IF$$, matching the left side.\n- Step 4: So the ODE becomes $$\\frac{d}{dx}[y \\cdot IF] = Q \\cdot IF$$, which integrates directly: $$y \\cdot IF = \\int Q \\cdot IF\\,dx + C$$, then solve for $$y$$.\n\nThe IF is engineered so that multiplying by it turns the left side into $$\\frac{d}{dx}[y \\cdot IF]$$ — a single derivative you can integrate in one step.", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": true}, {"question": "How do you rewrite $$\\frac{dy}{dx} - 3y = e^{2x}$$ in standard form, and what is the integrating factor? (3 steps)", "answer": "- Step 1: Standard form is $$\\frac{dy}{dx} + P(x)y = Q(x)$$. The equation has $$-3y$$, so $$P(x) = -3$$ (a constant) and $$Q(x) = e^{2x}$$.\n- Step 2: IF = $$e^{\\int P\\,dx} = e^{\\int -3\\,dx} = e^{-3x}$$ (no constant of integration needed in the IF — it would just multiply the whole equation by a constant, which cancels out).\n- Step 3: Multiply through: $$e^{-3x}\\frac{dy}{dx} - 3e^{-3x}y = e^{-3x} \\cdot e^{2x} = e^{-x}$$. The left side is $$\\frac{d}{dx}[ye^{-3x}]$$, so $$ye^{-3x} = \\int e^{-x}\\,dx + C = -e^{-x} + C$$, giving $$y = -e^{2x} + Ce^{3x}$$.\n\nStandard form: coefficient of $$\\frac{dy}{dx}$$ must be 1, and the $$y$$-term must be $$+P(x)y$$. Adjust signs accordingly before computing the IF.", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": false}, {"question": "When computing the integrating factor $$e^{\\int P(x)\\,dx}$$, a student adds $$+C$$ inside the exponential, getting $$e^{\\int P\\,dx + C} = e^C \\cdot e^{\\int P\\,dx}$$. Why doesn't this constant matter? (2 steps)", "answer": "- Step 1: The IF multiplies the *entire* equation: $$e^C \\cdot e^{\\int P\\,dx}\\left[\\frac{dy}{dx} + Py\\right] = e^C \\cdot e^{\\int P\\,dx} \\cdot Q$$. The factor $$e^C$$ appears on both sides and cancels completely.\n- Step 2: Therefore, including the constant in the IF just scales the equation by a nonzero factor, which doesn't change the solution. Convention: omit the constant when computing the IF.\n\nThe IF is defined up to a multiplicative constant — any nonzero constant multiple works equally well. Omit $$+C$$ for simplicity.", "source": "GLM 5.1 ②", "_id": "glm_2_50", "judge_pick": false}, {"question": "A student encounters $$\\frac{dy}{dx} + \\frac{2}{x}y = x^3$$ and computes the integrating factor. What is $$\\int \\frac{2}{x}\\,dx$$, and what is the IF? (2 steps)", "answer": "- Step 1: $$\\int \\frac{2}{x}\\,dx = 2\\ln|x| = \\ln|x^2|$$ (using the log power rule). For $$x > 0$$ (typical in these problems), this is simply $$\\ln(x^2)$$.\n- Step 2: IF = $$e^{\\ln(x^2)} = x^2$$ (since $$e^{\\ln(a)} = a$$). The integrating factor is just $$x^2$$ — a polynomial, not an exponential.\n\nWhen $$P(x)$$ is a rational function like $$\\frac{k}{x}$$, the IF often simplifies to a power of $$x$$: $$e^{k\\ln x} = x^k$$.", "source": "GLM 5.1 ②", "_id": "glm_2_51", "judge_pick": false}, {"question": "What is the key difference between separable ODEs and linear ODEs solved by integrating factor, and how do you decide which method to use? (3 steps)", "answer": "- Step 1: **Separable**: $$\\frac{dy}{dx} = f(x)g(y)$$ — the right side factors into a pure-x part and a pure-y part. Solution: separate variables and integrate each side.\n- Step 2: **Linear (integrating factor)**: $$\\frac{dy}{dx} + P(x)y = Q(x)$$ — the equation is linear in $$y$$ (no $$y^2$$, $$\\sin y$$, etc.) but NOT necessarily separable. The IF method works even when separation is impossible (e.g., $$\\frac{dy}{dx} + 2xy = e^x$$ can't be separated).\n- Step 3: **Decision rule**: First check if it's separable (can you factor into f(x)·g(y)?). If yes, separate — it's usually simpler. If not, check if it's linear in y (first power of y only). If linear, use the integrating factor. If neither, you need other methods beyond P4.\n\nSeparable → separate and integrate. Linear-but-not-separable → integrating factor. The IF method is more powerful for linear equations; separation is simpler when it works.", "source": "GLM 5.1 ②", "_id": "glm_2_52", "judge_pick": true}, {"question": "A curve $$y = x^2$$ from $$x=0$$ to $$x=3$$ is rotated about the x-axis. Without computing the exact value, determine whether the resulting volume is greater or less than the volume of the cylinder with radius 9 and length 3. Explain your reasoning. (3 steps)", "answer": "- Step 1: At $$x=3$$, $$y = 9$$ — the maximum radius. A cylinder of radius 9 and length 3 has volume $$\\pi(9)^2(3) = 243\\pi$$. This cylinder encloses the entire solid of revolution.\n- Step 2: The solid of revolution has cross-sectional radius $$y = x^2$$ at each point, which is LESS than 9 for all $$x < 3$$ (e.g., at $$x=1$$, radius = 1; at $$x=2$$, radius = 4). The solid is strictly inside the cylinder.\n- Step 3: Therefore the volume of revolution is strictly **less than** $$243\\pi$$. The exact value is $$\\pi\\int_0^3 x^4\\,dx = \\pi\\frac{x^5}{5}\\Big|_0^3 = \\pi\\frac{243}{5} = 48.6\\pi$$, much smaller — because most of the solid has small radii.\n\nBounding strategy: compare the solid to a simple cylinder (max radius × length). The actual volume is always less if the curve doesn't maintain the max radius throughout.", "source": "GLM 5.1 ②", "_id": "glm_2_53", "judge_pick": false}, {"question": "Why must you put brackets around the product rule expansion $$[x\\frac{dy}{dx} + y]$$ when it appears inside an implicit differentiation equation with a coefficient like $$-2$$? Give a concrete sign-error example. (3 steps)", "answer": "- Step 1: The term $$-2xy$$ differentiates to $$-2\\frac{d(xy)}{dx} = -2\\left[x\\frac{dy}{dx} + y\\right]$$. With brackets, distributing gives $$-2x\\frac{dy}{dx} - 2y$$ (both terms negative).\n- Step 2: Without brackets, a student might write $$-2x\\frac{dy}{dx} + y$$ (only applying the $$-2$$ to the first term, forgetting it also multiplies the $$+y$$). This sign error on the $$y$$-term propagates through all subsequent algebra.\n- Step 3: Consequence: when collecting $$\\frac{dy}{dx}$$ terms, the wrong sign on $$-2y$$ means it goes to the wrong side, producing a completely incorrect final expression for $$\\frac{dy}{dx}$$.\n\nBrackets are not optional decoration — they ensure correct distribution of coefficients and signs. One missing bracket can corrupt the entire answer.", "source": "GLM 5.1 ②", "_id": "glm_2_54", "judge_pick": true}, {"question": "A function $$g(x) = \\frac{5x+3}{x+2}$$ has domain $$x > -2$$ and range $$y < 5$$. A student claims the domain of $$g^{-1}$$ is $$x > -2$$ (same as the original domain). Why is this wrong? (2 steps)", "answer": "- Step 1: The domain of the inverse is derived from the *range* of the original, not the domain. The rule is: domain of $$g^{-1}$$ = range of $$g$$.\n- Step 2: Since range of $$g$$ is $$y < 5$$, the domain of $$g^{-1}$$ is $$x < 5$$ — completely different from the original domain $$x > -2$$. The student confused \"domain of inverse\" with \"domain of original,\" which are generally unrelated.\n\nDomain of inverse ≠ Domain of original. Domain of inverse = Range of original. These are entirely different numbers in most cases.", "source": "GLM 5.1 ②", "_id": "glm_2_55", "judge_pick": false}, {"question": "When transforming integral limits via substitution, a student gets bottom limit = 4 and top limit = 3, then \"corrects\" this by swapping, saying $$\\int_4^3 = \\int_3^4$$. What mathematical law contradicts this, and what is the correct relationship? (2 steps)", "answer": "- Step 1: The fundamental theorem gives $$\\int_a^b f(u)\\,du = -\\int_b^a f(u)\\,du$$ — swapping limits introduces a **negative sign**, not equality. $$\\int_4^3 f(u)\\,du \\neq \\int_3^4 f(u)\\,du$$; rather, $$\\int_4^3 f(u)\\,du = -\\int_3^4 f(u)\\,du$$.\n- Step 2: If you swap the limits without accounting for the sign change, you'll get the wrong answer (off by a factor of −1). The correct approach: keep the limits in their mapped order (4 on bottom, 3 on top) and handle any sign issues from $$d\\theta = -du/\\sin\\theta$$ separately.\n\n$$\\int_a^b = -\\int_b^a$$. Swapping limits flips the sign. Never swap without tracking the consequence — work with the mapped order instead.", "source": "GLM 5.1 ②", "_id": "glm_2_56", "judge_pick": false}, {"question": "A student sees $$\\int u^{-1/2}\\,du$$ and writes $$\\frac{u^{-1/2+1}}{-1/2+1} = \\frac{u^{1/2}}{1/2}$$. They then claim this equals $$\\frac{1}{2}u^{1/2}$$, confusing the division. What is the correct result, and how should you think about \"divide by a fraction\"? (3 steps)", "answer": "- Step 1: $$\\int u^{-1/2}\\,du = \\frac{u^{1/2}}{1/2}$$ — the new power is $$-1/2 + 1 = 1/2$$, and you divide by this new power.\n- Step 2: Dividing by $$\\frac{1}{2}$$ is the same as multiplying by 2: $$\\frac{u^{1/2}}{1/2} = u^{1/2} \\times 2 = 2u^{1/2}$$. The student incorrectly treated \"divide by 1/2\" as \"multiply by 1/2,\" getting $$\\frac{1}{2}u^{1/2}$$ — half the correct answer.\n- Step 3: Mental check: $$u^{-1/2} = \\frac{1}{\\sqrt{u}}$$, which is a large value near $$u=0$$ and decreasing. Its integral should *grow* (with decreasing slope), so $$2\\sqrt{u}$$ (increasing) makes sense, while $$\\frac{1}{2}\\sqrt{u}$$ (too small) doesn't.\n\nDividing by a fraction: $$\\frac{a}{1/n} = a \\times n$$. \"Divide by 1/2 = multiply by 2.\" This is the most common arithmetic slip in power-rule integration.", "source": "GLM 5.1 ②", "_id": "glm_2_57", "judge_pick": true}, {"question": "For the binomial expansion of $$(1+ax)^n$$ with $$n$$ negative or fractional, why is the convergence condition $$|ax|<1$$ necessary, and what goes wrong if $$|ax| \\geq 1$$? (3 steps)", "answer": "- Step 1: The series is infinite (doesn't terminate). Each term involves $$\\frac{n(n-1)\\cdots(n-k+1)}{k!}(ax)^k$$ — the coefficient grows combinatorially while $$|ax|^k$$ grows or shrinks depending on $$|ax|$$.\n- Step 2: If $$|ax| < 1$$, then $$|ax|^k$$ shrinks exponentially as $$k$$ increases, eventually overpowering the growing coefficient. The terms converge to zero fast enough for the infinite sum to have a finite value.\n- Step 3: If $$|ax| \\geq 1$$, the powers $$|ax|^k$$ don't shrink (they grow or stay constant), so the terms don't converge to zero. The infinite sum diverges — it has no finite value, and the expansion is meaningless outside the convergence range.\n\n$$|ax|<1$$ ensures the geometric shrinking of each term dominates the combinatorial growth of coefficients. Without it, the infinite series blows up.", "source": "GLM 5.1 ②", "_id": "glm_2_58", "judge_pick": true}, {"question": "In a vectors problem, you have three component equations but only two unknowns ($$\\lambda$$ and $$\\mu$$). You solve equations 1 and 3 to find $$\\lambda$$ and $$\\mu$$, but equation 2 involves an additional unknown $$\\beta$$. How do you find $$\\beta$$, and what does its value tell you? (3 steps)", "answer": "- Step 1: After solving equations 1 and 3 (which contain only $$\\lambda$$ and $$\\mu$$), you have specific numerical values for $$\\lambda$$ and $$\\mu$$.\n- Step 2: Substitute these known values into equation 2 (which contains $$\\lambda$$, $$\\mu$$, and $$\\beta$$). Now $$\\lambda$$ and $$\\mu$$ are numbers, leaving a simple linear equation with only $$\\beta$$ as the unknown.\n- Step 3: Solve for $$\\beta$$. Its value tells you the specific position of the fixed point in line $$L_2$$'s definition — i.e., what value of $$\\beta$$ makes $$L_2$$ pass through the intersection point.\n\nStrategy: solve the two \"clean\" equations first (fewest unknowns), then use the results to tackle the equation with the extra unknown. Sequential, not simultaneous.", "source": "GLM 5.1 ②", "_id": "glm_2_59", "judge_pick": false}, {"question": "Why is the constant of integration added only to ONE side when solving a separable ODE, rather than to both sides? (3 steps)", "answer": "- Step 1: After integrating both sides: $$\\int\\frac{dy}{g(y)} = \\int f(x)\\,dx$$, you get $$F(y) = G(x) + C_1$$ and could write $$F(y) + C_2 = G(x) + C_1$$.\n- Step 2: But $$C_2$$ and $$C_1$$ can be combined: $$F(y) = G(x) + (C_1 - C_2) = G(x) + C$$, where $$C = C_1 - C_2$$ is just a single renamed constant. Two constants on opposite sides are redundant.\n- Step 3: Adding $$+C$$ to both sides creates an illusion of two independent constants, but they always merge into one. Convention: add $$+C$$ to the right side only, acknowledging there's truly just one degree of freedom.\n\nOne constant because: the general solution of a first-order ODE has exactly one arbitrary constant (one integration, one degree of freedom).", "source": "GLM 5.1 ②", "_id": "glm_2_60", "judge_pick": false}, {"question": "A student solving $$\\frac{dy}{dx} = e^{x+y}$$ tries to separate as $$\\frac{dy}{e^y} = e^x\\,dx$$ and gets stuck integrating the left side. What simpler separation should they have used? (3 steps)", "answer": "- Step 1: The equation is $$\\frac{dy}{dx} = e^{x+y} = e^x \\cdot e^y$$ (split the exponent using $$e^{a+b} = e^a \\cdot e^b$$). This IS separable.\n- Step 2: The student's separation $$\\frac{dy}{e^y} = e^x\\,dx$$ is actually correct — $$\\int e^{-y}\\,dy = -e^{-y}$$ (a standard integral). But there's a cleaner approach: divide by $$e^y$$ and write $$e^{-y}\\,dy = e^x\\,dx$$.\n- Step 3: Integrate: $$\\int e^{-y}\\,dy = \\int e^x\\,dx$$ → $$-e^{-y} = e^x + C$$ → $$e^{-y} = -e^x - C = A - e^x$$ (renaming constant) → $$-y = \\ln(A - e^x)$$ → $$y = -\\ln(A - e^x)$$. The solution exists only where $$A > e^x$$.\n\n$$e^{x+y} = e^x \\cdot e^y$$ is the key insight — split compound exponents to reveal separability. The left-side integral $$\\int e^{-y}\\,dy = -e^{-y}$$ is straightforward.", "source": "GLM 5.1 ②", "_id": "glm_2_61", "judge_pick": true}, {"question": "In implicit differentiation, why do you multiply by $$\\frac{dy}{dx}$$ whenever you differentiate a term containing $$y$$ with respect to $$x$$? Give the chain-rule reasoning. (3 steps)", "answer": "- Step 1: $$y$$ is an implicit function of $$x$$: $$y = y(x)$$, even though we don't know the explicit formula. When you differentiate a term like $$y^2$$ with respect to $$x$$, you're really differentiating $$[y(x)]^2$$.\n- Step 2: By the chain rule: $$\\frac{d}{dx}[y(x)]^2 = 2y(x) \\cdot \\frac{dy(x)}{dx} = 2y\\frac{dy}{dx}$$. The outer derivative gives $$2y$$, and the inner derivative gives $$\\frac{dy}{dx}$$ — you must include both.\n- Step 3: Similarly, differentiating $$\\sin(y)$$: $$\\frac{d}{dx}\\sin(y) = \\cos(y)\\frac{dy}{dx}$$; differentiating $$e^y$$: $$\\frac{d}{dx}e^y = e^y\\frac{dy}{dx}$$. Every y-containing term gets an extra $$\\frac{dy}{dx}$$ factor from the chain rule.\n\n$$\\frac{d}{dx}[\\text{anything involving }y] = \\frac{d}{dy}[\\text{that thing}] \\times \\frac{dy}{dx}$$ — chain rule with $$y$$ as the inner function.", "source": "GLM 5.1 ②", "_id": "glm_2_62", "judge_pick": false}, {"question": "In the nested squares ESAT problem, a student picks the outer square side = 1 instead of 3, getting segments of 1/3 and 2/3. They compute the inner side as $$\\sqrt{(1/3)^2 + (2/3)^2} = \\sqrt{5}/3$$ and area ratio = $$(5/9)$$, but worries this looks different from the \"side = 3\" approach. Does the ratio change? (2 steps)", "answer": "- Step 1: Inner area = $$5/9$$, outer area = $$1$$, ratio = $$5/9$$ — identical to the side = 3 approach (where inner area = 5, outer area = 9, ratio = 5/9). The ratio is the same regardless of scale.\n- Step 2: The side = 3 approach avoids fractions entirely (segments are nice integers 1 and 2), making arithmetic faster and less error-prone under ESAT time pressure. The ratio is mathematically identical either way, but the convenient choice reduces cognitive load.\n\nPick the scale that minimizes fractions and ugly numbers. The ratio is scale-invariant — your choice only affects how pleasant the arithmetic is.", "source": "GLM 5.1 ②", "_id": "glm_2_63", "judge_pick": true}, {"question": "A student writes the range of $$g(x) = 5 + \\frac{-7}{x+2}$$ (domain $$x > -2$$) as \"$$y \\in \\mathbb{R}, y \\neq 5$$.\" Why is this too broad? (2 steps)", "answer": "- Step 1: \"$$y \\in \\mathbb{R}, y \\neq 5$$\" describes the range of the *unrestricted* graph (both branches: $$y < 5$$ and $$y > 5$$). It includes all real numbers except 5.\n- Step 2: With domain $$x > -2$$, only the right branch exists, giving exclusively $$y < 5$$. Values like $$y = 7$$ (from the left branch, $$x < -2$$) are impossible. The correct range is $$y < 5$$ — a half-line, not \"all reals except 5.\"\n\nDomain restriction halves the range. The unrestricted range is \"$$y \\neq 5$$\"; the restricted range is either \"$$y < 5$$\" or \"$$y > 5$$\" depending on which branch you keep.", "source": "GLM 5.1 ②", "_id": "glm_2_64", "judge_pick": false}], "count": 65}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "In a geometric problem asking for a *fraction* (ratio) rather than an absolute measurement, why is it valid — and strategically wise — to assign a convenient number like 1 to a length, instead of using a variable like $$x$$? (2 steps)", "answer": "- Step 1: A fraction is dimensionless — it compares two quantities in the same units, so any scaling factor cancels out. If the original area is $$k \\cdot 9$$ and the inner area is $$k \\cdot 5$$, the ratio is always $$5/9$$ regardless of $$k$$. Assigning a specific number eliminates the variable without changing the answer.\n- Step 2: Strategically, using 1 (or 3, if \"one-third\" suggests thirds) makes Pythagoras and arithmetic trivial — no algebraic clutter, faster computation, fewer sign errors. This is especially valuable under timed conditions like the ESAT.\n\nTakeaway: When the answer is a ratio, pick the most convenient concrete number; the result is invariant.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "A square has side length 3. Points are marked $$\\frac{1}{3}$$ of the way along each side, and joined to form an inner square. What is the side length of the inner square, and what is the area ratio of the inner square to the outer square? (3 steps)", "answer": "- Step 1: If the full side is 3, then each segment along the side is 1. The inner square's side is the hypotenuse of a right triangle with legs 1 and 2 (one segment and two segments). By Pythagoras: $$\\sqrt{1^2 + 2^2} = \\sqrt{5}$$.\n- Step 2: Area of inner square $$= (\\sqrt{5})^2 = 5$$. Area of outer square $$= 3^2 = 9$$.\n- Step 3: Ratio $$= \\frac{5}{9}$$. Each iteration multiplies the area by this same ratio because the construction is self-similar — the same geometric relationship repeats at every scale.\n\nTakeaway: The area ratio per iteration is $$\\frac{5}{9}$$; it is constant because the construction is scale-invariant.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "If each nested square has area $$\\frac{5}{9}$$ of the previous one, what fraction of the original square's area is the 4th square (i.e., after 3 iterations of the nesting)? Why is this $$\\left(\\frac{5}{9}\\right)^3$$ and not $$\\left(\\frac{5}{9}\\right)^4$$? (2 steps)", "answer": "- Step 1: The 1st (original) square is the starting point — ratio $$= 1$$. The 2nd square has ratio $$\\frac{5}{9}$$. The 3rd square has ratio $$\\left(\\frac{5}{9}\\right)^2$$. The 4th square has ratio $$\\left(\\frac{5}{9}\\right)^3$$. The exponent counts the number of *transitions* between squares, not the square number.\n+ Think of it like compound interest: if each year you retain 5/9 of your capital, after 3 years you have $$\\left(\\frac{5}{9}\\right)^3$$ of the original. The \"4th square\" means 3 steps of reduction from the original.\n- Step 2: Common trap: seeing \"4th square\" and writing $$\\left(\\frac{5}{9}\\right)^4$$. But the original (1st) square already has full area — the first reduction gives the 2nd square. So the 4th square involves only 3 reductions.\n\nTakeaway: The exponent equals (square number minus 1), because the original square is the baseline.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": true}, {"question": "When performing polynomial long division of $$\\frac{5x+3}{x+2}$$, you obtain quotient 5 and remainder $$-7$$. Why must the final answer be written as $$5 + \\frac{-7}{x+2}$$ rather than $$5(x+2) - 7$$? (2 steps)", "answer": "- Step 1: The division algorithm states: $$\\text{Dividend} = \\text{Divisor} \\times \\text{Quotient} + \\text{Remainder}$$. So $$5x + 3 = (x+2)(5) + (-7)$$. Dividing both sides by the divisor $$(x+2)$$ gives $$\\frac{5x+3}{x+2} = 5 + \\frac{-7}{x+2}$$. This is the standard form: quotient plus remainder-over-divisor.\n- Step 2: Writing $$5(x+2) - 7$$ is just the *undivided* form — it equals the numerator $$5x+3$$, not the original fraction. It skips the crucial final step of dividing by $$(x+2)$$. In an exam, you lose the mark for not expressing it in the required \"quotient + remainder/divisor\" form.\n\nTakeaway: Always finish with $$\\text{quotient} + \\frac{\\text{remainder}}{\\text{divisor}}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": true}, {"question": "The function $$g(x) = 5 + \\frac{-7}{x+2}$$ is a sequence of transformations applied to the parent function $$h(x) = \\frac{-1}{x}$$. List the four transformations in order and state what each does to the graph. (3 steps)", "answer": "- Step 1: Start with $$h(x) = \\frac{-1}{x}$$. The expression $$\\frac{-7}{x+2}$$ can be built step by step:\n  + Replace $$x$$ with $$x+2$$: translates the graph left by 2 (horizontal translation). This moves the vertical asymptote from $$x=0$$ to $$x=-2$$.\n  + Multiply by 7: vertical stretch by factor 7. Asymptotes unaffected (since $$7 \\times 0 = 0$$).\n- Step 2: The $$+5$$ outside: translates the graph up by 5. This moves the horizontal asymptote from $$y=0$$ to $$y=5$$.\n- Step 3: Summary of asymptote transformations:\n  + Vertical asymptote: $$x=0 \\to x=-2$$ (from the $$x+2$$ inside)\n  + Horizontal asymptote: $$y=0 \\to y=5$$ (from the $$+5$$ outside)\n  + The vertical stretch by 7 affects the steepness but not the asymptote positions.\n\nTakeaway: Transformations inside the bracket affect the $$x$$-asymptote (and do the \"opposite\" of what they say); transformations outside affect the $$y$$-asymptote (and do what they say).", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": true}, {"question": "For the function $$g(x) = 5 + \\frac{-7}{x+2}$$ with domain $$x > -2$$, the graph is restricted to only the right-hand branch. Why is the range $$y < 5$$ (not $$y > 5$$), and why must we write the range using $$y$$ and the domain using $$x$$? (2 steps)", "answer": "- Step 1: The parent $$\\frac{-1}{x}$$ has two branches: for $$x > 0$$, the output is negative (below the horizontal asymptote). After all transformations, the right-hand branch (where $$x > -2$$) sits *below* the horizontal asymptote $$y = 5$$, approaching it from below but never reaching it. Hence range: $$y < 5$$.\n+ Edge case: if the domain were $$x < -2$$ instead, we'd take the left-hand branch, which sits *above* $$y = 5$$, giving range $$y > 5$$.\n- Step 2: Exam notation rule: domain always uses the variable $$x$$ (e.g., $$x < 5$$), range always uses $$y$$ (e.g., $$y < 5$$). Writing \"domain: $$y < 5$$\" or \"range: $$x < 5$$\" is marked wrong — it confuses input with output.\n\nTakeaway: The branch you keep determines whether the range is above or below the asymptote; always use $$x$$ for domain and $$y$$ for range.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "If the range of $$g(x)$$ is $$y < 5$$, what is the domain of $$g^{-1}(x)$$, and why? What common exam mistake loses a mark here? (2 steps)", "answer": "- Step 1: The domain of the inverse equals the range of the original function. Since range of $$g$$ is $$y < 5$$, the domain of $$g^{-1}$$ is $$x < 5$$ (swapping $$y$$ back to $$x$$ because we're now talking about the input of $$g^{-1}$$).\n- Step 2: The common mistake is giving only the *equation* of the inverse without stating its domain. Even if the question doesn't explicitly ask for the domain, it is required — omitting it loses a mark. The domain is what makes the inverse a *function* (one-to-one), so it's essential.\n\nTakeaway: Always state the domain of the inverse — it's the range of the original, rewritten with $$x$$.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "When computing the composite function $$fg(x)$$, which function is the \"inner\" and which is the \"outer\"? If you accidentally swap them, what goes wrong conceptually? (2 steps)", "answer": "- Step 1: In $$fg(x)$$, $$g$$ is the inner function and $$f$$ is the outer. You compute $$g(x)$$ first, then feed that result into $$f$$. Read left-to-right: first $$f$$ is applied last, $$g$$ is applied first.\n+ Mnemonic: $$fg(x) = f(g(x))$$ — the function written closest to $$(x)$$ is applied first.\n- Step 2: If you swap them and compute $$g(f(x))$$ instead, you get a completely different expression. For example, if $$f(x) = e^{2x}$$ and $$g(x) = \\frac{5x+3}{x+2}$$, then $$fg(x)$$ means substitute the rational function into the exponential, while $$gf(x)$$ means substitute the exponential into the rational function — completely different equations, completely different solutions.\n\nTakeaway: The order of composition matters critically. Inner function first, outer function second.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "When implicitly differentiating a term like $$xy$$ with respect to $$x$$, you must use the product rule. Why are brackets essential around the product rule expansion $$\\left[x\\frac{dy}{dx} + y\\right]$$, and what error occurs if you omit them when there's a coefficient like $$-2$$ in front? (3 steps)", "answer": "- Step 1: The product rule gives $$\\frac{d}{dx}(xy) = x \\cdot \\frac{dy}{dx} + y \\cdot 1 = x\\frac{dy}{dx} + y$$. This entire expression replaces $$xy$$ in the differentiated equation.\n- Step 2: If the original term is $$-2xy$$, the derivative is $$-2\\left[x\\frac{dy}{dx} + y\\right] = -2x\\frac{dy}{dx} - 2y$$. Without brackets, you might write $$-2x\\frac{dy}{dx} + y$$, which only applies the $$-2$$ to the first term — a sign/distribution error.\n- Step 3: This cascades: the $$-2y$$ term gets moved to the other side during rearrangement, so forgetting the bracket means the $$y$$ term has the wrong sign, and the final $$\\frac{dy}{dx}$$ expression is completely wrong.\n\nTakeaway: Always write brackets around the product rule result when there's an external coefficient.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": true}, {"question": "After implicitly differentiating a curve equation and collecting all terms with $$\\frac{dy}{dx}$$ on one side, you have: $$(y - x)\\frac{dy}{dx} = 12 - 4x + 2y$$. Why is it helpful to divide everything by 2 *before* factoring out $$\\frac{dy}{dx}$$, and what's the final expression? (2 steps)", "answer": "- Step 1: Dividing every term by 2 simplifies the coefficients without changing the equation (valid because 2 ≠ 0). This makes the arithmetic cleaner and reduces the chance of arithmetic errors when you eventually factor out $$\\frac{dy}{dx}$$. The equation becomes: $$\\left(\\frac{y}{2} - \\frac{x}{2}\\right)\\frac{dy}{dx}$$ ... actually, more precisely, if we had $$2y\\frac{dy}{dx} - 2x\\frac{dy}{dx}$$ on one side, dividing by 2 gives $$(y - x)\\frac{dy}{dx}$$ on the left, and $$6 - 2x + y$$ on the right.\n- Step 2: Then $$\\frac{dy}{dx} = \\frac{12 - 4x + 2y}{y - x}$$, and dividing numerator and denominator by 2 gives $$\\frac{dy}{dx} = \\frac{6 - 2x + y}{y - x}$$... Actually, the key insight: simplifying early means smaller numbers throughout, and the final answer is cleaner and easier to verify.\n\nTakeaway: Simplify coefficients early — it's the algebraic equivalent of reducing fractions before multiplying.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": true}, {"question": "A point $$P(a, b)$$ lies on a curve and has gradient 2. This gives you the equation $$4a + b = 12$$ from the gradient condition. But you have two unknowns $$a$$ and $$b$$. What is the \"hidden\" second equation, and why do students often miss it? (2 steps)", "answer": "- Step 1: The second equation comes from the fact that $$P(a,b)$$ *lies on the curve*. This means the coordinates $$(a, b)$$ satisfy the original curve equation. For example, if the curve is $$4x^2 + 2xy - 2xy + \\ldots = 24$$, then substituting gives a second equation in $$a$$ and $$b$$.\n- Step 2: Students miss this because the condition \"P lies on the curve\" is stated so naturally that it doesn't *feel* like a separate piece of information — it feels like background context. But in algebra, every geometric condition is an equation. \"P lies on the curve\" is exactly as powerful as \"P satisfies the curve equation\" — it's your second equation.\n\nTakeaway: Every geometric condition (point on curve, point on line, gradient at point) translates to an algebraic equation. Count your equations and unknowns.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": true}, {"question": "You have two simultaneous equations: $$4a + b = 12$$ and a curve equation like $$4a^2 + b^2 = k$$ (from substituting $$P(a,b)$$ into the curve). Why is substitution (rather than elimination) the natural first step, and what type of equation results? (2 steps)", "answer": "- Step 1: From the linear equation $$4a + b = 12$$, you can express $$b = 12 - 4a$$ (or $$b = 12 - 2a$$ depending on the specific equation) in one step. This is straightforward because the equation is linear. Substituting this into the curve equation (which is quadratic) avoids the messiness of elimination with mixed terms.\n- Step 2: The result is a quadratic equation in one variable (e.g., in $$a$$). Solve it to get two candidate values, then use the physical context to reject invalid ones (e.g., if the problem constrains $$b > 0$$, reject the negative solution).\n\nTakeaway: Linear + quadratic system → substitute from the linear into the quadratic → solve the resulting quadratic → check constraints.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "Two lines $$L_1$$ and $$L_2$$ intersect at point $$P$$. Their position vectors are $$\\mathbf{r}_1 = \\mathbf{a} + \\lambda\\mathbf{d}_1$$ and $$\\mathbf{r}_2 = \\mathbf{b} + \\mu\\mathbf{d}_2$$. Why does setting $$\\mathbf{r}_1 = \\mathbf{r}_2$$ give us the intersection point? (2 steps)", "answer": "- Step 1: At the intersection point $$P$$, both lines pass through the same point in space. The position vector from the origin to $$P$$ can be described using *either* line's equation. So there exist values of $$\\lambda$$ and $$\\mu$$ such that both equations give the same position vector.\n- Step 2: Setting $$\\mathbf{r}_1 = \\mathbf{r}_2$$ equates the two expressions, giving a vector equation with three component equations. This system can be solved for $$\\lambda$$ and $$\\mu$$, and then substituted back to find the coordinates of $$P$$.\n\nTakeaway: Intersection = \"same point, described by two different line equations\" = equate the position vectors.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "When equating two vector line equations component-wise, you get three equations but only two unknowns ($$\\lambda$$ and $$\\mu$$; the third parameter $$\\beta$$ might be a constant to find). Which two equations should you solve first, and why? (2 steps)", "answer": "- Step 1: Pick the two equations that involve only $$\\lambda$$ and $$\\mu$$ (no other unknowns like $$\\beta$$). Typically, the $$x$$-component and $$z$$-component equations only contain $$\\lambda$$ and $$\\mu$$, while the $$y$$-component equation also contains $$\\beta$$.\n- Step 2: Solve the two \"clean\" equations for $$\\lambda$$ and $$\\mu$$ first. Then substitute into the third equation to find $$\\beta$$. This avoids dealing with three unknowns simultaneously and is the most efficient path.\n\nTakeaway: Always identify which equations involve the fewest unknowns and solve those first.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "After finding the intersection of two lines, you compute the position vector $$\\mathbf{r} = \\begin{pmatrix} -7 \\\\ -37 \\\\ -15 \\end{pmatrix}$$. The question asks for \"the coordinates of $$P$$.\" Why is writing the answer as a column vector marked wrong, and what should you write instead? (2 steps)", "answer": "- Step 1: A column vector $$\\begin{pmatrix} -7 \\\\ -37 \\\\ -15 \\end{pmatrix}$$ represents a *displacement* or *position vector* — a mathematical object with direction and magnitude. Coordinates $$(-7, -37, -15)$$ represent a *point* in space. The question asks for a point, not a vector.\n- Step 2: In exam convention, \"coordinates\" means a row written as $$(x, y, z)$$ with round brackets and commas. Writing a column vector fails to answer what was asked. Always check the question wording: \"coordinates\" → row form; \"position vector\" → column form with $$\\mathbf{i}, \\mathbf{j}, \\mathbf{k}$$ or column notation.\n\nTakeaway: Coordinates ≠ vector. Match your answer format to what the question requests.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "When using the substitution $$u = 3 + \\cos\\theta$$ in an integral, you find $$\\frac{du}{d\\theta} = -\\sin\\theta$$, so $$d\\theta = \\frac{-du}{\\sin\\theta}$$. The original limits are $$\\theta = 0$$ and $$\\theta = \\frac{\\pi}{2}$$. Why does the lower limit become the *larger* $$u$$-value, and why is this a common trap? (3 steps)", "answer": "- Step 1: Transform each limit individually using $$u = 3 + \\cos\\theta$$:\n  + $$\\theta = 0$$: $$u = 3 + \\cos(0) = 3 + 1 = 4$$\n  + $$\\theta = \\frac{\\pi}{2}$$: $$u = 3 + \\cos\\left(\\frac{\\pi}{2}\\right) = 3 + 0 = 3$$\n- Step 2: The original integral goes from $$\\theta = 0$$ (bottom) to $$\\theta = \\frac{\\pi}{2}$$ (top). After substitution, the bottom limit is $$u = 4$$ and the top limit is $$u = 3$$. The order is *reversed* because $$\\cos\\theta$$ is decreasing on $$[0, \\frac{\\pi}{2}]$$.\n- Step 3: The trap: students instinctively put the bigger number on top (4 on top, 3 on bottom), which gives the *negative* of the correct answer. You must preserve the mapping from the original limits — the bottom limit of $$\\theta$$ maps to the bottom limit of $$u$$, regardless of which number is bigger.\n\nTakeaway: Transform limits individually and preserve their order. The bottom limit stays at the bottom.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": true}, {"question": "During the substitution $$u = 3 + \\cos\\theta$$, the integrand contains a factor of $$\\cos\\theta$$. Why can't you factor $$\\cos\\theta$$ out of the integral as if it were a constant? (2 steps)", "answer": "- Step 1: $$\\cos\\theta$$ depends on $$\\theta$$ — it varies as $$\\theta$$ changes across the integration range. A constant can be pulled out because it has the same value everywhere in the integral. But $$\\cos\\theta$$ takes different values at different points, so it cannot be treated as a fixed multiplier.\n- Step 2: Instead, use the substitution relationship: $$u = 3 + \\cos\\theta$$ implies $$\\cos\\theta = u - 3$$. Now replace $$\\cos\\theta$$ with $$u - 3$$, which is expressed in terms of the new integration variable $$u$$. This is valid because the substitution gives us an explicit relationship.\n\nTakeaway: If a quantity depends on the integration variable, it's a variable — not a constant. Use the substitution to express it in terms of the new variable.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "After simplifying an integral, you arrive at terms like $$u^{1/2}$$ and $$u^{-1/2}$$. A student says \"the integral of $$u^{-1/2}$$ is $$\\ln|u|$$.\" Why is this wrong, and what is the correct approach? (2 steps)", "answer": "- Step 1: The power rule states $$\\int u^n \\, du = \\frac{u^{n+1}}{n+1} + C$$ for $$n \\neq -1$$. The natural log rule $$\\int u^{-1} \\, du = \\ln|u| + C$$ applies *only* when the power is exactly $$-1$$. Here, the power is $$-\\frac{1}{2}$$, which is not $$-1$$.\n- Step 2: Applying the power rule to $$u^{-1/2}$$: add 1 to the power to get $$u^{1/2}$$, then divide by the new power $$\\frac{1}{2}$$: $$\\int u^{-1/2} \\, du = \\frac{u^{1/2}}{1/2} = 2u^{1/2} + C$$. Similarly, $$\\int u^{1/2} \\, du = \\frac{u^{3/2}}{3/2} = \\frac{2}{3}u^{3/2} + C$$.\n\nTakeaway: The ln rule applies only when the power is exactly $$-1$$. For all other powers, use the power rule.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "When splitting the integrand $$\\frac{u - 3}{u^{1/2}}$$ into two separate terms before integrating, what algebraic step are you performing, and why is it necessary? (2 steps)", "answer": "- Step 1: You're splitting the fraction: $$\\frac{u - 3}{u^{1/2}} = \\frac{u}{u^{1/2}} - \\frac{3}{u^{1/2}} = u^{1 - 1/2} - 3u^{-1/2} = u^{1/2} - 3u^{-1/2}$$. This uses the law $$\\frac{u^a}{u^b} = u^{a-b}$$.\n- Step 2: This is necessary because the power rule applies to *single power terms*, not sums divided by powers. You can't directly integrate $$\\frac{u-3}{\\sqrt{u}}$$ as one lump — you must split it into terms where each is a pure power of $$u$$, then integrate term by term.\n\nTakeaway: Split fractions using index laws before integrating. Each term must be a single power of $$u$$.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "In the binomial expansion chapter, the formula book provides *two* versions of the binomial formula. One requires $$n$$ to be a positive integer; the other works for any real $$n$$. How can you tell which one to use, and what is the key structural difference between them? (2 steps)", "answer": "- Step 1: Check the power $$n$$. If $$n$$ is a positive integer (1, 2, 3, ...), the \"top\" version (the standard binomial theorem with combinations $$\\binom{n}{r}$$) works and the expansion terminates after $$n+1$$ terms. If $$n$$ is negative or fractional, you *must* use the \"bottom\" version (the infinite series with $$\\frac{n(n-1)(n-2)\\cdots}{r!}$$), which never terminates.\n- Step 2: The key structural difference: the top version has finitely many terms (it stops); the bottom version is an infinite series that converges only when $$|x| < 1$$ (or more generally, when the term inside the bracket has absolute value less than 1). In P3/P4, you'll almost always use the bottom version because the powers are typically negative or fractional.\n\nTakeaway: Negative or fractional power → bottom version (infinite series). Positive integer power → either works, but top version is simpler.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": true}, {"question": "To expand $$(2 + 5x)^{-2}$$ using the binomial series, you must first rewrite it as $$2^{-2}\\left(1 + \\frac{5x}{2}\\right)^{-2}$$. Why must the expression inside the brackets start with 1, and what happens if you try to apply the series directly to $$(2 + 5x)^{-2}$$? (2 steps)", "answer": "- Step 1: The binomial series formula $$(1 + x)^n = 1 + nx + \\frac{n(n-1)}{2!}x^2 + \\cdots$$ is derived specifically for the case where the first term inside the brackets is 1. This is what makes the expansion work cleanly — each term in the series is a power of the *second* term multiplied by a coefficient.\n- Step 2: If you tried to apply the series directly to $$(2 + 5x)^{-2}$$, you'd be computing $$(2 + 5x)^{-2} = 2^{-2}(1 + \\frac{5x}{2})^{-2}$$... but without factoring out the 2, the terms would be wrong. The formula would give nonsensical coefficients because it assumes the \"1\" is there. Factoring out $$2^{-2}$$ separates the constant multiplier from the series, and the series is then applied to $$\\left(1 + \\frac{5x}{2}\\right)$$.\n\nTakeaway: Always factor out the leading coefficient so the bracket starts with 1. The power applies to the factored-out constant too.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": true}, {"question": "After writing $$(2 + 5x)^{-2} = 2^{-2}\\left(1 + \\frac{5x}{2}\\right)^{-2}$$, you apply the binomial series with $$n = -2$$ and $$x$$ replaced by $$\\frac{5x}{2}$$. Write out the first three terms of the expansion. What happens to the signs of the coefficients? (3 steps)", "answer": "- Step 1: The binomial series gives $$(1 + t)^n = 1 + nt + \\frac{n(n-1)}{2!}t^2 + \\cdots$$ where $$t = \\frac{5x}{2}$$ and $$n = -2$$.\n- Step 2: Compute each term:\n  + First: $$1$$\n  + Second: $$(-2)\\left(\\frac{5x}{2}\\right) = -5x$$\n  + Third: $$\\frac{(-2)(-3)}{2!}\\left(\\frac{5x}{2}\\right)^2 = \\frac{6}{2} \\cdot \\frac{25x^2}{4} = 3 \\cdot \\frac{25x^2}{4} = \\frac{75x^2}{4}$$\n- Step 3: Notice the sign pattern: $$+, -, +, \\ldots$$ This alternates because each successive factor $$(n - k)$$ flips sign when $$n$$ is negative. Here, $$n = -2$$, so the factors go: $$-2, -3, -4, \\ldots$$ and the product of an even number of negatives is positive. The overall sign alternates.\n\nTakeaway: With negative $$n$$, the binomial coefficients alternate in sign. Compute carefully — don't assume all terms are negative.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "The binomial expansion of $$(1 + \\frac{5x}{2})^{-2}$$ is valid only when $$\\left|\\frac{5x}{2}\\right| < 1$$. What range of $$x$$ does this give, and why does the series diverge outside this range? (2 steps)", "answer": "- Step 1: $$\\left|\\frac{5x}{2}\\right| < 1$$ implies $$|x| < \\frac{2}{5}$$. So the expansion is valid for $$-\\frac{2}{5} < x < \\frac{2}{5}$$.\n- Step 2: The binomial series is an infinite sum. It converges (approaches a finite value) only when the terms shrink toward zero, which requires $$|t| < 1$$ where $$t = \\frac{5x}{2}$$. If $$|t| \\geq 1$$, successive terms don't shrink — they stay the same size or grow — so the infinite sum has no finite value and the series diverges. This is a fundamental property of power series: they have a \"radius of convergence.\"\n\nTakeaway: Always state the validity range when giving a binomial expansion. It's $$|t| < 1$$ where $$t$$ is the term after the \"1\" in the bracket.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": true}, {"question": "The volume of revolution formula is $$V = \\pi \\int y^2 \\, dx$$ for rotation about the $$x$$-axis. Conceptually, why is there a $$\\pi$$ and why is $$y$$ squared? (3 steps)", "answer": "- Step 1: When you rotate a thin horizontal strip of width $$dx$$ at height $$y$$ about the $$x$$-axis, it sweeps out a disc (a thin cylinder). The radius of this disc is $$y$$ (the distance from the $$x$$-axis to the curve), and its thickness is $$dx$$.\n- Step 2: The volume of a cylinder is $$\\pi r^2 h$$. Here, $$r = y$$ and $$h = dx$$, so the volume of one disc is $$\\pi y^2 \\, dx$$. The $$\\pi$$ comes from the circular cross-section; the $$y^2$$ comes from the area of that circle.\n- Step 3: Summing (integrating) all these discs from $$x = a$$ to $$x = b$$ gives $$V = \\pi \\int_a^b y^2 \\, dx$$. For rotation about the $$y$$-axis, the roles swap: the radius is $$x$$ and the thickness is $$dy$$, giving $$V = \\pi \\int x^2 \\, dy$$.\n\nTakeaway: Think \"disc method\" — each slice becomes a disc with area $$\\pi r^2$$ and thickness $$dx$$ (or $$dy$$).", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": true}, {"question": "If a curve is rotated about the $$x$$-axis by an angle $$\\theta$$ (instead of the full $$2\\pi$$), the volume formula becomes $$V = \\frac{\\theta}{2\\pi} \\cdot \\pi \\int y^2 \\, dx = \\frac{\\theta}{2} \\int y^2 \\, dx$$. Intuitively, why is the volume proportional to the angle of rotation? (2 steps)", "answer": "- Step 1: A full revolution ($$\\theta = 2\\pi$$) sweeps out the maximum volume. A half revolution ($$\\theta = \\pi$$) sweeps out exactly half the volume because you're only going halfway around. The volume is directly proportional to how far you rotate — like slicing a pie, the volume of a sector is proportional to its angle.\n- Step 2: The factor $$\\frac{\\theta}{2\\pi}$$ is the fraction of a full revolution. Multiply this by the full-revolution volume $$\\pi \\int y^2 \\, dx$$ to get the partial-revolution volume. Simplifying: $$V = \\frac{\\theta}{2} \\int y^2 \\, dx$$.\n\nTakeaway: Partial rotation volume = (angle fraction) × (full rotation volume).", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": true}, {"question": "A separable differential equation has the form $$\\frac{dy}{dx} = f(x) \\cdot g(y)$$. Describe the solution method and explain *why* separating variables works — what are you really doing when you \"move $$dy$$ and $$g(y)$$ to one side\"? (3 steps)", "answer": "- Step 1: Rearrange to isolate the $$y$$-terms with $$dy$$ and the $$x$$-terms with $$dx$$: $$\\frac{1}{g(y)} \\, dy = f(x) \\, dx$$. This is the \"separation\" step.\n- Step 2: Integrate both sides: $$\\int \\frac{1}{g(y)} \\, dy = \\int f(x) \\, dx + C$$. The constant of integration goes on one side (conventionally the right).\n- Step 3: Why this works: we're using the chain rule in reverse. If $$\\frac{dy}{dx} = f(x)g(y)$$, then dividing by $$g(y)$$ and \"multiplying by $$dx$$\" is a notational shortcut for the rigorous step: $$\\int \\frac{1}{g(y)} \\frac{dy}{dx} \\, dx = \\int f(x) \\, dx$$. By the substitution rule, the left side becomes $$\\int \\frac{1}{g(y)} \\, dy$$. The \"separation\" is really a chain-rule substitution.\n\nTakeaway: Separation of variables is the chain rule run backwards. The notation $$\\frac{dy}{dx} \\, dx = dy$$ is a mnemonic, not rigorous — but it gives the correct result.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": true}, {"question": "A linear first-order differential equation has the form $$\\frac{dy}{dx} + P(x)y = Q(x)$$. Describe the integrating factor method: what is the integrating factor, and why does multiplying by it make the left side a perfect derivative? (3 steps)", "answer": "- Step 1: Compute the integrating factor: $$\\text{IF} = e^{\\int P(x) \\, dx}$$. (Don't add a constant of integration here — it cancels out.)\n- Step 2: Multiply both sides of the ODE by IF: $$e^{\\int P \\, dx} \\frac{dy}{dx} + P(x) e^{\\int P \\, dx} y = Q(x) e^{\\int P \\, dx}$$. The left side is now exactly $$\\frac{d}{dx}\\left[y \\cdot e^{\\int P \\, dx}\\right]$$ by the product rule, because the derivative of $$e^{\\int P \\, dx}$$ is $$P(x) \\cdot e^{\\int P \\, dx}$$.\n- Step 3: So the equation becomes $$\\frac{d}{dx}\\left[y \\cdot \\text{IF}\\right] = Q(x) \\cdot \\text{IF}$$. Integrate both sides with respect to $$x$$: $$y \\cdot \\text{IF} = \\int Q(x) \\cdot \\text{IF} \\, dx + C$$. Then solve for $$y$$ by dividing by IF.\n\nTakeaway: The integrating factor is engineered so that the left side becomes a product-rule derivative. It \"undoes\" the product rule.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": true}, {"question": "How can you quickly distinguish whether a differential equation requires the *separable* method or the *integrating factor* method? Give the structural test. (2 steps)", "answer": "- Step 1: Try to separate first. If the equation can be written as $$\\frac{dy}{dx} = f(x) \\cdot g(y)$$ (the right side is a product of a pure function of $$x$$ and a pure function of $$y$$), then it's separable. This is always the first method to try because it's simpler.\n- Step 2: If the equation is in the form $$\\frac{dy}{dx} + P(x)y = Q(x)$$ (linear in $$y$$, with a $$y$$-term and a non-$$y$$-term on the right), and it *cannot* be separated (because $$y$$ appears both multiplied by a function of $$x$$ and in a term that isn't factorisable), then use the integrating factor. The key signal: the equation is *linear in* $$y$$ (no $$y^2$$, $$\\sin y$$, etc.) but not separable.\n\nTakeaway: Try separation first. If it fails and the equation is linear in $$y$$, use the integrating factor.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "When solving a vectors problem where two lines intersect and you have three unknowns ($$\\lambda$$, $$\\mu$$, $$\\beta$$) but only two equations from the components that don't involve $$\\beta$$, how do you find $$\\beta$$? (2 steps)", "answer": "- Step 1: Solve the two \"clean\" component equations (those involving only $$\\lambda$$ and $$\\mu$$) to find $$\\lambda$$ and $$\\mu$$. This can be done by hand (elimination/substitution) or by calculator if the question permits.\n- Step 2: Substitute the values of $$\\lambda$$ and $$\\mu$$ into the third component equation (the one that contains $$\\beta$$). This gives a single equation with $$\\beta$$ as the only unknown, which you solve directly.\n\nTakeaway: Reduce the number of unknowns step by step. Solve for the \"free\" variables first, then use them to find the constrained one.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "A student computes the integral $$\\int_4^3 u^{1/2} - 3u^{-1/2} \\, du$$ and gets a negative number. They think they made a sign error because \"area should be positive.\" Is this reasoning correct? Why or why not? (2 steps)", "answer": "- Step 1: This is *not* necessarily a sign error. When the lower limit is larger than the upper limit (4 at the bottom, 3 at the top), the integral evaluates to the negative of the integral from 3 to 4. This is a mathematical property: $$\\int_a^b f(x)\\,dx = -\\int_b^a f(x)\\,dx$$.\n- Step 2: Furthermore, a definite integral computes *signed area* (area above the axis minus area below), not total area. A negative result is perfectly valid and expected when the limits are reversed or when the function is negative. The student should NOT flip the limits to \"fix\" the answer — the reversed limits came from a valid substitution and must be preserved.\n\nTakeaway: Reversed limits give a negative integral. This is correct, not an error. Don't \"fix\" it by swapping limits.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": true}, {"question": "When using a calculator's simultaneous equation solver for a vectors problem, the question doesn't say \"solutions relying entirely on calculator technology are not acceptable.\" What should you still write down to get full marks? (2 steps)", "answer": "- Step 1: Write down the three component equations explicitly, numbered (1), (2), (3), rearranged in standard form (variables on the left, constants on the right). This shows the examiner you know how to set up the system.\n- Step 2: State that you used the calculator solver (e.g., \"Using calculator simultaneous equation solver on equations (1) and (3)\") and write the solutions. This is acceptable because the question doesn't ban calculator methods. But you *must* show the setup — the equations themselves — to earn method marks.\n\nTakeaway: Show the setup equations, state your method, write the answers. The calculator does the solving; you do the thinking.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": false}, {"question": "In the expression $$g(x) = \\frac{-7}{x+2} + 5$$, the domain is restricted to $$x > -2$$. If the domain were instead $$x < -2$$, how would the range change and why? (2 steps)", "answer": "- Step 1: With domain $$x > -2$$, we use the right-hand branch of the $$\\frac{-1}{x}$$-type graph. This branch is below the horizontal asymptote $$y = 5$$, giving range $$y < 5$$. With domain $$x < -2$$, we use the left-hand branch, which is above the asymptote, giving range $$y > 5$$.\n- Step 2: This is because the parent function $$\\frac{-1}{x}$$ has its positive branch for $$x < 0$$ (left side) and its negative branch for $$x > 0$$ (right side). After the transformations, the left branch of $$g$$ (where $$x < -2$$) maps to values above 5, and the right branch (where $$x > -2$$) maps to values below 5.\n\nTakeaway: The domain restriction selects which branch of the graph you keep, which determines the range. Same function, different domain → completely different range.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": false}, {"question": "A student sees $$\\int u^{-1/2} \\, du$$ and writes $$\\frac{u^{1/2}}{1/2} = 2\\sqrt{u}$$. Another student sees $$\\int \\frac{1}{u} \\, du$$ and writes $$\\ln|u|$$. Explain why these two students are using *different* rules, and what distinguishes when to use each. (2 steps)", "answer": "- Step 1: The distinction is the power of $$u$$. In $$u^{-1/2}$$, the power is $$-\\frac{1}{2}$$, which is *not* $$-1$$. The power rule applies: $$\\int u^n \\, du = \\frac{u^{n+1}}{n+1}$$ for $$n \\neq -1$$. In $$\\frac{1}{u} = u^{-1}$$, the power is exactly $$-1$$, and the power rule would require dividing by $$n+1 = 0$$, which is undefined. So a different rule (the ln rule) is needed.\n- Step 2: The ln rule is the *special case* exception to the power rule. It applies only when the power is $$-1$$. For all other powers (including $$-1/2$$, $$-2$$, $$1/2$$, etc.), use the power rule. The key diagnostic: rewrite the integrand as a power of $$u$$ and check if the exponent equals $$-1$$.\n\nTakeaway: Power rule for all $$n \\neq -1$$; ln rule for $$n = -1$$ only. Always check the exponent first.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": true}, {"question": "Conceptually, why does the binomial expansion $$(1+x)^n$$ produce an *infinite* series when $$n$$ is negative, but a *finite* series when $$n$$ is a positive integer? (2 steps)", "answer": "- Step 1: When $$n$$ is a positive integer, the coefficient $$\\frac{n(n-1)(n-2)\\cdots(n-k+1)}{k!}$$ eventually becomes zero. Specifically, when $$k = n+1$$, one of the factors in the numerator is $$(n - n) = 0$$, killing that term and all subsequent terms. The series terminates.\n- Step 2: When $$n$$ is negative (e.g., $$n = -2$$), the factors in the numerator are $$-2, -3, -4, \\ldots$$ — none of them is ever zero. So the coefficients never vanish, and the series continues indefinitely. It converges only when $$|x| < 1$$ (the terms shrink geometrically).\n\nTakeaway: Positive integer $$n$$ → numerator hits zero → series terminates. Negative $$n$$ → numerator never hits zero → infinite series.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": true}, {"question": "In the ESAT-style nested squares problem, you found the area ratio per iteration is $$\\frac{5}{9}$$. If the side of the outer square were chosen to be 6 instead of 3 (i.e., each segment along the side is 2 instead of 1), would the ratio change? Walk through the calculation to confirm. (3 steps)", "answer": "- Step 1: With side 6, each third is 2. The inner square's side is the hypotenuse of a right triangle with legs 2 and 4 (one segment and two segments): $$\\sqrt{2^2 + 4^2} = \\sqrt{4+16} = \\sqrt{20}$$.\n- Step 2: Inner area $$= (\\sqrt{20})^2 = 20$$. Outer area $$= 6^2 = 36$$. Ratio $$= \\frac{20}{36} = \\frac{5}{9}$$.\n- Step 3: The ratio is identical. This confirms that the ratio is scale-invariant — it depends only on the *proportion* (1/3 along each side), not the absolute size. This is why picking a convenient length works: any length gives the same answer.\n\nTakeaway: Geometric ratios from proportional constructions are scale-invariant.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": true}, {"question": "A curve has equation $$3x^2 + xy + y^2 = 7$$. When finding $$\\frac{dy}{dx}$$ implicitly, a student differentiates $$xy$$ as $$x \\cdot \\frac{dy}{dx}$$ (forgetting the second product rule term). What term is missing, and how does this error propagate? (2 steps)", "answer": "- Step 1: The missing term is $$y \\cdot \\frac{dx}{dx} = y \\cdot 1 = y$$. The full product rule gives $$\\frac{d}{dx}(xy) = x\\frac{dy}{dx} + y$$. The student's version $$x\\frac{dy}{dx}$$ omits the $$y$$ term entirely.\n- Step 2: This propagates as follows: the $$y$$ term should appear on one side of the equation during the rearrangement. Without it, when you collect all terms with $$\\frac{dy}{dx}$$, the coefficient of $$\\frac{dy}{dx}$$ is wrong, and the terms without $$\\frac{dy}{dx}$$ are wrong. The final expression for $$\\frac{dy}{dx}$$ has errors in both numerator and denominator.\n\nTakeaway: The product rule for $$xy$$ always gives *two* terms. Don't drop the \"obvious\" one.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": false}, {"question": "When the substitution $$u = 3 + \\cos\\theta$$ transforms an integral, the $$\\sin\\theta$$ in the numerator cancels with the $$\\sin\\theta$$ from $$d\\theta = \\frac{-du}{\\sin\\theta}$$. Why is this cancellation *not* a coincidence — what makes substitution work smoothly here? (2 steps)", "answer": "- Step 1: The substitution was chosen precisely because $$\\frac{du}{d\\theta} = -\\sin\\theta$$, and the integrand contains a factor of $$\\sin\\theta$$ (from the $$\\sin(2\\theta) = 2\\sin\\theta\\cos\\theta$$ identity). When we substitute $$d\\theta = \\frac{du}{-\\sin\\theta}$$, the $$\\sin\\theta$$ cancels. This is by design — exam questions choose substitutions that simplify the integral.\n- Step 2: In general, when choosing a substitution, you look for a function whose derivative appears (up to a constant) in the integrand. Here, the derivative of $$3 + \\cos\\theta$$ is $$-\\sin\\theta$$, which is essentially present in the integrand. The cancellation is the hallmark of a well-chosen substitution.\n\nTakeaway: A good substitution makes the integrand simpler because the derivative of the substitution cancels existing factors. This is the whole point of the technique.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": false}, {"question": "You need to compute $$2^{-2}$$ as part of the binomial expansion of $$(2+5x)^{-2}$$. What is the value, and why might a student mistakenly write $$-4$$ instead? (2 steps)", "answer": "- Step 1: $$2^{-2} = \\frac{1}{2^2} = \\frac{1}{4}$$. A negat
