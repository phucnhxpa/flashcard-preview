<script>
const DATA={"selected": [{"question": "When using the substitution $$u = 3 + \\cos\\theta$$ in an integral, you find $$\\frac{du}{d\\theta} = -\\sin\\theta$$, so $$d\\theta = \\frac{-du}{\\sin\\theta}$$. The original limits are $$\\theta = 0$$ and $$\\theta = \\frac{\\pi}{2}$$. Why does the lower limit become the *larger* $$u$$-value, and why is this a common trap? (3 steps)", "answer": "- Step 1: Transform each limit individually using $$u = 3 + \\cos\\theta$$:\n  + $$\\theta = 0$$: $$u = 3 + \\cos(0) = 3 + 1 = 4$$\n  + $$\\theta = \\frac{\\pi}{2}$$: $$u = 3 + \\cos\\left(\\frac{\\pi}{2}\\right) = 3 + 0 = 3$$\n- Step 2: The original integral goes from $$\\theta = 0$$ (bottom) to $$\\theta = \\frac{\\pi}{2}$$ (top). After substitution, the bottom limit is $$u = 4$$ and the top limit is $$u = 3$$. The order is *reversed* because $$\\cos\\theta$$ is decreasing on $$[0, \\frac{\\pi}{2}]$$.\n- Step 3: The trap: students instinctively put the bigger number on top (4 on top, 3 on bottom), which gives the *negative* of the correct answer. You must preserve the mapping from the original limits — the bottom limit of $$\\theta$$ maps to the bottom limit of $$u$$, regardless of which number is bigger.\n\nTakeaway: Transform limits individually and preserve their order. The bottom limit stays at the bottom.", "source": "GLM 5.1 ③", "_id": "glm_3_15"}, {"question": "Expand (2 + 5x)⁻² using the binomial series. Why can't you use the standard (1 + x)ⁿ formula directly? (3 steps)", "answer": "- Step 1: The standard binomial formula requires the first term to be 1. So factor out the 2: (2 + 5x)⁻² = 2⁻²(1 + 5x/2)⁻² = (1/4)(1 + (5x/2))⁻².\n- Step 2: Use the general binomial formula with n = -2: (1 + u)ⁿ = 1 + n u + n(n-1)/2! u² + n(n-1)(n-2)/3! u³ + ... where n = -2 and u = 5x/2.\n- Step 3: Compute first terms: 1 + (-2)(5x/2) + (-2)(-3)/2 × (5x/2)² = 1 - 5x + (15/4)(25x²/4) = 1 - 5x + (375/16)x² + ... Then multiply by 1/4.\n\n**Takeaway:** For negative (or fractional) powers, you MUST use the general binomial formula (bottom version in formula book), not the integer-only version.", "source": "MiniMax ①", "_id": "minimax_1_9"}, {"question": "For $$g(x) = 5 + \\frac{-7}{x+2}$$ with domain $$x > -2$$, only one branch of the graph exists. By inspecting this branch's behaviour, what is the range, and why must you write it using \"y\" not \"x\"? (2 steps)", "answer": "- Step 1: With $$x > -2$$, we only have the right-hand branch, which approaches the horizontal asymptote $$y=5$$ from below as $$x \\to \\infty$$, and plunges toward $$-\\infty$$ as $$x \\to -2^+$$. So the output values are everything strictly below 5: $$y < 5$$.\n- Step 2: The convention is: **domain** uses the letter $$x$$ (input variable), **range** uses the letter $$y$$ (output variable). Writing \"$$x < 5$$\" for the range would be marked wrong because $$x$$ is the input, not the output. The range describes what $$y$$-values the function produces, so it must be written $$y < 5$$.\n\nTakeaway: Domain = what $$x$$ can be; Range = what $$y$$ can be. Use the correct variable or lose the mark.", "source": "GLM 5.1 ①", "_id": "glm_1_5"}, {"question": "After implicit differentiation, you collect all terms containing $$\\frac{dy}{dx}$$ on one side and all other terms on the other. If you arrive at $$2y\\frac{dy}{dx} - 2x\\frac{dy}{dx} = 24 - 8x + 2y$$, what simplification step should you do *before* factoring out $$\\frac{dy}{dx}$$, and why? (2 steps)", "answer": "- Step 1: Every coefficient on the left is divisible by 2, and every term on the right is also divisible by 2 ($$24/2=12$$, $$8/2=4$$, $$2/2=1$$). Dividing the entire equation by 2 gives $$y\\frac{dy}{dx} - x\\frac{dy}{dx} = 12 - 4x + y$$, with smaller, cleaner numbers.\n- Step 2: Simplifying first makes factoring easier and reduces arithmetic mistakes. Now factor out $$\\frac{dy}{dx}$$: $$\\frac{dy}{dx}(y - x) = 12 - 4x + y$$, so $$\\frac{dy}{dx} = \\frac{12 - 4x + y}{y - x}$$. If you skip the simplification, you'd factor $$\\frac{dy}{dx}(2y - 2x)$$ and get the same result after cancelling, but with more steps and more chances for errors.\n\nTakeaway: Divide through by common factors before factoring — cleaner algebra, fewer mistakes.", "source": "GLM 5.1 ①", "_id": "glm_1_9"}, {"question": "A student solving $$\\frac{dy}{dx} = e^{x+y}$$ tries to separate as $$\\frac{dy}{e^y} = e^x\\,dx$$ and gets stuck integrating the left side. What simpler separation should they have used? (3 steps)", "answer": "- Step 1: The equation is $$\\frac{dy}{dx} = e^{x+y} = e^x \\cdot e^y$$ (split the exponent using $$e^{a+b} = e^a \\cdot e^b$$). This IS separable.\n- Step 2: The student's separation $$\\frac{dy}{e^y} = e^x\\,dx$$ is actually correct — $$\\int e^{-y}\\,dy = -e^{-y}$$ (a standard integral). But there's a cleaner approach: divide by $$e^y$$ and write $$e^{-y}\\,dy = e^x\\,dx$$.\n- Step 3: Integrate: $$\\int e^{-y}\\,dy = \\int e^x\\,dx$$ → $$-e^{-y} = e^x + C$$ → $$e^{-y} = -e^x - C = A - e^x$$ (renaming constant) → $$-y = \\ln(A - e^x)$$ → $$y = -\\ln(A - e^x)$$. The solution exists only where $$A > e^x$$.\n\n$$e^{x+y} = e^x \\cdot e^y$$ is the key insight — split compound exponents to reveal separability. The left-side integral $$\\int e^{-y}\\,dy = -e^{-y}$$ is straightforward.", "source": "GLM 5.1 ②", "_id": "glm_2_61"}, {"question": "What is the key difference between separable ODEs and linear ODEs solved by integrating factor, and how do you decide which method to use? (3 steps)", "answer": "- Step 1: **Separable**: $$\\frac{dy}{dx} = f(x)g(y)$$ — the right side factors into a pure-x part and a pure-y part. Solution: separate variables and integrate each side.\n- Step 2: **Linear (integrating factor)**: $$\\frac{dy}{dx} + P(x)y = Q(x)$$ — the equation is linear in $$y$$ (no $$y^2$$, $$\\sin y$$, etc.) but NOT necessarily separable. The IF method works even when separation is impossible (e.g., $$\\frac{dy}{dx} + 2xy = e^x$$ can't be separated).\n- Step 3: **Decision rule**: First check if it's separable (can you factor into f(x)·g(y)?). If yes, separate — it's usually simpler. If not, check if it's linear in y (first power of y only). If linear, use the integrating factor. If neither, you need other methods beyond P4.\n\nSeparable → separate and integrate. Linear-but-not-separable → integrating factor. The IF method is more powerful for linear equations; separation is simpler when it works.", "source": "GLM 5.1 ②", "_id": "glm_2_52"}, {"question": "Why-not probe: When stating the domain of an inverse function, a student writes \"$$y < 5$$\" (copying the range notation of the original). Why is this marked wrong, even though the *numerical condition* is correct? (2 steps)", "answer": "- Step 1: The numerical condition IS correct — the domain of $$g^{-1}$$ is indeed all values below 5. But \"domain\" describes the set of allowed *inputs*, and the input variable of any function is conventionally called $$x$$. Writing \"$$y < 5$$\" uses the output variable for the input, which is notationally wrong.\n- Step 2: Examiners enforce the convention: domain → $$x$$, range → $$y$$. It's not about the numbers — it's about correctly identifying which variable is the input and which is the output. \"$$y < 5$$\" for a domain confuses input and output, suggesting the student doesn't understand the distinction.\n\nTakeaway: Domain = $$x$$-condition. Range = $$y$$-condition. Same numbers, different variables — both must be correct.", "source": "GLM 5.1 ①", "_id": "glm_1_50"}, {"question": "For the linear ODE $$\\dfrac{dy}{dx} + P(x)y = Q(x)$$, why does multiplying by the integrating factor $$\\mu = e^{\\int P\\, dx}$$ collapse the LHS into a single derivative? (3 steps)", "answer": "- Step 1: Multiply through by $$\\mu$$: $$\\mu \\dfrac{dy}{dx} + \\mu P y = \\mu Q$$.\n- Step 2: Note $$\\dfrac{d\\mu}{dx} = P\\mu$$ (by chain rule on the exponent). So the LHS is exactly $$\\dfrac{d}{dx}(\\mu y)$$ by the product rule.\n- Step 3: We now have $$\\dfrac{d}{dx}(\\mu y) = \\mu Q$$, which integrates directly: $$\\mu y = \\int \\mu Q\\, dx + C$$.\n\n*The IF is engineered so the LHS becomes a perfect product-rule derivative — that's the whole trick.*", "source": "Opus 4.7 ②", "_id": "opus_2_33"}, {"question": "If each nested square has area $$\\frac{5}{9}$$ of the previous one, what fraction of the original square's area is the 4th square (i.e., after 3 iterations of the nesting)? Why is this $$\\left(\\frac{5}{9}\\right)^3$$ and not $$\\left(\\frac{5}{9}\\right)^4$$? (2 steps)", "answer": "- Step 1: The 1st (original) square is the starting point — ratio $$= 1$$. The 2nd square has ratio $$\\frac{5}{9}$$. The 3rd square has ratio $$\\left(\\frac{5}{9}\\right)^2$$. The 4th square has ratio $$\\left(\\frac{5}{9}\\right)^3$$. The exponent counts the number of *transitions* between squares, not the square number.\n+ Think of it like compound interest: if each year you retain 5/9 of your capital, after 3 years you have $$\\left(\\frac{5}{9}\\right)^3$$ of the original. The \"4th square\" means 3 steps of reduction from the original.\n- Step 2: Common trap: seeing \"4th square\" and writing $$\\left(\\frac{5}{9}\\right)^4$$. But the original (1st) square already has full area — the first reduction gives the 2nd square. So the 4th square involves only 3 reductions.\n\nTakeaway: The exponent equals (square number minus 1), because the original square is the baseline.", "source": "GLM 5.1 ③", "_id": "glm_3_2"}, {"question": "A separable differential equation has the form $$\\frac{dy}{dx} = f(x) \\cdot g(y)$$. Describe the solution method and explain *why* separating variables works — what are you really doing when you \"move $$dy$$ and $$g(y)$$ to one side\"? (3 steps)", "answer": "- Step 1: Rearrange to isolate the $$y$$-terms with $$dy$$ and the $$x$$-terms with $$dx$$: $$\\frac{1}{g(y)} \\, dy = f(x) \\, dx$$. This is the \"separation\" step.\n- Step 2: Integrate both sides: $$\\int \\frac{1}{g(y)} \\, dy = \\int f(x) \\, dx + C$$. The constant of integration goes on one side (conventionally the right).\n- Step 3: Why this works: we're using the chain rule in reverse. If $$\\frac{dy}{dx} = f(x)g(y)$$, then dividing by $$g(y)$$ and \"multiplying by $$dx$$\" is a notational shortcut for the rigorous step: $$\\int \\frac{1}{g(y)} \\frac{dy}{dx} \\, dx = \\int f(x) \\, dx$$. By the substitution rule, the left side becomes $$\\int \\frac{1}{g(y)} \\, dy$$. The \"separation\" is really a chain-rule substitution.\n\nTakeaway: Separation of variables is the chain rule run backwards. The notation $$\\frac{dy}{dx} \\, dx = dy$$ is a mnemonic, not rigorous — but it gives the correct result.", "source": "GLM 5.1 ③", "_id": "glm_3_25"}, {"question": "In the ESAT-style nested squares problem, you found the area ratio per iteration is $$\\frac{5}{9}$$. If the side of the outer square were chosen to be 6 instead of 3 (i.e., each segment along the side is 2 instead of 1), would the ratio change? Walk through the calculation to confirm. (3 steps)", "answer": "- Step 1: With side 6, each third is 2. The inner square's side is the hypotenuse of a right triangle with legs 2 and 4 (one segment and two segments): $$\\sqrt{2^2 + 4^2} = \\sqrt{4+16} = \\sqrt{20}$$.\n- Step 2: Inner area $$= (\\sqrt{20})^2 = 20$$. Outer area $$= 6^2 = 36$$. Ratio $$= \\frac{20}{36} = \\frac{5}{9}$$.\n- Step 3: The ratio is identical. This confirms that the ratio is scale-invariant — it depends only on the *proportion* (1/3 along each side), not the absolute size. This is why picking a convenient length works: any length gives the same answer.\n\nTakeaway: Geometric ratios from proportional constructions are scale-invariant.", "source": "GLM 5.1 ③", "_id": "glm_3_34"}, {"question": "Why does differentiating $$y^2$$ with respect to $$x$$ give $$2y\\dfrac{dy}{dx}$$ rather than $$2y$$?", "answer": "- Step 1: $$y$$ is itself a function of $$x$$, so $$y^2$$ is a composite function of $$x$$.\n- Step 2: By the chain rule, $$\\dfrac{d}{dx}[y^2] = \\dfrac{d(y^2)}{dy}\\cdot\\dfrac{dy}{dx} = 2y\\cdot\\dfrac{dy}{dx}$$.\n- Step 3: The extra $$dy/dx$$ factor is the chain-rule \"tail\" — it's what distinguishes implicit from explicit differentiation.\n\n*If you ever differentiate $$y$$-terms and get no $$dy/dx$$ appearing, you've forgotten the chain rule.*", "source": "Opus 4.7 ②", "_id": "opus_2_12"}, {"question": "You need to compute $$2^{-2}$$ as part of the binomial expansion of $$(2+5x)^{-2}$$. What is the value, and why might a student mistakenly write $$-4$$ instead? (2 steps)", "answer": "- Step 1: $$2^{-2} = \\frac{1}{2^2} = \\frac{1}{4}$$. A negative exponent means \"reciprocal of the positive power,\" not \"negative of the power.\"\n- Step 2: The mistake comes from confusing $$2^{-2}$$ with $$-2^2$$. The former is $$\\frac{1}{4}$$ (exponentiation with a negative power), the latter is $$-4$$ (negation of a square). The notation is similar but the operations are completely different: $$a^{-n} = \\frac{1}{a^n}$$, while $$-(a^n)$$ is negation.\n\nTakeaway: Negative exponent → reciprocal. Negative sign in front → negation. These are fundamentally different.", "source": "GLM 5.1 ③", "_id": "glm_3_37"}, {"question": "When performing polynomial long division of $$\\frac{5x+3}{x+2}$$, you obtain quotient 5 and remainder $$-7$$. Why must the final answer be written as $$5 + \\frac{-7}{x+2}$$ rather than $$5(x+2) - 7$$? (2 steps)", "answer": "- Step 1: The division algorithm states: $$\\text{Dividend} = \\text{Divisor} \\times \\text{Quotient} + \\text{Remainder}$$. So $$5x + 3 = (x+2)(5) + (-7)$$. Dividing both sides by the divisor $$(x+2)$$ gives $$\\frac{5x+3}{x+2} = 5 + \\frac{-7}{x+2}$$. This is the standard form: quotient plus remainder-over-divisor.\n- Step 2: Writing $$5(x+2) - 7$$ is just the *undivided* form — it equals the numerator $$5x+3$$, not the original fraction. It skips the crucial final step of dividing by $$(x+2)$$. In an exam, you lose the mark for not expressing it in the required \"quotient + remainder/divisor\" form.\n\nTakeaway: Always finish with $$\\text{quotient} + \\frac{\\text{remainder}}{\\text{divisor}}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_3"}, {"question": "Conceptually, why does the binomial expansion $$(1+x)^n$$ produce an *infinite* series when $$n$$ is negative, but a *finite* series when $$n$$ is a positive integer? (2 steps)", "answer": "- Step 1: When $$n$$ is a positive integer, the coefficient $$\\frac{n(n-1)(n-2)\\cdots(n-k+1)}{k!}$$ eventually becomes zero. Specifically, when $$k = n+1$$, one of the factors in the numerator is $$(n - n) = 0$$, killing that term and all subsequent terms. The series terminates.\n- Step 2: When $$n$$ is negative (e.g., $$n = -2$$), the factors in the numerator are $$-2, -3, -4, \\ldots$$ — none of them is ever zero. So the coefficients never vanish, and the series continues indefinitely. It converges only when $$|x| < 1$$ (the terms shrink geometrically).\n\nTakeaway: Positive integer $$n$$ → numerator hits zero → series terminates. Negative $$n$$ → numerator never hits zero → infinite series.", "source": "GLM 5.1 ③", "_id": "glm_3_33"}, {"question": "Why do *negative* and *fractional* binomial expansions produce *infinite* series, while positive-integer powers terminate?", "answer": "- Step 1: Successive coefficients involve $$n, n-1, n-2, \\ldots$$\n- Step 2: If $$n$$ is a positive integer (say $$n=3$$), one of the factors eventually becomes $$0$$ (when $$n-k = 0$$), killing all later terms — finite expansion.\n- Step 3: If $$n$$ is negative or fractional, the chain $$n(n-1)(n-2)\\ldots$$ never hits zero, so coefficients never vanish — infinite series, with an associated convergence condition.", "source": "Opus 4.7 ②", "_id": "opus_2_28"}, {"question": "A misconception probe: When limits transform under substitution and you get $$\\int_4^3$$ (bigger number on bottom), some students \"fix\" this by swapping to $$\\int_3^4$$ and adding a minus sign. Is this correct, and what's the risk? (2 steps)", "answer": "- Step 1: Mathematically, $$\\int_4^3 f(u)\\,du = -\\int_3^4 f(u)\\,du$$, so swapping and negating *is* valid. You'll get the same final numerical answer.\n- Step 2: The risk is forgetting to include the minus sign when you swap, or getting confused about signs later in the calculation. It's safer to *preserve the original order* and compute $$\\int_4^3$$ directly — the negative result from integrating \"backwards\" is built in automatically. Swapping introduces an extra step where errors creep in.\n\nTakeaway: Preserve the mapped order — don't swap limits. If you must swap, remember the minus sign.", "source": "GLM 5.1 ①", "_id": "glm_1_34"}, {"question": "After implicit differentiation gives $$\\dfrac{dy}{dx} = \\dfrac{12 - 4x + 2y}{y - x}$$ and a point $$P(a,b)$$ has gradient 2, you have one equation in two unknowns. Where does the *second* equation come from? (3 steps)", "answer": "- Step 1: The condition \"gradient = 2 at $$P$$\" gives equation ①: substitute $$x=a, y=b, \\frac{dy}{dx}=2$$ into the gradient formula.\n- Step 2: The **hidden** condition is that \"P lies on the curve\" — this is independent information not yet used.\n- Step 3: Substituting $$x=a, y=b$$ into the original curve equation gives equation ②. Two equations + two unknowns ⇒ solvable.\n\n*Whenever a problem names a point on a curve, the curve equation is automatically one of your equations.*", "source": "Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "After implicitly differentiating a curve equation, you have terms with $$\\frac{dy}{dx}$$ and terms without. How do you isolate $$\\frac{dy}{dx}$$? (3 steps)", "answer": "- Step 1: Collect all terms containing $$\\frac{dy}{dx}$$ on one side of the equation. Move all terms *without* $$\\frac{dy}{dx}$$ to the other side.\n- Step 2: Factor out $$\\frac{dy}{dx}$$ from the collected terms. For example, if you have $$y\\frac{dy}{dx} - 2x\\frac{dy}{dx}$$ on one side, factor as $$\\frac{dy}{dx}(y - 2x)$$.\n- Step 3: Divide both sides by the remaining factor to get $$\\frac{dy}{dx}$$ alone: $$\\frac{dy}{dx} = \\frac{\\text{non-}dy/dx\\text{ side}}{\\text{factor next to }dy/dx}$$.\n\nIsolating $$\\frac{dy}{dx}$$ is just algebra: group, factor, divide. The differentiation step is where the calculus happens; the rest is rearrangement.", "source": "GLM 5.1 ②", "_id": "glm_2_19"}, {"question": "Starting from $$g(x) = 5 + \\frac{-7}{x+2}$$, identify the sequence of transformations that build $$g(x)$$ from the parent function $$h(x) = \\frac{-1}{x}$$, and state the equations of both asymptotes. (3 steps)", "answer": "- Step 1: Compare $$g(x) = 5 + \\frac{-7}{x+2}$$ to $$h(x) = \\frac{-1}{x}$$. The factor of 7 outside means a vertical stretch by factor 7. The $$x+2$$ inside means a horizontal translation left by 2 (replacing $$x$$ with $$x+2$$ shifts the graph left). The $$+5$$ outside means a vertical translation up by 5.\n- Step 2: Track the asymptotes through each transformation. $$h(x) = \\frac{-1}{x}$$ has asymptotes $$x=0$$ and $$y=0$$.\n+ Left by 2: vertical asymptote moves from $$x=0$$ to $$x=-2$$; horizontal asymptote stays $$y=0$$ (horizontal shifts don't affect horizontal asymptotes).\n+ Vertical stretch ×7: horizontal asymptote stays $$y=0$$ (multiplying 0 by 7 is still 0).\n+ Up by 5: horizontal asymptote moves from $$y=0$$ to $$y=5$$; vertical asymptote stays $$x=-2$$.\n- Step 3: Final asymptotes are $$x = -2$$ (vertical) and $$y = 5$$ (horizontal). The graph is the reflected-and-stretched $$\\frac{1}{x}$$ shape, shifted so its two branches sit in the regions $$x < -2, y > 5$$ and $$x > -2, y < 5$$.\n\nTakeaway: Transform the asymptotes step by step — each transformation moves one or both asymptotes predictably.", "source": "GLM 5.1 ①", "_id": "glm_1_4"}, {"question": "A student computes the integral $$\\int_4^3 u^{1/2} - 3u^{-1/2} \\, du$$ and gets a negative number. They think they made a sign error because \"area should be positive.\" Is this reasoning correct? Why or why not? (2 steps)", "answer": "- Step 1: This is *not* necessarily a sign error. When the lower limit is larger than the upper limit (4 at the bottom, 3 at the top), the integral evaluates to the negative of the integral from 3 to 4. This is a mathematical property: $$\\int_a^b f(x)\\,dx = -\\int_b^a f(x)\\,dx$$.\n- Step 2: Furthermore, a definite integral computes *signed area* (area above the axis minus area below), not total area. A negative result is perfectly valid and expected when the limits are reversed or when the function is negative. The student should NOT flip the limits to \"fix\" the answer — the reversed limits came from a valid substitution and must be preserved.\n\nTakeaway: Reversed limits give a negative integral. This is correct, not an error. Don't \"fix\" it by swapping limits.", "source": "GLM 5.1 ③", "_id": "glm_3_29"}, {"question": "When changing limits in a substitution from $$\\theta$$-limits to $$u$$-limits, why might the \"bigger number\" end up at the *bottom*, not the top? (3 steps)", "answer": "- Step 1: Limits aren't ranked by size — they're tied to **direction of integration**. Bottom limit = where $$\\theta$$ starts; top limit = where $$\\theta$$ ends.\n- Step 2: For $$u = 3 + \\cos\\theta$$: at $$\\theta=0$$, $$u = 4$$; at $$\\theta=\\pi/2$$, $$u = 3$$. So as $$\\theta$$ goes $$0 \\to \\pi/2$$, $$u$$ goes $$4 \\to 3$$ (decreasing).\n- Step 3: Therefore bottom limit is 4, top limit is 3 — even though 3 < 4.\n\n*Preserve the start→end correspondence, not size order. Reversing limits introduces a sign error.*", "source": "Opus 4.7 ②", "_id": "opus_2_21"}, {"question": "To expand $$(2 + 5x)^{-2}$$ using the binomial series, you must first rewrite it as $$2^{-2}\\left(1 + \\frac{5x}{2}\\right)^{-2}$$. Why must the expression inside the brackets start with 1, and what happens if you try to apply the series directly to $$(2 + 5x)^{-2}$$? (2 steps)", "answer": "- Step 1: The binomial series formula $$(1 + x)^n = 1 + nx + \\frac{n(n-1)}{2!}x^2 + \\cdots$$ is derived specifically for the case where the first term inside the brackets is 1. This is what makes the expansion work cleanly — each term in the series is a power of the *second* term multiplied by a coefficient.\n- Step 2: If you tried to apply the series directly to $$(2 + 5x)^{-2}$$, you'd be computing $$(2 + 5x)^{-2} = 2^{-2}(1 + \\frac{5x}{2})^{-2}$$... but without factoring out the 2, the terms would be wrong. The formula would give nonsensical coefficients because it assumes the \"1\" is there. Factoring out $$2^{-2}$$ separates the constant multiplier from the series, and the series is then applied to $$\\left(1 + \\frac{5x}{2}\\right)$$.\n\nTakeaway: Always factor out the leading coefficient so the bracket starts with 1. The power applies to the factored-out constant too.", "source": "GLM 5.1 ③", "_id": "glm_3_20"}, {"question": "When dividing $$5x+3$$ by $$x+2$$, why must the answer be written as $$5 + \\dfrac{-7}{x+2}$$ rather than $$5(x+2) - 7$$? (3 steps)", "answer": "- Step 1: Polynomial long division produces *quotient + remainder/divisor* — it's a rewrite of the **fraction**, not the numerator.\n- Step 2: $$5(x+2)-7$$ is just the original numerator $$5x+3$$ rewritten — it's not a different form of the *function* $$(5x+3)/(x+2)$$ unless you divide everything by $$x+2$$.\n- Step 3: Dividing through gives $$\\frac{5(x+2)}{x+2} - \\frac{7}{x+2} = 5 - \\frac{7}{x+2}$$. This form reveals the function as a transformation of $$-1/x$$, which is what's needed for graphing.\n\n*The whole point of long division is to turn an improper rational function into a constant + a simpler fraction.*", "source": "Opus 4.7 ②", "_id": "opus_2_4"}, {"question": "Compare an integrating-factor problem and a separable-variables ODE — how do you choose between methods?", "answer": "- Step 1: If the equation can be rearranged so all $$y$$'s (and $$dy$$) are on one side, all $$x$$'s (and $$dx$$) on the other — use **separation**.\n- Step 2: If the equation has the form $$\\dfrac{dy}{dx} + P(x) y = Q(x)$$ (linear in $$y$$ but $$y$$ and $$x$$ are entangled) — use **integrating factor**.\n- Step 3: Some equations admit both; some only one; some neither (need substitutions). Check separability first (simpler), then linearity.\n\n*Separable = product of $$x$$-only and $$y$$-only parts; linear = additive structure in $$y$$.*", "source": "Opus 4.7 ②", "_id": "opus_2_47"}, {"question": "In the integrating factor method, why do we *not* include a constant of integration when computing $$\\int P(x)\\,dx$$ to form the IF? (2 steps)", "answer": "- Step 1: If we wrote $$\\text{IF} = e^{\\int P(x)\\,dx + C} = e^C \\cdot e^{\\int P(x)\\,dx}$$, the factor $$e^C$$ is just a positive constant. When we multiply the entire ODE by IF, this constant appears on every term and cancels out when we solve for $$y$$.\n- Step 2: Since the constant doesn't affect the final answer, we conventionally set it to zero (i.e., take $$C = 0$$) for simplicity. The \"lost\" constant of integration is recovered later when we integrate the right-hand side after applying the IF.\n\nTakeaway: The IF constant cancels, so we omit it. The actual integration constant comes from the final integration step.", "source": "GLM 5.1 ③", "_id": "glm_3_38"}, {"question": "The function $$g(x) = 5 + \\frac{-7}{x+2}$$ is a sequence of transformations applied to the parent function $$h(x) = \\frac{-1}{x}$$. List the four transformations in order and state what each does to the graph. (3 steps)", "answer": "- Step 1: Start with $$h(x) = \\frac{-1}{x}$$. The expression $$\\frac{-7}{x+2}$$ can be built step by step:\n  + Replace $$x$$ with $$x+2$$: translates the graph left by 2 (horizontal translation). This moves the vertical asymptote from $$x=0$$ to $$x=-2$$.\n  + Multiply by 7: vertical stretch by factor 7. Asymptotes unaffected (since $$7 \\times 0 = 0$$).\n- Step 2: The $$+5$$ outside: translates the graph up by 5. This moves the horizontal asymptote from $$y=0$$ to $$y=5$$.\n- Step 3: Summary of asymptote transformations:\n  + Vertical asymptote: $$x=0 \\to x=-2$$ (from the $$x+2$$ inside)\n  + Horizontal asymptote: $$y=0 \\to y=5$$ (from the $$+5$$ outside)\n  + The vertical stretch by 7 affects the steepness but not the asymptote positions.\n\nTakeaway: Transformations inside the bracket affect the $$x$$-asymptote (and do the \"opposite\" of what they say); transformations outside affect the $$y$$-asymptote (and do what they say).", "source": "GLM 5.1 ③", "_id": "glm_3_4"}, {"question": "The composite function $$fg(x)$$ means \"apply f to the output of g.\" A student swaps the order and applies g to the output of f, ending up with $$\\ln$$ on both sides of their equation. What went wrong conceptually? (3 steps)", "answer": "- Step 1: $$fg(x)$$ means $$f(g(x))$$: the *inner* function $$g$$ is applied first, producing a numerical output; then the *outer* function $$f$$ is applied to that output. The student reversed this, computing $$g(f(x))$$ instead.\n- Step 2: In this problem, $$f$$ involved a logarithm and $$g$$ involved a rational function. Applying $$g$$ first (correct) puts a rational expression inside $$f$$ (the log). Applying $$f$$ first (wrong) puts a log expression inside $$g$$, producing a fundamentally different equation structure — hence $$\\ln$$ on both sides.\n- Step 3: The rule: read $$fg(x)$$ right-to-left or as \"f of g of x\" — g is inner, f is outer. **gf(x)** would reverse the roles. Mixing up f and g changes the entire equation, not just the order of operations.\n\nComposite function rule: $$fg(x) = f(g(x))$$. Inner first, outer second. Swapping f and g produces a completely different function.", "source": "GLM 5.1 ②", "_id": "glm_2_16"}, {"question": "In the binomial expansion chapter, the formula book provides *two* versions of the binomial formula. One requires $$n$$ to be a positive integer; the other works for any real $$n$$. How can you tell which one to use, and what is the key structural difference between them? (2 steps)", "answer": "- Step 1: Check the power $$n$$. If $$n$$ is a positive integer (1, 2, 3, ...), the \"top\" version (the standard binomial theorem with combinations $$\\binom{n}{r}$$) works and the expansion terminates after $$n+1$$ terms. If $$n$$ is negative or fractional, you *must* use the \"bottom\" version (the infinite series with $$\\frac{n(n-1)(n-2)\\cdots}{r!}$$), which never terminates.\n- Step 2: The key structural difference: the top version has finitely many terms (it stops); the bottom version is an infinite series that converges only when $$|x| < 1$$ (or more generally, when the term inside the bracket has absolute value less than 1). In P3/P4, you'll almost always use the bottom version because the powers are typically negative or fractional.\n\nTakeaway: Negative or fractional power → bottom version (infinite series). Positive integer power → either works, but top version is simpler.", "source": "GLM 5.1 ③", "_id": "glm_3_19"}, {"question": "A point $$P(a, b)$$ lies on a curve and has gradient 2. From the gradient condition you derive one equation like $$4a + b = 12$$, but there are two unknowns. Where does the *second* equation come from, and why is this a recurring trap? (2 steps)", "answer": "- Step 1: The phrase \"P lies on the curve\" means the coordinates $$P(a,b)$$ satisfy the curve's equation. Substituting $$x=a, y=b$$ into the curve equation (e.g., $$4x^2 + 2xy - 2xy + \\ldots$$) produces a second equation in $$a$$ and $$b$$. This is your second equation — it's always there whenever a point is described as being \"on the curve.\"\n- Step 2: The trap is that students treat \"lies on the curve\" as background information rather than an algebraic condition. They see two unknowns and one equation from the gradient, then freeze. The key insight: any geometric/curve-membership statement is an *equation*. \"Point on curve\" = \"substitute coordinates into curve equation\" = free second equation.\n\nTakeaway: \"P lies on C\" is not decoration — it's your second equation. Always substitute coordinates into the curve equation.", "source": "GLM 5.1 ①", "_id": "glm_1_10"}, {"question": "Synthesis: Expand $$\\big(3 - x\\big)^{-3}$$ up to the $$x^2$$ term. Walk through: factoring out, applying the series, and stating the convergence range. (4 steps)", "answer": "- Step 1: Factor out the 3: $$\\big(3-x\\big)^{-3} = 3^{-3}\\big(1-\\frac{x}{3}\\big)^{-3} = \\frac{1}{27}\\big(1-\\frac{x}{3}\\big)^{-3}$$.\n- Step 2: Apply the binomial series with $$n=-3$$ and the variable part being $$-\\frac{x}{3}$$:\n$$1 + (-3)\\left(-\\frac{x}{3}\\right) + \\frac{(-3)(-4)}{2!}\\left(-\\frac{x}{3}\\right)^2 + \\ldots$$\n- Step 3: Simplify each term:\n+ First: 1\n+ Second: $$(-3)\\left(-\\frac{x}{3}\\right) = \\frac{3x}{3} = x$$\n+ Third: $$\\frac{12}{2}\\cdot\\frac{x^2}{9} = 6\\cdot\\frac{x^2}{9} = \\frac{2x^2}{3}$$\nSo: $$\\frac{1}{27}\\big(1 + x + \\frac{2x^2}{3} + \\ldots\\big) = \\frac{1}{27} + \\frac{x}{27} + \\frac{2x^2}{81} + \\ldots$$\n- Step 4: Convergence: $$\\left|-\\frac{x}{3}\\right| < 1$$, i.e., $$|x| < 3$$.\n\nTakeaway: Factor → apply series → simplify → state convergence. The variable inside the bracket determines the range.", "source": "GLM 5.1 ①", "_id": "glm_1_46"}, {"question": "A point $$P(a, b)$$ lies on a curve and has gradient 2. This gives you the equation $$4a + b = 12$$ from the gradient condition. But you have two unknowns $$a$$ and $$b$$. What is the \"hidden\" second equation, and why do students often miss it? (2 steps)", "answer": "- Step 1: The second equation comes from the fact that $$P(a,b)$$ *lies on the curve*. This means the coordinates $$(a, b)$$ satisfy the original curve equation. For example, if the curve is $$4x^2 + 2xy - 2xy + \\ldots = 24$$, then substituting gives a second equation in $$a$$ and $$b$$.\n- Step 2: Students miss this because the condition \"P lies on the curve\" is stated so naturally that it doesn't *feel* like a separate piece of information — it feels like background context. But in algebra, every geometric condition is an equation. \"P lies on the curve\" is exactly as powerful as \"P satisfies the curve equation\" — it's your second equation.\n\nTakeaway: Every geometric condition (point on curve, point on line, gradient at point) translates to an algebraic equation. Count your equations and unknowns.", "source": "GLM 5.1 ③", "_id": "glm_3_10"}, {"question": "If a curve is rotated by angle $$\\theta$$ (not a full 360°) about the x-axis, how does the volume formula adjust, and what's the intuitive reasoning? (3 steps)", "answer": "- Step 1: A full rotation (360° = $$2\\pi$$ radians) gives volume $$V = \\pi\\int y^2\\,dx$$. The $$\\pi$$ comes from the full disc area $$\\pi r^2$$, which itself comes from the full circle circumference integral.\n- Step 2: A partial rotation by angle $$\\theta$$ (in radians) sweeps out a *sector* of each disc, not a full disc. The sector area is proportional to the angle: sector area = $$\\frac{\\theta}{2\\pi} \\times \\pi y^2 = \\frac{\\theta}{2}y^2$$.\n- Step 3: So the partial-rotation volume is $$V = \\frac{\\theta}{2}\\int_a^b y^2\\,dx$$. For full rotation ($$\\theta = 2\\pi$$): $$V = \\frac{2\\pi}{2}\\int y^2\\,dx = \\pi\\int y^2\\,dx$$, recovering the standard formula.\n\nVolume is proportional to rotation angle: $$V_{\\theta} = \\frac{\\theta}{2\\pi} \\times V_{2\\pi} = \\frac{\\theta}{2}\\int y^2\\,dx$$. Half rotation ($$\\theta = \\pi$$) gives half the volume.", "source": "GLM 5.1 ②", "_id": "glm_2_45"}, {"question": "Explain why the binomial series for (1 + u)^n converges only when |u| < 1 for non-integer n. What happens when |u| ≥ 1?", "answer": "- Step 1: The general binomial series for non-integer n is: 1 + n u + n(n-1)/2! × u² + n(n-1)(n-2)/3! × u³ + ... This is analogous to the geometric series 1 + u + u² + u³ + ... which converges only for |u| < 1.\n- Step 2: For non-integer n, the series is infinite (not terminating). Similar to the geometric series, as n → ∞, terms grow unless |u| < 1. When |u| ≥ 1, the terms don't tend to zero, so the series diverges.\n- For integer n ≥ 0, the series terminates after n+1 terms, so it's a polynomial and converges for all x. This is why the formula book has two versions — one for positive integers (terminating), one for any real n (potentially infinite).", "source": "MiniMax ②", "_id": "minimax_2_24"}, {"question": "Two lines $$L_1$$ and $$L_2$$ intersect at point $$P$$, given by position vectors $$\\mathbf{r}_1$$ and $$\\mathbf{r}_2$$. Why does the intersection condition require $$\\mathbf{r}_1 = \\mathbf{r}_2$$, and what does this equality mean physically? (2 steps)", "answer": "- Step 1: Both $$\\mathbf{r}_1$$ and $$\\mathbf{r}_2$$ are position vectors from the origin to points on their respective lines. At an intersection point, both lines pass through the *same* physical point, so both position vectors must describe the *same* location.\n- Step 2: If two vectors describe the same point, they must be equal: same x-component, same y-component, same z-component. Hence $$\\mathbf{r}_1 = \\mathbf{r}_2$$ is the necessary and sufficient condition for intersection.\n\n$$\\mathbf{r}_1 = \\mathbf{r}_2$$ means: \"the origin-to-point vectors are identical\" → the lines share that point. This gives you three component equations.", "source": "GLM 5.1 ②", "_id": "glm_2_23"}, {"question": "Why does the binomial expansion for $$(2+5x)^{-2}$$ require the \"general $$n$$\" formula and not the \"positive integer $$n$$\" version? (3 steps)", "answer": "- Step 1: The top formula (Pascal-style) has finitely many terms because $$\\binom{n}{k}$$ vanishes once $$k > n$$ — this needs $$n \\in \\mathbb{Z}^+$$.\n- Step 2: For $$n=-2$$ (or fractions, negatives in general), $$\\binom{n}{k}$$ never terminates, giving an infinite series.\n- Step 3: The \"bottom\" formula $$(1+x)^n = 1 + nx + \\dfrac{n(n-1)}{2!}x^2 + \\ldots$$ accommodates any real $$n$$ but only converges for $$|x|<1$$ — that's the P3/P4 form.\n\n*Negative or fractional powers ⇒ infinite series, with a convergence restriction.*", "source": "Opus 4.7 ②", "_id": "opus_2_25"}, {"question": "After implicitly differentiating a curve equation and collecting all terms with $$\\frac{dy}{dx}$$ on one side, you have: $$(y - x)\\frac{dy}{dx} = 12 - 4x + 2y$$. Why is it helpful to divide everything by 2 *before* factoring out $$\\frac{dy}{dx}$$, and what's the final expression? (2 steps)", "answer": "- Step 1: Dividing every term by 2 simplifies the coefficients without changing the equation (valid because 2 ≠ 0). This makes the arithmetic cleaner and reduces the chance of arithmetic errors when you eventually factor out $$\\frac{dy}{dx}$$. The equation becomes: $$\\left(\\frac{y}{2} - \\frac{x}{2}\\right)\\frac{dy}{dx}$$ ... actually, more precisely, if we had $$2y\\frac{dy}{dx} - 2x\\frac{dy}{dx}$$ on one side, dividing by 2 gives $$(y - x)\\frac{dy}{dx}$$ on the left, and $$6 - 2x + y$$ on the right.\n- Step 2: Then $$\\frac{dy}{dx} = \\frac{12 - 4x + 2y}{y - x}$$, and dividing numerator and denominator by 2 gives $$\\frac{dy}{dx} = \\frac{6 - 2x + y}{y - x}$$... Actually, the key insight: simplifying early means smaller numbers throughout, and the final answer is cleaner and easier to verify.\n\nTakeaway: Simplify coefficients early — it's the algebraic equivalent of reducing fractions before multiplying.", "source": "GLM 5.1 ③", "_id": "glm_3_9"}, {"question": "When a geometry problem asks for a *fraction* (ratio) of areas, why is it valid — and strategically smart — to pick a convenient absolute length like \"1\" rather than using a variable? (2 steps)", "answer": "- Step 1: A fraction is dimensionless — it compares two quantities of the same type, so scaling every length by the same factor cancels out. If the original square has side $$L$$ and the inner square has side $$kL$$, the area ratio is $$k^2L^2 / L^2 = k^2$$, independent of $$L$$.\n- Step 2: Picking a convenient number (like 1 or 3, chosen to match fractions in the problem) eliminates algebra clutter and makes Pythagoras/arithmetic instant. You never need to carry $$L$$ through every step — it would cancel at the end anyway, so skip it from the start.\n\nTakeaway: When the answer is a ratio, set the most convenient length to 1 (or whatever makes the fractions clean).", "source": "GLM 5.1 ①", "_id": "glm_1_0"}, {"question": "A student sees $$\\int u^{-1/2} \\, du$$ and writes $$\\frac{u^{1/2}}{1/2} = 2\\sqrt{u}$$. Another student sees $$\\int \\frac{1}{u} \\, du$$ and writes $$\\ln|u|$$. Explain why these two students are using *different* rules, and what distinguishes when to use each. (2 steps)", "answer": "- Step 1: The distinction is the power of $$u$$. In $$u^{-1/2}$$, the power is $$-\\frac{1}{2}$$, which is *not* $$-1$$. The power rule applies: $$\\int u^n \\, du = \\frac{u^{n+1}}{n+1}$$ for $$n \\neq -1$$. In $$\\frac{1}{u} = u^{-1}$$, the power is exactly $$-1$$, and the power rule would require dividing by $$n+1 = 0$$, which is undefined. So a different rule (the ln rule) is needed.\n- Step 2: The ln rule is the *special case* exception to the power rule. It applies only when the power is $$-1$$. For all other powers (including $$-1/2$$, $$-2$$, $$1/2$$, etc.), use the power rule. The key diagnostic: rewrite the integrand as a power of $$u$$ and check if the exponent equals $$-1$$.\n\nTakeaway: Power rule for all $$n \\neq -1$$; ln rule for $$n = -1$$ only. Always check the exponent first.", "source": "GLM 5.1 ③", "_id": "glm_3_32"}, {"question": "Starting from $$h(x) = -\\frac{1}{x}$$, list the three transformations that produce $$g(x) = 5 + \\frac{-7}{x+2}$$, and identify what each does to the asymptotes. (4 steps)", "answer": "- Step 1: **Vertical stretch by factor 7**: $$-7 \\cdot \\frac{1}{x}$$ stretches $$h(x)$$ by 7. This makes the curve steeper but does NOT move either asymptote (multiplying y-values by 7 keeps $$y=0$$ and $$x=0$$ in place, since $$7 \\times 0 = 0$$).\n- Step 2: **Horizontal translation left by 2**: replacing $$x$$ with $$x+2$$ shifts the graph left 2 units. The vertical asymptote $$x=0$$ moves to $$x=-2$$. The horizontal asymptote $$y=0$$ stays (horizontal translations don't affect horizontal asymptotes).\n- Step 3: **Vertical translation up by 5**: adding 5 shifts the graph up 5 units. The horizontal asymptote $$y=0$$ moves to $$y=5$$. The vertical asymptote $$x=-2$$ stays (vertical translations don't affect vertical asymptotes).\n- Step 4: Final asymptotes: vertical at $$x=-2$$, horizontal at $$y=5$$. The order of transformations matters for the graph shape but the asymptote shifts are additive regardless.\n\nAsymptote rule: vertical asymptote shifts with horizontal translation; horizontal asymptote shifts with vertical translation. Stretches don't move asymptotes at y=0 or x=0.", "source": "GLM 5.1 ②", "_id": "glm_2_10"}, {"question": "Why must you put brackets around the product rule expansion $$[x\\frac{dy}{dx} + y]$$ when it appears inside an implicit differentiation equation with a coefficient like $$-2$$? Give a concrete sign-error example. (3 steps)", "answer": "- Step 1: The term $$-2xy$$ differentiates to $$-2\\frac{d(xy)}{dx} = -2\\left[x\\frac{dy}{dx} + y\\right]$$. With brackets, distributing gives $$-2x\\frac{dy}{dx} - 2y$$ (both terms negative).\n- Step 2: Without brackets, a student might write $$-2x\\frac{dy}{dx} + y$$ (only applying the $$-2$$ to the first term, forgetting it also multiplies the $$+y$$). This sign error on the $$y$$-term propagates through all subsequent algebra.\n- Step 3: Consequence: when collecting $$\\frac{dy}{dx}$$ terms, the wrong sign on $$-2y$$ means it goes to the wrong side, producing a completely incorrect final expression for $$\\frac{dy}{dx}$$.\n\nBrackets are not optional decoration — they ensure correct distribution of coefficients and signs. One missing bracket can corrupt the entire answer.", "source": "GLM 5.1 ②", "_id": "glm_2_54"}, {"question": "A limiting case: In the binomial expansion $$\\big(1+\\frac{5x}{2}\\big)^{-2}$$, as $$x \\to \\frac{2}{5}$$ (the boundary of convergence), what happens to the series and why does it fail? (2 steps)", "answer": "- Step 1: As $$x \\to \\frac{2}{5}$$, the bracket $$1 + \\frac{5x}{2} \\to 1 + 1 = 2$$, and we're raising to power $$-2$$, so $$\\big(2\\big)^{-2} = \\frac{1}{4}$$ — the actual function value is finite.\n- Step 2: However, the *series* diverges at this boundary. Each term involves increasing powers of $$\\frac{5x}{2} \\to 1$$, and for a negative power the coefficients grow (e.g., $$\\frac{n(n-1)}{2!}$$ with $$n=-2$$ gives alternating but non-decreasing magnitudes). The terms don't tend to zero, so the infinite sum doesn't converge. The series is valid strictly inside $$|x| < \\frac{2}{5}$$, not at the boundary.\n\nTakeaway: Convergence is strict — the series can diverge at the boundary even if the actual function is finite there.", "source": "GLM 5.1 ①", "_id": "glm_1_39"}, {"question": "Why does the general binomial expansion $$(1+X)^n$$ *fail* (diverge) when $$|X| \\geq 1$$, even though the formula still produces terms?", "answer": "- Step 1: Each term has $$X^k$$ — if $$|X| \\geq 1$$, the $$X^k$$ factor doesn't shrink as $$k$$ grows.\n- Step 2: Combined with the coefficients (which for non-positive-integer $$n$$ don't vanish), the terms don't go to zero, so the series can't converge.\n- Step 3: Outside the validity range, the formal series is meaningless as an approximation — it doesn't equal $$(1+X)^n$$ in any limit sense.\n\n*Convergence is essential; the series is only a valid representation inside $$|X|<1$$.*", "source": "Opus 4.7 ②", "_id": "opus_2_46"}, {"question": "When writing polynomial long division like (5x+3)/(x+2), what is the correct form to use for finding asymptotes, and what is a common error? (2 steps)", "answer": "- Step 1: Write as quotient + remainder/divisor: (5x+3)/(x+2) = 5 + (-7)/(x+2). This shows the horizontal asymptote y=5 and vertical asymptote x=-2.\n- Step 2: A common error is writing it as 5(x+2) - 7 instead of 5 + (-7)/(x+2). The key is the remainder must be divided by the divisor, not just written as a term.\n\n**Takeaway:** For asymptote analysis, always express as quotient + remainder/divisor — this reveals the horizontal asymptote (quotient constant).", "source": "MiniMax ①", "_id": "minimax_1_15"}, {"question": "If a curve is rotated about the $$x$$-axis by an angle $$\\theta$$ (instead of the full $$2\\pi$$), the volume formula becomes $$V = \\frac{\\theta}{2\\pi} \\cdot \\pi \\int y^2 \\, dx = \\frac{\\theta}{2} \\int y^2 \\, dx$$. Intuitively, why is the volume proportional to the angle of rotation? (2 steps)", "answer": "- Step 1: A full revolution ($$\\theta = 2\\pi$$) sweeps out the maximum volume. A half revolution ($$\\theta = \\pi$$) sweeps out exactly half the volume because you're only going halfway around. The volume is directly proportional to how far you rotate — like slicing a pie, the volume of a sector is proportional to its angle.\n- Step 2: The factor $$\\frac{\\theta}{2\\pi}$$ is the fraction of a full revolution. Multiply this by the full-revolution volume $$\\pi \\int y^2 \\, dx$$ to get the partial-revolution volume. Simplifying: $$V = \\frac{\\theta}{2} \\int y^2 \\, dx$$.\n\nTakeaway: Partial rotation volume = (angle fraction) × (full rotation volume).", "source": "GLM 5.1 ③", "_id": "glm_3_24"}, {"question": "When forming $$fg(x)$$, which function acts first, and why is order critical? (3 steps)", "answer": "- Step 1: Read right to left: $$fg(x) = f(g(x))$$. The **inner** function $$g$$ acts first on $$x$$.\n- Step 2: The output of $$g$$ is then fed into $$f$$.\n- Step 3: If you accidentally compute $$g(f(x))$$ instead — e.g. you wrap $$\\ln$$ around an already-$$\\ln$$ expression — you get a totally different equation (the example in the tutorial produced $$\\ln$$ on both sides incorrectly).\n\n*Memory aid: in $$fg(x)$$, $$g$$ is \"closer to $$x$$\" so $$g$$ touches $$x$$ first.*", "source": "Opus 4.7 ②", "_id": "opus_2_10"}, {"question": "When implicitly differentiating a term like $$xy$$ with respect to $$x$$, you must use the product rule. Why are brackets essential around the product rule expansion $$\\left[x\\frac{dy}{dx} + y\\right]$$, and what error occurs if you omit them when there's a coefficient like $$-2$$ in front? (3 steps)", "answer": "- Step 1: The product rule gives $$\\frac{d}{dx}(xy) = x \\cdot \\frac{dy}{dx} + y \\cdot 1 = x\\frac{dy}{dx} + y$$. This entire expression replaces $$xy$$ in the differentiated equation.\n- Step 2: If the original term is $$-2xy$$, the derivative is $$-2\\left[x\\frac{dy}{dx} + y\\right] = -2x\\frac{dy}{dx} - 2y$$. Without brackets, you might write $$-2x\\frac{dy}{dx} + y$$, which only applies the $$-2$$ to the first term — a sign/distribution error.\n- Step 3: This cascades: the $$-2y$$ term gets moved to the other side during rearrangement, so forgetting the bracket means the $$y$$ term has the wrong sign, and the final $$\\frac{dy}{dx}$$ expression is completely wrong.\n\nTakeaway: Always write brackets around the product rule result when there's an external coefficient.", "source": "GLM 5.1 ③", "_id": "glm_3_8"}, {"question": "A linear first-order differential equation has the form $$\\frac{dy}{dx} + P(x)y = Q(x)$$. Describe the integrating factor method: what is the integrating factor, and why does multiplying by it make the left side a perfect derivative? (3 steps)", "answer": "- Step 1: Compute the integrating factor: $$\\text{IF} = e^{\\int P(x) \\, dx}$$. (Don't add a constant of integration here — it cancels out.)\n- Step 2: Multiply both sides of the ODE by IF: $$e^{\\int P \\, dx} \\frac{dy}{dx} + P(x) e^{\\int P \\, dx} y = Q(x) e^{\\int P \\, dx}$$. The left side is now exactly $$\\frac{d}{dx}\\left[y \\cdot e^{\\int P \\, dx}\\right]$$ by the product rule, because the derivative of $$e^{\\int P \\, dx}$$ is $$P(x) \\cdot e^{\\int P \\, dx}$$.\n- Step 3: So the equation becomes $$\\frac{d}{dx}\\left[y \\cdot \\text{IF}\\right] = Q(x) \\cdot \\text{IF}$$. Integrate both sides with respect to $$x$$: $$y \\cdot \\text{IF} = \\int Q(x) \\cdot \\text{IF} \\, dx + C$$. Then solve for $$y$$ by dividing by IF.\n\nTakeaway: The integrating factor is engineered so that the left side becomes a product-rule derivative. It \"undoes\" the product rule.", "source": "GLM 5.1 ③", "_id": "glm_3_26"}, {"question": "For a first-order linear ODE in standard form $$\\frac{dy}{dx} + P(x)y = Q(x)$$, what is the integrating factor, and why does multiplying by it make the left side a perfect derivative? (4 steps)", "answer": "- Step 1: The **integrating factor** (IF) is $$e^{\\int P(x)\\,dx}$$ — compute the integral of $$P(x)$$, then exponentiate.\n- Step 2: Multiply the entire ODE by the IF: $$e^{\\int P\\,dx}\\frac{dy}{dx} + P(x)e^{\\int P\\,dx}y = Q(x)e^{\\int P\\,dx}$$.\n- Step 3: The left side is now exactly $$\\frac{d}{dx}\\left[y \\cdot e^{\\int P\\,dx}\\right]$$ by the product rule: differentiate $$y \\cdot IF$$ and you get $$IF\\cdot\\frac{dy}{dx} + y\\cdot\\frac{d(IF)}{dx} = IF\\cdot\\frac{dy}{dx} + y\\cdot P\\cdot IF$$, matching the left side.\n- Step 4: So the ODE becomes $$\\frac{d}{dx}[y \\cdot IF] = Q \\cdot IF$$, which integrates directly: $$y \\cdot IF = \\int Q \\cdot IF\\,dx + C$$, then solve for $$y$$.\n\nThe IF is engineered so that multiplying by it turns the left side into $$\\frac{d}{dx}[y \\cdot IF]$$ — a single derivative you can integrate in one step.", "source": "GLM 5.1 ②", "_id": "glm_2_48"}, {"question": "In the line $$L_2: \\mathbf{r} = (-1, \\beta, 6) + \\mu(2, -1, 7)$$, why is $$\\beta$$ treated as a *constant* in the simultaneous equations, while $$\\mu$$ is a *variable*? (2 steps)", "answer": "- Step 1: $$\\mu$$ is a *parameter* that varies to sweep out different points on the line. It's an unknown we solve for to find the specific $$\\mu$$-value at the intersection. Hence $$\\mu$$ is a variable in the simultaneous equations.\n- Step 2: $$\\beta$$ is a fixed number that defines *which* line $$L_2$$ is — it's part of the line's fixed starting point. We're solving *for* $$\\beta$$ (finding which line configuration makes intersection happen), so $$\\beta$$ is a constant we determine, not a variable we let range freely.\n\n$$\\lambda, \\mu$$: parameters (variables to solve for). $$\\beta$$: a fixed constant defining the line (also to solve for, but it doesn't vary along the line).", "source": "GLM 5.1 ②", "_id": "glm_2_26"}, {"question": "In the nested squares problem with outer side = 3 and inner side = $$\\sqrt{5}$$, what is the area ratio between consecutive squares, and why is this ratio the same for every iteration? (3 steps)", "answer": "- Step 1: Outer square area = $$3^2 = 9$$. Inner square area = $$\\sqrt{5}^2 = 5$$. Ratio (inner/outer) = $$5/9$$.\n- Step 2: The construction is *self-similar*: each new square is formed by the same rule (mark 1/3 along each side, join adjacent points). The geometry repeats identically at every scale.\n- Step 3: Because the rule is identical each time, the area ratio between any two consecutive squares is always $$5/9$$. The second square is $$5/9$$ of the first; the third is $$5/9$$ of the second; and so on.\n\nSelf-similar constructions produce constant ratios — each iteration multiplies by the same factor.", "source": "GLM 5.1 ②", "_id": "glm_2_2"}, {"question": "In the question \"Find $$g^{-1}(x)$$,\" many students only give the equation and forget something else that costs a mark. What is the missing piece, and why do examiners include it? (2 steps)", "answer": "- Step 1: The missing piece is the **domain of the inverse** ($$x < 5$$ in this case). An inverse function is not fully specified without its domain — the equation alone allows inputs that the original function never produced as outputs.\n- Step 2: Examiners include this mark because it tests whether you understand the *relationship* between original and inverse (range → domain), not just the *mechanics* of algebraic inversion. The question often doesn't explicitly say \"state the domain\" — it's implied, and forgetting it is a common trap.\n\nAlways state both the equation AND the domain of the inverse. Even if the question doesn't ask for the domain explicitly, it's required for full marks.", "source": "GLM 5.1 ②", "_id": "glm_2_15"}, {"question": "After dividing $$\\frac{5x+3}{x+2}$$, a student writes the result as $$5(x+2) - 7$$ and stops. What is wrong with this, and what must the student write instead? (3 steps)", "answer": "- Step 1: $$5(x+2) - 7 = 5x + 10 - 7 = 5x + 3$$ — this is just the numerator reconstructed. It is an *intermediate working step*, not the final division result.\n- Step 2: The whole point of division is to express the fraction as quotient + remainder/divisor. You must write: $$\\frac{5x+3}{x+2} = 5 + \\frac{-7}{x+2}$$, where 5 is the quotient, −7 is the remainder, and $$x+2$$ is the divisor.\n- Step 3: If you write $$5(x+2) - 7$$, you haven't actually divided — you've just re-expanded. To reach the correct form, you'd need to split: $$\\frac{5(x+2)}{x+2} + \\frac{-7}{x+2} = 5 + \\frac{-7}{x+2}$$. Going straight to the final line is faster and less error-prone.\n\nThe required form is always: quotient + remainder/divisor. Never stop at the re-expanded numerator.", "source": "GLM 5.1 ②", "_id": "glm_2_8"}, {"question": "Why does the range of the original function become the *domain* of its inverse?", "answer": "- Step 1: An inverse $$g^{-1}$$ reverses the role of input and output: if $$g: x \\mapsto y$$, then $$g^{-1}: y \\mapsto x$$.\n- Step 2: The set of $$y$$-values that $$g$$ actually produces is its range. These are precisely the inputs $$g^{-1}$$ can accept.\n- Step 3: So domain of $$g^{-1}$$ = range of $$g$$. Similarly, range of $$g^{-1}$$ = domain of $$g$$.\n\n*Graphically, reflecting $$y=g(x)$$ in the line $$y=x$$ swaps the horizontal and vertical extents.*", "source": "Opus 4.7 ②", "_id": "opus_2_7"}, {"question": "The formula book gives two binomial expansion formulas. One requires $$n$$ to be a positive integer (1, 2, 3, …). The other works for any real $$n$$, including negatives and fractions. For P3/P4 problems with a power like $$-2$$, which formula do you use, and why can't you use the other? (2 steps)", "answer": "- Step 1: Use the \"bottom version\" — the one that says $$n$$ can be any real number. This is the full binomial series: $$\\big(1+x\\big)^n = 1 + nx + \\frac{n(n-1)}{2!}x^2 + \\frac{n(n-1)(n-2)}{3!}x^3 + \\ldots$$, valid for $$|x| < 1$$ when $$n$$ is not a positive integer.\n- Step 2: The \"top version\" (the simple binomial theorem for positive integer $$n$$) gives a *finite* expansion that terminates after $$n+1$$ terms. For $$n=-2$$, it doesn't apply — negative integers aren't positive integers. Using it would give nonsense. The bottom version produces an *infinite* series, which is correct for negative/fractional powers.\n\nTakeaway: Negative or fractional power → bottom formula (infinite series, valid for $$|x|<1$$). Positive integer power → top formula (finite expansion).", "source": "GLM 5.1 ①", "_id": "glm_1_18"}, {"question": "Why-not probe: Why can't you integrate $$\\frac{u-3}{u^{1/2}}$$ as a single lump using integration by parts, instead of splitting it into $$u^{1/2} - 3u^{-1/2}$$? (2 steps)", "answer": "- Step 1: Integration by parts ($$\\int u\\,dv = uv - \\int v\\,du$$) is designed for products of *different types* of functions (e.g., polynomial × exponential). Here, both parts are powers of the same variable $$u$$ — it's a sum of powers, not a product of distinct function types.\n- Step 2: Applying integration by parts would create a more complicated integral rather than simplifying, because differentiating or integrating a power of $$u$$ just shifts the exponent — you'd cycle through powers without convergence. Splitting and using the power rule on each term is the direct, correct approach for sums of powers.\n\nTakeaway: Sums of powers → split and power-rule each term. Integration by parts is for products of different function families.", "source": "GLM 5.1 ①", "_id": "glm_1_41"}, {"question": "The bottom binomial formula requires the bracket to start with **1**, i.e., $$(1 + ax)^n$$. For $$(2 + 5x)^{-2}$$, why can't you apply the formula directly, and what must you do first? (3 steps)", "answer": "- Step 1: The formula's terms involve powers of the \"second part\" ($$ax$$): $$1 + n(ax) + \\frac{n(n-1)}{2!}(ax)^2 + \\cdots$$. The leading 1 is essential — it's the first term of the expansion, and all subsequent terms are multiples of $$ax$$.\n- Step 2: If the bracket starts with 2 (i.e., $$(2 + 5x)^{-2}$$), the formula doesn't apply directly because there's no \"1\" for the first term to anchor to. You'd get incorrect terms.\n- Step 3: Factor out the 2: $$(2 + 5x)^{-2} = [2(1 + \\frac{5x}{2})]^{-2} = 2^{-2} \\cdot (1 + \\frac{5x}{2})^{-2} = \\frac{1}{4}(1 + \\frac{5x}{2})^{-2}$$. Now the bracket starts with 1, and you apply the binomial formula to $$(1 + \\frac{5x}{2})^{-2}$$, then multiply everything by $$\\frac{1}{4}$$.\n\nAlways factor out the leading coefficient to make the bracket start with 1. The power applies to the factored-out constant too: $$[c(1+ax)]^n = c^n(1+ax)^n$$.", "source": "GLM 5.1 ②", "_id": "glm_2_39"}, {"question": "When computing the volume of revolution $$V = \\pi \\int_a^b y^2 \\, dx$$, a student substitutes $$y = f(x)$$ and gets $$V = \\pi \\int_a^b [f(x)]^2 \\, dx$$. They then try to compute $$\\int [f(x)]^2 \\, dx$$ by writing $$\\left[\\int f(x)\\,dx\\right]^2$$. Why is this wrong? (2 steps)", "answer": "- Step 1: Integration and squaring do not commute. $$\\int [f(x)]^2 \\, dx$$ means: first square the function, then integrate the result. $$\\left[\\int f(x)\\,dx\\right]^2$$ means: first integrate the function, then square the result. These are different operations producing different results.\n- Step 2: Simple counterexample: $$f(x) = x$$ on $$[0,1]$$. Then $$\\int_0^1 x^2\\,dx = \\frac{1}{3}$$, but $$\\left[\\int_0^1 x\\,dx\\right]^2 = \\left[\\frac{1}{2}\\right]^2 = \\frac{1}{4}$$. The values differ. You must square the function *first*, then integrate.\n\nTakeaway: Square the function, then integrate. Never integrate then square.", "source": "GLM 5.1 ③", "_id": "glm_3_43"}, {"question": "A point $$P(a,b)$$ on a curve has gradient 2. Substituting into $$\\frac{dy}{dx}$$ gives one equation like $$4a + b = 12$$, but there are two unknowns. A student gets stuck, saying \"I only have one equation.\" Where is the second equation? (3 steps)", "answer": "- Step 1: The gradient condition $$\\frac{dy}{dx} = 2$$ at $$P(a,b)$$ gives one equation relating $$a$$ and $$b$$. This alone is indeed insufficient — one equation, two unknowns.\n- Step 2: The second equation comes from the fact that **$$P$$ lies on the curve**. The curve equation (e.g., $$4x^2 + y^2 = 24$$) must be satisfied by any point on it. Substituting $$x = a$$, $$y = b$$ gives the second equation: $$4a^2 + b^2 = 24$$.\n- Step 3: This is a recurring weakness: students treat \"P lies on the curve\" as merely a description, not as an *equation*. But every point on a curve satisfies the curve equation — that IS a usable equation for solving simultaneous equations.\n\n\"Point lies on the curve\" = \"substitute the point into the curve equation.\" This is always your second equation when you have a gradient condition and two unknowns.", "source": "GLM 5.1 ②", "_id": "glm_2_20"}, {"question": "A student sees a consecutive area ratio of $$5/9$$ and computes the 4th square fraction as $$\\frac{5}{9} \\times 4 = \\frac{20}{9}$$. What conceptual error did they make, and what should they have done instead? (2 steps)", "answer": "- Step 1: The error is treating the ratio as *additive* — multiplying by 4 as if each iteration *adds* another $$5/9$$. But ratios *compound multiplicatively*: each iteration multiplies the previous area by $$5/9$$, not adds $$5/9$$ to it.\n- Step 2: The correct calculation is repeated multiplication: $$\\left(\\frac{5}{9}\\right)^3 = \\frac{125}{729}$$, a shrinking fraction (as expected — inner squares get smaller). The student's answer $$\\frac{20}{9} > 1$$ is clearly absurd for a smaller square.\n\nMultiplicative compounding shrinks (ratio < 1) or grows (ratio > 1); additive compounding is the wrong model entirely.", "source": "GLM 5.1 ②", "_id": "glm_2_4"}, {"question": "In the Edexcel formula book, two binomial expansion formulas are given. The \"top version\" has a finite number of terms and requires $$n$$ to be a positive integer. The \"bottom version\" is an infinite series valid for any real $$n$$. Why does the top version *terminate* while the bottom version *doesn't*? (3 steps)", "answer": "- Step 1: The top version computes $$\\binom{n}{k}$$ using factorials: $$\\binom{n}{k} = \\frac{n!}{k!(n-k)!}$$, which is only defined when $$n$$ is a non-negative integer. Terms like $$\\binom{5}{6}$$ equal zero because the factorial definition gives zero when $$k > n$$.\n- Step 2: When $$n$$ is a positive integer, once $$k$$ exceeds $$n$$, every subsequent term is zero — the series *terminates* at the $$(n+1)$$-th term. This gives the familiar finite expansion like $$(1+x)^5 = 1 + 5x + 10x^2 + ... + x^5$$.\n- Step 3: The bottom version uses the product formula $$\\frac{n(n-1)(n-2)\\cdots(n-k+1)}{k!}$$, which never produces zero for non-integer or negative $$n$$ (since $$n-k+1$$ never reaches zero). The series continues indefinitely — it's an infinite series that only converges when $$|x| < 1$$.\n\nFor P3/P4: always use the bottom version. It handles negative and fractional powers. The top version is for P1/P2 (positive integer powers only).", "source": "GLM 5.1 ②", "_id": "glm_2_38"}, {"question": "The binomial expansion of $$(1 + \\frac{5x}{2})^{-2}$$ is valid only when $$\\left|\\frac{5x}{2}\\right| < 1$$. What range of $$x$$ does this give, and why does the series diverge outside this range? (2 steps)", "answer": "- Step 1: $$\\left|\\frac{5x}{2}\\right| < 1$$ implies $$|x| < \\frac{2}{5}$$. So the expansion is valid for $$-\\frac{2}{5} < x < \\frac{2}{5}$$.\n- Step 2: The binomial series is an infinite sum. It converges (approaches a finite value) only when the terms shrink toward zero, which requires $$|t| < 1$$ where $$t = \\frac{5x}{2}$$. If $$|t| \\geq 1$$, successive terms don't shrink — they stay the same size or grow — so the infinite sum has no finite value and the series diverges. This is a fundamental property of power series: they have a \"radius of convergence.\"\n\nTakeaway: Always state the validity range when giving a binomial expansion. It's $$|t| < 1$$ where $$t$$ is the term after the \"1\" in the bracket.", "source": "GLM 5.1 ③", "_id": "glm_3_22"}, {"question": "A student expands $$(3 - 2x)^{-1}$$ and claims it's valid for $$|x| < 3$$. Is this correct? If not, derive the correct range. (3 steps)", "answer": "- Step 1: First factor out the leading coefficient: $$(3-2x)^{-1} = 3^{-1}(1 - \\frac{2x}{3})^{-1} = \\frac{1}{3}(1 - \\frac{2x}{3})^{-1}$$.\n- Step 2: The bracket is $$(1 + ax)^n$$ with $$a = -\\frac{2}{3}$$ (note the negative sign is part of $$a$$). Convergence requires $$|ax| < 1$$: $$\\left|-\\frac{2x}{3}\\right| < 1$$, which simplifies to $$\\frac{2|x|}{3} < 1$$.\n- Step 3: Multiply by 3: $$2|x| < 3$$. Divide by 2: $$|x| < \\frac{3}{2}$$, NOT $$|x| < 3$$. The student forgot to factor out the 3 first — they applied $$|x| < \\frac{1}{\\text{leading coefficient}}$$ incorrectly.\n\nValidity range: $$|x| < \\frac{1}{|a|}$$ where $$a$$ is the coefficient of $$x$$ *inside the bracket after factoring*, not the original coefficient.", "source": "GLM 5.1 ②", "_id": "glm_2_42"}, {"question": "In the nested squares ESAT problem, a student picks the outer square side = 1 instead of 3, getting segments of 1/3 and 2/3. They compute the inner side as $$\\sqrt{(1/3)^2 + (2/3)^2} = \\sqrt{5}/3$$ and area ratio = $$(5/9)$$, but worries this looks different from the \"side = 3\" approach. Does the ratio change? (2 steps)", "answer": "- Step 1: Inner area = $$5/9$$, outer area = $$1$$, ratio = $$5/9$$ — identical to the side = 3 approach (where inner area = 5, outer area = 9, ratio = 5/9). The ratio is the same regardless of scale.\n- Step 2: The side = 3 approach avoids fractions entirely (segments are nice integers 1 and 2), making arithmetic faster and less error-prone under ESAT time pressure. The ratio is mathematically identical either way, but the convenient choice reduces cognitive load.\n\nPick the scale that minimizes fractions and ugly numbers. The ratio is scale-invariant — your choice only affects how pleasant the arithmetic is.", "source": "GLM 5.1 ②", "_id": "glm_2_63"}, {"question": "Why must you split $$\\dfrac{u-3}{\\sqrt{u}}$$ as $$u^{1/2} - 3u^{-1/2}$$ *before* integrating, rather than integrating the fraction directly?", "answer": "- Step 1: There is no quotient rule for integration — a fraction like $$(u-3)/\\sqrt{u}$$ has no standard antiderivative as written.\n- Step 2: Splitting: $$\\dfrac{u}{u^{1/2}} - \\dfrac{3}{u^{1/2}} = u^{1/2} - 3u^{-1/2}$$ using $$u^a/u^b = u^{a-b}$$.\n- Step 3: Each term is now a single power of $$u$$, integrable by the power rule.\n\n*Algebraic preprocessing is half the work in integration — make the integrand a *sum* of standard forms.*", "source": "Opus 4.7 ②", "_id": "opus_2_24"}, {"question": "The integrand after full substitution is $$-2\\int_4^3 \\left(u^{1/2} - 3u^{-1/2}\\right)du$$, with the bottom limit larger than the top. Does this automatically mean the final answer is negative? Explain the two sign sources. (3 steps)", "answer": "- Step 1: There are two potential sign sources: (a) the coefficient $$-2$$ outside the integral, and (b) the reversed limits (bottom > top). By the fundamental theorem, $$\\int_4^3 f(u)\\,du = -\\int_3^4 f(u)\\,du$$, so reversed limits introduce a negative sign.\n- Step 2: Combining: the overall expression is $$-2 \\times \\left(-\\int_3^4 (u^{1/2} - 3u^{-1/2})\\,du\\right) = 2\\int_3^4 (u^{1/2} - 3u^{-1/2})\\,du$$. The two negatives cancel.\n- Step 3: Over the range $$[3,4]$$, $$u^{1/2} - 3u^{-1/2}$$ is positive (at $$u=4$$: $$2 - 1.5 = 0.5$$; at $$u=3$$: $$\\sqrt{3} - 3/\\sqrt{3} \\approx 1.73 - 1.73 = 0$$). So the integral is positive, and multiplied by 2 gives a positive final answer.\n\nTwo sign sources can cancel. Don't assume \"reversed limits = negative answer.\" Track every sign explicitly: coefficient, limit order, and integrand sign over the range.", "source": "GLM 5.1 ②", "_id": "glm_2_37"}, {"question": "A linear first-order differential equation has the form $$\\frac{dy}{dx} + P(x)y = Q(x)$$, where $$P$$ and $$Q$$ are functions of $$x$$ only. What is the integrating factor, and why does multiplying through by it make the left side a perfect derivative? (3 steps)", "answer": "- Step 1: The integrating factor is $$IF = e^{\\int P(x)\\,dx}$$ — you integrate $$P(x)$$ (ignoring the constant of integration) and exponentiate. This is a carefully chosen multiplier.\n- Step 2: Multiply the entire ODE by the IF: $$e^{\\int P\\,dx}\\frac{dy}{dx} + P(x)e^{\\int P\\,dx}y = Q(x)e^{\\int P\\,dx}$$. The left side is now exactly $$\\frac{d}{dx}\\big[y\\cdot e^{\\int P\\,dx}\\big]$$, because by the product rule: $$\\frac{d}{dx}\\big[y\\cdot IF\\big] = \\frac{dy}{dx}\\cdot IF + y\\cdot\\frac{d}{dx}\\big[IF\\big]$$, and $$\\frac{d}{dx}\\big[e^{\\int P\\,dx}\\big] = P(x)e^{\\int P\\,dx}$$ (by differentiating the exponential).\n- Step 3: Now the ODE reads $$\\frac{d}{dx}\\big[y\\cdot IF\\big] = Q(x)\\cdot IF$$, which can be integrated directly: $$y\\cdot IF = \\int Q(x)\\cdot IF\\,dx + C$$, then solve for $$y$$ by dividing by the IF.\n\nTakeaway: The IF is designed so that the left side becomes a single derivative — turning the ODE into a direct integration problem.", "source": "GLM 5.1 ①", "_id": "glm_1_24"}, {"question": "Conceptually, why does the binomial coefficient $$\\dfrac{n(n-1)\\ldots(n-k+1)}{k!}$$ replace $$\\binom{n}{k}$$ in the general formula?", "answer": "- Step 1: For positive integer $$n$$, $$\\binom{n}{k} = \\dfrac{n!}{k!(n-k)!}$$ requires $$(n-k)!$$, which is only defined for $$n \\geq k$$.\n- Step 2: The product $$n(n-1)\\ldots(n-k+1)$$ avoids factorials of negatives/non-integers — it works for any real $$n$$.\n- Step 3: When $$n$$ is a positive integer and $$k \\leq n$$, the two definitions agree exactly; when $$n$$ is negative or fractional, only the product form makes sense.\n\n*The general form is a strict generalisation, designed to work where factorials fail.*", "source": "Opus 4.7 ②", "_id": "opus_2_41"}, {"question": "The volume of revolution formula is $$V = \\pi \\int y^2 \\, dx$$ for rotation about the $$x$$-axis. Conceptually, why is there a $$\\pi$$ and why is $$y$$ squared? (3 steps)", "answer": "- Step 1: When you rotate a thin horizontal strip of width $$dx$$ at height $$y$$ about the $$x$$-axis, it sweeps out a disc (a thin cylinder). The radius of this disc is $$y$$ (the distance from the $$x$$-axis to the curve), and its thickness is $$dx$$.\n- Step 2: The volume of a cylinder is $$\\pi r^2 h$$. Here, $$r = y$$ and $$h = dx$$, so the volume of one disc is $$\\pi y^2 \\, dx$$. The $$\\pi$$ comes from the circular cross-section; the $$y^2$$ comes from the area of that circle.\n- Step 3: Summing (integrating) all these discs from $$x = a$$ to $$x = b$$ gives $$V = \\pi \\int_a^b y^2 \\, dx$$. For rotation about the $$y$$-axis, the roles swap: the radius is $$x$$ and the thickness is $$dy$$, giving $$V = \\pi \\int x^2 \\, dy$$.\n\nTakeaway: Think \"disc method\" — each slice becomes a disc with area $$\\pi r^2$$ and thickness $$dx$$ (or $$dy$$).", "source": "GLM 5.1 ③", "_id": "glm_3_23"}, {"question": "For the binomial expansion of $$(1+ax)^n$$ with $$n$$ negative or fractional, why is the convergence condition $$|ax|<1$$ necessary, and what goes wrong if $$|ax| \\geq 1$$? (3 steps)", "answer": "- Step 1: The series is infinite (doesn't terminate). Each term involves $$\\frac{n(n-1)\\cdots(n-k+1)}{k!}(ax)^k$$ — the coefficient grows combinatorially while $$|ax|^k$$ grows or shrinks depending on $$|ax|$$.\n- Step 2: If $$|ax| < 1$$, then $$|ax|^k$$ shrinks exponentially as $$k$$ increases, eventually overpowering the growing coefficient. The terms converge to zero fast enough for the infinite sum to have a finite value.\n- Step 3: If $$|ax| \\geq 1$$, the powers $$|ax|^k$$ don't shrink (they grow or stay constant), so the terms don't converge to zero. The infinite sum diverges — it has no finite value, and the expansion is meaningless outside the convergence range.\n\n$$|ax|<1$$ ensures the geometric shrinking of each term dominates the combinatorial growth of coefficients. Without it, the infinite series blows up.", "source": "GLM 5.1 ②", "_id": "glm_2_58"}, {"question": "Why is $$\\sin 2\\theta = 2\\sin\\theta\\cos\\theta$$ so often the *key* to making a substitution $$u = a + \\cos\\theta$$ work? (3 steps)", "answer": "- Step 1: The substitution requires $$du = -\\sin\\theta\\, d\\theta$$, so you need a $$\\sin\\theta$$ factor in the integrand.\n- Step 2: $$\\sin 2\\theta$$ doesn't contain $$\\sin\\theta$$ literally — but the double-angle identity unfolds it into $$2\\sin\\theta\\cos\\theta$$.\n- Step 3: Now $$\\sin\\theta$$ cancels with the $$\\sin\\theta$$ from $$d\\theta$$, and the leftover $$\\cos\\theta$$ gets replaced via $$\\cos\\theta = u - 3$$.\n\n*Identities are bridges: they convert what you *have* into what the substitution *needs*.*", "source": "Opus 4.7 ②", "_id": "opus_2_20"}, {"question": "A student sees $$\\int u^{-1/2}\\,du$$ and writes $$\\frac{u^{-1/2+1}}{-1/2+1} = \\frac{u^{1/2}}{1/2}$$. They then claim this equals $$\\frac{1}{2}u^{1/2}$$, confusing the division. What is the correct result, and how should you think about \"divide by a fraction\"? (3 steps)", "answer": "- Step 1: $$\\int u^{-1/2}\\,du = \\frac{u^{1/2}}{1/2}$$ — the new power is $$-1/2 + 1 = 1/2$$, and you divide by this new power.\n- Step 2: Dividing by $$\\frac{1}{2}$$ is the same as multiplying by 2: $$\\frac{u^{1/2}}{1/2} = u^{1/2} \\times 2 = 2u^{1/2}$$. The student incorrectly treated \"divide by 1/2\" as \"multiply by 1/2,\" getting $$\\frac{1}{2}u^{1/2}$$ — half the correct answer.\n- Step 3: Mental check: $$u^{-1/2} = \\frac{1}{\\sqrt{u}}$$, which is a large value near $$u=0$$ and decreasing. Its integral should *grow* (with decreasing slope), so $$2\\sqrt{u}$$ (increasing) makes sense, while $$\\frac{1}{2}\\sqrt{u}$$ (too small) doesn't.\n\nDividing by a fraction: $$\\frac{a}{1/n} = a \\times n$$. \"Divide by 1/2 = multiply by 2.\" This is the most common arithmetic slip in power-rule integration.", "source": "GLM 5.1 ②", "_id": "glm_2_57"}, {"question": "A counterexample sharpening boundary: The binomial series $$\\big(1+x\\big)^n$$ converges for $$|x|<1$$ when $$n$$ is negative. For $$n=-1$$, does the series converge at $$x=-1$$? What about $$x=1$$? (2 steps)", "answer": "- Step 1: At $$x = -1$$: the bracket becomes $$1-1=0$$, and $$0^{-1}$$ is undefined (division by zero). The series terms involve powers of $$-1$$, which alternate, but the sum would need to equal $$\\frac{1}{0}$$ — impossible. No convergence.\n- Step 2: At $$x = 1$$: the bracket becomes $$2$$, and $$2^{-1} = \\frac{1}{2}$$ is finite. But the series $$1 - 1 + 1 - 1 + \\ldots$$ (with alternating terms that don't tend to zero) diverges — it oscillates and never settles. So even though the function value exists, the series doesn't converge at the boundary.\n\nTakeaway: Boundary convergence must be checked separately — the $$|x|<1$$ condition is strict, and boundary behaviour can fail even when the function is defined.", "source": "GLM 5.1 ①", "_id": "glm_1_52"}, {"question": "If each consecutive square has area ratio $$5/9$$ relative to its predecessor, why is the 4th square's area fraction of the original equal to $$\\left(\\frac{5}{9}\\right)^3$$ rather than $$\\left(\\frac{5}{9}\\right)^4$$? (2 steps)", "answer": "- Step 1: Count the *transitions* (multiplications), not the squares. From the 1st to the 2nd square is one transition (multiply by $$5/9$$). From 2nd to 3rd is another. From 3rd to 4th is a third. That is 3 transitions total.\n- Step 2: The 4th square's area as a fraction of the 1st is therefore $$\\frac{5}{9} \\times \\frac{5}{9} \\times \\frac{5}{9} = \\left(\\frac{5}{9}\\right)^3$$. The exponent equals the number of transitions, which is always \"target square number minus 1.\"\n\nExponent = (n − 1) where n is the square number you want. Three transitions, power of 3.", "source": "GLM 5.1 ②", "_id": "glm_2_3"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "When a geometry problem asks for a *fraction* (ratio) of areas, why is it valid — and strategically smart — to pick a convenient absolute length like \"1\" rather than using a variable? (2 steps)", "answer": "- Step 1: A fraction is dimensionless — it compares two quantities of the same type, so scaling every length by the same factor cancels out. If the original square has side $$L$$ and the inner square has side $$kL$$, the area ratio is $$k^2L^2 / L^2 = k^2$$, independent of $$L$$.\n- Step 2: Picking a convenient number (like 1 or 3, chosen to match fractions in the problem) eliminates algebra clutter and makes Pythagoras/arithmetic instant. You never need to carry $$L$$ through every step — it would cancel at the end anyway, so skip it from the start.\n\nTakeaway: When the answer is a ratio, set the most convenient length to 1 (or whatever makes the fractions clean).", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": true}, {"question": "In the nested-squares problem, points are placed 1/3 of the way along each side of a square, forming a smaller inner square. If you set the full side of the outer square to 3, what are the two leg lengths of the right triangle whose hypotenuse is the inner square's side, and what is that side length? (3 steps)", "answer": "- Step 1: The full side is 3. The point is 1/3 along, so one segment is 1 and the other is $$3 - 1 = 2$$. These two perpendicular segments (1 and 2) are the legs of a right triangle formed at each corner.\n- Step 2: By Pythagoras, the inner square's side = $$\\sqrt{1^2 + 2^2} = \\sqrt{5}$$.\n- Step 3: The inner square's area is $$\\left(\\sqrt{5}\\right)^2 = 5$$, and the outer square's area is $$3^2 = 9$$, giving the area ratio of one iteration as $$\\frac{5}{9}$$.\n\nTakeaway: The geometry reduces to a simple Pythagoras problem once you assign convenient lengths.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "Each iteration of the nested-square process multiplies the area by the same factor. If the area ratio of one inner square to its outer square is $$\\frac{5}{9}$$, what fraction of the *original* (1st) square's area is the 4th square, and why is it a *cube* rather than a 4th power? (2 steps)", "answer": "- Step 1: The 2nd square is $$\\frac{5}{9}$$ of the 1st. The 3rd square is $$\\frac{5}{9}$$ of the 2nd, which is $$\\left(\\frac{5}{9}\\right)^2$$ of the 1st. The 4th square is $$\\frac{5}{9}$$ of the 3rd, which is $$\\left(\\frac{5}{9}\\right)^3$$ of the 1st.\n- Step 2: The exponent counts the number of *transitions* between squares, not the square number itself. Going from 1st → 2nd is one transition, 1st → 3rd is two, 1st → 4th is three. So the 4th square requires 3 multiplications of $$\\frac{5}{9}$$, giving $$\\left(\\frac{5}{9}\\right)^3 = \\frac{125}{729}$$.\n\nTakeaway: The exponent equals (target square number − 1), because the 1st square itself is the baseline with exponent 0.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "Why does polynomial long division of $$\\frac{5x+3}{x+2}$$ produce the form $$5 + \\frac{-7}{x+2}$$, and why is this form more useful than the raw fraction or the expanded form $$5(x+2) - 7$$? (3 steps)", "answer": "- Step 1: Dividing $$5x+3$$ by $$x+2$$: the quotient is 5 (since $$5 \\cdot (x+2) = 5x+10$$), and the remainder is $$3 -
