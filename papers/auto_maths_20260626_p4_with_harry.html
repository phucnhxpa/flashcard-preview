le trick.*", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": true}, {"question": "A curve has equation $$F(x,y) = c$$. To find $$dy/dx$$ at a specific point $$(a,b)$$, why is implicit differentiation usually better than solving for $$y$$ first?", "answer": "- Step 1: Solving $$F(x,y) = c$$ for $$y$$ explicitly may be impossible or extremely messy (e.g. involving square roots, branch choices, or transcendental terms).\n- Step 2: Implicit differentiation works directly on $$F$$, treating $$y$$ as an unknown function of $$x$$, giving $$dy/dx$$ as a formula in both $$x$$ and $$y$$.\n- Step 3: At a known point $$(a,b)$$, just substitute — no need to know the explicit branch or formula for $$y$$.\n\n*Implicit differentiation is the universal tool when explicit $$y(x)$$ is unavailable.*", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "A graph has horizontal asymptote $$y = c$$. After a transformation $$f(x) \\to f(x) + k$$, where does the horizontal asymptote move, and why doesn't a horizontal stretch shift it?", "answer": "- Step 1: Adding $$k$$ outside shifts every $$y$$-value up by $$k$$, including the asymptote: new asymptote $$y = c+k$$.\n- Step 2: A horizontal stretch multiplies $$x$$-inputs but does not change $$y$$-outputs at infinity, so the asymptote $$y=c$$ stays.\n- Step 3: Asymptote rules follow the same logic as ordinary points — anything done \"outside\" affects $$y$$, anything \"inside\" affects $$x$$.\n\n*Asymptotes transform exactly like points on the curve.*", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "When transforming $$y = f(x+2)$$ from $$y=f(x)$$, why does the graph shift **left** by 2, opposite to the apparent \"+2\"?", "answer": "- Step 1: A point originally at $$x = x_0$$ on $$f$$ now appears at the $$x$$-value satisfying $$x+2 = x_0$$, i.e. $$x = x_0 - 2$$.\n- Step 2: So the feature moves from $$x_0$$ to $$x_0 - 2$$ — leftward by 2.\n- Step 3: Intuition: \"inside the bracket\" the operation acts on the input, and to keep the function value the same we must pre-compensate, hence the opposite sign.\n\n*Inside = inverse effect on $$x$$; outside = direct effect on $$y$$.*", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "A square has side 6 and a smaller square is formed by joining the 1/3-points. What is the area of the smaller square as a fraction of the original (no exact number required — just the ratio)?", "answer": "- Step 1: Ratio is scale-invariant, so the side length 6 doesn't matter — answer depends only on the construction.\n- Step 2: Using side 1 for the 1/3-segment, inner side $$= \\sqrt{1^2+2^2} = \\sqrt{5}$$, outer side $$=3$$.\n- Step 3: Area ratio $$= 5/9$$, regardless of original size.\n\n*Even with side 6, you get $$5/9$$ — the geometry, not the scale, determines the ratio.*", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "$$g(x) = \\dfrac{2x+1}{x+3}$$ with $$x > -3$$. Conceptually describe the horizontal asymptote and the range, without computing every term. (3 steps)", "answer": "- Step 1: Leading-term ratio (as $$x \\to \\infty$$) gives horizontal asymptote $$y = 2$$ (coefficient of $$x$$ in numerator over coefficient in denominator).\n- Step 2: Long division: $$g(x) = 2 - \\dfrac{5}{x+3}$$. For $$x > -3$$, the fraction is positive, so $$g(x) < 2$$.\n- Step 3: Range: $$y < 2$$.\n\n*The horizontal asymptote of $$(ax+b)/(cx+d)$$ is always $$y = a/c$$.*", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "For the integral $$\\int_0^{\\pi/2} \\sin 2\\theta \\cdot \\sqrt{3 + \\cos\\theta}\\, d\\theta$$ with substitution $$u = 3 + \\cos\\theta$$, identify the new limits and explain their order. (3 steps)", "answer": "- Step 1: At $$\\theta = 0$$: $$u = 3 + \\cos 0 = 3 + 1 = 4$$. This is the new lower limit.\n- Step 2: At $$\\theta = \\pi/2$$: $$u = 3 + 0 = 3$$. This is the new upper limit.\n- Step 3: Lower (4) is bigger than 2_42", "judge_pick": false}, {"question": "Why is $$5(x+2) - 7$$ NOT the same as $$5 - \\dfrac{7}{x+2}$$, even though both come up in polynomial division?", "answer": "- Step 1: $$5(x+2) - 7 = 5x + 10 - 7 = 5x + 3$$ — this is just the numerator of the original fraction.\n- Step 2: $$5 - \\dfrac{7}{x+2}$$ is the **whole fraction** $$\\dfrac{5x+3}{x+2}$$ rewritten.\n- Step 3: To go from one to the other, divide by $$x+2$$: $$\\dfrac{5(x+2) - 7}{x+2} = 5 - \\dfrac{7}{x+2}$$.\n\n*The \"$$+$$ remainder/divisor\" form is essential — the remainder must sit over the divisor.*", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": false}, {"question": "For $$g(x) = \\dfrac{5x+3}{x+2}$$ with domain $$x > -2$$, walk through how you'd state the domain of $$g^{-1}$$ without explicitly computing $$g^{-1}$$. (3 steps)", "answer": "- Step 1: Domain of $$g^{-1}$$ = range of $$g$$ (by the input/output swap property of inverses).\n- Step 2: Find range of $$g$$: rewrite as $$5 - \\dfrac{7}{x+2}$$; horizontal asymptote $$y=5$$, and for $$x > -2$$, $$g(x) < 5$$. Range is $$y < 5$$.\n- Step 3: Therefore domain of $$g^{-1}$$ is $$x < 5$$ (switch the letter from $$y$$ to $$x$$ because we're now talking about a domain).\n\n*Notation discipline: range is in \"$$y$$\", domain is in \"$$x$$\" — even when they're the same set numerically.*", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": false}, {"question": "You're told $$P(a,b)$$ lies on curve $$C: 4x^2 + y^2 - 2xy = 24$$, and the gradient at $$P$$ is 2. Outline the full strategy to find $$a$$ and $$b$$ in conceptual steps (no calculations). (3 steps)", "answer": "- Step 1: Implicitly differentiate $$C$$ w.r.t. $$x$$ (using product rule on $$xy$$ with brackets!) to get $$dy/dx$$ in terms of $$x, y$$.\n- Step 2: Substitute $$x=a, y=b, dy/dx=2$$ → one equation linking $$a$$ and $$b$$.\n- Step 3: Use the *second* equation: substitute $$(a,b)$$ into $$C$$'s equation. Solve the resulting 2×2 system (usually one linear + one quadratic) for $$a, b$$.\n\n*Two unknowns demand two equations: gradient condition + curve membership.*", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": false}, {"question": "Why does the general binomial expansion $$(1+X)^n$$ *fail* (diverge) when $$|X| \\geq 1$$, even though the formula still produces terms?", "answer": "- Step 1: Each term has $$X^k$$ — if $$|X| \\geq 1$$, the $$X^k$$ factor doesn't shrink as $$k$$ grows.\n- Step 2: Combined with the coefficients (which for non-positive-integer $$n$$ don't vanish), the terms don't go to zero, so the series can't converge.\n- Step 3: Outside the validity range, the formal series is meaningless as an approximation — it doesn't equal $$(1+X)^n$$ in any limit sense.\n\n*Convergence is essential; the series is only a valid representation inside $$|X|<1$$.*", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": true}, {"question": "Compare an integrating-factor problem and a separable-variables ODE — how do you choose between methods?", "answer": "- Step 1: If the equation can be rearranged so all $$y$$'s (and $$dy$$) are on one side, all $$x$$'s (and $$dx$$) on the other — use **separation**.\n- Step 2: If the equation has the form $$\\dfrac{dy}{dx} + P(x) y = Q(x)$$ (linear in $$y$$ but $$y$$ and $$x$$ are entangled) — use **integrating factor**.\n- Step 3: Some equations admit both; some only one; some neither (need substitutions). Check separability first (simpler), then linearity.\n\n*Separable = product of $$x$$-only and $$y$$-only parts; linear = additive structure in $$y$$.*", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": true}], "count": 48}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 13799, "out_tokens": 19661, "reasoning_chars": 2431, "cost_eur": 0.0766, "elapsed_s": 303, "content_chars": 61671}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in const SK='auto_maths_20260626_p4_with_harry';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
