10 = -7$$. By the division algorithm: $$\\frac{\\text{dividend}}{\\text{divisor}} = \\text{quotient} + \\frac{\\text{remainder}}{\\text{divisor}}$$, so $$\\frac{5x+3}{x+2} = 5 + \\frac{-7}{x+2}$$.\n- Step 2: The expanded form $$5(x+2) - 7$$ is just the numerator rewritten — it's NOT divided by $$x+2$$ yet. If you write $$\\frac{5(x+2)-7}{x+2}$$, you must still split it: $$\\frac{5(x+2)}{x+2} - \\frac{7}{x+2} = 5 - \\frac{7}{x+2}$$, which arrives at the same result but takes an extra step.\n- Step 3: The \"quotient + remainder/divisor\" form is powerful because it separates a *constant part* (5) from a *transformed reciprocal part* ($$\\frac{-7}{x+2}$$), revealing the graph's structure: it's a transformation of $$\\frac{-1}{x}$$, making asymptotes and range immediately visible.\n\nTakeaway: Always express as quotient + remainder/divisor — it unlocks graph-transformation analysis.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "Starting from $$g(x) = 5 + \\frac{-7}{x+2}$$, identify the sequence of transformations that build $$g(x)$$ from the parent function $$h(x) = \\frac{-1}{x}$$, and state the equations of both asymptotes. (3 steps)", "answer": "- Step 1: Compare $$g(x) = 5 + \\frac{-7}{x+2}$$ to $$h(x) = \\frac{-1}{x}$$. The factor of 7 outside means a vertical stretch by factor 7. The $$x+2$$ inside means a horizontal translation left by 2 (replacing $$x$$ with $$x+2$$ shifts the graph left). The $$+5$$ outside means a vertical translation up by 5.\n- Step 2: Track the asymptotes through each transformation. $$h(x) = \\frac{-1}{x}$$ has asymptotes $$x=0$$ and $$y=0$$.\n+ Left by 2: vertical asymptote moves from $$x=0$$ to $$x=-2$$; horizontal asymptote stays $$y=0$$ (horizontal shifts don't affect horizontal asymptotes).\n+ Vertical stretch ×7: horizontal asymptote stays $$y=0$$ (multiplying 0 by 7 is still 0).\n+ Up by 5: horizontal asymptote moves from $$y=0$$ to $$y=5$$; vertical asymptote stays $$x=-2$$.\n- Step 3: Final asymptotes are $$x = -2$$ (vertical) and $$y = 5$$ (horizontal). The graph is the reflected-and-stretched $$\\frac{1}{x}$$ shape, shifted so its two branches sit in the regions $$x < -2, y > 5$$ and $$x > -2, y < 5$$.\n\nTakeaway: Transform the asymptotes step by step — each transformation moves one or both asymptotes predictably.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": true}, {"question": "For $$g(x) = 5 + \\frac{-7}{x+2}$$ with domain $$x > -2$$, only one branch of the graph exists. By inspecting this branch's behaviour, what is the range, and why must you write it using \"y\" not \"x\"? (2 steps)", "answer": "- Step 1: With $$x > -2$$, we only have the right-hand branch, which approaches the horizontal asymptote $$y=5$$ from below as $$x \\to \\infty$$, and plunges toward $$-\\infty$$ as $$x \\to -2^+$$. So the output values are everything strictly below 5: $$y < 5$$.\n- Step 2: The convention is: **domain** uses the letter $$x$$ (input variable), **range** uses the letter $$y$$ (output variable). Writing \"$$x < 5$$\" for the range would be marked wrong because $$x$$ is the input, not the output. The range describes what $$y$$-values the function produces, so it must be written $$y < 5$$.\n\nTakeaway: Domain = what $$x$$ can be; Range = what $$y$$ can be. Use the correct variable or lose the mark.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": true}, {"question": "Why does the range of the original function become the domain of its inverse, and what is the domain of $$g^{-1}$$ given that the range of $$g$$ is $$y < 5$$? (2 steps)", "answer": "- Step 1: The inverse function reverses the mapping: if $$g$$ maps input $$x$$ to output $$y$$, then $$g^{-1}$$ maps input $$y$$ to output $$x$$. So the set of valid inputs to $$g^{-1}$$ is exactly the set of outputs from $$g$$ — i.e., the range of $$g$$ becomes the domain of $$g^{-1}$$.\n- Step 2: Since the range of $$g$$ is $$y < 5$$, the domain of $$g^{-1}$$ is $$x < 5$$ (we switch from $$y$$ to $$x$$ because we're now describing the *input* to the inverse). Students often forget to state this domain — it's typically worth a mark and examiners don't always prompt you to give it.\n\nTakeaway: Always state the domain of the inverse — it's the range of the original, rewritten with $$x$$.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "When composing functions like $$fg(x)$$, which function is the \"outer\" one applied first in the composition notation, and what goes wrong if you reverse the order? (2 steps)", "answer": "- Step 1: In $$fg(x)$$, you read it as \"f of g of x\": g is the *inner* function (applied to $$x$$ first), and f is the *outer* function (applied to the result of g second). The output of g becomes the input of f. So $$fg(x) = f\\big(g(x)\\big)$$.\n- Step 2: If you reverse the order and compute $$g\\big(f(x)\\big)$$ instead, you're applying f first and g second — that's $$gf(x)$$, a completely different function. In the tutorial's example, mixing up f and g resulted in logarithms on both sides of an equation, making it unsolvable. The fix: always identify which letter is outside (applied last) and which is inside (applied first), then substitute in that order.\n\nTakeaway: fg(x) means f outside, g inside — output of inner feeds into outer. Reverse the order and you solve a different problem.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "When differentiating a term like $$2xy$$ with respect to $$x$$ (implicit differentiation), why must you use the product rule, and why is it critical to put *brackets* around the product-rule expansion before distributing any minus signs? (3 steps)", "answer": "- Step 1: $$y$$ depends on $$x$$ (it's not a constant), so $$xy$$ is a product of two functions of $$x$$: $$u = x$$ and $$v = y$$. The product rule gives $$\\frac{d(xy)}{dx} = u\\frac{dv}{dx} + v\\frac{du}{dx} = x\\frac{dy}{dx} + y\\cdot 1 = x\\frac{dy}{dx} + y$$.\n- Step 2: If the original term is $$-2xy$$, you must write $$-2\\big[x\\frac{dy}{dx} + y\\big]$$ with brackets, then distribute: $$-2x\\frac{dy}{dx} - 2y$$. Without brackets, you might write $$-2x\\frac{dy}{dx} + y$$ (only negating the first term), producing a sign error on the $$y$$.\n- Step 3: The bracket acts as a safeguard: it reminds you that the minus sign (or any coefficient) multiplies the *entire* product-rule result, not just the first piece. Every time you apply the product rule inside a larger expression, wrap the expansion in brackets before doing anything else.\n\nTakeaway: Product rule inside a signed term → brackets first, distribute second. Sign errors are the #1 trap here.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "After implicit differentiation, you collect all terms containing $$\\frac{dy}{dx}$$ on one side and all other terms on the other. If you arrive at $$2y\\frac{dy}{dx} - 2x\\frac{dy}{dx} = 24 - 8x + 2y$$, what simplification step should you do *before* factoring out $$\\frac{dy}{dx}$$, and why? (2 steps)", "answer": "- Step 1: Every coefficient on the left is divisible by 2, and every term on the right is also divisible by 2 ($$24/2=12$$, $$8/2=4$$, $$2/2=1$$). Dividing the entire equation by 2 gives $$y\\frac{dy}{dx} - x\\frac{dy}{dx} = 12 - 4x + y$$, with smaller, cleaner numbers.\n- Step 2: Simplifying first makes factoring easier and reduces arithmetic mistakes. Now factor out $$\\frac{dy}{dx}$$: $$\\frac{dy}{dx}(y - x) = 12 - 4x + y$$, so $$\\frac{dy}{dx} = \\frac{12 - 4x + y}{y - x}$$. If you skip the simplification, you'd factor $$\\frac{dy}{dx}(2y - 2x)$$ and get the same result after cancelling, but with more steps and more chances for errors.\n\nTakeaway: Divide through by common factors before factoring — cleaner algebra, fewer mistakes.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": true}, {"question": "A point $$P(a, b)$$ lies on a curve and has gradient 2. From the gradient condition you derive one equation like $$4a + b = 12$$, but there are two unknowns. Where does the *second* equation come from, and why is this a recurring trap? (2 steps)", "answer": "- Step 1: The phrase \"P lies on the curve\" means the coordinates $$P(a,b)$$ satisfy the curve's equation. Substituting $$x=a, y=b$$ into the curve equation (e.g., $$4x^2 + 2xy - 2xy + \\ldots$$) produces a second equation in $$a$$ and $$b$$. This is your second equation — it's always there whenever a point is described as being \"on the curve.\"\n- Step 2: The trap is that students treat \"lies on the curve\" as background information rather than an algebraic condition. They see two unknowns and one equation from the gradient, then freeze. The key insight: any geometric/curve-membership statement is an *equation*. \"Point on curve\" = \"substitute coordinates into curve equation\" = free second equation.\n\nTakeaway: \"P lies on C\" is not decoration — it's your second equation. Always substitute coordinates into the curve equation.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": true}, {"question": "To find where two lines $$L_1$$ and $$L_2$$ intersect, you set their position vectors equal: $$\\mathbf{r}_1 = \\mathbf{r}_2$$. Why does this work, and what does it give you? (2 steps)", "answer": "- Step 1: At the intersection point, both line equations describe the *same position* — the same point in space. The position vector from the origin to that point is unique, so both expressions must yield the same vector. Setting $$\\mathbf{r}_1 = \\mathbf{r}_2$$ captures this equality.\n- Step 2: Since each $$\\mathbf{r}_i$$ is a column vector with 3 components, equating them gives 3 scalar equations (one per component), each involving the parameters $$\\lambda$$ and $$\\mu$$. For example: $$2+\\lambda = -1+2\\mu$$, $$-1+4\\lambda = \\beta - \\mu$$, $$3+2\\lambda = 6+7\\mu$$. These are your simultaneous equations to solve.\n\nTakeaway: Intersection = same position = equal position vectors = 3 component equations.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "When using a calculator's simultaneous-equation solver for a vectors intersection problem, how must you rearrange the component equations, and what counts as a \"variable\" vs a \"constant\" for the solver? (2 steps)", "answer": "- Step 1: The solver expects equations in the form $$a\\lambda + b\\mu = c$$ (or similar), with all variable terms on the left and all constants on the right. For example, $$2+\\lambda = -1+2\\mu$$ rearranges to $$\\lambda - 2\\mu = -3$$, and $$3+2\\lambda = 6+7\\mu$$ rearranges to $$2\\lambda - 7\\mu = 3$$.\n- Step 2: Parameters like $$\\lambda$$ and $$\\mu$$ are the *variables* the solver finds. A letter like $$\\beta$$ that appears in the line's definition but isn't a free parameter of either line is a *constant* — it stays on the right-hand side. You first solve for $$\\lambda$$ and $$\\mu$$ using two of the three equations, then substitute back to find $$\\beta$$ from the remaining equation.\n\nTakeaway: Rearrange to standard form; only the line parameters are variables — everything else is a constant for the solver.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "After finding $$\\lambda$$ and $$\\mu$$ for an intersection point, you substitute back into one of the line equations to get the position vector. Why must the final answer be written as *coordinates* like $$(-7, -37, -11)$$ rather than as a column vector, and when would this matter? (2 steps)", "answer": "- Step 1: The question typically asks for \"the coordinates of P,\" and in exam marking, a column vector like $$\\begin{pmatrix} -7 \\\\ -37 \\\\ -11 \\end{pmatrix}$$ describes a *vector* (a directed magnitude), whereas coordinates $$(-7, -37, -11)$$ describe a *point* (a location). They're mathematically related but notationally distinct in the exam's expectations.\n- Step 2: This matters whenever the question specifically says \"find the coordinates\" — writing a column vector can lose the final answer mark. It's a notation convention, not a deep mathematical difference, but examiners enforce it. Always check the wording: \"coordinates\" → row format; \"position vector\" → column format.\n\nTakeaway: \"Coordinates\" = row notation. \"Position vector\" = column notation. Match the question's wording.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "When performing integration by substitution with $$u = 3 + \\cos\\theta$$, you need to replace the limits. If the original limits are $$\\theta = 0$$ and $$\\theta = \\frac{\\pi}{2}$$, what are the new $$u$$-limits, and which one goes on the *bottom* of the integral? (3 steps)", "answer": "- Step 1: Compute each limit using the substitution. When $$\\theta = 0$$: $$u = 3 + \\cos(0) = 3 + 1 = 4$$. When $$\\theta = \\frac{\\pi}{2}$$: $$u = 3 + \\cos\\frac{\\pi}{2} = 3 + 0 = 3$$.\n- Step 2: The bottom limit corresponds to the original bottom limit. Since $$\\theta = 0$$ was the lower limit and maps to $$u = 4$$, the new lower limit is 4. Since $$\\theta = \\frac{\\pi}{2}$$ was the upper limit and maps to $$u = 3$$, the new upper limit is 3.\n- Step 3: The integral now reads $$\\int_4^3$$, with the bigger number on the bottom. This is correct — you must *preserve the order* of the original limits under substitution, not rearrange to make the bigger number go on top. Swapping the order would flip the sign of the integral and give a wrong answer.\n\nTakeaway: Map each limit individually and preserve its position (bottom/top). The new limits can be \"backwards\" — that's fine and correct.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "During integration by substitution, after cancelling $$\\sin\\theta$$, you're left with a factor of $$\\cos\\theta$$ still in the integrand. Why can't you treat $$\\cos\\theta$$ as a constant and pull it out of the integral, and what must you do instead? (2 steps)", "answer": "- Step 1: $$\\cos\\theta$$ depends on $$\\theta$$ — it varies as $$\\theta$$ changes across the integration interval. A constant is something that doesn't change (like the number 2 or $$\\pi$$). Since $$\\cos\\theta$$ is a function of the integration variable, it cannot be factored out.\n- Step 2: Instead, use the substitution to express $$\\cos\\theta$$ in terms of $$u$$. From $$u = 3 + \\cos\\theta$$, rearrange: $$\\cos\\theta = u - 3$$. Now replace $$\\cos\\theta$$ with $$u - 3$$, and the entire integrand is in terms of $$u$$ — ready to integrate with respect to $$u$$.\n\nTakeaway: Anything that depends on the original variable (even trig functions) is a variable, not a constant. Convert it using the substitution.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "After substitution, the integrand contains terms like $$u^{1/2}$$ and $$u^{-1/2}$$. A common mistake is to integrate these as natural logarithms. Why is this wrong, and what is the correct rule? (2 steps)", "answer": "- Step 1: The logarithm rule $$\\int \\frac{1}{u}\\,du = \\ln|u|$$ applies *only* when the integrand is exactly $$u^{-1}$$ (power of −1). Here we have $$u^{1/2}$$ (power $$\\frac{1}{2}$$) and $$u^{-1/2}$$ (power $$-\\frac{1}{2}$$) — neither is $$u^{-1}$$, so the ln rule doesn't apply.\n- Step 2: The correct rule is the *power rule*: increase the exponent by 1, then divide by the new exponent.\n+ $$\\int u^{1/2}\\,du = \\frac{u^{3/2}}{3/2} = \\frac{2}{3}u^{3/2}$$\n+ $$\\int u^{-1/2}\\,du = \\frac{u^{1/2}}{1/2} = 2u^{1/2}$$\n\nTakeaway: Power rule for any power except −1. Only $$u^{-1}$$ → ln. Check the exponent before choosing the rule.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "When the integrand after substitution is $$\\frac{u-3}{u^{1/2}}$$, why is it better to split this into two separate fractions before integrating, rather than trying to integrate it as one combined expression? (2 steps)", "answer": "- Step 1: Splitting: $$\\frac{u-3}{u^{1/2}} = \\frac{u}{u^{1/2}} - \\frac{3}{u^{1/2}} = u^{1-1/2} - 3u^{-1/2} = u^{1/2} - 3u^{-1/2}$$. Each piece is a simple power of $$u$$, ready for the power rule.\n- Step 2: If you don't split, you might attempt integration by parts or some complicated method on the combined fraction, or mistakenly treat it as a ln case. Splitting reduces it to two straightforward power-rule integrals with no ambiguity. Always simplify the algebra *before* integrating — make the integrand as simple as possible.\n\nTakeaway: Split fractions, simplify powers, then integrate piece by piece. Don't integrate complicated compound expressions directly.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "The formula book gives two binomial expansion formulas. One requires $$n$$ to be a positive integer (1, 2, 3, …). The other works for any real $$n$$, including negatives and fractions. For P3/P4 problems with a power like $$-2$$, which formula do you use, and why can't you use the other? (2 steps)", "answer": "- Step 1: Use the \"bottom version\" — the one that says $$n$$ can be any real number. This is the full binomial series: $$\\big(1+x\\big)^n = 1 + nx + \\frac{n(n-1)}{2!}x^2 + \\frac{n(n-1)(n-2)}{3!}x^3 + \\ldots$$, valid for $$|x| < 1$$ when $$n$$ is not a positive integer.\n- Step 2: The \"top version\" (the simple binomial theorem for positive integer $$n$$) gives a *finite* expansion that terminates after $$n+1$$ terms. For $$n=-2$$, it doesn't apply — negative integers aren't positive integers. Using it would give nonsense. The bottom version produces an *infinite* series, which is correct for negative/fractional powers.\n\nTakeaway: Negative or fractional power → bottom formula (infinite series, valid for $$|x|<1$$). Positive integer power → top formula (finite expansion).", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": true}, {"question": "To expand $$\\big(2+5x\\big)^{-2}$$ using the binomial series, you must first rewrite it as $$2^{-2}\\big(1+\\frac{5x}{2}\\big)^{-2}$$. Why must the expression inside the brackets start with \"1\", and what goes wrong if you try to apply the series directly to $$\\big(2+5x\\big)^{-2}$$? (2 steps)", "answer": "- Step 1: The binomial series formula is $$\\big(1+x\\big)^n = 1 + nx + \\ldots$$ — it explicitly starts with $$1$$ inside the bracket. This is because the series is derived as a Taylor/Maclaurin expansion around $$x=0$$, and the expansion point requires the base to be 1 (so that at $$x=0$$ the expression equals $$1^n = 1$$).\n- Step 2: If you naively plug $$2+5x$$ into the formula as if the leading term were the \"1\", you'd get $$1 + (-2)(2+5x) + \\ldots$$, which is wrong — the formula's structure assumes the constant inside the bracket is exactly 1. Factoring out the 2 makes the bracket $$\\big(1 + \\frac{5x}{2}\\big)$$, which matches the formula's required form. The factored-out 2 raised to the power gives $$2^{-2} = \\frac{1}{4}$$ as a multiplier outside.\n\nTakeaway: Always factor out the leading coefficient so the bracket starts with 1. The formula demands it.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "The binomial series $$\\big(1+\\frac{5x}{2}\\big)^{-2}$$ is valid only when $$\\left|\\frac{5x}{2}\\right| < 1$$. What range of $$x$$ does this give, and why does the convergence condition come from the bracket's content, not the original expression? (2 steps)", "answer": "- Step 1: $$\\left|\\frac{5x}{2}\\right| < 1$$ implies $$|x| < \\frac{2}{5}$$, i.e., $$-\\frac{2}{5} < x < \\frac{2}{5}$$. This is the range of $$x$$-values for which the infinite series converges to the true value of $$\\big(2+5x\\big)^{-2}$$.\n- Step 2: The convergence condition $$|x| < 1$$ in the standard formula applies to the *variable part inside the bracket after factoring*. It's not about the original $$5x$$ alone — it's about $$\\frac{5x}{2}$$, the quantity that plays the role of \"$$x$$\" in the formula $$\\big(1+x\\big)^n$$. Outside this range, the series diverges and gives meaningless results.\n\nTakeaway: The convergence range comes from the \"x\" in $$\\big(1+x\\big)^n$$ — which is whatever variable fraction sits inside the bracket after factoring.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "The volume of revolution formula for rotating a curve $$y = f(x)$$ about the x-axis is $$V = \\pi\\int y^2\\,dx$$. Why is there a $$\\pi$$ and a *squaring* of $$y$$, and what changes if you rotate about the y-axis instead? (3 steps)", "answer": "- Step 1: At each cross-section perpendicular to the x-axis, the curve traces a circle of radius $$y$$ (since $$y$$ is the distance from the x-axis). The area of that disc is $$\\pi r^2 = \\pi y^2$$. Integrating these disc areas along the x-axis accumulates the total volume: $$V = \\pi\\int y^2\\,dx$$.\n- Step 2: The $$\\pi$$ comes from the circular cross-section area formula. The squaring comes from the fact that we're accumulating *areas* (which involve $$r^2$$), not *radii*. If you just integrated $$y$$, you'd get a sum of radii, not volumes.\n- Step 3: For rotation about the y-axis, the roles swap: at each y-level, the cross-section is a disc of radius $$x$$, so $$V = \\pi\\int x^2\\,dy$$ — you square the distance from the y-axis and integrate with respect to $$y$$.\n\nTakeaway: Disc method: square the distance from the axis of rotation, multiply by $$\\pi$$, integrate along the axis.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "If a curve is rotated about the x-axis by an angle $$\\theta$$ (not a full $$2\\pi$$ revolution), the volume formula becomes $$V = \\frac{\\theta}{2}\\int f(x)^2\\,dx$$ instead of $$\\pi\\int f(x)^2\\,dx$$. Why does the factor become $$\\frac{\\theta}{2}$$ rather than $$\\frac{\\theta}{2\\pi}$$? (2 steps)", "answer": "- Step 1: A full revolution is $$\\theta = 2\\pi$$, giving volume $$\\pi\\int f(x)^2\\,dx$$ (the standard formula). So the proportionality factor is $$\\frac{\\theta}{2}$$: when $$\\theta = 2\\pi$$, $$\\frac{2\\pi}{2} = \\pi$$, which matches.\n- Step 2: The factor $$\\frac{\\theta}{2}$$ arises because the full-disc area is $$\\pi r^2$$, and a sector of angle $$\\theta$$ has area $$\\frac{\\theta}{2}r^2$$ (since a full circle's area $$\\pi r^2 = \\frac{2\\pi}{2}r^2$$, and the fraction of the circle is $$\\frac{\\theta}{2\\pi}$$, giving $$\\frac{\\theta}{2\\pi} \\cdot \\pi r^2 = \\frac{\\theta}{2}r^2$$). Integrating these partial-disc areas gives $$\\frac{\\theta}{2}\\int f(x)^2\\,dx$$.\n\nTakeaway: Partial rotation → replace $$\\pi$$ with $$\\frac{\\theta}{2}$$, because a sector of angle $$\\theta$$ has area $$\\frac{\\theta}{2}r^2$$.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "A separable differential equation has the form $$\\frac{dy}{dx} = f(x)\\cdot g(y)$$. Explain the method of solution and why each step is valid. (3 steps)", "answer": "- Step 1: \"Separate\" means rearrange so all $$y$$-terms are on one side and all $$x$$-terms on the other: $$\\frac{1}{g(y)}\\,dy = f(x)\\,dx$$. This is valid because dividing both sides by $$g(y)$$ and multiplying by $$dx$$ rearranges the equation into a form where each side depends on only one variable.\n- Step 2: Integrate both sides: $$\\int\\frac{1}{g(y)}\\,dy = \\int f(x)\\,dx$$. This is valid because if two expressions are equal, their integrals are equal (up to a constant). Each integral can now be evaluated since each depends on a single variable.\n- Step 3: After integrating, you typically get an implicit relationship between $$y$$ and $$x$$ (plus a constant of integration). If possible, rearrange to express $$y$$ explicitly. If boundary conditions are given, substitute them to find the constant.\n\nTakeaway: Separate → integrate both sides → find constant from boundary conditions.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "A linear first-order differential equation has the form $$\\frac{dy}{dx} + P(x)y = Q(x)$$, where $$P$$ and $$Q$$ are functions of $$x$$ only. What is the integrating factor, and why does multiplying through by it make the left side a perfect derivative? (3 steps)", "answer": "- Step 1: The integrating factor is $$IF = e^{\\int P(x)\\,dx}$$ — you integrate $$P(x)$$ (ignoring the constant of integration) and exponentiate. This is a carefully chosen multiplier.\n- Step 2: Multiply the entire ODE by the IF: $$e^{\\int P\\,dx}\\frac{dy}{dx} + P(x)e^{\\int P\\,dx}y = Q(x)e^{\\int P\\,dx}$$. The left side is now exactly $$\\frac{d}{dx}\\big[y\\cdot e^{\\int P\\,dx}\\big]$$, because by the product rule: $$\\frac{d}{dx}\\big[y\\cdot IF\\big] = \\frac{dy}{dx}\\cdot IF + y\\cdot\\frac{d}{dx}\\big[IF\\big]$$, and $$\\frac{d}{dx}\\big[e^{\\int P\\,dx}\\big] = P(x)e^{\\int P\\,dx}$$ (by differentiating the exponential).\n- Step 3: Now the ODE reads $$\\frac{d}{dx}\\big[y\\cdot IF\\big] = Q(x)\\cdot IF$$, which can be integrated directly: $$y\\cdot IF = \\int Q(x)\\cdot IF\\,dx + C$$, then solve for $$y$$ by dividing by the IF.\n\nTakeaway: The IF is designed so that the left side becomes a single derivative — turning the ODE into a direct integration problem.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": true}, {"question": "In a vectors problem with three unknowns but only two equations from setting $$\\mathbf{r}_1 = \\mathbf{r}_2$$, how can a geometric condition (like \"the lines are perpendicular\" or \"the lines are skew\") provide the third equation? (2 steps)", "answer": "- Step 1: Geometric conditions translate into algebraic equations involving the direction vectors. For perpendicular lines, the dot product of their direction vectors equals zero: $$\\mathbf{d}_1 \\cdot \\mathbf{d}_2 = 0$$, giving one scalar equation. For parallel lines, the direction vectors are proportional: $$\\mathbf{d}_1 = k\\mathbf{d}_2$$, giving three component equations.\n- Step 2: \"Skew\" means the lines don't intersect and aren't parallel — you'd verify this by showing the three component equations from $$\\mathbf{r}_1 = \\mathbf{r}_2$$ are inconsistent (no solution for $$\\lambda$$ and $$\\mu$$). If the problem gives a condition like \"perpendicular\" or \"the shortest distance between them is …\", each condition is an equation relating the unknowns. Translate the geometry into algebra.\n\nTakeaway: Geometric conditions are algebraic equations in disguise. Perpendicular → dot product = 0. Parallel → proportional direction vectors.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "A simple exercise: A square has side length 5. Points are placed 1/5 of the way along each side, forming an inner square. What is the area ratio of the inner square to the outer square? (2 steps)", "answer": "- Step 1: The two perpendicular segments at each corner are 1 and $$5-1=4$$. By Pythagoras, the inner square's side = $$\\sqrt{1^2 + 4^2} = \\sqrt{17}$$.\n- Step 2: Inner area = $$17$$, outer area = $$25$$. Ratio = $$\\frac{17}{25}$$.\n\nTakeaway: Same method regardless of the fraction — just adjust the leg lengths and apply Pythagoras.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "A simple exercise: Write $$\\frac{3x+1}{x+4}$$ in the \"quotient + remainder/divisor\" form, and state the vertical and horizontal asymptotes. (3 steps)", "answer": "- Step 1: Polynomial long division: $$3(x+4) = 3x+12$$, remainder = $$1-12 = -11$$. So $$\\frac{3x+1}{x+4} = 3 + \\frac{-11}{x+4}$$.\n- Step 2: This is a transformation of $$\\frac{-1}{x}$$: vertical stretch ×11, translate left 4, up 3. Vertical asymptote: $$x = -4$$ (from the $$x+4$$ inside). Horizontal asymptote: $$y = 3$$ (from the +3 outside).\n- Step 3: If the domain were $$x > -4$$, the range would be $$y < 3$$ (the right branch of the reflected reciprocal, below the horizontal asymptote).\n\nTakeaway: Quotient + remainder/divisor form immediately reveals asymptotes and graph shape.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "A simple exercise: The curve $$x^2 + xy = 6$$ passes through point $$P(2, b)$$ and at $$P$$ the gradient is $$\\frac{dy}{dx} = -1$$. Find $$b$$ by using *both* the gradient condition and the curve-membership condition. (3 steps)", "answer": "- Step 1: Implicit differentiation: $$2x + x\\frac{dy}{dx} + y = 0$$ (product rule on $$xy$$). At $$P(2, b)$$ with gradient −1: $$2(2) + 2(-1) + b = 0$$, so $$4 - 2 + b = 0$$, giving $$b = -2$$.\n- Step 2: Verify with curve-membership: substitute $$x=2, y=-2$$ into $$x^2 + xy = 6$$: $$4 + 2(-2) = 4 - 4 = 0 \\neq 6$$. This doesn't satisfy the curve! So we must also use the curve equation as a constraint.\n- Step 3: Actually, let's redo: the curve is $$x^2 + xy = 6$$, so at $$P(2, b)$$: $$4 + 2b = 6$$, giving $$2b = 2$$, so $$b = 1$$. Check gradient at $$P(2,1)$$: $$2(2) + 2\\frac{dy}{dx} + 1 = 0$$ → $$\\frac{dy}{dx} = \\frac{-5}{2}$$, not −1. The point and gradient must be *consistent* — both conditions must hold simultaneously. This illustrates why you always need both equations.\n\nTakeaway: Two unknowns require two independent conditions. Both must be satisfied — check consistency.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "A simple exercise: Lines $$L_1: \\mathbf{r} = (1,0,2) + \\lambda(1,1,0)$$ and $$L_2: \\mathbf{r} = (0,1,1) + \\mu(2,0,1)$$ intersect. Set up two of the three component equations by equating position vectors. (2 steps)", "answer": "- Step 1: At intersection, $$\\mathbf{r}_1 = \\mathbf{r}_2$$, so component-wise: $$1+\\lambda = 2\\mu$$ (first component) and $$\\lambda = 1$$ (second component, since $$0+\\lambda = 1+0\\mu$$).\n- Step 2: From the second equation, $$\\lambda = 1$$ immediately. Substitute into the first: $$1+1 = 2\\mu$$, so $$\\mu = 1$$. The intersection point is at $$\\lambda=1$$: $$\\mathbf{r} = (1+1, 0+1, 2+0) = (2, 1, 2)$$, written as coordinates.\n\nTakeaway: Sometimes one component equation gives a parameter directly — always check all three components for the easiest solve.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "A simple exercise: Using substitution $$u = 1 + x^2$$, transform the integral $$\\int_0^1 x\\sqrt{1+x^2}\\,dx$$ into a $$u$$-integral with correct limits. (3 steps)", "answer": "- Step 1: $$\\frac{du}{dx} = 2x$$, so $$x\\,dx = \\frac{du}{2}$$ (the $$x$$ in the integrand conveniently pairs with $$dx$$). Also $$\\sqrt{1+x^2} = u^{1/2}$$.\n- Step 2: Transform limits: $$x=0 \\to u=1+0=1$$; $$x=1 \\to u=1+1=2$$. So the integral becomes $$\\int_1^2 \\frac{1}{2}u^{1/2}\\,du$$.\n- Step 3: Integrate: $$\\frac{1}{2}\\cdot\\frac{u^{3/2}}{3/2} = \\frac{1}{2}\\cdot\\frac{2}{3}u^{3/2} = \\frac{1}{3}u^{3/2}$$, evaluated from 1 to 2: $$\\frac{1}{3}\\big(2^{3/2} - 1\\big)$$.\n\nTakeaway: When the integrand contains both the function and its derivative's partner (here: $$x$$ and $$2x$$), substitution is smooth.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "A simple exercise: Expand $$\\big(1+2x\\big)^{-1}$$ up to the $$x^2$$ term using the binomial series, and state the convergence condition on $$x$$. (2 steps)", "answer": "- Step 1: Using the formula with $$n=-1$$: $$\\big(1+2x\\big)^{-1} = 1 + (-1)(2x) + \\frac{(-1)(-2)}{2!}(2x)^2 + \\ldots = 1 - 2x + \\frac{2}{2}\\cdot 4x^2 + \\ldots = 1 - 2x + 4x^2 + \\ldots$$\n- Step 2: Convergence requires $$|2x| < 1$$, i.e., $$|x| < \\frac{1}{2}$$, so $$-\\frac{1}{2} < x < \\frac{1}{2}$$.\n\nTakeaway: The coefficient inside the bracket ($$2x$$ here) determines both the expansion terms and the convergence range.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": false}, {"question": "A simple exercise: Find the volume generated when $$y = \\sqrt{x}$$ from $$x=0$$ to $$x=4$$ is rotated fully about the x-axis. (2 steps)", "answer": "- Step 1: $$V = \\pi\\int_0^4 y^2\\,dx = \\pi\\int_0^4 x\\,dx$$ (since $$y^2 = x$$).\n- Step 2: $$\\pi\\cdot\\frac{x^2}{2}\\Big|_0^4 = \\pi\\cdot\\frac{16}{2} = 8\\pi$$.\n\nTakeaway: Squaring $$y$$ often simplifies the integrand dramatically — here $$\\sqrt{x}$$ squared becomes just $$x$$.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "A misconception probe: When you see $$\\frac{5x+3}{x+2}$$, some students rewrite it as $$5(x+2) - 7$$ and stop there, thinking they've completed the long division. Why is this not the final required form, and what's missing? (2 steps)", "answer": "- Step 1: $$5(x+2) - 7 = 5x+10-7 = 5x+3$$, which is just the numerator rewritten — it's true but trivial. You haven't divided by $$x+2$$ yet. The original expression is $$\\frac{5x+3}{x+2}$$, so the denominator must still be present.\n- Step 2: The correct next step is $$\\frac{5(x+2)-7}{x+2} = \\frac{5(x+2)}{x+2} - \\frac{7}{x+2} = 5 - \\frac{7}{x+2}$$, or equivalently $$5 + \\frac{-7}{x+2}$$. This is the \"quotient + remainder/divisor\" form that reveals the graph structure. Stopping at $$5(x+2)-7$$ misses the entire point of the division.\n\nTakeaway: Long division isn't done until you've written quotient + remainder/divisor. The denominator must be present.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": false}, {"question": "A misconception probe: When limits transform under substitution and you get $$\\int_4^3$$ (bigger number on bottom), some students \"fix\" this by swapping to $$\\int_3^4$$ and adding a minus sign. Is this correct, and what's the risk? (2 steps)", "answer": "- Step 1: Mathematically, $$\\int_4^3 f(u)\\,du = -\\int_3^4 f(u)\\,du$$, so swapping and negating *is* valid. You'll get the same final numerical answer.\n- Step 2: The risk is forgetting to include the minus sign when you swap, or getting confused about signs later in the calculation. It's safer to *preserve the original order* and compute $$\\int_4^3$$ directly — the negative result from integrating \"backwards\" is built in automatically. Swapping introduces an extra step where errors creep in.\n\nTakeaway: Preserve the mapped order — don't swap limits. If you must swap, remember the minus sign.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": true}, {"question": "A misconception probe: In implicit differentiation of $$-2xy$$, a student writes $$-2x\\frac{dy}{dx} + y$$ (no brackets). What sign error does this produce compared to the correct $$-2\\big[x\\frac{dy}{dx} + y\\big]$$? (2 steps)", "answer": "- Step 1: Without brackets, the student applies the minus sign only to the first term of the product rule: $$-2x\\frac{dy}{dx} + y$$. The $$y$$ term escapes the minus sign.\n- Step 2: The correct expansion is $$-2x\\frac{dy}{dx} - 2y$$ (both terms negated). The bracketless version gives $$-2x\\frac{dy}{dx} + y$$, which has $$+y$$ instead of $$-2y$$. This flips the sign and changes the coefficient on the $$y$$-term, leading to a wrong expression for $$\\frac{dy}{dx}$$.\n\nTakeaway: The coefficient outside the product rule multiplies *every* term inside. Brackets prevent partial application.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "An edge case: What happens to the nested-squares area ratio if the points are placed at 1/2 of the way along each side (instead of 1/3)? What does the inner square look like? (2 steps)", "answer": "- Step 1: With side = 2 (convenient), the two legs are both 1 (since $$2/2 = 1$$ and $$2-1=1$$). Inner side = $$\\sqrt{1^2+1^2} = \\sqrt{2}$$, inner area = 2, outer area = 4, ratio = $$\\frac{1}{2}$$.\n- Step 2: At 1/2, the inner square's vertices are the midpoints of the outer square, and the inner square is rotated 45° with area exactly half. This is a special case where the ratio simplifies beautifully — and the 4th square fraction would be $$\\left(\\frac{1}{2}\\right)^3 = \\frac{1}{8}$$.\n\nTakeaway: The 1/2 case is the simplest — area ratio = 1/2 every iteration. Other fractions produce different ratios via Pythagoras.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": false}, {"question": "An edge case: For the function $$g(x) = 5 + \\frac{-7}{x+2}$$, what would the range be if the domain were $$x < -2$$ instead of $$x > -2$$? Why? (2 steps)", "answer": "- Step 1: With $$x < -2$$, we get the *left* branch of the graph, which lies above the horizontal asymptote $$y=5$$ (since the reflected reciprocal $$\\frac{-7}{x+2}$$ is positive when $$x+2$$ is negative). As $$x \\to -2^-$$, $$y \\to +\\infty$$; as $$x \\to -\\infty$$, $$y \\to 5^+$$.\n- Step 2: The range is $$y > 5$$ (strictly above the horizontal asymptote). This contrasts with $$x > -2$$ giving $$y < 5$$. The domain restriction selects one branch, and each branch has its own range — one above, one below the asymptote.\n\nTakeaway: Domain restriction picks a branch. Left branch → range above asymptote; right branch → range below.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": false}, {"question": "A limiting case: As $$\\theta \\to \\frac{\\pi}{2}$$ in the substitution $$u = 3+\\cos\\theta$$, $$u \\to 3$$. What does the integrand $$\\frac{u-3}{u^{1/2}}$$ approach, and why is this not a problem for integration? (2 steps)", "answer": "- Step 1: As $$u \\to 3$$, $$u-3 \\to 0$$ and $$u^{1/2} \\to \\sqrt{3}$$, so the integrand approaches $$\\frac{0}{\\sqrt{3}} = 0$$. The function smoothly approaches zero — no blow-up or singularity.\n- Step 2: This is fine for integration because the integrand is well-behaved at the limit. A problem would arise only if the integrand approached $$\\infty$$ (like $$\\frac{1}{u-3}$$ near $$u=3$$), which would be an improper integral requiring special treatment. Here, the zero limit just means the contribution near the upper bound is negligible.\n\nTakeaway: Integrand approaching 0 at a limit is harmless. Singularity (blow-up) would require improper integral techniques.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": false}, {"question": "A limiting case: In the binomial expansion $$\\big(1+\\frac{5x}{2}\\big)^{-2}$$, as $$x \\to \\frac{2}{5}$$ (the boundary of convergence), what happens to the series and why does it fail? (2 steps)", "answer": "- Step 1: As $$x \\to \\frac{2}{5}$$, the bracket $$1 + \\frac{5x}{2} \\to 1 + 1 = 2$$, and we're raising to power $$-2$$, so $$\\big(2\\big)^{-2} = \\frac{1}{4}$$ — the actual function value is finite.\n- Step 2: However, the *series* diverges at this boundary. Each term involves increasing powers of $$\\frac{5x}{2} \\to 1$$, and for a negative power the coefficients grow (e.g., $$\\frac{n(n-1)}{2!}$$ with $$n=-2$$ gives alternating but non-decreasing magnitudes). The terms don't tend to zero, so the infinite sum doesn't converge. The series is valid strictly inside $$|x| < \\frac{2}{5}$$, not at the boundary.\n\nTakeaway: Convergence is strict — the series can diverge at the boundary even if the actual function is finite there.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": true}, {"question": "Why-not probe: Why can't you find the range of $$g(x) = \\frac{5x+3}{x+2}$$ just by looking at the original fraction form, without doing polynomial long division? (2 steps)", "answer": "- Step 1: In the raw form $$\\frac{5x+3}{x+2}$$, both numerator and denominator grow with $$x$$, making it hard to see what values $$y$$ can take. As $$x \\to \\infty$$, both grow, and the ratio approaches 5, but what about intermediate values? Is there a gap? Does it reach 5? The raw form doesn't reveal this clearly.\n- Step 2: The long-division form $$5 + \\frac{-7}{x+2}$$ separates the constant part (5) from the variable part ($$\\frac{-7}{x+2}$$). The variable part is a known function family with known behaviour — you can immediately see that it can be any non-zero value (depending on domain), so $$y$$ approaches but never equals 5. The transformation view makes range-finding trivial.\n\nTakeaway: Long division converts an opaque rational function into a transparent transformation of a known parent function.", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": false}, {"question": "Why-not probe: Why can't you integrate $$\\frac{u-3}{u^{1/2}}$$ as a single lump using integration by parts, instead of splitting it into $$u^{1/2} - 3u^{-1/2}$$? (2 steps)", "answer": "- Step 1: Integration by parts ($$\\int u\\,dv = uv - \\int v\\,du$$) is designed for products of *different types* of functions (e.g., polynomial × exponential). Here, both parts are powers of the same variable $$u$$ — it's a sum of powers, not a product of distinct function types.\n- Step 2: Applying integration by parts would create a more complicated integral rather than simplifying, because differentiating or integrating a power of $$u$$ just shifts the exponent — you'd cycle through powers without convergence. Splitting and using the power rule on each term is the direct, correct approach for sums of powers.\n\nTakeaway: Sums of powers → split and power-rule each term. Integration by parts is for products of different function families.", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": true}, {"question": "Synthesis: A function $$h(x) = 2 + \\frac{6}{x-1}$$ with domain $$x > 1$$ is given. Find (a) the asymptotes, (b) the range, (c) the domain of $$h^{-1}$$, and (d) explain how each piece connects. (4 steps)", "answer": "- Step 1: Asymptotes: This is a transformation of $$\\frac{1}{x}$$ — vertical stretch ×6, right 1, up 2. Vertical asymptote: $$x=1$$ (from $$x-1$$). Horizontal asymptote: $$y=2$$ (from the +2 outside).\n- Step 2: Range: With $$x > 1$$, we're on the right branch. $$\\frac{6}{x-1}$$ is positive (since $$x-1 > 0$$), so $$h(x) = 2 + \\text{positive} > 2$$. As $$x \\to 1^+$$, $$h \\to +\\infty$$; as $$x \\to \\infty$$, $$h \\to 2^+$$. Range: $$y > 2$$.\n- Step 3: Domain of $$h^{-1}$$: Range of $$h$$ becomes domain of $$h^{-1}$$, so domain of $$h^{-1}$$ is $$x > 2$$ (using $$x$$ for the input of the inverse).\n- Step 4: Connection: The asymptotes bound the graph's behaviour → the domain restriction selects one branch → the branch determines the range → the range becomes the inverse's domain. Each piece flows logically from the previous one.\n\nTakeaway: Asymptotes → branch selection → range → inverse's domain. It's a chain of deductions.", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": false}, {"question": "Synthesis: A curve is defined by $$3x^2 + xy = 10$$, and point $$Q(a, 2)$$ lies on it with gradient 1. Set up *both* equations needed to find $$a$$, and explain why neither alone is sufficient. (3 steps)", "answer": "- Step 1: Gradient condition: Differentiate implicitly — $$6x + x\\frac{dy}{dx} + y = 0$$ (product rule on $$xy$$). At $$Q(a, 2)$$ with $$\\frac{dy}{dx} = 1$$: $$6a + a(1) + 2 = 0$$, so $$7a + 2 = 0$$, giving $$a = -\\frac{2}{7}$$.\n- Step 2: Curve-membership condition: $$Q(a, 2)$$ lies on the curve, so $$3a^2 + a(2) = 10$$, i.e., $$3a^2 + 2a - 10 = 0$$. This is a separate equation in $$a$$.\n- Step 3: Here, the gradient equation alone gives a unique $$a$$, but we must *verify* it satisfies the curve equation. Substituting $$a = -\\frac{2}{7}$$: $$3\\left(\\frac{4}{49}\\right) + 2\\left(-\\frac{2}{7}\\right) = \\frac{12}{49} - \\frac{4}{7} = \\frac{12-28}{49} = -\\frac{16}{49} \\neq 10$$. The two conditions are *inconsistent* — no such point exists with both conditions simultaneously. This reveals that both equations must be satisfied together, not just one.\n\nTakeaway: Two conditions must be consistent. If they conflict, the described point doesn't exist on the curve.", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": false}, {"question": "Synthesis: Given $$\\frac{dy}{dx} = \\frac{12 - 4x + y}{y - x}$$ and point $$P(a,b)$$ on the curve $$4x^2 + 2xy - 2xy + 24x = \\text{const}$$ with gradient 2, explain the full logical chain from \"two unknowns, seemingly one equation\" to \"solvable system.\" (3 steps)", "answer": "- Step 1: Substituting $$\\frac{dy}{dx}=2$$, $$x=a$$, $$y=b$$ gives: $$2 = \\frac{12-4a+b}{b-a}$$, which rearranges to $$2(b-a) = 12-4a+b$$, then $$2b - 2a = 12 - 4a + b$$, collecting: $$2a + b = 12$$. This is equation ① — one equation, two unknowns.\n- Step 2: The statement \"P lies on the curve\" means $$4a^2 + b^2 + \\ldots = \\text{const}$$ (substituting $$x=a, y=b$$ into the curve equation). This is equation ② — another equation in $$a$$ and $$b$$, from a completely independent source (curve membership, not gradient).\n- Step 3: Now you have two equations in two unknowns — a solvable simultaneous system. Substitute from ① into ② (e.g., $$b = 12-2a$$), solve the resulting quadratic, and reject invalid solutions (e.g., negative $$b$$ if the context requires positive). The trap was not recognising that \"lies on the curve\" is an equation, not just a description.\n\nTakeaway: \"Lies on the curve\" = algebraic equation. Every geometric/membership statement is a source of equations.", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": false}, {"question": "Synthesis: For the integral $$\\int_0^{\\pi/2} 2\\sin\\theta\\cos\\theta\\,\\sqrt{3+\\cos\\theta}\\,d\\theta$$ with substitution $$u = 3+\\cos\\theta$$, walk through the entire transformation chain from start to ready-to-integrate form. (4 steps)", "answer": "- Step 1: Use $$\\sin(2\\theta) = 2\\sin\\theta\\cos\\theta$$ to identify the integrand structure. Compute $$\\frac{du}{d\\theta} = -\\sin\\theta$$, so $$d\\theta = -\\frac{1}{\\sin\\theta}du$$, and $$\\cos\\theta = u-3$$.\n- Step 2: Replace: $$2\\sin\\theta\\cos\\theta$$ becomes $$2\\sin\\theta(u-3)$$; $$\\sqrt{3+\\cos\\theta} = u^{1/2}$$; $$d\\theta = -\\frac{du}{\\sin\\theta}$$.\n- Step 3: Cancel $$\\sin\\theta$$: the $$\\sin\\theta$$ in the numerator cancels with the $$\\frac{1}{\\sin\\theta}$$ in $$d\\theta$$, leaving $$-2(u-3)u^{1/2}\\,du = -2\\frac{u-3}{u^{-1/2}}\\,du$$... wait, let me be careful: $$-2(u-3)\\cdot u^{1/2}\\,du$$.\n- Step 4: Split: $$-2\\big[u^{1/2}\\cdot u^{1/2} - 3u^{1/2}\\big] = -2\\big[u - 3u^{1/2}\\big]$$... actually, let me redo: $$-2(u-3)u^{1/2} = -2\\frac{u-3}{u^{-1/2}}$$... simpler: $$\\frac{u-3}{u^{1/2}} = u^{1/2} - 3u^{-1/2}$$, so the full integrand is $$-2\\big(u^{1/2} - 3u^{-1/2}\\big)\\,du$$, with limits 4 to 3.\n\nTakeaway: Each substitution step replaces, cancels, and simplifies — chain them carefully, never skip a step.", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": false}, {"question": "Synthesis: Expand $$\\big(3 - x\\big)^{-3}$$ up to the $$x^2$$ term. Walk through: factoring out, applying the series, and stating the convergence range. (4 steps)", "answer": "- Step 1: Factor out the 3: $$\\big(3-x\\big)^{-3} = 3^{-3}\\big(1-\\frac{x}{3}\\big)^{-3} = \\frac{1}{27}\\big(1-\\frac{x}{3}\\big)^{-3}$$.\n- Step 2: Apply the binomial series with $$n=-3$$ and the variable part being $$-\\frac{x}{3}$$:\n$$1 + (-3)\\left(-\\frac{x}{3}\\right) + \\frac{(-3)(-4)}{2!}\\left(-\\frac{x}{3}\\right)^2 + \\ldots$$\n- Step 3: Simplify each term:\n+ First: 1\n+ Second: $$(-3)\\left(-\\frac{x}{3}\\right) = \\frac{3x}{3} = x$$\n+ Third: $$\\frac{12}{2}\\cdot\\frac{x^2}{9} = 6\\cdot\\frac{x^2}{9} = \\frac{2x^2}{3}$$\nSo: $$\\frac{1}{27}\\big(1 + x + \\frac{2x^2}{3} + \\ldots\\big) = \\frac{1}{27} + \\frac{x}{27} + \\frac{2x^2}{81} + \\ldots$$\n- Step 4: Convergence: $$\\left|-\\frac{x}{3}\\right| < 1$$, i.e., $$|x| < 3$$.\n\nTakeaway: Factor → apply series → simplify → state convergence. The variable inside the bracket determines the range.", "source": "GLM 5.1 ①", "_id": "glm_1_46", "judge_pick": true}, {"question": "The integrating factor method transforms $$\\frac{dy}{dx} + P(x)y = Q(x)$$ into $$\\frac{d}{dx}[y\\cdot IF] = Q\\cdot IF$$. Why is it crucial to compute $$\\int P(x)\\,dx$$ *without* a constant of integration when forming the IF? (2 steps)", "answer": "- Step 1: The integrating factor is $$IF = e^{\\int P\\,dx}$$, and we deliberately omit the constant $$C$$ from the integral. If we included it: $$e^{\\int P\\,dx + C} = e^C \\cdot e^{\\int P\\,dx} = (\\text{constant})\\cdot IF$$.\n- Step 2: Multiplying the ODE by $$e^C \\cdot IF$$ instead of just $$IF$$ would still work — the constant factor cancels from both sides when you eventually divide by the IF to isolate $$y$$. But including it adds unnecessary complexity and an extra factor to track. Omitting it is simpler and produces the same final answer, so it's standard practice.\n\nTakeaway: No constant in the IF integral — it would just multiply through as a constant and cancel later anyway.", "source": "GLM 5.1 ①", "_id": "glm_1_47", "judge_pick": false}, {"question": "A separable ODE: $$\\frac{dy}{dx} = 2xy$$ with initial condition $$y=3$$ when $$x=0$$. Walk through the full solution. (3 steps)", "answer": "- Step 1: Separate: $$\\frac{dy}{y} = 2x\\,dx$$ (divide both sides by $$y$$, multiply by $$dx$$).\n- Step 2: Integrate: $$\\ln|y| = x^2 + C$$ (left side gives ln, right side gives $$x^2$$ plus constant). Exponentiate: $$y = Ae^{x^2}$$ where $$A = e^C$$.\n- Step 3: Apply initial condition: $$3 = Ae^{0} = A$$, so $$A=3$$. Final solution: $$y = 3e^{x^2}$$.\n\nTakeaway: Separate → integrate → exponentiate (for ln results) → apply boundary condition → find constant.", "source": "GLM 5.1 ①", "_id": "glm_1_48", "judge_pick": false}, {"question": "A simple integrating factor exercise: Solve $$\\frac{dy}{dx} + 2y = 4$$ with $$y=1$$ at $$x=0$$. Walk through the IF method. (4 steps)", "answer": "- Step 1: Identify $$P(x) = 2$$, $$Q(x) = 4$$. Integrating factor: $$IF = e^{\\int 2\\,dx} = e^{2x}$$.\n- Step 2: Multiply through: $$e^{2x}\\frac{dy}{dx} + 2e^{2x}y = 4e^{2x}$$, which is $$\\frac{d}{dx}\\big[ye^{2x}\\big] = 4e^{2x}$$.\n- Step 3: Integrate: $$ye^{2x} = \\int 4e^{2x}\\,dx = 2e^{2x} + C$$, so $$y = 2 + Ce^{-2x}$$.\n- Step 4: Apply initial condition: $$1 = 2 + Ce^{0} = 2 + C$$, so $$C = -1$$. Final solution: $$y = 2 - e^{-2x}$$.\n\nTakeaway: IF method: compute IF → multiply → recognize perfect derivative → integrate → solve for y → apply boundary condition.", "source": "GLM 5.1 ①", "_id": "glm_1_49", "judge_pick": false}, {"question": "Why-not probe: When stating the domain of an inverse function, a student writes \"$$y < 5$$\" (copying the range notation of the original). Why is this marked wrong, even though the *numerical condition* is correct? (2 steps)", "answer": "- Step 1: The numerical condition IS correct — the domain of $$g^{-1}$$ is indeed all values below 5. But \"domain\" describes the set of allowed *inputs*, and the input variable of any function is conventionally called $$x$$. Writing \"$$y < 5$$\" uses the output variable for the input, which is notationally wrong.\n- Step 2: Examiners enforce the convention: domain → $$x$$, range → $$y$$. It's not about the numbers — it's about correctly identifying which variable is the input and which is the output. \"$$y < 5$$\" for a domain confuses input and output, suggesting the student doesn't understand the distinction.\n\nTakeaway: Domain = $$x$$-condition. Range = $$y$$-condition. Same numbers, different variables — both must be correct.", "source": "GLM 5.1 ①", "_id": "glm_1_50", "judge_pick": true}, {"question": "For ESAT-style time-pressed exams, knowing key cubes like $$5^3 = 125$$ and $$9^3 = 729$$ saves calculation time. What is $$7^3$$, and why is memorising up to $$10^3$$ particularly useful for ratio/fraction problems? (2 steps)", "answer": "- Step 1: $$7^3 = 343$$. The key cubes to memorise: $$1^3=1$$, $$2^3=8$$, $$3^3=27$$, $$4^3=64$$, $$5^3=125$$, $$6^3=216$$, $$7^3=343$$, $$8^3=512$$, $$9^3=729$$, $$10^3=1000$$.\n- Step 2: Ratio problems like the nested squares often produce fractions like $$\\left(\\frac{5}{9}\\right)^3$$, requiring you to cube both numerator and denominator. If you instantly know $$5^3=125$$ and $$9^3=729$$, you can spot the answer among multiple-choice options in seconds, without computing. Time saved on one question accumulates across the entire exam.\n\nTakeaway: Memorise cubes 1–10 — they appear constantly in ratio/exponent problems and multiple-choice spotting.", "source": "GLM 5.1 ①", "_id": "glm_1_51", "judge_pick": false}, {"question": "A counterexample sharpening boundary: The binomial series $$\\big(1+x\\big)^n$$ converges for $$|x|<1$$ when $$n$$ is negative. For $$n=-1$$, does the series converge at $$x=-1$$? What about $$x=1$$? (2 steps)", "answer": "- Step 1: At $$x = -1$$: the bracket becomes $$1-1=0$$, and $$0^{-1}$$ is undefined (division by zero). The series terms involve powers of $$-1$$, which alternate, but the sum would need to equal $$\\frac{1}{0}$$ — impossible. No convergence.\n- Step 2: At $$x = 1$$: the bracket becomes $$2$$, and $$2^{-1} = \\frac{1}{2}$$ is finite. But the series $$1 - 1 + 1 - 1 + \\ldots$$ (with alternating terms that don't tend to zero) diverges — it oscillates and never settles. So even though the function value exists, the series doesn't converge at the boundary.\n\nTakeaway: Boundary convergence must be checked separately — the $$|x|<1$$ condition is strict, and boundary behaviour can fail even when the function is defined.", "source": "GLM 5.1 ①", "_id": "glm_1_52", "judge_pick": true}, {"question": "When a question says \"show all stages of working\" or \"where solutions relying entirely on calculator technology are not acceptable,\" what does this change about your approach to simultaneous equations in vectors problems? (2 steps)", "answer": "- Step 1: If calculator methods are banned, you must solve the simultaneous equations *algebraically* by hand — elimination or substitution, showing each step. You can't just write the answers from your calculator's solver. The method marks require visible algebraic work.\n- Step 2: If calculator methods are permitted (no such restriction in the question), you may use the simultaneous-equation solver, but you should still *write down* the equations you're solving and note that you used the calculator. This shows the examiner your setup is correct even if they can't see your method. Always write the equations in standard form first.\n\nTakeaway: \"Show all working\" → algebraic method required. No restriction → calculator OK, but still write the setup.", "source": "GLM 5.1 ①", "_id": "glm_1_53", "judge_pick": false}], "count": 54}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "In a geometric ratio problem (like nested shapes), why does the final fraction NOT depend on the actual size of the original shape? What principle lets you assign a convenient numerical length? (2 steps)", "answer": "- Step 1: The question asks for a *fraction* (ratio of two areas), not an absolute area. A ratio is scale-invariant — if you double every length, both areas quadruple, and the ratio stays the same.\n- Step 2: Because the answer is independent of scale, you are free to pick whatever side length makes the arithmetic easiest. In the 1/3-nested-squares problem, choosing the full side = 3 makes each 1/3-segment equal to 1, avoiding fractions entirely.\n\nScale-invariance means: pick the friendliest number, the ratio won't change.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "A square has side length 3. Points are marked 1/3 of the way along each side (1 unit from each corner). The inner square connects adjacent marked points. What right triangle lets you find the inner square's side, and what is that side length? (3 steps)", "answer": "- Step 1: Two adjacent marked points sit on two adjacent sides of the outer square. The segment joining them is the inner square's side — and it forms the hypotenuse of a right triangle.\n- Step 2: One leg of that triangle runs along the first side (length 1, from the corner to the marked point). The other leg runs along the adjacent side (length 2, from that side's marked point back to the shared corner). These legs are 1 and 2 because the total side is 3 and the mark is at distance 1.\n- Step 3: By Pythagoras: inner side = $$\\sqrt{1^2 + 2^2} = \\sqrt{5}$$.\n\nThe inner square always has a side that is the hypotenuse of a corner triangle formed by the two segment lengths.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "In the nested squares problem with outer side = 3 and inner side = $$\\sqrt{5}$$, what is the area ratio between consecutive squares, and why is this ratio the same for every iteration? (3 steps)", "answer": "- Step 1: Outer square area = $$3^2 = 9$$. Inner square area = $$\\sqrt{5}^2 = 5$$. Ratio (inner/outer) = $$5/9$$.\n- Step 2: The construction is *self-similar*: each new square is formed by the same rule (mark 1/3 along each side, join adjacent points). The geometry repeats identically at every scale.\n- Step 3: Because the rule is identical each time, the area ratio between any two consecutive squares is always $$5/9$$. The second square is $$5/9$$ of the first; the third is $$5/9$$ of the second; and so on.\n\nSelf-similar constructions produce constant ratios — each iteration multiplies by the same factor.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": true}, {"question": "If each consecutive square has area ratio $$5/9$$ relative to its predecessor, why is the 4th square's area fraction of the original equal to $$\\left(\\frac{5}{9}\\right)^3$$ rather than $$\\left(\\frac{5}{9}\\right)^4$$? (2 steps)", "answer": "- Step 1: Count the *transitions* (multiplications), not the squares. From the 1st to the 2nd square is one transition (multiply by $$5/9$$). From 2nd to 3rd is another. From 3rd to 4th is a third. That is 3 transitions total.\n- Step 2: The 4th square's area as a fraction of the 1st is therefore $$\\frac{5}{9} \\times \\frac{5}{9} \\times \\frac{5}{9} = \\left(\\frac{5}{9}\\right)^3$$. The exponent equals the number of transitions, which is always \"target square number minus 1.\"\n\nExponent = (n − 1) where n is the square number you want. Three transitions, power of 3.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": true}, {"question": "A student sees a consecutive area ratio of $$5/9$$ and computes the 4th square fraction as $$\\frac{5}{9} \\times 4 = \\frac{20}{9}$$. What conceptual error did they make, and what should they have done instead? (2 steps)", "answer": "- Step 1: The error is treating the ratio as *additive* — multiplying by 4 as if each iteration *adds* another $$5/9$$. But ratios *compound multiplicatively*: each iteration multiplies the previous area by $$5/9$$, not adds $$5/9$$ to it.\n- Step 2: The correct calculation is repeated multiplication: $$\\left(\\frac{5}{9}\\right)^3 = \\frac{125}{729}$$, a shrinking fraction (as expected — inner squares get smaller). The student's answer $$\\frac{20}{9} > 1$$ is clearly absurd for a smaller square.\n\nMultiplicative compounding shrinks (ratio < 1) or grows (ratio > 1); additive compounding is the wrong model entirely.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": true}, {"question": "In a different nested-shape problem, consecutive squares have area ratio $$3/7$. What fraction is the 3rd square of the original? (Do this mentally.) (2 steps)", "answer": "- Step 1: The 3rd square requires 2 transitions (1st→2nd, 2nd→3rd), so the exponent is 2.\n- Step 2: Fraction = $$\\left(\\frac{3}{7}\\right)^2 = \\frac{9}{49}$$. Since $$3/7 < 1$$, the fraction shrinks — the 3rd square is about 18% of the original.\n\nQuick mental check: $$3^2 = 9$$, $$7^2 = 49$$. Two transitions, power of 2.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "Why does the ESAT exam reward memorising cubes like $$5^3 = 125$$ and $$9^3 = 729$$, and what goes wrong if you try to compute them under time pressure? (2 steps)", "answer": "- Step 1: ESAT is tightly timed. Computing $$5 \\times 5 \\times 5$$ or $$9 \\times 9 \\times 9$$ under pressure invites arithmetic mistakes and wastes seconds that compound across the paper.\n- Step 2: If you instantly recognise $$125$$ as $$5^3$$ and $$729$$ as $$9^3$$, you can match the answer to a multiple-choice option in under a second. Without that recognition, you must compute, verify, and possibly re-check — losing valuable time on a question designed to be quick.\n\nMemorise cubes 1–10 and squares 1–15. The time savings across an entire ESAT paper are substantial.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "For a rational function like $$g(x) = \\frac{5x+3}{x+2}$$, what is the purpose of performing polynomial long division, and what graph feature does it reveal that the original fraction form hides? (2 steps)", "answer": "- Step 1: Polynomial long division rewrites $$\\frac{5x+3}{x+2}$$ as quotient + remainder/divisor: $$5 + \\frac{-7}{x+2}$$. This separates the function into a *constant part* (5) and a *simple rational part* ($$\\frac{-7}{x+2}$$).\n- Step 2: The rewritten form immediately reveals the horizontal asymptote ($$y = 5$$, from the constant) and the vertical asymptote ($$x = -2$$, from the denominator). The original form $$\\frac{5x+3}{x+2}$$ obscures these — you'd have to analyse limits to find them.\n\nLong division converts an opaque rational function into a transformation of $$\\frac{1}{x}$$, making asymptotes and shape transparent.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "After dividing $$\\frac{5x+3}{x+2}$$, a student writes the result as $$5(x+2) - 7$$ and stops. What is wrong with this, and what must the student write instead? (3 steps)", "answer": "- Step 1: $$5(x+2) - 7 = 5x + 10 - 7 = 5x + 3$$ — this is just the numerator reconstructed. It is an *intermediate working step*, not the final division result.\n- Step 2: The whole point of division is to express the fraction as quotient + remainder/divisor. You must write: $$\\frac{5x+3}{x+2} = 5 + \\frac{-7}{x+2}$$, where 5 is the quotient, −7 is the remainder, and $$x+2$$ is the divisor.\n- Step 3: If you write $$5(x+2) - 7$$, you haven't actually divided — you've just re-expanded. To reach the correct form, you'd need to split: $$\\frac{5(x+2)}{x+2} + \\frac{-7}{x+2} = 5 + \\frac{-7}{x+2}$$. Going straight to the final line is faster and less error-prone.\n\nThe required form is always: quotient + remainder/divisor. Never stop at the re-expanded numerator.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": true}, {"question": "$$g(x) = 5 + \\frac{-7}{x+2}$$ is built from transformations of a base graph. What is that base graph, and why is it $$-\\frac{1}{x}$$ rather than $$\\frac{1}{x}$$? (2 steps)", "answer": "- Step 1: The core rational part is $$\\frac{-7}{x+2}$$, which has a negative numerator. Factor this as $$-7 \\cdot \\frac{1}{x+2}$$, or equivalently $$7 \\cdot \\frac{-1}{x+2}$$. The base function inside is $$\\frac{-1}{x}$$ (after removing the stretch and translation).\n- Step 2: The negative sign flips $$\\frac{1}{x}$$ across the x-axis. $$\\frac{1}{x}$$ has branches in quadrants I and III; $$\\frac{-1}{x}$$ has branches in quadrants II and IV. Since our function has a negative numerator, the base must be $$\\frac{-1}{x}$$ — choosing $$\\frac{1}{x}$$ would give the wrong branch positions.\n\nThe sign of the numerator determines which base graph you start from. Negative → start with $$-\\frac{1}{x}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "Starting from $$h(x) = -\\frac{1}{x}$$, list the three transformations that produce $$g(x) = 5 + \\frac{-7}{x+2}$$, and identify what each does to the asymptotes. (4 steps)", "answer": "- Step 1: **Vertical stretch by factor 7**: $$-7 \\cdot \\frac{1}{x}$$ stretches $$h(x)$$ by 7. This makes the curve steeper but does NOT move either asymptote (multiplying y-values by 7 keeps $$y=0$$ and $$x=0$$ in place, since $$7 \\times 0 = 0$$).\n- Step 2: **Horizontal translation left by 2**: replacing $$x$$ with $$x+2$$ shifts the graph left 2 units. The vertical asymptote $$x=0$$ moves to $$x=-2$$. The horizontal asymptote $$y=0$$ stays (horizontal translations don't affect horizontal asymptotes).\n- Step 3: **Vertical translation up by 5**: adding 5 shifts the graph up 5 units. The horizontal asymptote $$y=0$$ moves to $$y=5$$. The vertical asymptote $$x=-2$$ stays (vertical translations don't affect vertical asymptotes).\n- Step 4: Final asymptotes: vertical at $$x=-2$$, horizontal at $$y=5$$. The order of transformations matters for the graph shape but the asymptote shifts are additive regardless.\n\nAsymptote rule: vertical asymptote shifts with horizontal translation; horizontal asymptote shifts with vertical translation. Stretches don't move asymptotes at y=0 or x=0.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": true}, {"question": "The unrestricted graph of $$g(x) = 5 + \\frac{-7}{x+2}$$ has two branches. If the domain is restricted to $$x > -2$$, which branch survives, and what is the resulting range? (3 steps)", "answer": "- Step 1: The base graph $$-\\frac{1}{x}$$ has a branch in quadrant II (left, above) and quadrant IV (right, below). After the translations, the \"right, below\" branch sits to the right of $$x=-2$$ and below $$y=5$$.\n- Step 2: The domain $$x > -2$$ selects only the right branch — the one that approaches $$y=5$$ from below as $$x$$ increases, and plunges toward $$-\\infty$$ as $$x$$ approaches $$-2$$ from the right.\n- Step 3: Therefore the range is all y-values below (but never reaching) the horizontal asymptote: **$$y < 5$$**. The left branch (which gives $$y > 5$$) is excluded entirely.\n\nDomain restriction kills one branch. For $$x > -2$$ with a $$-\\frac{1}{x}$$-type graph: only the below-asymptote branch survives.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "A student claims the range of $$g(x) = 5 + \\frac{-7}{x+2}$$ with $$x > -2$$ is $$y > 5$$. What mistake did they make? (2 steps)", "answer": "- Step 1: They likely identified the correct asymptote ($$y=5$$) but chose the wrong branch. The unrestricted graph has a branch with $$y > 5$$ (to the LEFT of $$x=-2$$) and a branch with $$y < 5$$ (to the RIGHT of $$x=-2$$).\n- Step 2: Since the domain is $$x > -2$$, we keep only the right branch, which gives $$y < 5$$. The student either forgot the domain restriction or confused which branch corresponds to which side of the vertical asymptote.\n\nAlways check: which side of the vertical asymptote does your domain keep? That determines whether the range is above or below the horizontal asymptote.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "If the range of $$g(x)$$ is $$y < 5$$, what is the domain of $$g^{-1}(x)$$, and why? (2 steps)", "answer": "- Step 1: A fundamental principle: the domain of the inverse function equals the range of the original function. Every y-value that $$g$$ can output becomes an x-value that $$g^{-1}$$ can accept as input.\n- Step 2: Since the range of $$g$$ is $$y < 5$$, the domain of $$g^{-1}$$ is **$$x < 5$$**. Same inequality, same number, but the variable changes from $$y$$ to $$x$$ because we're now talking about inputs to the inverse.\n\nDomain of inverse = Range of original. The numerical bound is identical; only the variable letter changes.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "A student writes \"domain of $$g^{-1}$$: $$y < 5$$\" and loses a mark. What notation rule did they violate, and why is it enforced? (2 steps)", "answer": "- Step 1: **Domain** is a statement about *inputs* (x-values), so it must be written with $$x$$: \"$$x < 5$$\". **Range** is a statement about *outputs* (y-values), so it must be written with $$y$$: \"$$y < 5$$\". The student wrote a domain using $$y$$ — this is marked wrong.\n- Step 2: The rule exists because \"$$y < 5$$\" could ambiguously mean \"the range is below 5\" or \"the domain is below 5 in some coordinate.\" Examiners need precise, unambiguous notation. Using the correct variable ($$x$$ for domain, $$y$$ for range) removes all ambiguity.\n\nMnemonic: **D**omain → **x**. **R**ange → **y**. Swapping loses marks even if the numerical bound is correct.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "In the question \"Find $$g^{-1}(x)$$,\" many students only give the equation and forget something else that costs a mark. What is the missing piece, and why do examiners include it? (2 steps)", "answer": "- Step 1: The missing piece is the **domain of the inverse** ($$x < 5$$ in this case). An inverse function is not fully specified without its domain — the equation alone allows inputs that the original function never produced as outputs.\n- Step 2: Examiners include this mark because it tests whether you understand the *relationship* between original and inverse (range → domain), not just the *mechanics* of algebraic inversion. The question often doesn't explicitly say \"state the domain\" — it's implied, and forgetting it is a common trap.\n\nAlways state both the equation AND the domain of the inverse. Even if the question doesn't ask for the domain explicitly, it's required for full marks.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": true}, {"question": "The composite function $$fg(x)$$ means \"apply f to the output of g.\" A student swaps the order and applies g to the output of f, ending up with $$\\ln$$ on both sides of their equation. What went wrong conceptually? (3 steps)", "answer": "- Step 1: $$fg(x)$$ means $$f(g(x))$$: the *inner* function $$g$$ is applied first, producing a numerical output; then the *outer* function $$f$$ is applied to that output. The student reversed this, computing $$g(f(x))$$ instead.\n- Step 2: In this problem, $$f$$ involved a logarithm and $$g$$ involved a rational function. Applying $$g$$ first (correct) puts a rational expression inside $$f$$ (the log). Applying $$f$$ first (wrong) puts a log expression inside $$g$$, producing a fundamentally different equation structure — hence $$\\ln$$ on both sides.\n- Step 3: The rule: read $$fg(x)$$ right-to-left or as \"f of g of x\" — g is inner, f is outer. **gf(x)** would reverse the roles. Mixing up f and g changes the entire equation, not just the order of operations.\n\nComposite function rule: $$fg(x) = f(g(x))$$. Inner first, outer second. Swapping f and g produces a completely different function.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": true}, {"question": "What is implicit differentiation, and when is it necessary instead of regular differentiation? (2 steps)", "answer": "- Step 1: Implicit differentiation means differentiating an equation that relates $$x$$ and $$y$$ *without* first isolating $$y$$ as an explicit function of $$x$$ (i.e., without writing $$y = f(x)$$). You differentiate every term with respect to $$x$$, treating $$y$$ as an implicit function of $$x$$.\n- Step 2: It is necessary whenever the equation mixes $$x$$ and $$y$$ in a way that makes isolation impractical or impossible — e.g., $$4x^2 + 2xy - 2xy + y^2 = 24$$, where the $$xy$$ terms and $$y^2$$ make it hard to solve for $$y$$ explicitly. You differentiate term-by-term, introducing $$\\frac{dy}{dx}$$ wherever $$y$$ appears.\n\nKey insight: whenever you differentiate a term containing $$y$$ with respect to $$x$$, you must multiply by $$\\frac{dy}{dx}$$ — because $$y$$ is a function of $$x$$, not a constant.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "To differentiate $$xy$$ with respect to $$x$$, you use the product rule. Write out the full expansion, and explain why brackets around the result are essential. (3 steps)", "answer": "- Step 1: Let $$u = x$$ and $$v = y$$. The product rule: $$\\frac{d(uv)}{dx} = u\\frac{dv}{dx} + v\\frac{du}{dx}$$.\n- Step 2: Substituting: $$\\frac{d(xy)}{dx} = x\\frac{dy}{dx} + y \\cdot 1 = x\\frac{dy}{dx} + y$$. This must be written as **$$\\left[x\\frac{dy}{dx} + y\\right]$$** with brackets.\n- Step 3: Brackets are essential because this product rule result often has a coefficient in front (e.g., $$-2xy$$ gives $$-2\\left[x\\frac{dy}{dx} + y\\right]$$). Without brackets, distributing the $$-2$$ incorrectly produces $$-2x\\frac{dy}{dx} + 2y$$ (sign error on the $$y$$ term). With brackets: $$-2x\\frac{dy}{dx} - 2y$$ (correct).\n\nAlways bracket the product rule expansion. A coefficient outside must distribute to *every* term inside — brackets make this unambiguous.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "After implicitly differentiating a curve equation, you have terms with $$\\frac{dy}{dx}$$ and terms without. How do you isolate $$\\frac{dy}{dx}$$? (3 steps)", "answer": "- Step 1: Collect all terms containing $$\\frac{dy}{dx}$$ on one side of the equation. Move all terms *without* $$\\frac{dy}{dx}$$ to the other side.\n- Step 2: Factor out $$\\frac{dy}{dx}$$ from the collected terms. For example, if you have $$y\\frac{dy}{dx} - 2x\\frac{dy}{dx}$$ on one side, factor as $$\\frac{dy}{dx}(y - 2x)$$.\n- Step 3: Divide both sides by the remaining factor to get $$\\frac{dy}{dx}$$ alone: $$\\frac{dy}{dx} = \\frac{\\text{non-}dy/dx\\text{ side}}{\\text{factor next to }dy/dx}$$.\n\nIsolating $$\\frac{dy}{dx}$$ is just algebra: group, factor, divide. The differentiation step is where the calculus happens; the rest is rearrangement.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": true}, {"question": "A point $$P(a,b)$$ on a curve has gradient 2. Substituting into $$\\frac{dy}{dx}$$ gives one equation like $$4a + b = 12$$, but there are two unknowns. A student gets stuck, saying \"I only have one equation.\" Where is the second equation? (3 steps)", "answer": "- Step 1: The gradient condition $$\\frac{dy}{dx} = 2$$ at $$P(a,b)$$ gives one equation relating $$a$$ and $$b$$. This alone is indeed insufficient — one equation, two unknowns.\n- Step 2: The second equation comes from the fact that **$$P$$ lies on the curve**. The curve equation (e.g., $$4x^2 + y^2 = 24$$) must be satisfied by any point on it. Substituting $$x = a$$, $$y = b$$ gives the second equation: $$4a^2 + b^2 = 24$$.\n- Step 3: This is a recurring weakness: students treat \"P lies on the curve\" as merely a description, not as an *equation*. But every point on a curve satisfies the curve equation — that IS a usable equation for solving simultaneous equations.\n\n\"Point lies on the curve\" = \"substitute the point into the curve equation.\" This is always your second equation when you have a gradient condition and two unknowns.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": true}, {"question": "Why can't you solve for the coordinates of $$P(a,b)$$ using only the gradient equation $$4a + b = 12$$? What would go wrong? (2 steps)", "answer": "- Step 1: With one equation and two unknowns, there are infinitely many solutions — every pair $$(a, b)$$ satisfying $$b = 12 - 4a$$ works. You could pick $$a = 1, b = 8$$ or $$a = 2, b = 4$$ or $$a = 3, b = 0$$ — all satisfy the gradient condition.\n- Step 2: But only one (or a few) of these pairs also lie on the actual curve. The curve-membership equation narrows the infinite family down to the specific point(s) that satisfy *both* conditions simultaneously. Without it, you have no way to identify the correct point.\n\nOne equation = a line of possibilities. Two equations = intersection points. You need both the gradient condition and the curve-membership condition.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "A curve has equation $$2x^2 + y^2 = 18$$ and $$\\frac{dy}{dx} = \\frac{6 - 2x}{y - x}$$ (after simplification). At point $$P(a,b)$$, the gradient is 3. Write down both equations you would solve simultaneously (don't solve them). (2 steps)", "answer": "- Step 1: Gradient condition: substitute $$\\frac{dy}{dx} = 3$$, $$x = a$$, $$y = b$$: $$3 = \\frac{6 - 2a}{b - a}$$, which rearranges to $$3(b - a) = 6 - 2a$$, i.e., $$3b - 3a = 6 - 2a$$, giving $$3b - a = 6$$.\n- Step 2: Curve-membership condition: substitute $$x = a$$, $$y = b$$ into the curve equation: $$2a^2 + b^2 = 18$$.\n\nTwo equations: $$3b - a = 6$$ and $$2a^2 + b^2 = 18$$. The first is linear (from gradient), the second is quadratic (from curve membership) — solve by substitution.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "Two lines $$L_1$$ and $$L_2$$ intersect at point $$P$$, given by position vectors $$\\mathbf{r}_1$$ and $$\\mathbf{r}_2$$. Why does the intersection condition require $$\\mathbf{r}_1 = \\mathbf{r}_2$$, and what does this equality mean physically? (2 steps)", "answer": "- Step 1: Both $$\\mathbf{r}_1$$ and $$\\mathbf{r}_2$$ are position vectors from the origin to points on their respective lines. At an intersection point, both lines pass through the *same* physical point, so both position vectors must describe the *same* location.\n- Step 2: If two vectors describe the same point, they must be equal: same x-component, same y-component, same z-component. Hence $$\\mathbf{r}_1 = \\mathbf{r}_2$$ is the necessary and sufficient condition for intersection.\n\n$$\\mathbf{r}_1 = \\mathbf{r}_2$$ means: \"the origin-to-point vectors are identical\" → the lines share that point. This gives you three component equations.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": true}, {"question": "From $$\\mathbf{r}_1 = \\mathbf{r}_2$$ at an intersection, you equate each component. How many equations do you get, and why is having *more* equations than unknowns not a problem? (2 steps)", "answer": "- Step 1: In 3D, each position vector has 3 components, so equating $$\\mathbf{r}_1 = \\mathbf{r}_2$$ gives **3 equations** (one for x, one for y, one for z).\n- Step 2: The unknowns are typically $$\\lambda$$ and $$\\mu$$ (the parameters on each line), giving 2 unknowns. Having 3 equations for 2 unknowns means one equation is *redundant* (dependent on the others) — this is expected for two lines that truly intersect. You solve any 2 of the 3 equations, then verify the third is consistent.\n\nThree equations, two unknowns: solve any two, check the third. If the third is inconsistent, the lines don't intersect (they're skew).", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "In a vectors intersection problem, when is it permitted to use your calculator's simultaneous equation solver, and when is it not? (2 steps)", "answer": "- Step 1: You may use the calculator solver **unless** the question explicitly states \"where solutions relying entirely on calculator technology are not acceptable\" or similar wording. If that phrase is absent, calculator methods are allowed.\n- Step 2: Even when using the calculator, you must still *write down* the equations you're solving (showing your setup) and state that you used a calculator method. The examiner needs to see your working structure; the calculator just speeds up the arithmetic.\n\nCheck the question wording. If no ban is stated, calculator is fine — but always show the equations you set up.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "In the line $$L_2: \\mathbf{r} = (-1, \\beta, 6) + \\mu(2, -1, 7)$$, why is $$\\beta$$ treated as a *constant* in the simultaneous equations, while $$\\mu$$ is a *variable*? (2 steps)", "answer": "- Step 1: $$\\mu$$ is a *parameter* that varies to sweep out different points on the line. It's an unknown we solve for to find the specific $$\\mu$$-value at the intersection. Hence $$\\mu$$ is a variable in the simultaneous equations.\n- Step 2: $$\\beta$$ is a fixed number that defines *which* line $$L_2$$ is — it's part of the line's fixed starting point. We're solving *for* $$\\beta$$ (finding which line configuration makes intersection happen), so $$\\beta$$ is a constant we determine, not a variable we let range freely.\n\n$$\\lambda, \\mu$$: parameters (variables to solve for). $$\\beta$$: a fixed constant defining the line (also to solve for, but it doesn't vary along the line).", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": true}, {"question": "After finding the intersection parameter values, a student writes the final answer as a column vector $$\\begin{pmatrix} 7 \\\\ -5 \\\\ 3
