<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;background:#f5f5f7;color:#1d1d1f;line-height:1.6;-webkit-font-smoothing:antialiased}
.ctr{max-width:920px;margin:0 auto;padding:24px 20px 80px}
.hdr{text-align:center;padding:40px 0 28px}
.hdr h1{font-size:34px;font-weight:700;letter-spacing:-.5px;background:linear-gradient(135deg,#1d1d1f,#424245);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr .sub{font-size:15px;color:#86868b;margin-top:6px}
.bdg-row{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.bdg{display:inline-flex;align-items:center;gap:5px;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:600;background:#e8e8ed;color:#424245}
.bdg.pp{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.bdg.gr{background:#34c759;color:#fff}

.tabs{display:flex;gap:4px;overflow-x:auto;padding:4px;background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin:0 0 14px;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tb{flex-shrink:0;padding:9px 18px;border-radius:10px;border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:600;color:#86868b;transition:all .2s;white-space:nowrap;font-family:inherit}
.tb:hover{color:#1d1d1f;background:#f5f5f7}
.tb.act{background:#0071e3;color:#fff}
.tb.jact{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.tb.mact{background:#34c759;color:#fff}

.mp{background:#fff;border-radius:14px;padding:16px 20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;font-size:13px}
.mi{display:flex;flex-direction:column;gap:2px}
.ml{font-size:11px;font-weight:600;color:#86868b;text-transform:uppercase;letter-spacing:.5px}
.mv{font-size:14px;font-weight:600;color:#1d1d1f;font-family:'SF Mono',Menlo,monospace}
.mv.co{color:#0071e3}
.mv.mo{font-size:11px;color:#424245;word-break:break-all}

.ctrl{display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:12px 16px;background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:14px;position:sticky;top:8px;z-index:20}
.ctrl button{padding:7px 14px;border-radius:10px;border:1px solid #d2d2d7;background:#fff;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;font-family:inherit;color:#1d1d1f}
.ctrl button:hover{background:#f5f5f7}
.ctrl .bl{background:#0071e3;color:#fff;border-color:#0071e3}
.ctrl .dk{background:#1d1d1f;color:#fff;border-color:#1d1d1f}
.ctrl .gn{background:#34c759;color:#fff;border-color:#34c759}
.ctrl .pp{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-color:#764ba2}
.ctrl .nt{background:#000;color:#fff;border-color:#000;font-size:13px;padding:8px 16px}
.ctrl .sp{flex:1}
.sc{font-size:13px;font-weight:700;color:#34c759}
.cc{font-size:13px;color:#86868b;font-weight:600}

.cl{display:flex;flex-direction:column;gap:10px}
.cd{background:#fff;border-radius:14px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.05);transition:all .2s}
.cd:hover{box-shadow:0 2px 12px rgba(0,0,0,.08)}
.cd.ds{opacity:0.5}
.ct{display:flex;align-items:flex-start;gap:10px}
.cb{flex-shrink:0;width:18px;height:18px;accent-color:#0071e3;cursor:pointer;margin-top:3px}
.qw{flex:1;min-width:0}
.q{font-size:15px;font-weight:600;cursor:pointer;user-select:none;position:relative;padding-right:26px}
.q::after{content:'▸';position:absolute;right:0;top:0;font-size:16px;color:#86868b;transition:transform .2s}
.cd.op .q::after{transform:rotate(90deg)}
.jp{display:inline-block;padding:1px 7px;border-radius:6px;font-size:10px;font-weight:700;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;margin-left:6px;vertical-align:middle}
.a{display:none;margin-top:12px;padding-top:12px;border-top:1px solid #f0f0f5;font-size:14px;color:#424245;line-height:1.7}
.cd.op .a{display:block}
.cf{display:flex;align-items:center;gap:8px;margin-top:8px}
.sb{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600;background:#f0f0f5;color:#86868b}
.cpb{padding:2px 8px;border-radius:8px;border:1px solid #d2d2d7;background:#fff;cursor:pointer;font-size:11px;color:#86868b}
.cpb:hover{background:#f5f5f7;color:#1d1d1f}
.stp{margin:6px 0;padding-left:8px;border-left:2px solid #0071e3}
.sub{margin:3px 0 3px 20px;color:#555}
.tst{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1d1d1f;color:#fff;padding:10px 24px;border-radius:12px;font-size:14px;font-weight:600;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none}
.tst.sh{opacity:1}
.es{text-align:center;padding:60px 20px;color:#86868b;font-size:15px}
@media(max-width:600px){.ctr{padding:16px 12px 60px}.hdr h1{font-size:26px}.cd{padding:14px}.ctrl{padding:10px}.mp{grid-template-columns:repeat(2,1fr)}}
</style></head>

<script>
const DATA={"selected": [{"question": "How do you simplify $(3\\cos\\theta - \\tan\\theta)\\cos\\theta$ to involve only $\\sin\\theta$?", "answer": "$(3\\cos\\theta - \\frac{\\sin\\theta}{\\cos\\theta})\\cos\\theta = 3\\cos^2\\theta - \\sin\\theta$\nUsing $\\cos^2\\theta = 1 - \\sin^2\\theta$: $= 3(1 - \\sin^2\\theta) - \\sin\\theta = 3 - 3\\sin^2\\theta - \\sin\\theta$\nSetting equal to 2: $3\\sin^2\\theta + \\sin\\theta - 1 = 0$", "source": "MiniMax ①", "_id": "minimax_1_3"}, {"question": "What is the trapezium rule formula for estimating $\\int_a^b f(x)\\,dx$ with $n$ equal strips?", "answer": "$\\int_a^b f(x)\\,dx \\approx \\frac{h}{2}[y_0 + y_n + 2(y_1 + y_2 + \\ldots + y_{n-1})]$, where $h = \\frac{b-a}{n}$. Note: Only the interior ordinates ($y_1$ to $y_{n-1}$) are doubled; endpoints are added once.", "source": "MiniMax ①", "_id": "minimax_1_4"}, {"question": "What is the Remainder Theorem for a divisor of the form $(ax - b)$?", "answer": "When polynomial $f(x)$ is divided by $(ax - b)$, the remainder is $f\\left(\\frac{b}{a}\\right)$. You substitute $x = \\frac{b}{a}$, NOT $x = b$.", "source": "MiniMax ①", "_id": "minimax_1_0"}, {"question": "What is the period of $\\cos^2\\left(\\frac{n\\pi}{3}\\right)$ and what values does it take?", "answer": "The sequence repeats every 3 terms. Values: $a_1 = \\cos^2(\\frac{\\pi}{3}) = \\frac{1}{4}$, $a_2 = \\cos^2(\\frac{2\\pi}{3}) = \\frac{1}{4}$, $a_3 = \\cos^2(\\pi) = 1$. Pattern: $\\frac{1}{4}, \\frac{1}{4}, 1, \\frac{1}{4}, \\frac{1}{4}, 1, \\ldots$ Sum per period = $\\frac{3}{2}$.", "source": "MiniMax ①", "_id": "minimax_1_1"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [], "count": 0}, "glm_2": {"label": "GLM 5.1 ②", "cards": [], "count": 0}, "glm_3": {"label": "GLM 5.1 ③", "cards": [], "count": 0}, "qwen_1": {"label": "Qwen 3 ①", "cards": [], "count": 0}, "qwen_2": {"label": "Qwen 3 ②", "cards": [], "count": 0}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "What is the Remainder Theorem for a divisor of the form $(ax - b)$?", "answer": "When polynomial $f(x)$ is divided by $(ax - b)$, the remainder is $f\\left(\\frac{b}{a}\\right)$. You substitute $x = \\frac{b}{a}$, NOT $x = b$.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": true}, {"question": "What is the period of $\\cos^2\\left(\\frac{n\\pi}{3}\\right)$ and what values does it take?", "answer": "The sequence repeats every 3 terms. Values: $a_1 = \\cos^2(\\frac{\\pi}{3}) = \\frac{1}{4}$, $a_2 = \\cos^2(\\frac{2\\pi}{3}) = \\frac{1}{4}$, $a_3 = \\cos^2(\\pi) = 1$. Pattern: $\\frac{1}{4}, \\frac{1}{4}, 1, \\frac{1}{4}, \\frac{1}{4}, 1, \\ldots$ Sum per period = $\\frac{3}{2}$.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": true}, {"question": "If $w = \\log_a(t+5) - \\log_a 4$ and $w = 10$ when $t = 3$, how do you find $a$?", "answer": "Substitute: $10 = \\log_a(8) - \\log_a(4) = \\log_a(2)$\nSo $a^{10} = 2$, therefore $a = 2^{1/10} \\approx 1.072$", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "How do you simplify $(3\\cos\\theta - \\tan\\theta)\\cos\\theta$ to involve only $\\sin\\theta$?", "answer": "$(3\\cos\\theta - \\frac{\\sin\\theta}{\\cos\\theta})\\cos\\theta = 3\\cos^2\\theta - \\sin\\theta$\nUsing $\\cos^2\\theta = 1 - \\sin^2\\theta$: $= 3(1 - \\sin^2\\theta) - \\sin\\theta = 3 - 3\\sin^2\\theta - \\sin\\theta$\nSetting equal to 2: $3\\sin^2\\theta + \\sin\\theta - 1 = 0$", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": true}, {"question": "What is the trapezium rule formula for estimating $\\int_a^b f(x)\\,dx$ with $n$ equal strips?", "answer": "$\\int_a^b f(x)\\,dx \\approx \\frac{h}{2}[y_0 + y_n + 2(y_1 + y_2 + \\ldots + y_{n-1})]$, where $h = \\frac{b-a}{n}$. Note: Only the interior ordinates ($y_1$ to $y_{n-1}$) are doubled; endpoints are added once.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": true}, {"question": "How do you simplify $y = \\frac{12x^3(x-7) + 14x(13x-15)}{21x^{1/2}}$ into the form $ax^{7/2} + bx^{5/2} + cx^{3/2} + dx^{1/2}$?", "answer": "Multiply out numerator: $12x^4 - 84x^3 + 182x^2 - 210x$\nDivide each term by $21x^{1/2}$:\n$y = \\frac{12}{21}x^{7/2} - \\frac{84}{21}x^{5/2} + \\frac{182}{21}x^{3/2} - \\frac{210}{21}x^{1/2}$\n$y = \\frac{4}{7}x^{7/2} - 4x^{5/2} + \\frac{26}{3}x^{3/2} - 10x^{1/2}$", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "If $S_\\infty = 3a$ for a geometric sequence with first term $a$ and common ratio $r$, what is $r$?", "answer": "$S_\\infty = \\frac{a}{1-r} = 3a$\n$\\frac{1}{1-r} = 3$\n$1 - r = \\frac{1}{3}$\n$r = \\frac{2}{3}$", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "What is the equation of a circle with centre $(a, b)$ and radius $r$?", "answer": "$(x - a)^2 + (y - b)^2 = r^2$ (NOT in formula booklet — memorize!)", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "If $a = \\log_2 3$, express $\\log_2 9$ and $\\log_2\\left(\\frac{3}{16}\\right)$ in terms of $a$.", "answer": "- $\\log_2 9 = \\log_2 3^2 = 2\\log_2 3 = 2a$\n- $\\log_2\\left(\\frac{3}{16}\\right) = \\log_2 3 - \\log_2 16 = a - 4$", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}], "count": 9}, "minimax_2": {"label": "MiniMax ②", "cards": [], "count": 0}, "opus_1": {"label": "Opus 4.7 ①", "cards": [], "count": 0}, "opus_2": {"label": "Opus 4.7 ②", "cards": [], "count": 0}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 10273, "out_tokens": 4661, "reasoning_chars": 2633, "cost_eur": 0.0249, "elapsed_s": 121, "content_chars": 11232}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 10273, "out_tokens": 5381, "reasoning_chars": 2971, "cost_eur": 0.0273, "elapsed_s": 38, "content_chars": 12838}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 10273, "out_tokens": 6563, "reasoning_chars": 4277, "cost_eur": 0.0311, "elapsed_s": 165, "content_chars": 15579}, "kimi_1": {"run": 1, "provider": "kimi", "model": "moonshotai/kimi-k2.6", "display": "Kimi K2.6", "temperature": 0.7, "in_tokens": 9948, "out_tokens": 11704, "reasoning_chars": 26788, "cost_eur": 0.0569, "elapsed_s": 128, "content_chars": 8835}, "kimi_2": {"run": 2, "provider": "kimi", "model": "moonshotai/kimi-k2.6", "display": "Kimi K2.6", "temperature": 0.5, "in_tokens": 9947, "out_tokens": 11744, "reasoning_chars": 22591, "cost_eur": 0.0571, "elapsed_s": 266, "content_chars": 12363}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.6, "in_tokens": 9689, "out_tokens": 3599, "reasoning_chars": 1288, "cost_eur": 0.0054, "elapsed_s": 27, "content_chars": 8767}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.6, "in_tokens": 9689, "out_tokens": 5548, "reasoning_chars": 2643, "cost_eur": 0.0074, "elapsed_s": 46, "content_chars": 13723}, "opus_1": {"run": 1, "provider": "opus", "model": "claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 14408, "out_tokens": 10052, "reasoning_chars": 0, "cost_eur": 0.8924, "elapsed_s": 123, "content_chars": 15207}, "opus_2": {"run": 2, "provider": "opus", "model": "claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 14408, "out_tokens": 14380, "reasoning_chars": 0, "cost_eur": 1.1911, "elapsed_s": 175, "content_chars": 15678}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.5, "in_tokens": 10588, "out_tokens": 2329, "reasoning_chars": 2233, "cost_eur": 0.0045, "elapsed_s": 35, "content_chars": 4829}, "qwen_2": {"run": 2, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.5, "in_tokens": 10588, "out_tokens": 2399, "reasoning_chars": 4078, "cost_eur": 0.0046, "elapsed_s": 38, "content_chars": 4164}}};
const SK='p2_paper8';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),3500);
  fetch('https://hermes-flashcards.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
