"How do you determine whether a turning point is a maximum or minimum?", "answer": "Use the **second derivative**: $\\frac{d^2y}{dx^2} > 0$ → local minimum; $\\frac{d^2y}{dx^2} < 0$ → local maximum.", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": false}, {"question": "How do you find the exact area between a curve and a line on $[a,b]$?", "answer": "$\\displaystyle\\text{Area} = \\int_a^b (\\text{upper} - \\text{lower})\\,dx$. Determine which is upper by checking a point, then integrate the difference.", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": false}, {"question": "What is the log power law?", "answer": "$\\log_a(x^n) = n\\log_a x$. E.g., $\\log_2 9 = \\log_2 3^2 = 2\\log_2 3 = 2a$.", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": false}, {"question": "How do you simplify $\\log_2\\!\\left(\\frac{3}{16}\\right)$ in terms of $a = \\log_2 3$?", "answer": "$\\log_2 3 - \\log_2 16 = a - 4$ (since $\\log_2 16 = \\log_2 2^4 = 4$).", "source": "GLM 5.1 ②", "_id": "glm_2_50", "judge_pick": false}, {"question": "How do you solve $3^x \\times 2^{x+4} = 6$ and express the answer in terms of $a = \\log_2 3$?", "answer": "Rewrite: $3^x \\times 2^x \\times 2^4 = 6 \\;\\Rightarrow\\; 6^x = \\frac{3}{8}$. Take $\\log_2$: $x\\log_2 6 = \\log_2 3 - \\log_2 8 = a - 3$. Since $\\log_2 6 = 1 + a$, we get $x = \\dfrac{a-3}{a+1}$.", "source": "GLM 5.1 ②", "_id": "glm_2_51", "judge_pick": true}, {"question": "What is the key insight for solving equations like $3^x \\times 2^{x+4} = 6$?", "answer": "**Rewrite to same base**: $3^x \\times 2^x = (3 \\times 2)^x = 6^x$. This combines the unknown-in-exponent terms into a single exponential.", "source": "GLM 5.1 ②", "_id": "glm_2_52", "judge_pick": true}, {"question": "When solving an exponential equation and the answer must be in terms of $a = \\log_b c$, which log base should you use?", "answer": "Use base $b$ (the base of the given constant). E.g., if $a = \\log_2 3$, use $\\log_2$ throughout. Using $\\ln$ works numerically but won't express the answer in terms of $a$.", "source": "GLM 5.1 ②", "_id": "glm_2_53", "judge_pick": true}, {"question": "What are the \"free\" log values you should instantly recognise?", "answer": "$\\log_b b = 1$ and $\\log_b(b^n) = n$. E.g., $\\log_2 2 = 1$, $\\log_2 8 = 3$, $\\log_2 16 = 4$.", "source": "GLM 5.1 ②", "_id": "glm_2_54", "judge_pick": false}, {"question": "What is the most recurring weakness across all 8 past papers?", "answer": "**Trapezium rule formula amnesia** — despite it being IN the formula booklet. Memorise: $\\frac{h}{2}[y_0 + y_n + 2(y_1 + \\cdots + y_{n-1})]$, $h = \\frac{b-a}{n}$.", "source": "GLM 5.1 ②", "_id": "glm_2_55", "judge_pick": true}, {"question": "What is the most commonly forgotten trig solution across multiple exam papers?", "answer": "The **other sin solution**: $\\sin\\theta = k \\;\\Rightarrow\\; \\theta_1 = \\arcsin(k)$ AND $\\theta_2 = \\pi - \\arcsin(k)$. Always write both.", "source": "GLM 5.1 ②", "_id": "glm_2_56", "judge_pick": false}, {"question": "What is the #1 trap with the Remainder/Factor Theorem when the divisor is $(ax - b)$?", "answer": "You substitute $x = \\dfrac{b}{a}$, **not** $x = b$. The divisor $(4x - 5)$ means substitute $x = \\frac{5}{4}$.", "source": "GLM 5.1 ②", "_id": "glm_2_57", "judge_pick": true}, {"question": "What is the standard approach when an unknown appears in the exponent?", "answer": "**Take logarithms of both sides**, choosing the base that matches any given constants. E.g., if $a = \\log_2 3$ is given, use $\\log_2$.", "source": "GLM 5.1 ②", "_id": "glm_2_58", "judge_pick": false}], "count": 59}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "What is the method of proof by exhaustion?", "answer": "Enumerate ALL valid cases that satisfy the given constraints, test each case individually, then write a compulsory conclusion sentence: \"In all cases, [statement] holds. Hence, [statement] is always true.\" ∎", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "In proof by exhaustion, how do you determine the finite set of cases to test?", "answer": "Derive constraints from the given equations. For example, from $c = b + 2$ and $a + b + c = 10$, substitute to get $a = 8 - 2b$. Then enforce $a, b, c > 0$ as integers: $b \\geq 1$ and $a > 0 \\Rightarrow b < 4$, so $b \\in \\{1, 2, 3\\}$ — only 3 cases.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": true}, {"question": "Why is it a critical error to forget the constraint $a > 0$ when enumerating cases for proof by exhaustion?", "answer": "Without checking $a > 0$, you might include invalid triples (e.g., $b = 4$ gives $a = 0$, which violates \"greater than 0\"). You must verify every constraint to ensure your cases are genuinely valid.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": true}, {"question": "What must you always include at the end of a proof by exhaustion, and what happens if you omit it?", "answer": "A **conclusion sentence** summarising that the property holds in every case. Omitting it loses the final mark — examiners mark this explicitly.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "How can you verify that $abc$ is always even for the triples where $a = 8 - 2b$, without checking each case individually?", "answer": "Since $a = 8 - 2b = 2(4 - b)$, $a$ is always even. A product containing at least one even factor is always even. This is a **deduction** argument — but exhaustion requires checking each case separately anyway.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": true}, {"question": "When $f(x)$ is divided by $(ax - b)$, what value do you substitute into $f$ to find the remainder?", "answer": "$x = \\frac{b}{a}$. The remainder is $f\\!\\left(\\frac{b}{a}\\right)$. **NOT** $x = b$ — this is the #1 trap.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "What is the general form of the Factor Theorem for a divisor $(ax - b)$?", "answer": "$(ax - b)$ is a factor of $f(x)$ $\\iff$ $f\\!\\left(\\frac{b}{a}\\right) = 0$. Same substitution $x = b/a$ as the Remainder Theorem.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "For the divisor $(4x - 5)$, what is the correct substitution to find the remainder?", "answer": "$x = \\frac{5}{4}$. Set $4x - 5 = 0 \\Rightarrow x = 5/4$. Never substitute $x = 5$ or $x = -5/4$.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "How do you solve $\\left(2 - \\frac{5k}{4}\\right)^5 = \\frac{243}{32}$ for $k$?", "answer": "Take the 5th root of both sides: $\\left(\\frac{243}{32}\\right)^{1/5} = \\frac{3}{2}$ (since $3^5 = 243$ and $2^5 = 32$). Then $2 - \\frac{5k}{4} = \\frac{3}{2} \\Rightarrow \\frac{5k}{4} = \\frac{1}{2} \\Rightarrow k = \\frac{2}{5}$.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "What is the binomial expansion formula for $(a + b)^n$?", "answer": "$$\\sum_{r=0}^{n} \\binom{n}{r} a^{n-r} b^r$$ — this is IN the formula booklet.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "When expanding $\\left(2 - \\frac{2x}{5}\\right)^5$, what is $b$ and what effect does its sign have?", "answer": "$b = -\\frac{2x}{5}$. Since $b$ is negative, all **odd-power** terms (where $r$ is odd) are negative, and all **even-power** terms are positive.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "What are the first three terms of the expansion of $\\left(2 - \\frac{2x}{5}\\right)^5$?", "answer": "$32 - 32x + \\frac{64}{5}x^2 + \\ldots$ — computed as: $r=0$: $\\binom{5}{0}(2)^5 = 32$; $r=1$: $\\binom{5}{1}(2)^4\\!\\left(-\\frac{2x}{5}\\right) = -32x$; $r=2$: $\\binom{5}{2}(2)^3\\!\\left(-\\frac{2x}{5}\\right)^2 = \\frac{64x^2}{5}$.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "How do you find the gradient of a curve at $x = 0$ using a binomial expansion?", "answer": "Differentiate the expansion term-by-term, then substitute $x = 0$. All terms with $x$ vanish, leaving only the constant coefficient of the derivative. For $f(x) \\approx 32 - 32x + \\frac{64}{5}x^2$, $f'(0) = -32$.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "What is the periodicity rule for sequences involving $\\cos(n\\alpha)$ or $\\sin(n\\alpha)$ where $\\alpha = \\frac{\\pi}{k}$?", "answer": "The sequence repeats with period $k$. Compute one full period of values, find the sum per period, then multiply by the number of complete periods and add any remainder terms.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": true}, {"question": "What are the first three values of the sequence $a_n = \\cos^2\\!\\left(\\frac{n\\pi}{3}\\right)$?", "answer": "$a_1 = \\cos^2\\!\\left(\\frac{\\pi}{3}\\right) = \\frac{1}{4}$, $a_2 = \\cos^2\\!\\left(\\frac{2\\pi}{3}\\right) = \\frac{1}{4}$, $a_3 = \\cos^2(\\pi) = 1$. The cycle is $\\frac{1}{4}, \\frac{1}{4}, 1$ with sum per period $= \\frac{3}{2}$.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "How do you sum a periodic trig sequence over $N$ terms?", "answer": "Find the period $k$ and sum per period $S$. Compute $N = q \\times k + r$ (quotient and remainder). Total $= q \\times S +$ (sum of the first $r$ terms of the cycle).", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "For $\\sum_{n=1}^{50}\\cos^2\\!\\left(\\frac{n\\pi}{3}\\right)$, how many complete periods and remainder terms are there?", "answer": "Period = 3, so $50 = 16 \\times 3 + 2$. Sum $= 16 \\times \\frac{3}{2} + \\frac{1}{4} + \\frac{1}{4} = 24 + \\frac{1}{2} = \\frac{49}{2}$. **Never forget the 2 remainder terms.**", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": true}, {"question": "What is the formula for $\\sum_{r=1}^{n} r^2$?", "answer": "$$\\frac{n(n+1)(2n+1)}{6}$$ — this is IN the formula booklet.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "What is the log subtraction law, and what is a common misuse of it?", "answer": "$\\log_a x - \\log_a y = \\log_a\\!\\left(\\frac{x}{y}\\right)$. Common misuse: writing $\\log_a(x - y)$ — this is **never** valid.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": true}, {"question": "What is the fundamental definition that connects logarithms and exponentials?", "answer": "If $\\log_a M = N$, then $a^N = M$. This is how you convert any log equation into an exponential equation.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "How do you rearrange $w = \\log_a\\!\\left(\\frac{t+5}{4}\\right)$ to make $t$ the subject?", "answer": "Exponentiate both sides: $a^w = \\frac{t+5}{4} \\Rightarrow t = 4a^w - 5$. Always exponentiate to eliminate the log.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "What trig identity converts $\\cos^2\\theta$ into an expression involving $\\sin^2\\theta$, and where is it found?", "answer": "$\\cos^2\\theta = 1 - \\sin^2\\theta$. This is **NOT** in the formula booklet — you must memorise it.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "When simplifying $(3\\cos\\theta - \\tan\\theta)\\cos\\theta$, what is the first step?", "answer": "Expand and convert $\\tan\\theta$: $3\\cos^2\\theta - \\frac{\\sin\\theta}{\\cos\\theta} \\cdot \\cos\\theta = 3\\cos^2\\theta - \\sin\\theta$. The $\\cos\\theta$ in the denominator cancels with the outer $\\cos\\theta$.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "If $\\sin\\theta = k$ where $0 < k < 1$, what are the two solutions in $[0, 2\\pi]$?", "answer": "$\\theta_1 = \\arcsin(k)$ and $\\theta_2 = \\pi - \\arcsin(k)$. **Always write both** — forgetting $\\theta_2$ is the most recurring trig error across all papers.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "If $\\sin\\theta = k$ where $-1 < k < 0$, what are the two solutions in $[-\\pi, \\pi]$?", "answer": "$\\theta_1 = \\arcsin(k)$ (negative, in $[-\\pi/2, 0]$) and $\\theta_2 = -\\pi - \\arcsin(k)$ (also negative, in $[-\\pi, -\\pi/2]$). Both are valid — check they fall within your domain.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": true}, {"question": "Why is forgetting the \"other sin solution\" such a dangerous recurring error?", "answer": "Because $\\sin\\theta = k$ always has **two** solutions per period (except $k = \\pm 1$). Missing one means losing multiple marks. This error has appeared in Papers 3, 5, 7, and 8.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "When solving a trig equation in $n\\theta$ on the interval $\\alpha \\leq x \\leq \\beta$, how do you determine the range for the compound angle?", "answer": "Multiply the entire interval by $n$: the range for $n\\theta$ is $[n\\alpha, n\\beta]$. For $2x$ on $[-\\pi/2, \\pi/2]$, solve for $2x$ on $[-\\pi, \\pi]$.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": true}, {"question": "When solving $3\\sin^2(2x) + \\sin(2x) - 1 = 0$ for $-\\frac{\\pi}{2} \\leq x \\leq \\frac{\\pi}{2}$, how many solutions should you expect?", "answer": "The quadratic in $\\sin(2x)$ gives two values of $\\sin(2x)$. Each value yields two solutions for $2x$ in $[-\\pi, \\pi]$, giving **4 solutions** for $x$ in $[-\\pi/2, \\pi/2]$.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": true}, {"question": "How do you tell whether a trig equation should be solved in radians or degrees?", "answer": "Look at the interval: if it contains $\\pi$ (e.g., $[-\\pi/2, \\pi/2]$), use radians. If it contains degree symbols, use degrees. Never mix them.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "What is the trapezium rule formula for estimating $\\int_a^b y\\,dx$ with $n$ strips?", "answer": "$$\\frac{h}{2}\\left[y_0 + y_n + 2(y_1 + y_2 + \\ldots + y_{n-1})\\right]$$ where $h = \\frac{b-a}{n}$. This is **IN the formula booklet** — yet it remains the #1 recurring formula-amnesia error across 8 papers.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": false}, {"question": "In the trapezium rule, which $y$-values are doubled and which are not?", "answer": "Only the **interior** ordinates $y_1, y_2, \\ldots, y_{n-1}$ are doubled. The two **endpoint** ordinates $y_0$ and $y_n$ are added once only.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": false}, {"question": "Why is the trapezium rule formula the top priority flashcard despite being in the formula booklet?", "answer": "It has been forgotten in Papers 1, 3, 5, 6, and 8 — the most frequently missed formula across all papers. Having it in the booklet doesn't help if you don't recognise when to use it or how to apply it.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": false}, {"question": "What is the formula for the area between two curves $y = f(x)$ (upper) and $y = g(x)$ (lower) from $x = a$ to $x = b$?", "answer": "$$\\int_a^b \\left[f(x) - g(x)\\right]\\,dx$$ — always upper minus lower.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "When using the trapezium rule to find the area between two curves, what are the two approaches?", "answer": "**Approach 1:** Compute new $y$-values $= y_{C_1} - y_{C_2}$ at each $x$, then apply trapezium rule to these differences. **Approach 2:** Find area under $C_1$ (trapezium rule), find area under $C_2$ (integrate exactly if it's a simple function), then subtract.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": false}, {"question": "How do you calculate the percentage of a region that is shaded?", "answer": "$\\frac{\\text{shaded area}}{\\text{total area}} \\times 100$. For a logo inside a rectangle: percentage $= \\frac{\\text{area of } R}{\\text{area of rectangle}} \\times 100$.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": false}, {"question": "When simplifying $\\frac{12x^4 - 84x^3 + 182x^2 - 210x}{21x^{1/2}}$, what is the correct approach?", "answer": "Divide **term-by-term**: each numerator term divided by $21x^{1/2}$ separately. E.g., $\\frac{12x^4}{21x^{1/2}} = \\frac{12}{21}x^{7/2} = \\frac{4}{7}x^{7/2}$. Never try to simplify the whole fraction at once.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": false}, {"question": "When dividing $x^n$ by $x^{1/2}$, what is the resulting power?", "answer": "$x^{n - 1/2}$. For example: $x^4 \\div x^{1/2} = x^{7/2}$, $x^3 \\div x^{1/2} = x^{5/2}$, $x^2 \\div x^{1/2} = x^{3/2}$, $x \\div x^{1/2} = x^{1/2}$.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": false}, {"question": "What is a common arithmetic pitfall when simplifying fractional-power expressions?", "answer": "Forgetting to divide **every** coefficient by 21 (or whatever the denominator constant is). Do each step on a separate line and verify each coefficient.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": false}, {"question": "Does the power rule $\\frac{d}{dx}x^n = nx^{n-1}$ work for fractional $n$?", "answer": "Yes — it works for **all rational** $n$, not just integers. E.g., $\\frac{d}{dx}x^{7/2} = \\frac{7}{2}x^{5/2}$.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": false}, {"question": "When setting $\\frac{dy}{dx} = 0$ and the derivative contains $x^{-1/2}$, how do you eliminate the negative power?", "answer": "Multiply through by $x^{1/2}$ (valid since $x > 0$). This converts $2x^{5/2} - 10x^{3/2} + 13x^{1/2} - 5x^{-1/2} = 0$ into $2x^3 - 10x^2 + 13x - 5 = 0$.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": false}, {"question": "Given $x = 1$ is a root of $2x^3 - 10x^2 + 13x - 5 = 0$, how do you find the other roots?", "answer": "Factor out $(x - 1)$ by polynomial division: $(x-1)(2x^2 - 8x + 5) = 0$. Then solve $2x^2 - 8x + 5 = 0$ using the quadratic formula.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": true}, {"question": "When a question asks for \"exact\" x-coordinates, what form must your answer take?", "answer": "**Surd form** — e.g., $x = \\frac{4 \\pm \\sqrt{6}}{2}$. Never give decimal approximations when \"exact\" is specified.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": false}, {"question": "What is the formula for the sum to infinity of a geometric sequence, and when is it valid?", "answer": "$S_\\infty = \\frac{a}{1 - r}$, valid only when $|r| < 1$. This is IN the formula booklet.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": false}, {"question": "What is the formula for the $n$th term of a geometric sequence, and where is it found?", "answer": "$u_n = ar^{n-1}$. This is **NOT** in the formula booklet — you must memorise it.", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": false}, {"question": "What is the formula for the sum of the first $n$ terms of a geometric sequence?", "answer": "$S_n = \\frac{a(1 - r^n)}{1 - r}$. This is IN the formula booklet.", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": false}, {"question": "Given $S_\\infty = 3a$, how do you show $r = \\frac{2}{3}$?", "answer": "$\\frac{a}{1-r} = 3a \\Rightarrow \\frac{1}{1-r} = 3 \\Rightarrow 1-r = \\frac{1}{3} \\Rightarrow r = \\frac{2}{3}$. Cancel $a$ first (since $a \\neq 0$).", "source": "GLM 5.1 ③", "_id": "glm_3_45", "judge_pick": false}, {"question": "What is the standard form of a circle equation and how do you identify the centre and radius?", "answer": "$(x - a)^2 + (y - b)^2 = r^2$ gives centre $(a, b)$ and radius $r$. This is **NOT** in the formula booklet — memorise it.", "source": "GLM 5.1 ③", "_id": "glm_3_46", "judge_pick": true}, {"question": "How do you find the radius of a circle given the centre $T$ and a point $A$ on the circle?", "answer": "$r^2 = (x_A - x_T)^2 + (y_A - y_T)^2$ — the distance between centre and any point on the circle.", "source": "GLM 5.1 ③", "_id": "glm_3_47", "judge_pick": false}, {"question": "What is the relationship between the gradient of a tangent to a circle and the gradient of the radius at the same point?", "answer": "$m_{\\text{tangent}} \\times m_{\\text{radius}} = -1$. The tangent is perpendicular to the radius, so their gradients are negative reciprocals.", "source": "GLM 5.1 ③", "_id": "glm_3_48", "judge_pick": false}, {"question": "How do you classify a turning point as a maximum or minimum using the second derivative?", "answer": "If $\\frac{d^2y}{dx^2} > 0$ at the point → local **minimum**. If $\\frac{d^2y}{dx^2} < 0$ → local **maximum**.", "source": "GLM 5.1 ③", "_id": "glm_3_49", "judge_pick": false}, {"question": "When finding the exact area between a curve and a line from $x = a$ to $x = b$, what must you verify before integrating?", "answer": "Which function is **upper** and which is **lower** on $[a, b]$. Check at a sample point (e.g., $x = 0$) to confirm. Then integrate $\\int_a^b (\\text{upper} - \\text{lower})\\,dx$.", "source": "GLM 5.1 ③", "_id": "glm_3_50", "judge_pick": true}, {"question": "What key identity allows you to combine $3^x \\times 2^x$ into a single exponential?", "answer": "$3^x \\times 2^x = (3 \\times 2)^x = 6^x$. This is the **key insight** for solving equations where the unknown appears in multiple exponents with the same power.", "source": "GLM 5.1 ③", "_id": "glm_3_51", "judge_pick": true}, {"question": "When solving $6^x = \\frac{3}{8}$ and the answer must be in terms of $a = \\log_2 3$, which log base must you use?", "answer": "**Base 2** — because $a$ is defined as $\\log_2 3$. Using $\\ln$ would give an answer in terms of $\\ln 2$ and $\\ln 3$, not $a$.", "source": "GLM 5.1 ③", "_id": "glm_3_52", "judge_pick": false}, {"question": "How do you express $\\log_2 6$ in terms of $a = \\log_2 3$?", "answer": "$\\log_2 6 = \\log_2(2 \\times 3) = \\log_2 2 + \\log_2 3 = 1 + a$. Always decompose into known log values: $\\log_2 2 = 1$, $\\log_2 4 = 2$, $\\log_2 8 = 3$, $\\log_2 16 = 4$.", "source": "GLM 5.1 ③", "_id": "glm_3_53", "judge_pick": false}, {"question": "How do you express $\\log_2\\!\\left(\\frac{3}{8}\\right)$ in terms of $a = \\log_2 3$?", "answer": "$\\log_2 3 - \\log_2 8 = a - 3$. Recognise that $8 = 2^3$, so $\\log_2 8 = 3$.", "source": "GLM 5.1 ③", "_id": "glm_3_54", "judge_pick": true}, {"question": "What is the solution to $3^x \\times 2^{x+4} = 6$ in terms of $a = \\log_2 3$?", "answer": "Rewrite as $6^x \\times 16 = 6 \\Rightarrow 6^x = \\frac{3}{8}$. Take $\\log_2$: $x(1 + a) = a - 3 \\Rightarrow x = \\frac{a - 3}{a + 1}$.", "source": "GLM 5.1 ③", "_id": "glm_3_55", "judge_pick": false}, {"question": "What are the five most recurring failure modes across 8 past papers (44 redo questions)?", "answer": "(1) **Trapezium rule formula amnesia** (Papers 1,3,5,6,8), (2) **Forgetting the other sin solution** (Papers 3,5,7,8), (3) **Remainder Theorem with $(ax-b)$** (Papers 4,5,8), (4) **Unknown in exponent → take logs** (Papers 1,7,8,10), (5) **Proof by exhaustion method** (Papers 1,7,8).", "source": "GLM 5.1 ③", "_id": "glm_3_56", "judge_pick": true}, {"question": "What is the single most important formula to memorise despite it being in the formula booklet?", "answer": "The **trapezium rule**: $\\int_a^b y\\,dx \\approx \\frac{h}{2}[y_0 + y_n + 2(y_1 + \\ldots + y_{n-1})]$, $h = \\frac{b-a}{n}$. Forgotten in 5 out of 8 papers.", "source": "GLM 5.1 ③", "_id": "glm_3_57", "judge_pick": false}, {"question": "What is the single most important trig rule that is NOT in the formula booklet?", "answer": "$\\cos^2\\theta = 1 - \\sin^2\\theta$ — essential for converting between sin and cos in identity proofs. Not in the booklet; must be memorised.", "source": "GLM 5.1 ③", "_id": "glm_3_58", "judge_pick": true}, {"question": "What is the golden rule for solving $\\sin\\theta = k$ in any interval?", "answer": "**Always find two solutions per period**: $\\theta_1 = \\arcsin(k)$ and $\\theta_2 = \\pi - \\arcsin(k)$ (or $180° - \\theta_1$). Then generate further solutions using the period $2\\pi$ (or $360°$) if the interval requires it.", "source": "GLM 5.1 ③", "_id": "glm_3_59", "judge_pick": false}], "count": 60}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "What is the method for proving a statement by exhaustion?", "answer": "Enumerate **all valid cases** derived from constraints, test each case individually, and conclude with a statement like \"In all cases, the property holds.\"", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why is the product $abc$ always even in Q1?", "answer": "Because $a = 8 - 2b$ is always even (since $2b$ is even), making at least one factor in $abc$ even.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": true}, {"question": "What is a common pitfall in proof by exhaustion?", "answer": "Forgetting to verify that all cases satisfy the original constraints (e.g., $a > 0$ in Q1).", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "What is the general form of the Remainder Theorem for divisor $(ax - b)$?", "answer": "The remainder is $f\\left(\\frac{b}{a}\\right)$. For example, if dividing by $(4x - 5)$, substitute $x = \\frac{5}{4}$.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "Why is the 5th root of $\\frac{243}{32}$ equal to $\\frac{3}{2}$?", "answer": "Because $3^5 = 243$ and $2^5 = 32$, so $\\left(\\frac{243}{32}\\right)^{1/5} = \\frac{3}{2}$.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "What is the gradient of $f(x) = \\left(2 - \\frac{2x}{5}\\right)^5$ at $x = 0$?", "answer": "Differentiate the binomial expansion:\n$$\nf'(x) = -32 + \\frac{128}{5}x + \\ldots \\quad \\Rightarrow \\quad f'(0) = -32.\n$$", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "What is the period of $a_n = \\cos^2\\left(\\frac{n\\pi}{3}\\right)$?", "answer": "The sequence repeats every 3 terms: $\\frac{1}{4}, \\frac{1}{4}, 1$.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "How to compute $\\sum_{n=1}^{50} \\cos^2\\left(\\frac{n\\pi}{3}\\right)$?", "answer": "Each period (3 terms) sums to $\\frac{3}{2}$. For 50 terms:\n$$\n16 \\text{ full periods} \\times \\frac{3}{2} + \\text{last 2 terms} = 24 + \\frac{1}{2} = \\frac{49}{2}.\n$$", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "What is the formula for $\\sum_{r=1}^n r^2$?", "answer": "$\\frac{n(n+1)(2n+1)}{6}$. For $n = 50$, this gives $42925$.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "How to show $(3\\cos\\theta - \\tan\\theta)\\cos\\theta = 2$ becomes $3\\sin^2\\theta + \\sin\\theta - 1 = 0$?", "answer": "Expand, substitute $\\tan\\theta = \\frac{\\sin\\theta}{\\cos\\theta}$, and replace $\\cos^2\\theta = 1 - \\sin^2\\theta$.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "How many solutions does $\\sin(2x) = k$ have in $-\\frac{\\pi}{2} \\leq x \\leq \\frac{\\pi}{2}$?", "answer": "**Two solutions per valid $k$** due to $\\sin(2x) = k \\Rightarrow 2x = \\arcsin(k)$ or $\\pi - \\arcsin(k)$, scaled to the domain.", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "What is the critical mistake when solving trig equations like $\\sin(2x) = k$?", "answer": "Forgetting the second solution $\\pi - \\arcsin(k)$, leading to missing roots.", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "What is the trapezium rule formula for $n$ intervals?", "answer": "$$\n\\int_a^b y\\,dx \\approx \\frac{h}{2}\\left[y_0 + y_n + 2(y_1 + \\ldots + y_{n-1})\\right], \\quad h = \\frac{b-a}{n}.\n$$", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "How to find the area between two curves using the trapezium rule?", "answer": "Compute the area under each curve separately (via trapezium rule or exact integration) and subtract.", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "What is the percentage of the logo shaded in Q6?", "answer": "$$\n\\frac{\\text{Area of } R}{\\text{Rectangle area}} \\times 100 = \\frac{1.345}{6} \\times 100 \\approx 22.4\\%.\n$$", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}, {"question": "How to simplify $y = \\frac{12x^3(x-7) + 14x(13x-15)}{21x^{1/2}}$?", "answer": "Expand the numerator, divide each term by $21x^{1/2}$, and simplify exponents:\n$$\ny = \\frac{4}{7}x^{7/2} - 4x^{5/2} + \\frac{26}{3}x^{3/2} - 10x^{1/2}.\n$$", "source": "Qwen 3 ①", "_id": "qwen_1_15", "judge_pick": false}, {"question": "How to find turning points for $y = ax^{7/2} + bx^{5/2} + cx^{3/2} + dx^{1/2}$?", "answer": "Differentiate, set $\\frac{dy}{dx} = 0$, and multiply through by $x^{1/2}$ to eliminate negative exponents.", "source": "Qwen 3 ①", "_id": "qwen_1_16", "judge_pick": false}, {"question": "What is the cubic equation for turning points in Q7?", "answer": "$$\n2x^3 - 10x^2 + 13x - 5 = 0.\n$$", "source": "Qwen 3 ①", "_id": "qwen_1_17", "judge_pick": false}, {"question": "Given $a = \\log_2 3$, how to express $\\log_2 9$ in terms of $a$?", "answer": "$\\log_2 9 = \\log_2 3^2 = 2\\log_2 3 = 2a$.", "source": "Qwen 3 ①", "_id": "qwen_1_18", "judge_pick": false}, {"question": "How to solve $3^x \\times 2^{x+4} = 6$ in terms of $a = \\log_2 3$?", "answer": "$$\n6^x = \\frac{3}{8} \\Rightarrow x = \\frac{\\log_2(3/8)}{\\log_2 6} = \\frac{a - 3}{1 + a}.\n$$", "source": "Qwen 3 ①", "_id": "qwen_1_19", "judge_pick": false}, {"question": "What is the formula for $\\log_a x - \\log_a y$?", "answer": "$\\log_a\\left(\\frac{x}{y}\\right)$. **Not** $\\log_a(x - y)$.", "source": "Qwen 3 ①", "_id": "qwen_1_20", "judge_pick": false}, {"question": "How to find the equation of a circle with center $(a, b)$ and radius $r$?", "answer": "$(x - a)^2 + (y - b)^2 = r^2$.", "source": "Qwen 3 ①", "_id": "qwen_1_21", "judge_pick": false}, {"question": "What is the gradient of the tangent to a circle at point $A$?", "answer": "The negative reciprocal of the gradient of the radius $TA$:\n$$\nm_{\\text{tangent}} = -\\frac{1}{m_{TA}}.\n$$", "source": "Qwen 3 ①", "_id": "qwen_1_22", "judge_pick": false}, {"question": "How to find the area bounded by a curve and a line?", "answer": "Integrate the difference between the upper and lower functions over the interval:\n$$\n\\int_a^b (\\text{upper} - \\text{lower})\\,dx.\n$$", "source": "Qwen 3 ①", "_id": "qwen_1_23", "judge_pick": false}, {"question": "What is the key step in proof by exhaustion?", "answer": "Enumerate **all valid cases** and test each individually.", "source": "Qwen 3 ①", "_id": "qwen_1_24", "judge_pick": false}, {"question": "What is the formula for the sum of a geometric series $S_\\infty$?", "answer": "$S_\\infty = \\frac{a}{1 - r}$ for $|r| < 1$.", "source": "Qwen 3 ①", "_id": "qwen_1_25", "judge_pick": false}, {"question": "How to handle binomial expansions with negative terms like $-2x/5$?", "answer": "Substitute $b = -2x/5$ into the binomial formula and track signs carefully.", "source": "Qwen 3 ①", "_id": "qwen_1_26", "judge_pick": false}], "count": 27}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "What is the key requirement for a proof by exhaustion?", "answer": "Test **all valid cases** in a finite set. Derive constraints to list every possibility, then verify the statement holds for each.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Why must the conclusion sentence be included in a proof by exhaustion?", "answer": "Examiners explicitly award marks for stating *\"In all cases, [statement] holds.\"* Omitting it leaves the proof incomplete.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Given $ a + b + c = 10 $ and $ c = b + 2 $, why is $ a = 8 - 2b $?", "answer": "Substitute $ c = b + 2 $ into $ a + b + c = 10 $:\n$$ a + b + (b + 2) = 10 \\Rightarrow a = 8 - 2b $$", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": true}, {"question": "When dividing a polynomial $ f(x) $ by $ (ax - b) $, what value of $ x $ gives the remainder?", "answer": "Substitute $ x = \\frac{b}{a} $. The remainder is $ f\\left(\\frac{b}{a}\\right) $.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Why is the 5th root of $ \\frac{243}{32} $ equal to $ \\frac{3}{2} $?", "answer": "$ 3^5 = 243 $ and $ 2^5 = 32 $, so $ \\left(\\frac{243}{32}\\right)^{1/5} = \\frac{3}{2} $.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": true}, {"question": "In the binomial expansion of $ (2 - \\frac{2x}{5})^5 $, why is the coefficient of $ x^2 $ positive?", "answer": "The term involves $ (-\\frac{2x}{5})^2 $, which squares the negative sign, yielding a positive coefficient.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Why does $ \\cos^2\\left(\\frac{n\\pi}{3}\\right) $ repeat every 3 terms?", "answer": "The cosine function has period $ 2\\pi $, so $ \\frac{n\\pi}{3} $ cycles every $ n = 3 $, making $ \\cos^2 $ repeat every 3 terms.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": true}, {"question": "How to compute $ \\sum_{n=1}^{50} \\cos^2\\left(\\frac{n\\pi}{3}\\right) $?", "answer": "Use periodicity:\n- One cycle sum = $ \\frac{1}{4} + \\frac{1}{4} + 1 = \\frac{3}{2} $.  \n- $ 50 = 16 \\times 3 + 2 $, so total = $ 16 \\times \\frac{3}{2} + \\frac{1}{4} + \\frac{1}{4} = \\frac{49}{2} $.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "How to solve $ \\sin(2x) = k $ for $ -\\frac{\\pi}{2} \\leq x \\leq \\frac{\\pi}{2} $?", "answer": "Scale domain to $ -\\pi \\leq 2x \\leq \\pi $. Find all solutions for $ 2x $, then divide by 2.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "Why does $ \\sin\\theta = k $ have two solutions in $ [0, 2\\pi] $?", "answer": "$ \\theta_1 = \\arcsin(k) $ and $ \\theta_2 = \\pi - \\arcsin(k) $. Omitting $ \\theta_2 $ is a common error.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": true}, {"question": "What is the trapezium rule formula for $ n $ intervals?", "answer": "$$\n\\int_a^b y\\,dx \\approx \\frac{h}{2}[y_0 + y_n + 2(y_1 + \\dots + y_{n-1})], \\quad h = \\frac{b-a}{n}\n$$", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "How to find the area between two curves using the trapezium rule?", "answer": "Compute $ y_{\\text{new}} = y_{C_1} - y_{C_2} $ at each $ x $, then apply the trapezium rule to $ y_{\\text{new}} $.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}, {"question": "How to differentiate $ x^{7/2} $?", "answer": "Multiply by the exponent, reduce exponent by 1:\n$$\n\\frac{d}{dx}x^{7/2} = \\frac{7}{2}x^{5/2}\n$$", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": false}, {"question": "Why multiply $ \\frac{dy}{dx} = 2x^{5/2} - 10x^{3/2} + 13x^{1/2} - 5x^{-1/2} $ by $ x^{1/2} $?", "answer": "To eliminate negative exponents:\n$$\nx^{1/2} \\cdot \\frac{dy}{dx} = 2x^3 - 10x^2 + 13x - 5\n$$", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": true}, {"question": "Given $ a = \\log_2 3 $, express $ \\log_2 6 $ in terms of $ a $.", "answer": "$$\n\\log_2 6 = \\log_2 (2 \\times 3) = 1 + \\log_2 3 = 1 + a\n$$", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": false}, {"question": "How to solve $ 3^x \\times 2^{x+4} = 6 $ in terms of $ a $?", "answer": "1. Rewrite as $ 6^x \\times 16 = 6 $.  \n2. Take $ \\log_2 $: $ x \\log_2 6 = \\log_2 \\left(\\frac{3}{8}\\right) $.  \n3. Substitute $ \\log_2 6 = 1 + a $, $ \\log_2 \\frac{3}{8} = a - 3 $.  \n4. Solve: $ x = \\frac{a - 3}{1 + a} $.", "source": "Qwen 3 ②", "_id": "qwen_2_15", "judge_pick": true}, {"question": "What is the most common mistake with the trapezium rule?", "answer": "Forgetting to double **interior** ordinates and/or misapplying the formula.", "source": "Qwen 3 ②", "_id": "qwen_2_16", "judge_pick": false}, {"question": "How to handle $ \\sin(n\\theta) = k $?", "answer": "Scale domain to $ n\\theta \\in [\\alpha, \\beta] $, solve for $ n\\theta $, then divide by $ n $.", "source": "Qwen 3 ②", "_id": "qwen_2_17", "judge_pick": false}, {"question": "What is the key step when applying the Remainder Theorem to $ (ax - b) $?", "answer": "Substitute $ x = \\frac{b}{a} $ into the polynomial to find the remainder.", "source": "Qwen 3 ②", "_id": "qwen_2_18", "judge_pick": false}], "count": 19}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "What is the Remainder Theorem for a divisor of the form $(ax - b)$?", "answer": "When polynomial $f(x)$ is divided by $(ax - b)$, the remainder is $f\\left(\\frac{b}{a}\\right)$. You substitute $x = \\frac{b}{a}$, NOT $x = b$.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "What is the period of $\\cos^2\\left(\\frac{n\\pi}{3}\\right)$ and what values does it take?", "answer": "The sequence repeats every 3 terms. Values: $a_1 = \\cos^2(\\frac{\\pi}{3}) = \\frac{1}{4}$, $a_2 = \\cos^2(\\frac{2\\pi}{3}) = \\frac{1}{4}$, $a_3 = \\cos^2(\\pi) = 1$. Pattern: $\\frac{1}{4}, \\frac{1}{4}, 1, \\frac{1}{4}, \\frac{1}{4}, 1, \\ldots$ Sum per period = $\\frac{3}{2}$.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "If $w = \\log_a(t+5) - \\log_a 4$ and $w = 10$ when $t = 3$, how do you find $a$?", "answer": "Substitute: $10 = \\log_a(8) - \\log_a(4) = \\log_a(2)$\nSo $a^{10} = 2$, therefore $a = 2^{1/10} \\approx 1.072$", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "How do you simplify $(3\\cos\\theta - \\tan\\theta)\\cos\\theta$ to involve only $\\sin\\theta$?", "answer": "$(3\\cos\\theta - \\frac{\\sin\\theta}{\\cos\\theta})\\cos\\theta = 3\\cos^2\\theta - \\sin\\theta$\nUsing $\\cos^2\\theta = 1 - \\sin^2\\theta$: $= 3(1 - \\sin^2\\theta) - \\sin\\theta = 3 - 3\\sin^2\\theta - \\sin\\theta$\nSetting equal to 2: $3\\sin^2\\theta + \\sin\\theta - 1 = 0$", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "What is the trapezium rule formula for estimating $\\int_a^b f(x)\\,dx$ with $n$ equal strips?", "answer": "$\\int_a^b f(x)\\,dx \\approx \\frac{h}{2}[y_0 + y_n + 2(y_1 + y_2 + \\ldots + y_{n-1})]$, where $h = \\frac{b-a}{n}$. Note: Only the interior ordinates ($y_1$ to $y_{n-1}$) are doubled; endpoints are added once.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "How do you simplify $y = \\frac{12x^3(x-7) + 14x(13x-15)}{21x^{1/2}}$ into the form $ax^{7/2} + bx^{5/2} + cx^{3/2} + dx^{1/2}$?", "answer": "Multiply out numerator: $12x^4 - 84x^3 + 182x^2 - 210x$\nDivide each term by $21x^{1/2}$:\n$y = \\frac{12}{21}x^{7/2} - \\frac{84}{21}x^{5/2} + \\frac{182}{21}x^{3/2} - \\frac{210}{21}x^{1/2}$\n$y = \\frac{4}{7}x^{7/2} - 4x^{5/2} + \\frac{26}{3}x^{3/2} - 10x^{1/2}$", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "If $S_\\infty = 3a$ for a geometric sequence with first term $a$ and common ratio $r$, what is $r$?", "answer": "$S_\\infty = \\frac{a}{1-r} = 3a$\n$\\frac{1}{1-r} = 3$\n$1 - r = \\frac{1}{3}$\n$r = \\frac{2}{3}$", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "What is the equation of a circle with centre $(a, b)$ and radius $r$?", "answer": "$(x - a)^2 + (y - b)^2 = r^2$ (NOT in formula booklet — memorize!)", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "If $a = \\log_2 3$, express $\\log_2 9$ and $\\log_2\\left(\\frac{3}{16}\\right)$ in terms of $a$.", "answer": "- $\\log_2 9 = \\log_2 3^2 = 2\\log_2 3 = 2a$\n- $\\log_2\\left(\\frac{3}{16}\\right) = \\log_2 3 - \\log_2 16 = a - 4$", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}], "count": 9}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "In a proof by exhaustion, what two conditions must be satisfied for the proof to be valid?", "answer": "(1) The set of cases must be **finite and exhaustive** — you must test ALL possible cases. (2) The conclusion must hold for **every single case** without exception. If any case fails, the proof fails.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": true}, {"question": "Given $a + b + c = 10$ and $c = b + 2$ with $a, b, c > 0$, how do you find the finite set of cases to test?", "answer": "Substitute $c = b + 2$ into the sum: $a + b + (b + 2) = 10 \\Rightarrow a = 8 - 2b$. Since $a > 0$, we need $8 - 2b > 0 \\Rightarrow b < 4$. With $b$ a positive integer, $b \\in \\{1, 2, 3\\}$. This gives exactly 3 cases to test.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": true}, {"question": "What is the compulsory final statement in a proof by exhaustion that examiners look for?", "answer": "A conclusion sentence explicitly stating all cases have been verified, e.g., \"In all three cases, $abc$ is even. Hence, the product $abc$ is always even. ∎\"", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "What is the general form of the Remainder Theorem when dividing by $(ax - b)$ rather than $(x - a)$?", "answer": "When polynomial $f(x)$ is divided by $(ax - b)$, the remainder is $f\\left(\\frac{b}{a}\\right)$. You substitute $x = \\frac{b}{a}$, NOT $x = b$.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "Why does the substitution $x = \\frac{b}{a}$ work for divisor $(ax - b)$?", "answer": "Setting $ax - b = 0$ gives $x = \\frac{b}{a}$. This is the \"root\" of the divisor — the value that makes the divisor zero. The Remainder Theorem states: remainder = f(root of divisor).", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": true}, {"question": "How does the Factor Theorem extend to $(ax - b)$ as a factor?", "answer": "$(ax - b)$ is a factor of $f(x)$ if and only if $f\\left(\\frac{b}{a}\\right) = 0$.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "Given $f(x) = (2 - kx)^5$ and remainder $\\frac{243}{32}$ when divided by $(4x - 5)$, find $k$.", "answer": "For divisor $(4x - 5)$, substitute $x = \\frac{5}{4}$:\n$$f\\left(\\frac{5}{4}\\right) = \\left(2 - \\frac{5k}{4}\\right)^5 = \\frac{243}{32} = \\left(\\frac{3}{2}\\right)^5$$\n$$2 - \\frac{5k}{4} = \\frac{3}{2} \\Rightarrow \\frac{5k}{4} = \\frac{1}{2} \\Rightarrow k = \\frac{2}{5}$$", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "In the binomial expansion $(a + b)^n$, what is the general term $T_{r+1}$?", "answer": "$T_{r+1} = \\binom{n}{r} a^{n-r} b^r$ where $r = 0, 1, 2, \\ldots, n$", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": true}, {"question": "When expanding $\\left(2 - \\frac{2x}{5}\\right)^5$, what is the coefficient of $x$ and why?", "answer": "For the $x^1$ term: $r = 1$, so $\\binom{5}{1}(2)^4\\left(-\\frac{2x}{5}\\right) = 5 \\times 16 \\times \\left(-\\frac{2x}{5}\\right) = -32x$. The coefficient is $-32$.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": true}, {"question": "How do you find the gradient of a curve $y = f(x)$ at $x = 0$ from its binomial expansion?", "answer": "The gradient (derivative) at $x = 0$ is the coefficient of $x$ in the expansion. If $f(x) = a_0 + a_1 x + a_2 x^2 + \\ldots$, then $f'(0) = a_1$.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": true}, {"question": "For a sequence defined by $a_n = \\cos^2\\left(\\frac{n\\pi}{3}\\right)$, what is the period and why?", "answer": "Period = 3. Since $\\cos^2\\theta$ has period $\\pi$, and $\\frac{n\\pi}{3}$ increments by $\\frac{\\pi}{3}$, the values repeat when $n$ increases by 3: $\\cos^2\\left(\\frac{(n+3)\\pi}{3}\\right) = \\cos^2\\left(\\frac{n\\pi}{3} + \\pi\\right) = \\cos^2\\left(\\frac{n\\pi}{3}\\right)$.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": true}, {"question": "What are the first three values of $\\cos^2\\left(\\frac{n\\pi}{3}\\right)$ for $n = 1, 2, 3$?", "answer": "$a_1 = \\cos^2(\\pi/3) = (1/2)^2 = \\frac{1}{4}$\n$a_2 = \\cos^2(2\\pi/3) = (-1/2)^2 = \\frac{1}{4}$\n$a_3 = \\cos^2(\\pi) = (-1)^2 = 1$", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "To sum a periodic sequence over $N$ terms, what must you calculate besides the number of complete cycles?", "answer": "You must calculate the **remainder terms** — the values for the terms after the last complete cycle. For example, if the period is 3 and $N = 50$, then $50 = 16 \\times 3 + 2$, so you need the first 2 terms of the cycle for the remainder.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "What is the sum of one complete period of $\\cos^2(n\\pi/3)$?", "answer": "$\\frac{1}{4} + \\frac{1}{4} + 1 = \\frac{3}{2}$", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "If $\\log_a M = N$, what does this mean in terms of exponentials?", "answer": "$a^N = M$. This is the fundamental definition of logarithm: the exponent to which the base $a$ must be raised to give $M$.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "What is the correct log law for $\\log_a x - \\log_a y$?", "answer": "$\\log_a x - \\log_a y = \\log_a\\left(\\frac{x}{y}\\right)$. Common error: confusing with $\\log_a(x - y)$.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": true}, {"question": "If $a = \\log_2 3$, express $\\log_2 9$ in terms of $a$.", "answer": "$\\log_2 9 = \\log_2(3^2) = 2\\log_2 3 = 2a$", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "If $a = \\log_2 3$, express $\\log_2\\left(\\frac{3}{16}\\right)$ in terms of $a$.", "answer": "$\\log_2\\left(\\frac{3}{16}\\right) = \\log_2 3 - \\log_2 16 = a - 4$ (since $16 = 2^4$)", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "Given $a = \\log_2 3$, what is $\\log_2 6$ in terms of $a$?", "answer": "$\\log_2 6 = \\log_2(2 \\times 3) = \\log_2 2 + \\log_2 3 = 1 + a$", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "What is the general method to solve $3^x \\times 2^{x+4} = 6$?", "answer": "(1) Rewrite so bases match: $3^x \\times 2^x \\times 2^4 = (3 \\times 2)^x \\times 16 = 6^x \\times 16 = 6$\n(2) So $6^x = \\frac{6}{16} = \\frac{3}{8}$\n(3) Take logarithm of the appropriate base and solve", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "When solving exponential equations, why should you use the base indicated in the given log definition?", "answer": "If given $a = \\log_2 3$, you should use $\\log_2$ because it allows you to express the answer in terms of $a$. Using $\\ln$ would give an answer in terms of $\\ln 2$ and $\\ln 3$, which is not what is asked.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "Solve $3^x \\times 2^{x+4} = 6$ giving the answer in terms of $a = \\log_2 3$.", "answer": "$6^x = \\frac{3}{8}$. Taking $\\log_2$: $x\\log_2 6 = \\log_2\\left(\\frac{3}{8}\\right)$\n$x(1 + a) = a - 3$\n$x = \\frac{a - 3}{a + 1}$", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "How do you transform $(3\\cos\\theta - \\tan\\theta)\\cos\\theta = 2$ into a quadratic in $\\sin\\theta$?", "answer": "$$3\\cos^2\\theta - \\sin\\theta = 2$$\nUsing $\\cos^2\\theta = 1 - \\sin^2\\theta$:\n$$3(1 - \\sin^2\\theta) - \\sin\\theta = 2$$\n$$3\\sin^2\\theta + \\sin\\theta - 1 = 0$$", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "What is the identity $\\cos^2\\theta = 1 - \\sin^2\\theta$ used for, and is it in the formula booklet?", "answer": "It converts equations involving $\\cos\\theta$ into equations in $\\sin\\theta$ only (or vice versa). It is NOT in the formula booklet — **you must memorise it**.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": true}, {"question": "If $\\sin\\theta = k$ where $k$ is a value between -1 and 1, what are the two solutions in the interval $[0, \\pi]$?", "answer": "$\\theta_1 = \\arcsin(k)$ and $\\theta_2 = \\pi - \\arcsin(k)$. This is the \"other solution\" that students frequently forget.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "When solving an equation containing $\\sin(2x)$ for $x$ in $[-\\frac{\\pi}{2}, \\frac{\\pi}{2}]$, what is the effective range for $2x$?", "answer": "Multiply the range by 2: $2x \\in [-\\pi, \\pi]$. You must solve for $2x$ in this expanded range, then divide by 2 to find $x$.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "Solve $3\\sin^2(2x) + \\sin(2x) - 1 = 0$ for $-\\frac{\\pi}{2} \\leq x \\leq \\frac{\\pi}{2}$. What are the four solutions?", "answer": "Let $u = \\sin(2x)$. Then $3u^2 + u - 1 = 0$\n$u = \\frac{-1 \\pm \\sqrt{13}}{6}$ giving $u_1 \\approx 0.434$, $u_2 \\approx -0.768$\n\nFor $u_1 = 0.434$: $2x \\approx 0.449$ or $\\pi - 0.449 \\approx 2.693$\n$x \\approx 0.225$ or $1.35$\n\nFor $u_2 = -0.768$: $2x \\approx -0.875$ or $-\\pi - (-0.875) \\approx -2.267$\n$x \\approx -0.437$ or $-1.13$", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": true}, {"question": "Write the trapezium rule formula for estimating $\\int_a^b f(x)\\,dx$ with $n$ equal strips.", "answer": "$$\\int_a^b f(x)\\,dx \\approx \\frac{h}{2}[y_0 + y_n + 2(y_1 + y_2 + \\cdots + y_{n-1})]$$\nwhere $h = \\frac{b-a}{n}$. Note: the endpoints $y_0$ and $y_n$ appear once; all interior ordinates are doubled.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": true}, {"question": "For the data points $(x, y)$: $(0, 3), (0.5, 2.6833), (1, 2.4), (1.5, 2.1466), (2, 1.92)$, what is the trapezium rule estimate?", "answer": "Here $h = 0.5$, $n = 4$ (4 strips, 5 ordinates):\n$$\\frac{0.5}{2}[3 + 1.92 + 2(2.6833 + 2.4 + 2.1466)] = 0.25[4.92 + 2(7.2299)] = 4.845$$", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": true}, {"question": "When using the trapezium rule to find the area between two curves, what two methods can you use?", "answer": "Method 1: Compute new $y$-values as $y_{new} = y_{upper} - y_{lower}$ at each $x$, then apply the trapezium rule to these differences. Method 2: Find the area under each curve separately (using trapezium rule for one, exact integration for the other) and subtract.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "How do you simplify $y = \\frac{12x^3(x-7) + 14x(13x-15)}{21x^{1/2}}$ into the form $ax^{7/2} + bx^{5/2} + cx^{3/2} + dx^{1/2}$?", "answer": "Multiply out numerator: $12x^4 - 84x^3 + 182x^2 - 210x$. Divide each term by $21x^{1/2}$:\n$$y = \\frac{12}{21}x^{7/2} - \\frac{84}{21}x^{5/2} + \\frac{182}{21}x^{3/2} - \\frac{210}{21}x^{1/2} = \\frac{4}{7}x^{7/2} - 4x^{5/2} + \\frac{26}{3}x^{3/2} - 10x^{1/2}$$", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "Differentiate $y = ax^{7/2} + bx^{5/2} + cx^{3/2} + dx^{1/2}$ with respect to $x$.", "answer": "Using $\\frac{d}{dx}(x^n) = nx^{n-1}$ for any rational $n$:\n$$\\frac{dy}{dx} = \\frac{7a}{2}x^{5/2} + \\frac{5b}{2}x^{3/2} + \\frac{3c}{2}x^{1/2} + \\frac{d}{2}x^{-1/2}$$", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "After differentiating a function involving $x^{1/2}$ terms, how do you find turning points?", "answer": "Set $\\frac{dy}{dx} = 0$. Since $x > 0$, multiply through by $x^{1/2}$ to clear the negative power. This transforms the equation into a polynomial in $x$.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "Given a cubic $2x^3 - 10x^2 + 13x - 5 = 0$ with known root $x = 1$, how do you find the other roots?", "answer": "Use the Factor Theorem: divide by $(x - 1)$. Performing polynomial division:\n$$2x^3 - 10x^2 + 13x - 5 = (x - 1)(2x^2 - 8x + 5)$$\nSolve $2x^2 - 8x + 5 = 0$ using the quadratic formula:\n$$x = \\frac{8 \\pm \\sqrt{64 - 40}}{4} = \\frac{8 \\pm 2\\sqrt{6}}{4} = \\frac{4 \\pm \\sqrt{6}}{2}$$", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": true}, {"question": "What is the formula for the sum to infinity of a geometric series, and when does it exist?", "answer": "$S_\\infty = \\frac{a}{1-r}$ where $|r| < 1$. This formula only applies when the common ratio $r$ satisfies $|r| < 1$ (the series converges).", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "Given $S_\\infty = 3a$ for a geometric series with first term $a$, find $r$.", "answer": "$\\frac{a}{1-r} = 3a \\Rightarrow \\frac{1}{1-r} = 3 \\Rightarrow 1-r = \\frac{1}{3} \\Rightarrow r = \\frac{2}{3}$", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "What is the formula for the $n$th term of a geometric sequence?", "answer": "$u_n = ar^{n-1}$ where $a$ is the first term and $r$ is the common ratio. Note: this is NOT in the formula booklet — **memorise it**.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": true}, {"question": "Write the standard equation of a circle with centre $(a, b)$ and radius $r$.", "answer": "$(x - a)^2 + (y - b)^2 = r^2$. Note: this is NOT in the formula booklet — **memorise it**.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "At a point $A$ on a circle, what is the relationship between the gradient of the radius $TA$ and the gradient of the tangent at $A$?", "answer": "They are negative reciprocals: $m_{\\text{tangent}} \\times m_{\\text{radius}} = -1$. This is the same perpendicular line rule used for any curve.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": true}, {"question": "How do you find the area bounded by a curve $y = f(x)$, a line $y = g(x)$, and the $y$-axis between $x = a$ and $x = b$?", "answer": "Evaluate $\\int_a^b [f(x) - g(x)] \\, dx$, ensuring $f(x) \\geq g(x)$ on the interval. The order matters: upper minus lower.", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "What is the most common error when applying the trapezium rule?", "answer": "Forgetting which ordinates get doubled. Remember: endpoints $y_0$ and $y_n$ appear once; ALL interior ordinates ($y_1$ through $y_{n-1}$) are doubled.", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": true}, {"question": "What is the most common error when solving $\\sin\\theta = k$?", "answer": "Finding only one solution. Remember: if $\\sin\\theta = k$, then $\\theta = \\arcsin(k)$ OR $\\theta = \\pi - \\arcsin(k)$ (in radians), within the principal range.", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "What is the common error when applying the Remainder Theorem to divisor $(ax - b)$?", "answer": "Substituting $x = b$ instead of $x = \\frac{b}{a}$. The correct substitution is the root of the divisor: $ax - b = 0 \\Rightarrow x = \\frac{b}{a}$.", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": false}, {"question": "What are the three correct logarithm laws?", "answer": "1. $\\log_a(xy) = \\log_a x + \\log_a y$\n2. $\\log_a\\left(\\frac{x}{y}\\right) = \\log_a x - \\log_a y$\n3. $\\log_a(x^n) = n\\log_a x$", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": true}, {"question": "What distinguishes proof by exhaustion from proof by deduction?", "answer": "Proof by exhaustion tests **every individual case** in a finite set. Proof by deduction uses logical reasoning to prove a general statement. Exhaustion requires listing all cases; deduction does not.", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": false}, {"question": "When solving $\\sin(2x) = k$ for $x \\in [-\\frac{\\pi}{2}, \\frac{\\pi}{2}]$, what range should you solve for $2x$ in?", "answer": "Multiply the range by 2: solve for $2x \\in [-\\pi, \\pi]$. After finding solutions for $2x$, divide by 2 to get $x$.", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": false}, {"question": "Does the differentiation rule $\\frac{d}{dx}(x^n) = nx^{n-1}$ work for fractional exponents?", "answer": "Yes. It works for ALL real values of $n$, including fractions, negative numbers, and irrational numbers. For example, $\\frac{d}{dx}(x^{1/2}) = \\frac{1}{2}x^{-1/2}$.", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": true}], "count": 47}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "What does \"proof by exhaustion\" require you to do?", "answer": "Test EVERY single case in a finite set of possibilities, verifying the statement holds for each, then write a conclusion sentence.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "What is the first step in setting up a proof by exhaustion when given multiple constraints?", "answer": "Use the constraints to derive bounds on the variables, reducing the problem to a finite list of cases.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "Why must you always write a concluding sentence in a proof by exhaustion?", "answer": "Examiners award an explicit mark for the conclusion (e.g., \"In all cases, ... Hence ...\"). Without it you lose the final mark even if all cases are correct.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": true}, {"question": "Given $c = b + 2$ and $a + b + c = 10$ with $a, b, c$ positive integers, how do you express $a$ in terms of $b$?", "answer": "Substituting: $a + b + (b+2) = 10 \\Rightarrow a = 8 - 2b$.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": true}, {"question": "Given $a = 8 - 2b$ with $a, b$ positive integers, what are the allowed values of $b$?", "answer": "Need $b \\geq 1$ and $a > 0 \\Rightarrow b < 4$. So $b \\in \\{1, 2, 3\\}$.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "For positive integers with $c = b+2$, $a+b+c=10$, why must $abc$ always be even?", "answer": "$a = 8 - 2b = 2(4-b)$ is always even, so the product $abc$ is always even (one even factor is enough).", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "What is the difference between \"proof by exhaustion\" and \"proof by deduction\"?", "answer": "Exhaustion checks each case in $?", "answer": "$f'(0)$ equals the coefficient of $x$ in the expansion (after differentiating, the constant survives).", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "What is $f'(0)$ for $f(x) = 32 - 32x + \\frac{64}{5}x^2 + \\ldots$?", "answer": "$-32$ (the coefficient of the linear term).", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "What is $\\cos^2\\!\\left(\\dfrac{\\pi}{3}\\right)$?", "answer": "$\\left(\\dfrac{1}{2}\\right)^2 = \\dfrac{1}{4}$.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "What is $\\cos^2\\!\\left(\\dfrac{2\\pi}{3}\\right)$?", "answer": "$\\left(-\\dfrac{1}{2}\\right)^2 = \\dfrac{1}{4}$ (squaring removes the sign).", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "What is $\\cos^2(\\pi)$?", "answer": "$(-1)^2 = 1$.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "What is the period of the sequence $\\cos^2\\!\\left(\\dfrac{n\\pi}{3}\\right)$?", "answer": "3 — the values cycle through $\\dfrac{1}{4}, \\dfrac{1}{4}, 1, \\dfrac{1}{4}, \\dfrac{1}{4}, 1, \\ldots$", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "For a sum $\\sum \\cos(n\\alpha)$ where $\\alpha$ is a rational multiple of $\\pi$, what's the strategy?", "answer": "Find the period $k$, sum one full period, then use $N = qk + r$ to compute $q$ full periods plus $r$ remainder terms.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "State the formula for $\\sum_{r=1}^{n} r^2$.", "answer": "$\\dfrac{n(n+1)(2n+1)}{6}$ (in formula booklet).", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "What is $\\sum_{n=1}^{50} n^2$?", "answer": "$\\dfrac{50 \\times 51 \\times 101}{6} = 42925$.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": true}, {"question": "How do you split $\\displaystyle\\sum_{n=1}^{50}\\left[n^2 + \\cos^2\ tely $0.434$ and $-0.768$.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "For $\\sin(2x) = -0.768$ on $-\\pi \\leq 2x \\leq \\pi$, what are the two solutions for $2x$?", "answer": "$2x = \\arcsin(-0.768) \\approx -0.875$ and $2x = -\\pi - \\arcsin(-0.768) \\approx -2.267$ (using $-\\pi - \\theta$ for the negative-range second solution).", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "When asked to solve in radians, what visual cue tells you the interval is in radians not degrees?", "answer": "The presence of $\\pi$ in the interval (e.g., $-\\pi/2 \\leq x \\leq \\pi/2$).", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": true}, {"question": "State the trapezium rule formula.", "answer": "$\\displaystyle\\int_a^b y\\,dx \\approx \\dfrac{h}{2}\\left[y_0 + y_n + 2(y_1 + y_2 + \\ldots + y_{n-1})\\right]$ where $h = \\dfrac{b-a}{n}$ (in formula booklet).", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "In the trapezium rule with $n$ strips, how many ordinates are there?", "answer": "$n + 1$ ordinates ($y_0, y_1, \\ldots, y_n$).", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "In the trapezium rule, which ordinates are doubled?", "answer": "Only the INTERIOR ordinates ($y_1$ through $y_{n-1}$). The two endpoints ($y_0$ and $y_n$) are added once.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": true}, {"question": "For $x$-values 0, 0.5, 1, 1.5, 2, what is the strip width $h$?", "answer": "$h = 0.5$ (the equal spacing between consecutive $x$-values).", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": false}, {"question": "How do you find the area between two curves $C_1$ and $C_2$ where $C_1$ is above $C_2$?", "answer": "$\\displaystyle\\int_a^b (y_{C_1} - y_{C_2})\\,dx$ — integrate the upper minus the lower curve.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": false}, {"question": "When finding area e.g., $x^{1/2}$). Valid because $x > 0$ in the domain.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": true}, {"question": "To convert $2x^{5/2} - 10x^{3/2} + 13x^{1/2} - 5x^{-1/2} = 0$ into a polynomial equation, what do you multiply by?", "answer": "$x^{1/2}$, giving $2x^3 - 10x^2 + 13x - 5 = 0$.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": false}, {"question": "If $x = 1$ is a root of a cubic $2x^3 - 10x^2 + 13x - 5 = 0$, how do you find the other roots?", "answer": "Factor out $(x - 1)$ to get $(x-1)(2x^2 - 8x + 5) = 0$, then solve the quadratic.", "source": "Opus 4.7 ①", "_id": "opus_1_55", "judge_pick": false}, {"question": "How do you solve $2x^2 - 8x + 5 = 0$ for exact roots?", "answer": "Use the quadratic formula: $x = \\dfrac{8 \\pm \\sqrt{64 - 40}}{4} = \\dfrac{8 \\pm 2\\sqrt{6}}{4} = \\dfrac{4 \\pm \\sqrt{6}}{2}$.", "source": "Opus 4.7 ①", "_id": "opus_1_56", "judge_pick": false}, {"question": "When a question says \"find exact x-coordinates,\" what form must the answer take?", "answer": "Surds, fractions, or symbolic form — NOT decimals.", "source": "Opus 4.7 ①", "_id": "opus_1_57", "judge_pick": true}, {"question": "State the formula for the sum to infinity of a geometric series.", "answer": "$S_\\infty = \\dfrac{a}{1 - r}$ when $|r| < 1$ (in formula booklet).", "source": "Opus 4.7 ①", "_id": "opus_1_58", "judge_pick": false}, {"question": "State the formula for the $n$-th term of a geometric sequence.", "answer": "$u_n = ar^{n-1}$ (NOT in formula booklet — memorise).", "source": "Opus 4.7 ①", "_id": "opus_1_59", "judge_pick": false}, {"question": "State the formula for the sum of the first $n$ terms of a geometric sequence.", "answer": "$S_n = \\dfrac{a(1 - r^n)}{1 - r}$ (in formula booklet).", "source": "Opus 4.7 ①", "_id": "opus_1_60", "judge_pick": false}, {"question": "Given $S_\\infty = 3a$, find $r$.", "answer": "$\\dfrac{a}{1-r} = 3a \\Rightarrow 1 - r = \\dfrac{1}{3} \\Rightarrow r = \\dfrac{2}{3}$.", "source": "Opus 4.7 ①", "_id": "opus_1_61", "judge_pick": false}, {"question": "How do you express $u_2 - u_4$ in terms of $a$ and $r$?", "answer": "$u_2 - u_4 = ar - ar^3 = ar(1 - r^2)$.", "source": "Opus 4.7 ①", "_id": "opus_1_62", "judge_pick": false}, {"question": "State the standard form of a circle equation.", "answer": "$(x - a)^2 + (y - b)^2 = r^2$ with centre $(a, b)$ and radius $r$ (NOT in formula booklet).", "source": "Opus 4.7 ①", "_id": "opus_1_63", "judge_pick": false}, {"question": "How do you classify a stationary point using the second derivative?", "answer": "$f''(x) > 0 \\Rightarrow$ local minimum; $f''(x) < 0 \\Rightarrow$ local maximum; $f''(x) = 0$ inconclusive.", "source": "Opus 4.7 ①", "_id": "opus_1_64", "judge_pick": false}, {"question": "What's the relationship between the gradient of a tangent to a circle and the gradient of the radius at the point of contact?", "answer": "They are perpendicular: $m_{\\text{tangent}} \\times m_{\\text{radius}} = -1$, so $m_{\\text{tangent}} = -\\dfrac{1}{m_{\\text{radius}}}$.", "source": "Opus 4.7 ①", "_id": "opus_1_65", "judge_pick": false}, {"question": "How do you find the equation of a tangent to a circle at a known point $A$ given the centre $T$?", "answer": "Compute $m_{TA}$ (gradient of radius), take negative reciprocal for tangent gradient, then use $y - y_A = m(x - x_A)$.", "source": "Opus 4.7 ①", "_id": "opus_1_66", "judge_pick": false}, {"question": "Once you've found the centre and a point on a circle, how do you compute $r^2$?", "answer": "$r^2 = (x_A - a)^2 + (y_A - b)^2$ using the distance formula squared.", "source": "Opus 4.7 ①", "_id": "opus_1_67", "judge_pick": false}, {"question": "How do you find the area of a region bounded by a curve, a line, and the y-axis?", "answer": "$\\int_0^{x_{\\text{end}}} (\\text{upper} - \\text{lower})\\,dx$ — first verify which is upper by testing a value.", "source": "Opus 4.7 ①", "_id": "opus_1_68", "judge_pick": false}, {"question": "Given $a = \\log_2 3$, what is $\\log_2 9$ in terms of $a$?", "answer": "$\\log_2 9 = \\log_2 3^2 = 2\\log_2 3 = 2a$.", "source": "Opus 4.7 ①", "_id": "opus_1_69", "judge_pick": false}, {"question": "Given $a = \\log_2 3$, what is $\\log_2\\!\\left(\\dfrac{3}{16}\\right)$ in terms of $a$?", "answer": "$\\log_2 3 - \\log_2 16 = a - 4$ (since $\\log_2 16 = 4$).", "source": "Opus 4.7 ①", "_id": "opus_1_70", "judge_pick": false}, {"question": "How can you combine $3^x \\times 2^x$ into a single power?", "answer": "$3^x \\times 2^x = (3 \\times 2)^x = 6^x$ (combining same-exponent powers).", "source": "Opus 4.7 ①", "_id": "opus_1_71", "judge_pick": false}, {"question": "How do you simplify $2^{x+4}$?", "answer": "$2^{x+4} = 2^x \\times 2^4 = 16 \\cdot 2^x$.", "source": "Opus 4.7 ①", "_id": "opus_1_72", "judge_pick": false}, {"question": "What is the strategy for solving an equation with the unknown in the exponent?", "answer": "Manipulate to a single base if possible, otherwise take logarithms of both sides.", "source": "Opus 4.7 ①", "_id": "opus_1_73", "judge_pick": false}, {"question": "When a question requires the answer in terms of $a = \\log_2 3$, which base of log should you take?", "answer": "Base 2 (matching the base of $a$). Using $\\ln$ gives an answer in $\\ln 2, \\ln 3$, not in $a$.", "source": "Opus 4.7 ①", "_id": "opus_1_74", "judge_pick": false}, {"question": "Given $a = \\log_2 3$, what is $\\log_2 6$?", "answer": "$\\log_2 6 = \\log_2(2 \\times 3) = \\log_2 2 + \\log_2 3 = 1 + a$.", "source": "Opus 4.7 ①", "_id": "opus_1_75", "judge_pick": false}, {"question": "Given $a = \\log_2 3$, what is $\\log_2 8$?", "answer": "$\\log_2 8 = \\log_2 2^3 = 3$ (no $a$ dependence).", "source": "Opus 4.7 ①", "_id": "opus_1_76", "judge_pick": false}, {"question": "How do you solve $6^x = \\dfrac{3}{8}$ in terms of $a = \\log_2 3$?", "answer": "Take $\\log_2$ of both sides: $x \\log_2 6 = \\log_2 3 - \\log_2 8 \\Rightarrow x(1 + a) = a - 3 \\Rightarrow x = \\dfrac{a-3}{a+1}$.", "source": "Opus 4.7 ①", "_id": "opus_1_77", "judge_pick": false}, {"question": "What is $\\log_2 2$?", "answer": "$1$ (since $2^1 = 2$).", "source": "Opus 4.7 ①", "_id": "opus_1_78", "judge_pick": false}, {"question": "What is the trapezium rule formula and what does $h$ equal?", "answer": "$\\int_a^b y\\,dx \\approx \\dfrac{h}{2}\\left[y_0 + y_n + 2(y_1 + \\ldots + y_{n-1})\\right]$ with $h = \\dfrac{b-a}{n}$.", "source": "Opus 4.7 ①", "_id": "opus_1_79", "judge_pick": false}, {"question": "For $\\sin\\theta = k$, what is the rule that prevents missing the second solution?", "answer": "$\\theta_1 = \\arcsin(k)$ AND $\\theta_2 = \\pi - \\arcsin(k)$. ALWAYS write both before adding $2\\pi n$.", "source": "Opus 4.7 ①", "_id": "opus_1_80", "judge_pick": false}, {"question": "When dividing by $(ax - b)$, where do you substitute to find the remainder?", "answer": "$x = \\dfrac{b}{a}$ (NOT $x = b$). Set the divisor to zero: $ax - b = 0 \\Rightarrow x = b/a$.", "source": "Opus 4.7 ①", "_id": "opus_1_81", "judge_pick": false}, {"question": "When the unknown is in the exponent, what method always works?", "answer": "Take logs of both sides — using the base specified by the question (e.g., base 2 if answer must be in terms of $\\log_2$).", "source": "Opus 4.7 ①", "_id": "opus_1_82", "judge_pick": false}, {"question": "What is the structure of a complete proof by exhaustion?", "answer": "(1) Use constraints to find the finite set of cases; (2) test each case individually; (3) write a conclusion sentence stating the result holds in all cases.", "source": "Opus 4.7 ①", "_id": "opus_1_83", "judge_pick": false}, {"question": "What is the rule for combining same-exponent terms with different bases?", "answer": "$a^x \\times b^x = (ab)^x$ — useful when unknowns are exponents.", "source": "Opus 4.7 ①", "_id": "opus_1_84", "judge_pick": false}, {"question": "When integrating to find area between curves, how do you decide which curve is \"upper\"?", "answer": "Test a value of $x$ in the interval; the curve with  2$, $a,b,c$ positive integers, list the three valid triples $(a,b,c)$ and their products.", "answer": "$(6,1,3) \\to 18$; $(4,2,4) \\to 32$; $(2,3,5) \\to 30$. All even.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "Structurally, why must $abc$ be even when $a = 8 - 2b$?", "answer": "$a = 2(4-b)$ is always even, so the product $abc$ contains a factor of 2.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": true}, {"question": "What conclusion sentence must be written in a proof by exhaustion?", "answer": "A sentence stating the result holds in ALL cases checked, e.g., \"In all cases, $abc$ is even. Hence, the product is always even.\" (Mark scheme awards this explicitly.)", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": true}, {"question": "What is the most common mark-losing mistake in proof by exhaustion?", "answer": "Failing to write the explicit conclusion sentence after checking all cases.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "When polynomial $f(x)$ is divided by $(ax - b)$, what is the remainder?", "answer": "$f\\!\\left(\\dfrac{b}{a}\\right)$ — substitute $x = b/a$, NOT $x = b$.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "When is $(ax - b)$ a factor of polynomial $f(x)$?", "answer": "When $f\\!\\left(\\dfrac{b}{a}\\right) = 0$.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "Applying the Remainder Theorem with divisor $(4x - 5)$, what value do you substitute for $x$?", "answer": "$x = \\dfrac{5}{4}$ (set $4x - 5 = 0$, solve for $x$).", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "What is $\\left(\\dfrac{243}{32}\\right)^{1/5}$?", "answer": "$\\dfrac{3}{2}$, because $3^5 = 243$ and $2^5 = 32$.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "For $f(x) = (2-kx)^5$ with remainder $\\frac{243}{32}$ when divided by $(4x-5)$, how do you find $k$?", "answer": "Set $f(5/4) = 243/32$: $(2 - 5k/4)^5 = 243/32$. Take 5th root: $2 - 5k/4 = 3/2$, giving $k = 2/5$.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "State the binomial expansion formula for $(a+b)^n$.", "answer": "$(a+b)^n = \\displaystyle\\sum_{r=0}^{n} \\binom{n}{r} a^{n-r} b^r$ (in formula booklet).", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "In the expansion of $\\left(2 - \\dfrac{2x}{5}\\right)^5$, what is the constant term?", "answer": "$\\binom{5}{0}(2)^5 = 32$.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "In the expansion of $\\left(2 - \\dfrac{2x}{5}\\right)^5$, what is the coefficient of $x$?", "answer": "$\\binom{5}{1}(2)^4\\left(-\\dfrac{2}{5}\\right) = 5 \\cdot 16 \\cdot (-2/5) = -32$.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "In the expansion of $\\left(2 - \\dfrac{2x}{5}\\right)^5$, what is the coefficient of $x^2$?", "answer": "$\\binom{5}{2}(2)^3\\left(-\\dfrac{2}{5}\\right)^2 = 10 \\cdot 8 \\cdot \\dfrac{4}{25} = \\dfrac{64}{5}$.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "When expanding $(p + q)^n$ with $q$ negative, what determines the sign of each term?", "answer": "Odd-power terms in $q$ are negative; even-power terms are positive.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": true}, {"question": "Given $y = 32 - 32x + \\frac{64}{5}x^2 + \\ldots$, what is $\\frac{dy}{dx}$ at $x = 0$?", "answer": "$\\dfrac{dy}{dx} = -32 + \\dfrac{128}{5}x + \\ldots$, so at $x = 0$, gradient $= -32$.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "What is $\\cos^2\\!\\left(\\dfrac{\\pi}{3}\\right)$?", "answer": "$\\left(\\dfrac{1}{2}\\right)^2 = \\dfrac{1}{4}$.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "What is $\\cos^2\\!\\left(\\dfrac{2\\pi}{3}\\right)$?", "answer": "$\ dfrac{85899}{2}$.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "When dealing with periodic trig sequences in a sum, what is the key recognition step?", "answer": "Compute the first 6+ terms to spot the cycle. Sequences with $\\cos(n\\alpha)$ where $\\alpha = \\pi/k$ repeat with period dividing $2k$.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": true}, {"question": "State the log subtraction rule.", "answer": "$\\log_a x - \\log_a y = \\log_a\\!\\left(\\dfrac{x}{y}\\right)$ — NOT $\\log_a(x - y)$.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": true}, {"question": "If $\\log_a M = N$, write the exponential form.", "answer": "$a^N = M$ (fundamental definition of logarithm).", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "How do you make $t$ the subject of $w = \\log_a\\!\\left(\\dfrac{t+5}{4}\\right)$?", "answer": "Exponentiate: $a^w = \\dfrac{t+5}{4}$, so $t = 4a^w - 5$.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "From $10 = \\log_a(8) - \\log_a(4)$, how do you find $a$?", "answer": "Combine: $10 = \\log_a 2$, so $a^{10} = 2$, giving $a = 2^{1/10} \\approx 1.072$.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "Express $\\tan\\theta$ in terms of $\\sin\\theta$ and $\\cos\\theta$.", "answer": "$\\tan\\theta = \\dfrac{\\sin\\theta}{\\cos\\theta}$.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "State the Pythagorean identity for $\\cos^2\\theta$.", "answer": "$\\cos^2\\theta = 1 - \\sin^2\\theta$ (NOT in formula booklet — must memorise).", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "Show how $(3\\cos\\theta - \\tan\\theta)\\cos\\theta = 2$ becomes $3\\sin^2\\theta + \\sin\\theta - 1 = 0$.", "answer": "Expand: $3\\cos^2\\theta - \\sin\\theta = 2$. Replace $\\cos^2\\theta = 1 - \\sin^2\\theta$: $3 - 3\\sin^2\\theta - \\sin\\theta = 2$, r
