<script>
const DATA={"selected": [{"question": "Why does the substitution $x = \\frac{b}{a}$ work for divisor $(ax - b)$?", "answer": "Setting $ax - b = 0$ gives $x = \\frac{b}{a}$. This is the \"root\" of the divisor — the value that makes the divisor zero. The Remainder Theorem states: remainder = f(root of divisor).", "source": "MiniMax ②", "_id": "minimax_2_4"}, {"question": "In the trapezium rule, which ordinates are doubled?", "answer": "Only the INTERIOR ordinates ($y_1$ through $y_{n-1}$). The two endpoints ($y_0$ and $y_n$) are added once.", "source": "Opus 4.7 ①", "_id": "opus_1_43"}, {"question": "If $S_\\infty = 3a$, how do you show $r = \\frac{2}{3}$?", "answer": "$\\frac{a}{1-r} = 3a \\;\\Rightarrow\\; \\frac{1}{1-r} = 3 \\;\\Rightarrow\\; 1-r = \\frac{1}{3} \\;\\Rightarrow\\; r = \\frac{2}{3}$.", "source": "GLM 5.1 ②", "_id": "glm_2_44"}, {"question": "For $y=x^3-5x^2+3x+14$, what is the minimum turning point $T$ and how is it classified?", "answer": "$y'=3x^2-10x+3=0$ gives $x=\\frac13$ or $3$. Since $y''=6x-10$ is positive at $x=3$, $T=(3,5)$ is the minimum.", "source": "Kimi K2.6 ①", "_id": "kimi_1_22"}, {"question": "When dealing with periodic trig sequences in a sum, what is the key recognition step?", "answer": "Compute the first 6+ terms to spot the cycle. Sequences with $\\cos(n\\alpha)$ where $\\alpha = \\pi/k$ repeat with period dividing $2k$.", "source": "Opus 4.7 ②", "_id": "opus_2_28"}, {"question": "Given $x = 1$ is a root of $2x^3 - 10x^2 + 13x - 5 = 0$, how do you find the other roots?", "answer": "Factor out $(x - 1)$ by polynomial division: $(x-1)(2x^2 - 8x + 5) = 0$. Then solve $2x^2 - 8x + 5 = 0$ using the quadratic formula.", "source": "GLM 5.1 ③", "_id": "glm_3_40"}, {"question": "When expanding $\\left(2 - \\frac{2x}{5}\\right)^5$, what is the coefficient of $x$ and why?", "answer": "For the $x^1$ term: $r = 1$, so $\\binom{5}{1}(2)^4\\left(-\\frac{2x}{5}\\right) = 5 \\times 16 \\times \\left(-\\frac{2x}{5}\\right) = -32x$. The coefficient is $-32$.", "source": "MiniMax ②", "_id": "minimax_2_8"}, {"question": "In the binomial expansion of $\\left(2 - \\dfrac{2x}{5}\\right)^5$, what are the first three terms?", "answer": "Using $(a+b)^n = \\sum \\binom{n}{r} a^{n-r}b^r$ with $a=2$, $b=-\\dfrac{2x}{5}$: $r=0$: $32$, $r=1$: $-32x$, $r=2$: $\\dfrac{64x^2}{5}$. So $32 - 32x + \\dfrac{64}{5}x^2 + \\cdots$. **Pitfall:** since $b$ is negative, odd-power terms are negative.", "source": "GLM 5.1 ①", "_id": "glm_1_8"}, {"question": "What is the periodicity rule for sequences involving $\\cos(n\\alpha)$ or $\\sin(n\\alpha)$ where $\\alpha = \\frac{\\pi}{k}$?", "answer": "The sequence repeats with period $k$. Compute one full period of values, find the sum per period, then multiply by the number of complete periods and add any remainder terms.", "source": "GLM 5.1 ③", "_id": "glm_3_13"}, {"question": "Does the differentiation rule $\\frac{d}{dx}(x^n) = nx^{n-1}$ work for fractional exponents?", "answer": "Yes. It works for ALL real values of $n$, including fractions, negative numbers, and irrational numbers. For example, $\\frac{d}{dx}(x^{1/2}) = \\frac{1}{2}x^{-1/2}$.", "source": "MiniMax ②", "_id": "minimax_2_46"}, {"question": "Write the trapezium rule formula for estimating $\\int_a^b f(x)\\,dx$ with $n$ equal strips.", "answer": "$$\\int_a^b f(x)\\,dx \\approx \\frac{h}{2}[y_0 + y_n + 2(y_1 + y_2 + \\cdots + y_{n-1})]$$\nwhere $h = \\frac{b-a}{n}$. Note: the endpoints $y_0$ and $y_n$ appear once; all interior ordinates are doubled.", "source": "MiniMax ②", "_id": "minimax_2_27"}, {"question": "Why is the 5th root of $ \\frac{243}{32} $ equal to $ \\frac{3}{2} $?", "answer": "$ 3^5 = 243 $ and $ 2^5 = 32 $, so $ \\left(\\frac{243}{32}\\right)^{1/5} = \\frac{3}{2} $.", "source": "Qwen 3 ②", "_id": "qwen_2_4"}, {"question": "What is the relationship between the gradient of a tangent to a circle and the gradient of the radius at the point of contact?", "answer": "$m_{\\text{tangent}} \\times m_{\\text{radius}} = -1$ (they are negative reciprocals).", "source": "GLM 5.1 ①", "_id": "glm_1_37"}, {"question": "Why multiply $ \\frac{dy}{dx} = 2x^{5/2} - 10x^{3/2} + 13x^{1/2} - 5x^{-1/2} $ by $ x^{1/2} $?", "answer": "To eliminate negative exponents:\n$$\nx^{1/2} \\cdot \\frac{dy}{dx} = 2x^3 - 10x^2 + 13x - 5\n$$", "source": "Qwen 3 ②", "_id": "qwen_2_13"}, {"question": "Hence, how do you evaluate $\\displaystyle\\sum_{n=1}^{50}\\left[n^2+\\cos^2\\!\\left(\\frac{n\\pi}{3}\\right)\\right]$ exactly?", "answer": "Split the sum: $\\sum_{n=1}^{50}n^2 + \\sum_{n=1}^{50}\\cos^2\\!\\left(\\frac{n\\pi}{3}\\right)$. The square sum is $\\frac{50\\times51\\times101}{6}=42925$. The trig sequence has period sum $\\frac{1}{4}+\\frac{1}{4}+1=\\frac{3}{2}$. Since $50=16\\times3+2$, the trig sum is $16\\times\\frac{3}{2}+\\frac{1}{4}+\\frac{1}{4}=24+\\frac{1}{2}=\\frac{49}{2}$. Total:\n$$\\mathbf{\\frac{85899}{2}}$$\n**Pitfall:** Omitting the two remainder terms after the full periods.", "source": "Kimi K2.6 ②", "_id": "kimi_2_8"}, {"question": "What is the formula for $S_n$ of a geometric series, and what is $S_{10}$ to 1 d.p. when $a=43.2$ and $r=\\frac23$?", "answer": "$$S_n=\\frac{a(1-r^n)}{1-r}$$ Substituting gives $S_{10}\\approx127.3$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_21"}, {"question": "How do you differentiate $y=ax^{7/2}+bx^{5/2}+cx^{3/2}+dx^{1/2}$, and what power appears in the derivative of the last term?", "answer": "Use $\\frac{d}{dx}x^n=nx^{n-1}$ for all rational $n$:\n$$\\frac{dy}{dx}=\\frac{7a}{2}x^{5/2}+\\frac{5b}{2}x^{3/2}+\\frac{3c}{2}x^{1/2}+\\frac{d}{2}x^{-1/2}$$\nThe last term produces $x^{-1/2}$ (a negative power). **Pitfall:** Thinking fractional powers require special rules.", "source": "Kimi K2.6 ②", "_id": "kimi_2_21"}, {"question": "When solving $\\sin(2x) = k$ on $-\\pi \\leq 2x \\leq \\pi$, how many solutions does each value of $k$ typically give?", "answer": "**Two** solutions: $2x_1 = \\arcsin(k)$ and $2x_2 = \\pi - \\arcsin(k)$ (or their negatives for negative $k$). Check both lie within the domain.", "source": "GLM 5.1 ①", "_id": "glm_1_21"}, {"question": "When solving $\\sin(2x) = k$ on $-\\frac{\\pi}{2} \\leq x \\leq \\frac{\\pi}{2}$, what is the critical first step?", "answer": "**Scale the domain**: since the argument is $2x$, the effective range for $2x$ is $-\\pi \\leq 2x \\leq \\pi$. Solve for $2x$ first, then divide by 2.", "source": "GLM 5.1 ②", "_id": "glm_2_26"}, {"question": "What is the fundamental definition that converts between logarithmic and exponential forms?", "answer": "$\\log_a M = N \\iff a^N = M$. To make a variable the subject of a log equation, **exponentiate both sides**.", "source": "GLM 5.1 ②", "_id": "glm_2_20"}, {"question": "When $f(x)$ is divided by $(ax - b)$, what is the remainder?", "answer": "$f\\!\\left(\\dfrac{b}{a}\\right)$. **Not** $f(b/a)$ confused with $f(b)$ — you substitute $x = b/a$ into the polynomial.", "source": "GLM 5.1 ②", "_id": "glm_2_5"}, {"question": "What are the five most recurring failure modes across 8 past papers (44 redo questions)?", "answer": "(1) **Trapezium rule formula amnesia** (Papers 1,3,5,6,8), (2) **Forgetting the other sin solution** (Papers 3,5,7,8), (3) **Remainder Theorem with $(ax-b)$** (Papers 4,5,8), (4) **Unknown in exponent → take logs** (Papers 1,7,8,10), (5) **Proof by exhaustion method** (Papers 1,7,8).", "source": "GLM 5.1 ③", "_id": "glm_3_56"}, {"question": "After differentiating a polynomial in fractional powers, how do you eliminate negative-exponent terms when setting derivative = 0?", "answer": "Multiply through by the appropriate power of $x$ (e.g., $x^{1/2}$). Valid because $x > 0$ in the domain.", "source": "Opus 4.7 ①", "_id": "opus_1_53"}, {"question": "To simplify $y=\\frac{12x^3(x-7)+14x(13x-15)}{21x^{1/2}}$, what is the systematic approach?", "answer": "Expand the numerator fully first: $12x^4-84x^3+182x^2-210x$. Then divide **each term** by $21x^{1/2}$, subtracting $\\frac{1}{2}$ from each exponent:\n$$y=\\frac{4}{7}x^{7/2}-4x^{5/2}+\\frac{26}{3}x^{3/2}-10x^{1/2}$$\n**Pitfall:** Trying to cancel the whole fraction at once or dividing coefficients incorrectly.", "source": "Kimi K2.6 ②", "_id": "kimi_2_20"}, {"question": "When expanding $(p + q)^n$ with $q$ negative, what determines the sign of each term?", "answer": "Odd-power terms in $q$ are negative; even-power terms are positive.", "source": "Opus 4.7 ②", "_id": "opus_2_16"}, {"question": "How to solve $ 3^x \\times 2^{x+4} = 6 $ in terms of $ a $?", "answer": "1. Rewrite as $ 6^x \\times 16 = 6 $.  \n2. Take $ \\log_2 $: $ x \\log_2 6 = \\log_2 \\left(\\frac{3}{8}\\right) $.  \n3. Substitute $ \\log_2 6 = 1 + a $, $ \\log_2 \\frac{3}{8} = a - 3 $.  \n4. Solve: $ x = \\frac{a - 3}{1 + a} $.", "source": "Qwen 3 ②", "_id": "qwen_2_15"}, {"question": "In trigonometric equations, what is the “other solution” principle for $\\sin\\theta=k$ that has been repeatedly missed?", "answer": "If $\\sin\\theta=k$, the second solution in $[0,\\pi]$ is $\\pi-\\theta$. Stopping at the principal value $\\arcsin(k)$ halves the solution set and loses multiple marks.", "source": "Kimi K2.6 ①", "_id": "kimi_1_31"}, {"question": "Given $w=\\log_a(t+5)-\\log_a 4$ with $w=10$ when $t=3$, what log law condenses the right-hand side and what exponential equation yields $a$?", "answer": "$\\log_a M-\\log_a N=\\log_a(M/N)$ gives $10=\\log_a 2$, so $a^{10}=2$ and $a=2^{1/10}\\approx1.072$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_8"}, {"question": "Given $r=\\frac23$ and $u_2-u_4=16$, what factorisation efficiently yields the first term $a$?", "answer": "$ar-ar^3=ar(1-r^2)=16$. Substituting $r=\\frac23$ gives $a\\cdot\\frac23\\cdot\\frac59=16$, so $a=43.2$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_20"}, {"question": "In proof by exhaustion, what is the pitfall regarding checking validity of cases?", "answer": "Forgetting to apply ALL constraints. E.g., if $a = 8-2b$ and $a > 0$, then $b < 4$. Missing this constraint would include invalid triples where $a \\leq 0$.", "source": "GLM 5.1 ②", "_id": "glm_2_2"}, {"question": "What is the method for proof by exhaustion in 3 steps?", "answer": "(1) Use constraints to derive the finite case set; (2) Test the statement in each case; (3) Write a conclusion sentence asserting the result holds in all cases.", "source": "Opus 4.7 ②", "_id": "opus_2_91"}, {"question": "When a polynomial $f(x)$ is divided by $(ax - b)$, what value of $x$ do you substitute to find the remainder?", "answer": "$x = \\dfrac{b}{a}$. The remainder is $f\\!\\left(\\dfrac{b}{a}\\right)$. **Pitfall:** do NOT substitute $x = b$ or $x = \\dfrac{a}{b}$.", "source": "GLM 5.1 ①", "_id": "glm_1_4"}, {"question": "What is $\\sum_{n=1}^{50} n^2$?", "answer": "$\\dfrac{50 \\times 51 \\times 101}{6} = 42925$.", "source": "Opus 4.7 ①", "_id": "opus_1_22"}, {"question": "How do you compute area between curves using a trapezium rule estimate for one and exact integration for the other?", "answer": "Trapezium-estimate $\\int C_1\\,dx$, exactly integrate $\\int C_2\\,dx$ (if simpler), then subtract.", "source": "Opus 4.7 ②", "_id": "opus_2_48"}, {"question": "What is the #1 trap with the Remainder/Factor Theorem when the divisor is $(ax - b)$?", "answer": "You substitute $x = \\dfrac{b}{a}$, **not** $x = b$. The divisor $(4x - 5)$ means substitute $x = \\frac{5}{4}$.", "source": "GLM 5.1 ②", "_id": "glm_2_57"}, {"question": "If $\\sin\\theta=k$ with $0<k<1$, what is the “other solution” in $[0,\\pi]$ that students chronically forget, and what is its general form?", "answer": "The other solution is $\\pi-\\arcsin(k)$. The principal value $\\arcsin(k)$ alone is insufficient; the supplementary angle must always be considered.", "source": "Kimi K2.6 ①", "_id": "kimi_1_12"}, {"question": "Why does $ \\sin\\theta = k $ have two solutions in $ [0, 2\\pi] $?", "answer": "$ \\theta_1 = \\arcsin(k) $ and $ \\theta_2 = \\pi - \\arcsin(k) $. Omitting $ \\theta_2 $ is a common error.", "source": "Qwen 3 ②", "_id": "qwen_2_9"}, {"question": "Given $r=\\frac{2}{3}$ and $u_2-u_4=16$, how do you find $S_{10}$ to 1 d.p.?", "answer": "$u_2-u_4=ar-ar^3=ar(1-r^2)=16$. Substitute $r=\\frac{2}{3}$: $a\\cdot\\frac{2}{3}\\cdot\\frac{5}{9}=16\\Rightarrow a=43.2$. Then:\n$$S_{10}=\\frac{a(1-r^{10})}{1-r}=\\frac{43.2(1-(2/3)^{10})}{1/3}\\approx\\mathbf{127.3}$$\n**Pitfall:** Using $u_4=ar^4$ instead of $ar^3$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_25"}, {"question": "To make $t$ the subject of $w=\\log_a\\!\\left(\\frac{t+5}{4}\\right)$, what fundamental definition converts the logarithmic form, and what is the resulting equation?", "answer": "If $\\log_a M=N$ then $M=a^N$. Hence $\\frac{t+5}{4}=a^w$, giving $t=4a^w-5$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_9"}, {"question": "When a trig sequence repeats with period $k$, how do you sum the first $N$ terms?", "answer": "Compute $\\lfloor N/k \\rfloor$ full periods (multiply by sum per period), then add the **remainder terms** from the incomplete final period. **Pitfall:** forgetting the remainder terms.", "source": "GLM 5.1 ①", "_id": "glm_1_11"}, {"question": "What is the general form of the Factor Theorem?", "answer": "$(ax - b)$ is a factor of $f(x)$ if and only if $f\\!\\left(\\dfrac{b}{a}\\right) = 0$.", "source": "GLM 5.1 ①", "_id": "glm_1_6"}, {"question": "If $\\sin\\theta = k$, what are the TWO families of solutions?", "answer": "$\\theta_1 = \\arcsin(k)$ AND $\\theta_2 = \\pi - \\arcsin(k)$ (in $180° - \\theta_1$). Then add multiples of $2\\pi$.", "source": "Opus 4.7 ①", "_id": "opus_1_35"}, {"question": "Structurally, why must $abc$ be even when $a = 8 - 2b$?", "answer": "$a = 2(4-b)$ is always even, so the product $abc$ contains a factor of 2.", "source": "Opus 4.7 ②", "_id": "opus_2_4"}, {"question": "What is the key insight for solving equations like $3^x \\times 2^{x+4} = 6$?", "answer": "**Rewrite to same base**: $3^x \\times 2^x = (3 \\times 2)^x = 6^x$. This combines the unknown-in-exponent terms into a single exponential.", "source": "GLM 5.1 ②", "_id": "glm_2_52"}, {"question": "To show that $(3\\cos\\theta-\\tan\\theta)\\cos\\theta=2$ can be written as $3\\sin^2\\theta+\\sin\\theta-1=0$, what is the first step and which identity completes the proof?", "answer": "First distribute $\\cos\\theta$: $3\\cos^2\\theta-\\sin\\theta=2$ (since $\\tan\\theta\\cos\\theta=\\sin\\theta$). Then use $\\cos^2\\theta=1-\\sin^2\\theta$ to obtain $3(1-\\sin^2\\theta)-\\sin\\theta=2$, which rearranges to $3\\sin^2\\theta+\\sin\\theta-1=0$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_12"}, {"question": "When finding the area between two curves using the trapezium rule, what are two valid approaches?", "answer": "(1) Compute new $y$-values as $y_{\\text{new}} = y_{\\text{upper}} - y_{\\text{lower}}$ at each $x$-value, then apply the trapezium rule to these differences. (2) Find area under the upper curve (trapezium rule), find area under the lower curve (exact integration if possible), and subtract.", "source": "GLM 5.1 ①", "_id": "glm_1_26"}, {"question": "What's the key identity needed to convert a $\\cos^2\\theta$ equation into a quadratic in $\\sin\\theta$?", "answer": "$\\cos^2\\theta = 1 - \\sin^2\\theta$ (Pythagorean identity).", "source": "Opus 4.7 ①", "_id": "opus_1_86"}, {"question": "When summing a periodic sequence over $50$ terms with period $3$, what two components must be combined and what remainder pitfall must be avoided?", "answer": "Compute $(16\\times\\text{period sum})$ plus the sum of the first $2$ terms of the next period. The pitfall is forgetting the leftover remainder terms after the full cycles.", "source": "Kimi K2.6 ①", "_id": "kimi_1_6"}, {"question": "If $\\sin\\theta = k$ where $-1 < k < 0$, what are the two solutions in $[-\\pi, \\pi]$?", "answer": "$\\theta_1 = \\arcsin(k)$ (negative, in $[-\\pi/2, 0]$) and $\\theta_2 = -\\pi - \\arcsin(k)$ (also negative, in $[-\\pi, -\\pi/2]$). Both are valid — check they fall within your domain.", "source": "GLM 5.1 ③", "_id": "glm_3_24"}, {"question": "Given $ a + b + c = 10 $ and $ c = b + 2 $, why is $ a = 8 - 2b $?", "answer": "Substitute $ c = b + 2 $ into $ a + b + c = 10 $:\n$$ a + b + (b + 2) = 10 \\Rightarrow a = 8 - 2b $$", "source": "Qwen 3 ②", "_id": "qwen_2_2"}, {"question": "When the unknown is in the exponent (e.g., $a^x = b$), what is the standard method?", "answer": "Take logs of both sides. Choose the base that matches any given constants in the problem.", "source": "Opus 4.7 ②", "_id": "opus_2_90"}, {"question": "Having reached $6^x=\\frac38$, why is it necessary to take $\\log_2$ rather than $\\ln$, and what identity simplifies $\\log_2 6$?", "answer": "Because $a=\\log_2 3$ is given in base $2$. Using $\\ln$ would not express the answer in terms of $a$. Note $\\log_2 6=\\log_2(2\\cdot3)=1+a$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_28"}, {"question": "Find the exact area bounded by $C_1: y=x^3-5x^2+3x+14$, tangent $l: y=\\frac{1}{3}x+\\frac{22}{3}$, and the $y$-axis.", "answer": "On $[0,2]$, $C_1$ is above $l$. Integrate the difference:\n$$\\int_0^2\\left(x^3-5x^2+\\frac{8x}{3}+\\frac{20}{3}\\right)dx=\\left[\\frac{x^4}{4}-\\frac{5x^3}{3}+\\frac{4x^2}{3}+\\frac{20x}{3}\\right]_0^2=4+\\frac{16}{3}=\\mathbf{\\frac{28}{3}}$$\n**Pitfall:** Integrating $l-C_1$ or using incorrect limits.", "source": "Kimi K2.6 ②", "_id": "kimi_2_28"}, {"question": "When a question says \"find exact x-coordinates,\" what form must the answer take?", "answer": "Surds, fractions, or symbolic form — NOT decimals.", "source": "Opus 4.7 ①", "_id": "opus_1_57"}, {"question": "Why is the product $abc$ always even in Q1?", "answer": "Because $a = 8 - 2b$ is always even (since $2b$ is even), making at least one factor in $abc$ even.", "source": "Qwen 3 ①", "_id": "qwen_1_1"}, {"question": "What is the formula for the sum to infinity of a geometric series, and when is it valid?", "answer": "$S_\\infty = \\dfrac{a}{1-r}$, valid when $|r| < 1$. (In formula booklet.)", "source": "GLM 5.1 ②", "_id": "glm_2_41"}, {"question": "What is the most common error when applying the trapezium rule?", "answer": "Forgetting which ordinates get doubled. Remember: endpoints $y_0$ and $y_n$ appear once; ALL interior ordinates ($y_1$ through $y_{n-1}$) are doubled.", "source": "MiniMax ②", "_id": "minimax_2_40"}, {"question": "What is the difference between proof by exhaustion and proof by deduction?", "answer": "**Exhaustion** requires checking each valid case *individually* in a table or list. **Deduction** derives the result logically from axioms/identities without enumerating cases. Using deduction when exhaustion is asked for loses marks.", "source": "GLM 5.1 ①", "_id": "glm_1_2"}, {"question": "How do you convert $\\cos^2\\theta$ to an expression involving $\\sin^2\\theta$?", "answer": "$\\cos^2\\theta = 1 - \\sin^2\\theta$. This identity is **NOT in the formula booklet** — you must memorise it.", "source": "GLM 5.1 ①", "_id": "glm_1_18"}, {"question": "What is the #1 trig solving error to avoid?", "answer": "Forgetting the second sin solution. If $\\sin\\theta = k$, ALWAYS write $\\theta_1 = \\arcsin(k)$ AND $\\theta_2 = \\pi - \\arcsin(k)$.", "source": "Opus 4.7 ②", "_id": "opus_2_88"}, {"question": "When solving a trig equation where the interval is given in terms of $\\pi$, should you work in degrees or radians?", "answer": "**Radians** — look for $\\pi$ in the interval boundaries as the signal.", "source": "GLM 5.1 ②", "_id": "glm_2_28"}, {"question": "What is the standard form of a circle equation and how do you identify the centre and radius?", "answer": "$(x - a)^2 + (y - b)^2 = r^2$ gives centre $(a, b)$ and radius $r$. This is **NOT** in the formula booklet — memorise it.", "source": "GLM 5.1 ③", "_id": "glm_3_46"}, {"question": "When a trig sequence involves $\\cos(n\\alpha)$ or $\\sin(n\\alpha)$ where $\\alpha = \\frac{\\pi}{k}$, what should you exploit?", "answer": "The sequence is **periodic with period $k$**. Compute one full period, find the sum per cycle, then multiply by the number of complete cycles and add any remainder terms.", "source": "GLM 5.1 ②", "_id": "glm_2_18"}, {"question": "When solving a trig equation in $n\\theta$ on the interval $\\alpha \\leq x \\leq \\beta$, how do you determine the range for the compound angle?", "answer": "Multiply the entire interval by $n$: the range for $n\\theta$ is $[n\\alpha, n\\beta]$. For $2x$ on $[-\\pi/2, \\pi/2]$, solve for $2x$ on $[-\\pi, \\pi]$.", "source": "GLM 5.1 ③", "_id": "glm_3_26"}, {"question": "What key identity allows you to combine $3^x \\times 2^x$ into a single exponential?", "answer": "$3^x \\times 2^x = (3 \\times 2)^x = 6^x$. This is the **key insight** for solving equations where the unknown appears in multiple exponents with the same power.", "source": "GLM 5.1 ③", "_id": "glm_3_51"}, {"question": "Given $a,b,c\\in\\mathbb{Z}^+$ with $c=b+2$ and $a+b+c=10$, why are there only three valid triples, and why is $abc$ necessarily even?", "answer": "Substituting gives $a=8-2b$, and $a>0$ forces $b\\in\\{1,2,3\\}$. Since $a=2(4-b)$ is always even, the product contains an even factor in every case.", "source": "Kimi K2.6 ①", "_id": "kimi_1_1"}, {"question": "When finding area between $C_1$ (only known by ordinates) and $C_2$ (a line), what's the most efficient method?", "answer": "Use trapezium rule on $C_1$, integrate $C_2$ exactly, then subtract.", "source": "Opus 4.7 ①", "_id": "opus_1_46"}, {"question": "What does the Factor Theorem say for a divisor of the form $(ax - b)$?", "answer": "$(ax - b)$ is a factor of $f(x)$ if and only if $f\\!\\left(\\dfrac{b}{a}\\right) = 0$.", "source": "Opus 4.7 ①", "_id": "opus_1_8"}, {"question": "What is the identity $\\cos^2\\theta = 1 - \\sin^2\\theta$ used for, and is it in the formula booklet?", "answer": "It converts equations involving $\\cos\\theta$ into equations in $\\sin\\theta$ only (or vice versa). It is NOT in the formula booklet — **you must memorise it**.", "source": "MiniMax ②", "_id": "minimax_2_23"}, {"question": "After differentiating an expression with fractional powers, how do you obtain a polynomial equation for the turning points, and what valid operation is permitted because $x>0$?", "answer": "Multiply $\\frac{dy}{dx}$ by the lowest positive power of $x$ present (here $x^{1/2}$) to eliminate negative exponents. Since $x>0$, this does not introduce extraneous solutions.", "source": "Kimi K2.6 ①", "_id": "kimi_1_17"}, {"question": "If the remainder when $f(x) = (2 - kx)^5$ is divided by $(4x - 5)$ equals $\\frac{243}{32}$, how do you find $k$?", "answer": "Set $f\\!\\left(\\frac{5}{4}\\right) = \\left(2 - \\frac{5k}{4}\\right)^5 = \\frac{243}{32}$. Take the 5th root: $2 - \\frac{5k}{4} = \\frac{3}{2}$ (since $3^5=243$, $2^5=32$). Solve: $k = \\frac{2}{5}$.", "source": "GLM 5.1 ②", "_id": "glm_2_7"}, {"question": "What is the correct log law for $\\log_a x - \\log_a y$?", "answer": "$\\log_a x - \\log_a y = \\log_a\\left(\\frac{x}{y}\\right)$. Common error: confusing with $\\log_a(x - y)$.", "source": "MiniMax ②", "_id": "minimax_2_15"}, {"question": "State the log subtraction rule.", "answer": "$\\log_a x - \\log_a y = \\log_a\\!\\left(\\dfrac{x}{y}\\right)$ — NOT $\\log_a(x - y)$.", "source": "Opus 4.7 ②", "_id": "opus_2_29"}, {"question": "When finding the area of a region bounded by an estimated curve $C_1$ and a line $C_2$, what are the two valid strategic approaches?", "answer": "(1) Apply the trapezium rule to the differences $y_{C_1}-y_{C_2}$ at each $x$. (2) Find the area under $C_1$ by the trapezium rule and subtract the exact area under $C_2$ by integration. The second is preferable when $C_2$ is linear.", "source": "Kimi K2.6 ①", "_id": "kimi_1_14"}, {"question": "Why does $ \\cos^2\\left(\\frac{n\\pi}{3}\\right) $ repeat every 3 terms?", "answer": "The cosine function has period $ 2\\pi $, so $ \\frac{n\\pi}{3} $ cycles every $ n = 3 $, making $ \\cos^2 $ repeat every 3 terms.", "source": "Qwen 3 ②", "_id": "qwen_2_6"}, {"question": "How do you solve $3^x \\times 2^{x+4} = 6$ and express the answer in terms of $a = \\log_2 3$?", "answer": "Rewrite: $3^x \\times 2^x \\times 2^4 = 6 \\;\\Rightarrow\\; 6^x = \\frac{3}{8}$. Take $\\log_2$: $x\\log_2 6 = \\log_2 3 - \\log_2 8 = a - 3$. Since $\\log_2 6 = 1 + a$, we get $x = \\dfrac{a-3}{a+1}$.", "source": "GLM 5.1 ②", "_id": "glm_2_51"}, {"question": "What conclusion sentence must be written in a proof by exhaustion?", "answer": "A sentence stating the result holds in ALL cases checked, e.g., \"In all cases, $abc$ is even. Hence, the product is always even.\" (Mark scheme awards this explicitly.)", "source": "Opus 4.7 ②", "_id": "opus_2_5"}, {"question": "The centre of a circle is the minimum turning point $T$ of $y=x^3-5x^2+3x+14$. How do you find $T$?", "answer": "$\\frac{dy}{dx}=3x^2-10x+3=0\\Rightarrow x=\\frac{1}{3}$ or $x=3$. Test second derivative: $\\frac{d^2y}{dx^2}=6x-10$. At $x=3$, $\\frac{d^2y}{dx^2}=8>0$, so $x=3$ is the minimum. $y(3)=5$, hence $T=(3,5)$. **Pitfall:** Choosing the maximum point.", "source": "Kimi K2.6 ②", "_id": "kimi_2_26"}, {"question": "What is the sign pitfall in binomial expansion when $b$ is negative?", "answer": "Odd-power terms of $b$ are negative. E.g., if $b = -\\frac{2x}{5}$, then the $r=1$ and $r=3$ terms are negative.", "source": "GLM 5.1 ②", "_id": "glm_2_12"}, {"question": "When expanding $\\left(2-\\frac{2x}{5}\\right)^5$, what determines the alternating signs, and what are the first three terms in simplest form?", "answer": "Rewrite as $(a+b)^5$ with $a=2$ and $b=-\\frac{2x}{5}$. Odd powers of $b$ yield negative terms. The first three terms are:\n$$\\binom{5}{0}2^5 = 32,\\quad \\binom{5}{1}2^4\\left(-\\frac{2x}{5}\\right) = -32x,\\quad \\binom{5}{2}2^3\\left(-\\frac{2x}{5}\\right)^2 = \\frac{64}{5}x^2$$\n**Pitfall:** Absorbing the minus sign into the term incorrectly.", "source": "Kimi K2.6 ②", "_id": "kimi_2_5"}, {"question": "Given $f(x)=(2-kx)^5$ and that division by $(4x-5)$ gives remainder $\\frac{243}{32}$, show that $k=\\frac{2}{5}$.", "answer": "By the Remainder Theorem: $f\\!\\left(\\frac{5}{4}\\right)=\\left(2-\\frac{5k}{4}\\right)^5=\\frac{243}{32}$. Take the fifth root: $2-\\frac{5k}{4}=\\left(\\frac{243}{32}\\right)^{1/5}=\\frac{3}{2}$ (since $3^5=243$ and $2^5=32$). Solving gives $\\frac{5k}{4}=\\frac{1}{2}\\Rightarrow k=\\frac{2}{5}$. **Pitfall:** Not recognising perfect fifth powers.", "source": "Kimi K2.6 ②", "_id": "kimi_2_4"}, {"question": "Given $a + b + c = 10$ and $c = b + 2$ with $a, b, c > 0$, how do you find the finite set of cases to test?", "answer": "Substitute $c = b + 2$ into the sum: $a + b + (b + 2) = 10 \\Rightarrow a = 8 - 2b$. Since $a > 0$, we need $8 - 2b > 0 \\Rightarrow b < 4$. With $b$ a positive integer, $b \\in \\{1, 2, 3\\}$. This gives exactly 3 cases to test.", "source": "MiniMax ②", "_id": "minimax_2_1"}, {"question": "For $a_n=\\cos^2\\!\\left(\\frac{n\\pi}{3}\\right)$, why does the sequence have period 3, and what are the exact values of $a_1,a_2,a_3$?", "answer": "The argument increases by $\\frac{\\pi}{3}$ each step; after 3 steps it increases by $\\pi$, and $\\cos^2(\\theta+\\pi)=\\cos^2\\theta$. Thus the sequence repeats every 3 terms:\n$$a_1=\\cos^2\\!\\left(\\frac{\\pi}{3}\\right)=\\frac{1}{4},\\quad a_2=\\cos^2\\!\\left(\\frac{2\\pi}{3}\\right)=\\frac{1}{4},\\quad a_3=\\cos^2(\\pi)=1$$", "source": "Kimi K2.6 ②", "_id": "kimi_2_7"}, {"question": "When solving $\\sin(n\\theta)=k$ on $[\\alpha,\\beta]$, what is the systematic procedure to ensure no solutions are lost?", "answer": "1) Let $u=n\\theta$; solve on scaled interval $[n\\alpha,n\\beta]$. 2) Principal value $u_1=\\arcsin(k)$. 3) Second value $u_2=\\pi-u_1$. 4) Add/subtract $2\\pi$ to find all values in scaled interval. 5) Divide by $n$. **Critical:** Always write $u_2=\\pi-u_1$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_32"}, {"question": "Given that $x=1$ is a root of $2x^3-10x^2+13x-5=0$, find the exact $x$-coordinates of the other two turning points.", "answer": "Factor out $(x-1)$: $(x-1)(2x^2-8x+5)=0$. Solve the quadratic:\n$$x=\\frac{8\\pm\\sqrt{64-40}}{4}=\\frac{4\\pm\\sqrt{6}}{2}$$\n**Pitfall:** Giving decimal approximations when exact surd form is required.", "source": "Kimi K2.6 ②", "_id": "kimi_2_23"}, {"question": "When solving $3\\sin^2(2x)+\\sin(2x)-1=0$, why must the domain $-\\frac{\\pi}{2}\\leq x\\leq\\frac{\\pi}{2}$ be scaled before finding solutions?", "answer": "The equation is in terms of $2x$, so the effective domain for the argument is $-\\pi\\leq 2x\\leq\\pi$. Solving for $2x$ on $[-\\pi,\\pi]$ ensures all solutions are captured before halving to find $x$. **Pitfall:** Solving for $x$ directly on the original interval.", "source": "Kimi K2.6 ②", "_id": "kimi_2_13"}, {"question": "What is the most recurring weakness across all 8 past papers?", "answer": "**Trapezium rule formula amnesia** — despite it being IN the formula booklet. Memorise: $\\frac{h}{2}[y_0 + y_n + 2(y_1 + \\cdots + y_{n-1})]$, $h = \\frac{b-a}{n}$.", "source": "GLM 5.1 ②", "_id": "glm_2_55"}, {"question": "For the table $x:0,0.5,1,1.5,2$ with corresponding $y$-values, apply the trapezium rule to estimate $\\int_0^2 f(x)\\,dx$ to 3 d.p.", "answer": "Here $h=0.5$, $n=4$ strips.\n$$\\frac{0.5}{2}\\bigl[3+1.92+2(2.6833+2.4+2.1466)\\bigr]=0.25[4.92+14.4598]=\\mathbf{4.845}$$\n**Pitfall:** Using $h=1$ or doubling the endpoints.", "source": "Kimi K2.6 ②", "_id": "kimi_2_17"}, {"question": "For a geometric series with $S_\\infty=3a$, what implicit condition on $r$ is required, and what value of $r$ follows?", "answer": "Convergence requires $|r|<1$. Then $\\frac{a}{1-r}=3a\\Rightarrow r=\\frac23$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_19"}, {"question": "Given $10=\\log_a(8)-\\log_a(4)$, show that $a=1.072$ to 3 d.p.", "answer": "Combine: $10=\\log_a 2$. By definition $a^{10}=2$, so $a=2^{1/10}=1.07177...\\approx1.072$. **Pitfall:** Incorrectly simplifying $\\log_a 8-\\log_a 4$ to $\\log_a 4$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_11"}, {"question": "What are the three correct logarithm laws?", "answer": "1. $\\log_a(xy) = \\log_a x + \\log_a y$\n2. $\\log_a\\left(\\frac{x}{y}\\right) = \\log_a x - \\log_a y$\n3. $\\log_a(x^n) = n\\log_a x$", "source": "MiniMax ②", "_id": "minimax_2_43"}, {"question": "Why is it a critical error to forget the constraint $a > 0$ when enumerating cases for proof by exhaustion?", "answer": "Without checking $a > 0$, you might include invalid triples (e.g., $b = 4$ gives $a = 0$, which violates \"greater than 0\"). You must verify every constraint to ensure your cases are genuinely valid.", "source": "GLM 5.1 ③", "_id": "glm_3_2"}, {"question": "What is the formula for the $n$th term of a geometric sequence?", "answer": "$u_n = ar^{n-1}$. This is **NOT in the formula booklet** — memorise it.", "source": "GLM 5.1 ①", "_id": "glm_1_34"}, {"question": "Given that $a,b,c\\in\\mathbb{Z}^+$ with $c=b+2$ and $a+b+c=10$, how do you derive the exact finite set of triples $(a,b,c)$ needed for a proof by exhaustion?", "answer": "Substitute $c=b+2$ into $a+b+c=10$ to obtain $a=8-2b$. Since $a>0$, we require $8-2b>0\\Rightarrow b<4$. With $b\\geq 1$ and $c=b+2>0$, the only valid values are $b\\in\\{1,2,3\\}$. This yields exactly three triples: $(6,1,3)$, $(4,2,4)$, and $(2,3,5)$. **Pitfall:** Forgetting the $a>0$ constraint leads to an incomplete or infinite set.", "source": "Kimi K2.6 ②", "_id": "kimi_2_1"}, {"question": "When setting $\\dfrac{dy}{dx} = 0$ produces terms with negative fractional powers, how do you eliminate them?", "answer": "Multiply through by $x^{1/2}$ (or the appropriate power) to clear the negative exponent. This is valid since $x > 0$. For example, $2x^{5/2} - 10x^{3/2} + 13x^{1/2} - 5x^{-1/2} = 0$ becomes $2x^3 - 10x^2 + 13x - 5 = 0$ after multiplying by $x^{1/2}$.", "source": "GLM 5.1 ①", "_id": "glm_1_30"}, {"question": "How do you decide whether to work in radians or degrees when solving a trig equation?", "answer": "Look at the interval. If it contains $\\pi$, work in radians. If it contains degree symbols, work in degrees.", "source": "Opus 4.7 ②", "_id": "opus_2_41"}, {"question": "What are the exact values of $\\cos^2\\!\\left(\\frac{n\\pi}{3}\\right)$ for $n = 1, 2, 3$?", "answer": "$a_1 = \\cos^2\\!\\left(\\frac{\\pi}{3}\\right) = \\left(\\frac{1}{2}\\right)^2 = \\frac{1}{4}$; $\\;a_2 = \\cos^2\\!\\left(\\frac{2\\pi}{3}\\right) = \\left(-\\frac{1}{2}\\right)^2 = \\frac{1}{4}$; $\\;a_3 = \\cos^2(\\pi) = (-1)^2 = 1$.", "source": "GLM 5.1 ②", "_id": "glm_2_13"}, {"question": "How do you find the gradient of a curve $y = f(x)$ at $x = 0$ from its binomial expansion?", "answer": "The gradient (derivative) at $x = 0$ is the coefficient of $x$ in the expansion. If $f(x) = a_0 + a_1 x + a_2 x^2 + \\ldots$, then $f'(0) = a_1$.", "source": "MiniMax ②", "_id": "minimax_2_9"}, {"question": "For $3^x\\times 2^{x+4}=6$, what is the key insight before taking logarithms?", "answer": "Rewrite as $3^x\\times 2^x\\times 2^4=6$, then combine $(3\\times 2)^x=6^x$. This gives $6^x\\times 16=6\\Rightarrow 6^x=\\frac{3}{8}$. **Pitfall:** Taking $\\ln$ immediately without combining bases, preventing expression in terms of $a$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_30"}, {"question": "What is the pitfall when summing a periodic sequence over a range that doesn't divide evenly by the period?", "answer": "Forgetting the **remainder terms** after the full cycles. Always compute: (number of full cycles × sum per cycle) + remaining terms.", "source": "GLM 5.1 ②", "_id": "glm_2_16"}, {"question": "Given $c = b + 2$ and $a + b + c = 10$ with $a, b, c$ positive integers, how do you express $a$ in terms of $b$?", "answer": "Substituting: $a + b + (b+2) = 10 \\Rightarrow a = 8 - 2b$.", "source": "Opus 4.7 ①", "_id": "opus_1_3"}, {"question": "Solve $3\\sin^2(2x) + \\sin(2x) - 1 = 0$ for $-\\frac{\\pi}{2} \\leq x \\leq \\frac{\\pi}{2}$. What are the four solutions?", "answer": "Let $u = \\sin(2x)$. Then $3u^2 + u - 1 = 0$\n$u = \\frac{-1 \\pm \\sqrt{13}}{6}$ giving $u_1 \\approx 0.434$, $u_2 \\approx -0.768$\n\nFor $u_1 = 0.434$: $2x \\approx 0.449$ or $\\pi - 0.449 \\approx 2.693$\n$x \\approx 0.225$ or $1.35$\n\nFor $u_2 = -0.768$: $2x \\approx -0.875$ or $-\\pi - (-0.875) \\approx -2.267$\n$x \\approx -0.437$ or $-1.13$", "source": "MiniMax ②", "_id": "minimax_2_26"}, {"question": "How do you solve an equation where the unknown is in the exponent, such as $3^x \\times 2^{x+4} = 6$?", "answer": "(1) Rewrite to combine same-exponent terms: $3^x \\times 2^x = (3 \\times 2)^x = 6^x$. (2) Simplify: $6^x \\times 16 = 6$, so $6^x = \\dfrac{3}{8}$. (3) Take $\\log_2$ of both sides (matching the given constant $a = \\log_2 3$). (4) Express everything in terms of $a$.", "source": "GLM 5.1 ①", "_id": "glm_1_43"}, {"question": "For $\\sum_{n=1}^{50}\\cos^2\\!\\left(\\frac{n\\pi}{3}\\right)$, how many complete periods and remainder terms are there?", "answer": "Period = 3, so $50 = 16 \\times 3 + 2$. Sum $= 16 \\times \\frac{3}{2} + \\frac{1}{4} + \\frac{1}{4} = 24 + \\frac{1}{2} = \\frac{49}{2}$. **Never forget the 2 remainder terms.**", "source": "GLM 5.1 ③", "_id": "glm_3_16"}, {"question": "When finding the exact area between a curve and a line from $x = a$ to $x = b$, what must you verify before integrating?", "answer": "Which function is **upper** and which is **lower** on $[a, b]$. Check at a sample point (e.g., $x = 0$) to confirm. Then integrate $\\int_a^b (\\text{upper} - \\text{lower})\\,dx$.", "source": "GLM 5.1 ③", "_id": "glm_3_50"}, {"question": "When does a $\\cos$ value squared lose its sign?", "answer": "Always — $\\cos^2(x) = (\\cos x)^2 \\geq 0$ for all $x$, so squaring eliminates negative signs (e.g., $\\cos^2(2\\pi/3) = 1/4$ even though $\\cos(2\\pi/3) = -1/2$).", "source": "Opus 4.7 ②", "_id": "opus_2_93"}, {"question": "What is the single most important trig rule that is NOT in the formula booklet?", "answer": "$\\cos^2\\theta = 1 - \\sin^2\\theta$ — essential for converting between sin and cos in identity proofs. Not in the booklet; must be memorised.", "source": "GLM 5.1 ③", "_id": "glm_3_58"}, {"question": "Why must you always write a concluding sentence in a proof by exhaustion?", "answer": "Examiners award an explicit mark for the conclusion (e.g., \"In all cases, ... Hence ...\"). Without it you lose the final mark even if all cases are correct.", "source": "Opus 4.7 ①", "_id": "opus_1_2"}, {"question": "In $w=\\log_a(t+5)-\\log_a 4$, why is this not equal to $\\log_a(t+1)$, and what is the correct single-logarithm form?", "answer": "The subtraction law is $\\log A-\\log B=\\log(A/B)$, **not** $\\log(A-B)$. The correct form is $w=\\log_a\\!\\left(\\frac{t+5}{4}\\right)$. This is a recurring error across papers.", "source": "Kimi K2.6 ②", "_id": "kimi_2_9"}, {"question": "In a proof by exhaustion, what two conditions must be satisfied for the proof to be valid?", "answer": "(1) The set of cases must be **finite and exhaustive** — you must test ALL possible cases. (2) The conclusion must hold for **every single case** without exception. If any case fails, the proof fails.", "source": "MiniMax ②", "_id": "minimax_2_0"}, {"question": "When finding the exact area bounded by the cubic $C_1$, its tangent $l$, and the $y$-axis, why integrate (curve $-$ line), and what is the exact result?", "answer": "On $[0,2]$ the cubic lies above the tangent, so $$\\text{Area}=\\int_0^2\\!\\left[\\left(x^3-5x^2+3x+14\\right)-\\left(\\frac{x}{3}+\\frac{22}{3}\\right)\\right]dx=\\frac{28}{3}$$", "source": "Kimi K2.6 ①", "_id": "kimi_1_25"}, {"question": "To solve $3^x\\cdot2^{x+4}=6$, what is the critical first step that combines the exponential bases?", "answer": "Rewrite as $3^x\\cdot2^x\\cdot16=6$, which becomes $(3\\cdot2)^x=\\frac{3}{8}$, i.e. $6^x=\\frac38$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_27"}, {"question": "At a point $A$ on a circle, what is the relationship between the gradient of the radius $TA$ and the gradient of the tangent at $A$?", "answer": "They are negative reciprocals: $m_{\\text{tangent}} \\times m_{\\text{radius}} = -1$. This is the same perpendicular line rule used for any curve.", "source": "MiniMax ②", "_id": "minimax_2_38"}, {"question": "How do you show that $(3\\cos\\theta - \\tan\\theta)\\cos\\theta = 2$ can be written as $3\\sin^2\\theta + \\sin\\theta - 1 = 0$?", "answer": "Expand LHS: $3\\cos^2\\theta - \\tan\\theta\\cdot\\cos\\theta = 3\\cos^2\\theta - \\sin\\theta$ (since $\\tan\\theta = \\frac{\\sin\\theta}{\\cos\\theta}$). Set equal to 2, then replace $\\cos^2\\theta = 1 - \\sin^2\\theta$: $3(1-\\sin^2\\theta) - \\sin\\theta = 2 \\Rightarrow 3\\sin^2\\theta + \\sin\\theta - 1 = 0$.", "source": "GLM 5.1 ②", "_id": "glm_2_22"}, {"question": "When solving $3\\sin^2(2x) + \\sin(2x) - 1 = 0$ for $-\\frac{\\pi}{2} \\leq x \\leq \\frac{\\pi}{2}$, how many solutions should you expect?", "answer": "The quadratic in $\\sin(2x)$ gives two values of $\\sin(2x)$. Each value yields two solutions for $2x$ in $[-\\pi, \\pi]$, giving **4 solutions** for $x$ in $[-\\pi/2, \\pi/2]$.", "source": "GLM 5.1 ③", "_id": "glm_3_27"}, {"question": "Given $w=\\log_a\\!\\left(\\frac{t+5}{4}\\right)$, how do you make $t$ the subject?", "answer": "Use the definitional equivalence: $\\log_a M=N\\iff a^N=M$. Exponentiate both sides: $a^w=\\frac{t+5}{4}\\Rightarrow t=4a^w-5$. **Pitfall:** Confusing $a^w$ with $w^a$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_10"}, {"question": "In proving $(3\\cos\\theta-\\tan\\theta)\\cos\\theta=2$ can be written as $3\\sin^2\\theta+\\sin\\theta-1=0$, why must $\\tan\\theta$ be rewritten first and what identity replaces $\\cos^2\\theta$?", "answer": "Rewrite $\\tan\\theta=\\frac{\\sin\\theta}{\\cos\\theta}$ so the factor $\\cos\\theta$ cancels. Then use $\\cos^2\\theta=1-\\sin^2\\theta$ to obtain a quadratic in $\\sin\\theta$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_10"}, {"question": "Given a cubic $2x^3 - 10x^2 + 13x - 5 = 0$ with known root $x = 1$, how do you find the other roots?", "answer": "Use the Factor Theorem: divide by $(x - 1)$. Performing polynomial division:\n$$2x^3 - 10x^2 + 13x - 5 = (x - 1)(2x^2 - 8x + 5)$$\nSolve $2x^2 - 8x + 5 = 0$ using the quadratic formula:\n$$x = \\frac{8 \\pm \\sqrt{64 - 40}}{4} = \\frac{8 \\pm 2\\sqrt{6}}{4} = \\frac{4 \\pm \\sqrt{6}}{2}$$", "source": "MiniMax ②", "_id": "minimax_2_33"}, {"question": "In proof by exhaustion, how do you determine the finite set of cases to test?", "answer": "Derive constraints from the given equations. For example, from $c = b + 2$ and $a + b + c = 10$, substitute to get $a = 8 - 2b$. Then enforce $a, b, c > 0$ as integers: $b \\geq 1$ and $a > 0 \\Rightarrow b < 4$, so $b \\in \\{1, 2, 3\\}$ — only 3 cases.", "source": "GLM 5.1 ③", "_id": "glm_3_1"}, {"question": "How do you express $\\log_2\\!\\left(\\frac{3}{8}\\right)$ in terms of $a = \\log_2 3$?", "answer": "$\\log_2 3 - \\log_2 8 = a - 3$. Recognise that $8 = 2^3$, so $\\log_2 8 = 3$.", "source": "GLM 5.1 ③", "_id": "glm_3_54"}, {"question": "How do you simplify a rational function like $\\dfrac{12x^3(x-7) + 14x(13x-15)}{21x^{1/2}}$?", "answer": "**Divide term-by-term.** Expand the numerator first, then divide each term individually by $21x^{1/2}$ using the law $\\dfrac{x^m}{x^n} = x^{m-n}$. **Pitfall:** trying to simplify the whole fraction at once leads to arithmetic errors.", "source": "GLM 5.1 ①", "_id": "glm_1_28"}, {"question": "When a polynomial $f(x)$ is divided by $(ax-b)$, what exact value do you substitute to find the remainder, and what is the most common misconception?", "answer": "Substitute $x=\\frac{b}{a}$. The remainder is $f\\!\\left(\\frac{b}{a}\\right)$. **Common misconception:** substituting $x=b$ or $x=a$. Set the divisor equal to zero: $ax-b=0\\Rightarrow x=\\frac{b}{a}$. This applies to both the Remainder Theorem and the Factor Theorem.", "source": "Kimi K2.6 ②", "_id": "kimi_2_3"}, {"question": "Find the equation of the line through $A = (2, 8)$ with gradient $\\dfrac{1}{3}$.", "answer": "$y - 8 = \\dfrac{1}{3}(x - 2)$, simplifying to $y = \\dfrac{x + 22}{3}$.", "source": "Opus 4.7 ②", "_id": "opus_2_76"}, {"question": "What is the log subtraction law, and what is a common misuse of it?", "answer": "$\\log_a x - \\log_a y = \\log_a\\!\\left(\\frac{x}{y}\\right)$. Common misuse: writing $\\log_a(x - y)$ — this is **never** valid.", "source": "GLM 5.1 ③", "_id": "glm_3_18"}, {"question": "How do you find the gradient of $C: y=\\left(2-\\frac{2x}{5}\\right)^5$ at $x=0$ using its binomial expansion?", "answer": "Differentiate the expansion term-by-term: $\\frac{dy}{dx}=-32+\\frac{128}{5}x+\\dots$ and evaluate at $x=0$. The gradient is $\\mathbf{-32}$. This avoids the chain rule on the composite original form.", "source": "Kimi K2.6 ②", "_id": "kimi_2_6"}, {"question": "For a sequence defined by $a_n = \\cos^2\\left(\\frac{n\\pi}{3}\\right)$, what is the period and why?", "answer": "Period = 3. Since $\\cos^2\\theta$ has period $\\pi$, and $\\frac{n\\pi}{3}$ increments by $\\frac{\\pi}{3}$, the values repeat when $n$ increases by 3: $\\cos^2\\left(\\frac{(n+3)\\pi}{3}\\right) = \\cos^2\\left(\\frac{n\\pi}{3} + \\pi\\right) = \\cos^2\\left(\\frac{n\\pi}{3}\\right)$.", "source": "MiniMax ②", "_id": "minimax_2_10"}, {"question": "To simplify $y=\\frac{12x^3(x-7)+14x(13x-15)}{21x^{1/2}}$ into the form $ax^{7/2}+bx^{5/2}+cx^{3/2}+dx^{1/2}$, what algebraic strategy prevents arithmetic error?", "answer": "Fully expand the numerator into a polynomial, then divide each term individually by $21x^{1/2}$, subtracting $\\frac12$ from each exponent. This yields $a=\\frac47$, $b=-4$, $c=\\frac{26}{3}$, $d=-10$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_16"}, {"question": "If $\\sin\\theta=k$ has principal solution $\\theta_1=\\arcsin(k)$, what is the second solution in $[0,2\\pi]$, and why is this the single most recurring error?", "answer": "The second solution is $\\theta_2=\\pi-\\theta_1$ (or $180^\\circ-\\theta_1$). Sine is positive in quadrants I and II, and the graph is symmetric about $\\theta=\\frac{\\pi}{2}$. This has been missed in multiple papers. **Always write:** $\\sin\\theta=k\\Rightarrow\\theta=\\arcsin(k)$ or $\\theta=\\pi-\\arcsin(k)$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_14"}, {"question": "When asked to solve in radians, what visual cue tells you the interval is in radians not degrees?", "answer": "The presence of $\\pi$ in the interval (e.g., $-\\pi/2 \\leq x \\leq \\pi/2$).", "source": "Opus 4.7 ①", "_id": "opus_1_40"}, {"question": "What defines a proof by exhaustion, and what is the critical prerequisite that makes it a valid proof method?", "answer": "A proof by exhaustion verifies a proposition by checking **every single valid case** in a finite set. The prerequisite is that the possibility space must be **finite and enumerable**. You must derive constraints from the given conditions to produce a complete list, verify the proposition for each case (often in a table), and write a compulsory conclusion sentence: *\"In all cases, [proposition]. Hence, [proposition] is always true.\"*", "source": "Kimi K2.6 ②", "_id": "kimi_2_0"}, {"question": "Given circle centre $T=(3,5)$ passing through $A=(2,8)$, find its equation and the tangent at $A$.", "answer": "Radius squared: $(2-3)^2+(8-5)^2=10$. Equation: $(x-3)^2+(y-5)^2=10$. Radius gradient: $m_{TA}=-3$. Tangent gradient: $m=\\frac{1}{3}$ (negative reciprocal). Tangent: $y-8=\\frac{1}{3}(x-2)\\Rightarrow y=\\frac{1}{3}x+\\frac{22}{3}$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_27"}, {"question": "In the binomial expansion $(a + b)^n$, what is the general term $T_{r+1}$?", "answer": "$T_{r+1} = \\binom{n}{r} a^{n-r} b^r$ where $r = 0, 1, 2, \\ldots, n$", "source": "MiniMax ②", "_id": "minimax_2_7"}, {"question": "Given $\\frac{dy}{dx}=2x^{5/2}-10x^{3/2}+13x^{1/2}-5x^{-1/2}$, show that turning point $x$-coordinates satisfy $2x^3-10x^2+13x-5=0$.", "answer": "Set $\\frac{dy}{dx}=0$. Multiply through by $x^{1/2}$ (valid since $x>0$) to clear the negative exponent:\n$$2x^3-10x^2+13x-5=0$$\n**Pitfall:** Dividing by $x^{1/2}$ instead of multiplying, or ignoring the negative power.", "source": "Kimi K2.6 ②", "_id": "kimi_2_22"}, {"question": "When solving an exponential equation and the answer must be in terms of $a = \\log_b c$, which log base should you use?", "answer": "Use base $b$ (the base of the given constant). E.g., if $a = \\log_2 3$, use $\\log_2$ throughout. Using $\\ln$ works numerically but won't express the answer in terms of $a$.", "source": "GLM 5.1 ②", "_id": "glm_2_53"}, {"question": "How can you verify that $abc$ is always even for the triples where $a = 8 - 2b$, without checking each case individually?", "answer": "Since $a = 8 - 2b = 2(4 - b)$, $a$ is always even. A product containing at least one even factor is always even. This is a **deduction** argument — but exhaustion requires checking each case separately anyway.", "source": "GLM 5.1 ③", "_id": "glm_3_4"}, {"question": "In the expansion of $\\left(2-\\frac{2x}{5}\\right)^5$, what is the conceptual shortcut to find the gradient at $x=0$ without differentiating the original bracket?", "answer": "The gradient $f'(0)$ equals the coefficient of the $x$-term in the binomial expansion. The first two terms are $32-32x+\\dots$, so $f'(0)=-32$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_4"}, {"question": "For the data points $(x, y)$: $(0, 3), (0.5, 2.6833), (1, 2.4), (1.5, 2.1466), (2, 1.92)$, what is the trapezium rule estimate?", "answer": "Here $h = 0.5$, $n = 4$ (4 strips, 5 ordinates):\n$$\\frac{0.5}{2}[3 + 1.92 + 2(2.6833 + 2.4 + 2.1466)] = 0.25[4.92 + 2(7.2299)] = 4.845$$", "source": "MiniMax ②", "_id": "minimax_2_28"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "What is the method of proof by exhaustion?", "answer": "Test **ALL** valid cases in a finite set. Derive constraints from the given equations to identify every possible case, verify the property for each one, then write a compulsory **conclusion sentence** (e.g., \"In all cases, ... Hence, ... is always true.\" ∎).", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "When proving by exhaustion, how do you determine the finite set of cases to test?", "answer": "Use the given constraints to derive bounds. For example, if $a = 8 - 2b$ and $a > 0$, then $8 - 2b > 0 \\Rightarrow b < 4$. Combined with $b \\geq 1$ (positive integer), $b \\in \\{1, 2, 3\\}$. **Pitfall:** forgetting to check that all variables remain positive.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "What is the difference between proof by exhaustion and proof by deduction?", "answer": "**Exhaustion** requires checking each valid case *individually* in a table or list. **Deduction** derives the result logically from axioms/identities without enumerating cases. Using deduction when exhaustion is asked for loses marks.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": true}, {"question": "In proof by exhaustion, why must you always write a conclusion sentence?", "answer": "Examiners allocate a mark explicitly for the conclusion. Without a statement like \"In all cases the product is even, hence the product is always even,\" you lose the final mark even if all cases are correct.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "When a polynomial $f(x)$ is divided by $(ax - b)$, what value of $x$ do you substitute to find the remainder?", "answer": "$x = \\dfrac{b}{a}$. The remainder is $f\\!\\left(\\dfrac{b}{a}\\right)$. **Pitfall:** do NOT substitute $x = b$ or $x = \\dfrac{a}{b}$.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": true}, {"question": "What is the general form of the Remainder Theorem?", "answer": "When $f(x)$ is divided by $(ax - b)$, the remainder is $f\\!\\left(\\dfrac{b}{a}\\right)$.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "What is the general form of the Factor Theorem?", "answer": "$(ax - b)$ is a factor of $f(x)$ if and only if $f\\!\\left(\\dfrac{b}{a}\\right) = 0$.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": true}, {"question": "How do you evaluate $\\left(\\dfrac{243}{32}\\right)^{1/5}$ without a calculator?", "answer": "Recognise perfect powers: $243 = 3^5$ and $32 = 2^5$, so $\\left(\\dfrac{3^5}{2^5}\\right)^{1/5} = \\dfrac{3}{2}$.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "In the binomial expansion of $\\left(2 - \\dfrac{2x}{5}\\right)^5$, what are the first three terms?", "answer": "Using $(a+b)^n = \\sum \\binom{n}{r} a^{n-r}b^r$ with $a=2$, $b=-\\dfrac{2x}{5}$: $r=0$: $32$, $r=1$: $-32x$, $r=2$: $\\dfrac{64x^2}{5}$. So $32 - 32x + \\dfrac{64}{5}x^2 + \\cdots$. **Pitfall:** since $b$ is negative, odd-power terms are negative.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": true}, {"question": "How do you find the gradient of a curve at $x = 0$ using a binomial expansion?", "answer": "Differentiate the expansion term by term, then substitute $x = 0$. Only the constant term of $f'(x)$ survives. For $f(x) = 32 - 32x + \\frac{64}{5}x^2 + \\cdots$, $f'(x) = -32 + \\frac{128}{5}x + \\cdots$, so $f'(0) = -32$.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "What is the periodicity of the sequence $\\cos^2\\!\\left(\\dfrac{n\\pi}{3}\\right)$?", "answer": "It repeats every **3** terms: $\\dfrac{1}{4},\\; \\dfrac{1}{4},\\; 1,\\; \\dfrac{1}{4},\\; \\dfrac{1}{4},\\; 1,\\; \\ldots$ The sum of one full period is $\\dfrac{1}{4} + \\dfrac{1}{4} + 1 = \\dfrac{3}{2}$.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "When a trig sequence repeats with period $k$, how do you sum the first $N$ terms?", "answer": "Compute $\\lfloor N/k \\rfloor$ full periods (multiply by sum per period), then add the **remainder terms** from the incomplete final period. **Pitfall:** forgetting the remainder terms.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": true}, {"question": "What is the formula for $\\displaystyle\\sum_{r=1}^{n} r^2$?", "answer": "$\\dfrac{n(n+1)(2n+1)}{6}$ — this is **in the formula booklet**.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "What is $\\cos\\!\\left(\\dfrac{2\\pi}{3}\\right)$?", "answer": "$-\\dfrac{1}{2}$. **Pitfall:** writing $+\\dfrac{1}{2}$. However, after squaring, $\\cos^2(2\\pi/3) = \\frac{1}{4}$ either way.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "How do you split a sum of the form $\\displaystyle\\sum_{n=1}^{N}\\left[n^2 + g(n)\\right]$?", "answer": "Split into two separate sums: $\\displaystyle\\sum_{n=1}^{N} n^2 + \\sum_{n=1}^{N} g(n)$. Evaluate each independently, then add.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "What is the log law for $\\log_a x - \\log_a y$?", "answer": "$\\log_a x - \\log_a y = \\log_a\\!\\left(\\dfrac{x}{y}\\right)$. **Pitfall:** this is NOT $\\log_a(x - y)$.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "If $\\log_a M = N$, what is the equivalent exponential statement?", "answer": "$a^N = M$. This is the **fundamental definition** of logarithms.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "How do you rearrange an equation of the form $\\log_a(\\text{expression}) = c$ to make the expression the subject?", "answer": "Exponentiate both sides: $\\text{expression} = a^c$. For example, $w = \\log_a\\!\\left(\\frac{t+5}{4}\\right) \\;\\Rightarrow\\; \\frac{t+5}{4} = a^w \\;\\Rightarrow\\; t = 4a^w - 5$.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "How do you convert $\\cos^2\\theta$ to an expression involving $\\sin^2\\theta$?", "answer": "$\\cos^2\\theta = 1 - \\sin^2\\theta$. This identity is **NOT in the formula booklet** — you must memorise it.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": true}, {"question": "When solving $\\sin\\theta = k$, what are the two solutions in $[0, 2\\pi]$?", "answer": "$\\theta_1 = \\arcsin(k)$ and $\\theta_2 = \\pi - \\arcsin(k)$. **Recurring pitfall across multiple papers:** forgetting the second solution.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "When solving a trig equation involving $2x$ on the interval $-\\dfrac{\\pi}{2} \\leq x \\leq \\dfrac{\\pi}{2}$, what is the effective domain for $2x$?", "answer": "Multiply the interval by 2: $-\\pi \\leq 2x \\leq \\pi$. You must find ALL solutions for $2x$ in this expanded interval, then halve to get $x$. **Pitfall:** solving only for $x$ in the original interval without scaling.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "When solving $\\sin(2x) = k$ on $-\\pi \\leq 2x \\leq \\pi$, how many solutions does each value of $k$ typically give?", "answer": "**Two** solutions: $2x_1 = \\arcsin(k)$ and $2x_2 = \\pi - \\arcsin(k)$ (or their negatives for negative $k$). Check both lie within the domain.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": true}, {"question": "How do you determine whether to work in degrees or radians for a trig equation?", "answer": "Look at the interval given. If it contains $\\pi$, use **radians**. If it contains degree symbols (°), use degrees.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "What is the trapezium rule formula for estimating $\\displaystyle\\int_a^b y\\,dx$ with $n$ strips?", "answer": "$\\dfrac{h}{2}\\left[y_0 + y_n + 2(y_1 + y_2 + \\cdots + y_{n-1})\\right]$ where $h = \\dfrac{b-a}{n}$. This is **in the formula booklet**. **Top priority pitfall:** this formula is forgotten repeatedly — memorise it.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "In the trapezium rule, which ordinates are doubled?", "answer": "Only the **interior** ordinates $y_1, y_2, \\ldots, y_{n-1}$. The two **endpoint** ordinates $y_0$ and $y_n$ are added once (not doubled).", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": true}, {"question": "How do you find the area between two curves $y = f(x)$ (upper) and $y = g(x)$ (lower) from $x = a$ to $x = b$?", "answer": "$\\displaystyle\\int_a^b \\left[f(x) - g(x)\\right] dx$. Integrate the **upper curve minus the lower curve**.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "When finding the area between two curves using the trapezium rule, what are two valid approaches?", "answer": "(1) Compute new $y$-values as $y_{\\text{new}} = y_{\\text{upper}} - y_{\\text{lower}}$ at each $x$-value, then apply the trapezium rule to these differences. (2) Find area under the upper curve (trapezium rule), find area under the lower curve (exact integration if possible), and subtract.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": true}, {"question": "How do you calculate a percentage of a total?", "answer": "$\\dfrac{\\text{part}}{\\text{whole}} \\times 100$.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "How do you simplify a rational function like $\\dfrac{12x^3(x-7) + 14x(13x-15)}{21x^{1/2}}$?", "answer": "**Divide term-by-term.** Expand the numerator first, then divide each term individually by $21x^{1/2}$ using the law $\\dfrac{x^m}{x^n} = x^{m-n}$. **Pitfall:** trying to simplify the whole fraction at once leads to arithmetic errors.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": true}, {"question": "How does the power rule for differentiation apply to fractional powers?", "answer": "$\\dfrac{d}{dx}x^n = nx^{n-1}$ works for **ALL rational** $n$, not just integers. For example, $\\dfrac{d}{dx}x^{7/2} = \\dfrac{7}{2}x^{5/2}$.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "When setting $\\dfrac{dy}{dx} = 0$ produces terms with negative fractional powers, how do you eliminate them?", "answer": "Multiply through by $x^{1/2}$ (or the appropriate power) to clear the negative exponent. This is valid since $x > 0$. For example, $2x^{5/2} - 10x^{3/2} + 13x^{1/2} - 5x^{-1/2} = 0$ becomes $2x^3 - 10x^2 + 13x - 5 = 0$ after multiplying by $x^{1/2}$.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": true}, {"question": "If $x = 1$ is a root of the cubic $2x^3 - 10x^2 + 13x - 5 = 0$, how do you find the other roots?", "answer": "Factor out $(x - 1)$ by polynomial division or inspection: $(x-1)(2x^2 - 8x + 5) = 0$. Then solve the quadratic $2x^2 - 8x + 5 = 0$ using the formula.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": false}, {"question": "When a question asks for \"exact\" coordinates, what form must your answer be in?", "answer": "**Surd form** (e.g., $\\dfrac{4 \\pm \\sqrt{6}}{2}$), NOT decimal approximations. **Pitfall:** giving decimal answers loses marks.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "What is the formula for the sum to infinity of a geometric series?", "answer": "$S_\\infty = \\dfrac{a}{1-r}$, valid when $|r| < 1$. This is **in the formula booklet**.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": false}, {"question": "What is the formula for the $n$th term of a geometric sequence?", "answer": "$u_n = ar^{n-1}$. This is **NOT in the formula booklet** — memorise it.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": true}, {"question": "What is the formula for the sum of the first $n$ terms of a geometric series?", "answer": "$S_n = \\dfrac{a(1-r^n)}{1-r}$. This is **in the formula booklet**.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "What is the equation of a circle with centre $(a, b)$ and radius $r$?", "answer": "$(x - a)^2 + (y - b)^2 = r^2$. This is **NOT in the formula booklet** — memorise it.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": false}, {"question": "What is the relationship between the gradient of a tangent to a circle and the gradient of the radius at the point of contact?", "answer": "$m_{\\text{tangent}} \\times m_{\\text{radius}} = -1$ (they are negative reciprocals).", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": true}, {"question": "How do you find the radius of a circle given the centre and a point on the circumference?", "answer": "Use the distance formula: $r^2 = (x_2 - x_1)^2 + (y_2 - y_1)^2$.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": false}, {"question": "How do you classify a turning point as a maximum or minimum?", "answer": "Use the **second derivative test**: if $\\dfrac{d^2y}{dx^2} < 0$ at the turning point, it's a **local maximum**; if $\\dfrac{d^2y}{dx^2} > 0$, it's a **local minimum**.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": false}, {"question": "How do you find the exact area of a region bounded by a curve and a line from $x = a$ to $x = b$?", "answer": "$\\displaystyle\\int_a^b (\\text{upper} - \\text{lower})\\,dx$. First determine which function is on top by testing a point in the interval.", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": false}, {"question": "What log law allows you to rewrite $\\log_a x^n$?", "answer": "$\\log_a x^n = n\\log_a x$. For example, $\\log_2 9 = \\log_2 3^2 = 2\\log_2 3 = 2a$.", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": false}, {"question": "What log law allows you to rewrite $\\log_a\\!\\left(\\dfrac{x}{y}\\right)$?", "answer": "$\\log_a\\!\\left(\\dfrac{x}{y}\\right) = \\log_a x - \\log_a y$. For example, $\\log_2\\!\\left(\\dfrac{3}{16}\\right) = \\log_2 3 - \\log_2 16 = a - 4$.", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": false}, {"question": "How do you solve an equation where the unknown is in the exponent, such as $3^x \\times 2^{x+4} = 6$?", "answer": "(1) Rewrite to combine same-exponent terms: $3^x \\times 2^x = (3 \\times 2)^x = 6^x$. (2) Simplify: $6^x \\times 16 = 6$, so $6^x = \\dfrac{3}{8}$. (3) Take $\\log_2$ of both sides (matching the given constant $a = \\log_2 3$). (4) Express everything in terms of $a$.", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": true}, {"question": "Why must you use $\\log_2$ (not $\\ln$) when solving $6^x = \\dfrac{3}{8}$ and the answer must be in terms of $a = \\log_2 3$?", "answer": "Using $\\ln$ gives an answer in terms of $\\ln 2$ and $\\ln 3$, which cannot be expressed simply in terms of $a$. Using $\\log_2$ lets you replace $\\log_2 3$ with $a$ and use $\\log_2 2 = 1$, $\\log_2 8 = 3$, etc.", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": false}, {"question": "How do you express $\\log_2 6$ in terms of $a = \\log_2 3$?", "answer": "$\\log_2 6 = \\log_2(2 \\times 3) = \\log_2 2 + \\log_2 3 = 1 + a$.", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": false}, {"question": "What are the values of $\\log_2 2$, $\\log_2 4$, $\\log_2 8$, and $\\log_2 16$?", "answer": "$1,\\; 2,\\; 3,\\; 4$ respectively. These are powers of 2 and should be recognised instantly.", "source": "GLM 5.1 ①", "_id": "glm_1_46", "judge_pick": false}, {"question": "What is the key insight for rewriting $3^x \\times 2^{x+4}$?", "answer": "$3^x \\times 2^{x+4} = 3^x \\times 2^x \\times 2^4 = (3 \\times 2)^x \\times 16 = 6^x \\times 16$. The rule $a^x \\times b^x = (ab)^x$ is what makes this work.", "source": "GLM 5.1 ①", "_id": "glm_1_47", "judge_pick": false}], "count": 48}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "What is the method for proof by exhaustion?", "answer": "Enumerate ALL valid cases that satisfy the given constraints, test each one individually, then state a compulsory conclusion sentence: \"In all cases, [statement]. Hence, [statement] is always true.\" ∎", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "When proving by exhaustion, how do you determine which cases to test?", "answer": "Derive constraints from the given equations/conditions to find a finite set of possibilities. E.g., from $c = b+2$ and $a+b+c=10$, get $a=8-2b$, then use $a,b,c > 0$ (integers) to restrict $b$ to $\\{1,2,3\\}$.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "In proof by exhaustion, what is the pitfall regarding checking validity of cases?", "answer": "Forgetting to apply ALL constraints. E.g., if $a = 8-2b$ and $a > 0$, then $b < 4$. Missing this constraint would include invalid triples where $a \\leq 0$.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": true}, {"question": "What is the critical exam requirement at the end of a proof by exhaustion?", "answer": "A **conclusion sentence** — e.g., \"In all three cases, the product $abc$ is even. Hence, the product of $a$, $b$ and $c$ is always even.\" Without this, you lose the final mark.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "How does proof by exhaustion differ from proof by deduction?", "answer": "Exhaustion requires checking **each valid case individually** and showing the statement holds in every one. Deduction derives the result logically from known facts without case-by-case testing.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "When $f(x)$ is divided by $(ax - b)$, what is the remainder?", "answer": "$f\\!\\left(\\dfrac{b}{a}\\right)$. **Not** $f(b/a)$ confused with $f(b)$ — you substitute $x = b/a$ into the polynomial.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": true}, {"question": "What is the general Factor Theorem for divisor $(ax - b)$?", "answer": "$(ax - b)$ is a factor of $f(x)$ $\\iff$ $f\\!\\left(\\dfrac{b}{a}\\right) = 0$.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "If the remainder when $f(x) = (2 - kx)^5$ is divided by $(4x - 5)$ equals $\\frac{243}{32}$, how do you find $k$?", "answer": "Set $f\\!\\left(\\frac{5}{4}\\right) = \\left(2 - \\frac{5k}{4}\\right)^5 = \\frac{243}{32}$. Take the 5th root: $2 - \\frac{5k}{4} = \\frac{3}{2}$ (since $3^5=243$, $2^5=32$). Solve: $k = \\frac{2}{5}$.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": true}, {"question": "How do you evaluate $\\left(\\frac{243}{32}\\right)^{1/5}$ without a calculator?", "answer": "Recognise perfect powers: $243 = 3^5$ and $32 = 2^5$, so $\\left(\\frac{3^5}{2^5}\\right)^{1/5} = \\frac{3}{2}$.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "What is the binomial expansion formula for $(a+b)^n$?", "answer": "$(a+b)^n = \\displaystyle\\sum_{r=0}^{n} \\binom{n}{r} a^{n-r} b^r$ (in formula booklet)", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "When expanding $\\left(2 - \\frac{2x}{5}\\right)^5$, what are the first three terms?", "answer": "$r=0$: $\\binom{5}{0}(2)^5 = 32$; $\\;r=1$: $\\binom{5}{1}(2)^4\\!\\left(-\\frac{2x}{5}\\right) = -32x$; $\\;r=2$: $\\binom{5}{2}(2)^3\\!\\left(-\\frac{2x}{5}\\right)^2 = \\frac{64x^2}{5}$. Result: $32 - 32x + \\frac{64}{5}x^2 + \\ldots$", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "How do you find the gradient of a curve at $x = 0$ using a binomial expansion?", "answer": "Differentiate the expansion term-by-term, then substitute $x = 0$. All terms with $x$ vanish, leaving only the constant from the derivative of the linear term. E.g., $f(x) \\approx 32 - 32x + \\ldots \\Rightarrow f'(0) = -32$.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "What is the sign pitfall in binomial expansion when $b$ is negative?", "answer": "Odd-power terms of $b$ are negative. E.g., if $b = -\\frac{2x}{5}$, then the $r=1$ and $r=3$ terms are negative.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": true}, {"question": "What are the exact values of $\\cos^2\\!\\left(\\frac{n\\pi}{3}\\right)$ for $n = 1, 2, 3$?", "answer": "$a_1 = \\cos^2\\!\\left(\\frac{\\pi}{3}\\right) = \\left(\\frac{1}{2}\\right)^2 = \\frac{1}{4}$; $\\;a_2 = \\cos^2\\!\\left(\\frac{2\\pi}{3}\\right) = \\left(-\\frac{1}{2}\\right)^2 = \\frac{1}{4}$; $\\;a_3 = \\cos^2(\\pi) = (-1)^2 = 1$.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": true}, {"question": "What is the period of the sequence $\\cos^2\\!\\left(\\frac{n\\pi}{3}\\right)$, and what is one full cycle?", "answer": "Period = 3. One cycle: $\\frac{1}{4}, \\frac{1}{4}, 1$. Sum per cycle = $\\frac{1}{4} + \\frac{1}{4} + 1 = \\frac{3}{2}$.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "How do you evaluate $\\displaystyle\\sum_{n=1}^{50}\\cos^2\\!\\left(\\frac{n\\pi}{3}\\right)$ using periodicity?", "answer": "$50 = 16 \\times 3 + 2$. Sum $= 16 \\times \\frac{3}{2} + \\underbrace{\\frac{1}{4} + \\frac{1}{4}}_{\\text{2 remainder terms}} = 24 + \\frac{1}{2} = \\frac{49}{2}$.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "What is the pitfall when summing a periodic sequence over a range that doesn't divide evenly by the period?", "answer": "Forgetting the **remainder terms** after the full cycles. Always compute: (number of full cycles × sum per cycle) + remaining terms.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": true}, {"question": "What is the formula for $\\displaystyle\\sum_{r=1}^{n} r^2$?", "answer": "$\\dfrac{n(n+1)(2n+1)}{6}$ (in formula booklet)", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "When a trig sequence involves $\\cos(n\\alpha)$ or $\\sin(n\\alpha)$ where $\\alpha = \\frac{\\pi}{k}$, what should you exploit?", "answer": "The sequence is **periodic with period $k$**. Compute one full period, find the sum per cycle, then multiply by the number of complete cycles and add any remainder terms.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": true}, {"question": "What is the log subtraction law?", "answer": "$\\log_a x - \\log_a y = \\log_a\\!\\left(\\dfrac{x}{y}\\right)$. **Not** $\\log_a(x - y)$.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "What is the fundamental definition that converts between logarithmic and exponential forms?", "answer": "$\\log_a M = N \\iff a^N = M$. To make a variable the subject of a log equation, **exponentiate both sides**.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": true}, {"question": "How do you rearrange $w = \\log_a\\!\\left(\\frac{t+5}{4}\\right)$ to make $t$ the subject?", "answer": "Exponentiate: $a^w = \\frac{t+5}{4}$, then $t = 4a^w - 5$.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "How do you show that $(3\\cos\\theta - \\tan\\theta)\\cos\\theta = 2$ can be written as $3\\sin^2\\theta + \\sin\\theta - 1 = 0$?", "answer": "Expand LHS: $3\\cos^2\\theta - \\tan\\theta\\cdot\\cos\\theta = 3\\cos^2\\theta - \\sin\\theta$ (since $\\tan\\theta = \\frac{\\sin\\theta}{\\cos\\theta}$). Set equal to 2, then replace $\\cos^2\\theta = 1 - \\sin^2\\theta$: $3(1-\\sin^2\\theta) - \\sin\\theta = 2 \\Rightarrow 3\\sin^2\\theta + \\sin\\theta - 1 = 0$.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": true}, {"question": "What trig identity converts $\\cos^2\\theta$ into an expression in $\\sin\\theta$?", "answer": "$\\cos^2\\theta = 1 - \\sin^2\\theta$. **Not** in the formula booklet — must be memorised.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "If $\\sin\\theta = k$ (where $k > 0$), what are the two solutions in $[0, \\pi]$?", "answer": "$\\theta_1 = \\arcsin(k)$ and $\\theta_2 = \\pi - \\arcsin(k)$. This is the **most commonly forgotten solution** across all exam papers.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "If $\\sin\\theta = k$ (where $k < 0$), what are the two solutions in $[-\\pi, 0]$?", "answer": "$\\theta_1 = \\arcsin(k)$ (negative) and $\\theta_2 = -\\pi - \\arcsin(k) = -\\pi + |\\arcsin(k)|$.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "When solving $\\sin(2x) = k$ on $-\\frac{\\pi}{2} \\leq x \\leq \\frac{\\pi}{2}$, what is the critical first step?", "answer": "**Scale the domain**: since the argument is $2x$, the effective range for $2x$ is $-\\pi \\leq 2x \\leq \\pi$. Solve for $2x$ first, then divide by 2.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": true}, {"question": "What is the period of $\\sin\\theta$ and $\\cos\\theta$?", "answer": "$2\\pi$ (or 360°). Use this to find further solutions within the given range.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "When solving a trig equation where the interval is given in terms of $\\pi$, should you work in degrees or radians?", "answer": "**Radians** — look for $\\pi$ in the interval boundaries as the signal.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": true}, {"question": "How many solutions does $3\\sin^2(2x) + \\sin(2x) - 1 = 0$ have on $-\\frac{\\pi}{2} \\leq x \\leq \\frac{\\pi}{2}$?", "answer": "**Four**. The quadratic gives two values of $\\sin(2x) \\approx 0.434$ and $\\approx -0.768$. Each has two solutions for $2x$ in $[-\\pi, \\pi]$, giving four values of $x$.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "What is the trapezium rule formula?", "answer": "$\\displaystyle\\int_a^b y\\,dx \\approx \\frac{h}{2}\\left[y_0 + y_n + 2(y_1 + y_2 + \\cdots + y_{n-1})\\right]$ where $h = \\frac{b-a}{n}$. (In formula booklet.)", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "In the trapezium rule, which ordinates are doubled and which are not?", "answer": "**Interior** ordinates ($y_1, y_2, \\ldots, y_{n-1}$) are doubled. The two **endpoint** ordinates ($y_0$ and $y_n$) are added once only.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "How do you find the area between two curves using the trapezium rule?", "answer": "**Method 1**: Compute new $y$-values as $y_{\\text{new}} = y_{\\text{upper}} - y_{\\text{lower}}$ at each $x$-value, then apply the trapezium rule. **Method 2**: Find area under upper curve (trapezium rule), find area under lower curve (integrate exactly if possible), and subtract.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "How do you find the percentage of a region within a larger shape?", "answer": "$\\text{Percentage} = \\dfrac{\\text{area of region}}{\\text{area of whole shape}} \\times 100$.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": false}, {"question": "What is the area between two curves formula?", "answer": "$\\displaystyle\\text{Area} = \\int_a^b (\\text{upper curve} - \\text{lower curve})\\,dx$.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": false}, {"question": "How do you simplify $y = \\dfrac{12x^3(x-7) + 14x(13x-15)}{21x^{1/2}}$ into separate terms with fractional powers?", "answer": "**Divide term-by-term**: expand the numerator ($12x^4 - 84x^3 + 182x^2 - 210x$), then divide each term by $21x^{1/2}$ separately, subtracting $\\frac{1}{2}$ from each power of $x$.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "When dividing $12x^4$ by $21x^{1/2}$, what is the result?", "answer": "$\\dfrac{12}{21}x^{4 - 1/2} = \\dfrac{4}{7}x^{7/2}$.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": false}, {"question": "Does the power rule $\\dfrac{d}{dx}x^n = nx^{n-1}$ work for fractional powers?", "answer": "Yes — it works for **all** rational $n$, not just integers. E.g., $\\frac{d}{dx}x^{7/2} = \\frac{7}{2}x^{5/2}$.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": false}, {"question": "How do you eliminate $x^{-1/2}$ terms when setting $\\frac{dy}{dx} = 0$?", "answer": "Multiply through by $x^{1/2}$ (valid since $x > 0$). This converts $-5x^{-1/2}$ into $-5$, and shifts all other powers up by $\\frac{1}{2}$.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": false}, {"question": "Given one root of a cubic, how do you find the other two?", "answer": "Use the **factor theorem**: if $x = 1$ is a root, divide by $(x-1)$ to get a quadratic, then solve using the quadratic formula. E.g., $2x^3 - 10x^2 + 13x - 5 = (x-1)(2x^2 - 8x + 5) = 0$.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": false}, {"question": "When a question asks for \"exact\" coordinates, what form must the answer be in?", "answer": "**Exact surd form**, e.g., $x = \\dfrac{4 \\pm \\sqrt{6}}{2}$. **Not** decimal approximations.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": false}, {"question": "What is the formula for the sum to infinity of a geometric series, and when is it valid?", "answer": "$S_\\infty = \\dfrac{a}{1-r}$, valid when $|r| < 1$. (In formula booklet.)", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": true}, {"question": "What is the formula for the $n$th term of a geometric sequence?", "answer": "$u_n = ar^{n-1}$. **Not** in the formula booklet — must be memorised.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": true}, {"question": "What is the formula for the sum of the first $n$ terms of a geometric series?", "answer": "$S_n = \\dfrac{a(1-r^n)}{1-r}$. (In formula booklet.)", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": false}, {"question": "If $S_\\infty = 3a$, how do you show $r = \\frac{2}{3}$?", "answer": "$\\frac{a}{1-r} = 3a \\;\\Rightarrow\\; \\frac{1}{1-r} = 3 \\;\\Rightarrow\\; 1-r = \\frac{1}{3} \\;\\Rightarrow\\; r = \\frac{2}{3}$.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": true}, {"question": "What is the equation of a circle with centre $(a,b)$ and radius $r$?", "answer": "$(x-a)^2 + (y-b)^2 = r^2$. **Not** in the formula booklet — must be memorised.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": false}, {"question": "What is the relationship between the gradient of a tangent to a circle and the gradient of the radius at the point of contact?", "answer": "They are **perpendicular**: $m_{\\text{tangent}} \\times m_{\\text{radius}} = -1$. The tangent gradient is the negative reciprocal of the radius gradient.", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": true}, {"question":
