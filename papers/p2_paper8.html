nomial $f(x)$ by $(ax - b)$.", "answer": "The remainder is $f\\left(\\frac{b}{a}\\right)$. For divisor $(4x - 5)$, the remainder is $f\\left(\\frac{5}{4}\\right)$, NOT $f(5)$ or $f(-5/4)$.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "If $f(x) = (2 - kx)^5$ and dividing by $(4x - 5)$ gives remainder $\\frac{243}{32}$, how do you find $k$?", "answer": "Set $f\\left(\\frac{5}{4}\\right) = \\frac{243}{32}$. So $(2 - \\frac{5k}{4})^5 = \\frac{243}{32}$. Take the 5th root: $2 - \\frac{5k}{4} = \\frac{3}{2}$. Solving gives $k = \\frac{2}{5}$.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": true}, {"question": "In the binomial expansion of $(2 + bx)^5$, what is the coefficient of $x$ in terms of $b$?", "answer": "$\\binom{5}{1}(2)^4(b) = 5 \\times 16 \\times b = 80b$. The $x$-coefficient equals $f'(0)$ (the gradient at origin).", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "In the expansion of $\\left(2 - \\frac{2x}{5}\\right)^5$, what are the first three terms in ascending powers of $x$?", "answer": "$32 - 32x + \\frac{64}{5}x^2$. Using $a=2$, $b=-\\frac{2x}{5}$, $n=5$: term 0 = $2^5 = 32$; term 1 = $5(2^4)(-2x/5) = -32x$; term 2 = $10(2^3)(4x^2/25) = \\frac{320}{25}x^2 = \\frac{64}{5}x^2$.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "How do you find the gradient of $y = f(x)$ at $x = 0$ from its binomial expansion?", "answer": "The coefficient of $x$ in the expansion equals $f'(0)$, the gradient at the origin. For $f(x) = (2 - \\frac{2x}{5})^5 = 32 - 32x + \\ldots$, the gradient is $-32$.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "For the sequence $a_n = \\cos^2(n\\pi/3)$, what is its period and why?", "answer": "Period is 3. Computing: $a_1 = \\cos^2(\\pi/3) = 1/4$, $a_2 = \\cos^2(2\\pi/3) = 1/4$, $a_3 = \\cos^2(\\pi) = 1$, $a_4 = \\cos^2(4\\pi/3) = 1/4 = a_1$. Since $a_4 = a_1$, the pattern repeats every 3 terms.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": true}, {"question": "How do you sum a periodic sequence over $n$ terms when the period is $p$?", "answer": "Divide $n$ by $p$: $n = qp + r$. Then sum = $q \\times (\\text{sum of one period}) + (\\text{first } r \\text{ terms})$. For period 3 summing to 50 terms: $50 = 16 \\times 3 + 2$, so sum $= 16 \\times S_3 + a_1 + a_2$.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "What are the exact values of $\\cos^2(\\pi/3)$, $\\cos^2(2\\pi/3)$, and $\\cos^2(\\pi)$?", "answer": "$\\cos(\\pi/3) = 1/2$, so $\\cos^2(\\pi/3) = 1/4$. $\\cos(2\\pi/3) = -1/2$, so $\\cos^2(2\\pi/3) = 1/4$. $\\cos(\\pi) = -1$, so $\\cos^2(\\pi) = 1$.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "What is the identity obtained when dividing $3\\sin\\theta\\cos\\theta + \\cos^2\\theta = 2$ by $\\cos^2\\theta$?", "answer": "$3\\tan\\theta + 1 = 2\\sec^2\\theta$. This follows provided $\\cos\\theta \\neq 0$ (which must be checked separately).", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "How do you solve $2\\tan^2\\theta - 3\\tan\\theta + 1 = 0$ for $-\\pi \\leq \\theta \\leq \\pi$?", "answer": "Factor: $(2\\tan\\theta - 1)(\\tan\\theta - 1) = 0$, so $\\tan\\theta = 1$ or $\\tan\\theta = 1/2$. For $\\tan\\theta = 1$: $\\theta = \\pi/4, -3\\pi/4$. For $\\tan\\theta = 1/2$: $\\theta = \\arctan(1/2) \\approx 0.464$, $\\theta = \\arctan(1/2) - \\pi \\approx -2.678$. Total 4 solutions in $[-\\pi, \\pi]$.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": true}, {"question": "Why must the calculator be in RADIAN mode when solving trigonometric equations in calculus?", "answer": "Calculus uses radians as the natural unit. If the calculator is in degrees, $\\arcsin(0.5)$ gives $30^\\circ$ instead of $\\pi/6$, leading to completely wrong solutions.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "For $\\sin(2x) = k$ where $0 < k < 1$, what are the two solutions in $[0, \\pi]$?", "answer": "$2x = \\arcsin(k)$ and $2x = \\pi - \\arcsin(k)$. The second solution is $\\pi - \\alpha$, NOT $-\\alpha$. This is a common error.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "With $n$ strips of width $h$, what is the trapezium rule formula for $\\int_a^b y\\,dx$?", "answer": "$\\int_a^b y\\,dx \\approx \\frac{h}{2}[y_0 + 2(y_1 + y_2 + \\ldots + y_{n-1}) + y_n]$. The first and last $y$-values are not doubled; all interior values are doubled.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "How do you estimate the area between two curves $y_1(x)$ and $y_2(x)$ using the trapezium rule?", "answer": "For each $x$-value, compute $y_{diff} = y_{upper} - y_{lower}$, then apply the trapezium rule to this difference column. Do NOT apply the rule to each curve separately and subtract afterwards.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "In the trapezium rule with 4 strips on interval $[0, 2]$, what is the width $h$ of each strip?", "answer": "$h = \\frac{b-a}{n} = \\frac{2-0}{4} = 0.5$. The $x$-values are $0, 0.5, 1, 1.5, 2$.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "Simplify $\\frac{12x^4 - 84x^3 + 182x^2 - 210x}{21\\sqrt{x}}$ into the form $Ax^{7/2} + Bx^{5/2} + Cx^{3/2} + Dx^{1/2}$.", "answer": "Divide each term by $21x^{1/2}$: $A = \\frac{12}{21} = \\frac{4}{7}$, $B = -\\frac{84}{21} = -4$, $C = \\frac{182}{21} = \\frac{26}{3}$, $D = -\\frac{210}{21} = -10$. So $y = \\frac{4}{7}x^{7/2} - 4x^{5/2} + \\frac{26}{3}x^{3/2} - 10x^{1/2}$.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "How do you differentiate $y = x^{7/2}$?", "answer": "$\\frac{d}{dx}[x^{7/2}] = \\frac{7}{2}x^{5/2}$. In general, $\\frac{d}{dx}[x^{n/2}] = \\frac{n}{2}x^{(n-2)/2}$.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "When finding turning points of $y = Ax^{7/2} + Bx^{5/2} + Cx^{3/2} + Dx^{1/2}$, what do you multiply by to clear negative exponents?", "answer": "Multiply the derivative equation by $x^{1/2}$ (or equivalently by $x$). This converts $x^{-1/2}$ terms into constants, giving a polynomial equation in $x$.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "What is the derivative of $-5x^{-1/2}$?", "answer": "$\\frac{d}{dx}[-5x^{-1/2}] = -5 \\times (-\\frac{1}{2})x^{-3/2} = \\frac{5}{2}x^{-3/2}$.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "If $a = \\log_2 3$, express $\\log_2 27$ and $\\log_2 9$ in terms of $a$.", "answer": "$\\log_2 27 = \\log_2(3^3) = 3\\log_2 3 = 3a$. $\\log_2 9 = \\log_2(3^2) = 2\\log_2 3 = 2a$.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "Solve $3^x \\cdot 2^{x+4} = 6$.", "answer": "Rewrite: $3^x \\cdot 2^x \\cdot 2^4 = 6 \\Rightarrow (3 \\cdot 2)^x = 6/16 = 3/8$. So $6^x = 3/8$. Taking $\\log_2$: $x \\log_2 6 = \\log_2 3 - 3 = a - 3$. Thus $x = \\frac{a-3}{1+a}$.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "Why does $3^x \\cdot 2^x = 6^x$?", "answer": "Using laws of indices: $3^x \\cdot 2^x = (3 \\cdot 2)^x = 6^x$. This allows combining terms with different bases into a single exponential.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "In the model $W = a^{t+5/4}$ with $W = 10$ at $t = 3$, how do you find $a$?", "answer": "Substitute: $10 = a^{3+5/4} = a^{17/4}$. Taking logs: $\\ln 10 = \\frac{17}{4}\\ln a$. From the question's result, $a^{10} = 2$, so $a = \\sqrt[10]{2}$.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "For a geometric series with first term $a$ and sum to infinity $S_\\infty = 3a$, what is the common ratio $r$?", "answer": "$S_\\infty = \\frac{a}{1-r} = 3a$. So $\\frac{1}{1-r} = 3 \\Rightarrow 1 = 3 - 3r \\Rightarrow r = \\frac{2}{3}$. This requires $|r| < 1$, which is satisfied.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "What is the formula for the sum of the first $n$ terms of a geometric series?", "answer": "$S_n = \\frac{a(1 - r^n)}{1-r}$, where $a$ is the first term and $r$ is the common ratio. For $r > 1$, use $S_n = \\frac{a(r^n - 1)}{r-1}$.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "If $r = 2/3$, what is $S_{10}$ in terms of $a$?", "answer": "$S_{10} = \\frac{a(1 - (2/3)^{10})}{1 - 2/3} = \\frac{a(1 - 1024/59049)}{1/3} = 3a\\left(1 - \\frac{1024}{59049}\\right) = \\frac{58025}{19683}a$.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "Complete the square for $x^2 + y^2 - 6x + 4y$ to find the centre and radius.", "answer": "$x^2 - 6x = (x-3)^2 - 9$. $y^2 + 4y = (y+2)^2 - 4$. So $x^2 + y^2 - 6x + 4y = (x-3)^2 + (y+2)^2 - 13$. Centre $(3, -2)$, radius $\\sqrt{13}$.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "What does the expression $x^2 + y^2 - 6x + 4y$ represent geometrically when minimized?", "answer": "It represents the square of the distance from point $(x, y)$ to the fixed point $(3, -2)$. The minimum value occurs at the closest point on the constraint (the circle), giving the distance squared minus the constant.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": true}, {"question": "List five common errors in this paper and how to avoid them:", "answer": "(1) Proof by exhaustion: forgetting the conclusion sentence — always write \"In all cases...\" (2) Remainder theorem: using $f(b)$ instead of $f(b/a)$ for $(ax-b)$ divisors. (3) Trig equations: calculator in wrong mode (degrees vs radians). (4) Periodic sequences: not computing enough terms to find the period. (5) Trapezium rule: applying to each curve separately instead of computing the difference first.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": true}, {"question": "What should you do BEFORE starting any trigonometric equation problem?", "answer": "Check that your calculator is in RADIAN mode. This single check prevents the most common error in trig problems.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "If your notes from a previous session disagree with the tutor's correction, which should you trust?", "answer": "The tutor's correction. One student's notes were found to have the wrong quadrant rule ($\\pi - \\alpha$ vs $-\\alpha$), causing repeated errors. Always verify notes against corrected work.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}], "count": 33}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "State the Remainder Theorem for a general linear divisor of the form $(ax - b)$.", "answer": "When polynomial $f(x)$ is divided by $(ax - b)$, the remainder is $f\\!\\left(\\frac{b}{a}\\right)$. For example, with divisor $(4x - 5)$, the remainder is $f\\!\\left(\\frac{5}{4}\\right)$.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "A sequence is defined by $a_n = \\cos^2\\!\\left(\\frac{n\\pi}{3}\\right)$. What is its period and what are the first three terms?", "answer": "Period = 3. $a_1 = \\cos^2(\\pi/3) = (1/2)^2 = 1/4$, $a_2 = \\cos^2(2\\pi/3) = (-1/2)^2 = 1/4$, $a_3 = \\cos^2(\\pi) = (-1)^2 = 1$. Pattern: $1/4, 1/4, 1, 1/4, 1/4, 1, \\ldots$", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "When solving trig equations in A-Level (not pure number work), what must you check about your calculator?", "answer": "Calculator must be in RADIAN mode. Using degree mode gives completely wrong answers for calculus-based trig problems.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "How do you apply the trapezium rule to find the area between two curves $y_1$ and $y_2$?", "answer": "Create a new function $y_{diff}(x) = y_{upper}(x) - y_{lower}(x)$ for each $x$-value in your table. Then apply the trapezium rule formula to this difference column.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "When simplifying $\\frac{12x^4 - 84x^3 + 182x^2 - 210x}{21\\sqrt{x}}$, what exponents result for each term?", "answer": "$\\frac{x^4}{x^{1/2}} = x^{7/2}$, $\\frac{x^3}{x^{1/2}} = x^{5/2}$, $\\frac{x^2}{x^{1/2}} = x^{3/2}$, $\\frac{x}{x^{1/2}} = x^{1/2}$. Result: $\\frac{4}{7}x^{7/2} - 4x^{5/2} + \\frac{26}{3}x^{3/2} - 10x^{1/2}$.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "For a geometric series with first term $a$ and infinite sum $S_\\infty = 3a$, what is the common ratio $r$?", "answer": "Using $S_\\infty = \\frac{a}{1-r}$: $\\frac{a}{1-r} = 3a \\Rightarrow \\frac{1}{1-r} = 3 \\Rightarrow 1 = 3 - 3r \\Rightarrow r = \\frac{2}{3}$.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "Given $a = \\log_2 3$, express $\\log_2 27$ and $\\log_2 9$ in terms of $a$.", "answer": "$\\log_2 27 = \\log_2 3^3 = 3\\log_2 3 = 3a$. $\\log_2 9 = \\log_2 3^2 = 2\\log_2 3 = 2a$.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}], "count": 7}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "What is proof by exhaustion?", "answer": "A proof method where you check every case in a finite set of possibilities to verify a statement holds in all cases.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "When approaching a proof by exhaustion problem, what is the first step?", "answer": "Use the given conditions/equations to derive a finite, manageable set of cases to test.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "Given $a, b, c$ are positive integers with $c = b + 2$ and $a + b + c = 10$, how do you determine the valid values of $b$?", "answer": "Substitute to get $a = 8 - 2b$. For $a > 0$ we need $b < 4$, and $b \\geq 1$ as a positive integer. So $b \\in \\{1, 2, 3\\}$.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "What essential element must EVERY proof by exhaustion include at the end?", "answer": "A clear conclusion sentence stating the result, e.g. \"In all cases the statement holds, hence...\". Examiners mark this explicitly.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "Why is $a = 8 - 2b$ guaranteed to be even, and why does this make the product $abc$ always even?", "answer": "$a = 2(4-b)$ which is a multiple of 2. Any product containing an even factor must be even.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "What is the difference between proof by exhaustion and proof by deduction?", "answer": "Exhaustion checks every case individually in a finite set; deduction uses general reasoning/algebra to prove the result for all cases at once.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": true}, {"question": "State the Remainder Theorem for division by $(ax - b)$.", "answer": "When a polynomial $f(x)$ is divided by $(ax - b)$, the remainder is $f\\!\\left(\\dfrac{b}{a}\\right)$.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "When $f(x)$ is divided by $(4x - 5)$, what value is substituted into $f(x)$ to find the remainder?", "answer": "$x = \\dfrac{5}{4}$ (NOT $x = 5$ — that is a common confusion with the linear divisor $(x-5)$).", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": true}, {"question": "What is the Factor Theorem (special case of Remainder Theorem)?", "answer": "$(ax - b)$ is a factor of $f(x)$ if and only if $f\\!\\left(\\dfrac{b}{a}\\right) = 0$.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "What is the binomial expansion formula for $(a + b)^n$?", "answer": "$(a + b)^n = \\displaystyle\\sum_{r=0}^{n} \\binom{n}{r} a^{n-r} b^r$", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "In the expansion of $(2 - \\tfrac{2x}{5})^5$, what is the term in $x^2$?", "answer": "$\\binom{5}{2}(2)^3\\!\\left(-\\tfrac{2x}{5}\\right)^2 = 10 \\cdot 8 \\cdot \\tfrac{4x^2}{25} = \\tfrac{64}{5}x^2$", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "How can you find $f'(0)$ from the binomial expansion of $f(x)$?", "answer": "$f'(0)$ equals the coefficient of $x^1$ in the expansion (since the $x^0$ term differentiates to 0, and higher powers vanish at $x=0$).", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "What is a sign-error pitfall when expanding $\\left(2 - \\tfrac{2x}{5}\\right)^5$?", "answer": "$\\left(-\\tfrac{2x}{5}\\right)^2 = +\\tfrac{4x^2}{25}$ (squared = positive), but $\\left(-\\tfrac{2x}{5}\\right)^3 = -\\tfrac{8x^3}{125}$ (cubed = negative).", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": true}, {"question": "Given $f(x) = (2 - kx)^5$ has remainder $\\tfrac{243}{32}$ when divided by $(4x-5)$, how do you find $k$?", "answer": "Set $f(\\tfrac{5}{4}) = \\tfrac{243}{32}$, giving $\\left(2 - \\tfrac{5k}{4}\\right)^5 = \\tfrac{243}{32}$. Take 5th root: $2 - \\tfrac{5k}{4} = \\tfrac{3}{2}$, so $k = \\tfrac{2}{5}$.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "Why can you take the 5th root of both sides when solving $\\left(2 - \\tfrac{5k}{4}\\right)^5 = \\tfrac{243}{32}$?", "answer": "Both sides are positive and 5 is odd, so the 5th root is unique and well-defined: $\\sqrt[5]{243} = 3$, $\\sqrt[5]{32} = 2$.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": true}, {"question": "What is the exact value of $\\cos\\!\\left(\\tfrac{\\pi}{3}\\right)$?", "answer": "$\\dfrac{1}{2}$", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "What is the exact value of $\\cos\\!\\left(\\tfrac{2\\pi}{3}\\right)$?", "answer": "$-\\dfrac{1}{2}$", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "How do you spot that a sequence $a_n = \\cos^2(n\\pi/3)$ is periodic?", "answer": "Compute $a_1, a_2, a_3, a_4, \\ldots$ — once values repeat (e.g. $a_4 = a_1$), the sequence has period equal to that gap.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": true}, {"question": "What is the period of $a_n = \\cos^2(n\\pi/3)$?", "answer": "3, because $\\cos$ has period $2\\pi$ and $\\cos^2$ has period $\\pi$, so $\\cos^2((n+3)\\pi/3) = \\cos^2(n\\pi/3 + \\pi) = \\cos^2(n\\pi/3)$.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": true}, {"question": "How do you compute $\\sum_{n=1}^{N} a_n$ for a periodic sequence with period $p$?", "answer": "Write $N = qp + r$. Then sum = $q \\cdot S_p + a_1 + a_2 + \\cdots + a_r$, where $S_p$ is the sum of one full period.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "For the sequence $a_n = \\cos^2(n\\pi/3)$, what is the sum of one period?", "answer": "$a_1 + a_2 + a_3 = \\tfrac{1}{4} + \\tfrac{1}{4} + 1 = \\dfrac{3}{2}$", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "Why is this sum NOT a geometric or arithmetic series, and how should it be evaluated?", "answer": "There is no common ratio or common difference — it's periodic. Use the period structure: count complete cycles plus remaining terms.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": true}, {"question": "When solving for an unknown parameter in an exponential model like $W = a^{f(t)}$, what is the recommended order of steps?", "answer": "First substitute the known values to isolate the parameter, THEN take logs or take roots — don't take logs prematurely.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "If $a^{10} = 2$, what is $a$ in surd form?", "answer": "$a = 2^{1/10} = \\sqrt[10]{2}$", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "How do you rearrange $W = a^{(t+5)/4}$ to make $t$ the subject?", "answer": "Take logs: $\\log W = \\tfrac{t+5}{4}\\log a$, so $t = \\dfrac{4\\log W}{\\log a} - 5$.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "What is the change-of-base formula for logarithms?", "answer": "$\\log_b x = \\dfrac{\\log_c x}{\\log_c b}$ for any positive base $c \\neq 1$.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": false}, {"question": "State the Pythagorean identity involving $\\tan$ and $\\sec$.", "answer": "$\\sec^2\\theta = 1 + \\tan^2\\theta$ (or equivalently $\\tan^2\\theta = \\sec^2\\theta - 1$).", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "How do you convert an equation containing $\\sin\\theta\\cos\\theta$ and $\\cos^2\\theta$ terms into one in $\\tan\\theta$?", "answer": "Divide every term by $\\cos^2\\theta$ (assuming $\\cos\\theta \\neq 0$). This gives $\\tan$ and $\\sec^2$ terms, which are related by $\\sec^2\\theta = 1 + \\tan^2\\theta$.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "What are the two solutions of $\\sin\\alpha = k$ ($0 < k < 1$) in $[0, 2\\pi]$?", "answer": "$\\alpha = \\arcsin(k)$ and $\\alpha = \\pi - \\arcsin(k)$ — NOT $-\\arcsin(k)$.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "What is the period of $\\tan\\theta$, and how does this affect finding solutions?", "answer": "Period is $\\pi$. Once you find one solution $\\theta_0$, all solutions are $\\theta_0 + n\\pi$ for integer $n$.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "Solve $2\\tan^2\\theta - 3\\tan\\theta + 1 = 0$.", "answer": "Factorise: $(2\\tan\\theta - 1)(\\tan\\theta - 1) = 0$, giving $\\tan\\theta = \\tfrac{1}{2}$ or $\\tan\\theta = 1$.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "For $\\tan\\theta = 1$ in the interval $-\\pi \\leq \\theta \\leq \\pi$, what are the solutions?", "answer": "$\\theta = \\tfrac{\\pi}{4}$ and $\\theta = -\\tfrac{3\\pi}{4}$ (using $\\tan$ period $\\pi$).", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "What calculator setting must you confirm BEFORE solving trig equations stated in radians?", "answer": "Calculator must be in RADIAN mode. If in degree mode, all answers will be wrong.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "How do you prove $3\\sin\\theta\\cos\\theta + \\cos^2\\theta = 2$ implies $3\\tan\\theta + 1 = 2\\sec^2\\theta$?", "answer": "Divide every term by $\\cos^2\\theta$: $\\dfrac{3\\sin\\theta\\cos\\theta}{\\cos^2\\theta} + 1 = \\dfrac{2}{\\cos^2\\theta}$, giving $3\\tan\\theta + 1 = 2\\sec^2\\theta$.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": true}, {"question": "State the trapezium rule for $\\int_a^b y\\,dx$ with $n$ strips.", "answer": "$\\int_a^b y\\,dx \\approx \\dfrac{h}{2}\\left[y_0 + y_n + 2(y_1 + y_2 + \\cdots + y_{n-1})\\right]$ where $h = \\dfrac{b-a}{n}$.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "How do you apply the trapezium rule to find the area BETWEEN two curves $y_1$ and $y_2$?", "answer": "Form a new function $y_{\\text{diff}}(x) = y_1(x) - y_2(x)$ at each $x$-value, then apply the trapezium rule to $y_{\\text{diff}}$.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "For 4 strips on $[0, 2]$, what is the strip width $h$ and what $x$-values do you evaluate?", "answer": "$h = \\tfrac{2-0}{4} = 0.5$. Evaluate at $x = 0, 0.5, 1, 1.5, 2$ (5 ordinates).", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "For the trapezium rule, why must $h$ (strip width) be constant?", "answer": "The formula $\\tfrac{h}{2}[y_0 + y_n + 2(\\text{middle})]$ assumes equal-width strips. Unequal strips need separate trapezium calculations or Simpson-like methods.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "When the trapezium rule formula is given in the formula booklet, what is the priority skill?", "answer": "Knowing how to APPLY it correctly — read the strip width, set up the table, identify which terms are doubled.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "To find what percentage of a rectangle is shaded by region $R$, what is the formula?", "answer": "$\\text{percentage} = \\dfrac{\\text{area of } R}{\\text{area of rectangle}} \\times 100$", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "How do you simplify $\\dfrac{x^n}{x^{1/2}}$?", "answer": "$x^{n - 1/2} = x^{(2n-1)/2}$ — subtract exponents.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "How do you simplify $\\dfrac{12x^4 - 84x^3}{21x^{1/2}}$?", "answer": "Split into separate fractions, simplify each: $\\tfrac{12}{21}x^{7/2} - \\tfrac{84}{21}x^{5/2} = \\tfrac{4}{7}x^{7/2} - 4x^{5/2}$.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "What is $\\dfrac{d}{dx}\\left[x^{n/2}\\right]$?", "answer": "$\\dfrac{n}{2}x^{(n-2)/2}$ — multiply by exponent, then reduce exponent by 1.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "What is $\\dfrac{d}{dx}\\left[x^{1/2}\\right]$?", "answer": "$\\dfrac{1}{2}x^{-1/2} = \\dfrac{1}{2\\sqrt{x}}$", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "After differentiating an expression with fractional powers and setting $\\frac{dy}{dx} = 0$, why might you multiply through by $x^{1/2}$?", "answer": "To clear negative powers of $x$ and obtain a polynomial equation in $x$ (e.g. cubic) which can be factorised.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": false}, {"question": "What is a common arithmetic pitfall when simplifying $\\dfrac{12x^4 - 84x^3 + 182x^2}{21\\sqrt{x}}$?", "answer": "Forgetting to divide EVERY numerator term by 21 — students often divide some terms but leave others (e.g. $182/21$ untouched).", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": false}, {"question": "To find turning points of a curve, what equation do you solve?", "answer": "$\\dfrac{dy}{dx} = 0$ — turning points occur where the gradient is zero.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": false}, {"question": "If $x = \\tfrac{5}{2}$ is a known root of a cubic $ax^3 + bx^2 + cx + d = 0$, how do you find the other roots?", "answer": "$(2x - 5)$ is a factor. Polynomial divide to get a quadratic, then solve using quadratic formula or factorisation.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": false}, {"question": "State the formula for the sum to infinity of a geometric series.", "answer": "$S_\\infty = \\dfrac{a}{1 - r}$, valid when $|r| < 1$.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": false}, {"question": "State the formula for the sum of the first $n$ terms of a geometric series.", "answer": "$S_n = \\dfrac{a(1 - r^n)}{1 - r}$ for $r \\neq 1$.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": false}, {"question": "Given $S_\\infty = 3a$ for a geometric series, find $r$.", "answer": "$\\dfrac{a}{1-r} = 3a$ ⟹ $\\dfrac{1}{1-r} = 3$ ⟹ $1 - r = \\tfrac{1}{3}$ ⟹ $r = \\tfrac{2}{3}$.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": false}, {"question": "Under what condition does a geometric series converge to a finite sum?", "answer": "$|r| < 1$ (i.e. $-1 < r < 1$).", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": false}, {"question": "What is the $n$th term of a geometric sequence with first term $a$ and common ratio $r$?", "answer": "$u_n = ar^{n-1}$", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": false}, {"question": "Write $x^2 + y^2 - 6x + 4y = T$ in centre-radius form.", "answer": "Complete the square: $(x-3)^2 - 9 + (y+2)^2 - 4 = T$, giving $(x-3)^2 + (y+2)^2 = T + 13$.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": false}, {"question": "For $(x-3)^2 + (y+2)^2 = T + 13$ to represent a real circle, what is the minimum value of $T$?", "answer": "$T + 13 > 0$, so minimum is $T = -13$ (giving a single-point \"circle\"). Some questions may want $T = -13$ as the boundary.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": true}, {"question": "What is the relationship between a tangent and the radius at the point of tangency?", "answer": "The tangent is PERPENDICULAR to the radius drawn to the point of tangency.", "source": "Opus 4.7 ①", "_id": "opus_1_55", "judge_pick": false}, {"question": "If a circle has centre $(a, b)$ and a tangent passes through point $P(p, q)$ on the circle, how do you find the gradient of the tangent?", "answer": "Find gradient of radius: $m_{\\text{rad}} = \\dfrac{q-b}{p-a}$. Tangent gradient is the negative reciprocal: $m_{\\text{tan}} = -\\dfrac{1}{m_{\\text{rad}}}$.", "source": "Opus 4.7 ①", "_id": "opus_1_56", "judge_pick": false}, {"question": "What is the standard form of a circle with centre $(a, b)$ and radius $r$?", "answer": "$(x - a)^2 + (y - b)^2 = r^2$", "source": "Opus 4.7 ①", "_id": "opus_1_57", "judge_pick": false}, {"question": "Given $a = \\log_2 3$, express $\\log_2 27$ in terms of $a$.", "answer": "$\\log_2 27 = \\log_2 3^3 = 3\\log_2 3 = 3a$", "source": "Opus 4.7 ①", "_id": "opus_1_58", "judge_pick": false}, {"question": "Given $a = \\log_2 3$, express $\\log_2 9$ in terms of $a$.", "answer": "$\\log_2 9 = \\log_2 3^2 = 2\\log_2 3 = 2a$", "source": "Opus 4.7 ①", "_id": "opus_1_59", "judge_pick": false}, {"question": "How do you simplify $3^x \\cdot 2^x$ into a single power?", "answer": "$3^x \\cdot 2^x = (3 \\cdot 2)^x = 6^x$ — use the law $a^x \\cdot b^x = (ab)^x$.", "source": "Opus 4.7 ①", "_id": "opus_1_60", "judge_pick": false}, {"question": "How do you simplify $2^{x+4}$?", "answer": "$2^{x+4} = 2^x \\cdot 2^4 = 16 \\cdot 2^x$ — split using $a^{m+n} = a^m \\cdot a^n$.", "source": "Opus 4.7 ①", "_id": "opus_1_61", "judge_pick": false}, {"question": "To solve $3^x \\cdot 2^{x+4} = 6$, what is the first algebraic step?", "answer": "Split $2^{x+4} = 2^x \\cdot 16$, then combine: $3^x \\cdot 2^x \\cdot 16 = 6$, giving $6^x = \\tfrac{6}{16} = \\tfrac{3}{8}$.", "source": "Opus 4.7 ①", "_id": "opus_1_62", "judge_pick": false}, {"question": "After reducing $3^x \\cdot 2^{x+4} = 6$ to $6^x = \\tfrac{3}{8}$, how do you solve for $x$ in terms of $a = \\log_2 3$?", "answer": "Take $\\log_2$ of both sides: $x \\log_2 6 = \\log_2 \\tfrac{3}{8} = a - 3$. Since $\\log_2 6 = 1 + a$, $x = \\dfrac{a - 3}{a + 1}$.", "source": "Opus 4.7 ①", "_id": "opus_1_63", "judge_pick": false}, {"question": "State the log law $\\log_b(MN) = \\,?$", "answer": "$\\log_b(MN) = \\log_b M + \\log_b N$", "source": "Opus 4.7 ①", "_id": "opus_1_64", "judge_pick": false}, {"question": "State the log law $\\log_b(M^k) = \\,?$", "answer": "$\\log_b(M^k) = k \\log_b M$", "source": "Opus 4.7 ①", "_id": "opus_1_65", "judge_pick": false}, {"question": "State the log law $\\log_b\\!\\left(\\dfrac{M}{N}\\right) = \\,?$", "answer": "$\\log_b\\!\\left(\\dfrac{M}{N}\\right) = \\log_b M - \\log_b N$", "source": "Opus 4.7 ①", "_id": "opus_1_66", "judge_pick": false}, {"question": "Why is $\\log_2 8 = 3$?", "answer": "Because $2^3 = 8$ — by definition $\\log_2 8$ asks \"what power of 2 gives 8?\"", "source": "Opus 4.7 ①", "_id": "opus_1_67", "judge_pick": false}, {"question": "When a student's previous study notes contain an error (e.g. wrong quadrant rule), what is the safer practice?", "answer": "Verify against an authoritative source (formula booklet, examiner report, or tutor correction) — don't trust copied notes blindly.", "source": "Opus 4.7 ①", "_id": "opus_1_68", "judge_pick": false}, {"question": "What is the general strategy for \"show that\" questions?", "answer": "Work toward the given target equation/result using identities and algebra. Each step should be clearly justified, ending exactly at the stated result.", "source": "Opus 4.7 ①", "_id": "opus_1_69", "judge_pick": false}, {"question": "When binomial-expanding $(a + bx)^n$ for small $|x|$, what determines convergence?", "answer": "For $(a + bx)^n$ with $n$ a positive integer, the expansion is finite (no convergence issue). For non-integer $n$, the series converges only when $\\left|\\tfrac{bx}{a}\\right| < 1$.", "source": "Opus 4.7 ①", "_id": "opus_1_70", "judge_pick": true}, {"question": "What is the structure of a finite proof by exhaustion?", "answer": "(1) State the constraints from the problem. (2) Derive the finite list of cases. (3) Test EACH case in a table or list. (4) Write a conclusion sentence linking back to the original statement.", "source": "Opus 4.7 ①", "_id": "opus_1_71", "judge_pick": false}, {"question": "Why should you double-check that all roots of an equation are valid solutions of the original problem?", "answer": "Manipulations like dividing by $\\cos\\theta$, squaring, or taking logs can introduce/lose solutions. Always check against the original equation and stated interval/domain.", "source": "Opus 4.7 ①", "_id": "opus_1_72", "judge_pick": true}], "count": 73}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "What does \"prove by exhaustion\" require you to do?", "answer": "Test EVERY case in a finite set of possibilities, verify the statement holds in each, then write a conclusion sentence stating it is true in all cases.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "Why is the conclusion sentence the most missed mark in a proof by exhaustion?", "answer": "Without explicitly stating \"the result holds in all cases\" (or equivalent), the examiner cannot award the final mark — even if every case is checked correctly.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": true}, {"question": "Given $c = b + 2$ and $a + b + c = 10$ with $a, b, c$ positive integers, how do you find the finite set of $(a,b,c)$ triples?", "answer": "Substitute $c = b + 2$ into the sum to get $a = 8 - 2b$. Then $a > 0 \\Rightarrow b < 4$ and $b \\geq 1$, so $b \\in \\{1, 2, 3\\}$.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "Why must $abc$ be even when $c = b+2$ and $a + b + c = 10$ for positive integers?", "answer": "Because $a = 8 - 2b = 2(4-b)$ is always even. Even × anything = even, so the product is even.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "What is the \"even × anything = even\" principle in number-theoretic proofs?", "answer": "If at least one factor of a product is even, the entire product is even. To prove a product is even, it suffices to show one factor is.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": true}, {"question": "State the Remainder Theorem for divisor $(ax - b)$.", "answer": "When polynomial $f(x)$ is divided by $(ax - b)$, the remainder is $f\\!\\left(\\frac{b}{a}\\right)$.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "When dividing $f(x)$ by $(4x - 5)$, which value of $x$ gives the remainder?", "answer": "$x = \\tfrac{5}{4}$ (set $4x - 5 = 0$ and solve).", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "What is the relationship between the Factor Theorem and the Remainder Theorem?", "answer": "They are the same statement. The Factor Theorem is the special case where the remainder is zero: $(ax-b)$ is a factor iff $f(b/a) = 0$.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "State the binomial expansion of $(a+b)^n$ in summation form.", "answer": "$(a+b)^n = \\displaystyle\\sum_{r=0}^{n}\\binom{n}{r}a^{n-r}b^r$", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "What are $\\binom{5}{0}, \\binom{5}{1}, \\binom{5}{2}, \\binom{5}{3}$?", "answer": "$1, 5, 10, 10$.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "When expanding $\\left(2 - \\tfrac{2x}{5}\\right)^5$, why is the $x^2$ coefficient positive?", "answer": "Because the second factor is squared: $\\left(-\\tfrac{2x}{5}\\right)^2 = +\\tfrac{4x^2}{25}$. (Negative squared is positive.)", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": true}, {"question": "What is the constant term in the expansion of $(2 - bx)^5$?", "answer": "$\\binom{5}{0}\\cdot 2^5 = 32$.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "If $f(x) = c_0 + c_1 x + c_2 x^2 + \\ldots$, what is $f'(0)$?", "answer": "$f'(0) = c_1$ — the coefficient of $x$ in the expansion.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "How do you differentiate $\\left(2 - \\tfrac{2x}{5}\\right)^5$ using the chain rule?", "answer": "$\\frac{d}{dx}\\left[\\left(2 - \\tfrac{2x}{5}\\right)^5\\right] = 5\\left(2 - \\tfrac{2x}{5}\\right)^4 \\cdot \\left(-\\tfrac{2}{5}\\right) = -2\\left(2 - \\tfrac{2x}{5}\\right)^4$", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "How do you solve $(2 - \\tfrac{5k}{4})^5 = \\tfrac{243}{32}$ for $k$?", "answer": "Take 5th root of both sides (recognising $243 = 3^5$ and $32 = 2^5$): $2 - \\tfrac{5k}{4} = \\tfrac{3}{2}$, then $k = \\tfrac{2}{5}$.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "State $\\cos\\!\\left(\\tfrac{\\pi}{3}\\right)$, $\\cos\\!\\left(\\tfrac{2\\pi}{3}\\right)$ and $\\cos(\\pi)$.", "answer": "$\\tfrac{1}{2},\\ -\\tfrac{1}{2},\\ -1$.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "State $\\cos\\!\\left(\\tfrac{4\\pi}{3}\\right)$ and $\\cos\\!\\left(\\tfrac{5\\pi}{3}\\right)$.", "answer": "$-\\tfrac{1}{2}$ and $\\tfrac{1}{2}$.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "For $a_n = \\cos^2\\!\\left(\\tfrac{n\\pi}{3}\\right)$, what are the first three values $a_1, a_2, a_3$?", "answer": "$\\tfrac{1}{4}, \\tfrac{1}{4}, 1$.", "source": "Opus 4.7 ②", "_id" const SK='p2_paper8';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){

  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}

    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),3500);
  fetch('https://hermes-flashcards.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
