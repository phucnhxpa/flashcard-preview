e fundamentally two sides of the same coin: energy loss rate.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "A beta-minus particle is an electron, but the nucleus contains no electrons. Where does it come from, and what else must be emitted? (3 steps)", "answer": "- Step 1: Inside the nucleus, a neutron spontaneously converts into a proton. The reaction is: $$^1_0 n \\rightarrow ^1_1 p + ^0_{-1}\\beta + \\bar{\\nu}_e$$.\n- Step 2: The electron (beta-minus) is created at the moment of conversion and ejected from the nucleus. It didn't \"exist\" inside beforehand — it is a product of the neutron's transformation, analogous to how a photon is created when an electron changes energy level.\n- Step 3: An antineutrino $$\\bar{\\nu}_e$$ must also be emitted to conserve lepton number. Before the decay, lepton number = 0 (neutron is not a lepton). After: electron has lepton number +1, so the antineutrino carries lepton number −1, giving a total of 0. The antineutrino also carries away the \"missing\" energy that made the beta energy spectrum continuous rather than single-valued.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": true}, {"question": "In beta-plus decay, a proton converts to a neutron. But a proton is lighter than a neutron — how can this happen? (2 steps)", "answer": "- Step 1: It is true that a free proton cannot decay into a neutron (it would violate energy conservation for an isolated proton). However, inside a nucleus, the proton is not free — the nuclear binding energy context makes the overall transformation energetically favourable for the nucleus as a whole.\n- Step 2: The key is that the daughter nucleus has a higher total binding energy (is more stable) than the parent, which compensates for the mass increase of the individual nucleon. The reaction is: $$^1_1 p \\rightarrow ^1_0 n + ^0_{+1}\\beta + \\nu_e$$, and it occurs only within certain neutron-deficient nuclei where the overall mass-energy balance is favourable.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": true}, {"question": "Complete and explain the conservation rules for this decay: $$^A_Z X \\rightarrow ^{A-4}_{Z-2} Y + ^4_2 \\alpha$$. What must be conserved? (3 steps)", "answer": "- Step 1: **Nucleon number $$A$$ is conserved**: on the left $$A$$, on the right $$(A-4) + 4 = A$$. The total number of nucleons is unchanged — they are just redistributed.\n- Step 2: **Proton number $$Z$$ is conserved**: on the left $$Z$$, on the right $$(Z-2) + 2 = Z$$. The total charge is unchanged. This is why alpha decay reduces both $$A$$ by 4 and $$Z$$ by 2.\n- Step 3: **Lepton number is automatically conserved** in alpha decay because no leptons are created or destroyed (the alpha particle is a helium nucleus — purely hadronic). This contrasts with beta decay, where lepton number conservation forces the neutrino/antineutrino to appear.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "In beta-minus decay, the proton number $$Z$$ *increases* by 1. In beta-plus decay, $$Z$$ *decreases* by 1. Explain why, and identify the common trap. (2 steps)", "answer": "- Step 1: In $$\\beta^-$$ decay, a neutron becomes a proton, so the nucleus gains one proton: $$Z \\rightarrow Z + 1$$. In $$\\beta^+$$ decay, a proton becomes a neutron, so the nucleus loses one proton: $$Z \\rightarrow Z - 1$$. The daughter is a *different element* in both cases.\n- Step 2: The common trap is flipping these — students see the $$-1$$ charge on the beta-minus particle and think $$Z$$ decreases. But the $$-1$$ is the charge *of the emitted electron*, not the change in $$Z$$. The daughter nucleus gains a proton (charge $$+1$$) because a neutron converted, and the emitted electron carries away the balancing $$-1$$ charge. The total charge is still conserved: $$(Z+1) + (-1) = Z$$.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "Write the full balanced equation for the beta-minus decay of carbon-14, and explain why the antineutrino must appear. (3 steps)", "answer": "- Step 1: Carbon-14 has $$A = 14$$, $$Z = 6$$. In $$\\beta^-$$ decay, $$A$$ is unchanged, $$Z$$ increases by 1: $$^{14}_6 C \\rightarrow ^{14}_7 N + ^0_{-1}\\beta + \\bar{\\nu}_e$$.\n- Step 2: Check nucleon number: $$14 = 14 + 0 + 0$$ ✓. Check proton number: $$6 = 7 + (-1) + 0$$ ✓.\n- Step 3: The antineutrino is required by lepton number conservation. Before decay: lepton number = 0. After: the electron has lepton number $$+1$$. Without the antineutrino (lepton number $$-1$$), lepton number would not be conserved. Historically, the continuous beta energy spectrum hinted at a \"missing\" particle carrying away variable energy — Pauli proposed the neutrino on this basis.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": true}, {"question": "Gamma emission changes neither $$A$$ nor $$Z$$. What physically triggers it, and how does it differ from alpha or beta decay? (2 steps)", "answer": "- Step 1: After alpha or beta decay, the daughter nucleus is often left in an *excited* energy state (it has excess internal energy). The nucleus then de-excites by emitting a gamma photon: $$^A_Z X^* \\rightarrow ^A_Z X + \\gamma$$. The asterisk denotes an excited nucleus.\n- Step 2: Unlike alpha/beta decay (which change the element and involve nucleon rearrangement), gamma emission is purely an energy release — the nucleus drops to a lower energy state without changing its composition. It is analogous to an electron dropping between atomic energy levels and emitting a photon, but at nuclear energy scales (MeV rather than eV).", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "In thermionic emission, what causes electrons to escape from a metal surface, and how is this different from photoelectric emission? (3 steps)", "answer": "- Step 1: In thermionic emission, the metal is heated. Conduction electrons gain thermal kinetic energy from the lattice vibrations. When an electron's kinetic energy exceeds the work function (the binding energy holding it at the surface), it can escape.\n- Step 2: In the photoelectric effect, electrons escape by absorbing energy from individual incident photons (one photon → one electron), with no heating required. The driving force is electromagnetic, not thermal.\n- Step 3: The key difference: thermionic emission is a *thermal* process — electrons gain energy from the random thermal motion of the lattice. Photoelectric emission is a *quantum* process — energy comes from photon absorption. Both require the electron to overcome the work function, but the energy source differs.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": true}, {"question": "An electron is accelerated from rest through a potential difference $$V$$. Derive the expression for its final speed. (3 steps)", "answer": "- Step 1: The kinetic energy gained equals the work done by the electric field: $$\\frac{1}{2}m_e v^2 = eV$$, where $$e$$ is the elementary charge and $$m_e$$ is the electron mass.\n- Step 2: Rearrange for $$v$$: $$v = \\sqrt{\\frac{2eV}{m_e}}$$. This is a classical (non-relativistic) result.\n- Step 3: Validity check: at $$V = 5\\text{ kV}$$, $$v \\approx 4.2 \\times 10^7 \\text{ m/s}$$, which is about 14% of $$c$$. Beyond ~10% of $$c$$, relativistic corrections become significant. For very high voltages, you must use the relativistic energy-momentum relation instead.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": true}, {"question": "In a linac (linear accelerator), the drift tubes get progressively longer. Why must they lengthen, given that the AC frequency is fixed? (3 steps)", "answer": "- Step 1: The ion is accelerated in each gap between drift tubes, gaining kinetic energy and speed each time. Inside each tube, it drifts at constant velocity (no field inside a conductor).\n- Step 2: The AC voltage alternates at a fixed frequency $$f$$. For the ion to be accelerated (not decelerated) at each gap, it must arrive at each gap when the voltage has the correct polarity. This means it must spend the same time in each tube — one half-period of the AC cycle.\n- Step 3: Since the ion is faster after each gap but must spend the same time in each tube, the tube must be longer: $$L = v \\times T/2$$. As $$v$$ increases, $$L$$ must increase proportionally. This is why tubes lengthen along the linac.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "In a cyclotron, the period of orbit $$T = 2\\pi m / (BQ)$$ is independent of speed. Why is this crucial for the cyclotron's operation? (3 steps)", "answer": "- Step 1: A charged particle in a uniform magnetic field follows a circular path with radius $$r = mv/(BQ)$$. Faster particles have larger radii but also cover more distance per orbit.\n- Step 2: The period is $$T = 2\\pi r / v = 2\\pi (mv/(BQ))/v = 2\\pi m/(BQ)$$. The $$v$$ cancels out — the period depends only on mass, charge, and field strength, not on speed or radius.\n- Step 3: This independence means the alternating voltage across the dees can operate at a single fixed frequency $$f = 1/T = BQ/(2\\pi m)$$, and the particle will always arrive at the gap in phase with the accelerating voltage regardless of how fast it's going. Without this property, the cyclotron would not work — the particle would fall out of sync.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": true}, {"question": "What is the minimum photon energy required for pair production, and why is it $$2mc^2$$ rather than $$mc^2$$? (3 steps)", "answer": "- Step 1: Pair production is when a high-energy photon converts into a particle–antiparticle pair (e.g., electron + positron). Energy must be conserved: the photon's energy must supply the rest-mass energy of *both* particles created.\n- Step 2: Each particle has rest energy $$mc^2$$. Since two particles are created, the minimum energy is $$E_{min} = 2mc^2$$. For an electron–positron pair: $$E_{min} = 2 \\times 0.511 \\approx 1.022 \\text{ MeV}$$.\n- Step 3: The common trap is writing $$mc^2$$ (forgetting the factor of 2). If the photon only had $$mc^2$$, it could create one particle but not its antiparticle — violating conservation laws (charge, lepton number). Both must be created simultaneously, hence the factor of 2. Any excess energy above $$2mc^2$$ goes into kinetic energy of the pair.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": true}, {"question": "In annihilation, a particle meets its antiparticle and both vanish. Why must *two* photons be produced rather than one? (2 steps)", "answer": "- Step 1: A single photon cannot simultaneously conserve both energy and momentum. In the centre-of-mass frame, the total momentum before annihilation is zero, but a single photon always carries momentum $$p = E/c$$. One photon would give non-zero final momentum — violating conservation.\n- Step 2: Two photons emitted back-to-back (equal energy, opposite directions) have total momentum zero, matching the initial state. Each photon carries energy $$mc^2$$, so total energy $$2mc^2$$ equals the combined rest energy of the particle–antiparticle pair. Both energy and momentum are conserved.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": true}, {"question": "A proton has quark composition $$uud$$ and a neutron has $$udd$$. Verify the charge of each, and explain why a proton cannot decay via the strong force. (3 steps)", "answer": "- Step 1: Proton ($$uud$$): $$+\\frac{2}{3}e + \\frac{2}{3}e + (-\\frac{1}{3}e) = +\\frac{3}{3}e = +1e$$ ✓.\n- Step 2: Neutron ($$udd$$): $$+\\frac{2}{3}e + (-\\frac{1}{3}e) + (-\\frac{1}{3}e) = +\\frac{0}{3}e = 0$$ ✓.\n- Step 3: The proton is the lightest baryon. Any baryon-number-conserving strong decay would require the proton to turn into lighter baryons, but there are no lighter baryons. This is why the proton is stable — it cannot decay via the strong force. (Hypothetical proton decay via the much weaker GUT mechanism has never been observed.)", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": true}, {"question": "What is the difference between a baryon and a meson, and why are both classified as hadrons? (2 steps)", "answer": "- Step 1: Both baryons and mesons are hadrons — particles made of quarks that interact via the strong nuclear force. The difference is in quark composition: baryons consist of **3 quarks** (e.g., proton = $$uud$$, neutron = $$udd$$), while mesons consist of a **quark–antiquark pair** (e.g., pion = $$u\\bar{d}$$).\n- Step 2: Baryons are fermions (half-integer spin, obey Pauli exclusion) because 3 half-integer spins combine to half-integer. Mesons are bosons (integer spin) because a quark and antiquark combine to integer spin. Baryons have baryon number +1; mesons have baryon number 0.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "The decay constant $$\\lambda$$ is defined as the probability per unit time that a given nucleus decays. Why does this make nuclear decay fundamentally random, and what can we actually predict? (3 steps)", "answer": "- Step 1: Each nucleus has a fixed probability $$\\lambda$$ per second of decaying. Whether it decays in the next second is a random event — like rolling a die. You cannot predict *which* nucleus will decay or *when* a specific one will.\n- Step 2: However, with a very large sample ($$\\sim 10^{20}$$ nuclei), statistical regularity emerges. The *average* number decaying per second is predictable: $$A = \\lambda N$$, where $$N$$ is the number of undecayed nuclei.\n- Step 3: This is analogous to insurance: you can't predict which individual person will have an accident, but with millions of policyholders, the average claim rate is very predictable. The half-life is a statistical property of the ensemble, not a timer on any individual nucleus.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": true}, {"question": "Starting from $$\\frac{dN}{dt} = -\\lambda N$$, derive the exponential decay law $$N = N_0 e^{-\\lambda t}$$. (3 steps)", "answer": "- Step 1: Separate variables: $$\\frac{dN}{N} = -\\lambda \\, dt$$. The negative sign reflects that $$N$$ decreases over time (each decay removes one nucleus).\n- Step 2: Integrate both sides. At $$t = 0$$, $$N = N_0$$; at time $$t$$, $$N = N(t)$$: $$\\int_{N_0}^{N} \\frac{dN}{N} = -\\lambda \\int_0^t dt$$, giving $$\\ln(N) - \\ln(N_0) = -\\lambda t$$, so $$\\ln(N/N_0) = -\\lambda t$$.\n- Step 3: Exponentiate both sides: $$N/N_0 = e^{-\\lambda t}$$, hence $$N = N_0 e^{-\\lambda t}$$. Since activity $$A = \\lambda N$$, it follows that $$A = \\lambda N_0 e^{-\\lambda t} = A_0 e^{-\\lambda t}$$. Both number and activity decay exponentially with the same decay constant.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "Derive the relationship between half-life and decay constant: $$t_{1/2} = \\frac{\\ln 2}{\\lambda}$$. (3 steps)", "answer": "- Step 1: By definition, after one half-life, $$N = N_0/2$$. Substitute into the exponential decay law: $$\\frac{N_0}{2} = N_0 e^{-\\lambda t_{1/2}}$$.\n- Step 2: Cancel $$N_0$$: $$\\frac{1}{2} = e^{-\\lambda t_{1/2}}$$. Take natural logs: $$\\ln(1/2) = -\\lambda t_{1/2}$$, so $$-\\ln 2 = -\\lambda t_{1/2}$$.\n- Step 3: Therefore $$t_{1/2} = \\frac{\\ln 2}{\\lambda} \\approx \\frac{0.693}{\\lambda}$$. This means a large $$\\lambda$$ (high decay probability per second) gives a short half-life, and vice versa. Carbon-14's tiny $$\\lambda \\approx 3.83 \\times 10^{-12} \\text{ s}^{-1}$$ gives $$t_{1/2} \\approx 5730$$ years.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "After $$n$$ half-lives, the number of nuclei remaining is $$N = N_0 (1/2)^n$$. A student claims that after 2 half-lives, 100% of the sample has decayed because \"half plus half equals all.\" Where is the error? (2 steps)", "answer": "- Step 1: The error is that each half-life halves *whatever remains*, not the original amount. After 1 half-life: $$N_0/2$$ remain. After 2 half-lives: half of the remaining $$N_0/2$$ decays, leaving $$N_0/4$$ (not zero). After 3: $$N_0/8$$, and so on.\n- Step 2: Mathematically, $$N = N_0 \\times (1/2)^n$$. After 2 half-lives: $$N_0 \\times (1/2)^2 = N_0/4$$ — 75% has decayed, 25% remains. The sample never reaches exactly zero; it approaches it asymptotically. The \"half plus half\" mistake treats the halves as additive fractions of the original, rather than successive multiplicative reductions.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": true}, {"question": "A radioactive source has $$t_{1/2} = 20 \\text{ min}$$ and initial activity $$A_0 = 800 \\text{ Bq}$$. What is the activity after 1 hour, using the half-life method? (2 steps)", "answer": "- Step 1: Determine the number of half-lives. $$n = t / t_{1/2} = 60 \\text{ min} / 20 \\text{ min} = 3$$ half-lives.\n- Step 2: Apply $$A = A_0 (1/2)^n = 800 \\times (1/2)^3 = 800 \\times 1/8 = 100 \\text{ Bq}$$. The \"magic table\" approach: after 0 half-lives → 800 Bq; after 1 → 400; after 2 → 200; after 3 → 100 Bq.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "A sample's activity falls from 216 Bq to 13.5 Bq in 22 hours. The half-life is 5.5 hours. Verify this using the half-life formula. (2 steps)", "answer": "- Step 1: Number of half-lives: $$n = 22/5.5 = 4$$ half-lives.\n- Step 2: $$A = A_0 (1/2)^4 = 216 \\times 1/16 = 13.5 \\text{ Bq}$$. ✓ The magic table confirms: 216 → 108 → 54 → 27 → 13.5 Bq after 4 half-lives. Note: you cannot use simple ratios like $$216/13.5 = 16$$ and then linearly scale — you must use the exponential $$(1/2)^n$$ relationship.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "Half-life is intrinsic to the isotope. What does this mean, and what is a common misconception about what can change it? (2 steps)", "answer": "- Step 1: Half-life depends *only* on the nuclear properties of the isotope (the probability of decay governed by the weak/strong nuclear force). It is unaffected by temperature, pressure, chemical bonding state, or the amount of material. Polonium-214 always has $$t_{1/2} \\approx 0.16 \\text{ ms}$$; uranium-238 always has $$t_{1/2} \\approx 4.5 \\times 10^9 \\text{ yr}$$.\n- Step 2: The common misconception is that heating a sample or compressing it will speed up decay. Nuclear forces are ~$$10^{25}$$ times stronger than chemical bonds, so no chemical or thermal process can influence the nucleus. This independence is actually what makes radiometric dating reliable.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "When using $$A = \\lambda N$$, a student substitutes the mass of the sample in grams for $$N$$. Why is this wrong, and how do you correctly convert? (3 steps)", "answer": "- Step 1: $$N$$ in $$A = \\lambda N$$ is the *number of undecayed nuclei*, a dimensionless count. Mass in grams is not a count — it's a bulk quantity. Substituting grams directly gives a numerically meaningless result with wrong units.\n- Step 2: To convert mass to number of nuclei: $$N = \\frac{\\text{mass}}{M_r} \\times N_A$$, where $$M_r$$ is the molar mass (g/mol) and $$N_A = 6.02 \\times 10^{23} \\text{ mol}^{-1}$$ is Avogadro's number.\n- Step 3: Example: for 1 g of carbon-14 ($$M_r \\approx 14$$): $$N = (1/14) \\times 6.02 \\times 10^{23} \\approx 4.3 \\times 10^{22}$$ nuclei. Only then can you compute $$A = \\lambda N$$.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "What is mass defect, and why is the bound nucleus *lighter* than its separated nucleons — where did the mass go? (3 steps)", "answer": "- Step 1: Mass defect is $$\\Delta m = Zm_p + (A-Z)m_n - m_{\\text{nucleus}}$$. It is always positive — the bound nucleus always has less mass than the sum of its free constituents.\n- Step 2: The \"missing\" mass was converted to energy when the nucleus formed. By $$\\Delta E = \\Delta m c^2$$, the mass defect corresponds to the binding energy — the energy released when nucleons come together, or equivalently, the energy you must supply to pull them apart.\n- Step 3: The nucleus sits in a potential energy well. Being bound means it is at a *lower* energy state than free nucleons. By mass-energy equivalence, lower energy = lower mass. The mass didn't \"go\" anywhere — it was emitted as energy (gamma photons, kinetic energy of products) during formation.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": true}, {"question": "A student says \"binding energy is the energy stored inside the nucleus.\" Explain why this is wrong and what binding energy actually is. (2 steps)", "answer": "- Step 1: Binding energy is the energy *required to pull the nucleus apart* into its constituent protons and neutrons (i.e., the energy you must *add* to break it). It is not energy \"stored\" inside — the nucleus is at a *lower* energy than separated nucleons.\n- Step 2: An analogy: a ball in a well. The binding energy is like the energy needed to lift the ball *out* of the well. The ball at the bottom has *less* gravitational potential energy than at the top, not more. Similarly, the bound nucleus has less mass-energy than its separated parts — that's precisely why it is bound.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": true}, {"question": "The atomic mass unit is defined as $$1 \\text{ u} = \\frac{1}{12} m(^{12}_6 C)$$. Why is carbon-12 chosen as the reference, and what is the conversion to MeV? (2 steps)", "answer": "- Step 1: Carbon-12 is chosen because it is abundant, stable, and allows both protons and neutrons to have masses close to 1 u (a convenient round number for nuclear calculations). The definition ensures $$m_p \\approx 1.007 \\text{ u}$$ and $$m_n \\approx 1.009 \\text{ u}$$, close to unity.\n- Step 2: Via $$E = mc^2$$: $$1 \\text{ u} = 1.661 \\times 10^{-27} \\text{ kg}$$, so $$1 \\text{ u} \\times c^2 = (1.661 \\times 10^{-27})(3.00 \\times 10^8)^2 / (1.60 \\times 10^{-13} \\text{ J/MeV}) \\approx 931.5 \\text{ MeV}$$. This means you can convert mass defect directly: $$\\Delta m$$ in u × 931.5 = binding energy in MeV — no need to separately multiply by $$c^2$$.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "A nuclide has mass defect $$\\Delta m = 0.03 \\text{ u}$$. What is its binding energy, and why don't you need to separately multiply by $$c^2$$? (2 steps)", "answer": "- Step 1: Binding energy $$= \\Delta m \\times 931.5 \\text{ MeV/u} = 0.03 \\times 931.5 \\approx 27.9 \\text{ MeV}$$. The factor 931.5 already includes the $$c^2$$ conversion built in.\n- Step 2: The factor 931.5 MeV per u comes from $$1 \\text{ u} \\times c^2 = 931.5 \\text{ MeV}$$. So when you multiply a mass in u by 931.5, you are *already* doing $$\\Delta m \\times c^2$$ and converting to MeV in one step. A common trap is to multiply by 931.5 *and then* by $$c^2$$ again — double-counting.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "The binding-energy-per-nucleon curve peaks near iron-56 at ~8.8 MeV/nucleon. Explain what this peak signifies for nuclear stability. (3 steps)", "answer": "- Step 1: $$B/A$$ (binding energy per nucleon) measures how tightly each nucleon is bound on average. A higher value means each nucleon is more strongly held — the nucleus is more stable.\n- Step 2: Iron-56 sits at the peak, meaning its nucleons are the most tightly bound of any nucleus. It is the most stable nucleus — you cannot extract energy from it by either fission or fusion.\n- Step 3: The universal rule: a nuclear reaction *releases energy* if and only if the products have a higher $$B/A$$ than the reactants (i.e., the products are more tightly bound). Moving *up* the curve releases energy. This single principle explains both fission and fusion.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "Both fission of heavy nuclei and fusion of light nuclei release energy. Using the BE/nucleon curve, explain why these seemingly opposite processes both produce energy. (3 steps)", "answer": "- Step 1: On the BE/nucleon curve, very light nuclei (far left, e.g., hydrogen) have very low $$B/A$$. Very heavy nuclei (far right, e.g., uranium) also have relatively low $$B/A$$ (slowly declining beyond iron). The peak is near iron-56.\n- Step 2: **Fusion** (light → heavier): two light nuclei with low $$B/A$$ combine into a nucleus with higher $$B/A$$ (climbing the steep left slope of the curve). The increase in $$B/A$$ means the products are more tightly bound, and the energy difference is released.\n- Step 3: **Fission** (heavy → medium): a heavy nucleus with lower $$B/A$$ splits into medium-mass nuclei with higher $$B/A$$ (climbing the right slope toward the peak). Again, the increase in total binding energy is released as kinetic energy and radiation. Both processes move toward iron-56 — they just approach from opposite sides.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": true}, {"question": "Estimate the energy released when one uranium-235 nucleus undergoes fission, given $$B/A \\approx 7.6 \\text{ MeV}$$ for U-235 and $$B/A \\approx 8.5 \\text{ MeV}$$ for the products. (2 steps)", "answer": "- Step 1: Total binding energy of U-235 = $$235 \\times 7.6 = 1786 \\text{ MeV}$$. Total binding energy of products = $$235 \\times 8.5 = 1997.5 \\text{ MeV}$$ (nucleon number is conserved, so still 235 nucleons total).\n- Step 2: Energy released = (final total $$B$$) − (initial total $$B$$) = $$1997.5 − 1786 \\approx 211.5 \\text{ MeV}$$. This is consistent with the textbook value of ~200 MeV per fission. The energy comes from the products being more tightly bound than the original uranium nucleus.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": false}, {"question": "In the fission of U-235, each fission produces 2–3 free neutrons. Why is this essential for a chain reaction, and how do control rods prevent an explosion? (3 steps)", "answer": "- Step 1: The 2–3 neutrons from each fission can be absorbed by other U-235 nuclei, causing further fissions, which release more neutrons — a chain reaction. If each fission triggers more than one subsequent fission, the reaction grows exponentially (supercritical = bomb).\n- Step 2: Control rods (made of neutron-absorbing materials like boron or cadmium) are inserted among the fuel rods to absorb excess neutrons, reducing the number available to cause further fissions.\n- Step 3: By adjusting the control rod depth, operators maintain the multiplication factor at exactly 1 (critical state) — each fission causes exactly one more fission, producing a steady power output. Fully removing the rods allows the reaction to go supercritical; fully inserting them shuts it down.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "Fusion of light nuclei releases enormous energy per unit mass, yet it is extremely difficult to achieve on Earth. Explain the physical barrier and why stars can do it naturally. (3 steps)", "answer": "- Step 1: Both nuclei are positively charged. To fuse, they must get close enough for the short-range strong nuclear force to bind them (within ~$$10^{-15}$$ m). But Coulomb repulsion pushes them apart before they can get that close.\n- Step 2: To overcome this Coulomb barrier, nuclei need enormous kinetic energy (temperatures >$$10^7$$ K). At these temperatures, atoms are fully ionised into a plasma, and thermal motion is violent enough for some nuclei to tunnel through the barrier.\n- Step 3: Stars achieve this naturally because their immense gravity creates the necessary temperatures and densities at their cores, and the plasma is confined by gravitational pressure. On Earth, we must artificially heat and confine the plasma (magnetic confinement in tokamaks like ITER, or inertial confinement with lasers) — both are extraordinarily difficult to sustain.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": true}, {"question": "In the deuterium–tritium fusion reaction $$^2_1 H + ^3_1 H \\rightarrow ^4_2 He + ^1_0 n + 17.6 \\text{ MeV}$$, verify that nucleon number and proton number are conserved. (2 steps)", "answer": "- Step 1: Nucleon number: $$2 + 3 = 4 + 1 = 5$$ ✓. Five nucleons in, five nucleons out.\n- Step 2: Proton number: $$1 + 1 = 2 + 0 = 2$$ ✓. Two protons in, two protons out (helium-4 has 2 protons; the neutron has 0). The 17.6 MeV comes from the products having higher binding energy per nucleon than the reactants.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": false}, {"question": "Inside stars, the proton–proton chain fuses four protons into helium-4: $$4 \\, ^1_1 H \\rightarrow ^4_2 He + 2e^+ + 2\\nu_e + \\text{energy}$$. Why must two positrons be emitted? (3 steps)", "answer": "- Step 1: Four protons have total proton number $$Z = 4$$ and nucleon number $$A = 4$$. Helium-4 has $$Z = 2$$, $$A = 4$$.\n- Step 2: Nucleon number is conserved ($$4 = 4$$), but proton number is not: $$4 \\neq 2$$. Two protons must have converted to neutrons. Each conversion produces a positron: $$p \\rightarrow n + e^+ + \\nu_e$$.\n- Step 3: Two conversions produce two positrons and two neutrinos. Now check: $$Z = 4 - 2 = 2$$ ✓ (the two positrons carry away charge +2). Lepton number is also conserved: two positrons (lepton number −2) balanced by two neutrinos (lepton number +2).", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": false}, {"question": "Why does the cyclotron's orbit radius increase with each half-revolution, even though the magnetic field is uniform? (2 steps)", "answer": "- Step 1: The radius is $$r = mv/(BQ)$$. Each time the ion crosses the gap between the dees, the alternating voltage accelerates it, increasing $$v$$. Since $$r \\propto v$$ (with $$m$$, $$B$$, $$Q$$ constant), the radius grows.\n- Step 2: The particle spirals outward in ever-widening semicircles. Eventually the radius exceeds the dee boundary, and the particle exits the cyclotron at high energy. The uniform $$B$$ field ensures circular motion, but the speed boost at each gap is what drives the spiral.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": true}, {"question": "A student measures a count rate of 80 counts/min from a radioactive source, and the background count rate is 20 counts/min. What is the corrected count rate, and what would happen to the calculated half-life if background were not subtracted? (2 steps)", "answer": "- Step 1: Corrected count rate = $$80 - 20 = 60 \\text{ counts/min}$$. This is the actual activity of the source alone.\n- Step 2: Without subtraction, the measured rate decays toward 20 (background), not toward 0. The curve appears to flatten out prematurely, making it seem like the source decays more slowly than it really does. This gives an incorrectly *long* half-life. The error is most severe when the source activity is comparable to background.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": false}, {"question": "An alpha particle has notation $$^4_2 \\alpha$$. A student writes beta-minus as $$^0_{-1} e$$ instead of $$^0_{-1} \\beta$$. Is this wrong? What's the significance? (2 steps)", "answer": "- Step 1: Notationally, both are acceptable in principle — a beta-minus particle *is* an electron. The notation $$^0_{-1}\\beta$$ emphasises that it originated from nuclear decay (not an orbital electron), while $$^0_{-1}e$$ just says \"electron.\"\n- Step 2: In exam contexts, $$^0_{-1}\\beta$$ is preferred because it signals you understand the nuclear origin. Writing $$^0_{-1}e$$ isn't strictly wrong, but it could lose a mark if the examiner wants to see the nuclear decay notation. More critically, *forgetting the antineutrino* in the full equation is the real mark-losing error.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": false}, {"question": "The strong nuclear force is attractive and holds the nucleus together, while the electrostatic force repels protons. How does the balance between these two forces explain why very heavy nuclei are unstable? (3 steps)", "answer": "- Step 1: The strong nuclear force is short-range (acts over ~$$10^{-15}$$ m), attracting nearest-neighbour nucleons. The electrostatic (Coulomb) force is long-range, causing *every* proton to repel *every other* proton in the nucleus.\n- Step 2: In light nuclei with few protons, the strong force between nearest neighbours dominates, and the nucleus is stable. But as you add more protons, the cumulative Coulomb repulsion grows faster than the strong force binding (which only acts between close neighbours).\n- Step 3: Beyond a certain size (around lead, $$Z = 82$$), the Coulomb repulsion begins to overwhelm the strong force. Extra neutrons help (they add strong-force attraction without Coulomb repulsion), but eventually even adding neutrons can't compensate. This is why very heavy nuclei (uranium, plutonium) are radioactive — they spontaneously decay or fission to reduce the repulsive burden.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": false}, {"question": "A sample of 8.00 g of polonium (half-life 164 s) decays to 0.25 g. How many half-lives have elapsed, and what is the total time? (2 steps)", "answer": "- Step 1: Find the number of half-lives: $$0.25/8.00 = (1/2)^n$$, so $$1/32 = (1/2)^n$$, giving $$n = 5$$ (since $$2^5 = 32$$).\n- Step 2: Total time = $$n \\times t_{1/2} = 5 \\times 164 = 820 \\text{ s}$$. The magic table: 8 → 4 → 2 → 1 → 0.5 → 0.25 g (5 steps). Each step is one half-life of 164 s.", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": false}, {"question": "Why is a moderator (like water or graphite) needed in a nuclear fission reactor, and what property must a good moderator have? (3 steps)", "answer": "- Step 1: Fission neutrons are born \"fast\" (high kinetic energy, ~MeV). Fast neutrons have a low probability of being captured by U-235. U-235 fissions much more efficiently with \"thermal\" (slow) neutrons (~0.025 eV).\n- Step 2: A moderator slows fast neutrons through repeated elastic collisions with light nuclei. When a neutron hits a nucleus of similar mass (like hydrogen in water, or carbon in graphite), it transfers a large fraction of its kinetic energy per collision, slowing down efficiently.\n- Step 3: A good moderator must have: (a) light nuclei (for efficient energy transfer), (b) low neutron absorption cross-section (so it slows neutrons without capturing them), and (c) high density of scattering centres. Water, heavy water, and graphite are common choices.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": true}, {"question": "A photon with energy exactly $$2m_e c^2$$ creates an electron–positron pair. Why must this occur near a heavy nucleus rather than in empty space? (2 steps)", "answer": "- Step 1: In empty space, pair production cannot conserve both energy and momentum simultaneously. A single photon has momentum $$p = E/c$$, but the electron–positron pair in their centre-of-mass frame has zero total momentum. There's no way to satisfy both conservation laws with just a photon and two particles.\n- Step 2: A nearby heavy nucleus (or atomic electron) can absorb the \"excess\" momentum with negligible energy cost (because it's so massive, $$p = mv$$ with huge $$m$$ gives tiny $$v$$ and negligible kinetic energy). The nucleus acts as a momentum \"buffer,\" allowing both energy and momentum to be conserved while the photon converts to the particle pair.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": true}, {"question": "The neutron is slightly heavier than the proton ($$m_n \\approx 1.675 \\times 10^{-27}$$ kg vs $$m_p \\approx 1.673 \\times 10^{-27}$$ kg). Explain why a free neutron can undergo beta-minus decay but a free proton cannot undergo beta-plus decay. (2 steps)", "answer": "- Step 1: For a free neutron: $$n \\rightarrow p + e^- + \\bar{\\nu}_e$$. Since $$m_n > m_p + m_e$$, the rest mass of the reactant exceeds the rest masses of the products. The mass deficit provides the kinetic energy for the products — the decay is energetically allowed and spontaneous.\n- Step 2: For a free proton: $$p \\rightarrow n + e^+ + \\nu_e$$. Since $$m_p < m_n + m_e$$, the products are heavier than the reactant. Energy would need to be *supplied*, not released. This violates energy conservation for an isolated proton. A proton can only undergo $$\\beta^+$$ decay inside a nucleus, where the nuclear binding energy context makes the overall transformation favourable.", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": true}, {"question": "Using the BE/nucleon curve, explain why helium-4 is anomalously stable compared to its neighbours (lithium-5, etc.). (2 steps)", "answer": "- Step 1: Helium-4 has $$B/A \\approx 7 \\text{ MeV/nucleon}$$, which is an exceptionally high value for such a light nucleus. Its neighbours (e.g., lithium-5 with $$B/A$$ much lower) are far less tightly bound.\n- Step 2: This is because $$^4$$He has a \"doubly magic\" structure — 2 protons and 2 neutrons completely fill the first nuclear shell. This closed-shell configuration is exceptionally stable, analogous to noble gases in atomic physics. It's also why alpha decay (emitting a $$^4$$He nucleus) is a common decay mode — the alpha particle is a particularly stable \"fragment\" to break off.", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": true}, {"question": "A student calculates binding energy of iron-56 and gets a negative mass defect. Is this possible? What error did they likely make? (2 steps)", "answer": "- Step 1: No — mass defect is always positive for a bound nucleus. The bound nucleus is *always* lighter than its separated nucleons. A negative mass defect would mean the nucleus is heavier than its parts, implying it is *unbound* (it would spontaneously fly apart).\n- Step 2: The likely error is reversing the formula: writing $$\\Delta m = m_{\\text{nucleus}} - [Zm_p + (A-Z)m_n]$$ instead of $$\\Delta m = Zm_p + (A-Z)m_n - m_{\\text{nucleus}}$$. The correct order is: (sum of free nucleon masses) − (bound nucleus mass) = positive mass defect. Always subtract the bound nucleus from the sum of parts.", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": true}, {"question": "Synthesis question: Carbon-14 undergoes beta-minus decay to nitrogen-14. Explain how (a) the mass defect of the parent nucleus, (b) the conservation laws, and (c) the random nature of decay all play a role in this process. (3 steps)", "answer": "- Step 1: **Mass defect and energy**: The C-14 nucleus has a specific mass defect and binding energy. It is unstable because its particular neutron-to-proton ratio (8 neutrons, 6 protons) places it in a region where converting a neutron to a proton (releasing an electron and antineutrino) moves the nucleus to a more tightly bound state (N-14 has higher $$B/A$$). The energy released equals the mass difference between parent and products times $$c^2$$.\n- Step 2: **Conservation laws**: Nucleon number is conserved ($$14 = 14 + 0 + 0$$), proton number is conserved ($$6 = 7 + (-1) + 0$$), and lepton number is conserved (the antineutrino with lepton number −1 balances the electron's +1). Without the antineutrino, lepton number would be violated and the equation would be invalid.\n- Step 3: **Random nature**: We cannot predict which specific C-14 nucleus will decay or when. Each nucleus has a fixed probability $$\\lambda$$ per second of decaying. Only statistically, with a large sample, can we say that after one half-life (5730 years), approximately half the nuclei will have decayed. This randomness is what makes radiocarbon dating a probabilistic measurement with uncertainty bounds.", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": false}, {"question": "Synthesis question: Explain why the uranium-238 decay chain ultimately terminates at stable lead-206, connecting the concepts of decay modes, isotopes, and stability. (3 steps)", "answer": "- Step 1: U-238 is very heavy (92 protons, 146 neutrons), sitting on the low-$$B/A$$ right side of the curve. It is energetically favourable for it to move toward higher $$B/A$$ through successive decays. Alpha decay reduces both $$A$$ and $$Z$$, moving the nucleus leftward on the chart of nuclides. Beta-minus decay keeps $$A$$ the same but increases $$Z$$, moving diagonally.\n- Step 2: Through a chain of alpha and beta decays, the nucleus progressively moves toward the region of maximum stability (near iron and the stable isotopes of medium-mass elements). Each step produces a different isotope — sometimes the same element (when beta decay changes $$Z$$ but not $$A$$), sometimes a new element (when alpha decay changes both).\n- Step 3: Lead-206 (82 protons, 124 neutrons) is stable because its proton and neutron numbers form a particularly stable configuration (lead-208 is doubly magic with 82 protons and 126 neutrons; Pb-206 is close). At this point, no decay mode can release energy — the nucleus sits in a local minimum of mass-energy. No further spontaneous rearrangement is energetically favourable, so the chain stops.", "source": "GLM 5.1 ②", "_id": "glm_2_50", "judge_pick": false}, {"question": "Synthesis question: A nuclear reactor and a nuclear bomb both use uranium fission. Contrast the conditions in each that lead to controlled power vs. explosive energy release. (3 steps)", "answer": "- Step 1: Both rely on the chain reaction: each fission releases 2–3 neutrons that can cause further fissions. The key parameter is the multiplication factor $$k$$ — the average number of fissions caused by neutrons from one fission.\n- Step 2: In a **reactor**, control rods (boron, cadmium) absorb excess neutrons to keep $$k = 1$$ (critical). A moderator slows neutrons for efficient U-235 capture. The reaction proceeds at a steady, controllable rate. If $$k$$ rises above 1, control rods are inserted further; if $$k$$ falls below 1, they're withdrawn.\n- Step 3: In a **bomb**, the design maximises $$k \\gg 1$$ (supercritical). Weapons-grade uranium (>90% U-235, vs. ~3–5% in reactor fuel) is rapidly compressed into a supercritical mass. There are no control rods or moderators. The chain reaction grows exponentially, releasing enormous energy in microseconds before the assembly blows itself apart. The difference is entirely about controlling the neutron population.", "source": "GLM 5.1 ②", "_id": "glm_2_51", "judge_pick": true}, {"question": "A sample's half-life is measured *with* and *without* background subtraction. Sketch what the two activity-vs-time graphs look like and explain the difference. (3 steps)", "answer": "- Step 1: **Without subtraction**: the measured count rate starts at $$(A_0 + B)$$ where $$B$$ is background, and decays exponentially but levels off at $$B$$ rather than approaching zero. The curve has a floor at the background level.\n- Step 2: **With subtraction**: the corrected count rate starts at $$A_0$$ and decays exponentially toward zero, following a clean $$A_0 e^{-\\lambda t}$$ curve.\n- Step 3: The half-life read from the uncorrected graph is *too long* because the curve flattens prematurely. For example, the time to drop from $$(A_0 + B)$$ to $$(A_0 + B)/2$$ is not the same as the time for the source alone to drop from $$A_0$$ to $$A_0/2$$ — the background inflates the upper value and creates a false \"half\" point at a later time.", "source": "GLM 5.1 ②", "_id": "glm_2_52", "judge_pick": false}, {"question": "Conceptual exercise: A sample has $$N_0 = 1000$$ nuclei and $$\\lambda = 0.1 \\text{ s}^{-1}$$. What is the initial activity, and roughly how many nuclei remain after 7 seconds? (No calculator needed — approximate.) (2 steps)", "answer": "- Step 1: Initial activity $$A_0 = \\lambda N_0 = 0.1 \\times 1000 = 100 \\text{ Bq}$$. The half-life is $$t_{1/2} = 0.693/0.1 \\approx 7 \\text{ s}$$.\n- Step 2: Since 7 seconds ≈ 1 half-life, roughly half the nuclei remain: $$N \\approx 500$$. More precisely, $$N = 1000 \\times e^{-0.1 \\times 7} = 1000 \\times e^{-0.7} \\approx 1000 \\times 0.5 \\approx 500$$. The exponential and half-life methods agree at the one-half-life point.", "source": "GLM 5.1 ②", "_id": "glm_2_53", "judge_pick": false}, {"question": "Conceptual exercise: Nucleus X has mass defect 0.05 u and nucleon number 10. Nucleus Y has mass defect 0.08 u and nucleon number 10. Which is more stable, and why? (2 steps)", "answer": "- Step 1: Binding energy per nucleon for X: $$B/A = (0.05 \\times 931.5)/10 \\approx 46.6/10 \\approx 4.7 \\text{ MeV/nucleon}$$. For Y: $$B/A = (0.08 \\times 931.5)/10 \\approx 74.5/10 \\approx 7.5 \\text{ MeV/nucleon}$$.\n- Step 2: Y is more stable because it has a higher binding energy per nucleon. Each nucleon in Y is more tightly bound than in X, meaning more energy would be required to pull Y apart. Note that total mass defect alone doesn't tell you stability — you must compare *per nucleon* (a large nucleus can have a huge total binding energy but low $$B/A$$).", "source": "GLM 5.1 ②", "_id": "glm_2_54", "judge_pick": false}, {"question": "Edge case: What happens to the binding energy per nucleon at the very light end of the curve (hydrogen-1)? Why is it essentially zero? (2 steps)", "answer": "- Step 1: Hydrogen-1 ($$^1_1H$$) is a single proton — there are no other nucleons to bind with. There is no mass defect (nothing to compare against), and no binding energy is required to \"separate\" it because it's already a single nucleon.\n- Step 2: $$B/A \\approx 0$$ for hydrogen-1. This is why fusion of hydrogen releases so much energy — moving from $$B/A \\approx 0$$ to $$B/A \\approx 7 \\text{ MeV}$$ (helium-4) is the steepest climb on the entire curve. The energy gain per nucleon is enormous compared to fission, which moves from ~7.6 to ~8.5 MeV/nucleon — a much smaller jump.", "source": "GLM 5.1 ②", "_id": "glm_2_55", "judge_pick": true}, {"question": "Why can't we use the classical formula $$v = \\sqrt{2eV/m_e}$$ for an electron accelerated through very high voltages (e.g., 500 kV)? What must change? (2 steps)", "answer": "- Step 1: At 500 kV, the classical formula gives $$v = \\sqrt{2 \\times 1.6 \\times 10^{-19} \\times 500000 / 9.11 \\times 10^{-31}} \\approx 4.2 \\times 10^8 \\text{ m/s}$$, which exceeds the speed of light ($$3 \\times 10^8 \\text{ m/s}$$). This is impossible — the classical formula breaks down.\n- Step 2: At speeds approaching $$c$$, relativistic effects become important. The electron's effective mass increases (or equivalently, its kinetic energy no longer equals $$\\frac{1}{2}mv^2$$). You must use the relativistic energy-momentum relation: $$E_k = (\\gamma - 1)m_e c^2$$, where $$\\gamma = 1/\\sqrt{1 - v^2/c^2}$$. The classical formula is only reliable below ~10% of $$c$$ (voltages below ~5 kV for electrons).", "source": "GLM 5.1 ②", "_id": "glm_2_56", "judge_pick": false}, {"question": "The decay chain of U-238 includes both alpha and beta decays. If only alpha decays occurred, what would happen to the neutron-to-proton ratio, and why is this a problem? (3 steps)", "answer": "- Step 1: Each alpha decay removes 2 protons and 2 neutrons. The ratio of removed nucleons is 1:1 (2n:2p). But in heavy nuclei like U-238, the neutron-to-proton ratio is greater than 1 (146:92 ≈ 1.59).\n- Step 2: Removing equal numbers of protons and neutrons means the remaining nucleus still has more neutrons than protons, but the ratio actually *increases* with each alpha decay (removing 2p+2n from a nucleus with N/Z > 1 shifts the ratio upward). The daughter becomes increasingly neutron-rich relative to stability.\n- Step 3: This is why beta-minus decays are interspersed in the chain — they convert a neutron to a proton, *reducing* the N/Z ratio back toward stability. Without beta decay, the chain would produce increasingly neutron-rich, unstable nuclei that could not reach the stable valley. Both decay modes are needed to \"steer\" toward stability.", "source": "GLM 5.1 ②", "_id": "glm_2_57", "judge_pick": false}, {"question": "Misconception probe: \"Fusion releases more energy than fission, so a fusion bomb would be more powerful than a fission bomb.\" Evaluate this statement. (3 steps)", "answer": "- Step 1: Per reaction, fission releases ~200 MeV while the D-T fusion reaction releases ~17.6 MeV. Per individual reaction, fission releases more energy.\n- Step 2: However, per unit mass (per kg of fuel), fusion releases more energy because the reactants are much lighter. Fission: ~200 MeV / 235 nucleons ≈ 0.85 MeV/nucleon. Fusion: 17.6 MeV / 5 nucleons ≈ 3.5 MeV/nucleon — about 4× more energy per nucleon.\n- Step 3: A thermonuclear weapon (H-bomb) is indeed more powerful than a pure fission bomb, but this is because it uses a fission *primary* to trigger fusion *secondary*, and the fusion fuel is not limited by critical mass constraints. The statement contains a grain of truth (fusion is more energy-dense per mass) but oversimplifies — \"more powerful\" depends on whether you mean per reaction, per kg, or total yield.", "source": "GLM 5.1 ②", "_id": "glm_2_58", "judge_pick": false}, {"question": "Conceptual exercise: A photon has energy 1.5 MeV. Can it produce an electron–positron pair? Explain qualitatively. (2 steps)", "answer": "- Step 1: The minimum energy for electron–positron pair production is $$E_{min} = 2m_e c^2 \\approx 1.022 \\text{ MeV}$$. Since 1.5 MeV > 1.022 MeV, the photon has *enough* energy for the rest masses.\n- Step 2: Yes, pair production can occur (near a nucleus for momentum conservation). The excess energy ($$1.5 - 1.022 = 0.478 \\text{ MeV}$$) becomes kinetic energy shared between the electron and positron. If the photon had exactly 1.022 MeV, the pair would be created at rest; any extra gives them kinetic energy.", "source": "GLM 5.1 ②", "_id": "glm_2_59", "judge_pick": false}, {"question": "Why is the weak nuclear force (mediated by $$W^+$$, $$W^-$$, $$Z^0$$ bosons) specifically responsible for beta decay, while the strong force is not? (2 steps)", "answer": "- Step 1: Beta decay involves the conversion of one quark flavour into another (e.g., a down quark → up quark in beta-minus decay, changing a neutron $$udd$$ into a proton $$uud$$). Changing quark flavour is governed exclusively by the weak interaction — the strong force and electromagnetism cannot change quark flavour.\n- Step 2: The weak force is the only fundamental interaction that violates flavour conservation. It is mediated by the massive $$W$$ and $$Z$$ bosons, which is why the weak force has very short range and beta decay is relatively slow compared to strong-interaction processes. The heavy bosons make the interaction \"weak\" at low energies.", "source": "GLM 5.1 ②", "_id": "glm_2_60", "judge_pick": true}, {"question": "A student says \"the nucleus contains binding energy.\" Rewrite this statement correctly and explain why the original is physically misleading. (2 steps)", "answer": "- Step 1: Correct version: \"The binding energy is the energy that must be *supplied* to separate the nucleus into its constituent nucleons.\" It is not inside the nucleus — it is the energy *deficit* of the bound system relative to its separated parts.\n- Step 2: Saying the nucleus \"contains\" binding energy implies it is a reservoir of stored energy, like a compressed spring. In reality, the bound nucleus has *less* energy (and less mass) than its separated constituents. If you want to release energy, you don't \"tap into\" the binding energy — you rearrange nucleons into a *more tightly bound* configuration, and the increased binding energy shows up as released energy. The phrasing \"contains binding energy\" inverts the physics.", "source": "GLM 5.1 ②", "_id": "glm_2_61", "judge_pick": true}, {"question": "In the formula $$r = \\frac{mv}{BQ} = \\frac{p}{BQ}$$, explain the physical reasoning for why each variable appears where it does. (3 steps)", "answer": "- Step 1: A charged particle in a magnetic field experiences a Lorentz force $$F = BQv$$, perpendicular to its velocity. This provides the centripetal force for circular motion: $$BQv = mv^2/r$$.\n- Step 2: Rearranging: $$r = mv/(BQ)$$. Larger $$m$$ or $$v$$ → larger $$r$$ (heavier or faster particles are harder to bend). Larger $$B$$ or $$Q$$ → smaller $$r$$ (stronger field or greater charge bends the path more tightly).\n- Step 3: Writing $$r = p/(BQ)$$ shows that for a given momentum and charge, the radius depends only on $$B$$. This is useful in particle detectors: measuring $$r$$ in a known $$B$$ field lets you determine the particle's momentum, which helps identify it.", "source": "GLM 5.1 ②", "_id": "glm_2_62", "judge_pick": false}, {"question": "Conceptual exercise: An alpha particle and a proton enter the same magnetic field with the same velocity. Which has the larger orbit radius, and by roughly what factor? (2 steps)", "answer": "- Step 1: $$r = mv/(BQ)$$. The alpha has $$m_\\alpha \\approx 4m_p$$ and $$Q_\\alpha = 2e$$ vs. $$Q_p = e$$. Same $$v$$ and $$B$$ for both.\n- Step 2: $$r_\\alpha / r_p = (m_\\alpha Q_p) / (m_p Q_\\alpha) = (4m_p \\times e) / (m_p \\times 2e) = 4/2 = 2$$. The alpha orbits with twice the radius — its 4× mass advantage is only partially offset by its 2× charge.", "source": "GLM 5.1 ②", "_id": "glm_2_63", "judge_pick": false}, {"question": "Synthesis: Connect the following concepts into a single coherent explanation for why stars shine: mass defect, binding energy per nucleon curve, fusion, and $$E = \\Delta m c^2$$. (3 steps)", "answer": "- Step 1: In a star's core, light nuclei (mainly hydrogen, $$B/A \\approx 0$$) fuse into heavier nuclei (helium, $$B/A \\approx 7 \\text{ MeV/nucleon}$$). On the BE/nucleon curve, this is a steep climb from near zero to ~7 MeV/nucleon.\n- Step 2: The products are more tightly bound than the reactants. By conservation of energy, the increase in binding energy must appear as released energy. The total mass of the products is *less* than the total mass of the reactants — there is a mass defect.\n- Step 3: By Einstein's $$E = \\Delta m c^2$$, this missing mass is converted to energy: kinetic energy of particles, gamma photons, and neutrinos. This energy eventually diffuses to the stellar surface and is radiated as starlight. The Sun converts ~4 million tonnes of mass into energy every second through this process.", "source": "GLM 5.1 ②", "_id": "glm_2_64", "judge_pick": false}], "count": 65}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "An atom is roughly 10⁵ times larger than its nucleus. If the nucleus were the size of a marble at the centre of a football stadium, where would the nearest electron orbit be? What does this tell us about the interior of the atom? (2 steps)", "answer": "- Step 1: A factor of 10⁵ means the electron orbit would be 100,000 times further out than the marble. If the marble sits at centre-circle, the electrons orbit far outside the stadium — roughly a kilometre away at scale. Everything between the marble and that distant orbit is empty space.\n- Step 2: This means the atom is overwhelmingly empty space. Almost all mass is concentrated in the tiny nucleus; the volume occupied by the electrons is enormous by comparison but contains virtually no mass. This is the key conclusion from Rutherford scattering.\n\nTakeaway: The atom is mostly empty; the nucleus is incredibly dense and tiny.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "In the notation $$^A_Z X$$, what do $$A$$ and $$Z$$ represent, and how do you find the number of neutrons? A student writes $$^{235}_{92}U$$ and claims there are 92 neutrons. What is the error? (3 steps)", "answer": "- Step 1: $$A$$ is the nucleon number (mass number) = total protons + neutrons. $$Z$$ is the proton number (atomic number) = total protons. The number of neutrons is $$N = A - Z$$.\n- Step 2: For $$^{235}_{92}U$$: protons = 92, neutrons = 235 − 92 = 143, not 92. The student has confused the nucleon number with the neutron count.\n- Step 3: The element's identity is determined solely by $$Z$$. Changing the number of neutrons (changing $$A$$) gives a different *isotope* of the same element — same chemistry, different nuclear properties.\n\nTakeaway: $$A$$ ≠ neutrons; $$A$$ = protons + neutrons. Neutrons = $$A - Z$$.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": true}, {"question": "Hydrogen has three isotopes: $$^1_1H$$, $$^2_1H$$ (deuterium), and $$^3_1H$$ (tritium). They all have one proton. What differs between them, and why are they all called \"hydrogen\" despite having different masses? (2 steps)", "answer": "- Step 1: They differ in neutron count: $$^1_1H$$ has 0 neutrons, $$^2_1H$$ has 1, and $$^3_1H$$ has 2. This means different nucleon numbers ($$A = 1, 2, 3$$) but the same proton number ($$Z = 1$$).\n- Step 2: They are all called hydrogen because the element is defined by $$Z$$ alone. Same $$Z$$ → same element → same chemical behaviour. Different $$A$$ → different nuclear mass and stability (tritium is radioactive; protium and deuterium are stable).\n\nTakeaway: Isotopes share identity ($$Z$$) but differ in mass and nuclear behaviour ($$A$$).", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": true}, {"question": "In Rutherford's gold-foil experiment, three observations were made. Match each observation to the conclusion it supports: (A) Most alphas pass straight through, (B) A few deflect by small angles, (C) A tiny fraction bounce back at >90°. (3 steps)", "answer": "- Step 1: Observation (A) — most pass straight through → the atom is mostly empty space. If the atom were uniformly filled (as in the plum-pudding model), most alphas would be deflected.\n- Step 2: Observation (B) — small-angle deflections → there is a concentration of positive charge at the centre. The alpha (also positive) is repelled by this charge but only slightly when it doesn't pass very close.\n- Step 3: Observation (C) — large-angle back-scattering → the positive charge and most of the mass are concentrated in an extremely small, dense nucleus. Only a tiny, massive, highly charged object could reverse a fast alpha's direction.\n\nTakeaway: Rutherford scattering killed the plum-pudding model and established the nuclear atom: tiny dense positive nucleus + empty space + orbiting electrons.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "Why couldn't the plum-pudding model explain large-angle back-scattering of alpha particles? (2 steps)", "answer": "- Step 1: In the plum-pudding model, positive charge is spread throughout the entire atom (the \"pudding\"), with electrons embedded like plums. The electric field from this diffuse charge would be weak at any point, so it could only produce tiny deflections.\n- Step 2: To bounce an alpha back at >90° requires a very strong, localised repulsive force. That demands all the positive charge be concentrated in a volume much smaller than the alpha's path — i.e., a tiny, dense nucleus. The diffuse plum-pudding simply cannot provide enough force at any single point.\n\nTakeaway: Back-scattering requires concentrated charge and mass → impossible in a diffuse model.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": true}, {"question": "A student takes a Geiger counter into a room with no radioactive sources and still gets a non-zero reading. Where does this count come from, and what must be done before analysing a radioactive source's count rate? (2 steps)", "answer": "- Step 1: The reading is background radiation — always present from natural and artificial sources: cosmic rays, radon gas from rocks (especially granite), potassium-40 in food, carbon-14 in the atmosphere, medical X-rays, past nuclear fallout, etc.\n- Step 2: Before any half-life or absorption analysis, you must subtract the background count rate from the measured count rate. Without this subtraction, your calculated half-life will be too long (the background adds a constant offset that makes the decay appear slower than it really is).\n\nTakeaway: Background radiation is always there — subtract it first or your results are wrong.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": true}, {"question": "Rank alpha, beta, and gamma radiation from most to least penetrating, and from most to least ionising. Why are these two rankings opposite? (3 steps)", "answer": "- Step 1: Penetrating power (most → least): gamma > beta > alpha. Ionising power (most → least): alpha > beta > gamma.\n- Step 2: Ionisation requires the radiation to interact with atomic electrons, ripping them off. Alpha has the largest charge ($$+2e$$) and largest mass — it collides frequently and transfers energy efficiently to electrons. This means it loses energy quickly → short range → low penetration.\n- Step 3: Gamma has zero charge and zero mass — it passes through matter with far fewer interactions per unit distance, depositing energy slowly. Less interaction per distance means less ionisation but much greater penetration. Beta sits between the two.\n\nTakeaway: High ionisation ↔ frequent interactions ↔ rapid energy loss ↔ low penetration. They are inversely related.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "Alpha radiation is stopped by paper, beta by a few mm of aluminium, and gamma requires several cm of lead. If you place lead in front of a source emitting all three types, what happens to each type, and what does this tell you about the shielding strategy? (2 steps)", "answer": "- Step 1: Lead stops all three — alpha is trivially stopped, beta is easily absorbed, and gamma is significantly attenuated (but not always fully stopped). Lead is the universal shield, but it's overkill for alpha and beta.\n- Step 2: The practical strategy is to use the minimum necessary shielding for identification purposes: paper to confirm alpha (if count drops → alpha present), aluminium to test for beta (if count drops further → beta present), lead for gamma (remaining count → gamma). This layered approach lets you identify which types of radiation a source emits.\n\nTakeaway: Shielding hierarchy (paper < Al < Pb) is also a diagnostic tool for identifying radiation types.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "A nucleus contains no electrons, yet beta-minus decay emits an electron. Where does this electron come from? What other particle must also be emitted, and why? (3 steps)", "answer": "- Step 1: A neutron inside the nucleus converts into a proton: $$^1_0 n \\rightarrow \\, ^1_1 p + \\, ^0_{-1} \\beta$$. The electron is created at the moment of decay — it was not \"sitting inside\" the nucleus beforehand.\n- Step 2: An antineutrino $$\\bar{\\nu}_e$$ must also be emitted: $$^1_0 n \\rightarrow \\, ^1_1 p + \\, ^0_{-1} \\beta + \\bar{\\nu}_e$$. Without it, lepton number is not conserved (the electron has lepton number +1; the antineutrino carries −1, so total lepton number is conserved at 0).\n- Step 3: Historically, the continuous energy spectrum of beta particles (they don't all have the same energy) was a puzzle — \"missing energy\" suggested an unseen particle. The neutrino was postulated by Pauli (1930) and detected later (1956).\n\nTakeaway: Beta decay is a neutron→proton transformation. The electron and antineutrino are *created*, not pre-existing. Lepton number conservation demands the antineutrino.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "In beta-plus decay, a proton converts to a neutron. Write this process symbolically and explain what is emitted. Why can't this happen to a free proton in empty space? (3 steps)", "answer": "- Step 1: The process: $$^1_1 p \\rightarrow \\, ^1_0 n + \\, ^0_{+1} \\beta + \\nu_e$$. A positron ($$β^+$$) and a neutrino ($$\\nu_e$$) are emitted.\n- Step 2: The proton loses its positive charge by emitting a positron (charge +1), becoming neutral (neutron). Lepton number is conserved: the neutrino carries lepton number +1 to balance the positron's −1.\n- Step 3: A free proton cannot undergo beta-plus decay because it would require energy (a neutron is slightly heavier than a proton). It only happens inside nuclei where the resulting nuclear configuration has a lower total energy, making the process energetically favourable overall.\n\nTakeaway: Beta-plus requires the nuclear environment to supply the energy difference; it's forbidden for an isolated proton.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": true}, {"question": "Complete and balance this alpha decay: $$^{238}_{92}U \\rightarrow \\, ^?_? Th + \\, ^4_2 \\alpha$$. State what happens to both $$A$$ and $$Z$$ and why. (3 steps)", "answer": "- Step 1: Conservation of nucleon number $$A$$: 238 = ? + 4, so the daughter has $$A = 234$$.\n- Step 2: Conservation of proton number $$Z$$: 92 = ? + 2, so the daughter has $$Z = 90$$.\n- Step 3: The equation is $$^{238}_{92}U \\rightarrow \\, ^{234}_{90}Th + \\, ^4_2 \\alpha$$. Alpha decay always reduces $$A$$ by 4 and $$Z$$ by 2 — the nucleus loses two protons and two neutrons bundled as a helium nucleus. The daughter is a different element (thorium, not uranium).\n\nTakeaway: Alpha decay: $$\\Delta A = -4$$, $$\\Delta Z = -2$$. The daughter is a new element two places to the left in the periodic table.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "In beta-minus decay, $$Z$$ increases by 1. In beta-plus decay, $$Z$$ decreases by 1. A student claims beta-minus \"loses a proton\" because it emits negative charge. Why is this backwards? (2 steps)", "answer": "- Step 1: Beta-minus decay is a neutron → proton conversion. The nucleus *gains* a proton (Z increases by 1) and emits an electron. The emitted negative charge comes from the neutron transforming, not from a proton being lost.\n- Step 2: The confusion comes from thinking \"emitting something negative = losing positive charge.\" In reality, the neutron (neutral) becomes a proton (positive) *plus* an electron (negative) *plus* an antineutrino. The net effect is one more proton in the nucleus.\n\nTakeaway: $$β^-$$: Z increases by 1 (neutron→proton). $$β^+$$: Z decreases by 1 (proton→neutron). Don't flip these.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": true}, {"question": "Write the full beta-minus decay equation for $$^{14}_6 C$$. A student omits the antineutrino. Why is the equation wrong without it? (3 steps)", "answer": "- Step 1: The equation: $$^{14}_6 C \\rightarrow \\, ^{14}_7 N + \\, ^0_{-1} \\beta + \\bar{\\nu}_e$$. Carbon-14 becomes nitrogen-14.\n- Step 2: Check conservation: $$A$$: 14 = 14 + 0 + 0 ✓. $$Z$$: 6 = 7 + (−1) + 0 ✓.\n- Step 3: Without the antineutrino $$\\bar{\\nu}_e$$, lepton number is not conserved. Before decay: lepton number = 0. After decay with just the electron: lepton number = +1. The antineutrino (lepton number −1) restores balance: 0 = +1 + (−1) = 0 ✓. Examiners deduct marks for omitting it.\n\nTakeaway: Every $$β$$ decay equation MUST include a (anti)neutrino. It's not optional — lepton number conservation demands it.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": true}, {"question": "A nucleus in an excited state (denoted $$^A_Z X^*$$) emits gamma radiation. How do $$A$$ and $$Z$$ change? What exactly is happening to the nucleus? (2 steps)", "answer": "- Step 1: Neither $$A$$ nor $$Z$$ changes: $$^A_Z X^* \\rightarrow \\, ^A_Z X + \\gamma$$. Gamma emission is purely an energy release — no nucleons are gained or lost.\n- Step 2: The nucleus was in a high-energy (excited) state, often after a previous alpha or beta decay. It \"relaxes\" to its ground state by emitting a high-energy photon (gamma ray). Think of it as the nuclear equivalent of an electron dropping to a lower energy level and emitting a photon.\n\nTakeaway: Gamma decay changes the energy state of the nucleus, not its composition. $$A$$ and $$Z$$ are unchanged.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": true}, {"question": "Thermionic emission produces electrons from a heated metal. Once emitted, an electron is accelerated through a potential difference $$V$$. Write the equation linking the electron's final kinetic energy to $$V$$, and explain why this is an energy conversion, not creation. (2 steps)", "answer": "- Step 1: The kinetic energy gained equals the work done by the electric field: $$\\frac{1}{2}m_e v^2 = eV$$. Solving: $$v = \\sqrt{\\frac{2eV}{m_e}}$$.\n- Step 2: Energy is converted, not created: electrical potential energy ($$eV$$) from the accelerating voltage becomes kinetic energy ($$\\frac{1}{2}m_e v^2$$) of the electron. The electron starts near rest and gains speed as it falls through the potential difference, just like a mass gaining speed falling in a gravitational field.\n\nTakeaway: $$\\frac{1}{2}mv^2 = QV$$ is the work-energy theorem for charged particles in electric fields.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "In a linear accelerator (linac), the drift tubes get progressively longer even though the AC frequency stays fixed. Why must the tubes lengthen? (2 steps)", "answer": "- Step 1: The ion accelerates in each gap between tubes, so its speed increases. While inside a drift tube, the ion travels at constant speed (shielded from the field).\n- Step 2: The AC frequency is fixed, so the time between voltage reversals is fixed. To stay in phase (always arriving at a gap when the voltage accelerates it), the ion must spend the same time in each tube. Since it's going faster, it needs a longer tube to traverse in the same time: $$\\text{length} = v \\times t_{\\text{half-cycle}}$$.\n\nTakeaway: Longer tubes accommodate faster ions at constant AC frequency — synchronisation demands it.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": true}, {"question": "In a cyclotron, the period of an ion's semicircular orbit is $$T = \\frac{2\\pi m}{BQ}$$. Notice that $$v$$ does not appear. Why is this the key to how a cyclotron works? (3 steps)", "answer": "- Step 1: The radius of the orbit is $$r = \\frac{mv}{BQ}$$. As the ion accelerates (gains $$v$$), the radius grows — the spiral widens.\n- Step 2: But the period $$T = \\frac{2\\pi r}{v} = \\frac{2\\pi m}{BQ}$$ is independent of $$v$$. Faster ions travel in bigger circles but take the same time to complete each semicircle.\n- Step 3: This means a single fixed-frequency AC voltage across the dees can always be in phase with the ion, regardless of how fast it's going. Every time the ion crosses the gap, the field has reversed to accelerate it again. Without this speed-independence, the cyclotron couldn't work with a single frequency.\n\nTakeaway: The cyclotron works because orbital period is speed-independent — a beautiful consequence of $$r \\propto v$$.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": true}, {"question": "A proton (momentum $$p$$, charge $$+e$$) and an alpha particle (momentum $$2p$$, charge $$+2e$$) enter the same magnetic field $$B$$. Compare their orbital radii using $$r = p/(BQ)$$. (2 steps)", "answer": "- Step 1: For the proton: $$r_p = \\frac{p}{Be}$$. For the alpha: $$r_\\alpha = \\frac{2p}{B \\cdot 2e} = \\frac{p}{Be}$$.\n- Step 2: They have the same radius! The alpha has twice the momentum but also twice the charge — the factors cancel. This shows that radius depends on the *ratio* $$p/Q$$, not on either quantity alone.\n\nTakeaway: $$r = p/(BQ)$$. Same $$p/Q$$ ratio → same radius, regardless of particle type.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": true}, {"question": "An electron and a positron meet and annihilate. How many photons are produced, and what is the minimum total energy released? Why can't a single photon carry all the energy? (3 steps)", "answer": "- Step 1: Two photons are produced. The minimum total energy is $$2m_e c^2$$ (the rest-mass energy of both particles combined).\n- Step 2: A single photon cannot conserve both energy and momentum simultaneously. Before annihilation, the total momentum in the centre-of-mass frame is zero (equal and opposite momenta). A single photon always carries momentum $$p = E/c$$, so it can't have zero momentum.\n- Step 3: Two back-to-back photons solve this: their momenta are equal and opposite (net zero), conserving momentum, and their combined energy equals $$2m_e c^2$$, conserving energy.\n\nTakeaway: Annihilation → 2 photons (back-to-back), total energy = $$2mc^2$$. One photon is forbidden by momentum conservation.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": true}, {"question": "What is the minimum photon energy for pair production of an electron-positron pair? A student says it's $$m_e c^2$$. Why is this wrong? (3 steps)", "answer": "- Step 1: The threshold energy is $$E_{\\min} = 2m_e c^2 \\approx 1.022 \\text{ MeV}$$. You must create *both* the particle and its antiparticle.\n- Step 2: The student's answer of $$m_e c^2$$ only accounts for one particle's rest energy. But pair production creates a particle–antiparticle pair, each with rest mass $$m_e$$. The factor of 2 is essential.\n- Step 3: Any excess energy above $$2m_e c^2$$ goes into kinetic energy of the pair. At exactly the threshold, the electron and positron are created at rest (zero kinetic energy) in the centre-of-mass frame.\n\nTakeaway: Pair production threshold = $$2mc^2$$, not $$mc^2$$. The factor of 2 is a classic exam trap.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "A proton is composed of quarks uud and a neutron is udd. Verify the charge of each. If you could replace one quark in a neutron with an up quark, what particle would you create? (3 steps)", "answer": "- Step 1: Proton (uud): $$+\\frac{2}{3} + \\frac{2}{3} - \\frac{1}{3} = +1e$$ ✓. Neutron (udd): $$+\\frac{2}{3} - \\frac{1}{3} - \\frac{1}{3} = 0$$ ✓.\n- Step 2: Replace one down quark in the neutron (udd) with an up quark → uud. That gives the quark composition of a proton.\n- Step 3: This is essentially what happens in beta-minus decay: a down quark in the neutron converts to an up quark (via the weak force), turning the neutron into a proton, with the electron and antineutrino carrying away the charge and lepton number.\n\nTakeaway: Quark flavour change (d→u) is the microscopic mechanism behind beta-minus decay.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": true}, {"question": "What is the difference between a baryon and a meson? Classify a proton, a neutron, and a pion. (2 steps)", "answer": "- Step 1: Both are hadrons (made of quarks, subject to the strong force). A baryon consists of 3 quarks (or 3 antiquarks). A meson consists of a quark–antiquark pair.\n- Step 2: Proton (uud) and neutron (udd) each have 3 quarks → baryons. A pion (e.g. $$\\pi^+ = u\\bar{d}$$) has a quark and antiquark → meson.\n+ Baryons are fermions (half-integer spin); mesons are bosons (integer spin).\n+ Baryon number: baryons have $$B = 1$$, mesons have $$B = 0$$.\n\nTakeaway: 3 quarks = baryon; quark + antiquark = meson. Both are hadrons.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "Name the four fundamental forces and their gauge bosons. Which force is responsible for beta decay, and why can't the strong force do this job? (3 steps)", "answer": "- Step 1: Strong force → gluons. Electromagnetic force → photons. Weak force → $$W^+$$, $$W^-$$, $$Z^0$$. Gravity → graviton (hypothetical, not in Standard Model proper).\n- Step 2: Beta decay is mediated by the weak force ($$W^\\pm$$ bosons). The weak force can change quark flavour (e.g. d → u), which is necessary for neutron → proton conversion.\n- Step 3: The strong force (gluons) cannot change quark flavour — it only binds quarks together and changes colour charge. Electromagnetic force conserves quark flavour. Only the weak force can convert one quark type into another, which is what beta decay requires.\n\nTakeaway: Beta decay = weak force. The strong force binds; the weak force transforms flavours.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "The decay constant $$\\lambda$$ has units of $$s^{-1}$$. Explain what it means physically, and how it differs from activity. (2 steps)", "answer": "- Step 1: The decay constant $$\\lambda$$ is the probability per unit time that any single given nucleus will decay. It is an intrinsic property of the isotope. A large $$\\lambda$$ means each nucleus is likely to decay soon; a small $$\\lambda$$ means it's likely to survive longer.\n- Step 2: Activity $$A = \\lambda N$$ is the total number of decays per second from the *entire sample* of $$N$$ nuclei. While $$\\lambda$$ is fixed for an isotope, $$A$$ depends on how much material you have and decreases over time as $$N$$ decreases.\n\nTakeaway: $$\\lambda$$ = probability per nucleus per second (intrinsic). $$A$$ = total decays per second from the sample (extrinsic, depends on $$N$$).", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "Starting from the statement \"each decay removes one nucleus, so the rate of change of $$N$$ is $$-\\lambda N$$,\" derive the exponential decay law $$N = N_0 e^{-\\lambda t}$$. (4 steps)", "answer": "- Step 1: The rate of decay is proportional to the number of undecayed nuclei: $$\\frac{dN}{dt} = -\\lambda N$$. The negative sign means $$N$$ is decreasing.\n- Step 2: Separate variables: $$\\frac{dN}{N} = -\\lambda \\, dt$$.\n- Step 3: Integrate both sides: $$\\int_{N_0}^{N} \\frac{dN}{N} = -\\lambda \\int_0^t dt$$, giving $$\\ln N - \\ln N_0 = -\\lambda t$$, i.e., $$\\ln\\!\\left(\\frac{N}{N_0}\\right) = -\\lambda t$$.\n- Step 4: Exponentiate: $$\\frac{N}{N_0} = e^{-\\lambda t}$$, so $$N = N_0 e^{-\\lambda t}$$. Since activity is proportional to $$N$$, the same form holds: $$A = A_0 e^{-\\lambda t}$$.\n\nTakeaway: Exponential decay emerges from a simple differential equation: rate of loss ∝ current amount. This is the hallmark of all first-order processes.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": true}, {"question": "Derive the relationship $$t_{1/2} = \\frac{\\ln 2}{\\lambda}$$ from the exponential decay law. Why is half-life independent of the sample size? (3 steps)", "answer": "- Step 1: Set $$N = N_0/2$$ in the decay law: $$\\frac{N_0}{2} = N_0 e^{-\\lambda t_{1/2}}$$, so $$\\frac{1}{2} = e^{-\\lambda t_{1/2}}$$.\n- Step 2: Take natural logs: $$\\ln\\!\\left(\\frac{1}{2}\\right) = -\\lambda t_{1/2}$$, i.e., $$-\\ln 2 = -\\lambda t_{1/2}$$, giving $$t_{1/2} = \\frac{\\ln 2}{\\lambda} \\approx \\frac{0.693}{\\lambda}$$.\n- Step 3: Half-life depends only on $$\\lambda$$, which is an intrinsic property of the isotope. It does not depend on $$N_0$$, temperature, pressure, or chemical state. Whether you have 1 gram or 1 tonne, the half-life is the same — it's the *time* for the *fraction* remaining to reach ½, not for a fixed number to decay.\n\nTakeaway: $$t_{1/2} = \\ln 2 / \\lambda$$. It's a property of the isotope, not the sample.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "A source has $$A_0 = 800$$ Bq and $$t_{1/2} = 20$$ min. Find the activity after 1 hour using the \"magic table\" method. (3 steps)", "answer": "- Step 1: Build the table. Start at 0 half-lives, 0 min, 800 Bq.\n+ 0 half-lives → 0 min → 800 Bq\n+ 1 half-life → 20 min → 400 Bq\n+ 2 half-lives → 40 min → 200 Bq\n+ 3 half-lives → 60 min → 100 Bq\n- Step 2: 1 hour = 60 min = 3 half-lives. After 3 half-lives, activity = $$800 \\times (1/2)^3 = 800 \\times 1/8 = 100$$ Bq.\n- Step 3: The magic table works because each row halves the previous value. It's equivalent to the formula $$A = A_0 (1/2)^n$$ where $$n$$ is the number of complete half-lives.\n\nTakeaway: The magic table: start at zero, halve each row. Simple, visual, and hard to get wrong.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "Polonium has $$t_{1/2} = 164$$ s. A sample drops from 8.00 g to 0.25 g. How many half-lives have passed, and what is the total time? (3 steps)", "answer": "- Step 1: Find the number of half-lives from th
