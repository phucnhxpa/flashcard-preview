e mass ratio: $$\\frac{0.25}{8} = \\frac{1}{32} = \\left(\\frac{1}{2}\\right)^n$$, so $$2^n = 32$$, giving $$n = 5$$.\n- Step 2: Total time = 5 half-lives = $$5 \\times 164 = 820$$ s.\n- Step 3: Quick check with the magic table: 8 → 4 → 2 → 1 → 0.5 → 0.25. That's 5 arrows = 5 half-lives. Confirms the answer.\n\nTakeaway: For non-integer-looking ratios, express as a power of ½ to find $$n$$. The magic table is the sanity check.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "A student claims that if a sample's half-life is 10 years, then after 25 years exactly half the atoms have decayed. Why is this wrong? (2 steps)", "answer": "- Step 1: After 10 years (one half-life), half have decayed. After 20 years (two half-lives), three-quarters have decayed (only $$1/4$$ remain). After 25 years (2.5 half-lives), the fraction remaining is $$(1/2)^{2.5} \\approx 0.177$$, so about 82.3% have decayed — not 50%.\n- Step 2: The student is confusing \"one half-life\" with \"25 years.\" Half-life is the time for the *fraction* remaining to halve, not for half the *original* atoms to decay at any arbitrary time. Each subsequent half-life halves what remains, not the original amount.\n\nTakeaway: After $$n$$ half-lives, fraction remaining = $$(1/2)^n$$, fraction decayed = $$1 - (1/2)^n$$. These are not the same for $$n > 1$$.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": true}, {"question": "Why can't we predict when a single radioactive nucleus will decay? How does the large-sample behaviour emerge from individual randomness? (2 steps)", "answer": "- Step 1: A single nucleus decays randomly and spontaneously. The decay constant $$\\lambda$$ gives only a probability per second — like rolling a die each second and \"decaying\" if you roll a six. You can't predict which roll will be the six.\n- Step 2: With billions of nuclei, the statistical law of large numbers takes over. A fixed fraction (determined by $$\\lambda$$) decays per unit time, producing the smooth exponential decay curve. Individual randomness → collective predictability.\n\nTakeaway: Random at the microscopic level, predictable at the macroscopic level — the essence of statistical physics.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": true}, {"question": "A helium-4 nucleus has less mass than 2 free protons + 2 free neutrons. Where did the \"missing mass\" go? Is mass destroyed? (3 steps)", "answer": "- Step 1: The mass defect is $$\\Delta m = Z m_p + (A-Z) m_n - m_{\\text{nucleus}}$$. This missing mass is not destroyed — it is converted into energy via $$\\Delta E = \\Delta m \\, c^2$$.\n- Step 2: When nucleons bind together, they release energy (the binding energy). By mass-energy equivalence, releasing energy means losing mass. The bound system is at a lower energy state than the separated nucleons.\n- Step 3: Mass is not \"destroyed\" — it is converted to energy that is carried away (e.g., as gamma photons or kinetic energy of products) when the nucleus forms. The total mass-energy of the closed system is conserved.\n\nTakeaway: Mass defect ≠ mass destruction. The missing mass becomes the binding energy released when the nucleus assembles.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": true}, {"question": "A student says \"binding energy is the energy stored inside the nucleus.\" Why is this the opposite of the truth? (2 steps)", "answer": "- Step 1: Binding energy is the energy you must *supply* to *break apart* the nucleus into its constituent protons and neutrons. It measures how tightly the nucleus is bound.\n- Step 2: A bound nucleus is at a *lower* energy state than its separated nucleons (by an amount equal to the binding energy). If binding energy were \"stored inside,\" the nucleus would be at a *higher* energy state — which would mean it's unstable and would fly apart. The whole point is that the bound state is more favourable (lower energy).\n\nTakeaway: Binding energy = energy needed to pull apart (not stored inside). The bound state is lower in energy — that's why it's bound.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": true}, {"question": "The atomic mass unit is defined as $$1 \\text{ u} = \\frac{1}{12} m(^{12}_6 C)$$. Why is carbon-12 chosen as the reference, and what is the conversion to MeV/$$c^2$$? (2 steps)", "answer": "- Step 1: Carbon-12 is chosen because it is abundant, stable, and easy to measure precisely. Defining 1 u as 1/12 of its mass gives convenient numbers: protons and neutrons each have masses very close to 1 u.\n- Step 2: $$1 \\text{ u} \\approx 1.661 \\times 10^{-27} \\text{ kg} \\approx 931.5 \\text{ MeV}/c^2$$. The MeV/$$c^2$$ conversion comes from $$E = mc^2$$: multiplying the mass in u by 931.5 gives the equivalent energy in MeV directly — the $$c^2$$ is \"built in.\"\n\nTakeaway: When mass is in u, multiply by 931.5 to get energy in MeV. No need to separately multiply by $$c^2$$.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "A nucleus has mass defect $$\\Delta m = 0.034$$ u. Find the binding energy in MeV. (2 steps)", "answer": "- Step 1: Since 1 u corresponds to 931.5 MeV/$$c^2$$, the binding energy is $$\\Delta E = \\Delta m \\times 931.5 = 0.034 \\times 931.5$$.\n- Step 2: $$\\Delta E \\approx 31.7$$ MeV. Note: we did NOT multiply by $$c^2$$ separately — the 931.5 factor already includes $$c^2$$. A common trap is to use $$\\Delta m$$ in u AND multiply by $$c^2$$, double-counting.\n\nTakeaway: In u → multiply by 931.5 for MeV. In kg → multiply by $$c^2$$ for joules, then convert. Never do both.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": false}, {"question": "Sketch the binding-energy-per-nucleon curve. Where does it peak, and why does it rise steeply at low $$A$$ but decline slowly at high $$A$$? (3 steps)", "answer": "- Step 1: The curve rises from near 0 (hydrogen) steeply to a peak near $$A = 56$$ (iron-56, $$\\approx 8.8$$ MeV/nucleon), then slowly declines for heavier nuclei.\n- Step 2: At low $$A$$, the steep rise is because each nucleon gains more nearest-neighbour strong-force bonds as the nucleus grows. Small nuclei have many \"surface\" nucleons with fewer bonds; adding more nucleons means more are fully surrounded → more binding per nucleon. (He-4 is anomalously high due to its doubly-magic structure.)\n- Step 3: Beyond iron, the slow decline is because adding more protons increases electrostatic repulsion (which grows as $$Z^2$$), while the short-range strong force only benefits nearest neighbours. The repulsion gradually weakens the binding per nucleon for large nuclei.\n\nTakeaway: Rising (strong force dominates) → peak at Fe-56 → declining (electrostatic repulsion wins). This curve explains fission AND fusion.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": true}, {"question": "Using the binding-energy-per-nucleon curve, explain why BOTH fission of heavy nuclei AND fusion of light nuclei release energy, even though they seem like opposite processes. (3 steps)", "answer": "- Step 1: The universal rule: a nuclear reaction releases energy if and only if the products have a *higher* binding energy per nucleon than the reactants. \"Moving up the curve\" releases energy.\n- Step 2: Fission: heavy nuclei (right side of curve, low $$B/A$$) split into medium-mass daughters (higher $$B/A$$, closer to the peak). Moving up → energy released.\n- Step 3: Fusion: very light nuclei (far left, very low $$B/A$$) combine into a slightly heavier nucleus (higher $$B/A$$, climbing the steep left slope). Moving up → energy released. Both processes climb toward iron-56 from opposite sides of the curve.\n\nTakeaway: Fission and fusion both release energy because they both move nuclei toward the peak of the $$B/A$$ curve. The peak is the \"valley\" of nuclear stability.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": true}, {"question": "Estimate the energy released when one $$^{235}U$$ nucleus undergoes fission, given that $$B/A \\approx 7.6$$ MeV for U-235 and $$B/A \\approx 8.5$$ MeV for the fission products. (2 steps)", "answer": "- Step 1: Energy released = (total binding energy of products) − (total binding energy of reactant) = $$235 \\times 8.5 - 235 \\times 7.6 = 235 \\times (8.5 - 7.6) = 235 \\times 0.9$$.\n- Step 2: $$\\approx 211.5$$ MeV, consistent with the textbook value of ~200 MeV per fission. The energy comes from the increase in $$B/A$$ multiplied by the total number of nucleons (which is conserved).\n\nTakeaway: Energy per fission ≈ $$A \\times \\Delta(B/A)$$. A small change in $$B/A$$ across 235 nucleons gives ~200 MeV.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": false}, {"question": "In the fission of $$^{235}U$$, each event produces 2–3 neutrons. Explain how this enables a chain reaction, and distinguish between a controlled reactor and an uncontrolled explosion. (3 steps)", "answer": "- Step 1: The emitted neutrons can be absorbed by other $$^{235}U$$ nuclei, inducing further fission events. Each new fission produces more neutrons → exponential growth of events → chain reaction.\n- Step 2: In a nuclear weapon, the design maximises the multiplication factor (each fission causes more than one subsequent fission on average), leading to a runaway supercritical reaction and an enormous energy release in microseconds.\n- Step 3: In a nuclear reactor, control rods (made of neutron-absorbing materials like boron or cadmium) are inserted to absorb excess neutrons, keeping the multiplication factor at exactly 1 (critical). Each fission causes exactly one more fission — steady, controlled power output. A moderator slows fast neutrons to thermal energies where they are more likely to be absorbed by $$^{235}U$$.\n\nTakeaway: Chain reaction: neutrons from one fission trigger the next. Control rods absorb; moderators slow. Weapon = supercritical; reactor = critical.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": true}, {"question": "Why does nuclear fusion require temperatures above $$10^7$$ K, while fission can occur at room temperature? (3 steps)", "answer": "- Step 1: Fusion requires two positively charged nuclei to get close enough for the short-range strong nuclear force to bind them. But their positive charges create an electrostatic (Coulomb) barrier that repels them.\n- Step 2: At $$T > 10^7$$ K, nuclei have enormous kinetic energy (thermal energy $$\\sim kT$$), enough to overcome the Coulomb barrier and approach within ~1 fm (the range of the strong force). This only happens naturally in stellar cores.\n- Step 3: Fission requires a slow neutron (no charge, no Coulomb barrier) to be absorbed by a heavy nucleus. The neutron is neutral, so it can approach the nucleus without repulsion. The absorption makes the nucleus unstable and it splits. No extreme temperatures needed.\n\nTakeaway: Fusion needs extreme heat to overcome Coulomb repulsion. Fission uses neutral neutrons that slip in without resistance.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": true}, {"question": "Write the deuterium–tritium fusion reaction. How much energy is released, and why is this reaction the focus of research reactors like ITER? (3 steps)", "answer": "- Step 1: $$^2_1 H + \\, ^3_1 H \\rightarrow \\, ^4_2 He + \\, ^1_0 n + 17.6 \\text{ MeV}$$.\n- Step 2: The energy comes from the mass defect: the products (He-4 + neutron) have less total mass than the reactants (deuterium + tritium), and the difference × $$c^2$$ = 17.6 MeV.\n- Step 3: This reaction is favoured for research because it has the lowest Coulomb barrier among fusion options (only 1 proton in each reactant) and the highest cross-section (probability of fusion) at achievable temperatures. It's the \"easiest\" fusion reaction to achieve, though still extremely challenging.\n\nTakeaway: D-T fusion: lowest barrier, highest yield among accessible reactions. 17.6 MeV per event.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": false}, {"question": "In the proton-proton chain inside stars, four protons fuse into one helium-4 nucleus. Write the net equation. Why must two positrons be emitted? (3 steps)", "answer": "- Step 1: $$4 \\, ^1_1 H \\rightarrow \\, ^4_2 He + 2 \\, ^0_{+1} \\beta + 2 \\nu_e + \\text{energy}$$.\n- Step 2: Conservation of charge: 4 protons have total $$Z = 4$$. Helium-4 has $$Z = 2$$. The \"missing\" charge of +2 is carried away by two positrons (each +1).\n- Step 3: Conservation of lepton number also demands the positrons be accompanied by two neutrinos. The positrons will quickly annihilate with electrons, releasing additional energy as gamma photons.\n\nTakeaway: 4H → He + 2 positrons + 2 neutrinos + energy. The positrons carry away the excess positive charge.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": true}, {"question": "A student says \"half-life depends on temperature — hotter samples decay faster.\" Why is this fundamentally wrong? (2 steps)", "answer": "- Step 1: Half-life is determined by the nuclear strong and weak forces, which operate at femtometre ($$10^{-15}$$ m) scales. Thermal energies at everyday temperatures (~0.025 eV at room temperature) are utterly negligible compared to nuclear energy scales (~MeV).\n- Step 2: Chemical bonds, temperature, pressure, and electromagnetic fields cannot affect the probability of nuclear decay because they act on atomic/molecular scales, not nuclear scales. The nucleus is shielded by the electron cloud and governed by forces many orders of magnitude stronger than chemical processes.\n\nTakeaway: Nuclear decay is immune to external conditions. Half-life is intrinsic to the isotope — temperature, pressure, chemistry cannot change it.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": true}, {"question": "When using $$A = \\lambda N$$, a student substitutes the mass of the sample in grams for $$N$$. Why does this give nonsense? How should you convert mass to $$N$$? (2 steps)", "answer": "- Step 1: $$A = \\lambda N$$ requires $$N$$ = the number of undecayed nuclei (a pure number, typically $$10^{15}$$–$$10^{23}$$). Mass in grams is not a count of nuclei — it's off by a factor of roughly $$N_A / M_r$$ (where $$N_A = 6.02 \\times 10^{23}$$).\n- Step 2: Convert mass to number of nuclei: $$N = \\frac{\\text{mass}}{M_r} \\times N_A$$, where $$M_r$$ is the molar mass in g/mol and $$N_A$$ is Avogadro's number. For example, 1 g of carbon-12 contains $$6.02 \\times 10^{23} / 12 \\approx 5.02 \\times 10^{22}$$ nuclei.\n\nTakeaway: $$N$$ = number of nuclei, not mass. Convert via $$N = (m / M_r) \\times N_A$$.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": true}, {"question": "A measurement of count rate from a radioactive source gives 120 counts/min. The background count is 20 counts/min. A student uses 120 Bq as the source activity for half-life calculations. What is the correct activity to use, and what happens if you don't subtract? (2 steps)", "answer": "- Step 1: Correct activity = measured − background = 120 − 20 = 100 counts/min. Only the excess above background comes from the source.\n- Step 2: Without subtraction, the calculated half-life is too long. As the source decays, its count rate approaches zero, but the background (20) persists. Without subtracting, the curve never reaches zero, so it appears to decay more slowly than it really does. The \"apparent\" half-life is stretched.\n\nTakeaway: Always subtract background before analysis. Forgetting this is a classic mark-loser and gives a wrong (too long) half-life.", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": false}, {"question": "An electron is accelerated from rest through 5.0 kV. Estimate its final speed qualitatively: is it closer to (a) $$10^5$$ m/s, (b) $$10^7$$ m/s, or (c) $$10^9$$ m/s? Why can't classical mechanics give a perfect answer here? (3 steps)", "answer": "- Step 1: Using $$\\frac{1}{2}m_e v^2 = eV$$: $$v = \\sqrt{2eV/m_e}$$. With $$V = 5000$$ V, the classical result is $$v \\approx 4.2 \\times 10^7$$ m/s — answer (b).\n- Step 2: Compare to the speed of light: $$c = 3.0 \\times 10^8$$ m/s. The electron is at about 14% of $$c$$. This is the edge where relativistic effects start to matter.\n- Step 3: The true speed is slightly less than the classical prediction because the electron's relativistic mass increases at high speeds. At 14% of $$c$$, the correction is small but noticeable. Above ~10% of $$c$$, classical mechanics becomes dishonest.\n\nTakeaway: 5 kV → ~14% of $$c$$. Classical answer is approximately right but not exact. Relativistic corrections become important above ~10% of $$c$$.", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": false}, {"question": "A gamma photon undergoes pair production into an electron-positron pair. What is the minimum photon frequency required? (Use $$h = 6.63 \\times 10^{-34}$$ J s.) Give the order of magnitude. (3 steps)", "answer": "- Step 1: Minimum energy: $$E_{\\min} = 2m_e c^2 = 1.64 \\times 10^{-13}$$ J.\n- Step 2: Use $$E = hf$$: $$f_{\\min} = E_{\\min}/h = 1.64 \\times 10^{-13} / 6.63 \\times 10^{-34}$$.\n- Step 3: $$f_{\\min} \\approx 2.5 \\times 10^{20}$$ Hz. This is an extraordinarily high frequency — well into the gamma-ray region of the EM spectrum. Visible light ($$\\sim 10^{15}$$ Hz) is far too low in energy for pair production.\n\nTakeaway: Pair production needs gamma-ray photons ($$f \\sim 10^{20}$$ Hz). Lower-energy photons simply can't supply enough energy.", "source": "GLM 5.1 ③", "_id": "glm_3_45", "judge_pick": false}, {"question": "A student claims that after 2 half-lives, the number of nuclei remaining is $$N_0/4$$. After 3 half-lives, is it $$N_0/6$$ or $$N_0/8$$? Explain the pattern. (2 steps)", "answer": "- Step 1: After 3 half-lives, it's $$N_0/8$$. Each half-life halves what remains: $$N_0 \\rightarrow N_0/2 \\rightarrow N_0/4 \\rightarrow N_0/8$$. The pattern is $$(1/2)^n$$, not division by $$2n$$.\n- Step 2: The student's implicit mistake (dividing by 6 instead of 8) treats each half-life as subtracting a fixed fraction of the *original* amount. In reality, each half-life removes half of *what's currently left*, not half of the original. This is exponential, not linear.\n\nTakeaway: After $$n$$ half-lives: $$N = N_0 (1/2)^n = N_0 / 2^n$$. It's exponential decay, not linear subtraction.", "source": "GLM 5.1 ③", "_id": "glm_3_46", "judge_pick": true}, {"question": "The decay chain of U-238 eventually ends at stable Pb-206. What does \"stable\" mean in this context, and why does the chain stop? (2 steps)", "answer": "- Step 1: \"Stable\" means the nucleus has a configuration where no decay is energetically favourable. It will not spontaneously emit alpha, beta, or gamma radiation under any conditions.\n- Step 2: Pb-206 sits near the peak of the binding-energy-per-nucleon curve (high $$B/A$$). There is no lower-energy configuration it can reach by emitting radiation, so it has no reason to decay further. The chain stops because Pb-206 has reached the valley of maximum nuclear stability.\n\nTakeaway: Stable = no energetically allowed decay path. Pb-206 is at the bottom of the energy landscape — it has nowhere lower to go.", "source": "GLM 5.1 ③", "_id": "glm_3_47", "judge_pick": false}, {"question": "You cannot choose which type of radiation an isotope emits — it's fixed by the isotope. But you CAN choose which isotope to use. Give a practical example of why this matters in medicine. (2 steps)", "answer": "- Step 1: Medical tracers need a short half-life (so they don't irradiate the patient for long) and a specific radiation type. Gamma emitters are preferred for imaging because gamma escapes the body and can be detected externally. Alpha emitters would deposit all their energy internally (high damage).\n- Step 2: Technetium-99m (gamma emitter, $$t_{1/2} \\approx 6$$ hours) is ideal: it emits gamma (detectable outside), has a short half-life (clears quickly), and its chemistry allows it to target specific organs. You chose the isotope to get the right radiation type and half-life.\n\nTakeaway: Choose the isotope → get the radiation type and half-life. Medical imaging needs gamma + short half-life.", "source": "GLM 5.1 ③", "_id": "glm_3_48", "judge_pick": true}, {"question": "A student reasons: \"Alpha is dangerous outside the body because it's so ionising.\" Why is this backwards? (2 steps)", "answer": "- Step 1: Alpha is the *least* penetrating — it's stopped by skin or a few cm of air. Outside the body, alpha cannot reach living tissue; it's essentially harmless from external sources.\n- Step 2: Alpha is dangerous when *ingested or inhaled* — then it's inside the body with no skin barrier. Its high ionising power then damages DNA and cells directly. So: alpha is harmless outside the body but extremely dangerous inside. Gamma is the opposite: dangerous outside (it penetrates) but less damaging per interaction inside.\n\nTakeaway: Penetration and ionisation are inversely related. The danger depends on whether the radiation is inside or outside the body.", "source": "GLM 5.1 ③", "_id": "glm_3_49", "judge_pick": true}, {"question": "In the binding energy calculation for iron-56, the mass defect is $$\\Delta m = 8.68 \\times 10^{-28}$$ kg. Calculate the binding energy per nucleon and explain why this value is significant. (3 steps)", "answer": "- Step 1: Binding energy: $$\\Delta E = \\Delta m \\, c^2 = (8.68 \\times 10^{-28})(3.00 \\times 10^8)^2 = 7.81 \\times 10^{-11}$$ J.\n- Step 2: Per nucleon: $$7.81 \\times 10^{-11} / 56 = 1.40 \\times 10^{-12}$$ J/nucleon. Convert to MeV: divide by $$1.60 \\times 10^{-13}$$ → $$\\approx 8.7$$ MeV/nucleon.\n- Step 3: This is essentially the peak value on the $$B/A$$ curve. Iron-56 has the highest binding energy per nucleon of any nucleus — it's the most tightly bound (most stable) nucleus. All energy-releasing nuclear reactions move toward this peak from either side.\n\nTakeaway: Fe-56: ~8.8 MeV/nucleon, the peak of the curve. It's the most stable nucleus — the \"end point\" of both fission and fusion.", "source": "GLM 5.1 ③", "_id": "glm_3_50", "judge_pick": false}, {"question": "When converting units, a student multiplies mass in kg by $$c^2$$ to get energy in joules, then also multiplies by 931.5 to convert to MeV. Why is this double-counting? (2 steps)", "answer": "- Step 1: If mass is in kg, multiply by $$c^2$$ to get energy in joules. Then convert joules to MeV by dividing by $$1.60 \\times 10^{-13}$$. This is the correct SI path.\n- Step 2: The 931.5 factor is used when mass is in *u* — it already incorporates the $$c^2$$ multiplication and the unit conversion in one step ($$1 \\text{ u} \\times c^2 = 931.5$$ MeV). Using both $$c^2$$ AND 931.5 means you've multiplied by $$c^2$$ twice — the answer will be wrong by a factor of $$c^2$$.\n\nTakeaway: Choose ONE path: (kg × $$c^2$$ → J → eV) OR (u × 931.5 → MeV). Never mix both.", "source": "GLM 5.1 ③", "_id": "glm_3_51", "judge_pick": false}, {"question": "A moderator in a fission reactor slows down fast neutrons. Why do slow (\"thermal\") neutrons work better for sustaining the chain reaction in $$^{235}U$$? (2 steps)", "answer": "- Step 1: Fast neutrons pass through $$^{235}U$$ nuclei too quickly to be captured — the interaction time is too short. Slow neutrons spend more time near the nucleus, giving the strong force more time to act, greatly increasing the probability of absorption.\n- Step 2: The moderator (typically water or graphite) allows fast neutrons to collide with its light nuclei, transferring kinetic energy and slowing down through repeated elastic collisions. Once \"thermalised\" (at thermal equilibrium with the moderator), neutrons have a much higher fission cross-section with $$^{235}U$$.\n\nTakeaway: Slow neutrons are more likely to be absorbed → moderator is essential for sustaining the chain reaction in a reactor.", "source": "GLM 5.1 ③", "_id": "glm_3_52", "judge_pick": true}, {"question": "For an exam question asking you to \"explain,\" what does the examiner expect compared to a question asking you to \"state\"? Give a nuclear physics example of each. (2 steps)", "answer": "- Step 1: \"State\" = a one-line factual answer with no justification. Example: \"State what is meant by half-life.\" Answer: \"The time taken for the number of radioactive nuclei to fall to half its initial value.\"\n- Step 2: \"Explain\" = a short chain of cause-and-effect statements with reasoning. Example: \"Explain why fusion requires high temperatures.\" Answer: \"Nuclei are positively charged and repel each other via the Coulomb force. At high temperatures, nuclei have sufficient kinetic energy to overcome this electrostatic repulsion and approach close enough for the short-range strong nuclear force to bind them.\"\n\nTakeaway: State = fact. Explain = cause → effect chain with reasoning.", "source": "GLM 5.1 ③", "_id": "glm_3_53", "judge_pick": true}, {"question": "A sample has 3.2 × 10¹⁸ nuclei of an isotope with $$\\lambda = 2.0 \\times 10^{-3}$$ s⁻¹. What is the activity, and what is the half-life? (2 steps)", "answer": "- Step 1: Activity: $$A = \\lambda N = (2.0 \\times 10^{-3})(3.2 \\times 10^{18}) = 6.4 \\times 10^{15}$$ Bq.\n- Step 2: Half-life: $$t_{1/2} = \\ln 2 / \\lambda = 0.693 / 0.002 = 346.5$$ s ≈ 5.8 minutes. This is a moderately short half-life — the sample is quite active but decays noticeably over minutes.\n\nTakeaway: $$A = \\lambda N$$ gives activity directly. $$t_{1/2} = \\ln 2 / \\lambda$$ gives half-life. Both are straightforward once you have $$\\lambda$$.", "source": "GLM 5.1 ③", "_id": "glm_3_54", "judge_pick": false}, {"question": "Lepton number must be conserved in all particle interactions. In the decay $$^1_0 n \\rightarrow \\, ^1_1 p + \\, ^0_{-1} \\beta + \\bar{\\nu}_e$$, verify lepton number conservation. What would happen if the antineutrino were omitted? (3 steps)", "answer": "- Step 1: Assign lepton numbers: neutron (0), proton (0), electron (−1 for the *electron lepton number*; but wait — convention: electron has $$L_e = +1$$), positron has $$L_e = -1$$. Let me use the standard convention: electron $$L_e = +1$$, positron $$L_e = -1$$, electron neutrino $$L_e = +1$$, electron antineutrino $$L_e = -1$$.\n- Step 2: Before: neutron has $$L_e = 0$$. After: proton ($$L_e = 0$$) + electron ($$L_e = +1$$) + antineutrino ($$L_e = -1$$) = $$0 + 1 - 1 = 0$$. Conserved ✓.\n- Step 3: Without the antineutrino: $$L_e = 0 + 1 = +1 \\neq 0$$. Lepton number is violated — the equation is physically impossible. This is why the antineutrino must be included in every $$\\beta^-$$ decay equation.\n\nTakeaway: Lepton number conservation is non-negotiable. Omitting the (anti)neutrino in beta decay equations loses marks and violates a fundamental conservation law.", "source": "GLM 5.1 ③", "_id": "glm_3_55", "judge_pick": false}, {"question": "The \"3, 2, 1, lay out\" method for calculation questions has four steps. What are they, and why does starting with the formula symbolically before substituting numbers prevent errors? (2 steps)", "answer": "- Step 1: The method: (1) List knowns with symbols and units. (2) Quote the formula symbolically. (3) Rearrange before substituting numbers. (4) Substitute, evaluate, state answer with units and sig figs.\n- Step 2: Starting symbolically lets you see the structure of the calculation before numbers obscure it. You can check that the rearrangement is correct, that units will cancel properly, and that the final expression has the right dimensions. Substituting too early makes it hard to spot algebra errors and nearly impossible for an examiner to give method marks if the final answer is wrong.\n\nTakeaway: Symbolic first → rearrange → then substitute. It's safer, clearer, and maximises method marks even if the arithmetic goes wrong.", "source": "GLM 5.1 ③", "_id": "glm_3_56", "judge_pick": true}, {"question": "When using the non-integer half-life formula $$N = N_0 (1/2)^{t/t_{1/2}}$$, a student tries to find the time for a sample to drop from $$N_0$$ to $$N_0/3$$. Set up (don't solve) the equation for $$t$$. (2 steps)", "answer": "- Step 1: Substitute $$N = N_0/3$$ into the formula: $$\\frac{N_0}{3} = N_0 \\left(\\frac{1}{2}\\right)^{t/t_{1/2}}$$. Cancel $$N_0$$: $$\\frac{1}{3} = \\left(\\frac{1}{2}\\right)^{t/t_{1/2}}$$.\n- Step 2: Take logs of both sides: $$\\ln(1/3) = \\frac{t}{t_{1/2}} \\ln(1/2)$$, so $$t = t_{1/2} \\times \\frac{\\ln(1/3)}{\\ln(1/2)} = t_{1/2} \\times \\frac{\\ln 3}{\\ln 2} \\approx 1.585 \\, t_{1/2}$$. The time for the count to drop to 1/3 is about 1.6 half-lives — a non-integer number, which the magic table alone can't easily give you.\n\nTakeaway: For non-integer half-lives, use logs: $$t = t_{1/2} \\times \\frac{\\ln(N_0/N)}{\\ln 2}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_57", "judge_pick": true}, {"question": "Why is helium-4 ($$^4_2 He$$) an anomalously high peak on the binding-energy-per-nucleon curve, even higher than its neighbours? What does this imply about alpha decay? (2 steps)", "answer": "- Step 1: He-4 is a \"doubly magic\" nucleus (2 protons, 2 neutrons — both magic numbers). This gives it exceptional stability and a very high $$B/A$$ (~7.1 MeV/nucleon) compared to neighbours like He-3, Li-5, etc. The pairing of protons and neutrons into complete shells makes it extra tightly bound.\n- Step 2: This explains why heavy nuclei often decay by emitting alpha particles specifically (rather than, say, single protons or random clusters). The alpha particle is a particularly stable, tightly-bound \"package\" that can break off from a heavy nucleus while releasing significant energy. Emitting an alpha is energetically more favourable than emitting other fragments.\n\nTakeaway: He-4's exceptional stability explains why alpha decay is common among heavy nuclei. The alpha is nature's preferred \"break-off piece.\"", "source": "GLM 5.1 ③", "_id": "glm_3_58", "judge_pick": true}, {"question": "Contrast what happens to the Coulomb barrier as you go to heavier nuclei. Why does this mean very heavy nuclei (like uranium) are inherently unstable? (2 steps)", "answer": "- Step 1: The Coulomb repulsion energy scales roughly as $$Z^2 / R$$ (proportional to the square of the proton number). As you add more protons, the repulsion grows much faster than the strong-force attraction, which only benefits nearest neighbours and scales roughly linearly with $$A$$.\n- Step 2: Beyond a certain size (around lead, $$Z \\approx 82$$), the electrostatic repulsion between protons nearly overwhelms the strong-force binding. These nuclei are barely stable and will eventually decay (by alpha emission or fission) to reduce their proton count. No nucleus with $$Z > 92$$ (uranium) occurs naturally in significant quantities — they've all decayed away.\n\nTakeaway: Coulomb repulsion grows as $$Z^2$$; strong force grows more slowly. Heavy nuclei are metastable — the repulsion is slowly winning.", "source": "GLM 5.1 ③", "_id": "glm_3_59", "judge_pick": true}], "count": 60}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Why does the alpha particle have the highest ionizing power among alpha, beta, and gamma radiation? (3 steps)", "answer": "- Step 1: **Charge and Mass**  \n  Alpha particles have a +2e charge (from 2 protons) and a mass of 4u, making them larger and more charged than beta particles (mass ~0u, charge ±e) and gamma (no charge/mass).  \n  + Sub-case: Beta particles have smaller charge (-e) and much lower mass; gamma has neither.  \n- Step 2: **Interaction with Matter**  \n  The high charge and mass cause alpha particles to collide frequently with atomic electrons, stripping them off and creating ions.  \n  + Sub-case: Beta particles interact less frequently due to smaller charge/mass; gamma interacts via rare photon-electron collisions.  \n- Step 3: **Energy Loss Mechanism**  \n  Alpha particles lose energy rapidly in short distances due to frequent ionization, limiting their penetration but maximizing ionization per unit length.  \n  + Sub-case: Beta/gamma lose energy over longer paths, spreading ionization events thinly.  \n\n**Takeaway:** Alpha's high charge and mass lead to dense ionization, making it most ionizing but least penetrating.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Explain why beta-minus decay increases the proton number (Z) of a nucleus using the neutron-to-proton conversion.", "answer": "- **Neutron Composition:** A neutron (udd) has a net charge of 0.  \n- **Proton Composition:** A proton (uud) has a net charge of +1e.  \n- **Conversion Mechanism:**  \n  When a neutron converts to a proton, a down quark (−⅓e) flips to an up quark (+⅔e), changing the charge from 0 to +1e:  \n  $$\n  d \\rightarrow u + W^- \\rightarrow p + \\beta^- + \\bar{\\nu}_e\n  $$  \n- **Lepton Number Conservation:** The emitted antineutrino ($\\bar{\\nu}_e$) balances lepton number.  \n\n**Takeaway:** Beta⁻ decay increases Z by 1 because a neutron (udd) becomes a proton (uud), emitting an electron (beta⁻) and antineutrino.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "Why is the half-life ($t_{1/2}$) of a radioactive isotope independent of external conditions like temperature or pressure? (2 steps)", "answer": "- Step 1: **Quantum Tunneling Basis**  \n  Nuclear decay relies on quantum tunneling, a probabilistic process governed by the nucleus's internal potential barrier. External conditions don’t affect nuclear forces or barrier height.  \n- Step 2: **Decay Constant ($λ$) Invariance**  \n  The decay constant $λ$ (probability per second of decay) is intrinsic to the isotope’s nuclear configuration, unaffected by atomic/molecular environment.  \n\n**Takeaway:** Half-life is fixed because nuclear decay depends solely on internal quantum probabilities, not external physical/chemical factors.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Why does the binding-energy-per-nucleon curve peak near iron-56? (2 steps)", "answer": "- Step 1: **Strong Nuclear Force vs. Coulomb Repulsion**  \n  For light nuclei, adding nucleons increases binding energy per nucleon due to the strong nuclear force. For heavy nuclei, Coulomb repulsion between protons dominates, lowering binding energy per nucleon.  \n- Step 2: **Optimal Balance at Iron-56**  \n  Iron-56 (A=56) balances the strong force (short-range attraction between nucleons) and Coulomb repulsion, achieving maximum binding energy per nucleon (~8.8 MeV/nucleon).  \n\n**Takeaway:** Energy release in fission/fusion occurs when moving toward iron-56 on the BE/A curve, where nucleons are most tightly bound.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "How does a cyclotron accelerate charged particles, and why must the frequency be fixed? (3 steps)", "answer": "- Step 1: **Magnetic Confinement and Electric Acceleration**  \n  A perpendicular magnetic field ($B$) forces particles into spiral paths ($r = mv/BQ$), while alternating electric fields in dees accelerate them across gaps.  \n- Step 2: **Fixed Frequency Requirement**  \n  The orbital period $T = 2\\pi m/(BQ)$ is independent of velocity. Fixed frequency ensures particles cross gaps as the field alternates, maintaining acceleration.  \n  + Sub-case: Relativistic mass increase at high speeds disrupts timing, limiting cyclotron maximum energy.  \n- Step 3: **Energy Gain Mechanism**  \n  Kinetic energy increases with each gap crossing: $ \\frac{1}{2}mv^2 = qV $.  \n\n**Takeaway:** The cyclotron’s fixed frequency matches the natural orbital period, ensuring continuous acceleration until relativistic effects intervene.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Why does nuclear fusion require extremely high temperatures despite the strong nuclear force being attractive? (2 steps)", "answer": "- Step 1: **Coulomb Barrier**  \n  Protons repel each other due to positive charges. Overcoming this electrostatic repulsion requires kinetic energy from high temperatures (>10⁷ K) to bring nuclei within ~1 fm (strong force range).  \n- Step 2: **Maxwell-Boltzmann Tail**  \n  Only a small fraction of nuclei in the high-energy tail of the Maxwell-Boltzmann distribution achieve sufficient kinetic energy to fuse.  \n\n**Takeaway:** High temperatures provide the kinetic energy needed to overcome Coulomb repulsion, enabling the strong force to bind nuclei after collision.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "Explain the misconception that “the nucleus stores binding energy.” (2 steps)", "answer": "- Step 1: **Binding Energy Definition**  \n  Binding energy is the energy *required* to disassemble a nucleus into free nucleons. It is not energy stored but energy deficit of the bound state.  \n- Step 2: **Mass Defect Analogy**  \n  The mass defect ($Δm$) represents the mass converted to energy ($E = Δmc²$) to bind nucleons. The nucleus is in a *lower* energy state than free nucleons.  \n\n**Takeaway:** Binding energy reflects energy released when nucleons bind, not energy stored—fusing or splitting nuclei releases energy by moving toward higher BE/A.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": true}, {"question": "Why is pair production impossible in a vacuum? (2 steps)", "answer": "- Step 1: **Conservation Laws**  \n  Pair production requires $E_{\\gamma} \\geq 2m_ec^2$ and **momentum conservation**. In a vacuum, photon momentum can’t be balanced by the created electron-positron pair alone.  \n- Step 2: **Material Interaction**  \n  A nucleus or atom nearby absorbs recoil momentum without energy loss, satisfying conservation laws.  \n\n**Takeaway:** Pair production requires a third body (nucleus/atom) to conserve momentum, making it impossible in a vacuum despite sufficient photon energy.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "How does the \"magic table\" method simplify half-life calculations? (3 steps)", "answer": "- Step 1: **Structure of the Table**  \n  Columns: Half-lives (0,1,2,…), Time ($t = n \\cdot t_{1/2}$), Activity/Mass/Nuclei ($N = N_0(1/2)^n$).  \n- Step 2: **Exponential Decay Simplification**  \n  Each half-life reduces the quantity by a factor of 2, avoiding logarithmic/exponential math.  \n  + Example: After 3 half-lives, $N = N_0/8$.  \n- Step 3: **Handling Non-Integer Half-Lives**  \n  Use $N = N_0(1/2)^{t/t_{1/2}}$ for non-integer values derived from the table.  \n\n**Takeaway:** The magic table linearizes exponential decay into discrete steps, making half-life problems accessible without advanced math.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "Why is the neutrino essential in beta-minus decay equations? (2 steps)", "answer": "- Step 1: **Lepton Number Conservation**  \n  Beta⁻ decay ($n \\rightarrow p + \\beta^- + \\bar{\\nu}_e$) balances lepton number:  \n  - Neutron (lepton number 0) → proton (0) + electron (-1) + antineutrino (+1).  \n- Step 2: **Energy-Momentum Conservation**  \n  Without the neutrino, beta decay would violate energy-momentum conservation, causing a continuous beta spectrum (observed vs. expected discrete energy).  \n\n**Takeaway:** Neutrinos ensure conservation of lepton number and explain the observed beta decay energy distribution.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "A nucleus emits a beta-minus particle. How does its position on the binding-energy-per-nucleon curve change?", "answer": "- **Nucleon Number (A):** Unchanged (A remains constant in beta decay).  \n- **Proton Number (Z):** Increases by 1 (neutron → proton).  \n- **Curve Movement:**  \n  - Light nuclei (left of peak): Fusion increases Z toward iron-56.  \n  - Heavy nuclei (right of peak): Fission decreases Z toward iron-56.  \n- **Energy Release:** Beta decay itself doesn’t move up the BE/A curve, but the daughter nucleus may be closer to stability.  \n\n**Takeaway:** Beta⁻ decay shifts Z upward but doesn’t inherently move nuclei toward higher BE/A; this requires fission/fusion.", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "Why is background radiation subtracted before half-life analysis?", "answer": "- **Definition:** Background radiation (cosmic rays, radon, etc.) adds to measured count rates.  \n- **Impact:**  \n  - Without subtraction, apparent half-life appears longer because background inflates remaining activity.  \n  - Example: If background is 10 Bq and true activity drops from 100 Bq to 50 Bq, measured values would be 110 Bq → 60 Bq, skewing $t_{1/2}$ calculation.  \n- **Correction:** Subtract background before plotting $A$ vs. time.  \n\n**Takeaway:** Background radiation must be subtracted to isolate true decay, avoiding overestimation of half-life.", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "How does the binding-energy-per-nucleon curve explain why iron-56 is the most stable nucleus?", "answer": "- **Peak of the Curve:** Iron-56 has the highest $B/A$ (~8.8 MeV/nucleon), meaning:  \n  - Nucleons are most tightly bound.  \n  - No net energy release occurs in fission or fusion of iron.  \n- **Energy Release Mechanism:**  \n  - Fission (heavy → medium nuclei) moves toward iron (uphill on the curve).  \n  - Fusion (light → medium nuclei) also moves toward iron (uphill).  \n- **Stability Implication:** Iron is the endpoint of both processes—no further energy gain possible.  \n\n**Takeaway:** Iron-56’s peak binding energy makes it the most stable nucleus; all nuclear energy applications exploit rearranging nuclei toward this peak.", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "Compare the penetrating power of alpha, beta, and gamma radiation in terms of their interaction with matter.", "answer": "- **Alpha (α):**  \n  - High mass/charge → frequent ionization → stopped by paper/skin.  \n  - Range in air: 3–10 cm.  \n- **Beta (β):**  \n  - Lower mass/charge → less ionization → penetrates cm Al or meters of air.  \n  - Range in air: ~1 m.  \n- **Gamma (γ):**  \n  - No charge/mass → minimal interaction → penetrates meters of concrete/cm of Pb.  \n  - Range in air: hundreds of meters.  \n- **Inverse Relationship:** Ionizing power ∝ 1/penetrating power (α > β > γ).  \n\n**Takeaway:** Penetrating power inversely relates to ionizing power; gamma rays are most penetrating but least ionizing.", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "Why is the neutrino emitted in beta-minus decay undetectable by a Geiger counter?", "answer": "- **Neutrino Properties:**  \n  - No charge → doesn’t ionize atoms.  \n  - Near-zero mass → negligible interaction with matter (weak force only).  \n- **Detection Challenges:**  \n  - Weak force interactions are rare; neutrinos pass through Earth without interaction.  \n- **Geiger Counter Mechanism:**  \n  - Detects ionization from charged particles (α/β/γ), which neutrinos don’t produce.  \n\n**Takeaway:** Neutrinos escape undetected because they don’t ionize and interact only via the weak force, which Geiger counters aren’t designed to measure.", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}, {"question": "A sample of carbon-14 has a half-life of 5730 years. How many half-lives must pass for 1.0 g to decay to 0.125 g?", "answer": "- **Discrete Half-Life Formula:**  \n  $$\n  N = N_0 \\left(\\frac{1}{2}\\right)^n \\Rightarrow \\frac{N}{N_0} = \\left(\\frac{1}{2}\\right)^n\n  $$  \n- **Apply Values:**  \n  $$\n  \\frac{0.125}{1.0} = \\left(\\frac{1}{2}\\right)^n \\Rightarrow \\frac{1}{8} = \\left(\\frac{1}{2}\\right)^3 \\Rightarrow n = 3 \\, \\text{half-lives}\n  $$  \n- **Physical Interpretation:**  \n  - After 3 half-lives (5730 × 3 = 17,190 years), 12.5% of the original sample remains.  \n\n**Takeaway:** The number of half-lives is the exponent converting the remaining fraction to $(1/2)^n$.", "source": "Qwen 3 ①", "_id": "qwen_1_15", "judge_pick": false}, {"question": "Why does a particle’s radius in a magnetic field depend on momentum ($r = p/BQ$)? (2 steps)", "answer": "- Step 1: **Centripetal Force Balance**  \n  Magnetic force $F = BQv$ provides centripetal force $F = mv^2/r$:  \n  $$\n  BQv = \\frac{mv^2}{r} \\Rightarrow r = \\frac{mv}{BQ} = \\frac{p}{BQ}\n  $$  \n- Step 2: **Implications**  \n  - Heavier/faster particles (↑p) have larger radii.  \n  - Stronger fields (↑B) or higher charges (↑Q) reduce radius.  \n\n**Takeaway:** Radius in a magnetic field directly reflects momentum, enabling mass-to-charge separation in spectrometers.", "source": "Qwen 3 ①", "_id": "qwen_1_16", "judge_pick": false}, {"question": "How does the binding-energy-per-nucleon curve explain energy release in nuclear fission of uranium-235?", "answer": "- **Fission Process:**  \n  $$\n  ^{235}_{92}U + n \\rightarrow ^{141}_{56}Ba + ^{92}_{36}Kr + 3n + \\text{energy}\n  $$  \n- **BE/A Comparison:**  \n  - $^{235}U$: ~7.6 MeV/nucleon.  \n  - Fission products: ~8.5 MeV/nucleon.  \n- **Energy Release:**  \n  $$\n  ΔE = 235 \\cdot (8.5 - 7.6) \\approx 210 \\, \\text{MeV}\n  $$  \n- **Curve Movement:** Fission moves from the RHS (low BE/A) to the peak (higher BE/A), releasing energy.  \n\n**Takeaway:** Energy release in fission is the net gain from climbing the BE/A curve toward iron-56.", "source": "Qwen 3 ①", "_id": "qwen_1_17", "judge_pick": false}, {"question": "Why is the decay constant ($λ$) a probability per nucleus, not a fixed time?", "answer": "- **Randomness of Decay:**  \n  - No nucleus decays at a predictable moment; only statistical probability exists.  \n  - $λ$ = probability per nucleus per second (units s⁻¹).  \n- **Derivation from Activity:**  \n  $$\n  A = λN \\Rightarrow λ = \\frac{A}{N} \\quad \\text{(1 nucleus → 1 decay probability)}\n  $$  \n- **Half-Life Relation:**  \n  $$\n  t_{1/2} = \\frac{\\ln 2}{λ} \\Rightarrow \\text{Intrinsic to isotope}\n  $$  \n\n**Takeaway:** $λ$ quantifies the likelihood of decay per nucleus, not a deterministic timescale.", "source": "Qwen 3 ①", "_id": "qwen_1_18", "judge_pick": false}, {"question": "How does a moderator in a nuclear reactor differ from a control rod in function?", "answer": "- **Moderator Role:**  \n  - Slows fast neutrons (from fission) to thermal speeds (meV range) via elastic collisions (e.g., H₂O, graphite).  \n  - Thermal neutrons have higher absorption probability for sustained chain reactions.  \n- **Control Rod Role:**  \n  - Absorbs excess neutrons (e.g., boron, cadmium).  \n  - Adjusts multiplication factor to 1 (criticality) by neutron removal.  \n- **Synergy in Reactors:**  \n  - Moderator ensures neutron absorption; control rods regulate reaction rate.  \n\n**Takeaway:** Moderators thermalize neutrons; control rods regulate their population to maintain criticality.", "source": "Qwen 3 ①", "_id": "qwen_1_19", "judge_pick": false}, {"question": "Why is the mass defect of a nucleus always positive?", "answer": "- **Mass Defect Definition:**  \n  $$\n  Δm = Zm_p + (A-Z)m_n - m_{\\text{nucleus}} > 0\n  $$  \n- **Physical Meaning:**  \n  - Free nucleons have higher total mass than the bound nucleus.  \n  - Energy is released when the nucleus forms (Einstein’s relation $E = Δmc^2$).  \n- **Stability Implication:**  \n  - Positive $Δm$ means energy is lost (released) when the nucleus forms.  \n  - Negative $Δm$ would imply energy gain, making the nucleus unstable.  \n\n**Takeaway:** Binding energy is energy released when nucleons bind, so $Δm > 0$ ensures stability.", "source": "Qwen 3 ①", "_id": "qwen_1_20", "judge_pick": false}, {"question": "How does a Geiger-Müller tube detect ionizing radiation?", "answer": "- **Gas Ionization:**  \n  - Radiation enters through a thin window, ionizing gas atoms inside.  \n  - Released electrons accelerate toward the anode, creating an avalanche of ions.  \n- **Signal Generation:**  \n  - Ionization pulse produces a current spike, counted as a “click” per decay.  \n- **Quenching:**  \n  - Quenching gas (e.g., argon) absorbs excess energy to end the avalanche.  \n\n**Takeaway:** Ionization of gas by radiation creates detectable electrical pulses; quenching ensures discrete counts.", "source": "Qwen 3 ①", "_id": "qwen_1_21", "judge_pick": false}, {"question": "Why does the radius of a charged particle in a magnetic field increase with velocity?", "answer": "- **Formula Recall:**  \n  $$\n  r = \\frac{mv}{BQ} = \\frac{p}{BQ}\n  $$  \n- **Velocity Dependence:**  \n  - Higher $v$ → greater $p = mv$ → larger $r$.  \n  - For fixed $B, Q$, $r \\propto p \\propto v$.  \n- **Practical Example:**  \n  - Protons in a cyclotron spiral outward as they speed up, increasing radius each half-orbit.  \n\n**Takeaway:** Radius increases linearly with momentum, so faster particles trace wider paths in magnetic fields.", "source": "Qwen 3 ①", "_id": "qwen_1_22", "judge_pick": false}, {"question": "How does the binding-energy-per-nucleon curve explain why energy is released in both fission and fusion?", "answer": "- **Fission (Heavy → Medium Nuclei):**  \n  - Starts at low BE/A (e.g., uranium), ends at higher BE/A (e.g., barium/krypton).  \n  - Energy released = difference in total binding energy.  \n- **Fusion (Light → Medium Nuclei):**  \n  - Starts at low BE/A (e.g., deuterium/tritium), ends at higher BE/A (e.g., helium).  \n  - Energy released = difference in total binding energy.  \n- **Curve Interpretation:**  \n  - Both processes move toward the peak at iron-56.  \n  - Energy released = (final total BE − initial total BE).  \n\n**Takeaway:** Energy release occurs when nucleons rearrange toward the BE/A peak—fission (right → peak), fusion (left → peak).", "source": "Qwen 3 ①", "_id": "qwen_1_23", "judge_pick": false}, {"question": "Why is the antineutrino ($\\bar{ν}_e$) undetectable in a cloud chamber?", "answer": "- **Interaction Cross-Section:**  \n  - Antineutrinos interact only via the weak force, which has minuscule cross-section.  \n- **Ionization Invisibility:**  \n  - No charge → no ionization trail.  \n  - Minimal mass → negligible momentum transfer to matter.  \n- **Detector Requirements:**  \n  - Requires massive, dense detectors (e.g., neutrino observatories).  \n\n**Takeaway:** Antineutrinos rarely interact with matter and leave no ionization trail, making them undetectable in cloud chambers.", "source": "Qwen 3 ①", "_id": "qwen_1_24", "judge_pick": false}, {"question": "How does the “magic table” method handle a sample with 8.00 g decaying to 0.25 g?", "answer": "- **Half-Life Calculation:**  \n  $$\n  \\frac{N}{N_0} = \\left(\\frac{1}{2}\\right)^n \\Rightarrow \\frac{0.25}{8.00} = \\left(\\frac{1}{2}\\right)^5 \\Rightarrow n = 5 \\, \\text{half-lives}\n  $$  \n- **Time Calculation:**  \n  $t = n \\cdot t_{1/2} = 5 \\cdot 164 \\, \\text{s} = 820 \\, \\text{s}$.  \n- **Table Construction:**  \n  | Half-lives | Time (s) | Mass (g) |  \n  | 0 | 0 | 8.00 |  \n  | 1 | 164 | 4.00 |  \n  | 2 | 328 | 2.00 |  \n  | 3 | 492 | 1.00 |  \n  | 4 | 656 | 0.50 |  \n  | 5 | 820 | 0.25 |  \n\n**Takeaway:** The magic table tracks discrete half-lives, reducing complex decay to a stepwise process.", "source": "Qwen 3 ①", "_id": "qwen_1_25", "judge_pick": false}, {"question": "Why does gamma radiation not change the position of a nucleus on the binding-energy-per-nucleon curve?", "answer": "- **Gamma Decay Mechanism:**  \n  - Gamma emission releases excess energy from an excited nucleus ($^A_ZX^* \\rightarrow ^A_ZX + γ$).  \n- **No Nucleon Change:**  \n  - A and Z remain constant; gamma is a secondary emission (not a decay mode).  \n- **Curve Unchanged:**  \n  - Binding energy per nucleon depends on A and Z. Gamma decay only lowers the nucleus’s energy state without altering its identity.  \n\n**Takeaway:** Gamma decay resolves nuclear excitation but doesn’t alter nucleon/proton count, so the nucleus stays at the same BE/A value.", "source": "Qwen 3 ①", "_id": "qwen_1_26", "judge_pick": false}, {"question": "Why is the antineutrino ($\\bar{ν}_e$) omitted in simplified decay equations?", "answer": "- **Lepton Number Conservation:**  \n  - Electron emission ($\\beta^-$) requires $\\bar{ν}_e$ to conserve lepton number (0 → −1 + +1).  \n- **Simplified Contexts:**  \n  - Introductory courses sometimes omit $\\bar{ν}_e$ to focus on A/Z changes.  \n- **Advanced Requirement:**  \n  - Full equations must include $\\bar{ν}_e$ for conservation laws (lepton number and energy).  \n\n**Takeaway:** Omitting $\\bar{ν}_e$ simplifies equations but violates conservation laws; it’s essential for accuracy.", "source": "Qwen 3 ①", "_id": "qwen_1_27", "judge_pick": false}, {"question": "How does a magnetic field in a cloud chamber reveal the charge and momentum of a particle?", "answer": "- **Curvature Direction:**  \n  - Right-hand rule determines charge sign (e.g., alpha curves clockwise → +ve charge).  \n- **Radius Dependence:**  \n  $$\n  r = \\frac{p}{BQ} \\Rightarrow p \\propto r \\quad \\text{(for fixed } B, Q)\n  $$  \n- **Track Thickness:**  \n  - Thicker tracks → higher ionizing power (e.g., alpha vs. beta).  \n\n**Takeaway:** Radius reveals momentum (via $r$), curvature direction reveals charge, and track thickness indicates ionizing power.", "source": "Qwen 3 ①", "_id": "qwen_1_28", "judge_pick": false}, {"question": "Why is the atomic mass unit (u) preferred over kilograms in nuclear physics?", "answer": "- **Convenience:**  \n  - 1u ≈ $1.661 \\times 10^{-27} \\, \\text{kg}$ → avoids unwieldy exponents.  \n- **Energy Conversion:**  \n  - 1u ≈ 931.5 MeV/c² → simplifies $ΔE = Δm c^2$ calculations (e.g., binding energy in MeV).  \n- **Precision in Calculations:**  \n  - Nuclear mass differences (Δm) are tiny in kg but measurable in u.  \n\n**Takeaway:** Using u streamlines mass-energy conversions and avoids cumbersome SI units in nuclear calculations.", "source": "Qwen 3 ①", "_id": "qwen_1_29", "judge_pick": false}, {"question": "Why does the neutron-to-proton ($N/Z$) ratio increase with mass number in stable nuclei?", "answer": "- **Coulomb Repulsion:**  \n  - Protons repel each other; larger $A$ → more protons → higher Coulomb energy.  \n- **Neutron Compensation:**  \n  - Extra neutrons add strong force attraction without Coulomb repulsion, stabilizing heavy nuclei (e.g., $N/Z \\approx 1.6$ for $^{235}U$).  \n- **Curve of Stability:**  \n  - Light nuclei (Z ≤ 20) have $N/Z \\approx 1$.  \n  - Heavy nuclei require increasing $N/Z$ to offset Coulomb repulsion.  \n\n**Takeaway:** Neutrons mitigate Coulomb repulsion in heavy nuclei, increasing $N/Z$ for stability.", "source": "Qwen 3 ①", "_id": "qwen_1_30", "judge_pick": false}, {"question": "How does the strong nuclear force compare to the electrostatic force in a nucleus?", "answer": "- **Range:**  \n  - Strong force: $≈ 1 \\, \\text{fm}$ (short-range, saturates).  \n  - Electrostatic: Long-range, falls as $1/r^2$.  \n- **Strength:**  \n  - Strong force >> electrostatic force at short distances.  \n- **Stability Balance:**  \n  - Strong force binds nucleons; electrostatic repulsion between protons destabilizes large nuclei.  \n- **Fission Threshold:**  \n  - Electrostatic repulsion dominates for $A > 200$, causing fission.  \n\n**Takeaway:** The strong force overcomes electrostatic repulsion in small nuclei but becomes insufficient for $A > 200$.", "source": "Qwen 3 ①", "_id": "qwen_1_31", "judge_pick": false}, {"question": "Why is the binding energy of a nucleus always positive?", "answer": "- **Definition:**  \n  - Binding energy is the energy required to split a nucleus into free nucleons.  \n- **Energy Stability:**  \n  - Bound nucleus has lower energy than free nucleons.  \n  - Positive binding energy reflects energy input needed to break it apart.  \n- **Analogy:**  \n  - Similar to gravitational potential energy: negative when bound, positive when free.  \n\n**Takeaway:** Binding energy is positive because energy must be added to overcome the nucleus’s stability.", "source": "Qwen 3 ①", "_id": "qwen_1_32", "judge_pick": false}, {"question": "How does the BE/A curve explain why helium-4 is exceptionally stable?", "answer": "- **BE/A Value:**  \n  - $^4_2\\text{He}$ has $B/A ≈ 7.6 \\, \\text{MeV/nucleon}$, a local maximum.  \n- **Alpha Decay Stability:**  \n  - Alpha particles (He-4) are tightly bound, making them common decay products.  \n- **Curve Anomaly:**  \n  - The BE/A peak at He-4 explains its stability and prevalence in fission/fusion.  \n\n**Takeaway:** Helium-4’s high $B/A$ makes it a “magic number” nucleus, exceptionally stable.", "source": "Qwen 3 ①", "_id": "qwen_1_33", "judge_pick": false}, {"question": "Why is the decay constant ($λ$) inversely related to half-life ($t_{1/2}$)?", "answer": "- **Exponential Decay Law:**  \n  $$\n  N = N_0 e^{-λt} \\Rightarrow t_{1/2} = \\frac{\\ln 2}{λ}\n  $$  \n- **Probability Interpretation:**  \n  - High $λ$ (short $t_{1/2}$) → high decay probability per nucleus.  \n  - Low $λ$ (long $t_{1/2}$) → low decay probability.  \n- **Example:**  \n  - Carbon-14 ($λ ≈ 3.83 \\times 10^{-12} \\, \\text{s}^{-1}$) has $t_{1/2} = 5730 \\, \\text{yrs}$.  \n\n**Takeaway:** $λ$ and $t_{1/2}$ are inversely related—higher $λ$ means faster decay and shorter $t_{1/2}$.", "source": "Qwen 3 ①", "_id": "qwen_1_34", "judge_pick": false}, {"question": "How does the binding-energy-per-nucleon curve explain why energy is released in both fission and fusion?", "answer": "- **Fission (Heavy → Medium Nuclei):**  \n  - Starts at lower $B/A$ (e.g., $^235U$), ends at higher $B/A$ (e.g., $^141Ba$, $^92Kr$).  \n- **Fusion (Light → Medium Nuclei):**  \n  - Starts at lower $B/A$ (e.g., $^2H$, $^3H$), ends at higher $B/A$ (e.g., $^4He$).  \n- **Curve Shape:**  \n  - Both processes move toward the peak at $^56Fe$, increasing total binding energy.  \n\n**Takeaway:** Energy release occurs when nucleons rearrange to higher $B/A$ states, whether splitting or fusing.", "source": "Qwen 3 ①", "_id": "qwen_1_35", "judge_pick": false}, {"question": "How does the neutron-to-proton ratio ($N/Z$) change in beta-plus decay?", "answer": "- **Beta-Plus Process:**  \n  $$\n  ^1_1p \\rightarrow ^1_0n + ^0_{+1}\\beta + ν_e\n  $$  \n- **$N/Z$ Shift:**  \n  - Initial: $N = A-Z$, $Z$ (protons).  \n  - Final: $N$ increases by 1 (p → n), $Z$ decreases by 1.  \n- **Physical Consequence:**  \n  - Neutron-rich isotopes (high $N/Z$) decay via $\\beta^-$; neutron-poor isotopes decay via $\\beta^+$.  \n\n**Takeaway:** Beta-plus decay reduces $Z$ and increases $N/Z$, moving the nucleus toward stability.", "source": "Qwen 3 ①", "_id": "qwen_1_36", "judge_pick": false}, {"question": "Why is the binding energy per nucleon of helium-4 higher than hydrogen-2?", "answer": "- **Strong Force Saturation:**  \n  - Helium-4 has 4 nucleons, all strongly bound; hydrogen-2 (deuterium) has only 2, less saturation.  \n- **Coulomb Repulsion:**  \n  - No proton repulsion in deuterium (Z=1); helium-4 has 2 protons, but strong force dominates.  \n- **Binding Energy Calculation:**  \n  - He-4: $B/A ≈ 7.6 \\, \\text{MeV/nucleon}$.  \n  - H-2: $B/A ≈ 1.1 \\, \\text{MeV/nucleon}$.  \n\n**Takeaway:** Helium-4’s high $B/A$ arises from strong force saturation, making it more stable than deuterium.", "source": "Qwen 3 ①", "_id": "qwen_1_37", "judge_pick": false}, {"question": "Why is the strong nuclear force necessary to explain nuclear stability?", "answer": "- **Electrostatic Repulsion:**  \n  - Protons repel each other (Coulomb force), destabilizing the nucleus.  \n- **Strong Force Counterbalance:**  \n  - Short-range attraction (>1000x stronger than Coulomb at 1 fm) overcomes proton repulsion.  \n- **Saturation:**  \n  - Each nucleon binds only to nearest neighbors, explaining why large nuclei need extra neutrons for stability.  \n\n**Takeaway:** The strong force must exist to overcome Coulomb repulsion and bind nucleons into stable nuclei.", "source": "Qwen 3 ①", "_id": "qwen_1_38", "judge_pick": true}, {"question": "How does a neutron’s beta-minus decay violate conservation of baryon number without the antineutrino?", "answer": "- **Baryon Number Definition:**  \n  - Proton/neutron: $B = +1$; lepton numbers: $L_e = +1$ for electrons, $L_e = -1$ for antineutrinos.  \n- **Without Antineutrino:**  \n  - Neutron ($B=1$) → proton ($B=1$) + electron ($B", "source": "Qwen 3 ①", "_id": "qwen_1_39", "judge_pick": true}], "count": 40}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Define nucleon number (A), proton number (Z), and explain what defines an isotope. (3 steps)", "answer": "- Step 1: **Nucleon number (A)** is the total number of protons and neutrons in a nucleus.  \n- Step 2: **Proton number (Z)** is the number of protons (defines the element) and corresponds to the atomic number in the periodic table.  \n- Step 3: **Isotopes** are atoms of the same element (same Z) with different neutron counts (different A). For example, carbon-12 has Z=6, A=12; carbon-14 has Z=6, A=14.  \n*Contrast:* Isotopes ≠ elements. Changing Z creates a new element; changing A creates an isotope.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Compare alpha, beta, and gamma radiation in terms of charge, mass, ionizing power, and penetration. Why is beta’s ionizing power less than alpha’s?", "answer": "- Step 1: **Alpha**: $+2e$ charge, $4u$ mass (helium nucleus), high ionizing power (large charge/mass), stopped by paper.  \n- Step 2: **Beta**: $-e$ charge, ~$0u$ mass (electron), medium ionizing power (smaller charge/mass), stopped by mm of aluminum.  \n- Step 3: **Gamma**: $0$ charge, $0$ mass (photon), low ionizing power (no charge), requires cm of lead to stop.  \n*Why beta < alpha?* Beta particles are smaller and faster, interacting less frequently with atomic electrons than heavy alpha particles.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Balance the alpha decay equation: $^{238}_{92}\\text{U} \\rightarrow ^{234}_{90}\\text{Th} + \\alpha$. Explain conservation of A and Z.", "answer": "- Step 1: **Conservation of nucleon number (A)**: $238 = 234 + 4$.  \n- Step 2: **Conservation of proton number (Z)**: $92 = 90 + 2$.  \n- Step 3: **Result**: The alpha particle ($^4_2\\text{He}$) carries away 2 protons and 4 nucleons, reducing U-238 to Th-234.  \n*Misconception*: Beta decay changes Z but not A, while gamma decay changes neither.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "Explain why beta-minus particles (electrons) are emitted from the nucleus despite nuclei containing only protons and neutrons. Include the role of the weak force.", "answer": "- Step 1: A **neutron** ($udd$) decays via the **weak force**: $^1_0n \\rightarrow ^1_1p + ^0_{-1}\\beta + \\bar{\\nu}_e$.  \n- Step 2: The neutron converts to a proton, emitting an electron (beta-minus) and an antineutrino to conserve lepton number.  \n- Step 3: **Why not electrons in nuclei?** Beta particles are created *during decay* via the weak force, not pre-existing in the nucleus.  \n*Contrast*: Beta-plus decay converts a proton to a neutron, emitting a positron and neutrino.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "What is mass defect (Δm), and how does it relate to nuclear binding energy? Why is $E = mc^2$ critical here?", "answer": "- Step 1: **Mass defect (Δm)** is the difference between the total mass of free nucleons and the mass of the bound nucleus:  \n  $$\n  \\Delta m = Zm_p + (A-Z)m_n - m_{\\text{nucleus}}.\n  $$  \n- Step 2: **Binding energy (ΔE)** is the energy required to disassemble the nucleus:  \n  $$\n  \\Delta E = \\Delta m c^2.\n  $$  \n- Step 3: **Physical meaning**: The missing mass (Δm) is converted to binding energy, which stabilizes the nucleus. A bound nucleus is lower in energy than its constituents.  \n*Misconception*: Binding energy is *not* stored in the nucleus; it’s the energy required to break it apart.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "Why does fission of heavy nuclei (e.g., uranium) and fusion of light nuclei (e.g., hydrogen) both release energy? Use the binding energy per nucleon (B/A) curve.", "answer": "- Step 1: The **B/A curve peaks at iron-56** (~8.8 MeV/nucleon).  \n- Step 2: Fission of heavy nuclei (e.g., U-235) moves toward higher B/A (e.g., Ba-141 and Kr-92), releasing energy.  \n- Step 3: Fusion of light nuclei (e.g., H-2 and H-3) forms a nucleus with higher B/A (e.g., He-4), also releasing energy.  \n*Limiting case*: Reactants far from iron (low B/A) release more energy when moving toward the peak.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "What role do a **moderator** and **control rods** play in a nuclear reactor? Why is neutron energy critical?", "answer": "- Step 1: **Moderator** (e.g., water) slows fast neutrons to thermal speeds, increasing fission probability.  \n- Step 2: **Control rods** (e.g., boron) absorb neutrons to maintain criticality ($k=1$) and prevent uncontrolled chain reactions.  \n- Step 3: Neutrons must be slowed: Fast neutrons are less likely to cause fission in U-235.  \n*Misconception*: Fission does not \"store\" energy; it releases energy as kinetic energy of products and gamma rays.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "Why do fusion reactions require extremely high temperatures (e.g., $10^7$ K) in stars?", "answer": "- Step 1: **Electrostatic repulsion** between positively charged nuclei must be overcome.  \n- Step 2: High **thermal energy** gives nuclei enough kinetic energy to approach within the range of the strong nuclear force ($10^{-15} m$).  \n- Step 3: **Tunneling effect**: Even with high kinetic energy, quantum tunneling allows fusion at lower temperatures than classical predictions.  \n*Edge case*: Fusion of light nuclei (e.g., H → He) releases energy; heavier nuclei require external energy (endothermic).", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "Derive the relationship $t_{1/2} = \\ln 2 / \\lambda$ from the exponential decay law $N = N_0 e^{-\\lambda t}$.", "answer": "- Step 1: At half-life ($t_{1/2}$), $N = N_0/2$. Substitute into the decay law:  \n  $$\n  \\frac{N_0}{2} = N_0 e^{-\\lambda t_{1/2}}.\n  $$  \n- Step 2: Cancel $N_0$ and take natural logs:  \n  $$\n  \\ln\\left(\\frac{1}{2}\\right) = -\\lambda t_{1/2} \\Rightarrow -\\ln 2 = -\\lambda t_{1/2}.\n  $$  \n- Step 3: Solve for $t_{1/2}$:  \n  $$\n  t_{1/2} = \\frac{\\ln 2}{\\lambda} \\approx \\frac{0.693}{\\lambda}.\n  $$  \n*Why this matters*: Half-life is inversely proportional to the decay constant ($\\lambda$).", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "What is the minimum photon energy ($E_{\\gamma}$) required to create an electron-positron pair? Why is $E_{\\gamma} = 2m_ec^2$ and not just $m_ec^2$?", "answer": "- Step 1: **Threshold energy** must create both particles:  \n  $$\n  E_{\\gamma} = 2m_ec^2.\n  $$  \n- Step 2: **Rest mass energy**: $m_ec^2 = 0.511$ MeV for an electron, so total is $1.022$ MeV.  \n- Step 3: **Why *two* particles?** Conservation of momentum requires a nucleus to absorb recoil; a single particle would violate momentum conservation.  \n*Misconception*: Pair production cannot occur in a vacuum; a nucleus is needed for momentum conservation.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "Why does iron-56 represent the most stable nucleus? How does this relate to energy release in fission and fusion?", "answer": "- Step 1: **Iron-56** has the highest binding energy per nucleon (~8.8 MeV/nucleon), making it the most stable.  \n- Step 2: **Fission**: Heavy nuclei (e.g., U-235, B/A ~7.6 MeV) split into medium nuclei (B/A ~8.5 MeV), releasing energy.  \n- Step 3: **Fusion**: Light nuclei (e.g., H isotopes, B/A ~1 MeV) combine into medium nuclei (B/A ~7 MeV), releasing energy.  \n*Visual intuition*: The curve’s slope dictates energy release. Moving *toward* iron releases energy; moving *away* requires energy.", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "A sample has $1.2 \\times 10^{12}$ nuclei and a decay constant $\\lambda = 3.0 \\times 10^{-5} \\, \\text{s}^{-1}$. Calculate its activity (A) in Bq.", "answer": "- Step 1: Use $A = \\lambda N$:  \n  $$\n  A = (3.0 \\times 10^{-5} \\, \\text{s}^{-1})(1.2 \\times 10^{12}) = 3.6 \\times 10^7 \\, \\text{Bq}.\n  $$  \n- Step 2: **Units**: Activity ($A$) is decays per second (Bq), $\\lambda$ is probability per second, $N$ is number of nuclei.  \n- Step 3: **Why not moles?** Activity depends on $N$, not mass or moles. Convert mass to $N$ using $N = (m/M_r) \\times N_A$.  \n*Misconception*: Activity decreases exponentially over time as $N$ decreases.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}, {"question": "Explain why gamma rays have the highest penetrating power but the lowest ionizing power.", "answer": "- Step 1: **Penetrating power**: Gamma photons (no charge, no mass) interact weakly with matter, traveling meters in air.  \n- Step 2: **Ionizing power**: Alpha particles (large charge/mass) collide frequently, ionizing atoms; gamma interacts rarely.  \n- Step 3: **Trade-off**: High ionizing power (alpha) → low penetration. Low ionizing power (gamma) → high penetration.  \n*Real-world example*: Alpha cannot penetrate skin but is dangerous if ingested. Gamma is used in medical imaging.", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": false}, {"question": "What were the three key observations from Rutherford’s gold foil experiment, and what do they imply about atomic structure?", "answer": "- Step 1: **Most alpha particles passed through** → atom is mostly empty space.  \n- Step 2: **Some deflected at small angles** → positive charge concentrated near the nucleus (repels alpha particles).  \n- Step 3: **Rare large-angle deflections** → nucleus is small, dense, and positively charged.  \n*Contrast*: Plum pudding model predicts uniform deflection, not backscattering.", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "How does the radius of a charged particle in a magnetic field ($r = \\frac{mv}{BQ}$) explain why heavier or faster particles have larger $r$?", "answer": "- Step 1: **Momentum**: $r \\propto \\frac{mv}{BQ} = \\frac{p}{BQ}$. Higher momentum (mass × velocity) increases $r$.  \n- Step 2: **Mass**: Heavier particles (e.g., alpha) have larger $r$ than lighter ones (e.g., beta) at the same velocity.  \n- Step 3: **Charge**: Particles with higher $|Q|$ (e.g., alpha $+2e$) have smaller $r$ than beta ($-e$) at the same $p$.  \n*Example*: A proton ($Q=+e$) has smaller $r$ than a deuteron ($Q=+e$) at the same speed.", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": false}, {"question": "A polonium-210 sample (half-life 138 days) starts with 8.00 g. How many half-lives pass to reach 0.25 g?", "answer": "- Step 1: Use $N = N_0(1/2)^n$ to solve for $n$:  \n  $$\n  \\frac{0.25}{8.00} = (1/2)^n \\Rightarrow \\frac{1}{32} = (1/2)^5.\n  $$  \n- Step 2: $n=5$ half-lives. Total time: $5 \\times 138 \\, \\text{days} = 690 \\, \\text{days}$.  \n- Step 3: **Magic table method**:  \n  $$\n  \\begin{array}{c|c|c}\n  \\text{Half-lives} & \\text{Time (days)} & \\text{Mass (g)} \\\\\n  \\hline\n  0 & 0 & 8.00 \\\\\n  1 & 138 & 4.00 \\\\\n  2 & 276 & 2.00 \\\\\n  3 & 414 & 1.00 \\\\\n  4 & 552 & 0.500 \\\\\n  5 & 690 & 0.250 \\\\\n  \\end{array}\n  $$  \n*Misconception*: Half-life is a *probability*, not a fixed time per nucleus.", "source": "Qwen 3 ②", "_id": "qwen_2_15", "judge_pick": false}, {"question": "Define binding energy per nucleon ($B/A$) and explain why higher $B/A$ implies greater stability.", "answer": "- Step 1: **Binding energy per nucleon** is the average energy required to remove a nucleon:  \n  $$\n  B/A = \\frac{\\text{Total binding energy}}{A}.\n  $$  \n- Step 2: **Stability**: Nucleons in higher $B/A$ configurations are more tightly bound (lower energy state).  \n- Step 3: **Energy release**: Reactions moving to higher $B/A$ (fission/fusion) release energy.  \n*Contrast*: Unstable nuclei (low $B/A$) decay to reach higher $B/A$.", "source": "Qwen 3 ②", "_id": "qwen_2_16", "judge_pick": false}, {"question": "Why must background radiation be subtracted before analyzing a radioactive decay experiment?", "answer": "- Step 1: **Background radiation** (cosmic rays, radon, etc.) adds to the measured count rate.  \n- Step 2: **Exponential decay analysis** requires net activity: $A_{\\text{source}} = A_{\\text{measured}} - A_{\\text{background}}$.  \n- Step 3: **Consequence**: Failing to subtract background overestimates half-life (e.g., $t_{1/2}$ appears longer).  \n*Real-world example*: A sample with $A_0 = 100 \\, \\text{Bq}$ and $A_{\\text{background}} = 10 \\, \\text{Bq}$ appears to decay slower if background is untreated.", "source": "Qwen 3 ②", "_id": "qwen_2_17", "judge_pick": false}, {"question": "Why is the neutrino necessary in beta-minus decay?", "answer": "- Step 1: **Lepton number conservation**: Beta-minus ($^0_{-1}\\beta$) has lepton number $-1$; antineutrino ($\\bar{\\nu}_e$) has lepton number $+1$.  \n- Step 2: **Energy-momentum conservation**: The antineutrino carries away energy/momentum to balance the decay.  \n- Step 3: **Historical discovery**: Beta decay energy spectra showed missing energy, implying undetected particles.  \n*Misconception*: Neutrinos are not \"made up\" to fix equations; they are real and detected in experiments.", "source": "Qwen 3 ②", "_id": "qwen_2_18", "judge_pick": false}, {"question": "Explain why the strong nuclear force, not the weak force, holds the nucleus together.", "answer": "- Step 1: **Strong force** (mediated by gluons) binds protons/neutrons via quark interactions; overcomes electrostatic repulsion.  \n- Step 2: **Weak force** (mediated by W bosons) governs beta decay but is 100x weaker and shorter-ranged.  \n- Step 3: **Energy scale**: Binding energy (~MeV) is much smaller than QCD binding (~GeV).  \n*Contrast*: Strong force is ~100x stronger than electromagnetic force; weak force is ~$10^{-6}$th as strong.", "source": "Qwen 3 ②", "_id": "qwen_2_19", "judge_pick": false}], "count": 20}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "In the Rutherford scattering experiment, alpha particles were fired at thin gold foil. What did the observations tell us about the structure of the atom? (3 steps)", "answer": "- Step 1: Most alpha particles passed straight through the foil undeflected → the atom is mostly empty space, with the mass and positive charge concentrated in a very small region.\n- Step 2: Some alpha particles were deflected at small angles (< 10°) → there is a concentrated positive charge in the center that repels the positively charged alpha particles.\n+ A tiny fraction (about 1 in 8000) bounced back at large angles (> 90°) → the nucleus is extremely small, dense, and contains most of the atom's mass.\n- Step 3: This death of J.J. Thomson's \"plum pudding\" model established the modern nuclear model of the atom — a tiny, dense, positively charged nucleus surrounded by orbiting electrons.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "State the quark composition of a proton and a neutron, and verify the total charge in each case.", "answer": "- Proton: composed of two up quarks (u) and one down quark (d), written as uud.\n+ Up quark charge: +⅔ e, Down quark charge: −⅓ e\n+ Total charge: (+⅔) + (+⅔) + (−⅓) = +1e ✓\n- Neutron: composed of one up quark (u) and two down quarks (d), written as udd.\n+ Total charge: (+⅔) + (−⅓) + (−⅓) = 0e ✓\n\n[This demonstrates how the familiar properties of nucleons emerge from their fundamental quark constituents.]", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "What is the difference between an isotope and an element? Can an element have more than one isotope?", "answer": "- Element: determined solely by the proton number Z (atomic number). All atoms with the same Z are the same element, regardless of neutron count.\n- Isotope: atoms of the same element (same Z) but with different nucleon numbers A (different number of neutrons).\n+ Example: Carbon-12 (⁶¹²C), Carbon-13 (⁶¹³C), and Carbon-14 (⁶¹⁴C) are all isotopes of the element carbon.\n- Yes, most elements have multiple isotopes — some stable, some radioactive. Only about 20 elements have only one stable isotope.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "List the three main types of nuclear radiation in order of penetrating power (most penetrating first), and state what stops each type.", "answer": "- Most penetrating: Gamma rays (γ) — stopped by several cm of lead or metres of concrete; can travel hundreds of metres in air.\n- Medium: Beta particles (β⁻ or β⁺) — stopped by a few mm of aluminium; travel about 1 metre in air.\n- Least penetrating: Alpha particles (α) — stopped by paper or skin; travel only 3–10 cm in air.\n\n[Note: This is the opposite order to ionizing power, where α > β > γ.]", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "Why does alpha radiation have the highest ionizing power while gamma radiation has the lowest, despite being the most penetrating?", "answer": "- Ionizing power refers to how effectively a radiation type removes electrons from atoms it encounters.\n- Alpha particles carry a +2e charge and have the largest mass (4 u), so they collide frequently with atomic electrons and transfer energy efficiently with each collision — resulting in high ionization but they lose energy quickly, hence low penetration.\n- Gamma rays are massless, neutral photons with no charge; they interact weakly with matter and can pass through much material before depositing energy — resulting in low ionization but high penetration.\n- The relationship is inverse: highest penetration → lowest ionization, and vice versa.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": true}, {"question": "In beta-minus decay, a neutron in the nucleus converts into a proton. Explain how this is possible given that the nucleus contains no electrons, and write the decay equation.", "answer": "- Step 1: The neutron is not a fundamental particle — it is made of quarks (udd). Inside the neutron, one down quark can convert into an up quark through the weak nuclear force.\n- Step 2: This quark transformation changes the neutron (udd) into a proton (uud), while simultaneously emitting an electron (β⁻) and an antineutrino (ν̄ₑ) to conserve charge and lepton number.\n- Step 3: The full decay equation is: ⁿ₁₀ → ᵖ₁₁ + ⁻₁β + ν̄ₑ\n+ The neutron (neutral, A=1) becomes a proton (+1 charge, A=1), plus the beta particle (−1 charge) and antineutrino (neutral).", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "Complete the following nuclear decay equations:", "answer": "(a) For alpha decay: A decreases by 4, Z decreases by 2.\n+ 238 − 4 = 234; 92 − 2 = 90 (thorium)\n+ Answer: ⁹²³₈U → ²³⁴₉₀Th + ⁴₂α\n\n(b) For beta-minus decay: A unchanged, Z increases by 1; must emit antineutrino for lepton number conservation.\n+ 14 → 14 (A), 6 → 7 (Z); becomes nitrogen-14\n+ Answer: ¹⁴₆C → ¹⁴₇N + ⁻₁β + ν̄ₑ\n\n(c) For alpha decay: A decreases by 4, Z decreases by 2.\n+ 210 − 4 = 206; 84 − 2 = 82 (lead)\n+ Answer: ⁸⁴₂₁₀Po → ⁸²₂₀₆Pb + ⁴₂α", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "What is background radiation, and why must it be subtracted when measuring the activity of a radioactive source?", "answer": "- Background radiation is the low-level radiation from natural and artificial sources always present in the environment, including:\n+ Cosmic rays from space\n+ Radon gas from rocks/soil\n+ Radioactive isotopes in food (e.g., potassium-40 in bananas, carbon-14)\n+ Medical X-rays, nuclear fallout\n- A Geiger counter will register counts even w
