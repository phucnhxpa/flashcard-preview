d; it doubles the *number of halvings*, which is exponential.\n- Step 2: The correct dependence is $$N = N_0 (1/2)^{t/t_{1/2}}$$. The exponent $$t/t_{1/2}$$ enters as a *power*, not a *multiplier*. So a ratio of times must be raised as an exponent, not cross-multiplied.\n- Step 3: Build the \"magic table\" of half-lives and corresponding times, or use the formula directly. Linear ratios always give the wrong answer for decay.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": true}, {"question": "Why does a *single* nucleus have a completely unpredictable decay moment, yet a large sample follows a smooth exponential curve? (3 steps)", "answer": "- Step 1: At the single-nucleus level, decay is genuinely random — quantum mechanical, with only a probability per unit time. You cannot, even in principle, predict the instant.\n- Step 2: But with $$N \\sim 10^{20}$$ nuclei, the law of large numbers kicks in. The expected fraction decaying per second is $$\\lambda$$, with statistical fluctuations of order $$1/\\sqrt{N}$$ — vanishingly small.\n- Step 3: So the macroscopic behaviour is sharply deterministic ($$N(t) = N_0 e^{-\\lambda t}$$) even though every individual event is random. This is the same statistical magic that makes gas pressure smooth despite atomic chaos.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": true}, {"question": "What is mass defect, and why is the *bound* nucleus *lighter* than its separated nucleons? (3 steps)", "answer": "- Step 1: Measure the mass of a helium-4 nucleus directly. Then add up the masses of 2 free protons and 2 free neutrons. The bound nucleus weighs *less* — by an amount $$\\Delta m = Z m_p + (A - Z) m_n - m_{\\text{nucleus}}$$.\n- Step 2: The \"missing\" mass has been converted to energy and released when the nucleons came together. Equivalently, the bound state sits at a *lower energy* than the separated state — that's literally what \"bound\" means.\n- Step 3: By $$E = mc^2$$, lower energy ↔ lower mass. So a bound nucleus, sitting in an energy well, must have less mass than the sum of its free parts.\n\nCounterintuitive takeaway: binding *reduces* mass. You'd have to *add* energy (and hence mass) to pull the nucleus apart.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": true}, {"question": "Why is it physically wrong to say \"binding energy is stored inside the nucleus\"? (2 steps)", "answer": "- Step 1: Binding energy is the energy you'd have to *put in* from outside to break the nucleus apart into separated nucleons. It's a property of the *difference* between two states, not a quantity sitting inside the bound state.\n- Step 2: In fact, the bound nucleus is at a *lower* total energy than its separated nucleons. So if anything, binding energy represents what's *missing* from the bound state, not what's stored in it. Correct phrasing: \"the binding energy equals the energy required to separate the nucleus.\"", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": true}, {"question": "Why is the atomic mass unit (u) defined relative to carbon-12, and how does it relate to MeV? (3 steps)", "answer": "- Step 1: 1 u $$= \\frac{1}{12}$$ of the mass of one carbon-12 atom. Carbon-12 was chosen as a stable, abundant, easily-measured reference standard.\n- Step 2: In SI: $$1 \\text{ u} \\approx 1.661 \\times 10^{-27}$$ kg — comparable to a single nucleon's mass, so atomic masses come out as small numbers near $$A$$.\n- Step 3: Via $$E = mc^2$$: $$1 \\text{ u} \\times c^2 \\approx 931.5$$ MeV. This means a mass defect of $$\\Delta m$$ in u, multiplied by 931.5, gives the binding energy directly in MeV — no $$c^2$$ arithmetic needed.\n\nPractical shortcut: mass in u × 931.5 = energy in MeV.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "Sketch the shape of the binding-energy-per-nucleon curve, describing its key features. (3 steps)", "answer": "- Step 1: Plot $$B/A$$ (MeV per nucleon) on the y-axis vs. $$A$$ (nucleon number) on the x-axis. The curve starts near 0 at hydrogen, rises steeply through light nuclei.\n- Step 2: There's an anomalous peak at $$^4\\text{He}$$ (≈ 7 MeV/nucleon) — helium is unusually stable. The curve then climbs more gently through medium nuclei to a broad peak around iron-56 at ≈ 8.8 MeV/nucleon.\n- Step 3: Beyond iron, $$B/A$$ slowly declines as proton-proton electrostatic repulsion grows faster than the (short-range) strong force can contain. Heavy nuclei like U-235 sit at ≈ 7.6 MeV/nucleon — *less* tightly bound than iron.\n\nKey visual: a steep rise on the left, a broad peak at iron, and a slow decline on the right.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "Why do *both* fission of heavy nuclei *and* fusion of light nuclei release energy? (3 steps)", "answer": "- Step 1: Energy is released whenever the products have higher $$B/A$$ than the reactants — i.e., whenever the reaction moves \"uphill\" on the binding-energy-per-nucleon curve. Higher $$B/A$$ = nucleons are more tightly bound = the system sits in a lower energy state.\n- Step 2: Fission: a heavy nucleus (e.g. U-235, $$B/A \\approx 7.6$$ MeV) splits into two medium nuclei (Ba, Kr, $$B/A \\approx 8.5$$ MeV). Products are *higher* on the curve → energy released. This walks left toward iron.\n- Step 3: Fusion: two light nuclei (e.g. H, D, very low $$B/A$$) combine into a heavier nucleus (He-4, $$B/A \\approx 7$$ MeV). Again products are higher on the curve → energy released. This walks right toward iron.\n\nUniversal rule: iron is the \"valley of stability.\" Everything wants to move toward it.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": true}, {"question": "Why is iron-56 the energy \"dead end\" — why can't you release energy by either fissioning or fusing iron? (2 steps)", "answer": "- Step 1: Iron-56 sits at the peak of the $$B/A$$ curve. Any rearrangement — splitting it or combining it with something — produces products with *lower* $$B/A$$. That requires energy input, not release.\n- Step 2: This is why stellar cores accumulate iron at the end of a massive star's life: once fusion reaches iron, no further reaction can power the star. The core collapses, and you get a supernova. All heavier elements (gold, uranium) are made in those explosions, not in ordinary stellar fusion.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "Why does nuclear fission require a *slow* neutron, and what role do moderators play in a reactor? (3 steps)", "answer": "- Step 1: For a nucleus like U-235 to absorb a neutron and become unstable, the neutron must spend enough time near the nucleus to be captured. A fast neutron whizzes past without being absorbed.\n- Step 2: A slow (\"thermal\") neutron has low kinetic energy and lingers long enough to be absorbed, triggering fission. So the chain reaction depends on having lots of slow neutrons.\n- Step 3: But fission *produces* fast neutrons. A moderator (water, graphite) is a material that slows them down by elastic collisions before they escape, so they can induce further fission. Without a moderator, the chain reaction would die out.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": true}, {"question": "What's the difference between a nuclear reactor and a nuclear bomb, given that both use fission chain reactions? (2 steps)", "answer": "- Step 1: The physics is identical: each fission produces 2–3 neutrons, which can trigger further fissions — a chain reaction. The key parameter is the \"multiplication factor\" $$k$$ (average number of new fissions per current fission).\n- Step 2: A reactor uses **control rods** (boron, cadmium — neutron absorbers) to hold $$k \\approx 1$$ exactly — steady-state, controlled power. A bomb removes any such absorber and assembles a supercritical mass ($$k > 1$$) so neutrons multiply explosively. The difference is *control*, not physics.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": true}, {"question": "Why does fusion require enormous temperatures, while fission doesn't? (3 steps)", "answer": "- Step 1: For fusion, two positively charged nuclei must approach within the very short range of the strong force (≈ 1 fm). On the way in, they feel huge electrostatic repulsion (Coulomb barrier).\n- Step 2: To overcome this barrier, the nuclei need enormous kinetic energy — which means enormous temperature ($$> 10^7$$ K in stellar cores; even higher for D-T fusion on Earth).\n- Step 3: Fission, by contrast, is *triggered* — a slow neutron (no charge, no Coulomb barrier) walks into a heavy nucleus and destabilises it. No high temperature needed because there's no electrostatic barrier to overcome.\n\nThis is why stars fuse but Earth (mostly) fissions — fusion is hard, fission is easy to trigger.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": true}, {"question": "Why do nuclear bombs release so much more energy per kilogram than chemical bombs? (3 steps)", "answer": "- Step 1: Chemical reactions rearrange electron bonds, with energy scales of ~eV per molecule.\n- Step 2: Nuclear reactions rearrange nucleons, with energy scales of ~MeV per nucleon — about a million times larger.\n- Step 3: So gram-for-gram, fission releases about $$10^6$$ times more energy than the strongest chemical reaction. A few kg of U-235 has the energy yield of thousands of tonnes of TNT.\n\nTakeaway: the factor of a million comes directly from the eV-vs-MeV gap between electronic and nuclear binding.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": true}, {"question": "Explain why particle and antiparticle annihilate into *two* photons rather than one. (3 steps)", "answer": "- Step 1: A single photon, by itself, cannot carry away both the energy *and* zero net momentum of a stationary $$e^+ e^-$$ pair. A photon's energy and momentum are related by $$E = pc$$, with $$p \\neq 0$$.\n- Step 2: If the pair annihilates at rest, total momentum before = 0. So after, total momentum must also be 0. One photon can't have zero momentum (it would have zero energy). Two back-to-back photons can — their momenta cancel.\n- Step 3: Hence: $$e^- + e^+ \\rightarrow \\gamma + \\gamma$$, emitted in opposite directions, each carrying $$m_e c^2 \\approx 0.511$$ MeV.\n\nIt's a momentum-conservation requirement, not a coincidence.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": true}, {"question": "Why does pair production require a minimum photon energy of $$E = 2mc^2$$, not just $$mc^2$$? (2 steps)", "answer": "- Step 1: Pair production creates *both* a particle and its antiparticle (e.g. electron + positron) — you cannot create one without the other (charge conservation, lepton conservation).\n- Step 2: Each requires at least its rest mass energy $$mc^2$$ to bring into existence. So the minimum photon energy is $$2mc^2$$. For an electron-positron pair: $$2 \\times 0.511 = 1.022$$ MeV.\n\nCommon trap: forgetting the factor of 2. The photon has to pay for *both* particles' rest masses.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": true}, {"question": "Walk through, qualitatively, why an electron accelerated through a potential difference $$V$$ gains kinetic energy $$eV$$. (2 steps)", "answer": "- Step 1: Definition of potential difference: $$V$$ joules of work are done per coulomb of charge moved through it. So moving charge $$Q$$ across $$V$$ does work $$QV$$.\n- Step 2: For an electron, $$Q = e$$, so work done = $$eV$$. If the electron starts at rest, all this work becomes kinetic: $$\\frac{1}{2} m_e v^2 = eV$$, giving $$v = \\sqrt{2eV/m_e}$$.\n\nTakeaway: $$eV$$ is literally the energy gained per electron per volt — that's why the unit \"electronvolt\" exists.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": true}, {"question": "In a magnetic field, charged particles follow circular arcs with $$r = mv/(BQ)$$. Qualitatively, what changes the radius? (3 steps)", "answer": "- Step 1: A stronger field $$B$$ → tighter arc (smaller $$r$$). The magnetic force grows, providing more centripetal acceleration per unit speed.\n- Step 2: A heavier or faster particle ($$mv$$ larger) → wider arc (larger $$r$$). More momentum means more \"stiffness\" against being bent.\n- Step 3: A larger charge $$Q$$ → tighter arc. Bigger charge couples more strongly to the field.\n\nMnemonic: radius scales with momentum-per-charge ($$p/(BQ)$$). Heavier/faster/lower-charge particles sweep larger arcs in the same field — which is how mass spectrometers separate isotopes.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "Why is the cyclotron's frequency independent of the particle's speed? (3 steps)", "answer": "- Step 1: The period of a charged particle's circular motion in a magnetic field is $$T = 2\\pi m / (BQ)$$. Notice — no $$v$$ in the formula.\n- Step 2: As the particle speeds up, its radius grows ($$r = mv/BQ$$) but its circumference grows in exactly the same proportion. So the time to complete a circle stays the same.\n- Step 3: This means a fixed-frequency alternating voltage between the cyclotron's dees stays in sync with the particle through every loop, accelerating it on each crossing — that's the whole design principle.\n\n(This breaks down at relativistic speeds because $$m$$ effectively increases — hence \"synchrocyclotrons.\")", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "Verify, using quark charges, that a proton has charge $$+e$$ and a neutron has charge 0. (2 steps)", "answer": "- Step 1: Up quark = $$+\\frac{2}{3}e$$, down quark = $$-\\frac{1}{3}e$$. Proton = uud: $$\\frac{2}{3} + \\frac{2}{3} - \\frac{1}{3} = +1e$$. ✓\n- Step 2: Neutron = udd: $$\\frac{2}{3} - \\frac{1}{3} - \\frac{1}{3} = 0$$. ✓\n\nThis is why a neutron is \"neutral\" without being elementary — its quarks' charges happen to cancel.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "Why was the discovery that protons and neutrons are not elementary (they're made of quarks) revolutionary, given that quarks were never observed alone?", "answer": "- Step 1: Quarks experience \"colour confinement\" — the strong force between them *grows* with separation. Try to pull two quarks apart, and the energy you supply creates a new quark-antiquark pair instead of freeing the original. So isolated quarks are physically impossible to produce.\n- Step 2: Their existence was confirmed indirectly — by deep inelastic scattering (electrons fired at protons revealed three point-like scattering centres inside), by charge patterns in baryons/mesons, and by jet structure in high-energy collisions.\n- Step 3: This established that what looked elementary (protons) was actually composite — extending the reductionist programme of physics one more layer down. Whether quarks themselves are composite is still open.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": true}, {"question": "Carbon-14 has a half-life of 5730 years. Without computing exact seconds, what's the *qualitative* size of its decay constant in SI units?", "answer": "- Step 1: $$\\lambda = \\ln 2 / t_{1/2}$$. With $$t_{1/2}$$ measured in years, we'd get $$\\lambda \\approx 0.693/5730 \\approx 10^{-4}$$ per year.\n- Step 2: Converting to per-second: 1 year ≈ $$3 \\times 10^7$$ s, so $$\\lambda$$ in $$s^{-1}$$ is about $$10^{-4}/(3 \\times 10^7) \\approx 10^{-12}$$ s$$^{-1}$$.\n- Step 3: That's the right order of magnitude for any nucleus with millennia-scale half-life. Conceptually: each C-14 nucleus has roughly a one-in-a-trillion chance of decaying per second.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": false}, {"question": "A radioactive sample with half-life 5 min is measured over 25 min. Without numerical calculation, what fraction of the original nuclei remain, and what does this teach about scaling?", "answer": "- Step 1: 25 min / 5 min = 5 half-lives.\n- Step 2: After 5 half-lives, $$N/N_0 = (1/2)^5 = 1/32$$.\n- Step 3: Exponential decay falls off shockingly fast: after just 5 half-lives, ~97% has decayed; after 10 half-lives (50 min), ~99.9% has gone. This is why short half-lives are useful in medicine (the tracer clears quickly) and dangerous in fallout (long-half-life isotopes persist for centuries).", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "Why is the binding energy per nucleon of $$^4\\text{He}$$ anomalously high compared with its neighbours? (2 steps)", "answer": "- Step 1: $$^4\\text{He}$$ contains 2 protons and 2 neutrons — exactly closed shells in the simple nuclear shell model (similar to noble gas electrons). This makes it exceptionally stable.\n- Step 2: Its $$B/A$$ peaks at ~7 MeV/nucleon, well above lithium ($$^7\\text{Li}$$) which is heavier but less bound. This is why alpha particles (= He-4 nuclei) are emitted as a *unit* in alpha decay — they're a particularly stable \"package\" that wants to come out together.\n\nThis is also why stellar fusion processes (proton-proton chain) deliver so much energy: the first step that reaches He-4 jumps far up the $$B/A$$ curve.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "A mass defect of $$\\Delta m = 0.03 \\text{ u}$$ corresponds to roughly what binding energy? Walk through the unit-conversion logic. (2 steps)", "answer": "- Step 1: The shortcut is: (mass defect in u) × 931.5 = (energy in MeV). The 931.5 already has $$c^2$$ built in.\n- Step 2: $$0.03 \\times 931.5 \\approx 28$$ MeV. No need to multiply by $$c^2$$ again — that's the classic trap when mass is already in u.\n\nContrast: if mass were in kg, then $$\\Delta E = \\Delta m c^2$$ gives joules, and you'd divide by $$1.6 \\times 10^{-19}$$ to get eV.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": true}, {"question": "Estimate (conceptually) how much energy is released per fission of U-235 by reading the $$B/A$$ curve. (3 steps)", "answer": "- Step 1: U-235 sits at $$B/A \\approx 7.6$$ MeV. Fission products (Ba, Kr) sit at $$B/A \\approx 8.5$$ MeV. The jump up the curve is about 0.9 MeV per nucleon.\n- Step 2: Multiply by total nucleon number 235: $$235 \\times 0.9 \\approx 210$$ MeV per fission.\n- Step 3: This matches the textbook \"~200 MeV per fission\" — and emphasises that the energy comes from the *uphill journey on the $$B/A$$ curve*, not from any single \"magic\" reaction. The arithmetic is just multiplying the height gain by the nucleon count.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": true}, {"question": "In a $$\\beta^-$$ decay, what conserves and what changes? Why is this consistent with the underlying physics?", "answer": "- Step 1: **Conserved**: nucleon number $$A$$ (a neutron becomes a proton — same number of heavy particles); charge (gain a proton +1, emit electron −1, net zero change); lepton number (electron +1, antineutrino −1, balances to zero).\n- Step 2: **Changes**: proton number $$Z$$ goes up by 1 (element changes); neutron number goes down by 1; energy is released (the daughter sits at higher $$B/A$$, so the parent slid downhill).\n- Step 3: This is internally consistent because the underlying event is \"one quark inside a neutron flips flavour\" (d → u + W^−, W^− → e^− + antineutrino). The bookkeeping at the nuclear level is just the accounting of that quark-level event.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": true}, {"question": "Why is gamma emission usually a *secondary* process — accompanying alpha or beta decay rather than happening alone? (2 steps)", "answer": "- Step 1: After alpha or beta decay, the daughter nucleus often ends up in an *excited* energy state — its nucleons are arranged in a not-yet-lowest configuration.\n- Step 2: The nucleus de-excites by emitting a high-energy photon (gamma ray) — the nuclear equivalent of an atomic electron dropping to a lower orbital. No change in $$A$$ or $$Z$$ — just shedding excess energy. That's why gamma emission tags along with other decays rather than being a standalone decay mode for the parent.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": true}, {"question": "Why must we use a *large* sample of nuclei to measure a half-life, even though the formula $$t_{1/2} = \\ln 2 / \\lambda$$ is exact?", "answer": "- Step 1: $$\\lambda$$ is a *probability* per nucleus per second. With a single nucleus, you can't measure a probability — you only get one outcome (decay at time $$t$$, once).\n- Step 2: With many nuclei, the statistical spread shrinks as $$1/\\sqrt{N}$$ (Poisson statistics). A sample of $$10^{12}$$ atoms gives count rates accurate to one part in a million — sharp enough to fit an exponential and extract $$\\lambda$$ precisely.\n- Step 3: This is exactly the same principle as why dice statistics need many rolls to reveal that each face has probability 1/6, even though the probability itself is exact.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": true}, {"question": "Sketch why the activity-vs-time graph is a *straight line* on a log-linear plot. (2 steps)", "answer": "- Step 1: $$A(t) = A_0 e^{-\\lambda t}$$. Taking the natural log: $$\\ln A = \\ln A_0 - \\lambda t$$.\n- Step 2: This is linear in $$t$$, with slope $$-\\lambda$$ and intercept $$\\ln A_0$$. So on a semi-log plot, exponential decay shows up as a straight line — and the *slope* directly gives you $$\\lambda$$.\n\nPractical use: experimentalists almost always plot log(count rate) vs time, fit a straight line, and extract $$\\lambda$$ from the slope. Much easier than fitting an exponential by eye.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": false}, {"question": "A photon undergoes pair production into an electron-positron pair. Without computing exact frequency, why must the photon's frequency be in the gamma-ray range?", "answer": "- Step 1: Minimum photon energy $$E_\\gamma = 2 m_e c^2 \\approx 1.02$$ MeV.\n- Step 2: Photon energy is $$E = hf$$. With $$E \\sim 10^{-13}$$ J and $$h \\sim 10^{-34}$$ J·s, frequency $$f \\sim 10^{20}$$ Hz.\n- Step 3: Visible light is $$\\sim 10^{15}$$ Hz; X-rays are $$\\sim 10^{18}$$ Hz; only gamma rays reach $$\\sim 10^{20}$$ Hz. So pair production is a gamma-only phenomenon. This is why pair production isn't observed with optical lasers — there isn't nearly enough energy per photon.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": true}, {"question": "Why is \"$$E = mc^2$$\" relevant to nuclear physics specifically, more than to chemistry? (2 steps)", "answer": "- Step 1: In chemistry, mass changes during reactions are real but unmeasurably small (~$$10^{-10}$$ of the total mass) because chemical energies are ~eV per atom — too small to register on a balance.\n- Step 2: In nuclear reactions, energy changes are ~MeV per nucleon — about a million times bigger. The corresponding mass changes (mass defect) are now ~0.1% of the nuclear mass — easily measurable with mass spectrometers. So $$E = mc^2$$ becomes a *quantitative tool* for nuclear physics, not just a principle.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": true}, {"question": "Why does the binding-energy-per-nucleon curve *decline* beyond iron, even though more nucleons mean more strong-force interactions? (3 steps)", "answer": "- Step 1: The strong nuclear force is short-range (~1 fm). Each nucleon only feels its immediate neighbours. So beyond a certain size, adding more nucleons doesn't proportionally increase strong-force binding per nucleon — it saturates.\n- Step 2: But electrostatic repulsion between protons is *long-range* (1/r²). Every proton repels every other proton, no matter how far apart. So as $$Z$$ grows, the repulsive contribution scales faster than the binding contribution.\n- Step 3: The result: $$B/A$$ slowly *decreases* for $$A > 56$$, because the repulsion is winning the race against saturating binding. This is why super-heavy nuclei (U, Pu) are unstable and want to fission.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": false}, {"question": "A nucleus with $$\\Delta m = 0.034$$ u releases how much binding energy in MeV, and why is no $$c^2$$ arithmetic needed? (2 steps)", "answer": "- Step 1: Use the conversion 1 u = 931.5 MeV/c². For energy: $$\\Delta E = \\Delta m \\times c^2 = 0.034 \\times 931.5 \\approx 31.7$$ MeV.\n- Step 2: The 931.5 factor *already* has the $$c^2$$ embedded — it's the energy equivalent of 1 u. So once your mass is in u, you do NOT multiply by $$c^2$$ again. That double-multiplication is one of the most common exam errors. If your mass were in kg, then you'd need the explicit $$\\times c^2$$.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": true}, {"question": "Why do beta decays produce a continuous *spectrum* of electron energies, while alpha decays produce discrete energies? (3 steps)", "answer": "- Step 1: Alpha decay is a two-body process: parent → daughter + alpha. With two bodies and fixed total energy/momentum, the alpha gets a unique fixed kinetic energy. So you see a sharp line.\n- Step 2: Beta decay is a *three-body* process: parent → daughter + electron + antineutrino. The total energy is shared between three particles, with the antineutrino taking a variable share.\n- Step 3: So the electron can get anywhere from 0 up to the maximum (when the antineutrino gets nothing). The continuous spectrum was historically the smoking gun that a *third* particle (the neutrino) must exist — Pauli proposed it in 1930 to save energy conservation.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": true}, {"question": "Why might a long-lived radioisotope (e.g. uranium-238, $$t_{1/2} \\approx 4.5 \\times 10^9$$ yr) still be present on Earth, while a short-lived one (e.g. polonium-214, $$t_{1/2} \\approx 0.16$$ ms) cannot exist primordially? (2 steps)", "answer": "- Step 1: Uranium-238's half-life is comparable to the age of the Earth (~$$4.5 \\times 10^9$$ yr). So roughly half the original U-238 is still around — it was forged in supernovae before the solar system formed.\n- Step 2: Polonium-214's half-life is fractions of a millisecond. Any primordial Po-214 would have decayed within microseconds. The only reason any Po-214 exists today is that it's continuously *produced* as an intermediate in the U-238 decay chain — it's transient, not stored.\n\nTakeaway: primordial isotopes need half-lives comparable to or longer than the age of the universe; everything else is either daughter-product or man-made.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": true}, {"question": "Why does the linac (linear accelerator) have *progressively longer* drift tubes? (3 steps)", "answer": "- Step 1: The accelerator uses a fixed-frequency AC voltage. To stay in sync, the ion must spend the same *time* inside each drift tube (where it coasts shielded from the field).\n- Step 2: But the ion *speeds up* each time it crosses a gap (gaining kinetic energy from $$eV$$). So to cover the same time in less time per unit length, the tube must be longer.\n- Step 3: Mathematically, $$L_n \\propto v_n \\propto \\sqrt{n}$$ (for non-relativistic ions). Each successive tube is longer to match the ion's increasing speed. This is the elegance of the linac design — uniform timing despite changing speed.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": true}, {"question": "Why is the half-life of an isotope a *poor* description of a single nucleus but a *good* description of a sample? (2 steps)", "answer": "- Step 1: For a single nucleus, \"half-life\" is meaningless — the nucleus either decays or doesn't, and the moment is random. There's no \"halfway\" for one object.\n- Step 2: For a large sample, $$t_{1/2}$$ is precisely the time after which the *expected fraction* surviving is 1/2 — and statistical fluctuations are negligible. So half-life is fundamentally a *statistical* concept, only meaningful en masse. A useful analogy: \"average life expectancy\" makes sense for a population but not for any single individual.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": false}, {"question": "Why is the decay chain of U-238 a *sequence* of decays (alpha then beta then alpha...) rather than a single big rearrangement? (2 steps)", "answer": "- Step 1: Each decay step is a small, local rearrangement that the nucleus can spontaneously perform — typically a small piece (alpha) breaking off, or a single quark flavour flip (beta). Each step moves the nucleus only a short distance on the $$B/A$$ curve.\n- Step 2: A single large rearrangement (jumping directly from U-238 to Pb-206) would require many simultaneous quantum events, which is astronomically improbable. So the nucleus walks downhill one step at a time, often crossing several intermediate isotopes, each with its own half-life — until it lands on stable lead.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": true}], "count": 55}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "What do the symbols $$A$$ and $$Z$$ represent in the notation $$^{A}_{Z}X$$, and how do you obtain the neutron count from them? (3 steps)", "answer": "- Step 1: $$Z$$ is the **proton number** (also called atomic number) — it counts the protons in the nucleus and uniquely identifies the chemical element.\n- Step 2: $$A$$ is the **nucleon number** (also called mass number) — it counts protons + neutrons together, i.e. the total number of heavy particles in the nucleus.\n- Step 3: The neutron count $$N$$ is obtained by subtraction: $$N = A - Z$$. So for $$^{235}_{92}U$$ there are $$92$$ protons and $$235-92 = 143$$ neutrons.\n\nKey insight: $$Z$$ alone fixes the element; $$A$$ varies between isotopes of that element.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "Why does changing the neutron count of an atom give you a different isotope rather than a different element?", "answer": "The chemical identity of an atom is determined entirely by its proton number $$Z$$, because $$Z$$ controls the electric charge of the nucleus, which in turn determines how many electrons orbit it and therefore the chemistry. Neutrons are electrically neutral, so adding or removing them changes the mass but does not change the element. Same $$Z$$, different $$N$$ → same element, different isotope. This is why $$^{12}C$$ and $$^{14}C$$ are both carbon and behave identically chemically, even though $$^{14}C$$ is radioactive and $$^{12}C$$ is not.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "In the Rutherford gold-foil experiment, three distinct observations were made. State each observation and the structural conclusion drawn from it. (3 steps)", "answer": "- Step 1: **Most alpha particles passed straight through** the gold foil → the atom is mostly empty space (electrons are sparse and the nucleus is tiny relative to atomic dimensions).\n- Step 2: **A small fraction were deflected at small angles** ($$<10°$$) → there is a concentration of positive charge somewhere in the atom, repelling the (positive) alphas as they pass nearby.\n- Step 3: **A tiny fraction bounced back at large angles** ($$>90°$$) → the positive charge is concentrated in an extremely small, dense region (the nucleus) which also carries essentially all the atomic mass — only something tiny and massive could turn a fast alpha around.\n\nThis experiment killed the \"plum pudding\" model and established the nuclear model.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": true}, {"question": "Why is the gold foil in the Rutherford experiment described as \"mostly empty space\" rather than \"completely empty\"? Estimate the size ratio.", "answer": "The atom has a diameter of roughly $$10^{-10} \\text{ m}$$ while the nucleus has a diameter of roughly $$10^{-15} \\text{ m}$$ — a ratio of about $$10^{5}$$. So the atom is about 100,000 times wider than its nucleus. If you scaled the nucleus up to the size of a marble, the atom would be about the size of a football stadium. Most alphas pass through without coming near a nucleus, but the nucleus is still *there* — it's just sparsely distributed in the bulk of the foil.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "Name examples of natural and man-made sources of background radiation, and explain why background must be subtracted in radioactivity experiments. (3 steps)", "answer": "- Step 1: **Natural sources**: cosmic rays from the Sun and outer space, radon gas seeping from rocks (especially granite), radioactive isotopes in food (e.g. potassium-40 in bananas), carbon-14 in the atmosphere.\n- Step 2: **Man-made sources**: medical/dental X-rays, fallout from past weapons tests, nuclear medicine, nuclear power waste.\n- Step 3: A Geiger counter near a source measures (source counts + background counts) per second. If you don't subtract background, the measured count never falls to zero — it asymptotes to the background level — which artificially **lengthens** your half-life estimate. The correct quantity is (measured count rate) − (background count rate).", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "Rank the three principal types of nuclear radiation by penetrating power and by ionising power. Why do these two rankings run in opposite directions? (3 steps)", "answer": "- Step 1: **Penetrating power** (most → least): $$\\gamma > \\beta > \\alpha$$. Gamma can pass through several cm of lead; beta is stopped by a few mm of aluminium; alpha is stopped by paper or skin.\n- Step 2: **Ionising power** (most → least): $$\\alpha > \\beta > \\gamma$$. Alpha rips electrons off atoms far more aggressively than gamma does.\n- Step 3: **Why opposite?** Alpha has the largest charge ($$+2e$$) and the largest mass, so it collides with electrons in its path frequently and loses energy quickly — it ionises lots but also stops fast. Gamma is a massless, uncharged photon, so it rarely interacts at all — it passes through lots of material but doesn't deposit much energy per interaction. The same physics that makes a particle ionising also makes it short-ranged.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": true}, {"question": "What is an alpha particle made of, what is its charge, and what is its (relative) mass?", "answer": "An alpha particle is the nucleus of a helium-4 atom — i.e. **2 protons + 2 neutrons** with no electrons. Its charge is $$+2e$$ (each proton contributes $$+e$$; neutrons contribute none). Its relative mass is approximately $$4$$ u (each nucleon ≈ 1 u). It is written $$^{4}_{2}\\alpha$$ or $$^{4}_{2}\\text{He}$$ in decay equations. Because it is large, slow, and doubly charged, it interacts strongly with matter — the most ionising of the three radiations.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "A beta-minus particle is described as an \"electron emitted from the nucleus\" — but the nucleus contains no electrons. Resolve this apparent contradiction. (3 steps)", "answer": "- Step 1: The beta-minus particle is not a pre-existing electron sitting in the nucleus. It is *created* at the moment of decay.\n- Step 2: Inside the nucleus, a **neutron converts into a proton**. To conserve charge (neutron is $$0$$, proton is $$+e$$), a particle of charge $$-e$$ must be emitted: that is the electron. To conserve lepton number, an electron antineutrino is also emitted.\n- Step 3: The full process is $$^1_0n \\rightarrow ^1_1p + ^{0}_{-1}\\beta + \\bar{\\nu}_e$$. So a $$\\beta^-$$ decay increases $$Z$$ by 1 (one more proton remains) while $$A$$ is unchanged (one nucleon swapped type, but the count is the same).", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": true}, {"question": "In beta-plus decay, which nucleon converts to which, what particles are emitted, and how does $$Z$$ change? (3 steps)", "answer": "- Step 1: A **proton converts into a neutron** inside the nucleus.\n- Step 2: To conserve charge (proton is $$+e$$, neutron is $$0$$), a particle of charge $$+e$$ must be emitted — the **positron** $$^{0}_{+1}\\beta$$. To conserve lepton number, an **electron neutrino** $$\\nu_e$$ is also emitted.\n- Step 3: The full process is $$^1_1p \\rightarrow ^1_0n + ^{0}_{+1}\\beta + \\nu_e$$. So $$\\beta^+$$ decay **decreases** $$Z$$ by $$1$$ (one fewer proton), while $$A$$ is unchanged.\n\nMemory hook: $$\\beta^-$$ adds a proton (Z up); $$\\beta^+$$ removes a proton (Z down). Students very commonly flip these.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": true}, {"question": "Why must a (anti)neutrino always appear in beta decay equations? What conservation law forces it?", "answer": "It is forced by **conservation of lepton number**. Electrons and electron-neutrinos carry lepton number $$+1$$; their antiparticles (positrons, electron antineutrinos) carry lepton number $$-1$$. Before the decay, the parent nucleus has lepton number $$0$$. In $$\\beta^-$$ decay, an electron (lepton number $$+1$$) is emitted, so an antineutrino (lepton number $$-1$$) must also be emitted to keep the total at $$0$$. In $$\\beta^+$$ decay, a positron (lepton number $$-1$$) is emitted, so a neutrino (lepton number $$+1$$) is needed. Historically the neutrino was *postulated* to explain \"missing energy\" in the beta spectrum before being detected — and forgetting it in an exam loses marks immediately.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": true}, {"question": "A gamma decay does not change $$A$$ or $$Z$$. So what *does* it do, and why does it happen?", "answer": "Gamma emission occurs when a nucleus is in an **excited state** (often immediately after an alpha or beta decay has left the daughter in a higher-energy configuration). The nucleons rearrange to a lower-energy arrangement, and the energy difference is carried away as a high-frequency electromagnetic photon — the gamma ray. Because the photon carries no charge and no mass, the nucleon and proton counts are unchanged: $$^A_Z X^* \\rightarrow ^A_Z X + \\gamma$$. This is the nuclear analogue of an electron dropping down between atomic shells and emitting visible light — but the energies involved (MeV) are far higher.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": true}, {"question": "Complete the alpha decay: $$^{238}_{92}U \\rightarrow ^{?}_{?}\\text{Th} + ^{4}_{2}\\alpha$$. Walk through the conservation steps. (3 steps)", "answer": "- Step 1: **Conserve nucleon number**: $$238 = A_{\\text{Th}} + 4$$, so $$A_{\\text{Th}} = 234$$.\n- Step 2: **Conserve proton number**: $$92 = Z_{\\text{Th}} + 2$$, so $$Z_{\\text{Th}} = 90$$.\n- Step 3: The decay is $$^{238}_{92}U \\rightarrow ^{234}_{90}\\text{Th} + ^{4}_{2}\\alpha$$. Every alpha decay reduces $$A$$ by $$4$$ and $$Z$$ by $$2$$.\n\nSanity check: thorium is element 90 in the periodic table. ✓", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "Write the complete beta-minus decay equation for carbon-14, including all emitted particles. (3 steps)", "answer": "- Step 1: $$\\beta^-$$ decay leaves $$A$$ unchanged and increases $$Z$$ by 1. So carbon ($$Z=6$$) becomes nitrogen ($$Z=7$$), keeping $$A=14$$.\n- Step 2: A beta-minus (electron) is emitted, written $$^{0}_{-1}\\beta$$.\n- Step 3: An electron antineutrino is also emitted (lepton number conservation): $$^{14}_{6}C \\rightarrow ^{14}_{7}N + ^{0}_{-1}\\beta + \\bar{\\nu}_e$$.\n\nThis decay is the basis of radiocarbon dating; living things continually absorb $$^{14}C$$, and once they die, the $$^{14}C$$ decays away with $$t_{1/2} \\approx 5730$$ years.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "A uranium-238 decay chain eventually terminates. What does \"terminates\" mean physically, and at what isotope does it stop?", "answer": "\"Terminates\" means the chain reaches a **stable nucleus** — one that no longer emits any radiation. For the $$^{238}U$$ chain, this stable endpoint is **lead-206** ($$^{206}_{82}\\text{Pb}$$). Along the way, the chain passes through many intermediate isotopes (thorium, protactinium, radium, radon, polonium, ...) by a mixture of alpha and beta decays. Once at Pb-206, the nucleus sits at a configuration that is energetically a local minimum — no rearrangement could release further energy — so it stays put indefinitely. \"Stable\" in nuclear physics means: no further radiation, forever (within the limits of observation).", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": true}, {"question": "Can you choose what type of radiation a particular isotope emits? Explain.", "answer": "**No.** The decay mode is dictated entirely by the structure of the nucleus — specifically, by which rearrangement releases the most energy while obeying conservation laws. A nucleus that is \"too proton-rich\" tends to undergo $$\\beta^+$$ or electron capture; one that is \"too neutron-rich\" tends to undergo $$\\beta^-$$; very heavy nuclei tend to alpha-decay. You can **choose the isotope** (e.g. pick a beta emitter for medical tracing, an alpha emitter for a smoke detector), but once you have the isotope, the decay mode is fixed by nuclear physics — you cannot tune it with temperature, pressure, or chemistry.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "What is thermionic emission, and how does it allow electrons to be accelerated through a potential difference? (3 steps)", "answer": "- Step 1: **Thermionic emission**: when a metal (e.g. a tungsten filament) is heated, its conduction electrons gain enough thermal kinetic energy to escape from the metal's surface — they \"boil off\" against the work function.\n- Step 2: Once free, these electrons can be **accelerated** across a potential difference $$V$$. The work done by the field on the electron is $$eV$$, which becomes kinetic energy: $$\\tfrac{1}{2}m_e v^2 = eV$$.\n- Step 3: Solving for speed: $$v = \\sqrt{2eV/m_e}$$. This is the principle of an electron gun (in CRTs, electron microscopes, linacs).\n\nNote: This treatment is classical. Above $$v \\sim 0.1c$$ you would need relativistic corrections.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "In a linear accelerator (linac), why do the drift tubes get progressively longer along the beamline?", "answer": "A linac applies an alternating voltage of fixed frequency across each gap between consecutive drift tubes. The particle is accelerated only in the gaps; inside each tube (which is at uniform potential), it drifts at constant speed. For the AC to push the particle every time it crosses a gap, the particle must spend **equal time** in each tube (matching the half-period of the AC). But the particle is faster after each acceleration, so to maintain equal *time* per tube, each tube must be **longer** than the last. The lengths grow as the particle's speed grows — at non-relativistic speeds, roughly $$L \\propto v \\propto \\sqrt{n}$$ where $$n$$ is the tube number.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": true}, {"question": "For a charged particle moving perpendicular to a uniform magnetic field, what determines the radius of its circular path, and what intuition does this give you about cyclotrons? (3 steps)", "answer": "- Step 1: The magnetic force provides the centripetal force: $$BQv = mv^2/r$$, so $$r = mv/(BQ) = p/(BQ)$$.\n- Step 2: **Heavier or faster particles sweep wider arcs** (numerator grows); **stronger fields or larger charges tighten the arc** (denominator grows). Momentum, not just velocity, is what matters.\n- Step 3: In a cyclotron, as particles gain energy at each gap crossing, $$p$$ grows, so $$r$$ grows — producing the characteristic outward spiral. Remarkably, the orbital **period** $$T = 2\\pi m/(BQ)$$ is **independent of speed**, which is why the cyclotron works at a single fixed AC frequency.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": true}, {"question": "Explain conceptually what annihilation is, and why it produces *two* photons rather than one. (3 steps)", "answer": "- Step 1: When a particle meets its antiparticle (e.g. electron + positron), both are destroyed, and their rest-mass energy is converted entirely to electromagnetic energy.\n- Step 2: **Why two photons?** Because momentum must be conserved. If the particle and antiparticle approach at rest (or in their centre-of-mass frame), the total initial momentum is zero. A single photon has nonzero momentum, so a single photon cannot result. Two photons emitted back-to-back can have equal and opposite momenta, conserving total momentum at zero.\n- Step 3: Energy conservation gives $$2E_\\gamma = 2mc^2$$, i.e. each photon carries energy $$mc^2$$. For an electron-positron pair, each photon has energy $$\\approx 0.511 \\text{ MeV}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": true}, {"question": "Why is the minimum photon energy for pair production $$2mc^2$$ rather than $$mc^2$$? (3 steps)", "answer": "- Step 1: Pair production creates **both** a particle and its antiparticle. Each has rest mass $$m$$, so the total rest-mass energy that must be supplied is $$2mc^2$$.\n- Step 2: The factor of 2 is not optional — you cannot create just a particle without an antiparticle (this would violate charge conservation and lepton/baryon number conservation).\n- Step 3: For electron-positron pair production: $$E_{\\min} = 2 m_e c^2 \\approx 1.022 \\text{ MeV}$$. Any photon with less than this energy simply cannot produce the pair, no matter what. (In practice, pair production also requires a nearby nucleus to absorb momentum — but the *energy* threshold is set by $$2mc^2$$.)", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": true}, {"question": "What is the quark composition of a proton and a neutron, and verify that the total charge of each comes out correctly. (3 steps)", "answer": "- Step 1: **Proton = uud** (two up quarks, one down quark). Charge sum: $$+\\tfrac{2}{3} + \\tfrac{2}{3} - \\tfrac{1}{3} = +1e$$. ✓\n- Step 2: **Neutron = udd** (one up quark, two down quarks). Charge sum: $$+\\tfrac{2}{3} - \\tfrac{1}{3} - \\tfrac{1}{3} = 0$$. ✓\n- Step 3: This is why $$\\beta^-$$ decay \"converts a neutron to a proton\": at the quark level, one down quark transforms into an up quark (mediated by the weak force, emitting a $$W^-$$ which then decays to electron + antineutrino).", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "What is meant by the \"random nature of nuclear decay\", and what *can* you predict about a radioactive sample? (3 steps)", "answer": "- Step 1: For a **single nucleus**, you cannot predict when it will decay. There is no internal clock, no aging — at every moment, an undecayed nucleus has the same probability per second of decaying. The decay is fundamentally probabilistic, not deterministic.\n- Step 2: What you *can* state is the **probability per unit time** that any given nucleus decays — this is the decay constant $$\\lambda$$.\n- Step 3: For a **large sample** of $$N$$ nuclei, statistical regularity emerges. The expected number of decays per second is $$A = \\lambda N$$, and the number of survivors follows the exponential law $$N(t) = N_0 e^{-\\lambda t}$$ with very small fractional fluctuations.\n\nThe analogy: you can't predict any one coin flip, but you can predict that 1000 flips will give close to 500 heads.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "Define the decay constant $$\\lambda$$ and the activity $$A$$, and explain the relation $$A = \\lambda N$$. (3 steps)", "answer": "- Step 1: **Decay constant** $$\\lambda$$: the probability per second that any given nucleus will decay. Units: $$s^{-1}$$. It is a fixed property of the isotope.\n- Step 2: **Activity** $$A$$: the actual rate of decays in a sample (decays per second). Units: becquerel (Bq), where $$1 \\text{ Bq} = 1 \\text{ decay s}^{-1}$$.\n- Step 3: If each of $$N$$ nuclei has probability $$\\lambda$$ per second to decay, then the expected number of decays per second is $$A = \\lambda N$$. This links the *microscopic* probability to the *macroscopic* observable.\n\nKey trap: $$N$$ is the **number of nuclei**, not mass or moles. Convert if necessary: $$N = (\\text{mass}/M_r) \\times N_A$$.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "Derive the exponential decay law $$N(t) = N_0 e^{-\\lambda t}$$ starting from the definition of activity. (3 steps)", "answer": "- Step 1: The activity is the rate at which $$N$$ decreases (each decay removes one nucleus): $$\\dfrac{dN}{dt} = -\\lambda N$$. The minus sign captures that $$N$$ falls.\n- Step 2: This is a separable ODE: $$\\dfrac{dN}{N} = -\\lambda \\, dt$$. Integrating both sides: $$\\ln N = -\\lambda t + C$$.\n- Step 3: Applying initial condition $$N(0) = N_0$$ gives $$C = \\ln N_0$$, so $$\\ln(N/N_0) = -\\lambda t$$, i.e. $$N(t) = N_0 e^{-\\lambda t}$$. Activity follows the same form: $$A(t) = \\lambda N(t) = A_0 e^{-\\lambda t}$$.\n\nIntuition: at every moment, a fixed *fraction* of the remaining nuclei decay per second — that's the signature of exponential decay.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "Derive the relationship between the half-life $$t_{1/2}$$ and the decay constant $$\\lambda$$. (3 steps)", "answer": "- Step 1: Half-life is defined by the condition $$N(t_{1/2}) = N_0/2$$.\n- Step 2: Substitute into the decay law: $$\\tfrac{1}{2} = e^{-\\lambda t_{1/2}}$$.\n- Step 3: Take natural log of both sides: $$-\\ln 2 = -\\lambda t_{1/2}$$, so $$t_{1/2} = \\dfrac{\\ln 2}{\\lambda} \\approx \\dfrac{0.693}{\\lambda}$$.\n\nSo large $$\\lambda$$ (high decay probability) ↔ short half-life, and vice versa. Note half-life depends *only* on $$\\lambda$$ — not on $$N_0$$, temperature, pressure, or chemistry.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "Why is the half-life of a radioisotope independent of temperature, pressure, and chemical state?", "answer": "Nuclear decay is driven by physics inside the nucleus — the strong and weak forces between nucleons — operating on energy scales of MeV. Temperature, pressure, and chemical bonding affect the *electron cloud* of the atom, operating on energy scales of eV (a million times smaller). These external conditions are utterly negligible compared to nuclear energies, so they cannot influence whether a nucleon rearranges. Whether your uranium atom is at $$0\\degree$$ C or $$1000\\degree$$ C, in a vacuum or under pressure, free or chemically bonded — its decay probability per second is the same. Half-life is **intrinsic** to the isotope.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": true}, {"question": "A radioactive sample has half-life $$20$$ min and initial activity $$800$$ Bq. Estimate its activity after $$1$$ hour, using mental arithmetic. (3 steps)", "answer": "- Step 1: Count the number of half-lives in $$1$$ hour: $$60/20 = 3$$ half-lives.\n- Step 2: Each half-life multiplies activity by $$\\tfrac{1}{2}$$. So $$A = 800 \\times (\\tfrac{1}{2})^3 = 800/8$$.\n- Step 3: $$A = 100 \\text{ Bq}$$.\n\nThe key conceptual move is recognising that for *whole numbers* of half-lives, the activity simply gets halved repeatedly — no calculator needed. This is the basis of the \"magic table\" method: list half-lives, time elapsed, and activity in a table, halving the activity at each row.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "A sample's mass falls from $$8$$ g to $$0.25$$ g. How many half-lives have elapsed? Walk through the reasoning. (3 steps)", "answer": "- Step 1: The mass ratio is $$0.25/8 = 1/32$$.\n- Step 2: Each half-life multiplies the mass by $$1/2$$, so after $$n$$ half-lives the ratio is $$(1/2)^n$$. Set equal: $$(1/2)^n = 1/32$$.\n- Step 3: Recognise $$32 = 2^5$$, so $$n = 5$$. Five half-lives have elapsed.\n\nThis is one of the fastest mental shortcuts in nuclear physics: memorise the powers of 2 ($$2, 4, 8, 16, 32, 64, ...$$) and look up $$n$$ directly.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": true}, {"question": "A graph of count rate vs time appears to plateau at a nonzero value rather than falling to zero. Why? And what does this imply for half-life analysis?", "answer": "The graph plateaus because the detector is also picking up **background radiation** from the environment — cosmic rays, radon, etc. — which is always present even when the source has fully decayed. To analyse correctly, you must subtract this background count rate from every measurement *before* computing half-life. If you forget, your apparent count rate never halves to zero, and any half-life estimate is systematically too long. The corrected quantity is (measured rate − background rate), which decays cleanly to zero following $$A = A_0 e^{-\\lambda t}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": true}, {"question": "What is the mass defect of a nucleus, and why is it always positive (i.e. why is the bound nucleus lighter than its constituents)? (3 steps)", "answer": "- Step 1: **Definition**: $$\\Delta m = Z m_p + (A-Z) m_n - m_{\\text{nucleus}}$$. This is the mass of the separated protons and neutrons *minus* the actual mass of the bound nucleus.\n- Step 2: Experimentally, $$\\Delta m > 0$$ for every stable nucleus. The bound state is **less massive** than the scattered constituents.\n- Step 3: **Why?** Because the bound state has *lower energy* than the separated state (that's what \"bound\" means — you'd have to add energy to pull them apart). By Einstein's $$E = mc^2$$, lower energy means lower mass. The missing mass *is* the binding energy, divided by $$c^2$$.\n\nThis is one of the deepest results in physics: mass and energy are interchangeable, and binding manifests as a literal mass deficit.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": true}, {"question": "A student says \"the binding energy is the energy stored inside the nucleus\". Why is this wrong?", "answer": "Binding energy is **not** energy that the nucleus possesses — it is energy you would have to **supply** to dismantle the nucleus into separated nucleons. The bound state actually has *less* energy (and less mass) than the separated state. The nucleus sits in an energy well; binding energy is the *depth* of that well. Saying \"the nucleus stores binding energy\" is like saying \"the bottom of a valley stores gravitational potential energy\" — it gets the sign wrong. The correct phrasing: \"the nucleus is bound by an energy of X MeV\", or \"X MeV is required to separate the nucleus into its constituent nucleons\".", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": true}, {"question": "Why is the atomic mass unit (u) defined relative to carbon-12, and what is the convenient energy equivalent? (3 steps)", "answer": "- Step 1: **Definition**: $$1 \\text{ u} = \\tfrac{1}{12} m(^{12}_{6}C)$$, i.e. one-twelfth the mass of a neutral carbon-12 atom. Carbon-12 is chosen because it's stable, abundant, and easy to measure precisely.\n- Step 2: Numerically, $$1 \\text{ u} \\approx 1.661 \\times 10^{-27} \\text{ kg}$$.\n- Step 3: The energy equivalent via $$E = mc^2$$ is $$1 \\text{ u} \\times c^2 \\approx 931.5 \\text{ MeV}$$. So if you compute a mass defect in u, you can convert directly to MeV by multiplying by $$931.5$$ — no $$c^2$$ needed because it's already absorbed into the unit.\n\nThis shortcut is enormously practical in nuclear calculations.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "A nucleus has mass defect $$\\Delta m = 0.03 \\text{ u}$$. Estimate its binding energy in MeV without using a calculator. (3 steps)", "answer": "- Step 1: Recall $$1 \\text{ u} \\leftrightarrow 931.5 \\text{ MeV}/c^2$$, so the $$c^2$$ is \"built in\" when you multiply.\n- Step 2: $$\\Delta E = \\Delta m \\times 931.5 \\text{ MeV} = 0.03 \\times 931.5 \\text{ MeV}$$.\n- Step 3: $$0.03 \\times 931.5 \\approx 0.03 \\times 930 \\approx 27.9 \\text{ MeV}$$.\n\nSanity check: this is the right order of magnitude for a small nucleus (binding energy per nucleon is around $$8$$ MeV, so $$\\sim 30$$ MeV total suggests $$A \\sim 4$$, which fits e.g. helium-4).", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "Describe the shape of the binding-energy-per-nucleon curve from $$A=1$$ to $$A \\approx 240$$, including the location of its peak. (3 steps)", "answer": "- Step 1: **Steep rise from low $$A$$**: From hydrogen ($$B/A \\approx 0$$) the curve climbs rapidly, with a notable spike at helium-4 ($$\\sim 7$$ MeV) — an unusually stable \"doubly magic\" nucleus.\n- Step 2: **Gentle climb to the peak**: Through medium nuclei the curve rises more gradually, peaking near **iron-56** at roughly $$8.8$$ MeV/nucleon — the most tightly bound nucleus.\n- Step 3: **Slow decline beyond iron**: For heavier nuclei, $$B/A$$ slowly decreases (down to $$\\sim 7.6$$ MeV at uranium) because electrostatic repulsion among many protons partially counteracts the strong force.\n\nUniversal rule: energy is released whenever a nuclear reaction *moves products higher on this curve*.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "Using the binding-energy-per-nucleon curve, explain why *both* fission of heavy nuclei *and* fusion of light nuclei release energy. (3 steps)", "answer": "- Step 1: Energy is released in any nuclear reaction whose products have **higher total binding energy** than the reactants — equivalently, whose products sit higher on the $$B/A$$ curve.\n- Step 2: **Fission**: Heavy nuclei (e.g. $$^{235}U$$, far right) have lower $$B/A$$ ($$\\sim 7.6$$ MeV) than medium nuclei ($$\\sim 8.5$$ MeV). Splitting a heavy nucleus into two medium nuclei moves the system *up* the curve → energy released.\n- Step 3: **Fusion**: Very light nuclei (e.g. hydrogen, far left) have very low $$B/A$$. Fusing them into a slightly heavier nucleus (e.g. helium-4) moves the system *up* the steep left slope → energy released. Both processes converge toward iron-56, the peak.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": true}, {"question": "Why is fission of $$^{235}U$$ usually induced by a *slow* (thermal) neutron rather than a fast one?", "answer": "A slow neutron has a much higher probability of being **absorbed** by the uranium nucleus, because it spends more time in the vicinity of the nucleus and is more likely to be captured into a bound state. A fast neutron tends to scatter off without being absorbed. Once absorbed, the resulting $$^{236}U$$ is in a highly excited state and undergoes fission within $$\\sim 10^{-12}$$ s. This is why reactors use a **moderator** (water, graphite) to slow down the fast neutrons emitted by previous fissions — slow neutrons are essential for sustaining the chain reaction.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "In a nuclear fission reactor, what is the role of (a) the moderator and (b) the control rods? (3 steps)", "answer": "- Step 1: **Moderator** (e.g. water, graphite): Slows down the fast neutrons emitted by fission to \"thermal\" (slow) speeds, because slow neutrons are far more likely to be absorbed by $$^{235}U$$ and cause further fission. Without a moderator, the chain reaction would die out.\n- Step 2: **Control rods** (e.g. boron, cadmium): Strongly absorb neutrons. They are inserted into the reactor core to *remove* excess neutrons, preventing the chain reaction from running away.\n- Step 3: The combination sets the **multiplication factor** to exactly $$k=1$$ (each fission triggers exactly one further fission on average) — steady operation. Pulling rods out → $$k>1$$ (power rises). Pushing in → $$k<1$$ (power falls).\n\nA bomb, by contrast, is engineered for $$k \\gg 1$$ with no control.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "Why does nuclear fusion require enormous temperatures (>$$10^7$$ K), and what is the physics behind the threshold? (3 steps)", "answer": "- Step 1: To fuse, two positive nuclei must get within $$\\sim 10^{-15}$$ m of each other so that the short-range strong nuclear force can bind them.\n- Step 2: But on the way in, they experience strong **electrostatic repulsion** (Coulomb barrier) — both nuclei are positively charged. They need enough **kinetic energy** to overcome this barrier.\n- Step 3: Kinetic energy scales with temperature: $$\\langle KE \\rangle \\sim k_B T$$. The Coulomb barrier corresponds to roughly $$10^7$$–$$10^8$$ K. Below this, almost no fusion occurs; above it, the fusion rate becomes appreciable. (Quantum tunnelling helps a bit, which is why stellar cores at $$\\sim 10^7$$ K can fuse despite classical barriers being even higher.)\n\nThis is why fusion happens in stars but is so hard to engineer on Earth.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": true}, {"question": "Why is iron-56 special, and what does its position on the $$B/A$$ curve imply about the eventual fate of stellar nucleosynthesis?", "answer": "Iron-56 sits at the **peak** of the $$B/A$$ curve at about $$8.8$$ MeV/nucleon — it is the most tightly bound nucleus per particle. This means:\n\n- **No exothermic fusion possible beyond Fe-56**: fusing iron with anything else moves you *down* the curve, costing energy rather than releasing it.\n- **No exothermic fission possible below Fe-56**: splitting iron also moves you down the curve.\n\nSo a star fusing progressively heavier elements eventually reaches iron and stops releasing energy. Without energy to support against gravity, the core collapses — triggering a supernova. Elements heavier than iron (gold, uranium) are made *only* in supernovae or neutron-star mergers, where rapid neutron capture briefly overcomes the energy disadvantage.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": true}, {"question": "In a fission chain reaction, what determines whether the reaction is self-sustaining, dies out, or runs away? (3 steps)", "answer": "- Step 1: Each fission of $$^{235}U$$ emits on average $$2$$–$$3$$ neutrons. The fate of the chain depends on the **multiplication factor** $$k$$ — the average number of those neutrons that go on to cause a *further* fission.\n- Step 2: + If $$k < 1$$: each generation of fissions produces fewer than the previous; reaction dies out (subcritical).\n+ If $$k = 1$$: each generation matches the previous; steady, sustained reaction (critical) — this is how reactors operate.\n+ If $$k > 1$$: each generation grows exponentially; runaway reaction (supercritical) — this is how a bomb works.\n- Step 3: $$k$$ depends on the mass and shape of the fissile material (geometry), the presence of moderators (which favour absorption), and the presence of absorbers (control rods, which reduce $$k$$). The minimum mass needed for $$k=1$$ with no absorbers is the **critical mass**.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": false}, {"question": "Write the deuterium-tritium fusion reaction and identify which side has more total mass. (3 steps)", "answer": "- Step 1: The reaction is $$^{2}_{1}H + ^{3}_{1}H \\rightarrow ^{4}_{2}He + ^{1}_{0}n + 17.6 \\text{ MeV}$$.\n- Step 2: The total nucleon number on each side is $$5$$ (conserved); proton number is $$2$$ (conserved); but the **total mass** of the products ($$^4He + n$$) is *less* than the total mass of the reactants ($$^2H + ^3H$$).\n- Step 3: The missing mass, by $$E = \\Delta m c^2$$, appears as $$17.6$$ MeV of energy — carried mostly as kinetic energy of the products (the neutron, being lighter, carries most of it).\n\nThis is the flagship fusion reaction being pursued at ITER in southern France, because it has the lowest temperature requirement among practical fusion reactions.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "Why is the energy released per kg of fuel vastly higher in fusion than in chemical combustion? Use the magnitude of $$c^2$$ in your reasoning. (3 steps)", "answer": "- Step 1: Chemical reactions involve rearrangement of *electrons* and release energies of $$\\sim$$ eV per bond.\n- Step 2: Nuclear reactions involve rearrangement of *nucleons* and release energies of $$\\sim$$ MeV per reaction — a factor of $$10^6$$ higher per particle.\n- Step 3: Equivalently, $$E = mc^2$$ with $$c^2 \\approx 9 \\times 10^{16} \\text{ m}^2\\text{s}^{-2}$$ means even a tiny mass conversion releases enormous energy: $$1 \\text{ g}$$ fully converted gives $$\\sim 9 \\times 10^{13} \\text{ J}$$ — equivalent to about $$20$$ kilotonnes of TNT. Even though nuclear reactions convert only a small *fraction* of the input mass to energy (perhaps $$0.1$$–$$1\\%$$), this still dwarfs chemical processes that convert essentially $$0\\%$$ of mass.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": true}, {"question": "Conceptually, estimate the energy released per fission of $$^{235}U$$ given $$B/A \\approx 7.6$$ MeV for U-235 and $$B/A \\approx 8.5$$ MeV for the products. (3 steps)", "answer": "- Step 1: The number of nucleons is conserved ($$A = 235$$ on both sides, ignoring the few free neutrons).\n- Step 2: Energy released ≈ (final total binding energy) − (initial total binding energy) $$\\approx 235 \\times (8.5 - 7.6) = 235 \\times 0.9$$ MeV.\n- Step 3: $$\\approx 210 \\text{ MeV}$$ per fission — consistent with the textbook value of \"$$\\sim 200$$ MeV per fission\".\n\nMost of this energy appears as kinetic energy of the daughter nuclei (heating the fuel and water in a reactor); the rest is in neutrons, gammas, and beta decays of the daughters.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": false}, {"question": "A photon has just enough energy to produce an electron-positron pair. Conceptually, how is the energy distributed afterward, and what frequency does the photon need? (3 steps)", "answer": "- Step 1: At the energy threshold $$E_\\gamma = 2m_e c^2 \\approx 1.022$$ MeV, **all** the photon's energy goes into the rest masses of the electron and positron, with each particle produced essentially at rest.\n- Step 2: Above threshold, the excess energy goes into kinetic energy of the pair.\n- Step 3: The threshold frequency comes from $$E_\\gamma = hf$$, so $$f = E_\\gamma / h = (1.64 \\times 10^{-13} \\text{ J}) / (6.63 \\times 10^{-34} \\text{ Js}) \\approx 2.5 \\times 10^{20}$$ Hz — well into the gamma-ray range.\n\nThis is why optical photons can never produce electron-positron pairs: a visible photon has $$\\sim 2$$ eV, half a million times short of the threshold.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": false}, {"question": "Compare alpha and beta-minus decay equations: which conserves what, and what specific particles must always appear? (3 steps)", "answer": "- Step 1: Both decays conserve **nucleon number** $$A$$ and **proton number** $$Z$$ across the equation. Both also conserve **lepton number** and charge.\n- Step 2: + Alpha: $$^A_Z X \\rightarrow ^{A-4}_{Z-2} Y + ^{4}_{2}\\alpha$$. No neutrino needed — alpha decay does not involve lepton number change.\n+ Beta-minus: $$^A_Z X \\rightarrow ^{A}_{Z+1} Y + ^{0}_{-1}\\beta + \\bar{\\nu}_e$$. The antineutrino is *required* for lepton number conservation, because the emitted electron carries lepton number $$+1$$.\n- Step 3: Common trap: writing the beta decay without the antineutrino. Examiners deduct marks because lepton number conservation is violated.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": true}, {"question": "A neutrino was hypothesised before being detected. Why was its existence necessary even though no one had seen it? (3 steps)", "answer": "- Step 1: In beta decay, experiments showed that emitted electrons had a **continuous range of energies**, not a single discrete value — even though the parent and daughter nuclei have well-defined energies. This appeared to violate conservation of energy.\n- Step 2: Pauli proposed in 1930 that a **third, invisible particle** was carrying away the missing energy and momentum — neutral, very light, and barely interacting (hence undetected).\n- Step 3: Without this particle, both energy conservation and angular momentum conservation would be violated. The neutrino was finally detected experimentally by Cowan and Reines in 1956. This is a beautiful example of how *conservation laws* can predict the existence of particles before direct detection.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": true}, {"question": "Why is it incorrect to say that in a half-life experiment, \"the number of decays halves every half-life\"?", "answer": "It is the **number of remaining (undecayed) nuclei** that halves every half-life, *not* the number of decays. After one half-life, half the original nuclei have decayed (a lot of decays); after the next half-life, half of what remained decays (fewer absolute decays, but still half of the current population). Both the *population* $$N$$ and the *activity* $$A = \\lambda N$$ halve every $$t_{1/2}$$ — because they are proportional. But the cumulative number of decays *grows* over time (it accumulates), so saying \"the number of decays halves\" is wrong; you mean \"the *rate* of decays halves\", or equivalently, \"the surviving population halves\".", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": true}, {"question": "Polonium-214 has half-life $$\\sim 0.16$$ ms, while uranium-238 has half-life $$\\sim 4.5 \\times 10^{9}$$ years. Conceptually, what does this enormous range tell you about $$\\lambda$$, and what practical applications follow? (3 steps)", "answer": "- Step 1: Half-life and decay constant are inversely related: $$t_{1/2} = \\ln 2 / \\lambda$$. So $$\\lambda$$ also spans many orders of magnitude — Po-214 has $$\\lambda \\sim 4000$$ s$$^{-1}$$, while U-238 has $$\\lambda \\sim 5 \\times 10^{-18}$$ s$$^{-1}$$.\n- Step 2: + Short half-life isotopes (ms–hours) are useful as **medical tracers** — inject, scan, gone quickly without prolonged patient exposure.\n+ Medium half-life (days–years) is useful for **industrial gauges** and **smoke detectors**.\n+ Long half-life (millions–billions of years) is useful for **radiometric dating** (uranium-lead, potassium-argon, carbon-14).\n- Step 3: The huge dynamic range exists because $$\\lambda$$ depends exponentially on the height and width of the nuclear potential barrier the decaying particle must tunnel through — small changes in nuclear structure produce vast changes in half-life.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": false}, {"question": "A sample initially contains $$2.4 \\times 10^{18}$$ nuclei of an isotope with $$\\lambda = 4.0 \\times 10^{-3}$$ s$$^{-1}$$. Without doing detailed arithmetic, sketch how you would find (a) the activity and (b) the half-life. (3 steps)", "answer": "- Step 1: **Activity**: Use $$A = \\lambda N$$ directly. Multiply the very large $$N$$ by the small $$\\lambda$$. Conceptually: a tiny fraction ($$\\sim 10^{-3}$$) of an enormous population decays per second, giving an activity of order $$10^{15}$$ Bq.\n- Step 2: **Half-life**: Use $$t_{1/2} = \\ln 2/\\lambda$$. With $$\\ln 2 \\approx 0.693$$ and $$\\lambda \\sim 4 \\times 10^{-3}$$, $$t_{1/2} \\sim 0.7/0.004 \\sim 170$$ s.\n- Step 3: Sanity check: $$\\sim 170$$ s ≈ a few minutes; this would be a medium-activity, short-half-life isotope — perfectly consistent with a large activity. The key conceptual point is that $$A$$ depends on *both* $$\\lambda$$ and $$N$$, while $$t_{1/2}$$ depends only on $$\\lambda$$.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": false}, {"question": "Why does the strong nuclear force have such a short range, and why does that limit the size of stable nuclei? (3 steps)", "answer": "- Step 1: The strong force is mediated by gluons (between quarks) and effectively by pions (between nucleons). It is extremely strong at $$\\sim 10^{-15}$$ m but falls off essentially to zero beyond $$\\sim 2 \\times 10^{-15}$$ m.\n- Step 2: In contrast, the electrostatic repulsion between protons is a long-range force following an inverse-square law — every proton repels every other proton in the nucleus, no matter how far apart.\n- Step 3: In a large nucleus, each nucleon is only attracted by its nearest neighbours (strong force is short-range), but every proton repels *all* other protons (long-range). As $$Z$$ grows, repulsion eventually outpaces binding, and nuclei become unstable — which is why all elements heavier than bismuth are radioactive and why $$B/A$$ decreases past iron.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": true}, {"question": "In a cyclotron, why does the orbital period of a non-relativistic particle stay constant even as it speeds up? (3 steps)", "answer": "- Step 1: The radius grows with speed: $$r = mv/(BQ)$$. So a faster particle has a larger orbit.\n- Step 2: But the circumference also grows in the same proportion: $$\\text{circumference} = 2\\pi r = 2\\pi mv/(BQ)$$.\n- Step 3: The time to go around is circumference / speed = $$2\\pi m/(BQ)$$ — **independent of $$v$$**. So as the particle gains energy and spirals outward, the time per revolution stays the same. This is why the AC voltage can be at a single fixed frequency (the cyclotron frequency) and still resonantly push the particle on every gap crossing.\n\nThis breaks down at relativistic speeds, where $$m$$ effectively increases with energy.", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": true}, {"question": "Why is it conceptually wrong to compute the energy released in fusion by saying \"the products have less mass, and that mass becomes energy\"? (Hint: nucleons are not destroyed.)", "answer": "The phrasing \"mass becomes energy\" suggests that nucleons are annihilated — but in fusion, every proton and neutron is conserved (count them on both sides). What actually changes is the **arrangement** of those nucleons into a more tightly bound configuration. The bound configuration has lower total energy (and therefore lower total mass, by $$E = mc^2$$) than the separated configuration. So it is not that \"mass becomes energy\" — rather, the system *loses* mass-energy by radiating it away as kinetic energy of products and photons. The nucleons themselves are unchanged; only their binding has changed. This is a subtle but important conceptual distinction.", "source": "Opus 4.7 ②", "_id": "opus_2_51", "judge_pick": true}, {"question": "Compare the conditions for fission and fusion to occur. Why is fission much easier to achieve on Earth? (3 steps)", "answer": "- Step 1: **Fission** requires bringing a slow neutron into contact with a heavy nucleus — neutrons are uncharged, so there is no Coulomb barrier to overcome. Even thermal neutrons (room-temperature) can trigger fission of $$^{235}U$$.\n- Step 2: **Fusion** requires bringing two positively charged nuclei within $$10^{-15}$$ m of each other, against enormous Coulomb repulsion. This requires kinetic energies corresponding to $$\\sim 10^7$$–$$10^8$$ K.\n- Step 3: So fission can be done at room temperature with available uranium fuel — practical since the 1940s. Fusion requires the conditions inside stars (or carefully confined plasmas like in tokamaks/lasers), which is why despite 70+ years of research, controlled fusion power is still not commercial.\n\nThe asymmetry comes down to: neutrons don't repel; protons do.", "source": "Opus 4.7 ②", "_id": "opus_2_52", "judge_pick": false}, {"question": "A student says \"every nucleus emits radiation, so every nucleus is radioactive\". What's wrong with this statement?", "answer": "Only **unstable** nuclei emit radiation. A stable nucleus (e.g. $$^{12}C$$, $$^{16}O$$, $$^{56}Fe$$, $$^{208}Pb$$) sits in an energy configuration that is a local minimum — no rearrangement is possible that releases energy while conserving the relevant quantum numbers. So a stable nucleus simply *sits there* indefinitely and emits nothing. Of the $$\\sim 254$$ known stable nuclides plus thousands of radioactive isotopes, only the unstable ones decay. Most atoms in everyday matter (the carbon, oxygen, iron in your body) are stable and never emit radiation. So radioactivity is a property of specific *isotopes*, not of all matter.", "source": "Opus 4.7 ②", "_id": "opus_2_53", "judge_pick": true}, {"question": "Why does the binding energy per nucleon curve start near zero for hydrogen, jump dramatically up at helium-4, and then climb more gradually? (3 steps)", "answer": "- Step 1: **Hydrogen** ($$^1H$$) has only one nucleon, so there is nothing to bind to it — $$B/A = 0$$.\n- Step 2: **Helium-4** is \"doubly magic\" — both protons (2) and neutrons (2) fill closed shells, giving an unusually stable, tightly bound nucleus at $$B/A \\approx 7$$ MeV. This is the famous spike on the curve.\n- Step 3: Beyond He-4, adding more nucleons gradually improves $$B/A$$ (more nearest-neighbour bonds), but with diminishing returns — eventually levelling off near the iron peak at $$8.8$$ MeV. The jump at He-4 reflects nuclear shell structure, much as electronic shells produce noble gases.\n\nThis is why fusion in stars proceeds rapidly through hydrogen → helium but slows dramatically thereafter.", "source": "Opus 4.7 ②", "_id": "opus_2_54", "judge_pick": true}, {"question": "A misconception probe: \"Half-life means the half-life of each individual nucleus.\" Why is this wrong?", "answer": "Half-life is a **statistical** property of a *population*, not of an individual nucleus. An individual nucleus has no concept of half-life: at every moment, it has the same probability $$\\lambda$$ per second to decay, regardless of how long it has already existed. A nucleus does not \"age\" or \"use up its half-life\". The half-life $$t_{1/2}$$ tells you that *out of a large population*, half will have decayed within that time. Some individual nuclei will decay in the first second; others may last billions of years. So saying \"this nucleus has a half-life of 5730 years\" is nonsense — it's the *isotope* that has that half-life, characterising the population.", "source": "Opus 4.7 ②", "_id": "opus_2_55", "judge_pick": true}, {"question": "Annihilation and pair production are inverse processes. State the symmetry between them. (3 steps)", "answer": "- Step 1: **Annihilation**: particle + antiparticle → photons. Energy released: $$2mc^2$$ (rest energies of both particles).\n- Step 2: **Pair production**: photon(s) → particle + antiparticle. Minimum energy required: $$2mc^2$$ (same value, by energy conservation running the reaction backward).\n- Step 3: + Both processes conserve charge (zero before and after).\n+ Both conserve lepton/baryon number (e.g. for $$e^- + e^+ \\to 2\\gamma$$, lepton number is 0 before and after).\n+ Both produce/require *two* photons in their centre-of-mass frame (single-photon variants violate momentum conservation in vacuum).\n\nThe two processes are time-reverses of each other, illustrating the deep symmetry of quantum field theory.", "source": "Opus 4.7 ②", "_id": "opus_2_56", "judge_pick": false}, {"question": "A radioactive sample contains $$10^{20}$$ nuclei with half-life $$10$$ s. Roughly how many decays per second occur at $$t=0$$ and at $$t = 30$$ s? (3 steps)", "answer": "- Step 1: Decay constant: $$\\lambda = \\ln 2 / t_{1/2} \\approx 0.7/10 = 0.07 \\text{ s}^{-1}$$.\n- Step 2: Initial activity: $$A_0 = \\lambda N_0 \\approx 0.07 \\times 10^{20} = 7 \\times 10^{18}$$ decays/s. So roughly $$10^{19}$$ Bq initially.\n- Step 3: After $$30$$ s = $$3$$ half-lives, both $$N$$ and $$A$$ are reduced by a factor of $$(1/2)^3 = 1/8$$. So $$A(30) \\approx 7 \\times 10^{18}/8 \\approx 9 \\times 10^{17}$$ Bq.\n\nKey insight: activity tracks population — both halve every half-life — so you can apply the magic table to activity directly.", "source": "Opus 4.7 ②", "_id": "opus_2_57", "judge
