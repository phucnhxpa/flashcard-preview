re no control rods or moderators. The chain reaction grows exponentially, releasing enormous energy in microseconds before the assembly blows itself apart. The difference is entirely about controlling the neutron population.", "source": "GLM 5.1 ②", "_id": "glm_2_51"}, {"question": "Why was the discovery that protons and neutrons are not elementary (they're made of quarks) revolutionary, given that quarks were never observed alone?", "answer": "- Step 1: Quarks experience \"colour confinement\" — the strong force between them *grows* with separation. Try to pull two quarks apart, and the energy you supply creates a new quark-antiquark pair instead of freeing the original. So isolated quarks are physically impossible to produce.\n- Step 2: Their existence was confirmed indirectly — by deep inelastic scattering (electrons fired at protons revealed three point-like scattering centres inside), by charge patterns in baryons/mesons, and by jet structure in high-energy collisions.\n- Step 3: This established that what looked elementary (protons) was actually composite — extending the reductionist programme of physics one more layer down. Whether quarks themselves are composite is still open.", "source": "Opus 4.7 ①", "_id": "opus_1_36"}, {"question": "Why is the Standard Model description of a proton (\"three quarks\") more accurate than the older description (\"three solid balls\")?", "answer": "A proton is not three little solid spheres sitting in a row. Rather:\n\n- The three \"valence quarks\" (uud) carry the proton's identity and charge, but they account for only a *tiny fraction* of its mass (about 1%).\n- The bulk of the proton's mass comes from the **gluon field** — the dynamics of the strong force binding the quarks together (via QCD).\n- Inside, there is also a \"sea\" of virtual quark-antiquark pairs continually appearing and disappearing.\n- The whole thing is a fluctuating, quantum-mechanical object — closer to a turbulent cloud of energy than to three marbles.\n\nSo when computing quark charges, the three-ball picture works. For mass or dynamics, the picture is much more subtle and quantum-field-theoretic.", "source": "Opus 4.7 ②", "_id": "opus_2_58"}, {"question": "Why does fusion require enormous temperatures, while fission doesn't? (3 steps)", "answer": "- Step 1: For fusion, two positively charged nuclei must approach within the very short range of the strong force (≈ 1 fm). On the way in, they feel huge electrostatic repulsion (Coulomb barrier).\n- Step 2: To overcome this barrier, the nuclei need enormous kinetic energy — which means enormous temperature ($$> 10^7$$ K in stellar cores; even higher for D-T fusion on Earth).\n- Step 3: Fission, by contrast, is *triggered* — a slow neutron (no charge, no Coulomb barrier) walks into a heavy nucleus and destabilises it. No high temperature needed because there's no electrostatic barrier to overcome.\n\nThis is why stars fuse but Earth (mostly) fissions — fusion is hard, fission is easy to trigger.", "source": "Opus 4.7 ①", "_id": "opus_1_28"}, {"question": "A proton has quark composition $$uud$$ and a neutron has $$udd$$. Verify the charge of each, and explain why a proton cannot decay via the strong force. (3 steps)", "answer": "- Step 1: Proton ($$uud$$): $$+\\frac{2}{3}e + \\frac{2}{3}e + (-\\frac{1}{3}e) = +\\frac{3}{3}e = +1e$$ ✓.\n- Step 2: Neutron ($$udd$$): $$+\\frac{2}{3}e + (-\\frac{1}{3}e) + (-\\frac{1}{3}e) = +\\frac{0}{3}e = 0$$ ✓.\n- Step 3: The proton is the lightest baryon. Any baryon-number-conserving strong decay would require the proton to turn into lighter baryons, but there are no lighter baryons. This is why the proton is stable — it cannot decay via the strong force. (Hypothetical proton decay via the much weaker GUT mechanism has never been observed.)", "source": "GLM 5.1 ②", "_id": "glm_2_18"}, {"question": "Define mass defect and binding energy. Why does a bound nucleus have less mass than its constituent nucleons? (2 steps)", "answer": "- Step 1: Mass defect (Δm) is the difference between the sum of the masses of the individual protons and neutrons and the measured mass of the bound nucleus: Δm = [Z × mₚ + (A−Z) × mₙ] − m_nucleus\n- Step 2: Binding energy (BE) is the energy required to completely separate a nucleus into its constituent protons and neutrons: BE = Δm × c²\n- The bound nucleus has less mass because when nucleons bind together via the strong nuclear force, the system loses energy (the binding energy is released). By E = mc², this loss of energy appears as a loss of mass. The bound state is at a lower energy (more stable) than the separated nucleons.", "source": "MiniMax ①", "_id": "minimax_1_14"}, {"question": "What is the minimum photon energy required for pair production, and why is it $$2mc^2$$ rather than $$mc^2$$? (3 steps)", "answer": "- Step 1: Pair production is when a high-energy photon converts into a particle–antiparticle pair (e.g., electron + positron). Energy must be conserved: the photon's energy must supply the rest-mass energy of *both* particles created.\n- Step 2: Each particle has rest energy $$mc^2$$. Since two particles are created, the minimum energy is $$E_{min} = 2mc^2$$. For an electron–positron pair: $$E_{min} = 2 \\times 0.511 \\approx 1.022 \\text{ MeV}$$.\n- Step 3: The common trap is writing $$mc^2$$ (forgetting the factor of 2). If the photon only had $$mc^2$$, it could create one particle but not its antiparticle — violating conservation laws (charge, lepton number). Both must be created simultaneously, hence the factor of 2. Any excess energy above $$2mc^2$$ goes into kinetic energy of the pair.", "source": "GLM 5.1 ②", "_id": "glm_2_16"}, {"question": "A beta-minus particle is an electron, but the nucleus contains no electrons. Where does it come from, and what else must be emitted? (3 steps)", "answer": "- Step 1: Inside the nucleus, a neutron spontaneously converts into a proton. The reaction is: $$^1_0 n \\rightarrow ^1_1 p + ^0_{-1}\\beta + \\bar{\\nu}_e$$.\n- Step 2: The electron (beta-minus) is created at the moment of conversion and ejected from the nucleus. It didn't \"exist\" inside beforehand — it is a product of the neutron's transformation, analogous to how a photon is created when an electron changes energy level.\n- Step 3: An antineutrino $$\\bar{\\nu}_e$$ must also be emitted to conserve lepton number. Before the decay, lepton number = 0 (neutron is not a lepton). After: electron has lepton number +1, so the antineutrino carries lepton number −1, giving a total of 0. The antineutrino also carries away the \"missing\" energy that made the beta energy spectrum continuous rather than single-valued.", "source": "GLM 5.1 ②", "_id": "glm_2_6"}, {"question": "Why do beta decays produce a continuous *spectrum* of electron energies, while alpha decays produce discrete energies? (3 steps)", "answer": "- Step 1: Alpha decay is a two-body process: parent → daughter + alpha. With two bodies and fixed total energy/momentum, the alpha gets a unique fixed kinetic energy. So you see a sharp line.\n- Step 2: Beta decay is a *three-body* process: parent → daughter + electron + antineutrino. The total energy is shared between three particles, with the antineutrino taking a variable share.\n- Step 3: So the electron can get anywhere from 0 up to the maximum (when the antineutrino gets nothing). The continuous spectrum was historically the smoking gun that a *third* particle (the neutrino) must exist — Pauli proposed it in 1930 to save energy conservation.", "source": "Opus 4.7 ①", "_id": "opus_1_50"}, {"question": "How does a neutron’s beta-minus decay violate conservation of baryon number without the antineutrino?", "answer": "- **Baryon Number Definition:**  \n  - Proton/neutron: $B = +1$; lepton numbers: $L_e = +1$ for electrons, $L_e = -1$ for antineutrinos.  \n- **Without Antineutrino:**  \n  - Neutron ($B=1$) → proton ($B=1$) + electron ($B", "source": "Qwen 3 ①", "_id": "qwen_1_39"}, {"question": "Why can't we predict when a single radioactive nucleus will decay? How does the large-sample behaviour emerge from individual randomness? (2 steps)", "answer": "- Step 1: A single nucleus decays randomly and spontaneously. The decay constant $$\\lambda$$ gives only a probability per second — like rolling a die each second and \"decaying\" if you roll a six. You can't predict which roll will be the six.\n- Step 2: With billions of nuclei, the statistical law of large numbers takes over. A fixed fraction (determined by $$\\lambda$$) decays per unit time, producing the smooth exponential decay curve. Individual randomness → collective predictability.\n\nTakeaway: Random at the microscopic level, predictable at the macroscopic level — the essence of statistical physics.", "source": "GLM 5.1 ③", "_id": "glm_3_29"}, {"question": "A beta-minus particle is described as an \"electron emitted from the nucleus\" — but the nucleus contains no electrons. Resolve this apparent contradiction. (3 steps)", "answer": "- Step 1: The beta-minus particle is not a pre-existing electron sitting in the nucleus. It is *created* at the moment of decay.\n- Step 2: Inside the nucleus, a **neutron converts into a proton**. To conserve charge (neutron is $$0$$, proton is $$+e$$), a particle of charge $$-e$$ must be emitted: that is the electron. To conserve lepton number, an electron antineutrino is also emitted.\n- Step 3: The full process is $$^1_0n \\rightarrow ^1_1p + ^{0}_{-1}\\beta + \\bar{\\nu}_e$$. So a $$\\beta^-$$ decay increases $$Z$$ by 1 (one more proton remains) while $$A$$ is unchanged (one nucleon swapped type, but the count is the same).", "source": "Opus 4.7 ②", "_id": "opus_2_7"}, {"question": "Both fission of heavy nuclei and fusion of light nuclei release energy. Using the BE/nucleon curve, explain why these seemingly opposite processes both produce energy. (3 steps)", "answer": "- Step 1: On the BE/nucleon curve, very light nuclei (far left, e.g., hydrogen) have very low $$B/A$$. Very heavy nuclei (far right, e.g., uranium) also have relatively low $$B/A$$ (slowly declining beyond iron). The peak is near iron-56.\n- Step 2: **Fusion** (light → heavier): two light nuclei with low $$B/A$$ combine into a nucleus with higher $$B/A$$ (climbing the steep left slope of the curve). The increase in $$B/A$$ means the products are more tightly bound, and the energy difference is released.\n- Step 3: **Fission** (heavy → medium): a heavy nucleus with lower $$B/A$$ splits into medium-mass nuclei with higher $$B/A$$ (climbing the right slope toward the peak). Again, the increase in total binding energy is released as kinetic energy and radiation. Both processes move toward iron-56 — they just approach from opposite sides.", "source": "GLM 5.1 ②", "_id": "glm_2_33"}, {"question": "Why can't you choose which type of radiation a given radioactive sample emits? (2 steps)", "answer": "- Step 1: The decay mode (α, β−, β+, γ) is dictated by the *nuclear structure* of the isotope — specifically, by which configuration would lead to a more stable (lower-energy, higher-B/A) daughter. The isotope's neutron-to-proton ratio and excitation state set this.\n- Step 2: Therefore, you can't tune temperature, pressure, or chemistry to switch a uranium decay from alpha to beta. You can only *choose the isotope* — and accept whatever it does. Heavy nuclei (e.g. U-238) tend to alpha; neutron-rich nuclei (e.g. C-14) tend to β−; proton-rich nuclei tend to β+.", "source": "Opus 4.7 ①", "_id": "opus_1_9"}, {"question": "Why can't we use the formula $A = λN$ with the mass of a radioactive sample instead of the number of nuclei? What must we do if given mass?", "answer": "- Step 1: Identify the problem\n  - Activity A = λN, where N is the NUMBER of nuclei\n  - Mass (in kg or g) is NOT the number of nuclei\n- Step 2: Explain what you must do\n  - Convert mass to number of nuclei using molar mass and Avogadro's constant\n  - N = (mass / Mᵣ) × N_A\n  - Where Mᵣ is the relative atomic/molecular mass, N_A = 6.02 × 10²³ mol⁻¹\n- Step 3: Common exam trap\n  - Students often try to use mass directly in A = λN and get the wrong answer\n  - Example: 1 g of carbon-14 is NOT the same number of atoms as 1 g of uranium-235", "source": "MiniMax ②", "_id": "minimax_2_25"}, {"question": "In the formula $$A = \\lambda N$$, a student uses the mass of the sample in grams for $$N$$. Why is this incorrect, and what must be done instead? (2 steps)", "answer": "- Step 1: $$N$$ represents the **number of undecayed nuclei**, which is a pure count (dimensionless). Mass in grams is not a count of particles.\n- Step 2: If given a mass, you must convert it to the number of nuclei using the molar mass and Avogadro's constant: $$N = \\frac{\\text{mass}}{M_r} \\times N_A$$, where $$M_r$$ is the molar mass and $$N_A$$ is Avogadro's number.", "source": "GLM 5.1 ①", "_id": "glm_1_33"}, {"question": "The \"3, 2, 1, lay out\" method for calculation questions has four steps. What are they, and why does starting with the formula symbolically before substituting numbers prevent errors? (2 steps)", "answer": "- Step 1: The method: (1) List knowns with symbols and units. (2) Quote the formula symbolically. (3) Rearrange before substituting numbers. (4) Substitute, evaluate, state answer with units and sig figs.\n- Step 2: Starting symbolically lets you see the structure of the calculation before numbers obscure it. You can check that the rearrangement is correct, that units will cancel properly, and that the final expression has the right dimensions. Substituting too early makes it hard to spot algebra errors and nearly impossible for an examiner to give method marks if the final answer is wrong.\n\nTakeaway: Symbolic first → rearrange → then substitute. It's safer, clearer, and maximises method marks even if the arithmetic goes wrong.", "source": "GLM 5.1 ③", "_id": "glm_3_56"}, {"question": "Write the full beta-minus decay equation for $$^{14}_6 C$$. A student omits the antineutrino. Why is the equation wrong without it? (3 steps)", "answer": "- Step 1: The equation: $$^{14}_6 C \\rightarrow \\, ^{14}_7 N + \\, ^0_{-1} \\beta + \\bar{\\nu}_e$$. Carbon-14 becomes nitrogen-14.\n- Step 2: Check conservation: $$A$$: 14 = 14 + 0 + 0 ✓. $$Z$$: 6 = 7 + (−1) + 0 ✓.\n- Step 3: Without the antineutrino $$\\bar{\\nu}_e$$, lepton number is not conserved. Before decay: lepton number = 0. After decay with just the electron: lepton number = +1. The antineutrino (lepton number −1) restores balance: 0 = +1 + (−1) = 0 ✓. Examiners deduct marks for omitting it.\n\nTakeaway: Every $$β$$ decay equation MUST include a (anti)neutrino. It's not optional — lepton number conservation demands it.", "source": "GLM 5.1 ③", "_id": "glm_3_12"}, {"question": "A graph of count rate vs time appears to plateau at a nonzero value rather than falling to zero. Why? And what does this imply for half-life analysis?", "answer": "The graph plateaus because the detector is also picking up **background radiation** from the environment — cosmic rays, radon, etc. — which is always present even when the source has fully decayed. To analyse correctly, you must subtract this background count rate from every measurement *before* computing half-life. If you forget, your apparent count rate never halves to zero, and any half-life estimate is systematically too long. The corrected quantity is (measured rate − background rate), which decays cleanly to zero following $$A = A_0 e^{-\\lambda t}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_28"}, {"question": "Why does an alpha particle have a range of only a few cm in air, while a gamma ray can travel hundreds of metres?", "answer": "Alpha particles are massive, doubly charged, and relatively slow. As they travel through air, they collide frequently with electrons in the air molecules, ionising them and losing kinetic energy at each interaction. Within a few cm, they have lost all their energy and stop — picking up two electrons to become a neutral helium atom. Gamma rays are uncharged, massless photons that interact only weakly with matter (via Compton scattering, photoelectric absorption, or pair production at high energies). Each interaction is rare per unit distance, so a gamma photon can travel a long way before being absorbed. The trade-off: alpha deposits all its energy in a small region (very ionising locally); gamma deposits its energy sparsely along a long path.", "source": "Opus 4.7 ②", "_id": "opus_2_59"}, {"question": "Why does the binding energy per nucleon curve start near zero for hydrogen, jump dramatically up at helium-4, and then climb more gradually? (3 steps)", "answer": "- Step 1: **Hydrogen** ($$^1H$$) has only one nucleon, so there is nothing to bind to it — $$B/A = 0$$.\n- Step 2: **Helium-4** is \"doubly magic\" — both protons (2) and neutrons (2) fill closed shells, giving an unusually stable, tightly bound nucleus at $$B/A \\approx 7$$ MeV. This is the famous spike on the curve.\n- Step 3: Beyond He-4, adding more nucleons gradually improves $$B/A$$ (more nearest-neighbour bonds), but with diminishing returns — eventually levelling off near the iron peak at $$8.8$$ MeV. The jump at He-4 reflects nuclear shell structure, much as electronic shells produce noble gases.\n\nThis is why fusion in stars proceeds rapidly through hydrogen → helium but slows dramatically thereafter.", "source": "Opus 4.7 ②", "_id": "opus_2_54"}, {"question": "Using the BE/nucleon curve, explain why helium-4 is anomalously stable compared to its neighbours (lithium-5, etc.). (2 steps)", "answer": "- Step 1: Helium-4 has $$B/A \\approx 7 \\text{ MeV/nucleon}$$, which is an exceptionally high value for such a light nucleus. Its neighbours (e.g., lithium-5 with $$B/A$$ much lower) are far less tightly bound.\n- Step 2: This is because $$^4$$He has a \"doubly magic\" structure — 2 protons and 2 neutrons completely fill the first nuclear shell. This closed-shell configuration is exceptionally stable, analogous to noble gases in atomic physics. It's also why alpha decay (emitting a $$^4$$He nucleus) is a common decay mode — the alpha particle is a particularly stable \"fragment\" to break off.", "source": "GLM 5.1 ②", "_id": "glm_2_47"}, {"question": "A polonium sample drops from 8.00 g to 0.25 g. Without doing logarithms, how many half-lives have passed? (2 steps)", "answer": "- Step 1: The ratio is $$0.25/8 = 1/32$$. We want $$(1/2)^n = 1/32$$.\n- Step 2: $$32 = 2^5$$, so $$n = 5$$ half-lives. The trick is recognising the ratio as a power of 2.\n\nThis is faster than logs whenever the ratio is \"clean\" — keep dividing 8 → 4 → 2 → 1 → 0.5 → 0.25, counting 5 halvings.", "source": "Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "A student says \"binding energy is the energy stored inside the nucleus.\" Why is this the opposite of the truth? (2 steps)", "answer": "- Step 1: Binding energy is the energy you must *supply* to *break apart* the nucleus into its constituent protons and neutrons. It measures how tightly the nucleus is bound.\n- Step 2: A bound nucleus is at a *lower* energy state than its separated nucleons (by an amount equal to the binding energy). If binding energy were \"stored inside,\" the nucleus would be at a *higher* energy state — which would mean it's unstable and would fly apart. The whole point is that the bound state is more favourable (lower energy).\n\nTakeaway: Binding energy = energy needed to pull apart (not stored inside). The bound state is lower in energy — that's why it's bound.", "source": "GLM 5.1 ③", "_id": "glm_3_31"}, {"question": "Why do nuclear bombs release so much more energy per kilogram than chemical bombs? (3 steps)", "answer": "- Step 1: Chemical reactions rearrange electron bonds, with energy scales of ~eV per molecule.\n- Step 2: Nuclear reactions rearrange nucleons, with energy scales of ~MeV per nucleon — about a million times larger.\n- Step 3: So gram-for-gram, fission releases about $$10^6$$ times more energy than the strongest chemical reaction. A few kg of U-235 has the energy yield of thousands of tonnes of TNT.\n\nTakeaway: the factor of a million comes directly from the eV-vs-MeV gap between electronic and nuclear binding.", "source": "Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "Hydrogen has three isotopes: $$^1_1H$$, $$^2_1H$$ (deuterium), and $$^3_1H$$ (tritium). They all have one proton. What differs between them, and why are they all called \"hydrogen\" despite having different masses? (2 steps)", "answer": "- Step 1: They differ in neutron count: $$^1_1H$$ has 0 neutrons, $$^2_1H$$ has 1, and $$^3_1H$$ has 2. This means different nucleon numbers ($$A = 1, 2, 3$$) but the same proton number ($$Z = 1$$).\n- Step 2: They are all called hydrogen because the element is defined by $$Z$$ alone. Same $$Z$$ → same element → same chemical behaviour. Different $$A$$ → different nuclear mass and stability (tritium is radioactive; protium and deuterium are stable).\n\nTakeaway: Isotopes share identity ($$Z$$) but differ in mass and nuclear behaviour ($$A$$).", "source": "GLM 5.1 ③", "_id": "glm_3_2"}, {"question": "Explain conceptually what annihilation is, and why it produces *two* photons rather than one. (3 steps)", "answer": "- Step 1: When a particle meets its antiparticle (e.g. electron + positron), both are destroyed, and their rest-mass energy is converted entirely to electromagnetic energy.\n- Step 2: **Why two photons?** Because momentum must be conserved. If the particle and antiparticle approach at rest (or in their centre-of-mass frame), the total initial momentum is zero. A single photon has nonzero momentum, so a single photon cannot result. Two photons emitted back-to-back can have equal and opposite momenta, conserving total momentum at zero.\n- Step 3: Energy conservation gives $$2E_\\gamma = 2mc^2$$, i.e. each photon carries energy $$mc^2$$. For an electron-positron pair, each photon has energy $$\\approx 0.511 \\text{ MeV}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_18"}, {"question": "In beta-minus decay, $$Z$$ increases by 1. In beta-plus decay, $$Z$$ decreases by 1. A student claims beta-minus \"loses a proton\" because it emits negative charge. Why is this backwards? (2 steps)", "answer": "- Step 1: Beta-minus decay is a neutron → proton conversion. The nucleus *gains* a proton (Z increases by 1) and emits an electron. The emitted negative charge comes from the neutron transforming, not from a proton being lost.\n- Step 2: The confusion comes from thinking \"emitting something negative = losing positive charge.\" In reality, the neutron (neutral) becomes a proton (positive) *plus* an electron (negative) *plus* an antineutrino. The net effect is one more proton in the nucleus.\n\nTakeaway: $$β^-$$: Z increases by 1 (neutron→proton). $$β^+$$: Z decreases by 1 (proton→neutron). Don't flip these.", "source": "GLM 5.1 ③", "_id": "glm_3_11"}, {"question": "Why do *both* fission of heavy nuclei *and* fusion of light nuclei release energy? (3 steps)", "answer": "- Step 1: Energy is released whenever the products have higher $$B/A$$ than the reactants — i.e., whenever the reaction moves \"uphill\" on the binding-energy-per-nucleon curve. Higher $$B/A$$ = nucleons are more tightly bound = the system sits in a lower energy state.\n- Step 2: Fission: a heavy nucleus (e.g. U-235, $$B/A \\approx 7.6$$ MeV) splits into two medium nuclei (Ba, Kr, $$B/A \\approx 8.5$$ MeV). Products are *higher* on the curve → energy released. This walks left toward iron.\n- Step 3: Fusion: two light nuclei (e.g. H, D, very low $$B/A$$) combine into a heavier nucleus (He-4, $$B/A \\approx 7$$ MeV). Again products are higher on the curve → energy released. This walks right toward iron.\n\nUniversal rule: iron is the \"valley of stability.\" Everything wants to move toward it.", "source": "Opus 4.7 ①", "_id": "opus_1_24"}, {"question": "A photon undergoes pair production into an electron-positron pair. Without computing exact frequency, why must the photon's frequency be in the gamma-ray range?", "answer": "- Step 1: Minimum photon energy $$E_\\gamma = 2 m_e c^2 \\approx 1.02$$ MeV.\n- Step 2: Photon energy is $$E = hf$$. With $$E \\sim 10^{-13}$$ J and $$h \\sim 10^{-34}$$ J·s, frequency $$f \\sim 10^{20}$$ Hz.\n- Step 3: Visible light is $$\\sim 10^{15}$$ Hz; X-rays are $$\\sim 10^{18}$$ Hz; only gamma rays reach $$\\sim 10^{20}$$ Hz. So pair production is a gamma-only phenomenon. This is why pair production isn't observed with optical lasers — there isn't nearly enough energy per photon.", "source": "Opus 4.7 ①", "_id": "opus_1_46"}, {"question": "Why must a neutrino (or antineutrino) appear in every beta decay equation?", "answer": "- Step 1: Without a neutrino, beta decay would violate two things. First, observed beta energy spectra are continuous — if only an electron and recoiling nucleus came out, two-body kinematics forces a single fixed energy. The spread of energies means a third, invisible particle is carrying off the rest.\n- Step 2: Second, lepton number must be conserved. The electron is a lepton ($$L = +1$$). The decaying nucleus has $$L = 0$$. To balance, an *anti*lepton must be emitted in $$\\beta^-$$: the antineutrino $$\\bar{\\nu}_e$$ ($$L = -1$$).\n- Step 3: In $$\\beta^+$$, the positron is an antilepton ($$L = -1$$), so we need a true neutrino $$\\nu_e$$ ($$L = +1$$) to balance. Omitting the (anti)neutrino in an exam loses marks every time.", "source": "Opus 4.7 ①", "_id": "opus_1_7"}, {"question": "After $$n$$ half-lives, the number of nuclei remaining is $$N = N_0 (1/2)^n$$. A student claims that after 2 half-lives, 100% of the sample has decayed because \"half plus half equals all.\" Where is the error? (2 steps)", "answer": "- Step 1: The error is that each half-life halves *whatever remains*, not the original amount. After 1 half-life: $$N_0/2$$ remain. After 2 half-lives: half of the remaining $$N_0/2$$ decays, leaving $$N_0/4$$ (not zero). After 3: $$N_0/8$$, and so on.\n- Step 2: Mathematically, $$N = N_0 \\times (1/2)^n$$. After 2 half-lives: $$N_0 \\times (1/2)^2 = N_0/4$$ — 75% has decayed, 25% remains. The sample never reaches exactly zero; it approaches it asymptotically. The \"half plus half\" mistake treats the halves as additive fractions of the original, rather than successive multiplicative reductions.", "source": "GLM 5.1 ②", "_id": "glm_2_23"}, {"question": "A helium-4 nucleus has less mass than 2 free protons + 2 free neutrons. Where did the \"missing mass\" go? Is mass destroyed? (3 steps)", "answer": "- Step 1: The mass defect is $$\\Delta m = Z m_p + (A-Z) m_n - m_{\\text{nucleus}}$$. This missing mass is not destroyed — it is converted into energy via $$\\Delta E = \\Delta m \\, c^2$$.\n- Step 2: When nucleons bind together, they release energy (the binding energy). By mass-energy equivalence, releasing energy means losing mass. The bound system is at a lower energy state than the separated nucleons.\n- Step 3: Mass is not \"destroyed\" — it is converted to energy that is carried away (e.g., as gamma photons or kinetic energy of products) when the nucleus forms. The total mass-energy of the closed system is conserved.\n\nTakeaway: Mass defect ≠ mass destruction. The missing mass becomes the binding energy released when the nucleus assembles.", "source": "GLM 5.1 ③", "_id": "glm_3_30"}, {"question": "Why is the energy released per kg of fuel vastly higher in fusion than in chemical combustion? Use the magnitude of $$c^2$$ in your reasoning. (3 steps)", "answer": "- Step 1: Chemical reactions involve rearrangement of *electrons* and release energies of $$\\sim$$ eV per bond.\n- Step 2: Nuclear reactions involve rearrangement of *nucleons* and release energies of $$\\sim$$ MeV per reaction — a factor of $$10^6$$ higher per particle.\n- Step 3: Equivalently, $$E = mc^2$$ with $$c^2 \\approx 9 \\times 10^{16} \\text{ m}^2\\text{s}^{-2}$$ means even a tiny mass conversion releases enormous energy: $$1 \\text{ g}$$ fully converted gives $$\\sim 9 \\times 10^{13} \\text{ J}$$ — equivalent to about $$20$$ kilotonnes of TNT. Even though nuclear reactions convert only a small *fraction* of the input mass to energy (perhaps $$0.1$$–$$1\\%$$), this still dwarfs chemical processes that convert essentially $$0\\%$$ of mass.", "source": "Opus 4.7 ②", "_id": "opus_2_41"}, {"question": "In a cyclotron, why does the orbital period of a non-relativistic particle stay constant even as it speeds up? (3 steps)", "answer": "- Step 1: The radius grows with speed: $$r = mv/(BQ)$$. So a faster particle has a larger orbit.\n- Step 2: But the circumference also grows in the same proportion: $$\\text{circumference} = 2\\pi r = 2\\pi mv/(BQ)$$.\n- Step 3: The time to go around is circumference / speed = $$2\\pi m/(BQ)$$ — **independent of $$v$$**. So as the particle gains energy and spirals outward, the time per revolution stays the same. This is why the AC voltage can be at a single fixed frequency (the cyclotron frequency) and still resonantly push the particle on every gap crossing.\n\nThis breaks down at relativistic speeds, where $$m$$ effectively increases with energy.", "source": "Opus 4.7 ②", "_id": "opus_2_50"}, {"question": "A student takes a Geiger counter into a room with no radioactive sources and still gets a non-zero reading. Where does this count come from, and what must be done before analysing a radioactive source's count rate? (2 steps)", "answer": "- Step 1: The reading is background radiation — always present from natural and artificial sources: cosmic rays, radon gas from rocks (especially granite), potassium-40 in food, carbon-14 in the atmosphere, medical X-rays, past nuclear fallout, etc.\n- Step 2: Before any half-life or absorption analysis, you must subtract the background count rate from the measured count rate. Without this subtraction, your calculated half-life will be too long (the background adds a constant offset that makes the decay appear slower than it really is).\n\nTakeaway: Background radiation is always there — subtract it first or your results are wrong.", "source": "GLM 5.1 ③", "_id": "glm_3_5"}, {"question": "Why does the cyclotron's orbit radius increase with each half-revolution, even though the magnetic field is uniform? (2 steps)", "answer": "- Step 1: The radius is $$r = mv/(BQ)$$. Each time the ion crosses the gap between the dees, the alternating voltage accelerates it, increasing $$v$$. Since $$r \\propto v$$ (with $$m$$, $$B$$, $$Q$$ constant), the radius grows.\n- Step 2: The particle spirals outward in ever-widening semicircles. Eventually the radius exceeds the dee boundary, and the particle exits the cyclotron at high energy. The uniform $$B$$ field ensures circular motion, but the speed boost at each gap is what drives the spiral.", "source": "GLM 5.1 ②", "_id": "glm_2_39"}, {"question": "Why is the half-life of a radioisotope independent of temperature, pressure, and chemical state?", "answer": "Nuclear decay is driven by physics inside the nucleus — the strong and weak forces between nucleons — operating on energy scales of MeV. Temperature, pressure, and chemical bonding affect the *electron cloud* of the atom, operating on energy scales of eV (a million times smaller). These external conditions are utterly negligible compared to nuclear energies, so they cannot influence whether a nucleon rearranges. Whether your uranium atom is at $$0\\degree$$ C or $$1000\\degree$$ C, in a vacuum or under pressure, free or chemically bonded — its decay probability per second is the same. Half-life is **intrinsic** to the isotope.", "source": "Opus 4.7 ②", "_id": "opus_2_25"}, {"question": "Compare alpha and beta-minus decay equations: which conserves what, and what specific particles must always appear? (3 steps)", "answer": "- Step 1: Both decays conserve **nucleon number** $$A$$ and **proton number** $$Z$$ across the equation. Both also conserve **lepton number** and charge.\n- Step 2: + Alpha: $$^A_Z X \\rightarrow ^{A-4}_{Z-2} Y + ^{4}_{2}\\alpha$$. No neutrino needed — alpha decay does not involve lepton number change.\n+ Beta-minus: $$^A_Z X \\rightarrow ^{A}_{Z+1} Y + ^{0}_{-1}\\beta + \\bar{\\nu}_e$$. The antineutrino is *required* for lepton number conservation, because the emitted electron carries lepton number $$+1$$.\n- Step 3: Common trap: writing the beta decay without the antineutrino. Examiners deduct marks because lepton number conservation is violated.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "Why is gamma emission usually a *secondary* process — accompanying alpha or beta decay rather than happening alone? (2 steps)", "answer": "- Step 1: After alpha or beta decay, the daughter nucleus often ends up in an *excited* energy state — its nucleons are arranged in a not-yet-lowest configuration.\n- Step 2: The nucleus de-excites by emitting a high-energy photon (gamma ray) — the nuclear equivalent of an atomic electron dropping to a lower orbital. No change in $$A$$ or $$Z$$ — just shedding excess energy. That's why gamma emission tags along with other decays rather than being a standalone decay mode for the parent.", "source": "Opus 4.7 ①", "_id": "opus_1_43"}, {"question": "Why is the minimum photon energy for pair production $$2mc^2$$ rather than $$mc^2$$? (3 steps)", "answer": "- Step 1: Pair production creates **both** a particle and its antiparticle. Each has rest mass $$m$$, so the total rest-mass energy that must be supplied is $$2mc^2$$.\n- Step 2: The factor of 2 is not optional — you cannot create just a particle without an antiparticle (this would violate charge conservation and lepton/baryon number conservation).\n- Step 3: For electron-positron pair production: $$E_{\\min} = 2 m_e c^2 \\approx 1.022 \\text{ MeV}$$. Any photon with less than this energy simply cannot produce the pair, no matter what. (In practice, pair production also requires a nearby nucleus to absorb momentum — but the *energy* threshold is set by $$2mc^2$$.)", "source": "Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "The nucleus contains protons and neutrons, yet beta-minus decay ejects an electron. How is this possible, and what happens to the proton number $$Z$$ of the nucleus as a result? (3 steps)", "answer": "- Step 1: A beta-minus particle is indeed an electron, but it does not exist in the nucleus beforehand. Instead, it is created when a **neutron converts into a proton**.\n- Step 2: In this conversion, charge must be conserved. A neutron (charge 0) becomes a proton (charge +1), so a particle of charge –1 must be emitted to balance the books: that is the electron ($$^0_{-1}\\beta$$).\n- Step 3: Because a neutron has turned into a proton, the proton number $$Z$$ of the nucleus **increases by 1**. The nucleon number $$A$$ remains unchanged.", "source": "GLM 5.1 ①", "_id": "glm_1_3"}, {"question": "In the fission of $$^{235}U$$, each event produces 2–3 neutrons. Explain how this enables a chain reaction, and distinguish between a controlled reactor and an uncontrolled explosion. (3 steps)", "answer": "- Step 1: The emitted neutrons can be absorbed by other $$^{235}U$$ nuclei, inducing further fission events. Each new fission produces more neutrons → exponential growth of events → chain reaction.\n- Step 2: In a nuclear weapon, the design maximises the multiplication factor (each fission causes more than one subsequent fission on average), leading to a runaway supercritical reaction and an enormous energy release in microseconds.\n- Step 3: In a nuclear reactor, control rods (made of neutron-absorbing materials like boron or cadmium) are inserted to absorb excess neutrons, keeping the multiplication factor at exactly 1 (critical). Each fission causes exactly one more fission — steady, controlled power output. A moderator slows fast neutrons to thermal energies where they are more likely to be absorbed by $$^{235}U$$.\n\nTakeaway: Chain reaction: neutrons from one fission trigger the next. Control rods absorb; moderators slow. Weapon = supercritical; reactor = critical.", "source": "GLM 5.1 ③", "_id": "glm_3_37"}, {"question": "Why does alpha radiation have the highest ionizing power while gamma radiation has the lowest, despite being the most penetrating?", "answer": "- Ionizing power refers to how effectively a radiation type removes electrons from atoms it encounters.\n- Alpha particles carry a +2e charge and have the largest mass (4 u), so they collide frequently with atomic electrons and transfer energy efficiently with each collision — resulting in high ionization but they lose energy quickly, hence low penetration.\n- Gamma rays are massless, neutral photons with no charge; they interact weakly with matter and can pass through much material before depositing energy — resulting in low ionization but high penetration.\n- The relationship is inverse: highest penetration → lowest ionization, and vice versa.", "source": "MiniMax ①", "_id": "minimax_1_4"}, {"question": "Why is it tempting (and wrong) to use simple proportional scaling — e.g. saying \"5.5/1.8 of a half-life passes\" — for decay problems?", "answer": "- Step 1: Decay is *not* linear in time. Doubling the time does not double the fraction decayed; it doubles the *number of halvings*, which is exponential.\n- Step 2: The correct dependence is $$N = N_0 (1/2)^{t/t_{1/2}}$$. The exponent $$t/t_{1/2}$$ enters as a *power*, not a *multiplier*. So a ratio of times must be raised as an exponent, not cross-multiplied.\n- Step 3: Build the \"magic table\" of half-lives and corresponding times, or use the formula directly. Linear ratios always give the wrong answer for decay.", "source": "Opus 4.7 ①", "_id": "opus_1_18"}, {"question": "Why does the linac (linear accelerator) have *progressively longer* drift tubes? (3 steps)", "answer": "- Step 1: The accelerator uses a fixed-frequency AC voltage. To stay in sync, the ion must spend the same *time* inside each drift tube (where it coasts shielded from the field).\n- Step 2: But the ion *speeds up* each time it crosses a gap (gaining kinetic energy from $$eV$$). So to cover the same time in less time per unit length, the tube must be longer.\n- Step 3: Mathematically, $$L_n \\propto v_n \\propto \\sqrt{n}$$ (for non-relativistic ions). Each successive tube is longer to match the ion's increasing speed. This is the elegance of the linac design — uniform timing despite changing speed.", "source": "Opus 4.7 ①", "_id": "opus_1_52"}, {"question": "A student says \"the nucleus contains binding energy.\" Rewrite this statement correctly and explain why the original is physically misleading. (2 steps)", "answer": "- Step 1: Correct version: \"The binding energy is the energy that must be *supplied* to separate the nucleus into its constituent nucleons.\" It is not inside the nucleus — it is the energy *deficit* of the bound system relative to its separated parts.\n- Step 2: Saying the nucleus \"contains\" binding energy implies it is a reservoir of stored energy, like a compressed spring. In reality, the bound nucleus has *less* energy (and less mass) than its separated constituents. If you want to release energy, you don't \"tap into\" the binding energy — you rearrange nucleons into a *more tightly bound* configuration, and the increased binding energy shows up as released energy. The phrasing \"contains binding energy\" inverts the physics.", "source": "GLM 5.1 ②", "_id": "glm_2_61"}, {"question": "In beta-plus decay, a proton converts to a neutron. But a proton is lighter than a neutron — how can this happen? (2 steps)", "answer": "- Step 1: It is true that a free proton cannot decay into a neutron (it would violate energy conservation for an isolated proton). However, inside a nucleus, the proton is not free — the nuclear binding energy context makes the overall transformation energetically favourable for the nucleus as a whole.\n- Step 2: The key is that the daughter nucleus has a higher total binding energy (is more stable) than the parent, which compensates for the mass increase of the individual nucleon. The reaction is: $$^1_1 p \\rightarrow ^1_0 n + ^0_{+1}\\beta + \\nu_e$$, and it occurs only within certain neutron-deficient nuclei where the overall mass-energy balance is favourable.", "source": "GLM 5.1 ②", "_id": "glm_2_7"}, {"question": "Walk through, qualitatively, why an electron accelerated through a potential difference $$V$$ gains kinetic energy $$eV$$. (2 steps)", "answer": "- Step 1: Definition of potential difference: $$V$$ joules of work are done per coulomb of charge moved through it. So moving charge $$Q$$ across $$V$$ does work $$QV$$.\n- Step 2: For an electron, $$Q = e$$, so work done = $$eV$$. If the electron starts at rest, all this work becomes kinetic: $$\\frac{1}{2} m_e v^2 = eV$$, giving $$v = \\sqrt{2eV/m_e}$$.\n\nTakeaway: $$eV$$ is literally the energy gained per electron per volt — that's why the unit \"electronvolt\" exists.", "source": "Opus 4.7 ①", "_id": "opus_1_32"}, {"question": "In thermionic emission, what causes electrons to escape from a metal surface, and how is this different from photoelectric emission? (3 steps)", "answer": "- Step 1: In thermionic emission, the metal is heated. Conduction electrons gain thermal kinetic energy from the lattice vibrations. When an electron's kinetic energy exceeds the work function (the binding energy holding it at the surface), it can escape.\n- Step 2: In the photoelectric effect, electrons escape by absorbing energy from individual incident photons (one photon → one electron), with no heating required. The driving force is electromagnetic, not thermal.\n- Step 3: The key difference: thermionic emission is a *thermal* process — electrons gain energy from the random thermal motion of the lattice. Photoelectric emission is a *quantum* process — energy comes from photon absorption. Both require the electron to overcome the work function, but the energy source differs.", "source": "GLM 5.1 ②", "_id": "glm_2_12"}, {"question": "In beta-plus decay, which nucleon converts to which, what particles are emitted, and how does $$Z$$ change? (3 steps)", "answer": "- Step 1: A **proton converts into a neutron** inside the nucleus.\n- Step 2: To conserve charge (proton is $$+e$$, neutron is $$0$$), a particle of charge $$+e$$ must be emitted — the **positron** $$^{0}_{+1}\\beta$$. To conserve lepton number, an **electron neutrino** $$\\nu_e$$ is also emitted.\n- Step 3: The full process is $$^1_1p \\rightarrow ^1_0n + ^{0}_{+1}\\beta + \\nu_e$$. So $$\\beta^+$$ decay **decreases** $$Z$$ by $$1$$ (one fewer proton), while $$A$$ is unchanged.\n\nMemory hook: $$\\beta^-$$ adds a proton (Z up); $$\\beta^+$$ removes a proton (Z down). Students very commonly flip these.", "source": "Opus 4.7 ②", "_id": "opus_2_8"}, {"question": "In beta-plus decay, a proton converts to a neutron. Write this process symbolically and explain what is emitted. Why can't this happen to a free proton in empty space? (3 steps)", "answer": "- Step 1: The process: $$^1_1 p \\rightarrow \\, ^1_0 n + \\, ^0_{+1} \\beta + \\nu_e$$. A positron ($$β^+$$) and a neutrino ($$\\nu_e$$) are emitted.\n- Step 2: The proton loses its positive charge by emitting a positron (charge +1), becoming neutral (neutron). Lepton number is conserved: the neutrino carries lepton number +1 to balance the positron's −1.\n- Step 3: A free proton cannot undergo beta-plus decay because it would require energy (a neutron is slightly heavier than a proton). It only happens inside nuclei where the resulting nuclear configuration has a lower total energy, making the process energetically favourable overall.\n\nTakeaway: Beta-plus requires the nuclear environment to supply the energy difference; it's forbidden for an isolated proton.", "source": "GLM 5.1 ③", "_id": "glm_3_9"}, {"question": "A proton is composed of quarks uud and a neutron is udd. Verify the charge of each. If you could replace one quark in a neutron with an up quark, what particle would you create? (3 steps)", "answer": "- Step 1: Proton (uud): $$+\\frac{2}{3} + \\frac{2}{3} - \\frac{1}{3} = +1e$$ ✓. Neutron (udd): $$+\\frac{2}{3} - \\frac{1}{3} - \\frac{1}{3} = 0$$ ✓.\n- Step 2: Replace one down quark in the neutron (udd) with an up quark → uud. That gives the quark composition of a proton.\n- Step 3: This is essentially what happens in beta-minus decay: a down quark in the neutron converts to an up quark (via the weak force), turning the neutron into a proton, with the electron and antineutrino carrying away the charge and lepton number.\n\nTakeaway: Quark flavour change (d→u) is the microscopic mechanism behind beta-minus decay.", "source": "GLM 5.1 ③", "_id": "glm_3_20"}, {"question": "Using the binding-energy-per-nucleon curve, explain why BOTH fission of heavy nuclei AND fusion of light nuclei release energy, even though they seem like opposite processes. (3 steps)", "answer": "- Step 1: The universal rule: a nuclear reaction releases energy if and only if the products have a *higher* binding energy per nucleon than the reactants. \"Moving up the curve\" releases energy.\n- Step 2: Fission: heavy nuclei (right side of curve, low $$B/A$$) split into medium-mass daughters (higher $$B/A$$, closer to the peak). Moving up → energy released.\n- Step 3: Fusion: very light nuclei (far left, very low $$B/A$$) combine into a slightly heavier nucleus (higher $$B/A$$, climbing the steep left slope). Moving up → energy released. Both processes climb toward iron-56 from opposite sides of the curve.\n\nTakeaway: Fission and fusion both release energy because they both move nuclei toward the peak of the $$B/A$$ curve. The peak is the \"valley\" of nuclear stability.", "source": "GLM 5.1 ③", "_id": "glm_3_35"}, {"question": "A gamma decay does not change $$A$$ or $$Z$$. So what *does* it do, and why does it happen?", "answer": "Gamma emission occurs when a nucleus is in an **excited state** (often immediately after an alpha or beta decay has left the daughter in a higher-energy configuration). The nucleons rearrange to a lower-energy arrangement, and the energy difference is carried away as a high-frequency electromagnetic photon — the gamma ray. Because the photon carries no charge and no mass, the nucleon and proton counts are unchanged: $$^A_Z X^* \\rightarrow ^A_Z X + \\gamma$$. This is the nuclear analogue of an electron dropping down between atomic shells and emitting visible light — but the energies involved (MeV) are far higher.", "source": "Opus 4.7 ②", "_id": "opus_2_10"}, {"question": "In annihilation, a particle meets its antiparticle and both vanish. Why must *two* photons be produced rather than one? (2 steps)", "answer": "- Step 1: A single photon cannot simultaneously conserve both energy and momentum. In the centre-of-mass frame, the total momentum before annihilation is zero, but a single photon always carries momentum $$p = E/c$$. One photon would give non-zero final momentum — violating conservation.\n- Step 2: Two photons emitted back-to-back (equal energy, opposite directions) have total momentum zero, matching the initial state. Each photon carries energy $$mc^2$$, so total energy $$2mc^2$$ equals the combined rest energy of the particle–antiparticle pair. Both energy and momentum are conserved.", "source": "GLM 5.1 ②", "_id": "glm_2_17"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "In Rutherford's gold-foil experiment, most alpha particles passed straight through the foil, but a tiny fraction bounced back at angles greater than 90°. What specific conclusion does the \"back-scattering\" observation allow us to draw about the structure of the atom? (2 steps)", "answer": "- Step 1: For an alpha particle (which is positive) to be repelled backwards, it must encounter a concentration of positive charge that is sufficiently dense and strong to reverse its direction via electrostatic repulsion.\n- Step 2: The fact that only a *tiny fraction* bounce back implies this positive mass is extremely small compared to the total size of the atom, leading to the conclusion that the atom has a tiny, dense, positively charged nucleus.\n\nThis observation rules out the \"plum pudding\" model, which predicted only small-angle deflections.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "An element has a proton number of 6. One version of this element has a nucleon number of 12, and another has a nucleon number of 14. What is the relationship between these two versions, and how do they differ physically? (2 steps)", "answer": "- Step 1: They are **isotopes**. By definition, isotopes are atoms of the same element (same proton number $$Z$$) that possess different numbers of neutrons.\n- Step 2: Since $$A = Z + N$$ (where $$N$$ is the neutron number), the version with $$A=12$$ has 6 neutrons, while the version with $$A=14$$ has 8 neutrons. They have the same chemical properties (governed by electrons/protons) but different nuclear stability and mass.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "Alpha radiation is often described as a helium nucleus. If an alpha particle is represented as $$^4_2\\alpha$$, explain why it has a high ionising power but a very short range in air compared to other radiation types. (3 steps)", "answer": "- Step 1: Ionisation involves removing electrons from atoms. The alpha particle carries a large relative charge of $$+2e$$ and has a significant mass (4 u), meaning it has a strong electrostatic pull on nearby electrons and a high probability of interacting with them.\n- Step 2: Because it interacts so frequently and effectively with the air molecules, it transfers its energy very quickly, creating many ions along a short path.\n- Step 3: Consequently, it loses all its kinetic energy over a very short distance (3–10 cm in air), resulting in high ionising power but low penetrating power.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "The nucleus contains protons and neutrons, yet beta-minus decay ejects an electron. How is this possible, and what happens to the proton number $$Z$$ of the nucleus as a result? (3 steps)", "answer": "- Step 1: A beta-minus particle is indeed an electron, but it does not exist in the nucleus beforehand. Instead, it is created when a **neutron converts into a proton**.\n- Step 2: In this conversion, charge must be conserved. A neutron (charge 0) becomes a proton (charge +1), so a particle of charge –1 must be emitted to balance the books: that is the electron ($$^0_{-1}\\beta$$).\n- Step 3: Because a neutron has turned into a proton, the proton number $$Z$$ of the nucleus **increases by 1**. The nucleon number $$A$$ remains unchanged.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": true}, {"question": "Gamma radiation is the most penetrating type of nuclear radiation, but the least ionising. Explain the inverse relationship between penetrating power and ionising power using the nature of gamma radiation. (2 steps)", "answer": "- Step 1: Gamma rays are high-energy electromagnetic waves (photons) with zero charge and zero mass. Because they carry no charge, they do not exert electrostatic forces on atomic electrons as they pass by, making interactions (and thus ionisations) rare.\n- Step 2: Because they interact so infrequently with matter, they lose energy very slowly and can travel long distances (hundreds of metres in air, requiring thick lead or concrete to stop them), making them highly penetrating but weakly ionising.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "When a nucleus undergoes alpha decay, how do the nucleon number $$A$$ and proton number $$Z$$ change in the daughter nucleus compared to the parent? (2 steps)", "answer": "- Step 1: The alpha particle is $$^4_2\\alpha$$, meaning it carries away 4 units of mass (2 protons + 2 neutrons) and 2 units of charge. Therefore, the nucleon number $$A$$ of the daughter nucleus decreases by 4.\n- Step 2: The proton number $$Z$$ decreases by 2 because two protons have been lost. The general form is $$^A_ZX \\rightarrow ^{A-4}_{Z-2}Y + ^4_2\\alpha$$.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "In beta-minus decay, an antineutrino $$\\bar{\\nu}_e$$ is emitted alongside the electron. If we only accounted for the electron, which conservation law would appear to be violated, and why does the antineutrino fix this? (2 steps)", "answer": "- Step 1: Without the antineutrino, **lepton number** would not be conserved. The electron is a lepton with lepton number $$+1$$, but the initial state (neutron) has a lepton number of 0.\n- Step 2: The antineutrino is an antilepton with lepton number $$-1$$. The total lepton number of the products ($$+1$$ for the electron and $$-1$$ for the antineutrino) is 0, matching the initial state. It also carries away \"missing\" kinetic energy to conserve energy and momentum.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "A charged particle moves perpendicular to a uniform magnetic field. The radius of its circular path is given by $$r = \\frac{mv}{BQ}$$. If you double the mass of the particle but keep its speed and charge the same, what happens to the radius, and why? (2 steps)", "answer": "- Step 1: The radius is directly proportional to the momentum $$mv$$ of the particle, assuming the magnetic field $$B$$ and charge $$Q$$ are constant.\n- Step 2: If the mass doubles while speed remains constant, the momentum doubles. Therefore, the radius of the circular path also doubles. A heavier particle at the same speed is harder to deflect, so it sweeps a wider arc.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "In a linear accelerator (linac), the drift tubes get progressively longer along the beam line. Explain why this lengthening is necessary. (2 steps)", "answer": "- Step 1: The alternating voltage that accelerates the ions has a fixed frequency. To stay in phase with the accelerating gaps, the ions must spend the *same amount of time* inside each drift tube.\n- Step 2: As the ions are accelerated, their speed increases. To spend the same time traversing a tube while moving faster, the tube must be longer. Hence, tube length increases with particle speed.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "In a cyclotron, the period of revolution for a charged particle in a magnetic field is $$T = \\frac{2\\pi m}{BQ}$$. Why is this formula crucial for the operation of the cyclotron? (2 steps)", "answer": "- Step 1: The formula shows that the period $$T$$ depends only on the mass $$m$$, magnetic field $$B$$, and charge $$Q$$, but is **independent of the speed** $$v$$ or radius $$r$$.\n- Step 2: Because the period remains constant even as the particle spirals outward and speeds up, the alternating voltage applied across the \"dees\" can operate at a single, fixed frequency, ensuring the particle is always accelerated when it crosses the gap.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "A proton is composed of two up quarks and one down quark (uud), while a neutron is composed of one up quark and two down quarks (udd). Verify the charges of both particles using the quark charges: up = $$+\\frac{2}{3}e$$, down = $$-\\frac{1}{3}e$$. (2 steps)", "answer": "- Step 1: For the proton (uud): Total charge = $$+\\frac{2}{3} + \\frac{2}{3} - \\frac{1}{3} = +1e$$. This matches the proton's known charge.\n- Step 2: For the neutron (udd): Total charge = $$+\\frac{2}{3} - \\frac{1}{3} - \\frac{1}{3} = 0$$. This matches the neutron's neutral charge.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "Hadrons and leptons are two families of particles in the Standard Model. What is the fundamental structural difference between them regarding the strong nuclear force? (2 steps)", "answer": "- Step 1: **Hadrons** are particles made of quarks, and they interact via the strong nuclear force (as well as the weak and electromagnetic). Examples include protons and neutrons.\n- Step 2: **Leptons** are fundamental particles (not made of quarks) that do *not* interact via the strong nuclear force. Examples include electrons and neutrinos.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "When an electron and a positron annihilate, they produce two gamma-ray photons. Why must the total energy of the two photons equal *at least* $$2m_ec^2$$? (2 steps)", "answer": "- Step 1: Both the electron and the positron have rest mass, and each possesses a rest-mass energy of $$m_ec^2$$. By conservation of energy, the total energy of the products must equal the total energy of the initial particles.\n- Step 2: Therefore, the minimum energy released (when the particles are essentially at rest) is the sum of their rest-mass energies: $$m_ec^2 + m_ec^2 = 2m_ec^2$$. If they have kinetic energy, the photon energy will be greater.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "Pair production is the reverse of annihilation. Why is the threshold energy for a photon to create an electron-positron pair exactly $$2m_ec^2$$, and why must it happen near a nucleus? (2 steps)", "answer": "- Step 1: To create an electron and a positron, the photon must supply the rest-mass energy for *both* particles. Since each has mass $$m_e$$, the minimum energy required is $$2m_ec^2$$.\n- Step 2: Pair production cannot occur in free space because a single photon cannot conserve both energy and momentum simultaneously while creating two massive particles. A nearby nucleus absorbs the recoil momentum, allowing conservation laws to be satisfied.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "Nuclear decay is described as a \"random\" process. What does this mean for an individual nucleus, and how does it differ from the macroscopic behaviour of a large sample? (2 steps)", "answer": "- Step 1: For an individual nucleus, \"random\" means it is impossible to predict *when* it will decay. There is no aging or wear-out mechanism; the probability of decay in the next second is constant, regardless of how long the nucleus has existed.\n- Step 2: For a large sample, while individual events are unpredictable, the *average* behaviour is statistically predictable. We can define a constant probability per unit time (the decay constant $$\\lambda$$) that allows us to model the sample's activity accurately.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "Define the decay constant $$\\lambda$$ and explain its relationship to the activity $$A$$ of a radioactive sample. (2 steps)", "answer": "- Step 1: The decay constant $$\\lambda$$ is the **probability per unit time** that any given nucleus will decay. It has units of $$s^{-1}$$.\n- Step 2: Activity $$A$$ is the total number of decays per second in the sample. If there are $$N$$ undecayed nuclei, and each has a probability $$\\lambda$$ of decaying per second, the total rate of decay is $$A = \\lambda N$$.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "The exponential decay law is $$N = N_0 e^{-\\lambda t}$$. Explain the physical reasoning that leads from the definition of decay rate ($$\\frac{dN}{dt} = -\\lambda N$$) to this equation. (3 steps)", "answer": "- Step 1: The rate of change of undecayed nuclei is proportional to the number currently present: $$\\frac{dN}{dt} = -\\lambda N$$. The negative sign indicates the number is decreasing.\n- Step 2: This is a separable differential equation. Rearranging gives $$\\frac{1}{N} dN = -\\lambda dt$$. Integrating both sides yields $$\\ln(N) = -\\lambda t + C$$.\n- Step 3: At $$t=0$$, $$N=N_0$$, so $$C = \\ln(N_0)$$. Therefore, $$\\ln(N) - \\ln(N_0) = -\\lambda t$$, which simplifies to $$\\ln(\\frac{N}{N_0}) = -\\lambda t$$. Taking the exponential of both sides gives the decay law: $$N = N_0 e^{-\\lambda t}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "Derive the relationship between the half-life $$t_{1/2}$$ and the decay constant $$\\lambda$$. (3 steps)", "answer": "- Step 1: By definition, half-life is the time $$t$$ at which the number of nuclei $$N$$ is exactly half of $$N_0$$. Substitute $$N = \\frac{N_0}{2}$$ and $$t = t_{1/2}$$ into the decay law: $$\\frac{N_0}{2} = N_0 e^{-\\lambda t_{1/2}}$$.\n- Step 2: Cancel $$N_0$$ to get $$\\frac{1}{2} = e^{-\\lambda t_{1/2}}$$. Take the natural logarithm of both sides: $$\\ln(\\frac{1}{2}) = -\\lambda t_{1/2}$$.\n- Step 3: Since $$\\ln(\\frac{1}{2}) = -\\ln(2)$$, the negatives cancel, leaving $$t_{1/2} = \\frac{\\ln 2}{\\lambda} \\approx \\frac{0.693}{\\lambda}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": true}, {"question": "A student measures the count rate from a radioactive source to be 520 counts/min. The background radiation in the lab is 20 counts/min. If the student forgets to subtract the background, will their calculated half-life be too long or too short? (2 steps)", "answer": "- Step 1: The true activity of the source is $$520 - 20 = 500$$ counts/min. If background is not subtracted, the student thinks the initial activity is 520, and the final activity will also be inflated by the constant 20 counts/min background.\n- Step 2: Because the measured count rate appears to drop from 520 to a lower limit that approaches 20 (rather than 0), the decay curve appears \"flatter\" (slower decay). This leads to an overestimate of the half-life—i.e., the calculated half-life will be **too long**.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "What is the \"mass defect\" of a nucleus, and why is it called a \"defect\"? (2 steps)", "answer": "- Step 1: The mass defect $$\\Delta m$$ is the difference between the sum of the masses of the individual, separated nucleons (protons and neutrons) and the actual measured mass of the intact, bound nucleus.\n- Step 2: It is called a \"defect\" because the bound nucleus always weighs *less* than the sum of its parts. The \"missing\" mass has been converted into the energy that binds the nucleus together (via $$E=mc^2$$).", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "A common misconception is that \"binding energy is the energy stored inside the nucleus.\" Why is this definition incorrect, and what is the correct definition? (2 steps)", "answer": "- Step 1: The misconception implies the nucleus contains extra energy. In reality, the bound nucleus is in a *lower* energy state than its separated constituents (that is why it is stable).\n- Step 2: Binding energy is correctly defined as the **energy required to pull the nucleus apart** into its constituent protons and neutrons, separating them to infinity. It is the energy that must be *supplied* to break the bonds, not energy \"stored\" inside.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": true}, {"question": "On the binding energy per nucleon curve, the value rises steeply from hydrogen to helium, peaks near iron-56, and then slowly declines for heavier elements. Explain why the curve declines for elements heavier than iron. (2 steps)", "answer": "- Step 1: In heavy nuclei, there are many protons packed together. The strong nuclear force is short-range and only attracts nearest neighbours, but the electrostatic repulsion between protons is long-range and acts across the entire nucleus.\n- Step 2: As the nucleus grows, the cumulative repulsive force from all the protons increasingly counteracts the binding effect of the strong force. This reduces the net binding energy per nucleon, causing the curve to decline.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": true}, {"question": "Both nuclear fission (splitting heavy nuclei) and nuclear fusion (joining light nuclei) release energy. Using the binding energy per nucleon curve, explain the single rule that determines whether a nuclear reaction releases energy. (2 steps)", "answer": "- Step 1: Energy is released if and only if the products have a **higher binding energy per nucleon** than the reactants. This means the nucleons are more tightly bound in the products than in the reactants.\n- Step 2: On the curve, this means the reaction moves *towards* the peak (iron-56). Fission moves from the far right (heavy, low BE/nucleon) toward the centre, and fusion moves from the far left (light, low BE/nucleon) toward the centre. Both move \"up\" the curve.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "In a nuclear fission reactor, what is the distinct role of the *moderator* compared to the *control rods*? (2 steps)", "answer": "- Step 1: The **moderator** (e.g., water, graphite) slows down the fast-moving neutrons produced by fission. Slow (\"thermal\") neutrons are more likely to be absorbed by Uranium-235 to sustain the chain reaction.\n- Step 2: The **control rods** (e.g., boron, cadmium) absorb excess neutrons entirely. By moving the rods in or out, operators control the reaction rate, ensuring the multiplication factor is exactly 1 (one fission leads to exactly one subsequent fission) for safe, steady power.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "Nuclear fusion in stars requires enormous temperatures (e.g., $$>10^7$$ K). Explain the specific physical challenge that these high temperatures must overcome for fusion to occur. (2 steps)", "answer": "- Step 1: Both nuclei involved in fusion (e.g., hydrogen) are positively charged and exert a strong electrostatic repulsion on one another (the Coulomb barrier). At low temperatures, they cannot get close enough to interact.\n- Step 2: At extreme temperatures, the nuclei have enormous kinetic energy, allowing them to overcome the electrostatic repulsion and get close enough for the **short-range strong nuclear force** to take over and bind them together.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "The atomic mass unit (u) is defined as $$\\frac{1}{12}$$ of the mass of a carbon-12 atom. Why is the conversion factor $$1 \\text{ u} \\approx 931.5 \\text{ MeV}/c^2$$ so useful in nuclear physics calculations? (2 steps)", "answer": "- Step 1: Nuclear energies are typically in MeV and masses are often given in u. Using $$\\Delta E = \\Delta m c^2$$ directly with kg and Joules requires cumbersome powers of 10.\n- Step 2: The factor 931.5 MeV/$$c^2$$ incorporates the $$c^2$$ conversion. If you find a mass defect in u, you can simply multiply by 931.5 to immediately get the energy in MeV, bypassing the conversion to kg and Joules entirely.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": true}, {"question": "A sample of Fermium-253 has a half-life of 3 days. If you start with $$8.0 \\times 10^{12}$$ nuclei, roughly how many will remain after 6 days? (Mental math exercise) (2 steps)", "answer": "- Step 1: Determine the number of half-lives. 6 days is $$6/3 = 2$$ half-lives.\n- Step 2: After each half-life, the number halves. After 1 half-life: $$4.0 \\times 10^{12}$$. After 2 half-lives: $$2.0 \\times 10^{12}$$ nuclei.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": true}, {"question": "A radioactive source has an initial activity of 800 Bq and a half-life of 20 minutes. What is the approximate activity after 1 hour? (Mental math exercise) (2 steps)", "answer": "- Step 1: 1 hour is 60 minutes. Since the half-life is 20 minutes, this is $$60/20 = 3$$ half-lives.\n- Step 2: The activity halves three times: $$800 \\rightarrow 400 \\rightarrow 200 \\rightarrow 100$$. The final activity is 100 Bq.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "A nuclide has a mass defect of 0.10 u. Without doing a full calculation in kg, estimate the binding energy in MeV. (2 steps)", "answer": "- Step 1: Recall the conversion factor: $$1 \\text{ u} \\approx 931.5 \\text{ MeV}/c^2$$. This means every 1 u of mass defect corresponds to 931.5 MeV of energy.\n- Step 2: Multiply the mass defect by this factor: $$0.10 \\times 931.5 \\approx 93 \\text{ MeV}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "In beta-plus decay, a proton converts into a neutron, a positron, and a neutrino. What happens to the proton number $$Z$$ and nucleon number $$A$$ of the nucleus? (2 steps)", "answer": "- Step 1: Since a proton is lost (converted to a neutron), the number of protons in the nucleus decreases. Therefore, the proton number $$Z$$ **decreases by 1**.\n- Step 2: The total number of nucleons (protons + neutrons) remains the same—one is just swapped for the other. Therefore, the nucleon number $$A$$ is **unchanged**.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "Thermionic emission is used in electron guns. Briefly explain the mechanism of thermionic emission. (2 steps)", "answer": "- Step 1: A metal is heated to a high temperature, causing its conduction electrons to gain significant thermal kinetic energy.\n- Step 2: Some electrons gain enough energy to overcome the work function (the binding energy) of the metal surface and escape into the vacuum, where they can then be accelerated by an electric field.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "An electron is accelerated from rest through a potential difference $$V$$. Write the equation that relates its final kinetic energy to the potential difference, and explain the terms. (2 steps)", "answer": "- Step 1: The kinetic energy gained equals the work done by the electric field on the electron. Work done is charge $$\\times$$ potential difference.\n- Step 2: Therefore, $$\\frac{1}{2}mv^2 = eV$$, where $$m$$ is the electron mass, $$v$$ is its final speed, $$e$$ is the elementary charge, and $$V$$ is the accelerating potential difference.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": false}, {"question": "Baryons and Mesons are both types of Hadrons. What is the difference in their quark composition? (2 steps)", "answer": "- Step 1: **Baryons** (like protons and neutrons) are composed of **three** quarks (e.g., uud).\n- Step 2: **Mesons** (like pions and kaons) are composed of a **quark and an antiquark** pair (e.g., up and anti-down).", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "In the formula $$A = \\lambda N$$, a student uses the mass of the sample in grams for $$N$$. Why is this incorrect, and what must be done instead? (2 steps)", "answer": "- Step 1: $$N$$ represents the **number of undecayed nuclei**, which is a pure count (dimensionless). Mass in grams is not a count of particles.\n- Step 2: If given a mass, you must convert it to the number of nuclei using the molar mass and Avogadro's constant: $$N = \\frac{\\text{mass}}{M_r} \\times N_A$$, where $$M_r$$ is the molar mass and $$N_A$$ is Avogadro's number.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": true}, {"question": "A student claims that \"half-life depends on the temperature and pressure of the environment.\" Is this claim correct? Explain why or why not. (2 steps)", "answer": "- Step 1: The claim is **incorrect**. Half-life is an intrinsic property of the specific radioactive isotope.\n- Step 2: Nuclear decay is governed by the strong and weak nuclear forces within the nucleus, which are completely unaffected by external conditions like temperature, pressure, or chemical bonding. These external energies are negligible compared to nuclear binding energies.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": false}, {"question": "The decay chain of Uranium-238 eventually terminates at Lead-206. What does \"stable\" mean in this context, and why does the chain stop? (2 steps)", "answer": "- Step 1: \"Stable\" means the nucleus has a binding energy configuration that does not spontaneously change; it does not emit radiation.\n- Step 2: The chain stops at Lead-206 because its nucleus is not energetically favourable to decay further. It is at the lowest energy state achievable for that nucleon number, so no further alpha or beta emissions occur.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "Why does the binding energy per nucleon curve start near zero for Hydrogen-1 (a single proton)? (2 steps)", "answer": "- Step 1: Binding energy is the energy required to separate a nucleus into its constituent nucleons.\n- Step 2: Hydrogen-1 consists of only a single proton. There are no nuclear bonds to break (no other nucleons to separate it from), so the binding energy is effectively zero, and thus the binding energy per nucleon is zero.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": false}, {"question": "Estimate the energy released when one Uranium-235 nucleus undergoes fission, given that the binding energy per nucleon of U-235 is ~7.6 MeV and the average binding energy per nucleon of the products is ~8.5 MeV. (2 steps)", "answer": "- Step 1: The energy released is the increase in total binding energy. The change in BE per nucleon is $$8.5 - 7.6 = 0.9 \\text{ MeV}$$.\n- Step 2: Since there are 235 nucleons involved, the total energy released is approximately $$235 \\times 0.9 \\text{ MeV} \\approx 210 \\text{ MeV}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": false}, {"question": "The deuterium-tritium fusion reaction releases 17.6 MeV. If we fused 1 kg of this fuel, would it release more or less energy than burning 1 kg of coal? Explain the order of magnitude difference. (2 steps)", "answer": "- Step 1: It would release **significantly more** energy—millions of times more than burning coal.\n- Step 2: Chemical reactions (like burning coal) involve rearranging electron bonds (eV scale energies), whereas nuclear reactions involve rearranging the nucleus (MeV scale energies). The MeV scale is roughly a million times larger per reaction than the eV scale.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": true}, {"question": "In the Rutherford scattering experiment, some alpha particles were deflected by small angles (less than 10°). What does this specific observation suggest about the atom? (2 steps)", "answer": "- Step 1: A small deflection implies the alpha particle experienced a relatively weak repulsive force as it passed by the positive charge.\n- Step 2: This suggests there is a positive concentration of charge near the alpha particle's path, but not a direct hit. It confirms the presence of a central positive charge (the nucleus) that can exert a Coulomb force, but from a distance.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": false}], "count": 40}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "In the notation $$^A_Z X$$, what do $$A$$ and $$Z$$ represent, and how do you find the number of neutrons? (2 steps)", "answer": "- Step 1: $$A$$ is the nucleon number (also called mass number) — the total count of protons plus neutrons in the nucleus. $$Z$$ is the proton number (also called atomic number) — the total count of protons. The element's identity is determined solely by $$Z$$; change $$Z$$ and you have a different element.\n- Step 2: The number of neutrons is $$N = A - Z$$. For example, $$^{235}_{92}U$$ has $$92$$ protons and $$235 - 92 = 143$$ neutrons.\n\nA common trap: $$A$$ is NOT the number of neutrons — it includes both protons and neutrons.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "What defines an isotope, and why do isotopes of the same element have nearly identical chemistry but different nuclear stability? (3 steps)", "answer": "- Step 1: Isotopes are atoms with the same proton number $$Z$$ (same element) but different nucleon numbers $$A$$ (different neutron counts). Example: $$^1_1H$$, $$^2_1H$$ (deuterium), $$^3_1H$$ (tritium) are all hydrogen isotopes.\n- Step 2: Chemistry is governed by the electron configuration, which depends only on $$Z$$. Since isotopes share the same $$Z$$, they have the same electron arrangement and nearly identical chemical behaviour.\n- Step 3: Nuclear stability depends on the neutron-to-proton ratio. Too many or too few neutrons relative to protons makes the nucleus unstable, causing radioactive decay. This is why some isotopes are stable while others are radioactive.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": true}, {"question": "In Rutherford's gold-foil experiment, three distinct observations were made about the alpha particles. What were they, and what does each reveal about atomic structure? (3 steps)", "answer": "- Step 1: **Most alphas passed straight through** — the atom is mostly empty space. The nucleus occupies only ~$$10^{-15}$$ m of the ~$$10^{-10}$$ m atom diameter.\n- Step 2: **A few deflected at small angles (<10°)** — there is a concentrated positive charge at the centre that repels the positive alpha particles via Coulomb repulsion.\n- Step 3: **A tiny fraction bounced back at large angles (>90°)** — the nucleus is extremely small and very dense, containing most of the atom's mass. Only a very small, massive target could reverse an alpha's direction.\n\nThis killed the Thomson \"plum pudding\" model, which predicted only small-angle deflections and no backscattering.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "Why couldn't the plum pudding model explain alpha particles bouncing back from gold foil? (2 steps)", "answer": "- Step 1: In the plum pudding model, positive charge is spread diffusely throughout the atom with electrons embedded in it. A diffuse charge distribution produces only weak electric fields, causing at most small-angle deflections of alpha particles.\n- Step 2: Backscattering (>90°) requires the alpha to encounter a concentrated, intense repulsive force — a large positive charge packed into a tiny volume. The diffuse \"pudding\" simply cannot produce fields strong enough to reverse an alpha particle's direction. Only a compact, massive nucleus can.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": true}, {"question": "What is background radiation, and why must it be subtracted before any half-life or absorption analysis? (2 steps)", "answer": "- Step 1: Background radiation is the low-level radiation constantly present from natural sources (cosmic rays, radon gas from rocks, potassium-40 in food, carbon-14 in air) and man-made sources (medical X-rays, nuclear fallout). A Geiger counter always registers some counts even without a radioactive source present.\n- Step 2: When measuring a source, the Geiger counter reads (source count rate + background count rate). If you don't subtract the background, your data is systematically too high, and when you try to determine half-life, the curve won't decay to zero — it plateaus at the background level. This leads to an incorrectly long half-life. Always use: corrected count rate = measured count rate − background count rate.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "Alpha particles are the most ionising but the least penetrating. Explain why these two properties are inversely related. (3 steps)", "answer": "- Step 1: Ionisation requires the radiation to interact with atomic electrons, transferring energy to rip them off. Alpha particles carry a large charge ($$+2e$$) and large mass (4 u), so they exert strong Coulomb forces on nearby electrons and collide frequently — high ionising power.\n- Step 2: Every ionising interaction drains kinetic energy from the radiation. Because alpha particles ionise so efficiently, they lose energy rapidly as they travel through matter.\n- Step 3: After only a few cm of air or a sheet of paper, the alpha has transferred all its kinetic energy to ionisation and stops. Gamma, by contrast, rarely interacts (low ionisation), so it retains energy over long distances (high penetration). The two properties ar
