<script>
const DATA={"selected": [{"question": "Why is it incorrect to say that in a half-life experiment, \"the number of decays halves every half-life\"?", "answer": "It is the **number of remaining (undecayed) nuclei** that halves every half-life, *not* the number of decays. After one half-life, half the original nuclei have decayed (a lot of decays); after the next half-life, half of what remained decays (fewer absolute decays, but still half of the current population). Both the *population* $$N$$ and the *activity* $$A = \\lambda N$$ halve every $$t_{1/2}$$ — because they are proportional. But the cumulative number of decays *grows* over time (it accumulates), so saying \"the number of decays halves\" is wrong; you mean \"the *rate* of decays halves\", or equivalently, \"the surviving population halves\".", "source": "Opus 4.7 ②", "_id": "opus_2_46"}, {"question": "A photon with energy exactly $$2m_e c^2$$ creates an electron–positron pair. Why must this occur near a heavy nucleus rather than in empty space? (2 steps)", "answer": "- Step 1: In empty space, pair production cannot conserve both energy and momentum simultaneously. A single photon has momentum $$p = E/c$$, but the electron–positron pair in their centre-of-mass frame has zero total momentum. There's no way to satisfy both conservation laws with just a photon and two particles.\n- Step 2: A nearby heavy nucleus (or atomic electron) can absorb the \"excess\" momentum with negligible energy cost (because it's so massive, $$p = mv$$ with huge $$m$$ gives tiny $$v$$ and negligible kinetic energy). The nucleus acts as a momentum \"buffer,\" allowing both energy and momentum to be conserved while the photon converts to the particle pair.", "source": "GLM 5.1 ②", "_id": "glm_2_45"}, {"question": "Why must we use a *large* sample of nuclei to measure a half-life, even though the formula $$t_{1/2} = \\ln 2 / \\lambda$$ is exact?", "answer": "- Step 1: $$\\lambda$$ is a *probability* per nucleus per second. With a single nucleus, you can't measure a probability — you only get one outcome (decay at time $$t$$, once).\n- Step 2: With many nuclei, the statistical spread shrinks as $$1/\\sqrt{N}$$ (Poisson statistics). A sample of $$10^{12}$$ atoms gives count rates accurate to one part in a million — sharp enough to fit an exponential and extract $$\\lambda$$ precisely.\n- Step 3: This is exactly the same principle as why dice statistics need many rolls to reveal that each face has probability 1/6, even though the probability itself is exact.", "source": "Opus 4.7 ①", "_id": "opus_1_44"}, {"question": "Why does nuclear fission require a *slow* neutron, and what role do moderators play in a reactor? (3 steps)", "answer": "- Step 1: For a nucleus like U-235 to absorb a neutron and become unstable, the neutron must spend enough time near the nucleus to be captured. A fast neutron whizzes past without being absorbed.\n- Step 2: A slow (\"thermal\") neutron has low kinetic energy and lingers long enough to be absorbed, triggering fission. So the chain reaction depends on having lots of slow neutrons.\n- Step 3: But fission *produces* fast neutrons. A moderator (water, graphite) is a material that slows them down by elastic collisions before they escape, so they can induce further fission. Without a moderator, the chain reaction would die out.", "source": "Opus 4.7 ①", "_id": "opus_1_26"}, {"question": "What is mass defect, and why is the bound nucleus *lighter* than its separated nucleons — where did the mass go? (3 steps)", "answer": "- Step 1: Mass defect is $$\\Delta m = Zm_p + (A-Z)m_n - m_{\\text{nucleus}}$$. It is always positive — the bound nucleus always has less mass than the sum of its free constituents.\n- Step 2: The \"missing\" mass was converted to energy when the nucleus formed. By $$\\Delta E = \\Delta m c^2$$, the mass defect corresponds to the binding energy — the energy released when nucleons come together, or equivalently, the energy you must supply to pull them apart.\n- Step 3: The nucleus sits in a potential energy well. Being bound means it is at a *lower* energy state than free nucleons. By mass-energy equivalence, lower energy = lower mass. The mass didn't \"go\" anywhere — it was emitted as energy (gamma photons, kinetic energy of products) during formation.", "source": "GLM 5.1 ②", "_id": "glm_2_28"}, {"question": "In a cyclotron, the period of orbit $$T = 2\\pi m / (BQ)$$ is independent of speed. Why is this crucial for the cyclotron's operation? (3 steps)", "answer": "- Step 1: A charged particle in a uniform magnetic field follows a circular path with radius $$r = mv/(BQ)$$. Faster particles have larger radii but also cover more distance per orbit.\n- Step 2: The period is $$T = 2\\pi r / v = 2\\pi (mv/(BQ))/v = 2\\pi m/(BQ)$$. The $$v$$ cancels out — the period depends only on mass, charge, and field strength, not on speed or radius.\n- Step 3: This independence means the alternating voltage across the dees can operate at a single fixed frequency $$f = 1/T = BQ/(2\\pi m)$$, and the particle will always arrive at the gap in phase with the accelerating voltage regardless of how fast it's going. Without this property, the cyclotron would not work — the particle would fall out of sync.", "source": "GLM 5.1 ②", "_id": "glm_2_15"}, {"question": "Sketch the binding-energy-per-nucleon curve. Where does it peak, and why does it rise steeply at low $$A$$ but decline slowly at high $$A$$? (3 steps)", "answer": "- Step 1: The curve rises from near 0 (hydrogen) steeply to a peak near $$A = 56$$ (iron-56, $$\\approx 8.8$$ MeV/nucleon), then slowly declines for heavier nuclei.\n- Step 2: At low $$A$$, the steep rise is because each nucleon gains more nearest-neighbour strong-force bonds as the nucleus grows. Small nuclei have many \"surface\" nucleons with fewer bonds; adding more nucleons means more are fully surrounded → more binding per nucleon. (He-4 is anomalously high due to its doubly-magic structure.)\n- Step 3: Beyond iron, the slow decline is because adding more protons increases electrostatic repulsion (which grows as $$Z^2$$), while the short-range strong force only benefits nearest neighbours. The repulsion gradually weakens the binding per nucleon for large nuclei.\n\nTakeaway: Rising (strong force dominates) → peak at Fe-56 → declining (electrostatic repulsion wins). This curve explains fission AND fusion.", "source": "GLM 5.1 ③", "_id": "glm_3_34"}, {"question": "Contrast what happens to the Coulomb barrier as you go to heavier nuclei. Why does this mean very heavy nuclei (like uranium) are inherently unstable? (2 steps)", "answer": "- Step 1: The Coulomb repulsion energy scales roughly as $$Z^2 / R$$ (proportional to the square of the proton number). As you add more protons, the repulsion grows much faster than the strong-force attraction, which only benefits nearest neighbours and scales roughly linearly with $$A$$.\n- Step 2: Beyond a certain size (around lead, $$Z \\approx 82$$), the electrostatic repulsion between protons nearly overwhelms the strong-force binding. These nuclei are barely stable and will eventually decay (by alpha emission or fission) to reduce their proton count. No nucleus with $$Z > 92$$ (uranium) occurs naturally in significant quantities — they've all decayed away.\n\nTakeaway: Coulomb repulsion grows as $$Z^2$$; strong force grows more slowly. Heavy nuclei are metastable — the repulsion is slowly winning.", "source": "GLM 5.1 ③", "_id": "glm_3_59"}, {"question": "Why couldn't the plum pudding model explain alpha particles bouncing back from gold foil? (2 steps)", "answer": "- Step 1: In the plum pudding model, positive charge is spread diffusely throughout the atom with electrons embedded in it. A diffuse charge distribution produces only weak electric fields, causing at most small-angle deflections of alpha particles.\n- Step 2: Backscattering (>90°) requires the alpha to encounter a concentrated, intense repulsive force — a large positive charge packed into a tiny volume. The diffuse \"pudding\" simply cannot produce fields strong enough to reverse an alpha particle's direction. Only a compact, massive nucleus can.", "source": "GLM 5.1 ②", "_id": "glm_2_3"}, {"question": "What is the mass defect of a nucleus, and why is it always positive (i.e. why is the bound nucleus lighter than its constituents)? (3 steps)", "answer": "- Step 1: **Definition**: $$\\Delta m = Z m_p + (A-Z) m_n - m_{\\text{nucleus}}$$. This is the mass of the separated protons and neutrons *minus* the actual mass of the bound nucleus.\n- Step 2: Experimentally, $$\\Delta m > 0$$ for every stable nucleus. The bound state is **less massive** than the scattered constituents.\n- Step 3: **Why?** Because the bound state has *lower energy* than the separated state (that's what \"bound\" means — you'd have to add energy to pull them apart). By Einstein's $$E = mc^2$$, lower energy means lower mass. The missing mass *is* the binding energy, divided by $$c^2$$.\n\nThis is one of the deepest results in physics: mass and energy are interchangeable, and binding manifests as a literal mass deficit.", "source": "Opus 4.7 ②", "_id": "opus_2_29"}, {"question": "What is pair production, and why must it occur near a nucleus rather than in empty space?", "answer": "- Step 1: Define pair production\n  - A high-energy photon converts into a particle-antiparticle pair (e.g., e⁻ and e⁺)\n  - Requires minimum photon energy E ≥ 2mc²\n- Step 2: Explain the nucleus requirement\n  - Conservation of momentum would be violated if a single photon converted to two massive particles in empty space\n  - A single photon has momentum p = E/c\n  - Two particles at rest have zero total momentum\n  - The nucleus absorbs excess momentum, allowing conservation\n- Step 3: Energy threshold\n  - For electron-positron: E_min = 2 × 511 keV = 1.022 MeV\n  - For proton-antiproton: much higher (~2 GeV)", "source": "MiniMax ②", "_id": "minimax_2_27"}, {"question": "A student calculates binding energy of iron-56 and gets a negative mass defect. Is this possible? What error did they likely make? (2 steps)", "answer": "- Step 1: No — mass defect is always positive for a bound nucleus. The bound nucleus is *always* lighter than its separated nucleons. A negative mass defect would mean the nucleus is heavier than its parts, implying it is *unbound* (it would spontaneously fly apart).\n- Step 2: The likely error is reversing the formula: writing $$\\Delta m = m_{\\text{nucleus}} - [Zm_p + (A-Z)m_n]$$ instead of $$\\Delta m = Zm_p + (A-Z)m_n - m_{\\text{nucleus}}$$. The correct order is: (sum of free nucleon masses) − (bound nucleus mass) = positive mass defect. Always subtract the bound nucleus from the sum of parts.", "source": "GLM 5.1 ②", "_id": "glm_2_48"}, {"question": "For an exam question asking you to \"explain,\" what does the examiner expect compared to a question asking you to \"state\"? Give a nuclear physics example of each. (2 steps)", "answer": "- Step 1: \"State\" = a one-line factual answer with no justification. Example: \"State what is meant by half-life.\" Answer: \"The time taken for the number of radioactive nuclei to fall to half its initial value.\"\n- Step 2: \"Explain\" = a short chain of cause-and-effect statements with reasoning. Example: \"Explain why fusion requires high temperatures.\" Answer: \"Nuclei are positively charged and repel each other via the Coulomb force. At high temperatures, nuclei have sufficient kinetic energy to overcome this electrostatic repulsion and approach close enough for the short-range strong nuclear force to bind them.\"\n\nTakeaway: State = fact. Explain = cause → effect chain with reasoning.", "source": "GLM 5.1 ③", "_id": "glm_3_53"}, {"question": "Starting from the statement \"each decay removes one nucleus, so the rate of change of $$N$$ is $$-\\lambda N$$,\" derive the exponential decay law $$N = N_0 e^{-\\lambda t}$$. (4 steps)", "answer": "- Step 1: The rate of decay is proportional to the number of undecayed nuclei: $$\\frac{dN}{dt} = -\\lambda N$$. The negative sign means $$N$$ is decreasing.\n- Step 2: Separate variables: $$\\frac{dN}{N} = -\\lambda \\, dt$$.\n- Step 3: Integrate both sides: $$\\int_{N_0}^{N} \\frac{dN}{N} = -\\lambda \\int_0^t dt$$, giving $$\\ln N - \\ln N_0 = -\\lambda t$$, i.e., $$\\ln\\!\\left(\\frac{N}{N_0}\\right) = -\\lambda t$$.\n- Step 4: Exponentiate: $$\\frac{N}{N_0} = e^{-\\lambda t}$$, so $$N = N_0 e^{-\\lambda t}$$. Since activity is proportional to $$N$$, the same form holds: $$A = A_0 e^{-\\lambda t}$$.\n\nTakeaway: Exponential decay emerges from a simple differential equation: rate of loss ∝ current amount. This is the hallmark of all first-order processes.", "source": "GLM 5.1 ③", "_id": "glm_3_24"}, {"question": "In a linear accelerator (linac), the drift tubes get progressively longer even though the AC frequency stays fixed. Why must the tubes lengthen? (2 steps)", "answer": "- Step 1: The ion accelerates in each gap between tubes, so its speed increases. While inside a drift tube, the ion travels at constant speed (shielded from the field).\n- Step 2: The AC frequency is fixed, so the time between voltage reversals is fixed. To stay in phase (always arriving at a gap when the voltage accelerates it), the ion must spend the same time in each tube. Since it's going faster, it needs a longer tube to traverse in the same time: $$\\text{length} = v \\times t_{\\text{half-cycle}}$$.\n\nTakeaway: Longer tubes accommodate faster ions at constant AC frequency — synchronisation demands it.", "source": "GLM 5.1 ③", "_id": "glm_3_15"}, {"question": "In a $$\\beta^-$$ decay, what conserves and what changes? Why is this consistent with the underlying physics?", "answer": "- Step 1: **Conserved**: nucleon number $$A$$ (a neutron becomes a proton — same number of heavy particles); charge (gain a proton +1, emit electron −1, net zero change); lepton number (electron +1, antineutrino −1, balances to zero).\n- Step 2: **Changes**: proton number $$Z$$ goes up by 1 (element changes); neutron number goes down by 1; energy is released (the daughter sits at higher $$B/A$$, so the parent slid downhill).\n- Step 3: This is internally consistent because the underlying event is \"one quark inside a neutron flips flavour\" (d → u + W^−, W^− → e^− + antineutrino). The bookkeeping at the nuclear level is just the accounting of that quark-level event.", "source": "Opus 4.7 ①", "_id": "opus_1_42"}, {"question": "A student claims that after 2 half-lives, the number of nuclei remaining is $$N_0/4$$. After 3 half-lives, is it $$N_0/6$$ or $$N_0/8$$? Explain the pattern. (2 steps)", "answer": "- Step 1: After 3 half-lives, it's $$N_0/8$$. Each half-life halves what remains: $$N_0 \\rightarrow N_0/2 \\rightarrow N_0/4 \\rightarrow N_0/8$$. The pattern is $$(1/2)^n$$, not division by $$2n$$.\n- Step 2: The student's implicit mistake (dividing by 6 instead of 8) treats each half-life as subtracting a fixed fraction of the *original* amount. In reality, each half-life removes half of *what's currently left*, not half of the original. This is exponential, not linear.\n\nTakeaway: After $$n$$ half-lives: $$N = N_0 (1/2)^n = N_0 / 2^n$$. It's exponential decay, not linear subtraction.", "source": "GLM 5.1 ③", "_id": "glm_3_46"}, {"question": "A student reasons: \"Alpha is dangerous outside the body because it's so ionising.\" Why is this backwards? (2 steps)", "answer": "- Step 1: Alpha is the *least* penetrating — it's stopped by skin or a few cm of air. Outside the body, alpha cannot reach living tissue; it's essentially harmless from external sources.\n- Step 2: Alpha is dangerous when *ingested or inhaled* — then it's inside the body with no skin barrier. Its high ionising power then damages DNA and cells directly. So: alpha is harmless outside the body but extremely dangerous inside. Gamma is the opposite: dangerous outside (it penetrates) but less damaging per interaction inside.\n\nTakeaway: Penetration and ionisation are inversely related. The danger depends on whether the radiation is inside or outside the body.", "source": "GLM 5.1 ③", "_id": "glm_3_49"}, {"question": "In the notation $$^A_Z X$$, what do $$A$$ and $$Z$$ represent, and how do you find the number of neutrons? A student writes $$^{235}_{92}U$$ and claims there are 92 neutrons. What is the error? (3 steps)", "answer": "- Step 1: $$A$$ is the nucleon number (mass number) = total protons + neutrons. $$Z$$ is the proton number (atomic number) = total protons. The number of neutrons is $$N = A - Z$$.\n- Step 2: For $$^{235}_{92}U$$: protons = 92, neutrons = 235 − 92 = 143, not 92. The student has confused the nucleon number with the neutron count.\n- Step 3: The element's identity is determined solely by $$Z$$. Changing the number of neutrons (changing $$A$$) gives a different *isotope* of the same element — same chemistry, different nuclear properties.\n\nTakeaway: $$A$$ ≠ neutrons; $$A$$ = protons + neutrons. Neutrons = $$A - Z$$.", "source": "GLM 5.1 ③", "_id": "glm_3_1"}, {"question": "A uranium-238 decay chain eventually terminates. What does \"terminates\" mean physically, and at what isotope does it stop?", "answer": "\"Terminates\" means the chain reaches a **stable nucleus** — one that no longer emits any radiation. For the $$^{238}U$$ chain, this stable endpoint is **lead-206** ($$^{206}_{82}\\text{Pb}$$). Along the way, the chain passes through many intermediate isotopes (thorium, protactinium, radium, radon, polonium, ...) by a mixture of alpha and beta decays. Once at Pb-206, the nucleus sits at a configuration that is energetically a local minimum — no rearrangement could release further energy — so it stays put indefinitely. \"Stable\" in nuclear physics means: no further radiation, forever (within the limits of observation).", "source": "Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "Why is half-life independent of temperature, pressure, or chemical state — but the rate of an ordinary chemical reaction is not? (2 steps)", "answer": "- Step 1: Chemical reactions involve electrons in the outer shells, whose energies (≈ eV scale) are comparable to thermal energies and bond energies. Heating supplies enough energy to change reaction rates dramatically.\n- Step 2: Nuclear decay involves nucleons inside the nucleus, where the relevant energies are MeV — about a million times larger than any thermal or chemical energy you can supply in a lab. The nucleus simply doesn't \"feel\" the chemical environment. So half-life is intrinsic to the isotope.", "source": "Opus 4.7 ①", "_id": "opus_1_15"}, {"question": "What defines an isotope, and why do isotopes of the same element have nearly identical chemistry but different nuclear stability? (3 steps)", "answer": "- Step 1: Isotopes are atoms with the same proton number $$Z$$ (same element) but different nucleon numbers $$A$$ (different neutron counts). Example: $$^1_1H$$, $$^2_1H$$ (deuterium), $$^3_1H$$ (tritium) are all hydrogen isotopes.\n- Step 2: Chemistry is governed by the electron configuration, which depends only on $$Z$$. Since isotopes share the same $$Z$$, they have the same electron arrangement and nearly identical chemical behaviour.\n- Step 3: Nuclear stability depends on the neutron-to-proton ratio. Too many or too few neutrons relative to protons makes the nucleus unstable, causing radioactive decay. This is why some isotopes are stable while others are radioactive.", "source": "GLM 5.1 ②", "_id": "glm_2_1"}, {"question": "Define the decay constant $$\\lambda$$ in plain physical terms — what exactly is it the probability of?", "answer": "- Step 1: $$\\lambda$$ is the probability per unit time that any single, currently-undecayed nucleus will decay. Units: $$\\text{s}^{-1}$$.\n- Step 2: It is an intrinsic property of the isotope. A larger $$\\lambda$$ means each nucleus is \"more eager\" to decay each second, and therefore the isotope has a shorter half-life.\n- Step 3: Crucially, $$\\lambda$$ tells you nothing about *which* nucleus will go next — only the per-second odds. The randomness is fundamental, not from ignorance.", "source": "Opus 4.7 ①", "_id": "opus_1_12"}, {"question": "What is mass defect, and why is the *bound* nucleus *lighter* than its separated nucleons? (3 steps)", "answer": "- Step 1: Measure the mass of a helium-4 nucleus directly. Then add up the masses of 2 free protons and 2 free neutrons. The bound nucleus weighs *less* — by an amount $$\\Delta m = Z m_p + (A - Z) m_n - m_{\\text{nucleus}}$$.\n- Step 2: The \"missing\" mass has been converted to energy and released when the nucleons came together. Equivalently, the bound state sits at a *lower energy* than the separated state — that's literally what \"bound\" means.\n- Step 3: By $$E = mc^2$$, lower energy ↔ lower mass. So a bound nucleus, sitting in an energy well, must have less mass than the sum of its free parts.\n\nCounterintuitive takeaway: binding *reduces* mass. You'd have to *add* energy (and hence mass) to pull the nucleus apart.", "source": "Opus 4.7 ①", "_id": "opus_1_20"}, {"question": "A student claims that if a sample's half-life is 10 years, then after 25 years exactly half the atoms have decayed. Why is this wrong? (2 steps)", "answer": "- Step 1: After 10 years (one half-life), half have decayed. After 20 years (two half-lives), three-quarters have decayed (only $$1/4$$ remain). After 25 years (2.5 half-lives), the fraction remaining is $$(1/2)^{2.5} \\approx 0.177$$, so about 82.3% have decayed — not 50%.\n- Step 2: The student is confusing \"one half-life\" with \"25 years.\" Half-life is the time for the *fraction* remaining to halve, not for half the *original* atoms to decay at any arbitrary time. Each subsequent half-life halves what remains, not the original amount.\n\nTakeaway: After $$n$$ half-lives, fraction remaining = $$(1/2)^n$$, fraction decayed = $$1 - (1/2)^n$$. These are not the same for $$n > 1$$.", "source": "GLM 5.1 ③", "_id": "glm_3_28"}, {"question": "Why is the strong nuclear force necessary to explain nuclear stability?", "answer": "- **Electrostatic Repulsion:**  \n  - Protons repel each other (Coulomb force), destabilizing the nucleus.  \n- **Strong Force Counterbalance:**  \n  - Short-range attraction (>1000x stronger than Coulomb at 1 fm) overcomes proton repulsion.  \n- **Saturation:**  \n  - Each nucleon binds only to nearest neighbors, explaining why large nuclei need extra neutrons for stability.  \n\n**Takeaway:** The strong force must exist to overcome Coulomb repulsion and bind nucleons into stable nuclei.", "source": "Qwen 3 ①", "_id": "qwen_1_38"}, {"question": "Why is it physically wrong to say \"binding energy is stored inside the nucleus\"? (2 steps)", "answer": "- Step 1: Binding energy is the energy you'd have to *put in* from outside to break the nucleus apart into separated nucleons. It's a property of the *difference* between two states, not a quantity sitting inside the bound state.\n- Step 2: In fact, the bound nucleus is at a *lower* total energy than its separated nucleons. So if anything, binding energy represents what's *missing* from the bound state, not what's stored in it. Correct phrasing: \"the binding energy equals the energy required to separate the nucleus.\"", "source": "Opus 4.7 ①", "_id": "opus_1_21"}, {"question": "What does the proton number $$Z$$ uniquely determine about an atom, and what does the nucleon number $$A$$ count?", "answer": "- Step 1: The proton number $$Z$$ counts the protons in the nucleus. Because chemical identity is set by how many protons an atom has (which sets how many electrons a neutral atom carries), $$Z$$ alone determines the element. Change $$Z$$ and you've changed elements entirely.\n- Step 2: The nucleon number $$A$$ counts protons + neutrons together — the total number of heavy particles in the nucleus. This is essentially the \"mass label\" of the nucleus.\n- Step 3: The neutron number is the difference: $$N = A - Z$$. Two atoms with the same $$Z$$ but different $$A$$ are isotopes — same element, different nuclear mass.\n\nKey takeaway: $$Z$$ = identity, $$A$$ = mass-bookkeeping, $$A - Z$$ = neutron count.", "source": "Opus 4.7 ①", "_id": "opus_1_0"}, {"question": "Why is iron-56 special, and what does its position on the $$B/A$$ curve imply about the eventual fate of stellar nucleosynthesis?", "answer": "Iron-56 sits at the **peak** of the $$B/A$$ curve at about $$8.8$$ MeV/nucleon — it is the most tightly bound nucleus per particle. This means:\n\n- **No exothermic fusion possible beyond Fe-56**: fusing iron with anything else moves you *down* the curve, costing energy rather than releasing it.\n- **No exothermic fission possible below Fe-56**: splitting iron also moves you down the curve.\n\nSo a star fusing progressively heavier elements eventually reaches iron and stops releasing energy. Without energy to support against gravity, the core collapses — triggering a supernova. Elements heavier than iron (gold, uranium) are made *only* in supernovae or neutron-star mergers, where rapid neutron capture briefly overcomes the energy disadvantage.", "source": "Opus 4.7 ②", "_id": "opus_2_38"}, {"question": "The deuterium-tritium fusion reaction releases 17.6 MeV. If we fused 1 kg of this fuel, would it release more or less energy than burning 1 kg of coal? Explain the order of magnitude difference. (2 steps)", "answer": "- Step 1: It would release **significantly more** energy—millions of times more than burning coal.\n- Step 2: Chemical reactions (like burning coal) involve rearranging electron bonds (eV scale energies), whereas nuclear reactions involve rearranging the nucleus (MeV scale energies). The MeV scale is roughly a million times larger per reaction than the eV scale.", "source": "GLM 5.1 ①", "_id": "glm_1_38"}, {"question": "Write the full balanced equation for the beta-minus decay of carbon-14, and explain why the antineutrino must appear. (3 steps)", "answer": "- Step 1: Carbon-14 has $$A = 14$$, $$Z = 6$$. In $$\\beta^-$$ decay, $$A$$ is unchanged, $$Z$$ increases by 1: $$^{14}_6 C \\rightarrow ^{14}_7 N + ^0_{-1}\\beta + \\bar{\\nu}_e$$.\n- Step 2: Check nucleon number: $$14 = 14 + 0 + 0$$ ✓. Check proton number: $$6 = 7 + (-1) + 0$$ ✓.\n- Step 3: The antineutrino is required by lepton number conservation. Before decay: lepton number = 0. After: the electron has lepton number $$+1$$. Without the antineutrino (lepton number $$-1$$), lepton number would not be conserved. Historically, the continuous beta energy spectrum hinted at a \"missing\" particle carrying away variable energy — Pauli proposed the neutrino on this basis.", "source": "GLM 5.1 ②", "_id": "glm_2_10"}, {"question": "A sample of Fermium-253 has a half-life of 3 days. If you start with $$8.0 \\times 10^{12}$$ nuclei, roughly how many will remain after 6 days? (Mental math exercise) (2 steps)", "answer": "- Step 1: Determine the number of half-lives. 6 days is $$6/3 = 2$$ half-lives.\n- Step 2: After each half-life, the number halves. After 1 half-life: $$4.0 \\times 10^{12}$$. After 2 half-lives: $$2.0 \\times 10^{12}$$ nuclei.", "source": "GLM 5.1 ①", "_id": "glm_1_26"}, {"question": "What is background radiation, and why must it be subtracted when measuring the activity of a radioactive source?", "answer": "- Step 1: Define background radiation\n  - Low-level radiation always present in the environment from natural sources: cosmic rays, radon gas from rocks, radioactive isotopes in food (e.g., potassium-40 in bananas, carbon-14), and man-made sources (medical X-rays, nuclear fallout)\n- Step 2: Explain why it interferes with measurements\n  - A Geiger counter will register counts even with NO radioactive source present\n  - This background count adds to your measurement of the source\n- Step 3: Explain the correction\n  - Measured count rate = source counts + background counts\n  - True source activity = measured activity − background activity\n  - If you forget to subtract, your half-life calculations will be wrong (apparent half-life too long)\n\nThis is a classic exam trap — always subtract background radiation.", "source": "MiniMax ②", "_id": "minimax_2_6"}, {"question": "Why is it conceptually wrong to compute the energy released in fusion by saying \"the products have less mass, and that mass becomes energy\"? (Hint: nucleons are not destroyed.)", "answer": "The phrasing \"mass becomes energy\" suggests that nucleons are annihilated — but in fusion, every proton and neutron is conserved (count them on both sides). What actually changes is the **arrangement** of those nucleons into a more tightly bound configuration. The bound configuration has lower total energy (and therefore lower total mass, by $$E = mc^2$$) than the separated configuration. So it is not that \"mass becomes energy\" — rather, the system *loses* mass-energy by radiating it away as kinetic energy of products and photons. The nucleons themselves are unchanged; only their binding has changed. This is a subtle but important conceptual distinction.", "source": "Opus 4.7 ②", "_id": "opus_2_51"}, {"question": "An electron is accelerated from rest through a potential difference $$V$$. Derive the expression for its final speed. (3 steps)", "answer": "- Step 1: The kinetic energy gained equals the work done by the electric field: $$\\frac{1}{2}m_e v^2 = eV$$, where $$e$$ is the elementary charge and $$m_e$$ is the electron mass.\n- Step 2: Rearrange for $$v$$: $$v = \\sqrt{\\frac{2eV}{m_e}}$$. This is a classical (non-relativistic) result.\n- Step 3: Validity check: at $$V = 5\\text{ kV}$$, $$v \\approx 4.2 \\times 10^7 \\text{ m/s}$$, which is about 14% of $$c$$. Beyond ~10% of $$c$$, relativistic corrections become significant. For very high voltages, you must use the relativistic energy-momentum relation instead.", "source": "GLM 5.1 ②", "_id": "glm_2_13"}, {"question": "Why couldn't the plum-pudding model explain large-angle back-scattering of alpha particles? (2 steps)", "answer": "- Step 1: In the plum-pudding model, positive charge is spread throughout the entire atom (the \"pudding\"), with electrons embedded like plums. The electric field from this diffuse charge would be weak at any point, so it could only produce tiny deflections.\n- Step 2: To bounce an alpha back at >90° requires a very strong, localised repulsive force. That demands all the positive charge be concentrated in a volume much smaller than the alpha's path — i.e., a tiny, dense nucleus. The diffuse plum-pudding simply cannot provide enough force at any single point.\n\nTakeaway: Back-scattering requires concentrated charge and mass → impossible in a diffuse model.", "source": "GLM 5.1 ③", "_id": "glm_3_4"}, {"question": "Why does the strong nuclear force have such a short range, and why does that limit the size of stable nuclei? (3 steps)", "answer": "- Step 1: The strong force is mediated by gluons (between quarks) and effectively by pions (between nucleons). It is extremely strong at $$\\sim 10^{-15}$$ m but falls off essentially to zero beyond $$\\sim 2 \\times 10^{-15}$$ m.\n- Step 2: In contrast, the electrostatic repulsion between protons is a long-range force following an inverse-square law — every proton repels every other proton in the nucleus, no matter how far apart.\n- Step 3: In a large nucleus, each nucleon is only attracted by its nearest neighbours (strong force is short-range), but every proton repels *all* other protons (long-range). As $$Z$$ grows, repulsion eventually outpaces binding, and nuclei become unstable — which is why all elements heavier than bismuth are radioactive and why $$B/A$$ decreases past iron.", "source": "Opus 4.7 ②", "_id": "opus_2_49"}, {"question": "Why is helium-4 ($$^4_2 He$$) an anomalously high peak on the binding-energy-per-nucleon curve, even higher than its neighbours? What does this imply about alpha decay? (2 steps)", "answer": "- Step 1: He-4 is a \"doubly magic\" nucleus (2 protons, 2 neutrons — both magic numbers). This gives it exceptional stability and a very high $$B/A$$ (~7.1 MeV/nucleon) compared to neighbours like He-3, Li-5, etc. The pairing of protons and neutrons into complete shells makes it extra tightly bound.\n- Step 2: This explains why heavy nuclei often decay by emitting alpha particles specifically (rather than, say, single protons or random clusters). The alpha particle is a particularly stable, tightly-bound \"package\" that can break off from a heavy nucleus while releasing significant energy. Emitting an alpha is energetically more favourable than emitting other fragments.\n\nTakeaway: He-4's exceptional stability explains why alpha decay is common among heavy nuclei. The alpha is nature's preferred \"break-off piece.\"", "source": "GLM 5.1 ③", "_id": "glm_3_58"}, {"question": "Fusion of light nuclei releases enormous energy per unit mass, yet it is extremely difficult to achieve on Earth. Explain the physical barrier and why stars can do it naturally. (3 steps)", "answer": "- Step 1: Both nuclei are positively charged. To fuse, they must get close enough for the short-range strong nuclear force to bind them (within ~$$10^{-15}$$ m). But Coulomb repulsion pushes them apart before they can get that close.\n- Step 2: To overcome this Coulomb barrier, nuclei need enormous kinetic energy (temperatures >$$10^7$$ K). At these temperatures, atoms are fully ionised into a plasma, and thermal motion is violent enough for some nuclei to tunnel through the barrier.\n- Step 3: Stars achieve this naturally because their immense gravity creates the necessary temperatures and densities at their cores, and the plasma is confined by gravitational pressure. On Earth, we must artificially heat and confine the plasma (magnetic confinement in tokamaks like ITER, or inertial confinement with lasers) — both are extraordinarily difficult to sustain.", "source": "GLM 5.1 ②", "_id": "glm_2_36"}, {"question": "Why does nuclear fusion require temperatures above $$10^7$$ K, while fission can occur at room temperature? (3 steps)", "answer": "- Step 1: Fusion requires two positively charged nuclei to get close enough for the short-range strong nuclear force to bind them. But their positive charges create an electrostatic (Coulomb) barrier that repels them.\n- Step 2: At $$T > 10^7$$ K, nuclei have enormous kinetic energy (thermal energy $$\\sim kT$$), enough to overcome the Coulomb barrier and approach within ~1 fm (the range of the strong force). This only happens naturally in stellar cores.\n- Step 3: Fission requires a slow neutron (no charge, no Coulomb barrier) to be absorbed by a heavy nucleus. The neutron is neutral, so it can approach the nucleus without repulsion. The absorption makes the nucleus unstable and it splits. No extreme temperatures needed.\n\nTakeaway: Fusion needs extreme heat to overcome Coulomb repulsion. Fission uses neutral neutrons that slip in without resistance.", "source": "GLM 5.1 ③", "_id": "glm_3_38"}, {"question": "Explain why particle and antiparticle annihilate into *two* photons rather than one. (3 steps)", "answer": "- Step 1: A single photon, by itself, cannot carry away both the energy *and* zero net momentum of a stationary $$e^+ e^-$$ pair. A photon's energy and momentum are related by $$E = pc$$, with $$p \\neq 0$$.\n- Step 2: If the pair annihilates at rest, total momentum before = 0. So after, total momentum must also be 0. One photon can't have zero momentum (it would have zero energy). Two back-to-back photons can — their momenta cancel.\n- Step 3: Hence: $$e^- + e^+ \\rightarrow \\gamma + \\gamma$$, emitted in opposite directions, each carrying $$m_e c^2 \\approx 0.511$$ MeV.\n\nIt's a momentum-conservation requirement, not a coincidence.", "source": "Opus 4.7 ①", "_id": "opus_1_30"}, {"question": "A student says \"the binding energy is the energy stored inside the nucleus\". Why is this wrong?", "answer": "Binding energy is **not** energy that the nucleus possesses — it is energy you would have to **supply** to dismantle the nucleus into separated nucleons. The bound state actually has *less* energy (and less mass) than the separated state. The nucleus sits in an energy well; binding energy is the *depth* of that well. Saying \"the nucleus stores binding energy\" is like saying \"the bottom of a valley stores gravitational potential energy\" — it gets the sign wrong. The correct phrasing: \"the nucleus is bound by an energy of X MeV\", or \"X MeV is required to separate the nucleus into its constituent nucleons\".", "source": "Opus 4.7 ②", "_id": "opus_2_30"}, {"question": "Estimate (conceptually) how much energy is released per fission of U-235 by reading the $$B/A$$ curve. (3 steps)", "answer": "- Step 1: U-235 sits at $$B/A \\approx 7.6$$ MeV. Fission products (Ba, Kr) sit at $$B/A \\approx 8.5$$ MeV. The jump up the curve is about 0.9 MeV per nucleon.\n- Step 2: Multiply by total nucleon number 235: $$235 \\times 0.9 \\approx 210$$ MeV per fission.\n- Step 3: This matches the textbook \"~200 MeV per fission\" — and emphasises that the energy comes from the *uphill journey on the $$B/A$$ curve*, not from any single \"magic\" reaction. The arithmetic is just multiplying the height gain by the nucleon count.", "source": "Opus 4.7 ①", "_id": "opus_1_41"}, {"question": "Why are isotopes chemically nearly identical but nuclearly very different?", "answer": "- Step 1: Chemistry is determined by the electron cloud, and the electron configuration depends only on the number of protons $$Z$$ (which sets the number of electrons in a neutral atom). Isotopes share $$Z$$, so they share chemistry.\n- Step 2: Nuclear behaviour (stability, decay mode, half-life, binding energy) depends on the balance of protons vs. neutrons. Different neutron counts can shift a nucleus from stable to unstable, or change the decay mode entirely.\n- Step 3: That's why $$^{12}\\text{C}$$ and $$^{14}\\text{C}$$ behave identically in a plant's metabolism but only $$^{14}\\text{C}$$ decays — and that's the entire basis of radiocarbon dating.", "source": "Opus 4.7 ①", "_id": "opus_1_1"}, {"question": "A student says \"binding energy is the energy stored inside the nucleus.\" Explain why this is wrong and what binding energy actually is. (2 steps)", "answer": "- Step 1: Binding energy is the energy *required to pull the nucleus apart* into its constituent protons and neutrons (i.e., the energy you must *add* to break it). It is not energy \"stored\" inside — the nucleus is at a *lower* energy than separated nucleons.\n- Step 2: An analogy: a ball in a well. The binding energy is like the energy needed to lift the ball *out* of the well. The ball at the bottom has *less* gravitational potential energy than at the top, not more. Similarly, the bound nucleus has less mass-energy than its separated parts — that's precisely why it is bound.", "source": "GLM 5.1 ②", "_id": "glm_2_29"}, {"question": "When using the non-integer half-life formula $$N = N_0 (1/2)^{t/t_{1/2}}$$, a student tries to find the time for a sample to drop from $$N_0$$ to $$N_0/3$$. Set up (don't solve) the equation for $$t$$. (2 steps)", "answer": "- Step 1: Substitute $$N = N_0/3$$ into the formula: $$\\frac{N_0}{3} = N_0 \\left(\\frac{1}{2}\\right)^{t/t_{1/2}}$$. Cancel $$N_0$$: $$\\frac{1}{3} = \\left(\\frac{1}{2}\\right)^{t/t_{1/2}}$$.\n- Step 2: Take logs of both sides: $$\\ln(1/3) = \\frac{t}{t_{1/2}} \\ln(1/2)$$, so $$t = t_{1/2} \\times \\frac{\\ln(1/3)}{\\ln(1/2)} = t_{1/2} \\times \\frac{\\ln 3}{\\ln 2} \\approx 1.585 \\, t_{1/2}$$. The time for the count to drop to 1/3 is about 1.6 half-lives — a non-integer number, which the magic table alone can't easily give you.\n\nTakeaway: For non-integer half-lives, use logs: $$t = t_{1/2} \\times \\frac{\\ln(N_0/N)}{\\ln 2}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_57"}, {"question": "A neutrino was hypothesised before being detected. Why was its existence necessary even though no one had seen it? (3 steps)", "answer": "- Step 1: In beta decay, experiments showed that emitted electrons had a **continuous range of energies**, not a single discrete value — even though the parent and daughter nuclei have well-defined energies. This appeared to violate conservation of energy.\n- Step 2: Pauli proposed in 1930 that a **third, invisible particle** was carrying away the missing energy and momentum — neutral, very light, and barely interacting (hence undetected).\n- Step 3: Without this particle, both energy conservation and angular momentum conservation would be violated. The neutrino was finally detected experimentally by Cowan and Reines in 1956. This is a beautiful example of how *conservation laws* can predict the existence of particles before direct detection.", "source": "Opus 4.7 ②", "_id": "opus_2_45"}, {"question": "You cannot choose which type of radiation an isotope emits — it's fixed by the isotope. But you CAN choose which isotope to use. Give a practical example of why this matters in medicine. (2 steps)", "answer": "- Step 1: Medical tracers need a short half-life (so they don't irradiate the patient for long) and a specific radiation type. Gamma emitters are preferred for imaging because gamma escapes the body and can be detected externally. Alpha emitters would deposit all their energy internally (high damage).\n- Step 2: Technetium-99m (gamma emitter, $$t_{1/2} \\approx 6$$ hours) is ideal: it emits gamma (detectable outside), has a short half-life (clears quickly), and its chemistry allows it to target specific organs. You chose the isotope to get the right radiation type and half-life.\n\nTakeaway: Choose the isotope → get the radiation type and half-life. Medical imaging needs gamma + short half-life.", "source": "GLM 5.1 ③", "_id": "glm_3_48"}, {"question": "Why is the weak nuclear force (mediated by $$W^+$$, $$W^-$$, $$Z^0$$ bosons) specifically responsible for beta decay, while the strong force is not? (2 steps)", "answer": "- Step 1: Beta decay involves the conversion of one quark flavour into another (e.g., a down quark → up quark in beta-minus decay, changing a neutron $$udd$$ into a proton $$uud$$). Changing quark flavour is governed exclusively by the weak interaction — the strong force and electromagnetism cannot change quark flavour.\n- Step 2: The weak force is the only fundamental interaction that violates flavour conservation. It is mediated by the massive $$W$$ and $$Z$$ bosons, which is why the weak force has very short range and beta decay is relatively slow compared to strong-interaction processes. The heavy bosons make the interaction \"weak\" at low energies.", "source": "GLM 5.1 ②", "_id": "glm_2_60"}, {"question": "A proton (momentum $$p$$, charge $$+e$$) and an alpha particle (momentum $$2p$$, charge $$+2e$$) enter the same magnetic field $$B$$. Compare their orbital radii using $$r = p/(BQ)$$. (2 steps)", "answer": "- Step 1: For the proton: $$r_p = \\frac{p}{Be}$$. For the alpha: $$r_\\alpha = \\frac{2p}{B \\cdot 2e} = \\frac{p}{Be}$$.\n- Step 2: They have the same radius! The alpha has twice the momentum but also twice the charge — the factors cancel. This shows that radius depends on the *ratio* $$p/Q$$, not on either quantity alone.\n\nTakeaway: $$r = p/(BQ)$$. Same $$p/Q$$ ratio → same radius, regardless of particle type.", "source": "GLM 5.1 ③", "_id": "glm_3_17"}, {"question": "An electron and a positron meet and annihilate. How many photons are produced, and what is the minimum total energy released? Why can't a single photon carry all the energy? (3 steps)", "answer": "- Step 1: Two photons are produced. The minimum total energy is $$2m_e c^2$$ (the rest-mass energy of both particles combined).\n- Step 2: A single photon cannot conserve both energy and momentum simultaneously. Before annihilation, the total momentum in the centre-of-mass frame is zero (equal and opposite momenta). A single photon always carries momentum $$p = E/c$$, so it can't have zero momentum.\n- Step 3: Two back-to-back photons solve this: their momenta are equal and opposite (net zero), conserving momentum, and their combined energy equals $$2m_e c^2$$, conserving energy.\n\nTakeaway: Annihilation → 2 photons (back-to-back), total energy = $$2mc^2$$. One photon is forbidden by momentum conservation.", "source": "GLM 5.1 ③", "_id": "glm_3_18"}, {"question": "Why is it incorrect to say \"the isotope polonium-210 gives off alpha radiation because it has too many neutrons\"? What determines the type of radiation an isotope emits?", "answer": "- The type of radiation emitted is NOT determined by simple counts of protons or neutrons, but by the nuclear stability and the specific decay pathway that leads to a more stable configuration.\n- Polonium-210 (⁸⁴²₁₀Po) undergoes alpha decay because:\n+ It is extremely heavy (A = 210) and beyond the \"valley of stability\"\n+ Alpha emission reduces both A and Z, moving the nucleus toward more stable, lower-mass nuclei\n+ This is a quantum tunneling process with a specific probability (decay constant)\n- You cannot change or \"tune\" which radiation type an isotope emits — the isotope dictates its decay mode. You can only choose which isotope to use.\n- The misconception that \"too many neutrons\" causes alpha decay is wrong — alpha decay actually reduces the neutron-to-proton ratio by removing 2 neutrons and 2 protons.", "source": "MiniMax ①", "_id": "minimax_1_38"}, {"question": "Derive the relationship between the half-life $$t_{1/2}$$ and the decay constant $$\\lambda$$. (3 steps)", "answer": "- Step 1: Half-life is defined by the condition $$N(t_{1/2}) = N_0/2$$.\n- Step 2: Substitute into the decay law: $$\\tfrac{1}{2} = e^{-\\lambda t_{1/2}}$$.\n- Step 3: Take natural log of both sides: $$-\\ln 2 = -\\lambda t_{1/2}$$, so $$t_{1/2} = \\dfrac{\\ln 2}{\\lambda} \\approx \\dfrac{0.693}{\\lambda}$$.\n\nSo large $$\\lambda$$ (high decay probability) ↔ short half-life, and vice versa. Note half-life depends *only* on $$\\lambda$$ — not on $$N_0$$, temperature, pressure, or chemistry.", "source": "Opus 4.7 ②", "_id": "opus_2_24"}, {"question": "Rank the three principal types of nuclear radiation by penetrating power and by ionising power. Why do these two rankings run in opposite directions? (3 steps)", "answer": "- Step 1: **Penetrating power** (most → least): $$\\gamma > \\beta > \\alpha$$. Gamma can pass through several cm of lead; beta is stopped by a few mm of aluminium; alpha is stopped by paper or skin.\n- Step 2: **Ionising power** (most → least): $$\\alpha > \\beta > \\gamma$$. Alpha rips electrons off atoms far more aggressively than gamma does.\n- Step 3: **Why opposite?** Alpha has the largest charge ($$+2e$$) and the largest mass, so it collides with electrons in its path frequently and loses energy quickly — it ionises lots but also stops fast. Gamma is a massless, uncharged photon, so it rarely interacts at all — it passes through lots of material but doesn't deposit much energy per interaction. The same physics that makes a particle ionising also makes it short-ranged.", "source": "Opus 4.7 ②", "_id": "opus_2_5"}, {"question": "A nucleus in an excited state (denoted $$^A_Z X^*$$) emits gamma radiation. How do $$A$$ and $$Z$$ change? What exactly is happening to the nucleus? (2 steps)", "answer": "- Step 1: Neither $$A$$ nor $$Z$$ changes: $$^A_Z X^* \\rightarrow \\, ^A_Z X + \\gamma$$. Gamma emission is purely an energy release — no nucleons are gained or lost.\n- Step 2: The nucleus was in a high-energy (excited) state, often after a previous alpha or beta decay. It \"relaxes\" to its ground state by emitting a high-energy photon (gamma ray). Think of it as the nuclear equivalent of an electron dropping to a lower energy level and emitting a photon.\n\nTakeaway: Gamma decay changes the energy state of the nucleus, not its composition. $$A$$ and $$Z$$ are unchanged.", "source": "GLM 5.1 ③", "_id": "glm_3_13"}, {"question": "Why is \"$$E = mc^2$$\" relevant to nuclear physics specifically, more than to chemistry? (2 steps)", "answer": "- Step 1: In chemistry, mass changes during reactions are real but unmeasurably small (~$$10^{-10}$$ of the total mass) because chemical energies are ~eV per atom — too small to register on a balance.\n- Step 2: In nuclear reactions, energy changes are ~MeV per nucleon — about a million times bigger. The corresponding mass changes (mass defect) are now ~0.1% of the nuclear mass — easily measurable with mass spectrometers. So $$E = mc^2$$ becomes a *quantitative tool* for nuclear physics, not just a principle.", "source": "Opus 4.7 ①", "_id": "opus_1_47"}, {"question": "A student says \"every nucleus emits radiation, so every nucleus is radioactive\". What's wrong with this statement?", "answer": "Only **unstable** nuclei emit radiation. A stable nucleus (e.g. $$^{12}C$$, $$^{16}O$$, $$^{56}Fe$$, $$^{208}Pb$$) sits in an energy configuration that is a local minimum — no rearrangement is possible that releases energy while conserving the relevant quantum numbers. So a stable nucleus simply *sits there* indefinitely and emits nothing. Of the $$\\sim 254$$ known stable nuclides plus thousands of radioactive isotopes, only the unstable ones decay. Most atoms in everyday matter (the carbon, oxygen, iron in your body) are stable and never emit radiation. So radioactivity is a property of specific *isotopes*, not of all matter.", "source": "Opus 4.7 ②", "_id": "opus_2_53"}, {"question": "The atomic mass unit (u) is defined as $$\\frac{1}{12}$$ of the mass of a carbon-12 atom. Why is the conversion factor $$1 \\text{ u} \\approx 931.5 \\text{ MeV}/c^2$$ so useful in nuclear physics calculations? (2 steps)", "answer": "- Step 1: Nuclear energies are typically in MeV and masses are often given in u. Using $$\\Delta E = \\Delta m c^2$$ directly with kg and Joules requires cumbersome powers of 10.\n- Step 2: The factor 931.5 MeV/$$c^2$$ incorporates the $$c^2$$ conversion. If you find a mass defect in u, you can simply multiply by 931.5 to immediately get the energy in MeV, bypassing the conversion to kg and Joules entirely.", "source": "GLM 5.1 ①", "_id": "glm_1_25"}, {"question": "A mass defect of $$\\Delta m = 0.03 \\text{ u}$$ corresponds to roughly what binding energy? Walk through the unit-conversion logic. (2 steps)", "answer": "- Step 1: The shortcut is: (mass defect in u) × 931.5 = (energy in MeV). The 931.5 already has $$c^2$$ built in.\n- Step 2: $$0.03 \\times 931.5 \\approx 28$$ MeV. No need to multiply by $$c^2$$ again — that's the classic trap when mass is already in u.\n\nContrast: if mass were in kg, then $$\\Delta E = \\Delta m c^2$$ gives joules, and you'd divide by $$1.6 \\times 10^{-19}$$ to get eV.", "source": "Opus 4.7 ①", "_id": "opus_1_40"}, {"question": "A sample's mass falls from $$8$$ g to $$0.25$$ g. How many half-lives have elapsed? Walk through the reasoning. (3 steps)", "answer": "- Step 1: The mass ratio is $$0.25/8 = 1/32$$.\n- Step 2: Each half-life multiplies the mass by $$1/2$$, so after $$n$$ half-lives the ratio is $$(1/2)^n$$. Set equal: $$(1/2)^n = 1/32$$.\n- Step 3: Recognise $$32 = 2^5$$, so $$n = 5$$. Five half-lives have elapsed.\n\nThis is one of the fastest mental shortcuts in nuclear physics: memorise the powers of 2 ($$2, 4, 8, 16, 32, 64, ...$$) and look up $$n$$ directly.", "source": "Opus 4.7 ②", "_id": "opus_2_27"}, {"question": "In a linear accelerator (linac), why do the drift tubes get progressively longer along the beamline?", "answer": "A linac applies an alternating voltage of fixed frequency across each gap between consecutive drift tubes. The particle is accelerated only in the gaps; inside each tube (which is at uniform potential), it drifts at constant speed. For the AC to push the particle every time it crosses a gap, the particle must spend **equal time** in each tube (matching the half-period of the AC). But the particle is faster after each acceleration, so to maintain equal *time* per tube, each tube must be **longer** than the last. The lengths grow as the particle's speed grows — at non-relativistic speeds, roughly $$L \\propto v \\propto \\sqrt{n}$$ where $$n$$ is the tube number.", "source": "Opus 4.7 ②", "_id": "opus_2_16"}, {"question": "A nucleus with $$\\Delta m = 0.034$$ u releases how much binding energy in MeV, and why is no $$c^2$$ arithmetic needed? (2 steps)", "answer": "- Step 1: Use the conversion 1 u = 931.5 MeV/c². For energy: $$\\Delta E = \\Delta m \\times c^2 = 0.034 \\times 931.5 \\approx 31.7$$ MeV.\n- Step 2: The 931.5 factor *already* has the $$c^2$$ embedded — it's the energy equivalent of 1 u. So once your mass is in u, you do NOT multiply by $$c^2$$ again. That double-multiplication is one of the most common exam errors. If your mass were in kg, then you'd need the explicit $$\\times c^2$$.", "source": "Opus 4.7 ①", "_id": "opus_1_49"}, {"question": "Why does a *single* nucleus have a completely unpredictable decay moment, yet a large sample follows a smooth exponential curve? (3 steps)", "answer": "- Step 1: At the single-nucleus level, decay is genuinely random — quantum mechanical, with only a probability per unit time. You cannot, even in principle, predict the instant.\n- Step 2: But with $$N \\sim 10^{20}$$ nuclei, the law of large numbers kicks in. The expected fraction decaying per second is $$\\lambda$$, with statistical fluctuations of order $$1/\\sqrt{N}$$ — vanishingly small.\n- Step 3: So the macroscopic behaviour is sharply deterministic ($$N(t) = N_0 e^{-\\lambda t}$$) even though every individual event is random. This is the same statistical magic that makes gas pressure smooth despite atomic chaos.", "source": "Opus 4.7 ①", "_id": "opus_1_19"}, {"question": "When using $$A = \\lambda N$$, a student substitutes the mass of the sample in grams for $$N$$. Why does this give nonsense? How should you convert mass to $$N$$? (2 steps)", "answer": "- Step 1: $$A = \\lambda N$$ requires $$N$$ = the number of undecayed nuclei (a pure number, typically $$10^{15}$$–$$10^{23}$$). Mass in grams is not a count of nuclei — it's off by a factor of roughly $$N_A / M_r$$ (where $$N_A = 6.02 \\times 10^{23}$$).\n- Step 2: Convert mass to number of nuclei: $$N = \\frac{\\text{mass}}{M_r} \\times N_A$$, where $$M_r$$ is the molar mass in g/mol and $$N_A$$ is Avogadro's number. For example, 1 g of carbon-12 contains $$6.02 \\times 10^{23} / 12 \\approx 5.02 \\times 10^{22}$$ nuclei.\n\nTakeaway: $$N$$ = number of nuclei, not mass. Convert via $$N = (m / M_r) \\times N_A$$.", "source": "GLM 5.1 ③", "_id": "glm_3_42"}, {"question": "A student says \"half-life depends on temperature — hotter samples decay faster.\" Why is this fundamentally wrong? (2 steps)", "answer": "- Step 1: Half-life is determined by the nuclear strong and weak forces, which operate at femtometre ($$10^{-15}$$ m) scales. Thermal energies at everyday temperatures (~0.025 eV at room temperature) are utterly negligible compared to nuclear energy scales (~MeV).\n- Step 2: Chemical bonds, temperature, pressure, and electromagnetic fields cannot affect the probability of nuclear decay because they act on atomic/molecular scales, not nuclear scales. The nucleus is shielded by the electron cloud and governed by forces many orders of magnitude stronger than chemical processes.\n\nTakeaway: Nuclear decay is immune to external conditions. Half-life is intrinsic to the isotope — temperature, pressure, chemistry cannot change it.", "source": "GLM 5.1 ③", "_id": "glm_3_41"}, {"question": "In $$\\beta^-$$ decay, why does the proton number $$Z$$ increase by 1, while in $$\\beta^+$$ decay it decreases by 1?", "answer": "- Step 1: $$\\beta^-$$: a neutron → proton (plus emitted electron + antineutrino). The nucleus gains a proton, so $$Z$$ goes up by 1. $$A$$ is unchanged because a neutron just became a proton — total nucleon count is preserved.\n- Step 2: $$\\beta^+$$: a proton → neutron (plus emitted positron + neutrino). The nucleus loses a proton, so $$Z$$ goes down by 1. Again $$A$$ is unchanged.\n- Step 3: A classic exam trap is flipping these. The mnemonic: the sign of the emitted particle tells you what the nucleus had to give up. Emit a negative → nucleus becomes more positive (Z↑). Emit a positive → nucleus becomes less positive (Z↓).", "source": "Opus 4.7 ①", "_id": "opus_1_6"}, {"question": "The decay constant $$\\lambda$$ is defined as the probability per unit time that a given nucleus decays. Why does this make nuclear decay fundamentally random, and what can we actually predict? (3 steps)", "answer": "- Step 1: Each nucleus has a fixed probability $$\\lambda$$ per second of decaying. Whether it decays in the next second is a random event — like rolling a die. You cannot predict *which* nucleus will decay or *when* a specific one will.\n- Step 2: However, with a very large sample ($$\\sim 10^{20}$$ nuclei), statistical regularity emerges. The *average* number decaying per second is predictable: $$A = \\lambda N$$, where $$N$$ is the number of undecayed nuclei.\n- Step 3: This is analogous to insurance: you can't predict which individual person will have an accident, but with millions of policyholders, the average claim rate is very predictable. The half-life is a statistical property of the ensemble, not a timer on any individual nucleus.", "source": "GLM 5.1 ②", "_id": "glm_2_20"}, {"question": "Why is a moderator (like water or graphite) needed in a nuclear fission reactor, and what property must a good moderator have? (3 steps)", "answer": "- Step 1: Fission neutrons are born \"fast\" (high kinetic energy, ~MeV). Fast neutrons have a low probability of being captured by U-235. U-235 fissions much more efficiently with \"thermal\" (slow) neutrons (~0.025 eV).\n- Step 2: A moderator slows fast neutrons through repeated elastic collisions with light nuclei. When a neutron hits a nucleus of similar mass (like hydrogen in water, or carbon in graphite), it transfers a large fraction of its kinetic energy per collision, slowing down efficiently.\n- Step 3: A good moderator must have: (a) light nuclei (for efficient energy transfer), (b) low neutron absorption cross-section (so it slows neutrons without capturing them), and (c) high density of scattering centres. Water, heavy water, and graphite are common choices.", "source": "GLM 5.1 ②", "_id": "glm_2_44"}, {"question": "Why did Rutherford's results specifically rule out the \"plum pudding\" model of the atom? (2 steps)", "answer": "- Step 1: Plum pudding pictures positive charge as spread thinly throughout the atom's volume. If true, an alpha particle would only ever feel a weak, diffuse repulsion — every alpha would deflect by a small amount, and none would bounce back.\n- Step 2: But Rutherford observed large-angle scattering. A diffuse positive jelly cannot produce a near-180° deflection of a fast massive alpha; only a tiny, dense concentration of charge can. So the positive charge must be localised in a nucleus, not smeared out.", "source": "Opus 4.7 ①", "_id": "opus_1_3"}, {"question": "Why does pair production require a minimum photon energy of $$E = 2mc^2$$, not just $$mc^2$$? (2 steps)", "answer": "- Step 1: Pair production creates *both* a particle and its antiparticle (e.g. electron + positron) — you cannot create one without the other (charge conservation, lepton conservation).\n- Step 2: Each requires at least its rest mass energy $$mc^2$$ to bring into existence. So the minimum photon energy is $$2mc^2$$. For an electron-positron pair: $$2 \\times 0.511 = 1.022$$ MeV.\n\nCommon trap: forgetting the factor of 2. The photon has to pay for *both* particles' rest masses.", "source": "Opus 4.7 ①", "_id": "opus_1_31"}, {"question": "Why is the decay chain of U-238 a *sequence* of decays (alpha then beta then alpha...) rather than a single big rearrangement? (2 steps)", "answer": "- Step 1: Each decay step is a small, local rearrangement that the nucleus can spontaneously perform — typically a small piece (alpha) breaking off, or a single quark flavour flip (beta). Each step moves the nucleus only a short distance on the $$B/A$$ curve.\n- Step 2: A single large rearrangement (jumping directly from U-238 to Pb-206) would require many simultaneous quantum events, which is astronomically improbable. So the nucleus walks downhill one step at a time, often crossing several intermediate isotopes, each with its own half-life — until it lands on stable lead.", "source": "Opus 4.7 ①", "_id": "opus_1_54"}, {"question": "The neutron is slightly heavier than the proton ($$m_n \\approx 1.675 \\times 10^{-27}$$ kg vs $$m_p \\approx 1.673 \\times 10^{-27}$$ kg). Explain why a free neutron can undergo beta-minus decay but a free proton cannot undergo beta-plus decay. (2 steps)", "answer": "- Step 1: For a free neutron: $$n \\rightarrow p + e^- + \\bar{\\nu}_e$$. Since $$m_n > m_p + m_e$$, the rest mass of the reactant exceeds the rest masses of the products. The mass deficit provides the kinetic energy for the products — the decay is energetically allowed and spontaneous.\n- Step 2: For a free proton: $$p \\rightarrow n + e^+ + \\nu_e$$. Since $$m_p < m_n + m_e$$, the products are heavier than the reactant. Energy would need to be *supplied*, not released. This violates energy conservation for an isolated proton. A proton can only undergo $$\\beta^+$$ decay inside a nucleus, where the nuclear binding energy context makes the overall transformation favourable.", "source": "GLM 5.1 ②", "_id": "glm_2_46"}, {"question": "In the Rutherford gold-foil experiment, three distinct observations were made. State each observation and the structural conclusion drawn from it. (3 steps)", "answer": "- Step 1: **Most alpha particles passed straight through** the gold foil → the atom is mostly empty space (electrons are sparse and the nucleus is tiny relative to atomic dimensions).\n- Step 2: **A small fraction were deflected at small angles** ($$<10°$$) → there is a concentration of positive charge somewhere in the atom, repelling the (positive) alphas as they pass nearby.\n- Step 3: **A tiny fraction bounced back at large angles** ($$>90°$$) → the positive charge is concentrated in an extremely small, dense region (the nucleus) which also carries essentially all the atomic mass — only something tiny and massive could turn a fast alpha around.\n\nThis experiment killed the \"plum pudding\" model and established the nuclear model.", "source": "Opus 4.7 ②", "_id": "opus_2_2"}, {"question": "Edge case: What happens to the binding energy per nucleon at the very light end of the curve (hydrogen-1)? Why is it essentially zero? (2 steps)", "answer": "- Step 1: Hydrogen-1 ($$^1_1H$$) is a single proton — there are no other nucleons to bind with. There is no mass defect (nothing to compare against), and no binding energy is required to \"separate\" it because it's already a single nucleon.\n- Step 2: $$B/A \\approx 0$$ for hydrogen-1. This is why fusion of hydrogen releases so much energy — moving from $$B/A \\approx 0$$ to $$B/A \\approx 7 \\text{ MeV}$$ (helium-4) is the steepest climb on the entire curve. The energy gain per nucleon is enormous compared to fission, which moves from ~7.6 to ~8.5 MeV/nucleon — a much smaller jump.", "source": "GLM 5.1 ②", "_id": "glm_2_55"}, {"question": "Explain the misconception that “the nucleus stores binding energy.” (2 steps)", "answer": "- Step 1: **Binding Energy Definition**  \n  Binding energy is the energy *required* to disassemble a nucleus into free nucleons. It is not energy stored but energy deficit of the bound state.  \n- Step 2: **Mass Defect Analogy**  \n  The mass defect ($Δm$) represents the mass converted to energy ($E = Δmc²$) to bind nucleons. The nucleus is in a *lower* energy state than free nucleons.  \n\n**Takeaway:** Binding energy reflects energy released when nucleons bind, not energy stored—fusing or splitting nuclei releases energy by moving toward higher BE/A.", "source": "Qwen 3 ①", "_id": "qwen_1_6"}, {"question": "For a charged particle moving perpendicular to a uniform magnetic field, what determines the radius of its circular path, and what intuition does this give you about cyclotrons? (3 steps)", "answer": "- Step 1: The magnetic force provides the centripetal force: $$BQv = mv^2/r$$, so $$r = mv/(BQ) = p/(BQ)$$.\n- Step 2: **Heavier or faster particles sweep wider arcs** (numerator grows); **stronger fields or larger charges tighten the arc** (denominator grows). Momentum, not just velocity, is what matters.\n- Step 3: In a cyclotron, as particles gain energy at each gap crossing, $$p$$ grows, so $$r$$ grows — producing the characteristic outward spiral. Remarkably, the orbital **period** $$T = 2\\pi m/(BQ)$$ is **independent of speed**, which is why the cyclotron works at a single fixed AC frequency.", "source": "Opus 4.7 ②", "_id": "opus_2_17"}, {"question": "Why must a (anti)neutrino always appear in beta decay equations? What conservation law forces it?", "answer": "It is forced by **conservation of lepton number**. Electrons and electron-neutrinos carry lepton number $$+1$$; their antiparticles (positrons, electron antineutrinos) carry lepton number $$-1$$. Before the decay, the parent nucleus has lepton number $$0$$. In $$\\beta^-$$ decay, an electron (lepton number $$+1$$) is emitted, so an antineutrino (lepton number $$-1$$) must also be emitted to keep the total at $$0$$. In $$\\beta^+$$ decay, a positron (lepton number $$-1$$) is emitted, so a neutrino (lepton number $$+1$$) is needed. Historically the neutrino was *postulated* to explain \"missing energy\" in the beta spectrum before being detected — and forgetting it in an exam loses marks immediately.", "source": "Opus 4.7 ②", "_id": "opus_2_9"}, {"question": "What's the difference between a nuclear reactor and a nuclear bomb, given that both use fission chain reactions? (2 steps)", "answer": "- Step 1: The physics is identical: each fission produces 2–3 neutrons, which can trigger further fissions — a chain reaction. The key parameter is the \"multiplication factor\" $$k$$ (average number of new fissions per current fission).\n- Step 2: A reactor uses **control rods** (boron, cadmium — neutron absorbers) to hold $$k \\approx 1$$ exactly — steady-state, controlled power. A bomb removes any such absorber and assembles a supercritical mass ($$k > 1$$) so neutrons multiply explosively. The difference is *control*, not physics.", "source": "Opus 4.7 ①", "_id": "opus_1_27"}, {"question": "Why might a long-lived radioisotope (e.g. uranium-238, $$t_{1/2} \\approx 4.5 \\times 10^9$$ yr) still be present on Earth, while a short-lived one (e.g. polonium-214, $$t_{1/2} \\approx 0.16$$ ms) cannot exist primordially? (2 steps)", "answer": "- Step 1: Uranium-238's half-life is comparable to the age of the Earth (~$$4.5 \\times 10^9$$ yr). So roughly half the original U-238 is still around — it was forged in supernovae before the solar system formed.\n- Step 2: Polonium-214's half-life is fractions of a millisecond. Any primordial Po-214 would have decayed within microseconds. The only reason any Po-214 exists today is that it's continuously *produced* as an intermediate in the U-238 decay chain — it's transient, not stored.\n\nTakeaway: primordial isotopes need half-lives comparable to or longer than the age of the universe; everything else is either daughter-product or man-made.", "source": "Opus 4.7 ①", "_id": "opus_1_51"}, {"question": "Why is iron-56 the energy \"dead end\" — why can't you release energy by either fissioning or fusing iron? (2 steps)", "answer": "- Step 1: Iron-56 sits at the peak of the $$B/A$$ curve. Any rearrangement — splitting it or combining it with something — produces products with *lower* $$B/A$$. That requires energy input, not release.\n- Step 2: This is why stellar cores accumulate iron at the end of a massive star's life: once fusion reaches iron, no further reaction can power the star. The core collapses, and you get a supernova. All heavier elements (gold, uranium) are made in those explosions, not in ordinary stellar fusion.", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "A misconception probe: \"Half-life means the half-life of each individual nucleus.\" Why is this wrong?", "answer": "Half-life is a **statistical** property of a *population*, not of an individual nucleus. An individual nucleus has no concept of half-life: at every moment, it has the same probability $$\\lambda$$ per second to decay, regardless of how long it has already existed. A nucleus does not \"age\" or \"use up its half-life\". The half-life $$t_{1/2}$$ tells you that *out of a large population*, half will have decayed within that time. Some individual nuclei will decay in the first second; others may last billions of years. So saying \"this nucleus has a half-life of 5730 years\" is nonsense — it's the *isotope* that has that half-life, characterising the population.", "source": "Opus 4.7 ②", "_id": "opus_2_55"}, {"question": "In a cyclotron, the period of an ion's semicircular orbit is $$T = \\frac{2\\pi m}{BQ}$$. Notice that $$v$$ does not appear. Why is this the key to how a cyclotron works? (3 steps)", "answer": "- Step 1: The radius of the orbit is $$r = \\frac{mv}{BQ}$$. As the ion accelerates (gains $$v$$), the radius grows — the spiral widens.\n- Step 2: But the period $$T = \\frac{2\\pi r}{v} = \\frac{2\\pi m}{BQ}$$ is independent of $$v$$. Faster ions travel in bigger circles but take the same time to complete each semicircle.\n- Step 3: This means a single fixed-frequency AC voltage across the dees can always be in phase with the ion, regardless of how fast it's going. Every time the ion crosses the gap, the field has reversed to accelerate it again. Without this speed-independence, the cyclotron couldn't work with a single frequency.\n\nTakeaway: The cyclotron works because orbital period is speed-independent — a beautiful consequence of $$r \\propto v$$.", "source": "GLM 5.1 ③", "_id": "glm_3_16"}, {"question": "Why does nuclear fusion require enormous temperatures (>$$10^7$$ K), and what is the physics behind the threshold? (3 steps)", "answer": "- Step 1: To fuse, two positive nuclei must get within $$\\sim 10^{-15}$$ m of each other so that the short-range strong nuclear force can bind them.\n- Step 2: But on the way in, they experience strong **electrostatic repulsion** (Coulomb barrier) — both nuclei are positively charged. They need enough **kinetic energy** to overcome this barrier.\n- Step 3: Kinetic energy scales with temperature: $$\\langle KE \\rangle \\sim k_B T$$. The Coulomb barrier corresponds to roughly $$10^7$$–$$10^8$$ K. Below this, almost no fusion occurs; above it, the fusion rate becomes appreciable. (Quantum tunnelling helps a bit, which is why stellar cores at $$\\sim 10^7$$ K can fuse despite classical barriers being even higher.)\n\nThis is why fusion happens in stars but is so hard to engineer on Earth.", "source": "Opus 4.7 ②", "_id": "opus_2_37"}, {"question": "Rank alpha, beta, and gamma radiation by penetrating power and by ionising power. Why are these two rankings inverted?", "answer": "- Step 1: Penetrating power: $$\\gamma > \\beta > \\alpha$$. Alpha is stopped by paper/skin (a few cm of air); beta by a few mm of aluminium (≈ 1 m air); gamma needs cm of lead or m of concrete.\n- Step 2: Ionising power: $$\\alpha > \\beta > \\gamma$$ — the exact reverse.\n- Step 3: These are inverted for a physical reason: ionisation requires interaction. Alpha is big, slow, and doubly charged ($$+2e$$), so it collides with atomic electrons constantly — it ionises strongly but loses energy fast, hence short range. Gamma is a chargeless, massless photon — it rarely interacts, so it ionises weakly but slips through far more material.\n\nTakeaway: strong interaction = high ionisation but low penetration. They're two sides of the same coin.", "source": "Opus 4.7 ①", "_id": "opus_1_4"}, {"question": "Why does nuclear fusion require extremely high temperatures (like those in the Sun)?", "answer": "- Step 1: Understand the problem\n  - Fusion involves bringing two positively charged nuclei close together\n  - Like charges repel (Coulomb repulsion)\n  - For fusion, nuclei must get within about 10⁻¹⁵ m (range of strong nuclear force)\n- Step 2: What high temperature provides\n  - Temperature is a measure of average kinetic energy\n  - At very high temperatures (≥10⁷ K), nuclei have enormous kinetic energies\n  - This allows them to overcome the Coulomb barrier\n- Step 3: The strong force takes over\n  - Once nuclei get close enough, the strong nuclear force (attractive) overwhelms electrostatic repulsion\n  - The nuclei bind together, releasing energy\n- Step 4: Why it's hard on Earth\n  - Containing plasma at 10⁷ K is extremely difficult\n  - This is why fusion reactors (like ITER) are challenging to build", "source": "MiniMax ②", "_id": "minimax_2_15"}, {"question": "On the binding energy per nucleon curve, the value rises steeply from hydrogen to helium, peaks near iron-56, and then slowly declines for heavier elements. Explain why the curve declines for elements heavier than iron. (2 steps)", "answer": "- Step 1: In heavy nuclei, there are many protons packed together. The strong nuclear force is short-range and only attracts nearest neighbours, but the electrostatic repulsion between protons is long-range and acts across the entire nucleus.\n- Step 2: As the nucleus grows, the cumulative repulsive force from all the protons increasingly counteracts the binding effect of the strong force. This reduces the net binding energy per nucleon, causing the curve to decline.", "source": "GLM 5.1 ①", "_id": "glm_1_21"}, {"question": "A common misconception is that \"binding energy is the energy stored inside the nucleus.\" Why is this definition incorrect, and what is the correct definition? (2 steps)", "answer": "- Step 1: The misconception implies the nucleus contains extra energy. In reality, the bound nucleus is in a *lower* energy state than its separated constituents (that is why it is stable).\n- Step 2: Binding energy is correctly defined as the **energy required to pull the nucleus apart** into its constituent protons and neutrons, separating them to infinity. It is the energy that must be *supplied* to break the bonds, not energy \"stored\" inside.", "source": "GLM 5.1 ①", "_id": "glm_1_20"}, {"question": "In the proton-proton chain inside stars, four protons fuse into one helium-4 nucleus. Write the net equation. Why must two positrons be emitted? (3 steps)", "answer": "- Step 1: $$4 \\, ^1_1 H \\rightarrow \\, ^4_2 He + 2 \\, ^0_{+1} \\beta + 2 \\nu_e + \\text{energy}$$.\n- Step 2: Conservation of charge: 4 protons have total $$Z = 4$$. Helium-4 has $$Z = 2$$. The \"missing\" charge of +2 is carried away by two positrons (each +1).\n- Step 3: Conservation of lepton number also demands the positrons be accompanied by two neutrinos. The positrons will quickly annihilate with electrons, releasing additional energy as gamma photons.\n\nTakeaway: 4H → He + 2 positrons + 2 neutrinos + energy. The positrons carry away the excess positive charge.", "source": "GLM 5.1 ③", "_id": "glm_3_40"}, {"question": "A moderator in a fission reactor slows down fast neutrons. Why do slow (\"thermal\") neutrons work better for sustaining the chain reaction in $$^{235}U$$? (2 steps)", "answer": "- Step 1: Fast neutrons pass through $$^{235}U$$ nuclei too quickly to be captured — the interaction time is too short. Slow neutrons spend more time near the nucleus, giving the strong force more time to act, greatly increasing the probability of absorption.\n- Step 2: The moderator (typically water or graphite) allows fast neutrons to collide with its light nuclei, transferring kinetic energy and slowing down through repeated elastic collisions. Once \"thermalised\" (at thermal equilibrium with the moderator), neutrons have a much higher fission cross-section with $$^{235}U$$.\n\nTakeaway: Slow neutrons are more likely to be absorbed → moderator is essential for sustaining the chain reaction in a reactor.", "source": "GLM 5.1 ③", "_id": "glm_3_52"}, {"question": "Using the binding-energy-per-nucleon curve, explain why *both* fission of heavy nuclei *and* fusion of light nuclei release energy. (3 steps)", "answer": "- Step 1: Energy is released in any nuclear reaction whose products have **higher total binding energy** than the reactants — equivalently, whose products sit higher on the $$B/A$$ curve.\n- Step 2: **Fission**: Heavy nuclei (e.g. $$^{235}U$$, far right) have lower $$B/A$$ ($$\\sim 7.6$$ MeV) than medium nuclei ($$\\sim 8.5$$ MeV). Splitting a heavy nucleus into two medium nuclei moves the system *up* the curve → energy released.\n- Step 3: **Fusion**: Very light nuclei (e.g. hydrogen, far left) have very low $$B/A$$. Fusing them into a slightly heavier nucleus (e.g. helium-4) moves the system *up* the steep left slope → energy released. Both processes converge toward iron-56, the peak.", "source": "Opus 4.7 ②", "_id": "opus_2_34"}, {"question": "Synthesis question: A nuclear reactor and a nuclear bomb both use uranium fission. Contrast the conditions in each that lead to controlled power vs. explosive energy release. (3 steps)", "answer": "- Step 1: Both rely on the chain reaction: each fission releases 2–3 neutrons that can cause further fissions. The key parameter is the multiplication factor $$k$$ — the average number of fissions caused by neutrons from one fission.\n- Step 2: In a **reactor**, control rods (boron, cadmium) absorb excess neutrons to keep $$k = 1$$ (critical). A moderator slows neutrons for efficient U-235 capture. The reaction proceeds at a steady, controllable rate. If $$k$$ rises above 1, control rods are inserted further; if $$k$$ falls below 1, they're withdrawn.\n- Step 3: In a **bomb**, the design maximises $$k \\gg 1$$ (supercritical). Weapons-grade uranium (>90% U-235, vs. ~3–5% in reactor fuel) is rapidly compressed into a supercritical mass. There a
