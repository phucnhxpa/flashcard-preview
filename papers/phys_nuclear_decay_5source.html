ith no radioactive source present due to background radiation.\n- If background is not subtracted, the measured count rate will be too high, leading to errors in half-life calculations (apparent half-life will be longer than the true value).", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": true}, {"question": "Define the following terms: (a) activity, (b) decay constant, (c) half-life. (3 steps)", "answer": "- Step 1: Activity (A): the rate at which nuclei decay in a radioactive sample; measured in becquerel (Bq), where 1 Bq = 1 decay per second.\n- Step 2: Decay constant (λ): the probability per unit time that any given nucleus will decay; units s⁻¹. For a sample of N nuclei, activity A = λN.\n- Step 3: Half-life (t½): the time taken for the number of radioactive nuclei (or the activity) in a sample to fall to half its initial value. It is intrinsic to the isotope and independent of temperature, pressure, or chemical state.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "A radioactive source has initial activity A₀ = 800 Bq and half-life t½ = 20 minutes. What is the activity after 1 hour? Explain your reasoning.", "answer": "- Step 1: Convert time to half-lives: 1 hour = 60 minutes = 3 half-lives.\n- Step 2: Each half-life reduces activity by a factor of ½. After n half-lives: A = A₀(½)ⁿ.\n- Step 3: A = 800 × (½)³ = 800 × ⅛ = 100 Bq.\n- Answer: 100 Bq.\n\n[Alternatively: Using the magic table: 0 half-lives → 800 Bq; 1 → 400 Bq; 2 → 200 Bq; 3 → 100 Bq.]", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "A sample initially contains 5.672 × 10¹² nuclei of an isotope with half-life 3 days. How many nuclei remain after 6 days? Use the \"magic table\" method.", "answer": "- Step 1: Set up the magic table with columns: Half-lives | Time | Number of nuclei\n- Step 2: Fill in known values: start at 0 half-lives, 0 days, 5.672 × 10¹² nuclei\n- Step 3: Each half-life (3 days), divide number by 2:\n+ Half-life 1: 3 days → 2.836 × 10¹² nuclei\n+ Half-life 2: 6 days → 1.418 × 10¹² nuclei\n- Answer: 1.418 × 10¹² nuclei remain after 6 days.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "Carbon-14 has a half-life of 5730 years. Calculate its decay constant λ in s⁻¹, showing your working. (3 steps)", "answer": "- Step 1: Convert half-life to seconds: t½ = 5730 × 365.25 × 24 × 3600 ≈ 1.808 × 10¹¹ s\n- Step 2: Use the formula t½ = ln2/λ ≈ 0.693/λ\n- Step 3: Rearranging: λ = 0.693 / t½ = 0.693 / (1.808 × 10¹¹) ≈ 3.83 × 10⁻¹² s⁻¹\n- Answer: λ ≈ 3.83 × 10⁻¹² s⁻¹", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "A polonium isotope has half-life 164 s. How long does it take for a sample to decay from 8.00 g to 0.25 g? (2 steps)", "answer": "- Step 1: Find the number of half-lives from the mass ratio: 0.25/8.00 = (½)ⁿ → 1/32 = (½)ⁿ → n = 5 half-lives\n- Step 2: Time = n × t½ = 5 × 164 s = 820 s\n- Answer: 820 s (or approximately 14 minutes)", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "What is meant by \"the random nature of nuclear decay\"? Why can't we predict when a particular nucleus will decay?", "answer": "- Nuclear decay is a quantum mechanical process governed by probability, not determinism.\n- Each unstable nucleus has a constant probability (the decay constant λ) of decaying in any small time interval, but the exact moment for any individual nucleus is completely unpredictable — it could decay at any time.\n- We can only make statistical predictions for large numbers of nuclei: after one half-life, approximately half will have decayed, but we cannot say which specific ones.\n- This randomness is fundamental, not a limitation of our measurement instruments.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "Define mass defect and binding energy. Why does a bound nucleus have less mass than its constituent nucleons? (2 steps)", "answer": "- Step 1: Mass defect (Δm) is the difference between the sum of the masses of the individual protons and neutrons and the measured mass of the bound nucleus: Δm = [Z × mₚ + (A−Z) × mₙ] − m_nucleus\n- Step 2: Binding energy (BE) is the energy required to completely separate a nucleus into its constituent protons and neutrons: BE = Δm × c²\n- The bound nucleus has less mass because when nucleons bind together via the strong nuclear force, the system loses energy (the binding energy is released). By E = mc², this loss of energy appears as a loss of mass. The bound state is at a lower energy (more stable) than the separated nucleons.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": true}, {"question": "The atomic mass unit u is defined as 1/12 of the mass of a carbon-12 atom. State its value in (a) kg and (b) MeV/c².", "answer": "- (a) In kilograms: 1 u = 1.661 × 10⁻²⁷ kg\n- (b) In energy units: 1 u = 931.5 MeV/c²\n- This conversion (931.5 MeV per u) effectively \"includes\" the c² factor, making it convenient for nuclear physics calculations: a mass defect of Δm u corresponds to Δm × 931.5 MeV of binding energy.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "Calculate the binding energy per nucleon for ⁵⁶₂₆Fe given: nuclear mass = 9.288 × 10⁻²⁶ kg, mₚ = 1.673 × 10⁻²⁷ kg, mₙ = 1.675 × 10⁻²⁷ kg. (4 steps)", "answer": "- Step 1: Calculate mass defect\n  Δm = (26 × 1.673 × 10⁻²⁷) + (30 × 1.675 × 10⁻²⁷) − 9.288 × 10⁻²⁶\n  = 8.680 × 10⁻²⁸ kg\n\n- Step 2: Calculate binding energy: ΔE = Δm × c² = 8.680 × 10⁻²⁸ × (3.00 × 10⁸)² = 7.812 × 10⁻¹¹ J\n\n- Step 3: Binding energy per nucleon: ΔE/A = 7.812 × 10⁻¹¹ / 56 = 1.395 × 10⁻¹² J/nucleon\n\n- Step 4: Convert to MeV: (1.395 × 10⁻¹²) / (1.60 × 10⁻¹³) × 10⁶ ≈ 8.72 MeV/nucleon\n- Answer: Approximately 8.72 MeV per nucleon (close to the peak of the binding energy curve).", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "Using the binding-energy-per-nucleon curve, explain why both nuclear fission and nuclear fusion release energy. (3 steps)", "answer": "- Step 1: The curve peaks near iron-56 (≈ 8.8 MeV/nucleon). Nuclei on either side of the peak have lower binding energy per nucleon.\n- Step 2: Fission: Heavy nuclei (e.g., ²³⁵U, ≈ 7.6 MeV/nucleon) split into medium-mass daughter nuclei (≈ 8.5 MeV/nucleon). The products are higher on the curve, so energy is released (≈ 200 MeV per fission).\n- Step 3: Fusion: Light nuclei (e.g., ²H and ³H, ≈ 1–3 MeV/nucleon) combine into heavier nuclei (⁴He, ≈ 7 MeV/nucleon). The product is higher on the curve, so energy is released (≈ 17.6 MeV for D-T fusion).\n- General rule: Any nuclear reaction that moves products higher on the binding-energy-per-nucleon curve releases energy.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "In nuclear fission, what is the role of (a) the moderator and (b) the control rod? How do they differ?", "answer": "- (a) Moderator (e.g., graphite, water): Slows down the fast neutrons produced in fission so they become \"thermal\" neutrons, which are more likely to cause further fission in ²³⁵U. Without a moderator, fast neutrons escape or are captured without causing fission.\n- (b) Control rods (e.g., boron, cadmium): Absorb excess neutrons to prevent the reaction from becoming uncontrolled. They can be inserted or withdrawn to adjust the reaction rate, keeping the multiplication factor at exactly 1 for a stable reactor.\n- Key difference: The moderator increases fission probability; control rods decrease it.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "Why does nuclear fusion require extremely high temperatures (over 10⁷ K)? Why is it so difficult to achieve on Earth?", "answer": "- Step 1: Fusion requires two positively charged nuclei to get close enough for the strong nuclear force to bind them (range ≈ 10⁻¹⁵ m). But the electrostatic Coulomb repulsion between like-charged protons pushes them apart.\n- Step 2: At extremely high temperatures, nuclei have enormous kinetic energy, enabling them to overcome the Coulomb barrier and collide with enough energy to fuse.\n- Step 3: On Earth, containing plasma at such temperatures (hotter than the Sun's core) without it touching or escaping the container is extremely challenging. Magnetic confinement (tokamaks) and inertial confinement (lasers) are being developed.\n- In stars, gravity provides the pressure to contain the plasma, making fusion natural.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "Describe what happens in (a) annihilation and (b) pair production. What is the minimum photon energy required for pair production of an electron-positron pair? (3 steps)", "answer": "- Step 1: Annihilation — when a particle meets its antiparticle, both are destroyed and their rest-mass energy is converted into photons. For electron-positron annihilation: e⁻ + e⁺ → γ + γ, releasing 2mₑc² ≈ 1.022 MeV.\n- Step 2: Pair production — the reverse process: a high-energy photon converts into a particle-antiparticle pair (e.g., electron + positron). This requires a minimum photon energy equal to the total rest-mass energy of the created particles.\n- Step 3: For electron-positron pair production: E_min = 2mₑc² = 2 × 0.511 MeV = 1.022 MeV. Below this threshold, pair production cannot occur.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "An electron is accelerated from rest through a potential difference of 5.0 kV. Calculate its final speed. State whether classical mechanics is valid here. (3 steps)", "answer": "- Step 1: Using energy conservation: kinetic energy gained = work done by the electric field\n  ½mₑv² = eV\n\n- Step 2: Solving for v:\n  v = √(2eV/mₑ) = √(2 × 1.60 × 10⁻¹⁹ × 5000 / 9.11 × 10⁻³¹)\n  v = √(1.756 × 10¹⁵) ≈ 4.19 × 10⁷ m/s\n\n- Step 3: Compare to c: v/c = 4.19 × 10⁷ / 3.00 × 10⁸ ≈ 0.14 (14% of light speed)\n  Classical mechanics is approaching its limit (beyond 10% c, relativistic effects become significant), but the calculation gives a reasonable estimate.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "What is thermionic emission, and how does it relate to electron guns and particle accelerators?", "answer": "- Thermionic emission is the process where heating a metal gives its conduction electrons enough thermal energy to escape from the surface.\n- Once electrons are emitted, they can be accelerated through a potential difference V, gaining kinetic energy: ½mv² = eV\n- This principle is used in electron guns (e.g., in old CRT televisions, electron microscopes) and as the ion source in particle accelerators like linear accelerators and cyclotrons.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "In a cyclotron, what determines the radius of the path of a charged particle in the magnetic field? Why does the orbit period not depend on the particle's speed?", "answer": "- Step 1: The radius of the circular path is given by r = mv/BQ = p/BQ, where m is mass, v is speed, B is magnetic flux density, Q is charge, and p is momentum.\n+ Larger mass or higher speed → larger radius\n+ Stronger magnetic field or higher charge → tighter radius\n\n- Step 2: The period of orbit is T = 2πm/BQ, which depends only on mass, charge, and magnetic field — not on speed or radius.\n- This independence is why a cyclotron can operate at a fixed alternating frequency: as particles spiral outward and speed up, their time to complete each semicircle remains constant, keeping them in phase with the AC voltage.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "Why must the following be conserved in nuclear decay equations: (a) nucleon number A, (b) proton number Z, (c) lepton number (for beta decay)?", "answer": "- (a) Nucleon number: Total number of protons + neutrons must be conserved because nucleons are neither created nor destroyed (they may rearrange, but the total count stays the same).\n- (b) Proton number: Total charge must be conserved; the element type is determined by Z, so changing Z changes the element.\n- (c) Lepton number: In beta decay, an electron (or positron) and a neutrino (or antineutrino) are emitted. Lepton number must be conserved: electron has lepton number +1, positron has −1; neutrino has +1, antineutrino has −1. Without the neutrino/antineutrino, lepton number would not be conserved — this was the \"missing energy\" puzzle solved by Pauli in 1930.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "Common misconception: \"The nucleus contains stored binding energy.\" Explain why this phrasing is incorrect and how binding energy should be understood.", "answer": "- This is a common misconception. The correct understanding:\n- The binding energy is NOT energy \"stored inside\" the nucleus. Rather, it is the energy you would need to ADD to pull the nucleus apart into its separate nucleons.\n- A bound nucleus is in a LOWER energy state than its separated constituents. When nucleons come together to form a nucleus, energy is released (the binding energy). The \"missing mass\" (mass defect) represents this released energy via E = mc².\n- Think of it like objects falling: when they fall and bind together, they release gravitational potential energy. To separate them, you must put that energy back in.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "Common misconception: \"Half-life depends on temperature.\" Is this true? Explain.", "answer": "- This is FALSE. Half-life is an intrinsic property of a particular radioactive isotope and is unaffected by:\n+ Temperature\n+ Pressure\n+ Chemical state (whether the element is pure metal, in a compound, or ionized)\n+ Amount of sample present\n- The decay constant λ is determined by the internal nuclear physics (the probability of quantum tunneling or weak interaction decay), not by external conditions. This has been experimentally verified across extreme temperature ranges.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "Common misconception: \"Beta-minus decay decreases the proton number.\" Is this true? Explain the correct relationship.", "answer": "- This is FALSE. In beta-minus (β⁻) decay:\n+ A neutron converts to a proton\n+ The proton number Z INCREASES by 1\n+ The nucleon number A remains unchanged\n+ Example: ¹⁴₆C → ¹⁴₇N + β⁻ + ν̄ₑ (carbon-14 becomes nitrogen-14)\n- In beta-plus (β⁺) decay: a proton converts to a neutron, so Z DECREASES by 1.\n- Memory trick: \"Beta minus adds a proton\" (Z increases).", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "In the formula A = λN, what does N represent? If given the mass of a radioactive sample, how would you find N?", "answer": "- N represents the NUMBER of undecayed radioactive nuclei in the sample (not mass, not moles, not activity).\n- To find N from mass:\n  1. Convert mass to moles: n = mass / Mᵣ (molar mass)\n  2. Convert moles to number of nuclei: N = n × Nₐ (Avogadro constant, 6.02 × 10²³ mol⁻¹)\n- Common exam error: using mass directly in A = λN — this gives the wrong answer because activity depends on the number of nuclei, not how much they weigh.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "A sample contains 2.4 × 10¹⁸ nuclei of an isotope with λ = 4.0 × 10⁻³ s⁻¹. Calculate (a) the activity in Bq and (b) the half-life. (2 steps)", "answer": "- (a) Activity: A = λN = (4.0 × 10⁻³) × (2.4 × 10¹⁸) = 9.6 × 10¹⁵ Bq\n\n- (b) Half-life: t½ = ln2/λ = 0.693 / (4.0 × 10⁻³) = 173 s ≈ 2.9 minutes\n\n- Answers: (a) 9.6 × 10¹⁵ Bq (b) approximately 173 s", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "A nuclide has a mass defect of Δm = 0.034 u. Calculate the binding energy in MeV.", "answer": "- Step 1: When mass is given in atomic mass units (u), multiply by 931.5 MeV to get energy directly (this conversion includes the c² factor).\n- Step 2: Binding energy = 0.034 × 931.5 ≈ 31.7 MeV\n- Answer: Approximately 31.7 MeV", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "A γ-photon undergoes pair production into an electron-positron pair. What is the minimum photon frequency required? (Use h = 6.63 × 10⁻³⁴ J·s)", "answer": "- Step 1: Minimum energy required = 2mₑc² = 2 × 9.11 × 10⁻³¹ × (3.00 × 10⁸)² = 1.64 × 10⁻¹³ J\n- Step 2: Frequency = E/h = 1.64 × 10⁻¹³ / 6.63 × 10⁻³⁴ ≈ 2.47 × 10²⁰ Hz\n- Answer: Approximately 2.5 × 10²⁰ Hz", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "Explain, using the concept of binding energy per nucleon, why iron-56 is often described as the most stable nucleus.", "answer": "- Iron-56 (⁵⁶₂₆Fe) sits at the peak of the binding energy per nucleon curve at approximately 8.8 MeV/nucleon.\n- This means:\n+ Each nucleon in Fe-56 is bound as tightly as possible — there is no configuration with higher binding energy per nucleon.\n+ To split Fe-56 into separate nucleons requires the maximum energy input per nucleon.\n+ Any nuclear reaction moving away from this peak (either fusing lighter elements or fissioning heavier ones) results in products with lower binding energy per nucleon, releasing energy in the process.\n- Thus, Fe-56 represents the \"valley of stability\" in nuclear physics — the most energetically favorable nucleus.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "In the context of nuclear fission, what is a chain reaction? Why must a critical mass be achieved for a self-sustaining chain reaction?", "answer": "- Chain reaction: Each fission event releases 2–3 neutrons. These neutrons can induce further fission in nearby uranium nuclei, releasing more neutrons, and so on — an exponentially growing cascade.\n- Critical mass: The minimum mass of fissile material (e.g., ²³⁵U) required so that, on average, at least one neutron from each fission causes another fission.\n+ Below critical mass: too many neutrons escape without causing fission → reaction dies out.\n+ At critical mass: exactly one neutron from each fission causes another → steady, controlled reaction.\n+ Above critical mass: more than one neutron causes further fission → exponential growth (nuclear explosion).\n- This is why nuclear weapons use highly enriched uranium or plutonium and why reactors carefully control the multiplication factor.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "What are the main components of the Standard Model of particle physics? Briefly describe each category.", "answer": "The Standard Model classifies all known fundamental particles into three categories:\n\n- Fermions (matter particles):\n  + Quarks: up, down, charm, strange, top, bottom (combine to form hadrons)\n  + Leptons: electron, muon, tau, and their neutrinos (do not feel strong force)\n\n- Bosons (force carriers):\n  + Photon: mediates electromagnetic force\n  + W⁺, W⁻, Z⁰: mediate weak nuclear force (responsible for beta decay)\n  + Gluons: mediate strong nuclear force (bind quarks)\n  + Higgs boson: gives particles mass\n\n- Note: Gravity is not included in the Standard Model, and dark matter/energy remain unexplained.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "Describe the proton-proton chain reaction that occurs in the Sun. What is the overall energy release?", "answer": "- The proton-proton chain is the dominant fusion pathway in the Sun:\n  ⁱ₁H + ⁱ₁H → ²₁H + e⁺ + νₑ (two protons fuse, one becomes a neutron, emitting a positron and neutrino)\n  ⁱ₁H + ²₁H → ³₂He + γ\n  ³₂He + ³₂He → ⁴₂He + 2 ⁱ₁H\n- Net reaction: 4 ⁱ₁H → ⁴₂He + 2e⁺ + 2νₑ + energy\n- The energy released per cycle is approximately 26.7 MeV, most of which becomes sunlight.\n- This is how the Sun (and all stars) generate energy — by converting hydrogen into helium, climbing the binding energy curve.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "In nuclear decay equations, gamma (γ) emission is often shown as: ᴬᶻX* → ᴬᶻX + γ. What does the asterisk (*) represent, and why does gamma emission not change A or Z?", "answer": "- The asterisk (*) represents an excited nucleus — a nucleus that has excess energy (typically after alpha or beta decay) but the same proton and neutron configuration.\n- When the nucleus transitions to a lower energy state (ground state), it releases this excess energy as a gamma-ray photon.\n- Since gamma radiation is an electromagnetic wave (photon) with no mass and no charge, it does not affect the nucleon number A or proton number Z — only the energy state of the nucleus changes.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "A Geiger counter placed near a radioactive source registers 450 counts per minute. With no source present, it registers 30 counts per minute. What is the corrected count rate from the source alone?", "answer": "- Background count rate must be subtracted: corrected count rate = measured − background\n- Corrected rate = 450 − 30 = 420 counts per minute\n- Answer: 420 counts per minute\n\n[This corrected value should be used for all subsequent half-life calculations. Using the uncorrected value would overestimate the activity.]", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "Why is it incorrect to say \"the isotope polonium-210 gives off alpha radiation because it has too many neutrons\"? What determines the type of radiation an isotope emits?", "answer": "- The type of radiation emitted is NOT determined by simple counts of protons or neutrons, but by the nuclear stability and the specific decay pathway that leads to a more stable configuration.\n- Polonium-210 (⁸⁴²₁₀Po) undergoes alpha decay because:\n+ It is extremely heavy (A = 210) and beyond the \"valley of stability\"\n+ Alpha emission reduces both A and Z, moving the nucleus toward more stable, lower-mass nuclei\n+ This is a quantum tunneling process with a specific probability (decay constant)\n- You cannot change or \"tune\" which radiation type an isotope emits — the isotope dictates its decay mode. You can only choose which isotope to use.\n- The misconception that \"too many neutrons\" causes alpha decay is wrong — alpha decay actually reduces the neutron-to-proton ratio by removing 2 neutrons and 2 protons.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": true}, {"question": "A radioactive sample's activity decreases from 640 Bq to 20 Bq over a period of time. If the half-life is 25 minutes, how much time has passed? Use the magic table method.", "answer": "- Step 1: Start at 640 Bq (0 half-lives, 0 minutes)\n- Step 2: Divide by 2 each half-life:\n  + 1 half-life (25 min): 320 Bq\n  + 2 half-lives (50 min): 160 Bq\n  + 3 half-lives (75 min): 80 Bq\n  + 4 half-lives (100 min): 40 Bq\n  + 5 half-lives (125 min): 20 Bq\n- Answer: 125 minutes (or 2 hours 5 minutes)", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}], "count": 40}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "In the Rutherford scattering experiment, alpha particles were fired at thin gold foil. Most passed straight through, but a few deflected at large angles. What does this tell us about the structure of the atom? (3 steps)", "answer": "- Step 1: The observation that most alpha particles pass straight through undeflected tells us the atom is mostly empty space — the positive charge and mass are not spread throughout the atom\n- Step 2: The small-angle deflections indicate there is a concentrated positive charge in the atom that repels the positively charged alpha particles\n- Step 3: The tiny fraction that bounce back at angles > 90° tells us the positive charge and mass are concentrated in an extremely small, dense nucleus at the centre\n\nThis led to the nuclear model of the atom: a tiny, dense, positively charged nucleus surrounded by orbiting electrons.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "State the three principal types of nuclear radiation in order from most penetrating to least penetrating.", "answer": "The order from most to least penetrating is:\n1. **Gamma (γ)** — high-energy electromagnetic radiation; stopped by several cm of lead or metres of concrete\n2. **Beta (β)** — fast-moving electrons (or positrons); stopped by a few mm of aluminium  \n3. **Alpha (α)** — helium nuclei; stopped by paper or skin\n\nNote the inverse relationship with ionising power: alpha is the most ionising but least penetrating; gamma is the least ionising but most penetrating.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "Why does an alpha particle have much higher ionising power than a beta particle or gamma ray?", "answer": "- Step 1: Consider the charge and mass of each radiation type\n  - Alpha: charge +2e, mass ≈ 4u (two protons + two neutrons)\n  - Beta: charge −1e, mass ≈ 0 (electron)\n  - Gamma: charge 0, mass 0 (photon)\n- Step 2: Explain the interaction with atoms\n  - Alpha carries the largest positive charge, so it strongly attracts negative electrons from atoms it passes\n  - Its large mass means it moves more slowly, giving it more time to collide with and ionise atoms\n  - Beta, being smaller and faster, ionises less frequently\n  - Gamma, being neutral, interacts weakly and ionises least\n- Step 3: The result\n  - Alpha creates dense trails of ionisation but doesn't travel far\n  - Gamma creates sparse ionisation but penetrates deeply\n\nThe ionising power is roughly: α > β > γ", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "In beta-minus (β⁻) decay, an electron is emitted from the nucleus. But the nucleus contains only protons and neutrons — where does this electron come from? (3 steps)", "answer": "- Step 1: Recognize the apparent paradox\n  - Electrons do not exist inside the nucleus as permanent residents\n- Step 2: Understand what actually happens at the quark level\n  - A neutron (udd) converts into a proton (uud) plus an electron and an antineutrino\n  - This is a weak force interaction: one of the down quarks in the neutron changes to an up quark\n- Step 3: Write the conversion\n  $$^1_0n → ^1_1p + ^0_{-1}β + \\bar{\\nu}_e$$\n  - Charge is conserved: 0 → +1 + (−1) + 0\n  - Nucleon number is conserved: 1 → 1 + 0 + 0\n  - Lepton number is conserved: 0 → 0 + 1 + (−1)\n\nBeta-plus decay is the reverse: a proton converts to a neutron, emitting a positron and neutrino.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "Complete this alpha decay equation: $$^{238}_{92}U → ? + ^4_2α$$", "answer": "- Step 1: Apply conservation of nucleon number (A)\n  - Initial A = 238\n  - Alpha contributes A = 4\n  - So daughter nucleus must have A = 238 − 4 = 234\n- Step 2: Apply conservation of proton number (Z)\n  - Initial Z = 92\n  - Alpha contributes Z = 2\n  - So daughter nucleus must have Z = 92 − 2 = 90\n- Step 3: Identify the element\n  - Z = 90 corresponds to thorium (Th)\n- Final answer: $$^{238}_{92}U → ^{234}_{90}Th + ^4_2α$$", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "Write the full beta-minus decay equation for carbon-14, and explain why the antineutrino must be included.", "answer": "- Step 1: Write the basic equation (without neutrino)\n  $$^{14}_6C → ^{14}_7N + ^0_{-1}β$$\n- Step 2: Add the antineutrino to conserve lepton number\n  $$^{14}_6C → ^{14}_7N + ^0_{-1}β + \\bar{\\nu}_e$$\n- Step 3: Verify all conservation laws\n  - Nucleon number: 14 → 14 + 0 + 0 ✓\n  - Proton number (charge): 6 → 7 + (−1) + 0 ✓\n  - Lepton number: 0 → 0 + 1 + (−1) = 0 ✓\n\nWithout the antineutrino, lepton number would not be conserved. This was historically the \"missing energy\" problem that led to Wolfgang Paul's prediction of the neutrino.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "What is background radiation, and why must it be subtracted when measuring the activity of a radioactive source?", "answer": "- Step 1: Define background radiation\n  - Low-level radiation always present in the environment from natural sources: cosmic rays, radon gas from rocks, radioactive isotopes in food (e.g., potassium-40 in bananas, carbon-14), and man-made sources (medical X-rays, nuclear fallout)\n- Step 2: Explain why it interferes with measurements\n  - A Geiger counter will register counts even with NO radioactive source present\n  - This background count adds to your measurement of the source\n- Step 3: Explain the correction\n  - Measured count rate = source counts + background counts\n  - True source activity = measured activity − background activity\n  - If you forget to subtract, your half-life calculations will be wrong (apparent half-life too long)\n\nThis is a classic exam trap — always subtract background radiation.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": true}, {"question": "Define radioactive decay constant (λ) and activity (A), and explain the relationship between them.", "answer": "- Step 1: Define decay constant λ\n  - The probability per unit time that any given nucleus will decay\n  - Units: s⁻¹\n  - Different for each radioactive isotope\n- Step 2: Define activity A\n  - The number of decays per second in a sample\n  - Measured in becquerel (Bq), where 1 Bq = 1 decay per second\n- Step 3: State the relationship\n  $$A = λN$$\n  - Where N is the number of undecayed nuclei remaining\n  - Activity is proportional to the number of nuclei present\n\nAs nuclei decay, N decreases, so activity decreases over time.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "A sample initially contains $N_0$ radioactive nuclei. Write the equation that gives the number remaining after time $t$, and explain why this leads to exponential decay. (3 steps)", "answer": "- Step 1: Start with the differential equation\n  $$\\frac{dN}{dt} = -λN$$\n  - The rate of decay is proportional to the number of nuclei present\n- Step 2: Integrate to find N(t)\n  - Separating variables: $\\frac{dN}{N} = -λ\\,dt$\n  - Integrating: $\\ln N = -λt + \\text{constant}$\n  - At t = 0, N = N₀, so constant = ln N₀\n  - Therefore: $\\ln N = \\ln N_0 - λt$\n- Step 3: Write the exponential form\n  $$N = N_0 e^{-λt}$$\n  - This is exponential decay because the rate itself decreases as N decreases\n  - Activity follows the same law: $A = A_0 e^{-λt}$\n\nThe same proportional decrease occurs in any time interval — this is why the decay curve is exponential.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "What is half-life ($t_{1/2}$), and derive the relationship between half-life and the decay constant λ. (3 steps)", "answer": "- Step 1: Define half-life\n  - The time taken for the number of radioactive nuclei (or activity) to fall to half its initial value\n- Step 2: Set up the condition\n  - When t = $t_{1/2}$, we have N = N₀/2\n  - Using N = N₀e⁻λt:  N₀/2 = N₀e^{-λt_{1/2}}\n- Step 3: Solve for t₁/₂\n  - 1/2 = e^{-λt_{1/2}}\n  - Taking ln both sides: ln(1/2) = −λt₁/₂\n  - −0.693 = −λt₁/₂\n  - Therefore: $t_{1/2} = \\frac{\\ln 2}{λ} = \\frac{0.693}{λ}$\n\nKey insight: Half-life is intrinsic to each isotope — it does NOT depend on temperature, pressure, or chemical state.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "A radioactive source has half-life 20 minutes and initial activity 800 Bq. Calculate the activity after 1 hour, showing your reasoning.", "answer": "- Step 1: Convert time to number of half-lives\n  - 1 hour = 60 minutes\n  - Half-life = 20 minutes\n  - Number of half-lives: n = 60/20 = 3\n- Step 2: Apply the half-life formula\n  - After n half-lives: $A = A_0 \\left(\\frac{1}{2}\\right)^n$\n  - A = 800 × (1/2)³\n- Step 3: Calculate\n  - (1/2)³ = 1/8\n  - A = 800 × 1/8 = 100 Bq\n\nAlternatively, using the \"magic table\" method: after 3 half-lives, activity goes 800 → 400 → 200 → 100 Bq.\n\nAnswer: 100 Bq", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "What is mass defect, and how does it relate to binding energy? (3 steps)", "answer": "- Step 1: Define mass defect\n  - The difference between the sum of masses of the individual nucleons (separated) and the actual mass of the bound nucleus\n  - Δm = [Zmₚ + (A−Z)mₙ] − m_nucleus\n- Step 2: Explain why mass is \"missing\"\n  - When nucleons bind together to form a nucleus, they release energy (the binding energy)\n  - By Einstein's E = mc², this energy has mass\n  - The bound nucleus has less energy (is more stable) than its separated nucleons, hence less mass\n- Step 3: Define binding energy\n  - The energy required to completely separate a nucleus into its individual protons and neutrons\n  - Or equivalently, the energy released when nucleons come together to form the nucleus\n  - $$ΔE = Δm \\cdot c^2$$\n\nA common misconception: binding energy is NOT \"energy stored inside\" the nucleus — it is the energy you would need to ADD to break it apart.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "A certain nucleus has a mass defect of 0.035 u. Calculate its binding energy in MeV.", "answer": "- Step 1: Recall the conversion factor\n  - 1 atomic mass unit (u) = 931.5 MeV/c²\n  - When mass is in u, multiply by 931.5 to get energy in MeV\n- Step 2: Calculate\n  - Binding energy = Δm × 931.5\n  - = 0.035 × 931.5\n  - = 32.6 MeV (to 3 s.f.)\n\nNote: You don't need to multiply by c² again — the 931.5 factor already incorporates c² when working in atomic mass units.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "Sketch the binding energy per nucleon curve, labelling the key features and explaining what it tells us about nuclear stability. (3 steps)", "answer": "- Step 1: Describe the shape of the curve\n  - X-axis: nucleon number A (from 1 to ~250)\n  - Y-axis: binding energy per nucleon (MeV/nucleon)\n  - Curve rises steeply from hydrogen (≈0) to helium-4 (≈7 MeV)\n  - Continues climbing more gently to a peak near iron-56 (≈8.8 MeV/nucleon)\n  - Slowly declines for heavier nuclei\n- Step 2: Interpret what the peak means\n  - Iron-56 is the most stable nucleus\n  - Nuclei near iron have the highest binding energy per nucleon\n  - Moving toward iron = more stable = energy released\n- Step 3: Explain the significance\n  - Light nuclei (left of peak) have low BE/nucleon — fusing them moves right toward iron, releasing energy\n  - Heavy nuclei (right of peak) have lower BE/nucleon — splitting them moves left toward iron, releasing energy\n  - This explains why BOTH fission and fusion release energy", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "Using the binding energy per nucleon curve, explain why nuclear fission of uranium releases energy.", "answer": "- Step 1: Locate uranium on the curve\n  - Uranium-235 has BE/nucleon ≈ 7.6 MeV (far right of the peak)\n- Step 2: Consider the products of fission\n  - Typical fission products (e.g., Ba-141, Kr-92) are medium-mass nuclei\n  - These have BE/nucleon ≈ 8.3–8.5 MeV\n- Step 3: Calculate the energy change\n  - Products have HIGHER binding energy per nucleon than uranium\n  - The difference per nucleon × number of nucleons = energy released\n  - Approximately 200 MeV per fission\n- Step 4: Why energy is released\n  - The system moves to a more stable configuration (higher on the curve)\n  - The mass of products is less than the mass of reactants — the \"missing\" mass becomes energy via E = mc²\n\nFission releases energy because you're moving UP the binding energy curve toward the peak at iron.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "Why does nuclear fusion require extremely high temperatures (like those in the Sun)?", "answer": "- Step 1: Understand the problem\n  - Fusion involves bringing two positively charged nuclei close together\n  - Like charges repel (Coulomb repulsion)\n  - For fusion, nuclei must get within about 10⁻¹⁵ m (range of strong nuclear force)\n- Step 2: What high temperature provides\n  - Temperature is a measure of average kinetic energy\n  - At very high temperatures (≥10⁷ K), nuclei have enormous kinetic energies\n  - This allows them to overcome the Coulomb barrier\n- Step 3: The strong force takes over\n  - Once nuclei get close enough, the strong nuclear force (attractive) overwhelms electrostatic repulsion\n  - The nuclei bind together, releasing energy\n- Step 4: Why it's hard on Earth\n  - Containing plasma at 10⁷ K is extremely difficult\n  - This is why fusion reactors (like ITER) are challenging to build", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": true}, {"question": "Write the equation for the deuterium-tritium fusion reaction, and calculate the energy released given the mass difference is about 0.019 u.", "answer": "- Step 1: Write the reaction\n  $$^2_1H + ^3_1H → ^4_2He + ^1_0n + 17.6 \\text{ MeV}$$\n- Step 2: Calculate energy from mass defect\n  - Energy = Δm × 931.5 MeV\n  - = 0.019 × 931.5\n  - ≈ 17.7 MeV\n- Step 3: Interpret the result\n  - The 17.6 MeV (experimental value) matches well\n  - This is the energy released per fusion reaction\n  - Compare to fission (~200 MeV) — but fusion releases more energy per unit mass of fuel\n\nFusion releases enormous energy because light nuclei on the left of the BE/nucleon curve move to the right (higher BE/nucleon).", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "What is annihilation, and what is the minimum energy a photon must have to undergo pair production? (3 steps)", "answer": "- Step 1: Define annihilation\n  - When a particle meets its antiparticle, both are destroyed\n  - Their rest-mass energy is released as photons\n  - Example: electron + positron → two gamma-ray photons\n- Step 2: Calculate the energy released\n  - E = 2m_e c² (two particles of mass m_e)\n  - = 2 × 511 keV = 1.022 MeV\n  - The two photons share this energy (typically equal, back-to-back for momentum conservation)\n- Step 3: Define pair production (reverse process)\n  - A photon converts into a particle-antiparticle pair\n  - Minimum photon energy = 2mc² (for electron-positron: 1.022 MeV)\n  - Must occur near a nucleus to conserve momentum\n\nThe factor of 2 is crucial — you need enough energy to create BOTH particles.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "A gamma-ray photon has energy 2.5 MeV. Can it undergo pair production to create an electron-positron pair? Explain your answer.", "answer": "- Step 1: Recall the threshold energy\n  - For electron-positron pair production: E_min = 2m_e c² = 1.022 MeV\n- Step 2: Compare the given energy\n  - Photon energy = 2.5 MeV > 1.022 MeV\n- Step 3: Determine if it's possible\n  - Yes, pair production CAN occur\n  - The excess energy (2.5 − 1.022 = 1.478 MeV) becomes kinetic energy of the electron and positron\n  - However, pair production also requires a nucleus nearby to conserve momentum", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "In a cyclotron, how does the radius of a particle's path relate to its momentum, mass, charge, and the magnetic field strength? (3 steps)", "answer": "- Step 1: State the formula\n  - For a charged particle moving perpendicular to a uniform magnetic field:\n  $$r = \\frac{mv}{BQ} = \\frac{p}{BQ}$$\n  - Where: r = radius, m = mass, v = speed, p = momentum, B = magnetic field strength, Q = charge\n- Step 2: Interpret what affects what\n  - Larger momentum → larger radius (swings wider)\n  - Stronger magnetic field → smaller radius (tighter curve)\n  - Larger charge → smaller radius\n- Step 3: Key property of cyclotrons\n  - The orbital period T = 2πm/BQ is independent of speed\n  - This is why cyclotrons can use a single fixed frequency alternating voltage\n  - Heavier particles or faster particles sweep larger arcs", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "State the quark composition of a proton and a neutron, and verify the total charge in each case.", "answer": "- Step 1: State the quark compositions\n  - Proton (p): uud (two up quarks, one down quark)\n  - Neutron (n): udd (one up quark, two down quarks)\n- Step 2: Use quark charges\n  - Up quark (u): +2/3 e\n  - Down quark (d): −1/3 e\n- Step 3: Calculate total charge\n  - Proton: +2/3 + +2/3 + (−1/3) = +3/3 = +1 e ✓\n  - Neutron: +2/3 + (−1/3) + (−1/3) = 0/3 = 0 e ✓\n\nThese are the lightest baryons. All other baryons contain different combinations of up, down, strange, charm, bottom, and top quarks.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "What is the difference between nuclear fission and nuclear fusion? Give one example of each.", "answer": "- Step 1: Define each process\n  - **Fission**: A heavy nucleus splits into two lighter nuclei (plus neutrons and energy)\n  - **Fusion**: Two light nuclei combine to form a heavier nucleus (plus energy)\n- Step 2: Give examples\n  - Fission: $$^{235}_{92}U + ^1_0n → ^{141}_{56}Ba + ^{92}_{36}Kr + 3^1_0n + \\text{energy}$$\n  - Fusion: $$^2_1H + ^3_1H → ^4_2He + ^1_0n + 17.6 \\text{ MeV}$$\n- Step 3: Compare energy release\n  - Both release energy by moving toward iron-56 on the BE/nucleon curve\n  - Fission: heavy → medium (right to middle)\n  - Fusion: light → heavier (far left toward middle)", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "In a nuclear fission reactor, what is the role of (a) the moderator, and (b) the control rods?", "answer": "- Step 1: Define each component\n  - **(a) Moderator**: Usually graphite or water; slows down fast neutrons from fission to \"thermal\" (slow) neutrons\n  - **(b) Control rods**: Made of neutron-absorbing material like boron or cadmium; inserted between fuel rods\n- Step 2: Explain why each is needed\n  - Slow neutrons are more likely to cause fission in U-235 (higher cross-section)\n  - The moderator ensures enough neutrons cause further fission to sustain the chain reaction\n  - Control rods absorb excess neutrons to keep the reaction exactly critical (multiplication factor = 1)\n- Step 3: What happens if not controlled?\n  - Too few neutrons absorbed → supercritical → runaway reaction (nuclear bomb/explosion)\n  - Too many absorbed → subcritical → reaction dies out", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "Why is carbon-14 useful for dating organic materials up to about 50,000 years old? (3 steps)", "answer": "- Step 1: Explain the carbon dating principle\n  - Living organisms maintain a constant ratio of C-14 to C-12 (through metabolism)\n  - When the organism dies, it stops taking in carbon\n  - C-14 decays with half-life 5,730 years; C-12 is stable\n- Step 2: How dating works\n  - Measure the ratio of C-14 to C-12 in the sample\n  - Calculate how many half-lives have passed\n  - Convert to time using t = n × t₁/₂\n- Step 3: Why the limit?\n  - After ~50,000 years (about 9 half-lives), too little C-14 remains to measure accurately\n  - Other radiometric methods (e.g., uranium-lead) are used for older samples", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "A sample initially contains $5.0 \\times 10^{12}$ nuclei of an isotope with half-life 3.0 days. How many nuclei remain after 9 days? Use the \"magic table\" method. (3 steps)", "answer": "- Step 1: Calculate number of half-lives\n  - Half-life = 3.0 days\n  - Total time = 9 days\n  - Number of half-lives: n = 9/3 = 3\n- Step 2: Build the magic table\n  | Half-lives | Time (days) | Number of nuclei |\n  |------------|-------------|------------------|\n  | 0 | 0 | 5.0 × 10¹² |\n  | 1 | 3 | 2.5 × 10¹² |\n  | 2 | 6 | 1.25 × 10¹² |\n  | 3 | 9 | 6.25 × 10¹¹ |\n- Step 3: Read the answer\n  - After 9 days (3 half-lives): 6.25 × 10¹¹ nuclei\n\nOr using formula: N = N₀ × (1/2)³ = 5.0 × 10¹² × 1/8 = 6.25 × 10¹¹", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "Why can't we use the formula $A = λN$ with the mass of a radioactive sample instead of the number of nuclei? What must we do if given mass?", "answer": "- Step 1: Identify the problem\n  - Activity A = λN, where N is the NUMBER of nuclei\n  - Mass (in kg or g) is NOT the number of nuclei\n- Step 2: Explain what you must do\n  - Convert mass to number of nuclei using molar mass and Avogadro's constant\n  - N = (mass / Mᵣ) × N_A\n  - Where Mᵣ is the relative atomic/molecular mass, N_A = 6.02 × 10²³ mol⁻¹\n- Step 3: Common exam trap\n  - Students often try to use mass directly in A = λN and get the wrong answer\n  - Example: 1 g of carbon-14 is NOT the same number of atoms as 1 g of uranium-235", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": true}, {"question": "In the decay chain of uranium-238, the nucleus undergoes multiple alpha and beta decays until it becomes stable lead-206. Why does the sequence alternate between alpha and beta decay?", "answer": "- Step 1: Understand what each decay does\n  - Alpha decay: reduces Z by 2, reduces A by 4\n  - Beta-minus decay: increases Z by 1, A unchanged\n- Step 2: Track the progression\n  - Start: U-238 (Z = 92)\n  - After α: Th-234 (Z = 90)\n  - After β⁻: Pa-234 (Z = 91)\n  - After β⁻: U-234 (Z = 92)\n  - After α: Th-230 (Z = 90)\n- Step 3: Why the pattern?\n  - Alpha reduces Z by 2 (moving left on periodic table)\n  - Beta increases Z by 1 (moving right by 1)\n  - The nucleus oscillates toward stability — each decay moves the nucleus closer to the band of stability\n  - The chain continues until a stable nucleus (Pb-206) is reached", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "What is pair production, and why must it occur near a nucleus rather than in empty space?", "answer": "- Step 1: Define pair production\n  - A high-energy photon converts into a particle-antiparticle pair (e.g., e⁻ and e⁺)\n  - Requires minimum photon energy E ≥ 2mc²\n- Step 2: Explain the nucleus requirement\n  - Conservation of momentum would be violated if a single photon converted to two massive particles in empty space\n  - A single photon has momentum p = E/c\n  - Two particles at rest have zero total momentum\n  - The nucleus absorbs excess momentum, allowing conservation\n- Step 3: Energy threshold\n  - For electron-positron: E_min = 2 × 511 keV = 1.022 MeV\n  - For proton-antiproton: much higher (~2 GeV)", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": true}, {"question": "Explain why a sample of polonium-214 (half-life 0.16 ms) is dangerous to handle even though it decays completely in a fraction of a second, while uranium-238 (half-life 4.5 billion years) can be handled relatively safely.", "answer": "- Step 1: Consider the activity implications\n  - Activity A = λN = (0.693/t₁/₂) × N\n  - Very short half-life → very large decay constant λ\n  - Even a small number of atoms produces enormous activity\n- Step 2: Apply to polonium-214\n  - t₁/₂ = 0.16 ms = 1.6 × 10⁻⁴ s\n  - λ ≈ 0.693 / 1.6 × 10⁻⁴ ≈ 4,300 s⁻¹\n  - Even 10⁶ atoms give A ≈ 4.3 × 10⁹ Bq — intense radiation source\n- Step 3: Apply to uranium-238\n  - t₁/₂ = 4.5 × 10⁹ years → λ is tiny\n  - Activity per gram is low despite long half-life\n  - The low decay rate means less radiation at any moment\n\nShort half-life = high activity = more dangerous (unless you can remove the source quickly)", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "In the expression $r = mv/BQ$, what happens to the radius if you (a) double the magnetic field strength, or (b) double the kinetic energy of the particle? (2 steps)", "answer": "- Step 1: Consider magnetic field change\n  - r ∝ 1/B\n  - If B doubles, r halves\n  - Stronger field squeezes the particle into a tighter arc\n- Step 2: Consider kinetic energy change\n  - Kinetic energy KE = ½mv², so v ∝ √(KE)\n  - r = mv/BQ ∝ m√(KE)/BQ\n  - If KE doubles, v increases by √2, so r increases by √2 (not doubles)\n  - More kinetic energy → wider arc, but not linearly", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "A photon with wavelength 0.50 nm strikes a metal surface and ejects an electron. Use the photoelectric equation to explain whether electron emission occurs, given the work function of the metal is 2.0 eV. (3 steps)", "answer": "- Step 1: Calculate photon energy\n  - E = hc/λ\n  - h = 6.63 × 10⁻³⁴ J·s, c = 3.00 × 10⁸ m/s, λ = 0.50 × 10⁻⁹ m\n  - E = (6.63 × 10⁻³⁴ × 3.00 × 10⁸) / (5.0 × 10⁻¹⁰)\n  - E = 3.98 × 10⁻¹⁶ J\n- Step 2: Convert to eV\n  - 1 eV = 1.60 × 10⁻¹⁹ J\n  - E = 3.98 × 10⁻¹⁶ / 1.60 × 10⁻¹⁹ = 2,490 eV = 2.49 keV\n- Step 3: Compare to work function\n  - Photon energy (2,490 eV) > work function (2.0 eV)\n  - Yes, electrons will be emitted\n  - Excess energy becomes electron kinetic energy: KE = E − φ ≈ 2,488 eV", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "What is the Standard Model classification for (a) a proton, (b) an electron, (c) a neutron, and (d) a neutrino?", "answer": "- Step 1: Classify by category\n  - **(a) Proton**: Hadron → Baryon (made of 3 quarks: uud)\n  - **(b) Electron**: Lepton (fundamental, no substructure)\n  - **(c) Neutron**: Hadron → Baryon (made of 3 quarks: udd)\n  - **(d) Neutrino**: Lepton (fundamental, neutral)\n- Step 2: List the fundamental forces each experiences\n  - Hadrons: strong, electromagnetic, weak, gravitational\n  - Leptons: electromagnetic, weak, gravitational (no strong force)\n- Step 3: Key distinction\n  - Hadrons feel the strong nuclear force; leptons do not\n  - Quarks combine to form hadrons; leptons are elementary particles", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "In thermionic emission, electrons escape from a heated metal surface. If electrons are accelerated through a potential difference of 5.0 kV, calculate their final speed (non-relativistic). Is this approximation valid? (3 steps)", "answer": "- Step 1: Use energy conservation\n  - Kinetic energy gained = work done by electric field\n  - ½m_e v² = eV\n- Step 2: Solve for v\n  - v = √(2eV/m_e)\n  - v = √(2 × 1.60 × 10⁻¹⁹ × 5000 / 9.11 × 10⁻³¹)\n  - v = √(1.756 × 10¹⁵) = 4.19 × 10⁷ m/s\n- Step 3: Check the approximation\n  - Compare to speed of light: v/c = 4.19 × 10⁷ / 3.00 × 10⁸ = 0.14 = 14%\n  - Above ~10% of c, relativistic effects become significant\n  - Classical formula underestimates the true speed slightly; relativistic correction would give v ≈ 4.27 × 10⁷ m/s\n  - For this problem, the non-relativistic answer is acceptable but near the limit", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "Two samples contain the same number of radioactive nuclei but different isotopes. Sample A has half-life 2.0 hours; Sample B has half-life 8.0 hours. After 8 hours, how do their activities compare? (3 steps)", "answer": "- Step 1: Calculate number of half-lives for each\n  - Sample A: 8 hours / 2.0 hours = 4 half-lives\n  - Sample B: 8 hours / 8.0 hours = 1 half-life\n- Step 2: Calculate activity ratio\n  - For A: A_A = A₀ × (1/2)⁴ = A₀/16\n  - For B: A_B = A₀ × (1/2)¹ = A₀/2\n- Step 3: Compare\n  - A_A / A_B = (A₀/16) / (A₀/2) = 2/16 = 1/8\n  - After 8 hours, Sample A has activity 1/8 that of Sample B\n  - The shorter half-life isotope has decayed more extensively", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "Why is the binding energy per nucleon a better measure of nuclear stability than total binding energy?", "answer": "- Step 1: Consider total binding energy\n  - Heavier nuclei have more nucleons, so total binding energy is always larger\n  - U-235 has more total binding energy than He-4, but U-235 is LESS stable\n- Step 2: Consider per-nucleon\n  - Binding energy per nucleon = total binding energy / A\n  - This normalises for the number of nucleons\n  - Directly measures how tightly each nucleon is held on average\n- Step 3: Why it matters for stability\n  - Higher BE/nucleon = more stable\n  - Iron-56 has the maximum (~8.8 MeV/nucleon) — most stable nucleus\n  - Both fission and fusion move toward this peak\n\nTotal binding energy misleads you; per-nucleon tells you the actual stability.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "A gamma ray photon undergoes Compton scattering off a stationary electron, scattering at 60°. If the initial photon wavelength was 0.50 pm, what is the wavelength of the scattered photon? (3 steps)", "answer": "- Step 1: Use the Compton scattering formula\n  - Δλ = λ' − λ = (h/m_ec)(1 − cos θ)\n  - Where h/m_ec = Compton wavelength of electron = 2.43 × 10⁻¹² m\n- Step 2: Calculate the change\n  - θ = 60°, so 1 − cos 60° = 1 − 0.5 = 0.5\n  - Δλ = 2.43 × 10⁻¹² × 0.5 = 1.215 × 10⁻¹² m = 1.215 pm\n- Step 3: Find scattered wavelength\n  - λ' = λ + Δλ = 0.50 pm + 1.215 pm = 1.715 pm\n\nThe photon loses energy (wavelength increases) and the electron gains momentum.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "In beta-plus (β⁺) decay, a proton converts to a neutron. How is this possible given that a proton is lighter than a neutron?", "answer": "- Step 1: Compare rest masses\n  - Proton: 938.3 MeV/c²\n  - Neutron: 939.6 MeV/c²\n  - Neutron is heavier by 1.3 MeV/c²\n- Step 2: Explain why β⁺ can still occur\n  - The decay requires energy input: p → n + e⁺ + ν_e\n  - This only happens in proton-rich nuclei where the mass of the parent nucleus is greater than the daughter\n  - The nuclear binding energy difference provides the extra mass needed\n  - Free protons do NOT undergo β⁺ decay (it's energetically forbidden)\n- Step 3: Example\n  - Carbon-11: $^{11}_6C → ^{11}_5B + e⁺ + ν_e + 1.98 MeV\n  - The mass of C-11 exceeds B-11 by about 2 MeV, making the decay possible", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "Explain why electron capture (where a nucleus captures an orbital electron) is considered an alternative to beta-plus decay.", "answer": "- Step 1: Define electron capture\n  - A proton in the nucleus captures an inner-shell electron\n  - p + e⁻ → n + ν_e\n- Step 2: Compare to β⁺ decay\n  - Both convert a proton to a neutron\n  - Both emit a neutrino\n  - Both reduce Z by 1, keep A the same\n- Step 3: When it occurs\n  - Electron capture competes with β⁺ when the energy available is insufficient\n  - It occurs in proton-rich nuclei where β⁺ is marginal\n  - Example: Iron-55 captures an electron to become manganese-55\n  - The daughter nucleus is often left in an excited state, releasing gamma rays", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "Why do some heavy elements (like uranium) have half-lives of billions of years while others (like polonium) have half-lives of microseconds? What determines the decay constant? (3 steps)", "answer": "- Step 1: Understand what affects stability\n  - The balance between strong nuclear force (attractive) and electrostatic repulsion (between protons)\n  - Too many protons → unstable → decay\n- Step 2: How this affects half-life\n  - Very heavy nuclei (many protons) are inherently unstable\n  - But the \"pathway\" to decay can be easy or hard\n  - If the energy barrier is low, decay happens quickly (short t₁/₂)\n  - If the barrier is high, decay is slow (long t₁/₂)\n- Step 3: The quantum tunneling effect\n  - Alpha decay involves tunneling through a potential barrier\n  - The probability depends on barrier height/width\n  - Small changes in Q-value or barrier properties cause enormous changes in half-life\n  - Polonium-212 (Q ≈ 9 MeV): t₁/₂ = 0.3 μs\n  - Uranium-238 (Q ≈ 4.2 MeV): t₁/₂ = 4.5 × 10⁹ years\n  - The exact half-life depends on detailed nuclear structure, not just proton/neutron count", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}, {"question": "A Geiger counter records 450 counts per minute near a radioactive source. The background count rate is 30 counts per minute. What is the corrected count rate, and after 3 half-lives what would the corrected count rate be if the initial activity was 800 Bq? (2 steps)", "answer": "- Step 1: Correct for background\n  - Corrected count rate = measured − background\n  - = 450 − 30 = 420 counts per minute\n- Step 2: Calculate after 3 half-lives\n  - Using A = A₀ × (1/2)³ = 800 × 1/8 = 100 Bq\n  - The corrected initial count rate was 420 cpm (if 1 Bq ≈ 1 cpm for this setup)\n  - After 3 half-lives: 420 × (1/2)³ = 420 × 1/8 = 52.5 cpm\n\nNote: The conversion between Bq and counts per minute depends on detector efficiency.", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "Explain what is meant by \"radioactive decay is a random process\" and why we can still make precise predictions about large samples.", "answer": "- Step 1: Random at the individual level\n  - For any single nucleus, you cannot predict WHEN it will decay\n  - Each nucleus has the same probability λ of decaying in any small time interval\n  - The decay time for any individual nucleus is completely unpredictable\n- Step 2: Predictable for large numbers\n  - With billions of atoms, statistical regularities emerge\n  - The fraction decaying in a given time approaches a predictable value\n  - This is the law of large numbers\n- Step 3: The analogy\n  - Flipping one coin: random (heads or tails)\n  - Flipping 10 million coins: almost exactly 50% heads (predictable!)\n  - Radioactive decay is similar — individual randomness, collective predictability\n\nThis is why half-life works: we can't predict individual atoms, but we know exactly what half the sample will do.", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": false}, {"question": "In the nuclear notation, what do the asterisk ($^*$) represent in a decay equation like $^{60}_{27}Co^* → ^{60}_{27}Co + γ$?", "answer": "- Step 1: Understand the notation\n  - The asterisk indicates an excited nuclear state\n  - The nucleus has excess energy (like an electron in an excited atomic state)\n- Step 2: What happens in gamma decay\n  - The excited nucleus transitions to a lower energy state\n  - The excess energy is emitted as a gamma ray photon\n  - No change in A or Z (same nucleus, just lower energy)\n- Step 3: Why it matters\n  - Many nuclear reactions leave the nucleus in an excited state\n  - Gamma emission is how the nucleus \"relaxes\"\n  - This is why fission products often emit gamma rays", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "A particle accelerator uses a potential difference of 50 kV to accelerate alpha particles (charge +2e). What is the kinetic energy gained, and how does this compare to accelerating electrons through the same voltage? (2 steps)", "answer": "- Step 1: Calculate for alpha particles\n  - KE = QV = (2e) × V = 2e × 50,000 V\n  - = 100,000 eV = 100 keV\n  - In joules: 100,000 × 1.60 × 10⁻¹⁹ = 1.60 × 10⁻¹⁴ J\n- Step 2: Compare to electrons\n  - For electron: KE = eV = 50 keV\n  - The alpha particle gains TWICE the energy (same voltage, double charge)\n- Step 3: Physical interpretation\n  - The electric field does work W = QV on each particle\n  - Doubling the charge doubles the work done\n  - Note: The alpha is much heavier, so for same KE, its velocity would be much lower (v ∝ 1/√m for same KE)", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": false}, {"question": "Why can radiation damage biological tissue, and what are the relative dangers of alpha, beta, and gamma radiation in terms of internal vs. external exposure?", "answer": "- Step 1: How radiation damages tissue\n  - Ionising radiation knocks electrons from atoms, creating ions\n  - These ions can break chemical bonds, damage DNA\n  - If DNA repair mechanisms fail, cells die or become cancerous\n- Step 2: External exposure dangers\n  - **Alpha**: Least dangerous externally (can't penetrate skin)\n  - **Beta**: Moderate danger (can penetrate skin, cause burns)\n  - **Gamma**: Most dangerous externally (deep penetration, requires thick shielding)\n- Step 3: Internal exposure dangers\n  - **Alpha**: MOST dangerous internally (high ionising power concentrated in small volume)\n  - **Beta**: Moderate (can cause local damage)\n  - **Gamma**: Less dangerous than alpha internally (lower ionising power, passes through)\n- Key point: If alpha emitters are inhaled or ingested, the intense local ionisation causes severe damage — this is why polonium-210 is extremely toxic.", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}, {"question": "In the context of radioactive dating, explain why the initial ratio of carbon-14 to carbon-12 in the atmosphere must be assumed constant, and how dendrochronology helps verify this assumption.", "answer": "- Step 1: The assumption\n  - Carbon-14 is produced in the upper atmosphere by cosmic ray interactions\n  - The production rate has been roughly constant over thousands of years\n  - Living organisms equilibrium: same C-14/C-12 ratio as atmosphere\n- Step 2: Why it might not be constant\n  - Cosmic ray intensity varies with solar activity and Earth's magnetic field\n  - Atmospheric conditions affect C-14 production\n  - Fossil fuel burning dilutes C-14 (the \"Suess effect\")\n- Step 3: How dendrochronology helps\n  - Tree rings provide a precise dating record back ~12,000 years\n  - By measuring C-14 in tree rings of known age, we can calibrate the C-14 clock\n  - This reveals past variations in the C-14/C-12 ratio\n  - Calibration curves adjust radiocarbon dates accordingly", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": false}, {"question": "What is meant by \"critical mass\" in nuclear fission, and why is this concept important for both nuclear reactors and nuclear weapons?", "answer": "- Step 1: Define critical mass\n  - The minimum mass of fissile material (e.g., U-235, Pu-239) needed to sustain a chain reaction\n  - With less than critical mass, too many neutrons escape without causing further fission\n  - At critical mass, each fission produces exactly one more fission (k = 1)\n- Step 2: In nuclear reactors\n  - Fuel enrichment is typically 3-5% U-235 (not weapons-grade)\n  - Control rods absorb excess neutrons to maintain exactly critical state\n  - The reactor operates at steady-state, not supercritical\n- Step 3: In nuclear weapons\n  - Requires supercritical mass (k > 1) for rapid exponential increase\n  - Achieved by suddenly combining two sub-critical pieces\n  - The result: enormous energy release in microseconds\n- The difference: control and intentional limitation vs. runaway chain reaction", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": false}, {"question": "Explain why the binding energy curve peaks at iron-56 and what this tells us about the future of stars.", "answer": "- Step 1: The peak at iron-56\n  - Iron-56 has the highest binding energy per nucleon (~8.8 MeV)\n  - This is the most stable configuration achievable via nuclear reactions\n- Step 2: Implications for stellar evolution\n  - Stars fuse lighter elements toward iron (hydrogen → helium → carbon → ... → iron)\n  - Once the core becomes iron, no more fusion can release energy\n  - The star can no longer support itself against gravity\n  - This leads to core collapse and supernova (for massive stars)\n- Step 3: Energy production limits\n  - Fusion lighter than iron: releases energy (exothermic)\n  - Fission heavier than iron: would require energy input (endothermic)\n  - Iron is the \"ash\" of nuclear burning — the endpoint of stellar nucleosynthesis", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": false}, {"question": "What is the photoelectric effect, and why does the maximum kinetic energy of ejected electrons depend on the frequency of incident light rather than its intensity?", "answer": "- Step 1: Define the photoelectric effect\n  - Light ejects electrons from a metal surface\n  - This is how solar cells and photodetectors work\n- Step 2: The key observation\n  - Intensity affects NUMBER of electrons, not their energy\n  - Frequency affects the MAXIMUM KINETIC ENERGY of electrons\n- Step 3: Einstein's explanation (Nobel Prize work)\n  - Light comes in quanta (photons), each with energy E = hf\n  - Electrons need minimum energy φ (work function) to escape\n  - KE_max = hf − φ\n  - Below a threshold frequency (f < φ/h), no electrons escape regardless of intensity\n  - Above threshold, intensity determines current; frequency determines electron energy\n\nThis was crucial evidence for the quantum nature of light.", "source": "MiniMax ②", "_id": "minimax_2_47", "judge_pick": false}, {"question": "A sample of radioactive material shows an activity that decreases from 1200 Bq to 300 Bq in 10 hours. Determine the half-life of the material.", "answer": "- Step 1: Find the number of half-lives\n  - Activity ratio: 300/1200 = 1/4 = (1/2)²\n  - So 2 half-lives have passed\n- Step 2: Calculate half-life\n  - 2 half-lives = 10 hours\n  - 1 half-life = 10/2 = 5 hours\n\nAnswer: 5 hours", "source": "MiniMax ②", "_id": "minimax_2_48", "judge_pick": false}], "count": 49}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "What does the proton number $$Z$$ uniquely determine about an atom, and what does the nucleon number $$A$$ count?", "answer": "- Step 1: The proton number $$Z$$ counts the protons in the nucleus. Because chemical identity is set by how many protons an atom has (which sets how many electrons a neutral atom carries), $$Z$$ alone determines the element. Change $$Z$$ and you've changed elements entirely.\n- Step 2: The nucleon number $$A$$ counts protons + neutrons together — the total number of heavy particles in the nucleus. This is essentially the \"mass label\" of the nucleus.\n- Step 3: The neutron number is the difference: $$N = A - Z$$. Two atoms with the same $$Z$$ but different $$A$$ are isotopes — same element, different nuclear mass.\n\nKey takeaway: $$Z$$ = identity, $$A$$ = mass-bookkeeping, $$A - Z$$ = neutron count.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": true}, {"question": "Why are isotopes chemically nearly identical but nuclearly very different?", "answer": "- Step 1: Chemistry is determined by the electron cloud, and the electron configuration depends only on the number of protons $$Z$$ (which sets the number of electrons in a neutral atom). Isotopes share $$Z$$, so they share chemistry.\n- Step 2: Nuclear behaviour (stability, decay mode, half-life, binding energy) depends on the balance of protons vs. neutrons. Different neutron counts can shift a nucleus from stable to unstable, or change the decay mode entirely.\n- Step 3: That's why $$^{12}\\text{C}$$ and $$^{14}\\text{C}$$ behave identically in a plant's metabolism but only $$^{14}\\text{C}$$ decays — and that's the entire basis of radiocarbon dating.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": true}, {"question": "Rutherford's gold-foil experiment had three distinct observations. What were they, and what did each separately reveal about the atom? (3 steps)", "answer": "- Step 1: **Most alphas passed straight through** undeflected. Interpretation: the atom must be mostly empty space — there is nothing for the alpha to interact with along most paths.\n- Step 2: **A small fraction deflected through small angles**. Interpretation: there must be a concentration of positive charge somewhere that repels (positively charged) alphas as they pass close by.\n- Step 3: **A tiny fraction (≈ 1 in 8000) bounced back at angles > 90°**. Interpretation: that positive charge must be packed into something very small and very dense — small to be a rare target, dense to deflect a massive fast alpha backwards.\n\nTogether: the atom = small dense positive nucleus + mostly empty space. This killed the plum-pudding model.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "Why did Rutherford's results specifically rule out the \"plum pudding\" model of the atom? (2 steps)", "answer": "- Step 1: Plum pudding pictures positive charge as spread thinly throughout the atom's volume. If true, an alpha particle would only ever feel a weak, diffuse repulsion — every alpha would deflect by a small amount, and none would bounce back.\n- Step 2: But Rutherford observed large-angle scattering. A diffuse positive jelly cannot produce a near-180° deflection of a fast massive alpha; only a tiny, dense concentration of charge can. So the positive charge must be localised in a nucleus, not smeared out.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": true}, {"question": "Rank alpha, beta, and gamma radiation by penetrating power and by ionising power. Why are these two rankings inverted?", "answer": "- Step 1: Penetrating power: $$\\gamma > \\beta > \\alpha$$. Alpha is stopped by paper/skin (a few cm of air); beta by a few mm of aluminium (≈ 1 m air); gamma needs cm of lead or m of concrete.\n- Step 2: Ionising power: $$\\alpha > \\beta > \\gamma$$ — the exact reverse.\n- Step 3: These are inverted for a physical reason: ionisation requires interaction. Alpha is big, slow, and doubly charged ($$+2e$$), so it collides with atomic electrons constantly — it ionises strongly but loses energy fast, hence short range. Gamma is a chargeless, massless photon — it rarely interacts, so it ionises weakly but slips through far more material.\n\nTakeaway: strong interaction = high ionisation but low penetration. They're two sides of the same coin.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": true}, {"question": "A nucleus emits a beta-minus particle, but no electrons exist inside the nucleus. How is this possible? (3 steps)", "answer": "- Step 1: The nucleus contains only protons and neutrons, not electrons. So a \"fast electron from the nucleus\" sounds contradictory.\n- Step 2: What actually happens is a neutron *converts* into a proton. To conserve charge (neutron is 0, proton is $$+e$$), an electron must be ejected ($$-e$$). To conserve lepton number, an antineutrino is also ejected.\n- Step 3: The full reaction: $$^1_0 n \\rightarrow {}^1_1 p + {}^{\\ 0}_{-1}\\beta + \\bar{\\nu}_e$$. The electron didn't pre-exist — it was *created* at the moment of neutron-to-proton conversion.\n\nTakeaway: beta radiation is not \"stored electrons leaking out\"; it's a particle-conversion event.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "In $$\\beta^-$$ decay, why does the proton number $$Z$$ increase by 1, while in $$\\beta^+$$ decay it decreases by 1?", "answer": "- Step 1: $$\\beta^-$$: a neutron → proton (plus emitted electron + antineutrino). The nucleus gains a proton, so $$Z$$ goes up by 1. $$A$$ is unchanged because a neutron just became a proton — total nucleon count is preserved.\n- Step 2: $$\\beta^+$$: a proton → neutron (plus emitted positron + neutrino). The nucleus loses a proton, so $$Z$$ goes down by 1. Again $$A$$ is unchanged.\n- Step 3: A classic exam trap is flipping these. The mnemonic: the sign of the emitted particle tells you what the nucleus had to give up. Emit a negative → nucleus becomes more positive (Z↑). Emit a positive → nucleus becomes less positive (Z↓).", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": true}, {"question": "Why must a neutrino (or antineutrino) appear in every beta decay equation?", "answer": "- Step 1: Without a neutrino, beta decay would violate two things. First, observed beta energy spectra are continuous — if only an electron and recoiling nucleus came out, two-body kinematics forces a single fixed energy. The spread of energies means a third, invisible particle is carrying off the rest.\n- Step 2: Second, lepton number must be conserved. The electron is a lepton ($$L = +1$$). The decaying nucleus has $$L = 0$$. To balance, an *anti*lepton must be emitted in $$\\beta^-$$: the antineutrino $$\\bar{\\nu}_e$$ ($$L = -1$$).\n- Step 3: In $$\\beta^+$$, the positron is an antilepton ($$L = -1$$), so we need a true neutrino $$\\nu_e$$ ($$L = +1$$) to balance. Omitting the (anti)neutrino in an exam loses marks every time.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": true}, {"question": "Complete the alpha decay equation: $$^{238}_{\\ 92}U \\rightarrow {}^?_?\\text{Th} + {}^4_2\\alpha$$. Walk through the conservation reasoning. (2 steps)", "answer": "- Step 1: Conserve nucleon number $$A$$: $$238 = ? + 4$$, so the thorium has $$A = 234$$. Physically: 4 nucleons left as the alpha, the rest stayed.\n- Step 2: Conserve proton number $$Z$$: $$92 = ? + 2$$, so $$Z = 90$$ for Th. Physically: 2 protons left in the alpha. Result: $$^{238}_{\\ 92}U \\rightarrow {}^{234}_{\\ 90}\\text{Th} + {}^4_2\\alpha$$.\n\nPattern to remember: alpha decay always drops $$A$$ by 4 and $$Z$$ by 2.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "Why can't you choose which type of radiation a given radioactive sample emits? (2 steps)", "answer": "- Step 1: The decay mode (α, β−, β+, γ) is dictated by the *nuclear structure* of the isotope — specifically, by which configuration would lead to a more stable (lower-energy, higher-B/A) daughter. The isotope's neutron-to-proton ratio and excitation state set this.\n- Step 2: Therefore, you can't tune temperature, pressure, or chemistry to switch a uranium decay from alpha to beta. You can only *choose the isotope* — and accept whatever it does. Heavy nuclei (e.g. U-238) tend to alpha; neutron-rich nuclei (e.g. C-14) tend to β−; proton-rich nuclei tend to β+.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": true}, {"question": "A radioactive decay chain (like U-238 → ... → Pb-206) eventually \"stops\". What does it mean for a nucleus to be stable, and what makes Pb-206 the terminus? (2 steps)", "answer": "- Step 1: \"Stable\" means the nucleus sits in an energy configuration with no accessible decay pathway that lowers its energy. There is no rearrangement available that would produce a daughter with greater binding energy per nucleon.\n- Step 2: Pb-206 happens to have a particularly stable proton/neutron arrangement (Z = 82 is a \"magic number\"). Once the U-238 chain reaches it, no further decay can release energy, so the radiation stops. The sample has finally settled.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "What is background radiation, and why must it be subtracted in a half-life experiment? (3 steps)", "answer": "- Step 1: Background radiation is the always-present low-level radiation from natural sources (cosmic rays, radon from rocks, K-40 in food, C-14 in the atmosphere) and man-made sources (medical X-rays, fallout). Your Geiger counter reads it even with no source nearby.\n- Step 2: The activity from your sample is measured *on top of* this background. The raw count rate = sample's true rate + background rate.\n- Step 3: If you don't subtract background, your \"decay curve\" doesn't tend to zero — it tends to the background. Fitting an exponential to that gives a falsely *longer* half-life. Always: corrected rate = measured rate − background rate, *then* analyse.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "Define the decay constant $$\\lambda$$ in plain physical terms — what exactly is it the probability of?", "answer": "- Step 1: $$\\lambda$$ is the probability per unit time that any single, currently-undecayed nucleus will decay. Units: $$\\text{s}^{-1}$$.\n- Step 2: It is an intrinsic property of the isotope. A larger $$\\lambda$$ means each nucleus is \"more eager\" to decay each second, and therefore the isotope has a shorter half-life.\n- Step 3: Crucially, $$\\lambda$$ tells you nothing about *which* nucleus will go next — only the per-second odds. The randomness is fundamental, not from ignorance.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": true}, {"question": "Why does $$A = \\lambda N$$ make intuitive sense, and what happens to activity as the sample ages? (3 steps)", "answer": "- Step 1: If each of $$N$$ undecayed nuclei has probability $$\\lambda$$ per second of decaying, then the expected number of decays per second is simply (probability per nucleus) × (number of nuclei) = $$\\lambda N$$. That's the activity.\n- Step 2: As decays happen, $$N$$ falls — and since $$\\lambda$$ is fixed, $$A$$ falls proportionally. Activity and number of nuclei decay together along the same exponential curve.\n- Step 3: This is why activity and number-remaining have the same half-life. You don't need to know $$N$$ to use half-life — you can track activity instead, which is what a Geiger counter measures.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "Derive the relationship $$t_{1/2} = \\ln 2 / \\lambda$$ starting from the exponential decay law. (3 steps)", "answer": "- Step 1: Start from $$N(t) = N_0 e^{-\\lambda t}$$. By definition of half-life, after time $$t_{1/2}$$ we have $$N = N_0/2$$.\n- Step 2: Substitute: $$\\frac{N_0}{2} = N_0 e^{-\\lambda t_{1/2}}$$, so $$\\frac{1}{2} = e^{-\\lambda t_{1/2}}$$.\n- Step 3: Take the natural log: $$-\\ln 2 = -\\lambda t_{1/2}$$, so $$t_{1/2} = \\ln 2 / \\lambda \\approx 0.693/\\lambda$$.\n\nKey insight: half-life and decay constant are inversely related — a \"twitchy\" isotope (large $$\\lambda$$) has a short half-life, and vice versa.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "Why is half-life independent of temperature, pressure, or chemical state — but the rate of an ordinary chemical reaction is not? (2 steps)", "answer": "- Step 1: Chemical reactions involve electrons in the outer shells, whose energies (≈ eV scale) are comparable to thermal energies and bond energies. Heating supplies enough energy to change reaction rates dramatically.\n- Step 2: Nuclear decay involves nucleons inside the nucleus, where the relevant energies are MeV — about a million times larger than any thermal or chemical energy you can supply in a lab. The nucleus simply doesn't \"feel\" the chemical environment. So half-life is intrinsic to the isotope.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": true}, {"question": "A source has half-life 20 min and initial activity 800 Bq. Without doing the exponential, find the activity after 1 hour. (3 steps)", "answer": "- Step 1: 1 hour = 60 min = 3 × 20 min = 3 half-lives. So we want $$A_0 \\times (1/2)^3$$.\n- Step 2: $$(1/2)^3 = 1/8$$.\n- Step 3: $$A = 800 / 8 = 100 \\text{ Bq}$$.\n\nTakeaway: when the elapsed time is a whole number of half-lives, skip the exponential — just divide by 2 that many times. The \"magic table\" approach.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "A polonium sample drops from 8.00 g to 0.25 g. Without doing logarithms, how many half-lives have passed? (2 steps)", "answer": "- Step 1: The ratio is $$0.25/8 = 1/32$$. We want $$(1/2)^n = 1/32$$.\n- Step 2: $$32 = 2^5$$, so $$n = 5$$ half-lives. The trick is recognising the ratio as a power of 2.\n\nThis is faster than logs whenever the ratio is \"clean\" — keep dividing 8 → 4 → 2 → 1 → 0.5 → 0.25, counting 5 halvings.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": true}, {"question": "Why is it tempting (and wrong) to use simple proportional scaling — e.g. saying \"5.5/1.8 of a half-life passes\" — for decay problems?", "answer": "- Step 1: Decay is *not* linear in time. Doubling the time does not double the fraction decaye
