tance made of only one type of atom. Example: helium gas (all atoms are He).\n- Step 2: A **molecule** is a specific combination of two or more atoms bonded together. Example: $$\\text{H}_2\\text{O}$$ — two hydrogen atoms bonded to one oxygen atom. A molecule can be of a single element ($$\\text{O}_2$$) or a compound ($$\\text{H}_2\\text{O}$$).\n- Step 3: A **substance** is any form of matter with definite composition — it can be an element (pure iron) or a compound (water). In this topic, we often just call all of these \"particles\" generically, whether atoms, molecules, or ions, because the kinetic theory applies to all of them equally.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "A proton is made of quarks with composition uud. An up quark has charge $$+\\frac{2}{3}e$$ and a down quark has charge $$-\\frac{1}{3}e$$. Show that this gives the proton its charge of $$+1e$$. What about the neutron (udd)? (3 steps)", "answer": "- Step 1: For the proton (uud): add the charges of two up quarks and one down quark:\n$$+\\frac{2}{3}e + \\frac{2}{3}e + \\left(-\\frac{1}{3}e\\right) = \\frac{4}{3}e - \\frac{1}{3}e = \\frac{3}{3}e = +1e$$ ✓\n- Step 2: For the neutron (udd): add the charges of one up quark and two down quarks:\n$$+\\frac{2}{3}e + \\left(-\\frac{1}{3}e\\right) + \\left(-\\frac{1}{3}e\\right) = \\frac{2}{3}e - \\frac{2}{3}e = 0$$ ✓\n- Step 3: This quark model explains why protons and neutrons have the charges they do — it's not an arbitrary assignment but a consequence of their internal quark structure. The fact that fractional charges combine to give integer charges is a deep feature of the Standard Model.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "Name the six state changes: solid↔liquid, liquid↔gas, and solid↔gas. Which one is uncommon at everyday conditions? (2 steps)", "answer": "- Step 1: The six state changes are:\n+ Solid → Liquid: **melting** (opposite: **freezing**)\n+ Liquid → Gas: **boiling** / **evaporation** (opposite: **condensing**)\n+ Solid → Gas: **sublimation** (opposite: **deposition**)\n- Step 2: **Sublimation** and **deposition** are uncommon at everyday conditions. Dry ice (solid $$\\text{CO}_2$$) sublimates at room temperature — it goes straight from solid to gas without becoming liquid. This only happens when the substance's triple point pressure is above atmospheric pressure.\n\nNote: Evaporation differs from boiling — evaporation happens at any temperature from the surface, while boiling happens throughout the liquid at a specific temperature.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "When you heat ice at 0 °C, the temperature doesn't rise even though you keep adding energy. Where does the energy go? Is this kinetic or potential energy? (3 steps)", "answer": "- Step 1: During a phase change (melting), the energy you supply goes into **breaking intermolecular bonds**, not into increasing the kinetic energy of the particles. This is why the temperature stays constant — temperature is a measure of average kinetic energy, and that isn't changing.\n- Step 2: Breaking bonds means increasing the **potential energy** of the molecules — you're pulling them apart against attractive forces, which stores energy in their separation (like stretching a spring stores elastic PE). So during melting: internal energy increases, but *only* the potential component.\n- Step 3: Once all the bonds are broken and the substance is fully liquid, further energy input goes into kinetic energy again, and the temperature rises. This pattern repeats at boiling: flat section (bond-breaking, PE increases) → sloped section (KE increases, temperature rises).\n\nCritical misconception: \"Energy always increases temperature\" — NO. During phase changes, energy increases internal energy without changing temperature. Internal energy ≠ temperature.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": true}, {"question": "On a heating curve graph (temperature vs energy added for water), there are two flat sections. What is happening physically at each one, and why are they at different temperatures? (3 steps)", "answer": "- Step 1: The **first flat section** at 0 °C: this is **melting**. Energy is being used to break the bonds holding water molecules in the solid lattice. All solid is converting to liquid. Temperature stays at 0 °C throughout.\n- Step 2: The **second flat section** at 100 °C: this is **boiling**. Energy is being used to completely separate molecules so they become a gas with negligible intermolecular forces. All liquid is converting to gas. Temperature stays at 100 °C throughout.\n- Step 3: They're at different temperatures because different amounts of energy are needed to break different types of bonds. Melting only needs to weaken bonds enough for molecules to slide past each other. Boiling needs to completely overcome all intermolecular attractions — which requires far more energy per molecule (latent heat of vaporisation ≈ 7× latent heat of fusion for water).", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": true}, {"question": "A cooling curve for stearic acid shows a flat section where temperature stays constant. If the flat section starts at t = 160 s and ends at t = 910 s, what is happening during this interval and how long does it take? (2 steps)", "answer": "- Step 1: During the flat section, the stearic acid is **freezing** (changing from liquid to solid). The substance is losing energy to its surroundings, but instead of the temperature dropping, that energy is being released from the *formation* of intermolecular bonds (latent heat of fusion is being released).\n- Step 2: Duration = 910 − 160 = **750 seconds**. Throughout this time, the substance is a *mixture* of liquid and solid — at the start it's mostly liquid, and at the end it's mostly solid. Only when all the liquid has solidified does the temperature start to drop again.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "Define internal energy. Why is it incorrect to say \"internal energy is just the kinetic energy of the molecules\"? (3 steps)", "answer": "- Step 1: **Internal energy (U)** is the sum of the kinetic *and* potential energies of all the molecules within a given mass of a substance. It includes both components.\n- Step 2: The **kinetic energy** component comes from the motion of molecules (translational, rotational, vibrational) and determines the temperature. The **potential energy** component comes from the separation between molecules and the intermolecular forces between them.\n- Step 3: During a phase change, you can increase internal energy (by adding latent heat) *without* changing kinetic energy — the energy goes entirely into potential energy (changing molecular separations). So internal energy can change even when temperature doesn't, proving U ≠ just KE.\n\nExam trap: \"Internal energy = temperature\" is WRONG. Temperature measures only the KE part. U includes both KE and PE.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "Which has higher internal energy: 1 kg of water at 100 °C, or 1 kg of steam at 100 °C? Explain why. (3 steps)", "answer": "- Step 1: They are at the *same temperature*, so their molecules have the *same average kinetic energy*. But they differ in potential energy.\n- Step 2: In steam, the molecules are far apart — intermolecular bonds have been completely broken. This means the molecules have much higher potential energy than in liquid water, where molecules are still close together with significant intermolecular attraction.\n- Step 3: Therefore, **steam at 100 °C has higher internal energy** than water at 100 °C. The difference is exactly the latent heat of vaporisation — the energy that went into breaking bonds to convert liquid to gas without changing temperature.\n\nThis is why steam burns are far worse than boiling water burns — steam carries that extra internal energy which it releases when it condenses on your skin.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": true}, {"question": "What is absolute zero? Why can't you have a temperature below 0 K? (3 steps)", "answer": "- Step 1: **Absolute zero** ($$0\\ \\text{K} = -273.15\\ \\text{°C}$$) is the temperature at which molecules have the *minimum possible kinetic energy*. At this point, all molecular motion (translational, rotational, vibrational) has ceased as much as quantum mechanics allows.\n- Step 2: You can't go below 0 K because kinetic energy cannot be negative. Temperature is proportional to average molecular KE ($$E_k = \\frac{3}{2}kT$$), so negative T would require negative KE, which is physically impossible.\n- Step 3: Absolute zero has never been reached in a lab — it's a theoretical limit. Even deep space is at ~2.7 K (the cosmic microwave background temperature). We can get very close (nanokelvins) but never exactly 0 K.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "Convert 300 K to Celsius. Then explain why a temperature *change* of 1 K equals a temperature *change* of 1 °C, but the absolute values differ. (3 steps)", "answer": "- Step 1: The conversion is $$\\theta\\ (\\text{°C}) = T\\ (\\text{K}) - 273.15$$. So 300 K − 273.15 = **26.85 °C**. This is why \"room temperature\" is often taken as ~300 K ≈ 27 °C.\n- Step 2: The Kelvin and Celsius scales have the *same size degree* — they're just offset. A rise from 20 °C to 21 °C is the same physical change as a rise from 293.15 K to 294.15 K. Both are a change of 1 unit.\n- Step 3: This means in the specific heat equation $$\\Delta E = mc\\Delta\\theta$$, you can use either K or °C for $$\\Delta\\theta$$ — the *change* is identical. But for gas laws ($$PV = nRT$$), you MUST use Kelvin, because the laws involve *absolute* temperature, not temperature difference.\n\nMemory aid: 0 °C = 273.15 K. So to go from °C to K, you always add 273.15. Celsius comes before Kelvin alphabetically, so you add to go forward.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "Why can't you say \"−2 °C is twice as cold as −1 °C\"? What temperature scale would you need to make such proportional statements? (3 steps)", "answer": "- Step 1: The Celsius scale has an arbitrary zero point (the freezing point of water). It doesn't represent \"zero thermal energy.\" So ratios of Celsius values are meaningless — −2 °C is not \"twice as cold\" as −1 °C because neither is measured from a true zero.\n- Step 2: To make proportional statements, you need a **ratio scale** with a true zero. The **Kelvin scale** has its zero at absolute zero (minimum possible energy). On this scale, 200 K genuinely represents twice the average molecular KE of 100 K.\n- Step 3: Converting: −1 °C = 272 K and −2 °C = 271 K. The ratio 271/272 ≈ 1.0, not 2.0! The temperatures are nearly identical in absolute terms. This shows why Kelvin is the physically meaningful scale for any proportional reasoning about temperature.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": true}, {"question": "Define specific heat capacity. Why does water's high specific heat capacity make it useful for home heating systems? (3 steps)", "answer": "- Step 1: **Specific heat capacity (c)** is the energy required to raise the temperature of 1 kg of a substance by 1 K. The equation is $$\\Delta E = mc\\Delta\\theta$$, where $$c$$ is in $$\\text{J kg}^{-1}\\text{K}^{-1}$$.\n- Step 2: Water has a very high specific heat capacity ($$c = 4200\\ \\text{J kg}^{-1}\\text{K}^{-1}$$) — much higher than most common substances. This means it takes a lot of energy to heat water up, and correspondingly, it releases a lot of energy when it cools down.\n- Step 3: For home heating: hot water in a radiator stays hot for a long time because it has stored a large amount of thermal energy. As it slowly cools, it releases that energy gradually into the room. A material with low $$c$$ (like copper) would cool too quickly to be useful for sustained heating.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "You heat 2 kg of water and its temperature rises by 50 K. If water's specific heat capacity is 4200 J kg⁻¹K⁻¹, roughly how much energy is needed? Don't do exact arithmetic — estimate the order of magnitude. (3 steps)", "answer": "- Step 1: The equation is $$\\Delta E = mc\\Delta\\theta$$. Substitute the values: $$\\Delta E = 2 \\times 4200 \\times 50$$.\n- Step 2: Estimate: $$2 \\times 4200 \\approx 8400$$, and $$8400 \\times 50 = 8400 \\times 5 \\times 10 = 42\\,000 \\times 10 = 420\\,000$$.\n- Step 3: So $$\\Delta E \\approx 420\\,000\\ \\text{J} = 420\\ \\text{kJ}$$. This is order of magnitude $$10^5\\ \\text{J}$$ — a substantial amount of energy for just 2 kg of water heated by 50 K, reflecting water's high specific heat capacity.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "Define specific latent heat. Why is the latent heat of vaporisation for water (~2260 kJ/kg) about 7 times larger than the latent heat of fusion (~334 kJ/kg)? (3 steps)", "answer": "- Step 1: **Specific latent heat (L)** is the energy required to change the state of 1 kg of a substance *without any change in temperature*. The equation is $$\\Delta E = mL$$. Units: $$\\text{J kg}^{-1}$$.\n- Step 2: **Latent heat of fusion** (melting/freezing): energy to weaken intermolecular bonds enough so molecules can *slide past each other* while remaining close together. The molecules stay in contact — you're just rearranging the bond structure.\n- Step 3: **Latent heat of vaporisation** (boiling/condensing): energy to *completely separate* molecules so there are no significant intermolecular forces between them. You're breaking all bonds entirely, moving molecules from close together to far apart. This requires much more energy — hence the factor of ~7 for water.\n\nMemory aid: \"Fusion\" = fusing together (solid↔liquid). \"Vaporisation\" = making vapour (liquid↔gas).", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": true}, {"question": "You need to melt 0.5 kg of ice at 0 °C. The latent heat of fusion of ice is 334 kJ/kg. Will the temperature change during this process? (2 steps)", "answer": "- Step 1: Using $$\\Delta E = mL = 0.5 \\times 334\\,000 = 167\\,000\\ \\text{J} = 167\\ \\text{kJ}$$. This is the energy needed to convert 0.5 kg of solid ice at 0 °C to 0.5 kg of liquid water at 0 °C.\n- Step 2: **No, the temperature does not change.** Throughout the entire process, the temperature remains at 0 °C. The 167 kJ goes entirely into breaking intermolecular bonds (increasing potential energy), not into increasing kinetic energy. The ice and water coexist at 0 °C until all ice has melted.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "What is an ideal gas? List the two key assumptions about the molecules. Why do real gases deviate from ideal behaviour at high pressure and low temperature? (3 steps)", "answer": "- Step 1: An **ideal gas** is a theoretical gas that obeys the gas laws exactly. The two key assumptions are: (1) molecules occupy **negligible volume** compared to the container (they are point particles), and (2) there are **negligible intermolecular forces** except during instantaneous elastic collisions.\n- Step 2: At **high pressure**, molecules are forced close together, so their own volume becomes significant relative to the container — violating assumption 1. Also, at close range, intermolecular forces become significant — violating assumption 2.\n- Step 3: At **low temperature**, molecules move slowly and spend more time near each other, so intermolecular forces have more time to act. At very low temperatures, real gases can even *liquefy*, something an ideal gas (with no intermolecular forces) could never do.\n\nAn ideal gas can never liquefy — it has no intermolecular attractions to hold molecules together.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": true}, {"question": "State Boyle's law. If you compress a gas at constant temperature to half its original volume, what happens to the pressure and why, at the molecular level? (3 steps)", "answer": "- Step 1: **Boyle's law**: at constant temperature, $$P \\propto \\frac{1}{V}$$, or equivalently $$PV = \\text{constant}$$, or $$P_1 V_1 = P_2 V_2$$.\n- Step 2: If volume is halved, pressure **doubles**. Since $$PV$$ is constant, if $$V$$ becomes $$V/2$$, then $$P$$ must become $$2P$$ to maintain the same product.\n- Step 3: Molecular explanation: in half the volume, the same number of molecules are crammed into less space. They hit the walls **more frequently** (shorter distance to travel between collisions with walls). At constant temperature, their average speed is unchanged, so each collision exerts the same force — but more collisions per second means more total force, hence more pressure.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "State Charles's law. If you heat a gas at constant pressure from 300 K to 600 K, what happens to its volume? Why must you use Kelvin? (3 steps)", "answer": "- Step 1: **Charles's law**: at constant pressure, $$V \\propto T$$, or $$\\frac{V_1}{T_1} = \\frac{V_2}{T_2}$$. Volume is directly proportional to absolute temperature.\n- Step 2: Doubling the Kelvin temperature (300 K → 600 K) **doubles the volume**. At 600 K, molecules have twice the average KE, moving faster and hitting walls harder. To keep pressure constant, the volume must expand so collisions are less frequent, balancing the increased force per collision.\n- Step 3: You must use **Kelvin** because the proportionality $$V \\propto T$$ only works with an absolute scale. In Celsius, doubling from 27 °C to 54 °C does NOT double the volume — the absolute temperatures are 300 K and 327 K, giving a ratio of 327/300 ≈ 1.09, not 2.0.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": true}, {"question": "State the Pressure law (Gay-Lussac's law). If you heat a gas in a sealed, rigid container from 200 K to 800 K, what happens to the pressure? (3 steps)", "answer": "- Step 1: **Pressure law**: at constant volume, $$P \\propto T$$, or $$\\frac{P_1}{T_1} = \\frac{P_2}{T_2}$$. Pressure is directly proportional to absolute temperature.\n- Step 2: Quadrupling the temperature (200 K → 800 K) **quadruples the pressure**. The molecules move faster (more KE), so each wall collision exerts more force, and collisions happen more frequently. Since the volume is fixed, there's no way to reduce collision frequency — all the extra energy shows up as increased pressure.\n- Step 3: This is why aerosol cans carry warnings not to incinerate — heating the gas in a fixed-volume container dramatically increases pressure and can cause the container to explode.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": true}, {"question": "Write the ideal gas equation in two forms: one using number of moles, and one using number of molecules. What is the Boltzmann constant and how does it relate the two? (3 steps)", "answer": "- Step 1: The two forms are:\n+ $$PV = nRT$$ (where $$n$$ = number of moles, $$R$$ = molar gas constant = 8.31 J mol⁻¹K⁻¹)\n+ $$PV = NkT$$ (where $$N$$ = number of molecules, $$k$$ = Boltzmann constant)\n- Step 2: The **Boltzmann constant** $$k$$ is defined as $$k = \\frac{R}{N_A}$$, where $$N_A = 6.02 \\times 10^{23}$$ is Avogadro's number. So $$k = \\frac{8.31}{6.02 \\times 10^{23}} \\approx 1.38 \\times 10^{-23}\\ \\text{J K}^{-1}$$.\n- Step 3: Since $$N = n \\times N_A$$ (number of molecules = moles × molecules per mole), we get $$NkT = nN_A \\cdot \\frac{R}{N_A} \\cdot T = nRT$$. The Boltzmann constant bridges the microscopic (per molecule) and macroscopic (per mole) scales. It's very small because one molecule's KE increase per kelvin is tiny.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": true}, {"question": "When heating an ideal gas in a sealed container, explain in three steps (using the \"three F's\") why the pressure increases. (3 steps)", "answer": "- Step 1: **Faster** — heating the gas increases the average kinetic energy of the molecules, so they move faster ($$E_k = \\frac{3}{2}kT$$).\n- Step 2: **More Frequently** — at higher speeds, molecules travel between wall collisions in less time, so they hit the walls more often per second.\n- Step 3: **more Force** — each individual collision with the wall transfers more momentum (because the molecule is moving faster), resulting in a greater impulse and force. Since pressure = force/area, and both force and collision frequency have increased, pressure increases.\n\nSummary: Faster → more Frequently → more Force → higher Pressure.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "The kinetic theory equation is $$PV = \\frac{1}{3}Nm\\overline{c^2}$$. What does each symbol represent, and what is $$\\overline{c^2}$$? Why is it not simply \"average speed squared\"? (3 steps)", "answer": "- Step 1: $$P$$ = pressure, $$V$$ = volume, $$N$$ = number of molecules, $$m$$ = mass of one molecule, $$\\overline{c^2}$$ = mean square speed. The product $$Nm$$ gives the total mass of all molecules.\n- Step 2: $$\\overline{c^2}$$ is the **mean square speed** — you square each molecule's speed first, then take the average of those squares. This is NOT the same as squaring the average speed: $$\\overline{c^2} \\neq (\\bar{c})^2$$.\n- Step 3: The reason: molecules have a distribution of speeds (some fast, some slow). Squaring before averaging gives more weight to the faster molecules (since squaring amplifies large values). The **root-mean-square speed** is $$c_{\\text{rms}} = \\sqrt{\\overline{c^2}}$$, which is always greater than or equal to the mean speed $$\\bar{c}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": true}, {"question": "Derive the average molecular kinetic energy equation $$E_k = \\frac{3}{2}kT$$ from the ideal gas equation and the kinetic theory equation. (4 steps)", "answer": "- Step 1: Start with the two expressions for $$PV$$:\n+ Ideal gas: $$PV = NkT$$\n+ Kinetic theory: $$PV = \\frac{1}{3}Nm\\overline{c^2}$$\n- Step 2: Since both equal $$PV$$, set them equal: $$NkT = \\frac{1}{3}Nm\\overline{c^2}$$\n- Step 3: Cancel $$N$$ from both sides: $$kT = \\frac{1}{3}m\\overline{c^2}$$. Multiply both sides by 3: $$3kT = m\\overline{c^2}$$\n- Step 4: Multiply both sides by $$\\frac{1}{2}$$: $$\\frac{3}{2}kT = \\frac{1}{2}m\\overline{c^2}$$. The right side is the average KE of one molecule, so $$E_k = \\frac{3}{2}kT$$.\n\nMemory rhyme: \"Average KE is three-halves kT.\" This shows that average KE is *directly proportional* to absolute temperature — a profound link between microscopic energy and macroscopic temperature.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": false}, {"question": "If you double the Kelvin temperature of an ideal gas, what happens to the average molecular KE? What happens to the rms speed? (3 steps)", "answer": "- Step 1: Since $$E_k = \\frac{3}{2}kT$$, doubling $$T$$ **doubles** the average molecular KE. The relationship is directly proportional.\n- Step 2: For the rms speed: $$E_k = \\frac{1}{2}m c_{\\text{rms}}^2 = \\frac{3}{2}kT$$, so $$c_{\\text{rms}} = \\sqrt{\\frac{3kT}{m}}$$. Since $$c_{\\text{rms}} \\propto \\sqrt{T}$$, doubling $$T$$ increases the rms speed by a factor of $$\\sqrt{2} \\approx 1.41$$, not by a factor of 2.\n- Step 3: This makes sense: KE depends on $$v^2$$, so if KE doubles, speed only increases by $$\\sqrt{2}$$. Going from 300 K to 600 K doesn't make molecules move twice as fast — only ~41% faster.\n\nCommon trap: \"Double the temperature, double the speed\" — WRONG. Speed goes as $$\\sqrt{T}$$, not $$T$$.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": false}, {"question": "A gas has rms speed $$c_{\\text{rms}}$$ at temperature $$T$$. Express $$c_{\\text{rms}}$$ in terms of molar gas constant $$R$$ and molar mass $$M$$. Why do lighter molecules move faster at the same temperature? (3 steps)", "answer": "- Step 1: Starting from $$\\frac{1}{2}m c_{\\text{rms}}^2 = \\frac{3}{2}kT$$ and substituting $$k = R/N_A$$ and $$m = M/N_A$$ (where $$M$$ is molar mass):\n$$c_{\\text{rms}} = \\sqrt{\\frac{3RT}{M}}$$\n- Step 2: At the same temperature $$T$$, $$c_{\\text{rms}} \\propto \\frac{1}{\\sqrt{M}}$$. A molecule with smaller mass $$m$$ (or smaller molar mass $$M$$) has a higher rms speed.\n- Step 3: Physical reason: all molecules at the same temperature have the same average KE ($$\\frac{3}{2}kT$$). Since KE = $$\\frac{1}{2}mv^2$$, a lighter molecule must move faster to have the same KE as a heavier one. This is why hydrogen (light) escapes from Earth's atmosphere while nitrogen (heavy) stays — H₂ moves fast enough to exceed escape velocity.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": false}, {"question": "Helium molecules have rms speed 720 m/s at 45 °C. Without doing the full calculation, explain how you would find the rms speed at 80 °C. What is the ratio of the new speed to the old? (3 steps)", "answer": "- Step 1: Convert both temperatures to Kelvin: $$T_1 = 45 + 273 = 318\\ \\text{K}$$, $$T_2 = 80 + 273 = 353\\ \\text{K}$$.\n- Step 2: Since $$c_{\\text{rms}} \\propto \\sqrt{T}$$, the ratio of speeds is: $$\\frac{c_2}{c_1} = \\sqrt{\\frac{T_2}{T_1}} = \\sqrt{\\frac{353}{318}} \\approx \\sqrt{1.11} \\approx 1.054$$\n- Step 3: So the new speed is about 5.4% higher: $$c_2 \\approx 720 \\times 1.054 \\approx 759\\ \\text{m/s}$$. Notice that a 35 K temperature rise (from 318 to 353 K) produces only a ~5% speed increase — because speed depends on $$\\sqrt{T}$$, not $$T$$.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "Define upthrust. A fully submerged object displaces 0.015 m³ of water (ρ = 1000 kg/m³). Calculate the upthrust. (3 steps)", "answer": "- Step 1: **Upthrust** is the upward buoyant force on an object in a fluid, equal to the **weight of the fluid displaced** (Archimedes' principle). The key phrase is \"weight of *fluid displaced*\" — not the weight of the object.\n- Step 2: Mass of displaced water: $$m = \\rho V = 1000 \\times 0.015 = 15\\ \\text{kg}$$. Weight of displaced water: $$W = mg = 15 \\times 9.81 = 147\\ \\text{N}$$.\n- Step 3: Upthrust = **147 N** upward. Combined formula: $$F_b = \\rho_{\\text{fluid}} \\times V_{\\text{displaced}} \\times g$$.\n\nCritical distinction: Upthrust depends on the fluid's density and the displaced volume — it knows nothing about the object's own density or mass.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": false}, {"question": "An object floats. What is the relationship between its weight and the upthrust? What if it sinks? What determines whether an object floats or sinks? (3 steps)", "answer": "- Step 1: **Floating**: upthrust = weight of object. The object displaces just enough fluid so that the weight of displaced fluid equals its own weight. It may be partially submerged.\n- Step 2: **Sinking**: upthrust < weight of object. Even when fully submerged, the weight of fluid displaced (upthrust) is less than the object's weight, so there's a net downward force.\n- Step 3: The deciding factor is **density comparison**: if $$\\rho_{\\text{object}} < \\rho_{\\text{fluid}}$$, it floats (it's less dense than the fluid). If $$\\rho_{\\text{object}} > \\rho_{\\text{fluid}}$$, it sinks. A steel ship floats because its *overall* density (hollow shape) is less than water, even though solid steel is denser.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": true}, {"question": "A cube of volume 0.01 m³ floats in water with 70% of its volume submerged. What is the density of the cube's material? (3 steps)", "answer": "- Step 1: When floating, weight = upthrust. Weight of cube = $$\\rho_{\\text{cube}} \\times V \\times g$$. Upthrust = weight of displaced water = $$\\rho_{\\text{water}} \\times V_{\\text{submerged}} \\times g$$.\n- Step 2: Set them equal: $$\\rho_{\\text{cube}} \\times V \\times g = \\rho_{\\text{water}} \\times 0.70V \\times g$$. Cancel $$V$$ and $$g$$: $$\\rho_{\\text{cube}} = 0.70 \\times \\rho_{\\text{water}} = 0.70 \\times 1000 = 700\\ \\text{kg m}^{-3}$$.\n- Step 3: General rule: **the fraction submerged equals the ratio of the object's density to the fluid's density** ($$\\frac{\\rho_{\\text{object}}}{\\rho_{\\text{fluid}}}$$). An object that is 70% as dense as water sits 70% submerged. Ice (917 kg/m³) floats ~90% submerged in water.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": false}, {"question": "Why do ships float higher in seawater (ρ ≈ 1030 kg/m³) than in freshwater (ρ ≈ 1000 kg/m³)? (2 steps)", "answer": "- Step 1: For the same ship (same weight), the upthrust must equal the weight whether in fresh or salt water. Upthrust = $$\\rho_{\\text{fluid}} \\times V_{\\text{displaced}} \\times g$$. If $$\\rho_{\\text{fluid}}$$ is larger (seawater), then $$V_{\\text{displaced}}$$ must be smaller to produce the same upthrust.\n- Step 2: Less volume displaced means less of the ship is below the waterline — the ship **floats higher** in seawater. Denser fluids are more buoyant per unit volume displaced.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": true}, {"question": "State Stokes' law for viscous drag. What are the four conditions that must be met for it to apply? (3 steps)", "answer": "- Step 1: **Stokes' law**: $$F = 6\\pi\\eta r v$$, where $$F$$ = viscous drag force, $$\\eta$$ = coefficient of viscosity (Pa·s), $$r$$ = radius of the sphere (m), $$v$$ = velocity (m/s).\n- Step 2: The four conditions are:\n+ The object must be **small**\n+ The object must be **spherical**\n+ The speed must be **low** (laminar flow)\n+ The flow must be **laminar** (not turbulent)\n- Step 3: Laminar flow means fluid layers slide smoothly past each other without mixing. At high speeds, flow becomes **turbent** — layers mix, vortices form, and drag becomes proportional to $$v^2$$ rather than $$v$$. Stokes' law fails completely in turbulent conditions.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": false}, {"question": "How does viscosity change with temperature for liquids vs gases? Give a practical example of each. (3 steps)", "answer": "- Step 1: **Liquids**: viscosity *decreases* as temperature increases. Heating gives molecules more kinetic energy to overcome intermolecular forces, so they flow more easily. Example: hot motor oil flows much more easily than cold oil — this is why car engines need oil pumps that work at both cold start and operating temperature.\n- Step 2: **Gases**: viscosity *increases* as temperature increases. In gases, viscosity arises from momentum transfer between layers during collisions. At higher temperatures, molecules move faster and collide more often, transferring more momentum between layers — increasing the resistance to flow.\n- Step 3: This opposite behaviour is counterintuitive. The key: in liquids, intermolecular forces dominate (weakening them reduces viscosity). In gases, molecular collisions dominate (more frequent collisions increase viscosity).", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": true}, {"question": "Define terminal velocity. For a sphere falling through a fluid, write the force balance equation and explain why the sphere eventually stops accelerating. (3 steps)", "answer": "- Step 1: **Terminal velocity** is the constant velocity reached when the net force on a falling object is zero — it's no longer accelerating.\n- Step 2: Three forces act on the sphere: **weight** (downward, $$mg$$), **upthrust** (upward, $$\\rho_f V g$$), and **viscous drag** (upward, $$6\\pi\\eta r v$$). At terminal velocity: $$mg - \\rho_f V g - 6\\pi\\eta r v_{\\text{term}} = 0$$, or equivalently: **weight = upthrust + viscous drag**.\n- Step 3: When first released, weight exceeds upthrust + drag, so the sphere accelerates downward. As speed increases, drag increases (it's proportional to $$v$$). Eventually, drag grows large enough that the upward forces exactly balance the weight — net force is zero, acceleration stops, and the sphere falls at constant terminal velocity.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": false}, {"question": "The terminal velocity of a sphere in a fluid is given by $$v_{\\text{term}} = \\frac{2r^2 g(\\rho_s - \\rho_f)}{9\\eta}$$. If you double the radius of the sphere, what happens to the terminal velocity? (3 steps)", "answer": "- Step 1: From the equation, $$v_{\\text{term}} \\propto r^2$$. Everything else (densities, viscosity, g) stays the same.\n- Step 2: Doubling the radius: new $$v_{\\text{term}} \\propto (2r)^2 = 4r^2$$. So terminal velocity increases by a factor of **4**.\n- Step 3: Physical reason: a larger sphere has much more weight (volume ∝ $$r^3$$) but only moderately more drag area (cross-section ∝ $$r^2$$). The weight grows faster than the drag, so a larger sphere needs to go faster before drag balances weight. This is why large raindrops fall much faster than small ones.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": false}, {"question": "In the terminal velocity formula, why does viscosity appear in the denominator? What would happen to terminal velocity if you dropped the same sphere through honey vs water? (2 steps)", "answer": "- Step 1: Viscosity is in the denominator because higher viscosity means more drag at any given speed ($$F = 6\\pi\\eta r v$$). To reach force balance, the sphere needs less speed in a more viscous fluid — so $$v_{\\text{term}} \\propto \\frac{1}{\\eta}$$.\n- Step 2: Honey has much higher viscosity than water (~10 Pa·s vs ~0.001 Pa·s). The same sphere would reach a much *lower* terminal velocity in honey. It would also reach terminal velocity almost immediately (drag builds up very quickly), whereas in water it would accelerate for longer before drag catches up with weight.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": false}, {"question": "A sphere has the same density as the fluid it's placed in ($$\\rho_s = \\rho_f$$). What happens according to the terminal velocity formula? Explain physically. (2 steps)", "answer": "- Step 1: From the formula: $$v_{\\text{term}} = \\frac{2r^2 g(\\rho_s - \\rho_f)}{9\\eta}$$. If $$\\rho_s = \\rho_f$$, then $$(\\rho_s - \\rho_f) = 0$$, so $$v_{\\text{term}} = 0$$. The sphere doesn't fall at all.\n- Step 2: Physically: if the sphere has the same density as the fluid, its weight exactly equals the upthrust (since it displaces fluid of equal mass). With weight and upthrust perfectly balanced, there's no net downward force to drive motion, and no viscous drag builds up. The sphere is **neutrally buoyant** — it stays wherever you place it in the fluid.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": false}, {"question": "Pressure at depth $$h$$ in a fluid is $$P = \\rho g h$$. Why is a dam wall thicker at the bottom than at the top? (2 steps)", "answer": "- Step 1: Pressure in a fluid increases with depth: $$P = \\rho g h$$. At the bottom of the dam, $$h$$ is large, so the water pressure is much greater. At the top, $$h$$ is small and pressure is low.\n- Step 2: The dam wall must be thicker at the bottom to withstand the greater pressure (force per unit area) trying to push the wall over. A thin wall at the bottom would fail because the force from the water ($$F = P \\times A$$) would exceed the wall's structural strength.", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": false}, {"question": "A student says \"during a phase change, the temperature stays constant because you stop heating the substance.\" Explain why this is wrong. (2 steps)", "answer": "- Step 1: This is a common misconception. During a phase change, you **continue to supply energy** — the temperature stays constant *despite* ongoing heating. The flat section on the heating curve represents continuous energy input with zero temperature change.\n- Step 2: The energy is being absorbed as **latent heat** — it goes into breaking (or forming) intermolecular bonds, which changes the potential energy of the molecules without changing their kinetic energy. Since temperature depends only on KE, the temperature doesn't change. It's not that you stopped heating — it's that the energy has a different job to do.", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": false}, {"question": "Which has a higher internal energy: 1 kg of ice at 0 °C or 1 kg of water at 0 °C? By how much? (3 steps)", "answer": "- Step 1: Both are at the same temperature (0 °C), so their molecules have the same average kinetic energy. But they differ in potential energy.\n- Step 2: In water at 0 °C, the intermolecular bonds have been partially broken compared to ice at 0 °C. The molecules are further apart (for water, slightly — water is anomalous) and can move past each other. This means the potential energy is higher in the liquid.\n- Step 3: The difference in internal energy is exactly the **latent heat of fusion**: $$\\Delta U = mL_f = 1 \\times 334\\,000 = 334\\,000\\ \\text{J} = 334\\ \\text{kJ}$$. Water at 0 °C has 334 kJ more internal energy than ice at 0 °C, all stored as potential energy.", "source": "GLM 5.1 ③", "_id": "glm_3_45", "judge_pick": true}, {"question": "A student claims \"if the temperature of a gas doubles from 20 °C to 40 °C, the average KE of the molecules doubles.\" Is this correct? Justify with calculations. (3 steps)", "answer": "- Step 1: The equation $$E_k = \\frac{3}{2}kT$$ requires **Kelvin** temperature. Average KE is proportional to *absolute* temperature, not Celsius temperature.\n- Step 2: Convert: 20 °C = 293 K, 40 °C = 313 K. The ratio of KEs is $$\\frac{T_2}{T_1} = \\frac{313}{293} \\approx 1.07$$. The average KE increases by only about 7%, not 100%.\n- Step 3: For KE to truly double, you'd need $$T_2 = 2T_1 = 2 \\times 293 = 586\\ \\text{K} = 313\\ \\text{°C}$$. You'd have to heat from 20 °C to 313 °C — not to 40 °C. This is why the Kelvin scale is essential for gas law calculations.", "source": "GLM 5.1 ③", "_id": "glm_3_46", "judge_pick": false}, {"question": "Water is unusual because it expands when it freezes (most substances contract). What does this mean for the arrangement of water molecules in ice vs liquid water? (2 steps)", "answer": "- Step 1: For water, the solid (ice) has molecules that are *slightly more spread out* than in the liquid. This is because ice forms an open hexagonal lattice structure held together by hydrogen bonds, which spaces molecules farther apart than in liquid water where molecules can pack more closely.\n- Step 2: This is why ice floats on water (it's less dense), and why pipes burst when water freezes — the expanding ice exerts enormous pressure. Virtually every other substance has a solid phase that is denser than its liquid phase and sinks.", "source": "GLM 5.1 ③", "_id": "glm_3_47", "judge_pick": true}, {"question": "If you plot pressure vs temperature in °C for an ideal gas at constant volume, you get a straight line that crosses the x-axis at −273 °C. Why does this happen, and what is the physical significance of this intercept? (3 steps)", "answer": "- Step 1: The Pressure law says $$P \\propto T$$ (in Kelvin). Plotting $$P$$ vs $$T$$ in Kelvin gives a straight line through the origin. But when you relabel the x-axis in °C (shifted by 273), the line still has the same slope but now crosses the x-axis at −273 °C.\n- Step 2: At this intercept, $$P = 0$$. Zero pressure means molecules exert no force on the container walls — they have stopped moving. This corresponds to the point where all molecular kinetic energy has been removed.\n- Step 3: This intercept is **absolute zero**. The experiment of extrapolating a pressure-temperature graph to find where $$P = 0$$ was historically how absolute zero was determined experimentally. It's a fundamental limit of nature, not just an arbitrary point on a graph.", "source": "GLM 5.1 ③", "_id": "glm_3_48", "judge_pick": true}, {"question": "The average KE of a gas molecule is $$E_k = \\frac{3}{2}kT$$. Why is there a factor of $$\\frac{3}{2}$$ and not just 1? What does the \"3\" represent physically? (3 steps)", "answer": "- Step 1: The \"3\" comes from the **three degrees of freedom** of a monatomic gas molecule in 3D space. A molecule can move independently in the x, y, and z directions — that's 3 independent ways to have kinetic energy.\n- Step 2: By the **equipartition theorem**, each degree of freedom contributes $$\\frac{1}{2}kT$$ to the average energy. So 3 degrees of freedom × $$\\frac{1}{2}kT$$ each = $$\\frac{3}{2}kT$$.\n- Step 3: This means: $$\\frac{1}{2}kT$$ from x-motion + $$\\frac{1}{2}kT$$ from y-motion + $$\\frac{1}{2}kT$$ from z-motion = $$\\frac{3}{2}kT$$ total. Each spatial dimension contributes equally to the kinetic energy on average. This is a deep result from statistical mechanics.", "source": "GLM 5.1 ③", "_id": "glm_3_49", "judge_pick": false}, {"question": "A real gas is at high pressure and low temperature. In what two ways does it deviate from ideal gas behaviour, and what would happen if you tried to use $$PV = nRT$$? (3 steps)", "answer": "- Step 1: At high pressure, molecules are forced close together. Their own **molecular volume** is no longer negligible compared to the container volume. The actual volume available for molecules to move in is less than $$V$$ — it's roughly $$V - nb$$ (where $$b$$ accounts for molecular volume).\n- Step 2: At low temperature (and/or high pressure), **intermolecular forces** become significant. Attractive forces between molecules reduce the pressure compared to what an ideal gas would exert (molecules are pulled back from the walls slightly).\n- Step 3: If you used $$PV = nRT$$, you would find that the measured $$P$$ is *lower* than predicted (attraction reduces pressure) and/or the measured $$V$$ is *lower* than predicted (molecules take up space). The van der Waals equation corrects for both effects.", "source": "GLM 5.1 ③", "_id": "glm_3_50", "judge_pick": true}, {"question": "A sphere of radius 2 mm falls through oil and reaches terminal velocity. If the same material is shaped into a cube of the same volume, would Stokes' law still apply? Why or why not? (2 steps)", "answer": "- Step 1: **No**, Stokes' law would not apply. One of the four conditions for Stokes' law is that the object must be **spherical**. A cube creates turbulent flow at its corners and edges, disrupting the laminar flow assumption.\n- Step 2: Additionally, the drag formula $$F = 6\\pi\\eta r v$$ contains $$r$$ (radius), which is only defined for spheres. For non-spherical objects, the relationship between drag and velocity is more complex and depends on the object's orientation and shape. This is why viscosity experiments always use small, smooth ball bearings.", "source": "GLM 5.1 ③", "_id": "glm_3_51", "judge_pick": true}, {"question": "In the Boyle's law practical (Core Practical 14), why must you wait a few seconds after adding a mass before recording the volume? (2 steps)", "answer": "- Step 1: When you add a mass to the plunger, you do **work** on the gas by compressing it. This work transfers energy to the gas, temporarily raising its temperature. Since Boyle's law requires constant temperature, you must wait for the gas to **cool back to room temperature** (thermal equilibrium with surroundings).\n- Step 2: If you record the volume immediately, the gas would be slightly warmer than room temperature, and the reading would not satisfy $$PV = \\text{constant}$$ at the correct temperature. Waiting ensures the temperature is truly constant — the control variable is properly controlled.", "source": "GLM 5.1 ③", "_id": "glm_3_52", "judge_pick": false}, {"question": "To verify Boyle's law experimentally, you plot a graph. Should you plot P vs V, or P vs 1/V? Explain what each graph would look like and why. (3 steps)", "answer": "- Step 1: Boyle's law states $$PV = \\text{constant}$$, meaning $$P = \\frac{\\text{constant}}{V}$$. This is an **inverse** relationship — a plot of $$P$$ vs $$V$$ would give a **hyperbola** (curve), which is hard to verify precisely.\n- Step 2: Instead, plot $$P$$ vs $$\\frac{1}{V}$$. Rearranging: $$P = \\text{constant} \\times \\frac{1}{V}$$. This is the equation of a **straight line through the origin** with gradient = the constant.\n- Step 3: If your data points lie on a straight line through the origin on a $$P$$ vs $$1/V$$ plot, you've confirmed Boyle's law. The gradient gives you the value of the constant ($$PV$$). This is much more convincing than fitting a curve to a hyperbola.", "source": "GLM 5.1 ③", "_id": "glm_3_53", "judge_pick": true}, {"question": "An object weighs 80 N in air. When fully submerged in water, it experiences 60 N of upthrust. What is the net force and direction? Will it float or sink? (2 steps)", "answer": "- Step 1: Net force = weight − upthrust = 80 − 60 = **20 N downward**. The object sinks because the upthrust (even when fully submerged) is less than its weight.\n- Step 2: If the object were less dense than water, fully submerging it would produce upthrust > 80 N, and it would rise to the surface, floating with only enough volume submerged to make upthrust = 80 N. Since full submersion only gives 60 N, it can never achieve equilibrium — it sinks to the bottom.", "source": "GLM 5.1 ③", "_id": "glm_3_54", "judge_pick": true}, {"question": "The pressure at the surface of a lake is atmospheric pressure (~100 kPa). The density of water is 1000 kg/m³. At what depth is the total pressure 250 kPa? (3 steps)", "answer": "- Step 1: Total pressure at depth $$h$$ = atmospheric pressure + pressure due to fluid column: $$P_{\\text{total}} = P_{\\text{atm}} + \\rho g h$$.\n- Step 2: So: $$250\\,000 = 100\\,000 + 1000 \\times 9.81 \\times h$$. Therefore: $$150\\,000 = 9810h$$, giving $$h = \\frac{150\\,000}{9810} \\approx 15.3\\ \\text{m}$$.\n- Step 3: The answer is approximately **15 m**. Note: the extra 150 kPa comes entirely from the weight of the water above — each ~10 m of water depth adds about 1 atmosphere of pressure. This is why deep-sea divers need pressurized suits.", "source": "GLM 5.1 ③", "_id": "glm_3_55", "judge_pick": false}, {"question": "Why is it that evaporating 1 kg of water requires roughly 7 times more energy than melting 1 kg of ice? Explain in terms of what happens to the molecules. (3 steps)", "answer": "- Step 1: **Melting** (fusion, ~334 kJ/kg): you only need to *loosen* the intermolecular bonds enough so molecules can slide past each other. The molecules remain close together — you're changing from an ordered close arrangement to a disordered close arrangement.\n- Step 2: **Boiling** (vaporisation, ~2260 kJ/kg): you need to *completely overcome* all intermolecular attractions and separate molecules until they are far apart with negligible forces between them. You're fighting the attractive forces through the entire separation distance.\n- Step 3: It's analogous to pulling magnets apart: slightly separating them (melting) is easy, but pulling them far apart where they no longer attract (boiling) requires much more total work because you're applying force over a much greater distance. The ratio ~7:1 reflects how much more total energy is needed for complete separation vs partial loosening.", "source": "GLM 5.1 ③", "_id": "glm_3_56", "judge_pick": true}, {"question": "A student says \"internal energy and temperature are the same thing.\" Give a specific counterexample that proves this wrong. (2 steps)", "answer": "- Step 1: Consider 1 kg of ice at 0 °C being converted to 1 kg of water at 0 °C. The temperature is identical (0 °C) throughout, but the internal energy *increases* by 334 kJ as latent heat is absorbed.\n- Step 2: This proves that internal energy can change *without* any temperature change. Temperature measures only the kinetic energy component; internal energy includes both kinetic and potential energy. They are related but emphatically not the same thing.", "source": "GLM 5.1 ③", "_id": "glm_3_57", "judge_pick": false}, {"question": "A sealed container of ideal gas is at 20 °C and 100 kPa. If the temperature is increased to 40 °C (not Kelvin!), will the pressure exactly double? Explain. (2 steps)", "answer": "- Step 1: **No**, the pressure will not double. The Pressure law says $$P \\propto T$$ where $$T$$ is in **Kelvin**, not Celsius. The temperature increases from 293 K to 313 K — a factor of 313/293 ≈ 1.07, not 2.0.\n- Step 2: The new pressure would be approximately 107 kPa, not 200 kPa. This is a classic exam trap: using Celsius in gas law calculations. Always convert to Kelvin first.", "source": "GLM 5.1 ③", "_id": "glm_3_58", "judge_pick": true}, {"question": "In the viscosity experiment (Core Practical 2), rubber bands are placed around the tube at different heights. Why must the first rubber band be far enough below the liquid surface? (2 steps)", "answer": "- Step 1: The ball bearing must reach **terminal velocity** before it passes the first marker. When first dropped, the ball accelerates under gravity — it takes some distance for drag to build up enough to balance weight.\n- Step 2: If the first rubber band is too close to the surface, the ball would still be accelerating when you start timing, and the measured velocity wouldn't be the terminal velocity. Placing the first marker well below the surface ensures the ball has reached constant speed before any measurements begin.", "source": "GLM 5.1 ③", "_id": "glm_3_59", "judge_pick": true}, {"question": "In the viscosity experiment, why should the measuring cylinder have a large diameter compared to the ball bearing? (2 steps)", "answer": "- Step 1: If the ball is too close to the cylinder walls, the flow pattern around the ball is affected by the walls. This creates additional pressure differences and flow disturbances that alter the drag force from what Stokes' law predicts.\n- Step 2: A large-diameter cylinder ensures the ball falls through effectively \"infinite\" fluid — the walls are far enough away that they don't influence the flow around the ball. This is necessary for the laminar flow conditions that Stokes' law assumes.", "source": "GLM 5.1 ③", "_id": "glm_3_60", "judge_pick": false}, {"question": "The equation for the number of molecules in a gas is $$N = \\frac{PV}{kT}$$. If you have a gas at pressure $$4.5 \\times 10^7$$ Pa, volume $$8.3 \\times 10^{-3}\\ \\text{m}^3$$, and temperature 288 K, estimate the order of magnitude of $$N$$. (3 steps)", "answer": "- Step 1: Substitute into $$N = \\frac{PV}{kT}$$: $$N = \\frac{4.5 \\times 10^7 \\times 8.3 \\times 10^{-3}}{1.38 \\times 10^{-23} \\times 288}$$\n- Step 2: Numerator: $$4.5 \\times 10^7 \\times 8.3 \\times 10^{-3} \\approx 37 \\times 10^4 = 3.7 \\times 10^5$$. Denominator: $$1.38 \\times 10^{-23} \\times 288 \\approx 400 \\times 10^{-23} = 4 \\times 10^{-21}$$.\n- Step 3: $$N \\approx \\frac{3.7 \\times 10^5}{4 \\times 10^{-21}} \\approx 10^{26}$$ molecules. This is order of magnitude $$10^{25}\\text{–}10^{26}$$ — an enormous number, consistent with a high-pressure gas cylinder containing roughly a mole-scale quantity of molecules.", "source": "GLM 5.1 ③", "_id": "glm_3_61", "judge_pick": false}, {"question": "Explain the difference between laminar and turbulent flow. Which one does Stokes' law apply to, and what happens to the drag force relationship in the other? (3 steps)", "answer": "- Step 1: **Laminar flow**: fluid flows in smooth, parallel layers that don't mix. Each layer slides past adjacent layers. Think of cards in a deck being pushed smoothly. This occurs at low speeds with smooth objects.\n- Step 2: **Turbulent flow**: fluid layers mix chaotically, forming eddies and vortices. This occurs at high speeds or with non-smooth objects. Energy is wasted in chaotic mixing.\n- Step 3: Stokes' law ($$F = 6\\pi\\eta r v$$, drag ∝ $$v$$) applies *only* to laminar flow. In turbulent flow, drag is proportional to $$v^2$$ — it increases much more rapidly with speed. This is why cars experience much more drag at high speed than the linear relationship would predict.", "source": "GLM 5.1 ③", "_id": "glm_3_62", "judge_pick": false}, {"question": "If you have 1 mol of an ideal gas at 300 K in a 0.025 m³ container, use the ideal gas equation to find the pressure. Is this close to atmospheric pressure? (3 steps)", "answer": "- Step 1: Using $$PV = nRT$$: $$P = \\frac{nRT}{V} = \\frac{1 \\times 8.31 \\times 300}{0.025}$$\n- Step 2: Numerator: $$8.31 \\times 300 = 2493$$. So $$P = \\frac{2493}{0.025} = 2493 \\times 40 = 99\\,720\\ \\text{Pa} \\approx 99.7\\ \\text{kPa}$$.\n- Step 3: Atmospheric pressure is ~101 kPa, so this is very close — just slightly below. This makes sense: 1 mol of gas at room temperature (300 K) in roughly 25 litres (0.025 m³) should be near atmospheric pressure, since these are approximately standard conditions.", "source": "GLM 5.1 ③", "_id": "glm_3_63", "judge_pick": false}, {"question": "A student mixes up the two ideal gas equations and writes $$PV = NkT$$ using $$N$$ for moles and $$k$$ for the molar gas constant. What is wrong with this? (2 steps)", "answer": "- Step 1: In $$PV = NkT$$, $$N$$ is the **number of molecules** (a huge number like $$10^{23}$$), and $$k$$ is the **Boltzmann constant** ($$1.38 \\times 10^{-23}\\ \\text{J K}^{-1}$$). In $$PV = nRT$$, $$n$$ is the **number of moles** (a small number like 1 or 2), and $$R$$ is the **molar gas constant** ($$8.31\\ \\text{J mol}^{-1}\\text{K}^{-1}$$).\n- Step 2: If you used $$N$$ (number of molecules) with $$R$$ (molar constant), the product $$NR$$ would be enormous — giving a wildly wrong answer. The key relationship is $$Nk = nR$$ (since $$N = nN_A$$ and $$k = R/N_A$$). Always check: if your count is in moles, use $$R$$; if it's in molecules, use $$k$$.", "source": "GLM 5.1 ③", "_id": "glm_3_64", "judge_pick": false}, {"question": "During an experiment, a student observes that a gas doesn't follow Boyle's law exactly at high pressures — the PV product decreases slightly instead of staying constant. Which ideal gas assumption is breaking down, and why? (2 steps)", "answer": "- Step 1: At high pressures, the **assumption of negligible molecular volume** breaks down. The molecules themselves take up a significant fraction of the container volume, so the actual space available for molecules to move in is less than the measured $$V$$.\n- Step 2: The \"effective\" volume is $$V - Nb$$ (where $$b$$ is related to molecular volume). Since the usable volume is less than $$V$$, the product $$PV$$ appears to decrease at high $$P$$ — the molecules are more confined than the ideal gas equation assumes. This is the first correction in the van der Waals equation of state.", "source": "GLM 5.1 ③", "_id": "glm_3_65", "judge_pick": false}, {"question": "The internal energy of an ideal gas is entirely kinetic — there is no potential energy component. Why? (2 steps)", "answer": "- Step 1: By definition, an ideal gas has **negligible intermolecular forces** (except during instantaneous collisions). Since potential energy arises from intermolecular forces and separations, no forces means no potential energy.\n- Step 2: Therefore, for an ideal gas, internal energy = total kinetic energy only. This means that for an ideal gas, internal energy IS directly proportional to temperature: $$U = \\frac{3}{2}NkT$$ (for monatomic gases). Heating an ideal gas always increases its temperature — there are no phase changes to absorb energy as potential energy.\n\nThis is why the ideal gas model is simpler than real gases — no phase changes, no latent heat, just KE ∝ T.", "source": "GLM 5.1 ③", "_id": "glm_3_66", "judge_pick": false}, {"question": "What happens to the internal energy of a real gas when it expands adiabatically (no heat exchange)? Does its temperature change? (2 steps)", "answer": "- Step 1: In a real gas, molecules have attractive forces between them. When the gas expands, molecules move further apart, increasing their **potential energy** (like pulling magnets apart stores energy). Since no heat is supplied (adiabatic), this extra PE comes from the **kinetic energy** of the molecules.\n- Step 2: As KE decreases, the **temperature drops**. This is why a released pressurised gas feels cold — adiabatic expansion converts KE to PE, cooling the gas. An ideal gas wouldn't cool in this way (no intermolecular forces → no PE change → KE stays the same).\n\nThis is the principle behind refrigeration and how aerosol cans feel cold when sprayed.", "source": "GLM 5.1 ③", "_id": "glm_3_67", "judge_pick": true}], "count": 68}, "qwen_1": {"label": "Qwen 3 ①", "cards": [], "count": 0}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Define density, its SI unit, and explain why units like kg m⁻³ are used instead of g cm⁻³ in physics. (1 step)", "answer": "- Step 1: Density (ρ) is mass per unit volume; ρ = m/V. SI unit is kg m⁻³ because standard SI units (kg, m) ensure consistency in equations like F = ma (where force is in newtons, kg·m/s²), avoiding unit conversions that complicate calculations.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "How does the particle arrangement in solids, liquids, and gases explain their relative densities? Include an example of an exception. (3 steps)", "answer": "- Step 1: **Solids** have particles in fixed, regular positions with strong bonds, packed closely → highest density (e.g., iron).\n- Step 2: **Liquids** have particles close but irregular, with weaker bonds → slightly less dense than solids (e.g., water).\n- Step 3: **Gases** have particles far apart → lowest density. Exception: Ice (solid water) is less dense than liquid water due to hexagonal crystalline structure creating gaps.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Why do particles in solids still have kinetic energy despite fixed positions? (1 step)", "answer": "- Step 1: Solids vibrate about fixed positions. Vibration implies motion, which means particles have kinetic energy. Temperature measures this average KE; at absolute zero, vibrations nearly stop.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "Explain how latent heat during phase changes affects a substance’s internal energy without changing its temperature. (2 steps)", "answer": "- Step 1: During phase changes (e.g., melting), energy breaks intermolecular bonds (raises potential energy) rather than increasing kinetic energy. Since temperature reflects average KE, it stays constant.\n- Step 2: Internal energy (U) = KE (temperature-related) + PE (bond-related). Latent heat increases PE, so U increases even if KE (temperature) doesn’t.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Why is Kelvin temperature scale essential in gas laws like PV = nRT? (1 step)", "answer": "- Step 1: Kelvin (T) is proportional to average molecular KE. Using Celsius (θ) could lead to negative values, implying zero or negative KE, which is unphysical. PV = nRT requires absolute temperature (proportional to KE).", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "Derive the formula for upthrust using Archimedes’ principle. (2 steps)", "answer": "- Step 1: Upthrust = weight of displaced fluid. For a submerged object, displaced fluid volume equals object’s volume (V). \n- Step 2: Weight = mass × gravity. Mass = ρ_fluid × V. → Upthrust = ρ_fluid × V × g. (Note: Object’s shape doesn’t affect upthrust; only V matters.)", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Why does a ship float even if made of dense material like steel? (2 steps)", "answer": "- Step 1: Ship displaces a volume of water whose weight equals the ship’s total weight. Despite steel’s high density, the ship’s **average density** (total mass/total volume) is less than water.\n- Step 2: Hollow structure increases ship’s volume without increasing mass, lowering average density below 1000 kg/m³ (density of water).", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "When calculating terminal velocity with Stokes’ law, why must flow be laminar and the object spherical? (2 steps)", "answer": "- Step 1: Stokes’ law (F = 6πηrv) assumes smooth, non-turbulent flow (laminar), where viscous drag dominates. Turbulent flow creates eddies, invalidating the linear drag relation.\n- Step 2: Spherical objects have uniform flow around them. Non-spherical shapes (e.g., cubes) cause uneven drag and turbulent flow, violating assumptions.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "How does RMS speed (c_rms) relate to gas temperature and molar mass? (1 step)", "answer": "- Step 1: c_rms = √(3RT/M). Higher temperature (T) increases speed; higher molar mass (M) decreases speed. At 300 K, helium (M=4 g/mol) has higher c_rms than oxygen (M=32 g/mol).", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "Explain why ice floats on water using the concept of density. (1 step)", "answer": "- Step 1: Ice has a hexagonal crystalline structure with hydrogen bonds creating extra space between molecules, making ice ~9% less dense than liquid water. Buoyancy (upthrust) > weight, so it floats.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "During a phase change graph (temp vs. energy), why are the flat sections longer for latent heat of vaporization than fusion? (1 step)", "answer": "- Step 1: Vaporization requires more energy to completely break intermolecular bonds (gas: particles far apart) versus fusion, which only loosens bonds (liquid: particles still touching). Water’s latent heat of vaporization (~2260 kJ/kg) > fusion (~334 kJ/kg).", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "How does the kinetic theory explain pressure exerted by gas molecules on container walls? (3 steps)", "answer": "- Step 1: Gas molecules collide elastically with the container walls. Each collision transfers momentum (Δp = 2mv_x) → force.\n- Step 2: Force per unit area (P = F/A) arises from countless collisions. More collisions (higher density or speed) → higher pressure.\n- Step 3: Heating increases molecular speed (KE ∝ T), leading to more frequent and forceful collisions → pressure rises.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}, {"question": "Why does a balloon expand when heated (Charles’ law)? Use particle motion and pressure. (2 steps)", "answer": "- Step 1: Heating increases molecular speed (KE ∝ T) and collision frequency. This would raise pressure, but if volume increases (balloon expands), collision frequency drops.\n- Step 2: At constant pressure (atmospheric), volume expands to balance increased KE and reduced collision rate, so P remains constant.", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": false}, {"question": "Explain why viscosity of liquids decreases with temperature, but increases in gases. (2 steps)", "answer": "- Step 1: In liquids, higher temperature increases molecular spacing, reducing cohesive forces between layers → easier flow (lower viscosity, e.g., honey liquefying).\n- Step 2: In gases, higher temperature increases molecular speeds and momentum exchange between layers → greater resistance (higher viscosity, e.g., hot air is more viscous).", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "What is the significance of the Maxwell-Boltzmann distribution in kinetic theory? (1 step)", "answer": "- Step 1: The distribution shows molecular speeds in a gas. While average speed relates to temperature, some particles move very fast (high energy), enabling phenomena like evaporation and reaction rates.", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": false}], "count": 15}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "You have a 2 kg block of aluminum (c = 900 J/kg·K) and a 2 kg block of water (c = 4200 J/kg·K), both starting at 20°C. If you add 10,000 J of thermal energy to each, which one ends up hotter? By how much? Explain using the specific heat capacity concept. (2 steps)", "answer": "- Step 1: Use the formula ΔE = mcΔθ. Rearranging: Δθ = ΔE / (mc)\n+ For aluminum: Δθ = 10,000 / (2 × 900) = 10,000 / 1800 ≈ 5.6 K\n+ For water: Δθ = 10,000 / (2 × 4200) = 10,000 / 8400 ≈ 1.2 K\n- Step 2: The aluminum ends up much hotter (5.6°C rise vs 1.2°C for water). This is because water has a **high specific heat capacity** — it requires much more energy to change its temperature. This is why water is excellent for cooling systems and central heating: it absorbs lots of heat with only small temperature rises.\n\nThe lower the specific heat capacity, the hotter a material gets for the same energy input.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": true}, {"question": "Explain why the Kelvin scale is essential for gas law calculations, while the Celsius scale can be used for heat capacity calculations. (2 steps)", "answer": "- Step 1: For heat capacity (ΔE = mcΔθ), we use Δθ — the *change* in temperature. Since 1 K = 1°C (same size degree), the numerical value of Δθ is identical in both scales. This is why we can use either.\n- Step 2: For gas laws (PV = nRT, etc.), absolute temperature T appears in the relationship — not a change. The Kelvin scale starts at absolute zero (0 K = -273.15°C), where gas particles have minimum kinetic energy. Using Celsius would give incorrect proportional relationships because the zero-points differ.\n+ Example: Doubling temperature from 273 K to 546 K correctly doubles average kinetic energy. Doubling from 0°C to 273°C (or 0°C to 273 K) makes no physical sense.\n\n**Key rule:** Always use Kelvin for gas law calculations involving absolute temperature.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": true}, {"question": "A gas is in a sealed container at constant volume. If you double the absolute temperature (in Kelvin), what happens to the pressure? Explain using kinetic theory at the molecular level. (3 steps)", "answer": "- Step 1: From the pressure-temperature law (P ∝ T at constant V and n), doubling the absolute temperature doubles the pressure.\n- Step 2: At the molecular level, doubling the temperature doubles the average kinetic energy of each molecule (since E_k ∝ T).\n- Step 3: This means molecules hit the walls:\n+ With twice the kinetic energy, each collision delivers twice the momentum change (more force per hit)\n+ They also hit the walls more frequently (faster speed)\n+ Since pressure = force/area, and the force per collision and collision frequency both increase, pressure doubles\n\n**Misconception check:** The pressure doesn't double because there are more molecules — the number stays constant. It doubles because each molecule hits harder and more often.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": true}, {"question": "A weather balloon rises through the atmosphere. As it rises, the external air pressure decreases. If the balloon's elastic skin maintains constant gas volume inside, what happens to the pressure of the gas inside? Explain using Boyle's Law and the molecular mechanism. (3 steps)", "answer": "- Step 1: Boyle's Law states P₁V₁ = P₂V₂ for constant temperature. Since volume is constant, this doesn't directly apply — but we consider what's happening.\n- Step 2: As external pressure drops, the balloon expands slightly. Wait — the question says the skin maintains constant volume. So the gas is compressed less by the outside air. The internal pressure decreases to match the lower external pressure.\n+ At molecular level: fewer external air molecules hit the balloon from outside\n+ Inside the balloon, the same number of gas molecules now collide less frequently with the walls (because there's less \"push back\" from outside)\n- Step 3: The key insight: for a rigid container, pressure ∝ number density × temperature. For a flexible container at constant temperature, the pressure adjusts until it equals the external pressure minus any elastic tension in the skin.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "A solid steel ball sinks in water, but the same-sized hollow steel ball floats. Using the concept of upthrust and density, explain why this happens. (3 steps)", "answer": "- Step 1: Upthrust (Archimedes' principle) equals the weight of fluid displaced: U = ρ_fluid × V_displaced × g\n- Step 2: For the solid ball, its average density ρ_ball > ρ_water, so its weight W = m_ball × g = ρ_ball × V × g is greater than the maximum upthrust (when fully submerged: U_max = ρ_water × V × g). Result: W > U, so it sinks.\n- Step 3: For the hollow ball, the interior contains air (ρ_air ≈ 1.2 kg/m³). This significantly reduces the average density of the hollow ball. If ρ_hollow_ball < ρ_water, then when partially submerged: W = ρ_hollow × V × g < U (which is based on displaced water weight). The ball floats!\n+ The hollow ball displaces just enough water (less than its total volume) so that U = W at equilibrium\n\n**Key principle:** It's the **average density** (total mass ÷ total volume) that determines floating, not the material density alone.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": true}, {"question": "A sphere falls through a viscous fluid. Describe all the forces acting on it and explain why it eventually reaches a constant (terminal) velocity. (3 steps)", "answer": "- Step 1: Three forces act on the falling sphere:\n+ **Weight (W):** downward = m_sphere × g = ρ_s × V × g\n+ **Upthrust (U):** upward = ρ_f × V × g (weight of fluid displaced)\n+ **Viscous drag (F_d):** upward = 6πηrv (from Stokes' law)\n- Step 2: Initially, when the sphere is released, velocity v = 0, so drag F_d = 0. Net force = W - U (downward), so it accelerates.\n- Step 3: As speed increases, drag F_d increases (it's proportional to v). Eventually: W = U + F_d, so net force = 0. By Newton's First Law, the object continues at this constant velocity — the terminal velocity.\n+ Mathematically: v_terminal = [2r²g(ρ_s - ρ_f)] / (9η)\n+ Notice: v ∝ r² — doubling radius quadruples terminal velocity", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "Why does Stokes' law (F = 6πηrv) fail for a person skydiving from a plane, even though they're roughly spherical? (2 steps)", "answer": "- Step 1: Stokes' law applies only under specific conditions:\n+ **Laminar (smooth) flow** — layers of fluid move parallel to each other\n+ **Small objects** — compared to the fluid's viscosity scale\n+ **Low speeds** — where drag is proportional to velocity\n- Step 2: A skydiving human at terminal velocity (≈50-60 m/s in freefall) creates **turbulent flow**. At high speeds, drag becomes proportional to v², not v. The streamlined shape matters greatly, and the Reynolds number (which predicts laminar vs turbulent flow) is vastly exceeded.\n+ Skydivers achieve terminal velocity where weight = drag (ignoring upthrust since air density is low), but the drag equation is F_d = ½ρAv²C_d, not Stokes' law\n\nStokes' law works for small spheres in liquids (like ball bearings in oil) at low speeds.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "A proton consists of two up quarks (charge +2/3e each) and one down quark (charge -1/3e). A neutron consists of one up quark and two down quarks. Verify these give the correct total charges, and explain why this matters for atomic physics. (2 steps)", "answer": "- Step 1: Let's sum the charges:\n+ Proton: uud → (+2/3) + (+2/3) + (-1/3) = (+4/3 - 1/3) = +1e ✓\n+ Neutron: udd → (+2/3) + (-1/3) + (-1/3) = (0) = 0e ✓\n- Step 2: This explains why:\n+ Proton (charge +1) attracts electrons (charge -1) to form neutral atoms\n+ Neutron (charge 0) adds mass but doesn't affect electric charge\n+ The quark structure explains why protons repel each other (same charge), but the strong nuclear force holds them together in the nucleus\n+ Isotopes differ by neutron number but have the same chemical behavior (same proton number = same electron count)\n\nThis is fundamental to understanding atomic structure and why chemistry works the way it does.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": true}, {"question": "When you heat a gas in a rigid container, the pressure increases. A student says this is \"because the molecules hit the walls harder.\" Is this complete? Explain what else is happening at the molecular level. (3 steps)", "answer": "- Step 1: The student is partially correct — molecules do hit harder (higher kinetic energy), but there's more to the story.\n- Step 2: At constant volume, when temperature increases:\n+ Each molecule has **more kinetic energy** (they hit harder → more momentum change per collision)\n+ Each molecule moves **faster** (more collisions per second → higher frequency)\n+ Since pressure = force/area, and force = momentum change per collision × collisions per second, both factors contribute to increased pressure\n- Step 3: From kinetic theory: PV = ⅓Nm⟨c²⟩. At constant V and N, if average kinetic energy (∝ ⟨c²⟩) doubles, then P must double. Both the force per collision AND the collision rate increase together.\n\n**Complete explanation:** Pressure increases because molecules both collide **more frequently** and with **greater momentum transfer** per collision.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "Explain why evaporating 1 kg of water requires roughly seven times more energy than melting 1 kg of ice, using the concept of intermolecular forces. (2 steps)", "answer": "- Step 1: Melting (ice → water at 0°C): Energy breaks some intermolecular bonds so molecules can slide past each other. Molecules remain relatively close — they're still attracted to each other.\n- Step 2: Evaporating (water → steam at 100°C): Energy must **completely overcome** all intermolecular attractive forces. Molecules separate completely and become independent gas particles with essentially no forces between them.\n+ Latent heat of vaporization (≈2.26 MJ/kg) ≈ 7 × latent heat of fusion (≈334 kJ/kg)\n+ The factor of ~7 reflects how much more energy is needed to fully separate molecules vs. just loosen them\n\n**Physical picture:** Melting is like loosening a tight group hug; evaporating is like pulling people completely apart and sending them to opposite corners of the room.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "In a cooling curve experiment, the temperature stays constant for several minutes while a substance changes from liquid to solid. A student claims \"the cooling has stopped.\" How would you correct this misconception? (2 steps)", "answer": "- Step 1: The cooling has NOT stopped — thermal energy is still being removed from the substance. The temperature stays constant because the removed energy is being used for **bond formation** (latent heat of fusion being released), not for decreasing molecular kinetic energy.\n- Step 2: During this plateau:\n+ Energy is continuously flowing OUT of the substance (cooling is occurring)\n+ This energy comes from molecules forming stronger intermolecular bonds as they lock into solid positions\n+ The potential energy of the molecules decreases\n+ The kinetic energy (and thus temperature) stays constant until all molecules have solidified\n\n**Analogy:** It's like a team building a brick wall — work is still being done (bricks being placed), even though the \"height\" (temperature) isn't changing while the structure is being built.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": true}, {"question": "Two identical sealed syringes contain the same number of gas molecules at the same temperature. One is compressed to half its volume. Compare the pressure and average kinetic energy of the molecules in the compressed vs. uncompressed syringe. (3 steps)", "answer": "- Step 1: Pressure: From Boyle's Law (P₁V₁ = P₂V₂ at constant T), when volume halves (V₂ = ½V₁), the pressure doubles (P₂ = 2P₁).\n- Step 2: Average kinetic energy: This stays THE SAME in both syringes. Why? Because temperature is the same, and average KE ∝ absolute temperature (E_k = ³⁄₂kT). Temperature didn't change.\n- Step 3: But here's the subtlety: More molecules now occupy the smaller volume per unit space (increased number density). So:\n+ Each molecule has the same average KE (same temperature)\n+ But there are more collisions per second with the walls (higher collision frequency)\n+ Therefore more force per unit area → higher pressure\n\n**Key insight:** Pressure increase comes from more collisions per second, not from each collision being \"harder.\"", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "A hot air balloon rises. As it gains altitude, the temperature inside stays the same, but the balloon expands slightly. What happens to: (a) the density of the air inside, (b) the buoyant force? Explain. (2 steps)", "answer": "- Step 1: (a) The density of air inside decreases. Here's why:\n+ Temperature same → average KE of molecules same\n+ But balloon volume increases slightly (expands as external pressure drops)\n+ Same mass of air now occupies more volume → ρ = m/V decreases\n- Step 2: (b) The buoyant force (upthrust) depends on weight of displaced air: U = ρ_external × V_displaced × g\n+ As balloon rises, external air density ρ_external decreases (at higher altitude, air is thinner)\n+ But balloon also expands, increasing its displaced volume\n+ Typically, the decrease in external air density dominates, so upthrust decreases\n+ Eventually, upthrust = weight, and the balloon stops rising (reaches equilibrium altitude)", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": true}, {"question": "You need to find the density of an irregularly shaped rock. Describe a method using only a measuring cylinder, water, and a balance. (3 steps)", "answer": "- Step 1: **Measure rock mass** using the balance. Let's call this m (in kg).\n- Step 2: **Find volume using water displacement:**\n+ Fill the measuring cylinder with water and record the initial volume V₁\n+ Submerge the rock completely in the water\n+ Record the new volume V₂\n+ The rock's volume = V₂ - V₁ (in m³) — convert cm³ to m³ by dividing by 10⁶\n- Step 3: **Calculate density:** ρ = m / (V₂ - V₁) in kg/m³\n\n**Why this works:** The rock displaces its own volume of water. By Archimedes' principle, the volume of displaced water equals the volume of the submerged object.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "The average kinetic energy of gas molecules is given by E_k = ³⁄₂kT, where k is Boltzmann's constant. If you triple the Kelvin temperature, what happens to: (a) the average KE, (b) the rms speed of molecules? (2 steps)", "answer": "- Step 1: (a) Average KE triples directly, since E_k ∝ T. If T becomes 3T, then E_k becomes 3 × (³⁄₂kT) = ³⁄₂k(3T).\n- Step 2: (b) The rms speed relates as: c_rms = √(3kT/m) = √(3RT/M). Since c_rms ∝ √T, if temperature triples, c_rms becomes √3 ≈ 1.73 times larger (not three times).\n+ This is because kinetic energy ∝ mv², so v ∝ √(E_k)\n+ The speed increases by the square root of the temperature ratio\n\n**Key relationship:** Doubling absolute temperature → √2 increase in speed, but 2× increase in kinetic energy.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": true}, {"question": "Why is it impossible to cool an object to below absolute zero (0 K)? Explain using kinetic theory. (2 steps)", "answer": "- Step 1: Temperature is a measure of the **average kinetic energy** of molecules. At 0 K, molecules have the **minimum possible** kinetic energy — essentially zero random motion (quantum mechanics says some zero-point motion remains, but classical physics says zero).\n- Step 2: You cannot have negative kineti
