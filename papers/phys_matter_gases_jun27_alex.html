", "judge_pick": false}, {"question": "Edge case: what happens to a sphere if its density exactly equals the fluid density? Use force balance to explain. (3 steps)", "answer": "- Step 1: Weight = $$\\rho_s V g$$, upthrust = $$\\rho_f V g$$. If $$\\rho_s = \\rho_f$$, they're equal.\n- Step 2: Then the only unbalanced force in the equation of motion comes from drag. If the object starts at rest, drag is zero too, so net force = 0.\n- Step 3: The object floats *suspended* at whatever depth you release it — neither sinks nor rises. This is \"neutral buoyancy.\"\n\nSubmarines and fish exploit this by adjusting their effective density.", "source": "Opus 4.7 ①", "_id": "opus_1_56", "judge_pick": true}, {"question": "Why is the equation $$F = 6\\pi\\eta r v$$ a *linear* relationship between drag and velocity, when at higher speeds drag becomes quadratic ($$\\propto v^2$$)? (3 steps)", "answer": "- Step 1: Stokes' law assumes **laminar flow**: fluid layers slide smoothly past the sphere. In this regime, drag arises from viscous shear, which is proportional to the velocity gradient — hence linear in v.\n- Step 2: At higher speeds, flow becomes **turbulent**: chaotic eddies form behind the sphere. Drag now comes from inertia (pushing fluid mass out of the way), and inertial drag scales as $$v^2$$.\n- Step 3: The crossover is characterised by Reynolds number — a dimensionless ratio of inertial to viscous forces. Small/slow objects in viscous fluids → laminar → Stokes' linear law.", "source": "Opus 4.7 ①", "_id": "opus_1_57", "judge_pick": false}, {"question": "Why is matching the de Broglie wavelength of a probe particle to the size of the target essential for resolving structure?", "answer": "- Step 1: Wave-particle duality: $$\\lambda = h/p$$ — every particle has an associated wavelength.\n- Step 2: To \"see\" a feature of size $$d$$, your probe's wavelength must be $$\\lesssim d$$ (otherwise diffraction blurs the image).\n- Step 3: To resolve a nucleon (~$$10^{-15}$$ m), you need electrons with $$\\lambda \\sim 10^{-15}$$ m → very high momentum → very high energy.\n\nHigher energy = smaller wavelength = finer detail.", "source": "Opus 4.7 ①", "_id": "opus_1_58", "judge_pick": true}], "count": 59}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "Why does the Celsius scale fail when comparing \"twice as cold\" temperatures, and what does this motivate? (3 steps)", "answer": "- Step 1: Celsius places its zero at the freezing point of water, which is physically arbitrary — water's freezing point isn't a point of \"no thermal energy.\" So $$0\\,°C$$ doesn't mean \"no kinetic energy.\"\n- Step 2: Because of this, ratios on the Celsius scale are meaningless. If London is at $$-1\\,°C$$, then $$-2\\,°C$$ isn't \"twice as cold\" — that would imply $$-1$$ has some meaningful \"amount of coldness\" to double, but it doesn't. Even worse: $$0\\,°C$$ \"twice as cold\" should still be $$0\\,°C$$, which is absurd.\n- Step 3: This motivates an absolute scale (Kelvin) whose zero corresponds to genuinely zero molecular kinetic energy. On the Kelvin scale, doubling the temperature genuinely doubles the average kinetic energy.\n\nTakeaway: ratio statements about temperature only make physical sense on an absolute scale.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": true}, {"question": "What physically happens to molecules at absolute zero, and why is it the lowest possible temperature?", "answer": "Absolute zero ($$0\\,\\text{K} = -273.15\\,°C$$) is defined as the temperature at which molecules have the minimum possible kinetic energy — essentially, they stop moving (classically speaking). Since temperature is a measure of average molecular kinetic energy, and kinetic energy cannot be negative, you cannot remove any more energy once you reach this floor. That's why Kelvin temperatures are never negative: there's literally no colder state to be in.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": true}, {"question": "Convert $$27\\,°C$$ to Kelvin and $$0\\,\\text{K}$$ to Celsius. State the conversion rule. (2 steps)", "answer": "- Step 1: Rule: $$T(\\text{K}) = \\theta(°C) + 273.15$$ (often rounded to $$+273$$ in problems). The size of one Kelvin equals one degree Celsius — only the zero point shifts.\n- Step 2:\n+ $$27\\,°C \\to 27 + 273 = 300\\,\\text{K}$$ (a useful \"room temperature\" benchmark)\n+ $$0\\,\\text{K} \\to 0 - 273.15 = -273.15\\,°C$$\n\nMemory hook: \"C comes before K in the alphabet, so to go C→K you add.\"", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "Why does $$\\Delta\\theta$$ in the equation $$\\Delta E = mc\\Delta\\theta$$ give the same numerical value whether you use Celsius or Kelvin? (2 steps)", "answer": "- Step 1: One Kelvin and one degree Celsius are the *same size interval* — they only differ by where zero is placed. So a *change* of $$10\\,°C$$ is the same as a change of $$10\\,\\text{K}$$.\n- Step 2: When you subtract two temperatures, the $$+273$$ offsets cancel: $$(T_2 + 273) - (T_1 + 273) = T_2 - T_1$$. This is why $$\\Delta\\theta$$ is unit-flexible, while *absolute* temperatures (as in $$PV = nRT$$) must be in Kelvin.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "Distinguish atom, element, molecule, and substance with a clear example. (4 steps)", "answer": "- Step 1: **Atom** — the smallest unit retaining the identity of an element (e.g. one helium atom: 2p, 2n, 2e⁻).\n- Step 2: **Element** — matter composed of only one type of atom (e.g. pure helium gas, pure iron).\n- Step 3: **Molecule** — a *specific bonded arrangement* of atoms (e.g. $$H_2O$$ — one specific arrangement of 2 H and 1 O).\n- Step 4: **Substance** — a bulk lump of material with definite composition; could be elemental (iron bar) or composed of molecules (water in a glass). Steel is a substance made of multiple elements (Fe + C) but isn't really one \"molecule\" — it's a mixture.\n\nIn this chapter we lump them all under \"particles\" — what matters is their arrangement, bonds, and motion.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "Describe the arrangement, bonds, and motion of particles in a solid, and explain *why* this makes solids rigid. (3 steps)", "answer": "- Step 1: **Arrangement:** close together and in a *regular* (lattice-like) pattern.\n- Step 2: **Bonds:** strong — particles cannot break free of their neighbours.\n- Step 3: **Motion:** vibrate about *fixed* positions; they never translate past each other. Because particles cannot rearrange, the macroscopic shape is preserved → solids are rigid and have fixed shape and volume.\n\nNote: even at very low temperatures, particles still vibrate. Only at $$0\\,\\text{K}$$ would vibration cease (classically).", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "Describe the arrangement, bonds, and motion of particles in a liquid, and explain why liquids flow but don't compress easily. (3 steps)", "answer": "- Step 1: **Arrangement:** close together but *irregular* (no long-range order).\n- Step 2: **Bonds:** intermediate strength — strong enough to keep particles close, but weak enough that particles can slide past one another.\n- Step 3: **Motion:** particles move and flow over each other.\n\nImplications:\n+ Flow → liquid takes the *shape* of its container.\n+ Not easily compressible → particles are already touching; you can't squeeze them closer without huge forces.\n+ Fixed volume → strong-ish bonds prevent particles from escaping into a gas.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "Describe the arrangement, bonds, and motion of gas particles, and explain why gases fill their container. (3 steps)", "answer": "- Step 1: **Arrangement:** far apart, randomly distributed — typical spacing many particle diameters.\n- Step 2: **Bonds:** essentially negligible (except during brief collisions).\n- Step 3: **Motion:** fast, random, straight-line motion between collisions; collisions randomise direction.\n\nBecause no bonds restrain them, particles spread until they hit walls — hence gases take both the *shape* and *volume* of their container, and are easily compressible (lots of empty space).", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "Water is unusual among everyday substances when it freezes. What does it do, and why does this matter?", "answer": "Water *expands* on freezing — ice is less dense than liquid water. This is because hydrogen bonding forces ice molecules into an open hexagonal lattice with more empty space than the liquid. Almost every other substance contracts on freezing (particles pack tighter when they stop flowing). Consequence: ice floats on water, ponds freeze top-down (insulating life below), and burst water pipes in winter.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "Name all six phase changes between solid, liquid, and gas. (3 steps)", "answer": "- Step 1: Between solid and liquid:\n+ Solid → Liquid: **melting** (or fusion)\n+ Liquid → Solid: **freezing**\n- Step 2: Between liquid and gas:\n+ Liquid → Gas: **boiling** (or vaporisation; evaporation is the slow surface-only version)\n+ Gas → Liquid: **condensing**\n- Step 3: Between solid and gas (skipping liquid):\n+ Solid → Gas: **sublimation** (e.g. dry ice)\n+ Gas → Solid: **deposition** (e.g. frost forming directly from water vapour)", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": true}, {"question": "Why are phase changes called *physical* changes, not chemical? (2 steps)", "answer": "- Step 1: In a phase change, the *identity* of the particles doesn't change — $$H_2O$$ molecules in ice, liquid water, and steam are all still $$H_2O$$. Nothing is being broken into new substances.\n- Step 2: Only the *arrangement, spacing, and energy* of the particles changes. We add or remove energy that affects intermolecular bonds, not the covalent bonds *within* molecules. A chemical change, by contrast, would rearrange atoms into different molecules.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "On a heating curve (temperature vs energy supplied), why does the temperature stay constant during a phase change while energy continues to be added? (3 steps)", "answer": "- Step 1: Temperature reflects *average kinetic energy* of particles. To raise temperature, you must speed particles up.\n- Step 2: During a phase change, the energy being supplied is used to *break (or form) intermolecular bonds* — i.e., it goes into the *potential* energy of the particles (increasing their separation/configuration energy), not their kinetic energy.\n- Step 3: Since kinetic energy is unchanged, temperature is unchanged → flat plateau on the graph. Once all bonds of that phase change are broken, additional energy resumes increasing KE → temperature rises again.\n\nTakeaway: flat plateau = potential energy changing; sloped section = kinetic energy changing.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": true}, {"question": "Sketch and describe the heating curve for ice initially at $$-20\\,°C$$ being heated steadily until it becomes steam above $$100\\,°C$$. (5 steps)", "answer": "- Step 1: Sloped rise from $$-20\\,°C$$ up to $$0\\,°C$$ — solid ice gaining KE.\n- Step 2: Horizontal plateau at $$0\\,°C$$ — *melting*. Energy breaks ice's lattice bonds (potential energy rising; KE/temperature constant).\n- Step 3: Sloped rise from $$0\\,°C$$ to $$100\\,°C$$ — liquid water gaining KE.\n- Step 4: Horizontal plateau at $$100\\,°C$$ — *boiling*. Energy fully separates liquid molecules into a gas. This plateau is *much longer* than the melting one because vaporisation requires far more energy.\n- Step 5: Sloped rise above $$100\\,°C$$ — steam (gas) gaining KE.\n\nSlope steepness in each phase depends on specific heat capacity; plateau width depends on latent heat × mass.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "Why is the latent heat of vaporisation typically much larger than the latent heat of fusion for the same substance? (3 steps)", "answer": "- Step 1: When a solid melts, particles only need enough energy to *loosen* the lattice so they can slide past each other — they remain close together, so intermolecular attractions still largely hold them in a liquid.\n- Step 2: When a liquid boils, particles must be given enough energy to *completely escape* their neighbours and fly off as a gas — essentially all intermolecular attractions must be overcome.\n- Step 3: Breaking *all* the bonds takes much more energy than merely loosening them. For water: $$L_f \\approx 334\\,\\text{kJ/kg}$$ vs $$L_v \\approx 2260\\,\\text{kJ/kg}$$ — about 7× larger.\n\nThis is why a steam burn is far worse than a hot-water burn at the same temperature: the condensing steam releases all that vaporisation energy onto your skin.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": true}, {"question": "Define specific heat capacity and explain what it tells you about a material physically.", "answer": "Specific heat capacity $$c$$ is the energy needed to raise the temperature of $$1\\,\\text{kg}$$ of a substance by $$1\\,\\text{K}$$ (units: $$\\text{J kg}^{-1}\\text{K}^{-1}$$). Physically, a *high* $$c$$ means it takes lots of energy to speed up the particles — typically because the substance has many internal modes (vibrational, rotational) to absorb energy, or strong intermolecular forces. Water has an unusually high $$c \\approx 4200$$, which is why it's used as a coolant and why oceans stabilise climate. Metals like copper have low $$c$$, so they heat up and cool down quickly.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "Define specific latent heat and distinguish fusion from vaporisation.", "answer": "Specific latent heat $$L$$ is the energy required to change the state of $$1\\,\\text{kg}$$ of a substance *without any change in temperature* (units: $$\\text{J kg}^{-1}$$). All that energy goes into breaking intermolecular bonds (potential energy). Two flavours:\n- $$L_f$$ (latent heat of *fusion*) — for solid ↔ liquid transitions (think: \"fusing\" liquid molecules into a solid).\n- $$L_v$$ (latent heat of *vaporisation*) — for liquid ↔ gas transitions (think: water \"vapour\" = steam).\n\nThe formula is $$\\Delta E = mL$$ (or $$\\Delta E = L\\,\\Delta m$$ if you're tracking the mass that changed state).", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "A $$2\\,\\text{kg}$$ block of ice at $$0\\,°C$$ is melted. Roughly how much energy is needed, and what happens to the temperature during melting? ($$L_f \\approx 334\\,\\text{kJ/kg}$$) (2 steps)", "answer": "- Step 1: Use $$\\Delta E = mL_f = 2 \\times 334\\,\\text{kJ} \\approx 670\\,\\text{kJ}$$. No calculation precision needed — the key idea is mass times latent heat.\n- Step 2: Temperature stays at $$0\\,°C$$ throughout. All $$670\\,\\text{kJ}$$ goes into breaking ice's lattice bonds (potential energy rising). The instant the last bit of ice melts, further energy starts raising the water's temperature.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "Roughly how does the energy needed to *boil* $$1\\,\\text{kg}$$ of water at $$100\\,°C$$ compare to the energy needed to *heat* it from $$0\\,°C$$ to $$100\\,°C$$? (2 steps)", "answer": "- Step 1: Heating: $$\\Delta E = mc\\Delta\\theta = 1 \\times 4200 \\times 100 = 420\\,\\text{kJ}$$.\n- Step 2: Boiling: $$\\Delta E = mL_v = 1 \\times 2260 = 2260\\,\\text{kJ}$$.\n\nBoiling takes roughly $$5\\times$$ more energy than heating from freezing to boiling — a striking demonstration of how much energy is locked into intermolecular bonds. This is why a kettle takes a few minutes to heat water but would take many more minutes to completely boil it dry.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "Define internal energy and identify its two components. (3 steps)", "answer": "- Step 1: Internal energy $$U$$ is the *sum of the kinetic and potential energies of all the molecules* within a given mass of a substance.\n- Step 2: **Kinetic component** — energies of molecular motion (translation, rotation, vibration). This component sets the *temperature*.\n- Step 3: **Potential component** — energies arising from intermolecular forces and configurations (how far apart and how arranged the molecules are). This component is what changes during a phase change.\n\nSo: heating a substance without phase change → KE rises → temperature rises. Phase change → PE rises → temperature constant.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "Two ways to *increase* the internal energy of a system, and two ways to *decrease* it. (2 steps)", "answer": "- Step 1: Increase:\n+ Do work on it (e.g. compress a gas with a piston)\n+ Add heat to it (e.g. warm it with a flame)\n- Step 2: Decrease:\n+ Let it do work on surroundings (e.g. gas expanding, pushing a piston)\n+ Lose heat to surroundings (e.g. cool it). Changing state from gas → liquid → solid also releases energy (gives heat to surroundings).\n\nThis is the seed of the First Law of Thermodynamics: $$\\Delta U = Q + W$$.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "Compare the internal energy of $$1\\,\\text{kg}$$ of ice at $$0\\,°C$$ vs $$1\\,\\text{kg}$$ of water at $$0\\,°C$$. Same mass, same temperature — are they the same? (2 steps)", "answer": "- Step 1: Both have the same *kinetic* component (same temperature → same average molecular KE).\n- Step 2: But the water has a *higher potential* component — bonds have been (partially) broken in melting, which required energy input ($$L_f$$). That energy is now stored as configurational (potential) energy in the liquid.\n\nSo the liquid has higher internal energy than the ice, even though both are at $$0\\,°C$$. This is a key probe of understanding internal energy vs. temperature.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "Define density and state its units. Why might a substance be very dense?", "answer": "Density $$\\rho = m/V$$ — mass per unit volume, units $$\\text{kg m}^{-3}$$ (SI) or $$\\text{g cm}^{-3}$$. A substance is dense when it packs lots of mass into little volume: this happens when (a) the atoms themselves are heavy (high atomic mass, like lead or gold) and/or (b) the atoms pack closely (tight crystal structure, no empty space). That's why metals are usually denser than rocks, and gases — full of empty space between particles — are far less dense than solids of the same element.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "How would you measure the volume of an irregular-shaped solid object? (3 steps)", "answer": "- Step 1: Fill a *measuring cylinder* with a known volume of water (read at the meniscus, eye-level).\n- Step 2: Lower the object fully into the water; it displaces a volume of water equal to its own volume.\n- Step 3: Read the new water level; the *increase* in volume equals the object's volume. This is Archimedes' displacement method.\n\nThen $$\\rho = m/V$$ using a balance for mass.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "A paving slab is $$73\\,\\text{kg}$$ and measures $$40\\,\\text{mm} \\times 500\\,\\text{mm} \\times 850\\,\\text{mm}$$. Conceptually, what's the density in $$\\text{kg m}^{-3}$$ and what's the common trap? (3 steps)", "answer": "- Step 1: Convert *all* dimensions to metres first: $$0.040 \\times 0.500 \\times 0.850\\,\\text{m}$$. Volume $$\\approx 0.017\\,\\text{m}^3$$.\n- Step 2: $$\\rho = m/V = 73 / 0.017 \\approx 4300\\,\\text{kg m}^{-3}$$ — denser than rock but less than iron, plausible for concrete with aggregate.\n- Step 3: The trap: forgetting to convert mm → m. If you leave dimensions in mm, you get a volume off by $$10^9$$, and density off by $$10^9$$. Always convert to SI units *first*.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": true}, {"question": "When converting $$1\\,\\text{cm}^3$$ to $$\\text{m}^3$$, why is the conversion factor $$10^{-6}$$ and not $$10^{-2}$$? (2 steps)", "answer": "- Step 1: $$1\\,\\text{cm} = 10^{-2}\\,\\text{m}$$ for length. But volume is *cubic*: $$1\\,\\text{cm}^3 = (10^{-2})^3\\,\\text{m}^3 = 10^{-6}\\,\\text{m}^3$$.\n- Step 2: General rule: when converting squared units, square the factor; for cubic units, cube it. So $$1\\,\\text{mm}^3 = (10^{-3})^3 = 10^{-9}\\,\\text{m}^3$$ and $$1\\,\\text{cm}^2 = (10^{-2})^2 = 10^{-4}\\,\\text{m}^2$$.\n\nForgetting to cube the factor is one of the most common density mistakes.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "State Archimedes' principle, and explain why an object floats. (3 steps)", "answer": "- Step 1: An object immersed in a fluid experiences an upward buoyant force (upthrust) equal to the *weight of the fluid displaced* by the object.\n- Step 2: As the object sinks deeper, it displaces more fluid → upthrust grows. Equilibrium is reached when upthrust equals the object's weight.\n- Step 3: If at full submersion the upthrust still exceeds the weight (object less dense than fluid), the object floats partially submerged — it sits so that the displaced fluid's weight exactly matches its weight. If even fully submerged the upthrust is less than weight (object denser than fluid), it sinks.\n\nKey: upthrust depends on *fluid displaced*, not on the object itself.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": true}, {"question": "Write the formula for upthrust in terms of fluid density, displaced volume, and gravity, and explain the derivation. (3 steps)", "answer": "- Step 1: Upthrust = weight of displaced fluid (Archimedes).\n- Step 2: Weight of fluid = mass × g = (density × volume) × g, where volume = volume displaced by the object.\n- Step 3: Therefore: $$F_b = \\rho_{\\text{fluid}} \\, V_{\\text{displaced}} \\, g$$. Note: it does *not* involve the object's density or mass — only the fluid's properties and how much volume the object has pushed aside.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "A cube floats with $$70\\%$$ of its volume submerged in water. What does this tell you about the cube's density? (3 steps)", "answer": "- Step 1: At floating equilibrium, upthrust = weight of cube: $$\\rho_{\\text{water}} V_{\\text{sub}} g = \\rho_{\\text{cube}} V_{\\text{cube}} g$$.\n- Step 2: Cancel $$g$$ and rearrange: $$\\rho_{\\text{cube}} / \\rho_{\\text{water}} = V_{\\text{sub}} / V_{\\text{cube}} = 0.70$$.\n- Step 3: So $$\\rho_{\\text{cube}} \\approx 0.70 \\times 1000 = 700\\,\\text{kg m}^{-3}$$.\n\nGeneral rule: the *fraction submerged* equals the *ratio of object density to fluid density*. An iceberg ($$\\rho \\approx 917$$) in seawater ($$\\rho \\approx 1020$$) shows roughly $$917/1020 \\approx 90\\%$$ submerged — only $$10\\%$$ above water.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": true}, {"question": "Why do ships made of dense steel still float? (3 steps)", "answer": "- Step 1: A ship's hull is hollow — most of its enclosed volume is air, not steel. The *overall* average density of (steel hull + air inside) is much less than water.\n- Step 2: Equivalently: the ship displaces a *huge* volume of water (because of its size), so the upthrust = weight of that large displaced volume is enormous — large enough to equal the ship's weight.\n- Step 3: A solid lump of steel of the same mass would not displace nearly as much water (small volume → small upthrust), so it sinks. Shape matters because shape determines how much fluid you can displace before fully submerging.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "State Stokes' law and the conditions under which it applies. (3 steps)", "answer": "- Step 1: $$F_d = 6\\pi\\eta r v$$ — the viscous drag force on a small sphere of radius $$r$$ moving at velocity $$v$$ through a fluid of viscosity $$\\eta$$.\n- Step 2: Conditions for validity:\n+ Object is small and *spherical*\n+ Speed is *low* (slow motion)\n+ Flow is *laminar* (smooth layers, no turbulence)\n- Step 3: It breaks down for large objects, high speeds, non-spherical shapes (cube doesn't have nice symmetric flow lines), or when flow becomes turbulent — at which point drag scales more like $$v^2$$, not $$v$$.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "Define terminal velocity, and write the force balance for a sphere falling through a fluid. (3 steps)", "answer": "- Step 1: Terminal velocity is the *constant* velocity reached when the net force on the falling object is zero — acceleration stops, speed becomes steady.\n- Step 2: Three forces on a sphere falling through fluid:\n+ Weight: $$W = m_s g = \\rho_s V g$$ (downward)\n+ Upthrust: $$U = \\rho_f V g$$ (upward, fluid displaced)\n+ Viscous drag: $$F_d = 6\\pi\\eta r v$$ (upward, opposes motion)\n- Step 3: At terminal velocity: $$W = U + F_d \\implies \\rho_s V g - \\rho_f V g = 6\\pi\\eta r v_{\\text{term}}$$.\n\nSolving gives $$v_{\\text{term}} = \\dfrac{2r^2 g (\\rho_s - \\rho_f)}{9\\eta}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "From $$v_{\\text{term}} = \\dfrac{2r^2 g (\\rho_s - \\rho_f)}{9\\eta}$$, predict how terminal velocity changes if: (a) radius doubles, (b) fluid viscosity doubles, (c) object density equals fluid density. (3 steps)", "answer": "- Step 1: (a) $$v_{\\text{term}} \\propto r^2$$ → doubling $$r$$ quadruples $$v_{\\text{term}}$$. Larger spheres fall much faster.\n- Step 2: (b) $$v_{\\text{term}} \\propto 1/\\eta$$ → doubling $$\\eta$$ halves $$v_{\\text{term}}$$. Thick fluid = slow fall.\n- Step 3: (c) If $$\\rho_s = \\rho_f$$ then numerator = 0 → $$v_{\\text{term}} = 0$$. The object doesn't fall at all — it's neutrally buoyant. This is what allows a fish (or a hot-air balloon) to hover.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": true}, {"question": "Why does liquid viscosity *decrease* with temperature, but gas viscosity *increase* with temperature? (3 steps)", "answer": "- Step 1: In **liquids**, viscosity is dominated by intermolecular attractions. Heating gives molecules more thermal energy, helping them break free of their neighbours and flow more easily — hence less resistance (think honey poured hot vs cold).\n- Step 2: In **gases**, viscosity comes from momentum transfer when molecules collide between layers of flow. Heating speeds molecules up, increasing how much momentum they carry between layers, so neighbouring layers drag on each other *more*.\n- Step 3: Counterintuitive but consistent: in both cases, viscosity is about how strongly one layer resists sliding past another, but the underlying mechanism is different (attraction in liquids, collisions in gases).", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": true}, {"question": "State the ideal gas equation in both forms (moles and number of molecules) and explain how they relate. (3 steps)", "answer": "- Step 1: $$PV = nRT$$ where $$n$$ = moles, $$R = 8.31\\,\\text{J mol}^{-1}\\text{K}^{-1}$$ (molar gas constant).\n- Step 2: $$PV = NkT$$ where $$N$$ = number of molecules, $$k = 1.38 \\times 10^{-23}\\,\\text{J K}^{-1}$$ (Boltzmann constant).\n- Step 3: They're equivalent. Since $$N = n N_A$$ (Avogadro's number), substitute: $$PV = nN_A k T = nRT$$ provided $$R = N_A k$$. So the Boltzmann constant is just the \"gas constant *per molecule*\" rather than per mole.\n\nUse moles for chemistry-style problems; molecules for kinetic theory.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "What are the four key assumptions of an ideal gas? (4 steps)", "answer": "- Step 1: Molecular volume is *negligible* compared to the container volume — molecules are treated as point particles.\n- Step 2: Intermolecular forces are *negligible* except during the brief moments of collision.\n- Step 3: Collisions (with each other and walls) are perfectly *elastic* — no kinetic energy is lost.\n- Step 4: Motion is random; large number of molecules so statistics work; time between collisions much longer than collision duration.\n\nWhen do real gases break the model? At high pressure (molecules close → volume matters) and low temperature (slow molecules → intermolecular forces matter). At room temperature and atmospheric pressure, the model works well for air.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "State Boyle's law and explain it microscopically. (3 steps)", "answer": "- Step 1: At constant temperature (and amount of gas): $$PV = \\text{constant}$$, or equivalently $$P_1 V_1 = P_2 V_2$$. Pressure is inversely proportional to volume.\n- Step 2: Microscopic reason: at constant $$T$$, average molecular speeds are unchanged. If you halve the volume, molecules are packed in tighter, so they hit the walls *twice as often* per unit area per second.\n- Step 3: More frequent collisions at the same per-collision force → twice the pressure.\n\nSo Boyle's law isn't just a math relation — it's \"compress them closer → more frequent wall hits → more pressure.\"", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "State Charles' law and explain it microscopically. (3 steps)", "answer": "- Step 1: At constant pressure (and amount of gas): $$V/T = \\text{constant}$$, i.e. $$V_1/T_1 = V_2/T_2$$. Volume is proportional to absolute temperature.\n- Step 2: Microscopic picture: if you heat the gas (higher $$T$$ → faster molecules → more energetic wall hits), the only way to keep pressure constant is to give the molecules more room — i.e. expand the volume so collisions become less frequent per unit area.\n- Step 3: So $$V$$ rises in step with $$T$$ (in Kelvin) to keep $$P$$ constant. Use *Kelvin*, never Celsius, otherwise the proportionality fails (volume isn't zero at $$0\\,°C$$, but it would extrapolate to zero at $$0\\,\\text{K}$$).", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "State the Pressure law (Gay-Lussac's law) and explain it microscopically. (3 steps)", "answer": "- Step 1: At constant volume (and amount of gas): $$P/T = \\text{constant}$$, i.e. $$P_1/T_1 = P_2/T_2$$.\n- Step 2: Microscopic reason: heating the gas speeds up molecules. Two effects on pressure:\n+ Each molecule hits the wall with *more force* (higher momentum change per collision)\n+ Each molecule hits the wall *more frequently* (faster, so reaches the wall sooner)\n- Step 3: Both effects compound to increase the rate of momentum transfer to the walls — which is what pressure *is*. So $$P \\propto T$$ (in Kelvin) at fixed volume.\n\nThis is the law the tutor demonstrated by extrapolating the $$P$$-$$T$$ graph back to zero pressure at $$0\\,\\text{K}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "Why must you use Kelvin (not Celsius) in $$PV = nRT$$ and the gas laws? (3 steps)", "answer": "- Step 1: The gas laws are *proportionalities* with absolute temperature: $$V \\propto T$$, $$P \\propto T$$. These proportionalities are only true if $$T = 0$$ corresponds to a real physical zero (zero molecular KE, zero pressure, \"zero volume\" extrapolated).\n- Step 2: Celsius's zero point is the freezing point of water — arbitrary, not zero KE. So at $$T = 0\\,°C$$, $$P$$ is not zero; the proportionality fails badly.\n- Step 3: Kelvin's zero *is* the physically meaningful zero — extrapolating $$P$$-$$T$$ data hits zero pressure at $$0\\,\\text{K} = -273.15\\,°C$$. So all the gas laws work cleanly only in Kelvin. Use $$T(\\text{K}) = \\theta(°C) + 273$$.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": true}, {"question": "A sealed gas container has its absolute temperature doubled at constant volume. What happens to the pressure, and why? (3 steps)", "answer": "- Step 1: From the Pressure law, $$P \\propto T$$ at constant $$V$$. So doubling absolute temperature *doubles* the pressure.\n- Step 2: Microscopically: doubling $$T$$ (Kelvin) doubles the *average molecular KE* (since $$\\bar{E_k} = \\tfrac{3}{2}kT$$). RMS speed scales as $$\\sqrt{T}$$.\n- Step 3: Wall collisions become harder (higher momentum per hit) and more frequent (faster particles reaching the wall sooner) — and the product of these effects yields exactly double pressure.\n\nTrap: if the temperature was $$20\\,°C → 40\\,°C$$, this is *not* doubling — convert to $$293\\,\\text{K} → 313\\,\\text{K}$$, only $$\\sim 7\\%$$ increase.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": false}, {"question": "What is the average molecular kinetic energy of an ideal gas particle, and what's the key takeaway? (3 steps)", "answer": "- Step 1: $$\\bar{E_k} = \\tfrac{1}{2} m \\overline{c^2} = \\tfrac{3}{2}kT$$ for a single molecule, where $$\\overline{c^2}$$ is the mean-square speed and $$T$$ is the absolute temperature.\n- Step 2: Notice: the mass $$m$$ doesn't appear on the right. Heavy and light molecules at the same temperature have the *same average KE* — but lighter molecules must therefore move *faster* to match.\n- Step 3: The key takeaway: $$\\bar{E_k} \\propto T$$ in Kelvin. Doubling Kelvin temperature doubles the average KE. This is the deep physical meaning of temperature — it's the average KE per particle (up to a factor of $$\\tfrac{3}{2}k$$).\n\nMnemonic: \"Average KE is three-halves kT.\"", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "Two gases at the same temperature: hydrogen (light) and oxygen (heavy). Compare their average KE and RMS speeds. (3 steps)", "answer": "- Step 1: Same $$T$$ → same $$\\bar{E_k} = \\tfrac{3}{2}kT$$. So both have the same average kinetic energy per molecule.\n- Step 2: But $$\\tfrac{1}{2}m c_{\\text{rms}}^2 = \\tfrac{3}{2}kT \\implies c_{\\text{rms}} = \\sqrt{3kT/m}$$. So $$c_{\\text{rms}} \\propto 1/\\sqrt{m}$$.\n- Step 3: Hydrogen ($$m \\approx 2\\,\\text{u}$$) vs oxygen ($$m \\approx 32\\,\\text{u}$$): ratio of speeds is $$\\sqrt{32/2} = 4$$. Hydrogen molecules move about $$4\\times$$ faster than oxygen molecules at the same temperature. That's why hydrogen escapes Earth's atmosphere over geological time but oxygen doesn't.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": true}, {"question": "Derive the kinetic theory equation $$PV = \\tfrac{1}{3}Nm\\overline{c^2}$$ conceptually — what's the physical picture? (4 steps)", "answer": "- Step 1: Consider molecules bouncing elastically off the walls of a box. Each collision changes a molecule's momentum by $$2mv_x$$ (it reverses direction along one axis).\n- Step 2: The *force* on the wall is the rate of momentum change. Summing over all molecules hitting per second gives total force; dividing by area gives pressure.\n- Step 3: Because motion is isotropic (random in 3D), the average kinetic energy along each axis is one-third of the total: $$\\overline{v_x^2} = \\tfrac{1}{3}\\overline{c^2}$$.\n- Step 4: Carrying out the counting gives $$PV = \\tfrac{1}{3}Nm\\overline{c^2}$$, where $$N$$ is total molecules, $$m$$ is mass per molecule, $$\\overline{c^2}$$ is mean-square speed.\n\nSo macroscopic $$PV$$ is directly built from microscopic momentum transfers.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": true}, {"question": "From $$PV = NkT$$ and $$PV = \\tfrac{1}{3}Nm\\overline{c^2}$$, show how to obtain $$\\bar{E_k} = \\tfrac{3}{2}kT$$. (3 steps)", "answer": "- Step 1: Both right-hand sides equal $$PV$$, so set them equal: $$NkT = \\tfrac{1}{3}Nm\\overline{c^2}$$.\n- Step 2: Cancel $$N$$ from both sides and rearrange: $$m\\overline{c^2} = 3kT$$.\n- Step 3: Multiply by $$\\tfrac{1}{2}$$: $$\\tfrac{1}{2}m\\overline{c^2} = \\tfrac{3}{2}kT$$. The left side is exactly the average kinetic energy of one molecule, so $$\\bar{E_k} = \\tfrac{3}{2}kT$$.\n\nThis is the bridge between *microscopic* (KE of molecules) and *macroscopic* (temperature) — the heart of statistical thermodynamics in disguise.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": false}, {"question": "Explain in three steps why heating a sealed gas increases its pressure — the tutor's three-word framework. (3 steps)", "answer": "- Step 1: **Faster** — heating increases the average kinetic energy of the particles, so they move faster ($$c_{\\text{rms}} \\propto \\sqrt{T}$$).\n- Step 2: **More frequently** — faster particles reach the walls more often per second, so the *number of collisions per unit area per unit time* increases.\n- Step 3: **More force** — each individual collision involves a larger momentum change ($$\\Delta p = 2mv$$), so each hit exerts more force on the wall.\n\nSince pressure = force/area, and both force-per-collision and collision-rate have increased, pressure goes up. This is the microscopic origin of the Pressure law.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": true}, {"question": "A gas is compressed isothermally (constant temperature) to half its volume. What happens to its pressure, average molecular KE, and RMS speed? (3 steps)", "answer": "- Step 1: **Pressure**: doubles. By Boyle's law, $$P_1V_1 = P_2V_2$$ → halving $$V$$ doubles $$P$$.\n- Step 2: **Average molecular KE**: unchanged. Temperature is constant, and $$\\bar{E_k} = \\tfrac{3}{2}kT$$ depends only on $$T$$.\n- Step 3: **RMS speed**: unchanged. Since $$c_{\\text{rms}} = \\sqrt{3kT/m}$$ depends only on $$T$$ and $$m$$, both fixed.\n\nSo compression at constant $$T$$ doesn't make molecules move faster — it just packs them closer so wall collisions happen more frequently. The pressure increase comes purely from collision frequency, not from harder hits.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": true}, {"question": "A balloon of gas is heated from $$300\\,\\text{K}$$ to $$600\\,\\text{K}$$ at constant pressure (it's free to expand). What happens to volume, average KE, and RMS speed? (3 steps)", "answer": "- Step 1: **Volume**: doubles. Charles' law: $$V/T = \\text{const}$$, so doubling $$T$$ doubles $$V$$.\n- Step 2: **Average molecular KE**: doubles. $$\\bar{E_k} = \\tfrac{3}{2}kT \\propto T$$, so doubling $$T$$ doubles KE.\n- Step 3: **RMS speed**: increases by $$\\sqrt{2}$$ (~40%). $$c_{\\text{rms}} \\propto \\sqrt{T}$$, not $$T$$. So molecules don't move *twice* as fast — they move $$\\sqrt{2}\\times$$ faster, but each one carries twice the kinetic energy because $$\\text{KE} \\propto v^2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": false}, {"question": "Why does an aerosol can warn against heating, and what gas law explains the danger? (3 steps)", "answer": "- Step 1: An aerosol is a sealed container of gas (and liquid propellant) at high pressure. Its volume is fixed.\n- Step 2: By the Pressure law, $$P \\propto T$$ at constant $$V$$ — so heating raises the internal pressure proportionally to absolute temperature.\n- Step 3: Even moderate heating (e.g. leaving it in a hot car at $$60\\,°C = 333\\,\\text{K}$$ vs room temp $$293\\,\\text{K}$$) raises $$P$$ by $$\\sim 14\\%$$. With high initial pressure, that excess can exceed what the can is rated for → explosion.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": false}, {"question": "Proton charge from quarks: a proton is made of two up quarks and one down quark (uud). Show how this gives a charge of $$+1e$$. (2 steps)", "answer": "- Step 1: Up quark charge: $$+\\tfrac{2}{3}e$$. Down quark charge: $$-\\tfrac{1}{3}e$$.\n- Step 2: Sum for uud: $$+\\tfrac{2}{3} + \\tfrac{2}{3} - \\tfrac{1}{3} = +\\tfrac{3}{3} = +1e$$. ✓\n\nThis is the basic ESAT-testable fact about quark composition.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": false}, {"question": "Show how the neutron (udd) ends up with zero net charge from its quark composition. (2 steps)", "answer": "- Step 1: One up quark: $$+\\tfrac{2}{3}e$$. Two down quarks: $$2 \\times (-\\tfrac{1}{3}e) = -\\tfrac{2}{3}e$$.\n- Step 2: Sum: $$+\\tfrac{2}{3} - \\tfrac{2}{3} = 0$$. ✓ Despite being neutral, the neutron is *not* \"nothing\" — it's made of charged constituents that cancel.\n\nThis is why neutrons can still have magnetic moments and interact via the strong force.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": false}, {"question": "What is plasma, and under what conditions does it form? Why isn't it typically studied at A-level? (3 steps)", "answer": "- Step 1: Plasma is a state of matter where atoms have been *ionised* — electrons stripped from nuclei — so it's a soup of free positive ions and free electrons rather than neutral atoms.\n- Step 2: It forms at very high temperatures (e.g. inside stars, lightning bolts, fusion reactors, fluorescent lamps), where thermal energy exceeds the ionisation energy of atoms.\n- Step 3: Not in A-level scope because its electromagnetic behaviour requires plasma physics (collective electron motion, magnetic confinement), which is beyond the simple kinetic-theory framework. But conceptually it's the \"4th state of matter,\" and it's what you need for nuclear fusion.", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": true}, {"question": "Why doesn't a single photon produce an electron–positron pair in empty space — what additional condition must be met? (3 steps)", "answer": "- Step 1: Energy conservation requires the photon energy to exceed $$2m_e c^2 \\approx 1.022\\,\\text{MeV}$$ — enough to create both particles' rest masses.\n- Step 2: But energy alone isn't enough — *momentum* must also be conserved. A photon carries momentum $$p = E/c$$, but a created electron + positron (initially at rest in their CoM frame) carry less momentum than the photon. There's no way to conserve both energy and momentum with just a lone photon.\n- Step 3: The solution: a *third body* (like a nucleus) must be nearby to absorb the excess momentum. This is why pair production happens *near* a nucleus, not in empty space.", "source": "Opus 4.7 ②", "_id": "opus_2_51", "judge_pick": true}, {"question": "Why do oppositely charged particle tracks curve in opposite directions in a magnetic field, even though they were created together? (3 steps)", "answer": "- Step 1: The magnetic force on a charged particle is $$F = qv \\times B$$. The direction depends on the *sign* of $$q$$.\n- Step 2: For a particle–antiparticle pair, charges are opposite. With the same magnetic field and similar initial velocities, the force points in opposite directions for each particle.\n- Step 3: Hence the two tracks spiral outward in opposite senses — but with the *same radius* because they have the same mass (so same momentum at creation). The \"V-shape\" or two-spiral signature in cloud chambers is a classic indicator of pair production.", "source": "Opus 4.7 ②", "_id": "opus_2_52", "judge_pick": true}, {"question": "Why does the radius of a charged particle's track *decrease* as it spirals through a detector medium? (3 steps)", "answer": "- Step 1: Recall $$r = mv/(qB) = p/(qB)$$. Radius is proportional to momentum.\n- Step 2: As the particle travels, it ionises atoms in the medium, transferring some of its kinetic energy. Its speed (and momentum) decreases.\n- Step 3: Smaller momentum → smaller radius. So the track tightens into an inward spiral. This also tells you the *direction* of motion: the spiral tightens *toward* the direction of travel, since energy is being lost over time.", "source": "Opus 4.7 ②", "_id": "opus_2_53", "judge_pick": false}, {"question": "Why do high-energy electrons probe deeper into nucleon structure than low-energy electrons? (3 steps)", "answer": "- Step 1: To resolve a feature of size $$d$$, the probe's wavelength must satisfy $$\\lambda \\lesssim d$$ (analogue of microscopy resolution).\n- Step 2: De Broglie wavelength: $$\\lambda = h/p$$. Higher momentum (higher energy) gives shorter wavelength.\n- Step 3: To resolve features smaller than a nucleon ($$\\sim 10^{-15}\\,\\text{m}$$) — like individual quarks — you need very high momentum, hence very high energy. This is why bigger particle accelerators reveal smaller structures.\n\nElectrons are good probes because they don't experience the strong force, so they sample the charge distribution cleanly.", "source": "Opus 4.7 ②", "_id": "opus_2_54", "judge_pick": false}, {"question": "Mental-math sanity check: 1 mole of ideal gas at $$300\\,\\text{K}$$ in a $$0.025\\,\\text{m}^3$$ container. Roughly what's the pressure? (3 steps)", "answer": "- Step 1: Use $$PV = nRT$$ → $$P = nRT/V$$.\n- Step 2: Numerator: $$1 \\times 8.31 \\times 300 \\approx 2500\\,\\text{J}$$.\n- Step 3: $$P \\approx 2500 / 0.025 = 100{,}000\\,\\text{Pa} = 100\\,\\text{kPa}$$ — roughly atmospheric pressure. Sanity check: 1 mole at room temperature and atmospheric pressure occupies about $$24\\,\\text{L} = 0.024\\,\\text{m}^3$$, which matches. ✓", "source": "Opus 4.7 ②", "_id": "opus_2_55", "judge_pick": false}, {"question": "A common misconception: \"If a gas is hotter, the pressure must be higher.\" When is this *wrong*? (3 steps)", "answer": "- Step 1: The statement holds at constant volume (Pressure law). But if volume can change, the gas can expand and keep pressure constant — Charles' law scenario.\n- Step 2: Example: a hot-air balloon. The air inside is hot, but it's at atmospheric pressure (the balloon isn't sealed). What's different is its *density* (less dense, providing lift), not its pressure.\n- Step 3: General rule: you can't predict the change in any one of $$P$$, $$V$$, $$T$$ from a change in another without specifying what's held constant. Always identify the constraint (constant $$V$$, $$P$$, $$T$$, or $$n$$) before applying a gas law.", "source": "Opus 4.7 ②", "_id": "opus_2_56", "judge_pick": false}, {"question": "A common confusion: \"Internal energy and temperature are the same thing.\" Why is this wrong? Give a concrete example. (3 steps)", "answer": "- Step 1: Temperature depends only on the *kinetic* component of internal energy (average KE per molecule). Internal energy also includes *potential* energy from intermolecular bonds.\n- Step 2: Example: $$1\\,\\text{kg}$$ of ice at $$0\\,°C$$ vs $$1\\,\\text{kg}$$ of water at $$0\\,°C$$ — same temperature, but water has higher internal energy (you put $$334\\,\\text{kJ}$$ in to melt it, raising potential energy).\n- Step 3: Another example: $$1\\,\\text{kg}$$ water at $$50\\,°C$$ vs $$2\\,\\text{kg}$$ water at $$50\\,°C$$ — same temperature, but the second has twice the internal energy because there's twice as many molecules each carrying the same average KE.\n\nTemperature is *intensive* (doesn't depend on amount); internal energy is *extensive* (does).", "source": "Opus 4.7 ②", "_id": "opus_2_57", "judge_pick": true}, {"question": "Why must \"upthrust = weight of fluid displaced\" — what's the intuition? (3 steps)", "answer": "- Step 1: Imagine replacing your submerged object with an equivalent volume of the *same fluid*. That fluid blob just sits there (or moves with the rest of the fluid) because the fluid is in equilibrium.\n- Step 2: For that blob of fluid to be in equilibrium, the surrounding fluid must push up on it with a force equal to its own weight. This upward push is the *buoyant force* the fluid exerts on whatever occupies that volume.\n- Step 3: When you replace the fluid blob with your object, the surrounding fluid doesn't know or care what's in there — it still pushes up with the same force, which equals the weight of fluid that *would have* filled that volume.\n\nHence upthrust = $$\\rho_{\\text{fluid}} V_{\\text{disp}} g$$, regardless of what the object is.", "source": "Opus 4.7 ②", "_id": "opus_2_58", "judge_pick": true}, {"question": "Why does sweating cool you down? Connect to specific latent heat. (3 steps)", "answer": "- Step 1: Sweat i  18132, "reasoning_chars": 0, "cost_eur": 2.2829, "elapsed_s": 234, "content_chars": 42318}, "opus_2": {"run": 2, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 74768, "out_tokens": 20666, "reasoning_chars": 0, "cost_eur": 2.4578, "elapsed_s": 265, "content_chars": 47715}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.7, "in_tokens": 51897, "out_tokens": 2955, "reasoning_chars": 3028, "cost_eur": 0.0128, "elapsed_s": 84, "content_chars": 8280}, "qwen_2": {"run": 2, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.8, "in_tokens": 51897, "out_tokens": 3636, "reasoning_chars": 6451, "cost_eur": 0.0136, "elapsed_s": 102, "content_chars": 8656}}};
const SK='phys_matter_gases_jun27_alex';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
