c energy. Cooling means removing thermal energy. At 0 K:\n+ All thermal energy has already been removed\n+ There's no more energy to take away\n+ Therefore, you cannot go below the state where molecular motion stops\n\nAbsolute zero is like \"zero dollars\" — you can't have less than nothing in your account (ignoring debt!).", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "A submarine dives deeper into the ocean. How does the pressure outside change with depth? If the submarine's hull maintains internal pressure at 1 atm, what must the hull withstand at 100 m depth? (Density of seawater ≈ 1020 kg/m³, g ≈ 10 m/s²) (2 steps)", "answer": "- Step 1: Pressure at depth in a fluid: P = P_atm + ρgh\n+ At the surface (h = 0): P = 101,000 Pa (1 atm)\n+ At h = 100 m: P = 101,000 + (1020 × 10 × 100) = 101,000 + 1,020,000 = 1,121,000 Pa ≈ 11 atm\n- Step 2: The hull must withstand the **difference** between internal and external pressure:\n+ Internal = 1 atm = 101,000 Pa\n+ External at 100 m = 1,121,000 Pa\n+ Pressure difference = 1,121,000 - 101,000 = 1,020,000 Pa ≈ 10 atm\n\nThis is why deep-sea submersibles need extremely strong hulls — the pressure difference increases by about 1 atm for every 10 m of depth.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": true}, {"question": "In the ideal gas equation PV = nRT, what do we assume about ideal gases that real gases deviate from? Give an example of when real gases behave ideally and when they don't. (2 steps)", "answer": "- Step 1: Ideal gas assumptions:\n+ **Negligible molecular volume** — molecules are point particles with no volume\n+ **No intermolecular forces** except during collisions\n+ **Elastic collisions** — no energy loss\n- Step 2: Real gas behavior:\n+ **Ideal behavior:** At **high temperature** and **low pressure** — molecules move fast (kinetic energy >> potential energy from attractions), and volume is small compared to container\n+ **Non-ideal behavior:** At **low temperature** and **high pressure** — molecules are close together (intermolecular forces matter), and molecular volume becomes significant relative to container\n\nExample: Helium at room temperature and atmospheric pressure behaves almost ideally. Steam at high pressure and near condensation point deviates significantly.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "A student says: \"Internal energy and temperature are the same thing.\" Explain why this is incorrect and provide an example that demonstrates the difference. (2 steps)", "answer": "- Step 1: Internal energy (U) is the **total** energy of all molecules: U = sum of (kinetic energies + potential energies) of ALL molecules in the substance. Temperature is only a measure of the **average kinetic energy** per molecule.\n- Step 2: The difference shows during phase changes:\n+ Ice at 0°C → Water at 0°C: Temperature stays the same (average KE unchanged)\n+ BUT internal energy increases significantly — energy goes into breaking intermolecular bonds (increasing potential energy of molecules)\n+ The temperature \"hides\" this energy change — hence \"latent\" heat\n\n**Memory trick:** Think of internal energy as your total bank balance, and temperature as your average daily spending rate. You can add to your balance (increase U) without changing your daily spending rate (temperature) — that's what happens during phase changes!", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": true}, {"question": "Calculate the approximate terminal velocity of a steel ball bearing (radius 2 mm, density 7800 kg/m³) falling through oil (density 900 kg/m³, viscosity 0.8 Pa·s). Show your reasoning, not detailed arithmetic. (2 steps)", "answer": "- Step 1: Use the terminal velocity formula: v = [2r²g(ρ_s - ρ_f)]/(9η)\n+ The key insight: v ∝ r² — the radius squared\n+ For the numbers: r = 2 × 10⁻³ m, g ≈ 10 m/s², ρ_s - ρ_f ≈ 6900 kg/m³\n- Step 2: Rough calculation:\n+ r² = (2 × 10⁻³)² = 4 × 10⁻⁶ m²\n+ Numerator: 2 × 4 × 10⁻⁶ × 10 × 6900 ≈ 2 × 4 × 69 ≈ 552 × 10⁻⁴ = 5.5 × 10⁻²\n+ Denominator: 9 × 0.8 = 7.2\n+ v ≈ 5.5 × 10⁻² / 7.2 ≈ 7.6 × 10⁻³ m/s ≈ 8 mm/s\n\nThis is slow — small ball bearings fall very slowly through viscous oil, which is why Stokes' law works well here.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "When a fluid flows through a pipe, at low flow rates it's \"laminar\" (layers slide past smoothly), but at high rates it becomes \"turbulent\" (chaotic with eddies). How does this affect the viscous drag force on an object moving through the fluid? (2 steps)", "answer": "- Step 1: In **laminar flow** (low speed, small objects):\n+ Drag force ∝ velocity: F_d = 6πηrv (Stokes' law)\n+ Predictable, smooth — like water flowing in a calm stream\n+ This regime applies to small spheres in viscous liquids\n- Step 2: In **turbulent flow** (high speed, large objects):\n+ Drag force ∝ v² (roughly): F_d = ½ρAv²C_d\n+ Much higher drag than Stokes' law predicts\n+ Energy is wasted in creating eddies and turbulence\n+ This is why aircraft and cars are streamlined — to delay turbulence and reduce drag\n\nThe transition is predicted by the Reynolds number: low Re = laminar, high Re = turbulent.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": true}, {"question": "An ice cube floats in a glass of water. When it melts, does the water level rise, fall, or stay the same? Explain using density and displacement. (2 steps)", "answer": "- Step 1: The floating ice displaces its weight in water. Since ice floats, we know ρ_ice < ρ_water. The volume of water displaced = mass of ice ÷ ρ_water.\n- Step 2: After melting, the ice becomes water with the same mass. The volume of this melted water = mass of ice ÷ ρ_water. Wait — this is exactly equal to the displaced volume!\n+ Actually, we need to be careful: floating ice has some above water. The submerged portion displaces weight-equal water. When it melts, that same mass of ice becomes water with volume = m/ρ_water, which equals the displaced volume.\n+ The water level stays roughly the same!\n+ **Correction:** Since ice is less dense, it actually floats with ~9/10 of volume underwater. When melted, all that underwater volume becomes water. The slight difference? Actually stays about the same — this is why sea level doesn't rise much from melting icebergs (land ice melting adds water; sea ice was already displacing its weight).", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": true}, {"question": "In the formula for ideal gas pressure derived from kinetic theory: P = (1/3)Nm⟨c²⟩/V. Explain what each symbol means and why there's a factor of 1/3. (3 steps)", "answer": "- Step 1: Define the terms:\n+ N = number of molecules\n+ m = mass of ONE molecule\n+ ⟨c²⟩ = mean square speed (average of speed squared — not the same as speed squared!)\n+ V = volume of container\n- Step 2: The derivation considers pressure = force/area = (momentum change per collision × collisions per second)/area. Molecules move in all directions (x, y, z), and only the x-component of velocity affects pressure on the yz-wall.\n- Step 3: Since there are three independent spatial directions, and the distribution is random, on average only 1/3 of the kinetic energy is associated with motion in any one direction. That's where the 1/3 factor comes from.\n\n**Key insight:** ⟨c²⟩ = ⟨c_x²⟩ + ⟨c_y²⟩ + ⟨c_z²⟩, and for random motion, ⟨c_x²⟩ = ⟨c_y²⟩ = ⟨c_z²⟩ = ⅓⟨c²⟩.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": true}, {"question": "A fixed mass of ideal gas is heated at constant volume from 27°C to 127°C. What is the ratio of final to initial pressure? Why must we use Kelvin, not Celsius? (2 steps)", "answer": "- Step 1: Convert to Kelvin first:\n+ T₁ = 27 + 273 = 300 K\n+ T₂ = 127 + 273 = 400 K\n+ Ratio T₂/T₁ = 400/300 = 4/3 ≈ 1.33\n- Step 2: At constant volume (and constant n), P ∝ T. So P₂/P₁ = T₂/T₁ = 4/3 ≈ 1.33.\n+ Final pressure is 1.33 times the initial pressure.\n- **Why not Celsius?** If we incorrectly used Celsius: ΔT = 100°C in both cases, but 0°C + 100°C doesn't give proportional relationships. The ratio (127/27) ≈ 4.7 would be nonsense — pressure can't increase by 4.7 times from the same heating!\n+ Only Kelvin has a true zero point that makes proportional reasoning valid.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": true}, {"question": "When you heat water from 0°C to 100°C, does its density change? If so, how? Explain using the behavior of water molecules. (2 steps)", "answer": "- Step 1: Yes, water's density changes with temperature, but NOT monotonically:\n+ From 0°C to 4°C: density INCREASES (unusual!)\n+ Above 4°C: density decreases normally\n+ Maximum density occurs at 4°C (≈1000 kg/m³)\n- Step 2: Explanation:\n+ Below 4°C, water molecules are forming transient hydrogen-bonded \"clumps\" that are less efficient at packing\n+ As you warm from 0°C, these clumps break up and molecules can pack more efficiently → density increases\n+ Above 4°C, normal thermal expansion dominates → molecules move further apart → density decreases\n+ This is why ice floats — water is most dense at 4°C, and ice (below 0°C) is less dense\n\nThis anomaly is crucial for aquatic life — lakes freeze from top down, not bottom up!", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": true}, {"question": "A sealed balloon contains gas at room temperature (20°C). You place it in a refrigerator at 4°C. What happens to: (a) the average kinetic energy of the gas molecules, (b) the pressure inside, (c) the volume (if flexible)? Explain each. (3 steps)", "answer": "- Step 1: (a) Average KE decreases: E_k ∝ T (in Kelvin). Converting: T₁ = 293 K, T₂ = 277 K. The ratio is 277/293 ≈ 0.95. So KE decreases by about 5%.\n- Step 2: (b) Pressure decreases: P ∝ T (at constant V). The pressure becomes about 0.95 of its original value. Lower temperature → slower molecules → less frequent, less forceful collisions with walls.\n- Step 3: (c) For a flexible balloon: Charles's Law applies (V ∝ T at constant P). Volume also decreases proportionally. The balloon shrinks in the cold. All three changes are linked through the ideal gas law.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "The specific heat capacity of copper is about 390 J/kg·K, while water is 4200 J/kg·K. Explain why copper heats up and cools down much faster than water, using molecular-level reasoning. (2 steps)", "answer": "- Step 1: Specific heat capacity is the energy needed to raise 1 kg by 1 K. Copper needs ~390 J; water needs ~4200 J — over 10× more for the same mass.\n- Step 2: At the molecular level:\n+ In copper (solid metal), heat energy is stored mainly in vibrations of the crystal lattice\n+ Each atom has relatively few degrees of freedom to store energy\n+ In water (liquid), energy goes into many molecular modes: translation, rotation, vibration, AND the complex hydrogen-bond network\n+ Water molecules can store energy in more \"ways\" — so each molecule needs less energy input to increase its average KE\n+ This is why water is a great \"thermal reservoir\" — it's hard to heat up, but also releases lots of energy when cooling", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": true}, {"question": "A skydiver jumps from a plane. Initially she accelerates (speeding up), then reaches terminal velocity where she falls at constant speed. Draw a force diagram for each phase and explain why acceleration eventually stops. (2 steps)", "answer": "- Step 1: **Phase 1 — Accelerating:**\n+ Forces: Weight (down) > Drag (up) + Upthrust (up, tiny in air)\n+ Net downward force → acceleration (F = ma)\n+ As speed increases, drag increases (F_drag ∝ v or v²)\n+ So acceleration decreases over time\n- Step 2: **Phase 2 — Terminal velocity:**\n+ At terminal velocity: Weight = Drag + Upthrust (nearly)\n+ Net force = 0 → acceleration = 0\n+ Object continues at constant velocity (Newton's First Law)\n+ The skydiver then slows down further when she opens her parachute (larger area → much higher drag at same speed)", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "In the kinetic theory derivation, we assume perfectly elastic collisions. What would happen to the gas pressure if collisions were inelastic (molecules lost energy when hitting walls)? (2 steps)", "answer": "- Step 1: With perfectly elastic collisions, molecules bounce off walls with the same kinetic energy they arrived with. The wall experiences a certain average force per collision.\n- Step 2: With inelastic collisions, molecules would lose kinetic energy on each collision with the wall. This would mean:\n+ Each collision transfers LESS momentum to the wall\n+ Over time, molecules would slow down (lose energy)\n+ This would cause pressure to decrease continuously unless energy was continuously added to maintain temperature\n+ In reality, the container walls and the gas eventually reach thermal equilibrium\n\n**Real-world note:** Real gas molecules do lose some energy in collisions (not perfectly elastic), but at normal temperatures this effect is small enough that ideal gas assumptions work well.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}], "count": 29}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "Describe the arrangement, bonds, and motion of particles in a solid, liquid, and gas. (3 parts)", "answer": "**Solid:** Arrangement - close together in a regular/ordered pattern; Bonds - strong; Motion - vibrate about fixed positions\n- **Liquid:** Arrangement - close together but irregular/disordered; Bonds - intermediate strength; Motion - can move past each other, flow\n- **Gas:** Arrangement - far apart/spread out; Bonds - very weak or negligible; Motion - fast and random, moving in straight lines until they collide", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "Why does the temperature of a substance remain constant during a phase change even when heat energy is being supplied? (2 steps)", "answer": "- Step 1: During a phase change, the supplied energy is used to break (or form) intermolecular bonds between particles, rather than increasing the kinetic energy of the particles\n- Step 2: Since temperature is a measure of average kinetic energy, and the kinetic energy isn't changing during bond-breaking, the temperature remains constant despite energy input\n\nThis is why heating curves show flat plateaus during phase changes", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "Define specific heat capacity and state the equation used to calculate heat energy change. (2 parts)", "answer": "Specific heat capacity is defined as: the energy required to raise the temperature of 1 kilogram of a substance by 1 Kelvin (or 1°C)\n- The equation is: ΔE = mcΔθ\n  - ΔE = change in heat energy (J)\n  - m = mass (kg)\n  - c = specific heat capacity (J/kg·K or J/kg·°C)\n  - Δθ = change in temperature (K or °C)\n\nNote: Since Kelvin and Celsius have the same-sized degrees, Δθ is the same for both scales", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "Define specific latent heat and distinguish between latent heat of fusion and latent heat of vaporisation. (3 parts)", "answer": "Specific latent heat is defined as: the thermal energy required to change the state of 1 kg of a substance without any change in temperature\n- **Latent heat of fusion (melting/freezing):** The energy required to convert 1 kg of solid to liquid (or vice versa) at the melting point\n- **Latent heat of vaporisation (boiling/condensing):** The energy required to convert 1 kg of liquid to gas (or vice versa) at the boiling point\n- The equation is: ΔE = mL (where L is the specific latent heat in J/kg)", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "Explain what is meant by \"internal energy\" of a substance and how it differs from temperature. (2 steps)", "answer": "- Step 1: Internal energy (U) is the sum of the kinetic AND potential energies of all molecules within a given mass of a substance\n- Step 2: Temperature is only a measure of the average kinetic energy of the molecules - it tells us nothing about potential energy (which depends on intermolecular separations and bonds)\n- During a phase change, temperature stays constant but internal energy changes because energy goes into changing potential energy (breaking/form bonds), not kinetic energy", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "What is absolute zero? Why is the Kelvin scale preferred over Celsius for gas law calculations? (2 parts)", "answer": "Absolute zero is: the lowest temperature possible, equal to 0 K or -273.15°C, at which molecules have minimum kinetic energy (theoretically zero kinetic energy)\n- The Kelvin scale is preferred because:\n  - It is an absolute scale based on the actual kinetic energy of particles\n  - In gas law equations (PV = nRT), temperature must be in Kelvin because the equations assume absolute temperature proportional to average kinetic energy\n  - Using Celsius would break the proportional relationships (e.g., doubling Kelvin temperature doubles average KE, but doubling Celsius temperature does not)\n- Conversion: T(K) = θ(°C) + 273 (or 273.15)", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "State the ideal gas equation and define each symbol. Also state the two equivalent forms using Boltzmann constant and number of molecules. (3 parts)", "answer": "**Main form:** PV = nRT\n- P = pressure (Pa)\n- V = volume (m³)\n- n = number of moles\n- R = molar gas constant = 8.31 J/(mol·K)\n- T = temperature (K)\n\n**Alternative forms:**\n- Using Boltzmann constant: PV = NkT\n  - N = number of molecules\n  - k = Boltzmann constant = 1.38 × 10⁻²³ J/K\n- Note: R = N_A × k, where N_A = Avogadro's constant = 6.02 × 10²³ mol⁻¹", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "State Boyle's Law, Charles' Law, and the Pressure Law. For each, state what is kept constant and the mathematical relationship. (3 parts)", "answer": "**Boyle's Law:** For constant temperature (isothermal)\n- Relationship: PV = constant, or P₁V₁ = P₂V₂\n- Pressure is inversely proportional to volume\n\n**Charles' Law:** For constant pressure (isobaric)\n- Relationship: V/T = constant, or V₁/T₁ = V₂/T₂\n- Volume is directly proportional to absolute temperature\n\n**Pressure Law:** For constant volume (isochoric)\n- Relationship: P/T = constant, or P₁/T₁ = P₂/T₂\n- Pressure is directly proportional to absolute temperature", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "A gas cylinder contains 1 mol of an ideal gas at 300 K in a 0.025 m³ container. Calculate the pressure inside the cylinder. (3 steps)", "answer": "- Step 1: Use the ideal gas equation: P = nRT/V\n- Step 2: Substitute values: P = (1 × 8.31 × 300) / 0.025\n- Step 3: Calculate: P = 2,493 / 0.025 = 99,720 Pa ≈ 99.7 kPa (or ~100 kPa)", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "Explain, using kinetic theory, why the pressure of a gas increases when its temperature increases at constant volume. (3 steps)", "answer": "- Step 1: Temperature is proportional to average kinetic energy of gas molecules (E_k = ³/₂kT)\n- Step 2: When temperature increases, molecules move faster (increased kinetic energy) and hit the container walls more frequently with greater force upon each collision\n- Step 3: Since pressure = force/area, and the force from collisions increases (more frequent AND more forceful hits), the pressure increases\n\nThis explains why P/T = constant at constant volume (Pressure Law)", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "Write the equation for average molecular kinetic energy of an ideal gas and explain what it tells us about the relationship between temperature and kinetic energy. (2 parts)", "answer": "The average kinetic energy per molecule is: E_k = ³/₂ kT\n- Where k = Boltzmann constant (1.38 × 10⁻²³ J/K)\n- T = absolute temperature (K)\n\n**What it tells us:**\n- Average kinetic energy is directly proportional to absolute temperature (E_k ∝ T)\n- This means doubling the Kelvin temperature doubles the average kinetic energy\n- All gases at the same temperature have the same average molecular kinetic energy (regardless of molecular mass)", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "An object displaces 0.015 m³ of water (density = 1000 kg/m³, g = 9.81 m/s²). Calculate the upthrust (buoyant force) acting on the object. (3 steps)", "answer": "- Step 1: Apply Archimedes' principle: Upthrust = weight of fluid displaced\n- Step 2: Calculate mass of displaced fluid: m = ρV = 1000 × 0.015 = 15 kg\n- Step 3: Calculate weight (which equals upthrust): F = mg = 15 × 9.81 = 147.15 N ≈ 147 N", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "State Archimedes' principle and explain the conditions for an object to float versus sink in a fluid. (3 parts)", "answer": "**Archimedes' principle:** An object submerged in a fluid experiences an upward buoyant force (upthrust) equal to the weight of fluid displaced\n\n**Floating:** When the upthrust equals the weight of the object (U = W)\n- This occurs when the density of the object is less than the density of the fluid\n\n**Sinking:** When the upthrust is less than the weight of the object (U < W)\n- This occurs when the density of the object is greater than the density of the fluid\n\nAt equilibrium underwater: U + drag = W", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "State Stokes' law for viscous drag on a sphere and list the conditions under which it is valid. (2 parts)", "answer": "**Stokes' law:** F = 6πηrv\n- η (eta) = coefficient of viscosity of the fluid (Pa·s)\n- r = radius of the sphere (m)\n- v = velocity of the sphere (m/s)\n\n**Conditions for validity:**\n- The object must be a small sphere\n- The flow must be laminar (smooth, not turbulent)\n- The speed must be low (so Reynolds number is small)\n- The sphere must be moving slowly through the fluid\n\nNote: At high speeds, flow becomes turbulent and drag is proportional to v² instead", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "A steel ball bearing of radius 5.0 mm falls through oil with viscosity 0.3 Pa·s at a constant speed of 0.030 m/s. Calculate the viscous drag force. (3 steps)", "answer": "- Step 1: Convert radius to metres: r = 5.0 mm = 5.0 × 10⁻³ m\n- Step 2: Use Stokes' law: F = 6πηrv\n- Step 3: Calculate: F = 6 × π × 0.3 × (5.0 × 10⁻³) × 0.030\n  - F = 6 × 3.1416 × 0.3 × 5.0 × 10⁻³ × 0.030\n  - F = 6 × 3.1416 × 0.3 × 1.5 × 10⁻⁴\n  - F ≈ 8.5 × 10⁻⁴ N (or 0.00085 N)", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "Explain what is meant by terminal velocity and the forces acting on a falling sphere in a fluid at terminal velocity. (3 steps)", "answer": "- Step 1: Terminal velocity is the constant maximum velocity reached when the net force on a falling object equals zero\n- Step 2: At terminal velocity, the forces are balanced:\n  - **Weight (W)** = mg (downwards)\n  - **Upthrust (U)** = ρ_fluid × V_dispaced × g (upwards)\n  - **Viscous drag (F_d)** = 6πηrv (upwards)\n- Step 3: The equation at terminal velocity: W = U + F_d\n  - Or: mg = ρ_fluid × V × g + 6πηrv_terminal\n\nThis means the object cannot accelerate further since net force = 0", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "A sphere of radius r falls through a fluid. Derive the formula for terminal velocity in terms of the sphere's density, fluid density, radius, viscosity, and g. (4 steps)", "answer": "- Step 1: At terminal velocity, forces balance: W = U + F_d\n- Step 2: Write each force:\n  - W = m_sphere × g = (ρ_s × V) × g = (ρ_s × ⁴/₃πr³) × g\n  - U = m_fluid × g = (ρ_f × V) × g = (ρ_f × ⁴/₃πr³) × g\n  - F_d = 6πηrv_term\n- Step 3: Substitute: ρ_s × ⁴/₃πr³ × g = ρ_f × ⁴/₃πr³ × g + 6πηrv_term\n- Step 4: Rearrange to solve for v_term:\n  - ⁴/₃πr³g(ρ_s - ρ_f) = 6πηrv_term\n  - v_term = [2r²g(ρ_s - ρ_f)] / 9η\n\nThis shows terminal velocity is proportional to r² and inversely proportional to η", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "Calculate the heat energy required to heat 2.0 kg of water from 20°C to 70°C. (Specific heat capacity of water = 4200 J/kg·K) (3 steps)", "answer": "- Step 1: Identify the change in temperature: Δθ = 70 - 20 = 50 K (or 50°C)\n- Step 2: Use the formula: ΔE = mcΔθ\n- Step 3: Calculate: ΔE = 2.0 × 4200 × 50 = 420,000 J = 420 kJ", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "Calculate the energy required to melt 0.5 kg of ice at 0°C. (Specific latent heat of fusion for ice = 334 kJ/kg) (2 steps)", "answer": "- Step 1: Use the latent heat formula: ΔE = mL\n- Step 2: Calculate: ΔE = 0.5 × 334,000 = 167,000 J = 167 kJ\n\nNote: The temperature remains at 0°C throughout the melting process - all the energy goes into breaking intermolecular bonds, not increasing kinetic energy", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "Explain why evaporating 1 kg of water requires roughly seven times more energy than melting 1 kg of ice, using the concept of intermolecular forces. (2 steps)", "answer": "- Step 1: When ice melts (solid → liquid), energy is required only to increase the molecular separation enough for molecules to flow past each other - some attractive forces are overcome but not all\n- Step 2: When water boils (liquid → gas), energy is required to completely separate molecules until there are no longer any forces of attraction between them - ALL intermolecular bonds must be broken\n- Since gas molecules are infinitely far apart compared to liquids, much more energy is needed for vaporisation than fusion (for water: L_v ≈ 2.26 MJ/kg vs L_f ≈ 0.334 MJ/kg, ratio ≈ 7:1)", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "A proton consists of two up quarks (u) and one down quark (d). An neutron consists of one up quark and two down quarks. Given that up quark charge = +⅔e and down quark charge = -⅓e, verify that the proton has charge +1e and neutron has charge 0. (2 steps)", "answer": "- Step 1: Proton (uud): (+⅔) + (+⅔) + (-⅓) = +⅔ + +⅔ - ⅓ = +1e ✓\n- Step 2: Neutron (udd): (+⅔) + (-⅓) + (-⅓) = +⅔ - ⅓ - ⅓ = 0e ✓\n\nThis confirms that the fractional charges of quarks combine to give the known charges of protons and neutrons", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "What is an \"ideal gas\"? List the assumptions made in the ideal gas model. (2 parts)", "answer": "An ideal gas is a theoretical gas that obeys the ideal gas laws (PV = nRT) exactly under all conditions\n\n**Assumptions:**\n1. Gas molecules occupy negligible volume compared to the container volume\n2. There are negligible intermolecular forces between molecules (except during collisions)\n3. All collisions between molecules and with container walls are perfectly elastic\n4. The gas consists of a very large number of molecules moving in random directions\n\nReal gases deviate from ideal behaviour at high pressure (molecules forced close together) and low temperature (intermolecular forces become significant)", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "Why can't you say that -10°C is \"twice as cold\" as 10°C? Explain using the concept of absolute temperature. (2 steps)", "answer": "- Step 1: Temperature in Celsius doesn't represent actual thermal energy content - the Celsius scale has an arbitrary zero point\n- Step 2: Only the Kelvin scale represents true thermal energy. At 0 K, particles have zero kinetic energy; at higher temperatures, kinetic energy is proportional to T (in Kelvin)\n- Example: 10°C = 283 K, -10°C = 263 K. The ratio is 283/263 ≈ 1.08, not 2. So -10°C is not \"twice as cold\" as 10°C\n- To compare \"coldness,\" you must use absolute temperature - \"twice as cold\" would mean half the Kelvin temperature", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": true}, {"question": "A student claims that when ice melts, the temperature stays at 0°C because the room is only at 0°C. Explain why this is incorrect and what actually determines the melting point. (2 steps)", "answer": "- Step 1: This is a common misconception. The temperature at which ice melts (0°C for water at standard pressure) is NOT because of the external temperature - it's the intrinsic property of the substance\n- Step 2: The melting point is determined by the balance between intermolecular forces in the solid (holding particles together) and the thermal kinetic energy trying to break them apart\n- When heat is supplied to ice at 0°C, the energy goes to breaking bonds (potential energy), not increasing temperature. The ice will melt at 0°C regardless of whether the room is warmer or colder (as long as there's heat flow)", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": true}, {"question": "Two identical balloons are filled with equal volumes of air - one in a warm room (25°C) and one in a cold room (5°C). Which balloon has higher pressure? Explain using kinetic theory. (3 steps)", "answer": "- Step 1: The balloon in the warm room has higher pressure\n- Step 2: Using kinetic theory, at higher temperatures, gas molecules have greater average kinetic energy (E_k ∝ T in Kelvin)\n- Step 3: This means molecules move faster, hit the balloon walls more frequently AND with greater force, so pressure = force/area increases\n- Using P/T = constant (Pressure Law), if volume is constant: P₁/T₁ = P₂/T₂, so higher T gives higher P", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "Explain why ships float higher in seawater than in freshwater, even though they weigh the same in both cases. (2 steps)", "answer": "- Step 1: Seawater has a higher density than freshwater (≈1030 kg/m³ vs 1000 kg/m³)\n- Step 2: For a floating ship, upthrust must equal weight (U = W). Since U = ρ_fluid × V_displaced × g:\n  - To produce the same upthrust (equal to the ship's weight), the ship needs to displace LESS volume in denser seawater\n  - Therefore, the ship sits higher (more of it above water) in seawater than in freshwater\n\nThis is why ships have a \"load line\" that shows different maximum depths in different waters", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "A heating curve shows a substance being heated from solid below its melting point to gas above its boiling point. Sketch and label the key features, explaining why each section appears as it does. (4 steps)", "answer": "- Step 1: **Solid heating** (sloped upward): Temperature increases as kinetic energy of vibrating particles increases\n- Step 2: **Melting plateau** (horizontal at melting point): Temperature constant - supplied energy breaks intermolecular bonds (potential energy increases), not kinetic energy\n- Step 3: **Liquid heating** (sloped upward): Temperature increases again as kinetic energy increases\n- Step 4: **Boiling plateau** (horizontal at boiling point): Temperature constant - energy goes to completely separating molecules (overcoming ALL intermolecular forces), not increasing kinetic energy\n- Step 5: **Gas heating** (sloped upward): Temperature increases as kinetic energy of freely moving molecules increases\n\nThe plateaus represent phase changes where internal energy changes but temperature doesn't", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": true}, {"question": "Why does hot oil flow more easily than cold oil? Explain in terms of viscosity and temperature. (2 steps)", "answer": "- Step 1: Viscosity is a measure of a fluid's resistance to flow - it can be thought of as the fluid's \"thickness\"\n- Step 2: For liquids, viscosity decreases as temperature increases. This is because at higher temperatures, molecules have more kinetic energy and can overcome intermolecular attractions more easily, allowing them to slide past each other more freely\n- Note: For gases, the opposite is true - viscosity increases with temperature because molecules move faster and collide more frequently", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "A sphere falls through a fluid. If you double the radius of the sphere while keeping all other factors the same, by what factor does the terminal velocity change? Explain using the derived formula. (3 steps)", "answer": "- Step 1: From the terminal velocity formula: v_term ∝ r² (when other factors constant)\n- Step 2: If radius r is doubled (r → 2r), then v_term ∝ (2r)² = 4r²\n- Step 3: Therefore, the terminal velocity increases by a factor of 4\n\nThis is because:\n- Weight increases as r³ (since mass ∝ r³)\n- Drag increases as r (from Stokes' law)\n- So the balance gives v_term ∝ r²\n\nLarger spheres reach higher terminal velocities", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "Explain why Stokes' law cannot be used to calculate drag on a falling skydiver. What type of drag law applies instead? (2 steps)", "answer": "- Step 1: Stokes' law (F = 6πηrv) only applies under specific conditions:\n  - Small spherical objects\n  - Low speeds (laminar flow)\n  - The object must be small relative to the fluid\n- Step 2: A skydiver is:\n  - Not spherical (irregular shape)\n  - Moving at high speed (turbulent flow)\n  - Too large for the conditions to apply\n- At high speeds, drag becomes proportional to v² (quadratic drag): F_drag = ½ρAv²C_d\n- This is why skydivers reach a much higher terminal velocity than small spheres, and why they accelerate until drag equals weight", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "Why does the pressure at the bottom of a dam wall need to be greater than at the top? Calculate the pressure difference between points 10 m and 30 m deep in water. (3 steps)", "answer": "- Step 1: Pressure in a fluid at rest increases with depth due to the weight of the fluid above\n- Step 2: The formula is P = ρgh, where h is depth below the surface\n- Step 3: At 10 m: P₁ = 1000 × 9.81 × 10 = 98,100 Pa\n- At 30 m: P₂ = 1000 × 9.81 × 30 = 294,300 Pa\n- Difference = P₂ - P₁ = 196,200 Pa ≈ 196 kPa\n- This explains why dam walls are much thicker at the bottom - they must withstand greater pressure", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "A 0.5 kg block of wood (density 600 kg/m³) is placed in water. Will it float or sink? Calculate the upthrust when it is fully submerged. (4 steps)", "answer": "- Step 1: Compare densities: Wood (600 kg/m³) < Water (1000 kg/m³)\n- Step 2: Since object density < fluid density, the object will float\n- Step 3: To find upthrust when fully submerged (for calculation): U = ρ_water × V_wood × g\n- Step 4: Find volume of wood: V = m/ρ = 0.5/600 = 8.33 × 10⁻⁴ m³\n  - U = 1000 × 8.33 × 10⁻⁴ × 9.81 ≈ 8.2 N\n- Since weight = mg = 0.5 × 9.81 = 4.9 N, and upthrust > weight, it will float to the surface\n\nAt equilibrium when floating: upthrust = weight = 4.9 N, meaning only part of the block is submerged", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "The average kinetic energy of gas molecules is given by E_k = ³/₂kT. If you double the Kelvin temperature, what happens to the average kinetic energy? What about if you double the Celsius temperature? (2 parts)", "answer": "- **Doubling Kelvin temperature:** Average kinetic energy doubles\n  - Example: If T = 300 K → 600 K, then E_k increases by factor of 2\n  - This is because E_k ∝ T directly (for Kelvin)\n\n- **Doubling Celsius temperature:** The kinetic energy does NOT double\n  - Example: If temperature goes from 20°C (293 K) to 40°C (313 K):\n  - The Kelvin temperatures are 293 K and 313 K\n  - The ratio is 313/293 ≈ 1.07, not 2\n  - The increase in kinetic energy is only about 7%, not 100%\n- This is why Kelvin must always be used in gas law calculations", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": true}, {"question": "When cooling a gas at constant volume, what happens to the pressure? Predict what would happen if you could cool the gas to absolute zero. (2 parts)", "answer": "- Using the Pressure Law (P/T = constant): When temperature decreases, pressure decreases proportionally\n- At absolute zero (0 K = -273.15°C): Theoretically, the pressure would become zero\n- This is because at 0 K, molecules would have zero kinetic energy (they would stop moving), so there would be no collisions with the container walls, hence zero pressure\n\nNote: This is theoretical - no real gas can reach absolute zero, and at very low temperatures, gases would liquefy or solidify before reaching zero pressure", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "A student says that \"internal energy is the same as heat.\" Explain why this is incorrect and define internal energy properly. (2 steps)", "answer": "- Step 1: This is a common misconception. Internal energy (U) is NOT the same as heat\n- Step 2: Internal energy is the TOTAL energy of all molecules in a substance:\n  - Kinetic energies (from motion: translation, rotation, vibration)\n  - Potential energies (from intermolecular forces and bonds)\n- Heat (Q) is energy transferred due to temperature difference\n- Work (W) is energy transferred by forces\n- The change in internal energy is given by the first law of thermodynamics: ΔU = Q + W (energy added as heat + energy added as work)\n\nA substance can have high internal energy but not be \"hot\" (e.g., liquid water at 20°C has internal energy from both kinetic and potential components)", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "Explain why a measuring cylinder is used to measure the volume of an irregular solid object, and describe the procedure. (2 steps)", "answer": "- Step 1: A measuring cylinder (graduated cylinder) is used with the water displacement method\n- Step 2: Procedure:\n  1. Fill the measuring cylinder with a known volume of water (V₁)\n  2. Carefully submerge the irregular object in the water\n  3. Read the new water level (V₂)\n  4. The volume of the object = V₂ - V₁ (the displaced water)\n- This works because the object displaces its own volume of water (Archimedes' principle)\n\nFor very small objects, a graduated cylinder with a narrower bore or an \"overflow can\" method can be used for better accuracy", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "Why do some ice cubes float in water while others sink? What does this tell us about the density of ice compared to water? (2 steps)", "answer": "- Step 1: Ice floats in water because ice is less dense than liquid water\n- Step 2: This is unusual - most substances are denser in solid form than liquid form. For water:\n  - Density of ice ≈ 917 kg/m³\n  - Density of liquid water ≈ 1000 kg/m³\n- This is because water molecules form a special open crystalline structure when frozen (hydrogen bonds create a tetrahedral arrangement with more space), making ice less dense\n- Since ice is less dense, when it forms on a lake surface, it floats and insulates the water below, allowing aquatic life to survive winter", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "A gas is kept at constant pressure while its temperature changes from 27°C to 127°C. What happens to its volume? Calculate the ratio V₂/V₁. (3 steps)", "answer": "- Step 1: This is Charles' Law: V/T = constant (at constant pressure)\n- Step 2: Convert temperatures to Kelvin:\n  - T₁ = 27 + 273 = 300 K\n  - T₂ = 127 + 273 = 400 K\n- Step 3: Calculate ratio: V₂/V₁ = T₂/T₁ = 400/300 = 4/3 ≈ 1.33\n- The volume increases by a factor of 1.33 (or increases by 33%)\n\nThis shows that at constant pressure, doubling the absolute temperature doubles the volume", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "Why does a bubble rising in water eventually reach a constant (terminal) velocity, even though it's moving upward? Explain the forces involved. (3 steps)", "answer": "- Step 1: A rising bubble experiences three main forces:\n  - **Weight (W):** mg, acting downward (but bubble is very light)\n  - **Upthrust (U):** ρ_fluid × V × g, acting upward (due to displaced water)\n  - **Drag (F_d):** 6πηrv (Stokes' law), acting downward (opposing motion)\n- Step 2: Initially, net upward force (U - W) causes upward acceleration\n- Step 3: As velocity increases, drag increases (proportional to v). At terminal velocity: U = W + F_d (net force = 0), so it rises at constant velocity\n- The same principle applies as for a falling object, just with the density terms reversed (bubble density < fluid density, so net force is upward)", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": true}], "count": 39}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "Why does an atom feel like it's \"mostly empty space,\" and what does this reveal about where mass lives?", "answer": "- Step 1: An atom has a tiny dense nucleus (protons + neutrons) surrounded by an electron cloud at a relatively huge distance.\n- Step 2: The nucleus is about $$10^{-15}$$ m wide while the atom is about $$10^{-10}$$ m wide — roughly 100,000× bigger than the nucleus.\n+ If the nucleus were a marble, the atom would be the size of a football stadium.\n- Step 3: Since electrons have negligible mass compared to protons/neutrons, almost all the mass sits in the nucleus, while the volume is dominated by the electron cloud — hence \"mostly empty space, mostly nuclear mass.\"\n\nThe atom's mass and volume live in completely different places: mass in the nucleus, volume in the electron cloud.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": true}, {"question": "A proton is made of uud quarks. Walk through why this combination gives charge +1e. (3 steps)", "answer": "- Step 1: Up quark has charge $$+\\tfrac{2}{3}e$$, down quark has charge $$-\\tfrac{1}{3}e$$.\n- Step 2: Sum for uud: $$+\\tfrac{2}{3} + \\tfrac{2}{3} - \\tfrac{1}{3}$$.\n+ Combine the two ups: $$+\\tfrac{4}{3}$$.\n+ Subtract the down: $$+\\tfrac{4}{3} - \\tfrac{1}{3} = +1$$.\n- Step 3: So the proton carries $$+1e$$ — exactly cancelling the electron's $$-1e$$ to make a neutral hydrogen atom.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "A neutron is udd. Why is its net charge exactly zero, and what does this tell you about whether \"neutral\" means \"no charge inside\"?", "answer": "- Step 1: $$+\\tfrac{2}{3} - \\tfrac{1}{3} - \\tfrac{1}{3} = 0$$. The fractional charges of one up and two downs sum perfectly to zero.\n- Step 2: \"Neutral\" does NOT mean \"no charge inside\" — the neutron is built from charged quarks that happen to cancel out.\n- Step 3: This is why neutrons can still interact electromagnetically in subtle ways (magnetic moment) even though net charge is zero — internal structure matters.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": true}, {"question": "What are the four broad categories of particles/forces in the Standard Model, and which force carrier belongs to each? (2 steps)", "answer": "- Step 1: Matter particles split into **quarks** (build hadrons like protons/neutrons) and **leptons** (electrons, neutrinos).\n- Step 2: Forces are mediated by **gauge bosons**:\n+ Strong force → gluons (binds quarks)\n+ Electromagnetic → photons\n+ Weak force → W and Z bosons (beta decay)\n+ Gravity → graviton (theoretical, not confirmed)", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "Density is $$\\rho = m/V$$. Why is it intrinsic to a material rather than depending on how much of it you have?", "answer": "- Step 1: If you double the amount of material, both $$m$$ and $$V$$ double — the ratio stays the same.\n- Step 2: This makes density a *property of the substance itself* (like a fingerprint), not of the specific sample.\n+ A grain of iron and an iron girder have the same density.\n- Step 3: That's why density is useful for *identifying* materials — it doesn't care about sample size or shape.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": true}, {"question": "A paving slab is 73 kg with dimensions 40 mm × 500 mm × 850 mm. Conceptually, what's the trap students fall into when computing its density, and roughly what order of magnitude should the answer be? (3 steps)", "answer": "- Step 1: The trap is mixing units — leaving lengths in mm gives a volume in $$\\text{mm}^3$$, which is $$10^9$$ times smaller than $$\\text{m}^3$$. The density then looks insanely large or small.\n- Step 2: Convert all lengths to metres: $$0.040 \\times 0.500 \\times 0.850 \\approx 0.017\\,\\text{m}^3$$.\n- Step 3: Density $$\\approx 73 / 0.017 \\approx 4000\\,\\text{kg/m}^3$$ — a few thousand kg/m³, sensible for a dense rocky material (denser than water at 1000, less than lead at 11000).\n\nAlways convert *before* computing volume — cubic conversions are where errors hide.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": true}, {"question": "Why must you cube the conversion factor when converting cm³ to m³, and what's the conversion factor?", "answer": "- Step 1: 1 cm = $$10^{-2}$$ m, so 1 cm³ = $$(10^{-2})^3 = 10^{-6}$$ m³.\n- Step 2: Volume is *three* lengths multiplied together, so the conversion factor must be cubed.\n+ For mm³ → m³: $$(10^{-3})^3 = 10^{-9}$$.\n- Step 3: This is why ignoring cubic conversions can throw an answer off by factors of millions or billions — far worse than linear-unit mistakes.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": true}, {"question": "Describe how the *arrangement, bonds, and motion* differ across solid, liquid, and gas — and what physical consequence each difference produces. (3 steps)", "answer": "- Step 1: **Solid** — close, regular arrangement; strong bonds; vibrate about fixed positions. Consequence: fixed shape and volume.\n- Step 2: **Liquid** — close but irregular arrangement; medium bonds; particles can slip past one another. Consequence: fixed volume, takes shape of container.\n- Step 3: **Gas** — far apart; very weak bonds (effectively none except during collisions); fast, random motion. Consequence: takes both shape *and* volume of container, highly compressible.\n\nThe strength of bonds dictates whether particles can re-arrange (flow) and how much volume they occupy.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "Even at very cold temperatures, particles in a solid never stop moving entirely — except at one specific temperature. What is that temperature, and what's the deep reason it acts as a floor? (3 steps)", "answer": "- Step 1: That temperature is **absolute zero**, equal to 0 K or about −273.15 °C.\n- Step 2: Temperature is a measure of the *average kinetic energy* of particles. To stop them entirely would mean removing all kinetic energy.\n- Step 3: You cannot remove energy that isn't there, so you can't go below 0 K — it's a floor, not a number that goes negative.\n+ At any temperature above 0 K, particles emit infrared radiation; at exactly 0 K, they wouldn't.\n+ In practice 0 K has never been reached — only approached.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": true}, {"question": "Why is the Kelvin scale \"more physical\" than Celsius for describing temperature-dependent behaviour of particles?", "answer": "- Step 1: Kelvin starts at the point of zero kinetic energy, so a Kelvin value is *proportional* to average KE.\n- Step 2: Doubling Kelvin really does mean doubling average molecular KE. Doubling Celsius doesn't — e.g. going from 1 °C to 2 °C is a tiny relative change in molecular energy, not a doubling.\n- Step 3: This is why all gas-law equations ($$PV = nRT$$, $$E_k = \\tfrac{3}{2}kT$$) require Kelvin — they encode proportional relationships that only hold on an absolute scale.\n\nCelsius is a *labelling* scale; Kelvin is a *physical* scale.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "Why does a Δθ of \"1 K\" equal a Δθ of \"1 °C\" even though the scales differ?", "answer": "- Step 1: The two scales are offset by 273.15 but use the same size of degree (same division spacing).\n- Step 2: When you take a *difference*, the offset cancels out: $$(T_2 + 273.15) - (T_1 + 273.15) = T_2 - T_1$$.\n- Step 3: That's why specific-heat-capacity equations using Δθ work in either unit — but absolute-temperature equations like $$PV = nRT$$ do not.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "Explain the conceptual structure of internal energy U. Why does it have *two* components rather than just \"energy\"?", "answer": "- Step 1: Particles have **kinetic energy** (from their motion: translation, vibration, rotation) — this sets the *temperature*.\n- Step 2: Particles also have **potential energy** stored in the *separation/configuration* of intermolecular bonds — like stretched/compressed springs between molecules.\n- Step 3: Internal energy U = sum of both, because to fully describe the energy of a substance you must account for both how *fast* particles move AND how they're *positioned* relative to each other.\n+ Phase changes only affect the PE part (bonds), not the KE part (temperature stays constant).\n+ Heating an isolated gas (no bonds to worry about) only affects the KE part.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": true}, {"question": "During melting at 0 °C, you keep adding energy to ice, yet the temperature doesn't rise. Where is the energy going, and why doesn't temperature track the energy input? (3 steps)", "answer": "- Step 1: The energy goes into breaking the intermolecular bonds holding the rigid lattice together — increasing the molecules' **potential energy**, not their kinetic energy.\n- Step 2: Temperature is set only by *kinetic* energy. If kinetic energy isn't changing, temperature can't change.\n- Step 3: Once all bonds in the solid structure are broken (everything is liquid), additional heat then goes back into KE, and temperature rises again.\n\nThe flat sections on a heating curve are pure PE work — KE (temperature) only rises on the sloping sections.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": true}, {"question": "Why does vaporising 1 kg of water require roughly seven times more energy than melting 1 kg of ice? (3 steps)", "answer": "- Step 1: Melting only loosens the lattice — molecules still attract each other strongly in the liquid; you've only increased separation slightly.\n- Step 2: Vaporising must completely separate molecules so that intermolecular forces become negligible — you're working against attraction over a much larger range.\n- Step 3: More bonds to fully break = much more PE needed → much larger latent heat of vaporisation (~2.26 MJ/kg) compared to fusion (~334 kJ/kg).\n\nThe ratio reflects how much more energy is needed to *separate* molecules vs. merely *loosen* them.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": true}, {"question": "Sketch the heating curve of water from −20 °C to +120 °C. Label each segment and explain what's physically happening. (5 steps)", "answer": "- Step 1: Sloped segment from −20 to 0 °C: solid ice heating; KE rising, particles vibrating faster.\n- Step 2: Flat segment at 0 °C: melting; PE rising as lattice bonds break; KE constant.\n- Step 3: Sloped segment from 0 to 100 °C: liquid heating; KE rising again, molecules move faster.\n- Step 4: Flat segment at 100 °C: boiling; PE rising as molecules fully separate into gas; KE constant.\n- Step 5: Sloped segment above 100 °C: gas heating; KE rising, gas molecules zip faster and pressure (if confined) rises.\n\nThe slopes are \"KE work\" (temperature changes); the flats are \"PE work\" (bonds break, state changes).", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": true}, {"question": "Looking at a cooling curve of stearic acid, how do you determine the *duration* of the liquid-to-solid phase change? (3 steps)", "answer": "- Step 1: Identify the *flat horizontal section* of the temperature-time curve — this is when temperature stays constant, indicating a phase change.\n- Step 2: Read off the start time (when temperature first plateaus) and the end time (when temperature starts decreasing again).\n- Step 3: Duration = end time − start time. For example, if flat from 160 s to 910 s, duration = 750 s.\n\nThe flat section's *length* in time tells you how long the phase change took.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "Name each phase transition and which direction (energy in / energy out) it requires:", "answer": "- Solid → Liquid: **Melting** (energy in)\n- Liquid → Solid: **Freezing** (energy out)\n- Liquid → Gas: **Boiling** / vaporisation (energy in)\n- Gas → Liquid: **Condensing** (energy out)\n- Solid → Gas: **Sublimation** (energy in)\n- Gas → Solid: **Deposition** (energy out)\n\nEnergy flows IN when going to a more disordered/separated state; energy flows OUT going the reverse direction.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "Explain why the specific heat capacity equation $$\\Delta E = mc\\Delta\\theta$$ CANNOT be applied during a phase change.", "answer": "- Step 1: The equation assumes temperature changes when heat is added, with $$c$$ relating energy to temperature change.\n- Step 2: During a phase change, $$\\Delta\\theta = 0$$ even though energy is being supplied — the equation would predict zero energy, which is wrong.\n- Step 3: For phase changes you must use $$\\Delta E = L\\Delta m$$, where energy goes into changing the mass that has transitioned, not raising temperature.\n\nTwo different physical processes — two different equations.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "Water has an unusually high specific heat capacity of about 4200 J kg⁻¹ K⁻¹. Conceptually, why does this make water excellent for radiators and climate buffering? (3 steps)", "answer": "- Step 1: High $$c$$ means you can store a *lot* of thermal energy per kg of water for a small temperature rise.\n- Step 2: This means water cools down slowly too — radiators stay warm long after the heating turns off.\n- Step 3: On a planetary scale, oceans absorb huge amounts of solar energy with modest temperature change, moderating climate near coasts.\n\nHigh $$c$$ = \"thermal flywheel\" — stores energy, releases it slowly.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "Heating 2 kg of water by 50 K, conceptually estimate how much energy that takes (water $$c \\approx 4200$$ J kg⁻¹ K⁻¹) without doing precise arithmetic, just orders of magnitude.", "answer": "- Step 1: $$mc\\Delta\\theta \\approx 2 \\times 4000 \\times 50$$ — round 4200 to 4000 for mental math.\n- Step 2: $$2 \\times 4000 = 8000$$, then $$8000 \\times 50 = 400{,}000$$ J.\n- Step 3: So roughly 400 kJ — about enough energy to lift a 40 kg mass 1 km, or burn a small lightbulb (~10 W) for ~10 hours.\n\nIt's a lot — water is energetically \"expensive\" to heat.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "A heater supplies 10,000 J and melts 0.030 kg of ice. Conceptually, what's the latent heat of fusion and roughly how does it compare to the textbook value?", "answer": "- Step 1: $$L = \\Delta E / \\Delta m = 10000 / 0.030 \\approx 333{,}000$$ J/kg.\n- Step 2: This is essentially the textbook value of 334 kJ/kg for ice — a percentage error around 1%.\n- Step 3: The small discrepancy comes from heat losses to surroundings and inaccuracies in mass measurement — sources of *systematic* error you'd reduce with better insulation.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "State the ideal gas equation in both molar form and molecule form, and explain why the two are equivalent. (3 steps)", "answer": "- Step 1: Molar form: $$PV = nRT$$ where $$n$$ = moles, $$R$$ = 8.31 J mol⁻¹ K⁻¹.\n- Step 2: Molecule form: $$PV = NkT$$ where $$N$$ = number of molecules, $$k$$ = Boltzmann constant.\n- Step 3: They're equivalent because $$N = n \\times N_A$$ (Avogadro), and $$k = R/N_A$$. Substituting: $$nRT = n N_A \\times (R/N_A) T = NkT$$.\n\nUse moles when given $$n$$ or mass; use molecules when given $$N$$ directly.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "What are the four key assumptions behind an \"ideal gas,\" and what do they each rule out about real gases? (4 steps)", "answer": "- Step 1: **Molecular volume is negligible** compared to container volume. Rules out short-range repulsion at high density.\n- Step 2: **No intermolecular forces** except during collisions. Rules out attractive forces that cause real gases to liquefy.\n- Step 3: **Collisions are perfectly elastic** — kinetic energy is conserved. Rules out energy losses to internal vibrations/rotations.\n- Step 4: **Random motion** — particles move in all directions equally; large number, so statistics smooth out.\n\nReal gases deviate most when these assumptions fail: high pressure (molecules squeezed close) or low temperature (forces matter more).", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": true}, {"question": "Explain microscopically why heating a gas at constant volume increases its pressure. Use three F-words. (3 steps)", "answer": "- Step 1: Heating raises the average KE → molecules move **faster**.\n- Step 2: Faster molecules collide with the walls **more frequently**.\n- Step 3: Each collision also delivers more **force** (faster particles → larger momentum change per hit).\n+ Pressure = force / area, so more force more frequently per unit area = higher pressure.\n\nFaster, More Frequently, More Force → pressure goes up.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": true}, {"question": "Boyle's law says $$PV = \\text{const}$$ at constant T. Microscopically, why does halving the volume double the pressure? (3 steps)", "answer": "- Step 1: At constant T, molecules have the same average speed (KE unchanged).\n- Step 2: Halve the container — molecules now have to travel half the distance between wall collisions, so they hit each wall **twice as often**.\n- Step 3: Same force per collision × twice the frequency = double the pressure.\n\nThe \"P up when V down\" comes from collision frequency, not from particles moving faster.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "Charles's law says $$V \\propto T$$ at constant P. Why does the volume need to increase when you heat a gas at constant pressure? (3 steps)", "answer": "- Step 1: Heating raises particle speeds → harder, more frequent collisions → tendency for pressure to rise.\n- Step 2: To keep pressure *constant*, the gas must expand so collisions are less frequent again (longer distance between walls).\n- Step 3: The expansion exactly compensates for the increased particle speed, keeping the force-per-area on the walls constant.\n\nConstant pressure is a *constraint* — the gas adjusts its volume to satisfy it.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": false}, {"question": "Why must you use Kelvin (never Celsius) in $$PV = nRT$$ or Charles's law $$V/T = \\text{const}$$? Use a concrete example. (3 steps)", "answer": "- Step 1: These laws encode *proportional* relationships between physical quantities — proportionality only works on absolute scales.\n- Step 2: Example: gas at 27 °C heated to 54 °C. In Celsius, $$T$$ doubled? In Kelvin: 300 K → 327 K, only a 9% increase. The volume only grows 9%, not 100%.\n- Step 3: Using Celsius would predict twice the volume change. Worse, at 0 °C, V/T would divide by zero — yet 0 °C is just a regular temperature.\n\nThe laws are about *absolute* KE/temperature, not about an arbitrary water-based scale.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": true}, {"question": "Derive the kinetic theory relation $$E_k = \\tfrac{3}{2}kT$$ for the average KE of a single ideal gas molecule. (4 steps)", "answer": "- Step 1: From kinetic theory: $$PV = \\tfrac{1}{3} N m \\overline{c^2}$$, where $$m$$ is mass of one molecule and $$\\overline{c^2}$$ is mean square speed.\n- Step 2: From ideal gas: $$PV = NkT$$.\n- Step 3: Set the right-hand sides equal: $$\\tfrac{1}{3} N m \\overline{c^2} = NkT$$. Cancel $$N$$ and multiply both sides by 3: $$m\\overline{c^2} = 3kT$$.\n- Step 4: Multiply both sides by $$\\tfrac{1}{2}$$ to get KE form: $$\\tfrac{1}{2}m\\overline{c^2} = \\tfrac{3}{2}kT$$. So $$E_k = \\tfrac{3}{2}kT$$.\n\nTemperature *is* the average translational KE, scaled by $$\\tfrac{3}{2}k$$.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": true}, {"question": "If you double the Kelvin temperature of an ideal gas, what happens to (i) the average KE per molecule, (ii) the rms speed?", "answer": "- Step 1: $$E_k = \\tfrac{3}{2}kT$$, so KE is *proportional* to T → doubling T doubles average KE.\n- Step 2: $$E_k = \\tfrac{1}{2}m c_{rms}^2$$, so $$c_{rms}^2 \\propto T$$, meaning $$c_{rms} \\propto \\sqrt{T}$$.\n- Step 3: Doubling T multiplies $$c_{rms}$$ by $$\\sqrt{2} \\approx 1.41$$ — only about 41% faster, not double.\n\nKE scales linearly with T, but speed scales with the square root — easy to confuse.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "A gas at 300 K is heated to 600 K at constant volume. By what factor does pressure change, and conceptually why?", "answer": "- Step 1: At constant V, $$P/T = \\text{const}$$, so $$P \\propto T$$.\n- Step 2: Doubling T doubles P → pressure goes from $$P_0$$ to $$2P_0$$.\n- Step 3: Microscopically: molecules have 2× the KE → $$\\sqrt{2}$$× the speed → both impulse per collision and collision rate scale, combining to double the pressure.\n\nThe factor of 2 comes out cleanly only when using Kelvin.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "Why does Boltzmann's constant $$k = R/N_A$$ have units of J K⁻¹, and what's the conceptual meaning of its tiny value (~$$1.38 \\times 10^{-23}$$)?", "answer": "- Step 1: $$E = kT$$ gives energy from temperature → units of $$k$$ must be (energy)/(temperature) = J K⁻¹.\n- Step 2: The value is tiny because a single molecule has an incredibly small KE for each unit of temperature.\n- Step 3: To get the macroscopic gas constant $$R$$, you multiply $$k$$ by Avogadro's number ($$6 \\times 10^{23}$$) — i.e., add up energies of a mole of molecules.\n\n$$k$$ is the \"per-molecule\" version of $$R$$ — it bridges microscopic and macroscopic.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": true}, {"question": "State Archimedes' principle, then derive the magnitude of upthrust on a fully submerged object in terms of fluid density, object volume, and g. (3 steps)", "answer": "- Step 1: **Principle**: an object submerged in a fluid experiences an upward force equal to the weight of fluid displaced.\n- Step 2: The volume of displaced fluid equals the submerged volume of the object: $$V_{disp} = V_{obj}$$.\n- Step 3: Weight of displaced fluid = $$m_{fluid} \\, g = \\rho_{fluid} V_{disp} \\, g$$. So upthrust $$F_b = \\rho_{fluid} V g$$.\n\nNotice the object's *own* density doesn't appear — upthrust is determined by the fluid and the volume displaced.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "Conceptually, why does an iceberg float with most of its mass below water? (3 steps)", "answer": "- Step 1: Floating means upthrust = weight of iceberg → $$\\rho_{water} V_{sub} g = \\rho_{ice} V_{ice} g$$.\n- Step 2: Rearranging: $$V_{sub}/V_{ice} = \\rho_{ice}/\\rho_{water} \\approx 917/1020 \\approx 0.90$$.\n- Step 3: So about 90% of the iceberg's volume must be submerged to displace enough water to support its weight. Only ~10% sticks out.\n\nThe closer object and fluid densities are, the deeper the object sits.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": true}, {"question": "Why does a ship made of dense steel float, while a solid steel cube of the same mass would sink? (3 steps)", "answer": "- Step 1: Floating depends on average density of the *whole object including any air inside*, not the density of the material.\n- Step 2: A ship's hull is hollow — it encloses a huge volume of air, dramatically lowering the average density below that of water.\n- Step 3: A solid steel cube has no enclosed air; its average density equals steel's (~7800 kg/m³), far above water (1000), so it sinks.\n\nIt's the *displaced volume relative to weight* that matters, not the material alone.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": true}, {"question": "What's the conceptual difference between \"weight of fluid displaced\" and \"weight of the object\"? When are they equal?", "answer": "- Step 1: Weight of fluid displaced = $$\\rho_{fluid} V_{displaced} g$$ — this is the *upthrust*.\n- Step 2: Weight of object = $$\\rho_{obj} V_{obj} g$$ — this is what gravity pulls down.\n- Step 3: They are equal **only when an object floats in equilibrium** — then the object only sinks enough to displace fluid equal to its own weight.\n+ Fully submerged sinking object: upthrust < weight.\n+ Buoyant rising bubble: upthrust > weight.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": true}, {"question": "State Stokes' law for viscous drag on a small sphere, then explain the role of each variable. (3 steps)", "answer": "- Step 1: $$F = 6\\pi \\eta r v$$, where F is drag force, $$\\eta$$ is fluid viscosity, r is sphere radius, v is sphere speed.\n- Step 2: Larger $$\\eta$$ → \"thicker\" fluid → more resistance to motion → more drag.\n- Step 3: Larger $$r$$ or $$v$$ → more fluid being pushed aside per second → more drag.\n+ The factor $$6\\pi$$ is a geometric constant that comes from the math of viscous flow around a sphere.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "What are the three conditions under which Stokes' law applies, and what happens when they fail? (3 steps)", "answer": "- Step 1: **Sphere shape** — non-spherical bodies have different drag coefficients.\n- Step 2: **Small size** — large objects create turbulence at the same speed.\n- Step 3: **Low speed (laminar flow)** — at high speeds, flow becomes turbulent and drag scales as $$v^2$$ instead of $$v$$.\n+ A skydiver in air, for example, is in the turbulent regime — Stokes' law would massively underestimate the drag.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "Derive the formula for the terminal velocity of a sphere falling through a fluid using force balance. (4 steps)", "answer": "- Step 1: At terminal velocity, net force = 0, so weight = upthrust + drag: $$\\rho_s V g = \\rho_f V g + 6\\pi\\eta r v_{term}$$.\n- Step 2: Substitute $$V = \\tfrac{4}{3}\\pi r^3$$ for a sphere: $$\\tfrac{4}{3}\\pi r^3 \\rho_s g = \\tfrac{4}{3}\\pi r^3 \\rho_f g + 6\\pi\\eta r v_{term}$$.\n- Step 3: Combine like terms: $$\\tfrac{4}{3}\\pi r^3 (\\rho_s - \\rho_f) g = 6\\pi\\eta r v_{term}$$.\n- Step 4: Solve for $$v_{term}$$: $$v_{term} = \\dfrac{2 r^2 (\\rho_s - \\rho_f) g}{9\\eta}$$.\n\nKey insight: $$v_{term} \\propto r^2$$ and $$\\propto 1/\\eta$$.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": false}, {"question": "Why does terminal velocity scale with $$r^2$$ rather than $$r$$, and what does this mean practically? (3 steps)", "answer": "- Step 1: Weight scales with volume $$\\propto r^3$$ — the \"driver\" of falling.\n- Step 2: Drag scales with $$r \\times v$$ — only one power of $$r$$.\n- Step 3: To balance, $$v$$ must absorb the extra power of $$r$$ from weight, so $$v_{term} \\propto r^3/r = r^2$$.\n+ Practically: a sphere twice as large falls four times faster at terminal velocity.\n+ This is why fine dust hangs in air almost forever, while pebbles fall quickly.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": true}, {"question": "What happens to liquid viscosity as temperature increases, and what's the opposite behaviour in gases? Why? (3 steps)", "answer": "- Step 1: **Liquids**: viscosity *decreases* with temperature. Heated molecules have more KE and overcome intermolecular bonds more easily → flow more freely.\n- Step 2: **Gases**: viscosity *increases* with temperature. Faster gas molecules collide more often, transferring more momentum sideways → more resistance to shear.\n- Step 3: The mechanisms are different because viscosity in liquids comes from *bonds*, while in gases it comes from *momentum transfer in collisions*.\n\nHoney thins when warm; hot air \"drags\" more than cool air.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": true}, {"question": "A small bubble rises in a liquid and reaches a terminal velocity. How does the force balance differ from a falling sphere? (3 steps)", "answer": "- Step 1: For a bubble, the fluid density > bubble density, so upthrust > weight — bubble accelerates upward initially.\n- Step 2: Drag now acts *downward* (opposing upward motion). At terminal velocity: upthrust = weight + drag.\n- Step 3: The same formula $$v_{term} = \\tfrac{2r^2 (\\rho_s - \\rho_f) g}{9\\eta}$$ applies but $$\\rho_s - \\rho_f$$ is *negative*, giving a negative (i.e., upward) terminal velocity.\n\nThe math is symmetric; the sign tells you direction.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "Why is plasma sometimes called a \"fourth state of matter,\" and how does it differ structurally from a gas? (3 steps)", "answer": "- Step 1: Plasma is what you get when a gas is heated so much that electrons are stripped from atoms — ionisation.\n- Step 2: Unlike a normal gas (neutral atoms/molecules), plasma is a soup of free electrons and positive ions, making it electrically conductive and responsive to magnetic fields.\n- Step 3: This is the state of matter in stars and fusion experiments — fusion specifically requires plasma so that nuclei (no electron shielding) can get close enough to fuse.\n\nHeat → vibrate → flow → freely move → ionise: the ladder of states.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "When water freezes, it *expands* rather than contracts. Why is this so unusual, and what would happen if water behaved \"normally\"? (3 steps)", "answer": "- Step 1: For most substances, solids are denser than liquids — molecules pack closer in the rigid lattice.\n- Step 2: Water's molecules form a hexagonal hydrogen-bonded lattice when frozen that leaves more empty space than the disordered liquid.\n- Step 3: If ice were denser than water, ice would sink — lakes would freeze from the bottom up, killing aquatic life. The \"anomaly\" makes Earth habitable.\n\nA small structural quirk has planet-scale consequences.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": true}, {"question": "A student claims: \"Heating a substance always raises its temperature.\" Why is this wrong, and under what condition does the claim fail? (3 steps)", "answer": "- Step 1: The claim ignores phase changes. During melting or boiling, the substance absorbs energy but temperature stays constant.\n- Step 2: The added energy goes into breaking intermolecular bonds (PE), not into increasing KE (which would raise temperature).\n- Step 3: Once the phase change is complete, additional heating *does* raise temperature again.\n\n\"Heat in = temperature up\" only holds within a single phase, not across phase boundaries.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "Why does evaporation cool the remaining liquid, even below the boiling point? (3 steps)", "answer": "- Step 1: In a liquid, molecules have a *distribution* of KEs — some are faster than average.\n- Step 2: The fastest molecules near the surface can escape into the gas phase (evaporation), carrying away high KE.\n- Step 3: With the high-KE tail removed, the *average* KE of the remaining molecules decreases → temperature drops.\n\nThis is why sweat cools you — only the most energetic water molecules evaporate.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": true}, {"question": "1 mol of ideal gas at 300 K is in a 0.025 m³ container. Conceptually estimate the pressure without precise computation. (3 steps)", "answer": "- Step 1: $$P = nRT/V \\approx (1)(8)(300)/(0.025)$$ — using R ≈ 8.\n- Step 2: Numerator: 8 × 300 = 2400. Denominator: 0.025 = 1/40.\n- Step 3: P ≈ 2400 × 40 = 96,000 Pa ≈ 100 kPa — about atmospheric pressure, which makes physical sense.\n\nGas laws give intuitive numbers when you use Kelvin and SI units.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": false}, {"question": "Why does the average molecular KE equation $$E_k = \\tfrac{3}{2}kT$$ have a factor of 3 (not, say, 2 or 1)? (3 steps)", "answer": "- Step 1: A gas molecule has three independent directions of translational motion (x, y, z) — three \"degrees of freedom\".\n- Step 2: By equipartition, each degree of freedom carries $$\\tfrac{1}{2}kT$$ of KE on average.\n- Step 3: Total translational KE = $$3 \\times \\tfrac{1}{2}kT = \\tfrac{3}{2}kT$$.\n\nThe 3 reflects three dimensions — in a hypothetical 2D gas, the answer would be $$kT$$.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": true}, {"question": "Two gas samples have the same temperature. Sample A is helium, Sample B is oxygen. Which has higher average molecular KE, and which has higher rms speed?", "answer": "- Step 1: Same temperature → same average KE per molecule ($$\\tfrac{3}{2}kT$$ is independent of molecular mass).\n- Step 2: But $$E_k = \\tfrac{1}{2}m c_{rms}^2$$, so for the same KE, lighter molecules have higher speeds.\n- Step 3: Helium (m ≈ 4 u) has lower mass than O₂ (m ≈ 32 u), so helium has higher $$c_{rms}$$ — about $$\\sqrt{32/4} = \\sqrt{8} \\approx 2.8$$× faster.\n\nSame KE, different speeds — mass matters for speed but not for energy at fixed T.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": false}, {"question": "Conceptually explain how to use a graph of pressure vs. temperature (constant V) to *experimentally* determine absolute zero. (3 steps)", "answer": "- Step 1: Plot P (y-axis) vs. T in °C (x-axis) for a fixed gas sample. Take several points by heating gradually.\n- Step 2: The data lies on a straight line. Extrapolate that line backward to the x-intercept (where P = 0).\n- Step 3: The x-intercept corresponds to the temperature at which gas particles would have zero KE → zero pressure. Experiment gives roughly −273 °C — that's absolute zero, 0 K.\n\nYou don't need to actually cool to 0 K — you extrapolate to find it.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": true}, {"question": "Synthesize: a sealed rigid container has helium gas at 300 K. You double the temperature to 600 K. What happens to pressure, rms speed, and average KE? (3 steps)", "answer": "- Step 1: **Pressure**: $$P \\propto T$$ at constant V → pressure doubles.\n- Step 2: **Average KE**: $$E_k = \\tfrac{3}{2}kT$$ → doubles.\n- Step 3: **rms speed**: $$c_{rms} \\propto \\sqrt{T}$$ → increases by $$\\sqrt{2} \\approx 1.41$$.\n\nLinear, linear, square-root — three quantities, three different scalings, same physical cause.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": false}, {"question": "Synthesize: a 0.5 kg ice block at −10 °C is heated until it becomes water vapour at 110 °C. List the *stages* of energy required, in order. (5 steps)", "answer": "- Step 1: Heat ice from −10 to 0 °C: $$Q_1 = m c_{ice} \\Delta\\theta$$ — sensible heat to raise solid temp.\n- Step 2: Melt ice at 0 °C: $$Q_2 = m L_f$$ — latent heat of fusion, temperature unchanged.\n- Step 3: Heat water from 0 to 100 °C: $$Q_3 = m c_{water} \\Delta\\theta$$ — sensible heat for liquid.\n- Step 4: Boil water at 100 °C: $$Q_4 = m L_v$$ — latent heat of vaporisation, temperature unchanged.\n- Step 5: Heat steam from 100 to 110 °C: $$Q_5 = m c_{steam} \\Delta\\theta$$ — sensible heat for gas.\n\nTotal = $$Q_1 + Q_2 + Q_3 + Q_4 + Q_5$$. The two latent heat steps dominate energetically.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": true}, {"question": "A misconception probe: \"Pressure in a gas comes from particles colliding with each other.\" Why is this wrong, and what's the correct microscopic origin of pressure? (3 steps)", "answer": "- Step 1: Particle-particle collisions in the gas redistribute energy but don't transmit force to the *walls* — which is what a pressure gauge measures.\n- Step 2: Pressure comes from particles colliding with **the walls of the container**. Each collision imparts impulse → force on the wall.\n- Step 3: Aggregate of many wall collisions per unit time, divided by wall area, gives pressure.\n\nIf particles only collided with each other and never the walls, the container wouldn't register pressure.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": false}, {"question": "A misconception probe: \"If I double the volume of a gas, the molecules slow down.\" Why is this wrong? (3 steps)", "answer": "- Step 1: Molecular speed is determined by **temperature**, not volume.\n- Step 2: In Boyle's law (constant T), doubling V halves P, but molecule speeds are unchanged — they just hit the walls less frequently because the walls are farther apart.\n- Step 3: Speed only changes when KE changes, which means T must change.\n\nVolume affects collision frequency, not collision speed.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": true}, {"question": "Limiting case: at very high pressure (or very low temperature), real gases deviate from $$PV = nRT$$. Conceptually, why does each assumption fail? (3 steps)", "answer": "- Step 1: **High pressure**: molecules are squeezed close — their own volume is no longer negligible compared to container volume. Effective volume available is less than V.\n- Step 2: **Low temperature**: molecules move slowly enough that *attractive* intermolecular forces start to matter — they \"stick\" briefly during near-misses, reducing effective pressure.\n- Step 3: Real-gas equations (like van der Waals) add corrections for both — ideal gas is a model, not a universal truth.\n\nThe ideal model breaks down exactly where its assumptions fail.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": true}, {"question": "An ice cube floats with 90% submerged in water. What can you immediately deduce about the cube's density relative to water?", "answer": "- Step 1: For floating: $$\\rho_{obj}/\\rho_{fluid} = V_{sub}/V_{obj}$$.\n- Step 2: 90% submerged → $$\\rho_{ice}/\\rho_{water} = 0.9$$.\n- Step 3: So $$\\rho_{ice} \\approx 0.9 \\times 1000 = 900$$ kg/m³ — consistent with the known ~917 kg/m³ for ice.\n\nThe fraction submerged *is* the density ratio.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": false}, {"question": "An object weighs 80 N in air. When fully submerged in water, the upthrust is 60 N. What is the apparent (net downward) force on the object, and what does it tell you about whether it floats or sinks?", "answer": "- Step 1: Net downward force = weight − upthrust = 80 − 60 = 20 N (down).\n- Step 2: Since net force is downward and nonzero, the object is denser than water and sinks.\n- Step 3: To make it float, you'd need upthrust ≥ weight — which would require displacing more water (e.g., reshape into a hollow boat).", "source": "Opus 4.7 ①", "_id": "opus_1_55
