tic energy.\n- Step 3: Since kinetic energy is unchanged, temperature is unchanged → flat plateau on the graph. Once all bonds of that phase change are broken, additional energy resumes increasing KE → temperature rises again.\n\nTakeaway: flat plateau = potential energy changing; sloped section = kinetic energy changing.", "source": "Opus 4.7 ②", "_id": "opus_2_11"}, {"question": "Write the ideal gas equation in two forms: one using number of moles, and one using number of molecules. What is the Boltzmann constant and how does it relate the two? (3 steps)", "answer": "- Step 1: The two forms are:\n+ $$PV = nRT$$ (where $$n$$ = number of moles, $$R$$ = molar gas constant = 8.31 J mol⁻¹K⁻¹)\n+ $$PV = NkT$$ (where $$N$$ = number of molecules, $$k$$ = Boltzmann constant)\n- Step 2: The **Boltzmann constant** $$k$$ is defined as $$k = \\frac{R}{N_A}$$, where $$N_A = 6.02 \\times 10^{23}$$ is Avogadro's number. So $$k = \\frac{8.31}{6.02 \\times 10^{23}} \\approx 1.38 \\times 10^{-23}\\ \\text{J K}^{-1}$$.\n- Step 3: Since $$N = n \\times N_A$$ (number of molecules = moles × molecules per mole), we get $$NkT = nN_A \\cdot \\frac{R}{N_A} \\cdot T = nRT$$. The Boltzmann constant bridges the microscopic (per molecule) and macroscopic (per mole) scales. It's very small because one molecule's KE increase per kelvin is tiny.", "source": "GLM 5.1 ③", "_id": "glm_3_26"}, {"question": "Why does the Celsius scale fail when comparing \"twice as cold\" temperatures, and what does this motivate? (3 steps)", "answer": "- Step 1: Celsius places its zero at the freezing point of water, which is physically arbitrary — water's freezing point isn't a point of \"no thermal energy.\" So $$0\\,°C$$ doesn't mean \"no kinetic energy.\"\n- Step 2: Because of this, ratios on the Celsius scale are meaningless. If London is at $$-1\\,°C$$, then $$-2\\,°C$$ isn't \"twice as cold\" — that would imply $$-1$$ has some meaningful \"amount of coldness\" to double, but it doesn't. Even worse: $$0\\,°C$$ \"twice as cold\" should still be $$0\\,°C$$, which is absurd.\n- Step 3: This motivates an absolute scale (Kelvin) whose zero corresponds to genuinely zero molecular kinetic energy. On the Kelvin scale, doubling the temperature genuinely doubles the average kinetic energy.\n\nTakeaway: ratio statements about temperature only make physical sense on an absolute scale.", "source": "Opus 4.7 ②", "_id": "opus_2_0"}, {"question": "An object floats if upthrust equals its weight, and sinks if upthrust is less than its weight. Explain why a wooden block (less dense than water) floats, while an iron block (more dense than water) of the same volume sinks. (3 steps)", "answer": "- Step 1: Upthrust magnitude. Both blocks have the same volume, so if fully submerged, they would displace the same volume of water and experience the *same* maximum upthrust.\n- Step 2: Weight of wood. Wood is less dense than water. Its weight is less than the weight of the water it displaces. So upthrust > weight, and it floats, rising until it displaces just enough water to match its weight.\n- Step 3: Weight of iron. Iron is more dense than water. Its weight is greater than the maximum possible upthrust (weight of displaced water). So weight > upthrust, and it sinks.\n\nFloating depends on density relative to the fluid.", "source": "GLM 5.1 ②", "_id": "glm_2_21"}, {"question": "During melting at 0 °C, you keep adding energy to ice, yet the temperature doesn't rise. Where is the energy going, and why doesn't temperature track the energy input? (3 steps)", "answer": "- Step 1: The energy goes into breaking the intermolecular bonds holding the rigid lattice together — increasing the molecules' **potential energy**, not their kinetic energy.\n- Step 2: Temperature is set only by *kinetic* energy. If kinetic energy isn't changing, temperature can't change.\n- Step 3: Once all bonds in the solid structure are broken (everything is liquid), additional heat then goes back into KE, and temperature rises again.\n\nThe flat sections on a heating curve are pure PE work — KE (temperature) only rises on the sloping sections.", "source": "Opus 4.7 ①", "_id": "opus_1_12"}, {"question": "An ice cube floats in a glass of water. When it melts, does the water level rise, fall, or stay the same? Explain using density and displacement. (2 steps)", "answer": "- Step 1: The floating ice displaces its weight in water. Since ice floats, we know ρ_ice < ρ_water. The volume of water displaced = mass of ice ÷ ρ_water.\n- Step 2: After melting, the ice becomes water with the same mass. The volume of this melted water = mass of ice ÷ ρ_water. Wait — this is exactly equal to the displaced volume!\n+ Actually, we need to be careful: floating ice has some above water. The submerged portion displaces weight-equal water. When it melts, that same mass of ice becomes water with volume = m/ρ_water, which equals the displaced volume.\n+ The water level stays roughly the same!\n+ **Correction:** Since ice is less dense, it actually floats with ~9/10 of volume underwater. When melted, all that underwater volume becomes water. The slight difference? Actually stays about the same — this is why sea level doesn't rise much from melting icebergs (land ice melting adds water; sea ice was already displacing its weight).", "source": "MiniMax ①", "_id": "minimax_1_21"}, {"question": "If City A is at $$20^\\circ\\text{C}$$ and City B is at $$40^\\circ\\text{C}$$, it is incorrect to say City B is \"twice as hot\" in terms of molecular kinetic energy. Explain why, and state what temperature would actually be \"twice as hot\" as $$20^\\circ\\text{C}$$. (3 steps)", "answer": "- Step 1: Explain the flaw in Celsius. The Celsius scale has an arbitrary zero point (water freezing). $$0^\\circ\\text{C}$$ does not mean zero kinetic energy; molecules still move at $$0^\\circ\\text{C}$$.\n- Step 2: Convert to Kelvin. To measure relative kinetic energy, we must use the absolute scale where 0 K means zero KE. $$20^\\circ\\text{C} = 293 \\text{ K}$$, and $$40^\\circ\\text{C} = 313 \\text{ K}$$. $$313 \\text{ K}$$ is clearly not double $$293 \\text{ K}$$.\n- Step 3: Find \"twice as hot\". Doubling the kinetic energy means doubling the absolute temperature. $$2 \\times 293 \\text{ K} = 586 \\text{ K}$$. Converting back to Celsius: $$586 - 273 = 313^\\circ\\text{C}$$. So $$313^\\circ\\text{C}$$ is \"twice as hot\" as $$20^\\circ\\text{C}$$.\n\nProportionality in gas laws and kinetic energy only works with the Kelvin scale.", "source": "GLM 5.1 ②", "_id": "glm_2_7"}, {"question": "Why do oppositely charged particle tracks curve in opposite directions in a magnetic field, even though they were created together? (3 steps)", "answer": "- Step 1: The magnetic force on a charged particle is $$F = qv \\times B$$. The direction depends on the *sign* of $$q$$.\n- Step 2: For a particle–antiparticle pair, charges are opposite. With the same magnetic field and similar initial velocities, the force points in opposite directions for each particle.\n- Step 3: Hence the two tracks spiral outward in opposite senses — but with the *same radius* because they have the same mass (so same momentum at creation). The \"V-shape\" or two-spiral signature in cloud chambers is a classic indicator of pair production.", "source": "Opus 4.7 ②", "_id": "opus_2_52"}, {"question": "How does viscosity change with temperature for liquids vs gases? Give a practical example of each. (3 steps)", "answer": "- Step 1: **Liquids**: viscosity *decreases* as temperature increases. Heating gives molecules more kinetic energy to overcome intermolecular forces, so they flow more easily. Example: hot motor oil flows much more easily than cold oil — this is why car engines need oil pumps that work at both cold start and operating temperature.\n- Step 2: **Gases**: viscosity *increases* as temperature increases. In gases, viscosity arises from momentum transfer between layers during collisions. At higher temperatures, molecules move faster and collide more often, transferring more momentum between layers — increasing the resistance to flow.\n- Step 3: This opposite behaviour is counterintuitive. The key: in liquids, intermolecular forces dominate (weakening them reduces viscosity). In gases, molecular collisions dominate (more frequent collisions increase viscosity).", "source": "GLM 5.1 ③", "_id": "glm_3_38"}, {"question": "Why does liquid viscosity *decrease* with temperature, but gas viscosity *increase* with temperature? (3 steps)", "answer": "- Step 1: In **liquids**, viscosity is dominated by intermolecular attractions. Heating gives molecules more thermal energy, helping them break free of their neighbours and flow more easily — hence less resistance (think honey poured hot vs cold).\n- Step 2: In **gases**, viscosity comes from momentum transfer when molecules collide between layers of flow. Heating speeds molecules up, increasing how much momentum they carry between layers, so neighbouring layers drag on each other *more*.\n- Step 3: Counterintuitive but consistent: in both cases, viscosity is about how strongly one layer resists sliding past another, but the underlying mechanism is different (attraction in liquids, collisions in gases).", "source": "Opus 4.7 ②", "_id": "opus_2_32"}, {"question": "Why must you cube the conversion factor when converting cm³ to m³, and what's the conversion factor?", "answer": "- Step 1: 1 cm = $$10^{-2}$$ m, so 1 cm³ = $$(10^{-2})^3 = 10^{-6}$$ m³.\n- Step 2: Volume is *three* lengths multiplied together, so the conversion factor must be cubed.\n+ For mm³ → m³: $$(10^{-3})^3 = 10^{-9}$$.\n- Step 3: This is why ignoring cubic conversions can throw an answer off by factors of millions or billions — far worse than linear-unit mistakes.", "source": "Opus 4.7 ①", "_id": "opus_1_6"}, {"question": "Why doesn't a single photon produce an electron–positron pair in empty space — what additional condition must be met? (3 steps)", "answer": "- Step 1: Energy conservation requires the photon energy to exceed $$2m_e c^2 \\approx 1.022\\,\\text{MeV}$$ — enough to create both particles' rest masses.\n- Step 2: But energy alone isn't enough — *momentum* must also be conserved. A photon carries momentum $$p = E/c$$, but a created electron + positron (initially at rest in their CoM frame) carry less momentum than the photon. There's no way to conserve both energy and momentum with just a lone photon.\n- Step 3: The solution: a *third body* (like a nucleus) must be nearby to absorb the excess momentum. This is why pair production happens *near* a nucleus, not in empty space.", "source": "Opus 4.7 ②", "_id": "opus_2_51"}, {"question": "Water is unusual because it expands when it freezes (most substances contract). What does this mean for the arrangement of water molecules in ice vs liquid water? (2 steps)", "answer": "- Step 1: For water, the solid (ice) has molecules that are *slightly more spread out* than in the liquid. This is because ice forms an open hexagonal lattice structure held together by hydrogen bonds, which spaces molecules farther apart than in liquid water where molecules can pack more closely.\n- Step 2: This is why ice floats on water (it's less dense), and why pipes burst when water freezes — the expanding ice exerts enormous pressure. Virtually every other substance has a solid phase that is denser than its liquid phase and sinks.", "source": "GLM 5.1 ③", "_id": "glm_3_47"}, {"question": "The specific latent heat of vaporisation for water is roughly 7 times larger than the specific latent heat of fusion. Conceptually, why does turning water into steam require so much more energy per kg than turning ice into water? (2 steps)", "answer": "- Step 1: Describe fusion (melting). Melting requires enough energy to weaken the rigid bonds so molecules can slide past each other. The molecules remain close together in an irregular, but still condensed, arrangement.\n- Step 2: Describe vaporisation (boiling). Boiling requires enough energy to completely separate the molecules so there are no significant forces of attraction between them, moving them from close proximity to far apart. Completely overcoming all intermolecular forces requires much more energy than just loosening them.\n\nBreaking bonds completely (gas) takes significantly more energy than loosening them (liquid).", "source": "GLM 5.1 ②", "_id": "glm_2_5"}, {"question": "The average kinetic energy of gas molecules is given by E_k = ³/₂kT. If you double the Kelvin temperature, what happens to the average kinetic energy? What about if you double the Celsius temperature? (2 parts)", "answer": "- **Doubling Kelvin temperature:** Average kinetic energy doubles\n  - Example: If T = 300 K → 600 K, then E_k increases by factor of 2\n  - This is because E_k ∝ T directly (for Kelvin)\n\n- **Doubling Celsius temperature:** The kinetic energy does NOT double\n  - Example: If temperature goes from 20°C (293 K) to 40°C (313 K):\n  - The Kelvin temperatures are 293 K and 313 K\n  - The ratio is 313/293 ≈ 1.07, not 2\n  - The increase in kinetic energy is only about 7%, not 100%\n- This is why Kelvin must always be used in gas law calculations", "source": "MiniMax ②", "_id": "minimax_2_32"}, {"question": "Edge case: what happens to a sphere if its density exactly equals the fluid density? Use force balance to explain. (3 steps)", "answer": "- Step 1: Weight = $$\\rho_s V g$$, upthrust = $$\\rho_f V g$$. If $$\\rho_s = \\rho_f$$, they're equal.\n- Step 2: Then the only unbalanced force in the equation of motion comes from drag. If the object starts at rest, drag is zero too, so net force = 0.\n- Step 3: The object floats *suspended* at whatever depth you release it — neither sinks nor rises. This is \"neutral buoyancy.\"\n\nSubmarines and fish exploit this by adjusting their effective density.", "source": "Opus 4.7 ①", "_id": "opus_1_56"}, {"question": "To verify Boyle's law experimentally, you plot a graph. Should you plot P vs V, or P vs 1/V? Explain what each graph would look like and why. (3 steps)", "answer": "- Step 1: Boyle's law states $$PV = \\text{constant}$$, meaning $$P = \\frac{\\text{constant}}{V}$$. This is an **inverse** relationship — a plot of $$P$$ vs $$V$$ would give a **hyperbola** (curve), which is hard to verify precisely.\n- Step 2: Instead, plot $$P$$ vs $$\\frac{1}{V}$$. Rearranging: $$P = \\text{constant} \\times \\frac{1}{V}$$. This is the equation of a **straight line through the origin** with gradient = the constant.\n- Step 3: If your data points lie on a straight line through the origin on a $$P$$ vs $$1/V$$ plot, you've confirmed Boyle's law. The gradient gives you the value of the constant ($$PV$$). This is much more convincing than fitting a curve to a hyperbola.", "source": "GLM 5.1 ③", "_id": "glm_3_53"}, {"question": "A gas is compressed isothermally (constant temperature) to half its volume. What happens to its pressure, average molecular KE, and RMS speed? (3 steps)", "answer": "- Step 1: **Pressure**: doubles. By Boyle's law, $$P_1V_1 = P_2V_2$$ → halving $$V$$ doubles $$P$$.\n- Step 2: **Average molecular KE**: unchanged. Temperature is constant, and $$\\bar{E_k} = \\tfrac{3}{2}kT$$ depends only on $$T$$.\n- Step 3: **RMS speed**: unchanged. Since $$c_{\\text{rms}} = \\sqrt{3kT/m}$$ depends only on $$T$$ and $$m$$, both fixed.\n\nSo compression at constant $$T$$ doesn't make molecules move faster — it just packs them closer so wall collisions happen more frequently. The pressure increase comes purely from collision frequency, not from harder hits.", "source": "Opus 4.7 ②", "_id": "opus_2_45"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "A proton is composed of up quarks (charge $$+\\frac{2}{3}e$$) and down quarks (charge $$-\\frac{1}{3}e$$). What is the specific combination that yields a net charge of $$+1e$$, and how do the charges sum? (3 steps)", "answer": "- Step 1: Identify the required net charge. A proton must have a net charge of $$+1e$$.\n- Step 2: Recall the quark composition of a proton, which is two up quarks and one down quark (uud).\n- Step 3: Sum the charges: $$+\\frac{2}{3}e + \\frac{2}{3}e + (-\\frac{1}{3}e) = +\\frac{3}{3}e = +1e$$. This confirms the uud configuration.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "A neutron has a net charge of $$0e$$. Given the charges of up ($$+\\frac{2}{3}e$$) and down ($$-\\frac{1}{3}e$$) quarks, what is its quark composition and how does it sum to zero? (3 steps)", "answer": "- Step 1: Identify the required net charge. A neutron must be electrically neutral ($$0e$$).\n- Step 2: Recall the quark composition of a neutron, which is one up quark and two down quarks (udd).\n- Step 3: Sum the charges: $$+\\frac{2}{3}e + (-\\frac{1}{3}e) + (-\\frac{1}{3}e) = +\\frac{2}{3}e - \\frac{2}{3}e = 0e$$.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "In Rutherford's alpha particle scattering experiment, most alpha particles passed straight through the gold foil, but a few bounced back at angles greater than 90°. What does this specific observation reveal about the structure of the atom? (3 steps)", "answer": "- Step 1: The fact that most particles passed through undeflected suggests that the atom is mostly empty space.\n- Step 2: The fact that some particles were deflected at large angles suggests there is a concentrated positive charge (to repel the positive alpha particles).\n- Step 3: The fact that very few bounced straight back suggests this positive mass is extremely small (since the chance of a direct head-on collision is very low), leading to the nuclear model: a tiny, dense, positive nucleus surrounded by empty space and electrons.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "In a linear accelerator (LINAC), an alternating AC power supply is used with a fixed frequency. Why must the cylindrical tubes become progressively longer as the particles travel down the accelerator? (3 steps)", "answer": "- Step 1: The AC supply switches polarity at a constant, fixed frequency, meaning the time a particle spends in each tube must be exactly the same for it to be accelerated across the gaps correctly.\n- Step 2: As the particles are accelerated, their speed increases with each gap they cross.\n- Step 3: Since speed = distance / time, and the time is fixed by the AC frequency, a higher speed requires a longer distance (tube length) to maintain the synchronization.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "A cyclotron uses both electric and magnetic fields to accelerate particles. What is the specific role of each field in the cyclotron's operation? (2 steps)", "answer": "- Step 1: The electric field (in the gap between the dees) accelerates the charged particles, increasing their kinetic energy and speed each time they cross the gap.\n- Step 2: The magnetic field (perpendicular to the dees) provides the centripetal force required to bend the particles into a circular path, keeping them confined within the cyclotron so they can cross the accelerating gap multiple times.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "A charged particle travels at velocity $$v$$ perpendicular to a uniform magnetic field of strength $$B$$. Derive the expression for the radius $$r$$ of the circular path it takes, in terms of its mass $$m$$, charge $$q$$, $$v$$, and $$B$$. (3 steps)", "answer": "- Step 1: Equate the magnetic force acting on the moving charge to the centripetal force required for circular motion: $$Bqv = \\frac{mv^2}{r}$$.\n- Step 2: Rearrange the equation to isolate the radius $$r$$. Multiply both sides by $$r$$ and divide by $$Bqv$$: $$r = \\frac{mv^2}{Bqv}$$.\n- Step 3: Cancel one power of velocity $$v$$ from the numerator and denominator to get the final equation: $$r = \\frac{mv}{Bq}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "In a bubble chamber, a charged particle leaves a track that spirals inward with a decreasing radius. What does this decreasing radius indicate about the particle's momentum and energy, and why? (3 steps)", "answer": "- Step 1: The radius of curvature is related to momentum by $$r = \\frac{p}{Bq}$$. A decreasing radius implies a decreasing momentum.\n- Step 2: As the particle travels through the medium, it ionizes other particles in its path.\n- Step 3: This ionization causes the particle to lose kinetic energy. Since momentum $$p = mv$$, a loss in kinetic energy results in a decrease in velocity and thus a decrease in momentum, causing the radius to shrink.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "To probe the internal structure of a nucleon (like a proton), electrons must be accelerated to very high energies. Explain why high energies are necessary using the concept of de Broglie wavelength. (3 steps)", "answer": "- Step 1: The de Broglie wavelength of a particle is given by $$\\lambda = \\frac{h}{p} = \\frac{h}{mv}$$.\n- Step 2: To resolve fine detail like the internal structure of a nucleon, the wavelength of the probe must be comparable to or smaller than the size of the structure being observed (about $$10^{-15}$$ m).\n- Step 3: Therefore, to get a very small wavelength, the momentum (and thus energy/speed) of the electrons must be very high.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "Distinguish between annihilation and pair production in terms of the conversion between mass and energy. (2 steps)", "answer": "- Step 1: Annihilation is the process where a particle and its antiparticle collide, destroying both and converting their mass entirely into energy (typically two gamma-ray photons).\n- Step 2: Pair production is the reverse process, where a high-energy photon converts its energy into the mass of a particle-antiparticle pair, usually occurring near a nucleus to conserve momentum.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "Why must pair production occur near a nucleus? What would violate conservation laws if a single photon decayed into a particle-antiparticle pair in empty space? (3 steps)", "answer": "- Step 1: In the center-of-mass frame of the newly created particle-antiparticle pair, the total momentum is zero.\n- Step 2: However, a photon always travels at the speed of light and must have momentum ($$p = \\frac{E}{c}$$). It is impossible for a single photon to have zero momentum in any frame of reference.\n- Step 3: Therefore, a nearby nucleus is required to absorb the excess momentum, ensuring both energy and momentum are conserved in the interaction.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "The electronvolt (eV) is a common unit of energy in particle physics. Conceptually, what does 1 eV represent, and how is it converted to Joules? (2 steps)", "answer": "- Step 1: 1 eV represents the amount of kinetic energy gained by a single electron when it is accelerated through a potential difference of 1 Volt.\n- Step 2: It is calculated using $$E = qV$$. For one electron, $$q = 1.6 \\times 10^{-19}$$ C and $$V = 1$$ V, so $$1 \\text{ eV} = 1.6 \\times 10^{-19} \\text{ J}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "Muons created in the upper atmosphere have a very short half-life, meaning they should decay before reaching the Earth's surface based on classical physics. Explain how relativistic effects allow them to be detected at sea level. (2 steps)", "answer": "- Step 1: Time dilation: In the Earth's frame of reference, the muons are moving at close to the speed of light, so their internal \"clock\" runs slower. Their lifetime is stretched, allowing them to travel further.\n- Step 2: Length contraction: In the muon's frame of reference, its lifetime is normal, but the distance from the atmosphere to the Earth's surface is contracted, making the journey shorter and possible within their short lifetime.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": true}, {"question": "A common misconception is that particles in a solid are \"stationary.\" Why is this incorrect, and what is the correct description of their motion? At what temperature would they truly become stationary? (2 steps)", "answer": "- Step 1: Particles in a solid are held in fixed positions by strong bonds, but they possess kinetic energy and constantly vibrate about these fixed positions.\n- Step 2: They would only become completely stationary at absolute zero (0 K), which is the theoretical point of minimum kinetic energy. Above 0 K, they always vibrate.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "Define the plasma state of matter. How does it differ fundamentally from a gas, and under what condition does it typically form? (2 steps)", "answer": "- Step 1: Plasma is a state of matter where electrons have been stripped away from their atoms, resulting in a soup of positive ions and free electrons, unlike a gas which consists of neutral atoms or molecules.\n- Step 2: It typically forms at extremely high temperatures (or high energy environments), where the kinetic energy is sufficient to overcome the electromagnetic forces binding electrons to the nucleus.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "A student calculates the volume of a paving slab using dimensions in millimeters (e.g., 40 mm × 500 mm × 850 mm) and then calculates density using mass in kg. Explain the error and how to correct it. (3 steps)", "answer": "- Step 1: The standard SI unit for density is $$\\text{kg m}^{-3}$$, which requires volume to be in $$\\text{m}^3$$ and mass in kg.\n- Step 2: Calculating volume using mm gives a result in $$\\text{mm}^3$$. Dividing mass (kg) by volume ($$\\text{mm}^3$$) yields a nonsensical unit, not $$\\text{kg m}^{-3}$$.\n- Step 3: To correct this, convert all lengths from mm to m before calculating volume (e.g., $$40 \\text{ mm} = 0.040 \\text{ m}$$). Alternatively, convert the volume from $$\\text{mm}^3$$ to $$\\text{m}^3$$ by multiplying by $$10^{-9}$$ (since $$1 \\text{ mm} = 10^{-3} \\text{ m}$$, so $$1 \\text{ mm}^3 = 10^{-9} \\text{ m}^3$$).", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "Describe the method for measuring the volume of an irregularly shaped object using a liquid. What apparatus is used to measure the volume of the liquid? (3 steps)", "answer": "- Step 1: Fill a measuring cylinder with a known volume of liquid and record this initial volume.\n- Step 2: Fully submerge the irregular object in the liquid, ensuring no air bubbles are trapped.\n- Step 3: Record the new volume. The volume of the object is the difference between the final and initial volumes (the volume of liquid displaced). The apparatus used is a measuring cylinder.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "Internal energy is defined as the sum of two types of energy possessed by the molecules of a substance. Name these two components and explain what physical aspects of the molecules they relate to. (2 steps)", "answer": "- Step 1: Kinetic energy: This is due to the random motion (speed/vibration) of the molecules and is directly related to the temperature of the substance.\n- Step 2: Potential energy: This is due to the separation between molecules and their positions within the intermolecular force fields (bonds). It relates to the state of the matter and intermolecular distances.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "During a phase change (like melting or boiling), thermal energy is continuously added to a substance, yet its temperature remains constant. Explain where this energy goes on a microscopic level. (3 steps)", "answer": "- Step 1: Temperature is a measure of average kinetic energy. For temperature to rise, the kinetic energy of the particles must increase.\n- Step 2: During a phase change, the energy supplied (latent heat) is used to overcome the intermolecular forces (bonds) holding the particles together in their current state.\n- Step 3: This energy increases the potential energy of the system (separating the particles) rather than their kinetic energy, so the temperature remains constant until the phase change is complete.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "Specific heat capacity (SHC) is defined as the energy required to raise the temperature of 1 kg of a substance by 1 K. Explain why water is an ideal choice for use in central heating systems compared to a metal like copper. (2 steps)", "answer": "- Step 1: Water has a very high specific heat capacity, meaning it can absorb a large amount of heat energy for a relatively small increase in temperature.\n- Step 2: This allows water to transport a large amount of thermal energy from the boiler to the radiators and release it over a long period, whereas copper (with a low SHC) would cool down very quickly.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "The specific latent heat of vaporisation for water is significantly larger than its specific latent heat of fusion. Explain this difference in terms of the intermolecular forces being overcome. (3 steps)", "answer": "- Step 1: Latent heat of fusion (melting) requires energy just to weaken the intermolecular bonds enough so molecules can slide past each other (solid to liquid). The molecules remain relatively close.\n- Step 2: Latent heat of vaporisation (boiling) requires energy to completely break the intermolecular bonds so that molecules can separate entirely and move far apart (liquid to gas).\n- Step 3: Completely separating the molecules against their attractive forces requires substantially more energy than just allowing them to flow over each other, hence the latent heat of vaporisation is much larger.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": true}, {"question": "A 2 kg block of a mystery substance is heated using 10,000 J of energy, causing its temperature to rise by 5 K. Calculate the specific heat capacity of the substance. (3 steps)", "answer": "- Step 1: Write down the formula for specific heat capacity: $$\\Delta E = mc\\Delta\\theta$$.\n- Step 2: Rearrange to solve for $$c$$: $$c = \\frac{\\Delta E}{m\\Delta\\theta}$$.\n- Step 3: Substitute the given values: $$c = \\frac{10000 \\text{ J}}{2 \\text{ kg} \\times 5 \\text{ K}} = \\frac{10000}{10} = 1000 \\text{ J kg}^{-1}\\text{K}^{-1}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "It takes 334,000 J of energy to melt 1 kg of ice at 0°C. How much energy is required to melt 0.5 kg of ice at 0°C? (2 steps)", "answer": "- Step 1: Use the latent heat formula $$\\Delta E = mL$$, where $$L$$ is the specific latent heat of fusion ($$334,000 \\text{ J kg}^{-1}$$ for ice).\n- Step 2: Calculate the energy: $$\\Delta E = 0.5 \\text{ kg} \\times 334,000 \\text{ J kg}^{-1} = 167,000 \\text{ J}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "It is incorrect to say that a substance at 40°C is \"twice as hot\" as a substance at 20°C. Explain why, and state what the ratio of temperatures would be if measured on the correct scale. (3 steps)", "answer": "- Step 1: The Celsius scale has an arbitrary zero point (the freezing point of water). Ratios (like \"twice as much\") are meaningless on scales with arbitrary zeros because zero Celsius does not mean \"zero thermal energy.\"\n- Step 2: The Kelvin (absolute) scale starts at absolute zero, where particles have minimum kinetic energy, making ratios physically meaningful.\n- Step 3: Converting to Kelvin: 40°C = 313 K, and 20°C = 293 K. The ratio is 313/293, which is approximately 1.07, not 2.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "Define absolute zero (0 K) in terms of particle energy. Is it possible to reach this temperature in a laboratory? (2 steps)", "answer": "- Step 1: Absolute zero is the theoretical temperature at which the particles of a substance have minimum (effectively zero) kinetic energy and cease all macroscopic motion.\n- Step 2: It is a theoretical limit that has never been achieved in a laboratory; scientists have gotten very close, but it is impossible to remove the very last bit of energy due to quantum mechanical effects (zero-point energy).", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "An \"ideal gas\" is a theoretical model that simplifies gas behavior. State the two key assumptions about the gas molecules that make this model work. (2 steps)", "answer": "- Step 1: The molecules occupy a negligible volume compared to the volume of the container (they act as point masses).\n- Step 2: The molecules exert negligible intermolecular forces on each other, except during the instant of elastic collisions with each other and the container walls.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "Boyle's Law states that for a fixed mass of gas at constant temperature, pressure is inversely proportional to volume ($$P \\propto 1/V$$). Explain this relationship using the kinetic theory of gases. (3 steps)", "answer": "- Step 1: Pressure is caused by molecules colliding with the walls of the container, exerting a force over an area.\n- Step 2: If the volume is halved, the molecules have less space to move in, so they travel a shorter distance between collisions with the walls.\n- Step 3: This means they hit the walls more frequently. More frequent collisions result in a greater total force on the walls, and since the area is smaller, the pressure doubles (inversely proportional).", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "When an ideal gas is heated at constant volume, its pressure increases. Explain this using the three \"F\"s described in the lesson: how particle behavior changes and leads to increased pressure. (3 steps)", "answer": "- Step 1: **Faster**: Heating the gas increases the average kinetic energy of the molecules, so they move at higher speeds.\n- Step 2: **More Frequently**: The higher speed means they travel between walls faster and collide with the walls more often.\n- Step 3: **More Force**: The faster-moving molecules also have greater momentum, so each individual collision with the wall exerts a greater force. More frequent, more forceful collisions on the same area result in higher pressure.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "The ideal gas equation is often written as $$PV = nRT$$ but also as $$PV = NkT$$. Explain the difference between the two forms, specifically what $$n$$, $$N$$, $$R$$, and $$k$$ represent. (3 steps)", "answer": "- Step 1: In the first form, $$n$$ is the number of moles of gas, and $$R$$ is the molar gas constant (energy per mole per Kelvin).\n- Step 2: In the second form, $$N$$ is the total number of molecules, and $$k$$ is the Boltzmann constant (energy per molecule per Kelvin).\n- Step 3: They are equivalent because the total number of molecules $$N$$ equals the number of moles $$n$$ multiplied by Avogadro's constant $$N_A$$ ($$N = nN_A$$), and the Boltzmann constant $$k = \\frac{R}{N_A}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "The Boltzmann constant $$k$$ is defined as $$k = \\frac{R}{N_A}$$. Conceptually, what is the physical significance of this constant? (2 steps)", "answer": "- Step 1: It acts as a bridge between the macroscopic and microscopic worlds, connecting the macroscopic molar gas constant $$R$$ to the microscopic number of molecules $$N_A$$.\n- Step 2: It represents the average kinetic energy of a single molecule per unit of temperature (specifically, $$E_k = \\frac{3}{2}kT$$), showing how much energy a single particle gains for each Kelvin increase in temperature.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "Derive the equation for the average kinetic energy of a single gas molecule, $$E_k = \\frac{3}{2}kT$$, starting from the two forms of the ideal gas equation: $$PV = NkT$$ and $$PV = \\frac{1}{3}Nm\\overline{c^2}$$. (4 steps)", "answer": "- Step 1: Equate the right-hand sides of the two ideal gas equations: $$NkT = \\frac{1}{3}Nm\\overline{c^2}$$.\n- Step 2: Cancel the number of molecules $$N$$ from both sides: $$kT = \\frac{1}{3}m\\overline{c^2}$$.\n- Step 3: Multiply both sides by 3 to clear the fraction: $$3kT = m\\overline{c^2}$$.\n- Step 4: Recall that kinetic energy is $$\\frac{1}{2}mv^2$$. Multiply both sides by $$\\frac{1}{2}$$ to get the kinetic energy form: $$\\frac{3}{2}kT = \\frac{1}{2}m\\overline{c^2} = E_k$$.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "The root-mean-square (rms) speed $$c_{rms}$$ is used instead of the average speed in kinetic theory. Explain why the simple average speed is insufficient, and what $$c_{rms}$$ mathematically represents. (3 steps)", "answer": "- Step 1: Molecules move in random 3D directions. If you simply averaged their velocities, the positive and negative directions would cancel out to zero, which is not useful for calculating energy.\n- Step 2: Speed is a scalar, but squaring the velocities makes them all positive, preventing cancellation.\n- Step 3: The root-mean-square speed is the square root of the mean of the squares of the velocities: $$c_{rms} = \\sqrt{\\overline{c^2}}$$. It provides a statistically meaningful measure of the typical speed related to the kinetic energy of the gas.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "According to Archimedes' principle, an object submerged in a fluid experiences an upthrust equal to the weight of the fluid displaced. Explain the physical origin of this upward force. (3 steps)", "answer": "- Step 1: Pressure in a fluid increases with depth. Therefore, the bottom surface of a submerged object is at a greater depth than its top surface.\n- Step 2: This means the pressure pushing up on the bottom of the object is greater than the pressure pushing down on the top.\n- Step 3: This pressure difference results in a net upward force on the object, which is the upthrust. Its magnitude exactly equals the weight of the fluid that would occupy the object's volume.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": false}, {"question": "An object is placed in a fluid. State the condition required for the object to float, and explain what happens if this condition is not met. (3 steps)", "answer": "- Step 1: For an object to float, the upthrust (weight of fluid displaced) must equal the total weight of the object.\n- Step 2: If the object's weight is greater than the maximum possible upthrust (which occurs when the object is fully submerged and displaces its own total volume in fluid), it will sink.\n- Step 3: If it sinks, it will still experience an upthrust equal to the weight of the fluid displaced, but this upthrust will be less than the object's weight, resulting in a net downward force.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "The pressure at a depth $$h$$ in a fluid of density $$\\rho$$ is given by $$P = \\rho g h$$. This is the pressure *due to the fluid*. If there is a lake at sea level, what must be added to this formula to find the total pressure at the bottom? (2 steps)", "answer": "- Step 1: The formula $$P = \\rho g h$$ only calculates the pressure exerted by the column of water above that depth.\n- Step 2: To find the total pressure, atmospheric pressure must be added, because the atmosphere is also pushing down on the surface of the lake. Total pressure = $$P_{atm} + \\rho g h$$.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": false}, {"question": "Stokes' law for viscous drag is given by $$F = 6\\pi\\eta r v$$. This formula is only valid under specific conditions. List the three main conditions required for Stokes' law to apply. (3 steps)", "answer": "- Step 1: The object must be small and spherical. The formula explicitly uses the radius $$r$$ of a sphere.\n- Step 2: The motion must be at slow speeds. At high speeds, the flow becomes turbulent, and drag becomes proportional to $$v^2$$ rather than $$v$$.\n- Step 3: The flow must be laminar (smooth and layered). The fluid layers must slide past each other without mixing or forming eddies.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": false}, {"question": "A small steel ball is dropped into a tall cylinder of viscous oil. Describe the force balance on the ball at the exact moment it reaches terminal velocity. (3 steps)", "answer": "- Step 1: Identify the forces acting on the ball: Weight (downwards), Upthrust (upwards, equal to weight of displaced oil), and Viscous Drag (upwards, opposing motion).\n- Step 2: At terminal velocity, the ball is no longer accelerating, meaning the net force is zero.\n- Step 3: Therefore, the downward force (Weight) must be exactly balanced by the total upward forces (Upthrust + Viscous Drag). $$W = U + F_d$$.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "Starting from the force balance at terminal velocity ($$W = U + F_d$$), derive the formula for terminal velocity: $$v_{term} = \\frac{2r^2 g (\\rho_s - \\rho_f)}{9\\eta}$$. (4 steps)", "answer": "- Step 1: Substitute the expressions for each force: $$\\frac{4}{3}\\pi r^3 \\rho_s g = \\frac{4}{3}\\pi r^3 \\rho_f g + 6\\pi\\eta r v_{term}$$.\n- Step 2: Rearrange to isolate the drag term: $$6\\pi\\eta r v_{term} = \\frac{4}{3}\\pi r^3 \\rho_s g - \\frac{4}{3}\\pi r^3 \\rho_f g$$.\n- Step 3: Factor out the common terms on the right side: $$6\\pi\\eta r v_{term} = \\frac{4}{3}\\pi r^3 g (\\rho_s - \\rho_f)$$.\n- Step 4: Solve for $$v_{term}$$ by dividing both sides by $$6\\pi\\eta r$$: $$v_{term} = \\frac{4\\pi r^3 g (\\rho_s - \\rho_f)}{3 \\times 6\\pi\\eta r}$$. Simplify the fraction (cancel $$\\pi$$ and one $$r$$, and reduce $$4/18$$ to $$2/9$$) to get $$v_{term} = \\frac{2r^2 g (\\rho_s - \\rho_f)}{9\\eta}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": false}, {"question": "How does the viscosity of a liquid and a gas change as temperature increases? Explain the microscopic reason for each. (4 steps)", "answer": "- Step 1: **Liquids**: Viscosity *decreases* as temperature increases.\n+ In a liquid, molecules are close together, and viscosity is due to intermolecular forces hindering flow.\n+ As temperature rises, molecules have more kinetic energy to overcome these intermolecular attractions, allowing them to flow more easily.\n- Step 2: **Gases**: Viscosity *increases* as temperature increases.\n+ In a gas, molecules are far apart, and viscosity is due to momentum transfer between layers during collisions.\n+ As temperature rises, molecules move faster, leading to more frequent and more energetic collisions, which transfers more momentum between layers and increases the resistance to shear (viscosity).", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": true}, {"question": "Distinguish between laminar and turbulent flow in a fluid. If a student is using Stokes' law to calculate viscosity, which type of flow must be present, and why does the other type invalidate the law? (3 steps)", "answer": "- Step 1: Laminar flow occurs when fluid layers slide smoothly past one another in the same direction without mixing. Turbulent flow occurs when layers mix, forming eddies and unpredictable swirls.\n- Step 2: Stokes' law requires laminar flow.\n- Step 3: In turbulent flow, energy is dissipated through the chaotic mixing and eddies, making the drag force proportional to the square of the velocity ($$F \\propto v^2$$) rather than directly proportional ($$F \\propto v$$), which breaks the linear assumption of Stokes' law.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": false}, {"question": "During the lesson, a specific anomaly regarding water's density during freezing was mentioned. How does water behave differently from most substances when it freezes, and what is the consequence of this for the arrangement of its molecules? (2 steps)", "answer": "- Step 1: Unlike most substances which contract and become denser upon freezing, water expands when it freezes, making solid ice less dense than liquid water.\n- Step 2: This is because the hydrogen bonds in ice force the molecules into a more open, rigid, hexagonal crystalline structure that takes up more space than the disordered, closer arrangement in liquid water.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": false}, {"question": "In Core Practical 14 (investigating Boyle's Law), a student plots a graph of pressure $$P$$ against $$\\frac{1}{V}$$. Explain why this specific graph is plotted instead of $$P$$ against $$V$$, and what the graph should look like if Boyle's Law is obeyed. (3 steps)", "answer": "- Step 1: Boyle's Law states $$PV = \\text{constant}$$, which can be rearranged to $$P = \\text{constant} \\times \\frac{1}{V}$$.\n- Step 2: This is the equation of a straight line ($$y = mx$$) if $$P$$ is plotted on the y-axis and $$\\frac{1}{V}$$ on the x-axis.\n- Step 3: If Boyle's Law is obeyed, the graph should be a straight line passing directly through the origin. A curved $$P$$ vs $$V$$ graph is harder to verify precisely than a straight line.", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": false}, {"question": "In Core Practical 2 (investigating viscosity using a falling sphere), why must the student ensure the ball bearing reaches terminal velocity before starting the timer? (2 steps)", "answer": "- Step 1: The derivation of the viscosity formula relies on the force balance equation where net force is zero and acceleration is zero.\n- Step 2: This condition only exists at terminal velocity. If the ball is still accelerating, the drag force is less than its maximum value, and the measured time would not correspond to the terminal velocity required by the formula.", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": false}], "count": 42}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "A proton is composed of two up quarks and one down quark (uud), while a neutron is udd. Given the up quark charge is $$+\\frac{2}{3}e$$ and the down quark charge is $$-\\frac{1}{3}e$$, explain how these combinations result in the observed charges of the proton and neutron. (2 steps)", "answer": "- Step 1: Calculate the proton charge sum. A proton (uud) consists of two up quarks and one down quark. Summing their charges: $$+\\frac{2}{3}e + \\left(+\\frac{2}{3}e\\right) + \\left(-\\frac{1}{3}e\\right) = +\\frac{3}{3}e = +1e$$. This perfectly matches the proton's observed positive elementary charge.\n- Step 2: Calculate the neutron charge sum. A neutron (udd) consists of one up quark and two down quarks. Summing their charges: $$+\\frac{2}{3}e + \\left(-\\frac{1}{3}e\\right) + \\left(-\\frac{1}{3}e\\right) = +\\frac{0}{3}e = 0$$. This matches the neutron's neutral charge.\n\nThe fractional charges of quarks are the fundamental building blocks that sum to give the integer charges of nucleons.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "A student calculates the volume of a cube as $$125 \\text{ cm}^3$$ and wants to find the density in $$\\text{kg/m}^3$$. Explain the conceptual trap in converting $$125 \\text{ cm}^3$$ to $$\\text{m}^3$$, and state the correct conversion factor. (2 steps)", "answer": "- Step 1: Identify the trap. The common mistake is to assume that since $$1 \\text{ m} = 100 \\text{ cm}$$, then $$1 \\text{ m}^3 = 100 \\text{ cm}^3$$. This is incorrect because volume is a three-dimensional measurement.\n- Step 2: Apply the cubic conversion. Since length converts by a factor of 100, volume must convert by the cube of that factor. $$1 \\text{ m}^3 = (100 \\text{ cm})^3 = 1,000,000 \\text{ cm}^3$$. Therefore, to convert $$125 \\text{ cm}^3$$ to $$\\text{m}^3$$, you divide by $$10^6$$, yielding $$1.25 \\times 10^{-4} \\text{ m}^3$$.\n\nAlways cube the linear conversion factor for volume and square it for area.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": true}, {"question": "In a solid, particles are often described as \"vibrating in fixed positions,\" whereas in a gas they move in \"fast, random\" motion. Why don't solid particles move freely, and what does the \"vibration\" imply about their kinetic energy? (2 steps)", "answer": "- Step 1: Explain the lack of free movement. Solid particles are held in place by very strong intermolecular bonds. They do not possess enough kinetic energy to overcome these bonds and move freely relative to each other, so they remain in a fixed, regular arrangement.\n- Step 2: Explain the vibration. The \"vibration\" means that solid particles do possess kinetic energy (they are moving back and forth), but this motion is restricted to a small area around their equilibrium position. They only stop vibrating completely at absolute zero (0 K).\n\nSolids have kinetic energy, but it is constrained to vibration by strong bonds.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "Internal energy is the sum of kinetic and potential energy of the molecules. For an ideal gas, how does the internal energy relate to these two components, and why? (2 steps)", "answer": "- Step 1: Define the potential energy component. Potential energy arises from intermolecular forces (the separation between molecules). In an ideal gas, we assume intermolecular forces are negligible (except during instantaneous collisions).\n- Step 2: Conclude for ideal gas. Because there are no intermolecular forces, there is no potential energy stored between molecules. Therefore, the internal energy of an ideal gas is entirely kinetic energy.\n\nFor an ideal gas, Internal Energy = Total Kinetic Energy.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "When heating a substance from a solid to a gas, the temperature graph shows flat sections (plateaus) during melting and boiling. Explain microscopically why the temperature stops rising during these phase changes despite energy still being added. (3 steps)", "answer": "- Step 1: Identify the energy input. Thermal energy is continuously being supplied to the substance.\n- Step 2: Define temperature. Temperature is a measure of the average kinetic energy of the molecules.\n- Step 3: Explain where the energy goes. During a phase change, the energy is used to break the intermolecular bonds (increasing the potential energy of the system) rather than increasing the kinetic energy of the molecules. Since kinetic energy does not increase, the temperature remains constant.\n\nLatent heat breaks bonds (potential energy increases), not speeds (kinetic energy stays the same).", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "The specific latent heat of vaporisation for water is roughly 7 times larger than the specific latent heat of fusion. Conceptually, why does turning water into steam require so much more energy per kg than turning ice into water? (2 steps)", "answer": "- Step 1: Describe fusion (melting). Melting requires enough energy to weaken the rigid bonds so molecules can slide past each other. The molecules remain close together in an irregular, but still condensed, arrangement.\n- Step 2: Describe vaporisation (boiling). Boiling requires enough energy to completely separate the molecules so there are no significant forces of attraction between them, moving them from close proximity to far apart. Completely overcoming all intermolecular forces requires much more energy than just loosening them.\n\nBreaking bonds completely (gas) takes significantly more energy than loosening them (liquid).", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": true}, {"question": "A beaker of water is at $$50^\\circ\\text{C}$$. A large swimming pool is also at $$50^\\circ\\text{C}$$. Compare their temperatures, the average kinetic energy of their molecules, and their total internal energies. (3 steps)", "answer": "- Step 1: Compare temperature. Both have the same temperature ($$50^\\circ\\text{C}$$).\n- Step 2: Compare average KE. Since temperature measures average kinetic energy, the average kinetic energy of the water molecules is the same in both the beaker and the pool.\n- Step 3: Compare total internal energy. The swimming pool has vastly more molecules. Therefore, while the average energy per molecule is the same, the total sum of all molecular energies (total internal energy) is much greater for the pool.\n\nTemperature = Average KE; Internal Energy = Total KE + PE (depends on mass/number of molecules).", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "If City A is at $$20^\\circ\\text{C}$$ and City B is at $$40^\\circ\\text{C}$$, it is incorrect to say City B is \"twice as hot\" in terms of molecular kinetic energy. Explain why, and state what temperature would actually be \"twice as hot\" as $$20^\\circ\\text{C}$$. (3 steps)", "answer": "- Step 1: Explain the flaw in Celsius. The Celsius scale has an arbitrary zero point (water freezing). $$0^\\circ\\text{C}$$ does not mean zero kinetic energy; molecules still move at $$0^\\circ\\text{C}$$.\n- Step 2: Convert to Kelvin. To measure relative kinetic energy, we must use the absolute scale where 0 K means zero KE. $$20^\\circ\\text{C} = 293 \\text{ K}$$, and $$40^\\circ\\text{C} = 313 \\text{ K}$$. $$313 \\text{ K}$$ is clearly not double $$293 \\text{ K}$$.\n- Step 3: Find \"twice as hot\". Doubling the kinetic energy means doubling the absolute temperature. $$2 \\times 293 \\text{ K} = 586 \\text{ K}$$. Converting back to Celsius: $$586 - 273 = 313^\\circ\\text{C}$$. So $$313^\\circ\\text{C}$$ is \"twice as hot\" as $$20^\\circ\\text{C}$$.\n\nProportionality in gas laws and kinetic energy only works with the Kelvin scale.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": true}, {"question": "Real gases deviate from ideal gas behavior at high pressures and low temperatures. Explain how the two main assumptions of an ideal gas fail under these extreme conditions. (2 steps)", "answer": "- Step 1: Assumption of negligible volume. Ideal gases assume molecules occupy zero volume. At high pressures, gas is compressed so much that the actual volume of the molecules themselves becomes a significant fraction of the total container volume, making $$V_{\\text{ideal}} \\neq V_{\\text{real}}$$.\n- Step 2: Assumption of negligible forces. Ideal gases assume no intermolecular forces. At low temperatures, molecules move slowly enough that when they get close, the attractive forces between them become significant, pulling them together (eventually causing condensation).\n\nHigh pressure makes volume significant; low temperature makes forces significant.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "A sealed syringe contains gas at atmospheric pressure. If you push the plunger in slowly (keeping temperature constant), the pressure increases. Explain this using the behavior of the gas molecules. (3 steps)", "answer": "- Step 1: Effect on volume. Pushing the plunger reduces the volume of the container, so the molecules have less space to move in.\n- Step 2: Effect on frequency. Because the space is smaller, the molecules travel a shorter distance between hitting the walls, so they hit the walls more frequently.\n- Step 3: Effect on pressure. Pressure is force per unit area. More frequent collisions per unit area mean a greater force exerted on the walls, resulting in higher pressure. (Since temperature is constant, the force per collision doesn't change, only the frequency).\n\nConstant Temperature + Smaller Volume = Same speed but more frequent collisions.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "A rigid metal container (constant volume) is heated. Explain why the pressure inside increases, distinguishing this from the Boyle's Law explanation. (3 steps)", "answer": "- Step 1: Effect on molecules. Heating the gas increases the average kinetic energy of the molecules, meaning they move faster.\n- Step 2: Effect on collisions. Because they are moving faster, they hit the walls with greater force per collision. They also hit the walls slightly more frequently because they traverse the container faster.\n- Step 3: Result. Greater force per unit area (from harder impacts) leads to higher pressure. Unlike Boyle's law where frequency increased due to less space, here it is the force of the impact that dominates the pressure increase.\n\nConstant Volume + Higher Temperature = Same area but harder/faster collisions.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "The average molecular kinetic energy is given by $$E_k = \\frac{3}{2}kT$$. If the temperature of a gas doubles from 300 K to 600 K, does the RMS speed ($$c_{rms}$$) of the molecules also double? Explain mathematically. (3 steps)", "answer": "- Step 1: Relate KE to speed. Kinetic energy is proportional to velocity squared: $$E_k \\propto v^2$$ (or $$c_{rms}^2$$).\n- Step 2: Relate T to KE. Since $$E_k = \\frac{3}{2}kT$$, we have $$E_k \\propto T$$. Therefore, $$v^2 \\propto T$$.\n- Step 3: Calculate speed change. If T doubles, $$v^2$$ doubles. Therefore, the new speed $$v_{\\text{new}} = \\sqrt{2v_{\\text{old}}^2} = v_{\\text{old}}\\sqrt{2}$$. The speed increases by a factor of $$\\sqrt{2}$$ (approx 1.41), not 2.\n\nSpeed is proportional to the *square root* of temperature.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": true}, {"question": "An object is submerged in a fluid. Explain why it experiences an upward force (upthrust), referring to the pressure at different depths in the fluid. (3 steps)", "answer": "- Step 1: Pressure variation. In a fluid, pressure increases with depth according to $$P = \\rho g h$$.\n- Step 2: Forces on surfaces. The bottom surface of the submerged object is deeper than the top surface. Therefore, the pressure pushing *up* on the bottom is greater than the pressure pushing *down* on the top.\n- Step 3: Resultant force. Because the upward pressure force exceeds the downward pressure force, there is a net upward force on the object. This net upward force is upthrust.\n\nUpthrust comes from the pressure gradient in a fluid.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "Archimedes' principle states upthrust equals the weight of the fluid displaced. Conceptually, why must the upthrust equal exactly this weight, rather than the weight of the object itself? (2 steps)", "answer": "- Step 1: Imagine the displaced fluid. Consider the hole left by the object. Before the object was there, that exact volume of fluid was sitting in that hole, perfectly stationary.\n- Step 2: Force balance. For that fluid to be stationary, its weight pulling it down must have been perfectly balanced by the upthrust from the surrounding fluid pushing it up. The upthrust depends only on the volume/shape of the hole, not what is in it. So the object receives the same upthrust as the fluid did, which equals the weight of that fluid.\n\nUpthrust depends on the *fluid's* density and volume displaced, not the object's weight.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": true}, {"question": "Stokes' Law ($$F = 6\\pi\\eta r v$$) calculates viscous drag, but it fails at high velocities. Explain why, describing the difference between laminar and turbulent flow. (2 steps)", "answer": "- Step 1: Laminar flow. Stokes' Law assumes laminar flow, where fluid layers slide smoothly past each other and the object without mixing. The drag force is proportional to velocity ($$v$$).\n- Step 2: Turbulent flow. At high velocities, the flow becomes turbulent. Eddies and vortices form behind the object, which creates much more resistance. In turbulent flow, drag becomes proportional to $$v^2$$, so the linear Stokes' Law equation is no longer valid.\n\nStokes' Law is for slow, smooth (laminar) flow only.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "A steel ball is dropped into a tall cylinder of oil. Describe the forces acting on it and explain why it reaches a constant \"terminal velocity\" rather than accelerating forever. (3 steps)", "answer": "- Step 1: Initial forces. Initially, weight (down) is much greater than upthrust + viscous drag (up), so there is a large net downward force and high acceleration.\n- Step 2: Increasing drag. As the ball speeds up, the viscous drag ($$\\propto v$$) increases. Upthrust and weight remain constant.\n- Step 3: Equilibrium. Eventually, the viscous drag grows large enough that the upward forces (Upthrust + Drag) exactly equal the downward force (Weight). Net force is zero, acceleration is zero, and velocity remains constant at the terminal velocity.\n\nTerminal velocity = forces balanced = zero acceleration.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "Substance A has a specific heat capacity of $$2000 \\text{ J/kgK}$$ and Substance B has $$500 \\text{ J/kgK}$$. If you supply the same amount of heat energy to 1 kg of each, which substance will have a larger temperature rise, and by how much? (2 steps)", "answer": "- Step 1: Concept. Specific heat capacity ($$c$$) is the energy needed to raise 1 kg by 1 K. A higher $$c$$ means it is \"harder\" to heat up (needs more energy for the same temperature change).\n- Step 2: Calculation comparison. Since $$\\Delta E = mc\\Delta\\theta$$, rearranging gives $$\\Delta\\theta = \\frac{\\Delta E}{mc}$$. For the same $$\\Delta E$$ and $$m$$, $$\\Delta\\theta \\propto \\frac{1}{c}$$. Substance B has $$\\frac{1}{4}$$ the $$c$$ of A, so its temperature rise will be 4 times larger than A's.\n\nLower specific heat capacity = easier to change temperature.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "It takes $$334 \\text{ kJ}$$ to melt 1 kg of ice at $$0^\\circ\\text{C}$$ (Latent heat of fusion). It takes $$2260 \\text{ kJ}$$ to boil 1 kg of water at $$100^\\circ\\text{C}$$ (Latent heat of vaporisation). Roughly how much energy does it take to turn 2 kg of ice at $$0^\\circ\\text{C}$$ into water at $$0^\\circ\\text{C}$$? (2 steps)", "answer": "- Step 1: Identify the process. The process is melting (solid to liquid), so we use the specific latent heat of fusion.\n- Step 2: Calculate. Energy = mass $$\\times$$ specific latent heat of fusion. $$E = 2 \\text{ kg} \\times 334 \\text{ kJ/kg} = 668 \\text{ kJ}$$.\n\nLatent heat scales linearly with mass.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "A sealed, elastic balloon filled with helium is placed in a freezer. Assuming the balloon's internal pressure remains roughly equal to the constant atmospheric pressure outside, what happens to the volume of the balloon, and which gas law describes this? (2 steps)", "answer": "- Step 1: Identify variables. Pressure ($$P$$) is constant (atmospheric). Temperature ($$T$$) decreases.\n- Step 2: Apply Law. Charles's Law states that at constant pressure, volume is proportional to temperature ($$V \\propto T$$). Since the temperature decreases, the volume of the balloon must also decrease.\n\nCharles's Law explains why cold balloons shrink.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "In kinetic theory, we use the root-mean-square speed ($$c_{rms}$$) rather than the simple average speed. Why is squaring, averaging, and then square-rooting necessary when calculating the \"average\" speed related to kinetic energy? (2 steps)", "answer": "- Step 1: The vector problem. Velocity is a vector. In a gas, molecules move in all directions randomly. If you simply averaged the velocities, the positive and negative vectors would cancel out to roughly zero.\n- Step 2: The energy connection. Kinetic energy depends on $$v^2$$, which is always positive. By squaring first (getting rid of direction/negatives), then averaging, then square-rooting, we get a speed magnitude that accurately reflects the average kinetic energy of the molecules.\n\n$$c_{rms}$$ avoids vector cancellation and relates directly to kinetic energy.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": true}, {"question": "You have an irregular shaped rock. You weigh it to find its mass ($$m$$). Describe the steps to find its density using a measuring cylinder and water. (3 steps)", "answer": "- Step 1: Initial volume. Fill the measuring cylinder with enough water to submerge the rock. Record this initial volume ($$V_1$$).\n- Step 2: Displaced volume. Carefully lower the rock into the water until fully submerged. Record the new volume ($$V_2$$). The volume of the rock is $$V_{\\text{rock}} = V_2 - V_1$$.\n- Step 3: Calculate density. Use the formula $$\\rho = \\frac{m}{V_{\\text{rock}}}$$.\n\nThe displacement method converts irregular shape volume into a measurable liquid column difference.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "An object floats if upthrust equals its weight, and sinks if upthrust is less than its weight. Explain why a wooden block (less dense than water) floats, while an iron block (more dense than water) of the same volume sinks. (3 steps)", "answer": "- Step 1: Upthrust magnitude. Both blocks have the same volume, so if fully submerged, they would displace the same volume of water and experience the *same* maximum upthrust.\n- Step 2: Weight of wood. Wood is less dense than water. Its weight is less than the weight of the water it displaces. So upthrust > weight, and it floats, rising until it displaces just enough water to match its weight.\n- Step 3: Weight of iron. Iron is more dense than water. Its weight is greater than the maximum possible upthrust (weight of displaced water). So weight > upthrust, and it sinks.\n\nFloating depends on density relative to the fluid.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": true}, {"question": "Derive the expression for the average molecular kinetic energy of an ideal gas by combining the macroscopic ideal gas equation ($$PV = NkT$$) and the microscopic kinetic theory equation ($$PV = \\frac{1}{3}Nm\\bar{c^2}$$). (3 steps)", "answer": "- Step 1: Equate the right sides. Since both equations equal $$PV$$, we can set them equal to each other: $$NkT = \\frac{1}{3}Nm\\bar{c^2}$$.\n- Step 2: Simplify. The number of molecules $$N$$ cancels out on both sides, leaving $$kT = \\frac{1}{3}m\\bar{c^2}$$.\n- Step 3: Solve for KE. To get the kinetic energy formula $$\\frac{1}{2}m\\bar{c^2}$$, multiply both sides by $$\\frac{3}{2}$$. This yields $$\\frac{3}{2}kT = \\frac{1}{2}m\\bar{c^2} = E_k$$.\n\nAverage molecular kinetic energy is $$\\frac{3}{2}kT$$.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "How does the viscosity of a liquid change as temperature increases? Give a common everyday example of this. (2 steps)", "answer": "- Step 1: The trend. As temperature increases, the viscosity of a liquid *decreases*.\n- Step 2: The reason/example. Molecules have more kinetic energy to overcome intermolecular forces, allowing them to flow past each other more easily. Example: Hot motor oil flows much more easily (is \"thinner\") than cold motor oil, and honey pours faster when warmed.\n\nLiquids flow better when hot; gases actually get *more* viscous when hot.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "In the ideal gas equation $$PV = nRT$$, what are the SI units for Pressure ($$P$$), Volume ($$V$$), and Temperature ($$T$$), and what is a common trap with temperature? (2 steps)", "answer": "- Step 1: SI Units. Pressure must be in Pascals ($$\\text{Pa}$$ or $$\\text{N/m}^2$$), and Volume in cubic meters ($$\\text{m}^3$$).\n- Step 2: Temperature trap. Temperature *must* be in Kelvin ($$\\text{K}$$). A common trap is using Celsius. If a problem gives $$25^\\circ\\text{C}$$, you must use $$298 \\text{ K}$$ in the equation.\n\nNever use Celsius in gas law calculations.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "The ideal gas equation can be written as $$PV = nRT$$ or $$PV = NkT$$. What is the difference between $$n$$ and $$N$$, and how is the Boltzmann constant $$k$$ related to the molar gas constant $$R$$? (3 steps)", "answer": "- Step 1: Define $$n$$ vs $$N$$. $$n$$ is the number of *moles* of gas. $$N$$ is the total *number of molecules* of gas.\n- Step 2: The link. The number of molecules is the number of moles times Avogadro's constant: $$N = n \\times N_A$$.\n- Step 3: Relate $$k$$ and $$R$$. Substitute $$N$$ into $$PV=NkT$$: $$PV = n N_A k T$$. Compare this to $$PV = nRT$$. It follows that $$R = N_A k$$, or $$k = \\frac{R}{N_A}$$. $$k$$ is essentially the gas constant *per molecule*.\n\n$$R$$ is for moles; $$k$$ is for individual molecules.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "The pressure at a depth $$h$$ in a fluid is $$P = \\rho g h$$. This is the *gauge* pressure. Why must you add atmospheric pressure to find the *total* pressure at that depth? (2 steps)", "answer": "- Step 1: Atmospheric weight. The atmosphere above the fluid exerts pressure on the surface of the fluid (usually ~101 kPa at sea level).\n- Step 2: Transmission. According to Pascal's principle, this pressure is transmitted undiminished throughout the fluid. So the total pressure at depth is the pressure from the water column above ($$\\rho g h$$) PLUS the pressure of the air pushing on the surface.\n\nTotal Pressure = Atmospheric Pressure + Fluid Pressure.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "In the core practical to determine viscosity using a falling sphere, why must the sphere reach terminal velocity before you start timing its fall between markers? (2 steps)", "answer": "- Step 1: The goal. You are using the balance of forces (Weight = Upthrust + Drag) to find viscosity. This balance only occurs at terminal velocity.\n- Step 2: The error. If the sphere is still accelerating, the drag force is less than $$6\\pi\\eta r v_{\\text{term}}$$, and the forces are not balanced. Using a non-terminal velocity in the Stokes' equation would give an incorrect (too low) viscosity value.\n\nTerminal velocity ensures the drag force formula is valid for force balance.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "A heater supplies energy at a constant rate to two blocks of the same mass: one aluminum ($$c \\approx 900 \\text{ J/kgK}$$) and one copper ($$c \\approx 400 \\text{ J/kgK}$$). Which block reaches a higher temperature after 5 minutes, and how do their heating curve gradients compare? (3 steps)", "answer": "- Step 1: Compare temperature rise. $$\\Delta\\theta = \\frac{\\Delta E}{mc}$$. For the same energy and mass, a lower specific heat capacity results in a higher temperature rise. Copper has a lower $$c$$, so it gets hotter.\n- Step 2: Gradient meaning. The gradient of a Temperature vs. Energy graph is $$\\frac{\\Delta\\theta}{\\Delta E} = \\frac{1}{mc}$$. A steeper gradient means temperature rises faster for the same energy input.\n- Step 3: Compare gradients. Copper has a lower $$c$$, so $$\\frac{1}{mc}$$ is larger. The heating curve for copper is steeper than aluminum's.\n\nLower specific heat capacity = steeper heating curve.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "A gas has pressure $$P$$ and volume $$V$$. If the volume is compressed to $$0.5V$$ and the temperature remains constant, what is the new pressure? (2 steps)", "answer": "- Step 1: Identify the law. Boyle's Law states that for a fixed mass of gas at constant temperature, pressure is inversely proportional to volume ($$P_1V_1 = P_2V_2$$).\n- Step 2: Calculate. $$P \\times V = P_2 \\times 0.5V$$. Solving for $$P_2$$, we get $$P_2 = 2P$$. The pressure doubles.\n\nHalving the volume at constant temperature doubles the pressure.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}], "count": 30}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "What is density, and why is a small block of lead much heavier than a large balloon even though the balloon takes up far more space? (3 steps)", "answer": "- Step 1: Density is defined as mass per unit volume: $$\\rho = \\frac{m}{V}$$. It tells you how much mass is packed into each unit of space. The SI unit is $$\\text{kg m}^{-3}$$.\n- Step 2: Lead has a very high density ($$\\sim 11\\,300\\ \\text{kg m}^{-3}$$), meaning even a tiny volume contains a lot of mass. A balloon filled with air has very low density ($$\\sim 1.2\\ \\text{kg m}^{-3}$$), so a large volume contains very little mass.\n- Step 3: Density is a property of the *material*, not the object. Two objects made of the same material have the same density regardless of their size — a tiny steel ball and a steel girder share the same $$\\rho$$.\n\nKey insight: Density bridges the gap between \"how much stuff\" (mass) and \"how much space\" (volume). It's what makes materials fundamentally different from each other.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "A paving slab has dimensions given in millimetres: 40 mm × 500 mm × 850 mm. Why must you convert each length to metres before calculating volume, and what goes wrong if you don't? (3 steps)", "answer": "- Step 1: The formula for density requires volume in $$\\text{m}^3$$ if mass is in kg, to get $$\\rho$$ in $$\\text{kg m}^{-3}$$. Volume in $$\\text{mm}^3$$ would be off by a factor of $$(1000)^3 = 10^9$$ from $$\\text{m}^3$$.\n- Step 2: Converting each dimension: $$0.040\\ \\text{m} \\times 0.500\\ \\text{m} \\times 0.850\\ \\text{m} = 0.017\\ \\text{m}^3$$. If you computed in mm: $$40 \\times 500 \\times 850 = 17\\,000\\,000\\ \\text{mm}^3$$, and dividing by $$10^9$$ gives the same $$0.017\\ \\text{m}^3$$ — but it's easy to forget the $$10^9$$ conversion.\n- Step 3: The trap: students often divide by 1000 (linear) instead of $$10^9$$ (cubic). A cube that is 1000 mm on each side is $$1\\ \\text{m}^3$$, not $$1000\\ \\text{m}^3$$.\n\nTakeaway: Always convert lengths to metres *first*, then multiply — this avoids the cubic conversion trap entirely.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "You need to find the density of an irregularly shaped rock. You can weigh it on a scale, but how do you determine its volume? (2 steps)", "answer": "- Step 1: Use the **displacement method** — submerge the rock in a measuring cylinder filled with water. The *rise* in water level equals the volume of the rock, because the rock displaces a volume of water equal to its own volume.\n- Step 2: Read the initial water level, then the final level with the rock submerged. Volume of rock = final reading − initial reading. Then use $$\\rho = m/V$$.\n\nKey point: This works because of Archimedes' insight — any submerged object displaces fluid equal to its own volume. It's the standard practical method for irregular objects where no geometric formula applies.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "For the three common states of matter (solid, liquid, gas), describe the particle *arrangement* in each. What does \"regular\" vs \"irregular\" mean here, and why does it matter? (3 steps)", "answer": "- Step 1: **Solid** — particles are *close together* in a *regular* (ordered, repeating) pattern, like soldiers in formation. This regularity is what gives crystals their definite shapes.\n- Step 2: **Liquid** — particles are *close together* but in an *irregular* (random, disordered) arrangement. They are touching but can slide past each other, which is why liquids flow and take the shape of their container.\n- Step 3: **Gas** — particles are *far apart* with no arrangement at all. The spacing between particles is typically ~10× the particle diameter, so most of a gas is empty space.\n\nWhy it matters: The arrangement determines macroscopic properties — regular arrangement (solid) means fixed shape; irregular but close (liquid) means fixed volume but variable shape; far apart (gas) means neither fixed shape nor volume.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": true}, {"question": "A student says \"particles in a solid are stationary.\" Why is this wrong, and what is the correct description of particle motion in a solid? What is the only temperature where they would truly stop? (3 steps)", "answer": "- Step 1: In a solid, particles **vibrate about fixed positions** — they are never truly stationary. They oscillate back and forth around their equilibrium positions in the lattice. The misconception comes from the fact that they don't *translate* (move from place to place), but they are always vibrating.\n- Step 2: As you cool a solid, the vibrations get smaller and smaller. The amplitude of vibration decreases as kinetic energy is removed.\n- Step 3: The only temperature where vibration ceases entirely is **absolute zero** ($$0\\ \\text{K} = -273.15\\ \\text{°C}$$). This is the theoretical minimum temperature where all molecular kinetic energy is at its minimum. It has never been reached in practice.\n\nCommon trap: \"Solids don't move\" — they don't *flow*, but they absolutely do vibrate. This vibration is what we detect as infrared radiation from any object above absolute zero.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": true}, {"question": "Compare the motion of particles in a liquid versus a gas. Why can a liquid take the shape but not the volume of its container, while a gas takes both? (3 steps)", "answer": "- Step 1: **Liquid** — particles move *slowly* and can *slide past each other* (flow), but they remain in contact. This means they fill the shape of the container (they can rearrange) but maintain a fixed volume (they can't spread apart because intermolecular forces hold them close).\n- Step 2: **Gas** — particles move *fast* and *randomly* in straight lines between collisions. They are far apart with negligible intermolecular forces, so they spread to fill the entire container — taking both its shape and volume.\n- Step 3: The critical difference is the *strength of intermolecular forces*. In a liquid, forces are strong enough to keep particles close (fixed volume) but weak enough to allow sliding (variable shape). In a gas, forces are too weak to constrain particles at all.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "What is plasma, and why is it relevant to nuclear fusion even though we don't study it at A-level? (2 steps)", "answer": "- Step 1: **Plasma** is a state of matter where electrons have been stripped away from their atoms, leaving a mixture of free positive ions and free electrons. It forms at extremely high temperatures where the thermal energy exceeds the energy binding electrons to nuclei.\n- Step 2: Plasma is essential for **nuclear fusion** because fusion requires bare nuclei (protons) to collide and overcome their electrostatic repulsion. If electrons were present, they would interfere with the process. The Sun's core is a plasma at ~15 million K.\n\nNote: At A-level, we only deal with solid, liquid, and gas. Plasma is mentioned for awareness.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "What is the difference between an atom, a molecule, an element, and a substance? Give a concrete example of each. (3 steps)", "answer": "- Step 1: An **atom** is the smallest unit of an element — a single nucleus with its electron cloud. Example: a single helium atom ($$^4_2\\text{He}$$). An **element** is a pure subs
