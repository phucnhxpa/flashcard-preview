<script>
const DATA={"selected": [{"question": "The average molecular kinetic energy is given by $$E_k = \\frac{3}{2}kT$$. If the temperature of a gas doubles from 300 K to 600 K, does the RMS speed ($$c_{rms}$$) of the molecules also double? Explain mathematically. (3 steps)", "answer": "- Step 1: Relate KE to speed. Kinetic energy is proportional to velocity squared: $$E_k \\propto v^2$$ (or $$c_{rms}^2$$).\n- Step 2: Relate T to KE. Since $$E_k = \\frac{3}{2}kT$$, we have $$E_k \\propto T$$. Therefore, $$v^2 \\propto T$$.\n- Step 3: Calculate speed change. If T doubles, $$v^2$$ doubles. Therefore, the new speed $$v_{\\text{new}} = \\sqrt{2v_{\\text{old}}^2} = v_{\\text{old}}\\sqrt{2}$$. The speed increases by a factor of $$\\sqrt{2}$$ (approx 1.41), not 2.\n\nSpeed is proportional to the *square root* of temperature.", "source": "GLM 5.1 ②", "_id": "glm_2_11"}, {"question": "Name all six phase changes between solid, liquid, and gas. (3 steps)", "answer": "- Step 1: Between solid and liquid:\n+ Solid → Liquid: **melting** (or fusion)\n+ Liquid → Solid: **freezing**\n- Step 2: Between liquid and gas:\n+ Liquid → Gas: **boiling** (or vaporisation; evaporation is the slow surface-only version)\n+ Gas → Liquid: **condensing**\n- Step 3: Between solid and gas (skipping liquid):\n+ Solid → Gas: **sublimation** (e.g. dry ice)\n+ Gas → Solid: **deposition** (e.g. frost forming directly from water vapour)", "source": "Opus 4.7 ②", "_id": "opus_2_9"}, {"question": "Explain microscopically why heating a gas at constant volume increases its pressure. Use three F-words. (3 steps)", "answer": "- Step 1: Heating raises the average KE → molecules move **faster**.\n- Step 2: Faster molecules collide with the walls **more frequently**.\n- Step 3: Each collision also delivers more **force** (faster particles → larger momentum change per hit).\n+ Pressure = force / area, so more force more frequently per unit area = higher pressure.\n\nFaster, More Frequently, More Force → pressure goes up.", "source": "Opus 4.7 ①", "_id": "opus_1_23"}, {"question": "A paving slab is 73 kg with dimensions 40 mm × 500 mm × 850 mm. Conceptually, what's the trap students fall into when computing its density, and roughly what order of magnitude should the answer be? (3 steps)", "answer": "- Step 1: The trap is mixing units — leaving lengths in mm gives a volume in $$\\text{mm}^3$$, which is $$10^9$$ times smaller than $$\\text{m}^3$$. The density then looks insanely large or small.\n- Step 2: Convert all lengths to metres: $$0.040 \\times 0.500 \\times 0.850 \\approx 0.017\\,\\text{m}^3$$.\n- Step 3: Density $$\\approx 73 / 0.017 \\approx 4000\\,\\text{kg/m}^3$$ — a few thousand kg/m³, sensible for a dense rocky material (denser than water at 1000, less than lead at 11000).\n\nAlways convert *before* computing volume — cubic conversions are where errors hide.", "source": "Opus 4.7 ①", "_id": "opus_1_5"}, {"question": "In the formula for ideal gas pressure derived from kinetic theory: P = (1/3)Nm⟨c²⟩/V. Explain what each symbol means and why there's a factor of 1/3. (3 steps)", "answer": "- Step 1: Define the terms:\n+ N = number of molecules\n+ m = mass of ONE molecule\n+ ⟨c²⟩ = mean square speed (average of speed squared — not the same as speed squared!)\n+ V = volume of container\n- Step 2: The derivation considers pressure = force/area = (momentum change per collision × collisions per second)/area. Molecules move in all directions (x, y, z), and only the x-component of velocity affects pressure on the yz-wall.\n- Step 3: Since there are three independent spatial directions, and the distribution is random, on average only 1/3 of the kinetic energy is associated with motion in any one direction. That's where the 1/3 factor comes from.\n\n**Key insight:** ⟨c²⟩ = ⟨c_x²⟩ + ⟨c_y²⟩ + ⟨c_z²⟩, and for random motion, ⟨c_x²⟩ = ⟨c_y²⟩ = ⟨c_z²⟩ = ⅓⟨c²⟩.", "source": "MiniMax ①", "_id": "minimax_1_22"}, {"question": "In a cooling curve experiment, the temperature stays constant for several minutes while a substance changes from liquid to solid. A student claims \"the cooling has stopped.\" How would you correct this misconception? (2 steps)", "answer": "- Step 1: The cooling has NOT stopped — thermal energy is still being removed from the substance. The temperature stays constant because the removed energy is being used for **bond formation** (latent heat of fusion being released), not for decreasing molecular kinetic energy.\n- Step 2: During this plateau:\n+ Energy is continuously flowing OUT of the substance (cooling is occurring)\n+ This energy comes from molecules forming stronger intermolecular bonds as they lock into solid positions\n+ The potential energy of the molecules decreases\n+ The kinetic energy (and thus temperature) stays constant until all molecules have solidified\n\n**Analogy:** It's like a team building a brick wall — work is still being done (bricks being placed), even though the \"height\" (temperature) isn't changing while the structure is being built.", "source": "MiniMax ①", "_id": "minimax_1_10"}, {"question": "A misconception probe: \"If I double the volume of a gas, the molecules slow down.\" Why is this wrong? (3 steps)", "answer": "- Step 1: Molecular speed is determined by **temperature**, not volume.\n- Step 2: In Boyle's law (constant T), doubling V halves P, but molecule speeds are unchanged — they just hit the walls less frequently because the walls are farther apart.\n- Step 3: Speed only changes when KE changes, which means T must change.\n\nVolume affects collision frequency, not collision speed.", "source": "Opus 4.7 ①", "_id": "opus_1_52"}, {"question": "Derive the kinetic theory relation $$E_k = \\tfrac{3}{2}kT$$ for the average KE of a single ideal gas molecule. (4 steps)", "answer": "- Step 1: From kinetic theory: $$PV = \\tfrac{1}{3} N m \\overline{c^2}$$, where $$m$$ is mass of one molecule and $$\\overline{c^2}$$ is mean square speed.\n- Step 2: From ideal gas: $$PV = NkT$$.\n- Step 3: Set the right-hand sides equal: $$\\tfrac{1}{3} N m \\overline{c^2} = NkT$$. Cancel $$N$$ and multiply both sides by 3: $$m\\overline{c^2} = 3kT$$.\n- Step 4: Multiply both sides by $$\\tfrac{1}{2}$$ to get KE form: $$\\tfrac{1}{2}m\\overline{c^2} = \\tfrac{3}{2}kT$$. So $$E_k = \\tfrac{3}{2}kT$$.\n\nTemperature *is* the average translational KE, scaled by $$\\tfrac{3}{2}k$$.", "source": "Opus 4.7 ①", "_id": "opus_1_27"}, {"question": "When a fluid flows through a pipe, at low flow rates it's \"laminar\" (layers slide past smoothly), but at high rates it becomes \"turbulent\" (chaotic with eddies). How does this affect the viscous drag force on an object moving through the fluid? (2 steps)", "answer": "- Step 1: In **laminar flow** (low speed, small objects):\n+ Drag force ∝ velocity: F_d = 6πηrv (Stokes' law)\n+ Predictable, smooth — like water flowing in a calm stream\n+ This regime applies to small spheres in viscous liquids\n- Step 2: In **turbulent flow** (high speed, large objects):\n+ Drag force ∝ v² (roughly): F_d = ½ρAv²C_d\n+ Much higher drag than Stokes' law predicts\n+ Energy is wasted in creating eddies and turbulence\n+ This is why aircraft and cars are streamlined — to delay turbulence and reduce drag\n\nThe transition is predicted by the Reynolds number: low Re = laminar, high Re = turbulent.", "source": "MiniMax ①", "_id": "minimax_1_20"}, {"question": "If you plot pressure vs temperature in °C for an ideal gas at constant volume, you get a straight line that crosses the x-axis at −273 °C. Why does this happen, and what is the physical significance of this intercept? (3 steps)", "answer": "- Step 1: The Pressure law says $$P \\propto T$$ (in Kelvin). Plotting $$P$$ vs $$T$$ in Kelvin gives a straight line through the origin. But when you relabel the x-axis in °C (shifted by 273), the line still has the same slope but now crosses the x-axis at −273 °C.\n- Step 2: At this intercept, $$P = 0$$. Zero pressure means molecules exert no force on the container walls — they have stopped moving. This corresponds to the point where all molecular kinetic energy has been removed.\n- Step 3: This intercept is **absolute zero**. The experiment of extrapolating a pressure-temperature graph to find where $$P = 0$$ was historically how absolute zero was determined experimentally. It's a fundamental limit of nature, not just an arbitrary point on a graph.", "source": "GLM 5.1 ③", "_id": "glm_3_48"}, {"question": "The specific latent heat of vaporisation for water is significantly larger than its specific latent heat of fusion. Explain this difference in terms of the intermolecular forces being overcome. (3 steps)", "answer": "- Step 1: Latent heat of fusion (melting) requires energy just to weaken the intermolecular bonds enough so molecules can slide past each other (solid to liquid). The molecules remain relatively close.\n- Step 2: Latent heat of vaporisation (boiling) requires energy to completely break the intermolecular bonds so that molecules can separate entirely and move far apart (liquid to gas).\n- Step 3: Completely separating the molecules against their attractive forces requires substantially more energy than just allowing them to flow over each other, hence the latent heat of vaporisation is much larger.", "source": "GLM 5.1 ①", "_id": "glm_1_19"}, {"question": "A student claims that when ice melts, the temperature stays at 0°C because the room is only at 0°C. Explain why this is incorrect and what actually determines the melting point. (2 steps)", "answer": "- Step 1: This is a common misconception. The temperature at which ice melts (0°C for water at standard pressure) is NOT because of the external temperature - it's the intrinsic property of the substance\n- Step 2: The melting point is determined by the balance between intermolecular forces in the solid (holding particles together) and the thermal kinetic energy trying to break them apart\n- When heat is supplied to ice at 0°C, the energy goes to breaking bonds (potential energy), not increasing temperature. The ice will melt at 0°C regardless of whether the room is warmer or colder (as long as there's heat flow)", "source": "MiniMax ②", "_id": "minimax_2_23"}, {"question": "Why does Boltzmann's constant $$k = R/N_A$$ have units of J K⁻¹, and what's the conceptual meaning of its tiny value (~$$1.38 \\times 10^{-23}$$)?", "answer": "- Step 1: $$E = kT$$ gives energy from temperature → units of $$k$$ must be (energy)/(temperature) = J K⁻¹.\n- Step 2: The value is tiny because a single molecule has an incredibly small KE for each unit of temperature.\n- Step 3: To get the macroscopic gas constant $$R$$, you multiply $$k$$ by Avogadro's number ($$6 \\times 10^{23}$$) — i.e., add up energies of a mole of molecules.\n\n$$k$$ is the \"per-molecule\" version of $$R$$ — it bridges microscopic and macroscopic.", "source": "Opus 4.7 ①", "_id": "opus_1_30"}, {"question": "What's the conceptual difference between \"weight of fluid displaced\" and \"weight of the object\"? When are they equal?", "answer": "- Step 1: Weight of fluid displaced = $$\\rho_{fluid} V_{displaced} g$$ — this is the *upthrust*.\n- Step 2: Weight of object = $$\\rho_{obj} V_{obj} g$$ — this is what gravity pulls down.\n- Step 3: They are equal **only when an object floats in equilibrium** — then the object only sinks enough to displace fluid equal to its own weight.\n+ Fully submerged sinking object: upthrust < weight.\n+ Buoyant rising bubble: upthrust > weight.", "source": "Opus 4.7 ①", "_id": "opus_1_34"}, {"question": "State Charles' law and explain it microscopically. (3 steps)", "answer": "- Step 1: At constant pressure (and amount of gas): $$V/T = \\text{constant}$$, i.e. $$V_1/T_1 = V_2/T_2$$. Volume is proportional to absolute temperature.\n- Step 2: Microscopic picture: if you heat the gas (higher $$T$$ → faster molecules → more energetic wall hits), the only way to keep pressure constant is to give the molecules more room — i.e. expand the volume so collisions become less frequent per unit area.\n- Step 3: So $$V$$ rises in step with $$T$$ (in Kelvin) to keep $$P$$ constant. Use *Kelvin*, never Celsius, otherwise the proportionality fails (volume isn't zero at $$0\\,°C$$, but it would extrapolate to zero at $$0\\,\\text{K}$$).", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "How does the viscosity of a liquid and a gas change as temperature increases? Explain the microscopic reason for each. (4 steps)", "answer": "- Step 1: **Liquids**: Viscosity *decreases* as temperature increases.\n+ In a liquid, molecules are close together, and viscosity is due to intermolecular forces hindering flow.\n+ As temperature rises, molecules have more kinetic energy to overcome these intermolecular attractions, allowing them to flow more easily.\n- Step 2: **Gases**: Viscosity *increases* as temperature increases.\n+ In a gas, molecules are far apart, and viscosity is due to momentum transfer between layers during collisions.\n+ As temperature rises, molecules move faster, leading to more frequent and more energetic collisions, which transfers more momentum between layers and increases the resistance to shear (viscosity).", "source": "GLM 5.1 ①", "_id": "glm_1_37"}, {"question": "A proton consists of two up quarks (charge +2/3e each) and one down quark (charge -1/3e). A neutron consists of one up quark and two down quarks. Verify these give the correct total charges, and explain why this matters for atomic physics. (2 steps)", "answer": "- Step 1: Let's sum the charges:\n+ Proton: uud → (+2/3) + (+2/3) + (-1/3) = (+4/3 - 1/3) = +1e ✓\n+ Neutron: udd → (+2/3) + (-1/3) + (-1/3) = (0) = 0e ✓\n- Step 2: This explains why:\n+ Proton (charge +1) attracts electrons (charge -1) to form neutral atoms\n+ Neutron (charge 0) adds mass but doesn't affect electric charge\n+ The quark structure explains why protons repel each other (same charge), but the strong nuclear force holds them together in the nucleus\n+ Isotopes differ by neutron number but have the same chemical behavior (same proton number = same electron count)\n\nThis is fundamental to understanding atomic structure and why chemistry works the way it does.", "source": "MiniMax ①", "_id": "minimax_1_7"}, {"question": "A sphere of radius 2 mm falls through oil and reaches terminal velocity. If the same material is shaped into a cube of the same volume, would Stokes' law still apply? Why or why not? (2 steps)", "answer": "- Step 1: **No**, Stokes' law would not apply. One of the four conditions for Stokes' law is that the object must be **spherical**. A cube creates turbulent flow at its corners and edges, disrupting the laminar flow assumption.\n- Step 2: Additionally, the drag formula $$F = 6\\pi\\eta r v$$ contains $$r$$ (radius), which is only defined for spheres. For non-spherical objects, the relationship between drag and velocity is more complex and depends on the object's orientation and shape. This is why viscosity experiments always use small, smooth ball bearings.", "source": "GLM 5.1 ③", "_id": "glm_3_51"}, {"question": "A real gas is at high pressure and low temperature. In what two ways does it deviate from ideal gas behaviour, and what would happen if you tried to use $$PV = nRT$$? (3 steps)", "answer": "- Step 1: At high pressure, molecules are forced close together. Their own **molecular volume** is no longer negligible compared to the container volume. The actual volume available for molecules to move in is less than $$V$$ — it's roughly $$V - nb$$ (where $$b$$ accounts for molecular volume).\n- Step 2: At low temperature (and/or high pressure), **intermolecular forces** become significant. Attractive forces between molecules reduce the pressure compared to what an ideal gas would exert (molecules are pulled back from the walls slightly).\n- Step 3: If you used $$PV = nRT$$, you would find that the measured $$P$$ is *lower* than predicted (attraction reduces pressure) and/or the measured $$V$$ is *lower* than predicted (molecules take up space). The van der Waals equation corrects for both effects.", "source": "GLM 5.1 ③", "_id": "glm_3_50"}, {"question": "What is plasma, and under what conditions does it form? Why isn't it typically studied at A-level? (3 steps)", "answer": "- Step 1: Plasma is a state of matter where atoms have been *ionised* — electrons stripped from nuclei — so it's a soup of free positive ions and free electrons rather than neutral atoms.\n- Step 2: It forms at very high temperatures (e.g. inside stars, lightning bolts, fusion reactors, fluorescent lamps), where thermal energy exceeds the ionisation energy of atoms.\n- Step 3: Not in A-level scope because its electromagnetic behaviour requires plasma physics (collective electron motion, magnetic confinement), which is beyond the simple kinetic-theory framework. But conceptually it's the \"4th state of matter,\" and it's what you need for nuclear fusion.", "source": "Opus 4.7 ②", "_id": "opus_2_50"}, {"question": "The average kinetic energy of gas molecules is given by E_k = ³⁄₂kT, where k is Boltzmann's constant. If you triple the Kelvin temperature, what happens to: (a) the average KE, (b) the rms speed of molecules? (2 steps)", "answer": "- Step 1: (a) Average KE triples directly, since E_k ∝ T. If T becomes 3T, then E_k becomes 3 × (³⁄₂kT) = ³⁄₂k(3T).\n- Step 2: (b) The rms speed relates as: c_rms = √(3kT/m) = √(3RT/M). Since c_rms ∝ √T, if temperature triples, c_rms becomes √3 ≈ 1.73 times larger (not three times).\n+ This is because kinetic energy ∝ mv², so v ∝ √(E_k)\n+ The speed increases by the square root of the temperature ratio\n\n**Key relationship:** Doubling absolute temperature → √2 increase in speed, but 2× increase in kinetic energy.", "source": "MiniMax ①", "_id": "minimax_1_14"}, {"question": "A fixed mass of ideal gas is heated at constant volume from 27°C to 127°C. What is the ratio of final to initial pressure? Why must we use Kelvin, not Celsius? (2 steps)", "answer": "- Step 1: Convert to Kelvin first:\n+ T₁ = 27 + 273 = 300 K\n+ T₂ = 127 + 273 = 400 K\n+ Ratio T₂/T₁ = 400/300 = 4/3 ≈ 1.33\n- Step 2: At constant volume (and constant n), P ∝ T. So P₂/P₁ = T₂/T₁ = 4/3 ≈ 1.33.\n+ Final pressure is 1.33 times the initial pressure.\n- **Why not Celsius?** If we incorrectly used Celsius: ΔT = 100°C in both cases, but 0°C + 100°C doesn't give proportional relationships. The ratio (127/27) ≈ 4.7 would be nonsense — pressure can't increase by 4.7 times from the same heating!\n+ Only Kelvin has a true zero point that makes proportional reasoning valid.", "source": "MiniMax ①", "_id": "minimax_1_23"}, {"question": "An object floats. What is the relationship between its weight and the upthrust? What if it sinks? What determines whether an object floats or sinks? (3 steps)", "answer": "- Step 1: **Floating**: upthrust = weight of object. The object displaces just enough fluid so that the weight of displaced fluid equals its own weight. It may be partially submerged.\n- Step 2: **Sinking**: upthrust < weight of object. Even when fully submerged, the weight of fluid displaced (upthrust) is less than the object's weight, so there's a net downward force.\n- Step 3: The deciding factor is **density comparison**: if $$\\rho_{\\text{object}} < \\rho_{\\text{fluid}}$$, it floats (it's less dense than the fluid). If $$\\rho_{\\text{object}} > \\rho_{\\text{fluid}}$$, it sinks. A steel ship floats because its *overall* density (hollow shape) is less than water, even though solid steel is denser.", "source": "GLM 5.1 ③", "_id": "glm_3_34"}, {"question": "When converting $$1\\,\\text{cm}^3$$ to $$\\text{m}^3$$, why is the conversion factor $$10^{-6}$$ and not $$10^{-2}$$? (2 steps)", "answer": "- Step 1: $$1\\,\\text{cm} = 10^{-2}\\,\\text{m}$$ for length. But volume is *cubic*: $$1\\,\\text{cm}^3 = (10^{-2})^3\\,\\text{m}^3 = 10^{-6}\\,\\text{m}^3$$.\n- Step 2: General rule: when converting squared units, square the factor; for cubic units, cube it. So $$1\\,\\text{mm}^3 = (10^{-3})^3 = 10^{-9}\\,\\text{m}^3$$ and $$1\\,\\text{cm}^2 = (10^{-2})^2 = 10^{-4}\\,\\text{m}^2$$.\n\nForgetting to cube the factor is one of the most common density mistakes.", "source": "Opus 4.7 ②", "_id": "opus_2_24"}, {"question": "From $$v_{\\text{term}} = \\dfrac{2r^2 g (\\rho_s - \\rho_f)}{9\\eta}$$, predict how terminal velocity changes if: (a) radius doubles, (b) fluid viscosity doubles, (c) object density equals fluid density. (3 steps)", "answer": "- Step 1: (a) $$v_{\\text{term}} \\propto r^2$$ → doubling $$r$$ quadruples $$v_{\\text{term}}$$. Larger spheres fall much faster.\n- Step 2: (b) $$v_{\\text{term}} \\propto 1/\\eta$$ → doubling $$\\eta$$ halves $$v_{\\text{term}}$$. Thick fluid = slow fall.\n- Step 3: (c) If $$\\rho_s = \\rho_f$$ then numerator = 0 → $$v_{\\text{term}} = 0$$. The object doesn't fall at all — it's neutrally buoyant. This is what allows a fish (or a hot-air balloon) to hover.", "source": "Opus 4.7 ②", "_id": "opus_2_31"}, {"question": "State Charles's law. If you heat a gas at constant pressure from 300 K to 600 K, what happens to its volume? Why must you use Kelvin? (3 steps)", "answer": "- Step 1: **Charles's law**: at constant pressure, $$V \\propto T$$, or $$\\frac{V_1}{T_1} = \\frac{V_2}{T_2}$$. Volume is directly proportional to absolute temperature.\n- Step 2: Doubling the Kelvin temperature (300 K → 600 K) **doubles the volume**. At 600 K, molecules have twice the average KE, moving faster and hitting walls harder. To keep pressure constant, the volume must expand so collisions are less frequent, balancing the increased force per collision.\n- Step 3: You must use **Kelvin** because the proportionality $$V \\propto T$$ only works with an absolute scale. In Celsius, doubling from 27 °C to 54 °C does NOT double the volume — the absolute temperatures are 300 K and 327 K, giving a ratio of 327/300 ≈ 1.09, not 2.0.", "source": "GLM 5.1 ③", "_id": "glm_3_24"}, {"question": "A solid steel ball sinks in water, but the same-sized hollow steel ball floats. Using the concept of upthrust and density, explain why this happens. (3 steps)", "answer": "- Step 1: Upthrust (Archimedes' principle) equals the weight of fluid displaced: U = ρ_fluid × V_displaced × g\n- Step 2: For the solid ball, its average density ρ_ball > ρ_water, so its weight W = m_ball × g = ρ_ball × V × g is greater than the maximum upthrust (when fully submerged: U_max = ρ_water × V × g). Result: W > U, so it sinks.\n- Step 3: For the hollow ball, the interior contains air (ρ_air ≈ 1.2 kg/m³). This significantly reduces the average density of the hollow ball. If ρ_hollow_ball < ρ_water, then when partially submerged: W = ρ_hollow × V × g < U (which is based on displaced water weight). The ball floats!\n+ The hollow ball displaces just enough water (less than its total volume) so that U = W at equilibrium\n\n**Key principle:** It's the **average density** (total mass ÷ total volume) that determines floating, not the material density alone.", "source": "MiniMax ①", "_id": "minimax_1_4"}, {"question": "Muons created in the upper atmosphere have a very short half-life, meaning they should decay before reaching the Earth's surface based on classical physics. Explain how relativistic effects allow them to be detected at sea level. (2 steps)", "answer": "- Step 1: Time dilation: In the Earth's frame of reference, the muons are moving at close to the speed of light, so their internal \"clock\" runs slower. Their lifetime is stretched, allowing them to travel further.\n- Step 2: Length contraction: In the muon's frame of reference, its lifetime is normal, but the distance from the atmosphere to the Earth's surface is contracted, making the journey shorter and possible within their short lifetime.", "source": "GLM 5.1 ①", "_id": "glm_1_11"}, {"question": "What is an ideal gas? List the two key assumptions about the molecules. Why do real gases deviate from ideal behaviour at high pressure and low temperature? (3 steps)", "answer": "- Step 1: An **ideal gas** is a theoretical gas that obeys the gas laws exactly. The two key assumptions are: (1) molecules occupy **negligible volume** compared to the container (they are point particles), and (2) there are **negligible intermolecular forces** except during instantaneous elastic collisions.\n- Step 2: At **high pressure**, molecules are forced close together, so their own volume becomes significant relative to the container — violating assumption 1. Also, at close range, intermolecular forces become significant — violating assumption 2.\n- Step 3: At **low temperature**, molecules move slowly and spend more time near each other, so intermolecular forces have more time to act. At very low temperatures, real gases can even *liquefy*, something an ideal gas (with no intermolecular forces) could never do.\n\nAn ideal gas can never liquefy — it has no intermolecular attractions to hold molecules together.", "source": "GLM 5.1 ③", "_id": "glm_3_22"}, {"question": "Why can't you say \"−2 °C is twice as cold as −1 °C\"? What temperature scale would you need to make such proportional statements? (3 steps)", "answer": "- Step 1: The Celsius scale has an arbitrary zero point (the freezing point of water). It doesn't represent \"zero thermal energy.\" So ratios of Celsius values are meaningless — −2 °C is not \"twice as cold\" as −1 °C because neither is measured from a true zero.\n- Step 2: To make proportional statements, you need a **ratio scale** with a true zero. The **Kelvin scale** has its zero at absolute zero (minimum possible energy). On this scale, 200 K genuinely represents twice the average molecular KE of 100 K.\n- Step 3: Converting: −1 °C = 272 K and −2 °C = 271 K. The ratio 271/272 ≈ 1.0, not 2.0! The temperatures are nearly identical in absolute terms. This shows why Kelvin is the physically meaningful scale for any proportional reasoning about temperature.", "source": "GLM 5.1 ③", "_id": "glm_3_17"}, {"question": "In the viscosity experiment (Core Practical 2), rubber bands are placed around the tube at different heights. Why must the first rubber band be far enough below the liquid surface? (2 steps)", "answer": "- Step 1: The ball bearing must reach **terminal velocity** before it passes the first marker. When first dropped, the ball accelerates under gravity — it takes some distance for drag to build up enough to balance weight.\n- Step 2: If the first rubber band is too close to the surface, the ball would still be accelerating when you start timing, and the measured velocity wouldn't be the terminal velocity. Placing the first marker well below the surface ensures the ball has reached constant speed before any measurements begin.", "source": "GLM 5.1 ③", "_id": "glm_3_59"}, {"question": "A submarine dives deeper into the ocean. How does the pressure outside change with depth? If the submarine's hull maintains internal pressure at 1 atm, what must the hull withstand at 100 m depth? (Density of seawater ≈ 1020 kg/m³, g ≈ 10 m/s²) (2 steps)", "answer": "- Step 1: Pressure at depth in a fluid: P = P_atm + ρgh\n+ At the surface (h = 0): P = 101,000 Pa (1 atm)\n+ At h = 100 m: P = 101,000 + (1020 × 10 × 100) = 101,000 + 1,020,000 = 1,121,000 Pa ≈ 11 atm\n- Step 2: The hull must withstand the **difference** between internal and external pressure:\n+ Internal = 1 atm = 101,000 Pa\n+ External at 100 m = 1,121,000 Pa\n+ Pressure difference = 1,121,000 - 101,000 = 1,020,000 Pa ≈ 10 atm\n\nThis is why deep-sea submersibles need extremely strong hulls — the pressure difference increases by about 1 atm for every 10 m of depth.", "source": "MiniMax ①", "_id": "minimax_1_16"}, {"question": "Density is $$\\rho = m/V$$. Why is it intrinsic to a material rather than depending on how much of it you have?", "answer": "- Step 1: If you double the amount of material, both $$m$$ and $$V$$ double — the ratio stays the same.\n- Step 2: This makes density a *property of the substance itself* (like a fingerprint), not of the specific sample.\n+ A grain of iron and an iron girder have the same density.\n- Step 3: That's why density is useful for *identifying* materials — it doesn't care about sample size or shape.", "source": "Opus 4.7 ①", "_id": "opus_1_4"}, {"question": "A gas is in a sealed container at constant volume. If you double the absolute temperature (in Kelvin), what happens to the pressure? Explain using kinetic theory at the molecular level. (3 steps)", "answer": "- Step 1: From the pressure-temperature law (P ∝ T at constant V and n), doubling the absolute temperature doubles the pressure.\n- Step 2: At the molecular level, doubling the temperature doubles the average kinetic energy of each molecule (since E_k ∝ T).\n- Step 3: This means molecules hit the walls:\n+ With twice the kinetic energy, each collision delivers twice the momentum change (more force per hit)\n+ They also hit the walls more frequently (faster speed)\n+ Since pressure = force/area, and the force per collision and collision frequency both increase, pressure doubles\n\n**Misconception check:** The pressure doesn't double because there are more molecules — the number stays constant. It doubles because each molecule hits harder and more often.", "source": "MiniMax ①", "_id": "minimax_1_2"}, {"question": "Explain why the Kelvin scale is essential for gas law calculations, while the Celsius scale can be used for heat capacity calculations. (2 steps)", "answer": "- Step 1: For heat capacity (ΔE = mcΔθ), we use Δθ — the *change* in temperature. Since 1 K = 1°C (same size degree), the numerical value of Δθ is identical in both scales. This is why we can use either.\n- Step 2: For gas laws (PV = nRT, etc.), absolute temperature T appears in the relationship — not a change. The Kelvin scale starts at absolute zero (0 K = -273.15°C), where gas particles have minimum kinetic energy. Using Celsius would give incorrect proportional relationships because the zero-points differ.\n+ Example: Doubling temperature from 273 K to 546 K correctly doubles average kinetic energy. Doubling from 0°C to 273°C (or 0°C to 273 K) makes no physical sense.\n\n**Key rule:** Always use Kelvin for gas law calculations involving absolute temperature.", "source": "MiniMax ①", "_id": "minimax_1_1"}, {"question": "A student calculates the volume of a cube as $$125 \\text{ cm}^3$$ and wants to find the density in $$\\text{kg/m}^3$$. Explain the conceptual trap in converting $$125 \\text{ cm}^3$$ to $$\\text{m}^3$$, and state the correct conversion factor. (2 steps)", "answer": "- Step 1: Identify the trap. The common mistake is to assume that since $$1 \\text{ m} = 100 \\text{ cm}$$, then $$1 \\text{ m}^3 = 100 \\text{ cm}^3$$. This is incorrect because volume is a three-dimensional measurement.\n- Step 2: Apply the cubic conversion. Since length converts by a factor of 100, volume must convert by the cube of that factor. $$1 \\text{ m}^3 = (100 \\text{ cm})^3 = 1,000,000 \\text{ cm}^3$$. Therefore, to convert $$125 \\text{ cm}^3$$ to $$\\text{m}^3$$, you divide by $$10^6$$, yielding $$1.25 \\times 10^{-4} \\text{ m}^3$$.\n\nAlways cube the linear conversion factor for volume and square it for area.", "source": "GLM 5.1 ②", "_id": "glm_2_1"}, {"question": "Conceptually, why does an iceberg float with most of its mass below water? (3 steps)", "answer": "- Step 1: Floating means upthrust = weight of iceberg → $$\\rho_{water} V_{sub} g = \\rho_{ice} V_{ice} g$$.\n- Step 2: Rearranging: $$V_{sub}/V_{ice} = \\rho_{ice}/\\rho_{water} \\approx 917/1020 \\approx 0.90$$.\n- Step 3: So about 90% of the iceberg's volume must be submerged to displace enough water to support its weight. Only ~10% sticks out.\n\nThe closer object and fluid densities are, the deeper the object sits.", "source": "Opus 4.7 ①", "_id": "opus_1_32"}, {"question": "Why does the average molecular KE equation $$E_k = \\tfrac{3}{2}kT$$ have a factor of 3 (not, say, 2 or 1)? (3 steps)", "answer": "- Step 1: A gas molecule has three independent directions of translational motion (x, y, z) — three \"degrees of freedom\".\n- Step 2: By equipartition, each degree of freedom carries $$\\tfrac{1}{2}kT$$ of KE on average.\n- Step 3: Total translational KE = $$3 \\times \\tfrac{1}{2}kT = \\tfrac{3}{2}kT$$.\n\nThe 3 reflects three dimensions — in a hypothetical 2D gas, the answer would be $$kT$$.", "source": "Opus 4.7 ①", "_id": "opus_1_46"}, {"question": "Archimedes' principle states upthrust equals the weight of the fluid displaced. Conceptually, why must the upthrust equal exactly this weight, rather than the weight of the object itself? (2 steps)", "answer": "- Step 1: Imagine the displaced fluid. Consider the hole left by the object. Before the object was there, that exact volume of fluid was sitting in that hole, perfectly stationary.\n- Step 2: Force balance. For that fluid to be stationary, its weight pulling it down must have been perfectly balanced by the upthrust from the surrounding fluid pushing it up. The upthrust depends only on the volume/shape of the hole, not what is in it. So the object receives the same upthrust as the fluid did, which equals the weight of that fluid.\n\nUpthrust depends on the *fluid's* density and volume displaced, not the object's weight.", "source": "GLM 5.1 ②", "_id": "glm_2_13"}, {"question": "A neutron is udd. Why is its net charge exactly zero, and what does this tell you about whether \"neutral\" means \"no charge inside\"?", "answer": "- Step 1: $$+\\tfrac{2}{3} - \\tfrac{1}{3} - \\tfrac{1}{3} = 0$$. The fractional charges of one up and two downs sum perfectly to zero.\n- Step 2: \"Neutral\" does NOT mean \"no charge inside\" — the neutron is built from charged quarks that happen to cancel out.\n- Step 3: This is why neutrons can still interact electromagnetically in subtle ways (magnetic moment) even though net charge is zero — internal structure matters.", "source": "Opus 4.7 ①", "_id": "opus_1_2"}, {"question": "A paving slab is $$73\\,\\text{kg}$$ and measures $$40\\,\\text{mm} \\times 500\\,\\text{mm} \\times 850\\,\\text{mm}$$. Conceptually, what's the density in $$\\text{kg m}^{-3}$$ and what's the common trap? (3 steps)", "answer": "- Step 1: Convert *all* dimensions to metres first: $$0.040 \\times 0.500 \\times 0.850\\,\\text{m}$$. Volume $$\\approx 0.017\\,\\text{m}^3$$.\n- Step 2: $$\\rho = m/V = 73 / 0.017 \\approx 4300\\,\\text{kg m}^{-3}$$ — denser than rock but less than iron, plausible for concrete with aggregate.\n- Step 3: The trap: forgetting to convert mm → m. If you leave dimensions in mm, you get a volume off by $$10^9$$, and density off by $$10^9$$. Always convert to SI units *first*.", "source": "Opus 4.7 ②", "_id": "opus_2_23"}, {"question": "The kinetic theory equation is $$PV = \\frac{1}{3}Nm\\overline{c^2}$$. What does each symbol represent, and what is $$\\overline{c^2}$$? Why is it not simply \"average speed squared\"? (3 steps)", "answer": "- Step 1: $$P$$ = pressure, $$V$$ = volume, $$N$$ = number of molecules, $$m$$ = mass of one molecule, $$\\overline{c^2}$$ = mean square speed. The product $$Nm$$ gives the total mass of all molecules.\n- Step 2: $$\\overline{c^2}$$ is the **mean square speed** — you square each molecule's speed first, then take the average of those squares. This is NOT the same as squaring the average speed: $$\\overline{c^2} \\neq (\\bar{c})^2$$.\n- Step 3: The reason: molecules have a distribution of speeds (some fast, some slow). Squaring before averaging gives more weight to the faster molecules (since squaring amplifies large values). The **root-mean-square speed** is $$c_{\\text{rms}} = \\sqrt{\\overline{c^2}}$$, which is always greater than or equal to the mean speed $$\\bar{c}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_28"}, {"question": "Why does evaporation cool the remaining liquid, even below the boiling point? (3 steps)", "answer": "- Step 1: In a liquid, molecules have a *distribution* of KEs — some are faster than average.\n- Step 2: The fastest molecules near the surface can escape into the gas phase (evaporation), carrying away high KE.\n- Step 3: With the high-KE tail removed, the *average* KE of the remaining molecules decreases → temperature drops.\n\nThis is why sweat cools you — only the most energetic water molecules evaporate.", "source": "Opus 4.7 ①", "_id": "opus_1_44"}, {"question": "Why must you use Kelvin (never Celsius) in $$PV = nRT$$ or Charles's law $$V/T = \\text{const}$$? Use a concrete example. (3 steps)", "answer": "- Step 1: These laws encode *proportional* relationships between physical quantities — proportionality only works on absolute scales.\n- Step 2: Example: gas at 27 °C heated to 54 °C. In Celsius, $$T$$ doubled? In Kelvin: 300 K → 327 K, only a 9% increase. The volume only grows 9%, not 100%.\n- Step 3: Using Celsius would predict twice the volume change. Worse, at 0 °C, V/T would divide by zero — yet 0 °C is just a regular temperature.\n\nThe laws are about *absolute* KE/temperature, not about an arbitrary water-based scale.", "source": "Opus 4.7 ①", "_id": "opus_1_26"}, {"question": "Limiting case: at very high pressure (or very low temperature), real gases deviate from $$PV = nRT$$. Conceptually, why does each assumption fail? (3 steps)", "answer": "- Step 1: **High pressure**: molecules are squeezed close — their own volume is no longer negligible compared to container volume. Effective volume available is less than V.\n- Step 2: **Low temperature**: molecules move slowly enough that *attractive* intermolecular forces start to matter — they \"stick\" briefly during near-misses, reducing effective pressure.\n- Step 3: Real-gas equations (like van der Waals) add corrections for both — ideal gas is a model, not a universal truth.\n\nThe ideal model breaks down exactly where its assumptions fail.", "source": "Opus 4.7 ①", "_id": "opus_1_53"}, {"question": "State Archimedes' principle, and explain why an object floats. (3 steps)", "answer": "- Step 1: An object immersed in a fluid experiences an upward buoyant force (upthrust) equal to the *weight of the fluid displaced* by the object.\n- Step 2: As the object sinks deeper, it displaces more fluid → upthrust grows. Equilibrium is reached when upthrust equals the object's weight.\n- Step 3: If at full submersion the upthrust still exceeds the weight (object less dense than fluid), the object floats partially submerged — it sits so that the displaced fluid's weight exactly matches its weight. If even fully submerged the upthrust is less than weight (object denser than fluid), it sinks.\n\nKey: upthrust depends on *fluid displaced*, not on the object itself.", "source": "Opus 4.7 ②", "_id": "opus_2_25"}, {"question": "What happens to the internal energy of a real gas when it expands adiabatically (no heat exchange)? Does its temperature change? (2 steps)", "answer": "- Step 1: In a real gas, molecules have attractive forces between them. When the gas expands, molecules move further apart, increasing their **potential energy** (like pulling magnets apart stores energy). Since no heat is supplied (adiabatic), this extra PE comes from the **kinetic energy** of the molecules.\n- Step 2: As KE decreases, the **temperature drops**. This is why a released pressurised gas feels cold — adiabatic expansion converts KE to PE, cooling the gas. An ideal gas wouldn't cool in this way (no intermolecular forces → no PE change → KE stays the same).\n\nThis is the principle behind refrigeration and how aerosol cans feel cold when sprayed.", "source": "GLM 5.1 ③", "_id": "glm_3_67"}, {"question": "Even at very cold temperatures, particles in a solid never stop moving entirely — except at one specific temperature. What is that temperature, and what's the deep reason it acts as a floor? (3 steps)", "answer": "- Step 1: That temperature is **absolute zero**, equal to 0 K or about −273.15 °C.\n- Step 2: Temperature is a measure of the *average kinetic energy* of particles. To stop them entirely would mean removing all kinetic energy.\n- Step 3: You cannot remove energy that isn't there, so you can't go below 0 K — it's a floor, not a number that goes negative.\n+ At any temperature above 0 K, particles emit infrared radiation; at exactly 0 K, they wouldn't.\n+ In practice 0 K has never been reached — only approached.", "source": "Opus 4.7 ①", "_id": "opus_1_8"}, {"question": "Which has higher internal energy: 1 kg of water at 100 °C, or 1 kg of steam at 100 °C? Explain why. (3 steps)", "answer": "- Step 1: They are at the *same temperature*, so their molecules have the *same average kinetic energy*. But they differ in potential energy.\n- Step 2: In steam, the molecules are far apart — intermolecular bonds have been completely broken. This means the molecules have much higher potential energy than in liquid water, where molecules are still close together with significant intermolecular attraction.\n- Step 3: Therefore, **steam at 100 °C has higher internal energy** than water at 100 °C. The difference is exactly the latent heat of vaporisation — the energy that went into breaking bonds to convert liquid to gas without changing temperature.\n\nThis is why steam burns are far worse than boiling water burns — steam carries that extra internal energy which it releases when it condenses on your skin.", "source": "GLM 5.1 ③", "_id": "glm_3_14"}, {"question": "Why must \"upthrust = weight of fluid displaced\" — what's the intuition? (3 steps)", "answer": "- Step 1: Imagine replacing your submerged object with an equivalent volume of the *same fluid*. That fluid blob just sits there (or moves with the rest of the fluid) because the fluid is in equilibrium.\n- Step 2: For that blob of fluid to be in equilibrium, the surrounding fluid must push up on it with a force equal to its own weight. This upward push is the *buoyant force* the fluid exerts on whatever occupies that volume.\n- Step 3: When you replace the fluid blob with your object, the surrounding fluid doesn't know or care what's in there — it still pushes up with the same force, which equals the weight of fluid that *would have* filled that volume.\n\nHence upthrust = $$\\rho_{\\text{fluid}} V_{\\text{disp}} g$$, regardless of what the object is.", "source": "Opus 4.7 ②", "_id": "opus_2_58"}, {"question": "When water freezes, it *expands* rather than contracts. Why is this so unusual, and what would happen if water behaved \"normally\"? (3 steps)", "answer": "- Step 1: For most substances, solids are denser than liquids — molecules pack closer in the rigid lattice.\n- Step 2: Water's molecules form a hexagonal hydrogen-bonded lattice when frozen that leaves more empty space than the disordered liquid.\n- Step 3: If ice were denser than water, ice would sink — lakes would freeze from the bottom up, killing aquatic life. The \"anomaly\" makes Earth habitable.\n\nA small structural quirk has planet-scale consequences.", "source": "Opus 4.7 ①", "_id": "opus_1_42"}, {"question": "Two gases at the same temperature: hydrogen (light) and oxygen (heavy). Compare their average KE and RMS speeds. (3 steps)", "answer": "- Step 1: Same $$T$$ → same $$\\bar{E_k} = \\tfrac{3}{2}kT$$. So both have the same average kinetic energy per molecule.\n- Step 2: But $$\\tfrac{1}{2}m c_{\\text{rms}}^2 = \\tfrac{3}{2}kT \\implies c_{\\text{rms}} = \\sqrt{3kT/m}$$. So $$c_{\\text{rms}} \\propto 1/\\sqrt{m}$$.\n- Step 3: Hydrogen ($$m \\approx 2\\,\\text{u}$$) vs oxygen ($$m \\approx 32\\,\\text{u}$$): ratio of speeds is $$\\sqrt{32/2} = 4$$. Hydrogen molecules move about $$4\\times$$ faster than oxygen molecules at the same temperature. That's why hydrogen escapes Earth's atmosphere over geological time but oxygen doesn't.", "source": "Opus 4.7 ②", "_id": "opus_2_41"}, {"question": "A student says: \"Internal energy and temperature are the same thing.\" Explain why this is incorrect and provide an example that demonstrates the difference. (2 steps)", "answer": "- Step 1: Internal energy (U) is the **total** energy of all molecules: U = sum of (kinetic energies + potential energies) of ALL molecules in the substance. Temperature is only a measure of the **average kinetic energy** per molecule.\n- Step 2: The difference shows during phase changes:\n+ Ice at 0°C → Water at 0°C: Temperature stays the same (average KE unchanged)\n+ BUT internal energy increases significantly — energy goes into breaking intermolecular bonds (increasing potential energy of molecules)\n+ The temperature \"hides\" this energy change — hence \"latent\" heat\n\n**Memory trick:** Think of internal energy as your total bank balance, and temperature as your average daily spending rate. You can add to your balance (increase U) without changing your daily spending rate (temperature) — that's what happens during phase changes!", "source": "MiniMax ①", "_id": "minimax_1_18"}, {"question": "When you heat water from 0°C to 100°C, does its density change? If so, how? Explain using the behavior of water molecules. (2 steps)", "answer": "- Step 1: Yes, water's density changes with temperature, but NOT monotonically:\n+ From 0°C to 4°C: density INCREASES (unusual!)\n+ Above 4°C: density decreases normally\n+ Maximum density occurs at 4°C (≈1000 kg/m³)\n- Step 2: Explanation:\n+ Below 4°C, water molecules are forming transient hydrogen-bonded \"clumps\" that are less efficient at packing\n+ As you warm from 0°C, these clumps break up and molecules can pack more efficiently → density increases\n+ Above 4°C, normal thermal expansion dominates → molecules move further apart → density decreases\n+ This is why ice floats — water is most dense at 4°C, and ice (below 0°C) is less dense\n\nThis anomaly is crucial for aquatic life — lakes freeze from top down, not bottom up!", "source": "MiniMax ①", "_id": "minimax_1_24"}, {"question": "Synthesize: a 0.5 kg ice block at −10 °C is heated until it becomes water vapour at 110 °C. List the *stages* of energy required, in order. (5 steps)", "answer": "- Step 1: Heat ice from −10 to 0 °C: $$Q_1 = m c_{ice} \\Delta\\theta$$ — sensible heat to raise solid temp.\n- Step 2: Melt ice at 0 °C: $$Q_2 = m L_f$$ — latent heat of fusion, temperature unchanged.\n- Step 3: Heat water from 0 to 100 °C: $$Q_3 = m c_{water} \\Delta\\theta$$ — sensible heat for liquid.\n- Step 4: Boil water at 100 °C: $$Q_4 = m L_v$$ — latent heat of vaporisation, temperature unchanged.\n- Step 5: Heat steam from 100 to 110 °C: $$Q_5 = m c_{steam} \\Delta\\theta$$ — sensible heat for gas.\n\nTotal = $$Q_1 + Q_2 + Q_3 + Q_4 + Q_5$$. The two latent heat steps dominate energetically.", "source": "Opus 4.7 ①", "_id": "opus_1_50"}, {"question": "In kinetic theory, we use the root-mean-square speed ($$c_{rms}$$) rather than the simple average speed. Why is squaring, averaging, and then square-rooting necessary when calculating the \"average\" speed related to kinetic energy? (2 steps)", "answer": "- Step 1: The vector problem. Velocity is a vector. In a gas, molecules move in all directions randomly. If you simply averaged the velocities, the positive and negative vectors would cancel out to roughly zero.\n- Step 2: The energy connection. Kinetic energy depends on $$v^2$$, which is always positive. By squaring first (getting rid of direction/negatives), then averaging, then square-rooting, we get a speed magnitude that accurately reflects the average kinetic energy of the molecules.\n\n$$c_{rms}$$ avoids vector cancellation and relates directly to kinetic energy.", "source": "GLM 5.1 ②", "_id": "glm_2_19"}, {"question": "When you heat ice at 0 °C, the temperature doesn't rise even though you keep adding energy. Where does the energy go? Is this kinetic or potential energy? (3 steps)", "answer": "- Step 1: During a phase change (melting), the energy you supply goes into **breaking intermolecular bonds**, not into increasing the kinetic energy of the particles. This is why the temperature stays constant — temperature is a measure of average kinetic energy, and that isn't changing.\n- Step 2: Breaking bonds means increasing the **potential energy** of the molecules — you're pulling them apart against attractive forces, which stores energy in their separation (like stretching a spring stores elastic PE). So during melting: internal energy increases, but *only* the potential component.\n- Step 3: Once all the bonds are broken and the substance is fully liquid, further energy input goes into kinetic energy again, and the temperature rises. This pattern repeats at boiling: flat section (bond-breaking, PE increases) → sloped section (KE increases, temperature rises).\n\nCritical misconception: \"Energy always increases temperature\" — NO. During phase changes, energy increases internal energy without changing temperature. Internal energy ≠ temperature.", "source": "GLM 5.1 ③", "_id": "glm_3_10"}, {"question": "A heating curve shows a substance being heated from solid below its melting point to gas above its boiling point. Sketch and label the key features, explaining why each section appears as it does. (4 steps)", "answer": "- Step 1: **Solid heating** (sloped upward): Temperature increases as kinetic energy of vibrating particles increases\n- Step 2: **Melting plateau** (horizontal at melting point): Temperature constant - supplied energy breaks intermolecular bonds (potential energy increases), not kinetic energy\n- Step 3: **Liquid heating** (sloped upward): Temperature increases again as kinetic energy increases\n- Step 4: **Boiling plateau** (horizontal at boiling point): Temperature constant - energy goes to completely separating molecules (overcoming ALL intermolecular forces), not increasing kinetic energy\n- Step 5: **Gas heating** (sloped upward): Temperature increases as kinetic energy of freely moving molecules increases\n\nThe plateaus represent phase changes where internal energy changes but temperature doesn't", "source": "MiniMax ②", "_id": "minimax_2_26"}, {"question": "Why does a bubble rising in water eventually reach a constant (terminal) velocity, even though it's moving upward? Explain the forces involved. (3 steps)", "answer": "- Step 1: A rising bubble experiences three main forces:\n  - **Weight (W):** mg, acting downward (but bubble is very light)\n  - **Upthrust (U):** ρ_fluid × V × g, acting upward (due to displaced water)\n  - **Drag (F_d):** 6πηrv (Stokes' law), acting downward (opposing motion)\n- Step 2: Initially, net upward force (U - W) causes upward acceleration\n- Step 3: As velocity increases, drag increases (proportional to v). At terminal velocity: U = W + F_d (net force = 0), so it rises at constant velocity\n- The same principle applies as for a falling object, just with the density terms reversed (bubble density < fluid density, so net force is upward)", "source": "MiniMax ②", "_id": "minimax_2_38"}, {"question": "You have a 2 kg block of aluminum (c = 900 J/kg·K) and a 2 kg block of water (c = 4200 J/kg·K), both starting at 20°C. If you add 10,000 J of thermal energy to each, which one ends up hotter? By how much? Explain using the specific heat capacity concept. (2 steps)", "answer": "- Step 1: Use the formula ΔE = mcΔθ. Rearranging: Δθ = ΔE / (mc)\n+ For aluminum: Δθ = 10,000 / (2 × 900) = 10,000 / 1800 ≈ 5.6 K\n+ For water: Δθ = 10,000 / (2 × 4200) = 10,000 / 8400 ≈ 1.2 K\n- Step 2: The aluminum ends up much hotter (5.6°C rise vs 1.2°C for water). This is because water has a **high specific heat capacity** — it requires much more energy to change its temperature. This is why water is excellent for cooling systems and central heating: it absorbs lots of heat with only small temperature rises.\n\nThe lower the specific heat capacity, the hotter a material gets for the same energy input.", "source": "MiniMax ①", "_id": "minimax_1_0"}, {"question": "A student says \"particles in a solid are stationary.\" Why is this wrong, and what is the correct description of particle motion in a solid? What is the only temperature where they would truly stop? (3 steps)", "answer": "- Step 1: In a solid, particles **vibrate about fixed positions** — they are never truly stationary. They oscillate back and forth around their equilibrium positions in the lattice. The misconception comes from the fact that they don't *translate* (move from place to place), but they are always vibrating.\n- Step 2: As you cool a solid, the vibrations get smaller and smaller. The amplitude of vibration decreases as kinetic energy is removed.\n- Step 3: The only temperature where vibration ceases entirely is **absolute zero** ($$0\\ \\text{K} = -273.15\\ \\text{°C}$$). This is the theoretical minimum temperature where all molecular kinetic energy is at its minimum. It has never been reached in practice.\n\nCommon trap: \"Solids don't move\" — they don't *flow*, but they absolutely do vibrate. This vibration is what we detect as infrared radiation from any object above absolute zero.", "source": "GLM 5.1 ③", "_id": "glm_3_4"}, {"question": "Why is it that evaporating 1 kg of water requires roughly 7 times more energy than melting 1 kg of ice? Explain in terms of what happens to the molecules. (3 steps)", "answer": "- Step 1: **Melting** (fusion, ~334 kJ/kg): you only need to *loosen* the intermolecular bonds enough so molecules can slide past each other. The molecules remain close together — you're changing from an ordered close arrangement to a disordered close arrangement.\n- Step 2: **Boiling** (vaporisation, ~2260 kJ/kg): you need to *completely overcome* all intermolecular attractions and separate molecules until they are far apart with negligible forces between them. You're fighting the attractive forces through the entire separation distance.\n- Step 3: It's analogous to pulling magnets apart: slightly separating them (melting) is easy, but pulling them far apart where they no longer attract (boiling) requires much more total work because you're applying force over a much greater distance. The ratio ~7:1 reflects how much more total energy is needed for complete separation vs partial loosening.", "source": "GLM 5.1 ③", "_id": "glm_3_56"}, {"question": "Explain in three steps why heating a sealed gas increases its pressure — the tutor's three-word framework. (3 steps)", "answer": "- Step 1: **Faster** — heating increases the average kinetic energy of the particles, so they move faster ($$c_{\\text{rms}} \\propto \\sqrt{T}$$).\n- Step 2: **More frequently** — faster particles reach the walls more often per second, so the *number of collisions per unit area per unit time* increases.\n- Step 3: **More force** — each individual collision involves a larger momentum change ($$\\Delta p = 2mv$$), so each hit exerts more force on the wall.\n\nSince pressure = force/area, and both force-per-collision and collision-rate have increased, pressure goes up. This is the microscopic origin of the Pressure law.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "For the three common states of matter (solid, liquid, gas), describe the particle *arrangement* in each. What does \"regular\" vs \"irregular\" mean here, and why does it matter? (3 steps)", "answer": "- Step 1: **Solid** — particles are *close together* in a *regular* (ordered, repeating) pattern, like soldiers in formation. This regularity is what gives crystals their definite shapes.\n- Step 2: **Liquid** — particles are *close together* but in an *irregular* (random, disordered) arrangement. They are touching but can slide past each other, which is why liquids flow and take the shape of their container.\n- Step 3: **Gas** — particles are *far apart* with no arrangement at all. The spacing between particles is typically ~10× the particle diameter, so most of a gas is empty space.\n\nWhy it matters: The arrangement determines macroscopic properties — regular arrangement (solid) means fixed shape; irregular but close (liquid) means fixed volume but variable shape; far apart (gas) means neither fixed shape nor volume.", "source": "GLM 5.1 ③", "_id": "glm_3_3"}, {"question": "Why does an atom feel like it's \"mostly empty space,\" and what does this reveal about where mass lives?", "answer": "- Step 1: An atom has a tiny dense nucleus (protons + neutrons) surrounded by an electron cloud at a relatively huge distance.\n- Step 2: The nucleus is about $$10^{-15}$$ m wide while the atom is about $$10^{-10}$$ m wide — roughly 100,000× bigger than the nucleus.\n+ If the nucleus were a marble, the atom would be the size of a football stadium.\n- Step 3: Since electrons have negligible mass compared to protons/neutrons, almost all the mass sits in the nucleus, while the volume is dominated by the electron cloud — hence \"mostly empty space, mostly nuclear mass.\"\n\nThe atom's mass and volume live in completely different places: mass in the nucleus, volume in the electron cloud.", "source": "Opus 4.7 ①", "_id": "opus_1_0"}, {"question": "Conceptually explain how to use a graph of pressure vs. temperature (constant V) to *experimentally* determine absolute zero. (3 steps)", "answer": "- Step 1: Plot P (y-axis) vs. T in °C (x-axis) for a fixed gas sample. Take several points by heating gradually.\n- Step 2: The data lies on a straight line. Extrapolate that line backward to the x-intercept (where P = 0).\n- Step 3: The x-intercept corresponds to the temperature at which gas particles would have zero KE → zero pressure. Experiment gives roughly −273 °C — that's absolute zero, 0 K.\n\nYou don't need to actually cool to 0 K — you extrapolate to find it.", "source": "Opus 4.7 ①", "_id": "opus_1_48"}, {"question": "Why can't you say that -10°C is \"twice as cold\" as 10°C? Explain using the concept of absolute temperature. (2 steps)", "answer": "- Step 1: Temperature in Celsius doesn't represent actual thermal energy content - the Celsius scale has an arbitrary zero point\n- Step 2: Only the Kelvin scale represents true thermal energy. At 0 K, particles have zero kinetic energy; at higher temperatures, kinetic energy is proportional to T (in Kelvin)\n- Example: 10°C = 283 K, -10°C = 263 K. The ratio is 283/263 ≈ 1.08, not 2. So -10°C is not \"twice as cold\" as 10°C\n- To compare \"coldness,\" you must use absolute temperature - \"twice as cold\" would mean half the Kelvin temperature", "source": "MiniMax ②", "_id": "minimax_2_22"}, {"question": "What physically happens to molecules at absolute zero, and why is it the lowest possible temperature?", "answer": "Absolute zero ($$0\\,\\text{K} = -273.15\\,°C$$) is defined as the temperature at which molecules have the minimum possible kinetic energy — essentially, they stop moving (classically speaking). Since temperature is a measure of average molecular kinetic energy, and kinetic energy cannot be negative, you cannot remove any more energy once you reach this floor. That's why Kelvin temperatures are never negative: there's literally no colder state to be in.", "source": "Opus 4.7 ②", "_id": "opus_2_1"}, {"question": "State the Pressure law (Gay-Lussac's law). If you heat a gas in a sealed, rigid container from 200 K to 800 K, what happens to the pressure? (3 steps)", "answer": "- Step 1: **Pressure law**: at constant volume, $$P \\propto T$$, or $$\\frac{P_1}{T_1} = \\frac{P_2}{T_2}$$. Pressure is directly proportional to absolute temperature.\n- Step 2: Quadrupling the temperature (200 K → 800 K) **quadruples the pressure**. The molecules move faster (more KE), so each wall collision exerts more force, and collisions happen more frequently. Since the volume is fixed, there's no way to reduce collision frequency — all the extra energy shows up as increased pressure.\n- Step 3: This is why aerosol cans carry warnings not to incinerate — heating the gas in a fixed-volume container dramatically increases pressure and can cause the container to explode.", "source": "GLM 5.1 ③", "_id": "glm_3_25"}, {"question": "Why does terminal velocity scale with $$r^2$$ rather than $$r$$, and what does this mean practically? (3 steps)", "answer": "- Step 1: Weight scales with volume $$\\propto r^3$$ — the \"driver\" of falling.\n- Step 2: Drag scales with $$r \\times v$$ — only one power of $$r$$.\n- Step 3: To balance, $$v$$ must absorb the extra power of $$r$$ from weight, so $$v_{term} \\propto r^3/r = r^2$$.\n+ Practically: a sphere twice as large falls four times faster at terminal velocity.\n+ This is why fine dust hangs in air almost forever, while pebbles fall quickly.", "source": "Opus 4.7 ①", "_id": "opus_1_38"}, {"question": "Why does a ship made of dense steel float, while a solid steel cube of the same mass would sink? (3 steps)", "answer": "- Step 1: Floating depends on average density of the *whole object including any air inside*, not the density of the material.\n- Step 2: A ship's hull is hollow — it encloses a huge volume of air, dramatically lowering the average density below that of water.\n- Step 3: A solid steel cube has no enclosed air; its average density equals steel's (~7800 kg/m³), far above water (1000), so it sinks.\n\nIt's the *displaced volume relative to weight* that matters, not the material alone.", "source": "Opus 4.7 ①", "_id": "opus_1_33"}, {"question": "A common confusion: \"Internal energy and temperature are the same thing.\" Why is this wrong? Give a concrete example. (3 steps)", "answer": "- Step 1: Temperature depends only on the *kinetic* component of internal energy (average KE per molecule). Internal energy also includes *potential* energy from intermolecular bonds.\n- Step 2: Example: $$1\\,\\text{kg}$$ of ice at $$0\\,°C$$ vs $$1\\,\\text{kg}$$ of water at $$0\\,°C$$ — same temperature, but water has higher internal energy (you put $$334\\,\\text{kJ}$$ in to melt it, raising potential energy).\n- Step 3: Another example: $$1\\,\\text{kg}$$ water at $$50\\,°C$$ vs $$2\\,\\text{kg}$$ water at $$50\\,°C$$ — same temperature, but the second has twice the internal energy because there's twice as many molecules each carrying the same average KE.\n\nTemperature is *intensive* (doesn't depend on amount); internal energy is *extensive* (does).", "source": "Opus 4.7 ②", "_id": "opus_2_57"}, {"question": "An object weighs 80 N in air. When fully submerged in water, it experiences 60 N of upthrust. What is the net force and direction? Will it float or sink? (2 steps)", "answer": "- Step 1: Net force = weight − upthrust = 80 − 60 = **20 N downward**. The object sinks because the upthrust (even when fully submerged) is less than its weight.\n- Step 2: If the object were less dense than water, fully submerging it would produce upthrust > 80 N, and it would rise to the surface, floating with only enough volume submerged to make upthrust = 80 N. Since full submersion only gives 60 N, it can never achieve equilibrium — it sinks to the bottom.", "source": "GLM 5.1 ③", "_id": "glm_3_54"}, {"question": "A sealed container of ideal gas is at 20 °C and 100 kPa. If the temperature is increased to 40 °C (not Kelvin!), will the pressure exactly double? Explain. (2 steps)", "answer": "- Step 1: **No**, the pressure will not double. The Pressure law says $$P \\propto T$$ where $$T$$ is in **Kelvin**, not Celsius. The temperature increases from 293 K to 313 K — a factor of 313/293 ≈ 1.07, not 2.0.\n- Step 2: The new pressure would be approximately 107 kPa, not 200 kPa. This is a classic exam trap: using Celsius in gas law calculations. Always convert to Kelvin first.", "source": "GLM 5.1 ③", "_id": "glm_3_58"}, {"question": "Define specific latent heat. Why is the latent heat of vaporisation for water (~2260 kJ/kg) about 7 times larger than the latent heat of fusion (~334 kJ/kg)? (3 steps)", "answer": "- Step 1: **Specific latent heat (L)** is the energy required to change the state of 1 kg of a substance *without any change in temperature*. The equation is $$\\Delta E = mL$$. Units: $$\\text{J kg}^{-1}$$.\n- Step 2: **Latent heat of fusion** (melting/freezing): energy to weaken intermolecular bonds enough so molecules can *slide past each other* while remaining close together. The molecules stay in contact — you're just rearranging the bond structure.\n- Step 3: **Latent heat of vaporisation** (boiling/condensing): energy to *completely separate* molecules so there are no significant intermolecular forces between them. You're breaking all bonds entirely, moving molecules from close together to far apart. This requires much more energy — hence the factor of ~7 for water.\n\nMemory aid: \"Fusion\" = fusing together (solid↔liquid). \"Vaporisation\" = making vapour (liquid↔gas).", "source": "GLM 5.1 ③", "_id": "glm_3_20"}, {"question": "Sketch the heating curve of water from −20 °C to +120 °C. Label each segment and explain what's physically happening. (5 steps)", "answer": "- Step 1: Sloped segment from −20 to 0 °C: solid ice heating; KE rising, particles vibrating faster.\n- Step 2: Flat segment at 0 °C: melting; PE rising as lattice bonds break; KE constant.\n- Step 3: Sloped segment from 0 to 100 °C: liquid heating; KE rising again, molecules move faster.\n- Step 4: Flat segment at 100 °C: boiling; PE rising as molecules fully separate into gas; KE constant.\n- Step 5: Sloped segment above 100 °C: gas heating; KE rising, gas molecules zip faster and pressure (if confined) rises.\n\nThe slopes are \"KE work\" (temperature changes); the flats are \"PE work\" (bonds break, state changes).", "source": "Opus 4.7 ①", "_id": "opus_1_14"}, {"question": "What are the four key assumptions behind an \"ideal gas,\" and what do they each rule out about real gases? (4 steps)", "answer": "- Step 1: **Molecular volume is negligible** compared to container volume. Rules out short-range repulsion at high density.\n- Step 2: **No intermolecular forces** except during collisions. Rules out attractive forces that cause real gases to liquefy.\n- Step 3: **Collisions are perfectly elastic** — kinetic energy is conserved. Rules out energy losses to internal vibrations/rotations.\n- Step 4: **Random motion** — particles move in all directions equally; large number, so statistics smooth out.\n\nReal gases deviate most when these assumptions fail: high pressure (molecules squeezed close) or low temperature (forces matter more).", "source": "Opus 4.7 ①", "_id": "opus_1_22"}, {"question": "Derive the kinetic theory equation $$PV = \\tfrac{1}{3}Nm\\overline{c^2}$$ conceptually — what's the physical picture? (4 steps)", "answer": "- Step 1: Consider molecules bouncing elastically off the walls of a box. Each collision changes a molecule's momentum by $$2mv_x$$ (it reverses direction along one axis).\n- Step 2: The *force* on the wall is the rate of momentum change. Summing over all molecules hitting per second gives total force; dividing by area gives pressure.\n- Step 3: Because motion is isotropic (random in 3D), the average kinetic energy along each axis is one-third of the total: $$\\overline{v_x^2} = \\tfrac{1}{3}\\overline{c^2}$$.\n- Step 4: Carrying out the counting gives $$PV = \\tfrac{1}{3}Nm\\overline{c^2}$$, where $$N$$ is total molecules, $$m$$ is mass per molecule, $$\\overline{c^2}$$ is mean-square speed.\n\nSo macroscopic $$PV$$ is directly built from microscopic momentum transfers.", "source": "Opus 4.7 ②", "_id": "opus_2_42"}, {"question": "Why is the latent heat of vaporisation typically much larger than the latent heat of fusion for the same substance? (3 steps)", "answer": "- Step 1: When a solid melts, particles only need enough energy to *loosen* the lattice so they can slide past each other — they remain close together, so intermolecular attractions still largely hold them in a liquid.\n- Step 2: When a liquid boils, particles must be given enough energy to *completely escape* their neighbours and fly off as a gas — essentially all intermolecular attractions must be overcome.\n- Step 3: Breaking *all* the bonds takes much more energy than merely loosening them. For water: $$L_f \\approx 334\\,\\text{kJ/kg}$$ vs $$L_v \\approx 2260\\,\\text{kJ/kg}$$ — about 7× larger.\n\nThis is why a steam burn is far worse than a hot-water burn at the same temperature: the condensing steam releases all that vaporisation energy onto your skin.", "source": "Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "What happens to liquid viscosity as temperature increases, and what's the opposite behaviour in gases? Why? (3 steps)", "answer": "- Step 1: **Liquids**: viscosity *decreases* with temperature. Heated molecules have more KE and overcome intermolecular bonds more easily → flow more freely.\n- Step 2: **Gases**: viscosity *increases* with temperature. Faster gas molecules collide more often, transferring more momentum sideways → more resistance to shear.\n- Step 3: The mechanisms are different because viscosity in liquids comes from *bonds*, while in gases it comes from *momentum transfer in collisions*.\n\nHoney thins when warm; hot air \"drags\" more than cool air.", "source": "Opus 4.7 ①", "_id": "opus_1_39"}, {"question": "Explain the conceptual structure of internal energy U. Why does it have *two* components rather than just \"energy\"?", "answer": "- Step 1: Particles have **kinetic energy** (from their motion: translation, vibration, rotation) — this sets the *temperature*.\n- Step 2: Particles also have **potential energy** stored in the *separation/configuration* of intermolecular bonds — like stretched/compressed springs between molecules.\n- Step 3: Internal energy U = sum of both, because to fully describe the energy of a substance you must account for both how *fast* particles move AND how they're *positioned* relative to each other.\n+ Phase changes only affect the PE part (bonds), not the KE part (temperature stays constant).\n+ Heating an isolated gas (no bonds to worry about) only affects the KE part.", "source": "Opus 4.7 ①", "_id": "opus_1_11"}, {"question": "Why must you use Kelvin (not Celsius) in $$PV = nRT$$ and the gas laws? (3 steps)", "answer": "- Step 1: The gas laws are *proportionalities* with absolute temperature: $$V \\propto T$$, $$P \\propto T$$. These proportionalities are only true if $$T = 0$$ corresponds to a real physical zero (zero molecular KE, zero pressure, \"zero volume\" extrapolated).\n- Step 2: Celsius's zero point is the freezing point of water — arbitrary, not zero KE. So at $$T = 0\\,°C$$, $$P$$ is not zero; the proportionality fails badly.\n- Step 3: Kelvin's zero *is* the physically meaningful zero — extrapolating $$P$$-$$T$$ data hits zero pressure at $$0\\,\\text{K} = -273.15\\,°C$$. So all the gas laws work cleanly only in Kelvin. Use $$T(\\text{K}) = \\theta(°C) + 273$$.", "source": "Opus 4.7 ②", "_id": "opus_2_38"}, {"question": "A hot air balloon rises. As it gains altitude, the temperature inside stays the same, but the balloon expands slightly. What happens to: (a) the density of the air inside, (b) the buoyant force? Explain. (2 steps)", "answer": "- Step 1: (a) The density of air inside decreases. Here's why:\n+ Temperature same → average KE of molecules same\n+ But balloon volume increases slightly (expands as external pressure drops)\n+ Same mass of air now occupies more volume → ρ = m/V decreases\n- Step 2: (b) The buoyant force (upthrust) depends on weight of displaced air: U = ρ_external × V_displaced × g\n+ As balloon rises, external air density ρ_external decreases (at higher altitude, air is thinner)\n+ But balloon also expands, increasing its displaced volume\n+ Typically, the decrease in external air density dominates, so upthrust decreases\n+ Eventually, upthrust = weight, and the balloon stops rising (reaches equilibrium altitude)", "source": "MiniMax ①", "_id": "minimax_1_12"}, {"question": "Why do ships float higher in seawater (ρ ≈ 1030 kg/m³) than in freshwater (ρ ≈ 1000 kg/m³)? (2 steps)", "answer": "- Step 1: For the same ship (same weight), the upthrust must equal the weight whether in fresh or salt water. Upthrust = $$\\rho_{\\text{fluid}} \\times V_{\\text{displaced}} \\times g$$. If $$\\rho_{\\text{fluid}}$$ is larger (seawater), then $$V_{\\text{displaced}}$$ must be smaller to produce the same upthrust.\n- Step 2: Less volume displaced means less of the ship is below the waterline — the ship **floats higher** in seawater. Denser fluids are more buoyant per unit volume displaced.", "source": "GLM 5.1 ③", "_id": "glm_3_36"}, {"question": "Which has a higher internal energy: 1 kg of ice at 0 °C or 1 kg of water at 0 °C? By how much? (3 steps)", "answer": "- Step 1: Both are at the same temperature (0 °C), so their molecules have the same average kinetic energy. But they differ in potential energy.\n- Step 2: In water at 0 °C, the intermolecular bonds have been partially broken compared to ice at 0 °C. The molecules are further apart (for water, slightly — water is anomalous) and can move past each other. This means the potential energy is higher in the liquid.\n- Step 3: The difference in internal energy is exactly the **latent heat of fusion**: $$\\Delta U = mL_f = 1 \\times 334\\,000 = 334\\,000\\ \\text{J} = 334\\ \\text{kJ}$$. Water at 0 °C has 334 kJ more internal energy than ice at 0 °C, all stored as potential energy.", "source": "GLM 5.1 ③", "_id": "glm_3_45"}, {"question": "Why is matching the de Broglie wavelength of a probe particle to the size of the target essential for resolving structure?", "answer": "- Step 1: Wave-particle duality: $$\\lambda = h/p$$ — every particle has an associated wavelength.\n- Step 2: To \"see\" a feature of size $$d$$, your probe's wavelength must be $$\\lesssim d$$ (otherwise diffraction blurs the image).\n- Step 3: To resolve a nucleon (~$$10^{-15}$$ m), you need electrons with $$\\lambda \\sim 10^{-15}$$ m → very high momentum → very high energy.\n\nHigher energy = smaller wavelength = finer detail.", "source": "Opus 4.7 ①", "_id": "opus_1_58"}, {"question": "Why does vaporising 1 kg of water require roughly seven times more energy than melting 1 kg of ice? (3 steps)", "answer": "- Step 1: Melting only loosens the lattice — molecules still attract each other strongly in the liquid; you've only increased separation slightly.\n- Step 2: Vaporising must completely separate molecules so that intermolecular forces become negligible — you're working against attraction over a much larger range.\n- Step 3: More bonds to fully break = much more PE needed → much larger latent heat of vaporisation (~2.26 MJ/kg) compared to fusion (~334 kJ/kg).\n\nThe ratio reflects how much more energy is needed to *separate* molecules vs. merely *loosen* them.", "source": "Opus 4.7 ①", "_id": "opus_1_13"}, {"question": "The specific heat capacity of copper is about 390 J/kg·K, while water is 4200 J/kg·K. Explain why copper heats up and cools down much faster than water, using molecular-level reasoning. (2 steps)", "answer": "- Step 1: Specific heat capacity is the energy needed to raise 1 kg by 1 K. Copper needs ~390 J; water needs ~4200 J — over 10× more for the same mass.\n- Step 2: At the molecular level:\n+ In copper (solid metal), heat energy is stored mainly in vibrations of the crystal lattice\n+ Each atom has relatively few degrees of freedom to store energy\n+ In water (liquid), energy goes into many molecular modes: translation, rotation, vibration, AND the complex hydrogen-bond network\n+ Water molecules can store energy in more \"ways\" — so each molecule needs less energy input to increase its average KE\n+ This is why water is a great \"thermal reservoir\" — it's hard to heat up, but also releases lots of energy when cooling", "source": "MiniMax ①", "_id": "minimax_1_26"}, {"question": "On a heating curve graph (temperature vs energy added for water), there are two flat sections. What is happening physically at each one, and why are they at different temperatures? (3 steps)", "answer": "- Step 1: The **first flat section** at 0 °C: this is **melting**. Energy is being used to break the bonds holding water molecules in the solid lattice. All solid is converting to liquid. Temperature stays at 0 °C throughout.\n- Step 2: The **second flat section** at 100 °C: this is **boiling**. Energy is being used to completely separate molecules so they become a gas with negligible intermolecular forces. All liquid is converting to gas. Temperature stays at 100 °C throughout.\n- Step 3: They're at different temperatures because different amounts of energy are needed to break different types of bonds. Melting only needs to weaken bonds enough for molecules to slide past each other. Boiling needs to completely overcome all intermolecular attractions — which requires far more energy per molecule (latent heat of vaporisation ≈ 7× latent heat of fusion for water).", "source": "GLM 5.1 ③", "_id": "glm_3_11"}, {"question": "A cube floats with $$70\\%$$ of its volume submerged in water. What does this tell you about the cube's density? (3 steps)", "answer": "- Step 1: At floating equilibrium, upthrust = weight of cube: $$\\rho_{\\text{water}} V_{\\text{sub}} g = \\rho_{\\text{cube}} V_{\\text{cube}} g$$.\n- Step 2: Cancel $$g$$ and rearrange: $$\\rho_{\\text{cube}} / \\rho_{\\text{water}} = V_{\\text{sub}} / V_{\\text{cube}} = 0.70$$.\n- Step 3: So $$\\rho_{\\text{cube}} \\approx 0.70 \\times 1000 = 700\\,\\text{kg m}^{-3}$$.\n\nGeneral rule: the *fraction submerged* equals the *ratio of object density to fluid density*. An iceberg ($$\\rho \\approx 917$$) in seawater ($$\\rho \\approx 1020$$) shows roughly $$917/1020 \\approx 90\\%$$ submerged — only $$10\\%$$ above water.", "source": "Opus 4.7 ②", "_id": "opus_2_27"}, {"question": "On a heating curve (temperature vs energy supplied), why does the temperature stay constant during a phase change while energy continues to be added? (3 steps)", "answer": "- Step 1: Temperature reflects *average kinetic energy* of particles. To raise temperature, you must speed particles up.\n- Step 2: During a phase change, the energy being supplied is used to *break (or form) intermolecular bonds* — i.e., it goes into the *potential* energy of the particles (increasing their separation/configuration energy), not their kine
