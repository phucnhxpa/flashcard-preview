 "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": true}, {"question": "A student writes \"Je suisallant au café.\" What is wrong with this sentence? How should it be written correctly, and what is the rule for the verb \"aller\"? (1 correction)", "answer": "- **Incorrect:** *Je suisallant au café.* (two words wrongly joined)\n\n- **Correct:** **Je vais au café.** (I am going to the café)\n\n+ **The rule for \"aller\" (to go):**\n  - The present tense of \"aller\" is irregular: je vais, tu vas, il/elle va, nous allons, vous allez, ils/elles vont\n  - It does NOT use the \"-ing\" form (aller + -ant is not used for present continuous!)\n\n+ **How to express \"going to\" in French:**\n  - Use the present tense + destination: *Je vais au café* (I go/am going to the café)\n  - NOT: *Je suis allant* (this doesn't exist in normal French!)\n\n+ **Common mistake:** Beginners often try to use \"aller\" like English \"to be going\" — but French just uses the simple present: *Je vais* = I go / I'm going.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": true}, {"question": "In the café dialogue, the server says \"Et voici le petit-déjeuner : le croissant, la tartine, le café crème et l'orange pressée.\" Explain why each definite article changes: le, la, le, l', la. (5 articles)", "answer": "- **Each noun has its gender, so the article matches:**\n\n- **le croissant** — masculine singular (starts with consonant) → le\n- **la tartine** — feminine singular (tartine = bread with butter) → la\n- **le café crème** — masculine singular → le\n- **l'orange pressée** — feminine singular, but starts with vowel → l' (elision)\n- **l'orange pressée** (the second \"l'\" from \"et l'orange\") — same as above → l'\n\n+ **Pattern:**\n  - le + consonant = le\n  - la + consonant = la\n  - le/la + vowel = l'\n\n+ **Wait — I counted wrong:** Let me re-analyze: \"le croissant, la tartine, le café crème et l'orange pressée\" = le + le + la + l' — and this matches the genders:\n  - croissant (masc) → le\n  - tartine (fem) → la\n  - café (masc) → le\n  - orange (fem) + vowel → l'", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "A customer asks \"Qu'est-ce que vous avez comme desserts?\" and the waiter responds with a list. What does \"comme\" mean here, and what is another meaning of \"comme\"? (1 word)", "answer": "- **\"Comme\"** in this context means **\"as / like / for\"** in the sense of \"what do you have for desserts?\"\n  - *Qu'est-ce que vous avez comme desserts?* = What do you have (for/as) desserts?\n\n- **Another meaning of \"comme\":** \"like / as if\" (comparison)\n  - *Il fait beau comme au printemps.* (It's nice like in spring)\n  - *Elle mange comme un oiseau.* (She eats like a bird)\n\n+ **In café context:**\n  - *Vous avez quelque chose comme...?* = Do you have something like...?\n  - * comme plat du jour* = as a dish of the day\n\n+ This is different from \"comment\" (how), which sounds similar but means something else entirely!", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "In the dialogue, the customer says \"Je voudrais aussi un verre d'eau, s'il vous plaît.\" Why is it \"un verre d'eau\" and not \"un verre de l'eau\"? Explain the grammar rule. (1 rule)", "answer": "- **Correct:** *un verre d'eau* (a glass of water)\n\n- **Why not \"de l'eau\"?** Because \"de + le\" contracts to **du** only when \"le\" is a specific, known thing. Here, we're talking about water in general (any water), not a specific glass of water.\n\n+ **The rule:**\n  - **de + le** = **du** (only before a *specific* masculine noun)\n  - **de + l'** = **de l'** (before any vowel)\n  - **de + la** = **de la** (before a specific feminine noun)\n  - **de + plural** = **de** (or **des** if there's an adjective)\n\n+ **With quantities (un verre de):** We use plain **de/d'** because we're describing \"a glass of\" some substance in general:\n  - *un verre d'eau* (water in general)\n  - *un verre de vin* (wine in general)\n  - *une bouteille d'aligoté* (aligoté in general)", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": true}, {"question": "What do these food-related French words mean in English, and which ones are masculine vs. feminine? le croque-monsieur · le sandwich · la salade · le poisson · le dessert (5 items)", "answer": "- **le croque-monsieur** — a grilled ham and cheese sandwich (literally \"Mister crunch\") → **masculine**\n- **le sandwich** — sandwich → **masculine** (borrowed from English, but follows French pattern: -ch often masculine)\n- **la salade** — salad → **feminine** (most -e ending nouns are feminine)\n- **le poisson** — fish → **masculine** (most -on ending nouns are masculine)\n- **le dessert** — dessert → **masculine** (most -rt ending nouns are masculine)\n\n+ **Gender pattern recognition:**\n  - **Masculine clues:** le, un → masculine; -on, -ch, -rt endings often masculine\n  - **Feminine clues:** la, une → feminine; -e, -ion, -ade endings often feminine\n\n+ **Important:** You cannot always predict gender from endings — these are just tendencies! Always learn the article with the noun.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "A beginner confuses \"je mange\" (I eat) with \"je mangeons\" (we eat). What is the correct subject-verb pairing for each, and what is the pattern? (2 verb forms)", "answer": "- **je mange** — \"I eat\" (first person singular)\n- **nous mangeons** — \"we eat\" (first person plural)\n\n+ **The pattern:**\n  - **Singular:** je (I), tu (you), il/elle (he/she) → mange\n  - **Plural:** nous (we), vous (you all), ils/elles (they) → mangeons\n\n+ **Why the difference?** In French, verbs change their endings based on the subject. For \"-er\" verbs (the most common type):\n  - je -e\n  - tu -es\n  - il/elle -e\n  - nous -ons ← **different!**\n  - vous -ez\n  - ils/elles -ent\n\n+ **Common mistake:** Don't add \"-ons\" to \"je\"! The \"-ons\" ending is ONLY for \"nous.\"", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": true}, {"question": "In the café context, what does \"server\" mean in French, and how does the gender change? Give both the masculine and feminine forms. (1 role)", "answer": "- **Le serveur** — masculine \"waiter\"\n- **La serveuse** — feminine \"waitress\"\n\n+ **The pattern:** Many professions add **-eur** (masculine) → **-euse** (feminine):\n  - un serveur / une serveuse\n  - un acteur / une actress (actually: acteur/actrice)\n  - un auteur / une autrice (or auteur for both)\n\n+ **In the dialogues:**\n  - *\"(Dix minutes après.) Le serveur : Et voici le petit-déjeuner...\"*\n  - *La serveuse : Messieurs-dames ?*\n\n+ **Cultural note:** In modern French, there's increasing use of the neutral/masculine form for mixed groups, but specifying the feminine form (serveuse) is still common.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "How do you ask for the bill in a French café? Give at least 3 different ways, from most polite to least formal. (3 phrases)", "answer": "- **Most polite:** *\"L'addition, s'il vous plaît.\"* (The check, please.)\n- **Polite:** *\"La carte, s'il vous plaît.\"* (The menu/card, please — often used to ask for the bill too!)\n- **Casual:** *\"C'est combien?\"* (How much is it?)\n- **Very casual:** *\"On paie?\"* (Do we pay? / Shall we pay?)\n\n+ **Common phrase:** *\"Faire l'addition\"* = to make the bill (what the server does)\n\n+ **What NOT to say:** Don't say \"La note, s'il vous plaît\" — this sounds very abrupt in French! \"Note\" is more like \"the note/memo.\"\n\n+ **In the dialogue:** No one asks for the bill explicitly, but in real cafés, \"L'addition, s'il vous plaît!\" is the standard polite request.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": true}, {"question": "A student writes \"J'ai trois euros\" but means \"I have three euros.\" Is this correct? If so, why doesn't the noun \"euro\" change form? (1 question)", "answer": "- **Correct:** *J'ai trois euros.* (I have three euros.)\n\n- **Why doesn't \"euro\" change?** In French, the noun stays in **singular form** after numbers (except for irregular plurals like \"les yeux\" from \"l'œil\"):\n\n  - *un euro* → *trois euros* (but \"euro\" doesn't become \"euros\" in writing in this context — it just stays singular in meaning)\n  - *un sandwich* → *trois sandwichs* (or *trois sandwiches*)\n  - *un café* → *trois cafés* (this one DOES add -s because it's a regular French word!)\n\n+ **The nuance:** With French-origin nouns, add -s: *trois cafés*. With borrowings (from English), either works: *trois sandwichs* or *trois sandwiches*.\n\n+ **Key point:** Numbers in French don't trigger adjective agreement — only the article (or lack of) matters!", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "In the phrase \"Je voudrais une formule à 12 euros,\" what does \"à\" mean, and why isn't it \"de 12 euros\"? Explain the grammatical construction. (1 preposition)", "answer": "- **\"À 12 euros\"** = \"at 12 euros\" (the price)\n\n- **Why \"à\" not \"de\"?**\n  - **\"À\"** indicates a **price/rate** — \"at\" a price\n  - **\"De\"** indicates a **quantity of** something\n\n+ **Compare:**\n  - *une formule à 12 euros* = a set menu **at** 12 euros (the price)\n  - *un verre de vin* = a glass **of** wine (the quantity/substance)\n\n+ **Same pattern:**\n  - *un café à 3 euros* (coffee at 3 euros — the price)\n  - *une table pour 4 personnes* (a table for 4 people)\n  - *une salle à manger* (a dining room — \"room for eating\")\n\n+ **From the menu:** \"Formule à 12 euros\" = set menu at 12 euros", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": true}, {"question": "Explain the difference between \"le petit-déjeuner,\" \"le déjeuner,\" and \"le dîner.\" At what times are they typically eaten in France? (3 meals)", "answer": "- **Le petit-déjeuner** — Breakfast (usually around 7am-8am, often just coffee + croissant)\n- **Le déjeuner** — Lunch (usually around 12pm-1pm, the main midday meal)\n- **Le dîner** — Dinner (usually around 7pm-8pm in France, later than in many countries!)\n\n+ **French meal culture:**\n  - French people typically eat three meals a day\n  - Breakfast is light: coffee + bread/croissant\n  - Lunch is the big meal of the day\n  - Dinner is usually lighter, around 7-8pm (not 5-6pm like some countries!)\n\n+ **From the chapter:** *\"Il y a trois repas par jour : un petit-déjeuner (à 7 h), un déjeuner (à 12 h), un dîner (à 20 h).\"*\n\n+ **Cultural note:** \"Dîner\" can also mean \"to dine out\" — *On dine où?* (Where do we eat?)", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "A customer says \"Je take un café.\" What is wrong, and what is the correct way to say \"I am taking/having a coffee\"? (1 correction)", "answer": "- **Incorrect:** *Je take un café.* (English word inserted!)\n\n- **Correct:** *Je prends un café.* (I am taking/having a coffee)\n\n+ **The verb \"prendre\" (to take/have):**\n  - je prends, tu prends, il/elle prend, nous prenons, vous prenez, ils/elles prennent\n  - This is a common verb used when ordering/having food/drinks\n\n+ **Why \"prendre\" not \"take\"?** In French, you \"take\" a coffee, a menu, a seat — it's a different verb use than English:\n  - *Je prends un café* = I'm having/taking a coffee\n  - *Je prends la carte* = I'll take the menu\n  - *Je prends le menu* = I'll take the set menu\n\n+ **From the dialogue:** The customer uses \"je voudrais\" (I would like), not \"je take\" — which is correct!", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": true}, {"question": "What is the difference between \"vous\" and \"tu\" in French, and when would you use each when speaking to a French waiter? (2 pronouns)", "answer": "- **\"Vous\"** — Formal/polite \"you\" (plural form used for one person when being formal)\n- **\"Tu\"** — Informal \"you\" (used with friends, family, children)\n\n+ **In a café/restaurant:**\n  - Always use **vous** with strangers, waiters, shopkeepers — it's polite!\n  - Use **tu** only with friends your own age or younger\n\n+ **Why it matters:** In the dialogues, customers always say: *\"Je voudrais..., s'il vous plaît\"* — using **vous** to be polite to the server.\n\n+ **When to switch to \"tu\":** If you become friends with your regular waiter, or if they're very young and casual, you might switch. But as a tourist/client, always use **vous**!\n\n+ **The phrase:** *s'il vous plaît* (please) = formal; *s'il te plaît* = informal", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "In the dialogue \"Une cliente difficile,\" the customer says \"Juste des légumes cuits?\" with rising intonation. What does the question mark and intonation indicate, and what is being implied? (1 implication)", "answer": "- **\"Juste des légumes cuits?\"** — With the rising intonation (implied by the question mark), this is a **confirming question** — \"Just... cooked vegetables?\" — expressing surprise or seeking confirmation.\n\n+ **What she's really saying:**\n  - She's **confirming** that's what she wants (yes, just cooked vegetables, nothing else!)\n  - The rising intonation in French, like English, often signals a question or seeking confirmation\n\n+ **From the dialogue:**\n  - *Le serveur : Juste des légumes cuits ? (surprised)*\n  - *Virginie : Une assiette de riz, avec des haricots verts ?*\n  - *Le serveur : Oui, très bien !*\n\n+ **Tone matters:** In French, \"Juste des légumes?\" said with rising intonation = \"Just vegetables? Are you sure?\" — but said flat, it could be a statement.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "What do these French drinking terms mean: \"un jus de pomme\" · \"un jus d'orange\" · \"un citron pressé\"? Explain the preposition \"de/d'\" in each. (3 drinks)", "answer": "- **Un jus de pomme** — Apple juice (juice **of** apple)\n- **Un jus d'orange** — Orange juice (juice **of** orange)\n- **Un citron pressé** — Freshly squeezed lemon (literally: pressed lemon)\n\n+ **The preposition \"de/d'\":**\n  - \"de\" indicates the **source/origin** — what the juice is made from\n  - *jus de pomme* = juice from apples\n  - *jus d'orange* = juice from oranges\n\n+ **\"Pressé\" (pressed/squeezed):**\n  - Used for freshly squeezed citrus juices\n  - *orange pressée* = freshly squeezed orange (not from a carton!)\n  - *citron pressé* = freshly squeezed lemon\n\n+ **In the dialogue:** *\"Et une orange pressée ou un citron pressé?\"* — the customer chooses fresh-squeezed juice over packaged!", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "A French person says \"Je prendrais bien un café.\" What does the \"-rais\" ending indicate, and how does this differ from \"Je prends un café\"? (2 tenses)", "answer": "- **\"Je prendrais bien un café.\"** — \"I would really like a coffee\" (conditional tense)\n- **\"Je prends un café.\"** — \"I am having/taking a coffee\" (present tense)\n\n+ **The \"-rais\" ending:**\n  - This is the **conditional mood** (like \"would\" in English)\n  - It expresses: wishes, polite requests, hypothetical situations\n\n+ **In café context:**\n  - *Je voudrais un café* = I would like (more polite than \"je veux\")\n  - *Je prendrais bien un café* = I could really go for a coffee (informal, expresses desire)\n  - *J'aimerais un café* = I would like (very polite)\n\n+ **The dialogue uses:** \"Je voudrais...\" and \"J'aimerais...\" — both conditional forms for politeness!", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": true}, {"question": "In the phrase \"un sandwich poulet-crudités,\" what does the hyphen mean? How does this compare to \"un sandwich au fromage\"? (1 construction)", "answer": "- **\"poulet-crudités\"** (with hyphen) = chicken + raw vegetables — it's a **compound noun** describing what's IN the sandwich: chicken AND crudités.\n\n- **\"au fromage\"** = with cheese — uses the preposition \"au\" (à + le).\n\n+ **The difference:**\n  - **Hyphenated compound:** lists two ingredients equally — *jambon-beurre, poulet-crudités*\n  - **Preposition \"au/à la\":** indicates the main added ingredient — *au fromage, au jambon*\n\n+ **From the menu:**\n  - *Sandwich fromage-beurre* (cheese + butter — equal ingredients)\n  - *Sandwich poulet-crudités* (chicken + raw veggies)\n  - But: *Pizza au jamón* (with ham — using \"au\")\n\n+ **Rule of thumb:** Use hyphen when two items are equally important; use \"au/à la\" when one is the main addition.", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "What is the French for \"I don't understand\" and \"Could you repeat, please?\" — two essential phrases for a beginner in a French café. (2 phrases)", "answer": "- **\"Je ne comprends pas.\"** — I don't understand.\n  - Structure: je (I) + ne (not) + comprends (understand) + pas (not)\n  - Note: \"comprends\" is from \"comprendre\" (to understand)\n\n- **\"Pardon? / Pouvez-vous répéter, s'il vous plaît?\"** — Could you repeat, please?\n  - *Pardon?* (informal, rising intonation = \"Sorry?\")\n  - *Pouvez-vous répéter?* (Can you repeat?)\n  - *Vous pouvez répéter, s'il vous plaît?* (You can repeat, please?)\n\n+ **Other useful phrases:**\n  - *Parlez-vous anglais?* — Do you speak English?\n  - *Plus lentement, s'il vous plaît* — More slowly, please\n  - *Qu'est-ce que c'est?* — What is this?\n\n+ **In the dialogue:** The vegetarian customer says \"Ah bon?\" which means \"Oh really?\" when surprised — useful for confirming information!", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": false}, {"question": "In French, why do we say \"un plat du jour\" but \"un plat de résistance\"? What does \"du\" mean versus \"de\"? (2 phrases)", "answer": "- **\"Un plat du jour\"** = \"Dish of the day\" — **du** = de + le\n  - This means \"the dish\" (specific, known) of today\n  - *du* is a contraction of **de + le** (of the)\n\n- **\"Un plat de résistance\"** = \"Main dish\" (literally \"dish of resistance\")\n  - Here \"de\" stays as \"de\" because it's followed by a noun that's not \"le\"\n  - *de résistance* = of resistance/substance\n\n+ **The pattern:**\n  - **du** = de + le (specific, the)\n  - **de la** = de + la (specific, the — feminine)\n  - **de** = plain de (general/abstract)\n  - **des** = de + les (the — plural)\n\n+ **From the dialogue:** *\"Il y a un plat du jour : un lapin à la moutarde.\"* — the dish of the day is specific to that day!", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": true}, {"question": "A tourist says \"Merci beaucoup!\" to a French waiter. Is this correct? What could they also say to be even more polite? (1 phrase)", "answer": "- **\"Merci beaucoup!\"** — \"Thank you very much!\" — Yes, this is correct and very common!\n\n+ **Even more polite alternatives:**\n  - **\"Merci beaucoup, c'est très gentil!\"** — Thank you very much, that's very kind!\n  - **\"Je vous remercie.\"** — I thank you (very formal)\n  - **\"Mille mercis!\"** — A thousand thanks! (very grateful, somewhat old-fashioned)\n\n+ **When leaving:**\n  - **\"Merci, au revoir!\"** — Thank you, goodbye!\n  - **\"Merci beaucoup, bonne journée!\"** — Thank you, have a good day!\n\n+ **In the dialogue:** The customer says *\"Merci, monsieur.\"* — simple but polite thanks, using the server's title.\n\n+ **Remember:** In French culture, always acknowledge with \"merci\" (thanks) and \"au revoir\" (goodbye) when leaving any shop!", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": false}, {"question": "What do these French wine colours mean in English, and what type of wine is each: un vin blanc · un vin rouge · un vin rosé (3 colours)", "answer": "- **Un vin blanc** — White wine (literally \"white wine\")\n- **Un vin rouge** — Red wine (literally \"red wine\")\n- **Un vin rosé** — Rosé wine (literally \"pink wine\")\n\n+ **What each means:**\n  - **Blanc** = white (the colour of the wine)\n  - **Rouge** = red\n  - **Rosé** = pink (a light, refreshing wine, popular in summer in France!)\n\n+ **From the chapter:**\n  - *blancs:* muscadet, aligoté, chablis\n  - *rouges:* saint-émilion, pommard, châteauneuf-du-pape\n  - *rosés:* bandol, rosé d'Anjou, côtes-de-Provence\n\n+ **Fun fact:** Rosé is NOT a blend of red + white — it's made from red grapes with brief skin contact!", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}, {"question": "In the phrase \"Je suis végétarienne,\" what does \"suis\" mean, and why is the adjective \"végétarienne\" in feminine form? (1 sentence)", "answer": "- **\"Suis\"** = am (from the verb \"être\" = to be)\n- **\"Je suis végétarienne\"** = I am (a) vegetarian (feminine)\n\n+ **Why feminine?**\n  - The speaker is a **woman** (Virginie, from the dialogue)\n  - Adjectives must agree with the person (gender + number)\n  - Masculine: *végétarien* · Feminine: *végétarienne* (add -ne)\n\n+ **If a man said it:** *Je suis végétarien.* (no -ne ending)\n\n+ **From the dialogue:** *\"— Non merci, je suis végétarienne !\" — Ah… Alors, nous avons un saumon grillé…* (The server, a man, would say \"végétarien\" if he were vegetarian!)\n\n+ **This is another example of adjective agreement — the adjective matches the gender of the person described!**", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": true}, {"question": "What is the French for \"Is there...?\" and \"Are there...?\" using \"il y a\"? Give both affirmative and negative forms. (4 phrases)", "answer": "- **Singular:** \"Is there...?\"\n  - *Il y a un toilettes?* — Is there a toilet?\n  - *Il n'y a pas de toilettes?* — Isn't there a toilet?\n\n- **Plural:** \"Are there...?\"\n  - *Il y a des меню?* — Are there menus? (Note: in French, you still use \"il y a\" for plural!)\n  - *Il n'y a pas de desserts?* — Aren't there any desserts?\n\n+ **Key point:** French doesn't change \"il y a\" for singular/plural — it's always \"il y a\" regardless!\n\n+ **Common café uses:**\n  - *Il y a un plat du jour?* — Is there a dish of the day?\n  - *Il n'y a pas de fromage?* — Is there no cheese?\n\n+ **From dialogue:** The server says *\"Il y a un plat du jour : un lapin à la moutarde.\"* — There IS a dish of the day!", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": false}, {"question": "In the café dialogue, the server says \"Messieurs-dames?\" when greeting customers. What does this mean literally, and why is it used? (1 greeting)", "answer": "- **\"Messieurs-dames?\"** — \"Sir and ma'am?\" / \"Gentlemen and ladies?\" — A polite, generic greeting used by servers when greeting customers.\n\n+ **Why it exists:**\n  - It's a **gender-neutral plural greeting** when you don't know who you're addressing\n  - It combines *messieurs* (gentlemen/sirs) + *dames* (ladies/ma'ams)\n  - It's the French equivalent of \"Good morning, folks!\" or \"Hello, everyone!\"\n\n+ **When to use:**\n  - When entering a shop: *\"Bonjour, messieurs-dames!\"*\n  - When a server greets you\n  - In any service situation\n\n+ **Other shop greetings:**\n  - *\"Vous avez une table libre?\"* — Do you have a free table?\n  - *\"C'est pour combien?\"* — For how many (people)?", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": false}, {"question": "Explain why \"il faut\" in French means \"it is necessary\" or \"one must,\" using an example from café ordering. (1 phrase)", "answer": "- **\"Il faut\"** = \"it is necessary\" / \"one must\" / \"you need to\" — an impersonal expression\n\n+ **How it works:**\n  - It's always \"il faut\" (no conjugation needed!) + infinitive\n  - *Il faut attendre* = One must wait / You need to wait\n  - *Il faut choisir* = You have to choose\n\n+ **In café context:**\n  - *Il faut payer* = You need to pay\n  - *Il faut choisir un plat* = You must choose a dish\n\n+ **Related expression:** *Il faut + noun* also works:\n  - *Il faut de l'eau* = You need some water\n  - *Il faut du temps* = It takes time\n\n+ **Note:** This is different from \"falloir\" (to need) which conjugates: *Il me faut* = I need (literally \"it is needed by me\")", "source": "MiniMax ②", "_id": "minimax_2_47", "judge_pick": false}, {"question": "What does the French phrase \"C'est compris?\" mean, and when would a waiter use it? How does it differ from \"Vous comprenez?\" (1 phrase)", "answer": "- **\"C'est compris?\"** — \"Is that understood?\" / \"Got it?\" — Used to confirm the order or check understanding.\n\n- **\"Vous comprenez?\"** — \"Do you understand?\" — More direct, can sound like you're questioning someone's intelligence!\n\n+ **In café context:**\n  - After taking an order, the server might say: *\"Un café crème, un sandwich jambon-beurre, c'est compris?\"* — \"One coffee, one ham sandwich, got it?\"\n  - It's a **confirmation**, not a real question about comprehension!\n\n+ **The nuance:**\n  - *C'est compris?* = Check: \"Did you get that?\" (casual, friendly)\n  - *Vous comprenez?* = \"Do you understand what I'm saying?\" (can sound impatient!)\n\n+ **Better alternatives:** *\"Vous avez compris?\"* or *\"C'est bon?\"* — friendlier ways to check!", "source": "MiniMax ②", "_id": "minimax_2_48", "judge_pick": false}], "count": 49}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "In French, what does the server say to greet a mixed group of customers (men and women) at a café, and why is this single word used instead of repeating titles?", "answer": "The server says **\"Messieurs-dames ?\"** as a polite, compact greeting that bundles \"messieurs\" (gentlemen) and \"dames\" (ladies) into one word. It works as both a greeting and an invitation to order — like saying \"Yes, ladies and gentlemen?\" in English. French café culture values brevity in service interactions, so this compressed form is the standard opener when there's a mixed group, rather than saying \"Bonjour messieurs, bonjour mesdames\" each time.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": true}, {"question": "Why do French speakers typically say \"Je voudrais un café\" rather than \"Je veux un café\" when ordering, and what does the form *voudrais* tell us grammatically? (3 steps)", "answer": "- Step 1: \"Je veux\" means \"I want\" — it's a blunt, direct statement of desire. In a service context (café, shop, restaurant), this sounds rude or childish in French, the equivalent of a customer saying \"I want a coffee\" instead of \"I'd like a coffee.\"\n- Step 2: \"Je voudrais\" is the conditional form of *vouloir* and literally translates to \"I would like.\" The conditional softens the request into a polite hypothetical — you're not demanding, you're expressing a wish.\n- Step 3: Politeness in French service language is non-optional at A1. Standard polite alternatives are also **J'aimerais** (\"I would like\" from *aimer*) and **Je pourrais avoir** (\"Could I have\"). All three soften the request; \"Je voudrais\" is the most common at a café.\n\nTakeaway: use the conditional when ordering — it's the linguistic equivalent of saying \"please\" before you've even gotten there.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": true}, {"question": "What are the three meals of the day in French, with their typical times, and what does the word *petit-déjeuner* literally tell you about French meal structure? (3 steps)", "answer": "- Step 1: The three meals are **le petit-déjeuner** (around 7 h, breakfast), **le déjeuner** (around 12 h, lunch), and **le dîner** (around 20 h, dinner).\n- Step 2: Literally, *petit-déjeuner* means \"little lunch\" — *déjeuner* is the main midday meal, and *petit-déjeuner* is the smaller morning version of it. So the word tells you that historically the French structured their day around the midday meal as the anchor.\n- Step 3: Note the times: dinner at 20 h (8 PM) is significantly later than English-speaking norms — eating at 6 PM in France would feel very early. This reflects the rhythm of the French day.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": true}, {"question": "Conjugate the verb *avoir* in the present tense (all six persons), and explain why it's one of the most important verbs to memorise first in French. (3 steps)", "answer": "- Step 1: The full conjugation is:\n+ j'ai\n+ tu as\n+ il / elle / on a\n+ nous avons\n+ vous avez\n+ ils / elles ont\n- Step 2: It's irregular — you cannot predict these forms from any rule. The endings don't follow a pattern, so they must be memorised as a block.\n- Step 3: *Avoir* matters enormously because (a) it's used constantly to express possession (\"J'ai une table\"), (b) it's the auxiliary verb for forming most past tenses (*j'ai mangé* = I ate), and (c) it appears in many idioms about feelings/states (*avoir faim* = to be hungry, *avoir 20 ans* = to be 20 years old). Without *avoir*, you can't function in French.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": true}, {"question": "What happens to \"je\" before *avoir*, and what general phonetic principle does this illustrate? (2 steps)", "answer": "- Step 1: \"Je ai\" is never said — it always becomes **\"j'ai\"**. The *e* of \"je\" is dropped and replaced by an apostrophe before a vowel sound.\n- Step 2: This illustrates **elision**, a core French rule: short grammar words ending in *e* (je, ne, le, de, me, te, se, ce, que) drop their *e* before a word starting with a vowel or a silent *h*. The purpose is to avoid two vowel sounds clashing — French dislikes the awkward \"uh-ah\" hiatus and smooths it into \"zhay.\"", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": true}, {"question": "What is the structural template for negation in French, and how do you negate \"j'ai un café\" step by step? (3 steps)", "answer": "- Step 1: The template is **ne + conjugated verb + pas**. The two pieces wrap around the verb like brackets.\n- Step 2: Applied to \"j'ai un café\": insert *ne* before *ai* and *pas* after. But *ne* + *ai* triggers elision because *ai* starts with a vowel, so *ne → n'*.\n- Step 3: Then the indefinite article *un* changes to **de** in the negative (this is a separate rule). Final result: **\"Je n'ai pas de café.\"**\n\nTakeaway: negation involves two transformations at once — wrapping with *ne…pas* AND changing *un/une/des* to *de*.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": true}, {"question": "Why does \"un café\" become \"pas **de** café\" in the negative, and what's the intuition behind this rule? (3 steps)", "answer": "- Step 1: After a negative verb, the indefinite articles *un*, *une*, *des* all collapse into a single form: **de** (or **d'** before a vowel). So:\n+ J'ai un café → Je n'ai pas **de** café.\n+ J'ai une salade → Je n'ai pas **de** salade.\n+ J'ai des frites → Je n'ai pas **de** frites.\n- Step 2: The intuition: in the affirmative, *un/une/des* indicate \"some quantity\" of the thing. In the negative, you're saying \"zero quantity exists\" — there's no longer any countable amount to mark with un/une/des. The neutral preposition *de* signals \"of (none).\"\n- Step 3: Important boundary: this rule applies to **indefinite** articles only. Definite articles (*le, la, les*) do NOT change in the negative — \"Je n'aime pas le café\" stays as is, because you're still talking about coffee as a defined concept, not a quantity.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": true}, {"question": "Explain the difference between *un/une/des* and *le/la/les* using café examples — when do you choose each? (3 steps)", "answer": "- Step 1: *Un, une, des* are **indefinite articles** = \"a, an, some.\" They introduce something unspecified or new, often something countable that you're picking out of many possibilities.\n+ \"Je voudrais **un** café\" — any coffee, just one of them.\n+ \"Il y a **des** croissants\" — some croissants exist.\n- Step 2: *Le, la, les* are **definite articles** = \"the.\" They refer to something specific, already known, or to a concept/category as a whole.\n+ \"Voici **le** café\" — here's THE coffee (the one you ordered).\n+ \"J'aime **le** café\" — I like coffee (in general, as a category).\n- Step 3: In a café order, the first mention is usually indefinite (\"Je voudrais **un** café\"), and when the server brings it back, they use the definite (\"Voici **le** café\") because now it's a specific identified object. This back-and-forth is everywhere in restaurant dialogues.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": true}, {"question": "What forms do *le* and *la* take before a vowel or silent *h*, and why?", "answer": "Both *le* and *la* become **l'** before a vowel or silent *h*. So you say **l'omelette** (not \"la omelette\"), **l'aligoté** (not \"le aligoté\"), and **l'eau** (not \"la eau\"). This is elision again — the same phonetic instinct that turns *je* into *j'* and *ne* into *n'*. French avoids two vowel sounds bumping into each other, so the article's vowel drops out and an apostrophe takes its place. Note: *les* never elides — it keeps its full form because it ends in *s*, which links phonetically to the next word (this is called *liaison*: \"les_omelettes\" sounds like \"lay-zomelettes\").", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": true}, {"question": "Give the four forms of the adjective \"chaud\" (hot) and explain the agreement pattern with one café example each. (3 steps)", "answer": "- Step 1: The four forms are:\n+ masculine singular: **chaud** (un chocolat chaud)\n+ masculine plural: **chauds** (des chocolats chauds)\n+ feminine singular: **chaude** (une omelette chaude)\n+ feminine plural: **chaudes** (des omelettes chaudes)\n- Step 2: The pattern: start with the masculine singular as the base. Add **-e** for feminine, **-s** for plural, **-es** for feminine plural. The endings stack.\n- Step 3: The principle: in French, adjectives **agree** with the noun they describe in both gender AND number. The noun is the boss; the adjective copies its features. This is non-negotiable and must be done even when the spoken difference is tiny (chaud and chauds sound identical; chaude and chaudes also sound identical — the *d* and *de* sounds distinguish masc from fem, but *s* is silent).", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "Where does the adjective go relative to the noun in phrases like \"salade verte\" and \"saumon grillé,\" and is this the same as English? (2 steps)", "answer": "- Step 1: In French, most descriptive adjectives go **AFTER** the noun: *une salade verte* (a green salad), *un saumon grillé* (a grilled salmon), *des légumes cuits* (cooked vegetables), *une orange pressée* (a squeezed orange = fresh juice).\n- Step 2: This is the opposite of English, where adjectives go before the noun. Beginners must consciously flip their word order. A small set of common adjectives (petit, grand, bon, beau, jeune…) do go BEFORE the noun, but colours, shapes, nationalities, and most descriptive adjectives (including past-participle-style ones like *grillé*, *pressé*, *cuit*) follow the noun.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": true}, {"question": "What does \"une orange pressée\" literally mean, and what's actually in the glass? (2 steps)", "answer": "- Step 1: Literally, *pressée* means \"pressed\" or \"squeezed\" (feminine of *pressé*, the past participle of *presser*). So \"une orange pressée\" = \"a squeezed orange.\"\n- Step 2: In practice, this is freshly squeezed orange juice, prepared on the spot at the café — not bottled juice. The name describes the action: an orange has been pressed, and you drink the result. Same logic for **un citron pressé** = fresh lemon juice (lit. \"a squeezed lemon\"), usually served with water and sugar on the side so you mix it yourself.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": true}, {"question": "What's the difference between \"il y a\" and \"il n'y a pas de,\" and how do you use them? (3 steps)", "answer": "- Step 1: **Il y a** = \"there is / there are\" — a fixed expression that doesn't change with singular or plural. \"Il y a un plat du jour\" (there's a dish of the day), \"Il y a des croissants\" (there are croissants).\n- Step 2: The negative is **il n'y a pas de…** — \"there isn't / there aren't any.\" Note the elision: *ne* → *n'* before the *y*. And again, the indefinite article (un/une/des) collapses to **de** after the negation: \"Il n'y a pas **de** tarte,\" \"Il n'y a pas **d'**omelette.\"\n- Step 3: Functionally, this is how you ask and answer about availability in a café — \"Il y a un plat du jour ?\" / \"Non, il n'y a pas de plat du jour aujourd'hui.\" It's high-frequency vocabulary.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": true}, {"question": "Why do we say \"un verre **de** vin\" but \"un verre **d'**eau\" — what's the rule for \"de\" with quantity expressions? (3 steps)", "answer": "- Step 1: When you express a quantity (a glass of, a bottle of, a carafe of), the linking word is **de** — there's no article in between. So *un verre de vin*, *une bouteille de vin*, *une carafe de vin*.\n- Step 2: If the noun after *de* starts with a vowel or silent *h*, *de* elides to **d'**: *un verre **d'**eau*, *une carafe **d'**eau*, *une bouteille **d'**aligoté*.\n- Step 3: Why no article? Because the quantity word already specifies \"how much\" — saying \"un verre du vin\" or \"un verre le vin\" would be redundant and ungrammatical. The construction is [quantity] + de + [substance], parallel to English \"a glass OF wine\" (no \"the\").", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": true}, {"question": "A customer asks \"Vous avez du rosé d'Anjou ?\" and the café doesn't have it. How would the server reply using a contrast structure, and why is this phrasing useful? (3 steps)", "answer": "- Step 1: The textbook reply: **\"Non, nous n'avons pas de rosé d'Anjou, nous avons un rosé de Provence.\"**\n- Step 2: Two grammatical moves here: (a) negation wraps *avons* — \"ne + avons + pas\" with elision to \"n'avons pas\"; (b) the indefinite \"un rosé\" becomes \"**pas de** rosé\" because of the negative-article rule.\n- Step 3: It's useful because in real service interactions you rarely just say \"no\" — you offer the alternative. The structure \"Non, nous n'avons pas de X, nous avons Y\" is a polite, helpful template you can reuse for any item: \"Non, nous n'avons pas de tarte, nous avons une mousse au chocolat.\"", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": true}, {"question": "What's the difference between \"une bière\" and \"un demi\" at a French café? (2 steps)", "answer": "- Step 1: **Une bière** is the generic word for \"a beer.\" **Un demi** is a specific serving size: a draught beer of about 25 cl (roughly half a pint), served *à la pression* (on tap).\n- Step 2: The word *demi* literally means \"half\" — historically a half-litre, now standardised at ~25 cl. So when you order \"un demi,\" you're ordering a specific glass size, not just any beer. This is a cultural shorthand: at most cafés the standard beer-on-tap order is simply \"un demi, s'il vous plaît\" without needing to specify volume.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": true}, {"question": "Name the numbers 0–10 in French, and point out the pronunciation traps a beginner should know. (3 steps)", "answer": "- Step 1: 0 zéro · 1 un · 2 deux · 3 trois · 4 quatre · 5 cinq · 6 six · 7 sept · 8 huit · 9 neuf · 10 dix.\n- Step 2: Traps:\n+ **un** rhymes with a nasal \"uh\" — not \"oon.\"\n+ **deux** has a rounded vowel like German *ö*, not \"duh.\"\n+ **six** and **dix** end in a \"s\" sound when said alone, but the *x* goes silent before a consonant (*six croissants* = \"see croissants\") and becomes a *z* sound before a vowel (*six oranges* = \"see-Zoranges\"). This is *liaison*.\n+ **sept** — the *p* is silent: \"set.\"\n- Step 3: Numbers are deceptively tricky because pronunciation shifts depending on what follows. Worth memorising spoken AND linked forms.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": true}, {"question": "What's the pattern for 11–16 vs 17–19 in French, and what does this tell you about how numbers are built? (3 steps)", "answer": "- Step 1: 11–16 are single words: **onze, douze, treize, quatorze, quinze, seize**.\n- Step 2: 17–19 switch to a compound pattern: **dix-sept** (10+7), **dix-huit** (10+8), **dix-neuf** (10+9). Literally \"ten-seven, ten-eight, ten-nine.\"\n- Step 3: This break at 17 reflects an old Latin pattern preserved in French: numbers up to 16 were short Latin-derived single words, while 17–19 became transparent additions to \"ten.\" It's the same logic English uses for \"thirteen-nineteen\" (suffix *-teen* = ten), but French does it more openly with a hyphen. After 20 the pattern continues: 21 = *vingt et un*, 22 = *vingt-deux*, etc.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": true}, {"question": "What is \"la formule\" on a café menu, and how is it different from ordering items individually? (3 steps)", "answer": "- Step 1: **Une formule** is a fixed-price meal deal — a combination of items (e.g., starter + main, or breakfast set) bundled at a set price. \"Je voudrais une formule à 12 euros\" = \"I'd like the 12-euro set menu.\"\n- Step 2: A \"formule petit-déjeuner\" might include a hot drink + a fresh juice + a croissant or tartine. A lunch formule might be entrée + plat or plat + dessert.\n- Step 3: Difference from à la carte: ordering items separately gives more freedom but costs more. A formule is the budget-friendly French equivalent of a \"combo\" or \"set meal\" — culturally common because the French value structured, multi-course meals even at simple cafés.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "What does \"le plat du jour\" mean and why is it a useful thing for a customer to ask about? (2 steps)", "answer": "- Step 1: **Le plat du jour** = \"the dish of the day\" — a daily special chosen by the chef, often using fresh seasonal ingredients, and usually offered at a slightly lower price than the regular menu equivalents.\n- Step 2: It's useful because (a) it tells you what's fresh/recommended that day, (b) it's often the best value, and (c) it speeds up the kitchen since they're prepared to make it in volume. Asking \"Quel est le plat du jour ?\" is standard customer behaviour in France.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": true}, {"question": "Why does Virginie in the dialogue exclaim \"Quelle horreur !\" when offered frites, and what does this expression convey? (2 steps)", "answer": "- Step 1: Literally \"Quelle horreur !\" = \"What a horror!\" It's a strong exclamation of disgust or distaste — much stronger than \"no thanks.\"\n- Step 2: Virginie uses it because, as a vegetarian seeking healthy cooked vegetables, being offered a plate of fries feels like the opposite of what she wants — it's culturally read as junk/comfort food, not a proper vegetable dish. The phrase is everyday colloquial French and signals genuine emotional reaction. Useful for café dialogues to express revulsion politely-ish (it's expressive, not vulgar).", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": true}, {"question": "What's the difference between *une carafe d'eau* and *une bouteille d'eau* in a French café, and which is free? (3 steps)", "answer": "- Step 1: **Une carafe d'eau** = a jug/pitcher of tap water. It is **free** by law in any French establishment that serves food — you have a right to ask for it.\n- Step 2: **Une bouteille d'eau** = a bottle of mineral water (Évian, Vittel = *plate/still*; Perrier, Badoit = *gazeuse/sparkling*). This costs money.\n- Step 3: Why this matters: in France, ordering \"une carafe d'eau\" alongside your meal is completely normal and not seen as cheap. Tourists who don't know this often pay for bottled water unnecessarily. The polite formula: \"Une carafe d'eau, s'il vous plaît.\"", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": true}, {"question": "What does \"une tartine\" refer to in a French breakfast, and how is it different from a sandwich? (3 steps)", "answer": "- Step 1: **Une tartine** is a single slice of bread (usually baguette or country bread) with butter spread on it, often eaten at breakfast. It's an open-faced, one-sided thing.\n- Step 2: A **sandwich** has two pieces of bread (or two halves of a baguette) with filling between them — closed, two-sided. The classic French version is *un sandwich jambon-beurre* (ham and butter in a baguette).\n- Step 3: Cultural note: butter on bread is a French breakfast staple. You can add jam (*tartine beurrée avec confiture*) or eat it plain. The verb form is *beurrer* (to butter), past participle *beurré/beurrée* — hence \"des tartines beurrées\" (buttered tartines) as in the textbook example.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": true}, {"question": "Adjective agreement check: how do you say \"buttered tartines\" (plural), and walk through why each ending is what it is. (3 steps)", "answer": "- Step 1: Start with the noun: *tartine* is feminine singular. Plural: *tartines* (add -s).\n- Step 2: The adjective *beurré* (past participle of *beurrer*, used as adjective). Since *tartines* is feminine plural, the adjective must also be feminine plural: add **-e** for feminine, then **-s** for plural → **beurrées**.\n- Step 3: Final phrase: **des tartines beurrées**. Note the article is *des* (indefinite plural), the noun has *-s*, and the adjective has *-es*. Three places where plurality/gender shows up — all must match.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "What's the difference between \"Bonjour\" and \"Bonsoir,\" and when does the switch happen? (2 steps)", "answer": "- Step 1: **Bonjour** literally = \"good day\" — used from morning until roughly late afternoon. **Bonsoir** = \"good evening\" — used from late afternoon/early evening onwards.\n- Step 2: The switch point is fuzzy but generally around 18 h (6 PM). Using \"Bonjour\" at 9 PM sounds odd; using \"Bonsoir\" at 10 AM sounds odd. When in doubt before sunset, default to \"Bonjour.\" Both are essential — French politeness *requires* a greeting before any service interaction; walking into a shop and saying \"Je voudrais…\" without \"Bonjour madame/monsieur\" first is considered rude.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "Why does French politeness require adding \"madame\" or \"monsieur\" to \"Bonjour\" in service situations, while English speakers usually just say \"Hi\"? (3 steps)", "answer": "- Step 1: French service culture treats the customer-server interaction as a brief but formal relationship between two adults, both of whom deserve acknowledgement. The form is \"Bonjour, madame\" / \"Bonjour, monsieur\" / \"Bonjour, mademoiselle\" (the last increasingly rare and considered outdated for adult women).\n- Step 2: Saying just \"Bonjour\" without the title is acceptable but slightly less polite — like nodding instead of fully greeting someone. Adding *madame/monsieur* completes the social formula.\n- Step 3: The same applies on departure: \"Au revoir, madame\" — not just \"Au revoir.\" This bidirectional politeness frames the encounter as a small dignified exchange, which is why French service can feel more formal than Anglo-Saxon norms.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": true}, {"question": "A waiter brings your order and says \"Voici…\" or \"Voilà…\" — what's the nuance between these two words? (3 steps)", "answer": "- Step 1: Both mean \"here is / here are.\" Etymologically: *voici* = \"vois ici\" (see here / right here); *voilà* = \"vois là\" (see there / over there).\n- Step 2: In careful usage, *voici* points to something close, *voilà* to something further. In real spoken French, *voilà* has overwhelmingly taken over — it's used for both situations and as a general utterance meaning \"there you go\" or \"and that's that.\"\n- Step 3: In café service: \"Voilà le café\" (here's the coffee — handing it to you) is by far more common. *Voici* is more formal/written or used when listing items (Voici la carte, voici le menu). At A1 level, treat them as nearly interchangeable but expect to hear *voilà* much more often.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": true}, {"question": "Mini-exercise: translate \"There are no omelettes\" into French and walk through every transformation. (4 steps)", "answer": "- Step 1: Start with the affirmative: \"There are omelettes\" → \"Il y a des omelettes.\" Use *il y a* (the fixed \"there is/are\" expression) and *des* (indefinite plural article).\n- Step 2: Apply negation: wrap the verb *a* with *ne…pas* → \"il ne y a pas des omelettes.\"\n- Step 3: Apply elision: *ne* + *y* → *n'y* (because *y* is vowel-like phonetically). Now: \"il n'y a pas des omelettes.\"\n- Step 4: Apply the negative-article rule: *des* → *de* → *d'* before vowel *o*. Final: **\"Il n'y a pas d'omelettes.\"**\n\nTakeaway: a single negative sentence triggers three rules — elision of *ne*, the *ne…pas* wrap, and *des → de/d'*.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "Mini-exercise: a customer wants to order \"a green salad and two glasses of red wine.\" Construct the order. (3 steps)", "answer": "- Step 1: Green salad: *salade* is feminine, so *une salade*. Adjective *vert* must agree → feminine singular *verte*. Adjective goes after the noun. Result: **une salade verte**.\n- Step 2: Two glasses of red wine: number *deux*, then *verres* (plural of *verre*). Quantity construction uses *de* (no article in between) → *deux verres de*. Red wine = *vin rouge* (adjective *rouge* doesn't change for masculine — it ends in *e* already). Result: **deux verres de vin rouge**.\n- Step 3: Assemble politely: **\"Je voudrais une salade verte et deux verres de vin rouge, s'il vous plaît.\"** Use *je voudrais* (conditional, polite) and always close with *s'il vous plaît*.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "Why is wine described as \"fondamental dans la culture française,\" and what does the textbook claim about French wine variety? (2 steps)", "answer": "- Step 1: In French culture, a proper meal isn't just food — the standard formula is \"un bon plat + un bon vin\" (a good dish + a good wine). Wine is treated as an integral pairing element, not an optional add-on.\n- Step 2: The textbook notes there are over **300 wines** in France, organised by region. The four big regions to recognise at A1 are **Bordeaux, Bourgogne (Burgundy), Loire, and Côtes-du-Rhône**, plus **Alsace** for whites and **Provence** for rosés. Each region has signature names (e.g., Saint-Émilion from Bordeaux, Chablis from Burgundy, Sancerre from Loire). Knowing the region helps you guess colour and style.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": true}, {"question": "A common misconception: students think \"des\" is always \"some\" and translate \"I have some friends\" as \"J'ai des amis.\" But when does French use \"des\" where English uses nothing? (3 steps)", "answer": "- Step 1: In English, plural indefinites often go bare: \"I have friends,\" \"There are croissants,\" \"She wants vegetables.\" No article.\n- Step 2: In French, you **cannot** drop the article. Every noun needs one. So plural indefinites take **des**: \"J'ai **des** amis,\" \"Il y a **des** croissants,\" \"Elle veut **des** légumes.\"\n- Step 3: This is a structural difference, not a translation choice. *Des* doesn't always carry the meaning of \"some\" — sometimes it's just the grammatical placeholder for \"plural indefinite.\" A beginner habit to drill: never let a French noun float without an article.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": true}, {"question": "Misconception probe: a student writes \"une omelette chaud\" (hot omelette). What's wrong, and what's the fix? (3 steps)", "answer": "- Step 1: The noun *omelette* is feminine singular. The adjective *chaud* (hot) must therefore agree in gender AND number.\n- Step 2: Feminine of *chaud* is *chaude* (add -e). Singular stays singular (no -s). So the correct form is **chaude**.\n- Step 3: Correct phrase: **\"une omelette chaude.\"** The mistake is treating the adjective as invariable like in English (\"a hot omelette\"). In French, every adjective must \"morph\" to match its noun — this is automatic and constant. Memorise: noun gender → adjective ending.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": true}, {"question": "What does it mean grammatically that \"rouge\" and \"jaune\" don't seem to change in feminine? Test with \"une voiture rouge\" vs \"un livre rouge.\" (2 steps)", "answer": "- Step 1: Some adjectives already end in **-e** in their base (masculine) form — like *rouge*, *jaune*, *jeune*, *rapide*, *triste*. For these, the feminine is **identical** to the masculine (no extra -e to add), though plural still adds -s.\n- Step 2: So *un livre rouge* (a red book, masc) and *une voiture rouge* (a red car, fem) both use the same form. Plural: *des livres rouges*, *des voitures rouges*. The rule \"feminine = masculine + e\" still holds technically — it's just that adding *e* to a word already ending in *e* gives you the same word. No exception, just a consequence of spelling.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": true}, {"question": "Edge case: how do you order at a French café using \"on\" instead of \"nous\" — and why is *on* more common in speech? (3 steps)", "answer": "- Step 1: \"On\" technically means \"one\" (as in \"one does this\") but in casual French it functions as \"we.\" Conjugation: *on* always uses the **il/elle** form of the verb. So \"on a\" (we have), \"on voudrait\" (we would like), not \"on avons.\"\n- Step 2: Example: instead of \"Nous voudrions deux cafés,\" a French speaker is far more likely to say **\"On voudrait deux cafés.\"** Both are correct; *on* is simply colloquial standard.\n- Step 3: Why? *Nous* + first-person plural verb endings (-ons) feel slightly formal in everyday speech. *On* + singular verb is shorter, easier, and dominant in spoken French. At A1, learn both, but recognise that hearing *on* for \"we\" is the norm.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": true}, {"question": "Synthesis question: a server says \"Désolé, il n'y a pas de saumon, mais nous avons une truite. Et comme boisson ?\" — translate and explain every grammar feature in this short exchange. (4 steps)", "answer": "- Step 1: **\"Désolé, il n'y a pas de saumon\"** = \"Sorry, there's no salmon.\" Features: *il n'y a pas de* is the negative of *il y a* with the article *du* (here actually originally *un* or implied partitive) collapsed to *de* after negation; *n'* shows elision of *ne* before *y*.\n- Step 2: **\"mais nous avons une truite\"** = \"but we have a trout.\" Features: *nous avons* is the *nous* form of *avoir*; *une truite* uses feminine indefinite article (truite is feminine).\n- Step 3: **\"Et comme boisson ?\"** = \"And as a drink? / What about a drink?\" Features: *comme* here means \"as / for / by way of\" — a fixed café phrase to ask what category of thing the customer wants next. Note there's no article before *boisson* in this construction.\n- Step 4: Putting it together, the server (a) apologises, (b) offers an alternative using the contrast pattern, (c) moves the order forward by asking the next question. This is the rhythm of a French café service exchange — refuse, offer, advance.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": true}, {"question": "Why is French breakfast typically lighter than English breakfast, and what items make up \"une formule petit-déjeuner\"? (2 steps)", "answer": "- Step 1: A typical French *formule petit-déjeuner* includes a hot drink (*un café crème, un thé, un chocolat*), a fresh juice (*une orange pressée, un citron pressé*), and a baked item (*un croissant* or *une tartine* with butter and jam).\n- Step 2: This is lighter than a full English breakfast (eggs, bacon, beans, etc.) because French food culture concentrates substantial eating at *déjeuner* (lunch) and *dîner* (dinner). Breakfast is a quick wake-up meal, often eaten standing at a café counter (cheaper) or briefly at home. The carbs + caffeine + vitamin C combo is the typical formula.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": true}, {"question": "Quick recall: list the four indefinite article forms (un, une, des, and the negative form), and give a one-word example of each. (2 steps)", "answer": "- Step 1: The four forms:\n+ **un** (masc sing) → un café\n+ **une** (fem sing) → une salade\n+ **des** (plural, both genders) → des frites\n+ **de / d'** (after negation, all genders/numbers) → pas de café, pas d'omelette\n- Step 2: Conceptually, French has THREE indefinite articles in the affirmative (un/une/des), but they ALL collapse to a single form (*de/d'*) in the negative. This collapse is one of the most distinctive features of French negation and trips up English speakers because English doesn't change \"a\" or \"some\" in negatives (\"I don't have a car\" — the article stays).", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "Mini-exercise: how do you say \"I don't have any omelettes\" and \"I don't have the omelette\" — and why are these different? (3 steps)", "answer": "- Step 1: \"I don't have any omelettes\" → **\"Je n'ai pas d'omelettes.\"** Here the indefinite *des omelettes* collapses to *d'omelettes* (with elision before *o*) under the negative-article rule.\n- Step 2: \"I don't have the omelette\" → **\"Je n'ai pas l'omelette.\"** Here the article is **definite** (*l'* for *la* before vowel), so it does NOT change — definite articles survive negation untouched.\n- Step 3: Why the asymmetry? Indefinites (un/une/des) indicate quantity, and negation says \"zero quantity\" — so the quantity marker collapses. Definites (le/la/les) identify a specific known thing, and that identification doesn't depend on quantity — so the article stays. The choice between *d'* and *l'* signals whether you mean \"any omelette\" or \"the specific omelette.\"", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": true}, {"question": "What does \"Sans beurre, s'il vous plaît\" tell us about how to make a special request in French? (3 steps)", "answer": "- Step 1: **Sans** = \"without.\" It's a preposition that introduces what you want excluded from your order. \"Sans beurre\" = without butter, \"sans sucre\" = without sugar, \"sans sel\" = without salt.\n- Step 2: Note that after *sans*, you typically use the noun **without an article** in fixed expressions (\"sans beurre,\" \"sans sucre\"). This parallels English \"without butter,\" not \"without the butter.\"\n- Step 3: Politeness wrap: still add *s'il vous plaît* at the end. Standard café phrasing: \"Une salade verte, sans vinaigrette, s'il vous plaît\" (a green salad without dressing, please). The opposite is **avec** (\"with\"): \"avec chantilly\" (with whipped cream).", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": true}, {"question": "Synthesis: build the full polite sentence \"Excuse me, I would like a hot chocolate and a buttered tartine with jam, please.\" (3 steps)", "answer": "- Step 1: Opener: \"Excusez-moi\" or just go straight to \"Bonjour, monsieur/madame.\" Politeness phrase: *Je voudrais* (conditional of *vouloir*).\n- Step 2: Items:\n+ \"a hot chocolate\" → *un chocolat chaud* (masc sing noun, adjective agrees masc sing, adjective after noun).\n+ \"a buttered tartine with jam\" → *une tartine beurrée avec de la confiture*. Tartine = fem sing → *beurrée* (fem sing). *Avec* = with. *De la confiture* uses the partitive (a small amount of jam — a concept appearing later but worth previewing).\n- Step 3: Full sentence: **\"Bonjour, monsieur. Je voudrais un chocolat chaud et une tartine beurrée avec de la confiture, s'il vous plaît.\"** Note: greeting + title + polite verb + items with correct gender/number agreement + closing politeness.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": true}], "count": 40}}, "meta": {"minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 4316, "out_tokens": 13978, "reasoning_chars": 1740, "cost_eur": 0.0149, "elapsed_s": 137, "content_chars": 47681}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.8, "in_tokens": 4316, "out_tokens": 13615, "reasoning_chars": 1753, "cost_eur": 0.0146, "elapsed_s": 133, "content_chars": 46558}, "opus_2": {"run": 2, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 6802, "out_tokens": 15929, "reasoning_chars": 0, "cost_eur": 1.193, "elapsed_s": 234, "content_chars": 39414}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.7, "in_tokens": 4724, "out_tokens": 8495, "reasoning_chars": 1732, "cost_eur": 0.0102, "elapsed_s": 123, "content_chars": 27566}, "qwen_2": {"run": 2, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.75, "in_tokens": 4724, "out_tokens": 2666, "reasoning_chars": 3634, "cost_eur": 0.0038, "elapsed_s": 46, "content_chars": 6292}, "qwen_3": {"run": 3, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.8, "in_tokens": 4724, "out_tokens": 2644, "reasoning_chars": 2688, "cost_eur": 0.0038, "elapsed_s": 46, "content_chars": 6952}, "qwen_4": {"run": 4, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.85, "in_tokens": 4724, "out_tokens": 6159, "reasoning_chars": 1382, "cost_eur": 0.0077, "elapsed_s": 97, "content_chars": 20351}}};
const SK='french_veb_ch1';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
