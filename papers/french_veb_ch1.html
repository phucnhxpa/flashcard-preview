<script>
const DATA={"selected": [{"question": "If a French person says \"J'ai très faim\" vs \"J'ai assez faim\", what does the difference in adverbs tell you about their hunger level? (1 step)", "answer": "- **« J'ai très faim »** — \"I'm VERY hungry\" (very = very much)\n  + « Tres » intensifies the hunger\n\n- **« J'ai assez faim »** — \"I'm hungry ENOUGH\" / \"I have enough hunger\"\n  + « Assez » means \"enough\" — could imply satisfaction or that more isn't needed\n\n- **Related adverbs for quantities:**\n  + *très* — very (intensifier)\n  + *assez* — enough / fairly\n  + *un peu* — a little\n  + *pas* — not (in negative: *pas très faim* = not very hungry)\n\n- In a café context, saying « j'ai très faim » might lead the server to suggest more substantial items like a « formule » (set menu)!", "source": "MiniMax ①", "_id": "minimax_1_55"}, {"question": "What are the three meals of the day in French, with their typical times, and what does the word *petit-déjeuner* literally tell you about French meal structure? (3 steps)", "answer": "- Step 1: The three meals are **le petit-déjeuner** (around 7 h, breakfast), **le déjeuner** (around 12 h, lunch), and **le dîner** (around 20 h, dinner).\n- Step 2: Literally, *petit-déjeuner* means \"little lunch\" — *déjeuner* is the main midday meal, and *petit-déjeuner* is the smaller morning version of it. So the word tells you that historically the French structured their day around the midday meal as the anchor.\n- Step 3: Note the times: dinner at 20 h (8 PM) is significantly later than English-speaking norms — eating at 6 PM in France would feel very early. This reflects the rhythm of the French day.", "source": "Opus 4.7 ②", "_id": "opus_2_2"}, {"question": "In French, what does the server say to greet a mixed group of customers (men and women) at a café, and why is this single word used instead of repeating titles?", "answer": "The server says **\"Messieurs-dames ?\"** as a polite, compact greeting that bundles \"messieurs\" (gentlemen) and \"dames\" (ladies) into one word. It works as both a greeting and an invitation to order — like saying \"Yes, ladies and gentlemen?\" in English. French café culture values brevity in service interactions, so this compressed form is the standard opener when there's a mixed group, rather than saying \"Bonjour messieurs, bonjour mesdames\" each time.", "source": "Opus 4.7 ②", "_id": "opus_2_0"}, {"question": "Why do we say \"un verre **de** vin\" but \"un verre **d'**eau\" — what's the rule for \"de\" with quantity expressions? (3 steps)", "answer": "- Step 1: When you express a quantity (a glass of, a bottle of, a carafe of), the linking word is **de** — there's no article in between. So *un verre de vin*, *une bouteille de vin*, *une carafe de vin*.\n- Step 2: If the noun after *de* starts with a vowel or silent *h*, *de* elides to **d'**: *un verre **d'**eau*, *une carafe **d'**eau*, *une bouteille **d'**aligoté*.\n- Step 3: Why no article? Because the quantity word already specifies \"how much\" — saying \"un verre du vin\" or \"un verre le vin\" would be redundant and ungrammatical. The construction is [quantity] + de + [substance], parallel to English \"a glass OF wine\" (no \"the\").", "source": "Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "Explain why in « je n'ai pas », the 'h' in 'ai' doesn't cause the 'ne' to become 'n''. Is 'h' always silent? (Edge case) (1 step)", "answer": "- **In « je n'ai pas »:**\n  + The 'h' in « ai » is **silent** — the word is pronounced like \"eh\" (the 'h' is not a consonant sound)\n  + So « ne » becomes « n' » because the next sound is a **vowel sound** ('eh'), not because of the letter 'h'\n\n- **About French 'h':**\n  + The 'h' in French is ALWAYS silent\n  + There are two types: *h aspiré* (aspirated h — rare, affects liaison) and *h muet* (silent h)\n  + But neither is actually pronounced\n\n- **Key point:** The contraction « n' » happens based on the **sound**, not the letter. If the next word starts with a vowel SOUND, use « n' ».", "source": "MiniMax ①", "_id": "minimax_1_30"}, {"question": "Edge case: how do you order at a French café using \"on\" instead of \"nous\" — and why is *on* more common in speech? (3 steps)", "answer": "- Step 1: \"On\" technically means \"one\" (as in \"one does this\") but in casual French it functions as \"we.\" Conjugation: *on* always uses the **il/elle** form of the verb. So \"on a\" (we have), \"on voudrait\" (we would like), not \"on avons.\"\n- Step 2: Example: instead of \"Nous voudrions deux cafés,\" a French speaker is far more likely to say **\"On voudrait deux cafés.\"** Both are correct; *on* is simply colloquial standard.\n- Step 3: Why? *Nous* + first-person plural verb endings (-ons) feel slightly formal in everyday speech. *On* + singular verb is shorter, easier, and dominant in spoken French. At A1, learn both, but recognise that hearing *on* for \"we\" is the norm.", "source": "Opus 4.7 ②", "_id": "opus_2_33"}, {"question": "What's the difference between \"une bière\" and \"un demi\" at a French café? (2 steps)", "answer": "- Step 1: **Une bière** is the generic word for \"a beer.\" **Un demi** is a specific serving size: a draught beer of about 25 cl (roughly half a pint), served *à la pression* (on tap).\n- Step 2: The word *demi* literally means \"half\" — historically a half-litre, now standardised at ~25 cl. So when you order \"un demi,\" you're ordering a specific glass size, not just any beer. This is a cultural shorthand: at most cafés the standard beer-on-tap order is simply \"un demi, s'il vous plaît\" without needing to specify volume.", "source": "Opus 4.7 ②", "_id": "opus_2_15"}, {"question": "What does it mean grammatically that \"rouge\" and \"jaune\" don't seem to change in feminine? Test with \"une voiture rouge\" vs \"un livre rouge.\" (2 steps)", "answer": "- Step 1: Some adjectives already end in **-e** in their base (masculine) form — like *rouge*, *jaune*, *jeune*, *rapide*, *triste*. For these, the feminine is **identical** to the masculine (no extra -e to add), though plural still adds -s.\n- Step 2: So *un livre rouge* (a red book, masc) and *une voiture rouge* (a red car, fem) both use the same form. Plural: *des livres rouges*, *des voitures rouges*. The rule \"feminine = masculine + e\" still holds technically — it's just that adding *e* to a word already ending in *e* gives you the same word. No exception, just a consequence of spelling.", "source": "Opus 4.7 ②", "_id": "opus_2_32"}, {"question": "In the negative, when do you keep the article (un/une/des) instead of changing to de/d'? Explain with an example. (Edge case) (2 steps)", "answer": "- Step 1: The general rule is: in negation, **un/une/des → de/d'**\n  + *J'ai un livre* → *Je n'ai pas de livre* (I don't have a book)\n\n- Step 2: **EXCEPTION** — You KEEP the article when specifying or describing what you DO have (the positive part of the sentence):\n  + *Je n'ai pas de café, mais **j'ai un thé**.* — I don't have coffee, but I have tea.\n  + *Nous n'avons pas de rosé d'Anjou, nous avons **un rosé de Provence**.* — We don't have rosé d'Anjou, we have rosé de Provence.\n\n- **Why?** Because in the second part, you're AFFIRMING the existence of something specific — so the article returns.", "source": "MiniMax ①", "_id": "minimax_1_27"}, {"question": "A customer asks \"Vous avez du rosé d'Anjou ?\" and the café doesn't have it. How would the server reply using a contrast structure, and why is this phrasing useful? (3 steps)", "answer": "- Step 1: The textbook reply: **\"Non, nous n'avons pas de rosé d'Anjou, nous avons un rosé de Provence.\"**\n- Step 2: Two grammatical moves here: (a) negation wraps *avons* — \"ne + avons + pas\" with elision to \"n'avons pas\"; (b) the indefinite \"un rosé\" becomes \"**pas de** rosé\" because of the negative-article rule.\n- Step 3: It's useful because in real service interactions you rarely just say \"no\" — you offer the alternative. The structure \"Non, nous n'avons pas de X, nous avons Y\" is a polite, helpful template you can reuse for any item: \"Non, nous n'avons pas de tarte, nous avons une mousse au chocolat.\"", "source": "Opus 4.7 ②", "_id": "opus_2_14"}, {"question": "What is the difference between « le menu » and « la carte » in a French restaurant? (1 step)", "answer": "- **La carte** — the list of ALL items available (like an à la carte menu). You can order anything from it.\n  + Example: *Voici la carte, mademoiselle.* (Here's the menu.)\n\n- **Le menu** — a fixed-price set menu with multiple courses (often cheaper, good value). Typically includes entrée + plat OR plat + dessert.\n  + Example: *Je voudrais une formule « petit-déjeuner », s'il vous plaît.*\n\n- **Confusion point:** In everyday English, we say \"the menu\" for both. In French, they're distinct!", "source": "MiniMax ①", "_id": "minimax_1_14"}, {"question": "Misconception probe: a student writes \"une omelette chaud\" (hot omelette). What's wrong, and what's the fix? (3 steps)", "answer": "- Step 1: The noun *omelette* is feminine singular. The adjective *chaud* (hot) must therefore agree in gender AND number.\n- Step 2: Feminine of *chaud* is *chaude* (add -e). Singular stays singular (no -s). So the correct form is **chaude**.\n- Step 3: Correct phrase: **\"une omelette chaude.\"** The mistake is treating the adjective as invariable like in English (\"a hot omelette\"). In French, every adjective must \"morph\" to match its noun — this is automatic and constant. Memorise: noun gender → adjective ending.", "source": "Opus 4.7 ②", "_id": "opus_2_31"}, {"question": "Why is wine described as \"fondamental dans la culture française,\" and what does the textbook claim about French wine variety? (2 steps)", "answer": "- Step 1: In French culture, a proper meal isn't just food — the standard formula is \"un bon plat + un bon vin\" (a good dish + a good wine). Wine is treated as an integral pairing element, not an optional add-on.\n- Step 2: The textbook notes there are over **300 wines** in France, organised by region. The four big regions to recognise at A1 are **Bordeaux, Bourgogne (Burgundy), Loire, and Côtes-du-Rhône**, plus **Alsace** for whites and **Provence** for rosés. Each region has signature names (e.g., Saint-Émilion from Bordeaux, Chablis from Burgundy, Sancerre from Loire). Knowing the region helps you guess colour and style.", "source": "Opus 4.7 ②", "_id": "opus_2_29"}, {"question": "What does \"une tartine\" refer to in a French breakfast, and how is it different from a sandwich? (3 steps)", "answer": "- Step 1: **Une tartine** is a single slice of bread (usually baguette or country bread) with butter spread on it, often eaten at breakfast. It's an open-faced, one-sided thing.\n- Step 2: A **sandwich** has two pieces of bread (or two halves of a baguette) with filling between them — closed, two-sided. The classic French version is *un sandwich jambon-beurre* (ham and butter in a baguette).\n- Step 3: Cultural note: butter on bread is a French breakfast staple. You can add jam (*tartine beurrée avec confiture*) or eat it plain. The verb form is *beurrer* (to butter), past participle *beurré/beurrée* — hence \"des tartines beurrées\" (buttered tartines) as in the textbook example.", "source": "Opus 4.7 ②", "_id": "opus_2_22"}, {"question": "In the dialogue, why does the server say **\"Et comme boisson?\"** rather than **\"Quelle boisson?\"**?", "answer": "- **\"Et comme boisson?\"** (And as drink?) uses **\"comme\"** for category specification (common in service contexts).  \n- **\"Quelle boisson?\"** (Which drink?) is more general and less idiomatic for ordering.  \n- \"Comme + noun\" narrows the category, streamlining requests (e.g., \"And as dessert?\").", "source": "Qwen 3 ②", "_id": "qwen_2_7"}, {"question": "A beginner confuses \"je mange\" (I eat) with \"je mangeons\" (we eat). What is the correct subject-verb pairing for each, and what is the pattern? (2 verb forms)", "answer": "- **je mange** — \"I eat\" (first person singular)\n- **nous mangeons** — \"we eat\" (first person plural)\n\n+ **The pattern:**\n  - **Singular:** je (I), tu (you), il/elle (he/she) → mange\n  - **Plural:** nous (we), vous (you all), ils/elles (they) → mangeons\n\n+ **Why the difference?** In French, verbs change their endings based on the subject. For \"-er\" verbs (the most common type):\n  - je -e\n  - tu -es\n  - il/elle -e\n  - nous -ons ← **different!**\n  - vous -ez\n  - ils/elles -ent\n\n+ **Common mistake:** Don't add \"-ons\" to \"je\"! The \"-ons\" ending is ONLY for \"nous.\"", "source": "MiniMax ②", "_id": "minimax_2_28"}, {"question": "A waiter brings your order and says \"Voici…\" or \"Voilà…\" — what's the nuance between these two words? (3 steps)", "answer": "- Step 1: Both mean \"here is / here are.\" Etymologically: *voici* = \"vois ici\" (see here / right here); *voilà* = \"vois là\" (see there / over there).\n- Step 2: In careful usage, *voici* points to something close, *voilà* to something further. In real spoken French, *voilà* has overwhelmingly taken over — it's used for both situations and as a general utterance meaning \"there you go\" or \"and that's that.\"\n- Step 3: In café service: \"Voilà le café\" (here's the coffee — handing it to you) is by far more common. *Voici* is more formal/written or used when listing items (Voici la carte, voici le menu). At A1 level, treat them as nearly interchangeable but expect to hear *voilà* much more often.", "source": "Opus 4.7 ②", "_id": "opus_2_26"}, {"question": "You overhear someone say \"Je n'ai pas faim\" and \"Je n'ai pas de chance.\" What does the « de » tell you about the noun that follows? (2 steps)", "answer": "- Step 1: In negative sentences with certain expressions, « de » (not « des ») is used even when the noun would normally take an article:\n  + *Je n'ai pas **faim**.* — I'm not hungry. (faim = hunger, no article needed)\n  + *Je n'ai pas **soif**.* — I'm not thirsty.\n  + *Je n'ai pas **chaud**.* — I'm not hot.\n\n- Step 2: Compare with the café context:\n  + *Je n'ai pas **de** vin.* — I don't have (any) wine. (negating the noun directly)\n  + *Je n'ai pas **faim**.* — I'm not hungry. (negating a state, no article)\n\n- **Key insight:** Some nouns in French (like faim, soif, chance, peur) don't take articles after verbs like « avoir ». In negation, they just take « de » — but often don't need it at all!", "source": "MiniMax ①", "_id": "minimax_1_34"}, {"question": "A French person says \"Je prendrais bien un café.\" What does the \"-rais\" ending indicate, and how does this differ from \"Je prends un café\"? (2 tenses)", "answer": "- **\"Je prendrais bien un café.\"** — \"I would really like a coffee\" (conditional tense)\n- **\"Je prends un café.\"** — \"I am having/taking a coffee\" (present tense)\n\n+ **The \"-rais\" ending:**\n  - This is the **conditional mood** (like \"would\" in English)\n  - It expresses: wishes, polite requests, hypothetical situations\n\n+ **In café context:**\n  - *Je voudrais un café* = I would like (more polite than \"je veux\")\n  - *Je prendrais bien un café* = I could really go for a coffee (informal, expresses desire)\n  - *J'aimerais un café* = I would like (very polite)\n\n+ **The dialogue uses:** \"Je voudrais...\" and \"J'aimerais...\" — both conditional forms for politeness!", "source": "MiniMax ②", "_id": "minimax_2_38"}, {"question": "What happens to \"je\" before *avoir*, and what general phonetic principle does this illustrate? (2 steps)", "answer": "- Step 1: \"Je ai\" is never said — it always becomes **\"j'ai\"**. The *e* of \"je\" is dropped and replaced by an apostrophe before a vowel sound.\n- Step 2: This illustrates **elision**, a core French rule: short grammar words ending in *e* (je, ne, le, de, me, te, se, ce, que) drop their *e* before a word starting with a vowel or a silent *h*. The purpose is to avoid two vowel sounds clashing — French dislikes the awkward \"uh-ah\" hiatus and smooths it into \"zhay.\"", "source": "Opus 4.7 ②", "_id": "opus_2_4"}, {"question": "Why is French breakfast typically lighter than English breakfast, and what items make up \"une formule petit-déjeuner\"? (2 steps)", "answer": "- Step 1: A typical French *formule petit-déjeuner* includes a hot drink (*un café crème, un thé, un chocolat*), a fresh juice (*une orange pressée, un citron pressé*), and a baked item (*un croissant* or *une tartine* with butter and jam).\n- Step 2: This is lighter than a full English breakfast (eggs, bacon, beans, etc.) because French food culture concentrates substantial eating at *déjeuner* (lunch) and *dîner* (dinner). Breakfast is a quick wake-up meal, often eaten standing at a café counter (cheaper) or briefly at home. The carbs + caffeine + vitamin C combo is the typical formula.", "source": "Opus 4.7 ②", "_id": "opus_2_35"}, {"question": "Why might a French waiter say \"Nous n'avons pas de rosé d'Anjou, nous avons un rosé de Provence\" instead of just \"non\"? (Misconception probe) (2 steps)", "answer": "- Step 1: In French, it's considered more polite to give a **positive alternative** rather than just saying \"no\". This is a cultural norm — even when negating, you offer what IS available.\n\n- Step 2: This demonstrates two important grammar points simultaneously:\n  + The negative structure: *nous n'avons pas* (we don't have) → **n'** because followed by vowel\n  + The change from « un/une/des » to « de » in negative: *pas de rosé* (no rosé)\n  + But note: when the negative is followed by a specific item name (like \"rosé de Provence\"), you can keep the article: *un rosé de Provence* — because you're now affirming what you DO have\n\n- This is why simple \"yes/no\" answers are less common in French customer service — the negative is often combined with an alternative.", "source": "MiniMax ①", "_id": "minimax_1_13"}, {"question": "A student writes \"Je suisallant au café.\" What is wrong with this sentence? How should it be written correctly, and what is the rule for the verb \"aller\"? (1 correction)", "answer": "- **Incorrect:** *Je suisallant au café.* (two words wrongly joined)\n\n- **Correct:** **Je vais au café.** (I am going to the café)\n\n+ **The rule for \"aller\" (to go):**\n  - The present tense of \"aller\" is irregular: je vais, tu vas, il/elle va, nous allons, vous allez, ils/elles vont\n  - It does NOT use the \"-ing\" form (aller + -ant is not used for present continuous!)\n\n+ **How to express \"going to\" in French:**\n  - Use the present tense + destination: *Je vais au café* (I go/am going to the café)\n  - NOT: *Je suis allant* (this doesn't exist in normal French!)\n\n+ **Common mistake:** Beginners often try to use \"aller\" like English \"to be going\" — but French just uses the simple present: *Je vais* = I go / I'm going.", "source": "MiniMax ②", "_id": "minimax_2_23"}, {"question": "Where does the adjective go relative to the noun in phrases like \"salade verte\" and \"saumon grillé,\" and is this the same as English? (2 steps)", "answer": "- Step 1: In French, most descriptive adjectives go **AFTER** the noun: *une salade verte* (a green salad), *un saumon grillé* (a grilled salmon), *des légumes cuits* (cooked vegetables), *une orange pressée* (a squeezed orange = fresh juice).\n- Step 2: This is the opposite of English, where adjectives go before the noun. Beginners must consciously flip their word order. A small set of common adjectives (petit, grand, bon, beau, jeune…) do go BEFORE the noun, but colours, shapes, nationalities, and most descriptive adjectives (including past-participle-style ones like *grillé*, *pressé*, *cuit*) follow the noun.", "source": "Opus 4.7 ②", "_id": "opus_2_10"}, {"question": "Name the numbers 0–10 in French, and point out the pronunciation traps a beginner should know. (3 steps)", "answer": "- Step 1: 0 zéro · 1 un · 2 deux · 3 trois · 4 quatre · 5 cinq · 6 six · 7 sept · 8 huit · 9 neuf · 10 dix.\n- Step 2: Traps:\n+ **un** rhymes with a nasal \"uh\" — not \"oon.\"\n+ **deux** has a rounded vowel like German *ö*, not \"duh.\"\n+ **six** and **dix** end in a \"s\" sound when said alone, but the *x* goes silent before a consonant (*six croissants* = \"see croissants\") and becomes a *z* sound before a vowel (*six oranges* = \"see-Zoranges\"). This is *liaison*.\n+ **sept** — the *p* is silent: \"set.\"\n- Step 3: Numbers are deceptively tricky because pronunciation shifts depending on what follows. Worth memorising spoken AND linked forms.", "source": "Opus 4.7 ②", "_id": "opus_2_16"}, {"question": "What does \"Sans beurre, s'il vous plaît\" tell us about how to make a special request in French? (3 steps)", "answer": "- Step 1: **Sans** = \"without.\" It's a preposition that introduces what you want excluded from your order. \"Sans beurre\" = without butter, \"sans sucre\" = without sugar, \"sans sel\" = without salt.\n- Step 2: Note that after *sans*, you typically use the noun **without an article** in fixed expressions (\"sans beurre,\" \"sans sucre\"). This parallels English \"without butter,\" not \"without the butter.\"\n- Step 3: Politeness wrap: still add *s'il vous plaît* at the end. Standard café phrasing: \"Une salade verte, sans vinaigrette, s'il vous plaît\" (a green salad without dressing, please). The opposite is **avec** (\"with\"): \"avec chantilly\" (with whipped cream).", "source": "Opus 4.7 ②", "_id": "opus_2_38"}, {"question": "Explain why *\"un croque-monsieur\"* uses *un* instead of *le* (the masculine definite article). (3 steps)", "answer": "- Step 1: *Un* is the masculine singular indefinite article, answering \"one/some\" questions. Here, *\"un croque-monsieur\"* = \"a croque-monsieur\" (one specific sandwich).\n- Step 2: *Le* would mean \"the croque-monsieur\" (specific known to both speakers): *\"Le croque-monsieur est trop salé\"* (This specific one is too salty).\n- Step 3: Rule reminder: Indefinite articles (*un/une/des*) introduce new items; definite articles (*le/la/les*) refer to previously mentioned items.", "source": "Qwen 3 ③", "_id": "qwen_3_1"}, {"question": "Explain the difference between *un/une/des* and *le/la/les* using café examples — when do you choose each? (3 steps)", "answer": "- Step 1: *Un, une, des* are **indefinite articles** = \"a, an, some.\" They introduce something unspecified or new, often something countable that you're picking out of many possibilities.\n+ \"Je voudrais **un** café\" — any coffee, just one of them.\n+ \"Il y a **des** croissants\" — some croissants exist.\n- Step 2: *Le, la, les* are **definite articles** = \"the.\" They refer to something specific, already known, or to a concept/category as a whole.\n+ \"Voici **le** café\" — here's THE coffee (the one you ordered).\n+ \"J'aime **le** café\" — I like coffee (in general, as a category).\n- Step 3: In a café order, the first mention is usually indefinite (\"Je voudrais **un** café\"), and when the server brings it back, they use the definite (\"Voici **le** café\") because now it's a specific identified object. This back-and-forth is everywhere in restaurant dialogues.", "source": "Opus 4.7 ②", "_id": "opus_2_7"}, {"question": "Synthesis: build the full polite sentence \"Excuse me, I would like a hot chocolate and a buttered tartine with jam, please.\" (3 steps)", "answer": "- Step 1: Opener: \"Excusez-moi\" or just go straight to \"Bonjour, monsieur/madame.\" Politeness phrase: *Je voudrais* (conditional of *vouloir*).\n- Step 2: Items:\n+ \"a hot chocolate\" → *un chocolat chaud* (masc sing noun, adjective agrees masc sing, adjective after noun).\n+ \"a buttered tartine with jam\" → *une tartine beurrée avec de la confiture*. Tartine = fem sing → *beurrée* (fem sing). *Avec* = with. *De la confiture* uses the partitive (a small amount of jam — a concept appearing later but worth previewing).\n- Step 3: Full sentence: **\"Bonjour, monsieur. Je voudrais un chocolat chaud et une tartine beurrée avec de la confiture, s'il vous plaît.\"** Note: greeting + title + polite verb + items with correct gender/number agreement + closing politeness.", "source": "Opus 4.7 ②", "_id": "opus_2_39"}, {"question": "What does the dialogue teach us about handling dietary restrictions in French? Give specific phrases from \"Une cliente difficile\". (1 step)", "answer": "- **Client's phrases:**\n  + *Je suis végétarienne!* — I'm a vegetarian! (declaring dietary requirement)\n  + *Je voudrais juste des légumes.* — I would just like vegetables.\n  + *Sans beurre, s'il vous plaît.* — Without butter, please.\n\n- **Server's phrases:**\n  + *Nous avons…* — We have… (offering alternatives)\n  + *Une assiette de…* — A plate of… (suggesting options)\n  + *Ah bon…* — Oh I see… (expressing surprise/polite acknowledgment)\n  + *Ah, les clients…* — Oh, the customers… (playful complaint!)\n\n- **Key phrases for dietary needs:**\n  + *Je suis allergique à…* — I'm allergic to…\n  + *Je ne mange pas de…* — I don't eat…\n  + *Je suis végétarien/végétarienne* — I'm (male/female) vegetarian", "source": "MiniMax ①", "_id": "minimax_1_40"}, {"question": "In the dialogue, the customer says \"Je voudrais aussi un verre d'eau, s'il vous plaît.\" Why is it \"un verre d'eau\" and not \"un verre de l'eau\"? Explain the grammar rule. (1 rule)", "answer": "- **Correct:** *un verre d'eau* (a glass of water)\n\n- **Why not \"de l'eau\"?** Because \"de + le\" contracts to **du** only when \"le\" is a specific, known thing. Here, we're talking about water in general (any water), not a specific glass of water.\n\n+ **The rule:**\n  - **de + le** = **du** (only before a *specific* masculine noun)\n  - **de + l'** = **de l'** (before any vowel)\n  - **de + la** = **de la** (before a specific feminine noun)\n  - **de + plural** = **de** (or **des** if there's an adjective)\n\n+ **With quantities (un verre de):** We use plain **de/d'** because we're describing \"a glass of\" some substance in general:\n  - *un verre d'eau* (water in general)\n  - *un verre de vin* (wine in general)\n  - *une bouteille d'aligoté* (aligoté in general)", "source": "MiniMax ②", "_id": "minimax_2_26"}, {"question": "In the phrase \"Je voudrais une formule à 12 euros,\" what does \"à\" mean, and why isn't it \"de 12 euros\"? Explain the grammatical construction. (1 preposition)", "answer": "- **\"À 12 euros\"** = \"at 12 euros\" (the price)\n\n- **Why \"à\" not \"de\"?**\n  - **\"À\"** indicates a **price/rate** — \"at\" a price\n  - **\"De\"** indicates a **quantity of** something\n\n+ **Compare:**\n  - *une formule à 12 euros* = a set menu **at** 12 euros (the price)\n  - *un verre de vin* = a glass **of** wine (the quantity/substance)\n\n+ **Same pattern:**\n  - *un café à 3 euros* (coffee at 3 euros — the price)\n  - *une table pour 4 personnes* (a table for 4 people)\n  - *une salle à manger* (a dining room — \"room for eating\")\n\n+ **From the menu:** \"Formule à 12 euros\" = set menu at 12 euros", "source": "MiniMax ②", "_id": "minimax_2_32"}, {"question": "What's the difference between \"il y a\" and \"il n'y a pas de,\" and how do you use them? (3 steps)", "answer": "- Step 1: **Il y a** = \"there is / there are\" — a fixed expression that doesn't change with singular or plural. \"Il y a un plat du jour\" (there's a dish of the day), \"Il y a des croissants\" (there are croissants).\n- Step 2: The negative is **il n'y a pas de…** — \"there isn't / there aren't any.\" Note the elision: *ne* → *n'* before the *y*. And again, the indefinite article (un/une/des) collapses to **de** after the negation: \"Il n'y a pas **de** tarte,\" \"Il n'y a pas **d'**omelette.\"\n- Step 3: Functionally, this is how you ask and answer about availability in a café — \"Il y a un plat du jour ?\" / \"Non, il n'y a pas de plat du jour aujourd'hui.\" It's high-frequency vocabulary.", "source": "Opus 4.7 ②", "_id": "opus_2_12"}, {"question": "Why does \"un café\" become \"pas **de** café\" in the negative, and what's the intuition behind this rule? (3 steps)", "answer": "- Step 1: After a negative verb, the indefinite articles *un*, *une*, *des* all collapse into a single form: **de** (or **d'** before a vowel). So:\n+ J'ai un café → Je n'ai pas **de** café.\n+ J'ai une salade → Je n'ai pas **de** salade.\n+ J'ai des frites → Je n'ai pas **de** frites.\n- Step 2: The intuition: in the affirmative, *un/une/des* indicate \"some quantity\" of the thing. In the negative, you're saying \"zero quantity exists\" — there's no longer any countable amount to mark with un/une/des. The neutral preposition *de* signals \"of (none).\"\n- Step 3: Important boundary: this rule applies to **indefinite** articles only. Definite articles (*le, la, les*) do NOT change in the negative — \"Je n'aime pas le café\" stays as is, because you're still talking about coffee as a defined concept, not a quantity.", "source": "Opus 4.7 ②", "_id": "opus_2_6"}, {"question": "Conjugate the verb *avoir* in the present tense (all six persons), and explain why it's one of the most important verbs to memorise first in French. (3 steps)", "answer": "- Step 1: The full conjugation is:\n+ j'ai\n+ tu as\n+ il / elle / on a\n+ nous avons\n+ vous avez\n+ ils / elles ont\n- Step 2: It's irregular — you cannot predict these forms from any rule. The endings don't follow a pattern, so they must be memorised as a block.\n- Step 3: *Avoir* matters enormously because (a) it's used constantly to express possession (\"J'ai une table\"), (b) it's the auxiliary verb for forming most past tenses (*j'ai mangé* = I ate), and (c) it appears in many idioms about feelings/states (*avoir faim* = to be hungry, *avoir 20 ans* = to be 20 years old). Without *avoir*, you can't function in French.", "source": "Opus 4.7 ②", "_id": "opus_2_3"}, {"question": "What is the difference between « une eau minérale plate » and « une eau minérale gazeuse »? Give French brand examples. (1 step)", "answer": "- **Eau plate** — still water (no bubbles)\n  + Examples: **Évian**, **Vittel**, **Contrex**\n  + Often served in a carafe (*une carafe d'eau*) at restaurants\n\n- **Eau gazeuse** — sparkling water (with bubbles)\n  + Examples: **Perrier**, **Badoit**, **San Pellegrino**\n  + Note: In France, sparkling water is very popular and is often ordered at meals\n\n- This distinction is important because some people have strong preferences — and it's considered perfectly normal to specify which type you want!", "source": "MiniMax ①", "_id": "minimax_1_16"}, {"question": "Why is « Je pourrais avoir… » considered more polite than « Je veux… »? (Cultural insight) (1 step)", "answer": "- **« Je veux… »** is direct and can sound demanding — \"I want…\"\n  + While grammatically correct, it can seem rude in customer service\n\n- **« Je pourrais avoir… »** literally means \"Could I have…\" — it's the **conditional mood** (pourrais = could)\n  + This softens the request into something more like a question/possibility\n  + It's much more polite and common in French service situations\n\n- **Similar polite patterns:**\n  + *Je voudrais…* — I would like (conditional)\n  + *J'aimerais…* — I would like (conditional)\n  + *Je pourrais avoir…* — Could I have… (conditional)\n\n- **Cultural insight:** French politeness often involves making requests sound less direct by using the conditional mood.", "source": "MiniMax ①", "_id": "minimax_1_42"}, {"question": "A beginner says \"J'ai hunger.\" Why is this wrong, and what is the correct way to say \"I am hungry\" in French? (Misconception probe) (1 step)", "answer": "- **The error:** Direct translation from English — trying to say \"I have hunger\" literally\n\n- **The correct French:** **« J'ai faim »** — literally \"I have hunger\" (but it WORKS differently!)\n\n- **Key insight:** In French, « avoir » is used with certain nouns to express states that English expresses with \"to be\":\n  + *avoir faim* — to be hungry (literally \"to have hunger\")\n  + *avoir soif* — to be thirsty (\"to have thirst\")\n  + *avoir chaud* — to be hot\n  + *avoir froid* — to be cold\n  + *avoir peur* — to be afraid\n  + *avoir raison* — to be right\n  + *avoir tort* — to be wrong\n\n- **This is a false friend trap:** Don't use \"to be + hungry\" → use \"avoir + faim\"!", "source": "MiniMax ①", "_id": "minimax_1_47"}, {"question": "Why does French politeness require adding \"madame\" or \"monsieur\" to \"Bonjour\" in service situations, while English speakers usually just say \"Hi\"? (3 steps)", "answer": "- Step 1: French service culture treats the customer-server interaction as a brief but formal relationship between two adults, both of whom deserve acknowledgement. The form is \"Bonjour, madame\" / \"Bonjour, monsieur\" / \"Bonjour, mademoiselle\" (the last increasingly rare and considered outdated for adult women).\n- Step 2: Saying just \"Bonjour\" without the title is acceptable but slightly less polite — like nodding instead of fully greeting someone. Adding *madame/monsieur* completes the social formula.\n- Step 3: The same applies on departure: \"Au revoir, madame\" — not just \"Au revoir.\" This bidirectional politeness frames the encounter as a small dignified exchange, which is why French service can feel more formal than Anglo-Saxon norms.", "source": "Opus 4.7 ②", "_id": "opus_2_25"}, {"question": "In French, what is the difference between « un jus d'orange » and « une orange pressée »? (1 step)", "answer": "- **Un jus d'orange** — packaged/orange juice from a carton or bottle (industrial, processed)\n  + Example: *un jus de pomme* (apple juice), *un jus de raisin* (grape juice)\n\n- **Une orange pressée** — freshly squeezed orange juice (made to order at the café)\n  + This is a premium item, often more expensive\n  + Similarly: *un citron pressé* (freshly squeezed lemon)\n\n- **Key insight:** In French cafés, « pressé » specifically means \"freshly squeezed to order\", while « jus » usually means packaged juice. This is an important distinction for ordering!", "source": "MiniMax ①", "_id": "minimax_1_17"}, {"question": "What forms do *le* and *la* take before a vowel or silent *h*, and why?", "answer": "Both *le* and *la* become **l'** before a vowel or silent *h*. So you say **l'omelette** (not \"la omelette\"), **l'aligoté** (not \"le aligoté\"), and **l'eau** (not \"la eau\"). This is elision again — the same phonetic instinct that turns *je* into *j'* and *ne* into *n'*. French avoids two vowel sounds bumping into each other, so the article's vowel drops out and an apostrophe takes its place. Note: *les* never elides — it keeps its full form because it ends in *s*, which links phonetically to the next word (this is called *liaison*: \"les_omelettes\" sounds like \"lay-zomelettes\").", "source": "Opus 4.7 ②", "_id": "opus_2_8"}, {"question": "In French, how do you say \"I would like the coffee, not the tea\"? What grammar points does this sentence demonstrate? (2 steps)", "answer": "- Step 1: The sentence\n  + *Je voudrais le café, pas le thé.*\n\n- Step 2: Grammar points demonstrated:\n  + **Definite articles** « le » and « le » — when you mean SPECIFIC items (the coffee, the tea)\n  + **« Pas le/la/les »** — the negative word « pas » can be used with definite articles to mean \"not the…\"\n    - *Je ne veux pas le café* — I don't want the coffee\n    - *Je veux le café, pas le thé* — I want coffee, not tea\n  + **Word order:** Subject + verb + object, then comma + \"pas\" + alternative\n\n- **Compare with indefinite:**\n  + *Je voudrais un café, pas une tisane.* (an herbal tea — indefinite)", "source": "MiniMax ①", "_id": "minimax_1_57"}, {"question": "In the phrase « un sandwich poulet-crudités », what does the hyphen tell you about the structure? What about in « un jus de raisin »? (Edge case) (1 step)", "answer": "- **With hyphen (—):** Indicates a **compound noun** — two or more words acting as one concept\n  + *poulet-crudités* = chicken + crudités as a single sandwich type\n  + *jambon-beurre* = ham-butter (the classic sandwich)\n  + *chèvre-chaud* = hot goat cheese (in salad)\n\n- **With « de »:** Indicates the **ingredient/origin** of something\n  + *jus de raisin* = juice of/from grapes (grape juice)\n  + *tarte aux pommes* = tart of/with apples\n  + *salade au chèvre* = salad with goat cheese\n\n- **Key difference:**\n  + **Hyphen** = compound, it's a fixed combination (the name of a dish)\n  + **De/à** = describes what's in it or what it's made from", "source": "MiniMax ①", "_id": "minimax_1_33"}, {"question": "Synthesis question: a server says \"Désolé, il n'y a pas de saumon, mais nous avons une truite. Et comme boisson ?\" — translate and explain every grammar feature in this short exchange. (4 steps)", "answer": "- Step 1: **\"Désolé, il n'y a pas de saumon\"** = \"Sorry, there's no salmon.\" Features: *il n'y a pas de* is the negative of *il y a* with the article *du* (here actually originally *un* or implied partitive) collapsed to *de* after negation; *n'* shows elision of *ne* before *y*.\n- Step 2: **\"mais nous avons une truite\"** = \"but we have a trout.\" Features: *nous avons* is the *nous* form of *avoir*; *une truite* uses feminine indefinite article (truite is feminine).\n- Step 3: **\"Et comme boisson ?\"** = \"And as a drink? / What about a drink?\" Features: *comme* here means \"as / for / by way of\" — a fixed café phrase to ask what category of thing the customer wants next. Note there's no article before *boisson* in this construction.\n- Step 4: Putting it together, the server (a) apologises, (b) offers an alternative using the contrast pattern, (c) moves the order forward by asking the next question. This is the rhythm of a French café service exchange — refuse, offer, advance.", "source": "Opus 4.7 ②", "_id": "opus_2_34"}, {"question": "Explain adjective agreement in *\"salade niçoise\"* vs. *\"omelette chaude\"*. (4 steps)", "answer": "- Step 1: Feminine singular adjectives typically add *-e*: *chaud → chaude*.\n- Step 2: National adjectives like *niçoise* (from Nice) have irregular forms: *niçois* (masc) → *niçoise* (fem).\n- Step 3: Compound adjectives maintain original gender: *\"une glace à la vanille\"* (vanilla ice cream – \"vanille\" remains feminine).\n- Step 4: Cultural insight: Many food-related adjectives (like wine descriptors) retain Latin forms: *\"un vin sec\"* (dry wine – masculine regardless of wine gender).", "source": "Qwen 3 ③", "_id": "qwen_3_3"}, {"question": "In French, why do we say \"un plat du jour\" but \"un plat de résistance\"? What does \"du\" mean versus \"de\"? (2 phrases)", "answer": "- **\"Un plat du jour\"** = \"Dish of the day\" — **du** = de + le\n  - This means \"the dish\" (specific, known) of today\n  - *du* is a contraction of **de + le** (of the)\n\n- **\"Un plat de résistance\"** = \"Main dish\" (literally \"dish of resistance\")\n  - Here \"de\" stays as \"de\" because it's followed by a noun that's not \"le\"\n  - *de résistance* = of resistance/substance\n\n+ **The pattern:**\n  - **du** = de + le (specific, the)\n  - **de la** = de + la (specific, the — feminine)\n  - **de** = plain de (general/abstract)\n  - **des** = de + les (the — plural)\n\n+ **From the dialogue:** *\"Il y a un plat du jour : un lapin à la moutarde.\"* — the dish of the day is specific to that day!", "source": "MiniMax ②", "_id": "minimax_2_41"}, {"question": "What does \"le plat du jour\" mean and why is it a useful thing for a customer to ask about? (2 steps)", "answer": "- Step 1: **Le plat du jour** = \"the dish of the day\" — a daily special chosen by the chef, often using fresh seasonal ingredients, and usually offered at a slightly lower price than the regular menu equivalents.\n- Step 2: It's useful because (a) it tells you what's fresh/recommended that day, (b) it's often the best value, and (c) it speeds up the kitchen since they're prepared to make it in volume. Asking \"Quel est le plat du jour ?\" is standard customer behaviour in France.", "source": "Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "How do you ask for the bill in a French café? Give at least 3 different ways, from most polite to least formal. (3 phrases)", "answer": "- **Most polite:** *\"L'addition, s'il vous plaît.\"* (The check, please.)\n- **Polite:** *\"La carte, s'il vous plaît.\"* (The menu/card, please — often used to ask for the bill too!)\n- **Casual:** *\"C'est combien?\"* (How much is it?)\n- **Very casual:** *\"On paie?\"* (Do we pay? / Shall we pay?)\n\n+ **Common phrase:** *\"Faire l'addition\"* = to make the bill (what the server does)\n\n+ **What NOT to say:** Don't say \"La note, s'il vous plaît\" — this sounds very abrupt in French! \"Note\" is more like \"the note/memo.\"\n\n+ **In the dialogue:** No one asks for the bill explicitly, but in real cafés, \"L'addition, s'il vous plaît!\" is the standard polite request.", "source": "MiniMax ②", "_id": "minimax_2_30"}, {"question": "What does \"une orange pressée\" literally mean, and what's actually in the glass? (2 steps)", "answer": "- Step 1: Literally, *pressée* means \"pressed\" or \"squeezed\" (feminine of *pressé*, the past participle of *presser*). So \"une orange pressée\" = \"a squeezed orange.\"\n- Step 2: In practice, this is freshly squeezed orange juice, prepared on the spot at the café — not bottled juice. The name describes the action: an orange has been pressed, and you drink the result. Same logic for **un citron pressé** = fresh lemon juice (lit. \"a squeezed lemon\"), usually served with water and sugar on the side so you mix it yourself.", "source": "Opus 4.7 ②", "_id": "opus_2_11"}, {"question": "What is the difference between \"une orange pressée\" and \"une citron pressé\"? Why does one adjective end in -ée and the other in -é? (2 drinks)", "answer": "- **\"Une orange pressée\"** — a squeezed orange (freshly squeezed orange juice)\n- **\"Un citron pressé\"** — a squeezed lemon (freshly squeezed lemon juice)\n\n- **Why the difference in endings?**\n  - **-ée** = feminine past participle (because \"orange\" is feminine → the adjective agrees)\n  - **-é** = masculine past participle (because \"citron\" is masculine → no -e ending needed)\n\n+ **The grammar:** \"pressé(e)\" comes from the verb \"presser\" (to press/squeeze). When used as an adjective, it agrees with the noun:\n  - *une orange pressée* (feminine → -ée)\n  - *un citron pressé* (masculine → -é)\n\n+ **Same pattern:** *un café crème* (masculine) but the adjective \"crème\" doesn't change because it's used as a noun/adjective combo.", "source": "MiniMax ②", "_id": "minimax_2_16"}, {"question": "In \"Je ne voudrais pas d'omelette\", why is there an apostrophe after the 'd'? What would happen if you wrote \"Je ne voudrais pas de omelette\"? (Edge case) (1 step)", "answer": "- **The apostrophe** appears because « de » becomes « d' » before a vowel sound\n  + *Je ne voudrais pas d'omelette* — I wouldn't like (any) omelette\n\n- **If you wrote \"de omelette\":**\n  + This is grammatically incorrect in standard written French\n  + The apostrophe contraction is mandatory before vowels\n  + You'd sound unnatural if speaking: \"de-omelette\" runs together badly\n\n- **Similar examples:**\n  + *pas d'eau* (not \"de eau\")\n  + *pas d'orange* (not \"de orange\")\n  + *pas d'aligoté* (not \"de aligoté\")\n\n- **Key rule:** « De » → « d' » before ANY word starting with a vowel (a, e, i, o, u) or silent 'h'.", "source": "MiniMax ①", "_id": "minimax_1_52"}, {"question": "What's the pattern for 11–16 vs 17–19 in French, and what does this tell you about how numbers are built? (3 steps)", "answer": "- Step 1: 11–16 are single words: **onze, douze, treize, quatorze, quinze, seize**.\n- Step 2: 17–19 switch to a compound pattern: **dix-sept** (10+7), **dix-huit** (10+8), **dix-neuf** (10+9). Literally \"ten-seven, ten-eight, ten-nine.\"\n- Step 3: This break at 17 reflects an old Latin pattern preserved in French: numbers up to 16 were short Latin-derived single words, while 17–19 became transparent additions to \"ten.\" It's the same logic English uses for \"thirteen-nineteen\" (suffix *-teen* = ten), but French does it more openly with a hyphen. After 20 the pattern continues: 21 = *vingt et un*, 22 = *vingt-deux*, etc.", "source": "Opus 4.7 ②", "_id": "opus_2_17"}, {"question": "What's the difference between *une carafe d'eau* and *une bouteille d'eau* in a French café, and which is free? (3 steps)", "answer": "- Step 1: **Une carafe d'eau** = a jug/pitcher of tap water. It is **free** by law in any French establishment that serves food — you have a right to ask for it.\n- Step 2: **Une bouteille d'eau** = a bottle of mineral water (Évian, Vittel = *plate/still*; Perrier, Badoit = *gazeuse/sparkling*). This costs money.\n- Step 3: Why this matters: in France, ordering \"une carafe d'eau\" alongside your meal is completely normal and not seen as cheap. Tourists who don't know this often pay for bottled water unnecessarily. The polite formula: \"Une carafe d'eau, s'il vous plaît.\"", "source": "Opus 4.7 ②", "_id": "opus_2_21"}, {"question": "A common misconception: students think \"des\" is always \"some\" and translate \"I have some friends\" as \"J'ai des amis.\" But when does French use \"des\" where English uses nothing? (3 steps)", "answer": "- Step 1: In English, plural indefinites often go bare: \"I have friends,\" \"There are croissants,\" \"She wants vegetables.\" No article.\n- Step 2: In French, you **cannot** drop the article. Every noun needs one. So plural indefinites take **des**: \"J'ai **des** amis,\" \"Il y a **des** croissants,\" \"Elle veut **des** légumes.\"\n- Step 3: This is a structural difference, not a translation choice. *Des* doesn't always carry the meaning of \"some\" — sometimes it's just the grammatical placeholder for \"plural indefinite.\" A beginner habit to drill: never let a French noun float without an article.", "source": "Opus 4.7 ②", "_id": "opus_2_30"}, {"question": "Why does Virginie in the dialogue exclaim \"Quelle horreur !\" when offered frites, and what does this expression convey? (2 steps)", "answer": "- Step 1: Literally \"Quelle horreur !\" = \"What a horror!\" It's a strong exclamation of disgust or distaste — much stronger than \"no thanks.\"\n- Step 2: Virginie uses it because, as a vegetarian seeking healthy cooked vegetables, being offered a plate of fries feels like the opposite of what she wants — it's culturally read as junk/comfort food, not a proper vegetable dish. The phrase is everyday colloquial French and signals genuine emotional reaction. Useful for café dialogues to express revulsion politely-ish (it's expressive, not vulgar).", "source": "Opus 4.7 ②", "_id": "opus_2_20"}, {"question": "What is the structural template for negation in French, and how do you negate \"j'ai un café\" step by step? (3 steps)", "answer": "- Step 1: The template is **ne + conjugated verb + pas**. The two pieces wrap around the verb like brackets.\n- Step 2: Applied to \"j'ai un café\": insert *ne* before *ai* and *pas* after. But *ne* + *ai* triggers elision because *ai* starts with a vowel, so *ne → n'*.\n- Step 3: Then the indefinite article *un* changes to **de** in the negative (this is a separate rule). Final result: **\"Je n'ai pas de café.\"**\n\nTakeaway: negation involves two transformations at once — wrapping with *ne…pas* AND changing *un/une/des* to *de*.", "source": "Opus 4.7 ②", "_id": "opus_2_5"}, {"question": "What's the difference between \"Bonjour\" and \"Bonsoir,\" and when does the switch happen? (2 steps)", "answer": "- Step 1: **Bonjour** literally = \"good day\" — used from morning until roughly late afternoon. **Bonsoir** = \"good evening\" — used from late afternoon/early evening onwards.\n- Step 2: The switch point is fuzzy but generally around 18 h (6 PM). Using \"Bonjour\" at 9 PM sounds odd; using \"Bonsoir\" at 10 AM sounds odd. When in doubt before sunset, default to \"Bonjour.\" Both are essential — French politeness *requires* a greeting before any service interaction; walking into a shop and saying \"Je voudrais…\" without \"Bonjour madame/monsieur\" first is considered rude.", "source": "Opus 4.7 ②", "_id": "opus_2_24"}, {"question": "A customer says \"Je take un café.\" What is wrong, and what is the correct way to say \"I am taking/having a coffee\"? (1 correction)", "answer": "- **Incorrect:** *Je take un café.* (English word inserted!)\n\n- **Correct:** *Je prends un café.* (I am taking/having a coffee)\n\n+ **The verb \"prendre\" (to take/have):**\n  - je prends, tu prends, il/elle prend, nous prenons, vous prenez, ils/elles prennent\n  - This is a common verb used when ordering/having food/drinks\n\n+ **Why \"prendre\" not \"take\"?** In French, you \"take\" a coffee, a menu, a seat — it's a different verb use than English:\n  - *Je prends un café* = I'm having/taking a coffee\n  - *Je prends la carte* = I'll take the menu\n  - *Je prends le menu* = I'll take the set menu\n\n+ **From the dialogue:** The customer uses \"je voudrais\" (I would like), not \"je take\" — which is correct!", "source": "MiniMax ②", "_id": "minimax_2_34"}, {"question": "Why do French speakers typically say \"Je voudrais un café\" rather than \"Je veux un café\" when ordering, and what does the form *voudrais* tell us grammatically? (3 steps)", "answer": "- Step 1: \"Je veux\" means \"I want\" — it's a blunt, direct statement of desire. In a service context (café, shop, restaurant), this sounds rude or childish in French, the equivalent of a customer saying \"I want a coffee\" instead of \"I'd like a coffee.\"\n- Step 2: \"Je voudrais\" is the conditional form of *vouloir* and literally translates to \"I would like.\" The conditional softens the request into a polite hypothetical — you're not demanding, you're expressing a wish.\n- Step 3: Politeness in French service language is non-optional at A1. Standard polite alternatives are also **J'aimerais** (\"I would like\" from *aimer*) and **Je pourrais avoir** (\"Could I have\"). All three soften the request; \"Je voudrais\" is the most common at a café.\n\nTakeaway: use the conditional when ordering — it's the linguistic equivalent of saying \"please\" before you've even gotten there.", "source": "Opus 4.7 ②", "_id": "opus_2_1"}, {"question": "What is the difference between « un plat » and « une assiette »? (Misconception probe) (1 step)", "answer": "- **Une assiette** — the plate you eat FROM (the personal plate at your place setting)\n  + Example: *La cliente mange dans son assiette.* (The customer eats from her plate.)\n\n- **Un plat** — the serving dish that food is served IN (the communal dish placed on the table)\n  + Example: *Le serveur apporte un plat de frites.* (The server brings a plate of fries.)\n\n- **Simple test:** If you're eating FROM it, it's une assiette. If you're serving food IN it or presenting it, it's un plat.", "source": "MiniMax ①", "_id": "minimax_1_22"}, {"question": "Explain why French wines are often named after the region where they're produced, using examples from the chapter: muscadet, aligoté, sancerre. (3 wines)", "answer": "- **French wine naming tradition:** Most French wines are named after their **region of origin**, not after the grape variety. This is a quality designation system — Appellation d'Origine Contrôlée (AOC).\n\n+ **Examples from the chapter:**\n  - **Muscadet** — From the Loire Valley (Muscadet sur Lie)\n  - **Aligoté** — From Burgundy (Bourgogne) — actually named after the grape!\n  - **Sancerre** — From the Loire Valley (white wine region)\n\n+ **Why this matters:** When you order \"un muscadet,\" you're asking for a wine from that specific region. It's like saying \"a Champagne\" (from Champagne region) vs. \"a sparkling wine.\"\n\n+ **Regions mentioned:**\n  - Loire: muscadet, sancerre, aligoté (white wines)\n  - Burgundy: chablis, pommard (reds/whites)\n  - Bordeaux: graves, saint-émilion (reds)\n  - Provence: bandol, côtes-de-provence (rosés)", "source": "MiniMax ②", "_id": "minimax_2_22"}, {"question": "Mini-exercise: how do you say \"I don't have any omelettes\" and \"I don't have the omelette\" — and why are these different? (3 steps)", "answer": "- Step 1: \"I don't have any omelettes\" → **\"Je n'ai pas d'omelettes.\"** Here the indefinite *des omelettes* collapses to *d'omelettes* (with elision before *o*) under the negative-article rule.\n- Step 2: \"I don't have the omelette\" → **\"Je n'ai pas l'omelette.\"** Here the article is **definite** (*l'* for *la* before vowel), so it does NOT change — definite articles survive negation untouched.\n- Step 3: Why the asymmetry? Indefinites (un/une/des) indicate quantity, and negation says \"zero quantity\" — so the quantity marker collapses. Definites (le/la/les) identify a specific known thing, and that identification doesn't depend on quantity — so the article stays. The choice between *d'* and *l'* signals whether you mean \"any omelette\" or \"the specific omelette.\"", "source": "Opus 4.7 ②", "_id": "opus_2_37"}, {"question": "What is the difference between « un peu de » and « pas de »? How would you use each in a café context? (1 step)", "answer": "- **« Pas de »** = none / not any (complete absence)\n  + *Je n'ai pas de sucre.* — I have no sugar / I don't have any sugar.\n\n- **« Un peu de »** = a little bit of (small quantity, but SOME exists)\n  + *Je voudrais un peu de sucre dans mon café.* — I'd like a little sugar in my coffee.\n\n- **In café context:**\n  + *Il n'y a pas de crème dans mon café.* — There's no cream in my coffee. (complete absence)\n  + *Je voudrais un peu de lait.* — I'd like a little milk. (requesting some)\n\n- **Key difference:** « Pas de » = zero. « Un peu de » = some (but not a lot).", "source": "MiniMax ①", "_id": "minimax_1_44"}, {"question": "In French, what is the purpose of the « -s » on adjectives like « verts » in « des haricots verts »? Is it pronounced? (Edge case) (1 step)", "answer": "- The **-s** on « verts » indicates **masculine plural** (agreement with plural nouns). However:\n\n- **Pronunciation:** In most cases, the **-s is NOT pronounced** in French — it's a silent letter.\n  + *des haricots verts* — pronounced \"ver\" (like \"vair\"), NOT \"verss\"\n\n- **When IS the 's' pronounced?**\n  + When there's **liaison** (the next word starts with a vowel): *les verts arbres* → \"ver-zarbres\"\n  + In the plural of numbers: *trois* vs. *les trois*\n\n- **Key insight:** Written French shows agreement clearly, but spoken French often doesn't distinguish singular from plural. Context (like « des ») tells you it's plural.", "source": "MiniMax ①", "_id": "minimax_1_23"}, {"question": "A French customer says \"Je voudrais juste des légumes.\" Then they say \"Sans beurre, les légumes, s'il vous plaît!\" What does \"des\" mean here, and why is it NOT \"de\" in the second sentence? Explain. (2 sentences)", "answer": "- **\"Des légumes\"** = some vegetables (indefinite plural)\n  - Here \"des\" is the plural indefinite article (un/une/des), meaning \"some\" — the customer wants vegetables but hasn't specified how many.\n\n- **\"Les légumes\"** = the vegetables (definite article)\n  - Here \"les\" refers to **the specific vegetables** already mentioned — the ones the customer just ordered. In French, when you repeat a noun already introduced, you switch to the definite article.\n\n+ This is a key concept: French uses \"les\" to refer back to something already mentioned or known, whereas English might say \"them\" or \"the.\"", "source": "MiniMax ②", "_id": "minimax_2_7"}, {"question": "Explain why « le croque-monsieur » has an '-s' even though it's one sandwich. Is it plural? (Misconception probe) (1 step)", "answer": "- **The '-s' is NOT a plural marker** — it's part of the name!\n\n- **« Croque-monsieur »** is a **compound noun** — it was named after a person (or type of person), similar to how we'd say \"a John Doe\" or \"a Tom, Dick, or Harry\"\n  + The '-mister' part (monsieur) is built into the word\n  + Even one sandwich = *un croque-monsieur* (not \"un croque-monsieur\")\n\n- **Similar examples:**\n  + *un porte-clés* — a keyring (not \"des portes-clés\" for one)\n  + *un tire-bouchon* — a corkscrew\n  + *un coupe-ongles* — nail clippers\n\n- **Rule:** Compound nouns in French often keep their internal '-s' even when singular. You need to learn them as fixed expressions!", "source": "MiniMax ①", "_id": "minimax_1_54"}, {"question": "Quick recall: list the four indefinite article forms (un, une, des, and the negative form), and give a one-word example of each. (2 steps)", "answer": "- Step 1: The four forms:\n+ **un** (masc sing) → un café\n+ **une** (fem sing) → une salade\n+ **des** (plural, both genders) → des frites\n+ **de / d'** (after negation, all genders/numbers) → pas de café, pas d'omelette\n- Step 2: Conceptually, French has THREE indefinite articles in the affirmative (un/une/des), but they ALL collapse to a single form (*de/d'*) in the negative. This collapse is one of the most distinctive features of French negation and trips up English speakers because English doesn't change \"a\" or \"some\" in negatives (\"I don't have a car\" — the article stays).", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "In the phrase \"Je suis végétarienne,\" what does \"suis\" mean, and why is the adjective \"végétarienne\" in feminine form? (1 sentence)", "answer": "- **\"Suis\"** = am (from the verb \"être\" = to be)\n- **\"Je suis végétarienne\"** = I am (a) vegetarian (feminine)\n\n+ **Why feminine?**\n  - The speaker is a **woman** (Virginie, from the dialogue)\n  - Adjectives must agree with the person (gender + number)\n  - Masculine: *végétarien* · Feminine: *végétarienne* (add -ne)\n\n+ **If a man said it:** *Je suis végétarien.* (no -ne ending)\n\n+ **From the dialogue:** *\"— Non merci, je suis végétarienne !\" — Ah… Alors, nous avons un saumon grillé…* (The server, a man, would say \"végétarien\" if he were vegetarian!)\n\n+ **This is another example of adjective agreement — the adjective matches the gender of the person described!**", "source": "MiniMax ②", "_id": "minimax_2_44"}, {"question": "Explain the difference between *\"une tarte aux pommes\"* and *\"une tarte aux poires\"* in terms of adjective placement. (2 steps)", "answer": "- Step 1: *aux pommes* = \"with apples\" (plural prepositional phrase). Food composition in French uses prepositions (*à*, *de*, *avec*) plus noun.\n- Step 2: No adjective agreement needed because prepositional phrases retain base form: *tarte aux pommes*, *tarte aux poires*, *tarte avec des fraises* (tart with strawberries). Compare with *tarte chaude* (adjective agrees).", "source": "Qwen 3 ③", "_id": "qwen_3_7"}], "models": {"qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "What are the three main meals in French and their typical times? (3 steps)", "answer": "- Step 1: In French culture, the three main meals are petit-déjeuner, déjeuner, and dîner.\n- Step 2: The petit-déjeuner is usually eaten around 7h (7am), the déjeuner around 12h (noon), and the dîner around 20h (8pm).\n+ In many French households, the dîner tends to be lighter than the déjeuner\n+ The timing may vary based on regional differences and personal habits\n\n- Step 3: These meal times reflect traditional French eating patterns, though modern lifestyles may cause variations in these classic timings.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "What are the basic table items you need to know for a café setting in French? (4 steps)", "answer": "- Step 1: For eating, you'll need un plat (plate), une assiette (plate), un couteau (knife), une cuiller/cuillère (spoon), and une fourchette (fork).\n- Step 2: For drinking, you'll use un verre (glass) or possibly la tasse (cup) for coffee/tea.\n+ The French typically use a small spoon (cuillère à café) for coffee or tea\n+ A larger spoon (cuillère à soupe) would be used for soup but not common in cafes\n- Step 3: You'll interact with le serveur (male waiter) or la serveuse (female waiter) who brings you la carte (menu).\n- Step 4: At the end, the client(e) (customer) might ask for l'addition (the bill), often saying \"L'addition, s'il vous plaît!\"", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "How would you describe coffee in French using adjective agreement rules? (4 steps)", "answer": "- Step 1: The noun \"café\" is masculine singular, so the adjective must match this gender and number.\n- Step 2: For a black coffee: \"un café noir\" - \"noir\" takes the masculine singular form.\n- Step 3: For a coffee with milk: \"un café au lait\" - no adjective agreement needed since it's a prepositional phrase.\n- Step 4: If you had multiple coffees, you'd use the plural: \"des cafés noirs\" - both noun and adjective become plural.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "What are the key vocabulary terms for common beverages in a French café? (4 steps)", "answer": "- Step 1: For water: une eau minérale plate (still mineral water) like Évian or Vittel, and une eau minérale gazeuse (sparkling mineral water) like Perrier or Badoit.\n- Step 2: For fruit juices: un jus de pomme (apple juice), un jus de raisin (grape juice), and un jus d'orange (orange juice) or its special form une orange pressée (freshly squeezed orange juice).\n- Step 3: For beer: une bière or specifically un demi (about 25cl of draft beer).\n- Step 4: For citrus drinks: une orange pressée (freshly squeezed orange juice) and un citron pressé (freshly squeezed lemon juice).", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "In the café dialogue, what key politeness expression does the customer use when ordering, and why is it important? (3 steps)", "answer": "- Step 1: The customer consistently uses \"s'il vous plaît\" when placing orders, which means \"please\" in the formal form.\n- Step 2: This is important because in French culture, using polite expressions is essential for respectful communication, even in casual settings like cafés.\n+ The phrase \"s'il vous plaît\" shows respect to the server, who might be significantly older or younger than the customer\n+ It's part of the cultural expectation in French service interactions\n- Step 3: The servers respond with \"Très bien\" or \"D'accord\" showing their acknowledgment of the polite request.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "How would you describe an apple tart with whipped cream using proper adjective agreement? (4 steps)", "answer": "- Step 1: The noun \"tarte\" is feminine singular, so the adjective must match this gender and number.\n- Step 2: For \"apple tart\" we say \"une tarte aux pommes\" - no agreement because \"aux pommes\" is a prepositional phrase.\n- Step 3: For \"with whipped cream\" we use \"avec de la chantilly\" - no adjective needed here either.\n- Step 4: Putting it all together: \"une tarte aux pommes avec de la chantilly\" - all elements correctly agree with their nouns.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "What are the key vocabulary terms for common desserts in a French café? (4 steps)", "answer": "- Step 1: Pastries and tarts: une tarte aux pommes (apple tart), with optional \"avec/sans chantilly\" (with/without whipped cream)\n- Step 2: Chocolate desserts: un gâteau au chocolat (chocolate cake), une mousse au chocolat (chocolate mousse)\n- Step 3: Ice cream: une glace with flavor options like à la vanille (vanilla), au café (coffee), au chocolat (chocolate), à la fraise (strawberry), à la pistache (pistachio)\n- Step 4: Other desserts: une crème brûlée (burnt cream) and une salade de fruits (fruit salad) with common fruits listed as pommes (apples), oranges, bananes (bananas), poires (pears)", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "How would you order a croque-monsieur with a green salad using the appropriate articles? (4 steps)", "answer": "- Step 1: For croque-monsieur, use the masculine singular article: \"un croque-monsieur\"\n- Step 2: For green salad, use the feminine singular article: \"une salade verte\"\n- Step 3: Combine with the polite expression: \"Je voudrais un croque-monsieur avec une salade verte, s'il vous plaît.\"\n- Step 4: This shows proper use of singular indefinite articles \"un\" and \"une\" which match the gender of the nouns they precede.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "What are the key vocabulary terms for wines in the French café context? (5 steps)", "answer": "- Step 1: Wine categories: vins blancs (white wines), vins rouges (red wines), and vins rosés (rosé wines)\n- Step 2: White wines include: un muscadet, un sancerre (Loire), un aligoté, un chablis (Burgundy), un sylvaner, un riesling (Alsace), un sauternes, un entre-deux-mers (Bordeaux)\n- Step 3: Red wines include: un graves, un saint-émilion, un saint-estèphe (Bordeaux), un pommard, un mercurey (Burgundy), un châteauneuf-du-pape, un gigondas (Côtes-du-Rhône), un gamay, un bourgueil (Loire)\n- Step 4: Rosé wines include: un bandol, un côtes-de-Provence (Provence), un tavel (Côtes-du-Rhône), un rosé d'Anjou (Loire)\n- Step 5: Special mention: le champagne - a sparkling wine that requires its own designation", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "How would you politely decline a dessert using the appropriate negation structure? (3 steps)", "answer": "- Step 1: Start with the polite refusal: \"Non merci\"\n- Step 2: Add the negation using \"ne...pas\": \"je n'ai pas faim\" (I'm not hungry)\n- Step 3: Combine politely: \"Non merci, je n'ai pas faim.\" (No thank you, I'm not hungry)", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "What are the key vocabulary terms for common hot drinks in a French café? (3 steps)", "answer": "- Step 1: Coffee variations: un café crème (espresso with steamed milk), un cappuccino, un décaféiné (decaf)\n- Step 2: Tea options: un thé (tea) with various flavors like à la menthe (mint)\n- Step 3: Hot chocolate: un chocolat (chocolate) or un chocolat chaud (hot chocolate)", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "How would you describe a grilled salmon with rice using proper adjective agreement? (4 steps)", "answer": "- Step 1: The noun \"saumon\" is masculine singular, so any adjectives must match this gender and number.\n- Step 2: \"Saumon grillé\" follows proper agreement - \"grillé\" takes the masculine singular form to match \"saumon\"\n- Step 3: For rice, since \"riz\" is masculine singular but not modified by an adjective, it remains unchanged.\n- Step 4: The full description \"un saumon grillé avec du riz\" correctly uses articles and adjective agreement.", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "What are the key expressions used in the café dialogues and what do they mean? (5 steps)", "answer": "- Step 1: \"Messieurs-dames?\" - The server's way of addressing customers, meaning \"Ladies and gentlemen?\"\n- Step 2: \"Je voudrais...\" - \"I would like...\" (polite way to order)\n- Step 3: \"Alors...\" - \"So...\" or \"Well...\" (used when considering options)\n- Step 4: \"Très bien!\" - \"Very good!\" or \"Certainly!\" (server agrees to the order)\n- Step 5: \"Dix minutes après.\" - \"Ten minutes later.\" (narrative transition in the dialogue)", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "How would you describe a cheese sandwich using proper adjective agreement? (4 steps)", "answer": "- Step 1: The noun \"sandwich\" is masculine singular, so any adjectives must match this gender and number.\n- Step 2: \"Fromage\" is the adjective describing the type of sandwich.\n- Step 3: Since \"fromage\" is a noun being used as an adjective here, it doesn't change form, resulting in \"sandwich fromage-beurre\"\n- Step 4: \"Beurre\" similarly remains unchanged in this compound adjective construction.", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "What are common polite expressions in French and when would you use them? (5 steps)", "answer": "- Step 1: Greetings: \"Bonjour, madame!\" (Good day, madam!) or \"Bonjour, monsieur!\" (Good day, sir!)\n- Step 2: When ordering: \"Je voudrais...\" (I would like...) or \"J'aimerais...\" (I would like...)\n- Step 3: Asking for something: \"Je pourrais avoir...\" (Could I have...)\n- Step 4: Expressing surprise or mild disapproval: \"Ah bon...\" (Is that so...) or \"Quelle horreur!\" (How awful!)\n- Step 5: Closing: \"Merci, monsieur.\" (Thank you, sir.) and \"Au revoir, madame!\" (Goodbye, madam!)", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}, {"question": "How would you order a half (draft beer) and a carafe of water using the appropriate articles? (4 steps)", "answer": "- Step 1: For the beer, use the masculine singular article: \"un demi\"\n- Step 2: For the water, use the feminine singular article: \"une carafe d'eau\"\n- Step 3: Combine with the polite expression: \"Je voudrais un demi et une carafe d'eau, s'il vous plaît.\"\n- Step 4: This shows proper use of singular indefinite articles \"un\" and \"une\" which match the gender of the nouns they precede.", "source": "Qwen 3 ①", "_id": "qwen_1_15", "judge_pick": false}, {"question": "How do you properly use the indefinite articles un, une, and des in French? (4 steps)", "answer": "- Step 1: \"Un\" is used for masculine singular nouns: un café, un croque-monsieur\n- Step 2: \"Une\" is used for feminine singular nouns: une salade, une omelette\n- Step 3: \"Des\" is used for plural nouns (both masculine and feminine): des cafés, des omelettes\n- Step 4: In negative sentences, these articles change to \"pas de\": je n'ai pas de café, elle n'a pas de carafe, ils n'ont pas d'omelette", "source": "Qwen 3 ①", "_id": "qwen_1_16", "judge_pick": false}, {"question": "How would you describe a simple dinner order using the appropriate articles and vocabulary? (4 steps)", "answer": "- Step 1: Start with the polite expression: \"Je voudrais...\"\n- Step 2: Order a salad: \"une salade au chèvre chaud\" - note the feminine singular article \"une\"\n- Step 3: Order a fish dish: \"un saumon grillé avec du riz\" - note the masculine singular article \"un\"\n- Step 4: Complete with a drink: \"un petit verre de blanc\" - masculine singular article \"un\"", "source": "Qwen 3 ①", "_id": "qwen_1_17", "judge_pick": false}, {"question": "How do you properly use \"il y a\" and \"il n'y a pas de\" in French? (4 steps)", "answer": "- Step 1: \"Il y a\" is used to indicate presence: \"Il y a un plat du jour\" (There is a dish of the day)\n- Step 2: \"Il y a\" remains the same regardless of number: \"Il y a des croissants\" (There are croissants)\n- Step 3: \"Il n'y a pas de\" is used for negation: \"Il n'y a pas de saumon\" (There is no salmon)\n- Step 4: The \"de\" in \"il n'y a pas de\" replaces the article that would appear in the affirmative form: \"Il y a un plat\" vs \"Il n'y a pas de plat\"", "source": "Qwen 3 ①", "_id": "qwen_1_18", "judge_pick": false}, {"question": "How would you describe different types of toast using proper adjective agreement? (4 steps)", "answer": "- Step 1: \"Une tartine\" is the feminine singular noun for a slice of bread with butter\n- Step 2: For \"buttered toast\" we use \"tartine beurrée\" - the adjective \"beurrée\" agrees with the feminine singular noun\n- Step 3: If we had multiple toast slices, it would be \"des tartines beurrées\" - both noun and adjective become plural\n- Step 4: The same agreement rules apply to variations like \"tartine fromage-beurre\" (cheese and butter toast)", "source": "Qwen 3 ①", "_id": "qwen_1_19", "judge_pick": false}, {"question": "How do you properly use the definite articles le, la, and les in French? (5 steps)", "answer": "- Step 1: \"Le\" is used for masculine singular nouns: le café, le croque-monsieur\n- Step 2: \"La\" is used for feminine singular nouns: la carafe d'eau\n- Step 3: \"Les\" is used for plural nouns (both masculine and feminine): les cafés, les omelettes\n- Step 4: Before a vowel or h, \"le\" and \"la\" become \"l'\": l'aligoté, l'omelette\n- Step 5: These definite articles are used when referring to specific items: \"le café que j'ai commandé\" (the coffee I ordered)", "source": "Qwen 3 ①", "_id": "qwen_1_20", "judge_pick": false}, {"question": "How would you describe a vegetarian dish using proper negation and adjective agreement? (4 steps)", "answer": "- Step 1: The customer says \"Je suis végétarienne\" - note the feminine form of the adjective\n- Step 2: When declining a meat dish: \"Non merci, je suis végétarienne\"\n- Step 3: When specifying vegetable preferences: \"Je voudrais des légumes cuits\" - plural noun with adjective\n- Step 4: When making special requests: \"Sans beurre, les légumes, s'il vous plaît!\" - note the plural form of \"les légumes\" and the use of \"sans\" for negation", "source": "Qwen 3 ①", "_id": "qwen_1_21", "judge_pick": false}, {"question": "What are the French numbers from 0 to 20 and how are they structured? (3 steps)", "answer": "- Step 1: From 0 to 16, each number has its own unique form: zéro, un, deux, trois, quatre, cinq, six, sept, huit, neuf, dix, onze, douze, treize, quatorze, quinze, seize\n- Step 2: From 17 to 19, the numbers follow a \"dix + unit\" pattern: dix-sept, dix-huit, dix-neuf\n- Step 3: 20 has its own unique form: vingt", "source": "Qwen 3 ①", "_id": "qwen_1_22", "judge_pick": false}, {"question": "How would you order a breakfast menu item using the appropriate vocabulary and articles? (4 steps)", "answer": "- Step 1: Use the polite expression: \"Je voudrais une formule 'petit-déjeuner'\"\n- Step 2: Specify the coffee choice: \"avec un café crème\"\n- Step 3: Add the juice: \"et une orange pressée\"\n- Step 4: Add the politeness marker: \"s'il vous plaît\"", "source": "Qwen 3 ①", "_id": "qwen_1_23", "judge_pick": false}, {"question": "How do you properly use quantities with \"de\" in French? (5 steps)", "answer": "- Step 1: For a glass of wine: \"un verre de vin\" - \"de\" indicates the content of the glass\n- Step 2: For a bottle of wine: \"une bouteille de vin\" - \"de\" shows the content of the bottle\n- Step 3: Before a vowel or h, \"de\" becomes \"d'\": \"un verre d'eau\", \"une carafe d'eau\", \"une bouteille d'aligoté\"\n- Step 4: This contraction happens for ease of pronunciation when \"de\" precedes a vowel sound\n- Step 5: The same pattern applies to other measurements like \"une tasse de thé\" (a cup of tea) or \"un bol de lait\" (a bowl of milk)", "source": "Qwen 3 ①", "_id": "qwen_1_24", "judge_pick": false}, {"question": "How would you ask for and decline different wine options using proper negation? (4 steps)", "answer": "- Step 1: Ask if they have a specific wine: \"Vous avez un rosé d'Anjou?\"\n- Step 2: Respond negatively: \"Non, nous n'avons pas de rosé d'Anjou\"\n- Step 3: Offer alternatives: \"nous avons un rosé de Provence\"\n- Step 4: Make a selection: \"Alors, un petit verre d'aligoté, s'il vous plaît\"", "source": "Qwen 3 ①", "_id": "qwen_1_25", "judge_pick": false}, {"question": "How do you properly use the verb \"avoir\" in the present tense in a café context? (5 steps)", "answer": "- Step 1: Affirmative forms: j'ai (I have), tu as (you have), il/elle/on a (he/she/one has), nous avons (we have), vous avez (you have), ils/elles ont (they have)\n- Step 2: In a café, you might hear \"nous avons un saumon grillé\" (we have grilled salmon)\n- Step 3: Negative forms: je n'ai pas (I don't have), tu n'as pas (you don't have), il/elle/on n'a pas (he/she/one doesn't have), nous n'avons pas (we don't have), vous n'avez pas (you don't have), ils/elles n'ont pas (they don't have)\n- Step 4: Before a vowel or h, \"ne\" becomes \"n'\": \"nous n'avons pas de rosé d'Anjou\"\n- Step 5: \"Avoir\" is used to express possession and availability in the café setting", "source": "Qwen 3 ①", "_id": "qwen_1_26", "judge_pick": false}, {"question": "How would you describe different types of omelets using proper adjective agreement? (4 steps)", "answer": "- Step 1: \"Une omelette\" is the feminine singular noun\n- Step 2: For a cheese omelet: \"une omelette au fromage\" - no agreement needed\n- Step 3: For a hot omelet: \"une omelette chaude\" - the adjective \"chaude\" agrees with the feminine singular noun\n- Step 4: In plural: \"des omelettes chaudes\" - both noun and adjective become plural", "source": "Qwen 3 ①", "_id": "qwen_1_27", "judge_pick": false}, {"question": "How do you properly use negation in French when ordering in a café? (4 steps)", "answer": "- Step 1: The basic structure is \"ne + verb + pas\": \"nous n'avons pas de saumon\"\n- Step 2: Before a vowel or h, \"ne\" becomes \"n'\": \"nous n'avons pas de rosé\"\n- Step 3: The \"pas de\" replaces the article from the affirmative form: \"nous avons du saumon\" vs \"nous n'avons pas de saumon\"\n- Step 4: Negation is used to decline options, ask what's available, and make special requests in the café setting", "source": "Qwen 3 ①", "_id": "qwen_1_28", "judge_pick": false}, {"question": "How would you order a vegetarian meal with specific requests using proper negation and polite expressions? (4 steps)", "answer": "- Step 1: Start with the polite expression: \"Je voudrais...\"\n- Step 2: Declare dietary preference: \"Je suis végétarienne\"\n- Step 3: Decline meat option: \"Non merci, je voudrais des légumes cuits\"\n- Step 4: Make special request: \"Sans beurre, les légumes, s'il vous plaît!\"", "source": "Qwen 3 ①", "_id": "qwen_1_29", "judge_pick": false}, {"question": "How do you properly use the definite article \"le/la/les\" with food in French? (5 steps)", "answer": "- Step 1: With specific food items: \"le croque-monsieur\" (the croque-monsieur I ordered)\n- Step 2: With wines: \"l'aligoté\" (the aligoté
