 wine)\n- Step 3: With coffee: \"le café crème\" (the café crème I want to order)\n- Step 4: With menu items: \"la formule 'petit-déjeuner'\" (the breakfast menu option)\n- Step 5: The definite article is used when referring to specific items rather than making general requests", "source": "Qwen 3 ①", "_id": "qwen_1_30", "judge_pick": false}, {"question": "How would you describe different types of fruit salad using proper vocabulary and agreement? (4 steps)", "answer": "- Step 1: \"Une salade de fruits\" uses the feminine singular article \"une\"\n- Step 2: Common fruits include: pommes (apples), oranges, bananes (bananas), poires (pears)\n- Step 3: All these fruits are typically served raw and cut into pieces\n- Step 4: The description \"une salade de fruits\" indicates a mixed fruit salad rather than a single type of fruit", "source": "Qwen 3 ①", "_id": "qwen_1_31", "judge_pick": false}, {"question": "How do you properly use adjective agreement with different types of dishes? (5 steps)", "answer": "- Step 1: Masculine singular: un chocolat chaud (a hot chocolate)\n- Step 2: Masculine plural: des chocolats chauds (hot chocolates)\n- Step 3: Feminine singular: une omelette chaude (a hot omelette)\n- Step 4: Feminine plural: des omelettes chaudes (hot omelettes)\n- Step 5: This agreement pattern applies to all adjectives describing food items in French", "source": "Qwen 3 ①", "_id": "qwen_1_32", "judge_pick": false}, {"question": "How would you ask for additional water using proper articles and politeness? (4 steps)", "answer": "- Step 1: Start with the polite address: \"Merci, monsieur\"\n- Step 2: Request the additional item: \"Je voudrais aussi\"\n- Step 3: Use the appropriate article: \"un verre d'eau\"\n- Step 4: Add the politeness marker: \"s'il vous plaît\"", "source": "Qwen 3 ①", "_id": "qwen_1_33", "judge_pick": false}, {"question": "How do you properly use \"il y a\" to describe menu availability in French? (4 steps)", "answer": "- Step 1: To indicate menu items that are available: \"Il y a un plat du jour\" (There is a dish of the day)\n- Step 2: For multiple items: \"Il y a des croissants\" (There are croissants)\n- Step 3: For negation: \"Il n'y a pas de saumon\" (There is no salmon)\n- Step 4: The structure remains the same regardless of number: \"Il y a une formule\", \"Il y a des formules\"", "source": "Qwen 3 ①", "_id": "qwen_1_34", "judge_pick": false}, {"question": "How would you describe a difficult customer interaction using key vocabulary from the chapter? (4 steps)", "answer": "- Step 1: The server offers: \"Il y a un plat du jour: un lapin à la moutarde\"\n- Step 2: The customer declines: \"Non merci, je suis végétarienne\"\n- Step 3: The server offers alternatives: \"nous avons un saumon grillé avec du riz\" but gets another refusal\n- Step 4: The customer specifies: \"Je voudrais des légumes cuits. Sans beurre, les légumes, s'il vous plaît!\"", "source": "Qwen 3 ①", "_id": "qwen_1_35", "judge_pick": false}, {"question": "How do you properly use the expression \"s'il vous plaît\" in a café context? (4 steps)", "answer": "- Step 1: \"s'il vous plaît\" literally means \"if it pleases you\" and is the standard polite marker in French\n- Step 2: It's used when making requests: \"Je voudrais un café, s'il vous plaît\"\n- Step 3: It's added at the end of the sentence when placing orders\n- Step 4: It shows respect to the server and follows French cultural norms for polite communication", "source": "Qwen 3 ①", "_id": "qwen_1_36", "judge_pick": false}, {"question": "How would you describe the typical French café menu structure using vocabulary from the chapter? (5 steps)", "answer": "- Step 1: Starters: Plats froids like salade verte (3€), salade niçoise (5€), salade au chèvre (6€), assiette de crudités (4.50€), assiette de charcuteries (5€)\n- Step 2: Hot dishes: Plats chauds like omelette nature (6€), omelette au fromage (7€), assiette de frites (5€), croque-monsieur (6.50€), pizza au jambon (6€)\n- Step 3: Meat options: Viandes like lapin à la moutarde (10€), entrecôte (12€), côtes d'agneau (15€)\n- Step 4: Fish options: Poissons like sole (17€), saumon grillé (14€), truite (16€)\n- Step 5: Sandwiches: Sandwich jambon-beurre (3.50€), sandwich fromage-beurre (3.50€), sandwich poulet-crudités (3.50€)", "source": "Qwen 3 ①", "_id": "qwen_1_37", "judge_pick": false}, {"question": "How do you properly use adjective agreement with different types of beverages? (4 steps)", "answer": "- Step 1: With masculine singular nouns: un café noir (black coffee)\n- Step 2: With feminine singular nouns: une orange pressée (freshly squeezed orange juice)\n- Step 3: With masculine plural nouns: des cafés noirs (black coffees)\n- Step 4: With feminine plural nouns: des oranges pressées (freshly squeezed orange juices)", "source": "Qwen 3 ①", "_id": "qwen_1_38", "judge_pick": false}, {"question": "How would you order a table for two in a French café using proper expressions? (4 steps)", "answer": "- Step 1: When being seated: \"Bonjour, madame/monsieur. Vous avez une table libre, là-bas.\"\n- Step 2: Confirm the reservation: \"Merci, monsieur. Je voudrais une formule à 12 euros\"\n- Step 3: Specify the meal: \"avec une salade au chèvre chaud et un saumon grillé avec du riz\"\n- Step 4: Add the drink: \"et un petit verre de blanc\" and use politeness: \"s'il vous plaît\"", "source": "Qwen 3 ①", "_id": "qwen_1_39", "judge_pick": false}], "count": 40}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "In the café dialogue, how would you politely order \"a croque-monsieur with a green salad\" using \"s'il vous plaît\"? Why is this structure preferred in French service contexts? (3 steps)", "answer": "- Step 1: Use **\"Je voudrais\"** (I would like) for polite requests.  \n- Step 2: Add **\"un croque-monsieur\"** (masculine singular) and **\"une salade verte\"** (feminine singular), matching article and adjective agreement.  \n- Step 3: Append **\"s'il vous plaît\"** (please) to maintain formality.  \n+ Polite phrases like **\"voudrais\"** (conditional) soften demands, showing cultural respect for service etiquette.  \n\n[Optional takeaway: French politeness prioritizes indirectness to avoid sounding abrupt.]", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "In the \"civilisation\" section, why is wine described as \"fondamental\" to French culture? Provide two reasons tied to the text.", "answer": "French culture emphasizes pairing food and wine for balance (\"un bon repas = un bon plat + un bon vin\"). Additionally, France's 300+ wines reflect regional diversity and tradition, making wine a cultural symbol.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "For the grammar rule \"adjective agreement,\" how would you describe **\"a grilled salmon\"** in French, and why does the adjective ending change? (3 steps)", "answer": "- Step 1: **\"Saumon\"** (masculine singular noun) requires **\"grillé\"** (masculine singular adjective).  \n- Step 2: If plural (e.g., \"saumons\"), the adjective becomes **\"grillés\"** (add -s).  \n- Step 3: If feminine (e.g., \"entrecôte\"), the adjective becomes **\"grillée\"** (add -e).  \n+ Adjective endings mirror noun genders/numbers to maintain grammatical harmony.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "When ordering \"no water,\" why do you say **\"nous n’avons pas d’eau\"** instead of **\"nous n’avons pas de l’eau\"**? Explain the grammar rule.", "answer": "- **\"Pas de\"** replaces **\"de/des\"** in negative sentences.  \n- **\"De\"** contracts to **\"d’\"** before vowels (eau starts with a vowel sound).  \n- \"Pas de\" generalizes absence (no water at all), while \"pas d’\" specifies exclusion (e.g., \"pas d’aligoté\").", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "How do you say \"There are 3 bottles of wine\" in French, and why does the structure differ in the negative? (3 steps)", "answer": "- Step 1: **\"Il y a\"** (there is/are) introduces existing quantities: **\"Il y a trois bouteilles de vin.\"**  \n- Step 2: In negation, replace **\"de\"** with **\"pas de\"**: **\"Il n’y a pas de bouteilles de vin.\"**  \n- Step 3: Use **\"d’\"** before vowels: **\"Il n’y a pas d’eau minérale.\"**  \n+ The negative structure eliminates the definite/indefinite article, generalizing absence.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "For numbers 17–19, why do they follow the pattern **\"dix-sept\"** (ten-seven) instead of forming a unique word? Relate to the decimal system in French.", "answer": "- French uses a **vigesimal system** (base 20) in some contexts, but numbers 17–19 retain Latin influence.  \n- **\"Sept\" (7), huit (8), neuf (9)** combine with **\"dix\" (10)** to form 17–19, reflecting additive logic (10+7=17).  \n- This contrasts with English (17=seventeen) and highlights historical numerical evolution.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Contrast **\"le café\"** (the coffee) and **\"un café\"** (a coffee). When would you use each, and why does the article change?", "answer": "- **\"Le café\"** (definite article): Specific coffee (e.g., \"I want the coffee on the table\").  \n- **\"Un café\"** (indefinite article): Non-specific coffee (e.g., \"I want a coffee [to drink]\").  \n- Definite articles (\"le/la\") imply familiarity; indefinite (\"un/une\") introduce new items.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "In the dialogue, why does the server say **\"Et comme boisson?\"** rather than **\"Quelle boisson?\"**?", "answer": "- **\"Et comme boisson?\"** (And as drink?) uses **\"comme\"** for category specification (common in service contexts).  \n- **\"Quelle boisson?\"** (Which drink?) is more general and less idiomatic for ordering.  \n- \"Comme + noun\" narrows the category, streamlining requests (e.g., \"And as dessert?\").", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": true}, {"question": "Why is **\"des légumes cuits\"** (cooked vegetables) correct, but **\"des légumes chaud\"** incorrect? Apply adjective agreement rules.", "answer": "- **\"Légumes\"** (plural noun) requires adjectives to match: **\"cuits\"** (plural) and **\"chauds\"** (plural).  \n- **\"Chaud\"** (masculine singular) fails to agree with **\"légumes\"** (plural), creating a mismatch.  \n- Exception: Some adjectives (e.g., **\"bref\"**) agree only by position, but **\"cuit\"** and **\"chaud\"** follow standard agreement rules.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "For **\"une carafe d’eau\"**, why is **\"d’\"** used instead of **\"de\"**? Create an example using \"une bouteille de vin\" in the negative.", "answer": "- **\"De\"** contracts to **\"d’\"** before vowels or silent h (eau starts with a vowel sound).  \n- Negative example: **\"Il n’y a pas de vin\"** (no wine) → \"de\" remains (not \"d’\") because \"vin\" starts with a consonant.  \n+ Contractions simplify pronunciation and writing.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}], "count": 10}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "How does the French verb « avoir » change in the affirmative present tense? Conjugate it completely. (1 step)", "answer": "- The verb « avoir » (to have) is irregular. Here is the full conjugation:\n  + **j'ai** — I have\n  + **tu as** — you have (informal singular)\n  + **il/elle/on a** — he/she/one has\n  + **nous avons** — we have\n  + **vous avez** — you have (formal singular or plural)\n  + **ils/elles ont** — they have (masculine/feminine)\n\n- Note: This verb does NOT follow the regular -er verb pattern. It must be memorised.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "How do you form the negative with « avoir » in French? Give an example using a café order context. (2 steps)", "answer": "- Step 1: To make « avoir » negative, use **« ne + avoir + pas »**. The « ne » becomes « n' » before a vowel sound.\n  + je n'ai pas · tu n'as pas · il/elle/on n'a pas · nous n'avons pas · vous n'avez pas · ils/elles n'ont pas\n\n- Step 2: Example in context:\n  + — *Vous avez un café ?* (Do you have a coffee?)\n  + — *Non, je n'ai pas de café, mais j'ai un thé.* (No, I don't have coffee, but I have tea.)\n\n- Note: In negative sentences, the indefinite article (un/une/des) changes to **« de »** (or « d' » before a vowel).", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "What is the general rule for forming negation in French, and what happens to « ne » before a vowel? (1 step)", "answer": "- The structure for negation in French is: **« ne + conjugated verb + pas »**\n  + Example: *Je mange* → *Je ne mange pas* (I don't eat)\n\n- **« ne » becomes « n' »** when the word that follows begins with a vowel (a, e, i, o, u) or a silent 'h':\n  + *Je n'ai pas* (I don't have) — because « avoir » starts with a vowel\n  + *Il n'y a pas* (There isn't) — because « y a » starts with 'a'\n\n- This contraction is mandatory in written French.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "What are the French indefinite articles in their affirmative forms, and how do they change in negative sentences? Give café-related examples. (2 steps)", "answer": "- Step 1: Indefinite articles in affirmative sentences:\n  + **un** (masculine singular): *un café*, *un sandwich*\n  + **une** (feminine singular): *une salade*, *une glace*\n  + **des** (plural, any gender): *des croissants*, *des tartes*\n\n- Step 2: In negative sentences, they all become **« de »** (or « d' » before a vowel):\n  + *J'ai un café* → *Je n'ai pas **de** café*\n  + *Elle veut une salade* → *Elle ne veut pas **de** salade*\n  + *Ils mangent des frites* → *Ils ne mangent pas **de** frites*\n  + *Je voudrais un orange* → *Je ne voudrais pas **d'**orange* (before a vowel)", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "Explain how the French definite articles « le », « la », and « les » work, including when they contract. Give café examples. (2 steps)", "answer": "- Step 1: The definite articles:\n  + **le** (masculine singular): *le café*, *le croque-monsieur*\n  + **la** (feminine singular): *la carte*, *la serveuse*\n  + **les** (plural, any gender): *les clients*, *les desserts*\n\n- Step 2: **Elision** — « le » and « la » become « l' » before a vowel or silent 'h':\n  + *le café* → *l café* (written as *le café* but pronounced \"l'café\")\n  + *la omelette* → *l'omelette*\n  + *le serveur* → *le serveur* (no elision because 'serveur' starts with consonant)\n\n- Note: There is NO elision with « les » — it stays « les ».", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "How do you say \"There is\" and \"There isn't\" in French? Give both affirmative and negative forms with café examples. (1 step)", "answer": "- **« Il y a »** = There is / There are\n  + *Il y a un plat du jour.* (There is a dish of the day.)\n  + *Il y a des croissants.* (There are croissants.)\n\n- **« Il n'y a pas de… »** = There isn't / There aren't (literally \"There is not of\")\n  + *Il n'y a pas de saumon.* (There isn't any salmon.)\n  + *Il n'y a pas de tarte aux pommes.* (There aren't any apple tarts.)\n\n- Note: In the negative, the article changes to **« de »** (or « d' »), regardless of whether you're negating singular or plural.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "What is the rule for adjective agreement in French? How do adjectives change for masculine, feminine, singular, and plural? Give examples from café vocabulary. (2 steps)", "answer": "- Step 1: Basic agreement rules:\n  + **Masculine singular:** base form — *un café chaud* (a hot coffee)\n  + **Feminine singular:** add **-e** — *une omelette chaude* (a hot omelette)\n  + **Masculine plural:** add **-s** — *des cafés chauds* (hot coffees)\n  + **Feminine plural:** add **-es** — *des omelettes chaudes* (hot omelettes)\n\n- Step 2: Examples from the chapter:\n  + *un saumon grillé* (grilled salmon) → *une sole grillée*\n  + *des légumes cuits* (cooked vegetables) → *des salades vertes* (green salads)\n  + *3 petits verres* (3 small glasses) — note that « petit » becomes « petite » for feminine\n\n- Note: Some adjectives have irregular forms, and some don't change (like « grand » before a vowel).", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "How do you express quantities in French using « de » or « d' »? Give three café examples with different drinks. (1 step)", "answer": "- In French, quantities are expressed with **« de »** (or « d' » before a vowel) between the container and the content:\n  + *un verre **de** vin* — a glass of wine\n  + *une bouteille **de** vin* — a bottle of wine\n  + *un verre **d'**eau* — a glass of water\n  + *une carafe **d'**eau* — a carafe of water\n  + *une bouteille **d'**aligoté* — a bottle of aligoté (wine)\n\n- Note: This « de/d' » is NOT the same as the negative « de ». It means \"of\" or \"containing\".", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "Spell out the French numbers from 0 to 20. Which ones have any spelling irregularities you should watch for? (1 step)", "answer": "- **0-10:** zéro · un · deux · trois · quatre · cinq · six · sept · huit · neuf · dix\n- **11-20:** onze · douze · treize · quatorze · quinze · seize · dix-sept · dix-huit · dix-neuf · vingt\n\n- Key irregularities to watch:\n  + **5 (cinq)** — pronounced like \"sank\" (the 'q' is silent)\n  + **6 (six)** and **9 (neuf)** — the final consonants are pronounced differently before a consonant vs. a vowel\n  + **17-19 (dix-sept, dix-huit, dix-neuf)** — literally \"ten-seven\", \"ten-eight\", \"ten-nine\"\n  + **11 (onze)** — the 'z' is pronounced; there's liaison in *les onze* (lay zonz)", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "What are the three main meals in French, and at what times are they typically eaten? (1 step)", "answer": "- **Le petit-déjeuner** — breakfast, typically around 7h00 (7 o'clock)\n  + Common items: croissant, tartine, café crème, orange pressée\n\n- **Le déjeuner** — lunch, typically around 12h00 (noon)\n  + Common items: sandwich, salad, croque-monsieur, formula meals\n\n- **Le dîner** — dinner, typically around 20h00 (8 o'clock)\n  + Common items: plat du jour, salmon, vegetables, wine\n\n- Note: French meals are often social occasions, and dinner is typically the largest meal.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "List at least 8 items you would find « à la table » (at the table) in a French café or restaurant. (1 step)", "answer": "- **Basic table items:**\n  + **un plat** — a dish/plate (for serving)\n  + **une assiette** — a plate (for eating)\n  + **un verre** — a glass\n  + **un couteau** — a knife\n  + **une fourchette** — a fork\n  + **une cuiller/cuillère** — a spoon\n\n- **Service items:**\n  + **une table** — a table\n  + **la carte** — the menu (list of items)\n  + **le menu** — the set menu / fixed price meal\n\n- **People:**\n  + **le serveur / la serveuse** — the waiter / waitress\n  + **le client / la cliente** — the customer", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "What are the key politeness expressions in French for greeting and ordering? Give at least 5 expressions with their meanings. (1 step)", "answer": "- **Greeting:**\n  + **Bonjour, madame/mademoiselle/monsieur!** — Hello, (title)!\n  + **Bonsoir!** — Good evening!\n\n- **Ordering:**\n  + **Je voudrais…** — I would like…\n  + **s'il vous plaît** — please (formal/polite)\n  + **Merci!** — Thank you!\n  + **Au revoir!** — Goodbye!\n\n- **Responding:**\n  + **Très bien!** — Very well!\n  + **D'accord!** — OK / Agreed!\n  + **Bien sûr!** — Of course!\n  + **Ah bon…** — Oh I see… / Really?", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "In the dialogue \"Une cliente difficile\", what does the vegetarian client (Virginie) end up ordering, and what complications does she add? (1 step)", "answer": "- **Virginie's order:** She finally accepts *une assiette de riz avec des haricots verts* (a plate of rice with green beans)\n\n- **Her complications:**\n  + She refuses the plat du jour (rabbit in mustard) — \"je suis végétarienne\"\n  + She refuses the salmon with rice — \"je voudrais juste des légumes\"\n  + She refuses crudités (raw vegetables)\n  + She refuses cooked vegetables initially\n  + She refuses fries (\"Quelle horreur!\" — \"How awful!\")\n  + She wants the vegetables **without butter** — \"sans beurre, les légumes\"\n\n- This dialogue humourously shows a difficult customer while teaching useful vocabulary for dietary requirements.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "Why might a French waiter say \"Nous n'avons pas de rosé d'Anjou, nous avons un rosé de Provence\" instead of just \"non\"? (Misconception probe) (2 steps)", "answer": "- Step 1: In French, it's considered more polite to give a **positive alternative** rather than just saying \"no\". This is a cultural norm — even when negating, you offer what IS available.\n\n- Step 2: This demonstrates two important grammar points simultaneously:\n  + The negative structure: *nous n'avons pas* (we don't have) → **n'** because followed by vowel\n  + The change from « un/une/des » to « de » in negative: *pas de rosé* (no rosé)\n  + But note: when the negative is followed by a specific item name (like \"rosé de Provence\"), you can keep the article: *un rosé de Provence* — because you're now affirming what you DO have\n\n- This is why simple \"yes/no\" answers are less common in French customer service — the negative is often combined with an alternative.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": true}, {"question": "What is the difference between « le menu » and « la carte » in a French restaurant? (1 step)", "answer": "- **La carte** — the list of ALL items available (like an à la carte menu). You can order anything from it.\n  + Example: *Voici la carte, mademoiselle.* (Here's the menu.)\n\n- **Le menu** — a fixed-price set menu with multiple courses (often cheaper, good value). Typically includes entrée + plat OR plat + dessert.\n  + Example: *Je voudrais une formule « petit-déjeuner », s'il vous plaît.*\n\n- **Confusion point:** In everyday English, we say \"the menu\" for both. In French, they're distinct!", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": true}, {"question": "How would you order a \"croque-monsieur\" and a \"sandwich jambon-beurre\" in French? What do these names tell you about the sandwich contents? (1 step)", "answer": "- **To order:**\n  + *Je voudrais un croque-monsieur, s'il vous plaît.*\n  + *Et un sandwich jambon-beurre, s'il vous plaît.*\n\n- **What the names reveal:**\n  + **Croque-monsieur** — a grilled ham and cheese sandwich (literally \"Mister crunch/CRUNCH-mister\"). It's typically made with ham, cheese, and béchamel sauce, then grilled.\n\n  + **Sandwich jambon-beurre** — literally \"ham-butter sandwich\". This is the classic French sandwich: a baguette with ham and butter (no cheese!). Very simple and very popular in France.\n\n- Note: The « - » in « jamón-beurre » joins the two ingredients as a compound noun.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "What is the difference between « une eau minérale plate » and « une eau minérale gazeuse »? Give French brand examples. (1 step)", "answer": "- **Eau plate** — still water (no bubbles)\n  + Examples: **Évian**, **Vittel**, **Contrex**\n  + Often served in a carafe (*une carafe d'eau*) at restaurants\n\n- **Eau gazeuse** — sparkling water (with bubbles)\n  + Examples: **Perrier**, **Badoit**, **San Pellegrino**\n  + Note: In France, sparkling water is very popular and is often ordered at meals\n\n- This distinction is important because some people have strong preferences — and it's considered perfectly normal to specify which type you want!", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": true}, {"question": "In French, what is the difference between « un jus d'orange » and « une orange pressée »? (1 step)", "answer": "- **Un jus d'orange** — packaged/orange juice from a carton or bottle (industrial, processed)\n  + Example: *un jus de pomme* (apple juice), *un jus de raisin* (grape juice)\n\n- **Une orange pressée** — freshly squeezed orange juice (made to order at the café)\n  + This is a premium item, often more expensive\n  + Similarly: *un citron pressé* (freshly squeezed lemon)\n\n- **Key insight:** In French cafés, « pressé » specifically means \"freshly squeezed to order\", while « jus » usually means packaged juice. This is an important distinction for ordering!", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": true}, {"question": "What are the three main categories of French wine, and name at least 2 examples of each from the chapter? (1 step)", "answer": "- **Vins blancs** (white wines):\n  + Muscadet, Aligoté (Bourgogne), Sylvaner, Riesling (Alsace), Sauternes\n\n- **Vins rouges** (red wines):\n  + Saint-Émilion, Graves (Bordeaux), Pommard (Bourgogne), Châteauneuf-du-Pape (Rhône)\n\n- **Vins rosés** (rosé wines):\n  + Bandol, Côtes-de-Provence (Provence), Tavel (Rhône), Rosé d'Anjou (Loire)\n\n- **Bonus:** *Le champagne* — the famous sparkling wine from the Champagne region (often served as an apéritif)\n\n- Note: In French culture, wine is considered essential to a good meal. The chapter emphasizes \"un bon repas = un bon plat + un bon vin.\"", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "Why is \"un demi\" a confusing term for English speakers, and what does it actually mean? (Misconception probe) (1 step)", "answer": "- **The confusion:** In English, \"a half\" implies 50% of something, but in French, \"un demi\" doesn't mean \"half of a beer\"!\n\n- **What it actually means:** **Un demi** is a **glass of draft beer** (beer on tap), typically about **25 cl** — roughly half a pint (in French pubs, a \"pinte\" is 50cl, so un demi = half a pinte).\n\n- **Usage:** *Je voudrais un demi, s'il vous plaît.* — \"I'd like a draft beer, please.\"\n\n- **Key insight:** This is NOT related to the word \"demi\" meaning \"half\" in other contexts — it's become a specific term for this particular beer serving size.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "What do the following café expressions mean: « Voici », «Voilà», « Alors… », « Très bien! », « D'accord! »? (1 step)", "answer": "- **Voici** — Here is/are (presenting something close to the listener)\n  + *Voici le petit-déjeuner.* (Here is the breakfast.)\n\n- **Voilà** — There is/are (pointing out something, often more distant)\n  + *Voilà votre table.* (There is your table.)\n\n- **Alors…** — So… / Well then… (used to move the conversation forward)\n  + *Alors, vous prenez quoi?* (So, what will you have?)\n\n- **Très bien!** — Very well! / Great! (positive acknowledgment)\n\n- **D'accord!** — OK! / Agreed! / Got it! (indicates understanding/agreement)", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "How do you say \"I don't eat meat\" or \"I'm a vegetarian\" in French, using vocabulary from the chapter? (1 step)", "answer": "- **« Je suis végétarien/végétarienne »** — I am a vegetarian (masculine/feminine forms)\n  + *Je suis végétarienne!* — said by Virginie in the dialogue\n\n- **« Je ne mange pas de viande »** — I don't eat meat\n  + Note: In negative sentences with a general category (meat), you use « de »: *pas de viande*\n\n- **Related vocabulary from the dialogue:**\n  + *des légumes cuits* — cooked vegetables\n  + *une assiette de crudités* — a plate of raw vegetables\n  + *une assiette de riz* — a plate of rice\n  + *des haricots verts* — green beans", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "What is the difference between « un plat » and « une assiette »? (Misconception probe) (1 step)", "answer": "- **Une assiette** — the plate you eat FROM (the personal plate at your place setting)\n  + Example: *La cliente mange dans son assiette.* (The customer eats from her plate.)\n\n- **Un plat** — the serving dish that food is served IN (the communal dish placed on the table)\n  + Example: *Le serveur apporte un plat de frites.* (The server brings a plate of fries.)\n\n- **Simple test:** If you're eating FROM it, it's une assiette. If you're serving food IN it or presenting it, it's un plat.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": true}, {"question": "In French, what is the purpose of the « -s » on adjectives like « verts » in « des haricots verts »? Is it pronounced? (Edge case) (1 step)", "answer": "- The **-s** on « verts » indicates **masculine plural** (agreement with plural nouns). However:\n\n- **Pronunciation:** In most cases, the **-s is NOT pronounced** in French — it's a silent letter.\n  + *des haricots verts* — pronounced \"ver\" (like \"vair\"), NOT \"verss\"\n\n- **When IS the 's' pronounced?**\n  + When there's **liaison** (the next word starts with a vowel): *les verts arbres* → \"ver-zarbres\"\n  + In the plural of numbers: *trois* vs. *les trois*\n\n- **Key insight:** Written French shows agreement clearly, but spoken French often doesn't distinguish singular from plural. Context (like « des ») tells you it's plural.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": true}, {"question": "You want to order: a coffee, a glass of water, and a bottle of wine. How would you say this using the correct quantity expressions? (2 steps)", "answer": "- Step 1: Identify the quantity expression needed for each:\n  + Coffee (un café) → just the item, no quantity word needed\n  + Water → *un verre d'eau* (a glass of water) OR *une carafe d'eau* (a carafe of water)\n  + Wine → *une bouteille de vin* (a bottle of wine)\n\n- Step 2: Complete order:\n  + *Je voudrais un café, un verre d'eau et une bouteille de vin rouge, s'il vous plaît.*\n\n- Note: « d' » is used before vowels (d'eau, d'orange), « de » before consonants (de vin, de salade).", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "A customer asks: \"Est-ce qu'il y a une formule à 12 euros?\" The waiter responds positively. What would the waiter say, using vocabulary from the dialogue? (1 step)", "answer": "- The waiter would likely say something like:\n  + *Oui, nous avons une formule à 12 euros avec une salade au chèvre chaud et un saumon grillé avec du riz.*\n\n- This combines:\n  + **Il y a** / **nous avons** — there is / we have\n  + **une formule à 12 euros** — a set menu at 12 euros\n  + Vocabulary: *salade au chèvre chaud*, *saumon grillé*, *du riz*\n\n- Note: In the dialogue \"Un dîner simple\", exactly this happens — the client orders the \"formule à 12 euros\" with salad and salmon.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "What does « sans beurre » mean in the context of the dialogue, and how does « sans » function grammatically? (1 step)", "answer": "- **« Sans beurre »** means \"without butter\"\n\n- **How it works:**\n  + « Sans » is a preposition meaning \"without\"\n  + It doesn't change form — always « sans + noun »\n  + *sans beurre* — without butter\n  * *sans légumes* — without vegetables\n  + *sans sucre* — without sugar\n\n- **In the dialogue:** Virginie asks for *une assiette de riz, avec des haricots verts, **sans beurre*** — rice with green beans, without butter.\n\n- **Note:** This is a very common way to make special dietary requests in French.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "In the negative, when do you keep the article (un/une/des) instead of changing to de/d'? Explain with an example. (Edge case) (2 steps)", "answer": "- Step 1: The general rule is: in negation, **un/une/des → de/d'**\n  + *J'ai un livre* → *Je n'ai pas de livre* (I don't have a book)\n\n- Step 2: **EXCEPTION** — You KEEP the article when specifying or describing what you DO have (the positive part of the sentence):\n  + *Je n'ai pas de café, mais **j'ai un thé**.* — I don't have coffee, but I have tea.\n  + *Nous n'avons pas de rosé d'Anjou, nous avons **un rosé de Provence**.* — We don't have rosé d'Anjou, we have rosé de Provence.\n\n- **Why?** Because in the second part, you're AFFIRMING the existence of something specific — so the article returns.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": true}, {"question": "What are the key French phrases a customer would use to: (a) greet the server, (b) get attention, (c) order, (d) ask for the bill? (1 step)", "answer": "- **(a) Greeting:**\n  + *Bonjour, monsieur/madame!* — Hello (during day)\n  + *Bonsoir!* — Good evening\n\n- **(b) Getting attention:**\n  + *Excusez-moi, monsieur/madame!* — Excuse me! (to get server's attention)\n\n- **(c) Ordering:**\n  + *Je voudrais…, s'il vous plaît.* — I would like…, please.\n  + *L'addition, s'il vous plaît.* — The bill, please.\n\n- **(d) Asking for the bill:**\n  + *L'addition, s'il vous plaît!* — The check, please!\n  + *Je voudrais payer, s'il vous plaît.* — I would like to pay, please.\n\n- Note: *L'addition* is the French word for \"the bill/check\" (not \"le addition\"!).", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "In the dialogue \"Le petit-déjeuner\", what options does the customer have for their drink, and how do they make their final choice? (1 step)", "answer": "- The server asks: *Avec un café, un thé, un chocolat?* (With a coffee, tea, or hot chocolate?)\n\n- The customer chooses: *Un café crème, s'il vous plaît.* (A cream coffee, please.)\n\n- Then the server asks: *Et une orange pressée ou un citron pressée?* (And fresh orange juice or lemon juice?)\n\n- The customer answers: *Une orange pressée.* (Fresh orange juice.)\n\n- **Key vocabulary:**\n  + *café crème* — coffee with cream (not \"cream coffee\")\n  + *une orange pressée* — freshly squeezed orange juice\n  + *un citron pressé* — freshly squeezed lemon juice", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "Explain why in « je n'ai pas », the 'h' in 'ai' doesn't cause the 'ne' to become 'n''. Is 'h' always silent? (Edge case) (1 step)", "answer": "- **In « je n'ai pas »:**\n  + The 'h' in « ai » is **silent** — the word is pronounced like \"eh\" (the 'h' is not a consonant sound)\n  + So « ne » becomes « n' » because the next sound is a **vowel sound** ('eh'), not because of the letter 'h'\n\n- **About French 'h':**\n  + The 'h' in French is ALWAYS silent\n  + There are two types: *h aspiré* (aspirated h — rare, affects liaison) and *h muet* (silent h)\n  + But neither is actually pronounced\n\n- **Key point:** The contraction « n' » happens based on the **sound**, not the letter. If the next word starts with a vowel SOUND, use « n' ».", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": true}, {"question": "What is the difference between « un » as the number one and « un » as an indefinite article? Can you tell them apart in context? (Edge case) (1 step)", "answer": "- **As a number:** « un » means \"one\" (cardinal number)\n  + *J'ai un café.* — I have ONE coffee. (counting)\n\n- **As an indefinite article:** « un » means \"a/an\" (general reference)\n  + *Je voudrais un café.* — I would like A coffee. (unspecified)\n\n- **In practice:** Context usually makes the meaning clear. However:\n  + After « c'est » or « c'est un… », it's usually the article: *C'est un café.* (It's a coffee.)\n  + After numbers, it's obviously the number: *J'ai pris un café.* could mean \"I had ONE coffee\" (counting) or just \"I had a coffee\"\n\n- **Note:** In speech, they're pronounced exactly the same — context is everything!", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "A French waiter says \"Messieurs-dames!\" as you enter. What does this mean and when is it used? (1 step)", "answer": "- **« Messieurs-dames! »** is a traditional greeting used by shopkeepers, waiters, and service staff when customers enter.\n\n- **Literal meaning:** \"Ladies and gentlemen!\" (plural)\n  + *Messieurs* = gentlemen (plural of monsieur)\n  + *Dames* = ladies (plural of dame)\n\n- **Usage:** It's a polite, somewhat old-fashioned but still common greeting in French shops and cafés. The equivalent in English might be \"Good morning/afternoon, sir/madam!\" but it's used for groups or in a general way.\n\n- This appears at the start of \"Un déjeuner rapide\" in the dialogues.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "In the phrase « un sandwich poulet-crudités », what does the hyphen tell you about the structure? What about in « un jus de raisin »? (Edge case) (1 step)", "answer": "- **With hyphen (—):** Indicates a **compound noun** — two or more words acting as one concept\n  + *poulet-crudités* = chicken + crudités as a single sandwich type\n  + *jambon-beurre* = ham-butter (the classic sandwich)\n  + *chèvre-chaud* = hot goat cheese (in salad)\n\n- **With « de »:** Indicates the **ingredient/origin** of something\n  + *jus de raisin* = juice of/from grapes (grape juice)\n  + *tarte aux pommes* = tart of/with apples\n  + *salade au chèvre* = salad with goat cheese\n\n- **Key difference:**\n  + **Hyphen** = compound, it's a fixed combination (the name of a dish)\n  + **De/à** = describes what's in it or what it's made from", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": true}, {"question": "You overhear someone say \"Je n'ai pas faim\" and \"Je n'ai pas de chance.\" What does the « de » tell you about the noun that follows? (2 steps)", "answer": "- Step 1: In negative sentences with certain expressions, « de » (not « des ») is used even when the noun would normally take an article:\n  + *Je n'ai pas **faim**.* — I'm not hungry. (faim = hunger, no article needed)\n  + *Je n'ai pas **soif**.* — I'm not thirsty.\n  + *Je n'ai pas **chaud**.* — I'm not hot.\n\n- Step 2: Compare with the café context:\n  + *Je n'ai pas **de** vin.* — I don't have (any) wine. (negating the noun directly)\n  + *Je n'ai pas **faim**.* — I'm not hungry. (negating a state, no article)\n\n- **Key insight:** Some nouns in French (like faim, soif, chance, peur) don't take articles after verbs like « avoir ». In negation, they just take « de » — but often don't need it at all!", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": true}, {"question": "How would you ask the waiter if they have a specific item, using the dialogue patterns? Create a full question-response. (2 steps)", "answer": "- Step 1: Forming the question (using \"vous avez\" + item):\n  + *Vous avez un plat du jour?* — Do you have a dish of the day?\n  + *Est-ce qu'il y a un saumon?* — Is there salmon?\n\n- Step 2: Possible responses:\n  + **Positive:** *Oui, nous avons un saumon grillé avec du riz.* — Yes, we have grilled salmon with rice.\n  + **Negative with alternative:** *Non, nous n'avons pas de saumon, mais nous avons une sole.* — No, we don't have salmon, but we have sole.\n\n- Note the grammar: \"vous avez\" → \"vous n'avez pas\" (add n' + pas). \"il y a\" → \"il n'y a pas\" (no article change in the question, but in the negative response use \"de\").", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "What is the gender of these café nouns: « le café », « la serveuse », « le sandwich », « l'addition », « la carte »? How can you tell? (1 step)", "answer": "- **Masculine:** le café, le sandwich, le croque-monsieur, le serveur\n- **Feminine:** la serveuse, la carte, l'addition (feminine — all words ending in -tion are feminine!), la cliente\n\n- **How to tell:**\n  + Most nouns ending in **-ment**, **-age**, **-on** are masculine\n  + Most nouns ending in **-tion**, **-son**, **-ité** are feminine\n  + Many food/drink nouns ending in **-é**, **-i** are masculine (café, thé, rosé)\n  + But this is not a perfect rule — the gender must often be memorised\n\n- **Important:** Always learn nouns WITH their articles (le/un or la/une)!", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "In French, why is saying \"Merci, au revoir!\" more logical than the literal translation might suggest? (Cultural insight) (1 step)", "answer": "- **\"Merci, au revoir!\"** literally means \"Thank you, goodbye!\" — which makes perfect sense in English too.\n\n- **Why it's logical:** In French, it's normal to thank someone AFTER they've provided service, even if you're leaving. So \"thanks + goodbye\" goes together naturally:\n  + You finish your meal → *Merci* (for the food/service)\n  + You leave → *Au revoir!* (goodbye)\n\n- **Cultural note:** French customer service involves thanking at the end much more than at the beginning. Starting with \"Bonjour\" is essential, but ending with thanks is equally important for politeness.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "You want to describe these items using adjectives: (a) a hot coffee, (b) a green salad, (c) grilled fish. Write the correct French phrases with adjective agreement. (2 steps)", "answer": "- Step 1: Use the adjective agreement rules:\n  + Masculine singular: base form\n  + Feminine singular: add -e\n  + Plural: add -s (or -es for feminine)\n\n- Step 2: Write the phrases:\n  + **(a) un café chaud** — a hot coffee (masculine singular)\n  + **(b) une salade verte** — a green salad (feminine singular — vert → verte)\n  + **(c) un saumon grillé** — a grilled salmon (masculine singular); **une sole grillée** — a grilled sole (feminine singular)\n\n- Note: *grillé* ends in -é, which already looks like the feminine form — but you still add -e: *grillée*. However, some adjectives don't change: *un café noir* (black coffee) → *une robe noire*.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "A tourist says \"Je ne veux pas de vin.\" Explain what each word does in this sentence grammatically. (1 step)", "answer": "- **Je** — subject pronoun (I)\n- **ne** — negation particle (not)\n- **veux** — verb \"vouloir\" (to want) in present tense, 1st person singular\n- **pas** — negation particle (not) — completes the negation structure\n- **de** — partitive/negative article (any) — replaces \"du/des\" in negative\n\n- **Complete meaning:** \"I don't want (any) wine.\"\n\n- **Grammar pattern:** This follows the standard French negation: ne + verb + pas, with de replacing the article because of the negation.", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}, {"question": "What does the dialogue teach us about handling dietary restrictions in French? Give specific phrases from \"Une cliente difficile\". (1 step)", "answer": "- **Client's phrases:**\n  + *Je suis végétarienne!* — I'm a vegetarian! (declaring dietary requirement)\n  + *Je voudrais juste des légumes.* — I would just like vegetables.\n  + *Sans beurre, s'il vous plaît.* — Without butter, please.\n\n- **Server's phrases:**\n  + *Nous avons…* — We have… (offering alternatives)\n  + *Une assiette de…* — A plate of… (suggesting options)\n  + *Ah bon…* — Oh I see… (expressing surprise/polite acknowledgment)\n  + *Ah, les clients…* — Oh, the customers… (playful complaint!)\n\n- **Key phrases for dietary needs:**\n  + *Je suis allergique à…* — I'm allergic to…\n  + *Je ne mange pas de…* — I don't eat…\n  + *Je suis végétarien/végétarienne* — I'm (male/female) vegetarian", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": true}, {"question": "In the phrase « le client / la cliente », what does the extra 'e' indicate? How does this pattern work for other nouns? (1 step)", "answer": "- The **-e** ending indicates the **feminine form** of the noun.\n\n- **Pattern:**\n  + **Masculine → Feminine:** add -e\n  + *le client* → *la cliente* (customer)\n  + *le serveur* → *la serveuse* (waiter)\n  + *l'américain* → *l'américaine* (American)\n  + *un étudiant* → *une étudiante* (student)\n\n- **Note:** This is the same pattern as adjective agreement — many nouns (called \"noms communs\" — common nouns) have masculine and feminine forms, distinguished by the -e.\n\n- **Exception:** Some nouns don't change: *un élève* (student) → *une élève* — the article tells you the gender, not the noun ending.", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": false}, {"question": "Why is « Je pourrais avoir… » considered more polite than « Je veux… »? (Cultural insight) (1 step)", "answer": "- **« Je veux… »** is direct and can sound demanding — \"I want…\"\n  + While grammatically correct, it can seem rude in customer service\n\n- **« Je pourrais avoir… »** literally means \"Could I have…\" — it's the **conditional mood** (pourrais = could)\n  + This softens the request into something more like a question/possibility\n  + It's much more polite and common in French service situations\n\n- **Similar polite patterns:**\n  + *Je voudrais…* — I would like (conditional)\n  + *J'aimerais…* — I would like (conditional)\n  + *Je pourrais avoir…* — Could I have… (conditional)\n\n- **Cultural insight:** French politeness often involves making requests sound less direct by using the conditional mood.", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": true}, {"question": "Practice: Translate these orders into French: (a) I would like a coffee and a glass of water, please. (b) Do you have any apple tarts? (c) I don't eat meat, I'm vegetarian. (3 steps)", "answer": "- Step (a): \"I would like a coffee and a glass of water, please.\"\n  + *Je voudrais un café et un verre d'eau, s'il vous plaît.*\n\n- Step (b): \"Do you have any apple tarts?\"\n  + *Vous avez une tarte aux pommes?* OR\n  + *Est-ce qu'il y a des tartes aux pommes?*\n\n- Step (c): \"I don't eat meat, I'm vegetarian.\"\n  + *Je ne mange pas de viande, je suis végétarien/végétarienne.*\n\n- **Grammar check:**\n  + (a) uses « un » and « un » (indefinite articles) + quantity « un verre d'eau »\n  + (b) uses « une » (feminine) + « tartes » (plural) — if negative: *pas de tartes*\n  + (c) uses negative « ne…pas de » with « de » replacing « de la »", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": false}, {"question": "What is the difference between « un peu de » and « pas de »? How would you use each in a café context? (1 step)", "answer": "- **« Pas de »** = none / not any (complete absence)\n  + *Je n'ai pas de sucre.* — I have no sugar / I don't have any sugar.\n\n- **« Un peu de »** = a little bit of (small quantity, but SOME exists)\n  + *Je voudrais un peu de sucre dans mon café.* — I'd like a little sugar in my coffee.\n\n- **In café context:**\n  + *Il n'y a pas de crème dans mon café.* — There's no cream in my coffee. (complete absence)\n  + *Je voudrais un peu de lait.* — I'd like a little milk. (requesting some)\n\n- **Key difference:** « Pas de » = zero. « Un peu de » = some (but not a lot).", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": true}, {"question": "In French, why might a waiter say \"Et comme boisson?\" rather than \"Et quelle boisson?\" when taking your order? (Cultural/grammatical insight) (1 step)", "answer": "- **« Comme »** in French often means \"as\" or \"for\" in the context of \"as for…\" or \"for…\"\n  + *Et comme boisson?* — \"And for drink?\" / \"And to drink?\"\n  + *Et comme dessert?* — \"And for dessert?\"\n\n- **Why not \"quelle boisson\"?**\n  + « Quelle » implies a direct question about the specific item (\"what drink?\")\n  + « Comme » is softer — it's more like \"and what will you have for/with…?\"\n\n- This is part of the polite formulaic language in French service — fixed phrases that sound natural and polite rather than direct questions.", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": false}, {"question": "Fill in the blanks: Je _____ (have) un café. Je _____ (don't have) de fromage. Nous _____ (have) une table. Ils _____ (don't have) _____vin. (1 step)", "answer": "- **Je** ***ai*** un café. — I have a coffee.\n- **Je** ***n'ai pas*** de fromage. — I don't have any cheese.\n- **Nous** ***avons*** une table. — We have a table.\n- **Ils** ***n'ont pas*** ***de*** vin. — They don't have any wine.\n\n- **Key patterns to remember:**\n  + Affirmative: use the conjugated form of « avoir »\n  + Negative: « ne + avoir + pas + de/d' »\n  + The « de/d' » replaces the article in negative sentences", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": false}, {"question": "A beginner says \"J'ai hunger.\" Why is this wrong, and what is the correct way to say \"I am hungry\" in French? (Misconception probe) (1 step)", "answer": "- **The error:** Direct translation from English — trying to say \"I have hunger\" literally\n\n- **The correct French:** **« J'ai faim »** — literally \"I have hunger\" (but it WORKS differently!)\n\n- **Key insight:** In French, « avoir » is used with certain nouns to express states that English expresses with \"to be\":\n  + *avoir faim* — to be hungry (literally \"to have hunger\")\n  + *avoir soif* — to be thirsty (\"to have thirst\")\n  + *avoir chaud* — to be hot\n  + *avoir froid* — to be cold\n  + *avoir peur* — to be afraid\n  + *avoir raison* — to be right\n  + *avoir tort* — to be wrong\n\n- **This is a false friend trap:** Don't use \"to be + hungry\" → use \"avoir + faim\"!", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": true}, {"question": "You see on the menu: \"Omelette au fromage 7€\" and \"Omelette au fromage 6€\". What do the prices tell you about the portions? (Simple exercise) (1 step)", "answer": "- Looking at the menu from the chapter:\n  + **Omelette nature** — 6 € (plain/simple)\n  + **Omelette au fromage** — 7 € (with cheese, more expensive)\n\n- This is a simple **price comparison** exercise:\n  + The plain omelette costs 6 euros\n  + The cheese omelette costs 7 euros — **1 euro more** than the plain one\n\n- **What this teaches:** In French, \"au\" means \"with\" or \"in the style of\" — *omelette au fromage* = omelette with cheese/in the cheese style. The price difference reflects the extra ingredient.\n\n- **Simple calculation:** 7 - 6 = 1 euro difference", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": false}, {"question": "Based on the menu prices, which is cheaper: the \"Pizza au jambon\" or the \"Croque-monson\"? How much cheaper? (Simple exercise) (1 step)", "answer": "- From the café menu in the chapter:\n  + **Pizza au jambon** — 6 €\n  + **Croque-monsieur** — 6,50 €\n\n- **Calculation:** 6,50 € - 6 € = **0,50 €** (fifty cents)\n\n- **Answer:** The Pizza au jamón is cheaper by **50 centimes** (or \"cinquante centimes d'euro\").\n\n- **Vocabulary reminder:** In French decimals use commas, not periods: 6,50 € (not 6.50 €)", "source": "MiniMax ①", "_id": "minimax_1_49", "judge_pick": false}, {"question": "How would you say these numbers in French: 3, 5, 7, 12, 15, 20? Then say: \"I would like 3 croissants, please.\" (1 step)", "answer": "- **Numbers:**\n  + 3 = trois\n  + 5 = cinq\n  + 7 = sept\n  + 12 = douze\n  + 15 = quinze\n  + 20 = vingt\n\n- **Complete sentence:** *Je voudrais trois croissants, s'il vous plaît.*\n\n- **Key grammar point:** In French, when you use a number + noun, you DON'T use an article:\n  + NOT \"je voudrais trois **des** croissants\" — just \"trois croissants\"\n  + The number itself replaces the article\n\n- This is different from English where you'd say \"three croissants\" — same pattern!", "source": "MiniMax ①", "_id": "minimax_1_50", "judge_pick": false}, {"question": "What does the suffix \"-ier/-ière\" often indicate in French nouns, as seen in « le serveur / la serveuse »? (1 step)", "answer": "- The suffixes **-ier** (masculine) and **-ière** (feminine) often indicate:\n  + **Professions** or **roles**\n  + **People who do something**\n\n- **Examples from the chapter:**\n  + *le serveur / la serveuse* — waiter/waitress\n  + *le客户 / la cliente* — client/customer (not -ier, but shows gender)\n  + *un glacier* — ice cream maker/seller (from \"glace\")\n\n- **Pattern:**\n  + **-ier → -ière:** often indicates feminine form\n  + Just like adjective agreement, adding -e shows feminine\n\n- **Note:** Not ALL -ier/-ière pairs exist — some professions only have one form or use a different pattern.", "source": "MiniMax ①", "_id": "minimax_1_51", "judge_pick": false}, {"question": "In \"Je ne voudrais pas d'omelette\", why is there an apostrophe after the 'd'? What would happen if you wrote \"Je ne voudrais pas de omelette\"? (Edge case) (1 step)", "answer": "- **The apostrophe** appears because « de » becomes « d' » before a vowel sound\n  + *Je ne voudrais pas d'omelette* — I wouldn't like (any) omelette\n\n- **If you wrote \"de omelette\":**\n  + This is grammatically incorrect in standard written French\n  + The apostrophe contraction is mandatory before vowels\n  + You'd sound unnatural if speaking: \"de-omelette\" runs together badly\n\n- **Similar examples:**\n  + *pas d'eau* (not \"de eau\")\n  + *pas d'orange* (not \"de orange\")\n  + *pas d'aligoté* (not \"de aligoté\")\n\n- **Key rule:** « De » → « d' » before ANY word starting with a vowel (a, e, i, o, u) or silent 'h'.", "source": "MiniMax ①", "_id": "minimax_1_52", "judge_pick": true}, {"question": "Create a short café ordering dialogue (minimum 4 lines) using: Je voudrais, s'il vous plaît, un/une/des, and the negative form. (2 steps)", "answer": "- Step 1: Customer greeting and ordering\n  + **Client:** *Bonjour, monsieur. Je voudrais un café et une tartine, s'il vous plaît.*\n\n- Step 2: Server responding and checking\n  + **Serveur:** *Très bien. Et comme boisson, vous avez déjà un café… Vous voulez de l'eau?*\n  + **Client:** *Oui, un verre d'eau, s'il vous plaît.*\n\n- Step 3: Customer adding more (using negative)\n  + **Client:** *Je ne voudrais pas de beurre dans la tartine, s'il vous plaît.*\n\n- Step 4: Server confirmation\n  + **Serveur:** *D'accord! Une tartine sans beurre, un café et un verre d'eau. Très bien!*\n\n- **Grammar elements covered:** Je voudrais, s'il vous plaît, un/une/des, negation (ne...pas), quantities (un verre d'), de/d' contractions", "source": "MiniMax ①", "_id": "minimax_1_53", "judge_pick": false}, {"question": "Explain why « le croque-monsieur » has an '-s' even though it's one sandwich. Is it plural? (Misconception probe) (1 step)", "answer": "- **The '-s' is NOT a plural marker** — it's part of the name!\n\n- **« Croque-monsieur »** is a **compound noun** — it was named after a person (or type of person), similar to how we'd say \"a John Doe\" or \"a Tom, Dick, or Harry\"\n  + The '-mister' part (monsieur) is built into the word\n  + Even one sandwich = *un croque-monsieur* (not \"un croque-monsieur\")\n\n- **Similar examples:**\n  + *un porte-clés* — a keyring (not \"des portes-clés\" for one)\n  + *un tire-bouchon* — a corkscrew\n  + *un coupe-ongles* — nail clippers\n\n- **Rule:** Compound nouns in French often keep their internal '-s' even when singular. You need to learn them as fixed expressions!", "source": "MiniMax ①", "_id": "minimax_1_54", "judge_pick": true}, {"question": "If a French person says \"J'ai très faim\" vs \"J'ai assez faim\", what does the difference in adverbs tell you about their hunger level? (1 step)", "answer": "- **« J'ai très faim »** — \"I'm VERY hungry\" (very = very much)\n  + « Tres » intensifies the hunger\n\n- **« J'ai assez faim »** — \"I'm hungry ENOUGH\" / \"I have enough hunger\"\n  + « Assez » means \"enough\" — could imply satisfaction or that more isn't needed\n\n- **Related adverbs for quantities:**\n  + *très* — very (intensifier)\n  + *assez* — enough / fairly\n  + *un peu* — a little\n  + *pas* — not (in negative: *pas très faim* = not very hungry)\n\n- In a café context, saying « j'ai très faim » might lead the server to suggest more substantial items like a « formule » (set menu)!", "source": "MiniMax ①", "_id": "minimax_1_55", "judge_pick": true}, {"question": "What is the French word for \"the check/bill\" and how would you politely ask for it at the end of a meal? (1 step)", "answer": "- **The word:** **« L'addition »** (feminine noun)\n  + NEVER say \"le addition\"!\n\n- **Polite ways to ask:**\n  + *L'addition, s'il vous plaît!* — The bill, please! (most common)\n  + *Je voudrais l'addition, s'il vous plaît.* — I would like the bill, please.\n  + *Je pourrais avoir l'addition, s'il vous plaît?* — Could I have the bill, please?\n\n- **Cultural note:** In France, you typically ask for the bill — it's not automatically brought. It's considered polite to ask rather than demand. Also, service is usually included (*service compris*), but you can leave a small tip (*pourboire*) for good service.", "source": "MiniMax ①", "_id": "minimax_1_56", "judge_pick": false}, {"question": "In French, how do you say \"I would like the coffee, not the tea\"? What grammar points does this sentence demonstrate? (2 steps)", "answer": "- Step 1: The sentence\n  + *Je voudrais le café, pas le thé.*\n\n- Step 2: Grammar points demonstrated:\n  + **Definite articles** « le » and « le » — when you mean SPECIFIC items (the coffee, the tea)\n  + **« Pas le/la/les »** — the negative word « pas » can be used with definite articles to mean \"not the…\"\n    - *Je ne veux pas le café* — I don't want the coffee\n    - *Je veux le café, pas le thé* — I want coffee, not tea\n  + **Word order:** Subject + verb + object, then comma + \"pas\" + alternative\n\n- **Compare with indefinite:**\n  + *Je voudrais un café, pas une tisane.* (an herbal tea — indefinite)", "source": "MiniMax ①", "_id": "minimax_1_57", "judge_pick": true}, {"question": "A student writes \"Je suis avoir faim.\" Explain the error and provide the correct sentence. (Misconception probe) (1 step)", "answer": "- **The error:** Mixing English structure with French vocabulary\n  + English: \"I am hungry\" (to be + adjective)\n  + Student incorrectly: \"je suis avoir faim\" — trying to combine \"to be\" + \"to have\"\n\n- **The correct French:** **« J'ai faim »**\n  + French uses « avoir » (to have) + noun for many states\n  + English uses \"to be\" + adjective\n\n- **Remember these fixed expressions:**\n  + *J'ai faim* — I'm hungry (NOT \"je suis faim\")\n  + *J'ai soif* — I'm thirsty\n  + *J'ai chaud* — I'm hot\n  + *J'ai froid* — I'm cold\n\n- **The pattern:** « avoir + [noun of state] » = English « to be + [adjective] »", "source": "MiniMax ①", "_id": "minimax_1_58", "judge_pick": false}], "count": 59}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "Complete the negative form of the verb \"avoir\" (to have): je n'___ pas · tu n'___ pas · il/elle/on n'___ pas · nous n'___ pas · vous n'___ pas · ils/elles n'___ pas", "answer": "- The verb \"avoir\" (to have) in present tense:\n  - j'ai, tu as, il/elle/on a, nous avons, vous avez, ils/elles ont\n\n- In negation, \"ne...pas\" surrounds the conjugated verb:\n  - je n'ai pas · tu n'as pas · il/elle/on n'a pas · nous n'avons pas · vous n'avez pas · ils/elles n'ont pas\n\n+ **Key rule:** \"ne\" becomes \"n'\" before any vowel or mute \"h\" (n'a, n'avons, n'ont)\n\n+ Example: *— Vous avez un rosé d'Anjou? — Non, nous n'avons pas de rosé d'Anjou.*", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "Explain the French negation structure using the example: \"I don't have coffee\" and \"There isn't any salmon.\" How does the article change in negative sentences? (2 examples)", "answer": "- **Structure:** ne + verb + pas\n  - *Je n'ai pas de café.* (I don't have coffee)\n  - *Il n'y a pas de saumon.* (There isn't any salmon)\n\n- **Article change in negative:**\n  - Indefinite articles (un/une/des) become **de** (or **d'** before vowel) in negative sentences\n  - *un café* → *pas de café*\n  - *une omelette* → *pas d'omelette*\n  - *des légumes* → *pas de légumes*\n\n+ This is a common beginner mistake — forgetting to change the article! Correct: *Je veux un sandwich* → *Je n'ai pas de sandwich.*", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "What is the difference between \"un\" and \"une\" in French? How do you know which to use? Give 3 examples of each. (6 items)", "answer": "- **un** = masculine indefinite article (a/an)\n- **une** = feminine indefinite article (a/an)\n\n+ The choice depends on the **gender (genre)** of the noun:\n  - **Masculine:** un café, un croissant, un sandwich, un verre, un plat\n  - **Feminine:** une salle, une eau, une tartine, une assiette, une carte\n\n+ **How to know:** You must learn the gender with each noun! In French, there's no single rule — it's largely arbitrary and must be memorized. The article is your clue: *le*/*un* = masculine; *la*/*une* = feminine.\n\n+ **Plural:** des is used for both genders (des cafés, des salades)", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "What are the four French definite articles (the) and when do you use each? Include what happens before vowels. (4 forms)", "answer": "- **le** — masculine singular (le café, le pain)\n- **la** — feminine singular (la table, la carte)\n- **les** — plural for both genders (les cafés, les tables)\n- **l'** — elision before vowel or mute \"h\" (l'eau, l'addition, l'omelette)\n\n+ Examples:\n  - *Le serveur* (the server, m.) · *La serveuse* (the server, f.)\n  - *L'addition, s'il vous plaît!* (The bill, please!)\n  - *Les clients sont contents.* (The clients are happy.)\n\n+ **Note:** There is no \"l'\" before consonants — only before vowels!", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "How do you express \"there is\" and \"there isn't\" in French for singular and plural? Give both affirmative and negative forms with examples. (4 phrases)", "answer": "- **Affirmative:** il y a (there is / there are)\n  - *Il y a un plat du jour.* (There is a dish of the day)\n  - *Il y a des croissants.* (There are croissants)\n\n- **Negative:** il n'y a pas de (there is not / there are not)\n  - *Il n'y a pas de saumon.* (There isn't any salmon)\n  - *Il n'y a pas de frites.* (There aren't any fries)\n\n+ **Key point:** Notice \"de\" (not \"des\") appears in the negative — *pas de saumon*, not *pas des saumon*!\n\n+ Example from dialogue: *— Vous avez un plat du jour? — Oui, il y a un lapin à la moutarde.*", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "In French adjectives, what determines whether the ending is -e or not? Explain with examples for masculine, feminine, singular, and plural forms. (4 forms)", "answer": "- **Rule:** Adjectives must **agree** with the noun they describe — matching in **gender** (masculine/feminine) and **number** (singular/plural).\n\n- **Masculine singular:** base form (usually given in dictionary)\n  - *un chocolat chaud* (hot chocolate)\n  - *un saumon grillé* (grilled salmon)\n\n- **Feminine singular:** add -e\n  - *une omelette chaude* (hot omelette)\n  - *une sauce chaude* (hot sauce)\n\n- **Masculine plural:** add -s\n  - *des chocolats chauds*\n\n- **Feminine plural:** add -es\n  - *des omelettes calientes* (note: many -el adjectives double the -l: individuel → individuels/individuelles)\n\n+ **Common examples from chapter:**\n  - *des légumes cuits* (cooked vegetables)\n  - *une tartine beurrée* (buttered bread)\n  - *3 petits verres* (3 small glasses)", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "In French, why do we say \"un verre de vin\" but \"un verre d'eau\"? What determines whether we use \"de\" or \"d'\" with quantities? (2 examples)", "answer": "- **Rule:** The preposition **de** (of/about) links a quantity to a noun. Before a vowel or mute \"h\", **de** becomes **d'**.\n\n- **Examples:**\n  - *un verre de vin* (a glass of wine) — vin starts with consonant → de\n  - *un verre d'eau* (a glass of water) — eau starts with vowel → d'\n  - *une carafe d'eau* (a pitcher of water)\n  - *une bouteille d'aligoté* (a bottle of aligoté)\n\n+ This is the same elision rule as with articles (le → l', un → un, but de → d').\n\n+ **From the dialogues:** \"un demi et une carafe d'eau\" — notice \"d'eau\" because \"eau\" begins with a vowel!", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "A French customer says \"Je voudrais juste des légumes.\" Then they say \"Sans beurre, les légumes, s'il vous plaît!\" What does \"des\" mean here, and why is it NOT \"de\" in the second sentence? Explain. (2 sentences)", "answer": "- **\"Des légumes\"** = some vegetables (indefinite plural)\n  - Here \"des\" is the plural indefinite article (un/une/des), meaning \"some\" — the customer wants vegetables but hasn't specified how many.\n\n- **\"Les légumes\"** = the vegetables (definite article)\n  - Here \"les\" refers to **the specific vegetables** already mentioned — the ones the customer just ordered. In French, when you repeat a noun already introduced, you switch to the definite article.\n\n+ This is a key concept: French uses \"les\" to refer back to something already mentioned or known, whereas English might say \"them\" or \"the.\"", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": true}, {"question": "A tourist orders at a café. They say: \"Bonjour, monsieur. Je voudrais un café, s'il vous plaît.\" Then they ask: \"Il y a du lait?\" Is this correct? If not, what should they say, and why? (2 corrections)", "answer": "- **First sentence:** Correct! *\"Bonjour, monsieur. Je voudrais un café, s'il vous plaît.\"*\n\n- **Second sentence:** Should be: **\"Il y a du lait?\"** — Actually this IS correct in informal speech!\n\n+ **Wait — let me reconsider:**\n\n- Better/more formal would be: **\"Est-ce qu'il y a du lait?\"** (Is there any milk?)\n- In the café context, \"Il y a du lait?\" is understood but somewhat abrupt.\n\n+ **Key point about \"du\":** When you say \"some milk\" in affirmative, you use **du** (masculine singular contraction of de + le). Other examples:\n  - *Je voudrais du fromage.* (some cheese)\n  - *Il y a du pain?* (Is there any bread?)\n\n+ **BUT** in negation: *Il n'y a pas de lait* (not \"pas du lait\") — this follows the \"pas de\" rule we learned!", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "In the dialogue \"Une cliente difficile,\" the vegetarian customer keeps refusing dishes. What does \"Je suis végétarienne!\" mean, and what is the feminine \"-ienne\" ending called? Explain. (1 explanation)", "answer": "- **Meaning:** \"I am a vegetarian!\" (feminine form)\n\n- **The \"-ienne\" ending:** This indicates the **feminine form** of a noun or adjective. Many French words ending in \"-ien\" (masculine) become \"-ienne\" (feminine).\n\n+ **Other examples from French:**\n  - un étudiant → une étudiante (student)\n  - français → française\n  - américain → américaine\n  - végétarien → végétarienne\n\n+ In the dialogue, the customer is a woman, so she says *végétarienne* (not *végétarien* which would be masculine). This is another example of **adjective agreement** — the adjective must match the gender of the person it describes!", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "A waiter asks \"Vous avez une table libre, là-bas?\" and the customer responds \"Oui, très bien!\" What do \"une\" and \"la\" tell you about the gender of the nouns they precede? (2 nouns)", "answer": "- **\"une table\"** — The article \"une\" tells us that **table** is a **feminine** noun (une table = a table).\n  - We know this because \"une\" is the feminine indefinite article.\n\n- **\"là-bas\"** — The article \"l'\" (in \"là-bas\" = over there) is actually not an article here — it's the adverb \"là\" (there) + \"bas\" (low/down). But \"la\" as an article would indicate a feminine noun.\n\n+ **Wait — let me clarify:** The dialogue says \"Vous avez une table libre, là-bas?\" Here:\n  - **une table** = feminine (une = feminine article)\n  - **libre** = free (adjective, agrees with table → feminine form, but \"libre\" is the same in both genders!)\n\n+ **Takeaway:** Always look at the article to identify noun gender: le/un = masculine; la/une = feminine.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "What do these polite French expressions mean in English, and when would you use each? bonjour · au revoir · s'il vous plaît · merci · bien sûr (5 expressions)", "answer": "- **Bonjour** — \"Hello / Good morning\" — Used when greeting someone, until evening. Essential in France!\n- **Au revoir** — \"Goodbye\" — Used when leaving. Always say this when leaving a shop/cafe.\n- **S'il vous plaît** — \"Please\" — Used when making requests. The \"vous\" is formal \"you\" (polite).\n- **Merci** — \"Thank you\" — Basic thanks. Adding \"beaucoup\" = \"thank you very much.\"\n- **Bien sûr** — \"Of course / Sure\" — Used to affirm a request.\n\n+ **Why it matters:** In French culture, politeness markers are expected in every interaction. Entering a shop without saying \"bonjour\" is considered rude! Even to a stranger: *Bonjour, monsieur/madame/mademoiselle!*", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "In the café dialogue, a customer orders \"un demi et une carafe d'eau.\" What does \"un demi\" mean, and why is it called \"demi\" even though it's not actually half? (1 explanation)", "answer": "- **\"Un demi\"** is a **glass of draft beer** (about 25 cl), also called \"un demi de bière\" or just \"un demi.\"\n\n- **Why \"demi\"?** Historically, a \"demi\" is half of a \"pinte\" (a pint), which was a larger serving size. So it's \"half\" of the old pint size — about 250ml.\n\n+ **In France, beer sizes:**\n  - Un demi = ~25 cl (most common in cafés)\n  - Une pinte = ~50 cl (larger, becoming more common)\n  - Un pression = draft/beer on tap\n\n+ **From dialogue:** *\"— Et comme boisson? — Un demi et une carafe d'eau.\"* The customer orders beer and water.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "How do you say the following numbers in French: 7, 12, 15, 17, 20? Spell them out completely. (5 numbers)", "answer": "- **7** = sept (sounds like \"set\")\n- **12** = douze (sounds like \"dooz\")\n- **15** = quinze (sounds like \"canz\")\n- **17** = dix-sept (10 + 7 = \"dees-set\")\n- **20** = vingt (sounds like \"van\")\n\n+ **Pattern in French numbers:**\n  - 17, 18, 19 = dix-sept, dix-huit, dix-neuf (10+7, 10+8, 10+9)\n  - These are hyphenated in French: *dix-sept*, *dix-huit*, *dix-neuf*\n\n+ **Memory tip:** French numbers from 17-19 follow the same \"dix-\" (10) pattern as 11-16 (onze, douze, treize, quatorze, quinze, seize)", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "A beginner says \"J'ai hunger.\" Is this correct? If not, how do French speakers express \"I am hungry\"? Explain the verb construction used. (1 correction)", "answer": "- **Incorrect:** *J'ai hunger* (English word, wrong structure!)\n\n- **Correct French:** **J'ai faim.** (I am hungry)\n\n+ **Explanation:** In French, many states are expressed with **avoir** + noun, not with \"to be\" + adjective:\n  - *J'ai faim* = I am hungry (literally: \"I have hunger\")\n  - *J'ai soif* = I am thirsty (\"I have thirst\")\n  - *J'ai chaud* = I am hot\n  - *J'ai froid* = I am cold\n  - *J'ai peur* = I am afraid\n\n+ **Misconception alert:** Don't translate English \"to be\" constructions directly! This is a classic beginner error. Remember: in French, it's avoir + noun, not être + adjective for these states.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "In the café menu, you see \"Omelette nature 6 €\" and \"Omelette au fromage 7 €.\" What does \"nature\" mean, and what does \"au fromage\" mean? How does \"au\" work grammatically? (2 terms)", "answer": "- **\"Nature\"** — \"Plain / without toppings\" (literally \"nature\" = natural/plain). So an omelette nature is a plain omelette with just eggs.\n\n- **\"Au fromage\"** — \"With cheese\" (literally \"to the cheese\"). The preposition \"au\" (à + le) means \"with\" in cooking context.\n\n+ **How \"au\" works:**\n  - à + le = au (contraction)\n  - à + la = à la (no contraction)\n  - So: *au fromage* (with cheese), *au jamón* (with ham), but *à la crème* (with cream)\n\n+ **From the menu:**\n  - Omelette nature = plain omelette (6€)\n  - Omelette au fromage = cheese omelette (7€)\n\n+ **Similar pattern:** \"un café au lait\" = coffee with milk (\"to the milk\")", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "What is the difference between \"une orange pressée\" and \"une citron pressé\"? Why does one adjective end in -ée and the other in -é? (2 drinks)", "answer": "- **\"Une orange pressée\"** — a squeezed orange (freshly squeezed orange juice)\n- **\"Un citron pressé\"** — a squeezed lemon (freshly squeezed lemon juice)\n\n- **Why the difference in endings?**\n  - **-ée** = feminine past participle (because \"orange\" is feminine → the adjective agrees)\n  - **-é** = masculine past participle (because \"citron\" is masculine → no -e ending needed)\n\n+ **The grammar:** \"pressé(e)\" comes from the verb \"presser\" (to press/squeeze). When used as an adjective, it agrees with the noun:\n  - *une orange pressée* (feminine → -ée)\n  - *un citron pressé* (masculine → -é)\n\n+ **Same pattern:** *un café crème* (masculine) but the adjective \"crème\" doesn't change because it's used as a noun/adjective combo.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": true}, {"question": "A customer orders: \"Je voudrais une formule petit-déjeuner avec un café crème, s'il vous plaît.\" What does \"formule\" mean in this context, and what does a typical French \"formule\" include? (1 concept)", "answer": "- **\"Formule\"** = \"set menu / deal / combo\" — a fixed-price meal that includes multiple items at a reduced price.\n\n+ **What a typical formule includes:**\n  - In the morning: *café + orange pressée + croissant/tartine* (as in the dialogue)\n  - At lunch/dinner: *entrée + plat + dessert* (or sometimes plat + dessert, or plat + boisson)\n\n+ **From dialogue:** *\"— Je voudrais une formule 'petit-déjeuner', s'il vous plaît. — Avec un café, un thé, un chocolat?\"* The customer wants the breakfast set menu.\n\n+ **Why use \"formule\"?** It's cheaper than ordering items separately. In the menu example, a \"formule à 12 euros\" includes salad + fish + drink.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "In French, what is the difference between \"je n'ai pas\" and \"je n'ai pas de\"? When do you use each? Give an example for each case. (2 constructions)", "answer": "- **\"Je n'ai pas + noun\"** — Used when the noun has a **determiner** (article, adjective, possessive) already\n  - Example: *Je n'ai pas le temps.* (I don't have the time)\n  - *Je n'ai pas mon portable.* (I don't have my phone)\n\n- **\"Je n'ai pas de + noun\"** — Used when the noun has **no determiner** (just the bare noun)\n  - Example: *Je n'ai pas de café.* (I don't have coffee)\n  - *Je n'ai pas d'eau.* (I don't have water — \"d'\" before vowel)\n\n+ **Key insight:** When negating \"avoir\" + noun without an article, replace the article with \"de/d'\":\n  - *J'ai un sandwich* → *Je n'ai pas de sandwich*\n  - *J'ai des frites* → *Je n'ai pas de frites*", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "A French person says \"Voilà le menu!\" but then points to \"la carte.\" What is the difference between \"le menu\" and \"la carte\" in a French restaurant? (2 terms)", "answer": "- **Le menu** — The **set menu** (the fixed-price options). This shows the formulas/deals available.\n- **La carte** — The **à la carte menu** (the full list of all items with individual prices). \"La carte\" literally means \"the card/panel.\"\n\n+ **Practical difference:**\n  - If you want to see today's deals → ask for *le menu* or *la formule*\n  - If you want to see everything available → ask for *la carte*\n\n+ **From the dialogue:** *\"— Bonjour, monsieur. Vous avez une table libre, là-bas. Et voici la carte.\"* The server gives the full à la carte menu.\n\n+ **Pro tip:** In French, you often hear: *\"Qu'est-ce qu'il y a au menu?\"* (What's on the set menu?) vs. *\"La carte, s'il vous plaît!\"* (The menu, please — meaning the full list)", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "In the dialogue \"Une cliente difficile,\" the customer keeps refusing with \"Non merci!\" and \"Ah non!\" How would you translate these, and what do they reveal about French politeness patterns? (2 phrases)", "answer": "- **\"Non merci!\"** — \"No, thank you!\" — Used to politely refuse something offered.\n- **\"Ah non!\"** — \"Oh no!\" / \"Ah, no!\" — Expresses disappointment or strong refusal.\n\n+ **French politeness patterns in refusals:**\n  - French people rarely just say \"no\" — they add \"merci\" (thank you) to soften it\n  - \"Non merci\" = \"No, thank you\" (even if they don't want it, they're thanking you for offering)\n  - Starting with \"Ah non!\" shows immediate reaction — it's emphatic\n\n+ **In the dialogue:** The vegetarian customer uses \"Non merci!\" repeatedly to refuse dishes she doesn't want. Even when refusing, she's being polite... until she says \"Quelle horreur!\" (What horror!) about the fries!", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "How do you say these in French: 0, 3, 8, 11, 14? Spell them out completely and note any pronunciation similarities to English. (5 numbers)", "answer": "- **0** = zéro (sounds like \"zay-roh\")\n- **3** = trois (sounds like \"trwah\" — the \"r\" is rolled)\n- **8** = huit (sounds like \"weet\" — the \"h\" is silent)\n- **11** = onze (sounds like \"onz\" — like \"ones\")\n- **14** = quatorze (sounds like \"kah-torz\")\n\n+ **Pronunciation tips:**\n  - *zéro* — \"zay-roh\" (not \"zero\" with English z)\n  - *trois* — the \"oi\" sounds like \"wa\" (three)\n  *huit* — silent \"h\", sounds like \"weet\"\n  - *onze* — the \"z\" is pronounced (unlike in English \"eleven\")\n\n+ **Tricky ones:** Watch out for 70s and 80s in French (soixante-dix, quatre-vingts) — but for A1, you only need 0-20!", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "Explain why French wines are often named after the region where they're produced, using examples from the chapter: muscadet, aligoté, sancerre. (3 wines)", "answer": "- **French wine naming tradition:** Most French wines are named after their **region of origin**, not after the grape variety. This is a quality designation system — Appellation d'Origine Contrôlée (AOC).\n\n+ **Examples from the chapter:**\n  - **Muscadet** — From the Loire Valley (Muscadet sur Lie)\n  - **Aligoté** — From Burgundy (Bourgogne) — actually named after the grape!\n  - **Sancerre** — From the Loire Valley (white wine region)\n\n+ **Why this matters:** When you order \"un muscadet,\" you're asking for a wine from that specific region. It's like saying \"a Champagne\" (from Champagne region) vs. \"a sparkling wine.\"\n\n+ **Regions mentioned:**\n  - Loire: muscadet, sancerre, aligoté (white wines)\n  - Burgundy: chablis, pommard (reds/whites)\n  - Bordeaux: graves, saint-émilion (reds)\n  - Provence: bandol, côtes-de-provence (rosés)",
