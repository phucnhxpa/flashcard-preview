ctice? (2 steps)", "answer": "- Step 1: Weekly breakdown for S3:\n+ 2 × 90-minute lessons = 3 hours of class time\n+ 2 × 30-minute after-lesson review sessions = 1 hour of structured review\n+ 7 × 20-minute daily practice sessions = ~2.3 hours of distributed practice\n+ Total: ~6.3 hours/week of guided/deliberate French\n\n- Step 2: The daily 20 minutes is the critical multiplier. It doesn't sound like much, but 20 minutes every day (including non-lesson days) keeps the forgetting curve flat, reinforces vocabulary through spaced repetition, and builds a habit. The after-lesson review (within 24 hours of each class) captures the material while it's still fresh and moves it toward long-term memory before decay sets in.\n\n~6.3 hours/week total. The daily 20 minutes is the highest-ROI investment in the entire schedule.", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": false}, {"question": "Why does the roadmap add a 15% \"real-life calendar buffer\" on top of the exam-ready hours? What kinds of events does this account for? (2 steps)", "answer": "- Step 1: The 15% buffer converts pure study-hours into **calendar months** by accounting for the gap between ideal consistency and real life. If you need 132 exam-ready hours for A1→A2, and you study 6.3h/week (S3), that's ~21 weeks of perfect consistency = ~5 months. But real life isn't perfectly consistent.\n- Step 2: The buffer accounts for: missed weeks (illness, travel, exams), holidays, reduced study intensity during busy periods, motivation dips, lesson cancellations, and the simple reality that some weeks you'll do less than planned. Adding 15% to the calendar estimate means 5 months becomes ~5.75 months — a more realistic target. Without the buffer, you'd plan for 5 months and likely take 6, causing frustration.\n\nPure study math → ideal timeline. +15% buffer → realistic timeline. Plan for real life, not for a robot.", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": false}, {"question": "What is the difference between \"au revoir\" and \"à bientôt\" / \"à très vite\" in French? When would you use each? (2 steps)", "answer": "- Step 1: **\"Au revoir\"** = goodbye (the standard, neutral farewell). It's formal enough for any context and simply marks the end of an interaction. You'd say this to a server, a colleague, anyone. It literally means \"to the re-seeing\" (au = to the, revoir = seeing again).\n- Step 2: **\"À bientôt\"** = see you soon (implies you expect to see the person again relatively soon). **\"À très vite\"** = see you very soon (even sooner than bientôt, more enthusiastic). These are warmer, more personal farewells. You'd use them with friends, a tutor you see weekly, or someone you genuinely expect to see again soon. With a stranger or in a formal setting, \"au revoir\" is safer.\n\nAu revoir = neutral goodbye. À bientôt = see you soon (warm). À très vite = see you very soon (warmer).", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": false}, {"question": "In the reservation conversation, the server says \"C'est noté, Monsieur. À ce soir!\" What does \"c'est noté\" mean literally and pragmatically, and why is \"ce\" used instead of \"il\"? (2 steps)", "answer": "- Step 1: **\"C'est noté\"** literally = \"It's noted\" = \"That's noted / I've got it down.\" Pragmatically, it means \"Your reservation is confirmed / I've recorded the details.\" It's the standard professional acknowledgment in service contexts.\n- Step 2: \"Ce\" (in \"c'est\") is used because this is a **presentative/impersonal construction** — the server isn't pointing to a specific masculine noun (\"il serait noté\" would refer to a specific thing). \"C'est\" here is the neutral, general \"it is\" — the reservation details as a whole are noted. This aligns with the rule from the homework: \"après c'est, l'adjectif est toujours masculin\" — \"c'est\" triggers the default masculine form.\n\n\"C'est noté\" = professional \"got it / noted.\" \"Ce\" = impersonal pronoun, not referring to a specific gendered noun.", "source": "GLM 5.1 ②", "_id": "glm_2_50", "judge_pick": false}, {"question": "A simple exercise: How do you say the number 71 in French, and why is it \"soixante-et-onze\" and not \"soixante-dix-un\"? (2 steps)", "answer": "- Step 1: 71 in French = **soixante-et-onze** (sixty-and-eleven). It's not \"soixante-dix-un\" because French doesn't count 71 as \"60+10+1\" — it counts it as \"60+11.\" The logic: once you pass 70 (soixante-dix), the teens (onze, douze, treize...) are added directly to 60, not decomposed further.\n- Step 2: The \"et\" appears here (soixante-ET-onze) for the same reason it appears in 21 (vingt-et-un): when the unit is \"1\" (expressed as onze in this base-20 system), French inserts \"et\" as a connector. However, 72 = soixante-douze (no \"et\"), 73 = soixante-treize (no \"et\") — the \"et\" only appears with \"onze\" (= 11 acting as the \"1\" position in the 70s).\n\n71 = soixante-et-onze (60 + and + 11). The \"et\" is specific to the \"1\" position, expressed as onze in the vigesimal system.", "source": "GLM 5.1 ②", "_id": "glm_2_51", "judge_pick": false}, {"question": "A simple exercise: How do you say 91 in French, and what is the arithmetic behind it? (2 steps)", "answer": "- Step 1: 91 in French = **quatre-vingt-onze** (four-twenty-eleven). The arithmetic: 4 × 20 + 11 = 80 + 11 = 91.\n- Step 2: Notice there's no \"et\" between \"quatre-vingt\" and \"onze\" — because \"quatre-vingts\" is a multiplication compound, not a simple decade word. The \"et\" rule only applies after simple decades (vingt, trente, quarante, cinquante, soixante). After \"quatre-vingt,\" you just hyphenate directly: quatre-vingt-onze, quatre-vingt-douze, etc.\n\n91 = quatre-vingt-onze = 4×20+11. No \"et\" because quatre-vingts is a compound, not a simple decade.", "source": "GLM 5.1 ②", "_id": "glm_2_52", "judge_pick": false}, {"question": "Misconception probe: A learner says \"J'ai du chocolats\" (mixing partitive \"du\" with plural \"chocolats\"). Why is this wrong, and what are the two correct alternatives depending on meaning? (2 steps)", "answer": "- Step 1: The error: \"du\" is singular masculine partitive, but \"chocolats\" is plural. Articles and nouns must agree in number (and gender). \"Du\" + plural noun = grammatical mismatch.\n- Step 2: The two correct alternatives:\n+ **\"J'ai du chocolat\"** = I have (some) chocolate [uncountable, mass substance]. Singular partitive + singular noun. ✓\n+ **\"J'ai des chocolats\"** = I have (some) chocolates [countable, individual pieces]. Plural indefinite/partitive + plural noun. ✓\n\nThe choice between them depends on your meaning: mass substance (du chocolat) or countable pieces (des chocolats). You cannot mix singular article with plural noun.", "source": "GLM 5.1 ②", "_id": "glm_2_53", "judge_pick": false}, {"question": "Misconception probe: A learner writes \"Je n'ai pas du café\" for \"I don't have any coffee.\" Why is this wrong, and what is the correct form? (2 steps)", "answer": "- Step 1: The error: after the negative \"ne...pas,\" the partitive article \"du\" must change to **\"de.\"** The rule is that ALL indefinite and partitive articles (un, une, des, du, de la) collapse to \"de\" after \"pas.\" So \"du café\" → \"pas de café.\"\n- Step 2: The correct form: **\"Je n'ai pas de café\"** = I don't have any coffee. The \"de\" here is the neutral negative-article form that replaces both indefinite and partitive articles in negative constructions. \"Pas du café\" is a common English-speaker error because English says \"I don't have any coffee\" (keeping the article equivalent), but French systematically replaces it.\n\nNegative + partitive → \"de,\" never \"du/de la/des.\" \"Je n'ai pas de café\" ✓", "source": "GLM 5.1 ②", "_id": "glm_2_54", "judge_pick": true}, {"question": "Edge case: If someone says \"Je n'aime pas le café\" (I don't like coffee), why does \"le\" stay instead of changing to \"de\"? When does the definite article survive negation? (2 steps)", "answer": "- Step 1: \"Le café\" here means \"coffee in general\" — it's a **definite article expressing a general category**, not pointing to a specific cup. The negative applies to the preference (\"I don't like [coffee in general]\"), not to the existence of coffee. You're not denying that coffee exists; you're denying that you like it.\n- Step 2: The rule: **definite articles (le/la/les) survive negation** because they refer to something specific or known — either a particular item or a general category. Only indefinite (un/une/des) and partitive (du/de la/des) articles change to \"de\" after negation, because those articles assert existence, and negation denies that existence.\n\n\"Ne...pas + definite article\" = negating a preference/opinion about something known. \"Ne...pas + de\" = denying existence of something.", "source": "GLM 5.1 ②", "_id": "glm_2_55", "judge_pick": true}, {"question": "How do you count from 0 to 16 in French, and at what number does the pattern shift from unique words to compound words? (2 steps)", "answer": "- Step 1: The unique base words 0-16: **zéro, un, deux, trois, quatre, cinq, six (siss), sept (set), huit, neuf, dix (diss), onze, douze, treize, quatorze (katorz), quinze (kinz), seize.** Each is a unique morpheme — not composed from smaller number words.\n- Step 2: The pattern shifts at **17**: dix-sept (ten-seven), dix-huit (ten-eight), dix-neuf (ten-nine). These are transparent compounds of 10 + unit. The same pattern repeats at 70 (soixante-dix = sixty-ten) and 90 (quatre-vingt-dix = four-twenty-ten). French keeps unique words for 0-16 and 20-60 decades, then compounds for the rest.\n\n0-16 = unique words. 17-19 = ten + unit. This \"unique until 17\" pattern is a vestige of a vigesimal system in older French.", "source": "GLM 5.1 ②", "_id": "glm_2_56", "judge_pick": false}, {"question": "The lesson notes the pronunciation of several numbers: \"six\" = siss, \"sept\" = set, \"dix\" = diss, \"soixante\" = soissante, \"quatorze\" = katorz, \"quinze\" = kinz. What pronunciation principle explains why the final consonants of \"six,\" \"dix,\" and \"sept\" are pronounced, while many other French words drop final consonants? (2 steps)", "answer": "- Step 1: In French, the general rule is that **final consonants are silent** (e.g., \"beaucoup\" = bo-koo, the \"p\" is silent; \"tout\" = too, the \"t\" is silent). However, numbers are an exception class — many number words pronounce their final consonants because they're **short, high-frequency function words** where the final consonant is needed for clarity and distinction.\n- Step 2: Specifically: \"six\" (siss), \"dix\" (diss) — the \"x\" is pronounced as /s/. \"Sept\" (set) — the \"pt\" reduces to /t/ (the \"p\" is effectively silent, the \"t\" is pronounced). \"Soixante\" — the \"x\" is pronounced as /s/. These pronunciations are historical survivals — older French pronounced more final consonants, and numbers retained them while other word classes lost them.\n\nNumbers = exception to the silent-final-consonant rule. High-frequency function words preserve older pronunciation patterns.", "source": "GLM 5.1 ②", "_id": "glm_2_57", "judge_pick": false}, {"question": "The roadmap says passive exposure (French music, Netflix, casual scrolling) should be counted as \"bonus\" rather than guided hours. Why doesn't passive exposure count equally toward CEFR progression? (2 steps)", "answer": "- Step 1: **Guided hours** require active cognitive engagement: comprehension exercises, shadowing (repeating after a speaker), note-taking, corrected output, and deliberate practice. These activities force your brain to process, produce, and self-correct — the mechanisms that build new linguistic pathways.\n- Step 2: **Passive exposure** (background French music, Netflix with subtitles you barely read, scrolling French social media) provides input but without the attentional focus needed for acquisition. You might pick up occasional words or rhythms, but without active processing, the input doesn't convert to usable knowledge. It's not worthless — it builds familiarity and phonological awareness — but it's not equivalent to 30 minutes of focused study.\n\nPassive = bonus exposure (familiarity, comfort). Active = guided hours (acquisition, skill). Count them separately.", "source": "GLM 5.1 ②", "_id": "glm_2_58", "judge_pick": true}, {"question": "Synthesis question: You arrive at a French restaurant without a reservation. Construct the conversation from greeting to being seated, using at least five distinct phrases from the lesson material. (3 steps)", "answer": "- Step 1: The greeting and reservation check:\n+ You: \"Bonsoir!\" (Good evening!)\n+ Server: \"Vous avez une réservation?\" (Do you have a reservation?)\n+ You: \"Non, je n'ai pas de réservation.\" (No, I don't have a reservation. — note: \"de\" not \"une\" after negation)\n\n- Step 2: The seating question and your preference:\n+ Server: \"À l'intérieur ou en terrasse?\" (Inside or on the terrace?)\n+ You: \"Je préfère en terrasse, s'il vous plaît.\" (I prefer the terrace, please.)\n+ Server: \"Suivez-moi, s'il vous plaît. Installez-vous.\" (Follow me, please. Get settled.)\n\n- Step 3: The drink order:\n+ Server: \"Que désirez-vous boire?\" (What would you like to drink?)\n+ You: \"Je voudrais une carafe d'eau, s'il vous plaît.\" (I would like a carafe of water, please.)\n\nThis sequence uses: bonsoir, ne...pas + de, en terrasse, suivez-moi, installez-vous, que désirez-vous, je voudrais, s'il vous plaît — all from the lesson.", "source": "GLM 5.1 ②", "_id": "glm_2_59", "judge_pick": false}, {"question": "Synthesis question: You need to call a restaurant to make a reservation for tonight at 7:30pm for 2 people. Write the key lines of the phone conversation, including how you say the time and how many people. (3 steps)", "answer": "- Step 1: Opening the call:\n+ Server: \"Le restaurant la Tour Eiffel, bonsoir.\"\n+ You: \"Bonsoir Madame. C'est pour une réservation?\" (Or: \"Je voudrais faire une réservation.\")\n+ Server: \"Très bien, à quelle heure?\"\n+ You: \"À dix-neuf heures trente, s'il vous plaît.\" (19h30 = 7:30pm in 24-hour format)\n\n- Step 2: The number of people and phone number:\n+ Server: \"Pour combien de personnes?\"\n+ You: \"Pour deux personnes, s'il vous plaît.\"\n+ Server: \"Votre numéro de téléphone pour confirmer la réservation?\"\n+ You: \"Oui, c'est le [your number, read in digit pairs].\"\n\n- Step 3: Closing:\n+ Server: \"C'est noté, Monsieur. À ce soir!\"\n+ You: \"Merci beaucoup, au revoir!\"\n\nKey structures: \"à quelle heure\" (at what time), \"pour combien de personnes\" (for how many people), \"c'est noté\" (noted/confirmed), \"à ce soir\" (see you tonight).", "source": "GLM 5.1 ②", "_id": "glm_2_60", "judge_pick": false}, {"question": "Synthesis question: During the meal, the server checks on you, and then you want to order a medium-rare steak and ask for the bill. Write the exchange using appropriate vocabulary and politeness. (3 steps)", "answer": "- Step 1: The check-in:\n+ Server: \"Est-ce que tout va bien?\" (Is everything okay?)\n+ You: \"Oui, merci.\" (Yes, thanks.)\n\n- Step 2: Ordering the steak:\n+ You: \"Je pourrais avoir une entrecôte à point, s'il vous plaît?\" (Could I have a medium-rare ribeye steak, please?)\n+ Note: \"à point\" = medium-rare in French doneness terms. \"Entrecôte\" is feminine, so the adjective would be \"à point\" (invariable in this case — cooking levels don't change for gender, unlike \"saignant/saignante\").\n\n- Step 3: Requesting the bill:\n+ You: \"Je pourrais avoir l'addition, s'il vous plaît?\" (Could I have the bill, please?)\n+ Or simply: \"L'addition, s'il vous plaît.\"\n+ Server: \"Je reviens tout de suite.\" (I'll be right back.)\n\nThis combines: the check-in phrase, a conditional ordering phrase, meat doneness vocabulary, and the bill request — all from the lesson material.", "source": "GLM 5.1 ②", "_id": "glm_2_61", "judge_pick": false}, {"question": "Synthesis question: Using the three question types, how would you ask someone \"Do you do sports?\" in French? Then answer the question about yourself using the vocabulary from the self-introduction section. (3 steps)", "answer": "- Step 1: The three question forms:\n+ Intonation: \"Tu fais du sport?\"\n+ Est-ce que: \"Est-ce que tu fais du sport?\"\n+ Inversion: \"Fais-tu du sport?\"\n\n- Step 2: Note the grammar: \"faire du sport\" uses the partitive \"du\" — you do **some** sport (mass concept), not \"un sport\" (one specific sport). \"Faire\" is the verb (to do/make), conjugated: je fais, tu fais, il fait, nous faisons, vous faites, ils font.\n\n- Step 3: Answering about yourself (using lesson vocabulary):\n+ \"Oui, j'adore le sport. Je vais à la gym quatre fois par semaine.\" (Yes, I love sports. I go to the gym four times a week.)\n+ \"Quatre fois par semaine\" = four times per week. \"Par\" = per.\n\nThe partitive \"du sport\" in the question vs. \"le sport\" in \"j'adore le sport\" — \"le sport\" is general (definite article for general categories, like \"le café\").", "source": "GLM 5.1 ②", "_id": "glm_2_62", "judge_pick": false}, {"question": "Why is the French number system considered a \"hybrid\" system rather than purely base-10 or purely base-20? At what points does the system switch between bases? (3 steps)", "answer": "- Step 1: French is a **hybrid decimal-vigesimal system**: it uses base-10 cleanly from 0-69, then shifts to base-20 compositions for 70-99, before returning to base-10 at 100 (cent).\n- Step 2: The transition points:\n+ **0-16**: unique morphemes (no base visible — these are lexical fossils)\n+ **17-19**: decimal compounds (dix-sept, dix-huit, dix-neuf = 10+7, 10+8, 10+9)\n+ **20-69**: clean decimal decades (vingt, trente, quarante, cinquante, soixante) + units\n+ **70-79**: vigesimal shift (soixante-dix = 60+10, soixante-et-onze = 60+11, etc.)\n+ **80-99**: full vigesimal (quatre-vingts = 4×20, quatre-vingt-dix = 4×20+10)\n+ **100+**: back to decimal (cent, deux cents, mille)\n\n- Step 3: The hybrid nature reflects French linguistic history: Old French and Norman/Celtic influences used base-20 more extensively, while Latin influence pushed base-10. Modern French standardized on base-10 for the lower numbers but preserved base-20 for 70-99 as a historical residue. Swiss and Belgian French \"regularized\" by creating septante/huitante/nonante, but standard French did not.\n\nFrench numbers: base-10 until 70, then base-20 until 99, then base-10 again. A living fossil of competing counting traditions.", "source": "GLM 5.1 ②", "_id": "glm_2_63", "judge_pick": true}, {"question": "What does the lesson's homework note mean by \"avez != avons\"? What common learner error does this flag? (2 steps)", "answer": "- Step 1: **\"Avez\"** is the vous form (2nd person plural/formal) of avoir = \"you have.\" **\"Avons\"** is the nous form (1st person plural) = \"we have.\" They are different conjugations for different subjects and cannot be swapped.\n- Step 2: The common error: learners sometimes confuse the nous and vous forms because they look similar and both involve plural subjects. Writing \"nous avez\" instead of \"nous avons\" or \"vous avons\" instead of \"vous avez\" is a frequent mistake. The note flags this to remind the learner that each subject pronoun has its own unique conjugation — vous avez ≠ nous avons.\n\nVous avez = you (formal/plural) have. Nous avons = we have. Same verb, different subjects, different forms — no swapping allowed.", "source": "GLM 5.1 ②", "_id": "glm_2_64", "judge_pick": false}, {"question": "The homework note says \"Oui, je suis en retard\" for \"Yes, I am late.\" Why is \"en retard\" used instead of just \"retard\"? And what's the difference between \"être en retard\" and \"être en avance\"? (2 steps)", "answer": "- Step 1: \"En retard\" is a fixed prepositional phrase — you cannot say \"je suis retard\" because \"retard\" is a noun (delay/lateness), not an adjective. The \"en\" is required to link the noun-state to the verb \"être.\" This is the same pattern as \"en colère\" (angry), \"en vacances\" (on holiday).\n- Step 2: **\"Être en retard\"** = to be late (behind schedule). **\"Être en avance\"** = to be early (ahead of schedule). They're antonyms using the same \"en + noun\" structure. Both are fixed expressions — you learn them as units, not by composing them from grammar rules.\n\nEn retard = late. En avance = early. Both use \"en + noun\" because they describe states, not qualities.", "source": "GLM 5.1 ②", "_id": "glm_2_65", "judge_pick": false}, {"question": "The homework note mentions \"La réunion est urgente\" and \"La réunion est finie.\" Why does \"finie\" end in \"-e\" but \"urgent\" would become \"urgente\" — what is the agreement rule being demonstrated? (2 steps)", "answer": "- Step 1: Both \"urgente\" and \"finie\" show **feminine adjective agreement** with \"la réunion\" (feminine noun). \"Urgent\" (masculine) → \"urgente\" (feminine, add -e). \"Fini\" (masculine) → \"finie\" (feminine, add -e). The base adjective changes form depending on the gender of the noun it describes.\n- Step 2: The pattern: for most adjectives, feminine = masculine + **e**. If the masculine already ends in -e (like \"jeune\"), it stays the same for feminine. If the masculine ends in a consonant (like \"urgent\"), you add -e and the final consonant becomes pronounced (ur-jent → ur-jent-t). \"Fini\" → \"finie\" adds an -e that doesn't change pronunciation but marks the feminine visually.\n\nAdjective agreement: la réunion (f) → urgente, finie. The -e marks feminine gender on the adjective.", "source": "GLM 5.1 ②", "_id": "glm_2_66", "judge_pick": false}, {"question": "When the server offers \"une bouteille d'eau gazeuse ou d'eau plate,\" what do \"gazeuse\" and \"plate\" mean, and why is \"d'\" used before \"eau\" instead of \"de\"? (2 steps)", "answer": "- Step 1: **\"Eau gazeuse\"** = sparkling/carbonated water (gazeuse = fizzy, from \"gaz\" = gas). **\"Eau plate\"** = still/flat water (plate = flat, from \"plat\" = flat/level). These are the two standard options for bottled water in French restaurants.\n- Step 2: **\"D'eau\"** instead of \"de eau\" follows the **elision rule**: when \"de\" precedes a word starting with a vowel (\"eau\" starts with \"e\"), the \"e\" of \"de\" drops and is replaced by an apostrophe → d'eau. This is the same elision that turns \"le eau\" → \"l'eau\" and \"je ai\" → \"j'ai.\" Elision is mandatory in French — you never pronounce two vowels across a word boundary without contracting.\n\nD'eau = de + eau (elision before vowel). Gazeuse = sparkling. Plate = still/flat. Always elide \"de\" before a vowel-initial word.", "source": "GLM 5.1 ②", "_id": "glm_2_67", "judge_pick": true}, {"question": "What is \"OU\" in French, and why is it important to recognize it in a restaurant context? (2 steps)", "answer": "- Step 1: **\"Ou\"** (without accent) = \"or\" — the conjunction that presents alternatives. In a restaurant: \"À l'intérieur ou en terrasse?\" (inside or on the terrace?), \"eau gazeuse ou eau plate?\" (sparkling or still water?). It signals a choice between two options.\n- Step 2: Important distinction: **\"où\"** (with accent grave) = \"where\" — a completely different word. \"Où habitez-vous?\" = Where do you live? The accent is the only difference in writing, but they're entirely different words in meaning. In speech, they sound identical, so context determines which one is meant. In a restaurant, \"ou\" (no accent) = or; \"où\" (accent) = where.\n\nOu = or (no accent). Où = where (accent). Same pronunciation, different meaning — the accent is your only visual clue.", "source": "GLM 5.1 ②", "_id": "glm_2_68", "judge_pick": false}, {"question": "The self-introduction includes \"Quels sont tes loisirs?\" — what does this mean, and why is \"quels\" plural instead of \"quel\"? (2 steps)", "answer": "- Step 1: **\"Quels sont tes loisirs?\"** = \"What are your hobbies?\" — \"loisirs\" is a plural noun (leisure activities/hobbies), so the interrogative adjective \"quel\" must agree: **\"quels\"** (masculine plural). If the noun were singular, you'd use \"quel\" (masc) or \"quelle\" (fem).\n- Step 2: The agreement pattern: quel (masc sing), quelle (fem sing), quels (masc pl), quelles (fem pl). Since \"loisirs\" is masculine plural, it's \"quels sont tes loisirs.\" This is the same \"quel\" as in \"Tu as quel âge?\" (informal, singular) — but there it precedes a singular noun (\"âge\"), so it stays \"quel.\"\n\n\"Quel\" agrees with the noun that follows: quels (masc pl) + loisirs (masc pl). Agreement is non-negotiable in French.", "source": "GLM 5.1 ②", "_id": "glm_2_69", "judge_pick": false}], "count": 70}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "In French, why would you say \"J'ai **du** chocolat\" but \"J'ai **un** chocolat\"? What is the conceptual difference between these two articles when talking about food? (3 steps)", "answer": "- Step 1: The core difference lies in whether the noun is **countable** or **uncountable** (mass noun). In English, \"a chocolate\" usually means one distinct, countable piece (like one truffle), while \"some chocolate\" refers to the substance/mass itself.\n- Step 2: In French, **un/une/des** are indefinite articles used for countable items. So, \"J'ai un chocolat\" means \"I have one (piece of) chocolate.\" **Du/de la/des** are partitive articles used for uncountable masses. So, \"J'ai du chocolat\" means \"I have some chocolate (substance).\"\n+ Sub-case A: \"Ils ont un plat du jour\" -> They have one specific, countable daily special.\n+ Sub-case B: \"Il a du café\" -> He has some coffee (the liquid mass), whereas \"Il a un café\" means he has one cup of coffee.\n- Step 3: Visual intuition: If you can pick it up and count \"one, two, three\" of them, use **un/une/des**. If you scoop it, pour it, or eat an undefined portion of it, use **du/de la/des**.\n\nThe partitive article says \"some of this mass,\" while the indefinite article says \"one of these discrete units.\"", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": true}, {"question": "How do you form the negative form of the verb AVOIR, and what specific spelling change happens to the article when negating a possession like \"J'ai une réservation\"? (2 steps)", "answer": "- Step 1: To negate any verb in French, you wrap it with **ne... pas**. For AVOIR: \"J'ai\" becomes \"Je n'ai pas\", \"Tu as\" becomes \"Tu n'as pas\", \"Nous avons\" becomes \"Nous n'avons pas\", etc. Notice that **ne** elides (drops the 'e' and adds an apostrophe) before a vowel.\n- Step 2: When negating a possession, the indefinite article (**un/une/des**) or partitive article (**du/de la/des**) changes to **de** (or **d'** before a vowel). So \"J'ai une réservation\" becomes \"Je n'ai pas **de** réservation\", and \"J'ai des chocolats\" becomes \"Je n'ai pas **de** chocolats.\"\n+ Why? Conceptually, \"I don't have *any*\" overrides the specific gender or quantity, reducing it to a pure zero-quantity concept, which universally takes **de**.\n\nNegation eliminates the need for gender/quantity articles, collapsing them all into the single concept of \"none\" = **de**.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": true}, {"question": "In English, we say \"I **am** 25 years old.\" In French, we say \"J'**ai** 25 ans.\" Conceptually, why does French use the verb AVOIR (to have) instead of ÊTRE (to be) for age? (2 steps)", "answer": "- Step 1: In French, age is viewed as something you possess, not a state of being you embody. You don't *are* an age; you *have* a certain number of years.\n- Step 2: This extends to the phrasing \"J'ai 25 ans\" (literally: \"I have 25 years\"). The word **ans** (years) is mandatory because you are counting the years you possess. If you just said \"J'ai 25\", it would be incomplete without the unit of time being possessed.\n+ Misconception trap: Never say \"Je suis 25\" or \"Je suis 25 ans.\" That would literally mean \"I am the physical embodiment of 25 years,\" which sounds absurd in French.\n\nFrench frames age as an accumulated possession (you *have* the years), whereas English frames it as an identity state (you *are* that age).", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": true}, {"question": "When using \"C'est...\" (It is...), the adjective that follows defaults to masculine, as in \"C'est beau.\" But in \"La réunion est urgente,\" the adjective matches the feminine noun. Why does \"C'est\" ignore the actual gender of the noun? (2 steps)", "answer": "- Step 1: The pronoun **ce** (c') is technically masculine singular by default in French grammar. When you say \"C'est beau,\" the grammar is anchored to the pronoun **ce**, forcing the adjective **beau** to agree with the masculine pronoun, regardless of what object you are actually referring to.\n- Step 2: However, when you use a specific noun with the verb être (like \"La réunion est...\"), the adjective must agree directly with that specific noun. \"La réunion\" is feminine, so the adjective takes the feminine form: \"urgente\" (urgent -> urgente), \"finie\" (fini -> finie).\n+ Rule of thumb: If you point at something vaguely and say \"It's beautiful,\" use masculine: **C'est beau**. If you specifically name the thing, make the adjective match the noun: **La réunion est urgente**.\n\n\"C'est\" acts as a grammatical shield, forcing masculine agreement on the pronoun level, whereas a specific noun exposes its true gender to the adjective.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": true}, {"question": "When ordering in a restaurant, you can say \"Je voudrais,\" \"Je pourrais,\" or \"J'aimerais.\" These are all conditional forms. Conceptually, why is the conditional mood preferred over the present tense (\"Je veux\" - I want) for politeness? (2 steps)", "answer": "- Step 1: The conditional mood introduces distance and uncertainty. By saying \"I would like\" (Je voudrais) instead of \"I want\" (Je veux), you soften the demand. It turns a direct command into a theoretical preference.\n- Step 2: This psychological distance acts as a social buffer. It implies \"If it pleases you, and if it is possible, this is what I desire,\" giving the server the freedom to respond, rather than boxing them into a demand. \"Je veux\" sounds childish or aggressive because it offers no social escape route.\n+ Other polite forms: \"Je vais prendre\" (I am going to take) is slightly more direct but still acceptable because it frames your choice as a personal future action rather than a demand placed on the server.\n\nPoliteness in French (and many languages) operates by grammatically distancing yourself from your own desires, making them seem like mere suggestions rather than commands.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": true}, {"question": "If a waiter asks \"Quelle cuisson pour la viande?\", they are asking about the cooking level. Conceptually, how do the four main French terms (bleu, saignant, à point, bien cuit) map to the physical state of the meat's interior? (2 steps)", "answer": "- Step 1: The terms describe the progression of heat penetrating the meat from the outside in. **Bleu** (very rare) means the heat has barely reached the center; the meat is essentially raw inside and just \"blue\" (seared) on the outside. **Saignant** (rare) means the center is still red and \"bleeding\" (saignant = bleeding).\n- Step 2: **À point** (medium rare/medium) means the heat has reached the exact center (\"point\" = the exact spot), turning the red to pink but still juicy. **Bien cuit** (well cooked) means the heat has fully penetrated, eliminating all pink/red moisture.\n+ Misconception trap: \"À point\" does NOT mean \"well done.\" It literally means \"to the point\" — the exact moment the center is cooked but not dried out. If you want it fully cooked through with no pink, you must say \"bien cuit.\"\n\nThe French cooking scale tracks the penetration of heat: raw center (bleu) -> red center (saignant) -> pink center (à point) -> fully penetrated heat (bien cuit).", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": true}, {"question": "French has three ways to form a question: Intonation, Est-ce que, and Inversion. If you want to ask \"Do you live in Paris?\" (\"Tu habites à Paris\"), what are the three forms, and what is the conceptual rule for when to use each? (3 steps)", "answer": "- Step 1: **Intonation** (\"Tu habites à Paris?\"): You keep the exact same sentence structure as a statement, but raise the pitch of your voice at the end. This is the most informal and is almost exclusively used in spoken, casual conversation.\n- Step 2: **Est-ce que** (\"Est-ce que tu habites à Paris?\"): You place the fixed phrase \"Est-ce que\" (literally: \"is it that\") at the front of the statement. This is the most versatile form — perfectly acceptable in both writing and speaking, formal and informal.\n- Step 3: **Inversion** (\"Habites-tu à Paris?\"): You flip the verb and the subject pronoun and connect them with a hyphen. This is the most formal register and is primarily used in formal writing, literature, or very polite speech.\n+ Edge case: Inversion can sometimes sound awkward with certain subjects (like \"je\"), so French speakers often avoid \"Habité-je?\" and switch to \"Est-ce que\" instead.\n\nIntonation = spoken/casual, Est-ce que = universal/versatile, Inversion = written/formal.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": true}, {"question": "In French numbers, 70 is \"soixante-dix\" (60+10) and 80 is \"quatre-vingts\" (4x20). What historical counting system explains this base-20 logic, and how does it affect numbers like 90? (2 steps)", "answer": "- Step 1: This comes from a **vigesimal** (base-20) counting system inherited from the Gauls/Celts, who counted on their toes as well as their fingers, making 20 a natural full cycle. While most of French shifted to a base-10 (decimal) system for lower numbers (up to 69), the old base-20 system persists for 80 and 90 in standard (Parisian) French.\n- Step 2: Because 80 is \"quatre-vingts\" (4x20), 90 is built on top of that: **quatre-vingt-dix** (4x20 + 10). Similarly, 70 is built on 60: **soixante-dix** (60+10). So 91 is \"quatre-vingt-onze\" (4x20 + 11).\n+ Counterexample: In Belgium and Switzerland, they use decimal logic: 70 = septante, 80 = huitante/octante, 90 = nonante. If you say these in Paris, you will be understood but sound regional.\n\nStandard French numbers above 60 are a hybrid: base-10 up to 60, then a mix of base-10 additions (60+10) and base-20 multiplications (4x20).", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "Why does the number 21 spell as \"vingt-et-un\" (with an \"et\") while 22 spells as \"vingt-deux\" (without an \"et\")? What is the rule for the conjunction \"et\" in French numbers? (2 steps)", "answer": "- Step 1: In French, the conjunction **et** (and) is traditionally used only when adding **un** (1) to a tens multiplier. So, 21 = vingt-et-un, 31 = trente-et-un, 41 = quarante-et-un, 51 = cinquante-et-un, 61 = soixante-et-un.\n- Step 2: For all other numbers (22, 23, 35, 47, etc.), you simply attach the number with a hyphen and NO \"et\". So, 22 = vingt-deux, 32 = trente-deux. The \"et\" acts as a linguistic bridge exclusively for the number one.\n+ Edge case: This rule stops at 71 (\"soixante-et-onze\") in standard French because 71 is built as 60+11, not 70+1. But the \"et\" still appears because you are adding 11 to 60.\n+ Note: For 81, it is \"quatre-vingt-un\" (no \"et\") because the base is a multiplication (4x20), not a simple tens multiplier.\n\nUse \"et\" only when adding 1 (or 11, if building off 60) to a round tens number; otherwise, use a hyphen.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": true}, {"question": "In the CEFR framework, moving from A1 to A2 takes roughly 100-120 guided hours, but the roadmap adds a 20% buffer to make it 132 \"exam-ready\" hours. Conceptually, what is the difference between \"finishing a course unit\" and being \"exam-ready\"? (2 steps)", "answer": "- Step 1: \"Finishing a course unit\" means you have been exposed to the material and can probably recognize it or produce it with prompts. It's a measure of *instruction time*, not *mastery*. \"Exam-ready\" means you can reliably perform under pressure in all four skills (reading, writing, listening, speaking) without support.\n- Step 2: The 20% buffer accounts for the \"forgetting curve\" and the gap between passive recognition and active recall. When you learn a grammar rule, you might get 80% of exercises right in the lesson, but an exam requires you to retrieve it spontaneously, handle edge cases, and not be derailed by anxiety or speed requirements.\n+ Analogy: Finishing a driving lesson means you drove around the block with the instructor. Exam-ready means you can pass the driving test on a busy road alone.\n\nCourse completion = exposure and guided practice. Exam-ready = autonomous, reliable, pressure-tested mastery, which mathematically requires an additional 20% investment of time.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "According to the French government's administrative ladder, what CEFR level is required for a \"Carte de résident\" (resident card) vs. \"Naturalisation\" (nationality)? Why is there a conceptual leap between these two levels? (2 steps)", "answer": "- Step 1: A **Carte de résident** requires **B1**, while **Naturalisation** (nationality) requires **B2**.\n- Step 2: The conceptual leap is from \"independent user\" to \"fluent/argumentative user\". At B1, you can handle daily life, explain opinions, and survive travel. At B2, you can defend an opinion, understand complex news, argue cause and consequence, and participate fluently in societal debates. The state requires B2 for nationality because a citizen must be able to engage with the complex social, political, and legal discourse of the country, not just survive the supermarket.\n+ Lower rung: A \"Carte de séjour pluriannuelle\" only requires A2, which is the baseline for everyday routines and simple interactions.\n\nResidency requires you to navigate life (B1), but nationality requires you to participate in the intellectual and civic life of the nation (B2).", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "In the study roadmap, \"passive background exposure\" (Netflix, music) is NOT counted as equal to \"guided hours.\" Why can't you count 1 hour of watching French TV as 1 hour of guided learning? (2 steps)", "answer": "- Step 1: Guided hours involve **deliberate practice** — active recall, correction, pushing the boundary of your competence, and receiving feedback. Passive exposure (like watching a movie with subtitles) usually falls into \"comprehensible input,\" but your brain defaults to the easiest path (relying on images or English subs) without forcing linguistic production.\n- Step 2: To count as guided time, you must be doing something that forces output or active processing: shadowing (repeating aloud), note-taking, answering comprehension questions, or corrected writing. Without these, the brain recognizes the context but doesn't encode the grammar or vocabulary into active memory.\n+ Exception: If you watch a 20-minute video, pause every minute to write down and repeat 3 new phrases, that 20 minutes *can* count as guided time because you have injected deliberate recall into the exposure.\n\nPassive exposure builds familiarity and comfort, but only active, corrected effort builds the neural pathways required for spontaneous output (speaking/writing).", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": true}, {"question": "You want to say \"We would like to order\" in a restaurant. If you use the pronoun \"on\" (meaning \"we\"), what is the correct form: \"on aimerait\" or \"on aimerions\"? Why? (2 steps)", "answer": "- Step 1: The pronoun **on** grammatically takes the **3rd person singular** conjugation (the same as il/elle), even though it means \"we.\" The 1st person plural (\"nous\") takes \"aimerions.\"\n- Step 2: Therefore, if you choose to use \"on\", you must say \"**on aimerait**\" (conditional, 3rd person singular). If you wanted to use \"nous\", you would say \"nous aimerions.\"\n+ Misconception trap: Many learners hear \"on\" = \"we\" and mistakenly apply the \"nous\" conjugation rules. Always conjugate \"on\" with the il/elle form.\n\n\"On\" is semantically \"we\" but grammatically \"he/she/it,\" so it always takes the singular verb ending.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "When asking a question using inversion, like \"Aimez-vous le café?\", you flip the verb and pronoun. But if the verb ends in a vowel and the pronoun starts with a vowel (like \"Aime-t-il le café?\"), a \"t\" is inserted. Conceptually, why does this \"t\" exist? (2 steps)", "answer": "- Step 1: This \"t\" is purely phonetic. French avoids the clashing of two vowels (a hiatus). If you said \"Aime-il\", the two vowel sounds would collide awkwardly. The \"t\" acts as a phonetic bridge to break up the vowel clash and make the transition smooth.\n- Step 2: The \"t\" is actually the remnant of the old verb ending. In Old French, the 3rd person singular ended in -t (il aimet). Modern French dropped the \"t\" (il aime), but it survives as a phonetic bridge in inversion, hyphenated on both sides: **-t-**.\n+ Rule: Insert **-t-** only in the 3rd person singular (il/elle/on) when the verb ends in a vowel. (e.g., \"Va-t-il?\", \"Mange-t-elle?\").\n\nThe \"-t-\" in inversion is a phonetic patch, resurrected from historical verb endings to prevent two vowels from colliding in spoken French.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "When making a reservation, the server asks \"Pour combien de personnes?\" (For how many people?). If you want to say \"for 2 people,\" why do you use \"pour\" instead of \"avec\" (with)? (1 step)", "answer": "In this context, **pour** indicates the intended recipient or purpose of the reservation. The table is reserved *for* the capacity of 2 people. **Avec** would imply you are bringing the people as companions *with* you, which changes the focus from the purpose of the booking to your physical company. \"Pour\" establishes the capacity the restaurant needs to accommodate.\n\n\"Pour\" frames the number as the target capacity for the reservation, while \"avec\" would awkwardly frame it as your physical accessories.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": true}, {"question": "When telling time, 19h30 is pronounced \"sept heures et demie\" (7 hours and a half). Why does French use a 24-hour written system but a 12-hour spoken system for this time? (2 steps)", "answer": "- Step 1: The 24-hour system (19h30) is the official, written standard used in schedules, reservations, and formal contexts to avoid any AM/PM ambiguity. It is precise and administrative.\n- Step 2: In casual conversation, the French default to the 12-hour clock because it aligns with daily human rhythms (day cycle vs night cycle). So, 19h30 is conceptually \"7:30 in the evening,\" hence \"sept heures et demie.\" You might add \"du soir\" (in the evening) if context requires, but usually, it's implied.\n+ Note: \"Et demie\" (and a half) is used instead of \"trente\" (thirty) for the 30-minute mark. \"Sept heures trente\" is also correct but sounds slightly more mechanical or formal.\n\nWritten French demands the precision of 24-hour logic (19h30), while spoken French prefers the human-scale 12-hour logic (7 and a half).", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "Exercise: Convert the statement \"Vous avez des frères et sœurs\" into a question using (1) intonation, (2) \"Est-ce que\", and (3) inversion. (3 steps)", "answer": "- Step 1: **Intonation**: Keep the statement exact, just raise your voice at the end: \"Vous avez des frères et sœurs?\"\n- Step 2: **Est-ce que**: Add \"Est-ce que\" to the front of the statement: \"Est-ce que vous avez des frères et sœurs?\"\n- Step 3: **Inversion**: Flip the verb \"avez\" and the pronoun \"vous\" and add a hyphen: \"Avez-vous des frères et sœurs?\"\n\nThis demonstrates the three layers of formality, from casual spoken (intonation) to universal (est-ce que) to formal written (inversion).", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "Exercise: You are at a restaurant. You want to order \"some water\" (de l'eau) and \"a ham hamburger\" (un hamburger). Negate both to say you do NOT have them. What are the correct negative forms? (2 steps)", "answer": "- Step 1: \"I have some water\" = \"J'ai de l'eau.\" To negate, wrap with ne...pas and change the partitive article to **de**: \"Je n'ai pas **d'**eau.\" (Note: \"de l'\" reverts to \"d'\" before the vowel).\n- Step 2: \"I have a hamburger\" = \"J'ai un hamburger.\" To negate, wrap with ne...pas and change the indefinite article to **de**: \"Je n'ai pas **de** hamburger.\"\n\nBoth the partitive (some) and indefinite (a) articles collapse into **de** (or d' before a vowel) in the negative, because negation removes quantity and gender entirely.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "If you study 2 lessons/week (3 hrs) with no review, it takes ~4.6 years to reach B2 from A1. If you add just 20 min/day of review (Scenario S3), it drops to ~1.9 years. Conceptually, why does a small daily addition cause such a massive time reduction? (2 steps)", "answer": "- Step 1: Language learning is governed by the **spacing effect** and **forgetting curve**. If you only study 3 hours a week in two blocks, you spend a large portion of those hours relearning what you forgot since the last lesson. The 3 hours are inefficient because of high memory decay.\n- Step 2: Adding 20 minutes a day forces constant active recall. This interrupts the forgetting curve right when memory is starting to fade, cementing the knowledge. So, instead of spending lesson time re-learning, you spend it advancing. The total weekly hours increase slightly, but the *efficiency* of those hours skyrockets.\n+ Math intuition: 2 lessons (3h) + 20 min/day (~2.3h) = ~5.3 hours/week. The weekly total didn't even double, but the timeline was cut by more than half because the daily review stopped the memory leak.\n\nDaily review plugs the memory leak, turning expensive \"relearning\" time into cheap \"maintenance\" time, which drastically accelerates net progress.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": true}, {"question": "What is the \"Qualité FLE\" label mentioned in the roadmap, and conceptually, why is it recommended when choosing a school over just using apps or casual tutors? (2 steps)", "answer": "- Step 1: \"Qualité FLE\" is an official guarantee, initiated by three French ministries, that a language center meets strict standards for teaching, facilities, and services. It ensures the school has structured CEFR-aligned programs, qualified teachers, and proper administration.\n- Step 2: Apps and casual tutors provide input and practice but lack the structured progression, placement testing, attendance accountability, and formal feedback loops required to push a learner reliably through CEFR bands. If your goal is a verifiable B2 level, a structured environment prevents you from developing fossilized errors or skipping difficult competencies.\n+ Analogy: Apps are like a gym membership where you can wander around; a Qualité FLE school is like having a certified personal trainer with a structured 12-week program.\n\nThe label guarantees institutional accountability and structured progression, which are critical for reaching high-level (B2) output, whereas casual methods often lead to plateaus.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}], "count": 20}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "What are the three methods to form a question in French, and how do they differ in formality? (3 steps)", "answer": "- Step 1: **Intonation** (informal spoken French).  \n+ Example: Tu habites en Espagne? (Voice rises at the end)  \n- Step 2: **\"Est-ce que\"** (neutral, common in all contexts).  \n+ Example: Est-ce que tu habites en Espagne?  \n- Step 3: **Inversion** (formal written/oral French).  \n+ Example: Habites-tu en Espagne?  \n+ Inversion requires hyphenation and subject-verb reversal.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why does French use \"de la,\" \"du,\" and \"des\" for uncountable nouns instead of \"un/une\"? (3 steps)", "answer": "- Step 1: **Grammatical necessity**. Uncountable nouns (e.g., \"café\") cannot be quantified as individual units.  \n- Step 2: **Partitive articles** (\"de la,\" \"du,\" \"des\") indicate partial or unspecified quantities.  \n+ Example: J’ai du café (I have (some) coffee) vs. Je n’ai pas de café (I have no coffee).  \n- Step 3: **Contrast with English**. English often omits articles in negatives (e.g., \"I have no coffee\"), but French requires partitive articles even in negatives.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "How would you translate \"I have a chocolate\" vs. \"I have some chocolate\" in French, and why the difference? (3 steps)", "answer": "- Step 1: **\"J’ai un chocolat\"** (countable noun: one piece of chocolate).  \n- Step 2: **\"J’ai du chocolat\"** (uncountable noun: an unspecified amount of chocolate).  \n- Step 3: **Key distinction**: \"un/une\" for countable singular, \"du/de la\" for uncountable.  \n+ Misuse (e.g., \"J’ai du chocolat\" for one piece) implies a misunderstanding of noun countability.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "What are the four levels of meat doneness in French restaurants, and how are they ordered from rarest to most cooked? (4 steps)", "answer": "- Step 1: **Bleu** (very rare, blood visible).  \n- Step 2: **Saignant** (rare, red center).  \n- Step 3: **À point** (medium-rare, pink center).  \n- Step 4: **Bien cuit** (well-done, brown throughout).  \n+ Mnemonic: \"Bleu, saignant, à point, bien cuit\" = from blood to fully cooked.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "Why is \"quatre-vingts\" used for 80 in French instead of a direct numeral? (2 steps)", "answer": "- Step 1: **Historical base-20 counting system**. French retains vestiges of the vigesimal system (20-based) from Celtic/French heritage.  \n- Step 2: **\"Quatre-vingts\" = 4×20** (4×20=80). Similar logic applies to 70 (soixante-dix = 60+10) and 90 (quatre-vingt-dix = 80+10).", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "How do you form the negative of \"Je suis\" (I am) in French, and what common mistake should be avoided? (3 steps)", "answer": "- Step 1: **\"Je ne suis pas\"** (standard negation for \"to be\").  \n- Step 2: **Negation structure**: \"ne + verb + pas\" around \"être.\"  \n+ Example: Je suis → Je ne suis pas.  \n- Step 3: **Common error**: Omitting \"ne\" (e.g., \"Je suis pas\") is incorrect in formal French, though common in speech.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "What are the three ways to say \"yes\" in French, and when is each appropriate? (3 steps)", "answer": "- Step 1: **\"Oui\"** (standard affirmative response).  \n+ Example: Tu aimes le café? → Oui.  \n- Step 2: **\"Si\"** (corrects a negative question).  \n+ Example: Tu n’aimes pas le café? → Si, j’aime le café!  \n- Step 3: **\"Ouais\"** (informal slang, equivalent to \"yeah\").  \n+ Example: Tu viens? → Ouais!", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "How would you ask \"What is this?\" in French, and what is a common pronunciation shortcut? (2 steps)", "answer": "- Step 1: **Full phrase**: Qu’est-ce que c’est?  \n+ Literal translation: \"What is it that it is?\"  \n- Step 2: **Pronunciation shortcut**: \"Keske c’est?\" (contracted in speech).  \n+ Common in casual conversations, e.g., \"Keske c’est la salade niçoise?\"", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "What are the seven days of the week in French, and why do they not capitalize unlike English? (2 steps)", "answer": "- Step 1: **Days**: Lundi, Mardi, Mercredi, Jeudi, Vendredi, Samedi, Dimanche.  \n- Step 2: **Capitalization rule**: French does not capitalize days of the week, months, or seasons unless they start a sentence.  \n+ Example: Jeudi je vais à la gym. (Thursday I go to the gym.)", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "How do you conjugate \"être\" (to be) in the present tense, and what is a key difference from \"avoir\"? (3 steps)", "answer": "- Step 1: **Conjugation**:  \nJe suis, Tu es, Il/Elle/On est, Nous sommes, Vous êtes, Ils/Elles sont.  \n- Step 2: **\"Être\" vs. \"Avoir\"**: \"Être\" is irregular (no root pattern), while \"avoir\" has a consistent root (a-).  \n- Step 3: **Use cases**: \"Être\" for identity/state (Je suis étudiant), \"avoir\" for possession/need (J’ai faim).", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}], "count": 10}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "How do you conjugate the verb \"avoir\" in present tense, and what happens in negative sentences? (3 steps)", "answer": "- Step 1: **Present tense conjugation**:  \n  - je **ai**, tu **as**, il/elle/on **a**, nous **avons**, vous **avez**, ils/elles **ont**  \n  - Example: *J'ai un livre* (I have a book)  \n\n- Step 2: **Negative conjugation**  \n  - Add **ne...pas** around the verb, with **elision** for vowel sounds:  \n    - je **n'ai** pas, tu **n'as** pas, il/elle/on **n'a** pas, nous **n'avons** pas, vous **n'avez** pas, ils/elles **n'ont** pas  \n  - Example: *Je n'ai pas de livre* (I don't have a book)  \n\n+ **Key difference**: In negatives, the \"ai\" in \"j'ai\" becomes \"n'\" (elision) before a vowel.  \n+ **Partitive article**: \"de\" replaces \"un/une/des\" in negative sentences (e.g., *Je n'ai pas de café* vs. *J'ai du café*).\n\n- Step 3: **Why this matters**  \n  - \"Avoir\" is irregular and essential for possession and compound tenses.  \n  - Elision ensures smoother pronunciation in negatives, a common feature in spoken French.\n\n[Optional: When stating quantities (*J'ai trois pommes*), \"de\" replaces partitive articles in negatives (*Je n'ai pas de pommes*).]", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "When do you use \"du, de la, des\" instead of \"un, une, des\"? Provide examples. (2 steps)", "answer": "- Step 1: **Partitive vs. Countable**  \n  - **Du/de la/des** = \"some\" (uncountable/mass nouns): *J'ai **du** café* (I have coffee).  \n  - **Un/une/des** = \"a/some\" (countable nouns): *J'ai **un** croissant* (I have a croissant).  \n\n+ **Gender distinction**:  \n  - *Du* (masculine) → *du pain* (bread)  \n  - *De la* (feminine) → *de la confiture* (jam)  \n  - *Des* (plural) → *des frites* (fries)  \n\n- Step 2: **Negative form**  \n  - In negatives, \"de\" replaces both partitive and indefinite articles:  \n    - *Je n'ai pas **de** café* (not *du café*)  \n    - *Je n'ai pas **de** croissant* (not *un croissant*)  \n\n[Optional: \"De\" simplifies negatives by avoiding gender/quantity specificity.]", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "How do you form numbers from 70 to 99 in French? Why does this differ from English? (3 steps)", "answer": "- Step 1: **70–79: Soixante + base numbers**  \n  - *70* = **soixante-dix** (60 + 10)  \n  - *71* = soixante-et-onze (60 + 11)  \n  - *79* = soixante-dix-neuf (60 + 19)  \n\n- Step 2: **80–99: Quatre-vingts logic**  \n  - *80* = **quatre-vingts** (4 × 20)  \n  - *81* = quatre-vingt-**un** (NOT *quatre-vingts-un*)  \n  - *99* = quatre-vingt-dix-neuf (4×20 + 9 + 10)  \n\n- Step 3: **Historical context**  \n  - French retains a **vigesimal** (base-20) system influenced by Celtic/Gallic counting, unlike English decimal (base-10).  \n  - **Quatre-vingts** reflects medieval counting in 20s (e.g., 80 = 4×20).  \n\n+ **Common mistakes**:  \n  - Forgetting the \"un\" in 81 (no \"s\" plural for *vingts* in 80).  \n  - Hyphenation rules: *vingt-et-un* (21) vs. *vingts-un* (81).", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": true}, {"question": "What are the three ways to form questions in French, and when are they used? (3 steps)", "answer": "- Step 1: **Intonation**  \n  - Keep the sentence structure but raise pitch at the end:  \n    - *Tu habites ici?* (You live here?)  \n  - **Use**: Casual spoken French, quick confirmations.  \n\n- Step 2: **Est-ce que**  \n  - Add *Est-ce que* at the start:  \n    - *Est-ce que tu habites ici?*  \n  - **Use**: Neutral, common in writing and speech when clarity is needed.  \n\n- Step 3: **Inversion**  \n  - Swap verb and subject pronoun:  \n    - *Habites-tu ici?* (Do you live here?)  \n  - **Use**: Formal writing or speech, e.g., in exams or literature.  \n\n+ **Example contrast**:  \n  - *Tu as mangé?* (intonation)  \n  - *Est-ce que tu as mangé?* (est-ce que)  \n  - *As-tu mangé?* (inversion)", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "How do you politely make a restaurant reservation in French? Provide key phrases. (4 steps)", "answer": "- Step 1: **Opening greeting**  \n  - *Bonjour, je voudrais réserver une table* (Hello, I’d like to reserve a table).  \n  - *C’est pour quand?* (When is it for?) → *Pour ce soir à 19h30* (For tonight at 7:30 PM).  \n\n- Step 2: **Details**  \n  - *Pour combien de personnes?* (How many people?) → *Pour 2 personnes* (For 2 people).  \n  - *Votre numéro de téléphone?* (Your phone number?) → *06 78 65 67 87* (Read digits separately).  \n\n- Step 3: **Confirmation**  \n  - *C’est noté* (Noted).  \n  - *À ce soir!* (See you tonight!).  \n\n- Step 4: **Polite closings**  \n  - *Merci beaucoup* (Thank you), *Au revoir* (Goodbye).  \n\n+ **Common mistake**: Forgetting *s'il vous plaît* (please) in formal requests (e.g., *Puis-je réserver...?*).  \n+ **Waiter interaction**: *En terrasse ou à l’intérieur?* (Terrace or inside?) → *En terrasse* (Outside).", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "Why does the gender of nouns matter in French? Give examples. (2 steps)", "answer": "- Step 1: **Article agreement**  \n  - Nouns have masculine/feminine gender, affecting articles:  \n    - *le livre* (masculine, the book) vs. *la table* (feminine, the table).  \n    - *un ami* (a friend, male) vs. *une amie* (a friend, female).  \n\n- Step 2: **Adjective agreement**  \n  - Adjectives change to match the noun’s gender:  \n    - *un film intéressant* vs. *une série intéressante*.  \n  - **Exception**: Some adjectives stay the same (e.g., *un animal curieux*, *une personne curieuse*).  \n\n+ **Why it matters**: Gender is foundational for correct grammar and communication. Misusing articles/adjectives sounds unnatural.  \n+ **Example**: *Le café est bon* (Masculine) vs. *La tasse est belle* (Feminine).", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "How do you ask for food preferences (e.g., meat doneness) in a restaurant? (3 steps)", "answer": "- Step 1: **Waiter’s question**  \n  - *Quelle cuisson pour la viande?* (How would you like your meat cooked?)  \n\n- Step 2: **Options**  \n  - *Bleu* (very rare), *saignant* (rare), *à point* (medium-rare), *bien cuit* (well-done).  \n\n- Step 3: **Response**  \n  - *Je voudrais du bœuf saignant, s’il vous plaît* (I’d like rare beef, please).  \n\n+ **Partitive article**: Use *du* for indefinite (uncountable) nouns (*du bœuf*).  \n+ **Common mistake**: Confusing *saignant* (rare) with *cuit* (cooked).", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "What are the three main ways to order food in French, and how do they differ in formality? (3 steps)", "answer": "- Step 1: **Casual**  \n  - *Je vais prendre...* (I’ll have...)  \n  - *Je prends l’entrée* (I’ll take the appetizer).  \n\n- Step 2: **Polite**  \n  - *Je voudrais...* (I would like...)  \n  - *Je voudrais le filet mignon, s’il vous plaît*.  \n\n- Step 3: **Formal/In a group**  \n  - *Puis-je avoir...?* (May I have...)  \n  - *Pouvez-vous commander pour nous?* (Can you order for us?)  \n\n+ **Waiter interaction**: *Désirez-vous...?* (Would you like...) is also formal.  \n+ **Why it matters**: Use formal phrasing (*s'il vous plaît*) in restaurants; avoid imperative verbs (*Donne-moi* = rude).", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "How do you politely ask for the bill in French? Provide alternatives. (2 steps)", "answer": "- Step 1: **Formal**  \n  - *L’addition, s’il vous plaît* (The bill, please)  \n  - *Pourrais-je avoir l’addition?* (May I have the bill?)  \n\n- Step 2: **Informal**  \n  - *La note, s’il te plaît* (Use *tu* form with friends).  \n\n+ **Common mistake**: Confusing *l'addition* (bill) with *la réservation* (reservation).  \n+ **Cultural note**: Splitting the bill (*on partage*) is acceptable but may require explicit request.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "Why does French use \"être\" and \"avoir\" as auxiliary verbs in compound tenses? Give examples. (3 steps)", "answer": "- Step 1: **\"Avoir\" as default**  \n  - Most verbs use *avoir* + past participle: *J’ai mangé* (I ate).  \n\n- Step 2: **\"Être\" for specific verbs**  \n  - Motion verbs (*aller, venir*) and *être, naître, mourir* use *être*: *Je suis allé* (I went).  \n\n- Step 3: **Agreement rules**  \n  - With *être*, the past participle agrees with the subject: *Elle est allée* (She went).  \n  - With *avoir*, agreement only occurs if the direct object comes *before* the verb: *Les pommes que j’ai mangées* (The apples I ate).  \n\n+ **Why this matters**: Incorrect use of *avoir/être* or agreement errors distort meaning.  \n+ **Example contrast**: *J’ai vu le film* (I saw the movie) vs. *Je suis né en France* (I was born in France).", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": true}], "count": 10}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "How do you form the negative of AVOIR in French? Give an example using \"je n'ai pas\". (2 steps)", "answer": "- Step 1: To make AVOIR negative, place \"ne\" before the verb and \"pas\" after it → \"ne + avoir + pas\"\n- Step 2: In spoken French, \"ne\" is often dropped, leaving just \"pas\" after the verb:\n  + je n'ai pas / j'ai pas\n  + tu n'as pas / tu as pas\n  + il n'a pas / il a pas", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "What is the difference between \"un/une/des\" and \"de la/du/des\" in French? Give examples. (2 steps)", "answer": "- Step 1: \"Un\" (masculine) and \"une\" (feminine) are used with countable singular nouns; \"des\" is used with plural countable nouns\n  + un chocolat (one chocolate)\n  + une assiette (one plate)\n  + des chocolats (some chocolates, plural)\n- Step 2: \"Du\" (masculine), \"de la\" (feminine), and \"des\" are used with uncountable/mass nouns to mean \"some\"\n  + du café (some coffee)\n  + de la crème brûlée (some crème brûlée)\n  + des saumon (some salmon — when referring to quantity)", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "Translate and explain: \"Je voudrais le hamburger s'il vous plaît.\" What is the grammatical structure? (2 steps)", "answer": "- Step 1: Translation: \"I would like the hamburger please\" — this is a polite way to order food in French\n- Step 2: The structure uses \"je voudrais\" (conditional of vouloir = to want), which is more polite than \"je veux\"\n  + Other polite alternatives: \"je pourrais avoir...\" (could I have...), \"j'aimerais avoir...\" (I would like...)\n  + \"s'il vous plaît\" = please (formal); \"s'il te plaît\" = please (informal)", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "In a French restaurant, how do you ask for the bill? Give two polite ways to request it. (2 steps)", "answer": "- Step 1: The bill in French is \"l'addition\" or \"la note\"\n- Step 2: Two polite ways to ask:\n  + \"Je pourrais avoir l'addition s'il vous plaît ?\" (Could I have the bill please?)\n  + \"Pourrais-je avoir la note s'il vous plaît ?\" (Would I have the bill please? — more formal)\n  + \"L'addition s'il vous plaît\" (The bill please — short form)", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "What are the three ways to ask a question in French at A1 level? (3 steps)", "answer": "- Step 1: Intonation question — keep the same word order but raise your voice at the end\n  + Example: \"Tu habites à Paris ?\" (Do you live in Paris?)\n- Step 2: \"Est-ce que\" question — add \"est-ce que\" at the beginning\n  + Example: \"Est-ce que tu habites à Paris ?\" (Do you live in Paris?)\n- Step 3: Inversion — reverse the verb and subject pronoun (more formal, common in writing)\n  + Example: \"Habites-tu à Paris ?\" (Do you live in Paris?)\n+ Intonation is most common in spoken French; \"est-ce que\" is the easiest to learn; inversion is more formal", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "Conjugate the verb ÊTRE (to be) in the present tense, affirmative and negative. (2 steps)", "answer": "- Step 1: Affirmative form:\n  + je suis, tu es, il/elle/on est, nous sommes, vous êtes, ils/elles sont\n- Step 2: Negative form (add \"ne\" before and \"pas\" after):\n  + je ne suis pas, tu n'es pas, il/elle/on n'est pas, nous ne sommes pas, vous n'êtes pas, ils/elles ne sont pas", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "Complete the number sequence in French: 70 = soixante-___, 80 = ___ -vingts, 90 = ___ -vingts-___, 100 = ___. (4 parts)", "answer": "- Step 1: French has a unique system — 70 is \"soixante-dix\" (60+10), not \"septante\"\n- Step 2: 80 is \"quatre-vingts\" (4×20), and when there's a number after 80, use \"quatre-vingt(s)-X\" (e.g., 81 = quatre-vingt-un)\n- Step 3: 90 is \"quatre-vingt-dix\" (4×20+10), not \"nonante\"\n- Step 4: 100 is simply \"cent\"", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "What are the days of the week in French? Which ones do NOT use an article? (2 steps)", "answer": "- Step 1: Days: lundi, mardi, mercredi, jeudi, vendredi, samedi, dimanche\n- Step 2: In French, days of the week generally do NOT use articles when stating regular activities:\n  + \"Je travaille le lundi\" = I work on Mondays (every Monday)\n  + But: \"Le lundi\" = on Mondays (as a general rule)\n  + Note: \"aujourd'hui c'est lundi\" = today is Monday (no article needed)", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "How do you ask someone's name and age in French? Give the complete question sentences. (2 steps)", "answer": "- Step 1: \"Comment tu t'appelles ?\" (What's your name? — informal) / \"Comment vous appelez-vous ?\" (formal)\n- Step 2: \"Tu as quel âge ?\" (How old are you? — informal) / \"Vous avez quel âge ?\" (formal)\n  + Response: \"Je m'appelle Phuc, j'ai 25 ans\" (My name is Phuc, I'm 25 years old)", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "In a French restaurant, the server asks: \"Quelle cuisson pour la viande ?\" What do \"bleu,\" \"saignant,\" \"à point,\" and \"bien cuit\" mean? (2 steps)", "answer": "- Step 1: These are meat cooking levels:\n  + bleu = very rare (almost raw, just seared)\n  + saignant = rare (still red inside)\n  + à point = medium rare (pink in the middle)\n  + bien cuit = well done (no pink)\n- Step 2: This is essential vocabulary for ordering steak in French — \"une entrecôte saignante\" is a popular choice", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "You're calling a restaurant to make a reservation. What information will the server ask for? List at least 4 details. (2 steps)", "answer": "- Step 1: Typical reservation conversation includes:\n  + \"C'est pour une réservation ?\" (Is it for a reservation?)\n  + \"À quelle heure ?\" (At what time?)\n  + \"Pour combien de personnes ?\" (For how many people?)\n  + \"Votre numéro de téléphone pour confirmer ?\" (Your phone number to confirm?)\n- Step 2: You might also be asked: \"À quel nom ?\" (Under what name?) and \"Vous préférez à l'intérieur ou en terrasse ?\" (Inside or on the terrace?)", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "What is the French for the four seasons? Which one requires \"l'\" as the article? (2 steps)", "answer": "- Step 1: Seasons: l'hiver (winter), l'été (summer), l'automne (autumn), le printemps (spring)\n- Step 2: Note the articles:\n  + l'hiver, l'été, l'automne → use \"l'\" because they start with a vowel or h\n  + le printemps → uses \"le\" (masculine) because \"printemps\" starts with a consonant", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "How do you say \"to live\" in French, and what is its conjugation in \"j'habite à Paris\"? What is the meaning of \"j'habite\"? (2 steps)", "answer": "- Step 1: \"Habiter\" = to live (as in reside/dwell)\n- Step 2: In the sentence \"J'habite à Paris\" (I live in Paris):\n  + \"j'habite\" = je + habite (I live)\n  + \"à Paris\" = in Paris (note: \"à\" + city name, no article)\n  + Common mistake: Don't confuse with \"habiter\" (to live/reside) and \"vivre\" (to be alive)", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "What is the French for the 12 months of the year? Which months are spelled differently from their English equivalents? (2 steps)", "answer": "- Step 1: Months: janvier, février, mars, avril, mai, juin, juillet, août, septembre, octobre, novembre, décembre\n- Step 2: Key spelling differences:\n  + février (not february)\n  + août (with the diaeresis/umlaut: û)\n  + All others are very similar to English", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "What does \"Je vais prendre...\" mean in a restaurant context, and how does it compare to \"Je voudrais...\"? (2 steps)", "answer": "- Step 1: \"Je vais prendre...\" = \"I'm going to take...\" — this is a common, confident way to order\n- Step 2: Comparison:\n  + \"Je voudrais...\" = I would like (more polite, hypothetical)\n  + \"Je vais prendre...\" = I'm going to take (more decisive, like \"I'll have...\")\n  + \"J'aimerais...\" = I would like (polite, expresses desire)\n  + All are acceptable; \"je voudrais\" is generally the safest for politeness", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "In negative sentences with \"de\" (some), what happens to \"de/des/du/de la\"? Give an example: \"Je n'ai pas ___ chocolat.\" (2 steps)", "answer": "- Step 1: In negative sentences, \"de\" replaces \"des/du/de la\" after the negation\n- Step 2: Example:\n  + Affirmative: \"J'ai du chocolat\" (I have some chocolate)\n  + Negative: \"Je n'ai pas de chocolat\" (I don't have any chocolate)\n  + The same rule applies: \"des\" → \"de\", \"du\" → \"de\", \"de la\" → \"de\"", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "What is the difference between \"s'il te plaît\" and \"s'il vous plaît\"? When do you use each? (2 steps)", "answer": "- Step 1: \"s'il te plaît\" = please (informal, used with \"tu\")\n- Step 2: \"s'il vous plaît\" = please (formal, used with \"vous\")\n  + Use \"te\" when speaking to friends, family, children, or anyone you address with \"tu\"\n  + Use \"vous\" when speaking formally, to strangers, elders, or in professional settings\n  + In a restaurant with a server, \"s'il vous plaît\" is appropriate", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "How do you say goodbye in French? Give at least three ways, including one that means \"see you soon.\" (2 steps)", "answer": "- Step 1: Formal/standard: \"Au revoir\" = Goodbye\n- Step 2: Informal/friendly:\n  + \"À bientôt\" = See you soon\n  + \"À très vite\" = See you very soon\n  + \"Salut\" = Hi/Bye (informal)\n  + \"Ciao\" = Bye (very informal, borrowed from Italian)", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "In the restaurant dialogue, the server asks \"Est-ce que vous les voulez en même temps ?\" What does this mean, and what does \"en même temps\" literally translate to? (2 steps)", "answer": "- Step 1: Translation: \"Would you like them at the same time?\" — the server is asking if you want all your dishes served together\n- Step 2: \"En même temps\" literally means \"at the same time\" (en = at/in, même = same, temps = time)", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "You want to say \"I work in artificial intelligence\" in French. What is the correct sentence: \"Je suis ingénieur dans l'intelligence artificielle\" or \"Je suis ingénieur en intelligence artificielle\"? (2 steps)", "answer": "- Step 1: The correct form is: \"Je suis ingénieur dans l'intelligence artificielle\"\n- Step 2: Both \"dans\" and \"en\" can be used with domains/fields, but:\n  + \"dans\" + le/la/les is more common for sectors/fields: \"dans l'informatique\" (in IT), \"dans la médecine\" (in medicine)\n  + \"en\" is used for languages: \"en français\" (in French), \"en anglais\" (in English)", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "What does \"faire du sport\" mean, and how does it differ from \"jouer au sport\"? When do you use each? (2 steps)", "answer": "- Step 1: \"Faire du sport\" = to do/play sports (general activity)\n- Step 2: The difference:\n  + \"Faire du sport\" — general sports activity, any sport: \"Je fais du sport le samedi\" (I do sport on Saturdays)\n  + \"Jouer au sport\" — playing a specific sport (usually with a ball): \"Je joue au football\" (I play football)\n  + Note: \"Faire de la gym\" = to go to the gym; \"Faire du vélo\" = to cycle", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "What is the question word for \"what\" in French? Give an example: \"___ c'est la salade niçoise?\" (1 step)", "answer": "The question word is \"Qu'est-ce que\" (or \"Qu'est-ce qu'\" before a vowel):\n- \"Qu'est-ce que c'est ?\" = What is it?\n- \"Qu'est-ce que c'est la salade niçoise ?\" = What is the niçoise salad?", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "A French waiter asks you: \"Vous avez une réservation?\" How do you respond if you (a) do have a reservation and (b) don't have one? (2 steps)", "answer": "- Step 1: (a) Yes, you have a reservation: \"Oui, j'ai une réservation pour deux personnes\" (Yes, I have a reservation for two people)\n- Step 2: (b) No, you don't have a reservation: \"Non, je n'ai pas de réservation\" (No, I don't have a reservation)", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "What is the meaning of \"à bientôt\" versus \"à tout à l'heure\"? Are they interchangeable? (2 steps)", "answer": "- Step 1: \"À bientôt\" = See you soon (general, can be hours, days, or longer)\n- Step 2: \"À tout à l'heure\" = See you in a little while / See you later (typically within hours, same day)\n  + \"À tout à l'heure\" implies a shorter timeframe than \"À bientôt\"\n  + Both are informal and friendly ways to say goodbye", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "In the sentence \"J'adore le sport, les films et la musique,\" what are the genders of \"sport,\" \"films,\" and \"musique\"? How do you know? (2 steps)", "answer": "- Step 1: The article determines the gender:\n  + \"le sport\" → masculine\n  + \"les films\" → masculine (plural of \"le film\")\n  + \"la musique\" → feminine\n- Step 2: In French, every noun has a gender. The article (le/les = masculine, la/les = feminine) tells you the gender. There is no easy rule — you must learn each noun with its article", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "What is the conjugation of AVOIR in the negative for \"ils/elles\"? Why is this a common mistake for English speakers? (2 steps)", "answer": "- Step 1: \"Ils/elles n'ont pas\" (They don't have)\n- Step 2: Common mistake: English speakers often incorrectly say \"ils n'ont pas de\" or \"ils n'ont pas\" — the correct form uses \"pas\" alone after the verb:\n  + They have → ils ont\n  + They don't have → ils n'ont pas\n  + NOT: ils n'ont pas de (this would mean \"they don't have any\" in a different context)", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "In French, how do you count: 21, 22, 31, 41, 51, 61, 71, 81, 91? What patterns do you notice? (2 steps)", "answer": "- Step 1: The numbers:\n  + 21 = vingt-et-un (and-one)\n  + 22 = vingt-deux\n  + 31 = trente-et-un\n  + 41 = quarante-et-un\n  + 51 = cinquante-et-un\n  + 61 = soixante-et-un\n- Step 2: Patterns:\n  + 21, 31, 41, 51, 61 all use \"-et-un\" (except 71 which is special)\n  + 22, 32, 42, 52, 62, 82, 92 just add the number directly\n  + 71 = soixante-et-onze (60+11), NOT \"septante-et-un\"\n  + 81 = quatre-vingt-un, 91 = quatre-vingt-onze", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "You're at a restaurant and the server says: \"Que désirez-vous boire ?\" What does this mean, and what is the infinitive form of \"désirez\"? (2 steps)", "answer": "- Step 1: Translation: \"What would you like to drink?\" (Que = what, désirez-vous = would you like, boire = to drink)\n- Step 2: \"Désirez\" comes from \"désirer\" = to want/wish (formal). The full phrase \"Que désirez-vous ?\" is very polite, equivalent to \"What would you like?\"", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "What is the difference between \"je reviens tout de suite\" and \"je vais revenir\"? When would you use each? (2 steps)", "answer": "- Step 1: \"Je reviens tout de suite\" = I'm coming back right away (I'm returning immediately)\n- Step 2: \"Je vais revenir\" = I'm going to come back (future intention)\n  + A server might say \"Je reviens tout de suite\" to assure you they'll return promptly\n  + You might say \"Je vais revenir\" to mean you'll return another time", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "In the question \"Tu fais quoi comme sports?\", what does \"comme\" mean, and why is this different from \"Tu fais quels sports?\" (2 steps)", "answer": "- Step 1: In this context, \"comme\" means \"as in\" or \"like what kind of\" — it's asking \"what kind of sports do you do\"\n- Step 2: \"Tu fais quoi comme sports ?\" is informal/spoken French\n  + \"Tu fais quels sports ?\" is more formal (quels = which, agreeing with masculine plural)\n  + Both ask \"What sports do you do?\" but \"comme\" is more colloquial", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "The server asks: \"Est-ce que tout va bien ?\" How would you respond positively? What does \"va bien\" literally mean? (2 steps)", "answer": "- Step 1: Positive response: \"Oui, tout va bien, merci\" (Yes, everything is going well, thanks)\n- Step 2: \"Tout va bien\" literally means \"everything goes well\" (va = goes, bien = well). This is a common check-in phrase meaning \"Is everything okay?\"", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "What d
