<script>
const DATA={"selected": [{"question": "How do you form the negative form of the verb AVOIR, and what specific spelling change happens to the article when negating a possession like \"J'ai une réservation\"? (2 steps)", "answer": "- Step 1: To negate any verb in French, you wrap it with **ne... pas**. For AVOIR: \"J'ai\" becomes \"Je n'ai pas\", \"Tu as\" becomes \"Tu n'as pas\", \"Nous avons\" becomes \"Nous n'avons pas\", etc. Notice that **ne** elides (drops the 'e' and adds an apostrophe) before a vowel.\n- Step 2: When negating a possession, the indefinite article (**un/une/des**) or partitive article (**du/de la/des**) changes to **de** (or **d'** before a vowel). So \"J'ai une réservation\" becomes \"Je n'ai pas **de** réservation\", and \"J'ai des chocolats\" becomes \"Je n'ai pas **de** chocolats.\"\n+ Why? Conceptually, \"I don't have *any*\" overrides the specific gender or quantity, reducing it to a pure zero-quantity concept, which universally takes **de**.\n\nNegation eliminates the need for gender/quantity articles, collapsing them all into the single concept of \"none\" = **de**.", "source": "GLM 5.1 ③", "_id": "glm_3_1"}, {"question": "How does French count from 70 to 99, and why is it unusual? (4 steps)", "answer": "- Step 1: 70 = *soixante-dix* — literally \"sixty-ten.\" French stops having a unique word at 60 (*soixante*) and builds up by addition.\n- Step 2: 71-79 = *soixante-et-onze, soixante-douze, ..., soixante-dix-neuf* — \"sixty-eleven, sixty-twelve, ..., sixty-nineteen.\"\n- Step 3: 80 = *quatre-vingts* — literally \"four-twenties\" (i.e., 4 × 20). This is a **vigesimal** (base-20) relic from old Celtic counting.\n+ Note: *quatre-vingts* has an *s* on its own, but loses the *s* when followed by another number: *quatre-vingt-un*.\n- Step 4: 90 = *quatre-vingt-dix* (four-twenties-ten); 91 = *quatre-vingt-onze*, ..., 99 = *quatre-vingt-dix-neuf*.\n\nWhy it matters: Belgian and Swiss French often use *septante* (70), *huitante/octante* (80), *nonante* (90) — these are logically simpler. But mainland France keeps the historic base-20 system, so learners must memorize the additive logic.", "source": "Opus 4.7 ①", "_id": "opus_1_21"}, {"question": "Why does the number 21 spell as \"vingt-et-un\" (with an \"et\") while 22 spells as \"vingt-deux\" (without an \"et\")? What is the rule for the conjunction \"et\" in French numbers? (2 steps)", "answer": "- Step 1: In French, the conjunction **et** (and) is traditionally used only when adding **un** (1) to a tens multiplier. So, 21 = vingt-et-un, 31 = trente-et-un, 41 = quarante-et-un, 51 = cinquante-et-un, 61 = soixante-et-un.\n- Step 2: For all other numbers (22, 23, 35, 47, etc.), you simply attach the number with a hyphen and NO \"et\". So, 22 = vingt-deux, 32 = trente-deux. The \"et\" acts as a linguistic bridge exclusively for the number one.\n+ Edge case: This rule stops at 71 (\"soixante-et-onze\") in standard French because 71 is built as 60+11, not 70+1. But the \"et\" still appears because you are adding 11 to 60.\n+ Note: For 81, it is \"quatre-vingt-un\" (no \"et\") because the base is a multiplication (4x20), not a simple tens multiplier.\n\nUse \"et\" only when adding 1 (or 11, if building off 60) to a round tens number; otherwise, use a hyphen.", "source": "GLM 5.1 ③", "_id": "glm_3_8"}, {"question": "What are the seven days of the week in French, and what's a notable pattern in their endings? (2 steps)", "answer": "- Step 1: $$lundi, mardi, mercredi, jeudi, vendredi, samedi, dimanche$$.\n- Step 2: Five of the seven end in $$-di$$ — from Latin $$dies$$ (\"day\"). They're named after celestial bodies/gods: $$lundi$$ = Moon-day ($$Luna$$), $$mardi$$ = Mars-day, $$mercredi$$ = Mercury-day, $$jeudi$$ = Jupiter-day, $$vendredi$$ = Venus-day. $$Samedi$$ comes from \"Sabbath\", $$dimanche$$ from Latin $$dies\\ dominicus$$ (\"Lord's day\"). Also note: French days are **not capitalised** (unlike English).\n\nTakeaway: Five weekdays share the $$-di$$ ending, fossilised from Latin \"day\"; weekends switched to religious naming.", "source": "Opus 4.7 ②", "_id": "opus_2_16"}, {"question": "A common A1 mistake is saying \"Je suis 25 ans\" for \"I am 25 years old.\" The correct French is \"J'ai 25 ans.\" What verb does French use for age, and why does this make sense if you think about it conceptually? (2 steps)", "answer": "- Step 1: French uses **avoir** (to have), not **être** (to be), for age: \"J'ai 25 ans\" = literally \"I have 25 years.\" This is the opposite of English \"I am 25.\"\n- Step 2: The conceptual logic: in French, age is something you **possess** (you have accumulated years), not something you **are**. Think of years as possessions you collect — \"I have 25 of them.\" This is why the counter word \"ans\" (years) is mandatory: you can't just say \"J'ai 25\" without it in proper French.\n\nFrench views age as accumulated possession (avoir), not identity (être).", "source": "GLM 5.1 ①", "_id": "glm_1_1"}, {"question": "Why is the adjective in *C'est beau* masculine even when referring to something feminine like *la fleur*?", "answer": "- Step 1: After the impersonal *c'est* (\"it is\"), the adjective is **always masculine singular** by default, regardless of what is being described.\n- Step 2: This is because *c'* is a neuter/impersonal pronoun — it doesn't carry gender, so the adjective has nothing to agree with and defaults to masculine.\n+ *C'est beau!* (It's beautiful — referring to anything)\n+ But: *La fleur est belle* (The flower is beautiful — *belle* agrees with feminine *fleur*)\n- Step 3: Contrast: when the subject is a specific noun (*La réunion est urgente*), the adjective agrees with that noun's gender and number (*urgente* = feminine).\n\nRule: *c'est* + masculine adjective, always. *[Noun] est* + agreed adjective.", "source": "Opus 4.7 ①", "_id": "opus_1_23"}, {"question": "What's the difference between $$à\\ l'intérieur$$ and $$en\\ terrasse$$, and what kind of question would prompt them? (2 steps)", "answer": "- Step 1: A host might ask: $$À\\ l'intérieur\\ ou\\ en\\ terrasse\\ ?$$ — \"Inside or on the terrace?\" Standard question when entering a French restaurant/café.\n- Step 2: $$À\\ l'intérieur$$ = \"inside\" (literally \"at the interior\"). $$En\\ terrasse$$ = \"on the outdoor seating area\" (literally \"in terrace\"). The terrace is iconic French café culture — sidewalk tables for people-watching and lingering over coffee. You'd answer $$Je\\ préfère\\ en\\ terrasse$$ (\"I'd prefer on the terrace\").\n\nTakeaway: $$Terrasse$$ is more than \"outdoor seating\" — it's a cultural institution worth knowing by name.", "source": "Opus 4.7 ②", "_id": "opus_2_35"}, {"question": "What are the four French terms for steak cooking levels, from rarest to most cooked? (4 steps)", "answer": "- Step 1: *Bleu* — very rare, barely seared (literally \"blue\" — the meat looks bluish-red inside).\n- Step 2: *Saignant* — rare (literally \"bleeding\"; from *sang* = blood).\n- Step 3: *À point* — medium / medium-rare (literally \"to the point\"; the French default and what most French diners consider \"properly cooked\").\n- Step 4: *Bien cuit* — well-done (literally \"well cooked\").\n\nCultural note: ordering *bien cuit* in France is sometimes seen as ruining the meat — the French standard is *à point* or *saignant*.", "source": "Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "Why is \"school-only\" study (2 lessons/week, no homework) too slow to reach B2 in a reasonable time? (3 steps)", "answer": "- Step 1: 2 lessons × 90 min = 3 h/week of guided input. To reach B2 (~630 h total), that's 630 ÷ 3 ≈ 210 weeks ≈ 4+ years of pure class time.\n- Step 2: But class time alone doesn't consolidate memory — you also need **active recall** (vocabulary review, spaced repetition) and **output practice** (speaking, writing) outside class.\n- Step 3: Adding even 20-30 min/day of review cuts the timeline roughly in half because consolidation accelerates retention massively. The U.S. Foreign Service data confirms: ~23 h/week of class + ~17 h/week of self-study reaches ILR 3 (B2-ish) in ~30 weeks. High weekly hours = fast results.\n\nRule: school-only is *insufficient*; deliberate after-lesson + daily practice is what compresses the timeline.", "source": "Opus 4.7 ①", "_id": "opus_1_52"}, {"question": "Why do we say *J'adore le sport* but *Je fais du sport*? (3 steps)", "answer": "- Step 1: *J'adore le sport* — verbs of preference (*aimer, adorer, détester, préférer*) take the **definite article** because they refer to the category in general. \"I love sports (the concept/category).\"\n- Step 2: *Je fais du sport* — verbs of activity/practice take the **partitive article** because you're doing *some* of it, not all of it. \"I do some sport (some amount of sporting activity).\"\n- Step 3: This generalizes: *J'adore le café* (I love coffee in general) vs *Je bois du café* (I drink some coffee).\n\nRule: preference verbs → definite article (le/la/les); consumption/activity verbs → partitive (du/de la/des).", "source": "Opus 4.7 ①", "_id": "opus_1_30"}, {"question": "List the four seasons in French and identify the unusual elision pattern. (2 steps)", "answer": "- Step 1: $$le\\ printemps$$ (spring), $$l'été$$ (summer), $$l'automne$$ (autumn), $$l'hiver$$ (winter).\n- Step 2: Three out of four seasons take $$l'$$ (elided $$le$$) because they start with a vowel or silent $$h$$: $$l'été, l'automne, l'hiver$$. Only $$le\\ printemps$$ keeps the full article because $$p$$ is a consonant. This shows French elision is mechanical and predictable once you know what counts as a vowel sound (including the silent $$h$$ as in $$hiver$$).\n\nTakeaway: Article elision before seasons is a clean test of the \"vowel sound\" rule.", "source": "Opus 4.7 ②", "_id": "opus_2_17"}, {"question": "The French months Septembre, Octobre, Novembre, Décembre contain number roots. But September is the 9th month, not the 7th. Explain this two-month offset. (2 steps)", "answer": "- Step 1: The Roman calendar originally began in **March** (Martius), making September the 7th month (sept = 7), October the 8th (huit = 8), November the 9th (neuf = 9), December the 10th (dix = 10).\n- Step 2: When the calendar was reformed to start in January (around 153 BCE under the Roman Republic), the month names were not updated. The numeric names stayed fixed even though their positions shifted by two. This historical quirk persists in French (and English) today.\n\nRoman months 7–10 kept their numeric names despite a 2-month calendar shift. Language fossilized the old numbering.", "source": "GLM 5.1 ①", "_id": "glm_1_33"}, {"question": "From the roadmap: what does the U.S. Department of State's data on French (~552-690 class hours to reach professional speaking in 30 weeks) teach us about realistic timelines? (2 steps)", "answer": "- Step 1: That intensive route uses **23 hours/week class + 17 hours/week self-study ≈ 40 hours/week** of language work — essentially a full-time job. Under that load, you can hit professional working proficiency (~B2-C1 equivalent) in roughly 7 months.\n- Step 2: The lesson: **fast outcomes come from raw total weekly hours, not magic technique**. If you can't commit 40h/week, you won't match diplomat-training speed — but you can still get there, just over years instead of months. There's no shortcut; only different total-hour budgets.\n\nTakeaway: Speed of progress = weekly hours invested. Pace your expectations accordingly.", "source": "Opus 4.7 ②", "_id": "opus_2_31"}, {"question": "What's the difference between *soixante-et-un* and *quatre-vingt-un*? Why does one have *et* and not the other?", "answer": "- Step 1: In French, the conjunction *et* (\"and\") is inserted between the tens word and *un* (1) for 21, 31, 41, 51, 61, and 71 — e.g., *vingt-et-un, trente-et-un, ..., soixante-et-onze*.\n- Step 2: However, 81 = *quatre-vingt-un* and 91 = *quatre-vingt-onze* — **no *et*** and **no hyphen between the *et***.\n- Step 3: Reason: the *et* pattern follows the historic base-10 logic of older French numbers (21, 31, ..., 61). The 80s/90s, being base-20 constructions (*quatre-vingts* = 4 × 20), don't follow this pattern.\n\nSo: *vingt-et-un* but *quatre-vingt-un* — a tiny but commonly tested distinction.", "source": "Opus 4.7 ①", "_id": "opus_1_22"}, {"question": "Misconception probe: A learner writes \"Je n'ai pas du café\" for \"I don't have any coffee.\" Why is this wrong, and what is the correct form? (2 steps)", "answer": "- Step 1: The error: after the negative \"ne...pas,\" the partitive article \"du\" must change to **\"de.\"** The rule is that ALL indefinite and partitive articles (un, une, des, du, de la) collapse to \"de\" after \"pas.\" So \"du café\" → \"pas de café.\"\n- Step 2: The correct form: **\"Je n'ai pas de café\"** = I don't have any coffee. The \"de\" here is the neutral negative-article form that replaces both indefinite and partitive articles in negative constructions. \"Pas du café\" is a common English-speaker error because English says \"I don't have any coffee\" (keeping the article equivalent), but French systematically replaces it.\n\nNegative + partitive → \"de,\" never \"du/de la/des.\" \"Je n'ai pas de café\" ✓", "source": "GLM 5.1 ②", "_id": "glm_2_54"}, {"question": "Why do French numbers from 70-99 feel \"weird\" to English speakers? Walk through the logic with 70, 80, and 90. (3 steps)", "answer": "- Step 1: $$70 = soixante\\text{-}dix$$ — literally \"sixty-ten\". French stops having dedicated number-words after 60 and starts doing arithmetic out loud.\n- Step 2: $$80 = quatre\\text{-}vingts$$ — literally \"four-twenties\" ($$4 \\times 20$$). This is a leftover from an old **base-20 (vigesimal)** counting system used in medieval France.\n- Step 3: $$90 = quatre\\text{-}vingt\\text{-}dix$$ — \"four-twenties-ten\" ($$4 \\times 20 + 10$$). And $$91 = quatre\\text{-}vingt\\text{-}onze$$ (\"four-twenties-eleven\").\n\nTakeaway: French preserves a fossil of base-20 counting from the past — Belgian and Swiss French actually use cleaner forms like $$septante$$ (70) and $$nonante$$ (90), proving the awkwardness is a Parisian quirk, not a CEFR necessity.", "source": "Opus 4.7 ②", "_id": "opus_2_9"}, {"question": "What's the difference between $$un/une/des$$ and $$du/de\\ la/des$$? (3 steps)", "answer": "- Step 1: $$un, une, des$$ = **indefinite articles**, used for **countable** items. They answer \"how many?\" with a unit. $$J'ai\\ une\\ pomme$$ = \"I have one apple\".\n- Step 2: $$du, de\\ la, des$$ = **partitive articles**, used for **uncountable/mass** quantities or portions. They answer \"how much?\" with an unspecified amount. $$J'ai\\ du\\ pain$$ = \"I have some bread\".\n- Step 3: The same word $$des$$ appears in both because plurals blur the line — $$des\\ chocolats$$ can mean \"several chocolates\" (countable plural, indefinite) or \"some chocolates\" (partitive-like). Context disambiguates.\n\nTakeaway: French forces you to declare \"unit or substance?\" every time you mention a noun.", "source": "Opus 4.7 ②", "_id": "opus_2_14"}, {"question": "What is the conjugation of *être* (to be) in the present tense, both affirmative and negative?", "answer": "- Step 1: Affirmative: *je suis, tu es, il/elle/on est, nous sommes, vous êtes, ils/elles sont*.\n- Step 2: Negative wraps *ne ... pas* around the verb. *Ne* elides to *n'* only before a vowel sound.\n+ *je ne suis pas* (consonant → no elision)\n+ *tu n'es pas* (vowel → elision)\n+ *il/elle/on n'est pas* (vowel → elision)\n+ *nous ne sommes pas* (consonant → no elision)\n+ *vous n'êtes pas* (vowel → elision)\n+ *ils/elles ne sont pas* (consonant → no elision)\n\nNotice the pattern: elision happens with *es, est, êtes* (vowel starts) but not *suis, sommes, sont* (consonant starts).", "source": "Opus 4.7 ①", "_id": "opus_1_2"}, {"question": "If you study 2 lessons/week (3 hrs) with no review, it takes ~4.6 years to reach B2 from A1. If you add just 20 min/day of review (Scenario S3), it drops to ~1.9 years. Conceptually, why does a small daily addition cause such a massive time reduction? (2 steps)", "answer": "- Step 1: Language learning is governed by the **spacing effect** and **forgetting curve**. If you only study 3 hours a week in two blocks, you spend a large portion of those hours relearning what you forgot since the last lesson. The 3 hours are inefficient because of high memory decay.\n- Step 2: Adding 20 minutes a day forces constant active recall. This interrupts the forgetting curve right when memory is starting to fade, cementing the knowledge. So, instead of spending lesson time re-learning, you spend it advancing. The total weekly hours increase slightly, but the *efficiency* of those hours skyrockets.\n+ Math intuition: 2 lessons (3h) + 20 min/day (~2.3h) = ~5.3 hours/week. The weekly total didn't even double, but the timeline was cut by more than half because the daily review stopped the memory leak.\n\nDaily review plugs the memory leak, turning expensive \"relearning\" time into cheap \"maintenance\" time, which drastically accelerates net progress.", "source": "GLM 5.1 ③", "_id": "glm_3_18"}, {"question": "You're speaking to a stranger at a café in Lyon. Should you use \"tu\" or \"vous\" to address them? Now, you're speaking to your two friends at the same café. Which form now, and why? (2 steps)", "answer": "- Step 1: For the **stranger**, use **vous** — this is the formal singular \"you,\" used with people you don't know, elders, or in professional/formal settings. Using \"tu\" with a stranger would be considered rude or overly familiar.\n- Step 2: For your **two friends**, you also use **vous** — but this time it's the **plural** \"you,\" not the formal one. \"Vous\" is the only way to address more than one person, regardless of familiarity. \"Tu\" is strictly singular.\n\n\"Vous\" serves double duty: formal singular AND all plurals. Context determines which function it serves.", "source": "GLM 5.1 ①", "_id": "glm_1_11"}, {"question": "How do you form the negative of *avoir* in the present tense for all six pronouns? (2 steps)", "answer": "- Step 1: French negation in the present tense wraps the verb with *ne ... pas*. The *ne* goes before the verb, *pas* after. Before a vowel sound, *ne* becomes *n'*.\n- Step 2: Apply this to each form:\n+ *je n'ai pas* (vowel → elision)\n+ *tu n'as pas* (vowel → elision)\n+ *il/elle/on n'a pas* (vowel → elision)\n+ *nous n'avons pas* (vowel → elision)\n+ *vous n'avez pas* (vowel → elision)\n+ *ils/elles n'ont pas* (vowel → elision)\n\nBecause *avoir* always starts with a vowel sound, *ne* is always elided to *n'*.", "source": "Opus 4.7 ①", "_id": "opus_1_1"}, {"question": "In English, we say \"I **am** 25 years old.\" In French, we say \"J'**ai** 25 ans.\" Conceptually, why does French use the verb AVOIR (to have) instead of ÊTRE (to be) for age? (2 steps)", "answer": "- Step 1: In French, age is viewed as something you possess, not a state of being you embody. You don't *are* an age; you *have* a certain number of years.\n- Step 2: This extends to the phrasing \"J'ai 25 ans\" (literally: \"I have 25 years\"). The word **ans** (years) is mandatory because you are counting the years you possess. If you just said \"J'ai 25\", it would be incomplete without the unit of time being possessed.\n+ Misconception trap: Never say \"Je suis 25\" or \"Je suis 25 ans.\" That would literally mean \"I am the physical embodiment of 25 years,\" which sounds absurd in French.\n\nFrench frames age as an accumulated possession (you *have* the years), whereas English frames it as an identity state (you *are* that age).", "source": "GLM 5.1 ③", "_id": "glm_3_2"}, {"question": "Why do we say *un saumon grillé* but would say *une viande grillée*? (2 steps)", "answer": "- Step 1: *Saumon* is masculine, so *grillé* (past participle / adjective) stays in its masculine singular form.\n- Step 2: *Viande* is feminine, so the adjective must agree by adding *-e*: *grillée*. In speech, *grillé* and *grillée* sound identical (the *-e* is silent), but in writing the agreement is mandatory.\n+ Plural: *des saumons grillés* (add *-s*), *des viandes grillées* (add *-es*).\n\nRule: adjectives in French agree in gender AND number with the noun they modify — even when pronunciation doesn't change.", "source": "Opus 4.7 ①", "_id": "opus_1_41"}, {"question": "\"S'il vous plaît\" translates to \"please,\" but literally it means something different. What is the literal translation, and why does French use \"vous\" in this phrase even when speaking to a friend? (2 steps)", "answer": "- Step 1: Literally: \"**If it pleases you**\" — \"s'\" = si (if), \"il\" = it (impersonal), \"vous\" = you (object), \"plaît\" = pleases. So: \"if it pleases you.\"\n- Step 2: The phrase is **frozen/fixed** — it always uses \"vous\" regardless of the relationship. Even with friends, you say \"s'il vous plaît,\" not \"s'il te plaît\" in standard usage. However, in very informal speech, \"s'il te plaît\" (with \"tu\" form) does exist and is used with close friends/family.\n\n\"S'il vous plaît\" is a set formula; the \"vous\" is baked in by convention, not by social context.", "source": "GLM 5.1 ①", "_id": "glm_1_6"}, {"question": "What's the difference between $$s'il\\ vous\\ plaît$$ and $$s'il\\ te\\ plaît$$, and what literal structure do they share?", "answer": "Both literally mean \"if it pleases you\" — a politeness formula. The split is the **pronoun**: $$vous$$ is formal/plural (\"you, sir/madam\" or \"you all\"), while $$te$$ is informal singular (\"you, friend\"). So $$s'il\\ vous\\ plaît$$ is what you say to a waiter, a stranger, or your teacher; $$s'il\\ te\\ plaît$$ is what you say to a friend or a child. The structure reveals a piece of French politeness philosophy: rather than barking a request, you frame it conditionally — \"*if* it would please you\" — leaving the other person the dignity of agreeing.", "source": "Opus 4.7 ②", "_id": "opus_2_6"}, {"question": "What's the conceptual difference between $$Je\\ voudrais$$, $$Je\\ vais\\ prendre$$, and $$Je\\ pourrais\\ avoir$$ when ordering at a restaurant? Are they interchangeable? (3 steps)", "answer": "- Step 1: $$Je\\ voudrais$$ = \"I would like\" (conditional of $$vouloir$$). Polite, classic, slightly soft. The conditional mood makes it less demanding than \"I want\".\n- Step 2: $$Je\\ vais\\ prendre$$ = \"I'm going to take/have\" (near-future tense). More decisive — you've made up your mind and are announcing the choice.\n- Step 3: $$Je\\ pourrais\\ avoir$$ = \"Could I have\" (conditional of $$pouvoir$$). The most deferential — you're literally asking permission.\n\nThey are largely interchangeable in restaurants, but they signal subtle differences in attitude: $$voudrais$$ = polite preference, $$vais\\ prendre$$ = decisive, $$pourrais\\ avoir$$ = humble request.", "source": "Opus 4.7 ②", "_id": "opus_2_8"}, {"question": "When forming an inversion question like \"Habites-tu en Espagne?\", why is there a hyphen between the verb and pronoun? And what happens when the verb ends in a vowel and the pronoun starts with a vowel (like with \"il/elle\")? (3 steps)", "answer": "- Step 1: The hyphen in inversion (habites-tu, aimez-vous) marks the **syntactic reversal** — the verb and subject pronoun have swapped positions, and the hyphen signals this binding. It's not a compound word; it's a grammatical marker showing that two normally separate elements are now inverted.\n- Step 2: When the verb ends in a vowel and the pronoun starts with one (il, elle, on), you get a **vowel clash** that French resolves by inserting a **\"t\"** as a buffer. Example: \"Il parle\" → inversion would be \"parle-il\" (vowel clash) → actual form: **\"parle-t-il\"**. The \"t\" is purely phonological — it prevents two vowels from colliding.\n- Step 3: This \"t\" insertion only happens with third-person pronouns (il, elle, on) because only they start with vowels. With tu, nous, vous (consonant-starting pronouns), no insertion is needed: \"parles-tu,\" \"aimons-nous,\" \"aimez-vous.\" The rule is automatic in formal writing but worth recognizing when you encounter it.\n\nVowel clash in inversion → insert \"-t-\" between verb and pronoun. Only with il/elle/on.", "source": "GLM 5.1 ②", "_id": "glm_2_25"}, {"question": "How do you ask \"What is this?\" in French, and how does the structure decompose? (3 steps)", "answer": "- Step 1: $$Qu'est\\text{-}ce\\ que\\ c'est\\ ?$$ — pronounced something like \"kes-kuh-say\".\n- Step 2: Literal decomposition: $$Que$$ (\"what\") + $$est\\text{-}ce$$ (\"is it\" — inversion of $$c'est$$) + $$que$$ (\"that\") + $$c'est$$ (\"it is\"). Roughly: \"What is it that it is?\"\n- Step 3: Yes, the structure is redundant — French stacked a question marker ($$est\\text{-}ce$$) onto another statement ($$c'est$$) to make the question unmistakable. Native speakers no longer feel the redundancy; it's a frozen formula.\n\nTakeaway: $$Qu'est\\text{-}ce\\ que\\ c'est\\ ?$$ is a fossilised double-question construction — just memorise the chunk.", "source": "Opus 4.7 ②", "_id": "opus_2_12"}, {"question": "Why does French use \"être\" and \"avoir\" as auxiliary verbs in compound tenses? Give examples. (3 steps)", "answer": "- Step 1: **\"Avoir\" as default**  \n  - Most verbs use *avoir* + past participle: *J’ai mangé* (I ate).  \n\n- Step 2: **\"Être\" for specific verbs**  \n  - Motion verbs (*aller, venir*) and *être, naître, mourir* use *être*: *Je suis allé* (I went).  \n\n- Step 3: **Agreement rules**  \n  - With *être*, the past participle agrees with the subject: *Elle est allée* (She went).  \n  - With *avoir*, agreement only occurs if the direct object comes *before* the verb: *Les pommes que j’ai mangées* (The apples I ate).  \n\n+ **Why this matters**: Incorrect use of *avoir/être* or agreement errors distort meaning.  \n+ **Example contrast**: *J’ai vu le film* (I saw the movie) vs. *Je suis né en France* (I was born in France).", "source": "Qwen 3 ②", "_id": "qwen_2_9"}, {"question": "Why does \"Tu es\" become \"Tu n'es pas\" in the negative, instead of \"Tu ne es pas\"? What phonetic rule causes this change? (2 steps)", "answer": "- Step 1: When **ne** comes before a word starting with a vowel or silent h, it undergoes **elision** — the \"e\" is dropped and replaced by an apostrophe: ne → n'. So \"ne es\" becomes \"n'es.\"\n- Step 2: This is a phonetic rule: French avoids having two vowels collide (hiatus). Dropping the \"e\" and linking with an apostrophe creates smoother, faster speech. The same rule applies to other small words: je → j' (j'ai), le → l' (l'homme), que → qu' (qu'est-ce que).\n\nElision (dropping a vowel before another vowel) is French's way of avoiding awkward vowel collisions.", "source": "GLM 5.1 ①", "_id": "glm_1_9"}, {"question": "In French, why would you say \"J'ai **du** chocolat\" but \"J'ai **un** chocolat\"? What is the conceptual difference between these two articles when talking about food? (3 steps)", "answer": "- Step 1: The core difference lies in whether the noun is **countable** or **uncountable** (mass noun). In English, \"a chocolate\" usually means one distinct, countable piece (like one truffle), while \"some chocolate\" refers to the substance/mass itself.\n- Step 2: In French, **un/une/des** are indefinite articles used for countable items. So, \"J'ai un chocolat\" means \"I have one (piece of) chocolate.\" **Du/de la/des** are partitive articles used for uncountable masses. So, \"J'ai du chocolat\" means \"I have some chocolate (substance).\"\n+ Sub-case A: \"Ils ont un plat du jour\" -> They have one specific, countable daily special.\n+ Sub-case B: \"Il a du café\" -> He has some coffee (the liquid mass), whereas \"Il a un café\" means he has one cup of coffee.\n- Step 3: Visual intuition: If you can pick it up and count \"one, two, three\" of them, use **un/une/des**. If you scoop it, pour it, or eat an undefined portion of it, use **du/de la/des**.\n\nThe partitive article says \"some of this mass,\" while the indefinite article says \"one of these discrete units.\"", "source": "GLM 5.1 ③", "_id": "glm_3_0"}, {"question": "The server says \"Je reviens tout de suite.\" What does this mean, and why does \"tout de suite\" not mean \"all at once\" as you might guess from the individual words? (2 steps)", "answer": "- Step 1: **\"Je reviens tout de suite\"** = \"I'm coming right back\" / \"I'll be right back.\" The server is saying they'll return shortly — typically after you've asked for something (the bill, more water, etc.).\n- Step 2: **\"Tout de suite\"** is a fixed expression meaning \"immediately / right away.\" The literal word-by-word breakdown (\"all of suit/following\") is misleading — this is an idiom, not a compositional phrase. A common learner mistake is to interpret \"tout\" as \"all\" and \"suite\" as \"sequence\" and guess \"all at once\" or \"everything follows.\" In reality, it's simply the standard French way to say \"right now / immediately.\" The pronunciation is also notable: \"tout de suite\" is often pronounced \"toot sweet\" in rapid speech.\n\nTout de suite = immediately/right away. It's an idiom — don't translate word by word.", "source": "GLM 5.1 ②", "_id": "glm_2_35"}, {"question": "How are French phone numbers read aloud, and why does this matter for listening practice?", "answer": "- Step 1: French phone numbers have 10 digits, read in **five pairs of two-digit numbers** — not digit by digit like in English.\n+ Example: 06 78 65 67 87 = *zéro six, soixante-dix-huit, soixante-cinq, soixante-sept, quatre-vingt-sept*.\n- Step 2: This matters because numbers like 78 (*soixante-dix-huit* = \"sixty-eighteen\") and 87 (*quatre-vingt-sept* = \"four-twenties-seven\") require knowing the unusual French number system.\n- Step 3: Practical tip: practice listening to phone numbers in pairs and decoding 70s, 80s, 90s quickly — these are where most beginners stumble.\n\nThe pair-grouping convention is universal in France for phone numbers, dates, and addresses.", "source": "Opus 4.7 ①", "_id": "opus_1_20"}, {"question": "Edge case: You're addressing a single close friend, but you're also speaking to their grandmother at the same time. Do you use \"tu\" or \"vous\"? Explain the logic. (2 steps)", "answer": "- Step 1: Since you're addressing **more than one person** (friend + grandmother), you must use **vous** — the plural form. \"Vous\" is grammatically required for any group of 2+ people, regardless of your relationship with individual members.\n- Step 2: If you spoke to each person separately, you'd use \"tu\" with the friend and \"vous\" with the grandmother. But together, plural \"vous\" overrides both the informal (tu for friend) and formal (vous for grandmother) singular choices. Plural always wins.\n\nPlural \"vous\" is mandatory for 2+ people. Individual register choices don't apply to groups.", "source": "GLM 5.1 ①", "_id": "glm_1_31"}, {"question": "Compare *Je suis ingénieur dans l'intelligence artificielle* vs *Je suis un ingénieur en intelligence artificielle*. Are both correct? (3 steps)", "answer": "- Step 1: *Je suis ingénieur dans l'intelligence artificielle* — uses *dans* + definite article *l'* before the field. Acceptable but slightly less idiomatic.\n- Step 2: *Je suis ingénieur en intelligence artificielle* — uses *en* with no article. More idiomatic for naming a field of work/study (*en informatique*, *en physique*, *en biologie*).\n- Step 3: No article before the profession (*ingénieur*) because of the rule: after *être*, bare profession. Adding *un* would require an adjective: *Je suis un excellent ingénieur*.\n\nBest practice: *Je suis ingénieur en intelligence artificielle* — natural French phrasing for naming a specialty.", "source": "Opus 4.7 ①", "_id": "opus_1_49"}, {"question": "What does *à ce soir* mean and when would a restaurant host say it? (2 steps)", "answer": "- Step 1: *À ce soir* literally = \"to this evening\" → idiomatically \"see you tonight\" / \"until tonight.\"\n- Step 2: A restaurant host says it at the end of a reservation phone call, confirming that you'll see them later that same evening. It's both a farewell and an implicit reminder of the appointment.\n\nThe pattern *à [time/day]* always means \"until [time]\" / \"see you [time]\" — a useful, productive French farewell template.", "source": "Opus 4.7 ①", "_id": "opus_1_38"}, {"question": "The roadmap says passive exposure (French music, Netflix, casual scrolling) should be counted as \"bonus\" rather than guided hours. Why doesn't passive exposure count equally toward CEFR progression? (2 steps)", "answer": "- Step 1: **Guided hours** require active cognitive engagement: comprehension exercises, shadowing (repeating after a speaker), note-taking, corrected output, and deliberate practice. These activities force your brain to process, produce, and self-correct — the mechanisms that build new linguistic pathways.\n- Step 2: **Passive exposure** (background French music, Netflix with subtitles you barely read, scrolling French social media) provides input but without the attentional focus needed for acquisition. You might pick up occasional words or rhythms, but without active processing, the input doesn't convert to usable knowledge. It's not worthless — it builds familiarity and phonological awareness — but it's not equivalent to 30 minutes of focused study.\n\nPassive = bonus exposure (familiarity, comfort). Active = guided hours (acquisition, skill). Count them separately.", "source": "GLM 5.1 ②", "_id": "glm_2_58"}, {"question": "Why does *une* become *de* in the negative sentence *Je n'ai pas de réservation*? (3 steps)", "answer": "- Step 1: In French, after a negative verb, **indefinite and partitive articles collapse to *de*** (or *d'* before a vowel). So *un, une, des, du, de la* all become *de* in the negative.\n- Step 2: The logic: the negation expresses the absence of *any* quantity. French marks this absence with a single, neutral *de*, removing the article that suggested existence.\n+ *J'ai un livre* → *Je n'ai pas **de** livre*\n+ *J'ai du café* → *Je n'ai pas **de** café*\n+ *J'ai des amis* → *Je n'ai pas **d'**amis* (elision before vowel)\n- Step 3: Exception: this rule does NOT apply after *être*. *C'est un livre* → *Ce n'est pas un livre* (article stays). The rule is specifically for direct objects of negated verbs expressing possession/existence.\n\nTakeaway: negation erases quantity, so the article also collapses.", "source": "Opus 4.7 ①", "_id": "opus_1_13"}, {"question": "A learner says \"en printemps\" instead of \"au printemps.\" Explain precisely why this is wrong by walking through the grammar step by step. (3 steps)", "answer": "- Step 1: The preposition for \"in\" with seasons is either **en** or **au** (à + le). The choice depends on the season's gender and whether it starts with a vowel.\n- Step 2: \"Printemps\" is masculine and starts with a **consonant** (p). For masculine consonant-initial nouns, the preposition \"à\" contracts with \"le\" to form **au**: à + le printemps = au printemps.\n- Step 3: \"En\" is used before vowel-initial season names (en hiver, en été, en automne) to avoid the vowel collision that \"au\" would create. Since \"printemps\" starts with a consonant, there's no collision, so \"au\" is correct and \"en\" is ungrammatical.\n\n\"Au printemps\" because printemps = masculine + consonant-initial. \"En\" is for vowel-initial or feminine seasons.", "source": "GLM 5.1 ①", "_id": "glm_1_17"}, {"question": "In the être conjugation, \"on est\" is listed alongside \"il/elle est.\" Who does \"on\" refer to, and why is it commonly used in spoken French instead of \"nous sommes\"? (2 steps)", "answer": "- Step 1: \"On\" literally means \"one\" (impersonal, like English \"one is\" or \"they say\"), but in **spoken French**, \"on\" is overwhelmingly used as a replacement for **nous** (we). So \"on est\" = \"nous sommes\" = \"we are\" in everyday speech.\n- Step 2: The reason is phonetic simplicity: \"on est\" (two syllables, smooth) is much easier to say than \"nous sommes\" (three syllables, nasal + consonant cluster). In formal writing, \"nous\" is still preferred; in speech, \"on\" dominates. Note: \"on\" takes third-person singular conjugation (est), not first-person plural.\n\n\"On\" = the spoken French \"we.\" It uses il/elle conjugation (3rd person singular), not nous conjugation.", "source": "GLM 5.1 ①", "_id": "glm_1_21"}, {"question": "What are the guided-hour estimates (core and exam-ready) for each CEFR transition: A1→A2, A2→B1, B1→B2, and the total A1→B2? Why does each successive transition require more hours? (3 steps)", "answer": "- Step 1: The hour estimates:\n+ A1→A2: Core 100-120h → Exam-ready **132h** (midpoint 110h + 20%)\n+ A2→B1: Core 180-200h → Exam-ready **228h** (midpoint 190h + 20%)\n+ B1→B2: Core 200-250h → Exam-ready **270h** (midpoint 225h + 20%)\n+ A1→B2 total: Core 480-570h → Exam-ready **630h**\n\n- Step 2: Each transition requires more hours because the **breadth and depth of ability increases exponentially**: A1→A2 is basic vocabulary and simple structures; A2→B1 requires past tenses, complex sentences, and opinion expression; B1→B2 requires argumentation, nuanced expression, implicit comprehension, and reliable spontaneous output. The gap between \"understanding\" and \"producing\" widens at higher levels.\n\n- Step 3: The 20% buffer is constant across all transitions because exam readiness (reliable performance under pressure) is needed at every level, not just at B2. Without it, you might \"cover\" the material but not be able to demonstrate it on a DELF/TCF exam.\n\nHigher level = wider ability gap = more hours needed. The buffer ensures you can perform, not just recognize.", "source": "GLM 5.1 ②", "_id": "glm_2_43"}, {"question": "Why does French say *en terrasse* (no article) but *à l'intérieur* (with article) for seating preferences? (2 steps)", "answer": "- Step 1: *En* is often used with locations as a fixed expression where no article is needed — it conveys a general \"in/on\" sense. *En terrasse* = \"on the terrace\" (general location category).\n- Step 2: *À l'intérieur* uses *à* + definite article *l'* (elided before vowel) — literally \"at the interior.\" Here French treats *l'intérieur* as a specific noun needing an article.\n\nThis is a quirk of French prepositions: *en* often drops articles (*en France*, *en voiture*, *en terrasse*), while *à* keeps them (*à la maison*, *à l'école*, *à l'intérieur*).", "source": "Opus 4.7 ①", "_id": "opus_1_26"}, {"question": "Why does French insert a hyphen in inversion questions like *Parles-tu français?* but not in *Est-ce que tu parles français?* (2 steps)", "answer": "- Step 1: In inversion, the verb and subject pronoun become a single rhythmic/grammatical unit — French marks this fusion with a hyphen (*Parles-tu*, *Habites-tu*, *Aimez-vous*). It also signals the inversion is grammatical, not just stylistic.\n- Step 2: In *est-ce que* questions, the subject and verb keep their normal order (*tu parles*), so there's no fusion and no hyphen. *Est-ce que* itself is treated as a question chunk added in front.\n\nBonus: in inversion, when a verb ends in a vowel and the pronoun *il/elle/on* follows, French inserts a euphonic *-t-* for pronunciation: *A-t-il une voiture?* (not *A-il*).", "source": "Opus 4.7 ①", "_id": "opus_1_18"}, {"question": "Why does \"21\" = \"vingt-et-un\" (with \"et\") but \"22\" = \"vingt-deux\" (without \"et\")? And why doesn't \"81\" = \"quatre-vingt-un\" use \"et\" either? (3 steps)", "answer": "- Step 1: The \"et\" connector appears only when the unit digit is **1** AND the tens digit is **a round decade word** (20, 30, 40, 50, 60). So: vingt-et-un (21), trente-et-un (31), quarante-et-un (41), cinquante-et-un (51), soixante-et-un (61).\n- Step 2: For all other unit digits (2-9), you use a **hyphen** with no \"et\": vingt-deux, trente-cinq, quarante-sept. And for 22, 32, 42, etc., it's simply hyphenated. The \"et\" is a special connector reserved for the number one after a decade.\n- Step 3: The exception: \"81\" = **quatre-vingt-un** (no \"et\"), because \"quatre-vingts\" is not a simple decade — it's a multiplication (4 × 20). The \"et\" rule only applies to the simple decade words (vingt, trente, quarante, cinquante, soixante). Since quatre-vingts is a compound, you just hyphenate: quatre-vingt-un, quatre-vingt-deux, etc.\n\nPattern: decade + 1 with simple decades → use \"et\"; with compound decades (quatre-vingts) → no \"et,\" just hyphen.", "source": "GLM 5.1 ②", "_id": "glm_2_15"}, {"question": "In French, to ask someone's name, you say \"Comment tu t'appelles ?\" — but literally this translates word-by-word as \"How you yourself call?\" Why does French use a reflexive construction (\"yourself call\") instead of a simple verb like English \"What is your name?\" (2 steps)", "answer": "- Step 1: French often uses **reflexive verbs** (verbes pronominaux) where the subject performs the action on itself. \"S'appeler\" literally means \"to call oneself\" — so \"Je m'appelle Phuc\" is \"I call myself Phuc,\" not \"My name is Phuc.\"\n- Step 2: This reflects a deeper French pattern: identity is something you **do** (you call yourself X), not something you **have** (your name is X). The reflexive pronoun (me/te/se/nous/vous) must always agree with the subject — drop it and the sentence is grammatically broken.\n\nFrench treats identity as an action performed on oneself, not a possession.", "source": "GLM 5.1 ①", "_id": "glm_1_0"}, {"question": "How do you answer the question *\"À quelle heure?\"* with \"at 7:30 PM\" in French?", "answer": "- Step 1: French uses 24-hour time officially: *à 19h30* (written) → spoken as *à dix-neuf heures trente* in formal contexts.\n- Step 2: Conversational form: *à sept heures et demie du soir* — \"at seven and a half (hours) of the evening.\" *Et demie* = \"and a half.\" *Du soir* clarifies PM.\n+ Note: *demie* takes feminine *e* because it agrees with *heure* (feminine).\n- Step 3: Other useful time expressions:\n+ *et quart* = \"and a quarter\" (e.g., *sept heures et quart* = 7:15)\n+ *moins le quart* = \"minus a quarter\" (e.g., *huit heures moins le quart* = 7:45)\n+ *midi* = noon, *minuit* = midnight (no *heures* added)", "source": "Opus 4.7 ①", "_id": "opus_1_42"}, {"question": "Why do we say \"J'ai un chocolate\" but \"J'ai du chocolat\"? What's the difference between \"un\" and \"du\"? (2 steps)", "answer": "- Step 1: **\"Un chocolat\"** = a chocolate (one single piece, countable — like one chocolate bar or one chocolate bonbon)\n- Step 2: **\"Du chocolat\"** = some chocolate (an amount/mass of chocolate, uncountable — like chocolate sauce or melted chocolate)\n+ This is the COUNTABLE vs. UNCOUNTABLE distinction:\n  + \"Un/une/des\" = countable items you can say \"one, two, three\"\n  + \"Du/de la/de l'\" = mass nouns, substances, things you measure (chocolate, water, café, crème)", "source": "MiniMax ②", "_id": "minimax_2_25"}, {"question": "Why is B2 the critical target for French nationality and higher education, and what specific abilities does it require beyond B1? (3 steps)", "answer": "- Step 1: **Official requirements**: Service-Public states B2 oral and written French is required for French nationality/naturalization. Campus France states B2 is the minimum for most French higher-education institutions (C1 recommended for humanities/social sciences).\n- Step 2: B2 requires **serious independent French**: defending an opinion with arguments and examples, discussing advantages and disadvantages, explaining cause and consequence, reformulating ideas, and understanding complex/current-affairs documents. You can participate with fluency in discussions on varied topics.\n- Step 3: The jump from B1 to B2 is significant. B1 lets you express opinions simply; B2 requires you to **argue persuasively, structure complex arguments, handle implicit meaning, and produce organized written output.** This is why the guided-hour estimate for B1→B2 (200-250h) is similar to A2→B1 (180-200h) — the complexity increases even though you're already at an intermediate level.\n\nB2 = you can argue, debate, and function in academic/professional French. It's not \"fluent\" but it's \"functional adult.\"", "source": "GLM 5.1 ②", "_id": "glm_2_29"}, {"question": "In French, when do you say \"J'ai un chocolat\" versus \"J'ai du chocolat\"? What conceptual distinction does this capture? (3 steps)", "answer": "- Step 1: $$un/une$$ is the indefinite article — it points to **one countable unit** of something. $$J'ai\\ un\\ chocolat$$ = \"I have one chocolate (a single piece, like a bonbon).\"\n- Step 2: $$du/de\\ la/des$$ is the **partitive article** — it means \"some\" of an uncountable / mass quantity. $$J'ai\\ du\\ chocolat$$ = \"I have some chocolate (an unspecified amount, like a chunk of a bar).\"\n+ $$du$$ before masculine nouns ($$du\\ café$$, $$du\\ saumon$$)\n+ $$de\\ la$$ before feminine nouns ($$de\\ la\\ crème\\ brûlée$$)\n+ $$des$$ for plural ($$des\\ chocolats$$ = several chocolates)\n- Step 3: The choice reflects how you mentally frame the noun: as a discrete object you can count, or as a substance/mass you can portion. English hides this with \"some\" being optional (\"I have chocolate\"), but French forces the speaker to commit.\n\nTakeaway: French articles encode whether you're thinking *units* or *substance*.", "source": "Opus 4.7 ②", "_id": "opus_2_0"}, {"question": "Why is *le soir* used in *\"Vous regardez la télévision le soir?\"* — what does the definite article do here? (2 steps)", "answer": "- Step 1: *Le soir* with the definite article means \"in the evenings\" / \"every evening\" — expressing a **habitual/general time**, not one specific evening.\n- Step 2: Compare:\n+ *Le soir, je lis* = \"In the evenings (habitually), I read.\"\n+ *Ce soir, je lis* = \"Tonight (this specific evening), I read.\"\n\nRule: French uses the definite article (*le matin, le soir, le lundi*) to express habitual recurrence — a use that has no direct English equivalent (English uses \"in the mornings\" or just \"on Mondays\").", "source": "Opus 4.7 ①", "_id": "opus_1_45"}, {"question": "When using \"C'est...\" (It is...), the adjective that follows defaults to masculine, as in \"C'est beau.\" But in \"La réunion est urgente,\" the adjective matches the feminine noun. Why does \"C'est\" ignore the actual gender of the noun? (2 steps)", "answer": "- Step 1: The pronoun **ce** (c') is technically masculine singular by default in French grammar. When you say \"C'est beau,\" the grammar is anchored to the pronoun **ce**, forcing the adjective **beau** to agree with the masculine pronoun, regardless of what object you are actually referring to.\n- Step 2: However, when you use a specific noun with the verb être (like \"La réunion est...\"), the adjective must agree directly with that specific noun. \"La réunion\" is feminine, so the adjective takes the feminine form: \"urgente\" (urgent -> urgente), \"finie\" (fini -> finie).\n+ Rule of thumb: If you point at something vaguely and say \"It's beautiful,\" use masculine: **C'est beau**. If you specifically name the thing, make the adjective match the noun: **La réunion est urgente**.\n\n\"C'est\" acts as a grammatical shield, forcing masculine agreement on the pronoun level, whereas a specific noun exposes its true gender to the adjective.", "source": "GLM 5.1 ③", "_id": "glm_3_3"}, {"question": "Why is the answer to *\"Tu travailles dans quoi?\"* something like *Je suis ingénieur* — without an article? (3 steps)", "answer": "- Step 1: When stating a profession with *être* (to be), French **drops the indefinite article** in most cases: *Je suis ingénieur*, *Elle est médecin*, *Il est professeur*.\n- Step 2: This is because the profession functions as an adjective-like attribute, not a countable noun in this construction. English says \"I am an engineer\" (with article); French treats the role more like a property.\n- Step 3: Exception: if the profession is **modified by an adjective**, the article returns. *Je suis un bon ingénieur* (I am a good engineer) — with *un* because *bon* makes it more noun-like.\n\nRule: bare profession after *être* = no article; modified profession = with article.", "source": "Opus 4.7 ①", "_id": "opus_1_43"}, {"question": "Why does French use *de la crème brûlée* and *du café* but *une carafe d'eau*? (3 steps)", "answer": "- Step 1: *Crème brûlée* and *café* are being referred to as a mass/substance — \"some crème brûlée,\" \"some coffee.\" These need partitive articles: *de la* (feminine), *du* (masculine).\n- Step 2: *Carafe* is a **countable container** — one carafe, two carafes. So we use the indefinite article *une carafe* (feminine).\n- Step 3: After *carafe*, we say *d'eau* (of water) — this is a **quantity expression**: a [container/measure] of [substance]. After expressions of quantity, French uses just *de* (or *d'* before a vowel), not *de la* or *du*.\n\nRule of thumb: partitive = unquantified mass; *de* alone = after a measure/container.", "source": "Opus 4.7 ①", "_id": "opus_1_4"}, {"question": "When ordering in a restaurant, you can say \"Je voudrais,\" \"Je pourrais,\" or \"J'aimerais.\" These are all conditional forms. Conceptually, why is the conditional mood preferred over the present tense (\"Je veux\" - I want) for politeness? (2 steps)", "answer": "- Step 1: The conditional mood introduces distance and uncertainty. By saying \"I would like\" (Je voudrais) instead of \"I want\" (Je veux), you soften the demand. It turns a direct command into a theoretical preference.\n- Step 2: This psychological distance acts as a social buffer. It implies \"If it pleases you, and if it is possible, this is what I desire,\" giving the server the freedom to respond, rather than boxing them into a demand. \"Je veux\" sounds childish or aggressive because it offers no social escape route.\n+ Other polite forms: \"Je vais prendre\" (I am going to take) is slightly more direct but still acceptable because it frames your choice as a personal future action rather than a demand placed on the server.\n\nPoliteness in French (and many languages) operates by grammatically distancing yourself from your own desires, making them seem like mere suggestions rather than commands.", "source": "GLM 5.1 ③", "_id": "glm_3_4"}, {"question": "How do you form numbers from 70 to 99 in French? Why does this differ from English? (3 steps)", "answer": "- Step 1: **70–79: Soixante + base numbers**  \n  - *70* = **soixante-dix** (60 + 10)  \n  - *71* = soixante-et-onze (60 + 11)  \n  - *79* = soixante-dix-neuf (60 + 19)  \n\n- Step 2: **80–99: Quatre-vingts logic**  \n  - *80* = **quatre-vingts** (4 × 20)  \n  - *81* = quatre-vingt-**un** (NOT *quatre-vingts-un*)  \n  - *99* = quatre-vingt-dix-neuf (4×20 + 9 + 10)  \n\n- Step 3: **Historical context**  \n  - French retains a **vigesimal** (base-20) system influenced by Celtic/Gallic counting, unlike English decimal (base-10).  \n  - **Quatre-vingts** reflects medieval counting in 20s (e.g., 80 = 4×20).  \n\n+ **Common mistakes**:  \n  - Forgetting the \"un\" in 81 (no \"s\" plural for *vingts* in 80).  \n  - Hyphenation rules: *vingt-et-un* (21) vs. *vingts-un* (81).", "source": "Qwen 3 ②", "_id": "qwen_2_2"}, {"question": "Why is \"I'm twenty-five years old\" expressed as $$J'ai\\ vingt\\text{-}cinq\\ ans$$ and not \"*Je suis vingt-cinq ans*\"? (2 steps)", "answer": "- Step 1: In French, age is expressed with $$avoir$$ (\"to have\"), not $$être$$ (\"to be\"). Literally: \"I *have* twenty-five years\". English uses \"to be\", French uses \"to have\" — this reflects a different mental model: age is conceived as a possession (years accumulated), not a state of being.\n- Step 2: Forgetting this is one of the most common Anglophone mistakes. The same logic applies to hunger ($$J'ai\\ faim$$ — \"I have hunger\"), thirst ($$J'ai\\ soif$$), being cold ($$J'ai\\ froid$$), and fear ($$J'ai\\ peur$$).\n\nTakeaway: Many states English treats as \"being\" (cold, hungry, 25) French treats as \"having\" — a deep contrast in worldview.", "source": "Opus 4.7 ②", "_id": "opus_2_20"}, {"question": "The homework note says \"après c'est, l'adjectif est toujours masculin\" and gives \"C'est beau\" as an example. Why does \"c'est\" force a masculine adjective even when referring to something feminine? (3 steps)", "answer": "- Step 1: The construction **\"c'est + adjective\"** is a demonstrative-presentative structure. The \"ce\" in \"c'est\" is the impersonal pronoun — it doesn't refer to a specific masculine noun. It means \"this is\" or \"it is\" in a general sense. Because \"ce\" is grammatically neutral/impersonal, the adjective defaults to **masculine singular** as the unmarked form.\n- Step 2: So \"C'est beau\" works regardless of whether you're looking at a painting (feminine: la peinture) or a song (masculine: le chant). The \"ce\" doesn't agree with any noun — it's a floating demonstrative. \"C'est beau\" = \"This is beautiful\" in a general, pointing sense.\n- Step 3: Contrast with **\"il/elle est + adjective\"**: here the pronoun IS gendered. \"Elle est belle\" (she/it is beautiful — feminine). \"Il est beau\" (he/it is beautiful — masculine). So the choice between \"c'est\" and \"il/elle est\" is a choice about whether you're presenting something generally (c'est + masc adj) or specifying its gender (il/elle est + gendered adj).\n\nC'est = general presentation → masculine default. Il/elle est = specific reference → gender agreement.", "source": "GLM 5.1 ②", "_id": "glm_2_19"}, {"question": "When the server offers \"une bouteille d'eau gazeuse ou d'eau plate,\" what do \"gazeuse\" and \"plate\" mean, and why is \"d'\" used before \"eau\" instead of \"de\"? (2 steps)", "answer": "- Step 1: **\"Eau gazeuse\"** = sparkling/carbonated water (gazeuse = fizzy, from \"gaz\" = gas). **\"Eau plate\"** = still/flat water (plate = flat, from \"plat\" = flat/level). These are the two standard options for bottled water in French restaurants.\n- Step 2: **\"D'eau\"** instead of \"de eau\" follows the **elision rule**: when \"de\" precedes a word starting with a vowel (\"eau\" starts with \"e\"), the \"e\" of \"de\" drops and is replaced by an apostrophe → d'eau. This is the same elision that turns \"le eau\" → \"l'eau\" and \"je ai\" → \"j'ai.\" Elision is mandatory in French — you never pronounce two vowels across a word boundary without contracting.\n\nD'eau = de + eau (elision before vowel). Gazeuse = sparkling. Plate = still/flat. Always elide \"de\" before a vowel-initial word.", "source": "GLM 5.1 ②", "_id": "glm_2_67"}, {"question": "In the phrase \"Je suis ingénieur dans l'intelligence artificielle\" — why is there no article before \"ingénieur\"? When does French drop the article before professions/nationalities? (3 steps)", "answer": "- Step 1: In French, **when you identify someone's profession/nationality/religion with être after a subject pronoun (je, tu, il, etc.), the indefinite article is typically dropped**. \"Je suis ingénieur\" (not \"Je suis un ingénieur\"), \"Elle est médecin\" (not \"Elle est une médecin\").\n- Step 2: The logic: \"être + profession\" functions as a predicate — it attributes a category to the subject, not pointing to one specific individual among many. Adding \"un/une\" would imply \"I am one engineer (among others)\" — a subtly different meaning, more like describing yourself as an instance rather than stating your identity.\n- Step 3: Exceptions where the article IS used: (1) With an adjective: \"C'est un bon ingénieur\" (article returns because the adjective makes it specific). (2) With \"c'est\": \"C'est un ingénieur\" (c'est always takes an article for professions). (3) In the negative: The homework note says \"après c'est, l'adjectif est toujours masculin\" — and with \"c'est beau,\" the article is present. The rule is: **être + pronoun → no article; c'est → article required.**\n\nProfession after je/tu/il + être = bare noun. After c'est = with article.", "source": "GLM 5.1 ②", "_id": "glm_2_6"}, {"question": "From the homework: \"Oui, je suis en retard\" and \"La réunion est urgente\" / \"La réunion est finie\" — why does \"en retard\" use \"en\" but \"urgente\" and \"finie\" are standalone adjectives? What determines whether an adjective needs a preposition? (3 steps)", "answer": "- Step 1: **\"En retard\"** is a fixed adverbial phrase meaning \"late.\" The \"en\" is part of the expression — you can't say \"je suis retard.\" \"En\" here functions as a preposition linking to a noun state. Many French expressions of condition/status use \"en\": \"en colère\" (angry), \"en avance\" (early).\n- Step 2: **\"Urgente\"** and **\"finie\"** are adjectives directly modifying the noun via the verb \"être.\" When a French adjective describes a quality or state of the subject, it connects directly with no preposition: \"La réunion est urgente\" = the meeting is urgent. The adjective agrees in gender/number with the noun it modifies.\n- Step 3: The rule of thumb: if the descriptor is a **quality** (urgent, finished, beautiful), use être + adjective directly. If the descriptor is a **noun-based state** (late = in lateness, angry = in anger), French often uses \"en + noun.\" \"Retard\" is a noun (delay), so it needs \"en.\" \"Urgente\" is an adjective, so it doesn't.\n\nAdjective → direct link (être + adj). Noun-state → preposition link (être en + noun).", "source": "GLM 5.1 ②", "_id": "glm_2_18"}, {"question": "Edge case: If someone says \"Je n'aime pas le café\" (I don't like coffee), why does \"le\" stay instead of changing to \"de\"? When does the definite article survive negation? (2 steps)", "answer": "- Step 1: \"Le café\" here means \"coffee in general\" — it's a **definite article expressing a general category**, not pointing to a specific cup. The negative applies to the preference (\"I don't like [coffee in general]\"), not to the existence of coffee. You're not denying that coffee exists; you're denying that you like it.\n- Step 2: The rule: **definite articles (le/la/les) survive negation** because they refer to something specific or known — either a particular item or a general category. Only indefinite (un/une/des) and partitive (du/de la/des) articles change to \"de\" after negation, because those articles assert existence, and negation denies that existence.\n\n\"Ne...pas + definite article\" = negating a preference/opinion about something known. \"Ne...pas + de\" = denying existence of something.", "source": "GLM 5.1 ②", "_id": "glm_2_55"}, {"question": "What are the three ways to ask a yes/no question in French, ranked from most casual to most formal? Give the same question (\"Do you speak French?\") in all three. (3 steps)", "answer": "- Step 1: **Intonation** (most casual, spoken): keep the statement, raise the voice at the end. $$Tu\\ parles\\ français\\ ?$$\n- Step 2: **Est-ce que** (neutral, very common in speech and writing): prepend $$Est\\text{-}ce\\ que$$ to the statement. $$Est\\text{-}ce\\ que\\ tu\\ parles\\ français\\ ?$$\n- Step 3: **Inversion** (formal, mostly written): swap verb and subject pronoun with a hyphen. $$Parles\\text{-}tu\\ français\\ ?$$\n\nTakeaway: All three carry identical meaning; register changes with social setting (chatting with friends vs. writing an email vs. formal interview).", "source": "Opus 4.7 ②", "_id": "opus_2_4"}, {"question": "Why is \"80\" written as \"quatre-vingts\" with an \"s\" on \"vingts,\" but \"81\" is \"quatre-vingt-un\" without the \"s\"? What rule governs this spelling change? (2 steps)", "answer": "- Step 1: When \"vingt\" is multiplied by a number and stands alone (80 = 4 × 20), it takes the plural **\"s\"** because it functions as a plural noun — there are multiple \"twenties.\" Hence: **quatre-vingts**.\n- Step 2: When another number follows (81, 82, etc.), \"vingt\" is no longer the final element — it becomes part of a compound adjective-like construction, and French drops the plural \"s\" before another number. Hence: **quatre-vingt-un**, **quatre-vingt-deux**, etc. The same rule applies to \"cent\": **deux cents** (200) but **deux cent un** (201).\n\nThe plural \"s\" appears only when the number word is the **final element** of the number — if anything follows, the \"s\" disappears.", "source": "GLM 5.1 ②", "_id": "glm_2_16"}, {"question": "In the study roadmap, \"passive background exposure\" (Netflix, music) is NOT counted as equal to \"guided hours.\" Why can't you count 1 hour of watching French TV as 1 hour of guided learning? (2 steps)", "answer": "- Step 1: Guided hours involve **deliberate practice** — active recall, correction, pushing the boundary of your competence, and receiving feedback. Passive exposure (like watching a movie with subtitles) usually falls into \"comprehensible input,\" but your brain defaults to the easiest path (relying on images or English subs) without forcing linguistic production.\n- Step 2: To count as guided time, you must be doing something that forces output or active processing: shadowing (repeating aloud), note-taking, answering comprehension questions, or corrected writing. Without these, the brain recognizes the context but doesn't encode the grammar or vocabulary into active memory.\n+ Exception: If you watch a 20-minute video, pause every minute to write down and repeat 3 new phrases, that 20 minutes *can* count as guided time because you have injected deliberate recall into the exposure.\n\nPassive exposure builds familiarity and comfort, but only active, corrected effort builds the neural pathways required for spontaneous output (speaking/writing).", "source": "GLM 5.1 ③", "_id": "glm_3_11"}, {"question": "In French, why do we say \"J'ai **du** chocolat\" but \"J'ai **un** chocolat\"? What's the conceptual difference between these two ways of talking about what you have? (3 steps)", "answer": "- Step 1: The key distinction is **countable vs. uncountable (mass)**. \"Un chocolat\" refers to one individual, countable chocolate (like one truffle, one piece). \"Du chocolat\" refers to chocolate as a substance — an undifferentiated mass of the stuff. You can count the first; you can't count the second.\n- Step 2: French encodes this grammatically through its articles. **Un/une/des** are indefinite articles for countable nouns — they point to discrete items (\"un croque-monsieur,\" \"des plats du jour\"). **Du/de la/des** are partitive articles for uncountable nouns — they mean \"some\" of a substance (\"du café,\" \"de la crème brûlée,\" \"du saumon grillé\").\n- Step 3: When you choose an article, you're making a cognitive claim about the noun. \"J'ai une assiette\" = I have one plate (countable object). \"J'ai du café\" = I have some coffee (mass substance). The same word can sometimes shift: \"un café\" = a coffee (a cup/order), \"du café\" = coffee (the beverage/substance).\n\nThe grammar mirrors how you conceptualize the noun — as a thing you can count, or as a substance you take some of.", "source": "GLM 5.1 ②", "_id": "glm_2_0"}, {"question": "Why is the French number system considered a \"hybrid\" system rather than purely base-10 or purely base-20? At what points does the system switch between bases? (3 steps)", "answer": "- Step 1: French is a **hybrid decimal-vigesimal system**: it uses base-10 cleanly from 0-69, then shifts to base-20 compositions for 70-99, before returning to base-10 at 100 (cent).\n- Step 2: The transition points:\n+ **0-16**: unique morphemes (no base visible — these are lexical fossils)\n+ **17-19**: decimal compounds (dix-sept, dix-huit, dix-neuf = 10+7, 10+8, 10+9)\n+ **20-69**: clean decimal decades (vingt, trente, quarante, cinquante, soixante) + units\n+ **70-79**: vigesimal shift (soixante-dix = 60+10, soixante-et-onze = 60+11, etc.)\n+ **80-99**: full vigesimal (quatre-vingts = 4×20, quatre-vingt-dix = 4×20+10)\n+ **100+**: back to decimal (cent, deux cents, mille)\n\n- Step 3: The hybrid nature reflects French linguistic history: Old French and Norman/Celtic influences used base-20 more extensively, while Latin influence pushed base-10. Modern French standardized on base-10 for the lower numbers but preserved base-20 for 70-99 as a historical residue. Swiss and Belgian French \"regularized\" by creating septante/huitante/nonante, but standard French did not.\n\nFrench numbers: base-10 until 70, then base-20 until 99, then base-10 again. A living fossil of competing counting traditions.", "source": "GLM 5.1 ②", "_id": "glm_2_63"}, {"question": "In the self-introduction \"Je m'appelle Phuc, j'ai 25 ans, j'habite à Paris et je suis vietnamien\" — why does French use \"avoir\" (to have) for age instead of \"être\" (to be) like English does? (2 steps)", "answer": "- Step 1: French conceptualizes age as something you **possess** — you \"have\" years. \"J'ai 25 ans\" literally means \"I have 25 years.\" The noun \"ans\" (years) is the thing being possessed. This is a fundamental difference from English, which conceptualizes age as a state of being (\"I am 25\").\n- Step 2: This isn't unique to French — many Romance languages (Spanish \"tengo 25 años,\" Italian \"ho 25 anni\") share this construction. It reflects a worldview where age is accumulated possession rather than identity state. The key mnemonic: in French, you **have** your age; you don't **are** your age. Using \"être\" for age (\"je suis 25 ans\") is a classic English-speaker error.\n\nWhen in doubt: age → avoir, not être.", "source": "GLM 5.1 ②", "_id": "glm_2_5"}, {"question": "Why does French count 70 as \"soixante-dix\" (sixty-ten) and 80 as \"quatre-vingts\" (four-twenties) instead of having dedicated words like English \"seventy\" and \"eighty\"? What historical counting system explains this? (3 steps)", "answer": "- Step 1: French uses a **vigesimal (base-20) system** for numbers 70-99, inherited from Celtic and Norman counting traditions. Instead of creating new base-10 words for 70-99, French **composes** them from existing smaller numbers.\n- Step 2: The breakdown:\n+ 70 = soixante-dix (60 + 10)\n+ 71 = soixante-et-onze (60 + and + 11)\n+ 80 = quatre-vingts (4 × 20)\n+ 81 = quatre-vingt-un (4 × 20 + 1)\n+ 90 = quatre-vingt-dix (4 × 20 + 10)\n+ 91 = quatre-vingt-onze (4 × 20 + 11)\n\n- Step 3: This contrasts with the **decimal (base-10) system** used for 0-69, where each decade has its own word (trente, quarante, cinquante, soixante). The shift happens at 70 — below that, French is cleanly decimal; above that, it becomes vigesimal. Some French-speaking regions (Switzerland, Belgium) have created their own words: septante (70), huitante/octante (80), nonante (90) — but standard/French French does not use these.\n\nFrance chose to preserve the historical vigesimal layer rather than regularize — so learners must master both systems.", "source": "GLM 5.1 ②", "_id": "glm_2_14"}, {"question": "If a waiter asks \"Quelle cuisson pour la viande?\", they are asking about the cooking level. Conceptually, how do the four main French terms (bleu, saignant, à point, bien cuit) map to the physical state of the meat's interior? (2 steps)", "answer": "- Step 1: The terms describe the progression of heat penetrating the meat from the outside in. **Bleu** (very rare) means the heat has barely reached the center; the meat is essentially raw inside and just \"blue\" (seared) on the outside. **Saignant** (rare) means the center is still red and \"bleeding\" (saignant = bleeding).\n- Step 2: **À point** (medium rare/medium) means the heat has reached the exact center (\"point\" = the exact spot), turning the red to pink but still juicy. **Bien cuit** (well cooked) means the heat has fully penetrated, eliminating all pink/red moisture.\n+ Misconception trap: \"À point\" does NOT mean \"well done.\" It literally means \"to the point\" — the exact moment the center is cooked but not dried out. If you want it fully cooked through with no pink, you must say \"bien cuit.\"\n\nThe French cooking scale tracks the penetration of heat: raw center (bleu) -> red center (saignant) -> pink center (à point) -> fully penetrated heat (bien cuit).", "source": "GLM 5.1 ③", "_id": "glm_3_5"}, {"question": "Why does the roadmap recommend \"Qualité FLE\" labelled schools over apps or casual tutors when targeting B2 certification? (3 steps)", "answer": "- Step 1: **Qualité FLE** is an official label initiated by three French ministries to certify French-language teaching centres on teaching quality, services, and accountability.\n- Step 2: Apps (Duolingo, etc.) and casual tutors lack structured **CEFR-aligned progression, placement testing, corrected output, and exam preparation** — all critical for B2-level four-skill mastery (especially writing and speaking).\n- Step 3: For evidence-grade B2 (needed for nationality, university), you need: corrected essays, oral exam practice, simulated DELF tests. Apps can't provide this; a labelled school can.\n\nTakeaway: Apps + tutors help; certified schools are what get you across the B2 finish line.", "source": "Opus 4.7 ②", "_id": "opus_2_32"}, {"question": "Why does French say \"C'est beau\" even when describing a feminine noun, like \"la voiture, c'est beau\"? (2 steps)", "answer": "- Step 1: After $$c'est$$ (\"it is\" / \"that is\"), the adjective **defaults to the masculine singular form**, regardless of what noun was discussed. This is because $$ce$$ is a **neutral/abstract pronoun** — it refers to a situation or idea, not a specific gendered noun.\n- Step 2: Compare: $$La\\ voiture\\ est\\ belle$$ (the car is beautiful — feminine agreement, $$belle$$) vs. $$La\\ voiture,\\ c'est\\ beau$$ (the car, that's a beautiful thing — masculine default, $$beau$$). The second sentence is making a general comment about the *concept*, not directly describing the noun.\n\nTakeaway: $$c'est + adj$$ uses masculine because $$ce$$ refers to an idea, not a gendered thing.", "source": "Opus 4.7 ②", "_id": "opus_2_11"}, {"question": "When making a reservation, the server asks \"Pour combien de personnes?\" (For how many people?). If you want to say \"for 2 people,\" why do you use \"pour\" instead of \"avec\" (with)? (1 step)", "answer": "In this context, **pour** indicates the intended recipient or purpose of the reservation. The table is reserved *for* the capacity of 2 people. **Avec** would imply you are bringing the people as companions *with* you, which changes the focus from the purpose of the booking to your physical company. \"Pour\" establishes the capacity the restaurant needs to accommodate.\n\n\"Pour\" frames the number as the target capacity for the reservation, while \"avec\" would awkwardly frame it as your physical accessories.", "source": "GLM 5.1 ③", "_id": "glm_3_14"}, {"question": "French has three ways to form a question: Intonation, Est-ce que, and Inversion. If you want to ask \"Do you live in Paris?\" (\"Tu habites à Paris\"), what are the three forms, and what is the conceptual rule for when to use each? (3 steps)", "answer": "- Step 1: **Intonation** (\"Tu habites à Paris?\"): You keep the exact same sentence structure as a statement, but raise the pitch of your voice at the end. This is the most informal and is almost exclusively used in spoken, casual conversation.\n- Step 2: **Est-ce que** (\"Est-ce que tu habites à Paris?\"): You place the fixed phrase \"Est-ce que\" (literally: \"is it that\") at the front of the statement. This is the most versatile form — perfectly acceptable in both writing and speaking, formal and informal.\n- Step 3: **Inversion** (\"Habites-tu à Paris?\"): You flip the verb and the subject pronoun and connect them with a hyphen. This is the most formal register and is primarily used in formal writing, literature, or very polite speech.\n+ Edge case: Inversion can sometimes sound awkward with certain subjects (like \"je\"), so French speakers often avoid \"Habité-je?\" and switch to \"Est-ce que\" instead.\n\nIntonation = spoken/casual, Est-ce que = universal/versatile, Inversion = written/formal.", "source": "GLM 5.1 ③", "_id": "glm_3_6"}, {"question": "Name the four French seasons. Which season uses a different preposition than the other three, and why? (3 steps)", "answer": "- Step 1: The four seasons are: **l'hiver** (winter), **le printemps** (spring), **l'été** (summer), **l'automne** (autumn).\n- Step 2: To say \"in [season],\" three seasons use **en**: en hiver, en été, en automne. But spring uses **au**: au printemps.\n- Step 3: The reason is grammatical gender + phonetics. \"Printemps\" is masculine and starts with a consonant, so the preposition **à + le = au**. The other three either start with a vowel (hiver, été, automne → requiring **en** for vowel smoothness) or are feminine (none of these are, but feminine seasons would also take **en**). \"En\" is used before vowel-initial words and all feminine singular nouns.\n\n\"Au printemps\" is the exception because printemps is consonant-initial masculine; the others are vowel-initial → \"en.\"", "source": "GLM 5.1 ①", "_id": "glm_1_15"}, {"question": "Decode the structure of $$Je\\ m'appelle\\ Phuc$$ — what does it literally say, and what's the underlying grammar concept? (3 steps)", "answer": "- Step 1: Literal translation: \"I call myself Phuc.\"\n- Step 2: $$m'$$ is a **reflexive pronoun** (from $$me$$, elided before vowel), meaning \"myself\". The verb $$s'appeler$$ is reflexive — the action turns back on the subject.\n- Step 3: French uses reflexive verbs for many things English doesn't: $$se\\ lever$$ (to get up — \"to lift oneself\"), $$se\\ laver$$ (to wash oneself), $$s'habiller$$ (to dress oneself). For names, it's literally \"I name myself X\", not \"my name is X\".\n\nTakeaway: French sees naming as something you do to yourself, not a fact about you — a reflexive worldview.", "source": "Opus 4.7 ②", "_id": "opus_2_26"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "In French, to ask someone's name, you say \"Comment tu t'appelles ?\" — but literally this translates word-by-word as \"How you yourself call?\" Why does French use a reflexive construction (\"yourself call\") instead of a simple verb like English \"What is your name?\" (2 steps)", "answer": "- Step 1: French often uses **reflexive verbs** (verbes pronominaux) where the subject performs the action on itself. \"S'appeler\" literally means \"to call oneself\" — so \"Je m'appelle Phuc\" is \"I call myself Phuc,\" not \"My name is Phuc.\"\n- Step 2: This reflects a deeper French pattern: identity is something you **do** (you call yourself X), not something you **have** (your name is X). The reflexive pronoun (me/te/se/nous/vous) must always agree with the subject — drop it and the sentence is grammatically broken.\n\nFrench treats identity as an action performed on oneself, not a possession.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": true}, {"question": "A common A1 mistake is saying \"Je suis 25 ans\" for \"I am 25 years old.\" The correct French is \"J'ai 25 ans.\" What verb does French use for age, and why does this make sense if you think about it conceptually? (2 steps)", "answer": "- Step 1: French uses **avoir** (to have), not **être** (to be), for age: \"J'ai 25 ans\" = literally \"I have 25 years.\" This is the opposite of English \"I am 25.\"\n- Step 2: The conceptual logic: in French, age is something you **possess** (you have accumulated years), not something you **are**. Think of years as possessions you collect — \"I have 25 of them.\" This is why the counter word \"ans\" (years) is mandatory: you can't just say \"J'ai 25\" without it in proper French.\n\nFrench views age as accumulated possession (avoir), not identity (être).", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": true}, {"question": "You want to say \"I live in Paris\" in French. The verb is \"habiter\" (to live/reside). How do you say \"I live in Paris,\" and what preposition do you use before the city name? (1 step)", "answer": "\"J'habite **à** Paris.\" French uses **à** before city names to indicate location (in/at a city). Note: this is different from countries, which use **en** (feminine countries) or **au** (masculine countries). Cities always take **à** regardless of gender.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "You say \"Je suis vietnamien\" for \"I am Vietnamese.\" But if a woman were saying this about herself, the adjective would change to \"vietnamienne.\" What does this tell you about how French adjectives work compared to English? (2 steps)", "answer": "- Step 1: French adjectives **agree in gender** with the noun they describe. \"Vietnamien\" is the masculine form; add **-ne** to get the feminine \"vietnamienne.\" English adjectives never change form based on who they describe.\n- Step 2: This agreement rule applies broadly: if the speaker is male → \"Je suis vietnamien\"; if female → \"Je suis vietnamienne.\" You must always think about the gender of the subject when choosing adjective forms in French.\n\nFrench adjectives carry grammatical gender; English adjectives are gender-invariant.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "At a French restaurant, you want to order politely. You can say \"Je voudrais le hamburger\" or \"Je vais prendre le hamburger.\" What is the conceptual difference in politeness and tone between these two structures? (2 steps)", "answer": "- Step 1: \"Je voudrais\" uses the **conditional** mood (I *would* like) — it's soft, tentative, and the most standard polite ordering phrase in French. It signals deference and is universally appropriate.\n- Step 2: \"Je vais prendre\" uses the **futur proche** (I am *going to* take) — it's more direct and decisive, like confirming a choice rather than making a request. It's perfectly acceptable in casual dining but carri
