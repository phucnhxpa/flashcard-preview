oes \"Suivez-moi, s'il vous plaît\" mean in a restaurant context, and what is the infinitive of \"Suivez\"? (2 steps)", "answer": "- Step 1: Translation: \"Follow me, please\" — this is what a host/hostess says when showing you to your table\n- Step 2: \"Suivez\" comes from \"suivre\" = to follow\n  + \"Suivez-moi\" = Follow me (imperative, formal)\n  + \"Suis-moi\" = Follow me (imperative, informal)", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "What is the French for \"twice a week\" or \"four times a week\"? How do you form this with numbers? (2 steps)", "answer": "- Step 1: \"Deux fois par semaine\" = twice a week\n  + \"Quatre fois par semaine\" = four times a week\n- Step 2: Structure: [number] + \"fois\" + \"par\" + [day/time unit]\n  + une fois par jour = once a day\n  + trois fois par mois = three times a month", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "In French, what is the difference between \"J'habite Paris\" and \"J'habite à Paris\"? Which one is correct? (2 steps)", "answer": "- Step 1: The correct form is \"J'habite à Paris\" (I live in Paris)\n- Step 2: With cities, you always need the preposition \"à\":\n  + \"à Paris\", \"à Londres\", \"à Tokyo\"\n  + With countries: \"en France\" (feminine), \"aux États-Unis\" (plural), \"au Japon\" (masculine starting with consonant)\n  + \"J'habite Paris\" would be incorrect", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "How do you say \"I'm Vietnamese\" in French? What is the correct form and nationality adjective? (1 step)", "answer": "\"Je suis vietnamien\" (masculine) or \"je suis vietnamienne\" (feminine)\n- Nationality adjectives in French agree with the speaker's gender\n- For \"je suis vietnamien(ne),\" the ending changes based on whether the speaker is male or female", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "What does the question \"Quels sont tes loisirs ?\" mean, and what is a possible answer? (2 steps)", "answer": "- Step 1: Translation: \"What are your hobbies?\" (Quels = which [masculine plural], sont = are, tes = your [informal], loisirs = hobbies/leisure activities)\n- Step 2: Possible answer: \"J'adore le sport, les films et la musique\" (I love sports, films, and music)", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "In restaurant French, what does \"Avez-vous fait votre choix ?\" mean, and what is a polite response? (2 steps)", "answer": "- Step 1: Translation: \"Have you made your choice?\" (Avez-vous = have you, fait = made, votre = your [formal], choix = choice)\n- Step 2: Polite responses:\n  + \"Oui, je vais prendre...\" (Yes, I'm going to take...)\n  + \"Oui, j'aimerais...\" (Yes, I would like...)\n  + \"Oui, je pourrais avoir...\" (Yes, could I have...)", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "What is the meaning of \"Le restaurant la Tour Eiffel\" in the reservation dialogue? Why is there no article before \"la Tour Eiffel\"? (2 steps)", "answer": "- Step 1: It's \"The Tour Eiffel restaurant\" — this is the name of the restaurant\n- Step 2: Restaurant names (like company names) often drop the article:\n  + \"Le restaurant la Tour Eiffel\" is the formal version\n  + In conversation, you might just hear \"La Tour Eiffel\" as the restaurant's name\n  + Similarly: \"Le café de la Place\" could become \"Café de la Place\"", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "You're asked \"Vous preferez à l'intérieur ou en terrasse ?\" What does each option mean, and how would you choose the terrace? (2 steps)", "answer": "- Step 1: \"À l'intérieur\" = inside (the restaurant)\n  + \"En terrasse\" = on the terrace (outdoor seating)\n- Step 2: To choose the terrace: \"Je préfère en terrasse, s'il vous plaît\" (I prefer on the terrace, please)", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}], "count": 39}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "How do you form the **negative** of the verb **avoir**? Give an example with \"je\" and \"nous.\" (2 steps)", "answer": "- Step 1: To make a sentence negative with \"avoir,\" place **ne ... pas** around the verb — \"ne\" before the verb, \"pas\" after it.\n- Step 2: Examples:\n  + **J'ai** → **Je n'ai pas** (I don't have)\n  + **Nous avons** → **Nous n'avons pas** (We don't have)\n+ Notice the elision: \"ne\" becomes \"n'\" before a vowel — \"je n'ai pas,\" \"il n'a pas.\"\n\n*Rule to remember: The negative always uses TWO words (ne + pas) that sandwich the conjugated verb.*", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "What is the difference between **un/une/des** and **du/de la/des**? When do you use each? (3 steps)", "answer": "- Step 1: **Un** (masculine) and **une** (feminine) = **a/an** before COUNTABLE singular nouns.\n  + Example: **un café** (a coffee), **une assiette** (a plate)\n- Step 2: **Des** = **some** before PLURAL countable nouns.\n  + Example: **des chocolates** (some chocolates), **des plats du jour** (some dishes of the day)\n- Step 3: **Du** (masculine) and **de la** = **some** before UNCOUNTABLE nouns (things you can't count individually).\n  + Example: **du café** (some coffee), **de la crème brûlée** (some crème brûlée)\n+ **Key insight:** If you can count it as \"one, two, three,\" use un/une/des. If it's a substance or mass (water, chocolate, cheese), use du/de la.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "Your French friend asks: \"Comment tu t'appelles ?\" — How do you answer with your name and age? (2 steps)", "answer": "- Step 1: \"Comment tu t'appelles?\" means \"What is your name?\" (literally \"How do you call yourself?\")\n- Step 2: Answer using the pattern: **\"Je m'appelle [name], j'ai [age] ans.\"**\n  + Example: **\"Je m'appelle Phuc, j'ai vingt-cinq ans.\"**\n+ Key grammar points:\n  + \"Je m'appelle\" = I call myself (reflexive verb)\n  + \"J'ai [number] ans\" = I am [number] years old (literally \"I have [number] years\")", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "You meet someone new in French. What three questions can you ask to learn about them? (3 steps)", "answer": "- Step 1: **\"Comment tu t'appelles ?\"** — What is your name?\n- Step 2: **\"Tu as quel âge ?\"** — How old are you? (literally \"You have which age?\")\n- Step 3: **\"Tu habites où ?\"** — Where do you live? (or \"Tu habites en France ?\" — Do you live in France?)\n+ Additional useful question: **\"Tu travailles dans quoi ?\"** — What do you work in?\n\n*These four questions form the core of basic self-introduction and getting-to-know-you conversations.*", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "Translate these self-introduction details into French: \"I am 25 years old, I live in Paris, I am Vietnamese, and I am an artificial intelligence engineer.\" (3 steps)", "answer": "- Step 1: Age and location: **\"J'ai vingt-cinq ans, j'habite à Paris\"**\n- Step 2: Nationality: **\"et je suis vietnamien\"** (masculine form — use \"vietnamienne\" if female)\n- Step 3: Profession: **\"et je suis ingénieur dans l'intelligence artificielle\"**\n+ Full sentence: **\"Je m'appelle Phuc, j'ai vingt-cinq ans, j'habite à Paris et je suis vietnamien. Je suis ingénieur dans l'intelligence artificielle.\"**\n\n*Key patterns: \"j'habite à [city]\" — note the \"à\" before city names. \"dans l'intelligence artificielle\" uses \"dans\" (in) + the feminine noun.*", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "What are the three ways to ask a **yes/no question** in French at A1 level? Give an example for \"Tu parles français.\" (3 steps)", "answer": "- Step 1: **Intonation** — Just raise your voice at the end. The word order stays the same.\n  + Example: **\"Tu parles français ?\"**\n- Step 2: **\"Est-ce que\"** — Add \"est-ce que\" at the beginning.\n  + Example: **\"Est-ce que tu parles français ?\"**\n- Step 3: **Inversion** — Swap the verb and pronoun (more formal, written).\n  + Example: **\"Parles-tu français ?\"**\n+ Which to use? In spoken French, intonation and \"est-ce que\" are most common. Inversion sounds formal.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "Convert this statement into a question using all three methods: \"Vous établez-vous en Espagne.\" (3 steps)", "answer": "- Step 1: **Intonation**: **\"Vous habitez en Espagne ?\"**\n- Step 2: **Est-ce que**: **\"Est-ce que vous habitez en Espagne ?\"**\n- Step 3: **Inversion**: **\"Habitez-vous en Espagne ?\"**\n+ Remember: In inversion, the verb moves BEFORE the subject pronoun. Add a hyphen between them.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "What are the four cooking levels for meat in French, from rarest to most cooked? (4 steps)", "answer": "- Step 1: **Bleu** — Very rare (literally \"blue,\" practically raw inside)\n- Step 2: **Saignant** — Rare (literally \"bleeding,\" warm red center)\n- Step 3: **À point** — Medium rare (literally \"to the point,\" pink center)\n- Step 4: **Bien cuit** — Well done (literally \"well cooked,\" no pink)\n+ Useful phrase: **\"Quelle cuisson pour la viande ?\"** — \"Which cooking for the meat?\"", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "How do you ask for the **bill** at a restaurant in French? Give two polite ways. (2 steps)", "answer": "- Step 1: Direct and polite: **\"L'addition, s'il vous plaît.\"** or **\"La note, s'il vous plaît.\"**\n- Step 2: More formal: **\"Je pourrais avoir l'addition, s'il vous plaît ?\"** — \"Could I have the bill, please?\"\n+ Alternative: **\"Pourrais-je avoir l'addition, s'il vous plaît ?\"** (most formal)\n\n*Note: \"s'il vous plaît\" is formal \"please\"; use \"s'il te plaît\" with friends.*", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "Conjugate the verb **être** (to be) in the affirmative and negative. (3 steps)", "answer": "- Step 1: **Affirmative (positif):**\n  + Je suis, tu es, il/elle/on est, nous sommes, vous êtes, ils/elles sont\n- Step 2: **Negative (négatif):**\n  + Je ne suis pas, tu n'es pas, il/elle/on n'est pas, nous ne sommes pas, vous n'êtes pas, ils/elles ne sont pas\n- Step 3: Remember the pattern: **ne ... pas** surrounds the verb, with elision before vowels (\"n'\").\n+ Key: Unlike \"avoir,\" \"être\" doesn't change meaning in the negative — it's simply \"not.\"", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "You're at a restaurant. The server asks: \"Que désirez-vous boire ?\" — What can you answer using at least three different French structures for \"I would like\"? (2 steps)", "answer": "- Step 1: Here are several ways to order:\n  + **\"Je voudrais...\"** — I would like (polite, most common)\n  + **\"Je pourrais avoir...\"** — Could I have...? (very polite)\n  + **\"J'aimerais...\"** — I would like (polite, slightly formal)\n  + **\"Je vais prendre...\"** — I'm going to take (casual, direct)\n  + **\"On va prendre...\"** — We're going to take (using \"on\" for \"we\")\n- Step 2: Full example: **\"Je voudrais une entrecôte saignante, s'il vous plaît.\"**", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "Complete this restaurant reservation dialogue. Server asks: \"C'est pour une réservation ?\" — What do you respond for a reservation for two at 7:30 PM? (3 steps)", "answer": "- Step 1: Confirm the reservation: **\"Oui, pour ce soir.\"**\n- Step 2: Give the time: **\"À 19h30 (à sept heures et demie), s'il vous plaît.\"**\n- Step 3: Give the number of people: **\"Pour deux personnes, s'il vous plaît.\"**\n+ The server may also ask for your phone number: **\"Votre numéro de téléphone pour confirmer ?\"** — Answer with the number.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "Spell out these numbers in French: 17, 23, 71, 84, 91, 100 (6 answers)", "answer": "- Step 1: **17** = dix-sept\n- Step 2: **23** = vingt-trois\n- Step 3: **71** = soixante-et-onze (not \"septante-one\" — French uses 60+10 for 70)\n- Step 4: **84** = quatre-vingts-quatre (4×20 + 4)\n- Step 5: **91** = quatre-vingts-onze (4×20 + 11)\n- Step 6: **100** = cent\n+ French quirk: For 70-79, use \"soixante-dix\" (60+10). For 80-99, use \"quatre-vingts\" (4×20). For 81, add \"-et-un\" only to multiples of 20: quatre-vingt-un, but quatre-vingts-deux (no \"et\").", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "What is special about French numbers 70-99? Give examples for 70, 80, and 90. (2 steps)", "answer": "- Step 1: **70** = soixante-dix (60 + 10), not \"septante\"\n- Step 2: **80** = quatre-vingts (4 × 20), and 81 = quatre-vingt-un, 82 = quatre-vingt-deux, etc.\n  + **90** = quatre-vingts-dix (4 × 20 + 10), NOT \"quatre-vingt-dix\" (that's 80+10=90)\n+ Why? Historical French counting used base 20 (vigesimal) system — this is a defining feature of French numbers.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "What are the **seven days of the week** in French, in order? (1 step)", "answer": "**Lundi, mardi, mercredi, jeudi, vendredi, samedi, dimanche.**\n+ Note: In French, days are NOT capitalized (unlike English).\n+ Mnemonic: Think of them as \"Moon-day, Mars-day, Mercury-day, Jupiter-day, Venus-day, Saturn-day, Sun-day\" — same Latin root as English.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "What are the **twelve months** in French? (1 step)", "answer": "**Janvier, février, mars, avril, mai, juin, juillet, août, septembre, octobre, novembre, décembre.**\n+ Note: Like days, months are NOT capitalized in French.\n+ Watch out: **août** has the circumflex (^), and **septembre** through **décembre** all start with consonants.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "What are the **four seasons** in French? (1 step)", "answer": "**L'hiver, l'été, l'automne, le printemps.**\n+ Note: All seasons except \"le printemps\" use the masculine definite article \"l'\" (elided) or \"le.\"\n  + \"L'hiver\" (the winter) — l' + hiver\n  + \"L'été\" (the summer) — l' + été\n  - \"L'automne\" (the autumn) — l' + autumn\n  + \"Le printemps\" (the spring) — le + printemps (masculine, no elision)", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "Complete the restaurant dialogue: Server asks \"Avez-vous fait votre choix ?\" — How do you respond saying you want the hamburger? (2 steps)", "answer": "- Step 1: Acknowledge you've chosen: **\"Oui, j'ai choisi.\"** or **\"Oui, je vais prendre...\"**\n- Step 2: State your order: **\"Je voudrais le hamburger, s'il vous plaît.\"**\n+ Other ways to order:\n  + **\"Je pourrais avoir le hamburger ?\"**\n  + **\"Le hamburger, s'il vous plaît.\"** (direct, less polite)\n  + **\"Je vais prendre le hamburger.\"** (casual)", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "The server asks: \"Est-ce que vous les voulez en même temps ?\" — What does this mean and how do you answer \"yes\"? (2 steps)", "answer": "- Step 1: Translation: \"Would you like them (the dishes) at the same time?\" — i.e., served together\n- Step 2: Answer: **\"Oui, s'il vous plaît.\"** (Yes, please) or **\"Oui, en même temps.\"** (Yes, together)\n  + Alternative \"no\": **\"Non, séparément.\"** (No, separately)", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "In French, how do you ask \"What is this?\" about a dish — for example, \"What is la salade niçoise?\" (1 step)", "answer": "**\"Qu'est-ce que c'est, la salade niçoise ?\"**\n+ Breaking it down:\n  + **Qu'est-ce que** = What (literally \"What is it that...\")\n  + **c'est** = it is\n  + Use **\"Qu'est-ce qu'il y a dans...\"** to ask \"What is there in...\" (e.g., \"Qu'est-ce qu'il y a dans la salade ?\" = \"What's in the salad?\")", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "How do you ask someone their **hobbies** in French? Give the question and one example answer. (2 steps)", "answer": "- Step 1: The question: **\"Quels sont tes loisirs ?\"** — What are your hobbies? (formal: \"vos loisirs\")\n- Step 2: Example answer: **\"J'adore le sport, les films et la musique.\"** — I love sports, movies, and music.\n+ Follow-up question: **\"Tu fais quel sport ?\"** — What sport do you play?\n  + Answer: **\"Je vais à la gym quatre fois par semaine.\"** — I go to the gym four times a week.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "What are the three polite ways to say \"please\" in French — and when do you use each? (2 steps)", "answer": "- Step 1: **\"S'il vous plaît\"** — Formal \"please\" (use with strangers, elders, in restaurants, shops)\n- Step 2: **\"S'il te plaît\"** — Informal \"please\" (use with friends, family, children)\n- Step 3: **\"svp\"** — Written abbreviation for both (in texts, emails)\n+ When ordering at a restaurant, ALWAYS use \"s'il vous plaît\" — it's polite to servers.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "What are two ways to say \"goodbye\" in French, and what's the difference? (1 step)", "answer": "- **\"Au revoir\"** — Goodbye (literally \"until seeing again\") — neutral, works in any context\n- **\"À bientôt\"** or **\"À très vite\"** — See you soon / See you very quickly — more casual, implies you'll meet again soon\n+ Both are common. \"Au revoir\" is safer for first-time meetings.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "Your homework said: \"ils ont un rendez-vous\" and \"nous avons un numéro de réservation.\" Why is the verb form different? (2 steps)", "answer": "- Step 1: \"Ils ont\" — they have (masculine or mixed group) — **ils** is the subject pronoun\n- Step 2: \"Nous avons\" — we have — **nous** is the subject pronoun\n+ The verb \"avoir\" changes form based on WHO is doing the having:\n  + \"ils/elles ont\" uses \"ont\"\n  + \"nous avons\" uses \"avons\"\n+ This is NOT about masculine/feminine of the noun — it's about the SUBJECT PRONOUN. The noun \"rendez-vous\" or \"numéro\" is just the object being \"had.\"", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "A student wrote \"J'adore le cinéma.\" Your tutor said the adjective is always masculine because \"c'est beau.\" What does this mean? (2 steps)", "answer": "- Step 1: When you say \"It is beautiful\" in French, you say **\"C'est beau\"** — \"beau\" is the MASCULINE form of \"beautiful.\"\n- Step 2: Even if the noun is feminine (la película, la musique), the adjective \"beau\" doesn't change here because \"c'est\" uses a neuter/impersonal subject.\n+ This rule: After \"c'est\" + adjective, the adjective stays MASCULINE regardless of the noun gender.\n  + La musique? C'est beau.\n  + La réunion? C'est urgente. (Note: \" urg ents\" vs \" urgente\")", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "Why do we say \"J'ai un chocolate\" but \"J'ai du chocolat\"? What's the difference between \"un\" and \"du\"? (2 steps)", "answer": "- Step 1: **\"Un chocolat\"** = a chocolate (one single piece, countable — like one chocolate bar or one chocolate bonbon)\n- Step 2: **\"Du chocolat\"** = some chocolate (an amount/mass of chocolate, uncountable — like chocolate sauce or melted chocolate)\n+ This is the COUNTABLE vs. UNCOUNTABLE distinction:\n  + \"Un/une/des\" = countable items you can say \"one, two, three\"\n  + \"Du/de la/de l'\" = mass nouns, substances, things you measure (chocolate, water, café, crème)", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": true}, {"question": "You're the customer. The server asks: \"Vous avez une réservation?\" — How do you answer \"No, I don't have a reservation\"? (2 steps)", "answer": "- Step 1: Answer: **\"Non, je n'ai pas de réservation.\"**\n+ Key points:\n  - \"Je n'ai pas\" = I don't have (negative of avoir)\n  - \"De réservation\" — after a negative, \"de\" replaces \"une\" — this is called \"partitive article in negatives\"\n- Alternative with \"non\": **\"Non, sans réservation.\"** (No, without reservation)", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "The server asks: \"À l'intérieur ou en terrasse ?\" — What does this mean and how do you say \"I prefer outside on the terrace\"? (2 steps)", "answer": "- Step 1: Translation: \"Inside or on the terrace?\"\n- Step 2: Answer: **\"Je préfère en terrasse, s'il vous plaît.\"**\n+ Useful phrases:\n  + \"À l'intérieur\" = indoors / inside\n  + \"En terrasse\" = outside on the terrace (patio)\n  + \"Je préfère...\" = I prefer...", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "What phrase does the server use to say \"Is everything okay?\" and what do they say when they need to leave briefly? (2 steps)", "answer": "- Step 1: **\"Est-ce que tout va bien ?\"** — Is everything okay? / Is everything going well?\n- Step 2: **\"Je reviens tout de suite.\"** — I'm coming back right away. / I'll be right back.\n+ These are essential service phrases — \"tout va bien\" = \"all is going well,\" \"tout de suite\" = \"right away\" (literally \"all straight\")", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "Convert these statements to questions using \"Est-ce que\": 1) Tu parles français. 2) Vous regardez la télévision le soir. (2 steps)", "answer": "- Step 1: \"Tu parles français.\" → **\"Est-ce que tu parles français ?\"**\n  + Rule: Add \"Est-ce que\" at the START, keep the rest identical\n- Step 2: \"Vous regardez la télévision le soir.\" → **\"Est-ce que vous regardez la télévision le soir ?\"**\n+ Note: The \"Est-ce que\" form is always grammatically correct and sounds natural in both spoken and written French.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "Convert these statements to questions using INVERSION: 1) Tu travailles le samedi. 2) Tu fais du sport. (2 steps)", "answer": "- Step 1: \"Tu travailles le samedi.\" → **\"Travailles-tu le samedi ?\"**\n  + Rule: Move verb BEFORE pronoun, add hyphen\n- Step 2: \"Tu fais du sport.\" → **\"Fais-tu du sport ?\"**\n+ Key: With inversion, pay attention to the verb ending — \"travailles\" + \"tu\" → \"travailles-tu\" (the \"s\" is preserved). For -er verbs, add \"-es\" in inversion: \"parles-tu ?\", \"manges-tu ?\"", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "In the phrase \"Je voudrais le hamburger s'il vous plaît,\" what is the grammatical function of \"s'il vous plaît\"? And why is it placed at the end? (2 steps)", "answer": "- Step 1: **\"S'il vous plaît\"** is a polite phrase meaning \"if it pleases you\" — it's essentially a polite request marker.\n- Step 2: It's placed at the END because French puts polite markers (like \"please,\" \"thank you\") at the end of the sentence, unlike English which often puts \"please\" at the beginning.\n  + English: \"Please, I would like...\"\n  + French: \"Je voudrais..., s'il vous plaît.\"", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "A common mistake is writing \"J'ai un eau\" or \"J'ai un crème.\" Why are these wrong, and what is the correct form? (2 steps)", "answer": "- Step 1: These are wrong because \"eau\" and \"crème\" are FEMININE singular nouns — they need the feminine article \"une,\" not \"un.\"\n- Step 2: Correct forms:\n  + **\"J'ai une carafe d'eau\"** — I have a carafe of water\n  + **\"Vous avez une crème brûlée\"** — You have a crème brûlée\n+ Remember: The article (un/une) must match the GENDER of the noun, not the speaker's preference. \"Un\" = masculine, \"une\" = feminine.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "At what point in a restaurant conversation would you hear \"Le restaurant La Tour Eiffel, bonsoir\"? What happens next? (2 steps)", "answer": "- Step 1: This is the OPENING — the server answers the phone and identifies the restaurant.\n- Step 2: The conversation continues:\n  + Server: \"C'est pour une réservation ?\" (Is it for a reservation?)\n  + Customer: \"Oui, pour ce soir.\" (Yes, for tonight)\n  + Server: \"À quelle heure ?\" (At what time?)\n  + [then number of people, phone number, confirmation]", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "The verb \"faire\" (to do/make) is essential in French. Give three expressions using \"faire\" that are common at A1 level. (2 steps)", "answer": "- Step 1: **\"Faire du sport\"** — to do sports (play sports, exercise)\n  + Example: \"Je fais du sport le matin.\" = I do sports in the morning.\n- Step 2: **\"Faire la connaissance de\"** — to meet (make the acquaintance of)\n  + Example: \"Je fais la connaissance de Marie.\" = I meet Marie.\n- Step 3: **\"Faire attention\"** — to pay attention\n  + Example: \"Faites attention !\" = Pay attention! / Watch out!\n+ Note: \"Faire\" is IRREGULAR — conjugates like \"je fais, tu fais, il fait, nous faisons, vous faites, ils font\"", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "How do you say the following in French using the verb \"adorer\" (to love): \"I love sports, films, and music.\" (1 step)", "answer": "**\"J'adore le sport, les films et la musique.\"**\n+ Key grammar points:\n  + \"J'adore\" = I love (present tense of adorer)\n  + \"Le sport\" — \"sport\" is masculine, takes \"le\"\n  + \"Les films\" — plural, takes \"les\"\n  + \"La musique\" — feminine, takes \"la\"\n+ Note: \"Adorer\" is a regular -er verb — just remove -er and add endings: j'adore, tu adores, il/elle adore, nous adorons, vous adorez, ils/elles adorent", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "Why is it \"J'habite À Paris\" and not \"J'habite EN Paris\"? What determiner do you use with cities vs. countries? (2 steps)", "answer": "- Step 1: With CITIES, use **\"à\"** (or \"au/aux\" if the city name includes an article):\n  + \"J'habite à Paris\" — I live in Paris\n  + \"J'habite à Lyon\" — I live in Lyon\n- Step 2: With COUNTRIES (feminine), use **\"en\"** or \"en,\" with masculine countries use \"au/aux\":\n  + \"J'habite en France\" — I live in France (feminine country)\n  + \"J'habite au Japon\" — I live in Japan (masculine country)\n  + \"J'habite aux États-Unis\" — I live in the USA", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "What is the difference between \"quel\" and \"quelle\" in questions like \"Tu as quel âge?\" and how do you form the question? (2 steps)", "answer": "- Step 1: \"Quel/quelle\" must match the GENDER of the noun it refers to:\n  + \"Quel âge?\" — \"âge\" is masculine → use \"quel\"\n  + \"Quelle heure?\" — \"heure\" is feminine → use \"quelle\"\n- Step 2: Full question pattern: **\"Tu as quel âge ?\"** (How old are you?)\n  + Literally: \"You have which age?\"\n  + Formal version: **\"Quel âge avez-vous ?\"** (inversion)", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "A student wrote \"J'ai un frère et sœur.\" What is grammatically wrong, and how do you fix it? (1 step)", "answer": "**Fix: \"J'ai un frère et une sœur.\"**\n+ Why? \"Frère\" is masculine → \"un frère.\" \"Sœur\" is feminine → \"une sœur.\"\n+ In French, when you list nouns of different genders, each one needs its own appropriate article. You can't share one article across the list.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}], "count": 39}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "What is the conjugation of the verb *avoir* (to have) in the present tense for all six pronouns?", "answer": "- Step 1: Start with the first-person singular: *j'ai* (I have). Note the elision — *je* becomes *j'* before a vowel sound.\n- Step 2: Second-person singular: *tu as* (you have, informal).\n- Step 3: Third-person singular: *il/elle/on a* (he/she/one has).\n- Step 4: First-person plural: *nous avons* (we have).\n- Step 5: Second-person plural/formal: *vous avez* (you have).\n- Step 6: Third-person plural: *ils/elles ont* (they have).\n\nAvoir is highly irregular — none of its forms look like the infinitive stem, which is why it must be memorized as a block.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "How do you form the negative of *avoir* in the present tense for all six pronouns? (2 steps)", "answer": "- Step 1: French negation in the present tense wraps the verb with *ne ... pas*. The *ne* goes before the verb, *pas* after. Before a vowel sound, *ne* becomes *n'*.\n- Step 2: Apply this to each form:\n+ *je n'ai pas* (vowel → elision)\n+ *tu n'as pas* (vowel → elision)\n+ *il/elle/on n'a pas* (vowel → elision)\n+ *nous n'avons pas* (vowel → elision)\n+ *vous n'avez pas* (vowel → elision)\n+ *ils/elles n'ont pas* (vowel → elision)\n\nBecause *avoir* always starts with a vowel sound, *ne* is always elided to *n'*.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": true}, {"question": "What is the conjugation of *être* (to be) in the present tense, both affirmative and negative?", "answer": "- Step 1: Affirmative: *je suis, tu es, il/elle/on est, nous sommes, vous êtes, ils/elles sont*.\n- Step 2: Negative wraps *ne ... pas* around the verb. *Ne* elides to *n'* only before a vowel sound.\n+ *je ne suis pas* (consonant → no elision)\n+ *tu n'es pas* (vowel → elision)\n+ *il/elle/on n'est pas* (vowel → elision)\n+ *nous ne sommes pas* (consonant → no elision)\n+ *vous n'êtes pas* (vowel → elision)\n+ *ils/elles ne sont pas* (consonant → no elision)\n\nNotice the pattern: elision happens with *es, est, êtes* (vowel starts) but not *suis, sommes, sont* (consonant starts).", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": true}, {"question": "In French, what is the conceptual difference between *un/une/des* and *du/de la/des* when ordering food? (3 steps)", "answer": "- Step 1: *Un/une/des* are **indefinite articles** — they refer to a countable, whole item. *Un chocolat* = one (whole) chocolate bar; *des chocolats* = some (countable) chocolates.\n- Step 2: *Du/de la/des* are **partitive articles** — they refer to an unspecified quantity of something uncountable (or treated as a mass). *Du chocolat* = some chocolate (a portion, not a whole bar).\n+ Masculine uncountable → *du* (e.g., *du café*, *du saumon*)\n+ Feminine uncountable → *de la* (e.g., *de la crème brûlée*)\n+ Plural → *des* (overlaps with indefinite plural)\n- Step 3: In context: *J'ai un chocolat* = I have a chocolate bar; *J'ai du chocolat* = I have some chocolate (substance). The choice signals whether you mean a discrete item or a mass/portion.\n\nTakeaway: English often hides this distinction (\"I have chocolate\"), but French forces you to mark countability.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "Why does French use *de la crème brûlée* and *du café* but *une carafe d'eau*? (3 steps)", "answer": "- Step 1: *Crème brûlée* and *café* are being referred to as a mass/substance — \"some crème brûlée,\" \"some coffee.\" These need partitive articles: *de la* (feminine), *du* (masculine).\n- Step 2: *Carafe* is a **countable container** — one carafe, two carafes. So we use the indefinite article *une carafe* (feminine).\n- Step 3: After *carafe*, we say *d'eau* (of water) — this is a **quantity expression**: a [container/measure] of [substance]. After expressions of quantity, French uses just *de* (or *d'* before a vowel), not *de la* or *du*.\n\nRule of thumb: partitive = unquantified mass; *de* alone = after a measure/container.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": true}, {"question": "How would you introduce yourself in French with name, age, city, and nationality? (4 steps)", "answer": "- Step 1: Name: *Je m'appelle [name]* — literally \"I call myself [name]\". The verb *s'appeler* is reflexive.\n- Step 2: Age: *J'ai [N] ans* — note that French uses *avoir* (to have), not *être* (to be), for age. Literally \"I have 25 years.\" Forgetting *ans* is a common mistake.\n- Step 3: Residence: *J'habite à [city]* — the verb *habiter* takes the preposition *à* with cities.\n- Step 4: Nationality: *Je suis [nationality]* — uses *être*; the adjective agrees with gender (e.g., *vietnamien* for masc., *vietnamienne* for fem.). Nationality adjectives are **not capitalized** in French.\n\nFull example: *Je m'appelle Phuc, j'ai 25 ans. J'habite à Paris et je suis vietnamien.*", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "Why does French say *J'ai 25 ans* instead of *Je suis 25 ans* for age?", "answer": "French treats age as something you **possess** (a quantity of years accumulated), not something you **are**. So the verb is *avoir* (to have), and the noun *ans* (years) is mandatory — you literally say \"I have 25 years.\" Dropping *ans* (*J'ai 25*) is ungrammatical and sounds incomplete. Many languages (Spanish *tengo*, Italian *ho*) share this logic; English is the outlier with \"to be.\"", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "What are three polite ways in French to say \"I would like to have...\" when ordering, and how do they differ in nuance? (3 steps)", "answer": "- Step 1: *Je voudrais...* — conditional of *vouloir* (to want). The most common, polite \"I would like.\" Standard restaurant register.\n- Step 2: *J'aimerais...* — conditional of *aimer* (to like/love). Slightly softer/warmer, \"I would love/like.\"\n- Step 3: *Je pourrais avoir...* — conditional of *pouvoir* (to be able). Literally \"Could I have...\" — even more tentative/polite, asking permission.\n\nAll three use the **conditional tense**, which is the key politeness marker in French — using the present (*je veux* = \"I want\") would sound rude in a restaurant.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "When ordering food in French, what's the difference between *s'il vous plaît* and *s'il te plaît*?", "answer": "Both mean \"please,\" but they reflect the formal/informal *vous/tu* distinction. *S'il vous plaît* uses *vous* — used with strangers, waiters, elders, anyone you'd address formally. *S'il te plaît* uses *te* — used with friends, family, children, peers. In a restaurant with a waiter you don't know, **always default to *s'il vous plaît***. Using *te* with a waiter would feel overly familiar or even disrespectful.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "How do you ask \"What is this?\" in French in a restaurant context, and how does the phrasing extend to \"What's in...?\"", "answer": "- Step 1: *Qu'est-ce que c'est?* (pronounced roughly \"keske se\") = \"What is this/that?\" Used to ask about a dish or item.\n+ Example: *Qu'est-ce que c'est, la salade niçoise?* = \"What is salade niçoise?\"\n- Step 2: *Qu'est-ce qu'il y a dans...?* = \"What is there in...?\" Used to ask about ingredients/contents.\n+ Example: *Qu'est-ce qu'il y a dans la soupe?* = \"What's in the soup?\"\n\nBoth start with *Qu'est-ce que/qu'* — a fixed interrogative chunk meaning \"what.\" The second uses *il y a* (\"there is/are\") + *dans* (\"in\").", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "What are the four French terms for steak cooking levels, from rarest to most cooked? (4 steps)", "answer": "- Step 1: *Bleu* — very rare, barely seared (literally \"blue\" — the meat looks bluish-red inside).\n- Step 2: *Saignant* — rare (literally \"bleeding\"; from *sang* = blood).\n- Step 3: *À point* — medium / medium-rare (literally \"to the point\"; the French default and what most French diners consider \"properly cooked\").\n- Step 4: *Bien cuit* — well-done (literally \"well cooked\").\n\nCultural note: ordering *bien cuit* in France is sometimes seen as ruining the meat — the French standard is *à point* or *saignant*.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": true}, {"question": "How do you politely ask for the bill in French in a restaurant?", "answer": "Two equivalent polite forms:\n- *Je pourrais avoir l'addition s'il vous plaît?* — \"Could I have the bill please?\" (conditional of *pouvoir*, declarative word order with rising intonation).\n- *Pourrais-je avoir l'addition s'il vous plaît?* — same meaning, but with **inversion** (verb-subject), which is more formal.\n\nYou can also just say *L'addition s'il vous plaît* or *La note s'il vous plaît* — shorter but still polite due to *s'il vous plaît*. Both *l'addition* and *la note* mean \"the bill\" (both feminine).", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "When a waiter asks *\"Vous avez une réservation?\"*, how do you answer affirmatively and negatively in French? (2 steps)", "answer": "- Step 1: Affirmative: *Oui, j'ai une réservation pour [N] personnes* — \"Yes, I have a reservation for [N] people.\" Notice *pour* (for) + number + *personnes*.\n- Step 2: Negative: *Non, je n'ai pas de réservation* — \"No, I don't have a reservation.\"\n+ Key rule: after a negation, *un/une/des* becomes ***de***. So *j'ai une réservation* → *je n'ai pas **de** réservation*. Saying *je n'ai pas une réservation* is grammatically wrong.\n\nThis \"*de* after negation\" rule is one of the most important French article rules.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "Why does *une* become *de* in the negative sentence *Je n'ai pas de réservation*? (3 steps)", "answer": "- Step 1: In French, after a negative verb, **indefinite and partitive articles collapse to *de*** (or *d'* before a vowel). So *un, une, des, du, de la* all become *de* in the negative.\n- Step 2: The logic: the negation expresses the absence of *any* quantity. French marks this absence with a single, neutral *de*, removing the article that suggested existence.\n+ *J'ai un livre* → *Je n'ai pas **de** livre*\n+ *J'ai du café* → *Je n'ai pas **de** café*\n+ *J'ai des amis* → *Je n'ai pas **d'**amis* (elision before vowel)\n- Step 3: Exception: this rule does NOT apply after *être*. *C'est un livre* → *Ce n'est pas un livre* (article stays). The rule is specifically for direct objects of negated verbs expressing possession/existence.\n\nTakeaway: negation erases quantity, so the article also collapses.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": true}, {"question": "In a restaurant, what does the waiter mean by *\"Est-ce que vous les voulez en même temps?\"* and how is it structured? (3 steps)", "answer": "- Step 1: Translation: \"Would you like them at the same time?\" — typically asked when you've ordered multiple courses, to clarify timing.\n- Step 2: Structure: *Est-ce que* + *vous* (subject) + *les* (direct object pronoun = \"them\") + *voulez* (verb, \"want\") + *en même temps* (\"at the same time\").\n- Step 3: The pronoun *les* sits **before** the verb in French — unlike English where \"them\" comes after. This pre-verbal pronoun placement is a core French syntactic pattern.\n\nSo the literal word order is \"Do you them want at-the-same-time?\"", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "What are the three ways to form a yes/no question in French, and how do they differ in register? (3 steps)", "answer": "- Step 1: **Intonation** — keep the declarative word order, raise the voice at the end. *Tu habites en Espagne?* This is the most informal and most common in spoken French.\n- Step 2: **Est-ce que** — add *Est-ce que* (or *Est-ce qu'* before a vowel) at the start. *Est-ce que tu habites en Espagne?* Neutral register, very common in both speech and writing.\n- Step 3: **Inversion** — swap verb and subject pronoun, joined by a hyphen. *Habites-tu en Espagne?* The most formal; primarily written or used in elevated speech.\n\nSame meaning across all three — only register/formality changes. A1 learners should master intonation and *est-ce que* first; inversion can wait.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "Convert the question *\"Tu parles français?\"* into the other two question forms. (2 steps)", "answer": "- Step 1: With *est-ce que*: *Est-ce que tu parles français?* — just prepend the chunk.\n- Step 2: With inversion: *Parles-tu français?* — swap verb (*parles*) and subject (*tu*), connect with a hyphen.\n\nAll three ask the same yes/no question; only formality changes (intonation = casual, *est-ce que* = neutral, inversion = formal/written).", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "Convert the formal question *\"Habitez-vous en Espagne?\"* into the intonation and *est-ce que* forms. (2 steps)", "answer": "- Step 1: Intonation form: *Vous habitez en Espagne?* — restore normal subject-verb order, ask with rising tone.\n- Step 2: *Est-ce que* form: *Est-ce que vous habitez en Espagne?* — prepend the question chunk to the declarative.\n\nNote: with inversion, the hyphen *Habitez-vous* signals the question; once we undo inversion, we lose the hyphen and return *vous* to its normal position before the verb.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "Why does French insert a hyphen in inversion questions like *Parles-tu français?* but not in *Est-ce que tu parles français?* (2 steps)", "answer": "- Step 1: In inversion, the verb and subject pronoun become a single rhythmic/grammatical unit — French marks this fusion with a hyphen (*Parles-tu*, *Habites-tu*, *Aimez-vous*). It also signals the inversion is grammatical, not just stylistic.\n- Step 2: In *est-ce que* questions, the subject and verb keep their normal order (*tu parles*), so there's no fusion and no hyphen. *Est-ce que* itself is treated as a question chunk added in front.\n\nBonus: in inversion, when a verb ends in a vowel and the pronoun *il/elle/on* follows, French inserts a euphonic *-t-* for pronunciation: *A-t-il une voiture?* (not *A-il*).", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": true}, {"question": "How do you make a restaurant reservation by phone in French — what's the typical exchange sequence? (5 steps)", "answer": "- Step 1: Greeting: *Bonsoir Madame/Monsieur* — match time of day (*bonjour* for daytime, *bonsoir* for evening).\n- Step 2: State purpose: when the host asks *C'est pour une réservation?*, confirm *Oui, pour ce soir* (or *pour demain*, etc.).\n- Step 3: Specify time: *à [heure] s'il vous plaît* — e.g., *à 19h30* spoken as *à sept heures et demie* (\"at seven-thirty\"; *demie* = half).\n- Step 4: Specify number of guests: when asked *Pour combien de personnes?*, answer *Pour [N] personnes s'il vous plaît*.\n- Step 5: Give phone number for confirmation when asked *Votre numéro de téléphone?* — read digits in two-digit groups (French convention). Close with *Merci beaucoup, au revoir!*\n\nKey politeness markers: always include *s'il vous plaît* and *merci beaucoup*.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "How are French phone numbers read aloud, and why does this matter for listening practice?", "answer": "- Step 1: French phone numbers have 10 digits, read in **five pairs of two-digit numbers** — not digit by digit like in English.\n+ Example: 06 78 65 67 87 = *zéro six, soixante-dix-huit, soixante-cinq, soixante-sept, quatre-vingt-sept*.\n- Step 2: This matters because numbers like 78 (*soixante-dix-huit* = \"sixty-eighteen\") and 87 (*quatre-vingt-sept* = \"four-twenties-seven\") require knowing the unusual French number system.\n- Step 3: Practical tip: practice listening to phone numbers in pairs and decoding 70s, 80s, 90s quickly — these are where most beginners stumble.\n\nThe pair-grouping convention is universal in France for phone numbers, dates, and addresses.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": true}, {"question": "How does French count from 70 to 99, and why is it unusual? (4 steps)", "answer": "- Step 1: 70 = *soixante-dix* — literally \"sixty-ten.\" French stops having a unique word at 60 (*soixante*) and builds up by addition.\n- Step 2: 71-79 = *soixante-et-onze, soixante-douze, ..., soixante-dix-neuf* — \"sixty-eleven, sixty-twelve, ..., sixty-nineteen.\"\n- Step 3: 80 = *quatre-vingts* — literally \"four-twenties\" (i.e., 4 × 20). This is a **vigesimal** (base-20) relic from old Celtic counting.\n+ Note: *quatre-vingts* has an *s* on its own, but loses the *s* when followed by another number: *quatre-vingt-un*.\n- Step 4: 90 = *quatre-vingt-dix* (four-twenties-ten); 91 = *quatre-vingt-onze*, ..., 99 = *quatre-vingt-dix-neuf*.\n\nWhy it matters: Belgian and Swiss French often use *septante* (70), *huitante/octante* (80), *nonante* (90) — these are logically simpler. But mainland France keeps the historic base-20 system, so learners must memorize the additive logic.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": true}, {"question": "What's the difference between *soixante-et-un* and *quatre-vingt-un*? Why does one have *et* and not the other?", "answer": "- Step 1: In French, the conjunction *et* (\"and\") is inserted between the tens word and *un* (1) for 21, 31, 41, 51, 61, and 71 — e.g., *vingt-et-un, trente-et-un, ..., soixante-et-onze*.\n- Step 2: However, 81 = *quatre-vingt-un* and 91 = *quatre-vingt-onze* — **no *et*** and **no hyphen between the *et***.\n- Step 3: Reason: the *et* pattern follows the historic base-10 logic of older French numbers (21, 31, ..., 61). The 80s/90s, being base-20 constructions (*quatre-vingts* = 4 × 20), don't follow this pattern.\n\nSo: *vingt-et-un* but *quatre-vingt-un* — a tiny but commonly tested distinction.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": true}, {"question": "Why is the adjective in *C'est beau* masculine even when referring to something feminine like *la fleur*?", "answer": "- Step 1: After the impersonal *c'est* (\"it is\"), the adjective is **always masculine singular** by default, regardless of what is being described.\n- Step 2: This is because *c'* is a neuter/impersonal pronoun — it doesn't carry gender, so the adjective has nothing to agree with and defaults to masculine.\n+ *C'est beau!* (It's beautiful — referring to anything)\n+ But: *La fleur est belle* (The flower is beautiful — *belle* agrees with feminine *fleur*)\n- Step 3: Contrast: when the subject is a specific noun (*La réunion est urgente*), the adjective agrees with that noun's gender and number (*urgente* = feminine).\n\nRule: *c'est* + masculine adjective, always. *[Noun] est* + agreed adjective.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": true}, {"question": "What are the seven days of the week in French, and what's a key writing convention? (2 steps)", "answer": "- Step 1: *lundi, mardi, mercredi, jeudi, vendredi, samedi, dimanche* — Monday through Sunday.\n- Step 2: Writing convention: **days of the week are NOT capitalized** in French (unlike English). Write *lundi*, not *Lundi*, in the middle of a sentence. Same applies to months and nationality adjectives.\n\nMnemonic: most weekday names end in *-di*, derived from Latin *dies* (day). *Dimanche* (Sunday) is the outlier — from Latin *dies dominicus* (Lord's day).", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "What are the twelve months and four seasons in French, and what's the capitalization rule?", "answer": "- Step 1: Months: *janvier, février, mars, avril, mai, juin, juillet, août, septembre, octobre, novembre, décembre*.\n- Step 2: Seasons: *le printemps* (spring), *l'été* (summer), *l'automne* (autumn), *l'hiver* (winter).\n- Step 3: Like days of the week, **months and seasons are not capitalized** in French. Write *en mars*, *en été*, not *en Mars*, *en Été*.\n\nNote: seasons take the definite article (*le, l'*) by default, and use *en* (or *au* for *printemps*: *au printemps*) when saying \"in [season].\"", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": false}, {"question": "Why does French say *en terrasse* (no article) but *à l'intérieur* (with article) for seating preferences? (2 steps)", "answer": "- Step 1: *En* is often used with locations as a fixed expression where no article is needed — it conveys a general \"in/on\" sense. *En terrasse* = \"on the terrace\" (general location category).\n- Step 2: *À l'intérieur* uses *à* + definite article *l'* (elided before vowel) — literally \"at the interior.\" Here French treats *l'intérieur* as a specific noun needing an article.\n\nThis is a quirk of French prepositions: *en* often drops articles (*en France*, *en voiture*, *en terrasse*), while *à* keeps them (*à la maison*, *à l'école*, *à l'intérieur*).", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": true}, {"question": "What's the conceptual difference between *Je vais prendre...* and *Je voudrais...* when ordering? (2 steps)", "answer": "- Step 1: *Je vais prendre...* = \"I'm going to take...\" — uses the **futur proche** (near future): *aller* (to go) conjugated + infinitive. It's a decisive statement of choice — slightly more direct.\n- Step 2: *Je voudrais...* = \"I would like...\" — uses the **conditional** of *vouloir*. It's a softer, more polite request.\n\nBoth are acceptable in restaurants; *je voudrais* leans slightly more formal/polite, while *je vais prendre* sounds more like making a confident choice. French waiters accept both equally.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "In the sentence *Je vais à la gym quatre fois par semaine*, what's the structure for expressing frequency? (3 steps)", "answer": "- Step 1: *[Number] fois* = \"[number] times.\" *Fois* is a feminine noun meaning \"occurrence/time.\"\n- Step 2: *par* = \"per/by\" — used for distribution: *par jour* (per day), *par semaine* (per week), *par mois* (per month), *par an* (per year).\n- Step 3: Full pattern: *[number] fois par [time unit]*. Example: *trois fois par jour* (three times a day), *deux fois par mois* (twice a month).\n\nNote: *par* with no article — never *par la semaine*. This is a fixed frequency construction.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "When asked *\"Quels sont tes loisirs?\"*, what does this mean and how would you answer?", "answer": "- Step 1: Translation: \"What are your hobbies?\" *Loisirs* (masculine plural) = leisure activities, hobbies. *Quels* agrees with the masculine plural noun.\n- Step 2: Answer pattern: *J'adore [le/la/les noun]* or *J'aime [...]*. With *aimer/adorer*, use the **definite article** for general likes.\n+ Example: *J'adore le sport, les films et la musique* — \"I love sports, films, and music.\"\n- Step 3: Why definite article? Because you're talking about these categories *in general*, not specific instances. *J'aime le café* = \"I like coffee (in general),\" not \"I like a coffee.\"\n\nThis is a major contrast with English, which uses no article for general likes.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "Why do we say *J'adore le sport* but *Je fais du sport*? (3 steps)", "answer": "- Step 1: *J'adore le sport* — verbs of preference (*aimer, adorer, détester, préférer*) take the **definite article** because they refer to the category in general. \"I love sports (the concept/category).\"\n- Step 2: *Je fais du sport* — verbs of activity/practice take the **partitive article** because you're doing *some* of it, not all of it. \"I do some sport (some amount of sporting activity).\"\n- Step 3: This generalizes: *J'adore le café* (I love coffee in general) vs *Je bois du café* (I drink some coffee).\n\nRule: preference verbs → definite article (le/la/les); consumption/activity verbs → partitive (du/de la/des).", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": true}, {"question": "A waiter says *\"Quelle cuisson pour la viande, Monsieur?\"* — what is being asked, and what does *cuisson* mean? (2 steps)", "answer": "- Step 1: Translation: \"Which cooking [doneness] for the meat, sir?\" *Cuisson* (feminine) = the cooking degree/doneness of meat.\n- Step 2: Expected answer: choose from *bleu, saignant, à point, bien cuit* (rare → well-done). Reply pattern: *[doneness] s'il vous plaît* or *Une entrecôte saignante, s'il vous plaît*.\n\nNote: the adjective agrees with the meat. *Une entrecôte saignante* (feminine *entrecôte*) but *un steak saignant* (masculine *steak*).", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "What's the difference between *suivez-moi* and *installez-vous* when a waiter greets you? (2 steps)", "answer": "- Step 1: *Suivez-moi* = \"Follow me\" — imperative of *suivre* (to follow) + *moi* (me). The waiter is guiding you to the table.\n- Step 2: *Installez-vous* = \"Get settled / make yourselves comfortable\" — imperative of the reflexive verb *s'installer*. The waiter is inviting you to sit and settle in.\n+ Note the pronoun placement: in affirmative imperatives, the pronoun comes **after** the verb with a hyphen. With reflexives, *te* becomes *toi* and *vous* stays *vous*.\n\nSo the sequence: *Bonjour, suivez-moi s'il vous plaît* (greeting + lead) → *Installez-vous* (sit down comfortably).", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "Translate and explain: *\"Je reviens tout de suite.\"*", "answer": "Translation: \"I'll be right back\" / \"I'm coming back right away.\" Breakdown: *Je reviens* = \"I return/come back\" (present of *revenir*, used here with future meaning — French present often covers near future). *Tout de suite* = \"right away/immediately\" (a fixed adverbial expression; literally \"all of following\"). Waiters say this when stepping away briefly. The whole phrase is a courtesy formula.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "What does *\"Avez-vous fait votre choix?\"* mean, and what tense is being used? (2 steps)", "answer": "- Step 1: Translation: \"Have you made your choice?\" — the waiter is asking if you're ready to order.\n- Step 2: Tense: **passé composé** (compound past). Structure: *avoir* conjugated + past participle. Here, *avez* (you have) + *fait* (made, past participle of *faire*) = \"you have made.\"\n+ Equivalent simpler version: *Avez-vous choisi?* — using *choisir* (to choose), past participle *choisi*.\n\nThe inversion (*Avez-vous*) marks it as a formal question. A more casual version would be *Vous avez fait votre choix?* with intonation.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "In the sentence *Il y a*, what does it mean and how does it change in questions and negatives? (3 steps)", "answer": "- Step 1: *Il y a* = \"there is / there are\" — an invariable, impersonal expression. Works for both singular and plural objects: *il y a un chat* / *il y a des chats*.\n- Step 2: Negative: *Il n'y a pas de...* — wrap with *ne...pas*, and the article collapses to *de* (article-collapse rule). *Il n'y a pas de problème* = \"There is no problem.\"\n- Step 3: Question: *Qu'est-ce qu'il y a dans...?* = \"What is there in...?\" Used to ask about contents/ingredients.\n\n*Il y a* is one of the most useful French structures — memorize it as a frozen chunk.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "Why do we say *Non, il n'y a pas de problème* instead of *Non, il n'y a pas un problème*?", "answer": "This is another application of the **article-collapse rule** under negation. In the affirmative, you'd say *Il y a un problème* (with *un*). When negated, *un* collapses to *de*: *Il n'y a pas **de** problème*. The negative expresses the absence of *any* problem, so French uses the neutral *de* instead of *un*. Saying *pas un problème* is grammatically wrong here. Same pattern as *je n'ai pas de réservation*.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "What's the difference between *au revoir*, *à bientôt*, and *à très vite*? (3 steps)", "answer": "- Step 1: *Au revoir* = \"goodbye\" — the standard farewell, neutral, used in all contexts.\n- Step 2: *À bientôt* = \"see you soon\" — implies you'll meet again in the foreseeable future. Lighter than *au revoir*.\n- Step 3: *À très vite* = \"see you very soon\" — literally \"to very quickly\"; expresses a sooner/eager reunion than *à bientôt*.\n\nPattern: *à* + time expression often forms farewells: *à demain* (see you tomorrow), *à lundi* (see you Monday), *à ce soir* (see you tonight).", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": false}, {"question": "What does *à ce soir* mean and when would a restaurant host say it? (2 steps)", "answer": "- Step 1: *À ce soir* literally = \"to this evening\" → idiomatically \"see you tonight\" / \"until tonight.\"\n- Step 2: A restaurant host says it at the end of a reservation phone call, confirming that you'll see them later that same evening. It's both a farewell and an implicit reminder of the appointment.\n\nThe pattern *à [time/day]* always means \"until [time]\" / \"see you [time]\" — a useful, productive French farewell template.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": true}, {"question": "Build the numbers 1 through 10 in French and identify any pronunciation traps. (3 steps)", "answer": "- Step 1: 1-5: *un, deux, trois, quatre, cinq* — all reasonably regular.\n- Step 2: 6-10: *six, sept, huit, neuf, dix*. Pronunciation traps:\n+ *six* — pronounced \"siss\" when alone or final; \"see\" before a consonant; \"seez\" before a vowel (liaison).\n+ *sept* — pronounced \"set\" (silent *p*).\n+ *dix* — same liaison pattern as *six*: \"diss\" alone, \"dee\" before consonant, \"deez\" before vowel.\n- Step 3: 11-16 are unique words (*onze, douze, treize, quatorze, quinze, seize*), then 17-19 switch to additive (*dix-sept, dix-huit, dix-neuf*).\n\nTraps: *six*/*dix* are highly context-dependent in pronunciation — listening practice is essential.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "What's the gender pattern in *Il a un café* vs *Elle a une assiette*? Why does this matter? (3 steps)", "answer": "- Step 1: French nouns have grammatical gender — every noun is either masculine or feminine. *Café* is masculine (*un café*); *assiette* is feminine (*une assiette*).\n- Step 2: The article must agree: *un* for masculine singular, *une* for feminine singular. Same noun in plural takes *des* regardless of gender (*des cafés*, *des assiettes*).\n- Step 3: Why it matters: gender controls **article choice** (*un/une*, *le/la*, *du/de la*), **adjective agreement** (*un saumon grillé* vs *une viande grillée*), and **pronoun choice** (*il* vs *elle* for things).\n\nThere are tendencies (e.g., nouns ending in *-tion* are usually feminine) but no fully reliable rule — gender must be memorized with each noun.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "Why do we say *un saumon grillé* but would say *une viande grillée*? (2 steps)", "answer": "- Step 1: *Saumon* is masculine, so *grillé* (past participle / adjective) stays in its masculine singular form.\n- Step 2: *Viande* is feminine, so the adjective must agree by adding *-e*: *grillée*. In speech, *grillé* and *grillée* sound identical (the *-e* is silent), but in writing the agreement is mandatory.\n+ Plural: *des saumons grillés* (add *-s*), *des viandes grillées* (add *-es*).\n\nRule: adjectives in French agree in gender AND number with the noun they modify — even when pronunciation doesn't change.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": true}, {"question": "How do you answer the question *\"À quelle heure?\"* with \"at 7:30 PM\" in French?", "answer": "- Step 1: French uses 24-hour time officially: *à 19h30* (written) → spoken as *à dix-neuf heures trente* in formal contexts.\n- Step 2: Conversational form: *à sept heures et demie du soir* — \"at seven and a half (hours) of the evening.\" *Et demie* = \"and a half.\" *Du soir* clarifies PM.\n+ Note: *demie* takes feminine *e* because it agrees with *heure* (feminine).\n- Step 3: Other useful time expressions:\n+ *et quart* = \"and a quarter\" (e.g., *sept heures et quart* = 7:15)\n+ *moins le quart* = \"minus a quarter\" (e.g., *huit heures moins le quart* = 7:45)\n+ *midi* = noon, *minuit* = midnight (no *heures* added)", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": true}, {"question": "Why is the answer to *\"Tu travailles dans quoi?\"* something like *Je suis ingénieur* — without an article? (3 steps)", "answer": "- Step 1: When stating a profession with *être* (to be), French **drops the indefinite article** in most cases: *Je suis ingénieur*, *Elle est médecin*, *Il est professeur*.\n- Step 2: This is because the profession functions as an adjective-like attribute, not a countable noun in this construction. English says \"I am an engineer\" (with article); French treats the role more like a property.\n- Step 3: Exception: if the profession is **modified by an adjective**, the article returns. *Je suis un bon ingénieur* (I am a good engineer) — with *un* because *bon* makes it more noun-like.\n\nRule: bare profession after *être* = no article; modified profession = with article.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": true}, {"question": "Form a yes/no question from the statement *\"Vous regardez la télévision le soir\"* using all three question types. (3 steps)", "answer": "- Step 1: Intonation: *Vous regardez la télévision le soir?* — declarative order, rising intonation.\n- Step 2: *Est-ce que*: *Est-ce que vous regardez la télévision le soir?* — prepend the question chunk.\n- Step 3: Inversion: *Regardez-vous la télévision le soir?* — swap verb and subject, hyphenate.\n\nAll three ask \"Do you watch TV in the evening?\" — same meaning, ascending formality.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": false}, {"question": "Why is *le soir* used in *\"Vous regardez la télévision le soir?\"* — what does the definite article do here? (2 steps)", "answer": "- Step 1: *Le soir* with the definite article means \"in the evenings\" / \"every evening\" — expressing a **habitual/general time**, not one specific evening.\n- Step 2: Compare:\n+ *Le soir, je lis* = \"In the evenings (habitually), I read.\"\n+ *Ce soir, je lis* = \"Tonight (this specific evening), I read.\"\n\nRule: French uses the definite article (*le matin, le soir, le lundi*) to express habitual recurrence — a use that has no direct English equivalent (English uses \"in the mornings\" or just \"on Mondays\").", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": true}, {"question": "Synthesize: When ordering a \"saumon grillé\" with \"une carafe d'eau\" and a \"crème brûlée\" — what mix of articles do you use and why? (3 steps)", "answer": "- Step 1: *Un saumon grillé* — countable dish (one portion = one item), masculine → indefinite article *un*. Adjective *grillé* stays masculine.\n- Step 2: *Une carafe d'eau* — *carafe* is a countable container, feminine → *une*. After the quantity expression *carafe*, water is in *de* form (just *d'* before vowel): *d'eau*. Not *de l'eau* because we're after a measure word.\n- Step 3: *Une crème brûlée* (one portion) OR *de la crème brûlée* (some crème brûlée, as a substance) — both possible. *Une* if you're ordering one whole serving; *de la* if treating it as a mass/portion.\n\nTakeaway: article choice tracks the **countability/specificity** of what you're referring to — a discrete portion vs. a substance/mass.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": false}, {"question": "Mini exercise: Order in French: \"I would like a salmon, well done please, and the bill at the end.\" Walk through the choice of words. (3 steps)", "answer": "- Step 1: \"I would like\" = *Je voudrais* (polite conditional of *vouloir*). Don't use *je veux* (rude in restaurant).\n- Step 2: \"a salmon, well done\" = *un saumon bien cuit*. *Un* for masculine countable; *bien cuit* is the doneness adjective (masculine to agree with *saumon*). Note: *bien cuit* is more typically used for steak, but the structure is the same.\n- Step 3: \"and the bill at the end\" = *et l'addition à la fin*, *s'il vous plaît*. Full sentence: *Je voudrais un saumon bien cuit, et l'addition à la fin, s'il vous plaît.*\n\nPractical note: French waiters usually don't bring the bill until you ask — so requesting it explicitly is essential.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": false}, {"question": "Why do French numbers like 21 use *vingt-et-un* with *et*, but plural numbers like 22 use *vingt-deux* without *et*?", "answer": "- Step 1: *Et* (and) is inserted only before *un* in compound tens numbers: 21, 31, 41, 51, 61, 71 — to smooth the transition between the tens word and *un*.\n- Step 2: For other units (2-9), French simply juxtaposes with a hyphen: *vingt-deux, vingt-trois, ..., vingt-neuf* — no *et*.\n- Step 3: The reason is historic/euphonic — *un* (one) was treated as a special unit warranting the conjunction, mirroring older Latin/Romance patterns. Other units didn't.\n\nExceptions: 81 and 91 (*quatre-vingt-un*, *quatre-vingt-onze*) — no *et*, because they're base-20 constructions, not base-10.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": false}, {"question": "Compare *Je suis ingénieur dans l'intelligence artificielle* vs *Je suis un ingénieur en intelligence artificielle*. Are both correct? (3 steps)", "answer": "- Step 1: *Je suis ingénieur dans l'intelligence artificielle* — uses *dans* + definite article *l'* before the field. Acceptable but slightly less idiomatic.\n- Step 2: *Je suis ingénieur en intelligence artificielle* — uses *en* with no article. More idiomatic for naming a field of work/study (*en informatique*, *en physique*, *en biologie*).\n- Step 3: No article before the profession (*ingénieur*) because of the rule: after *être*, bare profession. Adding *un* would require an adjective: *Je suis un excellent ingénieur*.\n\nBest practice: *Je suis ingénieur en intelligence artificielle* — natural French phrasing for naming a specialty.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": true}, {"question": "What's the CEFR ladder A1 → A2 → B1 → B2 in plain English, and what's the official French target for naturalisation? (5 steps)", "answer": "- Step 1: **A1** — basic survival: introduce yourself, fill forms, ask simple questions, handle very basic transactions.\n- Step 2: **A2** — everyday routines: shops, transport, simple past events, directions, personal letters.\n- Step 3: **B1** — independent daily life: handle travel problems, express opinions with reasons, understand news main points.\n- Step 4: **B2** — serious independent French: defend opinions, argue, understand complex content, fluent participation.\n- Step 5: **Official target for French naturalisation** = **B2** (oral AND written), per Service-Public. This is the practical \"finish line\" for someone planning long-term life in France.\n\nLower thresholds: A2 for *carte de séjour pluriannuelle*, B1 for *carte de résident*, B2 for nationality.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": false}, {"question": "Roughly how many guided study hours does it take to go from A1 to B2 in French, and why does the count grow at each level? (3 steps)", "answer": "- Step 1: Per Campus Langues (FLE school) estimates: A1→A2 ≈ 100-120 h, A2→B1 ≈ 180-200 h, B1→B2 ≈ 200-250 h. Cumulative A1→B2 ≈ 480-570 h (or ~630 h with a 20% exam-ready buffer).\n- Step 2: Why the hours grow: each level demands more **breadth of vocabulary**, more **grammatical complexity** (subjunctive, conditional, advanced tenses), and more **output reliability** (sustained speaking/writing).\n- Step 3: B1→B2 is the longest jump because B2 requires not just understanding but **producing** coherent argumentation — flipping from passive recognition to active expression, which takes far more practice.\n\nTakeaway: B2 is roughly 4-5x the work of A2; the higher you climb, the steeper the input-to-output conversion becomes.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": false}, {"question": "Why is \"school-only\" study (2 lessons/week, no homework) too slow to reach B2 in a reasonable time? (3 steps)", "answer": "- Step 1: 2 lessons × 90 min = 3 h/week of guided input. To reach B2 (~630 h total), that's 630 ÷ 3 ≈ 210 weeks ≈ 4+ years of pure class time.\n- Step 2: But class time alone doesn't consolidate memory — you also need **active recall** (vocabulary review, spaced repetition) and **output practice** (speaking, writing) outside class.\n- Step 3: Adding even 20-30 min/day of review cuts the timeline roughly in half because consolidation accelerates retention massively. The U.S. Foreign Service data confirms: ~23 h/week of class + ~17 h/week of self-study reaches ILR 3 (B2-ish) in ~30 weeks. High weekly hours = fast results.\n\nRule: school-only is *insufficient*; deliberate after-lesson + daily practice is what compresses the timeline.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": true}], "count": 53}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "In French, when do you say \"J'ai un chocolat\" versus \"J'ai du chocolat\"? What conceptual distinction does this capture? (3 steps)", "answer": "- Step 1: $$un/une$$ is the indefinite article — it points to **one countable unit** of something. $$J'ai\\ un\\ chocolat$$ = \"I have one chocolate (a single piece, like a bonbon).\"\n- Step 2: $$du/de\\ la/des$$ is the **partitive article** — it means \"some\" of an uncountable / mass quantity. $$J'ai\\ du\\ chocolat$$ = \"I have some chocolate (an unspecified amount, like a chunk of a bar).\"\n+ $$du$$ before masculine nouns ($$du\\ café$$, $$du\\ saumon$$)\n+ $$de\\ la$$ before feminine nouns ($$de\\ la\\ crème\\ brûlée$$)\n+ $$des$$ for plural ($$des\\ chocolats$$ = several chocolates)\n- Step 3: The choice reflects how you mentally frame the noun: as a discrete object you can count, or as a substance/mass you can portion. English hides this with \"some\" being optional (\"I have chocolate\"), but French forces the speaker to commit.\n\nTakeaway: French articles encode whether you're thinking *units* or *substance*.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": true}, {"question": "Conjugate $$avoir$$ (to have) in the present tense for all six subjects, and explain why this verb is worth memorising before almost any other.", "answer": "- Step 1: The forms are:\n+ $$j'ai$$ (I have)\n+ $$tu\\ as$$ (you have, informal singular)\n+ $$il/elle/on\\ a$$ (he/she/one has)\n+ $$nous\\ avons$$ (we have)\n+ $$vous\\ avez$$ (you have, formal or plural)\n+ $$ils/elles\\ ont$$ (they have)\n- Step 2: Notice the spelling pattern: the stem looks irregular ($$ai, as, a, avons, avez, ont$$) — this is a sign of a high-frequency, ancient verb that has worn down through use, just like English \"to be\" (am/is/are).\n- Step 3: $$avoir$$ matters disproportionately because it is also the main **auxiliary verb** for forming past tenses (e.g., $$j'ai\\ mangé$$ = \"I have eaten / I ate\"). Mastering it now unlocks past tense later.\n\nTakeaway: $$avoir$$ is both a meaning-verb (\"to have\") and a grammatical tool — double leverage.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "How do you make $$avoir$$ negative in the present tense for each subject, and what's the universal pattern? (2 steps)", "answer": "- Step 1: French negation sandwiches the verb between $$ne$$ ... $$pas$$:\n+ $$je\\ n'ai\\ pas$$\n+ $$tu\\ n'as\\ pas$$\n+ $$il/elle/on\\ n'a\\ pas$$\n+ $$nous\\ n'avons\\ pas$$\n+ $$vous\\ n'avez\\ pas$$\n+ $$ils/elles\\ n'ont\\ pas$$\n- Step 2: Because $$avoir$$ starts with a vowel sound, $$ne$$ becomes $$n'$$ via elision — this is automatic in French whenever a short word ending in $$-e$$ meets a vowel-initial word. Without elision, you'd be saying \"ne ai\" which is unpronounceable in fluent French.\n\nTakeaway: Negation = $$ne\\ ...\\ pas$$ around the verb; elide $$ne \\to n'$$ before vowels.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "A French native asks \"Tu travailles dans quoi?\" How would you answer if you're an AI engineer, and what does the structure of the question literally translate to? (2 steps)", "answer": "- Step 1: Literal breakdown: $$tu\\ travailles$$ = \"you work\", $$dans\\ quoi$$ = \"in what\". So literally \"You work in what?\" — French keeps the question word at the end in casual speech (intonation-based questioning).\n- Step 2: A natural answer: $$Je\\ suis\\ ingénieur\\ dans\\ l'intelligence\\ artificielle$$ — \"I am an engineer in artificial intelligence.\" Note: no article before $$ingénieur$$ because professions after $$être$$ behave like adjectives in French ($$Je\\ suis\\ étudiant$$, not $$un\\ étudiant$$).\n\nTakeaway: Dropping the article before professions with $$être$$ is a core French quirk.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "What are the three ways to ask a yes/no question in French, ranked from most casual to most formal? Give the same question (\"Do you speak French?\") in all three. (3 steps)", "answer": "- Step 1: **Intonation** (most casual, spoken): keep the statement, raise the voice at the end. $$Tu\\ parles\\ français\\ ?$$\n- Step 2: **Est-ce que** (neutral, very common in speech and writing): prepend $$Est\\text{-}ce\\ que$$ to the statement. $$Est\\text{-}ce\\ que\\ tu\\ parles\\ français\\ ?$$\n- Step 3: **Inversion** (formal, mostly written): swap verb and subject pronoun with a hyphen. $$Parles\\text{-}tu\\ français\\ ?$$\n\nTakeaway: All three carry identical meaning; register changes with social setting (chatting with friends vs. writing an email vs. formal interview).", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": true}, {"question": "Why does $$Est\\text{-}ce\\ que$$ exist if intonation already works? What problem does it solve? (2 steps)", "answer": "- Step 1: Intonation works in speech because the voice signals \"question\". But in **writing**, or in a **noisy environment**, or when the speaker is **not a confident voice user** (foreign learner, child), intonation alone is ambiguous — the sentence looks like a statement.\n- Step 2: $$Est\\text{-}ce\\ que$$ is a **grammatical marker** that flags \"question coming\" without requiring inversion (which is harder and more formal). It's the safe middle option — universally understood, no inversion gymnastics, works in writing.\n\nTakeaway: $$Est\\text{-}ce\\ que$$ = the all-purpose \"question switch\" that doesn't depend on voice.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "What's the difference between $$s'il\\ vous\\ plaît$$ and $$s'il\\ te\\ plaît$$, and what literal structure do they share?", "answer": "Both literally mean \"if it pleases you\" — a politeness formula. The split is the **pronoun**: $$vous$$ is formal/plural (\"you, sir/madam\" or \"you all\"), while $$te$$ is informal singular (\"you, friend\"). So $$s'il\\ vous\\ plaît$$ is what you say to a waiter, a stranger, or your teacher; $$s'il\\ te\\ plaît$$ is what you say to a friend or a child. The structure reveals a piece of French politeness philosophy: rather than barking a request, you frame it conditionally — \"*if* it would please you\" — leaving the other person the dignity of agreeing.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": true}, {"question": "A waiter asks \"Quelle cuisson pour la viande?\" — what are the four standard answers from rarest to most cooked, and what do they literally evoke? (4 steps)", "answer": "- Step 1: $$bleu$$ — \"blue\", very rare. Almost raw inside, just seared outside. The name comes from the bluish tint of nearly raw beef.\n- Step 2: $$saignant$$ — literally \"bleeding\", rare. Red and juicy inside.\n- Step 3: $$à\\ point$$ — \"to the point\", medium. The classic French ideal — perfectly done, not overcooked.\n- Step 4: $$bien\\ cuit$$ — \"well cooked\", well done. Often considered a culinary insult in France because it kills the texture.\n\nTakeaway: French meat vocabulary is *visual and visceral* — bleu/saignant describe color and blood, not abstract scales.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "What's the conceptual difference between $$Je\\ voudrais$$, $$Je\\ vais\\ prendre$$, and $$Je\\ pourrais\\ avoir$$ when ordering at a restaurant? Are they interchangeable? (3 steps)", "answer": "- Step 1: $$Je\\ voudrais$$ = \"I would like\" (conditional of $$vouloir$$). Polite, classic, slightly soft. The conditional mood makes it less demanding than \"I want\".\n- Step 2: $$Je\\ vais\\ prendre$$ = \"I'm going to take/have\" (near-future tense). More decisive — you've made up your mind and are announcing the choice.\n- Step 3: $$Je\\ pourrais\\ avoir$$ = \"Could I have\" (conditional of $$pouvoir$$). The most deferential — you're literally asking permission.\n\nThey are largely interchangeable in restaurants, but they signal subtle differences in attitude: $$voudrais$$ = polite preference, $$vais\\ prendre$$ = decisive, $$pourrais\\ avoir$$ = humble request.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": true}, {"question": "Why do French numbers from 70-99 feel \"weird\" to English speakers? Walk through the logic with 70, 80, and 90. (3 steps)", "answer": "- Step 1: $$70 = soixante\\text{-}dix$$ — literally \"sixty-ten\". French stops having dedicated number-words after 60 and starts doing arithmetic out loud.\n- Step 2: $$80 = quatre\\text{-}vingts$$ — literally \"four-twenties\" ($$4 \\times 20$$). This is a leftover from an old **base-20 (vigesimal)** counting system used in medieval France.\n- Step 3: $$90 = quatre\\text{-}vingt\\text{-}dix$$ — \"four-twenties-ten\" ($$4 \\times 20 + 10$$). And $$91 = quatre\\text{-}vingt\\text{-}onze$$ (\"four-twenties-eleven\").\n\nTakeaway: French preserves a fossil of base-20 counting from the past — Belgian and Swiss French actually use cleaner forms like $$septante$$ (70) and $$nonante$$ (90), proving the awkwardness is a Parisian quirk, not a CEFR necessity.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": true}, {"question": "Conjugate $$être$$ (to be) in both positive and negative present forms, and explain why elision differs from $$avoir$$. (3 steps)", "answer": "- Step 1: Positive: $$je\\ suis,\\ tu\\ es,\\ il/elle/on\\ est,\\ nous\\ sommes,\\ vous\\ êtes,\\ ils/elles\\ sont$$.\n- Step 2: Negative: $$je\\ ne\\ suis\\ pas,\\ tu\\ n'es\\ pas,\\ il/elle/on\\ n'est\\ pas,\\ nous\\ ne\\ sommes\\ pas,\\ vous\\ n'êtes\\ pas,\\ ils/elles\\ ne\\ sont\\ pas$$.\n- Step 3: Elision rule: $$ne \\to n'$$ only when the **next verb form starts with a vowel sound**. So $$tu\\ es \\to tu\\ n'es\\ pas$$ (vowel), but $$je\\ suis \\to je\\ ne\\ suis\\ pas$$ (consonant $$s$$, no elision). With $$avoir$$, every form starts with a vowel, so $$ne$$ always elides — with $$être$$, only some forms do.\n\nTakeaway: Elision tracks **sound**, not spelling — it's a phonetic smoothness rule.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "Why does French say \"C'est beau\" even when describing a feminine noun, like \"la voiture, c'es
