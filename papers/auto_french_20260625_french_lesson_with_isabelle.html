t beau\"? (2 steps)", "answer": "- Step 1: After $$c'est$$ (\"it is\" / \"that is\"), the adjective **defaults to the masculine singular form**, regardless of what noun was discussed. This is because $$ce$$ is a **neutral/abstract pronoun** — it refers to a situation or idea, not a specific gendered noun.\n- Step 2: Compare: $$La\\ voiture\\ est\\ belle$$ (the car is beautiful — feminine agreement, $$belle$$) vs. $$La\\ voiture,\\ c'est\\ beau$$ (the car, that's a beautiful thing — masculine default, $$beau$$). The second sentence is making a general comment about the *concept*, not directly describing the noun.\n\nTakeaway: $$c'est + adj$$ uses masculine because $$ce$$ refers to an idea, not a gendered thing.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": true}, {"question": "How do you ask \"What is this?\" in French, and how does the structure decompose? (3 steps)", "answer": "- Step 1: $$Qu'est\\text{-}ce\\ que\\ c'est\\ ?$$ — pronounced something like \"kes-kuh-say\".\n- Step 2: Literal decomposition: $$Que$$ (\"what\") + $$est\\text{-}ce$$ (\"is it\" — inversion of $$c'est$$) + $$que$$ (\"that\") + $$c'est$$ (\"it is\"). Roughly: \"What is it that it is?\"\n- Step 3: Yes, the structure is redundant — French stacked a question marker ($$est\\text{-}ce$$) onto another statement ($$c'est$$) to make the question unmistakable. Native speakers no longer feel the redundancy; it's a frozen formula.\n\nTakeaway: $$Qu'est\\text{-}ce\\ que\\ c'est\\ ?$$ is a fossilised double-question construction — just memorise the chunk.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": true}, {"question": "In numbers like $$21, 31, 41 \\dots 61$$, why is there an $$et$$ (\"and\") — $$vingt\\text{-}et\\text{-}un$$ — but no $$et$$ in $$22, 32, 42$$? (2 steps)", "answer": "- Step 1: French inserts $$et$$ (\"and\") specifically before $$un$$ (1) in compound numbers 21–61: $$vingt\\text{-}et\\text{-}un, trente\\text{-}et\\text{-}un, quarante\\text{-}et\\text{-}un, cinquante\\text{-}et\\text{-}un, soixante\\text{-}et\\text{-}un$$. For all other compounds, no $$et$$: $$vingt\\text{-}deux, trente\\text{-}trois, quarante\\text{-}quatre$$.\n- Step 2: Why? Historically, ending in \"1\" was felt as a clean round addition (\"twenty *and* one\"), worthy of a connector. With other numbers, the unit just attaches directly. **Exception**: 71 = $$soixante\\text{-}et\\text{-}onze$$ (because it's really 60+11, treated like the \"+1\" pattern), but 81 and 91 drop the $$et$$ ($$quatre\\text{-}vingt\\text{-}un$$) because they're already complex base-20 chunks.\n\nTakeaway: The $$et$$ flags \"+1\" addition in the simpler decimal numbers but disappears in the base-20 zone.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "What's the difference between $$un/une/des$$ and $$du/de\\ la/des$$? (3 steps)", "answer": "- Step 1: $$un, une, des$$ = **indefinite articles**, used for **countable** items. They answer \"how many?\" with a unit. $$J'ai\\ une\\ pomme$$ = \"I have one apple\".\n- Step 2: $$du, de\\ la, des$$ = **partitive articles**, used for **uncountable/mass** quantities or portions. They answer \"how much?\" with an unspecified amount. $$J'ai\\ du\\ pain$$ = \"I have some bread\".\n- Step 3: The same word $$des$$ appears in both because plurals blur the line — $$des\\ chocolats$$ can mean \"several chocolates\" (countable plural, indefinite) or \"some chocolates\" (partitive-like). Context disambiguates.\n\nTakeaway: French forces you to declare \"unit or substance?\" every time you mention a noun.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": true}, {"question": "Translate to French: \"Yes, I have a reservation for two people.\" What's the contrast with the negative form? (2 steps)", "answer": "- Step 1: Positive: $$Oui,\\ j'ai\\ une\\ réservation\\ pour\\ deux\\ personnes$$.\n- Step 2: Negative version: $$Non,\\ je\\ n'ai\\ pas\\ de\\ réservation$$ — notice that $$une$$ becomes $$de$$ in the negative. This is a fundamental rule: indefinite/partitive articles ($$un, une, du, de\\ la, des$$) collapse to $$de$$ (or $$d'$$) after a negation.\n\nTakeaway: In negative sentences, articles for indefinite quantities reduce to $$de$$ — \"I don't have *any* reservation\" rather than \"*a* reservation\".", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "What are the seven days of the week in French, and what's a notable pattern in their endings? (2 steps)", "answer": "- Step 1: $$lundi, mardi, mercredi, jeudi, vendredi, samedi, dimanche$$.\n- Step 2: Five of the seven end in $$-di$$ — from Latin $$dies$$ (\"day\"). They're named after celestial bodies/gods: $$lundi$$ = Moon-day ($$Luna$$), $$mardi$$ = Mars-day, $$mercredi$$ = Mercury-day, $$jeudi$$ = Jupiter-day, $$vendredi$$ = Venus-day. $$Samedi$$ comes from \"Sabbath\", $$dimanche$$ from Latin $$dies\\ dominicus$$ (\"Lord's day\"). Also note: French days are **not capitalised** (unlike English).\n\nTakeaway: Five weekdays share the $$-di$$ ending, fossilised from Latin \"day\"; weekends switched to religious naming.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": true}, {"question": "List the four seasons in French and identify the unusual elision pattern. (2 steps)", "answer": "- Step 1: $$le\\ printemps$$ (spring), $$l'été$$ (summer), $$l'automne$$ (autumn), $$l'hiver$$ (winter).\n- Step 2: Three out of four seasons take $$l'$$ (elided $$le$$) because they start with a vowel or silent $$h$$: $$l'été, l'automne, l'hiver$$. Only $$le\\ printemps$$ keeps the full article because $$p$$ is a consonant. This shows French elision is mechanical and predictable once you know what counts as a vowel sound (including the silent $$h$$ as in $$hiver$$).\n\nTakeaway: Article elision before seasons is a clean test of the \"vowel sound\" rule.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": true}, {"question": "A waiter says \"Est-ce que vous les voulez en même temps?\" — decode the meaning and the grammar. (3 steps)", "answer": "- Step 1: $$Est\\text{-}ce\\ que$$ — question marker (\"do...\").\n- Step 2: $$vous\\ les\\ voulez$$ — \"you want them\". The pronoun $$les$$ (\"them\") sits **before** the verb in French, unlike English (\"you want them\"). French pronouns climb in front of conjugated verbs.\n- Step 3: $$en\\ même\\ temps$$ — \"at the same time\" (literally \"in same time\"). So the full meaning: \"Would you like them at the same time?\" — a waiter checking whether to bring two dishes together or stagger them.\n\nTakeaway: Object pronouns ($$le, la, les$$) go **before** the verb in French — a major word-order difference from English.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "How would you politely ask for the bill in a French restaurant, and why are there several variants? (3 steps)", "answer": "- Step 1: Common forms: $$L'addition\\ s'il\\ vous\\ plaît$$ (the bill please) — short and clear. Or $$La\\ note\\ s'il\\ vous\\ plaît$$ (the check please) — equally fine.\n- Step 2: More polite: $$Je\\ pourrais\\ avoir\\ l'addition\\ s'il\\ vous\\ plaît\\ ?$$ (\"Could I have the bill please?\") — uses the conditional $$pourrais$$ to soften.\n- Step 3: Most formal: $$Pourrais\\text{-}je\\ avoir\\ l'addition\\ s'il\\ vous\\ plaît\\ ?$$ — uses inversion. The progression mirrors the question-formation ladder (intonation/casual → est-ce que → inversion).\n\nTakeaway: Politeness scales with grammatical complexity — conditional + inversion = peak formality.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "Why is \"I'm twenty-five years old\" expressed as $$J'ai\\ vingt\\text{-}cinq\\ ans$$ and not \"*Je suis vingt-cinq ans*\"? (2 steps)", "answer": "- Step 1: In French, age is expressed with $$avoir$$ (\"to have\"), not $$être$$ (\"to be\"). Literally: \"I *have* twenty-five years\". English uses \"to be\", French uses \"to have\" — this reflects a different mental model: age is conceived as a possession (years accumulated), not a state of being.\n- Step 2: Forgetting this is one of the most common Anglophone mistakes. The same logic applies to hunger ($$J'ai\\ faim$$ — \"I have hunger\"), thirst ($$J'ai\\ soif$$), being cold ($$J'ai\\ froid$$), and fear ($$J'ai\\ peur$$).\n\nTakeaway: Many states English treats as \"being\" (cold, hungry, 25) French treats as \"having\" — a deep contrast in worldview.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": true}, {"question": "What's the difference between $$à\\ bientôt$$ and $$au\\ revoir$$, and when is each appropriate?", "answer": "$$Au\\ revoir$$ = \"goodbye\" (literally \"until the re-seeing\"), a neutral farewell suitable for any situation — leaving a shop, ending a phone call, parting from a colleague. $$À\\ bientôt$$ = \"see you soon\", which implies you expect to meet the person again in the near future. $$À\\ très\\ vite$$ (\"see you very soon\") is even more imminent. So $$au\\ revoir$$ is the safe default; $$à\\ bientôt$$ adds warmth and signals an expected reunion. Using $$à\\ bientôt$$ with a stranger you'll never see again would feel oddly intimate.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "Translate to French both formally and informally: \"What's your name? How old are you?\" (2 steps)", "answer": "- Step 1: Informal (with friend, peer): $$Comment\\ tu\\ t'appelles\\ ?$$ / $$Tu\\ as\\ quel\\ âge\\ ?$$ — both use $$tu$$.\n- Step 2: Formal (with stranger, elder, superior): $$Comment\\ vous\\ appelez\\text{-}vous\\ ?$$ / $$Quel\\ âge\\ avez\\text{-}vous\\ ?$$ — both use $$vous$$ with inversion.\n\nNote: Choosing $$tu$$ vs. $$vous$$ is a social judgment, not a grammatical one. Getting it wrong (too familiar) can be mildly offensive; too formal feels cold but is safer.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "Convert into the other two question forms: \"Tu travailles le samedi?\" (3 steps)", "answer": "- Step 1: Original (intonation): $$Tu\\ travailles\\ le\\ samedi\\ ?$$ — casual, voice rises at end.\n- Step 2: With $$est\\text{-}ce\\ que$$: $$Est\\text{-}ce\\ que\\ tu\\ travailles\\ le\\ samedi\\ ?$$ — neutral, very common.\n- Step 3: Inversion: $$Travailles\\text{-}tu\\ le\\ samedi\\ ?$$ — formal/written. Note the hyphen and the verb-pronoun swap.\n\nPossible answer: $$Non,\\ je\\ ne\\ travaille\\ pas\\ le\\ samedi$$. (\"No, I don't work on Saturdays\" — note French uses the singular $$le\\ samedi$$ to mean \"every Saturday\", unlike English plural.)", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "What does $$Je\\ reviens\\ tout\\ de\\ suite$$ mean in a restaurant, and what's the literal vs. idiomatic translation? (2 steps)", "answer": "- Step 1: Literally: \"I come back all of follow\" — $$tout\\ de\\ suite$$ is a fixed idiomatic phrase meaning \"immediately\" or \"right away\".\n- Step 2: Idiomatic translation: \"I'll be right back.\" The waiter is excusing themselves briefly. The expression $$tout\\ de\\ suite$$ became frozen — you can't really break down $$de\\ suite$$ to understand it; you memorise the chunk.\n\nTakeaway: Some French expressions are **frozen idioms** — don't translate word by word.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "Why does French sometimes use $$on$$ where English uses \"we\"? (2 steps)", "answer": "- Step 1: $$On$$ literally means \"one\" (as in \"one does that\") and grammatically takes a **third-person singular** verb: $$on\\ a$$, $$on\\ est$$, $$on\\ va$$. But in everyday spoken French, $$on$$ has overwhelmingly replaced $$nous$$ (\"we\").\n- Step 2: So $$On\\ va\\ prendre\\ le\\ hamburger$$ = \"We'll have the hamburger\". In writing or formal speech, $$nous\\ allons\\ prendre$$ is still used, but in cafés, with friends, on the phone, French speakers almost always say $$on$$.\n\nTakeaway: $$On$$ = informal \"we\" in spoken French, even though it's grammatically third-person singular.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "Decode the structure of $$Je\\ m'appelle\\ Phuc$$ — what does it literally say, and what's the underlying grammar concept? (3 steps)", "answer": "- Step 1: Literal translation: \"I call myself Phuc.\"\n- Step 2: $$m'$$ is a **reflexive pronoun** (from $$me$$, elided before vowel), meaning \"myself\". The verb $$s'appeler$$ is reflexive — the action turns back on the subject.\n- Step 3: French uses reflexive verbs for many things English doesn't: $$se\\ lever$$ (to get up — \"to lift oneself\"), $$se\\ laver$$ (to wash oneself), $$s'habiller$$ (to dress oneself). For names, it's literally \"I name myself X\", not \"my name is X\".\n\nTakeaway: French sees naming as something you do to yourself, not a fact about you — a reflexive worldview.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": true}, {"question": "What does $$Suivez\\text{-}moi,\\ s'il\\ vous\\ plaît$$ mean, and what mood/form is $$suivez$$? (2 steps)", "answer": "- Step 1: Meaning: \"Follow me, please.\" Said by a host/waiter leading you to a table.\n- Step 2: $$Suivez$$ is the **imperative** (command form) of $$suivre$$ (\"to follow\"), addressed to $$vous$$ (formal). The imperative drops the subject pronoun — you don't say $$vous\\ suivez$$, just $$suivez$$. The pronoun $$moi$$ (\"me\") attaches with a hyphen *after* the imperative verb (unlike in declarative sentences where pronouns go before).\n\nTakeaway: In affirmative imperatives, pronouns flip to **after** the verb with a hyphen ($$Suivez\\text{-}moi$$, $$Donnez\\text{-}lui$$).", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "CEFR / Roadmap: What does B2 unlock practically, and why is it the \"critical\" level for living in France long-term? (3 steps)", "answer": "- Step 1: B2 is the level of **serious independent French**: you can defend an opinion, argue with examples and consequences, understand complex content (news, films, articles), and participate in discussions with reasonable fluency.\n- Step 2: B2 is the official threshold for **French nationality/naturalisation** — Service-Public requires B2 oral *and* written. It's also the **minimum for most French higher-education institutions** (per Campus France), with C1 recommended for humanities.\n- Step 3: Below B2, you're a \"visitor with French\"; at B2, you're a \"functional resident\". That's the political and academic line — which is why all certification paths (DELF, TCF, TEF) emphasise B2 as a milestone diploma.\n\nTakeaway: B2 is where French stops being a hobby and starts being a life skill.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "From the roadmap: roughly how many guided hours separate A1 from B2, and why is the \"exam-ready\" estimate higher than the \"core\" estimate? (3 steps)", "answer": "- Step 1: Core estimate (from Campus Langues FLE school): A1→A2 ~110h, A2→B1 ~190h, B1→B2 ~225h. Total: roughly **480–570 guided hours** A1→B2.\n- Step 2: Exam-ready estimate adds a **+20% buffer**: ~132h, ~228h, ~270h respectively, totaling **~630 hours**.\n- Step 3: Why the buffer? Because *finishing a coursebook* is not the same as *passing a DELF/TCF four-skill exam*. Exams require reliable **active output** (speaking under pressure, writing organised essays), which takes more drilling than just recognising grammar. The 20% accounts for this gap between passive familiarity and active mastery.\n\nTakeaway: Plan for ~600+ hours A1→B2 if you want exam-grade fluency, not just \"I finished the book\".", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "From the roadmap scenarios: if you take only 2 school lessons per week and do no extra study, how long to reach B2? Why is this so slow? (3 steps)", "answer": "- Step 1: Scenario S1 (2 lessons/week, ~3h/week class only) gives approximately **4.6 years A1→B2** (~55 calendar months).\n- Step 2: Reason: 3 hours/week × ~50 weeks × 4.6 years ≈ 690 hours — matching the exam-ready target. But spread thinly, each week barely moves the needle, and you lose ground to forgetting between lessons.\n- Step 3: This is why \"school-only\" is officially classified as **too slow** for serious progress. Language learning has a minimum weekly intensity below which forgetting eats new gains. Combining lessons with after-lesson review and daily practice (Scenario S3: ~1.9 years) reflects how spaced repetition + frequent exposure dramatically speeds consolidation.\n\nTakeaway: Lesson-only is mathematically slow — daily exposure is what compounds gains.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "From the roadmap: what does the U.S. Department of State's data on French (~552-690 class hours to reach professional speaking in 30 weeks) teach us about realistic timelines? (2 steps)", "answer": "- Step 1: That intensive route uses **23 hours/week class + 17 hours/week self-study ≈ 40 hours/week** of language work — essentially a full-time job. Under that load, you can hit professional working proficiency (~B2-C1 equivalent) in roughly 7 months.\n- Step 2: The lesson: **fast outcomes come from raw total weekly hours, not magic technique**. If you can't commit 40h/week, you won't match diplomat-training speed — but you can still get there, just over years instead of months. There's no shortcut; only different total-hour budgets.\n\nTakeaway: Speed of progress = weekly hours invested. Pace your expectations accordingly.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": true}, {"question": "Why does the roadmap recommend \"Qualité FLE\" labelled schools over apps or casual tutors when targeting B2 certification? (3 steps)", "answer": "- Step 1: **Qualité FLE** is an official label initiated by three French ministries to certify French-language teaching centres on teaching quality, services, and accountability.\n- Step 2: Apps (Duolingo, etc.) and casual tutors lack structured **CEFR-aligned progression, placement testing, corrected output, and exam preparation** — all critical for B2-level four-skill mastery (especially writing and speaking).\n- Step 3: For evidence-grade B2 (needed for nationality, university), you need: corrected essays, oral exam practice, simulated DELF tests. Apps can't provide this; a labelled school can.\n\nTakeaway: Apps + tutors help; certified schools are what get you across the B2 finish line.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": true}, {"question": "Translate: \"I would like a carafe of water, please.\" Why $$une\\ carafe$$ and not $$un\\ carafe$$?", "answer": "$$Je\\ voudrais\\ une\\ carafe\\ d'eau,\\ s'il\\ vous\\ plaît$$. The article is $$une$$ because $$carafe$$ is **feminine** — French nouns have inherent gender that you must memorise (with patterns as hints: words ending in $$-e$$ are often, but not always, feminine; words ending in $$-age, -ment, -isme$$ are usually masculine). $$Carafe$$ ends in $$-e$$ and happens to be feminine. Also note $$d'eau$$ — $$de$$ elides to $$d'$$ before $$eau$$ (vowel). Gender errors don't usually block comprehension, but they mark you instantly as a learner.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "Build a complete restaurant reservation phone dialogue: you're booking a table for 2 at 7:30pm tonight. List the customer's lines. (4 steps)", "answer": "- Step 1: Greeting + purpose: $$Bonsoir\\ Madame.\\ Oui,\\ c'est\\ pour\\ une\\ réservation.$$\n- Step 2: When: $$Pour\\ ce\\ soir,\\ à\\ dix\\text{-}neuf\\ heures\\ trente$$ (or $$à\\ sept\\ heures\\ et\\ demie$$) $$s'il\\ vous\\ plaît.$$\n- Step 3: How many: $$Pour\\ deux\\ personnes,\\ s'il\\ vous\\ plaît.$$\n- Step 4: Phone number for confirmation + sign-off: $$Oui,\\ c'est\\ le\\ [numéro].\\ Merci\\ beaucoup,\\ au\\ revoir\\ !$$\n\nNotes on conventions: French uses **24-hour time** for appointments ($$19h30$$, said as $$dix\\text{-}neuf\\ heures\\ trente$$) in formal contexts; the 12-hour form ($$sept\\ heures\\ et\\ demie$$) is fine conversationally. Always greet with $$bonsoir$$ in the evening, $$bonjour$$ during the day.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "What's the difference between $$à\\ l'intérieur$$ and $$en\\ terrasse$$, and what kind of question would prompt them? (2 steps)", "answer": "- Step 1: A host might ask: $$À\\ l'intérieur\\ ou\\ en\\ terrasse\\ ?$$ — \"Inside or on the terrace?\" Standard question when entering a French restaurant/café.\n- Step 2: $$À\\ l'intérieur$$ = \"inside\" (literally \"at the interior\"). $$En\\ terrasse$$ = \"on the outdoor seating area\" (literally \"in terrace\"). The terrace is iconic French café culture — sidewalk tables for people-watching and lingering over coffee. You'd answer $$Je\\ préfère\\ en\\ terrasse$$ (\"I'd prefer on the terrace\").\n\nTakeaway: $$Terrasse$$ is more than \"outdoor seating\" — it's a cultural institution worth knowing by name.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": true}, {"question": "Common mistake check: a learner writes $$nous\\ avez\\ une\\ réservation$$. What's wrong, and what does this reveal about conjugation patterns? (2 steps)", "answer": "- Step 1: $$avez$$ goes with $$vous$$, not $$nous$$. The correct form is $$nous\\ avons\\ une\\ réservation$$.\n- Step 2: This confusion is common because the endings $$-ons$$ (nous) and $$-ez$$ (vous) are unique to those subjects and easy to swap mentally. A useful mnemonic: $$nous \\to$$ ends in $$-s$$ ($$avons, sommes, allons$$), $$vous \\to$$ ends in $$-z$$ ($$avez, êtes, allez$$). The $$-z$$ ending always means \"you (formal/plural)\".\n\nTakeaway: $$-ons = nous,\\ -ez = vous$$ — burn this in.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "Translate the following negative sentence and explain the structure: \"There is no problem.\" (2 steps)", "answer": "- Step 1: $$Il\\ n'y\\ a\\ pas\\ de\\ problème.$$\n- Step 2: Decomposition: $$il\\ y\\ a$$ = \"there is/there are\" (a fixed expression meaning literally \"it there has\"). Negated, it sandwiches: $$il\\ n'y\\ a\\ pas$$. Then the noun $$problème$$ takes $$de$$ instead of $$un$$ because of the negative-article rule (indefinite articles collapse to $$de$$ after negation).\n\nTakeaway: $$il\\ y\\ a$$ is a frozen idiom for \"there is\"; in negation, the indefinite article ($$un$$) disappears and becomes $$de$$.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "Restaurant: \"Are you having those at the same time, or staggered?\" — give a French rephrasing in both intonation and est-ce que forms. (2 steps)", "answer": "- Step 1: Intonation form (casual): $$Vous\\ les\\ voulez\\ en\\ même\\ temps\\ ?$$ — voice rises at end.\n- Step 2: Est-ce que form: $$Est\\text{-}ce\\ que\\ vous\\ les\\ voulez\\ en\\ même\\ temps\\ ?$$ — neutral question marker prepended. Note that $$les$$ (\"them\") sits before the verb $$voulez$$, demonstrating French pronoun placement: object pronouns climb to the spot just before the conjugated verb.\n\nTakeaway: Object pronouns precede the verb; question form changes around them without disturbing their place.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "Mini exercise: rewrite \"Vous avez une réservation?\" in inversion form, and explain the spelling quirk. (2 steps)", "answer": "- Step 1: Inversion form: $$Avez\\text{-}vous\\ une\\ réservation\\ ?$$\n- Step 2: The quirk: when inverting a verb ending in a vowel (like $$il/elle/on\\ a$$) with a vowel-starting pronoun, French inserts a **euphonic** $$-t-$$ for pronunciation. Example: $$A\\text{-}t\\text{-}il\\ une\\ réservation\\ ?$$ (not \"*a-il*\", which is unpronounceable). With $$vous$$, no insertion needed because $$z$$ liaison naturally bridges $$avez$$ and $$vous$$.\n\nTakeaway: French inserts a $$-t-$$ between vowels in inversion to keep pronunciation smooth.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": false}], "count": 40}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 3061, "out_tokens": 9783, "reasoning_chars": 4270, "cost_eur": 0.0345, "elapsed_s": 214, "content_chars": 32314}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 9629, "out_tokens": 22707, "reasoning_chars": 2752, "cost_eur": 0.0824, "elapsed_s": 418, "content_chars": 81537}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 9629, "out_tokens": 8820, "reasoning_chars": 7537, "cost_eur": 0.0377, "elapsed_s": 181, "content_chars": 25526}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 9369, "out_tokens": 6778, "reasoning_chars": 1689, "cost_eur": 0.0086, "elapsed_s": 72, "content_chars": 21521}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.8, "in_tokens": 9369, "out_tokens": 7674, "reasoning_chars": 2391, "cost_eur": 0.0095, "elapsed_s": 89, "content_chars": 23962}, "opus_1": {"run": 1, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 13581, "out_tokens": 20235, "reasoning_chars": 0, "cost_eur": 1.5836, "elapsed_s": 274, "content_chars": 47933}, "opus_2": {"run": 2, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 13581, "out_tokens": 17359, "reasoning_chars": 0, "cost_eur": 1.3852, "elapsed_s": 239, "content_chars": 38362}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.7, "in_tokens": 9954, "out_tokens": 2474, "reasoning_chars": 3306, "cost_eur": 0.0046, "elapsed_s": 39, "content_chars": 5587}, "qwen_2": {"run": 2, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.8, "in_tokens": 9954, "out_tokens": 4296, "reasoning_chars": 4713, "cost_eur": 0.0066, "elapsed_s": 66, "content_chars": 10040}}};
const SK='auto_french_20260625_french_lesson_with_isabelle';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}
