es slightly less softness than the conditional.\n\nConditional = softer/polite request; futur proche = direct decision. Both are acceptable.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "You're at a restaurant and want to ask the waiter \"What is this?\" about a dish on the menu. What is the French phrase, and why does it use \"est-ce que\" in the middle? (2 steps)", "answer": "- Step 1: The phrase is **\"Qu'est-ce que c'est ?\"** (often pronounced quickly as \"keske\" in informal speech). Literally: \"What is it that it is?\"\n- Step 2: \"Est-ce que\" is a fixed interrogative structure in French — it turns a statement into a question without inverting the verb. \"Qu'\" is the elided form of \"Que\" (what) before the vowel of \"est.\" The full structure is: Que + est-ce que + c'est = What is this?\n\n\"Est-ce que\" is French's most versatile question-forming tool; it avoids verb inversion.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "\"S'il vous plaît\" translates to \"please,\" but literally it means something different. What is the literal translation, and why does French use \"vous\" in this phrase even when speaking to a friend? (2 steps)", "answer": "- Step 1: Literally: \"**If it pleases you**\" — \"s'\" = si (if), \"il\" = it (impersonal), \"vous\" = you (object), \"plaît\" = pleases. So: \"if it pleases you.\"\n- Step 2: The phrase is **frozen/fixed** — it always uses \"vous\" regardless of the relationship. Even with friends, you say \"s'il vous plaît,\" not \"s'il te plaît\" in standard usage. However, in very informal speech, \"s'il te plaît\" (with \"tu\" form) does exist and is used with close friends/family.\n\n\"S'il vous plaît\" is a set formula; the \"vous\" is baked in by convention, not by social context.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": true}, {"question": "Conjugate the verb **être** (to be) in the present tense for all six persons: je, tu, il/elle/on, nous, vous, ils/elles. What pattern do you notice about how irregular this verb is? (2 steps)", "answer": "- Step 1: The conjugation is: Je suis / Tu es / Il est / Nous sommes / Vous êtes / Ils sont. Each form looks radically different from the others — there is no shared stem like you find in regular -er verbs (e.g., parl-er → je parl-e, tu parl-es).\n- Step 2: **Être** is one of the most irregular verbs in French because it comes from two different Latin roots (*essere* and *stare*), which merged over time. This is why \"suis/es/est/sommes/êtes/sont\" share no visible common core. You must memorize each form individually.\n\nÊtre's irregularity is historical — it fused from two Latin verbs, giving unrelated forms.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "How do you make \"Tu es français\" (You are French) negative? Write out the negative form and explain where the two parts of the negation go relative to the verb. (2 steps)", "answer": "- Step 1: The negative form is **\"Tu n'es pas français.\"** The negation wraps around the conjugated verb: **ne** before the verb, **pas** after it.\n- Step 2: The structure is: Subject + **ne** + verb + **pas**. Think of it as a sandwich — the verb is the filling, \"ne\" and \"pas\" are the bread. This wrapping pattern applies to ALL verbs in French negation, not just être.\n\nFrench negation is always a two-part sandwich: **ne** ... **pas** around the verb.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "Why does \"Tu es\" become \"Tu n'es pas\" in the negative, instead of \"Tu ne es pas\"? What phonetic rule causes this change? (2 steps)", "answer": "- Step 1: When **ne** comes before a word starting with a vowel or silent h, it undergoes **elision** — the \"e\" is dropped and replaced by an apostrophe: ne → n'. So \"ne es\" becomes \"n'es.\"\n- Step 2: This is a phonetic rule: French avoids having two vowels collide (hiatus). Dropping the \"e\" and linking with an apostrophe creates smoother, faster speech. The same rule applies to other small words: je → j' (j'ai), le → l' (l'homme), que → qu' (qu'est-ce que).\n\nElision (dropping a vowel before another vowel) is French's way of avoiding awkward vowel collisions.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": true}, {"question": "For the negative forms of être, which of the six persons require elision (ne → n')? Identify them and explain why. (2 steps)", "answer": "- Step 1: The persons whose verb forms start with a vowel are: **tu** (es), **il/elle/on** (est), and **vous** (êtes). So: Tu n'es pas, Il n'est pas, Vous n'êtes pas.\n- Step 2: The remaining persons start with consonants: je (suis → ne suis pas), nous (sommes → ne sommes pas), ils/elles (sont → ne sont pas). These keep \"ne\" intact because no vowel collision occurs.\n\nElision happens only when the verb form begins with a vowel: tu/il/vous forms of être.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "You're speaking to a stranger at a café in Lyon. Should you use \"tu\" or \"vous\" to address them? Now, you're speaking to your two friends at the same café. Which form now, and why? (2 steps)", "answer": "- Step 1: For the **stranger**, use **vous** — this is the formal singular \"you,\" used with people you don't know, elders, or in professional/formal settings. Using \"tu\" with a stranger would be considered rude or overly familiar.\n- Step 2: For your **two friends**, you also use **vous** — but this time it's the **plural** \"you,\" not the formal one. \"Vous\" is the only way to address more than one person, regardless of familiarity. \"Tu\" is strictly singular.\n\n\"Vous\" serves double duty: formal singular AND all plurals. Context determines which function it serves.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": true}, {"question": "A student says \"Je ne suis pas français\" but writes \"Je ne suis pas Francais\" (capitalizing the nationality). What is the error, and what broader French capitalization rule does this reflect? (2 steps)", "answer": "- Step 1: The error is capitalizing \"français.\" In French, **nationality adjectives and nouns are not capitalized** (unlike English, where we write \"French,\" \"Vietnamese\"). The correct spelling is \"Je ne suis pas français.\"\n- Step 2: This reflects a broad French rule: **days of the week, months, seasons, nationalities, and languages are all lowercase** in French. The only time a nationality is capitalized is when it's used as a proper noun (e.g., \"les Français\" = the French people, as a noun).\n\nFrench capitalizes far less than English; nationalities, days, months, seasons are all lowercase.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "List the French days of the week in order. What is the capitalization rule, and what etymological pattern connects the French days to planets/gods (similar to English)? (3 steps)", "answer": "- Step 1: Lundi, Mardi, Mercredi, Jeudi, Vendredi, Samedi, Dimanche. They are **not capitalized** in French (unlike English Monday, Tuesday...).\n- Step 2: The etymological pattern mirrors English: Lundi = Lune (Moon → Moon-day/Monday), Mardi = Mars (Mars → Tiw's day/Tuesday), Mercredi = Mercure (Mercury → Woden's day/Wednesday), Jeudi = Jupiter (Jupiter → Thor's day/Thursday), Vendredi = Vénus (Venus → Freya's day/Friday).\n- Step 3: Samedi comes from Sabbat (Sabbath → Saturday), and Dimanche from Dominica (Lord's day → Sunday). Both Romance and Germanic languages named days after the same celestial bodies/gods — just using their own pantheon names.\n\nFrench days are named after the same Roman gods/planets as English days are named after Germanic equivalents.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "List the French months in order. Why are they not capitalized, and which months carry names that are clearly derived from Roman numerals or deities? (2 steps)", "answer": "- Step 1: Janvier, Février, Mars, Avril, Mai, Juin, Juillet, Août, Septembre, Octobre, Novembre, Décembre. All are **lowercase** in French.\n- Step 2: The later months reveal Roman numerical origins: Septembre (7th — sept), Octobre (8th — huit), Novembre (9th — neuf), Décembre (10th — dix). The Roman calendar started in March, making September the 7th month. Earlier months are named after gods: Janvier (Janus), Mars (Mars), Mai (Maia), Juin (Juno), Juillet/Août (Julius Caesar / Augustus).\n\nMonths 7–10 still carry their original Roman numerical names, offset by two from our calendar.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "Name the four French seasons. Which season uses a different preposition than the other three, and why? (3 steps)", "answer": "- Step 1: The four seasons are: **l'hiver** (winter), **le printemps** (spring), **l'été** (summer), **l'automne** (autumn).\n- Step 2: To say \"in [season],\" three seasons use **en**: en hiver, en été, en automne. But spring uses **au**: au printemps.\n- Step 3: The reason is grammatical gender + phonetics. \"Printemps\" is masculine and starts with a consonant, so the preposition **à + le = au**. The other three either start with a vowel (hiver, été, automne → requiring **en** for vowel smoothness) or are feminine (none of these are, but feminine seasons would also take **en**). \"En\" is used before vowel-initial words and all feminine singular nouns.\n\n\"Au printemps\" is the exception because printemps is consonant-initial masculine; the others are vowel-initial → \"en.\"", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": true}, {"question": "Why do \"l'hiver,\" \"l'été,\" and \"l'automne\" all start with \"l'\" instead of \"le\" or \"la\"? What does this tell you about their grammatical gender? (2 steps)", "answer": "- Step 1: The \"l'\" is the elided form of either **le** (masculine) or **la** (feminine), used before a vowel or silent h. So \"l'hiver\" could theoretically be le hiver or la hiver — the apostrophe hides the gender.\n- Step 2: In this case, all three are **masculine**: le hiver → l'hiver, le été → l'été, le automne → l'automne. The elision masks the gender, so you must memorize it. \"Le printemps\" keeps its article intact because it starts with a consonant.\n\nElision before vowels hides the article's gender — you must learn the gender separately.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "A learner says \"en printemps\" instead of \"au printemps.\" Explain precisely why this is wrong by walking through the grammar step by step. (3 steps)", "answer": "- Step 1: The preposition for \"in\" with seasons is either **en** or **au** (à + le). The choice depends on the season's gender and whether it starts with a vowel.\n- Step 2: \"Printemps\" is masculine and starts with a **consonant** (p). For masculine consonant-initial nouns, the preposition \"à\" contracts with \"le\" to form **au**: à + le printemps = au printemps.\n- Step 3: \"En\" is used before vowel-initial season names (en hiver, en été, en automne) to avoid the vowel collision that \"au\" would create. Since \"printemps\" starts with a consonant, there's no collision, so \"au\" is correct and \"en\" is ungrammatical.\n\n\"Au printemps\" because printemps = masculine + consonant-initial. \"En\" is for vowel-initial or feminine seasons.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": true}, {"question": "You meet someone and want to introduce yourself fully: name, age, city, and nationality. Put together the four phrases using the correct French verbs for each piece of information. (3 steps)", "answer": "- Step 1: Name uses the reflexive verb s'appeler: **\"Je m'appelle Phuc\"** (I call myself Phuc). Note the reflexive pronoun \"m'\" — it's mandatory.\n- Step 2: Age uses avoir: **\"J'ai 25 ans\"** (I have 25 years). Not \"Je suis 25 ans\" — French has age, doesn't be age. The word \"ans\" (years) is required.\n- Step 3: City uses habiter with à: **\"J'habite à Paris\"** (I live in Paris). Nationality uses être: **\"Je suis vietnamien\"** (I am Vietnamese). Note: nationality is an adjective, so it agrees with gender — a woman says \"vietnamienne.\"\n\nFour different verbs for four facts: s'appeler (name), avoir (age), habiter (city), être (nationality).", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "A student writes: \"Je ne suis pas vietnamien, je suis français.\" They want to say \"I am not Vietnamese, I am French.\" Is the negation correct? Now check: what if they wrote \"Je n'suis pas vietnamien\" — is this acceptable? (2 steps)", "answer": "- Step 1: The negation \"Je ne suis pas vietnamien\" is **correct** — \"ne\" before \"suis\" and \"pas\" after it. Since \"suis\" starts with a consonant, no elision occurs.\n- Step 2: \"Je n'suis pas\" is **incorrect in writing** but reflects spoken French, where \"ne\" is often dropped entirely in casual speech: \"Je suis pas vietnamien.\" The form \"n'suis\" doesn't exist in standard writing — if elision applies, it would be \"je n'suis\" but \"suis\" starts with a consonant, so elision doesn't apply. The correct written form keeps \"ne\" intact.\n\n\"Je ne suis pas\" is correct; elision only happens before vowels. In casual speech, \"ne\" often disappears entirely.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "You're ordering at a restaurant and want to be maximally polite. Which of these four phrases is the most standard and soft: \"Je voudrais,\" \"Je pourrais,\" \"J'aimerais avoir,\" or \"Je vais prendre\"? Rank them from most tentative/polite to most direct. (2 steps)", "answer": "- Step 1: Most tentative/polite → most direct: **\"Je pourrais\"** (I could — most hypothetical/soft) → **\"Je voudrais\"** (I would like — standard polite) → **\"J'aimerais avoir\"** (I would like to have — slightly more specific/direct) → **\"Je vais prendre\"** (I'm going to take — decisive, least soft).\n- Step 2: The key insight: all three conditional forms (pourrais, voudrais, aimerais) use the conditional mood, which inherently adds softness and politeness by making the request hypothetical. \"Je vais prendre\" uses futur proche, which is a firm decision, not a request. For maximum politeness, always prefer a conditional form.\n\nConditional mood = politeness in French. \"Je voudrais\" is the safest default for ordering.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "In the être conjugation, \"on est\" is listed alongside \"il/elle est.\" Who does \"on\" refer to, and why is it commonly used in spoken French instead of \"nous sommes\"? (2 steps)", "answer": "- Step 1: \"On\" literally means \"one\" (impersonal, like English \"one is\" or \"they say\"), but in **spoken French**, \"on\" is overwhelmingly used as a replacement for **nous** (we). So \"on est\" = \"nous sommes\" = \"we are\" in everyday speech.\n- Step 2: The reason is phonetic simplicity: \"on est\" (two syllables, smooth) is much easier to say than \"nous sommes\" (three syllables, nasal + consonant cluster). In formal writing, \"nous\" is still preferred; in speech, \"on\" dominates. Note: \"on\" takes third-person singular conjugation (est), not first-person plural.\n\n\"On\" = the spoken French \"we.\" It uses il/elle conjugation (3rd person singular), not nous conjugation.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": true}, {"question": "True or false: \"Vous êtes\" can mean \"you are\" to one person AND \"you are\" to multiple people. Explain the two different scenarios where each applies. (2 steps)", "answer": "- Step 1: **True.** When speaking to one person formally (a stranger, a boss, an elder), \"vous êtes\" = formal singular \"you are.\" When speaking to multiple people (even friends), \"vous êtes\" = plural \"you are.\"\n- Step 2: The key distinction: if you're at a dinner with two close friends, you must still say \"vous\" because it's plural — even though you'd use \"tu\" with each one individually. The plural \"vous\" is grammatically mandatory for 2+ people, regardless of intimacy. The formal singular \"vous\" is a social choice for one person.\n\n\"Vous\" is both a social register choice (formal singular) and a grammatical necessity (all plurals).", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "You see a sign in a French bakery: \"Fermé le lundi.\" What does this mean, and why is \"lundi\" lowercase? (2 steps)", "answer": "- Step 1: It means **\"Closed on Mondays\"** (or \"Closed on Monday\"). \"Le lundi\" with the definite article means \"every Monday\" or \"on Mondays\" in a recurring sense.\n- Step 2: \"Lundi\" is lowercase because French does **not capitalize days of the week**, months, or seasons — ever. English capitalizes Monday, but French keeps lundi lowercase even on official signs and business documents.\n\n\"Le + day of week\" = recurring (every Monday). Days are always lowercase in French.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "A student writes \"Je suis vingt-cinq ans\" trying to say \"I am 25 years old.\" Identify the error and correct it, then explain what verb should be used and why. (2 steps)", "answer": "- Step 1: The error is using **être** (suis) instead of **avoir** (ai). The correct sentence is **\"J'ai vingt-cinq ans.\"** In French, you *have* your age, you don't *be* your age.\n- Step 2: This is a fundamental difference between French and English. English says \"I am 25 years old\" (être/sein/ser), but French says \"J'ai 25 ans\" (avoir/haben/haber) — \"I have 25 years.\" The pattern is: Subject + avoir + number + ans. Never use être for age.\n\nAge = avoir in French. \"J'ai [number] ans\" is the only correct structure.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "Quick exercise: You want to say \"We are not French\" in French. Walk through the steps to construct this sentence. (3 steps)", "answer": "- Step 1: Start with the subject \"we\" = **nous**. The verb être for nous = **sommes**. So the affirmative is \"Nous sommes français\" (we are French).\n- Step 2: Apply negation: wrap **ne** before the verb and **pas** after it. \"Nous ne sommes pas français.\"\n- Step 3: Check for elision: \"sommes\" starts with a consonant, so \"ne\" stays as \"ne\" — no elision needed. Also, \"français\" is lowercase (nationality adjective rule). Final answer: **\"Nous ne sommes pas français.\"**\n\nNous + ne + sommes + pas + français. No elision because \"sommes\" starts with a consonant.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "Quick exercise: Translate \"They are not happy\" into French, using the verb être. Assume \"they\" is a mixed group of men and women. (2 steps)", "answer": "- Step 1: For a mixed group (or all-male group), French uses **ils**. The verb être for ils = **sont**. Affirmative: \"Ils sont heureux.\"\n- Step 2: Apply negation: \"Ils ne sont pas heureux.\" Check elision: \"sont\" starts with a consonant → \"ne\" stays intact. If the group were all-female, it would be \"Elles ne sont pas heureuses\" (feminine plural adjective agreement).\n\nIls ne sont pas heureux. For all-female: Elles ne sont pas heureuses.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "You're writing an email and want to say \"In summer, it is hot.\" Construct the season preposition part: which preposition goes with \"été,\" and why? Then write the full phrase for \"in summer.\" (2 steps)", "answer": "- Step 1: \"Été\" starts with a **vowel** (é). For seasons starting with a vowel, French uses **en** — this avoids the vowel collision that \"au\" (à + le) would create. Also, été is masculine, but the vowel-initial rule overrides.\n- Step 2: The full phrase is **\"en été\"** — \"in summer.\" The complete sentence would be \"En été, il fait chaud\" (in summer, it makes hot = it is hot). The same pattern applies: en hiver, en automne, en été — only printemps breaks the pattern with \"au.\"\n\nVowel-initial seasons always take \"en.\" \"En été\" = in summer.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "A learner writes \"Je m'appelle est Phuc.\" Explain why this is grammatically wrong by identifying the redundant element and the correct structure. (2 steps)", "answer": "- Step 1: The error is adding **\"est\"** (is). \"Je m'appelle\" already means \"I call myself\" — it's a complete verb phrase. Adding \"est\" creates a broken structure: \"I call myself is Phuc\" — two verbs competing for the same slot.\n- Step 2: The correct structure is simply **\"Je m'appelle Phuc\"** — subject (Je) + reflexive pronoun (m') + verb (appelle) + name (Phuc). The name is the direct object of \"appelle\" — you call *yourself* Phuc. No copula (être) is needed.\n\n\"Je m'appelle Phuc\" = one verb (s'appeller), no être needed. Adding \"est\" is a common cross-linguistic interference error.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "Why does \"Je vais choisir\" use the structure \"aller + infinitive\" and what does this construction express? How is it different from the simple future? (2 steps)", "answer": "- Step 1: \"Aller + infinitive\" is the **futur proche** (near future) construction. \"Je vais choisir\" = \"I am going to choose\" — it describes an action that is about to happen or is planned in the immediate future.\n- Step 2: The simple future (\"Je choisirai\") expresses more distant or uncertain future actions. Futur proche feels more immediate and concrete — you've decided and you're about to do it. At a restaurant, \"Je vais choisir\" means \"I'm going to choose [right now]\" vs. \"Je choisirai\" would sound oddly formal/distant.\n\nFutur proche (aller + infinitive) = immediate, planned future. Simple future = more distant/hypothetical.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "You encounter the phrase \"Je pourrais avoir le menu?\" at a restaurant. Break down: what mood is \"pourrais,\" why is it polite, and what does the full sentence literally mean? (3 steps)", "answer": "- Step 1: \"Pourrais\" is the **conditional** of \"pouvoir\" (to be able to / can). The conditional softens \"I can\" into \"I could\" — making it a polite request rather than a demand.\n- Step 2: The literal translation is \"Could I have the menu?\" — \"Je\" (I) + \"pourrais\" (could) + \"avoir\" (have/to have — infinitive) + \"le menu\" (the menu).\n- Step 3: The politeness mechanism: by using the conditional, you're framing your request as hypothetical (\"if it were possible...\") rather than assertive (\"give me the menu\"). This is why the conditional is the standard politeness register in French service interactions.\n\nConditional mood = hypothetical framing = politeness. \"Pourrais\" turns ability into a courteous request.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "Edge case: You're addressing a single close friend, but you're also speaking to their grandmother at the same time. Do you use \"tu\" or \"vous\"? Explain the logic. (2 steps)", "answer": "- Step 1: Since you're addressing **more than one person** (friend + grandmother), you must use **vous** — the plural form. \"Vous\" is grammatically required for any group of 2+ people, regardless of your relationship with individual members.\n- Step 2: If you spoke to each person separately, you'd use \"tu\" with the friend and \"vous\" with the grandmother. But together, plural \"vous\" overrides both the informal (tu for friend) and formal (vous for grandmother) singular choices. Plural always wins.\n\nPlural \"vous\" is mandatory for 2+ people. Individual register choices don't apply to groups.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": true}, {"question": "You want to say \"I would like to have\" at a restaurant. Construct this phrase step by step using the conditional of \"aimer\" + the infinitive \"avoir.\" (2 steps)", "answer": "- Step 1: Start with \"aimer\" (to like/love) in the conditional: **j'aimerais** (I would like). The conditional ending for -er verbs: stem (aimer-) + -ais = j'aimerais.\n- Step 2: Add the infinitive **avoir** (to have): **\"J'aimerais avoir\"** = \"I would like to have.\" This is a slightly more elaborate version of \"Je voudrais\" — both are conditional and polite, but this one specifies the action (having) more explicitly.\n\nJ'aimerais + avoir = \"I would like to have.\" Conditional + infinitive = polite request structure.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "The French months Septembre, Octobre, Novembre, Décembre contain number roots. But September is the 9th month, not the 7th. Explain this two-month offset. (2 steps)", "answer": "- Step 1: The Roman calendar originally began in **March** (Martius), making September the 7th month (sept = 7), October the 8th (huit = 8), November the 9th (neuf = 9), December the 10th (dix = 10).\n- Step 2: When the calendar was reformed to start in January (around 153 BCE under the Roman Republic), the month names were not updated. The numeric names stayed fixed even though their positions shifted by two. This historical quirk persists in French (and English) today.\n\nRoman months 7–10 kept their numeric names despite a 2-month calendar shift. Language fossilized the old numbering.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": true}, {"question": "Synthesis question: A French speaker says \"Nous ne sommes pas contents en hiver.\" Translate this and identify every grammatical feature at play: negation, elision (or lack thereof), season preposition, and adjective agreement. (4 steps)", "answer": "- Step 1: **Translation:** \"We are not happy in winter.\" \"Contents\" = happy/satisfied (masculine plural, agreeing with \"nous\").\n- Step 2: **Negation:** \"Ne ... pas\" wraps around \"sommes\" → \"ne sommes pas.\" No elision because \"sommes\" starts with a consonant.\n- Step 3: **Season preposition:** \"En hiver\" — \"hiver\" is vowel-initial, so \"en\" is used (not \"au\"). This follows the standard pattern for vowel-initial seasons.\n- Step 4: **Adjective agreement:** \"Contents\" is masculine plural — \"nous\" is assumed masculine/mixed. If the group were all female, it would be \"contentes.\" The adjective must agree with the subject's gender and number.\n\nThis sentence tests negation, elision rules, season prepositions, and adjective agreement simultaneously.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": false}], "count": 35}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "In French, why do we say \"J'ai **du** chocolat\" but \"J'ai **un** chocolat\"? What's the conceptual difference between these two ways of talking about what you have? (3 steps)", "answer": "- Step 1: The key distinction is **countable vs. uncountable (mass)**. \"Un chocolat\" refers to one individual, countable chocolate (like one truffle, one piece). \"Du chocolat\" refers to chocolate as a substance — an undifferentiated mass of the stuff. You can count the first; you can't count the second.\n- Step 2: French encodes this grammatically through its articles. **Un/une/des** are indefinite articles for countable nouns — they point to discrete items (\"un croque-monsieur,\" \"des plats du jour\"). **Du/de la/des** are partitive articles for uncountable nouns — they mean \"some\" of a substance (\"du café,\" \"de la crème brûlée,\" \"du saumon grillé\").\n- Step 3: When you choose an article, you're making a cognitive claim about the noun. \"J'ai une assiette\" = I have one plate (countable object). \"J'ai du café\" = I have some coffee (mass substance). The same word can sometimes shift: \"un café\" = a coffee (a cup/order), \"du café\" = coffee (the beverage/substance).\n\nThe grammar mirrors how you conceptualize the noun — as a thing you can count, or as a substance you take some of.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": true}, {"question": "Why does \"des\" appear in BOTH the indefinite article system AND the partitive article system? How can the same word serve two different grammatical roles? (2 steps)", "answer": "- Step 1: \"Des\" is the **plural indefinite article** (= \"some\" countable items, plural). Example: \"J'ai des chocolats\" = I have (some) chocolates — multiple countable pieces. Here \"des\" is the plural of \"un/une.\"\n- Step 2: \"Des\" is also the **plural partitive article** (= \"some\" of an uncountable substance, when the noun happens to be plural). Example: \"des plats du jour\" could be partitive if you mean \"some daily specials\" as a category. The overlap exists because \"des\" is the default plural form for both systems — French collapsed the distinction at the plural level. In the singular, the two systems look different (un/une vs. du/de la), but in the plural, they converge.\n\nContext and the nature of the noun (countable vs. mass) tell you which role \"des\" is playing.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "Given the sentence \"J'ai du saumon grillé\" — why is \"du\" used here instead of \"un\"? And why is \"saumon\" masculine even though it ends in a consonant? (2 steps)", "answer": "- Step 1: \"Du\" is used because salmon (saumon) is being treated as an uncountable substance — you're having some grilled salmon (a portion of fish), not \"one salmon\" as a whole fish. This is the partitive article \"du\" (= de + le, contracted) marking mass consumption.\n- Step 2: French noun gender is **not determined by spelling** — it's largely arbitrary and must be memorized. \"Saumon\" is masculine despite ending in a consonant. There's no reliable phonetic or orthographic rule; \"saumon\" simply is masculine. This is why learning nouns with their articles (le saumon, la crème, l'eau) from the start is essential — the article is your gender clue.\n\nDon't judge a French noun's gender by its ending; always learn the article alongside the noun.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "How do you conjugate the verb AVOIR (to have) in the present tense across all six persons? What pattern do you notice in the negative form? (3 steps)", "answer": "- Step 1: The positive conjugation of AVOIR:\n+ J'ai\n+ Tu as\n+ Il/elle/on a\n+ Nous avons\n+ Vous avez\n+ Ils/elles ont\n\n- Step 2: The negative form wraps the conjugated verb with **ne...pas** — \"ne\" goes before the verb, \"pas\" goes after:\n+ Je n'ai pas\n+ Tu n'as pas\n+ Il/elle/on n'a pas\n+ Nous n'avons pas\n+ Vous n'avez pas\n+ Ils/elles n'ont pas\n\n- Step 3: Notice two phonological details: (1) When \"ne\" precedes a vowel (je n'ai, il n'a, ils n'ont), it **elides** to n' — French avoids the glottal stop by dropping the vowel. (2) When \"pas\" is followed by an indefinite/partitive article, that article changes to \"de\" — so \"J'ai un problème\" → \"Je n'ai pas **de** problème\" (not \"pas un\"). This is the **de after negative** rule.\n\nThe negative structure ne...pas is a sandwich: it wraps around whatever conjugated verb sits in that position.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "Why does \"J'ai une réservation\" become \"Je n'ai pas **de** réservation\" in the negative — not \"Je n'ai pas **une** réservation\"? What rule governs this change? (3 steps)", "answer": "- Step 1: French has a rule: **after a negative (ne...pas), the indefinite articles un/une/des and the partitive articles du/de la/des all collapse to \"de\"** (or d' before a vowel). So \"une réservation\" → \"pas de réservation,\" \"des chocolats\" → \"pas de chocolats,\" \"du café\" → \"pas de café.\"\n- Step 2: The intuition: negation erases the specificity. \"Une réservation\" asserts the existence of a specific reservation. \"Pas de réservation\" denies that any reservation exists at all — not even one, not some, not any. \"De\" becomes the neutral marker of absence, covering all cases.\n- Step 3: Edge case — the definite article (le/la/les) does NOT change after negation, because it refers to something specific/known. \"Je n'aime pas **le** café\" = I don't like coffee (in general). The definite article survives because you're negating a preference about a known entity, not denying existence.\n\nAfter \"pas,\" think: indefinite/partitive → \"de\"; definite → stays the same.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "In the self-introduction \"Je m'appelle Phuc, j'ai 25 ans, j'habite à Paris et je suis vietnamien\" — why does French use \"avoir\" (to have) for age instead of \"être\" (to be) like English does? (2 steps)", "answer": "- Step 1: French conceptualizes age as something you **possess** — you \"have\" years. \"J'ai 25 ans\" literally means \"I have 25 years.\" The noun \"ans\" (years) is the thing being possessed. This is a fundamental difference from English, which conceptualizes age as a state of being (\"I am 25\").\n- Step 2: This isn't unique to French — many Romance languages (Spanish \"tengo 25 años,\" Italian \"ho 25 anni\") share this construction. It reflects a worldview where age is accumulated possession rather than identity state. The key mnemonic: in French, you **have** your age; you don't **are** your age. Using \"être\" for age (\"je suis 25 ans\") is a classic English-speaker error.\n\nWhen in doubt: age → avoir, not être.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": true}, {"question": "In the phrase \"Je suis ingénieur dans l'intelligence artificielle\" — why is there no article before \"ingénieur\"? When does French drop the article before professions/nationalities? (3 steps)", "answer": "- Step 1: In French, **when you identify someone's profession/nationality/religion with être after a subject pronoun (je, tu, il, etc.), the indefinite article is typically dropped**. \"Je suis ingénieur\" (not \"Je suis un ingénieur\"), \"Elle est médecin\" (not \"Elle est une médecin\").\n- Step 2: The logic: \"être + profession\" functions as a predicate — it attributes a category to the subject, not pointing to one specific individual among many. Adding \"un/une\" would imply \"I am one engineer (among others)\" — a subtly different meaning, more like describing yourself as an instance rather than stating your identity.\n- Step 3: Exceptions where the article IS used: (1) With an adjective: \"C'est un bon ingénieur\" (article returns because the adjective makes it specific). (2) With \"c'est\": \"C'est un ingénieur\" (c'est always takes an article for professions). (3) In the negative: The homework note says \"après c'est, l'adjectif est toujours masculin\" — and with \"c'est beau,\" the article is present. The rule is: **être + pronoun → no article; c'est → article required.**\n\nProfession after je/tu/il + être = bare noun. After c'est = with article.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": true}, {"question": "When ordering at a French restaurant, what are three different ways to express \"I would like to have\" and how do they differ in formality? (3 steps)", "answer": "- Step 1: The three main ordering expressions from the lesson:\n+ **Je voudrais** — conditional of vouloir, most common and universally polite. \"Je voudrais le hamburger.\"\n+ **Je pourrais avoir** — conditional of pouvoir + avoir, slightly more indirect/deferential. \"Je pourrais avoir l'addition?\"\n+ **J'aimerais avoir** — conditional of aimer + avoir, gentle and polite. \"J'aimerais avoir une entrecôte.\"\n\n- Step 2: There's also the more casual/direct option: **Je vais prendre / Je vais choisir** — literally \"I'm going to take/choose.\" \"Je vais prendre le hamburger, s'il vous plaît.\" This is less hedged but still perfectly acceptable in a restaurant.\n\n- Step 3: The formality spectrum: \"Je pourrais avoir\" and \"Pourrais-je avoir\" (inversion form) are the most formal — they use the conditional as a softener and sometimes inversion. \"Je voudrais\" is the standard polite middle ground. \"Je vais prendre\" is the most direct but still polite with \"s'il vous plaît.\" For A1 level, \"Je voudrais\" is your safest default.\n\nAll of these work; the conditional mood is your politeness tool in French service encounters.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "What is the difference between \"s'il vous plaît\" and \"s'il te plaît\"? When would you use each, and why does the pronoun change? (2 steps)", "answer": "- Step 1: Both mean \"please,\" but they differ by **register of address**: \"s'il vous plaît\" uses **vous** (formal/plural), and \"s'il te plaît\" uses **tu** (informal/singular). In a restaurant, you say \"s'il vous plaît\" to the server — you don't know them personally, and the service context demands formality. With a friend, you'd say \"s'il te plaît.\"\n- Step 2: The pronoun shift reflects the French **tu/vous distinction** — a core social grammar. \"Vous\" is the safe default for strangers, elders, authority figures, and service encounters. \"Tu\" is for friends, family, peers, and children. Using \"tu\" with a stranger can come across as overly familiar or rude. The \"plaît\" part doesn't change — it's the pronoun object that shifts.\n\nWhen in doubt in a restaurant or shop: always \"s'il vous plaît.\"", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "How do you ask \"What is this?\" in French, and how would you use it to ask about a specific dish like salade niçoise? What is the informal pronunciation? (2 steps)", "answer": "- Step 1: The standard question is **\"Qu'est-ce que c'est ?\"** — literally \"What is it that it is?\" To ask about a specific dish, you extend it: **\"Qu'est-ce que c'est, la salade niçoise?\"** = \"What is the salade niçoise?\" You can also ask \"Qu'est-ce qu'il y a dans [dish]?\" = \"What is there in [dish]?\" to ask about ingredients.\n- Step 2: In rapid spoken French, \"Qu'est-ce que\" collapses to **\"keske\"** — the consonant cluster compresses. So \"Qu'est-ce que c'est\" sounds like \"kes-ke-say.\" This is not slang; it's the normal spoken pronunciation. Recognizing this contraction is essential for listening comprehension — you won't hear the full formal pronunciation in everyday speech.\n\nWritten form: qu'est-ce que c'est. Spoken reality: kes-ke-say.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "A waiter asks you \"Quelle cuisson pour la viande?\" — what are the four cooking levels you can request, from least to most cooked? How do they map to English doneness? (2 steps)", "answer": "- Step 1: The four levels of meat doneness in French, from least to most cooked:\n+ **Bleu** — very rare, seared on the outside, nearly raw inside (literally \"blue,\" referring to the red-blue color of barely cooked meat)\n+ **Saignant** — rare, red center with some warmth through (literally \"bleeding,\" from \"sang\" = blood)\n+ **À point** — medium rare, pink center (literally \"to the point\" = perfectly done)\n+ **Bien cuit** — well cooked/well done, no pink (literally \"well cooked\")\n\n- Step 2: Important nuance: French \"à point\" does NOT mean \"medium\" in the American sense — it's closer to medium-rare. French cooking culture prefers meat less done than the Anglo-American default. If you order \"bien cuit\" in France, some chefs may wince. Also note: the adjective agrees with the noun — \"une entrecôte saignante\" (feminine) but \"un steak saignant\" (masculine).\n\nFrench doneness expectations run one step less cooked than English-speaking norms.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "How do you ask for the bill in French, and what are two different nouns that mean \"the bill\"? Which is more formal? (2 steps)", "answer": "- Step 1: Two common requests:\n+ **\"Je pourrais avoir l'addition, s'il vous plaît?\"** — using the conditional of pouvoir (could I have...)\n+ **\"Pourrais-je avoir l'addition, s'il vous plaît?\"** — using inversion (may I have...), more formal\n\n- Step 2: Two nouns for \"bill\": **l'addition** and **la note**. \"L'addition\" is the standard, most common term in restaurants. \"La note\" is a synonym that also works but can feel slightly more casual or general (it's also used for a hotel bill, a tab, etc.). Either works in a restaurant context, but \"l'addition\" is your default.\n\nThe simplest approach: just say \"L'addition, s'il vous plaît\" — short, clear, polite.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "In the reservation conversation, the server asks \"À quelle heure?\" and the client responds \"à 19h30 (sept heures et demie).\" Why are there two ways to express this time? When do you use each? (2 steps)", "answer": "- Step 1: **19h30** is the 24-hour digital format — standard in written French, schedules, formal contexts, and service encounters. It's precise and unambiguous. The \"h\" stands for \"heures\" (hours), so 19h30 = 19 hours 30.\n- Step 2: **Sept heures et demie** is the 12-hour spoken format — how you'd actually say it in conversation. \"Et demie\" means \"and a half\" (= 30 minutes). In spoken French, people use the 12-hour system with context to disambiguate. For a dinner reservation, \"sept heures\" clearly means evening, so you don't need to specify.\n\nRule of thumb: write 24-hour (19h30), speak 12-hour (sept heures et demie). Both are correct; the choice depends on medium.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "In the reservation phone conversation, how does the server ask for the client's phone number, and how does the client say French phone numbers given the French counting system? (3 steps)", "answer": "- Step 1: The server asks: **\"Votre numéro de téléphone pour confirmer la réservation?\"** = \"Your phone number to confirm the reservation?\" — straightforward request with \"votre\" (formal your).\n- Step 2: The client responds: \"06 78 65 67 87.\" In French, phone numbers are read **two digits at a time**. So this becomes: \"zéro six, soixante-dix-huit, soixante-cinq, soixante-sept, quatre-vingts-sept.\"\n- Step 3: The complexity: because French uses base-20 counting for 70-99, each pair of digits can be a multi-word phrase. \"78\" = soixante-dix-huit (sixty-ten-eight). \"65\" = soixante-cinq (sixty-five). \"87\" = quatre-vingts-sept (four-twenties-seven). This makes French phone numbers notoriously difficult for learners — you must master the vigesimal system to function in daily life.\n\nFrench phone numbers: read in pairs, brace for the base-20 math in the 70s-90s range.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "Why does French count 70 as \"soixante-dix\" (sixty-ten) and 80 as \"quatre-vingts\" (four-twenties) instead of having dedicated words like English \"seventy\" and \"eighty\"? What historical counting system explains this? (3 steps)", "answer": "- Step 1: French uses a **vigesimal (base-20) system** for numbers 70-99, inherited from Celtic and Norman counting traditions. Instead of creating new base-10 words for 70-99, French **composes** them from existing smaller numbers.\n- Step 2: The breakdown:\n+ 70 = soixante-dix (60 + 10)\n+ 71 = soixante-et-onze (60 + and + 11)\n+ 80 = quatre-vingts (4 × 20)\n+ 81 = quatre-vingt-un (4 × 20 + 1)\n+ 90 = quatre-vingt-dix (4 × 20 + 10)\n+ 91 = quatre-vingt-onze (4 × 20 + 11)\n\n- Step 3: This contrasts with the **decimal (base-10) system** used for 0-69, where each decade has its own word (trente, quarante, cinquante, soixante). The shift happens at 70 — below that, French is cleanly decimal; above that, it becomes vigesimal. Some French-speaking regions (Switzerland, Belgium) have created their own words: septante (70), huitante/octante (80), nonante (90) — but standard/French French does not use these.\n\nFrance chose to preserve the historical vigesimal layer rather than regularize — so learners must master both systems.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": true}, {"question": "Why does \"21\" = \"vingt-et-un\" (with \"et\") but \"22\" = \"vingt-deux\" (without \"et\")? And why doesn't \"81\" = \"quatre-vingt-un\" use \"et\" either? (3 steps)", "answer": "- Step 1: The \"et\" connector appears only when the unit digit is **1** AND the tens digit is **a round decade word** (20, 30, 40, 50, 60). So: vingt-et-un (21), trente-et-un (31), quarante-et-un (41), cinquante-et-un (51), soixante-et-un (61).\n- Step 2: For all other unit digits (2-9), you use a **hyphen** with no \"et\": vingt-deux, trente-cinq, quarante-sept. And for 22, 32, 42, etc., it's simply hyphenated. The \"et\" is a special connector reserved for the number one after a decade.\n- Step 3: The exception: \"81\" = **quatre-vingt-un** (no \"et\"), because \"quatre-vingts\" is not a simple decade — it's a multiplication (4 × 20). The \"et\" rule only applies to the simple decade words (vingt, trente, quarante, cinquante, soixante). Since quatre-vingts is a compound, you just hyphenate: quatre-vingt-un, quatre-vingt-deux, etc.\n\nPattern: decade + 1 with simple decades → use \"et\"; with compound decades (quatre-vingts) → no \"et,\" just hyphen.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": true}, {"question": "Why is \"80\" written as \"quatre-vingts\" with an \"s\" on \"vingts,\" but \"81\" is \"quatre-vingt-un\" without the \"s\"? What rule governs this spelling change? (2 steps)", "answer": "- Step 1: When \"vingt\" is multiplied by a number and stands alone (80 = 4 × 20), it takes the plural **\"s\"** because it functions as a plural noun — there are multiple \"twenties.\" Hence: **quatre-vingts**.\n- Step 2: When another number follows (81, 82, etc.), \"vingt\" is no longer the final element — it becomes part of a compound adjective-like construction, and French drops the plural \"s\" before another number. Hence: **quatre-vingt-un**, **quatre-vingt-deux**, etc. The same rule applies to \"cent\": **deux cents** (200) but **deux cent un** (201).\n\nThe plural \"s\" appears only when the number word is the **final element** of the number — if anything follows, the \"s\" disappears.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": true}, {"question": "How do you conjugate the verb ÊTRE (to be) in the present tense? What's the key structural difference between the negative of ÊTRE and the negative of AVOIR? (2 steps)", "answer": "- Step 1: The positive conjugation of ÊTRE:\n+ Je suis\n+ Tu es\n+ Il/elle/on est\n+ Nous sommes\n+ Vous êtes\n+ Ils/elles sont\n\n- Step 2: The negative follows the same ne...pas sandwich as AVOIR:\n+ Je ne suis pas\n+ Tu n'es pas\n+ Il/elle/on n'est pas\n+ Nous ne sommes pas\n+ Vous n'êtes pas\n+ Ils/elles ne sont pas\n\nThe structural principle is identical: **ne before the conjugated verb, pas after it.** Elision (n') happens before vowels in both verbs (je n'ai pas, je n'suis pas → je ne suis pas, tu n'es pas). The only difference is the verb form in the middle. The ne...pas frame is universal — it doesn't care which verb sits inside it.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "From the homework: \"Oui, je suis en retard\" and \"La réunion est urgente\" / \"La réunion est finie\" — why does \"en retard\" use \"en\" but \"urgente\" and \"finie\" are standalone adjectives? What determines whether an adjective needs a preposition? (3 steps)", "answer": "- Step 1: **\"En retard\"** is a fixed adverbial phrase meaning \"late.\" The \"en\" is part of the expression — you can't say \"je suis retard.\" \"En\" here functions as a preposition linking to a noun state. Many French expressions of condition/status use \"en\": \"en colère\" (angry), \"en avance\" (early).\n- Step 2: **\"Urgente\"** and **\"finie\"** are adjectives directly modifying the noun via the verb \"être.\" When a French adjective describes a quality or state of the subject, it connects directly with no preposition: \"La réunion est urgente\" = the meeting is urgent. The adjective agrees in gender/number with the noun it modifies.\n- Step 3: The rule of thumb: if the descriptor is a **quality** (urgent, finished, beautiful), use être + adjective directly. If the descriptor is a **noun-based state** (late = in lateness, angry = in anger), French often uses \"en + noun.\" \"Retard\" is a noun (delay), so it needs \"en.\" \"Urgente\" is an adjective, so it doesn't.\n\nAdjective → direct link (être + adj). Noun-state → preposition link (être en + noun).", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": true}, {"question": "The homework note says \"après c'est, l'adjectif est toujours masculin\" and gives \"C'est beau\" as an example. Why does \"c'est\" force a masculine adjective even when referring to something feminine? (3 steps)", "answer": "- Step 1: The construction **\"c'est + adjective\"** is a demonstrative-presentative structure. The \"ce\" in \"c'est\" is the impersonal pronoun — it doesn't refer to a specific masculine noun. It means \"this is\" or \"it is\" in a general sense. Because \"ce\" is grammatically neutral/impersonal, the adjective defaults to **masculine singular** as the unmarked form.\n- Step 2: So \"C'est beau\" works regardless of whether you're looking at a painting (feminine: la peinture) or a song (masculine: le chant). The \"ce\" doesn't agree with any noun — it's a floating demonstrative. \"C'est beau\" = \"This is beautiful\" in a general, pointing sense.\n- Step 3: Contrast with **\"il/elle est + adjective\"**: here the pronoun IS gendered. \"Elle est belle\" (she/it is beautiful — feminine). \"Il est beau\" (he/it is beautiful — masculine). So the choice between \"c'est\" and \"il/elle est\" is a choice about whether you're presenting something generally (c'est + masc adj) or specifying its gender (il/elle est + gendered adj).\n\nC'est = general presentation → masculine default. Il/elle est = specific reference → gender agreement.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": true}, {"question": "In a French restaurant, the server says \"Suivez-moi, s'il vous plaît\" then \"Installez-vous.\" What do these mean and what grammatical feature do they share? (2 steps)", "answer": "- Step 1: **\"Suivez-moi\"** = \"Follow me\" — imperative (command form) of \"suivre\" (to follow) in the vous form, with \"moi\" (me) as the object. **\"Installez-vous\"** = \"Get settled / Sit down\" — imperative of \"s'installer\" (to settle oneself), a reflexive verb, with \"vous\" as the reflexive pronoun.\n- Step 2: Both are **imperative mood** in the formal/plural \"vous\" form. The imperative is how French gives instructions and commands. With \"-er\" verbs and most others, the vous imperative looks identical to the present tense vous form (suivez, installez), but the subject pronoun is dropped. Reflexive imperatives keep the pronoun after the verb, separated by a hyphen: installez-vous (not: vous installez).\n\nRestaurant servers use the vous-form imperative constantly — it's polite authority.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "The server asks \"Est-ce que vous les voulez en même temps?\" — what does this mean, and why is \"en même temps\" used instead of \"ensemble\"? (2 steps)", "answer": "- Step 1: The question means **\"Would you like them at the same time?\"** — asking whether the dishes should all be brought together or staggered. \"Les\" is the direct object pronoun referring to the dishes/orders. \"Voulez\" is from vouloir (to want).\n- Step 2: **\"En même temps\"** literally means \"in the same time\" = at the same time / simultaneously. **\"Ensemble\"** means \"together\" but in a more social/companionship sense (we're together, eating together). In a restaurant context, \"en même temps\" is the precise phrase for synchronized service — you're asking about timing, not togetherness. \"Ensemble\" could work conversationally but \"en même temps\" is the standard service phrase.\n\nService timing → \"en même temps.\" Social togetherness → \"ensemble.\"", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "What are the days of the week in French, and why are they NOT capitalized unlike in English? (2 steps)", "answer": "- Step 1: The days of the week: **lundi, mardi, mercredi, jeudi, vendredi, samedi, dimanche.** Notice they derive from planetary/ Norse gods (like English) but through French: lundi (lune/moon), mardi (Mars), mercredi (Mercury), jeudi (Jupiter), vendredi (Venus), samedi (Sabbath), dimanche (Dominicus/Lord's day).\n- Step 2: In French, days of the week are **common nouns, not proper nouns**, so they are written in lowercase. English capitalizes them as proper nouns, but French treats them the same as any regular noun (like \"table\" or \"chat\"). The same rule applies to months: janvier, février, etc. — all lowercase.\n\nFrench: days and months are common nouns → lowercase. English: proper nouns → capitalized.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "What are the four seasons in French, and why do three of them start with l' (apostrophe) while one doesn't? (2 steps)", "answer": "- Step 1: The four seasons: **l'hiver** (winter), **le printemps** (spring), **l'été** (summer), **l'automne** (autumn). Note: the lesson text lists \"l'hiver, l'été, l'automne, l'hiver\" which repeats winter — the correct set should include **le printemps** for spring.\n- Step 2: Three seasons begin with vowels (hiver, été, automne), so their definite articles (le) elide to l' — a phonological rule. **Printemps** begins with a consonant, so \"le\" remains intact. \"Hiver\" has a mute \"h\" (h muet), which acts as a vowel for elision purposes. This is not a special seasons rule — it's the standard elision rule applied to these particular nouns.\n\nVowel-starting noun → l' (elision). Consonant-starting noun → le/la stays.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "French has three ways to form a question. If the statement is \"Tu parles français,\" what are the three question forms, and when would you choose each? (3 steps)", "answer": "- Step 1: The three forms:\n+ **Intonation: \"Tu parles français ?\"** — same word order as the statement, voice rises at the end. The simplest, most oral form.\n+ **Est-ce que: \"Est-ce que tu parles français ?\"** — add \"est-ce que\" before the statement. Versatile, works in both speech and writing.\n+ **Inversion: \"Parles-tu français ?\"** — invert the verb and subject pronoun, joined by a hyphen. The most formal form, common in writing.\n\n- Step 2: When to choose each:\n+ **Intonation** → casual conversation, friends, spoken French. Fastest and most natural.\n+ **Est-ce que** → neutral register, works everywhere. Your safe default at A1 level.\n+ **Inversion** → formal writing, official documents, literature, polite service encounters.\n\n- Step 3: A practical hierarchy for A1 learners: default to \"est-ce que\" (it always works and is never wrong). Use intonation when you're comfortable in casual speech. Learn to recognize inversion (you'll see it in writing) but don't worry about producing it perfectly yet — it requires knowing which verbs can invert and handling consonant-vowel issues (e.g., \"parle-t-il\" with a t inserted).\n\nA1 strategy: \"est-ce que\" is your Swiss Army knife for questions.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "When forming an inversion question like \"Habites-tu en Espagne?\", why is there a hyphen between the verb and pronoun? And what happens when the verb ends in a vowel and the pronoun starts with a vowel (like with \"il/elle\")? (3 steps)", "answer": "- Step 1: The hyphen in inversion (habites-tu, aimez-vous) marks the **syntactic reversal** — the verb and subject pronoun have swapped positions, and the hyphen signals this binding. It's not a compound word; it's a grammatical marker showing that two normally separate elements are now inverted.\n- Step 2: When the verb ends in a vowel and the pronoun starts with one (il, elle, on), you get a **vowel clash** that French resolves by inserting a **\"t\"** as a buffer. Example: \"Il parle\" → inversion would be \"parle-il\" (vowel clash) → actual form: **\"parle-t-il\"**. The \"t\" is purely phonological — it prevents two vowels from colliding.\n- Step 3: This \"t\" insertion only happens with third-person pronouns (il, elle, on) because only they start with vowels. With tu, nous, vous (consonant-starting pronouns), no insertion is needed: \"parles-tu,\" \"aimons-nous,\" \"aimez-vous.\" The rule is automatic in formal writing but worth recognizing when you encounter it.\n\nVowel clash in inversion → insert \"-t-\" between verb and pronoun. Only with il/elle/on.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": true}, {"question": "Convert the statement-question \"Vous avez des frères et sœurs?\" into the other two question forms. Why does \"des\" appear in all forms? (2 steps)", "answer": "- Step 1: The conversions:\n+ **Est-ce que form:** \"Est-ce que vous avez des frères et sœurs ?\"\n+ **Inversion form:** \"Avez-vous des frères et sœurs ?\"\n\n- Step 2: \"Des\" appears in all forms because it's part of the **content of the question**, not the question structure. \"Des frères et sœurs\" means \"brothers and sisters\" (indefinite plural). The question format changes the framing (intonation / est-ce que / inversion) but doesn't alter the noun phrase. The \"des\" would only change if the sentence were made negative: \"Vous n'avez pas **de** frères et sœurs\" — applying the ne...pas + de rule.\n\nQuestion format → structural change only. The noun phrase content stays the same across all three forms.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "According to the CEFR roadmap, what does the A1 level practically unlock, and what specific abilities does the DELF A1 exam test? (2 steps)", "answer": "- Step 1: A1 practically unlocks **basic survival French**: introducing yourself, filling in forms, buying things and paying, asking and answering simple questions. You can function in highly structured, predictable situations with support.\n- Step 2: The DELF A1 exam (from France Éducation internationale) tests: understanding simple oral instructions, reading short texts and forms, writing a brief postcard or personal information, and handling basic transactions. It's the \"I can survive a day in France without English\" level — you can order food, give your name, understand simple directions, but you cannot sustain a conversation or handle unexpected situations.\n\nA1 = survival mode. You can get by, but you can't yet navigate independently.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "What is the key difference between what A2 unlocks versus B1, and why is B1 considered the threshold of \"independent\" language use? (3 steps)", "answer": "- Step 1: **A2** unlocks everyday routines: shopping, transport, simple conversations about familiar topics, talking about past events, asking for directions, writing personal letters. You can handle predictable daily-life scenarios. DELF A2 tests simple everyday tasks, common social formulas, describing daily life with linked sentences.\n- Step 2: **B1** unlocks independent daily life: handling travel/life problems on your own, explaining opinions with reasons, recounting personal experiences, understanding main points of news. DELF B1 requires expressing opinions with reasons, feelings, agreement/disagreement, and making proposals/hypotheses. The shift from A2 to B1 is from **routine transactions** to **expressing yourself on non-routine topics.**\n- Step 3: B1 is the \"independent\" threshold because you can function without constant support. At A2, you need the other person to accommodate you (speak slowly, repeat, stick to familiar topics). At B1, you can deal with complications, misunderstandings, and unexpected turns. You're not fluent, but you're no longer helpless. This is also why B1 is required for a French **carte de résident** (residency card).\n\nA2 = routine with help. B1 = independent with effort. B2 = comfortable and argumentative.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "Why is B2 the critical target for French nationality and higher education, and what specific abilities does it require beyond B1? (3 steps)", "answer": "- Step 1: **Official requirements**: Service-Public states B2 oral and written French is required for French nationality/naturalization. Campus France states B2 is the minimum for most French higher-education institutions (C1 recommended for humanities/social sciences).\n- Step 2: B2 requires **serious independent French**: defending an opinion with arguments and examples, discussing advantages and disadvantages, explaining cause and consequence, reformulating ideas, and understanding complex/current-affairs documents. You can participate with fluency in discussions on varied topics.\n- Step 3: The jump from B1 to B2 is significant. B1 lets you express opinions simply; B2 requires you to **argue persuasively, structure complex arguments, handle implicit meaning, and produce organized written output.** This is why the guided-hour estimate for B1→B2 (200-250h) is similar to A2→B1 (180-200h) — the complexity increases even though you're already at an intermediate level.\n\nB2 = you can argue, debate, and function in academic/professional French. It's not \"fluent\" but it's \"functional adult.\"", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": true}, {"question": "According to the roadmap, why does the \"exam-ready\" model add 20% to the core guided-hour estimates? What's the practical implication? (2 steps)", "answer": "- Step 1: The 20% buffer accounts for the gap between **\"completing a course unit\"** and **\"being comfortable enough to pass an exam.\"** Finishing a textbook chapter ≠ having the skill. Exam readiness requires reliable output (speaking, writing) under pressure, not just recognition of grammar. The core estimates (A1→A2: 100-120h) are what schools typically schedule; the 20% extra (→ 132h) is what you need to actually perform.\n- Step 2: Practical implication: if you're planning for B2 and only count the minimum hours (480h total), you'll likely fall short on exam day. Planning for 630 total hours (with the buffer) gives you realistic expectations. This is the same principle as studying vs. exam-prepping — knowing the material and being test-ready are different skills.\n\nCourse completion ≠ exam readiness. The 20% buffer is your exam-prep insurance.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "The roadmap says \"school-only is too slow\" — with 2 lessons/week only, it takes ~4.6 years from A1 to B2. Why is adding daily practice so much more effective than just adding more lessons? (3 steps)", "answer": "- Step 1: Comparing scenarios: S1 (2 lessons only) = 55.6 months. S3 (2 lessons + 1h review + 20 min/day) = 22.7 months. S3 cuts the time by more than half with the same lesson count, just by adding daily engagement.\n- Step 2: The reason is **spaced repetition and consolidation**. Lessons introduce material; daily practice embeds it. If you only see French twice a week for 90 minutes, most of the material decays before the next lesson. 20 minutes/day keeps the forgetting curve flat — each daily session reinforces what was learned and prevents the decay that makes re-learning necessary.\n- Step 3: Adding more lessons (S5: 3 lessons only) helps (37.1 months) but is less efficient than S3 (22.7 months) because lessons without spaced review still suffer from decay. The most time-efficient combo is moderate lessons + daily distributed practice. This aligns with cognitive science: **frequency of exposure** matters more than **duration of single sessions** for long-term retention.\n\nDaily short practice > weekly long lessons. The spacing effect is the most powerful lever.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "In the restaurant vocabulary, what is the difference between \"Que désirez-vous boire?\" and \"Avez-vous choisi?\" — what stage of the meal does each question belong to? (2 steps)", "answer": "- Step 1: **\"Que désirez-vous boire?\"** = \"What would you like to drink?\" — this is the **first question after seating**, when the server takes the drink order. The inversion form (\"désirez-vous\") makes it formal/polite. This comes right after \"Installez-vous\" (get settled).\n- Step 2: **\"Avez-vous choisi?\"** or **\"Avez-vous fait votre choix?\"** = \"Have you chosen? / Have you made your choice?\" — this comes **later**, when the server returns to take the food order. It implies you've had time to look at the menu. The response patterns differ: for drinks, you name a beverage; for food, you use ordering phrases like \"Je vais prendre...\" or \"J'aimerais...\"\n\nTimeline: seating → drink order (\"désirez-vous boire?\") → time to read menu → food order (\"avez-vous choisi?\") → meal → bill.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "When ordering as a group in French, how do you say \"we would like\" or \"we will take\"? What pronoun replaces \"nous\" in casual spoken French? (2 steps)", "answer": "- Step 1: Group ordering uses **\"on\"** as the informal replacement for \"nous\" (we):\n+ \"On va prendre...\" = We'll take...\n+ \"On aimerait...\" = We would like...\n+ \"On pourrait avoir...\" = We could have...\n+ \"Est-ce qu'on pourrait avoir...\" = Could we have...?\n\n- Step 2: **\"On\"** is the dominant spoken form for \"we\" in modern French. \"Nous\" is still used in formal writing and very polite speech, but in a restaurant, \"on\" is natural and unremarkable. The conjugation of \"on\" follows the third-person singular (il/elle form): \"on prend,\" \"on aime,\" \"on veut\" — NOT \"on prenons\" (which would be the nous form). This is a key A1 insight: \"on\" looks singular grammatically but means \"we\" semantically.\n\nOn = we (casual), conjugated like il/elle. Nous = we (formal), conjugated as nous.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": false}, {"question": "The server asks \"Est-ce que tout va bien?\" during the meal. What does this mean, and what is the cultural expectation for how you should respond? (2 steps)", "answer": "- Step 1: **\"Est-ce que tout va bien?\"** = \"Is everything okay?\" / \"Is everything going well?\" — the server checks on your satisfaction during the meal. This is standard French restaurant etiquette; the server will typically pass by once or twice to ask.\n- Step 2: The cultural expectation: if everything is fine, a simple **\"Oui, merci\"** or **\"Oui, c'est très bien\"** suffices. If something is wrong, this is the moment to say so politely — \"En fait, la viande est trop cuite\" (actually, the meat is overcooked). Unlike some cultures where complaining is rude, in France it's acceptable to give honest feedback, especially about food doneness or temperature. The server is explicitly inviting your assessment.\n\n\"Est-ce que tout va bien?\" = your window to flag issues. Polite honesty is the norm.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": false}, {"question": "The server says \"Je reviens tout de suite.\" What does this mean, and why does \"tout de suite\" not mean \"all at once\" as you might guess from the individual words? (2 steps)", "answer": "- Step 1: **\"Je reviens tout de suite\"** = \"I'm coming right back\" / \"I'll be right back.\" The server is saying they'll return shortly — typically after you've asked for something (the bill, more water, etc.).\n- Step 2: **\"Tout de suite\"** is a fixed expression meaning \"immediately / right away.\" The literal word-by-word breakdown (\"all of suit/following\") is misleading — this is an idiom, not a compositional phrase. A common learner mistake is to interpret \"tout\" as \"all\" and \"suite\" as \"sequence\" and guess \"all at once\" or \"everything follows.\" In reality, it's simply the standard French way to say \"right now / immediately.\" The pronunciation is also notable: \"tout de suite\" is often pronounced \"toot sweet\" in rapid speech.\n\nTout de suite = immediately/right away. It's an idiom — don't translate word by word.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": true}, {"question": "What are the French months of the year, and which ones have pronunciation traps for English speakers? (2 steps)", "answer": "- Step 1: The twelve months: **janvier, février, mars, avril, mai, juin, juillet, août, septembre, octobre, novembre, décembre.** Like days, months are lowercase in French (common nouns).\n- Step 2: Pronunciation traps:\n+ **Février** — the first \"é\" is pronounced, and the \"v\" is pronounced (not like English \"February\" which often drops the first \"r\"). Say: fé-vri-é.\n+ **Juin** — the \"in\" is a nasal vowel, NOT like English \"June.\" It sounds roughly like \"jwahn\" with a nasal twang.\n+ **Juillet** — two syllables: juil-let, with a clear \"y\" sound. NOT like English \"July.\"\n+ **Août** — the \"t\" is silent. Pronounced simply as \"oot\" (like \"out\" in French).\n\nMonths are easy to memorize but the pronunciation diverges significantly from English cognates.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": false}, {"question": "A simple exercise: Convert \"Tu travailles le samedi?\" into the two other question forms. (2 steps)", "answer": "- Step 1: **Est-ce que form:** \"Est-ce que tu travailles le samedi?\" — simply prefix \"Est-ce que\" to the statement. The word order of the original sentence stays the same.\n- Step 2: **Inversion form:** \"Travailles-tu le samedi?\" — invert the verb \"travailles\" and the subject pronoun \"tu,\" joined by a hyphen. \"Le samedi\" stays in place at the end. No \"t\" insertion needed because \"tu\" starts with a consonant.\n\nAll three forms: \"Tu travailles le samedi?\" / \"Est-ce que tu travailles le samedi?\" / \"Travailles-tu le samedi?\"", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": false}, {"question": "A simple exercise: Convert \"Est-ce que vous regardez la télévision le soir?\" into the other two question forms. (2 steps)", "answer": "- Step 1: **Intonation form:** \"Vous regardez la télévision le soir?\" — remove \"Est-ce que\" and rely on rising intonation at the end. Same word order, just spoken with question tone.\n- Step 2: **Inversion form:** \"Regardez-vous la télévision le soir?\" — invert \"regardez\" and \"vous\" with a hyphen. \"La télévision le soir\" remains unchanged at the end.\n\nThree forms: \"Vous regardez la télévision le soir?\" / \"Est-ce que vous regardez la télévision le soir?\" / \"Regardez-vous la télévision le soir?\"", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": false}, {"question": "A simple exercise: Convert \"Prends-tu le bus pour aller au travail?\" into the other two question forms. (2 steps)", "answer": "- Step 1: **Intonation form:** \"Tu prends le bus pour aller au travail?\" — restore the normal subject-verb order (tu prends) and drop the hyphen. Rising intonation marks it as a question.\n- Step 2: **Est-ce que form:** \"Est-ce que tu prends le bus pour aller au travail?\" — prefix \"Est-ce que\" to the normal word order. The verb returns to its non-inverted position after \"tu.\"\n\nThree forms: \"Tu prends le bus pour aller au travail?\" / \"Est-ce que tu prends le bus pour aller au travail?\" / \"Prends-tu le bus pour aller au travail?\"", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": false}, {"question": "A simple exercise: You're at a restaurant and want to order a rare steak. Construct your order using \"je voudrais\" and include the correct word for \"rare\" and \"please.\" (2 steps)", "answer": "- Step 1: Start with \"Je voudrais\" + the dish + the doneness + s'il vous plaît. The word for \"rare\" is **saignant** (for masculine noun like \"un steak\"). So: \"Je voudrais un steak saignant, s'il vous plaît.\"\n- Step 2: If the noun were feminine (e.g., \"une entrecôte\"), the adjective would agree: \"Je voudrais une entrecôte saignante, s'il vous plaît.\" The adjective \"saignant\" adds an \"e\" for feminine. This agreement is automatic — the doneness word must match the gender of the meat you're ordering.\n\n\"Je voudrais un steak saignant, s'il vous plaît\" — or with feminine: \"une entrecôte saignante.\"", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": false}, {"question": "A simple exercise: How would you say \"I don't have a reservation\" in French, applying the ne...pas + de rule correctly? (2 steps)", "answer": "- Step 1: Start with the positive: \"J'ai une réservation.\" Apply negation: \"Je\" + \"ne\" + conjugated verb \"n'ai pas\" + ... But \"une\" is an indefinite article, and after \"pas,\" indefinite articles change to \"de.\"\n- Step 2: Result: **\"Je n'ai pas de réservation.\"** — NOT \"Je n'ai pas une réservation.\" The \"une\" has been replaced by \"de\" following the negative rule. Also note the elision: \"ne\" → \"n'\" before \"ai\" (vowel).\n\n\"Je n'ai pas de réservation\" — the indefinite article \"une\" becomes \"de\" after \"pas.\"", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": false}, {"question": "A simple exercise: How do you say \"I prefer the terrace\" in French, using the vocabulary from the restaurant lesson? (2 steps)", "answer": "- Step 1: \"I prefer\" = **\"Je préfère\"** (from the verb préférer). \"The terrace\" = **\"en terrasse\"** or **\"la terrasse.\"** From the lesson: \"Je préfère en terrasse\" is the natural way to express this preference.\n- Step 2: The server asks \"À l'intérieur ou en terrasse?\" (inside or on the terrace?). You respond: **\"Je préfère en terrasse\"** = I prefer the terrace / I'd prefer to sit outside. Note: \"en terrasse\" is a fixed expression meaning \"on the terrace/outdoor seating\" — you can't say \"sur la terrasse\" in a restaurant context (that would sound like you're physically on top of the terrace).\n\n\"Je préfère en terrasse\" = I prefer to sit on the terrace/outside.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": false}, {"question": "What are the guided-hour estimates (core and exam-ready) for each CEFR transition: A1→A2, A2→B1, B1→B2, and the total A1→B2? Why does each successive transition require more hours? (3 steps)", "answer": "- Step 1: The hour estimates:\n+ A1→A2: Core 100-120h → Exam-ready **132h** (midpoint 110h + 20%)\n+ A2→B1: Core 180-200h → Exam-ready **228h** (midpoint 190h + 20%)\n+ B1→B2: Core 200-250h → Exam-ready **270h** (midpoint 225h + 20%)\n+ A1→B2 total: Core 480-570h → Exam-ready **630h**\n\n- Step 2: Each transition requires more hours because the **breadth and depth of ability increases exponentially**: A1→A2 is basic vocabulary and simple structures; A2→B1 requires past tenses, complex sentences, and opinion expression; B1→B2 requires argumentation, nuanced expression, implicit comprehension, and reliable spontaneous output. The gap between \"understanding\" and \"producing\" widens at higher levels.\n\n- Step 3: The 20% buffer is constant across all transitions because exam readiness (reliable performance under pressure) is needed at every level, not just at B2. Without it, you might \"cover\" the material but not be able to demonstrate it on a DELF/TCF exam.\n\nHigher level = wider ability gap = more hours needed. The buffer ensures you can perform, not just recognize.", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": true}, {"question": "What French admin level is required for each: a multi-year residence card (carte de séjour pluriannuelle), a permanent residence card (carte de résident), and nationality/naturalization? (2 steps)", "answer": "- Step 1: The French admin ladder for language requirements:\n+ **Carte de séjour pluriannuelle** → **A2** level required\n+ **Carte de résident** → **B1** level required\n+ **Naturalisation/nationality** → **B2** level required (oral and written)\n\n- Step 2: The ladder makes logical sense: a temporary stay requires basic communication (A2); permanent residency requires independent functioning (B1); citizenship requires the ability to fully participate in civic life, argue, and understand complex content (B2). Each step up the admin ladder corresponds to a step up the CEFR ladder. These levels are tested via TCF IRN (Test de Connaissance du Français pour l'Intégration, la Résidence et la Nationalité).\n\nMore permanent status → higher French requirement. A2 for stay, B1 for residence, B2 for citizenship.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": false}, {"question": "The roadmap recommends the \"Qualité FLE\" label when choosing a French school. What is this label, and why does it matter for reaching B2? (2 steps)", "answer": "- Step 1: **Qualité FLE** (Français Langue Étrangère) is an official quality label initiated by **three French ministries** (Education, Foreign Affairs, Higher Education/Research) to identify and promote French language centres whose teaching and services meet quality standards. It guarantees structured programs, qualified teachers, proper facilities, and CEFR alignment.\n- Step 2: It matters for reaching B2 because B2 requires **reliable output skills** (speaking and writing), which demand structured feedback, correction, and progression. Apps and casual tutors can help with vocabulary and basic grammar, but they typically lack the systematic curriculum, placement testing, and teacher feedback that a Qualité FLE school provides. If your goal is B2 evidence (for university or nationality), a structured school with this label is the safer investment.\n\nQualité FLE = government-backed quality assurance. For B2, structure and feedback matter more than casual exposure.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": false}, {"question": "The roadmap's recommended study architecture has four \"lanes.\" What are they, and why is each necessary rather than relying on just one? (3 steps)", "answer": "- Step 1: The four lanes:\n+ **Lane 1: Structured school progression** — CEFR-aligned lessons, textbook progression, teacher guidance\n+ **Lane 2: Active recall and vocabulary** — flashcards, spaced repetition, deliberate vocabulary acquisition\n+ **Lane 3: Listening and input** — podcasts, videos, comprehensible input, exposure to natural French\n+ **Lane 4: Output and correction** — speaking practice, writing with feedback, error correction\n\n- Step 2: Each lane addresses a different cognitive process: Lane 1 provides structure and progression (you need a path). Lane 2 ensures retention (without recall practice, you forget 70% within days). Lane 3 builds comprehension speed and phonological processing (you can't speak what you can't parse). Lane 4 develops production ability (recognition ≠ production — you must practice output to get output).\n\n- Step 3: Relying on only one lane creates gaps. School-only (Lane 1) without recall practice (Lane 2) = poor retention. Listening-only (Lane 3) without output (Lane 4) = you understand but can't speak. Flashcards-only (Lane 2) without context (Lane 3) = you know words but can't follow real speech. The four lanes are complementary, not substitutable.\n\nAll four lanes working together = efficient progress. Missing any lane = a skill gap that slows you down.", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": false}, {"question": "The roadmap recommends scenario S3 (2 lessons/week + 1h review + 20 min/day) as the best balanced route, estimating ~1.9 years from A1 to B2. What does the weekly routine look like in pra
