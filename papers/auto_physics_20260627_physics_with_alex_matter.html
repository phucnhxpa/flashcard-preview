sit around iron. Moving *toward* iron — either by splitting heavy ones or fusing light ones — releases the binding-energy difference as kinetic energy and radiation.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "Recall the three classical types of radioactive emission and characterise each by what is emitted and roughly how penetrating it is. (3 steps)", "answer": "- Step 1: **Alpha (α)**: a helium-4 nucleus (2 protons + 2 neutrons) is emitted. Heavy, slow, charge $$+2e$$. Stopped by a sheet of paper or a few cm of air.\n- Step 2: **Beta (β)**: a high-speed electron (β⁻) or positron (β⁺) is emitted from the nucleus when a neutron converts to a proton (or vice versa). Stopped by a few mm of aluminium.\n- Step 3: **Gamma (γ)**: a high-energy photon — no charge, no mass, very penetrating. Needs thick lead or concrete to significantly attenuate.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": true}, {"question": "At the quark level, what actually changes during beta-minus decay, and which fundamental force is responsible? (3 steps)", "answer": "- Step 1: A neutron (udd) turns into a proton (uud) — so one **down quark** changes into an **up quark**.\n- Step 2: To balance charge, an **electron** (the β⁻ particle) plus an antineutrino are emitted.\n- Step 3: This flavour-changing process is mediated by a **W boson**, so the responsible force is the **weak force** — the only force that can change quark flavours.\n\nTakeaway: Beta decay is not \"a neutron spitting out an electron from a pre-existing stash\"; it's a quark flavour transformation that *creates* the electron.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "Define half-life conceptually (not by a formula), and explain why a sample never *fully* decays in any finite time. (3 steps)", "answer": "- Step 1: Half-life is the time over which **half** of the radioactive nuclei in a sample, on average, will have decayed.\n- Step 2: It's a *statistical* property of an enormous collection — any single nucleus decays at an unpredictable instant, but the collective behaviour follows the half-life reliably.\n- Step 3: Because each half-life only removes *half* of what remains, after $$n$$ half-lives a fraction $$(1/2)^n$$ is still left. This geometric decay never reaches exactly zero, only gets ever closer.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "A radioactive sample has a half-life of 10 minutes. Roughly what fraction remains after 30 minutes, and what does this illustrate about decay being multiplicative rather than subtractive? (3 steps)", "answer": "- Step 1: 30 minutes = 3 half-lives.\n- Step 2: After each half-life we multiply by $$\\tfrac{1}{2}$$, so the remaining fraction is $$\\left(\\tfrac{1}{2}\\right)^3 = \\tfrac{1}{8}$$.\n- Step 3: Lesson: each half-life removes a *fraction* (half of what's left), not a fixed quantity. If it were subtractive — say, \"loses 1000 atoms per 10 minutes\" — the sample would hit zero in finite time. The multiplicative nature is what gives radioactive decay its exponential character.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": true}, {"question": "List the main sources of background radiation a person on Earth is typically exposed to. (4 steps)", "answer": "- Step 1: **Cosmic rays** — high-energy particles from space; flux is higher at altitude and near the poles.\n- Step 2: **Rocks and soil**, especially **radon** gas seeping out of granite and similar bedrock — often the largest single contributor in homes.\n- Step 3: **Medical sources** — X-rays, CT scans, nuclear medicine.\n- Step 4: **Nuclear industry / fallout / nuclear power** — usually a small contribution compared to natural sources, but non-zero.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "Without doing arithmetic, explain *why* the up-quark charge had to be $$+\\tfrac{2}{3}$$ and the down-quark charge $$-\\tfrac{1}{3}$$ to be consistent with observed nucleon charges. (3 steps)", "answer": "- Step 1: We require uud (proton) to total $$+1$$ and udd (neutron) to total $$0$$.\n- Step 2: Let up = $$x$$, down = $$y$$. Then $$2x + y = 1$$ and $$x + 2y = 0$$. Subtracting gives $$x - y = 1$$, and the second equation gives $$x = -2y$$.\n- Step 3: Solving: $$y = -\\tfrac{1}{3}$$ and $$x = +\\tfrac{2}{3}$$. So the fractional charges are *forced* by the requirement that two specific quark recipes produce charges $$+1$$ and $$0$$ — they aren't an arbitrary choice.\n\nTakeaway: Quark charges are exactly what they must be to \"manufacture\" the nucleons we see.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": true}, {"question": "Why can't we just say \"the electron is one of the things a neutron is made of,\" given that beta-minus decay produces an electron from a neutron? (3 steps)", "answer": "- Step 1: Misconception: thinking of decay products as pre-existing pieces popping out, like opening a box.\n- Step 2: Reality at the quark level: a down quark transforms into an up quark via a W boson, and the W boson then decays into an electron + antineutrino. None of those final particles existed inside the neutron beforehand.\n- Step 3: General principle: in particle physics, mass-energy is converted into new particles according to conservation laws (charge, energy, momentum, lepton number). \"Made of\" applies only to the quark content; emitted particles are *created* at the moment of decay.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": true}, {"question": "Estimate, qualitatively, how the mass of a hydrogen atom compares to the mass of its proton alone, and explain the reasoning. (3 steps)", "answer": "- Step 1: A hydrogen atom = 1 proton + 1 electron (no neutrons in the common isotope).\n- Step 2: Proton mass ≈ $$1\\,\\text{u}$$; electron mass ≈ $$\\tfrac{1}{1836}\\,\\text{u}$$, i.e. about $$0.05\\%$$ of the proton.\n- Step 3: So the atom's mass is essentially the proton's mass to within about one part in two thousand. This is why, for almost any chemistry or nuclear calculation, \"atomic mass ≈ nucleon count\" is an excellent approximation.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "A particle is observed with charge $$-1e$$ and an extremely small mass, found *outside* the nucleus. Which Standard Model family does it belong to, and why is it not classified as a quark? (3 steps)", "answer": "- Step 1: Charge $$-1e$$ and tiny mass outside the nucleus strongly suggests an **electron**, which is a **lepton**.\n- Step 2: It's not a quark because (a) it has an *integer* charge ($$-1$$), whereas quarks have fractional charges ($$\\pm\\tfrac{1}{3}, \\pm\\tfrac{2}{3}$$), and (b) quarks are never observed in isolation — they're always bound inside hadrons by the strong force.\n- Step 3: Leptons, by contrast, can exist freely and do not feel the strong force at all — which is exactly why electrons can comfortably orbit far outside the nucleus.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "Why is matter \"solid\" to the touch if atoms are mostly empty space? (3 steps)", "answer": "- Step 1: When two objects touch, what actually meets are their outermost electron clouds.\n- Step 2: Electron clouds repel each other via the **electromagnetic force** (mediated by photons), and the Pauli exclusion principle prevents electrons from occupying the same quantum state.\n- Step 3: This repulsion is enormous on a per-atom scale — strong enough that we experience surfaces as rigid even though no actual \"filled\" matter is touching. Solidity is an *electromagnetic* phenomenon, not a geometric one.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "In one sentence each, state the conceptual \"zoom-in\" hierarchy from a piece of everyday matter down to the most fundamental level recognised by the Standard Model. (4 steps)", "answer": "- Step 1: A piece of matter is made of **atoms**.\n- Step 2: Each atom has a tiny dense **nucleus** surrounded by an **electron cloud**.\n- Step 3: The nucleus is composed of **protons and neutrons** (collectively, nucleons).\n- Step 4: Each nucleon is itself made of three **quarks** (uud for proton, udd for neutron), and quarks — along with electrons (leptons) — are believed to be **fundamental**, with no further substructure.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": false}], "count": 27}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "When we \"zoom in\" on matter, what is the hierarchy of structure from a bulk object down to the most fundamental particles currently known? (4 steps)", "answer": "- Step 1: At the largest scale we have **bulk matter**, which is composed of **atoms**. Atoms are the smallest unit that retains the chemical identity of an element.\n- Step 2: Zooming into an atom, we find a tiny dense **nucleus** at the center, surrounded by a cloud of **electrons**. Almost all the mass sits in the nucleus, but almost all the volume is the electron cloud (empty space).\n- Step 3: Zooming into the nucleus, we find **protons** and **neutrons** (collectively called nucleons), bound together by the strong force.\n- Step 4: Zooming into a proton or neutron, we find **quarks** — these are (as far as we know) fundamental, meaning they have no smaller substructure.\n\nSo the chain is: matter → atoms → nucleus + electrons → protons + neutrons → quarks.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": true}, {"question": "Why is it accurate to say \"an atom is mostly empty space\" even though atoms have definite mass and size?", "answer": "The nucleus contains essentially all of the atom's mass but occupies only a tiny fraction of its volume — the nucleus is roughly $$10^{-15}$$ m across while the atom is roughly $$10^{-10}$$ m across, so the nucleus is about 100,000 times smaller in radius than the atom. The rest of the volume is filled by the electron cloud, which itself is mostly empty (electrons are point-like). The atom feels solid because electromagnetic forces between electron clouds repel other atoms, not because the space is physically filled with matter.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "State the charge and approximate mass (in atomic mass units) of the proton, neutron, and electron, and explain why the electron's mass is often neglected in nuclear calculations. (3 steps)", "answer": "- Step 1: **Proton**: charge $$+1e$$, mass $$\\approx 1\\,\\text{u}$$. **Neutron**: charge $$0$$, mass $$\\approx 1\\,\\text{u}$$. **Electron**: charge $$-1e$$, mass $$\\approx \\tfrac{1}{1836}\\,\\text{u}$$.\n- Step 2: The electron is about **1836 times lighter** than a nucleon, so even an atom with many electrons has nearly all its mass concentrated in the nucleus.\n- Step 3: For nuclear-physics problems (binding energy, mass defect, atomic mass), the electron contribution is usually below the precision we care about, so we neglect it. It matters in chemistry and atomic spectra, where electron behaviour dominates.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "What are quarks, and what role do they play in the structure of matter?", "answer": "Quarks are **fundamental particles** — they have no known internal structure — and they are the building blocks of protons, neutrons, and other particles called hadrons. In the ESAT picture, the two quarks we care about are the **up quark** (charge $$+\\tfrac{2}{3}e$$) and the **down quark** (charge $$-\\tfrac{1}{3}e$$). They are bound together inside nucleons by the **strong force**, which is mediated by gluons. We never observe a free quark — they are always confined inside composite particles.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "What is the quark composition of a proton, and how do the quark charges add up to give the proton's overall charge? (3 steps)", "answer": "- Step 1: A proton is made of **two up quarks and one down quark** (uud).\n- Step 2: Adding the charges: $$+\\tfrac{2}{3} + \\tfrac{2}{3} - \\tfrac{1}{3}$$.\n- Step 3: This simplifies to $$\\tfrac{4}{3} - \\tfrac{1}{3} = +1$$, matching the experimentally measured proton charge of $$+1e$$.\n\nThe fractional charges of quarks were originally proposed precisely so that integer-charged nucleons could emerge from three-quark combinations.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "What is the quark composition of a neutron, and how do the quark charges produce its net charge? (3 steps)", "answer": "- Step 1: A neutron is made of **one up quark and two down quarks** (udd).\n- Step 2: Adding the charges: $$+\\tfrac{2}{3} - \\tfrac{1}{3} - \\tfrac{1}{3}$$.\n- Step 3: This gives $$\\tfrac{2}{3} - \\tfrac{2}{3} = 0$$, matching the neutron being electrically neutral.\n\nImportantly, the neutron is **not** \"nothing inside\" — it has charged constituents that happen to cancel. This is why neutrons can still have a magnetic moment.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "A hypothetical particle is made of three up quarks (uuu). What would its charge be, and why don't we usually deal with this in ESAT? (2 steps)", "answer": "- Step 1: Charge $$= +\\tfrac{2}{3} + \\tfrac{2}{3} + \\tfrac{2}{3} = +2e$$. This is real — it's called the $$\\Delta^{++}$$ baryon.\n- Step 2: We don't deal with it for ESAT because such particles are unstable and only appear in high-energy collisions; everyday matter is built from protons and neutrons (the lightest, stable uud and udd combinations).\n\nThis shows quarks can in principle combine in many ways — nature just stabilises only a few.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "Why do quark charges come in thirds ($$\\pm\\tfrac{1}{3}, \\pm\\tfrac{2}{3}$$) rather than nice integer values?", "answer": "It's an empirical fact reflecting deeper symmetries in the Standard Model (specifically the $$SU(3)$$ colour symmetry and how quarks couple to the electroweak force). The \"thirds\" are exactly what's required so that any allowed combination of three quarks (baryons) or quark–antiquark pair (mesons) produces an **integer** total charge. So you never see a free particle with a fractional charge — confinement ensures only integer-charged composites escape. The fractions are real and measurable inside nucleons via deep inelastic scattering experiments.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "What is the Standard Model of particle physics, and what are its three main categories of particles? (3 steps)", "answer": "- Step 1: The Standard Model is the best current theory of fundamental particles and their interactions (excluding gravity).\n- Step 2: The three categories are:\n+ **Quarks** — make up hadrons like protons and neutrons (6 types: up, down, charm, strange, top, bottom).\n+ **Leptons** — include the electron, muon, tau, and their neutrinos. They are fundamental and not made of quarks.\n+ **Gauge bosons** — force carriers that mediate interactions between matter particles.\n- Step 3: For ESAT, the key idea is that **electrons are leptons, not quarks** — they sit in a totally different family from the constituents of nucleons.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "Match each fundamental force to its mediating particle (gauge boson), and order the forces by relative strength. (3 steps)", "answer": "- Step 1: The pairings are:\n+ **Strong force** → gluons (binds quarks in nucleons; binds nucleons in nuclei).\n+ **Electromagnetic force** → photons (binds electrons to nuclei; chemistry).\n+ **Weak force** → W and Z bosons (responsible for beta decay).\n+ **Gravity** → graviton (still theoretical, never directly detected).\n- Step 2: Relative strength (at nuclear scale, roughly): strong $$\\gg$$ electromagnetic $$\\gg$$ weak $$\\gg$$ gravity.\n- Step 3: The strong force is about 100× stronger than EM, but acts only over $$\\sim 10^{-15}$$ m, which is why it dominates inside the nucleus but is irrelevant in chemistry.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "A common misconception is that \"an electron is just a small proton with opposite charge.\" Why is this wrong? (3 steps)", "answer": "- Step 1: They have opposite charges of equal magnitude, which is the only thing that's similar.\n- Step 2: A proton is a **composite** particle made of three quarks bound by the strong force. An electron is a **fundamental lepton** with no internal structure.\n- Step 3: They differ in mass by a factor of $$\\sim 1836$$, they obey different interactions (electrons don't feel the strong force, protons do), and they belong to different particle families. The charge match is a deep symmetry of the Standard Model, not evidence they are the \"same thing.\"", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "What is the key difference between nuclear fission and nuclear fusion, and which one powers stars? (3 steps)", "answer": "- Step 1: **Fission** = a **heavy** nucleus (e.g. uranium) splits into lighter nuclei, releasing energy. Used in nuclear power plants and atomic bombs.\n- Step 2: **Fusion** = **light** nuclei (e.g. hydrogen isotopes) combine to form a heavier nucleus, also releasing energy. This powers **stars** including the Sun.\n- Step 3: Both release energy because the products have **less mass per nucleon** than the reactants (more strongly bound), and the missing mass becomes energy via $$E = mc^2$$. The \"iron peak\" at mass number ~56 is the turning point — below it, fusion releases energy; above it, fission does.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "Why does a neutron, despite being electrically neutral overall, still interact with magnetic fields?", "answer": "Because the neutron is not truly \"empty\" inside — it contains an up quark and two down quarks, each carrying electric charge ($$+\\tfrac{2}{3}, -\\tfrac{1}{3}, -\\tfrac{1}{3}$$). These charges cancel to give zero **net** charge, but the spatial arrangement and motion of the charged constituents creates a non-zero **magnetic moment**. So the neutron behaves like a tiny magnet, which is exploited in techniques like neutron scattering and magnetic resonance imaging research.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "Briefly summarise the three types of radioactive emission (alpha, beta, gamma) by their nature and penetrating ability. (3 steps)", "answer": "- Step 1: **Alpha** ($$\\alpha$$) — a helium-4 nucleus (2 protons + 2 neutrons). Heavy, $$+2e$$, stopped by a few cm of air or a sheet of paper. Highly ionising.\n- Step 2: **Beta** ($$\\beta^-$$) — a fast electron emitted when a neutron converts to a proton inside the nucleus. Charge $$-1e$$, light, penetrates a few mm of aluminium.\n- Step 3: **Gamma** ($$\\gamma$$) — a high-energy photon (electromagnetic radiation), no charge, no mass, only attenuated (never fully stopped) by thick lead or concrete. Least ionising but most penetrating.\n\nThe trade-off: heavy/charged particles ionise strongly but lose energy quickly, so they don't travel far.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "What does \"half-life\" mean conceptually, and what would the activity of a sample look like after, say, three half-lives compared to the start? (3 steps)", "answer": "- Step 1: Half-life ($$t_{1/2}$$) is the time taken for half of the radioactive nuclei in a sample to decay (equivalently, for the activity to drop to half).\n- Step 2: After one half-life $$\\to \\tfrac{1}{2}$$ remains; after two $$\\to \\tfrac{1}{4}$$; after three $$\\to \\tfrac{1}{8}$$.\n- Step 3: So after 3 half-lives, only 12.5% of the original radioactive nuclei (and activity) is left. The decay is **exponential**, not linear — this is because each nucleus has a fixed probability per unit time of decaying, independent of how many others have already decayed.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "Name the main sources of background radiation that a person on Earth is continuously exposed to.", "answer": "The main contributions are:\n+ **Radon gas** from rocks and soil (often the largest natural contributor indoors).\n+ **Cosmic rays** from space, more intense at high altitudes.\n+ **Terrestrial radiation** from naturally radioactive isotopes in rocks, building materials, and even our own bodies (e.g. potassium-40).\n+ **Medical sources** like X-rays and nuclear medicine scans.\n+ **Artificial sources** from nuclear power, weapons testing fallout, and industrial uses.\n\nThe key concept: background radiation is **always present**, so any measured activity must be corrected by subtracting the background count.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "If you tried to \"pull a single quark out\" of a proton, what would happen, and what physics principle does this illustrate? (3 steps)", "answer": "- Step 1: The strong force between quarks does **not** weaken with distance — unlike the electromagnetic force, it stays roughly constant (or even grows) as you separate them.\n- Step 2: As you pull, you put more and more energy into the \"colour string\" between the quarks. Eventually, this stored energy becomes large enough to spontaneously create a new quark–antiquark pair from the vacuum (via $$E = mc^2$$).\n- Step 3: Instead of getting a free quark, you get two new composite particles. This is called **quark confinement**, and it's why we never observe an isolated quark in any experiment.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": true}, {"question": "A student says: \"The proton's charge comes from its two up quarks, since they're the positive ones.\" Why is this reasoning incomplete? (2 steps)", "answer": "- Step 1: It's true the two up quarks contribute $$+\\tfrac{4}{3}e$$, but the down quark contributes $$-\\tfrac{1}{3}e$$, and you **must** include this negative contribution to get the correct total of $$+1e$$.\n- Step 2: The proton's charge isn't due to the up quarks \"alone\" — it emerges from the **sum** of all three quark charges. Ignoring the down quark would predict a proton charge of $$+\\tfrac{4}{3}e$$, which is wrong.\n\nThe lesson: in composite systems, always sum all constituent charges, including the cancelling ones.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "Compare the relative scales of an atom, a nucleus, and a quark in rough orders of magnitude — no exact recall needed. (3 steps)", "answer": "- Step 1: An atom is roughly $$10^{-10}$$ m across (an Ångström).\n- Step 2: A nucleus is roughly $$10^{-15}$$ m across (a femtometre) — about **100,000 times smaller** than the atom.\n- Step 3: Quarks are believed to be **point-like** down to at least $$10^{-18}$$ m in current experiments — so at least 1000 times smaller than a nucleon. We have no evidence they have any size at all.\n\nThe huge atom-to-nucleus ratio is why Rutherford's gold foil experiment showed most alpha particles passed straight through.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "Why is the strong force needed inside the nucleus — i.e. why isn't electromagnetism enough to hold things together? (3 steps)", "answer": "- Step 1: Protons all carry positive charge, so they **electromagnetically repel** each other very strongly at nuclear distances ($$\\sim 10^{-15}$$ m).\n- Step 2: Without an additional attractive force, no nucleus with more than one proton could exist — yet we see stable nuclei with up to ~82 protons.\n- Step 3: The **strong nuclear force** is short-ranged but extremely powerful at nuclear distances, overpowering the EM repulsion between protons and binding all nucleons together. Beyond about $$10^{-15}$$ m it drops off rapidly, which is why very large nuclei become unstable (EM repulsion starts to win across the whole nucleus).", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": true}, {"question": "A particle has charge $$-1e$$ and is found to be fundamental (no internal structure). Could it be a down quark, and how can you tell? (3 steps)", "answer": "- Step 1: A down quark is fundamental, but its charge is $$-\\tfrac{1}{3}e$$, not $$-1e$$.\n- Step 2: A particle with $$-1e$$ and no substructure matches the **electron** (a lepton), or its heavier cousins the muon or tau.\n- Step 3: So the answer is no — the charge tells us immediately it can't be a quark. This is a useful sanity check: any free, isolated particle you observe will have an integer charge, ruling out single quarks.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "Why does gravity, despite being the force we feel most in daily life, play essentially no role inside an atom? (3 steps)", "answer": "- Step 1: Gravity scales with **mass**, and particle masses are tiny ($$\\sim 10^{-27}$$ kg for a proton).\n- Step 2: At atomic scales, the electromagnetic force between a proton and electron is roughly $$10^{39}$$ times stronger than the gravitational attraction between them.\n- Step 3: So inside atoms, gravity is utterly negligible. We feel gravity on macroscopic scales only because it always **adds up** (mass can't be negative), while EM forces tend to cancel out in bulk neutral matter.\n\nThis is also why unifying gravity with the Standard Model is so hard — at the quantum level it's just too weak to test directly.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": true}], "count": 22}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 3357, "out_tokens": 10111, "reasoning_chars": 3633, "cost_eur": 0 hars": 8764}}};
const SK='auto_physics_20260627_physics_with_alex_matter';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
