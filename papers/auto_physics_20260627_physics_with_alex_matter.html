tral **nucleus** (containing protons and neutrons) surrounded by a much larger **electron cloud** (the region where electrons are found). Visually, if the nucleus were a marble at the centre of a football stadium, the electron cloud would extend to the stands — that's the scale of emptiness.\n- Step 2: Virtually all the atom's mass is concentrated in the nucleus (protons and neutrons are each ~1 u), while the electron cloud contributes negligibly to mass (each electron is only ~1/1836 u) but accounts for nearly all the atom's volume. The atom is mostly empty space.\n\nThe atom is a \"heavy tiny core inside a vast light cloud.\"", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "Why is the atom often described as \"mostly empty space\"? What two quantities support this description? (2 steps)", "answer": "- Step 1: **Mass distribution** — Over 99.97% of the atom's mass is in the nucleus (protons + neutrons), yet the nucleus occupies an incredibly tiny fraction of the atom's volume (roughly 1 part in $$10^{15}$$ by volume).\n- Step 2: **Volume distribution** — The electron cloud defines the atom's size (diameter ~$$10^{-10}$$ m), but the nucleus is ~$$10^{-15}$$ m across. The ratio of diameters is about 100,000:1, meaning the volume ratio is roughly $$(10^5)^3 = 10^{15}$$ to 1. So almost all the atom's volume contains nothing solid — just the probability of finding an electron.\n\n\"Mostly empty space\" means: mass packed into a speck, volume spread over a vast region with almost nothing in it.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "A student says \"the nucleus is heavy because protons and neutrons are heavy, and the electron cloud is light because electrons are light.\" Is this reasoning correct? Explain precisely. (2 steps)", "answer": "- Step 1: The reasoning is partially correct but imprecise. It's true that protons and neutrons each have mass ~1 u while an electron has mass ~1/1836 u, so per particle the nucleons are much heavier.\n- Step 2: However, the real reason the nucleus accounts for nearly all atomic mass is a combination of two facts: (1) each nucleon is ~1836 times heavier than an electron, AND (2) there are typically more nucleons than electrons in neutral atoms (for atoms with many neutrons). Even in hydrogen (1 proton, 1 electron), the proton is 1836× heavier. So the nucleus dominates mass because of the per-particle mass ratio, not just a vague \"they're heavy.\"\n\nThe key quantitative insight: a single nucleon outweighs an electron by a factor of ~1836.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "What are the charge and approximate mass (in atomic mass units) of a proton, a neutron, and an electron? Which two particles have nearly the same mass? (2 steps)", "answer": "- Step 1: The three subatomic particles have the following properties:\n  + Proton: charge = $$+1e$$, mass ≈ 1 u\n  + Neutron: charge = $$0$$, mass ≈ 1 u\n  + Electron: charge = $$-1e$$, mass ≈ $$\\frac{1}{1836}$$ u\n- Step 2: The proton and neutron have nearly the same mass (~1 u each). The electron is roughly 1836 times lighter. This is why the nucleus (protons + neutrons) accounts for almost all atomic mass.\n\nThe proton and neutron are \"siblings\" in mass; the electron is the lightweight outsider.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "A student claims: \"A neutron has no charge, so it must have no mass either.\" Why is this wrong? What is the conceptual confusion? (2 steps)", "answer": "- Step 1: Charge and mass are **independent properties** of a particle. A particle's charge determines how it interacts electromagnetically; its mass determines its inertia and gravitational interaction. There is no rule that links zero charge to zero mass.\n- Step 2: The neutron has zero net charge (its internal quarks have charges that cancel) but its mass is approximately 1 u — nearly identical to a proton's mass. The confusion likely comes from equating \"neutral\" with \"nothing,\" but neutrality only means no electromagnetic interaction, not absence of substance.\n\nZero charge ≠ zero mass. The neutron is massive but electrically invisible.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "If protons and neutrons are both made of quarks, what does this tell us about the fundamental vs. composite nature of particles? Which particles in the atom are truly fundamental? (2 steps)", "answer": "- Step 1: Protons and neutrons are **composite** particles — they are made of smaller, more fundamental particles called quarks. They can be broken down conceptually into their quark constituents.\n- Step 2: The **electron** is a fundamental particle — it is not made of anything smaller (as far as current physics knows). It belongs to the lepton family, which are point-like particles with no internal structure. So within the atom, quarks and electrons are fundamental; protons and neutrons are composite.\n\nQuarks and electrons are the truly elementary building blocks of atoms.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "What is the quark composition of a proton? Verify that the charges add up correctly. (2 steps)", "answer": "- Step 1: A proton is composed of **two up quarks and one down quark**, written as **uud**.\n- Step 2: The up quark has charge $$+\\frac{2}{3}e$$ and the down quark has charge $$-\\frac{1}{3}e$$. Adding up:\n  + $$+\\frac{2}{3} + \\frac{2}{3} - \\frac{1}{3} = \\frac{2+2-1}{3} = \\frac{3}{3} = +1e$$\n  + This matches the proton's charge of $$+1e$$. ✓\n\nThe proton's +1 charge emerges from the fractional charges of its quarks summing to a whole number.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "What is the quark composition of a neutron? Verify that the charges add up correctly. (2 steps)", "answer": "- Step 1: A neutron is composed of **one up quark and two down quarks**, written as **udd**.\n- Step 2: Adding the charges:\n  + $$+\\frac{2}{3} - \\frac{1}{3} - \\frac{1}{3} = \\frac{2-1-1}{3} = \\frac{0}{3} = 0$$\n  + This matches the neutron's charge of 0. ✓\n\nThe neutron's neutrality comes from its quark charges perfectly canceling.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "A student says: \"Since a neutron has no charge, its quarks must all be neutral.\" Is this correct? Explain what's really happening. (2 steps)", "answer": "- Step 1: This is incorrect. The quarks inside a neutron are **not** neutral — the up quark has charge $$+\\frac{2}{3}e$$ and each down quark has charge $$-\\frac{1}{3}e$$. These are non-zero, fractional charges.\n- Step 2: What makes the neutron neutral is that the charges **cancel out** when summed: $$+\\frac{2}{3} - \\frac{1}{3} - \\frac{1}{3} = 0$$. This is like a bank account with +$200 and -$200: the net is zero, but the individual transactions aren't zero. The neutron has internal charge structure even though its net charge is zero.\n\nZero net charge ≠ no internal charges. The quarks carry charge; they just sum to zero.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": true}, {"question": "Why must the charges of up and down quarks be fractions of $$e$$ (specifically $$+\\frac{2}{3}$$ and $$-\\frac{1}{3}$$) rather than whole numbers? What would go wrong with whole-number quark charges? (2 steps)", "answer": "- Step 1: If quarks had whole-number charges, then combining three quarks (as in protons and neutrons) would always give a whole-number total charge. But we need the proton to have charge $$+1$$ and the neutron to have charge $$0$$, and we need them to differ by swapping just one quark (swapping one up for one down changes a proton into a neutron).\n- Step 2: The fractional charges are the unique solution that satisfies both compositions simultaneously:\n  + Proton (uud): $$q_u + q_u + q_d = +1$$\n  + Neutron (udd): $$q_u + q_d + q_d = 0$$\n  + Solving: from the neutron equation, $$q_u = -2q_d$$. Substituting into the proton equation: $$-2q_d - 2q_d + q_d = +1$$, so $$-3q_d = +1$$, giving $$q_d = -\\frac{1}{3}$$ and $$q_u = +\\frac{2}{3}$$.\n\nThe fractional charges aren't arbitrary — they're mathematically forced by the requirement that uud = +1 and udd = 0.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": true}, {"question": "A proton and a neutron differ by exactly one quark. Which quark is swapped, and what is the charge difference caused by that swap? (2 steps)", "answer": "- Step 1: A proton is **uud** and a neutron is **udd**. The difference is that one **up quark** in the proton is replaced by a **down quark** in the neutron.\n- Step 2: The charge difference from this swap is:\n  + Charge removed: $$+\\frac{2}{3}e$$ (up quark)\n  + Charge added: $$-\\frac{1}{3}e$$ (down quark)\n  + Net change: $$-\\frac{1}{3} - \\frac{2}{3} = -1e$$\n  + So the neutron has 1 unit less charge than the proton, which is exactly what we observe: proton = +1, neutron = 0.\n\nSwapping one up for one down changes the total charge by exactly $$-1e$$.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "If you changed a neutron's quark composition from udd to uuu, what would the charge of this hypothetical particle be? Is this a particle observed in nature? (2 steps)", "answer": "- Step 1: Calculate the charge of uuu:\n  + $$\\frac{2}{3} + \\frac{2}{3} + \\frac{2}{3} = \\frac{6}{3} = +2e$$\n  + This hypothetical particle would have charge +2e.\n- Step 2: A uuu particle does exist — it's called the **Delta++ baryon** ($$\\Delta^{++}$$). It's a real but unstable particle with a very short lifetime (~$$10^{-24}$$ s). It's not found in ordinary matter because it decays almost instantly into a proton and a pion. This shows that not all quark combinations are stable; only uud (proton) and udd (neutron, when bound in a nucleus) are long-lived.\n\nNot all three-quark combinations are stable — the universe selects only a few to persist.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": true}, {"question": "What are the three families of fundamental particles in the Standard Model, and what role does each family play? (3 steps)", "answer": "- Step 1: **Quarks** — these are the matter particles that combine in groups of three to form protons, neutrons, and other hadrons. There are six flavours (up, down, charm, strange, top, bottom), but for ESAT only up and down are essential.\n- Step 2: **Leptons** — these are fundamental matter particles that do NOT interact via the strong force. The electron is the most familiar lepton. Others include the muon, tau, and their corresponding neutrinos.\n- Step 3: **Gauge bosons** — these are force-carrier particles. They mediate the fundamental forces between matter particles. Each of the four fundamental forces has (or is predicted to have) an associated gauge boson.\n\nThe Standard Model organizes everything into: matter (quarks + leptons) and force carriers (gauge bosons).", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "Match each fundamental force to its gauge boson carrier. Which one is still theoretical? (2 steps)", "answer": "- Step 1: The four fundamental forces and their carriers are:\n  + **Strong force** → **Gluons** (holds quarks together inside protons and neutrons, and holds nucleons together in the nucleus)\n  + **Electromagnetic force** → **Photons** (mediates interactions between charged particles)\n  + **Weak force** → **W and Z bosons** (responsible for beta decay and other nuclear processes)\n  + **Gravity** → **Gravitons** (predicted but not yet observed experimentally)\n- Step 2: The **graviton** is theoretical — it has not been detected. Gravity is the only fundamental force whose gauge boson remains unconfirmed. This is partly because gravity is extremely weak at the particle level, making graviton detection extraordinarily difficult.\n\nThree forces have confirmed carriers; gravity's carrier remains a prediction.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "Why can't the electromagnetic force hold the nucleus together, even though protons have positive charges that could attract electrons? What force actually holds the nucleus together, and why doesn't it cause problems for electrons? (3 steps)", "answer": "- Step 1: The electromagnetic force would **repel** protons from each other (like charges repel), not hold them together. Proton-proton repulsion in the nucleus is enormous at nuclear distances.\n- Step 2: The **strong force** (carried by gluons) holds quarks together inside nucleons and provides a residual strong force that binds protons and neutrons together in the nucleus, overcoming the electromagnetic repulsion. The strong force is much stronger than EM at very short ranges (~$$10^{-15}$$ m).\n- Step 3: The strong force does not affect electrons because electrons are **leptons**, not quarks. The strong force only acts on particles with colour charge (quarks and gluons). Electrons only participate in electromagnetic, weak, and gravitational interactions.\n\nThe nucleus stays together because the strong force (short-range, powerful) beats EM repulsion; electrons don't feel the strong force at all.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "A student says: \"Gravity is the strongest force because it holds galaxies together.\" Why is this reasoning flawed when discussing fundamental forces at the particle level? (2 steps)", "answer": "- Step 1: Gravity is actually the **weakest** of the four fundamental forces by an enormous margin. At the particle level, the gravitational attraction between two protons is roughly $$10^{36}$$ times weaker than their electromagnetic repulsion. Gravity only appears strong at astronomical scales because it has infinite range AND it only has one sign of \"charge\" (mass is always positive), so it always adds up constructively.\n- Step 2: The other forces either have limited range (strong, weak) or have both attractive and repulsive charges that can cancel (electromagnetic). Gravity's cumulative, never-cancelling nature makes it dominant at large scales, but at the subatomic level it is utterly negligible.\n\nGravity is the weakest force per interaction but the most cumulative — scale determines which force wins.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "What is the key difference between beta-minus decay and beta-plus decay in terms of what happens at the quark level? (3 steps)", "answer": "- Step 1: In **beta-minus decay** ($$\\beta^-$$), a neutron converts into a proton. At the quark level, a **down quark** in the neutron changes into an **up quark**: $$d \\rightarrow u + e^- + \\bar{\\nu}_e$$. The composition changes from udd → uud.\n- Step 2: In **beta-plus decay** ($$\\beta^+$$), a proton converts into a neutron. At the quark level, an **up quark** changes into a **down quark**: $$u \\rightarrow d + e^+ + \\nu_e$$. The composition changes from uud → udd.\n- Step 3: In both cases, a single quark changes flavour (up ↔ down), and the weak force (mediated by W bosons) is responsible for this transformation. This is why beta decay is a weak-force process — only the weak force can change quark flavours.\n\nBeta decay = one quark changes flavour; the weak force is the only force that can do this.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": true}, {"question": "In beta-minus decay, a neutron (udd) becomes a proton (uud). Which quark changed, and does the resulting charge make sense? Verify. (2 steps)", "answer": "- Step 1: Comparing udd (neutron) to uud (proton), one **down quark** has become an **up quark**. The other two quarks (one up, one down) are unchanged.\n- Step 2: Charge verification:\n  + Before: $$+\\frac{2}{3} - \\frac{1}{3} - \\frac{1}{3} = 0$$ (neutron)\n  + After: $$+\\frac{2}{3} + \\frac{2}{3} - \\frac{1}{3} = +1$$ (proton)\n  + The charge increased by +1, which is balanced by the emitted electron (charge -1) and antineutrino (charge 0): total charge conserved at $$0 = +1 - 1 + 0$$. ✓\n\nQuark-level change: d → u. Charge conservation requires the electron to carry away the -1.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "What are the three types of nuclear radiation, and how do they differ in terms of what particles/energy they involve? (2 steps)", "answer": "- Step 1: The three types are:\n  + **Alpha ($$\\alpha$$)** — emission of a helium nucleus (2 protons + 2 neutrons). It has charge +2e and is relatively heavy.\n  + **Beta ($$\\beta$$)** — emission of an electron ($$\\beta^-$$) or positron ($$\\beta^+$$). It has charge ±1e and is much lighter than alpha.\n  + **Gamma ($$\\gamma$$)** — emission of a high-energy photon (electromagnetic radiation). It has zero charge and zero rest mass.\n- Step 2: In terms of penetrating power: alpha is stopped by paper/skin, beta is stopped by a few mm of aluminium, and gamma requires thick lead or concrete. In terms of ionizing power, the order reverses: alpha is most ionizing, gamma is least.\n\nAlpha = heavy and charged, Beta = light and charged, Gamma = massless and uncharged.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "When an unstable nucleus emits an alpha particle, how do the atomic number and mass number change? If the original nucleus had $$Z = 88$$ and $$A = 226$$ (radium), what are the new values? (2 steps)", "answer": "- Step 1: An alpha particle is a helium nucleus ($${}^{4}_{2}\\text{He}$$), so it carries away 2 protons and 2 neutrons. This means:\n  + Atomic number decreases by 2: $$Z_{\\text{new}} = Z - 2$$\n  + Mass number decreases by 4: $$A_{\\text{new}} = A - 4$$\n- Step 2: For radium-226 ($$Z = 88$$, $$A = 226$$):\n  + $$Z_{\\text{new}} = 88 - 2 = 86$$ (radon)\n  + $$A_{\\text{new}} = 226 - 4 = 222$$\n  + Result: Radon-222 ($${}^{222}_{86}\\text{Rn}$$)\n\nAlpha emission: subtract 2 from Z, subtract 4 from A — the nucleus \"shrinks\" significantly.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "What is half-life, and why can't we predict exactly when a single particular nucleus will decay? (2 steps)", "answer": "- Step 1: **Half-life** is the time it takes for half the nuclei in a radioactive sample to decay. It's a statistical property of a large ensemble, not a clock on any single nucleus. After one half-life, $$N = N_0/2$$; after two, $$N = N_0/4$$; and so on.\n- Step 2: We cannot predict when a single nucleus will decay because radioactive decay is a **random, probabilistic process** at the individual level. Each nucleus has a constant probability of decaying per unit time, but there's no \"timer\" that determines the exact moment. This is a fundamental feature of quantum mechanics — we can only give probabilities, not certainties, for individual events.\n\nHalf-life governs populations, not individuals — like life-expectancy statistics for a country vs. knowing when one specific person will die.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "A sample has a half-life of 10 minutes. After 30 minutes, what fraction of the original radioactive nuclei remain? (2 steps)", "answer": "- Step 1: 30 minutes corresponds to $$30/10 = 3$$ half-lives. Each half-life halves the remaining nuclei.\n- Step 2: After 3 half-lives:\n  + After 1st: $$\\frac{1}{2}$$ remains\n  + After 2nd: $$\\frac{1}{4}$$ remains\n  + After 3rd: $$\\frac{1}{8}$$ remains\n  + So $$\\frac{1}{8}$$ (or 12.5%) of the original nuclei remain.\n\nGeneral rule: after $$n$$ half-lives, fraction remaining = $$(\\frac{1}{2})^n$$.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "What is the difference between nuclear fission and nuclear fusion? Give the key distinction in terms of what happens to the nucleus and which part of the periodic table each process involves. (2 steps)", "answer": "- Step 1: **Nuclear fission** is the splitting of a **heavy** nucleus (like uranium or plutonium) into two lighter nuclei, plus neutrons and energy. It occurs when a heavy nucleus becomes unstable (often after absorbing a neutron) and breaks apart.\n- Step 2: **Nuclear fusion** is the combining of two **light** nuclei (like hydrogen isotopes) into a heavier nucleus, releasing energy. It powers the Sun and requires extremely high temperatures and pressures to overcome the electrostatic repulsion between the positively charged nuclei.\n\nFission = heavy splits → lighter (uranium → barium + krypton). Fusion = light combines → heavier (hydrogen → helium). Both release energy, but from opposite ends of the periodic table.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "Why does both fission (splitting heavy nuclei) and fusion (combining light nuclei) release energy? What single principle explains both? (3 steps)", "answer": "- Step 1: The key principle is **binding energy per nucleon**. Nuclei near iron-56 (A ≈ 56) have the highest binding energy per nucleon — they are the most tightly bound, most stable configurations.\n- Step 2: For nuclei **heavier** than iron, the binding energy per nucleon decreases. Splitting a very heavy nucleus into two medium-mass nuclei moves each fragment closer to the iron peak, increasing binding energy per nucleon. The difference is released as energy. This is fission.\n- Step 3: For nuclei **lighter** than iron, the binding energy per nucleon increases rapidly with mass number. Combining two light nuclei into a heavier one moves the product closer to the iron peak, again increasing binding energy per nucleon and releasing energy. This is fusion.\n\nBoth processes move toward the iron peak of maximum stability — fission from above, fusion from below.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": true}, {"question": "Name four sources of background radiation. Which one is typically the largest contributor in many locations? (2 steps)", "answer": "- Step 1: The four main sources are:\n  + **Radon gas from rocks** — radioactive radon seeps from uranium-bearing rocks (granite, etc.) into the air, especially in buildings\n  + **Cosmic rays** — high-energy particles from space that bombard Earth's atmosphere\n  + **Medical sources** — X-rays, radiotherapy, nuclear medicine\n  + **Nuclear industry / weapons testing** — a smaller contributor in most locations\n- Step 2: **Radon gas** is typically the largest single source of background radiation in many countries (often ~50% of total background dose), because it accumulates in enclosed spaces like basements and homes built on certain rock types.\n\nRadon from rocks > cosmic rays > medical > nuclear — the ground beneath you is the biggest source.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "A student says: \"Background radiation is only a problem near nuclear power plants.\" Why is this incorrect? (2 steps)", "answer": "- Step 1: Background radiation is **everywhere** — it comes from natural sources that exist across the entire planet. Radon gas emanates from rocks worldwide, cosmic rays reach every location on Earth, and even food contains radioactive isotopes (like potassium-40 in bananas).\n- Step 2: Nuclear power plants contribute only a tiny fraction to total background radiation, even in nearby areas. The dominant sources (radon, cosmic rays, medical) are natural or unrelated to the nuclear industry. Living in a granite-rich area (like Cornwall, UK) can expose you to more radiation than living near a nuclear plant.\n\nBackground radiation is a universal, mostly natural phenomenon — not an industrial artifact.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "The electron is classified as a \"lepton\" rather than a quark. What does this mean about its structure and the forces it experiences? (2 steps)", "answer": "- Step 1: Being a lepton means the electron is a **fundamental particle** with no internal structure — it is not made of anything smaller. Unlike protons and neutrons (which are made of quarks), the electron is point-like as far as we can measure.\n- Step 2: Because it is not a quark, the electron does **not** experience the strong force. It participates in electromagnetic interactions (it has charge -1e), weak interactions (it can be involved in beta decay), and gravitational interactions (it has mass). But it cannot be bound by gluons or participate in strong-force processes.\n\nLeptons = no quarks inside = no strong force. The electron's world is electromagnetic and weak.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "If a nucleus has 6 protons and 8 neutrons, how many up quarks and down quarks does it contain in total? (2 steps)", "answer": "- Step 1: Each proton is uud (2 up + 1 down), and each neutron is udd (1 up + 2 down). Calculate for all nucleons:\n  + 6 protons: $$6 \\times 2 = 12$$ up quarks, $$6 \\times 1 = 6$$ down quarks\n  + 8 neutrons: $$8 \\times 1 = 8$$ up quarks, $$8 \\times 2 = 16$$ down quarks\n- Step 2: Total quarks:\n  + Up quarks: $$12 + 8 = 20$$\n  + Down quarks: $$6 + 16 = 22$$\n  + Verify charge: $$20 \\times \\frac{2}{3} + 22 \\times (-\\frac{1}{3}) = \\frac{40}{3} - \\frac{22}{3} = \\frac{18}{3} = +6e$$ ✓ (matches 6 protons)\n\nThe quark count is straightforward: just multiply the quark composition of each nucleon type by how many of that nucleon you have.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "Why are free quarks never observed in nature? What keeps them confined? (2 steps)", "answer": "- Step 1: Quarks are held together by the **strong force**, carried by gluons. Unlike the electromagnetic force (which weakens with distance), the strong force has a property called **confinement**: the force between quarks does not decrease with distance. As you try to pull quarks apart, the energy in the gluon field increases.\n- Step 2: If you pull hard enough, the energy stored in the field becomes sufficient to create new quark-antiquark pairs from the vacuum (via $$E = mc^2$$). Instead of freeing a single quark, you end up with new composite particles. This is why quarks are always found bound in groups (hadrons) — they are **confined** and cannot exist in isolation.\n\nPull quarks apart → energy builds → new quarks form → you get more hadrons, never free quarks.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "A sample of 800 radioactive nuclei has a half-life of 6 hours. Roughly how many nuclei will remain after 18 hours? (1 step)", "answer": "- Step 1: 18 hours = 3 half-lives. After each half-life, the number halves:\n  + After 6 hr: 400\n  + After 12 hr: 200\n  + After 18 hr: 100\n  + So approximately **100 nuclei** remain.\n\nSimple halving three times: 800 → 400 → 200 → 100.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "In alpha decay, the daughter nucleus has a different element identity than the parent. Why does changing the proton number change the element? (2 steps)", "answer": "- Step 1: An element is defined by its **atomic number Z** (the number of protons in the nucleus). Every atom with 6 protons is carbon, every atom with 8 protons is oxygen, regardless of how many neutrons it has.\n- Step 2: Alpha decay removes 2 protons from the nucleus, so $$Z$$ decreases by 2. This means the daughter nucleus belongs to a different element (the one 2 positions to the left on the periodic table). For example, uranium (Z=92) → thorium (Z=90). The chemical properties change completely because the electron configuration rearranges to match the new Z.\n\nChange the proton count → change the element → change the chemistry. Z is the element's identity card.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "Why is the weak force called \"weak\"? Compared to what, and in what context is it actually important? (2 steps)", "answer": "- Step 1: The weak force is called \"weak\" because at everyday energy scales, its effective strength is much less than both the strong force and the electromagnetic force. Its coupling constant is ~$$10^{-6}$$ times that of the strong force.\n- Step 2: Despite being \"weak,\" it is the **only force that can change quark flavours** (e.g., converting a down quark to an up quark in beta decay). Without the weak force, nuclear transmutation wouldn't occur, the Sun wouldn't fuse hydrogen into helium (the first step requires the weak force), and the universe would be a very different place.\n\n\"Weak\" in strength but unique in capability — it's the only force that can change one type of quark into another.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "If the strong force is so strong, why doesn't it pull all the protons and neutrons in the universe together into one giant nucleus? (2 steps)", "answer": "- Step 1: The strong force (or more precisely, the **residual strong force** that binds nucleons together) has a very **short range** — it only operates effectively over distances of about 1-3 femtometres ($$10^{-15}$$ m). Beyond this range, it drops off extremely rapidly to essentially zero.\n- Step 2: Beyond the nuclear range, the electromagnetic repulsion between protons (which has infinite range, decreasing as $$1/r^2$$) dominates. So for nucleons that are far apart, EM repulsion wins and they cannot be pulled together by the strong force. Only when nucleons are already extremely close (within a nucleus) does the strong force overcome EM repulsion.\n\nShort range is the key: strong force wins at close quarters, but can't reach across distances larger than a nucleus.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": true}, {"question": "An atom of carbon-12 has 6 protons and 6 neutrons. How many of each type of fundamental particle (up quarks, down quarks, electrons) are present in this neutral atom? (2 steps)", "answer": "- Step 1: Count quarks in the nucleus:\n  + 6 protons (each uud): $$6 \\times 2 = 12$$ up quarks, $$6 \\times 1 = 6$$ down quarks\n  + 6 neutrons (each udd): $$6 \\times 1 = 6$$ up quarks, $$6 \\times 2 = 12$$ down quarks\n  + Total: **18 up quarks** and **18 down quarks**\n- Step 2: A neutral atom has the same number of electrons as protons, so there are **6 electrons** (which are fundamental leptons, not made of quarks).\n\nCarbon-12: 18 up quarks + 18 down quarks + 6 electrons = the complete fundamental particle count.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": false}, {"question": "A student says: \"The photon carries the electromagnetic force, so whenever light shines on something, the electromagnetic force is being transferred.\" Is this a fair statement? Explain. (2 steps)", "answer": "- Step 1: This is essentially correct. When two charged particles interact electromagnetically, the interaction is mediated by the exchange of virtual photons. And when real photons (light) are absorbed or emitted by charged particles, that too is an electromagnetic interaction — the photon is indeed the carrier of the electromagnetic force.\n- Step 2: However, there's a subtlety: the photons that mediate the force between two charges at rest are **virtual photons** (they exist only as intermediate exchange particles and cannot be directly detected). The photons in a beam of light are **real photons** that can be detected. Both are photons, both carry electromagnetic interaction, but virtual photons are force-mediators while real photons are observable radiation.\n\nYes, light involves EM force transfer — but the \"messenger\" photons between static charges are virtual, while the photons in a light beam are real.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": true}, {"question": "If a radioactive isotope has a half-life of 2 years, and you start with 160 g of it, approximately how much will remain after 6 years? (1 step)", "answer": "- Step 1: 6 years = 3 half-lives. Each half-life halves the mass:\n  + After 2 yr: 80 g\n  + After 4 yr: 40 g\n  + After 6 yr: 20 g\n  + So approximately **20 g** remain.\n\nThree halvings: 160 → 80 → 40 → 20.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "Why can't beta particles (electrons emitted in beta decay) be considered \"orbital electrons\" that were already in the atom's electron cloud? Where do they actually come from? (2 steps)", "answer": "- Step 1: Beta particles are created **during the decay process itself** — they did not exist before the decay. They are produced when a neutron converts to a proton (beta-minus) or a proton converts to a neutron (beta-plus) inside the nucleus. The electron (or positron) is emitted from the nucleus as a new particle.\n- Step 2: The orbital electrons surrounding the atom are separate from the beta particle. The beta particle is created via the weak interaction (a down quark → up quark + electron + antineutrino), and it is ejected from the nucleus with high kinetic energy. It is a genuinely new particle, not one that was \"waiting\" inside the nucleus.\n\nBeta particles are born in the nucleus during quark flavour change — they are not pre-existing orbital electrons.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": false}, {"question": "Synthesis question: A neutral atom undergoes beta-minus decay. After the decay, what is the charge state of the resulting atom (ion), and why? (3 steps)", "answer": "- Step 1: In beta-minus decay, a neutron becomes a proton, so the atomic number Z increases by 1. The nucleus gains one unit of positive charge.\n- Step 2: Before decay, the atom was neutral: number of orbital electrons = original Z. After decay, the nucleus has charge +(Z+1)e, but the orbital electrons are unchanged (still Z of them) because the decay happens inside the nucleus and doesn't directly affect the electron cloud.\n- Step 3: Therefore, the atom now has Z orbital electrons but a nucleus with charge +(Z+1)e. The atom is a **singly charged positive ion** (+1). The emitted beta particle (electron) flies away and is not part of the atom.\n\nBeta-minus decay turns a neutral atom into a +1 ion because the nuclear charge increases but the electron count doesn't immediately adjust.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": false}, {"question": "Synthesis question: If you could remove all the electrons from a carbon-12 atom, what would the remaining object be, and what would its total charge be? Express this in terms of quark content. (3 steps)", "answer": "- Step 1: Removing all electrons leaves just the bare nucleus — 6 protons and 6 neutrons. This is a fully ionized carbon nucleus (sometimes called a \"carbon ion\" or \"bare carbon nucleus\").\n- Step 2: The charge comes only from the protons: $$6 \\times (+1e) = +6e$$. The neutrons contribute 0 charge.\n- Step 3: In quark terms: 18 up quarks ($$18 \\times +\\frac{2}{3} = +12e$$) and 18 down quarks ($$18 \\times -\\frac{1}{3} = -6e$$). Net: $$+12e - 6e = +6e$$. ✓ This confirms the charge from both the proton-count and quark-count perspectives.\n\nA fully ionized atom = bare nucleus with charge +Ze, confirmed by counting either protons or quarks.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": true}, {"question": "Edge case: Could a nucleus consist of only neutrons (zero protons)? Why or why not? (2 steps)", "answer": "- Step 1: A nucleus with zero protons would have atomic number Z = 0, meaning no element identity and no electrons. A single free neutron exists but decays via beta-minus decay with a half-life of about 10 minutes (a down quark → up quark, turning it into a proton).\n- Step 2: A multi-neutron \"nucleus\" (sometimes called a neutron cluster) is not stable because: (1) without the attractive proton-neutron and proton-proton strong-force contributions, the binding is too weak; (2) free neutrons decay. Only in neutron stars, where gravitational pressure is immense, do vast numbers of neutrons exist together — but that's not a nucleus in the normal sense.\n\nZero protons = no stable nucleus. Neutrons alone can't form bound nuclear matter without protons (except under extreme gravity).", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": false}, {"question": "Counterexample check: Can a nucleus exist with only one proton and zero neutrons? What element is this, and is it stable? (1 step)", "answer": "- Step 1: Yes — this is **hydrogen-1** (protium), the most common isotope in the universe. It consists of a single proton with no neutrons. It is completely stable (the proton does not decay as far as we know). This is the simplest possible nucleus.\n\nA single proton alone is a perfectly valid, stable nucleus — hydrogen-1 proves that neutrons are not mandatory for a nucleus to exist.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": false}, {"question": "Misconception probe: \"A proton is positive because it has more up quarks than down quarks.\" Is this the correct way to think about it? What's the precise reasoning? (2 steps)", "answer": "- Step 1: The statement is directionally true but imprecise. A proton (uud) does have more up quarks (2) than down quarks (1), and the up quark has a more positive charge than the down quark. However, the real reason the proton is positive is that the **sum of the individual quark charges equals +1**: $$\\frac{2}{3} + \\frac{2}{3} - \\frac{1}{3} = +1$$.\n- Step 2: The \"more up quarks\" logic breaks down in edge cases. Consider a hypothetical particle with 3 down quarks (ddd): it has more down quarks than up quarks, but its charge would be $$-\\frac{1}{3} \\times 3 = -1$$, not simply \"negative because more down quarks.\" The charge depends on the specific fractional values, not just which type outnumbers the other.\n\nIt's the arithmetic of fractional charges that matters, not just which quark type is more numerous.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": true}, {"question": "The gauge boson for the electromagnetic force is the photon, which has zero mass. The gauge bosons for the weak force (W and Z) are very massive. How does this mass difference explain the difference in range between these two forces? (2 steps)", "answer": "- Step 1: The range of a force is related to the mass of its gauge boson. A massless boson (like the photon) can travel arbitrarily far, giving the electromagnetic force an **infinite range** (decreasing as $$1/r^2$$).\n- Step 2: Massive bosons (W and Z, ~80-90× the proton mass) require energy to create and can only exist for extremely short times (by the uncertainty principle, $$\\Delta t \\sim \\hbar / \\Delta E$$). This limits their range to about $$10^{-18}$$ m, making the weak force extremely **short-range** — far shorter than even the strong force.\n\nMassless carrier → infinite range (EM). Massive carrier → tiny range (weak). Boson mass is the range-limiting factor.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": true}, {"question": "Simple exercise: An atom has 11 protons and 12 neutrons. How many up quarks and down quarks does the nucleus contain? (1 step)", "answer": "- Step 1: Count quarks:\n  + 11 protons (uud): $$11 \\times 2 = 22$$ up quarks, $$11 \\times 1 = 11$$ down quarks\n  + 12 neutrons (udd): $$12 \\times 1 = 12$$ up quarks, $$12 \\times 2 = 24$$ down quarks\n  + Total: **34 up quarks** and **35 down quarks**\n\nQuick check: charge = $$34 \\times \\frac{2}{3} + 35 \\times (-\\frac{1}{3}) = \\frac{68 - 35}{3} = \\frac{33}{3} = +11e$$ ✓ (matches 11 protons)", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": false}, {"question": "Simple exercise: A radioactive isotope has a half-life of 5 minutes. If you start with 400 nuclei, roughly how many remain after 15 minutes? (1 step)", "answer": "- Step 1: 15 minutes = 3 half-lives.\n  + After 5 min: 200\n  + After 10 min: 100\n  + After 15 min: 50\n  + Approximately **50 nuclei** remain.\n\n400 → 200 → 100 → 50. Three halvings.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": false}], "count": 45}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "An atom has a nucleus and an electron cloud. Where is most of the atom's *mass* concentrated, and where is most of its *volume* occupied? Why are these two answers different? (3 steps)", "answer": "- Step 1: Most of the atom's **mass** is concentrated in the **nucleus**, because protons and neutrons each have a mass of roughly $$1 \\text{ u}$$ (atomic mass unit), while electrons are only $$\\sim \\frac{1}{1836} \\text{ u}$$ — almost negligible in comparison.\n- Step 2: However, most of the atom's **volume** is **empty space** occupied by the electron cloud. The nucleus is extremely tiny compared to the full atom — roughly $$\\frac{1}{10{,}000}$$ of the atom's diameter. If the nucleus were a marble at the center of a football stadium, the electrons would be somewhere in the stands, and everything between would be vacant.\n- Step 3: The reason these differ is that mass depends on particle count and type (heavy nucleons vs light electrons), while volume depends on how far the electrons extend outward. The electrons define the atom's boundary, but they barely contribute to its weight.\n\nThe atom is simultaneously \"mostly empty\" and \"mostly heavy in the center\" — these are not contradictory, they describe different properties.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": true}, {"question": "A proton has charge $$+1e$$ and mass $$\\sim 1 \\text{ u}$$, a neutron has charge $$0$$ and mass $$\\sim 1 \\text{ u}$$, and an electron has charge $$-1e$$ and mass $$\\sim \\frac{1}{1836} \\text{ u}$$. What does this mass comparison tell you about the electron's role in the atom's total mass? (2 steps)", "answer": "- Step 1: Since the electron's mass is roughly $$\\frac{1}{1836}$$ of a nucleon's mass, even if an atom has many electrons (e.g., 50 in a heavy element), the total electron mass is still only $$\\frac{50}{1836} \\approx 0.027 \\text{ u}$$ — a tiny fraction compared to the 50 protons and ~50 neutrons contributing ~100 u.\n- Step 2: This means the electron is **structurally crucial** (it defines chemistry, bonding, and the atom's size) but **mass-wise negligible**. When calculating atomic mass, you can effectively ignore the electrons and just count nucleons.\n\nThe electron is the atom's \"architect\" (determining shape and interactions) but not its \"brick\" (contributing significant weight).", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "A common misconception is that a neutron might be a proton with an electron stuck to it (since proton is $$+1$$ and electron is $$-1$$, giving net charge $$0$$, and both are found in the nucleus). Why is this model wrong? (3 steps)", "answer": "- Step 1: If a neutron were a proton + electron, the neutron's mass should be roughly $$1 \\text{ u} + \\frac{1}{1836} \\text{ u} \\approx 1.0005 \\text{ u}$$, slightly heavier than a proton. In reality, the neutron is indeed slightly heavier, but only by about $$0.0014 \\text{ u}$$ — and more importantly, the internal structure is completely different.\n- Step 2: A neutron is made of **three quarks** (udd), not two particles bundled together. A proton is also three quarks (uud). They are **siblings at the same structural level**, not a parent-child combination. You can't build one from the other by just attaching an electron.\n- Step 3: Additionally, in **beta decay**, a neutron *converts* into a proton + electron + antineutrino. This transformation happens through the **weak force** changing a down quark into an up quark inside the neutron — it's a fundamental internal rearrangement, not \"an electron falling off.\"\n\nThe neutron is its own distinct composite particle, not a proton with an electron accessory.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": true}, {"question": "What are quarks, and why are they called \"fundamental\" particles — what does that word mean in contrast to \"composite\"? (2 steps)", "answer": "- Step 1: Quarks are the building blocks that make up protons and neutrons. Each proton or neutron contains exactly **three quarks** bound together by the strong force. Quarks are called **fundamental** because, as far as current physics knows, they have no internal structure — they cannot be broken down into anything smaller.\n- Step 2: This contrasts with **composite** particles like protons and neutrons, which *are* made of smaller parts (quarks). The electron is also fundamental (no known sub-structure), while the atom is composite (made of nucleus + electrons), and the nucleus is composite (made of protons + neutrons).\n\nFundamental = indivisible (no smaller parts known); Composite = assembled from smaller parts.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "A proton is composed of the quark combination \"uud.\" What does each letter stand for, and how many of each type are present? (2 steps)", "answer": "- Step 1: Each letter represents a quark **flavour**: **u** = up quark, **d** = down quark. The notation \"uud\" lists all three quarks in the proton: two up quarks and one down quark.\n- Step 2: So the proton contains exactly **2 up quarks** and **1 down quark**. This specific combination is what defines a proton — any other combination of three quarks (like uuu or ddd) would not be a proton.\n\nThe identity of a composite particle is determined by the specific recipe of its constituent quarks.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "A neutron is composed of the quark combination \"udd.\" How does this differ from the proton's composition, and what does this single swap imply about the relationship between protons and neutrons? (3 steps)", "answer": "- Step 1: The neutron has **1 up quark** and **2 down quarks** (udd), whereas the proton has **2 up quarks** and **1 down quark** (uud). The difference is a single swap: one up quark is replaced by one down quark.\n- Step 2: This means protons and neutrons are **very closely related** — they are nearly identical in mass (both ~1 u) and in structure, differing only by one quark flavour. They are sometimes collectively called **nucleons** because they both reside in the nucleus and behave similarly under the strong nuclear force.\n- Step 3: The single quark swap also explains the charge difference: replacing an up quark ($$+\\frac{2}{3}$$) with a down quark ($$-\\frac{1}{3}$$) reduces the total charge by exactly $$1$$ (from $$+1$$ to $$0$$), which is precisely the charge difference between a proton and a neutron.\n\nProtons and neutrons are \"siblings\" — one quark swap apart in composition, charge, and identity.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "What is the electric charge of an up quark, expressed in units of the elementary charge $$e$$? (2 steps)", "answer": "- Step 1: The up quark has a charge of $$+\\frac{2}{3}e$$. This is a **fractional charge** — it does not equal a whole number of $$e$$, which is surprising because all observed free particles have integer charges ($$0, \\pm 1, \\pm 2, ...$$).\n- Step 2: Fractional charges are possible for quarks because quarks are **never observed alone** (a phenomenon called *color confinement*). They always combine in groups such that the total charge is an integer. Two up quarks give $$+\\frac{4}{3}e$$, and adding one down quark ($$-\\frac{1}{3}e$$) yields $$+\\frac{3}{3}e = +1e$$ — a proton's whole-number charge.\n\nFractional quark charges are hidden by confinement — nature only lets us see whole-number charges in free particles.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "What is the electric charge of a down quark, expressed in units of the elementary charge $$e$$? (2 steps)", "answer": "- Step 1: The down quark has a charge of $$-\\frac{1}{3}e$$. Like the up quark, this is fractional — specifically, one-third of the elementary charge, and negative.\n- Step 2: Notice the symmetry: up is $$+\\frac{2}{3}e$$ and down is $$-\\frac{1}{3}e$$. The difference between them is exactly $$+1e$$ ($$\\frac{2}{3} - (-\\frac{1}{3}) = 1$$). This means swapping one up quark for one down quark in any three-quark combination changes the total charge by exactly $$-1e$$, which is why proton → neutron (one such swap) drops the charge from $$+1e$$ to $$0$$.\n\nThe up-down charge difference of exactly $$1e$$ elegantly explains why proton and neutron differ by one unit of charge.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "Starting from the quark composition of a proton (uud) and the individual quark charges, derive the proton's total charge step by step. (3 steps)", "answer": "- Step 1: Write out each quark and its charge:\n+ First up quark: $$+\\frac{2}{3}e$$\n+ Second up quark: $$+\\frac{2}{3}e$$\n+ Down quark: $$-\\frac{1}{3}e$$\n- Step 2: Add the charges algebraically: $$+\\frac{2}{3}e + \\frac{2}{3}e - \\frac{1}{3}e = \\frac{4}{3}e - \\frac{1}{3}e = \\frac{3}{3}e$$\n- Step 3: Simplify: $$\\frac{3}{3}e = +1e$$, which matches the proton's known charge of $$+1e$$. The three fractional charges combine to produce a whole-number charge, consistent with what we observe in nature.\n\nThis derivation confirms that the proton's charge emerges naturally from its quark recipe — no arbitrary adjustment needed.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "Starting from the quark composition of a neutron (udd) and the individual quark charges, derive the neutron's total charge step by step. (3 steps)", "answer": "- Step 1: Write out each quark and its charge:\n+ Single up quark: $$+\\frac{2}{3}e$$\n+ First down quark: $$-\\frac{1}{3}e$$\n+ Second down quark: $$-\\frac{1}{3}e$$\n- Step 2: Add the charges: $$+\\frac{2}{3}e - \\frac{1}{3}e - \\frac{1}{3}e = \\frac{2}{3}e - \\frac{2}{3}e$$\n- Step 3: Simplify: $$\\frac{2}{3}e - \\frac{2}{3}e = 0$$, which matches the neutron's known charge of $$0$$ (electrically neutral). The positive contribution from the one up quark is exactly cancelled by the two down quarks.\n\nThe neutron's neutrality is a perfect arithmetic cancellation — one up quark's $$+\\frac{2}{3}e$$ is exactly balanced by two down quarks' $$-\\frac{2}{3}e$$.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": true}, {"question": "Suppose you encounter a hypothetical three-quark particle with composition \"uud\" but are told it is *not* a proton. Under normal Standard Model rules, why is this impossible — what defines a proton's identity? (2 steps)", "answer": "- Step 1: In the Standard Model, a proton is **defined** by its quark composition uud (two up quarks + one down quark) bound together via the strong force. There is no other particle with the exact same quark content — the combination uud uniquely identifies the proton.\n- Step 2: Other three-quark combinations exist (e.g., uuu, ddd, uds) but they form **different particles** (like the Delta baryons or the Sigma baryons) with different charges, masses, and properties. The quark recipe is the particle's identity — change the recipe, change the particle.\n\nA particle's identity card is its quark composition — uud means proton, nothing else.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": true}, {"question": "The Standard Model organizes all known fundamental particles into three broad categories. Name each category and give a brief description of what kind of particle belongs in it. (3 steps)", "answer": "- Step 1: **Quarks** — fundamental particles that carry fractional electric charge and combine in groups of three (or quark-antiquark pairs) to form composite particles like protons and neutrons. They also participate in the strong force.\n- Step 2: **Leptons** — fundamental particles that do **not** participate in the strong force. The most familiar lepton is the electron. Other leptons include muons and neutrinos. They carry integer charges (e.g., $$-1e$$ for electron, $$0$$ for neutrino).\n- Step 3: **Gauge bosons** — fundamental particles that **mediate (carry) forces** between other particles. They are the \"messengers\" of interactions: gluons for the strong force, photons for electromagnetism, W/Z bosons for the weak force, and (theoretically) gravitons for gravity.\n\nQuarks build matter, leptons are lighter matter, gauge bosons are the force-carriers — three distinct roles in the Standard Model.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "What is a lepton, and how does the electron qualify as one? What key property distinguishes leptons from quarks? (2 steps)", "answer": "- Step 1: A **lepton** is a fundamental particle that does not experience the **strong force** (the force that binds quarks together inside nucleons). The electron is a lepton because it cannot be trapped inside a nucleus by the strong force — it only interacts via electromagnetism and the weak force.\n- Step 2: This is the critical distinction: **quarks feel the strong force** (and are therefore confined inside composite particles), while **leptons do not** (and can exist freely as independent particles — you can isolate an electron, but you can never isolate a single quark).\n\nLeptons are \"free spirits\" — they escape strong-force confinement; quarks are \"prisoners\" — always locked inside larger particles.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": true}, {"question": "What are gauge bosons, and why are they described as \"force carriers\"? What would happen to interactions between particles if gauge bosons didn't exist? (3 steps)", "answer": "- Step 1: **Gauge bosons** are fundamental particles whose role is to **mediate interactions** (forces) between other particles. When two particles exert a force on each other (e.g., two electrons repelling), they do so by exchanging gauge bosons.\n- Step 2: The analogy is two people on roller skates throwing a heavy ball back and forth — each throw pushes the thrower backward and each catch pushes the catcher backward, creating an effective \"repulsion\" at a distance. The ball is the gauge boson; the people are the particles.\n- Step 3: If gauge bosons didn't exist, there would be **no mechanism** for forces to act at a distance. Particles would not repel, attract, or transform each other — the universe would have no structure, no atoms, no chemistry, no light.\n\nGauge bosons are the universe's \"postal service\" — without them, no particle could \"communicate\" with any other.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "Which gauge boson carries the **strong force**, and what does this force do? Why is it called \"strong\"? (3 steps)", "answer": "- Step 1: The **gluon** carries the strong force. Gluons are exchanged between quarks, binding them tightly together inside protons, neutrons, and other composite particles.\n- Step 2: The strong force is called \"strong\" because it is by far the **most powerful** of the four fundamental forces at short distances — roughly $$100$$ times stronger than electromagnetism at the nuclear scale. It must be this strong to overcome the electromagnetic repulsion between two positively-charged protons packed into a tiny nucleus.\n- Step 3: Gluons themselves also carry the \"charge\" of the strong force (called *colour charge*), which means gluons interact with **other gluons** as well as with quarks. This self-interaction is unique among force carriers and is what makes the strong force so powerful and confining.\n\nThe gluon is the \"glue\" (hence the name) that holds quarks together so tightly they can never escape.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "Which gauge boson carries the **electromagnetic force**, and between what types of particles does it mediate interactions? (2 steps)", "answer": "- Step 1: The **photon** carries the electromagnetic force. Any particle with electric charge — including electrons, protons, quarks, and ions — exchanges photons to experience electromagnetic attraction or repulsion.\n- Step 2: Photons are **massless**, which means the electromagnetic force has **infinite range** (it weakens with distance but never reaches zero). This is why two electrons separated by metres still repel each other, and why magnets can work across a gap.\n\nThe photon is the \"light particle\" — it carries both everyday forces (magnetism, static electricity) and actual light itself.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "Which gauge bosons carry the **weak force**, and what is the weak force's primary role in nuclear physics? Why is it called \"weak\"? (3 steps)", "answer": "- Step 1: The **W boson** (both $$W^+$$ and $$W^-$$) and the **Z boson** ($$Z^0$$) carry the weak force. These are heavy, massive particles — much heavier than a proton.\n- Step 2: The weak force's primary role is **transforming** one type of quark into another (e.g., a down quark into an up quark). This is the mechanism behind **beta decay**: a neutron's down quark converts to an up quark via the weak force, turning the neutron into a proton, and emitting an electron and antineutrino.\n- Step 3: It is called \"weak\" because at everyday energies and distances, its effects are far less prominent than the strong or electromagnetic forces. Its interactions are rare and short-range (due to the heavy W/Z bosons, which can only travel a tiny distance before decaying).\n\nThe weak force is nature's \"identity swapper\" — it changes particle types, enabling nuclear decays that the other forces cannot trigger.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "Which gauge boson is proposed to carry **gravity**, and why is it described as \"theoretical\" rather than confirmed? (3 steps)", "answer": "- Step 1: The **graviton** is the proposed gauge boson for gravity. If it exists, it would be massless (giving gravity infinite range) and carry no electric charge.\n- Step 2: It is called \"theoretical\" because **no graviton has ever been detected experimentally**. Unlike photons, gluons, and W/Z bosons — all of which have been observed in particle accelerators — the graviton remains purely a prediction of theoretical frameworks (like certain quantum gravity models).\n- Step 3: Gravity is extraordinarily weak compared to the other forces (roughly $$10^{-38}$$ times weaker than the strong force at the particle scale), making any individual graviton nearly impossible to detect. Our current best theory of gravity is **General Relativity**, which describes gravity as spacetime curvature — not as a particle exchange — so the graviton's existence is still an open question.\n\nThe graviton is the \"missing messenger\" — gravity works, but we don't yet know if it has a particle carrier like the other three forces.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "A student claims: \"Photons only carry visible light — they have nothing to do with forces between charged particles.\" Why is this statement wrong? (2 steps)", "answer": "- Step 1: The photon is the gauge boson for **all** electromagnetic interactions — not just visible light. Visible light, radio waves, X-rays, microwaves, and the repulsive force between two electrons are **all** mediated by the same particle: the photon. The difference is only in the photon's energy/frequency, not its identity.\n- Step 2: When two charged particles interact (e.g., an electron orbiting a proton), they exchange **virtual photons** — photons that exist transiently as part of the interaction and are not directly observable as \"light.\" These virtual photons are the mechanism behind Coulomb attraction/repulsion, magnetism, and all electromagnetic phenomena.\n\nEvery electromagnetic phenomenon — from a magnet on your fridge to a laser beam — is photons doing different jobs at different energies.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "Rank the four fundamental forces from strongest to weakest at the nuclear/particle scale, and state each force's approximate range. (3 steps)", "answer": "- Step 1: From strongest to weakest at the particle scale:\n+ **Strong force** — strongest by far (~100× electromagnetism); range ~$$10^{-15}$$ m (nuclear scale, very short)\n+ **Electromagnetic force** — moderate strength; range infinite (photon is massless)\n+ **Weak force** — very weak at low energies; range ~$$10^{-18}$$ m (even shorter than strong, due to heavy W/Z bosons)\n+ **Gravity** — weakest by an enormous factor (~$$10^{-38}$$ × strong force at particle scale); range infinite (if graviton exists, it would be massless)\n- Step 2: The pattern is: **stronger forces tend to have shorter ranges** (strong and weak are confined to the nucleus), while **weaker forces reach farther** (electromagnetism and gravity operate across cosmic distances).\n- Step 3: This ranking explains everyday reality: nuclear structure is dominated by the strong force (it must overpower EM repulsion between protons), atoms are held together by electromagnetism, and large-scale structure (planets, stars) is shaped by gravity — because at large distances, only gravity and electromagnetism still act.\n\nAt the particle scale: strong wins; at the cosmic scale: gravity wins — each force dominates its own domain.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": true}, {"question": "Alpha radiation involves the emission of an alpha particle. What exactly is an alpha particle in terms of protons and neutrons, and what element does it correspond to? (2 steps)", "answer": "- Step 1: An alpha particle consists of **2 protons** and **2 neutrons** — identical to the nucleus of a **helium-4 atom** ($$^4_2\\text{He}$$). It has charge $$+2e$$ and mass approximately $$4 \\text{ u}$$.\n- Step 2: When a heavy nucleus emits an alpha particle, the original nucleus loses 2 protons and 2 neutrons, so its atomic number drops by 2 (it becomes a different element) and its mass number drops by 4. This is why alpha decay always **transmutes** the element.\n\nAlpha decay is the nucleus \"ejecting a helium package\" — a chunk of 2 protons + 2 neutrons that flies away as radiation.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "Beta radiation involves a neutron transforming into a proton (or vice versa). At the quark level, what exactly happens inside the neutron during beta-minus decay? (3 steps)", "answer": "- Step 1: In beta-minus decay, a **neutron** (udd: one up quark + two down quarks) converts into a **proton** (uud: two up quarks + one down quark). At the quark level, one of the neutron's **down quarks changes into an up quark**.\n- Step 2: This quark transformation is mediated by the **weak force** (via a $$W^-$$ boson). The down quark emits a $$W^-$$ boson and becomes an up quark. The $$W^-$$ boson then quickly decays into an **electron** and an **antineutrino**, which are ejected from the nucleus.\n- Step 3: The result: the original nucleus gains one proton (atomic number increases by 1, mass number stays the same), and an electron + antineutrino fly out as the detectable beta radiation. The element transmutes to the next one in the periodic table.\n\nBeta-minus decay is a single quark identity swap (d → u) mediated by the weak force — the smallest possible change that transforms a neutron into a proton.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": true}, {"question": "Gamma radiation is different from alpha and beta in a fundamental way. What is gamma radiation, and why does it NOT change the element or mass number of the emitting nucleus? (2 steps)", "answer": "- Step 1: Gamma radiation is the emission of a **high-energy photon** from a nucleus. It occurs when a nucleus in an **excited state** (with excess internal energy) releases that energy by emitting a photon, transitioning to a lower-energy state.\n- Step 2: Since a photon carries **energy** but **no mass or charge**, the nucleus retains all its protons and neutrons unchanged. The atomic number and mass number stay the same — only the nucleus's internal energy state changes. No transmutation occurs.\n\nGamma decay is the nucleus \"cooling down\" by releasing energy as light — the particle recipe stays the same, only the energy budget changes.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "What is half-life, and why is it a probabilistic concept rather than a deterministic countdown timer for individual atoms? (3 steps)", "answer": "- Step 1: **Half-life** is the time it takes for **half of the atoms** in a radioactive sample to decay. After one half-life, the count drops to $$\\frac{1}{2}$$; after two, to $$\\frac{1}{4}$$; after three, to $$\\frac{1}{8}$$, etc.\n- Step 2: It is **probabilistic** because we cannot predict *when* any specific individual atom will decay. Each atom has a constant **probability per unit time** of decaying, but the actual moment of decay is random. Some atoms decay early, some survive for many half-lives.\n- Step 3: Only for a **large collection** of atoms does the statistical average emerge reliably — roughly half will have decayed by the half-life mark. For a single atom, it could decay in the next second or survive for ten half-lives; we simply cannot know.\n\nHalf-life is a \"crowd statistic\" — it describes populations, not individuals. Think of it like average lifespan: you can't predict when one specific person will die, but you can predict how many in a large group will survive to a given age.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": true}, {"question": "Nuclear fission involves splitting a heavy nucleus. Why does this release energy — what makes heavy nuclei energetically \"unstable\" compared to medium-sized ones? (3 steps)", "answer": "- Step 1: In very heavy nuclei (like uranium-235), there are many protons packed together, creating strong **electromagnetic repulsion** between them. The strong force holds them together, but for large nuclei, the EM repulsion grows faster than the strong force's ability to compensate.\n- Step 1: The **binding energy per nucleon** peaks around iron (medium-sized nuclei). Heavy nuclei beyond iron have **lower binding energy per nucleon**, meaning each nucleon is less tightly bound. Splitting a heavy nucleus into two medium-sized nuclei moves each nucleon to a more tightly-bound configuration — releasing the energy difference.\n- Step 3: When uranium-235 fissions (e.g., into barium + krypton + neutrons), the total mass of the products is slightly **less** than the original mass. The \"missing\" mass is converted to energy via $$E = mc^2$$ — this is the enormous energy output of nuclear fission.\n\nFission releases energy because heavy nuclei are \"overstuffed\" — splitting them lets nucleons settle into more stable, tightly-bound arrangements, and the mass difference becomes energy.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": true}, {"question": "Nuclear fusion involves combining light nuclei. Why does fusion release energy, and why does it require extremely high temperatures? (3 steps)", "answer": "- Step 1: Very light nuclei (like hydrogen) have **low binding energy per nucleon**. When two light nuclei fuse into a heavier one (e.g., hydrogen → helium), each nucleon moves to a **more tightly bound** configuration, releasing the energy difference — just like fission, but on the opposite end of the mass scale.\n- Step 2: Fusion requires extremely high temperatures (millions of degrees) because the participating nuclei are **positively charged** and must overcome their **electromagnetic repulsion** to get close enough for the strong force to bind them. High temperature means high kinetic energy, giving nuclei enough speed to push through the EM barrier.\n- Step 3: Once the nuclei are within ~$$10^{-15}$$ m (the strong force's range), the strong force dominates and snaps them together, releasing far more energy per nucleon than fission (for light nuclei). This is why stars, powered by fusion, shine so brightly.\n\nFission works for heavy nuclei (relieving overstuffing); fusion works for light nuclei (building toward tighter binding) — both release energy by moving nucleons toward the iron peak of stability.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": true}, {"question": "Both fission and fusion release energy, yet they operate on opposite ends of the nuclear mass scale. What single concept explains why both processes can be exothermic? (2 steps)", "answer": "- Step 1: The key concept is **binding energy per nucleon**, which peaks around iron-56. Nuclei lighter than iron release energy when they **fuse** (moving toward the peak), and nuclei heavier than iron release energy when they **fission** (also moving toward the peak). Both processes move nucleons toward more tightly-bound configurations.\n- Step 2: Iron is the \"valley of stability\" — any nuclear rearrangement that moves closer to iron from either direction releases energy, just as a ball rolling toward the bottom of a valley from either side loses potential energy.\n\nIron-56 is the nuclear \"gold standard\" — both fission and fusion are just different routes downhill toward the same energetic valley.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": true}, {"question": "Background radiation comes from several natural and artificial sources. Name the main categories and give a brief example for each. (4 steps)", "answer": "- Step 1: **Cosmic rays** — high-energy particles (mostly protons) originating from the Sun and deep space, which strike the atmosphere and produce secondary radiation reaching the ground.\n- Step 2: **Rocks and soil** — certain minerals (especially those containing uranium and thorium) emit radiation. Radon gas, produced by uranium decay in rocks, is a significant natural source that can accumulate in buildings.\n- Step 3: **Medical sources** — X-rays, CT scans, and other diagnostic/procedures contribute a small but measurable portion of background radiation for people who undergo them.\n- Step 4: **Nuclear industry / weapons testing** — past nuclear weapons tests and current nuclear power operations contribute a trace amount, though this is generally small compared to natural sources.\n\nBackground radiation is mostly **natural** (cosmic + rocks dominate) — human activities add a small extra layer on top.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "Imagine \"zooming in\" on matter from the macroscopic level down to the most fundamental level described in the ESAT syllabus. List the hierarchy of structures you pass through, from largest to smallest. (4 steps)", "answer": "- Step 1: **Macroscopic matter** — everyday objects you can see and touch, made of molecules and compounds.\n- Step 2: **Atoms** — the basic units of elements. Each atom consists of a central nucleus and an surrounding electron cloud. Most of the atom's volume is empty space between the nucleus and the electrons.\n- Step 3: **Nucleus** — the dense core of the atom, containing **protons** (positive charge) and **neutrons** (neutral). Almost all the atom's mass is here.\n- Step 4: **Quarks** — the fundamental constituents of protons and neutrons. Each proton is uud (two up, one down); each neutron is udd (one up, two down). Quarks have no known sub-structure — this is the deepest level in the ESAT scope.\n\nThe zoom-in path: matter → atoms → nucleus → protons/neutrons → quarks. Each level reveals that what seemed indivisible is actually composite — until you reach truly fundamental particles.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "A hypothetical three-quark particle has the composition \"ud u\" (one down quark, two up quarks — same as a proton). Another hypothetical particle has composition \"udd\" (one up, two down — same as a neutron). Now consider a particle with composition \"uus\" where \"s\" is a strange quark with charge $$-\\frac{1}{3}e$$. What would its total charge be? (2 steps)", "answer": "- Step 1: Add the charges of the three quarks:\n+ Up quark: $$+\\frac{2}{3}e$$\n+ Up quark: $$+\\frac{2}{3}e$$\n+ Strange quark: $$-\\frac{1}{3}e$$\n- Step 2: Total charge = $$+\\frac{2}{3}e + \\frac{2}{3}e - \\frac{1}{3}e = \\frac{4}{3}e - \\frac{1}{3}e = \\frac{3}{3}e = +1e$$. This particle would have the same charge as a proton ($$+1e$$), but a different mass and identity because the strange quark is heavier than the down quark. (This is actually the Sigma-plus baryon, $$\\Sigma^+$$.)\n\nSame charge doesn't mean same particle — the quark \"flavour\" recipe determines identity, not just the arithmetic total.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": true}, {"question": "A student says: \"The strong force holds electrons in the atom — that's why they don't fly away.\" Identify the conceptual error and state which force actually binds electrons to the atom. (2 steps)", "answer": "- Step 1: This is wrong because **electrons are leptons**, and leptons **do not experience the strong force**. The strong force only acts between quarks (and between nucleons as a residual effect). It has no grip on electrons at all.\n- Step 2: The force that binds electrons to the nucleus is the **electromagnetic force** — specifically, the **Coulomb attraction** between the negatively-charged electron and the positively-charged proton(s) in the nucleus. This attraction is mediated by **photons**, not gluons.\n\nElectrons are held by electromagnetic \"pull,\" not strong-force \"glue\" — they're leptons, immune to the strong force.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": false}, {"question": "Why can't you isolate a single free quark from a proton, even though quarks are fundamental particles? What phenomenon prevents this? (3 steps)", "answer": "- Step 1: The phenomenon is called **colour confinement**. As you try to pull two quarks apart, the strong force between them (mediated by gluons) actually **gets stronger** with distance — unlike electromagnetism, which weakens with distance.\n- Step 2: The energy required to separate the quarks increases so rapidly that before you can pull them far enough apart, the energy input becomes sufficient to **create new quark-antiquark pairs** from the vacuum (via $$E = mc^2$$). The original quarks never emerge alone — new composite particles form instead.\n- Step 3: The analogy: imagine a rubber band that gets stronger the more you stretch it. Eventually, the band snaps — but instead of giving you two free ends, the snap creates two new ends connected by fresh rubber bands. You never get an isolated end.\n\nQuarks are like prisoners in a self-reinforcing cell: pulling harder doesn't free them — it just builds new walls.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": true}, {"question": "If the nucleus is only about $$\\frac{1}{10{,}000}$$ the diameter of the whole atom, why doesn't the electron cloud collapse inward and make the atom much smaller? What principle prevents this? (2 steps)", "answer": "- Step 1: Electrons are bound by the electromagnetic attraction to the nucleus, but they cannot collapse into it because of **quantum mechanics** — specifically, the uncertainty principle and quantized energy levels. An electron confined to a tiny volume would need enormous kinetic energy, making the tightly-confined state energetically unfavorable.\n- Step 2: The electron settles at a **balance point**: close enough to benefit from electromagnetic attraction, but spread out enough to keep its kinetic energy reasonable. This balance defines the atom's size — roughly $$10^{-10}$$ m for hydrogen — far larger than the nucleus ($$10^{-15}$$ m).\n\nThe atom's size is a quantum negotiation — attraction pulls the electron inward, but quantum uncertainty pushes it outward, and the compromise sets the atom's radius.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": true}, {"question": "In beta-minus decay, a neutron becomes a proton, and an electron and antineutrino are emitted. At the quark level, one down quark becomes one up quark. If instead a proton underwent beta-plus decay (converting to a neutron), what quark-level change would occur? (2 steps)", "answer": "- Step 1: Beta-plus decay reverses the process: a **proton** (uud) becomes a **neutron** (udd). At the quark level, one **up quark** must convert into a **down quark** — the opposite swap from beta-minus decay.\n- Step 2: This conversion is mediated by a $$W^+$$ boson (the positively-charged weak force carrier), which then decays into a **positron** (anti-electron, $$e^+$$) and a **neutrino**. The atomic number decreases by 1 (one proton lost, one neutron gained), and the element shifts one place back in the periodic table.\n\nBeta-plus decay is the mirror image of beta-minus: u → d instead of d → u, emitting a positron instead of an electron.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": false}, {"question": "The W and Z bosons are much heavier than a proton (~80-91 GeV/c² vs ~1 GeV/c² for a proton). Why does this large mass make the weak force **short-range** compared to the electromagnetic force carried by the massless photon? (2 steps)", "answer": "- Step 1: A force carrier's range is limited by how far it can travel before it must be \"re-absorbed\" to conserve energy. For a **massive** boson like the W or Z, creating it temporarily (as a virtual particle) requires \"borrowing\" a large amount of energy, which by the energy-time uncertainty principle can only be \"borrowed\" for a very **short time**.\n- Step 2: Short borrowing time → short travel distance → the W/Z boson can only mediate interactions within about $$10^{-18}$$ m. The massless **photon**, requiring no energy borrowing to exist temporarily, can travel arbitrarily far, giving electromagnetism infinite range.\n\nHeavy force carriers = short-range forces; massless force carriers = long-range forces — the boson's mass sets the force's reach.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": true}, {"question": "A sample of 800 radioactive atoms has a half-life of 2 hours. Roughly how many atoms remain undecayed after 6 hours, and what general pattern does this illustrate? (2 steps)", "answer": "- Step 1: 6 hours = 3 half-lives (each half-life is 2 hours). After each half-life, the count halves:\n+ After 1 half-life (2 h): $$800 \\rightarrow 400$$\n+ After 2 half-lives (4 h): $$400 \\rightarrow 200$$\n+ After 3 half-lives (6 h): $$200 \\rightarrow 100$$\n- Step 2: The pattern: after $$n$$ half-lives, the remaining count is $$N_0 \\times \\left(\\frac{1}{2}\\right)^n$$, where $$N_0$$ is the starting count. Here: $$800 \\times \\left(\\frac{1}{2}\\right)^3 = 800 \\times \\frac{1}{8} = 100$$.\n\nEach half-life cuts the population in half — after 3 half-lives, only $$\\frac{1}{8}$$ of the original remains. The decay is exponential, not linear.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": false}, {"question": "Radon gas is a significant source of background radiation from rocks. Why is radon particularly dangerous compared to other natural radioactive sources, even though it comes from the same rocks? (2 steps)", "answer": "- Step 1: Radon is a **gas**, unlike solid radioactive minerals embedded in rock. Being gaseous, radon can **seep out** of rocks and accumulate in enclosed spaces like basements and homes, where people breathe it in over long periods.\n- Step 2: Once inhaled, radon decays inside the lungs, emitting alpha particles directly into sensitive lung tissue. Alpha particles are highly damaging over short distances but can't penetrate skin from outside — inside the lungs, there's no skin barrier to protect the tissue.\n\nRadon is dangerous because
