it's a *mobile* radioactive source that delivers alpha radiation *inside* the body, bypassing the skin's natural shield.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": false}, {"question": "When uranium-235 undergoes fission, it typically splits into two lighter nuclei plus 2-3 free neutrons. Why are these free neutrons crucial for making fission useful as a power source? (2 steps)", "answer": "- Step 1: The free neutrons can strike **other uranium-235 nuclei**, triggering them to fission as well, releasing more neutrons, which trigger more fissions — this self-sustaining cascade is called a **chain reaction**.\n- Step 2: Without the free neutrons, each fission event would be an isolated incident with no amplification. The chain reaction allows a small initial trigger to produce a massive energy output — this is the principle behind both nuclear reactors (controlled chain reactions) and nuclear weapons (uncontrolled chain reactions).\n\nThe 2-3 neutrons per fission are the \"spark plugs\" of the chain reaction — each fission seeds the next, creating exponential energy release.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": false}, {"question": "Why does nuclear fusion require much higher temperatures than nuclear fission to occur? Contrast the energy barriers each process must overcome. (3 steps)", "answer": "- Step 1: **Fission** splits a heavy nucleus that is already unstable due to electromagnetic repulsion between its many protons. A relatively modest energy input (even a slow-moving neutron can trigger it) is sufficient because the nucleus is predisposed to break apart.\n- Step 2: **Fusion** forces two light, positively-charged nuclei together. They must overcome the **Coulomb barrier** — the electromagnetic repulsion between their protons — which requires enormous kinetic energy, corresponding to temperatures of millions of degrees.\n- Step 3: Only at these extreme temperatures do nuclei move fast enough to get within ~$$10^{-15}$$ m of each other, where the strong force can grab them and fuse them. Once past the Coulomb barrier, fusion releases far more energy per nucleon than fission (for light nuclei), but getting past that barrier is the hard part.\n\nFission is like pushing a fragile overloaded shelf — it wants to collapse. Fusion is like smashing two bouncing balls together — they resist collision until you throw them incredibly hard.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": false}, {"question": "The electron has charge $$-1e$$ and is a fundamental particle. The proton has charge $$+1e$$ and is a composite particle (uud). If you only looked at their charges, you might think they're \"mirror images.\" Why is this superficial symmetry misleading? (3 steps)", "answer": "- Step 1: Charge alone tells you nothing about **internal structure**. The electron is a single fundamental lepton with no sub-structure, while the proton is three quarks bound by gluons — they are completely different types of entities.\n- Step 2: Their **masses** are wildly asymmetric: the proton is ~1836 times heavier than the electron. This mass ratio determines atomic structure (the electron orbits the proton, not vice versa) and chemistry.\n- Step 3: Their **force interactions** differ: the proton feels the strong force (because its quarks carry colour charge), while the electron does not. The proton participates in nuclear binding; the electron only participates in chemical bonding and electromagnetic interactions.\n\nCharge symmetry ($$\\pm 1e$$) is a surface resemblance — underneath, the proton is a heavy, composite, strong-force participant, while the electron is a light, fundamental, strong-force outsider.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": false}], "count": 40}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Describe the structure of an atom, and explain where most of its mass and volume are located. (3 steps)", "answer": "- Step 1: An atom consists of a **nucleus** (containing protons and neutrons) surrounded by an **electron cloud** where electrons orbit.  \n- Step 2: **Mass distribution**: Protons and neutrons have masses ~1 atomic mass unit (u), while electrons are ~1/1836 u. Thus, **99.9% of an atom’s mass** is concentrated in the nucleus.  \n+ Example: A carbon-12 atom has 6 protons, 6 neutrons (~12 u total), and 6 electrons (~0.003 u total).  \n- Step 3: **Volume distribution**: Electrons occupy a much larger volume than the nucleus. The nucleus is ~1 femtometer (fm) in size, while the atom’s radius is ~0.1 nanometers (nm), making the atom **mostly empty space**.  \n+ Analogy: If the nucleus were a pea, the electron cloud would extend kilometers away.\n\n[Optional takeaway: The nucleus is tiny but dense; the atom’s bulk is electromagnetic force holding electrons in orbit.]", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why do electrons contribute negligibly to an atom’s mass, yet determine its chemical properties? (2 steps)", "answer": "- Step 1: **Mass contribution**: Electrons have ~1/1836 the mass of protons/neutrons. For example, oxygen-16 has 8 protons (8 u), 8 neutrons (8 u), and 8 electrons (~0.004 u), making electron mass insignificant.  \n- Step 2: **Chemical properties**: Electrons occupy orbitals and participate in bonding. The number and arrangement of outer-shell electrons dictate how atoms interact (e.g., sodium donates 1 electron, chlorine accepts 1).  \n\n[Optional takeaway: Mass comes from nucleus; chemistry comes from electrons.]", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "A proton has a charge of +1e. How do its constituent quarks (uud) produce this charge? (2 steps)", "answer": "- Step 1: Quark charges: Up quark = +2/3, down quark = -1/3.  \n- Step 2: Proton (uud): (2/3) + (2/3) + (-1/3) = (4/3 - 1/3) = +1.  \n+ Example: Neutron (udd): (2/3) + (-1/3) + (-1/3) = 0.  \n\n[Optional takeaway: Quark charges add linearly to give composite particles’ total charge.]", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Why isn’t a neutron considered a fundamental particle? (2 steps)", "answer": "- Step 1: **Fundamental particles** (like quarks/electrons) have no substructure.  \n- Step 2: A **neutron** is composed of three quarks (udd). This substructure means it’s a **composite particle**, not fundamental.  \n\n[Optional takeaway: Protons/neutrons are built from quarks; quarks/leptons are fundamental.]", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "Match these gauge bosons to their associated forces: gluons, photons, W/Z bosons, gravitons. (3 steps)", "answer": "- Step 1: **Strong force**: Gluons bind quarks in protons/neutrons and hold nuclei together.  \n- Step 2: **Electromagnetic force**: Photons mediate interactions between charged particles (e.g., electrons in orbitals).  \n- Step 3: **Weak force**: W/Z bosons govern beta decay (e.g., neutron → proton in radioactive nuclei).  \n+ Gravitons (hypothetical) are proposed carriers for gravity but unproven.  \n\n[Optional takeaway: Each force has a unique boson; gravitons remain theoretical.]", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "What experimental evidence shows atoms are mostly empty space? (2 steps)", "answer": "- Step 1: **Rutherford gold foil experiment**: Most alpha particles passed straight through the foil, indicating empty space.  \n- Step 2: A few were deflected at large angles, implying a dense, positively charged nucleus.  \n+ Analogy: Shooting through a sparse forest vs a solid wall.  \n\n[Optional takeaway: Atom’s structure is nucleus + vast electron cloud.]", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "Why can’t quarks exist freely in nature? (2 steps)", "answer": "- Step 1: **Confinement**: The strong force between quarks increases with distance, unlike other forces.  \n- Step 2: If quarks separate, the energy creates new quark-antiquark pairs (via E=mc²), forming mesons/hadrons instead.  \n+ Example: Protons are stable bound states of quarks.  \n\n[Optional takeaway: Quarks are always confined to composite particles.]", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "What distinguishes a radioactive decay process (e.g., alpha, beta, gamma) from nuclear fission? (2 steps)", "answer": "- Step 1: **Decay**: Spontaneous emission of particles/energy from an unstable nucleus (e.g., alpha = helium nucleus, beta = electron, gamma = photon).  \n- Step 2: **Fission**: Splitting of a heavy nucleus (e.g., uranium-235) into smaller nuclei, releasing energy and neutrons.  \n+ Example: Fission requires neutron absorption; decay occurs randomly.  \n\n[Optional takeaway: Decay is natural; fission requires external triggers.]", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "List four sources of background radiation and explain one’s origin. (3 steps)", "answer": "- Step 1: Sources: **Cosmic rays** (outer space), **rocks/soil** (radon gas), **medical** (X-rays), **nuclear** (power plants).  \n- Step 2: **Cosmic rays**: High-energy particles from the Sun/milky way interact with Earth’s atmosphere.  \n+ Example: Radon-222 is a decay product of uranium in rocks.  \n- Step 3: **Medical radiation**: Used in diagnostics (X-rays) and treatment (radiotherapy).  \n\n[Optional takeaway: Background radiation is unavoidable and varies geographically.]", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "Why is a graviton hypothesized but not yet confirmed? (2 steps)", "answer": "- Step 1: **General Relativity** describes gravity as spacetime curvature, requiring no boson.  \n- Step 2: **Quantum theories** (e.g., string theory) propose gravitons (spin-2 particles) to unify gravity with other forces.  \n+ Challenge: No experiment has detected gravitons due to their weak interactions.  \n\n[Optional takeaway: Graviton bridges relativity and quantum mechanics but remains theoretical.]", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}], "count": 10}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Describe the structure of an atom, listing its three main components and their relative locations. (3 steps)", "answer": "- Step 1: **Nucleus** contains protons (positively charged) and neutrons (neutral), packed tightly at the atom's center.  \n- Step 2: **Electron cloud** surrounds the nucleus – electrons (negatively charged) occupy probabilistic regions called orbitals.  \n+ Protons/neutrons account for 99.9% of the atom's mass, while electrons determine its volume.  \n+ The nucleus is ~100,000× smaller in diameter than the entire atom.  \n- Step 3: **Empty space dominates** – electrons are far from the nucleus, making atoms mostly empty space.  \n\n**Takeaway:** Atoms are not solid spheres; their mass is concentrated in a tiny nucleus, while electrons define their spatial extent.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Compare the charges (in e units) and masses (in atomic mass units) of protons, neutrons, and electrons. (4 steps)", "answer": "- Step 1: **Charges**:  \n+ Proton: +1e  \n+ Neutron: 0e  \n+ Electron: -1e  \n- Step 2: **Masses (u)**:  \n+ Proton ≈ 1 u  \n+ Neutron ≈ 1 u  \n+ Electron ≈ 1/1836 u  \n- Step 3: **Implication**:  \n+ Protons/neutrons dominate atomic mass.  \n+ Electrons contribute negligibly to mass but balance charge.  \n- Step 4: **Misconception check**:  \n+ \"Lightweight\" electrons don’t affect mass but determine chemical properties via charge interactions.  \n\n**Takeaway:** Protons/neutrons are 1836× heavier than electrons, but their charges (+1, 0) balance with electrons’ -1e to maintain atomic neutrality.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Why are quark charges fractional (+2/3 and -1/3) rather than integer values? (3 steps)", "answer": "- Step 1: **Charge conservation**:  \n+ Protons (+1e) and neutrons (0e) must assemble from quarks with fractional charges (e.g., 2/3 + 2/3 - 1/3 = +1).  \n- Step 2: **Binding mechanism**:  \n+ Fractional charges ensure quarks can combine to form integer-charged particles (baryons/mesons).  \n+ If quarks had integer charges, stable protons/neutrons wouldn’t exist.  \n- Step 3: **Experimental evidence**:  \n+ Deep inelastic scattering shows protons contain smaller point charges (quarks) with fractional values.  \n\n**Takeaway:** Fractional quark charges are necessary to form stable, integer-charged hadrons like protons and neutrons, confirmed by scattering experiments.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "Explain why free quarks cannot be observed in nature. (3 steps)", "answer": "- Step 1: **Color confinement**:  \n+ Quarks carry a \"color charge\" that binds them via the strong force (mediated by gluons).  \n- Step 2: **Energy paradox**:  \n+ Separating quarks requires enormous energy, which instead creates quark-antiquark pairs (new particles like pions).  \n- Step 3: **No free quarks detected**:  \n+ Despite high-energy experiments, quarks are always found bound in hadrons (protons, neutrons, mesons).  \n\n**Takeaway:** The strong force strengthens with distance, making quark isolation impossible—they either stay bound or produce new particles via pair creation.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": true}, {"question": "Calculate the net charge of a proton (uud) and neutron (udd) using quark charges. (3 steps)", "answer": "- Step 1: **Proton (uud)**:  \n+ Up quark: +2/3  \n+ Up quark: +2/3  \n+ Down quark: -1/3  \n+ Total: 2/3 + 2/3 - 1/3 = **+1e**  \n- Step 2: **Neutron (udd)**:  \n+ Up quark: +2/3  \n+ Down quark: -1/3  \n+ Down quark: -1/3  \n+ Total: 2/3 - 1/3 - 1/3 = **0e**  \n- Step 3: **Physical implication**:  \n+ Quark combinations ensure protons are charged (critical for atomic stability) and neutrons are neutral (stabilize nuclei via the strong force).  \n\n**Takeaway:** Quark charges sum to integer values, explaining why protons and neutrons have +1e and 0e charges, respectively.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "How does the Standard Model classify quarks, leptons, and gauge bosons? (3 steps)", "answer": "- Step 1: **Quarks**:  \n+ Fundamental matter particles that form hadrons (protons, neutrons).  \n+ Six \"flavors\": up/down, charm/strange, top/bottom.  \n- Step 2: **Leptons**:  \n+ Fundamental particles not affected by the strong force (e.g., electrons, neutrinos).  \n- Step 3: **Gauge bosons**:  \n+ Force carriers:  \n+ Gluons (strong force)  \n+ Photons (electromagnetic)  \n+ W/Z bosons (weak)  \n+ Gravitons (theoretical gravity).  \n\n**Takeaway:** The Standard Model organizes matter into quarks (strong-force particles) and leptons (non-strong particles), with forces mediated by gauge bosons.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Why does the nucleus occupy minimal volume but contain almost all an atom’s mass? (3 steps)", "answer": "- Step 1: **Mass concentration**:  \n+ Protons/neutrons (99.9% mass) are packed in the nucleus (~1 fm radius).  \n- Step 2: **Electron volume dominance**:  \n+ Electrons (0.05% mass) orbit in regions ~100,000× larger (100 pm radius).  \n- Step 3: **Density comparison**:  \n+ Nuclear density ≈ 10¹⁷ kg/m³ vs. atomic density ≈ 10³ kg/m³ – nucleus is unimaginably dense.  \n\n**Takeaway:** Mass and volume are inversely related in atoms – the nucleus is a dense, tiny core, while electrons define the atom’s vast, diffuse boundary.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "Contrast the roles of protons, neutrons, and electrons in atomic structure. (4 steps)", "answer": "- Step 1: **Protons**:  \n+ Define atomic number (element identity).  \n+ Provide positive charge to balance electrons.  \n- Step 2: **Neutrons**:  \n+ Stabilize nucleus via the strong force (counteract proton repulsion).  \n+ Vary in number to create isotopes.  \n- Step 3: **Electrons**:  \n+ Dictate chemical properties via valence electrons.  \n+ Enable atomic bonding (ionic/covalent/metallic).  \n- Step 4: **Failure case**:  \n+ Removing a proton changes the element; removing a neutron creates an isotope; removing an electron creates an ion.  \n\n**Takeaway:** Protons (identity), neutrons (stability), and electrons (chemistry) each play distinct roles in atomic structure and behavior.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "Why does the strong force dominate at the nuclear scale but not at larger distances? (3 steps)", "answer": "- Step 1: **Short-range action**:  \n+ Gluon exchange (strong force carrier) only acts within ~1-2 fm, binding nucleons.  \n- Step 2: **Confinement mechanism**:  \n+ Unlike photons (infinite range), gluons self-interact, causing force to \"snap back\" like a rubber band.  \n- Step 3: **Macroscopic irrelevance**:  \n+ At scales > femtometers, electromagnetic (charged particles) and gravitational forces dominate.  \n\n**Takeaway:** The strong force is powerful but short-ranged – it binds nuclei but has no effect beyond atomic scales due to gluon behavior.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "How does the Standard Model explain the four fundamental forces? (4 steps)", "answer": "- Step 1: **Force-carrier particles**:  \n+ Strong force: Gluons (hold quarks together).  \n+ Electromagnetic: Photons (mediate charged particle interactions).  \n+ Weak force: W/Z bosons (responsible for beta decay).  \n+ Gravity: Gravitons (hypothetical, not part of the Standard Model).  \n- Step 2: **Unification attempts**:  \n+ Electroweak theory unifies electromagnetic and weak forces.  \n+ Grand Unified Theories (GUTs) attempt to include the strong force.  \n- Step 3: **Gravity exclusion**:  \n+ General Relativity describes gravity, but it remains unquantized in the Standard Model.  \n- Step 4: **Experimental gaps**:  \n+ Gravitons (if they exist) haven’t been observed due to gravity’s weakness.  \n\n**Takeaway:** The Standard Model explains three forces via gauge bosons, but gravity remains outside its framework, requiring new physics for unification.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}], "count": 10}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "Compare the charge and relative mass of a proton, neutron, and electron. (2 steps)", "answer": "- Step 1: **Proton:** charge = +1e (elementary charge), mass ≈ 1 atomic mass unit (u). **Neutron:** charge = 0, mass ≈ 1 u. **Electron:** charge = -1e, mass ≈ 1/1836 u (about 0.0005 u).\n- Step 2: The electron is ~1836 times lighter than a proton or neutron. Despite having opposite charges of equal magnitude (±1e), the proton and neutron have nearly identical masses, while the electron's mass is negligible.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "A proton is composed of two up quarks and one down quark (uud). An up quark has charge +2/3e and a down quark has charge -1/3e. Verify that this combination gives the correct charge of a proton. (2 steps)", "answer": "- Step 1: Write the quark composition: proton = u + u + d\n- Step 2: Sum the charges: (+2/3) + (+2/3) + (-1/3) = (+4/3 - 1/3) = +3/3 = +1e. The total charge is +1, matching the known charge of a proton.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "A neutron is composed of one up quark and two down quarks (udd). Using the quark charges (up = +2/3e, down = -1/3e), verify that the neutron has zero net charge. (2 steps)", "answer": "- Step 1: Write the quark composition: neutron = u + d + d\n- Step 2: Sum the charges: (+2/3) + (-1/3) + (-1/3) = (+2/3 - 2/3) = 0. The total charge is zero, confirming the neutron is neutral.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "What are the two types of quarks that make up protons and neutrons, and what are their respective charges? (1 step)", "answer": "**Up quark (u):** charge = +2/3e. **Down quark (d):** charge = -1/3e. These are the two lightest quarks (called \"flavors\") that combine to form all protons and neutrons in ordinary matter.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "Explain why a proton cannot be split into just any combination of up and down quarks — why must it always be exactly uud? (2 steps)", "answer": "- Step 1: A proton has a known charge of +1e and baryon number of 1. Any combination of quarks must produce these exact quantum numbers.\n- Step 2: If you tried uuu (three up quarks), charge would be +2e — far too large. If you tried ddd, charge would be -1e, wrong sign. Only uud gives exactly +1e, and udd gives 0. These are the only viable combinations for protons and neutrons, respectively, within the framework of quantum chromodynamics.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "In the Standard Model of particle physics, what are the three main categories of fundamental particles? (1 step)", "answer": "- **Quarks:** fundamental constituents of protons and neutrons (and other hadrons)\n- **Leptons:** electron-like particles that do not participate in the strong force (e.g., electron, neutrino)\n- **Gauge bosons:** force-carrying particles that mediate interactions between matter particles", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "Name the gauge boson (force carrier) for each of the four fundamental forces, and state which one is still theoretical. (3 steps)", "answer": "- Step 1: **Strong nuclear force** — carried by **gluons** (massless)\n- Step 2: **Electromagnetic force** — carried by **photons** (massless)\n- Step 3: **Weak nuclear force** — carried by **W and Z bosons** (massive); **Gravity** — theoretically carried by **gravitons** (not yet experimentally detected, thus hypothetical/theoretical)", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "Why is the gluon called the \"glue\" that holds the nucleus together, and what would happen if gluons suddenly stopped existing? (2 steps)", "answer": "- Step 1: Gluons are the force carriers of the strong nuclear force, which binds quarks together inside protons and neutrons, and also binds protons and neutrons together inside the nucleus against electrostatic repulsion.\n- Step 2: Without gluons, the strong force would cease to exist. Quarks would not remain bound — protons and neutrons would break apart. The nucleus itself would fly apart due to electrostatic repulsion between positively charged protons. No atomic nuclei would exist.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "What is the difference between nuclear fission and nuclear fusion? Give a simple example of each. (2 steps)", "answer": "- Step 1: **Nuclear fission:** a heavy nucleus splits into smaller nuclei, releasing energy. Example: Uranium-235 absorbing a neutron and splitting into barium-144, krypton-89, and 3 neutrons.\n- Step 2: **Nuclear fusion:** light nuclei combine (fuse) to form a heavier nucleus, releasing even more energy per reaction. Example: Two hydrogen nuclei (protons) fusing to form helium, releasing energy — this is how the Sun produces energy.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "A radioactive sample has a half-life of 5 days. If you start with 80g, how much remains after 15 days? Explain your reasoning. (3 steps)", "answer": "- Step 1: 15 days ÷ 5 days/half-life = 3 half-lives have passed.\n- Step 2: After 1st half-life: 80g → 40g. After 2nd: 40g → 20g. After 3rd: 20g → 10g.\n- Step 3: After 15 days (3 half-lives), 10g of the original sample remains. The rest has decayed.\n\n*Takeaway: Each half-life reduces the amount by half, regardless of how much you started with.*", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "Why does a material with a short half-life pose a different radiation hazard than a material with a long half-life, even if they initially contain the same number of radioactive atoms? (2 steps)", "answer": "- Step 1: A short half-life means the nuclei decay rapidly, releasing radiation quickly in a burst. This creates high intensity but short-lived danger. A long half-life decays slowly, releasing radiation gradually over much longer timescales.\n- Step 2: The key difference is **activity** (decays per second). At any given moment, the short-half-life material has much higher activity, meaning more radiation emitted per second — more dangerous for close contact, but the hazard fades faster. Long-half-life materials emit low-level radiation continuously for very long periods.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "Name the three main types of ionizing radiation (alpha, beta, gamma) and describe what each one is physically. (3 steps)", "answer": "- Step 1: **Alpha particles (α):** helium nuclei — 2 protons + 2 neutrons. Heavy, doubly charged (+2e), low penetration but high ionization ability. Stopped by paper or skin.\n- Step 2: **Beta particles (β):** high-speed electrons (or positrons) emitted from nuclei when neutrons convert to protons or vice versa. Single charge (±1e), moderate penetration. Stopped by aluminum foil.\n- Step 3: **Gamma rays (γ):** high-energy electromagnetic radiation (photons) emitted from excited nuclei. No charge, very high penetration, requires dense material (lead) to stop. Does not cause direct ionization but damages cells through energy deposition.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "Why is alpha radiation considered the most dangerous if swallowed or inhaled, despite being the least penetrating outside the body? (2 steps)", "answer": "- Step 1: Alpha particles are heavy and doubly charged, meaning they cause massive **ionization damage** along their short path — they rip electrons from atoms, creating many ion pairs and severe chemical damage to tissue.\n- Step 2: When alpha-emitting isotopes are ingested or inhaled, the alpha particles deposit all their energy directly into living tissue cells. Outside the body, alpha particles can't penetrate the skin, so they're harmless. But internally, there's no protective barrier — the damage is concentrated and highly destructive, potentially causing cancer or radiation sickness.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "List at least four sources of background radiation that we are exposed to in everyday life. (1 step)", "answer": "- **Cosmic rays:** high-energy particles from space, constantly bombarding Earth\n- **Rocks and soil:** radioactive elements like uranium, radon gas (especially in granite areas)\n- **Medical procedures:** X-rays, CT scans, nuclear medicine\n- **Nuclear testing/accidents:** legacy fallout from historical nuclear weapons testing and accidents like Chernobyl/Fukushima\n- **Building materials:** some bricks and concrete contain trace radioactive materials (e.g., radon-220)", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "Why is radon gas a particular concern for lung cancer, and how does it enter homes? (2 steps)", "answer": "- Step 1: Radon is a radioactive gas produced naturally by the decay of uranium in rocks and soil. It's invisible, odorless, and when inhaled, its decay products (radioactive solid particles) can lodge in lung tissue, exposing the lungs to alpha radiation directly.\n- Step 2: Radon seeps up through the ground and can accumulate in enclosed spaces like basements and homes, especially those with poor ventilation. It's a leading cause of lung cancer in non-smokers, second only to smoking.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "If the strong nuclear force is so powerful, why don't protons in a nucleus fly apart due to their mutual electrostatic repulsion? (2 steps)", "answer": "- Step 1: The strong nuclear force is **short-range** — it acts only over distances of about 1-3 femtometers (10⁻¹⁵ m), but it's intensely attractive within that range, far stronger than the electrostatic repulsion between protons.\n- Step 2: At the very short distances inside the nucleus, the strong force dominates and binds protons and neutrons together. However, beyond this range (even a few femtometers), the strong force drops to zero while electrostatic repulsion continues to act at longer ranges. This is why very large nuclei (with many protons spread further apart) become unstable.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "In terms of particle physics, why is the electron not considered a fundamental constituent of the nucleus, despite being part of the atom? (2 steps)", "answer": "- Step 1: The nucleus contains only protons and neutrons (collectively called nucleons). Electrons orbit at relatively huge distances (~10⁻¹⁰ m) from the nucleus, not inside it.\n- Step 2: Electrons belong to a different category of particles — **leptons** — which do not participate in the strong nuclear force. They interact only via electromagnetic and weak forces. The strong force that holds the nucleus together simply doesn't act on electrons, so they remain in orbital shells rather than being part of the nuclear structure.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "Why is it impossible to isolate a single quark on its own (a phenomenon called \"confinement\"), and what do we observe instead? (2 steps)", "answer": "- Step 1: When you try to pull quarks apart, the strong force doesn't decrease with distance (unlike gravity or electromagnetism) — it actually **increases** as quarks separate. You would need infinite energy to separate them.\n- Step 2: Instead of isolated quarks, we observe **hadrons** — composite particles where quarks are permanently bound. When you try to separate quarks, the energy spontaneously converts into new quark-antiquark pairs (mesons), creating more hadrons rather than free quarks. This is why we only ever see quarks inside protons, neutrons, and other particles.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "An atom of carbon-14 has 6 protons and 8 neutrons. What is the total charge of all the quarks inside this atom's nucleus? Explain your reasoning. (3 steps)", "answer": "- Step 1: Carbon-14 has 6 protons and 8 neutrons. Each proton = uud (2 up + 1 down), each neutron = udd (1 up + 2 down).\n- Step 2: Total up quarks = (6 protons × 2 up) + (8 neutrons × 1 up) = 12 + 8 = 20 up quarks. Total down quarks = (6 protons × 1 down) + (8 neutrons × 2 down) = 6 + 16 = 22 down quarks.\n- Step 3: Total quark charge = (20 × +2/3) + (22 × -1/3) = +40/3 - 22/3 = +18/3 = +6e. This equals the total charge of the 6 protons (each +1e), confirming that neutrons contribute zero net charge and all atomic charge comes from protons.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "If you could magically remove all the electrons from a gold atom (atomic number 79) but leave the nucleus intact, what would be the net charge of the remaining structure? (2 steps)", "answer": "- Step 1: A neutral gold atom has 79 protons in the nucleus and 79 electrons orbiting it. Removing all electrons removes -79e of charge.\n- Step 2: The remaining nucleus has 79 protons, each with charge +1e, giving a net charge of +79e (a highly positive ion). This demonstrates that atomic number equals the number of protons, and neutral atoms have equal numbers of protons and electrons.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "Why is the mass of a proton slightly less than the sum of the masses of its three constituent quarks? (1 step)", "answer": "The proton's mass is not simply the sum of its quarks' masses (the quarks themselves are very light). Instead, most of the proton's mass comes from the **binding energy** (E=mc²) of the strong force that holds the quarks together. This is a consequence of Einstein's mass-energy equivalence — the energy of the confining gluon field accounts for about 95% of the proton's mass.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "Why does a neutrino interact so rarely with matter that billions pass through your body every second from the Sun? (2 steps)", "answer": "- Step 1: Neutrinos are electrically neutral leptons that do not interact via the electromagnetic force (which is how most matter interacts) and have extremely low mass.\n- Step 2: They only interact via the weak nuclear force, which has an extremely short range (~10⁻¹⁸ m) and a very low probability of interaction. Neutrinos can pass through light-years of lead without being stopped because they simply don't \"feel\" the electromagnetic or strong forces that give atoms their structure and interactions.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "A sample of technetium-99m used in medical imaging has a half-life of 6 hours. If a patient is injected with this tracer at 8 AM, by what time will only 25% of the original activity remain? (3 steps)", "answer": "- Step 1: 25% remaining means 75% has decayed, which corresponds to 2 half-lives (50% → 25%).\n- Step 2: Each half-life is 6 hours, so 2 half-lives = 12 hours.\n- Step 3: 8 AM + 12 hours = 8 PM. By 8 PM, only 25% of the technetium-99m remains active.\n\n*Takeaway: Half-life calculations are essential in medical applications to ensure sufficient tracer activity remains for imaging while minimizing radiation exposure.*", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "In the Standard Model, electrons are classified as leptons, not quarks. What distinguishes leptons from quarks in terms of their fundamental properties? (2 steps)", "answer": "- Step 1: Leptons do **not** participate in the strong nuclear force — they feel only gravity, electromagnetism (if charged), and the weak force. Quarks participate in all four fundamental forces, including the strong force.\n- Step 2: Additionally, quarks have fractional electric charges (±1/3 or ±2/3e), while charged leptons have integer charges (±1e). Leptons exist as independent particles (like the electron), whereas quarks are always bound within hadrons due to color confinement.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "Why can we say that all ordinary matter in the universe is made up of only up quarks, down quarks, and electrons? (2 steps)", "answer": "- Step 1: Protons (uud) and neutrons (udd) — the building blocks of atomic nuclei — are made entirely of up and down quarks. All atoms are built from these nucleons.\n- Step 2: Electrons are the only stable charged leptons needed to form neutral atoms. Other quarks (strange, charm, top, bottom) and leptons (muons, taus, neutrinos) are either unstable or don't form ordinary matter. This \"first generation\" of particles is all that's needed to build everything we see around us.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "A carbon atom has 6 electrons orbiting the nucleus. If you remove one electron, what is the resulting particle called, and what is its net charge? (2 steps)", "answer": "- Step 1: Removing one electron from a neutral atom creates a **positive ion** (cation). The missing electron removes -1e of charge.\n- Step 2: The net charge is +1e. This ion is chemically different from the neutral atom and is attracted to negative charges. For carbon, this ion would be written as C⁺.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "In particle physics, what is \"antimatter\" and what happens when matter meets antimatter? (2 steps)", "answer": "- Step 1: For every particle, there exists an **antiparticle** with the same mass but opposite quantum numbers (charge, baryon number, lepton number). The antiproton has charge -1e (opposite to proton's +1e), and the positron (antielectron) has charge +1e (opposite to electron's -1e).\n- Step 2: When matter meets antimatter (e.g., electron meets positron), they **annihilate** — both particles are completely converted into energy in the form of gamma-ray photons (E = mc²). This is the most efficient energy conversion process known.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "Why is lead used as shielding against gamma radiation, but not against alpha or beta radiation? (3 steps)", "answer": "- Step 1: **Alpha particles** are stopped by paper or thin metal because they're heavy, doubly charged, and easily collide with atoms. **Beta particles** penetrate further but are stopped by aluminum. Neither needs dense shielding.\n- Step 2: **Gamma rays** are uncharged photons that interact weakly with matter — they don't cause ionization directly but knock electrons loose (Compton scattering) or cause photoelectric effect. They require dense material with high atomic number to be effective.\n- Step 3: Lead is dense and has high atomic number (82), providing many electrons per unit volume for gamma photons to interact with. This increases the probability of absorption, making lead an effective gamma shield. However, even lead cannot stop all gamma rays — some always get through.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "A radioactive isotope has a half-life of 1 hour. If you start with 1000 radioactive atoms, approximately how many will remain after 3 hours? Explain your reasoning. (2 steps)", "answer": "- Step 1: After 1 hour: 1000 → 500 (50% remain). After 2 hours: 500 → 250 (25% remain). After 3 hours: 250 → 125 (12.5% remain).\n- Step 2: Approximately 125 atoms remain after 3 hours. This demonstrates the exponential decay pattern — after n half-lives, the remaining fraction is (1/2)ⁿ. After 3 half-lives: (1/2)³ = 1/8 = 12.5%.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "Why does nuclear fusion release more energy per unit mass than nuclear fission? (2 steps)", "answer": "- Step 1: Fusion combines light nuclei (like hydrogen) into heavier ones (like helium), while fission splits heavy nuclei (like uranium) into lighter fragments. The key is **binding energy per nucleon** — nuclei around iron (Fe-56) have the highest binding energy per nucleon.\n- Step 2: Light nuclei moving toward iron release energy when fusing (they gain binding energy), and heavy nuclei moving toward iron also release energy when fissioning. However, the **mass difference** (mass defect) is larger for fusion because the increase in binding energy per nucleon is greater when going from hydrogen to helium than from uranium to medium-mass fragments. This makes fusion more energy-efficient per kilogram of fuel.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "In the context of ESAT Physics, what is the minimum level of detail about quarks and the Standard Model that a student needs to know? (1 step)", "answer": "For ESAT Physics, students need to know: (1) the structure hierarchy — atoms contain nuclei (protons + neutrons), which contain quarks; (2) the quark compositions of protons (uud) and neutrons (udd); (3) quark charges (+2/3 for up, -1/3 for down) and how they add up to produce proton (+1) and neutron (0) charges. Deeper details of the Standard Model are not required.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "What is the relationship between the atomic number, neutron number, and mass number of an atom? (2 steps)", "answer": "- Step 1: **Atomic number (Z)** = number of protons = defines the element. **Neutron number (N)** = number of neutrons. **Mass number (A)** = total nucleons = Z + N.\n- Step 2: Isotopes of an element have the same atomic number (same protons) but different neutron numbers. For example, carbon-12 (C-12) has 6 protons + 6 neutrons, while carbon-14 has 6 protons + 8 neutrons.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "If you had a piece of material that had been radioactive 10,000 years ago but shows no detectable radioactivity today, could it still contain atoms of the original radioactive isotope? Explain. (2 steps)", "answer": "- Step 1: Yes, it's possible. If the half-life is extremely long (much longer than 10,000 years), only a tiny fraction would have decayed, leaving most of the original atoms still present but with activity too low to detect easily.\n- Step 2: Alternatively, if the half-life is very short (much less than 10,000 years), the material would have completely decayed. Whether detectable activity remains depends on the ratio of elapsed time to half-life — if elapsed time ≫ half-lives, it's all gone; if elapsed time ≪ half-life, most remains.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "Why does the atomic radius increase as you go down a group in the periodic table, even though the number of protons (nuclear charge) also increases? (2 steps)", "answer": "- Step 1: As you go down a group, electrons are added to higher energy levels (shells) that are farther from the nucleus. Each new shell adds a whole new \"layer\" of electron cloud.\n- Step 2: Although nuclear charge increases, this is partially offset by **shielding** — inner electrons partially block the attraction between the nucleus and outer electrons. The dominant effect is the addition of new electron shells, which increases the radius more than the increased nuclear charge decreases it.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}], "count": 34}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "Compare the charge and relative mass of a proton, neutron, and electron. (2 steps)", "answer": "- Step 1: **Proton:** charge = +1e (elementary charge), mass ≈ 1 atomic mass unit (u). **Neutron:** charge = 0, mass ≈ 1 u. **Electron:** charge = −1e, mass ≈ 1/1836 u.\n- Step 2: This shows that protons and neutrons have nearly identical mass (~1 u each), while electrons are ~1836 times lighter. The proton and neutron masses are so similar that for many calculations they are treated as equal.\n\n**Takeaway:** Protons and neutrons have ~1 u mass each; electrons are ~1836× lighter.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "A proton is made of two up quarks and one down quark (uud). An up quark has charge +2/3e and a down quark has charge −1/3e. Show mathematically why the proton has a net charge of +1e. (2 steps)", "answer": "- Step 1: Write the quark composition: proton = u + u + d\n- Step 2: Add the charges: (+2/3) + (+2/3) + (−1/3) = (+4/3 − 1/3) = +3/3 = +1. Therefore the proton's charge is +1e.\n\n**Takeaway:** The integer charges of protons and neutrons emerge from fractional quark charges summing to whole numbers.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "A neutron is made of one up quark and two down quarks (udd). Using the quark charges up = +2/3e and down = −1/3e, explain why the neutron has zero net charge. (2 steps)", "answer": "- Step 1: Write the quark composition: neutron = u + d + d\n- Step 2: Add the charges: (+2/3) + (−1/3) + (−1/3) = (+2/3 − 2/3) = 0. Therefore the neutron is neutral.\n\n**Takeaway:** Even though neutrons contain charged quarks, the charges cancel out perfectly to give net zero charge.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "If you could remove one quark from a proton and replace it with a different type of quark, what would happen to the particle? Explain using quark composition. (2 steps)", "answer": "- Step 1: A proton = uud (charge +1). If you replace one up quark (+2/3) with a down quark (−1/3), the new composition becomes ud d.\n- Step 2: This is exactly the composition of a neutron! The particle transforms from a proton into a neutron. This illustrates how protons and neutrons are closely related — they're essentially the same particle (a \"nucleon\") in different quark states.\n\n**Takeaway:** Changing one quark transforms a proton into a neutron (and vice versa).", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "In the Standard Model of particle physics, what are the three main categories of fundamental particles? (1 step)", "answer": "The three main categories are: **Quarks** (up, down, charm, strange, top, bottom — particles that combine to form protons, neutrons, and other hadrons), **Leptons** (including electrons, muons, tau, and their neutrinos — particles that don't experience the strong force), and **Gauge bosons** (force carrier particles like photons, gluons, W/Z bosons).\n\n**Takeaway:** The Standard Model organizes all matter particles into quarks and leptons, with gauge bosons carrying forces between them.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "Match each fundamental force to its carrier particle (gauge boson): strong force, electromagnetic force, weak force, and gravity. (2 steps)", "answer": "- Step 1: **Strong force** → **Gluons** (hold quarks together inside protons/neutrons)\n- Step 2: **Electromagnetic force** → **Photons** (carry light and EM radiation), **Weak force** → **W and Z bosons** (mediate radioactive decay), **Gravity** → **Gravitons** (theoretical, not yet experimentally confirmed)\n\n**Takeaway:** Each fundamental force has a specific particle that \"carries\" or mediates that force.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "Why is it that electrons can exist freely on their own, but quarks cannot exist independently outside of hadrons? (2 steps)", "answer": "- Step 1: Electrons are leptons — they do not experience the strong nuclear force and carry integer electric charge (−1e), so they can exist independently.\n- Step 2: Quarks experience the strong force and carry fractional charges (+2/3 or −1/3). Due to a phenomenon called **color confinement**, quarks can only exist in combinations where their \"color\" charges cancel out, forming neutral (colorless) particles like protons and neutrons. Isolated quarks have never been observed.\n\n**Takeaway:** Color confinement forces quarks to combine into hadrons; leptons have no such restriction.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "What is the difference between nuclear fission and nuclear fusion in terms of what happens to atomic nuclei? (2 steps)", "answer": "- Step 1: **Nuclear fission** is when a **heavy nucleus** (like uranium-235) splits into two or more lighter nuclei, releasing energy. This is what happens in nuclear power plants and atomic bombs.\n- Step 2: **Nuclear fusion** is when **light nuclei** (like hydrogen isotopes) combine or fuse together to form a heavier nucleus, releasing energy. This is what powers the Sun and hydrogen bombs.\n\n**Takeaway:** Fission splits heavy nuclei; fusion combines light nuclei — both release energy but in opposite directions.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "What are the three main types of radioactive radiation (alpha, beta, gamma), and what is each one physically? (2 steps)", "answer": "- Step 1: **Alpha (α) particles** = helium nuclei (2 protons + 2 neutrons), relatively large and slow, stopped by paper. **Beta (β) particles** = electrons (β−) or positrons (β+) emitted from nuclei, faster, stopped by aluminum.\n- Step 2: **Gamma (γ) radiation** = high-energy electromagnetic waves (photons), very penetrating, requires thick lead to stop. All three are emitted from unstable nuclei during radioactive decay.\n\n**Takeaway:** Alpha = helium nuclei, beta = electrons/positrons, gamma = high-energy photons.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "What is half-life in radioactivity, and why is it important for safety? (2 steps)", "answer": "- Step 1: **Half-life** is the time it takes for half of the radioactive atoms in a sample to decay. For example, if a sample has a 10-year half-life, after 10 years only half the original atoms remain; after 20 years, only one-quarter remain.\n- Step 2: Half-life matters for safety because it tells us how long a radioactive material remains dangerous. Shorter half-life = intense radiation but dies out quickly; longer half-life = lower radiation but persists for centuries.\n\n**Takeaway:** Half-life quantifies how quickly radioactivity decreases and determines how long safety precautions are needed.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "List four main sources of background radiation that we encounter in everyday life. (1 step)", "answer": "The four main sources are: **Cosmic rays** (high-energy particles from space), **Rocks and soil** (especially radon gas from uranium-containing rocks), **Medical sources** (X-rays, CT scans, nuclear medicine), and **Nuclear sources** (historical fallout, nuclear power plants — usually very small contributions).\n\n**Takeaway:** Background radiation comes from natural and artificial sources; natural sources (cosmic + radon) typically dominate.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "A certain radioactive isotope has a half-life of 5 years. If you start with 80 grams, how much will remain after 15 years? Explain conceptually without doing precise calculation. (2 steps)", "answer": "- Step 1: 15 years = 3 half-lives (since 15 ÷ 5 = 3). Each half-life cuts the amount in half.\n- Step 2: After 1st half-life: 80g → 40g. After 2nd: 40g → 20g. After 3rd: 20g → 10g. So approximately 10 grams remain. This shows exponential decay — the amount decreases by half each period, not by a fixed amount.\n\n**Takeaway:** After n half-lives, amount = initial × (1/2)^n — exponential decay, not linear.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "Why is the mass of an electron so much smaller than the mass of a proton or neutron? (2 steps)", "answer": "- Step 1: A proton is made of three quarks (uud), while an electron is a fundamental lepton — it's not made of anything smaller.\n- Step 2: The proton's mass comes primarily from the **binding energy** of the strong force holding the quarks together (via E=mc²), not just the masses of the quarks themselves. The quarks inside a proton are actually moving at near-light speeds, contributing significant kinetic energy. An electron has no such internal structure — its mass is its intrinsic rest mass.\n\n**Takeaway:** Most of a proton's mass comes from binding energy (E=mc²), not quark masses; electrons have no internal structure.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "Why is the strong nuclear force important for holding atomic nuclei together, and why doesn't it cause all atoms to collapse into a single point? (2 steps)", "answer": "- Step 1: The strong nuclear force is the strongest of the four fundamental forces, but it acts only over extremely short distances (~10⁻¹⁵ m). It binds protons and neutrons together in the nucleus, overcoming the electrostatic repulsion between positively charged protons.\n- Step 2: The strong force doesn't cause collapse because it has an extremely short range — it acts only between neighboring nucleons. Once nucleons are touching (packed at nuclear density), the force can't pull them any closer. The electrostatic repulsion prevents further compression, creating a stable nucleus size.\n\n**Takeaway:** Strong force binds nucleons but has finite range; electrostatic repulsion sets the equilibrium nuclear size.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "If beta-minus decay involves a neutron turning into a proton, what happens to the quark composition? (2 steps)", "answer": "- Step 1: A neutron has composition udd (up + down + down). In beta-minus decay, one of the down quarks changes into an up quark.\n- Step 2: The neutron's composition changes from udd → uud. This uud composition is exactly a proton! So beta-minus decay converts a neutron into a proton, while emitting an electron (and an antineutrino) to conserve charge.\n\n**Takeaway:** Beta-minus decay transforms a neutron (udd) into a proton (uud) by changing a down quark to an up quark.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "Why can't alpha particles penetrate far into matter, while gamma rays can penetrate deeply? (2 steps)", "answer": "- Step 1: **Alpha particles** are relatively large (helium nuclei — 2 protons + 2 neutrons) and highly charged (+2e). They interact strongly with matter, quickly losing energy by ionizing many atoms. They're stopped by just a sheet of paper or a few centimeters of air.\n- Step 2: **Gamma rays** are uncharged electromagnetic radiation (photons). They don't interact as easily with matter because they have no electric charge. They can pass through many atoms before interacting, requiring thick lead or concrete to stop.\n\n**Takeaway:** Charge and mass determine penetration: alpha is heavy and charged (stopped easily); gamma is uncharged light (penetrates deeply).", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "What would happen to an atom if you removed all its electrons? Would it still be the same element? Explain. (2 steps)", "answer": "- Step 1: An element is defined by its number of protons in the nucleus (its atomic number). Removing electrons creates a positively charged ion, but the nucleus remains unchanged.\n- Step 2: The atom would become a positively charged **ion**, but it would still be the same element. For example, a neutral sodium atom (11 protons) that loses its electron becomes Na⁺ — still sodium, just ionized. The element identity is determined solely by proton count, not electron count.\n\n**Takeaway:** Elements are defined by proton number; removing electrons creates ions but doesn't change the element.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "Why do different elements have different chemical properties? (2 steps)", "answer": "- Step 1: Chemical properties are determined by how atoms interact with each other — specifically, how their **electron shells** behave.\n- Step 2: The number of electrons in a neutral atom equals its number of protons. As you move across the periodic table, electrons are added, filling outer shells differently. This determines how easily an atom gains, loses, or shares electrons — i.e., its chemical reactivity. For example, noble gases have full outer shells (stable), while alkali metals have one extra electron (highly reactive).\n\n**Takeaway:** Chemical properties depend on electron configuration, which is determined by proton number.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "In particle-antiparticle pairs, what is always conserved, and what is opposite? Give an example with electron-positron. (2 steps)", "answer": "- Step 1: In particle-antiparticle pairs, **mass/energy** and **charge** are key quantities. Mass/energy is always conserved (total remains the same). Charge is opposite — if one particle is positive, the antiparticle is negative.\n- Step 2: For example, an **electron** has charge −1e and mass 0.511 MeV/c². Its antiparticle, the **positron**, has charge +1e but the same mass. When they meet, they annihilate, converting their mass into energy (gamma rays).\n\n**Takeaway:** Particle-antiparticle pairs have opposite charge but equal mass; they annihilate, converting mass to energy.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "A student claims that because protons and neutrons are made of quarks, quarks must be the smallest particles in existence. Why might this be incorrect? (2 steps)", "answer": "- Step 1: Current evidence suggests quarks are **fundamental** (not made of anything smaller), but this doesn't mean they're the \"smallest\" in an absolute sense — we may discover smaller constituents in the future.\n- Step 2: The Standard Model treats quarks and electrons as fundamental point particles with no internal structure — we cannot break them down further with current technology. However, \"smallest\" is an experimental question, not a certainty. The concept of \"size\" becomes meaningless at sub-atomic scales; particles are better described as excitations in quantum fields.\n\n**Takeaway:** Quarks appear fundamental now, but \"smallest\" is an experimental limit, not a permanent truth.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "Why does a proton have approximately twice the mass of a pion, even though both contain up and down quarks? (2 steps)", "answer": "- Step 1: A **proton** is made of three quarks (uud), while a **pion** is made of just two quarks (a quark-antiquark pair, like uū or dd̄).\n- Step 2: The proton's greater mass comes from the **additional binding energy** and kinetic energy of the third quark. More quarks means more energy (via E=mc²), and protons are far more tightly bound than pions. The proton is also a stable bound state, while pions are extremely unstable (mean lifetime ~10⁻⁸ seconds).\n\n**Takeaway:** Mass comes primarily from binding energy (E=mc²); more quarks and tighter binding → more mass.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "If you had equal numbers of protons, neutrons, and electrons, what would be the approximate total charge? (Mental math conceptual) (1 step)", "answer": "- Step 1: Each proton contributes +1, each electron contributes −1, and each neutron contributes 0. With equal numbers (say n of each), total charge = n(+1) + n(0) + n(−1) = n(1 − 1) = 0.\n- Step 2: The charges cancel perfectly — equal numbers of protons and electrons create electrical neutrality, regardless of neutron count.\n\n**Takeaway:** Equal protons and electrons → neutral overall charge; neutrons don't affect charge.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "Why is it that we can detect electrons easily (e.g., in cloud chambers) but cannot directly observe quarks? (2 steps)", "answer": "- Step 1: Electrons are stable, point-like particles that interact via electromagnetism and the weak force. They can be detected when they ionize matter (creating trails in cloud chambers) or when they interact with detectors.\n- Step 2: Quarks are permanently confined inside hadrons due to color confinement. To \"see\" a quark, you'd need to break a hadron apart, but the energy you put in creates new quark-antiquark pairs (hadronization) rather than isolating individual quarks. The energy becomes mass (E=mc²), creating new particles rather than freeing quarks.\n\n**Takeaway:** Quarks are confined; attempting to isolate them just creates more hadrons — they're never observed in isolation.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "What is the relationship between the atomic number, mass number, and the number of neutrons in an atom? (2 steps)", "answer": "- Step 1: **Atomic number (Z)** = number of protons = defines the element. **Mass number (A)** = total number of protons + neutrons in the nucleus.\n- Step 2: Therefore, number of neutrons = A − Z. Isotopes are atoms of the same element (same Z) but different numbers of neutrons (different A). For example, carbon-12 has 6 protons + 6 neutrons; carbon-14 has 6 protons + 8 neutrons.\n\n**Takeaway:** Z = protons, A = protons + neutrons, neutrons = A − Z.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "Why do we say that matter is \"mostly empty space\" at the atomic scale? Use order-of-magnitude reasoning. (2 steps)", "answer": "- Step 1: The nucleus radius is about 10⁻¹⁵ m (1 femtometer). The atom radius is about 10⁻¹⁰ m (1 angstrom). Volume scales with r³, so the nucleus occupies (10⁻¹⁵/10⁻¹⁰)³ = (10⁻⁵)³ = 10⁻¹⁵ of the atomic volume.\n- Step 2: That's one quadrillionth (0.000000000000001) of the atom! The electron cloud is almost entirely empty space. Most of the atom's volume contains nothing but the probabilistic presence of electrons.\n\n**Takeaway:** The nucleus is ~10⁻¹⁵ of atomic volume — matter is 99.999...% empty space.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "What is the experimental evidence that protons and neutrons have internal structure (quarks) rather than being fundamental particles? (2 steps)", "answer": "- Step 1: In the 1960s, deep inelastic scattering experiments fired high-energy electrons at protons. The electrons scattered in ways that indicated they were hitting three point-like constituents inside the proton — the quarks.\n- Step 2: The scattering pattern showed that these constituents carry fractional electric charges (+2/3 and −1/3), exactly matching the quark model predictions. Similar experiments on neutrons confirmed their quark structure. This was direct evidence that protons and neutrons are not fundamental — they contain quarks.\n\n**Takeaway:** Deep inelastic scattering revealed three point-like, fractional-charge constituents inside protons/neutrons — the quarks.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "In what sense is the \"Standard Model\" both successful and incomplete? (2 steps)", "answer": "- Step 1: The Standard Model successfully describes three of the four fundamental forces (strong, weak, electromagnetic) and classifies all known elementary particles. It has passed every experimental test with remarkable precision.\n- Step 2: However, it's incomplete because it doesn't include gravity (gravitons are theoretical), doesn't explain dark matter or dark energy, doesn't explain why neutrinos have mass, and has many arbitrary parameters (like particle masses) that the theory doesn't predict — it just accepts them.\n\n**Takeaway:** The Standard Model is our best theory of particle physics but leaves major questions unanswered, especially about gravity and dark matter.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "If the strong nuclear force has such an enormous range problem (it only acts over ~10⁻¹⁵ m), how do large nuclei stay bound? (2 steps)", "answer": "- Step 1: The strong force is **attractive** and binds nucleons (protons and neutrons) together, but it acts only between **adjacent** nucleons — each nucleon only interacts strongly with its immediate neighbors.\n- Step 2: In large nuclei, every proton experiences electrostatic repulsion from *all other protons* (which has infinite range), but only feels strong attraction from immediate neighbors. Once nuclei get very large (beyond ~208 nucleons), electrostatic repulsion wins and they become unstable — explaining why there's a limit to how large atoms can get (the periodic table ends).\n\n**Takeaway:** Strong force is short-range and saturates; electrostatic repulsion is long-range and accumulates — large nuclei become unstable.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "A material is said to have a \"half-life\" of 30 years, but you observe it still feels \"hot\" after 100 years. Reconcile this apparent contradiction. (2 steps)", "answer": "- Step 1: After 100 years (which is about 3.3 half-lives), the activity is (1/2)^3.3 ≈ 1/10 of the original. So it's still radioactive, just at 10% of the original level.\n- Step 2: Whether it \"feels hot\" depends on the initial activity. If the original material was intensely radioactive, even 10% could still be dangerous. Half-life describes when activity drops to half, not when it disappears entirely. Mathematically, radioactivity never reaches exactly zero — it just becomes vanishingly small.\n\n**Takeaway:** After n half-lives, activity = initial × (1/2)^n — it never fully reaches zero, just becomes negligible.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "Why is carbon-14 useful for dating organic remains up to about 50,000 years old, but not useful for dating rocks that are billions of years old? (2 steps)", "answer": "- Step 1: Carbon-14 has a half-life of ~5,730 years. After about 50,000 years (~8-9 half-lives), the remaining C-14 is too small to detect accurately — the uncertainty overwhelms the signal.\n- Step 2: For dating billions-year-old rocks, you need isotopes with half-lives in that range (like uranium-238, half-life 4.5 billion years). Carbon-14 would have completely decayed away long ago, leaving no signal to measure. Different isotopes suit different age ranges based on their half-lives.\n\n**Takeaway:** Radioactive dating requires the isotope to have a half-life comparable to the age being measured — too short and it vanishes; too long and there's no measurable change.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "In the Standard Model, electrons are leptons and protons are hadrons. What distinguishes leptons from hadrons? (2 steps)", "answer": "- Step 1: **Leptons** are fundamental particles (not made of anything smaller) that do **not** experience the strong nuclear force. Examples: electron, muon, tau, and their neutrinos. They have integer charges (0 or ±1).\n- Step 2: **Hadrons** are composite particles made of quarks, bound by the strong force. They include **baryons** (3 quarks, like protons and neutrons) and **mesons** (quark-antiquark pairs, like pions). Hadrons experience all four fundamental forces.\n\n**Takeaway:** Leptons = fundamental, no strong force; Hadrons = made of quarks, experience strong force.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "When a gamma ray passes through matter, why is it that it can pass through without any interaction at all, while alpha particles almost always interact? (2 steps)", "answer": "- Step 1: **Alpha particles** are relatively large, slow, and carry a +2 charge. They interact strongly with matter through electromagnetic forces, readily ionizing atoms and losing energy quickly.\n- **Gamma rays** are uncharged photons. They have no electric charge and don't interact via the strong force. They can pass through vast distances of matter without any interaction — only probabilistic encounters with atomic electrons or nuclei cause absorption. This is why gamma requires thick shielding.\n\n**Takeaway:** Charge determines interaction probability: alpha's +2 charge guarantees interactions; gamma's zero charge allows penetration.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "Why is the \"mass defect\" in nuclear binding energy actually evidence for E=mc²? (2 steps)", "answer": "- Step 1: When you add up the masses of individual protons and neutrons, the total is **greater** than the actual mass of the nucleus. This \"missing mass\" is the mass defect.\n- Step 2: The missing mass is converted into the **binding energy** that holds the nucleus together (E = Δm c²). This is the famous mass-energy equivalence — the energy binding the nucleus has \"mass\" (in the sense of equivalent energy). This was one of the first experimental confirmations of Einstein's equation.\n\n**Takeaway:** Nuclear mass is less than sum of nucleon masses because binding energy reduces mass via E=mc².", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "What is \"annihilation\" and why does it produce high-energy gamma rays rather than other particles? (2 steps)", "answer": "- Step 1: **Annihilation** occurs when a particle meets its exact antiparticle (e.g., electron + positron). Their combined mass is completely converted to energy according to E = mc².\n- Step 2: The most efficient way to conserve momentum and other quantum numbers is to produce photons (gamma rays). Producing other particle-antiparticle pairs would violate energy conservation unless the initial energy was very high. Gamma rays are the lowest-energy way to carry away the exact momentum and energy while having no other quantum numbers to conserve.\n\n**Takeaway:** Particle-antiparticle annihilation converts mass entirely to energy, typically as gamma-ray photons.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}], "count": 34}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "When we \"zoom out\" from the nucleus to describe an atom, what are the two main structural regions, and how do they differ in their share of the atom's mass versus its volume?", "answer": "- Step 1: Identify the two regions. An atom has a tiny central **nucleus** (containing protons and neutrons) surrounded by an **electron cloud** where electrons orbit.\n- Step 2: Compare mass distribution. Almost all of the atom's mass lives in the nucleus, because protons and neutrons are each about $$1\\,\\text{u}$$ while an electron is only $$\\sim 1/1836\\,\\text{u}$$ — roughly two thousand times lighter.\n- Step 3: Compare volume distribution. The nucleus occupies a vanishingly small fraction of the atom's volume; the vast majority of the atom is essentially empty space inhabited by the electron cloud.\n\nTakeaway: An atom is mostly empty space with a dense, massive core — a tiny dot of mass inside a huge balloon of \"nothing.\"", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "Why is it conceptually misleading to picture an atom as a solid little sphere, given what we know about its internal layout?", "answer": "- Step 1: Recall the geometry. The nucleus is roughly $$10^{-15}\\,\\text{m}$$ across, while the whole atom is about $$10^{-10}\\,\\text{m}$$ — a factor of about $$10^5$$ difference in radius.\n- Step 2: Translate that to volume. Volume scales as radius cubed, so the nucleus fills only about $$10^{-15}$$ of the atomic volume. The rest is electron cloud / empty space.\n- Step 3: Realise the implication. A \"solid sphere\" picture suggests matter is densely packed everywhere, but in reality matter feels solid only because of **electromagnetic repulsion** between electron clouds, not because atoms are physically filled in.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": true}, {"question": "State the charge and approximate mass (in atomic mass units) of the proton, neutron, and electron, and explain why the electron's mass is usually ignored in nuclear mass calculations. (3 steps)", "answer": "- Step 1: Proton: charge $$+1e$$, mass $$\\approx 1\\,\\text{u}$$.\n- Step 2: Neutron: charge $$0$$, mass $$\\approx 1\\,\\text{u}$$ (very slightly more than the proton).\n- Step 3: Electron: charge $$-1e$$, mass $$\\approx \\tfrac{1}{1836}\\,\\text{u}$$. Because it is roughly 2000× lighter than a nucleon, even dozens of electrons contribute negligibly to the total atomic mass, so for nuclear mass we just count protons + neutrons.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "What are quarks, and how do they relate to protons and neutrons?", "answer": "Quarks are **fundamental particles** — meaning, as far as we know, they have no internal structure and cannot be broken into anything smaller. Protons and neutrons are **not** fundamental; each is a bound trio of quarks held together by the strong force. So when we \"zoom in\" past the nucleus, we discover that nucleons themselves are composite objects made of quarks, which is one level deeper than the proton/neutron picture.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "Give the quark composition of a proton and a neutron, using \"u\" for up and \"d\" for down.", "answer": "- Step 1: Proton = **uud** (two up quarks, one down quark).\n- Step 2: Neutron = **udd** (one up quark, two down quarks).\n- Step 3: Notice the symmetry — swap one up for one down and you convert proton↔neutron. This is exactly what happens in beta decay at the quark level.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "What electric charges (in units of the elementary charge $$e$$) do the up and down quarks carry, and what is unusual about these values? (3 steps)", "answer": "- Step 1: Up quark: $$+\\tfrac{2}{3}e$$.\n- Step 2: Down quark: $$-\\tfrac{1}{3}e$$.\n- Step 3: What's unusual: these are **fractional** charges. Before quarks were proposed, every observed particle had charge that was an integer multiple of $$e$$. Quarks break that rule individually, but they always combine so that the *composite* particle has integer charge — and we never observe a free quark in isolation (called confinement).", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "Show, by adding quark charges, why a proton has charge $$+1e$$ and a neutron has charge $$0$$. (2 steps)", "answer": "- Step 1: Proton (uud): $$\\tfrac{2}{3} + \\tfrac{2}{3} - \\tfrac{1}{3} = \\tfrac{3}{3} = +1$$. ✓\n- Step 2: Neutron (udd): $$\\tfrac{2}{3} - \\tfrac{1}{3} - \\tfrac{1}{3} = 0$$. ✓\n\nTakeaway: The seemingly weird fractional charges of quarks are exactly chosen by nature so that the observed nucleon charges come out as clean integers.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "A student claims \"neutrons must be made of three identical quarks because they have zero charge.\" Why is this wrong, and what does the correct composition tell us?", "answer": "- Step 1: Identify the misconception. Zero net charge does *not* require identical constituents — it just requires the charges to cancel.\n- Step 2: Show the actual makeup. A neutron is **udd**: one $$+\\tfrac{2}{3}$$ and two $$-\\tfrac{1}{3}$$, which cancel to zero. The quarks are not identical.\n- Step 3: Draw the deeper lesson. The proton and neutron differ by only one quark flavour (u↔d), which is why a neutron can decay into a proton (plus an electron and antineutrino) — that's beta-minus decay at the quark level.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": true}, {"question": "A hypothetical particle is made of three up quarks (uuu). What would its electric charge be, and what does this teach you about quark combinations? (2 steps)", "answer": "- Step 1: Add the charges: $$\\tfrac{2}{3} + \\tfrac{2}{3} + \\tfrac{2}{3} = +2e$$. So this particle would have charge $$+2e$$.\n- Step 2: Lesson: different quark combinations build different particles with different charges. (In real physics this particle exists — it's called the $$\\Delta^{++}$$ baryon.) The point is, quark \"recipes\" determine everything about a composite particle's charge.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "The Standard Model groups all known fundamental particles into three families. Name the families and give one example of each. (3 steps)", "answer": "- Step 1: **Quarks** — e.g., up, down (the building blocks of protons and neutrons).\n- Step 2: **Leptons** — e.g., the electron (and also neutrinos, muons, taus).\n- Step 3: **Gauge bosons** — e.g., the photon (these are the *force carriers*, not matter constituents).\n\nBig picture: Quarks and leptons make up *matter*; gauge bosons carry *forces* between matter particles.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "What is a \"gauge boson\" conceptually, and how does it differ from a quark or a lepton?", "answer": "- Step 1: Quarks and leptons are **matter particles** — they have mass and they're what stuff is built from.\n- Step 2: Gauge bosons are **force carriers** — when two particles interact via a fundamental force, they do so by exchanging a gauge boson.\n- Step 3: Analogy: if matter particles are like two ice skaters, the gauge boson is like a ball thrown between them — the act of throwing/catching changes their motion, which is what we call a \"force.\"", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "Match each of the four fundamental forces to its gauge boson, and note which one is still theoretical. (4 steps)", "answer": "- Step 1: **Strong force** → **gluons**. Holds quarks together inside protons/neutrons, and binds nucleons in the nucleus.\n- Step 2: **Electromagnetic force** → **photons**. Responsible for all chemistry, light, and the \"solidness\" of matter.\n- Step 3: **Weak force** → **W and Z bosons**. Governs processes like beta decay (quark flavour change).\n- Step 4: **Gravity** → **gravitons** (theoretical — never directly observed; a successful quantum theory of gravity is still an open problem).", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "Why does the electron *not* appear in the quark composition of an atom, even though it's a fundamental particle?", "answer": "- Step 1: Recall classification. Electrons are **leptons**, not quarks — they are a separate family of fundamental particles.\n- Step 2: Recall location. Electrons live in the cloud *outside* the nucleus; quarks live *inside* nucleons.\n- Step 3: Conclude. So when we ask \"what is a proton made of?\" the answer is quarks only — electrons are not constituents of protons or neutrons, they are independent fundamental particles in their own right.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "Which fundamental force is responsible for holding the quarks inside a single proton together, and why must it be much stronger than electromagnetism on that scale? (3 steps)", "answer": "- Step 1: Identify the force. The **strong force**, mediated by **gluons**, binds quarks inside a proton.\n- Step 2: Spot the problem it solves. Two of the three quarks in a proton (the two up quarks) carry like charges ($$+\\tfrac{2}{3}$$ each) and would electrically repel each other very strongly at sub-femtometre distances.\n- Step 3: Conclude. For the proton to be a stable bound object, the attractive strong force must overpower this electromagnetic repulsion at short range — which is exactly why \"strong\" is in its name.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": true}, {"question": "Which fundamental force keeps the protons in a nucleus bound together despite their mutual electric repulsion, and what does this imply about its range vs. strength compared to the EM force? (3 steps)", "answer": "- Step 1: Same force, different scale: the **strong force** also binds protons and neutrons to each other inside a nucleus (often called the \"residual\" strong force).\n- Step 2: Compare strength: at nuclear distances (~$$10^{-15}\\,\\text{m}$$), it is much stronger than EM repulsion, so the nucleus stays bound.\n- Step 3: Compare range: but it is extremely **short-ranged** — it drops off rapidly beyond a few femtometres. This is why very large nuclei become unstable: protons on opposite sides feel the long-range EM repulsion but barely feel each other's strong attraction, leading to fission tendencies.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": true}, {"question": "Briefly distinguish nuclear *fission* from nuclear *fusion* in terms of what happens to nuclei and which direction on the periodic table releases energy. (3 steps)", "answer": "- Step 1: **Fission**: a *heavy* nucleus (e.g., uranium) **splits** into smaller nuclei, releasing energy.\n- Step 2: **Fusion**: two *light* nuclei (e.g., hydrogen isotopes) **combine** into a heavier nucleus, also releasing energy.\n- Step 3: Why both release energy: the most tightly bound nuclei
