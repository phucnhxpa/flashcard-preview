<script>
const DATA={"selected": [{"question": "When we \"zoom in\" on matter, what is the hierarchy of structure from a bulk object down to the most fundamental particles currently known? (4 steps)", "answer": "- Step 1: At the largest scale we have **bulk matter**, which is composed of **atoms**. Atoms are the smallest unit that retains the chemical identity of an element.\n- Step 2: Zooming into an atom, we find a tiny dense **nucleus** at the center, surrounded by a cloud of **electrons**. Almost all the mass sits in the nucleus, but almost all the volume is the electron cloud (empty space).\n- Step 3: Zooming into the nucleus, we find **protons** and **neutrons** (collectively called nucleons), bound together by the strong force.\n- Step 4: Zooming into a proton or neutron, we find **quarks** — these are (as far as we know) fundamental, meaning they have no smaller substructure.\n\nSo the chain is: matter → atoms → nucleus + electrons → protons + neutrons → quarks.", "source": "Opus 4.7 ②", "_id": "opus_2_0"}, {"question": "What is half-life, and why is it a probabilistic concept rather than a deterministic countdown timer for individual atoms? (3 steps)", "answer": "- Step 1: **Half-life** is the time it takes for **half of the atoms** in a radioactive sample to decay. After one half-life, the count drops to $$\\frac{1}{2}$$; after two, to $$\\frac{1}{4}$$; after three, to $$\\frac{1}{8}$$, etc.\n- Step 2: It is **probabilistic** because we cannot predict *when* any specific individual atom will decay. Each atom has a constant **probability per unit time** of decaying, but the actual moment of decay is random. Some atoms decay early, some survive for many half-lives.\n- Step 3: Only for a **large collection** of atoms does the statistical average emerge reliably — roughly half will have decayed by the half-life mark. For a single atom, it could decay in the next second or survive for ten half-lives; we simply cannot know.\n\nHalf-life is a \"crowd statistic\" — it describes populations, not individuals. Think of it like average lifespan: you can't predict when one specific person will die, but you can predict how many in a large group will survive to a given age.", "source": "GLM 5.1 ③", "_id": "glm_3_23"}, {"question": "Why is matter \"solid\" to the touch if atoms are mostly empty space? (3 steps)", "answer": "- Step 1: When two objects touch, what actually meets are their outermost electron clouds.\n- Step 2: Electron clouds repel each other via the **electromagnetic force** (mediated by photons), and the Pauli exclusion principle prevents electrons from occupying the same quantum state.\n- Step 3: This repulsion is enormous on a per-atom scale — strong enough that we experience surfaces as rigid even though no actual \"filled\" matter is touching. Solidity is an *electromagnetic* phenomenon, not a geometric one.", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "What is the key difference between beta-minus decay and beta-plus decay in terms of what happens at the quark level? (3 steps)", "answer": "- Step 1: In **beta-minus decay** ($$\\beta^-$$), a neutron converts into a proton. At the quark level, a **down quark** in the neutron changes into an **up quark**: $$d \\rightarrow u + e^- + \\bar{\\nu}_e$$. The composition changes from udd → uud.\n- Step 2: In **beta-plus decay** ($$\\beta^+$$), a proton converts into a neutron. At the quark level, an **up quark** changes into a **down quark**: $$u \\rightarrow d + e^+ + \\nu_e$$. The composition changes from uud → udd.\n- Step 3: In both cases, a single quark changes flavour (up ↔ down), and the weak force (mediated by W bosons) is responsible for this transformation. This is why beta decay is a weak-force process — only the weak force can change quark flavours.\n\nBeta decay = one quark changes flavour; the weak force is the only force that can do this.", "source": "GLM 5.1 ②", "_id": "glm_2_16"}, {"question": "Why can't we just say \"the electron is one of the things a neutron is made of,\" given that beta-minus decay produces an electron from a neutron? (3 steps)", "answer": "- Step 1: Misconception: thinking of decay products as pre-existing pieces popping out, like opening a box.\n- Step 2: Reality at the quark level: a down quark transforms into an up quark via a W boson, and the W boson then decays into an electron + antineutrino. None of those final particles existed inside the neutron beforehand.\n- Step 3: General principle: in particle physics, mass-energy is converted into new particles according to conservation laws (charge, energy, momentum, lepton number). \"Made of\" applies only to the quark content; emitted particles are *created* at the moment of decay.", "source": "Opus 4.7 ①", "_id": "opus_1_22"}, {"question": "Rank the four fundamental forces from strongest to weakest at the nuclear/particle scale, and state each force's approximate range. (3 steps)", "answer": "- Step 1: From strongest to weakest at the particle scale:\n+ **Strong force** — strongest by far (~100× electromagnetism); range ~$$10^{-15}$$ m (nuclear scale, very short)\n+ **Electromagnetic force** — moderate strength; range infinite (photon is massless)\n+ **Weak force** — very weak at low energies; range ~$$10^{-18}$$ m (even shorter than strong, due to heavy W/Z bosons)\n+ **Gravity** — weakest by an enormous factor (~$$10^{-38}$$ × strong force at particle scale); range infinite (if graviton exists, it would be massless)\n- Step 2: The pattern is: **stronger forces tend to have shorter ranges** (strong and weak are confined to the nucleus), while **weaker forces reach farther** (electromagnetism and gravity operate across cosmic distances).\n- Step 3: This ranking explains everyday reality: nuclear structure is dominated by the strong force (it must overpower EM repulsion between protons), atoms are held together by electromagnetism, and large-scale structure (planets, stars) is shaped by gravity — because at large distances, only gravity and electromagnetism still act.\n\nAt the particle scale: strong wins; at the cosmic scale: gravity wins — each force dominates its own domain.", "source": "GLM 5.1 ③", "_id": "glm_3_19"}, {"question": "Why can't you isolate a single free quark from a proton, even though quarks are fundamental particles? What phenomenon prevents this? (3 steps)", "answer": "- Step 1: The phenomenon is called **colour confinement**. As you try to pull two quarks apart, the strong force between them (mediated by gluons) actually **gets stronger** with distance — unlike electromagnetism, which weakens with distance.\n- Step 2: The energy required to separate the quarks increases so rapidly that before you can pull them far enough apart, the energy input becomes sufficient to **create new quark-antiquark pairs** from the vacuum (via $$E = mc^2$$). The original quarks never emerge alone — new composite particles form instead.\n- Step 3: The analogy: imagine a rubber band that gets stronger the more you stretch it. Eventually, the band snaps — but instead of giving you two free ends, the snap creates two new ends connected by fresh rubber bands. You never get an isolated end.\n\nQuarks are like prisoners in a self-reinforcing cell: pulling harder doesn't free them — it just builds new walls.", "source": "GLM 5.1 ③", "_id": "glm_3_31"}, {"question": "Starting from the quark composition of a neutron (udd) and the individual quark charges, derive the neutron's total charge step by step. (3 steps)", "answer": "- Step 1: Write out each quark and its charge:\n+ Single up quark: $$+\\frac{2}{3}e$$\n+ First down quark: $$-\\frac{1}{3}e$$\n+ Second down quark: $$-\\frac{1}{3}e$$\n- Step 2: Add the charges: $$+\\frac{2}{3}e - \\frac{1}{3}e - \\frac{1}{3}e = \\frac{2}{3}e - \\frac{2}{3}e$$\n- Step 3: Simplify: $$\\frac{2}{3}e - \\frac{2}{3}e = 0$$, which matches the neutron's known charge of $$0$$ (electrically neutral). The positive contribution from the one up quark is exactly cancelled by the two down quarks.\n\nThe neutron's neutrality is a perfect arithmetic cancellation — one up quark's $$+\\frac{2}{3}e$$ is exactly balanced by two down quarks' $$-\\frac{2}{3}e$$.", "source": "GLM 5.1 ③", "_id": "glm_3_9"}, {"question": "A radioactive sample has a half-life of 10 minutes. Roughly what fraction remains after 30 minutes, and what does this illustrate about decay being multiplicative rather than subtractive? (3 steps)", "answer": "- Step 1: 30 minutes = 3 half-lives.\n- Step 2: After each half-life we multiply by $$\\tfrac{1}{2}$$, so the remaining fraction is $$\\left(\\tfrac{1}{2}\\right)^3 = \\tfrac{1}{8}$$.\n- Step 3: Lesson: each half-life removes a *fraction* (half of what's left), not a fixed quantity. If it were subtractive — say, \"loses 1000 atoms per 10 minutes\" — the sample would hit zero in finite time. The multiplicative nature is what gives radioactive decay its exponential character.", "source": "Opus 4.7 ①", "_id": "opus_1_19"}, {"question": "Without doing arithmetic, explain *why* the up-quark charge had to be $$+\\tfrac{2}{3}$$ and the down-quark charge $$-\\tfrac{1}{3}$$ to be consistent with observed nucleon charges. (3 steps)", "answer": "- Step 1: We require uud (proton) to total $$+1$$ and udd (neutron) to total $$0$$.\n- Step 2: Let up = $$x$$, down = $$y$$. Then $$2x + y = 1$$ and $$x + 2y = 0$$. Subtracting gives $$x - y = 1$$, and the second equation gives $$x = -2y$$.\n- Step 3: Solving: $$y = -\\tfrac{1}{3}$$ and $$x = +\\tfrac{2}{3}$$. So the fractional charges are *forced* by the requirement that two specific quark recipes produce charges $$+1$$ and $$0$$ — they aren't an arbitrary choice.\n\nTakeaway: Quark charges are exactly what they must be to \"manufacture\" the nucleons we see.", "source": "Opus 4.7 ①", "_id": "opus_1_21"}, {"question": "Recall the three classical types of radioactive emission and characterise each by what is emitted and roughly how penetrating it is. (3 steps)", "answer": "- Step 1: **Alpha (α)**: a helium-4 nucleus (2 protons + 2 neutrons) is emitted. Heavy, slow, charge $$+2e$$. Stopped by a sheet of paper or a few cm of air.\n- Step 2: **Beta (β)**: a high-speed electron (β⁻) or positron (β⁺) is emitted from the nucleus when a neutron converts to a proton (or vice versa). Stopped by a few mm of aluminium.\n- Step 3: **Gamma (γ)**: a high-energy photon — no charge, no mass, very penetrating. Needs thick lead or concrete to significantly attenuate.", "source": "Opus 4.7 ①", "_id": "opus_1_16"}, {"question": "Why is it conceptually misleading to picture an atom as a solid little sphere, given what we know about its internal layout?", "answer": "- Step 1: Recall the geometry. The nucleus is roughly $$10^{-15}\\,\\text{m}$$ across, while the whole atom is about $$10^{-10}\\,\\text{m}$$ — a factor of about $$10^5$$ difference in radius.\n- Step 2: Translate that to volume. Volume scales as radius cubed, so the nucleus fills only about $$10^{-15}$$ of the atomic volume. The rest is electron cloud / empty space.\n- Step 3: Realise the implication. A \"solid sphere\" picture suggests matter is densely packed everywhere, but in reality matter feels solid only because of **electromagnetic repulsion** between electron clouds, not because atoms are physically filled in.", "source": "Opus 4.7 ①", "_id": "opus_1_1"}, {"question": "Why must the charges of up and down quarks be fractions of $$e$$ (specifically $$+\\frac{2}{3}$$ and $$-\\frac{1}{3}$$) rather than whole numbers? What would go wrong with whole-number quark charges? (2 steps)", "answer": "- Step 1: If quarks had whole-number charges, then combining three quarks (as in protons and neutrons) would always give a whole-number total charge. But we need the proton to have charge $$+1$$ and the neutron to have charge $$0$$, and we need them to differ by swapping just one quark (swapping one up for one down changes a proton into a neutron).\n- Step 2: The fractional charges are the unique solution that satisfies both compositions simultaneously:\n  + Proton (uud): $$q_u + q_u + q_d = +1$$\n  + Neutron (udd): $$q_u + q_d + q_d = 0$$\n  + Solving: from the neutron equation, $$q_u = -2q_d$$. Substituting into the proton equation: $$-2q_d - 2q_d + q_d = +1$$, so $$-3q_d = +1$$, giving $$q_d = -\\frac{1}{3}$$ and $$q_u = +\\frac{2}{3}$$.\n\nThe fractional charges aren't arbitrary — they're mathematically forced by the requirement that uud = +1 and udd = 0.", "source": "GLM 5.1 ②", "_id": "glm_2_9"}, {"question": "Nuclear fusion involves combining light nuclei. Why does fusion release energy, and why does it require extremely high temperatures? (3 steps)", "answer": "- Step 1: Very light nuclei (like hydrogen) have **low binding energy per nucleon**. When two light nuclei fuse into a heavier one (e.g., hydrogen → helium), each nucleon moves to a **more tightly bound** configuration, releasing the energy difference — just like fission, but on the opposite end of the mass scale.\n- Step 2: Fusion requires extremely high temperatures (millions of degrees) because the participating nuclei are **positively charged** and must overcome their **electromagnetic repulsion** to get close enough for the strong force to bind them. High temperature means high kinetic energy, giving nuclei enough speed to push through the EM barrier.\n- Step 3: Once the nuclei are within ~$$10^{-15}$$ m (the strong force's range), the strong force dominates and snaps them together, releasing far more energy per nucleon than fission (for light nuclei). This is why stars, powered by fusion, shine so brightly.\n\nFission works for heavy nuclei (relieving overstuffing); fusion works for light nuclei (building toward tighter binding) — both release energy by moving nucleons toward the iron peak of stability.", "source": "GLM 5.1 ③", "_id": "glm_3_25"}, {"question": "If you tried to \"pull a single quark out\" of a proton, what would happen, and what physics principle does this illustrate? (3 steps)", "answer": "- Step 1: The strong force between quarks does **not** weaken with distance — unlike the electromagnetic force, it stays roughly constant (or even grows) as you separate them.\n- Step 2: As you pull, you put more and more energy into the \"colour string\" between the quarks. Eventually, this stored energy becomes large enough to spontaneously create a new quark–antiquark pair from the vacuum (via $$E = mc^2$$).\n- Step 3: Instead of getting a free quark, you get two new composite particles. This is called **quark confinement**, and it's why we never observe an isolated quark in any experiment.", "source": "Opus 4.7 ②", "_id": "opus_2_16"}, {"question": "Explain why free quarks cannot be observed in nature. (3 steps)", "answer": "- Step 1: **Color confinement**:  \n+ Quarks carry a \"color charge\" that binds them via the strong force (mediated by gluons).  \n- Step 2: **Energy paradox**:  \n+ Separating quarks requires enormous energy, which instead creates quark-antiquark pairs (new particles like pions).  \n- Step 3: **No free quarks detected**:  \n+ Despite high-energy experiments, quarks are always found bound in hadrons (protons, neutrons, mesons).  \n\n**Takeaway:** The strong force strengthens with distance, making quark isolation impossible—they either stay bound or produce new particles via pair creation.", "source": "Qwen 3 ②", "_id": "qwen_2_3"}, {"question": "Synthesis question: If you could remove all the electrons from a carbon-12 atom, what would the remaining object be, and what would its total charge be? Express this in terms of quark content. (3 steps)", "answer": "- Step 1: Removing all electrons leaves just the bare nucleus — 6 protons and 6 neutrons. This is a fully ionized carbon nucleus (sometimes called a \"carbon ion\" or \"bare carbon nucleus\").\n- Step 2: The charge comes only from the protons: $$6 \\times (+1e) = +6e$$. The neutrons contribute 0 charge.\n- Step 3: In quark terms: 18 up quarks ($$18 \\times +\\frac{2}{3} = +12e$$) and 18 down quarks ($$18 \\times -\\frac{1}{3} = -6e$$). Net: $$+12e - 6e = +6e$$. ✓ This confirms the charge from both the proton-count and quark-count perspectives.\n\nA fully ionized atom = bare nucleus with charge +Ze, confirmed by counting either protons or quarks.", "source": "GLM 5.1 ②", "_id": "glm_2_38"}, {"question": "Nuclear fission involves splitting a heavy nucleus. Why does this release energy — what makes heavy nuclei energetically \"unstable\" compared to medium-sized ones? (3 steps)", "answer": "- Step 1: In very heavy nuclei (like uranium-235), there are many protons packed together, creating strong **electromagnetic repulsion** between them. The strong force holds them together, but for large nuclei, the EM repulsion grows faster than the strong force's ability to compensate.\n- Step 1: The **binding energy per nucleon** peaks around iron (medium-sized nuclei). Heavy nuclei beyond iron have **lower binding energy per nucleon**, meaning each nucleon is less tightly bound. Splitting a heavy nucleus into two medium-sized nuclei moves each nucleon to a more tightly-bound configuration — releasing the energy difference.\n- Step 3: When uranium-235 fissions (e.g., into barium + krypton + neutrons), the total mass of the products is slightly **less** than the original mass. The \"missing\" mass is converted to energy via $$E = mc^2$$ — this is the enormous energy output of nuclear fission.\n\nFission releases energy because heavy nuclei are \"overstuffed\" — splitting them lets nucleons settle into more stable, tightly-bound arrangements, and the mass difference becomes energy.", "source": "GLM 5.1 ③", "_id": "glm_3_24"}, {"question": "If you changed a neutron's quark composition from udd to uuu, what would the charge of this hypothetical particle be? Is this a particle observed in nature? (2 steps)", "answer": "- Step 1: Calculate the charge of uuu:\n  + $$\\frac{2}{3} + \\frac{2}{3} + \\frac{2}{3} = \\frac{6}{3} = +2e$$\n  + This hypothetical particle would have charge +2e.\n- Step 2: A uuu particle does exist — it's called the **Delta++ baryon** ($$\\Delta^{++}$$). It's a real but unstable particle with a very short lifetime (~$$10^{-24}$$ s). It's not found in ordinary matter because it decays almost instantly into a proton and a pion. This shows that not all quark combinations are stable; only uud (proton) and udd (neutron, when bound in a nucleus) are long-lived.\n\nNot all three-quark combinations are stable — the universe selects only a few to persist.", "source": "GLM 5.1 ②", "_id": "glm_2_11"}, {"question": "Compare the proton, neutron, and electron in terms of charge (in units of the elementary charge $$e$$) and approximate mass (in unified atomic mass units, $$u$$). Which particle is the outlier, and why? (3 steps)", "answer": "- Step 1: **Proton**: charge $$+1e$$, mass $$\\approx 1\\,u$$. **Neutron**: charge $$0$$, mass $$\\approx 1\\,u$$. **Electron**: charge $$-1e$$, mass $$\\approx \\frac{1}{1836}\\,u$$.\n- Step 2: The electron is the clear outlier — its mass is roughly 1836 times smaller than the proton's or neutron's. This is why we say the nucleus contains essentially all the atom's mass.\n- Step 3: The practical consequence: in any calculation involving atomic mass (e.g., mass defect, binding energy, nuclear reactions), the electron mass is usually negligible. But the electron's charge is exactly equal in magnitude to the proton's charge ($$1e$$), which is why atoms are electrically neutral when proton count = electron count.\n\nThe electron punches far above its weight in charge but is negligible in mass.", "source": "GLM 5.1 ①", "_id": "glm_1_2"}, {"question": "If the nucleus is only about $$\\frac{1}{10{,}000}$$ the diameter of the whole atom, why doesn't the electron cloud collapse inward and make the atom much smaller? What principle prevents this? (2 steps)", "answer": "- Step 1: Electrons are bound by the electromagnetic attraction to the nucleus, but they cannot collapse into it because of **quantum mechanics** — specifically, the uncertainty principle and quantized energy levels. An electron confined to a tiny volume would need enormous kinetic energy, making the tightly-confined state energetically unfavorable.\n- Step 2: The electron settles at a **balance point**: close enough to benefit from electromagnetic attraction, but spread out enough to keep its kinetic energy reasonable. This balance defines the atom's size — roughly $$10^{-10}$$ m for hydrogen — far larger than the nucleus ($$10^{-15}$$ m).\n\nThe atom's size is a quantum negotiation — attraction pulls the electron inward, but quantum uncertainty pushes it outward, and the compromise sets the atom's radius.", "source": "GLM 5.1 ③", "_id": "glm_3_32"}, {"question": "The gauge boson for the electromagnetic force is the photon, which has zero mass. The gauge bosons for the weak force (W and Z) are very massive. How does this mass difference explain the difference in range between these two forces? (2 steps)", "answer": "- Step 1: The range of a force is related to the mass of its gauge boson. A massless boson (like the photon) can travel arbitrarily far, giving the electromagnetic force an **infinite range** (decreasing as $$1/r^2$$).\n- Step 2: Massive bosons (W and Z, ~80-90× the proton mass) require energy to create and can only exist for extremely short times (by the uncertainty principle, $$\\Delta t \\sim \\hbar / \\Delta E$$). This limits their range to about $$10^{-18}$$ m, making the weak force extremely **short-range** — far shorter than even the strong force.\n\nMassless carrier → infinite range (EM). Massive carrier → tiny range (weak). Boson mass is the range-limiting factor.", "source": "GLM 5.1 ②", "_id": "glm_2_42"}, {"question": "Which particles mediate the weak nuclear force, and what is the primary role of this force in nuclear physics? (2 steps)", "answer": "- Step 1: The weak force is mediated by the **W⁺, W⁻, and Z⁰ bosons**. Unlike photons and gluons, these bosons are massive (~80–90 GeV/c²), which is why the weak force has extremely short range (~10⁻¹⁸ m).\n- Step 2: The weak force is responsible for **beta decay** — the process by which a neutron converts into a proton (or vice versa) by changing one of its quarks. In β⁻ decay, a down quark in a neutron becomes an up quark (turning the neutron into a proton), emitting a W⁻ boson that decays into an electron and an antineutrino.\n\nThe weak force changes quark *flavour* (up ↔ down), which is why it can transmute one element into another.", "source": "GLM 5.1 ①", "_id": "glm_1_13"}, {"question": "The strong force between quarks is described as getting *stronger* with distance, unlike electromagnetism which gets *weaker*. What is the practical consequence of this for quark confinement? (2 steps)", "answer": "- Step 1: In electromagnetism, the force between two charges follows Coulomb's law ($$F \\propto 1/r^2$$) — it weakens with distance, so separating two charges becomes easier the further apart they are. In the strong force, the gluon field between quarks behaves like a spring or rubber band: the force remains roughly constant (or even increases) with distance.\n- Step 2: The consequence: as you try to separate two quarks, the energy required grows linearly with distance. Long before you can isolate a quark, you deposit enough energy into the gluon field to create new quark-antiquark pairs ($$E = mc^2$$). The system \"snaps\" into colour-neutral bound states rather than yielding free quarks. This is why **colour confinement** is absolute — no amount of pulling can free a quark.\n\nThe strong force is a spring that never breaks — it just spawns new particles instead.", "source": "GLM 5.1 ①", "_id": "glm_1_33"}, {"question": "Both fission and fusion release energy, yet they operate on opposite ends of the nuclear mass scale. What single concept explains why both processes can be exothermic? (2 steps)", "answer": "- Step 1: The key concept is **binding energy per nucleon**, which peaks around iron-56. Nuclei lighter than iron release energy when they **fuse** (moving toward the peak), and nuclei heavier than iron release energy when they **fission** (also moving toward the peak). Both processes move nucleons toward more tightly-bound configurations.\n- Step 2: Iron is the \"valley of stability\" — any nuclear rearrangement that moves closer to iron from either direction releases energy, just as a ball rolling toward the bottom of a valley from either side loses potential energy.\n\nIron-56 is the nuclear \"gold standard\" — both fission and fusion are just different routes downhill toward the same energetic valley.", "source": "GLM 5.1 ③", "_id": "glm_3_26"}, {"question": "A common misconception is that a neutron might be a proton with an electron stuck to it (since proton is $$+1$$ and electron is $$-1$$, giving net charge $$0$$, and both are found in the nucleus). Why is this model wrong? (3 steps)", "answer": "- Step 1: If a neutron were a proton + electron, the neutron's mass should be roughly $$1 \\text{ u} + \\frac{1}{1836} \\text{ u} \\approx 1.0005 \\text{ u}$$, slightly heavier than a proton. In reality, the neutron is indeed slightly heavier, but only by about $$0.0014 \\text{ u}$$ — and more importantly, the internal structure is completely different.\n- Step 2: A neutron is made of **three quarks** (udd), not two particles bundled together. A proton is also three quarks (uud). They are **siblings at the same structural level**, not a parent-child combination. You can't build one from the other by just attaching an electron.\n- Step 3: Additionally, in **beta decay**, a neutron *converts* into a proton + electron + antineutrino. This transformation happens through the **weak force** changing a down quark into an up quark inside the neutron — it's a fundamental internal rearrangement, not \"an electron falling off.\"\n\nThe neutron is its own distinct composite particle, not a proton with an electron accessory.", "source": "GLM 5.1 ③", "_id": "glm_3_2"}, {"question": "A student claims \"neutrons must be made of three identical quarks because they have zero charge.\" Why is this wrong, and what does the correct composition tell us?", "answer": "- Step 1: Identify the misconception. Zero net charge does *not* require identical constituents — it just requires the charges to cancel.\n- Step 2: Show the actual makeup. A neutron is **udd**: one $$+\\tfrac{2}{3}$$ and two $$-\\tfrac{1}{3}$$, which cancel to zero. The quarks are not identical.\n- Step 3: Draw the deeper lesson. The proton and neutron differ by only one quark flavour (u↔d), which is why a neutron can decay into a proton (plus an electron and antineutrino) — that's beta-minus decay at the quark level.", "source": "Opus 4.7 ①", "_id": "opus_1_7"}, {"question": "Misconception probe: \"A proton is positive because it has more up quarks than down quarks.\" Is this the correct way to think about it? What's the precise reasoning? (2 steps)", "answer": "- Step 1: The statement is directionally true but imprecise. A proton (uud) does have more up quarks (2) than down quarks (1), and the up quark has a more positive charge than the down quark. However, the real reason the proton is positive is that the **sum of the individual quark charges equals +1**: $$\\frac{2}{3} + \\frac{2}{3} - \\frac{1}{3} = +1$$.\n- Step 2: The \"more up quarks\" logic breaks down in edge cases. Consider a hypothetical particle with 3 down quarks (ddd): it has more down quarks than up quarks, but its charge would be $$-\\frac{1}{3} \\times 3 = -1$$, not simply \"negative because more down quarks.\" The charge depends on the specific fractional values, not just which type outnumbers the other.\n\nIt's the arithmetic of fractional charges that matters, not just which quark type is more numerous.", "source": "GLM 5.1 ②", "_id": "glm_2_41"}, {"question": "Which fundamental force is responsible for holding the quarks inside a single proton together, and why must it be much stronger than electromagnetism on that scale? (3 steps)", "answer": "- Step 1: Identify the force. The **strong force**, mediated by **gluons**, binds quarks inside a proton.\n- Step 2: Spot the problem it solves. Two of the three quarks in a proton (the two up quarks) carry like charges ($$+\\tfrac{2}{3}$$ each) and would electrically repel each other very strongly at sub-femtometre distances.\n- Step 3: Conclude. For the proton to be a stable bound object, the attractive strong force must overpower this electromagnetic repulsion at short range — which is exactly why \"strong\" is in its name.", "source": "Opus 4.7 ①", "_id": "opus_1_13"}, {"question": "A hypothetical three-quark particle has the composition \"ud u\" (one down quark, two up quarks — same as a proton). Another hypothetical particle has composition \"udd\" (one up, two down — same as a neutron). Now consider a particle with composition \"uus\" where \"s\" is a strange quark with charge $$-\\frac{1}{3}e$$. What would its total charge be? (2 steps)", "answer": "- Step 1: Add the charges of the three quarks:\n+ Up quark: $$+\\frac{2}{3}e$$\n+ Up quark: $$+\\frac{2}{3}e$$\n+ Strange quark: $$-\\frac{1}{3}e$$\n- Step 2: Total charge = $$+\\frac{2}{3}e + \\frac{2}{3}e - \\frac{1}{3}e = \\frac{4}{3}e - \\frac{1}{3}e = \\frac{3}{3}e = +1e$$. This particle would have the same charge as a proton ($$+1e$$), but a different mass and identity because the strange quark is heavier than the down quark. (This is actually the Sigma-plus baryon, $$\\Sigma^+$$.)\n\nSame charge doesn't mean same particle — the quark \"flavour\" recipe determines identity, not just the arithmetic total.", "source": "GLM 5.1 ③", "_id": "glm_3_29"}, {"question": "Beta radiation involves a neutron transforming into a proton (or vice versa). At the quark level, what exactly happens inside the neutron during beta-minus decay? (3 steps)", "answer": "- Step 1: In beta-minus decay, a **neutron** (udd: one up quark + two down quarks) converts into a **proton** (uud: two up quarks + one down quark). At the quark level, one of the neutron's **down quarks changes into an up quark**.\n- Step 2: This quark transformation is mediated by the **weak force** (via a $$W^-$$ boson). The down quark emits a $$W^-$$ boson and becomes an up quark. The $$W^-$$ boson then quickly decays into an **electron** and an **antineutrino**, which are ejected from the nucleus.\n- Step 3: The result: the original nucleus gains one proton (atomic number increases by 1, mass number stays the same), and an electron + antineutrino fly out as the detectable beta radiation. The element transmutes to the next one in the periodic table.\n\nBeta-minus decay is a single quark identity swap (d → u) mediated by the weak force — the smallest possible change that transforms a neutron into a proton.", "source": "GLM 5.1 ③", "_id": "glm_3_21"}, {"question": "An atom has a nucleus and an electron cloud. Where is most of the atom's *mass* concentrated, and where is most of its *volume* occupied? Why are these two answers different? (3 steps)", "answer": "- Step 1: Most of the atom's **mass** is concentrated in the **nucleus**, because protons and neutrons each have a mass of roughly $$1 \\text{ u}$$ (atomic mass unit), while electrons are only $$\\sim \\frac{1}{1836} \\text{ u}$$ — almost negligible in comparison.\n- Step 2: However, most of the atom's **volume** is **empty space** occupied by the electron cloud. The nucleus is extremely tiny compared to the full atom — roughly $$\\frac{1}{10{,}000}$$ of the atom's diameter. If the nucleus were a marble at the center of a football stadium, the electrons would be somewhere in the stands, and everything between would be vacant.\n- Step 3: The reason these differ is that mass depends on particle count and type (heavy nucleons vs light electrons), while volume depends on how far the electrons extend outward. The electrons define the atom's boundary, but they barely contribute to its weight.\n\nThe atom is simultaneously \"mostly empty\" and \"mostly heavy in the center\" — these are not contradictory, they describe different properties.", "source": "GLM 5.1 ③", "_id": "glm_3_0"}, {"question": "A student says: \"The photon carries the electromagnetic force, so whenever light shines on something, the electromagnetic force is being transferred.\" Is this a fair statement? Explain. (2 steps)", "answer": "- Step 1: This is essentially correct. When two charged particles interact electromagnetically, the interaction is mediated by the exchange of virtual photons. And when real photons (light) are absorbed or emitted by charged particles, that too is an electromagnetic interaction — the photon is indeed the carrier of the electromagnetic force.\n- Step 2: However, there's a subtlety: the photons that mediate the force between two charges at rest are **virtual photons** (they exist only as intermediate exchange particles and cannot be directly detected). The photons in a beam of light are **real photons** that can be detected. Both are photons, both carry electromagnetic interaction, but virtual photons are force-mediators while real photons are observable radiation.\n\nYes, light involves EM force transfer — but the \"messenger\" photons between static charges are virtual, while the photons in a light beam are real.", "source": "GLM 5.1 ②", "_id": "glm_2_34"}, {"question": "A student says: \"Since a neutron has no charge, its quarks must all be neutral.\" Is this correct? Explain what's really happening. (2 steps)", "answer": "- Step 1: This is incorrect. The quarks inside a neutron are **not** neutral — the up quark has charge $$+\\frac{2}{3}e$$ and each down quark has charge $$-\\frac{1}{3}e$$. These are non-zero, fractional charges.\n- Step 2: What makes the neutron neutral is that the charges **cancel out** when summed: $$+\\frac{2}{3} - \\frac{1}{3} - \\frac{1}{3} = 0$$. This is like a bank account with +$200 and -$200: the net is zero, but the individual transactions aren't zero. The neutron has internal charge structure even though its net charge is zero.\n\nZero net charge ≠ no internal charges. The quarks carry charge; they just sum to zero.", "source": "GLM 5.1 ②", "_id": "glm_2_8"}, {"question": "Alpha radiation involves no quark flavour changes. Why not — what is actually happening? (2 steps)", "answer": "- Step 1: An alpha particle is a **helium nucleus** (2 protons + 2 neutrons). Alpha decay occurs when a heavy nucleus ejects this cluster of nucleons. The quarks inside each proton and neutron remain exactly as they were — no up↔down conversions occur.\n- Step 2: Alpha decay is driven by the **strong force** and **electromagnetic repulsion**. In heavy nuclei, the mutual repulsion of many protons eventually overcomes the strong force's ability to hold everything together, and a 2-proton + 2-neutron chunk breaks away. The weak force (and hence quark flavour change) plays no role.\n\nAlpha decay = nuclear restructuring; beta decay = quark flavour change. Different mechanisms entirely.", "source": "GLM 5.1 ①", "_id": "glm_1_18"}, {"question": "Suppose you encounter a hypothetical three-quark particle with composition \"uud\" but are told it is *not* a proton. Under normal Standard Model rules, why is this impossible — what defines a proton's identity? (2 steps)", "answer": "- Step 1: In the Standard Model, a proton is **defined** by its quark composition uud (two up quarks + one down quark) bound together via the strong force. There is no other particle with the exact same quark content — the combination uud uniquely identifies the proton.\n- Step 2: Other three-quark combinations exist (e.g., uuu, ddd, uds) but they form **different particles** (like the Delta baryons or the Sigma baryons) with different charges, masses, and properties. The quark recipe is the particle's identity — change the recipe, change the particle.\n\nA particle's identity card is its quark composition — uud means proton, nothing else.", "source": "GLM 5.1 ③", "_id": "glm_3_10"}, {"question": "Why does both fission (splitting heavy nuclei) and fusion (combining light nuclei) release energy? What single principle explains both? (3 steps)", "answer": "- Step 1: The key principle is **binding energy per nucleon**. Nuclei near iron-56 (A ≈ 56) have the highest binding energy per nucleon — they are the most tightly bound, most stable configurations.\n- Step 2: For nuclei **heavier** than iron, the binding energy per nucleon decreases. Splitting a very heavy nucleus into two medium-mass nuclei moves each fragment closer to the iron peak, increasing binding energy per nucleon. The difference is released as energy. This is fission.\n- Step 3: For nuclei **lighter** than iron, the binding energy per nucleon increases rapidly with mass number. Combining two light nuclei into a heavier one moves the product closer to the iron peak, again increasing binding energy per nucleon and releasing energy. This is fusion.\n\nBoth processes move toward the iron peak of maximum stability — fission from above, fusion from below.", "source": "GLM 5.1 ②", "_id": "glm_2_23"}, {"question": "What is a lepton, and how does the electron qualify as one? What key property distinguishes leptons from quarks? (2 steps)", "answer": "- Step 1: A **lepton** is a fundamental particle that does not experience the **strong force** (the force that binds quarks together inside nucleons). The electron is a lepton because it cannot be trapped inside a nucleus by the strong force — it only interacts via electromagnetism and the weak force.\n- Step 2: This is the critical distinction: **quarks feel the strong force** (and are therefore confined inside composite particles), while **leptons do not** (and can exist freely as independent particles — you can isolate an electron, but you can never isolate a single quark).\n\nLeptons are \"free spirits\" — they escape strong-force confinement; quarks are \"prisoners\" — always locked inside larger particles.", "source": "GLM 5.1 ③", "_id": "glm_3_12"}, {"question": "Define half-life in a way that distinguishes it from \"the time for all atoms to decay.\" What fraction remains after 3 half-lives? (3 steps)", "answer": "- Step 1: **Half-life** ($$t_{1/2}$$) is the time taken for *half* the radioactive nuclei in a sample to decay. It is a statistical property — it applies to large populations, not to any individual atom.\n- Step 2: After each half-life, the remaining fraction halves:\n  + After 1 half-life: $$\\frac{1}{2}$$ remains\n  + After 2 half-lives: $$\\frac{1}{4}$$ remains\n  + After 3 half-lives: $$\\frac{1}{8}$$ remains\n- Step 3: Mathematically, after $$n$$ half-lives, the remaining fraction is $$\\left(\\frac{1}{2}\\right)^n$$. The amount never truly reaches zero — it approaches zero asymptotically. \"All atoms decay\" would require infinite time.\n\nHalf-life describes exponential decay: each interval halves the remainder, never quite reaching zero.", "source": "GLM 5.1 ①", "_id": "glm_1_20"}, {"question": "If the strong force is so strong, why doesn't it pull all the protons and neutrons in the universe together into one giant nucleus? (2 steps)", "answer": "- Step 1: The strong force (or more precisely, the **residual strong force** that binds nucleons together) has a very **short range** — it only operates effectively over distances of about 1-3 femtometres ($$10^{-15}$$ m). Beyond this range, it drops off extremely rapidly to essentially zero.\n- Step 2: Beyond the nuclear range, the electromagnetic repulsion between protons (which has infinite range, decreasing as $$1/r^2$$) dominates. So for nucleons that are far apart, EM repulsion wins and they cannot be pulled together by the strong force. Only when nucleons are already extremely close (within a nucleus) does the strong force overcome EM repulsion.\n\nShort range is the key: strong force wins at close quarters, but can't reach across distances larger than a nucleus.", "source": "GLM 5.1 ②", "_id": "glm_2_32"}, {"question": "Which fundamental force keeps the protons in a nucleus bound together despite their mutual electric repulsion, and what does this imply about its range vs. strength compared to the EM force? (3 steps)", "answer": "- Step 1: Same force, different scale: the **strong force** also binds protons and neutrons to each other inside a nucleus (often called the \"residual\" strong force).\n- Step 2: Compare strength: at nuclear distances (~$$10^{-15}\\,\\text{m}$$), it is much stronger than EM repulsion, so the nucleus stays bound.\n- Step 3: Compare range: but it is extremely **short-ranged** — it drops off rapidly beyond a few femtometres. This is why very large nuclei become unstable: protons on opposite sides feel the long-range EM repulsion but barely feel each other's strong attraction, leading to fission tendencies.", "source": "Opus 4.7 ①", "_id": "opus_1_14"}, {"question": "A common mental picture of an atom is a solid sphere, like a billiard ball. Why is this picture deeply misleading, and what fraction of the atom's volume is actually occupied by matter? (2 steps)", "answer": "- Step 1: The atom's diameter is about 10⁻¹⁰ m, while the nucleus is about 10⁻¹⁴ m. The ratio of diameters is roughly 10⁴, so the ratio of *volumes* is roughly (10⁴)³ = 10¹². The nucleus occupies about **one trillionth** of the atom's volume.\n- Step 2: Adding electron sizes doesn't change the picture — electrons are point-like for all practical purposes. So over 99.9999999999% of an atom's volume is empty space. The \"billiard ball\" illusion comes from electromagnetic repulsion between adjacent atoms, which prevents them from overlapping — your hand doesn't pass through a table because of electric forces, not because atoms are solid.\n\nSolid matter is solid because of *forces*, not because atoms are filled with stuff.", "source": "GLM 5.1 ①", "_id": "glm_1_1"}, {"question": "The W and Z bosons are much heavier than a proton (~80-91 GeV/c² vs ~1 GeV/c² for a proton). Why does this large mass make the weak force **short-range** compared to the electromagnetic force carried by the massless photon? (2 steps)", "answer": "- Step 1: A force carrier's range is limited by how far it can travel before it must be \"re-absorbed\" to conserve energy. For a **massive** boson like the W or Z, creating it temporarily (as a virtual particle) requires \"borrowing\" a large amount of energy, which by the energy-time uncertainty principle can only be \"borrowed\" for a very **short time**.\n- Step 2: Short borrowing time → short travel distance → the W/Z boson can only mediate interactions within about $$10^{-18}$$ m. The massless **photon**, requiring no energy borrowing to exist temporarily, can travel arbitrarily far, giving electromagnetism infinite range.\n\nHeavy force carriers = short-range forces; massless force carriers = long-range forces — the boson's mass sets the force's reach.", "source": "GLM 5.1 ③", "_id": "glm_3_34"}, {"question": "A student claims: \"Fusion is just fission in reverse, so they're the same process.\" Why is this wrong, even though both release energy? (2 steps)", "answer": "- Step 1: While it's true that fission splits a nucleus and fusion joins nuclei (superficially \"opposite\"), they operate on **opposite sides of the binding energy curve**. Fission works on very heavy nuclei (A > ~56); fusion works on very light nuclei (A < ~56). They are not the same process running in different directions on the same material.\n- Step 2: The conditions required are also radically different. Fission can occur at room temperature if a critical mass is assembled (or a neutron is absorbed). Fusion requires temperatures of millions of degrees to overcome Coulomb repulsion between nuclei. The engineering challenges are entirely different.\n\nSame destination (more stable nuclei), opposite starting points, vastly different conditions.", "source": "GLM 5.1 ①", "_id": "glm_1_23"}, {"question": "Why is the strong force needed inside the nucleus — i.e. why isn't electromagnetism enough to hold things together? (3 steps)", "answer": "- Step 1: Protons all carry positive charge, so they **electromagnetically repel** each other very strongly at nuclear distances ($$\\sim 10^{-15}$$ m).\n- Step 2: Without an additional attractive force, no nucleus with more than one proton could exist — yet we see stable nuclei with up to ~82 protons.\n- Step 3: The **strong nuclear force** is short-ranged but extremely powerful at nuclear distances, overpowering the EM repulsion between protons and binding all nucleons together. Beyond about $$10^{-15}$$ m it drops off rapidly, which is why very large nuclei become unstable (EM repulsion starts to win across the whole nucleus).", "source": "Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "Why does gravity, despite being the force we feel most in daily life, play essentially no role inside an atom? (3 steps)", "answer": "- Step 1: Gravity scales with **mass**, and particle masses are tiny ($$\\sim 10^{-27}$$ kg for a proton).\n- Step 2: At atomic scales, the electromagnetic force between a proton and electron is roughly $$10^{39}$$ times stronger than the gravitational attraction between them.\n- Step 3: So inside atoms, gravity is utterly negligible. We feel gravity on macroscopic scales only because it always **adds up** (mass can't be negative), while EM forces tend to cancel out in bulk neutral matter.\n\nThis is also why unifying gravity with the Standard Model is so hard — at the quantum level it's just too weak to test directly.", "source": "Opus 4.7 ②", "_id": "opus_2_21"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "An atom has two major structural regions. One contains virtually all the mass; the other contains virtually all the volume. Name each region and state what occupies it. (3 steps)", "answer": "- Step 1: The **nucleus** is the tiny central core. It contains the protons and neutrons (collectively called nucleons). Because each nucleon has a mass of roughly 1 unified atomic mass unit (u), and the electron is ~1/1836 u, the nucleus holds over 99.97% of the atom's total mass.\n- Step 2: The **electron cloud** surrounds the nucleus. Electrons occupy orbitals that extend far out from the nucleus, defining the atom's size (~10⁻¹⁰ m diameter). But electrons contribute negligible mass.\n- Step 3: The key insight — an atom is **mostly empty space**. The nucleus is ~10⁻¹⁴ m across, yet the atom is ~10⁻¹⁰ m across. If the nucleus were a marble at the centre of a football stadium, the electrons would be somewhere in the stands. Mass is concentrated; volume is vacant.\n\nThe atom is a \"tiny dense core + vast empty cloud\" — not a solid blob.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "A common mental picture of an atom is a solid sphere, like a billiard ball. Why is this picture deeply misleading, and what fraction of the atom's volume is actually occupied by matter? (2 steps)", "answer": "- Step 1: The atom's diameter is about 10⁻¹⁰ m, while the nucleus is about 10⁻¹⁴ m. The ratio of diameters is roughly 10⁴, so the ratio of *volumes* is roughly (10⁴)³ = 10¹². The nucleus occupies about **one trillionth** of the atom's volume.\n- Step 2: Adding electron sizes doesn't change the picture — electrons are point-like for all practical purposes. So over 99.9999999999% of an atom's volume is empty space. The \"billiard ball\" illusion comes from electromagnetic repulsion between adjacent atoms, which prevents them from overlapping — your hand doesn't pass through a table because of electric forces, not because atoms are solid.\n\nSolid matter is solid because of *forces*, not because atoms are filled with stuff.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": true}, {"question": "Compare the proton, neutron, and electron in terms of charge (in units of the elementary charge $$e$$) and approximate mass (in unified atomic mass units, $$u$$). Which particle is the outlier, and why? (3 steps)", "answer": "- Step 1: **Proton**: charge $$+1e$$, mass $$\\approx 1\\,u$$. **Neutron**: charge $$0$$, mass $$\\approx 1\\,u$$. **Electron**: charge $$-1e$$, mass $$\\approx \\frac{1}{1836}\\,u$$.\n- Step 2: The electron is the clear outlier — its mass is roughly 1836 times smaller than the proton's or neutron's. This is why we say the nucleus contains essentially all the atom's mass.\n- Step 3: The practical consequence: in any calculation involving atomic mass (e.g., mass defect, binding energy, nuclear reactions), the electron mass is usually negligible. But the electron's charge is exactly equal in magnitude to the proton's charge ($$1e$$), which is why atoms are electrically neutral when proton count = electron count.\n\nThe electron punches far above its weight in charge but is negligible in mass.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": true}, {"question": "A neutral atom has 6 protons. How many electrons must it have, and what would change if it gained one extra electron? (2 steps)", "answer": "- Step 1: A neutral atom has equal numbers of protons and electrons. With 6 protons (charge $$+6e$$), it needs 6 electrons (charge $$-6e$$) to give a net charge of zero.\n- Step 2: If it gains one extra electron, the total electron charge becomes $$-7e$$ while proton charge remains $$+6e$$. The net charge is $$-1e$$. The atom is now a **negative ion** (specifically, an anion with charge $$-1$$).\n\nIons arise from electron gain/loss — the nucleus never changes in this process.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "Protons and neutrons are *not* fundamental particles. What are they made of, and what does \"fundamental\" mean in this context? (2 steps)", "answer": "- Step 1: \"Fundamental\" means the particle has no internal structure — it cannot be broken down into smaller constituents. Protons and neutrons are **not** fundamental because each is composed of smaller particles called **quarks**.\n- Step 2: A proton is made of two **up quarks** and one **down quark** (written **uud**). A neutron is made of one up quark and two down quarks (written **udd**). Quarks themselves are, as far as current physics can tell, fundamental — they have no substructure.\n\n\"Fundamental\" = no smaller pieces inside; quarks are fundamental; protons and neutrons are composite.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "What are the electric charges of the up quark and the down quark, expressed as fractions of the elementary charge $$e$$? Why are fractional charges surprising from a classical perspective? (2 steps)", "answer": "- Step 1: The **up quark** has charge $$+\\frac{2}{3}e$$. The **down quark** has charge $$-\\frac{1}{3}e$$. These are the only two quarks you need for ESAT-level particle physics.\n- Step 2: In classical physics and chemistry, every observed free particle carries an integer multiple of $$e$$ (0, ±1, ±2, ...). Finding that confined particles inside nucleons carry *fractional* charges was a major surprise. The resolution: quarks are never found in isolation (a phenomenon called **colour confinement**), so we never observe a free particle with fractional charge. Only their bound combinations yield integer charges.\n\nFractional charges exist inside nucleons but are always \"hidden\" by confinement — the universe only ever shows us integer charges on free particles.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "Using the quark model, derive the charge of a proton step by step. State the quark composition and show the addition. (3 steps)", "answer": "- Step 1: A proton is composed of two up quarks and one down quark: **uud**.\n- Step 2: Write out each quark's charge:\n  + Up quark: $$+\\frac{2}{3}e$$\n  + Up quark: $$+\\frac{2}{3}e$$\n  + Down quark: $$-\\frac{1}{3}e$$\n- Step 3: Add them: $$\\frac{2}{3} + \\frac{2}{3} - \\frac{1}{3} = \\frac{2+2-1}{3} = \\frac{3}{3} = +1e$$. This matches the proton's known charge of $$+1e$$.\n\nThe quark model self-consistently produces the proton charge — this is one of its strongest pieces of evidence.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "Using the quark model, derive the charge of a neutron step by step. (3 steps)", "answer": "- Step 1: A neutron is composed of one up quark and two down quarks: **udd**.\n- Step 2: Write out each quark's charge:\n  + Up quark: $$+\\frac{2}{3}e$$\n  + Down quark: $$-\\frac{1}{3}e$$\n  + Down quark: $$-\\frac{1}{3}e$$\n- Step 3: Add them: $$\\frac{2}{3} - \\frac{1}{3} - \\frac{1}{3} = \\frac{2-1-1}{3} = \\frac{0}{3} = 0$$. This matches the neutron's known charge of zero.\n\nThe neutron is electrically neutral overall, but internally it is made of charged quarks — neutrality emerges from the cancellation of fractional charges.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "A student says: \"The neutron has no charge, so it must be made of particles with no charge.\" Why is this reasoning flawed? (2 steps)", "answer": "- Step 1: The statement confuses *net* charge with *constituent* charges. A neutron's net charge is zero, but its constituents — one up quark ($$+\\frac{2}{3}e$$) and two down quarks ($$-\\frac{1}{3}e$$ each) — are all individually charged. The charges cancel perfectly: $$+\\frac{2}{3} - \\frac{1}{3} - \\frac{1}{3} = 0$$.\n- Step 2: This is like saying a neutral molecule (e.g., H₂O) contains no charged particles — but it contains protons and electrons. Net neutrality ≠ absence of charge. The neutron's internal charges are what give it a **magnetic moment** (it behaves like a tiny magnet), which a truly chargeless particle would not have.\n\nZero net charge does not mean zero internal charge — cancellation is not absence.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "If a hypothetical particle were made of three up quarks (uuu), what would its charge be? Is this a known particle, and what does this exercise reveal about quark combinations? (2 steps)", "answer": "- Step 1: Three up quarks: $$+\\frac{2}{3} + \\frac{2}{3} + \\frac{2}{3} = +\\frac{6}{3} = +2e$$. This particle would have double the proton's charge.\n- Step 2: This combination actually exists — it's called the $$\\Delta^{++}$$ (Delta plus-plus) baryon. It's a short-lived particle (lifetime ~10⁻²⁴ s), not a stable nucleon. The exercise reveals that not every quark triplet is a stable proton or neutron; the specific combination (uud vs udd vs uuu) determines the particle's identity, charge, and stability.\n\nQuark combinations define particle identity — change one quark and you get an entirely different particle.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "Name the three broad categories of fundamental particles in the Standard Model, and give the primary example of each that is relevant at ESAT level. (3 steps)", "answer": "- Step 1: **Quarks** — fundamental particles that combine in groups of three to form protons, neutrons, and other hadrons. The up and down quarks are the ESAT-relevant examples.\n- Step 2: **Leptons** — fundamental particles that do NOT experience the strong force. The electron is the key ESAT-relevant example (others include muons, taus, and neutrinos).\n- Step 3: **Gauge bosons** — force-carrying particles that mediate the fundamental forces. The photon (electromagnetic force) is the most familiar example; others include gluons (strong force) and W/Z bosons (weak force).\n\nQuarks build matter, leptons include the electron, and gauge bosons carry forces between them.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "Which fundamental force holds quarks together inside a proton, and what particle mediates (carries) this force? (2 steps)", "answer": "- Step 1: The **strong nuclear force** (also called the strong interaction) binds quarks together inside nucleons and also holds nucleons together inside the nucleus. It is the strongest of the four fundamental forces.\n- Step 2: The strong force is mediated by **gluons**. The name is a deliberate pun — gluons \"glue\" quarks together. Unlike photons (which are electrically neutral), gluons themselves carry colour charge, which means gluons interact with *each other*, making the strong force behave very differently from electromagnetism (it gets stronger with distance, leading to confinement).\n\nGluons carry the strong force; their self-interaction is what makes quark confinement possible.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "Which particle mediates the electromagnetic force, and why is this force familiar in everyday life? (2 steps)", "answer": "- Step 1: The electromagnetic force is mediated by the **photon**. Photons are massless, travel at the speed of light, and carry energy and momentum but no charge.\n- Step 2: This force is responsible for essentially every everyday phenomenon except gravity: chemical bonding, friction, normal forces, electricity, magnetism, light, and the fact that you don't fall through your chair. When two electrons repel, they exchange a virtual photon — this is the quantum field theory picture of \"like charges repel.\"\n\nPhotons are the messengers of electromagnetism — the force that dominates daily life.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "Which particles mediate the weak nuclear force, and what is the primary role of this force in nuclear physics? (2 steps)", "answer": "- Step 1: The weak force is mediated by the **W⁺, W⁻, and Z⁰ bosons**. Unlike photons and gluons, these bosons are massive (~80–90 GeV/c²), which is why the weak force has extremely short range (~10⁻¹⁸ m).\n- Step 2: The weak force is responsible for **beta decay** — the process by which a neutron converts into a proton (or vice versa) by changing one of its quarks. In β⁻ decay, a down quark in a neutron becomes an up quark (turning the neutron into a proton), emitting a W⁻ boson that decays into an electron and an antineutrino.\n\nThe weak force changes quark *flavour* (up ↔ down), which is why it can transmute one element into another.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": true}, {"question": "What particle is theorized to mediate gravity, and why is its status different from the other force carriers? (2 steps)", "answer": "- Step 1: The **graviton** is the theoretical force carrier for gravity. It would be massless and spin-2 (if it exists).\n- Step 2: Unlike gluons, photons, and W/Z bosons — all of which have been experimentally detected — the graviton has **never been observed**. Gravity is perfectly described by General Relativity (a classical theory), and no experiment has confirmed a quantum particle for gravity. Hence the graviton remains speculative.\n\nThe graviton is the only Standard Model force carrier that is still purely theoretical.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "Place the four fundamental forces in order from strongest to weakest at the scale of a nucleon. Which force dominates at astronomical scales, and why? (3 steps)", "answer": "- Step 1: Order by relative strength at nucleon scale: **Strong** (1) ≫ **Electromagnetic** (~10⁻²) ≫ **Weak** (~10⁻⁷) ≫ **Gravity** (~10⁻³⁹).\n- Step 2: Despite being by far the weakest, **gravity dominates at astronomical scales** because it has infinite range and is always attractive (no cancellation). Massive objects like stars and planets have enormous numbers of particles, and all their gravitational contributions add up.\n- Step 3: The strong force, though immensely powerful, has extremely short range (~10⁻¹⁵ m, about a nucleon diameter). It effectively vanishes beyond the nucleus. Electromagnetism has infinite range but large objects tend to be electrically neutral (charges cancel). The weak force has both tiny strength and tiny range.\n\nGravity wins at large scales not by being strong, but by being persistent and never cancelling.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "In beta-minus (β⁻) decay, a neutron transforms into a proton. Explain this at the quark level: which quark changes, and into what? (3 steps)", "answer": "- Step 1: A neutron is **udd** (up, down, down). A proton is **uud** (up, up, down). Comparing the two, one down quark has become an up quark.\n- Step 2: This flavour change is mediated by the weak force. Specifically, a down quark emits a **W⁻ boson** and transforms into an up quark: $$d \\rightarrow u + W^{-}$$.\n- Step 3: The W⁻ boson is extremely short-lived and decays into an **electron** and an **electron antineutrino**: $$W^{-} \\rightarrow e^{-} + \\bar{\\nu}_e$$. So the full process is: $$n \\rightarrow p + e^{-} + \\bar{\\nu}_e$$, which is the standard β⁻ decay equation.\n\nBeta decay is literally a quark changing flavour — the weak force is the only force that can do this.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "In beta-plus (β⁺) decay, a proton transforms into a neutron. At the quark level, what changes, and what particles are emitted? (3 steps)", "answer": "- Step 1: A proton is **uud**. A neutron is **udd**. One up quark must become a down quark.\n- Step 2: The up quark emits a **W⁺ boson** and transforms into a down quark: $$u \\rightarrow d + W^{+}$$.\n- Step 3: The W⁺ boson decays into a **positron** (anti-electron, $$e^{+}$$) and an **electron neutrino** ($$\\nu_e$$): $$W^{+} \\rightarrow e^{+} + \\nu_e$$. The full process: $$p \\rightarrow n + e^{+} + \\nu_e$$.\n\nβ⁺ decay is the mirror of β⁻ decay — an up quark becomes a down quark instead of the reverse.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "Alpha radiation involves no quark flavour changes. Why not — what is actually happening? (2 steps)", "answer": "- Step 1: An alpha particle is a **helium nucleus** (2 protons + 2 neutrons). Alpha decay occurs when a heavy nucleus ejects this cluster of nucleons. The quarks inside each proton and neutron remain exactly as they were — no up↔down conversions occur.\n- Step 2: Alpha decay is driven by the **strong force** and **electromagnetic repulsion**. In heavy nuclei, the mutual repulsion of many protons eventually overcomes the strong force's ability to hold everything together, and a 2-proton + 2-neutron chunk breaks away. The weak force (and hence quark flavour change) plays no role.\n\nAlpha decay = nuclear restructuring; beta decay = quark flavour change. Different mechanisms entirely.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": true}, {"question": "Gamma radiation involves no particles at all being emitted from the nucleus's constituent particles. What is actually released, and what triggers it? (2 steps)", "answer": "- Step 1: Gamma radiation is the emission of a **high-energy photon** from the nucleus. No nucleons leave; no quarks change flavour. The nucleus simply drops from a higher-energy excited state to a lower-energy state.\n- Step 2: This is analogous to an electron in an atom dropping to a lower orbital and emitting a photon — except nuclear energy levels are spaced by MeV (millions of eV) rather than eV, so gamma photons are far more energetic than visible/UV photons from atomic transitions.\n\nGamma emission is the nucleus \"relaxing\" — a purely electromagnetic process, no particles created or destroyed.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "Define half-life in a way that distinguishes it from \"the time for all atoms to decay.\" What fraction remains after 3 half-lives? (3 steps)", "answer": "- Step 1: **Half-life** ($$t_{1/2}$$) is the time taken for *half* the radioactive nuclei in a sample to decay. It is a statistical property — it applies to large populations, not to any individual atom.\n- Step 2: After each half-life, the remaining fraction halves:\n  + After 1 half-life: $$\\frac{1}{2}$$ remains\n  + After 2 half-lives: $$\\frac{1}{4}$$ remains\n  + After 3 half-lives: $$\\frac{1}{8}$$ remains\n- Step 3: Mathematically, after $$n$$ half-lives, the remaining fraction is $$\\left(\\frac{1}{2}\\right)^n$$. The amount never truly reaches zero — it approaches zero asymptotically. \"All atoms decay\" would require infinite time.\n\nHalf-life describes exponential decay: each interval halves the remainder, never quite reaching zero.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": true}, {"question": "A sample has a half-life of 10 minutes. If you start with 80 g of the substance, roughly how much remains after 30 minutes, without using a calculator? (2 steps)", "answer": "- Step 1: 30 minutes = 3 half-lives (since $$30 / 10 = 3$$).\n- Step 2: Starting mass 80 g → after 1 half-life: 40 g → after 2: 20 g → after 3: **10 g**. The remaining fraction is $$\\frac{1}{8}$$ of the original, and $$80 \\times \\frac{1}{8} = 10$$.\n\nEach half-life halves the mass; just count the number of half-lives and halve repeatedly.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "Contrast nuclear fission and nuclear fusion in terms of what happens to the nuclei involved and the typical mass region where each releases energy. (3 steps)", "answer": "- Step 1: **Nuclear fission**: a heavy nucleus (e.g., uranium-235) splits into two lighter nuclei (plus neutrons and energy). It occurs when a heavy nucleus is destabilised, often by neutron absorption.\n- Step 2: **Nuclear fusion**: two light nuclei (e.g., hydrogen isotopes) combine to form a heavier nucleus (plus energy). It powers the Sun and requires extremely high temperatures to overcome electrostatic repulsion between the positively charged nuclei.\n- Step 3: Both release energy because of the **binding energy per nucleon curve**. Fission releases energy for nuclei heavier than iron-56 (moving toward lower energy per nucleon by splitting). Fusion releases energy for nuclei lighter than iron-56 (moving toward lower energy per nucleon by combining). Iron-56 sits at the peak — splitting or combining it costs energy.\n\nFission splits the heavy; fusion joins the light; both move toward iron-56, the most stable nucleus.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "A student claims: \"Fusion is just fission in reverse, so they're the same process.\" Why is this wrong, even though both release energy? (2 steps)", "answer": "- Step 1: While it's true that fission splits a nucleus and fusion joins nuclei (superficially \"opposite\"), they operate on **opposite sides of the binding energy curve**. Fission works on very heavy nuclei (A > ~56); fusion works on very light nuclei (A < ~56). They are not the same process running in different directions on the same material.\n- Step 2: The conditions required are also radically different. Fission can occur at room temperature if a critical mass is assembled (or a neutron is absorbed). Fusion requires temperatures of millions of degrees to overcome Coulomb repulsion between nuclei. The engineering challenges are entirely different.\n\nSame destination (more stable nuclei), opposite starting points, vastly different conditions.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": true}, {"question": "List the main sources of background radiation and identify which one typically contributes the largest portion for most people. (2 steps)", "answer": "- Step 1: The main sources are: **radon gas** (from rocks/soil), **cosmic rays** (from space), **medical** (X-rays, nuclear medicine), **terrestrial rocks** (naturally radioactive minerals), **food/drink** (containing radioactive isotopes like potassium-40), and **nuclear industry** (a tiny fraction).\n- Step 2: **Radon gas** is typically the single largest contributor, accounting for roughly 50% of average background radiation exposure in many countries. It seeps from uranium-containing rocks into buildings and can accumulate in poorly ventilated areas.\n\nBackground radiation is everywhere and mostly natural — radon is the dominant source, not human activity.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "Why can't quarks be observed in isolation, and what happens if you try to pull two quarks apart? (3 steps)", "answer": "- Step 1: Quarks are bound by the **strong force**, carried by gluons. Unlike electromagnetism (which weakens with distance), the strong force between quarks **remains constant** or even increases as quarks are pulled apart — like a stretched rubber band that never breaks.\n- Step 2: As you pull two quarks apart, the energy stored in the \"gluon field\" between them increases. Eventually, the energy becomes large enough to create a new quark-antiquark pair from the vacuum (via $$E = mc^2$$).\n- Step 3: Instead of freeing a quark, you now have two colour-neutral bound states (e.g., a proton and a pion). This phenomenon is called **colour confinement** — quarks are always found in colour-neutral combinations (quark-antiquark pairs called mesons, or triplets called baryons).\n\nPull quarks apart → energy creates new quarks → you get more bound states, never free quarks.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "The electron is classified as a lepton, not a quark. What key property distinguishes leptons from quarks at the most fundamental level? (2 steps)", "answer": "- Step 1: Leptons do **not** participate in the strong interaction (strong force). Quarks do. This is the defining distinction between the two categories of matter particles in the Standard Model.\n- Step 2: Consequences: leptons like the electron exist as free particles (no confinement), while quarks are always bound inside hadrons. Leptons interact via electromagnetism (if charged), the weak force, and gravity — but never the strong force.\n\nLeptons are strong-force outsiders; quarks are strong-force insiders.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "When we say \"zooming out one level from the nucleus,\" we go from nuclear physics to atomic physics. What new phenomena appear at the atomic level that are invisible at the nuclear level? (2 steps)", "answer": "- Step 1: At the nuclear level, we study forces between nucleons, radioactivity, and binding energy. The electrons are treated as a cloud surrounding the nucleus but their detailed behaviour is not the focus.\n- Step 2: Zooming out to the atomic level, the **electron energy levels** (orbitals/shells) become the dominant feature. This is where **chemistry** happens: bonding between atoms, spectral lines (emission/absorption of photons at eV energies), ionisation, and the periodic table's structure. Nuclear properties (like which isotope you have) barely affect chemistry — it's the electron configuration that matters.\n\nNuclear physics = what's inside the core; atomic physics = how electrons arrange themselves and interact with other atoms.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "A particle is made of one up quark and one down antiquark. What is its charge, and what category of particle is this? (3 steps)", "answer": "- Step 1: An antiquark has the opposite charge of its corresponding quark. A down antiquark ($$\\bar{d}$$) has charge $$+\\frac{1}{3}e$$ (opposite of the down quark's $$-\\frac{1}{3}e$$).\n- Step 2: Add the charges: up quark ($$+\\frac{2}{3}e$$) + down antiquark ($$+\\frac{1}{3}e$$) = $$+\\frac{3}{3}e = +1e$$.\n- Step 3: A quark-antiquark pair forms a **meson** (not a baryon, which requires three quarks). This specific meson (u$$\\bar{d}$$) is the **π⁺ (pi-plus) pion**, the lightest meson. It plays a key role in mediating the residual strong force between nucleons in a nucleus.\n\nMesons = quark + antiquark; baryons = three quarks. Different quark-count, different particle family.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "Synthesis question: A neutron undergoes beta-minus decay. Describe what happens at every structural level: quark level, nucleon level, and atomic level. (3 steps)", "answer": "- Step 1: **Quark level**: One down quark inside the neutron changes to an up quark via the weak interaction ($$d \\rightarrow u + W^{-}$$; the $$W^{-}$$ decays into $$e^{-} + \\bar{\\nu}_e$$). The quark composition changes from udd → uud.\n- Step 2: **Nucleon level**: The neutron (udd, charge 0) becomes a proton (uud, charge +1e). An electron and an antineutrino are emitted from the nucleus. The nucleus's atomic number increases by 1 (one more proton), but the mass number stays the same (total nucleon count unchanged).\n- Step 3: **Atomic level**: The atom is now a different **element** (atomic number increased by 1). It is initially an ion (it gained a proton but lost an electron from the nucleus — the emitted electron leaves). Over time, the ion will likely capture an electron from surroundings to become neutral again. The chemical properties are now entirely different.\n\nOne quark change → new nucleon → new element. The weak force reshapes chemistry from the bottom up.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "Synthesis question: Why is it impossible for gamma radiation to change the element of an atom, while both alpha and beta radiation can? (2 steps)", "answer": "- Step 1: An element's identity is determined by its **atomic number** (number of protons). Gamma radiation only releases energy (a photon) — it changes no protons, no neutrons, and no quarks. The nucleus remains identical in composition; it simply has less internal energy.\n- Step 2: Alpha decay removes 2 protons (reducing atomic number by 2, changing the element). Beta decay converts a neutron to a proton or vice versa (changing atomic number by ±1, changing the element). Both alter the proton count; gamma does not.\n\nElement identity = proton count. Only processes that change proton count can transmute elements.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "The binding energy per nucleon curve peaks at iron-56. Explain why this means neither fission nor fusion can extract energy from iron. (2 steps)", "answer": "- Step 1: Binding energy per nucleon represents how tightly each nucleon is bound. Iron-56 has the **maximum** binding energy per nucleon, meaning its nucleons are the most tightly bound of any nucleus. It sits at the peak of the curve.\n- Step 2: Any process — fission (splitting) or fusion (combining) — would produce daughter nuclei with *lower* binding energy per nucleon (further from the peak). Lower binding energy means *less* tightly bound, which means energy must be *input* rather than released. Iron is the \"dead end\" of nuclear energy extraction.\n\nIron-56 is nuclear thermodynamic ground state — you can't go downhill from the peak.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": false}, {"question": "Simple exercise: A particle has quark composition $$\\bar{u}\\bar{u}\\bar{d}$$ (three antiquarks). What is its charge, and how does it relate to a familiar particle? (3 steps)", "answer": "- Step 1: Find each antiquark's charge. Anti-up ($$\\bar{u}$$) has charge $$-\\frac{2}{3}e$$ (opposite of up's $$+\\frac{2}{3}e$$). Anti-down ($$\\bar{d}$$) has charge $$+\\frac{1}{3}e$$ (opposite of down's $$-\\frac{1}{3}e$$).\n- Step 2: Add: $$-\\frac{2}{3} + (-\\frac{2}{3}) + \\frac{1}{3} = \\frac{-2-2+1}{3} = -\\frac{3}{3} = -1e$$.\n- Step 3: This is the **antiproton** — the antimatter counterpart of the proton (uud, charge +1e). Every particle has an antiparticle with opposite charge but same mass. The antiproton has charge $$-1e$$ and mass ≈ 1 u, just like a proton but with all charges reversed.\n\nAntimatter flips the signs: replace every quark with its antiquark and every charge reverses.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "The strong force between quarks is described as getting *stronger* with distance, unlike electromagnetism which gets *weaker*. What is the practical consequence of this for quark confinement? (2 steps)", "answer": "- Step 1: In electromagnetism, the force between two charges follows Coulomb's law ($$F \\propto 1/r^2$$) — it weakens with distance, so separating two charges becomes easier the further apart they are. In the strong force, the gluon field between quarks behaves like a spring or rubber band: the force remains roughly constant (or even increases) with distance.\n- Step 2: The consequence: as you try to separate two quarks, the energy required grows linearly with distance. Long before you can isolate a quark, you deposit enough energy into the gluon field to create new quark-antiquark pairs ($$E = mc^2$$). The system \"snaps\" into colour-neutral bound states rather than yielding free quarks. This is why **colour confinement** is absolute — no amount of pulling can free a quark.\n\nThe strong force is a spring that never breaks — it just spawns new particles instead.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": true}, {"question": "Simple exercise: A radioactive isotope has a half-life of 2 hours. If a sample's activity drops from 400 counts/min to 50 counts/min, how much time has elapsed? (2 steps)", "answer": "- Step 1: Determine how many half-lives have passed. Start at 400 → after 1 half-life: 200 → after 2: 100 → after 3: 50. So 3 half-lives have elapsed.\n- Step 2: Each half-life is 2 hours, so total time = $$3 \\times 2 = 6$$ hours.\n\nCount the halvings needed, then multiply by the half-life duration.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": false}], "count": 35}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "If you could zoom out from the centre of an atom, what two main regions would you see, and how is the mass distributed between them? (2 steps)", "answer": "- Step 1: The atom consists of a tiny cen
