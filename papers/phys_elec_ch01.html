iven point per unit time. This is the key phrase examiners look for.\n- Step 2: The defining equation is: $$I = \\frac{\\Delta Q}{\\Delta t}$$ where I is current in amperes (A), ΔQ is charge in coulombs (C), and Δt is time in seconds (s). One ampere equals one coulomb per second.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "Why is current defined as rate of flow of charge, not just \"flow of charge\"? (1 step)", "answer": "The word \"rate\" is crucial because current tells us how fast charge is flowing — the quantity per second. Without \"rate,\" you would be describing total charge transferred, not the speed of flow. The exam keyword is \"rate of flow of charge.\" This distinction matters because charge carriers could be electrons, ions, or any charged particles, but the definition remains the same.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "A current of 5 mA flows for 2 minutes. Calculate the total charge that passes a point. (2 steps)", "answer": "- Step 1: Convert all quantities to SI units (base units). Current: $$I = 5 \\text{ mA} = 5 \\times 10^{-3} \\text{ A}$$ Time: $$t = 2 \\times 60 = 120 \\text{ s}$$\n- Step 2: Use Q = It: $$Q = (5 \\times 10^{-3}) \\times 120 = 0.6 \\text{ C}$$\n\n[Misconception trap: Always convert mA, µA to A and minutes to seconds BEFORE substituting into formulas.]", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "What are the charge carriers in (a) a metal wire, (b) an electrolyte solution, and (c) an ionised gas? (1 step)", "answer": "(a) **Metals:** Free electrons — valence electrons that detach from atoms and form a \"sea of electrons\" free to move throughout the lattice. (b) **Electrolytes:** Positive and negative ions — atoms or molecules that have gained or lost electrons (e.g., Na⁺, Cl⁻ in salt water). (c) **Ionised gases (plasmas):** Both electrons and positive ions — such as in fluorescent tubes or lightning.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "Explain why electrons drift very slowly through a conductor even when there is a current. (2 steps)", "answer": "- Step 1: Individual electrons have a very low drift velocity — typically millimetres per second. This is because they constantly collide with metal ions in the lattice, making their net progress very slow.\n- Step 2: However, when you connect a battery, the electric field propagates at close to the speed of light, almost instantly giving all free electrons a push. Think of a tube full of marbles: push one in at one end, and one comes out the other end immediately — each marble moved only a tiny distance, but the effect propagated fast. The current is established quickly because the field propagates fast, not because electrons travel fast.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "State the direction of conventional current and electron flow. Why are they opposite? (2 steps)", "answer": "- Step 1: **Conventional current** flows from the **positive terminal** to the **negative terminal** of a power source. **Electron flow** (the actual motion of charge carriers in metals) is from the **negative terminal** to the **positive terminal**.\n- Step 2: This is a historical accident. Benjamin Franklin defined current as flowing from positive to negative before electrons were discovered. Later, when electrons were identified as the charge carriers in metals, they were found to flow in the opposite direction. Both conventions coexist — unless a question specifically asks about electron flow, use conventional current (positive to negative).", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "Define potential difference (voltage) and give its defining equation. (2 steps)", "answer": "- Step 1: Potential difference between two points is the work done (energy converted from electrical to other forms) per unit charge passing between those points. It represents the \"energy per coulomb\" given to or taken from charges.\n- Step 2: The defining equation is: $$V = \\frac{W}{Q}$$ where V is potential difference in volts (V), W is work done (energy transferred) in joules (J), and Q is charge in coulombs (C). One volt equals one joule per coulomb: $$1 \\text{ V} = 1 \\text{ J/C}$$", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "A charge of 50 mC gains 0.75 J of energy when moving through a component. What is the potential difference across this component? (2 steps)", "answer": "- Step 1: Convert to SI units: $$Q = 50 \\text{ mC} = 50 \\times 10^{-3} \\text{ C} = 5.0 \\times 10^{-2} \\text{ C}$$\n- Step 2: Use V = W/Q: $$V = \\frac{0.75}{5.0 \\times 10^{-2}} = \\frac{0.75}{0.05} = 15 \\text{ V}$$", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "Using the \"Charlie the Coulomb\" hill analogy, explain what the battery and the resistor represent in terms of energy. (2 steps)", "answer": "- Step 1: Imagine a hill with the battery at the top and a resistor (lamp) at the bottom. The battery acts like a lift that takes \"Charlie the Coulomb\" to the top, giving him gravitational potential energy. This represents the battery converting chemical energy into electrical energy, giving each coulomb energy.\n- Step 2: As Charlie rolls down the hill through the resistor, he gives up his energy as light and heat. The potential difference (voltage) is the energy given to each coulomb at the battery, and also the energy taken from each coulomb at the resistor. The same number of Charlies emerge at the bottom as went in at the top — charge is conserved.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "Distinguish between electromotive force (e.m.f.) and potential difference in terms of energy conversion. (3 steps)", "answer": "- Step 1: **E.m.f.** is the energy converted **into** electrical energy per unit charge **by a source** (battery, generator). It represents the \"push\" the source gives to charges.\n- Step 2: **Potential difference** is the energy converted **from** electrical energy **into other forms** per unit charge **across a component** (resistor, lamp).\n+ At the battery: chemical → electrical (e.m.f.)\n+ At the resistor: electrical → thermal/light (p.d.)\n- Step 3: Both have the same unit (volts) and same formula (V = W/Q), but the direction of energy conversion is opposite. If a battery had zero internal resistance, its e.m.f. would equal the terminal p.d. across it.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "State Kirchhoff's First Law and explain why it must always hold. (2 steps)", "answer": "- Step 1: Kirchhoff's First Law states: At any junction in a circuit, the sum of currents entering equals the sum of currents leaving. Algebraically: $$\\sum I_{\\text{in}} = \\sum I_{\\text{out}}$$\n- Step 2: This is a direct consequence of conservation of charge. Charge cannot appear from nowhere or disappear. If more charge entered a junction than left, charge would accumulate — but charge carriers (electrons or ions) simply pass through; they do not accumulate in the wires. The same current flows in as flows out.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "In a circuit, three wires meet at a junction. Currents of 2.0 A and 1.5 A enter the junction, and one wire carries current away from the junction. What is the current in this outgoing wire? (1 step)", "answer": "By Kirchhoff's First Law (conservation of charge): $$I_{\\text{out}} = I_{\\text{in,1}} + I_{\\text{in,2}} = 2.0 + 1.5 = 3.5 \\text{ A}$$", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "Why is the current the same at every point in a series circuit? (2 steps)", "answer": "- Step 1: In a series circuit, there are no junctions — it is a single loop. The same wire connects all components.\n- Step 2: By conservation of charge (Kirchhoff's First Law), charge cannot accumulate anywhere in the circuit. The rate at which charge enters a component must equal the rate at which it leaves. Therefore, the current (rate of charge flow) is identical at all points in the series loop. The same number of electrons per second entering the resistor must exit it.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "Why must an ammeter be connected in series with a component, and a voltmeter in parallel? (2 steps)", "answer": "- Step 1: **Ammeter in series:** To measure the current through a component, the ammeter must have the same current flowing through it as flows through the component. It has very low (ideally zero) resistance so it does not change the current it is measuring.\n- Step 2: **Voltmeter in parallel:** To measure the potential difference across a component, the voltmeter must be connected across (between) the two points. It has very high resistance (ideally infinite) so it draws negligible current from the circuit and does not disturb the circuit operation.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "A student says: \"Electrons accumulate inside a resistor because it slows them down.\" Explain why this is wrong. (2 steps)", "answer": "- Step 1: This is a common misconception. A resistor does not store electrons — it converts electrical energy into thermal energy (heat).\n- Step 2: By conservation of charge, the same current flows into the resistor as flows out. The resistor offers opposition to flow (resistance), which converts electrical energy to heat, but charge carriers simply pass through. Think of water flowing through a narrow pipe: water goes in one end and out the other; the pipe doesn't store water, it just slows the flow and generates friction (heat).", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "Convert the following to base SI units: (a) 25 mA, (b) 3.2 µC, (c) 0.5 kV. (1 step)", "answer": "(a) $$25 \\text{ mA} = 25 \\times 10^{-3} \\text{ A} = 2.5 \\times 10^{-2} \\text{ A}$$\n(b) $$3.2 \\text{ µC} = 3.2 \\times 10^{-6} \\text{ C}$$\n(c) $$0.5 \\text{ kV} = 0.5 \\times 10^{3} \\text{ V} = 500 \\text{ V}$$\n\n[Critical exam trap: µ (micro) = 10⁻⁶, not 10⁻³. Confusing micro and milli costs a factor of 1000.]", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "A battery supplies a current of 0.2 A for 5 minutes. (a) Calculate the total charge that flows. (b) If the battery e.m.f. is 12 V, how much chemical energy is converted to electrical energy? (3 steps)", "answer": "- Step 1: Convert to SI units. Time: $$t = 5 \\times 60 = 300 \\text{ s}$$\n- Step 2: (a) Total charge: $$Q = It = 0.2 \\times 300 = 60 \\text{ C}$$\n- Step 3: (b) Energy converted: $$W = \\varepsilon Q = 12 \\times 60 = 720 \\text{ J}$$ (Using W = VQ, treating e.m.f. as the voltage that gives energy to charge)", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "How does the drift velocity of electrons in a metal compare to the speed of electricity (signal) in a circuit? (1 step)", "answer": "Drift velocity is very slow — typically millimetres per second (slower than a snail). The \"speed of electricity\" (the speed at which the electric field propagates, which is close to the speed of light) is essentially instantaneous for practical purposes. This is why a circuit \"turns on\" immediately when you flick a switch, even though individual electrons move slowly. The field pushes all electrons almost simultaneously, like pushing one end of a rope — the wave travels fast, but the rope material moves slowly.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "Why can objects be charged by rubbing? (1 step)", "answer": "Rubbing transfers electrons from one material to another. Different materials have different affinities for electrons — some hold electrons more tightly than others. When you rub two materials together, electrons are stripped from one and transferred to the other. The material losing electrons becomes positively charged; the one gaining electrons becomes negatively charged. This is why amber (in ancient times) or plastic (modern) can be charged by rubbing with cloth.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "A 230 V appliance consumes 800 W of power. How much energy does it use in 1 minute? What is the most direct formula to use? (2 steps)", "answer": "- Step 1: The most direct formula is: $$W = Pt$$ (energy = power × time), since you know power and time directly.\n- Step 2: $$W = 800 \\times 60 = 48,000 \\text{ J}$$ [Alternative longer route would be: find I from P = IV, find Q from Q = It, then use W = VQ — arriving at the same answer with more steps. Always use the direct route when available.]", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "A wire carries a current of 2 µA. How many electrons pass a point in 1 minute? (3 steps)", "answer": "- Step 1: Convert to SI units. Current: $$I = 2 \\times 10^{-6} \\text{ A}$$; Time: $$t = 60 \\text{ s}$$\n- Step 2: Calculate total charge: $$Q = It = 2 \\times 10^{-6} \\times 60 = 1.2 \\times 10^{-4} \\text{ C}$$\n- Step 3: Number of electrons: $$N = \\frac{Q}{e} = \\frac{1.2 \\times 10^{-4}}{1.60 \\times 10^{-19}} = 7.5 \\times 10^{14} \\text{ electrons}$$ (Note: Use magnitude of e; the negative sign indicates charge type, not direction when counting particles.)", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "Explain why a voltmeter must have very high resistance. (1 step)", "answer": "A voltmeter is connected in parallel with the component whose potential difference we want to measure. If it had low resistance, it would draw current from the circuit, changing the current distribution and therefore changing the voltage being measured. A very high resistance (typically megaohms) ensures it takes negligible current so it does not disturb the circuit being measured — it \"sips\" barely any charge while \"observing\" the voltage.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "In the \"hill analogy\" for circuits, what does the height of the hill represent? What does the distance represent? (1 step)", "answer": "In the \"Charlie the Coulomb\" hill analogy: The **height difference** (vertical drop) represents the **potential difference (voltage)** — how much energy per coulomb is given up going from top to bottom. The **hill slope** represents **resistance** — a steeper slope (more resistance) means harder work for Charlie, more energy converted per coulomb per distance traveled. The battery is at the top lifting Charlie up (adding energy), the resistor is at the bottom where Charlie loses energy as heat/light.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "A student writes I = Q × t instead of I = Q/t. Explain why this is wrong and what unit error it produces. (1 step)", "answer": "- Step 1: The definition of current is charge per unit time (rate of flow), so current equals charge divided by time: $$I = \\frac{Q}{t}$$\n- Step 2: Units: A = C/s. If you wrongly multiply Q × t, you get units of C·s, not A. This would give an answer with completely wrong units. A quick check: if more time passes with the same current, MORE charge should pass (Q = It), not less — so current cannot increase with time for a fixed charge. This was a common error observed in the lesson video.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "If electrons in a wire have a drift velocity v and the wire has n free electrons per unit volume, derive an expression for current I in terms of A, v, n, and e. (3 steps)", "answer": "- Step 1: In time Δt, an electron travels distance vΔt. The electrons within a length vΔt of wire will pass through the cross-section. This volume is: $$V = A \\times v \\Delta t$$\n- Step 2: Number of electrons in this volume: $$N = n \\times V = nAv\\Delta t$$\n- Step 3: Total charge passing: $$\\Delta Q = Ne = nAv\\Delta t \\cdot e$$ So: $$I = \\frac{\\Delta Q}{\\Delta t} = nAve$$ This shows that current depends on: (1) number density of free electrons (n), (2) cross-sectional area (A), (3) drift velocity (v), and (4) elementary charge (e).", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "What is the difference between charge carriers in a metal and charge carriers in an electrolyte? (1 step)", "answer": "In a **metal**, the charge carriers are **free electrons** — delocalised electrons that are not attached to any particular atom. They are always present, even when no current flows. In an **electrolyte** (e.g., salt water), the charge carriers are **positive and negative ions** — atoms or molecules that have gained or lost electrons. These ions form when the substance dissolves; they can move through the solution, and their motion constitutes the current. The ions are the charge carriers in electrolysis.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "Explain why current is the same everywhere in a series circuit using conservation of charge, not as a \"special circuit rule.\" (2 steps)", "answer": "- Step 1: Kirchhoff's First Law is not a circuit topology rule — it is a fundamental law of physics (conservation of charge) applied to circuits.\n- Step 2: In a series circuit, charge flows through each component in one continuous path. Since charge cannot be created or destroyed in the wire (no junctions for charge to accumulate or leave), the rate at which charge enters any component must equal the rate at which it leaves. That rate is the current I. Whether you have one component or ten in series, charge conservation ensures the same current flows through all of them.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}], "count": 30}, "minimax_2": {"label": "MiniMax ②", "cards": [], "count": 0}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "What is the precise mark-scheme definition of electric current, and why must we say \"rate of flow of charge\" rather than just \"flow of electrons\"? (3 steps)", "answer": "- Step 1: Electric current is defined as the **rate of flow of charge** past a point, expressed mathematically as $$I = \\Delta Q / \\Delta t$$ with units of amperes (A), where $$1\\,\\text{A} = 1\\,\\text{C/s}$$.\n- Step 2: The word \"rate\" is essential because current is a *flow per unit time*, not just charge itself. Saying \"flow of charge\" alone misses the time-dependence that makes it a current.\n- Step 3: We say \"charge\" rather than \"electrons\" because charge carriers aren't always electrons:\n+ In metals: free electrons carry the charge.\n+ In electrolytes (salt solution, battery acid): positive and negative ions carry it.\n+ In ionised gases (lightning, fluorescent tubes): both ions and electrons.\n\nIf you wrote \"flow of electrons\" you'd lose the mark on any electrolyte/gas question.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "Why is charge said to be *quantised*, and what does $$Q = Ne$$ tell us about the smallest possible non-zero amount of charge?", "answer": "Charge is quantised because it only appears in nature as integer multiples of the elementary charge $$e = 1.60 \\times 10^{-19}\\,\\text{C}$$. You cannot have half an electron's worth of charge — every observable charge $$Q$$ must equal $$N \\cdot e$$ for some integer $$N$$. This is a deep property of matter: protons carry $$+e$$, electrons carry $$-e$$, and nothing carries less. So $$e$$ itself is the indivisible \"quantum\" of charge, and $$N$$ in $$Q = Ne$$ just counts the carriers. When you compute $$N$$ from $$Q/e$$, you ignore the sign of $$e$$ — the sign only encodes direction; the number of particles is always a positive integer.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": true}, {"question": "A student writes $$I = Q \\cdot t$$. Explain, using dimensional reasoning alone, why this must be wrong. (2 steps)", "answer": "- Step 1: The unit of current is the ampere, and by definition $$1\\,\\text{A} = 1\\,\\text{C/s}$$ — so current has units of charge *divided by* time, not multiplied. If you wrote $$I = Qt$$ the units would be $$\\text{C} \\cdot \\text{s}$$, which is nonsense for a rate.\n- Step 2: The unit check is a one-second sanity check you should always run: \"current = charge per second\" → division, not multiplication. This single slip costs marks and shows up in panic exam moments.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "Why does a coulomb represent a \"large\" amount of charge in everyday electronics, and roughly how many electrons does 1 C contain? (2 steps)", "answer": "- Step 1: One electron carries only $$1.60 \\times 10^{-19}\\,\\text{C}$$ — an extraordinarily tiny amount. To accumulate 1 C you need $$1/e \\approx 6.25 \\times 10^{18}$$ electrons, a number larger than the atoms in many small objects.\n- Step 2: That's why currents in real circuits flow in mA or µA, and charges are quoted in mC, µC, or nC. A current of 1 A is already enormous on the electron-counting scale — about $$6 \\times 10^{18}$$ electrons crossing a point every second.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": true}, {"question": "Distinguish *conventional current* from *electron flow* — including direction, historical reason, and which one you use in exam answers by default. (3 steps)", "answer": "- Step 1: **Conventional current** flows from the **positive** terminal of the source, through the external circuit, to the **negative** terminal. **Electron flow** is the *opposite*: electrons drift from negative to positive (because they are repelled by the negative terminal and attracted to the positive).\n- Step 2: This mismatch is a historical accident. Benjamin Franklin defined current direction *before* the electron was discovered, picking positive→negative arbitrarily. When electrons were later identified as the actual carriers in metals, physicists kept the old convention rather than rewriting every formula.\n- Step 3: In exam answers, **always use conventional current** unless the question explicitly asks about electron flow. Arrows on circuit diagrams point from + to −.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": true}, {"question": "In a metal wire with no battery connected, are there any free electrons moving? If so, why don't we measure a current? (3 steps)", "answer": "- Step 1: Yes — a metal *always* contains a \"sea\" of free electrons detached from their parent atoms, even with no battery. These electrons are in constant thermal motion at high speeds.\n- Step 2: However, their motion is **random in all directions**. For every electron drifting left, another drifts right; the *net* flow of charge across any cross-section is zero.\n- Step 3: A current requires a **net drift**, which only happens when a potential difference is applied. The battery sets up an electric field inside the wire that gives every electron a small additional push in one direction, breaking the symmetry. Without that field, the random motion produces no measurable current.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "Why does a lamp light up almost instantly when you flick a switch, even though individual electrons drift through a wire at only a few millimetres per second? (3 steps)", "answer": "- Step 1: The drift velocity of electrons in a typical metal wire is genuinely slow — often slower than a snail. So if \"switching on\" required an electron to travel from the battery to the bulb, you'd wait minutes.\n- Step 2: But that's not what happens. The wire is already *packed* full of free electrons everywhere along its length. When the switch closes, the electric field — not the electrons themselves — propagates through the wire at close to the speed of light.\n- Step 3: Marble-tube analogy: imagine a tube already full of marbles. Push one in at one end and a marble pops out the other end almost instantly. Each marble moved barely a millimetre, but the *effect* (something coming out) propagated at the speed of the push. Likewise, the field gives every electron a simultaneous push, so current effects appear everywhere at once.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "Define potential difference between two points in a circuit, in mark-scheme language. (2 steps)", "answer": "- Step 1: Potential difference between two points is the **work done (or energy converted from electrical to other forms) per unit charge** passing between those two points: $$V = W/Q$$, measured in volts where $$1\\,\\text{V} = 1\\,\\text{J/C}$$.\n- Step 2: \"Energy per coulomb\" is acceptable shorthand. The key idea: it's the energy *each coulomb of charge delivers* as it passes through the component (converted into heat, light, kinetic energy, etc.).", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "What's the conceptual difference between *electromotive force (e.m.f.)* and *potential difference (p.d.)*, even though both are measured in volts? (3 steps)", "answer": "- Step 1: Both have units of J/C and the same formula structure $$\\varepsilon = W/Q$$ or $$V = W/Q$$. But they describe **opposite directions of energy transfer**.\n- Step 2: **E.m.f.** is the energy per coulomb a **source** (cell, battery, generator) converts *into* electrical form — chemical → electrical, or mechanical → electrical. It's energy *given to* the charge.\n- Step 3: **P.d.** is the energy per coulomb converted *from* electrical form into other forms (heat, light, motion) **across a component** like a resistor or lamp. It's energy *taken from* the charge.\n+ Source perspective: e.m.f. is the energy injected per coulomb.\n+ Load perspective: p.d. is the energy extracted per coulomb.\n+ If a battery had no internal resistance, its e.m.f. would equal the terminal p.d. exactly.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "Using the \"Charlie the Coulomb\" hill analogy, explain qualitatively what voltage, the battery, and a resistor each represent. (3 steps)", "answer": "- Step 1: Imagine each coulomb of charge is a character called Charlie. The **battery** sits at the top of a hill — it does work on Charlie to lift him up, giving him energy. The amount of energy given per Charlie is the **e.m.f.**\n- Step 2: Charlie then rolls down through the circuit. When he passes through a **resistor or lamp**, he \"loses height\" — he gives up his energy as heat and light. The energy lost per Charlie in that component is the **p.d. across it**.\n- Step 3: Crucially, the same Charlies emerge from the resistor that went in — the resistor *converts energy*, it does not *consume Charlies*. By the time Charlie returns to the battery, he has zero spare energy; the battery does work on him again. This is why p.d. is \"energy per coulomb\" — it's how much each Charlie surrenders at each component.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": true}, {"question": "State Kirchhoff's First Law and explain *why* it must be true. (3 steps)", "answer": "- Step 1: Kirchhoff's First Law: at any junction in a circuit, the algebraic sum of currents entering equals the sum of currents leaving: $$\\sum I_\\text{in} = \\sum I_\\text{out}$$.\n- Step 2: The reason is **conservation of charge** — a universal law. Charge cannot be created, destroyed, or accumulated at a junction (a point has no \"storage capacity\"). So the rate at which charge arrives must equal the rate at which it departs.\n- Step 3: Note this is *not* a special \"topology rule\" for parallel circuits. It applies at every point in every circuit. In a series circuit it's trivially true (current the same everywhere); in parallel it tells you how currents split at a branch.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "A common student error: \"a resistor stores electrons, so less current flows out than flows in.\" Why is this wrong? (3 steps)", "answer": "- Step 1: It violates conservation of charge. A resistor is not a reservoir — it has no mechanism to accumulate electrons. If charge built up inside, the resistor would become enormously charged and the circuit would stop.\n- Step 2: What a resistor actually does is **convert electrical energy into thermal energy** (and sometimes light). The electrons enter, collide with the lattice ions and lose energy as heat, then exit. The same *number* of electrons emerges per second as enters per second.\n- Step 3: So current in = current out for *every* component in series. The resistor converts *energy*, not *charge*.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": true}, {"question": "Why must an ammeter be connected in **series** with a component, and why must its resistance be **low**? (3 steps)", "answer": "- Step 1: An ammeter measures the current *through* a component. By Kirchhoff's First Law and series-circuit logic, the only way the ammeter reads the same current that flows through the component is to put it in the same loop — i.e. in series.\n- Step 2: Adding the ammeter inserts extra resistance into the loop. If the ammeter's resistance were significant, it would *reduce* the current it's trying to measure — disturbing the very thing being measured.\n- Step 3: So ammeters are built with **very low resistance**, ideally near zero, so they take negligible voltage and leave the circuit current essentially unchanged.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "Why must a voltmeter be connected in **parallel** with a component, and why must its resistance be **high**? (3 steps)", "answer": "- Step 1: A voltmeter measures the p.d. *across* a component — meaning between its two terminals. To do that, the voltmeter's two probes must touch those two points, which means the voltmeter sits in parallel with the component.\n- Step 2: But putting any device in parallel offers an alternative path for current. If much current diverts through the voltmeter, the current through the component drops, and the p.d. you measure is no longer the \"true\" p.d. of the undisturbed circuit.\n- Step 3: So voltmeters are built with **very high resistance** (a digital voltmeter typically $$\\sim 10\\,\\text{M}\\Omega$$), so they draw negligible current and leave the circuit nearly undisturbed.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "In a series circuit, why is the current the same at every point — even though it passes through different resistors? (2 steps)", "answer": "- Step 1: A series loop has no junctions where charge can split or merge. Every charge that enters a resistor must come out the other side; no electrons are stored anywhere.\n- Step 2: So the **rate of flow of charge** must be the same at every cross-section of the loop. The resistors change how much *energy* each coulomb loses, not how many coulombs per second pass. Current = same everywhere; p.d. = different across each resistor.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "Why is \"$$\\mu$$\" (micro) often confused with \"m\" (milli), and how big is the error if you mix them up? (2 steps)", "answer": "- Step 1: $$\\text{milli} = 10^{-3}$$ and $$\\text{micro} = 10^{-6}$$ — a factor of **1000** apart. Their symbols look superficially alike (m vs µ), and both are common in physics, which is why students slip.\n- Step 2: A current quoted as \"1 µA\" treated as \"1 mA\" would give a charge or electron count **a thousand times too large**. Always write the power of ten explicitly before substituting: $$1\\,\\mu\\text{A} = 1 \\times 10^{-6}\\,\\text{A}$$, not $$10^{-3}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "If you know the power $$P$$ of an appliance and the time $$t$$ it operates, what's the most direct route to total energy transferred — and why avoid the roundabout method? (3 steps)", "answer": "- Step 1: The direct formula is $$W = P \\cdot t$$ — power is \"joules per second\", so multiplying by seconds gives joules.\n- Step 2: A roundabout method would be: find $$I$$ from $$P = VI$$, then find $$Q = It$$, then $$W = VQ$$. This works but takes three steps and three opportunities for arithmetic slips.\n- Step 3: General principle: ask \"do I already know the two ingredients of the most direct formula?\" If you know $$P$$ and $$t$$, use $$W = Pt$$. If you know $$V$$ and $$Q$$, use $$W = VQ$$. Don't compute intermediate quantities you don't need.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "Conceptually, why are $$I = Q/t$$ and $$P = E/t$$ both \"something divided by time\" yet measure completely different things? (3 steps)", "answer": "- Step 1: $$I = Q/t$$ is the **rate of flow of charge** — how many coulombs cross a point per second. It counts *carriers*.\n- Step 2: $$P = E/t$$ is the **rate of energy transfer** — how many joules are delivered per second. It counts *energy*.\n- Step 3: Taxi analogy:\n+ Charges are taxis carrying energy.\n+ Current = how many taxis pass per second.\n+ Power = total energy all those taxis deliver per second.\n+ Voltage = energy per taxi (J/C).\n\nSo $$P = VI$$ is just (energy per taxi) × (taxis per second) = total energy per second. The two rates measure entirely different \"stuff\".", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "Show how $$P = VI$$ can be derived from the definitions of voltage, current, and power. (3 steps)", "answer": "- Step 1: Start from definitions:\n+ Power: $$P = E/t$$\n+ Voltage: $$V = E/Q$$, so $$E = VQ$$\n+ Current: $$I = Q/t$$\n- Step 2: Substitute $$E = VQ$$ into $$P = E/t$$: $$P = \\frac{VQ}{t} = V \\cdot \\frac{Q}{t}$$.\n- Step 3: But $$Q/t = I$$, so $$P = V \\cdot I$$. The formula isn't a separate fact — it's a direct consequence of the three definitions combined. Knowing the derivation means you can re-derive it under exam pressure if you forget.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": true}, {"question": "A wire carries 0.5 A for 5 minutes 30 seconds. Without doing the arithmetic, describe the *method* to find the total charge and what unit conversion is critical. (2 steps)", "answer": "- Step 1: Use $$Q = I \\cdot \\Delta t$$. The current is already in amperes, so no conversion needed there. **The critical step is converting time to seconds**: $$5\\,\\text{min}\\,30\\,\\text{s} = 5 \\times 60 + 30 = 330\\,\\text{s}$$.\n- Step 2: Then multiply: $$Q = 0.5 \\times 330$$ coulombs. Conceptually, you're asking \"if 0.5 C flow each second, how many flow in 330 seconds?\" — a simple rate × time. Forgetting the minute-to-second conversion is the most common mistake here.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "An electron beam carries 1.0 µA for 10 minutes. Outline the conceptual two-step approach to find the number of electrons, and identify the two prefix/exponent traps. (3 steps)", "answer": "- Step 1: First find total charge: $$Q = I \\cdot t$$. Trap #1: $$1.0\\,\\mu\\text{A} = 1.0 \\times 10^{-6}\\,\\text{A}$$, not $$10^{-3}$$. Trap #2: convert 10 min to 600 s.\n- Step 2: Then divide by the elementary charge: $$N = Q/e$$, where $$e = 1.60 \\times 10^{-19}\\,\\text{C}$$ (not $$10^{-13}$$). Use the *magnitude* of $$e$$ — the negative sign just encodes direction, irrelevant when counting particles.\n- Step 3: Sanity check: 1 µA is a small current, but 10 minutes is a long time, and electrons are tiny. The answer should be a very large number (around $$10^{15}$$). If you get $$10^9$$ or $$10^{21}$$, something went wrong with prefixes or exponents.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "A 12 V battery delivers a steady 0.05 A for 1800 s. Describe the conceptual path to find total energy transferred. (3 steps)", "answer": "- Step 1: You can't apply $$W = VQ$$ directly because you don't yet know $$Q$$. Get charge first: $$Q = It = 0.05 \\times 1800 = 90\\,\\text{C}$$.\n- Step 2: Then energy: $$W = VQ = 12 \\times 90 = 1080\\,\\text{J}$$. Conceptually, each coulomb carries 12 J of energy from the battery into the circuit, and 90 coulombs pass.\n- Step 3: Equivalent shortcut: $$P = VI = 0.6\\,\\text{W}$$, then $$W = Pt = 0.6 \\times 1800 = 1080\\,\\text{J}$$ ✓. Both routes must agree — a useful check.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "Currents of 2.0 A and 3.5 A enter a junction. What's the current leaving, and what physical law tells you so? (2 steps)", "answer": "- Step 1: By Kirchhoff's First Law (conservation of charge), $$\\sum I_\\text{in} = \\sum I_\\text{out}$$, so $$I_\\text{out} = 2.0 + 3.5 = 5.5\\,\\text{A}$$.\n- Step 2: Conceptually: 5.5 coulombs of charge arrive at the junction every second. They cannot pile up or vanish, so 5.5 coulombs must leave every second — through whatever wire(s) exit the junction.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "At a junction, 5 mA flows in and one branch carries 2 mA. What does the other branch carry, and why is this NOT an example of Ohm's law? (2 steps)", "answer": "- Step 1: The other branch must carry $$5 - 2 = 3\\,\\text{mA}$$, purely from charge conservation: in = out, so $$5 = 2 + I_2 \\Rightarrow I_2 = 3\\,\\text{mA}$$.\n- Step 2: This has nothing to do with Ohm's law. Ohm's law relates V to I via resistance; KCL is a statement about *charge flowing through a point*. You don't need to know any resistances or voltages to apply KCL — it's purely a counting argument from conservation.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": true}, {"question": "Why does a voltmeter need to take *some* current to work, and what's the design trade-off? (3 steps)", "answer": "- Step 1: A voltmeter measures p.d. by detecting an effect (a needle deflection, a digital reading) that requires energy. That energy must come from the circuit being measured — so a small current must flow through the voltmeter.\n- Step 2: But every microamp through the voltmeter is a microamp *not* through the component you're trying to measure, distorting the reading. So the design goal is: take just enough current to operate the meter, and no more.\n- Step 3: Solution: make the voltmeter's resistance very high. Digital voltmeters typically have ~10 MΩ, drawing only a tiny fraction of the circuit current. Older analogue voltmeters had lower resistance (~kΩ) and disturbed circuits more.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": true}, {"question": "What's wrong with the following definition: \"Electric current is the flow of electrons\"? Two reasons. (2 steps)", "answer": "- Step 1: First, it omits the word **\"rate\"**. Current isn't just charge flowing — it's *how much per second*. Without \"rate\", you've defined charge, not current.\n- Step 2: Second, it restricts carriers to electrons. In electrolytes (e.g. dissolved salt) the carriers are **ions**, and in ionised gases (e.g. lightning) carriers include both ions and electrons. The mark-scheme accepted phrasing is **\"rate of flow of charge\"**, which works for any carrier type.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": false}, {"question": "Why does charge conservation imply that the current is constant throughout an entire series loop, even if the resistors have very different values? (3 steps)", "answer": "- Step 1: Different resistors offer different *opposition* to current — they affect how much current flows for a given p.d. But once a current is established in a series loop, every component sees the same current.\n- Step 2: Why? Because at every cross-section of the loop, charge must be conserved. If 0.1 C/s flow into a 10 Ω resistor, 0.1 C/s must flow out — the resistor doesn't store electrons or convert them into anything else. The next resistor receives the same 0.1 C/s.\n- Step 3: A bigger resistor doesn't \"slow the current down\" within the loop — it forces the *whole loop* to settle at a lower current. The resistors collectively determine the loop's single current value, but once set, that value is uniform around the loop.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": true}, {"question": "What's the difference between *charge* and *energy*, and how does *voltage* tie them together? (3 steps)", "answer": "- Step 1: **Charge** is a property of matter — it's what makes carriers feel electrical forces. It's the \"vehicle\". Measured in coulombs.\n- Step 2: **Energy** is what those vehicles carry. It can be converted into heat, light, motion. Measured in joules.\n- Step 3: **Voltage** is the ratio: energy per unit charge, $$V = E/Q$$. So 12 V means \"each coulomb of charge carries 12 joules of energy\". Voltage is a kind of \"loading factor\" — how heavily packed with energy each carrier is.\n\nIn taxi terms: charge = taxis, energy = passengers, voltage = passengers per taxi.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": true}, {"question": "A battery has e.m.f. 9 V and delivers a total charge of 1350 C before going flat. Conceptually, what is the maximum energy it can deliver, and what's the assumption hidden in \"maximum\"? (3 steps)", "answer": "- Step 1: $$W_\\text{max} = \\varepsilon \\cdot Q = 9 \\times 1350 = 12150\\,\\text{J}$$. Each coulomb leaves the battery with 9 J of energy, and 1350 of them do, so the total is their product.\n- Step 2: This is \"maximum\" because it assumes **no internal resistance** in the battery. In reality, some energy is lost heating the battery itself before charge reaches the external circuit, so the actual delivered energy is slightly less.\n- Step 3: For our purposes (introductory level), \"max energy = e.m.f. × total charge delivered\" is the answer the exam wants. Internal resistance corrections come in the next chapter.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "A 230 V appliance rated at 800 W runs for 1 minute. Without computing, identify why $$W = Pt$$ is the *direct* route and what would be needlessly complicated. (2 steps)", "answer": "- Step 1: You know power and time, and power's definition is $$P = E/t$$, so trivially $$E = Pt$$. One multiplication, no intermediate quantities. Answer: $$800 \\times 60 = 48000\\,\\text{J}$$.\n- Step 2: The roundabout route would be: find $$I = P/V$$, then $$Q = It$$, then $$E = VQ$$. This gives the same answer but requires three calculations and uses the voltage twice — once to find $$I$$ and once to find $$E$$. They cancel out, leaving exactly $$Pt$$. So the long route literally derives $$W = Pt$$ inefficiently.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "In Q29's battery problem, if the current is 0.5 A throughout, what's the *power* delivered, and why must the answer be the same via two different methods? (3 steps)", "answer": "- Step 1: Direct method: $$P = VI = 9 \\times 0.5 = 4.5\\,\\text{W}$$. Each second, 0.5 C leave the battery, each carrying 9 J, so 4.5 J/s.\n- Step 2: Roundabout method: total time to deliver 1350 C is $$t = Q/I = 2700\\,\\text{s}$$. Power $$= W/t = 12150/2700 = 4.5\\,\\text{W}$$. Same answer.\n- Step 3: They must agree because they describe the same physical situation. Internally, both formulas come from the same definitions: $$P = VI$$ is just $$V \\cdot (Q/t)$$, which is $$E/t$$. Getting the same answer via two routes is a useful check that you understand what's going on.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "Why is a watt fundamentally a \"joule per second\", and how does this prevent confusing it with a joule? (2 steps)", "answer": "- Step 1: Power is rate of energy transfer: $$P = E/t$$, so units are J/s. The watt is just a shorthand: $$1\\,\\text{W} = 1\\,\\text{J/s}$$.\n- Step 2: This means W and J are *not* interchangeable — they differ by a factor of \"seconds\". To convert \"energy used at this power for this time\" to joules, you must multiply: $$E\\,(\\text{J}) = P\\,(\\text{W}) \\times t\\,(\\text{s})$$. A 100 W bulb burning for 10 s uses 1000 J, not 100 J.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": true}, {"question": "A conductor carries 40 mA. Without computing, describe the steps to determine: (a) charge through it in 3 minutes, (b) number of electrons, (c) p.d. across it if 8.6 J are transferred, (d) its resistance. (4 steps)", "answer": "- Step 1: **Charge**: convert prefixes — 40 mA = 0.04 A, 3 min = 180 s — then $$Q = It$$. Answer order of magnitude: about 7 tenths of a coulomb.\n- Step 2: **Electrons**: divide that charge by $$e = 1.6 \\times 10^{-19}\\,\\text{C}$$. Expect about $$10^{18}$$ electrons (recall 1 C ≈ $$6 \\times 10^{18}$$ electrons, so 0.7 C ≈ $$4 \\times 10^{18}$$).\n- Step 3: **P.d.**: use $$V = W/Q$$ — energy delivered divided by charge that delivered it. Tells you \"joules per coulomb\" for this component.\n- Step 4: **Resistance**: use Ohm's law $$R = V/I$$ now that you have both V and I. Make sure I is in amperes, not mA, or you'll be wrong by a factor of 1000.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "Why does the *sign* of the electron's charge (negative) not matter when you're calculating \"how many electrons passed\"? (2 steps)", "answer": "- Step 1: The negative sign in $$e = -1.60 \\times 10^{-19}\\,\\text{C}$$ only encodes **direction** — the convention that electrons carry negative charge, so they move opposite to conventional current. It tells you nothing about *quantity*.\n- Step 2: When you compute $$N = Q/e$$, you want a count — a positive integer. So you use the **magnitude** of $$e$$. You wouldn't say \"there are negative seven electrons\"; you'd just say seven. The sign matters only when reasoning about *forces* and *directions of flow*, not counts.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "Why can the same wire have a current \"flowing one way\" if you're asked about conventional current, but \"flowing the other way\" if asked about electrons? (2 steps)", "answer": "- Step 1: Both descriptions refer to the *same physical phenomenon* — the same drifting electrons in the same metal. They're two different ways of labelling the same flow.\n- Step 2: Conventional current direction is defined as the direction *positive* charge would flow (from + to −). Since electrons are negative and they're the actual carriers in metals, they flow in the opposite direction (− to +). It's not two different currents — it's one current described from two viewpoints. By exam convention, always state which direction you mean if there's any ambiguity.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": true}, {"question": "Predict what would happen if you mistakenly connected an ammeter in parallel with a resistor instead of in series. (3 steps)", "answer": "- Step 1: An ammeter has very low resistance — essentially a wire. Connecting it in parallel with a resistor creates a near-short-circuit path that bypasses the resistor.\n- Step 2: Almost all the current would flow through the ammeter (the easy path), not the resistor. The current in the rest of the circuit would surge dramatically (limited only by the battery and remaining resistance).\n- Step 3: This can blow the ammeter's fuse, damage the meter, or even the battery. The reading would be meaningless. Lesson: ammeters in series, voltmeters in parallel — connecting them wrong is not just bad measurement, it can be destructive.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "Why does Kirchhoff's First Law work just as well in a \"complicated\" circuit with many junctions as in a simple parallel junction with two branches? (2 steps)", "answer": "- Step 1: KCL is not a statement about circuit *topology* — it's a statement about charge. At *every* point in space, including every node, charge cannot accumulate (in steady-state DC circuits). This must hold regardless of how many wires meet there.\n- Step 2: So for any junction — whether it has 2, 3, 5, or 10 wires meeting — the algebraic sum of currents (with sign indicating direction) is zero. Pick \"in\" as positive and \"out\" as negative, and they all must sum to zero. The law is universal because the underlying principle (charge conservation) is universal.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": true}, {"question": "Estimate, without calculator, roughly how many electrons cross a point per second in a wire carrying 1 A. Why is this number so large? (2 steps)", "answer": "- Step 1: 1 A = 1 C/s. Each electron carries about $$1.6 \\times 10^{-19}$$ C. So electrons per second $$= 1 / (1.6 \\times 10^{-19}) \\approx 6 \\times 10^{18}$$ per second.\n- Step 2: That's enormous because each electron carries an extraordinarily tiny charge. To make up a \"human-scale\" current of just 1 ampere, you need roughly 6 quintillion electrons crossing every second. This is also why the coulomb feels like a \"large\" unit — it represents an *astronomical* number of carriers.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": false}, {"question": "When a question says \"how much charge passed through a point\", why is this different from asking \"what is the current\"? (2 steps)", "answer": "- Step 1: **Current** is a *rate* — coulombs per second, an instantaneous flow. **Charge through a point** is a *cumulative total* — how many coulombs in total crossed during a stated time interval.\n- Step 2: They're related by $$Q = I \\cdot t$$ (for steady current), but they answer different questions. \"Current\" is like \"speed\"; \"charge passed\" is like \"distance travelled\". You need both the rate *and* the time to compute the total.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "A student measures the p.d. across a 6 V lamp using a voltmeter and notices the lamp dims slightly when the voltmeter is connected. What does this imply about the voltmeter? (2 steps)", "answer": "- Step 1: A perfect voltmeter draws no current and disturbs nothing. The fact that the lamp dims means the voltmeter *is* drawing measurable current — so its resistance is not high enough to be considered \"ideal\" in this circuit.\n- Step 2: The voltmeter is providing an alternative current path in parallel, which slightly reduces the current through the lamp (and hence the p.d. across it). The measured p.d. will be slightly lower than the \"true\" undisturbed value. Lesson: for accurate voltage readings, the voltmeter's resistance must be much greater than the component's.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "Why is the \"ampere\" chosen as an SI base unit while the \"coulomb\" is derived from it, not the other way around? (2 steps)", "answer": "- Step 1: Historically, current is easier to measure directly than charge — you can detect a current via the magnetic force between two parallel wires, which was the original ampere definition. The coulomb was then *defined* as 1 A × 1 s, i.e. the amount of charge transported by 1 A in 1 s.\n- Step 2: So the coulomb is a derived unit: $$1\\,\\text{C} = 1\\,\\text{A} \\cdot \\text{s}$$. The hierarchy reflects what's experimentally accessible: rates of flow (current) before total amounts (charge), because we typically measure currents with instruments and times with clocks.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "In an electrolyte conducting electricity, both positive and negative ions move. Is the current the sum of both flows, or does one cancel the other? (3 steps)", "answer": "- Step 1: They **add**, not cancel. Why? Because they move in *opposite directions*: positive ions move toward the negative electrode, negative ions move toward the positive electrode.\n- Step 2: Recall conventional current direction is the direction positive charge moves. Positive ions moving \"with\" conventional current contribute positively; negative ions moving \"against\" conventional current *also* contribute positively (a negative charge moving backward = a positive contribution to forward current).\n- Step 3: So total current = current from positive ions + current from negative ions, both adding constructively. This is why electrolytes can carry substantial currents even though no electrons move freely through the solution.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": true}, {"question": "Why must e.m.f. and p.d. have the *same units* (volts) even though they describe energy transfer in opposite directions? (2 steps)", "answer": "- Step 1: Both are defined as \"energy per unit charge\" — $$\\varepsilon = W/Q$$ for e.m.f., $$V = W/Q$$ for p.d. The formula is structurally identical; only the *direction* of energy transfer differs (into vs. out of electrical form).\n- Step 2: Since both are J/C, both are measured in volts. The volt is just the SI unit of energy-per-charge; it doesn't care which way the energy is flowing. This is why a 9 V battery's e.m.f. and the p.d. across a 9 V lamp it powers can both be quoted in volts and even be numerically equal (under ideal conditions).", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "If a battery is \"going flat\", the e.m.f. stays roughly constant but the terminal p.d. drops under load. Conceptually, what's happening? (3 steps)", "answer": "- Step 1: E.m.f. is the energy per coulomb the chemistry can convert — set by the chemical reaction, roughly stable until the battery is nearly exhausted.\n- Step 2: But a real battery has **internal resistance**. Some of the e.m.f. is \"used up\" pushing current through this internal resistance, dissipated as heat inside the battery itself.\n- Step 3: The **terminal p.d.** (what the external circuit actually sees) = e.m.f. − (energy lost per coulomb to internal resistance). As internal resistance grows with age, more of the e.m.f. is \"wasted\" internally and less reaches the bulb. So the bulb dims even though the chemistry is still nominally providing 9 V.\n\n(This previews the next chapter — but it's the conceptual link between e.m.f. and p.d.)", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": true}, {"question": "Imagine pushing 1 C of charge through a 12 V p.d. across a resistor. Conceptually, what happens, and how much energy is transferred? (3 steps)", "answer": "- Step 1: 12 V means each coulomb loses 12 J of electrical energy as it crosses. So pushing 1 C across gives up exactly 12 J.\n- Step 2: That energy isn't destroyed — it becomes thermal energy in the resistor (and a bit of EM radiation as the resistor warms). The resistor heats up.\n- Step 3: $$W = VQ = 12 \\times 1 = 12\\,\\text{J}$$. Notice the formula has *no time* in it — this is the energy transferred *per coulomb passing*, regardless of how fast it passed. If it took 1 s, the power was 12 W; if it took 10 s, the power was 1.2 W. But total energy delivered = 12 J either way.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": true}, {"question": "Why does it not make sense to talk about the \"potential difference at a single point\" — only between two points? (2 steps)", "answer": "- Step 1: P.d. is a *difference* — it measures how much electrical energy a coulomb loses going **from point A to point B**. Without two points, there's no \"from–to\", and no energy difference to measure.\n- Step 2: It's analogous to height differences: you can't say \"the height of that step\" without choosing a reference (ground, sea level, the floor below). Likewise, voltage at a single point is meaningless unless you specify the reference point (often taken as the negative terminal of the battery or \"earth\"). Always: voltage is *between* two points.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": false}, {"question": "In a simple parallel circuit with two branches between the same two nodes, why do both branches have the **same p.d. across them**, even if their resistances differ? (3 steps)", "answer": "- Step 1: P.d. is defined between two points. Both branches connect the **same two points** in the circuit (the two nodes).\n- Step 2: Therefore the p.d. \"from node A to node B\" is one single number, no matter which path you measure along. Each branch sees that same p.d.\n- Step 3: The branches will carry *different currents* (because their resistances differ — Ohm's law: $$I = V/R$$), but they share the same driving p.d. This is the basis of how parallel circuits split current while keeping voltage constant.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": false}], "count": 47}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "What is the precise mark-scheme definition of electric current, and why does the wording \"rate of flow of charge\" matter more than \"flow of electrons\"? (3 steps)", "answer": "- Step 1: The exam-correct definition is **the rate of flow of charge** past a point in a circuit. Symbolically $$I = \\Delta Q / \\Delta t$$.\n- Step 2: Saying \"flow of electrons\" loses marks because it is too narrow — charge carriers are not always electrons.\n+ In metals: free electrons.\n+ In electrolytes (e.g. salt water): positive and negative ions.\n+ In ionised gases (e.g. lightning): both ions and electrons.\n- Step 3: \"Rate of\" is also essential — it captures the *per-second* aspect. Without it, you have only defined the quantity of charge flowing, not how fast.\n\nTakeaway: the definition must say *rate* (per second) *of charge* (not electrons).", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "Why is electric charge said to be *quantised*, and what physical fact does this reflect about matter?", "answer": "Charge is quantised because it only ever appears in integer multiples of the elementary charge $$e = 1.60 \\times 10^{-19}\\ \\text{C}$$, so any observable charge satisfies $$Q = Ne$$ where $$N$$ is an integer. This reflects the fact that charge is carried by discrete particles — each proton carries $$+e$$ and each electron carries $$-e$$ — and you cannot have \"half an electron's worth\" of charge in isolation. This is *why* the coulomb, a human-defined unit, contains the odd-looking number $$6.25\\times 10^{18}$$ elementary charges: it is large compared to $$e$$, not the other way around.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "Roughly how many electrons make up one coulomb of charge, and what does this tell you about the size of the coulomb as a unit? (2 steps)", "answer": "- Step 1: Since $$Q = Ne$$, one coulomb contains $$N = 1/e \\approx 1/(1.6\\times 10^{-19}) \\approx 6.25\\times 10^{18}$$ electrons.\n- Step 2: This is an enormous number — the coulomb is a *huge* unit compared to one electron's charge. That is why everyday electronics deal in mC or µC, and a current of 1 A (= 1 C/s) already corresponds to billions of billions of electrons flowing per second.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "A student writes $$I = Qt$$. Explain conceptually (using units alone) why this must be wrong. (2 steps)", "answer": "- Step 1: The ampere is defined as $$1\\ \\text{A} = 1\\ \\text{C/s}$$ — coulombs *divided by* seconds, not multiplied.\n- Step 2: If you wrote $$I = Qt$$, the right side would have units of C·s, which is not amperes. So dimensional consistency alone tells you the formula must be $$I = Q/t$$.\n\nMnemonic: \"Amps are coulombs per second\" — the \"per\" is division.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": true}, {"question": "Why is the prefix confusion between $$\\mu$$ (micro) and m (milli) such a costly exam mistake?", "answer": "Micro means $$10^{-6}$$ and milli means $$10^{-3}$$ — they differ by a factor of 1000. If you treat $$1.0\\ \\mu\\text{A}$$ as if it were $$1.0\\ \\text{mA}$$, every quantity derived from it (charge, number of electrons, energy, resistance) is wrong by 1000×. The fix is to write the power of ten explicitly *before* substituting: $$1.0\\ \\mu\\text{A} = 1.0\\times 10^{-6}\\ \\text{A}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "Conceptually, why does conventional current flow opposite to electron flow in a metal wire? (3 steps)", "answer": "- Step 1: Conventional current was defined by Benjamin Franklin (~1750) *before* the electron was discovered (1897). He chose, arbitrarily, that current flows from + to −.\n- Step 2: When electrons were later identified as the actual mobile charge carriers in metals, they were found to carry *negative* charge, so they physically drift from − to +.\n- Step 3: Rather than rewrite all existing physics, the convention was kept. So conventional current (+ → −) and electron flow (− → +) are simply opposite descriptions of the same phenomenon.\n\nRule of thumb: unless the question asks specifically about electrons, use conventional current direction.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": true}, {"question": "In a piece of metal sitting on the bench with no battery connected, are there free electrons present? If so, why is there no current? (3 steps)", "answer": "- Step 1: Yes — a metal contains a \"sea\" of free (delocalised) electrons at all times. They are detached from their parent atoms and able to move.\n- Step 2: Without a potential difference, these electrons move in random directions due to thermal motion. For every electron heading one way, statistically another heads the opposite way.\n- Step 3: The *net* flow of charge past any cross-section is therefore zero — and current is by definition *net* rate of flow of charge. So no current.\n\nA potential difference applies an electric field, biasing the random motion into a small net drift — that drift is the current.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "Individual electrons drift at only a few mm/s, yet a lamp lights \"instantly\" when you flip the switch. Resolve this apparent paradox. (3 steps)", "answer": "- Step 1: When the switch closes, the *electric field* set up by the battery propagates through the wire at near the speed of light. It reaches every free electron almost simultaneously.\n- Step 2: Every electron in the wire immediately starts to drift — not just the ones near the battery. Since the wire is already packed with free electrons, current flows everywhere at once.\n- Step 3: This is the *marble-tube analogy*: push one marble in at one end of a full tube and another pops out the far end immediately, even though each marble moved only a tiny distance.\n\nSo: the signal is fast, the carriers are slow.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": true}, {"question": "What is the mark-scheme definition of potential difference between two points, and what is the corresponding equation? (2 steps)", "answer": "- Step 1: Potential difference is **the work done (energy transferred from electrical to other forms) per unit charge** passing between those two points.\n- Step 2: Equation: $$V = W/Q$$, with $$V$$ in volts (V), $$W$$ in joules (J), $$Q$$ in coulombs (C). The volt is defined as $$1\\ \\text{V} = 1\\ \\text{J/C}$$.\n\nShorthand \"energy per coulomb\" is acceptable in exams.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "Why does the \"Charlie the Coulomb\" hill analogy give you genuine physical intuition about voltage? (3 steps)", "answer": "- Step 1: Picture a circuit as a hill. The battery is at the top: it pushes each coulomb of charge (\"Charlie\") to the high-energy state, giving it energy (analogous to gravitational PE).\n- Step 2: Charlie then travels around the circuit and reaches a component (lamp/resistor). There he \"rolls downhill\", giving up his energy as heat/light.\n- Step 3: The potential difference *across* the component is the energy each Charlie loses there — i.e. **energy per coulomb delivered to the component**. This is exactly $$V = W/Q$$.\n\nCrucially: the *number* of Charlies coming out equals the number going in (charge is conserved); only their energy changes.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": true}, {"question": "Conceptually distinguish e.m.f. ($$\\varepsilon$$) from potential difference ($$V$$). Why are both measured in volts? (3 steps)", "answer": "- Step 1: **E.m.f.** is the energy *given to* each coulomb by a source (battery, generator) — energy is converted from chemical/mechanical/etc. *into* electrical energy. $$\\varepsilon = W/Q$$.\n- Step 2: **P.d.** is the energy *taken from* each coulomb by a component (resistor, lamp) — energy is converted *out of* electrical energy into heat/light/motion. $$V = W/Q$$.\n- Step 3: Both are \"energy per coulomb\", hence both measured in J/C = volts. They differ only in the *direction* of energy conversion: e.m.f. = into electrical; p.d. = out of electrical.\n\nIf a battery had zero internal resistance, e.m.f. would equal the terminal p.d. exactly.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": true}, {"question": "Why is \"electromotive force\" a misleading name for $$\\varepsilon$$?", "answer": "Because e.m.f. is not a force at all — it has units of volts (J/C), not newtons. It is an *energy transfer per unit charge*. The name is a historical leftover from the 19th century when it was thought to be a kind of driving force on charges. In modern terms, it should be called something like \"source voltage\" or \"energy per coulomb supplied\". For exams, just remember the units and definition, not the literal word \"force\".", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": true}, {"question": "State Kirchhoff's First Law and the *physical reason* behind it. (2 steps)", "answer": "- Step 1: At any junction in a circuit, $$\\sum I_{\\text{in}} = \\sum I_{\\text{out}}$$ — the sum of currents entering equals the sum leaving.\n- Step 2: The reason is **conservation of charge**: charge cannot be created, destroyed, or accumulated at a junction. Since current is rate of flow of charge, the rate in must equal the rate out — otherwise charge would pile up indefinitely, which it does not.\n\nExaminers want both the statement *and* the reason (charge conservation) for full marks.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": true}, {"question": "A common misconception is that Kirchhoff's First Law only applies \"in parallel circuits\". Why is this wrong?", "answer": "Kirchhoff's First Law is not a circuit-topology rule — it is *conservation of charge*, a universal law of physics. It applies at *every* point in *every* circuit. In a series circuit, there are no branching junctions, but the law still demands the current be identical at every point (charge in = charge out for any segment). In a parallel circuit you see it most obviously at junctions. The law is the same; only the geometry differs.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": true}, {"question": "Why does a resistor *not* store electrons, and why is this conceptually important? (3 steps)", "answer": "- Step 1: A resistor is a passive component that converts electrical energy into thermal energy (heat). It does *not* contain a reservoir that traps charges.\n- Step 2: By conservation of charge, the rate of electrons entering one terminal of the resistor must equal the rate leaving the other — otherwise charge would accumulate without bound, which is unphysical.\n- Step 3: Therefore the current is identical on both sides of any resistor (and any component) in a series circuit. What changes across the resistor is the *energy per coulomb* (the p.d.), not the number of coulombs per second.\n\nIn the Charlie analogy: the same Charlies come out as went in, but each one is poorer in energy.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "Why must an ammeter be connected in series with the component whose current you want to measure? (2 steps)", "answer": "- Step 1: In a series connection, the same current flows through every component in the loop (charge conservation). So an ammeter in series sees exactly the current passing through the target component.\n- Step 2: An ammeter is designed to have very *low* resistance, so inserting it in series does not significantly reduce the current it is measuring. (If you put it in parallel by mistake, its low resistance would short-circuit the component and likely blow the meter.)", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "Why must a voltmeter be connected in parallel across the component, and why does it need very high resistance? (3 steps)", "answer": "- Step 1: P.d. is defined *between two points*. To measure the p.d. across a component, the voltmeter must connect to those two points — i.e. one terminal each side, which is the parallel configuration.\n- Step 2: Components in parallel share the same p.d., so the voltmeter reads exactly the p.d. across the component it is parallel with.\n- Step 3: The voltmeter must have very high resistance (e.g. 10 MΩ) so it draws negligible current. If it drew significant current, it would alter the circuit it is trying to measure — known as \"loading\" the circuit.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "Conceptually, what is the difference between current ($$I = Q/t$$) and power ($$P = E/t$$), given that both have the form \"something per time\"? (3 steps)", "answer": "- Step 1: Current is the rate of flow of *charge carriers* past a point — how many coulombs per second. It tells you nothing directly about energy.\n- Step 2: Power is the rate of *energy transfer* — how many joules per second. It tells you nothing directly about how many carriers are moving.\n- Step 3: Voltage links them: each coulomb carries $$V$$ joules of energy, so $$P = V \\times I$$ — power = (energy per coulomb) × (coulombs per second).\n\nTaxi analogy: charge = taxis, energy = passengers, current = taxis/second, power = passengers/second, voltage = passengers/taxi.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "Derive $$P = VI$$ from the fundamental definitions of current, voltage, and power. (3 steps)", "answer": "- Step 1: Start with definitions:\n+ $$I = Q/t$$ (current)\n+ $$V = W/Q$$ (potential difference), so $$W = VQ$$\n+ $$P = W/t$$ (power)\n- Step 2: Substitute $$W = VQ$$ into $$P = W/t$$: $$P = VQ/t$$.\n- Step 3: Recognise $$Q/t = I$$, so $$P = V \\times I$$.\n\nConceptual reading: power = (energy per coulomb) × (coulombs per second) = energy per second. Units check: V × A = (J/C) × (C/s) = J/s = W. ✓", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "When a question gives you both power and time and asks for energy, which formula is the most direct, and why is going via $$V$$ and $$Q$$ inefficient?", "answer": "Use $$W = Pt$$ directly — one multiplication, done. Going via $$Q = It$$ then $$W = VQ$$ requires you to know or compute $$I$$ and $$V$$ separately, then do two multiplications — more steps, more places to slip up, same answer. The principle: pick the formula whose RHS contains *exactly the quantities you already have*. Asking \"do I know P and t?\" first saves time on exams.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "A wire carries a current of 2 A for 3 seconds. Roughly how much charge passes a point, and what does that mean physically? (2 steps)", "answer": "- Step 1: $$Q = It = 2 \\times 3 = 6\\ \\text{C}$$.\n- Step 2: 6 C is about $$6 \\times 6.25\\times 10^{18} \\approx 4\\times 10^{19}$$ electrons that passed the point in 3 seconds. Physically: in three seconds, around 40 billion billion electrons drift past — even though each individual electron may have moved only a few centimetres.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "An electron beam has current 1 µA running for 10 minutes. Without computing the exact number, describe the *conceptual procedure* to find how many electrons passed. (3 steps)", "answer": "- Step 1: First find total charge: $$Q = I \\times t$$. Crucially convert: $$1\\ \\mu\\text{A} = 10^{-6}\\ \\text{A}$$ and $$10\\ \\text{min} = 600\\ \\text{s}$$.\n- Step 2: Then count carriers: $$N = Q/e$$, using the *magnitude* of $$e = 1.6\\times 10^{-19}\\ \\text{C}$$. (The sign of $$e$$ encodes direction, not particle count.)\n- Step 3: Order-of-magnitude check: $$Q \\sim 10^{-4}\\ \\text{C}$$, divided by $$\\sim 10^{-19}$$, gives $$\\sim 10^{15}$$ electrons. So even a tiny µA current still ships quadrillions of electrons per minute.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "A 9 V battery delivers a total charge of 1000 C over its lifetime. Without computing precisely, what is the order of magnitude of the energy delivered, and what does it physically represent?", "answer": "Using $$W = VQ$$, the energy is roughly $$9 \\times 1000 \\sim 10^4\\ \\text{J}$$. Physically, this is the total chemical energy converted into electrical energy by the battery before exhaustion. Each coulomb leaving the battery has been given 9 J of electrical energy, and 1000 such coulombs have flowed, so the total electrical energy delivered is around ten thousand joules.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "At a junction, 2 mA and 3 mA enter from two wires. What current must leave on the third wire, and why?", "answer": "$$I_{\\text{out}} = 2 + 3 = 5\\ \\text{mA}$$. The reason is Kirchhoff's First Law (charge conservation): charge cannot accumulate at the junction, so the rate of charge arriving (2 + 3 = 5 mA) must equal the rate departing. The numerical magnitude isn't what matters — the principle is \"in = out\" regardless of the specific values.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "Two resistors are in series. Why is the current the same through both, and how is this a consequence of charge conservation? (2 steps)", "answer": "- Step 1: A series connection has no branching points between the two resistors. Whatever charge enters resistor A per second must come out the other side and enter resistor B per second — otherwise charge would pile up inside A, which doesn't happen.\n- Step 2: Therefore the rate of flow of charge (the current) is identical at every point in the series loop. Charge conservation forces equal currents — no algebra of resistors needed for this result.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "Why is it not enough to say \"Kirchhoff's First Law: current in = current out\" on an exam — what extra phrase wins the mark? (2 steps)", "answer": "- Step 1: Examiners usually award one mark for stating the law and a second mark for stating the *reason*.\n- Step 2: The reason is **conservation of charge**: charge cannot be created or destroyed, nor can it accumulate at a junction. Always tag this phrase onto your statement of the law.\n\nModel answer: \"The sum of currents entering a junction equals the sum leaving, because charge is conserved.\"", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "A common slip is to say a battery \"produces electrons\" or \"supplies charge\". What is the correct view of what a battery does? (3 steps)", "answer": "- Step 1: A battery does not create charges — the wire and the components already contain plenty of free electrons.\n- Step 2: What the battery does is *supply energy* to those existing charges. Through chemical reactions, it converts chemical energy into electrical PE, giving each coulomb that passes through it $$\\varepsilon$$ joules.\n- Step 3: This creates a potential difference (an electric field through the wire) that drives the existing free electrons into directed drift — i.e. a current.\n\nSlogan: a battery is an *energy pump for charges*, not a *source of charges*.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": true}, {"question": "A filament lamp runs at 0.25 A for one hour. Conceptually, how would you find both the total charge and the number of electrons through it? (3 steps)", "answer": "- Step 1: Convert 1 hour to 3600 s. Use $$Q = It$$ to get total charge — order of magnitude $$0.25 \\times 3600 \\sim 10^3\\ \\text{C}$$, so about 900 C.\n- Step 2: Divide by elementary charge $$N = Q/e$$, so $$N \\sim 900 / (1.6\\times 10^{-19}) \\sim 10^{21}$$ electrons.\n- Step 3: The takeaway: even a \"small\" 250 mA current pushes around $$10^{21}$$ electrons through the filament in an hour — astronomically many, because $$e$$ is so tiny.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "A conductor carrying 40 mA transfers 8.6 J of energy in 3 minutes. Conceptually walk through how you would find the p.d. across it. (3 steps)", "answer": "- Step 1: First convert units: $$I = 40\\times 10^{-3}\\ \\text{A}$$, $$t = 180\\ \\text{s}$$.\n- Step 2: Find the total charge that passed: $$Q = It \\sim 0.7\\ \\text{C}$$. This tells you how many coulombs received the 8.6 J.\n- Step 3: Use $$V = W/Q$$ — energy per coulomb. With ~0.7 C carrying 8.6 J, that's $$V \\sim 12\\ \\text{V}$$. Each coulomb delivered about 12 J to the conductor.\n\nThe key insight: voltage is *not* directly the energy — you must first know how many coulombs shared that energy.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": true}, {"question": "Define the coulomb in terms of base SI units, and explain what it means physically.", "answer": "The coulomb is defined as the charge that passes a point in one second when a steady current of one ampere flows: $$1\\ \\text{C} = 1\\ \\text{A}\\cdot\\text{s}$$. Physically, one coulomb contains about $$6.25\\times 10^{18}$$ elementary charges. It is *not* one particle (a common student slip) — it is a quantity of charge, in the same way that one mole is a quantity of particles, not a single particle. That's why charges like 0.72 C are perfectly reasonable: it's a fraction of a huge number.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "Why does the *sign* of the electron's charge $$e = -1.6\\times 10^{-19}\\ \\text{C}$$ not matter when counting how many electrons pass through a wire? (2 steps)", "answer": "- Step 1: The sign encodes the *direction* of charge — minus means it experiences a force opposite to a positive test charge. It says nothing about *how many* electrons there are.\n- Step 2: When you compute $$N = Q/e$$, you're asking \"how many particles' worth of charge is this?\" — a count, which is intrinsically positive. So use the magnitude only: $$N = |Q|/|e|$$.\n\nIf you accidentally kept the minus, you'd get a negative count, which is physically nonsense (you can't have −10¹⁵ electrons).", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": true}, {"question": "Two students argue about a circuit. Student A says: \"The current is bigger near the battery and smaller near the lamp because the lamp uses some of it up.\" Student B says: \"The current is the same everywhere.\" Who is right, and why? (3 steps)", "answer": "- Step 1: Student B is right. The current is the *same* everywhere in a series loop.\n- Step 2: The lamp does not \"use up\" current — current is the rate of flow of *charge*, and charge is conserved. What the lamp uses up is *energy per coulomb* (the p.d. drops across it), not the charges themselves.\n- Ste
