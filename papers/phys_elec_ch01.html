<script>
const DATA={"selected": [{"question": "Why is it incorrect to say \"the voltage *through* a component\"? What preposition should be used instead, and why? (2 steps)", "answer": "- Step 1: Voltage (potential difference) is measured *across* a component — between its two ends. It is the difference in electrical potential between two points. Current flows *through* a component; voltage exists *across* it.\n- Step 2: Confusing \"through\" with \"across\" reveals a conceptual muddle. Current is a flow (it goes through), while p.d. is a difference in energy per charge between two locations (it exists across). The correct phrasing: \"the p.d. *across* the resistor is 5 V\" or \"a current of 2 A flows *through* the resistor.\"\n\nCurrent *through*; voltage *across*.", "source": "GLM 5.1 ①", "_id": "glm_1_34"}, {"question": "Why does the *sign* of the electron's charge $$e = -1.6\\times 10^{-19}\\ \\text{C}$$ not matter when counting how many electrons pass through a wire? (2 steps)", "answer": "- Step 1: The sign encodes the *direction* of charge — minus means it experiences a force opposite to a positive test charge. It says nothing about *how many* electrons there are.\n- Step 2: When you compute $$N = Q/e$$, you're asking \"how many particles' worth of charge is this?\" — a count, which is intrinsically positive. So use the magnitude only: $$N = |Q|/|e|$$.\n\nIf you accidentally kept the minus, you'd get a negative count, which is physically nonsense (you can't have −10¹⁵ electrons).", "source": "Opus 4.7 ②", "_id": "opus_2_30"}, {"question": "A student writes $$I = Qt$$. Explain conceptually (using units alone) why this must be wrong. (2 steps)", "answer": "- Step 1: The ampere is defined as $$1\\ \\text{A} = 1\\ \\text{C/s}$$ — coulombs *divided by* seconds, not multiplied.\n- Step 2: If you wrote $$I = Qt$$, the right side would have units of C·s, which is not amperes. So dimensional consistency alone tells you the formula must be $$I = Q/t$$.\n\nMnemonic: \"Amps are coulombs per second\" — the \"per\" is division.", "source": "Opus 4.7 ②", "_id": "opus_2_3"}, {"question": "Using the \"Charlie the Coulomb\" hill analogy, explain qualitatively what voltage, the battery, and a resistor each represent. (3 steps)", "answer": "- Step 1: Imagine each coulomb of charge is a character called Charlie. The **battery** sits at the top of a hill — it does work on Charlie to lift him up, giving him energy. The amount of energy given per Charlie is the **e.m.f.**\n- Step 2: Charlie then rolls down through the circuit. When he passes through a **resistor or lamp**, he \"loses height\" — he gives up his energy as heat and light. The energy lost per Charlie in that component is the **p.d. across it**.\n- Step 3: Crucially, the same Charlies emerge from the resistor that went in — the resistor *converts energy*, it does not *consume Charlies*. By the time Charlie returns to the battery, he has zero spare energy; the battery does work on him again. This is why p.d. is \"energy per coulomb\" — it's how much each Charlie surrenders at each component.", "source": "Opus 4.7 ①", "_id": "opus_1_9"}, {"question": "In the \"Charlie the Coulomb\" analogy, Charlie gains energy at the battery and loses it at the resistor. Does the *number* of Charlies change as they pass through the resistor? What does this tell you about current? (2 steps)", "answer": "- Step 1: No — the same number of Charlies (coulombs) emerge from the resistor as entered it. The resistor does not consume or store charge carriers; it only converts their energy from electrical to thermal/light.\n- Step 2: Since current is the rate of flow of charge (Charlies per second), and the number of Charlies per second is unchanged, the **current is the same before and after the resistor**. This is a direct consequence of conservation of charge.\n\nEnergy is transferred; charge is conserved. The resistor changes *how much energy each Charlie has*, not *how many Charlies there are*.", "source": "GLM 5.1 ②", "_id": "glm_2_38"}, {"question": "State Kirchhoff's First Law and the *physical reason* behind it. (2 steps)", "answer": "- Step 1: At any junction in a circuit, $$\\sum I_{\\text{in}} = \\sum I_{\\text{out}}$$ — the sum of currents entering equals the sum leaving.\n- Step 2: The reason is **conservation of charge**: charge cannot be created, destroyed, or accumulated at a junction. Since current is rate of flow of charge, the rate in must equal the rate out — otherwise charge would pile up indefinitely, which it does not.\n\nExaminers want both the statement *and* the reason (charge conservation) for full marks.", "source": "Opus 4.7 ②", "_id": "opus_2_12"}, {"question": "A 12 V battery drives 0.05 A for 1800 s. Conceptually walk through finding the energy transferred — which two formulas do you chain together, and in what order? (3 steps)", "answer": "- Step 1: First, find the total charge that passed: $$Q = I\\Delta t = 0.05 \\times 1800 = 90$$ C. This tells you \"how many Charlies\" flowed through the circuit.\n- Step 2: Then, find the energy each coulomb delivered: the p.d. is 12 V, meaning 12 J per coulomb. So total energy: $$W = VQ = 12 \\times 90 = 1080$$ J.\n- Step 3: You could also use $$W = Pt$$ after finding $$P = VI = 12 \\times 0.05 = 0.6$$ W, then $$W = 0.6 \\times 1800 = 1080$$ J. Both routes give the same answer — they are algebraically equivalent since $$W = VQ = V(It) = (VI)t = Pt$$.\n\nThe two-step chain (Q first, then W) is the most intuitive: find the charge, then find the energy per charge.", "source": "GLM 5.1 ②", "_id": "glm_2_39"}, {"question": "A student defines current as \"the flow of electrons.\" Why does this lose marks on an Edexcel exam paper? (2 steps)", "answer": "- Step 1: The mark-scheme definition is \"the rate of flow of **charge**\" — not electrons specifically. In metals, charge carriers are indeed electrons, but in electrolytes the carriers are ions, and in ionised gases they are both electrons and ions.\n- Step 2: By saying \"flow of electrons,\" the student is (a) missing the key word \"rate,\" and (b) incorrectly implying that electrons are the only charge carriers. The correct answer covers all situations — metals, electrolytes, and gases.\n\nTwo errors in one phrase: missing \"rate\" and specifying electrons instead of charge. The mark-scheme is unforgiving on definitions.", "source": "GLM 5.1 ②", "_id": "glm_2_34"}, {"question": "Conceptually distinguish e.m.f. ($$\\varepsilon$$) from potential difference ($$V$$). Why are both measured in volts? (3 steps)", "answer": "- Step 1: **E.m.f.** is the energy *given to* each coulomb by a source (battery, generator) — energy is converted from chemical/mechanical/etc. *into* electrical energy. $$\\varepsilon = W/Q$$.\n- Step 2: **P.d.** is the energy *taken from* each coulomb by a component (resistor, lamp) — energy is converted *out of* electrical energy into heat/light/motion. $$V = W/Q$$.\n- Step 3: Both are \"energy per coulomb\", hence both measured in J/C = volts. They differ only in the *direction* of energy conversion: e.m.f. = into electrical; p.d. = out of electrical.\n\nIf a battery had zero internal resistance, e.m.f. would equal the terminal p.d. exactly.", "source": "Opus 4.7 ②", "_id": "opus_2_10"}, {"question": "At a junction, 5 mA flows in and one branch carries 2 mA. What does the other branch carry, and why is this NOT an example of Ohm's law? (2 steps)", "answer": "- Step 1: The other branch must carry $$5 - 2 = 3\\,\\text{mA}$$, purely from charge conservation: in = out, so $$5 = 2 + I_2 \\Rightarrow I_2 = 3\\,\\text{mA}$$.\n- Step 2: This has nothing to do with Ohm's law. Ohm's law relates V to I via resistance; KCL is a statement about *charge flowing through a point*. You don't need to know any resistances or voltages to apply KCL — it's purely a counting argument from conservation.", "source": "Opus 4.7 ①", "_id": "opus_1_23"}, {"question": "Both $$I = Q/t$$ and $$P = E/t$$ have the form \"something divided by time.\" What is the fundamental difference between what each measures? Use the taxi analogy. (3 steps)", "answer": "- Step 1: $$I = Q/t$$ measures the **rate of flow of charge** — how many charge carriers (taxis) pass per second. It tells you the *quantity of carriers*, not how much energy they carry.\n- Step 2: $$P = E/t$$ measures the **rate of energy transfer** — how much energy is delivered per second. It tells you the *total energy* transferred, regardless of how many carriers are involved.\n- Step 3: **Taxi analogy**: Charge carriers are taxis; energy is the passenger. Current = taxis per second. Power = total passengers delivered per second. Voltage (energy per charge) = passengers per taxi. Two circuits could have the same current (same taxis per second) but very different power if each taxi carries a different number of passengers (different voltage).", "source": "GLM 5.1 ③", "_id": "glm_3_20"}, {"question": "If a voltmeter had a low resistance (instead of very high), what would go wrong when you tried to measure the p.d. across a resistor? (3 steps)", "answer": "- Step 1: A voltmeter is placed in parallel with the component. If its resistance were low, current would divert through the voltmeter instead of through the component.\n- Step 2: This changes the current distribution in the circuit — the very thing you're trying to measure (the p.d. across the component) shifts because you've altered the circuit by attaching the meter.\n- Step 3: This effect is called \"loading the circuit\". High voltmeter resistance (e.g. 10 MΩ) keeps the diverted current negligibly small, so the measurement is faithful.\n\nPrinciple: instruments should disturb the system as little as possible.", "source": "Opus 4.7 ②", "_id": "opus_2_39"}, {"question": "The term \"electromotive force\" suggests it is a force. Why is this name misleading, and what is e.m.f. actually? (2 steps)", "answer": "- Step 1: E.m.f. is **not a force at all** — it is a measure of **energy transfer per unit charge**. The name is a historical artifact from when the distinction between force and energy was less precise.\n- Step 2: E.m.f. is the **energy converted into electrical energy per unit charge** by a source, measured in volts ($$\\text{J/C}$$), not newtons. Think of it as the \"electrical energy push\" — it tells you how many joules each coulomb gains from the source, not how many newtons of force act on the charges.", "source": "GLM 5.1 ③", "_id": "glm_3_16"}, {"question": "A student confuses watts and joules, writing \"the energy is 800 W.\" Explain the relationship between these units and why the student's statement is dimensionally wrong. (2 steps)", "answer": "- Step 1: The **joule (J)** is the SI unit of *energy*. The **watt (W)** is the SI unit of *power*, defined as 1 W = 1 J/s. Power is energy *per unit time* — it's a rate, not an amount.\n- Step 2: Saying \"the energy is 800 W\" is like saying \"the distance is 80 km/h.\" It confuses a quantity with its rate. 800 W means 800 joules *per second* — it tells you how *fast* energy is transferred, not how *much* total energy. To get energy: $$\\text{Energy (J)} = \\text{Power (W)} \\times \\text{Time (s)}$$.\n\nWatts = how fast; Joules = how much. Multiply watts by seconds to get joules.", "source": "GLM 5.1 ①", "_id": "glm_1_26"}, {"question": "Why does a voltmeter need to take *some* current to work, and what's the design trade-off? (3 steps)", "answer": "- Step 1: A voltmeter measures p.d. by detecting an effect (a needle deflection, a digital reading) that requires energy. That energy must come from the circuit being measured — so a small current must flow through the voltmeter.\n- Step 2: But every microamp through the voltmeter is a microamp *not* through the component you're trying to measure, distorting the reading. So the design goal is: take just enough current to operate the meter, and no more.\n- Step 3: Solution: make the voltmeter's resistance very high. Digital voltmeters typically have ~10 MΩ, drawing only a tiny fraction of the circuit current. Older analogue voltmeters had lower resistance (~kΩ) and disturbed circuits more.", "source": "Opus 4.7 ①", "_id": "opus_1_24"}, {"question": "When counting the number of electrons from a known total charge using $$N = Q/e$$, the formula booklet lists the electron charge as $$e = -1.60 \\times 10^{-19}$$ C (negative). Should you include the negative sign? Why or why not? (2 steps)", "answer": "- Step 1: **No**, you should not include the negative sign when counting electrons. Use the magnitude: $$N = \\frac{Q}{1.60 \\times 10^{-19}}$$. The negative sign in the booklet encodes the *type* of charge (negative), not a countable quantity.\n- Step 2: $$N$$ represents a number of particles — it must be a positive integer. If you divided by $$-1.60 \\times 10^{-19}$$, you would get a negative number of electrons, which is physically meaningless. The sign tells you the charge type; the magnitude tells you the charge amount per particle.\n\nThis was a question asked in the actual lesson. The rule: use the sign when tracking charge direction, use the magnitude when counting particles.", "source": "GLM 5.1 ②", "_id": "glm_2_33"}, {"question": "A student says: \"In a parallel circuit, the current splits equally at every junction.\" Is this always true? Give a counterexample. (2 steps)", "answer": "- Step 1: No — current splits *equally* only if the two branches have *equal resistance*. Kirchhoff's First Law only says the total current in equals total current out; it says nothing about how the current divides.\n- Step 2: Counterexample: if one branch has a 1 Ω resistor and the other has a 9 Ω resistor, most current takes the easier (lower-resistance) path. The split might be 90% through the 1 Ω branch and 10% through the 9 Ω branch. The currents are unequal, but they still *add up* to the incoming current — KCL is satisfied.\n\nKCL constrains the *sum*, not the *distribution*.", "source": "GLM 5.1 ①", "_id": "glm_1_43"}, {"question": "In the \"Charlie the Coulomb\" hill analogy, what does the battery represent, what does the resistor represent, and what does potential difference correspond to? (3 steps)", "answer": "- Step 1: The **battery** is at the top of the hill. It gives energy (gravitational PE in the analogy, electrical PE in reality) to each \"Charlie\" (each coulomb of charge). This is the e.m.f. — the energy given per coulomb by the source.\n- Step 2: The **resistor or lamp** is at the bottom of the hill. As Charlie passes through it, he gives up his energy as light and heat. The p.d. across the component is the energy taken from each coulomb.\n- Step 3: **Potential difference** = the energy given to (or taken from) each coulomb. The height difference between top and bottom represents the p.d. — a bigger \"drop\" means more energy per coulomb is transferred. Crucially, the **same number of Charlies** emerge from the resistor as entered it — charge is conserved; only energy is transferred.", "source": "GLM 5.1 ③", "_id": "glm_3_13"}, {"question": "A conductor carrying 40 mA transfers 8.6 J of energy in 3 minutes. Conceptually walk through how you would find the p.d. across it. (3 steps)", "answer": "- Step 1: First convert units: $$I = 40\\times 10^{-3}\\ \\text{A}$$, $$t = 180\\ \\text{s}$$.\n- Step 2: Find the total charge that passed: $$Q = It \\sim 0.7\\ \\text{C}$$. This tells you how many coulombs received the 8.6 J.\n- Step 3: Use $$V = W/Q$$ — energy per coulomb. With ~0.7 C carrying 8.6 J, that's $$V \\sim 12\\ \\text{V}$$. Each coulomb delivered about 12 J to the conductor.\n\nThe key insight: voltage is *not* directly the energy — you must first know how many coulombs shared that energy.", "source": "Opus 4.7 ②", "_id": "opus_2_28"}, {"question": "A current is given as 40 mA. A student substitutes this directly into $$Q = I\\Delta t$$ as $$I = 40$$. What is the error, and what is the correct value in amperes? (2 steps)", "answer": "- Step 1: The error is failing to convert the prefix. \"m\" stands for milli, meaning $$10^{-3}$$. So 40 mA = $$40 \\times 10^{-3}$$ A = 0.040 A. Substituting $$I = 40$$ would give a result 1000 times too large.\n- Step 2: Always write out the power of ten explicitly before substituting. The three critical prefixes: milli (m) = $$10^{-3}$$, micro (μ) = $$10^{-6}$$, nano (n) = $$10^{-9}$$. Confusing micro ($$10^{-6}$$) with milli ($$10^{-3}$$) makes your answer wrong by a factor of 1000.\n\nThis was a directly observed exam-trap error in lesson — the student confused μA with $$10^{-3}$$ A instead of $$10^{-6}$$ A.", "source": "GLM 5.1 ②", "_id": "glm_2_9"}, {"question": "What are the charge carriers in (a) a metal wire, (b) an electrolyte solution, and (c) an ionised gas? Why can't protons carry current in a solid metal? (3 steps)", "answer": "- Step 1: The charge carriers are:\n  + (a) Metal wire: **free (delocalised) electrons** — detached from metal atoms, forming a \"sea\" of mobile charge.\n  + (b) Electrolyte solution: **positive and negative ions** — dissolved salts dissociate into charged ions that can move through the liquid.\n  + (c) Ionised gas: **electrons and positive ions** — intense electric fields strip electrons from gas atoms, creating both types of carrier.\n- Step 2: In a solid metal, protons are locked inside atomic nuclei, which are fixed in the lattice. They cannot move because the strong nuclear force and electromagnetic binding keep nuclei in place.\n- Step 3: Only the outermost electrons in metals break free and drift through the lattice. These free electrons are already present even when no current flows — they just move randomly with zero net flow until a potential difference gives them a directed push.", "source": "GLM 5.1 ①", "_id": "glm_1_7"}, {"question": "Why is \"electromotive force\" a misleading name for $$\\varepsilon$$?", "answer": "Because e.m.f. is not a force at all — it has units of volts (J/C), not newtons. It is an *energy transfer per unit charge*. The name is a historical leftover from the 19th century when it was thought to be a kind of driving force on charges. In modern terms, it should be called something like \"source voltage\" or \"energy per coulomb supplied\". For exams, just remember the units and definition, not the literal word \"force\".", "source": "Opus 4.7 ②", "_id": "opus_2_11"}, {"question": "Why does a current of 1 A \"feel\" small compared to its huge per-second electron count?", "answer": "Because the *unit of charge* (the coulomb) is chosen to be enormous compared to one electron's charge. One ampere = one coulomb per second = $$6.25\\times 10^{18}$$ electrons per second. So everyday-sounding currents (amps, milliamps) correspond to astronomical numbers of electrons in motion — but the unit hides this scale. The numbers feel small because we've defined our units around macroscopic, lab-scale currents, not around the microscopic carriers.", "source": "Opus 4.7 ②", "_id": "opus_2_47"}, {"question": "Individual electrons in a wire drift at roughly 1 mm/s — slower than a snail. Yet when you flip a light switch, the lamp lights up almost instantly. Resolve this apparent paradox. (3 steps)", "answer": "- Step 1: The *individual electrons* drift very slowly. But the wire is already packed full of free electrons, like a tube packed with marbles.\n- Step 2: **Marble-tube analogy:** When you push one marble in at one end of a full tube, a marble at the far end comes out almost instantly. Each marble moved only a tiny distance, but the *effect* propagated almost instantly through the chain of collisions.\n- Step 3: Similarly, when a battery is connected, the electric field propagates through the wire at close to the speed of light ($$\\sim 3 \\times 10^8$$ m/s). This field gives *all* the free electrons throughout the circuit a push almost simultaneously. The current effect is fast even though individual charge carriers are slow.\n\nThe signal travels at the speed of the electric field, not the speed of the electrons.", "source": "GLM 5.1 ①", "_id": "glm_1_9"}, {"question": "Conservation of charge states that charge can neither be created nor destroyed. Does this mean the current in every branch of a parallel circuit must be the same? Explain. (2 steps)", "answer": "- Step 1: No — the current in each *branch* of a parallel circuit can be different. What conservation of charge requires is that the **total current entering a junction equals the total current leaving it**.\n- Step 2: At a junction where current splits into two branches, the individual branch currents can be unequal (e.g., 2 A and 3 A), but their sum (5 A) must equal the incoming current (5 A). Charge is conserved *at the junction*, not in each individual branch.\n\nConservation constrains the *total*, not each part individually.", "source": "GLM 5.1 ①", "_id": "glm_1_31"}, {"question": "Why does Kirchhoff's First Law work just as well in a \"complicated\" circuit with many junctions as in a simple parallel junction with two branches? (2 steps)", "answer": "- Step 1: KCL is not a statement about circuit *topology* — it's a statement about charge. At *every* point in space, including every node, charge cannot accumulate (in steady-state DC circuits). This must hold regardless of how many wires meet there.\n- Step 2: So for any junction — whether it has 2, 3, 5, or 10 wires meeting — the algebraic sum of currents (with sign indicating direction) is zero. Pick \"in\" as positive and \"out\" as negative, and they all must sum to zero. The law is universal because the underlying principle (charge conservation) is universal.", "source": "Opus 4.7 ①", "_id": "opus_1_36"}, {"question": "Why can the same wire have a current \"flowing one way\" if you're asked about conventional current, but \"flowing the other way\" if asked about electrons? (2 steps)", "answer": "- Step 1: Both descriptions refer to the *same physical phenomenon* — the same drifting electrons in the same metal. They're two different ways of labelling the same flow.\n- Step 2: Conventional current direction is defined as the direction *positive* charge would flow (from + to −). Since electrons are negative and they're the actual carriers in metals, they flow in the opposite direction (− to +). It's not two different currents — it's one current described from two viewpoints. By exam convention, always state which direction you mean if there's any ambiguity.", "source": "Opus 4.7 ①", "_id": "opus_1_34"}, {"question": "A 230 V, 800 W appliance runs for 1 minute. A student finds the current first, then charge, then uses $$W = VQ$$. Is this wrong? What's the more efficient approach? (2 steps)", "answer": "- Step 1: The student's method is *not wrong* — it will give the correct answer. Finding $$I = P/V$$, then $$Q = It$$, then $$W = VQ$$ is a valid chain of reasoning. However, it's unnecessarily long and error-prone (more steps = more chances for mistakes).\n- Step 2: The most direct approach: since you already know $$P$$ and $$t$$, use $$W = Pt$$ directly. $$W = 800 \\times 60 = 48{,}000 \\text{ J}$$. One step, same answer. Always ask: \"Do I know $$P$$ and $$t$$? Then use $$W = Pt$$ directly.\"\n\nEfficiency matters in exams — fewer steps, fewer errors.", "source": "GLM 5.1 ①", "_id": "glm_1_25"}, {"question": "Why must an ammeter be connected in series (not parallel), and a voltmeter in parallel (not series)? Give both the measurement reason and the practical reason for each. (4 steps)", "answer": "- Step 1: **Ammeter in series — measurement reason**: To measure the current through a component, the same current must flow through the ammeter. Only a series connection ensures this — in series, the current has no alternative path.\n- Step 2: **Ammeter in series — practical reason**: The ammeter has very low resistance. If connected in parallel, it would create a short circuit (low-resistance bypass), drawing excessive current and potentially being damaged.\n- Step 3: **Voltmeter in parallel — measurement reason**: To measure the p.d. *across* a component, the voltmeter must be connected between the same two points as the component. This is inherently a parallel connection.\n- Step 4: **Voltmeter in parallel — practical reason**: The voltmeter has very high resistance. In parallel, it draws negligible current and does not disturb the circuit. If connected in series, its huge resistance would reduce the circuit current to nearly zero.\n\nAmmeter: series (low R, measures current). Voltmeter: parallel (high R, measures p.d.).", "source": "GLM 5.1 ②", "_id": "glm_2_50"}, {"question": "A common misconception is that Kirchhoff's First Law only applies \"in parallel circuits\". Why is this wrong?", "answer": "Kirchhoff's First Law is not a circuit-topology rule — it is *conservation of charge*, a universal law of physics. It applies at *every* point in *every* circuit. In a series circuit, there are no branching junctions, but the law still demands the current be identical at every point (charge in = charge out for any segment). In a parallel circuit you see it most obviously at junctions. The law is the same; only the geometry differs.", "source": "Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "Individual electrons drift at only a few mm/s, yet a lamp lights \"instantly\" when you flip the switch. Resolve this apparent paradox. (3 steps)", "answer": "- Step 1: When the switch closes, the *electric field* set up by the battery propagates through the wire at near the speed of light. It reaches every free electron almost simultaneously.\n- Step 2: Every electron in the wire immediately starts to drift — not just the ones near the battery. Since the wire is already packed with free electrons, current flows everywhere at once.\n- Step 3: This is the *marble-tube analogy*: push one marble in at one end of a full tube and another pops out the far end immediately, even though each marble moved only a tiny distance.\n\nSo: the signal is fast, the carriers are slow.", "source": "Opus 4.7 ②", "_id": "opus_2_7"}, {"question": "A metal wire has free electrons in it even when no battery is connected. Yet you don't feel any shock when you touch it. Why not? (2 steps)", "answer": "- Step 1: Without a battery (or any potential difference), the free electrons move *randomly in all directions* at high speed. Their motions cancel out — for every electron moving left, there's roughly one moving right. The *net* flow of charge is zero, so the net current is zero.\n- Step 2: A current requires a *net directed flow* of charge. A potential difference from a battery creates an electric field that gives the electrons a net push in one direction, producing a measurable current. Without that directed push, the random thermal motion produces no net effect.\n\nThink of a crowd milling about randomly in a square (no net movement) vs. a crowd all walking toward an exit (net flow = current).", "source": "GLM 5.1 ①", "_id": "glm_1_8"}, {"question": "A student wonders whether electrons accumulate inside a resistor, since the resistor \"uses up\" electricity. Explain why this reasoning is wrong. (3 steps)", "answer": "- Step 1: A resistor does **not** store or accumulate electrons. The same number of electrons enter the resistor as leave it per second — the current in equals the current out.\n- Step 2: What the resistor *does* \"use up\" is **energy**, not charge. As electrons pass through, they transfer electrical energy to the lattice (thermal energy / heat). The electrons emerge with less energy per coulomb (lower potential), but the *number* of electrons is unchanged.\n- Step 3: Going back to the hill analogy: Charlie the Coulomb loses *height* (energy) going down the hill, but Charlie still exists at the bottom. The same number of Charlies arrive at the bottom as started at the top — they just carry less energy.\n\nResistors convert energy, not store charge. This is charge conservation in action.", "source": "GLM 5.1 ①", "_id": "glm_1_18"}, {"question": "If a battery is \"going flat\", the e.m.f. stays roughly constant but the terminal p.d. drops under load. Conceptually, what's happening? (3 steps)", "answer": "- Step 1: E.m.f. is the energy per coulomb the chemistry can convert — set by the chemical reaction, roughly stable until the battery is nearly exhausted.\n- Step 2: But a real battery has **internal resistance**. Some of the e.m.f. is \"used up\" pushing current through this internal resistance, dissipated as heat inside the battery itself.\n- Step 3: The **terminal p.d.** (what the external circuit actually sees) = e.m.f. − (energy lost per coulomb to internal resistance). As internal resistance grows with age, more of the e.m.f. is \"wasted\" internally and less reaches the bulb. So the bulb dims even though the chemistry is still nominally providing 9 V.\n\n(This previews the next chapter — but it's the conceptual link between e.m.f. and p.d.)", "source": "Opus 4.7 ①", "_id": "opus_1_43"}, {"question": "A learner writes: \"voltage flows through the circuit and current is used up by the resistor\". Identify both errors. (2 steps)", "answer": "- Step 1: Voltage does not *flow*. Voltage is a *difference* (in energy per coulomb) between two points; it's a property of a location-pair, not a thing that travels. What flows is *charge*; the voltage is the cause, not the moving stuff.\n- Step 2: Current is not *used up*. The resistor does not consume charges — same number in as out. What is used up is *energy* (the energy per coulomb drops across the resistor, transferred to heat). The current itself is conserved.\n\nCorrect phrasing: \"Voltage drives current; current carries energy; the resistor dissipates energy, not current.\"", "source": "Opus 4.7 ②", "_id": "opus_2_48"}, {"question": "A common student error: \"a resistor stores electrons, so less current flows out than flows in.\" Why is this wrong? (3 steps)", "answer": "- Step 1: It violates conservation of charge. A resistor is not a reservoir — it has no mechanism to accumulate electrons. If charge built up inside, the resistor would become enormously charged and the circuit would stop.\n- Step 2: What a resistor actually does is **convert electrical energy into thermal energy** (and sometimes light). The electrons enter, collide with the lattice ions and lose energy as heat, then exit. The same *number* of electrons emerges per second as enters per second.\n- Step 3: So current in = current out for *every* component in series. The resistor converts *energy*, not *charge*.", "source": "Opus 4.7 ①", "_id": "opus_1_11"}, {"question": "Why is a watt fundamentally a \"joule per second\", and how does this prevent confusing it with a joule? (2 steps)", "answer": "- Step 1: Power is rate of energy transfer: $$P = E/t$$, so units are J/s. The watt is just a shorthand: $$1\\,\\text{W} = 1\\,\\text{J/s}$$.\n- Step 2: This means W and J are *not* interchangeable — they differ by a factor of \"seconds\". To convert \"energy used at this power for this time\" to joules, you must multiply: $$E\\,(\\text{J}) = P\\,(\\text{W}) \\times t\\,(\\text{s})$$. A 100 W bulb burning for 10 s uses 1000 J, not 100 J.", "source": "Opus 4.7 ①", "_id": "opus_1_31"}, {"question": "A student claims: \"In a circuit, the current gets used up by each component, so there's less current after the lamp than before it.\" Explain the specific conceptual error. (3 steps)", "answer": "- Step 1: This confuses *current* (rate of charge flow) with *energy* (what the component converts). The lamp converts *electrical energy* into light and heat — it does not \"consume\" charge.\n- Step 2: By conservation of charge (Kirchhoff's First Law), the rate of charge entering any component must equal the rate leaving it. If fewer electrons left than entered, electrons would pile up inside the lamp — this doesn't happen.\n- Step 3: What *does* decrease is the **potential** (energy per coulomb). Before the lamp, each coulomb carries more energy; after the lamp, each coulomb carries less energy. But the *number* of coulombs per second (current) is unchanged.\n\nCurrent is conserved; energy per coulomb decreases. The \"stuff\" (charge) isn't used up; the \"currency\" (energy) is.", "source": "GLM 5.1 ①", "_id": "glm_1_54"}, {"question": "Imagine pushing 1 C of charge through a 12 V p.d. across a resistor. Conceptually, what happens, and how much energy is transferred? (3 steps)", "answer": "- Step 1: 12 V means each coulomb loses 12 J of electrical energy as it crosses. So pushing 1 C across gives up exactly 12 J.\n- Step 2: That energy isn't destroyed — it becomes thermal energy in the resistor (and a bit of EM radiation as the resistor warms). The resistor heats up.\n- Step 3: $$W = VQ = 12 \\times 1 = 12\\,\\text{J}$$. Notice the formula has *no time* in it — this is the energy transferred *per coulomb passing*, regardless of how fast it passed. If it took 1 s, the power was 12 W; if it took 10 s, the power was 1.2 W. But total energy delivered = 12 J either way.", "source": "Opus 4.7 ①", "_id": "opus_1_44"}, {"question": "Why does it make sense that 1 V = 1 J/C as a unit equation, in plain English?", "answer": "The volt was invented precisely to capture \"energy per coulomb\". One volt across two points means *one joule of energy is transferred for each coulomb of charge that moves between them*. The unit equation 1 V = 1 J/C is not an extra fact to memorise — it is literally the definition of the volt. If you remember \"voltage is energy per coulomb\", you've automatically remembered the unit.", "source": "Opus 4.7 ②", "_id": "opus_2_49"}, {"question": "State Kirchhoff's First Law and explain the physical principle it derives from. Why is it NOT a special rule that only applies in certain circuit configurations? (2 steps)", "answer": "- Step 1: Kirchhoff's First Law (KCL): **The algebraic sum of currents at any junction equals zero.** Equivalently: the sum of currents entering a junction equals the sum of currents leaving:\n$$\\sum I_{\\text{in}} = \\sum I_{\\text{out}}$$\n- Step 2: This is a direct consequence of **conservation of charge** — charge cannot be created, destroyed, or accumulated at a junction. Whatever flows in must flow out. This is a **universal law**, not a circuit-specific rule. It applies at **every junction in every circuit** — in series circuits (no junctions → same current everywhere) and parallel circuits (current splits at junctions) alike.", "source": "GLM 5.1 ③", "_id": "glm_3_17"}, {"question": "Show how $$P = VI$$ can be derived from the definitions of voltage, current, and power. (3 steps)", "answer": "- Step 1: Start from definitions:\n+ Power: $$P = E/t$$\n+ Voltage: $$V = E/Q$$, so $$E = VQ$$\n+ Current: $$I = Q/t$$\n- Step 2: Substitute $$E = VQ$$ into $$P = E/t$$: $$P = \\frac{VQ}{t} = V \\cdot \\frac{Q}{t}$$.\n- Step 3: But $$Q/t = I$$, so $$P = V \\cdot I$$. The formula isn't a separate fact — it's a direct consequence of the three definitions combined. Knowing the derivation means you can re-derive it under exam pressure if you forget.", "source": "Opus 4.7 ①", "_id": "opus_1_18"}, {"question": "Explain why the formula $$V = W/Q$$ uses *two* points, not one. What would \"the voltage at a point\" actually mean? (2 steps)", "answer": "- Step 1: Potential difference is literally a *difference* — it measures the change in electrical potential energy per unit charge *between* two points. You need two points to have a difference, just as you need two temperatures to have a temperature difference.\n- Step 2: \"The voltage at a point\" can only be defined relative to a chosen **reference point** (usually earth/ground, defined as 0 V). This is called the *electric potential* at that point. But the *potential difference* always requires two points. When we casually say \"the voltage at point A is 5 V,\" we implicitly mean \"5 V relative to ground.\"\n\nP.d. is always between two points; \"voltage at a point\" needs a reference.", "source": "GLM 5.1 ①", "_id": "glm_1_41"}, {"question": "Conceptually, why does conventional current flow opposite to electron flow in a metal wire? (3 steps)", "answer": "- Step 1: Conventional current was defined by Benjamin Franklin (~1750) *before* the electron was discovered (1897). He chose, arbitrarily, that current flows from + to −.\n- Step 2: When electrons were later identified as the actual mobile charge carriers in metals, they were found to carry *negative* charge, so they physically drift from − to +.\n- Step 3: Rather than rewrite all existing physics, the convention was kept. So conventional current (+ → −) and electron flow (− → +) are simply opposite descriptions of the same phenomenon.\n\nRule of thumb: unless the question asks specifically about electrons, use conventional current direction.", "source": "Opus 4.7 ②", "_id": "opus_2_5"}, {"question": "Why does a resistor not \"store\" electrons or reduce current? What happens to the electrons?", "answer": "- Step 1: Electrons are not consumed or stored—they flow through the resistor.  \n- Step 2: The resistor converts electrical energy to thermal energy via collisions with lattice ions.  \n- Step 3: Current remains the same before and after the resistor (charge conservation).  \n- Step 4: Misconception: \"Resistors slow electrons\" is incorrect—drift velocity depends on current, which is constant in series.", "source": "Qwen 3 ①", "_id": "qwen_1_8"}, {"question": "A student writes $$R = I/V$$ instead of $$R = V/I$$. Using the physical meaning of resistance (\"difficulty for charge to get through\"), explain why the student's version is conceptually wrong. (2 steps)", "answer": "- Step 1: Resistance measures how much a component *opposes* current. Higher resistance should mean *less* current for a given voltage. So resistance should be *inversely proportional* to current — if you double the resistance, you halve the current.\n- Step 2: In $$R = V/I$$: if $$R$$ doubles, $$I$$ halves (for fixed $$V$$) ✓. In $$R = I/V$$: if $$R$$ doubles, $$I$$ doubles (for fixed $$V$$) ✗ — this would mean more resistance leads to *more* current, which is the opposite of reality.\n\nResistance opposes current: $$R = V/I$$, not $$R = I/V$$. Think: \"how much voltage do I need to push 1 A through this?\"", "source": "GLM 5.1 ①", "_id": "glm_1_45"}, {"question": "Two students argue about a circuit. Student A says: \"The current is bigger near the battery and smaller near the lamp because the lamp uses some of it up.\" Student B says: \"The current is the same everywhere.\" Who is right, and why? (3 steps)", "answer": "- Step 1: Student B is right. The current is the *same* everywhere in a series loop.\n- Step 2: The lamp does not \"use up\" current — current is the rate of flow of *charge*, and charge is conserved. What the lamp uses up is *energy per coulomb* (the p.d. drops across it), not the charges themselves.\n- Step 3: Student A is confusing energy with charge. Each coulomb arrives at the lamp full of energy and leaves it depleted, but it still leaves — exactly as many coulombs per second exit the lamp as enter.\n\nThe Charlie analogy: same number of Charlies enter and leave; they just lose their potential energy inside.", "source": "Opus 4.7 ②", "_id": "opus_2_31"}, {"question": "In an electrolyte conducting electricity, both positive and negative ions move. Is the current the sum of both flows, or does one cancel the other? (3 steps)", "answer": "- Step 1: They **add**, not cancel. Why? Because they move in *opposite directions*: positive ions move toward the negative electrode, negative ions move toward the positive electrode.\n- Step 2: Recall conventional current direction is the direction positive charge moves. Positive ions moving \"with\" conventional current contribute positively; negative ions moving \"against\" conventional current *also* contribute positively (a negative charge moving backward = a positive contribution to forward current).\n- Step 3: So total current = current from positive ions + current from negative ions, both adding constructively. This is why electrolytes can carry substantial currents even though no electrons move freely through the solution.", "source": "Opus 4.7 ①", "_id": "opus_1_41"}, {"question": "Why does Ohm's Law-like reasoning *not* fix the current at the battery's terminals — i.e. why can a 9 V battery drive 0.1 A in one circuit and 3 A in another? (2 steps)", "answer": "- Step 1: The battery sets the *energy per coulomb* (e.m.f.), not the rate. How many coulombs per second actually flow depends on the resistance of the external circuit ($$I = V/R$$).\n- Step 2: Connect the same battery to a high-resistance circuit and few coulombs flow per second; connect it to a low-resistance circuit and many coulombs flow per second. The voltage stays roughly the same (9 V); the current adjusts.\n\nVoltage is a *push per coulomb*; current is the *response*, which depends on what is downstream.", "source": "Opus 4.7 ②", "_id": "opus_2_33"}, {"question": "Individual electrons in a wire drift at roughly millimetres per second — far slower than a snail. Yet when you flip a light switch, the lamp lights up almost instantly. Explain this apparent contradiction. (3 steps)", "answer": "- Step 1: The slow drift velocity refers to the *individual* electron's net movement along the wire. Each electron barely inches forward.\n- Step 2: However, when the battery is connected, the **electric field** propagates through the wire at close to the speed of light. This field reaches all the free electrons in the circuit almost simultaneously, giving them all a push at once.\n- Step 3: The **marble-tube analogy**: imagine a tube packed tightly with marbles. Push one marble in at one end, and a marble immediately pops out the other end. Each marble moved only a tiny distance, but the *effect* (a marble emerging) propagated almost instantly. Similarly, the current effect is fast even though individual charge carriers are slow.\n\nThe signal (electric field) travels fast; the messengers (electrons) travel slow.", "source": "GLM 5.1 ②", "_id": "glm_2_13"}, {"question": "A student thinks Kirchhoff's First Law only applies in parallel circuits. Why is this misconception wrong? (2 steps)", "answer": "- Step 1: Kirchhoff's First Law applies at **every junction in every circuit** — series, parallel, or any combination. It is not a rule about circuit topology; it is a statement of **conservation of charge**, which is a universal law of physics.\n- Step 2: In a series circuit, there simply happen to be *no junctions*, so KCL reduces to \"current in = current out\" for each component — which is trivially the same current everywhere. In a parallel circuit, junctions exist, and KCL tells you how current splits. But the law itself applies universally — it's always charge conservation.\n\nKCL = charge conservation = always true, not just when you see a junction.", "source": "GLM 5.1 ①", "_id": "glm_1_29"}, {"question": "A battery has an e.m.f. of 9 V, but the terminal p.d. measured across it while delivering current is only 8.5 V. Why are they different? Under what idealised condition would they be equal? (2 steps)", "answer": "- Step 1: Real batteries have **internal resistance**. When current flows, some of the e.m.f. is \"used up\" overcoming this internal resistance (energy dissipated as heat inside the battery itself), leaving less p.d. available at the terminals for the external circuit.\n- Step 2: If the battery had **zero internal resistance**, the terminal p.d. would equal the e.m.f. exactly. All the energy per coulomb provided by the chemical reaction would be delivered to the external circuit with none wasted internally.\n\nThe \"missing\" 0.5 V is the p.d. dropped across the battery's own internal resistance — this topic is covered in more detail later in the course.", "source": "GLM 5.1 ②", "_id": "glm_2_23"}, {"question": "Derive $$P = VI$$ from first principles using only the definitions of potential difference, current, and power. (4 steps)", "answer": "- Step 1: Start with the definition of power: $$P = \\frac{W}{t}$$, where $$W$$ is energy (work done) and $$t$$ is time.\n- Step 2: From the definition of p.d.: $$V = \\frac{W}{Q}$$, rearrange to get $$W = VQ$$. This says the total energy transferred equals the p.d. times the total charge.\n- Step 3: From the definition of current: $$I = \\frac{Q}{t}$$, rearrange to get $$Q = It$$. This says the total charge equals current times time.\n- Step 4: Substitute Step 2 and Step 3 into Step 1: $$P = \\frac{W}{t} = \\frac{VQ}{t} = \\frac{V \\times It}{t} = VI$$.\n\nThis derivation shows that $$P = VI$$ is not a new law — it's a consequence of the three fundamental definitions combined.", "source": "GLM 5.1 ①", "_id": "glm_1_24"}, {"question": "Synthesis question: A battery of e.m.f. 12 V has internal resistance, so the terminal p.d. is only 10 V when a current of 2 A flows. (a) How much energy does the battery give to each coulomb? (b) How much energy does each coulomb deliver to the external circuit? (c) Where does the \"missing\" energy go? (3 steps)", "answer": "- Step 1: (a) The e.m.f. is 12 V, meaning the battery gives **12 J** of electrical energy to each coulomb that passes through it.\n- Step 2: (b) The terminal p.d. is 10 V, meaning each coulomb delivers **10 J** to the external circuit components.\n- Step 3: (c) The \"missing\" 2 J per coulomb is dissipated as thermal energy *inside the battery* due to its internal resistance. The p.d. across the internal resistance is $$12 - 10 = 2 \\text{ V}$$. This is why e.m.f. ≠ terminal p.d. in real batteries — some energy is lost internally.\n\nE.m.f. = energy supplied per coulomb; terminal p.d. = energy delivered externally per coulomb; the difference = energy lost internally per coulomb.", "source": "GLM 5.1 ①", "_id": "glm_1_46"}, {"question": "A common slip is to say a battery \"produces electrons\" or \"supplies charge\". What is the correct view of what a battery does? (3 steps)", "answer": "- Step 1: A battery does not create charges — the wire and the components already contain plenty of free electrons.\n- Step 2: What the battery does is *supply energy* to those existing charges. Through chemical reactions, it converts chemical energy into electrical PE, giving each coulomb that passes through it $$\\varepsilon$$ joules.\n- Step 3: This creates a potential difference (an electric field through the wire) that drives the existing free electrons into directed drift — i.e. a current.\n\nSlogan: a battery is an *energy pump for charges*, not a *source of charges*.", "source": "Opus 4.7 ②", "_id": "opus_2_26"}, {"question": "Why does a coulomb represent a \"large\" amount of charge in everyday electronics, and roughly how many electrons does 1 C contain? (2 steps)", "answer": "- Step 1: One electron carries only $$1.60 \\times 10^{-19}\\,\\text{C}$$ — an extraordinarily tiny amount. To accumulate 1 C you need $$1/e \\approx 6.25 \\times 10^{18}$$ electrons, a number larger than the atoms in many small objects.\n- Step 2: That's why currents in real circuits flow in mA or µA, and charges are quoted in mC, µC, or nC. A current of 1 A is already enormous on the electron-counting scale — about $$6 \\times 10^{18}$$ electrons crossing a point every second.", "source": "Opus 4.7 ①", "_id": "opus_1_3"}, {"question": "Why is the ampere chosen as a *base* SI unit rather than the coulomb? (Conceptual question — give the practical reason.)", "answer": "Historically, current is easier to measure directly than charge: it is defined via the force between parallel current-carrying wires, an effect you can set up and measure with mechanical apparatus. The coulomb is then *derived* from the ampere via $$1\\ \\text{C} = 1\\ \\text{A}\\cdot\\text{s}$$. So in the SI hierarchy: ampere (base) → coulomb (derived). For exams, just remember: 1 A is 1 C/s by definition, so 1 C is the charge passing in 1 second at 1 A.", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "Distinguish *conventional current* from *electron flow* — including direction, historical reason, and which one you use in exam answers by default. (3 steps)", "answer": "- Step 1: **Conventional current** flows from the **positive** terminal of the source, through the external circuit, to the **negative** terminal. **Electron flow** is the *opposite*: electrons drift from negative to positive (because they are repelled by the negative terminal and attracted to the positive).\n- Step 2: This mismatch is a historical accident. Benjamin Franklin defined current direction *before* the electron was discovered, picking positive→negative arbitrarily. When electrons were later identified as the actual carriers in metals, physicists kept the old convention rather than rewriting every formula.\n- Step 3: In exam answers, **always use conventional current** unless the question explicitly asks about electron flow. Arrows on circuit diagrams point from + to −.", "source": "Opus 4.7 ①", "_id": "opus_1_4"}, {"question": "Why does charge conservation imply that the current is constant throughout an entire series loop, even if the resistors have very different values? (3 steps)", "answer": "- Step 1: Different resistors offer different *opposition* to current — they affect how much current flows for a given p.d. But once a current is established in a series loop, every component sees the same current.\n- Step 2: Why? Because at every cross-section of the loop, charge must be conserved. If 0.1 C/s flow into a 10 Ω resistor, 0.1 C/s must flow out — the resistor doesn't store electrons or convert them into anything else. The next resistor receives the same 0.1 C/s.\n- Step 3: A bigger resistor doesn't \"slow the current down\" within the loop — it forces the *whole loop* to settle at a lower current. The resistors collectively determine the loop's single current value, but once set, that value is uniform around the loop.", "source": "Opus 4.7 ①", "_id": "opus_1_26"}, {"question": "Why does the \"Charlie the Coulomb\" hill analogy give you genuine physical intuition about voltage? (3 steps)", "answer": "- Step 1: Picture a circuit as a hill. The battery is at the top: it pushes each coulomb of charge (\"Charlie\") to the high-energy state, giving it energy (analogous to gravitational PE).\n- Step 2: Charlie then travels around the circuit and reaches a component (lamp/resistor). There he \"rolls downhill\", giving up his energy as heat/light.\n- Step 3: The potential difference *across* the component is the energy each Charlie loses there — i.e. **energy per coulomb delivered to the component**. This is exactly $$V = W/Q$$.\n\nCrucially: the *number* of Charlies coming out equals the number going in (charge is conserved); only their energy changes.", "source": "Opus 4.7 ②", "_id": "opus_2_9"}, {"question": "A conductor carries 40 mA and transfers 8.6 J of energy. Is the p.d. across it closer to 1 V, 12 V, or 120 V? Explain your reasoning without detailed calculation. (3 steps)", "answer": "- Step 1: We need $$V = W/Q$$. We know $$W = 8.6$$ J. We need $$Q$$ first: if the current is 40 mA = 0.04 A, and we need a time… but the question asks for a rough estimate, so let's think about what charge corresponds to 8.6 J at various voltages.\n- Step 2: At 1 V, you'd need 8.6 C of charge. At 12 V, you'd need $$8.6/12 \\approx 0.72$$ C. At 120 V, you'd need only 0.072 C. A current of 40 mA (0.04 A) would need about 18 s to move 0.72 C — a reasonable time for a circuit problem.\n- Step 3: So the p.d. is closest to **12 V**. The exact calculation gives $$V = 8.6/0.72 \\approx 12$$ V (assuming 3 minutes of operation for the charge). The order of magnitude makes sense: a few joules from less than a coulomb requires roughly 10 V.\n\nThis type of estimation helps catch errors — if you calculated 0.12 V or 1200 V, you'd know something was wrong.", "source": "GLM 5.1 ②", "_id": "glm_2_43"}, {"question": "Why is charge said to be *quantised*, and what does $$Q = Ne$$ tell us about the smallest possible non-zero amount of charge?", "answer": "Charge is quantised because it only appears in nature as integer multiples of the elementary charge $$e = 1.60 \\times 10^{-19}\\,\\text{C}$$. You cannot have half an electron's worth of charge — every observable charge $$Q$$ must equal $$N \\cdot e$$ for some integer $$N$$. This is a deep property of matter: protons carry $$+e$$, electrons carry $$-e$$, and nothing carries less. So $$e$$ itself is the indivisible \"quantum\" of charge, and $$N$$ in $$Q = Ne$$ just counts the carriers. When you compute $$N$$ from $$Q/e$$, you ignore the sign of $$e$$ — the sign only encodes direction; the number of particles is always a positive integer.", "source": "Opus 4.7 ①", "_id": "opus_1_1"}, {"question": "What's the difference between watts and joules, and why is it easy to confuse them? (2 steps)", "answer": "- Step 1: A joule (J) is a quantity of energy; a watt (W) is a *rate* of energy transfer: $$1\\ \\text{W} = 1\\ \\text{J/s}$$. So saying \"this lamp uses 60 W in 10 s\" means it transferred $$60 \\times 10 = 600$$ J in that time.\n- Step 2: The confusion arises because both are \"electrical\" units that appear together. The trick: if you're asked about *energy*, the answer must end in J (or kJ). If asked about *power*, the answer ends in W. To get energy from power, multiply by time: $$W = Pt$$.\n\nWatt = joule per second — write it down whenever in doubt.", "source": "Opus 4.7 ②", "_id": "opus_2_34"}, {"question": "A student says \"Charge is quantised, so you can't have 0.72 coulombs — charge has to come in whole numbers.\" Is this correct? Why or why not? (2 steps)", "answer": "- Step 1: The student is **wrong**. Charge quantisation constrains individual **particles** (each carries exactly $$e$$), not the macroscopic **unit** of coulombs. A coulomb is a unit of measurement, not a single object.\n- Step 2: $$0.72 \\text{ C}$$ simply means $$0.72 / (1.60 \\times 10^{-19}) \\approx 4.5 \\times 10^{18}$$ electrons' worth of charge. The number of electrons is always an integer, but the total charge measured in coulombs can be any real number. Think of it like mass: individual atoms have discrete masses, but you can still weigh 0.72 kg of material.", "source": "GLM 5.1 ③", "_id": "glm_3_3"}, {"question": "A student says \"Kirchhoff's First Law only applies in parallel circuits because that's where junctions are.\" Is this correct? Why or why not? (2 steps)", "answer": "- Step 1: The student is **partially right** that junctions only appear in parallel circuits (a series circuit has no junctions). But they are **wrong** about KCL being limited to parallel circuits.\n- Step 2: KCL applies at **every junction in every circuit** because it is simply **conservation of charge** — a universal law. It doesn't matter what circuit configuration the junction is part of. Furthermore, even in a series circuit (no junctions), charge conservation still holds: the current is the same at every point precisely because charge cannot accumulate anywhere. KCL is the formal statement of this principle at junctions.", "source": "GLM 5.1 ③", "_id": "glm_3_35"}, {"question": "A battery has e.m.f. 9 V and delivers 0.5 A. Conceptually, how do two different formulas ($$P = VI$$ and $$P = W/t$$) give the same answer for power? (3 steps)", "answer": "- Step 1: $$P = VI$$ uses (energy per coulomb) × (coulombs per second) = energy per second.\n- Step 2: $$P = W/t$$ uses (total energy) ÷ (total time) = energy per second.\n- Step 3: These are *the same thing*: the second is just the first scaled by total charge: $$P = W/t = (VQ)/(Q/I) = VI$$. They're algebraically equivalent. The choice is about which numbers the question gives you.\n\nAlways check both routes give the same answer — it's a free sanity check.", "source": "Opus 4.7 ②", "_id": "opus_2_40"}, {"question": "What's the difference between *charge* and *energy*, and how does *voltage* tie them together? (3 steps)", "answer": "- Step 1: **Charge** is a property of matter — it's what makes carriers feel electrical forces. It's the \"vehicle\". Measured in coulombs.\n- Step 2: **Energy** is what those vehicles carry. It can be converted into heat, light, motion. Measured in joules.\n- Step 3: **Voltage** is the ratio: energy per unit charge, $$V = E/Q$$. So 12 V means \"each coulomb of charge carries 12 joules of energy\". Voltage is a kind of \"loading factor\" — how heavily packed with energy each carrier is.\n\nIn taxi terms: charge = taxis, energy = passengers, voltage = passengers per taxi.", "source": "Opus 4.7 ①", "_id": "opus_1_27"}, {"question": "A student asks: \"If 1 C contains $$6.25 \\times 10^{18}$$ electrons, can I have 0.5 C of charge?\" Explain why fractional coulombs are perfectly valid. (2 steps)", "answer": "- Step 1: Yes, 0.5 C is perfectly valid — it simply means $$0.5 / (1.60 \\times 10^{-19}) \\approx 3.125 \\times 10^{18}$$ electrons' worth of charge. This is still an enormous number of electrons, and it's an integer count.\n- Step 2: The coulomb is a *unit*, not an object. Just as you can have 0.5 kg of rice (you don't need exactly 1 kg), you can have 0.5 C of charge. The confusion arises from thinking \"1 coulomb = 1 object,\" but a coulomb is a *quantity of charge* — like a litre is a quantity of water, not a single water molecule.\n\nThe coulomb is a macroscopic unit; fractional coulombs just mean fewer (but still vast) numbers of electrons.", "source": "GLM 5.1 ①", "_id": "glm_1_47"}, {"question": "You need to find the energy transferred by a component. You know the voltage across it and the current through it, but NOT the time. Can you still find the power? Can you find the total energy? (2 steps)", "answer": "- Step 1: Yes, you can find the **power** using $$P = VI$$. Power is the *rate* of energy transfer and doesn't require time — it's an instantaneous quantity.\n- Step 2: No, you cannot find the total **energy** without knowing the time. Energy = Power × Time ($$W = Pt$$). Without knowing *how long* the component has been running, you can only say how fast energy is being transferred (power), not how much has been transferred in total (energy).\n\nPower is a rate (J/s); energy is a total (J). You need time to convert between them.", "source": "GLM 5.1 ①", "_id": "glm_1_44"}, {"question": "A total charge of $$Q$$ passes through a region. Write the formula linking $$Q$$ to the number of charge carriers $$N$$ and the elementary charge $$e$$, and explain what each symbol represents. (2 steps)", "answer": "- Step 1: The formula is $$Q = Ne$$, where $$Q$$ is the total charge in coulombs (C), $$N$$ is the integer number of charge carriers (e.g. electrons), and $$e = 1.60 \\times 10^{-19}$$ C is the magnitude of the charge on one electron (or one proton).\n- Step 2: To find the number of electrons from a known total charge, rearrange: $$N = \\frac{Q}{e}$$. When counting particles, use the **magnitude** of $$e$$ only — the negative sign of the electron's charge encodes direction/sign, not a countable quantity.\n\nA common mistake (observed in lesson) is using the wrong exponent for $$e$$ — it is $$1.60 \\times 10^{-19}$$ C, not $$10^{-13}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_2"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "What does it mean that electric charge is \"quantised\"? Why can't charge come in arbitrary amounts? (3 steps)", "answer": "- Step 1: Quantisation means charge always exists in integer multiples of a smallest unit — the elementary charge $$e = 1.60 \\times 10^{-19} \\text{ C}$$. You can have $$1e$$, $$2e$$, $$3e$$, but never $$1.5e$$ or $$0.3e$$ of net charge on an object.\n- Step 2: This is because charge is carried by fundamental particles — protons carry $$+e$$ and electrons carry $$-e$$. You can only add or remove whole electrons/protons, so the total charge changes in steps of $$e$$.\n- Step 3: The practical formula is $$Q = Ne$$, where $$N$$ is an integer (number of excess or deficit electrons). This is why, when a question asks \"how many electrons pass,\" you divide total charge $$Q$$ by $$e$$ — you're counting discrete particles.\n\nThink of charge like stairs (discrete steps), not a ramp (continuous slope).", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "One coulomb contains approximately how many electrons, and what does this tell you about the size of the coulomb as a unit? (2 steps)", "answer": "- Step 1: Since each electron carries $$e = 1.60 \\times 10^{-19} \\text{ C}$$, the number of electrons in 1 C is $$N = \\frac{1}{1.60 \\times 10^{-19}} \\approx 6.25 \\times 10^{18}$$ electrons.\n- Step 2: This enormous number tells us that 1 coulomb is a *relatively large* amount of charge. In everyday circuits, charges are often measured in millicoulombs ($$\\text{mC} = 10^{-3} \\text{ C}$$) or microcoulombs ($$\\mu\\text{C} = 10^{-6} \\text{ C}$$).\n\nA single electron's charge is absurdly tiny — it takes over 6 billion billion of them to make one coulomb.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "A student says \"charge is an object that has some electric charge on it.\" Why is this definition unacceptable, and how should charge be properly described? (2 steps)", "answer": "- Step 1: The student's definition is circular — it uses the word \"charge\" to define \"charge.\" A valid definition must not contain the term being defined. (This was an actual error observed in a lesson.)\n- Step 2: Charge is a *fundamental property* of matter (like mass). Protons have positive charge ($$+e$$), electrons have negative charge ($$-e$$), and neutrons have zero charge. Like charges repel; unlike charges attract. Charge is measured in coulombs (C) and is always quantised in integer multiples of $$e$$.\n\nCharge is not an object — it's a property that objects *possess*.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "Define electric current using the exact phrasing that mark schemes expect. Why is \"flow of charge\" insufficient? (2 steps)", "answer": "- Step 1: The mark-scheme-accepted definition is: **\"rate of flow of charge\"** (past a point). The key word is *rate* — it specifies that current is charge per unit time, not just charge moving.\n- Step 2: \"Flow of charge\" is insufficient because it describes *what happens* without specifying the *time element*. A river and a trickle both involve \"flow of water,\" but they differ in *rate*. Similarly, a large current and a small current both involve flow of charge — the difference is how much charge passes per second.\n\nThe formula encodes this: $$I = \\frac{\\Delta Q}{\\Delta t}$$, where the division by $$\\Delta t$$ is what makes it a *rate*.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "A student writes $$I = Q \\times t$$ instead of $$I = Q / t$$. Using dimensional analysis (units), show why the student's version must be wrong. (2 steps)", "answer": "- Step 1: Current is measured in amperes (A). Charge is in coulombs (C). Time is in seconds (s). The correct relationship must give amperes when you combine coulombs and seconds.\n- Step 2: Check both versions:\n  + Correct: $$I = Q/t$$ → units are $$\\text{C} / \\text{s} = \\text{A}$$ ✓ (This is how the ampere is defined: 1 A = 1 C/s)\n  + Wrong: $$I = Q \\times t$$ → units are $$\\text{C} \\cdot \\text{s}$$, which is not amperes ✗\n\nAlways verify with units: if the units don't work out, the formula is wrong.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "Convert 40 mA and 1.0 µA into amperes. A student once confused µ with m — by what factor would their answer be wrong? (3 steps)", "answer": "- Step 1: milli (m) = $$10^{-3}$$, so $$40 \\text{ mA} = 40 \\times 10^{-3} \\text{ A} = 0.040 \\text{ A}$$.\n- Step 2: micro (µ) = $$10^{-6}$$, so $$1.0 \\text{ µA} = 1.0 \\times 10^{-6} \\text{ A}$$. This is *not* $$10^{-3}$$ — that would be milli.\n- Step 3: If a student mistakenly uses $$10^{-3}$$ instead of $$10^{-6}$$ for µA, their answer is too large by a factor of $$\\frac{10^{-3}}{10^{-6}} = 1000$$. This is a factor-of-1000 error — every mark lost on this is entirely avoidable.\n\nMemory aid: **m**illi = **m**iddle ($$10^{-3}$$); **µ**icro = **µ**uch smaller ($$10^{-6}$$). Always write out the power of ten explicitly before substituting.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "A current of 0.5 A flows for 10 s. Without doing heavy arithmetic, estimate whether the charge passing is closer to 0.5 C, 5 C, or 50 C. Explain your reasoning. (2 steps)", "answer": "- Step 1: Use $$Q = I \\times t$$. The current is 0.5 A (half an ampere) and the time is 10 s. Half of 10 is 5.\n- Step 2: $$Q = 0.5 \\times 10 = 5 \\text{ C}$$. The answer is 5 C. The key insight: 1 A for 1 s gives 1 C, so 0.5 A for 10 s gives 5 C — a modest number, confirming that the coulomb is a reasonably sized unit for everyday currents.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "What are the charge carriers in (a) a metal wire, (b) an electrolyte solution, and (c) an ionised gas? Why can't protons carry current in a solid metal? (3 steps)", "answer": "- Step 1: The charge carriers are:\n  + (a) Metal wire: **free (delocalised) electrons** — detached from metal atoms, forming a \"sea\" of mobile charge.\n  + (b) Electrolyte solution: **positive and negative ions** — dissolved salts dissociate into charged ions that can move through the liquid.\n  + (c) Ionised gas: **electrons and positive ions** — intense electric fields strip electrons from gas atoms, creating both types of carrier.\n- Step 2: In a solid metal, protons are locked inside atomic nuclei, which are fixed in the lattice. They cannot move because the strong nuclear force and electromagnetic binding keep nuclei in place.\n- Step 3: Only the outermost electrons in metals break free and drift through the lattice. These free electrons are already present even when no current flows — they just move randomly with zero net flow until a potential difference gives them a directed push.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": true}, {"question": "A metal wire has free electrons in it even when no battery is connected. Yet you don't feel any shock when you touch it. Why not? (2 steps)", "answer": "- Step 1: Without a battery (or any potential difference), the free electrons move *randomly in all directions* at high speed. Their motions cancel out — for every electron moving left, there's roughly one moving right. The *net* flow of charge is zero, so the net current is zero.\n- Step 2: A current requires a *net directed flow* of charge. A potential difference from a battery creates an electric field that gives the electrons a net push in one direction, producing a measurable current. Without that directed push, the random thermal motion produces no net effect.\n\nThink of a crowd milling about randomly in a square (no net movement) vs. a crowd all walking toward an exit (net flow = current).", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": true}, {"question": "Individual electrons in a wire drift at roughly 1 mm/s — slower than a snail. Yet when you flip a light switch, the lamp lights up almost instantly. Resolve this apparent paradox. (3 steps)", "answer": "- Step 1: The *individual electrons* drift very slowly. But the wire is already packed full of free electrons, like a tube packed with marbles.\n- Step 2: **Marble-tube analogy:** When you push one marble in at one end of a full tube, a marble at the far end comes out almost instantly. Each marble moved only a tiny distance, but the *effect* propagated almost instantly through the chain of collisions.\n- Step 3: Similarly, when a battery is connected, the electric field propagates through the wire at close to the speed of light ($$\\sim 3 \\times 10^8$$ m/s). This field gives *all* the free electrons throughout the circuit a push almost simultaneously. The current effect is fast even though individual charge carriers are slow.\n\nThe signal travels at the speed of the electric field, not the speed of the electrons.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": true}, {"question": "State the direction of conventional current and the direction of electron flow in a metal wire connected to a cell. Why do they point in opposite directions? (3 steps)", "answer": "- Step 1: **Conventional current** flows from the **positive terminal** of the cell, through the external circuit, to the **negative terminal**.\n- Step 2: **Electron flow** goes from the **negative terminal**, through the external circuit, to the **positive terminal** — the opposite direction.\n- Step 3: This is a historical accident. Before electrons were discovered (by J.J. Thomson in 1897), Benjamin Franklin arbitrarily defined current as flowing from positive to negative. Later, it was found that the actual moving particles in metals are negatively charged electrons, which move toward positive. The convention was already entrenched, so both coexist. Unless a question specifically asks about electron flow, always use conventional current direction.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "Define potential difference using the exact phrasing that mark schemes expect. What is the unit, and how is it defined? (2 steps)", "answer": "- Step 1: Potential difference is **\"work done per unit charge\"** (or equivalently, \"energy transferred per unit charge\") between two points. The formula is $$V = \\frac{W}{Q}$$, where $$W$$ is work done (or energy transferred) in joules and $$Q$$ is charge in coulombs.\n- Step 2: The unit is the volt (V), defined as: **1 V = 1 J/C**. One volt means that one joule of energy is transferred for each coulomb of charge passing between the two points.\n\nMark-scheme shorthand \"energy per coulomb\" is also acceptable, but the full definition is preferred.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "Using the \"Charlie the Coulomb\" hill analogy, explain what potential difference represents physically. Where does Charlie gain energy, and where does Charlie lose it? (3 steps)", "answer": "- Step 1: Imagine a circuit as a hill. The **battery** is at the top of the hill — it gives energy (like gravitational PE) to each coulomb of charge (\"Charlie\"). This is the e.m.f.: energy *converted into* electrical energy per coulomb.\n- Step 2: The **resistor/lamp** is at the bottom of the hill. As Charlie passes through it, he gives up his energy as light and heat. This is the potential difference across the component: energy *converted from* electrical energy per coulomb.\n- Step 3: Potential difference = the height difference Charlie drops = energy given up per coulomb. The same number of Charlies emerge from the resistor as entered it — charge is conserved; only energy is transferred.\n\nThe hill height is the \"voltage\" — it tells you how much energy each coulomb carries or delivers.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "A 12 V battery drives 90 C of charge through a circuit. Is the energy transferred closer to 100 J, 1000 J, or 10,000 J? Show the reasoning. (2 steps)", "answer": "- Step 1: Use $$W = VQ$$. The voltage is 12 V (meaning 12 J per coulomb) and the charge is 90 C.\n- Step 2: $$W = 12 \\times 90 = 1080 \\text{ J}$$. This is closest to 1000 J. The intuition: if each coulomb carries 12 J, and roughly 100 coulombs pass, you'd expect roughly 1200 J — the estimate of ~1000 J is in the right ballpark.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "Both e.m.f. and potential difference are measured in volts and both use the formula $$\\varepsilon = W/Q$$ or $$V = W/Q$$. What is the *conceptual* distinction between them? (3 steps)", "answer": "- Step 1: **E.m.f.** ($$\\varepsilon$$) is the energy *converted into* electrical energy per unit charge by a source (battery, generator). It describes energy being *given to* the charges — chemical or mechanical energy becoming electrical energy.\n- Step 2: **Potential difference** ($$V$$) is the energy *converted from* electrical energy per unit charge across a component (resistor, lamp). It describes energy being *taken from* the charges — electrical energy becoming thermal, light, or other forms.\n- Step 3: In plain English: e.m.f. = how much energy the source *gives* each coulomb; p.d. = how much energy each coulomb *delivers* to a component. If the battery had no internal resistance, e.m.f. would equal the terminal p.d. — but in practice, some energy is lost inside the battery itself.\n\nSame units, same formula structure, opposite *direction* of energy conversion.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "Why is \"electromotive force\" a misleading name? What is e.m.f. actually measuring? (2 steps)", "answer": "- Step 1: Despite the word \"force\" in its name, e.m.f. is **not a force** at all. It is an energy transfer per unit charge — measured in volts (J/C), not in newtons (N).\n- Step 2: E.m.f. actually measures how much energy a source *converts into electrical form* per coulomb of charge that passes through it. The name is a historical relic from before the nature of electrical energy was fully understood. Think of it as \"energy per charge supplied by the source,\" not as any kind of push or force.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "State Kirchhoff's First Law. What fundamental conservation law underpins it, and why? (3 steps)", "answer": "- Step 1: Kirchhoff's First Law states: **the algebraic sum of currents at any junction is zero**, or equivalently, **the sum of currents entering a junction equals the sum of currents leaving**. Mathematically: $$\\sum I_{\\text{in}} = \\sum I_{\\text{out}}$$.\n- Step 2: This is a direct consequence of **conservation of charge** — charge can neither be created nor destroyed. In an isolated system, total charge remains constant.\n- Step 3: At a junction, charge cannot accumulate (there's no \"storage\" at a point in a wire). Therefore, the rate at which charge arrives (current in) must equal the rate at which charge departs (current out). If more charge arrived than left, charge would pile up — this doesn't happen in steady-state circuits.\n\nKCL is not a special circuit rule — it is charge conservation applied to a junction.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "In a series circuit, the current is the same at every point. A student thinks this is a special rule for series circuits. Why is it actually just Kirchhoff's First Law? (2 steps)", "answer": "- Step 1: In a series circuit, there are no junctions — every point is on a single loop. With no junction to split the current, Kirchhoff's First Law demands that whatever current flows into any component must flow out of it.\n- Step 2: If the current were different at two points in a series circuit, charge would have to accumulate somewhere (in a resistor, for example). But charge does not accumulate in any component — a resistor *converts energy*, it does not *store electrons*. Therefore, the current must be identical at every point.\n\nSame current everywhere in series = KCL with zero junctions = charge conservation.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "A student wonders whether electrons accumulate inside a resistor, since the resistor \"uses up\" electricity. Explain why this reasoning is wrong. (3 steps)", "answer": "- Step 1: A resistor does **not** store or accumulate electrons. The same number of electrons enter the resistor as leave it per second — the current in equals the current out.\n- Step 2: What the resistor *does* \"use up\" is **energy**, not charge. As electrons pass through, they transfer electrical energy to the lattice (thermal energy / heat). The electrons emerge with less energy per coulomb (lower potential), but the *number* of electrons is unchanged.\n- Step 3: Going back to the hill analogy: Charlie the Coulomb loses *height* (energy) going down the hill, but Charlie still exists at the bottom. The same number of Charlies arrive at the bottom as started at the top — they just carry less energy.\n\nResistors convert energy, not store charge. This is charge conservation in action.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": true}, {"question": "At a junction, currents of 2 A and 3 A enter. What current leaves? If another wire were added carrying 1 A *out*, what would the total current leaving through the original exit wire become? (2 steps)", "answer": "- Step 1: By Kirchhoff's First Law: $$\\sum I_{\\text{in}} = \\sum I_{\\text{out}}$$. With 2 A + 3 A = 5 A entering, the current leaving must be 5 A.\n- Step 2: If a new branch carries 1 A *out*, then the original exit wire now carries only $$5 - 1 = 4$$ A. The total current out (1 A + 4 A = 5 A) still equals the total current in (5 A). KCL is satisfied regardless of how many branches exist.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "Why must an ammeter be connected in series with the component whose current it measures? What property must the ammeter have to avoid disturbing the circuit? (2 steps)", "answer": "- Step 1: An ammeter measures the current *flowing through* a component. To do this, the same current that flows through the component must also flow through the ammeter — this requires a **series** connection. If it were in parallel, most current would bypass the ammeter through the component.\n- Step 2: The ammeter must have **very low resistance** so that it draws essentially the same current as would flow without it. If the ammeter had significant resistance, it would reduce the circuit current and give a falsely low reading.\n\nAmmeter: series
