p 3: Student A is confusing energy with charge. Each coulomb arrives at the lamp full of energy and leaves it depleted, but it still leaves — exactly as many coulombs per second exit the lamp as enter.\n\nThe Charlie analogy: same number of Charlies enter and leave; they just lose their potential energy inside.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": true}, {"question": "A 12 V battery drives a circuit. What is the physical meaning of \"12 V\" in everyday energy terms?", "answer": "\"12 V\" means each coulomb of charge that travels through the battery from one terminal to the other gains 12 J of electrical energy. Equivalently, if all that energy is dissipated in a single external resistor, each coulomb delivers 12 J to the resistor. Volts are *energy per coulomb*. The battery's voltage does not tell you how many coulombs flow (that depends on the resistance and time) — only how much energy each coulomb is allotted.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "Why does Ohm's Law-like reasoning *not* fix the current at the battery's terminals — i.e. why can a 9 V battery drive 0.1 A in one circuit and 3 A in another? (2 steps)", "answer": "- Step 1: The battery sets the *energy per coulomb* (e.m.f.), not the rate. How many coulombs per second actually flow depends on the resistance of the external circuit ($$I = V/R$$).\n- Step 2: Connect the same battery to a high-resistance circuit and few coulombs flow per second; connect it to a low-resistance circuit and many coulombs flow per second. The voltage stays roughly the same (9 V); the current adjusts.\n\nVoltage is a *push per coulomb*; current is the *response*, which depends on what is downstream.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": true}, {"question": "What's the difference between watts and joules, and why is it easy to confuse them? (2 steps)", "answer": "- Step 1: A joule (J) is a quantity of energy; a watt (W) is a *rate* of energy transfer: $$1\\ \\text{W} = 1\\ \\text{J/s}$$. So saying \"this lamp uses 60 W in 10 s\" means it transferred $$60 \\times 10 = 600$$ J in that time.\n- Step 2: The confusion arises because both are \"electrical\" units that appear together. The trick: if you're asked about *energy*, the answer must end in J (or kJ). If asked about *power*, the answer ends in W. To get energy from power, multiply by time: $$W = Pt$$.\n\nWatt = joule per second — write it down whenever in doubt.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": true}, {"question": "In what sense is current \"the same on both sides\" of a resistor, but voltage \"different on both sides\"? (3 steps)", "answer": "- Step 1: Current = rate of charge flow. Charges are conserved through the resistor (none stored), so current in = current out. Same current both sides.\n- Step 2: Voltage = energy per coulomb. As each coulomb crosses the resistor, it gives up some of its energy as heat. So the energy per coulomb is *lower* on the exit side than the entry side.\n- Step 3: The \"p.d. across the resistor\" measures exactly this drop in energy per coulomb. Hence p.d. ≠ 0 even though current is unchanged.\n\nCharlie analogy: same number of Charlies enter and exit, but each exits poorer.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "Why is the ampere chosen as a *base* SI unit rather than the coulomb? (Conceptual question — give the practical reason.)", "answer": "Historically, current is easier to measure directly than charge: it is defined via the force between parallel current-carrying wires, an effect you can set up and measure with mechanical apparatus. The coulomb is then *derived* from the ampere via $$1\\ \\text{C} = 1\\ \\text{A}\\cdot\\text{s}$$. So in the SI hierarchy: ampere (base) → coulomb (derived). For exams, just remember: 1 A is 1 C/s by definition, so 1 C is the charge passing in 1 second at 1 A.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "A circuit splits into two branches carrying 1.5 A and 0.5 A. Without any further info, what was the current in the wire feeding the junction, and which conservation principle did you use?", "answer": "The feeding wire must carry $$1.5 + 0.5 = 2.0\\ \\text{A}$$. The principle is **conservation of charge** (Kirchhoff's First Law): charge cannot accumulate at the junction, so the rate of arrival must equal the rate of departure. Note this works no matter what the resistances of the branches are — the law is purely about charge balance, not about how the current splits.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "Why does plugging an ammeter into the wrong place (e.g. in parallel across a battery) risk damage? (2 steps)", "answer": "- Step 1: An ammeter has very low resistance (so it doesn't disturb the current it's measuring). Placed in parallel across a battery, it effectively short-circuits the battery.\n- Step 2: A near-zero resistance across an e.m.f. source means by $$I = V/R$$ a huge current flows, likely burning out the meter fuse or melting wires.\n\nRule: ammeter always *in series*; voltmeter always *in parallel*.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "If a voltmeter had a low resistance (instead of very high), what would go wrong when you tried to measure the p.d. across a resistor? (3 steps)", "answer": "- Step 1: A voltmeter is placed in parallel with the component. If its resistance were low, current would divert through the voltmeter instead of through the component.\n- Step 2: This changes the current distribution in the circuit — the very thing you're trying to measure (the p.d. across the component) shifts because you've altered the circuit by attaching the meter.\n- Step 3: This effect is called \"loading the circuit\". High voltmeter resistance (e.g. 10 MΩ) keeps the diverted current negligibly small, so the measurement is faithful.\n\nPrinciple: instruments should disturb the system as little as possible.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": true}, {"question": "A battery has e.m.f. 9 V and delivers 0.5 A. Conceptually, how do two different formulas ($$P = VI$$ and $$P = W/t$$) give the same answer for power? (3 steps)", "answer": "- Step 1: $$P = VI$$ uses (energy per coulomb) × (coulombs per second) = energy per second.\n- Step 2: $$P = W/t$$ uses (total energy) ÷ (total time) = energy per second.\n- Step 3: These are *the same thing*: the second is just the first scaled by total charge: $$P = W/t = (VQ)/(Q/I) = VI$$. They're algebraically equivalent. The choice is about which numbers the question gives you.\n\nAlways check both routes give the same answer — it's a free sanity check.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": true}, {"question": "What's the conceptual problem with the statement: \"an insulator has no electrons, so no current can flow\"? (2 steps)", "answer": "- Step 1: All atoms contain electrons — insulators have just as many as conductors. The difference isn't *quantity* of electrons.\n- Step 2: The difference is whether electrons are *free* to move. In an insulator, electrons are tightly bound to their atoms (no free electrons), so even with a p.d. applied, almost no net charge can drift. In a metal conductor, many electrons are delocalised and free to drift.\n\nCorrect statement: insulators have very few *mobile* charge carriers.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": false}, {"question": "In an electrolyte (e.g. salt water in a battery), what are the charge carriers and how does the direction of \"current\" relate to ion motion? (3 steps)", "answer": "- Step 1: The carriers are both positive ions (e.g. Na⁺) and negative ions (e.g. Cl⁻), both free to drift through the solution.\n- Step 2: Under a p.d., positive ions drift towards the negative electrode and negative ions drift towards the positive electrode — opposite directions.\n- Step 3: Both contribute to the *same* conventional current direction: positive ions moving + → − give conventional current + → −; negative ions moving the opposite way also give conventional current + → − (because negative charges going one way is equivalent to positive charge going the other way). Sum: a larger net current than either species alone.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": false}, {"question": "Why does a 230 V, 800 W appliance use 48 000 J in 1 minute, and which formula gives this most directly? (2 steps)", "answer": "- Step 1: Use $$W = Pt$$ directly — power is energy *per second*, so 800 J/s × 60 s = 48 000 J. One multiplication, done.\n- Step 2: You could go the long way: find $$I = P/V \\approx 3.5\\ \\text{A}$$, then $$Q = It \\approx 210\\ \\text{C}$$, then $$W = VQ \\approx 48\\ 000\\ \\text{J}$$ — but this requires computing intermediate quantities the question doesn't ask for. Whenever you have P and t, use $$W = Pt$$.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": false}, {"question": "Why is \"voltage\" sometimes called \"potential difference\" — what does the word *difference* emphasise? (2 steps)", "answer": "- Step 1: Voltage is always measured *between two points*. You cannot meaningfully ask \"what is the voltage *at* a single point\" without an implicit reference (usually 0 V, \"ground\").\n- Step 2: The word \"difference\" makes this explicit: it's the difference in electrical PE per unit charge between point A and point B. If A and B are at the same potential, there's no voltage between them — no work is done moving charge between them.\n\nThis is why voltmeters always have *two* probes.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": false}, {"question": "Conceptually, what does it mean physically if the p.d. across a resistor is \"doubled\"? (3 steps)", "answer": "- Step 1: Doubling the p.d. means each coulomb now carries twice as much energy across the resistor — it dumps 2× the energy as heat.\n- Step 2: Since (for an ohmic resistor) $$V = IR$$, doubling V at fixed R also doubles the current — so twice as many coulombs per second flow.\n- Step 3: Power dissipated $$P = VI$$ then quadruples: 2× energy per coulomb × 2× coulombs per second = 4× total energy per second.\n\nThis is why electrical heating scales aggressively with voltage.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": false}, {"question": "Two ammeters at different points in a series circuit show different readings. What can you immediately conclude? (2 steps)", "answer": "- Step 1: One (or both) of the meters is faulty, miscalibrated, or wrongly connected.\n- Step 2: Physically the readings *must* be equal in a series circuit by conservation of charge. There is no real way for current to differ between two points in series — charge would have to be accumulating somewhere, which doesn't happen.\n\nSo unequal readings are an instrumentation issue, not a physics result.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": false}, {"question": "Why does a current of 1 A \"feel\" small compared to its huge per-second electron count?", "answer": "Because the *unit of charge* (the coulomb) is chosen to be enormous compared to one electron's charge. One ampere = one coulomb per second = $$6.25\\times 10^{18}$$ electrons per second. So everyday-sounding currents (amps, milliamps) correspond to astronomical numbers of electrons in motion — but the unit hides this scale. The numbers feel small because we've defined our units around macroscopic, lab-scale currents, not around the microscopic carriers.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": true}, {"question": "A learner writes: \"voltage flows through the circuit and current is used up by the resistor\". Identify both errors. (2 steps)", "answer": "- Step 1: Voltage does not *flow*. Voltage is a *difference* (in energy per coulomb) between two points; it's a property of a location-pair, not a thing that travels. What flows is *charge*; the voltage is the cause, not the moving stuff.\n- Step 2: Current is not *used up*. The resistor does not consume charges — same number in as out. What is used up is *energy* (the energy per coulomb drops across the resistor, transferred to heat). The current itself is conserved.\n\nCorrect phrasing: \"Voltage drives current; current carries energy; the resistor dissipates energy, not current.\"", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": true}, {"question": "Why does it make sense that 1 V = 1 J/C as a unit equation, in plain English?", "answer": "The volt was invented precisely to capture \"energy per coulomb\". One volt across two points means *one joule of energy is transferred for each coulomb of charge that moves between them*. The unit equation 1 V = 1 J/C is not an extra fact to memorise — it is literally the definition of the volt. If you remember \"voltage is energy per coulomb\", you've automatically remembered the unit.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": true}], "count": 50}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 30538, "out_tokens": 14314, "reasoning_chars": 3133, "cost_eur": 0.0756, "elapsed_s": 412, "content_chars": 49518}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 30538, "out_tokens": 14417, "reasoning_chars": 6567, "cost_eur": 0.0759, "elapsed_s": 417, "content_chars": 48166}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 30538, "out_tokens": 23067, "reasoning_chars": 53694, "cost_eur": 0.1038, "elapsed_s": 260, "content_chars": 35350}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 29773, "out_tokens": 5570, "reasoning_chars": 1268, "cos const SK='phys_elec_ch01';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}

  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}

  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})

function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
