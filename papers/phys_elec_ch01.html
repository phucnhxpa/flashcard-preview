its: since charge cannot accumulate at a junction, whatever flows in must flow out.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "What is the exact mark-scheme definition of electric current? Why is \"flow of electrons\" an unacceptable answer? (2 steps)", "answer": "- Step 1: The mark-scheme definition is: **\"the rate of flow of charge\"** (past a point). The key word is **\"rate\"** — it is charge per unit time, not just charge moving. The formula:\n$$I = \\frac{\\Delta Q}{\\Delta t}$$\n- Step 2: \"Flow of electrons\" loses marks for two reasons:\n+ It omits \"rate\" — current is charge *per second*, not just charge in motion\n+ It specifies electrons, but charge carriers can also be **ions** (in electrolytes and ionised gases), not just electrons\n\nThe definition must say \"rate of flow of charge\" to cover all charge carriers and include the time element.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "The ampere is the SI base unit of current, and the coulomb is the SI unit of charge. How is the coulomb defined in terms of the ampere, and why is the ampere the \"base\" unit? (2 steps)", "answer": "- Step 1: The coulomb is defined as: $$1 \\text{ C} = 1 \\text{ A} \\cdot \\text{s}$$. One coulomb is the charge that passes when a current of 1 ampere flows for 1 second. Equivalently, $$1 \\text{ A} = 1 \\text{ C/s}$$.\n- Step 2: The ampere is the SI base unit because it can be defined experimentally via the force between two parallel current-carrying wires — a measurable, reproducible standard. The coulomb is then **derived** from the ampere and the second. This is why in the formula $$I = Q/t$$, current is treated as the primary quantity and charge is derived from it.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "What particles carry electric current in (a) a metal wire, (b) an electrolyte solution, and (c) an ionised gas? Why can't current flow in an insulator? (3 steps)", "answer": "- Step 1: In a **metal wire**, the charge carriers are **free (delocalised) electrons** — electrons detached from their metal atoms that form a \"sea of electrons\" and can drift through the lattice.\n- Step 2: In an **electrolyte solution** (e.g., salt water, battery acid), the charge carriers are **positive and negative ions** — atoms or molecules that have gained or lost electrons and are free to move through the liquid.\n- Step 3: In an **ionised gas** (e.g., fluorescent tube, lightning), both **electrons and positive ions** carry current — the gas atoms have been stripped of electrons, creating free charge carriers of both signs.\n+ In an insulator, electrons are tightly bound to their atoms and cannot move freely — there are no mobile charge carriers, so no current can flow.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "A metal wire contains free electrons even when disconnected from any circuit. Why don't these free electrons create an electric current on their own? (2 steps)", "answer": "- Step 1: Without a potential difference (from a battery), free electrons move **randomly in all directions** at high speeds. Their random motions cancel out — for every electron moving left, roughly one moves right. The net drift velocity is zero.\n- Step 2: A potential difference is needed to give the electrons a **net push in one direction**, creating a non-zero average drift velocity and therefore a measurable current. Think of a crowd milling randomly in a room — no net flow — until someone opens a door, creating a net movement toward the exit. The electrons are always there; the battery provides the directional push.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "Individual electrons in a wire drift at roughly millimetres per second — slower than a snail. Yet when you flip a switch, the bulb lights up almost instantly. Use the marble-tube analogy to explain this. (2 steps)", "answer": "- Step 1: Imagine a tube packed tightly with marbles. Push one marble in at one end, and a marble at the other end pops out **almost immediately** — even though each individual marble only moved a tiny distance. The *effect* propagates much faster than the individual objects move.\n- Step 2: In a wire, when a battery is connected, the **electric field** propagates through the circuit at close to the speed of light. This field gives *all* the free electrons a push simultaneously — they all start drifting at once. The signal (electric field) is fast; the charge carriers (electrons) are slow. The current effect is nearly instantaneous even though individual electrons barely move.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "In a metallic conductor, what is the direction of conventional current versus electron flow? Why do they differ? (2 steps)", "answer": "- Step 1: **Conventional current** flows from the **positive terminal** of a cell, through the external circuit, to the **negative terminal**. **Electron flow** goes in the **opposite direction**: from the **negative terminal**, through the external circuit, to the **positive terminal**.\n- Step 2: This is a historical accident. Before electrons were discovered, Benjamin Franklin defined current as flowing from positive to negative. Later, the actual moving particles in metals were found to be electrons (negative), which flow the other way. The convention was already too deeply embedded to change. Both conventions coexist. Unless a question specifically asks about electron flow, always use **conventional current** (positive → negative).", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "What is the mark-scheme definition of potential difference? Give both the phrasing and the formula with units. (2 steps)", "answer": "- Step 1: Potential difference (p.d.) is defined as: **\"the work done (or energy transferred) per unit charge between two points.\"** Acceptable shorthand: \"energy per coulomb.\"\n- Step 2: The formula is:\n$$V = \\frac{W}{Q}$$\nwhere $$V$$ is in volts (V), $$W$$ is work done/energy transferred in joules (J), and $$Q$$ is charge in coulombs (C). The volt: $$1 \\text{ V} = 1 \\text{ J/C}$$ — one volt means one joule of energy is transferred per coulomb of charge passing between two points.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "In the \"Charlie the Coulomb\" hill analogy, what does the battery represent, what does the resistor represent, and what does potential difference correspond to? (3 steps)", "answer": "- Step 1: The **battery** is at the top of the hill. It gives energy (gravitational PE in the analogy, electrical PE in reality) to each \"Charlie\" (each coulomb of charge). This is the e.m.f. — the energy given per coulomb by the source.\n- Step 2: The **resistor or lamp** is at the bottom of the hill. As Charlie passes through it, he gives up his energy as light and heat. The p.d. across the component is the energy taken from each coulomb.\n- Step 3: **Potential difference** = the energy given to (or taken from) each coulomb. The height difference between top and bottom represents the p.d. — a bigger \"drop\" means more energy per coulomb is transferred. Crucially, the **same number of Charlies** emerge from the resistor as entered it — charge is conserved; only energy is transferred.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": true}, {"question": "A voltmeter must be connected in parallel with a component and must have very high resistance. Explain the reasoning for each requirement. (3 steps)", "answer": "- Step 1: **Parallel connection** — A voltmeter measures the potential difference *across* a component. To measure the p.d. between two points, it must be connected between those same two points, which means placing it in parallel.\n- Step 2: **Very high resistance** — A voltmeter needs some current to operate. If it had low resistance, it would draw significant current away from the component, changing the circuit conditions and giving an inaccurate reading.\n- Step 3: With **very high resistance** (typically $$\\sim 10 \\text{ M}\\Omega$$ for a digital voltmeter), the voltmeter draws **negligible current** from the circuit. The current through the component is essentially unchanged, so the p.d. reading reflects the true value. The rule: a voltmeter should disturb the circuit as little as possible.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "Both e.m.f. and potential difference are measured in volts and both use the formula $$W/Q$$. What is the fundamental conceptual distinction between them? (2 steps)", "answer": "- Step 1: **E.m.f. ($$\\varepsilon$$)** is the energy **converted into** electrical energy per unit charge **by a source** (battery, generator). It describes how much energy the source *gives* to each coulomb. Formula: $$\\varepsilon = \\frac{W}{Q}$$ where $$W$$ is energy supplied by the source.\n- Step 2: **Potential difference ($$V$$)** is the energy **converted from** electrical energy per unit charge **across a component** (resistor, lamp). It describes how much energy each coulomb *delivers* to the component. Formula: $$V = \\frac{W}{Q}$$ where $$W$$ is energy transferred to the component.\n+ In plain English: e.m.f. = energy *given* to each coulomb by the battery; p.d. = energy *taken from* each coulomb by a component. Same formula, opposite direction of energy flow.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "The term \"electromotive force\" suggests it is a force. Why is this name misleading, and what is e.m.f. actually? (2 steps)", "answer": "- Step 1: E.m.f. is **not a force at all** — it is a measure of **energy transfer per unit charge**. The name is a historical artifact from when the distinction between force and energy was less precise.\n- Step 2: E.m.f. is the **energy converted into electrical energy per unit charge** by a source, measured in volts ($$\\text{J/C}$$), not newtons. Think of it as the \"electrical energy push\" — it tells you how many joules each coulomb gains from the source, not how many newtons of force act on the charges.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": true}, {"question": "State Kirchhoff's First Law and explain the physical principle it derives from. Why is it NOT a special rule that only applies in certain circuit configurations? (2 steps)", "answer": "- Step 1: Kirchhoff's First Law (KCL): **The algebraic sum of currents at any junction equals zero.** Equivalently: the sum of currents entering a junction equals the sum of currents leaving:\n$$\\sum I_{\\text{in}} = \\sum I_{\\text{out}}$$\n- Step 2: This is a direct consequence of **conservation of charge** — charge cannot be created, destroyed, or accumulated at a junction. Whatever flows in must flow out. This is a **universal law**, not a circuit-specific rule. It applies at **every junction in every circuit** — in series circuits (no junctions → same current everywhere) and parallel circuits (current splits at junctions) alike.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": true}, {"question": "In a series circuit with no junctions, the current is the same at every point. Explain why using charge conservation, and address the misconception that a resistor \"absorbs\" some of the current. (2 steps)", "answer": "- Step 1: Charge conservation requires that any charge entering a component must leave it. If more charge entered a resistor than left it, charge would **accumulate** inside — but this does not happen. The rate of charge flow in equals the rate out at every point.\n- Step 2: A resistor does **not** store or absorb electrons. It **converts electrical energy to thermal energy** — it takes *energy* from the charge carriers, not the charge carriers themselves. The same number of electrons per second flow out as flow in. The current is unchanged; only the *energy carried by the charge* decreases. Say aloud: \"charge is conserved; the resistor converts energy.\"", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "An ammeter must be connected in series and must have very low resistance. Explain the reasoning for each requirement. (3 steps)", "answer": "- Step 1: **Series connection** — An ammeter measures the current *through* a component. To measure the current flowing through a component, the ammeter must carry the same current — so it must be in the same path, i.e., in series.\n- Step 2: **Very low resistance** — If an ammeter had significant resistance, it would add to the total circuit resistance, reducing the current and giving a reading lower than the true value.\n- Step 3: With **very low resistance** (ideally zero), the ammeter has **negligible effect on the circuit**. The current through the component is essentially the same whether the ammeter is present or not. This is the opposite of a voltmeter, which needs high resistance *because* it is in parallel and must draw negligible current.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "Both $$I = Q/t$$ and $$P = E/t$$ have the form \"something divided by time.\" What is the fundamental difference between what each measures? Use the taxi analogy. (3 steps)", "answer": "- Step 1: $$I = Q/t$$ measures the **rate of flow of charge** — how many charge carriers (taxis) pass per second. It tells you the *quantity of carriers*, not how much energy they carry.\n- Step 2: $$P = E/t$$ measures the **rate of energy transfer** — how much energy is delivered per second. It tells you the *total energy* transferred, regardless of how many carriers are involved.\n- Step 3: **Taxi analogy**: Charge carriers are taxis; energy is the passenger. Current = taxis per second. Power = total passengers delivered per second. Voltage (energy per charge) = passengers per taxi. Two circuits could have the same current (same taxis per second) but very different power if each taxi carries a different number of passengers (different voltage).", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": true}, {"question": "Starting from the definitions of power, potential difference, and current, derive $$P = VI$$. Show each step. (3 steps)", "answer": "- Step 1: Start with the definition of power: $$P = \\frac{W}{t}$$, where $$W$$ is energy transferred and $$t$$ is time.\n- Step 2: From the definition of potential difference: $$V = \\frac{W}{Q}$$, rearrange to $$W = VQ$$. Substitute into the power equation:\n$$P = \\frac{VQ}{t} = V \\cdot \\frac{Q}{t}$$\n- Step 3: From the definition of current: $$I = \\frac{Q}{t}$$. Substitute:\n$$P = V \\cdot I$$\n\nThis derivation shows $$P = VI$$ is not a separate law — it is a direct consequence of the definitions of p.d. and current. The energy per coulomb ($$V$$) times the coulombs per second ($$I$$) gives joules per second ($$P$$).", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "A student writes $$1.0 \\text{ µA} = 1.0 \\times 10^{-3} \\text{ A}$$. What is wrong, and what is the correct conversion? Why is this a dangerous exam trap? (2 steps)", "answer": "- Step 1: The student confused **micro (µ)** with **milli (m)**. The correct conversions:\n+ milli (m) = $$10^{-3}$$, so $$1 \\text{ mA} = 1 \\times 10^{-3} \\text{ A}$$\n+ micro (µ) = $$10^{-6}$$, so $$1 \\text{ µA} = 1 \\times 10^{-6} \\text{ A}$$\n- Step 2: This error makes every subsequent answer **wrong by a factor of 1000**. If a current is 1.0 µA and you treat it as 1.0 mA, charge, energy, and number-of-electrons calculations are all 1000× too large. **Always write the power of ten explicitly** before substituting. Remember: µ (micro) = $$10^{-6}$$; m (milli) = $$10^{-3}$$ — these differ by a factor of 1000.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "Why must you always convert minutes or hours to seconds before using $$Q = I\\Delta t$$? What goes wrong if you don't? (2 steps)", "answer": "- Step 1: The formula $$I = Q/t$$ defines the ampere as coulombs per second: $$1 \\text{ A} = 1 \\text{ C/s}$$. The time variable $$\\Delta t$$ must be in **seconds** because the ampere is defined per second.\n- Step 2: If you use $$t = 5$$ (meaning 5 minutes) instead of $$t = 300$$ (seconds), you calculate $$Q = I \\times 5$$ instead of $$Q = I \\times 300$$ — your charge is **60× too small**. The same trap exists for hours ($$\\times 3600$$). Always convert: multiply minutes by 60, hours by 3600.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "The elementary charge is listed as $$e = -1.60 \\times 10^{-19} \\text{ C}$$ (negative for the electron). When counting electrons with $$N = Q/e$$, why do you use the magnitude only? (2 steps)", "answer": "- Step 1: When counting electrons, you are finding **how many** particles are present — a count, which must be a positive integer. The negative sign encodes the **polarity** of charge (negative), not the quantity.\n- Step 2: You use $$N = Q / |e| = Q / (1.60 \\times 10^{-19})$$, dividing total charge by the **magnitude** of the elementary charge. Including the negative sign would give a negative count of electrons, which is physically meaningless. The sign tells you the *type* of charge and *direction* of conventional current relative to electron flow — irrelevant when simply counting particles.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "A wire carries a current of 2 A for 3 seconds. What charge passes a point in the wire, and roughly how many electrons does this represent? (2 steps)", "answer": "- Step 1: Using $$Q = I \\Delta t$$:\n$$Q = 2 \\times 3 = 6 \\text{ C}$$\n- Step 2: The number of electrons: $$N = Q/e \\approx 6 / (1.60 \\times 10^{-19}) \\approx 3.75 \\times 10^{19}$$ electrons. Even a modest current for a few seconds involves an astronomically large number of charge carriers.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "A potential difference of 5 V exists across a component, and 2 C of charge passes through it. How much energy is transferred, and what does this mean physically? (2 steps)", "answer": "- Step 1: Using $$W = VQ$$:\n$$W = 5 \\times 2 = 10 \\text{ J}$$\n- Step 2: Ten joules of energy are converted from electrical energy to other forms (thermal energy in a resistor, light in a lamp). Each coulomb delivers 5 J of energy — that's what the 5 V potential difference means: 5 joules per coulomb.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "A total charge of $$3.2 \\times 10^{-6} \\text{ C}$$ passes through a conductor. Roughly how many electrons does this represent? ($$e = 1.60 \\times 10^{-19} \\text{ C}$$) (2 steps)", "answer": "- Step 1: Use $$N = Q/e$$:\n$$N = \\frac{3.2 \\times 10^{-6}}{1.60 \\times 10^{-19}}$$\n- Step 2: Divide the coefficients: $$3.2 / 1.6 = 2$$. Subtract exponents: $$-6 - (-19) = 13$$. So:\n$$N = 2 \\times 10^{13} \\text{ electrons}$$\nEven a tiny charge (microcoulombs) involves trillions of charge carriers — confirming that circuit current involves vast numbers of electrons.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "At a junction, currents of 3 A and 2 A enter. If one branch carries 1 A out, what current leaves through the other branch? (2 steps)", "answer": "- Step 1: By Kirchhoff's First Law, total current in = total current out:\n$$I_{\\text{in}} = 3 + 2 = 5 \\text{ A}$$\n- Step 2: If one branch carries 1 A out, the other must carry:\n$$I_{\\text{out, other}} = 5 - 1 = 4 \\text{ A}$$\nCharge conservation ensures no charge accumulates at the junction — whatever flows in must flow out.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "A battery has e.m.f. 12 V. The potential difference measured across its terminals (terminal p.d.) is also 12 V. What can you infer about the battery's internal resistance? (2 steps)", "answer": "- Step 1: E.m.f. is the total energy given per coulomb by the source. Terminal p.d. is the energy available per coulomb at the terminals — after any energy lost inside the battery due to internal resistance.\n- Step 2: If e.m.f. = terminal p.d. (both 12 V), then **no energy is being lost inside the battery**, meaning the **internal resistance is effectively zero** (or no current is flowing). In practice, all real batteries have some internal resistance, so terminal p.d. is slightly less than e.m.f. when current flows. The \"missing\" voltage is dropped across the internal resistance.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": false}, {"question": "A 100 W appliance runs for 60 seconds. A student first finds $$I$$ from $$P = IV$$, then $$Q = It$$, then $$W = VQ$$. What's inefficient about this, and what should they do? (2 steps)", "answer": "- Step 1: There is nothing *mathematically* wrong — the student will get the correct answer. But this is a **roundabout method** with three calculation steps, each introducing a potential arithmetic error.\n- Step 2: Since you know both $$P$$ and $$t$$ directly, use the simplest formula:\n$$W = P \\times t = 100 \\times 60 = 6000 \\text{ J}$$\nThis is a one-step calculation. The general principle: **always use the formula that connects the quantities you already know directly**, rather than deriving intermediate quantities. This reduces errors and saves time in exams.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": false}, {"question": "If the work done on a charge is doubled from $$W$$ to $$2W$$, and simultaneously the charge passing is doubled from $$Q$$ to $$2Q$$, what happens to the potential difference $$V$$? (2 steps)", "answer": "- Step 1: Apply the formula:\n$$V' = \\frac{2W}{2Q} = \\frac{W}{Q} = V$$\n- Step 2: The potential difference **stays the same**. This makes physical sense: if each coulomb still transfers the same energy (because both total energy and total charge doubled proportionally), the energy *per unit charge* is unchanged. P.d. is a **per-unit-charge** quantity — it depends on the **ratio** of energy to charge, not the absolute amounts.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": false}, {"question": "Can current have a negative value? If so, what would a negative current physically mean? (2 steps)", "answer": "- Step 1: Yes — in Kirchhoff's First Law, we use the **algebraic sum** of currents, meaning some are positive (entering) and some are negative (leaving), depending on your chosen sign convention.\n- Step 2: A negative current means the actual flow is in the **opposite direction** to your defined positive direction. If you define \"rightward\" as positive and measure $$-2 \\text{ A}$$, then 2 A flows to the left. The magnitude is the same; the sign encodes direction. This is why KCL says the *algebraic* sum is zero — you must account for signs.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "A 6 V battery drives a current of 2 A through a single resistor for 10 seconds. Without doing complex arithmetic, describe qualitatively: (a) how much charge passes, (b) how much energy the resistor receives, and (c) what power is dissipated. (3 steps)", "answer": "- Step 1: **Charge**: $$Q = I\\Delta t = 2 \\times 10 = 20 \\text{ C}$$. Roughly 20 coulombs pass — a significant amount, containing about $$1.25 \\times 10^{20}$$ electrons.\n- Step 2: **Energy**: $$W = VQ = 6 \\times 20 = 120 \\text{ J}$$. Each coulomb delivers 6 J (the voltage), and 20 coulombs pass, so 120 J total is converted from electrical to thermal energy.\n- Step 3: **Power**: $$P = VI = 6 \\times 2 = 12 \\text{ W}$$ (or equivalently $$P = W/t = 120/10 = 12 \\text{ W}$$). The resistor dissipates 12 joules per second. Both methods agree — a good cross-check.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": false}, {"question": "To measure current through a lamp, an ammeter is placed in series. If it were accidentally placed in parallel instead, what would go wrong? (2 steps)", "answer": "- Step 1: In parallel, the ammeter would create an **alternative path** for current. Since the ammeter has very low resistance, most current would flow through the ammeter (path of least resistance) rather than through the lamp. The ammeter would read the current through itself, not through the lamp.\n- Step 2: This would effectively **short-circuit** the lamp — it might not light up at all, and the large current through the ammeter could damage it or blow a fuse. An ammeter must be in series so that the **same current flows through both the ammeter and the component** being measured.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": false}, {"question": "A student says \"Kirchhoff's First Law only applies in parallel circuits because that's where junctions are.\" Is this correct? Why or why not? (2 steps)", "answer": "- Step 1: The student is **partially right** that junctions only appear in parallel circuits (a series circuit has no junctions). But they are **wrong** about KCL being limited to parallel circuits.\n- Step 2: KCL applies at **every junction in every circuit** because it is simply **conservation of charge** — a universal law. It doesn't matter what circuit configuration the junction is part of. Furthermore, even in a series circuit (no junctions), charge conservation still holds: the current is the same at every point precisely because charge cannot accumulate anywhere. KCL is the formal statement of this principle at junctions.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": true}, {"question": "A battery sits on a shelf, not connected to any circuit. Does it still have an e.m.f.? Does it have a potential difference across its terminals? Is there any current? (2 steps)", "answer": "- Step 1: The battery **still has an e.m.f.** — its chemical energy is available and ready to be converted. The e.m.f. (e.g., 9 V) is a property of the source, independent of whether it's in a circuit. The terminal p.d. equals the e.m.f. when no current flows (because there is no voltage drop across internal resistance).\n- Step 2: There is **no current** because the circuit is open — there is no complete path for charge carriers. You can have e.m.f. and p.d. without current, just as a hill can have a height difference without water flowing until a pipe connects the top and bottom.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": false}, {"question": "In everyday language, people say \"voltage.\" In physics, what two distinct quantities can this refer to, and why must you be precise? (2 steps)", "answer": "- Step 1: \"Voltage\" colloquially can mean either **potential difference (p.d.)** — energy transferred *from* electrical form per unit charge across a component — or **electromotive force (e.m.f.)** — energy supplied *into* electrical form per unit charge by a source.\n- Step 2: Both are measured in volts and both use $$W/Q$$, but they describe **opposite directions of energy flow**: e.m.f. is energy *into* electrical form (source gives energy); p.d. is energy *out of* electrical form (component takes energy). In exams, always specify whether you mean e.m.f. ($$\\varepsilon$$) or p.d. ($$V$$) — never just write \"voltage.\"", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": false}, {"question": "A charge of 10 C passes a point in a wire in 5 seconds. What is the current, and what does this value physically mean? (2 steps)", "answer": "- Step 1: Using $$I = Q/t$$:\n$$I = \\frac{10}{5} = 2 \\text{ A}$$\n- Step 2: Two amperes means 2 coulombs of charge pass per second. This is a moderate current — typical of a small household device. The ampere tells you the *rate* at which charge flows, not the total amount.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": false}, {"question": "A component transfers 20 J of energy when 4 C of charge passes through it. What is the potential difference, and what does this value tell you? (2 steps)", "answer": "- Step 1: Using $$V = W/Q$$:\n$$V = \\frac{20}{4} = 5 \\text{ V}$$\n- Step 2: The potential difference is 5 V, meaning each coulomb transfers 5 J of energy as it passes through the component. The volt is \"joules per coulomb\" — it tells you how much energy each unit of charge delivers.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": false}], "count": 40}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Why is electric current defined as \"rate of flow of charge\" and not \"flow of electrons\"? (3 steps)", "answer": "- Step 1: Current is a general term for the movement of **any** charge carrier (not just electrons). In metals, electrons are the carriers, but in electrolytes, ions move.  \n- Step 2: The definition \"flow of electrons\" would exclude cases like electrolytes (ions) or semiconductor holes, which also carry current.  \n- Step 3: The universal formula $ I = \\Delta Q / \\Delta t $ focuses on net charge movement, not the specific particle type.  \n\n[Takeaway: Current quantifies charge motion, not the identity of charge carriers.]", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Calculate the number of electrons passing a point in a wire carrying 2.0 µA for 1 minute. Why must we use $ e = 1.60 \\times 10^{-19} \\, \\text{C} $? (4 steps)", "answer": "- Step 1: Convert current to amps: $ I = 2.0 \\, \\mu\\text{A} = 2.0 \\times 10^{-6} \\, \\text{A} $.  \n- Step 2: Convert time to seconds: $ \\Delta t = 60 \\, \\text{s} $.  \n- Step 3: Calculate charge: $ Q = I \\Delta t = (2.0 \\times 10^{-6}) \\times 60 = 1.2 \\times 10^{-4} \\, \\text{C} $.  \n- Step 4: Divide by elementary charge: $ N = Q/e = (1.2 \\times 10^{-4}) / (1.60 \\times 10^{-19}) = 7.5 \\times 10^{14} $ electrons.  \n\n$ e $ is used because it’s the fundamental charge unit (one electron’s charge).", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "Why is conventional current direction opposite to electron flow? What historical error led to this?", "answer": "- Step 1: Benjamin Franklin arbitrarily assigned positive/negative charges in the 18th century.  \n- Step 2: He defined current as flowing from positive to negative.  \n- Step 3: In 19th-century metals, electrons (negative) were discovered moving from negative to positive.  \n- Step 4: The convention persisted to avoid rewriting textbooks, even though electrons are the carriers in metals.  \n\n[Takeaway: Conventional current is a legacy definition; electrons flow opposite to it.]", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "A 9 V battery delivers 1350 C during discharge. Calculate the energy transferred. Why does this equal $ W = VQ $? (3 steps)", "answer": "- Step 1: Use $ W = VQ = 9 \\times 1350 = 12,150 \\, \\text{J} $.  \n- Step 2: Potential difference $ V $ is energy per coulomb (1 V = 1 J/C).  \n- Step 3: Multiplying by total charge $ Q $ gives total energy (J).  \n\n[Takeaway: Voltage defines energy per unit charge; total energy scales with charge.]", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "Why must ammeters be in series and voltmeters in parallel? What would happen if swapped?", "answer": "- Step 1: Ammeters measure **total current**, which is the same at all points in series. Series placement ensures all charge flows through it.  \n- Step 2: Voltmeters measure **potential difference** between two points. Parallel connection ensures they compare energy per charge at those points.  \n- Step 3: A voltmeter in series would block current (it has high resistance). An ammeter in parallel would short the circuit (low resistance).", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "A 12 V battery powers a lamp for 2 hours with 0.5 A current. Calculate energy using both $ W = VIt $ and $ W = Pt $. Why do both work? (4 steps)", "answer": "- Step 1: Convert time to seconds: $ t = 2 \\times 3600 = 7200 \\, \\text{s} $.  \n- Step 2: $ W = VIt = 12 \\times 0.5 \\times 7200 = 43,200 \\, \\text{J} $.  \n- Step 3: Power $ P = VI = 12 \\times 0.5 = 6 \\, \\text{W} $; $ W = Pt = 6 \\times 7200 = 43,200 \\, \\text{J} $.  \n- Step 4: Both work because $ P = VI $ and $ W = Pt $ are derived from $ W = VQ $ (since $ Q = It $).", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "Why is the drift velocity of electrons much slower than the speed of the electric field in a wire? Use the marble-tube analogy.", "answer": "- Step 1: Drift velocity is the net movement of electrons due to the electric field, which is slow (~mm/s) because electrons collide with lattice ions.  \n- Step 2: The electric field propagates near light-speed (like pushing one marble in a full tube: the last marble moves instantly).  \n- Step 3: The analogy explains why a lamp turns on immediately (field propagates fast) even though individual electrons drift slowly.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "A junction has 3 mA entering and 1 mA exiting one branch. What is the current in the second branch? State Kirchhoff’s First Law in terms of charge conservation.", "answer": "- Step 1: Total incoming current (3 mA) equals total outgoing current.  \n- Step 2: $ 3 \\, \\text{mA} = 1 \\, \\text{mA} + I_2 \\Rightarrow I_2 = 2 \\, \\text{mA} $.  \n- Step 3: Kirchhoff’s First Law: \"The algebraic sum of currents at a junction is zero,\" reflecting charge conservation (no charge accumulates at a junction).", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "Why does a resistor not \"store\" electrons or reduce current? What happens to the electrons?", "answer": "- Step 1: Electrons are not consumed or stored—they flow through the resistor.  \n- Step 2: The resistor converts electrical energy to thermal energy via collisions with lattice ions.  \n- Step 3: Current remains the same before and after the resistor (charge conservation).  \n- Step 4: Misconception: \"Resistors slow electrons\" is incorrect—drift velocity depends on current, which is constant in series.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": true}, {"question": "What is the significance of charge quantization $ Q = Ne $? Why don’t we notice this in everyday circuits? (3 steps)", "answer": "- Step 1: Charge quantization means all charges are integer multiples of $ e = 1.60 \\times 10^{-19} \\, \\text{C} $.  \n- Step 2: In macroscopic currents, $ N $ is enormous (e.g., 1 C ≈ $ 6.25 \\times 10^{18} $ electrons), making the quantization imperceptible.  \n- Step 3: Like water appearing continuous despite molecules, charge seems continuous in daily life.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "A 1.5 V cell transfers 1200 J of energy. How much charge passed through it? Why is this related to the cell’s e.m.f.? (3 steps)", "answer": "- Step 1: Use $ Q = W/V = 1200 / 1.5 = 800 \\, \\text{C} $.  \n- Step 2: e.m.f. $ \\varepsilon = W/Q $ is energy per coulomb converted to electrical energy by the source.  \n- Step 3: This matches the calculation, as $ \\varepsilon $ defines how much energy the cell provides per coulomb.", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "Why is the elementary charge $ e = 1.60 \\times 10^{-19} \\, \\text{C} $ memorized? What happens if you use $ 10^{-13} \\, \\text{C} $ instead?", "answer": "- Step 1: $ e $ is fundamental for calculating number of particles (e.g., $ N = Q/e $).  \n- Step 2: Using $ 10^{-13} $ (confusing micro and milli) would give $ N $ wrong by a factor of $ 10^6 $ (e.g., 1 C = $ 6.25 \\times 10^{18} $ electrons; with $ e = 10^{-13} $, it would incorrectly be $ 10^{13} $).  \n- Step 3: This error would invalidate all charge calculations. Always use $ e = 1.60 \\times 10^{-19} \\, \\text{C} $.", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "What is the difference between e.m.f. and potential difference? Use the \"Charlie the Coulomb\" analogy.", "answer": "- Step 1: e.m.f. (e.g., battery) gives energy to Charlie (electrons), like lifting him to the top of a hill.  \n- Step 2: Potential difference (e.g., across a resistor) takes energy away from Charlie, like him rolling down the hill and losing energy as heat/light.  \n- Step 3: Both are in volts, but e.m.f. adds energy; p.d. removes it.", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "Why is a voltmeter’s high resistance crucial? How does this relate to measuring potential difference?", "answer": "- Step 1: A voltmeter measures energy per coulomb between two points.  \n- Step 2: If it had low resistance, it would divert current (like a shortcut), altering the circuit and reducing accuracy.  \n- Step 3: High resistance ensures minimal current flows through the voltmeter, preserving the original circuit conditions.", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "A 230 V, 800 W appliance runs for 1 minute. Use $ W = Pt $ to find energy. Why is this faster than $ W = VQ $? (3 steps)", "answer": "- Step 1: $ W = Pt = 800 \\times 60 = 48,000 \\, \\text{J} $.  \n- Step 2: Using $ W = VQ $ would require first calculating $ Q = It $, then $ I = P/V = 800/230 \\approx 3.48 \\, \\text{A} $, then $ Q = 3.48 \\times 60 \\approx 209 \\, \\text{C} $, then $ W = 230 \\times 209 \\approx 48,000 \\, \\text{J} $.  \n- Step 3: $ W = Pt $ is faster because power and time are directly given, avoiding intermediate steps.", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}, {"question": "Why does Kirchhoff’s First Law apply to every junction in every circuit? What would happen if it didn’t?", "answer": "- Step 1: Kirchhoff’s First Law is a direct consequence of charge conservation.  \n- Step 2: If charge could accumulate at a junction, net charge would build up, creating a repulsive force stopping further charge movement.  \n- Step 3: This never happens—charge conservation ensures $ \\sum I_{\\text{in}} = \\sum I_{\\text{out}} $ always.", "source": "Qwen 3 ①", "_id": "qwen_1_15", "judge_pick": false}, {"question": "A 0.5 A current flows for 10 s. Calculate total charge. Why is this $ Q = It $?", "answer": "- Step 1: $ Q = It = 0.5 \\times 10 = 5.0 \\, \\text{C} $.  \n- Step 2: Current $ I $ is defined as charge per second (1 A = 1 C/s).  \n- Step 3: Multiplying by time gives the total charge transferred.", "source": "Qwen 3 ①", "_id": "qwen_1_16", "judge_pick": false}, {"question": "What is the \"Hill Analogy\" for potential difference? How does it explain energy transfer in a circuit?", "answer": "- Step 1: A battery acts as a hill, lifting Charlie the Coulomb (electron) to a higher energy level.  \n- Step 2: The resistor is the hill’s slope: Charlie loses energy (as light/heat) when passing through it.  \n- Step 3: The hill’s height (voltage) determines how much energy each Coulomb gains (battery) or loses (resistor).", "source": "Qwen 3 ①", "_id": "qwen_1_17", "judge_pick": false}, {"question": "Why is the ampere (A) the base SI unit for current, not charge?", "answer": "- Step 1: Charge $ Q $ is derived from current and time: $ Q = It $, so the ampere (A = C/s) is defined first.  \n- Step 2: Historically, current was easier to measure precisely than static charge.  \n- Step 3: This ensures consistency: 1 A = 1 C/s, and 1 C = 1 A·s.", "source": "Qwen 3 ①", "_id": "qwen_1_18", "judge_pick": false}, {"question": "A 12 V car battery stores 180 kC of charge. Calculate energy and power if discharged in 1 hour. Why is power lower when discharging slowly?", "answer": "- Step 1: $ W = VQ = 12 \\times 180,000 = 2.16 \\times 10^6 \\, \\text{J} $.  \n- Step 2: $ t = 1 \\, \\text{hour} = 3600 \\, \\text{s} $; $ P = W/t = 2.16 \\times 10^6 / 3600 = 600 \\, \\text{W} $.  \n- Step 3: Power $ P = W/t $: A slower discharge (larger $ t $) reduces power, even if total energy is unchanged.", "source": "Qwen 3 ①", "_id": "qwen_1_19", "judge_pick": false}], "count": 20}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "What is electric charge and how is it related to protons and electrons? (2 steps)", "answer": "- Step 1: Electric charge is a fundamental property of matter that causes atoms to attract or repel each other.\n- Step 2: Protons have a positive charge while electrons have a negative charge. Atoms are normally neutral because they have equal numbers of protons and electrons.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "What is the elementary charge and how does it relate to the quantization of charge? (2 steps)", "answer": "- Step 1: The elementary charge (e) is the magnitude of the charge on a single proton or electron, which is 1.60 × 10−19 C.\n- Step 2: Charge quantization means that all observable charge is an integer multiple of e. You never observe a charge of 1.5e or 3.2e - only whole number multiples like 1e, 2e, etc.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "What are the two types of electric charge and how do they interact? (2 steps)", "answer": "- Step 1: There are two types of electric charge: positive (protons) and negative (electrons).\n- Step 2: Like charges repel each other, and unlike charges attract each other.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "What is the SI unit of electric charge and how much does 1 C represent in terms of electrons? (2 steps)", "answer": "- Step 1: The SI unit of electric charge is the coulomb (C).\n- Step 2: 1 C contains 6.25 × 1018 electrons (since each electron has a charge of 1.60 × 10−19 C).", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "How is electric current defined mathematically and what is its SI unit? (2 steps)", "answer": "- Step 1: Electric current is defined as the rate of flow of charge: I = ΔQ/Δt\n- Step 2: The SI unit of current is the ampere (A), where 1 A = 1 C/s.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "Why is it important to convert milliamps (mA) or microamps (µA) to amps (A) before using the formula I = ΔQ/Δt? (2 steps)", "answer": "- Step 1: The formula I = ΔQ/Δt requires all quantities to be in SI units (amperes, coulombs, seconds).\n- Step 2: 1 mA = 10−3 A and 1 µA = 10−6 A. Forgetting to convert these prefixes can result in answers that are wrong by factors of 1000 or a million.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "How can you calculate the total charge Q if you know the current I and time t? (3 steps)", "answer": "- Step 1: Start with the formula I = ΔQ/Δt\n- Step 2: Rearranging this formula gives ΔQ = I × Δt\n- Step 3: If current is in amperes and time is in seconds, then charge will be in coulombs.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "How can you calculate the number of electrons N passing a point in a conductor if you know the total charge Q? (2 steps)", "answer": "- Step 1: Use the formula N = Q/e where e is the elementary charge (1.60 × 10−19 C)\n- Step 2: This works because each electron carries a charge of -1.60 × 10−19 C, so dividing total charge by this value gives the number of electrons.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "What is potential difference and how is it defined mathematically? (2 steps)", "answer": "- Step 1: Potential difference (voltage) is the energy per unit charge between two points in a circuit.\n- Step 2: Mathematically, it's defined as V = W/Q, where V is in volts (V), W is in joules (J), and Q is in coulombs (C).", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "What is the SI unit of potential difference and how is it defined? (2 steps)", "answer": "- Step 1: The SI unit of potential difference is the volt (V).\n- Step 2: 1 V = 1 J/C, meaning a potential difference of 1 volt means that 1 joule of energy is transferred per coulomb of charge that passes between the points.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "How are charge carriers different in metals, electrolytes, and ionized gas? (3 steps)", "answer": "- Step 1: In metals, the charge carriers are free electrons that are detached from metal atoms and can move easily through the conductor.\n- Step 2: In electrolytes (like salt water or battery acid), the charge carriers are positive and negative ions that move in opposite directions.\n- Step 3: In ionized gases (like in fluorescent tubes or lightning), the charge carriers are both electrons and positive ions.", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "How do conventional current and electron flow differ in direction? (2 steps)", "answer": "- Step 1: Conventional current flows from the positive terminal to the negative terminal of the battery.\n- Step 2: Electron flow is in the opposite direction, from the negative terminal to the positive terminal.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}, {"question": "What is electromotive force (e.m.f.) and how does it differ from potential difference? (2 steps)", "answer": "- Step 1: E.m.f. is the energy converted into electrical energy per unit charge by a source like a battery.\n- Step 2: Potential difference refers to the energy transferred from electrical energy to other forms for unit charge passing through a component. E.m.f. and p.d. have the same unit (volts) but different energy transformation directions.", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": false}, {"question": "How is the conservation of charge related to Kirchhoff's First Law? (2 steps)", "answer": "- Step 1: Conservation of charge means that charge cannot be created or destroyed in an isolated system.\n- Step 2: This directly leads to Kirchhoff's First Law, which states that the sum of currents entering a junction equals the sum of currents leaving a junction.", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "Where should an ammeter and voltmeter be placed in a circuit? (2 steps)", "answer": "- Step 1: An ammeter should be placed in series with the component to measure the current through it.\n- Step 2: A voltmeter should be placed in parallel with the component to measure the potential difference across it.", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": false}, {"question": "Why is an ammeter placed in series and a voltmeter in parallel? (2 steps)", "answer": "- Step 1: Ammeters measure the current flowing through a component, so they must be in series with that component.\n- Step 2: Voltmeters measure the potential difference between two points, so they must be connected in parallel between those points.", "source": "Qwen 3 ②", "_id": "qwen_2_15", "judge_pick": false}, {"question": "How does a resistor affect charge in a circuit? (2 steps)", "answer": "- Step 1: A resistor does not store electrons. The same current flows into and out of a resistor.\n- Step 2: A resistor converts electrical energy into thermal energy by \"slowing down\" the movement of charge carriers, but not reducing the total amount of charge.", "source": "Qwen 3 ②", "_id": "qwen_2_16", "judge_pick": false}, {"question": "What is the direction of energy transfer in a battery (e.m.f.) and in a resistor (p.d.)? (2 steps)", "answer": "- Step 1: In a battery, energy is converted into electrical energy - chemical energy within the battery is converted to electrical energy as electrons move through the battery.\n- Step 2: In a resistor, energy is converted from electrical energy into other forms (thermal, light) as electrons move through the resistor.", "source": "Qwen 3 ②", "_id": "qwen_2_17", "judge_pick": false}, {"question": "Why is it important to distinguish between e.m.f. and p.d.? (2 steps)", "answer": "- Step 1: E.m.f. refers to the energy provided by a source to each coulomb of charge that passes through it.\n- Step 2: Potential difference refers to the energy converted from electrical energy into other forms by a component in a circuit.", "source": "Qwen 3 ②", "_id": "qwen_2_18", "judge_pick": false}, {"question": "How is power related to current and voltage in an electric circuit? (3 steps)", "answer": "- Step 1: Power (P) is the rate at which energy is transferred by a component.\n- Step 2: Power is given by the product of current and voltage: P = IV\n- Step 3: This can be derived from previous concepts: P = E/t = VQ/t = VI (since I = Q/t)", "source": "Qwen 3 ②", "_id": "qwen_2_19", "judge_pick": false}, {"question": "What is the \"Charlie the Coulomb\" hill analogy for potential difference? (2 steps)", "answer": "- Step 1: Imagine a circuit as a hill with a battery at the top and a resistor at the bottom; \"Charlie the Coulomb\" represents a single coulomb of charge.\n- Step 2: The battery gives energy to each Coulomb (like lifting Charlie to the top of the hill), and the resistor takes energy from each Coulomb (like Charlie rolling down the hill and converting potential energy to other forms).", "source": "Qwen 3 ②", "_id": "qwen_2_20", "judge_pick": false}, {"question": "How does the drift velocity of electrons compare to the speed of the electric field in a conductor? (2 steps)", "answer": "- Step 1: Individual electrons move very slowly (drift velocity) - typically millimeters per second.\n- Step 2: The electric field that drives the electrons propagates at close to the speed of light, which is why circuits \"turn on\" almost instantly despite the slow movement of individual electrons.", "source": "Qwen 3 ②", "_id": "qwen_2_21", "judge_pick": false}, {"question": "Why don't electrons accumulate in a resistor despite the energy conversion? (2 steps)", "answer": "- Step 1: Electrons do not accumulate in a resistor because charge is conserved in a circuit.\n- Step 2: The same current flows in and out of every component in a series circuit, just as water flows at the same rate into and out of a restriction in a pipe.", "source": "Qwen 3 ②", "_id": "qwen_2_22", "judge_pick": false}, {"question": "How can you calculate the energy transferred to a circuit element? (3 steps)", "answer": "- Step 1: Start with the equation: W = VQ\n- Step 2: Substitute Q = It to get W = VIt\n- Step 3: Alternatively, use W = Pt, where P = power in watts and t = time in seconds.", "source": "Qwen 3 ②", "_id": "qwen_2_23", "judge_pick": false}, {"question": "What are the key differences between ammeters and voltmeters? (3 steps)", "answer": "- Step 1: Ammeters measure current and are connected in series; voltmeters measure potential difference and are connected in parallel.\n- Step 2: Ammeters have very low resistance to allow current to flow through them with minimal voltage drop.\n- Step 3: Voltmeters have very high resistance so they draw negligible current from the circuit.", "source": "Qwen 3 ②", "_id": "qwen_2_24", "judge_pick": false}, {"question": "How does conservation of charge explain why the current is the same at every point in a series circuit? (2 steps)", "answer": "- Step 1: Charge cannot be created or destroyed in an isolated system.\n- Step 2: Therefore, in a series circuit without junctions, the charge flowing through one component must flow through all other components in the same loop.", "source": "Qwen 3 ②", "_id": "qwen_2_25", "judge_pick": false}, {"question": "How does current behave at a junction according to Kirchhoff's First Law? (2 steps)", "answer": "- Step 1: According to Kirchhoff's First Law, the sum of currents entering a junction equals the sum of currents leaving the junction.\n- Step 2: This is a direct consequence of conservation of charge - charge cannot accumulate at a junction.", "source": "Qwen 3 ②", "_id": "qwen_2_26", "judge_pick": false}, {"question": "What is the marble-tube analogy for electric current? (2 steps)", "answer": "- Step 1: Imagine a tube filled with marbles. Pushing one marble in at one end immediately pushes one out at the other end.\n- Step 2: Similarly, when a battery is connected, the electric field causes free electrons to move almost instantly, even though individual electrons move slowly (drift velocity).", "source": "Qwen 3 ②", "_id": "qwen_2_27", "judge_pick": false}, {"question": "How can you calculate the number of electrons passing a point in a circuit given current and time? (3 steps)", "answer": "- Step 1: First calculate total charge using Q = It where I is in amps and t in seconds.\n- Step 2: Then divide total charge by the elementary charge e (1.60 × 10−19 C) to find number of electrons: N = Q/e\n- Step 3: The sign of e doesn't matter here - we're just counting particles, not tracking direction.", "source": "Qwen 3 ②", "_id": "qwen_2_28", "judge_pick": false}, {"question": "What is the relationship between coulombs, amperes, and seconds? (3 steps)", "answer": "- Step 1: One coulomb (C) is defined as one ampere-second (A·s).\n- Step 2: This comes from the formula I = Q/t rearranged as Q = It.\n- Step 3: If a current of 1 A flows for 1 s, 1 coulomb of charge has passed through the circuit.", "source": "Qwen 3 ②", "_id": "qwen_2_29", "judge_pick": false}, {"question": "How does the drift velocity of electrons compare with the propagation of the electric field? (2 steps)", "answer": "- Step 1: Individual electrons have a very slow drift velocity - typically millimeters per second.\n- Step 2: The electric field that drives the electrons propagates at close to the speed of light, which is why circuits appear to turn on instantly.", "source": "Qwen 3 ②", "_id": "qwen_2_30", "judge_pick": false}, {"question": "How can you calculate the number of electrons in a given amount of charge? (2 steps)", "answer": "- Step 1: Use the formula N = Q/e where Q is the total charge in coulombs and e is the elementary charge (1.60 × 10−19 C).\n- Step 2: This works because each electron contributes a charge of -e to the total charge.", "source": "Qwen 3 ②", "_id": "qwen_2_31", "judge_pick": false}, {"question": "What happens to the energy and charge when a current passes through a resistor? (2 steps)", "answer": "- Step 1: The same number of electrons (charge) flows in and out of a resistor - charge is conserved.\n- Step 2: However, energy is transferred from the electrons to the resistor, heating it up - energy is not conserved in this transfer but is converted to another form.", "source": "Qwen 3 ②", "_id": "qwen_2_32", "judge_pick": false}, {"question": "What is the fundamental reason why ammeters must be connected in series and voltmeters in parallel? (2 steps)", "answer": "- Step 1: Ammeters measure the current through a component, which is the same at all points in its series branch.\n- Step 2: Voltmeters measure the potential difference between two points, which is the energy per coulomb transferred between those points in the circuit.", "source": "Qwen 3 ②", "_id": "qwen_2_33", "judge_pick": false}, {"question": "How does the direction of conventional current compare with the actual electron flow in a metallic conductor? (2 steps)", "answer": "- Step 1: Conventional current flows from the positive terminal to the negative terminal of a source.\n- Step 2: Actual electron flow goes from the negative terminal to the positive terminal - opposite to conventional current.", "source": "Qwen 3 ②", "_id": "qwen_2_34", "judge_pick": false}, {"question": "How is the ampere defined in terms of the force between two parallel wires? (2 steps)", "answer": "- Step 1: The ampere is defined as the constant current that, if maintained in two straight parallel conductors of infinite length, placed 1 m apart in a vacuum, would produce a force between the conductors of 2 × 10−7 N/m of length.\n- Step 2: This definition connects the ampere to the magnetic effects of current, its fundamental definition in SI units.", "source": "Qwen 3 ②", "_id": "qwen_2_35", "judge_pick": false}, {"question": "How is electric current similar to water flow in a pipe? (3 steps)", "answer": "- Step 1: Electric current is the flow of charge through a conductor, similar to water flow through a pipe.\n- Step 2: Voltage is analogous to pressure difference that drives the water flow, just as potential difference drives electric current.\n- Step 3: Resistance is analogous to the friction that opposes the water flow, just as electrical resistance opposes electric current.", "source": "Qwen 3 ②", "_id": "qwen_2_36", "judge_pick": false}, {"question": "What is the significance of the conservation of charge in electric circuits? (2 steps)", "answer": "- Step 1: Conservation of charge means that charge cannot be created or destroyed in a circuit.\n- Step 2: This leads to Kirchhoff's First Law: the total current entering a junction equals the total current leaving it, as charge cannot accumulate at any point in the circuit.", "source": "Qwen 3 ②", "_id": "qwen_2_37", "judge_pick": false}, {"question": "How do you convert milliamps to amps and microseconds to seconds when solving circuit problems? (2 steps)", "answer": "- Step 1: To convert milliamps to amps, divide by 1000: 1 mA = 10−3 A\n- Step 2: To convert microseconds to seconds, divide by 106: 1 µs = 10−6 s", "source": "Qwen 3 ②", "_id": "qwen_2_38", "judge_pick": false}, {"question": "What is the difference between energy (joules) and power (watts) in electric circuits? (2 steps)", "answer": "- Step 1: Energy (joules) is the total amount of work done or energy transferred.\n- Step 2: Power (watts) is the rate of energy transfer (joules/second). A resistor with higher power transfers energy at a greater rate for the same potential difference.", "source": "Qwen 3 ②", "_id": "qwen_2_39", "judge_pick": false}, {"question": "Why is it incorrect to say \"flow of electrons\" when defining current? (2 steps)", "answer": "- Step 1: The official definition of current is \"rate of flow of charge\" because current can be carried by ions in electrolytes or gas discharges, not just electrons in metals.\n- Step 2: Current is a measure of charge transfer, not specifically electron transfer, and can be carried by positive or negative charge carriers.", "source": "Qwen 3 ②", "_id": "qwen_2_40", "judge_pick": false}, {"question": "What is the direction of electron flow and conventional current in a circuit with a battery? (2 steps)", "answer": "- Step 1: Conventional current flows from the positive terminal through the circuit to the negative terminal of the battery.\n- Step 2: Electron flow is in the opposite direction - from the negative terminal through the circuit to the positive terminal.", "source": "Qwen 3 ②", "_id": "qwen_2_41", "judge_pick": false}, {"question": "What is a conductor and how does it allow current to flow? (2 steps)", "answer": "- Step 1: A conductor is a material with many free electrons that are not bound to particular atoms.\n- Step 2: When a potential difference is applied, these free electrons drift in one direction, creating a net current.", "source": "Qwen 3 ②", "_id": "qwen_2_42", "judge_pick": false}, {"question": "What is the role of a battery in an electric circuit? (3 steps)", "answer": "- Step 1: A battery creates a potential difference between its terminals.\n- Step 2: This potential difference creates an electric field throughout the conductor that applies a force on the free electrons.\n- Step 3: The electrons flow under the influence of this field, creating electric current.\n\n## JARGON TABLE\n\n| | What does it mean? |\n| --- | --- |\n| **Electric Charge** | |\n| Electric charge | Property of matter that causes it to experience a force when near other charged matter |\n| Elementary charge e | Magnitude of charge on one proton or one electron (1.60 × 10−19 C) |\n| Coulomb | SI unit of electric charge; 1 C = 1 A·s |\n| **Electric Current** | |\n| Electric current | Rate of flow of charge (I = ΔQ/Δt) |\n| Ampere | SI base unit of current; 1 A = 1 C/s |\n| **Potential Difference** | |\n| Potential difference | Work done (energy transferred) per unit charge (V = W/Q) |\n| Volt | 1 V = 1 J/C |\n| **Electric Circuits** | |\n| Conventional current | Direction of current in which positive charges would flow (from positive to negative) |\n| Electron flow | Actual direction of electron movement (from negative to positive) |\n| Resistor | Component that converts electrical energy to thermal energy |\n| Junction | Point where at least three circuit branches meet |\n| **Measuring Instruments** | |\n| Ammeter | Device that measures electric current; connected in series |\n| Voltmeter | Device that measures potential difference; connected in parallel |\n\n## FORMULA TABLE\n\n| $$LHS = ?$$ | Answer | Name / Hint |\n| --- | --- | --- |\n| **Core Formulas** | |\n| $$I = ?$$ | $$= \\frac{\\Delta Q}{\\Delta t}$$ | Definition of current: current = charge / time |\n| $$Q = ?$$ | $$= Ne$$ | Total charge = number of electrons × elementary charge |\n| $$V = ?$$ | $$= \\frac{W}{Q}$$ | Definition of potential difference: voltage = energy / charge |\n| $$W = ?$$ | $$= VQ$$ | Energy transferred from charge passing through p.d. V |\n| $$W = ?$$ | $$= Pt$$ | Energy from power and time; direct method when P and t known |\n| $$N = ?$$ | $$= \\frac{Q}{e}$$ | Number of electrons = total charge / elementary charge |\n| **Prefix Conversions** | |\n| $$\\text{mA} = ?$$ | $$= 10^{-3} \\text{ A}$$ | 1 milliampere = 0.001 amperes |\n| $$\\text{µA} = ?$$ | $$= 10^{-6} \\text{ A}$$ | 1 microampere = 0.000001 amperes |\n| $$\\text{µC} = ?$$ | $$= 10^{-6} \\text{ C}$$ | 1 microcoulomb = 0.000001 coulombs |", "source": "Qwen 3 ②", "_id": "qwen_2_43", "judge_pick": false}, {"question": "What is the significance of the elementary charge in calculations? (3 steps)", "answer": "- Step 1: The elementary charge (e = 1.60 × 10−19 C) is the fundamental quantum of charge.\n- Step 2: All charge measurements are integer multiples of e (Q = Ne).\n- Step 3: When calculating number of electrons, we divide total charge by e rather than using fractional values.", "source": "Qwen 3 ②", "_id": "qwen_2_44", "judge_pick": false}, {"question": "How does the concept of drift velocity help explain the instantaneous nature of current? (3 steps)", "answer": "- Step 1: Individual electrons move slowly through a conductor (drift velocity).\n- Step 2: However, all the free electrons in the conductor start moving almost instantly when a potential difference is applied.\n- Step 3: This is like water in a full pipe: push one end and water comes out the other end immediately, even though individual water molecules move slowly.", "source": "Qwen 3 ②", "_id": "qwen_2_45", "judge_pick": false}, {"question": "What is the relationship between current and charge in a circuit over time? (2 steps)", "answer": "- Step 1: Current (I) is the rate of charge flow: I = ΔQ/Δt\n- Step 2: Total charge (Q) that has flowed in a time t is given by Q = It", "source": "Qwen 3 ②", "_id": "qwen_2_46", "judge_pick": false}, {"question": "How does the same current in a series circuit relate to charge conservation? (2 steps)", "answer": "- Step 1: In a series circuit with no junctions, the rate of charge flow (current) must be the same at all points.\n- Step 2: This is a direct consequence of conservation of charge - charge cannot accumulate anywhere in the circuit.", "source": "Qwen 3 ②", "_id": "qwen_2_47", "judge_pick": false}, {"question": "What is a resistor and how does it affect charge carriers? (2 steps)", "answer": "- Step 1: A resistor is a component with higher resistance than connecting wires, causing charge to transfer energy at a greater rate.\n- Step 2: Electrons lose energy to the resistor but the same number of electrons enter and leave - the resistor doesn't store electrons.", "source": "Qwen 3 ②", "_id": "qwen_2_48", "judge_pick": false}, {"question": "How does potential difference relate to energy in an electric circuit? (2 steps)", "answer": "- Step 1: Potential difference (voltage) is the energy transformation per unit charge (V = W/Q)\n- Step 2: A potential difference of 1 V means 1 J of energy is transferred for each coulomb of charge that passes through.", "source": "Qwen 3 ②", "_id": "qwen_2_49", "judge_pick": false}, {"question": "How does a battery transfer energy to a circuit? (2 steps)", "answer": "- Step 1: A battery transfers chemical energy to electrical energy, giving each coulomb of charge a fixed amount of energy.\n- Step 2: The electromotive force (e.m.f.) of a battery is the energy given to each coulomb of charge that passes through it.", "source": "Qwen 3 ②", "_id": "qwen_2_50", "judge_pick": false}, {"question": "How does a component in a circuit take energy from the charge passing through it? (2 steps)", "answer": "- Step 1: A component in a circuit takes energy from the charge passing through it.\n- Step 2: The potential difference across the component is the energy taken from each coulomb of charge.", "source": "Qwen 3 ②", "_id": "qwen_2_51", "judge_pick": false}, {"question": "How do you calculate the electrical energy transferred by a battery? (3 steps)", "answer": "- Step 1: Start with the equation W = VQ\n- Step 2: If current and time are known, calculate Q = It\n- Step 3: Then find energy: W = VIt", "source": "Qwen 3 ②", "_id": "qwen_2_52", "judge_pick": false}, {"question": "How do you calculate the power developed by a component in a circuit? (3 steps)", "answer": "- Step 1: Power is energy per unit time: P = W/t\n- Step 2: Substituting W = VQ gives P = VQ/t\n- Step 3: Since I = Q/t, this becomes P = VI", "source": "Qwen 3 ②", "_id": "qwen_2_53", "judge_pick": false}, {"question": "How does the same current in a series circuit relate to energy transformation in components? (2 steps)", "answer": "- Step 1: The same current means the same number of electrons are transferring energy in each component.\n- Step 2: The different potential differences across components mean different amounts of energy are transferred per coulomb.", "source": "Qwen 3 ②", "_id": "qwen_2_54", "judge_pick": false}, {"question": "How do you calculate the number of electrons passing a point in a circuit when given current and time? (3 steps)", "answer": "- Step 1: Calculate total charge: Q = It (convert time to seconds and current to A if necessary)\n- Step 2: Divide by elementary charge: N = Q/e\n- Step 3: Use the magnitude of e because this is about counting particles, not tracking direction.", "source": "Qwen 3 ②", "_id": "qwen_2_55", "judge_pick": false}, {"question": "Why is the same current in a series circuit not an indication of conservation of energy? (2 steps)", "answer": "- Step 1: The same current in a series circuit is an indication of conservation of charge, not energy.\n- Step 2: Energy is transformed in components according to W = VQ - more energy is transferred in components with higher potential difference.", "source": "Qwen 3 ②", "_id": "qwen_2_56", "judge_pick": false}, {"question": "How does conservation of charge explain why current is the same at all points in a series circuit? (2 steps)", "answer": "- Step 1: Charge cannot accumulate at any point in the circuit because of conservation of charge.\n- Step 2: This means the rate of charge flow (current) must be the same at all points in a simple series circuit.", "source": "Qwen 3 ②", "_id": "qwen_2_57", "judge_pick": false}, {"question": "How does potential difference relate to energy transformation in a component? (2 steps)", "answer": "- Step 1: Potential difference across a component is the energy transformed per unit charge passing through it.\n- Step 2: A potential difference of 1 V means that 1 J of energy is transformed for each coulomb of charge passing through.", "source": "Qwen 3 ②", "_id": "qwen_2_58", "judge_pick": false}, {"question": "What is the relationship between energy transferred in a circuit and potential difference, current and time? (3 steps)", "answer": "- Step 1: Start with W = VQ\n- Step 2: Substitute Q = It to get W = VIt\n- Step 3: This shows that energy transferred depends on voltage, current and time.", "source": "Qwen 3 ②", "_id": "qwen_2_59", "judge_pick": false}, {"question": "How does energy transformation relate to charge movement in a circuit? (2 steps)", "answer": "- Step 1: As charge moves through a battery, it gains energy.\n- Step 2: As charge moves through a component, it transfers energy to the component (W = VQ).", "source": "Qwen 3 ②", "_id": "qwen_2_60", "judge_pick": false}, {"question": "What is the relationship between current and charge for alternating current vs direct current? (2 steps)", "answer": "- Step 1: In direct current (DC), the net charge flow is in one direction.\n- Step 2: In alternating current (AC), the net charge flow averages to zero as charges oscillate back and forth.", "source": "Qwen 3 ②", "_id": "qwen_2_61", "judge_pick": false}, {"question": "How are prefixes like 'milli' and 'micro' used in electric circuits? (3 steps)", "answer": "- Step 1: The prefix 'milli' (m) means 10−3, so 1 mA = 0.001 A\n- Step 2: The prefix 'micro' (µ) means 10−6, so 1 µA = 0.000001 A\n- Step 3: Confusing these prefixes can give answers wrong by a factor of 1000.", "source": "Qwen 3 ②", "_id": "qwen_2_62", "judge_pick": false}, {"question": "What is the relationship between current, number of electrons, and drift velocity? (2 steps)", "answer": "- Step 1: Current is the rate at which charge flows through a conductor (I = ΔQ/Δt).\n- Step 2: The same current in a circuit means the same number of electrons pass through each point per unit time, even though each electron moves slowly (drift velocity).", "source": "Qwen 3 ②", "_id": "qwen_2_63", "judge_pick": false}, {"question": "How does energy transformation differ between the battery and components in a circuit? (2 steps)", "answer": "- Step 1: In a battery, chemical energy is converted into electrical energy.\n- Step 2: In components like resistors, electrical energy is converted into other forms (thermal, light, mechanical).", "source": "Qwen 3 ②", "_id": "qwen_2_64", "judge_pick": false}, {"question": "What does the phrase \"the same Charlie\" mean when discussing electric current? (2 steps)", "answer": "- Step 1: \"Charlie\" is a metaphor for a coulomb of charge in the analogy presented.\n- Step 2: When we say \"the same Charlie,\" we mean that all charge is conserved - none is lost in the circuit, it just transfers energy.", "source": "Qwen 3 ②", "_id": "qwen_2_65", "judge_pick": false}, {"question": "How is electric power related to the energy transfer in a circuit? (2 steps)", "answer": "- Step 1: Power is the rate of energy transfer (P = W/t)\n- Step 2: In electric circuits, power is also given by P = VI (from W = VQ and Q = It)", "source": "Qwen 3 ②", "_id": "qwen_2_66", "judge_pick": false}, {"question": "How do you calculate the energy transferred in a circuit when given current, time, and potential difference? (3 steps)", "answer": "- Step 1: Calculate total charge: Q = It\n- Step 2: Convert to coulombs if necessary (1 C = 1 A·s)\n- Step 3: Use energy equation: W = VQ = VIt", "source": "Qwen 3 ②", "_id": "qwen_2_67", "judge_pick": false}, {"question": "What is the significance of the ampere as an SI base unit? (2 steps)", "answer": "- Step 1: The ampere is one of the seven SI base units.\n- Step 2: It's defined in terms of the force between two parallel wires, connecting it to magnetism, not just the movement of electrons.", "source": "Qwen 3 ②", "_id": "qwen_2_68", "judge_pick": false}, {"question": "How does the \"Charlie the Coulomb\" analogy explain energy transfer in an electric circuit? (2 steps)", "answer": "- Step 1: In the analogy, Charlie the Coulomb represents a single coulomb of charge that gains energy from the battery.\n- Step 2: Charlie then loses this energy in components like resistors or lamps where it's converted to other forms like heat and light.", "source": "Qwen 3 ②", "_id": "qwen_2_69", "judge_pick": false}, {"question": "How does a resistor transform energy in an electric circuit? (2 steps)", "answer": "- Step 1: A resistor transforms electrical energy to other forms (heat, light) as electrons move through it.\n- Step 2: Each coulomb of charge that passes through a resistor with a potential difference of 1 V loses 1 joule of energy.", "source": "Qwen 3 ②", "_id": "qwen_2_70", "judge_pick": false}, {"question": "How is charge conserved at a junction in a circuit? (2 steps)", "answer": "- Step 1: At any junction in a circuit, the total current in must equal the total current out.\n- Step 2: This is a direct consequence of conservation of charge - charge cannot disappear or appear at a junction.", "source": "Qwen 3 ②", "_id": "qwen_2_71", "judge_pick": false}, {"question": "How does the energy transformation in a battery compare with that in a resistor? (2 steps)", "answer": "- Step 1: A battery converts chemical energy to electrical energy (W = εQ) where ε is the e.m.f.\n- Step 2: A resistor converts electrical energy to other forms (W = VQ) where V is the potential difference.", "source": "Qwen 3 ②", "_id": "qwen_2_72", "judge_pick": false}, {"question": "What is the role of the electric field in a circuit? (2 steps)", "answer": "- Step 1: When a battery is connected, it creates an electric field that propagates through the circuit at near-light speed.\n- Step 2: This field gives all the free electrons in the conductor a push, causing a current to establish in the entire circuit almost instantly, even though individual electrons move slowly.", "source": "Qwen 3 ②", "_id": "qwen_2_73", "judge_pick": false}, {"question": "How does the \"Charlie the Coulomb\" analogy explain potential difference? (2 steps)", "answer": "- Step 1: In the analogy, potential difference (voltage) corresponds to the height of the hill that Charlie must climb to go through the battery.\n- Step 2: Components in the circuit (like resistors) correspond to the hill that Charlie comes down, giving up the energy he gained in the battery.", "source": "Qwen 3 ②", "_id": "qwen_2_74", "judge_pick": false}, {"question": "What happens to electrons in a metal wire when there is no current flowing? (2 steps)", "answer": "- Step 1: When there's no current, the free electrons in the metal continue to move randomly in all directions - this is thermal motion.\n- Step 2: The random motion doesn't constitute a current because there's no net movement of charge in any direction.", "source": "Qwen 3 ②", "_id": "qwen_2_75", "judge_pick": false}, {"question": "How does the \"Charlie the Coulomb\" analogy explain the role of the resistor? (2 steps)", "answer": "- Step 1: In the analogy, the resistor is the hill where Charlie loses the energy he gained in the battery.\n- Step 2: The resistor converts this potential energy to other forms like heat and light.", "source": "Qwen 3 ②", "_id": "qwen_2_76", "judge_pick": false}, {"question": "Why is it incorrect to say electrons \"pile up\" in a resistor? (2 steps)", "answer": "- Step 1: Electrons (charge) cannot \"pile up\" in a resistor because of conservation of charge.\n- Step 2: The same current flows in and out of every component in series - charge cannot accumulate at any point in the circuit.", "source": "Qwen 3 ②", "_id": "qwen_2_77", "judge_pick": false}, {"question": "How does the \"Charlie the Coulomb\" analogy explain conservation of energy in a circuit? (2 steps)", "answer": "- Step 1: In the analogy, Charlie gains a fixed amount of energy in the battery.\n- Step 2: This energy is all transferred to components in the circuit as Charlie goes through the resistor (the hill), conserving energy in the loop.", "source": "Qwen 3 ②", "_id": "qwen_2_78", "judge_pick": false}, {"question": "What is the relationship between the number of charge carriers in a conductor and the current? (2 steps)", "answer": "- Step 1: A metal conductor has a huge number of free electrons available for conduction.\n- Step 2: However, the current depends on the rate at which charge flows, not the total number of available electrons.", "source": "Qwen 3 ②", "_id": "qwen_2_79", "judge_pick": false}, {"question": "How does the \"Charlie the Coulomb\" analogy explain potential difference across multiple components? (2 steps)", "answer": "- Step 1: In the analogy, Charlie loses energy proportionally to the potential difference across each component.\n- Step 2: The total energy in the battery equals the total energy lost across all components in the loop - energy conservation.", "source": "Qwen 3 ②", "_id": "qwen_2_80", "judge_pick": false}, {"question": "What is the relationship between the number of electrons and current in a circuit? (2 steps)", "answer": "- Step 1: Current is defined as the rate of charge flow, not the number of electrons.\n- Step 2: The same current can be achieved with fewer electrons moving faster or more electrons moving slower.", "source": "Qwen 3 ②", "_id": "qwen_2_81", "judge_pick": false}, {"question": "How do you calculate the total charge that passes through a circuit element when given current and time? (3 steps)", "answer": "- Step 1: Use the formula: Q = It where I is in amps and t is in seconds.\n- Step 2: If current is given in mA or µA, convert to A first (1 mA = 10−3 A; 1 µA = 10−6 A)\n- Step 3: If time is in minutes or hours, convert to seconds first (1 min = 60 s; 1 hour = 3600 s)", "source": "Qwen 3 ②", "_id": "qwen_2_82", "judge_pick": false}, {"question": "How do you use the hill analogy to explain energy conservation in a circuit? (2 steps)", "answer": "- Step 1: In the hill analogy, the battery is the top of the hill where each coulomb (Charlie) gains energy.\n- Step 2: The resistor is the bottom of the hill where Charlie loses energy - the total energy gained at the top equals the total energy lost at the bottom.", "source": "Qwen 3 ②", "_id": "qwen_2_83", "judge_pick": false}], "count": 84}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "Define electric charge and state its SI unit. (2 steps)", "answer": "- Step 1: Electric charge is a fundamental property of matter that causes it to experience electromagnetic forces. It comes in two types: positive (like protons) and negative (like electrons). Like charges repel; unlike charges attract.\n- Step 2: The SI unit of charge is the coulomb (symbol C). One coulomb is defined as the charge that passes a point in a conductor when a current of 1 ampere flows for 1 second: $$1 \\text{ C} = 1 \\text{ A} \\cdot \\text{s}$$", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "What is meant by \"charge quantisation\" and what is the elementary charge e? (2 steps)", "answer": "- Step 1: Charge quantisation means that charge always exists in discrete packets — it cannot take arbitrary values but must be an integer multiple of a fundamental unit. This is because charge is carried by particles (electrons and protons), each carrying a fixed amount of charge.\n- Step 2: The elementary charge is the magnitude of charge on a single electron (or proton): $$e = 1.60 \\times 10^{-19} \\text{ C}$$ Any charge Q can be expressed as: $$Q = Ne$$ where N is an integer (number of electrons or protons).", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "How many electrons are there in 1 coulomb of charge? (1 step)", "answer": "Since each electron carries a charge of magnitude $$e = 1.60 \\times 10^{-19} \\text{ C}$$, the number of electrons in 1 C is: $$N = \\frac{1}{1.60 \\times 10^{-19}} = 6.25 \\times 10^{18} \\text{ electrons}$$ This is why 1 C is a relatively large amount of charge — it represents trillions of billions of electrons.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "Define electric current and give its defining equation. (2 steps)", "answer": "- Step 1: Electric current is defined as the rate of flow of charge — that is, the amount of charge passing a g
