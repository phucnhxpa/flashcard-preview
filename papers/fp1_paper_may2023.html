ound fractions (fractions within fractions), no common factors, and separate terms where possible. $\\frac{2p^2-2}{p}$ is a single compound fraction; $2p - 2/p$ is two clean terms. Examiners deduct for \"simplification\" failures.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": true}, {"question": "Q9 (Induction: divisibility) — The statement to prove is \"for $n \\in \\mathbb{Z}$, $n \\geq 2$, $4^n + 6n - 10$ is divisible by 18.\" What value should you use for the base case, and why is choosing $n = 1$ a mistake (even though it works)? (2 steps)", "answer": "- Step 1: Use $n = 2$: $f(2) = 16 + 12 - 10 = 18 = 18 \\times 1$. ✓\n- Step 2: Using $n = 1$ gives $f(1) = 4 + 6 - 10 = 0$, and $0 = 18 \\times 0$ is technically divisible by 18. But the question specifies $n \\geq 2$ as the domain — you must prove the statement for that domain, starting at its lower bound. Using $n = 1$ doesn't match the stated range and may lose the base-case mark even though the arithmetic is correct.\n\nAlways read the domain restriction carefully.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": true}, {"question": "Q9 (Induction: divisibility) — In the inductive step, what is the strategic approach for expressing $f(k+1)$ in terms of $f(k)$, and why is the alternative $f(k+1) - f(k)$ problematic? (3 steps)", "answer": "- Step 1: The strategy is to write $f(k+1) = A \\cdot f(k) + B$ where $A$ is an integer and $B$ is **explicitly** divisible by 18. Here: $f(k+1) = 4f(k) + 18(2-k)$.\n- Step 2: The derivation: $f(k+1) = 4^{k+1} + 6(k+1) - 10 = 4 \\cdot 4^k + 6k - 4$. We want to express this using $f(k) = 4^k + 6k - 10$. Multiply $f(k)$ by 4: $4f(k) = 4 \\cdot 4^k + 24k - 40$. So $f(k+1) = 4f(k) - 18k + 36 = 4f(k) + 18(2-k)$.\n- Step 3: The alternative $f(k+1) - f(k) = 3 \\cdot 4^k + 6$ is technically divisible by 18 (using modular arithmetic: $4^k \\equiv 4 \\pmod{6}$ for $k \\geq 1$, so $3 \\cdot 4^k + 6 \\equiv 12 + 6 = 18 \\equiv 0$), but this modular argument is much harder to write rigorously in an exam. The $4f(k) + 18(\\ldots)$ form makes divisibility by 18 visually obvious.", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": true}, {"question": "Q9 (Induction: divisibility) — What must the conclusion sentence of a proof by induction contain, and what happens if you omit it? (2 steps)", "answer": "- Step 1: The conclusion must state: \"$f(2)$ is divisible by 18, and if $f(k)$ is divisible by 18 then $f(k+1)$ is divisible by 18. By the **principle of mathematical induction**, $4^n + 6n - 10$ is divisible by 18 for all integers $n \\geq 2$.\"\n- Step 2: Markers **explicitly check** for this sentence. Omitting it can cost the final mark. The sentence must name the principle of mathematical induction and restate the full result with its domain. A vague \"therefore it's true\" is insufficient.", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": false}, {"question": "Q9 (Induction: divisibility) — In the inductive step, you show $f(k+1) = 4f(k) + 18(2-k) = 4 \\cdot 18M + 18(2-k) = 18(4M + 2 - k)$. Why is it important to write $f(k+1) = 18(\\ldots)$ with the explicit bracket? (2 steps)", "answer": "- Step 1: Writing $f(k+1) = 18(4M + 2 - k)$ makes it **visually obvious** that $f(k+1)$ is a multiple of 18, since $4M + 2 - k$ is clearly an integer (as $M$ and $k$ are integers).\n- Step 2: Without this explicit factorisation, you're asking the marker to infer divisibility from \"$4 \\times 18M + 18(2-k)$\" — while logically equivalent, the mark scheme often requires you to factor out the 18 to demonstrate the divisibility conclusively. Show, don't make the examiner work.", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": true}, {"question": "Cross-cutting strategy — The revision guide identifies \"strategic algebraic factoring before numerical substitution\" as the unifying skill across Q1, Q3, Q5, Q8, and Q9. For each question, what is the specific factor that should be pulled out early? (5 parts)", "answer": "- Q1: Factor out $n(n+1)$ from $\\tfrac14 n^2(n+1)^2 + n(n+1)$ before expanding.\n- Q3: Use the known root $x = 3t$ to factor the intersection quadratic immediately, rather than using the quadratic formula.\n- Q5: Factor the numerator $\\alpha\\beta^2 + \\alpha + \\alpha^2\\beta + \\beta$ into $(\\alpha+\\beta)(\\alpha\\beta+1)$ before substituting numbers.\n- Q8: Keep the factor $(1+p^2)$ visible and cancel it late when intersecting tangent equations.\n- Q9: Write $f(k+1) = 4f(k) + 18(2-k)$ so that the divisibility-by-18 structure is explicit.\n\nThe common principle: **factor symbolically first, substitute numbers last.**", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": false}, {"question": "Exam strategy — When a question says \"give your answer in the form $px^2 + qx + r = 0$ where $p, q, r$ are integers,\" what two things must you do before finalising? (2 steps)", "answer": "- Step 1: **Clear all fractions** by multiplying through by the LCM of denominators, so that $p, q, r$ are integers.\n- Step 2: **State $p, q, r$ explicitly** at the end (e.g., \"$p = 40, q = -24, r = 3$\"). Don't just write the equation and assume the examiner will read off the coefficients — make it unambiguous.", "source": "GLM 5.1 ②", "_id": "glm_2_50", "judge_pick": false}, {"question": "Exam strategy — When a question says \"in simplest form\" (as in Q8(c) for the coordinates of $R$), what does Edexcel require? (2 steps)", "answer": "- Step 1: No compound fractions (fractions within fractions), no uncancelled common factors, and separate terms where possible. For example, $\\frac{2p^2-2}{p}$ must be written as $2p - \\frac{2}{p}$.\n- Step 2: Surds must be rationalised where possible, and $\\sqrt{-3/2}$ must be written as $\\frac{\\sqrt{6}}{2}i$. \"Simplest form\" is not a suggestion — it's a marking requirement, and failure to simplify costs marks.", "source": "GLM 5.1 ②", "_id": "glm_2_51", "judge_pick": true}, {"question": "Exam strategy — For calculator-banned questions (like Q2 and Q6 which state \"solutions relying on calculator technology are not acceptable\"), what does this require in your written working? (2 steps)", "answer": "- Step 1: Show **every algebraic step** — expanding brackets, combining like terms, multiplying by conjugates, equating real and imaginary parts. No leaps of arithmetic.\n- Step 2: Partial credit depends on the working, not the final answer. If you write just the answer with no working and it's wrong, you get zero. If you show a clear method with one arithmetic slip, you get most of the marks. The ban means the examiner wants to see your algebra, not your calculator's output.", "source": "GLM 5.1 ②", "_id": "glm_2_52", "judge_pick": true}, {"question": "Exam strategy — At 75 marks in 90 minutes, you have approximately 1.2 minutes per mark. If Q8 is worth 13 marks, what's the rough time budget, and what should you do if you're stuck? (2 steps)", "answer": "- Step 1: Q8 (13 marks) $\\approx$ 15–16 minutes. Q1 (4 marks) $\\approx$ 5 minutes.\n- Step 2: If you spend more than 2 minutes staring at a question without writing anything, **move on**. Come back to it later — every mark you earn on an easier question is better than zero marks from time spent stuck. Flag it and return.", "source": "GLM 5.1 ②", "_id": "glm_2_53", "judge_pick": false}, {"question": "Q2 (Complex roots) — When forming the quadratic factor from the conjugate pair, a common error is writing $x^2 - 4x - 13$ instead of $x^2 - 4x + 13$. Where does the wrong sign come from? (2 steps)", "answer": "- Step 1: The correct factor is $x^2 - 4x + 13$, since $|z|^2 = 2^2 + 3^2 = 13$ (positive).\n- Step 2: The wrong sign comes from confusing $|z|^2 = a^2 + b^2$ (always positive) with the expanded form of $(x-a-bi)(x-a+bi) = x^2 - 2ax + (a^2+b^2)$, and mistakenly thinking the constant term inherits a minus from the $-bi$ part. Or simply from a mental arithmetic slip on $3^2 = 9$ being added vs subtracted. The shortcut formula $x^2 - 2\\text{Re}(z)x + |z|^2$ with its **plus** on the constant term prevents this.", "source": "GLM 5.1 ②", "_id": "glm_2_54", "judge_pick": false}, {"question": "Q5 (Roots of quadratic) — What is the identity for $\\alpha^3 + \\beta^3$ in terms of $\\alpha + \\beta$ and $\\alpha\\beta$, and why might you need it? (2 steps)", "answer": "- Step 1: $\\alpha^3 + \\beta^3 = (\\alpha+\\beta)^3 - 3\\alpha\\beta(\\alpha+\\beta)$.\n- Step 2: This arises from expanding $(\\alpha+\\beta)^3 = \\alpha^3 + 3\\alpha^2\\beta + 3\\alpha\\beta^2 + \\beta^3 = \\alpha^3 + \\beta^3 + 3\\alpha\\beta(\\alpha+\\beta)$, then rearranging. It's needed whenever a \"new quadratic\" question involves cubes of the roots. This identity is **not** in the formula booklet.", "source": "GLM 5.1 ②", "_id": "glm_2_55", "judge_pick": false}, {"question": "Q7 (Numerical methods) — Write down the Newton-Raphson formula. What does each term represent geometrically? (2 steps)", "answer": "- Step 1: $x_{n+1} = x_n - \\frac{f(x_n)}{f'(x_n)}$.\n- Step 2: Geometrically, $x_{n+1}$ is the $x$-intercept of the **tangent line** to $y = f(x)$ at the point $(x_n, f(x_n))$. The tangent has slope $f'(x_n)$, so its equation is $y - f(x_n) = f'(x_n)(x - x_n)$. Setting $y = 0$ and solving for $x$ gives the formula. The correction term $f(x_n)/f'(x_n)$ is the \"run\" corresponding to the \"rise\" $f(x_n)$ on a line of slope $f'(x_n)$.", "source": "GLM 5.1 ②", "_id": "glm_2_56", "judge_pick": true}, {"question": "Q7 (Numerical methods) — Geometrically, what does linear interpolation compute, and how does the formula relate to similar triangles? (2 steps)", "answer": "- Step 1: Linear interpolation finds the $x$-intercept of the **chord** joining $(a, f(a))$ and $(b, f(b))$.\n- Step 2: By similar triangles, the distance from $a$ to the intercept is $\\frac{|f(a)|}{|f(a)|+|f(b)|} \\times (b-a)$. The triangle with vertex at $(a, f(a))$ and base along the $x$-axis is similar to the full triangle with vertices at both endpoints. The ratio of the \"height\" $|f(a)|$ to the total \"height\" $|f(a)| + |f(b)|$ equals the ratio of the base of the sub-triangle to the total base $(b-a)$.", "source": "GLM 5.1 ②", "_id": "glm_2_57", "judge_pick": true}, {"question": "Q3 (Rectangular hyperbola) — For the general rectangular hyperbola $xy = c^2$ with parametrisation $(ct, c/t)$, what are the standard results for tangent and normal gradients? These must be memorised — why? (2 steps)", "answer": "- Step 1: Tangent gradient $= -1/t^2$. Normal gradient $= t^2$.\n- Step 2: These are **not** in the formula booklet. They follow from $y = c^2/x$, giving $dy/dx = -c^2/x^2$, evaluated at $x = ct$: $dy/dx = -c^2/(ct)^2 = -1/t^2$. The normal gradient is the negative reciprocal: $t^2$. Memorising them saves the differentiation step under exam time pressure, but you should also be able to derive them if needed.", "source": "GLM 5.1 ②", "_id": "glm_2_58", "judge_pick": false}, {"question": "Q6 (Complex arithmetic) — When computing the numerator of $\\frac{z_2 z_3}{z_1}$, you first find $z_2 z_3$ and then multiply by $\\bar{z}_1$. Could you instead multiply $z_3$ by $\\frac{\\bar{z}_1}{|z_1|^2}$ first? Does the order of complex multiplication matter? (2 steps)", "answer": "- Step 1: Yes, you could compute $\\frac{\\bar{z}_1}{|z_1|^2} \\cdot z_3 = \\frac{z_3}{z_1}$ first, then multiply by $z_2$. Or any other grouping.\n- Step 2: Complex multiplication **is** commutative: $z_1 z_2 = z_2 z_1$. So the order doesn't matter for the final result. However, the standard exam method (multiply $z_2 z_3$ first, then divide by $z_1$) is recommended because it's the most natural reading of the expression and mirrors the markscheme's expected working.", "source": "GLM 5.1 ②", "_id": "glm_2_59", "judge_pick": false}, {"question": "Q4 (Matrix transformations) — Why does $|\\det A| = 3$ give two values of $k$? What would the negative determinant value correspond to geometrically? (2 steps)", "answer": "- Step 1: $|3k - 24| = 3$ gives $3k - 24 = 3$ ($k = 9$, $\\det A = 3$) or $3k - 24 = -3$ ($k = 7$, $\\det A = -3$). Both give area scale factor $|-3| = 3$.\n- Step 2: A negative determinant corresponds to an **orientation-reversing** transformation (e.g., a reflection). The area still scales by $|\\det A| = 3$, but the shape is \"flipped.\" Both orientations are valid answers because the question only constrains the area scale factor, not the orientation.", "source": "GLM 5.1 ②", "_id": "glm_2_60", "judge_pick": true}, {"question": "Q6 (Complex arithmetic) — When computing $\\arg w$ for a complex number in the second quadrant (negative real, positive imaginary), why does $\\arctan(\\text{imag}/\\text{real})$ give the wrong answer, and what correction is needed? (2 steps)", "answer": "- Step 1: In Q2, the real part is negative and imaginary part is positive, so $\\text{imag}/\\text{real}$ is negative. $\\arctan$ of a negative number gives a negative angle (in Q4), but the actual argument is in Q2 (between $\\pi/2$ and $\\pi$).\n- Step 2: The correction: $\\arg w = \\pi + \\arctan(\\text{imag}/\\text{real})$. This shifts the $\\arctan$ output from Q4 to Q2. The general rule: Q1 — use $\\arctan$ directly; Q2 — add $\\pi$; Q3 — add $\\pi$ (or subtract $\\pi$); Q4 — use $\\arctan$ directly (may be negative, which is fine).", "source": "GLM 5.1 ②", "_id": "glm_2_61", "judge_pick": false}, {"question": "Q8 (Parabola) — Derive the tangent equation $ty = x + at^2$ from scratch for the parabola $y^2 = 4ax$ at the point $(at^2, 2at)$. (3 steps)", "answer": "- Step 1: Differentiate $y^2 = 4ax$ implicitly: $2y\\frac{dy}{dx} = 4a$, so $\\frac{dy}{dx} = \\frac{2a}{y}$.\n- Step 2: At $(at^2, 2at)$: gradient $= \\frac{2a}{2at} = \\frac{1}{t}$. Write the line equation: $y - 2at = \\frac{1}{t}(x - at^2)$.\n- Step 3: Multiply by $t$: $ty - 2at^2 = x - at^2$, so $ty = x + at^2$. This is the standard tangent form — clean, memorable, and instantly usable.", "source": "GLM 5.1 ②", "_id": "glm_2_62", "judge_pick": false}, {"question": "Conceptual — For the rectangular hyperbola $xy = c^2$, why is the parametrisation $(ct, c/t)$ used instead of just $(t, c^2/t)$? What advantage does the $c$ provide? (2 steps)", "answer": "- Step 1: The parametrisation $(ct, c/t)$ satisfies $xy = ct \\cdot c/t = c^2$ for all $t \\neq 0$. The parameter $t$ is directly related to the gradient: tangent gradient $= -1/t^2$, normal gradient $= t^2$.\n- Step 2: With the alternative $(t, c^2/t)$, the gradient would be $-c^2/t^2$ — it depends on $c$, making the formula less clean. The $(ct, c/t)$ parametrisation absorbs $c$ into the coordinates so that the gradient formulas are independent of $c$, mirroring the parabola convention $(at^2, 2at)$ where the gradient is $1/t$ regardless of $a$.", "source": "GLM 5.1 ②", "_id": "glm_2_63", "judge_pick": true}, {"question": "Q9 (Induction) — In the inductive step, you need to express $f(k+1) = 4^{k+1} + 6(k+1) - 10$ in terms of $f(k) = 4^k + 6k - 10$. Walk through the algebraic manoeuvre of constructing $4f(k)$. (3 steps)", "answer": "- Step 1: Start with $f(k+1) = 4 \\cdot 4^k + 6k + 6 - 10 = 4 \\cdot 4^k + 6k - 4$.\n- Step 2: We want to see $f(k)$ in here. Note $f(k) = 4^k + 6k - 10$, so $4f(k) = 4 \\cdot 4^k + 24k - 40$.\n- Step 3: Write $f(k+1) = 4f(k) + (6k - 4) - (24k - 40) = 4f(k) + 6k - 4 - 24k + 40 = 4f(k) - 18k + 36 = 4f(k) + 18(2-k)$. The key insight: multiply $f(k)$ by 4 to match the $4 \\cdot 4^k$ term, then adjust the remaining terms to cancel what 4 over-contributed.", "source": "GLM 5.1 ②", "_id": "glm_2_64", "judge_pick": true}, {"question": "Q2 (Complex roots) — In the long division table, the second quotient term is $0 \\cdot x$. Why is this worth noting explicitly, and what happens if you skip it? (2 steps)", "answer": "- Step 1: After the first step, the remainder is $3x^2 - 12x + 39$. Dividing $3x^2$ by $x^2$ gives $+3$, so the quotient is $2x^2 + 0x + 3$. The $0x$ term records that no $x$ term is needed.\n- Step 2: If you skip it and write the quotient as $2x^2 + 3$, you might accidentally misalign terms in subsequent multiplications. Explicitly noting $0x$ keeps the column alignment clear and prevents the $-12x$ term from being dropped or misattributed. It's a bookkeeping safeguard.", "source": "GLM 5.1 ②", "_id": "glm_2_65", "judge_pick": false}, {"question": "Edge case — For the parabola $y^2 = 4ax$, what happens to the focal chord when $p = 1$? Does the theorem about tangents meeting on the directrix still hold? (2 steps)", "answer": "- Step 1: When $p = 1$: $P = (a, 2a)$ and $Q = (2, -4)$. For $a = 2$: $P = (2, 4)$, $Q = (2, -4)$. The chord $PQ$ is the vertical line $x = 2$, which passes through the focus $(2, 0)$ — it's a focal chord (specifically, the latus rectum).\n- Step 2: The tangent at $P$ has gradient $1/p = 1$, and the tangent at $Q$ has gradient $-p = -1$. Their intersection: from $y = x + a$ and $y = -x - 2a$, solving gives $x = -a$, $y = 0$. Wait — let me recalculate for $a=2$: tangent at $P$: $y = x + 2$, tangent at $Q$: $y = -x - 4$. Intersection: $x + 2 = -x - 4$, so $2x = -6$, $x = -3$. Hmm, that gives $x = -3 \\neq -2$. The issue is $Q$ when $p = 1$: $Q = (2/1, -4/1) = (2, -4)$. Check: $(-4)^2 = 16 = 8(2) = 16$ ✓. The tangent at $Q(2, -4)$: $\\frac{dy}{dx} = \\frac{4}{y} = \\frac{4}{-4} = -1$. So $y + 4 = -1(x - 2)$, giving $y = -x - 2$. Tangent at $P(2, 4)$: gradient $= 4/4 = 1$, so $y - 4 = 1(x-2)$, giving $y = x + 2$. Intersect: $x + 2 = -x - 2$, so $2x = -4$, $x = -2$. ✓ The theorem holds: $x = -2$ is the directrix.", "source": "GLM 5.1 ②", "_id": "glm_2_66", "judge_pick": true}, {"question": "Misconception probe — A student claims: \"If a polynomial has real coefficients and $z$ is a root, then $-\\bar{z}$ is also a root.\" Is this correct? Provide a counterexample. (2 steps)", "answer": "- Step 1: This is **incorrect**. The correct statement is: if $z$ is a root, then $\\bar{z}$ is a root — not $-\\bar{z}$.\n- Step 2: Counterexample: $x^2 - 4x + 13 = 0$ has roots $2 + 3i$ and $2 - 3i$. The value $-(2 - 3i) = -2 + 3i$ is NOT a root: $(-2+3i)^2 - 4(-2+3i) + 13 = (4 - 12i - 9) + 8 - 12i + 13 = -5 - 12i + 21 - 12i = 16 - 24i \\neq 0$. The conjugate $\\bar{z}$ reflects across the real axis; $-\\bar{z}$ reflects across the origin — a different operation.", "source": "GLM 5.1 ②", "_id": "glm_2_67", "judge_pick": true}, {"question": "Misconception probe — A student computes $\\det A = 3k - 24 = 3$, gets $k = 9$, and stops. They say \"the area scale factor is 3, so the determinant must be 3.\" What's wrong? (2 steps)", "answer": "- Step 1: The area scale factor is $|\\det A|$, not $\\det A$. A determinant of $-3$ also gives an area scale factor of $|-3| = 3$.\n- Step 2: The student confuses the determinant (which can be negative) with the area scale factor (which is always positive). The absolute value is essential. Solving only $\\det A = 3$ misses $k = 7$ (where $\\det A = -3$). The modulus bars in $|\\det A| = 3$ are not optional decoration — they encode the fact that both orientations are valid.", "source": "GLM 5.1 ②", "_id": "glm_2_68", "judge_pick": true}, {"question": "Synthesis — You encounter a question: \"The matrix $M$ transforms a region of area 5 to a region of area 15. Find $|\\det M|$.\" A second question: \"The matrix $N = \\begin{pmatrix} k & 3 \\\\ 1 & k \\end{pmatrix}$ transforms a shape, and the area scales by 4. Find $k$.\" Explain why the first has one answer and the second has two. (2 steps)", "answer": "- Step 1: First question: $|\\det M| = 15/5 = 3$. This is a single value — you're computing the absolute value of the determinant, which is always positive.\n- Step 2: Second question: $|\\det N| = |k^2 - 3| = 4$, so $k^2 - 3 = 4$ (giving $k = \\pm\\sqrt{7}$) or $k^2 - 3 = -4$ (giving $k^2 = -1$, no real solutions). Here the absolute value equation $|k^2 - 3| = 4$ has multiple solutions because the determinant is an expression in $k$ that can be positive or negative. The key: when the determinant is a known number, $|\\det| = 3$ is one answer; when it's an expression in an unknown, $|\\text{expression}| = k$ typically gives multiple values.", "source": "GLM 5.1 ②", "_id": "glm_2_69", "judge_pick": true}, {"question": "Synthesis — Q5(a) asks for $(\\alpha^2+1)(\\beta^2+1)$ and Q5(b) asks for a quadratic with roots $\\frac{\\alpha}{\\alpha^2+1}$ and $\\frac{\\beta}{\\beta^2+1}$. If you skipped part (a) and went straight to (b), what would be harder? (2 steps)", "answer": "- Step 1: In part (b), both the new sum and the new product have $(\\alpha^2+1)(\\beta^2+1)$ as their denominator. Without computing it in (a), you'd need to compute it on the fly while also managing the numerator algebra — doubling the cognitive load.\n- Step 2: The multi-part structure is designed so (a) produces a result that simplifies (b). Skipping (a) means you must compute the denominator mid-calculation in (b), increasing the chance of errors. This is the \"scaffolding\" principle: use the question's structure as support, not as separate unrelated tasks.", "source": "GLM 5.1 ②", "_id": "glm_2_70", "judge_pick": true}, {"question": "Conceptual — Why does the conjugate-pair shortcut $(x-z)(x-\\bar{z}) = x^2 - 2\\text{Re}(z)x + |z|^2$ always produce a quadratic with **real** coefficients? (2 steps)", "answer": "- Step 1: $2\\text{Re}(z)$ is real because the real part of any complex number is real. $|z|^2$ is real because the modulus squared is always a non-negative real number.\n- Step 2: More fundamentally, $(x-z)(x-\\bar{z}) = x^2 - (z+\\bar{z})x + z\\bar{z}$. Since $z + \\bar{z} = 2\\text{Re}(z) \\in \\mathbb{R}$ and $z\\bar{z} = |z|^2 \\in \\mathbb{R}$, all coefficients are real. This is why complex roots of real-coefficient polynomials come in conjugate pairs: only conjugate pairs produce real quadratic factors, and any real polynomial can be factored into real linear and real quadratic factors.", "source": "GLM 5.1 ②", "_id": "glm_2_71", "judge_pick": true}, {"question": "Q8 (Parabola) — The tangent at $P(2p^2, 4p)$ has gradient $1/p$ and the tangent at $Q(2/p^2, -4/p)$ has gradient $-p$. What is the product of these two gradients, and what does this tell you about the geometric relationship between the two tangents? (2 steps)", "answer": "- Step 1: The product is $\\frac{1}{p} \\times (-p) = -1$.\n- Step 2: Two lines with gradients whose product is $-1$ are **perpendicular**. So the tangents at the endpoints of a focal chord of a parabola are always perpendicular. This is a beautiful geometric consequence: the focal chord property forces the parameter values to be $p$ and $-1/p$ (since $t_1 \\cdot t_2 = -1$ for a focal chord), and the tangent gradients $1/t_1$ and $1/t_2$ then satisfy $m_1 \\cdot m_2 = \\frac{1}{t_1 t_2} = \\frac{1}{-1} = -1$.", "source": "GLM 5.1 ②", "_id": "glm_2_72", "judge_pick": true}, {"question": "Simple exercise — A matrix $M = \\begin{pmatrix} 2 & k \\\\ 1 & 3 \\end{pmatrix}$ transforms a triangle of area 4 into a triangle of area 20. Set up (don't solve) the equation for $k$. (1 step)", "answer": "Area scale factor $= 20/4 = 5$. So $|\\det M| = 5$. $\\det M = 6 - k$. Therefore $|6 - k| = 5$, giving $6 - k = 5$ or $6 - k = -5$.", "source": "GLM 5.1 ②", "_id": "glm_2_73", "judge_pick": false}, {"question": "Simple exercise — Roots $\\alpha, \\beta$ satisfy $\\alpha + \\beta = 5$ and $\\alpha\\beta = 6$. Compute $\\alpha^2 + \\beta^2$ using the identity, without finding $\\alpha$ or $\\beta$ individually. (1 step)", "answer": "$\\alpha^2 + \\beta^2 = (\\alpha+\\beta)^2 - 2\\alpha\\beta = 25 - 12 = 13$.", "source": "GLM 5.1 ②", "_id": "glm_2_74", "judge_pick": false}, {"question": "Simple exercise — If $z = 1+2i$, write down the real quadratic factor $(x-z)(x-\\bar{z})$ using the shortcut formula. (1 step)", "answer": "$(x-z)(x-\\bar{z}) = x^2 - 2\\text{Re}(z)x + |z|^2 = x^2 - 2(1)x + (1+4) = x^2 - 2x + 5$.", "source": "GLM 5.1 ②", "_id": "glm_2_75", "judge_pick": false}, {"question": "Simple exercise — For $f(x) = x^2 + 2x - 8$ with roots $\\alpha, \\beta$, write down the sum and product, then compute $(\\alpha+1)(\\beta+1)$ without solving the quadratic. (2 steps)", "answer": "- Step 1: Sum $= -2$, product $= -8$.\n- Step 2: $(\\alpha+1)(\\beta+1) = \\alpha\\beta + \\alpha + \\beta + 1 = -8 + (-2) + 1 = -9$.", "source": "GLM 5.1 ②", "_id": "glm_2_76", "judge_pick": false}, {"question": "Simple exercise — A continuous function has $f(0) = -3$ and $f(1) = 2$. What conclusion can you draw, and what theorem justifies it? (1 step)", "answer": "There exists a root $\\alpha \\in (0, 1)$ such that $f(\\alpha) = 0$, by the Intermediate Value Theorem (since $f$ is continuous and changes sign on $[0,1]$).", "source": "GLM 5.1 ②", "_id": "glm_2_77", "judge_pick": false}, {"question": "Simple exercise — You're told $f(k) = 18M$ for some integer $M$, and you compute $f(k+1) = 4f(k) + 36$. Is $f(k+1)$ divisible by 18? Why? (1 step)", "answer": "Yes. $f(k+1) = 4(18M) + 36 = 72M + 36 = 18(4M + 2)$. Both $4f(k) = 72M$ and $36$ are divisible by 18, so their sum is divisible by 18.", "source": "GLM 5.1 ②", "_id": "glm_2_78", "judge_pick": false}, {"question": "Simple exercise — For the parabola $y^2 = 12x$, state the value of $a$, the focus, and the directrix. (1 step)", "answer": "$4a = 12$, so $a = 3$. Focus $= (3, 0)$. Directrix: $x = -3$.", "source": "GLM 5.1 ②", "_id": "glm_2_79", "judge_pick": false}, {"question": "Simple exercise — A complex number $w$ has $\\text{Re}(w) = -2$ and $\\text{Im}(w) = 5$. In which quadrant does $w$ lie, and what adjustment to $\\arctan(5/(-2))$ is needed to find $\\arg w$? (2 steps)", "answer": "- Step 1: Negative real part, positive imaginary part → $w$ is in the **second quadrant**.\n- Step 2: $\\arctan(5/(-2)) = \\arctan(-2.5)$, which is negative (in Q4). The correct argument is $\\arg w = \\pi + \\arctan(5/(-2)) = \\pi - \\arctan(5/2)$, which lies in Q2 between $\\pi/2$ and $\\pi$.", "source": "GLM 5.1 ②", "_id": "glm_2_80", "judge_pick": false}, {"question": "Q7 (Numerical methods) — After two bisections starting from $[1,2]$, the interval is $[1.25, 1.5]$. What is the maximum possible error in using the midpoint $1.375$ as an approximation to $\\alpha$? (2 steps)", "answer": "- Step 1: The root lies somewhere in $[1.25, 1.5]$, an interval of width $0.25$. The midpoint is $1.375$.\n- Step 2: The maximum error is half the interval width: $0.25/2 = 0.125$. So $\\alpha = 1.375 \\pm 0.125$. After $n$ bisections starting from an interval of width $w$, the error is at most $w/2^n$.", "source": "GLM 5.1 ②", "_id": "glm_2_81", "judge_pick": false}, {"question": "Conceptual — Why does Newton-Raphson converge faster than bisection near a simple root? Give an intuitive explanation. (2 steps)", "answer": "- Step 1: Bisection halves the interval width each step — the error reduces by a factor of 2 (linear convergence). Newton-Raphson uses the tangent, which approximates the curve locally by a straight line — the error roughly **squares** each step (quadratic convergence).\n- Step 2: Intuitively, bisection throws away half the interval regardless of the function's shape. Newton-Raphson exploits the function's local geometry (its derivative) to aim directly at the root. Near a simple root, the tangent is an excellent approximation, so each step corrects almost all the remaining error. The trade-off: Newton-Raphson requires $f'(x)$ and can diverge if the initial guess is poor or the derivative is near zero.", "source": "GLM 5.1 ②", "_id": "glm_2_82", "judge_pick": true}, {"question": "Q8 (Parabola) — Walk through the verification that chord $PQ$ passes through the focus $(2,0)$ by substituting $(2,0)$ into the chord equation. Why does the factor $(p^2-1)$ cancel? (3 steps)", "answer": "- Step 1: Chord equation at $P$: $y - 4p = \\frac{2p}{p^2-1}(x - 2p^2)$. Substitute $(2, 0)$: $0 - 4p = \\frac{2p}{p^2-1}(2 - 2p^2)$.\n- Step 2: Factor the right side: $2 - 2p^2 = -2(p^2-1)$. So the right side becomes $\\frac{2p}{p^2-1} \\cdot (-2)(p^2-1) = \\frac{2p \\cdot (-2)(p^2-1)}{p^2-1}$.\n- Step 3: The $(p^2-1)$ cancels (since $p \\neq \\pm 1$, which would make $P = Q$), leaving $2p \\cdot (-2) = -4p$. So $-4p = -4p$ ✓. The cancellation is the algebraic signature of the focal chord property.", "source": "GLM 5.1 ②", "_id": "glm_2_83", "judge_pick": true}, {"question": "Q3 (Rectangular hyperbola) — When the question says the normal meets $H$ \"again,\" what does this imply about the number of intersection points, and which one do you report? (2 steps)", "answer": "- Step 1: A line and a hyperbola can intersect in at most 2 points. The normal at $P$ passes through $P$ (one intersection) and meets $H$ at one other point.\n- Step 2: \"Again\" means you must report the **second** intersection point — the one that is not $P$. You know $x = 3t$ is the parameter value for $P$, so you factor it out and report the other root. If the question said \"find where the normal meets $H$,\" both points would be valid; \"again\" excludes $P$.", "source": "GLM 5.1 ②", "_id": "glm_2_84", "judge_pick": false}, {"question": "Conceptual — For a $2 \\times 2$ matrix $M = \\begin{pmatrix} a & b \\\\ c & d \\end{pmatrix}$, the inverse is $\\frac{1}{ad-bc}\\begin{pmatrix} d & -b \\\\ -c & a \\end{pmatrix}$. Why is the pattern \"swap $a \\leftrightarrow d$, negate $b$ and $c$\" and not \"negate all entries\" or \"swap and negate everything\"? (2 steps)", "answer": "- Step 1: The inverse formula comes from the adjugate (transpose of the cofactor matrix) divided by the determinant. For a $2 \\times 2$ matrix, the cofactor of $a$ is $+d$, the cofactor of $b$ is $-c$, the cofactor of $c$ is $-b$, and the cofactor of $d$ is $+a$. Transposing doesn't change a $2 \\times 2$ symmetric pattern, so the adjugate is $\\begin{pmatrix} d & -b \\\\ -c & a \\end{pmatrix}$.\n- Step 2: The signs follow the checkerboard pattern of cofactors: $+$, $-$, $-$, $+$. You swap the diagonal entries ($a \\leftrightarrow d$) because each is the other's cofactor, and negate the off-diagonal entries ($b \\to -b$, $c \\to -c$) because they sit on \"negative\" cofactor positions. The diagonal entries keep their sign; the off-diagonal entries flip.", "source": "GLM 5.1 ②", "_id": "glm_2_85", "judge_pick": true}, {"question": "Q6 (Complex arithmetic) — When equating real and imaginary parts to form simultaneous equations $12a - 5b = 4$ and $5a + 12b = 58$, the elimination strategy multiplies (1) by 12 and (2) by 5. Why these multipliers, and what would go wrong with a different choice? (2 steps)", "answer": "- Step 1: The goal is to eliminate $b$. The coefficients of $b$ are $-5$ and $12$. To make them equal in magnitude, multiply (1) by 12 and (2) by 5: $-60b$ and $+60b$. Adding eliminates $b$.\n- Step 2: A different choice like multiplying (1) by 5 and (2) by 12 would give $-25b$ and $144b$ — not equal in magnitude, so $b$ doesn't cancel. The multipliers are chosen to make the coefficients of the variable you're eliminating into equal-magnitude opposites. The LCM-based approach ($12 \\times 5$ and $5 \\times 12$) is systematic and always works.", "source": "GLM 5.1 ②", "_id": "glm_2_86", "judge_pick": false}, {"question": "Q1 (Series proof) — The identity $\\sum r^3 = \\left[\\sum r\\right]^2 = \\tfrac14 n^2(n+1)^2$ is listed as a key fact. Why does $\\sum r^3$ equal $[\\sum r]^2$? Is this a coincidence or does it have deeper significance? (2 steps)", "answer": "- Step 1: $\\sum_{r=1}^n r = \\frac{n(n+1)}{2}$, so $\\left[\\sum r\\right]^2 = \\frac{n^2(n+1)^2}{4} = \\sum r^3$. This is a genuine identity, not a coincidence.\n- Step 2: The deeper significance: there's no analogous identity for $\\sum r^2$ or higher powers. The fact that $\\sum r^3 = (\\sum r)^2$ is related to the symmetry of the discrete cubic and can be proven by induction or by a telescoping argument. For FP1, you just need to know the fact and use it — it's a useful sanity check that your $\\sum r^3$ formula is correct (if it doesn't match $[\\sum r]^2$, you've made an error).", "source": "GLM 5.1 ②", "_id": "glm_2_87", "judge_pick": true}, {"question": "Exam strategy — The revision guide says \"If a part feels disconnected, you've probably missed the link.\" Give an example from this paper where part (a)'s result is reused in part (b), and explain the link. (2 steps)", "answer": "- Step 1: Q5: Part (a) computes $(\\alpha^2+1)(\\beta^2+1) = 40$. Part (b) computes the new sum and product of roots, both of which have $(\\alpha^2+1)(\\beta^2+1)$ as the denominator. The link: 40 is the denominator in both $S = 24/40$ and $P = 3/40$.\n- Step 2: Without computing 40 in part (a), you'd need to compute it mid-way through part (b) while also managing the numerator factoring — a recipe for errors. The multi-part structure is deliberately designed to scaffold your work.", "source": "GLM 5.1 ②", "_id": "glm_2_88", "judge_pick": true}, {"question": "Conceptual — For the parabola $y^2 = 4ax$, the tangent at $(at^2, 2at)$ is $ty = x + at^2$. If you can't remember this formula, what's the fastest way to derive it in an exam? (3 steps)", "answer": "- Step 1: Differentiate implicitly: $2y\\frac{dy}{dx} = 4a$, so $\\frac{dy}{dx} = \\frac{2a}{y}$. At $(at^2, 2at)$: gradient $= \\frac{2a}{2at} = \\frac{1}{t}$.\n- Step 2: Use point-slope form: $y - 2at = \\frac{1}{t}(x - at^2)$.\n- Step 3: Multiply through by $t$: $ty - 2at^2 = x - at^2$, rearrange: $ty = x + at^2$. Total time: ~30 seconds if you're fluent with implicit differentiation.", "source": "GLM 5.1 ②", "_id": "glm_2_89", "judge_pick": true}, {"question": "Q8 (Parabola) — When finding the tangent at $Q(2/p^2, -4/p)$, the gradient is $\\frac{4}{y} = \\frac{4}{-4/p} = -p$. What sign error would give gradient $+p$ instead, and how would this affect the intersection point $R$? (2 steps)", "answer": "- Step 1: The error would be dropping the negative sign on $Q$'s $y$-coordinate, computing gradient as $\\frac{4}{4/p} = p$ instead of $\\frac{4}{-4/p} = -p$.\n- Step 2: With gradient $+p$, the tangent at $Q$ would be $y + 4/p = p(x - 2/p^2)$ instead of $y + 4/p = -p(x - 2/p^2)$. This changes the intersection with the tangent at $P$ completely — $R$ would no longer lie on the directrix, violating the theorem. The $x$-coordinate would depend on $p$ instead of being $-2$, which is a clear signal that something is wrong.", "source": "GLM 5.1 ②", "_id": "glm_2_90", "judge_pick": false}, {"question": "Q2 (Complex roots) — The quartic $2x^4 - 8x^3 + 29x^2 - 12x + 39 = 0$ has four roots: $2 \\pm 3i$ and $\\pm\\frac{\\sqrt{6}}{2}i$. How many real roots does it have? (2 steps)", "answer": "- Step 1: None. The roots $2 + 3i$ and $2 - 3i$ are complex (non-real), and $\\frac{\\sqrt{6}}{2}i$ and $-\\frac{\\sqrt{6}}{2}i$ are purely imaginary (also non-real, since their real part is 0).\n- Step 2: A \"real root\" requires the imaginary part to be zero. Here, all four roots have non-zero imaginary parts. The quartic has no real roots at all — its graph never crosses the $x$-axis. This is consistent with $2x^2 + 3 > 0$ for all real $x$ (the second quadratic factor has no real roots) and $x^2 - 4x + 13$ having negative discriminant ($16 - 52 < 0$).", "source": "GLM 5.1 ②", "_id": "glm_2_91", "judge_pick": false}, {"question": "Q4 (Matrix) — When computing $B^{-1}(BC)$, you could either first compute $BC$ and then multiply by $B^{-1}$, or use associativity: $B^{-1}(BC) = (B^{-1}B)C = IC = C$. Why can't you use the second approach in this question? (2 steps)", "answer": "- Step 1: The second approach requires knowing $C$ — but $C$ is what we're trying to find! The equation $BC = D$ gives us $D$ and $B$, and we need to solve for $C$.\n- Step 2: The algebraic identity $B^{-1}(BC) = C$ is *why* the method works, but computationally you must evaluate $B^{-1}D$ directly (multiply $B^{-1}$ by the known matrix $D = BC$). You can't shortcut through $C$ because $C$ is the unknown.", "source": "GLM 5.1 ②", "_id": "glm_2_92", "judge_pick": false}, {"question": "Q5 (Roots of quadratic) — When computing the new product $P = \\frac{\\alpha\\beta}{(\\alpha^2+1)(\\beta^2+1)}$, why can you immediately write the denominator as 40 without re-computing it? (1 step)", "answer": "Because $(\\alpha^2+1)(\\beta^2+1) = 40$ was already computed in part (a). This is the scaffolding principle: part (a)'s result is the denominator for both the new sum and the new product in part (b).", "source": "GLM 5.1 ②", "_id": "glm_2_93", "judge_pick": false}, {"question": "Conceptual — A student asks: \"For linear interpolation, can I use the formula $x = \\frac{a \\cdot f(b) - b \\cdot f(a)}{f(b) - f(a)}$ instead of the ratio method?\" Are these equivalent? (2 steps)", "answer": "- Step 1: Yes, they are algebraically equivalent. Both find the $x$-intercept of the chord joining $(a, f(a))$ and $(b, f(b))$. The formula $x = \\frac{a \\cdot f(b) - b \\cdot f(a)}{f(b) - f(a)}$ comes from setting the two-point form of the line equation to $y = 0$.\n- Step 2: However, the ratio method $\\alpha \\approx a + \\frac{|f(a)|}{|f(a)|+|f(b)|}(b-a)$ is less error-prone in exams because: (1) it uses absolute values, avoiding sign confusion, and (2) it has a clear geometric meaning (partition the interval proportionally). The algebraic formula requires careful attention to signs in $f(a)$ and $f(b)$.", "source": "GLM 5.1 ②", "_id": "glm_2_94", "judge_pick": true}, {"question": "Q9 (Induction) — In the conclusion sentence, you must state \"by the principle of mathematical induction.\" Why can't you just say \"by induction\"? (2 steps)", "answer": "- Step 1: Edexcel mark schemes specifically look for the phrase \"principle of mathematical induction\" — abbreviated or informal versions may not earn the conclusion mark.\n- Step 2: The full phrase demonstrates that you understand the logical structure: the base case and the inductive step together, via the *principle*, establish the result for all $n$ in the domain. \"By induction\" is vague — it could refer to inductive reasoning (which is not a proof). The principle of mathematical induction is a specific axiom of proof, and naming it shows you know the difference.", "source": "GLM 5.1 ②", "_id": "glm_2_95", "judge_pick": true}, {"question": "Edge case — For the series proof in Q1, what happens if you try $n = 1$ as a sanity check? Does $\\sum_{r=1}^{1} r(r^2+2) = 1(1+2) = 3$, and does $\\frac{1}{12}(1)(2)(3+3+12) = \\frac{1}{12} \\cdot 2 \\cdot 18 = 3$? What does this confirm? (2 steps)", "answer": "- Step 1: LHS: $\\sum_{r=1}^{1} r(r^2+2) = 1(3) = 3$. RHS: $\\frac{1}{12}(1)(2)(3+3+12) = \\frac{36}{12} = 3$. They match.\n- Step 2: This confirms the identity is correct for $n = 1$ — a useful sanity check before proceeding with the algebraic proof. If the values didn't match, you'd know your values of $a, b, c$ were wrong. This is a good exam habit: verify your final answer with a small case.", "source": "GLM 5.1 ②", "_id": "glm_2_96", "judge_pick": false}, {"question": "Q2 (Complex roots) — The question states \"you must show all stages of your working.\" If you used a calculator to find the quadratic factor or perform the division, what would happen? (2 steps)", "answer": "- Step 1: You would receive **zero marks** for the parts where calculator technology was used without shown working. The question explicitly bans calculator-reliant solutions.\n- Step 2: The rationale is that FP1 tests algebraic fluency — the ability to perform polynomial long division, expand brackets, and rationalise denominators by hand. A calculator bypasses these skills. The working must demonstrate the method, not just the answer. Partial credit is awarded for correct method with arithmetic errors, but not for calculator-produced answers with no method shown.", "source": "GLM 5.1 ②", "_id": "glm_2_97", "judge_pick": false}, {"question": "Q3 (Rectangular hyperbola) — What is the significance of the restriction $t \\neq 0$ for the parametric point $P(3t, 3/t)$? What goes wrong at $t = 0$? (2 steps)", "answer": "- Step 1: At $t = 0$, the $y$-coordinate $3/t$ is undefined (division by zero). The parametrisation breaks down.\n- Step 2: Geometrically, $t = 0$ would correspond to a point at infinity on the hyperbola — as $t \\to 0$, the point $(3t, 3/t)$ moves infinitely far along the $y$-axis. The hyperbola $xy = 9$ has no point with $x = 0$ or $y = 0$ (both are asymptotes), so $t = 0$ doesn't correspond to any finite point on the curve.", "source": "GLM 5.1 ②", "_id": "glm_2_98", "judge_pick": false}, {"question": "Synthesis — Across this paper, the \"factor early\" instinct appears in Q1 ($n(n+1)$), Q5 ($(α+β)(αβ+1)$), Q3 (known root $x = 3t$), Q8 ($(1+p^2)$), and Q9 ($4f(k) + 18(2-k)$). What is the common underlying principle? (2 steps)", "answer": "- Step 1: The common principle is: **keep expressions in factored form as long as possible, and only expand when absolutely necessary.** Factored forms reveal structure (common factors, cancellations, divisibility) that expanded forms obscure.\n- Step 2: In each case, expanding early creates a polynomial that must be re-factored — a difficult and error-prone step. By factoring first, you work with smaller, simpler expressions and the algebra practically writes itself. This is the single most important algebraic habit for FP1: factor symbolically, substitute numerically, expand only at the end if required.", "source": "GLM 5.1 ②", "_id": "glm_2_99", "judge_pick": true}], "count": 100}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "When a series question says \"Use the standard results for $\\sum r^2$ and $\\sum r^3$ to show that...\", what is the very first algebraic step you must take before applying any summation formulas? (2 steps)", "answer": "- Step 1: Expand the bracket inside the summation to separate it into individual power terms. For example, $\\sum r(r^2+2)$ must be split into $\\sum r^3 + 2\\sum r$.\n- Step 2: Apply the standard booklet formulas to each separated term individually. Do not attempt to find a formula for the unexpanded cubic-in-$r$ expression directly, as no such standard result exists.\nTakeaway: Always expand first to map the expression onto the known formulas for $\\sum r$, $\\sum r^2$, and $\\sum r^3$.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "In a series \"show that\" proof, after substituting the booklet formulas, you have $\\frac{1}{4}n^2(n+1)^2 + n(n+1)$. Why must you factor out $n(n+1)$ *before* expanding any brackets? (3 steps)", "answer": "- Step 1: Recognise that both terms share a common factor of $n(n+1)$.\n- Step 2: Factor it out: $n(n+1)\\left[\\frac{1}{4}n(n+1) + 1\\right]$. This keeps the algebra compact and manageable.\n- Step 3: If you expand first, you get a quartic polynomial that you must then factorise again from scratch to match the required \"show that\" form — a process that is slow, error-prone, and easily drops scaling constants like $\\frac{1}{4}$.\nTakeaway: Factor early to avoid algebraic explosion and sign errors.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": true}, {"question": "When a \"show that\" series question asks you to prove a result with a specific denominator like $\\frac{1}{12}$, but your derived answer has a denominator of $\\frac{1}{4}$, what algebraic manipulation must you perform? (3 steps)", "answer": "- Step 1: Recognise that $\\frac{1}{4}$ and $\\frac{1}{12}$ are equivalent fractions, just scaled by 3.\n- Step 2: Multiply both the numerator and the denominator by 3. For example, $\\frac{n(n+1)(n^2+n+4)}{4} = \\frac{3 \\cdot n(n+1)(n^2+n+4)}{3 \\cdot 4} = \\frac{3n(n+1)(n^2+n+4)}{12}$.\n- Step 3: Distribute the 3 into the quadratic factor to match the requested form $\\frac{1}{12}n(n+1)(an^2+bn+c)$, allowing you to read off $a, b, c$.\nTakeaway: Never leave the fraction un-scaled; the question specifies the denominator to force you to demonstrate this fraction manipulation.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "In a series question, the preamble lists standard results for $\\sum r^2$ and $\\sum r^3$, but your expansion only contains $\\sum r^3$ and $\\sum r$. What is the trap here, and how do you avoid it?", "answer": "- Step 1: The trap is assuming you *must* use every formula mentioned in the preamble, leading you to force $\\sum r^2$ into your working unnecessarily.\n- Step 2: The listed standard results are a *toolkit*, not a checklist. You only use the formulas required by the algebra of your expansion.\n- Step 3: If your expansion yields $\\sum r^3 + 2\\sum r$, you use only those two formulas and ignore $\\sum r^2$ entirely.\nTakeaway: Trust your algebra; ignore unused toolkit formulas.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "When a question gives a complex root of a real-coefficient polynomial and says \"write down another root,\" what property of polynomials must you invoke, and what is the answer? (2 steps)", "answer": "- Step 1: Invoke the property that for any polynomial with *real* coefficients, complex roots occur in conjugate pairs.\n- Step 2: The other root is the complex conjugate of the given root. If given $2+3i$, the answer is $2-3i$.\n+ Sub-case: If the coefficients were not guaranteed to be real, you could not assume the conjugate is also a root.\nTakeaway: \"Real coefficients $\\Rightarrow$ conjugate pairs\" is the trigger phrase for this question type.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "What is the shortcut formula for immediately writing down the real quadratic factor formed by a complex conjugate pair $z$ and $\\bar{z}$, and why is it faster than FOIL? (2 steps)", "answer": "- Step 1: The shortcut is $(x - z)(x - \\bar{z}) = x^2 - 2\\text{Re}(z)x + |z|^2$. For $z = 2+3i$, this gives $x^2 - 4x + 13$.\n- Step 2: It is faster than FOIL because it bypasses the expansion of $(x-2-3i)(x-2+3i)$ and the risk of $i^2$ sign errors, directly using the easily-computed real part and modulus squared.\nTakeaway: Memorise $x^2 - 2\\text{Re}(z)x + |z|^2$ to save time and avoid algebraic slips.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": true}, {"question": "When calculating $|2+3i|^2$ for the conjugate-pair quadratic factor shortcut, what is the common sign error, and why does it happen? (2 steps)", "answer": "- Step 1: The common error is writing $|2+3i|^2 = 2^2 - 3^2 = -5$ instead of the correct $2^2 + 3^2 = 13$.\n- Step 2: This happens due to a mental slip conflating the modulus formula $|z|^2 = a^2 + b^2$ with the difference of squares $(a+b)(a-b) = a^2 - b^2$, or incorrectly bringing the $i^2 = -1$ into the real calculation before taking the modulus.\nTakeaway: Modulus squared is *always* a sum of squares, never a difference.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "When performing algebraic long division of a quartic by a quadratic (e.g., $2x^4 \\dots$ divided by $x^2 \\dots$), how do you determine the first term of the quotient, and what is a common pitfall? (2 steps)", "answer": "- Step 1: Divide the leading term of the dividend by the leading term of the divisor: $\\frac{2x^4}{x^2} = 2x^2$.\n- Step 2: The common pitfall is writing $x^2$ instead of $2x^2$ because you are used to monic (leading coefficient 1) divisors. You must respect the leading coefficient of the divisor.\nTakeaway: Always check the leading coefficient when forming quotient terms.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "After solving $2x^2 + 3 = 0$, you get $x = \\pm\\sqrt{-\\frac{3}{2}}$. Why is leaving the answer in this form unacceptable, and what must you do? (2 steps)", "answer": "- Step 1: Leaving it as $\\pm\\sqrt{-\\frac{3}{2}}$ is un-simplified and obscures the pure imaginary nature of the root.\n- Step 2: You must convert it to standard form $bi$ where $b$ is a real surd: $\\sqrt{-\\frac{3}{2}} = i\\sqrt{\\frac{3}{2}} = i\\frac{\\sqrt{6}}{2}$. The final answer must be $\\pm\\frac{\\sqrt{6}}{2}i$.\nTakeaway: Full credit requires the clean $bi$ form with rationalised denominators and simplified surds.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "For the rectangular hyperbola $xy = c^2$ at the parametric point $P(ct, c/t)$, what are the gradients of the tangent and the normal, and what is the relationship between them? (2 steps)", "answer": "- Step 1: Differentiating $y = c^2/x$ gives $\\frac{dy}{dx} = -c^2/x^2$. At $x = ct$, the tangent gradient is $m_T = -c^2/(ct)^2 = -1/t^2$.\n- Step 2: The normal is perpendicular to the tangent, so $m_N = -1/m_T = t^2$. The sign flips and the reciprocal is taken.\nTakeaway: Tangent gradient $-1/t^2$; Normal gradient $t^2$. If the question says \"normal,\" you must use $t^2$.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": true}, {"question": "When forming the equation of a normal to the hyperbola at $P(ct, c/t)$, you get fractions like $y - c/t = t^2(x - ct)$. What algebraic step is required to reach the polynomial-in-$t$ form the examiner wants? (2 steps)", "answer": "- Step 1: Multiply through the entire equation by $t$ (or whatever denominator is present) to eliminate the fraction.\n- Step 2: This turns $ty - c = t^3(x - ct)$, which expands and rearranges cleanly into a polynomial form like $ty - t^3x = f(t)$, free of awkward fractional constants.\nTakeaway: \"Clear fractions by multiplying by $t$\" is the standard cleanup move for parametric conic equations.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "When finding where a normal to a curve \"meets the curve again,\" what powerful shortcut should you use to solve the resulting quadratic equation? (3 steps)", "answer": "- Step 1: Set up the intersection equation by substituting the curve equation into the normal equation, yielding a quadratic in $x$.\n- Step 2: Realise that the original point of contact $P$ is *already known* to be one of the intersection points. Therefore, $x_P$ is a guaranteed root.\n- Step 3: Instead of using the quadratic formula from scratch, factor the quadratic as $(x - x_P)(\\text{other factor}) = 0$ by inspection or polynomial division. Solve the \"other factor\" $= 0$ to find the \"again\" point, explicitly rejecting $x_P$.\nTakeaway: \"Meets again\" implies the original point is a known root; use it to bypass tedious calculation.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": true}, {"question": "A matrix transformation maps triangle $T$ to $T'$. If you are told \"The area of $T'$ is $k$ times the area of $T$,\" what equation must you write down involving the determinant? (2 steps)", "answer": "- Step 1: Write down the relationship Area scale factor $= |\\det M|$. This gives $|\\det M| = k$.\n- Step 2: The modulus signs are critical. The determinant could be positive or negative (representing a reflection), but area scale factor is strictly positive. You must solve $\\det M = k$ AND $\\det M = -k$.\n+ Pitfall: Dropping the absolute value bars and only solving $\\det M = k$ will cause you to miss half the possible values for any unknowns.\nTakeaway: Area scale factor $= |\\det M|$ always means solving two cases.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "When solving a matrix equation of the form $BC = D$ for the matrix $C$, why must you multiply by $B^{-1}$ in a specific order, and what is that order? (2 steps)", "answer": "- Step 1: Matrix multiplication is non-commutative, meaning $BC \\neq CB$. Therefore, you cannot just slap $B^{-1}$ anywhere.\n- Step 2: To isolate $C$, you must \"cancel\" $B$ on the left. So you pre-multiply both sides by $B^{-1}$: $B^{-1}(BC) = B^{-1}D \\implies C = B^{-1}D$.\n+ Pitfall: Writing $C = DB^{-1}$ is wrong because $(BC)B^{-1} = BCB^{-1} \\neq C$.\nTakeaway: $BC = D \\implies C = B^{-1}D$. Order matters!", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": true}, {"question": "What is the formula for the inverse of a $2 \\times 2$ matrix $M = \\begin{pmatrix} a & b \\\\ c & d \\end{pmatrix}$, and what is the most common sign error when writing it down? (2 steps)", "answer": "- Step 1: The formula is $M^{-1} = \\frac{1}{\\det M}\\begin{pmatrix} d & -b \\\\ -c & a \\end{pmatrix}$.\n- Step 2: The most common sign error is forgetting to apply the negative signs to $b$ and $c$, or incorrectly applying them to $a$ and $d$. The rule is \"swap $a$ and $d$, negate $b$ and $c$.\"\nTakeaway: Visualise the diagonal swap and the off-diagonal sign flip.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "When starting a \"roots of a quadratic\" question where $f(x) = x^2 + bx + c = 0$ has roots $\\alpha$ and $\\beta$, what two pieces of information must you write down immediately before attempting any other part? (2 steps)", "answer": "- Step 1: Write down the sum of the roots: $\\alpha + \\beta = -b$.\n- Step 2: Write down the product of the roots: $\\alpha\\beta = c$.\nTakeaway: These two identities are the foundation for every subsequent calculation in the question. Without them at the top of your page, you will inevitably make substitution errors.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "How do you express $\\alpha^2 + \\beta^2$ entirely in terms of the sum $\\alpha+\\beta$ and product $\\alpha\\beta$, and why is this necessary? (2 steps)", "answer": "- Step 1: Use the identity $\\alpha^2 + \\beta^2 = (\\alpha+\\beta)^2 - 2\\alpha\\beta$.\n- Step 2: This is necessary because you never know the individual values of $\\alpha$ and $\\beta$ (the question says \"without solving the equation\"), so you must express everything in terms of the symmetric functions $\\alpha+\\beta$ and $\\alpha\\beta$.\nTakeaway: Never try to find $\\alpha$ and $\\beta$ individually; use the symmetric identity.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "When calculating the new sum of roots $S = \\frac{\\alpha}{\\alpha^2+1} + \\frac{\\beta}{\\beta^2+1}$, the numerator expands to $\\alpha\\beta^2 + \\alpha + \\alpha^2\\beta + \\beta$. What is the crucial factoring trick to simplify this? (3 steps)", "answer": "- Step 1: Group the terms with $\\alpha\\beta$: $\\alpha\\beta^2 + \\alpha^2\\beta = \\alpha\\beta(\\beta + \\alpha)$.\n- Step 2: Group the remaining terms: $\\alpha + \\beta = 1 \\cdot (\\alpha + \\beta)$.\n- Step 3: Factor out the common $(\\alpha+\\beta)$: $\\alpha\\beta(\\alpha+\\beta) + 1(\\alpha+\\beta) = (\\alpha+\\beta)(\\alpha\\beta + 1)$.\nTakeaway: Always look to factor out $(\\alpha+\\beta)$ or $\\alpha\\beta$ rather than expanding and getting lost in $\\alpha^2\\beta$ terms.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": true}, {"question": "Once you have found the new sum $S$ and new product $P$ of the roots for a \"build a new quadratic\" question, what is the skeleton equation you write down, and what is the common sign pitfall? (2 steps)", "answer": "- Step 1: The skeleton equation is $x^2 - Sx + P = 0$.\n- Step 2: The common sign pitfall is writing $+Sx$ instead of $-Sx$. The coefficient of $x$ is always the *negative* of the sum of the roots.\nTakeaway: \"Minus the sum, plus the product.\"", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "If your new quadratic equation is $x^2 - \\frac{3}{5}x + \\frac{3}{40} = 0$, but the question asks for the form $px^2 + qx + r = 0$ where $p, q, r$ are integers, what must you do? (2 steps)", "answer": "- Step 1: Identify the denominators (5 and 40) and find their Least Common Multiple (40).\n- Step 2: Multiply the entire equation by 40 to clear the fractions: $40x^2 - 24x + 3 = 0$.\nTakeaway: \"Integers\" means you must clear all fractions. Leaving fractions in the coefficients loses the final accuracy marks.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "When dividing one complex number by another, e.g., $\\frac{z_2 z_3}{z_1}$, what is the standard algebraic technique to perform the division? (2 steps)", "answer": "- Step 1: Multiply both the numerator and the denominator by the complex conjugate of the denominator, $\\bar{z}_1$.\n- Step 2: This turns the denominator into $|z_1|^2$ (a real number), allowing you to separate the numerator into a real and imaginary part divided by a real scalar: $\\frac{z \\bar{w}}{|w|^2}$.\nTakeaway: Never divide directly; always rationalise the denominator using the conjugate.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "To find the argument $\\arg w$ of a complex number $x + iy$, you calculate $\\arctan(y/x)$. Why is this insufficient on its own, and what must you do first? (2 steps)", "answer": "- Step 1: $\\arctan(y/x)$ only gives values between $-\\pi/2$ and $\\pi/2$, which corresponds to the first and fourth quadrants.\n- Step 2: You must check the signs of $x$ and $y$ to determine the correct quadrant. If $x < 0$, you must add $\\pi$ (or subtract $\\pi$) to shift the angle to the second or third quadrant.\nTakeaway: Always quadrant-check before finalising an argument; $\\arctan$ lies about quadrants II and III.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "In a numerical methods question asking you to \"show that $f(x)=0$ has a root in the interval $[a,b]$,\" what two calculations and one verbal statement are required? (3 steps)", "answer": "- Step 1: Calculate $f(a)$ and state its sign.\n- Step 2: Calculate $f(b)$ and state its sign, noting that they are opposite.\n- Step 3: State the Intermediate Value Theorem logic: \"Since $f(x)$ is continuous on $[a,b]$ and $f(a)$ and $f(b)$ have opposite signs, there exists a root in $(a,b)$.\" The word \"continuous\" is mandatory for the mark.\nTakeaway: Calculate endpoints, note sign change, state \"continuous + sign change $\\Rightarrow$ root\".", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "When differentiating $f(x) = x^{3/2} + x - 3$ for the Newton-Raphson method, what is the most common term to accidentally omit, and why? (2 steps)", "answer": "- Step 1: The most common omission is the derivative of the linear term $x$, which is $1$.\n- Step 2: This happens because students focus on the fractional power rule $\\frac{3}{2}x^{1/2}$ and forget the simple linear term. The correct derivative is $f'(x) = \\frac{3}{2}x^{1/2} + 1$.\nTakeaway: Always count the terms in $f(x)$ and ensure $f'(x)$ has the same number of terms (excluding constants).", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "In the Newton-Raphson formula $x_{n+1} = x_n - \\frac{f(x_n)}{f'(x_n)}$, how does a missing \"$+1$\" in $f'(x_n)$ (e.g., using $1.76$ instead of $2.76$) affect the final answer? (2 steps)", "answer": "- Step 1: The correction term $\\frac{f(x_n)}{f'(x_n)}$ will be significantly larger than it should be because the denominator is smaller.\n- Step 2: Your next approximation $x_{n+1}$ will overshoot massively, often moving further from the root rather than closer.\nTakeaway: A small derivative error causes a massive divergence in NR iterations.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "When applying linear interpolation on the interval $[a,b]$ where $f(a)$ is negative and $f(b)$ is positive, what is the formula for the new approximation, and what is the common sign error? (2 steps)", "answer": "- Step 1: The formula partitions the interval in the ratio of the *absolute* values: $x \\approx a + \\frac{|f(a)|}{|f(a)| + |f(b)|}(b - a)$.\n- Step 2: The common sign error is using the signed values $\\frac{f(a)}{f(a)+f(b)}$ or $\\frac{-f(a)}{f(b)-f(a)}$, which can result in the ratio being negative or greater than 1, placing the approximation outside the interval.\nTakeaway: Linear interpolation uses the ratio of *distances*, which are always positive. Use absolute values.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "When carrying out numerical methods (like NR or LI) to find a root to 3 decimal places, how many decimal places should you keep in your intermediate calculations, and why? (2 steps)", "answer": "- Step 1: You should keep at least 5 decimal places in intermediate steps.\n- Step 2: Rounding to 3 dp at every step compounds rounding error. By the final step, the accumulated error can shift your 3rd decimal place, causing you to get the final answer wrong by 0.001.\nTakeaway: Work with high precision internally; only round the final answer.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "For the parabola $y^2 = 4ax$ at the parametric point $(at^2, 2at)$, what is the shortcut formula for the equation of the tangent? (2 steps)", "answer": "- Step 1: The shortcut formula is $ty = x + at^2$.\n- Step 2: This is derived from $y - 2at = \\frac{1}{t}(x - at^2)$ and multiplying by $t$. Memorising it saves valuable time and avoids differentiation/algebra errors in the exam.\nTakeaway: Parabola tangent shortcut: $ty = x + at^2$.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "If $P$ and $Q$ are the endpoints of a focal chord on a parabola (a chord passing through the focus), what is the special geometric property regarding their tangents? (2 steps)", "answer": "- Step 1: The tangents at the endpoints of any focal chord intersect on the directrix.\n- Step 2: For $y^2 = 4ax$, the directrix is $x = -a$. So if you intersect the tangents at $P$ and $Q$, the $x$-coordinate of the intersection point $R$ will always be $-a$, independent of the parameter $t$.\nTakeaway: Focal chord tangents meet on the directrix. Use this as a sanity check: if your intersection $x \\neq -a$, you made an error.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "When intersecting two tangent equations for a parabola, the algebra often gets messy. What is the key strategy to avoid \"algebra fatigue\" and errors? (2 steps)", "answer": "- Step 1: Substitute from the simpler tangent equation into the more complex one, rather than trying to eliminate variables simultaneously.\n- Step 2: Keep common factors (like $p^2+1$) visible and cancel them late. Do not expand brackets prematurely; look for factorisations that simplify the expression before you multiply out.\nTakeaway: Substitute cleanly, factor early, cancel late.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": true}, {"question": "In a proof by induction for divisibility, the inductive step requires showing $f(k+1)$ is divisible by $d$. Why is rewriting $f(k+1)$ as $A \\cdot f(k) + B$ often cleaner than computing $f(k+1) - f(k)$? (3 steps)", "answer": "- Step 1: The goal is to show $f(k+1)$ is a multiple of $d$. If we use $f(k+1) - f(k)$, we get a difference, say $C$. This means $f(k+1) = f(k) + C$.\n- Step 2: While $f(k)$ is divisible by $d$ by hypothesis, showing $C$ is divisible by $d$ often requires awkward modular arithmetic proofs (e.g., showing $3 \\cdot 4^k + 6$ is divisible by 18).\n- Step 3: Instead, if we express $f(k+1) = A \\cdot f(k) + B$ where $B$ is *explicitly* a multiple of $d$ (like $18(2-k)$), the proof becomes trivial: $A \\cdot f(k)$ is a multiple of $d$, and $B$ is a multiple of $d$, so their sum is a multiple of $d$.\nTakeaway: The $Af(k) + B$ method ensures both terms are transparently divisible by the target modulus.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": true}, {"question": "When choosing the base case for a proof by induction, what must you check in the question to ensure you pick the correct starting value of $n$? (2 steps)", "answer": "- Step 1: Look at the domain specified in the question, e.g., \"for $n \\in \\mathbb{Z}, n \\geq 2$\".\n- Step 2: Use the lowest value in that domain as your base case. For $n \\geq 2$, you must show $f(2)$ works, not $f(1)$.\n+ Pitfall: $f(1)$ might technically work (e.g., $f(1)=0$), but the proof is only required for the stated domain. Starting at $n=1$ misses the point of the specified constraint.\nTakeaway: Always use the stated lower bound as the base case.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": true}, {"question": "At the end of a proof by induction, what specific sentence must you write to get the final mark, and what three things must it reference? (2 steps)", "answer": "- Step 1: You must write a conclusion sentence that explicitly references the base case, the inductive step, and the principle of mathematical induction.\n- Step 2: Template: \"Since $f(2)$ is divisible by $d$, and if $f(k)$ is divisible by $d$ then $f(k+1)$ is divisible by $d$, by the principle of mathematical induction $f(n)$ is divisible by $d$ for all $n \\geq 2$.\"\nTakeaway: No conclusion sentence = no final mark. It must be a complete logical summary.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}], "count": 33}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "What is the first step when using standard results for $\\sum r^2$ and $\\sum r^3$ to prove a series identity? (3 steps)", "answer": "- Step 1: Expand the given expression (e.g., $r(r^2 + 2)$) and split into separate sums like $\\sum r^3 + 2\\sum r$.  \n- Step 2: Apply the factored forms of the standard results:  \n  $\\sum r^3 = \\tfrac{1}{4}n^2(n+1)^2$ and $\\sum r = \\tfrac{1}{2}n(n+1)$.  \n+ Example: Substituting these into $\\sum r^3 + 2\\sum r$ gives $\\tfrac{1}{4}n^2(n+1)^2 + n(n+1)$.  \n- Step 3: Factor common terms (e.g., $n(n+1)$) early to avoid polynomial expansion.  \n**Takeaway:** Factoring early simplifies the algebra and aligns with the required denominator (e.g., $\\tfrac{1}{12}$).", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why must you use the conjugate-pair quadratic factor $x^2 - 2\\operatorname{Re}(z)x + |z|^2$ for complex roots?", "answer": "Because if $x = a + bi$ is a root of a polynomial with real coefficients, its conjugate $a - bi$ is also a root. Multiplying $(x - (a+bi))(x - (a-bi))$ simplifies to $x^2 - 2a x + (a^2 + b^2)$, avoiding complex arithmetic.  \n+ Example: For $2 + 3i$, the factor is $x^2 - 4x + (4 + 9) = x^2 - 4x + 13$.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "What is the trigger phrase that forces you to use the conjugate-pair quadratic factor in polynomial division?", "answer": "\"Given that $x = a + bi$ is a root\" (and coefficients are real). This guarantees the conjugate is also a root, so their product is a real quadratic factor.  \n**Why not linear factors?** Complex roots alone are not real, so their product ensures real coefficients for division.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "How do you find the matrix $C$ in $BC = D$ when $B$ and $D$ are known? (3 steps)", "answer": "- Step 1: Confirm dimensions: If $B$ is $2\\times 2$ and $D$ is $2\\times 3$, $C$ must be $2\\times 3$.  \n- Step 2: Compute $B^{-1} = \\frac{1}{\\det B}\\begin{pmatrix}d & -b \\\\ -c & a\\end{pmatrix}$ for $B = \\begin{pmatrix}a & b \\\\ c & d\\end{pmatrix}$.  \n- Step 3: Multiply $C = B^{-1}D$.  \n**Common pitfall:** Confusing $B^{-1}D$ with $DB^{-1}$—matrix multiplication is non-commutative.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "What identity is critical for computing $\\alpha^2 + \\beta^2$ from the sum and product of roots?", "answer": "$\\alpha^2 + \\beta^2 = (\\alpha + \\beta)^2 - 2\\alpha\\beta$.  \n**Why?** This avoids calculating roots individually and uses Vieta's formulas directly.  \n+ Example: For $x^2 - 6x + 3 = 0$, $\\alpha + \\beta = 6$, $\\alpha\\beta = 3$, so $\\alpha^2 + \\beta^2 = 36 - 6 = 30$.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "What is the trick for dividing complex numbers without a calculator?", "answer": "Multiply numerator and denominator by the conjugate of the denominator to rationalize.  \n$$\n\\frac{z}{w} = \\frac{z \\cdot \\bar{w}}{|w|^2}\n$$  \n+ Example: $\\frac{2+3i}{3+2i} = \\frac{(2+3i)(3-2i)}{9+4} = \\frac{12 + 5i}{13}$.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "Why is the Newton-Raphson formula $x_{n+1} = x_n - \\frac{f(x_n)}{f'(x_n)}$ sensitive to $f'(x_n)$?", "answer": "If $f'(x_n)$ is near zero, the step size becomes large, risking divergence.  \n**Prevention:** Start with an initial guess where $f'(x)$ is not small.  \n+ Example: For $f(x) = x^{3/2} + x - 3$, $f'(x) = \\tfrac{3}{2}\\sqrt{x} + 1$—always positive, so safe.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "What is the theorem about tangents at the endpoints of a focal chord?", "answer": "The tangents intersect on the directrix.  \n**Proof intuition:** For a parabola $y^2 = 4ax$, the directrix is $x = -a$. The intersection point $R$ of tangents at $P$ and $Q$ (ends of a focal chord) always lies here.  \n+ Example: For $y^2 = 8x$, $R = (-2, \\text{something})$, matching the directrix $x = -2$.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "How do you structure an induction proof for divisibility by 18?", "answer": "- Step 1: Base case ($n=2$): Compute $4^2 + 6(2) - 10 = 18$, divisible by 18.  \n- Step 2: Inductive hypothesis: Assume $4^k + 6k - 10 = 18M$.  \n- Step 3: Express $4^{k+1} + 6(k+1) - 10 = 4(4^k + 6k - 10) - 18(k - 2)$, which is $4(18M) + 18(2 - k)$.  \n**Conclusion:** Both terms are multiples of 18, so divisibility holds.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": true}, {"question": "What is the common misapplication of $\\sum r^2$ in series proofs?", "answer": "Forcing its use when it’s unnecessary.  \n**Example:** In Q1, the question lists $\\sum r^2$, but the solution uses $\\sum r^3$ and $\\sum r$.  \n**Key:** Use only the standard results needed—ignore distractors in the question.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "Why must you use the exact form $\\frac{1}{12}n(n+1)(an^2 + bn + c)$ in series proofs?", "answer": "To match the required denominator.  \n**Process:** Factor $n(n+1)$ early, then scale numerator and denominator to $\\tfrac{1}{12}$.  \n+ Example: $\\frac{n(n+1)(n^2+n+4)}{4} = \\frac{3n(n+1)(n^2+n+4)}{12}$.", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "What is the trick for simplifying the product $\\frac{\\alpha}{\\alpha^2 + 1} + \\frac{\\beta}{\\beta^2 + 1}$?", "answer": "Factor the numerator:  \n$$\n\\alpha(\\beta^2 + 1) + \\beta(\\alpha^2 + 1) = \\alpha\\beta(\\alpha + \\beta) + (\\alpha + \\beta) = (\\alpha + \\beta)(\\alpha\\beta + 1)\n$$  \n**Why?** This avoids computing $\\alpha^2\\beta$ and $\\alpha\\beta^2$ separately.", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "How do you determine the quadrant for $\\arg w$ when computing arctangent?", "answer": "Check the signs of real and imaginary parts:  \n- $x > 0, y > 0$: quadrant I → $\\arg w = \\arctan(y/x)$.  \n- $x < 0, y > 0$: quadrant II → $\\arg w = \\pi - \\arctan(y/|x|)$.  \n- $x < 0, y < 0$: quadrant III → $\\arg w = \\pi + \\arctan(|y|/|x|)$.  \n- $x > 0, y < 0$: quadrant IV → $\\arg w = -\\arctan(|y|/x)$.", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "What is the key formula for the area scale factor under a matrix transformation?", "answer": "The area scale factor is $|\\det M|$.  \n**Example:** For $A = \\begin{pmatrix}3 & 8 \\\\ 3 & k\\end{pmatrix}$, $|\\det A| = |3k - 24| = 3$ → solve $3k - 24 = \\pm3$.", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "What is the standard form of the tangent to a parabola $y^2 = 4ax$ at parameter $t$?", "answer": "The tangent is $ty = x + at^2$, where the point is $(at^2, 2at)$.  \n**Derivation:** Differentiate implicitly: $2y \\frac{dy}{dx} = 4a$ → $\\frac{dy}{dx} = \\frac{2a}{y} = \\frac{1}{t}$.  \n**Equation:** Use point-slope: $y - 2at = \\frac{1}{t}(x - at^2)$ → simplified to $ty = x + at^2$.", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}, {"question": "What is the trick for solving $8x^2 - 45x - 18 = 0$ in Q3(b)?", "answer": "Use the known root $x = 6$ (from $t=2$) to factor:  \n$$\n8x^2 - 45x - 18 = (x - 6)(8x + 3)\n$$  \n**Why?** The quadratic formula is error-prone here; factoring exploits prior knowledge of one root.", "source": "Qwen 3 ①", "_id": "qwen_1_15", "judge_pick": false}, {"question": "How do you handle the modulus in $|\\det A| = 3$ for matrix area scaling?", "answer": "Solve $\\det A = \\pm3$:  \nFor $\\det A = 3k - 24$,  \n$$\n|3k - 24| = 3 \\Rightarrow 3k - 24 = 3 \\text{ or } 3k - 24 = -3 \\Rightarrow k = 9 \\text{ or } 7\n$$  \n**Common mistake:** Solving only $3k - 24 = 3$ and missing $k=7$.", "source": "Qwen 3 ①", "_id": "qwen_1_16", "judge_pick": false}, {"question": "What is the key identity for $\\alpha^3 + \\beta^3$ in terms of $\\alpha + \\beta$ and $\\alpha\\beta$?", "answer": "$$\n\\alpha^3 + \\beta^3 = (\\alpha + \\beta)^3 - 3\\alpha\\beta(\\alpha + \\beta)\n$$  \n**Application:** Useful for constructing new cubic equations from roots.  \n+ Example: If $\\alpha + \\beta = 6$, $\\alpha\\beta = 3$, $\\alpha^3 + \\beta^3 = 216 - 54 = 162$.", "source": "Qwen 3 ①", "_id": "qwen_1_17", "judge_pick": false}, {"question": "What is the first step when using linear interpolation to approximate a root?", "answer": "Identify the interval $[a, b]$ where $f(a)$ and $f(b)$ have opposite signs.  \n**Formula:**  \n$$\n\\alpha \\approx a + \\frac{|f(a)|}{|f(a)| + |f(b)|}(b - a)\n$$  \n**Why absolute values?** The partition ratio depends on the magnitudes, not signs.", "source": "Qwen 3 ①", "_id": "qwen_1_18", "judge_pick": false}, {"question": "How do you verify that a chord passes through the focus of a parabola?", "answer": "Substitute the focus coordinates into the chord’s equation and check if it satisfies the equation.  \n**Example:** For focus $(2, 0)$ and chord $y - 4p = \\frac{2p}{p^2 - 1}(x - 2p^2)$, substituting $x=2$, $y=0$ yields $-4p = \\frac{2p}{p^2 - 1}(2 - 2p^2)$, which simplifies to $-4p = -4p$.", "source": "Qwen 3 ①", "_id": "qwen_1_19", "judge_pick": true}], "count": 20}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "When expanding the sum $$\\sum_{r=1}^{n} r(r^2 + 2)$$ for simplification, what is the first algebraic step you should perform before applying standard summation formulas? (3 steps)", "answer": "- Step 1: Expand the bracket: $$\\sum_{r=1}^{n} r(r^2 + 2) = \\sum_{r=1}^{n} r^3 + 2\\sum_{r=1}^{n} r$$.  \n- Step 2: Apply standard formulas: $$\\sum r^3 = \\tfrac14 n^2(n+1)^2$$ and $$\\sum r = \\tfrac12 n(n+1)$$.  \n- Step 3: Factor out $n(n+1)$ early to avoid polynomial expansion: $$n(n+1)\\left[\\tfrac14 n(n+1) + 1\\right]$$.  \n\nThis avoids messy expansion and aligns with the factored form required in the answer.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "What is the first thing you should write down when asked to show that a quartic polynomial with real coefficients has a complex root $2-3i$? (1 step)", "answer": "- Step 1: Quote the **conjugate root theorem**: \"Given real coefficients, complex roots occur in conjugate pairs.\" This justifies why $2-3i$ must be a root if $2+3i$ is.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "How do you determine the normal gradient to the rectangular hyperbola $xy = 9$ at point $P(3t, 3/t)$? (3 steps)", "answer": "- Step 1: Differentiate $xy = 9$ explicitly: $y = 9/x$, so $\\frac{dy}{dx} = -9/x^2$.  \n- Step 2: Evaluate at $x = 3t$: $\\frac{dy}{dx} = -1/t^2$ (tangent gradient).  \n- Step 3: Take the negative reciprocal: normal gradient $= t^2$.  \n\nThis leverages the explicit derivative for faster computation than implicit differentiation.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "What is the key determinant property used to find matrix $A = \\begin{pmatrix} 3 & 8 \\\\ 3 & k \\end{pmatrix}$ such that the area scale factor is 3? (1 step)", "answer": "- Step 1: Use $|\\det A| = 3$. This gives $|3k - 24| = 3$, leading to $k = 9$ or $k = 7$. The absolute value ensures both positive and negative determinants are considered.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "What is the trick to simplify the numerator $\\alpha(\\beta^2+1) + \\beta(\\alpha^2+1)$ when finding the sum of roots for the new quadratic? (2 steps)", "answer": "- Step 1: Factor the expression: $\\alpha\\beta(\\alpha+\\beta) + (\\alpha+\\beta)$.  \n- Step 2: Factor further: $(\\alpha+\\beta)(\\alpha\\beta + 1)$. This avoids computing $\\alpha^2\\beta$ and $\\alpha\\beta^2$ separately, simplifying substitution.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "How do you rationalize the denominator when dividing complex numbers, such as $\\frac{z_2 z_3}{z_1}$? (3 steps)", "answer": "- Step 1: Multiply numerator and denominator by $\\bar{z}_1$ (the conjugate of $z_1$).  \n- Step 2: Compute the denominator: $|z_1|^2 = 3^2 + 2^2 = 13$.  \n- Step 3: Expand the numerator using distributive property: $(a+bi)(c-di)$, ensuring $i^2 = -1$ is applied.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Why must you include the derivative of $+x$ in $f(x) = x^{3/2} + x - 3$? (1 step)", "answer": "- Step 1: The derivative of $x$ is 1, so $f'(x) = \\tfrac{3}{2}x^{1/2} + 1$. Forgetting this term leads to an incorrect Newton-Raphson update.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "What is the general theorem about the intersection of tangents at the endpoints of a focal chord for a parabola? (1 step)", "answer": "- Step 1: Tangents at the endpoints of a focal chord intersect on the **directrix**. This confirms that the x-coordinate of point $R$ in Q8(c) must be $x = -2$.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "How do you rewrite $f(k+1)$ in terms of $f(k)$ for the induction proof of $4^n + 6n - 10$ divisible by 18? (2 steps)", "answer": "- Step 1: Express $f(k+1) = 4 \\cdot 4^k + 6k - 4$.  \n- Step 2: Substitute $4^k = f(k) - 6k + 10$: $f(k+1) = 4f(k) + 18(2 - k)$. This ensures both terms are divisible by 18.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "Why do you multiply both numerator and denominator by $t$ when finding the normal equation at $P(3t, 3/t)$? (1 step)", "answer": "- Step 1: To eliminate the fraction $3/t$ in the equation $y - 3/t = t^2(x - 3t)$. Multiplying by $t$ clears denominators and simplifies to $ty - t^3 x = 3 - 3t^4$.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "What is the key identity used to compute $\\alpha^2 + \\beta^2$ from $\\alpha + \\beta$ and $\\alpha\\beta$? (1 step)", "answer": "- Step 1: Use $\\alpha^2 + \\beta^2 = (\\alpha + \\beta)^2 - 2\\alpha\\beta$. This avoids computing individual roots.", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "How do you determine the coordinates of the intersection point $R$ for the tangents at $P$ and $Q$ on the parabola $y^2 = 8x$? (3 steps)", "answer": "- Step 1: Find tangent equations at $P$ and $Q$: $t y = x + 2t^2$ and $-\\frac{1}{t} y = x + \\frac{2}{t^2}$.  \n- Step 2: Solve the system by substitution or elimination.  \n- Step 3: Simplify to obtain $x = -2$ (directrix) and $y = 2t - 2/t$.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}, {"question": "What is the formula for the area scale factor under a matrix transformation $A$? (1 step)", "answer": "- Step 1: $|\\det A|$. This is critical for Q4(i), where the determinant's absolute value gives the area multiplier.", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": false}, {"question": "How do you perform linear interpolation on $[a,b]$ to approximate a root of $f(x)$? (2 steps)", "answer": "- Step 1: Partition the interval in the ratio $|f(a)| : |f(b)|$.  \n- Step 2: Compute the approximation: $x
