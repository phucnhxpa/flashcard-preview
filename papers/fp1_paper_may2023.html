<script>
const DATA={"selected": [{"question": "What theorem links the intersection point $R$ of tangents at $P$ and $Q$ to the parabola's directrix? (3 steps)", "answer": "- Step 1: Recognize $PQ$ as a focal chord passing through the focus $(2,0)$.\n- Step 2: Derive tangent equations using $dy/dx = 4/y$. At $P(2p^2, 4p)$, gradient is $1/p$.\n- Step 3: The intersection $R$ lies on the directrix $x = -2$ regardless of $p$. Final $R = (-2, 2p - 2/p)$.\n\n**Why it works:** Tangents at focal chord endpoints always meet on the directrix—a theorem worth memorizing.", "source": "Qwen 3 ④", "_id": "qwen_4_7"}, {"question": "FP1 Q6(d) — For $$\\arg w$$ with $$w = \\frac{4}{13} + \\frac{58}{13}i$$, what must you check before just punching $$\\arctan$$?", "answer": "The **quadrant**. Both real and imaginary parts are positive, so $$w$$ is in the first quadrant and $$\\arg w = \\arctan(\\text{Im}/\\text{Re}) = \\arctan(58/4)$$ is correct as-is. If $$\\text{Re} < 0$$, you'd add $$\\pi$$ (Q2) or subtract from $$-\\pi$$ (Q3). Always check the quadrant first.", "source": "Opus 4.7 ①", "_id": "opus_1_30"}, {"question": "In Q3(b), when the normal to $xy = 9$ at $t = 2$ intersects the hyperbola again, you obtain the quadratic $8x^2 - 45x - 18 = 0$. How do you use the known point $P(6, 1.5)$ to solve this efficiently without using the quadratic formula? (2 steps)", "answer": "- Step 1: You already know one solution: $x = 3t = 6$ (the original point $P$). Verify it satisfies the equation: $8(36) - 45(6) - 18 = 288 - 270 - 18 = 0$ ✓\n- Step 2: Since $x = 6$ is a root, factor by writing $8x^2 - 45x - 18 = (x - 6)(Ax + B)$. Matching coefficients: $(x - 6)(8x + 3) = 8x^2 + 3x - 48x - 18 = 8x^2 - 45x - 18$. So the other root is $x = -\\frac{3}{8}$.\n+ Then $y = \\frac{9}{x} = \\frac{9}{-3/8} = -24$.\n+ The second intersection is $\\left(-\\frac{3}{8}, -24\\right)$.\n\nThis \"use the known root to factor\" technique applies whenever you intersect a line or normal with a curve at a known parametric point.", "source": "MiniMax ①", "_id": "minimax_1_11"}, {"question": "In Q8, when finding the intersection of the tangents at $P$ and $Q$, what is the algebraic advantage of keeping the factor $(p^2+1)$ symbolic rather than substituting numerical values too early? (2 steps)", "answer": "- Step 1: When solving the simultaneous equations $py = x + 2p^2$ and $y = -px - \\frac{2}{p}$, you substitute $x = py - 2p^2$ into the second equation.\n- Step 2: This gives $y = -p(py - 2p^2) - \\frac{2}{p} = -p^2 y + 2p^3 - \\frac{2}{p}$.\n+ Rearranging: $y(1 + p^2) = 2p^3 - \\frac{2}{p} = \\frac{2(p^4 - 1)}{p} = \\frac{2(p^2-1)(p^2+1)}{p}$.\n+ The $(p^2+1)$ cancels on both sides, giving $y = \\frac{2(p^2-1)}{p}$.\n+ If you had substituted a numeric $p$ value earlier, you'd lose this cancellation structure and the algebra becomes messier.\n+ Finally, $x = py - 2p^2 = p \\cdot \\frac{2(p^2-1)}{p} - 2p^2 = 2(p^2-1) - 2p^2 = -2$.\n\nKeeping symbolic factors until the end is essential for the clean cancellation that reveals the directrix property ($x = -2$).", "source": "MiniMax ①", "_id": "minimax_1_15"}, {"question": "FP1 Q7(d) — Linear interpolation formula on $$[a, b]$$ with $$f(a) < 0 < f(b)$$. What's the partition rule and what must you use — signed or absolute values?", "answer": "Partition $$[a, b]$$ in ratio $$|f(a)| : |f(b)|$$, giving approximation $$\\alpha \\approx a + \\frac{|f(a)|}{|f(a)| + |f(b)|}\\cdot(b - a)$$. Use **absolute values** — the ratio represents distances, not signed quantities. Using signed values gives nonsense (negative weight on one side).", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "In matrix algebra, if $BC = D$ where $B$ is $2 \\times 2$ and $D$ is $2 \\times 3$, what is the correct procedure to find $C$, and why does $C \\neq DB^{-1}$? (2 steps)", "answer": "- Step 1: The equation is $BC = D$. To isolate $C$, multiply on the left by $B^{-1}$: $B^{-1}(BC) = B^{-1}D$, which gives $C = B^{-1}D$.\n- Step 2: Matrix multiplication is non-commutative — the order matters critically.\n+ $C = B^{-1}D$ is correct; $C = DB^{-1}$ would give a dimension mismatch ($3 \\times 2$ times $2 \\times 2$ is undefined in this context) and conceptually swaps the roles of the factors.\n+ Always identify the dimensions first: $B$ is $2 \\times 2$, $D$ is $2 \\times 3$, so $C$ must be $2 \\times 3$.\n\nFor $B = \\begin{pmatrix} a & 4 \\\\ 2 & 3 \\end{pmatrix}$ with $\\det B = 3a - 8$, the inverse is $\\frac{1}{3a-8}\\begin{pmatrix} 3 & -4 \\\\ -2 & a \\end{pmatrix}$.", "source": "MiniMax ①", "_id": "minimax_1_9"}, {"question": "The general theorem: tangents at the two endpoints of a focal chord on parabola $$y^2 = 4ax$$ meet at what locus?", "answer": "They meet on the **directrix** $$x = -a$$. This is a textbook FP1 theorem worth memorising — it gives you the answer to \"where do the tangents meet?\" before you compute. If your algebra produces an $$x$$-coordinate depending on parameters, you've made an error somewhere.", "source": "Opus 4.7 ②", "_id": "opus_2_42"}, {"question": "Q4 (Matrix transformations) — Why does $|\\det A| = 3$ give two values of $k$? What would the negative determinant value correspond to geometrically? (2 steps)", "answer": "- Step 1: $|3k - 24| = 3$ gives $3k - 24 = 3$ ($k = 9$, $\\det A = 3$) or $3k - 24 = -3$ ($k = 7$, $\\det A = -3$). Both give area scale factor $|-3| = 3$.\n- Step 2: A negative determinant corresponds to an **orientation-reversing** transformation (e.g., a reflection). The area still scales by $|\\det A| = 3$, but the shape is \"flipped.\" Both orientations are valid answers because the question only constrains the area scale factor, not the orientation.", "source": "GLM 5.1 ②", "_id": "glm_2_60"}, {"question": "FP1 May 2023 Q9 — In the inductive step of a divisibility proof, what is the strategic goal when expressing $f(k+1)$ in terms of $f(k)$? (2 steps)", "answer": "- Step 1: You want to write $f(k+1)$ as a sum of two terms: $A \\cdot f(k) + B$, where $A$ is an integer, and $B$ is *explicitly* a multiple of the target divisor (18).\n- Step 2: This works because if $f(k)$ is divisible by 18 (by the inductive hypothesis), then $A \\cdot f(k)$ is also divisible by 18. And if $B$ is explicitly a multiple of 18, then the sum of two multiples of 18 is also a multiple of 18, completing the step.", "source": "GLM 5.1 ①", "_id": "glm_1_41"}, {"question": "Q2 (Complex roots of quartic) — When told \"$x = 2+3i$ is a root\" of a polynomial with **real coefficients**, what root can you immediately write down, and what principle forces this? (2 steps)", "answer": "- Step 1: The other root is $\\boxed{2-3i}$, the complex conjugate.\n- Step 2: The principle is: **for any polynomial with real coefficients, complex roots occur in conjugate pairs.** If $z$ is a root, so is $\\bar{z}$. This is because conjugating the entire equation $a_n z^n + \\cdots + a_0 = 0$ gives $\\overline{a_n} \\bar{z}^n + \\cdots + \\overline{a_0} = 0$, and since all $a_i$ are real, $\\overline{a_i} = a_i$, so $\\bar{z}$ satisfies the same equation.\n\nExaminers sometimes want you to **state** \"real coefficients $\\Rightarrow$ complex roots come in conjugate pairs\" verbally for the mark.", "source": "GLM 5.1 ②", "_id": "glm_2_6"}, {"question": "FP1 Q5(b) — When forming the new sum $$\\frac{\\alpha}{\\alpha^2+1} + \\frac{\\beta}{\\beta^2+1}$$, what's the critical factoring trick on the numerator that students miss?", "answer": "Numerator is $$\\alpha(\\beta^2+1) + \\beta(\\alpha^2+1) = \\alpha\\beta^2 + \\alpha + \\alpha^2\\beta + \\beta$$. Factor as $$\\alpha\\beta(\\alpha+\\beta) + (\\alpha+\\beta) = (\\alpha+\\beta)(\\alpha\\beta+1)$$. Without this factoring, you're stuck trying to compute $$\\alpha^2\\beta + \\alpha\\beta^2$$ piece by piece. Spotting the $$(\\alpha+\\beta)$$ common factor is the whole point of the question.", "source": "Opus 4.7 ①", "_id": "opus_1_22"}, {"question": "FP1 Q6(d) — What's the formula for the ratio inside $$\\arctan$$ when computing an argument, and what's the easy mix-up?", "answer": "$$\\arg w = \\arctan(\\text{Im}/\\text{Re})$$ — imaginary part on top, real part on bottom. The mix-up is writing $$\\arctan(\\text{Re}/\\text{Im})$$, which gives the complementary angle. Mnemonic: argument measures \"how vertical\" the vector is, and verticality is rise over run = Im/Re.", "source": "Opus 4.7 ①", "_id": "opus_1_32"}, {"question": "Why does the new quadratic $$x^2 - \\tfrac35 x + \\tfrac{3}{40} = 0$$ need to be multiplied by 40, and how do you choose the multiplier?", "answer": "The question demands **integer** $$p, q, r$$. The denominators are 5 and 40; the LCM is 40. Multiplying through by 40 clears both fractions simultaneously: $$40x^2 - 24x + 3 = 0$$. Choose the LCM of all denominators — not the product, which would over-scale.", "source": "Opus 4.7 ②", "_id": "opus_2_25"}, {"question": "What’s the trigger phrase in Q9 that forces you to express $f(k+1)$ as $4f(k) + 18(\\text{...})$ instead of using $f(k+1) - f(k)$, and why is this algebraically cleaner? (3 steps)", "answer": "- Step 1: The phrase “divisible by 18” suggests rewriting $f(k+1)$ in terms of $f(k)$ to isolate multiples of 18.  \n- Step 2: Express $f(k+1) = 4^{k+1} + 6(k+1) - 10 = 4 \\cdot 4^k + 6k - 4$.  \n- Step 3: Factor $4 \\cdot 4^k$ as $4(f(k) - 6k + 10)$, then simplify:  \n  $$f(k+1) = 4f(k) - 18(k - 2).$$  \n+ **Why avoid $f(k+1) - f(k)$?** The subtraction approach requires proving $3 \\cdot 4^k + 6$ is divisible by 18, which is more modularly complex.  \n```\n\n## JARGON TABLE\n\n| | What does it mean? |\n| --- | --- |\n| **Series Proof** | \n| Conjugate-pair quadratic factor | A quadratic formed by multiplying $(x - z)(x - \\bar{z}) = x^2 - 2\\operatorname{Re}(z)x + |z|^2$. |\n| **Complex Roots** | \n| Focal chord | A chord of a conic that passes through the focus. |\n| **Parabola** | \n| Directrix | A line perpendicular to the axis of symmetry of a parabola; used in the definition of the curve. |\n| **Numerical Methods** | \n| Newton–Raphson process | An iterative method to find roots of a function using the derivative. |\n| Linear interpolation | A method to approximate a root by assuming the function is linear between two points. |\n| **Induction** | \n| Inductive hypothesis | The assumption that a statement holds for some integer $k$, used to prove it for $k+1$. |\n\n## FORMULA TABLE\n\n| $$LHS = ?$$ | Answer | Name / Hint |\n| --- | --- | --- |\n| **Series Proof** | \n| $$\\sum_{r=1}^n r^3 = ?$$ | $$= \\tfrac14 n^2(n+1)^2$$ | Cube sum equals square of sum of first $n$ integers. |\n| **Complex Roots** | \n| $$(x - z)(x - \\bar{z}) = ?$$ | $$= x^2 - 2\\operatorname{Re}(z)x + |z|^2$$ | Conjugate-pair factor shortcut. |\n| **Parabola** | \n| $$\\text{Tangent at } (at^2, 2at)$$ | $$ty = x + at^2$$ | Tangent equation for $y^2 = 4ax$. |\n| **Numerical Methods** | \n| $$x_{n+1} = ? \\text{ (Newton-Raphson)}$$ | $$= x_n - \\frac{f(x_n)}{f'(x_n)}$$ | Iterative root-finding formula. |\n| **Induction** | \n| $$f(k+1) = ? \\text{ (divisibility)}$$ | $$= 4f(k) + 18(2 - k)$$ | Express $f(k+1)$ in terms of $f(k)$ to prove divisibility. |", "source": "Qwen 3 ③", "_id": "qwen_3_8"}, {"question": "Q9 (Induction) — In the conclusion sentence, you must state \"by the principle of mathematical induction.\" Why can't you just say \"by induction\"? (2 steps)", "answer": "- Step 1: Edexcel mark schemes specifically look for the phrase \"principle of mathematical induction\" — abbreviated or informal versions may not earn the conclusion mark.\n- Step 2: The full phrase demonstrates that you understand the logical structure: the base case and the inductive step together, via the *principle*, establish the result for all $n$ in the domain. \"By induction\" is vague — it could refer to inductive reasoning (which is not a proof). The principle of mathematical induction is a specific axiom of proof, and naming it shows you know the difference.", "source": "GLM 5.1 ②", "_id": "glm_2_95"}, {"question": "What’s the trigger phrase in Q2(a) that forces you to write the conjugate root, and how do you form the quadratic factor without expanding $(x - z)(x - \\bar{z})$? (2 steps)", "answer": "- Step 1: The phrase “complex roots of the equation with real coefficients” forces the conjugate root $2 - 3i$ (since complex roots come in conjugate pairs).  \n- Step 2: Use the shortcut formula for the quadratic factor:  \n  $$(x - z)(x - \\bar{z}) = x^2 - 2\\operatorname{Re}(z)x + |z|^2.$$  \n  For $z = 2 + 3i$:  \n  $$\\operatorname{Re}(z) = 2, \\quad |z|^2 = 2^2 + 3^2 = 13 \\Rightarrow x^2 - 4x + 13.$$  \n+ **Why not FOIL?** The shortcut avoids errors in expanding $(x - 2 - 3i)(x - 2 + 3i)$.", "source": "Qwen 3 ③", "_id": "qwen_3_1"}, {"question": "FP1 Q3(b) — Why is recognising that $$P$$ itself lies on the normal a critical strategic insight, and what's the wording in the question that triggers this?", "answer": "The question says \"the normal meets $$H$$ **again**\" — the word \"again\" means you must reject the $$x = 3t = 6$$ root, because that's $$P$$. This trigger word also tells you the quadratic factors easily using the known root. Without this insight, you'd solve from scratch with the formula and possibly forget to discard $$P$$.", "source": "Opus 4.7 ①", "_id": "opus_1_13"}, {"question": "FP1 Q5(a) — To compute $$(\\alpha^2+1)(\\beta^2+1)$$, what's the expansion, and what's the symmetric-function trick?", "answer": "Expand: $$(\\alpha^2+1)(\\beta^2+1) = \\alpha^2\\beta^2 + \\alpha^2 + \\beta^2 + 1 = (\\alpha\\beta)^2 + (\\alpha^2+\\beta^2) + 1$$. Every term is now a symmetric function of the roots — fully expressible via sum and product. Substitute $$9 + 30 + 1 = 40$$. Never try to find $$\\alpha, \\beta$$ individually.", "source": "Opus 4.7 ①", "_id": "opus_1_21"}, {"question": "For the rectangular hyperbola $xy = c^2$ at the parametric point $P(ct, c/t)$, what are the gradients of the tangent and the normal, and what is the relationship between them? (2 steps)", "answer": "- Step 1: Differentiating $y = c^2/x$ gives $\\frac{dy}{dx} = -c^2/x^2$. At $x = ct$, the tangent gradient is $m_T = -c^2/(ct)^2 = -1/t^2$.\n- Step 2: The normal is perpendicular to the tangent, so $m_N = -1/m_T = t^2$. The sign flips and the reciprocal is taken.\nTakeaway: Tangent gradient $-1/t^2$; Normal gradient $t^2$. If the question says \"normal,\" you must use $t^2$.", "source": "GLM 5.1 ③", "_id": "glm_3_9"}, {"question": "When solving a matrix equation of the form $BC = D$ for the matrix $C$, why must you multiply by $B^{-1}$ in a specific order, and what is that order? (2 steps)", "answer": "- Step 1: Matrix multiplication is non-commutative, meaning $BC \\neq CB$. Therefore, you cannot just slap $B^{-1}$ anywhere.\n- Step 2: To isolate $C$, you must \"cancel\" $B$ on the left. So you pre-multiply both sides by $B^{-1}$: $B^{-1}(BC) = B^{-1}D \\implies C = B^{-1}D$.\n+ Pitfall: Writing $C = DB^{-1}$ is wrong because $(BC)B^{-1} = BCB^{-1} \\neq C$.\nTakeaway: $BC = D \\implies C = B^{-1}D$. Order matters!", "source": "GLM 5.1 ③", "_id": "glm_3_13"}, {"question": "FP1 Q8(c) — The final answer is $$R = (-2,\\ 2p - 2/p)$$. What's the \"simplest form\" requirement that distinguishes a marker-acceptable answer from a deduct-marks answer?", "answer": "Write $$2p - 2/p$$ (split into separate terms), not $$\\frac{2p^2 - 2}{p}$$ (single fraction). \"Simplest form\" prefers the additively-split form for clean reading. Examiners deduct presentation marks for unnecessarily compound fractions when an equivalent split exists.", "source": "Opus 4.7 ①", "_id": "opus_1_47"}, {"question": "FP1 May 2023 Q7(a) — When showing that $f(x)=0$ has a root in $[a,b]$, what two verbal statements MUST accompany your sign checks $f(a)<0$ and $f(b)>0$? (2 steps)", "answer": "- Step 1: You must state that $f(x)$ is **continuous** over the interval $[a,b]$. The Intermediate Value Theorem requires continuity; without it, a sign change doesn't guarantee a root (the graph could jump over the x-axis).\n- Step 2: You must state the conclusion: \"Since $f(x)$ is continuous and changes sign, there is a root in the interval.\" Markers explicitly look for the word \"continuous\" and the logical deduction.", "source": "GLM 5.1 ①", "_id": "glm_1_29"}, {"question": "What is the shortcut formula for immediately writing down the real quadratic factor formed by a complex conjugate pair $z$ and $\\bar{z}$, and why is it faster than FOIL? (2 steps)", "answer": "- Step 1: The shortcut is $(x - z)(x - \\bar{z}) = x^2 - 2\\text{Re}(z)x + |z|^2$. For $z = 2+3i$, this gives $x^2 - 4x + 13$.\n- Step 2: It is faster than FOIL because it bypasses the expansion of $(x-2-3i)(x-2+3i)$ and the risk of $i^2$ sign errors, directly using the easily-computed real part and modulus squared.\nTakeaway: Memorise $x^2 - 2\\text{Re}(z)x + |z|^2$ to save time and avoid algebraic slips.", "source": "GLM 5.1 ③", "_id": "glm_3_5"}, {"question": "Conceptual — Why does the conjugate-pair shortcut $(x-z)(x-\\bar{z}) = x^2 - 2\\text{Re}(z)x + |z|^2$ always produce a quadratic with **real** coefficients? (2 steps)", "answer": "- Step 1: $2\\text{Re}(z)$ is real because the real part of any complex number is real. $|z|^2$ is real because the modulus squared is always a non-negative real number.\n- Step 2: More fundamentally, $(x-z)(x-\\bar{z}) = x^2 - (z+\\bar{z})x + z\\bar{z}$. Since $z + \\bar{z} = 2\\text{Re}(z) \\in \\mathbb{R}$ and $z\\bar{z} = |z|^2 \\in \\mathbb{R}$, all coefficients are real. This is why complex roots of real-coefficient polynomials come in conjugate pairs: only conjugate pairs produce real quadratic factors, and any real polynomial can be factored into real linear and real quadratic factors.", "source": "GLM 5.1 ②", "_id": "glm_2_71"}, {"question": "FP1 May 2023 Q8(c) — When intersecting two tangent equations to find their meeting point $R$, what algebraic fatigue pitfall should you avoid, and what is the strategic alternative? (2 steps)", "answer": "- Step 1: Avoid expanding everything into a massive polynomial in $p$ immediately. This leads to sign errors and lost terms.\n- Step 2: Keep the parameter $p$ factored as long as possible. For instance, when solving $y(1+p^2) = \\frac{2(p^4-1)}{p}$, recognize the difference of two squares: $p^4-1 = (p^2-1)(p^2+1)$. The $(p^2+1)$ terms cancel cleanly, leaving $y = \\frac{2(p^2-1)}{p}$.", "source": "GLM 5.1 ①", "_id": "glm_1_38"}, {"question": "Q1 (Series proof) — When substituting $\\sum r^3 = \\tfrac14 n^2(n+1)^2$ and $\\sum r = \\tfrac12 n(n+1)$, should you use the **factored** forms from the booklet, or expand them into polynomial form first? Why? (2 steps)", "answer": "- Step 1: Use the **factored** forms directly. The booklet gives $\\sum r^3 = \\tfrac14 n^2(n+1)^2$ and $\\sum r = \\tfrac12 n(n+1)$ — keep them as-is.\n- Step 2: The reason is that \"show that\" questions always expect you to arrive at a factored final answer. If you expand first, you create a polynomial mess that you must then re-factor — slow, error-prone, and you can easily drop the $\\tfrac14$ vs $\\tfrac{1}{12}$ scaling. The factored forms make the common factor $n(n+1)$ immediately visible.\n\nExpanding is a one-way door: easy to do, hard to undo. Stay factored until the end.", "source": "GLM 5.1 ②", "_id": "glm_2_1"}, {"question": "Q7 (Numerical methods) — For part (d), linear interpolation is applied on the interval $[1.25, 1.5]$, not $[1, 2]$. How do you know which interval to use? (2 steps)", "answer": "- Step 1: Part (b) established that $\\alpha \\in [1.25, 1.5]$ after two bisections. Part (d) says \"use linear interpolation once on the interval $[1.25, 1.5]$\" — the question explicitly gives you the interval.\n- Step 2: If the question doesn't specify, use the **most refined interval** you've established so far. Using $[1, 2]$ would still work in principle but gives a much cruder approximation. The whole point of the multi-part structure is that each part refines the interval for the next method.", "source": "GLM 5.1 ②", "_id": "glm_2_36"}, {"question": "Q6 (Complex arithmetic) — To compute $w = \\frac{z_2 z_3}{z_1}$ where $z_1 = 3+2i$, what is the standard method for dividing by a complex number, and what is the geometric motivation? (2 steps)", "answer": "- Step 1: Multiply numerator and denominator by the **conjugate** of the denominator: $\\frac{z_2 z_3}{z_1} = \\frac{z_2 z_3 \\cdot \\bar{z}_1}{z_1 \\cdot \\bar{z}_1} = \\frac{z_2 z_3 \\cdot \\bar{z}_1}{|z_1|^2}$. The denominator becomes the real number $|z_1|^2 = 13$, and the numerator is a standard complex multiplication.\n- Step 2: The motivation is that $z\\bar{z} = |z|^2$ is always real and positive. This \"rationalises\" the denominator (analogous to rationalising surds), converting the division into a real-scalar division plus a complex multiplication — both of which are straightforward.", "source": "GLM 5.1 ②", "_id": "glm_2_26"}, {"question": "Q4 (Matrix transformations) — Given $BC = D$ where $B$ is $2 \\times 2$ and $D$ is $2 \\times 3$, you need to find $C$. Should you compute $B^{-1}D$ or $DB^{-1}$? Why does order matter? (2 steps)", "answer": "- Step 1: Compute $C = B^{-1}D$, **not** $DB^{-1}$. Left-multiply both sides of $BC = D$ by $B^{-1}$: $B^{-1}(BC) = B^{-1}D$, so $(B^{-1}B)C = B^{-1}D$, giving $C = B^{-1}D$.\n- Step 2: Matrix multiplication is **non-commutative**: $B^{-1}D \\neq DB^{-1}$ in general. Right-multiplying would give $BCB^{-1} = DB^{-1}$, which doesn't isolate $C$. The rule: to undo a left-multiplication, left-multiply by the inverse; to undo a right-multiplication, right-multiply.", "source": "GLM 5.1 ②", "_id": "glm_2_17"}, {"question": "Q1 (Series proof) — The question lists both $\\sum r^2$ and $\\sum r^3$ as available standard results, but the algebra only uses $\\sum r^3$ and $\\sum r$. What's the lesson about how to read such lists? (2 steps)", "answer": "- Step 1: The listed standard results form a **toolkit**, not a checklist. You use the ones the algebra requires — in this case, expanding $r(r^2+2) = r^3 + 2r$ produces $\\sum r^3$ and $\\sum r$, but never $\\sum r^2$.\n- Step 2: Don't be misled into thinking you must use every formula mentioned. Some questions include extra formulas as distractors or for completeness. Let the algebra tell you which tools to reach for, not the list.", "source": "GLM 5.1 ②", "_id": "glm_2_4"}, {"question": "How do you verify that a chord passes through the focus of a parabola?", "answer": "Substitute the focus coordinates into the chord’s equation and check if it satisfies the equation.  \n**Example:** For focus $(2, 0)$ and chord $y - 4p = \\frac{2p}{p^2 - 1}(x - 2p^2)$, substituting $x=2$, $y=0$ yields $-4p = \\frac{2p}{p^2 - 1}(2 - 2p^2)$, which simplifies to $-4p = -4p$.", "source": "Qwen 3 ①", "_id": "qwen_1_19"}, {"question": "Q8 (Parabola focal chord) — To show that chord $PQ$ passes through the focus $(2,0)$, what is the strategy: find the chord equation and substitute the focus, or find the focus and substitute into the chord? (2 steps)", "answer": "- Step 1: Find the chord equation (slope $m = 2p/(p^2-1)$, through $P$), then **substitute the focus $(2,0)$** into it and verify the equation is satisfied: $0 - 4p = \\frac{2p}{p^2-1}(2 - 2p^2) = -4p$. ✓\n- Step 2: This is a verification strategy, not a solving strategy. You're confirming that a known point lies on a known line. The alternative — solving for the intersection of $PQ$ with $x = 2$ — also works but is more roundabout. Verification is faster and less error-prone.", "source": "GLM 5.1 ②", "_id": "glm_2_39"}, {"question": "Conceptual — A student asks: \"For linear interpolation, can I use the formula $x = \\frac{a \\cdot f(b) - b \\cdot f(a)}{f(b) - f(a)}$ instead of the ratio method?\" Are these equivalent? (2 steps)", "answer": "- Step 1: Yes, they are algebraically equivalent. Both find the $x$-intercept of the chord joining $(a, f(a))$ and $(b, f(b))$. The formula $x = \\frac{a \\cdot f(b) - b \\cdot f(a)}{f(b) - f(a)}$ comes from setting the two-point form of the line equation to $y = 0$.\n- Step 2: However, the ratio method $\\alpha \\approx a + \\frac{|f(a)|}{|f(a)|+|f(b)|}(b-a)$ is less error-prone in exams because: (1) it uses absolute values, avoiding sign confusion, and (2) it has a clear geometric meaning (partition the interval proportionally). The algebraic formula requires careful attention to signs in $f(a)$ and $f(b)$.", "source": "GLM 5.1 ②", "_id": "glm_2_94"}, {"question": "When using linear interpolation (false position method) on an interval $[a, b]$ where $f(a) < 0$ and $f(b) > 0$, what is the formula for the approximated root, and why must you use absolute values? (2 steps)", "answer": "- Step 1: The formula is $x \\approx a + \\frac{|f(a)|}{|f(a)| + |f(b)|} \\cdot (b - a)$.\n+ The interval is partitioned in the ratio $|f(a)| : |f(b)|$ — the closer $f$ is to zero at an endpoint, the closer the approximation is to that endpoint.\n- Step 2: You must use absolute values because the method uses the magnitudes of the function values, not their signs.\n+ If $f(a) = -0.35$ and $f(b) = 0.34$, then $|f(a)| + |f(b)| = 0.69$.\n+ Using signed values ($-0.35 + 0.34 = -0.01$) would give the wrong denominator and destroy the approximation.\n\nThis is distinct from bisection, which simply takes the midpoint regardless of function magnitudes.", "source": "MiniMax ①", "_id": "minimax_1_8"}, {"question": "Q7 (Numerical methods) — Geometrically, what does linear interpolation compute, and how does the formula relate to similar triangles? (2 steps)", "answer": "- Step 1: Linear interpolation finds the $x$-intercept of the **chord** joining $(a, f(a))$ and $(b, f(b))$.\n- Step 2: By similar triangles, the distance from $a$ to the intercept is $\\frac{|f(a)|}{|f(a)|+|f(b)|} \\times (b-a)$. The triangle with vertex at $(a, f(a))$ and base along the $x$-axis is similar to the full triangle with vertices at both endpoints. The ratio of the \"height\" $|f(a)|$ to the total \"height\" $|f(a)| + |f(b)|$ equals the ratio of the base of the sub-triangle to the total base $(b-a)$.", "source": "GLM 5.1 ②", "_id": "glm_2_57"}, {"question": "Q9 (Induction: divisibility) — The statement to prove is \"for $n \\in \\mathbb{Z}$, $n \\geq 2$, $4^n + 6n - 10$ is divisible by 18.\" What value should you use for the base case, and why is choosing $n = 1$ a mistake (even though it works)? (2 steps)", "answer": "- Step 1: Use $n = 2$: $f(2) = 16 + 12 - 10 = 18 = 18 \\times 1$. ✓\n- Step 2: Using $n = 1$ gives $f(1) = 4 + 6 - 10 = 0$, and $0 = 18 \\times 0$ is technically divisible by 18. But the question specifies $n \\geq 2$ as the domain — you must prove the statement for that domain, starting at its lower bound. Using $n = 1$ doesn't match the stated range and may lose the base-case mark even though the arithmetic is correct.\n\nAlways read the domain restriction carefully.", "source": "GLM 5.1 ②", "_id": "glm_2_45"}, {"question": "When a question says \"you must show all stages of your working. Solutions relying on calculator technology are not acceptable\", what's the practical consequence for marking?", "answer": "Every algebraic step must appear on paper — multiplications, conjugate operations, simultaneous equation eliminations — even if mechanical. Marks live in the working, not the final answer. Skipping steps (e.g. writing $$w = 4/13 + 58i/13$$ directly from a calculator) scores zero even if correct, because the examiner can't verify the method.", "source": "Opus 4.7 ①", "_id": "opus_1_53"}, {"question": "FP1 Q8 — What's the test for whether two points $$P, Q$$ on $$y^2 = 4ax$$ with parameters $$t_1, t_2$$ form a focal chord?", "answer": "$$t_1 t_2 = -1$$. This is the algebraic signature of a focal chord (chord through the focus). For Q8, $$t_P = p$$ and $$t_Q = -1/p$$, so $$t_P t_Q = -1$$ ✓. Once you spot this, you know the chord passes through the focus before doing any algebra.", "source": "Opus 4.7 ①", "_id": "opus_1_42"}, {"question": "Q8 (Parabola focal chord) — The question asks for coordinates of $R$ \"in simplest form.\" Why is $\\left(-2, \\frac{2p^2-2}{p}\\right)$ not acceptable, and what is the simplest form? (2 steps)", "answer": "- Step 1: $\\frac{2p^2-2}{p}$ can be split as $\\frac{2p^2}{p} - \\frac{2}{p} = 2p - \\frac{2}{p}$. The simplest form is $R = \\left(-2, 2p - \\frac{2}{p}\\right)$.\n- Step 2: \"Simplest form\" in Edexcel means: no compound fractions (fractions within fractions), no common factors, and separate terms where possible. $\\frac{2p^2-2}{p}$ is a single compound fraction; $2p - 2/p$ is two clean terms. Examiners deduct for \"simplification\" failures.", "source": "GLM 5.1 ②", "_id": "glm_2_44"}, {"question": "Q8 (Parabola focal chord) — For the parabola $y^2 = 4ax$ at point $(at^2, 2at)$, what is the tangent equation? Give the formula and the derivation trigger. (2 steps)", "answer": "- Step 1: The tangent equation is $ty = x + at^2$. For $a = 2$: $ty = x + 2t^2$.\n- Step 2: Derivation trigger: differentiate $y^2 = 4ax$ implicitly to get $2y\\frac{dy}{dx} = 4a$, so $\\frac{dy}{dx} = \\frac{2a}{y}$. At $(at^2, 2at)$: gradient $= \\frac{2a}{2at} = \\frac{1}{t}$. Then $y - 2at = \\frac{1}{t}(x - at^2)$, multiply by $t$: $ty - 2at^2 = x - at^2$, giving $ty = x + at^2$.\n\nThis formula is **not** in the booklet — memorise it.", "source": "GLM 5.1 ②", "_id": "glm_2_40"}, {"question": "How do you structure an induction proof for divisibility by 18?", "answer": "- Step 1: Base case ($n=2$): Compute $4^2 + 6(2) - 10 = 18$, divisible by 18.  \n- Step 2: Inductive hypothesis: Assume $4^k + 6k - 10 = 18M$.  \n- Step 3: Express $4^{k+1} + 6(k+1) - 10 = 4(4^k + 6k - 10) - 18(k - 2)$, which is $4(18M) + 18(2 - k)$.  \n**Conclusion:** Both terms are multiples of 18, so divisibility holds.", "source": "Qwen 3 ①", "_id": "qwen_1_8"}, {"question": "Exam strategy — When a question says \"in simplest form\" (as in Q8(c) for the coordinates of $R$), what does Edexcel require? (2 steps)", "answer": "- Step 1: No compound fractions (fractions within fractions), no uncancelled common factors, and separate terms where possible. For example, $\\frac{2p^2-2}{p}$ must be written as $2p - \\frac{2}{p}$.\n- Step 2: Surds must be rationalised where possible, and $\\sqrt{-3/2}$ must be written as $\\frac{\\sqrt{6}}{2}i$. \"Simplest form\" is not a suggestion — it's a marking requirement, and failure to simplify costs marks.", "source": "GLM 5.1 ②", "_id": "glm_2_51"}, {"question": "When intersecting two tangent equations for a parabola, the algebra often gets messy. What is the key strategy to avoid \"algebra fatigue\" and errors? (2 steps)", "answer": "- Step 1: Substitute from the simpler tangent equation into the more complex one, rather than trying to eliminate variables simultaneously.\n- Step 2: Keep common factors (like $p^2+1$) visible and cancel them late. Do not expand brackets prematurely; look for factorisations that simplify the expression before you multiply out.\nTakeaway: Substitute cleanly, factor early, cancel late.", "source": "GLM 5.1 ③", "_id": "glm_3_29"}, {"question": "Q9 (Induction: divisibility) — In the inductive step, you show $f(k+1) = 4f(k) + 18(2-k) = 4 \\cdot 18M + 18(2-k) = 18(4M + 2 - k)$. Why is it important to write $f(k+1) = 18(\\ldots)$ with the explicit bracket? (2 steps)", "answer": "- Step 1: Writing $f(k+1) = 18(4M + 2 - k)$ makes it **visually obvious** that $f(k+1)$ is a multiple of 18, since $4M + 2 - k$ is clearly an integer (as $M$ and $k$ are integers).\n- Step 2: Without this explicit factorisation, you're asking the marker to infer divisibility from \"$4 \\times 18M + 18(2-k)$\" — while logically equivalent, the mark scheme often requires you to factor out the 18 to demonstrate the divisibility conclusively. Show, don't make the examiner work.", "source": "GLM 5.1 ②", "_id": "glm_2_48"}, {"question": "When finding where a normal to a curve \"meets the curve again,\" what powerful shortcut should you use to solve the resulting quadratic equation? (3 steps)", "answer": "- Step 1: Set up the intersection equation by substituting the curve equation into the normal equation, yielding a quadratic in $x$.\n- Step 2: Realise that the original point of contact $P$ is *already known* to be one of the intersection points. Therefore, $x_P$ is a guaranteed root.\n- Step 3: Instead of using the quadratic formula from scratch, factor the quadratic as $(x - x_P)(\\text{other factor}) = 0$ by inspection or polynomial division. Solve the \"other factor\" $= 0$ to find the \"again\" point, explicitly rejecting $x_P$.\nTakeaway: \"Meets again\" implies the original point is a known root; use it to bypass tedious calculation.", "source": "GLM 5.1 ③", "_id": "glm_3_11"}, {"question": "When choosing the base case for a proof by induction, what must you check in the question to ensure you pick the correct starting value of $n$? (2 steps)", "answer": "- Step 1: Look at the domain specified in the question, e.g., \"for $n \\in \\mathbb{Z}, n \\geq 2$\".\n- Step 2: Use the lowest value in that domain as your base case. For $n \\geq 2$, you must show $f(2)$ works, not $f(1)$.\n+ Pitfall: $f(1)$ might technically work (e.g., $f(1)=0$), but the proof is only required for the stated domain. Starting at $n=1$ misses the point of the specified constraint.\nTakeaway: Always use the stated lower bound as the base case.", "source": "GLM 5.1 ③", "_id": "glm_3_31"}, {"question": "When the normal at $$P$$ (with $$t=2$$) meets the hyperbola $$xy=9$$ \"again\", what's the shortcut you must exploit instead of using the quadratic formula?", "answer": "$$P$$ itself sits on both curves, so $$x = 3t = 6$$ is automatically one root of the intersection quadratic $$8x^2 - 45x - 18 = 0$$. Factor as $$(x-6)(8x+3)$$ — the other root drops out instantly. **Why this beats the quadratic formula:** the discriminant has ugly arithmetic ($$45^2 + 4\\cdot 8\\cdot 18 = 2601 = 51^2$$); the known-root method bypasses it.", "source": "Opus 4.7 ②", "_id": "opus_2_12"}, {"question": "FP1 Q8(c) — There's a powerful geometric theorem about tangents at the endpoints of a focal chord. State it and explain why it predicts the answer to part (c) before any algebra.", "answer": "**Theorem:** Tangents at the endpoints of a focal chord of a parabola meet on the directrix. For $$y^2 = 8x$$, directrix is $$x = -2$$, so the intersection point $$R$$ must have $$x = -2$$. Useful as a sanity check: if your algebra gives an $$x$$-coordinate depending on $$p$$, you've made an error.", "source": "Opus 4.7 ①", "_id": "opus_1_45"}, {"question": "In a proof by induction for divisibility, the inductive step requires showing $f(k+1)$ is divisible by $d$. Why is rewriting $f(k+1)$ as $A \\cdot f(k) + B$ often cleaner than computing $f(k+1) - f(k)$? (3 steps)", "answer": "- Step 1: The goal is to show $f(k+1)$ is a multiple of $d$. If we use $f(k+1) - f(k)$, we get a difference, say $C$. This means $f(k+1) = f(k) + C$.\n- Step 2: While $f(k)$ is divisible by $d$ by hypothesis, showing $C$ is divisible by $d$ often requires awkward modular arithmetic proofs (e.g., showing $3 \\cdot 4^k + 6$ is divisible by 18).\n- Step 3: Instead, if we express $f(k+1) = A \\cdot f(k) + B$ where $B$ is *explicitly* a multiple of $d$ (like $18(2-k)$), the proof becomes trivial: $A \\cdot f(k)$ is a multiple of $d$, and $B$ is a multiple of $d$, so their sum is a multiple of $d$.\nTakeaway: The $Af(k) + B$ method ensures both terms are transparently divisible by the target modulus.", "source": "GLM 5.1 ③", "_id": "glm_3_30"}, {"question": "What does \"solutions relying on calculator technology are not acceptable\" mean operationally for paper presentation?", "answer": "Every algebraic step must be shown explicitly. For Q2: show the conjugate-pair quadratic factor, the long division, the surd simplification. For Q6: show the conjugate multiplication, the simultaneous equation setup and elimination. Partial credit is awarded for *working*, not just the final answer. A calculator-derived correct answer with no working scores zero on these flagged questions.", "source": "Opus 4.7 ②", "_id": "opus_2_53"}, {"question": "Q9 (Induction) — In the inductive step, you need to express $f(k+1) = 4^{k+1} + 6(k+1) - 10$ in terms of $f(k) = 4^k + 6k - 10$. Walk through the algebraic manoeuvre of constructing $4f(k)$. (3 steps)", "answer": "- Step 1: Start with $f(k+1) = 4 \\cdot 4^k + 6k + 6 - 10 = 4 \\cdot 4^k + 6k - 4$.\n- Step 2: We want to see $f(k)$ in here. Note $f(k) = 4^k + 6k - 10$, so $4f(k) = 4 \\cdot 4^k + 24k - 40$.\n- Step 3: Write $f(k+1) = 4f(k) + (6k - 4) - (24k - 40) = 4f(k) + 6k - 4 - 24k + 40 = 4f(k) - 18k + 36 = 4f(k) + 18(2-k)$. The key insight: multiply $f(k)$ by 4 to match the $4 \\cdot 4^k$ term, then adjust the remaining terms to cancel what 4 over-contributed.", "source": "GLM 5.1 ②", "_id": "glm_2_64"}, {"question": "Synthesis — You encounter a question: \"The matrix $M$ transforms a region of area 5 to a region of area 15. Find $|\\det M|$.\" A second question: \"The matrix $N = \\begin{pmatrix} k & 3 \\\\ 1 & k \\end{pmatrix}$ transforms a shape, and the area scales by 4. Find $k$.\" Explain why the first has one answer and the second has two. (2 steps)", "answer": "- Step 1: First question: $|\\det M| = 15/5 = 3$. This is a single value — you're computing the absolute value of the determinant, which is always positive.\n- Step 2: Second question: $|\\det N| = |k^2 - 3| = 4$, so $k^2 - 3 = 4$ (giving $k = \\pm\\sqrt{7}$) or $k^2 - 3 = -4$ (giving $k^2 = -1$, no real solutions). Here the absolute value equation $|k^2 - 3| = 4$ has multiple solutions because the determinant is an expression in $k$ that can be positive or negative. The key: when the determinant is a known number, $|\\det| = 3$ is one answer; when it's an expression in an unknown, $|\\text{expression}| = k$ typically gives multiple values.", "source": "GLM 5.1 ②", "_id": "glm_2_69"}, {"question": "The cleanest inductive-step strategy for divisibility induction: how do you rewrite $$f(k+1)$$?", "answer": "Express $$f(k+1) = A \\cdot f(k) + B$$, where $$A$$ is an integer and $$B$$ is *explicitly* a multiple of the target modulus. For Q9: $$f(k+1) = 4f(k) + 18(2-k)$$. Then since $$f(k)$$ is divisible by 18 (hypothesis) and $$18(2-k)$$ is trivially divisible by 18, the sum is divisible by 18. The template: **multiplier times hypothesis + obvious-multiple-of-modulus**.", "source": "Opus 4.7 ②", "_id": "opus_2_49"}, {"question": "Before computing $$C = B^{-1}D$$ in FP1 May 2023 Q4(ii), what dimensional check should you do?", "answer": "$$B$$ is $$2\\times 2$$ and $$D=BC$$ is $$2\\times 3$$, so $$C$$ must be $$2\\times 3$$ (inner dimensions match, outer dimensions form the product shape). Doing this check first saves you from writing the wrong-shape matrix and noticing the error only at the end.", "source": "Opus 4.7 ②", "_id": "opus_2_18"}, {"question": "FP1 May 2023 Q6(d) — To find $\\arg w$ for $w = x + iy$, why can't you simply calculate $\\arctan(y/x)$ and call it a day? (2 steps)", "answer": "- Step 1: The function $\\arctan(y/x)$ only returns values between $-\\pi/2$ and $\\pi/2$ (the first and fourth quadrants). It cannot distinguish between quadrants diagonally opposite each other (e.g., $(x,y)$ vs $(-x,-y)$ have the same $y/x$ ratio).\n- Step 2: You must check the signs of $x$ and $y$ to determine the correct quadrant for $w$. If $w$ is in the second or third quadrant, you must add or subtract $\\pi$ from the $\\arctan$ result to find the true argument.", "source": "GLM 5.1 ①", "_id": "glm_1_27"}, {"question": "Given a conjugate pair $$z, \\bar z$$ of roots, what's the shortcut formula for their real quadratic factor — and why does it save time over FOIL?", "answer": "$$(x-z)(x-\\bar z) = x^2 - 2\\operatorname{Re}(z)\\,x + |z|^2$$. This avoids expanding the product $$(x-(a+bi))(x-(a-bi))$$ from scratch every time. For $$z=2+3i$$: $$\\operatorname{Re}=2$$, $$|z|^2 = 4+9 = 13$$, so the factor is $$x^2-4x+13$$. Two numbers, zero risk of $$i^2$$ sign errors.", "source": "Opus 4.7 ②", "_id": "opus_2_5"}, {"question": "FP1 May 2023 Q7(a) — to show $$f(x)=0$$ has a root in $$[1,2]$$, what *three* things must you state explicitly?", "answer": "(1) Evaluate $$f(1)$$ and $$f(2)$$ and show they have opposite signs. (2) State that $$f$$ is **continuous** on $$[1,2]$$. (3) Invoke the **Intermediate Value Theorem** (or equivalent wording: \"by sign change\"). Markers check for the continuity statement explicitly — without it, the IVT doesn't apply.", "source": "Opus 4.7 ②", "_id": "opus_2_32"}, {"question": "FP1 Q8(a) — To verify $$Q\\left(\\frac{2}{p^2}, -\\frac{4}{p}\\right)$$ lies on $$y^2 = 8x$$, what's the cleanest verification approach?", "answer": "Check $$y^2 = 8x$$ rather than $$y = \\pm\\sqrt{8x}$$. Compute $$y^2 = \\frac{16}{p^2}$$ and $$8x = \\frac{16}{p^2}$$ — equal, done. Using the square-rooted form forces a sign discussion ($$y < 0$$ branch), which is unnecessary work.", "source": "Opus 4.7 ①", "_id": "opus_1_40"}, {"question": "Q7 (Numerical methods) — Write down the Newton-Raphson formula. What does each term represent geometrically? (2 steps)", "answer": "- Step 1: $x_{n+1} = x_n - \\frac{f(x_n)}{f'(x_n)}$.\n- Step 2: Geometrically, $x_{n+1}$ is the $x$-intercept of the **tangent line** to $y = f(x)$ at the point $(x_n, f(x_n))$. The tangent has slope $f'(x_n)$, so its equation is $y - f(x_n) = f'(x_n)(x - x_n)$. Setting $y = 0$ and solving for $x$ gives the formula. The correction term $f(x_n)/f'(x_n)$ is the \"run\" corresponding to the \"rise\" $f(x_n)$ on a line of slope $f'(x_n)$.", "source": "GLM 5.1 ②", "_id": "glm_2_56"}, {"question": "Why must \"meets the hyperbola again\" wording force you to reject one root of the intersection equation?", "answer": "The normal passes through $$P$$ by construction, so $$P$$'s $$x$$-coordinate is *always* a root of the intersection equation. \"Again\" means \"second intersection\" — you must discard the $$P$$-root. Forgetting this and reporting $$P$$'s coordinates as the answer would be a comprehension failure, not an algebra failure.", "source": "Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "When building a quadratic with roots $\\frac{\\alpha}{\\alpha^2+1}$ and $\\frac{\\beta}{\\beta^2+1}$, what factoring trick avoids messy algebra? (3 steps)", "answer": "- Step 1: Compute the numerator of the new root sum: $\\alpha(\\beta^2+1) + \\beta(\\alpha^2+1)$.\n- Step 2: Factor as $(\\alpha+\\beta)(\\alpha\\beta + 1)$. For $\\alpha+\\beta=6$, $\\alpha\\beta=3$, this becomes $6 \\cdot 4 = 24$.\n- Step 3: Use the denominator from part (a): $(\\alpha^2+1)(\\beta^2+1) = 40$. New sum is $24/40 = 3/5$.\n\n**Why this works:** Factoring avoids computing $\\alpha^2\\beta$ and $\\alpha\\beta^2$ separately, which is error-prone.", "source": "Qwen 3 ④", "_id": "qwen_4_4"}, {"question": "Q3 (Normal to rectangular hyperbola) — After writing the normal equation $y - 3/t = t^2(x - 3t)$, the question demands the form $ty - t^3 x = f(t)$. What algebraic move achieves this, and why is it necessary? (2 steps)", "answer": "- Step 1: **Multiply both sides by $t$** to clear the fraction $3/t$. This gives $ty - 3 = t^3 x - 3t^4$, then rearrange: $ty - t^3 x = 3 - 3t^4$.\n- Step 2: The question specifies a polynomial-in-$t$ form with no fractions. Multiplying by $t$ eliminates the $1/t$ term and produces a clean left-hand side $ty - t^3 x$ and a polynomial right-hand side $f(t) = 3 - 3t^4$. Examiners insist on this form — leaving fractions loses the format mark.", "source": "GLM 5.1 ②", "_id": "glm_2_13"}, {"question": "The key trick in FP1 May 2023 Q5(b): when computing the numerator $$\\alpha(\\beta^2+1)+\\beta(\\alpha^2+1)$$, what factoring step makes the algebra collapse?", "answer": "Rewrite as $$\\alpha\\beta^2 + \\alpha + \\alpha^2\\beta + \\beta = \\alpha\\beta(\\alpha+\\beta) + (\\alpha+\\beta) = (\\alpha+\\beta)(\\alpha\\beta+1)$$. The two pairs $$\\alpha\\beta^2 + \\alpha^2\\beta$$ and $$\\alpha+\\beta$$ each contain the factor $$(\\alpha+\\beta)$$. Without spotting this, you'd compute $$\\alpha^2\\beta + \\alpha\\beta^2$$ separately and the algebra balloons.", "source": "Opus 4.7 ②", "_id": "opus_2_23"}, {"question": "FP1 Q2 — Common mental slip: computing $$|2+3i|^2$$. What's the trap, and what's the correct value?", "answer": "The trap is writing $$|2+3i|^2 = 2^2 - 3^2 = -5$$ (treating it like $$(a+b)(a-b)$$). The correct definition is $$|z|^2 = (\\operatorname{Re})^2 + (\\operatorname{Im})^2 = 4 + 9 = 13$$ — always a **plus**, never a minus. Mnemonic: modulus measures distance, and distance is positive.", "source": "Opus 4.7 ①", "_id": "opus_1_8"}, {"question": "In the inductive step for divisibility by 18, what is the strategic rewrite of $f(k+1)$ that makes the proof straightforward? (3 steps)", "answer": "- Step 1: Let $f(n) = 4^n + 6n - 10$. Compute $f(k+1) = 4^{k+1} + 6(k+1) - 10 = 4 \\cdot 4^k + 6k - 4$.\n- Step 2: Express in terms of $f(k)$: $f(k+1) = 4(4^k + 6k - 10) - 24k + 40 + 6k - 4 = 4f(k) - 18k + 36$.\n- Step 3: Rewrite as $f(k+1) = 4f(k) + 18(2-k)$. Now both terms are clearly divisible by 18: $4f(k)$ is 4 times a multiple of 18, and $18(2-k)$ has the factor 18 explicitly.", "source": "MiniMax ②", "_id": "minimax_2_30"}, {"question": "Conceptual — Why does Newton-Raphson converge faster than bisection near a simple root? Give an intuitive explanation. (2 steps)", "answer": "- Step 1: Bisection halves the interval width each step — the error reduces by a factor of 2 (linear convergence). Newton-Raphson uses the tangent, which approximates the curve locally by a straight line — the error roughly **squares** each step (quadratic convergence).\n- Step 2: Intuitively, bisection throws away half the interval regardless of the function's shape. Newton-Raphson exploits the function's local geometry (its derivative) to aim directly at the root. Near a simple root, the tangent is an excellent approximation, so each step corrects almost all the remaining error. The trade-off: Newton-Raphson requires $f'(x)$ and can diverge if the initial guess is poor or the derivative is near zero.", "source": "GLM 5.1 ②", "_id": "glm_2_82"}, {"question": "Q7 (Numerical methods) — In the linear interpolation formula on $[a,b]$, you partition the interval in the ratio $|f(a)| : |f(b)|$. What happens if you use signed values $f(a)$ and $f(b)$ instead of absolute values? (2 steps)", "answer": "- Step 1: Since $f(a)$ and $f(b)$ have opposite signs (there's a root between them), using signed values would give a ratio with one negative component, placing the interpolation point **outside** the interval $[a,b]$ — nonsensical.\n- Step 2: The correct formula is $$\\alpha \\approx a + \\frac{|f(a)|}{|f(a)| + |f(b)|}(b - a).$$ The absolute values ensure the ratio is between 0 and 1, so the approximation lies inside $[a,b]$. Geometrically, you're finding where the chord crosses the $x$-axis, and the partition ratio must be positive.", "source": "GLM 5.1 ②", "_id": "glm_2_35"}, {"question": "When the question says \"give your answer in the form $$px^2 + qx + r = 0$$ where $$p,q,r$$ are integers,\" what mistake is most costly?", "answer": "Leaving fractions in the final answer. The phrasing is an *instruction*, not a hint. Always clear fractions (multiply by LCM of denominators) and state $$p, q, r$$ explicitly. Examiners specifically deduct for \"form not matching the requested integer coefficients.\"", "source": "Opus 4.7 ②", "_id": "opus_2_55"}, {"question": "Why does Newton–Raphson sometimes converge faster than linear interpolation, but be more fragile?", "answer": "- Step 1: NR uses the **tangent** (local derivative info), giving quadratic convergence near simple roots — error roughly squares per step.\n- Step 2: LI uses the **chord** (two-point secant info), giving slower (superlinear, around $$\\phi \\approx 1.618$$) convergence.\n- Step 3: NR's fragility: if $$f'(x_n)$$ is near zero, the step blows up. LI is robust because it always stays inside a bracketing interval. **Practical rule:** use NR for speed when you're close to the root; use LI/bisection for safety when you're not.", "source": "Opus 4.7 ②", "_id": "opus_2_38"}, {"question": "In part (b) of Q5, when finding the sum $S = \\frac{\\alpha}{\\alpha^2+1} + \\frac{\\beta}{\\beta^2+1}$, what is the critical factoring trick for the numerator, and why does it work? (4 steps)", "answer": "- Step 1: Combine fractions: numerator = $\\alpha(\\beta^2+1) + \\beta(\\alpha^2+1) = \\alpha\\beta^2 + \\alpha + \\alpha^2\\beta + \\beta$.\n- Step 2: Group as $\\alpha\\beta(\\alpha+\\beta) + (\\alpha+\\beta) = (\\alpha+\\beta)(\\alpha\\beta + 1)$.\n- Step 3: Substitute known values: $(6)(3+1) = 6 \\times 4 = 24$. This avoids expanding $\\alpha^2\\beta + \\alpha\\beta^2$ individually.\n- Step 4: Denominator from part (a) is 40, so $S = 24/40 = 3/5$. This \"rearrange before substituting\" trick is the hallmark of FP1 root manipulation questions.", "source": "MiniMax ②", "_id": "minimax_2_14"}, {"question": "FP1 Q5(b) — Why is part (a)'s answer of 40 strategically important for part (b)?", "answer": "Because $$(\\alpha^2+1)(\\beta^2+1) = 40$$ is exactly the **denominator** of both the new sum $$S = \\frac{(\\alpha+\\beta)(\\alpha\\beta+1)}{40}$$ and the new product $$P = \\frac{\\alpha\\beta}{40}$$. FP1 questions are structurally scaffolded — part (a) is rarely independent of part (b). If a sub-result feels reusable, it's almost certainly needed downstream.", "source": "Opus 4.7 ①", "_id": "opus_1_23"}, {"question": "FP1 May 2023 Q6(b) — when computing $$w = z_2 z_3 / z_1$$ with $$z_3 = a+bi$$ unknown, what's the strategy order: divide first or multiply first?", "answer": "Multiply first ($$z_2 z_3$$), then divide by $$z_1$$. The reason: $$z_2 z_3$$ produces an expression in $$a, b$$ with clean real/imag separation; dividing this by a fixed complex number $$z_1$$ is then a standard \"multiply by conjugate\" operation. Trying to divide $$z_2/z_1$$ first then multiply by $$z_3$$ creates fractions with $$a,b$$ inside, making the final equation messier.", "source": "Opus 4.7 ②", "_id": "opus_2_26"}, {"question": "FP1 Q3(b) — The normal at $$P$$ meets $$xy = 9$$ again. After substituting $$y = 9/x$$ into the normal, you get $$8x^2 - 45x - 18 = 0$$. What's the shortcut to factor this without quadratic formula?", "answer": "You already know $$x = 3t = 6$$ is a root (because $$P$$ itself lies on the normal). Verify: $$8(36) - 45(6) - 18 = 0$$ ✓. Then $$(x - 6)$$ is a factor and the other factor must be $$(8x + 3)$$ by inspection (constants multiply to $$-18$$, cross-terms give $$-45x$$). This skips the quadratic formula entirely.", "source": "Opus 4.7 ①", "_id": "opus_1_12"}, {"question": "Edge case — For the parabola $y^2 = 4ax$, what happens to the focal chord when $p = 1$? Does the theorem about tangents meeting on the directrix still hold? (2 steps)", "answer": "- Step 1: When $p = 1$: $P = (a, 2a)$ and $Q = (2, -4)$. For $a = 2$: $P = (2, 4)$, $Q = (2, -4)$. The chord $PQ$ is the vertical line $x = 2$, which passes through the focus $(2, 0)$ — it's a focal chord (specifically, the latus rectum).\n- Step 2: The tangent at $P$ has gradient $1/p = 1$, and the tangent at $Q$ has gradient $-p = -1$. Their intersection: from $y = x + a$ and $y = -x - 2a$, solving gives $x = -a$, $y = 0$. Wait — let me recalculate for $a=2$: tangent at $P$: $y = x + 2$, tangent at $Q$: $y = -x - 4$. Intersection: $x + 2 = -x - 4$, so $2x = -6$, $x = -3$. Hmm, that gives $x = -3 \\neq -2$. The issue is $Q$ when $p = 1$: $Q = (2/1, -4/1) = (2, -4)$. Check: $(-4)^2 = 16 = 8(2) = 16$ ✓. The tangent at $Q(2, -4)$: $\\frac{dy}{dx} = \\frac{4}{y} = \\frac{4}{-4} = -1$. So $y + 4 = -1(x - 2)$, giving $y = -x - 2$. Tangent at $P(2, 4)$: gradient $= 4/4 = 1$, so $y - 4 = 1(x-2)$, giving $y = x + 2$. Intersect: $x + 2 = -x - 2$, so $2x = -4$, $x = -2$. ✓ The theorem holds: $x = -2$ is the directrix.", "source": "GLM 5.1 ②", "_id": "glm_2_66"}, {"question": "Q8 (Parabola) — Walk through the verification that chord $PQ$ passes through the focus $(2,0)$ by substituting $(2,0)$ into the chord equation. Why does the factor $(p^2-1)$ cancel? (3 steps)", "answer": "- Step 1: Chord equation at $P$: $y - 4p = \\frac{2p}{p^2-1}(x - 2p^2)$. Substitute $(2, 0)$: $0 - 4p = \\frac{2p}{p^2-1}(2 - 2p^2)$.\n- Step 2: Factor the right side: $2 - 2p^2 = -2(p^2-1)$. So the right side becomes $\\frac{2p}{p^2-1} \\cdot (-2)(p^2-1) = \\frac{2p \\cdot (-2)(p^2-1)}{p^2-1}$.\n- Step 3: The $(p^2-1)$ cancels (since $p \\neq \\pm 1$, which would make $P = Q$), leaving $2p \\cdot (-2) = -4p$. So $-4p = -4p$ ✓. The cancellation is the algebraic signature of the focal chord property.", "source": "GLM 5.1 ②", "_id": "glm_2_83"}, {"question": "Q9 (Induction: divisibility) — In the inductive step, what is the strategic approach for expressing $f(k+1)$ in terms of $f(k)$, and why is the alternative $f(k+1) - f(k)$ problematic? (3 steps)", "answer": "- Step 1: The strategy is to write $f(k+1) = A \\cdot f(k) + B$ where $A$ is an integer and $B$ is **explicitly** divisible by 18. Here: $f(k+1) = 4f(k) + 18(2-k)$.\n- Step 2: The derivation: $f(k+1) = 4^{k+1} + 6(k+1) - 10 = 4 \\cdot 4^k + 6k - 4$. We want to express this using $f(k) = 4^k + 6k - 10$. Multiply $f(k)$ by 4: $4f(k) = 4 \\cdot 4^k + 24k - 40$. So $f(k+1) = 4f(k) - 18k + 36 = 4f(k) + 18(2-k)$.\n- Step 3: The alternative $f(k+1) - f(k) = 3 \\cdot 4^k + 6$ is technically divisible by 18 (using modular arithmetic: $4^k \\equiv 4 \\pmod{6}$ for $k \\geq 1$, so $3 \\cdot 4^k + 6 \\equiv 12 + 6 = 18 \\equiv 0$), but this modular argument is much harder to write rigorously in an exam. The $4f(k) + 18(\\ldots)$ form makes divisibility by 18 visually obvious.", "source": "GLM 5.1 ②", "_id": "glm_2_46"}, {"question": "\"In simplest form\" — for $$R = (-2, 2p - 2/p)$$, why isn't $$\\left(-2, \\frac{2p^2-2}{p}\\right)$$ acceptable?", "answer": "Examiners deduct for unsimplified forms. $$\\frac{2p^2-2}{p} = 2p - \\frac{2}{p}$$ — the second form separates clearly into two terms. The rule of thumb: simplest form means **no compound fractions, no unnecessary factoring, and each component as a sum/difference of simple terms** when possible.", "source": "Opus 4.7 ②", "_id": "opus_2_47"}, {"question": "Common pitfall: when computing $$|z|^2$$ for the conjugate-pair quadratic factor, what sign error sneaks in?", "answer": "Students sometimes write $$|2+3i|^2 = 2^2 - 3^2$$, confusing it with $$z\\bar z$$ \"containing\" $$-i^2$$. The correct formula is $$|z|^2 = a^2 + b^2$$ — strictly a sum. The minus sign students remember belongs in $$(a+bi)(a-bi) = a^2 - (bi)^2 = a^2 + b^2$$, where the $$-i^2$$ flips back to $$+$$.", "source": "Opus 4.7 ②", "_id": "opus_2_6"}, {"question": "FP1 Q7(b) — After bisecting once and finding $$f(1.5) > 0$$, which sub-interval contains the root, and what's the directional rule?", "answer": "$$[1, 1.5]$$, because $$f(1) < 0$$ and $$f(1.5) > 0$$ — the sign change is on this side. Rule: after computing $$f$$(midpoint), keep the sub-interval where the **signs differ**. The root lives at the boundary between negative and positive values.", "source": "Opus 4.7 ①", "_id": "opus_1_34"}, {"question": "Once $$w = \\frac{12a-5b}{13} + \\frac{5a+12b}{13}i$$ is set equal to $$\\tfrac{4}{13} + \\tfrac{58}{13}i$$, how do you proceed?", "answer": "Equate real and imaginary parts separately to get a 2×2 system: $$12a-5b=4$$ and $$5a+12b=58$$. Solve simultaneously. The principle: two complex numbers are equal iff both real parts agree AND both imaginary parts agree. This *always* converts one complex equation into two real equations.", "source": "Opus 4.7 ②", "_id": "opus_2_28"}, {"question": "What’s the trigger phrase in Q7(c)(i) that forces you to include the derivative of $+x$ in $f'(x)$, and why is this critical for the Newton–Raphson step? (2 steps)", "answer": "- Step 1: The function $f(x) = x^{3/2} + x - 3$ includes a $+x$ term. Its derivative is $f'(x) = \\tfrac{3}{2}x^{1/2} + 1$ (not just $\\tfrac{3}{2}x^{1/2}$).  \n- Step 2: In Newton–Raphson, omitting the $+1$ would drastically underestimate $f'(1.375) \\approx 2.759$, leading to an incorrect second approximation.  \n+ **Why critical?** The missing $+1$ would make $f'(x)$ too small, inflating the correction term $\\frac{f(x)}{f'(x)}$.", "source": "Qwen 3 ③", "_id": "qwen_3_6"}, {"question": "What closing sentence is required to earn the final induction mark, and what does it must contain?", "answer": "Standard wording: \"$$f(2)$$ is divisible by 18, and if $$f(k)$$ is divisible by 18 then $$f(k+1)$$ is divisible by 18. Therefore, by the principle of mathematical induction, $$4^n + 6n - 10$$ is divisible by 18 for all integers $$n \\geq 2$$.\" Must contain: (1) base case verified, (2) inductive step verified, (3) explicit invocation of \"principle of mathematical induction\", (4) statement of the result with its domain. Markers tick all four.", "source": "Opus 4.7 ②", "_id": "opus_2_51"}, {"question": "Q8 (Parabola) — The tangent at $P(2p^2, 4p)$ has gradient $1/p$ and the tangent at $Q(2/p^2, -4/p)$ has gradient $-p$. What is the product of these two gradients, and what does this tell you about the geometric relationship between the two tangents? (2 steps)", "answer": "- Step 1: The product is $\\frac{1}{p} \\times (-p) = -1$.\n- Step 2: Two lines with gradients whose product is $-1$ are **perpendicular**. So the tangents at the endpoints of a focal chord of a parabola are always perpendicular. This is a beautiful geometric consequence: the focal chord property forces the parameter values to be $p$ and $-1/p$ (since $t_1 \\cdot t_2 = -1$ for a focal chord), and the tangent gradients $1/t_1$ and $1/t_2$ then satisfy $m_1 \\cdot m_2 = \\frac{1}{t_1 t_2} = \\frac{1}{-1} = -1$.", "source": "GLM 5.1 ②", "_id": "glm_2_72"}, {"question": "FP1 Q4(ii) — Given $$BC = D$$ with $$B$$ a $$2\\times 2$$ and $$D$$ a $$2\\times 3$$, how do you isolate $$C$$ and why does order matter?", "answer": "Left-multiply both sides by $$B^{-1}$$: $$C = B^{-1}D$$. Matrix multiplication is **non-commutative**, so $$DB^{-1}$$ is wrong (and dimensionally impossible here: $$D$$ is $$2\\times 3$$, $$B^{-1}$$ is $$2\\times 2$$ — can't multiply $$DB^{-1}$$). The side you multiply on must match where the unknown sits.", "source": "Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "In FP1 series proofs, what is special about the form of the standard results for $\\sum r^3$ provided in the formula booklet, and why should you use it? (2 steps)", "answer": "- Step 1: The booklet gives $\\sum_{r=1}^{n} r^3 = \\frac14 n^2(n+1)^2$ — this is already factored as $\\left[\\frac12 n(n+1)\\right]^2 = \\left[\\sum r\\right]^2$.\n- Step 2: Always use this factored form. If you expand it to $\\frac14(n^4 + 2n^3 + n^2)$, you lose the common factor $n(n+1)$ that you'll need to factor out later. The factored form makes the final factoring step immediate.", "source": "MiniMax ②", "_id": "minimax_2_1"}, {"question": "FP1 May 2023 Q5(b) — When finding the sum of new roots like $\\frac{\\alpha}{\\alpha^2+1} + \\frac{\\beta}{\\beta^2+1}$, combining the fractions gives a numerator of $\\alpha(\\beta^2+1) + \\beta(\\alpha^2+1)$. What is the strategic factoring move required here? (2 steps)", "answer": "- Step 1: Expand the numerator to $\\alpha\\beta^2 + \\alpha + \\alpha^2\\beta + \\beta$. If you try to substitute numbers now, you'll be stuck with $\\alpha\\beta^2$ and $\\alpha^2\\beta$, which aren't easily expressible with just sum and product.\n- Step 2: Factor by grouping: pull out $\\alpha\\beta$ from the first and third terms, and $1$ from the second and fourth. This gives $\\alpha\\beta(\\alpha+\\beta) + 1(\\alpha+\\beta)$, which factors beautifully to $(\\alpha+\\beta)(\\alpha\\beta + 1)$. Now you can substitute directly.", "source": "GLM 5.1 ①", "_id": "glm_1_21"}, {"question": "FP1 May 2023 Q3(b) — When finding where a normal \"meets $H$ again\", you substitute the line equation into $xy=9$ and form a quadratic in $x$. Why is solving this quadratic from scratch with the formula a waste of time? (2 steps)", "answer": "- Step 1: The point $P$ where the normal originates is *already* on both the normal and the hyperbola. Therefore, $x = 3t$ is guaranteed to be one of the roots of the resulting quadratic equation.\n- Step 2: Instead of using the quadratic formula, you can immediately factor out $(x - 3t)$ from the quadratic, leaving a simple linear factor to solve for the *other* $x$-coordinate. This avoids heavy arithmetic and reduces error.", "source": "GLM 5.1 ①", "_id": "glm_1_14"}, {"question": "Q3 (Normal to rectangular hyperbola) — For the rectangular hyperbola $xy = c^2$ with parametric point $P(ct, c/t)$, what are the tangent gradient and the normal gradient? What is the sign relationship? (2 steps)", "answer": "- Step 1: Differentiating $y = c^2/x$ gives $dy/dx = -c^2/x^2$. At $P(ct, c/t)$: $dy/dx = -c^2/(ct)^2 = -1/t^2$. So **tangent gradient** $m_T = -1/t^2$.\n- Step 2: The **normal gradient** is $m_N = -1/m_T = t^2$. The sign flips and the reciprocal inverts: the negative of a negative gives a positive. The critical pitfall is using $m_T$ when the question says \"normal\" — always check which one is asked for.\n\nFor $xy = 9$ (so $c = 3$): $m_T = -1/t^2$, $m_N = t^2$.", "source": "GLM 5.1 ②", "_id": "glm_2_12"}, {"question": "What is the correct way to find the normal to the rectangular hyperbola $xy = 9$ at the parametric point $P(3t, 3/t)$, and how should you structure your answer to match the required form $ty - t^3 x = f(t)$? (4 steps)", "answer": "- Step 1: Differentiate implicitly: $y = \\frac{9}{x}$ gives $\\frac{dy}{dx} = -\\frac{9}{x^2}$. At $P(3t, 3/t)$, the tangent gradient is $-\\frac{1}{t^2}$.\n- Step 2: The normal gradient is the negative reciprocal: $m_N = t^2$ (NOT $-1/t^2$ — this is the most common error).\n- Step 3: Write $y - \\frac{3}{t} = t^2(x - 3t)$.\n- Step 4: Multiply through by $t$ to clear the fraction: $ty - 3 = t^3x - 3t^4$. Rearrange to $ty - t^3x = 3 - 3t^4$, giving $f(t) = 3 - 3t^4$.\n+ The multiplication by $t$ is essential — it converts the fractional coordinates into a polynomial form that examiners require.\n\nThe phrase \"normal to $H$ at the point $P$\" is the trigger to use $t^2$, not $-1/t^2$.", "source": "MiniMax ①", "_id": "minimax_1_1"}, {"question": "FP1 Q9 — What's the exact verbal conclusion sentence required at the end of an induction proof, and why does it matter?", "answer": "\"Since $$f(2)$$ is divisible by 18, and if $$f(k)$$ is divisible by 18 then $$f(k+1)$$ is divisible by 18, by the principle of mathematical induction, $$f(n)$$ is divisible by 18 for all integers $$n \\geq 2$$.\" Markers explicitly check for this closing sentence — it's worth a mark on its own. Skipping it is a guaranteed point lost.", "source": "Opus 4.7 ①", "_id": "opus_1_51"}, {"question": "Q8 (Parabola focal chord) — When intersecting the two tangent equations $py = x + 2p^2$ and $y = -px - 2/p$, the algebra involves the factor $(1 + p^2)$. What strategy prevents algebra fatigue? (2 steps)", "answer": "- Step 1: **Keep $(1 + p^2)$ symbolic and cancel late.** From substituting $x = py - 2p^2$ into the second tangent: $y = -p(py - 2p^2) - 2/p = -p^2 y + 2p^3 - 2/p$. Collect: $y(1 + p^2) = 2p^3 - 2/p = \\frac{2(p^4-1)}{p} = \\frac{2(p^2-1)(p^2+1)}{p}$.\n- Step 2: Now cancel $(1 + p^2)$: $y = \\frac{2(p^2-1)}{p} = 2p - 2/p$. If you expand $p^4 - 1$ without recognising the difference-of-squares factorisation $(p^2-1)(p^2+1)$, you miss the cancellation and are left with an unsimplifiable mess. The \"simplest form\" requirement demands this cancellation.", "source": "GLM 5.1 ②", "_id": "glm_2_42"}, {"question": "In Q4(i), the area of triangle $T'$ is three times the area of triangle $T$. Why is the equation $|\\det A| = 3$, not just $\\det A = 3$? (1 step)", "answer": "The area scale factor under a linear transformation represented by matrix $A$ is $|\\det A|$ (the absolute value of the determinant).\n+ If $\\det A = -3$, the transformation reverses orientation (includes a reflection), but the area is still scaled by a factor of 3.\n+ Solving only $\\det A = 3$ gives $3k - 24 = 3$, so $k = 9$.\n+ Solving $|\\det A| = 3$ gives two cases: $3k - 24 = 3$ (giving $k = 9$) OR $3k - 24 = -3$ (giving $k = 7$).\n+ Both $k = 9$ and $k = 7$ are valid because both give an area scale factor of 3.\n\nThis is a common source of missing solutions in matrix area problems — always use absolute value.", "source": "MiniMax ①", "_id": "minimax_1_20"}, {"question": "Common pitfall: students sometimes write $$(\\alpha^2+1)(\\beta^2+1) = \\alpha^2\\beta^2 - 1$$. Why is this wrong?", "answer": "They're confusing it with the difference of squares $$(a+b)(a-b) = a^2 - b^2$$. But here both brackets have $$+1$$, not $$\\pm 1$$. The correct expansion has *four* terms, all positive, with no cancellation. The mnemonic: $$+1$$ in both factors means $$+\\alpha^2 +\\beta^2 + 1$$ cross-terms — always positive.", "source": "Opus 4.7 ②", "_id": "opus_2_22"}, {"question": "FP1 May 2023 Q1 — Why must you use the *factored* forms of the booklet formulas (e.g., $\\tfrac{1}{4}n^2(n+1)^2$) rather than expanding them into polynomials (e.g., $\\tfrac{1}{4}n^4 + \\tfrac{1}{2}n^3 + \\tfrac{1}{4}n^2$) when simplifying a series proof? (2 steps)", "answer": "- Step 1: The target form you are asked to \"show\" will almost always contain factored components (like $n(n+1)$). If you expand the polynomials, you lose the visible common factors and face a massive expansion that is extremely error-prone.\n- Step 2: Keeping formulas factored allows you to immediately pull out common factors (like $n(n+1)$) from all terms in your expression, making the algebraic simplification to the target form trivial.\n\nTakeaway: The booklet gives you factored forms for a reason—use them to keep the algebra clean and factorable.", "source": "GLM 5.1 ①", "_id": "glm_1_1"}, {"question": "What's the universal technique for dividing complex numbers $$z/w$$ by hand?", "answer": "Multiply numerator and denominator by $$\\bar w$$ (the conjugate of the denominator): $$\\frac{z}{w} = \\frac{z\\bar w}{w\\bar w} = \\frac{z\\bar w}{|w|^2}$$. The denominator becomes a positive real number ($$|w|^2 = c^2+d^2$$), making the real and imaginary parts of the quotient cleanly readable.", "source": "Opus 4.7 ②", "_id": "opus_2_27"}, {"question": "In a \"show that $$\\sum = \\tfrac{1}{12}n(n+1)(an^2+bn+c)$$\" question, what's the trigger that tells you to pull out $$n(n+1)$$ as a common factor early? (2 steps)", "answer": "- Step 1: The target form already exhibits $$n(n+1)$$ as an explicit factor — this is the examiner telling you that $$n(n+1)$$ must come out cleanly. Recognise this *before* doing any algebra.\n- Step 2: After applying the booklet results, every term you've produced will have $$n(n+1)$$ inside it (since $$\\sum r$$ and $$\\sum r^3$$ both factor through $$n(n+1)$$). Factor it out immediately — don't expand first and refactor later.", "source": "Opus 4.7 ②", "_id": "opus_2_1"}, {"question": "What's the formula for $$B^{-1}$$ when $$B = \\begin{pmatrix} a & b \\\\ c & d \\end{pmatrix}$$, and what sign trap appears in the cofactor matrix?", "answer": "$$B^{-1} = \\frac{1}{ad-bc}\\begin{pmatrix} d & -b \\\\ -c & a \\end{pmatrix}$$. The trap: students sometimes flip the signs on $$a$$ and $$d$$ instead of on $$b$$ and $$c$$. Memorise: **swap the diagonal, negate the anti-diagonal**.", "source": "Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "Q2 (Complex roots of quartic) — Given that $z = 2+3i$ is a root, you need to form the real quadratic factor of the quartic. What shortcut formula lets you write this down without a full FOIL expansion of $(x-z)(x-\\bar{z})$? (2 steps)", "answer": "- Step 1: Use the identity $$(x-z)(x-\\bar{z}) = x^2 - 2\\operatorname{Re}(z)\\,x + |z|^2.$$ For $z = 2+3i$: $\\operatorname{Re}(z) = 2$ and $|z|^2 = 2^2 + 3^2 = 13$, giving $x^2 - 4x + 13$.\n- Step 2: This works because $(x-z)(x-\\bar{z}) = x^2 - (z+\\bar{z})x + z\\bar{z}$, and $z+\\bar{z} = 2\\operatorname{Re}(z)$ while $z\\bar{z} = |z|^2$. It saves you from expanding $(x-2-3i)(x-2+3i)$ and collecting $36i$ terms.\n\nThis shortcut is **not** in the formula booklet — memorise it.", "source": "GLM 5.1 ②", "_id": "glm_2_7"}, {"question": "FP1 May 2023 — What is the time allocation rule of thumb for this 75-mark, 90-minute paper, and what should you do if you exceed it on a single question? (2 steps)", "answer": "- Step 1: The rule of thumb is roughly 1.2 minutes per mark. A 4-mark question deserves about 5 minutes; a 13-mark question deserves about 15 minutes.\n- Step 2: If you spend more than 2 minutes staring at a question without writing productive working, you must move on. Getting stuck on a 4-mark question and losing 10 minutes jeopardizes your ability to pick up easy marks later in the paper.", "source": "GLM 5.1 ①", "_id": "glm_1_46"}, {"question": "FP1 Q9 — In divisibility induction, what's the template for expressing $$f(k+1)$$ in terms of $$f(k)$$, and why is this the cleanest tactic?", "answer": "Write $$f(k+1) = A \\cdot f(k) + B$$ where $$A$$ is an integer (so $$A f(k)$$ inherits divisibility from the hypothesis) and $$B$$ is **explicitly** a multiple of the target modulus. Both pieces are divisible, so the sum is. This template avoids the messier $$f(k+1) - f(k)$$ subtraction approach.", "source": "Opus 4.7 ①", "_id": "opus_1_49"}, {"question": "Conceptual — For a $2 \\times 2$ matrix $M = \\begin{pmatrix} a & b \\\\ c & d \\end{pmatrix}$, the inverse is $\\frac{1}{ad-bc}\\begin{pmatrix} d & -b \\\\ -c & a \\end{pmatrix}$. Why is the pattern \"swap $a \\leftrightarrow d$, negate $b$ and $c$\" and not \"negate all entries\" or \"swap and negate everything\"? (2 steps)", "answer": "- Step 1: The inverse formula comes from the adjugate (transpose of the cofactor matrix) divided by the determinant. For a $2 \\times 2$ matrix, the cofactor of $a$ is $+d$, the cofactor of $b$ is $-c$, the cofactor of $c$ is $-b$, and the cofactor of $d$ is $+a$. Transposing doesn't change a $2 \\times 2$ symmetric pattern, so the adjugate is $\\begin{pmatrix} d & -b \\\\ -c & a \\end{pmatrix}$.\n- Step 2: The signs follow the checkerboard pattern of cofactors: $+$, $-$, $-$, $+$. You swap the diagonal entries ($a \\leftrightarrow d$) because each is the other's cofactor, and negate the off-diagonal entries ($b \\to -b$, $c \\to -c$) because they sit on \"negative\" cofactor positions. The diagonal entries keep their sign; the off-diagonal entries flip.", "source": "GLM 5.1 ②", "_id": "glm_2_85"}, {"question": "Common pitfall: students compute $$\\arg w = \\arctan(\\text{Re}/\\text{Im})$$ instead of $$\\arctan(\\text{Im}/\\text{Re})$$. What's the geometric reason for the correct order?", "answer": "The argument is the angle from the positive real axis, so $$\\tan(\\arg w) = \\text{opposite}/\\text{adjacent} = \\text{Im}/\\text{Re}$$. Flipping the ratio gives the complementary angle. Mnemonic: \"imaginary over real\" = \"rise over run\", same as standard gradient.", "source": "Opus 4.7 ②", "_id": "opus_2_31"}, {"question": "FP1 May 2023 Q2(a) — given that $$x = 2+3i$$ is a root of a quartic with real coefficients, what's the one-line justification for writing down another root?", "answer": "\"Coefficients are real, so complex roots occur in conjugate pairs, hence $$2-3i$$ is also a root.\" The single line must explicitly invoke **real coefficients** — otherwise the conjugate-pair argument has no basis (a polynomial with complex coefficients need not have conjugate roots).", "source": "Opus 4.7 ②", "_id": "opus_2_4"}, {"question": "Q5 (Roots of quadratic → new quadratic) — Why is part (a) asking for $(\\alpha^2+1)(\\beta^2+1)$ not just a standalone question but a deliberate setup for part (b)? (2 steps)", "answer": "- Step 1: The value $(\\alpha^2+1)(\\beta^2+1) = 40$ is the **denominator** of both the new sum and the new product in part (b): $$S = \\frac{\\text{numerator}}{40}, \\qquad P = \\frac{\\alpha\\beta}{40} = \\frac{3}{40}.$$\n- Step 2: This is the \"scaffolding\" pattern: if a multi-part question has you compute something in part (a) that looks like a standalone result, it's almost certainly reused in part (b). If part (b) feels disconnected, you've probably missed the link. Here, computing the denominator first makes the new-sum and new-product calculations trivial.", "source": "GLM 5.1 ②", "_id": "glm_2_24"}, {"question": "In induction divisibility proofs like showing $4^n + 6n - 10$ is divisible by 18, what structural trick simplifies the inductive step? (3 steps)", "answer": "- Step 1: Express $f(k+1) = 4f(k) - 18(k - 2)$, where $f(k)$ is assumed divisible by 18.\n- Step 2: Factor into $4f(k) + 18(2-k)$. Both terms are divisible by 18.\n- Step 3: Conclude $f(k+1) = 18(\\text{integer})$ and state the induction conclusion explicitly.\n\n**Common error:** Starting with $f(1) = 0$ instead of the question's lower bound $n=2$.", "source": "Qwen 3 ④", "_id": "qwen_4_8"}, {"question": "After finding the new sum $S = 3/5$ and product $P = 3/40$, what form should the final answer take, and what common error do students make? (2 steps)", "answer": "- Step 1: The new quadratic is $x^2 - Sx + P = 0$, i.e. $x^2 - \\frac35x + \\frac{3}{40} = 0$.\n- Step 2: The question asks for $px^2 + qx + r = 0$ with integers. Multiply by 40 (LCM of denominators): $40x^2 - 24x + 3 = 0$. Common error: leaving fractions in the final answer, or forgetting the minus sign in $-Sx$ (it's NOT $+Sx$).", "source": "MiniMax ②", "_id": "minimax_2_15"}, {"question": "FP1 May 2023 Q7(d) — In the linear interpolation formula, you partition the interval $[a,b]$ in a specific ratio of function values. Must you use the signed or absolute values of $f(a)$ and $f(b)$, and why? (2 steps)", "answer": "- Step 1: You must use the **absolute** values $|f(a)|$ and $|f(b)|$. The formula geometrically finds the x-intercept of a straight line chord between the two points.\n- Step 2: If you use the signed values, the ratio will be negative, which makes no sense for partitioning a physical distance on the x-axis. The distance from the root to $a$ is proportional to the *magnitude* $|f(a)|$, regardless of whether $f(a)$ is positive or negative.", "source": "GLM 5.1 ①", "_id": "glm_1_33"}, {"question": "Exam strategy — The revision guide says \"If a part feels disconnected, you've probably missed the link.\" Give an example from this paper where part (a)'s result is reused in part (b), and explain the link. (2 steps)", "answer": "- Step 1: Q5: Part (a) computes $(\\alpha^2+1)(\\beta^2+1) = 40$. Part (b) computes the new sum and product of roots, both of which have $(\\alpha^2+1)(\\beta^2+1)$ as the denominator. The link: 40 is the denominator in both $S = 24/40$ and $P = 3/40$.\n- Step 2: Without computing 40 in part (a), you'd need to compute it mid-way through part (b) while also managing the numerator factoring — a recipe for errors. The multi-part structure is deliberately designed to scaffold your work.", "source": "GLM 5.1 ②", "_id": "glm_2_88"}, {"question": "Why must you carry 5+ decimal places when working through a numerical methods question that asks for 3 dp answers?", "answer": "Rounding propagates: rounding to 3 dp at every step compounds error and can shift the final answer by 0.001 or more. Keep at least 2 extra digits of precision internally, round only at the very end. The mark scheme awards based on the final reported answer; intermediate over-rounding can push you outside the mark scheme's tolerance band.", "source": "Opus 4.7 ②", "_id": "opus_2_39"}, {"question": "Misconception probe — A student computes $\\det A = 3k - 24 = 3$, gets $k = 9$, and stops. They say \"the area scale factor is 3, so the determinant must be 3.\" What's wrong? (2 steps)", "answer": "- Step 1: The area scale factor is $|\\det A|$, not $\\det A$. A determinant of $-3$ also gives an area scale factor of $|-3| = 3$.\n- Step 2: The student confuses the determinant (which can be negative) with the area scale factor (which is always positive). The absolute value is essential. Solving only $\\det A = 3$ misses $k = 7$ (where $\\det A = -3$). The modulus bars in $|\\det A| = 3$ are not optional decoration — they encode the fact that both orientations are valid.", "source": "GLM 5.1 ②", "_id": "glm_2_68"}, {"question": "When calculating the new sum of roots $S = \\frac{\\alpha}{\\alpha^2+1} + \\frac{\\beta}{\\beta^2+1}$, the numerator expands to $\\alpha\\beta^2 + \\alpha + \\alpha^2\\beta + \\beta$. What is the crucial factoring trick to simplify this? (3 steps)", "answer": "- Step 1: Group the terms with $\\alpha\\beta$: $\\alpha\\beta^2 + \\alpha^2\\beta = \\alpha\\beta(\\beta + \\alpha)$.\n- Step 2: Group the remaining terms: $\\alpha + \\beta = 1 \\cdot (\\alpha + \\beta)$.\n- Step 3: Factor out the common $(\\alpha+\\beta)$: $\\alpha\\beta(\\alpha+\\beta) + 1(\\alpha+\\beta) = (\\alpha+\\beta)(\\alpha\\beta + 1)$.\nTakeaway: Always look to factor out $(\\alpha+\\beta)$ or $\\alpha\\beta$ rather than expanding and getting lost in $\\alpha^2\\beta$ terms.", "source": "GLM 5.1 ③", "_id": "glm_3_17"}, {"question": "Conceptual — For the parabola $y^2 = 4ax$, the tangent at $(at^2, 2at)$ is $ty = x + at^2$. If you can't remember this formula, what's the fastest way to derive it in an exam? (3 steps)", "answer": "- Step 1: Differentiate implicitly: $2y\\frac{dy}{dx} = 4a$, so $\\frac{dy}{dx} = \\frac{2a}{y}$. At $(at^2, 2at)$: gradient $= \\frac{2a}{2at} = \\frac{1}{t}$.\n- Step 2: Use point-slope form: $y - 2at = \\frac{1}{t}(x - at^2)$.\n- Step 3: Multiply through by $t$: $ty - 2at^2 = x - at^2$, rearrange: $ty = x + at^2$. Total time: ~30 seconds if you're fluent with implicit differentiation.", "source": "GLM 5.1 ②", "_id": "glm_2_89"}, {"question": "Why is the \"$$f(k+1) - f(k)$$\" approach often *harder* than \"$$f(k+1) = 4f(k) + \\ldots$$\" for divisibility induction?", "an
