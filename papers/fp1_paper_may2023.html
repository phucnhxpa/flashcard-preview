swer": "$$f(k+1) - f(k)$$ for $$f(n) = 4^n + 6n - 10$$ gives $$3\\cdot 4^k + 6$$ — which is divisible by 18 only via a modular arithmetic argument ($$4^k \\equiv 4 \\pmod 6$$, so $$3 \\cdot 4^k \\equiv 12 \\pmod{18}$$, then $$+6$$ gives 18). The $$4f(k) + 18(2-k)$$ approach makes divisibility *manifest* algebraically with no modular reasoning. **Manifest divisibility > inferred divisibility** in exam writing.", "source": "Opus 4.7 ②", "_id": "opus_2_50"}, {"question": "Q1 (Series proof) — The identity $\\sum r^3 = \\left[\\sum r\\right]^2 = \\tfrac14 n^2(n+1)^2$ is listed as a key fact. Why does $\\sum r^3$ equal $[\\sum r]^2$? Is this a coincidence or does it have deeper significance? (2 steps)", "answer": "- Step 1: $\\sum_{r=1}^n r = \\frac{n(n+1)}{2}$, so $\\left[\\sum r\\right]^2 = \\frac{n^2(n+1)^2}{4} = \\sum r^3$. This is a genuine identity, not a coincidence.\n- Step 2: The deeper significance: there's no analogous identity for $\\sum r^2$ or higher powers. The fact that $\\sum r^3 = (\\sum r)^2$ is related to the symmetry of the discrete cubic and can be proven by induction or by a telescoping argument. For FP1, you just need to know the fact and use it — it's a useful sanity check that your $\\sum r^3$ formula is correct (if it doesn't match $[\\sum r]^2$, you've made an error).", "source": "GLM 5.1 ②", "_id": "glm_2_87"}, {"question": "FP1 Q4(ii) — For $$B = \\begin{pmatrix} a & 4 \\\\ 2 & 3 \\end{pmatrix}$$, what is $$B^{-1}$$ and what's the cofactor sign trap?", "answer": "$$B^{-1} = \\frac{1}{3a - 8}\\begin{pmatrix} 3 & -4 \\\\ -2 & a \\end{pmatrix}$$. The trap: the off-diagonal entries get **negated** (swap signs on $$b$$ and $$c$$), while the main-diagonal entries get **swapped** (not negated). Easy to mix these two operations up under pressure.", "source": "Opus 4.7 ①", "_id": "opus_1_18"}, {"question": "Q1 (Series proof) — After substituting the standard results you get $\\tfrac14 n^2(n+1)^2 + n(n+1)$. What is the key strategic move at this point, and why is doing it early critical? (2 steps)", "answer": "- Step 1: **Factor out $n(n+1)$ immediately.** Write $$\\tfrac14 n^2(n+1)^2 + n(n+1) = n(n+1)\\!\\left[\\tfrac14 n(n+1) + 1\\right].$$\n- Step 2: If you skip this and expand both terms separately, you get $\\tfrac14 n^4 + \\tfrac12 n^3 + \\tfrac14 n^2 + n^2 + n = \\tfrac14 n^4 + \\tfrac12 n^3 + \\tfrac54 n^2 + n$, and now you must re-factor a quartic — extremely error-prone. Factoring $n(n+1)$ out early reduces the bracket to a simple quadratic in $n$ that you can combine over a common denominator: $\\tfrac{n(n+1)+4}{4} = \\tfrac{n^2+n+4}{4}$.\n\nThis is the \"factor early\" instinct that unifies Q1, Q3, Q5, Q8, and Q9 on this paper.", "source": "GLM 5.1 ②", "_id": "glm_2_2"}, {"question": "What's the format-trigger phrase that tells you the final answer must have integer coefficients, and what's the response?", "answer": "Phrases like \"in the form $$px^2 + qx + r = 0$$ where $$p, q, r$$ are integers\" force you to clear all fractions at the end. Multiply through by the LCM of any denominators. Leaving rational coefficients (e.g. $$x^2 - \\tfrac{3}{5}x + \\tfrac{3}{40}$$ in Q5) loses the format mark even if mathematically equivalent.", "source": "Opus 4.7 ①", "_id": "opus_1_54"}, {"question": "Synthesis — Across this paper, the \"factor early\" instinct appears in Q1 ($n(n+1)$), Q5 ($(α+β)(αβ+1)$), Q3 (known root $x = 3t$), Q8 ($(1+p^2)$), and Q9 ($4f(k) + 18(2-k)$). What is the common underlying principle? (2 steps)", "answer": "- Step 1: The common principle is: **keep expressions in factored form as long as possible, and only expand when absolutely necessary.** Factored forms reveal structure (common factors, cancellations, divisibility) that expanded forms obscure.\n- Step 2: In each case, expanding early creates a polynomial that must be re-factored — a difficult and error-prone step. By factoring first, you work with smaller, simpler expressions and the algebra practically writes itself. This is the single most important algebraic habit for FP1: factor symbolically, substitute numerically, expand only at the end if required.", "source": "GLM 5.1 ②", "_id": "glm_2_99"}, {"question": "Misconception probe — A student claims: \"If a polynomial has real coefficients and $z$ is a root, then $-\\bar{z}$ is also a root.\" Is this correct? Provide a counterexample. (2 steps)", "answer": "- Step 1: This is **incorrect**. The correct statement is: if $z$ is a root, then $\\bar{z}$ is a root — not $-\\bar{z}$.\n- Step 2: Counterexample: $x^2 - 4x + 13 = 0$ has roots $2 + 3i$ and $2 - 3i$. The value $-(2 - 3i) = -2 + 3i$ is NOT a root: $(-2+3i)^2 - 4(-2+3i) + 13 = (4 - 12i - 9) + 8 - 12i + 13 = -5 - 12i + 21 - 12i = 16 - 24i \\neq 0$. The conjugate $\\bar{z}$ reflects across the real axis; $-\\bar{z}$ reflects across the origin — a different operation.", "source": "GLM 5.1 ②", "_id": "glm_2_67"}, {"question": "FP1 Q6(d) — What's the calculator-mode pitfall when computing $$\\arg w$$ on this paper?", "answer": "The question specifies **radians**. If your calculator is in degree mode, $$\\arctan(14.5) \\approx 86.05°$$ instead of $$1.502$$ rad — completely wrong scale. Always check mode before computing an argument, especially when switching from earlier (possibly degree-based) FP1 problems.", "source": "Opus 4.7 ①", "_id": "opus_1_31"}, {"question": "In a series \"show that\" proof, after substituting the booklet formulas, you have $\\frac{1}{4}n^2(n+1)^2 + n(n+1)$. Why must you factor out $n(n+1)$ *before* expanding any brackets? (3 steps)", "answer": "- Step 1: Recognise that both terms share a common factor of $n(n+1)$.\n- Step 2: Factor it out: $n(n+1)\\left[\\frac{1}{4}n(n+1) + 1\\right]$. This keeps the algebra compact and manageable.\n- Step 3: If you expand first, you get a quartic polynomial that you must then factorise again from scratch to match the required \"show that\" form — a process that is slow, error-prone, and easily drops scaling constants like $\\frac{1}{4}$.\nTakeaway: Factor early to avoid algebraic explosion and sign errors.", "source": "GLM 5.1 ③", "_id": "glm_3_1"}, {"question": "Q3 (Normal to rectangular hyperbola) — When finding where the normal meets the hyperbola again, you solve $8x^2 - 45x - 18 = 0$. You already know $x = 6$ is a root (the point $P$ itself). How does this shortcut the factoring, and what wording in the question tells you to reject this root? (2 steps)", "answer": "- Step 1: Since $x = 6$ is a known root, factor out $(x-6)$: $8x^2 - 45x - 18 = (x-6)(8x+3)$. The other root is $x = -3/8$. This avoids the quadratic formula entirely.\n- Step 2: The phrase **\"meets $H$ again\"** tells you $P$ itself is not the answer — you must reject $x = 3t = 6$ and report only the other intersection point $(-3/8, -24)$. If the question said \"meets $H$,\" both points would count; \"again\" explicitly excludes the starting point.", "source": "GLM 5.1 ②", "_id": "glm_2_14"}, {"question": "FP1 May 2023 Q5(b) — After finding the new sum $S = 3/5$ and new product $P = 3/40$ for a quadratic equation, why is $x^2 - \\frac{3}{5}x + \\frac{3}{40} = 0$ not an acceptable final answer? (2 steps)", "answer": "- Step 1: The question specifies the form $px^2 + qx + r = 0$ where $p, q, r$ are *integers*. Leaving fractional coefficients violates this constraint.\n- Step 2: You must clear the denominators by multiplying the entire equation by the LCM of the denominators (here, 40). This yields $40x^2 - 24x + 3 = 0$, providing the required integer coefficients.", "source": "GLM 5.1 ①", "_id": "glm_1_22"}, {"question": "When intersecting two tangents on a parabola to find $$R$$, why should you keep symbolic factors like $$(p^2+1)$$ visible rather than expanding?", "answer": "Algebra fatigue is the enemy. $$p^2+1$$ is non-zero (it's always positive), so it can be cancelled at the end. Keeping it as a single symbol lets you spot $$\\frac{(p^4-1)}{p} = \\frac{(p^2-1)(p^2+1)}{p}$$ and cancel cleanly. Expand too early and the cancellation becomes invisible. **Rule: factor first, expand last.**", "source": "Opus 4.7 ②", "_id": "opus_2_46"}, {"question": "When expanding $$(\\alpha^2+1)(\\beta^2+1)$$, what's the structure that lets you compute it without knowing $$\\alpha, \\beta$$ individually?", "answer": "$$(\\alpha^2+1)(\\beta^2+1) = \\alpha^2\\beta^2 + \\alpha^2 + \\beta^2 + 1 = (\\alpha\\beta)^2 + (\\alpha^2+\\beta^2) + 1$$. The expression collapses into symmetric functions $$\\alpha\\beta$$ and $$\\alpha^2+\\beta^2$$ — both already known. The deep insight: any symmetric polynomial in $$\\alpha, \\beta$$ can be expressed in terms of elementary symmetric functions $$\\alpha+\\beta$$ and $$\\alpha\\beta$$.", "source": "Opus 4.7 ②", "_id": "opus_2_21"}, {"question": "Given a matrix $A$ transforms triangle $T$ to $T'$ with area 3× larger, what is the first formula you write down? Why?", "answer": "- Step 1: Write $|\\det A| = 3$. The determinant's absolute value gives the area scale factor.\n- Step 2: Compute $\\det A = 3k - 24$ for $A = \\begin{pmatrix}3&8\\\\3&k\\end{pmatrix}$.\n- Step 3: Solve $|3k - 24| = 3$ to find two solutions: $k=9$ and $k=7$.\n\n**Scope note:** Always take absolute value; area scale factors are positive.", "source": "Qwen 3 ④", "_id": "qwen_4_3"}, {"question": "Conceptual — For the rectangular hyperbola $xy = c^2$, why is the parametrisation $(ct, c/t)$ used instead of just $(t, c^2/t)$? What advantage does the $c$ provide? (2 steps)", "answer": "- Step 1: The parametrisation $(ct, c/t)$ satisfies $xy = ct \\cdot c/t = c^2$ for all $t \\neq 0$. The parameter $t$ is directly related to the gradient: tangent gradient $= -1/t^2$, normal gradient $= t^2$.\n- Step 2: With the alternative $(t, c^2/t)$, the gradient would be $-c^2/t^2$ — it depends on $c$, making the formula less clean. The $(ct, c/t)$ parametrisation absorbs $c$ into the coordinates so that the gradient formulas are independent of $c$, mirroring the parabola convention $(at^2, 2at)$ where the gradient is $1/t$ regardless of $a$.", "source": "GLM 5.1 ②", "_id": "glm_2_63"}, {"question": "What's the algebraic condition for chord $$PQ$$ with parameters $$p, q$$ on $$y^2 = 4ax$$ to be a focal chord?", "answer": "$$pq = -1$$. (For the parametrisation $$P(ap^2, 2ap)$$ and $$Q(aq^2, 2aq)$$.) In FP1 May 2023 Q8 the parametrisation is $$P(2p^2, 4p)$$ and $$Q(2/p^2, -4/p)$$ — this corresponds to $$q = -1/p$$, so $$pq = -1$$. **Recognise this:** $$q = -1/p$$ is the focal-chord signature.", "source": "Opus 4.7 ②", "_id": "opus_2_43"}, {"question": "Exam strategy — For calculator-banned questions (like Q2 and Q6 which state \"solutions relying on calculator technology are not acceptable\"), what does this require in your written working? (2 steps)", "answer": "- Step 1: Show **every algebraic step** — expanding brackets, combining like terms, multiplying by conjugates, equating real and imaginary parts. No leaps of arithmetic.\n- Step 2: Partial credit depends on the working, not the final answer. If you write just the answer with no working and it's wrong, you get zero. If you show a clear method with one arithmetic slip, you get most of the marks. The ban means the examiner wants to see your algebra, not your calculator's output.", "source": "GLM 5.1 ②", "_id": "glm_2_52"}, {"question": "Synthesis — Q5(a) asks for $(\\alpha^2+1)(\\beta^2+1)$ and Q5(b) asks for a quadratic with roots $\\frac{\\alpha}{\\alpha^2+1}$ and $\\frac{\\beta}{\\beta^2+1}$. If you skipped part (a) and went straight to (b), what would be harder? (2 steps)", "answer": "- Step 1: In part (b), both the new sum and the new product have $(\\alpha^2+1)(\\beta^2+1)$ as their denominator. Without computing it in (a), you'd need to compute it on the fly while also managing the numerator algebra — doubling the cognitive load.\n- Step 2: The multi-part structure is designed so (a) produces a result that simplifies (b). Skipping (a) means you must compute the denominator mid-calculation in (b), increasing the chance of errors. This is the \"scaffolding\" principle: use the question's structure as support, not as separate unrelated tasks.", "source": "GLM 5.1 ②", "_id": "glm_2_70"}, {"question": "FP1 May 2023 Q5/8 — When a question asks for an answer \"in simplest form\" (e.g., coordinates of a point), what must you ensure about your final expression? (2 steps)", "answer": "- Step 1: You must ensure all possible algebraic simplifications have been performed. This includes canceling common factors in fractions and expanding brackets that can be combined.\n- Step 2: For example, $(-2, \\frac{2p^2-2}{p})$ is NOT in simplest form. You must factor the numerator to $\\frac{2(p^2-1)}{p}$ or split it to $2p - \\frac{2}{p}$. Examiners deduct marks for \"simplification\" failures.", "source": "GLM 5.1 ①", "_id": "glm_1_47"}, {"question": "FP1 May 2023 Q4(i) — When a matrix transformation scales the area of a shape, what formula gives the area scale factor, and what is a critical pitfall regarding signs? (2 steps)", "answer": "- Step 1: The area scale factor is the absolute value of the determinant: $|\\det M|$. This works because the determinant measures how the matrix scales unit areas.\n- Step 2: The critical pitfall is dropping the absolute value bars. A negative determinant indicates an orientation reversal (like a reflection), but the area scale factor must be positive. If you solve $\\det M = 3$ instead of $|\\det M| = 3$, you will miss the solution where $\\det M = -3$.", "source": "GLM 5.1 ①", "_id": "glm_1_16"}, {"question": "Q5 (Roots of quadratic → new quadratic) — When computing the new sum of roots $S = \\frac{\\alpha}{\\alpha^2+1} + \\frac{\\beta}{\\beta^2+1}$, you combine over a common denominator to get the numerator $\\alpha\\beta^2 + \\alpha + \\alpha^2\\beta + \\beta$. What is the key factoring trick, and why is it essential? (3 steps)", "answer": "- Step 1: Group as $\\alpha\\beta^2 + \\alpha^2\\beta + \\alpha + \\beta = \\alpha\\beta(\\beta + \\alpha) + (\\alpha + \\beta)$.\n- Step 2: Factor out $(\\alpha+\\beta)$: $= (\\alpha+\\beta)(\\alpha\\beta + 1) = 6 \\times 4 = 24$.\n- Step 3: Without this trick, you'd try to compute $\\alpha^2\\beta + \\alpha\\beta^2$ separately, which requires knowing $\\alpha^2\\beta + \\alpha\\beta^2 = \\alpha\\beta(\\alpha+\\beta)$ — the same factoring but discovered later and with more algebraic fumbling. Spotting the grouping **before** substituting numbers is the key: it turns a messy expression into a product of two quantities you already know.\n\nThis is the specific rearrangement flagged as critical in the revision notes.", "source": "GLM 5.1 ②", "_id": "glm_2_22"}, {"question": "Why does $$|\\det A| = 3$$ produce **two** values of $$k$$, and how do you avoid losing the second?", "answer": "$$|3k-24|=3$$ splits into $$3k-24 = +3$$ and $$3k-24 = -3$$, giving $$k=9$$ and $$k=7$$. The trap: writing only $$3k-24=3$$ silently. Always split absolute-value equations into both sign cases — examiners specifically test for this.", "source": "Opus 4.7 ②", "_id": "opus_2_16"}, {"question": "Q2 (Complex roots of quartic) — When computing $|2+3i|^2 = 2^2 + 3^2 = 13$, what is a common mental slip in the sign, and why does it happen? (2 steps)", "answer": "- Step 1: The slip is writing $|2+3i|^2 = 2^2 - 3^2 = -5$ (a minus instead of a plus).\n- Step 2: This happens because the brain conflates $|z|^2 = a^2 + b^2$ with the difference-of-squares pattern $a^2 - b^2$, or because the student recalls that $i^2 = -1$ and incorrectly transfers that minus sign into the modulus calculation. But $|z|^2 = z\\bar{z} = (a+bi)(a-bi) = a^2 - (bi)^2 = a^2 - b^2 i^2 = a^2 + b^2$. The $i^2 = -1$ creates a **double negative**, yielding a plus.\n\nAlways remember: modulus squared is a **sum** of squares, never a difference.", "source": "GLM 5.1 ②", "_id": "glm_2_8"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "FP1 May 2023 Q1 — When a series proof question asks you to \"use the standard results for $\\sum r^2$ and $\\sum r^3$\" to show an identity, what is the very first algebraic step you must take before substituting any booklet formulas? (2 steps)", "answer": "- Step 1: Expand the bracket inside the summation to separate it into standard sum types. For example, $\\sum r(r^2+2)$ becomes $\\sum (r^3 + 2r)$.\n- Step 2: Split the single sum into multiple sums using the linearity of summation: $\\sum (r^3 + 2r) = \\sum r^3 + 2\\sum r$. This allows you to directly apply the booklet formulas term-by-term, rather than trying to invent a formula for a non-standard composite sum.\n\nTakeaway: Never try to apply a standard result to a composite expression; always split first.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "FP1 May 2023 Q1 — Why must you use the *factored* forms of the booklet formulas (e.g., $\\tfrac{1}{4}n^2(n+1)^2$) rather than expanding them into polynomials (e.g., $\\tfrac{1}{4}n^4 + \\tfrac{1}{2}n^3 + \\tfrac{1}{4}n^2$) when simplifying a series proof? (2 steps)", "answer": "- Step 1: The target form you are asked to \"show\" will almost always contain factored components (like $n(n+1)$). If you expand the polynomials, you lose the visible common factors and face a massive expansion that is extremely error-prone.\n- Step 2: Keeping formulas factored allows you to immediately pull out common factors (like $n(n+1)$) from all terms in your expression, making the algebraic simplification to the target form trivial.\n\nTakeaway: The booklet gives you factored forms for a reason—use them to keep the algebra clean and factorable.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": true}, {"question": "FP1 May 2023 Q1 — After substituting the standard results into $\\tfrac{1}{4}n^2(n+1)^2 + n(n+1)$, what is the strategic factoring move you must make immediately? (2 steps)", "answer": "- Step 1: Identify the highest common factor of both terms. Both $\\tfrac{1}{4}n^2(n+1)^2$ and $n(n+1)$ share the factor $n(n+1)$.\n- Step 2: Factor $n(n+1)$ out of the entire expression. This leaves you with $n(n+1)\\left[\\tfrac{1}{4}n(n+1) + 1\\right]$. If you skip this and expand, you will struggle to re-factor the resulting quartic polynomial.\n\nTakeaway: Always pull out the obvious parametric common factor ($n(n+1)$) as soon as it appears.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "FP1 May 2023 Q1 — You have simplified a series to $\\tfrac{1}{4}n(n+1)(n^2+n+4)$, but the question demands the form $\\tfrac{1}{12}n(n+1)(an^2+bn+c)$. What algebraic trick bridges this gap? (2 steps)", "answer": "- Step 1: Recognize that $\\tfrac{1}{4}$ is equivalent to $\\tfrac{3}{12}$. You need to scale the fraction to match the required denominator of 12 without changing the value of the expression.\n- Step 2: Multiply both the numerator and the denominator of the $\\tfrac{1}{4}$ factor by 3. This turns $\\tfrac{1}{4}n(n+1)(n^2+n+4)$ into $\\tfrac{3}{12}n(n+1)(n^2+n+4)$, which is $\\tfrac{1}{12}n(n+1)(3n^2+3n+12)$. Now you can simply read off $a=3, b=3, c=12$.\n\nTakeaway: When the target denominator differs from your current one, scale the fraction by multiplying the numerator and denominator by the same integer.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "FP1 May 2023 Q1 — What is the common pitfall regarding the coefficient of the linear sum term (e.g., $2\\sum r$) when splitting a series? (1 step)", "answer": "- Step 1: Forgetting to carry the scalar multiplier into the substitution. When you have $2\\sum r$, you must substitute $\\tfrac{1}{2}n(n+1)$ and then multiply by 2, yielding $n(n+1)$. A common slip is to drop the 2 and just write $\\tfrac{1}{2}n(n+1)$, which breaks the entire subsequent factorization.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "FP1 May 2023 Q1 — The question explicitly lists \"use the standard results for $\\sum r^2$ and $\\sum r^3$\". Does this mean you must use both in your working? Why or why not? (2 steps)", "answer": "- Step 1: No, you do not have to use both. The listed standard results are a *toolkit* provided to help you, not a mandatory checklist of formulas that must appear in your final working.\n- Step 2: You should only use the formulas that match the terms generated after expanding the summand. In this case, expanding $r(r^2+2)$ yields $r^3$ and $r$ terms, so $\\sum r^2$ is irrelevant. Don't force an unused formula into the solution.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "FP1 May 2023 Q2(a) — Given that $x = 2 + 3i$ is a root of a polynomial with *real* coefficients, what is the trigger phrase that allows you to immediately write down another root, and what is that root? (2 steps)", "answer": "- Step 1: The trigger phrase is \"real coefficients\". The Complex Conjugate Root Theorem states that non-real roots of polynomials with real coefficients occur in conjugate pairs.\n- Step 2: Therefore, the other root is the complex conjugate: $\\overline{2+3i} = 2 - 3i$. You can write this down immediately for 1 free mark.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "FP1 May 2023 Q2(b) — What is the shortcut formula for finding the real quadratic factor generated by a conjugate pair of roots $z$ and $\\bar{z}$? (2 steps)", "answer": "- Step 1: The quadratic factor is $(x - z)(x - \\bar{z})$. Instead of doing a full FOIL expansion with complex numbers, use the shortcut identity: $x^2 - 2\\operatorname{Re}(z)x + |z|^2$.\n- Step 2: This works because expanding $(x-z)(x-\\bar{z})$ yields $x^2 - (z+\\bar{z})x + z\\bar{z}$. Since $z+\\bar{z} = 2\\operatorname{Re}(z)$ and $z\\bar{z} = |z|^2$, the imaginary parts cancel out perfectly, guaranteeing real coefficients.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "FP1 May 2023 Q2(b) — When applying the quadratic factor shortcut $x^2 - 2\\operatorname{Re}(z)x + |z|^2$ for $z = 2+3i$, what is a common sign error when computing $|z|^2$? (2 steps)", "answer": "- Step 1: The modulus squared is $|z|^2 = (\\text{real})^2 + (\\text{imaginary})^2 = 2^2 + 3^2 = 13$.\n- Step 2: The common pitfall is writing $2^2 - 3^2$ or $2^2 + (3i)^2$. This stems from confusing the formula for $|z|^2$ with the expansion of $(a-b)(a+b)$ or incorrectly carrying the $i$ into the squaring step. $|z|^2$ always involves a sum of squares of the real and imaginary components, never a difference.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "FP1 May 2023 Q2(b) — When dividing a quartic by a quadratic to find the other roots, what crucial feature of the quotient must you watch out for if the leading coefficient of the quartic is not 1? (2 steps)", "answer": "- Step 1: You must ensure the leading term of your quotient matches the leading term of the dividend divided by the leading term of the divisor. For $2x^4 \\div x^2$, the first quotient term is $2x^2$, not $x^2$.\n- Step 2: Forgetting the leading coefficient 2 will cause the \"multiply back\" step to yield $x^4 - 4x^3 + 13x^2$ instead of $2x^4 - 8x^3 + 26x^2$, making the subtraction (running remainder) incorrect from the very first step.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "FP1 May 2023 Q2(b) — After polynomial division, you are left solving $2x^2 + 3 = 0$, giving $x^2 = -3/2$. What is the required final format for these roots, and why is leaving it as $\\pm\\sqrt{-3/2}$ insufficient? (2 steps)", "answer": "- Step 1: Leaving the root as $\\pm\\sqrt{-3/2}$ is unsimplified and contains a negative under a radical, which standard mark schemes penalize.\n- Step 2: You must extract the imaginary unit and rationalize/simplify the surd: $x = \\pm\\sqrt{-1}\\sqrt{3/2} = \\pm i\\sqrt{3/2} = \\pm i\\frac{\\sqrt{6}}{2}$. The final form must be $\\pm \\frac{\\sqrt{6}}{2}i$.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "FP1 May 2023 Q2(c) — When plotting complex roots on an Argand diagram, what geometric property must conjugate pairs exhibit? (1 step)", "answer": "- Step 1: Conjugate pairs must reflect across the real axis (the horizontal axis). This means they form a vertical line of symmetry; if one point is at $(x, y)$, its conjugate is at $(x, -y)$.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "FP1 May 2023 Q3(a) — For the rectangular hyperbola $xy = c^2$ parameterized as $(ct, c/t)$, what are the standard gradients for the tangent and the normal at point $P$? (2 steps)", "answer": "- Step 1: The tangent gradient is $m_T = -1/t^2$. This comes from differentiating $y = c^2/x$ to get $dy/dx = -c^2/x^2$, and substituting $x = ct$.\n- Step 2: The normal gradient is the negative reciprocal of the tangent gradient: $m_N = -1/m_T = t^2$. A common pitfall is using the tangent gradient when the question asks for the normal.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "FP1 May 2023 Q3(a) — After finding the normal equation $y - 3/t = t^2(x - 3t)$ for the hyperbola $xy=9$, what algebraic step is required to reach the examiner's requested form $ty - t^3 x = f(t)$? (2 steps)", "answer": "- Step 1: The requested form has no fractions, but the point $P$ introduces a $3/t$ term. You must multiply the entire equation through by $t$ to clear the denominator.\n- Step 2: Distribute carefully: $ty - 3 = t^3 x - 3t^4$. Then rearrange to group the $ty$ and $t^3 x$ terms on one side, yielding $ty - t^3 x = 3 - 3t^4$.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "FP1 May 2023 Q3(b) — When finding where a normal \"meets $H$ again\", you substitute the line equation into $xy=9$ and form a quadratic in $x$. Why is solving this quadratic from scratch with the formula a waste of time? (2 steps)", "answer": "- Step 1: The point $P$ where the normal originates is *already* on both the normal and the hyperbola. Therefore, $x = 3t$ is guaranteed to be one of the roots of the resulting quadratic equation.\n- Step 2: Instead of using the quadratic formula, you can immediately factor out $(x - 3t)$ from the quadratic, leaving a simple linear factor to solve for the *other* $x$-coordinate. This avoids heavy arithmetic and reduces error.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": true}, {"question": "FP1 May 2023 Q3(b) — What does the phrase \"meets $H$ again\" explicitly tell you to do with the roots of the intersection quadratic? (1 step)", "answer": "- Step 1: It tells you to *reject* the root that corresponds to the original point $P$ (where $x = 3t$). You only want the *other* root, which represents the second intersection point.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "FP1 May 2023 Q4(i) — When a matrix transformation scales the area of a shape, what formula gives the area scale factor, and what is a critical pitfall regarding signs? (2 steps)", "answer": "- Step 1: The area scale factor is the absolute value of the determinant: $|\\det M|$. This works because the determinant measures how the matrix scales unit areas.\n- Step 2: The critical pitfall is dropping the absolute value bars. A negative determinant indicates an orientation reversal (like a reflection), but the area scale factor must be positive. If you solve $\\det M = 3$ instead of $|\\det M| = 3$, you will miss the solution where $\\det M = -3$.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": true}, {"question": "FP1 May 2023 Q4(i) — Setting up $|3k - 24| = 3$ yields two possible values for $k$. What are they, and why must both be stated? (2 steps)", "answer": "- Step 1: The absolute value equation splits into two cases: $3k - 24 = 3$ (giving $k=9$) and $3k - 24 = -3$ (giving $k=7$).\n- Step 2: Both must be stated because a matrix with $\\det = 3$ scales area by 3, and a matrix with $\\det = -3$ also scales area by 3 (while reflecting orientation). The question asks for the sures every term is expressed using only the elementary symmetric polynomials (sum and product), which you know from the original quadratic. Never try to find $\\alpha$ and $\\beta$ individually.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "FP1 May 2023 Q5(b) — When finding the sum of new roots like $\\frac{\\alpha}{\\alpha^2+1} + \\frac{\\beta}{\\beta^2+1}$, combining the fractions gives a numerator of $\\alpha(\\beta^2+1) + \\beta(\\alpha^2+1)$. What is the strategic factoring move required here? (2 steps)", "answer": "- Step 1: Expand the numerator to $\\alpha\\beta^2 + \\alpha + \\alpha^2\\beta + \\beta$. If you try to substitute numbers now, you'll be stuck with $\\alpha\\beta^2$ and $\\alpha^2\\beta$, which aren't easily expressible with just sum and product.\n- Step 2: Factor by grouping: pull out $\\alpha\\beta$ from the first and third terms, and $1$ from the second and fourth. This gives $\\alpha\\beta(\\alpha+\\beta) + 1(\\alpha+\\beta)$, which factors beautifully to $(\\alpha+\\beta)(\\alpha\\beta + 1)$. Now you can substitute directly.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": true}, {"question": "FP1 May 2023 Q5(b) — After finding the new sum $S = 3/5$ and new product $P = 3/40$ for a quadratic equation, why is $x^2 - \\frac{3}{5}x + \\frac{3}{40} = 0$ not an acceptable final answer? (2 steps)", "answer": "- Step 1: The question specifies the form $px^2 + qx + r = 0$ where $p, q, r$ are *integers*. Leaving fractional coefficients violates this constraint.\n- Step 2: You must clear the denominators by multiplying the entire equation by the LCM of the denominators (here, 40). This yields $40x^2 - 24x + 3 = 0$, providing the required integer coefficients.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": true}, {"question": "FP1 May 2023 Q5(b) — When constructing the new quadratic from the sum $S$ and product $P$ of the new roots, what is the skeleton equation, and what is a common sign error? (2 eal and imaginary parts of your final expression will be wrong.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "FP1 May 2023 Q6(d) — To find $\\arg w$ for $w = x + iy$, why can't you simply calculate $\\arctan(y/x)$ and call it a day? (2 steps)", "answer": "- Step 1: The function $\\arctan(y/x)$ only returns values between $-\\pi/2$ and $\\pi/2$ (the first and fourth quadrants). It cannot distinguish between quadrants diagonally opposite each other (e.g., $(x,y)$ vs $(-x,-y)$ have the same $y/x$ ratio).\n- Step 2: You must check the signs of $x$ and $y$ to determine the correct quadrant for $w$. If $w$ is in the second or third quadrant, you must add or subtract $\\pi$ from the $\\arctan$ result to find the true argument.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": true}, {"question": "FP1 May 2023 Q6(d) — When calculating $\\arg w$ where $w = \\frac{4}{13} + \\frac{58}{13}i$, what is the correct fraction to input into $\\arctan$, and what is a common reversal error? (2 steps)", "answer": "- Step 1: The argument is based on the ratio of the imaginary part to the real part: $\\arctan\\left(\\frac{\\text{imaginary}}{\\text{real}}\\right) = \\arctan\\left(\\frac{58/13}{4/13}\\right) = \\arctan(58/4)$.\n- Step 2: The common reversal error is computing $\\arctan(\\text{real}/\\text{imaginary}) = \\arctan(4/58)$. This gives the co-angle (the angle from the imaginary axis, not the real axis).", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "FP1 May 2023 Q7(a) — When showing that $f(x)=0$ has a root in $[a,b]$, what two verbal statements MUST accompany your sign checks $f(a)<0$ and $f(b)>0$? (2 steps)", "answer": "- Step 1: You must state that $f(x)$ is **continuous** over the interval $[a,b]$. The Intermediate Value Theorem requires continuity; without it, a sign change doesn't guarantee a root (the graph could jump over the x-axis).\n- Step 2: You must state the conclusion: \"Since $f(x)$ is continuous and changes sign, there is a root in the interval.\" Markers explicitly look for the word \"continuous\" and the logical deduction.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": true}, {"question": "FP1 May 2023 Q7(b) — During interval bisection, if $f(a) < 0$ and $f(b) > 0$, and the midpoint $m$ yields $f(m) > 0$, which half of the interval contains the root? (2 steps)", "answer": "- Step 1: The root lies where the sign change occurs. Since $f(a)$ is negative and $f(m)$ is positive, the sign change happens between $a$ and $m$.\n- Step 2: Therefore, the root is in the interval $[a, m]$. The interval $[m, b]$ is discarded because both $f(m)$ and $f(b)$ are positive (no sign change).", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "FP1 May 2023 Q7(c)(i) — When differentiating $f(x) = x^{3/2} + x - 3$, what is a very common pitfall regarding the linear term $+x$? (2 steps)", "answer": "- Step 1: The derivative of $x^{3/2}$ is $\\frac{3}{2}x^{1/2}$. The derivative of $-3$ is $0$. The derivative of $+x$ is $1$.\n- Step 2: The common pitfall is forgetting the $+1$ from the $+x$ term, yielding $f'(x) = \\frac{3}{2}x^{1/2}$. This completely breaks the Newton-Raphson formula because $f'(x_n)$ will be too small, causing $x_{n+1}$ to be drastically wrong.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": false}, {"question": "FP1 May 2023 Q7(c)(ii) — In a Newton-Raphson question requiring a final answer to 3 decimal places, what is the rule for rounding intermediate steps? (2 steps)", "answer": "- Step 1: You must NOT round your intermediate steps to 3 decimal places. Rounding at each step compounds the error.\n- Step 2: You must carry at least 5 decimal places (or store the full value in your calculator's memory) for all intermediate calculations, and only round the *final* answer to 3 decimal places.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "FP1 May 2023 Q7(d) — In the linear interpolation formula, you partition the interval $[a,b]$ in a specific ratio of function values. Must you use the signed or absolute values of $f(a)$ and $f(b)$, and why? (2 steps)", "answer": "- Step 1: You must use the **absolute** values $|f(a)|$ and $|f(b)|$. The formula geometrically finds the x-intercept of a straight line chord between the two points.\n- Step 2: If you use the signed values, the ratio will be negative, which makes no sense for partitioning a physical distance on the x-axis. The distance from the root to $a$ is proportional to the *magnitude* $|f(a)|$, regardless of whether $f(a)$ is positive or negative.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": true}, {"question": "FP1 May 2023 Q8 — For the parabola $y^2 = 8x$, how do you extract the parameter $a$, and what are the coordinates of the focus and directrix? (2 steps)", "answer": "- Step 1: Compare $y^2 = 8x$ to the standard form $y^2 = 4ax$. This gives $4a = 8$, so $a = 2$. A common pitfall is incorrectly claiming $a=8$ or $a=4$.\n- Step 2: The focus is always at $(a, 0)$, so here it is $(2, 0)$. The directrix is the vertical line $x = -a$, so here it is $x = -2$.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": false}, {"question": "FP1 May 2023 Q8(a) — When asked to \"show that\" a point $Q$ lies on a parabola $y^2 = 8x$, what is the direct method? (2 steps)", "answer": "- Step 1: Take the $y$-coordinate of $Q$ and square it. For $Q(2/p^2, -4/p)$, this gives $y^2 = (-4/p)^2 = 16/p^2$.\n- Step 2: Take the $x$-coordinate of $Q$ and multiply by 8. This gives $8x = 8(2/p^2) = 16/p^2$. Since $y^2 = 8x$, the point satisfies the equation and thus lies on the parabola.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "FP1 May 2023 Q8(b) — To show that a chord $PQ$ passes through the focus, what is the most efficient strategy after finding the equation of the line $PQ$? (2 steps)", "answer": "- Step 1: Find the equation of the line $PQ$ using the gradient and point $P$.\n- Step 2: Substitute the coordinates of the focus $(2,0)$ into the left and right sides of the line equation. If they are equal, the focus lies on the line. This is much faster than trying to solve the intersection of the line and the x-axis and hoping it yields $(2,0)$.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": false}, {"question": "FP1 May 2023 Q8(c) — For the parabola $y^2 = 4ax$, what is the standard formula for the tangent at the parametric point $(at^2, 2at)$? (2 steps)", "answer": "- Step 1: The standard tangent equation is $ty = x + at^2$. This is derived from the derivative $dy/dx = 2a/y$, giving gradient $1/t$ at the point.\n- Step 2: Using $y - y_1 = m(x - x_1)$ gives $y - 2at = \\frac{1}{t}(x - at^2)$, which rearranges to $ty - 2at^2 = x - at^2$, and finally $ty = x + at^2$.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": false}, {"question": "FP1 May 2023 Q8(c) — When intersecting two tangent equations to find their meeting point $R$, what algebraic fatigue pitfall should you avoid, and what is the strategic alternative? (2 steps)", "answer": "- Step 1: Avoid expanding everything into a massive polynomial in $p$ immediately. This leads to sign errors and lost terms.\n- Step 2: Keep the parameter $p$ factored as long as possible. For instance, when solving $y(1+p^2) = \\frac{2(p^4-1)}{p}$, recognize the difference of two squares: $p^4-1 = (p^2-1)(p^2+1)$. The $(p^2+1)$ terms cancel cleanly, leaving $y = \\frac{2(p^2-1)}{p}$.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": true}, {"question": "FP1 May 2023 Q8(c) — What is the powerful geometric theorem regarding the tangents at the endpoints of a focal chord of a parabola? (2 steps)", "answer": "- Step 1: The tangents at the endpoints of any focal chord always intersect on the directrix.\n- Step 2: This means for the parabola $y^2 = 8x$ (where the directrix is $x=-2$), the intersection point $R$ must have an x-coordinate of $-2$. If your algebra yields an $x$-coordinate that depends on $p$, you have made an error.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": false}, {"question": "FP1 May 2023 Q9 — When setting up a proof by induction for divisibility, why is it an error to use $n=1$ as the base case if the question states \"for $n \\geq 2$\"? (2 steps)", "answer": "- Step 1: Mathematical induction proves a statement for all integers from the base case upwards. If you start at $n=1$, you are proving a statement the question never asked for.\n- Step 2: While $f(1)=0$ might technically be divisible by 18, the logical structure of your proof must match the domain in the question. Always use the lowest bound explicitly stated (here, $n=2$).", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": false}, {"question": "FP1 May 2023 Q9 — In the inductive step of a divisibility proof, what is the strategic goal when expressing $f(k+1)$ in terms of $f(k)$? (2 steps)", "answer": "- Step 1: You want to write $f(k+1)$ as a sum of two terms: $A \\cdot f(k) + B$, where $A$ is an integer, and $B$ is *explicitly* a multiple of the target divisor (18).\n- Step 2: This works because if $f(k)$ is divisible by 18 (by the inductive hypothesis), then $A \\cdot f(k)$ is also divisible by 18. And if $B$ is explicitly a multiple of 18, then the sum of two multiples of 18 is also a multiple of 18, completing the step.", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": true}, {"question": "FP1 May 2023 Q9 — When trying to express $f(k+1)$ in terms of $f(k)$ for $f(n) = 4^n + 6n - 10$, what is the correct multiplier for $f(k)$ and why? (2 steps)", "answer": "- Step 1: Look at the exponential term. In $f(k+1)$, the exponential term is $4^{k+1} = 4 \\cdot 4^k$. In $f(k)$, it is $4^k$. To make the $f(k)$ term match the $f(k+1)$ term, you must multiply the entire $f(k)$ by 4.\n- Step 2: This gives $f(k+1) = 4 \\cdot f(k) + \\text{remainder}$. If you try $f(k+1) - f(k)$, you get $3 \\cdot 4^k + 6$, which requires messy modular arithmetic to prove divisibility by 18. The $4f(k)$ approach is much cleaner.", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": false}, {"question": "FP1 May 2023 Q9 — After algebraically showing that $f(k+1) = 18(\\dots)$, what final component of the proof is most commonly forgotten by students? (2 steps)", "answer": "- Step 1: The conclusion sentence. Markers explicitly check for a verbal statement that ties the base case and inductive step together using the Principle of Mathematical Induction.\n- Step 2: You must write something like: \"Since $f(2)$ is divisible by 18, and if $f(k)$ is divisible by 18 then $f(k+1)$ is divisible by 18, by the principle of mathematical induction, $4^n + 6n - 10$ is divisible by 18 for all integers $n \\geq 2$.\"", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": false}, {"question": "FP1 May 2023 — What is the unifying strategic skill across the seven flagged \"redo\" questions in this paper (Q1, Q2, Q4, Q5, Q7, Q8, Q9)? (2 steps)", "answer": "- Step 1: The unifying skill is **strategic algebraic factoring before numerical substitution**. In every flagged question, expanding early leads to algebraic explosions, whereas keeping expressions factored leads to clean cancellations.\n- Step 2: Examples: Q1 needs $n(n+1)$ pulled out early; Q5(b) needs $(\\alpha+\\beta)(\\alpha\\beta+1)$ spotted; Q8(c) needs $(p^2+1)$ kept symbolic for late cancellation; Q9 needs $f(k+1)$ structured to isolate the $f(k)$ factor. Drill the \"factor early\" instinct.", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": false}, {"question": "FP1 May 2023 — When a question specifies \"In this question you must show all stages of your working. Solutions relying on calculator technology are not acceptable,\" what does this prohibit you from doing? (2 steps)", "answer": "- Step 1: It prohibits using calculator functions to directly evaluate complex arithmetic (like division or polynomial roots) or to solve polynomials. You must perform algebraic long division and complex conjugate multiplication manually.\n- Step 2: Partial credit depends entirely on the visible working. Even if your final answer is correct but derived from a calculator shortcut, you will score zero. You must show every step of rationalizing, expanding, and simplifying.", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": false}, {"question": "FP1 May 2023 — What is the time allocation rule of thumb for this 75-mark, 90-minute paper, and what should you do if you exceed it on a single question? (2 steps)", "answer": "- Step 1: The rule of thumb is roughly 1.2 minutes per mark. A 4-mark question deserves about 5 minutes; a 13-mark question deserves about 15 minutes.\n- Step 2: If you spend more than 2 minutes staring at a question without writing productive working, you must move on. Getting stuck on a 4-mark question and losing 10 minutes jeopardizes your ability to pick up easy marks later in the paper.", "source": "GLM 5.1 ①", "_id": "glm_1_46", "judge_pick": true}, {"question": "FP1 May 2023 Q5/8 — When a question asks for an answer \"in simplest form\" (e.g., coordinates of a point), what must you ensure about your final expression? (2 steps)", "answer": "- Step 1: You must ensure all possible algebraic simplifications have been performed. This includes canceling common factors in fractions and expanding brackets that can be combined.\n- Step 2: For example, $(-2, \\frac{2p^2-2}{p})$ is NOT in simplest form. You must factor the numerator to $\\frac{2(p^2-1)}{p}$ or split it to $2p - \\frac{2}{p}$. Examiners deduct marks for \"simplification\" failures.", "source": "GLM 5.1 ①", "_id": "glm_1_47", "judge_pick": true}, {"question": "FP1 May 2023 Q5/6 — How can you use the structure of multi-part questions as scaffolding to check your working? (2 steps)", "answer": "- Step 1: Later parts of a question often depend on results from earlier parts. If a later part feels disconnected or yields impossibly ugly numbers, you likely made an error in an earlier part.\n- Step 2: For example, Q5(a) asks for $(\\alpha^2+1)(\\beta^2+1)$, which evaluates to 40. Q5(b) requires finding a new sum and product, both of which have 40 in the denominator. If your part (b) doesn't use the 40, you've missed the link and likely set up the fractions wrong.", "source": "GLM 5.1 ①", "_id": "glm_1_48", "judge_pick": false}], "count": 49}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "Q1 (Series proof) — When a question says \"use the standard results for $\\sum r^2$ and $\\sum r^3$\" to prove an identity involving $\\sum r(r^2+2)$, what is the very first algebraic step you must perform BEFORE touching any formula? (2 steps)", "answer": "- Step 1: **Expand the bracket and split the sum.** You cannot apply a standard result directly to $r(r^2+2)$ — it is not one of the booklet forms. Write $$\\sum_{r=1}^{n} r(r^2+2) = \\sum_{r=1}^{n} r^3 + 2\\sum_{r=1}^{n} r.$$ This decomposes the compound expression into pieces that each match a known formula.\n- Step 2: The reason this must come first is that the booklet gives you $\\sum r^3$ and $\\sum r$ — not $\\sum r(r^2+2)$. Trying to \"integrate\" or guess a formula for the combined form is a dead end; the question is testing whether you can decompose before substituting.\n\nThe trigger phrase \"use the standard results for…\" is telling you: break the expression into pieces that match those results.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "Q1 (Series proof) — When substituting $\\sum r^3 = \\tfrac14 n^2(n+1)^2$ and $\\sum r = \\tfrac12 n(n+1)$, should you use the **factored** forms from the booklet, or expand them into polynomial form first? Why? (2 steps)", "answer": "- Step 1: Use the **factored** forms directly. The booklet gives $\\sum r^3 = \\tfrac14 n^2(n+1)^2$ and $\\sum r = \\tfrac12 n(n+1)$ — keep them as-is.\n- Step 2: The reason is that \"show that\" questions always expect you to arrive at a factored final answer. If you expand first, you create a polynomial mess that you must then re-factor — slow, error-prone, and you can easily drop the $\\tfrac14$ vs $\\tfrac{1}{12}$ scaling. The factored forms make the common factor $n(n+1)$ immediately visible.\n\nExpanding is a one-way door: easy to do, hard to undo. Stay factored until the end.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": true}, {"question": "Q1 (Series proof) — After substituting the standard results you get $\\tfrac14 n^2(n+1)^2 + n(n+1)$. What is the key strategic move at this point, and why is doing it early critical? (2 steps)", "answer": "- Step 1: **Factor out $n(n+1)$ immediately.** Write $$\\tfrac14 n^2(n+1)^2 + n(n+1) = n(n+1)\\!\\left[\\tfrac14 n(n+1) + 1\\right].$$\n- Step 2: If you skip this and expand both terms separately, you get $\\tfrac14 n^4 + \\tfrac12 n^3 + \\tfrac14 n^2 + n^2 + n = \\tfrac14 n^4 + \\tfrac12 n^3 + \\tfrac54 n^2 + n$, and now you must re-factor a quartic — extremely error-prone. Factoring $n(n+1)$ out early reduces the bracket to a simple quadratic in $n$ that you can combine over a common denominator: $\\tfrac{n(n+1)+4}{4} = \\tfrac{n^2+n+4}{4}$.\n\nThis is the \"factor early\" instinct that unifies Q1, Q3, Q5, Q8, and Q9 on this paper.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": true}, {"question": "Q1 (Series proof) — You've arrived at $\\frac{n(n+1)(n^2+n+4)}{4}$ but the question demands the form $\\tfrac{1}{12}n(n+1)(an^2+bn+c)$. What manipulation is required, and what's the pitfall if you skip it? (2 steps)", "answer": "- Step 1: **Scale the fraction** by multiplying numerator and denominator by 3: $$\\frac{n(n+1)(n^2+n+4)}{4} = \\frac{3 \\cdot n(n+1)(n^2+n+4)}{12} = \\tfrac{1}{12}n(n+1)(3n^2+3n+12).$$\n- Step 2: The pitfall is leaving the answer as $\\tfrac14 n(n+1)(n^2+n+4)$ and not realising you must match the $\\tfrac{1}{12}$ denominator the question specifies. The question's form is an instruction, not a suggestion — if you don't scale, you haven't \"shown\" the required form and you can't read off $a, b, c$.\n\nAfter scaling, read off: $a=3$, $b=3$, $c=12$, and **state them explicitly**.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "Q1 (Series proof) — The question lists both $\\sum r^2$ and $\\sum r^3$ as available standard results, but the algebra only uses $\\sum r^3$ and $\\sum r$. What's the lesson about how to read such lists? (2 steps)", "answer": "- Step 1: The listed standard results form a **toolkit**, not a checklist. You use the ones the algebra requires — in this case, expanding $r(r^2+2) = r^3 + 2r$ produces $\\sum r^3$ and $\\sum r$, but never $\\sum r^2$.\n- Step 2: Don't be misled into thinking you must use every formula mentioned. Some questions include extra formulas as distractors or for completeness. Let the algebra tell you which tools to reach for, not the list.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": true}, {"question": "Q1 (Series proof) — When expanding $\\sum_{r=1}^{n} r(r^2+2) = \\sum r^3 + 2\\sum r$, what is a common sign/coefficient slip on the second term? (1 step)", "answer": "The pitfall is writing $\\sum 2r = \\sum r$ — i.e., dropping the factor of 2. The constant inside the sum must be pulled out as a multiplier: $\\sum 2r = 2\\sum r$. Forgetting this gives you $\\tfrac14 n^2(n+1)^2 + \\tfrac12 n(n+1)$ instead of $\\tfrac14 n^2(n+1)^2 + n(n+1)$, and the entire identity breaks.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "Q2 (Complex roots of quartic) — When told \"$x = 2+3i$ is a root\" of a polynomial with **real coefficients**, what root can you immediately write down, and what principle forces this? (2 steps)", "answer": "- Step 1: The other root is $\\boxed{2-3i}$, the complex conjugate.\n- Step 2: The principle is: **for any polynomial with real coefficients, complex roots occur in conjugate pairs.** If $z$ is a root, so is $\\bar{z}$. This is because conjugating the entire equation $a_n z^n + \\cdots + a_0 = 0$ gives $\\overline{a_n} \\bar{z}^n + \\cdots + \\overline{a_0} = 0$, and since all $a_i$ are real, $\\overline{a_i} = a_i$, so $\\bar{z}$ satisfies the same equation.\n\nExaminers sometimes want you to **state** \"real coefficients $\\Rightarrow$ complex roots come in conjugate pairs\" verbally for the mark.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": true}, {"question": "Q2 (Complex roots of quartic) — Given that $z = 2+3i$ is a root, you need to form the real quadratic factor of the quartic. What shortcut formula lets you write this down without a full FOIL expansion of $(x-z)(x-\\bar{z})$? (2 steps)", "answer": "- Step 1: Use the identity $$(x-z)(x-\\bar{z}) = x^2 - 2\\operatorname{Re}(z)\\,x + |z|^2.$$ For $z = 2+3i$: $\\operatorname{Re}(z) = 2$ and $|z|^2 = 2^2 + 3^2 = 13$, giving $x^2 - 4x + 13$.\n- Step 2: This works because $(x-z)(x-\\bar{z}) = x^2 - (z+\\bar{z})x + z\\bar{z}$, and $z+\\bar{z} = 2\\operatorname{Re}(z)$ while $z\\bar{z} = |z|^2$. It saves you from expanding $(x-2-3i)(x-2+3i)$ and collecting $36i$ terms.\n\nThis shortcut is **not** in the formula booklet — memorise it.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": true}, {"question": "Q2 (Complex roots of quartic) — When computing $|2+3i|^2 = 2^2 + 3^2 = 13$, what is a common mental slip in the sign, and why does it happen? (2 steps)", "answer": "- Step 1: The slip is writing $|2+3i|^2 = 2^2 - 3^2 = -5$ (a minus instead of a plus).\n- Step 2: This happens because the brain conflates $|z|^2 = a^2 + b^2$ with the difference-of-squares pattern $a^2 - b^2$, or because the student recalls that $i^2 = -1$ and incorrectly transfers that minus sign into the modulus calculation. But $|z|^2 = z\\bar{z} = (a+bi)(a-bi) = a^2 - (bi)^2 = a^2 - b^2 i^2 = a^2 + b^2$. The $i^2 = -1$ creates a **double negative**, yielding a plus.\n\nAlways remember: modulus squared is a **sum** of squares, never a difference.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": true}, {"question": "Q2 (Complex roots of quartic) — When dividing $2x^4 - 8x^3 + 29x^2 - 12x + 39$ by $x^2 - 4x + 13$, the first quotient term is $2x^2$, not $x^2$. Why is getting this leading coefficient wrong so consequential? (2 steps)", "answer": "- Step 1: The leading term of the dividend is $2x^4$ and the leading term of the divisor is $x^2$, so $2x^4 \\div x^2 = 2x^2$. If you write $x^2$ instead, your \"multiply back\" step gives $x^4 - 4x^3 + 13x^2$ — off by a factor of 2 — and the remainder is wrong from the very first line.\n- Step 2: The error cascades: every subsequent quotient term and remainder will be contaminated. With a leading coefficient $\\neq 1$ on the highest power, you must divide the actual leading coefficients, not default to 1.\n\nThis is the single most common slip in polynomial long division on FP1.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "Q2 (Complex roots of quartic) — After division you get the quadratic $2x^2 + 3 = 0$, giving $x^2 = -\\tfrac{3}{2}$. What is the fully simplified surd form of the roots, and why is leaving it as $\\pm\\sqrt{-3/2}$ insufficient? (2 steps)", "answer": "- Step 1: $x = \\pm\\sqrt{-3/2} = \\pm i\\sqrt{3/2} = \\pm \\tfrac{\\sqrt{6}}{2}\\,i$. Rationalise the surd under the square root: $\\sqrt{3/2} = \\sqrt{3}/\\sqrt{2} = \\sqrt{6}/2$.\n- Step 2: Full credit requires the clean $\\pm\\tfrac{\\sqrt{6}}{2}i$ form. Leaving $x = \\pm\\sqrt{-3/2}$ is unsimplified — it has a square root of a fraction and a negative under the radical. Edexcel mark schemes explicitly require you to simplify surds and express complex numbers in standard $a + bi$ form (here $a=0$).", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "Q2 (Complex roots of quartic) — On the Argand diagram, the four roots $2+3i$, $2-3i$, $\\tfrac{\\sqrt{6}}{2}i$, $-\\tfrac{\\sqrt{6}}{2}i$ have a geometric symmetry. What is it, and what causes it? (2 steps)", "answer": "- Step 1: Each conjugate pair forms a **reflection across the real axis**. The points $2+3i$ and $2-3i$ are vertical mirror images; the points $\\tfrac{\\sqrt{6}}{2}i$ and $-\\tfrac{\\sqrt{6}}{2}i$ are vertical mirror images on the imaginary axis.\n- Step 2: This symmetry is a direct geometric consequence of the conjugate-pair theorem: if $z$ is a root of a real-coefficient polynomial, so is $\\bar{z}$, and $\\bar{z}$ is the reflection of $z$ across the real axis in the Argand plane. Purely imaginary roots ($0 + bi$ and $0 - bi$) sit on the imaginary axis, reflected across the origin.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "Q3 (Normal to rectangular hyperbola) — For the rectangular hyperbola $xy = c^2$ with parametric point $P(ct, c/t)$, what are the tangent gradient and the normal gradient? What is the sign relationship? (2 steps)", "answer": "- Step 1: Differentiating $y = c^2/x$ gives $dy/dx = -c^2/x^2$. At $P(ct, c/t)$: $dy/dx = -c^2/(ct)^2 = -1/t^2$. So **tangent gradient** $m_T = -1/t^2$.\n- Step 2: The **normal gradient** is $m_N = -1/m_T = t^2$. The sign flips and the reciprocal inverts: the negative of a negative gives a positive. The critical pitfall is using $m_T$ when the question says \"normal\" — always check which one is asked for.\n\nFor $xy = 9$ (so $c = 3$): $m_T = -1/t^2$, $m_N = t^2$.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": true}, {"question": "Q3 (Normal to rectangular hyperbola) — After writing the normal equation $y - 3/t = t^2(x - 3t)$, the question demands the form $ty - t^3 x = f(t)$. What algebraic move achieves this, and why is it necessary? (2 steps)", "answer": "- Step 1: **Multiply both sides by $t$** to clear the fraction $3/t$. This gives $ty - 3 = t^3 x - 3t^4$, then rearrange: $ty - t^3 x = 3 - 3t^4$.\n- Step 2: The question specifies a polynomial-in-$t$ form with no fractions. Multiplying by $t$ eliminates the $1/t$ term and produces a clean left-hand side $ty - t^3 x$ and a polynomial right-hand side $f(t) = 3 - 3t^4$. Examiners insist on this form — leaving fractions loses the format mark.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": true}, {"question": "Q3 (Normal to rectangular hyperbola) — When finding where the normal meets the hyperbola again, you solve $8x^2 - 45x - 18 = 0$. You already know $x = 6$ is a root (the point $P$ itself). How does this shortcut the factoring, and what wording in the question tells you to reject this root? (2 steps)", "answer": "- Step 1: Since $x = 6$ is a known root, factor out $(x-6)$: $8x^2 - 45x - 18 = (x-6)(8x+3)$. The other root is $x = -3/8$. This avoids the quadratic formula entirely.\n- Step 2: The phrase **\"meets $H$ again\"** tells you $P$ itself is not the answer — you must reject $x = 3t = 6$ and report only the other intersection point $(-3/8, -24)$. If the question said \"meets $H$,\" both points would count; \"again\" explicitly excludes the starting point.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": true}, {"question": "Q3 (Normal to rectangular hyperbola) — After finding the other $x$-coordinate of intersection, you need the corresponding $y$-coordinate. Which equation should you substitute into — the normal equation or the hyperbola equation $xy = 9$ — and why? (2 steps)", "answer": "- Step 1: Substitute into the **hyperbola** equation $xy = 9$ (i.e., $y = 9/x$). With $x = -3/8$: $y = 9/(-3/8) = -24$.\n- Step 2: Both equations are satisfied at the intersection point, so technically either works. But $y = 9/x$ is a single direct substitution, whereas the normal equation $2y = 8x - 45$ also works but is more arithmetic-heavy and error-prone. The curve equation is the safer route.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "Q4 (Matrix transformations) — The transformation represented by matrix $A$ scales areas by a factor of 3. When setting up the equation for $\\det A$, what is the critical piece of notation that prevents missing a solution? (2 steps)", "answer": "- Step 1: Write $|\\det A| = 3$ with **explicit modulus bars**. This gives $3k - 24 = \\pm 3$, producing $k = 9$ **or** $k = 7$.\n- Step 2: If you write $\\det A = 3$ without modulus, you solve only $3k - 24 = 3$ giving $k = 9$, and miss $3k - 24 = -3$ giving $k = 7$. The area scale factor is $|\\det M|$, always non-negative. A negative determinant corresponds to a reflection (orientation-reversing), but the area still scales by its absolute value.\n\nAlways write the modulus bars first — even if you forget one value, the modulus earns the method mark.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "Q4 (Matrix transformations) — Given $BC = D$ where $B$ is $2 \\times 2$ and $D$ is $2 \\times 3$, you need to find $C$. Should you compute $B^{-1}D$ or $DB^{-1}$? Why does order matter? (2 steps)", "answer": "- Step 1: Compute $C = B^{-1}D$, **not** $DB^{-1}$. Left-multiply both sides of $BC = D$ by $B^{-1}$: $B^{-1}(BC) = B^{-1}D$, so $(B^{-1}B)C = B^{-1}D$, giving $C = B^{-1}D$.\n- Step 2: Matrix multiplication is **non-commutative**: $B^{-1}D \\neq DB^{-1}$ in general. Right-multiplying would give $BCB^{-1} = DB^{-1}$, which doesn't isolate $C$. The rule: to undo a left-multiplication, left-multiply by the inverse; to undo a right-multiplication, right-multiply.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": true}, {"question": "Q4 (Matrix transformations) — For $B = \\begin{pmatrix} a & 4 \\\\ 2 & 3 \\end{pmatrix}$, write down the inverse $B^{-1}$ using the standard formula, paying attention to the sign pattern. (2 steps)", "answer": "- Step 1: $\\det B = 3a - 8$. The inverse is $$B^{-1} = \\frac{1}{3a-8}\\begin{pmatrix} 3 & -4 \\\\ -2 & a \\end{pmatrix}.$$\n- Step 2: The sign pattern for $\\begin{pmatrix} a & b \\\\ c & d \\end{pmatrix}^{-1} = \\frac{1}{ad-bc}\\begin{pmatrix} d & -b \\\\ -c & a \\end{pmatrix}$: swap $a \\leftrightarrow d$, negate $b$ and $c$. Common slip: writing $\\begin{pmatrix} 3 & 4 \\\\ 2 & a \\end{pmatrix}$ (forgetting the negations on the off-diagonal entries). Another slip: computing $\\det B = 3a + 8$ or $8 - 3a$ instead of $3a - 8$.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "Q4 (Matrix transformations) — After computing $C = \\frac{1}{3a-8}\\begin{pmatrix} 10 & -1 & -5 \\\\ -4-a & 4a-10 & 2a-2 \\end{pmatrix}$, should you multiply the $\\frac{1}{3a-8}$ through into every entry, or leave it as a scalar factor out front? (1 step)", "answer": "Leave the $\\frac{1}{3a-8}$ as a scalar factor out front. Multiplying through creates six separate fractions and obscures the structure — it's unnecessary work and increases the chance of arithmetic errors. The factored form is perfectly acceptable and is actually clearer.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "Q5 (Roots of quadratic → new quadratic) — From $f(x) = x^2 - 6x + 3$ with roots $\\alpha, \\beta$, what are the sum and product, and what identity lets you compute $\\alpha^2 + \\beta^2$ without finding the individual roots? (2 steps)", "answer": "- Step 1: Sum $\\alpha + \\beta = 6$, product $\\alpha\\beta = 3$ (by comparing with $x^2 - (\\text{sum})x + \\text{product} = 0$).\n- Step 2: The identity is $\\alpha^2 + \\beta^2 = (\\alpha+\\beta)^2 - 2\\alpha\\beta = 36 - 6 = 30$. This avoids solving the quadratic. The identity works because $(\\alpha+\\beta)^2 = \\alpha^2 + 2\\alpha\\beta + \\beta^2$, so rearranging gives $\\alpha^2 + \\beta^2 = (\\alpha+\\beta)^2 - 2\\alpha\\beta$.\n\nThis identity is **not** in the formula booklet — memorise it.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "Q5 (Roots of quadratic → new quadratic) — To compute $(\\alpha^2+1)(\\beta^2+1)$, what is the expansion pattern, and what is a common sign error? (2 steps)", "answer": "- Step 1: Expand as $(\\alpha^2+1)(\\beta^2+1) = \\alpha^2\\beta^2 + \\alpha^2 + \\beta^2 + 1 = (\\alpha\\beta)^2 + (\\alpha^2+\\beta^2) + 1 = 9 + 30 + 1 = 40$.\n- Step 2: The common sign error is treating it like a difference of squares and writing $\\alpha^2\\beta^2 - 1$ (dropping the cross terms $\\alpha^2 + \\beta^2$). This mistake comes from confusing $(a+1)(b+1) = ab + a + b + 1$ with $(a+1)(a-1) = a^2 - 1$. The former has four terms; the latter is a special factorisation that doesn't apply here.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "Q5 (Roots of quadratic → new quadratic) — When computing the new sum of roots $S = \\frac{\\alpha}{\\alpha^2+1} + \\frac{\\beta}{\\beta^2+1}$, you combine over a common denominator to get the numerator $\\alpha\\beta^2 + \\alpha + \\alpha^2\\beta + \\beta$. What is the key factoring trick, and why is it essential? (3 steps)", "answer": "- Step 1: Group as $\\alpha\\beta^2 + \\alpha^2\\beta + \\alpha + \\beta = \\alpha\\beta(\\beta + \\alpha) + (\\alpha + \\beta)$.\n- Step 2: Factor out $(\\alpha+\\beta)$: $= (\\alpha+\\beta)(\\alpha\\beta + 1) = 6 \\times 4 = 24$.\n- Step 3: Without this trick, you'd try to compute $\\alpha^2\\beta + \\alpha\\beta^2$ separately, which requires knowing $\\alpha^2\\beta + \\alpha\\beta^2 = \\alpha\\beta(\\alpha+\\beta)$ — the same factoring but discovered later and with more algebraic fumbling. Spotting the grouping **before** substituting numbers is the key: it turns a messy expression into a product of two quantities you already know.\n\nThis is the specific rearrangement flagged as critical in the revision notes.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": true}, {"question": "Q5 (Roots of quadratic → new quadratic) — After computing the new sum $S = 3/5$ and new product $P = 3/40$, you write the new quadratic as $x^2 - Sx + P = 0$. What must you do before stating the final answer, and what sign pitfall lies in the $x$-coefficient? (2 steps)", "answer": "- Step 1: **Clear fractions** to give integer coefficients. Multiply through by 40 (the LCM of denominators): $40x^2 - 24x + 3 = 0$. The question demands $p, q, r$ be integers.\n- Step 2: The sign pitfall is in the $-Sx$ term. The skeleton is $x^2 - Sx + P = 0$, so the $x$-coefficient is $-S = -3/5$, giving $-24$ after clearing. A common error is writing $+Sx$ instead of $-Sx$, producing $40x^2 + 24x + 3 = 0$ with the wrong sign on the middle term.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "Q5 (Roots of quadratic → new quadratic) — Why is part (a) asking for $(\\alpha^2+1)(\\beta^2+1)$ not just a standalone question but a deliberate setup for part (b)? (2 steps)", "answer": "- Step 1: The value $(\\alpha^2+1)(\\beta^2+1) = 40$ is the **denominator** of both the new sum and the new product in part (b): $$S = \\frac{\\text{numerator}}{40}, \\qquad P = \\frac{\\alpha\\beta}{40} = \\frac{3}{40}.$$\n- Step 2: This is the \"scaffolding\" pattern: if a multi-part question has you compute something in part (a) that looks like a standalone result, it's almost certainly reused in part (b). If part (b) feels disconnected, you've probably missed the link. Here, computing the denominator first makes the new-sum and new-product calculations trivial.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": true}, {"question": "Q6 (Complex arithmetic) — The question asks for the \"exact value\" of $|z_1 + z_2|$ where $z_1 = 3+2i$ and $z_2 = 2+3i$. What form must the answer take, and what would lose marks? (2 steps)", "answer": "- Step 1: $z_1 + z_2 = 5 + 5i$, so $|z_1+z_2| = \\sqrt{25+25} = \\sqrt{50} = 5\\sqrt{2}$. The answer must be in **surd form**.\n- Step 2: Writing $7.07$ or $7.071$ loses marks because \"exact value\" means no rounding — the surd $5\\sqrt{2}$ is the exact representation. A decimal is an approximation. Similarly, $\\sqrt{50}$ is acceptable but $5\\sqrt{2}$ is simpler.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "Q6 (Complex arithmetic) — To compute $w = \\frac{z_2 z_3}{z_1}$ where $z_1 = 3+2i$, what is the standard method for dividing by a complex number, and what is the geometric motivation? (2 steps)", "answer": "- Step 1: Multiply numerator and denominator by the **conjugate** of the denominator: $\\frac{z_2 z_3}{z_1} = \\frac{z_2 z_3 \\cdot \\bar{z}_1}{z_1 \\cdot \\bar{z}_1} = \\frac{z_2 z_3 \\cdot \\bar{z}_1}{|z_1|^2}$. The denominator becomes the real number $|z_1|^2 = 13$, and the numerator is a standard complex multiplication.\n- Step 2: The motivation is that $z\\bar{z} = |z|^2$ is always real and positive. This \"rationalises\" the denominator (analogous to rationalising surds), converting the division into a real-scalar division plus a complex multiplication — both of which are straightforward.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": true}, {"question": "Q6 (Complex arithmetic) — When expanding $(2+3i)(a+bi)$, what is the most common sign error, and where does it come from? (2 steps)", "answer": "- Step 1: The correct expansion is $(2a - 3b) + (3a + 2b)i$. The common error is getting $+3b$ instead of $-3b$ in the real part, i.e., writing $(2a + 3b) + \\ldots$\n- Step 2: This comes from forgetting that $i^2 = -1$. The cross terms $2 \\cdot bi = 2bi$ and $3i \\cdot a = 3ai$ are fine, but $3i \\cdot bi = 3bi^2 = -3b$. The $i^2 = -1$ introduces a sign flip that's easy to miss under exam pressure.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "Q6 (Complex arithmetic) — After finding $w = \\frac{12a-5b}{13} + \\frac{5a+12b}{13}i$ and being told $w = \\frac{4}{13} + \\frac{58}{13}i$, what technique solves for $a$ and $b$? (2 steps)", "answer": "- Step 1: **Equate real and imaginary parts**: $12a - 5b = 4$ and $5a + 12b = 58$. Two equations, two unknowns.\n- Step 2: Solve by elimination. Multiply (1) by 12 and (2) by 5: $144a - 60b = 48$ and $25a + 60b = 290$. Adding eliminates $b$: $169a = 338$, so $a = 2$, then $b = 4$. The key insight is that two complex numbers are equal if and only if their real parts are equal AND their imaginary parts are equal.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "Q6 (Complex arithmetic) — To compute $\\arg w$ where $w = \\frac{4}{13} + \\frac{58}{13}i$, you need $\\arctan(\\text{imag}/\\text{real})$. What is the ratio, and what must you check before computing? (2 steps)", "answer": "- Step 1: The ratio is $\\frac{58/13}{4/13} = \\frac{58}{4} = 14.5$. Note: it's $\\arctan(\\text{imag}/\\text{real})$, NOT $\\arctan(\\text{real}/\\text{imag})$ — the reciprocal error $\\arctan(4/58)$ is a common slip.\n- Step 2: **Check the quadrant.** Both real and imaginary parts are positive, so $w$ is in the first quadrant and $\\arg w = \\arctan(14.5) \\approx 1.502$ rad directly. If either part were negative, you'd need to add or subtract $\\pi$ — $\\arctan$ alone only gives correct results in Q1 and Q4.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "Q6 (Complex arithmetic) — The question asks for $\\arg w$ in radians to 4 significant figures. What are two calculator-mode pitfalls? (2 steps)", "answer": "- Step 1: **Radians vs degrees.** If your calculator is in degree mode, $\\arctan(14.5) \\approx 86.06°$, which is wrong. In radian mode, $\\arctan(14.5) \\approx 1.502$ rad. Always verify the mode.\n- Step 2: **4 sig fig vs 3 dp.** The answer $1.50194\\ldots$ to 4 sig fig is $1.502$ (the leading 1 counts as a significant figure). To 3 dp it would also be $1.502$, but the specifications are different and for other numbers they diverge. Read the requirement carefully.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "Q7 (Numerical methods) — To show that $f(x) = x^{3/2} + x - 3$ has a root in $[1,2]$, you compute $f(1) = -1$ and $f(2) \\approx 1.828$. What verbal statement must accompany this for full marks? (2 steps)", "answer": "- Step 1: State: \"$f$ is **continuous** on $[1,2]$, $f(1) < 0$ and $f(2) > 0$, so by the **Intermediate Value Theorem** there exists $\\alpha \\in (1,2)$ such that $f(\\alpha) = 0$.\"\n- Step 2: The three required components are: (1) continuity, (2) sign change, (3) conclusion invoking IVT. Omitting the continuity clause or the IVT name can cost marks. Just writing \"$f(1) < 0$ and $f(2) > 0$ so there's a root\" is insufficient — you must justify *why* a sign change implies a root.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "Q7 (Numerical methods) — During bisection, after computing $f(1.5) > 0$, you know $f(1) < 0$ and $f(2) > 0$. How do you decide which sub-interval contains the root? (2 steps)", "answer": "- Step 1: The root is in the sub-interval where the **sign change occurs**. $f(1) < 0$ and $f(1.5) > 0$ — sign change — so the root is in $[1, 1.5]$. The other sub-interval $[1.5, 2]$ has $f(1.5) > 0$ and $f(2) > 0$ — no sign change.\n- Step 2: The pitfall is thinking \"the midpoint is positive so the root must be between the midpoint and the other positive endpoint.\" Wrong — the root is always between the negative value and the positive value. Look for the sign change, not the sign of the midpoint.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "Q7 (Numerical methods) — For $f(x) = x^{3/2} + x - 3$, what is $f'(x)$, and what is the most common term that gets dropped? (2 steps)", "answer": "- Step 1: $f'(x) = \\tfrac{3}{2}x^{1/2} + 1$. The derivative of $x^{3/2}$ is $\\tfrac{3}{2}x^{1/2}$, and the derivative of $x$ is $1$.\n- Step 2: The common slip is writing $f'(x) = \\tfrac{3}{2}x^{1/2}$ — forgetting the $+1$ from the $x$ term. This is devastating: at $x = 1.375$, the correct $f' \\approx 2.759$ but the truncated $f' \\approx 1.759$. The Newton-Raphson step $\\frac{f(x)}{f'(x)}$ is then off by a factor of roughly $1.5$, producing a wildly wrong next approximation.\n\nAlways verify $f'(x)$ has the same number of terms as $f(x)$ (excluding constants).", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": false}, {"question": "Q7 (Numerical methods) — When applying Newton-Raphson once with $x_0 = 1.375$, the answer must be given to 3 decimal places. How many decimal places should you carry in intermediate calculations, and why? (2 steps)", "answer": "- Step 1: Carry **at least 5 decimal places** in all intermediate steps. For example, $f(1.375) \\approx -0.01268$ and $f'(1.375) \\approx 2.75891$ — both kept to 5 dp.\n- Step 2: Premature rounding compounds error. If you round $f(1.375)$ to $-0.013$ and $f'(1.375)$ to $2.759$, the correction is $0.013/2.759 \\approx 0.00471$ vs the more accurate $0.00460$ — a difference of $0.00011$ that could push the 3 dp answer from $1.380$ to $1.379$.\n\nRound only at the final answer, never during intermediate steps.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": false}, {"question": "Q7 (Numerical methods) — In the linear interpolation formula on $[a,b]$, you partition the interval in the ratio $|f(a)| : |f(b)|$. What happens if you use signed values $f(a)$ and $f(b)$ instead of absolute values? (2 steps)", "answer": "- Step 1: Since $f(a)$ and $f(b)$ have opposite signs (there's a root between them), using signed values would give a ratio with one negative component, placing the interpolation point **outside** the interval $[a,b]$ — nonsensical.\n- Step 2: The correct formula is $$\\alpha \\approx a + \\frac{|f(a)|}{|f(a)| + |f(b)|}(b - a).$$ The absolute values ensure the ratio is between 0 and 1, so the approximation lies inside $[a,b]$. Geometrically, you're finding where the chord crosses the $x$-axis, and the partition ratio must be positive.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": true}, {"question": "Q7 (Numerical methods) — For part (d), linear interpolation is applied on the interval $[1.25, 1.5]$, not $[1, 2]$. How do you know which interval to use? (2 steps)", "answer": "- Step 1: Part (b) established that $\\alpha \\in [1.25, 1.5]$ after two bisections. Part (d) says \"use linear interpolation once on the interval $[1.25, 1.5]$\" — the question explicitly gives you the interval.\n- Step 2: If the question doesn't specify, use the **most refined interval** you've established so far. Using $[1, 2]$ would still work in principle but gives a much cruder approximation. The whole point of the multi-part structure is that each part refines the interval for the next method.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": true}, {"question": "Q8 (Parabola focal chord) — The parabola has equation $y^2 = 8x$. What is the value of $a$, the focus, and the directrix? What is a common mis-identification? (2 steps)", "answer": "- Step 1: Comparing with $y^2 = 4ax$: $4a = 8$, so $a = 2$. Focus $= (a, 0) = (2, 0)$. Directrix: $x = -a = -2$.\n- Step 2: The common mis-identification is reading $y^2 = 8x$ and concluding $a = 8$. This gives focus $(8, 0)$ and directrix $x = -8$ — completely wrong. Always match to the standard form $y^2 = 4ax$ and solve for $a$.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": false}, {"question": "Q8 (Parabola focal chord) — To verify that $Q(2/p^2, -4/p)$ lies on the parabola $y^2 = 8x$, what do you check, and what's the efficient approach? (2 steps)", "answer": "- Step 1: Compute $y^2 = (-4/p)^2 = 16/p^2$ and $8x = 8 \\times (2/p^2) = 16/p^2$. Since they're equal, $Q$ lies on the parabola.\n- Step 2: The efficient approach is substituting into $y^2 = 8x$ directly, not solving $y = \\pm\\sqrt{8x}$ and checking both branches. The squared form is a single equation that handles both branches simultaneously, and the algebra is cleaner.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": false}, {"question": "Q8 (Parabola focal chord) — To show that chord $PQ$ passes through the focus $(2,0)$, what is the strategy: find the chord equation and substitute the focus, or find the focus and substitute into the chord? (2 steps)", "answer": "- Step 1: Find the chord equation (slope $m = 2p/(p^2-1)$, through $P$), then **substitute the focus $(2,0)$** into it and verify the equation is satisfied: $0 - 4p = \\frac{2p}{p^2-1}(2 - 2p^2) = -4p$. ✓\n- Step 2: This is a verification strategy, not a solving strategy. You're confirming that a known point lies on a known line. The alternative — solving for the intersection of $PQ$ with $x = 2$ — also works but is more roundabout. Verification is faster and less error-prone.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": true}, {"question": "Q8 (Parabola focal chord) — For the parabola $y^2 = 4ax$ at point $(at^2, 2at)$, what is the tangent equation? Give the formula and the derivation trigger. (2 steps)", "answer": "- Step 1: The tangent equation is $ty = x + at^2$. For $a = 2$: $ty = x + 2t^2$.\n- Step 2: Derivation trigger: differentiate $y^2 = 4ax$ implicitly to get $2y\\frac{dy}{dx} = 4a$, so $\\frac{dy}{dx} = \\frac{2a}{y}$. At $(at^2, 2at)$: gradient $= \\frac{2a}{2at} = \\frac{1}{t}$. Then $y - 2at = \\frac{1}{t}(x - at^2)$, multiply by $t$: $ty - 2at^2 = x - at^2$, giving $ty = x + at^2$.\n\nThis formula is **not** in the booklet — memorise it.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": true}, {"question": "Q8 (Parabola focal chord) — What is the geometric theorem about where the tangents at the endpoints of a focal chord meet? What does this predict about the $x$-coordinate of $R$ in this question? (2 steps)", "answer": "- Step 1: **Tangents at the endpoints of a focal chord intersect on the directrix.** This is a general theorem for parabolas.\n- Step 2: Since the directrix is $x = -2$ (because $a = 2$), the theorem predicts $R$ has $x$-coordinate $= -2$. Indeed, the algebra gives $R = (-2, 2p - 2/p)$. If your algebra produces an $x$-coordinate that depends on $p$, you've made an error — it must simplify to $x = -2$.\n\nThis theorem serves as a powerful sanity check.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": false}, {"question": "Q8 (Parabola focal chord) — When intersecting the two tangent equations $py = x + 2p^2$ and $y = -px - 2/p$, the algebra involves the factor $(1 + p^2)$. What strategy prevents algebra fatigue? (2 steps)", "answer": "- Step 1: **Keep $(1 + p^2)$ symbolic and cancel late.** From substituting $x = py - 2p^2$ into the second tangent: $y = -p(py - 2p^2) - 2/p = -p^2 y + 2p^3 - 2/p$. Collect: $y(1 + p^2) = 2p^3 - 2/p = \\frac{2(p^4-1)}{p} = \\frac{2(p^2-1)(p^2+1)}{p}$.\n- Step 2: Now cancel $(1 + p^2)$: $y = \\frac{2(p^2-1)}{p} = 2p - 2/p$. If you expand $p^4 - 1$ without recognising the difference-of-squares factorisation $(p^2-1)(p^2+1)$, you miss the cancellation and are left with an unsimplifiable mess. The \"simplest form\" requirement demands this cancellation.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": true}, {"question": "Q8 (Parabola focal chord) — The point $Q$ is given as $(2/p^2, -4/p)$ with a **negative** $y$-coordinate. What goes wrong if you misread this as $+4/p$? (2 steps)", "answer": "- Step 1: With $+4/p$, the product of the $y$-coordinates of $P$ and $Q$ would be $4p \\times 4/p = 16 > 0$ (same sign). The condition for a focal chord is that the parameters satisfy $t_1 \\cdot t_2 = -1$ (here $p \\times (-1/p) = -1$), which requires opposite signs on the $y$-coordinates.\n- Step 2: With $+4/p$, the algebra in part (b) wouldn't produce a line through the focus — the chord wouldn't be a focal chord and the entire question structure collapses. The sign of $Q$'s $y$-coordinate is what makes $PQ$ a focal chord.", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": false}, {"question": "Q8 (Parabola focal chord) — The question asks for coordinates of $R$ \"in simplest form.\" Why is $\\left(-2, \\frac{2p^2-2}{p}\\right)$ not acceptable, and what is the simplest form? (2 steps)", "answer": "- Step 1: $\\frac{2p^2-2}{p}$ can be split as $\\frac{2p^2}{p} - \\frac{2}{p} = 2p - \\frac{2}{p}$. The simplest form is $R = \\left(-2, 2p - \\frac{2}{p}\\right)$.\n- Step 2: \"Simplest form\" in Edexcel means: no comp
