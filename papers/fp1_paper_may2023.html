= a + \\frac{|f(a)|}{|f(a)| + |f(b)|}(b - a)$. This ensures the root lies closer to the endpoint with the smaller function value.", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "What is the standard form of the tangent to the parabola $y^2 = 4ax$ at parameter $t$? (1 step)", "answer": "- Step 1: Use $ty = x + at^2$. This avoids re-deriving the tangent equation each time.", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": false}], "count": 15}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "When working with a quartic polynomial with real coefficients where $2+3i$ is a root, what is the shortcut formula for forming the quadratic factor from the conjugate pair? (2 steps)", "answer": "- Step 1: For a complex root $z$, the conjugate pair gives the quadratic factor $(x - z)(x - \\bar z)$.\n- Step 2: Use the shortcut formula $x^2 - 2\\operatorname{Re}(z)\\,x + |z|^2$. This avoids a full FOIL expansion every time.\n+ For $z = 2 + 3i$: the quadratic is $x^2 - 2(2)x + (2^2 + 3^2) = x^2 - 4x + 13$.\n+ The $|z|^2$ term always uses a **plus** sign (the sum of squares), never a minus.\n\nThis formula is not in the formula booklet — memorise it.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "What is the correct way to find the normal to the rectangular hyperbola $xy = 9$ at the parametric point $P(3t, 3/t)$, and how should you structure your answer to match the required form $ty - t^3 x = f(t)$? (4 steps)", "answer": "- Step 1: Differentiate implicitly: $y = \\frac{9}{x}$ gives $\\frac{dy}{dx} = -\\frac{9}{x^2}$. At $P(3t, 3/t)$, the tangent gradient is $-\\frac{1}{t^2}$.\n- Step 2: The normal gradient is the negative reciprocal: $m_N = t^2$ (NOT $-1/t^2$ — this is the most common error).\n- Step 3: Write $y - \\frac{3}{t} = t^2(x - 3t)$.\n- Step 4: Multiply through by $t$ to clear the fraction: $ty - 3 = t^3x - 3t^4$. Rearrange to $ty - t^3x = 3 - 3t^4$, giving $f(t) = 3 - 3t^4$.\n+ The multiplication by $t$ is essential — it converts the fractional coordinates into a polynomial form that examiners require.\n\nThe phrase \"normal to $H$ at the point $P$\" is the trigger to use $t^2$, not $-1/t^2$.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": true}, {"question": "For a $2 \\times 2$ matrix $A = \\begin{pmatrix} a & b \\\\ c & d \\end{pmatrix}$, what is the formula for its inverse, and why must you include absolute value bars when using the determinant for area scale factor? (2 steps)", "answer": "- Step 1: The inverse is $A^{-1} = \\frac{1}{ad - bc}\\begin{pmatrix} d & -b \\\\ -c & a \\end{pmatrix}$, provided $ad - bc \\neq 0$. Note the diagonal elements swap and the off-diagonals change sign.\n- Step 2: For area scale factor, use $|\\det A|$ — the absolute value is essential because a negative determinant corresponds to an orientation-reversing transformation (a reflection combined with area change), but the area itself is always positive.\n+ If a matrix has determinant $-3$, the area scale factor is $|-3| = 3$, not $-3$.\n\nThis is a common pitfall: solving $|3k - 24| = 3$ gives two solutions ($k = 9$ or $k = 7$), but solving $3k - 24 = 3$ alone misses the negative case.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "In the expression $\\frac{\\alpha}{\\alpha^2+1} + \\frac{\\beta}{\\beta^2+1}$, what is the key algebraic trick to simplify the numerator, and why does this make the computation tractable? (3 steps)", "answer": "- Step 1: Write the sum as a single fraction: numerator is $\\alpha(\\beta^2+1) + \\beta(\\alpha^2+1)$.\n- Step 2: Expand and factor: $\\alpha\\beta^2 + \\alpha + \\alpha^2\\beta + \\beta = \\alpha\\beta(\\alpha+\\beta) + (\\alpha+\\beta) = (\\alpha+\\beta)(\\alpha\\beta + 1)$.\n+ This is the critical insight: without factoring, you'd try to compute $\\alpha^2\\beta + \\alpha\\beta^2$ separately, which is messy.\n- Step 3: Now substitute $\\alpha+\\beta = 6$ and $\\alpha\\beta = 3$ to get $(6)(3+1) = 24$.\n+ The denominator $(\\alpha^2+1)(\\beta^2+1)$ was already computed in part (a) as $40$, so the sum becomes $\\frac{24}{40} = \\frac{3}{5}$.\n\nThis \"factor before substituting\" pattern appears across FP1 — see Q1 (factor $n(n+1)$ early) and Q9 (write $f(k+1)$ in terms of $f(k)$).", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "When dividing complex numbers in the form $\\dfrac{z_2 z_3}{z_1}$ where $z_1 = 3+2i$, what is the correct procedure, and what is the common sign error to avoid? (3 steps)", "answer": "- Step 1: First compute the numerator $z_2 z_3 = (2+3i)(a+bi)$. Use FOIL: real part = $2a - 3b$ (note the minus because $i^2 = -1$), imaginary part = $3a + 2b$.\n- Step 2: Divide by $z_1 = 3+2i$ by multiplying numerator and denominator by the conjugate $\\bar{z}_1 = 3 - 2i$.\n- Step 3: The denominator becomes $|z_1|^2 = 3^2 + 2^2 = 13$. The numerator multiplication gives:\n+ Real part: $3(2a-3b) + 2(3a+2b) = 12a - 5b$\n+ Imaginary part: $-2(2a-3b) + 3(3a+2b) = 5a + 12b$\n+ Final answer: $w = \\frac{12a-5b}{13} + \\frac{5a+12b}{13}i$\n\nThe common error is forgetting that $i^2 = -1$ when multiplying $(2+3i)(a+bi)$, producing $+3b$ instead of $-3b$ in the real part.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "For the Newton-Raphson method applied to $f(x) = x^{3/2} + x - 3$ with initial guess $x_0 = 1.375$, what is the correct derivative $f'(x)$, and what is the common pitfall when computing it? (2 steps)", "answer": "- Step 1: Differentiate $f(x) = x^{3/2} + x - 3$. Using the power rule: $\\frac{d}{dx}x^{3/2} = \\frac{3}{2}x^{1/2}$. The derivative of $+x$ is $+1$.\n+ Therefore $f'(x) = \\frac{3}{2}\\sqrt{x} + 1$.\n- Step 2: The common pitfall is forgetting the $+1$ from the $x$ term, giving $f'(x) = \\frac{3}{2}\\sqrt{x}$ alone.\n+ At $x = 1.375$: correct $f'(1.375) \\approx 2.759$, but wrong $f'(1.375) \\approx 1.759$.\n+ This error makes the NR correction term $\\frac{f(x)}{f'(x)}$ about 1.5 times too large, completely destroying the 3 dp accuracy.\n\nAlways verify $f'(x)$ has all terms before using it in Newton-Raphson.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "For the parabola $y^2 = 8x$, what is the general form of the tangent at the parametric point $(at^2, 2at)$, and what theorem about focal chord tangents should you remember for part (c)? (2 steps)", "answer": "- Step 1: For $y^2 = 4ax$, the tangent at $(at^2, 2at)$ has gradient $\\frac{1}{t}$ and equation $ty = x + at^2$.\n+ Here $4a = 8$, so $a = 2$. At $P(2p^2, 4p)$, the tangent is $py = x + 2p^2$.\n+ At $Q(2/p^2, -4/p)$, the tangent has gradient $-p$: $y = -px - \\frac{2}{p}$.\n- Step 2: **Theorem (memorise):** Tangents at the endpoints of any focal chord intersect on the directrix.\n+ For $y^2 = 8x$, the directrix is $x = -2$.\n+ The intersection point $R$ always has $x = -2$, regardless of the parameter $p$.\n+ This serves as a sanity check: if your algebra gives $x$ depending on $p$, you've made an error.\n\nThis theorem is not in the formula booklet and saves significant algebra in the intersection step.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "In a proof by induction for divisibility by 18 of $f(n) = 4^n + 6n - 10$, what is the recommended structure for the inductive step, and why is expressing $f(k+1)$ in terms of $f(k)$ easier than computing $f(k+1) - f(k)$? (3 steps)", "answer": "- Step 1: The inductive hypothesis assumes $f(k) = 4^k + 6k - 10 = 18M$ for some integer $M$.\n- Step 2: Compute $f(k+1) = 4^{k+1} + 6(k+1) - 10 = 4 \\cdot 4^k + 6k - 4$.\n- Step 3: Express $f(k+1)$ in terms of $f(k)$: $f(k+1) = 4 \\cdot 4^k + 6k - 4 = 4(4^k + 6k - 10) - 24k + 40 + 6k - 4 = 4f(k) - 18k + 36 = 4f(k) + 18(2 - k)$.\n+ Both terms are now clearly divisible by 18: $4f(k)$ since $f(k) = 18M$, and $18(2-k)$ explicitly contains 18.\n+ This avoids the harder route of computing $f(k+1) - f(k) = 3 \\cdot 4^k + 6$, which requires modular arithmetic arguments to prove divisibility.\n\nThe conclusion sentence must state: \"Since $f(k+1)$ is divisible by 18 when $f(k)$ is, and $f(2)$ is divisible by 18, by induction $f(n)$ is divisible by 18 for all $n \\geq 2$.\"", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "When using linear interpolation (false position method) on an interval $[a, b]$ where $f(a) < 0$ and $f(b) > 0$, what is the formula for the approximated root, and why must you use absolute values? (2 steps)", "answer": "- Step 1: The formula is $x \\approx a + \\frac{|f(a)|}{|f(a)| + |f(b)|} \\cdot (b - a)$.\n+ The interval is partitioned in the ratio $|f(a)| : |f(b)|$ — the closer $f$ is to zero at an endpoint, the closer the approximation is to that endpoint.\n- Step 2: You must use absolute values because the method uses the magnitudes of the function values, not their signs.\n+ If $f(a) = -0.35$ and $f(b) = 0.34$, then $|f(a)| + |f(b)| = 0.69$.\n+ Using signed values ($-0.35 + 0.34 = -0.01$) would give the wrong denominator and destroy the approximation.\n\nThis is distinct from bisection, which simply takes the midpoint regardless of function magnitudes.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": true}, {"question": "In matrix algebra, if $BC = D$ where $B$ is $2 \\times 2$ and $D$ is $2 \\times 3$, what is the correct procedure to find $C$, and why does $C \\neq DB^{-1}$? (2 steps)", "answer": "- Step 1: The equation is $BC = D$. To isolate $C$, multiply on the left by $B^{-1}$: $B^{-1}(BC) = B^{-1}D$, which gives $C = B^{-1}D$.\n- Step 2: Matrix multiplication is non-commutative — the order matters critically.\n+ $C = B^{-1}D$ is correct; $C = DB^{-1}$ would give a dimension mismatch ($3 \\times 2$ times $2 \\times 2$ is undefined in this context) and conceptually swaps the roles of the factors.\n+ Always identify the dimensions first: $B$ is $2 \\times 2$, $D$ is $2 \\times 3$, so $C$ must be $2 \\times 3$.\n\nFor $B = \\begin{pmatrix} a & 4 \\\\ 2 & 3 \\end{pmatrix}$ with $\\det B = 3a - 8$, the inverse is $\\frac{1}{3a-8}\\begin{pmatrix} 3 & -4 \\\\ -2 & a \\end{pmatrix}$.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": true}, {"question": "When finding the argument of a complex number $w = \\frac{4}{13} + \\frac{58}{13}i$, what is the correct arctan ratio, and what quadrant check must you perform before reporting the angle? (2 steps)", "answer": "- Step 1: The argument is $\\arg w = \\arctan\\left(\\frac{\\text{Imaginary part}}{\\text{Real part}}\\right) = \\arctan\\left(\\frac{58/13}{4/13}\\right) = \\arctan(14.5)$.\n+ The common error is swapping the ratio: $\\arctan(4/58)$ gives the wrong angle.\n- Step 2: Since both real and imaginary parts are positive, the point lies in the first quadrant, so $\\arg w = \\arctan(14.5) \\approx 1.502$ radians.\n+ If either part were negative, you'd need to add $\\pi$ (for second/third quadrant) or subtract from $\\pi$ (for fourth quadrant) to get the principal argument.\n+ Always state the quadrant explicitly in your working.\n\nThe question explicitly requests radians to 4 significant figures — not degrees and not 3 decimal places.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "In Q3(b), when the normal to $xy = 9$ at $t = 2$ intersects the hyperbola again, you obtain the quadratic $8x^2 - 45x - 18 = 0$. How do you use the known point $P(6, 1.5)$ to solve this efficiently without using the quadratic formula? (2 steps)", "answer": "- Step 1: You already know one solution: $x = 3t = 6$ (the original point $P$). Verify it satisfies the equation: $8(36) - 45(6) - 18 = 288 - 270 - 18 = 0$ ✓\n- Step 2: Since $x = 6$ is a root, factor by writing $8x^2 - 45x - 18 = (x - 6)(Ax + B)$. Matching coefficients: $(x - 6)(8x + 3) = 8x^2 + 3x - 48x - 18 = 8x^2 - 45x - 18$. So the other root is $x = -\\frac{3}{8}$.\n+ Then $y = \\frac{9}{x} = \\frac{9}{-3/8} = -24$.\n+ The second intersection is $\\left(-\\frac{3}{8}, -24\\right)$.\n\nThis \"use the known root to factor\" technique applies whenever you intersect a line or normal with a curve at a known parametric point.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": true}, {"question": "For the complex polynomial division in Q2(b), the first quotient term when dividing $2x^4 - 8x^3 + 29x^2 - 12x + 39$ by $x^2 - 4x + 13$ is $2x^2$, not $x^2$. Why is the leading coefficient crucial, and what is the error if you use $x^2$? (2 steps)", "answer": "- Step 1: The dividend has leading coefficient 2. When dividing, the first step determines what times $x^2$ (the divisor's leading term) gives $2x^4$. The answer is $2x^2$, not $x^2$.\n- Step 2: If you use $x^2$, you'd multiply back to get $x^4 - 4x^3 + 13x^2$, leaving a remainder of $x^4 - 4x^3 + 16x^2 - 12x + 39$, which does not divide evenly.\n+ The correct long division gives quotient $2x^2 + 3$ and remainder zero, leading to the factorised form $(x^2 - 4x + 13)(2x^2 + 3)$.\n\nAlways check the leading coefficient of the polynomial you're dividing by — it's the most common arithmetic slip in these problems.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "In the series proof of Q1, after obtaining $\\frac{n(n+1)(n^2+n+4)}{4}$, why must you multiply top and bottom by 3 to match the required form $\\frac{1}{12}n(n+1)(an^2+bn+c)$? (2 steps)", "answer": "- Step 1: You have $\\frac{1}{4}n(n+1)(n^2+n+4)$. The target denominator is $\\frac{1}{12}$, which is $\\frac{1}{4} \\times \\frac{1}{3}$.\n- Step 2: To convert $\\frac{1}{4}$ to $\\frac{1}{12}$, multiply both numerator and denominator by 3:\n+ $\\frac{1}{4} = \\frac{3}{12}$, so $\\frac{1}{4}n(n+1)(n^2+n+4) = \\frac{3}{12}n(n+1)(n^2+n+4) = \\frac{1}{12}n(n+1)(3n^2+3n+12)$.\n+ This gives $a=3$, $b=3$, $c=12$.\n\nThe error is leaving the answer as $\\frac{1}{4}n(n+1)(n^2+n+4)$ without scaling to match the exact denominator specified in the question.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "In the induction proof Q9, why must you start with $n = 2$ as the base case, not $n = 1$, even though mathematically $f(1) = 0$ is divisible by 18? (1 step)", "answer": "The question explicitly states \"for $n \\in \\mathbb{Z}$, $n \\geq 2$\" — this is the domain you must prove.\n+ The base case must match the lower bound given in the statement.\n+ While technically $0$ is divisible by any non-zero integer, using $n = 1$ when the question says $n \\geq 2$ would be considered an error in an exam context.\n+ The examiner will check that you read the condition correctly and used the right base case index.\n\nThis is a common precision error in induction questions — always verify the lower bound in the statement before starting.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "In Q8, when finding the intersection of the tangents at $P$ and $Q$, what is the algebraic advantage of keeping the factor $(p^2+1)$ symbolic rather than substituting numerical values too early? (2 steps)", "answer": "- Step 1: When solving the simultaneous equations $py = x + 2p^2$ and $y = -px - \\frac{2}{p}$, you substitute $x = py - 2p^2$ into the second equation.\n- Step 2: This gives $y = -p(py - 2p^2) - \\frac{2}{p} = -p^2 y + 2p^3 - \\frac{2}{p}$.\n+ Rearranging: $y(1 + p^2) = 2p^3 - \\frac{2}{p} = \\frac{2(p^4 - 1)}{p} = \\frac{2(p^2-1)(p^2+1)}{p}$.\n+ The $(p^2+1)$ cancels on both sides, giving $y = \\frac{2(p^2-1)}{p}$.\n+ If you had substituted a numeric $p$ value earlier, you'd lose this cancellation structure and the algebra becomes messier.\n+ Finally, $x = py - 2p^2 = p \\cdot \\frac{2(p^2-1)}{p} - 2p^2 = 2(p^2-1) - 2p^2 = -2$.\n\nKeeping symbolic factors until the end is essential for the clean cancellation that reveals the directrix property ($x = -2$).", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": true}, {"question": "In Q7(b), when performing interval bisection twice starting from [1, 2], how do you determine which subinterval contains the root after each bisection, and what is the logic behind this? (2 steps)", "answer": "- Step 1: After the first bisection, evaluate $f(1.5)$. If $f(1.5) > 0$ and $f(1) < 0$, the root lies in [1, 1.5] (the sign change is between $f(1)$ and $f(1.5)$).\n+ If $f(1.5)$ had the same sign as $f(1)$, the root would be in [1.5, 2].\n- Step 2: After the second bisection (midpoint 1.25), evaluate $f(1.25)$. Since $f(1.25) < 0$ and $f(1.5) > 0$, the root lies in [1.25, 1.5].\n+ The logic is the Intermediate Value Theorem: if $f$ is continuous and $f(a)$ and $f(b)$ have opposite signs, there is at least one root in $(a, b)$.\n\nThis is different from bisection in optimization (where you might track the minimum value) — here you're simply tracking where the sign changes.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "In Q5(b), after finding the new sum $S = \\frac{3}{5}$ and product $P = \\frac{3}{40}$, what is the final step to convert $x^2 - \\frac{3}{5}x + \\frac{3}{40} = 0$ into the required integer-coefficient form $px^2 + qx + r = 0$? (1 step)", "answer": "Multiply through by the least common multiple of the denominators. The denominators are 5 and 40; LCM = 40.\n+ Multiply by 40: $40x^2 - 24x + 3 = 0$.\n+ This gives $p = 40$, $q = -24$, $r = 3$ (note the negative sign in $-Sx$ becomes $-24x$).\n+ The question explicitly asks for integer coefficients — leaving fractions would lose marks even though the equation is mathematically equivalent.\n\nThis \"clear fractions\" instruction appears in many FP1 questions and should be treated as mandatory.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "For the rectangular hyperbola $xy = 9$ with parametric point $P(3t, 3/t)$, what is the pattern in the gradients of the tangent and normal, and how does this relate to the parameter $t$? (1 step)", "answer": "- Tangent gradient: $-\\frac{1}{t^2}$\n- Normal gradient: $t^2$\n+ The normal gradient is always the **negative reciprocal** of the tangent gradient.\n+ This means the normal gradient increases as $|t|$ increases: for $t = 2$, normal gradient $= 4$; for $t = \\frac{1}{2}$, normal gradient $= \\frac{1}{4}$.\n+ At $t = \\pm 1$, the tangent and normal gradients are both $-1$ and $1$ respectively — the normal is horizontal and the tangent is vertical.\n\nThis $t^2$ pattern for the normal is specific to rectangular hyperbolas of the form $xy = c^2$.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "In Q6(a), what is meant by \"exact value\" for $|z_1 + z_2|$, and why should you not give a decimal approximation? (1 step)", "answer": "\"Exact value\" means you must express the answer in surd form, not a decimal approximation.\n+ $z_1 + z_2 = (3+2i) + (2+3i) = 5 + 5i$\n+ $|5 + 5i| = \\sqrt{5^2 + 5^2} = \\sqrt{50} = \\sqrt{25 \\cdot 2} = 5\\sqrt{2}$\n+ The decimal $7.071...$ would not earn full marks because it is not exact.\n+ This applies to all FP1 questions: when a question says \"exact value,\" give the simplified surd form.\n\nThe formula booklet provides $\\sqrt{a^2 + b^2}$ for the modulus — use it to simplify to surd form.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "In Q4(i), the area of triangle $T'$ is three times the area of triangle $T$. Why is the equation $|\\det A| = 3$, not just $\\det A = 3$? (1 step)", "answer": "The area scale factor under a linear transformation represented by matrix $A$ is $|\\det A|$ (the absolute value of the determinant).\n+ If $\\det A = -3$, the transformation reverses orientation (includes a reflection), but the area is still scaled by a factor of 3.\n+ Solving only $\\det A = 3$ gives $3k - 24 = 3$, so $k = 9$.\n+ Solving $|\\det A| = 3$ gives two cases: $3k - 24 = 3$ (giving $k = 9$) OR $3k - 24 = -3$ (giving $k = 7$).\n+ Both $k = 9$ and $k = 7$ are valid because both give an area scale factor of 3.\n\nThis is a common source of missing solutions in matrix area problems — always use absolute value.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": true}, {"question": "In Q7(c)(ii), when applying Newton-Raphson once to $f(x) = x^{3/2} + x - 3$ with $x_0 = 1.375$, why must you carry at least 5 decimal places in intermediate calculations before rounding the final answer to 3 decimal places? (1 step)", "answer": "Newton-Raphson converges quadratically near the root, but rounding errors accumulate if you round too early.\n+ In this case: $f(1.375) \\approx -0.01268$ (rounded to 5 dp); $f'(1.375) \\approx 2.75891$ (rounded to 5 dp).\n+ The correction term is $\\frac{-0.01268}{2.75891} \\approx 0.00460$.\n+ If you'd rounded $f(1.375)$ to 3 dp ($-0.013$) and $f'(1.375)$ to 3 dp ($2.759$), you'd get $\\frac{-0.013}{2.759} \\approx 0.00471$, giving $x_1 \\approx 1.380$ (still correct here, but not guaranteed in general).\n+ The error compounds in more iterations or with less favourable functions.\n\nThe exam checklist explicitly warns: \"Kept enough decimal places in intermediate steps (5+ dp).\"", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "In Q2(c), when plotting complex roots on an Argand diagram, what are the coordinates of the four roots $2+3i$, $2-3i$, $\\frac{\\sqrt{6}}{2}i$, and $-\\frac{\\sqrt{6}}{2}i$, and what geometric symmetry should you observe? (1 step)", "answer": "- $2 + 3i$: first quadrant, point $(2, 3)$\n- $2 - 3i$: fourth quadrant, point $(2, -3)$\n- $\\frac{\\sqrt{6}}{2}i \\approx 1.22i$: on positive imaginary axis, point $(0, 1.22)$\n- $-\\frac{\\sqrt{6}}{2}i \\approx -1.22i$: on negative imaginary axis, point $(0, -1.22)$\n+ The conjugate pair $2 \\pm 3i$ reflects across the real axis (horizontal symmetry).\n+ The purely imaginary pair $\\pm \\frac{\\sqrt{6}}{2}i$ also reflects across the real axis.\n+ The two pairs together form a vertical line of symmetry at $x = 1$ connecting the midpoints of the conjugate segments.\n\nAll complex roots of polynomials with real coefficients come in conjugate pairs, and these pairs always reflect symmetrically across the real axis on an Argand diagram.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "In Q9, what is the standard conclusion sentence required in a proof by induction, and why must it be written explicitly? (1 step)", "answer": "The standard conclusion is: \"Since $f(k+1)$ is divisible by 18 whenever $f(k)$ is, and $f(2)$ is divisible by 18, by the principle of mathematical induction, $4^n + 6n - 10$ is divisible by 18 for all integers $n \\geq 2$.\"\n+ This sentence explicitly connects three things: (1) the base case is true, (2) the inductive step is true (if $f(k)$ then $f(k+1)$), and (3) therefore the statement holds for all $n$ in the domain.\n+ examiners explicitly check for this wording — without it, you lose marks even if the algebra is correct.\n\nThe structure is always: Base case → Inductive hypothesis → Inductive step → Conclusion sentence.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "In Q1, what is the key insight for identifying which standard results from the formula booklet are needed, given that the question mentions $\\sum r^2$ and $\\sum r^3$ but $\\sum r^2$ never actually appears in the algebra? (1 step)", "answer": "The question says \"Use the standard results for $\\sum_{r=1}^{n} r^2$ and $\\sum_{r=1}^{n} r^3$\" — this is a toolkit listing, not a checklist of what you must use.\n+ When you expand $\\sum r(r^2 + 2) = \\sum r^3 + 2\\sum r$, you need $\\sum r^3$ (from the booklet) and $\\sum r$ (which is derived from $\\sum r^2$ formula or known as $\\frac{1}{2}n(n+1)$).\n+ $\\sum r^2$ is not needed at all — it's listed as a possible tool but is irrelevant here.\n+ The examiner is testing your ability to select the right tools, not blindly use everything mentioned.\n\nThis \"toolkit vs. checklist\" distinction appears in other FP1 questions — always evaluate each formula on its merits after expanding the problem.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "In Q5(a), when expanding $(\\alpha^2 + 1)(\\beta^2 + 1)$, what is the correct expansion, and what is the common misconception that gives the wrong answer? (2 steps)", "answer": "- Step 1: The correct expansion is $(\\alpha^2+1)(\\beta^2+1) = \\alpha^2\\beta^2 + \\alpha^2 + \\beta^2 + 1$.\n- Step 2: The common error is treating it like a difference of squares: $\\alpha^2\\beta^2 - 1$ (missing the $\\alpha^2 + \\beta^2 + 1$ terms).\n+ The correct approach uses the identity: $(\\alpha^2+1)(\\beta^2+1) = (\\alpha\\beta)^2 + (\\alpha^2 + \\beta^2) + 1$.\n+ Using Vieta: $\\alpha\\beta = 3$, and $\\alpha^2 + \\beta^2 = (\\alpha+\\beta)^2 - 2\\alpha\\beta = 36 - 6 = 30$.\n+ So the answer is $9 + 30 + 1 = 40$.\n\nThis expansion is fundamentally different from $(\\alpha^2 - \\beta^2) = (\\alpha - \\beta)(\\alpha + \\beta)$ — never confuse them.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "In Q8(a), when verifying that $Q\\left(\\dfrac{2}{p^2}, -\\dfrac{4}{p}\\right)$ lies on $y^2 = 8x$, what calculation do you perform, and why does this confirm the point is on the parabola? (1 step)", "answer": "Compute $y^2$ for point $Q$: $\\left(-\\frac{4}{p}\\right)^2 = \\frac{16}{p^2}$.\n+ Compute $8x$ for point $Q$: $8 \\cdot \\frac{2}{p^2} = \\frac{16}{p^2}$.\n+ Since $y^2 = 8x$, both expressions are equal ($\\frac{16}{p^2}$), confirming that $Q$ satisfies the parabola equation.\n+ This is the standard verification method: substitute the coordinates into the Cartesian equation and show equality holds.\n\nThis is different from finding a point on the parabola — it's confirming that a given point satisfies the equation.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "In Q6(c), when solving the simultaneous equations $12a - 5b = 4$ and $5a + 12b = 58$ to find $a$ and $b$, what is the elimination strategy, and why does multiplying by 12 and 5 work? (2 steps)", "answer": "- Step 1: Multiply the first equation by 12: $144a - 60b = 48$.\n- Step 2: Multiply the second equation by 5: $25a + 60b = 290$.\n- Step 3: Add the two equations: $144a + 25a = 169a = 338$, giving $a = 2$.\n+ The multiplication factors (12 and 5) are chosen so that the $b$ coefficients become opposites: $-60b$ and $+60b$.\n+ This eliminates $b$ by addition, which is often cleaner than substitution for linear simultaneous equations.\n+ Substitute back: $5(2) + 12b = 58$, so $12b = 48$, giving $b = 4$.\n\nThis elimination-by-addition method is preferred over substitution when both equations have non-unit coefficients.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "In Q7(a), what two conditions must you state to prove that a root exists in the interval [1, 2] for $f(x) = x^{3/2} + x - 3$? (1 step)", "answer": "You must state: (1) $f(x)$ is continuous on [1, 2], and (2) $f(1)$ and $f(2)$ have opposite signs.\n+ Compute: $f(1) = 1 + 1 - 3 = -1 < 0$; $f(2) = 2^{3/2} + 2 - 3 = 2\\sqrt{2} - 1 \\approx 1.828 > 0$.\n+ Since $f(1) < 0$ and $f(2) > 0$, by the Intermediate Value Theorem there is at least one root in (1, 2).\n+ The explicit statement of these two conditions is what earns the marks in part (a).\n\nThe IVT is a fundamental existence theorem: continuous function + sign change ⇒ root exists.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "In Q4(ii), after computing $C = B^{-1}(BC)$, what is the correct way to present the final matrix, and why should you NOT multiply out the scalar $\\frac{1}{3a-8}$ through each entry? (1 step)", "answer": "Present $C$ with the scalar factor $\\frac{1}{3a-8}$ outside the matrix:\n$$C = \\frac{1}{3a-8}\\begin{pmatrix} 10 & -1 & -5 \\\\ -4 - a & 4a - 10 & 2a - 2 \\end{pmatrix}$$\n+ This form clearly shows the denominator and is easier to read.\n+ Multiplying through would give fractions like $\\frac{10}{3a-8}$, which is mathematically equivalent but harder to verify.\n+ The exam checklist says: \"Left $C$ with $\\frac{1}{3a-8}$ scalar out front — don't multiply through unnecessarily.\"\n\nThe outside scalar form is standard for matrix inverses with parameters.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "In Q8(b), when showing chord $PQ$ passes through the focus $(2, 0)$, what is the specific substitution you perform to verify this? (2 steps)", "answer": "- Step 1: Find the equation of chord $PQ$ using point-slope form with point $P(2p^2, 4p)$ and slope $m = \\frac{2p}{p^2-1}$:\n$$y - 4p = \\frac{2p}{p^2-1}(x - 2p^2)$$\n- Step 2: Substitute the focus coordinates $(x, y) = (2, 0)$ into this equation:\n$$0 - 4p \\stackrel{?}{=} \\frac{2p}{p^2-1}(2 - 2p^2)$$\n+ The right-hand side simplifies: $\\frac{2p}{p^2-1} \\cdot 2(1 - p^2) = \\frac{2p \\cdot 2(1-p^2)}{p^2-1} = \\frac{4p(1-p^2)}{-(1-p^2)} = -4p$\n+ So LHS $= -4p$ and RHS $= -4p$, confirming the focus lies on the chord.\n\nThis algebraic verification is what examiners expect — graphical intuition alone is not sufficient for the \"show that\" requirement.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "For the parabola $y^2 = 8x$, what are the coordinates of the focus and the equation of the directrix, and how do you derive these from the standard form $y^2 = 4ax$? (1 step)", "answer": "- The standard form is $y^2 = 4ax$. Here $4a = 8$, so $a = 2$.\n- Focus: $(a, 0) = (2, 0)$\n- Directrix: $x = -a = -2$\n+ This is derived from the definition of a parabola: the set of points equidistant from the focus and the directrix.\n+ The focal length is $a$, measured from the vertex at the origin to the focus along the axis of symmetry.\n\nThese are essential for part (b) and (c) of Q8 — you should identify them at the start of the question.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "In Q7(d), when using linear interpolation on [1.25, 1.5], what are the correct function values to use in the formula, and why must they be from this specific interval? (1 step)", "answer": "- Use the function values at the endpoints of [1.25, 1.5], not [1, 2].\n+ $f(1.25) \\approx -0.35246$ (negative)\n+ $f(1.5) \\approx 0.33712$ (positive)\n+ The formula $x \\approx 1.25 + \\frac{|f(1.25)|}{|f(1.25)| + |f(1.5)|} \\cdot 0.25$ uses these values because this is the narrowest interval where a sign change occurs after the two bisections in part (b).\n+ Using [1, 2] would give a less accurate approximation because the interval is wider.\n\nLinear interpolation on a narrower interval gives a better approximation — this is why part (b) narrows the interval first.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "In Q2(b), when dividing the quartic by the quadratic factor, what sanity check should you perform on the remainder to verify your division is correct? (1 step)", "answer": "The remainder must be exactly zero.\n+ After long division, you should obtain $(x^2 - 4x + 13)(2x^2 + 3)$ with no remainder.\n+ If there's a non-zero remainder, either your quadratic factor is wrong (e.g., using $x^2 - 4x - 13$ with wrong sign on 13) or there was an arithmetic error in the division.\n+ The zero remainder is your verification that the factorisation is correct before solving $2x^2 + 3 = 0$.\n\nThis is the FP1 equivalent of checking your work — always verify the remainder is zero in polynomial division.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "In Q3, what is the geometric interpretation of the fact that the normal at $P$ meets the hyperbola \"again\" at a second point, and how does this affect the algebra? (1 step)", "answer": "- \"Again\" means the normal passes through the original point $P$ and intersects the curve at a second, distinct point.\n+ Since $P$ itself lies on both the normal and the hyperbola, when you set up the intersection equation (substituting $y = 4x - \\frac{45}{2}$ into $xy = 9$), one solution will be $x = 6$ (the point $P$).\n+ The other solution gives the second intersection point.\n+ This is why in the quadratic $8x^2 - 45x - 18 = 0$, you factor out $(x - 6)$ to find the other root — the $x = 6$ root corresponds to the original point $P$.\n\nThe word \"again\" is a trigger to reject the trivial solution corresponding to the original point.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "In Q6(b), what is the dimension check you should perform before computing matrix $C$, and why is it essential? (1 step)", "answer": "- $B$ is $2 \\times 2$, and $BC$ is given as $2 \\times 3$.\n+ For matrix multiplication $BC$ to be defined, the number of columns of $B$ must equal the number of rows of $C$.\n+ Since $B$ has 2 columns, $C$ must have 2 rows: $C$ is $2 \\times 3$.\n+ This determines the final answer format and checks that your multiplication order is correct.\n\nThis dimensional analysis is a quick sanity check that prevents solving the wrong problem.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "For the complex number division in Q6(b), what is the denominator after rationalising, and why does $|z_1|^2 = 13$ rather than something else? (1 step)", "answer": "- When dividing by $z_1 = 3 + 2i$, multiply by its conjugate $\\bar{z}_1 = 3 - 2i$.\n+ The denominator becomes $(3+2i)(3-2i) = 3^2 - (2i)^2 = 9 - 4i^2 = 9 - 4(-1) = 9 + 4 = 13$.\n+ This is $|z_1|^2$ — the modulus squared of the original complex number.\n+ The general formula is: $\\frac{z}{w} = \\frac{z\\bar w}{|w|^2}$.\n\nThis is the standard rationalisation procedure for complex division — always multiply by the conjugate.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "In Q5, what are the Vieta formulas for the quadratic $x^2 - 6x + 3 = 0$, and how do they appear in your working? (1 step)", "answer": "- For a quadratic $x^2 + bx + c = 0$ with roots $\\alpha, \\beta$:\n+ Sum of roots: $\\alpha + \\beta = -b$\n+ Product of roots: $\\alpha\\beta = c$\n+ Here: $x^2 - 6x + 3 = 0$, so $\\alpha + \\beta = 6$ and $\\alpha\\beta = 3$.\n+ These are written at the very start of the solution and used throughout parts (a) and (b).\n\nAlways write the sum and product of roots immediately after reading the quadratic — they're the foundation for everything that follows.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "In Q9, what is the key rearrangement that makes the inductive step tractable, and how does it reveal the divisibility by 18? (1 step)", "answer": "- The key is expressing $f(k+1)$ in terms of $f(k)$: $f(k+1) = 4f(k) + 18(2 - k)$.\n+ This shows $f(k+1)$ as a sum of two terms: $4f(k)$ (which is divisible by 18 since $f(k) = 18M$) and $18(2-k)$ (explicitly containing the factor 18).\n+ Both terms are individually divisible by 18, so their sum is divisible by 18.\n+ This is cleaner than computing $f(k+1) - f(k)$ and trying to prove divisibility directly.\n\nThis \"express in terms of the inductive hypothesis plus a multiple of the modulus\" pattern is standard for divisibility induction.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}], "count": 39}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "When asked to prove a series identity involving $\\sum r(r^2+2)$ using standard results, what is the FIRST algebraic step you should take? (2 steps)", "answer": "- Step 1: Expand the bracket first — write $\\sum_{r=1}^{n} r(r^2+2) = \\sum r^3 + 2\\sum r$. Do NOT try to integrate or sum the cubic term directly.\n- Step 2: Only then substitute the standard formula results for each sum.\n\nThis avoids trying to find an antiderivative-like approach for discrete sums.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "In FP1 series proofs, what is special about the form of the standard results for $\\sum r^3$ provided in the formula booklet, and why should you use it? (2 steps)", "answer": "- Step 1: The booklet gives $\\sum_{r=1}^{n} r^3 = \\frac14 n^2(n+1)^2$ — this is already factored as $\\left[\\frac12 n(n+1)\\right]^2 = \\left[\\sum r\\right]^2$.\n- Step 2: Always use this factored form. If you expand it to $\\frac14(n^4 + 2n^3 + n^2)$, you lose the common factor $n(n+1)$ that you'll need to factor out later. The factored form makes the final factoring step immediate.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": true}, {"question": "After substituting $\\sum r^3$ and $\\sum r$ into $\\frac14 n^2(n+1)^2 + n(n+1)$, what is the key strategy to match the required form $\\frac{1}{12}n(n+1)(an^2+bn+c)$? (3 steps)", "answer": "- Step 1: Factor $n(n+1)$ out immediately: $n(n+1)\\left[\\frac14 n(n+1) + 1\\right]$.\n- Step 2: Simplify inside the bracket: $\\frac14 n(n+1) + 1 = \\frac{n(n+1) + 4}{4} = \\frac{n^2 + n + 4}{4}$.\n- Step 3: To match $\\frac{1}{12}$ denominator, multiply top and bottom by 3: $\\frac{3n(n+1)(n^2+n+4)}{12}$. Now read off $a=3, b=3, c=12$. The key insight: factor BEFORE trying to match coefficients.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "Given that $z = 2+3i$ is a root of a polynomial with real coefficients, what root must also exist, and how do you form the quadratic factor containing both? (2 steps)", "answer": "- Step 1: Complex roots with real coefficients come in conjugate pairs. The other root is $\\bar{z} = 2-3i$.\n- Step 2: Form the quadratic factor using the shortcut $(x-z)(x-\\bar{z}) = x^2 - 2\\operatorname{Re}(z)\\,x + |z|^2$. Here: $x^2 - 2(2)x + (2^2+3^2) = x^2 - 4x + 13$. This avoids doing the full FOIL expansion each time.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "When dividing $2x^4 - 8x^3 + 29x^2 - 12x + 39$ by $x^2 - 4x + 13$, what is the most common error with the leading term, and what is the correct first quotient term? (2 steps)", "answer": "- Step 1: The dividend has leading coefficient 2, while the divisor has leading coefficient 1. Students often divide as if both had coefficient 1.\n- Step 2: The first term of the quotient is $2x^2$ (not $x^2$) because $2x^4 \\div x^2 = 2x^2$. Multiply back: $2x^2 \\cdot (x^2 - 4x + 13) = 2x^4 - 8x^3 + 26x^2$. Subtract to get remainder $3x^2 - 12x + 39$.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "After dividing and obtaining $2x^2 + 3 = 0$, what is the correct exact surd form of the roots, and what is the common mistake to avoid? (2 steps)", "answer": "- Step 1: Solve $2x^2 = -3$, so $x^2 = -\\frac32$, giving $x = \\pm i\\sqrt{\\frac32}$. Rationalize: $\\sqrt{\\frac32} = \\frac{\\sqrt{6}}{2}$, so roots are $\\pm \\frac{\\sqrt{6}}{2}i$.\n- Step 2: Common mistake: leaving as $\\pm\\sqrt{-\\frac32}$ or writing $\\pm 1.225i$ (decimal). Examiners want exact surd form. Also note: the modulus squared is $2^2+3^2 = 13$ (plus sign), not $2^2-3^2$ (minus sign).", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "For the rectangular hyperbola $xy = 9$ with point $P(3t, 3/t)$, what is the gradient of the normal (not tangent), and how do you obtain it? (2 steps)", "answer": "- Step 1: Differentiate $y = 9/x$: $dy/dx = -9/x^2$. At $P(3t, 3/t)$, the tangent gradient is $m_T = -9/(3t)^2 = -1/t^2$.\n- Step 2: The normal is perpendicular to the tangent, so $m_N = -1/m_T = -1/(-1/t^2) = t^2$. Common error: using the tangent gradient $-1/t^2$ instead of the normal $t^2$.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "When writing the equation of the normal at $P(3t, 3/t)$ in the form $ty - t^3 x = f(t)$, what algebra trick must you use, and why? (3 steps)", "answer": "- Step 1: Start with point-slope: $y - \\frac{3}{t} = t^2(x - 3t)$.\n- Step 2: Multiply both sides by $t$ to clear the fraction $3/t$: $ty - 3 = t^3 x - 3t^4$.\n- Step 3: Rearrange to required form: $ty - t^3 x = 3 - 3t^4$. Multiplying by $t$ converts the messy fraction into a polynomial in $t$, which is what examiners expect.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "When the normal at $P$ intersects the hyperbola again, how can you use the fact that $P$ itself lies on both curves to simplify solving the intersection equation? (3 steps)", "answer": "- Step 1: After substituting $y = 9/x$ into the normal equation, you get a quadratic in $x$ (or a cubic that reduces to quadratic).\n- Step 2: One root of this equation is $x = 3t$ (the x-coordinate of point $P$). This is guaranteed because $P$ lies on both curves.\n- Step 3: Instead of using the quadratic formula, use the fact that $x = 3t$ is a root to factor the quadratic. For $t=2$, $x=6$ is a root of $8x^2 - 45x - 18 = 0$, so factor as $(x-6)(8x+3) = 0$. The other root gives the second intersection point.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "For a 2×2 matrix $A$ representing a transformation that enlarges area by a factor of 3, what equation do you write, and why must you include absolute value bars? (2 steps)", "answer": "- Step 1: The area scale factor equals $|\\det A|$, so write $|\\det A| = 3$.\n- Step 2: Absolute value is essential because the determinant can be negative (orientation reversal) but area is always positive. Without bars, you'd only get one of the two possible $k$ values. The equation is $|3k - 24| = 3$, giving $3k - 24 = \\pm 3$.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "Given $BC = D$ where $B$ is 2×2 and $D$ is 2×3, what are the dimensions of $C$, and what matrix equation do you solve to find $C$? (2 steps)", "answer": "- Step 1: If $B$ is 2×2 and $BC$ is 2×3, then $C$ must be 2×3 (columns = columns of $D$).\n- Step 2: Multiply both sides on the left by $B^{-1}$: $B^{-1}BC = B^{-1}D$, so $C = B^{-1}D$. Note: multiply on the LEFT because matrix multiplication order matters — you cannot write $DB^{-1}$. The equation is $C = B^{-1}(BC)$.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "What is the inverse of a 2×2 matrix $\\begin{pmatrix} a & b \\\\ c & d \\end{pmatrix}$, and how do you apply it to find $C$ when $B = \\begin{pmatrix} a & 4 \\\\ 2 & 3 \\end{pmatrix}$? (3 steps)", "answer": "- Step 1: $B^{-1} = \\frac{1}{\\det B}\\begin{pmatrix} d & -b \\\\ -c & a \\end{pmatrix}$ where $\\det B = ad - bc$. Here $\\det B = 3a - 8$.\n- Step 2: So $B^{-1} = \\frac{1}{3a-8}\\begin{pmatrix} 3 & -4 \\\\ -2 & a \\end{pmatrix}$.\n- Step 3: Multiply this 2×2 by the 2×3 matrix $BC$: each entry of $C$ is a dot product of a row of $B^{-1}$ with a column of $BC$. Leave the scalar $\\frac{1}{3a-8}$ outside the matrix — don't multiply through until necessary.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "Given $f(x) = x^2 - 6x + 3$ with roots $\\alpha, \\beta$, what are $\\alpha+\\beta$ and $\\alpha\\beta$, and how do you find $\\alpha^2 + \\beta^2$ using these? (3 steps)", "answer": "- Step 1: For $x^2 - 6x + 3 = 0$, sum of roots $\\alpha+\\beta = 6$ (negated coefficient of $x$) and product $\\alpha\\beta = 3$ (constant term).\n- Step 2: To find $\\alpha^2 + \\beta^2$, use the identity: $\\alpha^2 + \\beta^2 = (\\alpha+\\beta)^2 - 2\\alpha\\beta$.\n- Step 3: Substitute: $6^2 - 2(3) = 36 - 6 = 30$. This avoids ever needing to find $\\alpha$ or $\\beta$ individually.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "To find $(\\alpha^2+1)(\\beta^2+1)$, what expansion strategy avoids computing individual roots, and what is the simplified result? (3 steps)", "answer": "- Step 1: Expand: $(\\alpha^2+1)(\\beta^2+1) = \\alpha^2\\beta^2 + \\alpha^2 + \\beta^2 + 1$.\n- Step 2: Recognize $(\\alpha\\beta)^2 = 3^2 = 9$ and $\\alpha^2 + \\beta^2 = 30$ (from previous card).\n- Step 3: So $(\\alpha^2+1)(\\beta^2+1) = 9 + 30 + 1 = 40$. The key insight: this expression depends only on $\\alpha\\beta$ and $\\alpha^2+\\beta^2$, never on individual roots.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "In part (b) of Q5, when finding the sum $S = \\frac{\\alpha}{\\alpha^2+1} + \\frac{\\beta}{\\beta^2+1}$, what is the critical factoring trick for the numerator, and why does it work? (4 steps)", "answer": "- Step 1: Combine fractions: numerator = $\\alpha(\\beta^2+1) + \\beta(\\alpha^2+1) = \\alpha\\beta^2 + \\alpha + \\alpha^2\\beta + \\beta$.\n- Step 2: Group as $\\alpha\\beta(\\alpha+\\beta) + (\\alpha+\\beta) = (\\alpha+\\beta)(\\alpha\\beta + 1)$.\n- Step 3: Substitute known values: $(6)(3+1) = 6 \\times 4 = 24$. This avoids expanding $\\alpha^2\\beta + \\alpha\\beta^2$ individually.\n- Step 4: Denominator from part (a) is 40, so $S = 24/40 = 3/5$. This \"rearrange before substituting\" trick is the hallmark of FP1 root manipulation questions.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": true}, {"question": "After finding the new sum $S = 3/5$ and product $P = 3/40$, what form should the final answer take, and what common error do students make? (2 steps)", "answer": "- Step 1: The new quadratic is $x^2 - Sx + P = 0$, i.e. $x^2 - \\frac35x + \\frac{3}{40} = 0$.\n- Step 2: The question asks for $px^2 + qx + r = 0$ with integers. Multiply by 40 (LCM of denominators): $40x^2 - 24x + 3 = 0$. Common error: leaving fractions in the final answer, or forgetting the minus sign in $-Sx$ (it's NOT $+Sx$).", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": true}, {"question": "When dividing complex numbers $w = \\frac{z_2 z_3}{z_1}$ where $z_1 = 3+2i$, what is the correct method, and what does the denominator become? (3 steps)", "answer": "- Step 1: Multiply numerator and denominator by the conjugate of the denominator: $\\frac{z_2 z_3}{z_1} = \\frac{(z_2 z_3)(\\overline{z_1})}{|z_1|^2}$.\n- Step 2: Here $\\overline{z_1} = 3-2i$ and $|z_1|^2 = 3^2 + 2^2 = 9 + 4 = 13$.\n- Step 3: Never divide by a complex number directly — always multiply by conjugate. This converts $i^2 = -1$ terms into real numbers in the denominator.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "When computing $(2+3i)(a+bi)$ where $a,b$ are real, what is the correct expansion, and what common sign error occurs? (2 steps)", "answer": "- Step 1: Use FOIL: $(2+3i)(a+bi) = 2a + 2bi + 3ai + 3bi^2 = 2a + (2b+3a)i - 3b$.\n- Step 2: Simplify to: $(2a - 3b) + (3a + 2b)i$. Common error: writing $-3b$ as $+3b$ or forgetting that $i^2 = -1$ gives the $-3b$ term.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "When finding $\\arg w$ for $w = \\frac{4}{13} + \\frac{58}{13}i$, what is the correct ratio to put into arctan, and what quadrant check must you do? (3 steps)", "answer": "- Step 1: $\\arg w = \\arctan(\\text{imaginary} / \\text{real}) = \\arctan(58/4) = \\arctan(14.5)$. Common error: using $\\arctan(4/58)$ — reversed.\n- Step 2: Both real and imaginary parts are positive, so the point is in the first quadrant. No adjustment needed.\n- Step 3: If either part were negative, you'd need to add $\\pi$ (if both negative, third quadrant) or subtract from $\\pi$ (second quadrant). The answer is 1.502 radians to 4 sig fig.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "To show a root exists in [1,2] for $f(x) = x^{3/2} + x - 3$, what two conditions must you verify, and what theorem justifies the conclusion? (2 steps)", "answer": "- Step 1: Check that $f(1) < 0$ and $f(2) > 0$ (opposite signs). Calculate: $f(1) = 1+1-3 = -1$; $f(2) = 2^{3/2} + 2 - 3 = 2\\sqrt{2} - 1 \\approx 1.828 > 0$.\n- Step 2: Verify $f$ is continuous on [1,2] (it's a sum of continuous functions). By the Intermediate Value Theorem, a continuous function changing sign must cross zero, so a root exists.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "In interval bisection, after finding $f(1.5) > 0$ with $f(1) < 0$, how do you determine the new interval, and what is the common mistake? (2 steps)", "answer": "- Step 1: Since $f(1) < 0$ and $f(1.5) > 0$, the root lies between 1 and 1.5 (where the sign change occurs). The new interval is [1, 1.5].\n- Step 2: Common mistake: ignoring which endpoint has which sign and picking [1.5, 2] — the root is in the interval where the signs are opposite, not where both are positive. Remember: find where $f(a)$ and $f(b)$ have opposite signs.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "For $f(x) = x^{3/2} + x - 3$, what is $f'(x)$, and what is the common derivative error? (2 steps)", "answer": "- Step 1: $f(x) = x^{3/2} + x - 3$. Use power rule: derivative of $x^{3/2}$ is $\\frac32 x^{1/2}$. Derivative of $x$ is 1. Derivative of constant is 0.\n- Step 2: So $f'(x) = \\frac32 x^{1/2} + 1$. Common error: forgetting the $+1$ from the $x$ term, giving $f'(x) = \\frac32 x^{1/2}$ only. This halves the derivative value and ruins Newton-Raphson convergence.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "In Newton-Raphson with $x_0 = 1.375$, what formula do you apply, and what precision should you use in intermediate calculations? (3 steps)", "answer": "- Step 1: Newton-Raphson: $x_{n+1} = x_n - \\frac{f(x_n)}{f'(x_n)}$. With $x_0 = 1.375$:\n- Step 2: Compute $f(1.375) \\approx 1.61232 + 1.375 - 3 = -0.01268$. Compute $f'(1.375) = 1.5\\sqrt{1.375} + 1 \\approx 2.75891$.\n- Step 3: $x_1 = 1.375 - (-0.01268/2.75891) = 1.375 + 0.00460 = 1.37960$. Round to 3 dp: 1.380. Use at least 5 dp in intermediate steps to ensure final 3 dp accuracy.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "For linear interpolation on [1.25, 1.5], what ratio do you use to partition the interval, and what common sign error destroys the answer? (3 steps)", "answer": "- Step 1: Linear interpolation partitions in the ratio of absolute function values: $\\alpha \\approx a + \\frac{|f(a)|}{|f(a)| + |f(b)|} \\times (b-a)$.\n- Step 2: With $f(1.25) \\approx -0.35246$ and $f(1.5) \\approx 0.33712$, use $|f(1.25)| = 0.35246$ and $|f(1.5)| = 0.33712$.\n- Step 3: Common error: using signed values $f(a)$ and $f(b)$ instead of absolute values. This gives the wrong ratio and a completely incorrect approximation. Always use absolute values.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "For the parabola $y^2 = 8x$, what are the values of $a$, the focus, and the directrix? (2 steps)", "answer": "- Step 1: Standard form is $y^2 = 4ax$. Here $4a = 8$, so $a = 2$.\n- Step 2: Focus is at $(a, 0) = (2, 0)$. Directrix is the vertical line $x = -a = -2$. These are essential for verifying the focal chord property.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "Given $P(2p^2, 4p)$ on $y^2 = 8x$, what is $Q$ such that $PQ$ is a focal chord, and how do you verify $Q$ lies on the parabola? (2 steps)", "answer": "- Step 1: For a focal chord, the parameter values multiply to 1: if $P$ has parameter $p$, then $Q$ has parameter $-1/p$. Thus $Q = (2/p^2, -4/p)$.\n- Step 2: Verify: $y^2 = (-4/p)^2 = 16/p^2$, and $8x = 8(2/p^2) = 16/p^2$. Equal, so $Q$ lies on the parabola. Note the negative sign on the y-coordinate — this is the common misread.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "At point $P(at^2, 2at)$ on $y^2 = 4ax$, what is the gradient of the tangent, and what is the tangent equation in the form $ty = x + at^2$? (2 steps)", "answer": "- Step 1: Differentiate implicitly: $2y \\frac{dy}{dx} = 4$, so $\\frac{dy}{dx} = \\frac{2}{y}$. At $P$, this is $\\frac{2}{2ap} = \\frac{1}{ap}$.\n- Step 2: Using point-slope with gradient $1/p$ at $(2p^2, 4p)$: $y - 4p = \\frac{1}{p}(x - 2p^2)$. Multiply by $p$: $py = x + 2p^2$. With $a=2$, this is $py = x + 2p^2$.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "What is the key theorem about where tangents at the endpoints of a focal chord intersect, and how can you use this to check your answer? (2 steps)", "answer": "- Step 1: Theorem: Tangents at the endpoints of any focal chord intersect on the directrix. For $y^2 = 8x$, the directrix is $x = -2$.\n- Step 2: In the solution, the x-coordinate of intersection point $R$ comes out as $x = -2$. If your answer has $x$ depending on $p$, you've made an algebraic error. The final answer is $R = (-2, 2p - 2/p)$.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "When solving the intersection of tangents $T_P: py = x + 2p^2$ and $T_Q: y = -px - 2/p$, what substitution strategy avoids algebraic explosion? (3 steps)", "answer": "- Step 1: From $T_P$: express $x = py - 2p^2$. Substitute into $T_Q$.\n- Step 2: $y = -p(py - 2p^2) - 2/p = -p^2 y + 2p^3 - 2/p$.\n- Step 3: Collect $y$ terms: $y(1 + p^2) = 2(p^3 - 1/p) = \\frac{2(p^4-1)}{p} = \\frac{2(p^2-1)(p^2+1)}{p}$. Cancel to get $y = \\frac{2(p^2-1)}{p} = 2p - 2/p$. Then $x = -2$. Keep $(p^2+1)$ visible for late cancellation.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "For proving by induction that $4^n + 6n - 10$ is divisible by 18 for $n \\geq 2$, what is the base case, and why can't you use $n=1$? (2 steps)", "answer": "- Step 1: The question states $n \\geq 2$, so the base case must be $n = 2$, not $n = 1$.\n- Step 2: Compute $f(2) = 4^2 + 6(2) - 10 = 16 + 12 - 10 = 18$, which is $18 \\times 1$. While $f(1) = 0$ is technically divisible by 18, using $n=1$ would not match the domain given in the question and would lose marks.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "In the inductive step for divisibility by 18, what is the strategic rewrite of $f(k+1)$ that makes the proof straightforward? (3 steps)", "answer": "- Step 1: Let $f(n) = 4^n + 6n - 10$. Compute $f(k+1) = 4^{k+1} + 6(k+1) - 10 = 4 \\cdot 4^k + 6k - 4$.\n- Step 2: Express in terms of $f(k)$: $f(k+1) = 4(4^k + 6k - 10) - 24k + 40 + 6k - 4 = 4f(k) - 18k + 36$.\n- Step 3: Rewrite as $f(k+1) = 4f(k) + 18(2-k)$. Now both terms are clearly divisible by 18: $4f(k)$ is 4 times a multiple of 18, and $18(2-k)$ has the factor 18 explicitly.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": true}, {"question": "In an induction proof, what three components must be present in your written solution to earn full marks? (3 steps)", "answer": "- Step 1: State the base case clearly with verification: \"For $n=2$, $f(2) = 18$, which is divisible by 18.\"\n- Step 2: State the inductive hypothesis: \"Assume $f(k) = 18M$ for some integer $M$.\"\n- Step 3: Write the inductive step showing $f(k+1) = 18(\\text{something})$ explicitly, and include the conclusion sentence: \"By the principle of mathematical induction, [statement] is true for all $n \\geq 2$.\" Markers explicitly check for this wording.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}], "count": 32}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "FP1 May 2023 Q1 — When you see \"$$\\sum_{r=1}^{n} r(r^2+2)$$\" with a target form $$\\tfrac{1}{12}n(n+1)(an^2+bn+c)$$, what is the very first algebraic move before applying any standard results?", "answer": "Expand the bracket and split the sum into separate standard sums: $$\\sum r(r^2+2) = \\sum r^3 + 2\\sum r$$. Trying to apply a standard result directly to $$r(r^2+2)$$ is impossible — there's no booklet formula for that product. The split converts a mystery sum into two known sums in one line.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "FP1 Q1 — The question lists \"$$\\sum r^2$$ and $$\\sum r^3$$\" as the standard results to use. Why might the appearance of $$\\sum r^2$$ in the question stem be misleading?", "answer": "The listed standard results are a *toolkit*, not a checklist of what you must use. After expanding $$r(r^2+2) = r^3 + 2r$$, only $$\\sum r^3$$ and $$\\sum r$$ are needed — $$\\sum r^2$$ never appears. Don't force it in; trust the algebra.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "FP1 Q1 — After substituting standard results into $$\\sum r^3 + 2\\sum r$$, what is the strategic factoring move before trying to match the target form? (2 steps)", "answer": "- Step 1: Write the expression as $$\\tfrac14 n^2(n+1)^2 + n(n+1)$$ and immediately spot $$n(n+1)$$ as a common factor in both terms.\n- Step 2: Factor it out: $$n(n+1)\\bigl[\\tfrac14 n(n+1) + 1\\bigr]$$. Pulling $$n(n+1)$$ out early matches the target structure $$n(n+1)(\\ldots)$$ — if you don't factor early, you'll expand everything and waste time re-factoring later.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "FP1 Q1 — Your working has produced $$\\frac{n(n+1)(n^2+n+4)}{4}$$ but the target form has denominator $$\\tfrac{1}{12}$$. What's the scaling trick to land on the exact requested form?", "answer": "Multiply top and bottom by 3: $$\\frac{n(n+1)(n^2+n+4)}{4} = \\frac{3n(n+1)(n^2+n+4)}{12} = \\tfrac{1}{12}n(n+1)(3n^2+3n+12)$$. The instruction \"$$a, b, c$$ are integers\" forces the denominator to match exactly — leaving it as $$\\tfrac{1}{4}$$ loses the final mark even though the algebra is correct.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "FP1 Q2(a) — Given that $$x = 2+3i$$ is a root of a real-coefficient polynomial, what is the one-line justification you should state for writing down another root?", "answer": "\"All coefficients are real, so complex roots occur in conjugate pairs.\" Therefore the conjugate $$2-3i$$ is also a root. Examiners sometimes want this stated verbally for the 1 mark — don't just write down the conjugate silently.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "FP1 Q2(b) — You know $$2+3i$$ and $$2-3i$$ are roots of a quartic. What's the shortcut formula to write down the real quadratic factor without doing FOIL?", "answer": "Use $$(x-z)(x-\\bar z) = x^2 - 2\\operatorname{Re}(z)\\,x + |z|^2$$. Here $$\\operatorname{Re}(z) = 2$$ and $$|z|^2 = 4+9 = 13$$, so the factor is $$x^2 - 4x + 13$$. This avoids expanding $$(x-(2+3i))(x-(2-3i))$$ by hand every time.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "FP1 Q2(b) — When dividing $$2x^4 - 8x^3 + 29x^2 - 12x + 39$$ by $$x^2 - 4x + 13$$, what should the very first quotient term be, and why is this where students often slip?", "answer": "The first quotient term is $$2x^2$$ (because the quartic's leading coefficient is 2, not 1). Students habitually write $$x^2$$ assuming a monic leading term — but here the divisor is monic and the dividend isn't, so the leading quotient is $$\\frac{2x^4}{x^2} = 2x^2$$. This single slip cascades through the whole division.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "FP1 Q2(b) — After factoring out the known quadratic, you're left with $$2x^2 + 3 = 0$$. What's the cleanest surd form for the remaining roots?", "answer": "$$x^2 = -\\tfrac{3}{2}$$, so $$x = \\pm\\sqrt{-\\tfrac{3}{2}} = \\pm i\\sqrt{\\tfrac{3}{2}} = \\pm\\tfrac{\\sqrt{6}}{2}i$$ (rationalising $$\\sqrt{3/2} = \\sqrt{6}/2$$). Leaving it as $$\\pm\\sqrt{-3/2}$$ won't earn full marks — \"simplest form\" requires the rationalised surd.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "FP1 Q2 — Common mental slip: computing $$|2+3i|^2$$. What's the trap, and what's the correct value?", "answer": "The trap is writing $$|2+3i|^2 = 2^2 - 3^2 = -5$$ (treating it like $$(a+b)(a-b)$$). The correct definition is $$|z|^2 = (\\operatorname{Re})^2 + (\\operatorname{Im})^2 = 4 + 9 = 13$$ — always a **plus**, never a minus. Mnemonic: modulus measures distance, and distance is positive.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": true}, {"question": "FP1 Q3(a) — On the rectangular hyperbola $$xy = 9$$ with parametric point $$(3t, 3/t)$$, what's the fastest route to $$dy/dx$$?", "answer": "Solve $$y = 9/x$$ explicitly and differentiate: $$dy/dx = -9/x^2$$. At $$x = 3t$$, this gives $$-9/(9t^2) = -1/t^2$$. Implicit differentiation works too but explicit is faster here because $$y = 9/x$$ is one line.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "FP1 Q3(a) — At the parametric point $$(3t, 3/t)$$ on $$xy = 9$$, what are the tangent gradient and normal gradient, and what's the easy sign mistake?", "answer": "Tangent gradient $$m_T = -1/t^2$$ (negative). Normal gradient $$m_N = -1/m_T = +t^2$$ (positive). The trap: using $$-1/t^2$$ in the normal equation by mistake. The question asks for the **normal**, so use $$t^2$$. Mnemonic: perpendicular gradients multiply to $$-1$$, so $$(-1/t^2)(t^2) = -1$$ ✓.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "FP1 Q3(a) — After writing $$y - 3/t = t^2(x - 3t)$$, what's the algebraic trick to remove the fraction and land in the requested form $$ty - t^3 x = f(t)$$?", "answer": "Multiply both sides by $$t$$: $$ty - 3 = t^3 x - 3t^4$$, then rearrange to $$ty - t^3 x = 3 - 3t^4$$. The multiply-by-$$t$$ kills the $$3/t$$ in one move. So $$f(t) = 3 - 3t^4$$.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "FP1 Q3(b) — The normal at $$P$$ meets $$xy = 9$$ again. After substituting $$y = 9/x$$ into the normal, you get $$8x^2 - 45x - 18 = 0$$. What's the shortcut to factor this without quadratic formula?", "answer": "You already know $$x = 3t = 6$$ is a root (because $$P$$ itself lies on the normal). Verify: $$8(36) - 45(6) - 18 = 0$$ ✓. Then $$(x - 6)$$ is a factor and the other factor must be $$(8x + 3)$$ by inspection (constants multiply to $$-18$$, cross-terms give $$-45x$$). This skips the quadratic formula entirely.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": true}, {"question": "FP1 Q3(b) — Why is recognising that $$P$$ itself lies on the normal a critical strategic insight, and what's the wording in the question that triggers this?", "answer": "The question says \"the normal meets $$H$$ **again**\" — the word \"again\" means you must reject the $$x = 3t = 6$$ root, because that's $$P$$. This trigger word also tells you the quadratic factors easily using the known root. Without this insight, you'd solve from scratch with the formula and possibly forget to discard $$P$$.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": true}, {"question": "FP1 Q3(b) — Once you've found the other intersection's $$x$$-coordinate is $$-3/8$$, how do you get the partner $$y$$-coordinate (and why not use the normal equation)?", "answer": "Substitute back into $$xy = 9$$, not the normal. So $$y = 9/(-3/8) = -24$$. Using the hyperbola equation is faster (one division) and avoids fresh arithmetic errors. The normal equation would also work but introduces more chances for a sign slip.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "FP1 Q4(i) — A matrix transformation triples the area of a triangle. What equation must you set up, and what's the easy-to-forget detail?", "answer": "$$|\\det A| = 3$$ — **with absolute value bars**. Area scale factor is always $$|\\det M|$$, never signed determinant. Without the modulus, you'd only find one value of $$k$$ instead of two. Writing the modulus bars explicitly also earns method credit even if one branch goes wrong.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "FP1 Q4(i) — From $$|3k - 24| = 3$$, how many values of $$k$$ should you find, and why?", "answer": "Two values: $$3k - 24 = +3$$ gives $$k = 9$$, and $$3k - 24 = -3$$ gives $$k = 7$$. The absolute value equation splits into two cases. A common slip is solving only the positive case and missing $$k = 7$$ entirely.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "FP1 Q4(ii) — Given $$BC = D$$ with $$B$$ a $$2\\times 2$$ and $$D$$ a $$2\\times 3$$, how do you isolate $$C$$ and why does order matter?", "answer": "Left-multiply both sides by $$B^{-1}$$: $$C = B^{-1}D$$. Matrix multiplication is **non-commutative**, so $$DB^{-1}$$ is wrong (and dimensionally impossible here: $$D$$ is $$2\\times 3$$, $$B^{-1}$$ is $$2\\times 2$$ — can't multiply $$DB^{-1}$$). The side you multiply on must match where the unknown sits.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": true}, {"question": "FP1 Q4(ii) — For $$B = \\begin{pmatrix} a & 4 \\\\ 2 & 3 \\end{pmatrix}$$, what is $$B^{-1}$$ and what's the cofactor sign trap?", "answer": "$$B^{-1} = \\frac{1}{3a - 8}\\begin{pmatrix} 3 & -4 \\\\ -2 & a \\end{pmatrix}$$. The trap: the off-diagonal entries get **negated** (swap signs on $$b$$ and $$c$$), while the main-diagonal entries get **swapped** (not negated). Easy to mix these two operations up under pressure.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": true}, {"question": "FP1 Q4(ii) — Why should you leave the final answer for $$C$$ with $$\\frac{1}{3a-8}$$ as a scalar prefactor rather than distributing it through each entry?", "answer": "Distributing the $$1/(3a-8)$$ into every entry produces six ugly fractions and makes the answer harder to mark and easier to slip in. Pulling the scalar out front keeps the structure clean and matches the standard inverse-matrix presentation. It's also explicitly \"simplest form\" because the common factor is shown.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "FP1 Q5(a) — Given roots $$\\alpha, \\beta$$ of $$x^2 - 6x + 3 = 0$$, what are the two summary quantities to write down at the top of your working before doing anything else?", "answer": "Sum $$\\alpha + \\beta = 6$$ and product $$\\alpha\\beta = 3$$ (from Vieta's). Then derive the immediate consequence $$\\alpha^2 + \\beta^2 = (\\alpha+\\beta)^2 - 2\\alpha\\beta = 36 - 6 = 30$$. These three numbers are the only ingredients you'll need — never the individual roots.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "FP1 Q5(a) — To compute $$(\\alpha^2+1)(\\beta^2+1)$$, what's the expansion, and what's the symmetric-function trick?", "answer": "Expand: $$(\\alpha^2+1)(\\beta^2+1) = \\alpha^2\\beta^2 + \\alpha^2 + \\beta^2 + 1 = (\\alpha\\beta)^2 + (\\alpha^2+\\beta^2) + 1$$. Every term is now a symmetric function of the roots — fully expressible via sum and product. Substitute $$9 + 30 + 1 = 40$$. Never try to find $$\\alpha, \\beta$$ individually.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": true}, {"question": "FP1 Q5(b) — When forming the new sum $$\\frac{\\alpha}{\\alpha^2+1} + \\frac{\\beta}{\\beta^2+1}$$, what's the critical factoring trick on the numerator that students miss?", "answer": "Numerator is $$\\alpha(\\beta^2+1) + \\beta(\\alpha^2+1) = \\alpha\\beta^2 + \\alpha + \\alpha^2\\beta + \\beta$$. Factor as $$\\alpha\\beta(\\alpha+\\beta) + (\\alpha+\\beta) = (\\alpha+\\beta)(\\alpha\\beta+1)$$. Without this factoring, you're stuck trying to compute $$\\alpha^2\\beta + \\alpha\\beta^2$$ piece by piece. Spotting the $$(\\alpha+\\beta)$$ common factor is the whole point of the question.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": true}, {"question": "FP1 Q5(b) — Why is part (a)'s answer of 40 strategically important for part (b)?", "answer": "Because $$(\\alpha^2+1)(\\beta^2+1) = 40$$ is exactly the **denominator** of both the new sum $$S = \\frac{(\\alpha+\\beta)(\\alpha\\beta+1)}{40}$$ and the new product $$P = \\frac{\\alpha\\beta}{40}$$. FP1 questions are structurally scaffolded — part (a) is rarely independent of part (b). If a sub-result feels reusable, it's almost certainly needed downstream.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": true}, {"question": "FP1 Q5(b) — After computing $$S = 3/5$$ and $$P = 3/40$$, what's the skeleton of the new quadratic, and what final step converts to the requested integer form?", "answer": "Skeleton: $$x^2 - Sx + P = 0$$, giving $$x^2 - \\tfrac{3}{5}x + \\tfrac{3}{40} = 0$$. Clear fractions by multiplying through by the LCM of denominators (40): $$40x^2 - 24x + 3 = 0$$. The instruction \"$$p, q, r$$ are integers\" means leaving fractions costs marks even if the equation is mathematically equivalent.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "FP1 Q5(b) — In the standard $$x^2 - Sx + P = 0$$ skeleton, what's the sign trap on the $$x$$-coefficient?", "answer": "The coefficient is $$-S$$, not $$+S$$. From $$(x - r_1)(x - r_2) = x^2 - (r_1+r_2)x + r_1 r_2$$, the sum gets a **minus**. Students sometimes write $$x^2 + Sx + P$$ and flip the sign of the linear term.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": false}, {"question": "FP1 Q6(a) — To find $$|z_1 + z_2|$$ \"exactly\" when $$z_1 = 3+2i$$ and $$z_2 = 2+3i$$, what form must the final answer be in?", "answer": "Surd form. $$z_1 + z_2 = 5 + 5i$$, so $$|z_1+z_2| = \\sqrt{50} = 5\\sqrt{2}$$. \"Exact value\" forbids decimals — writing $$7.07$$ loses the mark.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "FP1 Q6(b) — To compute $$w = \\frac{z_2 z_3}{z_1}$$ with $$z_3 = a + bi$$, what's the standard tactic for dividing by a complex number?", "answer": "Multiply numerator and denominator by the conjugate $$\\bar{z}_1$$. The denominator becomes $$z_1 \\bar{z}_1 = |z_1|^2$$, which is a real number, leaving the numerator as a clean complex expression. Here $$|z_1|^2 = 9 + 4 = 13$$, so the denominator becomes 13.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "FP1 Q6(b) — Why is the \"calculator technology not acceptable\" warning especially relevant here, and what's the consequence for working layout?", "answer": "Every algebraic step must be shown: the multiplication $$(2+3i)(a+bi)$$, the conjugate multiplication, and the separation into real and imaginary parts. Partial credit lives in the working. A correct final $$w$$ with no algebra in between scores zero. Lay out each multiplication explicitly, even if it's slow.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "FP1 Q6(c) — After expressing $$w$$ in terms of $$a, b$$ and being given a numerical $$w$$, what's the standard tactic to find $$a$$ and $$b$$?", "answer": "Equate real and imaginary parts separately, generating two simultaneous linear equations in $$a, b$$. Here: $$12a - 5b = 4$$ and $$5a + 12b = 58$$. Solve by elimination (scaling and adding). Equating real and imaginary parts is the universal complex-equation tactic.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "FP1 Q6(d) — For $$\\arg w$$ with $$w = \\frac{4}{13} + \\frac{58}{13}i$$, what must you check before just punching $$\\arctan$$?", "answer": "The **quadrant**. Both real and imaginary parts are positive, so $$w$$ is in the first quadrant and $$\\arg w = \\arctan(\\text{Im}/\\text{Re}) = \\arctan(58/4)$$ is correct as-is. If $$\\text{Re} < 0$$, you'd add $$\\pi$$ (Q2) or subtract from $$-\\pi$$ (Q3). Always check the quadrant first.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": true}, {"question": "FP1 Q6(d) — What's the calculator-mode pitfall when computing $$\\arg w$$ on this paper?", "answer": "The question specifies **radians**. If your calculator is in degree mode, $$\\arctan(14.5) \\approx 86.05°$$ instead of $$1.502$$ rad — completely wrong scale. Always check mode before computing an argument, especially when switching from earlier (possibly degree-based) FP1 problems.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": true}, {"question": "FP1 Q6(d) — What's the formula for the ratio inside $$\\arctan$$ when computing an argument, and what's the easy mix-up?", "answer": "$$\\arg w = \\arctan(\\text{Im}/\\text{Re})$$ — imaginary part on top, real part on bottom. The mix-up is writing $$\\arctan(\\text{Re}/\\text{Im})$$, which gives the complementary angle. Mnemonic: argument measures \"how vertical\" the vector is, and verticality is rise over run = Im/Re.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": true}, {"question": "FP1 Q7(a) — To \"show that $$f(x) = 0$$ has a root in $$[1,2]$$\", what are the two required verbal ingredients beyond the numerical check?", "answer": "(1) State that $$f$$ is **continuous** on $$[1, 2]$$. (2) State that there is a **sign change** ($$f(1) < 0$$ and $$f(2) > 0$$). (3) Invoke the **Intermediate Value Theorem** to conclude a root exists. Markers explicitly check for the IVT statement — just computing $$f(1)$$ and $$f(2)$$ with no conclusion sentence loses a mark.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "FP1 Q7(b) — After bisecting once and finding $$f(1.5) > 0$$, which sub-interval contains the root, and what's the directional rule?", "answer": "$$[1, 1.5]$$, because $$f(1) < 0$$ and $$f(1.5) > 0$$ — the sign change is on this side. Rule: after computing $$f$$(midpoint), keep the sub-interval where the **signs differ**. The root lives at the boundary between negative and positive values.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": true}, {"question": "FP1 Q7(c) — For $$f(x) = x^{3/2} + x - 3$$, what's the derivative, and what's the most common slip?", "answer": "$$f'(x) = \\tfrac{3}{2}x^{1/2} + 1$$. The slip is writing just $$\\tfrac{3}{2}x^{1/2}$$ and forgetting the $$+1$$ from differentiating the $$+x$$ term. This makes $$f'(1.375)$$ about 1 less than it should be, which throws the NR answer off by roughly 50%.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "FP1 Q7(c) — Newton–Raphson formula. State it and explain when the step \"$$x_n - \\frac{f(x_n)}{f'(x_n)}$$\" geometrically does what.", "answer": "$$x_{n+1} = x_n - \\frac{f(x_n)}{f'(x_n)}$$. Geometrically: draw the tangent to $$y = f(x)$$ at $$x_n$$; find where that tangent crosses the $$x$$-axis; that intercept is $$x_{n+1}$$. The subtraction $$-f/f'$$ is the horizontal distance from $$x_n$$ to the tangent's $$x$$-intercept.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "FP1 Q7(d) — Linear interpolation formula on $$[a, b]$$ with $$f(a) < 0 < f(b)$$. What's the partition rule and what must you use — signed or absolute values?", "answer": "Partition $$[a, b]$$ in ratio $$|f(a)| : |f(b)|$$, giving approximation $$\\alpha \\approx a + \\frac{|f(a)|}{|f(a)| + |f(b)|}\\cdot(b - a)$$. Use **absolute values** — the ratio represents distances, not signed quantities. Using signed values gives nonsense (negative weight on one side).", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "FP1 Q7 — What precision should you carry in intermediate steps when the final answer is required to 3 dp, and why?", "answer": "At least 5 dp internally. Rounding to 3 dp at every step compounds error — you can easily be off by $$\\pm 0.001$$ in the final answer, which is the rounding boundary. Carry full calculator precision until the very last step, then round once.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "FP1 Q8 — For the parabola $$y^2 = 8x$$, what are the focus and directrix, and what's the parameter $$a$$?", "answer": "Compare to standard form $$y^2 = 4ax$$: $$4a = 8$$ gives $$a = 2$$. So focus is $$(a, 0) = (2, 0)$$ and directrix is $$x = -a$$, i.e. $$x = -2$$. Common slip: reading $$a = 8$$ directly from the coefficient.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "FP1 Q8(a) — To verify $$Q\\left(\\frac{2}{p^2}, -\\frac{4}{p}\\right)$$ lies on $$y^2 = 8x$$, what's the cleanest verification approach?", "answer": "Check $$y^2 = 8x$$ rather than $$y = \\pm\\sqrt{8x}$$. Compute $$y^2 = \\frac{16}{p^2}$$ and $$8x = \\frac{16}{p^2}$$ — equal, done. Using the square-rooted form forces a sign discussion ($$y < 0$$ branch), which is unnecessary work.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": true}, {"question": "FP1 Q8 — On the parabola $$y^2 = 4ax$$, what are the standard parametric coordinates, and how do $$P(2p^2, 4p)$$ and $$Q(2/p^2, -4/p)$$ fit?", "answer": "Standard parametric point is $$(at^2, 2at)$$. Here $$a = 2$$ so a point is $$(2t^2, 4t)$$. Then $$P$$ corresponds to parameter $$p$$ (so $$t_P = p$$), and $$Q$$ corresponds to $$t_Q = -1/p$$ (since $$2(-1/p)^2 = 2/p^2$$ and $$4(-1/p) = -4/p$$). The product $$t_P \\cdot t_Q = -1$$ — that's the focal chord signature.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "FP1 Q8 — What's the test for whether two points $$P, Q$$ on $$y^2 = 4ax$$ with parameters $$t_1, t_2$$ form a focal chord?", "answer": "$$t_1 t_2 = -1$$. This is the algebraic signature of a focal chord (chord through the focus). For Q8, $$t_P = p$$ and $$t_Q = -1/p$$, so $$t_P t_Q = -1$$ ✓. Once you spot this, you know the chord passes through the focus before doing any algebra.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": true}, {"question": "FP1 Q8(b) — To show $$PQ$$ passes through the focus $$(2, 0)$$, what's the verification method?", "answer": "Form the chord equation $$y - y_P = m(x - x_P)$$ with slope $$m = \\frac{y_Q - y_P}{x_Q - x_P}$$, then substitute $$(2, 0)$$ and check both sides equal. Don't try to derive the focus from scratch — just verify it lies on the chord.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "FP1 Q8(c) — For $$y^2 = 4ax$$ at parametric point $$(at^2, 2at)$$, what's the tangent equation in the form $$ty = x + at^2$$, and what's the gradient?", "answer": "Gradient is $$1/t$$ (from implicit differentiation $$2y \\cdot dy/dx = 4a$$, so $$dy/dx = 2a/y = 2a/(2at) = 1/t$$). Tangent: $$y - 2at = \\frac{1}{t}(x - at^2)$$, multiply by $$t$$: $$ty = x + at^2$$. Memorise this form — it's the most efficient.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": false}, {"question": "FP1 Q8(c) — There's a powerful geometric theorem about tangents at the endpoints of a focal chord. State it and explain why it predicts the answer to part (c) before any algebra.", "answer": "**Theorem:** Tangents at the endpoints of a focal chord of a parabola meet on the directrix. For $$y^2 = 8x$$, directrix is $$x = -2$$, so the intersection point $$R$$ must have $$x = -2$$. Useful as a sanity check: if your algebra gives an $$x$$-coordinate depending on $$p$$, you've made an error.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": true}, {"question": "FP1 Q8(c) — When intersecting two algebraically heavy tangent equations involving $$p$$, what's the strategic principle for keeping the algebra manageable?", "answer": "Keep factors symbolic (like $$(p^2+1)$$) as long as possible — cancel them only at the last step. In $$y(1+p^2) = \\frac{2(p^2-1)(p^2+1)}{p}$$, divide the $$(p^2+1)$$ on each side immediately to get $$y = \\frac{2(p^2-1)}{p}$$. Expanding too early creates polynomial chaos.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": false}, {"question": "FP1 Q8(c) — The final answer is $$R = (-2,\\ 2p - 2/p)$$. What's the \"simplest form\" requirement that distinguishes a marker-acceptable answer from a deduct-marks answer?", "answer": "Write $$2p - 2/p$$ (split into separate terms), not $$\\frac{2p^2 - 2}{p}$$ (single fraction). \"Simplest form\" prefers the additively-split form for clean reading. Examiners deduct presentation marks for unnecessarily compound fractions when an equivalent split exists.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": true}, {"question": "FP1 Q9 — Setting up induction to prove $$4^n + 6n - 10$$ is divisible by 18 for $$n \\geq 2$$, what's the trap on the base case?", "answer": "U
