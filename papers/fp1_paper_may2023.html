se $$n = 2$$, not $$n = 1$$. The question's lower bound is $$n \\geq 2$$, so the induction starts there. $$f(2) = 16 + 12 - 10 = 18$$ ✓. Starting at $$n = 1$$ gives $$f(1) = 0$$, which technically IS divisible by 18, but ignoring the stated lower bound costs a mark.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": false}, {"question": "FP1 Q9 — In divisibility induction, what's the template for expressing $$f(k+1)$$ in terms of $$f(k)$$, and why is this the cleanest tactic?", "answer": "Write $$f(k+1) = A \\cdot f(k) + B$$ where $$A$$ is an integer (so $$A f(k)$$ inherits divisibility from the hypothesis) and $$B$$ is **explicitly** a multiple of the target modulus. Both pieces are divisible, so the sum is. This template avoids the messier $$f(k+1) - f(k)$$ subtraction approach.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": true}, {"question": "FP1 Q9 — For $$f(n) = 4^n + 6n - 10$$, what's the algebraic rewrite of $$f(k+1)$$ in the form \"multiple of $$f(k)$$ plus a multiple of 18\"? (3 steps)", "answer": "- Step 1: Compute $$f(k+1) = 4\\cdot 4^k + 6k - 4$$ directly.\n- Step 2: Recognise $$4 \\cdot 4^k = 4(4^k + 6k - 10) - 4(6k - 10) = 4f(k) - 24k + 40$$.\n- Step 3: So $$f(k+1) = 4f(k) - 24k + 40 + 6k - 4 = 4f(k) - 18k + 36 = 4f(k) + 18(2-k)$$. Both terms are divisible by 18 ✓.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": false}, {"question": "FP1 Q9 — What's the exact verbal conclusion sentence required at the end of an induction proof, and why does it matter?", "answer": "\"Since $$f(2)$$ is divisible by 18, and if $$f(k)$$ is divisible by 18 then $$f(k+1)$$ is divisible by 18, by the principle of mathematical induction, $$f(n)$$ is divisible by 18 for all integers $$n \\geq 2$$.\" Markers explicitly check for this closing sentence — it's worth a mark on its own. Skipping it is a guaranteed point lost.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": true}, {"question": "Across the paper — what's the unifying strategic principle linking Q1, Q3(b), Q5(b), Q8(c), and Q9?", "answer": "**Factor symbolically before substituting numbers.** Q1: pull $$n(n+1)$$ out early. Q3(b): use known root $$x=6$$ to factor the quadratic. Q5(b): factor $$(\\alpha+\\beta)(\\alpha\\beta+1)$$ in the numerator. Q8(c): keep $$(p^2+1)$$ factor until the cancellation. Q9: write $$f(k+1) = 4f(k) + 18(2-k)$$. Late substitution = clean algebra. Early substitution = arithmetic explosion.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": false}, {"question": "When a question says \"you must show all stages of your working. Solutions relying on calculator technology are not acceptable\", what's the practical consequence for marking?", "answer": "Every algebraic step must appear on paper — multiplications, conjugate operations, simultaneous equation eliminations — even if mechanical. Marks live in the working, not the final answer. Skipping steps (e.g. writing $$w = 4/13 + 58i/13$$ directly from a calculator) scores zero even if correct, because the examiner can't verify the method.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": true}, {"question": "What's the format-trigger phrase that tells you the final answer must have integer coefficients, and what's the response?", "answer": "Phrases like \"in the form $$px^2 + qx + r = 0$$ where $$p, q, r$$ are integers\" force you to clear all fractions at the end. Multiply through by the LCM of any denominators. Leaving rational coefficients (e.g. $$x^2 - \\tfrac{3}{5}x + \\tfrac{3}{40}$$ in Q5) loses the format mark even if mathematically equivalent.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": true}, {"question": "What's the time-management rule for FP1 (75 marks in 90 min), and when should you bail on a stuck question?", "answer": "~1.2 minutes per mark. Q1 (4 marks) ≈ 5 min, Q8 (13 marks) ≈ 15 min. If you stare for more than 2 minutes without writing, move on and return later. Time spent stuck is worth less than time spent on the next question's easy marks.", "source": "Opus 4.7 ①", "_id": "opus_1_55", "judge_pick": false}], "count": 56}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "FP1 May 2023 Q1 — what's the first algebraic move when asked to evaluate $$\\sum_{r=1}^{n} r(r^2+2)$$ using standard results? (2 steps)", "answer": "- Step 1: Expand the bracket and split the sum by linearity: $$\\sum r(r^2+2) = \\sum r^3 + 2\\sum r$$. Never try to apply a standard result to a non-standard polynomial — always decompose into pure $$\\sum r^k$$ pieces first.\n- Step 2: Apply the **factored** booklet forms: $$\\sum r^3 = \\tfrac14 n^2(n+1)^2$$ and $$\\sum r = \\tfrac12 n(n+1)$$. Stay in factored form — don't expand.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "In a \"show that $$\\sum = \\tfrac{1}{12}n(n+1)(an^2+bn+c)$$\" question, what's the trigger that tells you to pull out $$n(n+1)$$ as a common factor early? (2 steps)", "answer": "- Step 1: The target form already exhibits $$n(n+1)$$ as an explicit factor — this is the examiner telling you that $$n(n+1)$$ must come out cleanly. Recognise this *before* doing any algebra.\n- Step 2: After applying the booklet results, every term you've produced will have $$n(n+1)$$ inside it (since $$\\sum r$$ and $$\\sum r^3$$ both factor through $$n(n+1)$$). Factor it out immediately — don't expand first and refactor later.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": true}, {"question": "You've reached $$\\frac{n(n+1)(n^2+n+4)}{4}$$ but the question demands the form $$\\tfrac{1}{12}n(n+1)(an^2+bn+c)$$. What's the final move?", "answer": "Multiply top and bottom by 3 to convert the denominator $$4 \\to 12$$: $$\\frac{3 \\cdot n(n+1)(n^2+n+4)}{12} = \\tfrac{1}{12}n(n+1)(3n^2+3n+12)$$. The mental rule: match the denominator the examiner asks for *exactly*, then read off $$a,b,c$$. Leaving the answer in $$\\tfrac14$$-form loses the final mark even though it's algebraically equivalent.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "Why is it a trap when a series question lists $$\\sum r^2$$ and $$\\sum r^3$$ in the preamble?", "answer": "The listed standard results are a **toolkit**, not a checklist of what must appear in your working. In FP1 May 2023 Q1, $$\\sum r^2$$ is offered but never used — only $$\\sum r^3$$ and $$\\sum r$$ feature. Don't force $$\\sum r^2$$ in just because it was mentioned; let the algebra decide which formulas you need.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "FP1 May 2023 Q2(a) — given that $$x = 2+3i$$ is a root of a quartic with real coefficients, what's the one-line justification for writing down another root?", "answer": "\"Coefficients are real, so complex roots occur in conjugate pairs, hence $$2-3i$$ is also a root.\" The single line must explicitly invoke **real coefficients** — otherwise the conjugate-pair argument has no basis (a polynomial with complex coefficients need not have conjugate roots).", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": true}, {"question": "Given a conjugate pair $$z, \\bar z$$ of roots, what's the shortcut formula for their real quadratic factor — and why does it save time over FOIL?", "answer": "$$(x-z)(x-\\bar z) = x^2 - 2\\operatorname{Re}(z)\\,x + |z|^2$$. This avoids expanding the product $$(x-(a+bi))(x-(a-bi))$$ from scratch every time. For $$z=2+3i$$: $$\\operatorname{Re}=2$$, $$|z|^2 = 4+9 = 13$$, so the factor is $$x^2-4x+13$$. Two numbers, zero risk of $$i^2$$ sign errors.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": true}, {"question": "Common pitfall: when computing $$|z|^2$$ for the conjugate-pair quadratic factor, what sign error sneaks in?", "answer": "Students sometimes write $$|2+3i|^2 = 2^2 - 3^2$$, confusing it with $$z\\bar z$$ \"containing\" $$-i^2$$. The correct formula is $$|z|^2 = a^2 + b^2$$ — strictly a sum. The minus sign students remember belongs in $$(a+bi)(a-bi) = a^2 - (bi)^2 = a^2 + b^2$$, where the $$-i^2$$ flips back to $$+$$.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": true}, {"question": "After dividing $$2x^4 - 8x^3 + 29x^2 - 12x + 39$$ by $$x^2-4x+13$$ to get $$2x^2 + 3$$, what trap awaits when solving $$2x^2+3=0$$?", "answer": "Students stop at $$x = \\pm\\sqrt{-3/2}$$, but full credit requires the simplified form. Rationalise: $$x^2 = -\\tfrac32 \\Rightarrow x = \\pm i\\sqrt{\\tfrac32} = \\pm\\tfrac{\\sqrt 6}{2}i$$. The trick: multiply inside the surd by $$2/2$$ to get $$\\sqrt{6}/2$$, eliminating the fraction inside the radical.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "When doing polynomial long division of a quartic with leading coefficient 2 by a monic quadratic, what's the first quotient term and why?", "answer": "First quotient term is $$2x^2$$, **not** $$x^2$$. The quotient's leading term is (quartic's leading coefficient) / (divisor's leading coefficient) = $$2x^4 / x^2 = 2x^2$$. Forgetting the leading 2 propagates wrong values through every subsequent subtraction.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "FP1 May 2023 Q3 — for the rectangular hyperbola $$xy=9$$ parametrised as $$(3t, 3/t)$$, why differentiate $$y = 9/x$$ explicitly rather than $$xy=9$$ implicitly?", "answer": "Both work, but explicit is faster: $$\\tfrac{dy}{dx} = -9/x^2$$ in one line. At $$x=3t$$ this evaluates to $$-9/(9t^2) = -1/t^2$$ — clean and parameter-friendly. Implicit differentiation requires an extra rearrangement step. Save time by picking the form already solved for $$y$$.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "For $$xy = c^2$$ parametrised as $$(ct, c/t)$$, what are the tangent and normal gradients at the parameter point?", "answer": "Tangent gradient $$m_T = -1/t^2$$ and normal gradient $$m_N = +t^2$$ (negative reciprocal). Memorise both signs — the tangent is *negative* because the hyperbola is decreasing in the first quadrant; the normal flips sign and reciprocates.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "When forming the normal equation at $$(3t, 3/t)$$ and the target form is $$ty - t^3 x = f(t)$$, what algebraic move clears the fractions?", "answer": "Multiply both sides of $$y - \\tfrac{3}{t} = t^2(x - 3t)$$ by $$t$$. This removes the $$3/t$$ fraction in one stroke: $$ty - 3 = t^3 x - 3t^4 \\Rightarrow ty - t^3 x = 3 - 3t^4$$. The target form's \"$$ty$$\" on the LHS is the examiner signalling you should multiply through by $$t$$.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "When the normal at $$P$$ (with $$t=2$$) meets the hyperbola $$xy=9$$ \"again\", what's the shortcut you must exploit instead of using the quadratic formula?", "answer": "$$P$$ itself sits on both curves, so $$x = 3t = 6$$ is automatically one root of the intersection quadratic $$8x^2 - 45x - 18 = 0$$. Factor as $$(x-6)(8x+3)$$ — the other root drops out instantly. **Why this beats the quadratic formula:** the discriminant has ugly arithmetic ($$45^2 + 4\\cdot 8\\cdot 18 = 2601 = 51^2$$); the known-root method bypasses it.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": true}, {"question": "Why must \"meets the hyperbola again\" wording force you to reject one root of the intersection equation?", "answer": "The normal passes through $$P$$ by construction, so $$P$$'s $$x$$-coordinate is *always* a root of the intersection equation. \"Again\" means \"second intersection\" — you must discard the $$P$$-root. Forgetting this and reporting $$P$$'s coordinates as the answer would be a comprehension failure, not an algebra failure.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": true}, {"question": "Once you've found the second $$x$$-coordinate of the normal-meets-hyperbola intersection, which equation do you substitute into to find $$y$$ — the normal or the hyperbola?", "answer": "Substitute into $$xy = 9$$ (the hyperbola), not the normal. Why: the hyperbola is one multiplication ($$y = 9/x$$), while the normal is a linear arithmetic with potential sign errors. Both give the same answer, but the hyperbola route minimises error surface.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "FP1 May 2023 Q4(i) — the area of $$T'$$ is 3 times the area of $$T$$ under transformation matrix $$A$$. What equation do you write down first, and what's the critical notation detail?", "answer": "$$|\\det A| = 3$$ — with **explicit modulus bars**. The area scale factor is the absolute value of the determinant (areas are positive, but determinants can be negative for orientation-reversing maps). Without the bars, you'll only find one value of $$k$$ and miss half the marks.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "Why does $$|\\det A| = 3$$ produce **two** values of $$k$$, and how do you avoid losing the second?", "answer": "$$|3k-24|=3$$ splits into $$3k-24 = +3$$ and $$3k-24 = -3$$, giving $$k=9$$ and $$k=7$$. The trap: writing only $$3k-24=3$$ silently. Always split absolute-value equations into both sign cases — examiners specifically test for this.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": true}, {"question": "Given $$BC = D$$ where $$B$$ is $$2\\times 2$$ and $$D$$ is $$2\\times 3$$, how do you solve for $$C$$ — and why does order matter?", "answer": "$$C = B^{-1}D$$, with $$B^{-1}$$ on the **left**. Matrix multiplication is non-commutative, so $$DB^{-1}$$ gives a different (wrong) answer. The rule: to \"cancel\" $$B$$ from the left of $$BC$$, apply $$B^{-1}$$ from the left of both sides.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "Before computing $$C = B^{-1}D$$ in FP1 May 2023 Q4(ii), what dimensional check should you do?", "answer": "$$B$$ is $$2\\times 2$$ and $$D=BC$$ is $$2\\times 3$$, so $$C$$ must be $$2\\times 3$$ (inner dimensions match, outer dimensions form the product shape). Doing this check first saves you from writing the wrong-shape matrix and noticing the error only at the end.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": true}, {"question": "What's the formula for $$B^{-1}$$ when $$B = \\begin{pmatrix} a & b \\\\ c & d \\end{pmatrix}$$, and what sign trap appears in the cofactor matrix?", "answer": "$$B^{-1} = \\frac{1}{ad-bc}\\begin{pmatrix} d & -b \\\\ -c & a \\end{pmatrix}$$. The trap: students sometimes flip the signs on $$a$$ and $$d$$ instead of on $$b$$ and $$c$$. Memorise: **swap the diagonal, negate the anti-diagonal**.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": true}, {"question": "FP1 May 2023 Q5 — given $$\\alpha, \\beta$$ are roots of $$x^2-6x+3=0$$, what are the two facts you write down before doing anything else?", "answer": "$$\\alpha+\\beta = 6$$ (sum = $$-b/a$$) and $$\\alpha\\beta = 3$$ (product = $$c/a$$). Plus the derived identity $$\\alpha^2+\\beta^2 = (\\alpha+\\beta)^2 - 2\\alpha\\beta = 36-6 = 30$$. These three numbers are the toolkit for the entire question — establish them first, then never touch the individual roots again.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "When expanding $$(\\alpha^2+1)(\\beta^2+1)$$, what's the structure that lets you compute it without knowing $$\\alpha, \\beta$$ individually?", "answer": "$$(\\alpha^2+1)(\\beta^2+1) = \\alpha^2\\beta^2 + \\alpha^2 + \\beta^2 + 1 = (\\alpha\\beta)^2 + (\\alpha^2+\\beta^2) + 1$$. The expression collapses into symmetric functions $$\\alpha\\beta$$ and $$\\alpha^2+\\beta^2$$ — both already known. The deep insight: any symmetric polynomial in $$\\alpha, \\beta$$ can be expressed in terms of elementary symmetric functions $$\\alpha+\\beta$$ and $$\\alpha\\beta$$.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": true}, {"question": "Common pitfall: students sometimes write $$(\\alpha^2+1)(\\beta^2+1) = \\alpha^2\\beta^2 - 1$$. Why is this wrong?", "answer": "They're confusing it with the difference of squares $$(a+b)(a-b) = a^2 - b^2$$. But here both brackets have $$+1$$, not $$\\pm 1$$. The correct expansion has *four* terms, all positive, with no cancellation. The mnemonic: $$+1$$ in both factors means $$+\\alpha^2 +\\beta^2 + 1$$ cross-terms — always positive.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": true}, {"question": "The key trick in FP1 May 2023 Q5(b): when computing the numerator $$\\alpha(\\beta^2+1)+\\beta(\\alpha^2+1)$$, what factoring step makes the algebra collapse?", "answer": "Rewrite as $$\\alpha\\beta^2 + \\alpha + \\alpha^2\\beta + \\beta = \\alpha\\beta(\\alpha+\\beta) + (\\alpha+\\beta) = (\\alpha+\\beta)(\\alpha\\beta+1)$$. The two pairs $$\\alpha\\beta^2 + \\alpha^2\\beta$$ and $$\\alpha+\\beta$$ each contain the factor $$(\\alpha+\\beta)$$. Without spotting this, you'd compute $$\\alpha^2\\beta + \\alpha\\beta^2$$ separately and the algebra balloons.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": true}, {"question": "For a new quadratic with roots $$\\rho_1, \\rho_2$$, what's the skeleton equation in terms of sum $$S$$ and product $$P$$?", "answer": "$$x^2 - Sx + P = 0$$ where $$S = \\rho_1 + \\rho_2$$ and $$P = \\rho_1\\rho_2$$. Sign trap: the coefficient of $$x$$ is **$$-S$$**, not $$+S$$. This comes from $$(x-\\rho_1)(x-\\rho_2) = x^2 - (\\rho_1+\\rho_2)x + \\rho_1\\rho_2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "Why does the new quadratic $$x^2 - \\tfrac35 x + \\tfrac{3}{40} = 0$$ need to be multiplied by 40, and how do you choose the multiplier?", "answer": "The question demands **integer** $$p, q, r$$. The denominators are 5 and 40; the LCM is 40. Multiplying through by 40 clears both fractions simultaneously: $$40x^2 - 24x + 3 = 0$$. Choose the LCM of all denominators — not the product, which would over-scale.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": true}, {"question": "FP1 May 2023 Q6(b) — when computing $$w = z_2 z_3 / z_1$$ with $$z_3 = a+bi$$ unknown, what's the strategy order: divide first or multiply first?", "answer": "Multiply first ($$z_2 z_3$$), then divide by $$z_1$$. The reason: $$z_2 z_3$$ produces an expression in $$a, b$$ with clean real/imag separation; dividing this by a fixed complex number $$z_1$$ is then a standard \"multiply by conjugate\" operation. Trying to divide $$z_2/z_1$$ first then multiply by $$z_3$$ creates fractions with $$a,b$$ inside, making the final equation messier.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": true}, {"question": "What's the universal technique for dividing complex numbers $$z/w$$ by hand?", "answer": "Multiply numerator and denominator by $$\\bar w$$ (the conjugate of the denominator): $$\\frac{z}{w} = \\frac{z\\bar w}{w\\bar w} = \\frac{z\\bar w}{|w|^2}$$. The denominator becomes a positive real number ($$|w|^2 = c^2+d^2$$), making the real and imaginary parts of the quotient cleanly readable.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": true}, {"question": "Once $$w = \\frac{12a-5b}{13} + \\frac{5a+12b}{13}i$$ is set equal to $$\\tfrac{4}{13} + \\tfrac{58}{13}i$$, how do you proceed?", "answer": "Equate real and imaginary parts separately to get a 2×2 system: $$12a-5b=4$$ and $$5a+12b=58$$. Solve simultaneously. The principle: two complex numbers are equal iff both real parts agree AND both imaginary parts agree. This *always* converts one complex equation into two real equations.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": true}, {"question": "When computing $$\\arg w$$ for $$w = \\tfrac{4}{13} + \\tfrac{58}{13}i$$, what check must you do **before** applying $$\\arctan$$?", "answer": "Check the quadrant by looking at the signs of the real and imaginary parts. Both positive ⇒ first quadrant ⇒ $$\\arg w = \\arctan(\\text{Im}/\\text{Re})$$ directly with no adjustment. If real were negative, you'd add $$\\pi$$; if imaginary were negative with positive real, you'd accept a negative angle (or add $$2\\pi$$). $$\\arctan$$ alone only spans $$(-\\pi/2, \\pi/2)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "For $$\\arg w$$ in FP1 May 2023 Q6(d), the answer must be in radians to 4 sig fig. What calculator pitfall destroys this answer?", "answer": "Wrong angle mode. If the calculator is in degrees, $$\\arctan(14.5)$$ returns $$\\approx 86.05°$$ instead of $$1.502$$ rad. Always check mode before evaluating $$\\arctan$$, $$\\arcsin$$, $$\\arccos$$. The question's \"in radians\" phrasing is the cue to verify.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "Common pitfall: students compute $$\\arg w = \\arctan(\\text{Re}/\\text{Im})$$ instead of $$\\arctan(\\text{Im}/\\text{Re})$$. What's the geometric reason for the correct order?", "answer": "The argument is the angle from the positive real axis, so $$\\tan(\\arg w) = \\text{opposite}/\\text{adjacent} = \\text{Im}/\\text{Re}$$. Flipping the ratio gives the complementary angle. Mnemonic: \"imaginary over real\" = \"rise over run\", same as standard gradient.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": true}, {"question": "FP1 May 2023 Q7(a) — to show $$f(x)=0$$ has a root in $$[1,2]$$, what *three* things must you state explicitly?", "answer": "(1) Evaluate $$f(1)$$ and $$f(2)$$ and show they have opposite signs. (2) State that $$f$$ is **continuous** on $$[1,2]$$. (3) Invoke the **Intermediate Value Theorem** (or equivalent wording: \"by sign change\"). Markers check for the continuity statement explicitly — without it, the IVT doesn't apply.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": true}, {"question": "During interval bisection, after computing $$f(\\text{midpoint})$$, which sub-interval do you keep?", "answer": "Keep the sub-interval where $$f$$ changes sign (one endpoint positive, the other negative). Example: if $$f(1)<0$$, $$f(2)>0$$, and $$f(1.5)>0$$, then sign change is between $$1$$ and $$1.5$$, so root $$\\in [1, 1.5]$$. The root lives wherever the negative and positive values bracket it — not on the side with two same-sign values.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "Common pitfall when differentiating $$f(x) = x^{3/2} + x - 3$$ for Newton–Raphson — what goes missing?", "answer": "The \"$$+1$$\" from differentiating the $$+x$$ term. Wrong: $$f'(x) = \\tfrac32 x^{1/2}$$. Correct: $$f'(x) = \\tfrac32 x^{1/2} + 1$$. This single missing $$+1$$ changes $$f'(1.375)$$ from $$\\approx 2.76$$ to $$\\approx 1.76$$ and the NR estimate becomes drastically wrong. **Always list every term of $$f$$ before differentiating** and tick them off.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "State the Newton–Raphson iteration formula and explain the geometric meaning of each piece.", "answer": "$$x_{n+1} = x_n - \\frac{f(x_n)}{f'(x_n)}$$. Geometrically: from the point $$(x_n, f(x_n))$$ on the curve, draw the **tangent**; $$x_{n+1}$$ is where that tangent crosses the $$x$$-axis. The term $$f(x_n)/f'(x_n)$$ is the horizontal distance from $$x_n$$ to that intercept. Hence NR converges fast near roots where $$f'$$ isn't tiny.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "What's the formula for linear interpolation on $$[a,b]$$ where $$f(a), f(b)$$ have opposite signs?", "answer": "$$\\alpha \\approx a + \\frac{|f(a)|}{|f(a)| + |f(b)|}\\cdot(b-a)$$. Geometrically: this is the $$x$$-intercept of the straight chord through $$(a, f(a))$$ and $$(b, f(b))$$. Partition the interval in the ratio $$|f(a)| : |f(b)|$$ — closer to the endpoint with the smaller $$|f|$$ value.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "Critical detail: in the linear interpolation formula, do you use signed or absolute values of $$f(a), f(b)$$?", "answer": "**Absolute values**. Using signed values would produce a negative or undefined ratio (since one of $$f(a), f(b)$$ is negative). The geometric meaning requires distances, which are always positive. Failure to take $$|\\cdot|$$ is a classic FP1 error.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "Why does Newton–Raphson sometimes converge faster than linear interpolation, but be more fragile?", "answer": "- Step 1: NR uses the **tangent** (local derivative info), giving quadratic convergence near simple roots — error roughly squares per step.\n- Step 2: LI uses the **chord** (two-point secant info), giving slower (superlinear, around $$\\phi \\approx 1.618$$) convergence.\n- Step 3: NR's fragility: if $$f'(x_n)$$ is near zero, the step blows up. LI is robust because it always stays inside a bracketing interval. **Practical rule:** use NR for speed when you're close to the root; use LI/bisection for safety when you're not.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": true}, {"question": "Why must you carry 5+ decimal places when working through a numerical methods question that asks for 3 dp answers?", "answer": "Rounding propagates: rounding to 3 dp at every step compounds error and can shift the final answer by 0.001 or more. Keep at least 2 extra digits of precision internally, round only at the very end. The mark scheme awards based on the final reported answer; intermediate over-rounding can push you outside the mark scheme's tolerance band.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": true}, {"question": "FP1 May 2023 Q8 — given $$y^2 = 8x$$, what are the values of $$a$$, focus, and directrix? What's the common slip?", "answer": "$$y^2 = 4ax$$ with $$4a = 8$$ gives $$a = 2$$, focus $$(2, 0)$$, directrix $$x = -2$$. Common slip: writing $$a = 8$$ by confusing $$y^2 = 4ax$$ with $$y^2 = ax$$. Always solve $$4a = (\\text{coefficient of }x)$$ first.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "For the parabola $$y^2 = 4ax$$, what's the standard parametric point and what's the tangent equation in terms of parameter $$t$$?", "answer": "Point $$(at^2, 2at)$$; tangent equation $$ty = x + at^2$$. Tangent gradient $$= 1/t$$ (from implicit differentiation $$2y\\,y' = 4a \\Rightarrow y' = 2a/y = 2a/(2at) = 1/t$$). Memorise the tangent equation form — it's used in nearly every parabola coordinate-geometry question.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": false}, {"question": "The general theorem: tangents at the two endpoints of a focal chord on parabola $$y^2 = 4ax$$ meet at what locus?", "answer": "They meet on the **directrix** $$x = -a$$. This is a textbook FP1 theorem worth memorising — it gives you the answer to \"where do the tangents meet?\" before you compute. If your algebra produces an $$x$$-coordinate depending on parameters, you've made an error somewhere.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": true}, {"question": "What's the algebraic condition for chord $$PQ$$ with parameters $$p, q$$ on $$y^2 = 4ax$$ to be a focal chord?", "answer": "$$pq = -1$$. (For the parametrisation $$P(ap^2, 2ap)$$ and $$Q(aq^2, 2aq)$$.) In FP1 May 2023 Q8 the parametrisation is $$P(2p^2, 4p)$$ and $$Q(2/p^2, -4/p)$$ — this corresponds to $$q = -1/p$$, so $$pq = -1$$. **Recognise this:** $$q = -1/p$$ is the focal-chord signature.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": true}, {"question": "Common pitfall in FP1 May 2023 Q8: what happens if you misread $$Q = (2/p^2, +4/p)$$ instead of $$(2/p^2, -4/p)$$?", "answer": "Then $$q = +1/p$$, giving $$pq = +1$$, which means $$PQ$$ is **not** a focal chord and won't pass through the focus. The whole question structure collapses — part (b) becomes unprovable. Always check the sign of $$Q$$'s $$y$$-coordinate against the focal-chord condition before starting.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": false}, {"question": "When verifying that chord $$PQ$$ passes through the focus, what's the cleanest method?", "answer": "Substitute the focus coordinates into the equation of the chord and check both sides match. Avoid the messy alternative of comparing slopes (slope $$P$$ to focus vs. focus to $$Q$$), which involves two separate gradient calculations and more chances for sign error.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": false}, {"question": "When intersecting two tangents on a parabola to find $$R$$, why should you keep symbolic factors like $$(p^2+1)$$ visible rather than expanding?", "answer": "Algebra fatigue is the enemy. $$p^2+1$$ is non-zero (it's always positive), so it can be cancelled at the end. Keeping it as a single symbol lets you spot $$\\frac{(p^4-1)}{p} = \\frac{(p^2-1)(p^2+1)}{p}$$ and cancel cleanly. Expand too early and the cancellation becomes invisible. **Rule: factor first, expand last.**", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": true}, {"question": "\"In simplest form\" — for $$R = (-2, 2p - 2/p)$$, why isn't $$\\left(-2, \\frac{2p^2-2}{p}\\right)$$ acceptable?", "answer": "Examiners deduct for unsimplified forms. $$\\frac{2p^2-2}{p} = 2p - \\frac{2}{p}$$ — the second form separates clearly into two terms. The rule of thumb: simplest form means **no compound fractions, no unnecessary factoring, and each component as a sum/difference of simple terms** when possible.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": true}, {"question": "FP1 May 2023 Q9 — for the induction \"prove $$4^n + 6n - 10$$ divisible by 18 for $$n \\geq 2$$\", what's the base case index, and what's the trap?", "answer": "Base case is $$n = 2$$ (the lower bound stated). Trap: students reflexively start at $$n=1$$, but the question explicitly says $$n \\geq 2$$. Always read the lower bound carefully. (Coincidentally $$f(1)=0$$ which is divisible by 18, but using the wrong base case is still a marks-loss for not following the question's stated domain.)", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": false}, {"question": "The cleanest inductive-step strategy for divisibility induction: how do you rewrite $$f(k+1)$$?", "answer": "Express $$f(k+1) = A \\cdot f(k) + B$$, where $$A$$ is an integer and $$B$$ is *explicitly* a multiple of the target modulus. For Q9: $$f(k+1) = 4f(k) + 18(2-k)$$. Then since $$f(k)$$ is divisible by 18 (hypothesis) and $$18(2-k)$$ is trivially divisible by 18, the sum is divisible by 18. The template: **multiplier times hypothesis + obvious-multiple-of-modulus**.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": true}, {"question": "Why is the \"$$f(k+1) - f(k)$$\" approach often *harder* than \"$$f(k+1) = 4f(k) + \\ldots$$\" for divisibility induction?", "answer": "$$f(k+1) - f(k)$$ for $$f(n) = 4^n + 6n - 10$$ gives $$3\\cdot 4^k + 6$$ — which is divisible by 18 only via a modular arithmetic argument ($$4^k \\equiv 4 \\pmod 6$$, so $$3 \\cdot 4^k \\equiv 12 \\pmod{18}$$, then $$+6$$ gives 18). The $$4f(k) + 18(2-k)$$ approach makes divisibility *manifest* algebraically with no modular reasoning. **Manifest divisibility > inferred divisibility** in exam writing.", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": true}, {"question": "What closing sentence is required to earn the final induction mark, and what does it must contain?", "answer": "Standard wording: \"$$f(2)$$ is divisible by 18, and if $$f(k)$$ is divisible by 18 then $$f(k+1)$$ is divisible by 18. Therefore, by the principle of mathematical induction, $$4^n + 6n - 10$$ is divisible by 18 for all integers $$n \\geq 2$$.\" Must contain: (1) base case verified, (2) inductive step verified, (3) explicit invocation of \"principle of mathematical induction\", (4) statement of the result with its domain. Markers tick all four.", "source": "Opus 4.7 ②", "_id": "opus_2_51", "judge_pick": true}, {"question": "Across the FP1 May 2023 paper, what's the unifying meta-strategy connecting Q1, Q3(b), Q5(b), Q8(c), Q9?", "answer": "**Factor early, before substituting numbers.** Q1: pull $$n(n+1)$$ out before scaling. Q3(b): factor $$(x-6)$$ from the known root before solving. Q5(b): factor $$(\\alpha+\\beta)(\\alpha\\beta+1)$$ before substituting $$6$$ and $$3$$. Q8(c): keep $$(p^2+1)$$ symbolic until last-step cancellation. Q9: write $$f(k+1) = 4f(k) + 18(2-k)$$ rather than expanding. The instinct: **wherever a factor will eventually cancel or be needed for structure, keep it symbolic and visible**.", "source": "Opus 4.7 ②", "_id": "opus_2_52", "judge_pick": false}, {"question": "What does \"solutions relying on calculator technology are not acceptable\" mean operationally for paper presentation?", "answer": "Every algebraic step must be shown explicitly. For Q2: show the conjugate-pair quadratic factor, the long division, the surd simplification. For Q6: show the conjugate multiplication, the simultaneous equation setup and elimination. Partial credit is awarded for *working*, not just the final answer. A calculator-derived correct answer with no working scores zero on these flagged questions.", "source": "Opus 4.7 ②", "_id": "opus_2_53", "judge_pick": true}, {"question": "For a 75-mark, 90-minute paper, what's the per-mark time budget and the practical move when stuck?", "answer": "$$90/75 = 1.2$$ minutes per mark. So Q1 (4 marks) → 5 min, Q8 (13 marks) → 15 min. **Stuck rule: if you've spent 2+ minutes without writing anything, move on.** Come back at the end with fresh eyes. Time wasted in one question is marks lost elsewhere.", "source": "Opus 4.7 ②", "_id": "opus_2_54", "judge_pick": false}, {"question": "When the question says \"give your answer in the form $$px^2 + qx + r = 0$$ where $$p,q,r$$ are integers,\" what mistake is most costly?", "answer": "Leaving fractions in the final answer. The phrasing is an *instruction*, not a hint. Always clear fractions (multiply by LCM of denominators) and state $$p, q, r$$ explicitly. Examiners specifically deduct for \"form not matching the requested integer coefficients.\"", "source": "Opus 4.7 ②", "_id": "opus_2_55", "judge_pick": true}], "count": 56}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 16633, "out_tokens": 10749, "reasoning_chars": 1993, "cost_eur": 0.0507, "elapsed_s": 318, "content_chars": 33397}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 16633, "out_tokens": 27829, "reasoning_chars": 7060, "cost_eur": 0.1057, "elapsed_s": 483, "content_chars": 78169}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 16633, "out_tokens": 10734, "reasoning_chars": 11387, "cost_eur": 0.0506, "elapsed_s": 268, "content_chars": 25272}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 15708, "out_tokens": 12553, "reasoning_chars": 3983, "cost_eur": 0.0156, "elapsed_s": 133, "content_chars": 36596}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.8, "in_tokens": 15708, "out_tokens": 8250, "reasoning_chars": 3558, "cost_eur": 0.0112, "elapsed_s": 79, "content_chars": 21585}, "opus_1": {"run": 1, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 24270, "out_tokens": 14865, "reasoning_chars": 0, "cost_eur": 1.3606, "elapsed_s": 187, "content_chars": 30252}, "opus_2": {"run": 2, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 24270, "out_tokens": 15552, "reasoning_chars": 0, "cost_eur": 1.408, "elapsed_s": 199, "content_chars": 32172}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.7, "in_tokens": 16995, "out_tokens": 4407, "reasoning_   const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
