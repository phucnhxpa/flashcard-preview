<script>
const DATA={"selected": [{"question": "S1 May 2023 Q5(e) - Why is $ \\text{Var}(X) = 4 \\cdot \\text{Var}(Y) $ when $ X = 15 - 2Y $? (2 steps)", "answer": "- Step 1: Variance is invariant under shifts (15 is irrelevant).  \n- Step 2: Scaling by -2 squares: $ \\text{Var}(-2Y) = (-2)^2 \\cdot \\text{Var}(Y) = 4 \\cdot \\text{Var}(Y) $.\n\n**Error to avoid:** Using -2 or 2 instead of 4 as the multiplier.", "source": "Qwen 3 ②", "_id": "qwen_2_4"}, {"question": "Given $$P(J > d) = 0.9192$$ with $$J \\sim N(500, 25^2)$$, what's the sign of $$z$$ and why?", "answer": "- Step 1: $$P(J > d) > 0.5$$ means more than half the distribution lies above $$d$$, so $$d$$ is **below** the mean.\n- Step 2: Therefore the standardised $$z = (d - 500)/25$$ is **negative**.\n- Step 3: Convert to lower tail: $$P(J \\le d) = 1 - 0.9192 = 0.0808$$, and by symmetry $$\\Phi(-z) = 0.9192 \\Rightarrow -z = 1.40 \\Rightarrow z = -1.40$$.", "source": "Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "S1 May 2023 Q1 — When a histogram question asks for the frequency in a range that spans multiple bars (like 22 to 45 km), what is the systematic approach? (3 steps)", "answer": "- Step 1: Identify which bars the range crosses. For $$[22, 45)$$: it crosses $$[20,30)$$, $$[30,40)$$, and $$[40,50)$$.\n- Step 2: For each bar, determine if it's a full bar or a partial slice. $$[22,30)$$ is partial (width 8), $$[30,40)$$ is full (width 10), $$[40,45)$$ is partial (width 5).\n- Step 3: Compute each separately: $$8 \\times 7 = 56$$, $$10 \\times 10 = 100$$, $$5 \\times 3 = 15$$. Sum: 171. Never treat partial bars as full bars.\n\nTakeaway: Slice-by-slice: identify → full or partial → FD × width → sum.", "source": "GLM 5.1 ②", "_id": "glm_2_50"}, {"question": "What is the critical difference between $$P(C \\mid R)$$ and $$P(R \\mid C)$$, and which formula do you write down first when asked for $$P(C \\mid R)$$? (2 steps)", "answer": "- Step 1: They are **not interchangeable**. $$P(R \\mid C) = 0.06$$ is given in the question (6% of C-labeled counters are red). $$P(C \\mid R)$$ asks: given that a counter IS red, what's the probability it came from category C? This is a completely different quantity — approximately 0.385.\n- Step 2: Write down the **Bayes formula** before substituting any numbers: $$P(C \\mid R) = \\frac{P(C) \\cdot P(R \\mid C)}{P(R)} = \\frac{0.25 \\times 0.06}{0.039}$$. The formula structure prevents you from accidentally quoting $$P(R \\mid C) = 0.06$$ as the answer. Examiners award method marks for writing the formula.\n\nThis is flagged as **Medium severity** — \"Rewrite Bayes formula at top of every script\" is the recommended drill.", "source": "GLM 5.1 ③", "_id": "glm_3_18"}, {"question": "In Q3(c), the question asks for the maximum number of salmon with weights in 4600 < w ≤ 7700. Why can't you interpolate using the box plot? (2 steps)", "answer": "- Step 1: A box plot only shows the five-number summary (min, Q1, median, Q3, max). It tells you nothing about how data are distributed within the box.\n- Step 2: Since 4600 > median (4000), all values in (4600, 7700] must lie in the upper half of the data. With n = 81, at most floor(81/2) = 40 values can lie strictly above the median. This is a counting bound, not an interpolation.\n\n**Key insight:** Use the median position to bound counts, not the box plot's internal structure.", "source": "MiniMax ②", "_id": "minimax_2_15"}, {"question": "S1 May 2023 Q1(c) — When estimating the mean from a histogram, why is the formula $$\\bar x = \\frac{\\sum f x_{\\text{mid}}}{\\sum f}$$ only an estimate, and what assumption does it rely on? (3 steps)", "answer": "- Step 1: It is an estimate because the raw data have been grouped; the individual values within each class are unknown.\n- Step 2: Using midpoints assumes observations are uniformly distributed across each class interval, so the class mean equals the midpoint.\n- Step 3: If data are skewed within a class, the midpoint misrepresents the true class mean and introduces grouping error.", "source": "Kimi K2.6 ②", "_id": "kimi_2_61"}, {"question": "When finding the probability that all 5 independent bags yield less than 510 ml (given $$P(J < 510) = 0.6554$$ for one bag), what operation do you perform, and what is the common wrong alternative? (2 steps)", "answer": "- Step 1: Since the bags are **independent**, $$P(\\text{all 5} < 510) = (0.6554)^5 = 0.121$$. Independence means you multiply the probabilities for each bag.\n- Step 2: The common error is **multiplying by 5** instead of raising to the 5th power: $$5 \\times 0.6554 = 3.277$$, which is a probability greater than 1 — obviously wrong. The key distinction: \"each of 5 independent events\" → raise to a power; \"expected number out of 5\" → multiply by 5.", "source": "GLM 5.1 ③", "_id": "glm_3_28"}, {"question": "When solving the two-equation normal system in Q7(c), after finding $$k = 42.2$$ and $$r = 476$$, what specific numerical checks do you perform? (2 steps)", "answer": "- Step 1: Check equation 1: $$(476 - 520)/42.2 = -44/42.2 = -1.043$$... wait, let me be more precise. $$(476.25 - 520)/42.22 = -43.75/42.22 = -1.036$$ ✓ (matches $$z = -1.0364$$ for the 0.15 lower tail).\n- Step 2: Check equation 2: $$(3 \\times 476.25 - 800 - 520)/42.22 = (1428.75 - 1320)/42.22 = 108.75/42.22 = 2.576$$ ✓ (matches $$z = 2.5758$$ for the 0.005 upper tail). Both checks confirm the solution is consistent with the original probability statements.", "source": "GLM 5.1 ③", "_id": "glm_3_52"}, {"question": "In Q5(d), the inequality $$Y \\leq X$$ with $$X = 15 - 2Y$$ simplifies to $$Y \\leq 5$$. What is the full algebraic working? (3 steps)", "answer": "- Step 1: Substitute $$X = 15 - 2Y$$: $$Y \\leq 15 - 2Y$$.\n- Step 2: Add $$2Y$$ to both sides: $$3Y \\leq 15$$.\n- Step 3: Divide by 3: $$Y \\leq 5$$.\n\nThen $$P(Y \\leq 5) = 1 - P(Y = 6) = 1 - 1/30 = 29/30$$. Three clean lines of algebra — no enumeration of joint probabilities needed.", "source": "GLM 5.1 ①", "_id": "glm_1_75"}, {"question": "When $$B$$ and $$C$$ are independent with $$P(B) = 0.18$$ and $$P(C) = 0.50$$, how do you find $$P(B \\cap C)$$, and what is the common wrong alternative? (2 steps)", "answer": "- Step 1: By independence: $$P(B \\cap C) = P(B) \\cdot P(C) = 0.18 \\times 0.5 = 0.09$$. This is the defining property of independence — the joint probability equals the product of marginals.\n- Step 2: The common wrong alternative: setting $$P(B \\cap C) = 0$$ because an earlier part of the question involved mutually exclusive events ($$A$$ and $$C$$). The student carries the mutual exclusivity concept over to $$B$$ and $$C$$, even though the question explicitly states $$B$$ and $$C$$ are **independent**, not mutually exclusive. These are completely different conditions.", "source": "GLM 5.1 ③", "_id": "glm_3_25"}, {"question": "In a two-equation normal system (e.g. $$P(R < r) = 0.15$$ and $$P(R > 3r - 800) = 0.005$$ with $$R \\sim N(520, k^2)$$), what is the algebraic strategy before substituting any numbers? (3 steps)", "answer": "- Step 1: Convert each probability statement to a $$z$$-equation. For $$P(R < r) = 0.15$$ (lower tail < 0.5, so $$z < 0$$): $$\\frac{r - 520}{k} = -1.0364$$. For $$P(R > 3r - 800) = 0.005$$ (upper tail < 0.5, so $$z > 0$$): $$\\frac{3r - 1320}{k} = 2.5758$$.\n- Step 2: Rearrange **both** equations to the form $$r = \\ldots k$$: Equation 1 gives $$r = 520 - 1.0364k$$. Equation 2 gives $$r = 440 + 0.8586k$$.\n- Step 3: **Equate** the two expressions for $$r$$: $$520 - 1.0364k = 440 + 0.8586k$$, giving $$80 = 1.895k$$, so $$k = 42.2$$. Then substitute back for $$r$$. This \"both to $$r = \\ldots k$$, then equate\" strategy avoids messy elimination and makes sign errors far less likely.", "source": "GLM 5.1 ③", "_id": "glm_3_29"}, {"question": "Why does the PMCC remain unchanged under positive linear coding? Give the intuitive geometric explanation. (2 steps)", "answer": "- Step 1: The PMCC measures the **tightness of linear clustering** in a scatter plot. Positive linear coding (shifting and/or positively scaling the axes) moves and stretches the scatter cloud but does not change its *shape* or *tilt* — points that were tightly clustered around a line remain tightly clustered.\n- Step 2: A negative scale factor would **flip** the cloud (e.g. reversing one axis), which changes the direction of correlation (positive ↔ negative) but not its magnitude. So $$r$$ changes sign under negative scaling but is fully invariant under positive linear coding. This is why $$r_{xy} = r_{tw} = 0.827$$ in Q2(f).", "source": "GLM 5.1 ③", "_id": "glm_3_48"}, {"question": "S1 May 2023 Q7(a)(ii) — find $$d$$ such that $$P(J > d) = 0.9192$$. What's the SIGN trap, and how does sketching prevent it?", "answer": "- Step 1: $$P(J > d) = 0.9192 > 0.5$$, which means $$d$$ must lie BELOW the mean (because most of the distribution is above $$d$$).\n- Step 2: Sketching the standard normal and shading the right tail with area 0.9192 shows $$d$$ is to the LEFT of $$\\mu$$, so $$z$$ is NEGATIVE.\n- Step 3: Look up $$\\Phi(-z) = 0.9192$$ → $$-z = 1.40$$ → $$z = -1.40$$, then $$d = 500 + (-1.40)(25) = 465$$.\n\nWithout the sketch, students grab $$z = +1.40$$ from the table and get $$d = 535$$ — wrong side of the mean. ALWAYS sketch first.", "source": "Opus 4.7 ②", "_id": "opus_2_33"}, {"question": "Why are $$P(C \\mid R)$$ and $$P(R \\mid C)$$ not interchangeable? Give a concrete intuition. (2 steps)", "answer": "- Step 1: $$P(R \\mid C)$$ = \"probability of being red, **among the C's**\" — this is given as 0.06. $$P(C \\mid R)$$ = \"probability of being C, **among the reds**\" — this is what the question asks for.\n- Step 2: These are different populations. If C is rare (only 25% of counters) but has a high red rate (6%), then among all reds, C might still be a minority. The answer $$P(C \\mid R) = 0.385$$ is much larger than 0.06 because the denominator $$P(R) = 0.039$$ is small.\n\nAlways draw the formula first — the numerator and denominator are different quantities.", "source": "GLM 5.1 ①", "_id": "glm_1_21"}, {"question": "S1 May 2023 Q7 — What is the standardisation formula for a normal variable $$X \\sim N(\\mu, \\sigma^2)$$, and what does converting to $$Z \\sim N(0,1)$$ achieve? (2 steps)", "answer": "- Step 1: $$Z = \\frac{X - \\mu}{\\sigma}$$.\n- Step 2: This linear transformation recentres the distribution at 0 and rescales its spread so the standard deviation is 1. It allows any normal probability to be looked up using a single standard normal table because areas under the curve are preserved.", "source": "Kimi K2.6 ②", "_id": "kimi_2_42"}, {"question": "S1 May 2023 Q6(b) — To show that $$P(B) = 0.18$$, what two probability rules must be combined, and in what order should they be applied? (3 steps)", "answer": "- Step 1: First use the conditional probability definition to find the intersection: $$P(A \\cap B) = P(A)\\,P(B \\mid A) = 0.1 \\times 0.3 = 0.03$$.\n- Step 2: Then apply inclusion–exclusion to the union: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$.\n- Step 3: Rearrange for $$P(B)$$: $$P(B) = P(A \\cup B) - P(A) + P(A \\cap B) = 0.25 - 0.1 + 0.03 = 0.18$$. Writing both formulas before substituting secures method marks.", "source": "Kimi K2.6 ①", "_id": "kimi_1_28"}, {"question": "For a \"show that\" question with a printed answer (e.g. $$k = 1/30$$), what's the strategic risk if you spot the answer too early?", "answer": "- Step 1: The risk: writing \"$$30k = 1$$ so $$k = 1/30$$\" without showing **how** you got $$30k$$ in the first place.\n- Step 2: The marker needs to see your pmf tabulation summing each individual term: $$2k + k + k + 8k + 17k + k$$.\n- Step 3: Strategy: always show the **full sum** explicitly, then equate to 1, then conclude — never skip the tabulation step even if you can see the answer.", "source": "Opus 4.7 ①", "_id": "opus_1_39"}, {"question": "S1 May 2023 Q2(e) — Why is extrapolation unreliable even when the correlation coefficient is strong, and what additional check makes the unreliability undeniable in the mouse-tail context? (2 steps)", "answer": "- Step 1: A strong PMCC only certifies linearity within the observed data range. Outside that range, the biological or physical process may follow a different curve, or natural limits (such as non-negative weight) may dominate. Correlation is not a licence to extend forever.\n- Step 2: The decisive check is substituting the extrapolated value into the regression equation. Here, $$t = 2$$ cm predicts $$w \\approx -7.16$$ g. Because weight cannot be negative, the model is physically impossible at that tail length, proving extrapolation invalid regardless of how good the fit is within the sample.", "source": "Kimi K2.6 ①", "_id": "kimi_1_44"}, {"question": "S1 May 2023 Q1, Q3 — Why is the grouped-data median position $$n/2$$, whereas for a discrete ordered list of $$n$$ values the position is $$(n+1)/2$$? (2 steps)", "answer": "- Step 1: In grouped continuous data, the median is an interpolated point inside a class interval; we are not picking an actual data point but estimating a boundary-splitting value. The interpolation formula uses $$n/2$$ as the target cumulative frequency because the continuous uniform-distribution assumption spreads values smoothly across the interval.\n- Step 2: For a discrete ordered list, $$(n+1)/2$$ identifies the actual middle item (or averages the two central items when $$n$$ is even). Using $$(n+1)/2$$ for grouped data would bias the interpolation slightly upward and is not accepted by the mark scheme.", "source": "Kimi K2.6 ①", "_id": "kimi_1_38"}, {"question": "When a discrete random variable has a piecewise probability function like $$P(Y=y) = k(3-y)$$ for $$y = 1, 2$$, why must you tabulate the numerical values before summing, rather than working with the algebraic form? (2 steps)", "answer": "- Step 1: Evaluate each value explicitly: $$P(Y=1) = k(3-1) = 2k$$, $$P(Y=2) = k(3-2) = k$$. The common sign error is writing $$k(y-3)$$ instead of $$k(3-y)$$, which gives $$P(Y=1) = -2k$$ — a **negative probability**, which is impossible.\n- Step 2: Tabulating forces you to check that every $$P(Y=y) \\ge 0$$ before summing. If any entry is negative, you've made a sign error. Then sum: $$2k + k + k + 8k + 17k + k = 30k = 1$$, giving $$k = 1/30$$.\n\nThe table also makes subsequent calculations ($$E(Y)$$, $$E(Y^2)$$) far less error-prone than working with the algebraic piecewise form.", "source": "GLM 5.1 ③", "_id": "glm_3_19"}, {"question": "S1 May 2023 Q7(c) — two-equation normal system in $$r$$ and $$k$$. What's the algebraic strategy that avoids substitution mistakes?", "answer": "- Step 1: Translate EACH probability statement into a $$z$$-equation separately, with the correct sign of $$z$$ (sketch each tail first).\n- Step 2: REARRANGE both equations into the form $$r = (\\text{constant}) + (\\text{coefficient}) \\cdot k$$.\n- Step 3: EQUATE the two RHS expressions and solve for $$k$$ first, then back-substitute to find $$r$$.\n\nDoing algebra BEFORE numbers (i.e. getting both into $$r = \\ldots k$$ form) avoids fractional arithmetic with mixed signs and unknowns in the denominator. Then VERIFY by substituting $$(r, k)$$ back into both original probability statements.", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "Why does the percentage-point table give $$z = 2.5758$$ for the upper tail of 0.005, when the body table would round it to 2.58?", "answer": "- Step 1: The body table $$\\Phi(z)$$ is tabulated at fixed $$z$$-values (typically 2 d.p.) and gives the cumulative probability. To invert it for a target probability, you read off the closest $$z$$, which may not be exact.\n- Step 2: The percentage-point table inverts this — it's tabulated AT fixed (tail) probabilities (0.05, 0.025, 0.01, 0.005) and gives the EXACT $$z$$ to 4 d.p.\n- Step 3: For a target like 0.005 that is one of the entries, the percentage-point table gives $$z = 2.5758$$ — more precise than the body-table approximation 2.58.\n\nUsing 2.58 in a two-equation system causes enough drift to miss a \"show that\" or final answer. Always use the percentage-point table for tidy tail probabilities.", "source": "Opus 4.7 ②", "_id": "opus_2_43"}, {"question": "S1 May 2023 Q5(e) — What is the formula for $$\\text{Var}(aY + b)$$, and what are the two most common errors? (2 steps)", "answer": "- Step 1: $$\\text{Var}(aY + b) = a^2\\,\\text{Var}(Y).$$ The constant $$b$$ drops (shifting doesn't change spread), and the coefficient $$a$$ is **squared**.\n- Step 2: The two common errors: (1) Writing $$\\text{Var}(15 - 2Y) = -2\\,\\text{Var}(Y)$$ — the sign is lost when squaring, so it's $$(-2)^2 = +4.$$ (2) Writing $$\\text{Var}(15 - 2Y) = 2\\,\\text{Var}(Y)$$ — forgetting to square the coefficient. For Q5: $$\\text{Var}(X) = 4 \\times \\frac{61}{45} = \\frac{244}{45} \\approx 5.42.$$\n\nTakeaway: The variance multiplier is always **positive** (it's $$a^2$$), and the constant always **drops**.", "source": "GLM 5.1 ②", "_id": "glm_2_24"}, {"question": "S1 May 2023 Q5 — When a discrete RV transformation is given as $$X = 15 - 2Y$$, why does the expectation formula $$E(aY+b) = aE(Y)+b$$ use $$a = -2$$ and $$b = 15$$ directly, while the variance formula discards the 15? (2 steps)", "answer": "- Step 1: Expectation is linear, so both scaling and shifting pass through: $$E(15 - 2Y) = 15 - 2E(Y)$$. The shift 15 moves the centre of the distribution and therefore affects the mean.\n- Step 2: Variance measures spread around the mean. Adding 15 shifts every data point and the mean by the same amount, leaving deviations unchanged. Hence $$\\mathrm{Var}(15 - 2Y) = (-2)^2\\mathrm{Var}(Y) = 4\\mathrm{Var}(Y)$$. The 15 vanishes because translation does not alter spread.", "source": "Kimi K2.6 ①", "_id": "kimi_1_41"}, {"question": "What's the trigger phrase that forces you to use Bayes' theorem rather than direct conditional probability?", "answer": "- Step 1: Trigger: \"**Given that** [observed effect], find $$P$$([cause])\" — when the *condition* is the effect and you want the *cause*.\n- Step 2: Example: \"Given the counter is red, find $$P(\\text{labelled C})$$\" — you have $$P(R\\mid C)$$ from the tree, but you want $$P(C\\mid R)$$ — these are different, so Bayes is needed.\n- Step 3: Before substituting numbers, **write down** $$P(C \\mid R) = \\frac{P(C) \\cdot P(R \\mid C)}{P(R)}$$ — this earns the method mark even if arithmetic slips.", "source": "Opus 4.7 ①", "_id": "opus_1_18"}, {"question": "S1 May 2023 Q7(a)(ii) — When $$P(J > d) = 0.9192$$ (more than 0.5), what does this tell you about the position of $$d$$ relative to the mean, and how do you find the correct $$z$$-value? (3 steps)", "answer": "- Step 1: If $$P(J > d) = 0.9192 > 0.5,$$ then more than half the distribution lies above $$d.$$ This means $$d$$ is **below the mean** — it's in the lower tail.\n- Step 2: Convert to a lower-tail probability: $$P(J \\le d) = 1 - 0.9192 = 0.0808.$$ Since this is less than 0.5, $$z$$ is negative.\n- Step 3: Look up: $$\\Phi(-z) = 0.9192$$ gives $$-z = 1.40,$$ so $$z = -1.40.$$ Then $$d = 500 + (-1.40)(25) = 465.$$ The classic error is using $$z = +1.40$$ and getting $$d = 535.$$\n\nTakeaway: If the upper-tail probability exceeds 0.5, the value is below the mean and $$z$$ is negative.", "source": "GLM 5.1 ②", "_id": "glm_2_35"}, {"question": "When you see \"find $$P(\\text{event for each of 5 independent bags})$$\", what's the operation you apply, and why?", "answer": "- Step 1: For \"EACH of 5 independent bags\" satisfying the event, multiply the individual probability by itself 5 times: $$p^5$$, where $$p = P(\\text{event for one bag})$$.\n- Step 2: Independence is the KEY assumption that allows multiplication: $$P(\\text{all 5}) = \\prod_{i=1}^5 P(\\text{bag } i) = p^5$$.\n- Step 3: Common pitfall: multiplying by 5 (giving $$5p$$) instead of raising to the 5th power. Multiplying by 5 is what you'd do for an EXPECTATION (number of \"successes\" out of 5), not a joint probability.\n\nAlways state \"since the bags are independent...\" before raising to a power — it's the assumption that justifies the step.", "source": "Opus 4.7 ②", "_id": "opus_2_34"}, {"question": "S1 May 2023 Q5(e) — Why does the constant $$b$$ disappear in $$\\text{Var}(aY + b) = a^2\\,\\text{Var}(Y)$$, while the coefficient $$a$$ gets squared? (2 steps)", "answer": "- Step 1: Variance measures **spread** (how far values are from their mean). Adding a constant $$b$$ shifts every value by the same amount — the mean shifts, but the distances between values don't change. So spread is unchanged.\n- Step 2: Multiplying by $$a$$ stretches the scale. If every value is twice as far from zero, then every deviation from the mean is also twice as large. Since variance is the mean of squared deviations, each deviation is multiplied by $$a,$$ so squared deviations are multiplied by $$a^2.$$\n\nTakeaway: Shifts don't affect spread; scaling affects spread by the square of the scale factor.", "source": "GLM 5.1 ②", "_id": "glm_2_25"}, {"question": "What does it mean for the PMCC to be \"dimensionless\", and why does this imply that doubling all weights doesn't change $$r$$? (2 steps)", "answer": "- Step 1: Dimensionless means $$r$$ has **no units** — it's a pure number between −1 and 1. It measures the *pattern* of association, not the *scale* of the variables. If weight is in grams or kilograms, $$r$$ is the same.\n- Step 2: Doubling all weights is a positive linear transformation ($$w \\to 2w$$). Since $$r$$ is invariant under positive linear coding, $$r$$ doesn't change. The scatter plot stretches vertically by a factor of 2, but the linear pattern (tightness of clustering around the line) is identical. This is why Q2(f) gives $$r_{xy} = r_{tw}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_62"}, {"question": "In Q5, the formula $$P(Y=y) = k(3-y)$$ applies for $$y=1,2$$. What hidden check must you perform on each piece of a piecewise pmf, and what would a negative probability imply? (2 steps)", "answer": "- Step 1: Every evaluated probability must be non-negative. For $$y=1$$ this gives $$2k$$; for $$y=2$$ this gives $$k$$.\n- Step 2: If any piece yielded a negative expression, the probability would be negative, which is impossible. Spotting this signals either a wrong formula or that $$k$$ would have to be negative, violating probability axioms.", "source": "Kimi K2.6 ②", "_id": "kimi_2_28"}, {"question": "S1 May 2023 Q3(b) — The coding is $$x = l - 600$$. Why is $$\\mathrm{Var}(l)$$ exactly equal to $$\\mathrm{Var}(x)$$, and what is the intuitive reason a shift does not affect spread? (2 steps)", "answer": "- Step 1: $$\\mathrm{Var}(X + a) = \\mathrm{Var}(X)$$ because variance depends on squared deviations $$(x_i - \\bar x)^2$$. Adding $$a$$ to every observation also adds $$a$$ to the mean, so the deviations cancel.\n- Step 2: Intuitively, sliding every data point 600 units to the right moves the entire distribution rigidly without stretching or compressing it. Spread depends on distances between points, not on absolute location.", "source": "Kimi K2.6 ②", "_id": "kimi_2_18"}, {"question": "S1 May 2023 Q1(c) — When estimating the mean from a grouped frequency table or histogram, why must you use midpoints rather than class boundaries, and what happens if you use boundaries instead? (3 steps)", "answer": "- Step 1: The formula $$\\bar x = \\sum f x / \\sum f$$ needs a single representative value for each class.\n- Step 2: The midpoint assumes observations are spread uniformly throughout the class, which is the standard grouped-data approximation.\n- Step 3: Using a boundary treats every observation as clustered at one edge, biasing the mean systematically toward that edge and producing a significantly wrong estimate.", "source": "Kimi K2.6 ②", "_id": "kimi_2_6"}, {"question": "S1 May 2023 Q7(c) — When setting up a two-equation system from two normal probability statements, what algebraic strategy should you use before substituting numbers? (3 steps)", "answer": "- Step 1: Convert each probability statement to a $$z$$-equation. For $$P(R < r) = 0.15$$: $$\\frac{r - 520}{k} = z_1.$$ For $$P(R > 3r - 800) = 0.005$$: $$\\frac{3r - 800 - 520}{k} = z_2.$$\n- Step 2: **Rearrange both equations to the form $$r = \\ldots k$$** before equating. This makes the algebra clean: $$r = 520 + z_1 k$$ and $$r = 440 + \\frac{z_2}{3}k.$$\n- Step 3: Equate the two expressions for $$r$$ and solve for $$k,$$ then back-substitute for $$r.$$ Verify by substituting both values back into the original probability statements.\n\nTakeaway: Both equations → $$r = \\ldots k$$ form → equate → solve → verify.", "source": "GLM 5.1 ②", "_id": "glm_2_37"}, {"question": "When asked to find $$P(Y \\le X)$$ where $$X = 15 - 2Y$$ is a deterministic function of $$Y$$, why is it wrong to treat $$X$$ and $$Y$$ as independent, and what do you do instead? (3 steps)", "answer": "- Step 1: $$X$$ is a **deterministic function** of $$Y$$ — knowing $$Y$$ completely determines $$X$$. They are perfectly (negatively) correlated, not independent. Treating them as independent and summing $$P(Y=y)P(X=x)$$ is fundamentally wrong.\n- Step 2: Substitute the relationship: $$Y \\le X$$ becomes $$Y \\le 15 - 2Y$$. This is an inequality in a **single variable** $$Y$$.\n- Step 3: Solve algebraically: $$3Y \\le 15 \\Rightarrow Y \\le 5$$. Then $$P(Y \\le 5) = 1 - P(Y = 6) = 1 - 1/30 = 29/30$$. Three lines of algebra replace an entire enumeration.\n\nThe pitfall: trying to enumerate joint $$(Y, X)$$ pairs. Since $$X$$ is not a separate random variable, this approach is meaningless.", "source": "GLM 5.1 ③", "_id": "glm_3_20"}, {"question": "Why can two events with positive probability never be both mutually exclusive and independent? (3 steps)", "answer": "- Step 1: Mutual exclusivity demands $$P(A \\cap C) = 0$$. Independence demands $$P(A \\cap C) = P(A)P(C)$$.\n- Step 2: If both hold and $$P(A), P(C) > 0$$, then $$0 = P(A)P(C) > 0$$, a contradiction.\n- Step 3: Therefore, mutually exclusive events with positive probability are automatically dependent: knowing one occurred tells you the other definitely did not.", "source": "Kimi K2.6 ②", "_id": "kimi_2_35"}, {"question": "S1 May 2023 Q2(f) — data are coded $$x = t - 6$$ and $$y = w/2 - 5$$. What happens to the PMCC under this coding, and WHY?", "answer": "- Step 1: PMCC is INVARIANT under positive linear coding, so $$r_{xy} = r_{tw} = 0.827$$.\n- Step 2: Intuition: PMCC measures the STRENGTH and DIRECTION of linear association, both of which are preserved when you shift (adds a constant) or scale POSITIVELY (multiplies by a positive number).\n- Step 3: Scope: if either scale factor were negative (e.g. $$y = 5 - w/2$$), the SIGN of $$r$$ would flip, though the magnitude stays the same.\n\nThe rule: positive linear coding preserves $$r$$ completely; negative coding flips the sign only.", "source": "Opus 4.7 ②", "_id": "opus_2_10"}, {"question": "S1 May 2023 Q3(c) — box plot has median = 4000. Question asks for the MAX number of salmon in $$4600 < w \\le 7700$$ (with $$n = 81$$). What's the conceptual trick?", "answer": "- Step 1: Recognise this is NOT an interpolation question — it's a COUNTING-via-definition question.\n- Step 2: Since $$4600 > 4000 = $$ median, every value in $$(4600, 7700]$$ lies strictly above the median.\n- Step 3: By the definition of the median with $$n = 81$$ (odd), at most $$\\lfloor 81/2 \\rfloor = 40$$ values can lie strictly above the median.\n\nMisapplication: trying to interpolate inside the upper-half \"box\" via $$(Q_3 - 4600)/\\text{width}$$. The box plot doesn't give enough info for that — only the QUARTILE COUNTS are knowable.", "source": "Opus 4.7 ②", "_id": "opus_2_16"}, {"question": "When filling a three-set Venn diagram, what order should you fill the regions, and why? (3 steps)", "answer": "- Step 1: Start from the **centre outward**: first the triple intersection $$A \\cap B \\cap C$$, then the three double-only regions ($$A \\cap B$$ only, $$A \\cap C$$ only, $$B \\cap C$$ only), then the three single-only regions ($$A$$ only, $$B$$ only, $$C$$ only), then the outside.\n- Step 2: The reason: each outer region is computed by subtraction. For example, \"$$A$$ only\" = $$P(A) - P(A \\cap B \\text{ only}) - P(A \\cap C \\text{ only}) - P(A \\cap B \\cap C)$$. If you haven't filled the inner regions first, you can't compute the outer ones.\n- Step 3: Always check that all eight regions sum to 1 at the end. Write the check on your script — it catches arithmetic slips and the common error of forgetting the outside region.", "source": "GLM 5.1 ③", "_id": "glm_3_23"}, {"question": "S1 May 2023 Q5(d): $$X = 15 - 2Y$$, find $$P(Y \\le X)$$. What's the KEY INSIGHT that prevents over-complicating?", "answer": "- Step 1: Recognise $$X$$ is a DETERMINISTIC FUNCTION of $$Y$$ — they are perfectly dependent, NOT independent.\n- Step 2: Substitute the definition of $$X$$ directly into the inequality: $$Y \\le 15 - 2Y$$, which gives $$3Y \\le 15$$, so $$Y \\le 5$$.\n- Step 3: Then $$P(Y \\le X) = P(Y \\le 5) = 1 - P(Y = 6)$$.\n\nMisapplication: trying to enumerate joint $$(Y, X)$$ pairs as if they were independent — wastes time and gives a wrong answer.", "source": "Opus 4.7 ②", "_id": "opus_2_24"}, {"question": "What is the most common sign error students make when computing $$\\mathrm{Var}(15 - 2Y)$$, and why is $$\\mathrm{Var}(-2Y)$$ actually positive? (2 steps)", "answer": "- Step 1: Students write $$-2\\,\\mathrm{Var}(Y)$$ or forget to square, producing a negative or wrong multiplier. The correct multiplier is $$(-2)^2 = +4$$.\n- Step 2: Variance is always non-negative because it squares all deviations. Flipping the direction of the variable (negative scale) does not create negative spread; reflection preserves distances.", "source": "Kimi K2.6 ②", "_id": "kimi_2_32"}, {"question": "S1 May 2023 Q2(g) — What is the strategic shortcut for finding the regression line of coded $$y$$ on coded $$x$$, and why is recomputing $$S_{xy}, S_{xx}$$ from the coded data the wrong approach? (3 steps)", "answer": "- Step 1: Substitute the inverse coding relations into the original regression equation. From $$x = t-6$$ and $$y = \\frac{w}{2} - 5$$, invert to $$t = x+6$$ and $$w = 2(y+5)$$.\n- Step 2: Insert these into the known line $$w = -16.7 + 4.77t$$, yielding $$2(y+5) = -16.7 + 4.77(x+6)$$. The question deliberately says “you do not need to simplify” — take the hint and stop there.\n- Step 3: Recomputing from scratch ignores the structural fact that coding preserves the linear relationship; it also introduces unnecessary rounding error and costs 3–4 minutes of exam time.", "source": "Kimi K2.6 ①", "_id": "kimi_1_11"}, {"question": "When a histogram question asks for the number of people in a range that slices *partially* through a class (e.g. [22, 45) spanning parts of three bars), what is the key strategy for each partial bar? (2 steps)", "answer": "- Step 1: Identify the slice width within that bar. For example, [22, 30) has width 8 (not 10), and [40, 45) has width 5 (not 10).\n- Step 2: Apply $$f = \\text{FD} \\times \\text{slice width}$$ — the same FD as the full bar, but multiplied by the *sub-width*, not the full class width. E.g. $$f_{[22,30)} = 7 \\times 8 = 56$$, $$f_{[40,45)} = 3 \\times 5 = 15$$.\n\nThe pitfall: treating partial bars as full bars (e.g. using width 10 instead of 8) loses both accuracy and marks. Every shaded rectangle = FD × its slice width.", "source": "GLM 5.1 ③", "_id": "glm_3_1"}, {"question": "S1 May 2023 Q3(b) — Derive intuitively why $$\\mathrm{Var}(X + a) = \\mathrm{Var}(X)$$ for any constant $$a$$, using the definition of variance in terms of deviations from the mean. (2 steps)", "answer": "- Step 1: Recall that $$\\mathrm{Var}(X) = E\\left[(X - \\mu_X)^2\\right]$$. If $$Y = X + a$$, then the new mean is $$\\mu_Y = \\mu_X + a$$ by linearity of expectation.\n- Step 2: The deviation of any value from the new mean is $$(X + a) - (\\mu_X + a) = X - \\mu_X$$, identical to the original deviation. Since every squared deviation is unchanged, the average of them — the variance — is identical: $$\\mathrm{Var}(Y) = E\\left[(X - \\mu_X)^2\\right] = \\mathrm{Var}(X)$$. Adding 600 mm shifts the distribution but does not stretch it.", "source": "Kimi K2.6 ①", "_id": "kimi_1_14"}, {"question": "In a tree-diagram Bayes question, why is $$P(C \\mid R)$$ fundamentally different from $$P(R \\mid C)$$, and what does $$0.06$$ represent in the Q4 context? (3 steps)", "answer": "- Step 1: $$P(R \\mid C) = 0.06$$ is the forward conditional: given that a counter is labelled C, the probability it is red.\n- Step 2: $$P(C \\mid R)$$ is the reverse conditional: given that a randomly selected counter is red, the probability it came from class C.\n- Step 3: Bayes’ theorem rescales the forward branch by the total probability of red to find the reverse proportion. The base rates $$P(A), P(B), P(C)$$ mean these two quantities are not interchangeable.", "source": "Kimi K2.6 ②", "_id": "kimi_2_25"}, {"question": "S1 May 2023 Q7(c) — In a two-equation normal system involving unknown mean 520 and unknown standard deviation $$k$$, what is the algebraic elimination strategy that prevents arithmetic slips? (3 steps)", "answer": "- Step 1: Convert each probability statement into a standardised equation: $$\\frac{r - 520}{k} = z_1$$ and $$\\frac{3r - 1320}{k} = z_2$$, where $$z_1$$ and $$z_2$$ are read from the percentage-point table.\n- Step 2: Rearrange **both** equations to the form $$r = \\dots k$$. Here: $$r = 520 - 1.0364k$$ from the first, and $$r = 440 + 0.8586k$$ from the second.\n- Step 3: Equate the two right-hand sides to eliminate $$r$$: $$520 - 1.0364k = 440 + 0.8586k$$. Solving gives $$k = 80 / 1.8950$$. This “both to same subject” method is far safer than substituting one messy fraction into another.", "source": "Kimi K2.6 ①", "_id": "kimi_1_34"}, {"question": "S1 May 2023 Q6 — State the formal definition of independence for two events $$B$$ and $$C$$, and explain why two events with positive probability cannot be both mutually exclusive and independent. (2 steps)", "answer": "- Step 1: Independence means $$P(B \\cap C) = P(B)P(C)$$. In this paper, $$P(B) = 0.18$$ and $$P(C) = 0.5$$, so independence forces $$P(B \\cap C) = 0.09$$.\n- Step 2: If they were also mutually exclusive, we would need $$P(B \\cap C) = 0$$. But $$P(B)P(C) = 0.09 \\neq 0$$, creating a contradiction. Therefore:\n  + Mutually exclusive and independent are mutually incompatible whenever both events have positive probability.\n  + Confusing the two is the dominant error in this question.", "source": "Kimi K2.6 ①", "_id": "kimi_1_27"}, {"question": "S1 May 2023 Q7(a)(i) — For a “show that” normal probability, what two exact values must you quote from the standard normal table, and why does showing the subtraction matter? (2 steps)", "answer": "- Step 1: Quote the standardised $$z$$-value and the cumulative table value exactly. Here $$z = \\frac{510-500}{25} = 0.4$$, and $$\\Phi(0.4) = 0.6554$$ to 4 d.p.\n- Step 2: Explicitly write the subtraction $$1 - 0.6554 = 0.3446$$. The “show that” mark requires the examiner to see you used the table correctly and performed the upper-tail subtraction; simply writing the final number without these intermediate table references risks losing the mark.", "source": "Kimi K2.6 ①", "_id": "kimi_1_31"}, {"question": "S1 May 2023 Q1(a) — What is the conceptual difference between a histogram’s frequency density and its frequency, and why does a class width other than 1 break the intuition that “height = count”? (2 steps)", "answer": "- Step 1: Frequency density is frequency per unit of the horizontal axis: $$\\text{FD} = f/w$$. It standardises the count so that wider classes do not appear unfairly tall. If width were always 1, FD and frequency would coincide.\n- Step 2: When class widths vary (or even when they are uniform but you take a slice), the area of the bar — not its height — represents the actual frequency. This is why partial-bar questions require multiplying FD by the slice width, not by the full bar width or reading height alone.", "source": "Kimi K2.6 ①", "_id": "kimi_1_42"}, {"question": "In the formula $$\\text{Var}(x) = \\frac{\\sum x^2}{n} - \\bar{x}^2$$, why is the second term subtracted? What would go wrong if you added it? (2 steps)", "answer": "- Step 1: Variance measures the average squared deviation from the mean: $$\\text{Var}(x) = \\frac{\\sum(x - \\bar{x})^2}{n}$$. Expanding $$(x - \\bar{x})^2 = x^2 - 2x\\bar{x} + \\bar{x}^2$$ and summing gives $$\\sum x^2 - 2\\bar{x}\\sum x + n\\bar{x}^2 = \\sum x^2 - 2n\\bar{x}^2 + n\\bar{x}^2 = \\sum x^2 - n\\bar{x}^2$$. Dividing by $$n$$ yields $$\\frac{\\sum x^2}{n} - \\bar{x}^2$$.\n- Step 2: Adding instead of subtracting would give $$\\frac{\\sum x^2}{n} + \\bar{x}^2$$, which is always larger than the correct variance (since $$\\bar{x}^2 > 0$$ for non-zero mean). This would also violate the property that $$\\text{Var}(x) \\ge 0$$ for data symmetric about zero, since the \"variance\" could exceed $$\\sum x^2/n$$.", "source": "GLM 5.1 ③", "_id": "glm_3_56"}, {"question": "S1 May 2023 Q7(a)(ii) — If you are given $$P(X > d) = p$$ with $$p > 0.5$$, what is the fastest way to determine the sign of the $$z$$-score without memorising rules? (2 steps)", "answer": "- Step 1: Sketch the normal curve with mean at the centre. Shade the region to the right of $$d$$. If the shaded region is larger than the unshaded left region, $$d$$ must sit left of the mean.\n- Step 2: Because standardisation preserves left-right position relative to the mean, $$d < \\mu$$ implies $$z < 0$$. The sketch makes this instantaneous; relying on rote “upper tail = positive $$z$$” fails precisely when $$p > 0.5$$. Here, $$p = 0.9192$$ forces $$z = -1.40$$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_45"}, {"question": "S1 May 2023 Q5(a) — After finding $$k = 1/30$$, why is it strategically better to leave probabilities as fractions with denominator 30 rather than converting to decimals during intermediate steps? (2 steps)", "answer": "- Step 1: Exact fractions preserve precision. Decimals like $$0.0333$$ introduce rounding noise that compounds when you later compute $$E(Y^2)$$, which involves squaring and multiplying by probabilities.\n- Step 2: With denominator 30, the expectation sums become simple integer arithmetic: $$\\sum y P(Y=y) = \\frac{2+2+3+32+85+6}{30}$$. The mark scheme often shows the fraction form; converting too early risks a 3 s.f. truncation that prevents the exact “show that” verification.", "source": "Kimi K2.6 ①", "_id": "kimi_1_46"}, {"question": "When solving $$P(R < r) = 0.15$$ for $$r$$ under $$R \\sim N(520, k^2)$$, explain the sign discipline: how do you determine that $$z$$ is negative? (3 steps)", "answer": "- Step 1: $$P(R < r) = 0.15$$ is a **lower-tail** probability — it's the area to the left of $$r$$. Since 0.15 < 0.5, less than half the distribution is below $$r$$, so $$r$$ is below the mean.\n- Step 2: Since $$r < \\mu$$, the numerator $$r - 520$$ is negative, so $$z = (r - 520)/k$$ must be negative. The sketch confirms: the shaded lower tail is the smaller portion.\n- Step 3: To find the magnitude, use the upper tail: $$P(Z > |z|) = 0.85$$, so look up $$\\Phi(z_{\\text{pos}}) = 0.85$$ giving $$z_{\\text{pos}} = 1.0364$$, then $$z = -1.0364$$. The equation becomes $$(r - 520)/k = -1.0364$$, i.e. $$r = 520 - 1.0364k$$.", "source": "GLM 5.1 ③", "_id": "glm_3_41"}, {"question": "S1 May 2023 Q6(c) — In the Venn diagram for Q6, why must circles A and C be drawn as non-overlapping, and what does this look like? (2 steps)", "answer": "- Step 1: Since $$A$$ and $$C$$ are mutually exclusive ($$P(A \\cap C) = 0$$), the circles for A and C must not share any region. They are drawn as completely separate (non-overlapping).\n- Step 2: Circle B overlaps both A (with 0.03 in the intersection) and C (with 0.09 in the intersection), but the triple intersection $$A \\cap B \\cap C$$ is 0 because A and C share no region. The diagram shows A and C separated, with B bridging between them.\n\nTakeaway: Mutually exclusive sets → non-overlapping circles in the Venn diagram.", "source": "GLM 5.1 ②", "_id": "glm_2_75"}, {"question": "What three habits does this paper reward most, according to the pattern summary? (3 steps)", "answer": "- Step 1: **Calibration before reading** (Q1, Q3) — compute FD for the named class before trusting any other bar.\n- Step 2: **Algebraic discipline before numerical substitution** (Q5, Q7c) — manipulate inequalities and equations symbolically before plugging in numbers.\n- Step 3: **Conceptual precision about probability vocabulary** (Q6 — mutually exclusive ≠ independent; Q4 — $$P(C|R) \\neq P(R|C)$$) — know the definitions cold.", "source": "GLM 5.1 ①", "_id": "glm_1_72"}, {"question": "S1 May 2023 Q1(b) — For grouped continuous data, what median-position formula must you use, and why is the discrete-data alternative incorrect here? (2 steps)", "answer": "- Step 1: Use position $$n/2$$, not $$(n+1)/2$$. For $$n=274$$, the median is the 137th value. Grouped data are treated as continuous, so the median lies somewhere inside a class interval; the $$(n+1)/2$$ rule is reserved for discrete or listed raw data.\n- Step 2: Build a cumulative-frequency column before locating the class. Here the cumulative frequencies are $$5, 65, 135, 235\\dots$$; since 137 exceeds 135, the median class is $$[30,40)$$. Without this column you risk losing track of boundaries.", "source": "Kimi K2.6 ①", "_id": "kimi_1_1"}, {"question": "S1 May 2023 Q5(a) — For a piecewise probability function with different formulas on different domains, what is the first thing you should do before solving for $$k$$, and why does evaluating $$P(Y=y)$$ at each integer prevent a sign disaster? (2 steps)", "answer": "- Step 1: Tabulate $$P(Y=y)$$ numerically for every allowed $$y$$. Here: $$y=1 \\Rightarrow k(3-1)=2k$$; $$y=2 \\Rightarrow k(3-2)=k$$; $$y=3 \\Rightarrow k(9-8)=k$$; $$y=4 \\Rightarrow k(16-8)=8k$$; $$y=5 \\Rightarrow k(25-8)=17k$$; $$y=6 \\Rightarrow k$$.\n- Step 2: This exposes the sign and magnitude of each probability. A common error is to misread $$k(3-y)$$ as $$k(y-3)$$, which would give negative probabilities for $$y=1,2$$ — impossible. The table makes the error visible before you sum to 1.", "source": "Kimi K2.6 ①", "_id": "kimi_1_20"}, {"question": "In a 3-set Venn diagram, why must you fill the regions from CENTRE outward rather than from the outside in?", "answer": "- Step 1: Each \"ring\" outward depends on the rings inside it. Filling outward avoids double-counting.\n- Step 2: Concrete example: \"$$A \\cap B$$ only\" = $$P(A \\cap B) - P(A \\cap B \\cap C)$$ — you need the triple intersection FIRST.\n- Step 3: Similarly: \"$$A$$ only\" = $$P(A) - $$ (all doubles involving $$A$$) $$+ P(A \\cap B \\cap C)$$ — needs doubles AND triple.\n\nWorking outward enforces the inclusion-exclusion subtractions in the right order. Working inward forces you to keep track of nested adjustments and is more error-prone.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "S1 May 2023 Q7(a)(ii) — When $$P(J > d) = 0.9192$$, why is the first instinct to look up a positive $$z$$ dangerous, and what does a quick sketch reveal? (3 steps)", "answer": "- Step 1: A probability greater than 0.5 in an upper tail means the boundary $$d$$ must lie below the mean, because more than half the distribution is to its right.\n- Step 2: Sketch the bell curve, shade the region to the right of $$d$$, and observe that the shaded area is larger than the left area. This instantly tells you $$z$$ is negative.\n- Step 3: The correct setup is $$P(J \\le d) = 1 - 0.9192 = 0.0808$$, so $$\\Phi(z) = 0.0808$$ with $$z < 0$$. Equivalently, $$\\Phi(-z) = 0.9192$$ gives $$-z = 1.40$$, so $$z = -1.40$$ and $$d = 500 - 35 = 465$$. Using $$z = +1.40$$ yields the absurd answer 535, which is above the mean yet would give an upper-tail probability less than 0.5.", "source": "Kimi K2.6 ①", "_id": "kimi_1_32"}, {"question": "In Q3(c), why is the answer 40 and not some fraction obtained by interpolating within the box? What principle overrides interpolation here? (2 steps)", "answer": "- Step 1: The question asks for the **maximum number** of salmon in $$(4600, 7700]$$. Since 4600 > median = 4000, every such salmon is above the median. By definition, at most 40 of 81 values are strictly above the median.\n- Step 2: This is a **counting principle** question, not an interpolation question. The median's definition gives a hard upper bound on the number of values above it — no interpolation within the box can override this. The maximum is 40 regardless of how the values are distributed within the upper half.", "source": "GLM 5.1 ③", "_id": "glm_3_53"}, {"question": "In a three-set Venn diagram where $$A$$ and $$C$$ are mutually exclusive ($$P(A \\cap C) = 0$$), what does this imply about the triple intersection $$P(A \\cap B \\cap C)$$, and how does it affect the diagram? (2 steps)", "answer": "- Step 1: If $$A \\cap C = \\emptyset$$, then every subset of $$A \\cap C$$ is also empty — including $$A \\cap B \\cap C$$. So $$P(A \\cap B \\cap C) = 0$$ is **forced**, even though the mutual exclusivity statement only mentions $$A$$ and $$C$$ directly.\n- Step 2: In the diagram, circles $$A$$ and $$C$$ must be drawn as **disjoint** (no overlapping region at all). The $$B$$ circle overlaps both $$A$$ and $$C$$, but the region where all three overlap carries probability 0. The \"$$A \\cap B$$ only\" region gets the full $$P(A \\cap B) = 0.03$$, and the \"$$B \\cap C$$ only\" region gets the full $$P(B \\cap C) = 0.09$$.", "source": "GLM 5.1 ③", "_id": "glm_3_24"}, {"question": "To compute $$\\text{Var}(Y)$$, you need both $$E(Y)$$ and $$E(Y^2)$$. What is the formula connecting them, and why is it preferred over the deviation-squared formula? (2 steps)", "answer": "- Step 1: $$\\text{Var}(Y) = E(Y^2) - [E(Y)]^2$$. Compute $$E(Y^2) = \\sum y^2 P(Y=y)$$ separately.\n- Step 2: This is preferred over $$\\text{Var}(Y) = E[(Y - \\mu)^2]$$ because you don't need to compute individual deviations — you just need two sums. It's computationally cleaner and less error-prone.", "source": "GLM 5.1 ①", "_id": "glm_1_52"}, {"question": "When asked why it would not be appropriate to use a regression line to estimate a value far from the data range (e.g. tail length of 2 cm when data span roughly 6.4–8.9 cm), what two reasons should you give? (2 steps)", "answer": "- Step 1: State that the value is **outside the range of the data** — this is **extrapolation**, and the linear model may not hold beyond the observed range. The relationship could be non-linear outside the data.\n- Step 2: Ideally, demonstrate the absurd prediction: at $$t = 2$$, $$w = -16.7 + 4.77(2) = -7.16$$ g, which is physically impossible (negative weight). This confirms the model is invalid there and strengthens your answer.\n\nBoth reasons together earn full marks. Just saying \"extrapolation\" alone may be insufficient — showing the impossible prediction value is the clincher.", "source": "GLM 5.1 ③", "_id": "glm_3_9"}, {"question": "S1 May 2023 — What are the three discriminator questions on this paper (the ones that separate A-grade from B-grade students)? (2 steps)", "answer": "- Step 1: The three discriminators are Q5(d)–(e) (deterministic RV transformation and variance scaling), Q6(c) (three-set Venn with mixed mutually-exclusive/independent conditions), and Q7(c) (two-equation normal system with sign discipline).\n- Step 2: Each tests a different high-level skill: Q5 tests algebraic manipulation under dependency, Q6 tests conceptual precision about probability vocabulary, Q7 tests sustained algebraic accuracy with sign management. Mastering these three unlocks the top grades.\n\nTakeaway: Q5de, Q6c, Q7c — the three questions that decide the A grade.", "source": "GLM 5.1 ②", "_id": "glm_2_77"}, {"question": "S1 May 2023 — What is the single highest-leverage formula to master for this paper, and why? (2 steps)", "answer": "- Step 1: $$\\text{Var}(aY + b) = a^2\\,\\text{Var}(Y).$$ This formula appears in Q5(e) (4 marks) and underpins Q3(b) (variance under coding) and Q7(c) (normal distribution parameters under transformation).\n- Step 2: The three failure modes are: (1) using $$a$$ instead of $$a^2$$, (2) keeping the sign of $$a$$ (writing $$-2$$ instead of $$+4$$), and (3) not dropping the constant $$b.$$ Master this one formula and Q5e becomes a 90-second computation rather than a 4-minute risk.\n\nTakeaway: $$\\text{Var}(aY + b) = a^2\\,\\text{Var}(Y)$$ — square the coefficient, drop the constant.", "source": "GLM 5.1 ②", "_id": "glm_2_64"}, {"question": "S1 May 2023 Q2(f) — Shan codes $$t$$ and $$w$$ using positive linear shifts and scales. Why does the PMCC between the coded variables equal the original PMCC, and would it still hold if one coding used a negative scale factor? (2 steps)", "answer": "- Step 1: Positive linear coding merely translates and rescales the axes without flipping them or changing the scatter shape, so $$r$$ is unchanged.\n- Step 2: A negative scale factor would flip the direction of association, changing the sign of $$r$$ even though the magnitude stayed the same. Positive scaling preserves both sign and magnitude.", "source": "Kimi K2.6 ②", "_id": "kimi_2_14"}, {"question": "S1 May 2023 Q2(g) — When asked for the regression line of coded variables, what is the high-risk trap to avoid, and what is the efficient correct strategy? (3 steps)", "answer": "- Step 1: The trap is recomputing $$S_{xy}$$, $$S_{xx}$$, and $$r$$ from scratch using the coded data, which wastes time and invites arithmetic error.\n- Step 2: Substitute the coding definitions into the existing regression equation. If $$x = t - 6$$ and $$y = w/2 - 5$$, replace $$t$$ with $$x+6$$ and $$w$$ with $$2(y+5)$$ in the original line $$w = a + bt$$.\n- Step 3: Rearrange to the required form. This preserves the exact least-squares fit because the coding is invertible and linear.", "source": "Kimi K2.6 ②", "_id": "kimi_2_15"}, {"question": "What is the single highest-leverage drill identified in the weakness analysis, and why? (2 steps)", "answer": "- Step 1: **Variance under linear transformation**: master $$\\text{Var}(aY + b) = a^2\\text{Var}(Y)$$ in isolation. This is flagged as the single highest-leverage drill because Q5(e) becomes a 90-second computation rather than a 4-minute risk if you have this formula locked in.\n- Step 2: The three failure modes it eliminates: (1) writing $$-2\\text{Var}(Y)$$ instead of $$4\\text{Var}(Y)$$, (2) writing $$2\\text{Var}(Y)$$ instead of $$4\\text{Var}(Y)$$, (3) including the constant: $$\\text{Var}(15 - 2Y) + 15$$ or similar nonsense. One formula, properly drilled, eliminates all three.", "source": "GLM 5.1 ③", "_id": "glm_3_58"}, {"question": "S1 general — What is the \"formula before substitution\" rule, and why is it critical for exam marks? (2 steps)", "answer": "- Step 1: Before substituting any numbers, write the relevant formula on your script. For Bayes: write $$P(C \\mid R) = \\frac{P(C \\cap R)}{P(R)}.$$ For variance: write $$\\text{Var}(aY + b) = a^2 \\text{Var}(Y).$$ For inclusion-exclusion: write $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B).$$\n- Step 2: Examiners award **method marks** for the formula structure even if your arithmetic is wrong. Without the formula, a numerical error can cost you all marks on that part. With it, you typically lose only the accuracy mark (usually 1 out of 3–4 marks).\n\nTakeaway: Writing the formula first is exam insurance — it protects method marks.", "source": "GLM 5.1 ②", "_id": "glm_2_49"}, {"question": "When a histogram has equal class widths (all width 10), does the height of each bar directly represent the frequency? Why or why not, and what changes when widths are unequal? (2 steps)", "answer": "- Step 1: When widths are equal, height (FD) = frequency/width = frequency/10. So the heights are **proportional** to the frequencies — the ranking of bar heights matches the ranking of frequencies. You can read off relative sizes directly.\n- Step 2: When widths are **unequal**, height = frequency/width, so a tall narrow bar might represent fewer people than a short wide bar. You must always use $$f = \\text{FD} \\times w$$ — never assume height alone equals frequency. This is the entire reason histograms use frequency density rather than frequency on the y-axis.", "source": "GLM 5.1 ③", "_id": "glm_3_59"}, {"question": "S1 May 2023 Q5(e) — Before applying the variance-scaling rule, why must you first compute $$\\mathrm{Var}(Y)$$ from $$E(Y^2) - [E(Y)]^2$$ rather than trying to scale the standard deviation directly? (2 steps)", "answer": "- Step 1: The definition of variance for a discrete RV is $$\\mathrm{Var}(Y) = E(Y^2) - [E(Y)]^2$$. You need both expectations: $$E(Y) = \\sum y P(Y=y)$$ and $$E(Y^2) = \\sum y^2 P(Y=y)$$. In this paper, $$E(Y) = 130/30$$ and $$E(Y^2) = 604/30$$.\n- Step 2: Attempting to scale the standard deviation via $$\\mathrm{SD}(aY+b) = |a|\\mathrm{SD}(Y)$$ and then squaring at the end is valid but cognitively more error-prone in exam conditions because students often forget to square $$|a|$$ or confuse variance with SD. Computing $$\\mathrm{Var}(Y)$$ first and then multiplying by $$a^2$$ is the mark-scheme’s expected route.", "source": "Kimi K2.6 ①", "_id": "kimi_1_25"}, {"question": "For a histogram \"find the number of people with values between 22 and 45 km\", what is the trick to handle the fact that 22 and 45 do NOT fall on bar boundaries?", "answer": "- Step 1: Recognise this is a **partial-bar pro-rating** question, not a clean sum of full bars.\n- Step 2: Slice the interval at the natural bar boundaries (here 30 and 40):\n+ $$[22,30)$$: partial slice of width $$8$$, multiply by that bar's FD\n+ $$[30,40)$$: full bar — use its full frequency\n+ $$[40,45)$$: partial slice of width $$5$$, multiply by that bar's FD\n- Step 3: Sum the three sub-frequencies using $$f = \\text{FD} \\times w$$ on each piece.\n\nThe motivation: every shaded rectangle (full or partial) obeys $$f = \\text{FD} \\times w$$ — that's the only formula needed.", "source": "Opus 4.7 ①", "_id": "opus_1_1"}, {"question": "S1 May 2023 Q3(d) — The outlier rule uses $$1.5 \\times \\mathrm{IQR}$$. Why is the multiplier 1.5 rather than another number, and what does this multiplier represent in terms of the underlying distribution? (2 steps)", "answer": "- Step 1: The value 1.5 is a conventional threshold chosen so that, for a perfect normal distribution, roughly 99.3% of data fall inside the fences. It balances sensitivity (catching genuine anomalies) with specificity (not flagging ordinary tail values).\n- Step 2: The fence distance $$1.5 \\times \\mathrm{IQR}$$ extends the box by half the box width in each direction. Because IQR already captures the middle 50%, this multiplier creates a boundary far enough out that only extreme deviations are classified as outliers. You do not derive it in the exam; you simply apply it exactly as defined.", "source": "Kimi K2.6 ①", "_id": "kimi_1_43"}, {"question": "Why is it dangerous to read frequency densities directly off a histogram’s vertical axis, and why does calibrating against a named class eliminate that danger? (3 steps)", "answer": "- Step 1: The y-axis may use a compressed, truncated, or schematic scale, so visual estimation introduces proportional errors.\n- Step 2: Calibrating against a named class gives an exact numerical anchor derived from unquestionable data: $$\\text{FD} = f / w$$.\n- Step 3: Once anchored, every other frequency becomes a deterministic multiplication, decoupling your working entirely from the visual axis.", "source": "Kimi K2.6 ②", "_id": "kimi_2_1"}, {"question": "Histogram question asks for \"the number of people who travel between 22 km and 45 km\" (Q1a, S1 May 2023). What's the TRICK that distinguishes this from a clean class-boundary query?", "answer": "- Step 1: Recognise this slices ACROSS three bars with PARTIAL bars at both ends — 22 is inside $$[20,30)$$, and 45 is inside $$[40,50)$$.\n- Step 2: Compute each partial slice as $$\\text{FD} \\times (\\text{sub-width})$$, NOT as a fraction of the full bar's frequency.\n+ $$[22,30)$$: sub-width $$= 30-22 = 8$$, so $$f = 8 \\times \\text{FD}$$\n+ $$[30,40)$$: full bar, take the whole frequency\n+ $$[40,45)$$: sub-width $$= 45-40 = 5$$, so $$f = 5 \\times \\text{FD}$$\n- Step 3: Sum the three slices.\n\nCommon pitfall: treating \"between 22 and 45\" as if it covers full bars $$[20,40)$$ minus a guess for the leftover — this conflates full and partial bars.", "source": "Opus 4.7 ②", "_id": "opus_2_1"}, {"question": "In Q5(d), we need P(Y ≤ X) where X = 15 − 2Y. Why can't you treat Y and X as independent random variables and sum P(Y = y) × P(X = x)? (2 steps)", "answer": "- Step 1: X is a deterministic function of Y: X = 15 − 2Y. They are NOT independent — knowing Y completely determines X.\n- Step 2: Instead, solve the inequality algebraically: Y ≤ 15 − 2Y → 3Y ≤ 15 → Y ≤ 5. Then P(Y ≤ X) = P(Y ≤ 5) = 1 − P(Y = 6) = 29/30.\n\n**Key insight:** When one variable is a function of the other, use the functional relationship to transform the inequality, not probability multiplication.", "source": "MiniMax ②", "_id": "minimax_2_22"}, {"question": "Why is it INAPPROPRIATE to use a regression line $$w = -16.7 + 4.77t$$ (fitted to tail lengths 6.4–8.9 cm) to predict the weight at $$t = 2$$ cm?", "answer": "- Step 1: $$t = 2$$ is FAR outside the range of the data the line was fitted to (extrapolation).\n- Step 2: Substituting: $$w = -16.7 + 4.77 \\times 2 = -7.16$$ g — a NEGATIVE weight, which is physically impossible.\n- Step 3: Mention BOTH points for full marks: (i) it's extrapolation outside the range, and (ii) ideally cite the impossible prediction value.\n\nThe strongest answer always quotes the impossible numerical prediction — it shows you tested the model.", "source": "Opus 4.7 ②", "_id": "opus_2_9"}, {"question": "In Q7(a)(ii), a student looks up Φ(z) = 0.9192 and finds z = 1.40, then calculates d = 500 + 1.40 × 25 = 535. What two errors did they make? (2 steps)", "answer": "- Step 1: They used Φ(z) = 0.9192 but should have used the percentage-point table (or recognized that 0.9192 > 0.5 implies a LEFT-tail problem, not right-tail).\n- Step 2: They used z = +1.40, but for a left-tail probability of 0.0808 (1 − 0.9192), z must be negative: z = −1.40, giving d = 465, not 535.\n\n**Correct logic:** P(J > d) = 0.9192 → P(J ≤ d) = 0.0808 → this is a left-tail problem → z < 0.", "source": "MiniMax ②", "_id": "minimax_2_37"}, {"question": "Box plot with median = 4000, $$Q_3 = 5500$$, $$n = 81$$ — what's the maximum number of values that can lie in $$(4600, 7700]$$, and what is the KEY insight?", "answer": "- Step 1: The insight: $$4600 > \\text{median} = 4000$$, so EVERY value in the interval lies strictly above the median.\n- Step 2: By definition of the median for $$n = 81$$, at most $$\\lfloor 81/2 \\rfloor = 40$$ values can lie strictly above 4000.\n- Step 3: So the answer is **40**. The trick: don't try to interpolate inside the box — recognise this as a *conceptual* question about how many values the median allows above itself.", "source": "Opus 4.7 ①", "_id": "opus_1_15"}, {"question": "S1 May 2023 Q4 & Q6 — Explain why $$P(R \\mid C)$$ and $$P(C \\mid R)$$ are not interchangeable, using the formal definition of conditional probability. (2 steps)", "answer": "- Step 1: By definition, $$P(R \\mid C) = \\frac{P(R \\cap C)}{P(C)}$$ and $$P(C \\mid R) = \\frac{P(R \\cap C)}{P(R)}$$. They share the same numerator but have different denominators.\n- Step 2: In Q4, $$P(R \\mid C) = 0.06$$ is the likelihood of red given label C, while $$P(C \\mid R) \\approx 0.385$$ is the posterior probability of label C given that the counter is red. Because $$P(R) = 0.039$$ is much smaller than $$P(C) = 0.25$$, the fractions differ dramatically. Swapping them is the most expensive direction error in conditional probability.", "source": "Kimi K2.6 ①", "_id": "kimi_1_40"}, {"question": "S1 May 2023 Q2(a) — What is the correct sign structure of the computational formula for $$S_{tw}$$, and what is the most common sign error that loses the method mark? (2 steps)", "answer": "- Step 1: The formula is $$S_{tw} = \\sum tw - \\frac{\\sum t \\sum w}{n}$$; the second term is **subtracted**. A common fatal error is writing $$S_{tw} = \\sum tw + \\frac{\\sum t \\sum w}{n}$$, which produces an impossibly large value and destroys the PMCC.\n- Step 2: Treat $$\\frac{\\sum t \\sum w}{n}$$ as the correction term that removes the mean contribution. It is always subtracted from the raw sum of products, exactly as in $$S_{xx}$$ and $$S_{yy}$$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_4"}, {"question": "Why does PMCC stay the same under coding $$x = t - 6$$ and $$y = w/2 - 5$$, and when would it CHANGE?", "answer": "- Step 1: PMCC is invariant under **positive linear coding** of either variable: shifts and positive scalings preserve $$r$$.\n- Step 2: Intuition: $$r$$ measures the *shape/strength* of linear association, dimensionless — translating or rescaling axes doesn't change how tightly the points cluster around a line.\n- Step 3: $$r$$ would flip sign (but keep magnitude) if a **negative** scale factor were used (e.g. $$y = -w$$); it would only change in magnitude if the coding were non-linear (e.g. $$y = w^2$$).", "source": "Opus 4.7 ①", "_id": "opus_1_11"}, {"question": "When $$A$$ and $$C$$ are mutually exclusive, what does this imply about the triple intersection $$A \\cap B \\cap C$$?", "answer": "Since $$A \\cap C = \\emptyset$$, any subset of $$A \\cap C$$ must also be empty. In particular, $$A \\cap B \\cap C \\subseteq A \\cap C$$, so $$P(A \\cap B \\cap C) = 0$$.\n\nThis is crucial for filling in the Venn diagram: the triple intersection is forced to zero by the mutual exclusivity of $$A$$ and $$C$$, even though $$B$$ overlaps both.", "source": "GLM 5.1 ①", "_id": "glm_1_31"}, {"question": "For \"explain why it would be inappropriate to predict $$w$$ when $$t = 2$$ cm\", what two-pronged argument do you make?", "answer": "- Step 1: **Range argument**: $$t = 2$$ is far outside the observed range of the data (mean $$\\bar t \\approx 7.65$$ with small spread), so this is **extrapolation** — the linear relationship is only validated where data exist.\n- Step 2: **Impossibility argument** (bonus): substituting $$t=2$$ gives $$w = -16.7 + 4.77(2) \\approx -7.16$$ g, a **negative weight** — physically meaningless, confirming the model breaks down outside the data range.\n- Step 3: Strategy: state both \"outside the range\" AND the impossible/absurd prediction value for full marks.", "source": "Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "S1 May 2023 Q6(b) — You know $$P(A \\cup B) = 0.25$$, $$P(A) = 0.1$$, and $$P(A \\cap B) = 0.03$$. How do you isolate $$P(B)$$, and what is the common sign trap? (3 steps)", "answer": "- Step 1: Start from $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$.\n- Step 2: Rearrange to $$P(B) = P(A \\cup B) - P(A) + P(A \\cap B)$$.\n- Step 3: The sign trap is subtracting the intersection again instead of adding it back. The intersection must be added because it was subtracted once too many in the union formula.", "source": "Kimi K2.6 ②", "_id": "kimi_2_37"}, {"question": "In Q5(a), when verifying that $$k = 1/30$$ from the piecewise pmf, what is the sanity check you should perform on each term before summing? (2 steps)", "answer": "- Step 1: Check that **every** $$P(Y = y) \\ge 0$$. For the piecewise form: $$P(Y=1) = k(3-1) = 2k \\ge 0$$ ✓, $$P(Y=2) = k(3-2) = k \\ge 0$$ ✓, $$P(Y=3) = k(9-8) = k \\ge 0$$ ✓, $$P(Y=4) = k(16-8) = 8k \\ge 0$$ ✓, $$P(Y=5) = k(25-8) = 17k \\ge 0$$ ✓, $$P(Y=6) = k \\ge 0$$ ✓.\n- Step 2: Then verify **sum to 1**: $$2k + k + k + 8k + 17k + k = 30k = 1$$, so $$k = 1/30$$. Both checks are necessary: non-negativity confirms the piecewise formula is correctly interpreted (no sign errors), and sum-to-1 confirms $$k$$.", "source": "GLM 5.1 ③", "_id": "glm_3_49"}, {"question": "In Q6(c), a common error is setting P(B ∩ C) = 0 because A and C are mutually exclusive. What information given in part (c) tells you P(B ∩ C) ≠ 0, and what's the correct value? (2 steps)", "answer": "- Step 1: Part (c) states \"B and C are independent.\" This means P(B ∩ C) = P(B)P(C).\n- Step 2: P(B ∩ C) = 0.18 × 0.5 = 0.09. This is NOT zero.\n\n**Key principle:** Don't carry forward conditions from earlier parts unless they still apply. Each part may introduce new constraints.", "source": "MiniMax ①", "_id": "minimax_1_18"}, {"question": "S1 May 2023 Q6 — Prove that two events with positive probability cannot be both mutually exclusive and independent. (3 steps)", "answer": "- Step 1: Suppose $$A$$ and $$C$$ are both mutually exclusive and independent, with $$P(A) > 0$$ and $$P(C) > 0.$$\n- Step 2: Mutual exclusivity gives $$P(A \\cap C) = 0.$$ Independence gives $$P(A \\cap C) = P(A) \\cdot P(C) > 0$$ (product of two positive numbers).\n- Step 3: Contradiction: $$0 = P(A \\cap C) = P(A) \\cdot P(C) > 0.$$ So the assumption is impossible. If one of the probabilities is zero, the events *can* be both — but for positive probability, never.\n\nTakeaway: Positive-probability events are either mutually exclusive or independent (or neither), but never both.", "source": "GLM 5.1 ②", "_id": "glm_2_28"}, {"question": "S1 May 2023 Q7(c) — In the equation $$R \\sim N(520, k^2)$$, what does $$k$$ represent, and what is the common confusion? (2 steps)", "answer": "- Step 1: In the notation $$N(\\mu, \\sigma^2)$$, the second parameter is the **variance**. Here $$k^2$$ is the variance, so $$k$$ is the **standard deviation** $$\\sigma.$$ When you standardise, you divide by $$k$$ (not $$k^2$$).\n- Step 2: The common confusion is treating $$k$$ as the variance and dividing by $$k^2$$ or writing $$z = \\frac{r - 520}{k^2}.$$ Always check: is the second parameter the variance or the standard deviation? In Edexcel notation, it's always the variance.\n\nTakeaway: $$N(\\mu, \\sigma^2)$$ → the second parameter is variance. If they write $$k^2$$, then $$k = \\sigma.$$", "source": "GLM 5.1 ②", "_id": "glm_2_40"}, {"question": "When data are coded using positive linear transformations (e.g. $$x = t - 6$$ and $$y = w/2 - 5$$), what happens to the PMCC $$r$$, and why? (2 steps)", "answer": "- Step 1: The PMCC is **invariant** — it does not change. $$r_{xy} = r_{tw}$$. Both transformations are positive-linear (shift by constants, scale by positive factors), so the strength and direction of linear correlation are preserved.\n- Step 2: The intuition: PMCC measures the *pattern* of linear association, not the absolute values. Adding/subtracting constants shifts the cloud of points without changing its shape. Multiplying by positive constants stretches/compresses the axes but doesn't flip the cloud. Only a **negative** scale factor would flip the sign of $$r$$.\n\nIf the coding included a negative scale (e.g. $$y = -w$$), then $$r_{xy} = -r_{tw}$$. But the question states positive linear coding.", "source": "GLM 5.1 ③", "_id": "glm_3_10"}, {"question": "S1 May 2023 Q2 & Q3 — State the general rule for how linear coding affects the PMCC, and give the precise condition under which it changes sign. (2 steps)", "answer": "- Step 1: The PMCC is invariant under any linear coding of the form $$X = a + bx$$ and $$Y = c + dy$$ provided the scale factors $$b$$ and $$d$$ are both positive. The value of $$r$$ remains exactly the same.\n- Step 2: The PMCC changes sign only if **exactly one** of the scale factors $$b$$ or $$d$$ is negative (a reflection). If both are negative, the sign reverts to positive because $$(-b)(-d) = bd > 0$$. In virtually all Edexcel coding questions, the scales are positive, so $$r$$ never changes.", "source": "Kimi K2.6 ①", "_id": "kimi_1_37"}, {"question": "S1 May 2023 Q4(d) — When applying Bayes’ theorem, why is it essential to compute the total probability $$P(R)$$ in the denominator rather than simply quoting $$P(R \\mid C)$$? (2 steps)", "answer": "- Step 1: $$P(R \\mid C) = 0.06$$ only describes the probability of red within label C. The question asks for the reverse: how likely is label C given that we have observed a red counter? This requires accounting for all alternative routes to redness via labels A and B.\n- Step 2: The denominator $$P(R) = 0.039$$ aggregates every label’s contribution. Without it, you ignore the base rates of A and B. Here, because C is a relatively rare label (25%) but produces red more efficiently, the posterior $$0.385$$ ends up much larger than $$P(C)=0.25$$ yet is still not equal to $$0.06$$. The denominator is what converts a likelihood into a posterior.", "source": "Kimi K2.6 ①", "_id": "kimi_1_48"}, {"question": "S1 May 2023 Q6(a) — If events $$A$$ and $$C$$ are mutually exclusive, what does this imply about $$P(A \\cap C)$$ and $$P(A \\cup C)$$, and why does it instantly determine the triple intersection $$P(A \\cap B \\cap C)$$? (2 steps)", "answer": "- Step 1: Mutually exclusive means $$P(A \\cap C) = 0$$. Therefore $$P(A \\cup C) = P(A) + P(C) - 0 = P(A) + P(C)$$. Here, $$0.1 + 0.5 = 0.6$$.\n- Step 2: Since $$A \\cap B \\cap C$$ is a subset of $$A \\cap C$$, and the larger set has probability zero, the subset must also have probability zero: $$P(A \\cap B \\cap C) = 0$$. This is crucial for filling the Venn diagram from the centre outward.", "source": "Kimi K2.6 ①", "_id": "kimi_1_26"}, {"question": "What is the rule for $$\\mathrm{Var}(aY + b)$$, and what's the most common error in applying it?", "answer": "- Step 1: $$\\mathrm{Var}(aY + b) = a^2 \\mathrm{Var}(Y)$$ — the multiplier is SQUARED, and the constant $$b$$ disappears.\n- Step 2: For $$X = 15 - 2Y$$, $$a = -2$$ and $$b = 15$$, so $$\\mathrm{Var}(X) = (-2)^2 \\mathrm{Var}(Y) = 4 \\mathrm{Var}(Y)$$.\n- Step 3: Common errors:\n+ Writing $$\\mathrm{Var}(X) = -2 \\mathrm{Var}(Y)$$ — missing the square, giving a NEGATIVE variance.\n+ Writing $$\\mathrm{Var}(X) = 2 \\mathrm{Var}(Y)$$ — forgetting to square the magnitude.\n+ Adding 15: $$\\mathrm{Var}(X) = 4 \\mathrm{Var}(Y) + 15$$ — constants don't contribute.\n\nAlways check: variance must be POSITIVE. A negative answer signals a missing square.", "source": "Opus 4.7 ②", "_id": "opus_2_25"}, {"question": "S1 May 2023 Q2(e) — When asked why extrapolation is inappropriate, what two distinct arguments should you deploy, and which one is physically decisive here? (2 steps)", "answer": "- Step 1: State that $$t = 2$$ cm lies far outside the observed data range (roughly 6.4–8.9 cm). The linear relationship is only validated within the sample range; outside it the pattern may curve or break down entirely.\n- Step 2: Add the physical-decisiveness check: substituting $$t=2$$ gives $$w = -16.7 + 4.77(2) \\approx -7.16$$ g, which is impossible. A negative weight proves the linear model is invalid at that tail length, making the estimate nonsensical.", "source": "Kimi K2.6 ①", "_id": "kimi_1_9"}, {"question": "When computing $$E(Y)$$ from a tabulated pmf, what is the formula, and what is a quick sanity check on the result? (2 steps)", "answer": "- Step 1: $$E(Y) = \\sum y \\cdot P(Y = y)$$. For the Q5 data: $$\\frac{1(2) + 2(1) + 3(1) + 4(8) + 5(17) + 6(1)}{30} = \\frac{130}{30} = \\frac{13}{3} \\approx 4.33$$.\n- Step 2: Sanity check: since $$P(Y = 5) = 17/30$$ is by far the largest probability, the mean should be close to 5. The value 4.33 is reasonable — it's pulled slightly below 5 by the smaller values. If you got a mean of 1.5 or 6.2, something would be wrong.", "source": "GLM 5.1 ③", "_id": "glm_3_65"}, {"question": "What's the relationship between $$\\mathrm{Var}(aY+b) = a^2 \\mathrm{Var}(Y)$$ and the variance-under-coding rule $$\\mathrm{Var}(X) = \\mathrm{Var}(x)/b^2$$? Are these the same rule?", "answer": "- Step 1: Yes — they are the SAME rule applied in two different directions.\n- Step 2: Coding: $$X = (x - a)/b$$ is a linear transformation of $$x$$, with multiplier $$1/b$$ and shift $$-a/b$$. Applying $$\\mathrm{Var}(aY + b) = a^2 \\mathrm{Var}(Y)$$: $$\\mathrm{Var}(X) = (1/b)^2 \\mathrm{Var}(x) = \\mathrm{Var}(x)/b^2$$.\n- Step 3: Transformation: $$X = aY + b$$ gives $$\\mathrm{Var}(X) = a^2 \\mathrm{Var}(Y)$$ directly.\n\nBoth express that variance picks up the SQUARE of any scaling factor and ignores any pure shift. Recognising this unifies coding (Q3) and RV transformation (Q5e).", "source": "Opus 4.7 ②", "_id": "opus_2_42"}, {"question": "S1 May 2023 Q5(a) — When given a piecewise probability function like $$P(Y=y) = k(3-y)$$ for $$y=1,2$$, what must you check before summing to find $$k$$, and why? (2 steps)", "answer": "- Step 1: **Tabulate the numerical values** before summing. For $$y=1$$: $$k(3-1) = 2k.$$ For $$y=2$$: $$k(3-2) = k.$$ The common error is writing $$k(y-3)$$ instead of $$k(3-y)$$, which gives negative probabilities (impossible).\n- Step 2: After tabulating all values ($$2k, k, k, 8k, 17k, k$$), sum to 1: $$30k = 1 \\Rightarrow k = 1/30.$$ Always verify every probability is non-negative before proceeding.\n\nTakeaway: Tabulate the pmf numerically first — catch sign errors before they propagate.", "source": "GLM 5.1 ②", "_id": "glm_2_21"}, {"question": "S1 May 2023 Q5(d) — Walk through the exact algebraic rearrangement that turns the probabilistic statement $$P(Y \\le X)$$ into a simple inequality in $$Y$$ alone when $$X = 15 - 2Y$$. (3 steps)", "answer": "- Step 1: Start with the inequality inside the probability: $$Y \\le X$$. Substitute the deterministic definition of $$X$$ to obtain $$Y \\le 15 - 2Y$$.\n- Step 2: Collect like terms by adding $$2Y$$ to both sides, giving $$3Y \\le 15$$. This is the critical simplification; it removes the second variable entirely.\n- Step 3: Divide by 3 to isolate $$Y$$: $$Y \\le 5$$. Therefore $$P(Y \\le X) = P(Y \\le 5)$$, which is computed directly from the pmf. The entire problem reduces to a single-variable cumulative probability.", "source": "Kimi K2.6 ①", "_id": "kimi_1_23"}, {"question": "S1 May 2023 Q3(b) — Why does adding 600 back to the data **not** change the variance, and what is the correct formula for $$\\mathrm{Var}(x)$$ using the summary statistics? (2 steps)", "answer": "- Step 1: Variance measures spread, which is invariant under translation. Shifting every salmon length by 600 mm moves the whole distribution rigidly; distances between data points and the mean remain identical, so $$\\mathrm{Var}(l) = \\mathrm{Var}(x)$$.\n- Step 2: Use $$\\mathrm{Var}(x) = \\frac{\\sum x^2}{n} - \\bar x^2$$. Never add or subtract the coding constant to the variance. A common fatal error is writing $$\\mathrm{Var}(l) = \\mathrm{Var}(x) + 600$$ or $$-600$$, which is dimensionally and conceptually wrong.", "source": "Kimi K2.6 ①", "_id": "kimi_1_13"}, {"question": "S1 May 2023 Q4(d): \"given the counter is red, find $$P(\\text{labelled C})$$\". What's the DIRECTION trap with Bayes' theorem here?", "answer": "- Step 1: The question asks $$P(C \\mid R)$$ — NOT $$P(R \\mid C) = 0.06$$ (which is given in the setup).\n- Step 2: Bayes reverses the conditioning: $$P(C \\mid R) = \\frac{P(C) \\cdot P(R \\mid C)}{P(R)}$$.\n- Step 3: Conceptual check: $$P(C \\mid R)$$ asks \"of all RED counters, what fraction are labelled C?\" whereas $$P(R \\mid C)$$ asks \"of all C-labelled counters, what fraction are red?\" — totally different populations.\n\nA common slip is to quote the given $$P(R \\mid C) = 0.06$$ as the answer. Always check direction by reading the \"given\" condition carefully.", "source": "Opus 4.7 ②", "_id": "opus_2_20"}, {"question": "Why does the scale factor get **squared** in $$\\text{Var}(aY) = a^2\\text{Var}(Y)$$? Give the intuition. (2 steps)", "answer": "- Step 1: If you multiply all values by $$a$$, deviations from the mean get multiplied by $$a$$, and then those deviations get **squared** in the variance formula — so the factor becomes $$a^2$$.\n- Step 2: Even if $$a$$ is negative (like $$a = -2$$), squaring makes it positive: $$(-2)^2 = 4$$. Variance is always non-negative, so a negative multiplier would be impossible.\n\nThis is why $$\\text{Var}(-2Y) = 4\\text{Var}(Y)$$, not $$-2\\text{Var}(Y)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_29"}, {"question": "In a piecewise pmf like $$P(Y=y) = k(y^2 - 8)$$ for $$y = 3, 4, 5$$, what's the consistency check you should run before doing any further work?", "answer": "- Step 1: Evaluate each $$P(Y=y)$$ as a numerical multiple of $$k$$ and check ALL are NON-NEGATIVE.\n+ At $$y=3$$: $$k(9-8) = k$$ — needs $$k \\geq 0$$\n+ At $$y=4$$: $$k(16-8) = 8k$$ — needs $$k \\geq 0$$\n+ At $$y=5$$: $$k(25-8) = 17k$$ — needs $$k \\geq 0$$\n- Step 2: After solving for $$k$$ (typically $$k > 0$$), substitute back and CONFIRM each numerical probability is in $$[0, 1]$$.\n- Step 3: This catches sign errors in the pmf formula early — e.g. if you'd written $$k(8 - y^2)$$ instead, evaluating would have given negative probabilities, flagging the error.\n\nThe tabulation is your safety net against pmf sign slips.", "source": "Opus 4.7 ②", "_id": "opus_2_41"}, {"question": "\"Show that\" $$w = -16.7 + 4.77t$$ is the printed answer in a regression question. What rounding discipline must you adopt, and why?", "answer": "- Step 1: Carry $$\\geq 5$$ significant figures through ALL intermediate quantities ($$S_{tw}$$, $$S_{tt}$$, $$\\bar t$$, $$\\bar w$$, $$b$$, $$a$$) before rounding the final printed form.\n- Step 2: Premature rounding (e.g. quoting $$\\bar t = 7.65$$ instead of $$7.65333$$) typically shifts the intercept by 0.1 or more, so the printed $$-16.7$$ won't materialise cleanly.\n- Step 3: Specifically for \"show that\" with printed coefficients, write the gradient and intercept to at least 4 s.f. before rounding to the printed form, so the examiner sees a credible derivation.\n\nMark scheme awards \"show\" marks only when the working clearly produces
