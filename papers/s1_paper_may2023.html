$$ — that's the bridge between conditional and joint.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "In a three-set Venn diagram, when $$A$$ and $$C$$ are MUTUALLY EXCLUSIVE, what does this imply about the triple intersection $$P(A \\cap B \\cap C)$$?", "answer": "- Step 1: $$A \\cap C = \\emptyset$$ means events $$A$$ and $$C$$ never occur together.\n- Step 2: Since $$A \\cap B \\cap C$$ is a SUBSET of $$A \\cap C$$, it must also be empty: $$P(A \\cap B \\cap C) = 0$$.\n- Step 3: The triple intersection is forced to zero before you even consider $$B$$.\n\nThis is the conceptual unlock for filling in a 3-set Venn from the centre outward when one pair is mutually exclusive.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "In a three-set Venn problem, what's the FILLING ORDER strategy for assigning probabilities to regions?", "answer": "- Step 1: Start from the CENTRE: $$P(A \\cap B \\cap C)$$ first.\n- Step 2: Move outward to the DOUBLE intersections, subtracting the triple to get \"doubles only\" regions.\n- Step 3: Then SINGLE-only regions (subtract all doubles and the triple from each $$P(\\cdot)$$). Finally OUTSIDE = $$1 - $$ (sum of all 7 inside regions).\n\nAlways sum all 8 regions and check they equal 1 explicitly on your script — examiners look for this.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "In a 3-set Venn problem with $$B$$ and $$C$$ independent, $$P(B) = 0.18$$, $$P(C) = 0.5$$ — how do you compute $$P(B \\cap C)$$?", "answer": "- Step 1: Independent ⇔ $$P(B \\cap C) = P(B) \\cdot P(C) = 0.18 \\times 0.5 = 0.09$$.\n- Step 2: This is the MULTIPLICATIVE rule for independence — distinct from the additive rule for mutually exclusive ($$P(B \\cap C) = 0$$).\n- Step 3: Common trap: applying $$P(B \\cap C) = 0$$ here because of an earlier \"mutually exclusive\" condition (e.g. $$A$$ and $$C$$ mutually exclusive) — those are two DIFFERENT pairs of events.\n\nMake a 2-row summary table at the top of probability questions: \"mutually exclusive ⇒ joint = 0\" vs \"independent ⇒ joint = product\".", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "In a 3-set Venn diagram, why must you always remember the OUTSIDE region, and how do you compute it?", "answer": "- Step 1: Outside = $$1 - P(A \\cup B \\cup C) = 1 - $$ (sum of all 7 regions inside the three circles).\n- Step 2: It is a 1-mark item on its own in many mark schemes — forgetting it is a guaranteed mark loss.\n- Step 3: Once you've filled all 7 inner regions, compute the outside as the complement and write it in the rectangle.\n\nThe outside region is just the empirical \"neither A nor B nor C\" probability — always check 8 regions sum to 1.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "S1 May 2023 Q7(a)(i) — show $$P(J > 510) = 0.3446$$ with $$J \\sim N(500, 25^2)$$. What's the systematic 3-step approach?", "answer": "- Step 1: Standardise: $$z = (510 - 500)/25 = 0.4$$.\n- Step 2: Recognise \"$$>$$\" means upper tail, so $$P(J > 510) = 1 - \\Phi(0.4)$$.\n- Step 3: From the body table, $$\\Phi(0.4) = 0.6554$$, so $$P(J > 510) = 1 - 0.6554 = 0.3446$$ ✓.\n\nFor \"show that\": quote the exact table value (0.6554) explicitly on your script — this secures the table-reading mark.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "S1 May 2023 Q7(a)(ii) — find $$d$$ such that $$P(J > d) = 0.9192$$. What's the SIGN trap, and how does sketching prevent it?", "answer": "- Step 1: $$P(J > d) = 0.9192 > 0.5$$, which means $$d$$ must lie BELOW the mean (because most of the distribution is above $$d$$).\n- Step 2: Sketching the standard normal and shading the right tail with area 0.9192 shows $$d$$ is to the LEFT of $$\\mu$$, so $$z$$ is NEGATIVE.\n- Step 3: Look up $$\\Phi(-z) = 0.9192$$ → $$-z = 1.40$$ → $$z = -1.40$$, then $$d = 500 + (-1.40)(25) = 465$$.\n\nWithout the sketch, students grab $$z = +1.40$$ from the table and get $$d = 535$$ — wrong side of the mean. ALWAYS sketch first.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": true}, {"question": "When you see \"find $$P(\\text{event for each of 5 independent bags})$$\", what's the operation you apply, and why?", "answer": "- Step 1: For \"EACH of 5 independent bags\" satisfying the event, multiply the individual probability by itself 5 times: $$p^5$$, where $$p = P(\\text{event for one bag})$$.\n- Step 2: Independence is the KEY assumption that allows multiplication: $$P(\\text{all 5}) = \\prod_{i=1}^5 P(\\text{bag } i) = p^5$$.\n- Step 3: Common pitfall: multiplying by 5 (giving $$5p$$) instead of raising to the 5th power. Multiplying by 5 is what you'd do for an EXPECTATION (number of \"successes\" out of 5), not a joint probability.\n\nAlways state \"since the bags are independent...\" before raising to a power — it's the assumption that justifies the step.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": true}, {"question": "What 4 percentage-point z-values must you memorise for S1 normal questions, and when do you use them vs the body table?", "answer": "- Step 1: Memorise:\n+ $$z_{0.05} = 1.6449$$\n+ $$z_{0.025} = 1.9600$$\n+ $$z_{0.01} = 2.3263$$\n+ $$z_{0.005} = 2.5758$$\n- Step 2: Use the PERCENTAGE-POINT table when the tail probability is a \"tidy\" value like 0.05, 0.025, 0.01, 0.005 — these give 4-decimal-place $$z$$-values.\n- Step 3: Use the BODY table $$\\Phi(z)$$ for general tail probabilities (e.g. 0.85, 0.92, 0.96) — these give $$z$$ to typically 2 d.p.\n\nUsing the body table for 0.005 (rounded $$z \\approx 2.58$$) instead of the precise 2.5758 can shift answers by enough to lose a \"show that\" mark in two-equation systems.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "S1 May 2023 Q7(c) — two-equation normal system in $$r$$ and $$k$$. What's the algebraic strategy that avoids substitution mistakes?", "answer": "- Step 1: Translate EACH probability statement into a $$z$$-equation separately, with the correct sign of $$z$$ (sketch each tail first).\n- Step 2: REARRANGE both equations into the form $$r = (\\text{constant}) + (\\text{coefficient}) \\cdot k$$.\n- Step 3: EQUATE the two RHS expressions and solve for $$k$$ first, then back-substitute to find $$r$$.\n\nDoing algebra BEFORE numbers (i.e. getting both into $$r = \\ldots k$$ form) avoids fractional arithmetic with mixed signs and unknowns in the denominator. Then VERIFY by substituting $$(r, k)$$ back into both original probability statements.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "In a normal distribution like $$R \\sim N(520, k^2)$$, what does $$k$$ represent — the variance or the standard deviation?", "answer": "- Step 1: In the notation $$N(\\mu, \\sigma^2)$$, the second slot is the VARIANCE, but its square root is the standard deviation $$\\sigma$$.\n- Step 2: So $$R \\sim N(520, k^2)$$ means the variance is $$k^2$$ and the STANDARD DEVIATION is $$k$$.\n- Step 3: When standardising: $$z = (R - 520)/k$$ — divide by $$k$$, not by $$k^2$$.\n\nCommon pitfall: dividing by $$k^2$$ in standardisation. Always remember: standardisation uses the STANDARD DEVIATION, which is the symbol in the $$z$$-denominator.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "Why does $$k$$ in $$N(520, k^2)$$ have to be POSITIVE, and what should you do if you get $$k < 0$$?", "answer": "- Step 1: $$k$$ represents a standard deviation, which is a non-negative quantity (it measures spread).\n- Step 2: A negative $$k$$ has no physical meaning — it would invert the sign convention of the standardisation.\n- Step 3: If you solve a system and get $$k < 0$$, you've made a sign error somewhere — likely in identifying the sign of $$z$$ for one of the tail conditions (probability $$> 0.5$$ versus $$< 0.5$$).\n\nAlways verify $$k > 0$$ at the end of a two-equation normal problem. A negative $$k$$ is a \"red flag\" telling you to re-sketch and re-check tails.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "Why is the cumulative-frequency column ESSENTIAL when finding a grouped-data median, and what error happens without it?", "answer": "- Step 1: The median lies in the class where the cumulative frequency first reaches or exceeds $$n/2$$.\n- Step 2: Without a cumulative column, students try to subtract bar frequencies sequentially from $$n/2$$ and lose track of WHICH class actually contains the $$n/2$$-th value.\n- Step 3: The cumulative column also gives you $$F$$ (cumulative frequency BEFORE the median class) directly — a quantity you NEED in the interpolation formula $$\\text{median} = L + \\frac{n/2 - F}{f_m} w$$.\n\nAlways tabulate cumulative frequencies as Step 1 of any median-interpolation question.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": false}, {"question": "When you see \"given the counter is red\" (or similar reversed conditioning), what does this tell you about the population we're considering?", "answer": "- Step 1: \"Given the counter is red\" restricts the sample space to RED counters only — you're now considering the population of red counters.\n- Step 2: The question $$P(C \\mid R)$$ asks: \"OF the red counters, what fraction is labelled C?\"\n- Step 3: This is fundamentally different from $$P(R \\mid C) = 0.06$$, which asks \"OF the C-labelled counters, what fraction is red?\"\n\nThe conditioning event always defines the SUB-POPULATION you're working within. Conditional probability questions reduce to \"what fraction of THIS sub-population satisfies the other condition?\"", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "In a piecewise pmf like $$P(Y=y) = k(y^2 - 8)$$ for $$y = 3, 4, 5$$, what's the consistency check you should run before doing any further work?", "answer": "- Step 1: Evaluate each $$P(Y=y)$$ as a numerical multiple of $$k$$ and check ALL are NON-NEGATIVE.\n+ At $$y=3$$: $$k(9-8) = k$$ — needs $$k \\geq 0$$\n+ At $$y=4$$: $$k(16-8) = 8k$$ — needs $$k \\geq 0$$\n+ At $$y=5$$: $$k(25-8) = 17k$$ — needs $$k \\geq 0$$\n- Step 2: After solving for $$k$$ (typically $$k > 0$$), substitute back and CONFIRM each numerical probability is in $$[0, 1]$$.\n- Step 3: This catches sign errors in the pmf formula early — e.g. if you'd written $$k(8 - y^2)$$ instead, evaluating would have given negative probabilities, flagging the error.\n\nThe tabulation is your safety net against pmf sign slips.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": true}, {"question": "What's the relationship between $$\\mathrm{Var}(aY+b) = a^2 \\mathrm{Var}(Y)$$ and the variance-under-coding rule $$\\mathrm{Var}(X) = \\mathrm{Var}(x)/b^2$$? Are these the same rule?", "answer": "- Step 1: Yes — they are the SAME rule applied in two different directions.\n- Step 2: Coding: $$X = (x - a)/b$$ is a linear transformation of $$x$$, with multiplier $$1/b$$ and shift $$-a/b$$. Applying $$\\mathrm{Var}(aY + b) = a^2 \\mathrm{Var}(Y)$$: $$\\mathrm{Var}(X) = (1/b)^2 \\mathrm{Var}(x) = \\mathrm{Var}(x)/b^2$$.\n- Step 3: Transformation: $$X = aY + b$$ gives $$\\mathrm{Var}(X) = a^2 \\mathrm{Var}(Y)$$ directly.\n\nBoth express that variance picks up the SQUARE of any scaling factor and ignores any pure shift. Recognising this unifies coding (Q3) and RV transformation (Q5e).", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": true}, {"question": "Why does the percentage-point table give $$z = 2.5758$$ for the upper tail of 0.005, when the body table would round it to 2.58?", "answer": "- Step 1: The body table $$\\Phi(z)$$ is tabulated at fixed $$z$$-values (typically 2 d.p.) and gives the cumulative probability. To invert it for a target probability, you read off the closest $$z$$, which may not be exact.\n- Step 2: The percentage-point table inverts this — it's tabulated AT fixed (tail) probabilities (0.05 nswer": "- Step 1: Compute means $$\\bar t$$ and $$\\bar w$$ to at least 4 s.f. and write them down.\n- Step 2: Compute the gradient $$b = S_{tw}/S_{tt}$$ to at least 4 s.f. — write $$b = 4.77073\\ldots$$ before rounding.\n- Step 3: Compute the intercept $$a = \\bar w - b \\bar t$$ to at least 4 s.f. — write $$a = -16.6599\\ldots$$ before rounding.\n\nMark scheme: the \"show\" mark requires evidence of computation that PRODUCES the printed answer, not just a coincidence. Rounding too early loses both the method and the show marks.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": false}, {"question": "What's the systematic format for translating a normal-distribution constraint like $$P(R > 3r - 800) = 0.005$$ into an equation in the unknowns?", "answer": "- Step 1: Identify the tail: $$P(R > \\text{value}) = 0.005$$ is an upper tail with tiny probability — so the value is FAR ABOVE the mean and $$z > 0$$.\n- Step 2: Read $$z$$ from the percentage-point table: $$z_{0.005} = 2.5758$$.\n- Step 3: Set up the standardisation equation: $$\\frac{(3r - 800) - \\mu}{k} = 2.5758$$, then rearrange to express $$r$$ in terms of $$k$$ (or vice versa).\n\nAlways sketch the tail first to confirm sign of $$z$$, THEN look up the value, THEN write the equation.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": false}], "count": 48}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 14837, "out_tokens": 17225, "reasoning_chars": 2866, "cost_eur": 0.0698, "elapsed_s": 328, "content_chars": 50533}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 14837, "out_tokens": 20633, "reasoning_chars": 5624, "cost_eur": 0.0808, "elapsed_s": 397, "content_chars": 60787}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 14837, "out_tokens": 20454, "reasoning_char ars": 4731, "cost_eur": 0.0065, "elapsed_s": 57, "content_chars": 6856}, "qwen_3": {"run": 3, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.8, "in_tokens": 15572, "out_tokens": 3849, "reasoning_chars": 4884, "cost_eur": 0.0071, "elapsed_s": 67, "content_chars": 8822}, "qwen_4": {"run": 4, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.85, "in_tokens": 15572, "out_tokens": 3901, "reasoning_chars": 5766, "cost_eur": 0.0072, "elapsed_s": 68, "content_chars": 8650}}};
const SK='s1_paper_may2023';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),3500);
  fetch('https://hermes-flashcards.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
