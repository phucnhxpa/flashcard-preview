oximately 0.385.\n- Step 2: Write down the **Bayes formula** before substituting any numbers: $$P(C \\mid R) = \\frac{P(C) \\cdot P(R \\mid C)}{P(R)} = \\frac{0.25 \\times 0.06}{0.039}$$. The formula structure prevents you from accidentally quoting $$P(R \\mid C) = 0.06$$ as the answer. Examiners award method marks for writing the formula.\n\nThis is flagged as **Medium severity** — \"Rewrite Bayes formula at top of every script\" is the recommended drill.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": true}, {"question": "When a discrete random variable has a piecewise probability function like $$P(Y=y) = k(3-y)$$ for $$y = 1, 2$$, why must you tabulate the numerical values before summing, rather than working with the algebraic form? (2 steps)", "answer": "- Step 1: Evaluate each value explicitly: $$P(Y=1) = k(3-1) = 2k$$, $$P(Y=2) = k(3-2) = k$$. The common sign error is writing $$k(y-3)$$ instead of $$k(3-y)$$, which gives $$P(Y=1) = -2k$$ — a **negative probability**, which is impossible.\n- Step 2: Tabulating forces you to check that every $$P(Y=y) \\ge 0$$ before summing. If any entry is negative, you've made a sign error. Then sum: $$2k + k + k + 8k + 17k + k = 30k = 1$$, giving $$k = 1/30$$.\n\nThe table also makes subsequent calculations ($$E(Y)$$, $$E(Y^2)$$) far less error-prone than working with the algebraic piecewise form.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": true}, {"question": "When asked to find $$P(Y \\le X)$$ where $$X = 15 - 2Y$$ is a deterministic function of $$Y$$, why is it wrong to treat $$X$$ and $$Y$$ as independent, and what do you do instead? (3 steps)", "answer": "- Step 1: $$X$$ is a **deterministic function** of $$Y$$ — knowing $$Y$$ completely determines $$X$$. They are perfectly (negatively) correlated, not independent. Treating them as independent and summing $$P(Y=y)P(X=x)$$ is fundamentally wrong.\n- Step 2: Substitute the relationship: $$Y \\le X$$ becomes $$Y \\le 15 - 2Y$$. This is an inequality in a **single variable** $$Y$$.\n- Step 3: Solve algebraically: $$3Y \\le 15 \\Rightarrow Y \\le 5$$. Then $$P(Y \\le 5) = 1 - P(Y = 6) = 1 - 1/30 = 29/30$$. Three lines of algebra replace an entire enumeration.\n\nThe pitfall: trying to enumerate joint $$(Y, X)$$ pairs. Since $$X$$ is not a separate random variable, this approach is meaningless.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": true}, {"question": "For the variance transformation $$\\text{Var}(aY + b)$$, what is the result, and what are the two most common errors in the multiplier? (3 steps)", "answer": "- Step 1: The correct formula is $$\\text{Var}(aY + b) = a^2 \\text{Var}(Y)$$. The constant $$b$$ disappears (shifting doesn't affect spread), and the scaling factor is **squared**.\n- Step 2: Common error 1: writing $$\\text{Var}(15 - 2Y) = -2\\text{Var}(Y)$$. The negative sign is squared away — variance is always non-negative, so the multiplier can never be negative.\n- Step 3: Common error 2: writing $$\\text{Var}(15 - 2Y) = 2\\text{Var}(Y)$$. Forgetting to square means you're off by a factor of 2. The correct multiplier is $$(-2)^2 = 4$$, so $$\\text{Var}(X) = 4\\text{Var}(Y) = 4 \\times 61/45 = 244/45 \\approx 5.42$$.\n\nThis is flagged as **High severity**. The drill: write \"$$\\text{Var}(aY+b) = a^2\\text{Var}(Y)$$\" five times before every practice paper.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "Can two events with positive probability be both mutually exclusive AND independent? Why or why not? (3 steps)", "answer": "- Step 1: **No.** If $$P(A) > 0$$ and $$P(B) > 0$$, they cannot be both mutually exclusive and independent.\n- Step 2: Mutually exclusive means $$P(A \\cap B) = 0$$. Independent means $$P(A \\cap B) = P(A) \\cdot P(B) > 0$$ (since both probabilities are positive). These two conditions are **contradictory**.\n- Step 3: Intuition: mutually exclusive events \"repel\" each other — if A happens, B cannot. Independence means A tells you nothing about B. If A happening makes B impossible, A certainly tells you something about B — so they're not independent.\n\nThis is the conceptual heart of Q6. Conflating these two definitions is flagged as **High severity**.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": true}, {"question": "When filling a three-set Venn diagram, what order should you fill the regions, and why? (3 steps)", "answer": "- Step 1: Start from the **centre outward**: first the triple intersection $$A \\cap B \\cap C$$, then the three double-only regions ($$A \\cap B$$ only, $$A \\cap C$$ only, $$B \\cap C$$ only), then the three single-only regions ($$A$$ only, $$B$$ only, $$C$$ only), then the outside.\n- Step 2: The reason: each outer region is computed by subtraction. For example, \"$$A$$ only\" = $$P(A) - P(A \\cap B \\text{ only}) - P(A \\cap C \\text{ only}) - P(A \\cap B \\cap C)$$. If you haven't filled the inner regions first, you can't compute the outer ones.\n- Step 3: Always check that all eight regions sum to 1 at the end. Write the check on your script — it catches arithmetic slips and the common error of forgetting the outside region.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": true}, {"question": "In a three-set Venn diagram where $$A$$ and $$C$$ are mutually exclusive ($$P(A \\cap C) = 0$$), what does this imply about the triple intersection $$P(A \\cap B \\cap C)$$, and how does it affect the diagram? (2 steps)", "answer": "- Step 1: If $$A \\cap C = \\emptyset$$, then every subset of $$A \\cap C$$ is also empty — including $$A \\cap B \\cap C$$. So $$P(A \\cap B \\cap C) = 0$$ is **forced**, even though the mutual exclusivity statement only mentions $$A$$ and $$C$$ directly.\n- Step 2: In the diagram, circles $$A$$ and $$C$$ must be drawn as **disjoint** (no overlapping region at all). The $$B$$ circle overlaps both $$A$$ and $$C$$, but the region where all three overlap carries probability 0. The \"$$A \\cap B$$ only\" region gets the full $$P(A \\cap B) = 0.03$$, and the \"$$B \\cap C$$ only\" region gets the full $$P(B \\cap C) = 0.09$$.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": true}, {"question": "When $$B$$ and $$C$$ are independent with $$P(B) = 0.18$$ and $$P(C) = 0.50$$, how do you find $$P(B \\cap C)$$, and what is the common wrong alternative? (2 steps)", "answer": "- Step 1: By independence: $$P(B \\cap C) = P(B) \\cdot P(C) = 0.18 \\times 0.5 = 0.09$$. This is the defining property of independence — the joint probability equals the product of marginals.\n- Step 2: The common wrong alternative: setting $$P(B \\cap C) = 0$$ because an earlier part of the question involved mutually exclusive events ($$A$$ and $$C$$). The student carries the mutual exclusivity concept over to $$B$$ and $$C$$, even though the question explicitly states $$B$$ and $$C$$ are **independent**, not mutually exclusive. These are completely different conditions.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": true}, {"question": "In a three-set Venn diagram, what is the most commonly forgotten region, and what is the consequence? (2 steps)", "answer": "- Step 1: The **outside region** — the probability of being outside all three sets, $$P(A' \\cap B' \\cap C')$$. It's computed as $$1 - \\sum(\\text{all seven interior regions})$$.\n- Step 2: Forgetting it is a 1-mark loss, and it also means your total doesn't sum to 1, which can cascade into errors on follow-up parts. Always compute and label it: in the Q6 example, the outside region is 0.34 — a substantial probability that cannot be ignored.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "When solving an inverse normal problem like $$P(J > d) = 0.9192$$, why must you sketch the distribution before looking up tables, and what does the sketch reveal? (3 steps)", "answer": "- Step 1: Sketch the normal curve, mark the mean, and shade the region $$P(J > d) = 0.9192$$. Since 0.9192 > 0.5, the shaded area is more than half the curve — so $$d$$ must be **below the mean**.\n- Step 2: Convert: $$P(J \\le d) = 1 - 0.9192 = 0.0808$$. This is a lower-tail probability < 0.5, confirming $$z < 0$$.\n- Step 3: Look up $$\\Phi(z) = 0.0808$$, or equivalently $$\\Phi(-z) = 0.9192$$ giving $$-z = 1.40$$, so $$z = -1.40$$. Then $$d = 500 + (-1.40)(25) = 465$$. Without the sketch, the classic error is taking $$z = +1.40$$ and getting $$d = 535$$ — the wrong side of the mean.\n\nThis is flagged as **High severity**. The sketch is mandatory, not optional.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": true}, {"question": "When finding the probability that all 5 independent bags yield less than 510 ml (given $$P(J < 510) = 0.6554$$ for one bag), what operation do you perform, and what is the common wrong alternative? (2 steps)", "answer": "- Step 1: Since the bags are **independent**, $$P(\\text{all 5} < 510) = (0.6554)^5 = 0.121$$. Independence means you multiply the probabilities for each bag.\n- Step 2: The common error is **multiplying by 5** instead of raising to the 5th power: $$5 \\times 0.6554 = 3.277$$, which is a probability greater than 1 — obviously wrong. The key distinction: \"each of 5 independent events\" → raise to a power; \"expected number out of 5\" → multiply by 5.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": true}, {"question": "In a two-equation normal system (e.g. $$P(R < r) = 0.15$$ and $$P(R > 3r - 800) = 0.005$$ with $$R \\sim N(520, k^2)$$), what is the algebraic strategy before substituting any numbers? (3 steps)", "answer": "- Step 1: Convert each probability statement to a $$z$$-equation. For $$P(R < r) = 0.15$$ (lower tail < 0.5, so $$z < 0$$): $$\\frac{r - 520}{k} = -1.0364$$. For $$P(R > 3r - 800) = 0.005$$ (upper tail < 0.5, so $$z > 0$$): $$\\frac{3r - 1320}{k} = 2.5758$$.\n- Step 2: Rearrange **both** equations to the form $$r = \\ldots k$$: Equation 1 gives $$r = 520 - 1.0364k$$. Equation 2 gives $$r = 440 + 0.8586k$$.\n- Step 3: **Equate** the two expressions for $$r$$: $$520 - 1.0364k = 440 + 0.8586k$$, giving $$80 = 1.895k$$, so $$k = 42.2$$. Then substitute back for $$r$$. This \"both to $$r = \\ldots k$$, then equate\" strategy avoids messy elimination and makes sign errors far less likely.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": true}, {"question": "When looking up $$z$$-values for extreme tail probabilities (e.g. $$P(Z > z) = 0.005$$), which table should you use — the body table or the percentage-point table — and what is the pitfall? (2 steps)", "answer": "- Step 1: Use the **percentage-point table** (Table 4 in the Edexcel booklet), which gives $$z$$-values for specific tail probabilities. For $$P(Z > z) = 0.005$$, the percentage-point table gives $$z = 2.5758$$ directly.\n- Step 2: The pitfall is using the body table and looking up $$\\Phi(z) = 0.995$$, which gives a rounded value like $$z = 2.58$$. This loses precision and may cause the final answer to differ from the mark scheme. The percentage-point table gives the exact value to 4 decimal places.\n\nMemorize the four key percentage-point values: $$z_{0.05} = 1.6449$$, $$z_{0.025} = 1.9600$$, $$z_{0.01} = 2.3263$$, $$z_{0.005} = 2.5758$$.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": false}, {"question": "In a two-equation normal system, after solving for $$r$$ and $$k$$, what verification step should you always perform? (2 steps)", "answer": "- Step 1: Substitute $$(r, k)$$ back into **both** original probability statements. For example: check that $$(476 - 520)/42.2 = -1.0364$$ (matching the $$z$$-value for the 0.15 lower tail) AND $$(3 \\times 476 - 800 - 520)/42.2 = 2.5758$$ (matching the $$z$$-value for the 0.005 upper tail).\n- Step 2: Also check that $$k > 0$$ — a negative standard deviation is meaningless and signals an algebraic sign error. If your $$k$$ comes out negative, recheck your $$z$$-signs before proceeding.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": false}, {"question": "When a normal distribution parameter is written as $$N(520, k^2)$$, what does $$k$$ represent — standard deviation or variance? What is the implication for standardisation? (2 steps)", "answer": "- Step 1: In the notation $$N(\\mu, \\sigma^2)$$, the second parameter is the **variance**. So if the question writes $$N(520, k^2)$$, then the variance is $$k^2$$ and the standard deviation is $$k$$. When standardising, you divide by $$k$$, not $$k^2$$.\n- Step 2: The pitfall: if you treat $$k^2$$ as the standard deviation, you'd divide by $$k^2$$ in the $$z$$-formula, producing a wrong equation. Always identify: is the second parameter the variance or the SD? In Edexcel notation $$N(\\mu, \\sigma^2)$$, it's always the variance.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "When using inclusion–exclusion to find $$P(B)$$ given $$P(A)$$, $$P(B \\mid A)$$, and $$P(A \\cup B)$$, what two-step process do you follow? (2 steps)", "answer": "- Step 1: First find the intersection using the conditional probability formula: $$P(A \\cap B) = P(A) \\cdot P(B \\mid A) = 0.1 \\times 0.3 = 0.03$$. This \"unlocks\" the inclusion–exclusion equation.\n- Step 2: Then apply inclusion–exclusion: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$, so $$0.25 = 0.1 + P(B) - 0.03$$, giving $$P(B) = 0.18$$. The pitfall is trying to go directly from $$P(A \\cup B)$$ to $$P(B)$$ without first computing the intersection.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": false}, {"question": "For computing $$\\text{Var}(Y)$$ from a discrete probability distribution, what is the formula and what is the most arithmetic-risky step? (2 steps)", "answer": "- Step 1: $$\\text{Var}(Y) = E(Y^2) - [E(Y)]^2$$. Compute $$E(Y^2) = \\sum y^2 P(Y=y)$$ separately from $$E(Y)$$, then subtract the square of $$E(Y)$$.\n- Step 2: The most error-prone step is the $$E(Y^2)$$ arithmetic, specifically the term where $$y^2$$ is largest. For example, $$25 \\times 17 = 425$$ is the biggest contributor and the easiest place to make a multiplication slip. Tabulate each $$y^2 \\cdot P(Y=y)$$ term separately and sum carefully before subtracting $$[E(Y)]^2$$.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": false}, {"question": "When a question says \"given that $$B$$ and $$C$$ are independent\", what equation should you immediately write down before doing anything else? (1 step)", "answer": "- Step 1: Write $$P(B \\cap C) = P(B) \\cdot P(C)$$. This is the **defining equation** of independence. If $$P(B)$$ and $$P(C)$$ are known, you can immediately compute $$P(B \\cap C)$$. Writing this equation first prevents the common error of setting $$P(B \\cap C) = 0$$ (which would be mutual exclusivity, not independence).", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": false}, {"question": "When a question says \"given that $$A$$ and $$C$$ are mutually exclusive\", what equation should you immediately write down? (1 step)", "answer": "- Step 1: Write $$P(A \\cap C) = 0$$. This is the **defining equation** of mutual exclusivity — the events cannot occur together. Writing this first prevents confusion with independence and makes it clear that in the Venn diagram, the $$A$$ and $$C$$ circles share no overlapping region.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": false}, {"question": "What is the time budget per mark for a 75-mark, 90-minute S1 paper, and how many minutes should you reserve for checking? (2 steps)", "answer": "- Step 1: 90 minutes ÷ 75 marks = **1.2 minutes per mark**. A 3-mark question should take about 3.5 minutes; a 14-mark question about 17 minutes.\n- Step 2: Reserve **5 minutes at the end** for checking. This means effectively you have 85 minutes for 75 marks, or about 1.13 minutes per mark. Prioritize checking: sign of $$z$$-values, sum of Venn regions, variance positive, \"show that\" reproduced exactly.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": false}, {"question": "What is the formula for $$S_{xx}$$ (sum of squares for a single variable), and how does it differ from $$\\text{Var}(x)$$? (2 steps)", "answer": "- Step 1: $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$. This is the **total sum of squared deviations** from the mean, without dividing by $$n$$ or $$n-1$$.\n- Step 2: $$\\text{Var}(x) = \\frac{S_{xx}}{n}$$ (population variance) or $$\\frac{S_{xx}}{n-1}$$ (sample variance). The key difference: $$S_{xx}$$ is a sum (not yet averaged), while variance is $$S_{xx}$$ divided by the appropriate denominator. In regression, $$b = S_{xy}/S_{xx}$$ uses the sum-of-squares version, not the variance.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": false}, {"question": "When the question gives $$\\sum w^2 = 6089.12$$, $$\\sum w = 297.8$$, and $$n = 15$$, and asks you to calculate $$S_{ww}$$, what is the formula and what sign must you be careful about? (2 steps)", "answer": "- Step 1: $$S_{ww} = \\sum w^2 - \\frac{(\\sum w)^2}{n} = 6089.12 - \\frac{297.8^2}{15} = 6089.12 - 5912.32 = 176.80$$.\n- Step 2: The sign is always **minus** between the two terms. The common error is writing $$+$$, which would give $$6089.12 + 5912.32 = 12001.44$$ — a number far too large for a sum of squared deviations. Sanity check: $$S_{ww}$$ should be a \"moderate\" number reflecting spread, not a huge sum.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": false}, {"question": "In a histogram, what does the **area** of each bar represent, and how does this differ from what the **height** represents? (2 steps)", "answer": "- Step 1: The **area** of each bar (width × height) represents the **frequency** of that class. This is the fundamental principle of histograms: $$f = \\text{FD} \\times w$$, where FD (frequency density) is the height.\n- Step 2: The **height** (frequency density) represents frequency **per unit of the x-variable**. Two bars with the same frequency but different widths will have different heights — the narrower bar is taller. This is why histograms with unequal class widths look different from bar charts, where height alone represents frequency.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": false}, {"question": "When solving $$P(R < r) = 0.15$$ for $$r$$ under $$R \\sim N(520, k^2)$$, explain the sign discipline: how do you determine that $$z$$ is negative? (3 steps)", "answer": "- Step 1: $$P(R < r) = 0.15$$ is a **lower-tail** probability — it's the area to the left of $$r$$. Since 0.15 < 0.5, less than half the distribution is below $$r$$, so $$r$$ is below the mean.\n- Step 2: Since $$r < \\mu$$, the numerator $$r - 520$$ is negative, so $$z = (r - 520)/k$$ must be negative. The sketch confirms: the shaded lower tail is the smaller portion.\n- Step 3: To find the magnitude, use the upper tail: $$P(Z > |z|) = 0.85$$, so look up $$\\Phi(z_{\\text{pos}}) = 0.85$$ giving $$z_{\\text{pos}} = 1.0364$$, then $$z = -1.0364$$. The equation becomes $$(r - 520)/k = -1.0364$$, i.e. $$r = 520 - 1.0364k$$.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": true}, {"question": "When solving $$P(R > 3r - 800) = 0.005$$ for the same $$R \\sim N(520, k^2)$$, explain the sign discipline: how do you determine that $$z$$ is positive? (3 steps)", "answer": "- Step 1: $$P(R > 3r - 800) = 0.005$$ is an **upper-tail** probability — it's the area to the right of $$3r - 800$$. Since 0.005 < 0.5, this is a small tail, so $$3r - 800$$ is far above the mean.\n- Step 2: Since $$3r - 800 > \\mu$$, the numerator $$(3r - 800) - 520$$ is positive, so $$z = \\frac{3r - 1320}{k}$$ is positive. The sketch confirms: the shaded upper tail is the tiny rightmost sliver.\n- Step 3: From the percentage-point table, $$z_{0.005} = 2.5758$$. The equation becomes $$\\frac{3r - 1320}{k} = 2.5758$$, i.e. $$3r = 1320 + 2.5758k$$, i.e. $$r = 440 + 0.8586k$$.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": false}, {"question": "For the inequality $$P(1 < Y \\le 4)$$ with a discrete random variable taking values 1, 2, 3, 4, 5, 6, which values of $$Y$$ are included and why? (2 steps)", "answer": "- Step 1: $$1 < Y$$ means $$Y > 1$$, so $$Y = 1$$ is **excluded**. $$Y \\le 4$$ means $$Y = 2, 3, 4$$ are **included**. So the relevant values are $$Y = 2, 3, 4$$.\n- Step 2: Compute: $$P(Y=2) + P(Y=3) + P(Y=4) = \\frac{1+1+8}{30} = \\frac{10}{30} = \\frac{1}{3}$$. The pitfall is including $$Y = 1$$ (misreading \"$$<$$\" as \"$$\\le$$\") or excluding $$Y = 4$$ (misreading \"$$\\le$$\" as \"$$<$$\"). For discrete RVs, strict vs non-strict inequality matters at every boundary.", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": false}, {"question": "What does the formula $$E(aY + b) = aE(Y) + b$$ tell you about the effect of the constant $$b$$ on the expectation, and how does this differ from its effect on variance? (2 steps)", "answer": "- Step 1: For expectation, the constant $$b$$ **shifts** the mean: $$E(aY + b) = aE(Y) + b$$. Adding 15 to every value adds 15 to the expected value. This makes intuitive sense — the center of the distribution moves by exactly $$b$$.\n- Step 2: For variance, the constant $$b$$ **disappears**: $$\\text{Var}(aY + b) = a^2\\text{Var}(Y)$$. Shifting doesn't change spread. So $$E(15 - 2Y) = 15 - 2E(Y)$$ (the 15 matters for the mean) but $$\\text{Var}(15 - 2Y) = 4\\text{Var}(Y)$$ (the 15 is irrelevant for the spread).", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": true}, {"question": "When a question gives you $$P(A \\cup C)$$ and states $$A$$ and $$C$$ are mutually exclusive, what simplification of inclusion–exclusion applies? (2 steps)", "answer": "- Step 1: Since mutually exclusive means $$P(A \\cap C) = 0$$, the inclusion–exclusion formula simplifies: $$P(A \\cup C) = P(A) + P(C) - P(A \\cap C) = P(A) + P(C) - 0 = P(A) + P(C)$$.\n- Step 2: Apply directly: $$P(A \\cup C) = 0.1 + 0.5 = 0.6$$. For mutually exclusive events, the union probability is simply the sum — no subtraction needed. This is the \"special case\" that makes mutual exclusivity computationally convenient.", "source": "GLM 5.1 ③", "_id": "glm_3_45", "judge_pick": false}, {"question": "When the coding is $$x = (l - a)/b$$, what are the reverse-coding formulas for $$\\bar{l}$$ and $$\\text{Var}(l)$$ in terms of $$\\bar{x}$$ and $$\\text{Var}(x)$$? (2 steps)", "answer": "- Step 1: $$\\bar{l} = b\\bar{x} + a$$. The shift $$a$$ is added back and the scaling $$b$$ is multiplied back. E.g. if $$x = (l - 600)/1$$, then $$\\bar{l} = 1 \\times \\bar{x} + 600$$.\n- Step 2: $$\\text{Var}(l) = b^2 \\text{Var}(x)$$. The shift $$a$$ has no effect (variance is translation-invariant), and the scaling $$b$$ is squared. E.g. if $$x = l - 600$$ (so $$b = 1$$), then $$\\text{Var}(l) = \\text{Var}(x)$$ — the variance is identical.", "source": "GLM 5.1 ③", "_id": "glm_3_46", "judge_pick": false}, {"question": "In Q6, when computing the \"B only\" region of the Venn diagram, what subtraction do you perform, and what could go wrong? (2 steps)", "answer": "- Step 1: $$P(B \\text{ only}) = P(B) - P(A \\cap B) - P(B \\cap C) + P(A \\cap B \\cap C) = 0.18 - 0.03 - 0.09 + 0 = 0.06$$. You subtract both double-intersection portions and add back the triple (since it was subtracted twice).\n- Step 2: The pitfall: forgetting to add back the triple intersection when it's non-zero, or getting a **negative result** from arithmetic errors. If any \"only\" region comes out negative, you've made a mistake — probabilities cannot be negative. This is your error-detection signal.", "source": "GLM 5.1 ③", "_id": "glm_3_47", "judge_pick": false}, {"question": "Why does the PMCC remain unchanged under positive linear coding? Give the intuitive geometric explanation. (2 steps)", "answer": "- Step 1: The PMCC measures the **tightness of linear clustering** in a scatter plot. Positive linear coding (shifting and/or positively scaling the axes) moves and stretches the scatter cloud but does not change its *shape* or *tilt* — points that were tightly clustered around a line remain tightly clustered.\n- Step 2: A negative scale factor would **flip** the cloud (e.g. reversing one axis), which changes the direction of correlation (positive ↔ negative) but not its magnitude. So $$r$$ changes sign under negative scaling but is fully invariant under positive linear coding. This is why $$r_{xy} = r_{tw} = 0.827$$ in Q2(f).", "source": "GLM 5.1 ③", "_id": "glm_3_48", "judge_pick": true}, {"question": "In Q5(a), when verifying that $$k = 1/30$$ from the piecewise pmf, what is the sanity check you should perform on each term before summing? (2 steps)", "answer": "- Step 1: Check that **every** $$P(Y = y) \\ge 0$$. For the piecewise form: $$P(Y=1) = k(3-1) = 2k \\ge 0$$ ✓, $$P(Y=2) = k(3-2) = k \\ge 0$$ ✓, $$P(Y=3) = k(9-8) = k \\ge 0$$ ✓, $$P(Y=4) = k(16-8) = 8k \\ge 0$$ ✓, $$P(Y=5) = k(25-8) = 17k \\ge 0$$ ✓, $$P(Y=6) = k \\ge 0$$ ✓.\n- Step 2: Then verify **sum to 1**: $$2k + k + k + 8k + 17k + k = 30k = 1$$, so $$k = 1/30$$. Both checks are necessary: non-negativity confirms the piecewise formula is correctly interpreted (no sign errors), and sum-to-1 confirms $$k$$.", "source": "GLM 5.1 ③", "_id": "glm_3_49", "judge_pick": true}, {"question": "When the question asks for an answer \"to 3 significant figures\", and your calculator shows 29.27299..., what do you write, and what must you also include? (2 steps)", "answer": "- Step 1: Write **29.3** (rounding 29.27... up because the third digit after rounding is 7, and the digit after is 2, so the 7 stays as 7, giving 29.3). Wait — let me recompute: 29.27299... → 3 s.f. is 29.3 (since the 4th significant figure is 7, which rounds the 2 up to 3... actually 29.27 rounds to 29.3 at 3 s.f. because the digit after 2 is 7).\n- Step 2: Include **units** where applicable (e.g. \"29.3 km\"). Omitting units when the question specifies them (e.g. \"distances in km\") can cost a mark. Also, never round intermediate steps — only the final answer.", "source": "GLM 5.1 ③", "_id": "glm_3_50", "judge_pick": false}, {"question": "What are the four key percentage-point $$z$$-values you should memorize for S1, and what tail probabilities do they correspond to? (1 step)", "answer": "- Step 1: $$z_{0.05} = 1.6449$$ (5% upper tail), $$z_{0.025} = 1.9600$$ (2.5% upper tail), $$z_{0.01} = 2.3263$$ (1% upper tail), $$z_{0.005} = 2.5758$$ (0.5% upper tail). These four values appear repeatedly in S1 papers and are not always easy to look up quickly under exam pressure. Memorizing them saves time and reduces the risk of using the wrong table.", "source": "GLM 5.1 ③", "_id": "glm_3_51", "judge_pick": false}, {"question": "When solving the two-equation normal system in Q7(c), after finding $$k = 42.2$$ and $$r = 476$$, what specific numerical checks do you perform? (2 steps)", "answer": "- Step 1: Check equation 1: $$(476 - 520)/42.2 = -44/42.2 = -1.043$$... wait, let me be more precise. $$(476.25 - 520)/42.22 = -43.75/42.22 = -1.036$$ ✓ (matches $$z = -1.0364$$ for the 0.15 lower tail).\n- Step 2: Check equation 2: $$(3 \\times 476.25 - 800 - 520)/42.22 = (1428.75 - 1320)/42.22 = 108.75/42.22 = 2.576$$ ✓ (matches $$z = 2.5758$$ for the 0.005 upper tail). Both checks confirm the solution is consistent with the original probability statements.", "source": "GLM 5.1 ③", "_id": "glm_3_52", "judge_pick": true}, {"question": "In Q3(c), why is the answer 40 and not some fraction obtained by interpolating within the box? What principle overrides interpolation here? (2 steps)", "answer": "- Step 1: The question asks for the **maximum number** of salmon in $$(4600, 7700]$$. Since 4600 > median = 4000, every such salmon is above the median. By definition, at most 40 of 81 values are strictly above the median.\n- Step 2: This is a **counting principle** question, not an interpolation question. The median's definition gives a hard upper bound on the number of values above it — no interpolation within the box can override this. The maximum is 40 regardless of how the values are distributed within the upper half.", "source": "GLM 5.1 ③", "_id": "glm_3_53", "judge_pick": true}, {"question": "When a \"show that\" question asks you to verify a printed answer, what must you show on your script beyond just the final number? (2 steps)", "answer": "- Step 1: Show the **full working** with the formula written out, intermediate values to ≥ 4 s.f., and the final rounded answer matching the printed value. E.g. for Q2(c): compute $$b = 25.36733/5.3173 = 4.77073 \\approx 4.77$$, then $$a = 19.85333 - 4.77073 \\times 7.65333 = -16.65991 \\approx -16.7$$.\n- Step 2: The examiner needs to see that you arrived at the answer by correct method, not by working backwards. If you just write \"$$b = 4.77$$, $$a = -16.7$$, therefore $$w = -16.7 + 4.77t$$ ✓\" without showing the intermediate calculations, you risk losing method marks even if the answer is correct.", "source": "GLM 5.1 ③", "_id": "glm_3_54", "judge_pick": false}, {"question": "When substituting coding into a regression line (Q2g), you need to express the original variables in terms of the coded ones. Given $$x = t - 6$$ and $$y = w/2 - 5$$, what are $$t$$ and $$w$$ in terms of $$x$$ and $$y$$? (2 steps)", "answer": "- Step 1: From $$x = t - 6$$: rearrange to get $$t = x + 6$$. Just add 6 to both sides.\n- Step 2: From $$y = w/2 - 5$$: add 5 to get $$y + 5 = w/2$$, then multiply by 2 to get $$w = 2(y + 5) = 2y + 10$$. The pitfall: writing $$w = 2y - 5$$ or $$w = 2y - 10$$ by incorrectly reversing the operations. Work step by step: add 5, then multiply by 2.", "source": "GLM 5.1 ③", "_id": "glm_3_55", "judge_pick": false}, {"question": "In the formula $$\\text{Var}(x) = \\frac{\\sum x^2}{n} - \\bar{x}^2$$, why is the second term subtracted? What would go wrong if you added it? (2 steps)", "answer": "- Step 1: Variance measures the average squared deviation from the mean: $$\\text{Var}(x) = \\frac{\\sum(x - \\bar{x})^2}{n}$$. Expanding $$(x - \\bar{x})^2 = x^2 - 2x\\bar{x} + \\bar{x}^2$$ and summing gives $$\\sum x^2 - 2\\bar{x}\\sum x + n\\bar{x}^2 = \\sum x^2 - 2n\\bar{x}^2 + n\\bar{x}^2 = \\sum x^2 - n\\bar{x}^2$$. Dividing by $$n$$ yields $$\\frac{\\sum x^2}{n} - \\bar{x}^2$$.\n- Step 2: Adding instead of subtracting would give $$\\frac{\\sum x^2}{n} + \\bar{x}^2$$, which is always larger than the correct variance (since $$\\bar{x}^2 > 0$$ for non-zero mean). This would also violate the property that $$\\text{Var}(x) \\ge 0$$ for data symmetric about zero, since the \"variance\" could exceed $$\\sum x^2/n$$.", "source": "GLM 5.1 ③", "_id": "glm_3_56", "judge_pick": true}, {"question": "For a Bayes-style question, what is the general formula for $$P(L_i \\mid R)$$, and what does each term represent intuitively? (3 steps)", "answer": "- Step 1: $$P(L_i \\mid R) = \\frac{P(L_i) \\cdot P(R \\mid L_i)}{\\sum_j P(L_j) \\cdot P(R \\mid L_j)}$$. The numerator is the joint probability of being in category $$L_i$$ AND being red.\n- Step 2: The denominator is the total probability of being red — it's the sum of joint probabilities across all categories. It acts as a **normalizing constant** ensuring the posterior probabilities sum to 1.\n- Step 3: Intuitively, Bayes \"reverses the conditioning\": the question gives you $$P(R \\mid L_i)$$ (probability of red given the label), and you need $$P(L_i \\mid R)$$ (probability of the label given that it's red). The formula flips the direction using the joint probability as the bridge.", "source": "GLM 5.1 ③", "_id": "glm_3_57", "judge_pick": false}, {"question": "What is the single highest-leverage drill identified in the weakness analysis, and why? (2 steps)", "answer": "- Step 1: **Variance under linear transformation**: master $$\\text{Var}(aY + b) = a^2\\text{Var}(Y)$$ in isolation. This is flagged as the single highest-leverage drill because Q5(e) becomes a 90-second computation rather than a 4-minute risk if you have this formula locked in.\n- Step 2: The three failure modes it eliminates: (1) writing $$-2\\text{Var}(Y)$$ instead of $$4\\text{Var}(Y)$$, (2) writing $$2\\text{Var}(Y)$$ instead of $$4\\text{Var}(Y)$$, (3) including the constant: $$\\text{Var}(15 - 2Y) + 15$$ or similar nonsense. One formula, properly drilled, eliminates all three.", "source": "GLM 5.1 ③", "_id": "glm_3_58", "judge_pick": true}, {"question": "When a histogram has equal class widths (all width 10), does the height of each bar directly represent the frequency? Why or why not, and what changes when widths are unequal? (2 steps)", "answer": "- Step 1: When widths are equal, height (FD) = frequency/width = frequency/10. So the heights are **proportional** to the frequencies — the ranking of bar heights matches the ranking of frequencies. You can read off relative sizes directly.\n- Step 2: When widths are **unequal**, height = frequency/width, so a tall narrow bar might represent fewer people than a short wide bar. You must always use $$f = \\text{FD} \\times w$$ — never assume height alone equals frequency. This is the entire reason histograms use frequency density rather than frequency on the y-axis.", "source": "GLM 5.1 ③", "_id": "glm_3_59", "judge_pick": true}, {"question": "In Q6(b), to \"show that $$P(B) = 0.18$$\", you need $$P(A \\cap B)$$. What formula converts $$P(B \\mid A)$$ and $$P(A)$$ into $$P(A \\cap B)$$? (2 steps)", "answer": "- Step 1: The multiplication rule: $$P(A \\cap B) = P(A) \\cdot P(B \\mid A)$$. Given $$P(A) = 0.1$$ and $$P(B \\mid A) = 0.3$$: $$P(A \\cap B) = 0.1 \\times 0.3 = 0.03$$.\n- Step 2: This is the \"reverse\" of the conditional probability formula $$P(B \\mid A) = P(A \\cap B)/P(A)$$. When you know the conditional and the marginal, multiply to get the joint. This joint is then the key input to inclusion–exclusion for finding $$P(B)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_60", "judge_pick": false}, {"question": "In a Venn diagram with three sets where $$A \\cap C = \\emptyset$$, how should the circles be drawn, and what does this look like visually? (2 steps)", "answer": "- Step 1: Circles $$A$$ and $$C$$ must be drawn as **completely separate** — no overlapping region between them at all. They can be on opposite sides of the diagram, with circle $$B$$ overlapping each of them independently.\n- Step 2: Visually, $$B$$ acts as a \"bridge\" between the disjoint $$A$$ and $$C$$: the $$A \\cap B$$ region has probability 0.03, the $$B \\cap C$$ region has probability 0.09, but there is no region where all three overlap. The \"0\" in the $$A \\cap C$$ region (and the triple intersection) should be explicitly written on the diagram.", "source": "GLM 5.1 ③", "_id": "glm_3_61", "judge_pick": false}, {"question": "What does it mean for the PMCC to be \"dimensionless\", and why does this imply that doubling all weights doesn't change $$r$$? (2 steps)", "answer": "- Step 1: Dimensionless means $$r$$ has **no units** — it's a pure number between −1 and 1. It measures the *pattern* of association, not the *scale* of the variables. If weight is in grams or kilograms, $$r$$ is the same.\n- Step 2: Doubling all weights is a positive linear transformation ($$w \\to 2w$$). Since $$r$$ is invariant under positive linear coding, $$r$$ doesn't change. The scatter plot stretches vertically by a factor of 2, but the linear pattern (tightness of clustering around the line) is identical. This is why Q2(f) gives $$r_{xy} = r_{tw}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_62", "judge_pick": true}, {"question": "When you see \"estimate\" in a histogram question (e.g. \"estimate the number of people who travel between 22 km and 45 km\"), what assumption are you making about the data within each class? (1 step)", "answer": "- Step 1: You assume the data are **uniformly distributed** within each class — every sub-interval of the same width within a class contains the same number of observations. This is why you can pro-rate: if the full class [20, 30) has 70 people, then the sub-interval [22, 30) with width 8 out of 10 has $$\\frac{8}{10} \\times 70 = 56$$ people. Without this assumption, partial-bar estimation would be unjustified.", "source": "GLM 5.1 ③", "_id": "glm_3_63", "judge_pick": false}, {"question": "In the context of Q7(b), what does \"5 independent bags\" require you to state explicitly on your script before computing, and why? (2 steps)", "answer": "- Step 1: State that the bags are **independent** — this justifies multiplying the individual probabilities. Write: \"Since the bags are independent, $$P(\\text{all 5} < 510) = [P(J < 510)]^5$$.\"\n- Step 2: Without stating independence, the step $$0.6554^5$$ has no justification. If the bags were dependent (e.g., from the same batch), you couldn't simply multiply. The examiner awards a method mark for recognizing and stating the independence assumption, even if the arithmetic that follows has a minor slip.", "source": "GLM 5.1 ③", "_id": "glm_3_64", "judge_pick": true}, {"question": "When computing $$E(Y)$$ from a tabulated pmf, what is the formula, and what is a quick sanity check on the result? (2 steps)", "answer": "- Step 1: $$E(Y) = \\sum y \\cdot P(Y = y)$$. For the Q5 data: $$\\frac{1(2) + 2(1) + 3(1) + 4(8) + 5(17) + 6(1)}{30} = \\frac{130}{30} = \\frac{13}{3} \\approx 4.33$$.\n- Step 2: Sanity check: since $$P(Y = 5) = 17/30$$ is by far the largest probability, the mean should be close to 5. The value 4.33 is reasonable — it's pulled slightly below 5 by the smaller values. If you got a mean of 1.5 or 6.2, something would be wrong.", "source": "GLM 5.1 ③", "_id": "glm_3_65", "judge_pick": true}, {"question": "When a question asks you to \"write down\" a value (e.g. Q2f: \"write down the value of the PMCC between $$x$$ and $$y$$\"), what does this signal about the expected working? (2 steps)", "answer": "- Step 1: \"Write down\" means **no working is required** — the answer follows directly from a known property. Here, PMCC is invariant under positive linear coding, so $$r_{xy} = r_{tw} = 0.827$$. Just write the answer.\n- Step 2: If you find yourself doing a full calculation for a \"write down\" question, you've missed a shortcut. Stop and think: what property makes this trivial? The question is testing whether you *know the property*, not whether you can compute.", "source": "GLM 5.1 ③", "_id": "glm_3_66", "judge_pick": false}, {"question": "When filling a Venn diagram, after computing all seven interior regions, what final step must you always perform, and what does it catch? (2 steps)", "answer": "- Step 1: Compute the **outside region**: $$P(\\text{outside}) = 1 - \\sum(\\text{all seven interior regions})$$. In Q6: $$1 - (0.07 + 0.06 + 0.41 + 0.03 + 0 + 0.09 + 0) = 1 - 0.66 = 0.34$$.\n- Step 2: Verify all **eight regions sum to 1**: $$0.07 + 0.06 + 0.41 + 0.03 + 0 + 0.09 + 0 + 0.34 = 1.00$$ ✓. If they don't sum to 1, you've made an arithmetic error somewhere — go back and check each subtraction. This check is your safety net.", "source": "GLM 5.1 ③", "_id": "glm_3_67", "judge_pick": false}, {"question": "When a probability tree has two levels (label then colour), how many branch-probability pairs must be labelled in total, and what must be true about each pair? (2 steps)", "answer": "- Step 1: Three first-level branches (A, B, C) each split into two second-level branches (red, not red), giving **6 branch probabilities** at the second level, plus 3 at the first level — 9 probabilities in total. Each first-level branch splits into a pair summing to 1 (e.g. 0.02 + 0.98 = 1).\n- Step 2: At every split point, the probabilities must sum to 1. If they don't, you've made an error (e.g. writing 0.2 instead of 0.02 for the red probability under A). This is a quick verification: 0.02 + 0.98 = 1, 0.04 + 0.96 = 1, 0.06 + 0.94 = 1.", "source": "GLM 5.1 ③", "_id": "glm_3_68", "judge_pick": false}, {"question": "When you see the phrase \"given that\" in a probability question (e.g. \"given that the counter is red\"), what type of probability is being asked for, and what is the formula template you write down first? (2 steps)", "answer": "- Step 1: \"Given that\" signals a **conditional probability** — $$P(\\text{first event} \\mid \\text{given condition})$$. In Q4(d): \"Given the counter is red, find $$P(\\text{labelled C})$$\" means $$P(C \\mid R)$$.\n- Step 2: Write down the conditional probability formula **before substituting**: $$P(C \\mid R) = \\frac{P(C \\cap R)}{P(R)}$$. Or in Bayes form: $$P(C \\mid R) = \\frac{P(C) \\cdot P(R \\mid C)}{P(R)}$$. This structure prevents you from inverting the condition and answering $$P(R \\mid C) = 0.06$$ instead.", "source": "GLM 5.1 ③", "_id": "glm_3_69", "judge_pick": false}, {"question": "What is the relationship between the \"show that\" answer and your intermediate precision, specifically for Q2(c) where the printed line is $$w = -16.7 + 4.77t$$? (2 steps)", "answer": "- Step 1: Your unrounded intermediate values must produce the printed answer when rounded to 3 s.f. $$b = 4.77073$$ rounds to 4.77 ✓ and $$a = -16.65991$$ rounds to −16.7 ✓. If you had rounded $$S_{tw}$$ to 25.4 early, then $$b = 25.4/5.3173 = 4.776$$, which rounds to 4.78 — one mark lost.\n- Step 2: The \"show that\" format means the answer is given to 3 s.f., but your working must carry more precision. Quote table values to 4 d.p. (e.g. $$\\Phi(0.4) = 0.6554$$), compute $$S$$-values to at least 5 s.f., and only round at the very end.", "source": "GLM 5.1 ③", "_id": "glm_3_70", "judge_pick": false}, {"question": "In Q5(d), when solving $$Y \\le 15 - 2Y$$, why is it important to show all three lines of algebraic manipulation on your script? (2 steps)", "answer": "- Step 1: Show: $$Y \\le 15 - 2Y \\Rightarrow 3Y \\le 15 \\Rightarrow Y \\le 5$$. Each line earns a method mark — skipping from the first to the last line risks losing the intermediate mark if the examiner can't follow your logic.\n- Step 2: The key insight is recognizing that $$X = 15 - 2Y$$ is a **deterministic** relationship, not a separate random variable. The inequality reduces to a single-variable problem. Showing this reduction explicitly demonstrates understanding and earns full marks even if there's a minor arithmetic slip later.", "source": "GLM 5.1 ③", "_id": "glm_3_71", "judge_pick": false}, {"question": "A histogram bar covers [0, 20) with FD = 3. What is the frequency of this class? (1 step)", "answer": "- Step 1: $$f = \\text{FD} \\times w = 3 \\times 20 = 60$$. The width is the class width (upper − lower bound), and frequency density times width gives the frequency.", "source": "GLM 5.1 ③", "_id": "glm_3_72", "judge_pick": false}, {"question": "If $$\\text{Var}(Y) = 10$$, what is $$\\text{Var}(3Y - 7)$$? (2 steps)", "answer": "- Step 1: Apply $$\\text{Var}(aY + b) = a^2 \\text{Var}(Y)$$. Here $$a = 3$$, $$b = -7$$.\n- Step 2: $$\\text{Var}(3Y - 7) = 3^2 \\times 10 = 90$$. The −7 is a shift and has no effect on variance. The 3 is squared to give 9.", "source": "GLM 5.1 ③", "_id": "glm_3_73", "judge_pick": false}, {"question": "If $$P(A) = 0.4$$ and $$P(B \\mid A) = 0.5$$, what is $$P(A \\cap B)$$? (1 step)", "answer": "- Step 1: $$P(A \\cap B) = P(A) \\cdot P(B \\mid A) = 0.4 \\times 0.5 = 0.2$$. The multiplication rule converts a conditional probability into a joint probability.", "source": "GLM 5.1 ③", "_id": "glm_3_74", "judge_pick": false}, {"question": "If $$P(A) = 0.3$$, $$P(B) = 0.4$$, and $$A$$, $$B$$ are independent, what is $$P(A \\cap B)$$? (1 step)", "answer": "- Step 1: $$P(A \\cap B) = P(A) \\cdot P(B) = 0.3 \\times 0.4 = 0.12$$. Independence means the joint probability equals the product of marginals.", "source": "GLM 5.1 ③", "_id": "glm_3_75", "judge_pick": false}, {"question": "A normal variable has $$\\mu = 100$$, $$\\sigma = 10$$. Find the $$z$$-value for $$x = 85$$. (1 step)", "answer": "- Step 1: $$z = \\frac{x - \\mu}{\\sigma} = \\frac{85 - 100}{10} = \\frac{-15}{10} = -1.5$$. Since 85 is below the mean, $$z$$ is negative — consistent with the sketch.", "source": "GLM 5.1 ③", "_id": "glm_3_76", "judge_pick": false}, {"question": "If $$P(J < 510) = 0.6554$$ for one bag, and 3 independent bags are tested, what is the probability all 3 yield less than 510? (1 step)", "answer": "- Step 1: $$P(\\text{all 3} < 510) = (0.6554)^3 = 0.281$$. Independence means you multiply (raise to the power), not multiply by 3.", "source": "GLM 5.1 ③", "_id": "glm_3_77", "judge_pick": false}, {"question": "If coded data have $$\\bar{x} = 12$$ and the coding is $$x = y - 50$$, what is $$\\bar{y}$$? (1 step)", "answer": "- Step 1: $$\\bar{y} = \\bar{x} + 50 = 12 + 50 = 62$$. Reverse the shift: since the coding subtracts 50, the original mean is 50 more than the coded mean.", "source": "GLM 5.1 ③", "_id": "glm_3_78", "judge_pick": false}, {"question": "If coded data have $$\\text{Var}(x) = 25$$ and the coding is $$x = y - 50$$, what is $$\\text{Var}(y)$$? (1 step)", "answer": "- Step 1: $$\\text{Var}(y) = \\text{Var}(x) = 25$$. Variance is invariant under translation — the shift of 50 has no effect on the spread.", "source": "GLM 5.1 ③", "_id": "glm_3_79", "judge_pick": false}], "count": 80}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "When asked to estimate the number of people in a partial class of a histogram (e.g., [22,45) km), what is the first step you should take to avoid common mistakes? (3 steps)", "answer": "- Step 1: Calibrate the frequency density (FD) using a known class. For example, if [10,20) km has 60 people and FD = 6, verify $ f = \\text{FD} \\times \\text{width} $ (6×10=60 ✓).  \n- Step 2: For partial classes (e.g., [22,30) km), calculate frequency as $ \\text{FD} \\times \\text{slice width} $ (e.g., FD=7, width=8 ⇒ 7×8=56).  \n+ Ensure slice width is measured correctly (e.g., 30−22=8 km).  \n- Step 3: Sum frequencies across all relevant slices (full and partial bars).  \n\n**Key takeaway:** Always calibrate FD first, then compute each partial-class frequency separately before summing.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "What is the trigger phrase that forces you to use the conditional probability formula $ P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)} $? (2 steps)", "answer": "- Step 1: The phrase \"given that B\" or \"given B occurs\" in the question.  \n- Step 2: Write down the formula before substituting numbers.  \n+ Example: \"Given that a person travels between 10–20 km\" in Q1(a) triggers conditional probability logic.  \n\n**Key takeaway:** Always write the formula explicitly when \"given\" appears to avoid confusion with $ P(B \\mid A) $.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "When calculating the median for grouped data, why do you use $ n/2 $ instead of $ (n+1)/2 $? (2 steps)", "answer": "- Step 1: Grouped data assumes continuous variables, so the median position is at $ n/2 $ (not discrete data).  \n- Step 2: For example, with $ n=274 $, the median is the 137th value, not $ (274+1)/2 = 137.5 $.  \n+ This aligns with interpolation in grouped classes (e.g., Q1(b): median = 30 + (137−135)/100×10 = 30.2 km).  \n\n**Key takeaway:** Use $ n/2 $ for continuous grouped data; $ (n+1)/2 $ is for discrete ungrouped data.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "How do you recognize when to use the product moment correlation coefficient (PMCC) invariance under coding? (2 steps)", "answer": "- Step 1: Look for coding statements like $ x = t - 6 $ or $ y = \\frac{w}{2} - 5 $.  \n- Step 2: Confirm coding is linear with positive scale factors (e.g., $ t \\mapsto x $ has scale +1, $ w \\mapsto y $ has scale +1/2).  \n+ PMCC remains unchanged if both codings are positive-linear (e.g., Q2(f): $ r_{xy} = r_{tw} = 0.827 $).  \n\n**Key takeaway:** PMCC is invariant under positive-linear coding (shifts and positive scalings), but not under non-linear or negative scalings.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "What is the trick for simplifying $ P(Y \\le X) $ when $ X = 15 - 2Y $? (3 steps)", "answer": "- Step 1: Substitute $ X $ into the inequality: $ Y \\le 15 - 2Y $.  \n- Step 2: Solve algebraically: $ 3Y \\le 15 \\Rightarrow Y \\le 5 $.  \n- Step 3: Compute $ P(Y \\le 5) = 1 - P(Y=6) $ (since $ Y $ is discrete).  \n+ Example: In Q5(d), this simplifies to $ 1 - 1/30 = 29/30 $.  \n\n**Key takeaway:** Treat $ X $ as a deterministic function of $ Y $, not an independent variable. Solve the inequality algebraically first.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "How do you distinguish between mutually exclusive and independent events in probability? (2 steps)", "answer": "- Step 1: Mutually exclusive events cannot occur together: $ P(A \\cap C) = 0 $.  \n- Step 2: Independent events satisfy $ P(A \\cap C) = P(A)P(C) $.  \n+ Example: In Q6, $ A \\cap C = \\emptyset $ (mutually exclusive), but $ B \\cap C = P(B)P(C) $ (independent).  \n\n**Key takeaway:** Mutually exclusive ⇒ zero overlap; independent ⇒ overlap probability equals product of marginals.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "What is the first step when solving a two-equation system for normal distribution parameters $ \\mu $ and $ \\sigma $? (2 steps)", "answer": "- Step 1: Convert probabilities into z-scores using standard normal tables.  \n+ For lower tails (e.g., $ P(R < r) = 0.15 $), use negative z-scores (e.g., $ z = -1.0364 $).  \n+ For upper tails (e.g., $ P(R > 3r - 800) = 0.005 $), use positive z-scores (e.g., $ z = 2.5758 $).  \n- Step 2: Write equations in terms of $ \\mu $ and $ \\sigma $ (e.g., $ r = \\mu + z_1\\sigma $, $ 3r - 800 = \\mu + z_2\\sigma $).  \n\n**Key takeaway:** Always sketch the normal curve and sign of z-scores before solving equations algebraically.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Why is variance invariant under a shift in the data (e.g., $ \\mathrm{Var}(x+a) = \\mathrm{Var}(x) $)? (2 steps)", "answer": "- Step 1: Variance measures spread, not location. Adding a constant shifts all data equally but doesn’t change distances between points.  \n- Step 2: Mathematically, $ \\mathrm{Var}(x+a) = E[(x+a - \\bar{x} - a)^2] = E[(x - \\bar{x})^2] = \\mathrm{Var}(x) $.  \n+ Example: In Q3(b), $ \\mathrm{Var}(l) = \\mathrm{Var}(x) $ since $ l = x + 600 $.  \n\n**Key takeaway:** Shifting data (adding/subtracting a constant) doesn’t affect spread; variance only changes with scaling.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "What is the trick for handling negative z-scores in inverse normal problems (e.g., Q7(a)(ii))? (2 steps)", "answer": "- Step 1: For lower-tail probabilities (e.g., $ P(J < d) = 0.0808 $), look up the corresponding upper-tail value in the percentage-point table.  \n+ Example: $ \\Phi(-z) = 0.9192 \\Rightarrow -z = 1.40 \\Rightarrow z = -1.40 $.  \n- Step 2: Compute $ d = \\mu + z\\sigma = 500 - 1.40×25 = 465 $.  \n+ Avoid the common mistake of using positive z-scores for lower tails.  \n\n**Key takeaway:** For lower-tail probabilities, find the z-score for $ 1 - P $ and make it negative.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "How do you determine the maximum number of data points in a box plot interval like $ 4600 < w \\le 7700 $? (2 steps)", "answer": "- Step 1: Compare the interval bound to the median (4000) and upper quartile (5500).  \n- Step 2: Since $ 4600 > \\text{median} $, the interval contains only values > median. With $ n=81 $, at most $ \\lfloor 81/2 \\rfloor = 40 $ points lie strictly above the median.  \n+ Example: In Q3(c), the answer is 40 even though the interval spans from above median to max.  \n\n**Key takeaway:** For bounds > median, the max count is $ \\lfloor n/2 \\rfloor $; no interpolation needed.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "Why is it incorrect to compute $ P(C \\mid R) $ as $ P(R \\mid C) $ in Bayes' problems? (2 steps)", "answer": "- Step 1: Bayes’ theorem requires $ P(C \\mid R) = \\frac{P(C)P(R \\mid C)}{P(R)} $, not just $ P(R \\mid C) $.  \n- Step 2: The denominator $ P(R) $ accounts for all paths to R (e.g., $ P(A)P(R|A) + P(B)P(R|B) + P(C)P(R|C) $).  \n+ Example: In Q4(d), $ P(C \\mid R) = 0.015/0.039 = 0.385 $, not 0.06.  \n\n**Key takeaway:** Always normalize by $ P(R) $ to account for all possible causes of R.", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "How do you fill regions in a three-set Venn diagram when given mutual exclusivity and independence? (3 steps)", "answer": "- Step 1: Start with the intersection of all three sets (e.g., $ A \\cap B \\cap C $).  \n+ If $ A \\cap C = \\emptyset $, set $ A \\cap B \\cap C = 0 $.  \n- Step 2: Use independence to find $ P(B \\cap C) = P(B)P(C) $.  \n- Step 3: Fill remaining regions (e.g., $ B \\cap C $ only, $ A $ only) using inclusion-exclusion.  \n+ Example: In Q6(c), $ B \\cap C $ only = $ 0.09 - 0 = 0.09 $.  \n\n**Key takeaway:** Fill from the center outward, respecting mutual exclusivity and independence constraints.", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "What is the formula for $ \\mathrm{Var}(aY + b) $ and why is it crucial to square $ a $? (2 steps)", "answer": "- Step 1: $ \\mathrm{Var}(aY + b) = a^2 \\mathrm{Var}(Y) $.  \n- Step 2: Squaring $ a $ reflects the effect of scaling on spread (e.g., doubling distances squares variance).  \n+ Example: In Q5(e), $ \\mathrm{Var}(15 - 2Y) = (-2)^2 \\times \\mathrm{Var}(Y) = 4 \\times 61/45 = 244/45 $.  \n\n**Key takeaway:** Variance scales by $ a^2 $, not $ a $; constants (b) have no effect.", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "When should you use the percentage-point table versus the body table for normal distribution problems? (2 steps)", "answer": "- Step 1: Use the percentage-point table for extreme tail probabilities (e.g., $ P(Z > z) = 0.005 \\Rightarrow z = 2.5758 $).  \n- Step 2: Use the body table for probabilities like $ P(Z < z) = 0.6554 \\Rightarrow z = 0.4 $.  \n+ Example: In Q7(c), $ P(R > 3r - 800) = 0.005 $ uses percentage-point value $ z = 2.5758 $.  \n\n**Key takeaway:** Percentage-point tables list z-values for rare tail probabilities (e.g., 0.005, 0.01); body tables for cumulative probabilities up to z.", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": true}, {"question": "How do you reverse-code a variable to find the original mean? (2 steps)", "answer": "- Step 1: If $ x = l - 600 $, then $ \\bar{l} = \\bar{x} + 600 $.  \n- Step 2: Compute $ \\bar{x} = \\frac{\\sum x}{n} $, then reverse the shift.  \n+ Example: In Q3(a), $ \\bar{x} = 3711/81 = 45.8148 \\Rightarrow \\bar{l} = 645.8 $ mm.  \n\n**Key takeaway:** Coding shifts or scales data; reverse the operation to recover original statistics.\n```", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}], "count": 15}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "S1 May 2023 Q1(a) - What is the first step when estimating frequencies from a histogram with given calibration data? (3 steps)", "answer": "- Step 1: Compute frequency density (FD) for the provided class using known frequency:  \n  $ \\text{FD} = \\frac{\\text{Frequency}}{\\text{Class Width}} $.  \n  + Example: For 60 people in [10,20km), FD = 60/10 = 6.  \n- Step 2: Use this FD scale to read frequencies for other bars via $ f = \\text{FD} \\times \\text{Width} $.  \n- Step 3: For partial-class queries (e.g., [22,45km)), break into full/partial segments and sum individual frequencies.\n\n**Key takeaway:** Calibration determines the FD scale; never read FD directly from the axis.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "S1 May 2023 Q2(c) - How do you show a regression line equation matches the given form without errors? (4 steps)", "answer": "- Step 1: Calculate $ b = \\frac{S_{tw}}{S_{tt}} $ to 4+ decimal places before rounding.  \n- Step 2: Compute intercept $ a = \\bar{w} - b\\bar{t} $ using unrounded b.  \n- Step 3: Round b and a *after* verifying they match the printed coefficients (e.g., 4.77 and -16.7).  \n- Step 4: Write the equation in context (e.g., \"w = -16.7 + 4.77t\").\n\n**Motivation:** Premature rounding leads to mismatched coefficients in \"show that\" questions.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "S1 May 2023 Q3(b) - Why does variance remain unchanged when reversing the shift $ x = l - 600 $? (2 steps)", "answer": "- Step 1: Variance measures spread, unaffected by location shifts.  \n- Step 2: $ \\text{Var}(l) = \\text{Var}(x + 600) = \\text{Var}(x) $ since adding constants doesn't alter spread.\n\n**Common pitfall:** Adding/subtracting 600 to variance (incorrect). Always apply $ \\text{Var}(ax + b) = a^2\\text{Var}(x) $.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "S1 May 2023 Q4(d) - What is the correct structure of Bayes' formula for $ P(C \\mid R) $? (3 steps)", "answer": "- Step 1: Write Bayes' formula:  \n  $ P(C \\mid R) = \\frac{P(C) \\cdot P(R \\mid C)}{P(R)} $.  \n- Step 2: Compute $ P(R) $ via total probability:  \n  $ P(R) = P(A)P(R \\mid A) + P(B)P(R \\mid B) + P(C)P(R \\mid C) $.  \n- Step 3: Substitute values and simplify.\n\n**Contrast:** Confusing $ P(C \\mid R) $ with $ P(R \\mid C) $ leads to 0.06 → 0.385.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "S1 May 2023 Q5(e) - Why is $ \\text{Var}(X) = 4 \\cdot \\text{Var}(Y) $ when $ X = 15 - 2Y $? (2 steps)", "answer": "- Step 1: Variance is invariant under shifts (15 is irrelevant).  \n- Step 2: Scaling by -2 squares: $ \\text{Var}(-2Y) = (-2)^2 \\cdot \\text{Var}(Y) = 4 \\cdot \\text{Var}(Y) $.\n\n**Error to avoid:** Using -2 or 2 instead of 4 as the multiplier.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": true}, {"question": "S1 May 2023 Q6(c) - How to handle independence vs. mutual exclusivity in Venn diagrams? (3 steps)", "answer": "- Step 1: For mutual exclusivity $ P(A \\cap C) = 0 $, set overlapping regions to 0.  \n- Step 2: For independence $ P(B \\cap C) = P(B)P(C) $, compute and assign value.  \n- Step 3: Fill regions from center outward, ensuring total probabilities sum to 1.\n\n**Key distinction:** Independent events have non-zero intersection; mutually exclusive events have $ P(A \\cap B) = 0 $.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "S1 May 2023 Q7(a)(ii) - Why is the z-score negative for $ P(J > d) = 0.9192 $? (2 steps)", "answer": "- Step 1: Recognize that $ P(J > d) > 0.5 $ implies d is below the mean.  \n- Step 2: Use $ \\Phi(-z) = 0.9192 \\Rightarrow z = -1.40 $ from standard normal tables.\n\n**Visual intuition:** Sketch the distribution – high upper-tail probability means z is left of the mean.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "S1 May 2023 Q3(c) - How to determine the maximum number of values in $ 4600 < w \\leq 7700 $? (2 steps)", "answer": "- Step 1: Compare bound (4600) to median (4000): values >4600 are strictly above median.  \n- Step 2: At most $ \\lfloor \\frac{n}{2} \\rfloor $ values can lie strictly above the median (here 40/81).\n\n**Error to avoid:** Trying to interpolate within the interquartile range instead of using positional definitions.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "S1 May 2023 Q7(c) - How to set up two equations for normal distribution parameters $ r $ and $ k $? (3 steps)", "answer": "- Step 1: Convert probabilities to z-scores:  \n  $ P(R < r) = 0.15 \\Rightarrow z_1 = -1.0364 $,  \n  $ P(R > 3r - 800) = 0.005 \\Rightarrow z_2 = 2.5758 $.  \n- Step 2: Form equations:  \n  $ \\frac{r - 520}{k} = -1.0364 $,  \n  $ \\frac{3r - 1320}{k} = 2.5758 $.  \n- Step 3: Solve the system algebraically (e.g., substitution).\n\n**Critical check:** Verify solutions satisfy both original probability conditions.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "S1 May 2023 Q2(g) - Why substitute coding into the original regression line instead of recalculating? (2 steps)", "answer": "- Step 1: Express original variables in terms of coded variables:  \n  $ t = x + 6 $, $ w = 2(y + 5) $.  \n- Step 2: Substitute into $ w = -16.7 + 4.77t $:  \n  $ 2(y + 5) = -16.7 + 4.77(x + 6) $.\n\n**Efficiency:** Avoids recalculating $ S_{xy} $, $ S_{xx} $, which would require redundant steps.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}], "count": 10}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "When a question asks for the number of people in a partial class interval (e.g., \"between 22 km and 45 km\"), what's the trap that causes students to lose marks, and how do you avoid it? (2 steps)", "answer": "- Step 1: The trap is treating partial bars as if they were full bars or guessing visually — you must calculate frequency for each slice using f = FD × actual width.\n- Step 2: For [22,30): width = 8, FD = 7 → f = 8×7 = 56. For [40,45): width = 5, FD = 3 → f = 5×3 = 15. Never eyeball — always multiply.\n\n**Key principle:** Every shaded rectangle = FD × slice width. This is called \"pro-rating.\"", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "For grouped data in S1, what's the correct position formula for the median — n/2 or (n+1)/2? Why does it matter? (2 steps)", "answer": "- Step 1: For continuous grouped data, use n/2 = 274/2 = 137. Using (n+1)/2 = 275/2 = 137.5 would be incorrect.\n- Step 2: The distinction matters because (n+1)/2 is for discrete data ordered lists; for grouped continuous data (histograms), n/2 gives the position of the median class.\n\n**Key principle:** S1 histograms represent continuous data, so use n/2 for median position.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "When finding the median from grouped data, what's the most reliable method to locate which class contains the median, and what's the common error that leads to losing the answer? (2 steps)", "answer": "- Step 1: Build a cumulative frequency column BEFORE attempting the interpolation. For Q1: CF = 5, 65, 135, 235,... The median position 137 falls in [30,40).\n- Step 2: The error is subtracting frequencies sequentially in your head (e.g., \"274 - 60 = 214, still too high\") without writing the cumulative column, which causes losing track of which class contains the nth value.\n\n**Key principle:** Always write a cumulative frequency column on your script — it's a method mark and prevents arithmetic errors.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "In the formula S_xy = Σxy - (Σx)(Σy)/n, what's the sign error that students commonly make, and what's the mnemonic to avoid it? (1 step)", "answer": "The formula is S_xy = Σxy - (Σx)(Σy)/n (subtraction). Students sometimes write S_xy = Σxy + (Σx)(Σy)/n.\n**Mnemonic:** \"Sum of products minus the product of sums\" — always subtract the correction term.\n\n**Key principle:** The correction term (Σx)(Σy)/n must always be subtracted, never added.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "For a \"show that\" part in regression (e.g., showing w = -16.7 + 4.77t), what precision must you carry through your calculations to ensure the printed answer matches? (2 steps)", "answer": "- Step 1: Carry at least 5 significant figures through ALL intermediate calculations (S_tw, means, gradient b, intercept a).\n- Step 2: Only round to 3 s.f. in the final answer. If you round b to 4.77 too early, rounding errors in the intercept will cause it to fail the \"show that.\"\n\n**Key principle:** 5 s.f. minimum through working → 3 s.f. in final answer.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "In part (f) of Q2, the data was coded as x = t - 6 and y = w/2 - 5. What property of PMCC allows you to write down the answer immediately without any calculation? (1 step)", "answer": "PMCC is invariant under positive linear coding. Since both transformations have positive scale factors (x = t - 6 has scale +1; y = w/2 - 5 has scale +1/2), r_xy = r_tw = 0.827.\n**Key principle:** r is unchanged by coding of the form X = aX + b where a > 0.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "For part (g), what's the shortcut approach instead of recalculating S_xy and S_xx from the coded data, and what's the algebraic substitution you perform? (2 steps)", "answer": "- Step 1: Take the regression line from part (c): w = -16.7 + 4.77t.\n- Step 2: Substitute t = x + 6 and w = 2y + 10 (reverse the coding). Don't recompute S_xy from scratch.\n\n**Key principle:** For regression under coding, substitute the reverse coding into the existing line rather than recalculating.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "In part (e), the question asks why the regression line shouldn't be used to estimate weight at t = 2 cm. What two things must you state to get full marks? (2 steps)", "answer": "- Step 1: State that t = 2 cm is outside the range of the data (extrapolation). The data spans approximately 6.4 to 8.9 cm.\n- Step 2: Ideally also note that the prediction w = -16.7 + 4.77(2) = -7.16 g is physically impossible (negative weight), confirming the model is invalid there.\n\n**Key principle:** Both \"outside data range\" AND \"impossible prediction value\" constitute a complete answer.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "When data is coded as x = l - 600 and you're given Σx and Σx², what's the incorrect formula that students sometimes use for variance, and why is it wrong? (2 steps)", "answer": "- Step 1: Wrong: Var(l) = Var(x) - 600 or Var(l) = Var(x) + 600.\n- Step 2: Variance is invariant under translation: Var(l) = Var(x). You add/subtract the shift constant to the MEAN, not the variance. Only scaling changes variance.\n\n**Key principle:** Var(x + a) = Var(x). Variance is unaffected by adding a constant.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "In part (c) of Q3, you're asked for the maximum number of salmon with weights in 4600 < w ≤ 7700. Why is this NOT an interpolation question, and what's the key observation about the median? (2 steps)", "answer": "- Step 1: The bound 4600 > median = 4000, so every value in the interval lies strictly above the median.\n- Step 2: With n = 81, at most floor(81/2) = 40 data points can lie strictly above the median. So answer = 40.\n\n**Key principle:** Compare the bound to Q1, median, and Q3 first — sometimes no calculation is needed.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "In the outlier check for Q3(d), both the minimum (2000) and maximum (7700) appear to be within reasonable range. Why must you still calculate BOTH fences explicitly rather than just eyeballing? (1 step)", "answer": "The question requires explicit demonstration. Even if intuition says \"no outliers,\" you must compute:\n- Lower fence: Q1 - 1.5×IQR = 3000 - 3750 = -750\n- Upper fence: Q3 + 1.5×IQR = 5500 + 3750 = 9250\nThen check both min > lower fence AND max < upper fence.\n\n**Key principle:** Always compute BOTH fences and check BOTH extremes — intuition is not proof.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "In Bayes questions like Q4(d), what's the most common direction error that loses marks, and how do you physically remind yourself which way the probability flows? (2 steps)", "answer": "- Step 1: The error is giving P(R|C) = 0.06 instead of P(C|R) = 5/13 ≈ 0.385.\n- Step 2: Write Bayes formula at the top of your script: P(C|R) = P(C∩R)/P(R) = P(C)P(R|C)/P(R). The condition goes on the LEFT side of the vertical line.\n\n**Key principle:** P(A|B) ≠ P(B|A). The condition is always on the LEFT of the vertical bar in the final answer.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "When a probability question says \"the rest\" (like the 25% for category C in Q4), what's the recommended first step before drawing the tree diagram? (1 step)", "answer": "Calculate and state the missing probability explicitly: P(C) = 1 - 0.30 - 0.45 = 0.25. Write this on your tree diagram before proceeding.\n\n**Key principle:** Never leave \"the rest\" as implicit — state the calculated probability on your diagram.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "In a piecewise pmf like Q5, what's the sign error that creates negative probabilities, and what's the simple check you should do BEFORE any other calculation? (2 steps)", "answer": "- Step 1: For y = 1, 2: P(Y=y) = k(3-y). At y=1: k(3-1) = 2k (positive). If you write k(y-3), you'd get -2k (negative).\n- Step 2: ALWAYS tabulate the pmf numerically and verify all probabilities are non-negative AND sum to 1 before proceeding.\n\n**Key principle:** The formula k(3-y) gives positive probabilities for y = 1, 2. Tabulate first, check sum = 1.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "In part (d) of Q5, students sometimes try to enumerate joint pairs (Y, X) treating them as independent. What's the correct algebraic approach for P(Y ≤ X) when X = 15 - 2Y? (2 steps)", "answer": "- Step 1: Write the inequality: Y ≤ 15 - 2Y\n- Step 2: Solve algebraically: 3Y ≤ 15 → Y ≤ 5. Then P(Y ≤ X) = P(Y ≤ 5) = 1 - P(Y=6) = 1 - 1/30 = 29/30.\n\n**Key principle:** Don't enumerate joint pairs — X and Y are perfectly correlated (one determines the other). Solve the inequality.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "For the transformation X = 15 - 2Y in part (e), what's the variance scaling formula, and what's the common error that gives the wrong sign or power? (2 steps)", "answer": "- Step 1: The correct formula: Var(X) = (-2)² × Var(Y) = 4 × Var(Y).\n- Step 2: Common errors: using Var(X) = -2 × Var(Y) (misses the square) or Var(X) = 2 × Var(Y) (forgets the negative sign's square effect). The constant 15 drops out entirely (Var(a + bY) = b² Var(Y)).\n\n**Key principle:** Var(a + bY) = b² Var(Y). The constant a disappears; the coefficient b is squared.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "In Q6, there's a key conceptual distinction between \"mutually exclusive\" and \"independent.\" What's the fundamental relationship between these two concepts for events with positive probability? (1 step)", "answer": "Two events with positive probability cannot be both mutually exclusive AND independent. If P(A) > 0 and P(B) > 0:\n- Mutually exclusive: P(A ∩ B) = 0\n- Independent: P(A ∩ B) = P(A)P(B) > 0\nThese cannot both be true simultaneously.\n\n**Key principle:** Mutually exclusive ≠ independent. If events don't intersect (mutually exclusive), they cannot be independent.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "For part (c) of Q6, when filling a three-set Venn diagram, what's the recommended order to fill the regions, starting from the center? (3 steps)", "answer": "- Step 1: Fill the triple intersection A ∩ B ∩ C first (forced to be 0 here because A ∩ C = 0).\n- Step 2: Fill the pairwise intersections A ∩ B (only), B ∩ C (only), A ∩ C (only).\n- Step 3: Fill the single regions A only, B only, C only, then the outside region.\n\n**Key principle:** Fill from the center outward: triple → pairs → singles → outside. Always check sum = 1.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "In Q6(c), a common error is setting P(B ∩ C) = 0 because A and C are mutually exclusive. What information given in part (c) tells you P(B ∩ C) ≠ 0, and what's the correct value? (2 steps)", "answer": "- Step 1: Part (c) states \"B and C are independent.\" This means P(B ∩ C) = P(B)P(C).\n- Step 2: P(B ∩ C) = 0.18 × 0.5 = 0.09. This is NOT zero.\n\n**Key principle:** Don't carry forward conditions from earlier parts unless they still apply. Each part may introduce new constraints.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": true}, {"question": "For part (a)(ii) of Q7, P(J > d) = 0.9192. A student looks up Φ(z) = 0.9192 and gets z = 1.40, then calculates d = 500 + 1.40×25 = 535. Why is this wrong, and how does the sketch prevent this error? (2 steps)", "answer": "- Step 1: 0.9192 > 0.5 means the probability is in the upper tail, so d must be BELOW the mean (more than half the area is above d).\n- Step 2: Sketch first! Since P(J > d) > 0.5, shade the region to the right of d — this is more than half the curve, so d < μ. The correct z is negative: z = -1.40.\n\n**Key principle:** Sketch and shade BEFORE looking up the table. If P(X > a) > 0.5, then a < μ and z < 0.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "In part (b) of Q7, with 5 independent bags, what's the common calculation error that gets 1 mark instead of 2, and what's the correct operation? (1 step)", "answer": "- Error: Multiplying P(J < 510) by 5 (0.6554 × 5 = 3.277).\n- Correct: Raise to the 5th power: P(all 5 < 510) = (0.6554)⁵ = 0.121.\n\n**Key principle:** For independent events, \"all n\" means multiplication (raising to power n), not adding.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "In the two-equation system of part (c), what's the systematic approach to solve for r and k? (4 steps)", "answer": "- Step 1: Write both constraints in z-form: (r - 520)/k = z₁ and (3r - 1320)/k = z₂.\n- Step 2: Convert each to r = ... k form using the z-values from tables.\n- Step 3: Equate the two expressions for r.\n- Step 4: Solve for k, then substitute back to find r. Verify by substituting into both original probability statements.\n\n**Key principle:** Both equations → r = ... k form → equate → solve → verify.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "For the probability P(R < r) = 0.15 in part (c), why is the z-value negative, and how do you correctly look up this value in the percentage-point table? (2 steps)", "answer": "- Step 1: 0.15 is a lower-tail probability (< 0.5), so the z-value must be negative.\n- Step 2: Look up the percentage-point table: for lower-tail 0.15, we want Φ(z) = 0.85. The z-value for 0.85 is z = 1.0364, so z₁ = -1.0364. Alternatively, use the symmetry: z₁ = -z₀.₈₅.\n\n**Key principle:** Lower-tail (< 0.5) → negative z. Use the percentage-point table (or body table with 1 - p).", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": true}], "count": 23}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "In histogram questions, why must you never read FD values directly off the y-axis without calibrating first? (1 step)", "answer": "Because the histogram FD scale is arbitrary — it depends on the chosen class width. The y-axis may be drawn with a different scale than you'd assume. Only by calibrating against a known class (frequency AND class width given) can you convert other bar heights to actual FD values.\n\n**Key insight:** The bar height you see is proportional to FD, but you need the proportionality constant from a known point.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "When a question asks for the number of people in a partial class interval (e.g., \"between 22 km and 45 km\"), what is the formula and why can't you just multiply the full-class FD? (2 steps)", "answer": "- Step 1: Use f = FD × w where w is the actual slice width, not the full class width. The partial width must be measured from the actual boundary given.\n- Step 2: Each shaded rectangle in the histogram represents FD × width. For a partial class, you need only the portion that falls inside your required interval.\n\n**Example:** For [22, 30), width = 30 − 22 = 8 (NOT 10). So f = 8 × FD, not 10 × FD. This is the pro-rating principle — frequency is area under the histogram, not height.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "For grouped continuous data (like histogram data), what is the correct position for finding the median, and why is (n+1)/2 wrong? (2 steps)", "answer": "- Step 1: For continuous grouped data, use Position = n/2 (not (n+1)/2). With n = 274, the median position is 274/2 = 137.\n- Step 2: The (n+1)/2 formula applies to discrete ordered data. For continuous data represented by a histogram, n/2 is correct because we're interpolating within a class, not selecting a specific data point.\n\n**Key distinction:** Histogram data represent continuous measurements — the median is a position along a continuum, not a specific ranked value.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "In Q1(b), the median position is 137, falling in the [30, 40) class. What four quantities do you substitute into the median interpolation formula? (3 steps)", "answer": "- Step 1: L = 30 (lower class boundary of the median class)\n- Step 2: F = 135 (cumulative frequency up to the class BEFORE the median class)\n- Step 3: f_m = 100 (frequency WITHIN the median class), w = 10 (class width)\n\n**Formula:** median = L + [(n/2 − F) / f_m] × w = 30 + [(137 − 135) / 100] × 10 = 30.2 km\n\n**Why F = 135:** Cumulative frequency at [20, 30) is 5 + 60 + 70 = 135 — all values before the [30, 40) class.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "When calculating the mean from a histogram, why must you use class midpoints rather than class boundaries? (1 step)", "answer": "The grouped-data mean formula $\\bar{x} = \\sum f x_{mid} / \\sum f$ assumes each observation in a class is represented by its midpoint. This is an approximation — the actual mean of uniform data within each class equals the midpoint by symmetry. Using boundaries would give a systematically biased estimate.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "What three pieces of information must appear in a complete S1 histogram answer? (1 step)", "answer": "- Frequency counts (for each class or requested interval)\n- Median value (with units, to appropriate precision)\n- Mean value (with units, to 3 s.f.)\n\n**Exam tip:** Always include units (km) in your final answers — missing units can cost a mark in S1.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "What is the exact formula for S_tw, and what is the most common sign error students make? (2 steps)", "answer": "- Step 1: $S_{tw} = \\sum tw - \\frac{\\sum t \\sum w}{n}$ — note the SUBTRACTION of the product of sums term.\n- Step 2: The error is writing $S_{tw} = \\sum tw + \\frac{\\sum t \\sum w}{n}$ (adding instead of subtracting), which gives the wrong sign and typically a much larger positive value.\n\n**Memory trick:** \"Sum of products minus product of sums\" — always subtract.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "In a \"show that\" regression question, why must you carry at least 5 significant figures through all intermediate calculations? (2 steps)", "answer": "- Step 1: The printed answer (e.g., \"w = −16.7 + 4.77t\") is rounded to 3 s.f. or 2 d.p. Tiny rounding errors in your working can make your final coefficients disagree with the printed values.\n- Step 2: By carrying 5+ s.f. through S_xy, b, and a calculations, you ensure your rounded values match exactly. The mark scheme expects exact agreement with the \"show that\" result.\n\n**Example:** Using b = 25.36733/5.3173 = 4.77073... rounds to 4.77 (3 s.f.). But if you rounded b to 4.77 too early, a would be wrong.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "What does the gradient of the regression line w on t physically represent, and how must you word it for the exam? (1 step)", "answer": "\"For each addi
