$P(R \\mid C) = 0.06$ is the probability of being red *given* you're in group C (a tree-branch probability), while $P(C \\mid R) = \\frac{0.015}{0.039} \\approx 0.385$ is the probability of being in group C *given* you're red (a reverse-inference probability).\n- Step 2: Read the vertical bar carefully: $P(\\text{left} \\mid \\text{right})$ means \"probability of left *given* right.\" In $P(C \\mid R)$, you *know* the counter is red, and you're asking which label it came from. The numerator must be $P(C \\cap R)$, not just $P(R \\mid C)$. Write the formula first, then substitute.\n\nTakeaway: $P(C \\mid R) \\neq P(R \\mid C)$. Read the bar direction carefully; write Bayes' formula before substituting.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "A piecewise probability function has $P(Y=y) = k(3-y)$ for $y = 1, 2$. What are the numerical values in terms of $k$, and why must you check they're non-negative? (2 steps)", "answer": "- Step 1: For $y = 1$: $P(Y=1) = k(3-1) = 2k$. For $y = 2$: $P(Y=2) = k(3-2) = k$. These are both positive when $k > 0$. The common error is writing $k(y-3)$ instead of $k(3-y)$, which gives $k(1-3) = -2k$ — a **negative probability**, which is impossible.\n- Step 2: Probabilities must always be in $[0, 1]$. If any $P(Y=y)$ comes out negative, you have a sign error in the formula. Always tabulate the pmf numerically (in terms of $k$) and check all entries are $\\ge 0$ before summing to find $k$.\n\nTakeaway: Tabulate the pmf first; negative entries mean a sign error in the piecewise formula.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "To find $k$ in a piecewise pmf, you set $\\sum P(Y=y) = 1$. For the full table $2k + k + k + 8k + 17k + k = 30k = 1$, what is $k$, and why must you verify this *before* computing anything else? (2 steps)", "answer": "- Step 1: $30k = 1 \\Rightarrow k = \\frac{1}{30}$. This is the normalisation constant that makes the pmf valid.\n- Step 2: You must verify this first because every subsequent calculation ($E(Y)$, $\\text{Var}(Y)$, $P(Y \\le X)$) depends on the correct pmf. If $k$ is wrong, all downstream answers are wrong. The exam checklist: **tabulate the pmf and sum to 1 before any other computation.**\n\nTakeaway: Find $k$ first, verify $\\sum P = 1$, then proceed.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "For $P(1 < Y \\le 4)$, which values of $Y$ do you include and why? How does this differ from $P(1 \\le Y < 4)$? (2 steps)", "answer": "- Step 1: $P(1 < Y \\le 4) = P(Y=2) + P(Y=3) + P(Y=4)$. The strict inequality $1 <$ excludes $Y=1$; the $\\le 4$ includes $Y=4$. For a discrete RV, you include exactly the integer values that satisfy the inequality.\n- Step 2: $P(1 \\le Y < 4) = P(Y=1) + P(Y=2) + P(Y=3)$ — different endpoints, different sum. The boundary inclusion matters for discrete RVs because each point has positive probability. For continuous RVs, the distinction would be irrelevant ($P(Y=y) = 0$ at a point).\n\nTakeaway: For discrete inequalities, check every endpoint: strict ($<$) vs inclusive ($\\le$) changes which values to sum.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "Given $X = 15 - 2Y$, find $P(Y \\le X)$. Why can't you treat $X$ and $Y$ as independent events? (3 steps)", "answer": "- Step 1: Substitute $X = 15 - 2Y$ into the inequality: $$Y \\le X \\iff Y \\le 15 - 2Y \\iff 3Y \\le 15 \\iff Y \\le 5.$$\n- Step 2: $P(Y \\le X) = P(Y \\le 5) = 1 - P(Y=6) = 1 - \\frac{1}{30} = \\frac{29}{30}$. This is purely a statement about $Y$'s distribution.\n- Step 3: $X$ and $Y$ are **not independent** — they are *perfectly correlated* because $X$ is a deterministic function of $Y$. You cannot write $P(Y \\le X) = \\sum P(Y=y) P(X \\ge y)$ as if they were independent. The correct approach is algebraic: reduce the inequality to a condition on $Y$ alone.\n\nTakeaway: When $X = f(Y)$, substitute and solve the inequality algebraically — never enumerate joint probabilities.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": true}, {"question": "$\\text{Var}(15 - 2Y) = \\,?$ State the formula, explain why the constant 15 disappears and why $-2$ becomes $+4$. (2 steps)", "answer": "- Step 1: $$\\text{Var}(aY + b) = a^2 \\text{Var}(Y).$$ Here $a = -2$ and $b = 15$, so $\\text{Var}(15 - 2Y) = (-2)^2 \\text{Var}(Y) = 4\\text{Var}(Y)$. The constant $b = 15$ drops out because shifting by a constant doesn't change spread. The $-2$ becomes $+4$ because variance involves squaring: $(-2)^2 = 4$.\n- Step 2: Common errors: writing $\\text{Var}(-2Y) = -2\\text{Var}(Y)$ (wrong sign, variance can't be negative) or $\\text{Var}(-2Y) = 2\\text{Var}(Y)$ (forgetting to square). Always check: $\\text{Var}$ must be positive. If you get a negative variance, you've made a sign/squaring error.\n\nTakeaway: $\\text{Var}(aY + b) = a^2\\text{Var}(Y)$. The constant drops; the scale is **squared**.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "To compute $\\text{Var}(Y)$, you use $\\text{Var}(Y) = E(Y^2) - [E(Y)]^2$. Why must you compute $E(Y^2)$ separately rather than $[E(Y)]^2$? Illustrate with a simple example. (2 steps)", "answer": "- Step 1: $E(Y^2) \\neq [E(Y)]^2$ in general. $E(Y^2)$ is the mean of the *squared* values, while $[E(Y)]^2$ is the *square of the mean*. They differ by exactly $\\text{Var}(Y)$: $$E(Y^2) = [E(Y)]^2 + \\text{Var}(Y).$$\n- Step 2: Simple example: $Y$ takes values 0 and 1 with equal probability. $E(Y) = 0.5$, so $[E(Y)]^2 = 0.25$. But $E(Y^2) = 0^2 \\times 0.5 + 1^2 \\times 0.5 = 0.5$. So $\\text{Var}(Y) = 0.5 - 0.25 = 0.25$. If you used $[E(Y)]^2 = 0.25$ in place of $E(Y^2) = 0.5$, you'd get $\\text{Var}(Y) = 0$ — claiming a non-constant RV has zero variance, which is absurd.\n\nTakeaway: Compute $E(Y^2) = \\sum y^2 P(Y=y)$ separately; never substitute $[E(Y)]^2$ for it.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": true}, {"question": "Two events $A$ and $C$ are mutually exclusive. What does $P(A \\cap C)$ equal, and what does this imply for $P(A \\cup C)$? (2 steps)", "answer": "- Step 1: Mutually exclusive means $A$ and $C$ cannot occur simultaneously: $$P(A \\cap C) = 0.$$ The events share no outcomes.\n- Step 2: By inclusion–exclusion: $$P(A \\cup C) = P(A) + P(C) - P(A \\cap C) = P(A) + P(C) - 0 = P(A) + P(C).$$ With $P(A) = 0.1$ and $P(C) = 0.5$: $P(A \\cup C) = 0.6$. For mutually exclusive events, the union probability is simply the sum — no overlap to subtract.\n\nTakeaway: Mutually exclusive ⇒ $P(A \\cap C) = 0$ ⇒ $P(A \\cup C) = P(A) + P(C)$.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "Two events $B$ and $C$ are independent. What equation defines this, and how does it differ from mutual exclusivity? Can two events with positive probability be both? (3 steps)", "answer": "- Step 1: Independence means $$P(B \\cap C) = P(B) \\times P(C).$$ The occurrence of one event gives no information about the other. Here: $P(B \\cap C) = 0.18 \\times 0.5 = 0.09$.\n- Step 2: Mutual exclusivity means $P(B \\cap C) = 0$. This is a *stronger* condition on the intersection (it must be empty), but it makes the events *more dependent*, not less: knowing $B$ occurred tells you $C$ cannot occur (if $P(B) > 0$).\n- Step 3: Two events with positive probability **cannot** be both mutually exclusive and independent. Proof: if $P(B) > 0$ and $P(C) > 0$ and $P(B \\cap C) = 0$ (mutually exclusive), then $P(B)P(C) > 0 \\neq 0 = P(B \\cap C)$, so they're *not* independent. The two concepts are opposites in spirit.\n\nTakeaway: Mutually exclusive ≠ independent. Positive-probability events cannot be both.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "In a three-set Venn diagram for $A$, $B$, $C$ with $P(A \\cap C) = 0$, which region is forced to zero, and how does the diagram look? (2 steps)", "answer": "- Step 1: $P(A \\cap C) = 0$ forces the **entire overlap** of $A$ and $C$ to have probability zero. This includes $A \\cap C$ only, $A \\cap B \\cap C$, and any sub-region within $A \\cap C$. In particular, $P(A \\cap B \\cap C) = 0$ because $A \\cap B \\cap C \\subseteq A \\cap C$.\n- Step 2: In the diagram, circles $A$ and $C$ must be drawn as **disjoint** (no overlap). Circle $B$ overlaps both $A$ (with probability 0.03 in $A \\cap B$ only) and $C$ (with probability 0.09 in $B \\cap C$ only), but the triple intersection $A \\cap B \\cap C$ is empty. The diagram has three circles where $A$ and $C$ don't touch, and $B$ straddles both.\n\nTakeaway: $P(A \\cap C) = 0$ ⇒ draw $A$ and $C$ as disjoint circles; triple intersection is also 0.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "When filling a three-set Venn diagram, what order should you fill the regions, and what is the most commonly forgotten region? (2 steps)", "answer": "- Step 1: Fill **from the centre outward**: (1) triple intersection $A \\cap B \\cap C$, (2) double-only intersections $A \\cap B$, $A \\cap C$, $B \\cap C$ (subtract the triple), (3) single-only regions $A$ only, $B$ only, $C$ only (subtract all overlaps), (4) outside all three circles.\n- Step 2: The most commonly forgotten region is the **outside** (complement of $A \\cup B \\cup C$). In this paper, the outside probability is $1 - (0.07 + 0.06 + 0.41 + 0.03 + 0 + 0.09 + 0) = 0.34$. Omitting it loses 1 mark and makes the total check fail.\n\nTakeaway: Centre outward; always compute and label the outside region; verify all 8 regions sum to 1.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": true}, {"question": "To find $P(B)$ from $P(A \\cup B) = 0.25$, $P(A) = 0.1$, and $P(A \\cap B) = 0.03$, which formula do you use, and how do you rearrange it? (2 steps)", "answer": "- Step 1: Use inclusion–exclusion: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B).$$ Substitute known values: $$0.25 = 0.1 + P(B) - 0.03.$$\n- Step 2: Rearrange: $$P(B) = 0.25 - 0.1 + 0.03 = 0.18.$$ Note the sign: you *add* $P(A \\cap B)$ when solving for $P(B)$ because it was subtracted on the RHS. A common error is subtracting it again, giving $P(B) = 0.12$.\n\nTakeaway: Write inclusion–exclusion first, then rearrange algebraically — don't try to do it in your head.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": true}, {"question": "$J \\sim N(500, 25^2)$. Show that $P(J > 510) = 0.3446$. Walk through the standardisation step. (2 steps)", "answer": "- Step 1: Standardise: $$Z = \\frac{J - \\mu}{\\sigma} = \\frac{510 - 500}{25} = \\frac{10}{25} = 0.4.$$ So $P(J > 510) = P(Z > 0.4)$.\n- Step 2: From the normal table: $\\Phi(0.4) = 0.6554$, so $$P(Z > 0.4) = 1 - \\Phi(0.4) = 1 - 0.6554 = 0.3446.$$ For \"show that\" questions, quote the table value $\\Phi(0.4) = 0.6554$ explicitly so the examiner sees where the number came from.\n\nTakeaway: Standardise first, then use $\\Phi(z)$ from the table. Always quote the table value in \"show that\" questions.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "Find $d$ such that $P(J > d) = 0.9192$ where $J \\sim N(500, 25^2)$. Is $d$ above or below the mean, and how do you determine the sign of $z$? (3 steps)", "answer": "- Step 1: $P(J > d) = 0.9192 > 0.5$, so more than half the distribution is above $d$. This means $d$ is **below the mean** — it's in the lower tail. Sketch the bell curve and shade the right region to see this.\n- Step 2: Convert to a lower-tail problem: $P(J \\le d) = 1 - 0.9192 = 0.0808$. Since $0.0808 < 0.5$, we need a *negative* $z$-value. From the table: $\\Phi(1.40) = 0.9192$, so $\\Phi(-1.40) = 1 - 0.9192 = 0.0808$. Thus $z = -1.40$.\n- Step 3: $$d = \\mu + z\\sigma = 500 + (-1.40)(25) = 500 - 35 = 465.$$ The classic error: using $z = +1.40$ and getting $d = 535$ (above the mean, which contradicts $P(J > d) > 0.5$).\n\nTakeaway: If $P(J > d) > 0.5$, then $d < \\mu$ and $z < 0$. Sketch first — the shaded region tells you the sign.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": true}, {"question": "Five independent bags of apples each yield juice volumes $J_1, \\ldots, J_5 \\sim N(500, 25^2)$. Find $P(\\text{all 5} < 510)$. Why do you raise to the 5th power rather than multiply by 5? (2 steps)", "answer": "- Step 1: Since the bags are independent, the probability that *all* satisfy the condition is the product of individual probabilities: $$P(\\text{all 5} < 510) = [P(J < 510)]^5 = (0.6554)^5 = 0.121.$$\n- Step 2: Multiplying by 5 ($0.6554 \\times 5 = 3.277$) gives a probability greater than 1, which is impossible. The confusion: $5 \\times P$ is the *expected count* of bags under 510 (out of 5), not a probability. Raising to the 5th power uses the independence assumption: $P(A \\cap B) = P(A)P(B)$ extended to 5 events.\n\nTakeaway: For \"all $n$ independent events\": $P = [P(\\text{one})]^n$. Never multiply by $n$.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": true}, {"question": "In a two-equation normal system, $R \\sim N(520, k^2)$ with $P(R < r) = 0.15$ and $P(R > 3r - 800) = 0.005$. Describe the strategy for solving for $r$ and $k$. (3 steps)", "answer": "- Step 1: Convert each probability to a $z$-equation using standardisation $Z = (R - 520)/k$:\n+ $P(R < r) = 0.15$: lower tail (< 0.5), so $z < 0$. From the percentage-point table: $z_{0.15} \\approx -1.0364$. Equation: $\\frac{r - 520}{k} = -1.0364$, giving $r = 520 - 1.0364k$. (★)\n+ $P(R > 3r - 800) = 0.005$: upper tail, so $z > 0$. From the percentage-point table: $z_{0.005} = 2.5758$. Equation: $\\frac{3r - 800 - 520}{k} = 2.5758$, giving $r = 440 + 0.8586k$. (★★)\n- Step 2: Equate the two expressions for $r$: $$520 - 1.0364k = 440 + 0.8586k \\implies 80 = 1.8950k \\implies k \\approx 42.2.$$ Then substitute back: $r = 520 - 1.0364 \\times 42.2 \\approx 476$.\n- Step 3: Verify by substituting $(r, k)$ back into *both* original probability statements. Check that $k > 0$ (negative standard deviation is meaningless).\n\nTakeaway: Write both equations as $r = \\ldots k$, equate, solve for $k$, back-substitute for $r$, verify both.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "What is the difference between the \"body table\" and the \"percentage-point table\" for the normal distribution, and when should you use each? (2 steps)", "answer": "- Step 1: The **body table** gives $\\Phi(z)$ — the cumulative probability from $-\\infty$ to $z$. You input a $z$-value and read off a probability. Use it when you've standardised and need $P(Z < z)$ or $P(Z > z)$ (e.g., $P(Z > 0.4) = 1 - \\Phi(0.4)$).\n- Step 2: The **percentage-point table** gives the $z$-value corresponding to a given upper-tail probability $p$. You input $p$ (like 0.005) and read off $z_p$. Use it for inverse problems like \"find $d$ such that $P(R > d) = 0.005$\" — you look up $z_{0.005} = 2.5758$ directly. Using the body table for this requires finding $\\Phi(z) = 0.995$ and interpolating, which is less precise.\n\nTakeaway: Body table for $z \\to P$; percentage-point table for $P \\to z$. For small tail probabilities, the percentage-point table is more accurate.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": true}, {"question": "Name the four commonly used percentage-point $z$-values that are worth memorising: $z_{0.05}$, $z_{0.025}$, $z_{0.01}$, and $z_{0.005}$. (1 step)", "answer": "- Step 1:\n+ $z_{0.05} = 1.6449$ (90% confidence interval)\n+ $z_{0.025} = 1.9600$ (95% confidence interval)\n+ $z_{0.01} = 2.3263$ (98% confidence interval)\n+ $z_{0.005} = 2.5758$ (99% confidence interval)\n\nThese are the upper-tail probabilities: $P(Z > z_p) = p$. Memorising them saves time on inverse-normal questions and prevents the error of using the body table with rounding (e.g., using 2.58 instead of 2.5758).\n\nTakeaway: Memorise all four — they appear repeatedly in S1 and S2.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": false}, {"question": "For a normal distribution question, why should you always sketch the bell curve and shade the relevant region *before* looking up any table? (2 steps)", "answer": "- Step 1: The sketch tells you immediately whether $z$ is positive or negative, whether you're in the upper or lower tail, and whether the probability is greater or less than 0.5. This prevents the classic error in Q7(a)(ii): computing $P(J > d) = 0.9192$ and getting $z = +1.40$ (wrong sign), which gives $d = 535$ above the mean — but a probability of 0.9192 above $d$ means $d$ must be *below* the mean.\n- Step 2: The sketch also shows which operation to perform: if the shaded area is the upper tail, compute $1 - \\Phi(z)$; if it's the lower tail, compute $\\Phi(z)$ directly. Without the sketch, it's easy to compute $1 - \\Phi(z)$ when you should compute $\\Phi(z)$, or vice versa.\n\nTakeaway: Sketch + shade *before* touching the table. It takes 10 seconds and prevents the most common sign/direction errors.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": true}, {"question": "In the coding $x = (l - 600)/5$, what are the reverse-coded mean and variance formulas? That is, given $\\bar{x}$ and $\\text{Var}(x)$, find $\\bar{l}$ and $\\text{Var}(l)$. (2 steps)", "answer": "- Step 1: The coding is $x = \\frac{l - 600}{5}$, so $l = 5x + 600$. Reverse the mean: $$\\bar{l} = 5\\bar{x} + 600.$$ The shift of 600 is *added back* and the scale of 5 is *multiplied*.\n- Step 2: Reverse the variance: $$\\text{Var}(l) = 5^2 \\text{Var}(x) = 25\\text{Var}(x).$$ The shift of 600 disappears (translation invariance), and the scale factor 5 is squared. Common error: writing $\\text{Var}(l) = 5\\text{Var}(x)$ (forgetting to square) or $\\text{Var}(l) = 25\\text{Var}(x) + 600$ (adding the shift).\n\nTakeaway: $\\bar{l} = b\\bar{x} + a$ and $\\text{Var}(l) = b^2\\text{Var}(x)$ for $l = bx + a$.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": true}, {"question": "Why does $P(A \\cap B \\cap C) = 0$ follow from $P(A \\cap C) = 0$? Use a subset argument. (2 steps)", "answer": "- Step 1: The triple intersection $A \\cap B \\cap C$ is a subset of $A \\cap C$: $$A \\cap B \\cap C \\subseteq A \\cap C.$$ If the larger set $A \\cap C$ has probability zero (is empty), then any subset of it must also have probability zero.\n- Step 2: Formally: $P(A \\cap B \\cap C) \\le P(A \\cap C) = 0$. Since probabilities are non-negative, $P(A \\cap B \\cap C) = 0$. This is why in the Venn diagram, the triple-overlap region is forced to 0 even though the question only stated $A \\cap C = 0$.\n\nTakeaway: If two sets are disjoint, all their sub-intersections are also empty.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": true}, {"question": "A \"show that\" question asks you to verify $w = -16.7 + 4.77t$. You compute $b = S_{tw}/S_{tt} = 25.36733/5.3173 = 4.77073...$ and $a = \\bar{w} - b\\bar{t} = -16.65991...$. How many significant figures should you carry, and when do you round? (2 steps)", "answer": "- Step 1: Carry **at least 5 s.f.** through all intermediate calculations. Quote $b = 4.7707$ and $a = -16.660$ (to 4–5 s.f.) in your working *before* rounding to the printed values. This ensures that when you round to 3 s.f. ($b = 4.77$, $a = -16.7$), the values match exactly.\n- Step 2: If you round $b$ to 4.77 *before* computing $a$, you get $a = 19.853 - 4.77 \\times 7.653 = 19.853 - 36.505 = -16.652$, which rounds to $-16.7$ by luck — but sometimes the error propagates and the printed answer won't match. Always compute $a$ using the *unrounded* $b$.\n\nTakeaway: Compute with full precision; round only at the final step. For \"show that,\" display 4+ s.f. intermediates.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": false}, {"question": "In Q3(c), the interval is $4600 < w \\le 7700$ with median = 4000. A student tries to interpolate inside the box plot to find the count. Why is this unnecessary, and what simpler reasoning works? (2 steps)", "answer": "- Step 1: The interval $4600 < w \\le 7700$ lies entirely above the median (since 4600 > 4000). Every value in this interval is strictly above the median. No interpolation is needed because the question asks for the *maximum* count, not the exact count.\n- Step 2: With $n = 81$ (odd), the median is the 41st value. At most 40 values lie strictly above it. So the maximum count in any interval that's entirely above the median is 40. The key insight: compare the bound to the median/quartiles *first* — if the interval is entirely within one half, the answer is simply the count of that half.\n\nTakeaway: For \"max number in interval\" questions, first check whether the interval is entirely above/below a quartile or median.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": false}, {"question": "Compute $P(A \\cap \\text{not Red})$ given $P(A) = 0.30$ and $P(\\text{Red} \\mid A) = 0.02$. What is the general principle? (2 steps)", "answer": "- Step 1: $$P(A \\cap \\text{not Red}) = P(A) \\times P(\\text{not Red} \\mid A) = 0.30 \\times (1 - 0.02) = 0.30 \\times 0.98 = 0.294.$$ The multiplication rule: $P(A \\cap B) = P(A) \\times P(B \\mid A)$.\n- Step 2: The complement shortcut: $P(\\text{not Red} \\mid A) = 1 - P(\\text{Red} \\mid A) = 1 - 0.02 = 0.98$. You don't need a separate tree branch — just subtract from 1. This works because Red and not-Red partition the outcomes given label A.\n\nTakeaway: $P(\\bar{B} \\mid A) = 1 - P(B \\mid A)$. Use the complement to find \"not\" probabilities.", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": true}, {"question": "For the piecewise pmf, $P(Y=y) = k(y^2 - 8)$ for $y = 3, 4, 5$. Compute the values in terms of $k$ for each $y$. What do you check? (2 steps)", "answer": "- Step 1:\n+ $y = 3$: $k(9 - 8) = k$\n+ $y = 4$: $k(16 - 8) = 8k$\n+ $y = 5$: $k(25 - 8) = 17k$\n- Step 2: Check all values are non-negative (they are, for $k > 0$). Note that $y^2 - 8$ is negative for $y = 1$ and $y = 2$ (giving $-7$ and $-4$), which is why those values use the *other* piece $k(3-y)$. The piecewise definition ensures non-negative probabilities across the entire support.\n\nTakeaway: Always tabulate each piece's values and verify non-negativity before summing.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": false}, {"question": "In computing $E(Y^2) = \\sum y^2 P(Y=y)$, the term for $y = 5$ is $25 \\times 17/30 = 425/30$. Why is this the easiest place to make an arithmetic slip? (1 step)", "answer": "- Step 1: The term $25 \\times 17 = 425$ involves a \"large × large\" product that isn't a round number. Unlike $1 \\times 2 = 2$ or $4 \\times 8 = 32$, the product $25 \\times 17$ requires actual multiplication (not an instant recall). A common slip: writing $25 \\times 17 = 375$ (confusing with $25 \\times 15$) or $25 \\times 17 = 435$. Always double-check the largest term, as it contributes the most to the sum and an error there has the biggest impact.\n\nTakeaway: Double-check the largest product in $E(Y^2)$ — it's the most error-prone and most consequential.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": true}, {"question": "You have $E(Y) = 13/3$ and $\\text{Var}(Y) = 61/45$. Compute $\\text{Var}(X)$ where $X = 15 - 2Y$, step by step. (2 steps)", "answer": "- Step 1: $$\\text{Var}(X) = \\text{Var}(15 - 2Y) = (-2)^2 \\text{Var}(Y) = 4 \\times \\frac{61}{45} = \\frac{244}{45} \\approx 5.42.$$ The constant 15 drops out, and $-2$ is squared to give $+4$.\n- Step 2: Sanity check: $\\text{Var}(X) > 0$ ✓. Also, $\\text{Var}(X) > \\text{Var}(Y)$ makes sense because $X = 15 - 2Y$ stretches $Y$ by a factor of 2, increasing spread. If you'd gotten $\\text{Var}(X) < \\text{Var}(Y)$, something would be wrong (unless $|a| < 1$ in the transformation $aY + b$).\n\nTakeaway: Apply $\\text{Var}(aY + b) = a^2\\text{Var}(Y)$, check positivity, and verify the direction makes sense (stretching increases variance).", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": false}, {"question": "In a three-set Venn diagram, how many distinct regions must be labelled (including the outside), and why is it important to check they sum to 1? (2 steps)", "answer": "- Step 1: There are **8** regions: $A$ only, $B$ only, $C$ only, $A \\cap B$ only, $A \\cap C$ only, $B \\cap C$ only, $A \\cap B \\cap C$, and outside all three. These correspond to all possible combinations of being in/not-in each set.\n- Step 2: Checking $\\sum = 1$ catches arithmetic errors. If you get 0.99 or 1.01, you've made a slip in one region. In this paper: $0.07 + 0.06 + 0.41 + 0.03 + 0 + 0.09 + 0 + 0.34 = 1.00$ ✓. Write this check on your script — it's worth peace of mind and sometimes earns a method mark.\n\nTakeaway: 8 regions, always verify they sum to 1. Write the check explicitly.", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": true}, {"question": "The time budget for S1 is 75 marks in 90 minutes. How many minutes per mark, and roughly how long should you spend on a 14-mark question? (1 step)", "answer": "- Step 1: $$\\frac{90 \\text{ min}}{75 \\text{ marks}} = 1.2 \\text{ min/mark}.$$ A 14-mark question (like Q7) should take roughly $14 \\times 1.2 = 16.8$ minutes. Reserve about 5 minutes at the end for checking. If you're spending significantly more than 1.2 min/mark on a question, flag it and move on — come back if time permits.\n\nTakeaway: 1.2 minutes per mark; don't overspend on any single question.", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": false}, {"question": "A simple mental-math exercise: a histogram has one class $[0, 4)$ with FD = 3 and another $[4, 10)$ with FD = 2. Find the frequency in each class and the total. (1 step)", "answer": "- Step 1:\n+ Class $[0, 4)$: $f = \\text{FD} \\times w = 3 \\times 4 = 12$.\n+ Class $[4, 10)$: $f = \\text{FD} \\times w = 2 \\times 6 = 12$.\n+ Total $= 12 + 12 = 24$.\n\nThis captures the core histogram skill: frequency = FD × width, with different widths requiring separate calculations.", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": false}, {"question": "A simple mental-math exercise: $Y$ takes values 1, 2, 3 with probabilities 0.5, 0.3, 0.2. Find $E(Y)$ and $\\text{Var}(Y)$. Then find $\\text{Var}(3Y - 1)$. (2 steps)", "answer": "- Step 1: $$E(Y) = 1(0.5) + 2(0.3) + 3(0.2) = 0.5 + 0.6 + 0.6 = 1.7.$$ $$E(Y^2) = 1(0.5) + 4(0.3) + 9(0.2) = 0.5 + 1.2 + 1.8 = 3.5.$$ $$\\text{Var}(Y) = 3.5 - 1.7^2 = 3.5 - 2.89 = 0.61.$$\n- Step 2: $$\\text{Var}(3Y - 1) = 3^2 \\text{Var}(Y) = 9 \\times 0.61 = 5.49.$$ The constant $-1$ drops out; the scale factor 3 is squared. Quick check: $5.49 > 0.61$ ✓ (stretching by 3 increases variance by $9\\times$).", "source": "GLM 5.1 ②", "_id": "glm_2_50", "judge_pick": false}, {"question": "A simple mental-math exercise: $Z \\sim N(0,1)$. Find $P(Z > 1)$ using the fact that $\\Phi(1) \\approx 0.8413$. Then if $X \\sim N(50, 10^2)$, find $P(X > 60)$. (2 steps)", "answer": "- Step 1: $$P(Z > 1) = 1 - \\Phi(1) = 1 - 0.8413 = 0.1587.$$ This is the upper-tail probability beyond 1 standard deviation.\n- Step 2: Standardise: $Z = \\frac{60 - 50}{10} = 1$. So $P(X > 60) = P(Z > 1) = 0.1587$. The key: standardisation converts any normal problem to a standard normal problem.", "source": "GLM 5.1 ②", "_id": "glm_2_51", "judge_pick": false}, {"question": "A simple exercise: events $A$ and $B$ are independent with $P(A) = 0.4$ and $P(B) = 0.5$. Find $P(A \\cap B)$ and $P(A \\cup B)$. Are they mutually exclusive? (2 steps)", "answer": "- Step 1: Independence: $$P(A \\cap B) = P(A) \\times P(B) = 0.4 \\times 0.5 = 0.2.$$ Inclusion–exclusion: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B) = 0.4 + 0.5 - 0.2 = 0.7.$$\n- Step 2: They are **not** mutually exclusive because $P(A \\cap B) = 0.2 \\neq 0$. In fact, since both have positive probability and their intersection is non-empty, they *can't* be mutually exclusive (that would require $P(A \\cap B) = 0$).", "source": "GLM 5.1 ②", "_id": "glm_2_52", "judge_pick": true}, {"question": "A simple exercise: $P(R \\mid C) = 0.06$ and $P(C) = 0.25$, and $P(R) = 0.039$. Find $P(C \\mid R)$ using Bayes. (1 step)", "answer": "- Step 1: $$P(C \\mid R) = \\frac{P(C) P(R \\mid C)}{P(R)} = \\frac{0.25 \\times 0.06}{0.039} = \\frac{0.015}{0.039} = \\frac{15}{39} = \\frac{5}{13} \\approx 0.385.$$ Note: $P(C \\mid R) = 0.385 \\neq P(R \\mid C) = 0.06$. The two conditional probabilities are completely different — the vertical bar matters.", "source": "GLM 5.1 ②", "_id": "glm_2_53", "judge_pick": false}, {"question": "A simple exercise: data coded as $x = l - 100$ gives $\\bar{x} = 5$ and $\\text{Var}(x) = 20$. Find $\\bar{l}$ and $\\text{Var}(l)$. (1 step)", "answer": "- Step 1: $$\\bar{l} = \\bar{x} + 100 = 5 + 100 = 105.$$ $$\\text{Var}(l) = \\text{Var}(x) = 20.$$ The variance is unchanged because adding a constant (translation) doesn't affect spread. Only the mean shifts.", "source": "GLM 5.1 ②", "_id": "glm_2_54", "judge_pick": false}, {"question": "A simple exercise: in a box plot, $Q_1 = 10$, $Q_3 = 30$, min $= 5$, max $= 45$. Are there any outliers using the $1.5 \\times \\text{IQR}$ rule? (2 steps)", "answer": "- Step 1: $\\text{IQR} = 30 - 10 = 20$. Fences: lower $= 10 - 30 = -20$; upper $= 30 + 30 = 60$.\n- Step 2: Min $= 5 > -20$ ✓; max $= 45 < 60$ ✓. No outliers. Both fences checked, both extremes compared — the complete procedure.", "source": "GLM 5.1 ②", "_id": "glm_2_55", "judge_pick": false}, {"question": "Conceptual synthesis: Why is the PMCC dimensionless, and what does this imply about its value under unit changes (e.g., measuring weight in kg instead of g)? (2 steps)", "answer": "- Step 1: The PMCC $r = \\frac{S_{xy}}{\\sqrt{S_{xx}S_{yy}}}$ has units of $\\frac{(\\text{units of } x)(\\text{units of } y)}{\\sqrt{(\\text{units of } x)^2(\\text{units of } y)^2}} = \\frac{(\\text{units of } x)(\\text{units of } y)}{(\\text{units of } x)(\\text{units of } y)} = 1$ (dimensionless). The units cancel perfectly.\n- Step 2: Since $r$ is dimensionless, changing units (g to kg, cm to mm) doesn't change $r$. This is consistent with coding invariance: positive-linear transformations (which include unit conversions) preserve $r$. If weight is measured in kg instead of g, $w \\to w/1000$, and $r_{tw} = r_{t,w/1000}$.\n\nTakeaway: $r$ is dimensionless ⇒ invariant under unit changes and positive-linear coding.", "source": "GLM 5.1 ②", "_id": "glm_2_56", "judge_pick": true}, {"question": "Conceptual synthesis: Explain why $\\text{Var}(aY + b) = a^2\\text{Var}(Y)$ using the definition of variance as \"spread around the mean.\" Why does $b$ drop out, and why is $a$ squared? (2 steps)", "answer": "- Step 1: Adding $b$ shifts every value by the same amount, including the mean. The *deviations from the mean* $(aY + b) - E(aY + b) = aY - aE(Y) = a(Y - E(Y))$ are unchanged by $b$ — it cancels out. Spread is about deviations, not absolute position.\n- Step 2: Multiplying by $a$ scales every deviation by $a$: $a(Y - E(Y))$. The variance is the mean of *squared* deviations, so each squared deviation gets multiplied by $a^2$: $$\\text{Var}(aY + b) = E[(a(Y - E(Y)))^2] = a^2 E[(Y - E(Y))^2] = a^2\\text{Var}(Y).$$ The squaring comes from the definition of variance — it's about *squared* distances.\n\nTakeaway: Shifts don't change spread; scales change spread by the *square* of the scale factor.", "source": "GLM 5.1 ②", "_id": "glm_2_57", "judge_pick": true}, {"question": "Conceptual synthesis: A student says \"if $P(A \\cap B) = 0$, then $A$ and $B$ are independent.\" Is this correct? Give a counterexample. (2 steps)", "answer": "- Step 1: This is **incorrect**. $P(A \\cap C) = 0$ means mutual exclusivity, not independence. Independence requires $P(A \\cap B) = P(A)P(B)$, which is a *positive* number when both probabilities are positive.\n- Step 2: Counterexample: $P(A) = 0.1$, $P(C) = 0.5$, mutually exclusive. Then $P(A)P(C) = 0.05 \\neq 0 = P(A \\cap C)$. So they're *not* independent. In fact, knowing $A$ occurred tells you $C$ definitely didn't — the opposite of independence. Mutually exclusive events with positive probability are always *negatively dependent*.\n\nTakeaway: $P(A \\cap B) = 0$ ⇒ mutually exclusive ⇒ NOT independent (when both have positive probability).", "source": "GLM 5.1 ②", "_id": "glm_2_58", "judge_pick": true}, {"question": "Conceptual synthesis: In Q5(d), $X = 15 - 2Y$ and you need $P(Y \\le X)$. A student tries to enumerate all pairs $(y, x)$ and sum $P(Y=y)P(X=x)$. Why is this fundamentally wrong? (2 steps)", "answer": "- Step 1: $X$ is a *deterministic function* of $Y$: once you know $Y$, $X$ is fixed. There are no \"pairs\" to enumerate — $X$ and $Y$ are perfectly (negatively) correlated. The joint distribution is degenerate: $P(X = 15-2y \\mid Y = y) = 1$.\n- Step 2: Writing $P(Y \\le X) = \\sum P(Y=y) P(X \\ge y)$ assumes independence, which is false here. The correct approach is algebraic: substitute $X = 15 - 2Y$ and solve the inequality $Y \\le 15 - 2Y$ to get $Y \\le 5$, then sum the pmf over $y = 1, 2, 3, 4, 5$.\n\nTakeaway: When $X = f(Y)$, reduce the inequality algebraically — never treat $X$ and $Y$ as independent.", "source": "GLM 5.1 ②", "_id": "glm_2_59", "judge_pick": true}, {"question": "Conceptual edge case: If $P(J > d) = 0.5$, what is $d$ relative to $\\mu$? What about $P(J > d) = 1$ and $P(J > d) = 0$? (1 step)", "answer": "- Step 1:\n+ $P(J > d) = 0.5$: $d = \\mu$ (the mean equals the median for a normal distribution; half the distribution is above the mean).\n+ $P(J > d) = 1$: $d = -\\infty$ (everything is above negative infinity).\n+ $P(J > d) = 0$: $d = +\\infty$ (nothing is above positive infinity).\n\nThese limiting cases confirm the intuition: as $d$ increases, $P(J > d)$ decreases from 1 to 0, passing through 0.5 at $d = \\mu$.", "source": "GLM 5.1 ②", "_id": "glm_2_60", "judge_pick": true}, {"question": "Conceptual edge case: For the variance transformation $\\text{Var}(aY + b) = a^2\\text{Var}(Y)$, what happens when $a = 0$? When $a = 1$? When $|a| < 1$? (1 step)", "answer": "- Step 1:\n+ $a = 0$: $\\text{Var}(b) = 0$. A constant has zero variance — no spread at all.\n+ $a = 1$: $\\text{Var}(Y + b) = \\text{Var}(Y)$. Shifting doesn't change spread.\n+ $|a| < 1$ (e.g., $a = 0.5$): $\\text{Var}(0.5Y) = 0.25\\text{Var}(Y)$. Compressing the data reduces variance. This is why $a^2$ (not $|a|$) appears — variance is in squared units.", "source": "GLM 5.1 ②", "_id": "glm_2_61", "judge_pick": true}, {"question": "Conceptual edge case: In a three-set Venn, if $P(A) + P(B) + P(C) > 1$, can the three events be mutually exclusive? What constraint does the sum impose? (2 steps)", "answer": "- Step 1: If all three are mutually exclusive, $P(A \\cup B \\cup C) = P(A) + P(B) + P(C)$. Since probabilities can't exceed 1, this requires $P(A) + P(B) + P(C) \\le 1$.\n- Step 2: If $P(A) + P(B) + P(C) > 1$, they *cannot* all be mutually exclusive — their union probability would exceed 1. In this paper, $P(A) + P(B) + P(C) = 0.1 + 0.18 + 0.5 = 0.78 < 1$, so mutual exclusivity of all three is possible in principle (though $A$ and $B$ overlap, and $B$ and $C$ overlap).\n\nTakeaway: If the sum of probabilities exceeds 1, the events can't all be mutually exclusive.", "source": "GLM 5.1 ②", "_id": "glm_2_62", "judge_pick": true}, {"question": "Misconception probe: A student computes $S_{tw} = \\sum tw + \\frac{\\sum t \\sum w}{n}$ (plus sign). What goes wrong, and how would the PMCC be affected? (2 steps)", "answer": "- Step 1: The correct formula is $S_{tw} = \\sum tw - \\frac{\\sum t \\sum w}{n}$. Using a plus sign gives $S_{tw} = 2304.53 + 2279.16 = 4583.69$ instead of the correct $25.37$ — an 180× overestimate.\n- Step 2: The PMCC would become $r = \\frac{4583.69}{\\sqrt{5.317 \\times 176.80}} = \\frac{4583.69}{30.66} = 149.5$, which is impossible ($|r| \\le 1$). This should immediately signal an error. The sign mistake inflates the covariance so dramatically that $r$ exceeds 1.\n\nTakeaway: A wrong sign in $S_{xy}$ often produces $|r| > 1$ — an instant sanity check.", "source": "GLM 5.1 ②", "_id": "glm_2_63", "judge_pick": true}, {"question": "Misconception probe: A student says \"the regression line of $w$ on $t$ and the regression line of $t$ on $w$ are the same line.\" Is this true? When would it be true? (2 steps)", "answer": "- Step 1: This is **false** in general. The regression line of $w$ on $t$ minimises vertical ($w$-direction) residuals, with gradient $b = S_{tw}/S_{tt}$. The regression line of $t$ on $w$ minimises horizontal ($t$-direction) residuals, with gradient $b' = S_{tw}/S_{ww}$. These have different slopes unless $S_{tt} = S_{ww}$.\n- Step 2: Both lines pass through the point $(\\bar{t}, \\bar{w})$, so they intersect at the mean point. They coincide (become the same line) only when $r = \\pm 1$ (perfect correlation), where all data points lie on a single line and both regression methods produce the same result.\n\nTakeaway: Two regression lines exist; they're different unless $r = \\pm 1$.", "source": "GLM 5.1 ②", "_id": "glm_2_64", "judge_pick": true}, {"question": "Misconception probe: A student computes $P(\\text{all 5 bags} < 510) = 5 \\times P(J < 510) = 5 \\times 0.6554 = 3.277$. Why is this impossible, and what should they have done? (2 steps)", "answer": "- Step 1: A probability of 3.277 is impossible — probabilities must be in $[0, 1]$. The student confused the *expected count* with a *probability*. The expected number of bags under 510 ml is $5 \\times 0.6554 = 3.277$ bags, but the probability that *all 5* are under 510 is $(0.6554)^5 = 0.121$.\n- Step 2: The multiplication by 5 would only make sense for an *expected value* calculation (how many bags on average), not for a probability. For \"all $n$ independent events,\" use exponentiation: $P(\\text{all}) = [P(\\text{one})]^n$.\n\nTakeaway: $P > 1$ is always wrong. \"All $n$\" ⇒ raise to the $n$th power, not multiply by $n$.", "source": "GLM 5.1 ②", "_id": "glm_2_65", "judge_pick": false}, {"question": "Misconception probe: A student adds 600 to the variance when reverse-coding from $x = l - 600$. Why might they do this, and why is it wrong? (2 steps)", "answer": "- Step 1: They might reason: \"I added 600 to the mean to get $\\bar{l}$, so I should add 600 to the variance too.\" This is a false analogy. The mean is a *location* parameter — it shifts with the data. Variance is a *scale* parameter — it measures spread, which doesn't change when you shift.\n- Step 2: Adding 600 to variance would give $\\text{Var}(l) = 3767 + 600 = 4367$, which has units of mm² + mm — a dimensional inconsistency. Variance has units of mm²; adding mm gives nonsense. The correct answer: $\\text{Var}(l) = \\text{Var}(x) = 3767$ mm². Translation affects location only.\n\nTakeaway: Mean shifts with translation; variance is translation-invariant. Don't apply the same operation to both.", "source": "GLM 5.1 ②", "_id": "glm_2_66", "judge_pick": true}, {"question": "Exam technique: For a \"show that\" question, what three things must you display on your script to guarantee method marks even if you make an arithmetic slip? (1 step)", "answer": "- Step 1: (1) Write the **formula** before substituting (e.g., $b = S_{tw}/S_{tt}$). (2) Quote **table values** explicitly (e.g., $\\Phi(0.4) = 0.6554$). (3) Show **intermediate values** to at least 4 s.f. before rounding to the printed answer (e.g., $b = 4.7707 \\approx 4.77$). Examiners award method marks for structure even when arithmetic slips occur — but only if the structure is visible.\n\nTakeaway: Formula → table value → 4+ s.f. intermediate → rounded answer. Always show the chain.", "source": "GLM 5.1 ②", "_id": "glm_2_67", "judge_pick": false}, {"question": "Exam technique: When solving a two-equation normal system (like Q7c), why should you rearrange both equations to the form $r = \\ldots k$ before equating, rather than substituting one into the other directly? (2 steps)", "answer": "- Step 1: Rearranging both to $r = \\ldots k$ makes the algebra transparent and reduces errors. You can see at a glance: $520 - 1.0364k = 440 + 0.8586k$. The terms in $k$ are collected on one side and constants on the other.\n- Step 2: Direct substitution (e.g., plugging the expression for $r$ from (★) into (★★)) creates a nested expression that's harder to simplify correctly: $3(520 - 1.0364k) - 800 - 520 = 2.5758k$. Expanding and collecting terms is error-prone under exam pressure. Equating two linear expressions in $k$ is always cleaner.\n\nTakeaway: Both to $r = \\ldots k$ form, then equate. Algebraic clarity prevents arithmetic errors.", "source": "GLM 5.1 ②", "_id": "glm_2_68", "judge_pick": false}, {"question": "Exam technique: For coding-on-regression questions (like Q2g), the question says \"you do not need to simplify.\" What does this signal about the intended method, and what should you write? (2 steps)", "answer": "- Step 1: This signals that the intended method is **substitution**, not recomputation. If you were meant to recompute $S_{xy}$, $S_{xx}$ from coded data, the answer would need simplification to be useful. The \"no simplification needed\" hint means: substitute $t = x + 6$ and $w = 2y + 10$ into the existing line and stop.\n- Step 2: Write: $$2y + 10 = -16.7 + 4.77(x + 6).$$ This is the answer. Don't recompute anything. Don't simplify unless asked. The examiners are testing whether you understand that the coded regression line follows from substitution, not from new calculations.\n\nTakeaway: \"You do not need to simplify\" ⇒ substitute the coding into the existing line and stop.", "source": "GLM 5.1 ②", "_id": "glm_2_69", "judge_pick": false}, {"question": "Exam technique: When filling a Venn diagram, you compute an \"only\" region and get a negative number. What does this indicate, and what should you check? (2 steps)", "answer": "- Step 1: A negative probability is **impossible**. It indicates an arithmetic error in computing one of the other regions, or a misunderstanding of which overlaps to subtract.\n- Step 2: Check: (1) Did you subtract the triple intersection from the double intersections before computing single-only regions? (2) Did you use the correct values for $P(A \\cap B)$, $P(A \\cap C)$, $P(B \\cap C)$? (3) Does $P(A) - P(A \\cap B) - P(A \\cap C) + P(A \\cap B \\cap C)$ give the right \"A only\" value? The formula for \"A only\" is: $$P(A \\text{ only}) = P(A) - P(A \\cap B) - P(A \\cap C) + P(A \\cap B \\cap C).$$ The triple intersection is *added back* because it was subtracted twice (once in each double intersection).\n\nTakeaway: Negative region ⇒ error. The \"only\" formula adds back the triple intersection.", "source": "GLM 5.1 ②", "_id": "glm_2_70", "judge_pick": false}, {"question": "Synthesis question: Explain the connection between the coding rules for mean/variance (Q3), the coding rules for PMCC (Q2f), and the coding rules for regression (Q2g). What general principle unifies them? (3 steps)", "answer": "- Step 1: For **mean**: $E(aY + b) = aE(Y) + b$. The shift $b$ moves the mean; the scale $a$ stretches it. For **variance**: $\\text{Var}(aY + b) = a^2\\text{Var}(Y)$. The shift drops out; the scale is squared.\n- Step 2: For **PMCC**: $r$ is invariant under any positive-linear coding ($a > 0$). If $a < 0$, $r$ flips sign. This is because $r$ is a dimensionless measure of *direction and strength* of linear association — shifting and positive-scaling don't change these.\n- Step 3: For **regression**: the regression line of $y$ on $x$ (where $y = aY + b$, $x = cX + d$) is obtained by substituting the inverse coding into the original regression line. The intercept and gradient transform according to the same linear rules as the mean. The general principle: **linear transformations propagate through all summary statistics according to consistent algebraic rules** — you never need to recompute from raw data.\n\nTakeaway: Coding rules are a unified system: mean shifts/scales, variance scales (squared), PMCC is invariant, regression transforms by substitution.", "source": "GLM 5.1 ②", "_id": "glm_2_71", "judge_pick": true}, {"question": "Synthesis question: Both Q5(d) and Q7(c) involve solving for unknowns using a deterministic relationship. Compare the algebraic strategy in each. (2 steps)", "answer": "- Step 1: In Q5(d), $X = 15 - 2Y$ is a deterministic function. The strategy is to **substitute the function into the inequality** $Y \\le X$ and solve algebraically: $Y \\le 15 - 2Y \\Rightarrow 3Y \\le 15 \\Rightarrow Y \\le 5$. Then use the pmf to find $P(Y \\le 5)$.\n- Step 2: In Q7(c), $R \\sim N(520, k^2)$ is a distribution with two unknowns ($r$ and $k$). The strategy is to **convert each probability constraint to a $z$-equation**, rearrange both to the form $r = \\ldots k$, and equate. Both problems reduce a complex situation to simple algebra — the key is to express relationships in solvable form before computing.\n\nTakeaway: Both problems reduce to algebra first, numbers second. Substitute or standardise, then solve.", "source": "GLM 5.1 ②", "_id": "glm_2_72", "judge_pick": false}, {"question": "Synthesis question: The paper tests \"conceptual precision about probability vocabulary\" in Q4 and Q6. Identify the two critical distinctions that students must master. (2 steps)", "answer": "- Step 1: **$P(A \\mid B) \\neq P(B \\mid A)$** (Q4). Bayes' theorem relates them: $P(A \\mid B) = \\frac{P(B \\mid A) P(A)}{P(B)}$. The direction of conditioning matters enormously — $P(C \\mid R) = 0.385$ vs $P(R \\mid C) = 0.06$.\n- Step 2: **Mutually exclusive ≠ independent** (Q6). Mutually exclusive means $P(A \\cap B) = 0$ (can't co-occur); independent means $P(A \\cap B) = P(A)P(B)$ (co-occurrence at the \"expected\" rate). Events with positive probability can't be both. Confusing these leads to wrong Venn diagram regions and wrong probability calculations.\n\nTakeaway: Master two distinctions: conditioning direction matters; mutual exclusivity ≠ independence.", "source": "GLM 5.1 ②", "_id": "glm_2_73", "judge_pick": true}, {"question": "Synthesis question: Across the entire paper, what single habit would prevent the most mark losses, and why? (2 steps)", "answer": "- Step 1: **Write the formula before substituting.** This single habit prevents: sign errors in $S_{xy}$ (you see the minus sign), wrong variance scaling (you see $a^2$), wrong Bayes direction (you see which probability is in the numerator), wrong inclusion–exclusion (you see the minus signs), and wrong normal standardisation (you see the $Z = (X - \\mu)/\\sigma$ structure).\n- Step 2: The formula serves as a *template* that guides substitution. Without it, students do mental arithmetic and make sign/counting errors. With it, the examiner can award method marks even if the arithmetic is wrong. It takes 10 seconds to write \"$\\text{Var}(aY + b) = a^2\\text{Var}(Y)$\" and it guarantees you won't write $\\text{Var}(aY + b) = a\\text{Var}(Y)$.\n\nTakeaway: Formula first, numbers second. This is the highest-leverage exam habit.", "source": "GLM 5.1 ②", "_id": "glm_2_74", "judge_pick": true}], "count": 75}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "A histogram bar covers the class [20, 30) and has a frequency density of 7. If you need to find the number of observations in the sub-interval [22, 30), how do you calculate this, and why doesn't the bar's total frequency matter? (2 steps)", "answer": "- Step 1: In a histogram, the frequency of any rectangular slice is its area, given by $$f = \\text{FD} \\times \\text{width}$$. The FD is constant across the entire class interval [20, 30).\n- Step 2: For the sub-interval [22, 30), the width is $$30 - 22 = 8$$ (not 10). Multiply this by the FD: $$f = 7 \\times 8 = 56$$. You do not need to find the whole bar's frequency (70) and subtract the [20, 22) slice; direct pro-rating is faster and less error-prone.\n\nTakeaway: For partial-bar queries, every shaded rectangle's frequency equals FD × slice width.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "For grouped continuous data with $$n=274$$ observations, what is the positional formula used to find the median, and why is $$(n+1)/2$$ incorrect here? (2 steps)", "answer": "- Step 1: For grouped continuous data, the median position is $$\\frac{n}{2}$$. For $$n=274$$, this is the 137th value. This is because we treat the data as a continuous scale where interpolation takes place within a class interval.\n- Step 2: The formula $$(n+1)/2$$ is used for discrete, ungrouped data where each value is a distinct point. Using it for continuous grouped data leads to a slight overestimation of the position and places you in the wrong cumulative frequency bracket.\n\nTakeaway: Continuous grouped data uses $$n/2$$; discrete data uses $$(n+1)/2$$.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "Given a median position of 137, a cumulative frequency before the median class of 135, a class width of 10, and a class frequency of 100 with lower bound 30, walk through the linear interpolation formula to find the median. (3 steps)", "answer": "- Step 1: Identify the variables for the formula $$L + \\frac{n/2 - F}{f_m} \\times w$$. Here, $$L = 30$$ (lower bound), $$F = 135$$ (cumulative frequency before this class), $$f_m = 100$$ (frequency of the median class), and $$w = 10$$ (class width).\n- Step 2: Calculate the fraction of the way through the class the median lies. The position is 137, and 135 values have already passed, so we need the $$137 - 135 = 2$$nd value out of 100 in this class. The fraction is $$\\frac{2}{100}$$.\n- Step 3: Multiply by the width and add to the lower bound: $$30 + \\frac{2}{100} \\times 10 = 30 + 0.2 = 30.2$$.\n\nTakeaway: The interpolation formula measures how far into the median class the $n/2$-th value falls, scaling linearly across the class width.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "Why must you use midpoints rather than lower/upper bounds when estimating the mean from a grouped frequency table, and what is the formula? (2 steps)", "answer": "- Step 1: When data is grouped, we assume values are uniformly spread within each class. The best single representative value for a class interval is its center of mass (the midpoint), not the boundaries, which would systematically under- or over-estimate the contribution of that class.\n- Step 2: The formula is $$\\bar{x} = \\frac{\\sum f x_{\\text{mid}}}{\\sum f}$$, where $$x_{\\text{mid}}$$ is the midpoint of each class and $$f$$ is its frequency.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "When calculating $$S_{xy} = \\sum xy - \\frac{\\sum x \\sum y}{n}$$, what is the most common sign error, and why does the formula logically require subtraction? (2 steps)", "answer": "- Step 1: The most common error is writing $$\\sum xy + \\frac{\\sum x \\sum y}{n}$$. The formula strictly requires a minus sign.\n- Step 2: Logical intuition: $$S_{xy}$$ measures co-deviation from the means. $$\\sum xy$$ contains both the true co-deviation and the product of the means ($$n\\bar{x}\\bar{y}$$). Since $$\\frac{\\sum x \\sum y}{n} = n\\bar{x}\\bar{y}$$, we must subtract it to isolate the co-deviation. If you add it, you double-count the means, yielding a wrong sign and magnitude.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "Given $$S_{tw}$$, $$S_{tt}$$, and $$S_{ww}$$, what is the formula for the product moment correlation coefficient (PMCC), and what does its physical sign tell you? (2 steps)", "answer": "- Step 1: The formula is $$r = \\frac{S_{tw}}{\\sqrt{S_{tt} S_{ww}}}$$. It divides the co-deviation by the geometric mean of the individual deviations to standardize the measure to $$[-1, 1]$$.\n- Step 2: The sign of $$r$$ is entirely determined by the sign of $$S_{tw}$$. If $$S_{tw} > 0$$, $$r > 0$$ (positive correlation: as one variable increases, the other tends to). If $$S_{tw} < 0$$, $$r < 0$$ (negative correlation).", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "For the regression line of $$w$$ on $$t$$, $$w = a + bt$$, what are the formulas for $$b$$ and $$a$$? Specifically, which variable's $$S$$-value goes in the denominator, and why? (3 steps)", "answer": "- Step 1: The gradient is $$b = \\frac{S_{tw}}{S_{tt}}$$. The intercept is $$a = \\bar{w} - b\\bar{t}$$.\n- Step 2: The denominator is always the $$S$$-value of the **explanatory** (independent) variable. Here, $$t$$ is explanatory, so the denominator is $$S_{tt}$$.\n- Step 3: Intuition: The regression line predicts $$w$$ from $$t$$. The change in $$w$$ per unit change in $$t$$ must be scaled by the total variance of $$t$$ ($$S_{tt}$$). If you used $$S_{ww}$$, you would be computing the regression line of $$t$$ on $$w$$, which minimizes horizontal (not vertical) errors and is a different line.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "In a \"show that\" question where the final answer is given to 3 significant figures (e.g., $$w = -16.7 + 4.77t$$), what is the rounding rule for intermediate calculations, and what happens if you break it? (2 steps)", "answer": "- Step 1: You must carry at least 5 significant figures (or use calculator memory) for all intermediate values of $$\\bar{t}, \\bar{w}, S_{tw}, b$$, and $$a$$.\n- Step 2: If you round prematurely (e.g., using $$b = 4.77$$ to calculate $$a$$), the accumulated rounding error will cause your final calculated intercept to differ from the printed answer (e.g., you might get -16.5 instead of -16.7), losing the accuracy mark and failing the \"show that\".", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "If the regression line of weight $$w$$ (grams) on tail length $$t$$ (cm) is $$w = -16.7 + 4.77t$$, how do you interpret the gradient in context? (2 steps)", "answer": "- Step 1: The gradient is 4.77. This means that for every 1 unit increase in the explanatory variable $$t$$, the response variable $$w$$ increases by 4.77 units.\n- Step 2: In context: \"For each additional 1 cm of tail length, the weight increases by approximately 4.77 g.\" Always include units and specify the direction (increases/decreases).", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "Why is it inappropriate to use the regression line $$w = -16.7 + 4.77t$$ to estimate the weight of a mouse with tail length $$t = 2$$ cm? Give two distinct reasons. (2 steps)", "answer": "- Step 1: Extrapolation. The data used to build the model likely lies in a range far from $$t = 2$$ cm (e.g., mean $$\\bar{t} = 7.65$$ cm). The linear trend may not hold outside the observed data range.\n- Step 2: Impossible prediction. Plugging in $$t = 2$$ gives $$w = -16.7 + 4.77(2) = -7.16$$ g. A negative weight is physically impossible, confirming the model is invalid for such small tail lengths.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "Data is coded using $$x = t - 6$$ and $$y = \\frac{w}{2} - 5$$. Both scale factors are positive (+1 and +1/2). How does the PMCC between $$x$$ and $$y$$ relate to the PMCC between $$t$$ and $$w$$, and why? (2 steps)", "answer": "- Step 1: The PMCC is identical: $$r_{xy} = r_{tw}$$. \n- Step 2: The PMCC measures the strength and direction of a *linear* relationship. A positive linear coding (shifting or positive scaling) stretches, compresses, or translates the cloud of points but does not change the shape of the scatter or the direction of the trend. Therefore, the correlation remains invariant.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "Given the original regression line $$w = -16.7 + 4.77t$$ and a coding $$x = t - 6$$, $$y = \\frac{w}{2} - 5$$, what is the fastest way to find the regression line of $$y$$ on $$x$$, and why is recalculating $$S_{xy}$$ a mistake? (3 steps)", "answer": "- Step 1: Rearrange the coding equations to express the original variables in terms of the coded variables: $$t = x + 6$$ and $$w = 2y + 10$$.\n- Step 2: Substitute these directly into the original regression line: $$2y + 10 = -16.7 + 4.77(x + 6)$$. This unsimplified equation is the regression line of $$y$$ on $$x$$.\n- Step 3: Recalculating $$S_{xy}$$ from the coded data is a mistake because it wastes time and introduces severe rounding errors. The substitution method guarantees mathematical equivalence with the original line.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "Data is coded using $$x = l - 600$$. If the mean of the coded data is $$\\bar{x}$$, how do you find the mean of the original data $$\\bar{l}$$? Walk through the logic. (2 steps)", "answer": "- Step 1: The coding subtracts 600 from every data point to calculate $$x$$. The mean is a linear operator, so the mean of $$x$$ is the mean of $$l$$ minus 600: $$\\bar{x} = \\bar{l} - 600$$.\n- Step 2: To reverse the coding (find the original mean), you must add the shift constant back: $$\\bar{l} = \\bar{x} + 600$$. A common pitfall is forgetting to reverse the operation or subtracting 600 again.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "Data is coded using $$x = l - 600$$. A student writes $$\\text{Var}(l) = \\text{Var}(x) - 600$$. Explain why this is conceptually wrong and state the correct relationship. (2 steps)", "answer": "- Step 1: Variance measures spread—how far data points are from their mean. Subtracting 600 from every data point shifts the entire dataset to the left, but it does not change the distances between the points. Therefore, the spread is unchanged.\n- Step 2: The correct relationship is $$\\text{Var}(l) = \\text{Var}(x)$$. Variance is invariant under translation (shifting). Adding or subtracting a constant never affects variance.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "A box plot for 81 salmon weights has a median of 4000 g. You are asked for the maximum number of salmon with weights in the interval $$4600 < w \\le 7700$$. Why is the median the key to this question, and what is the maximum count? (3 steps)", "answer": "- Step 1: The interval starts at 4600, which is strictly greater than the median (4000). Therefore, every single value in the interval $$4600 < w \\le 7700$$ lies strictly *above* the median.\n- Step 2: By definition, the median splits the ordered dataset in half. For $$n=81$$, there are 40 values strictly above the median (the 41st value is the median itself).\n- Step 3: Since the interval contains only values above the median, the maximum number of salmon in this interval cannot exceed the total number of values above the median. Thus, the maximum count is 40. Trying to interpolate inside the box is a trap.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "To check for outliers using the $$1.5 \\times \\text{IQR}$$ rule, you must calculate two fences. State the formulas for both fences and the complete checking procedure. (2 steps)", "answer": "- Step 1: Calculate the fences. Lower fence $$= Q_1 - 1.5 \\times \\text{IQR}$$; Upper fence $$= Q_3 + 1.5 \\times \\text{IQR}$$. (Where $$\\text{IQR} = Q_3 - Q_1$$).\n- Step 2: You must compare the minimum data value to the lower fence AND the maximum data value to the upper fence. An outlier exists only if the minimum is strictly less than the lower fence, or the maximum is strictly greater than the upper fence. A common pitfall is checking only one fence based on \"intuition.\"", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "In a probability tree, the first branches represent labels A (30%), B (45%), and C (the rest). What is the probability of C, and why is overlooking \"the rest\" a critical error? (2 steps)", "answer": "- Step 1: The probability of C is $$1 - 0.30 - 0.45 = 0.25$$. The labels A, B, and C are mutually exclusive and exhaustive, so their probabilities must sum to 1.\n- Step 2: Overlooking \"the rest\" means omitting the entire C branch from the tree. This makes it impossible to calculate the total probability of later events (like drawing a red counter) correctly, as you will miss the contribution from the C pathway.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "How does the law of total probability apply to a tree diagram when finding the overall probability of an event (e.g., selecting a red counter) that can occur via multiple mutually exclusive paths? (2 steps)", "answer": "- Step 1: On a tree diagram, the different paths (A→Red, B→Red, C→Red) represent mutually exclusive ways the event can occur.\n- Step 2: The law of total probability states that you sum the probabilities of these separate paths. For each path, multiply the probabilities along the branches (e.g., $$P(A \\cap \\text{Red}) = P(A) \\times P(\\text{Red}|A)$$), then add the results: $$P(\\text{Red}) = P(A)P(\\texttext{RedRed}|A A) + P(B)P(\\text{Red}|B) + P(C)P(\\text{Red}|C)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "A student calculates $$P(R|C) = 0.06$$ but the question asks for $$P(C|R)$$. Explain conceptually why these are not the same, and state the formula that connects them. (3 steps)", "answer": "- Step 1: $$P(R|C)$$ is the probability of being Red *given* you are C. It measures the fraction of C's that are Red. $$P(C|R)$$ is the probability of being C *given* you are Red. It measures the fraction of Reds that are C.\n- Step 22: These populations are different sizes. Even if a high percentage of C's are Red, if C is a small group overall, then C will only make up a small fraction of the total Reds. Thus, the directions of conditioning are not interchangeable.\n- Step 3: Bayes' Theorem connects them: $$P(C|R) = \\frac{P(C) \\times P(R|C)}{P(R)}$$. You must multiply by the prior probability $$P(C)$$ and divide by the total probability $$ normalizing constant $$P(R)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": true}, {"question": "A discrete RV has a piecewise probability function with an unknown constant $$k$ ( What is the fundamental property you must use to find $$k$$, and what is a common algebraic pitfall when evaluating the pieces? (2 steps)", "answer": "- Step 1: The fundamental property is that the total probability must equal 1: $$\\sum P(Y=y) = 1$$. You substitute each value of $$y$$ into the piecewise function, sum them all, set the sum to 1, and solve for $$k$$.\n- Step 2: The common pitfall is sign errors when evaluating functions like $$k(3-y)$$. For $$y=1$$, this is $$k(3-1) = 2k$$, but students often write $$k(1-3) = -2k$$, yielding negative probabilities. Always tabulate the numerical value of the pmf for each $$y$$ before summing.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "For a discrete RV $$Y$$ taking integer values, what is the difference between $$P(Y < 4)$$ and $$P(Y \\le 4)$$? Give a concrete example using values $$y=1,2,3,4$ with probabilities $$0.2, 0.1, 0.1, 0.3$$. (2 steps)", "answer": "- Step 1: For a discrete variable, strict inequality ($$<$$) excludes the boundary, while inclusive ($$\\le$$) includes it. $$P(Y < 4)$$ means $$P(Y=1) + P(Y=2) + P(Y=3)$$. $$P(Y \\le 4)$$ means $$P(Y=1) + P(Y=2) + P(Y=3) + P(Y=4)$$.\n- Step 2: Using the numbers: $$P(Y < 4) = 0.2 + 0.1 + 0.1 = 0.4$$. But $$P(Y \\le 4) = 0.2 + 0.1 + 0.1 + 0.3 = 0.7$$. The difference is exactly $$P(Y=4)$$. For continuous variables this difference is negligible, but for discrete variables it is critical.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "What is the formula for the expected value $$E(Y)$$ of a discrete random variable, and what does it physically represent? (2 steps)", "answer": "- Step 1: The formula is $$E(Y) = \\sum y \\cdot P(Y=y)$$. You multiply each possible outcome by its probability and sum sum the results.\n- Step 2: It It represents the long-run average. If you repeated the random process infinitely many times, $$E(Y)$$ is the value you would expect the average of all the outcomes to converge to. It is the \"center of mass\" of the probability distribution.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "Given $$X = 15 - 2Y$$, you are asked to find $$P(Y \\le X)$$. Why is treating $$X$$ and $$Y$$ as independent variables and trying to sum joint probabilities a fundamental mistake? How should you solve it instead? (3 steps)", "answer": "- Step 1: The mistake is assuming independence. $$X$$ is defined as $$15 - 2Y$$, so $$X$$ and $$Y$$ are deterministically linked (perfectly negatively correlated). If $$Y=3$$, $$X$$ is exactly 9—there is no randomness between them.\n- Step 2: The correct approach is algebraic substitution. Since $$X$$ depends entirely on $$Y$$, replace $$X$$ in the inequality: $$Y \\le 15 - 2Y$$.\n- Step 3: Solve for $$Y$$: $$3Y \\le 15 \\implies Y \\le 5$$. The probability $$P(Y \\le X)$$ is equivalent to $$P(Y \\le 5)$$, which can be found directly from the pmf of $$Y$$.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "Given $$\\text{Var}(Y)$$ and the transformation $$X = 15 - 2Y$$, walk through the rules for finding $$\\text{Var}(X)$$$. Specifically address what happens to the constant 15 and the coefficient $$-2$$. (3 steps)", "answer": "- Step 1: The general rule is $$\\text{Var}(aY + b) = a^2 \\text{Var}(Y)$$.\n- Step 2: The constant shift $$b = 15$$ disappears. Adding a constant changes the mean but not the spread of the data around the mean, so variance is invariant under translation.\n- Step 3: The scaling factor is $$a = -2$$. Variance is always non-negative, so we square the coefficient: $$(-2)^2 \\text{Var}(Y) = 4\\text{Var}(Y)$$. The common pitfall is writing $$-2\\text{Var}(Y)$$ or $$2\\text{Var}(Y)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "Event $$A$$ and $$C$$ are mutually exclusive. Event $$B$$ and $$C$$ are independent. State the mathematical definitions for both terms. Can two events with positive probability be both mutually exclusive AND independent? (3 steps)", "answer": "- Step 1: Mutually exclusive means theP(A \\cap C) = 0$$—they cannot happen at the same time. Independent means $$P(A \\cap C) = P(A)P(C)$$—the probability of their intersection is the product of their individual probabilities.\n- Step 2: Set them equal: $$P(A)P(C) = 0$$. If both have positive probability ($$P(A)>0, P(C)>0$$), then $$P(A)P(C) > 0$$.\n- Step 3: This is a contradiction ($$0 = \\text{something} > 0$$). Therefore, two events with positive probability **cannot** be both mutually exclusive and independent. If they are mutually exclusive, the occurrence of one guarantees the the other cannot occur, destroying independence.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": true}, {"question": "Given $$P(A)$$, $$P(B|A)$$, and $$P(A \\cup B)$$, walk through how to use the inclusion-exclusion principle to find $$P(B)$$ (3 steps)", "answer": "- Step 1: First, find the intersection using the conditional probability: $$P(A \\cap B) = P(A) \\times P(B|A)$$.\n- Step 2: Write out the inclusion-exclusion formula: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$.\n- Step 3: Rearrange to solve for $$P(B)$$: $$P(B) = P(A \\cup B) - P(A) + P(A \\cap B)$$$. A common pitfall is adding $$P(A \\cap B)$$ instead of subtracting it, or forgetting to calculate the intersection first.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "When filling a three-set Venn diagram for $$A, B, C$$, what is the correct order to fill the regions, and why does filling from the outside in cause errors? (3 steps)", "answer": "- Step 1: Always fill from the **centre outward**. Start with the triple intersection $$A \\cap B \\cap C$$$$.\n- Step 2: Next, fill the double-intersection regions (e.g., $$A \\cap B$$ only, $$B \\cap C$$ Only, $$A \\cap C$$ Only) by subtracting the triple intersection value from the total double intersection values.\n- Step 3: Finally, fill the single-only regions and the outside region. Filling outside-in causes over-counting because you might subtract overlapping regions that haven't been accounted for yet, or assign values to outer regions that should belong to inner intersections.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "When completing a Venn diagram, what is the most commonly forgotten region, and what numerical check must you always perform at the end? (2 steps)", "answer": "- Step 1: The most commonly forgotten region is the **outside region** (the complement of $$A \\cup B \\cup C$$). This represents items that belong to none of the sets.\n- Step 2: The required check is that the sum of all regions (the 7 inner regions + 1 outside region) must equal exactly 1.00. If it doesn't, an arithmetic slip has occurred in one of the regions.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "What is the standardisation formula to convert a normal variable $$X \\sim N(\\mu, \\sigma^2)$$ to the standard normal $$Z \\sim N(0,1)$$, and why is the sign of the $$z$$-value critical? (2 steps)", "answer": "- Step 1: The formula is $$Z = \\frac{X - \\mu}{\\sigma}$$$. You subtract the mean and divide by the standard deviation to rescale the curve to a mean of 0 and standard spread of 1.\n- Step 2: The sign of $$z$$ indicates whether the $$X$$-value is above or belowbelow the mean. A positive $$z$$ means $$X$$ is greaterabove$$ the mean ($$X > \\mu$$); a negative $$z$$ means $$X$$ is *below* the mean ($$X < \\mu$$). Getting the sign wrong flips the using the wrong tail of the $$Z$$-table.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "When solving $$P(J > d) = 0.9192$$ for $$d$$ in a normal distribution with mean 500, a student looks up $$\\Phi(z) = 0.9192$$, finds $$z = 1.40$$, and gets $$d = 535$$. Explain the the conceptual error and how a sketch prevents it. (3 steps)", "answer": "- Step 1: The student ignored the meaning of the probability. $$P(J > d) = 0.9192$$ means 91.92% of the data lies *above* $$d$$. Since this is more than 50%, $$d$$ must be to the *left* of the mean (500).\n- Step 2: A sketch makes this obvious. Draw the bell curve, mark the mean 500. Shade the area to the right of $$d$$ as 0.9192. The shaded region is clearly the majority of the curve, so $$d$$ is on the left side.\n- Step 3: Therefore, $$P(J \\le d) = 1 - 0.9192 = 0.0808$$, which is a lower-tail probability. The $$z$$-value must be negative. $$\\Phi(-z) = 0.9192 \\implies z = -1.40$$. The correct answer is $$d = 500 - 35 = 465$$.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": true}, {"question": "For 5 independent bags of juice, you want the probability that *all 5* yield less than 510 ml. If $$P(\\text{one bag} < 510) = 0.6554$$, why is the answer $$(0.6554)^5$$ and not $$5 \\times 0.6554$$? (2 steps)", "answer": "- Step 1: The events \"Bag 1 < 510\", \"Bag 2 < 510\", etc., are independent. The probability of all 5 occurring is the *product* of their individual probabilities, not the sum.\n- Step 2: Multiplying by 5 ($$5 \\times P$$) scales the the number of trials linearly. Summing ($$5 \\times P$$) would imply that at least one bag is NOT less than 510, which is wrong.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": true}, {"question": "A normal distribution $$R \\sim N(520, k^2)$$ has two conditions: $$P(R < r) = 0.15$$ and $$P(R > 3r - 800) = 0.005$$. Walk through the strategy to convert these into a system of two equations in $$r$$ and $$k$ (3 steps)", "answer": "- Step 1: Convert both statements to $$z$$-score equations. For the lower tail: $$P(R < r) = 0.15 \\implies z_1 = -1.0364 \\implies \\frac{r - 520}{k} = -1.0364$$. For the Upper tail: $$P(R > 3r-800) = 0.005 \\implies z_2 = 2.5758 \\implies \\frac{3r - 800 - 520}{k} = 2.5758$$.\n- Step 2: Rearrange both to isolate $$r$$. Eq 1: $$r = 520 - 1.0364k$$. Eq 2: $$3r - 1320 = 2.5758k \\implies 3r = 1320 + 2.5758k \\implies r = 440 + 0.8586k$$.\n- Step 3: Equate the two expressions for $$r$$: $$520 - 1.0364k = 440 + 0.8586k \\implies 80 = 1.8950k \\implies k = 42.2$$. Solving algebraically avoids arithmetic slips from substituting numbers too early.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": false}, {"question": "When dealing with an upper-tail probability like $$P(R > 3r-800) = 0.005$$, what is the exact $$z$$-value from the percentage-point table, and why is using the body table ($$\\Phi(z) = 0.995$$) potentially less accurate? (2 steps)", "answer": "- Step 1: The exact value from the percentage-point table for a tail of 0.005 is $$z = 2.5758$$. This table gives critical values directly for specific tail probabilities.\n- Step 2: The body table gives $$\\Phi(z)$$, the so you would look up $$\\Phi(z) = 0.995$$. Because the0.995 is rounded (it corresponds to a $$z$$ of approximately 2.58), using 2.58 introduces a rounding error that can compound over the two-equation system, making the exact 2.5758 necessary for exam accuracy.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "Compare the effects of a linear coding $$X = aY + b$$ on: (1) the Mean, (2) the Variance, (3) the PMCC, and (4) the Regression Line. (4 steps)", "answer": "- Step 1: The Mean shifts linearly: $$E(aY+b) = aE(Y) + b$$. Both the scaling and shift affect it.\n- Step 2: The Variance is only affected by scaling (squaring the coefficient) and is shift drops out: $$\\text{Var}(aY+b) = a^2 \\text{Var}(Y)$$.\n- Step 3: The PMCC is invariant under any positive linear coding ($$a > 0$$). The correlation structure doesn't change, so $$r$$ remains the same.\n- Step 4: The Regression Line changes form. You substitute the coding equations into the original regression line rather than recomputing. The gradient scales by $$a$$, and the intercept shifts by both $$a$$ and $$b$$.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": false}, {"question": "Contrast \"Mutually Exclusive\" and \"Independent\" in terms of: (1) their mathematical definition, (2) their Venn diagram appearance, and (3) what they imply about $$P(A|B)$$ (3 steps)", "answer": "- Step 1: Definition. Mutually Exclusive: $$P(A \\cap B) = 0$$. Independent: $$P(A \\cap B) = P(A)P(B)$$.\n- Step 22: Venn Appearance. Mutually Exclusive: The two circles do not overlap at all; there is empty space in the intersection region. Independent: The circles overlap, and the intersection region's area is exactly $$P(A) \\times P(B)$$.\n- Step 3: Conditional Probability. Mutually Exclusive: If A occurs, B cannot occur ($$P(B|A) = 0$$). Independent: If A occurs, B's probability is unchanged ($$P(B|A) = P(B)$$).", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": false}, {"question": "Exercise: If $$\\text{Var}(Y) = 10$$, find $$\\text{Var}(3Y - 4)$$ and $$\\text{Var}(-Y + 2)$$$ using mental math. (2 steps)", "answer": "- Step 1: For $$\\text{Var}(3Y - 4)$$, the scaling factor is $$a = 3$$ and the shift is $$b = -4$$. The variance scales by $$a^2 = 9$$, so $$\\text{Var}(3Y - 4) = 9 \\times 10 = 90$$. The shift (-4) drops out.\n- Step 2: For $$\\text{Var}(-Y + 2)$$, the scaling factor is $$a = -1$$ (so $$a^2 = 1$$) and the shift is $$b = 2$$. Thus $$\\text{Var}(-Y + 2) = 1 \\times 10 = 10$$.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": false}, {"question": "Exercise: $$X \\sim N(100, 5^2)$$. Find $$x$$ such that $$P(X > x) = 0.8$$ using mental math or a sketch. (3 steps)", "answer": "- Step 1: Sketch the curve. Mean is 100. Since $$P(X > x) = 0.8 > 0.5$$, the area to the right of $$x$$ is the majority. Therefore, $$x$$ must be below the100$$ (to the left).\n- Step 2: Convert to lower tail. $$P(X \\le x) = 1 - 0.8 = 0.2$$. This means $$x$$ is in the lower tail, so the $$z$$-score is negative. By symmetry, if $$\\Phi(0.84) = 0.8$$, then $$\\Phi(-0.84) = 0.2$$, so $$z \\approx -0.84$$.\n- Step 3: Use standardisation. $$x = \\mu + z\\sigma = 100 + (-0.84)(5) = 100 - 4.2 = 95.8$$.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": false}], "count": 37}, "qwen_1": {"label": "Qwen 3 ①", "cards": [], "count": 0}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "What formula relates frequency (f), frequency density (FD), and class width (w) in a histogram? Why must FD be calibrated first using a known frequency? (2 steps)", "answer": "- Step 1: The formula is $ f = \\text{FD} \\times w $. FD is the y-axis value for each bar, and multiplying by class width gives the actual frequency in that class.  \n- Step 2: Calibration ensures consistency. Since FD depends on the scale of the y-axis, you must use a known frequency (e.g., 60 people in [10,20) km with FD=6) to establish the correct FD-to-frequency ratio before reading other bars. Failure to calibrate leads to errors in partial-bar calculations.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "How do you calculate the median from grouped data using linear interpolation? Why is the median position $ n/2 $ instead of $ (n+1)/2 $? (3 steps)", "answer": "- Step 1: Identify the median class using cumulative frequencies. For $ n = 274 $, median position $ = 274/2 = 137 $, which lies in [30,40) km.  \n- Step 2: Use the formula:  \n  $$\n  \\text{Median} = L + \\frac{n/2 - F}{f_m} \\times w\n  $$  \n  where $ L = 30 $ (lower class boundary), $ F = 135 $ (cumulative frequency before median class), $ f_m = 100 $ (frequency in median class), $ w = 10 $ (class width).  \n- Step 3: Compute:  \n  $$\n  \\text{Median} = 30 + \\frac{137 - 135}{100} \\times 10 = 30.2 \\text{ km}.\n  $$  \n  **Key insight:** $ n/2 $ is used for continuous data because it avoids the discrete assumption inherent in $ (n+1)/2 $.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "What is the formula for the mean from grouped data? Why must midpoints be used instead of class boundaries? (2 steps)", "answer": "- Step 1: The mean is calculated as:  \n  $$\n  \\bar{x} = \\frac{\\sum f x_{\\text{mid}}}{\\sum f}\n  $$  \n  For example, using the provided data:  \n  $$\n  \\sum f x_{\\text{mid}} = 5(5) + 60(15) + 70(25) + 100(35) + 30(45) + 9(55) = 8020.\n  $$  \n- Step 2: Midpoints represent the average value within each class, ensuring the sum reflects actual data distribution. Class boundaries alone don’t capture the spread within the class.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "How is the product moment correlation coefficient (PMCC) calculated? Why is it invariant under positive linear coding? (3 steps)", "answer": "- Step 1: Compute $ r = \\frac{S_{tw}}{\\sqrt{S_{tt} S_{ww}}} $, where $ S_{tw} = \\sum tw - \\frac{\\sum t \\sum w}{n} $, and similarly for $ S_{tt} $ and $ S_{ww} $.  \n- Step 2: For the given data:  \n  $$\n  r = \\frac{25.36733}{\\sqrt{5.3173 \\times 176.79733}} \\approx 0.827.\n  $$  \n- Step 3: PMCC is invariant under positive linear coding (e.g., $ x = t - 6 $, $ y = w/2 - 5 $) because it measures the linear relationship’s strength and direction, unaffected by scale or shift transformations.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "How does coding affect mean and variance? Why is variance unchanged under shift but scaled under multiplication? (2 steps)", "answer": "- Step 1: For coding $ x = l - 600 $, the mean transforms as $ \\bar{l} = \\bar{x} + 600 $, preserving the shift. Variance remains $ \\text{Var}(l) = \\text{Var}(x) $ because shifting doesn’t alter spread.  \n- Step 2: If coded as $ y = bx $, variance scales as $ \\text{Var}(y) = b^2 \\text{Var}(x) $. Shifts (addition) don’t affect variance, but scaling (multiplication) does, as it alters distances between data points.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "Why is the variance of $ aY + b $ equal to $ a^2 \\text{Var}(Y) $? How does this apply to $ X = 15 - 2Y $? (2 steps)", "answer": "- Step 1: Varianc
