e is affected only by scaling (multiplication), not shifting (addition). Thus, $ \\text{Var}(aY + b) = a^2 \\text{Var}(Y) $.  \n- Step 2: For $ X = 15 - 2Y $, $ a = -2 $, $ b = 15 $. Hence, $ \\text{Var}(X) = (-2)^2 \\text{Var}(Y) = 4 \\text{Var}(Y) $. The constant 15 has no effect on variance.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "How do you determine the maximum number of data points in an interval $ 4600 < w \\leq 7700 $ given a box plot with $ Q_1 = 3000 $, median $ = 4000 $, $ Q_3 = 5500 $? (2 steps)", "answer": "- Step 1: Since $ 4600 > \\text{median} = 4000 $, all values in $ (4600, 7700] $ lie above the median. In a dataset of 81 points, at most $ \\lfloor 81/2 \\rfloor = 40 $ can be strictly above the median.  \n- Step 2: The interval’s upper bound (7700) is the maximum, so the maximum count is 40. Interpolation inside the box is irrelevant here—focus on the median’s definition.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "Why is extrapolation in regression problematic? Illustrate with the given example where $ t = 2 $ cm is outside the data range. (2 steps)", "answer": "- Step 1: The regression line $ w = -16.7 + 4.77t $ was derived from data with $ \\bar{t} = 7.65 $ cm and standard deviation $ s_t \\approx 0.62 $ cm, implying a range $ \\approx 6.4–8.9 $ cm.  \n- Step 2: Predicting $ w $ for $ t = 2 $ cm (far outside this range) gives $ w = -16.7 + 4.77(2) = -7.16 $ g, a physically impossible negative weight. Extrapolation ignores the model’s validity scope and can yield nonsensical results.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "How do you solve for $ k $ in the piecewise pmf of $ Y $? Why must the sum of probabilities equal 1? (2 steps)", "answer": "- Step 1: Sum all $ P(Y = y) $:  \n  $$\n  2k + k + k + 8k + 17k + k = 30k = 1 \\implies k = \\frac{1}{30}.\n  $$  \n- Step 2: The pmf must satisfy $ \\sum P(Y = y) = 1 $ because it represents the total probability across all possible outcomes. This ensures the distribution is valid.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "How do you find $ P(Y \\leq X) $ when $ X = 15 - 2Y $? Why must the inequality be solved algebraically? (2 steps)", "answer": "- Step 1: Substitute $ X = 15 - 2Y $ into $ Y \\leq X $:  \n  $$\n  Y \\leq 15 - 2Y \\implies 3Y \\leq 15 \\implies Y \\leq 5.\n  $$  \n- Step 2: Algebraic manipulation is necessary because $ X $ and $ Y $ are dependent (not independent). Enumerating joint pairs incorrectly assumes independence, leading to errors.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "How do you determine if there are outliers in a box plot? Calculate the fences for $ Q_1 = 3000 $, $ Q_3 = 5500 $. (2 steps)", "answer": "- Step 1: Compute IQR = $ 5500 - 3000 = 2500 $. Outliers are values outside $ [Q_1 - 1.5 \\times \\text{IQR}, Q_3 + 1.5 \\times \\text{IQR}] $.  \n- Step 2: Lower fence = $ 3000 - 3750 = -750 $, upper fence = $ 5500 + 3750 = 9250 $. Since min = 2000 and max = 7700 both lie within these fences, there are no outliers.", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "How do you calculate $ P(C \\mid R) $ using Bayes’ theorem given $ P(R \\mid C) = 0.06 $, $ P(C) = 0.25 $, and total $ P(R) = 0.039 $? (2 steps)", "answer": "- Step 1: Apply Bayes’ theorem:  \n  $$\n  P(C \\mid R) = \\frac{P(C) \\times P(R \\mid C)}{P(R)} = \\frac{0.25 \\times 0.06}{0.039} = \\frac{0.015}{0.039} \\approx 0.385.\n  $$  \n- Step 2: Bayes’ theorem corrects for the base rate $ P(C) $ and total probability $ P(R) $, ensuring the conditional probability reflects the updated information.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": true}, {"question": "Why is the formula for the regression line $ w = a + bt $ derived using $ b = S_{tw}/S_{tt} $? How does this ensure the best fit? (2 steps)", "answer": "- Step 1: The gradient $ b = S_{tw}/S_{tt} $ minimizes the sum of squared residuals between observed and predicted $ w $. This is derived from least squares regression.  \n- Step 2: The intercept $ a = \\bar{w} - b\\bar{t} $ centers the line on the data’s mean point $ (\\bar{t}, \\bar{w}) $, ensuring it passes through this point for optimal fit.", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": false}, {"question": "How do you interpret the gradient of the regression line $ w = -16.7 + 4.77t $? Why is this interpretation limited to the data range? (2 steps)", "answer": "- Step 1: For each additional 1 cm of tail length ($ t $), weight ($ w $) increases by 4.77 g. This is a linear approximation of the relationship.  \n- Step 2: The interpretation is valid only within the observed $ t $ range (≈6.4–8.9 cm). Outside this, the model may not hold, as seen in extrapolation to $ t = 2 $ cm giving a negative weight.", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "How do you solve for $ r $ and $ k $ in the normal distribution problem $ R \\sim N(520, k^2) $ given $ P(R < r) = 0.15 $ and $ P(R > 3r - 800) = 0.005 $? (3 steps)", "answer": "- Step 1: Convert probabilities to z-scores. For $ P(R < r) = 0.15 $, $ z_1 = -1.0364 $. For $ P(R > 3r - 800) = 0.005 $, $ z_2 = 2.5758 $.  \n- Step 2: Write equations:  \n  $$\n  \\frac{r - 520}{k} = -1.0364 \\quad \\text{and} \\quad \\frac{3r - 800 - 520}{k} = 2.5758.\n  $$  \n- Step 3: Solve the system: Rearrange both equations for $ r $ in terms of $ k $, equate, and solve for $ k \\approx 42.2 $, then back-substitute to find $ r \\approx 476 $.", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": false}], "count": 15}, "minimax_1": {"label": "MiniMax ①", "cards": [], "count": 0}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "In a histogram showing grouped data, the bar for class [10, 20) km has a frequency density (FD) of 6. The class width is 10 km. What is the frequency (number of people) in this class? (1 step)", "answer": "- Step 1: The relationship between frequency density, frequency, and class width is: $$f = \\text{FD} \\times w$$\n- For the [10, 20) class: $$f = 6 \\times 10 = \\boxed{60}$$", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "A histogram has unequal class widths. The bar for class [10, 20) has FD = 6 and you need to find the number of people in the partial interval [22, 30). What is the width of this partial interval and what calculation do you perform? (1 step)", "answer": "- Step 1: The partial interval [22, 30) has width = 30 - 22 = 8 km.\n- Since FD = 7 for the [20, 30) class, the frequency is: $$f = \\text{FD} \\times \\text{width} = 7 \\times 8 = \\boxed{56}$$", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "For a histogram with n = 274 data points, what is the position of the median in terms of the cumulative frequency? (1 step)", "answer": "- Step 1: For continuous grouped data, the median position is at $$n/2 = 274/2 = \\boxed{137}$$\n- This is different from discrete data where you might use (n+1)/2.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "In a histogram, you need to find the median distance. The 137th value lies in the class [30, 40) with lower boundary L = 30, cumulative frequency before this class F = 135, frequency in this class f_m = 100, and class width w = 10. Calculate the median using linear interpolation. (2 steps)", "answer": "- Step 1: The median formula for grouped data is: $$\\text{median} = L + \\frac{(n/2) - F}{f_m} \\times w$$\n- Step 2: Substituting: $$\\text{median} = 30 + \\frac{137 - 135}{100} \\times 10 = 30 + \\frac{2}{100} \\times 10 = 30 + 0.2 = \\boxed{30.2 \\text{ km}}$$", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "To find the mean from a histogram, what values must you calculate for each class, and how do you combine them? (2 steps)", "answer": "- Step 1: For each class, calculate the midpoint: $$x_{\\text{mid}} = \\frac{\\text{lower boundary} + \\text{upper boundary}}{2}$$\n- Step 2: Then compute: $$\\bar{x} = \\frac{\\sum f \\cdot x_{\\text{mid}}}{\\sum f}$$\n+ For the histogram data: midpoints are 5, 15, 25, 35, 45, 55 km for the six classes", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "Why must you ALWAYS calibrate the histogram by computing the FD scale BEFORE reading off other bars? (1 step)", "answer": "- Step 1: Because the y-axis shows FD, not frequency. You cannot simply \"read off\" the y-axis — you must first determine what 1 unit of FD represents in terms of actual frequency using a class where you know the frequency.\n- This ensures all subsequent frequency calculations using f = FD × w are accurate.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "What is the formula for S_xy (the sum of products of deviations), and what are its components? (1 step)", "answer": "- Step 1: $$S_{xy} = \\sum xy - \\frac{\\sum x \\sum y}{n}$$\n+ $$\\sum xy$$ = sum of products of x and y values\n+ $$\\sum x$$ = sum of all x values\n+ $$\\sum y$$ = sum of all y values\n+ $$n$$ = number of data points", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "Given S_tt = 5.3173, S_ww = 176.79733, and S_tw = 25.36733 for mouse data (n=15), calculate the product moment correlation coefficient r. (2 steps)", "answer": "- Step 1: The formula is: $$r = \\frac{S_{tw}}{\\sqrt{S_{tt} \\cdot S_{ww}}}$$\n- Step 2: Substituting: $$r = \\frac{25.36733}{\\sqrt{5.3173 \\times 176.79733}} = \\frac{25.36733}{\\sqrt{940.0457}} = \\frac{25.36733}{30.6608} = \\boxed{0.827}$$", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "For regression of w on t (weight on tail length), the gradient b = S_tw/S_tt. What does this gradient represent in context, and what are its units? (1 step)", "answer": "- Step 1: The gradient represents the expected increase in weight (in grams) for each additional 1 cm of tail length.\n- Units: grams per cm (g/cm)", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "Why is it inappropriate to use the regression line w = -16.7 + 4.77t to estimate weight when tail length t = 2 cm? (2 steps)", "answer": "- Step 1: The data range for tail length is approximately 6.4 to 8.9 cm (mean 7.65 cm, with standard deviation ~0.62 cm). The value t = 2 cm is far outside this range.\n- Step 2: This is extrapolation. The predicted weight would be w = -16.7 + 4.77(2) = -7.16 g, which is physically impossible (negative weight), confirming the model is invalid at t = 2 cm.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "The data is coded as x = t - 6 and y = w/2 - 5. What is the value of the PMCC between x and y? (1 step)", "answer": "- Step 1: PMCC is invariant under positive linear coding. Since both transformations have positive scale factors (1 and 1/2 respectively), $$r_{xy} = r_{tw} = \\boxed{0.827}$$\n- The correlation coefficient does not change because scaling and shifting preserve the linear relationship.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "Given the regression line w = -16.7 + 4.77t, and coding x = t - 6, y = w/2 - 5, how do you find the regression line of y on x WITHOUT recalculating S_xy and S_xx? (2 steps)", "answer": "- Step 1: Substitute the inverse coding: t = x + 6 and w = 2y + 10 into the original equation.\n- Step 2: $$2y + 10 = -16.7 + 4.77(x + 6)$$\n+ This gives the equation of y on x without recomputing any sums.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "Data on salmon lengths is coded as x = l - 600, with ∑x = 3711 for n = 81 fish. Find the actual mean length l̄. (1 step)", "answer": "- Step 1: First find x̄: $$\\bar{x} = \\frac{3711}{81} = 45.8148$$\n- Then reverse the shift: $$\\bar{l} = \\bar{x} + 600 = 45.8148 + 600 = \\boxed{645.8 \\text{ mm}}$$", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "For the coded salmon data (x = l - 600), you calculate Var(x) = 3770 (3 s.f.). What is the actual variance of the lengths? Explain why you don't add or subtract 600. (2 steps)", "answer": "- Step 1: The variance of the actual lengths is: $$\\mathrm{Var}(l) = \\mathrm{Var}(x) = \\boxed{3770 \\text{ mm}^2}$$\n- Step 2: Variance is invariant under translation: $$\\mathrm{Var}(x + a) = \\mathrm{Var}(x)$$\n- Adding a constant (600) shifts all data but does not change the spread. Only multiplication by a scale factor changes variance.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "In a box plot with Q1 = 3000, Q3 = 5500, and median = 4000 for n = 81 data points, what is the maximum possible number of values in the interval 4600 < w ≤ 7700? (2 steps)", "answer": "- Step 1: Since 4600 > median = 4000, all values in this interval must lie strictly above the median.\n- Step 2: At most floor(n/2) = floor(81/2) = 40 data points can lie strictly above the median.\n- Therefore the maximum is $$\\boxed{40}$$", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "Using the outlier rule with Q1 = 3000, Q3 = 5500 (so IQR = 2500), calculate the lower and upper fences for outliers. Does a minimum value of 2000 or maximum of 7700 constitute an outlier? (2 steps)", "answer": "- Step 1: Calculate fences:\n+ Lower fence: Q1 - 1.5 × IQR = 3000 - 1.5(2500) = 3000 - 3750 = -750\n+ Upper fence: Q3 + 1.5 × IQR = 5500 + 1.5(2500) = 5500 + 3750 = 9250\n- Step 2: Compare extremes:\n+ Min = 2000 > -750 → not an outlier\n+ Max = 7700 < 9250 → not an outlier\n+ $$\\boxed{\\text{No outliers exist}}$$", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "A bag contains counters labeled A (30%), B (45%), and C (the rest). Of A, 2% are red; of B, 4% are red; of C, 6% are red. What is the probability that a randomly selected counter is red? (2 steps)", "answer": "- Step 1: First find P(C) = 1 - 0.30 - 0.45 = 0.25\n- Step 2: Use the law of total probability: $$P(R) = P(A)P(R|A) + P(B)P(R|B) + P(C)P(R|C)$$\n$$= 0.30(0.02) + 0.45(0.04) + 0.25(0.06) = 0.006 + 0.018 + 0.015 = \\boxed{0.039}$$", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "Given P(red) = 0.039 and P(C) = 0.25 with P(R|C) = 0.06, find P(C|red), the probability that a red counter is labeled C. (2 steps)", "answer": "- Step 1: Apply Bayes' theorem: $$P(C|R) = \\frac{P(C) \\cdot P(R|C)}{P(R)}$$\n- Step 2: Substituting: $$P(C|R) = \\frac{0.25 \\times 0.06}{0.039} = \\frac{0.015}{0.039} = \\frac{15}{39} = \\frac{5}{13} \\approx \\boxed{0.385}$$", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "What is the key difference between \"mutually exclusive\" and \"independent\" events? Can two events with positive probability be both mutually exclusive AND independent? (2 steps)", "answer": "- Step 1: Mutually exclusive means the events cannot occur together: P(A ∩ B) = 0.\n- Independent means one event occurring does not affect the probability of the other: P(A ∩ B) = P(A)P(B).\n- Step 2: If both A and B have positive probability, they CANNOT be both mutually exclusive AND independent (since P(A)P(B) > 0, but P(A ∩ B) = 0).", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "Given P(A) = 0.1, P(B|A) = 0.3, and P(A ∪ B) = 0.25, find P(B). Show your work using inclusion-exclusion. (2 steps)", "answer": "- Step 1: First find P(A ∩ B) = P(A) × P(B|A) = 0.1 × 0.3 = 0.03\n- Step 2: Use inclusion-exclusion: P(A ∪ B) = P(A) + P(B) - P(A ∩ B)\n$$0.25 = 0.1 + P(B) - 0.03$$\n$$P(B) = 0.25 - 0.1 + 0.03 = \\boxed{0.18}$$", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "Events A and C are mutually exclusive (P(A ∩ C) = 0), while B and C are independent (P(B ∩ C) = P(B)P(C)). Given P(A) = 0.1, P(B) = 0.18, P(C) = 0.5, and P(A ∩ B) = 0.03, find the probability in the region representing B only (neither A nor C). (2 steps)", "answer": "- Step 1: First find P(B ∩ C) = P(B)P(C) = 0.18 × 0.5 = 0.09 (since independent)\n- Step 2: The \"B only\" region = P(B) - P(A ∩ B) - P(B ∩ C) + P(A ∩ B ∩ C)\n+ Since A and C are mutually exclusive, A ∩ B ∩ C = 0\n+ = 0.18 - 0.03 - 0.09 + 0 = $$\\boxed{0.06}$$", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "A discrete RV Y has pmf P(Y=y) = k(3-y) for y=1,2 and P(Y=y) = k(y²-8) for y=3,4,5, plus P(Y=6)=k. Find k such that probabilities sum to 1. (2 steps)", "answer": "- Step 1: Tabulate each term in terms of k:\n+ y=1: k(3-1) = 2k\n+ y=2: k(3-2) = 1k\n+ y=3: k(9-8) = 1k\n+ y=4: k(16-8) = 8k\n+ y=5: k(25-8) = 17k\n+ y=6: k\n- Step 2: Sum = 2k + k + k + 8k + 17k + k = 30k = 1 → k = 1/30", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "For the discrete RV Y with pmf P(Y=y) = k(3-y) for y=1,2 and k(y²-8) for y=3,4,5, and k for y=6, find P(1 < Y ≤ 4). (2 steps)", "answer": "- Step 1: \"1 < Y ≤ 4\" means Y = 2, 3, or 4\n- Step 2: Using k = 1/30: P(Y=2) = 1/30, P(Y=3) = 1/30, P(Y=4) = 8/30\n+ Total = (1 + 1 + 8)/30 = 10/30 = $$\\boxed{\\frac{1}{3}}$$", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "For the same discrete RV Y, find E(Y). (2 steps)", "answer": "- Step 1: Calculate E(Y) = Σy × P(Y=y):\n$$E(Y) = \\frac{1(2) + 2(1) + 3(1) + 4(8) + 5(17) + 6(1)}{30}$$\n- Step 2: Numerator = 2 + 2 + 3 + 32 + 85 + 6 = 130\n+ E(Y) = 130/30 = 13/3 ≈ $$\\boxed{4.33}$$", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "Given X = 15 - 2Y, find P(Y ≤ X). Explain why you cannot treat Y and X as independent random variables. (2 steps)", "answer": "- Step 1: Since X = 15 - 2Y is a deterministic function of Y, Y and X are NOT independent — knowing Y completely determines X.\n- Step 2: Solve the inequality: Y ≤ 15 - 2Y → 3Y ≤ 15 → Y ≤ 5\n+ P(Y ≤ X) = P(Y ≤ 5) = 1 - P(Y = 6) = 1 - 1/30 = $$\\boxed{\\frac{29}{30}}$$", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "For Y with Var(Y) = 61/45, find Var(X) where X = 15 - 2Y. Explain why the constant 15 disappears and why the coefficient -2 becomes +4. (2 steps)", "answer": "- Step 1: The variance formula for linear transformation is: $$\\mathrm{Var}(aY + b) = a^2 \\mathrm{Var}(Y)$$\n- Step 2: Here a = -2, b = 15:\n+ a² = (-2)² = 4\n+ The constant b = 15 drops out because Var(b) = 0\n+ $$\\mathrm{Var}(X) = 4 \\times \\frac{61}{45} = \\frac{244}{45} \\approx \\boxed{5.42}$$", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "A果汁体积 J ~ N(500, 25²). Calculate P(J > 510) using standardisation. (2 steps)", "answer": "- Step 1: Standardise: $$z = \\frac{510 - 500}{25} = \\frac{10}{25} = 0.4$$\n- Step 2: P(J > 510) = P(Z > 0.4) = 1 - Φ(0.4) = 1 - 0.6554 = $$\\boxed{0.3446}$$", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "For J ~ N(500, 25²), find d such that P(J > d) = 0.9192. Why is d less than the mean? (2 steps)", "answer": "- Step 1: P(J > d) = 0.9192 means P(J ≤ d) = 0.0808, which is < 0.5, so d is below the mean.\n- Step 2: Find z where Φ(-z) = 0.9192. From tables: -z = 1.40, so z = -1.40\n+ d = μ + zσ = 500 + (-1.40)(25) = 500 - 35 = $$\\boxed{465}$$", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "For 5 independent bags of juice each following N(500, 25²), find the probability that all 5 yield less than 510 ml. Why do you raise to the 5th power rather than multiply? (1 step)", "answer": "- Step 1: P(all 5 < 510) = [P(one bag < 510)]⁵ = (0.6554)⁵ = $$\\boxed{0.121}$$\n- We raise to the power because the bags are independent — the probability of all five occurring is the product of individual probabilities.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "Given R ~ N(520, k²) with P(R < r) = 0.15, write the equation relating r and k using the z-value. (2 steps)", "answer": "- Step 1: P(R < r) = 0.15 is a lower tail < 0.5, so z < 0.\n- Step 2: From the percentage-point table: Φ(-1.0364) = 0.15, so z = -1.0364\n+ $$\\frac{r - 520}{k} = -1.0364$$\n+ Rearranging: $$r = 520 - 1.0364k \\tag{★}$$", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "For the same normal distribution R ~ N(520, k²), given P(R > 3r - 800) = 0.005, write another equation relating r and k. (2 steps)", "answer": "- Step 1: P(R > 3r - 800) = 0.005 means this is an upper tail > 0.5, so z > 0.\n- Step 2: From the percentage-point table: z_0.005 = 2.5758\n+ $$\\frac{(3r - 800) - 520}{k} = 2.5758$$\n+ Simplifying: $$\\frac{3r - 1320}{k} = 2.5758$$\n+ $$r = 440 + 0.8586k \\tag{★★}$$", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "Solve the system of equations to find r and k: r = 520 - 1.0364k and r = 440 + 0.8586k. (2 steps)", "answer": "- Step 1: Equate both expressions for r:\n$$520 - 1.0364k = 440 + 0.8586k$$\n$$80 = 1.8950k$$\n- Step 2: Solve: $$k = \\frac{80}{1.8950} = \\boxed{42.2}$$\n+ Substitute back: r = 520 - 1.0364(42.2) = 520 - 43.75 = $$\\boxed{476}$$", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "What are the four key percentage-point z-values that should be memorised for the normal distribution? (1 step)", "answer": "- Step 1: - z_0.05 = 1.6449 (5% upper tail)\n- z_0.025 = 1.9600 (2.5% upper tail)\n- z_0.01 = 2.3263 (1% upper tail)\n- z_0.005 = 2.5758 (0.5% upper tail)", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "Why is it essential to SKETCH the normal distribution BEFORE looking up z-values in the table? (1 step)", "answer": "- Step 1: The sketch tells you whether the required probability corresponds to an upper tail (z > 0) or lower tail (z < 0). Without a sketch, it is easy to use the wrong sign of z, leading to answers on the wrong side of the mean.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "In a three-set Venn diagram with A and C mutually exclusive (A ∩ C = 0), and B and C independent (B ∩ C = P(B)P(C)), what is the probability of A ∩ B ∩ C? (1 step)", "answer": "- Step 1: Since A ∩ C = 0 (they are mutually exclusive), any intersection involving both A and C must also be 0.\n- Therefore, $$P(A \\cap B \\cap C) = \\boxed{0}$$", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "For the Venn diagram with P(A) = 0.1, P(B) = 0.18, P(C) = 0.5, P(A ∩ B) = 0.03, P(A ∩ C) = 0, P(B ∩ C) = 0.09, find the probability in the region \"C only\" (neither A nor B). (2 steps)", "answer": "- Step 1: C only = P(C) - P(A ∩ C) - P(B ∩ C) + P(A ∩ B ∩ C)\n- Step 2: = 0.5 - 0 - 0.09 + 0 = $$\\boxed{0.41}$$", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "In a histogram question, a student reads the FD value directly from the y-axis without calibration. Why is this potentially wrong? (1 step)", "answer": "- Step 1: The FD scale on the y-axis is not guaranteed to start at 0 or have integer intervals. You must CALIBRATE by computing FD for a class where you know the frequency, then use that scale to read other classes.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "A student computes Var(x) from coded data as Var(x) = 3770, then writes Var(actual) = 3770 + 600 = 4170. What is wrong with this approach? (1 step)", "answer": "- Step 1: Variance is INVARIANT under translation (adding a constant). You cannot add 600 to the variance. The correct answer is Var(actual) = Var(coded) = 3770. Only scaling by a factor changes variance.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "In question Q5 part (d), a student tries to compute P(Y ≤ X) by treating Y and X as independent and summing P(Y=y) × P(X=x). Why is this wrong? (1 step)", "answer": "- Step 1: X = 15 - 2Y is a deterministic function of Y. Once you know Y, X is completely determined. They are perfectly correlated, not independent. The correct approach is to solve the inequality algebraically.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}, {"question": "In the normal distribution question, a student looks up Φ(z) = 0.9192 and gets z = 1.40, then calculates d = 500 + 1.40 × 25 = 535. What is wrong with this? (1 step)", "answer": "- Step 1: The student used the wrong tail. Since P(J > d) = 0.9192 > 0.5, d must be BELOW the mean, so z should be NEGATIVE. The correct answer is d = 465.", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "A student computes the median position as (n+1)/2 = 275/2 = 137.5 for grouped histogram data. Is this correct? (1 step)", "answer": "- Step 1: NO. For continuous grouped data (histograms), the median position is n/2 = 137. The (n+1)/2 formula is for discrete data. Using 137.5 would shift the median to the next class incorrectly.", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": false}, {"question": "In the probability tree question, a student only considers two branches (A and B) when calculating P(red). Why is this incomplete? (1 step)", "answer": "- Step 1: There are THREE labels (A, B, C). The probability of red must include contributions from all three: P(R) = P(A)P(R|A) + P(B)P(R|B) + P(C)P(R|C). Missing C loses marks.", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "In the three-set Venn diagram question, a student forgets to include the region outside all three circles. What should this region contain, and how do you check it? (1 step)", "answer": "- Step 1: The outside region is P(no event) = 1 - P(A ∪ B ∪ C). You calculate it by summing all seven inner regions and subtracting from 1. In this question it equals 0.34.", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": false}, {"question": "For the regression line \"show that\" question, a student calculates b = 4.77 to 2 decimal places and gets a = -16.6. Why might this fail to match the printed answer w = -16.7 + 4.77t? (1 step)", "answer": "- Step 1: Premature rounding. You must carry at least 4-5 significant figures through all intermediate calculations (b = 4.77073..., a = -16.65991...) before rounding to the required figures. Rounding too early compounds errors.", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}, {"question": "What is the relationship between S_xx, S_yy, and S_xy, and how do you calculate them? (1 step)", "answer": "- Step 1: $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$\n- $$S_{yy} = \\sum y^2 - \\frac{(\\sum y)^2}{n}$$\n- $$S_{xy} = \\sum xy - \\frac{\\sum x \\sum y}{n}$$", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": false}, {"question": "How does the regression line equation change when you code the data using positive linear transformations? (1 step)", "answer": "- Step 1: For positive linear coding (x = (t - a)/b), you can either:\n+ (a) Substitute the coding into the original regression equation, OR\n+ (b) Recompute using the coded data — both give valid results.\n- The PMCC r remains unchanged under positive linear coding.", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": false}, {"question": "In the discrete RV question, a student writes P(Y=y) = k(y-3) for y=1,2. What is wrong with this formulation? (1 step)", "answer": "- Step 1: For y=1: y-3 = -2, giving a negative probability. The correct form is k(3-y), which gives positive probabilities: P(Y=1) = 2k, P(Y=2) = k.", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": false}, {"question": "A student attempts to find the median from a histogram by simply reading the value at the 50% height on the y-axis. Why is this wrong? (1 step)", "answer": "- Step 1: The median is found at the 50% point of the AREA (cumulative frequency), not the height. You must build a cumulative frequency column and interpolate within the appropriate class.", "source": "MiniMax ②", "_id": "minimax_2_47", "judge_pick": false}, {"question": "In the two-equation normal system (question 7c), a student solves the equations but gets k negative. Why is this impossible? (1 step)", "answer": "- Step 1: k represents the standard deviation (σ), which must be positive. If your algebra gives k < 0, you have made a sign error. The variance σ² would also be positive.", "source": "MiniMax ②", "_id": "minimax_2_48", "judge_pick": false}, {"question": "Explain why P(B ∩ C) = P(B)P(C) represents independence, while P(A ∩ C) = 0 represents mutual exclusivity. Can both be true for the same pair of events? (2 steps)", "answer": "- Step 1: Independence means knowing C occurs doesn't change the probability of B occurring: P(B|C) = P(B).\n- Step 2: Mutual exclusivity means they cannot occur together: if C occurs, B definitely does not occur. For events with positive probability, these cannot both be true (since P(B)P(C) > 0 but P(B ∩ C) = 0).", "source": "MiniMax ②", "_id": "minimax_2_49", "judge_pick": false}, {"question": "For a discrete RV, what two conditions must the probability function f(y) = P(Y = y) satisfy? (1 step)", "answer": "- Step 1: (1) f(y) ≥ 0 for all y (non-negative)\n- (2) Σ f(y) = 1 over all possible values of y (sums to 1)", "source": "MiniMax ②", "_id": "minimax_2_50", "judge_pick": false}, {"question": "How do you verify your answer when solving a two-equation normal system for r and k? (1 step)", "answer": "- Step 1: Substitute the found values of r and k back into BOTH original probability statements:\n+ Check: (r - 520)/k should give the correct z-value for 0.15\n+ Check: (3r - 800 - 520)/k should give the correct z-value for 0.005", "source": "MiniMax ②", "_id": "minimax_2_51", "judge_pick": false}, {"question": "In the histogram question, if asked for people traveling \"between 22 km and 45 km,\" should you include the endpoints? (1 step)", "answer": "- Step 1: For continuous data in histograms, \"between\" typically means inclusive of the lower bound and exclusive of the upper (or specified as given). The interval [22, 45) means 22 ≤ distance < 45.", "source": "MiniMax ②", "_id": "minimax_2_52", "judge_pick": false}, {"question": "What is the correct order to fill in a three-set Venn diagram with known probabilities? (1 step)", "answer": "- Step 1: Fill FROM THE CENTRE OUTWARD:\n+ (1) Triple intersection first\n+ (2) Double intersections (subtract triple)\n+ (3) Single regions (subtract doubles)\n+ (4) Outside region (1 minus sum of all inner regions)", "source": "MiniMax ②", "_id": "minimax_2_53", "judge_pick": false}, {"question": "A student calculates S_xy = Σxy + (Σx)(Σy)/n. What is wrong with this formula? (1 step)", "answer": "- Step 1: The correct formula is S_xy = Σxy - (Σx)(Σy)/n (SUBTRACT, not add). The sign error is one of the most common S1 errors.", "source": "MiniMax ②", "_id": "minimax_2_54", "judge_pick": false}, {"question": "When finding the mean from coded data x = (l - a)/b, how do you reverse the coding to find the actual mean? (1 step)", "answer": "- Step 1: If x̄ = Σx/n, then the actual mean is: l̄ = b × x̄ + a\n+ For x = l - 600 (i.e., b = 1, a = 600): l̄ = x̄ + 600", "source": "MiniMax ②", "_id": "minimax_2_55", "judge_pick": false}, {"question": "What is the effect of coding on the PMCC? Under what conditions does r remain unchanged? (1 step)", "answer": "- Step 1: r is invariant under linear coding of the form x' = (x - a)/b and y' = (y - c)/d, provided b > 0 and d > 0 (positive scaling). If scaling is negative, r changes sign.", "source": "MiniMax ②", "_id": "minimax_2_56", "judge_pick": false}, {"question": "In question Q5, a student calculates Var(15 - 2Y) = -2 × Var(Y). What is the error? (1 step)", "answer": "- Step 1: The correct formula is Var(aY + b) = a²Var(Y), not a × Var(Y). Here a = -2, so we get (-2)² × Var(Y) = 4 × Var(Y), not -2 × Var(Y).", "source": "MiniMax ②", "_id": "minimax_2_57", "judge_pick": false}, {"question": "Why does the regression line of w on t use denominator S_tt while the line of t on w would use S_ww? (1 step)", "answer": "- Step 1: The regression line of Y on X uses b = S_xy/S_xx, where the denominator corresponds to the EXPLANATORY variable (the X). So w on t uses S_tt (t is explanatory); t on w would use S_ww.", "source": "MiniMax ②", "_id": "minimax_2_58", "judge_pick": false}, {"question": "A student forgets to check both outlier fences (upper and lower) and only checks the upper fence. What is the risk? (1 step)", "answer": "- Step 1: A data point could be an outlier on the LOW end (below Q1 - 1.5×IQR). Without checking both fences, you might incorrectly conclude there are no outliers when a low extreme exists.", "source": "MiniMax ②", "_id": "minimax_2_59", "judge_pick": false}], "count": 60}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "In a histogram, how do you \"calibrate\" the frequency density (FD) scale before reading any bars, and why is this step essential?", "answer": "- Step 1: The y-axis on an exam histogram is often unlabeled or unreliable, so you cannot read FD directly off the gridlines. You need an anchor.\n- Step 2: Use the *named class* — the question always tells you the frequency of one class (e.g. \"60 people travel between 10 and 20 km\"). Combine with the class width: $$\\text{FD} = f / w$$.\n+ Example: 60 people in width-10 class ⇒ FD = 6.\n- Step 3: Now measure every other bar's *height ratio* against this anchor bar to get its FD, then compute $$f = \\text{FD} \\times w$$ for each.\n- Step 4: Skipping calibration and reading FD off the printed axis is the #1 way to lose marks on histogram questions — the axis scale is often deliberately omitted or distorted.\n\nTakeaway: *Calibrate first, then never read FD off the axis again — read off your scale.*", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "Why does the formula $$f = \\text{FD} \\times w$$ work for *any* slice of a histogram bar, not just the full bar? (2 steps)", "answer": "- Step 1: A histogram represents frequency as *area*, not height. So for a full bar, area = FD × width = frequency.\n- Step 2: For a partial slice (e.g. asking about $$[22, 30)$$ when the bar covers $$[20, 30)$$), you take the same FD but only the sub-width: $$f_{\\text{slice}} = \\text{FD} \\times w_{\\text{slice}} = 7 \\times 8 = 56$$.\n+ The key insight: FD is constant across the whole bar (uniform density assumption), so any horizontal sub-interval scales linearly with its width.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": true}, {"question": "For grouped continuous data with $$n = 274$$, what positional rule locates the median, and why is it different from the discrete-data rule? (2 steps)", "answer": "- Step 1: For *continuous grouped* data, use $$n/2$$ (here, 137). The data are treated as a continuous flow, so the median is the value at the exact midpoint of the cumulative count.\n- Step 2: For *discrete listed* data, use $$(n+1)/2$$ because you're picking a specific data point from a finite ordered list. Grouped data is interpolated within a class, so you locate by area/proportion, not by item index.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "Write the linear-interpolation formula for the median of a grouped frequency distribution, naming every symbol.", "answer": "- Step 1: $$\\text{median} = L + \\frac{n/2 - F}{f_m} \\cdot w$$\n- Step 2: Symbols:\n+ $$L$$ = lower boundary of the median class\n+ $$n/2$$ = target cumulative position\n+ $$F$$ = cumulative frequency *before* the median class\n+ $$f_m$$ = frequency of the median class\n+ $$w$$ = width of the median class\n- Step 3: Intuition: $$L$$ is where you start; $$(n/2 - F)/f_m$$ is the *fraction* of the way through the median class you need to go to reach the 137th value; multiplying by $$w$$ converts that fraction into a position on the data axis.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "When computing the mean of grouped data, why must you use class *midpoints*, not class boundaries?", "answer": "- Step 1: The mean treats every observation as if it sat at a representative value for its class. With no further information, the best representative is the midpoint — it minimizes the expected error under the assumption of uniform distribution within the class.\n- Step 2: Using a boundary (lower or upper) systematically biases the mean downward or upward. The midpoint averages out the within-class variation.\n- Step 3: Formula: $$\\bar x = \\frac{\\sum f \\cdot x_{\\text{mid}}}{\\sum f}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "A histogram has a class $$[10, 20)$$ containing 60 people, and you need the frequency in $$[22, 30)$$ where the bar covers $$[20, 30)$$ with FD = 7. Walk through the pro-rating logic. (3 steps)", "answer": "- Step 1: Identify the slice width: from 22 to 30 is a sub-width of 8 (not the full 10).\n- Step 2: The FD is uniform across $$[20, 30)$$, so the density of 7 applies to the slice.\n- Step 3: Frequency in slice = $$\\text{FD} \\times w_{\\text{slice}} = 7 \\times 8 = 56$$. The classic trap is using $$w = 7$$ (the FD) or $$w = 10$$ (the full bar width) instead of the actual slice width.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "Why is using a regression line of weight on tail length, fitted on mice with tails in 6.4–8.9 cm, *invalid* for predicting weight at $$t = 2$$ cm?", "answer": "- Step 1: This is **extrapolation** — predicting outside the range of the observed data. The regression model only captures the linear relationship *within* the sampled range; behaviour outside is unknown.\n- Step 2: Substituting $$t = 2$$ into $$w = -16.7 + 4.77t$$ gives $$w = -7.16$$ g — a *negative weight*, which is physically impossible.\n- Step 3: This impossibility is the smoking gun: it confirms the linear model breaks down well before $$t = 2$$. In real biology, weight–length relationships are non-linear at small sizes.\n\nTakeaway: state both *out-of-range* AND the absurd predicted value for full marks.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": true}, {"question": "What is the computational (\"machine\") formula for $$S_{xy}$$, and what is the sign trap that catches students?", "answer": "- Step 1: $$S_{xy} = \\sum xy - \\frac{\\sum x \\sum y}{n}$$.\n- Step 2: The trap: writing $$+$$ instead of $$-$$. This is *subtraction* — you remove the \"expected product under independence\" $$n \\bar x \\bar y$$ to isolate the covariation around the means.\n- Step 3: Equivalent form: $$S_{xy} = \\sum (x - \\bar x)(y - \\bar y)$$ — this version makes the subtraction conceptually obvious, since deviations from the mean must average to zero under independence.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "In the regression line of $$w$$ on $$t$$, which $$S$$-quantity goes in the denominator of the gradient, and what does this asymmetry mean? (3 steps)", "answer": "- Step 1: For \"$$w$$ on $$t$$\" (predicting $$w$$ from $$t$$), the gradient is $$b = S_{tw} / S_{tt}$$ — denominator is the *explanatory* variable.\n- Step 2: This minimizes the sum of squared *vertical* (in $$w$$) deviations. The variable in the denominator is the one with no error assumed.\n- Step 3: The line of \"$$t$$ on $$w$$\" would use $$b' = S_{tw} / S_{ww}$$ and is in general a *different* line — the two regression lines only coincide when $$|r| = 1$$.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "Why is the PMCC $$r$$ invariant under positive linear coding such as $$x = t - 6$$ and $$y = w/2 - 5$$?", "answer": "- Step 1: PMCC measures the *direction and tightness* of a linear relationship and is dimensionless — it has no units to absorb a shift or scale.\n- Step 2: Algebraically: under $$x = at + b$$ with $$a > 0$$, $$S_{xx} = a^2 S_{tt}$$ and $$S_{xy} = a c \\, S_{tw}$$ (with $$y = ct + d, c > 0$$), so $$r = \\frac{acS_{tw}}{\\sqrt{a^2 S_{tt} \\cdot c^2 S_{ww}}} = \\frac{S_{tw}}{\\sqrt{S_{tt}S_{ww}}}$$ — scales cancel.\n- Step 3: If either coding flips sign ($$a < 0$$ or $$c < 0$$ but not both), $$r$$ flips sign. If both flip, $$r$$ is unchanged. The magnitude is always preserved.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "To find the regression line of $$y$$ on $$x$$ when given the line of $$w$$ on $$t$$ and the coding $$x = t - 6$$, $$y = w/2 - 5$$, what's the efficient method? (3 steps)", "answer": "- Step 1: Don't recompute anything from coded sums — *substitute* the inverse coding into the existing line. From the codings: $$t = x + 6$$ and $$w = 2y + 10$$.\n- Step 2: Replace $$t$$ and $$w$$ in $$w = -16.7 + 4.77t$$ to get $$2y + 10 = -16.7 + 4.77(x + 6)$$.\n- Step 3: The question often says \"you do not need to simplify\" — take the hint and leave it. If simplification is required, isolate $$y$$.\n\nThe \"redo from scratch\" trap costs 5+ minutes for the same answer.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "For a \"show that the regression line is $$w = -16.7 + 4.77t$$\" question, what rounding discipline must you maintain, and why?", "answer": "- Step 1: Carry at least **5 significant figures** through all intermediate steps ($$S_{tw}, S_{tt}, b, \\bar t, \\bar w, a$$). Premature rounding can shift the final coefficient by enough to miss the printed answer.\n- Step 2: Compute $$b$$ first to ≥ 4 s.f., then $$a = \\bar w - b \\bar t$$ using the unrounded $$b$$.\n- Step 3: Examiners give *method marks* for clean structure even if arithmetic slips, but the printed-answer mark requires the displayed digits to match.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "How do you interpret the gradient 4.77 in $$w = -16.7 + 4.77t$$ where $$w$$ is in grams and $$t$$ in cm?", "answer": "- Step 1: For each additional 1 cm of tail length, the predicted weight increases by approximately 4.77 g.\n- Step 2: Critical: include *units* — \"4.77 g per cm\". A bare \"4.77\" loses the interpretation mark.\n- Step 3: This is *predicted*, *on average*, *within the observed range*. The interpretation is causal-sounding but the regression itself doesn't establish causation.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "Coded data: $$x = l - 600$$. Mean of $$x$$ is 45.8. What is the mean of $$l$$, and why is the rule what it is? (2 steps)", "answer": "- Step 1: Reverse the shift: $$\\bar l = \\bar x + 600 = 645.8$$ mm. The rule is $$\\overline{x + a} = \\bar x + a$$ because the mean is linear.\n- Step 2: For more general coding $$x = (l - a)/b$$, you reverse with $$\\bar l = b \\bar x + a$$. Always undo the coding *in the same order it was applied, but inverted*.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "Why does $$\\mathrm{Var}(x + a) = \\mathrm{Var}(x)$$ for any constant $$a$$, and how does this differ from scaling?", "answer": "- Step 1: Variance measures *spread* around the mean. Adding a constant shifts every value *and* the mean by the same amount — the differences $$x_i - \\bar x$$ are unchanged, so the spread is identical.\n- Step 2: Visually: slide the whole dataset along the number line; the shape and width don't change.\n- Step 3: Scaling is different: $$\\mathrm{Var}(bx) = b^2 \\mathrm{Var}(x)$$ — multiplying every value by $$b$$ stretches deviations by $$b$$, and variance (being squared deviations) scales by $$b^2$$.\n\nCombined: $$\\mathrm{Var}(bx + a) = b^2 \\mathrm{Var}(x)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": true}, {"question": "Salmon coded as $$x = l - 600$$ with $$\\sum x = 3711$$, $$\\sum x^2 = 475181$$, $$n = 81$$. Walk through finding $$\\mathrm{Var}(l)$$ conceptually (no numerical heavy lifting). (3 steps)", "answer": "- Step 1: $$\\mathrm{Var}(x) = \\frac{\\sum x^2}{n} - \\bar x^2$$ — compute mean of squares minus square of mean using the coded sums directly.\n- Step 2: Since the coding is a pure *shift* (no scaling), $$\\mathrm{Var}(l) = \\mathrm{Var}(x)$$ — no correction needed.\n- Step 3: The classic blunder is \"Var(l) = Var(x) − 600\" or \"+ 600\" — these are nonsense; variance is translation-invariant. State this explicitly in your working to claim the mark.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "A box plot has $$Q_1 = 3000$$, median $$= 4000$$, $$Q_3 = 5500$$, $$n = 81$$. What is the maximum possible number of values strictly above $$w = 4600$$, and what's the reasoning? (3 steps)", "answer": "- Step 1: Observe that 4600 lies *above* the median (4000) but below $$Q_3$$ (5500).\n- Step 2: By definition, the median splits the data so that at most $$\\lfloor n/2 \\rfloor = 40$$ values lie strictly above it.\n- Step 3: Anything above 4600 is automatically above the median, so the count above 4600 is bounded by the count above 4000, which is at most 40.\n\nCommon trap: trying to *interpolate inside the box* (e.g. \"4600 is 40% of the way from median to Q3, so 40% of 25% of 81 = ...\"). This is a *concept* question, not a computation.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": true}, {"question": "Why is the 1.5 × IQR rule a sensible cutoff for outliers, and what are the two fences you must compute?", "answer": "- Step 1: The IQR captures the spread of the central 50% of the data. Extending 1.5 × IQR beyond each quartile catches values that are \"unusually far\" relative to the bulk's spread, but isn't so strict that it flags points just outside the box.\n- Step 2: Lower fence: $$Q_1 - 1.5 \\cdot \\text{IQR}$$. Upper fence: $$Q_3 + 1.5 \\cdot \\text{IQR}$$.\n- Step 3: A value outside *either* fence is an outlier. To prove \"no outliers\", you must compare *both* extremes (min and max) against *both* fences and show all four comparisons pass.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "In a Bayes-style question, why is $$P(C \\mid R) \\neq P(R \\mid C)$$, and how does the formula encode the asymmetry? (3 steps)", "answer": "- Step 1: $$P(R \\mid C)$$ asks \"given a counter is type C, how likely is it red?\" — it's a property of the type C population.\n- Step 2: $$P(C \\mid R)$$ asks \"given a red counter, how likely is it type C?\" — it's about the composition of the red sub-population, which depends on how *common* C is to begin with.\n- Step 3: Bayes: $$P(C \\mid R) = \\frac{P(C) \\cdot P(R \\mid C)}{P(R)}$$ — the prior $$P(C)$$ and the normalizer $$P(R)$$ explicitly break the symmetry. A rare type C with high red-rate could still contribute few reds overall.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "State the law of total probability for \"find $$P(\\text{red})$$\" in a counter-type-red-or-not problem, and explain the partition logic.", "answer": "- Step 1: $$P(R) = \\sum_i P(L_i) \\cdot P(R \\mid L_i)$$ where $$L_i$$ are mutually exclusive and exhaustive categories (here, types A, B, C).\n- Step 2: Logic: every red counter must be either type A-and-red, or B-and-red, or C-and-red. Since these are disjoint and cover all reds, sum their probabilities.\n- Step 3: Each term $$P(L_i) P(R \\mid L_i)$$ is the probability of taking the $$L_i$$-branch and then the red sub-branch of the tree — a path-product, summed over all \"leads to red\" paths.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "For a piecewise pmf $$P(Y=y) = k(3-y)$$ for $$y=1,2$$; $$k(y^2 - 8)$$ for $$y=3,4,5$$; $$k$$ for $$y=6$$, what's the first thing you should do, and why? (2 steps)", "answer": "- Step 1: Tabulate the pmf numerically in terms of $$k$$ for each value of $$y$$: at $$y=1$$, $$2k$$; at $$y=2$$, $$k$$; at $$y=3$$, $$k$$; at $$y=4$$, $$8k$$; at $$y=5$$, $$17k$$; at $$y=6$$, $$k$$.\n- Step 2: This catches *sign errors* immediately (any negative entry means you misread the formula), and once you have numerical multipliers, summing $$2k+k+k+8k+17k+k = 30k = 1$$ gives $$k = 1/30$$ effortlessly.\n\nThe trap is doing algebra on the piecewise formulas directly and missing a sign in $$k(3-y)$$ vs $$k(y-3)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "For the discrete RV $$Y$$ with $$X = 15 - 2Y$$, find $$P(Y \\le X)$$ — what's the key insight that avoids enumeration? (3 steps)", "answer": "- Step 1: $$X$$ is a *deterministic function* of $$Y$$, not an independent variable. So $$Y \\le X$$ becomes an inequality purely in $$Y$$.\n- Step 2: Substitute: $$Y \\le 15 - 2Y \\implies 3Y \\le 15 \\implies Y \\le 5$$.\n- Step 3: Now it's just $$P(Y \\le 5) = 1 - P(Y = 6)$$ — read off the pmf.\n\nThe trap: treating $$X$$ as independent and computing $$\\sum_{y, x: y \\le x} P(Y=y) P(X=x)$$ — completely wrong because the joint distribution is degenerate (concentrated on the line $$X = 15 - 2Y$$).", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "Why is $$\\mathrm{Var}(15 - 2Y) = 4 \\mathrm{Var}(Y)$$ and not $$-2 \\mathrm{Var}(Y)$$ or $$2 \\mathrm{Var}(Y)$$? (3 steps)", "answer": "- Step 1: Rule: $$\\mathrm{Var}(aY + b) = a^2 \\mathrm{Var}(Y)$$. Here $$a = -2$$, $$b = 15$$.\n- Step 2: The constant 15 is *dropped* — adding a constant just shifts every value and doesn't change spread.\n- Step 3: The multiplier becomes $$a^2 = (-2)^2 = 4$$ — *squared*, so the sign of $$a$$ disappears and the magnitude is amplified by 4.\n\nIntuition: multiplying every $$Y$$ by 2 doubles all deviations from the mean. Variance is (deviation)², so it quadruples. The negative sign just flips the data around its mean, which doesn't affect spread.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "State the formula $$\\mathrm{Var}(Y) = E(Y^2) - [E(Y)]^2$$ and explain why it equals $$E[(Y - E(Y))^2]$$. (2 steps)", "answer": "- Step 1: Start from the definition: $$\\mathrm{Var}(Y) = E[(Y - \\mu)^2]$$ where $$\\mu = E(Y)$$. Expand the square: $$E[Y^2 - 2\\mu Y + \\mu^2] = E(Y^2) - 2\\mu E(Y) + \\mu^2$$.\n- Step 2: Since $$E(Y) = \\mu$$, this becomes $$E(Y^2) - 2\\mu^2 + \\mu^2 = E(Y^2) - \\mu^2$$, i.e. $$E(Y^2) - [E(Y)]^2$$.\n\nThe \"machine formula\" is just an algebraic rearrangement; the *meaning* is \"average squared deviation from the mean\".", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": true}, {"question": "Why can two events with positive probability *not* be both mutually exclusive and independent?", "answer": "- Step 1: Mutually exclusive means $$P(A \\cap B) = 0$$.\n- Step 2: Independent means $$P(A \\cap B) = P(A) P(B)$$.\n- Step 3: If both hold, $$P(A) P(B) = 0$$, forcing at least one of $$P(A), P(B) = 0$$. So if both events have positive probability, they cannot satisfy both conditions.\n\nIntuition: mutually exclusive events are *maximally dependent* — knowing one occurred tells you the other certainly did not. That's the opposite of independence.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": true}, {"question": "For three events $$A, B, C$$ with $$A$$ and $$C$$ mutually exclusive and $$B$$ and $$C$$ independent, what is $$P(A \\cap B \\cap C)$$, and why? (2 steps)", "answer": "- Step 1: $$A \\cap C = \\emptyset$$ (mutually exclusive), so any subset of $$A \\cap C$$ is also empty.\n- Step 2: $$A \\cap B \\cap C \\subseteq A \\cap C = \\emptyset$$, hence $$P(A \\cap B \\cap C) = 0$$ regardless of what $$B$$ does.\n\nThis is the keystone for filling a three-set Venn diagram in such problems: the triple-intersection is forced to zero before you do any other arithmetic.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": false}, {"question": "To fill a three-set Venn diagram with probabilities, what's the correct order of filling regions, and why? (3 steps)", "answer": "- Step 1: **Centre outward.** Start with the triple intersection $$A \\cap B \\cap C$$.\n- Step 2: Then the three pairwise-only regions: $$A \\cap B$$ minus the triple, $$A \\cap C$$ minus the triple, $$B \\cap C$$ minus the triple.\n- Step 3: Then the three \"only\" regions using inclusion-exclusion in reverse: e.g. $$P(A \\text{ only}) = P(A) - P(A \\cap B) - P(A \\cap C) + P(A \\cap B \\cap C)$$. Finally the outside region $$= 1 - \\text{sum of all seven interior regions}$$.\n\nWhy this order: each outer region depends on inner ones being already known, so doing it any other way creates circular dependencies.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": true}, {"question": "Why is the outside region in a Venn diagram often a 1-mark trap, and what's the rule to ensure you capture it?", "answer": "- Step 1: Students often label the seven regions inside the three circles and stop there — the universe outside $$A \\cup B \\cup C$$ has measurable probability too, and is required.\n- Step 2: Rule: always compute $$1 - P(A \\cup B \\cup C)$$ and label it outside the circles.\n- Step 3: As a check, all eight regions must sum to exactly 1. Writing this check on your script costs nothing and catches arithmetic slips.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "In an inverse-normal problem, $$P(J > d) = 0.9192$$. Why must $$d$$ lie *below* the mean, and what sign does $$z$$ take? (3 steps)", "answer": "- Step 1: $$P(J > d) > 0.5$$ means more than half the distribution lies above $$d$$. By symmetry of the normal, the mean is the 50th percentile.\n- Step 2: For more than half to lie above $$d$$, $$d$$ must be to the *left* of the mean.\n- Step 3: Standardising: $$z = (d - \\mu)/\\sigma$$ is *negative* when $$d < \\mu$$. So if you look up $$|z| = 1.40$$ from $$\\Phi(1.40) = 0.9192$$, you must apply $$z = -1.40$$.\n\nTrap: writing $$d = \\mu + 1.40 \\sigma$$ when it should be $$d = \\mu - 1.40 \\sigma$$. **Sketch first** — a shaded picture instantly shows which side of the mean $$d$$ is on.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "Why is \"5 bags each yielding less than 510 ml\" computed as $$(0.6554)^5$$ and not $$5 \\times 0.6554$$? (2 steps)", "answer": "- Step 1: The event \"all 5 bags satisfy the condition\" requires *every* bag's outcome to fall below 510 ml — that's an intersection of 5 events.\n- Step 2: For *independent* events, $$P(A_1 \\cap A_2 \\cap \\ldots \\cap A_5) = P(A_1) \\cdot P(A_2) \\cdots P(A_5) = p^5$$ when all probabilities equal.\n\nMultiplying by 5 would give an expected count of bags, not a joint probability. Also, $$5 \\times 0.6554 > 1$$, which immediately flags the error if you check.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "When solving a two-equation normal system like $$P(R < r) = 0.15$$ and $$P(R > 3r - 800) = 0.005$$ with $$R \\sim N(520, k^2)$$, what's the systematic approach? (4 steps)", "answer": "- Step 1: Translate each probability into a $$z$$-equation by standardising. For $$P(R < r) = 0.15$$: lower-tail probability < 0.5, so $$z_1 < 0$$; lookup gives $$z_1 = -1.0364$$.\n- Step 2: For $$P(R > 3r - 800) = 0.005$$: small upper tail, $$z_2 > 0$$; percentage-point table gives $$z_2 = 2.5758$$.\n- Step 3: Write each as $$\\frac{\\text{value} - \\mu}{k} = z$$, then rearrange both to \"$$r = \\ldots k$$\" form. This isolates $$r$$ in terms of $$k$$ in two ways.\n- Step 4: Equate the two expressions for $$r$$ to get a single linear equation in $$k$$. Solve, then back-substitute.\n\nAlways verify by plugging $$(r, k)$$ into both original probability statements — if $$z$$-values match, you're correct.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "What's the difference between the \"body\" standard normal table $$\\Phi(z)$$ and the \"percentage-point\" table, and when do you use each?", "answer": "- Step 1: **Body table** $$\\Phi(z)$$: given $$z$$, returns $$P(Z \\le z)$$. Used when you have a value and want the probability. Reverse-lookup gives $$z$$ at fixed probabilities like 0.99, 0.995, but only to 2 d.p.\n- Step 2: **Percentage-point table**: given an upper-tail probability $$p$$, returns the $$z$$ such that $$P(Z > z) = p$$ to 4 d.p. Used for precise quantiles at standard significance levels.\n- Step 3: For levels like $$p = 0.05, 0.025, 0.01, 0.005$$, use percentage-points to get $$z = 1.6449, 1.9600, 2.3263, 2.5758$$. The body table only gives $$z \\approx 2.58$$ for $$p = 0.005$$, which can be enough margin to fail a \"show that\" answer.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "What are the four percentage-point $$z$$-values worth memorising for S1 normal questions?", "answer": "- Step 1: These correspond to the most common one-tailed significance levels:\n+ $$z_{0.05} = 1.6449$$\n+ $$z_{0.025} = 1.9600$$\n+ $$z_{0.01} = 2.3263$$\n+ $$z_{0.005} = 2.5758$$\n- Step 2: For two-tailed tests at level $$\\alpha$$, use $$z_{\\alpha/2}$$ (e.g. 5% two-tailed uses $$z_{0.025} = 1.96$$).\n- Step 3: These are also commonly needed in confidence-interval and inverse-normal \"two-equation\" questions like Q7c.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "In a histogram question that says \"between 22 km and 45 km\", what's the slicing strategy?", "answer": "- Step 1: Break the interval into pieces aligned with the histogram's class boundaries. Here: $$[22, 30) \\cup [30, 40) \\cup [40, 45)$$ — three pieces.\n- Step 2: For each piece, compute $$f = \\text{FD} \\times w_{\\text{piece}}$$:\n+ $$[22, 30)$$: sub-width 8 of a bar with FD 7 ⇒ $$f = 56$$\n+ $$[30, 40)$$: full bar, $$f = 100$$\n+ $$[40, 45)$$: sub-width 5 of bar with FD 3 ⇒ $$f = 15$$\n- Step 3: Sum: 171.\n\nTrap: trying to add up *only* the full bars (e.g. $$70 + 100 + 30 = 200$$ for $$[20, 50)$$) and adjust by guesswork — pro-rate the partial bars exactly.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "For the discrete RV question, $$E(Y) = 13/3$$ and $$E(Y^2) = 302/15$$. Why is computing $$E(Y^2) - [E(Y)]^2$$ via a common denominator the safest path? (3 steps)", "answer": "- Step 1: Mixing fractional and decimal forms invites rounding errors. Keep everything in fractions until the final step.\n- Step 2: $$E(Y^2) - [E(Y)]^2 = \\frac{302}{15} - \\frac{169}{9}$$. Common denominator 45: $$\\frac{906 - 845}{45} = \\frac{61}{45}$$.\n- Step 3: Then apply the multiplier: $$\\mathrm{Var}(X) = 4 \\cdot \\frac{61}{45} = \\frac{244}{45} \\approx 5.42$$.\n\nIn S1, where \"show that\" answers and 3 s.f. matter, this discipline saves marks consistently.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "State and justify the formula $$P(A \\cap B) = P(A) \\cdot P(B \\mid A)$$, and contrast it with the formula for independent events.", "answer": "- Step 1: General multiplication rule: $$P(A \\cap B) = P(A) \\cdot P(B \\mid A)$$ — first $$A$$ happens with probability $$P(A)$$, then given $$A$$, $$B$$ happens with probability $$P(B \\mid A)$$.\n- Step 2: This always holds and is the foundation for tree-diagram path products.\n- Step 3: When $$A$$ and $$B$$ are **independent**, $$P(B \\mid A) = P(B)$$, so the rule simplifies to $$P(A \\cap B) = P(A) \\cdot P(B)$$. This independence form is a *special case*, not a substitute for the general rule.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "In a three-set Venn diagram with $$P(A) = 0.10$$, $$P(B) = 0.18$$, $$P(A \\cap B) = 0.03$$, $$P(A \\cap C) = 0$$, $$P(B \\cap C) = 0.09$$, $$P(A \\cap B \\cap C) = 0$$, walk through how to find \"$$A$$ only\". (3 steps)", "answer": "- Step 1: \"A only\" = elements in $$A$$ but not in $$B$$ or $$C$$ = $$P(A) - P(A \\cap B) - P(A \\cap C) + P(A \\cap B \\cap C)$$.\n- Step 2: The $$+P(A \\cap B \\cap C)$$ term is inclusion-exclusion: subtracting both $$A \\cap B$$ and $$A \\cap C$$ removes the triple twice, so add it back once.\n- Step 3: Substitute: $$0.10 - 0.03 - 0 + 0 = 0.07$$.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": true}, {"question": "When asked to \"give an interpretation of the gradient\" in a regression context, what three components must your answer contain?", "answer": "- Step 1: **Direction of change**: \"an increase\" or \"a decrease\" (sign of the gradient).\n- Step 2: **Unit change in $$x$$**: \"for each additional 1 [unit of $$x$$]\".\n- Step 3: **Magnitude and unit of $$y$$**: \"the predicted $$y$$ [increases/decreases] by [value] [unit of $$y$$]\".\n\nExample: \"For each additional 1 cm of tail length, the predicted weight increases by approximately 4.77 g.\" A bare number loses the mark.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": false}, {"question": "In a Bayes-style question with three categories A, B, C contributing to a red outcome, how would you set up $$P(C \\mid R)$$? (3 steps)", "answer": "- Step 1: Write Bayes: $$P(C \\mid R) = \\frac{P(C) \\cdot P(R \\mid C)}{P(R)}$$.\n- Step 2: $$P(R)$$ in the denominator is the law of total probability: $$P(R) = P(A) P(R \\mid A) + P(B) P(R \\mid B) + P(C) P(R \\mid C)$$. Compute this first.\n- Step 3: Plug in: numerator $$= P(C) \\cdot P(R \\mid C)$$ (the \"C-and-red\" path-product); denominator = sum of all red path-products. Ratio.\n\nThe numerator is \"your specific path to red\"; the denominator is \"all paths to red\". The conditional probability is your path's share of the total.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "Why does the regression line always pass through $$(\\bar x, \\bar y)$$, and how does this give a check on your work?", "answer": "- Step 1: The intercept formula is $$a = \\bar y - b \\bar x$$, so the line equation $$y = a + bx$$ at $$x = \\bar x$$ gives $$y = (\\bar y - b\\bar x) + b\\bar x = \\bar y$$. The line passes through the centroid by construction.\n- Step 2: Geometric meaning: among all lines minimizing squared vertical deviations, the optimum line must pass through the centre of mass of the data.\n- Step 3: Check: after computing $$a$$ and $$b$$, verify $$a + b\\bar x \\approx \\bar y$$. A mismatch indicates an arithmetic slip.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "What does it mean for the PMCC to be 0.827, and how is this different from saying \"$$x$$ causes $$y$$\"?", "answer": "- Step 1: $$r = 0.827$$ indicates a strong *positive linear* association — as one variable increases, the other tends to increase, with most points close to a straight line.\n- Step 2: PMCC measures correlation only — it says nothing about causation. Two variables can be highly correlated due to a third (lurking) variable, coincidence, or any non-causal mechanism.\n- Step 3: Also, $$r$$ only detects *linear* relationships. Two variables in a perfect quadratic relationship could have $$r = 0$$ yet be deterministically related.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": true}, {"question": "For the salmon box plot with median 4000, $$Q_3 = 5500$$, max = 7700, why doesn't asking \"how many between 5500 and 7700\" have a determinate answer? (2 steps)", "answer": "- Step 1: A box plot only fixes five summary values; it doesn't determine the position of individual data points within each quartile group.\n- Step 2: We know that approximately 25% of values fall above $$Q_3$$, but the exact count depends on whether $$n$$ is divisible by 4 and on the convention used. The best we can do is bound it, not pinpoint it.\n\nFor S1 questions, \"maximum number\" or \"minimum number\" are answerable; \"exact number\" usually is not.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": false}], "count": 42}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "In a histogram, you are told 60 people lie in the class $$[10, 20)$$ which has width 10. Explain how this single piece of information allows you to read every other bar on the histogram, and why this step must come first. (3 steps)", "answer": "- Step 1: Frequency density is defined by $$\\text{FD} = f / w$$, so for the named class $$\\text{FD}_{[10,20)} = 60/10 = 6$$. This means a bar of height \"6\" on the y-axis corresponds to a known FD of 6 — this is your *calibration anchor*.\n- Step 2: Every other bar's height on the printed histogram must be converted into an FD using this calibration. You should never read FD directly off the printed axis numbers — the axis tick-spacing may be unlabelled, distorted, or stylised, but the *ratio* of bar heights is reliable.\n- Step 3: Once calibrated, any class frequency follows from $$f = \\text{FD} \\times w$$, including partial classes where $$w$$ is just the slice width. Without this calibration first, every subsequent number is built on a guess.\n\nTakeaway: \"Calibrate first, then never read FD off the axis again — read off your scale.\"", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "A histogram has FDs: $$[0,10): 0.5$$, $$[10,20): 6$$, $$[20,30): 7$$, $$[30,40): 10$$, $$[40,50): 3$$, $$[50,60): 0.9$$, all of width 10. Estimate the number of people with values in $$[22, 45)$$, and explain the logic of slicing partial bars. (3 steps)", "answer": "- Step 1: The interval $$[22, 45)$$ cuts *through* three bars, so split it into pieces matching each bar.\n+ Piece A: $$[22, 30)$$ has width $$30 - 22 = 8$$, sitting inside the FD-7 bar. Frequency $$= 8 \\times 7 = 56$$.\n+ Piece B: $$[30, 40)$$ is a full bar, frequency $$= 10 \\times 10 = 100$$.\n+ Piece C: $$[40, 45)$$ has width 5, inside the FD-3 bar. Frequency $$= 5 \\times 3 = 15$$.\n- Step 2: Sum the pieces: $$56 + 100 + 15 = 171$$.\n- Step 3: The conceptual point is that \"frequency in a sub-interval\" = \"area of that sub-rectangle\" = FD × sub-width. Treating $$[20, 40)$$ as one clean two-class slice and then trying to remove $$[20, 22)$$ \"by eye\" loses marks because you must pro-rate explicitly.\n\nTakeaway: Every shaded rectangle's frequency = FD × the *exact* slice width you use.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": true}, {"question": "For grouped continuous data with $$n = 274$$, how do you locate the median class, and which positional formula applies — $$n/2$$ or $$(n+1)/2$$? (3 steps)", "answer": "- Step 1: For *continuous grouped* data, the median position is $$n/2$$, not $$(n+1)/2$$. The $$(n+1)/2$$ rule is for *discrete* ordered data where the median lands exactly on a data point.\n- Step 2: With $$n/2 = 137$$, you build a cumulative frequency column class-by-class and find which class first contains a CF $$\\geq 137$$. Example with CFs $$5, 65, 135, 235, \\ldots$$: the 135th value ends class $$[20, 30)$$, so the 137th lies in $$[30, 40)$$.\n- Step 3: Then apply linear interpolation within that class: $$\\text{median} = L + \\frac{n/2 - F}{f_m} w$$, where $$L$$ is the lower boundary of the median class, $$F$$ is the CF *before* the class, $$f_m$$ is the class frequency, and $$w$$ is the class width.\n\nTakeaway: For continuous data, position is $$n/2$$ and the median is *interpolated*, not picked.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "Given the median class $$[30, 40)$$ with cumulative frequency 135 before it, class frequency 100, and target position 137 (from $$n/2$$), interpolate the median and explain each symbol. (2 steps)", "answer": "- Step 1: Apply $$\\text{median} = L + \\frac{n/2 - F}{f_m} w$$. Here $$L = 30$$ (lower boundary of the median class), $$F = 135$$ (cumulative count before this class), $$f_m = 100$$ (frequency in this class), $$w = 10$$ (class width), and target $$= 137$$.\n- Step 2: Substitute: $$30 + \\frac{137 - 135}{100}(10) = 30 + \\frac{2}{100}(10) = 30 + 0.2 = 30.2$$ km.\n\nConceptually, we are assuming the 100 values in $$[30, 40)$$ are spread *uniformly* across the class, so the 2 extra values past CF=135 represent $$2/100 = 2\\%$$ of the way into a width-10 interval.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "When estimating the mean of grouped continuous data, why do we use class *midpoints* rather than boundaries, and what is the underlying assumption? (2 steps)", "answer": "- Step 1: We use midpoints because the *best single representative* of a uniformly-distributed class is its centre. If values in $$[30, 40)$$ were spread evenly, their average would be 35.\n- Step 2: The formula $$\\bar x = \\frac{\\sum f x_{\\text{mid}}}{\\sum f}$$ then treats each class as if all $$f$$ values sat at the midpoint, summing those representative totals and dividing by $$n$$. Using boundaries (30 or 40) would systematically under- or over-estimate; midpoints are the unbiased choice under the uniform-within-class assumption.\n\nTakeaway: Midpoint = the only unbiased single number for a class assumed uniform.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "Recall the computational formulae $$S_{xy}$$ and $$S_{xx}$$ and explain why the subtraction sign is so error-prone. (2 steps)", "answer": "- Step 1: $$S_{xy} = \\sum xy - \\frac{\\sum x \\sum y}{n}$$ and $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$. The structure is \"raw sum of products minus the 'mean correction term'\".\n- Step 2: The sign is error-prone because the mean correction is large and positive (when both $$\\sum x$$ and $$\\sum y$$ are positive), so writing $$+$$ instead of $$-$$ doubles the answer and produces an $$r$$ that fails the $$|r| \\leq 1$$ sanity check. Always remember: $$S_{xy}$$ is a *deviation* sum — deviations are about subtracting means.\n\nTakeaway: $$S_{xy}$$ subtracts a correction; if your $$|r|$$ exceeds 1, the sign is almost certainly the culprit.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "Given $$\\sum tw = 2304.53$$, $$\\sum t = 114.8$$, $$\\sum w = 297.8$$, $$n = 15$$, walk through computing $$S_{tw}$$ and explain why you must carry many significant figures. (3 steps)", "answer": "- Step 1: Compute the correction: $$\\frac{114.8 \\times 297.8}{15} = \\frac{34187.44}{15} \\approx 2279.16267$$.\n- Step 2: Subtract: $$S_{tw} = 2304.53 - 2279.16267 \\approx 25.367$$.\n- Step 3: Notice $$S_{tw}$$ is the small *difference* of two close large numbers (2304 and 2279). Premature rounding (e.g. to 2279.2) would change the answer by ~0.04, a relative error of >0.1% on $$S_{tw}$$ — enough to break a \"show that\" target like $$b = 4.77$$. Always carry $$\\geq 5$$ s.f. in intermediate steps.\n\nTakeaway: When subtracting close numbers, sig figs in the inputs determine sig figs in the answer.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "Why is the product moment correlation coefficient $$r$$ *invariant* under any positive linear coding of either variable (e.g. $$x = t - 6$$ and $$y = w/2 - 5$$)? (3 steps)", "answer": "- Step 1: PMCC is defined as $$r = S_{xy}/\\sqrt{S_{xx}S_{yy}}$$, where each $$S$$ is a sum of deviations from the mean. A shift like $$t \\to t - 6$$ moves the mean by the same 6, so deviations are unchanged. Thus shifts don't affect any $$S$$ term.\n- Step 2: A positive scaling like $$w \\to w/2$$ multiplies every deviation by $$1/2$$, so $$S_{ww}$$ scales by $$(1/2)^2$$ and $$S_{tw}$$ scales by $$1/2$$. In the formula, the numerator picks up $$1/2$$ and the denominator picks up $$\\sqrt{(1/2)^2} = 1/2$$, which cancel.\n- Step 3: Therefore $$r$$ is *dimensionless* and unchanged. Important caveat: a *negative* scaling (e.g. $$y = -w$$) flips the sign of $$r$$. The rule is invariance under **positive** linear coding only.\n\nTakeaway: Positive linear coding $$\\Rightarrow$$ $$r$$ unchanged; sign-flip only if a scale factor is negative.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": true}, {"question": "You have the line $$w = -16.7 + 4.77t$$ for the original data. The data are recoded by $$x = t - 6$$ and $$y = w/2 - 5$$. How do you obtain the regression line of $$y$$ on $$x$$ without recomputing $$S_{xy}, S_{xx}$$? (3 steps)", "answer": "- Step 1: Express $$t$$ and $$w$$ in terms of $$x$$ and $$y$$: $$t = x + 6$$, and $$w = 2(y + 5) = 2y + 10$$.\n- Step 2: Substitute into the original line: $$2y + 10 = -16.7 + 4.77(x + 6)$$. This is already a valid answer if the question says \"do not need to simplify\".\n- Step 3: Conceptual point: the underlying regression relationship is *the same line on transformed axes*. Recomputing $$S_{xy}/S_{xx}$$ from coded sums would give the same final answer but waste time and introduce arithmetic risk. The substitution route is the question's hint.\n\nTakeaway: Coded regression = original line with original variables rewritten in coded ones.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "Why is using a regression line of $$w$$ on $$t$$ to predict the weight when $$t = 2$$ cm called *extrapolation*, and what are two reasons to flag this as inappropriate? (2 steps)", "answer": "- Step 1: Extrapolation = predicting outside the range of observed $$t$$ values. If the 15 mice had tail lengths roughly 6.4–8.9 cm (mean 7.65, $$s \\approx 0.6$$), then $$t = 2$$ is several standard deviations below the lowest observation — well outside the calibration range.\n- Step 2: Two reasons to refuse the prediction:\n+ Statistical: the linear relationship is only *evidenced* within the observed range; outside it, the relationship may curve, plateau, or break down.\n+ Physical: substituting $$t = 2$$ gives $$w = -16.7 + 4.77(2) = -7.16$$ g, a negative weight — physically impossible. This is a concrete sanity-check that the model has failed.\n\nTakeaway: Extrapolation = no statistical evidence + often nonsensical predictions.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "What is the interpretation of the gradient in $$w = -16.7 + 4.77t$$, and what unit information must you include? (single fact)", "answer": "\"For each additional 1 cm of tail length, the weight increases by approximately 4.77 grams.\" The key marking points are: (1) describe an *increase* (positive gradient), (2) state the *amount* (4.77), (3) attach the *units of the response per units of the explanatory variable* (grams per centimetre). Saying \"weight increases by 4.77\" without units loses the mark — examiners want to see you understand the gradient as a rate.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "Data $$l$$ is coded by $$x = l - 600$$. You compute $$\\bar x = 45.81$$ and $$\\mathrm{Var}(x) = 3767$$. What are $$\\bar l$$ and $$\\mathrm{Var}(l)$$, and why are the two corrections different? (3 steps)", "answer": "- Step 1: For the mean, a shift propagates directly: $$\\bar l = \\bar x + 600 = 645.81$$ mm. Adding a constant to every data point adds it to the mean too.\n- Step 2: For the variance, a shift has *no effect*: $$\\mathrm{Var}(l) = \\mathrm{Var}(x) = 3767$$. Conceptually, variance measures *spread* (deviation from the mean), and sliding all points by the same amount keeps deviations identical.\n- Step 3: The general rule is $$\\mathrm{Var}(x + a) = \\mathrm{Var}(x)$$ and $$\\mathrm{Var}(bx) = b^2 \\mathrm{Var}(x)$$. Only *scaling* changes variance, and it scales by the *square* of the factor (because variance is in squared units).\n\nTakeaway: Shift ⇒ mean shifts, variance unchanged. Scale ⇒ mean scales by $$b$$, variance scales by $$b^2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "A box plot for $$n = 81$$ salmon has median 4000. What is the maximum number of salmon with weight in $$(4600, 7700]$$, and why doesn't this require interpolation? (2 steps)", "answer": "- Step 1: The interval $$(4600, 7700]$$ lies *entirely above* the median (4000). Since the median is the 41st value (for $$n = 81$$, position 41 splits 40 below and 40 above), at most 40 values can lie strictly above the median.\n- Step 2: We can't do better than 40 because we don't know exactly how the upper-half values are distributed inside the box and beyond. So the maximum is just $$\\lfloor 81/2 \\rfloor = 40$$.\n\nConceptual trap: people try to interpolate \"$$Q_3 - 4600$$\" or scale by widths, but the box plot doesn't tell you the data density inside the box — it only tells you the *positions* of the quartiles.\n\nTakeaway: For \"max count above a bound\", compare the bound to median/quartiles and use positional counting.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": true}, {"question": "State the $$1.5 \\times \\text{IQR}$$ outlier rule and explain why you must check *both* fences explicitly, even if data look obviously fine on one side. (2 steps)", "answer": "- Step 1: An outlier is a value below $$Q_1 - 1.5 \\cdot \\mathrm{IQR}$$ or above $$Q_3 + 1.5 \\cdot \\mathrm{IQR}$$. With $$Q_1 = 3000$$, $$Q_3 = 5500$$, $$\\mathrm{IQR} = 2500$$: lower fence $$= 3000 - 3750 = -750$$, upper fence $$= 5500 + 3750 = 9250$$.\n- Step 2: Even if min = 2000 is \"clearly\" within range, you still must *write the comparison* ($$2000 > -750$$ ✓). Examiners award method marks for the explicit fence calculation and comparison — silent intuition gets no marks. The \"show that no outliers\" task is fundamentally a *checking* task.\n\nTakeaway: Outlier checks = compute both fences, compare both extremes, state both conclusions.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "A bag has 30% A, 45% B, rest C counters. Reds: 2% in A, 4% in B, 6% in C. Find $$P(\\text{red})$$ using the total probability law, and explain the conceptual structure. (3 steps)", "answer": "- Step 1: $$P(C) = 1 - 0.30 - 0.45 = 0.25$$. Now A, B, C form a *partition* of the sample space (every counter is exactly one label).\n- Step 2: Total probability says: to find the unconditional $$P(R)$$, sum over the partition with each piece weighted by both how likely it is *and* how likely red is given that piece: $$P(R) = P(A)P(R|A) + P(B)P(R|B) + P(C)P(R|C)$$.\n- Step 3: Substitute: $$0.30(0.02) + 0.45(0.04) + 0.25(0.06) = 0.006 + 0.018 + 0.015 = 0.039$$.\n\nTakeaway: Total probability = \"weighted average of conditional probabilities\", weighted by partition probabilities.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "Given $$P(R) = 0.039$$, $$P(C) = 0.25$$, $$P(R|C) = 0.06$$, find $$P(C|R)$$ and explain why this is the \"reverse\" of $$P(R|C)$$ rather than the same number. (3 steps)", "answer": "- Step 1: Bayes: $$P(C|R) = \\frac{P(C) P(R|C)}{P(R)} = \\frac{0.25 \\times 0.06}{0.039} = \\frac{0.015}{0.039} = \\frac{5}{13} \\approx 0.385$$.\n- Step 2: $$P(R|C) = 0.06$$ answers: \"given a C counter, what fraction are red?\" $$P(C|R) = 0.385$$ answers: \"given a red counter, what fraction came from C?\" These are different questions — they invert the direction of the implication.\n- Step 3: The dramatic difference (0.06 vs 0.385) arises because reds are *rare overall* (3.9%) and C counters are disproportionately red (6% vs 2% for A). So conditional on observing red, C becomes much more represented than its baseline 25%.\n\nTakeaway: $$P(A|B)$$ and $$P(B|A)$$ are different in general; Bayes formalises the conversion.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": true}, {"question": "Discrete RV $$Y$$ has pmf $$P(Y=y) = k(3-y)$$ for $$y=1,2$$, $$k(y^2 - 8)$$ for $$y = 3, 4, 5$$, and $$k$$ for $$y=6$$. Show $$k = 1/30$$ and explain the verification step. (2 steps)", "answer": "- Step 1: Tabulate every value: $$P(Y=1) = k(3-1) = 2k$$; $$P(Y=2) = k(3-2) = k$$; $$P(Y=3) = k(9-8) = k$$; $$P(Y=4) = k(16-8) = 8k$$; $$P(Y=5) = k(25-8) = 17k$$; $$P(Y=6) = k$$.\n- Step 2: Sum = $$2k + k + k + 8k + 17k + k = 30k$$. For a valid pmf, $$\\sum P = 1$$, so $$30k = 1 \\Rightarrow k = 1/30$$. Check all values are non-negative: yes, the smallest is $$k > 0$$ and $$y^2 - 8 \\geq 1$$ for $$y \\geq 3$$. The pmf is valid.\n\nTakeaway: Always tabu
