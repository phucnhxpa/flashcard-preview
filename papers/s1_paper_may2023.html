late piecewise pmf values numerically and check (a) sum = 1, (b) all entries $$\\geq 0$$.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": true}, {"question": "For the pmf with values $$P(Y=y) = 2/30, 1/30, 1/30, 8/30, 17/30, 1/30$$ at $$y = 1, \\ldots, 6$$, compute $$E(Y)$$ and explain why one term dominates. (2 steps)", "answer": "- Step 1: $$E(Y) = \\sum y P(Y=y) = \\frac{1(2) + 2(1) + 3(1) + 4(8) + 5(17) + 6(1)}{30} = \\frac{2 + 2 + 3 + 32 + 85 + 6}{30} = \\frac{130}{30} = \\frac{13}{3} \\approx 4.33$$.\n- Step 2: The term $$5 \\times 17/30 = 85/30$$ contributes nearly two-thirds of the expectation, because $$y = 5$$ has by far the highest probability (17/30 ≈ 57%). The expectation sits close to 5 (not the midpoint 3.5) because the distribution is heavily right-weighted.\n\nTakeaway: $$E(Y)$$ is a probability-weighted average — the most-likely values pull it toward themselves.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "If $$X = 15 - 2Y$$ (a *deterministic* function of $$Y$$), how do you find $$P(Y \\leq X)$$ and why is \"enumerating joint pairs\" the wrong approach? (3 steps)", "answer": "- Step 1: $$X$$ is *not* an independent random variable — it is fully determined by $$Y$$. So the event $$\\{Y \\leq X\\}$$ is really an event on $$Y$$ alone: $$Y \\leq 15 - 2Y$$.\n- Step 2: Solve algebraically: $$Y \\leq 15 - 2Y \\iff 3Y \\leq 15 \\iff Y \\leq 5$$. So $$\\{Y \\leq X\\} = \\{Y \\leq 5\\}$$.\n- Step 3: Compute: $$P(Y \\leq 5) = 1 - P(Y = 6) = 1 - 1/30 = 29/30$$. If you tried to enumerate \"joint pairs\" treating $$X$$ and $$Y$$ as independent, you'd multiply marginals and get nonsense — they are perfectly dependent.\n\nTakeaway: When $$X = g(Y)$$, the event $$\\{Y \\leq X\\}$$ reduces to an inequality on $$Y$$ alone.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": true}, {"question": "Given $$\\mathrm{Var}(Y) = 61/45$$ and $$X = 15 - 2Y$$, find $$\\mathrm{Var}(X)$$ and derive the rule for variance under linear transformation. (3 steps)", "answer": "- Step 1: General rule: $$\\mathrm{Var}(aY + b) = a^2 \\mathrm{Var}(Y)$$. The constant $$b$$ shifts the distribution but doesn't change spread (variance unchanged by shift). The factor $$a$$ scales every deviation $$Y - \\mu$$ by $$a$$, so squared deviations scale by $$a^2$$.\n- Step 2: Apply: $$\\mathrm{Var}(15 - 2Y) = (-2)^2 \\mathrm{Var}(Y) = 4 \\mathrm{Var}(Y)$$. Notice the sign of $$a$$ disappears once squared — variance is always non-negative.\n- Step 3: $$\\mathrm{Var}(X) = 4 \\times 61/45 = 244/45 \\approx 5.42$$.\n\nCommon errors:\n+ Writing $$\\mathrm{Var}(X) = -2 \\mathrm{Var}(Y)$$ — variance can't be negative.\n+ Writing $$\\mathrm{Var}(X) = 2 \\mathrm{Var}(Y)$$ — missing the square.\n+ Including the +15 — constants don't affect variance.\n\nTakeaway: $$a^2$$, not $$a$$; constants vanish.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "Conceptually, what does it mean for two events to be (i) mutually exclusive, and (ii) independent? Why can't two events with positive probability be both? (3 steps)", "answer": "- Step 1: Mutually exclusive: $$P(A \\cap B) = 0$$ — the events cannot both occur. The occurrence of one *excludes* the other.\n- Step 2: Independent: $$P(A \\cap B) = P(A) P(B)$$ — knowing one event has occurred gives no information about the other. The two have no probabilistic interaction.\n- Step 3: Suppose both. Then $$P(A)P(B) = 0$$, so at least one of $$P(A), P(B)$$ is zero. So for *positive-probability* events, mutual exclusivity and independence are logically incompatible. In fact, mutually exclusive events are *maximally dependent* — knowing $$A$$ occurred tells you $$B$$ definitely didn't.\n\nTakeaway: Mutually exclusive = \"cannot coexist\"; independent = \"do not interact\"; these are opposite extremes for positive-probability events.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": true}, {"question": "Three events $$A, B, C$$ have $$P(A) = 0.1$$, $$P(B|A) = 0.3$$, $$P(A \\cup B) = 0.25$$. Show $$P(B) = 0.18$$. (3 steps)", "answer": "- Step 1: First find $$P(A \\cap B)$$ using the conditional probability definition: $$P(A \\cap B) = P(A) P(B|A) = 0.1 \\times 0.3 = 0.03$$.\n- Step 2: Apply inclusion–exclusion for two sets: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$.\n- Step 3: Substitute and solve: $$0.25 = 0.1 + P(B) - 0.03 \\Rightarrow P(B) = 0.25 - 0.1 + 0.03 = 0.18$$. ✓\n\nTakeaway: To turn $$P(B|A)$$ into $$P(A \\cap B)$$, multiply by $$P(A)$$; then inclusion–exclusion gives $$P(B)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "For three events with $$P(A) = 0.10, P(B) = 0.18, P(C) = 0.50$$, $$P(A \\cap B) = 0.03$$, $$A$$ and $$C$$ mutually exclusive, $$B$$ and $$C$$ independent — what is $$P(A \\cap B \\cap C)$$, and why? (2 steps)", "answer": "- Step 1: $$A$$ and $$C$$ being mutually exclusive means $$A \\cap C = \\emptyset$$.\n- Step 2: $$A \\cap B \\cap C$$ is a *subset* of $$A \\cap C$$ (since intersecting with $$B$$ can only shrink the set further). A subset of the empty set is empty, so $$P(A \\cap B \\cap C) = 0$$.\n\nConceptual point: mutual exclusivity between *any* pair forces the triple intersection to zero. Always state this explicitly in your Venn work.\n\nTakeaway: $$A \\cap C = \\emptyset \\Rightarrow A \\cap B \\cap C = \\emptyset$$.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "For three events with $$P(A) = 0.10, P(B) = 0.18, P(C) = 0.50$$, $$P(A \\cap B) = 0.03$$, $$P(A \\cap C) = 0$$, $$P(B \\cap C) = 0.09$$, $$P(A \\cap B \\cap C) = 0$$, fill in all eight Venn regions and the \"outside\" region. (3 steps)", "answer": "- Step 1: Start from the *centre* (triple intersection) and work outward. Triple = 0.\n+ $$A \\cap B$$ only (not in $$C$$) = $$P(A \\cap B) - P(A \\cap B \\cap C) = 0.03 - 0 = 0.03$$.\n+ $$A \\cap C$$ only = $$0 - 0 = 0$$.\n+ $$B \\cap C$$ only = $$0.09 - 0 = 0.09$$.\n- Step 2: Then singles (the \"only\" regions):\n+ $$A$$ only = $$P(A) - P(A \\cap B \\text{ only}) - P(A \\cap C \\text{ only}) - P(\\text{triple}) = 0.10 - 0.03 - 0 - 0 = 0.07$$.\n+ $$B$$ only = $$0.18 - 0.03 - 0.09 - 0 = 0.06$$.\n+ $$C$$ only = $$0.50 - 0 - 0.09 - 0 = 0.41$$.\n- Step 3: Outside = $$1 - (0.07 + 0.06 + 0.41 + 0.03 + 0 + 0.09 + 0) = 1 - 0.66 = 0.34$$. Check sum: 0.07+0.06+0.41+0.03+0+0.09+0+0.34 = 1.00 ✓.\n\nTakeaway: Centre → doubles → singles → outside; always check sum = 1.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": true}, {"question": "$$J \\sim N(500, 25^2)$$. Without computation, sketch why $$P(J > d) = 0.9192$$ forces $$d$$ to lie *below* the mean, and explain the sign of the $$z$$-score. (2 steps)", "answer": "- Step 1: $$P(J > d) > 0.5$$, which means more than half of the probability sits above $$d$$. Since a normal distribution is symmetric about its mean, \"more than half above\" can only happen if $$d$$ is to the *left* of the mean.\n- Step 2: Therefore $$d < \\mu = 500$$, and so $$z = (d - \\mu)/\\sigma < 0$$. The classic error is to look up $$\\Phi(z) = 0.9192$$ and read $$z = +1.40$$, giving $$d = 535$$. The fix is to *sketch first*: shade the upper tail of area 0.9192 and visually confirm $$d$$ sits left of centre, giving $$z = -1.40$$ and $$d = 500 - 35 = 465$$.\n\nTakeaway: Always sketch and shade *before* reading tables; the sign of $$z$$ is determined by the picture, not the table.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "For 5 *independent* bags of juice each with $$P(\\text{<510 ml}) = 0.6554$$, find the probability that all 5 yield less than 510 ml. Why exponentiate rather than multiply by 5? (2 steps)", "answer": "- Step 1: \"All 5\" means the *intersection* of 5 independent events, each with probability 0.6554. For independent events, $$P(\\bigcap E_i) = \\prod P(E_i) = 0.6554^5$$.\n- Step 2: $$0.6554^5 \\approx 0.121$$. Multiplying by 5 would give 3.277, which exceeds 1 — an immediate flag that you've conflated \"the chance one of them\" or \"the expected number\" with \"the chance all of them\".\n\nTakeaway: \"All independent events occur\" = product = power; \"at least one occurs\" = $$1 - $$ (none).", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "For a normal $$R \\sim N(520, k^2)$$, given $$P(R < r) = 0.15$$ and $$P(R > 3r - 800) = 0.005$$, set up two equations in $$r$$ and $$k$$ and explain the algebraic strategy. (3 steps)", "answer": "- Step 1: Translate each probability to a $$z$$-equation using $$z = (X - \\mu)/\\sigma$$.\n+ $$P(R < r) = 0.15 < 0.5$$, so $$z$$ is negative. From tables, $$\\Phi(-z) = 0.85 \\Rightarrow z = -1.0364$$. Hence $$(r - 520)/k = -1.0364$$, or $$r = 520 - 1.0364 k$$.\n+ $$P(R > 3r - 800) = 0.005 < 0.5$$, so the bound is in the *upper* tail, with $$z = +2.5758$$ (from the percentage-point table). Hence $$(3r - 800 - 520)/k = 2.5758$$, simplifying to $$r = 440 + 0.8586 k$$.\n- Step 2: Equate the two expressions for $$r$$: $$520 - 1.0364 k = 440 + 0.8586 k \\Rightarrow 80 = 1.8950 k \\Rightarrow k \\approx 42.2$$.\n- Step 3: Back-substitute: $$r = 520 - 1.0364 \\times 42.2 \\approx 476$$. Verify by plugging both numbers back into the original probability statements.\n\nTakeaway: Two probability constraints + two unknowns ⇒ rearrange each to $$r = \\ldots k$$ form, then equate.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "Why do we use the *percentage-point table* (giving $$z_{0.005} = 2.5758$$) rather than the body $$\\Phi(z)$$ table (giving $$z \\approx 2.58$$) for upper-tail probabilities like 0.005? (2 steps)", "answer": "- Step 1: The body table $$\\Phi(z)$$ gives cumulative probability to two-decimal $$z$$ values. For $$\\Phi(z) = 0.995$$, you can only read $$z = 2.58$$ (to 2 d.p.), which is a rounded version of the true $$z_{0.005}$$.\n- Step 2: The percentage-point table is specifically calibrated for common tail probabilities (0.05, 0.025, 0.01, 0.005, etc.) and gives $$z$$ to 4 d.p.: $$z_{0.005} = 2.5758$$. For \"show that\" questions or multi-step systems where precision matters (like Q7c), use the percentage-point table. The four values to memorise: $$z_{0.05} = 1.6449, z_{0.025} = 1.9600, z_{0.01} = 2.3263, z_{0.005} = 2.5758$$.\n\nTakeaway: For exact tail $$z$$-values, percentage-point table; for general body $$\\Phi(z)$$, body table.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": true}, {"question": "What is the standardisation formula for a normal distribution, and why is it the cornerstone of all normal-probability questions? (single fact)", "answer": "$$Z = (X - \\mu)/\\sigma$$ converts any normal $$X \\sim N(\\mu, \\sigma^2)$$ to the *standard* normal $$Z \\sim N(0, 1)$$. This is the cornerstone because we only have tables (or memorised values) for the *one* standard normal distribution — there is no table for $$N(500, 625)$$ or any other specific normal. The formula shifts the distribution to mean 0 (the subtraction) and rescales it to standard deviation 1 (the division), preserving all probability relationships. Every normal problem starts by standardising at least one inequality.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "Show that $$P(J > 510) = 0.3446$$ for $$J \\sim N(500, 25^2)$$, quoting table values precisely. (2 steps)", "answer": "- Step 1: Standardise: $$z = (510 - 500)/25 = 0.4$$. So $$P(J > 510) = P(Z > 0.4)$$.\n- Step 2: From the body $$\\Phi(z)$$ table, $$\\Phi(0.4) = 0.6554$$. Therefore $$P(Z > 0.4) = 1 - 0.6554 = 0.3446$$. ✓\n\nFor a \"show that\" question, you must (a) compute $$z$$, (b) quote the table value to 4 d.p., (c) subtract from 1 explicitly. Skipping the table-quote step risks losing the method mark even if the final number is correct.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "Compare $$\\mathrm{Var}(aY + b)$$ for a discrete RV with $$\\mathrm{Var}(bX)$$ for shifted data $$X = x + a$$ in summary statistics. Are these the same rule? (3 steps)", "answer": "- Step 1: Both follow the same fundamental principle: shifts don't affect spread, scales affect spread by *square* of the factor. For a discrete RV: $$\\mathrm{Var}(aY + b) = a^2 \\mathrm{Var}(Y)$$.\n- Step 2: For coded data $$X = (x - c)/d$$ (the typical S1 coding): $$\\mathrm{Var}(X) = \\mathrm{Var}(x)/d^2$$, or equivalently $$\\mathrm{Var}(x) = d^2 \\mathrm{Var}(X)$$. Same rule, written for reverse coding.\n- Step 3: The unifying principle: if $$Y = aX + b$$, then $$\\mathrm{Var}(Y) = a^2 \\mathrm{Var}(X)$$. Whether $$Y$$ is a random variable being transformed or $$X$$ is a dataset being coded, the rule is identical because variance is fundamentally about deviation squared.\n\nTakeaway: One rule, two contexts: variance scales by $$(\\text{coefficient})^2$$, ignores additive constants.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": true}, {"question": "In setting up a regression line $$y = a + bx$$, how do you know which variable goes into the denominator of the gradient: $$S_{xy}/S_{xx}$$ vs $$S_{xy}/S_{yy}$$? (2 steps)", "answer": "- Step 1: The regression line of \"$$y$$ on $$x$$\" means $$y$$ is the *response* (predicted) and $$x$$ is the *explanatory* (predictor). The denominator is the $$S$$ for the **explanatory** variable: $$b = S_{xy}/S_{xx}$$.\n- Step 2: Conceptually, we minimise the squared errors in $$y$$ given $$x$$, so the line is sensitive to the spread of $$x$$ (the denominator). For \"$$w$$ on $$t$$\", $$t$$ is explanatory ⇒ $$b = S_{tw}/S_{tt}$$. Swapping to \"$$t$$ on $$w$$\" would give a *different* line: $$b' = S_{tw}/S_{ww}$$.\n\nTakeaway: Denominator = $$S$$ of the variable named *second* in \"$$y$$ on $$x$$\" (the explanatory).", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "For the regression line $$y = a + bx$$, derive how the intercept $$a$$ is found once $$b$$ is known. (2 steps)", "answer": "- Step 1: The regression line always passes through the centroid $$(\\bar x, \\bar y)$$. This is a geometric fact: the least-squares line is fitted so that errors balance around the mean point.\n- Step 2: Substituting $$(\\bar x, \\bar y)$$ into $$y = a + bx$$ gives $$\\bar y = a + b \\bar x$$, so $$a = \\bar y - b \\bar x$$. Numerically: compute the two means, multiply $$b$$ by $$\\bar x$$, subtract from $$\\bar y$$.\n\nTakeaway: $$a = \\bar y - b \\bar x$$ — every regression line goes through the centroid.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "A piecewise pmf has $$P(Y=y) = k(3-y)$$ for $$y \\in \\{1, 2\\}$$. Why is the sign $$(3-y)$$ critical, and what would go wrong with $$k(y-3)$$? (2 steps)", "answer": "- Step 1: With $$(3-y)$$: $$P(Y=1) = 2k, P(Y=2) = k$$. Both positive (assuming $$k > 0$$), so valid.\n- Step 2: With $$(y-3)$$: $$P(Y=1) = -2k, P(Y=2) = -k$$. Negative probabilities are nonsensical — a pmf must have all entries $$\\geq 0$$. Always tabulate numerically and check signs *before* using the pmf for $$E(Y)$$ or variance, because downstream calculations will silently produce wrong answers if the pmf is invalid.\n\nTakeaway: Tabulate, then sanity-check non-negativity, before any further work on a pmf.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "When computing $$E(Y^2)$$, why must you square the values of $$y$$ but *not* the probabilities? (single fact)", "answer": "$$E(Y^2) = \\sum y^2 P(Y=y)$$ — the random variable values get squared, but the probabilities remain as probabilities. Conceptually, $$E[g(Y)] = \\sum g(y) P(Y=y)$$ for any function $$g$$; here $$g(y) = y^2$$. The probabilities are *weights* in a weighted average — they don't get transformed because the question is \"what is the average of $$y^2$$, weighted by how likely each $$y$$ is?\" Squaring probabilities would be a category error and the sum would no longer equal a valid expectation.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": true}, {"question": "For coded data $$x = l - 600$$ with $$\\sum x = 3711, \\sum x^2 = 475181, n = 81$$, compute $$\\mathrm{Var}(x)$$ and explain the formula's intuition. (3 steps)", "answer": "- Step 1: $$\\bar x = 3711/81 \\approx 45.81$$.\n- Step 2: $$\\mathrm{Var}(x) = \\frac{\\sum x^2}{n} - \\bar x^2 = \\frac{475181}{81} - 45.81^2 \\approx 5866.4 - 2099.0 \\approx 3767$$.\n- Step 3: Intuition for the formula: $$\\frac{\\sum x^2}{n}$$ is the *mean of squared values* ($$E[X^2]$$ in RV language), and $$\\bar x^2$$ is the *square of the mean* ($$E[X]^2$$). The variance is $$E[X^2] - E[X]^2$$ — the gap between these two quantities, which captures the spread. If all values were equal to the mean, the two would coincide and variance would be 0.\n\nTakeaway: $$\\mathrm{Var} = \\text{mean of squares} - \\text{square of mean}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "Why does an unsimplified regression line like $$2y + 10 = -16.7 + 4.77(x + 6)$$ earn full marks when the question says \"you do not need to simplify\"? (2 steps)", "answer": "- Step 1: The mark scheme rewards the *substitution method* — showing you understood the coding relationships $$t = x + 6$$ and $$w = 2y + 10$$, and applied them to the original regression line. The simplification step is purely algebraic and adds no statistical content.\n- Step 2: Conceptually, every equation form ($$y = mx + c$$, implicit, factored) describes the *same line*. As long as your equation is mathematically equivalent, it's a valid regression line. Be wary, though: if a future question asks \"state the gradient\", you'll need to simplify to extract it cleanly.\n\nTakeaway: \"Need not simplify\" = the question values the method, not the cosmetic form.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "When you compute outlier fences and find min = 2000 (above lower fence) and max = 7700 (below upper fence), what's the precise wording for \"show that there are no outliers\"? (2 steps)", "answer": "- Step 1: Write the comparisons explicitly: \"min $$= 2000 > -750$$ (lower fence), so no low outliers; max $$= 7700 < 9250$$ (upper fence), so no high outliers.\" The fences must be *computed and displayed* on the script, and both extremes compared.\n- Step 2: The marks are awarded for: (a) computing IQR correctly, (b) computing both fences correctly, (c) comparing both extremes, (d) stating the conclusion. Skipping any step risks losing 1–2 marks even with a correct final answer. Examiners want to see the *check*, not just the conclusion.\n\nTakeaway: For \"show that\", write every comparison; trust nothing to intuition.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "A common error in normal problems is to write $$\\mathrm{Var}(R) = k$$ rather than $$\\mathrm{Var}(R) = k^2$$ when $$R \\sim N(520, k^2)$$. What's the conceptual issue? (2 steps)", "answer": "- Step 1: The notation $$N(\\mu, \\sigma^2)$$ uses *variance* in the second slot. So if we write $$N(520, k^2)$$, then $$\\sigma^2 = k^2 \\Rightarrow \\sigma = k$$. The symbol $$k$$ here is playing the role of standard deviation, not variance.\n- Step 2: When standardising, you divide by $$\\sigma = k$$ (not $$\\sigma^2 = k^2$$): $$z = (R - 520)/k$$. Confusing the two would give an extra (or missing) square root in every $$z$$-equation, breaking the entire problem.\n\nTakeaway: $$N(\\mu, \\sigma^2)$$ — second argument is variance; divide by $$\\sigma$$ (its root) when standardising.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "Conceptually, why is the median position for *grouped continuous* data $$n/2$$ instead of $$(n+1)/2$$? (2 steps)", "answer": "- Step 1: For *discrete* data with $$n$$ ordered values, the median is the $$(n+1)/2$$-th value — a literal data point. With $$n = 7$$, that's the 4th value: precisely defined.\n- Step 2: For *continuous* data, the data is conceptually a continuous distribution; the median is the value below which half the *probability mass* lies. With $$n$$ observations representing this mass, half is at $$n/2$$. There's no \"extra +1\" because we're not picking a point — we're locating the value that splits area in half. The interpolation formula then refines this to a precise interpolated value.\n\nTakeaway: Discrete = pick the middle value; continuous = locate where area = 50%.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": false}, {"question": "For Q5(b), $$P(1 < Y \\leq 4)$$ with the pmf values $$2/30, 1/30, 1/30, 8/30, 17/30, 1/30$$ at $$y = 1,\\ldots, 6$$ — which values do you include, and why does the strict inequality on the left matter? (2 steps)", "answer": "- Step 1: $$1 < Y \\leq 4$$ means $$Y > 1$$ AND $$Y \\leq 4$$. Excludes $$Y = 1$$, includes $$Y = 2, 3, 4$$.\n- Step 2: Sum: $$P(Y=2) + P(Y=3) + P(Y=4) = 1/30 + 1/30 + 8/30 = 10/30 = 1/3$$. The strict $$<$$ on the left is critical: had it been $$1 \\leq Y \\leq 4$$, you'd include $$Y = 1$$ (probability $$2/30$$), giving $$12/30 = 2/5$$ — a different answer.\n\nTakeaway: Read inequality endpoints with extreme care: $$<$$ excludes, $$\\leq$$ includes.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "Recall the key habit \"fill Venn from the centre outward\" and explain why doing it the other way (from singles inward) causes errors. (2 steps)", "answer": "- Step 1: The \"singles\" regions (e.g. \"$$A$$ only\") are *defined* by subtraction: $$P(A \\text{ only}) = P(A) - P(A \\cap B \\text{ only}) - P(A \\cap C \\text{ only}) - P(\\text{triple})$$. You need the intersection-only regions filled in first; the central triple must be known before any double-intersection-only region can be computed.\n- Step 2: Working outward means at each step, you only need information you've already computed. Working inward forces you to guess or back-solve, leading to arithmetic errors and missed regions (especially the outside region).\n\nTakeaway: Centre → doubles → singles → outside; one direction, no back-tracking.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": false}, {"question": "Why is the maximum-count question \"maximum number with $$w > 4600$$\" answered with **40**, not 41, when $$n = 81$$? (2 steps)", "answer": "- Step 1: For $$n = 81$$, the median is the 41st value when ordered. Position 41 means: 40 values below, the 41st itself, 40 values above.\n- Step 2: We want values *strictly above* 4600, which is itself strictly above the median (4000). So any qualifying value is also strictly above the median, meaning it's one of the upper 40. The median itself is not above 4000 (it equals 4000), so we exclude position 41 from \"above\". Hence the maximum is 40.\n\nTakeaway: \"Strictly above median\" caps the count at $$\\lfloor n/2 \\rfloor$$ for odd $$n$$.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": false}, {"question": "What's the difference between $$P(\\text{red})$$ computed by total probability and $$P(\\text{red} | A)$$? (2 steps)", "answer": "- Step 1: $$P(\\text{red} | A) = 0.02$$ is *conditional*: \"given the counter is labelled A, what fraction is red?\" It uses only A counters as the reference set.\n- Step 2: $$P(\\text{red}) = 0.039$$ is *unconditional*: \"across the entire bag, what fraction is red?\" It averages the conditional reds (0.02, 0.04, 0.06) weighted by how common each label is (0.30, 0.45, 0.25). The unconditional is always a weighted average of the conditionals, bounded by the smallest and largest conditional values.\n\nTakeaway: Conditional = restrict to subgroup; unconditional = weighted average across all subgroups.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": false}, {"question": "Why is the strategy \"sketch and shade before reading tables\" especially valuable for inverse-normal problems? (2 steps)", "answer": "- Step 1: A sketch immediately reveals: (a) which side of the mean the value lies (sign of $$z$$), (b) whether the given probability is the body or the tail (which lookup to do), (c) whether to use $$\\Phi(z)$$ or $$1 - \\Phi(z)$$ or $$\\Phi(-z)$$.\n- Step 2: Tables only give absolute $$z$$-values for positive arguments. Without a sketch, you can read $$z = 1.40$$ for \"$$\\Phi(z) = 0.9192$$\" and miss that the actual $$z$$ needed is $$-1.40$$ because the shaded region is on the *left*. The sketch is the difference between an arithmetic-correct wrong answer and a fully right one.\n\nTakeaway: Sketch = immune to sign and table-direction errors.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": false}, {"question": "State and explain the meaning of $$E(aY + b) = aE(Y) + b$$ for a discrete RV. (single fact)", "answer": "$$E(aY + b) = aE(Y) + b$$ says expectation is a *linear* operator: it commutes with multiplication by constants and addition of constants. Conceptually, if you scale every value of $$Y$$ by $$a$$ and shift by $$b$$, the average scales and shifts in exactly the same way — averaging and linear transformation are interchangeable. Contrast with variance, where the constant $$b$$ disappears and the scale factor squares: variance measures spread, not location, so shifts are invisible and scales square. This distinction (E is linear, Var is \"quadratic in scale\") is one of the most fundamental ideas in distribution theory.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": true}, {"question": "A common Q4-style mistake is writing $$P(A \\cap \\text{not red}) = P(A) - P(A \\cap R)$$. Is this correct, and what's a cleaner way? (2 steps)", "answer": "- Step 1: The formula is technically correct: $$P(A \\cap R^c) = P(A) - P(A \\cap R) = 0.30 - 0.006 = 0.294$$. But it requires two computations.\n- Step 2: A cleaner approach uses the tree directly: $$P(A \\cap R^c) = P(A) P(R^c | A) = 0.30 \\times 0.98 = 0.294$$. This follows the tree branches naturally and matches how the question presents the data.\n\nTakeaway: For tree-based questions, multiply along branches; complementation works but is a detour.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": false}], "count": 47}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 13713, "out_tokens": 19420, "reasoning_chars": 3425, "cost_eur": 0.0758, "elapsed_s": 377, "content_chars": 59910}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 13713, "out_tokens": 22953, "reasoning_chars": 1574, "cost_eur": 0.0872, "elapsed_s": 292, "content_chars": 68292}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.9, "in_tokens": 13713, "out_tokens": 15070, "reasoning_chars": 16638, "cost_eur": 0.0618, "elapsed_s": 319, "content_chars": 33178}, "kimi_1": {"run": 1, "provider": "kimi", "model": "moonshotai/kimi-k2.6", "display": "Kimi K2.6", "temperature": 0.7, "in_tokens": 13348, "out_tokens": 23996, "reasoning_chars": 50072, "cost_eur": 0.1119, "elapsed_s": 465, "content_chars": 34856}, "kimi_2": {"run": 2, "provider": "kimi", "model": "moonshotai/kimi-k2.6", "display": "Kimi K2.6", "temperature": 0.8, "in_tokens": 13363, "out_tokens": 34661, "reasoning_chars": 76289, "cost_eur": 0.1576, "elapsed_s": 393, "content_chars": 55357}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 12964, "out_tokens": 9061, "reasoning_chars": 2911, "cost_eur": 0.0116, "elapsed_s": 68, "content_chars": 25063}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.8, "in_tokens": 12964, "out_tokens": 9416, "reasoning_chars": 2123, "cost_eur": 0.0119, "elapsed_s": 75, "content_chars": 26424}, "opus_1": {"run": 1, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_to const SK='s1_paper_may2023';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),3500);
  fetch('https://hermes-flashcards.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
