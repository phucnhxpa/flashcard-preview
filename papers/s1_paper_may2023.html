the printed value — a numerical near-miss is a method mark loss.", "source": "Opus 4.7 ②", "_id": "opus_2_6"}, {"question": "S1 May 2023 Q6(c) — When labelling a Venn diagram, why must the “only” region for $$B$$ be computed as $$P(B) - P(A\\cap B\\text{ only}) - P(B\\cap C\\text{ only}) - P(A\\cap B\\cap C)$$, and what happens if you omit the triple intersection subtraction? (2 steps)", "answer": "- Step 1: The total $$P(B)$$ includes every part of circle $$B$$: the pure $$B$$-only region, the two pairwise lenses, and the triple centre. To find the pure region, you must strip away all overlaps.\n- Step 2: Omitting the triple intersection (here 0) would not affect the arithmetic in this specific paper, but in general it causes double-counting because the triple region belongs to all three pairwise intersections. The systematic “centre outward” filling order guarantees you never forget this subtraction.", "source": "Kimi K2.6 ①", "_id": "kimi_1_47"}, {"question": "S1 May 2023 Q2(f) — Why does the PMCC remain unchanged when data are transformed by a positive linear coding? (2 steps)", "answer": "- Step 1: The PMCC measures the *strength of linear association*, which depends on the pattern of points, not their scale or origin. A positive linear coding $$x = t - 6$$ (shift) and $$y = w/2 - 5$$ (shift + positive scale) stretches/shifts the scatter diagram but does not change the linear pattern.\n- Step 2: Formally, $$r_{xy} = \\frac{S_{xy}}{\\sqrt{S_{xx}S_{yy}}}.$$ Under coding $$x = at + c$$ and $$y = bw + d$$ with $$a, b > 0$$: $$S_{xy} = ab\\,S_{tw},$$ $$S_{xx} = a^2 S_{tt},$$ $$S_{yy} = b^2 S_{ww}.$$ The factors cancel: $$r_{xy} = \\frac{ab\\,S_{tw}}{\\sqrt{a^2 S_{tt} \\cdot b^2 S_{ww}}} = \\frac{ab\\,S_{tw}}{ab\\sqrt{S_{tt}S_{ww}}} = r_{tw}.$$\n\nTakeaway: PMCC is invariant under positive linear coding because the scale factors cancel.", "source": "GLM 5.1 ②", "_id": "glm_2_10"}, {"question": "For $$\\mathrm{Var}(15 - 2Y)$$, what's the variance transformation rule, and what's the most common error?", "answer": "- Step 1: Rule: $$\\mathrm{Var}(aY + b) = a^2 \\cdot \\mathrm{Var}(Y)$$.\n- Step 2: Here $$a = -2$$, $$b = 15$$, so $$\\mathrm{Var}(15 - 2Y) = (-2)^2 \\cdot \\mathrm{Var}(Y) = 4 \\cdot \\mathrm{Var}(Y)$$.\n- Step 3: Common errors:\n+ Multiplying by $$-2$$ (forgetting to square) → negative variance, nonsense\n+ Multiplying by 2 (forgetting the square) → wrong answer\n+ Not dropping the constant $$+15$$ (variance is location-invariant)", "source": "Opus 4.7 ①", "_id": "opus_1_22"}, {"question": "S1 May 2023 Q5(d) — Why is it wrong to try to enumerate joint $$(Y, X)$$ pairs and compute $$P(Y=y) \\cdot P(X=x)$$ when $$X = 15 - 2Y$$? (2 steps)", "answer": "- Step 1: $$X$$ and $$Y$$ are **not independent** — $$X$$ is completely determined by $$Y$$. For each value of $$Y$$, there is exactly one corresponding value of $$X$$. So $$P(X = x \\mid Y = y) = 1$$ when $$x = 15 - 2y$$, and 0 otherwise.\n- Step 2: Computing $$P(Y=y) \\cdot P(X=x)$$ assumes independence, which is false here. The correct approach is to substitute the functional relationship and solve the inequality algebraically: $$Y \\leq 15 - 2Y \\Rightarrow Y \\leq 5.$$\n\nTakeaway: When one variable is a function of another, they are perfectly dependent — never assume independence.", "source": "GLM 5.1 ②", "_id": "glm_2_69"}, {"question": "S1 May 2023 Q6(c) — What is the systematic filling order for a three-set Venn diagram when you know some intersections and some “only” values are unknown, and why must the outside region be included? (3 steps)", "answer": "- Step 1: Fill from the centre outward: start with the triple intersection $$A \\cap B \\cap C$$, then the pairwise-only regions ($$A \\cap B$$ only, $$B \\cap C$$ only, etc.), then the single-only regions ($$A$$ only, $$B$$ only, $$C$$ only), and finally the outside region.\n- Step 2: This order prevents double-counting because each step subtracts what has already been placed in deeper overlaps. For example, “$$A \\cap B$$ only” equals the total $$A \\cap B$$ minus the triple intersection.\n- Step 3: The outside region is mandatory because the sum of all seven interior regions plus the outside must equal 1. Omitting it loses a mark and prevents you from verifying your diagram. Here the outside is $$1 - 0.66 = 0.34$$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_29"}, {"question": "S1 May 2023 Q2(g) — When coding transforms both variables as $$x = t - 6$$ and $$y = w/2 - 5$$, why does the regression line of $$y$$ on $$x$$ still have the same predictive relationship as $$w$$ on $$t$$, and what algebraic property guarantees this? (2 steps)", "answer": "- Step 1: Linear coding preserves collinearity; it merely re-labels the axes by shifting and scaling. The least-squares criterion minimises the same sum of squared residuals, just expressed in new units.\n- Step 2: Algebraically, substituting the inverse coding into the original line and simplifying yields a line whose slope is $$b_y = b_w \\times (\\text{scale factor of }w) / (\\text{scale factor of }t)$$. Here the gradient becomes $$4.77 \\times (1/2) / 1 = 2.385$$. Because every $$(t,w)$$ pair maps to exactly one $$(x,y)$$ pair, the optimal fit transforms consistently.", "source": "Kimi K2.6 ①", "_id": "kimi_1_50"}, {"question": "Why does the constant $$+15$$ vanish from $$\\mathrm{Var}(15 - 2Y)$$ but the $$-2$$ becomes $$+4$$?", "answer": "- Step 1: Variance measures **spread** about the mean. Adding a constant shifts every value (and the mean) by the same amount — so spreads are unchanged.\n- Step 2: Scaling by $$-2$$ stretches every deviation $$(Y - \\mu)$$ to $$-2(Y - \\mu)$$. The variance is $$E[(-2(Y-\\mu))^2] = 4 E[(Y-\\mu)^2]$$ — the sign disappears because we square.\n- Step 3: General rule: shifts don't affect variance; scales affect variance squared.", "source": "Opus 4.7 ①", "_id": "opus_1_23"}, {"question": "S1 May 2023 Q7(c) — You have two probability constraints giving two equations in unknowns $$r$$ and $$k$$. What is the algebraically cleanest elimination strategy, and why should you avoid premature decimal multiplication? (3 steps)", "answer": "- Step 1: Convert each probability statement into a standardised equation $$\\frac{\\text{boundary} - 520}{k} = z$$ using the correct sign for each $$z$$.\n- Step 2: Rearrange both equations to the form $$r = \\dots k$$. This isolates the same variable on the left-hand side of both.\n- Step 3: Equate the two right-hand sides and solve for the remaining variable. Keeping exact calculator values until the final step avoids compounding rounding errors, which is critical because the equations are sensitive to small $$z$$ discrepancies.", "source": "Kimi K2.6 ②", "_id": "kimi_2_47"}, {"question": "S1 May 2023 Q5(d) — You need $$P(Y \\le X)$$ where $$X = 15 - 2Y$$. Why is it wrong to build a joint probability table, and what is the correct algebraic approach? (2 steps)", "answer": "- Step 1: It is wrong to build a joint table because $$X$$ is not independent of $$Y$$; it is a deterministic function of $$Y$$. There is only one underlying random variable, so joint probabilities would reduce to the marginals of $$Y$$ anyway.\n- Step 2: Substitute the definition of $$X$$ into the inequality: $$Y \\le 15 - 2Y$$, rearrange to $$3Y \\le 15$$, hence $$Y \\le 5$$. Then sum $$P(Y=y)$$ for $$y = 1,2,3,4,5$$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_29"}, {"question": "S1 May 2023 Q5(e) — Why is $$\\mathrm{Var}(Y)$$ computed as $$E(Y^2) - [E(Y)]^2$$, and what would happen if you accidentally reversed these terms? (2 steps)", "answer": "- Step 1: $$E(Y^2)$$ is the mean of the squared values, while $$[E(Y)]^2$$ is the square of the mean. Variance is the average squared deviation from the mean, which algebraically equals $$E(Y^2) - [E(Y)]^2$$.\n- Step 2: Reversing them gives $$[E(Y)]^2 - E(Y^2)$$, the negative of the variance. This would be negative for any non-degenerate distribution, an immediate contradiction since variance cannot be negative.", "source": "Kimi K2.6 ②", "_id": "kimi_2_55"}, {"question": "Why does algebraically substituting the coding into the original regression line produce the correct least-squares line for the coded variables, without needing to recompute any sums? (3 steps)", "answer": "- Step 1: Linear coding is an invertible affine transformation.\n- Step 2: The least-squares criterion minimises the sum of squared vertical residuals in the response variable; vertical distances transform predictably under the same linear map.\n- Step 3: Substituting applies that exact transformation to the fitted equation, yielding the unique least-squares line for the new variables without refitting.", "source": "Kimi K2.6 ②", "_id": "kimi_2_16"}, {"question": "When should you use the percentage-point table versus the body table for normal distribution problems? (2 steps)", "answer": "- Step 1: Use the percentage-point table for extreme tail probabilities (e.g., $ P(Z > z) = 0.005 \\Rightarrow z = 2.5758 $).  \n- Step 2: Use the body table for probabilities like $ P(Z < z) = 0.6554 \\Rightarrow z = 0.4 $.  \n+ Example: In Q7(c), $ P(R > 3r - 800) = 0.005 $ uses percentage-point value $ z = 2.5758 $.  \n\n**Key takeaway:** Percentage-point tables list z-values for rare tail probabilities (e.g., 0.005, 0.01); body tables for cumulative probabilities up to z.", "source": "Qwen 3 ①", "_id": "qwen_1_13"}, {"question": "S1 May 2023 Q7(b) — For five independent bags, why must the probability be raised to the fifth power, and what is the classic misapplication? (2 steps)", "answer": "- Step 1: Independence means the outcome of one bag does not affect another. The probability that all five satisfy the condition is the product of the five identical individual probabilities: $$[P(J < 510)]^5 = (0.6554)^5$$.\n- Step 2: The classic error is multiplying by 5 instead: $$5 \\times 0.6554$$. This would exceed 1 for larger counts and fundamentally misunderstands the “and” rule for independent events. Multiplication by 5 would only apply to expected value, not probability.", "source": "Kimi K2.6 ①", "_id": "kimi_1_33"}, {"question": "S1 May 2023 Q3(c) — You are asked for the maximum number of observations that can lie strictly above a value that is itself above the median (e.g. $$w > 4600$$ with median $$4000$$). What is the conceptual shortcut, and why does interpolation fail here? (2 steps)", "answer": "- Step 1: If the bound exceeds the median, every observation in the interval lies strictly above the median. By definition, at most half the data can lie strictly above the median. With $$n=81$$, that maximum is $$40$$.\n- Step 2: Interpolation assumes a uniform spread within the class, but the question asks for an exact theoretical maximum based on order-statistic logic, not an estimate.", "source": "Kimi K2.6 ②", "_id": "kimi_2_20"}, {"question": "S1 May 2023 Q1(c) — When estimating the mean from a grouped histogram, why must you use midpoints rather than class boundaries, and what is the exact formula? (2 steps)", "answer": "- Step 1: Boundaries only locate the edges of each bar; the individual data values are unknown and assumed to be spread uniformly throughout the class. The midpoint is the best single representative of every value in that bar, minimising systematic bias under the uniform-distribution assumption.\n- Step 2: Compute $$\\bar x = \\frac{\\sum f x_{\\text{mid}}}{\\sum f}$$. Using boundaries would systematically over- or under-estimate the true mean because every data point would be treated as lying at an extreme edge.", "source": "Kimi K2.6 ①", "_id": "kimi_1_3"}, {"question": "S1 May 2023 Q5(d) — Given $$X = 15 - 2Y$$, why is it wrong to construct a joint probability table of $$Y$$ and $$X$$ as if they were independent, and what is the correct algebraic approach to $$P(Y \\le X)$$? (3 steps)", "answer": "- Step 1: $$X$$ is not independent of $$Y$$; it is a deterministic function of $$Y$$. A joint table implying $$P(Y=y, X=x) = P(Y=y)P(X=x)$$ would be false because knowing $$Y$$ fixes $$X$$ exactly.\n- Step 2: Substitute the definition of $$X$$ into the inequality: $$Y \\le 15 - 2Y$$. Rearrange to $$3Y \\le 15$$, hence $$Y \\le 5$$.\n- Step 3: Translate back to probability: $$P(Y \\le 5) = 1 - P(Y=6) = 1 - \\frac{1}{30} = \\frac{29}{30}$$. This three-line algebraic route is far safer than enumerating spurious joint pairs.", "source": "Kimi K2.6 ①", "_id": "kimi_1_22"}, {"question": "Give an intuitive explanation of why adding a constant $$b$$ does not change variance, while multiplying by $$a$$ changes it by $$a^2$$. (3 steps)", "answer": "- Step 1: Adding $$b$$ slides every data point and the mean by the same amount, leaving every deviation $$(x_i - \\bar x)$$ unchanged; distances between points are untouched.\n- Step 2: Multiplying by $$a$$ stretches or compresses every distance from the mean by a factor of $$|a|$$.\n- Step 3: Because variance averages squared deviations, and squaring a stretched deviation multiplies it by $$a^2$$, the overall variance scales by $$a^2$$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_31"}, {"question": "S1 May 2023 Q6 — What is the definition of \"independent\" events, and how does it differ from mutually exclusive? (2 steps)", "answer": "- Step 1: Two events are independent if knowing one occurred tells you **nothing** about the other: $$P(B \\cap C) = P(B) \\cdot P(C).$$ The probability of the intersection equals the product of individual probabilities.\n- Step 2: This is fundamentally different from mutually exclusive. Mutually exclusive means \"if one happens, the other *cannot*\" — knowing one occurred gives you *maximum* information about the other. In fact, two events with positive probability **cannot be both** mutually exclusive and independent.\n\nTakeaway: Mutually exclusive = \"can't co-occur\"; Independent = \"co-occurrence is the product.\"", "source": "GLM 5.1 ②", "_id": "glm_2_27"}, {"question": "A coded-regression question (Q2g style) says \"write down the regression line of $$y$$ on $$x$$, you do not need to simplify\". What's the SHORTCUT that bypasses redoing all the $$S$$-calculations?", "answer": "- Step 1: Take the EXISTING line in original variables (e.g. $$w = -16.7 + 4.77t$$).\n- Step 2: SUBSTITUTE the inverse coding to express each original variable in terms of the coded one:\n+ $$t = x + 6$$ (from $$x = t - 6$$)\n+ $$w = 2y + 10$$ (from $$y = w/2 - 5$$)\n- Step 3: Substitute into the line: $$2y + 10 = -16.7 + 4.77(x + 6)$$. Leave it unsimplified — the question explicitly allows that.\n\nRecomputing $$S_{xy}/S_{xx}$$ from coded data wastes 5+ minutes and is what the \"you do not need to simplify\" hint is warning you against.", "source": "Opus 4.7 ②", "_id": "opus_2_11"}, {"question": "Why does Bayes' theorem need the marginal $$P(R)$$ in the denominator, and what would happen without it?", "answer": "- Step 1: $$P(C \\mid R) = P(C \\cap R) / P(R)$$ by definition of conditional probability.\n- Step 2: We can compute the numerator $$P(C \\cap R) = P(C) P(R \\mid C)$$ directly from the tree.\n- Step 3: But the denominator $$P(R)$$ requires summing over **all** ways $$R$$ can occur — that's why total probability comes in. Without it, you'd just have $$P(C \\cap R)$$, which is the *joint* probability, not the *conditional*.", "source": "Opus 4.7 ①", "_id": "opus_1_47"}, {"question": "S1 May 2023 Q6(c) — In a three-set Venn diagram, if $$A \\cap C = \\emptyset$$ (mutually exclusive), what does that force about the triple intersection $$A \\cap B \\cap C$$? (2 steps)", "answer": "- Step 1: $$A \\cap B \\cap C$$ is a **subset** of $$A \\cap C.$$ If $$A \\cap C$$ is empty, then every subset of it is also empty.\n- Step 2: Therefore $$P(A \\cap B \\cap C) = 0$$ automatically. You must state this explicitly — it's a 1-mark loss to leave the triple region blank or assume it's non-zero.\n\nTakeaway: If two sets are disjoint, the triple intersection with any third set is also zero.", "source": "GLM 5.1 ②", "_id": "glm_2_31"}, {"question": "S1 May 2023 Q5(e) — For $$X = aY + b$$, what is the variance formula, and which term drops out? (2 steps)", "answer": "- Step 1: $$\\mathrm{Var}(X) = a^2 \\mathrm{Var}(Y)$$. The additive constant $$b$$ drops out completely.\n- Step 2: The multiplicative constant $$a$$ appears squared because variance is defined in squared units; stretching the scale by $$|a|$$ multiplies deviations by $$|a|$$, and squaring those deviations introduces $$a^2$$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_30"}, {"question": "S1 May 2023 Q5(e) — What is the exact variance-scaling identity for $$\\mathrm{Var}(aY+b)$$, and what are the two most common misapplications of it? (2 steps)", "answer": "- Step 1: The identity is $$\\mathrm{Var}(aY+b) = a^2 \\mathrm{Var}(Y)$$. The additive constant $$b$$ vanishes because variance is invariant under shift, while the multiplicative constant $$a$$ is squared because variance is a quadratic measure of spread.\n- Step 2: Common misapplications are (i) using $$a$$ instead of $$a^2$$, e.g. writing $$-2\\,\\mathrm{Var}(Y)$$ or $$2\\,\\mathrm{Var}(Y)$$ when $$a=-2$$; and (ii) failing to drop the constant 15, i.e. erroneously writing $$\\mathrm{Var}(15 - 2Y) = \\mathrm{Var}(15) - 4\\mathrm{Var}(Y)$$. The correct multiplier here is $$(-2)^2 = 4$$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_24"}, {"question": "S1 May 2023 Q7 — For the lower-tail probability $$P(R < r) = 0.15$$, explain how to determine the sign of $$z$$ and find its value. (3 steps)", "answer": "- Step 1: Since 0.15 < 0.5, the value $$r$$ is below the mean, so $$z$$ is **negative**. Your sketch should show the shaded area on the left side of the curve.\n- Step 2: Convert to an upper-tail probability for the positive side: $$\\Phi(-z) = 1 - 0.15 = 0.85.$$ Look up what $$z$$-value gives $$\\Phi(z) = 0.85$$ → approximately $$z = 1.0364.$$\n- Step 3: So $$-z = 1.0364$$, meaning $$z = -1.0364.$$ Then $$\\frac{r - 520}{k} = -1.0364.$$ The sign discipline here is the single most important step.\n\nTakeaway: Lower tail < 0.5 → $$z$$ is negative. Use $$\\Phi(-z) = 1 - \\text{lower tail}$$ to find the magnitude.", "source": "GLM 5.1 ②", "_id": "glm_2_57"}, {"question": "S1 general — Why does PMCC remain the same under positive linear coding but change under negative scaling? (2 steps)", "answer": "- Step 1: Positive linear coding preserves the *direction* of the relationship. If $$t$$ and $$w$$ are positively correlated, then $$x = t - 6$$ and $$y = w/2 - 5$$ are still positively correlated — the scatter plot is just shifted and rescaled.\n- Step 2: Negative scaling (e.g., $$y = -w$$) *reverses* the direction: a positive correlation becomes negative, and vice versa. So $$r$$ changes sign. The magnitude $$|r|$$ is always preserved under any linear coding, but the sign flips if exactly one of the two scale factors is negative.\n\nTakeaway: PMCC is invariant under positive linear coding; it changes sign if one (not both) scale factor is negative.", "source": "GLM 5.1 ②", "_id": "glm_2_44"}, {"question": "What is the difference between the \"body\" table (Φ(z)) and the \"percentage-point\" table in the S1 formula booklet? (1 step)", "answer": "- Body table: gives Φ(z) = P(Z ≤ z) for positive z (area from −∞ to z).\n- Percentage-point table: gives z such that P(Z > z) = the given tail probability. For tail probability 0.005, z = 2.5758.\n\n**In Q7(c):** P(R > 3r − 800) = 0.005 is an upper tail of 0.005, so use the percentage-point table: z = 2.5758. If you mistakenly used the body table with 0.995, you'd get approximately 2.58 (close but not exact).", "source": "MiniMax ②", "_id": "minimax_2_34"}, {"question": "S1 May 2023 Q6(c) — How do you compute the \"B only\" region in a three-set Venn diagram? (2 steps)", "answer": "- Step 1: \"B only\" means in B but not in A and not in C: $$P(B \\text{ only}) = P(B) - P(A \\cap B) - P(B \\cap C) + P(A \\cap B \\cap C).$$\n- Step 2: The $$+P(A \\cap B \\cap C)$$ term is needed because when you subtract $$P(A \\cap B)$$ and $$P(B \\cap C)$$, you've subtracted the triple intersection twice. Adding it back corrects the double-counting. For Q6: $$0.18 - 0.03 - 0.09 + 0 = 0.06.$$\n\nTakeaway: \"Only\" regions require inclusion-exclusion within the set — don't forget the triple correction.", "source": "GLM 5.1 ②", "_id": "glm_2_55"}, {"question": "Can two events with positive probability be both mutually exclusive AND independent? Why or why not? (3 steps)", "answer": "- Step 1: **No.** If $$P(A) > 0$$ and $$P(B) > 0$$, they cannot be both mutually exclusive and independent.\n- Step 2: Mutually exclusive means $$P(A \\cap B) = 0$$. Independent means $$P(A \\cap B) = P(A) \\cdot P(B) > 0$$ (since both probabilities are positive). These two conditions are **contradictory**.\n- Step 3: Intuition: mutually exclusive events \"repel\" each other — if A happens, B cannot. Independence means A tells you nothing about B. If A happening makes B impossible, A certainly tells you something about B — so they're not independent.\n\nThis is the conceptual heart of Q6. Conflating these two definitions is flagged as **High severity**.", "source": "GLM 5.1 ③", "_id": "glm_3_22"}, {"question": "When solving an inverse normal problem like $$P(J > d) = 0.9192$$, why must you sketch the distribution before looking up tables, and what does the sketch reveal? (3 steps)", "answer": "- Step 1: Sketch the normal curve, mark the mean, and shade the region $$P(J > d) = 0.9192$$. Since 0.9192 > 0.5, the shaded area is more than half the curve — so $$d$$ must be **below the mean**.\n- Step 2: Convert: $$P(J \\le d) = 1 - 0.9192 = 0.0808$$. This is a lower-tail probability < 0.5, confirming $$z < 0$$.\n- Step 3: Look up $$\\Phi(z) = 0.0808$$, or equivalently $$\\Phi(-z) = 0.9192$$ giving $$-z = 1.40$$, so $$z = -1.40$$. Then $$d = 500 + (-1.40)(25) = 465$$. Without the sketch, the classic error is taking $$z = +1.40$$ and getting $$d = 535$$ — the wrong side of the mean.\n\nThis is flagged as **High severity**. The sketch is mandatory, not optional.", "source": "GLM 5.1 ③", "_id": "glm_3_27"}, {"question": "WHY does $$\\mathrm{Var}(aY + b) = a^2 \\mathrm{Var}(Y)$$ — what's the geometric intuition behind both the square and the disappearing $$b$$?", "answer": "- Step 1: Variance measures the AVERAGE SQUARED DEVIATION from the mean.\n- Step 2: The constant $$b$$ shifts the entire distribution by $$b$$ — the spread around the (new) mean is unchanged, so $$b$$ disappears.\n- Step 3: The scale $$a$$ multiplies every deviation by $$|a|$$; since variance squares deviations, it picks up $$|a|^2 = a^2$$. The square comes from the squaring inside the variance definition.\n\nThis is exactly parallel to coding-of-variance: $$\\mathrm{Var}((x-a)/b) = \\mathrm{Var}(x)/b^2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_26"}, {"question": "For the probability P(R < r) = 0.15 in part (c), why is the z-value negative, and how do you correctly look up this value in the percentage-point table? (2 steps)", "answer": "- Step 1: 0.15 is a lower-tail probability (< 0.5), so the z-value must be negative.\n- Step 2: Look up the percentage-point table: for lower-tail 0.15, we want Φ(z) = 0.85. The z-value for 0.85 is z = 1.0364, so z₁ = -1.0364. Alternatively, use the symmetry: z₁ = -z₀.₈₅.\n\n**Key principle:** Lower-tail (< 0.5) → negative z. Use the percentage-point table (or body table with 1 - p).", "source": "MiniMax ①", "_id": "minimax_1_22"}, {"question": "What's the **conceptual** difference between \"mutually exclusive\" and \"independent\", and why can two events with positive probability not be both?", "answer": "- Step 1: **Mutually exclusive**: $$P(A \\cap B) = 0$$ — the events cannot occur together.\n- Step 2: **Independent**: $$P(A \\cap B) = P(A) \\cdot P(B)$$ — knowing one occurred tells you nothing about the other.\n- Step 3: If both held with $$P(A), P(B) > 0$$, we would need $$0 = P(A) \\cdot P(B) > 0$$ — a contradiction. Intuition: mutually exclusive events are **maximally dependent** (knowing $$A$$ tells you $$B$$ did NOT happen).", "source": "Opus 4.7 ①", "_id": "opus_1_24"}, {"question": "S1 May 2023 Q5(b) — When finding $$P(1 < Y \\le 4)$$ for a discrete random variable, why must you be careful with strict vs non-strict inequalities, and which values of $$y$$ are included? (2 steps)", "answer": "- Step 1: The inequality $$1 < Y \\le 4$$ means $$Y$$ is strictly greater than 1 **and** less than or equal to 4. Therefore $$y=1$$ is excluded, while $$y=4$$ is included. The included integers are $$2, 3, 4$$.\n- Step 2: A common error is to include $$y=1$$ or exclude $$y=4$$. Summing the wrong set destroys the probability. Here the correct sum is $$P(Y=2)+P(Y=3)+P(Y=4) = \\frac{1+1+8}{30} = \\frac{1}{3}$$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_21"}, {"question": "S1 May 2023 Q4(c) — What is the total probability formula used when you need $$P(\\text{red})$$ from a tree diagram with multiple branches? (2 steps)", "answer": "- Step 1: $$P(R) = \\sum_i P(L_i)\\,P(R \\mid L_i) = P(A)P(R\\mid A) + P(B)P(R\\mid B) + P(C)P(R\\mid C).$$\n- Step 2: For Q4: $$0.30(0.02) + 0.45(0.04) + 0.25(0.06) = 0.006 + 0.018 + 0.015 = 0.039.$$ The common pitfall is forgetting the third row of the tree (the C contribution).\n\nTakeaway: Total probability = sum over all branches leading to the event.", "source": "GLM 5.1 ②", "_id": "glm_2_18"}, {"question": "Why does the PMCC satisfy $$-1 \\le r \\le 1$$, and what does each extreme mean intuitively?", "answer": "- Step 1: $$r$$ is a normalised covariance: $$r = S_{xy}/\\sqrt{S_{xx} S_{yy}}$$. The Cauchy-Schwarz inequality gives $$|S_{xy}|^2 \\le S_{xx} S_{yy}$$, so $$|r| \\le 1$$.\n- Step 2: $$r = +1$$: data lie EXACTLY on a line with positive slope. $$r = -1$$: exactly on a line with negative slope.\n- Step 3: $$r = 0$$: no linear relationship (data could still be related non-linearly, e.g. parabola).", "source": "Opus 4.7 ①", "_id": "opus_1_43"}, {"question": "In a histogram question where one class frequency is given explicitly (e.g. \"60 people lie in [10, 20)\"), what is the very first calculation you must perform before reading any other bar? (2 steps)", "answer": "- Step 1: Compute the frequency density of that named class: $$\\text{FD}_{\\text{named}} = \\frac{f_{\\text{named}}}{w_{\\text{named}}}$$, e.g. $$\\text{FD}_{[10,20)} = \\frac{60}{10} = 6$$. This is your **calibration point** — it sets the vertical scale of the entire histogram.\n- Step 2: Use this FD value to read off the FD of every other bar by comparing heights. Never read FD values directly off the y-axis without this calibration, because the axis scale may be unclear or misleading in the exam diagram.\n\nThe mantra from Mr. Fuat: *\"Calibrate first, then never read FD off the axis again — read off your scale.\"*", "source": "GLM 5.1 ③", "_id": "glm_3_0"}, {"question": "S1 May 2023 Q7(a)(ii) — $$P(J > d) = 0.9192$$. Why does this guarantee $$d$$ lies below the mean, and what sign does $$z$$ therefore carry? (2 steps)", "answer": "- Step 1: An upper-tail probability greater than 0.5 means the shaded right-hand region is more than half the distribution.\n- Step 2: This only happens when the cut-off $$d$$ is to the left of the centre $$\\mu$$. Therefore $$d < \\mu$$, and $$z = (d-\\mu)/\\sigma$$ is negative.", "source": "Kimi K2.6 ②", "_id": "kimi_2_44"}, {"question": "What does the formula $$E(aY + b) = aE(Y) + b$$ tell you about the effect of the constant $$b$$ on the expectation, and how does this differ from its effect on variance? (2 steps)", "answer": "- Step 1: For expectation, the constant $$b$$ **shifts** the mean: $$E(aY + b) = aE(Y) + b$$. Adding 15 to every value adds 15 to the expected value. This makes intuitive sense — the center of the distribution moves by exactly $$b$$.\n- Step 2: For variance, the constant $$b$$ **disappears**: $$\\text{Var}(aY + b) = a^2\\text{Var}(Y)$$. Shifting doesn't change spread. So $$E(15 - 2Y) = 15 - 2E(Y)$$ (the 15 matters for the mean) but $$\\text{Var}(15 - 2Y) = 4\\text{Var}(Y)$$ (the 15 is irrelevant for the spread).", "source": "GLM 5.1 ③", "_id": "glm_3_44"}, {"question": "In the context of Q7(b), what does \"5 independent bags\" require you to state explicitly on your script before computing, and why? (2 steps)", "answer": "- Step 1: State that the bags are **independent** — this justifies multiplying the individual probabilities. Write: \"Since the bags are independent, $$P(\\text{all 5} < 510) = [P(J < 510)]^5$$.\"\n- Step 2: Without stating independence, the step $$0.6554^5$$ has no justification. If the bags were dependent (e.g., from the same batch), you couldn't simply multiply. The examiner awards a method mark for recognizing and stating the independence assumption, even if the arithmetic that follows has a minor slip.", "source": "GLM 5.1 ③", "_id": "glm_3_64"}, {"question": "What is the difference between mutually exclusive events and independent events? Can two events with positive probability be both? (3 steps)", "answer": "- Step 1: **Mutually exclusive** means $$P(A \\cap B) = 0$$ — the events cannot occur together.\n- Step 2: **Independent** means $$P(A \\cap B) = P(A)P(B)$$ — knowing one occurred tells you nothing about the other.\n- Step 3: If both hold and both events have positive probability: $$P(A)P(B) = P(A \\cap B) = 0$$, but $$P(A)P(B) > 0$$ — contradiction. So **events with positive probability cannot be both mutually exclusive and independent**.\n\nThis is a high-frequency exam trap: students set $$P(B \\cap C) = 0$$ because a prior part involved mutual exclusivity, when part (c) actually specifies independence.", "source": "GLM 5.1 ①", "_id": "glm_1_30"}, {"question": "S1 May 2023 Q7(a)(i) — To show that $$P(J > 510) = 0.3446$$, what exact value must you quote from the standard normal table, and why does quoting a rounded value weaken the proof? (2 steps)", "answer": "- Step 1: Quote the body table value to 4 decimal places: $$\\Phi(0.4) = 0.6554$$. Then $$1 - 0.6554 = 0.3446$$.\n- Step 2: Quoting a rounded value such as $$0.655$$ leads to $$0.345$$, which does not match the printed result exactly and undermines the “show that” requirement.", "source": "Kimi K2.6 ②", "_id": "kimi_2_58"}, {"question": "S1 general — What is the inclusion-exclusion formula for three sets, and when do you use it? (2 steps)", "answer": "- Step 1: $$P(A \\cup B \\cup C) = P(A) + P(B) + P(C) - P(A \\cap B) - P(A \\cap C) - P(B \\cap C) + P(A \\cap B \\cap C).$$\n- Step 2: Use it when you need the probability of \"at least one of A, B, C\" and you know the individual and pairwise probabilities. The pattern: add singles, subtract pairs, add the triple. For Venn diagram verification, the total of all 8 regions should equal $$P(A \\cup B \\cup C)$$ plus the outside region.\n\nTakeaway: Add singles, subtract pairs, add triple — the inclusion-exclusion pattern.", "source": "GLM 5.1 ②", "_id": "glm_2_61"}, {"question": "S1 May 2023 Q6(c) — A common error in Q6(c) is setting $$P(B \\cap C) = 0$$ instead of using independence. Why does this happen, and how do you avoid it? (2 steps)", "answer": "- Step 1: The error occurs because part (a) established that $$A$$ and $$C$$ are mutually exclusive ($$P(A \\cap C) = 0$$), and students carry this \"zero intersection\" habit to the $$B \\cap C$$ region in part (c). But part (c) explicitly states $$B$$ and $$C$$ are **independent**, not mutually exclusive.\n- Step 2: To avoid: at the start of each part, re-read the condition. Write \"B and C independent → $$P(B \\cap C) = P(B)P(C) = 0.18 \\times 0.5 = 0.09$$\" on your script before filling the diagram.\n\nTakeaway: Each part may introduce a new condition — don't carry assumptions from previous parts.", "source": "GLM 5.1 ②", "_id": "glm_2_33"}, {"question": "S1 May 2023 Q3(d) — in an outlier check, why must you compute **both** the lower and upper fence even if the data \"look fine on one side\"?", "answer": "- Step 1: The outlier definition is symmetric: a value is an outlier if it is **above** $$Q_3 + 1.5 \\cdot \\mathrm{IQR}$$ **or below** $$Q_1 - 1.5 \\cdot \\mathrm{IQR}$$. You cannot fulfil the \"show that there are no outliers\" requirement without addressing both directions.\n- Step 2: Mark scheme: examiners explicitly award marks for **both** fence computations and **both** comparisons (min vs lower fence, max vs upper fence). A one-sided check loses at least one mark even if no outliers exist.\n- Step 3: Intuition pitfall: students see \"the max isn't too big\" and skip the lower check, or vice versa. The fences depend only on $$Q_1, Q_3, \\mathrm{IQR}$$, not on whether the data look skewed — there is no shortcut.\n\nTakeaway: outlier check is always a 4-step ritual: compute IQR → lower fence → upper fence → compare min and max.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_13"}, {"question": "S1 May 2023 Q1(a) — why is the approach \"compute $$70 + 100 + 30 = 200$$ for $$[20, 50)$$ then subtract a guess for $$[20, 22)$$\" a 2-mark loss, and what concept does it conflate?", "answer": "- Step 1: This approach conflates *full bars* with *partial bars*. The question asks for $$[22, 45)$$, which slices through TWO bars (the $$[20,30)$$ bar at $$x=22$$ and the $$[40, 50)$$ bar at $$x = 45$$) and contains one full bar ($$[30, 40)$$).\n- Step 2: Treating $$[20, 30)$$ and $$[40, 50)$$ as full bars and then \"subtracting a guess\" replaces a precise frequency-density × slice-width calculation with eyeballing, which is uncontrolled.\n- Step 3: The correct method is to pro-rate each partial bar using $$f = \\text{FD} \\times w_{\\text{slice}}$$:\n+ $$[22, 30)$$: width 8, FD 7 → $$56$$\n+ $$[30, 40)$$: full bar → $$100$$\n+ $$[40, 45)$$: width 5, FD 3 → $$15$$\n+ Total $$= 171$$, not 200-minus-something.\n\nTakeaway: every partial-bar slice must be computed as $$\\text{FD} \\times \\text{slice width}$$ — never approximated by \"full bar minus a guess\".", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_1"}, {"question": "S1 May 2023 Q3(a) — Under the coding $$x = l - a$$ (where $$a$$ is a positive constant), what is the reverse-coding rule for the MEAN, and why is this different from the rule for the variance? (3 steps)", "answer": "- Step 1: The reverse-coding rule for the mean is $$\\bar{l} = \\bar{x} + a$$. Since $$x = l - a$$, we have $$l = x + a$$, so taking expectations: $$E(l) = E(x) + a$$, i.e. $$\\bar{l} = \\bar{x} + a$$. The shift constant **adds back** to the coded mean.\n- Step 2: For the variance, the rule is $$\\text{Var}(l) = \\text{Var}(x)$$. The shift constant does **nothing** to the variance. This is because $$\\text{Var}(X + c) = \\text{Var}(X)$$ for any constant $$c$$ — adding a constant shifts all values equally, so their spread doesn't change.\n- Step 3: The reason they differ: the mean measures *location* (where the centre is), so a shift changes it. The variance measures *spread* (how far values are from each other), so a uniform shift leaves it unchanged. Students who write $$\\text{Var}(l) = \\text{Var}(x) + 600$$ are conflating the two — they're applying the mean rule to the variance.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_11"}, {"question": "S1 May 2023 — According to the V3 weakness analysis, what is the single drill that converts Q5(e) from a 4-minute risk into a 90-second computation, and what is the formula at its core? (2 steps)", "answer": "- Step 1: The drill is mastering **$$\\text{Var}(aY + b) = a^2\\,\\text{Var}(Y)$$** in isolation. The formula at its core states: when you linearly transform a random variable, the constant $$b$$ disappears (shifts don't affect spread), and the scaling factor $$a$$ is *squared* (because variance involves squared deviations). The sign of $$a$$ is irrelevant — $$(-2)^2 = 4$$, same as $$2^2$$.\n- Step 2: Why this converts Q5(e) from risk to routine: the \"4-minute risk\" comes from students who try to compute $$\\text{Var}(X)$$ from scratch via $$E(X^2) - [E(X)]^2$$ using the transformed variable, requiring a full new table of $$X$$-values and probabilities. The \"90-second computation\" recognises that $$X = 15 - 2Y$$ is a linear transformation, so $$\\text{Var}(X) = (-2)^2\\,\\text{Var}(Y) = 4\\,\\text{Var}(Y)$$ — you only need $$\\text{Var}(Y)$$, which was already computed in the working for earlier parts.\n\nThe leverage point: if you've already found $$\\text{Var}(Y)$$, then $$\\text{Var}(15 - 2Y) = 4\\,\\text{Var}(Y)$$ is one multiplication. No new table, no new $$E(X^2)$$ computation.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_25"}, {"question": "What sign error in the $$S_{xy}$$ formula instantly invalidates all subsequent regression and PMCC calculations, and what is the conceptual origin of the correct sign? (1 step)", "answer": "Writing a plus sign instead of minus between $$\\sum xy$$ and $$(\\sum x)(\\sum y)/n$$. The correct minus sign arises because $$S_{xy}$$ computes the sum of products of deviations from the means; the term $$(\\sum x)(\\sum y)/n$$ is exactly the correction factor that converts the raw sum of products into the mean-centered version. Without subtracting it, you have not removed the baseline.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_13"}, {"question": "In a three-set Venn diagram, what verification line should you write at the bottom of your working, and why does writing it earn examiner credit? (1 step)", "answer": "Write the sum check: \"0.07 + 0.06 + 0.41 + 0.03 + 0 + 0.09 + 0 + 0.34 = 1.00\" (or whatever your eight region values are). This demonstrates that you understand all eight mutually exclusive regions must sum to 1, and it verifies your arithmetic. Examiners credit this verification step because it shows conceptual understanding of the complete probability space and catches arithmetic errors before submission.", "source": "GAP-MiniMax ①", "_id": "minimax_1_18"}, {"question": "If your computed \"B only\" region in a three-set Venn diagram comes out NEGATIVE, what does this immediately tell you and what is the diagnostic procedure?", "answer": "- Step 1: A negative region is impossible — probabilities are $$\\ge 0$$. So a negative result is an unambiguous red flag of an arithmetic slip upstream.\n- Step 2: STOP. Do not continue filling the diagram. Diagnostic procedure:\n+ Re-check the formula: $$P(B \\text{ only}) = P(B) - P(A \\cap B) - P(B \\cap C) + P(A \\cap B \\cap C)$$.\n+ Recompute each pairwise intersection from the given conditions (mutually exclusive → 0; independent → product).\n+ Verify the triple is correct (often 0 if any pair is mutually exclusive).\n+ Re-check $$P(B)$$ itself — was it given, or derived from inclusion–exclusion? Slip might be there.\n- Step 3: Don't \"rescue\" by setting the negative to zero — that masks the real error and propagates wrongness into the sum check.\n\nTakeaway: negative \"only\" region = STOP. Diagnose the upstream slip; don't patch the symptom.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_20"}, {"question": "S1 May 2023 Q1(a) — For the histogram slice [22, 30), what is the correct width to use when computing its frequency, and why is the common student answer \"7\" wrong? (2 steps)", "answer": "- Step 1: The correct width is **8**. The class boundary [22, 30) is a half-open interval: it includes 22 but excludes 30, so the width is $$30 - 22 = 8$$. This is how continuous grouped data works — you always subtract the lower boundary from the upper boundary.\n- Step 2: The \"7\" error comes from mistakenly counting *integer values* (22, 23, 24, 25, 26, 27, 28, 29 = 8 values but students miscount as 7, or they compute $$30 - 22 - 1 = 7$$ as if the data were discrete). This conflation of continuous boundaries with discrete counting is the trap — histogram classes are **continuous**, so you never subtract 1. The formula $$f = \\text{FD} \\times w$$ demands the continuous width $$w = 8$$, not a discrete count.\n\nKey distinction: discrete data → \"number of integers\" might need $$+1$$; continuous grouped data → width is always upper minus lower boundary, no adjustment.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_0"}, {"question": "S1 May 2023 Q7(c) — What are the FOUR percentage-point $$z$$-values you must memorise (with their corresponding tail probabilities), and which one appears in Q7(c)? (2 steps)", "answer": "- Step 1: The four values are:\n  + $$z_{0.05} = 1.6449$$ (5% in the upper tail)\n  + $$z_{0.025} = 1.9600$$ (2.5% in the upper tail)\n  + $$z_{0.01} = 2.3263$$ (1% in the upper tail)\n  + $$z_{0.005} = 2.5758$$ (0.5% in the upper tail)\n- Step 2: In Q7(c), the condition $$P(R > 3r - 800) = 0.005$$ is a 0.5% upper tail, so you need **$$z_{0.005} = 2.5758$$**. Students who try to look up $$\\Phi(z) = 0.995$$ in the body table get only $$z \\approx 2.58$$ (a rounded value), which introduces error into the simultaneous equations. Memorising 2.5758 gives you the exact percentage-point value the exam expects.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_22"}, {"question": "According to the V3 weakness analysis, what is the single drill that, if mastered, converts Q5(e) from a 4-minute risk into a 90-second computation, and what is the formula at its core?", "answer": "- The drill: Master Var(aY + b) = a² Var(Y) in isolation — practice 5+ examples of variance transformation until it becomes automatic.\n- The core formula: $$\\mathrm{Var}(aY + b) = a^2 \\mathrm{Var}(Y)$$\n- Why it converts 4 minutes to 90 seconds. In Q5(e), you need to compute Var(X) where X = 15 − 2Y. The complete solution requires:\n  1. E(Y) = 13/3 (from part c)\n  2. E(Y²) = 302/15 (the long calculation with 25 × 17 = 425)\n  3. Var(Y) = E(Y²) − [E(Y)]² = 61/45\n  4. Apply the transformation: Var(X) = (−2)² × (61/45) = 4 × (61/45) = 244/45\n- Without automatic mastery of step 4, students fumble: they forget to square the −2, or add the constant 15, or both. The drill internalises a²Var(Y) so deeply that step 4 becomes instant. Combined with knowing E(Y²) is correct, the whole part (e) drops from a risky multi-minute ordeal to a quick final calculation.", "source": "GAP-MiniMax ②", "_id": "minimax_2_25"}, {"question": "S1 May 2023 Q6(c) — If your computed \"B only\" region in a three-set Venn comes out NEGATIVE, what does this tell you and what is the diagnostic procedure? (2 steps)", "answer": "- Step 1: A negative probability is **impossible** — it tells you there is an arithmetic slip somewhere in your region-filling. The most likely cause: you subtracted too much. For example, computing \"B only\" as $$P(B) - P(A \\cap B) - P(B \\cap C)$$ without adding back $$P(A \\cap B \\cap C)$$, or using wrong values for the pairwise intersections.\n- Step 2: The diagnostic procedure is to **STOP and recheck every input**. Verify: (1) are the marginal probabilities correct? (2) Are the pairwise intersections correct (using the right condition — independence vs mutual exclusivity)? (3) Did you add back the triple intersection? (4) Does the triple intersection have the right value (it's 0 when A and C are mutually exclusive)? A negative region is a gift — it's an unmissable alarm that prevents you from submitting a silently wrong answer.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_20"}, {"question": "S1 — what are the **four** percentage-point $$z$$-values you must memorise (and their tail probabilities), and which appears in Q7(c)?", "answer": "- Step 1: Memorise:\n+ $$z_{0.05} = 1.6449$$ (one-sided 5%)\n+ $$z_{0.025} = 1.9600$$ (two-sided 5%, or one-sided 2.5%)\n+ $$z_{0.01} = 2.3263$$ (one-sided 1%)\n+ $$z_{0.005} = 2.5758$$ (two-sided 1%, or one-sided 0.5%)\n- Step 2: Q7(c) uses $$z_{0.005} = 2.5758$$ for the condition $$P(R > 3r - 800) = 0.005$$.\n- Step 3: Why memorise rather than look up: the percentage-point table is a separate table from the $$\\Phi(z)$$ body table. Students often look up $$0.995$$ in the body table and get $$z \\approx 2.58$$, losing precision in the \"show that\"/\"find $$k$$\" final answer.\n\nTakeaway: those four values are exam-day staples — memorise to the 4 d.p. shown.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_22"}, {"question": "What is the per-mark time budget for this paper, what is the rough time allocation per question, and how long do you reserve for checking?", "answer": "- Per-mark budget: 75 marks in 90 minutes = 1.2 minutes per mark (72 seconds per mark).\n- Rough time allocation:\n  - Q1 (8 marks): ~10 minutes\n  - Q2 (13 marks): ~15 minutes\n  - Q3 (9 marks): ~11 minutes\n  - Q4 (9 marks): ~11 minutes\n  - Q5 (13 marks): ~15 minutes\n  - Q6 (9 marks): ~11 minutes\n  - Q7 (14 marks): ~17 minutes\n- Checking time: Reserve 5 minutes at the end for review.\n- The logic. The 1.2 min/mark budget ensures you don't get stuck on any single question. The rough allocation mirrors question difficulty: spend more time on Q2, Q5, Q7 (the harder questions), less on Q1, Q4 (the more straightforward questions). The 5-minute buffer is for catching arithmetic slips before submission.", "source": "GAP-MiniMax ②", "_id": "minimax_2_23"}, {"question": "S1 May 2023 Q4(d) — for the final Bayes answer, why is presenting $$5/13$$ strategically safer than presenting $$0.385$$?", "answer": "- Step 1: The exact answer is $$\\frac{0.25 \\times 0.06}{0.039} = \\frac{0.015}{0.039} = \\frac{15}{39} = \\frac{5}{13}$$. The fraction is exact; $$0.385$$ is a rounded decimal.\n- Step 2: If you compute $$0.385$$ with a rounding slip (e.g. $$0.384$$ or $$0.39$$), you risk the accuracy mark. The fraction $$5/13$$ is unambiguous and **proves** no rounding happened.\n- Step 3: Examiners accept either form; presenting both (the clean fraction with the decimal as a check) is bulletproof. Generally, prefer the exact fraction when the arithmetic produces one cleanly.\n\nTakeaway: exact fractions > rounded decimals for proving accuracy in Bayes problems.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_15"}, {"question": "For 'why inappropriate to predict w at t=2 cm', what specific numerical computation makes the argument physically decisive (and what is the value)?", "answer": "- Step 1: The argument framework. You must state that t = 2 cm is outside the data range (extrapolation) AND provide a numerical check.\n- Step 2: Compute the predicted value. Substitute t = 2 into the regression equation:\n  $$w = -16.7 + 4.77(2) = -16.7 + 9.54 = -7.16$$\n- Step 3: Why this is decisive. The predicted weight is -7.16 grams — a physically impossible value. Weight cannot be negative. This numeric absurdity proves the model breaks down outside the data range.\n- The takeaway. The two-part argument (extrapolation + impossible prediction) is far stronger than either part alone. Most students say \"outside the data range\" but forget to compute the actual prediction value — doing so transforms a weak argument into an undeniable one.", "source": "GAP-MiniMax ②", "_id": "minimax_2_9"}, {"question": "S1 May 2023 Q3(a) — Under the coding $$x = l - a$$, what is the reverse-coding rule for the MEAN, and why is this different from the rule for the variance? (3 steps)", "answer": "- Step 1: The reverse-coding rule for the mean: if $$x = l - a$$, then $$\\bar{l} = \\bar{x} + a$$. The shift constant $$a$$ *adds back* to the coded mean. Intuitively, if every data point was reduced by $$a$$, the average was also reduced by $$a$$ — so to recover the original mean, add $$a$$ back.\n- Step 2: For the variance, the rule is: $$\\text{Var}(l) = \\text{Var}(x)$$. The shift constant has *no effect* on variance. Intuitively, variance measures spread — shifting the entire dataset left or right doesn't change how spread out the values are, only their location.\n- Step 3: The reason for the difference: the mean depends on *location* (where the data sit), so a location shift changes it. The variance depends on *spread* (how far data are from their mean), and shifting all data by the same amount leaves all deviations from the mean unchanged. Algebraically: $$\\text{Var}(X + a) = E[(X+a - \\bar{X}-a)^2] = E[(X - \\bar{X})^2] = \\text{Var}(X)$$.\n\nMean shifts with the data; variance doesn't. This is the single most tested coding distinction in S1.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_10"}, {"question": "State the general inclusion-exclusion formula for \"A only\" in a three-set Venn, and explain why the triple intersection enters with a PLUS sign. (Q6-1)", "answer": "- Step 1: Formula: **P(A only) = P(A) - P(A∩B) - P(A∩C) + P(A∩B∩C)**.  \n- Step 2: Subtracting P(A∩B) and P(A∩C) removes the overlap with B and C, but subtracts the triple intersection twice.  \n+ Example: P(A∩B) and P(A∩C) both include P(A∩B∩C), so adding it back once restores accuracy.  \n- Step 3: The triple intersection is added to correct for double subtraction.  \n\n**Takeaway:** The triple intersection is added to avoid over-subtraction.", "source": "GAP-Qwen 3 ③", "_id": "qwen_3_18"}, {"question": "S1 May 2023 Q3(d) — In an outlier check using the fence rule, why must you compute BOTH the lower fence AND the upper fence even if the data \"look fine on one side\"? (2 steps)", "answer": "- Step 1: The outlier definition is symmetric: a value is an outlier if it is **either** below $$Q_1 - 1.5 \\times \\text{IQR}$$ **or** above $$Q_3 + 1.5 \\times \\text{IQR}$$. You must check both conditions because a dataset can be skewed — the max might be well within the upper fence while the min is far below the lower fence, or vice versa.\n- Step 2: In Q3(d), both fences need explicit comparison: lower fence = $$3000 - 3750 = -750$$, compared to min = 2000 (not an outlier); upper fence = $$5500 + 3750 = 9250$$, compared to max = 7700 (not an outlier). If you only check one fence, you've only answered half the question. Examiners expect to see both comparisons written on the script — each earns a method mark.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_13"}, {"question": "What is Mr. Fuat's universal rule for histogram questions, and what specific habit ('calibrate first, never read X off Y') does it cash out as? (1 step)", "answer": "The universal rule is: \"Calibrate first, then never read FD off the axis again — read off your scale.\" This cashes out as: identify a class where you know both the frequency and width (the \"named class\"), compute its FD = f/w, then use this calibrated FD value to read frequencies from all other bars. Never look at the y-axis and think \"that bar looks like height 7\" — always verify against your calibrated scale. This prevents the error of misreading the axis or using the wrong scale altogether.", "source": "GAP-MiniMax ①", "_id": "minimax_1_26"}, {"question": "S1 May 2023 Q2(e) — For \"why is it inappropriate to predict $$w$$ at $$t = 2$$ cm?\", what specific numerical computation makes the extrapolation argument physically decisive, and what is the value? (2 steps)", "answer": "- Step 1: Compute the predicted weight: $$w = -16.7 + 4.77(2) = -16.7 + 9.54 = -7.16$$ grams. This is a **negative weight**, which is physically impossible.\n- Step 2: This computation is decisive because it moves the argument from vague (\"2 cm is outside the data range\") to concrete and irrefutable (\"the model predicts a negative weight, which cannot exist\"). The examiner awards both marks for this: one for identifying extrapolation, one for demonstrating the model breaks down. Simply saying \"outside the range\" without the numerical evidence may lose the second mark.\n\nAlways compute the impossible prediction. It turns a soft claim into a hard proof.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_10"}, {"question": "S1 May 2023 Q2(g) — For the coding $$x = t - 6$$ and $$y = \\frac{w}{2} - 5$$, what are the inverse substitutions that convert the original regression line $$w = -16.7 + 4.77t$$ into a y-on-x regression line? (2 steps)", "answer": "- Step 1: Invert each coding equation to express the *original* variables in terms of the *coded* variables:\n  + $$x = t - 6 \\implies t = x + 6$$\n  + $$y = \\frac{w}{2} - 5 \\implies y + 5 = \\frac{w}{2} \\implies w = 2(y + 5) = 2y + 10$$\n- Step 2: Substitute these into the original line $$w = -16.7 + 4.77t$$:\n  $$2y + 10 = -16.7 + 4.77(x + 6)$$\n  This is the regression line of y on x. Since the question says \"you do not need to simplify,\" you stop here.\n\nThe key insight: you always invert the coding to get original = f(coded), then substitute into the *original* regression equation. Never try to build a new regression from scratch.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_9"}, {"question": "S1 May 2023 — Name the three habits (in order) that this paper rewards according to the V3 Pattern Summary, and assign each habit to its diagnostic question(s). (3 steps)", "answer": "- Step 1: **Calibration before reading** — compute the frequency density for the named class *before* reading any other bar off the histogram. Diagnostic questions: Q1 (histogram calibration), Q3 (box-plot reading).\n- Step 2: **Algebraic discipline before numerical substitution** — write the formula or equation before plugging in any numbers. Diagnostic questions: Q5 (write $$\\text{Var}(15-2Y) = 4\\text{Var}(Y)$$ before computing), Q7c (write both $$z$$-equations, rearrange to $$r = \\ldots k$$, then equate — algebraic form before any arithmetic).\n- Step 3: **Conceptual precision about probability vocabulary** — mutually exclusive ≠ independent; $$P(C \\mid R) \\neq P(R \\mid C)$$. Diagnostic questions: Q4 (Bayes direction), Q6 (mutually exclusive vs independent distinction).\n\nThese three habits are the paper's discriminators: students who have them finish the hard questions accurately; students who don't lose marks on preventable conceptual and procedural errors.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_25"}, {"question": "What is Mr. Fuat's universal rule for histogram questions, and what specific habit does it cash out as in practice?", "answer": "- Step 1: The rule: **\"Calibrate first, then never read FD off the axis again — read off your scale.\"**\n- Step 2: In practice, this cashes out as a specific procedural habit:\n+ Identify the named class (the one with a given frequency, e.g. \"60 people travel between 10 and 20 km\").\n+ Compute the FD for *that* class using $$\\text{FD} = f / w$$ (here, $$60 / 10 = 6$$).\n+ Use this FD as the calibration anchor — relative to the bar's visible height — to scale every other bar.\n+ Never read FD directly off the y-axis again, because the printed y-axis labels are often missing, mislabelled, or ambiguous.\n- Step 3: Why this works: the y-axis on exam histograms is frequently sparsely labelled or has a non-obvious unit. The named class gives you a *known* anchor; everything else is then a ratio of bar heights, which is visually robust.\n\nTakeaway: calibrate against the named class FIRST; everything else is a height ratio against your anchor — the y-axis label is untrustworthy.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_27"}, {"question": "S1 May 2023 Q1 — what is the single \"workhorse identity\" that bridges histogram bar heights to actual counts, and why does every part of a histogram question rely on it?", "answer": "- Step 1: The identity is $$f = \\text{FD} \\times w$$, where $$f$$ is frequency, $$\\text{FD}$$ is frequency density (the bar's height), and $$w$$ is the bar's width.\n- Step 2: It is the linchpin because **every histogram subquestion** reduces to it: part (a) needs frequencies for sub-bar slices, part (b) needs frequencies to build the cumulative column for median interpolation, part (c) needs frequencies to weight midpoints in $$\\bar{x} = \\sum f x_{\\text{mid}} / \\sum f$$.\n- Step 3: Without this identity you cannot move from \"bar of height 7 over width 10\" to \"70 people\" — the histogram becomes unreadable. **Calibrate FD from the named class first** ($$60/10 = 6$$ in this paper), then apply $$f = \\text{FD} \\times w$$ to every other rectangle.\n\nTakeaway: histogram = areas = frequencies. The y-axis is just height; areas carry the data.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_4"}, {"question": "S1 May 2023 Q6(c) — state the inclusion–exclusion formula for \"A only\" in a three-set Venn, and explain why the triple intersection enters with a **plus** sign.", "answer": "- Step 1: $$P(A\\text{ only}) = P(A) - P(A \\cap B) - P(A \\cap C) + P(A \\cap B \\cap C)$$.\n- Step 2: Without the triple correction, you would subtract the triple region twice: once via $$P(A \\cap B)$$ (which includes the triple) and again via $$P(A \\cap C)$$ (also includes the triple). You've now removed it from \"A only\" twice, but it should have been removed only once (it's in A, but not \"A only\").\n- Step 3: Add it back once: that's the $$+\\,P(A \\cap B \\cap C)$$ term. This is the same logic as $$|A \\cup B \\cup C|$$ = singles – pairs + triple.\n\nTakeaway: every \"only\" region needs a + triple correction to undo double-subtraction.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_18"}, {"question": "After computing Var(X) for a discrete-RV transformation, what one-word sanity check do you perform — and why does this catch the most damaging single error?", "answer": "- The one-word check: POSITIVE\n- What to verify. Variance must always be ≥ 0. Write \"Var > 0 ✓\" or simply circle the final value and confirm it's positive.\n- Why this catches the most damaging error. The most common error in Var(aY + b) is forgetting to square the coefficient a:\n  - Wrong: Var(15 − 2Y) = −2 Var(Y) or 2 Var(Y)\n  - Right: Var(15 − 2Y) = (−2)² Var(Y) = 4 Var(Y)\n  If you forget the square, you get a negative variance (since Var(Y) is positive but you might have a negative sign). A negative variance is mathematically impossible, and checking \"positive\" immediately flags this error.\n- The point. This 3-second check catches the single most consequential error in transformation problems before you submit your answer. A negative variance is an automatic signal to recheck your a² multiplication.", "source": "GAP-MiniMax ②", "_id": "minimax_2_16"}, {"question": "S1 May 2023 Q1(a)–(c) all rely on one workhorse identity that converts histogram geometry into frequency. State this identity and explain why it is the linchpin of calibration, partial bars, and the mean. (2 steps)", "answer": "- Step 1: The identity is $$f = \\text{FD} \\times w$$ (frequency equals frequency density multiplied by class width). This is the bridge between the vertical axis (FD) and the actual count of people.\n- Step 2: It is the linchpin because: (a) calibration uses a named class of known $$f$$ and $$w$$ to find the FD scale; (b) partial-bar questions use it with a sub-width to find a slice frequency; (c) the mean requires frequencies, which are generated by this formula from each bar’s area. Without this identity, no histogram calculation is possible.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_8"}, {"question": "What is Mr. Fuat's universal rule for histogram questions, and what specific habit ('calibrate first, never read X off Y') does it cash out as?", "answer": "- The universal rule: \"Calibrate first, then never read FD off the axis again — read off your scale.\"\n- The specific habit it cashes out as: Compute the frequency density (FD) for the NAMED CLASS first (the class whose frequency is given in the question), use that to determine the FD scale, and then use that scale to read all subsequent bars. NEVER try to read FD values directly off the y-axis without this calibration step.\n- In Q1: The question tells you 60 people travel between 10 km and 20 km. The class [10,20) has width 10, so FD = 60/10 = 6. This tells you the height scale: when the bar reaches height 6, it represents 60 people. Now you can read other bars against this scale (e.g., height 7 → frequency 70, height 10 → frequency 100).\n- Why this prevents errors. Without calibration, students read the y-axis as if it directly showed frequencies — but histograms are density plots. The y-axis shows FD, not frequency. The calibration step converts the visual height into a frequency scale, and then you're reading frequencies correctly.\n\nThis rule is the single most important procedural habit for all histogram questions in S1.", "source": "GAP-MiniMax ②", "_id": "minimax_2_26"}, {"question": "State the inclusion–exclusion formula for the “A only” region in a three-set Venn diagram, and explain why the triple intersection enters with a plus sign. (3 steps)", "answer": "- Step 1: $$P(A \\text{ only}) = P(A) - P(A\\cap B) - P(A\\cap C) + P(A\\cap B\\cap C)$$.\n- Step 2: When you subtract $$P(A\\cap B)$$ and $$P(A\\cap C)$$, you remove the triple intersection twice, even though it is part of $$P(A)$$ only once.\n- Step 3: Adding back $$P(A\\cap B\\cap C)$$ corrects this double-subtraction, restoring the triple region to zero net removal so that only the exclusive part of $$A$$ remains.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_17"}, {"question": "S1 May 2023 Q2(a) — What is the most frequent sign error in writing the $$S_{tw}$$ computational formula, and why is the correct sign \"subtract\"? (2 steps)", "answer": "- Step 1: The most frequent error is writing $$S_{tw} = \\sum tw + \\frac{\\sum t \\sum w}{n}$$ with a **plus** sign instead of the correct **minus**. The correct formula is $$S_{tw} = \\sum tw - \\frac{\\sum t \\sum w}{n}$$.\n- Step 2: The minus sign arises because $$S_{tw}$$ measures *covariance* — how much $$t$$ and $$w$$ co-vary around their respective means. The term $$\\frac{\\sum t \\sum w}{n} = n\\bar{t}\\bar{w}$$ is the product of the means scaled by $$n$$. Subtracting it removes the \"baseline\" product, leaving only the deviation-from-means component. If you added it, you'd be *amplifying* the baseline rather than removing it, and the result would not satisfy the fundamental property that $$S_{tw} = 0$$ when $$t$$ and $$w$$ are uncorrelated.\n\nMemory aid: all $$S_{xy}$$, $$S_{xx}$$, $$S_{yy}$$ formulas use **minus**. There is no plus in any of them.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_6"}, {"question": "What persistent error does drilling $$\\text{Var}(aY+b) = a^2\\text{Var}(Y)$$ prevent, and why does the constant $$b$$ never appear in the variance result? (2 steps)", "answer": "- Step 1: It prevents writing a multiplier of $$a$$ or $$-a$$ instead of $$a^2$$, which is the most common variance-scaling error in discrete RV transformations.\n- Step 2: The constant $$b$$ (here, 15) never appears because adding a constant shifts every data point equally but does not change any spread, deviation, or squared deviation. Variance depends only on relative distances, not absolute location.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_53"}, {"question": "S1 May 2023 Q2(c) — for \"regression line of $$w$$ on $$t$$\", which $$S$$ goes in the **denominator** of the gradient $$b = S_{??}/S_{??}$$, and how do you read this off the phrasing instantly?", "answer": "- Step 1: For \"$$w$$ on $$t$$\", the response is $$w$$ and the **explanatory** (independent) variable is $$t$$. The denominator of $$b$$ is always $$S$$-of-the-explanatory-variable squared, so $$b = S_{tw}/S_{tt}$$.\n- Step 2: Phrasing shortcut: **\"$$Y$$ on $$X$$\"** → $$Y$$ is dependent, $$X$$ is explanatory → $$b = S_{XY}/S_{XX}$$. The second-named variable is the denominator's squared subscript.\n- Step 3: If you used $$S_{ww}$$ instead, you would be computing the line of $$t$$ on $$w$$ — a totally different line (different gradient, different intercept), and the printed \"show that\" coefficient $$4.77$$ would not match.\n\nTakeaway: denominator subscript = explanatory variable (the second name in \"Y on X\").", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_5"}, {"question": "S1 May 2023 Q1 — What is the workhorse identity that converts every histogram bar (or sub-bar slice) to a frequency, and why is it the linchpin of ALL parts (a)–(c)?", "answer": "The identity is $$f = \\text{FD} \\times w$$, where FD is the frequency density (height of the bar) and $$w$$ is the width of the bar (or sub-slice).\n\nThis is the linchpin because:\n- **Part (a)**: Each partial slice ([22,30), [40,45)) requires $$f = \\text{FD} \\times w$$ with the sub-slice width. Full bars also use it (width = class width).\n- **Part (b)**: To build the cumulative frequencies, you need every bar's frequency — all computed via $$f = \\text{FD} \\times w$$.\n- **Part (c)**: The grouped mean uses $$\\bar{x} = \\frac{\\sum f x_{\\text{mid}}}{\\sum f}$$, where every $$f$$ in the numerator and denominator came from $$f = \\text{FD} \\times w$$.\n\nWithout this formula, you cannot extract any frequency from the histogram at all. It is the single bridge between the visual (bar heights) and the numerical (counts of people).", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_4"}, {"question": "For any normal probability problem (forward or inverse), what is the FIRST mark you should put on the page, and at what stage relative to opening the formula booklet? (2 steps)", "answer": "- Step 1: Sketch the standard normal $$N(0,1)$$ curve and shade the region corresponding to the probability you need.\n- Step 2: Do this BEFORE opening the formula booklet or tables; the sketch instantly reveals whether your $$z$$-value should be positive or negative and whether you need a left-tail, right-tail, or body probability, preventing sign and complement errors.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_20"}, {"question": "In a three-set Venn diagram, what verification line should you write at the bottom of your working, and why does writing it earn examiner credit?", "answer": "- The verification line: $$P(A) + P(B) + P(C) - P(A \\cap B) - P(A \\cap C) - P(B \\cap C) + P(A \\cap B \\cap C) = 1$$\n  Or more simply: \"Total = 1\" after listing all eight regions.\n- Why it earns credit. The eight regions in a three-set Venn must sum to 1 (the sample space). Writing this check demonstrates you understand completeness and have verified your work. Examiners look for this verification because it distinguishes students who understand the full probability space from those who just fill regions arbitrarily.\n- What to write. After listing all region probabilities (A only, B only, C only, AB only, AC only, BC only, ABC, outside), write:\n  $$\\text{Sum} = 0.07 + 0.06 + 0.41 + 0.03 + 0 + 0.09 + 0 + 0.34 = 1.00$$\n  This explicit sum check is worth a mark in many S1 mark schemes.", "source": "GAP-MiniMax ②", "_id": "minimax_2_18"}, {"question": "S1 May 2023 (whole paper) — Name the three habits, in order, that this S1 paper rewards, and assign each habit to its diagnostic question(s). (3 steps)", "answer": "- Step 1: **Calibration before reading.** Before reading any histogram bar heights, compute the frequency density for the named class and use it as your scale. This is the primary defence in Q1 and Q3 (histogram and box-plot questions).\n- Step 2: **Algebraic discipline before numerical substitution.** Write the formula, then substitute — never skip straight to numbers. This is the primary defence in Q5 (write $$\\text{Var}(-2Y+15) = (-2)^2\\text{Var}(Y)$$ before computing) and Q7(c) (write both $$z$$-equations in $$r = \\ldots k$$ form before equating).\n- Step 3: **Conceptual precision about probability vocabulary.** \"Mutually exclusive\" ≠ \"independent\"; $$P(C \\mid R)$$ ≠ $$P(R \\mid C)$$. This is the primary defence in Q4 (Bayes direction) and Q6 (mutually exclusive vs independent in the Venn diagram).\n\nThese three habits convert \"I know the content but lost marks\" into \"I know the content and the marks are mine.\"", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_25"}, {"question": "S1 May 2023 Q7(a)/(c) — for any normal probability problem (forward or inverse), what is the **first mark** you put on the page, and at what stage relative to opening the formula booklet?", "answer": "- Step 1: Sketch the standard normal $$N(0, 1)$$ bell curve with the relevant region **shaded** — drawn **before** opening any table or formula booklet.\n- Step 2: Reason: the sketch tells you the sign of $$z$$ instantly. If the shaded region is to the **left** of the mean, $$z < 0$$; if to the **right**, $$z > 0$$. This single visual prevents the classic Q7(a)(ii) slip where students return $$z = +1.40$$ instead of $$-1.40$$.\n- Step 3: The sketch also tells you whether the table value you need is $$\\Phi(z)$$ (cumulative left tail) or the upper-tail percentage point — different tables, different precision.\n\nTakeaway: sketch before you look up. The shaded region is your sign-and-tail oracle.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_21"}, {"question": "For 'regression line of w on t', which S goes in the denominator of the gradient b = S_??/S_?? — and how do you instantly tell from the phrasing?", "answer": "- The answer: For \"regression line of w on t\" (w is the response/dependent variable, t is the explanatory/independent variable), the denominator is S_tt (the sum of squares of the explanatory variable t).\n- The formula: $$b = \\frac{S_{tw}}{S_{tt}}$$\n- How to tell instantly. The phrasing \"w on t\" follows the convention \"response variable ON explanatory variable.\" The response variable (w) goes in the numerator's subscript, the explanatory variable (t) goes in the denominator's subscript. The first-named variable in \"w on t\" is always the numerator.\n- The trap. If you reverse it and compute b = S_tw/S_ww, you get the wrong regression line (the \"t on w\" line). In this question, w on t means predicting weight from tail length, so the gradient tells you \"weight change per unit tail-length change.\"", "source": "GAP-MiniMax ②", "_id": "minimax_2_4"}, {"question": "In S1 May 2023 Q4(d), why is presenting the Bayes answer as the simplified fraction $$5/13$$ strategically safer than presenting the decimal $$0.385$$? (2 steps)", "answer": "- Step 1: The exact fraction $$5/13$$ proves that no rounding error occurred during division. A decimal $$0.385$$ is a rounded 3 s.f. truncation of $$0.384615\\ldots$$; if your intermediate arithmetic had a slight slip (e.g., $$0.0149/0.0391$$), the decimal might still round to $$0.385$$ and mask the error.\n- Step 2: Examiners accept both forms, but a clean exact fraction is self-checking: if you can reduce to $$5/13$$, your numerator and denominator were likely correct. It also avoids any 3 s.f. boundary issues where $$0.3847$$ might round differently.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_30"}, {"question": "When reporting the variance of lengths measured in mm, what units must you attach to the final answer, and why?", "answer": "The units are **mm²** (millimetres squared).\n\n- Step 1: Variance is, by definition, the average of squared deviations: $$\\text{Var}(X) = E[(X - \\mu)^2]$$. Each deviation is in mm, so the square is in mm².\n- Step 2: Forgetting units (or writing \"mm\" instead of \"mm²\") signals a misunderstanding of what variance measures — that it is a *squared* spread, not a linear one. This is exactly why we often prefer standard deviation $$\\sigma$$ for interpretation: it returns to the original units (mm).\n- Step 3: Examiners may dock marks for unit omission; more importantly, the squared-unit reminder is conceptual: variance lives on a different scale to the data, which is why $$1.5 \\times \\text{IQR}$$ fences (linear-scale) and variance (squared-scale) feel different.\n\nTakeaway: variance of a length in mm is in mm² — always.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_12"}, {"question": "S1 May 2023 Q6(c) — State the general inclusion-exclusion formula for \"A only\" (the region in A but not in B or C) in a three-set Venn diagram, and explain why the triple intersection enters with a PLUS sign. (3 steps)", "answer": "- Step 1: The formula is $$P(A \\text{ only}) = P(A) - P(A \\cap B) - P(A \\cap C) + P(A \\cap B \\cap C)$$.\n- Step 2: The intuition: start with all of A, then remove the parts overlapping with B and the parts overlapping with C. But the triple intersection $$A \\cap B \\cap C$$ was subtracted *twice* — once when you removed $$A \\cap B$$ and once when you removed $$A \\cap C$$. It has been over-removed.\n- Step 3: To correct the double-subtraction, you must *add back* the triple intersection once. This is the same logic as the full inclusion-exclusion principle: subtract pairs, add back the triple. The sign alternates: +singles, −pairs, +triple.\n\nWithout the $$+P(A \\cap B \\cap C)$$, you undercount the \"A only\" region whenever all three sets overlap. In this paper, $$A \\cap C = 0$$ forces the triple to be 0, so the error is invisible — but on a different paper, omitting it produces a wrong answer.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_18"}, {"question": "S1 May 2023 Q1(a) — Why does the approach \"add up the full bars in $$[20,50)$$ → 70+100+30 = 200, then try to subtract a guess for the bit from 20 to 22\" lose 2 marks? What concept does it conflate? (3 steps)", "answer": "- Step 1: The approach treats the question as \"which complete bars fall inside the range?\" and then attempts a fudge for the partial bits. This conflates *full-bar counting* (a discrete, whole-bar mindset) with *partial-bar pro-rating* (a continuous, FD × slice-width mindset).\n- Step 2: The problem is that \"subtracting a guess\" is not a method — it has no algebraic basis. The examiner cannot award method marks for an unstructured estimate. The correct method is to compute each slice independently using $$f = \\text{FD} \\times w$$: $$[22,30)$$ gives $$7 \\times 8 = 56$$, $$[30,40)$$ gives 100, $$[40,45)$$ gives $$3 \\times 5 = 15$$.\n- Step 3: The \"full bars then fudge\" approach also risks double-counting or missing the $$[40,45)$$ partial slice entirely, because 45 is not a class boundary — the bar runs to 50, and you must *pro-rate* the 5 km slice, not \"subtract 5 km from the 30-person bar.\"\n\nEvery partial-class question must be decomposed into rectangular slices, each computed via FD × width. There are no shortcuts.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_1"}, {"question": "S1 May 2023 Q2(e) — for \"explain why it is inappropriate to predict $$w$$ at $$t = 2$$ cm\", what specific numerical computation makes the argument **physically decisive**, and what is the predicted value?", "answer": "- Step 1: Substitute $$t = 2$$ into the regression line: $$w = -16.7 + 4.77(2) = -16.7 + 9.54 = -7.16$$ g.\n- Step 2: The prediction is a **negative weight** — physically impossible (mass cannot be negative). This is a far more decisive argument than the generic \"$$t = 2$$ is outside the data range $$[6.4, 8.9]$$\".\n- Step 3: State both: (i) extrapolation outside the data range, (ii) prediction is $$-7.16$$ g, which is physically impossible. The numerical computation is the killer evidence — it transforms a hand-wave into a proof.\n\nTakeaway: when arguing against extrapolation, plug in the value and show the prediction is nonsensical. Concrete > abstract.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "In a three-set Venn diagram problem, what verification line should you write at the bottom of your working, and why does writing it earn examiner credit?", "answer": "- Step 1: Write the explicit sum check: \"all eight regions sum to 1\", followed by the actual arithmetic, e.g. $$0.07 + 0.06 + 0.41 + 0.03 + 0 + 0.09 + 0 + 0.34 = 1.00 \\checkmark$$.\n- Step 2: The eight regions are: A only, B only, C only, AB only, AC only, BC only, ABC, and outside (the complement of $$A \\cup B \\cup C$$). Forgetting the \"outside\" region is a common 1-mark loss.\n- Step 3: Why examiners reward it:\n+ It demonstrates you understand the Venn partitions the sample space exhaustively.\n+ It catches arithmetic slips before they reach the final answer.\n+ Mark schemes often have an explicit B mark for \"all probabilities sum to 1\" stated or shown.\n\nTakeaway: writing the sum check is not just safety — it's a free mark for a procedural habit.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "For coding x = t-6 and y = w/2 - 5, write the inverse substitutions used to convert the t-on-w regression line into a y-on-x regression line.", "answer": "- Step 1: Identify the forward coding. The question gives:\n  $$x = t - 6 \\implies t = x + 6$$\n  $$y = \\frac{w}{2} - 5 \\implies w = 2y + 10$$\n- Step 2: The inverse substitutions. To convert FROM (t, w) back TO (x, y):\n  $$t = x + 6$$\n  $$w = 2y + 10$$\n- Step 3: Apply to the regression line. Given w = -16.7 + 4.77t, substitute:\n  $$2y + 10 = -16.7 + 4.77(x + 6)$$\n  This is the y-on-x regression line in unsimplified form (as the question allows).\n\nThe key point: the inverse substitutions ADD the shift constant (6, not subtract it) and DOUBLE the y variable (since y = w/2 - 5 means w = 2y + 10, not w = 2y - 10).", "source": "GAP-MiniMax ②", "_id": "minimax_2_8"}, {"question": "What is the most frequent sign error in writing the S_tw computational formula, and why is the correct sign 'subtract'?", "answer": "- The error: Writing S_tw = Σtw + (Σt)(Σw)/n (with a PLUS sign).\n- The correct formula: $$S_{tw} = \\sum tw - \\frac{\\sum t \\sum w}{n}$$\n- Why the correct sign is 'subtract'. The formula derives from:\n  $$S_{tw} = \\sum(t - \\bar t)(w - \\bar w) = \\sum(tw - t\\bar w - w\\bar t + \\bar t\\bar w)$$\n  $$= \\sum tw - \\bar w\\sum t - \\bar t\\sum w + n\\bar t\\bar w$$\n  $$= \\sum tw - \\frac{\\sum w}{n}\\sum t - \\frac{\\sum t}{n}\\sum w + \\frac{\\sum t\\sum w}{n}$$\n  $$= \\sum tw - \\frac{\\sum t \\sum w}{n}$$\n- The intuition. You're subtracting the \"expected product under independence\" (what you'd get if t and w were uncorrelated). The subtraction corrects for the artificial inflation caused by the means.\n\nThe plus sign error is the single most common arithmetic mistake in S1 regression questions — it directly produces the wrong S_tw value.", "source": "GAP-MiniMax ②", "_id": "minimax_2_5"}, {"question": "S1 May 2023 Q3(a) — under coding $$x = l - a$$, what is the reverse-coding rule for the MEAN, and why is this different from the reverse-coding rule for the variance?", "answer": "- Step 1: For the mean: the shift constant $$a$$ **adds back**:\n+ $$\\bar l = \\bar x + a$$.\n+ In Q3(a): $$\\bar l = \\bar x + 600$$.\n- Step 2: For the variance: the shift constant has **no effect**:\n+ $$\\text{Var}(l) = \\text{Var}(x)$$ — variance is invariant under translation.\n- Step 3: The reason for the difference: the mean is a *location* statistic (where the data sits on the number line), so shifting the data shifts the mean by the same amount. Variance is a *spread* statistic (how scattered the data is around its mean), and shifting all values by the same constant doesn't change the spread — the gaps between points are unchanged.\n\nTakeaway: shifts move the mean but don't touch the spread. The mnemonic: \"shift the mean, leave the variance alone\".", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_11"}, {"question": "Name the three habits, in order, that this S1 paper rewards according to the V3 Pattern Summary — and assign each habit to its diagnostic question(s).", "answer": "- The three habits, in order:\n  1. **Calibration BEFORE reading** — compute FD for the named class FIRST, before extracting any other frequencies from the histogram.\n  2. **Algebraic discipline BEFORE numerical substitution** — write the formula with symbols first, then substitute numbers (especially in variance transformations and normal equation systems).\n  3. **Conceptual precision about probability vocabulary** — distinguish mutually exclusive from independent, and P(A|B) from P(B|A).\n- Assignment to questions:\n  - Habit 1: Q1 (histogram), Q3 (box plot/outliers)\n  - Habit 2: Q5 (variance transformation Var(15−2Y)), Q7(c) (two-equation normal system)\n  - Habit 3: Q6 (mutually exclusive vs independent), Q4 (Bayes direction)\n\nThese three habits directly target the highest-scoring and highest-risk areas of the paper.", "source": "GAP-MiniMax ②", "_id": "minimax_2_24"}, {"question": "According to the V3 weakness analysis, what is the single drill that — if mastered — converts Q5(e) from a 4-minute risk into a 90-second computation, and what is the formula at its core?", "answer": "- Step 1: The drill: maste
