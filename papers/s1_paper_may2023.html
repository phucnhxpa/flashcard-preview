tional 1 cm of tail length, the weight increases by approximately 4.77 grams.\" You must include the units of both variables (g per cm), and phrase it as a rate of change.\n\n**Key requirement:** The interpretation must mention the specific variables and their units — not just \"the gradient is 4.77.\"", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "Why is it inappropriate to use the regression line w = −16.7 + 4.77t to estimate the weight of a mouse with tail length 2 cm? (2 steps)", "answer": "- Step 1: The data range for t is approximately 6.4 to 8.9 cm (mean 7.65 cm ± about 2 standard deviations). A tail length of 2 cm lies FAR outside this range — this is extrapolation.\n- Step 2: At t = 2, the model predicts w = −16.7 + 4.77(2) = −7.16 grams, which is physically impossible (negative weight). This confirms the model fails outside the data range.\n\n**Exam phrase:** State both \"the value is outside the range of the data\" AND \"the prediction is physically impossible.\"", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "What is the key property of the Product Moment Correlation Coefficient (PMCC) under linear coding, and how does this help in exam questions? (2 steps)", "answer": "- Step 1: The PMCC is invariant under positive linear transformations of the data: if x' = a + bx with b > 0, then r_xy = r_x'y'.\n- Step 2: This means if you code both variables (e.g., x = t − 6, y = w/2 − 5), the PMCC stays exactly the same. In Q2(f), r_xy = r_tw = 0.827 without any recalculation.\n\n**Critical condition:** The scale factor must be POSITIVE. If b < 0, the correlation sign reverses.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "In part (g) of Q2, the regression line of y on x is needed. Why should you NOT recalculate S_xy and S_xx from the coded data? (2 steps)", "answer": "- Step 1: The question explicitly states \"You do not need to simplify your equation\" — this is a hint to use substitution, not recalculation.\n- Step 2: Substitute the coding relationships directly into the existing regression equation: t = x + 6, w = 2y + 10. So 2y + 10 = −16.7 + 4.77(x + 6). This gives the answer without any new S_xy calculations.\n\n**Why it works:** The coding transformation is applied to the existing model, not to raw summary statistics.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "When data are coded by subtraction only (x = l − 600), how do you find the actual mean? (2 steps)", "answer": "- Step 1: Calculate the coded mean: $\\bar{x} = \\sum x / n = 3711 / 81 = 45.8148$\n- Step 2: Reverse the shift: $\\bar{l} = \\bar{x} + 600 = 645.8148$ mm. Simply add back the constant (600), not multiply.\n\n**Key principle:** For x = X − a (subtractive coding), the mean transforms as $\\bar{X} = \\bar{x} + a$.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "A student writes \"Var(l) = Var(x) − 600\". What is wrong with this, and what is the correct relationship? (1 step)", "answer": "Variance is INVARIANT under translation (addition/subtraction). The correct relationship is Var(l) = Var(x + 600) = Var(x). You should NEVER add or subtract the constant to/in the variance.\n\n**Intuition:** Adding a constant shifts all data points equally — the spread about the mean doesn't change. Only multiplication changes spread.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "What is the correct two-step process to calculate variance from coded data x = l − 600? (2 steps)", "answer": "- Step 1: Calculate the coded variance using $\\mathrm{Var}(x) = \\frac{\\sum x^2}{n} - \\bar{x}^2 = \\frac{475181}{81} - (45.8148)^2 = 3767.4$\n- Step 2: Because variance is invariant under translation, $\\mathrm{Var}(l) = \\mathrm{Var}(x) = 3767.4$ mm². Do NOT add or subtract 600 at any stage.\n\n**Note:** The units become mm² (squared), which is correct for variance.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "In Q3(c), the question asks for the maximum number of salmon with weights in 4600 < w ≤ 7700. Why can't you interpolate using the box plot? (2 steps)", "answer": "- Step 1: A box plot only shows the five-number summary (min, Q1, median, Q3, max). It tells you nothing about how data are distributed within the box.\n- Step 2: Since 4600 > median (4000), all values in (4600, 7700] must lie in the upper half of the data. With n = 81, at most floor(81/2) = 40 values can lie strictly above the median. This is a counting bound, not an interpolation.\n\n**Key insight:** Use the median position to bound counts, not the box plot's internal structure.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": true}, {"question": "To check for outliers using the 1.5 × IQR rule, what four comparisons must you make? (2 steps)", "answer": "- Step 1: Calculate IQR = Q3 − Q1. Compute both fences: Lower fence = Q1 − 1.5 × IQR; Upper fence = Q3 + 1.5 × IQR.\n- Step 2: Compare the actual extremes: Check min > lower fence AND max < upper fence. BOTH must be true for no outliers. In Q3(d): IQR = 2500, lower fence = −750, upper fence = 9250. Min = 2000 > −750 ✓, Max = 7700 < 9250 ✓ → no outliers.\n\n**Exam requirement:** You must check BOTH fences against BOTH extremes. Missing either comparison loses marks.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "In a probability tree with branches A, B, C and conditional branches (red | A), (red | B), (red | C), what is the correct formula for P(red) using total probability? (2 steps)", "answer": "- Step 1: P(red) = Σ P(branch) × P(red | branch). This is the total probability theorem.\n- Step 2: For three branches: P(red) = P(A) × P(red | A) + P(B) × P(red | B) + P(C) × P(red | C). In Q4: = 0.30(0.02) + 0.45(0.04) + 0.25(0.06) = 0.039.\n\n**Critical:** Don't forget to include ALL branches — the third branch (C) is often missed.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "A student answers P(C | red) = 0.06 in Q4(d). What is wrong, and what is the correct Bayes calculation? (2 steps)", "answer": "- Step 1: The student confused P(red | C) = 0.06 with P(C | red). These are different conditional directions.\n- Step 2: Bayes formula: P(C | red) = P(C) × P(red | C) / P(red) = (0.25 × 0.06) / 0.039 = 0.015/0.039 = 5/13 ≈ 0.385\n\n**Memory trick:** The denominator P(red) is the same total probability from part (c). The numerator is the specific path through the tree.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "What three pieces of information should you write BEFORE substituting numbers into the Bayes formula? (1 step)", "answer": "- Write: $P(L_i | R) = \\frac{P(L_i)P(R | L_i)}{\\sum_j P(L_j)P(R | L_j)}$ — the general formula with the summation in the denominator.\n- Then substitute: P(C | R) = [P(C) × P(R | C)] / [P(A)P(R|A) + P(B)P(R|B) + P(C)P(R|C)]\n\n**Exam strategy:** Writing the formula first earns method marks even if arithmetic errors occur later.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "When given a piecewise probability function with different formulas for different y-values, what is the first step before calculating any probabilities? (2 steps)", "answer": "- Step 1: Tabulate the probability function numerically by substituting k into each piece. Write out P(Y = y) for all possible y-values.\n- Step 2: Verify that all probabilities are non-negative. In Q5, for y = 1: k(3 − 1) = 2k (positive if k > 0). For y = 3: k(3² − 8) = k(1) = k (positive). For y = 5: k(25 − 8) = 17k (positive).\n\n**Common error:** Using the wrong sign in k(3 − y) — it should be k(3 − y), NOT k(y − 3), which would give negative probabilities for y > 3.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "How do you verify that k = 1/30 in Q5(a)? (1 step)", "answer": "Sum all probabilities and set equal to 1: 2k + k + k + 8k + 17k + k = 30k = 1, so k = 1/30.\n\n**Check:** Each term: for y = 1: 2(1/30) = 2/30; y = 2: 1/30; y = 3: 1/30; y = 4: 8/30; y = 5: 17/30; y = 6: 1/30. Sum = 30/30 = 1 ✓", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "In Q5(d), we need P(Y ≤ X) where X = 15 − 2Y. Why can't you treat Y and X as independent random variables and sum P(Y = y) × P(X = x)? (2 steps)", "answer": "- Step 1: X is a deterministic function of Y: X = 15 − 2Y. They are NOT independent — knowing Y completely determines X.\n- Step 2: Instead, solve the inequality algebraically: Y ≤ 15 − 2Y → 3Y ≤ 15 → Y ≤ 5. Then P(Y ≤ X) = P(Y ≤ 5) = 1 − P(Y = 6) = 29/30.\n\n**Key insight:** When one variable is a function of the other, use the functional relationship to transform the inequality, not probability multiplication.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": true}, {"question": "What is the variance scaling formula for a linear transformation X = aY + b? (1 step)", "answer": "$\\mathrm{Var}(X) = \\mathrm{Var}(aY + b) = a^2 \\mathrm{Var}(Y)$\n\n**Critical:** The coefficient a is SQUARED. The constant b drops out entirely. In Q5: X = 15 − 2Y, so a = −2, and Var(X) = (−2)² × Var(Y) = 4 × Var(Y).\n\n**Common error:** Using a (not a²) or keeping the constant term — both give wrong answers.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "In Q5(e), why must you calculate E(Y²), and what is the correct two-step process? (2 steps)", "answer": "- Step 1: Calculate E(Y²) = Σ y² × P(Y = y). This is NOT the same as [E(Y)]².\n- Step 2: Then Var(Y) = E(Y²) − [E(Y)]². For Q5: E(Y²) = (1² × 2/30) + (2² × 1/30) + (3² × 1/30) + (4² × 8/30) + (5² × 17/30) + (6² × 1/30) = 604/30 = 302/15\n\n**Then:** Var(Y) = 302/15 − (13/3)² = 61/45, so Var(X) = 4 × 61/45 = 244/45 ≈ 5.42", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "What is the fundamental difference between \"mutually exclusive\" and \"independent\" events? (1 step)", "answer": "- Mutually exclusive (disjoint): P(A ∩ B) = 0. If A occurs, B cannot occur.\n- Independent: P(A ∩ B) = P(A) × P(B). One occurring tells you nothing about whether the other occurs.\n\n**Critical insight:** Two events with positive probability CANNOT be both mutually exclusive AND independent (because if P(A) > 0, P(B) > 0, and they were independent, then P(A ∩ B) = P(A)P(B) > 0, not 0).", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "In Q6, given A and C are mutually exclusive, what value must P(A ∩ C) take? (1 step)", "answer": "P(A ∩ C) = 0. By definition, mutually exclusive events have zero intersection.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "In Q6(c), given B and C are independent, what value must P(B ∩ C) take? (1 step)", "answer": "P(B ∩ C) = P(B) × P(C) = 0.18 × 0.5 = 0.09. This is NOT zero — independence means the joint probability equals the product of marginals.\n\n**Common error:** Setting P(B ∩ C) = 0 because of confusion with the mutually exclusive A and C from earlier parts.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "When filling a three-set Venn diagram with constraints on P(A), P(B), P(C), P(A ∩ B), P(A ∩ C), P(B ∩ C), and knowing A ∩ C = ∅, what is the correct order to fill the regions? (3 steps)", "answer": "- Step 1: Fill from the center outward. First, the triple intersection A ∩ B ∩ C = 0 (because A ∩ C = ∅ forces any triple to be empty).\n- Step 2: Fill the pairwise intersections: A ∩ B only = P(A ∩ B) − triple = 0.03; B ∩ C only = P(B ∩ C) − triple = 0.09; A ∩ C only = 0 (given).\n- Step 3: Calculate single regions: A only = P(A) − (A ∩ B) − (A ∩ C) + triple = 0.10 − 0.03 − 0 + 0 = 0.07. Do similarly for B only and C only. Finally, outside region = 1 − sum of all filled regions.\n\n**Verification:** All eight regions must sum to exactly 1.0.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "In Q6, what is the most common mistake students make when filling the three-set Venn diagram, and how do you avoid it? (1 step)", "answer": "The most common error is forgetting the \"outside\" region (the complement of A ∪ B ∪ C). In Q6, this outside region equals 1 − (0.07 + 0.06 + 0.41 + 0.03 + 0 + 0.09 + 0) = 0.34.\n\n**Exam penalty:** Forgetting the outside region typically costs 1 mark. Always explicitly write \"outside = ...\" and verify the sum equals 1.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "For P(J > d) = 0.9192, why must d be less than the mean (500), giving a NEGATIVE z-value? (2 steps)", "answer": "- Step 1: 0.9192 > 0.5. This means more than 91% of the distribution lies above d. For a normal distribution, this can only happen if d is to the LEFT of the mean.\n- Step 2: Therefore z must be NEGATIVE. From the standard normal table, Φ(−z) = 0.9192 → −z = 1.40 → z = −1.40. Then d = 500 + (−1.40)(25) = 465.\n\n**Common error:** Using z = +1.40 (positive) gives d = 535, which would correspond to P(J > 535) ≈ 0.08, not 0.92.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "In the exam, what is the first thing you should do BEFORE using the normal distribution table? (1 step)", "answer": "Draw a sketch of the normal curve, shade the relevant region, and write the z-value equation below it. This prevents sign errors.\n\n**For Q7(a)(ii):** Draw left tail region above d with area 0.9192. This visual immediately tells you d < μ and z < 0.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "In Q7(b), why is the probability P(all 5 bags < 510) equal to [P(J < 510)]⁵, not 5 × P(J < 510)? (2 steps)", "answer": "- Step 1: The bags are independent — each bag's juice volume does not affect any other bag's volume. This is explicitly stated in the question (\"5 independent bags\").\n- Step 2: For independent events, the probability of ALL five occurring equals the PRODUCT of their individual probabilities. So P(all < 510) = 0.6554⁵ ≈ 0.121.\n\n**Common error:** Multiplying by 5 treats the events as mutually exclusive or additive, not independent.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "In Q7(c), you need to find r and k satisfying two equations: P(R < r) = 0.15 and P(R > 3r − 800) = 0.005. What is the correct approach? (3 steps)", "answer": "- Step 1: Convert each probability to a z-equation using R ~ N(520, k²). For P(R < r) = 0.15, since 0.15 < 0.5, z is negative: (r − 520)/k = −1.0364 → r = 520 − 1.0364k.\n- Step 2: For P(R > 3r − 800) = 0.005, this is an upper tail, so z is positive: (3r − 800 − 520)/k = 2.5758 → (3r − 1320)/k = 2.5758 → r = 440 + 0.8586k.\n- Step 3: Equate the two expressions: 520 − 1.0364k = 440 + 0.8586k → 80 = 1.8950k → k = 42.2. Then substitute back to find r = 476.\n\n**Key insight:** Both constraints give r in terms of k. Equate and solve.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "What is the difference between the \"body\" table (Φ(z)) and the \"percentage-point\" table in the S1 formula booklet? (1 step)", "answer": "- Body table: gives Φ(z) = P(Z ≤ z) for positive z (area from −∞ to z).\n- Percentage-point table: gives z such that P(Z > z) = the given tail probability. For tail probability 0.005, z = 2.5758.\n\n**In Q7(c):** P(R > 3r − 800) = 0.005 is an upper tail of 0.005, so use the percentage-point table: z = 2.5758. If you mistakenly used the body table with 0.995, you'd get approximately 2.58 (close but not exact).", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": true}, {"question": "After solving the two-equation system in Q7(c), what verification step should you always perform? (1 step)", "answer": "Substitute both r and k back into the original probability statements:\n- Check: (476 − 520)/42.2 = −1.0364 → P(R < 476) = Φ(−1.0364) ≈ 0.15 ✓\n- Check: (3×476 − 800 − 520)/42.2 = 2.5758 → P(R > 628.74) ≈ 0.005 ✓\n\n**Why this matters:** Algebraic errors in the equating step can give wrong r and k. Verification catches these before you submit.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "Which four percentage-point z-values are most worth memorizing for S1 exams? (1 step)", "answer": "- z₀.₀₅ = 1.6449 (5% upper tail)\n- z₀.₀₂₅ = 1.9600 (2.5% upper tail)\n- z₀.₀₁ = 2.3263 (1% upper tail)\n- z₀.₀₀₅ = 2.5758 (0.5% upper tail)\n\nThese appear frequently in inverse-normal questions where you need to find values corresponding to specific tail probabilities.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "In Q7(a)(ii), a student looks up Φ(z) = 0.9192 and finds z = 1.40, then calculates d = 500 + 1.40 × 25 = 535. What two errors did they make? (2 steps)", "answer": "- Step 1: They used Φ(z) = 0.9192 but should have used the percentage-point table (or recognized that 0.9192 > 0.5 implies a LEFT-tail problem, not right-tail).\n- Step 2: They used z = +1.40, but for a left-tail probability of 0.0808 (1 − 0.9192), z must be negative: z = −1.40, giving d = 465, not 535.\n\n**Correct logic:** P(J > d) = 0.9192 → P(J ≤ d) = 0.0808 → this is a left-tail problem → z < 0.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": true}, {"question": "In Q3, the variance formula is Var(x) = (Σx²/n) − x̄². Why do we use n in the denominator rather than (n − 1)? (1 step)", "answer": "This is the population variance formula (MLE). In S1 descriptive statistics questions where you have the full dataset summarized (Σx, Σx²), you use the divisor n. The (n − 1) divisor is used when calculating sample variance from raw data as an unbiased estimator — a different context not tested in this question type.\n\n**Key distinction:** When summary statistics (Σx, Σx²) are given, always use n. When raw data are listed, S1 typically still uses n for population variance from grouped data.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}, {"question": "For the regression line derivation, why must you use S_tt in the denominator for the gradient of w on t, rather than S_ww? (1 step)", "answer": "In regression of w on t, t is the explanatory (independent) variable, and w is the response (dependent) variable. The gradient formula is b = S_tw / S_tt, where S_tt is the sum of squares of the explanatory variable.\n\n**Confusion point:** For t on w, you'd use S_ww in the denominator instead. The variable in the denominator should be the one you're regressing ON (the predictor).", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "What does it mean mathematically when two events are \"independent,\" and how is this different from \"mutually exclusive\" in terms of information? (1 step)", "answer": "Independent: P(A ∩ B) = P(A) × P(B). Knowing A occurred gives no information about whether B occurred (and vice versa).\n- Mutually exclusive: P(A ∩ B) = 0. Knowing A occurred tells you with certainty that B did NOT occur.\n\n**Information perspective:** Independent events provide zero information about each other; mutually exclusive events provide complete information (if one is true, the other is false).", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": false}, {"question": "In Q5, after finding Var(Y) = 61/45, what is the final step to find Var(15 − 2Y)? (1 step)", "answer": "Apply the scaling formula: Var(15 − 2Y) = (−2)² × Var(Y) = 4 × (61/45) = 244/45 ≈ 5.42\n\n**The constant 15 drops out completely** (variance is invariant under translation). Only the coefficient −2 matters, and it gets squared.", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "In the box plot outlier check, what happens if the lower fence is negative (e.g., −750) but all data values are positive? (1 step)", "answer": "The lower fence is a mathematical boundary. If it falls below zero but all data are positive, this is fine — no data point can be less than the negative fence. The only requirement is that the minimum data value must be GREATER than the lower fence. In Q3: min = 2000 > −750, so no lower outlier.\n\n**Key point:** Both fences must be checked against actual data extremes, regardless of whether the fence makes physical sense.", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": false}, {"question": "In regression analysis, what is the difference between interpolation and extrapolation, and why does extrapolation lead to unreliable predictions? (1 step)", "answer": "- Interpolation: predicting within the range of observed x-values (e.g., t between 6.4 and 8.9 cm). The model is fitted to data in this range, so predictions are reasonably reliable.\n- Extrapolation: predicting outside the observed x-range (e.g., t = 2 cm). The linear relationship may not hold outside the data — the model could curve, plateau, or behave differently. The negative weight prediction (w = −7.16) confirms the model breaks down.\n\n**S1 exam requirement:** You must explicitly state that the prediction lies \"outside the data range\" for full marks.", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}, {"question": "When coding data with y = w/2 − 5, how do you find the regression line of y on x? What are two ways to approach this? (2 steps)", "answer": "- Method 1 (substitution): Take the regression equation w = −16.7 + 4.77t. Substitute w = 2y + 10 and t = x + 6: 2y + 10 = −16.7 + 4.77(x + 6). This gives y = 2.385x + 0.96. This is the preferred method and what the question expects.\n- Method 2 (recalculate): Use the coding formulas on the summary statistics. Since x = t − 6 (shift only) and y = w/2 − 5 (shift + scale), you'd need to adjust means and variances accordingly. This is much more work and prone to error.\n\n**The question's hint:** \"You do not need to simplify your equation\" signals you should use substitution.", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": false}, {"question": "In probability questions with Venn diagrams, what is the inclusion-exclusion formula for three events? (1 step)", "answer": "P(A ∪ B ∪ C) = P(A) + P(B) + P(C) − P(A ∩ B) − P(A ∩ C) − P(B ∩ C) + P(A ∩ B ∩ C)\n\n**Application:** This is useful for checking that your Venn diagram regions sum to 1, or for finding the probability of at least one event occurring.", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": false}, {"question": "For a discrete random variable transformation X = aY + b, what are the formulas for E(X) and Var(X)? (1 step)", "answer": "- E(X) = aE(Y) + b (the constant b is retained)\n- Var(X) = a² Var(Y) (the constant b drops out completely)\n\n**In Q5:** E(X) = E(15 − 2Y) = 15 − 2E(Y) = 15 − 2(13/3) = 15 − 26/3 = 19/3. And Var(X) = (−2)² × Var(Y) = 4 × (61/45) = 244/45.", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": false}, {"question": "In histogram questions, what does \"pro-rating\" mean, and why is it necessary for partial class intervals? (1 step)", "answer": "Pro-rating means scaling the frequency by the proportion of the class actually used. Since frequency = FD × width, for a partial width you use that actual width (not the full class width).\n\n**Example:** For [22, 30) within the [20, 30) class (width 10), the partial width is 8. So f = 8 × FD, not 10 × FD. This is because frequency corresponds to AREA under the histogram bar, not HEIGHT.", "source": "MiniMax ②", "_id": "minimax_2_47", "judge_pick": false}, {"question": "Why is the PMCC (r) dimensionless, and what does this imply about coding with positive scale factors? (1 step)", "answer": "The PMCC is defined as r = S_xy / √(S_xx S_yy). Both numerator and denominator have the same units (product of x-units and y-units), so units cancel, leaving a pure number between −1 and 1.\n\n**Implication:** If you multiply both variables by positive constants (e.g., y = w/2), the S_xx and S_yy scale by the square of the factor, while S_xy scales by the product of factors. The ratio remains unchanged. This is why r is invariant under positive linear coding.", "source": "MiniMax ②", "_id": "minimax_2_48", "judge_pick": false}], "count": 49}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "S1 May 2023 Q1 — when a histogram question states \"60 people travel between 10 km and 20 km\", what is the very first thing you must do before reading any other bar?", "answer": "- Step 1: Use the named class to **calibrate the frequency density scale**. With $$f = 60$$ and class width $$w = 10$$, compute $$\\text{FD} = f/w = 6$$ for the $$[10,20)$$ bar.\n- Step 2: Now mark this height on your axis and read every other bar **relative to this calibrated scale** — never trust the printed y-axis numbers directly.\n- Step 3: The motivation: the y-axis is often unlabelled or deceptively scaled in S1 histograms, so calibration via the named class is the only safe entry point.\n\nMr Fuat's rule: \"Calibrate first, then never read FD off the axis again — read off your scale.\"", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "For a histogram \"find the number of people with values between 22 and 45 km\", what is the trick to handle the fact that 22 and 45 do NOT fall on bar boundaries?", "answer": "- Step 1: Recognise this is a **partial-bar pro-rating** question, not a clean sum of full bars.\n- Step 2: Slice the interval at the natural bar boundaries (here 30 and 40):\n+ $$[22,30)$$: partial slice of width $$8$$, multiply by that bar's FD\n+ $$[30,40)$$: full bar — use its full frequency\n+ $$[40,45)$$: partial slice of width $$5$$, multiply by that bar's FD\n- Step 3: Sum the three sub-frequencies using $$f = \\text{FD} \\times w$$ on each piece.\n\nThe motivation: every shaded rectangle (full or partial) obeys $$f = \\text{FD} \\times w$$ — that's the only formula needed.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": true}, {"question": "For a grouped continuous histogram with $$n = 274$$, what position do you use to locate the median, and why is this different from discrete data?", "answer": "- Step 1: Use position $$n/2 = 137$$ — **not** $$(n+1)/2$$.\n- Step 2: The reason: with continuous grouped data, the variable is treated as smoothly distributed within each class, so the median splits the total area exactly in half at $$n/2$$.\n- Step 3: The $$(n+1)/2$$ formula is for **discrete** data where you're locating a specific ordered observation in a finite list — different concept entirely.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "What is the linear interpolation formula for the median of grouped data, and what does each symbol mean? (3 steps)", "answer": "- Step 1: The formula is $$\\text{median} = L + \\frac{n/2 - F}{f_m} \\cdot w$$.\n- Step 2: Symbol meanings:\n+ $$L$$ = lower boundary of the median class\n+ $$F$$ = cumulative frequency **before** the median class\n+ $$f_m$$ = frequency of the median class\n+ $$w$$ = width of the median class\n- Step 3: Intuition: $$(n/2 - F)/f_m$$ is the fraction of the way through the median class needed to reach the 137th value, then scale by class width $$w$$.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "Before computing the median of grouped data, what column MUST you write down, and why is this a strategy-saver?", "answer": "- Step 1: Write the **cumulative frequency column** explicitly: e.g. $$5, 65, 135, 235, \\ldots$$\n- Step 2: Now you can immediately see which class contains the $$n/2$$-th value (the first class whose cumulative frequency exceeds $$n/2$$).\n- Step 3: The pitfall this avoids: trying to subtract bar frequencies sequentially in your head (e.g. \"$$274/2 = 137$$, $$274 - 60 = 214$$...\"), which quickly loses track of which class actually contains the median.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "For the grouped-data mean, what values do you multiply by the frequencies — boundaries or midpoints — and why?", "answer": "- Step 1: Use **midpoints** $$x_{\\text{mid}}$$ of each class, not boundaries.\n- Step 2: Formula: $$\\bar x = \\frac{\\sum f \\cdot x_{\\text{mid}}}{\\sum f}$$.\n- Step 3: Intuition: within each class, we assume values are uniformly distributed, so the class midpoint is the best single representative. Using a boundary would systematically bias the mean upward or downward.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "S1 May 2023 Q2(a) — what is the computational formula for $$S_{tw}$$, and what's the most common sign error?", "answer": "- Step 1: The formula is $$S_{tw} = \\sum tw - \\frac{\\sum t \\cdot \\sum w}{n}$$.\n- Step 2: The common error: writing $$+$$ instead of $$-$$ between the two terms. It is always a **subtraction**.\n- Step 3: Memory hook: $$S_{tw}$$ measures deviation from the means, so we subtract off the contribution that the means alone would give.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "In a \"show that the regression line is $$w = -16.7 + 4.77t$$\" question, what discipline must you follow with rounding, and why?", "answer": "- Step 1: Carry **at least 5 significant figures** through every intermediate calculation ($$S_{tw}$$, $$\\bar t$$, $$\\bar w$$, $$b$$, $$a$$).\n- Step 2: Only round at the **final** step to match the printed coefficients.\n- Step 3: Motivation: premature rounding (e.g. quoting $$S_{tw} \\approx 25.4$$ and using that to compute $$b$$) accumulates error and the printed answer will fail to appear — losing the \"show that\" mark even though your method is correct.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "For \"the regression line of $$w$$ on $$t$$\", which variable appears in the denominator of the gradient formula, and why?", "answer": "- Step 1: $$b = \\frac{S_{tw}}{S_{tt}}$$ — the **explanatory variable** $$t$$ goes in the denominator.\n- Step 2: Rule: \"$$y$$ on $$x$$\" means $$x$$ is the predictor, so divide by $$S_{xx}$$.\n- Step 3: Common confusion: students flip the formula and divide by $$S_{ww}$$, which gives the regression of $$t$$ on $$w$$ — a different line with a different gradient.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "S1 May 2023 Q2(d) — when asked to \"interpret the gradient\" of a regression line $$w = -16.7 + 4.77t$$ with $$w$$ in grams and $$t$$ in cm, what's the marking-scheme-precise phrasing?", "answer": "- Step 1: Say: \"For each additional **1 cm of tail length**, the weight increases by approximately **4.77 g**.\"\n- Step 2: Three required elements: (i) the unit increase (1 cm), (ii) the response change (4.77 g), (iii) units stated on both sides.\n- Step 3: Pitfall: just saying \"the gradient is 4.77\" with no contextual interpretation scores zero — the question explicitly asks for an *interpretation*, meaning units and context.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "For \"explain why it would be inappropriate to predict $$w$$ when $$t = 2$$ cm\", what two-pronged argument do you make?", "answer": "- Step 1: **Range argument**: $$t = 2$$ is far outside the observed range of the data (mean $$\\bar t \\approx 7.65$$ with small spread), so this is **extrapolation** — the linear relationship is only validated where data exist.\n- Step 2: **Impossibility argument** (bonus): substituting $$t=2$$ gives $$w = -16.7 + 4.77(2) \\approx -7.16$$ g, a **negative weight** — physically meaningless, confirming the model breaks down outside the data range.\n- Step 3: Strategy: state both \"outside the range\" AND the impossible/absurd prediction value for full marks.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": true}, {"question": "Why does PMCC stay the same under coding $$x = t - 6$$ and $$y = w/2 - 5$$, and when would it CHANGE?", "answer": "- Step 1: PMCC is invariant under **positive linear coding** of either variable: shifts and positive scalings preserve $$r$$.\n- Step 2: Intuition: $$r$$ measures the *shape/strength* of linear association, dimensionless — translating or rescaling axes doesn't change how tightly the points cluster around a line.\n- Step 3: $$r$$ would flip sign (but keep magnitude) if a **negative** scale factor were used (e.g. $$y = -w$$); it would only change in magnitude if the coding were non-linear (e.g. $$y = w^2$$).", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": true}, {"question": "S1 May 2023 Q2(g) — for the regression line of coded variables $$y$$ on $$x$$ given the original line $$w = -16.7 + 4.77t$$, what's the SHORTCUT and why is it correct?", "answer": "- Step 1: **Substitute the coding** $$t = x + 6$$ and $$w = 2y + 10$$ directly into the original line: $$2y + 10 = -16.7 + 4.77(x + 6)$$.\n- Step 2: Why this works: the regression line is a relationship between $$t$$ and $$w$$; expressing the same relationship in new variables means just renaming via algebra — the line geometrically is the same line, just on relabelled axes.\n- Step 3: Motivation: the question often adds \"you do not need to simplify\" — that's a deliberate hint that substitution (not recomputation of $$S_{xy}, S_{xx}$$) is intended.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "When data are coded as $$x = l - 600$$, what's the rule for converting $$\\bar x \\to \\bar l$$ and $$\\mathrm{Var}(x) \\to \\mathrm{Var}(l)$$?", "answer": "- Step 1: **Mean**: reverse the shift. $$\\bar l = \\bar x + 600$$.\n- Step 2: **Variance**: leave it untouched. $$\\mathrm{Var}(l) = \\mathrm{Var}(x)$$.\n- Step 3: Intuition: a pure translation shifts all data points by the same amount, so the *centre* moves but the *spread* doesn't change. This is why $$\\mathrm{Var}(x + a) = \\mathrm{Var}(x)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "What's the common error with coded variance, and how do you remember to avoid it?", "answer": "- Step 1: The error: writing \"$$\\mathrm{Var}(l) = \\mathrm{Var}(x) + 600$$\" or \"$$- 600$$\" — i.e. treating variance like mean and reversing the shift.\n- Step 2: Why wrong: variance measures **spread**, not location. Shifting every value left or right doesn't change how far apart they are from each other.\n- Step 3: Memorise: $$\\mathrm{Var}(X + a) = \\mathrm{Var}(X)$$ and $$\\mathrm{Var}(bX) = b^2 \\mathrm{Var}(X)$$ — only **scale factors** affect variance, and they enter **squared**.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "Box plot with median = 4000, $$Q_3 = 5500$$, $$n = 81$$ — what's the maximum number of values that can lie in $$(4600, 7700]$$, and what is the KEY insight?", "answer": "- Step 1: The insight: $$4600 > \\text{median} = 4000$$, so EVERY value in the interval lies strictly above the median.\n- Step 2: By definition of the median for $$n = 81$$, at most $$\\lfloor 81/2 \\rfloor = 40$$ values can lie strictly above 4000.\n- Step 3: So the answer is **40**. The trick: don't try to interpolate inside the box — recognise this as a *conceptual* question about how many values the median allows above itself.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": true}, {"question": "What's the outlier fence rule, and what's the strategic mistake students make when applying it?", "answer": "- Step 1: An outlier lies outside $$[Q_1 - 1.5 \\cdot \\text{IQR},\\ Q_3 + 1.5 \\cdot \\text{IQR}]$$.\n- Step 2: The strategic mistake: checking **only one fence** (e.g. just the upper) because the data \"look fine\" on the other side.\n- Step 3: Discipline: always compute **both** fences and compare **both** extremes (min and max). State both checks explicitly on your script for full marks.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "For a probability tree question with categories A (30%), B (45%), C (rest), what's the FIRST quantity you must compute and write down?", "answer": "- Step 1: Compute the \"rest\" probability: $$P(C) = 1 - P(A) - P(B) = 1 - 0.30 - 0.45 = 0.25$$.\n- Step 2: Without this explicit step, the tree is incomplete and any total-probability or Bayes calculation will be missing a branch.\n- Step 3: Pitfall: students rush into $$P(A)$$ and $$P(B)$$ branches and forget to populate the C row entirely — costing all subsequent marks.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "What's the trigger phrase that forces you to use Bayes' theorem rather than direct conditional probability?", "answer": "- Step 1: Trigger: \"**Given that** [observed effect], find $$P$$([cause])\" — when the *condition* is the effect and you want the *cause*.\n- Step 2: Example: \"Given the counter is red, find $$P(\\text{labelled C})$$\" — you have $$P(R\\mid C)$$ from the tree, but you want $$P(C\\mid R)$$ — these are different, so Bayes is needed.\n- Step 3: Before substituting numbers, **write down** $$P(C \\mid R) = \\frac{P(C) \\cdot P(R \\mid C)}{P(R)}$$ — this earns the method mark even if arithmetic slips.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": true}, {"question": "Why does quoting $$P(R \\mid C) = 0.06$$ fail when the question asks for $$P(C \\mid R)$$?", "answer": "- Step 1: $$P(R \\mid C)$$ and $$P(C \\mid R)$$ are **not equal** in general — they answer different questions.\n- Step 2: $$P(R \\mid C) = 0.06$$ means \"of the C counters, 6% are red\"; $$P(C \\mid R)$$ means \"of the red counters, what fraction are C?\".\n- Step 3: To convert one to the other, you must use Bayes — which incorporates the *prior* $$P(C)$$ and the marginal $$P(R)$$, neither of which equals 1.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "For a discrete RV with piecewise pmf $$P(Y = y) = k(3 - y)$$ for $$y = 1, 2$$ etc., what's the first thing you should ALWAYS do before any further calculation?", "answer": "- Step 1: **Tabulate** the pmf with numerical values (in terms of $$k$$) for every $$y$$ in the support.\n- Step 2: Check each value is **non-negative** — this catches sign errors like writing $$k(y - 3)$$ instead of $$k(3 - y)$$.\n- Step 3: Then sum all entries and set equal to 1 to find $$k$$. The motivation: without the tabulated form, subsequent steps ($$E(Y)$$, $$E(Y^2)$$, probabilities) become error-prone.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "For \"$$X = 15 - 2Y$$, calculate $$P(Y \\le X)$$\", what's the trick to avoid enumerating joint outcomes?", "answer": "- Step 1: Recognise that $$X$$ is a **deterministic function** of $$Y$$ — they are NOT independent.\n- Step 2: Substitute algebraically: $$Y \\le X \\iff Y \\le 15 - 2Y \\iff 3Y \\le 15 \\iff Y \\le 5$$.\n- Step 3: The problem reduces to $$P(Y \\le 5) = 1 - P(Y = 6)$$ — one line from the pmf.\n\nThe pitfall: trying to form joint $$(Y, X)$$ probabilities as if they were independent — wastes time and gives wrong answer.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "For $$\\mathrm{Var}(15 - 2Y)$$, what's the variance transformation rule, and what's the most common error?", "answer": "- Step 1: Rule: $$\\mathrm{Var}(aY + b) = a^2 \\cdot \\mathrm{Var}(Y)$$.\n- Step 2: Here $$a = -2$$, $$b = 15$$, so $$\\mathrm{Var}(15 - 2Y) = (-2)^2 \\cdot \\mathrm{Var}(Y) = 4 \\cdot \\mathrm{Var}(Y)$$.\n- Step 3: Common errors:\n+ Multiplying by $$-2$$ (forgetting to square) → negative variance, nonsense\n+ Multiplying by 2 (forgetting the square) → wrong answer\n+ Not dropping the constant $$+15$$ (variance is location-invariant)", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": true}, {"question": "Why does the constant $$+15$$ vanish from $$\\mathrm{Var}(15 - 2Y)$$ but the $$-2$$ becomes $$+4$$?", "answer": "- Step 1: Variance measures **spread** about the mean. Adding a constant shifts every value (and the mean) by the same amount — so spreads are unchanged.\n- Step 2: Scaling by $$-2$$ stretches every deviation $$(Y - \\mu)$$ to $$-2(Y - \\mu)$$. The variance is $$E[(-2(Y-\\mu))^2] = 4 E[(Y-\\mu)^2]$$ — the sign disappears because we square.\n- Step 3: General rule: shifts don't affect variance; scales affect variance squared.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": true}, {"question": "What's the **conceptual** difference between \"mutually exclusive\" and \"independent\", and why can two events with positive probability not be both?", "answer": "- Step 1: **Mutually exclusive**: $$P(A \\cap B) = 0$$ — the events cannot occur together.\n- Step 2: **Independent**: $$P(A \\cap B) = P(A) \\cdot P(B)$$ — knowing one occurred tells you nothing about the other.\n- Step 3: If both held with $$P(A), P(B) > 0$$, we would need $$0 = P(A) \\cdot P(B) > 0$$ — a contradiction. Intuition: mutually exclusive events are **maximally dependent** (knowing $$A$$ tells you $$B$$ did NOT happen).", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": true}, {"question": "For a three-set Venn diagram, what's the strategic ORDER for filling in regions, and why?", "answer": "- Step 1: Fill **from the centre outward**: (i) triple intersection $$A \\cap B \\cap C$$ first, then (ii) the three pairwise-only regions, then (iii) the three single-only regions, finally (iv) the outside region.\n- Step 2: Why this order: each region's calculation needs the inner regions already known. E.g. \"$$A$$ only\" = $$P(A)$$ minus all overlaps with $$B$$ and $$C$$.\n- Step 3: Final check: all 8 regions must sum to exactly 1 — write this check on your script for an easy verification mark.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": false}, {"question": "When $$A$$ and $$C$$ are mutually exclusive, what does this force on the triple intersection $$A \\cap B \\cap C$$?", "answer": "- Step 1: Since $$A \\cap C = \\emptyset$$, any subset of $$A \\cap C$$ is also empty.\n- Step 2: $$A \\cap B \\cap C \\subseteq A \\cap C = \\emptyset$$, so $$P(A \\cap B \\cap C) = 0$$.\n- Step 3: State this explicitly on your script — examiners reward the reasoning, not just the \"0\".", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "What's the most commonly forgotten region of a three-set Venn diagram in S1, and why does it matter?", "answer": "- Step 1: The **outside region** (outside $$A \\cup B \\cup C$$) is the most commonly forgotten.\n- Step 2: It's computed as $$1 - P(A \\cup B \\cup C)$$, i.e. 1 minus the sum of the seven inside regions.\n- Step 3: Forgetting it costs a mark and fails the \"regions sum to 1\" check — always label it on your diagram.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "For the normal distribution, what's the FIRST thing you should do before consulting any z-table, especially for inverse-normal problems?", "answer": "- Step 1: **Sketch** a standard normal curve and **shade** the region corresponding to the given probability.\n- Step 2: This visually shows you whether $$z$$ is positive (right of mean) or negative (left of mean).\n- Step 3: This single habit prevents the most common error: looking up $$\\Phi(z) = 0.9192$$ and writing $$z = +1.40$$ when actually the lower-tail probability is $$0.0808 < 0.5$$, so $$z = -1.40$$.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "Given $$P(J > d) = 0.9192$$ with $$J \\sim N(500, 25^2)$$, what's the sign of $$z$$ and why?", "answer": "- Step 1: $$P(J > d) > 0.5$$ means more than half the distribution lies above $$d$$, so $$d$$ is **below** the mean.\n- Step 2: Therefore the standardised $$z = (d - 500)/25$$ is **negative**.\n- Step 3: Convert to lower tail: $$P(J \\le d) = 1 - 0.9192 = 0.0808$$, and by symmetry $$\\Phi(-z) = 0.9192 \\Rightarrow -z = 1.40 \\Rightarrow z = -1.40$$.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": true}, {"question": "For \"5 independent bags each yield less than 510 ml\", do you multiply $$P(J < 510)$$ by 5 or raise to the 5th power, and why?", "answer": "- Step 1: **Raise to the 5th power**: $$[P(J < 510)]^5$$.\n- Step 2: Reason: by independence, the joint probability of 5 events all occurring is the product of individual probabilities. Since each probability is the same, this is $$p \\cdot p \\cdot p \\cdot p \\cdot p = p^5$$.\n- Step 3: Multiplying by 5 would correspond (loosely) to the *expected number* of successes, not the probability of all 5 — completely different quantity.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "For a two-equation normal system in $$\\mu$$ and $$\\sigma$$ (or $$r$$ and $$k$$), what's the strategic form to put both equations in BEFORE doing any algebra?", "answer": "- Step 1: Rearrange **both** equations into the form \"$$r = (\\text{constant}) + (\\text{coefficient}) \\cdot k$$\".\n- Step 2: Then equate the two right-hand sides — one linear equation in $$k$$ alone.\n- Step 3: Why this form: it isolates the unknown of interest ($$r$$) consistently across both equations, so elimination by equating is mechanical and minimises sign-slip errors.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "For $$P(R > 3r - 800) = 0.005$$ in a normal-system problem, which z-table do you consult, and what's the precise value?", "answer": "- Step 1: $$0.005$$ is a tail probability — use the **percentage-point table** (Table 4), not the body table.\n- Step 2: The value is $$z_{0.005} = 2.5758$$ (to 4 d.p.).\n- Step 3: Common pitfall: looking up $$\\Phi(z) = 0.995$$ in the body table gives the rounded $$z = 2.58$$ — close but not exact, and may cost a mark on a \"find $$k$$\" or verification step.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "What four percentage-point z-values should you memorise for Edexcel S1, and which scenarios use them?", "answer": "- Step 1: The four key values:\n+ $$z_{0.05} = 1.6449$$ (one-tailed 5%)\n+ $$z_{0.025} = 1.9600$$ (two-tailed 5%, or one-tailed 2.5%)\n+ $$z_{0.01} = 2.3263$$ (one-tailed 1%)\n+ $$z_{0.005} = 2.5758$$ (two-tailed 1%, or one-tailed 0.5%)\n- Step 2: These come from the **percentage-point table** and are more precise than reading from the body table.\n- Step 3: Use them whenever the given probability is a \"nice\" tail value like 0.05, 0.025, 0.01, or 0.005.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "After solving a two-equation normal system for $$(r, k)$$, what verification step should you ALWAYS perform?", "answer": "- Step 1: Substitute $$(r, k)$$ back into **both** original probability statements.\n- Step 2: Compute the resulting $$z$$-values and check they match the originals (e.g. one gives $$z \\approx -1.0364$$, the other $$z \\approx 2.5758$$).\n- Step 3: Also check $$k > 0$$ (a negative standard deviation is meaningless — if you get $$k < 0$$, you've made a sign error somewhere).", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "What's the trigger phrase that forces you to write $$P(A \\cap B) = P(A) \\cdot P(B \\mid A)$$ rather than $$P(A) \\cdot P(B)$$?", "answer": "- Step 1: Trigger: when a conditional probability $$P(B \\mid A)$$ is given directly (as in tree-diagram problems).\n- Step 2: Then $$P(A \\cap B) = P(A) \\cdot P(B \\mid A)$$ — this is the **multiplicative rule** for conditional probability, always valid.\n- Step 3: Only use $$P(A) \\cdot P(B)$$ when **independence is explicitly stated or proven** — otherwise it's wrong.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "For \"show that $$P(B) = 0.18$$\" given $$P(A) = 0.1$$, $$P(B\\mid A) = 0.3$$, $$P(A \\cup B) = 0.25$$, what's the strategic chain of formulas?", "answer": "- Step 1: First, find $$P(A \\cap B)$$ using the **multiplication rule**: $$P(A \\cap B) = P(A) \\cdot P(B \\mid A) = 0.1 \\times 0.3 = 0.03$$.\n- Step 2: Then apply **inclusion-exclusion**: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$.\n- Step 3: Rearrange for $$P(B)$$: $$0.25 = 0.1 + P(B) - 0.03 \\Rightarrow P(B) = 0.18$$.\n\nThe key: write both formulas BEFORE substituting — this earns method marks even if arithmetic slips.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "For S1 May 2023 Q6(c), once you know $$B$$ and $$C$$ are independent, how do you compute $$P(B \\cap C)$$?", "answer": "- Step 1: Independence means $$P(B \\cap C) = P(B) \\cdot P(C)$$ — multiply the marginals directly.\n- Step 2: $$P(B \\cap C) = 0.18 \\times 0.5 = 0.09$$.\n- Step 3: Pitfall: students sometimes set $$P(B \\cap C) = 0$$ by confusion with the mutually-exclusive condition on $$A$$ and $$C$$ from earlier parts. Read each condition carefully — independence and mutual exclusivity are separate, **incompatible**, conditions.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": false}, {"question": "What's the time budget per mark for Edexcel S1 paper (75 marks in 90 min), and how should you allocate it to the harder questions?", "answer": "- Step 1: 90 min / 75 marks = **1.2 minutes per mark**.\n- Step 2: Allocate roughly Q1≈10 min, Q2≈15 min, Q3≈11 min, Q4≈11 min, Q5≈15 min, Q6≈11 min, Q7≈17 min.\n- Step 3: Reserve the final 5 min for checking — especially \"show that\" rounding, inverse-normal signs, and Venn-region sum = 1.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "For a \"show that\" question with a printed answer (e.g. $$k = 1/30$$), what's the strategic risk if you spot the answer too early?", "answer": "- Step 1: The risk: writing \"$$30k = 1$$ so $$k = 1/30$$\" without showing **how** you got $$30k$$ in the first place.\n- Step 2: The marker needs to see your pmf tabulation summing each individual term: $$2k + k + k + 8k + 17k + k$$.\n- Step 3: Strategy: always show the **full sum** explicitly, then equate to 1, then conclude — never skip the tabulation step even if you can see the answer.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": true}, {"question": "What's the conceptual reason that $$E(Y^2) \\ne [E(Y)]^2$$ in general, and what role does the difference play?", "answer": "- Step 1: $$E(Y^2)$$ averages the **squared values** of $$Y$$, weighting large values heavily.\n- Step 2: $$[E(Y)]^2$$ is the square of the average — these differ unless $$Y$$ is constant.\n- Step 3: The difference IS the variance: $$\\mathrm{Var}(Y) = E(Y^2) - [E(Y)]^2$$. It measures how much the squared deviations from the mean accumulate — i.e. the spread.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "For computing $$E(Y^2)$$ from a tabulated pmf, what's the arithmetic discipline to avoid the most common slip?", "answer": "- Step 1: Compute each term $$y^2 \\cdot P(Y = y)$$ separately in a column — do not try to do it mentally.\n- Step 2: The riskiest term is the largest: e.g. $$25 \\times 17/30 = 425/30$$ — students often slip on the multiplication of larger pairs.\n- Step 3: Sum the numerators, then divide by the common denominator once at the end.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "In a regression problem, what's the difference between \"$$y$$ on $$x$$\" and \"$$x$$ on $$y$$\" regression lines, and when does it matter?", "answer": "- Step 1: \"$$y$$ on $$x$$\" uses $$x$$ as the predictor: $$b = S_{xy}/S_{xx}$$ — minimises vertical (in $$y$$) residuals.\n- Step 2: \"$$x$$ on $$y$$\" uses $$y$$ as the predictor: $$b' = S_{xy}/S_{yy}$$ — minimises horizontal (in $$x$$) residuals.\n- Step 3: They are **different lines** in general (only coincide when $$r = \\pm 1$$). Always check the question wording carefully — the denominator must match the explanatory variable.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "Why does the PMCC satisfy $$-1 \\le r \\le 1$$, and what does each extreme mean intuitively?", "answer": "- Step 1: $$r$$ is a normalised covariance: $$r = S_{xy}/\\sqrt{S_{xx} S_{yy}}$$. The Cauchy-Schwarz inequality gives $$|S_{xy}|^2 \\le S_{xx} S_{yy}$$, so $$|r| \\le 1$$.\n- Step 2: $$r = +1$$: data lie EXACTLY on a line with positive slope. $$r = -1$$: exactly on a line with negative slope.\n- Step 3: $$r = 0$$: no linear relationship (data could still be related non-linearly, e.g. parabola).", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": true}, {"question": "For a discrete RV, what's the SUM-to-1 constraint and why must you check it FIRST?", "answer": "- Step 1: $$\\sum_y P(Y = y) = 1$$ — the probabilities over all values in the support must sum to exactly 1.\n- Step 2: Use this constraint to find unknown constants (like $$k$$) before any other calculation.\n- Step 3: Why first: $$E(Y)$$, $$\\mathrm{Var}(Y)$$, and any probability calculation all depend on having a valid pmf. If $$k$$ is wrong, everything downstream is wrong.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": false}, {"question": "What's the conceptual difference between linear interpolation in a histogram median and direct interpolation in a box plot?", "answer": "- Step 1: Histogram median: you HAVE the class boundaries and class frequencies, so $$L + \\frac{n/2 - F}{f_m} w$$ gives a precise interpolated estimate.\n- Step 2: Box plot: you only have 5 numbers ($$\\min, Q_1, \\text{med}, Q_3, \\max$$) — you do NOT know the within-quartile distribution, so direct interpolation is invalid.\n- Step 3: For box plot \"max count\" questions, reason from the **definitions** of quartiles (how many points each quartile bounds), not interpolation.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": false}, {"question": "For the total probability formula $$P(R) = \\sum_i P(L_i) P(R \\mid L_i)$$, what's the conceptual picture?", "answer": "- Step 1: The sample space is partitioned into mutually exclusive categories $$L_1, L_2, \\ldots$$ (here: labelled A, B, C).\n- Step 2: Each category contributes a slice to $$P(R)$$: the size of the category $$P(L_i)$$ times the rate within that category $$P(R \\mid L_i)$$.\n- Step 3: Summing these slices reconstructs the marginal $$P(R)$$ — exactly like adding up the red counters from each labelled subgroup.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": false}, {"question": "Why does Bayes' theorem need the marginal $$P(R)$$ in the denominator, and what would happen without it?", "answer": "- Step 1: $$P(C \\mid R) = P(C \\cap R) / P(R)$$ by definition of conditional probability.\n- Step 2: We can compute the numerator $$P(C \\cap R) = P(C) P(R \\mid C)$$ directly from the tree.\n- Step 3: But the denominator $$P(R)$$ requires summing over **all** ways $$R$$ can occur — that's why total probability comes in. Without it, you'd just have $$P(C \\cap R)$$, which is the *joint* probability, not the *conditional*.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": true}, {"question": "In S1 May 2023 Q5(d), why doesn't the answer change if you replace \"$$P(Y \\le X)$$\" with \"$$P(X \\ge Y)$$\"?", "answer": "- Step 1: $$Y \\le X$$ and $$X \\ge Y$$ are the **same event** — just written with the comparison flipped.\n- Step 2: Both reduce to $$Y \\le 15 - 2Y \\iff Y \\le 5$$ via algebraic substitution of $$X = 15 - 2Y$$.\n- Step 3: Conceptual point: once $$X$$ is a deterministic function of $$Y$$, all probabilities involving $$X$$ and $$Y$$ together collapse to probabilities about $$Y$$ alone.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": false}, {"question": "What's the safest way to read a partial-bar slice like \"$$[22, 30)$$ from a histogram with FD = 7\", and what's the common arithmetic slip?", "answer": "- Step 1: The slice width is $$30 - 22 = 8$$ (NOT 7 or 10).\n- Step 2: Frequency = FD × width = $$7 \\times 8 = 56$$.\n- Step 3: Common slip: confusing the width with the FD (writing $$7 \\times 7 = 49$$), or using full class width 10 even though only 8 of the bar is needed.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": false}, {"question": "Why is the regression intercept formula $$a = \\bar y - b \\bar x$$ guaranteed to make the line pass through $$(\\bar x, \\bar y)$$?", "answer": "- Step 1: Substitute $$x = \\bar x$$ into $$y = a + bx$$: gives $$y = a + b \\bar x$$.\n- Step 2: Setting $$a = \\bar y - b \\bar x$$ makes this $$y = (\\bar y - b \\bar x) + b \\bar x = \\bar y$$. ✓\n- Step 3: This is a fundamental property of least-squares regression: **the line always passes through the centroid** $$(\\bar x, \\bar y)$$ of the data.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": false}, {"question": "For a \"find the maximum number of values\" box-plot question, why is the answer typically a clean integer like 40 (not interpolated)?", "answer": "- Step 1: The question asks for a **maximum**, i.e. an upper bound — this is determined by the structural properties of the box plot (positions of quartiles relative to $$n$$).\n- Step 2: Box plots specify the median and quartiles, which control how many points lie ABOVE/BELOW each landmark exactly.\n- Step 3: For $$n$$ odd: at most $$(n-1)/2$$ values lie strictly above the median. For $$n = 81$$: $$40$$. No interpolation needed.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": false}, {"question": "What's the conceptual difference between $$\\Phi(z)$$ (body of normal table) and the percentage-point table?", "answer": "- Step 1: $$\\Phi(z)$$ table: given $$z$$, returns the cumulative probability $$P(Z \\le z)$$ to 4 d.p. Used for **forward** lookups.\n- Step 2: Percentage-point table (Table 4): given a tail probability $$p$$, returns the $$z$$-value $$z_p$$ such that $$P(Z > z_p) = p$$. Used for **inverse** lookups at standard significance levels.\n- Step 3: Percentage-point values are typically given to 4 d.p. and are **more precise** than rounding-derived values from the body table for the standard 5%, 2.5%, 1%, 0.5% tail values.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": false}, {"question": "When standardising a single value $$X = x$$ to $$Z = (x - \\mu)/\\sigma$$, what intuition does this give about location relative to the mean?", "answer": "- Step 1: $$z > 0$$ ⇒ $$x$$ is **above** the mean.\n- Step 2: $$z < 0$$ ⇒ $$x$$ is **below** the mean.\n- Step 3: $$|z|$$ measures the distance from the mean in **standard deviations** — e.g. $$z = 2$$ means \"2 standard deviations above $$\\mu$$\". This lets you compare values from different normal distributions on a common scale.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": false}, {"question": "For a regression line of $$w$$ on $$t$$, why is using $$t = 2$$ (well outside data range) called *extrapolation*, and why is it dangerous?", "answer": "- Step 1: Extrapolation = predicting outside the range of $$t$$-values where data were observed.\n- Step 2: Danger: the assumption \"the relationship is linear\" was only validated **within** the observed range. Beyond it, the relationship could curve, plateau, or even change sign.\n- Step 3: The model says nothing about what happens at $$t = 2$$ cm, so any prediction is unreliable — and may even be nonsensical (e.g. negative weight).", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": false}], "count": 55}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "S1 May 2023 Q1 — Histogram with 274 people, given 60 in $$[10, 20)$$ km. What is the FIRST step you must do BEFORE reading any other bar, and why?", "answer": "- Step 1: Calibrate the frequency-density scale using the named class. With 60 people in a class of width 10, $$\\text{FD} = 60/10 = 6$$.\n- Step 2: Use this FD value to interpret what the y-axis tick marks actually represent — you do NOT read FD directly off the printed axis.\n- Step 3: Once calibrated, read every other bar's FD off your derived scale, then convert via $$f = \\text{FD} \\times w$$.\n\nMr. Fuat's mantra: \"Calibrate first, then never read FD off the axis again — read off your scale.\" This single habit prevents nearly every Q1-style error.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "Histogram question asks for \"the number of people who travel between 22 km and 45 km\" (Q1a, S1 May 2023). What's the TRICK that distinguishes this from a clean class-boundary query?", "answer": "- Step 1: Recognise this slices ACROSS three bars with PARTIAL bars at both ends — 22 is inside $$[20,30)$$, and 45 is inside $$[40,50)$$.\n- Step 2: Compute each partial slice as $$\\text{FD} \\times (\\text{sub-width})$$, NOT as a fraction of the full bar's frequency.\n+ $$[22,30)$$: sub-width $$= 30-22 = 8$$, so $$f = 8 \\times \\text{FD}$$\n+ $$[30,40)$$: full bar, take the whole frequency\n+ $$[40,45)$$: sub-width $$= 45-40 = 5$$, so $$f = 5 \\times \\text{FD}$$\n- Step 3: Sum the three slices.\n\nCommon pitfall: treating \"between 22 and 45\" as if it covers full bars $$[20,40)$$ minus a guess for the leftover — this conflates full and partial bars.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": true}, {"question": "For a continuous grouped-data histogram, what is the median position formula, and why is it NOT $$(n+1)/2$$?", "answer": "- Step 1: Use position $$= n/2$$ for continuous (grouped) data — NOT $$(n+1)/2$$.\n- Step 2: The $$(n+1)/2$$ formula is for DISCRETE data where you literally pick the middle observation from an ordered list.\n- Step 3: For continuous data, we treat the distribution as if values are uniformly spread within each class, so the median is the value at which the cumulative area equals half — pure $$n/2$$.\n\nMisapplication costs an \"off-by-half\" error that propagates into linear interpolation.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "For a grouped-data median by linear interpolation, what is the formula and what does each symbol mean?", "answer": "- Step 1: $$\\text{median} = L + \\frac{n/2 - F}{f_m} \\cdot w$$\n- Step 2: Symbols:\n+ $$L$$ = lower boundary of the median class\n+ $$F$$ = cumulative frequency BEFORE the median class\n+ $$f_m$$ = frequency of the median class\n+ $$w$$ = width of the median class\n- Step 3: Intuition: $$(n/2 - F)/f_m$$ is the FRACTION of the way through the median class where the median sits; multiply by $$w$$ to convert that fraction to a distance, then add to $$L$$.\n\nYou MUST write a cumulative-frequency column first — never try to sequentially subtract bar frequencies as you go.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "When computing the mean of grouped data, which value from each class do you multiply by the frequency — boundary or midpoint? Why?", "answer": "- Step 1: Use the MIDPOINT $$x_{\\text{mid}}$$, not any boundary.\n- Step 2: Mean formula: $$\\bar x = \\frac{\\sum f \\cdot x_{\\text{mid}}}{\\sum f}$$.\n- Step 3: Intuition: within each class, we assume the data are uniformly distributed, so on AVERAGE each observation equals the midpoint. Using a boundary would systematically bias the mean to one side.\n\nBoundary use is a classic mark-scheme killer — always write midpoints in a column before summing.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "S1 May 2023 Q2(a) — given $$\\sum tw = 2304.53$$, $$\\sum t = 114.8$$, $$\\sum w = 297.8$$, $$n = 15$$. What's the SIGN trap in computing $$S_{tw}$$?", "answer": "- Step 1: The formula is $$S_{tw} = \\sum tw - \\frac{\\sum t \\cdot \\sum w}{n}$$ — note the MINUS sign.\n- Step 2: Students often slip and write $$+\\frac{\\sum t \\sum w}{n}$$, especially under time pressure. This produces a huge positive number and a PMCC > 1, which is impossible.\n- Step 3: Sanity check: if you get $$|r| > 1$$, the most likely cause is a sign error in $$S_{xy}$$.\n\nAlways write the formula explicitly before substituting numbers.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "\"Show that\" $$w = -16.7 + 4.77t$$ is the printed answer in a regression question. What rounding discipline must you adopt, and why?", "answer": "- Step 1: Carry $$\\geq 5$$ significant figures through ALL intermediate quantities ($$S_{tw}$$, $$S_{tt}$$, $$\\bar t$$, $$\\bar w$$, $$b$$, $$a$$) before rounding the final printed form.\n- Step 2: Premature rounding (e.g. quoting $$\\bar t = 7.65$$ instead of $$7.65333$$) typically shifts the intercept by 0.1 or more, so the printed $$-16.7$$ won't materialise cleanly.\n- Step 3: Specifically for \"show that\" with printed coefficients, write the gradient and intercept to at least 4 s.f. before rounding to the printed form, so the examiner sees a credible derivation.\n\nMark scheme awards \"show\" marks only when the working clearly produces the printed value — a numerical near-miss is a method mark loss.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": true}, {"question": "When writing the regression line of \"$$w$$ on $$t$$\" (Q2c), what determines which $$S$$-quantity goes in the DENOMINATOR of the gradient?", "answer": "- Step 1: For \"$$w$$ on $$t$$\" (i.e. $$w$$ is the response, $$t$$ is the explanatory variable), the gradient is $$b = \\frac{S_{tw}}{S_{tt}}$$.\n- Step 2: The denominator is always the $$S$$-quantity of the EXPLANATORY (independent) variable — here, $$S_{tt}$$.\n- Step 3: Confusing \"$$w$$ on $$t$$\" with \"$$t$$ on $$w$$\" puts $$S_{ww}$$ in the denominator and gives a completely wrong gradient.\n\nMemory aid: the variable you regress ONTO sits in the denominator (it's the \"ruler\" you measure against).", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "A regression line gives $$w = -16.7 + 4.77t$$. How do you INTERPRET the gradient of 4.77 in context (1-mark interpretation question)?", "answer": "- Step 1: State a change in $$w$$ PER unit change in $$t$$, with UNITS.\n- Step 2: \"For each additional 1 cm of tail length, the weight increases by approximately 4.77 g.\"\n- Step 3: The interpretation must include: (i) the direction (increase), (ii) the magnitude (4.77), (iii) the units of both variables (cm, g).\n\nMarks lost when students write \"$$w$$ increases by 4.77 as $$t$$ increases by 1\" — no units, no full credit.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "Why is it INAPPROPRIATE to use a regression line $$w = -16.7 + 4.77t$$ (fitted to tail lengths 6.4–8.9 cm) to predict the weight at $$t = 2$$ cm?", "answer": "- Step 1: $$t = 2$$ is FAR outside the range of the data the line was fitted to (extrapolation).\n- Step 2: Substituting: $$w = -16.7 + 4.77 \\times 2 = -7.16$$ g — a NEGATIVE weight, which is physically impossible.\n- Step 3: Mention BOTH points for full marks: (i) it's extrapolation outside the range, and (ii) ideally cite the impossible prediction value.\n\nThe strongest answer always quotes the impossible numerical prediction — it shows you tested the model.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": true}, {"question": "S1 May 2023 Q2(f) — data are coded $$x = t - 6$$ and $$y = w/2 - 5$$. What happens to the PMCC under this coding, and WHY?", "answer": "- Step 1: PMCC is INVARIANT under positive linear coding, so $$r_{xy} = r_{tw} = 0.827$$.\n- Step 2: Intuition: PMCC measures the STRENGTH and DIRECTION of linear association, both of which are preserved when you shift (adds a constant) or scale POSITIVELY (multiplies by a positive number).\n- Step 3: Scope: if either scale factor were negative (e.g. $$y = 5 - w/2$$), the SIGN of $$r$$ would flip, though the magnitude stays the same.\n\nThe rule: positive linear coding preserves $$r$$ completely; negative coding flips the sign only.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": true}, {"question": "A coded-regression question (Q2g style) says \"write down the regression line of $$y$$ on $$x$$, you do not need to simplify\". What's the SHORTCUT that bypasses redoing all the $$S$$-calculations?", "answer": "- Step 1: Take the EXISTING line in original variables (e.g. $$w = -16.7 + 4.77t$$).\n- Step 2: SUBSTITUTE the inverse coding to express each original variable in terms of the coded one:\n+ $$t = x + 6$$ (from $$x = t - 6$$)\n+ $$w = 2y + 10$$ (from $$y = w/2 - 5$$)\n- Step 3: Substitute into the line: $$2y + 10 = -16.7 + 4.77(x + 6)$$. Leave it unsimplified — the question explicitly allows that.\n\nRecomputing $$S_{xy}/S_{xx}$$ from coded data wastes 5+ minutes and is what the \"you do not need to simplify\" hint is warning you against.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": true}, {"question": "What's the conceptual relationship between mutually exclusive and independent events for two events with positive probability?", "answer": "- Step 1: Mutually exclusive: $$P(A \\cap B) = 0$$.\n- Step 2: Independent: $$P(A \\cap B) = P(A) P(B)$$.\n- Step 3: If $$P(A) > 0$$ and $$P(B) > 0$$, then $$P(A)P(B) > 0$$, so they CANNOT both hold. Mutually exclusive events with positive probability are NECESSARILY dependent (knowing one occurred tells you the other did NOT).\n\nThese are fundamentally OPPOSITE concepts, not synonyms — a frequent S1 conceptual confusion.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "S1 May 2023 Q3(a) — coded data $$x = l - 600$$ with $$\\sum x = 3711$$, $$n = 81$$. How do you recover the mean of the ORIGINAL variable $$l$$?", "answer": "- Step 1: Compute the coded mean first: $$\\bar x = 3711/81 = 45.81$$.\n- Step 2: REVERSE the coding by adding back the shift: $$\\bar l = \\bar x + 600 = 645.81$$ mm.\n- Step 3: The rule: $$\\bar{(l-a)} = \\bar l - a$$, so $$\\bar l = \\bar x + a$$. The mean translates with the data.\n\nCoding the data by a shift moves the mean by the same shift — no scale factor here because the coding only subtracted, didn't divide.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "Under the coding $$x = l - 600$$, how does the VARIANCE of $$l$$ relate to the variance of $$x$$? Why?", "answer": "- Step 1: Variance is INVARIANT under translation (shift): $$\\mathrm{Var}(l) = \\mathrm{Var}(x)$$.\n- Step 2: Rule: $$\\mathrm{Var}(x + a) = \\mathrm{Var}(x)$$ for any constant $$a$$.\n- Step 3: Intuition: variance measures SPREAD around the mean. Shifting every data point by the same constant moves the mean by the same constant too, so the spreads are unchanged.\n\nClassic error: writing \"$$\\mathrm{Var}(l) = \\mathrm{Var}(x) - 600$$\" — this is a non-sequitur. The shift cancels out.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "Under coding $$X = (x - a)/b$$ (shift AND scale), how do the mean and variance of $$x$$ relate to those of $$X$$?", "answer": "- Step 1: Mean: $$\\bar X = (\\bar x - a)/b$$, so to recover, $$\\bar x = a + b \\bar X$$.\n- Step 2: Variance: $$\\mathrm{Var}(X) = \\mathrm{Var}(x)/b^2$$, so to recover, $$\\mathrm{Var}(x) = b^2 \\mathrm{Var}(X)$$.\n- Step 3: Intuition: the shift $$a$$ does nothing to the variance (only to the mean); the scale $$b$$ shrinks distances by $$b$$, hence shrinks variance by $$b^2$$.\n\nThe variance picks up the SQUARE of the scale factor — a recurring pattern (see also $$\\mathrm{Var}(aY+b) = a^2 \\mathrm{Var}(Y)$$).", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "S1 May 2023 Q3(c) — box plot has median = 4000. Question asks for the MAX number of salmon in $$4600 < w \\le 7700$$ (with $$n = 81$$). What's the conceptual trick?", "answer": "- Step 1: Recognise this is NOT an interpolation question — it's a COUNTING-via-definition question.\n- Step 2: Since $$4600 > 4000 = $$ median, every value in $$(4600, 7700]$$ lies strictly above the median.\n- Step 3: By the definition of the median with $$n = 81$$ (odd), at most $$\\lfloor 81/2 \\rfloor = 40$$ values can lie strictly above the median.\n\nMisapplication: trying to interpolate inside the upper-half \"box\" via $$(Q_3 - 4600)/\\text{width}$$. The box plot doesn't give enough info for that — only the QUARTILE COUNTS are knowable.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": true}, {"question": "What is the outlier rule used in S1, and what's the discipline for checking it correctly?", "answer": "- Step 1: A value is an outlier if it falls OUTSIDE $$[Q_1 - 1.5 \\cdot \\mathrm{IQR}, \\; Q_3 + 1.5 \\cdot \\mathrm{IQR}]$$.\n- Step 2: ALWAYS compute BOTH fences explicitly, then compare BOTH extremes (min and max) to BOTH fences.\n- Step 3: To \"show no outliers\", write all four comparisons explicitly: $$\\min > $$ lower fence ✓ AND $$\\max < $$ upper fence ✓.\n\nCommon pitfall: comparing only the max to the upper fence because the data \"look fine\" — examiners want both checks on paper.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "S1 May 2023 Q4 — bag contains counters labelled A (30%), B (45%), C (the rest), with red probabilities 2%, 4%, 6%. What's the first quantity you compute, and how?", "answer": "- Step 1: Compute $$P(C)$$ from \"the rest\": $$P(C) = 1 - 0.30 - 0.45 = 0.25$$.\n- Step 2: Then build the tree: 3 first-level branches (A, B, C) and 2 second-level branches (red, not red) under each.\n- Step 3: Label every branch with its probability; verify each pair of second-level branches sums to 1 (e.g. $$0.02 + 0.98 = 1$$ ✓).\n\nMark-scheme rule: a labelled, complete tree typically secures 2 marks even if subsequent arithmetic slips.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "What's the trigger phrase \"given that...\" in conditional probability, and what's the FIRST thing you must write down?", "answer": "- Step 1: \"Given that $$B$$\" → conditional probability → write $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$ BEFORE substituting numbers.\n- Step 2: Identify which event is the CONDITIONING event (after \"given\") — that goes in the denominator.\n- Step 3: Then locate or compute both $$P(A \\cap B)$$ and $$P(B)$$ separately, then divide.\n\nFor Bayes-style reversal questions, ALWAYS write the formula on the script first — it secures the method mark even if arithmetic slips.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "S1 May 2023 Q4(d): \"given the counter is red, find $$P(\\text{labelled C})$$\". What's the DIRECTION trap with Bayes' theorem here?", "answer": "- Step 1: The question asks $$P(C \\mid R)$$ — NOT $$P(R \\mid C) = 0.06$$ (which is given in the setup).\n- Step 2: Bayes reverses the conditioning: $$P(C \\mid R) = \\frac{P(C) \\cdot P(R \\mid C)}{P(R)}$$.\n- Step 3: Conceptual check: $$P(C \\mid R)$$ asks \"of all RED counters, what fraction are labelled C?\" whereas $$P(R \\mid C)$$ asks \"of all C-labelled counters, what fraction are red?\" — totally different populations.\n\nA common slip is to quote the given $$P(R \\mid C) = 0.06$$ as the answer. Always check direction by reading the \"given\" condition carefully.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": true}, {"question": "How do you compute the total probability $$P(R)$$ when red counters can come from three label types A, B, C?", "answer": "- Step 1: Apply the law of total probability — sum over each \"path\" through the tree:\n$$P(R) = P(A)P(R \\mid A) + P(B)P(R \\mid B) + P(C)P(R \\mid C).$$\n- Step 2: This is the SUM of all branch products in the tree leading to a red counter.\n- Step 3: Common pitfall: forgetting the third row entirely (only summing A and B contributions). Always check that ALL leaves are accounted for.\n\nThis $$P(R)$$ then becomes the DENOMINATOR of any reverse-Bayes question that follows.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "S1 May 2023 Q5(a) — pmf has $$P(Y=y) = k(3-y)$$ for $$y=1,2$$, $$k(y^2-8)$$ for $$y=3,4,5$$, $$k$$ for $$y=6$$. How do you find $$k$$ without sign errors?", "answer": "- Step 1: Tabulate the probabilities NUMERICALLY first, evaluating each piece at each value of $$y$$:\n+ $$y=1$$: $$k(3-1) = 2k$$\n+ $$y=2$$: $$k(3-2) = k$$\n+ $$y=3$$: $$k(9-8) = k$$\n+ $$y=4$$: $$k(16-8) = 8k$$\n+ $$y=5$$: $$k(25-8) = 17k$$\n+ $$y=6$$: $$k$$\n- Step 2: Sum to 1: $$2k + k + k + 8k + 17k + k = 30k = 1$$.\n- Step 3: Solve $$k = 1/30$$.\n\nTabulating numerically (not symbolically) catches sign errors before they propagate. Critical for $$k(3-y)$$ where it's easy to slip to $$(y-3)$$ and get negative probabilities.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "For a discrete RV $$Y$$, what is the rule for finding $$E(Y)$$ given a pmf, and what's the systematic format?", "answer": "- Step 1: $$E(Y) = \\sum_y y \\cdot P(Y=y)$$.\n- Step 2: Tabulate $$y$$, $$P(Y=y)$$, and $$y \\cdot P(Y=y)$$ as three columns; sum the third column.\n- Step 3: Keep probabilities as fractions with common denominator (e.g. all over 30) — minimises arithmetic slips.\n\nThen for variance: tabulate $$y^2 \\cdot P(Y=y)$$ as a fourth column to compute $$E(Y^2)$$, and apply $$\\mathrm{Var}(Y) = E(Y^2) - [E(Y)]^2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "S1 May 2023 Q5(d): $$X = 15 - 2Y$$, find $$P(Y \\le X)$$. What's the KEY INSIGHT that prevents over-complicating?", "answer": "- Step 1: Recognise $$X$$ is a DETERMINISTIC FUNCTION of $$Y$$ — they are perfectly dependent, NOT independent.\n- Step 2: Substitute the definition of $$X$$ directly into the inequality: $$Y \\le 15 - 2Y$$, which gives $$3Y \\le 15$$, so $$Y \\le 5$$.\n- Step 3: Then $$P(Y \\le X) = P(Y \\le 5) = 1 - P(Y = 6)$$.\n\nMisapplication: trying to enumerate joint $$(Y, X)$$ pairs as if they were independent — wastes time and gives a wrong answer.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "What is the rule for $$\\mathrm{Var}(aY + b)$$, and what's the most common error in applying it?", "answer": "- Step 1: $$\\mathrm{Var}(aY + b) = a^2 \\mathrm{Var}(Y)$$ — the multiplier is SQUARED, and the constant $$b$$ disappears.\n- Step 2: For $$X = 15 - 2Y$$, $$a = -2$$ and $$b = 15$$, so $$\\mathrm{Var}(X) = (-2)^2 \\mathrm{Var}(Y) = 4 \\mathrm{Var}(Y)$$.\n- Step 3: Common errors:\n+ Writing $$\\mathrm{Var}(X) = -2 \\mathrm{Var}(Y)$$ — missing the square, giving a NEGATIVE variance.\n+ Writing $$\\mathrm{Var}(X) = 2 \\mathrm{Var}(Y)$$ — forgetting to square the magnitude.\n+ Adding 15: $$\\mathrm{Var}(X) = 4 \\mathrm{Var}(Y) + 15$$ — constants don't contribute.\n\nAlways check: variance must be POSITIVE. A negative answer signals a missing square.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": true}, {"question": "WHY does $$\\mathrm{Var}(aY + b) = a^2 \\mathrm{Var}(Y)$$ — what's the geometric intuition behind both the square and the disappearing $$b$$?", "answer": "- Step 1: Variance measures the AVERAGE SQUARED DEVIATION from the mean.\n- Step 2: The constant $$b$$ shifts the entire distribution by $$b$$ — the spread around the (new) mean is unchanged, so $$b$$ disappears.\n- Step 3: The scale $$a$$ multiplies every deviation by $$|a|$$; since variance squares deviations, it picks up $$|a|^2 = a^2$$. The square comes from the squaring inside the variance definition.\n\nThis is exactly parallel to coding-of-variance: $$\\mathrm{Var}((x-a)/b) = \\mathrm{Var}(x)/b^2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": true}, {"question": "S1 May 2023 Q6 — given $$P(A) = 0.1$$, $$P(B \\mid A) = 0.3$$, $$P(A \\cup B) = 0.25$$. How do you derive $$P(B)$$ in 2 steps?", "answer": "- Step 1: From conditional probability: $$P(A \\cap B) = P(A) \\cdot P(B \\mid A) = 0.1 \\times 0.3 = 0.03$$.\n- Step 2: Apply inclusion-exclusion: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$, so $$0.25 = 0.10 + P(B) - 0.03$$.\n- Step 3: Solve: $$P(B) = 0.25 - 0.10 + 0.03 = 0.18$$.\n\nKey habit: when you see \"$$P(B \\mid A)$$\" provided, the first move is ALWAYS to compute $$P(A \\cap B) = P(A) P(B \\mid A)
