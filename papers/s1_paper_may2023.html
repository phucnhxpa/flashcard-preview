r **$$\\text{Var}(aY + b) = a^2 \\text{Var}(Y)$$** in complete isolation, until it is automatic.\n- Step 2: Why this is highest-leverage:\n+ The formula has TWO things students forget: (i) the constant $$b$$ drops out entirely (no contribution), (ii) the coefficient $$a$$ is **squared**, not used as-is.\n+ A sign error ($$a$$ instead of $$a^2$$) on $$X = 15 - 2Y$$ gives $$-2 \\cdot \\text{Var}(Y) < 0$$ — a negative variance, which is impossible.\n+ Without the formula, students laboriously compute $$E(X)$$, $$E(X^2)$$, $$E(X)^2$$, $$\\text{Var}(X)$$ from scratch via the pmf of $$X$$ — taking 4 minutes and introducing four extra arithmetic slip opportunities.\n- Step 3: With the formula mastered, the Q5(e) computation becomes:\n+ Compute $$\\text{Var}(Y) = 61/45$$ once (1 minute).\n+ Apply $$\\text{Var}(15 - 2Y) = (-2)^2 \\cdot 61/45 = 244/45 \\approx 5.42$$ (30 seconds).\n+ Total: ~90 seconds, with the only error opportunity being the $$\\text{Var}(Y)$$ arithmetic.\n\nTakeaway: drill $$\\text{Var}(aY + b) = a^2 \\text{Var}(Y)$$ in isolation — it's a one-line formula that pays back 2-3 minutes per S1 paper.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_26"}, {"question": "S1 May 2023 Q5(e) — After computing $$\\text{Var}(X)$$ for a discrete-RV transformation, what one-word sanity check do you perform, and why does this catch the most damaging single error? (2 steps)", "answer": "- Step 1: Check that the variance is **positive**. Write \"Var > 0 ✓\" on your script. Variance is an average of squared deviations — it is mathematically impossible for it to be negative.\n- Step 2: This catches the most damaging single error: forgetting to square the scaling constant in $$\\text{Var}(aY + b) = a^2\\text{Var}(Y)$$. If you write $$\\text{Var}(-2Y + 15) = -2\\text{Var}(Y)$$, you will get a *negative* variance — an immediate red flag. Without this check, you would submit a physically meaningless answer and lose all accuracy marks.\n\nA negative variance is never a rounding error — it is always a conceptual mistake. The positivity check is your last line of defence.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_17"}, {"question": "S1 May 2023 Q7 — For any normal probability problem (forward OR inverse), what is the FIRST mark you put on the page, and at what stage relative to opening the formula booklet? (2 steps)", "answer": "- Step 1: The first mark is a **sketch of the standard normal curve** $$N(0,1)$$ with the relevant region **shaded**. Draw the bell curve, mark the mean (0), and shade the area corresponding to the probability in the question.\n- Step 2: This sketch must be drawn BEFORE you open the formula booklet or look up any table values. The reason: the sketch tells you the *sign* of $$z$$ (positive or negative) and whether you need the body table or the percentage-point table. Without the sketch, you are flying blind — as in Q7(a)(ii), where $$P(J > d) = 0.9192$$ means $$d$$ is below the mean, so $$z$$ is negative. Students who skip the sketch write $$z = +1.40$$ and get $$d = 535$$ instead of 465.\n\nSketch first. Table second. Every time. No exceptions.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_21"}, {"question": "S1 May 2023 Q2(a) — What is the most frequent sign error in writing the $$S_{tw}$$ computational formula, and why must the correct sign be \"subtract\"? (2 steps)", "answer": "- Step 1: The most frequent error is writing $$S_{tw} = \\sum tw + \\frac{\\sum t \\sum w}{n}$$ with a **plus** sign instead of the correct **minus**. The correct formula is $$S_{tw} = \\sum tw - \\frac{\\sum t \\sum w}{n}$$.\n- Step 2: The minus sign is forced by the definition. $$S_{tw} = \\sum(t_i - \\bar{t})(w_i - \\bar{w})$$, which expands to $$\\sum t_i w_i - \\bar{t}\\sum w_i - \\bar{w}\\sum t_i + n\\bar{t}\\bar{w}$$. Since $$\\bar{t} = \\frac{\\sum t}{n}$$ and $$\\bar{w} = \\frac{\\sum w}{n}$$, this simplifies to $$\\sum tw - \\frac{\\sum t \\sum w}{n}$$. The cross-terms produce a *subtraction*, not an addition. The plus-sign error would make $$S_{tw}$$ far too large and could even push the PMCC above 1.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_6"}, {"question": "S1 May 2023 Q6(c) — in a three-set Venn diagram, what verification line should you write at the bottom of your working, and why does writing it earn examiner credit?", "answer": "- Step 1: Write the explicit sum: $$0.07 + 0.06 + 0.41 + 0.03 + 0 + 0.09 + 0 + 0.34 = 1.00\\ \\checkmark$$ (the eight regions: 3 singles + 3 doubles + 1 triple + 1 outside).\n- Step 2: Why it earns marks: it demonstrates that you (a) didn't forget the outside region, (b) didn't double-count any region, and (c) computed each region correctly. Examiners reward explicit verification as evidence of mathematical care.\n- Step 3: It also self-diagnoses errors: if the sum is not 1, you know to recheck before submitting — the cost of fixing in-place is far smaller than losing marks.\n\nTakeaway: always write \"$$\\text{sum} = 1\\ \\checkmark$$\" at the end of a Venn — free credit and self-checking.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_19"}, {"question": "S1 May 2023 — What is the universal rule for histogram questions (Mr. Fuat's rule), and what specific habit does it cash out as? (2 steps)", "answer": "- Step 1: The universal rule is: **calibrate first, then never read FD off the axis again — read off your own scale**. This means: use the one named class in the question (e.g. \"60 people travel between 10 and 20 km\") to compute the frequency density for that class first: $$\\text{FD} = f/w = 60/10 = 6$$.\n- Step 2: This cashes out as the habit: **compute FD for the named class BEFORE reading any other bar**. Once you know the FD scale (6 people per km for the named class), you read all other bar heights relative to that scale — never trust the y-axis numbers printed on the histogram, because they may use a different scale or be unreadable. The calibration anchor is your ground truth; everything else is derived from it.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_27"}, {"question": "S1 May 2023 Q2(a) — what is the most frequent sign error students make when writing the computational formula for $$S_{tw}$$, and why is the correct sign \"subtract\"?", "answer": "- Step 1: The most frequent error is writing $$S_{tw} = \\sum tw + \\frac{(\\sum t)(\\sum w)}{n}$$ with a PLUS sign — wrong.\n- Step 2: The correct formula is $$S_{tw} = \\sum tw - \\frac{(\\sum t)(\\sum w)}{n}$$ with a MINUS sign.\n- Step 3: The reason it's \"subtract\" is that $$S_{tw}$$ is fundamentally $$\\sum (t - \\bar t)(w - \\bar w)$$ — a sum of *deviations from the mean*. Expanding the bracket gives $$\\sum tw - n\\bar t \\bar w = \\sum tw - (\\sum t)(\\sum w)/n$$. The minus sign is what subtracts off the \"mean × mean\" contribution to leave only the *covariation*.\n\nTakeaway: $$S_{xy}$$ is a deviation product — it must subtract the \"centroid contribution\", hence minus.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_6"}, {"question": "S1 May 2023 Q3(b) — When reporting the variance of lengths measured in mm, what units must you attach, and why? (2 steps)", "answer": "- Step 1: The variance of lengths in mm must be reported in **mm²** (square millimetres). Variance is the mean of squared deviations: $$\\text{Var}(l) = E[(l - \\bar{l})^2]$$. Since each deviation $$l - \\bar{l}$$ has units mm, squaring it gives units mm².\n- Step 2: This is analogous to area: if you have a square with side length 5 mm, its area is 25 mm², not 25 mm. Variance is a \"squared\" quantity in the same sense. The standard deviation (the square root of variance) returns to mm, just as the side length of a square is the square root of its area.\n\nVariance is in squared units; standard deviation is in original units. Always write \"mm²\" (or whatever the squared unit is) after your variance value.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_11"}, {"question": "For any normal probability problem (forward OR inverse), what is the FIRST mark you put on the page, and at what stage relative to opening the formula booklet?", "answer": "- The first mark: Draw a sketch of the standard normal distribution N(0,1) WITH the relevant region SHADED.\n- When to draw it. BEFORE opening the formula booklet — this is critical. The sketch tells you:\n  - Whether you need the upper or lower tail\n  - Whether z will be positive or negative (for inverse problems)\n  - What the area represents (left tail, right tail, or between two z-values)\n- Why this order matters. Opening the tables before sketching leads to the classic Q7(a)(ii) error: looking up Φ(z) = 0.9192, getting z = 1.40, and forgetting that since P(X > d) = 0.9192 < 0.5, the answer must lie BELOW the mean, so z should be negative. The sketch forces you to think about the tail direction BEFORE you touch the tables.\n- The habit. Every S1 student should sketch-first, table-second. This is the universal habit that prevents the sign errors that cost marks in every normal probability question.", "source": "GAP-MiniMax ②", "_id": "minimax_2_20"}, {"question": "S1 May 2023 Q6(c) — State the general inclusion-exclusion formula for the \"A only\" region in a three-set Venn diagram, and explain why the triple intersection enters with a PLUS sign. (3 steps)", "answer": "- Step 1: The formula is $$P(\\text{A only}) = P(A) - P(A \\cap B) - P(A \\cap C) + P(A \\cap B \\cap C)$$. This gives the probability of being in A but in neither B nor C.\n- Step 2: Why subtract $$P(A \\cap B)$$ and $$P(A \\cap C)$$? Starting from $$P(A)$$, you need to remove the parts of A that also belong to B or C. So you subtract the overlap with B and the overlap with C.\n- Step 3: Why add back $$P(A \\cap B \\cap C)$$? The region $$A \\cap B \\cap C$$ was subtracted *twice* — once when you removed $$A \\cap B$$ (which includes the triple) and once when you removed $$A \\cap C$$ (which also includes the triple). To correct this double-subtraction, you add the triple back once. This is the same logic as the full three-set inclusion-exclusion principle, applied at the single-set level.\n\nThe triple intersection is the \"overlap of the overlaps.\" Without adding it back, you've removed it twice — once for each pair intersection that contains it.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_17"}, {"question": "S1 May 2023 Q1(a) — for the slice $$[22, 30)$$ in a partial-bar histogram, what is the correct sub-width to use in $$f = \\text{FD} \\times w$$, and why is the common student answer \"7\" wrong?", "answer": "- Step 1: The correct width is $$30 - 22 = 8$$, full stop. Class boundaries are continuous, so the slice from $$22$$ up to (but not including) $$30$$ has length $$8$$ km.\n- Step 2: Students slip by computing $$30 - 22 - 1 = 7$$, importing a discrete \"inclusive count\" intuition (like \"integers from 22 to 29 inclusive\" $$= 8$$ values, or worse, $$29 - 22 = 7$$).\n- Step 3: Histograms model **continuous** data — there is no \"$$-1$$\" correction. Width is just (upper boundary) $$-$$ (lower boundary).\n\nTakeaway: continuous data → subtract boundaries directly, no $$\\pm 1$$ ever.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_0"}, {"question": "In histogram questions across S1 papers including May 2023 Q1, what is Mr. Fuat’s universal rule, and what specific habit does it translate into on the page? (2 steps)", "answer": "- Step 1: The rule is: “The named-class frequency is the calibration anchor — compute FD for the named class FIRST, then never read FD off the y-axis again; read every other bar against your scale.”\n- Step 2: On the page, this habit appears as an explicit calibration line: “Given 60 people in $$[10,20)$$, width 10, so FD = 6.” Thereafter, every frequency is found as $$f = \\text{FD} \\times w$$ using your calibrated scale, not by visually estimating heights from the graph axis.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_54"}, {"question": "S1 May 2023 Q2(c) — For the \"regression line of $$w$$ on $$t$$\", which $$S$$-value goes in the denominator of the gradient $$b = S_{??}/S_{??}$$, and how do you instantly tell from the phrasing? (2 steps)", "answer": "- Step 1: The gradient is $$b = \\frac{S_{tw}}{S_{tt}}$$. The denominator is $$S_{tt}$$ — the sum of squares of the **explanatory** variable (the one being regressed *on*).\n- Step 2: The phrasing \"regression line of $$w$$ *on* $$t$$\" tells you: $$t$$ is the explanatory (predictor) variable, $$w$$ is the response. The denominator is always the $$S$$-value of the variable after the word \"on\". So \"$$w$$ on $$t$$\" → denominator = $$S_{tt}$$. If it were \"$$t$$ on $$w$$\" → denominator = $$S_{ww}$$.\n\nThe mnemonic: \"**on** the denominator\" — the variable after \"on\" supplies the denominator's $$S$$-value.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_5"}, {"question": "In S1 May 2023 Q2(e), to make the extrapolation argument decisive, what specific predicted value should you compute, and why does it close the argument physically? (2 steps)", "answer": "- Step 1: Substitute $$t = 2$$ cm into the regression line $$w = -16.7 + 4.77t$$ to obtain $$w = -16.7 + 4.77(2) = -7.16$$ grams.\n- Step 2: A negative weight is physically impossible. While stating “outside the range” is a valid statistical observation, demonstrating that the model predicts a logically absurd quantity provides an irrefutable, self-contained reason that extrapolation is inappropriate.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_20"}, {"question": "S1 May 2023 Q1 — what is the single procedural habit that prevents losing track of which class contains the median value in a grouped-data question?", "answer": "Always write the **cumulative frequency column BEFORE locating the median class** — never as an afterthought, never derived \"on the fly\" by mental subtraction. The cumulative column is a one-time investment ($$\\sim 20$$ seconds) that turns median-class location from a guess into a lookup: scan down the column, find the first entry that meets or exceeds $$n/2$$, and that row is your median class. This habit also feeds quartiles, percentiles, and \"number of values below X\" questions with zero extra work.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_3"}, {"question": "After solving a two-equation normal-distribution system and obtaining values like $$(r, k) = (476, 42.2)$$, what is the canonical verification step you perform, and what two values must match?", "answer": "- Step 1: Substitute $$(r, k)$$ back into BOTH original probability statements (not just one) and compute the resulting $$z$$-values from the standardisation formula.\n- Step 2: Specifically for Q7(c):\n+ First check: $$z_1 = (r - 520)/k = (476.25 - 520)/42.22 = -1.0364$$ — must match the $$z$$ from $$P(R < r) = 0.15$$.\n+ Second check: $$z_2 = (3r - 800 - 520)/k = (628.74 - 520)/42.22 = 2.5758$$ — must match the $$z$$ from $$P(R > 3r - 800) = 0.005$$.\n- Step 3: Why both checks are essential: the simultaneous equations could be algebraically wrong (sign slip, transposition error) but still produce a single self-consistent number pair. Only by verifying *both* original probability statements do you confirm the algebra was correct.\n\nTakeaway: the verification matches both $$z$$-values to their PP-table sources — confirming the algebra didn't just satisfy itself, it satisfied the actual problem.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_23"}, {"question": "Name the three habits, in order, that this S1 paper rewards according to the V3 Pattern Summary — and assign each habit to its diagnostic question(s). (1 step)", "answer": "- Habit 1: Calibration BEFORE reading — compute FD for the named class first, then read other bars against this scale. This is the diagnostic question Q1 (histogram) and also Q3 (coded mean/variance uses calibration logic).\n- Habit 2: Algebraic discipline BEFORE numerical substitution — write the formula (Bayes, Var(aY+b), inclusion-exclusion, normal equations) before substituting numbers. This is the diagnostic for Q5(e), Q7(c), and Q6(c).\n- Habit 3: Conceptual precision about probability vocabulary — distinguish mutually exclusive from independent, P(C|R) from P(R|C). This is the diagnostic for Q6 and Q4.", "source": "GAP-MiniMax ①", "_id": "minimax_1_24"}, {"question": "S1 May 2023 Q6(c) — State the general inclusion-exclusion formula for \"A only\" (i.e. the region in A but not in B and not in C) in a three-set Venn diagram, and explain why the triple intersection enters with a PLUS sign. (3 steps)", "answer": "- Step 1: The formula is $$P(\\text{A only}) = P(A) - P(A \\cap B) - P(A \\cap C) + P(A \\cap B \\cap C)$$.\n- Step 2: When you subtract $$P(A \\cap B)$$, you remove all of A∩B — including the part that's also in C (i.e. A∩B∩C). When you then subtract $$P(A \\cap C)$$, you remove all of A∩C — *also* including A∩B∩C. So the triple intersection has been subtracted **twice**.\n- Step 3: To correct for this double-subtraction, you must **add back** $$P(A \\cap B \\cap C)$$ once. This is the same logic as the full inclusion-exclusion principle: subtract pairs, then add back the triple. The plus sign on the triple is not optional — omitting it gives a value that's too small by exactly $$P(A \\cap B \\cap C)$$.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_18"}, {"question": "In an outlier check, why must you compute BOTH the lower and upper fence even if the data 'look fine on one side'?", "answer": "- Step 1: The outlier rule. An outlier is any value below $Q_1 - 1.5 \\times \\text{IQR}$ OR above $Q_3 + 1.5 \\times \\text{IQR}$. The word \"OR\" is critical — either condition alone qualifies a point as an outlier.\n- Step 2: Why both fences matter. Even if the minimum looks \"normal\" and there's no obvious low outliers, the upper fence might catch extreme high values. Conversely, even if the maximum looks reasonable, there could be low outliers. Checking only one side gives you an incomplete picture.\n- Step 3: The systematic procedure. For Q3(d): compute IQR = 5500 − 3000 = 2500. Then compute BOTH fences:\n  - Lower: $3000 - 1.5(2500) = -750$\n  - Upper: $5500 + 1.5(2500) = 9250$\n  Then compare BOTH the min (2000) and max (7700) to BOTH fences. Only after all four comparisons can you conclude \"no outliers.\"\n\nThe trap: students see min = 2000 > -750 (fine) and forget to check max against the upper fence.", "source": "GAP-MiniMax ②", "_id": "minimax_2_12"}, {"question": "In an outlier check using $$1.5 \\times \\text{IQR}$$ fences, why must you compute BOTH the lower and upper fence even when the data \"look fine\" on one side?", "answer": "- Step 1: The official definition of an outlier requires checking *both* tails: a value is an outlier if it is below $$Q_1 - 1.5 \\times \\text{IQR}$$ OR above $$Q_3 + 1.5 \\times \\text{IQR}$$.\n- Step 2: \"Looking fine on one side\" is an unreliable visual heuristic, particularly for box plots where:\n+ The whisker length is hard to estimate by eye.\n+ Asymmetric distributions can have a benign-looking long tail that actually exceeds the fence.\n+ The examiner's mark scheme will award marks specifically for computing BOTH fences, even when one is clearly satisfied.\n- Step 3: The procedural rule: write down both fences as a pair (lower, upper), then compare min to lower and max to upper. Both comparisons must be shown on the script.\n\nTakeaway: outlier checks are inherently two-sided; intuition about \"this side looks fine\" is not a substitute for the calculation.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "S1 May 2023 Q1(a) — Why is the approach \"add up full-bar frequencies (70+100+30=200 for [20,50)), then subtract a guess for [20,22) by eye\" a guaranteed mark-loss, and what conceptual error does it conflate? (3 steps)", "answer": "- Step 1: The question asks for people in $$[22, 45)$$, which is a *partial* slice of two bars ($$[22,30)$$ and $$[40,45)$$) plus one full bar ($$[30,40)$$). The \"add full bars then subtract\" approach treats $$[20,50)$$ as the starting point and tries to remove the unwanted bits — but the \"bits\" are partial bars that require pro-rating, not full bars you can simply subtract.\n- Step 2: The conceptual conflation: this approach treats *partial-bar slices* as if they were *full bars with a known frequency*. But the frequency of $$[20,22)$$ is not \"a bit of 70\" — it is $$2 \\times \\text{FD} = 2 \\times 7 = 14$$, computed via $$f = \\text{FD} \\times w$$. Guessing \"by eye\" earns zero method marks.\n- Step 3: The correct method slices each bar individually: $$[22,30)$$ gives $$8 \\times 7 = 56$$, $$[30,40)$$ gives 100, $$[40,45)$$ gives $$5 \\times 3 = 15$$. Total = 171. Each slice uses the same formula $$f = \\text{FD} \\times w$$, applied to the *actual sub-width*.\n\nFull bars are easy; partial bars require the same FD×w logic — never guess a partial slice.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_0"}, {"question": "In S1 May 2023 Q3(d), why must you compute both the lower and upper outlier fences even when the data appear “fine on one side”? (2 steps)", "answer": "- Step 1: The question asks you to “show that there are no outliers.” A rigorous proof requires verifying that every data point lies within the closed interval $$[Q_1 - 1.5 \\times \\text{IQR},\\, Q_3 + 1.5 \\times \\text{IQR}]$$. Checking only one fence proves only half the claim.\n- Step 2: Examiners award marks for the method of checking both boundaries and comparing both the minimum and maximum to them. Even if the lower bound is obviously negative, the complete demonstration includes stating it and noting the minimum exceeds it, while separately checking the upper bound.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_26"}, {"question": "For Q4(d) Bayes answer, why is presenting 5/13 (the simplified fraction) strategically safer than presenting 0.385?", "answer": "- Step 1: The decimal approximation. Computing P(C|R) = (0.25 × 0.06)/0.039 = 0.015/0.039 ≈ 0.384615... → 0.385 (3 s.f.)\n- Step 2: The exact fraction. 0.015/0.039 simplifies:\n  $$\\frac{15}{39} = \\frac{5}{13}$$\n- Step 3: Why 5/13 is safer. Presenting the fraction proves you haven't made a rounding slip. If you write 0.385, the examiner can't tell if you got exactly 0.384615... or made an arithmetic error that accidentally gave a similar value. The fraction 5/13 is unambiguous — it's either right or wrong, and if it's right, you get full marks with no rounding ambiguity.\n- The strategic point. When the answer is a \"nice\" fraction, always present it in simplest form. The examiner sees exact work and has no doubt about your answer. This is especially valuable in Bayes questions where the arithmetic is prone to decimal slips.", "source": "GAP-MiniMax ②", "_id": "minimax_2_14"}, {"question": "Under coding x = l − a, what is the reverse-coding rule for the MEAN, and why is this different from the rule for the variance?", "answer": "- The reverse-coding rule for the mean: $$\\bar l = \\bar x + a$$\n  Given x = l − 600, then l̄ = x̄ + 600.\n- Why it's addition. When you SUBTRACT a from get x, you must ADD a back to reverse it. The coding shifts the data left by a units; reversing shifts it back right.\n- Why this is DIFFERENT from variance. Variance is INVARIANT under translation:\n  $$\\mathrm{Var}(l) = \\mathrm{Var}(x)$$\n  You do NOT add the shift constant back. The variance measures spread, not location — shifting all data by a constant doesn't change how spread out they are.\n- The contrast:\n  - Mean: $\\bar{l} = \\bar{x} + 600$ (translation affects location)\n  - Variance: $\\mathrm{Var}(l) = \\mathrm{Var}(x)$ (translation does not affect spread)\n\nThe common error is adding 600 to the variance — this is mathematically meaningless.", "source": "GAP-MiniMax ②", "_id": "minimax_2_10"}, {"question": "In S1 May 2023 Q2(a), what is the most frequent sign error when writing the computational formula for $$S_{tw}$$, and why must the sign be negative? (2 steps)", "answer": "- Step 1: The frequent error is writing $$S_{tw} = \\sum tw + (\\sum t)(\\sum w)/n$$ instead of minus. The correct formula is $$S_{tw} = \\sum tw - (\\sum t)(\\sum w)/n$$.\n- Step 2: The sign must be negative because $$S_{tw}$$ is the corrected sum of products. It measures the sum of cross-products deviating from the mean. Algebraically, expanding $$\\sum(t-\\bar t)(w-\\bar w)$$ yields $$\\sum tw - n\\bar t\\bar w = \\sum tw - (\\sum t)(\\sum w)/n$$. The subtraction removes the “mean effect”; a plus sign would inflate rather than correct the measure.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_12"}, {"question": "In S1 May 2023 Q6(c), state the general inclusion-exclusion formula for the probability of “A only” in a three-set Venn diagram, and explain why the triple intersection $$P(A\\cap B\\cap C)$$ enters with a plus sign. (2 steps)", "answer": "- Step 1: The formula is $$P(A\\text{ only}) = P(A) - P(A\\cap B) - P(A\\cap C) + P(A\\cap B\\cap C)$$.\n- Step 2: The plus sign is needed because both $$P(A\\cap B)$$ and $$P(A\\cap C)$$ subtract the triple intersection. When you remove all of $$A\\cap B$$ and all of $$A\\cap C$$ from $$A$$, you have subtracted the triple region twice (once in each pairwise term). Adding it back once restores the correct count, mirroring the standard inclusion-exclusion correction for over-subtraction.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_36"}, {"question": "State the general inclusion–exclusion formula for the \"A only\" region in a three-set Venn diagram, and explain why the triple intersection $$P(A \\cap B \\cap C)$$ enters with a PLUS sign.", "answer": "- Step 1: The formula:\n+ $$P(A \\text{ only}) = P(A) - P(A \\cap B) - P(A \\cap C) + P(A \\cap B \\cap C)$$.\n- Step 2: The triple enters with a $$+$$ sign because the two subtraction terms $$P(A \\cap B)$$ and $$P(A \\cap C)$$ each include the central region $$A \\cap B \\cap C$$. Subtracting both means the centre has been subtracted TWICE.\n- Step 3: To correct for this double-subtraction, you add the triple back exactly once:\n+ $$P(A) - P(A \\cap B) - P(A \\cap C) + P(A \\cap B \\cap C)$$.\n+ This leaves the central region net-counted as $$1 - 1 - 1 + 1 = 0$$, the AB-only crescent as $$1 - 1 = 0$$, the AC-only crescent as $$1 - 1 = 0$$, and the A-only crescent as $$1$$ — exactly what we want.\n\nTakeaway: the $$+$$ on the triple is a correction for accidental double-subtraction — pure inclusion–exclusion bookkeeping.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_18"}, {"question": "S1 May 2023 Q3(d) — In an outlier check, why must you compute BOTH the lower fence and the upper fence even if the data \"look fine on one side\"? (3 steps)", "answer": "- Step 1: The outlier rule defines TWO fences: lower fence = $$Q_1 - 1.5 \\times \\text{IQR}$$ and upper fence = $$Q_3 + 1.5 \\times \\text{IQR}$$. A data point is an outlier if it falls below the lower fence OR above the upper fence. Both conditions are independent — satisfying one doesn't guarantee the other.\n- Step 2: Students who \"see no obvious outliers\" often only check the upper fence (because extreme high values are visually salient on a box plot) and neglect the lower fence. But a dataset could have no upper outliers yet still have a low minimum that falls below the lower fence — especially in left-skewed data.\n- Step 3: In Q3(d), the lower fence is $$3000 - 3750 = -750$$ and the upper fence is $$5500 + 3750 = 9250$$. The minimum (2000) is above −750, and the maximum (7700) is below 9250. Both comparisons are needed for the complete proof. Writing only one comparison loses a method mark.\n\nAlways write both fence computations and both comparisons. \"No outliers\" is a claim about the *entire* dataset, not just one tail.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_12"}, {"question": "S1 May 2023 — name the three habits, in order, that this paper rewards according to the Pattern Summary, and which question(s) each habit diagnoses.", "answer": "- Step 1: **Calibration before reading** — diagnosed by Q1 (histogram calibration via the named class) and Q3 (box-plot bound vs quartiles).\n- Step 2: **Algebraic discipline before numerical substitution** — diagnosed by Q5 (manipulate $$Y \\le X$$ inequality algebraically before enumerating; apply $$\\mathrm{Var}(aY+b) = a^2 \\mathrm{Var}(Y)$$ as a formula before plugging in) and Q7(c) (rearrange both equations to $$r = \\ldots k$$ form before equating).\n- Step 3: **Conceptual precision about probability vocabulary** — diagnosed by Q4 (Bayes direction: $$P(C \\mid R) \\ne P(R \\mid C)$$) and Q6 (mutually exclusive ≠ independent).\n\nTakeaway: calibrate → algebra-first → vocabulary-precise. These three habits cover ~80% of S1 marks lost.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "S1 May 2023 Q7(c) — What are the FOUR percentage-point $$z$$-values you must memorise (and the corresponding tail probabilities), and which one appears in Q7(c)? (2 steps)", "answer": "- Step 1: The four values are:\n+ $$z_{0.05} = 1.6449$$ (5% upper tail)\n+ $$z_{0.025} = 1.9600$$ (2.5% upper tail)\n+ $$z_{0.01} = 2.3263$$ (1% upper tail)\n+ $$z_{0.005} = 2.5758$$ (0.5% upper tail)\n- Step 2: In Q7(c), the condition $$P(R > 3r - 800) = 0.005$$ corresponds to a 0.5% upper tail, so you need **$$z_{0.005} = 2.5758$$**. Using the body table (which gives $$\\Phi(z) = 0.995$$ and a rounded $$z \\approx 2.58$$) loses precision and may cause the final answer to miss the required accuracy.\n\nThese four values appear repeatedly across S1 papers. Memorise them — do not rely on looking them up under exam pressure.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_22"}, {"question": "S1 May 2023 — According to the V3 weakness analysis, what is the single drill that, if mastered, converts Q5(e) from a 4-minute risk into a 90-second computation, and what is the formula at its core?", "answer": "The drill is **mastering $$\\text{Var}(aY + b) = a^2\\text{Var}(Y)$$ in isolation**.\n\nThe formula at its core: $$\\text{Var}(aY + b) = a^2\\text{Var}(Y)$$. The constant $$b$$ contributes nothing to variance (it shifts all values equally), and the scaling factor $$a$$ is **squared** because variance involves squared deviations.\n\nIn Q5(e), once you've computed $$\\text{Var}(Y) = \\frac{61}{45}$$, the entire remaining step is: $$\\text{Var}(15 - 2Y) = (-2)^2 \\times \\frac{61}{45} = \\frac{244}{45} \\approx 5.42$$. That's it — one multiplication. But students who haven't drilled this formula waste 4 minutes trying to compute $$E(X^2)$$ and $$[E(X)]^2$$ separately for $$X = 15 - 2Y$$, introducing multiple arithmetic slips along the way. The formula turns a multi-step risk into a single-step certainty.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_26"}, {"question": "S1 May 2023 Q3(d) — In an outlier check using the $$1.5 \\times \\text{IQR}$$ rule, why must you compute BOTH the lower fence and the upper fence even if the data \"look fine on one side\"? (2 steps)", "answer": "- Step 1: The lower fence is $$Q_1 - 1.5 \\times \\text{IQR}$$ and the upper fence is $$Q_3 + 1.5 \\times \\text{IQR}$$. Both must be computed and both extremes (minimum and maximum) must be compared to their respective fences. In Q3(d), the lower fence is $$-750$$ and the upper fence is $$9250$$ — the minimum 2000 is above $$-750$$ and the maximum 7700 is below 9250.\n- Step 2: The reason you must check both is that outliers can exist on *either* side, and intuition is unreliable. A dataset with a high maximum but a very low minimum might have a lower outlier even though \"the data look skewed high.\" In this paper, the upper fence (9250) is far above the max (7700), so no upper outlier — but you cannot know this without computing it. The examiner expects to see both comparisons explicitly stated.\n\nWrite both fences. Compare both extremes. No shortcuts.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_13"}, {"question": "S1 May 2023 Q4(d) — For a Bayes answer like $$P(C \\mid R)$$, why is presenting the simplified fraction $$5/13$$ strategically safer than presenting the decimal 0.385? (2 steps)", "answer": "- Step 1: The fraction $$5/13$$ is **exact** — it contains no rounding error whatsoever. The decimal 0.385 is a 3-significant-figure approximation of $$5/13 = 0.384615\\ldots$$ If the mark scheme specifies \"exact\" or \"to 3 s.f.\", the fraction always satisfies the former and the decimal only satisfies the latter.\n- Step 2: More critically, if you made an arithmetic slip earlier (e.g. computing $$P(R) = 0.038$$ instead of 0.039), your decimal would be wrong, but the fraction $$5/13$$ proves you correctly simplified $$0.015/0.039 = 15/39 = 5/13$$. The fraction demonstrates the *method* was correct even if a prior decimal was off. Examiners can follow the logic and award method marks.\n\nPresent the fraction. It is self-auditing: if it simplifies cleanly, your algebra is almost certainly right.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_15"}, {"question": "Name the three habits, in order, that the S1 paper rewards according to the V3 Pattern Summary, and assign each habit to its diagnostic question(s).", "answer": "- Step 1: **Habit 1 — Calibration BEFORE reading.** Compute the reference scale first, then read everything against it.\n+ Diagnostic questions: Q1 (histogram calibration via the named-class frequency) and Q3 (box plot — locate the bound versus Q1/median/Q3 *before* attempting any interpolation).\n- Step 2: **Habit 2 — Algebraic discipline BEFORE numerical substitution.** Write the formula or equation symbolically, manipulate, then substitute numbers.\n+ Diagnostic questions: Q5 (manipulate $$Y \\le 15 - 2Y$$ into $$Y \\le 5$$ algebraically rather than enumerating cases; apply $$\\text{Var}(aY+b) = a^2 \\text{Var}(Y)$$ as a formula) and Q7(c) (rearrange both probability statements to $$r = \\ldots k$$ form, then equate).\n- Step 3: **Habit 3 — Conceptual precision about probability vocabulary.** Distinguish concepts that students conflate.\n+ Diagnostic questions: Q6 (mutually exclusive ≠ independent — these mean different things and a positive-probability event cannot be both) and Q4 (Bayes — $$P(C \\mid R) \\ne P(R \\mid C)$$).\n\nTakeaway: calibrate first, manipulate algebraically before substituting, and respect the vocabulary — these three habits collectively turn an \"okay\" S1 script into a full-marks one.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_25"}, {"question": "S1 May 2023 Q5(e) — In computing $$E(Y^2)$$ for a discrete RV with values $$y = 1, 2, 3, 4, 5, 6$$, which single multiplication in the sum $$\\sum y^2 P(Y=y)$$ is most likely to be an arithmetic slip, and what is its correct value? (2 steps)", "answer": "- Step 1: The most error-prone product is $$5^2 \\times P(Y=5) = 25 \\times \\frac{17}{30}$$. The number 17 is the largest probability-weight numerator, and multiplying 25 × 17 = **425** is where students most often slip (common wrong answers: 415, 435, or 375 from confusing 17 with 15).\n- Step 2: To guard against this, compute $$25 \\times 17$$ separately as a standalone fact: $$20 \\times 17 = 340$$, $$5 \\times 17 = 85$$, total = 425. Then divide by 30: $$425/30 = 14.1\\overline{6}$$. Isolating this product before adding it into the full sum prevents the most common arithmetic failure in the entire $$E(Y^2)$$ computation.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_16"}, {"question": "S1 May 2023 Q1(b) — Why is the method \"subtract bar frequencies sequentially\" (e.g. 274−60=214, then 214−70=144…) fragile for finding the grouped median, and what should you build instead? (2 steps)", "answer": "- Step 1: Sequential subtraction is fragile because it gives you *remainders*, not *cumulative positions*. After subtracting 60 you get 214 (people remaining), but you need to know that the 137th person lies in a specific class. If you lose track of which subtraction step you're on, or if you subtract in the wrong order, you'll misidentify the median class entirely. The method also requires you to mentally track \"am I past 137 yet?\" at each step — error-prone under exam pressure.\n- Step 2: Instead, build a **cumulative-frequency column**: write down the running total after each class. For this data: 5, 65, 135, 235, 265, 274. Now you simply scan: 137 is between 135 and 235, so the median class is [30,40). The column makes the median class visually obvious and leaves an audit trail the examiner can follow for method marks.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_2"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "On a histogram question where you're given the frequency of one class, what must you do BEFORE reading any other bar's frequency density? (2 steps)", "answer": "- Step 1: **Calibrate** — compute the frequency density of the named class using $$\\text{FD} = \\frac{f}{w}$$. For example, if 60 people lie in $$[10,20)$$ with width 10, then $$\\text{FD} = 60/10 = 6$$.\n- Step 2: Use this FD as your **ruler** to read all other bars off the y-axis. Never trust the axis labels directly — the calibration bar is your ground truth.\n\nThe principle: *\"Calibrate first, then never read FD off the axis again — read off your scale.\"*", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "When a histogram question asks for the frequency in a partial class like $$[22, 30)$$, what is the key formula and what must you NOT do? (2 steps)", "answer": "- Step 1: Use $$f = \\text{FD} \\times w$$ where $$w$$ is the **slice width** (8 in this case, not the full class width of 10).\n- Step 2: Do NOT treat partial bars as full bars. The common error is to add full-bar frequencies (e.g. $$70 + 100 + 30 = 200$$ for $$[20,50)$$) and then try to \"remove bits\" by eye — this conflates full and partial bars and loses marks.\n\nEvery shaded rectangle, no matter how thin, obeys $$f = \\text{FD} \\times \\text{slice width}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "For estimating the median from grouped continuous data, what positional value do you use: $$n/2$$ or $$(n+1)/2$$? Why?", "answer": "Use $$n/2$$ for **grouped continuous data**. The $$(n+1)/2$$ formula is for discrete data where you can identify individual data points. In grouped data, you're interpolating within a class — the continuity assumption means the median is the value that splits the area in half, so position $$= n/2$$.\n\nA common pitfall is using $$(n+1)/2$$ here, which gives a slightly different (and wrong) position for interpolation.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "What must you construct BEFORE locating the median class in a histogram question, and why? (2 steps)", "answer": "- Step 1: Build a **cumulative frequency column** — running totals: $$5, 65, 135, 235, \\ldots$$\n- Step 2: Compare the median position ($$n/2 = 137$$) against these cumulative values to identify which class contains the 137th value.\n\nWithout this column, you risk losing track of which class the median lies in — especially when subtracting bar frequencies sequentially (e.g. \"$$274 - 60 = 214$$\") leads to confusion about where the 137th value actually falls.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "State the linear interpolation formula for the median of grouped data, identifying each symbol. (3 steps)", "answer": "- Step 1: $$\\text{median} = L + \\frac{n/2 - F}{f_m} \\times w$$\n- Step 2: Where $$L$$ = lower boundary of the median class, $$F$$ = cumulative frequency below the median class, $$f_m$$ = frequency of the median class, $$w$$ = class width.\n- Step 3: The intuition: you've already accounted for $$F$$ values below this class. The fraction $$\\frac{n/2 - F}{f_m}$$ tells you how far through the class the median sits (as a proportion of $$w$$).\n\nExample: $$L=30$$, $$F=135$$, $$f_m=100$$, $$w=10$$, $$n/2=137$$ → median $$= 30 + \\frac{2}{100}\\times 10 = 30.2$$.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "When estimating the mean from grouped data in a histogram, do you use class boundaries or class midpoints? Why?", "answer": "Use **midpoints** — the midpoint $$x_{\\text{mid}} = \\frac{\\text{lower} + \\text{upper}}{2}$$ represents the assumed average value within each class. Then $$\\bar{x} = \\frac{\\sum f \\cdot x_{\\text{mid}}}{\\sum f}$$.\n\nClass boundaries alone don't give you a representative value — the midpoint is the best single-number summary for a uniformly distributed class.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "In the $$S_{xy}$$ formula $$S_{xy} = \\sum xy - \\frac{\\sum x \\sum y}{n}$$, what is the most common sign error, and how do you prevent it?", "answer": "The common error is writing **$$+$$** instead of **$$-$$**: $$S_{xy} = \\sum xy + \\frac{\\sum x \\sum y}{n}$$ (wrong). The correction term must be **subtracted**.\n\nPrevention: remember that $$S_{xy}$$ measures how $$x$$ and $$y$$ **co-vary around their means**. The term $$\\frac{\\sum x \\sum y}{n} = n\\bar{x}\\bar{y}$$ is the \"expected\" product if they were independent, so you subtract it. If the sign were positive, uncorrelated data would have $$S_{xy} = 2n\\bar{x}\\bar{y} \\neq 0$$, which makes no sense.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "When a question says \"show that the regression line can be written as $$w = -16.7 + 4.77t$$\", how many significant figures must you carry through your intermediate calculations, and why? (2 steps)", "answer": "- Step 1: Carry **at least 5 significant figures** through all intermediate $$S_{tw}$$, $$b$$, and $$a$$ working.\n- Step 2: Only round at the final step. If you round $$S_{tw}$$ to 3 s.f. early, the printed coefficients won't match — the mark scheme requires your unrounded working to produce values that round to the given answers.\n\nFor example, $$b = 25.36733/5.3173 = 4.77073\\ldots$$ which rounds to 4.77. If you'd used $$S_{tw} = 25.4$$, you'd get $$b = 4.775\\ldots$$ which rounds to 4.78 — wrong for the \"show that\".", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "For the regression line of \"$$w$$ on $$t$$\", which variable goes in the denominator of the gradient formula $$b = S_{tw}/S_{tt}$$, and why? (2 steps)", "answer": "- Step 1: The **explanatory variable** goes in the denominator. For \"$$w$$ on $$t$$\", $$t$$ is explanatory, so $$b = \\frac{S_{tw}}{S_{tt}}$$.\n- Step 2: The regression line of $$w$$ on $$t$$ minimises the sum of squared **vertical** (i.e. $$w$$-direction) residuals. The formula must use the spread of the $$t$$-values ($$S_{tt}$$) to scale how much $$w$$ changes per unit change in $$t$$.\n\nConfusing \"$$w$$ on $$t$$\" with \"$$t$$ on $$w$$\" gives $$b = S_{tw}/S_{ww}$$ — a completely different line.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "When asked to interpret the gradient of a regression line, what two elements must your answer include?", "answer": "Your interpretation must include:\n1. **The direction and magnitude**: \"increases by approximately [gradient value]\"\n2. **The units**: \"grams per cm\" (or whatever the units of response per unit of explanatory are)\n\nExample: \"For each additional 1 cm of tail length, the weight increases by approximately 4.77 g.\" Without units, you lose the interpretation mark.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "When explaining why a regression line should not be used for estimation at a value far from the data, what two things should you state? (2 steps)", "answer": "- Step 1: State that the value is **outside the range of the data** (extrapolation). Mention the data range explicitly (e.g. \"tail lengths roughly 6.4–8.9 cm, but 2 cm is far outside\").\n- Step 2: Ideally, demonstrate that the prediction is **physically impossible**. For $$t = 2$$: $$w = -16.7 + 4.77(2) = -7.16$$ g — negative weight is impossible, confirming the model is invalid there.\n\nBoth points together earn full marks; just saying \"extrapolation\" alone may only get 1 of 2 marks.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "How does the PMCC change under the linear coding $$x = t - 6$$ and $$y = w/2 - 5$$? What condition must the coding satisfy?", "answer": "The PMCC is **invariant** (unchanged) under **positive linear coding**. Since both codings have positive scale factors ($$+1$$ for $$t \\to x$$ and $$+1/2$$ for $$w \\to y$$), $$r_{xy} = r_{tw} = 0.827$$.\n\nThe condition: if the scale factor were negative (e.g. $$y = -w$$), the PMCC would **change sign** but keep its magnitude. Only positive-linear coding preserves $$r$$ exactly.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "When asked for the regression line of $$y$$ on $$x$$ after coding, what is the shortcut method versus the long method? Which should you use? (2 steps)", "answer": "- Step 1: **Shortcut**: substitute the coding into the existing regression line. If $$w = -16.7 + 4.77t$$ and $$t = x + 6$$, $$w = 2y + 10$$, then $$2y + 10 = -16.7 + 4.77(x+6)$$.\n- Step 2: **Long method**: recompute $$S_{xy}$$, $$S_{xx}$$ from coded data and find the new line from scratch. This is error-prone and time-wasting.\n\nAlways use the substitution shortcut. The question often says \"you do not need to simplify\" — take that hint and just substitute.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "If the original regression line is $$w = a + bt$$ and the coding is $$x = t - 6$$, $$y = \\frac{w}{2} - 5$$, show the first step of obtaining the coded regression line. (2 steps)", "answer": "- Step 1: Invert the coding to express the original variables in terms of the new ones: $$t = x + 6$$ and $$w = 2(y + 5) = 2y + 10$$.\n- Step 2: Substitute into $$w = a + bt$$: $$2y + 10 = a + b(x + 6)$$. This is the coded regression line (unsimplified is acceptable).\n\nDo NOT try to find new $$S_{xy}$$ values — substitution is faster and less error-prone.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "When reverse-coding a mean, if the coding is $$x = l - 600$$ and $$\\bar{x} = 45.8$$, how do you find $$\\bar{l}$$?", "answer": "Since $$x = l - 600$$, we have $$l = x + 600$$, so $$\\bar{l} = \\bar{x} + 600 = 45.8 + 600 = 645.8$$ mm.\n\nThe shift adds back to the mean. Intuition: shifting every data point by 600 shifts the average by 600.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "When reverse-coding a variance, if the coding is $$x = l - 600$$, what happens to the variance? Does the 600 affect it?", "answer": "The variance is **invariant under translation**. $$\\text{Var}(l) = \\text{Var}(x)$$. The 600 has **no effect** on variance.\n\nIntuition: variance measures spread (how far values are from each other). Shifting all values by the same amount doesn't change their relative distances. The common pitfall is writing $$\\text{Var}(l) = \\text{Var}(x) + 600$$ or $$\\text{Var}(l) = \\text{Var}(x) - 600$$ — both are wrong.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "If the coding involves a scale factor, like $$x = l/10$$, what happens to the variance? What about $$x = (l - 600)/10$$?", "answer": "For $$x = l/10$$: $$\\text{Var}(x) = \\text{Var}(l)/100$$, so $$\\text{Var}(l) = 100 \\cdot \\text{Var}(x)$$.\n\nFor $$x = (l-600)/10$$: the shift of 600 has no effect on variance, but the division by 10 scales it: $$\\text{Var}(x) = \\text{Var}(l)/100$$, so again $$\\text{Var}(l) = 100 \\cdot \\text{Var}(x)$$.\n\nGeneral rule: $$\\text{Var}(aX + b) = a^2\\text{Var}(X)$$. The shift $$b$$ drops out; the scale $$a$$ gets squared.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "A box plot has median = 4000 and $$n = 81$$. What is the maximum number of data points that can lie strictly above 4600, and what is the key reasoning? (2 steps)", "answer": "- Step 1: Since 4600 > median = 4000, every value in $$(4600, 7700]$$ lies **strictly above the median**.\n- Step 2: By definition of the median (the 41st value out of 81), at most $$\\lfloor 81/2 \\rfloor = 40$$ data points can lie strictly above it. So the maximum count is **40**.\n\nThis is a concept question, not an interpolation question. Don't try to compute proportions inside the box — compare the bound to the median first.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "When proving there are no outliers using the fence method, how many comparisons must you make? (2 steps)", "answer": "- Step 1: Compute **both** fences: lower fence $$= Q_1 - 1.5 \\times \\text{IQR}$$ and upper fence $$= Q_3 + 1.5 \\times \\text{IQR}$$.\n- Step 2: Compare **both** extremes (minimum and maximum) against their respective fences. State explicitly: \"Min > lower fence and Max < upper fence, so no outliers.\"\n\nA common pitfall is only checking one fence. You must verify both — even if intuition says the data look fine.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "In a probability tree question, when you're told \"30% are A, 45% are B, the rest are C\", what must you do before drawing the tree?", "answer": "Compute the probability of C: $$P(C) = 1 - 0.30 - 0.45 = 0.25$$. The phrase \"the rest\" means you must calculate and **state** this value explicitly. Forgetting the third branch is a common error that cascades through all subsequent parts.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "When a question asks \"Given the counter is red, find $$P(\\text{labelled C})$$\", what is the trigger phrase and what formula must you write down BEFORE substituting any numbers? (2 steps)", "answer": "- Step 1: The trigger phrase \"Given... red\" signals **conditional probability**: $$P(C \\mid R)$$.\n- Step 2: Write down Bayes' formula first: $$P(C \\mid R) = \\frac{P(C) \\cdot P(R \\mid C)}{P(R)}$$. Only then substitute numbers.\n\nThe classic error is giving $$P(R \\mid C) = 0.06$$ as the answer — this is the reverse conditioning. Writing the formula first makes the direction unambiguous.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "Why are $$P(C \\mid R)$$ and $$P(R \\mid C)$$ not interchangeable? Give a concrete intuition. (2 steps)", "answer": "- Step 1: $$P(R \\mid C)$$ = \"probability of being red, **among the C's**\" — this is given as 0.06. $$P(C \\mid R)$$ = \"probability of being C, **among the reds**\" — this is what the question asks for.\n- Step 2: These are different populations. If C is rare (only 25% of counters) but has a high red rate (6%), then among all reds, C might still be a minority. The answer $$P(C \\mid R) = 0.385$$ is much larger than 0.06 because the denominator $$P(R) = 0.039$$ is small.\n\nAlways draw the formula first — the numerator and denominator are different quantities.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": true}, {"question": "In the total probability formula $$P(R) = \\sum P(L_i) P(R \\mid L_i)$$, what is the most common omission?", "answer": "Forgetting the **third (or later) term**. If there are labels A, B, C, you must include all three: $$P(R) = P(A)P(R|A) + P(B)P(R|B) + P(C)P(R|C)$$.\n\nStudents often compute only the A and B contributions and forget C, giving $$P(R) = 0.006 + 0.018 = 0.024$$ instead of the correct $$0.006 + 0.018 + 0.015 = 0.039$$.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "When a discrete RV has a piecewise probability function like $$P(Y=y) = k(3-y)$$ for $$y=1,2$$, what must you check before summing to find $$k$$?", "answer": "Check that each probability is **non-negative**. For $$y=1$$: $$k(3-1) = 2k \\geq 0$$ ✓. For $$y=2$$: $$k(3-2) = k \\geq 0$$ ✓. The common error is writing $$k(y-3)$$ instead of $$k(3-y)$$, which gives negative probabilities for $$y=1,2$$ — a sign that something is wrong.\n\nAlways tabulate the numerical values in $$k$$ before summing, so you can verify all entries are non-negative.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "When finding the constant $$k$$ in a discrete probability function, what equation do you set up? (2 steps)", "answer": "- Step 1: Tabulate all $$P(Y=y)$$ values in terms of $$k$$. For the given pf: $$2k, k, k, 8k, 17k, k$$ for $$y = 1,2,3,4,5,6$$.\n- Step 2: Set $$\\sum P(Y=y) = 1$$: $$2k + k + k + 8k + 17k + k = 30k = 1$$, so $$k = 1/30$$.\n\nAlways write out the sum explicitly — don't try to do it in your head, as the arithmetic (especially terms like $$8k$$ and $$17k$$) is easy to miscount.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "For $$P(1 < Y \\leq 4)$$, which values of $$Y$$ are included? What's the general rule for strict vs non-strict inequalities with discrete variables?", "answer": "$$P(1 < Y \\leq 4) = P(Y=2) + P(Y=3) + P(Y=4)$$. The rule: $$1 < Y$$ excludes $$Y=1$$; $$Y \\leq 4$$ includes $$Y=4$$. For discrete variables, every integer in the range is either included or excluded based on the inequality type.\n\nThe answer is $$\\frac{1+1+8}{30} = \\frac{10}{30} = \\frac{1}{3}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "When asked to find $$P(Y \\leq X)$$ where $$X = 15 - 2Y$$, why can you NOT treat $$X$$ and $$Y$$ as independent? What should you do instead? (2 steps)", "answer": "- Step 1: $$X$$ is a **deterministic function** of $$Y$$ — knowing $$Y$$ tells you $$X$$ exactly. They are perfectly correlated, not independent. You cannot use $$P(Y \\leq X) = \\sum P(Y=y)P(X=x)$$.\n- Step 2: Instead, substitute the expression for $$X$$ and solve the inequality algebraically: $$Y \\leq 15 - 2Y \\Rightarrow 3Y \\leq 15 \\Rightarrow Y \\leq 5$$.\n\nThis reduces the problem to $$P(Y \\leq 5) = 1 - P(Y=6) = 29/30$$.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "What is the formula for $$\\text{Var}(aY + b)$$, and what are the two most common errors in applying it? (3 steps)", "answer": "- Step 1: $$\\text{Var}(aY + b) = a^2 \\text{Var}(Y)$$. The constant $$b$$ **drops out** (shifting doesn't change spread), and the scale $$a$$ gets **squared**.\n- Step 2: Common error 1: writing $$\\text{Var}(aY+b) = a\\text{Var}(Y)$$ — missing the square. For $$X = 15 - 2Y$$, this would give $$\\text{Var}(X) = -2\\text{Var}(Y)$$ (nonsensical, variance can't be negative).\n- Step 3: Common error 2: writing $$\\text{Var}(aY+b) = -a\\text{Var}(Y)$$ — the negative sign from $$a = -2$$ should disappear because $$(-2)^2 = +4$$.\n\nCorrect: $$\\text{Var}(15 - 2Y) = (-2)^2 \\text{Var}(Y) = 4\\text{Var}(Y)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "Why does the constant $$b$$ drop out of $$\\text{Var}(aY + b)$$? Give the intuition. (2 steps)", "answer": "- Step 1: Variance measures **spread** — how far values are from the mean. Adding a constant $$b$$ shifts every value (and the mean) by the same amount, so all deviations from the mean stay the same.\n- Step 2: Algebraically: $$\\text{Var}(Y+b) = E[(Y+b)^2] - [E(Y+b)]^2 = E[Y^2 + 2bY + b^2] - [\\bar{Y}+b]^2 = E[Y^2] + 2b\\bar{Y} + b^2 - \\bar{Y}^2 - 2b\\bar{Y} - b^2 = E[Y^2] - \\bar{Y}^2 = \\text{Var}(Y)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "Why does the scale factor get **squared** in $$\\text{Var}(aY) = a^2\\text{Var}(Y)$$? Give the intuition. (2 steps)", "answer": "- Step 1: If you multiply all values by $$a$$, deviations from the mean get multiplied by $$a$$, and then those deviations get **squared** in the variance formula — so the factor becomes $$a^2$$.\n- Step 2: Even if $$a$$ is negative (like $$a = -2$$), squaring makes it positive: $$(-2)^2 = 4$$. Variance is always non-negative, so a negative multiplier would be impossible.\n\nThis is why $$\\text{Var}(-2Y) = 4\\text{Var}(Y)$$, not $$-2\\text{Var}(Y)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": true}, {"question": "What is the difference between mutually exclusive events and independent events? Can two events with positive probability be both? (3 steps)", "answer": "- Step 1: **Mutually exclusive** means $$P(A \\cap B) = 0$$ — the events cannot occur together.\n- Step 2: **Independent** means $$P(A \\cap B) = P(A)P(B)$$ — knowing one occurred tells you nothing about the other.\n- Step 3: If both hold and both events have positive probability: $$P(A)P(B) = P(A \\cap B) = 0$$, but $$P(A)P(B) > 0$$ — contradiction. So **events with positive probability cannot be both mutually exclusive and independent**.\n\nThis is a high-frequency exam trap: students set $$P(B \\cap C) = 0$$ because a prior part involved mutual exclusivity, when part (c) actually specifies independence.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": true}, {"question": "When $$A$$ and $$C$$ are mutually exclusive, what does this imply about the triple intersection $$A \\cap B \\cap C$$?", "answer": "Since $$A \\cap C = \\emptyset$$, any subset of $$A \\cap C$$ must also be empty. In particular, $$A \\cap B \\cap C \\subseteq A \\cap C$$, so $$P(A \\cap B \\cap C) = 0$$.\n\nThis is crucial for filling in the Venn diagram: the triple intersection is forced to zero by the mutual exclusivity of $$A$$ and $$C$$, even though $$B$$ overlaps both.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": true}, {"question": "When filling in a three-set Venn diagram, what order should you fill the regions, and why? (3 steps)", "answer": "- Step 1: Start with the **triple intersection** $$A \\cap B \\cap C$$. This is determined by the tightest constraint (often forced to 0 by mutual exclusivity).\n- Step 2: Fill the **double-only** regions: $$(A \\cap B) \\setminus C$$, $$(A \\cap C) \\setminus B$$, $$(B \\cap C) \\setminus A$$. Subtract the triple from each pairwise intersection.\n- Step 3: Fill the **single-only** regions and the **outside** region. Check that all 8 regions sum to 1.\n\nWorking from the centre outward ensures you never assign a value that needs to be revised later.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "In a three-set Venn diagram, what is the most commonly forgotten region, and what check must you always perform?", "answer": "The **outside region** (the complement of $$A \\cup B \\cup C$$) is most commonly forgotten. It's worth 1 mark.\n\nAlways perform the check: all 8 regions must sum to 1. If they don't, you've made an arithmetic error. Write this check explicitly on your script.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": false}, {"question": "Given $$P(A) = 0.1$$, $$P(B \\mid A) = 0.3$$, and $$P(A \\cup B) = 0.25$$, how do you find $$P(B)$$? What formula chain do you use? (3 steps)", "answer": "- Step 1: From the conditional: $$P(A \\cap B) = P(A) \\cdot P(B \\mid A) = 0.1 \\times 0.3 = 0.03$$.\n- Step 2: Apply inclusion–exclusion: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$.\n- Step 3: Substitute: $$0.25 = 0.1 + P(B) - 0.03$$, so $$P(B) = 0.25 - 0.1 + 0.03 = 0.18$$.\n\nKey insight: the conditional probability gives you the intersection, and the union formula then gives you the marginal.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": false}, {"question": "When $$B$$ and $$C$$ are independent with $$P(B) = 0.18$$ and $$P(C) = 0.5$$, what is $$P(B \\cap C)$$?", "answer": "$$P(B \\cap C) = P(B) \\cdot P(C) = 0.18 \\times 0.5 = 0.09$$.\n\nIndependence means the joint probability factors into the product of marginals. Do NOT set $$P(B \\cap C) = 0$$ — that's mutual exclusivity, which is a completely different concept.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "When standardising a normal variable $$J \\sim N(\\mu, \\sigma^2)$$, what is the formula for the z-score, and what does it represent? (2 steps)", "answer": "- Step 1: $$Z = \\frac{J - \\mu}{\\sigma}$$. This transforms $$J$$ to the standard normal $$Z \\sim N(0,1)$$.\n- Step 2: The z-score tells you **how many standard deviations** $$J$$ is from the mean. A z-score of 0.4 means the value is 0.4 standard deviations above the mean.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": false}, {"question": "When you see $$P(J > d) = 0.9192$$ where $$J \\sim N(500, 25^2)$$, how do you know that $$d$$ must be below the mean, and what does this tell you about the sign of $$z$$? (2 steps)", "answer": "- Step 1: $$P(J > d) = 0.9192 > 0.5$$. If more than half the distribution is above $$d$$, then $$d$$ must be below the mean.\n- Step 2: Since $$d < \\mu$$, the z-score is **negative**: $$z = \\frac{d - 500}{25} < 0$$.\n\nThe classic error is looking up $$\\Phi(z) = 0.9192$$, getting $$z = +1.40$$, and computing $$d = 535$$. The correct approach: $$P(J \\leq d) = 1 - 0.9192 = 0.0808$$, which is a lower-tail probability, confirming $$z < 0$$.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": false}, {"question": "Before reaching for normal distribution tables, what should you always draw? Why is this the single most important habit? (2 steps)", "answer": "- Step 1: Draw a **sketch of the normal curve** with the relevant region shaded.\n- Step 2: The sketch instantly tells you the sign of $$z$$ (is the shaded region on the left or right of the mean?) and whether you need the body table or the percentage-point table. It prevents the classic sign error in inverse-normal problems.\n\nThis habit alone prevents the majority of normal-distribution mark losses.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": false}, {"question": "For 5 independent bags each with $$P(J < 510) = 0.6554$$, what is the probability that ALL 5 yield less than 510 ml? What is the common error?", "answer": "$$P(\\text{all 5} < 510) = (0.6554)^5 \\approx 0.121$$.\n\nThe common error is **multiplying** instead of **exponentiating**: $$5 \\times 0.6554 = 3.277$$, which isn't even a valid probability. Independence means you multiply the same probability 5 times, which is raising to the 5th power.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": false}, {"question": "Why must you raise to the 5th power rather than multiply by 5 when finding the probability that all 5 independent bags yield less than 510 ml? (2 steps)", "answer": "- Step 1: For independent events $$E_1, E_2, \\ldots, E_5$$, $$P(E_1 \\cap E_2 \\cap \\cdots \\cap E_5) = P(E_1) \\times P(E_2) \\times \\cdots \\times P(E_5)$$. Since each $$P(E_i) = 0.6554$$, this equals $$(0.6554)^5$$.\n- Step 2: Multiplying by 5 would correspond to adding 5 copies of the same probability — that's the probability of \"at least one\" only in a very loose (and wrong) sense. For \"all\", you must multiply the probabilities, not add them.", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": false}, {"question": "In a two-equation normal system where $$R \\sim N(520, k^2)$$, $$P(R < r) = 0.15$$, and $$P(R > 3r - 800) = 0.005$$, what is the strategic approach before doing any arithmetic? (3 steps)", "answer": "- Step 1: Convert each probability statement to a **z-equation** using $$Z = \\frac{R - \\mu}{k}$$. For the first: $$\\frac{r - 520}{k} = z_1$$. For the second: $$\\frac{(3r-800) - 520}{k} = z_2$$.\n- Step 2: Look up both z-values from tables (using sketches to determine signs). Rearrange **both** equations to the form $$r = \\ldots k$$.\n- Step 3: **Equate** the two expressions for $$r$$ and solve for $$k$$, then back-substitute for $$r$$.\n\nDo NOT try to substitute numbers prematurely — the algebra is cleaner when both equations are in the same form.", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": false}, {"question": "For $$P(R < r) = 0.15$$, how do you determine the sign of the z-value, and what table lookup do you perform? (2 steps)", "answer": "- Step 1: Since 0.15 < 0.5, the value $$r$$ is below the mean, so $$z$$ is **negative**.\n- Step 2: Use the symmetry: $$P(Z < z) = 0.15$$ is equivalent to $$P(Z > -z) = 0.15$$, i.e., $$\\Phi(-z) = 0.85$$. Look up $$\\Phi(z) = 0.85$$ to find $$-z \\approx 1.0364$$, so $$z = -1.0364$$.\n\nThe sketch confirms: the shaded lower tail is less than half the curve, so we're in negative-z territory.", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": false}, {"question": "For $$P(R > 3r - 800) = 0.005$$, what z-value do you use, and from which table? (2 steps)", "answer": "- Step 1: This is an **upper tail** of 0.005, which is a small probability, so $$3r - 800$$ is far above the mean and $$z$$ is **positive**.\n- Step 2: Use the **percentage-point table** (not the body table). The percentage-point table gives $$z_{0.005} = 2.5758$$ directly. The body table gives $$\\Phi(2.58) \\approx 0.9951$$, which is slightly imprecise.\n\nAlways prefer the percentage-point table for small tail probabilities — it's more accurate.", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": false}, {"question": "What are the four percentage-point z-values you should memorise for S1, and when do you use each?", "answer": "$$z_{0.05} = 1.6449$$ (5% upper tail), $$z_{0.025} = 1.9600$$ (2.5% tail), $$z_{0.01} = 2.3263$$ (1% tail), $$z_{0.005} = 2.5758$$ (0.5% tail).\n\nThese appear repeatedly in hypothesis testing and two-equation systems. Memorising them saves table-lookup time and avoids the body-table rounding error (e.g. using 2.58 instead of 2.5758).", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": false}, {"question": "After solving a two-equation normal system for $$r$$ and $$k$$, what verification step must you perform?", "answer": "**Substitute both values back** into the original probability statements and check the z-scores match. For example: $$z_1 = (476 - 520)/42.2 = -1.0364$$ ✓ and $$z_2 = (628.7 - 520)/42.2 = 2.5758$$ ✓.\n\nAlso check that $$k > 0$$ (a negative standard deviation is meaningless). If your algebra gives $$k < 0$$, you've made a sign error.", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": false}, {"question": "In the two-equation normal system, after obtaining $$r = 520 - 1.0364k$$ and $$r = 440 + 0.8586k$$, why is equating them the cleanest approach? (2 steps)", "answer": "- Step 1: Both expressions equal $$r$$, so set them equal: $$520 - 1.0364k = 440 + 0.8586k$$. This eliminates $$r$$ and gives a single equation in $$k$$.\n- Step 2: Solve: $$80 = 1.8950k$$, so $$k = 80/1.8950 \\approx 42.2$$. Then back-substitute into either expression for $$r$$.\n\nThis \"rearrange-then-equate\" strategy avoids messy simultaneous-equation algebra and reduces sign errors.", "source": "GLM 5.1 ①", "_id": "glm_1_46", "judge_pick": false}, {"question": "What is the formula for calculating variance from summary statistics $$\\sum x$$, $$\\sum x^2$$, and $$n$$? (2 steps)", "answer": "- Step 1: $$\\text{Var}(x) = \\frac{\\sum x^2}{n} - \\bar{x}^2$$, where $$\\bar{x} = \\frac{\\sum x}{n}$$.\n- Step 2: This is the \"computational formula\" — it avoids calculating individual deviations. The key is that $$\\frac{\\sum x^2}{n}$$ is the mean of the squares, and $$\\bar{x}^2$$ is the square of the mean. Variance = mean of squares minus square of mean.", "source": "GLM 5.1 ①", "_id": "glm_1_47", "judge_pick": false}, {"question": "When a question gives you $$P(A \\cup B)$$, $$P(A)$$, and $$P(B \\mid A)$$, and asks you to find $$P(B)$$, what is the chain of reasoning? (3 steps)", "answer": "- Step 1: Use the conditional to find the intersection: $$P(A \\cap B) = P(A) \\cdot P(B \\mid A)$$.\n- Step 2: Apply inclusion–exclusion: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$.\n- Step 3: Rearrange: $$P(B) = P(A \\cup B) - P(A) + P(A \\cap B)$$.\n\nThe key insight: the conditional probability \"unlocks\" the intersection, which then \"unlocks\" the marginal through inclusion–exclusion.", "source": "GLM 5.1 ①", "_id": "glm_1_48", "judge_pick": false}, {"question": "In a Venn diagram where $$A$$ and $$C$$ are mutually exclusive, how should the circles be drawn? What does this visually enforce?", "answer": "Circles $$A$$ and $$C$$ must be drawn **disjoint** (no overlap). This visually enforces $$P(A \\cap C) = 0$$ — there is no shared region between them.\n\nCircle $$B$$ can overlap both $$A$$ and $$C$$, but the triple intersection $$A \\cap B \\cap C$$ must still be 0 (since it's a subset of $$A \\cap C = \\emptyset$$).", "source": "GLM 5.1 ①", "_id": "glm_1_49", "judge_pick": false}, {"question": "What is the inclusion–exclusion formula for three sets, and when do you need it?", "answer": "$$P(A \\cup B \\cup C) = P(A) + P(B) + P(C) - P(A \\cap B) - P(A \\cap C) - P(B \\cap C) + P(A \\cap B \\cap C)$$.\n\nYou need it when computing the probability of being in at least one of three sets. It corrects for double-counting (subtract pairwise intersections) and then corrects for over-subtraction (add back the triple intersection).", "source": "GLM 5.1 ①", "_id": "glm_1_50", "judge_pick": false}, {"question": "When computing $$E(Y)$$ for a discrete RV, what is the formula and what is the most arithmetic-heavy step to watch for? (2 steps)", "answer": "- Step 1: $$E(Y) = \\sum y \\cdot P(Y=y)$$. Multiply each value of $$y$$ by its probability and sum.\n- Step 2: The most error-prone term is typically the largest product. For example, $$5 \\times 17/30 = 85/30$$ — the term $$25 \\times 17 = 425$$ in $$E(Y^2)$$ is the easiest place to make an arithmetic slip.\n\nAlways tabulate $$y$$, $$P(Y=y)$$, and $$y \\cdot P(Y=y)$$ in columns to catch errors.", "source": "GLM 5.1 ①", "_id": "glm_1_51", "judge_pick": false}, {"question": "To compute $$\\text{Var}(Y)$$, you need both $$E(Y)$$ and $$E(Y^2)$$. What is the formula connecting them, and why is it preferred over the deviation-squared formula? (2 steps)", "answer": "- Step 1: $$\\text{Var}(Y) = E(Y^2) - [E(Y)]^2$$. Compute $$E(Y^2) = \\sum y^2 P(Y=y)$$ separately.\n- Step 2: This is preferred over $$\\text{Var}(Y) = E[(Y - \\mu)^2]$$ because you don't need to compute individual deviations — you just need two sums. It's computationally cleaner and less error-prone.", "source": "GLM 5.1 ①", "_id": "glm_1_52", "judge_pick": true}, {"question": "In the histogram question, what does \"between 22 km and 45 km\" mean about which classes to include? (2 steps)", "answer": "- Step 1: It means the interval $$[22, 45)$$ — you must slice across the bars for $$[20,30)$$, $$[30,40)$$, and $$[40,50)$$, but only take **partial widths** where the query interval doesn't cover the full class.\n- Step 2: Specifically: $$[22,30)$$ has width 8 (not 10), $$[30,40)$$ is full (width 10), $$[40,45)$$ has width 5 (not 10). Do NOT treat all three as full bars.", "source": "GLM 5.1 ①", "_id": "glm_1_53", "judge_pick": false}, {"question": "What is the \"show that\" discipline for normal distribution questions? What must you quote from the table? (2 steps)", "answer": "- Step 1: Quote the $$\\Phi$$ value from the table to **4 decimal places**. For example, write \"$$\\Phi(0.4) = 0.6554$$\" explicitly on your script.\n- Step 2: Show the full standardisation and subtraction: $$P(J > 510) = 1 - \\Phi(0.4) = 1 - 0.6554 = 0.3446$$. The examiner needs to see where each number comes from.\n\nDon't just write the answer — the method marks require visible table lookups and arithmetic.", "source": "GLM 5.1 ①", "_id": "glm_1_54", "judge_pick": false}, {"question": "When the question says \"you do not need to simplify your equation\" for a coded regression line, what should you do and what should you NOT do?", "answer": "**Do** write the unsimplified substitution result (e.g. $$2y + 10 = -16.7 + 4.77(x+6)$$). **Do NOT** spend time expanding and simplifying — the question explicitly tells you it's unnecessary, and you risk arithmetic errors.\n\nTake the hint. Exam time is precious.", "source": "GLM 5.1 ①", "_id": "glm_1_55", "judge_pick": false}, {"question": "For the coding $$x = (l - a)/b$$, state the rules for how the mean and variance transform. (2 steps)", "answer": "- Step 1: $$\\bar{x} = \\frac{\\bar{l} - a}{b}$$, so to reverse: $$\\bar{l} = b\\bar{x} + a$$.\n- Step 2: $$\\text{Var}(x) = \\frac{\\text{Var}(l)}{b^2}$$, so to reverse: $$\\text{Var}(l) = b^2 \\text{Var}(x)$$. The shift $$a$$ has no effect on variance.\n\nNote: if $$b$$ is negative, $$b^2$$ is still positive, so variance is always positive.", "source": "GLM 5.1 ①", "_id": "glm_1_56", "judge_pick": false}, {"question": "What is the time budget per mark in a 75-mark, 90-minute S1 exam, and how should you allocate time across questions?", "answer": "90/75 = **1.2 minutes per mark**. Allocate: Q1 ≈ 10 min, Q2 ≈ 15 min, Q3 ≈ 11 min, Q4 ≈ 11 min, Q5 ≈ 15 min, Q6 ≈ 11 min, Q7 ≈ 17 min. Reserve 5 minutes at the end for checking.\n\nIf you're spending more than 1.5 minutes per mark on a question, move on and return to it later.", "source": "GLM 5.1 ①", "_id": "glm_1_57", "judge_pick": false}, {"question": "What does it mean for the PMCC to be \"dimensionless\", and why does this explain its invariance under scaling? (2 steps)", "answer": "- Step 1: The PMCC measures the **strength of linear association** on a scale of $$[-1, 1]$$, independent of the units of either variable. It's a ratio of covariance to the product of standard deviations, so units cancel.\n- Step 2: Scaling (e.g. doubling all weights) changes both the covariance and the standard deviations by the same factor, so the ratio is unchanged. This is why $$r_{tw} = r_{xy}$$ under positive linear coding.", "source": "GLM 5.1 ①", "_id": "glm_1_58", "judge_pick": false}, {"question": "When solving $$P(R < r) = 0.15$$ for $$r$$, you get $$z_1 = -1.0364$$. Write the equation linking $$r$$ and $$k$$, and rearrange to express $$r$$ in terms of $$k$$. (2 steps)", "answer": "- Step 1: $$\\frac{r - 520}{k} = -1.0364$$, so $$r - 520 = -1.0364k$$.\n- Step 2: $$r = 520 - 1.0364k$$.\n\nAlways rearrange to isolate $$r$$ before equating with the other equation — this is the strategic step that makes the two-equation system tractable.", "source": "GLM 5.1 ①", "_id": "glm_1_59", "judge_pick": false}, {"question": "For the second equation $$P(R > 3r - 800) = 0.005$$ with $$z_2 = 2.5758$$, show the rearrangement to $$r = \\ldots k$$ form. (3 steps)", "answer": "- Step 1: $$\\frac{(3r - 800) - 520}{k} = 2.5758$$, so $$\\frac{3r - 1320}{k} = 2.5758$$.\n- Step 2: $$3r - 1320 = 2.5758k$$, so $$3r = 1320 + 2.5758k$$.\n- Step 3: $$r = 440 + 0.8586k$$.\n\nNow both equations are in the form $$r = \\text{constant} + (\\text{coefficient})k$$, ready to equate.", "source": "GLM 5.1 ①", "_id": "glm_1_60", "judge_pick": false}, {"question": "What is a quick mental check that your PMCC value is plausible? What range must it fall in?", "answer": "The PMCC must satisfy $$-1 \\leq r \\leq 1$$. If your calculation gives $$|r| > 1$$, you've made an error (likely in $$S_{xy}$$, $$S_{xx}$$, or $$S_{yy}$$).\n\nFor this paper, $$r = 0.827$$ — a strong positive correlation, which is plausible for weight vs. tail length.", "source": "GLM 5.1 ①", "_id": "glm_1_61", "judge_pick": false}, {"question": "In Q3(c), why is the answer 40 and not some interpolated value? What concept is being tested? (2 steps)", "answer": "- Step 1: The question asks for the **maximum number** of salmon in $$(4600, 7700]$$. Since 4600 > median = 4000, all such values are above the median.\n- Step 2: The median is the 41st value (out of 81), so at most 40 values can be strictly above it. No interpolation is needed — this is a **positional logic** question, not a calculation question.\n\nThe trap is trying to interpolate inside the box plot — resist the urge and think about what the median means positionally.", "source": "GLM 5.1 ①", "_id": "glm_1_62", "judge_pick": false}, {"question": "What is the formula for the lower and upper outlier fences, and what comparison do you make?", "answer": "Lower fence: $$Q_1 - 1.5 \\times \\text{IQR}$$. Upper fence: $$Q_3 + 1.5 \\times \\text{IQR}$$.\n\nCompare the **minimum** data value against the lower fence, and the **maximum** data value against the upper fence. A data point is an outlier if it falls outside these fences. You must check both — checking only one fence is incomplete.", "source": "GLM 5.1 ①", "_id": "glm_1_63", "judge_pick": false}, {"question": "When a probability question says \"of those labelled A, 2% are red\", what probability does this represent, and how is it used in the tree diagram?", "answer": "This represents $$P(\\text{Red} \\mid A) = 0.02$$ — the probability of being red **given** the label is A. On the tree diagram, this goes on the \"Red\" branch coming out of the \"A\" branch (second level).\n\nThe complementary branch is $$P(\\text{Not Red} \\mid A) = 1 - 0.02 = 0.98$$.", "source": "GLM 5.1 ①", "_id": "glm_1_64", "judge_pick": false}, {"question": "In the Venn diagram for Q6, the region \"A only\" has probability 0.07. Show the calculation. (2 steps)", "answer": "- Step 1: $$P(A \\text{ only}) = P(A) - P(A \\cap B) - P(A \\cap C) + P(A \\cap B \\cap C)$$.\n- Step 2: $$= 0.10 - 0.03 - 0 + 0 = 0.07$$.\n\nThe $$+P(A \\cap B \\cap C)$$ term corrects for the fact that the triple intersection was subtracted twice (once in each pairwise term). Here it's 0, but the formula must still be applied correctly.", "source": "GLM 5.1 ①", "_id": "glm_1_65", "judge_pick": false}, {"question": "What is the key difference between using the body table ($$\\Phi$$ table) versus the percentage-point table for normal distribution lookups?", "answer": "The **body table** gives you $$\\Phi(z)$$ — the probability — when you know $$z$$. You look up $$z$$ in the margins and read off the probability. The **percentage-point table** gives you $$z$$ when you know the tail probability. You look up the tail probability and read off $$z$$.\n\nFor small tail probabilities (like 0.005), the percentage-point table is more accurate. The body table might give $$\\Phi(2.58) \\approx 0.9951$$, implying a 0.0049 tail — slightly off from 0.005.", "source": "GLM 5.1 ①", "_id": "glm_1_66", "judge_pick": false}, {"question": "A simple exercise: If $$Y$$ takes values 1, 2, 3 with probabilities 0.2, 0.5, 0.3 respectively, and $$X = 10 - 3Y$$, find $$E(X)$$ and $$\\text{Var}(X)$$ using the transformation rules. (3 steps)", "answer": "- Step 1: $$E(Y) = 1(0.2) + 2(0.5) + 3(0.3) = 0.2 + 1.0 + 0.9 = 2.1$$. Then $$E(X) = 10 - 3E(Y) = 10 - 6.3 = 3.7$$.\n- Step 2: $$E(Y^2) = 1(0.2) + 4(0.5) + 9(0.3) = 0.2 + 2.0 + 2.7 = 4.9$$. Then $$\\text{Var}(Y) = 4.9 - 2.1^2 = 4.9 - 4.41 = 0.49$$.\n- Step 3: $$\\text{Var}(X) = (-3)^2 \\text{Var}(Y) = 9 \\times 0.49 = 4.41$$. Note: the constant 10 drops out, and the $$-3$$ becomes $$+9$$.", "source": "GLM 5.1 ①", "_id": "glm_1_67", "judge_pick": false}, {"question": "A simple exercise: In a Venn diagram, $$P(A) = 0.4$$, $$P(B) = 0.5$$, and A and B are independent. Find $$P(A \\cap B)$$ and $$P(A \\cup B)$$. (2 steps)", "answer": "- Step 1: Independence means $$P(A \\cap B) = P(A) \\cdot P(B) = 0.4 \\times 0.5 = 0.2$$.\n- Step 2: By inclusion–exclusion: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B) = 0.4 + 0.5 - 0.2 = 0.7$$.\n\nNotice: if A and B were mutually exclusive instead, $$P(A \\cap B) = 0$$ and $$P(A \\cup B) = 0.9$$. The two concepts give very different answers.", "source": "GLM 5.1 ①", "_id": "glm_1_68", "judge_pick": false}, {"question": "A simple exercise: $$Z \\sim N(0,1)$$. Find $$z$$ such that $$P(Z > z) = 0.8$$. Is $$z$$ positive or negative, and why? (2 steps)", "answer": "- Step 1: Since $$P(Z > z) = 0.8 > 0.5$$, more than half the distribution is above $$z$$, so $$z$$ must be **negative** (below the mean).\n- Step 2: $$P(Z \\leq z) = 1 - 0.8 = 0.2$$. Looking up $$\\Phi(z) = 0.2$$: by symmetry, $$\\Phi(-0.8416) = 1 - \\Phi(0.8416) = 1 - 0.8 = 0.2$$. So $$z \\approx -0.842$$.\n\nThe sketch is essential: without it, you might look up $$\\Phi(z) = 0.8$$ and get $$z = +0.842$$.", "source": "GLM 5.1 ①", "_id": "glm_1_69", "judge_pick": false}, {"question": "A simple exercise: A histogram has a class $$[0, 5)$$ with frequency 20. If the FD scale is 4 per unit, what is the frequency in the class $$[5, 8)$$ which has FD = 3?", "answer": "$$f = \\text{FD} \
