\times w = 3 \\times 3 = 9$$. The class width is $$8 - 5 = 3$$, not 5. Always use the actual class width, not the width of a different class.", "source": "GLM 5.1 ①", "_id": "glm_1_70", "judge_pick": false}, {"question": "What is the single highest-leverage drill for this paper, according to the weakness analysis, and why? (2 steps)", "answer": "- Step 1: **Variance under linear transformation**: $$\\text{Var}(aY + b) = a^2\\text{Var}(Y)$$.\n- Step 2: Mastering this in isolation turns Q5(e) from a 4-minute risk into a 90-second computation. The most common error is writing $$a$$ instead of $$a^2$$, or keeping the sign of a negative $$a$$. Drill 5 examples until the $$a^2$$ is automatic.", "source": "GLM 5.1 ①", "_id": "glm_1_71", "judge_pick": false}, {"question": "What three habits does this paper reward most, according to the pattern summary? (3 steps)", "answer": "- Step 1: **Calibration before reading** (Q1, Q3) — compute FD for the named class before trusting any other bar.\n- Step 2: **Algebraic discipline before numerical substitution** (Q5, Q7c) — manipulate inequalities and equations symbolically before plugging in numbers.\n- Step 3: **Conceptual precision about probability vocabulary** (Q6 — mutually exclusive ≠ independent; Q4 — $$P(C|R) \\neq P(R|C)$$) — know the definitions cold.", "source": "GLM 5.1 ①", "_id": "glm_1_72", "judge_pick": true}, {"question": "When a question gives you $$\\sum w^2$$ and $$\\sum w$$ and asks for $$S_{ww}$$, what formula do you use? (2 steps)", "answer": "- Step 1: $$S_{ww} = \\sum w^2 - \\frac{(\\sum w)^2}{n}$$.\n- Step 2: This is the same pattern as $$S_{xx}$$ — replace every $$x$$ with $$w$$. The key is to **subtract** the correction term, not add it.", "source": "GLM 5.1 ①", "_id": "glm_1_73", "judge_pick": false}, {"question": "What should you always write on your script before substituting numbers into Bayes' formula, inclusion–exclusion, or the variance transformation? Why?", "answer": "Write the **formula itself** first, in symbolic form. For example: $$P(C \\mid R) = \\frac{P(C)P(R \\mid C)}{P(R)}$$, or $$\\text{Var}(aY+b) = a^2\\text{Var}(Y)$$.\n\nExaminers award **method marks** for the structure even when arithmetic slips. If you jump straight to numbers and make a calculation error, you might lose all marks. The formula shows the examiner you know what you're doing.", "source": "GLM 5.1 ①", "_id": "glm_1_74", "judge_pick": false}, {"question": "In Q5(d), the inequality $$Y \\leq X$$ with $$X = 15 - 2Y$$ simplifies to $$Y \\leq 5$$. What is the full algebraic working? (3 steps)", "answer": "- Step 1: Substitute $$X = 15 - 2Y$$: $$Y \\leq 15 - 2Y$$.\n- Step 2: Add $$2Y$$ to both sides: $$3Y \\leq 15$$.\n- Step 3: Divide by 3: $$Y \\leq 5$$.\n\nThen $$P(Y \\leq 5) = 1 - P(Y = 6) = 1 - 1/30 = 29/30$$. Three clean lines of algebra — no enumeration of joint probabilities needed.", "source": "GLM 5.1 ①", "_id": "glm_1_75", "judge_pick": true}, {"question": "For a discrete RV with values $$y = 1, 2, 3, 4, 5, 6$$, what is $$E(Y^2)$$ and why must you compute it separately from $$[E(Y)]^2$$? (2 steps)", "answer": "- Step 1: $$E(Y^2) = \\sum y^2 P(Y=y)$$ — multiply each **squared** value of $$y$$ by its probability and sum. This is NOT the same as $$[E(Y)]^2$$.\n- Step 2: By Jensen's inequality, for a non-constant RV, $$E(Y^2) > [E(Y)]^2$$. The difference IS the variance: $$\\text{Var}(Y) = E(Y^2) - [E(Y)]^2$$.", "source": "GLM 5.1 ①", "_id": "glm_1_76", "judge_pick": false}, {"question": "What is the common error when a student sees $$P(R > 3r - 800) = 0.005$$ and tries to use the body table? (2 steps)", "answer": "- Step 1: They look up $$\\Phi(z) = 0.995$$ in the body table and find $$z \\approx 2.58$$ (rounded), missing the precision of the percentage-point table.\n- Step 2: The percentage-point table gives $$z_{0.005} = 2.5758$$, which is more accurate. Using 2.58 introduces a rounding error that propagates through the two-equation system and can change the final answer.\n\nAlways use the percentage-point table for small tail probabilities.", "source": "GLM 5.1 ①", "_id": "glm_1_77", "judge_pick": false}, {"question": "In the outlier fence calculation, if $$Q_1 = 3000$$, $$Q_3 = 5500$$, compute the IQR and both fences. (2 steps)", "answer": "- Step 1: $$\\text{IQR} = Q_3 - Q_1 = 5500 - 3000 = 2500$$.\n- Step 2: Lower fence $$= 3000 - 1.5(2500) = 3000 - 3750 = -750$$. Upper fence $$= 5500 + 1.5(2500) = 5500 + 3750 = 9250$$.\n\nThe minimum (2000) > −750 ✓ and maximum (7700) < 9250 ✓, so no outliers.", "source": "GLM 5.1 ①", "_id": "glm_1_78", "judge_pick": false}, {"question": "What does the \"outside region\" in a three-set Venn diagram represent, and what is its probability in Q6? (2 steps)", "answer": "- Step 1: The outside region represents $$P(A' \\cap B' \\cap C')$$ — the probability of being in none of the three sets.\n- Step 2: In Q6, it equals $$1 - (0.07 + 0.06 + 0.41 + 0.03 + 0 + 0.09 + 0) = 1 - 0.66 = 0.34$$.\n\nForgetting this region loses a mark. Always compute it and always verify the total sums to 1.", "source": "GLM 5.1 ①", "_id": "glm_1_79", "judge_pick": false}, {"question": "A simple exercise: If $$\\text{Var}(Y) = 5$$ and $$X = 3Y - 7$$, find $$\\text{Var}(X)$$ and explain each step. (2 steps)", "answer": "- Step 1: $$\\text{Var}(3Y - 7) = 3^2 \\cdot \\text{Var}(Y) = 9 \\times 5 = 45$$.\n- Step 2: The $$-7$$ drops out (shifting doesn't change spread), and the $$3$$ gets squared (scaling by 3 increases spread by factor 9). The answer is 45, not 15, not −15, not 5 − 7 = −2.", "source": "GLM 5.1 ①", "_id": "glm_1_80", "judge_pick": false}], "count": 81}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "S1 May 2023 Q1 — On a histogram question, what is the very first thing you must do before reading any frequency density off the y-axis, and why? (2 steps)", "answer": "- Step 1: **Calibrate** — use the one class whose frequency is given (or can be read unambiguously) to compute its frequency density: $$\\text{FD}_{\\text{known}} = \\frac{f_{\\text{known}}}{w_{\\text{known}}}.$$ For Q1, the class $$[10,20)$$ has $$f=60$$ and width 10, so $$\\text{FD}=6.$$\n- Step 2: Use this FD as your **ruler** to read every other bar's FD by comparing heights. Never trust the printed y-axis scale directly — it may be distorted or unreadable. The calibration bar anchors all subsequent readings.\n\nTakeaway: \"Calibrate first, then never read FD off the axis again — read off your scale.\"", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "S1 May 2023 Q1(a) — When a histogram question asks for the frequency in a partial-class slice like $$[22,30)$$, what is the formula you apply, and what is the common mistake? (2 steps)", "answer": "- Step 1: For any rectangular slice of a histogram bar, frequency = $$\\text{FD} \\times \\text{slice width}.$$ For $$[22,30)$$: width = 8, FD = 7, so $$f = 8 \\times 7 = 56.$$\n- Step 2: The common mistake is treating partial bars as full bars — e.g. computing $$70 + 100 + 30 = 200$$ for $$[20,50)$$ and then trying to \"remove a bit\" by eye. This conflates full and partial bars and loses marks. Every shaded rectangle is its own FD × width calculation.\n\nTakeaway: Partial-bar pro-rating means each sub-rectangle is computed independently with its own slice width.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "S1 May 2023 Q1(b) — Before locating the median class in a grouped frequency table, what column must you write down, and what is the median position formula for grouped continuous data? (2 steps)", "answer": "- Step 1: Write down a **cumulative frequency column**. Without it, you risk losing track of which class contains the median position — a common error is trying to subtract bar frequencies sequentially instead.\n- Step 2: The median position for grouped (continuous) data is $$\\frac{n}{2},$$ NOT $$\\frac{n+1}{2}.$$ The $$(n+1)/2$$ formula is for discrete data. For $$n=274,$$ the position is 137.\n\nTakeaway: Cumulative frequency column first; use $$n/2$$ for continuous grouped data.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "S1 May 2023 Q1(b) — What is the full linear interpolation formula for the median of grouped data, and what does each symbol mean? (3 steps)", "answer": "- Step 1: The formula is $$\\text{median} = L + \\frac{n/2 - F}{f_m}\\,w,$$ where $$L$$ = lower boundary of the median class, $$F$$ = cumulative frequency of the class *before* the median class, $$f_m$$ = frequency of the median class, and $$w$$ = class width of the median class.\n- Step 2: The intuition: $$n/2 - F$$ counts how many values into the median class the median sits. Dividing by $$f_m$$ gives the *fraction* of the way through the class. Multiplying by $$w$$ converts that fraction into a distance in the original units.\n- Step 3: For Q1: $$L=30,$$ $$F=135,$$ $$f_m=100,$$ $$w=10$$ → $$\\text{median} = 30 + \\frac{137-135}{100}\\times 10 = 30.2.$$\n\nTakeaway: The fraction $$\\frac{n/2 - F}{f_m}$$ is the proportion of the median class you've traversed.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "S1 May 2023 Q1(c) — When estimating the mean from grouped data, what value do you use for each class, and what is the formula? (2 steps)", "answer": "- Step 1: Use the **midpoint** of each class (not the lower boundary, not the upper boundary). For $$[0,10)$$ the midpoint is 5; for $$[10,20)$$ it is 15; etc.\n- Step 2: $$\\bar{x} = \\frac{\\sum f \\, x_{\\text{mid}}}{\\sum f}.$$ Multiply each midpoint by its class frequency, sum all products, divide by total frequency.\n\nTakeaway: Midpoints represent each class; boundaries do not.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "S1 May 2023 Q2(a) — What is the formula for $$S_{tw}$$, and what is the sign error that students most commonly make? (2 steps)", "answer": "- Step 1: $$S_{tw} = \\sum tw - \\frac{\\sum t \\,\\sum w}{n}.$$ The key point: it is a **subtraction**.\n- Step 2: The common error is writing $$\\sum tw + \\frac{\\sum t \\,\\sum w}{n}$$ (addition instead of subtraction). This produces a completely wrong value and cascades through every subsequent part (PMCC, regression). Always double-check the minus sign.\n\nTakeaway: $$S_{xy}$$ always *subtracts* the product-of-sums correction term.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "S1 May 2023 Q2 — When a \"show that\" question gives printed coefficients like $$w = -16.7 + 4.77t$$, how many significant figures must you carry through intermediate calculations, and why? (2 steps)", "answer": "- Step 1: Carry **at least 5 s.f.** through all intermediate $$S_{tw}$$, $$b$$, $$a$$ working. Write $$b$$ and $$a$$ to at least 4 s.f. *before* rounding to the printed values.\n- Step 2: Premature rounding kills the printed coefficient. For example, if you round $$S_{tw}$$ to 25.4 (3 s.f.) instead of keeping 25.367, then $$b = 25.4/5.3173 = 4.781$$ — which does *not* round to 4.77, and you fail the \"show that.\"\n\nTakeaway: \"Show that\" demands high-precision intermediates; round only at the final step.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "S1 May 2023 Q2(c) — For the regression line of $$w$$ on $$t$$, which variable's $$S$$-value goes in the denominator of the gradient, and why? (2 steps)", "answer": "- Step 1: For the regression line of $$w$$ on $$t$$, the gradient is $$b = \\frac{S_{tw}}{S_{tt}}.$$ The denominator is $$S_{tt}$$ — the $$S$$-value of the **explanatory** (independent) variable $$t$$.\n- Step 2: The logic: \"of $$w$$ on $$t$$\" means we are predicting $$w$$ *from* $$t$$, so $$t$$ is the predictor. The formula always divides by the $$S$$-value of the predictor. Confusing this (using $$S_{ww}$$) gives the wrong line entirely.\n\nTakeaway: \"Of $$w$$ on $$t$$\" → denominator is $$S_{tt}$$ (the predictor's sum of squares).", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "S1 May 2023 Q2(d) — When asked to \"interpret the gradient of the regression line,\" what two things must your answer include? (2 steps)", "answer": "- Step 1: State the **rate of change** in context: \"For each additional 1 cm of tail length, the weight increases by approximately 4.77 g.\"\n- Step 2: Include **units** (g per cm). An answer like \"it goes up by 4.77\" with no units loses the interpretation mark. The gradient always has units of (response variable units) per (explanatory variable units).\n\nTakeaway: Interpretation = contextual rate of change + units.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "S1 May 2023 Q2(e) — When explaining why a regression line should not be used for estimation at a value far from the data, what two points must you make for full marks? (2 steps)", "answer": "- Step 1: State that the value is **outside the range of the data** (extrapolation). For Q2, the data have $$\\bar{t} \\approx 7.65$$ with tail lengths roughly 6.4–8.9 cm; $$t = 2$$ is far below this range.\n- Step 2: Show the prediction is **physically impossible**. At $$t = 2$$: $$w = -16.7 + 4.77(2) = -7.16$$ g — a negative weight is impossible, confirming the model is invalid there.\n\nTakeaway: Full-marks answer = \"outside range\" + \"impossible prediction.\"", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "S1 May 2023 Q2(f) — Why does the PMCC remain unchanged when data are transformed by a positive linear coding? (2 steps)", "answer": "- Step 1: The PMCC measures the *strength of linear association*, which depends on the pattern of points, not their scale or origin. A positive linear coding $$x = t - 6$$ (shift) and $$y = w/2 - 5$$ (shift + positive scale) stretches/shifts the scatter diagram but does not change the linear pattern.\n- Step 2: Formally, $$r_{xy} = \\frac{S_{xy}}{\\sqrt{S_{xx}S_{yy}}}.$$ Under coding $$x = at + c$$ and $$y = bw + d$$ with $$a, b > 0$$: $$S_{xy} = ab\\,S_{tw},$$ $$S_{xx} = a^2 S_{tt},$$ $$S_{yy} = b^2 S_{ww}.$$ The factors cancel: $$r_{xy} = \\frac{ab\\,S_{tw}}{\\sqrt{a^2 S_{tt} \\cdot b^2 S_{ww}}} = \\frac{ab\\,S_{tw}}{ab\\sqrt{S_{tt}S_{ww}}} = r_{tw}.$$\n\nTakeaway: PMCC is invariant under positive linear coding because the scale factors cancel.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": true}, {"question": "S1 May 2023 Q2(g) — When the question introduces coding $$x = t - 6$$, $$y = w/2 - 5$$ and asks for the regression line of $$y$$ on $$x$$, what shortcut should you use instead of recomputing $$S_{xy}$$ and $$S_{xx}$$ from the coded data? (3 steps)", "answer": "- Step 1: **Substitute the coding into the existing regression line** from part (c). Rearrange the coding: $$t = x + 6$$ and $$w = 2y + 10.$$\n- Step 2: Substitute into $$w = -16.7 + 4.77t$$: $$2y + 10 = -16.7 + 4.77(x + 6).$$\n- Step 3: This unsimplified form is already a valid answer (the question says \"you do not need to simplify\"). The trap is wasting time recomputing $$S_{xy}, S_{xx}$$ from coded data — don't.\n\nTakeaway: Coding on regression → substitute, don't recompute.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "S1 May 2023 Q3(a) — When data are coded as $$x = l - 600$$ and you've found $$\\bar{x}$$, how do you recover the original mean $$\\bar{l}$$? (2 steps)", "answer": "- Step 1: Reverse the shift. Since $$x = l - 600,$$ we have $$l = x + 600.$$ Therefore $$\\bar{l} = \\bar{x} + 600.$$\n- Step 2: For Q3: $$\\bar{x} = 3711/81 = 45.8148,$$ so $$\\bar{l} = 45.8148 + 600 = 645.8$$ mm. The shift constant is *added back* to the coded mean.\n\nTakeaway: To reverse a shift coding, add the constant back: $$\\bar{l} = \\bar{x} + a.$$", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "S1 May 2023 Q3(b) — When data are coded as $$x = l - 600$$, how does the variance of $$l$$ relate to the variance of $$x$$, and what is the common mistake? (2 steps)", "answer": "- Step 1: Variance is **invariant under translation** (shift). $$\\text{Var}(l) = \\text{Var}(x + 600) = \\text{Var}(x).$$ Adding a constant shifts the distribution but does not change its spread, so the variance is identical.\n- Step 2: The common mistake is writing $$\\text{Var}(l) = \\text{Var}(x) + 600$$ or $$\\text{Var}(l) = \\text{Var}(x) - 600.$$ Variance does not shift with the data — only the mean does. You never add or subtract the shift constant from a variance.\n\nTakeaway: $$\\text{Var}(x + a) = \\text{Var}(x)$$ — shift leaves variance unchanged.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "S1 May 2023 Q3(b) — What is the computational formula for variance from raw summary statistics $$\\sum x$$ and $$\\sum x^2$$? (2 steps)", "answer": "- Step 1: $$\\text{Var}(x) = \\frac{\\sum x^2}{n} - \\bar{x}^2.$$ This is the \"computational\" form — it avoids computing each deviation individually.\n- Step 2: The intuition: $$\\frac{\\sum x^2}{n}$$ is the mean of the squares, and $$\\bar{x}^2$$ is the square of the mean. Variance = (mean of squares) − (square of mean). For Q3: $$\\frac{475181}{81} - (45.8148)^2 = 3767.4 \\approx 3770.$$\n\nTakeaway: Variance = mean of squares minus square of mean.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "S1 May 2023 Q3(c) — A box plot has median = 4000 and $$n = 81$$. What is the maximum number of data points that can lie strictly above 4600, and how do you reason about it? (2 steps)", "answer": "- Step 1: Since 4600 > median = 4000, every value above 4600 is also above the median. The median is the 41st value (out of 81), so exactly 40 values lie strictly above it.\n- Step 2: Therefore at most 40 values can lie in the interval $$(4600, 7700].$$ This is a **concept** question about the definition of the median, not an interpolation question. Do not try to interpolate inside the box.\n\nTakeaway: \"Max number above a bound\" → compare the bound to the median/quartiles, then count.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "S1 May 2023 Q3(d) — When checking for outliers using the $$1.5 \\times \\text{IQR}$$ rule, how many comparisons must you make, and what are they? (3 steps)", "answer": "- Step 1: Compute the IQR: $$\\text{IQR} = Q_3 - Q_1 = 5500 - 3000 = 2500.$$\n- Step 2: Compute **both** fences. Lower fence: $$Q_1 - 1.5 \\times \\text{IQR} = 3000 - 3750 = -750.$$ Upper fence: $$Q_3 + 1.5 \\times \\text{IQR} = 5500 + 3750 = 9250.$$\n- Step 3: Compare **both** extremes to **both** fences. Min = 2000 > −750 ✓ and Max = 7700 < 9250 ✓. A common mistake is only checking the upper fence. Both comparisons must be stated.\n\nTakeaway: Two fences, two extremes, four comparisons — state them all.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "S1 May 2023 Q4(a) — When completing a tree diagram with three branches (A, B, C) where \"the rest\" are C, what must you compute before drawing? (2 steps)", "answer": "- Step 1: Compute $$P(C) = 1 - P(A) - P(B) = 1 - 0.30 - 0.45 = 0.25.$$ The phrase \"the rest\" means the complement of A and B.\n- Step 2: Label all six branch probabilities (three first-level branches × two second-level branches for red/not-red). Forgetting the third branch (C) or failing to compute \"the rest\" is a common error that cascades into parts (c) and (d).\n\nTakeaway: \"The rest\" = compute the complement before drawing.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "S1 May 2023 Q4(c) — What is the total probability formula used when you need $$P(\\text{red})$$ from a tree diagram with multiple branches? (2 steps)", "answer": "- Step 1: $$P(R) = \\sum_i P(L_i)\\,P(R \\mid L_i) = P(A)P(R\\mid A) + P(B)P(R\\mid B) + P(C)P(R\\mid C).$$\n- Step 2: For Q4: $$0.30(0.02) + 0.45(0.04) + 0.25(0.06) = 0.006 + 0.018 + 0.015 = 0.039.$$ The common pitfall is forgetting the third row of the tree (the C contribution).\n\nTakeaway: Total probability = sum over all branches leading to the event.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": true}, {"question": "S1 May 2023 Q4(d) — What formula must you write down before substituting any numbers when asked \"Given the counter is red, find P(labelled C)\"? (3 steps)", "answer": "- Step 1: Write the **Bayes formula**: $$P(C \\mid R) = \\frac{P(C \\cap R)}{P(R)} = \\frac{P(C)\\,P(R \\mid C)}{P(R)}.$$ Examiners award method marks for writing the formula structure.\n- Step 2: Substitute: $$P(C \\mid R) = \\frac{0.25 \\times 0.06}{0.039} = \\frac{0.015}{0.039} = \\frac{5}{13} \\approx 0.385.$$\n- Step 3: The classic error is inverting Bayes — giving $$P(R \\mid C) = 0.06$$ as the answer. $$P(C \\mid R) \\neq P(R \\mid C).$$ The condition and the event are not interchangeable.\n\nTakeaway: Always write the Bayes formula before substituting; check which event is the condition.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "S1 May 2023 Q4(d) — Why are $$P(C \\mid R)$$ and $$P(R \\mid C)$$ not interchangeable? Explain with a concrete intuition. (2 steps)", "answer": "- Step 1: $$P(R \\mid C) = 0.06$$ means \"among C-labelled counters, 6% are red.\" $$P(C \\mid R) \\approx 0.385$$ means \"among red counters, about 38.5% are C-labelled.\" These answer completely different questions.\n- Step 2: Intuition: C-labels are rare (only 25%), but when you *already know* the counter is red, the probability it came from C is boosted because C has a higher red rate (6%) than A (2%) or B (4%). The condition changes the \"universe\" of possibilities.\n\nTakeaway: The condition redefines the sample space — that's why the two directions differ.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "S1 May 2023 Q5(a) — When given a piecewise probability function like $$P(Y=y) = k(3-y)$$ for $$y=1,2$$, what must you check before summing to find $$k$$, and why? (2 steps)", "answer": "- Step 1: **Tabulate the numerical values** before summing. For $$y=1$$: $$k(3-1) = 2k.$$ For $$y=2$$: $$k(3-2) = k.$$ The common error is writing $$k(y-3)$$ instead of $$k(3-y)$$, which gives negative probabilities (impossible).\n- Step 2: After tabulating all values ($$2k, k, k, 8k, 17k, k$$), sum to 1: $$30k = 1 \\Rightarrow k = 1/30.$$ Always verify every probability is non-negative before proceeding.\n\nTakeaway: Tabulate the pmf numerically first — catch sign errors before they propagate.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": true}, {"question": "S1 May 2023 Q5(b) — What values of $$Y$$ satisfy $$P(1 < Y \\le 4)$$, and why? (2 steps)", "answer": "- Step 1: The inequality is strict on the left ($$1 < Y$$) and inclusive on the right ($$Y \\le 4$$). For a discrete RV, this means $$Y = 2, 3, 4.$$\n- Step 2: $$P(Y=2) + P(Y=3) + P(Y=4) = \\frac{1+1+8}{30} = \\frac{10}{30} = \\frac{1}{3}.$$ The value $$Y=1$$ is excluded by the strict inequality.\n\nTakeaway: $$1 < Y \\le 4$$ for a discrete RV means $$Y \\in \\{2, 3, 4\\}$$ — read the inequality signs carefully.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "S1 May 2023 Q5(d) — When $$X = 15 - 2Y$$ and the question asks for $$P(Y \\le X)$$, why can you NOT treat $$X$$ and $$Y$$ as independent, and what should you do instead? (3 steps)", "answer": "- Step 1: $$X$$ is a **deterministic function** of $$Y$$ — once you know $$Y$$, you know $$X$$ exactly. They are perfectly correlated, not independent. You cannot enumerate joint $$(Y, X)$$ pairs and sum $$P(Y=y)P(X=x).$$\n- Step 2: Instead, substitute the relationship: $$Y \\le X = 15 - 2Y$$ becomes $$Y \\le 15 - 2Y,$$ which simplifies to $$3Y \\le 15,$$ i.e., $$Y \\le 5.$$\n- Step 3: So $$P(Y \\le X) = P(Y \\le 5) = 1 - P(Y=6) = 1 - 1/30 = 29/30.$$ The algebraic approach is clean and avoids any independence assumption.\n\nTakeaway: When $$X$$ is defined in terms of $$Y$$, substitute and solve the inequality algebraically.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "S1 May 2023 Q5(e) — What is the formula for $$\\text{Var}(aY + b)$$, and what are the two most common errors? (2 steps)", "answer": "- Step 1: $$\\text{Var}(aY + b) = a^2\\,\\text{Var}(Y).$$ The constant $$b$$ drops (shifting doesn't change spread), and the coefficient $$a$$ is **squared**.\n- Step 2: The two common errors: (1) Writing $$\\text{Var}(15 - 2Y) = -2\\,\\text{Var}(Y)$$ — the sign is lost when squaring, so it's $$(-2)^2 = +4.$$ (2) Writing $$\\text{Var}(15 - 2Y) = 2\\,\\text{Var}(Y)$$ — forgetting to square the coefficient. For Q5: $$\\text{Var}(X) = 4 \\times \\frac{61}{45} = \\frac{244}{45} \\approx 5.42.$$\n\nTakeaway: The variance multiplier is always **positive** (it's $$a^2$$), and the constant always **drops**.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": true}, {"question": "S1 May 2023 Q5(e) — Why does the constant $$b$$ disappear in $$\\text{Var}(aY + b) = a^2\\,\\text{Var}(Y)$$, while the coefficient $$a$$ gets squared? (2 steps)", "answer": "- Step 1: Variance measures **spread** (how far values are from their mean). Adding a constant $$b$$ shifts every value by the same amount — the mean shifts, but the distances between values don't change. So spread is unchanged.\n- Step 2: Multiplying by $$a$$ stretches the scale. If every value is twice as far from zero, then every deviation from the mean is also twice as large. Since variance is the mean of squared deviations, each deviation is multiplied by $$a,$$ so squared deviations are multiplied by $$a^2.$$\n\nTakeaway: Shifts don't affect spread; scaling affects spread by the square of the scale factor.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": true}, {"question": "S1 May 2023 Q6 — What is the definition of \"mutually exclusive\" events, and what does it imply about their intersection? (2 steps)", "answer": "- Step 1: Two events are mutually exclusive (disjoint) if they **cannot both occur**: $$P(A \\cap C) = 0.$$ Their intersection is the empty set.\n- Step 2: This means $$P(A \\cup C) = P(A) + P(C)$$ — the inclusion-exclusion formula simplifies because the intersection term vanishes. For Q6: $$P(A \\cup C) = 0.1 + 0.5 = 0.6.$$\n\nTakeaway: Mutually exclusive → intersection is zero → union is just the sum.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "S1 May 2023 Q6 — What is the definition of \"independent\" events, and how does it differ from mutually exclusive? (2 steps)", "answer": "- Step 1: Two events are independent if knowing one occurred tells you **nothing** about the other: $$P(B \\cap C) = P(B) \\cdot P(C).$$ The probability of the intersection equals the product of individual probabilities.\n- Step 2: This is fundamentally different from mutually exclusive. Mutually exclusive means \"if one happens, the other *cannot*\" — knowing one occurred gives you *maximum* information about the other. In fact, two events with positive probability **cannot be both** mutually exclusive and independent.\n\nTakeaway: Mutually exclusive = \"can't co-occur\"; Independent = \"co-occurrence is the product.\"", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": true}, {"question": "S1 May 2023 Q6 — Prove that two events with positive probability cannot be both mutually exclusive and independent. (3 steps)", "answer": "- Step 1: Suppose $$A$$ and $$C$$ are both mutually exclusive and independent, with $$P(A) > 0$$ and $$P(C) > 0.$$\n- Step 2: Mutual exclusivity gives $$P(A \\cap C) = 0.$$ Independence gives $$P(A \\cap C) = P(A) \\cdot P(C) > 0$$ (product of two positive numbers).\n- Step 3: Contradiction: $$0 = P(A \\cap C) = P(A) \\cdot P(C) > 0.$$ So the assumption is impossible. If one of the probabilities is zero, the events *can* be both — but for positive probability, never.\n\nTakeaway: Positive-probability events are either mutually exclusive or independent (or neither), but never both.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": true}, {"question": "S1 May 2023 Q6(b) — Given $$P(A)$$, $$P(B \\mid A)$$, and $$P(A \\cup B)$$, how do you find $$P(B)$$? (3 steps)", "answer": "- Step 1: First find $$P(A \\cap B) = P(A) \\cdot P(B \\mid A) = 0.1 \\times 0.3 = 0.03.$$ This uses the multiplication rule.\n- Step 2: Then apply inclusion-exclusion: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B).$$ Substitute known values: $$0.25 = 0.1 + P(B) - 0.03.$$\n- Step 3: Solve: $$P(B) = 0.25 - 0.1 + 0.03 = 0.18.$$ Write the formula before substituting — examiners award method marks for the structure.\n\nTakeaway: Conditional → intersection via multiplication rule → then inclusion-exclusion → solve.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "S1 May 2023 Q6(c) — When filling a three-set Venn diagram, what order should you fill the regions, and why? (3 steps)", "answer": "- Step 1: Fill **from the centre outward**: first the triple intersection $$A \\cap B \\cap C,$$ then the double-only regions, then the single-only regions, then the outside.\n- Step 2: The reason: each outer region's probability is computed by subtracting inner regions from the total for that set. For example, \"A only\" = $$P(A) - P(A \\cap B) - P(A \\cap C) + P(A \\cap B \\cap C).$$ If you fill outer regions first, you don't yet know what to subtract.\n- Step 3: For Q6: $$A \\cap C = 0$$ forces $$A \\cap B \\cap C = 0.$$ Then $$A \\cap B$$ only = 0.03, $$B \\cap C$$ only = 0.09 (from independence), A only = 0.07, B only = 0.06, C only = 0.41, outside = 0.34.\n\nTakeaway: Centre outward ensures you always subtract known quantities.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "S1 May 2023 Q6(c) — In a three-set Venn diagram, if $$A \\cap C = \\emptyset$$ (mutually exclusive), what does that force about the triple intersection $$A \\cap B \\cap C$$? (2 steps)", "answer": "- Step 1: $$A \\cap B \\cap C$$ is a **subset** of $$A \\cap C.$$ If $$A \\cap C$$ is empty, then every subset of it is also empty.\n- Step 2: Therefore $$P(A \\cap B \\cap C) = 0$$ automatically. You must state this explicitly — it's a 1-mark loss to leave the triple region blank or assume it's non-zero.\n\nTakeaway: If two sets are disjoint, the triple intersection with any third set is also zero.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": true}, {"question": "S1 May 2023 Q6(c) — What is the most commonly forgotten region when drawing a Venn diagram, and how do you check your work? (2 steps)", "answer": "- Step 1: The **outside region** (the complement of $$A \\cup B \\cup C$$) is most commonly forgotten. For Q6, it equals $$1 - (0.07 + 0.06 + 0.41 + 0.03 + 0 + 0.09 + 0) = 0.34.$$\n- Step 2: Always **check that all eight regions sum to 1.** Write this check on your script. If the sum isn't 1, you've made an arithmetic error somewhere.\n\nTakeaway: Label the outside region and verify the total is 1.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "S1 May 2023 Q6(c) — A common error in Q6(c) is setting $$P(B \\cap C) = 0$$ instead of using independence. Why does this happen, and how do you avoid it? (2 steps)", "answer": "- Step 1: The error occurs because part (a) established that $$A$$ and $$C$$ are mutually exclusive ($$P(A \\cap C) = 0$$), and students carry this \"zero intersection\" habit to the $$B \\cap C$$ region in part (c). But part (c) explicitly states $$B$$ and $$C$$ are **independent**, not mutually exclusive.\n- Step 2: To avoid: at the start of each part, re-read the condition. Write \"B and C independent → $$P(B \\cap C) = P(B)P(C) = 0.18 \\times 0.5 = 0.09$$\" on your script before filling the diagram.\n\nTakeaway: Each part may introduce a new condition — don't carry assumptions from previous parts.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": true}, {"question": "S1 May 2023 Q7 — Before reaching for normal distribution tables, what should you always draw, and why? (2 steps)", "answer": "- Step 1: **Sketch the normal curve** with the relevant region shaded. Mark the mean, the value(s) in question, and shade the probability region.\n- Step 2: The sketch instantly tells you the **sign of $$z$$** — if the shaded area is less than 0.5 on the left, $$z$$ is negative; if it's the right tail less than 0.5, $$z$$ is positive. This prevents the classic Q7(a)(ii) sign error where students use $$z = +1.40$$ instead of $$z = -1.40.$$\n\nTakeaway: Sketch first → sign of $$z$$ is visually obvious → no sign errors.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": false}, {"question": "S1 May 2023 Q7(a)(ii) — When $$P(J > d) = 0.9192$$ (more than 0.5), what does this tell you about the position of $$d$$ relative to the mean, and how do you find the correct $$z$$-value? (3 steps)", "answer": "- Step 1: If $$P(J > d) = 0.9192 > 0.5,$$ then more than half the distribution lies above $$d.$$ This means $$d$$ is **below the mean** — it's in the lower tail.\n- Step 2: Convert to a lower-tail probability: $$P(J \\le d) = 1 - 0.9192 = 0.0808.$$ Since this is less than 0.5, $$z$$ is negative.\n- Step 3: Look up: $$\\Phi(-z) = 0.9192$$ gives $$-z = 1.40,$$ so $$z = -1.40.$$ Then $$d = 500 + (-1.40)(25) = 465.$$ The classic error is using $$z = +1.40$$ and getting $$d = 535.$$\n\nTakeaway: If the upper-tail probability exceeds 0.5, the value is below the mean and $$z$$ is negative.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": true}, {"question": "S1 May 2023 Q7(b) — When finding the probability that *each* of 5 independent bags yields less than 510 ml, what operation do you perform, and what is the common mistake? (2 steps)", "answer": "- Step 1: Since the bags are independent and you need *all five* to satisfy the condition, **raise to the 5th power**: $$P(\\text{all 5} < 510) = [P(J < 510)]^5 = (0.6554)^5 \\approx 0.121.$$\n- Step 2: The common mistake is **multiplying by 5** instead: $$5 \\times 0.6554 = 3.277,$$ which is not even a valid probability. Multiplying by 5 would be the expected *count* of bags under 510, not the probability that all 5 are under 510.\n\nTakeaway: \"Each\" / \"all\" with independence → raise to the power; never multiply.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": false}, {"question": "S1 May 2023 Q7(c) — When setting up a two-equation system from two normal probability statements, what algebraic strategy should you use before substituting numbers? (3 steps)", "answer": "- Step 1: Convert each probability statement to a $$z$$-equation. For $$P(R < r) = 0.15$$: $$\\frac{r - 520}{k} = z_1.$$ For $$P(R > 3r - 800) = 0.005$$: $$\\frac{3r - 800 - 520}{k} = z_2.$$\n- Step 2: **Rearrange both equations to the form $$r = \\ldots k$$** before equating. This makes the algebra clean: $$r = 520 + z_1 k$$ and $$r = 440 + \\frac{z_2}{3}k.$$\n- Step 3: Equate the two expressions for $$r$$ and solve for $$k,$$ then back-substitute for $$r.$$ Verify by substituting both values back into the original probability statements.\n\nTakeaway: Both equations → $$r = \\ldots k$$ form → equate → solve → verify.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": true}, {"question": "S1 May 2023 Q7(c) — When looking up $$z$$-values for tail probabilities like 0.005 or 0.15, which table should you use, and what's the pitfall of using the wrong one? (2 steps)", "answer": "- Step 1: Use the **percentage-point table** (Table 4) for small tail probabilities. It gives $$z$$ directly for upper-tail areas like 0.005 → $$z = 2.5758.$$ The **body table** ($$\\Phi(z)$$) gives cumulative probabilities for given $$z$$ — using it requires you to compute $$\\Phi(z) = 0.995$$ and then search, which is slower and less precise.\n- Step 2: The pitfall: using the body table with $$\\Phi(z) = 0.995$$ gives a rounded $$z \\approx 2.58,$$ which is less precise than the percentage-point table's $$2.5758.$$ In a \"show that\" or high-precision question, this rounding can cause your final answer to miss.\n\nTakeaway: For small tail probabilities, use the percentage-point table for maximum precision.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": false}, {"question": "What are the four key percentage-point $$z$$-values you should memorise for S1, and when do you use each? (2 steps)", "answer": "- Step 1: The four values: $$z_{0.05} = 1.6449$$ (5% upper tail), $$z_{0.025} = 1.9600$$ (2.5% upper tail), $$z_{0.01} = 2.3263$$ (1% upper tail), $$z_{0.005} = 2.5758$$ (0.5% upper tail).\n- Step 2: These correspond to common significance levels and tail areas in exam questions. Memorising them saves table-lookup time and prevents the body-table vs percentage-point-table confusion. For a lower tail of the same area, negate: e.g., 5% lower tail → $$z = -1.6449.$$\n\nTakeaway: 1.6449, 1.9600, 2.3263, 2.5758 — the four essential percentage-point values.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": false}, {"question": "S1 May 2023 Q7(c) — In the equation $$R \\sim N(520, k^2)$$, what does $$k$$ represent, and what is the common confusion? (2 steps)", "answer": "- Step 1: In the notation $$N(\\mu, \\sigma^2)$$, the second parameter is the **variance**. Here $$k^2$$ is the variance, so $$k$$ is the **standard deviation** $$\\sigma.$$ When you standardise, you divide by $$k$$ (not $$k^2$$).\n- Step 2: The common confusion is treating $$k$$ as the variance and dividing by $$k^2$$ or writing $$z = \\frac{r - 520}{k^2}.$$ Always check: is the second parameter the variance or the standard deviation? In Edexcel notation, it's always the variance.\n\nTakeaway: $$N(\\mu, \\sigma^2)$$ → the second parameter is variance. If they write $$k^2$$, then $$k = \\sigma.$$", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": true}, {"question": "S1 general — When the question says \"show that\" a formula equals a given value, what two things must you do to guarantee full marks? (2 steps)", "answer": "- Step 1: **Quote intermediate values with sufficient precision** — table values to 4 d.p., algebraic intermediates to at least 5 s.f. For example, write \"$$\\Phi(0.4) = 0.6554$$\" explicitly on your script.\n- Step 2: **Show every step** of the algebra/arithmetic so the examiner can trace your logic from the given data to the printed answer. Do not skip steps or write \"≈\" when you mean \"=\" for exact intermediate values. The printed answer must emerge naturally from your working.\n\nTakeaway: \"Show that\" = transparent working + high-precision intermediates.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": false}, {"question": "S1 general — For any probability question involving conditional probability, what formula should you write on your script before substituting any numbers? (2 steps)", "answer": "- Step 1: Write $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}.$$ This applies to Bayes, tree-diagram reversals, and any \"given that\" question.\n- Step 2: Examiners award method marks for the formula structure even if your arithmetic is wrong. Without the formula, a numerical error costs you all marks. With it, you typically lose only the accuracy mark.\n\nTakeaway: Always write the formula first — it's an insurance policy against arithmetic errors.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": false}, {"question": "S1 general — What is the coding formula for the mean and variance when data are transformed by $$X = \\frac{x - a}{b}$$, and how do you reverse-code? (3 steps)", "answer": "- Step 1: Forward coding: $$\\bar{X} = \\frac{\\bar{x} - a}{b}$$ and $$\\text{Var}(X) = \\frac{\\text{Var}(x)}{b^2}.$$ The shift $$a$$ affects only the mean; the scale $$b$$ affects both mean and variance (variance divides by $$b^2$$).\n- Step 2: Reverse-coding the mean: $$\\bar{x} = b\\bar{X} + a.$$ You undo the transformation in reverse order: first multiply by $$b$$, then add $$a$$.\n- Step 3: Reverse-coding the variance: $$\\text{Var}(x) = b^2 \\text{Var}(X).$$ The shift $$a$$ never appears in the variance formula — variance is shift-invariant.\n\nTakeaway: Mean reverses with both scale and shift; variance reverses with scale only.", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": false}, {"question": "S1 general — Why does PMCC remain the same under positive linear coding but change under negative scaling? (2 steps)", "answer": "- Step 1: Positive linear coding preserves the *direction* of the relationship. If $$t$$ and $$w$$ are positively correlated, then $$x = t - 6$$ and $$y = w/2 - 5$$ are still positively correlated — the scatter plot is just shifted and rescaled.\n- Step 2: Negative scaling (e.g., $$y = -w$$) *reverses* the direction: a positive correlation becomes negative, and vice versa. So $$r$$ changes sign. The magnitude $$|r|$$ is always preserved under any linear coding, but the sign flips if exactly one of the two scale factors is negative.\n\nTakeaway: PMCC is invariant under positive linear coding; it changes sign if one (not both) scale factor is negative.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": true}, {"question": "S1 general — For grouped continuous data, why do we use $$n/2$$ for the median position instead of $$(n+1)/2$$? (2 steps)", "answer": "- Step 1: Grouped data are treated as **continuous** — the values within each class can be anywhere in the interval. For a continuous distribution, the median is the value $$m$$ such that $$P(X < m) = 0.5,$$ which corresponds to the $$n/2$$-th value in the cumulative frequency.\n- Step 2: The $$(n+1)/2$$ formula is for **discrete** data where the median is an actual data point (the middle one when $$n$$ is odd, the average of the two middle ones when $$n$$ is even). In grouped data, we're interpolating within a class — the distinction between $$n/2$$ and $$(n+1)/2$$ matters.\n\nTakeaway: Continuous/grouped → $$n/2$$; Discrete → $$(n+1)/2.$$", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": false}, {"question": "S1 May 2023 Q5 — When computing $$E(Y^2)$$ for variance, what arithmetic step is most error-prone, and how do you guard against it? (2 steps)", "answer": "- Step 1: The term $$y^2 \\times P(Y=y)$$ for larger $$y$$ values is most error-prone. For Q5, $$25 \\times 17 = 425$$ is the biggest contributor to $$E(Y^2)$$ and the easiest place to slip (e.g., writing 435 or 245).\n- Step 2: Guard by tabulating systematically: list $$y$$, $$y^2$$, $$P(Y=y)$$, and $$y^2 \\times P(Y=y)$$ in columns. Sum the final column. This structure makes errors visible and self-correcting.\n\nTakeaway: Tabulate $$y^2 \\times P(Y=y)$$ in columns — don't try to compute $$E(Y^2)$$ in your head.", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": false}, {"question": "S1 May 2023 Q7(c) — After solving a two-equation normal system for $$r$$ and $$k$$, what verification step must you perform? (2 steps)", "answer": "- Step 1: Substitute your values of $$r$$ and $$k$$ back into **both** original probability statements. For Q7: check $$P(R < 476) = 0.15$$ by computing $$z = (476 - 520)/42.2 = -1.036$$ ✓, and $$P(R > 3(476) - 800) = P(R > 629)$$ with $$z = (629 - 520)/42.2 = 2.576$$ ✓.\n- Step 2: If either check fails, you know there's an algebraic or sign error. This catches wrong $$z$$-signs and arithmetic slips before you submit.\n\nTakeaway: Always verify by substituting back into both original probability statements.", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": false}, {"question": "S1 general — What is the time budget per mark in a 75-mark, 90-minute S1 paper, and how should you allocate time? (2 steps)", "answer": "- Step 1: 90 minutes ÷ 75 marks = **1.2 minutes per mark**. A 3-mark question gets about 3.5 minutes; an 8-mark question gets about 10 minutes.\n- Step 2: Reserve about 5 minutes at the end for checking. This means you have roughly 85 working minutes. If a question is taking significantly longer than its mark allocation, move on and return to it later.\n\nTakeaway: 1.2 min/mark; don't get stuck; save 5 min for review.", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": false}, {"question": "S1 general — What is the \"formula before substitution\" rule, and why is it critical for exam marks? (2 steps)", "answer": "- Step 1: Before substituting any numbers, write the relevant formula on your script. For Bayes: write $$P(C \\mid R) = \\frac{P(C \\cap R)}{P(R)}.$$ For variance: write $$\\text{Var}(aY + b) = a^2 \\text{Var}(Y).$$ For inclusion-exclusion: write $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B).$$\n- Step 2: Examiners award **method marks** for the formula structure even if your arithmetic is wrong. Without the formula, a numerical error can cost you all marks on that part. With it, you typically lose only the accuracy mark (usually 1 out of 3–4 marks).\n\nTakeaway: Writing the formula first is exam insurance — it protects method marks.", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": true}, {"question": "S1 May 2023 Q1 — When a histogram question asks for the frequency in a range that spans multiple bars (like 22 to 45 km), what is the systematic approach? (3 steps)", "answer": "- Step 1: Identify which bars the range crosses. For $$[22, 45)$$: it crosses $$[20,30)$$, $$[30,40)$$, and $$[40,50)$$.\n- Step 2: For each bar, determine if it's a full bar or a partial slice. $$[22,30)$$ is partial (width 8), $$[30,40)$$ is full (width 10), $$[40,45)$$ is partial (width 5).\n- Step 3: Compute each separately: $$8 \\times 7 = 56$$, $$10 \\times 10 = 100$$, $$5 \\times 3 = 15$$. Sum: 171. Never treat partial bars as full bars.\n\nTakeaway: Slice-by-slice: identify → full or partial → FD × width → sum.", "source": "GLM 5.1 ②", "_id": "glm_2_50", "judge_pick": true}, {"question": "S1 May 2023 Q2 — How do you compute $$S_{ww}$$ from summary statistics, and what is the formula? (2 steps)", "answer": "- Step 1: $$S_{ww} = \\sum w^2 - \\frac{(\\sum w)^2}{n}.$$ This is the same pattern as $$S_{xx}$$ — sum of squares minus (sum)²/n.\n- Step 2: For Q2: $$S_{ww} = 6089.12 - \\frac{297.8^2}{15} = 6089.12 - 5912.32 = 176.80 \\approx 177.$$ The formula is in the formula booklet, but you must remember it's a **subtraction**.\n\nTakeaway: $$S_{yy} = \\sum y^2 - (\\sum y)^2/n$$ — same pattern for any variable.", "source": "GLM 5.1 ②", "_id": "glm_2_51", "judge_pick": false}, {"question": "S1 May 2023 Q2 — When calculating PMCC $$r$$, what range check must you perform on your answer, and what does it tell you? (2 steps)", "answer": "- Step 1: Check that $$-1 \\le r \\le 1.$$ The PMCC is a correlation coefficient and must lie in this range by definition. If your calculated $$r$$ falls outside, you've made an error (likely a sign mistake in $$S_{tw}$$ or a computational error).\n- Step 2: For Q2: $$r = 0.827$$ is within range and indicates a strong positive linear correlation. If you got $$r = 1.2$$ or $$r = -0.95$$ (when the data clearly show positive association), something is wrong.\n\nTakeaway: Always sanity-check $$r$$ against $$[-1, 1]$$ — it's a quick error detector.", "source": "GLM 5.1 ②", "_id": "glm_2_52", "judge_pick": false}, {"question": "S1 May 2023 Q2(c) — What are the two steps to find the intercept $$a$$ of a regression line $$w = a + bt$$? (2 steps)", "answer": "- Step 1: First compute the gradient $$b = S_{tw}/S_{tt}.$$ Then compute both means: $$\\bar{t} = \\sum t / n$$ and $$\\bar{w} = \\sum w / n.$$\n- Step 2: Use $$a = \\bar{w} - b\\bar{t}.$$ The regression line always passes through the mean point $$(\\bar{t}, \\bar{w})$$, so once you have $$b$$, the intercept follows. For Q2: $$a = 19.853 - 4.771 \\times 7.653 = -16.66 \\approx -16.7.$$\n\nTakeaway: Gradient first, then intercept via the mean point.", "source": "GLM 5.1 ②", "_id": "glm_2_53", "judge_pick": false}, {"question": "S1 general — In a Venn diagram with three sets $$A, B, C$$, how many distinct regions must be labelled, and what are they? (2 steps)", "answer": "- Step 1: There are **8** regions: A only, B only, C only, $$A \\cap B$$ only, $$A \\cap C$$ only, $$B \\cap C$$ only, $$A \\cap B \\cap C$$, and the outside (complement of $$A \\cup B \\cup C$$).\n- Step 2: Every region must carry a number (even if it's 0). Missing regions are treated as incomplete work. For Q6, the $$A \\cap C$$ only and $$A \\cap B \\cap C$$ regions are both 0, but must still be written.\n\nTakeaway: 3 sets → 8 regions → label them all, including zeros and the outside.", "source": "GLM 5.1 ②", "_id": "glm_2_54", "judge_pick": false}, {"question": "S1 May 2023 Q6(c) — How do you compute the \"B only\" region in a three-set Venn diagram? (2 steps)", "answer": "- Step 1: \"B only\" means in B but not in A and not in C: $$P(B \\text{ only}) = P(B) - P(A \\cap B) - P(B \\cap C) + P(A \\cap B \\cap C).$$\n- Step 2: The $$+P(A \\cap B \\cap C)$$ term is needed because when you subtract $$P(A \\cap B)$$ and $$P(B \\cap C)$$, you've subtracted the triple intersection twice. Adding it back corrects the double-counting. For Q6: $$0.18 - 0.03 - 0.09 + 0 = 0.06.$$\n\nTakeaway: \"Only\" regions require inclusion-exclusion within the set — don't forget the triple correction.", "source": "GLM 5.1 ②", "_id": "glm_2_55", "judge_pick": true}, {"question": "S1 May 2023 Q7(a)(i) — When standardising a normal variable, what is the formula and what distribution does the result follow? (2 steps)", "answer": "- Step 1: $$Z = \\frac{X - \\mu}{\\sigma}.$$ Subtract the mean, divide by the standard deviation. This converts any normal distribution to the standard normal.\n- Step 2: $$Z \\sim N(0, 1).$$ The result has mean 0 and variance 1, allowing you to look up probabilities in the standard normal table. For Q7: $$Z = \\frac{510 - 500}{25} = 0.4.$$\n\nTakeaway: Standardise → look up in $$N(0,1)$$ tables.", "source": "GLM 5.1 ②", "_id": "glm_2_56", "judge_pick": false}, {"question": "S1 May 2023 Q7 — For the lower-tail probability $$P(R < r) = 0.15$$, explain how to determine the sign of $$z$$ and find its value. (3 steps)", "answer": "- Step 1: Since 0.15 < 0.5, the value $$r$$ is below the mean, so $$z$$ is **negative**. Your sketch should show the shaded area on the left side of the curve.\n- Step 2: Convert to an upper-tail probability for the positive side: $$\\Phi(-z) = 1 - 0.15 = 0.85.$$ Look up what $$z$$-value gives $$\\Phi(z) = 0.85$$ → approximately $$z = 1.0364.$$\n- Step 3: So $$-z = 1.0364$$, meaning $$z = -1.0364.$$ Then $$\\frac{r - 520}{k} = -1.0364.$$ The sign discipline here is the single most important step.\n\nTakeaway: Lower tail < 0.5 → $$z$$ is negative. Use $$\\Phi(-z) = 1 - \\text{lower tail}$$ to find the magnitude.", "source": "GLM 5.1 ②", "_id": "glm_2_57", "judge_pick": true}, {"question": "S1 May 2023 Q7 — For the upper-tail probability $$P(R > 3r - 800) = 0.005$$, what is the sign of $$z$$ and how do you find its value? (2 steps)", "answer": "- Step 1: Since 0.005 < 0.5 and this is an upper tail, the value $$3r - 800$$ is **above** the mean, so $$z$$ is **positive**. Your sketch shows the small shaded area on the right.\n- Step 2: Use the percentage-point table: $$P(Z > z) = 0.005$$ gives $$z = 2.5758.$$ So $$\\frac{3r - 800 - 520}{k} = 2.5758.$$\n\nTakeaway: Small upper tail → $$z$$ is positive → use percentage-point table directly.", "source": "GLM 5.1 ②", "_id": "glm_2_58", "judge_pick": false}, {"question": "S1 general — When a question uses coding $$x = t - 6$$ and $$y = w/2 - 5$$, and asks for the regression line of $$y$$ on $$x$$, what is the step-by-step substitution method? (3 steps)", "answer": "- Step 1: Invert the coding to express the original variables in terms of the new ones: $$t = x + 6$$ and $$w = 2(y + 5) = 2y + 10.$$\n- Step 2: Substitute both into the original regression line $$w = -16.7 + 4.77t$$: $$2y + 10 = -16.7 + 4.77(x + 6).$$\n- Step 3: This is the unsimplified regression line of $$y$$ on $$x.$$ If required, simplify: $$2y = -16.7 + 4.77x + 28.62 - 10 = 1.92 + 4.77x,$$ so $$y = 0.96 + 2.385x.$$ But the question often says \"you do not need to simplify\" — take that hint.\n\nTakeaway: Invert the coding → substitute into the original line → optionally simplify.", "source": "GLM 5.1 ②", "_id": "glm_2_59", "judge_pick": false}, {"question": "S1 general — What is the relationship between $$E(aY + b)$$ and $$E(Y)$$, and why does the constant add rather than multiply? (2 steps)", "answer": "- Step 1: $$E(aY + b) = aE(Y) + b.$$ The expectation is linear — it distributes over addition and scales by multiplicative factors.\n- Step 2: Intuition: if every value of $$Y$$ is scaled by $$a$$ and then shifted by $$b$$, the average (expected value) is also scaled by $$a$$ and shifted by $$b.$$ The constant $$b$$ is added to every outcome, so it's added to the average.\n\nTakeaway: Expectation is linear — scale and shift both carry through.", "source": "GLM 5.1 ②", "_id": "glm_2_60", "judge_pick": false}, {"question": "S1 general — What is the inclusion-exclusion formula for three sets, and when do you use it? (2 steps)", "answer": "- Step 1: $$P(A \\cup B \\cup C) = P(A) + P(B) + P(C) - P(A \\cap B) - P(A \\cap C) - P(B \\cap C) + P(A \\cap B \\cap C).$$\n- Step 2: Use it when you need the probability of \"at least one of A, B, C\" and you know the individual and pairwise probabilities. The pattern: add singles, subtract pairs, add the triple. For Venn diagram verification, the total of all 8 regions should equal $$P(A \\cup B \\cup C)$$ plus the outside region.\n\nTakeaway: Add singles, subtract pairs, add triple — the inclusion-exclusion pattern.", "source": "GLM 5.1 ②", "_id": "glm_2_61", "judge_pick": true}, {"question": "S1 general — In a probability tree, how do you compute the probability of reaching a specific endpoint? (2 steps)", "answer": "- Step 1: **Multiply** along the branches leading to that endpoint. For example, $$P(A \\cap \\text{not red}) = P(A) \\times P(\\text{not red} \\mid A) = 0.30 \\times 0.98 = 0.294.$$\n- Step 2: This is the multiplication rule: $$P(A \\cap B) = P(A) \\times P(B \\mid A).$$ The first branch gives the unconditional probability; the second branch gives the conditional probability.\n\nTakeaway: Along branches → multiply. This gives joint probabilities.", "source": "GLM 5.1 ②", "_id": "glm_2_62", "judge_pick": false}, {"question": "S1 general — In a probability tree, how do you compute the probability of an event that can be reached via multiple paths (e.g., \"counter is red\")? (2 steps)", "answer": "- Step 1: **Add** the probabilities of all paths leading to that event. $$P(\\text{red}) = P(A \\cap R) + P(B \\cap R) + P(C \\cap R).$$\n- Step 2: This is the total probability formula. Each path represents a mutually exclusive way to reach the event, so you sum them. For Q4: $$0.006 + 0.018 + 0.015 = 0.039.$$\n\nTakeaway: Across paths → add. This is the law of total probability.", "source": "GLM 5.1 ②", "_id": "glm_2_63", "judge_pick": false}, {"question": "S1 May 2023 — What is the single highest-leverage formula to master for this paper, and why? (2 steps)", "answer": "- Step 1: $$\\text{Var}(aY + b) = a^2\\,\\text{Var}(Y).$$ This formula appears in Q5(e) (4 marks) and underpins Q3(b) (variance under coding) and Q7(c) (normal distribution parameters under transformation).\n- Step 2: The three failure modes are: (1) using $$a$$ instead of $$a^2$$, (2) keeping the sign of $$a$$ (writing $$-2$$ instead of $$+4$$), and (3) not dropping the constant $$b.$$ Master this one formula and Q5e becomes a 90-second computation rather than a 4-minute risk.\n\nTakeaway: $$\\text{Var}(aY + b) = a^2\\,\\text{Var}(Y)$$ — square the coefficient, drop the constant.", "source": "GLM 5.1 ②", "_id": "glm_2_64", "judge_pick": true}, {"question": "S1 May 2023 Q3 — When coding is $$x = l - 600$$, what is the general formula $$x = \\frac{l - a}{b}$$ in this case, and how do you identify $$a$$ and $$b$$? (2 steps)", "answer": "- Step 1: Rewrite the coding in the standard form $$x = \\frac{l - a}{b}.$$ Here $$x = l - 600 = \\frac{l - 600}{1},$$ so $$a = 600$$ and $$b = 1.$$\n- Step 2: This tells you: mean reverses as $$\\bar{l} = b\\bar{x} + a = 1 \\times \\bar{x} + 600 = \\bar{x} + 600,$$ and variance reverses as $$\\text{Var}(l) = b^2\\,\\text{Var}(x) = 1 \\times \\text{Var}(x) = \\text{Var}(x).$$ The shift ($$a = 600$$) affects only the mean; the scale ($$b = 1$$) leaves variance unchanged.\n\nTakeaway: Identify $$a$$ and $$b$$ from the standard form → apply reverse-coding formulas.", "source": "GLM 5.1 ②", "_id": "glm_2_65", "judge_pick": false}, {"question": "S1 May 2023 — What are the three highest-leverage exam habits that this paper rewards? (3 steps)", "answer": "- Step 1: **Calibration before reading** (Q1, Q3): always compute FD for the known class before reading any other bar. This prevents most histogram errors.\n- Step 2: **Algebraic discipline before numerical substitution** (Q5, Q7c): write the formula, manipulate the inequality, set up the equation system *before* plugging in numbers. This catches sign errors and conceptual mistakes.\n- Step 3: **Conceptual precision about probability vocabulary** (Q4, Q6): mutually exclusive ≠ independent; $$P(C \\mid R) \\neq P(R \\mid C)$$; \"independent\" → multiply probabilities, not set intersection to zero.\n\nTakeaway: Calibrate, algebra first, vocabulary precision — the three habits that separate A from B.", "source": "GLM 5.1 ②", "_id": "glm_2_66", "judge_pick": false}, {"question": "S1 May 2023 Q7(a)(ii) — A student computes $$P(J > d) = 0.9192$$ and looks up $$\\Phi(z) = 0.9192$$ to get $$z = 1.40$$, then writes $$d = 500 + 1.40 \\times 25 = 535$$. What is wrong? (2 steps)", "answer": "- Step 1: The student found the $$z$$-value such that the *cumulative* probability is 0.9192. But $$P(J > d) = 0.9192$$ means the area *above* $$d$$ is 0.9192, which is more than half the curve. This is impossible if $$d$$ is above the mean.\n- Step 2: The correct approach: $$P(J \\leq d) = 1 - 0.9192 = 0.0808,$$ which is a lower-tail probability less than 0.5. So $$z$$ must be negative: $$z = -1.40$$, giving $$d = 500 - 35 = 465.$$ The sketch would have immediately shown this.\n\nTakeaway: If the stated tail probability exceeds 0.5, the value is on the opposite side of the mean from what you'd expect.", "source": "GLM 5.1 ②", "_id": "glm_2_67", "judge_pick": false}, {"question": "S1 May 2023 Q3(d) — When showing there are no outliers, what must you explicitly state in your written answer for full marks? (2 steps)", "answer": "- Step 1: State both fence calculations: \"Lower fence = $$Q_1 - 1.5 \\times \\text{IQR} = -750$$\" and \"Upper fence = $$Q_3 + 1.5 \\times \\text{IQR} = 9250$$.\"\n- Step 2: State both comparisons: \"Min = 2000 > −750\" and \"Max = 7700 < 9250.\" Then conclude: \"Since no data values lie outside the fences, there are no outliers.\" Omitting either comparison loses marks.\n\nTakeaway: Two fences + two comparisons + conclusion = full marks.", "source": "GLM 5.1 ②", "_id": "glm_2_68", "judge_pick": false}, {"question": "S1 May 2023 Q5(d) — Why is it wrong to try to enumerate joint $$(Y, X)$$ pairs and compute $$P(Y=y) \\cdot P(X=x)$$ when $$X = 15 - 2Y$$? (2 steps)", "answer": "- Step 1: $$X$$ and $$Y$$ are **not independent** — $$X$$ is completely determined by $$Y$$. For each value of $$Y$$, there is exactly one corresponding value of $$X$$. So $$P(X = x \\mid Y = y) = 1$$ when $$x = 15 - 2y$$, and 0 otherwise.\n- Step 2: Computing $$P(Y=y) \\cdot P(X=x)$$ assumes independence, which is false here. The correct approach is to substitute the functional relationship and solve the inequality algebraically: $$Y \\leq 15 - 2Y \\Rightarrow Y \\leq 5.$$\n\nTakeaway: When one variable is a function of another, they are perfectly dependent — never assume independence.", "source": "GLM 5.1 ②", "_id": "glm_2_69", "judge_pick": true}, {"question": "S1 practice — A histogram has a class $$[0, 5)$$ with FD = 4. How many observations are in the sub-interval $$[2, 5)$$? (1 step mental math)", "answer": "- Step 1: Sub-interval width = $$5 - 2 = 3.$$ Frequency = FD × width = $$4 \\times 3 = 12.$$ This is partial-bar pro-rating: you don't need the full class frequency, just the FD and the slice width.\n\nTakeaway: Any rectangular sub-slice of a histogram bar has frequency = FD × slice width.", "source": "GLM 5.1 ②", "_id": "glm_2_70", "judge_pick": false}, {"question": "S1 practice — Data are coded as $$y = 3x - 2$$. If $$\\text{Var}(x) = 5$$, what is $$\\text{Var}(y)$$? (1 step mental math)", "answer": "- Step 1: $$\\text{Var}(y) = \\text{Var}(3x - 2) = 3^2 \\cdot \\text{Var}(x) = 9 \\times 5 = 45.$$ The constant $$-2$$ drops (shifting doesn't change spread), and the coefficient 3 is squared.\n\nTakeaway: $$\\text{Var}(ax + b) = a^2\\,\\text{Var}(x)$$ — square the scale, drop the shift.", "source": "GLM 5.1 ②", "_id": "glm_2_71", "judge_pick": false}, {"question": "S1 practice — If $$P(A) = 0.4$$ and $$P(B) = 0.3$$ and A and B are independent, what is $$P(A \\cap B)$$? (1 step mental math)", "answer": "- Step 1: Independence means $$P(A \\cap B) = P(A) \\cdot P(B) = 0.4 \\times 0.3 = 0.12.$$ This is the defining property of independence — the joint probability is the product.\n\nTakeaway: Independent → intersection probability = product of individual probabilities.", "source": "GLM 5.1 ②", "_id": "glm_2_72", "judge_pick": false}, {"question": "S1 practice — If $$P(A) = 0.4$$ and $$P(B) = 0.3$$ and A and B are mutually exclusive, what is $$P(A \\cap B)$$? (1 step mental math)", "answer": "- Step 1: Mutually exclusive means they cannot co-occur, so $$P(A \\cap B) = 0.$$ Note this is different from the independent case (0.12). This is why mutually exclusive and independent are fundamentally different concepts.\n\nTakeaway: Mutually exclusive → intersection = 0. Independent → intersection = product. Never confuse them.", "source": "GLM 5.1 ②", "_id": "glm_2_73", "judge_pick": false}, {"question": "S1 practice — A normal variable has $$\\mu = 100$$, $$\\sigma = 10$$. What is the probability of being more than 1 standard deviation above the mean? (2 steps)", "answer": "- Step 1: Standardise: $$Z = \\frac{110 - 100}{10} = 1.$$ We need $$P(Z > 1).$\n- Step 2: From tables, $$\\Phi(1) = 0.8413,$$ so $$P(Z > 1) = 1 - 0.8413 = 0.1587.$$ About 16% of values lie more than 1 SD above the mean. This is a useful ballpark to remember.\n\nTakeaway: About 16% of a normal distribution lies above $$\\mu + \\sigma$$.", "source": "GLM 5.1 ②", "_id": "glm_2_74", "judge_pick": false}, {"question": "S1 May 2023 Q6(c) — In the Venn diagram for Q6, why must circles A and C be drawn as non-overlapping, and what does this look like? (2 steps)", "answer": "- Step 1: Since $$A$$ and $$C$$ are mutually exclusive ($$P(A \\cap C) = 0$$), the circles for A and C must not share any region. They are drawn as completely separate (non-overlapping).\n- Step 2: Circle B overlaps both A (with 0.03 in the intersection) and C (with 0.09 in the intersection), but the triple intersection $$A \\cap B \\cap C$$ is 0 because A and C share no region. The diagram shows A and C separated, with B bridging between them.\n\nTakeaway: Mutually exclusive sets → non-overlapping circles in the Venn diagram.", "source": "GLM 5.1 ②", "_id": "glm_2_75", "judge_pick": true}, {"question": "S1 general — When a question gives summary statistics like $$\\sum t = 114.8$$ and $$n = 15$$, how do you compute $$\\bar{t}$$, and what precision should you keep? (2 steps)", "answer": "- Step 1: $$\\bar{t} = \\frac{\\sum t}{n} = \\frac{114.8}{15} = 7.65333\\ldots$$\n- Step 2: Keep at least **5 significant figures** (7.6533) through all subsequent calculations. Do not round to 7.65 at this stage — premature rounding in the mean propagates errors through the intercept calculation in regression. Round only at the final answer.\n\nTakeaway: Compute means to full calculator precision; round only final answers.", "source": "GLM 5.1 ②", "_id": "glm_2_76", "judge_pick": false}, {"question": "S1 May 2023 — What are the three discriminator questions on this paper (the ones that separate A-grade from B-grade students)? (2 steps)", "answer": "- Step 1: The three discriminators are Q5(d)–(e) (deterministic RV transformation and variance scaling), Q6(c) (three-set Venn with mixed mutually-exclusive/independent conditions), and Q7(c) (two-equation normal system with sign discipline).\n- Step 2: Each tests a different high-level skill: Q5 tests algebraic manipulation under dependency, Q6 tests conceptual precision about probability vocabulary, Q7 tests sustained algebraic accuracy with sign management. Mastering these three unlocks the top grades.\n\nTakeaway: Q5de, Q6c, Q7c — the three questions that decide the A grade.", "source": "GLM 5.1 ②", "_id": "glm_2_77", "judge_pick": true}], "count": 78}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "In a histogram question where one class frequency is given explicitly (e.g. \"60 people lie in [10, 20)\"), what is the very first calculation you must perform before reading any other bar? (2 steps)", "answer": "- Step 1: Compute the frequency density of that named class: $$\\text{FD}_{\\text{named}} = \\frac{f_{\\text{named}}}{w_{\\text{named}}}$$, e.g. $$\\text{FD}_{[10,20)} = \\frac{60}{10} = 6$$. This is your **calibration point** — it sets the vertical scale of the entire histogram.\n- Step 2: Use this FD value to read off the FD of every other bar by comparing heights. Never read FD values directly off the y-axis without this calibration, because the axis scale may be unclear or misleading in the exam diagram.\n\nThe mantra from Mr. Fuat: *\"Calibrate first, then never read FD off the axis again — read off your scale.\"*", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": true}, {"question": "When a histogram question asks for the number of people in a range that slices *partially* through a class (e.g. [22, 45) spanning parts of three bars), what is the key strategy for each partial bar? (2 steps)", "answer": "- Step 1: Identify the slice width within that bar. For example, [22, 30) has width 8 (not 10), and [40, 45) has width 5 (not 10).\n- Step 2: Apply $$f = \\text{FD} \\times \\text{slice width}$$ — the same FD as the full bar, but multiplied by the *sub-width*, not the full class width. E.g. $$f_{[22,30)} = 7 \\times 8 = 56$$, $$f_{[40,45)} = 3 \\times 5 = 15$$.\n\nThe pitfall: treating partial bars as full bars (e.g. using width 10 instead of 8) loses both accuracy and marks. Every shaded rectangle = FD × its slice width.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": true}, {"question": "For finding the median of grouped continuous data from a histogram, what positional formula do you use, and what is the common wrong alternative? (2 steps)", "answer": "- Step 1: Use $$\\text{median position} = \\frac{n}{2}$$ for grouped continuous data. This is because the data are treated as continuous within each class — there are no discrete \"gaps\" between values.\n- Step 2: Do NOT use $$\\frac{n+1}{2}$$. That formula belongs to discrete data (e.g. a sorted list of individual values). Applying it to grouped continuous data is a consistent Edexcel mark-loss error.\n\nThe grouped median interpolation formula then becomes: $$\\text{median} = L + \\frac{n/2 - F}{f_m} \\times w$$, where $$L$$ is the lower bound of the median class, $$F$$ is the cumulative frequency below it, $$f_m$$ is the frequency of the median class, and $$w$$ is its width.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "Before locating the median class in a histogram question, what column must you write down and why? (2 steps)", "answer": "- Step 1: Write a **cumulative frequency column**: running totals at each upper class boundary. E.g. for classes with frequencies 5, 60, 70, 100, 30, 9, the cumulative frequencies are 5, 65, 135, 235, 265, 274.\n- Step 2: Compare the median position ($$n/2 = 137$$) against these cumulative totals to find which class contains the 137th value. Here, 135 < 137 ≤ 235, so the median lies in the [30, 40) class.\n\nWithout this column, the common error is \"subtracting bar frequencies sequentially\" and losing track of which class contains the median — especially risky when the median falls near a class boundary.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "When estimating the mean from grouped data in a histogram, what value do you use to represent each class, and what is the pitfall? (2 steps)", "answer": "- Step 1: Use the **midpoint** of each class: $$x_{\\text{mid}} = \\frac{\\text{lower bound} + \\text{upper bound}}{2}$$. E.g. for [20, 30), the midpoint is 25.\n- Step 2: Then compute $$\\bar{x} = \\frac{\\sum f \\cdot x_{\\text{mid}}}{\\sum f}$$. Do NOT use the class boundaries themselves, and do NOT use the class width as a stand-in for the value.\n\nThe midpoint assumption is that within each class, values are uniformly distributed — the best single-number summary for that class.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "In the formula $$S_{xy} = \\sum xy - \\frac{\\sum x \\sum y}{n}$$, what is the sign between the two terms, and what is the common error? (1 step)", "answer": "- Step 1: It is always **subtract**. The formula is $$S_{xy} = \\sum xy - \\frac{\\sum x \\sum y}{n}$$. The common error is writing $$+$$ instead of $$-$$, which produces a completely wrong value and cascades through every subsequent calculation ($$r$$, regression coefficients). This is one of the highest-frequency sign errors in S1.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "In a \"show that\" question where the answer is printed (e.g. \"show that $$w = -16.7 + 4.77t$$\"), how many significant figures must you carry through intermediate calculations, and why? (2 steps)", "answer": "- Step 1: Carry **at least 5 significant figures** through all intermediate working — $$S_{tw}$$, $$b$$, $$a$$, means, etc. For example, store $$b = 4.77073$$ and $$a = -16.65991$$ in your calculator without rounding.\n- Step 2: Only round to the printed precision at the final step. If you round $$S_{tw}$$ to 25.4 early, then $$b = 25.4/5.3173 = 4.776$$, which rounds to 4.78 — and the \"show that\" value of 4.77 is not reproduced. You lose the mark.\n\nPremature rounding is flagged as **High severity** in the weakness analysis. Always carry ≥ 5 s.f. through.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "When the question says \"regression line of $$w$$ on $$t$$\", which variable's sum of squares goes in the denominator of the gradient formula? (2 steps)", "answer": "- Step 1: The gradient is $$b = \\frac{S_{tw}}{S_{tt}}$$. The **explanatory variable** (the one being regressed *on*) goes in the denominator. Here, \"regression of $$w$$ on $$t$$\" means $$t$$ is explanatory, so $$S_{tt}$$ is in the denominator.\n- Step 2: Do NOT use $$S_{ww}$$ in the denominator — that would give the regression of $$t$$ on $$w$$, which is a different line (not the inverse of the first). Confusing the two is a common pitfall that loses all subsequent marks.\n\nMemory aid: \"regression of Y on X\" → $$b = S_{xy}/S_{xx}$$ → the *second* variable named goes in the denominator.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "When asked to interpret the gradient of a regression line (e.g. gradient = 4.77 for $$w$$ on $$t$$), what two elements must your answer contain? (2 steps)", "answer": "- Step 1: State the **direction and magnitude**: \"For each additional 1 unit of the explanatory variable, the response variable changes by approximately [gradient] units.\" E.g. \"For each additional 1 cm of tail length, the weight increases by approximately 4.77 g.\"\n- Step 2: Include **units** for both variables (g per cm in this case). An answer like \"it goes up by 4.77\" without units loses the interpretation mark — the examiner needs to see you understand what the number means in context.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "When asked why it would not be appropriate to use a regression line to estimate a value far from the data range (e.g. tail length of 2 cm when data span roughly 6.4–8.9 cm), what two reasons should you give? (2 steps)", "answer": "- Step 1: State that the value is **outside the range of the data** — this is **extrapolation**, and the linear model may not hold beyond the observed range. The relationship could be non-linear outside the data.\n- Step 2: Ideally, demonstrate the absurd prediction: at $$t = 2$$, $$w = -16.7 + 4.77(2) = -7.16$$ g, which is physically impossible (negative weight). This confirms the model is invalid there and strengthens your answer.\n\nBoth reasons together earn full marks. Just saying \"extrapolation\" alone may be insufficient — showing the impossible prediction value is the clincher.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": true}, {"question": "When data are coded using positive linear transformations (e.g. $$x = t - 6$$ and $$y = w/2 - 5$$), what happens to the PMCC $$r$$, and why? (2 steps)", "answer": "- Step 1: The PMCC is **invariant** — it does not change. $$r_{xy} = r_{tw}$$. Both transformations are positive-linear (shift by constants, scale by positive factors), so the strength and direction of linear correlation are preserved.\n- Step 2: The intuition: PMCC measures the *pattern* of linear association, not the absolute values. Adding/subtracting constants shifts the cloud of points without changing its shape. Multiplying by positive constants stretches/compresses the axes but doesn't flip the cloud. Only a **negative** scale factor would flip the sign of $$r$$.\n\nIf the coding included a negative scale (e.g. $$y = -w$$), then $$r_{xy} = -r_{tw}$$. But the question states positive linear coding.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": true}, {"question": "When asked for the regression line under coding (e.g. given $$w = -16.7 + 4.77t$$, find the regression of $$y$$ on $$x$$ where $$x = t-6$$, $$y = w/2 - 5$$), what is the efficient strategy versus the slow strategy? (2 steps)", "answer": "- Step 1: **Efficient strategy**: substitute the coding into the existing regression equation. Express $$t$$ and $$w$$ in terms of $$x$$ and $$y$$: $$t = x + 6$$ and $$w = 2y + 10$$. Then substitute into $$w = -16.7 + 4.77t$$: $$2y + 10 = -16.7 + 4.77(x + 6)$$. The question says \"you do not need to simplify\" — so stop here.\n- Step 2: **Slow/pitfall strategy**: recomputing $$S_{xy}$$, $$S_{xx}$$, $$\\bar{x}$$, $$\\bar{y}$$ from the coded data. This wastes time and introduces rounding errors. The question explicitly signals the shortcut by saying \"you do not need to simplify\" — take that hint.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "When data are coded as $$x = l - 600$$ and you find $$\\bar{x} = 45.81$$, how do you recover the original mean $$\\bar{l}$$? (2 steps)", "answer": "- Step 1: Reverse the shift: $$\\bar{l} = \\bar{x} + 600 = 45.81 + 600 = 645.81$$. Since $$x = l - 600$$, the coding subtracts 600 from every value, so the mean of $$x$$ is 600 less than the mean of $$l$$. Add it back.\n- Step 2: General rule: if $$X = \\frac{Y - a}{b}$$, then $$\\bar{Y} = b\\bar{X} + a$$. Here $$b = 1$$ and $$a = 600$$, so it simplifies to $$\\bar{l} = \\bar{x} + 600$$.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "When data are coded as $$x = l - 600$$, what happens to the variance — do you add 600, subtract 600, or leave it unchanged? Why? (3 steps)", "answer": "- Step 1: The variance is **unchanged**: $$\\text{Var}(l) = \\text{Var}(x)$$. You do NOT add or subtract the shift constant.\n- Step 2: The intuition: variance measures *spread* — how far values are from their mean. Shifting every value by the same constant shifts the mean by that constant too, but the deviations from the mean remain identical. The spread hasn't changed.\n- Step 3: General rule: $$\\text{Var}(X + a) = \\text{Var}(X)$$ for any constant $$a$$. Only scaling changes variance: $$\\text{Var}(bX) = b^2 \\text{Var}(X)$$. The common pitfall is writing $$\\text{Var}(l) = \\text{Var}(x) + 600$$ or $$-600$$ — this is a non-sequitur with no mathematical basis.\n\nThis is flagged as **Medium severity** in the weakness analysis. Writing \"$$\\text{Var}(x+a) = \\text{Var}(x)$$\" five times as a drill is recommended.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "A box plot has $$n = 81$$, median = 4000, and you're asked \"find the maximum number of salmon with weights in the interval $$4600 < w \\le 7700$$.\" Since 4600 > median, what conceptual reasoning shortcut applies? (2 steps)", "answer": "- Step 1: Since 4600 > 4000 (the median), every value in $$(4600, 7700]$$ lies **strictly above the median**. By definition, with $$n = 81$$, the median is the 41st value — so at most 40 values can lie strictly above it.\n- Step 2: Therefore the maximum count is **40**, regardless of the upper bound 7700. No interpolation is needed — this is a *concept* question about the definition of the median, not a calculation about the box plot geometry.\n\nThe pitfall: trying to interpolate inside the box using $$Q_3 - 4600$$ or similar. The bound is above the median, so the median definition alone gives the answer.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "When checking for outliers using the $$1.5 \\times \\text{IQR}$$ rule, how many comparisons must you make, and what are they? (2 steps)", "answer": "- Step 1: Compute **both fences**: lower fence = $$Q_1 - 1.5 \\times \\text{IQR}$$ and upper fence = $$Q_3 + 1.5 \\times \\text{IQR}$$. For example, with $$Q_1 = 3000$$, $$Q_3 = 5500$$, IQR = 2500: lower fence = $$3000 - 3750 = -750$$, upper fence = $$5500 + 3750 = 9250$$.\n- Step 2: Compare **both extremes** against both fences: minimum > lower fence? Maximum < upper fence? Even if intuition says \"the data look fine,\" you must check both. An outlier could exist on either end. Omitting one comparison loses marks.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "In a probability tree question where the first branch has categories A, B, C and you're told \"30% A, 45% B, the rest C\", what must you compute before drawing the tree? (2 steps)", "answer": "- Step 1: Compute $$P(C) = 1 - P(A) - P(B) = 1 - 0.30 - 0.45 = 0.25$$. \"The rest\" means the complement of the given probabilities — you must calculate and state this explicitly.\n- Step 2: Verify all first-branch probabilities sum to 1: $$0.30 + 0.45 + 0.25 = 1.00$$. This is your sanity check. Forgetting the third branch entirely (and only computing A and B contributions) is a common error that makes all subsequent answers wrong.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "When asked to find $$P(\\text{red})$$ across three label categories A, B, C with different conditional probabilities of being red, what formula do you use? (2 steps)", "answer": "- Step 1: Apply the **Law of Total Probability**: $$P(R) = P(A)P(R|A) + P(B)P(R|B) + P(C)P(R|C)$$. This \"collapses\" the tree diagram's second-level branches into a single probability.\n- Step 2: Compute each term: $$0.30 \\times 0.02 + 0.45 \\times 0.04 + 0.25 \\times 0.06 = 0.006 + 0.018 + 0.015 = 0.039$$. The pitfall is forgetting one of the three terms — especially C, since its probability was computed rather than given.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "What is the critical difference between $$P(C \\mid R)$$ and $$P(R \\mid C)$$, and which formula do you write down first when asked for $$P(C \\mid R)$$? (2 steps)", "answer": "- Step 1: They are **not interchangeable**. $$P(R \\mid C) = 0.06$$ is given in the question (6% of C-labeled counters are red). $$P(C \\mid R)$$ asks: given that a counter IS red, what's the probability it came from category C? This is a completely different quantity — appr
