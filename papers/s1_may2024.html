divide $$\\Sigma fy^2$$ by $$n$$, subtract $$\\bar{y}^2$$); minimal arithmetic, minimal error.\n\nTakeaway: when given $$\\Sigma$$-tables, computational form is fastest and least error-prone.", "source": "Opus 4 ②", "_id": "opus_2_90"}, {"question": "What's the structure of \"show that variance = X\" type questions in S1, and why are they especially mark-economical? (3 steps)", "answer": "- Step 1: You're given the answer (e.g., \"show Var(X) = 4.14\"), so the M-marks are for setting up $$E(X^2)$$ correctly and then $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$. The A-mark is for arithmetic.\n- Step 2: If you make a small arithmetic slip, you can backtrack: the target answer signals where you're aiming.\n- Step 3: Mark-economical because the M-marks reward setup even if final arithmetic is off; you can't lose those by getting the wrong final number.\n\nTakeaway: \"show that\" rewards method; always SHOW the formula, not just the answer.", "source": "Opus 4 ②", "_id": "opus_2_82"}, {"question": "A subtle pitfall: in Q5(b), the phrase \"longest qualifying time\" is the boundary case. Why does this nudge $$t$$ to be a *closed* boundary (≤ rather than <)? (3 steps)", "answer": "- Step 1: \"Longest qualifying time\" = the largest time someone can take and still qualify. So if your time $$X = t$$ exactly, you DO qualify.\n- Step 2: For continuous distributions like the normal, $$P(X = t) = 0$$, so $$P(X \\le t) = P(X < t) = 0.6$$ — the equality on the boundary doesn't change the probability calculation.\n- Step 3: For discrete distributions, the distinction matters — but for normal we're OK either way.\n\nTakeaway: continuous distributions don't care about closed-vs-open boundaries (zero point mass); discrete ones DO.", "source": "Opus 4 ②", "_id": "opus_2_102"}, {"question": "Express $$(C \\cup S) \\cap G'$$ in plain language and identify which Venn regions it covers. (4 steps)", "answer": "- Step 1: Translate to English: \"in C or S (or both), AND outside G\".\n- Step 2: Visualise: take the union of C and S (almost everything except G-only and outside), then strip out anything inside G.\n- Step 3: Surviving regions: C only, C ∩ S only (not G), S only.\n- Step 4: $$P((C \\cup S) \\cap G') = 0.04 + 0.15 + 0.23 = 0.42$$.\n\nTakeaway: Translate compound set notation to \"inside circle X, outside circle Y\" English first, then sum regions.", "source": "Opus 4 ①", "_id": "opus_1_49"}, {"question": "The percentage points table gives P(Z > 1.96) = 0.025. What is P(Z < −1.96), and why? (2 steps)", "answer": "- Step 1: P(Z < −1.96) = **0.025** — the same as P(Z > 1.96).\n- Step 2: By the symmetry of the standard normal distribution about 0, the left tail below −1.96 has the same area as the right tail above 1.96. This is why the central 95% interval is (−1.96, 1.96): 2.5% in each tail.\n\nThis symmetry is the basis of the symmetric interval trick: P(μ − 1.96σ < X < μ + 1.96σ) = 0.95.", "source": "GLM 5.1 ①", "_id": "glm_1_48"}, {"question": "To find $$P(X < 18)$$ when $$X \\sim N(15, 2^2)$$, you standardise to get $$z$$. Write the standardisation formula and explain what each term represents. (2 steps)", "answer": "- Step 1: $$z = \\frac{x - \\mu}{\\sigma} = \\frac{18 - 15}{2} = 1.5$$. Here $$x = 18$$ is the raw value, $$\\mu = 15$$ is the mean, and $$\\sigma = 2$$ is the standard deviation.\n- Step 2: $$z = 1.5$$ means the value 18 is 1.5 standard deviations above the mean. We then look up $$P(Z < 1.5) = 0.9332$$ in the standard normal table. Standardisation converts any normal distribution to $$Z \\sim N(0,1)$$ so we can use a single table.", "source": "GLM 5.1 ②", "_id": "glm_2_29"}, {"question": "For the discrete random variable in Q2, explain why E(2X − 3) cannot be calculated as 2E(X) − 3 without checking. (conceptual)", "answer": "- Actually, E(aX + b) = aE(X) + b ALWAYS holds for any constants a and b.\n- For E(2X − 3): = 2E(X) − 3 = 2(4.6) − 3 = 9.2 − 3 = 6.2.\n- This is different from E(X) transformed: E(2X − 3) means first compute 2x − 3 for each x, then take expectation.\n- The linearity property holds: E(aX + b) = aE(X) + b for ANY distributions, not just normal.\n\n[Takeaway: Expectation is linear: E(aX + b) = aE(X) + b. Variance is NOT linear: Var(aX + b) = a²Var(X).]", "source": "MiniMax ①", "_id": "minimax_1_47"}, {"question": "Given σ = 5.10 for T ~ N(μ, σ²), find P(T > μ − 5 | T > μ − 10). This is a conditional probability where the event T > μ − 5 is a subset of T > μ − 10. (5 steps)", "answer": "- Step 1: Find P(T > μ − 10). Since the symmetric interval P(μ − 10 < T < μ + 10) = 0.95, the tails each have 0.025. So P(T < μ − 10) = 0.025, and **P(T > μ − 10) = 0.975**.\n- Step 2: Find P(T > μ − 5). Standardise: z = (μ − 5 − μ)/σ = −5/5.10 ≈ −0.98.\n- Step 3: From symmetry, P(T > μ − 5) = P(Z > −0.98) = P(Z < 0.98) = **0.8365**.\n- Step 4: Apply conditional formula: P(A|B) = P(A ∩ B)/P(B). Since A = {T > μ − 5} ⊂ B = {T > μ − 10}, A ∩ B = A.\n- Step 5: P(T > μ − 5 | T > μ − 10) = 0.8365 / 0.975 = **0.858** (3 s.f.).\n\n[Takeaway: When A ⊂ B, P(A ∩ B) = P(A). Don't compute P(A) × P(B) — that's for independent events.]", "source": "MiniMax ①", "_id": "minimax_1_26"}, {"question": "Two independent rolls of the same spinner give $$X_1$$ (Sam) and $$X_2$$ (other player). Sam's score is $$S = X_1$$ and the opponent's is $$R = 2X_2 - 3$$. Sam wins if $$S > R$$. Why must you condition on the value of $$X_2$$ rather than working with $$S - R$$ directly? (3 steps)", "answer": "- Step 1: $$S - R = X_1 - 2X_2 + 3$$ is a linear combination of two DRVs. To get its full distribution you'd need every $$(x_1, x_2)$$ pair (5 × 5 = 25 cases) — laborious.\n- Step 2: Conditioning on $$X_2 = x_2$$ collapses $$R$$ to a constant ($$2x_2 - 3$$). Then $$P(S > R \\mid X_2 = x_2) = P(X_1 > 2x_2 - 3)$$, which uses just the PMF of $$X_1$$ — read off in seconds.\n- Step 3: Then weight by $$P(X_2 = x_2)$$ and sum: $$P(S > R) = \\sum_{x_2} P(X_1 > 2x_2 - 3) \\cdot P(X_2 = x_2)$$. This is the law of total probability with conditioning.\n\nTakeaway: conditioning collapses one variable to a constant, dramatically simplifying the calculation.", "source": "Opus 4 ②", "_id": "opus_2_21"}, {"question": "When constructing a regression line for \"y on x\", why is the slope $$b = S_{xy}/S_{xx}$$ rather than $$b = S_{xy}/S_{yy}$$? (3 steps)", "answer": "- Step 1: \"y on x\" means we're predicting y from x. The line is fitted to minimise vertical deviations (in the y-direction).\n- Step 2: $$S_{xx}$$ is the spread of x; $$b = S_{xy}/S_{xx}$$ scales the covariation by the variability of the predictor x.\n- Step 3: $$S_{xy}/S_{yy}$$ would be the slope for \"x on y\" (predicting x from y) — a different line, generally not the same.\n\nTakeaway: $$b = S_{xy}/S_{\\text{predictor}^2}$$; \"y on x\" → divide by $$S_{xx}$$.", "source": "Opus 4 ②", "_id": "opus_2_115"}, {"question": "What's the **single most important sense-check** in IAL S1 normal distribution problems involving σ? (3 steps)", "answer": "- Step 1: Compute the largest $$|z|$$-score arising in the problem.\n- Step 2: If $$|z| > 4$$, something is wrong — normal probabilities are essentially zero past $$|z| = 4$$, far past anything in standard tables.\n- Step 3: The most common cause is an arithmetic error in $$\\sigma$$ (decimal place, reciprocal, division-vs-multiplication). Recompute $$\\sigma$$.\n+ Example: if $$\\sigma$$ = 0.0510 (wrong) vs 5.10 (right), the value $$z$$ = -5/σ flips from -98 (impossible) to -0.98 (sensible).\n\nTakeaway: $$|z| > 4$$ ⇒ stop and recheck σ.", "source": "Opus 4 ②", "_id": "opus_2_78"}, {"question": "Derive the standardisation formula $$z = (a - \\mu)/\\sigma$$ from the substitution $$Z = (X - \\mu)/\\sigma$$. (4 steps)", "answer": "- Step 1: Define $$Z = (X - \\mu)/\\sigma$$. Then $$E(Z) = (E(X) - \\mu)/\\sigma = 0$$ and $$\\text{Var}(Z) = \\text{Var}(X)/\\sigma^2 = 1$$.\n- Step 2: So Z ~ N(0, 1) — the standard normal.\n- Step 3: $$P(X < a) = P\\left(\\frac{X - \\mu}{\\sigma} < \\frac{a - \\mu}{\\sigma}\\right) = P(Z < z) = \\Phi(z)$$.\n- Step 4: This conversion lets us use a single Φ-table for ANY normal distribution. Memorise: subtract mean, divide by SD.\n\nTakeaway: z standardises; Φ-table works for any normal after standardisation.", "source": "Opus 4 ①", "_id": "opus_1_38"}, {"question": "A youth club has 76 students playing both Chess **and** Go. Given the proportions $$P(C \\cap G) = 0.26$$ and $$P(S) = 0.60$$ (so $$P(S') = 0.40$$), what's the master strategy for estimating the number who **don't** play Scrabble? (4 steps)", "answer": "- Step 1: Use the proportion-scaling formula: $$N_\\text{total} = \\dfrac{\\text{observed count}}{\\text{probability}} = \\dfrac{76}{0.26} \\approx 292.31$$.\n- Step 2: Now compute the count not playing Scrabble: $$N_\\text{not S} = N_\\text{total} \\times P(S') = 292.31 \\times 0.40 \\approx 116.92$$.\n- Step 3: Round to whole number (you can't have 0.92 of a student): about 117 students.\n- Step 4: Sanity check: $$P(S') = 0.40$$ means about 40% don't play Scrabble; 40% of 292 ≈ 117 ✓.\n\nTakeaway: scale observed count to total, then multiply by target probability; round to integer.", "source": "Opus 4 ②", "_id": "opus_2_63"}, {"question": "Continuing the Maple \"box plot unchanged\" problem: $$n$$ goes from 32 to 36, max was 80, and new values include $$2a$$. What constraint does the **maximum** condition place on $$a$$? (2 steps)", "answer": "- Step 1: For max to remain 80, every new value must be $$\\le 80$$. The largest new value is $$2a$$ (since $$a \\le 2a$$ for $$a > 0$$, and 27, 48 are below 80).\n- Step 2: $$2a \\le 80 \\Rightarrow a \\le 40$$.\n\nTakeaway: identify the largest of the new values, then bound it by the existing max.", "source": "Opus 4 ②", "_id": "opus_2_11"}, {"question": "In Q5(c), P(μ−10 < T < μ+10) = 0.95. A tutor computed σ = 10/1.96 = 0.0510. The correct answer is σ = 5.10. What error did the tutor make, and how do you sense-check? (3 steps)", "answer": "- Step 1: From the symmetric trick: k = 1.96σ, with k = 10. So 10 = 1.96σ, giving σ = 10/1.96 = 5.102. The tutor's calculator gave 5.102, but they **wrote it as 0.0510** — a decimal place / reciprocal error (perhaps they computed 1.96/10 instead of 10/1.96).\n- Step 2: Sense-check with the z-value: if σ = 0.0510, then z = −5/0.0510 ≈ −98, which is off the normal table entirely. If σ = 5.10, then z = −5/5.10 ≈ −0.98, a perfectly reasonable value. ✓\n- Step 3: The rule: **always sense-check your z-values**. If |z| > 4, something is almost certainly wrong. Normal z-values for typical exam problems range between −3 and 3.\n\nThis tutor error is a perfect example of why blind calculation without verification is dangerous.", "source": "GLM 5.1 ①", "_id": "glm_1_34"}, {"question": "When standardising X ~ N(15, 2²) to find P(X < 18), explain what the z-value of 1.5 means conceptually and why we then look up P(Z < 1.5). (2 steps)", "answer": "- Step 1: z = (18 − 15)/2 = 1.5. This means 18 is **1.5 standard deviations above the mean**. Standardising converts any normal distribution to Z ~ N(0,1), preserving the area (probability).\n- Step 2: P(X < 18) = P(Z < 1.5) = 0.9332. We look up Z < 1.5 because the normal table gives cumulative probabilities from −∞. The value 0.9332 means about 93.3% of observations fall below 18.\n\nThe z-score is a \"universal yardstick\" — it tells you how extreme a value is relative to its distribution's spread.", "source": "GLM 5.1 ①", "_id": "glm_1_30"}, {"question": "For $$T \\sim N(\\mu, 5.10^2)$$, find $$P(T > \\mu - 10)$$ using symmetry, without calculating from scratch. (3 steps)", "answer": "- Step 1: We're given $$P(\\mu - 10 < T < \\mu + 10) = 0.95$$, so the two tails together = 0.05.\n- Step 2: By symmetry of the normal, each tail = 0.025: $$P(T < \\mu - 10) = 0.025$$ and $$P(T > \\mu + 10) = 0.025$$.\n- Step 3: $$P(T > \\mu - 10) = 1 - P(T < \\mu - 10) = 1 - 0.025 = 0.975$$.\n\nTakeaway: symmetric tails of normal allow you to extract pieces by complement, no further computation needed.", "source": "Opus 4 ②", "_id": "opus_2_50"}, {"question": "What's the correct interpretation of $$P(X > t) = 0.6$$ vs $$P(X < t) = 0.6$$ when looking up the inverse normal? (3 steps)", "answer": "- Step 1: $$P(X < t) = 0.6$$ → looking up \"$$z$$ such that the area below $$z$$ is 0.6\" → $$z \\approx +0.2533$$ (positive, since 0.6 > 0.5).\n- Step 2: $$P(X > t) = 0.6$$ → looking up \"$$z$$ such that the area above $$z$$ is 0.6\" → $$z \\approx -0.2533$$ (negative, since \"60% above\" means $$t$$ is below the mean).\n- Step 3: They differ by sign. Carefully translate the question's wording into a \"less-than\" probability before looking up.\n\nTakeaway: convert all wordings into $$P(Z < z)$$ form; sign of $$z$$ tracks whether you're above or below the mean.", "source": "Opus 4 ②", "_id": "opus_2_111"}, {"question": "If you know the probability of an event and the actual observed count of that event in a population, how do you estimate the total population size? (Simple exercise) (2 steps)", "answer": "- Step 1: The expected count is given by $$\\text{Total Population} \\times \\text{Probability}$$. Rearrange this to solve for the total: $$\\text{Total Population} = \\frac{\\text{Observed Count}}{\\text{Probability}}$$.\n- Step 2: Example: If 76 students play both Chess and Go, and $$P(C \\cap G) = 0.26$$, then $$N = 76 / 0.26 \\approx 292$$.\n\nThis is proportion scaling. The probability represents the fraction of the whole, so dividing the part by its fractional value yields the whole.", "source": "GLM 5.1 ③", "_id": "glm_3_28"}, {"question": "Strategy: 4-step protocol for reading S1 questions safely. (4 steps)", "answer": "- Step 1: First read: identify random variable, distribution, and what's asked.\n- Step 2: Second read: highlight key words (NOT, fastest, longest, at most, strict inequality, \"given that\", \"unchanged\", \"approximately\").\n- Step 3: Convert English to a probability statement BEFORE computing. e.g., \"fastest 60% qualify\" → P(X ≤ t) = 0.60.\n- Step 4: Sense check the answer against the wording. Does it make physical sense? Does it match the proportion?\n\nTakeaway: Slow reading = fast marks.", "source": "Opus 4 ①", "_id": "opus_1_84"}, {"question": "Why is the regression line of y on x inappropriate for predicting x from y? What would you need instead? (2 steps)", "answer": "- Step 1: The regression line of y on x minimises the sum of squared **vertical** distances (in the y-direction). It's optimised for predicting y given x, not the reverse.\n- Step 2: To predict x from y, you'd need the regression line of x on y, which minimises horizontal distances. The two lines are different (unless r = 1). Using the wrong line gives biased predictions.\n\nIn this paper's question, the regression g = −42.3 + 0.722d is for predicting girth FROM length. Don't rearrange it to predict length from girth.", "source": "GLM 5.1 ①", "_id": "glm_1_61"}, {"question": "State the discrete (non-grouped) and grouped quartile rules for Edexcel S1, side by side. (3 steps)", "answer": "- Step 1: **Discrete/stem-and-leaf**: position $$p = n/4$$ (or 3n/4). Integer → average of pᵗʰ and (p+1)ᵗʰ values; non-integer → round UP.\n- Step 2: **Grouped via linear interpolation**: position $$p = n/4$$ used directly (no rounding); interpolate within the quartile class.\n+ $$Q_1 = L + \\frac{n/4 - F}{f} \\cdot c$$\n+ For median: position $$n/2$$ (NOT (n+1)/2 in grouped data).\n- Step 3: Memorise: discrete = round up if non-integer; grouped = linear interpolation.\n\nTakeaway: Two different paradigms for two different data formats.", "source": "Opus 4 ①", "_id": "opus_1_55"}, {"question": "Why is the \"n+1\" complementary correction for sample variance ($$s^2 = \\Sigma(x-\\bar x)^2 / (n-1)$$) NOT used in IAL S1, and which formula IS used? (3 steps)", "answer": "- Step 1: Bessel-corrected variance ($$/(n-1)$$) is for *unbiased estimation of population variance* from a sample — used in inference.\n- Step 2: IAL S1 uses the descriptive variance $$\\sigma^2 = \\Sigma(x - \\bar{x})^2 / n$$ (or computational form $$\\Sigma x^2/n - \\bar{x}^2$$). It treats the data as the population.\n- Step 3: This is a *descriptive* statistic, not an inferential one. The (n-1) correction belongs in inference courses (S2 / further stats), not S1.\n\nTakeaway: S1 uses /n for variance and SD; the /(n-1) correction is inferential and not in scope.", "source": "Opus 4 ②", "_id": "opus_2_126"}, {"question": "For Sam vs opponent: spinner values $$\\{2,4,5,7,8\\}$$ with probabilities $$0.25, 0.3, 0.2, 0.1, 0.15$$. If $$X_2 = 2$$ then $$R = 1$$; what's $$P(X_1 > 1)$$ and why? (2 steps)", "answer": "- Step 1: All possible values of $$X_1$$ are $$\\{2, 4, 5, 7, 8\\}$$, every one of which is strictly greater than 1.\n- Step 2: Hence $$P(X_1 > 1) = 1$$ (every outcome wins).\n\nTakeaway: when the threshold is below the spinner's minimum, the conditional probability is 1.", "source": "Opus 4 ②", "_id": "opus_2_22"}, {"question": "Coding strategy: when should you code data, and how do you avoid forgetting to decode? (5 steps)", "answer": "- Step 1: Code when raw values are messy (e.g., mid-30s) and the y-values would be small integers.\n- Step 2: Choose $$y = (w - a)/b$$ with a = a \"central\" value and b = a convenient scale (often 1, 10, or class width).\n- Step 3: Compute $$\\sum y$$, $$\\sum y^2$$, $$\\bar{y}$$, Var(y) using the cleaner y-values.\n- Step 4: **Always decode**: $$\\bar{w} = b\\bar{y} + a$$, $$\\sigma_w = |b|\\sigma_y$$, $$\\text{Var}(w) = b^2 \\text{Var}(y)$$.\n- Step 5: Risk: forgetting to decode and reporting ȳ instead of w̄. Always decode at the end.\n\nTakeaway: Coding = simplify arithmetic; decoding is mandatory.", "source": "Opus 4 ①", "_id": "opus_1_86"}, {"question": "For the normal distribution X ~ N(μ, σ²), what does the \"symmetric interval trick\" say about the relationship between the interval width and σ for a given probability? When is this useful? (conceptual)", "answer": "- For a symmetric interval (μ − k, μ + k), P(μ − k < X < μ + k) = 0.95 ⇒ k = 1.96σ.\n- Similarly, for 99%: k = 2.576σ.\n- This is useful when you know the interval width (2k) and need to find σ, or vice versa — avoid solving the full equation each time.\n- Example in Q5(c): interval width is 20 (from μ − 10 to μ + 10), so 20 = 2 × 1.96σ ⇒ σ = 10/1.96.\n\n[Takeaway: Memorise: 95% → 1.96σ, 99% → 2.576σ.]", "source": "MiniMax ①", "_id": "minimax_1_44"}, {"question": "When computing S_dd = Σd² − (Σd)²/n, what happens if you use n = 7 instead of n = 8? Would S_dd be larger or smaller? (2 steps)", "answer": "- Step 1: S_dd = Σd² − (Σd)²/n. Using a smaller n (7 instead of 8) makes (Σd)²/n larger (dividing by a smaller number), so the subtrahend increases.\n- Step 2: Since you're subtracting a larger quantity, S_dd would be **smaller** than the correct value. This would affect both the PMCC r and the regression gradient b.\n\nAlways verify n from the question. For 8 bears, n = 8 — count the data points if unsure.", "source": "GLM 5.1 ①", "_id": "glm_1_65"}, {"question": "Why do the formulas $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$ and $$P(A \\cap B) = P(A) \\cdot P(B)$$ describe two completely different concepts? (3 steps)", "answer": "- Step 1: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$ is the **inclusion-exclusion** formula — always true. It says: when adding $$P(A)$$ and $$P(B)$$, you double-count their intersection, so subtract once.\n- Step 2: $$P(A \\cap B) = P(A) \\cdot P(B)$$ is the definition of **independence** — true ONLY when $$A$$ and $$B$$ are independent.\n- Step 3: Inclusion-exclusion gives you a UNION; independence relates a JOINT probability to MARGINALS. Confusing them is a category error.\n\nTakeaway: union-formula = always true; product-formula = only under independence.", "source": "Opus 4 ②", "_id": "opus_2_73"}, {"question": "A tutor computed P(S′) = 0.18 by only including G-only and the outside region. Explain why this is wrong and why P(S′) = 1 − P(S) is the safest approach. (3 steps)", "answer": "- Step 1: P(S′) includes EVERYONE not in S: C-only (0.04) + C∩G-only (0.14) + G-only (0) + outside (0.22) = 0.40. The tutor forgot C-only and C∩G-only — regions outside S but inside C or G.\n- Step 2: The complement approach P(S′) = 1 − P(S) = 1 − 0.60 = 0.40 is safer because P(S) is easy to compute (just sum all regions inside S), and you avoid the risk of missing regions.\n- Step 3: The tutor's answer of 0.18 would give 292.3 × 0.18 ≈ 53 students — but since P(S′) must equal 1 − P(S) = 0.40, this is clearly wrong. Always verify: do your regions sum correctly?\n\nThe lesson: when computing P(not A), use the complement 1 − P(A) whenever P(A) is straightforward.", "source": "GLM 5.1 ①", "_id": "glm_1_43"}, {"question": "On a histogram, what fundamental principle connects the drawn bars to the data, and how does a \"reference bar\" help you find dimensions of other bars? (3 steps)", "answer": "- Step 1: The fundamental principle is **area ∝ frequency**. The area of each bar is proportional to the frequency it represents. This is why histograms use frequency density (height) = frequency / class width.\n- Step 2: A reference bar gives you the constant of proportionality. If the reference bar has area A cm² representing f data points, then k = A/f (cm² per data point). Every other bar's area = k × its frequency.\n- Step 3: To find a bar's dimensions: (1) compute its required area from its frequency, (2) compute its width on the page from the class width relative to the reference class width, (3) height = area / width.\n\nCommon pitfall: confusing \"height = frequency density\" with \"height = frequency.\" In a histogram with unequal class widths, height is NOT frequency.", "source": "GLM 5.1 ①", "_id": "glm_1_17"}, {"question": "A student multiplies P(A) and P(B) instead of using P(A∩B) when checking independence. Why is this CIRCULAR and a logical error? (3 steps)", "answer": "- Step 1: To check independence, you need to verify $$P(A \\cap B) = P(A) \\cdot P(B)$$. Both sides must be computed independently, then compared.\n- Step 2: If you simply *multiply* P(A) and P(B) and call that \"P(A∩B)\", you've assumed what you want to prove — it's circular reasoning.\n- Step 3: $$P(A \\cap B)$$ must come from data (a Venn region, a count, a problem setup) — it's a JOINT probability that must be observed or inferred, not derived from the marginals.\n\nTakeaway: independence is a TEST: compute both sides separately, then compare.", "source": "Opus 4 ②", "_id": "opus_2_123"}, {"question": "Why is the regression intercept $$a = -42.3$$ for \"girth on length\" *not* a sensible \"girth at length 0\", and what's the right interpretation? (3 steps)", "answer": "- Step 1: $$a = -42.3$$ comes from the line passing through $$(\\bar{d}, \\bar{g})$$. It's a mathematical extrapolation to $$d = 0$$, far below any real bear length.\n- Step 2: Length 0 cm ⇒ a \"bear\" of zero length, which is meaningless. The model's behavior at $$d = 0$$ is purely algebraic, not physical.\n- Step 3: Better interpretation: $$a$$ is a **fitting parameter** that, together with the slope, defines the line for the sampled range. Don't physically interpret it.\n\nTakeaway: regression intercepts often have no physical meaning — they're algebraic by-products of the fit.", "source": "Opus 4 ②", "_id": "opus_2_132"}, {"question": "Conceptually, what's the difference between \"all 5 summary statistics unchanged\" (Q1(f) box plot constraint) and \"data unchanged\"? (3 steps)", "answer": "- Step 1: All 5 summary stats unchanged means: same min, $$Q_1$$, median, $$Q_3$$, max. The box plot looks identical.\n- Step 2: But the underlying data has changed — we added 4 new values (27, $$a$$, 48, 2$$a$$). The dataset is bigger; mean and SD almost certainly differ; only the 5-summary is invariant.\n- Step 3: This is why \"box plot unchanged\" gives a constraint on $$a$$, not the actual data values. The box plot is a *summary*, not a complete description.\n\nTakeaway: box plots show 5 summary statistics; identical box plots ≠ identical data.", "source": "Opus 4 ②", "_id": "opus_2_117"}, {"question": "Why is \"0.40 × 292.31 = 116.92\" preferable to \"0.40 × N = (whole-number answer)\" in IAL marking? (3 steps)", "answer": "- Step 1: Showing your full unrounded intermediate (292.31) lets the examiner verify your method even if your final rounding differs.\n- Step 2: Rounding too early can introduce errors that propagate. 0.40 × 292 = 116.8, 0.40 × 293 = 117.2 — different answers.\n- Step 3: The convention: keep precise intermediates, round only the final answer to whole-number/3-s.f. as appropriate.\n\nTakeaway: precise intermediates → final round; never round mid-calculation.", "source": "Opus 4 ②", "_id": "opus_2_149"}, {"question": "When sketching a quick bivariate scatter for $$r \\approx 0.98$$, what does the cloud of points look like, and how does this contrast with $$r \\approx 0$$ or $$r \\approx -1$$? (3 steps)", "answer": "- Step 1: $$r \\approx 0.98$$: points cluster tightly along an imaginary upward-sloping line, with very small vertical spread. Visually, almost like a thin diagonal stripe.\n- Step 2: $$r \\approx 0$$: points form a roughly circular or formless cloud, no clear linear trend. As x changes, y is unpredictable.\n- Step 3: $$r \\approx -1$$: points cluster tightly along a downward-sloping line (large x ⇒ small y).\n+ $$|r|$$ near 1 = tightness around a line; sign = direction.\n\nTakeaway: |r| measures linear tightness; sign measures direction.", "source": "Opus 4 ②", "_id": "opus_2_136"}, {"question": "Continuing the same problem: original Maple $$Q_1 = 36$$ at $$n=32$$. After adding 4 values, $$n_\\text{new}=36$$. What positional constraint must $$a$$ satisfy so that $$Q_1$$ stays at 36? (3 steps)", "answer": "- Step 1: New $$Q_1$$ position $$= 36/4 = 9$$ → integer → average of 9th and 10th values in the new sorted list.\n- Step 2: For $$Q_1$$ to stay at 36, exactly one of the four new values must drop below 36 (so that the existing 9th value gets pushed forward by exactly one). The candidates are: 27 (always < 36), 48 (always > 36), $$a$$, and $$2a$$.\n- Step 3: We need exactly one new value below 36. 27 is already in. So $$a, 2a \\ge 36$$ → $$a \\ge 36$$. (If $$a < 36$$, two new values would be below 36, shifting $$Q_1$$ down.)\n\nTakeaway: count how many new values fall below an existing quartile to detect whether that quartile shifts.", "source": "Opus 4 ②", "_id": "opus_2_12"}, {"question": "Derive the linear coding formulas $$E(aX + b) = aE(X) + b$$ and $$\\text{Var}(aX + b) = a^2 \\text{Var}(X)$$, and explain physically why the +b vanishes from variance. (4 steps)", "answer": "- Step 1: $$E(aX + b) = aE(X) + b$$ by linearity. Adding b shifts every outcome by b → mean shifts by b; scaling by a stretches → mean scales by a.\n- Step 2: $$\\text{Var}(aX + b) = E[(aX + b - E(aX + b))^2] = E[(aX + b - aE(X) - b)^2]$$.\n- Step 3: The +b cancels inside the deviation: $$E[(a(X - \\mu))^2] = a^2 E[(X - \\mu)^2] = a^2 \\text{Var}(X)$$.\n- Step 4: Physically: variance measures spread *about the mean*. Sliding the whole distribution by b moves both data and mean equally — relative deviations are unchanged. The factor $$a^2$$ (not |a|) appears because variance has units of X², so any scaling is \"felt twice\".\n\nTakeaway: $$\\text{Var}(aX+b) = a^2\\text{Var}(X)$$ — the +b is invisible to variance.", "source": "Opus 4 ①", "_id": "opus_1_15"}, {"question": "Why is Q5(b) ambiguous, and which interpretation is canonical? (4 steps)", "answer": "- Step 1: \"Fastest 60% take part — find the longest qualifying time\" has two readings:\n+ A: \"Fastest\" = lowest TIMES → lowest 60% qualify → P(X ≤ t) = 0.60 → t = 15.5 min.\n+ B (Fuat's): somehow P(X > t) = 0.60 → t = 14.49 min.\n- Step 2: Check logical consistency: if 60% take part, then 60% have times ≤ t, so P(X ≤ t) = 0.6 — Interpretation A.\n- Step 3: Sense check: cutoff above the median (15 min) makes sense if more than half qualify. 15.5 > 15 ✓.\n- Step 4: Canonical answer: t = 15.5 min. The 14.49 result would mean only 40% qualify, contradicting the question.\n\nTakeaway: When in doubt, ask \"what % does this t cut off?\" and match to the question.", "source": "Opus 4 ①", "_id": "opus_1_85"}, {"question": "For the inverse normal problem P(X ≤ t) = 0.6 with X ~ N(15, 2²), walk through finding t using the percentage points table. (3 steps)", "answer": "- Step 1: Standardise: P(Z ≤ z) = 0.6. From the percentage points table (or calculator), the z-value where the upper tail is 0.4 is z = 0.2533. Since 0.6 > 0.5, z is positive.\n- Step 2: Un-standardise: t = μ + zσ = 15 + 0.2533(2) = 15 + 0.5066 = **15.5 min** (3 s.f.).\n- Step 3: Sense-check: the 60th percentile should be above the mean (15), and 15.5 is indeed slightly above. ✓ If you got 14.49, you found the 40th percentile — re-read the question.\n\nAlways verify: does the answer lie on the correct side of the mean given the percentile?", "source": "GLM 5.1 ①", "_id": "glm_1_32"}, {"question": "On a stem-and-leaf with $$n=35$$ values, the 9th value from the smallest end is needed for $$Q_1$$. If you're reading the LEFT side of a back-to-back diagram, which direction do you count from, and why? (2 steps)", "answer": "- Step 1: The left side's smallest values are **closest to the stem**. So counting from the smallest means starting at the stem and reading **right-to-left** along each row, then moving to the next row down.\n- Step 2: The 9th value encountered this way is $$Q_1$$. If you accidentally count left-to-right, you'd be counting from the *largest* values — completely wrong position.", "source": "GLM 5.1 ②", "_id": "glm_2_3"}, {"question": "You compute N = 76/0.26 ≈ 292.3 teenagers. Since you can't have 0.3 of a teenager, should you round to 292 before computing the number who don't play Scrabble, or use 292.3 throughout? (2 steps)", "answer": "- Step 1: Use 292.3 throughout the calculation and round only at the **final answer**. Rounding intermediate values introduces unnecessary error. 292.3 × 0.40 = 116.92 ≈ 117.\n- Step 2: If you rounded to 292 first: 292 × 0.40 = 116.8 ≈ 117. In this case the answer is the same, but in general, premature rounding can shift the final answer. The rule: round only at the end, and round to the nearest integer for \"number of people\" questions.\n\nThe markscheme typically allows a small range (116–117) but shows working with unrounded intermediates.", "source": "GLM 5.1 ①", "_id": "glm_1_56"}, {"question": "What is the conceptual difference between S_xy and the covariance Cov(X,Y)? Why does S_xy appear in the PMCC formula instead of covariance? (2 steps)", "answer": "- Step 1: $$S_{xy} = \\sum x_i y_i - \\frac{(\\sum x_i)(\\sum y_i)}{n}$$, while $$\\text{Cov}(X,Y) = \\frac{S_{xy}}{n}$$. S_xy is the **sum of products** (uncorrected); covariance divides by n to get an average.\n- Step 2: PMCC = $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} \\cdot S_{yy}}}$$. The factors of n cancel: $$\\frac{S_{xy}/n}{\\sqrt{(S_{xx}/n)(S_{yy}/n)}} = \\frac{S_{xy}}{\\sqrt{S_{xx} \\cdot S_{yy}}}$$. So using S-statistics directly is cleaner — no need to divide by n at all.\n\nThis is why the formula booklet gives r in terms of S-statistics: it avoids unnecessary division.", "source": "GLM 5.1 ①", "_id": "glm_1_24"}, {"question": "Are the regression coefficients a and b affected by coding? Explain with an example. (2 steps)", "answer": "- Step 1: **Yes — both a and b change under coding.** If x is coded to x′ = ax + c, the new gradient b′ = b/a and the new intercept a′ changes accordingly.\n- Step 2: Example: original g = −42.3 + 0.722d with d in cm. If you recode to metres (d′ = d/100), then g = −42.3 + 0.722(100d′) = −42.3 + 72.2d′. The gradient changed from 0.722 to 72.2 — a factor of 100.\n\nCoding changes the units, which changes the gradient (rate per unit) and intercept. Only r is preserved.", "source": "GLM 5.1 ①", "_id": "glm_1_46"}, {"question": "A student writes \"from the Venn, $$P(C \\cap G) = p + 0.12$$\". Why is this both correct AND a useful intermediate step for computing population-scaling? (3 steps)", "answer": "- Step 1: $$P(C \\cap G)$$ = regions inside BOTH C and G = (C∩G only) + (C∩S∩G) = $$p$$ + 0.12.\n- Step 2: With $$p = 0.14$$ found from independence, $$P(C \\cap G) = 0.14 + 0.12 = 0.26$$.\n- Step 3: For population scaling: 76 students with C∩G ⇒ N = 76 / 0.26 ≈ 292. (Then multiply by other probabilities to get other counts.)\n\nTakeaway: Venn intersections compose from regions; the right intersection enables proportion-scaling.", "source": "Opus 4 ②", "_id": "opus_2_107"}, {"question": "When sense-checking a normal-distribution problem at the very end, what's a good 30-second mental routine? (3 steps)", "answer": "- Step 1: Check σ-magnitude: is σ a \"reasonable\" spread for the data? (e.g., for human times, σ in seconds; for heights, in cm).\n- Step 2: Check z-magnitudes: any |z| > 4 = re-do that step.\n- Step 3: Check probability bounds: are all probabilities in [0, 1]? Are conditional probabilities sensible (often higher than the unconditional in subset cases)?\n\nTakeaway: σ, z, P(0–1), conditional consistency — a 30-second sweep catches most arithmetic errors.", "source": "Opus 4 ②", "_id": "opus_2_148"}, {"question": "Conceptual exercise: X ~ N(100, 15²). Without using tables, determine whether P(X > 115) is greater than, less than, or equal to 0.5. Explain. (2 steps)", "answer": "- Step 1: 115 is one standard deviation above the mean (z = 15/15 = 1). The value is above the mean, so P(X > 115) < 0.5 (less than half the distribution is above the mean + 1σ).\n- Step 2: From the normal distribution, P(Z > 1) ≈ 0.1587. So P(X > 115) ≈ 0.16, which is indeed much less than 0.5.\n\nThe rule: any value above the mean has P(X > value) < 0.5, and vice versa. The further above, the smaller the probability.", "source": "GLM 5.1 ①", "_id": "glm_1_58"}, {"question": "Why is $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$ rather than just $$P(A) + P(B)$$? (3 steps)", "answer": "- Step 1: Adding P(A) and P(B) double-counts the overlap A ∩ B (which is in both A and B).\n- Step 2: To correct, subtract one copy of $$P(A \\cap B)$$ — the **inclusion-exclusion principle**.\n- Step 3: Special case: if A, B are mutually exclusive ($$P(A \\cap B) = 0$$), then $$P(A \\cup B) = P(A) + P(B)$$. Otherwise, the overlap matters.\n\nTakeaway: Subtract the overlap to avoid double-counting.", "source": "Opus 4 ①", "_id": "opus_1_62"}, {"question": "Why does the IAL S1 booklet not include the variance computational form $$\\sigma^2 = \\Sigma x^2 / n - \\bar{x}^2$$, and what's the practical implication? (3 steps)", "answer": "- Step 1: It's considered a \"fundamental\" formula — students are expected to know the rearrangement of $$\\sigma^2 = E(X^2) - [E(X)]^2$$ themselves.\n- Step 2: Practically: appears in nearly every paper (DRV, grouped data, raw data); guaranteed marks if memorised; lost marks if not.\n- Step 3: Memorise as a \"STAR formula\" — top of revision list.\n\nTakeaway: variance computational form = high-frequency, must-memorise.", "source": "Opus 4 ②", "_id": "opus_2_120"}, {"question": "Conceptually, what's the difference between a regression line and a \"perfect\" line of best fit? (4 steps)", "answer": "- Step 1: A regression line is the BEST linear approximation in the least-squares sense — minimising sum of squared vertical residuals.\n- Step 2: It's the optimum AMONG ALL straight lines, but the data may not be exactly linear, so individual points scatter around the line.\n- Step 3: Residuals (y − ŷ) measure scatter; their sum is zero by construction, but their squared sum is the loss.\n- Step 4: A perfect line (r = ±1) means all data points lie EXACTLY on the line — no scatter.\n\nTakeaway: Regression = best linear approximation; doesn't assume exact linearity.", "source": "Opus 4 ①", "_id": "opus_1_88"}, {"question": "State the population scaling formula and explain its assumptions. (4 steps)", "answer": "- Step 1: $$N = \\frac{\\text{observed count of event } E}{P(E)}$$ — total population estimate.\n- Step 2: Assumptions: the observed count is an unbiased sample of E, and the proportions in the Venn match the population proportions.\n- Step 3: Once N is known, scale ANY other event's probability: $$\\text{count of } A = N \\cdot P(A)$$.\n- Step 4: NOT in the booklet — memorise the structure \"count = N × probability\".\n\nTakeaway: count = N × probability; rearrange both ways.", "source": "Opus 4 ①", "_id": "opus_1_70"}, {"question": "When a question says \"Comment on the distributions\" comparing two box plots, what's the safest 1-mark answer template? (3 steps)", "answer": "- Step 1: Pick ONE statistic (median, IQR, range, max, min, etc.) where the two distributions differ measurably.\n- Step 2: State the comparison numerically: \"median of A (48) > median of B (45)\" or \"IQR of A is the same as B (both 18)\".\n- Step 3: Add context: \"so A grows faster on average\" or \"spreads are similar\".\n+ Avoid bare comparisons without numbers (\"A is bigger\") — fails B1.\n+ Avoid value statements without context (\"median of A is 48\") — also fails.\n\nTakeaway: ONE stat + comparison + context = guaranteed 1 mark.", "source": "Opus 4 ②", "_id": "opus_2_83"}, {"question": "For a symmetric normal distribution, what percentage of data falls within 1, 2, and 3 standard deviations of the mean? Give the rough rule and the exact values for 95%. (2 steps)", "answer": "- Step 1: The empirical rule: approximately **68%** within 1σ, **95%** within 2σ (exactly 95% is within 1.96σ), and **99.7%** within 3σ of the mean.\n- Step 2: For exams, the key exact values: 95% symmetric interval → half-width = **1.96σ**; 99% symmetric interval → half-width = **2.5758σ** (or 2.576σ). These come from the percentage points table and are NOT in the formula booklet.", "source": "GLM 5.1 ②", "_id": "glm_2_41"}, {"question": "What's the variance computational form for **frequency** data (rather than discrete probabilities)? (4 steps)", "answer": "- Step 1: $$\\sigma^2 = \\frac{\\sum f_i x_i^2}{\\sum f_i} - \\bar{x}^2$$, where $$n = \\sum f_i$$.\n- Step 2: Same STAR form, but sums are weighted by frequency f instead of probability p.\n- Step 3: For DRV, frequency is replaced by probability — formula structure is identical.\n- Step 4: Grouped data: use class midpoints as x-values, class frequencies as f. Estimate is approximate (assumes data clustered at midpoints).\n\nTakeaway: STAR form generalises to weighted (frequency or probability) data.", "source": "Opus 4 ①", "_id": "opus_1_83"}, {"question": "Outline the table approach for computing P(Sam wins) where S = X₁, R = 2X₂ − 3 with X taking {2, 4, 5, 7, 8} with probs {0.25, 0.3, 0.2, 0.1, 0.15}. (4 steps)", "answer": "- Step 1: For each x₂, compute threshold $$r = 2x_2 - 3$$: gives r ∈ {1, 5, 7, 11, 13}.\n- Step 2: For each r, find P(X₁ > r):\n+ x₂ = 2 → r = 1, all X-values exceed → P = 1\n+ x₂ = 4 → r = 5, X > 5 = {7, 8} → P = 0.10 + 0.15 = 0.25\n+ x₂ = 5 → r = 7, X > 7 = {8} → P = 0.15\n+ x₂ = 7 → r = 11 → P = 0\n+ x₂ = 8 → r = 13 → P = 0\n- Step 3: Multiply each by $$P(X_2 = x_2)$$ and sum: $$1 \\cdot 0.25 + 0.25 \\cdot 0.3 + 0.15 \\cdot 0.2 + 0 + 0 = 0.25 + 0.075 + 0.03 = 0.355$$.\n- Step 4: Sense check: contribution decreases as x₂ rises (R rises, harder for X₁ to exceed) — pattern confirms structure.", "source": "Opus 4 ①", "_id": "opus_1_19"}, {"question": "When calculating the variance of a dataset using the computational formula σ² = Σx²/n − x̄², why might you get a negative value if you're not careful? (misconception probe)", "answer": "- If you compute (Σx)²/n instead of Σx²/n, you'll get a negative variance, which is impossible.\n- Example: Σx = 10, Σx² = 30, n = 5. Then Σx²/n = 6, but (Σx)²/n = 100/5 = 20. The correct variance = 6 − (10/5)² = 6 − 4 = 2. If you mistakenly did 20 − 4 = 16, you'd be wrong.\n- The formula is Σx²/n − x̄², NOT (Σx)²/n − x̄².\n\n[Takeaway: Σx² and (Σx)² are completely different — square first, then sum; versus sum, then square.]", "source": "MiniMax ①", "_id": "minimax_1_36"}, {"question": "Given Σy = 104, Σy² = 233.54, and n = 50, compute Var(y) and then decode to find σ_w. Why must you compute Var(y) first rather than trying to decode Σy² directly? (3 steps)", "answer": "- Step 1: ȳ = 104/50 = 2.08. Var(y) = Σy²/n − ȳ² = 233.54/50 − (2.08)² = 4.6708 − 4.3264 = 0.3444.\n- Step 2: σ_y = √0.3444 = 0.5869. Then σ_w = 10 × 0.5869 = **5.87 g**.\n- Step 3: You must compute Var(y) in the coded scale first because Var(w) = b²Var(y) = 100 × 0.3444 = 34.44, and σ_w = √34.44 = 5.87. Decoding Σy² directly (Σw² = 100Σy² + ...) is error-prone and unnecessary.\n\nThe computational form Var = Σx²/n − x̄² must be memorised — it is NOT in the S1 formula booklet.", "source": "GLM 5.1 ①", "_id": "glm_1_22"}, {"question": "When adding a data point equal to the mean to a dataset, the SD decreases. Would adding a data point FAR from the mean increase or decrease the SD? Explain. (2 steps)", "answer": "- Step 1: Adding a point far from the mean **increases** the SD. The new point has a large squared deviation, which increases the numerator (sum of squared deviations) substantially.\n- Step 2: Although the denominator n also increases (from 50 to 51), the large squared deviation dominates. The average squared deviation goes up, so variance and SD increase. This is the opposite of adding a point at the mean (zero deviation, numerator unchanged, denominator grows → SD decreases).\n\nDirection of SD change depends on whether the new point's deviation is above or below the \"average\" deviation of existing data.", "source": "GLM 5.1 ①", "_id": "glm_1_52"}, {"question": "A coding $$10y = w - 20$$ is used. Write down the rule for decoding the **mean** $$\\bar{w}$$ from $$\\bar{y}$$, and explain the structure. (3 steps)", "answer": "- Step 1: Rearrange: $$w = 10y + 20$$. The decoding takes $$y$$ → multiply by 10 → add 20.\n- Step 2: Means are linear: $$\\bar{w} = 10\\bar{y} + 20$$. Both the multiplicative scaling and the additive shift transfer to the mean.\n- Step 3: Example: if $$\\bar{y} = 2.08$$, then $$\\bar{w} = 10(2.08) + 20 = 40.8$$.\n\nTakeaway: mean inherits both the scaling and the shift — same linear formula as for individual values.", "source": "Opus 4 ②", "_id": "opus_2_30"}, {"question": "In a back-to-back stem-and-leaf, the Maple column has cumulative totals (5), (12), (18), (25), (28), (30), (32). The median is the average of the 16th and 17th values. How do you locate these using the cumulative totals? (3 steps)", "answer": "- Step 1: Scan the cumulative totals to find where 16 and 17 fall. The third row cumulative is 18, meaning values 13 through 18 are in that row.\n- Step 2: Both the 16th and 17th values are in the third row (stem = 4). Within that row, count from the smallest: positions 13, 14, 15, 16, 17, 18 correspond to leaf values 1, 1, 1, k, 7, 8.\n- Step 3: So the 16th value is $$40 + k$$ and the 17th value is 47. Setting $$\\frac{(40+k) + 47}{2} = 45$$ gives $$40 + k + 47 = 90$$, so $$k = 3$$.", "source": "GLM 5.1 ②", "_id": "glm_2_50"}, {"question": "When computing $$P(C \\cap S \\cap G \\mid S \\cap G)$$, what's the structural difference from $$P(C \\mid S \\cap G)$$? (3 steps)", "answer": "- Step 1: $$P(C \\cap S \\cap G \\mid S \\cap G) = \\dfrac{P(C \\cap S \\cap G \\cap S \\cap G)}{P(S \\cap G)} = \\dfrac{P(C \\cap S \\cap G)}{P(S \\cap G)}$$ (numerator is just the triple intersection since $$S \\cap G$$ on both sides).\n- Step 2: $$P(C \\mid S \\cap G) = \\dfrac{P(C \\cap S \\cap G)}{P(S \\cap G)}$$ (since $$C \\cap (S \\cap G) = C \\cap S \\cap G$$ — the same triple).\n- Step 3: They give the *same* numerical value because $$P(C \\mid S \\cap G) = P(C \\cap S \\cap G \\mid S \\cap G)$$ — saying \"C given S∩G\" is logically equivalent to \"C∩S∩G given S∩G\" because we're already conditioning on S∩G.\n\nTakeaway: when conditioning on B, \"A\" and \"A∩B\" are the same event in the conditional space.", "source": "Opus 4 ②", "_id": "opus_2_133"}, {"question": "When given $$P(C \\cap G) = 0.26$$ and the count $$n_{C \\cap G} = 76$$, walk through how this implicitly determines the total population size, and why this is \"proportion-scaling\". (3 steps)", "answer": "- Step 1: If $$P(C \\cap G)$$ is the probability of being in C∩G, then in the long run a fraction 0.26 of the total population is in C∩G.\n- Step 2: $$\\text{count}_\\text{event} = N \\cdot P(\\text{event})$$, so $$N = \\text{count}_\\text{event} / P(\\text{event}) = 76 / 0.26 \\approx 292$$.\n- Step 3: Once $$N$$ is known, you can scale any other event: count in any region $$\\approx N \\cdot P(\\text{that region})$$.\n\nTakeaway: one observed count + one probability = total population; then scale other probabilities to get other counts.", "source": "Opus 4 ②", "_id": "opus_2_98"}, {"question": "State the IAL coding formulas $$\\bar{x}, \\sigma_x, \\text{Var}(x)$$ from $$\\bar{y}, \\sigma_y, \\text{Var}(y)$$ when $$y = (x - a)/b$$. (3 steps)", "answer": "- Step 1: Mean: $$\\bar{x} = b\\bar{y} + a$$. The shift $$a$$ and scale $$b$$ both transfer to the mean.\n- Step 2: SD: $$\\sigma_x = |b| \\cdot \\sigma_y$$. Only the scale $$b$$ transfers; the shift $$a$$ has no effect on spread.\n- Step 3: Variance: $$\\text{Var}(x) = b^2 \\cdot \\text{Var}(y)$$. Square of the scale transfers to variance (since variance is a *squared* deviation).\n\nTakeaway: shift affects mean only; scale affects mean linearly and SD/Var with scale/scale-squared respectively.", "source": "Opus 4 ②", "_id": "opus_2_67"}, {"question": "A Venn for events C, S has regions. How do you test for independence, and what equation do you set up? (4 steps)", "answer": "- Step 1: **Definition**: C and S are independent iff $$P(C \\cap S) = P(C) \\cdot P(S)$$.\n- Step 2: From the Venn, read off $$P(C \\cap S)$$ as the SUM of all regions inside BOTH C and S.\n- Step 3: Read off $$P(C)$$ and $$P(S)$$ as sums of all regions inside each circle individually.\n- Step 4: Set equation $$P(C \\cap S) = P(C) \\cdot P(S)$$ and solve for the unknown.\n\nTakeaway: $$P(C \\cap S)$$ is a SUM of regions; the independence equation uses a PRODUCT. Don't confuse.", "source": "Opus 4 ①", "_id": "opus_1_46"}, {"question": "In Q3(e), adding a pebble of weight 40.8 g (the current mean) to a data set of 50 pebbles: does the new variance formula use $$n$$ or $$n+1$$ in the denominator, and does it matter conceptually? (2 steps)", "answer": "- Step 1: Edexcel S1 uses the **population variance** formula $$\\sigma^2 = \\frac{\\Sigma x^2}{n} - \\bar{x}^2$$, so the denominator is $$n$$ (not $$n-1$$). After adding one value, the new denominator is $$n+1 = 51$$.\n- Step 2: Conceptually, whether you use $$n$$ or $$n-1$$, the key point is the same: the numerator (sum of squared deviations) is essentially unchanged (the new deviation is zero), but the denominator grows. So variance decreases either way. The exact numerical answer differs slightly, but the direction is the same.", "source": "GLM 5.1 ②", "_id": "glm_2_67"}, {"question": "Why does the order \"compute Var first, then derive σ\" matter for IAL coding problems, especially when given $$\\Sigma y$$ and $$\\Sigma y^2$$? (3 steps)", "answer": "- Step 1: $$\\Sigma y$$ and $$\\Sigma y^2$$ feed directly into the computational variance formula, giving Var(y) without intermediate steps.\n- Step 2: If you tried to compute σ_y first by some other route, you'd typically need to back-substitute via Var(y) anyway — extra steps.\n- Step 3: Once Var(y) is known: σ_y = √Var(y), then σ_w = b · σ_y (decode).\n+ Common error: trying to decode before computing Var or σ.\n\nTakeaway: Σ-data → Var → SD → decode. Don't skip intermediate quantities.", "source": "Opus 4 ②", "_id": "opus_2_109"}, {"question": "Imagine a quick numerical check on Q6(e) intuitively: if 60% of students play Scrabble, then 40% don't. The 76 C∩G students give a population of about 290. What's a quick mental estimate of \"40% of 290\"? (3 steps)", "answer": "- Step 1: 40% of 300 ≈ 120; 40% of 290 = 40% of 300 − 40% of 10 = 120 − 4 = 116.\n- Step 2: Match with computed: 0.40 × 292.31 ≈ 116.92 ≈ 117. Within tolerance ✓.\n- Step 3: The tutor's \"47\" is way off — about ⅓ of the right answer. Even a rough mental check would have flagged this.\n\nTakeaway: 40% of ~300 ≈ 120, not 47. A quick mental sanity check catches order-of-magnitude errors.", "source": "Opus 4 ②", "_id": "opus_2_146"}, {"question": "Two events A and B are independent. What does this mean intuitively about $$P(A)$$ and $$P(A \\mid B)$$? (4 steps)", "answer": "- Step 1: Independence ⇒ knowing B happened gives NO information about A. So $$P(A \\mid B) = P(A)$$.\n- Step 2: Equivalently: $$P(A \\cap B) = P(A) \\cdot P(B)$$ — probabilities multiply because events are \"informationally separate\".\n- Step 3: Concrete: rolling two dice. $$P(\\text{die 1} = 6) = 1/6$$. $$P(\\text{die 1} = 6 \\mid \\text{die 2} = 5) = 1/6$$.\n- Step 4: NOT independent: drawing 2 cards without replacement. $$P(\\text{2nd is Ace} \\mid \\text{1st is Ace}) \\neq P(\\text{2nd is Ace})$$ — first draw changed the deck.\n\nTakeaway: Independence ⇔ no information transfer; multiply probabilities.", "source": "Opus 4 ①", "_id": "opus_1_91"}, {"question": "Exam strategy: what should you do the moment you write \"P(X < t) = 0.4\" on a question about \"the fastest 60% qualifying\"? (2 steps)", "answer": "- Step 1: **STOP and re-read the question.** \"Fastest 60%\" means the lowest 60% of times qualify. The longest qualifying time is the 60th percentile, so P(X ≤ t) = 0.6, NOT 0.4.\n- Step 2: Writing P(X < t) = 0.4 means only 40% qualify — contradicting the question. This is the #1 misinterpretation on this type of question. The checkpoint: does your probability match the percentage in the question?\n\nBuild this habit: every time you write an inverse-normal probability equation, verify the percentage matches the question wording.", "source": "GLM 5.1 ①", "_id": "glm_1_70"}, {"question": "Given $$n = 8$$, $$\\Sigma d = 1456.8$$, $$\\Sigma g = 713.2$$, $$\\Sigma dg = 141\\,978.84$$, write down the formula for $$S_{dg}$$ and explain its structure. (3 steps)", "answer": "- Step 1: $$S_{dg} = \\Sigma dg - \\dfrac{(\\Sigma d)(\\Sigma g)}{n}$$.\n- Step 2: This is the \"adjusted\" sum of products, removing the influence of the means: it's algebraically equivalent to $$\\Sigma (d_i - \\bar{d})(g_i - \\bar{g})$$.\n- Step 3: $$S_{dg}$$ measures co-variation of $$d$$ and $$g$$ around their means; positive ⇒ tend to vary in same direction.\n\nTakeaway: $$S_{xy}$$ = \"covariation sum\" — central to PMCC and regression.", "source": "Opus 4 ②", "_id": "opus_2_36"}, {"question": "Imagine a histogram problem where you're given a reference bar (3 cm × 5 cm representing 30 trees) and asked for the height of a bar representing 10 trees in a class half as wide. Walk through the conceptual approach. (4 steps)", "answer": "- Step 1: Reference area = 3 × 5 = 15 cm² ↔ 30 trees, so 1 tree ↔ 0.5 cm² of paper.\n- Step 2: Target bar represents 10 trees → area = 10 × 0.5 = 5 cm².\n- Step 3: Target class width is half the reference's, so width on page = 3/2 = 1.5 cm.\n- Step 4: Height = area / width = 5 / 1.5 ≈ 3.33 cm.\n+ Sanity check: target class is half the width with 1/3 the count, so density per cm is (1/3)/(1/2) = 2/3 of reference → height should be 2/3 × 5 = 3.33 cm ✓.\n\nTakeaway: use area-per-frequency from the reference, then split into width and height.", "source": "Opus 4 ②", "_id": "opus_2_80"}, {"question": "Outline the full solution to: T ~ N(μ, σ²), $$P(\\mu - 10 < T < \\mu + 10) = 0.95$$. Find $$P(T > \\mu - 5 \\mid T > \\mu - 10)$$. (5 steps)", "answer": "- Step 1: Find σ via symmetric trick: $$10 = 1.96\\sigma \\Rightarrow \\sigma = 5.10$$.\n- Step 2: Find $$P(T > \\mu - 10)$$: by symmetric tails, $$P(T < \\mu - 10) = 0.025 \\Rightarrow P(T > \\mu - 10) = 0.975$$.\n- Step 3: Find $$P(T > \\mu - 5)$$: standardise. $$z = (\\mu - 5 - \\mu)/\\sigma = -5/5.10 \\approx -0.98$$. So $$P(T > \\mu - 5) = P(Z > -0.98) = \\Phi(0.98) = 0.8365$$.\n- Step 4: **Subset trick**: $$\\{T > \\mu - 5\\} \\subset \\{T > \\mu - 10\\}$$ (any time exceeding μ−5 also exceeds μ−10). So intersection = the smaller set: $$P(A \\cap B) = 0.8365$$.\n- Step 5: Conditional: $$P(A \\mid B) = 0.8365/0.975 \\approx 0.858$$ (3 s.f.).\n\nTakeaway: Identify nested events early — saves a multiplication and avoids the independence trap.", "source": "Opus 4 ①", "_id": "opus_1_43"}, {"question": "A 3-circle Venn diagram has events C, S, G. Distinguish: (i) \"C only\", (ii) \"C ∩ G only (not S)\", (iii) \"C ∩ S ∩ G\", (iv) \"C ∪ G\". (4 steps)", "answer": "- Step 1: **C only** = $$C \\cap S' \\cap G'$$ — inside C, outside S and G. The smallest \"C-corner\".\n- Step 2: **C ∩ G only (not S)** = $$C \\cap G \\cap S'$$ — overlap of C and G, but not S. The lens between C and G excluding the centre.\n- Step 3: **C ∩ S ∩ G** = the centre region — in all three.\n- Step 4: **C ∪ G** = anything in C or G or both — covers most of the diagram, including the centre. Includes any region inside C or G, even if also in S.\n\nTakeaway: \"X only\" usually means \"X but nothing else\"; \"X ∩ Y only\" means \"X and Y but nothing else\". Shade before computing.", "source": "Opus 4 ①", "_id": "opus_1_44"}, {"question": "The phrase \"box plot unchanged\" in Q1(f) generates multiple constraints on $$a$$. What is the general exam strategy when a question asks for a range of values subject to \"unchanged statistics\"? (3 steps)", "answer": "- Step 1: List every statistic that defines the box plot: min, $$Q_1$$, median, $$Q_3$$, max, and outlier status. Each must remain the same after adding new values.\n- Step 2: For each statistic, derive a constraint on the new values. For example, \"max unchanged\" means all new values ≤ current max. \"$$Q_1$$ unchanged\" means the new values must not shift the quartile position.\n- Step 3: Find the **intersection** of all constraints. The answer is the range of $$a$$ satisfying every condition simultaneously. Never stop after one constraint — examiners design these questions to require multiple conditions working together.", "source": "GLM 5.1 ②", "_id": "glm_2_59"}, {"question": "When verifying \"exactly one outlier\", why must you state both fences AND the comparison data values explicitly, even if the answer is just \"85 is the only outlier\"? (3 steps)", "answer": "- Step 1: An exam-style proof requires showing *all relevant data*, not just the conclusion. The fence is the criterion; the data point passing or failing the fence is the evidence.\n- Step 2: Stating \"lower fence = 12, lowest data value = 28 (above 12, so no low outliers)\" earns the M-mark for setting up.\n- Step 3: Stating \"upper fence = 84, only 85 is above it\" earns the A-mark for the specific outlier.\n+ A student writing only \"85 is the outlier\" with no fences shows no method — typically 0 or 1 mark only.\n\nTakeaway: a \"show that\" or \"find\" outlier question wants fences + data comparison + conclusion.", "source": "Opus 4 ②", "_id": "opus_2_124"}, {"question": "What's a \"shaded Venn diagram\" technique for verifying $$(C \\cup S) \\cap G'$$, and why is it foolproof? (3 steps)", "answer": "- Step 1: Draw the 3-circle Venn. Shade the union $$C \\cup S$$ (everything inside C or S — 5 regions excluding G-only and outside-region).\n- Step 2: Now intersect with $$G'$$: erase all shading INSIDE G. The remaining shaded regions are $$(C \\cup S) \\cap G'$$.\n- Step 3: Surviving shaded regions: C-only, S-only, C∩S only — three regions. (NOT C∩S∩G, NOT C∩G-only, NOT S∩G-only — these are inside G.)\n+ Sum the probabilities of these three regions.\n\nTakeaway: shade-then-erase is bulletproof for set operations on Venn diagrams.", "source": "Opus 4 ②", "_id": "opus_2_142"}, {"question": "In a Venn diagram with 3 sets, how many distinct regions are there (including the outside)? List them. (2 steps)", "answer": "- Step 1: There are **8 regions**: C-only, S-only, G-only, C∩S only, C∩G only, S∩G only, C∩S∩G, and outside (none of the three).\n- Step 2: The count comes from 2³ = 8 (each of the 3 sets is either \"in\" or \"out\"). Some regions may have probability 0 (like G-only = 0 in Q6), but they still exist conceptually.\n\nForgetting a region (especially the outside or a 2-set-only region) is the most common Venn diagram error. Always draw all 8 regions.", "source": "GLM 5.1 ①", "_id": "glm_1_73"}, {"question": "Why is the PMCC dimensionless, and what's the practical implication? (4 steps)", "answer": "- Step 1: $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} \\cdot S_{yy}}}$$.\n- Step 2: $$S_{xy}$$ has units of x·y; $$S_{xx}$$ has units of x²; $$S_{yy}$$ has units of y². So $$\\sqrt{S_{xx} \\cdot S_{yy}}$$ has units of x·y.\n- Step 3: r = (units xy) / (units xy) = **dimensionless**.\n- Step 4: Practical implication: r is invariant under unit changes (cm vs inches, kg vs lbs) — you can compare r across studies regardless of units.\n\nTakeaway: r = ratio of co-spread to product-of-own-spreads — units cancel.", "source": "Opus 4 ①", "_id": "opus_1_80"}, {"question": "$$X \\sim N(15, 2^2)$$. Conceptually walk through finding $$P(X < 18)$$ using standardisation. (3 steps)", "answer": "- Step 1: Standardise: $$z = \\dfrac{x - \\mu}{\\sigma} = \\dfrac{18 - 15}{2} = 1.5$$. This converts $$X$$ into the standard normal $$Z \\sim N(0, 1)$$.\n- Step 2: $$P(X < 18) = P(Z < 1.5)$$. The z-table (or calculator) gives $$P(Z < 1.5) \\approx 0.9332$$.\n- Step 3: Interpretation: about 93% of the distribution lies below 18.\n\nTakeaway: standardise → look up z → directly read probability.", "source": "Opus 4 ②", "_id": "opus_2_45"}, {"question": "Why might a student writing $$\\sigma_w^2 = 100 \\cdot \\sigma_y^2$$ correctly solve a coding problem but writing $$\\sigma_w = 10\\sigma_y + 20$$ totally fail? (3 steps)", "answer": "- Step 1: $$\\sigma_w^2 = 100 \\cdot \\sigma_y^2$$ is correct: $$\\text{Var}(10y + 20) = 10^2 \\cdot \\text{Var}(y) = 100 \\cdot \\text{Var}(y)$$. Then $$\\sigma_w = 10\\sigma_y$$ on taking square root.\n- Step 2: $$\\sigma_w = 10\\sigma_y + 20$$ is wrong: the +20 should not appear in SD (shift doesn't affect spread). This formula confuses mean (where +20 belongs) with SD.\n- Step 3: The error pattern is \"treating SD like the mean\" — applying the same linear transformation. SD has its own rule (no shift, scale only).\n\nTakeaway: SD ignores additive shifts entirely.", "source": "Opus 4 ②", "_id": "opus_2_141"}, {"question": "In the spinner problem, $$P(S > R)$$ where $$S = X_1$$ and $$R = 2X_2 - 3$$, the table method was used. Why is a two-way table of all possible $$(S, R)$$ pairs an effective approach, and what is the key property that makes it work? (3 steps)", "answer": "- Step 1: Since $$X_1$$ and $$X_2$$ are independent, every pair $$(x_1, x_2)$$ has probability $$P(X_1 = x_1) \\times P(X_2 = x_2)$$. The table enumerates all such pairs systematically.\n- Step 2: For each row (each value of $$x_2$$), compute $$R = 2x_2 - 3$$, then find which values of $$X_1$$ exceed $$R$$. Sum those probabilities to get $$P(X_1 > R \\mid X_2 = x_2)$$.\n- Step 3: Multiply each conditional probability by $$P(X_2 = x_2)$$ and sum across all rows. This is the law of total probability in action: $$P(S > R) = \\Sigma \\, P(S > R \\mid X_2 = x_2) \\cdot P(X_2 = x_2)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_62"}, {"question": "What do the summary statistics $$S_{xy}$$, $$S_{xx}$$, and $$S_{yy}$$ represent conceptually, and how are they calculated from sums ($$\\Sigma x, \\Sigma y$$, etc.)? (2 steps)", "answer": "- Step 1: Conceptually, they represent the variation/co-variation of the data. $$S_{xx}$$ and $$S_{yy}$$ measure how spread out the $$x$$ and $$y$$ values are from their means. $$S_{xy}$$ measures how the $$x$$ and $$y$$ values vary together.\n- Step 2: The computational formulas are $$S_{xx} = \\Sigma x^2 - \\frac{(\\Sigma x)^2}{n}$$, $$S_{yy} = \\Sigma y^2 - \\frac{(\\Sigma y)^2}{n}$$, and $$S_{xy} = \\Sigma xy - \\frac{(\\Sigma x)(\\Sigma y)}{n}$$. \n\nThese formulas are mathematically equivalent to $$\\Sigma(x-\\bar{x})^2$$ but much faster to compute. Avoid swapping the order in $$S_{xy}$$; it's $$\\Sigma xy$$ minus the product of sums over $$n$$.", "source": "GLM 5.1 ③", "_id": "glm_3_16"}, {"question": "What's the conceptual justification for the \"1.5 × IQR\" outlier rule, and what alternatives exist? (4 steps)", "answer": "- Step 1: 1.5 × IQR is a Tukey heuristic (1970s) for flagging \"potential\" outliers — observations far from the bulk.\n- Step 2: For approximately normal data, ±1.5·IQR ≈ ±2.7σ, excluding ~0.7% of data — a reasonable \"unusual\" rate.\n- Step 3: 3·IQR sometimes called \"extreme outlier\" cutoff. Choice depends on context.\n- Step 4: A flagged outlier may not be wrong — just unusual relative to the rest. Investigate, don't auto-delete.\n\nTakeaway: 1.5·IQR is convention; the question may specify k = 2 or k = 3.", "source": "Opus 4 ①", "_id": "opus_1_71"}, {"question": "Why is the variance of Y = aX + b given by Var(Y) = a²·Var(X) and not a·Var(X)?", "answer": "- **Variance measures spread**, which is unaffected by shifts (+b). Scaling by *a* affects spread quadratically:  \n  $$\n  \\text{Var}(aX + b) = \\text{Var}(aX) = a^2\\text{Var}(X)\n  $$  \n- **Example**: If X is scaled by 4, variance increases by 16 (4²), not 4.", "source": "Qwen 3 ②", "_id": "qwen_2_6"}, {"question": "The PMCC formula is $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} \\cdot S_{yy}}}$$. Why is the denominator necessary — what would go wrong with just $$r = S_{xy}$$? (2 steps)", "answer": "- Step 1: $$S_{xy}$$ alone depends on the **units and scale** of both variables. Measuring bears in mm instead of cm would inflate $$S_{xy}$$ by a factor of 10, even though the relationship is identical.\n- Step 2: Dividing by $$\\sqrt{S_{xx} \\cdot S_{yy}}$$ **normalises** the co-variation by the individual variations. The result $$r$$ is always in $$[-1, 1]$$, unit-free, and comparable across different data sets. It isolates the *strength* of linear relationship from the *scale* of measurement.", "source": "GLM 5.1 ②", "_id": "glm_2_23"}, {"question": "Explain the outlier fence rule used in IAL S1, and why we use $$\\text{IQR}$$ rather than just the range to detect outliers. (3 steps)", "answer": "- Step 1: An outlier is any value below $$Q_1 - k\\cdot\\text{IQR}$$ or above $$Q_3 + k\\cdot\\text{IQR}$$. The constant $$k$$ is given in the question (default $$k=1.5$$).\n- Step 2: $$\\text{IQR}$$ measures the **spread of the middle 50%**, so it's robust to extreme values. Range $$= \\max - \\min$$ is itself influenced *by* extremes, so using range to detect extremes is circular.\n- Step 3: Conceptually: a fence at $$1.5\\cdot\\text{IQR}$$ outside the quartiles flags points that are unusual *relative to the typical spread of the data*, not relative to whichever extreme is already there.\n\nTakeaway: $$\\text{IQR}$$-based fences are robust; range-based ones are not.", "source": "Opus 4 ②", "_id": "opus_2_5"}, {"question": "How do you calculate outlier fences, and what is the specific rule for drawing the whisker on a box plot when an outlier exists? (2 steps)", "answer": "- Step 1: Calculate the Interquartile Range ($$IQR = Q_3 - Q_1$$). The lower fence is $$Q_1 - k \\cdot IQR$$ and the upper fence is $$Q_3 + k \\cdot IQR$$ (where $$k$$ is given, usually 1.5). Any data point outside these fences is an outlier.\n- Step 2: The whisker does NOT extend to the fence; it extends to the highest/lowest data point that is **still within** the fences. Outliers are plotted as isolated crosses ($$\\times$$) beyond the whiskers.\n\nA common mistake is drawing the whisker all the way to the fence value itself, rather than to the nearest actual data point inside the fence.", "source": "GLM 5.1 ③", "_id": "glm_3_3"}, {"question": "If $$Y = aX - b$$ with $$a, b > 0$$, and you're told $$E(Y) = 13.4$$ and $$\\text{Var}(Y) = 66.24$$, what is the most efficient order to find $$a$$ and $$b$$, and why? (3 steps)", "answer": "- Step 1: Start with **variance** because it involves only $$a$$: $$\\text{Var}(Y) = a^2 \\cdot \\text{Var}(X)$$. Solve $$a^2 = \\text{Var}(Y) / \\text{Var}(X)$$ to get $$a$$. This avoids dealing with the unknown $$b$$.\n- Step 2: Once $$a$$ is known, use the **mean**: $$E(Y) = a \\cdot E(X) - b$$. Substitute the known $$a$$ and $$E(X)$$, then solve for $$b$$.\n- Step 3: Always check: since $$a, b > 0$$, take the positive square root for $$a$$, and verify $$b$$ comes out positive. If $$a^2 = 16$$, then $$a = 4$$ (not $$-4$$).", "source": "GLM 5.1 ②", "_id": "glm_2_10"}, {"question": "Conditional probability appears in both Q5 (normal distribution) and Q6 (Venn diagram). What is the universal formula, and what is the critical mistake to avoid when events are NOT independent? (2 steps)", "answer": "- Step 1: The universal formula: $$P(B \\mid A) = \\frac{P(A \\cap B)}{P(A)}$$. This applies regardless of the distribution — normal, Venn, or any other context.\n- Step 2: The critical mistake is writing $$P(A \\cap B) = P(A) \\cdot P(B)$$ when the events are NOT independent. This substitution is ONLY valid when independence has been established. In Q5, $$A \\subset B$$ means they're dependent; in Q6, the Venn regions show dependence. Always check independence before using the product rule.", "source": "GLM 5.1 ②", "_id": "glm_2_58"}, {"question": "Imagine two students compute $$\\sigma$$ from the symmetric interval — one gets 5.10, the other 0.0510. Which is more likely if you've made an arithmetic error, and what's the immediate sanity check? (3 steps)", "answer": "- Step 1: 0.0510 = 1/19.6 ≈ a reciprocal slip (multiplied by 1/100 instead of 1/1.96 = 0.51 → 5.10). The student probably divided by 196 instead of 1.96 (decimal error).\n- Step 2: Sanity check 1: $$10 / \\sigma$$ should equal 1.96. With 5.10: $$10/5.10 \\approx 1.96$$ ✓. With 0.0510: $$10/0.0510 \\approx 196$$ ✗.\n- Step 3: Sanity check 2: σ for a normal in S1 problems is *typically* of similar order of magnitude as a \"reasonable spread\" of the data. SD < 1 for time/length data is unusual unless the unit is large.\n\nTakeaway: σ \"looks tiny\"? Ratio it back to the 1.96 SDs and verify.", "source": "Opus 4 ②", "_id": "opus_2_119"}, {"question": "When computing Var(X) for a DRV, why must you square each x-value FIRST, then multiply by P(X = x), rather than the other way? (3 steps)", "answer": "- Step 1: The definition is $$E(X^2) = \\sum x^2 \\cdot P(X = x)$$ — average of squared values weighted by probability.\n- Step 2: If you instead computed $$\\left(\\sum x \\cdot P(X=x)\\right)^2$$, you'd get $$[E(X)]^2$$, which generally differs from $$E(X^2)$$ — the gap is exactly Var(X).\n- Step 3: Quick check: X with values 1 and 3, each prob 0.5. $$E(X) = 2$$, $$[E(X)]^2 = 4$$. But $$E(X^2) = 0.5(1) + 0.5(9) = 5$$. Different! And $$\\text{Var}(X) = 5 - 4 = 1$$.\n\nTakeaway: Square FIRST, then weight; the variance gap equals $$E(X^2) - [E(X)]^2$$.", "source": "Opus 4 ①", "_id": "opus_1_13"}, {"question": "Under what condition is $$P(A \\cap B) = P(A) \\cdot P(B)$$, and when does it FAIL? (3 steps)", "answer": "- Step 1: This is the **definition of independence** of A and B. Holds iff A, B are independent.\n- Step 2: It FAILS for general events. Examples:\n+ A, B mutually exclusive: $$P(A \\cap B) = 0$$, but $$P(A) \\cdot P(B) > 0$$ if both non-empty — NOT independent.\n+ A ⊂ B: $$P(A \\cap B) = P(A)$$, and $$P(A) \\cdot P(B) = P(A) P(B) \\neq P(A)$$ unless P(B) = 1.\n- Step 3: Common error: applying product rule to nested events.\n\nTakeaway: Multiply only when independent; otherwise use the conditional formula.", "source": "Opus 4 ①", "_id": "opus_1_60"}, {"question": "Summarise the two tutor errors caught in this paper, and state the principle each error illustrates for future exams. (3 steps)", "answer": "- Step 1: **Error 1 (Q5c):** Tutor wrote $$\\sigma = 10/1.96 = 0.0510$$ instead of 5.10. This is a **reciprocal/decimal error** — dividing in the wrong order. Principle: always sense-check by plugging back in; a z-score of ~98 is impossible.\n- Step 2: **Error 2 (Q6e):** Tutor computed $$P(S') = 0.18$$ by only adding some regions, getting 47 students instead of ~105–117. This is a **missing regions error** — forgetting that $$P(S')$$ includes everyone outside S, not just G-only and outside. Principle: use the complement $$P(S') = 1 - P(S)$$ whenever $$P(S)$$ is known.\n- Step 3: Both errors share a root cause: rushing the setup without verifying. The fix is always to (1) write the formula first, (2) substitute carefully, (3) sense-check the result against the context.", "source": "GLM 5.1 ②", "_id": "glm_2_68"}, {"question": "A Maple box-plot summary is min = 25, Q1 = 36, median = 45, Q3 = 54, max = 80 (n = 32). Four values 27, $$a$$, 48, $$2a$$ are added (n = 36). For what range of $$a$$ is the box plot UNCHANGED? (5 steps)", "answer": "- Step 1: List ALL summary statistics that must be preserved: min, Q1, median, Q3, max. Each gives a constraint.\n- Step 2: New positions for n = 36: Q1 averages positions 9 & 10; median averages 18 & 19; Q3 averages 27 & 28; max = 36th.\n- Step 3: **Max ≤ 80**: 2a is the largest new value, so $$2a \\leq 80 \\Rightarrow a \\leq 40$$.\n- Step 4: **Q1 = 36**: of the new values, 27 is below 36; for Q1 unchanged we need at most 1 new value < 36. So $$a \\geq 36$$.\n- Step 5: **Median = 45**: existing 18th = 43, 19th = 47. Need new median to remain (43 + 47)/2 = 45, so $$a \\leq 43$$ and $$2a \\geq 47$$ (auto if $$a \\geq 36$$). Combined: $$36 \\leq a \\leq 40$$.\n\nTakeaway: ALL constraints must hold simultaneously — intersect all ranges; the most restrictive defines each boundary.", "source": "Opus 4 ①", "_id": "opus_1_10"}, {"question": "Outline a foolproof tabular approach for computing $$E(X^2)$$ to avoid arithmetic mistakes. (5 steps)", "answer": "- Step 1: Tabulate columns: x, P(x), x², x²·P(x).\n- Step 2: Compute x² for each row FIRST.\n- Step 3: Multiply x²·P(x) row by row.\n- Step 4: Sum the last column.\n- Step 5: This forces \"square first, weight second\" and avoids the $$(x \\cdot P)^2$$ trap on the first term.\n\nTakeaway: Table forces correct order of operations.", "source": "Opus 4 ①", "_id": "opus_1_66"}, {"question": "In the spinner problem, the table for P(Sam wins) has columns: x₂, R = 2x₂−3, P(X₁ > R), P(X₂ = x₂), contribution. Why is the contribution P(X₁ > R) × P(X₂ = x₂) and not P(X₁ > R) + P(X₂ = x₂)? (2 steps)", "answer": "- Step 1: The contribution represents P(Sam wins AND X₂ = x₂). Since X₁ and X₂ are **independent**, P(X₁ > R AND X₂ = x₂) = P(X₁ > R | X₂ = x₂) × P(X₂ = x₂) = P(X₁ > R) × P(X₂ = x₂).\n- Step 2: Adding probabilities would give P(X₁ > R) + P(X₂ = x₂), which could exceed 1 and has no probabilistic meaning here. The law of total probability requires **multiplication** (for joint probability of independent events) then **addition** (to sum over all x₂ values).\n\nThe structure is: P(Sam wins) = Σ [P(win given x₂) × P(x₂)] — multiply within each row, add across rows.", "source": "GLM 5.1 ①", "_id": "glm_1_66"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "In a back-to-back stem-and-leaf diagram, the left side (e.g., Birch) has leaves listed as `9 8` next to stem `2`. What two values does this represent, and why is the reading direction different from the right side? (2 steps)", "answer": "- Step 1: On the left side of a back-to-back stem-and-leaf, leaves are read **right-to-left** (smallest values sit closest to the stem). So `9 8` next to stem `2` means **28, 29** — not 98. The right side reads left-to-right as normal.\n- Step 2: The reason for this convention is that the stem is the \"centre\" of the diagram. Values increase as you move *away* from the stem on both sides. Reading left-side leaves left-to-right would give descending order, which breaks the ascending-order rule of stem-and-leaf plots.\n\nKey: `5|6|3` means 65 (Birch, left) and 63 (Maple, right). Always state the key or lose 1 mark.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "A stem-and-leaf has 32 data points (Maple). The median is given as 45 cm. If the 16th value is `4k` (= 40 + k) and the 17th value is 47, set up and solve for k. (2 steps)", "answer": "- Step 1: For an even number of observations, the median is the average of the $$\\frac{n}{2}$$th and $$(\\frac{n}{2}+1)$$th values. Here n = 32, so median = average of 16th and 17th values: $$\\text{median} = \\frac{(40+k) + 47}{2}$$.\n- Step 2: Set equal to the given median: $$\\frac{87+k}{2} = 45 \\Rightarrow 87+k = 90 \\Rightarrow k = 3$$.\n\nThe key insight: you must use cumulative frequency to identify *which* values sit in positions 16 and 17, then form the equation.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "For Edexcel IAL, what is the rule for finding quartile positions on a stem-and-leaf or discrete data set? Specifically, for n = 35, where do Q₁ and Q₃ sit? (3 steps)", "answer": "- Step 1: Edexcel IAL uses the rule: position of Q₁ = $$\\frac{n}{4}$$, position of Q₃ = $$\\frac{3n}{4}$$. This is different from the domestic A-level convention of $$\\frac{n+1}{4}$$.\n- Step 2: For n = 35: Q₁ position = 35/4 = 8.75. Since this is **not an integer**, round **up** to position 9. Q₃ position = 3(35)/4 = 26.25, round up to position 27.\n- Step 3: If the position *had been* an integer (say n = 36, position = 9), you would average the 9th and 10th values. But 8.75 → round up to 9th value only.\n\nCommon pitfall: using (n+1)/4 instead of n/4. The IAL convention is fixed — memorise it.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "On the LEFT side of a back-to-back stem-and-leaf, how do you locate the 9th smallest value? Describe the reading strategy. (2 steps)", "answer": "- Step 1: On the left side, the smallest values are closest to the stem (rightmost leaves on the left side). So you count from the stem **outward** (right-to-left across each row, moving down through stems).\n- Step 2: Use the cumulative totals shown in brackets on the left margin. If the first row shows (2), the second (8), the third (9) — the 9th value is the last (leftmost) leaf in the third row. Read it right-to-left: the rightmost leaf in that row is the 3rd value from the previous cumulative total, and so on.\n\nWithout the cumulative totals in brackets, you'd need to count manually — always verify the totals are correct.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "Given Q₁ = 39, Q₃ = 57, and the minimum Birch value is 28, maximum is 85, use the k = 1.5 IQR rule to determine how many outliers exist. (3 steps)", "answer": "- Step 1: IQR = Q₃ − Q₁ = 57 − 39 = 18. Then 1.5 × IQR = 1.5 × 18 = 27.\n- Step 2: Lower fence = Q₁ − 27 = 39 − 27 = 12. Upper fence = Q₃ + 27 = 57 + 27 = 84. Any value below 12 or above 84 is an outlier.\n- Step 3: Minimum is 28 > 12, so no low outliers. Maximum is 85 > 84, so **exactly one outlier** (the value 85). All other values ≤ 76 fall within the fences.\n\nThe fence value itself (84) is NOT an outlier — the data value must be strictly beyond the fence.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "When drawing a box plot with an outlier at 85 (and the largest non-outlier at 76), where does the upper whisker end and where does the outlier go? (2 steps)", "answer": "- Step 1: The upper whisker extends to the **largest data value within the fences** — that is 76, NOT 84 (the fence is a boundary, not a data point). The whisker stops at the most extreme non-outlier.\n- Step 2: The outlier at 85 is marked with a **separate × (cross)** symbol beyond the whisker. Do NOT extend the whisker to the outlier.\n\nCommon error: drawing the whisker to 85 and forgetting the ×. Another error: drawing the whisker to the fence value (84) rather than the actual data point (76).", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "When comparing two distributions on a box-plot question, what two aspects must you comment on, and what must every comparison include for full marks? (2 steps)", "answer": "- Step 1: You must compare **location** (median or mean) and **spread** (IQR or range). A one-aspect answer loses the mark.\n- Step 2: Every comparison MUST include: (a) a **specific statistic** (e.g., \"median 48 vs 45\"), (b) **context** (e.g., \"Birch seedlings grow taller\"), and (c) a **directional statement** (e.g., \"Birch median is higher\"). Saying \"they are different\" with no statistic = B0.\n\nExample of a full-mark answer: \"Birch median (48 cm) is greater than Maple median (45 cm), so Birch seedlings grow taller on average.\"", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": true}, {"question": "Original data has min = 25, Q₁ = 36, median = 45, Q₃ = 54, max = 80. You add four values: 27, a, 48, 2a. The box plot must remain unchanged. Explain why this requires satisfying MULTIPLE constraints simultaneously, and why stopping at one constraint is wrong. (3 steps)", "answer": "- Step 1: \"Box plot unchanged\" means ALL five summary statistics (min, Q₁, median, Q₃, max) must be the same. Each one imposes a constraint on a. For example: max ≤ 80 means 2a ≤ 80, so a ≤ 40.\n- Step 2: Q₁ must stay at 36. With new n = 36, Q₁ is the average of the 9th and 10th values. If both 27 and a are below 36, then Q₁ shifts down. So at most one new value can be below 36 — only 27 qualifies, meaning a ≥ 36.\n- Step 3: You must also check the median constraint (new 18th and 19th values must average to 45) and Q₃ constraint. The final answer is the **intersection** of all constraints: 36 ≤ a ≤ 40.\n\nCommon pitfall: finding a ≤ 40 from the max constraint and stopping. Each constraint narrows the range — you need them ALL.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": true}, {"question": "For the constraint problem where 27, a, 48, 2a are added to a dataset and the box plot must be unchanged, verify that a = 38 satisfies all constraints. The original sorted data has min=25, Q₁=36, median=45, Q₃=54, max=80, n=32. (4 steps)", "answer": "- Step 1: Max constraint: 2a = 76 ≤ 80 ✓. Min constraint: 27 > 25, so min unchanged ✓.\n- Step 2: Q₁ constraint (new n=36, Q₁ = avg of 9th and 10th): only 27 is below 36 among new values (a=38 > 36). So 9th and 10th values are still the same as before → Q₁ = 36 ✓.\n- Step 3: Median constraint (avg of 18th and 19th): new values in the 30s–40s range are 27, 38, 48. The 18th value is still 43, 19th still 47 → median = 45 ✓.\n- Step 4: Q₃ constraint (avg of 27th and 28th): 2a = 76, which is above Q₃ = 54, so it doesn't affect the 27th/28th positions → Q₃ = 54 ✓. All constraints satisfied.\n\nThis verification shows why a = 38 works — each new value lands in a position that doesn't shift the five-number summary.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": true}, {"question": "A discrete random variable X has values {2, 4, 5, 7, 8} with probabilities {0.25, 0.3, 0.2, 0.1, 0.15}. You need P(2X − 3 > 5). What's the key algebraic step before looking up probabilities? (2 steps)", "answer": "- Step 1: Solve the inequality for X first: 2X − 3 > 5 ⇒ 2X > 8 ⇒ X > 4. This is a strict inequality, so X = 4 does NOT qualify.\n- Step 2: The qualifying values are X ∈ {5, 7, 8}. Sum their probabilities: 0.2 + 0.1 + 0.15 = 0.45.\n\nThe trap: using ≥ instead of >. \"Higher score wins\" or \"greater than\" means strict inequality. Including X = 4 would give 0.75 — wrong.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "Why must you square the x-values BEFORE multiplying by probability when computing E(X²)? What goes wrong if you compute [E(X)]² component-by-component? (2 steps)", "answer": "- Step 1: E(X²) = $$\\sum x^2 \\cdot P(X=x)$$. Each term is (value²) × (probability). For X = 2 with P =
