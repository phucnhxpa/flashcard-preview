$.\n- Step 3: For population scaling: 76 students with C∩G ⇒ N = 76 / 0.26 ≈ 292. (Then multiply by other probabilities to get other counts.)\n\nTakeaway: Venn intersections compose from regions; the right intersection enables proportion-scaling.", "source": "Opus 4 ②", "_id": "opus_2_107", "judge_pick": true}, {"question": "What does the phrase \"rounded to 3 significant figures\" practically mean in IAL S1, and why is it usually a 1-mark requirement? (3 steps)", "answer": "- Step 1: 3 s.f. = three significant digits, regardless of decimal placement. Examples: 0.722, 5.10, 23.96, 117.\n- Step 2: Examiners typically award the A-mark only for the answer at the requested precision; over-precise (e.g., 5.10204) or under-precise (e.g., 5) often loses the A-mark.\n- Step 3: For final answers, use the most-precise intermediate value through your working, then round only the *final* number to 3 s.f.\n\nTakeaway: round only the final answer; intermediate steps stay precise to avoid compounding errors.", "source": "Opus 4 ②", "_id": "opus_2_108", "judge_pick": false}, {"question": "Why does the order \"compute Var first, then derive σ\" matter for IAL coding problems, especially when given $$\\Sigma y$$ and $$\\Sigma y^2$$? (3 steps)", "answer": "- Step 1: $$\\Sigma y$$ and $$\\Sigma y^2$$ feed directly into the computational variance formula, giving Var(y) without intermediate steps.\n- Step 2: If you tried to compute σ_y first by some other route, you'd typically need to back-substitute via Var(y) anyway — extra steps.\n- Step 3: Once Var(y) is known: σ_y = √Var(y), then σ_w = b · σ_y (decode).\n+ Common error: trying to decode before computing Var or σ.\n\nTakeaway: Σ-data → Var → SD → decode. Don't skip intermediate quantities.", "source": "Opus 4 ②", "_id": "opus_2_109", "judge_pick": true}, {"question": "What's a \"follow-through\" mark in IAL, and why should you always continue computing even if you suspect an earlier error? (3 steps)", "answer": "- Step 1: Follow-through (\"ft\") allows the examiner to award marks in later parts based on your **method** even if you used a wrong intermediate value from earlier.\n- Step 2: If you stop at a suspected error, you forfeit all subsequent M-marks AND any A-marks where the method is correct.\n- Step 3: Continue — your method may be right, and follow-through often saves 2–4 marks per question. Even better: redo the suspect step on the side and pick whichever is right.\n\nTakeaway: never abandon — continue applying correct methods, even on uncertain values.", "source": "Opus 4 ②", "_id": "opus_2_110", "judge_pick": false}, {"question": "What's the correct interpretation of $$P(X > t) = 0.6$$ vs $$P(X < t) = 0.6$$ when looking up the inverse normal? (3 steps)", "answer": "- Step 1: $$P(X < t) = 0.6$$ → looking up \"$$z$$ such that the area below $$z$$ is 0.6\" → $$z \\approx +0.2533$$ (positive, since 0.6 > 0.5).\n- Step 2: $$P(X > t) = 0.6$$ → looking up \"$$z$$ such that the area above $$z$$ is 0.6\" → $$z \\approx -0.2533$$ (negative, since \"60% above\" means $$t$$ is below the mean).\n- Step 3: They differ by sign. Carefully translate the question's wording into a \"less-than\" probability before looking up.\n\nTakeaway: convert all wordings into $$P(Z < z)$$ form; sign of $$z$$ tracks whether you're above or below the mean.", "source": "Opus 4 ②", "_id": "opus_2_111", "judge_pick": true}, {"question": "Imagine a quick example: $$X \\sim N(50, 10^2)$$ and we want the **75th percentile**. What's the procedure, mental-math version? (3 steps)", "answer": "- Step 1: 75th percentile = $$t$$ such that $$P(X < t) = 0.75$$. From z-tables, $$z \\approx +0.6745$$.\n- Step 2: $$t = 50 + 0.6745 \\times 10 \\approx 56.7$$.\n- Step 3: Sense-check: 75th percentile is above the mean (50), and about 0.67 SDs above ≈ 6.7 above mean ✓.\n\nTakeaway: percentile → z → de-standardise.", "source": "Opus 4 ②", "_id": "opus_2_112", "judge_pick": false}, {"question": "Why might \"n = 32 ⇒ position = 8\" for $$Q_1$$ require *averaging* values 8 and 9, while \"n = 35 ⇒ position = 8.75\" requires only the 9th value (no averaging)? (3 steps)", "answer": "- Step 1: Position 8 (integer) for $$Q_1$$ falls EXACTLY on a data point; the convention is to take the average of that point (8th) and the next (9th) — splits the gap evenly.\n- Step 2: Position 8.75 falls strictly *between* 8 and 9; rounding UP to 9 places $$Q_1$$ entirely at the 9th value (no averaging needed).\n- Step 3: This asymmetric rule (round up vs average) is the IAL convention; other conventions (round to nearest, average always) exist but are NOT what IAL uses.\n\nTakeaway: integer position = average two values; non-integer = round up to single position.", "source": "Opus 4 ②", "_id": "opus_2_113", "judge_pick": false}, {"question": "A student writes \"the mean stays the same\" but doesn't say why for adding-the-mean problems. What's the minimal reasoning required for full marks? (3 steps)", "answer": "- Step 1: Show: $$\\bar{w}_\\text{new} = \\dfrac{n\\bar{w} + \\bar{w}}{n+1} = \\dfrac{(n+1)\\bar{w}}{n+1} = \\bar{w}$$.\n- Step 2: Or state in words: \"the new value equals the existing mean, so the average is preserved\".\n- Step 3: Either form earns the B1 reasoning mark; just stating \"stays same\" without justification typically gets 0 (depends on examiner leniency).\n\nTakeaway: state the mechanism, not just the conclusion.", "source": "Opus 4 ②", "_id": "opus_2_114", "judge_pick": false}, {"question": "When constructing a regression line for \"y on x\", why is the slope $$b = S_{xy}/S_{xx}$$ rather than $$b = S_{xy}/S_{yy}$$? (3 steps)", "answer": "- Step 1: \"y on x\" means we're predicting y from x. The line is fitted to minimise vertical deviations (in the y-direction).\n- Step 2: $$S_{xx}$$ is the spread of x; $$b = S_{xy}/S_{xx}$$ scales the covariation by the variability of the predictor x.\n- Step 3: $$S_{xy}/S_{yy}$$ would be the slope for \"x on y\" (predicting x from y) — a different line, generally not the same.\n\nTakeaway: $$b = S_{xy}/S_{\\text{predictor}^2}$$; \"y on x\" → divide by $$S_{xx}$$.", "source": "Opus 4 ②", "_id": "opus_2_115", "judge_pick": true}, {"question": "Why might computing P(S > R) = 0.355 in the Sam-vs-opponent problem actually be checked by computing P(R > S) and P(S = R)? (3 steps)", "answer": "- Step 1: $$P(S > R) + P(R > S) + P(S = R) = 1$$ (mutually exclusive and exhaustive cases).\n- Step 2: Computing the other two probabilities gives a verification: if their sum + 0.355 equals 1, your answer is consistent.\n- Step 3: If they don't sum to 1, you have an error somewhere (or a silly arithmetic slip).\n+ Useful as a sense-check rather than a primary method, since it requires more work.\n\nTakeaway: outcomes partition the sample space; sum should be 1 — useful check.", "source": "Opus 4 ②", "_id": "opus_2_116", "judge_pick": true}, {"question": "Conceptually, what's the difference between \"all 5 summary statistics unchanged\" (Q1(f) box plot constraint) and \"data unchanged\"? (3 steps)", "answer": "- Step 1: All 5 summary stats unchanged means: same min, $$Q_1$$, median, $$Q_3$$, max. The box plot looks identical.\n- Step 2: But the underlying data has changed — we added 4 new values (27, $$a$$, 48, 2$$a$$). The dataset is bigger; mean and SD almost certainly differ; only the 5-summary is invariant.\n- Step 3: This is why \"box plot unchanged\" gives a constraint on $$a$$, not the actual data values. The box plot is a *summary*, not a complete description.\n\nTakeaway: box plots show 5 summary statistics; identical box plots ≠ identical data.", "source": "Opus 4 ②", "_id": "opus_2_117", "judge_pick": true}, {"question": "Why is the IAL S1 paper marked out of 75 with 6 questions of varying lengths (10–14 marks each), and how does that affect time allocation? (3 steps)", "answer": "- Step 1: 75 marks in 90 minutes ⇒ ~1.2 minutes per mark. Use this as a budget.\n- Step 2: A 13-mark question deserves ~15–16 minutes; a 10-mark question ~12 minutes. Allocate roughly proportional to marks.\n- Step 3: Save 10–15 minutes at the end for re-checking, especially the questions where sense-checking caught errors (Q5(c) σ, Q6(e) #students). Time pressure is moderate but real.\n\nTakeaway: budget by marks; reserve final 10–15 min for sense-checks and corrections.", "source": "Opus 4 ②", "_id": "opus_2_118", "judge_pick": false}, {"question": "Imagine two students compute $$\\sigma$$ from the symmetric interval — one gets 5.10, the other 0.0510. Which is more likely if you've made an arithmetic error, and what's the immediate sanity check? (3 steps)", "answer": "- Step 1: 0.0510 = 1/19.6 ≈ a reciprocal slip (multiplied by 1/100 instead of 1/1.96 = 0.51 → 5.10). The student probably divided by 196 instead of 1.96 (decimal error).\n- Step 2: Sanity check 1: $$10 / \\sigma$$ should equal 1.96. With 5.10: $$10/5.10 \\approx 1.96$$ ✓. With 0.0510: $$10/0.0510 \\approx 196$$ ✗.\n- Step 3: Sanity check 2: σ for a normal in S1 problems is *typically* of similar order of magnitude as a \"reasonable spread\" of the data. SD < 1 for time/length data is unusual unless the unit is large.\n\nTakeaway: σ \"looks tiny\"? Ratio it back to the 1.96 SDs and verify.", "source": "Opus 4 ②", "_id": "opus_2_119", "judge_pick": true}, {"question": "Why does the IAL S1 booklet not include the variance computational form $$\\sigma^2 = \\Sigma x^2 / n - \\bar{x}^2$$, and what's the practical implication? (3 steps)", "answer": "- Step 1: It's considered a \"fundamental\" formula — students are expected to know the rearrangement of $$\\sigma^2 = E(X^2) - [E(X)]^2$$ themselves.\n- Step 2: Practically: appears in nearly every paper (DRV, grouped data, raw data); guaranteed marks if memorised; lost marks if not.\n- Step 3: Memorise as a \"STAR formula\" — top of revision list.\n\nTakeaway: variance computational form = high-frequency, must-memorise.", "source": "Opus 4 ②", "_id": "opus_2_120", "judge_pick": true}, {"question": "Imagine a quick conceptual probe: if a regression line on a coded dataset is $$y = 2 + 3u$$ where $$u = (x - 10)/5$$, what's the regression line in original units? (3 steps)", "answer": "- Step 1: Substitute $$u = (x - 10)/5$$: $$y = 2 + 3 \\cdot (x - 10)/5 = 2 + (3/5)x - 6 = -4 + (3/5)x$$.\n- Step 2: Slope in original units = 3/5 = 0.6 (was 3 in coded units → divided by scaling factor 5).\n- Step 3: Intercept changes too. The slope-conversion is $$b_x = b_u / 5$$ (divide by scaling), reflecting that 1 cm of $$x$$ corresponds to 1/5 of a $$u$$-unit.\n\nTakeaway: under coding, slopes scale by inverse of the x-scaling; intercept gets a constant added/subtracted.", "source": "Opus 4 ②", "_id": "opus_2_121", "judge_pick": false}, {"question": "Suppose a question asks: \"are P(A) = 0.5, P(B) = 0.5, P(A∩B) = 0.30 mutually exclusive? Independent?\" Walk through the dual check. (3 steps)", "answer": "- Step 1: Mutually exclusive ⇔ $$P(A \\cap B) = 0$$. Here it's 0.30, so NOT mutually exclusive.\n- Step 2: Independent ⇔ $$P(A \\cap B) = P(A) \\cdot P(B) = 0.5 \\times 0.5 = 0.25$$. Here it's 0.30, so NOT independent (0.30 ≠ 0.25).\n- Step 3: Two distinct numerical tests; the events are neither in this case.\n+ Note: ME (P(A∩B)=0) and Independence (P(A∩B)=P(A)P(B)) can only both hold if at least one event has probability 0.\n\nTakeaway: ME and Independence are different — test each separately with their own formulas.", "source": "Opus 4 ②", "_id": "opus_2_122", "judge_pick": true}, {"question": "A student multiplies P(A) and P(B) instead of using P(A∩B) when checking independence. Why is this CIRCULAR and a logical error? (3 steps)", "answer": "- Step 1: To check independence, you need to verify $$P(A \\cap B) = P(A) \\cdot P(B)$$. Both sides must be computed independently, then compared.\n- Step 2: If you simply *multiply* P(A) and P(B) and call that \"P(A∩B)\", you've assumed what you want to prove — it's circular reasoning.\n- Step 3: $$P(A \\cap B)$$ must come from data (a Venn region, a count, a problem setup) — it's a JOINT probability that must be observed or inferred, not derived from the marginals.\n\nTakeaway: independence is a TEST: compute both sides separately, then compare.", "source": "Opus 4 ②", "_id": "opus_2_123", "judge_pick": true}, {"question": "When verifying \"exactly one outlier\", why must you state both fences AND the comparison data values explicitly, even if the answer is just \"85 is the only outlier\"? (3 steps)", "answer": "- Step 1: An exam-style proof requires showing *all relevant data*, not just the conclusion. The fence is the criterion; the data point passing or failing the fence is the evidence.\n- Step 2: Stating \"lower fence = 12, lowest data value = 28 (above 12, so no low outliers)\" earns the M-mark for setting up.\n- Step 3: Stating \"upper fence = 84, only 85 is above it\" earns the A-mark for the specific outlier.\n+ A student writing only \"85 is the outlier\" with no fences shows no method — typically 0 or 1 mark only.\n\nTakeaway: a \"show that\" or \"find\" outlier question wants fences + data comparison + conclusion.", "source": "Opus 4 ②", "_id": "opus_2_124", "judge_pick": true}, {"question": "If a histogram class has frequency = 0 (no values in the range), what does the bar look like, and why? (2 steps)", "answer": "- Step 1: The bar has height 0 (no area, since area ∝ frequency = 0). Visually, no bar at all in that class.\n- Step 2: This is fine — frequency density = 0, area = 0. A gap in the histogram represents an empty class.\n\nTakeaway: zero frequency = zero area = no bar; not an error but a meaningful absence.", "source": "Opus 4 ②", "_id": "opus_2_125", "judge_pick": true}, {"question": "Why is the \"n+1\" complementary correction for sample variance ($$s^2 = \\Sigma(x-\\bar x)^2 / (n-1)$$) NOT used in IAL S1, and which formula IS used? (3 steps)", "answer": "- Step 1: Bessel-corrected variance ($$/(n-1)$$) is for *unbiased estimation of population variance* from a sample — used in inference.\n- Step 2: IAL S1 uses the descriptive variance $$\\sigma^2 = \\Sigma(x - \\bar{x})^2 / n$$ (or computational form $$\\Sigma x^2/n - \\bar{x}^2$$). It treats the data as the population.\n- Step 3: This is a *descriptive* statistic, not an inferential one. The (n-1) correction belongs in inference courses (S2 / further stats), not S1.\n\nTakeaway: S1 uses /n for variance and SD; the /(n-1) correction is inferential and not in scope.", "source": "Opus 4 ②", "_id": "opus_2_126", "judge_pick": true}, {"question": "Imagine a quick mental check: if mean of $$y$$ is 2.08 and the coding is $$10y = w - 20$$, what's the mean of $$w$$, computed mentally? (2 steps)", "answer": "- Step 1: $$\\bar{w} = 10 \\cdot 2.08 + 20 = 20.8 + 20 = 40.8$$.\n- Step 2: Quick mental check: 10 times 2 is 20; 10 times 0.08 is 0.8; sum is 20.8; plus 20 is 40.8. ✓.\n\nTakeaway: $$w = 10y + 20$$; compute step-by-step.", "source": "Opus 4 ②", "_id": "opus_2_127", "judge_pick": false}, {"question": "Imagine a quick mental check on coding for SD: if σ_y ≈ 0.587 and 10y = w − 20, what's σ_w mentally? (2 steps)", "answer": "- Step 1: σ_w = 10 × σ_y = 10 × 0.587 = 5.87.\n- Step 2: NB: do NOT add 20 (the +20 is a shift, doesn't affect spread).\n\nTakeaway: σ_w = 10 σ_y, no +20 — common trap.", "source": "Opus 4 ②", "_id": "opus_2_128", "judge_pick": false}, {"question": "Why should you always WRITE OUT the symmetric interval trick formula on a normal-distribution σ-finding problem, even though it's \"obvious\"? (3 steps)", "answer": "- Step 1: Writing $$\\dfrac{k}{\\sigma} = 1.96 \\Rightarrow \\sigma = \\dfrac{k}{1.96}$$ shows the examiner you know the trick — earns M-mark.\n- Step 2: Writing only \"σ = 5.10\" without the chain of reasoning may forfeit the M-mark even if the answer is correct.\n- Step 3: As a general rule for IAL: show the formula at the start of every numerical step. Examiners reward visible method.\n\nTakeaway: visible method = M-mark; numbers alone = risk forfeiture.", "source": "Opus 4 ②", "_id": "opus_2_129", "judge_pick": true}, {"question": "Why is reading the question slowly especially important on Q5(b) (fastest 60%) and Q6(e) (NOT playing Scrabble)? (3 steps)", "answer": "- Step 1: Q5(b): \"fastest\" can be misread as \"the fastest = the few who finish quickest\", giving a rare-event interpretation. The actual meaning is \"fastest 60% by time = lowest 60% of times\".\n- Step 2: Q6(e): \"Number who do NOT play Scrabble\" — easy to compute # who DO play Scrabble (more natural since P(S) = 0.6 is given) and forget the negation.\n- Step 3: Both errors are reading errors, not math errors. Re-read the question after computing — does your answer match the actual ask?\n\nTakeaway: reading errors are unforgiving; spend 5 seconds re-reading after every numerical answer.", "source": "Opus 4 ②", "_id": "opus_2_130", "judge_pick": false}, {"question": "A student gets the histogram width on page = 5 cm by mistake (instead of 1.25 cm). What's the consequence in part (a) and beyond, and how does follow-through marking play out? (3 steps)", "answer": "- Step 1: Width error means the student divides the area by the wrong width, getting wrong height. The A-mark for height is lost.\n- Step 2: For the follow-on parts (areas and counts in subsequent questions), examiners typically apply \"ft\" (follow-through) — they accept the student's wrong width as input.\n- Step 3: BUT: if the student's wrong width is *internally inconsistent* (e.g., area on paper > total page), the examiner may reject the chain. Stay self-consistent.\n\nTakeaway: errors propagate, but ft can save M-marks; self-consistency matters.", "source": "Opus 4 ②", "_id": "opus_2_131", "judge_pick": false}, {"question": "Why is the regression intercept $$a = -42.3$$ for \"girth on length\" *not* a sensible \"girth at length 0\", and what's the right interpretation? (3 steps)", "answer": "- Step 1: $$a = -42.3$$ comes from the line passing through $$(\\bar{d}, \\bar{g})$$. It's a mathematical extrapolation to $$d = 0$$, far below any real bear length.\n- Step 2: Length 0 cm ⇒ a \"bear\" of zero length, which is meaningless. The model's behavior at $$d = 0$$ is purely algebraic, not physical.\n- Step 3: Better interpretation: $$a$$ is a **fitting parameter** that, together with the slope, defines the line for the sampled range. Don't physically interpret it.\n\nTakeaway: regression intercepts often have no physical meaning — they're algebraic by-products of the fit.", "source": "Opus 4 ②", "_id": "opus_2_132", "judge_pick": true}, {"question": "When computing $$P(C \\cap S \\cap G \\mid S \\cap G)$$, what's the structural difference from $$P(C \\mid S \\cap G)$$? (3 steps)", "answer": "- Step 1: $$P(C \\cap S \\cap G \\mid S \\cap G) = \\dfrac{P(C \\cap S \\cap G \\cap S \\cap G)}{P(S \\cap G)} = \\dfrac{P(C \\cap S \\cap G)}{P(S \\cap G)}$$ (numerator is just the triple intersection since $$S \\cap G$$ on both sides).\n- Step 2: $$P(C \\mid S \\cap G) = \\dfrac{P(C \\cap S \\cap G)}{P(S \\cap G)}$$ (since $$C \\cap (S \\cap G) = C \\cap S \\cap G$$ — the same triple).\n- Step 3: They give the *same* numerical value because $$P(C \\mid S \\cap G) = P(C \\cap S \\cap G \\mid S \\cap G)$$ — saying \"C given S∩G\" is logically equivalent to \"C∩S∩G given S∩G\" because we're already conditioning on S∩G.\n\nTakeaway: when conditioning on B, \"A\" and \"A∩B\" are the same event in the conditional space.", "source": "Opus 4 ②", "_id": "opus_2_133", "judge_pick": true}, {"question": "A common pitfall: a student computes P(C|S∩G) but writes the formula as $$P(C) \\cdot P(S \\cap G) / P(S \\cap G)$$ instead of $$P(C \\cap S \\cap G) / P(S \\cap G)$$. Why is the first wrong? (3 steps)", "answer": "- Step 1: $$P(C) \\cdot P(S \\cap G) / P(S \\cap G) = P(C)$$ — a circular reduction that just gives the unconditional P(C). It assumes independence of C with S∩G.\n- Step 2: But we don't know that C and S∩G are independent. The Venn might show $$P(C \\mid S \\cap G) \\ne P(C)$$.\n- Step 3: The correct formula uses the JOINT $$P(C \\cap S \\cap G)$$ as the numerator — which is a single Venn region (the central one), not derivable from marginals.\n\nTakeaway: conditional formula uses *joint* probabilities, not products of marginals.", "source": "Opus 4 ②", "_id": "opus_2_134", "judge_pick": true}, {"question": "Why does adding a value equal to the mean change the SD by a factor of $$\\sqrt{n/(n+1)}$$? (3 steps)", "answer": "- Step 1: $$\\sigma^2_\\text{new} = n\\sigma^2_\\text{old}/(n+1)$$ from the calculation.\n- Step 2: $$\\sigma_\\text{new} = \\sigma_\\text{old} \\cdot \\sqrt{n/(n+1)}$$.\n- Step 3: For $$n = 50$$, factor = $$\\sqrt{50/51} \\approx 0.9901$$ — small decrease (about 1%). For larger $$n$$, even smaller percentage change. The decrease is real but small.\n\nTakeaway: the decrease is real but small for large $$n$$; explanation matters more than the size.", "source": "Opus 4 ②", "_id": "opus_2_135", "judge_pick": true}, {"question": "When sketching a quick bivariate scatter for $$r \\approx 0.98$$, what does the cloud of points look like, and how does this contrast with $$r \\approx 0$$ or $$r \\approx -1$$? (3 steps)", "answer": "- Step 1: $$r \\approx 0.98$$: points cluster tightly along an imaginary upward-sloping line, with very small vertical spread. Visually, almost like a thin diagonal stripe.\n- Step 2: $$r \\approx 0$$: points form a roughly circular or formless cloud, no clear linear trend. As x changes, y is unpredictable.\n- Step 3: $$r \\approx -1$$: points cluster tightly along a downward-sloping line (large x ⇒ small y).\n+ $$|r|$$ near 1 = tightness around a line; sign = direction.\n\nTakeaway: |r| measures linear tightness; sign measures direction.", "source": "Opus 4 ②", "_id": "opus_2_136", "judge_pick": true}, {"question": "Why is the box plot whisker rule \"stop at the largest non-outlier\" (rather than at $$Q_3 + 1.5 \\cdot \\text{IQR}$$)? (3 steps)", "answer": "- Step 1: $$Q_3 + 1.5 \\cdot \\text{IQR}$$ is an *imaginary* boundary — no data is necessarily there. The whisker should reflect actual data.\n- Step 2: The largest non-outlier is the largest *observed* value still within the fence. Drawing the whisker to it shows the true extent of typical data.\n- Step 3: Outliers are then plotted as separate × markers beyond. This way, the box plot shows: typical data ≤ whisker, outliers as separate points.\n\nTakeaway: whisker tracks data, not the abstract fence.", "source": "Opus 4 ②", "_id": "opus_2_137", "judge_pick": true}, {"question": "What's the typical S1 layout for an \"interpret the gradient\" mark, and why is \"ASIA\" a useful mnemonic? (3 steps)", "answer": "- Step 1: A = \"Around\" the data: state the gradient is approximate / on average, within sampled range.\n- Step 2: S = Sign: positive (increase) or negative (decrease).\n- Step 3: I = (Independent variable's) Increase: \"for every 1 cm increase in length...\".\n+ A = (Dependent variable's) Action: \"...girth increases by 0.722 cm.\"\n\nTakeaway: ASIA = Approximate, Sign, Increase, Action. A complete sentence on all four = full marks.", "source": "Opus 4 ②", "_id": "opus_2_138", "judge_pick": true}, {"question": "When a question gives sums like $$\\Sigma x = 1456.8$$ and $$\\Sigma y = 713.2$$ for $$n = 8$$, what are $$\\bar{x}$$ and $$\\bar{y}$$? (2 steps)", "answer": "- Step 1: $$\\bar{x} = \\Sigma x / n = 1456.8 / 8 = 182.1$$.\n- Step 2: $$\\bar{y} = \\Sigma y / n = 713.2 / 8 = 89.15$$.\n\nTakeaway: divide each $$\\Sigma$$ by $$n$$ to get the mean.", "source": "Opus 4 ②", "_id": "opus_2_139", "judge_pick": false}, {"question": "A student uses $$P(C) + P(S) - P(C \\cap S)$$ to find $$P(C \\cup S)$$, but then forgets to subtract the intersection. What's the result, and why is this wrong? (3 steps)", "answer": "- Step 1: Without subtracting $$P(C \\cap S)$$, you get $$P(C) + P(S) = 0.45 + 0.60 = 1.05 > 1$$ — a probability greater than 1, impossible.\n- Step 2: This is the inclusion-exclusion fix: counting an element in both $$C$$ and $$S$$ twice in the sum, so subtract once.\n- Step 3: Without the subtraction, you've over-counted overlaps.\n\nTakeaway: $$P(C \\cup S) = P(C) + P(S) - P(C \\cap S)$$ — the −P(intersection) is essential.", "source": "Opus 4 ②", "_id": "opus_2_140", "judge_pick": false}, {"question": "Why might a student writing $$\\sigma_w^2 = 100 \\cdot \\sigma_y^2$$ correctly solve a coding problem but writing $$\\sigma_w = 10\\sigma_y + 20$$ totally fail? (3 steps)", "answer": "- Step 1: $$\\sigma_w^2 = 100 \\cdot \\sigma_y^2$$ is correct: $$\\text{Var}(10y + 20) = 10^2 \\cdot \\text{Var}(y) = 100 \\cdot \\text{Var}(y)$$. Then $$\\sigma_w = 10\\sigma_y$$ on taking square root.\n- Step 2: $$\\sigma_w = 10\\sigma_y + 20$$ is wrong: the +20 should not appear in SD (shift doesn't affect spread). This formula confuses mean (where +20 belongs) with SD.\n- Step 3: The error pattern is \"treating SD like the mean\" — applying the same linear transformation. SD has its own rule (no shift, scale only).\n\nTakeaway: SD ignores additive shifts entirely.", "source": "Opus 4 ②", "_id": "opus_2_141", "judge_pick": true}, {"question": "What's a \"shaded Venn diagram\" technique for verifying $$(C \\cup S) \\cap G'$$, and why is it foolproof? (3 steps)", "answer": "- Step 1: Draw the 3-circle Venn. Shade the union $$C \\cup S$$ (everything inside C or S — 5 regions excluding G-only and outside-region).\n- Step 2: Now intersect with $$G'$$: erase all shading INSIDE G. The remaining shaded regions are $$(C \\cup S) \\cap G'$$.\n- Step 3: Surviving shaded regions: C-only, S-only, C∩S only — three regions. (NOT C∩S∩G, NOT C∩G-only, NOT S∩G-only — these are inside G.)\n+ Sum the probabilities of these three regions.\n\nTakeaway: shade-then-erase is bulletproof for set operations on Venn diagrams.", "source": "Opus 4 ②", "_id": "opus_2_142", "judge_pick": true}, {"question": "Why does the IAL-specific \"proportion scaling to population\" question (Q6(e)) appear so frequently in S1 papers? (3 steps)", "answer": "- Step 1: It tests whether students can move between probability models (theoretical proportions) and counts (real-world populations) — a key applied skill.\n- Step 2: It's relatively standalone (one formula: count = N·P), but requires careful identification of which event the count corresponds to (a reading skill).\n- Step 3: IAL emphasises this more than domestic A-level. Since 1–3 marks per paper, mastering it is high-yield.\n\nTakeaway: proportion scaling = high-frequency, easy-to-master, high-yield.", "source": "Opus 4 ②", "_id": "opus_2_143", "judge_pick": false}, {"question": "What's a stem-and-leaf \"row-by-row\" trick for finding median/quartiles in IAL, and how does it speed up the search? (3 steps)", "answer": "- Step 1: Each row's leaf count tells you how many data values lie in that stem range. Track cumulative counts as you go down.\n- Step 2: When the cumulative count first reaches/exceeds the target position (e.g., 9 for $$Q_1$$ on $$n=35$$), the target value is in that row.\n- Step 3: Then count off within the row: e.g., if cumulative was 3 before and 12 after a row of 9 leaves, position 9 is the (9-3)=6th leaf in that row.\n+ Saves time vs. listing all values.\n\nTakeaway: cumulative row counts = fast positional search on stem-and-leaf.", "source": "Opus 4 ②", "_id": "opus_2_144", "judge_pick": false}, {"question": "Why is it crucial NOT to memorise the tutor's wrong answer of \"σ = 0.0510\" for Q5(c), even if it appeared confidently in a Loom video? (3 steps)", "answer": "- Step 1: Memorising a wrong number means you'll repeat the error on similar problems, reinforcing a bad mental shortcut.\n- Step 2: The correct answer (σ ≈ 5.10) follows from a clear, sense-checkable path: $$10/1.96 \\approx 5$$. Internalising the *method* and *sense-check* is more valuable than any one number.\n- Step 3: For redo: when you see \"P(μ−10 < T < μ+10) = 0.95\", instantly think \"k = 1.96σ, so σ = k/1.96\". That mental routine immunises against the original error.\n\nTakeaway: trust the method and sense-check, not authority — replicate Phuc's error-catch mindset.", "source": "Opus 4 ②", "_id": "opus_2_145", "judge_pick": true}, {"question": "Imagine a quick numerical check on Q6(e) intuitively: if 60% of students play Scrabble, then 40% don't. The 76 C∩G students give a population of about 290. What's a quick mental estimate of \"40% of 290\"? (3 steps)", "answer": "- Step 1: 40% of 300 ≈ 120; 40% of 290 = 40% of 300 − 40% of 10 = 120 − 4 = 116.\n- Step 2: Match with computed: 0.40 × 292.31 ≈ 116.92 ≈ 117. Within tolerance ✓.\n- Step 3: The tutor's \"47\" is way off — about ⅓ of the right answer. Even a rough mental check would have flagged this.\n\nTakeaway: 40% of ~300 ≈ 120, not 47. A quick mental sanity check catches order-of-magnitude errors.", "source": "Opus 4 ②", "_id": "opus_2_146", "judge_pick": true}, {"question": "What's the conceptual meaning of \"S1 STAR formulas\" — those NOT in the formula booklet but expected to be memorised? (3 steps)", "answer": "- Step 1: STAR = \"high-impact, low-formal-coverage\". Examples: variance computational form, coding rules for E and Var, symmetric interval trick (1.96σ), population-scaling formula.\n- Step 2: They're not in the booklet because they're considered *fundamental rearrangements* or *applied techniques* expected at the level of S1.\n- Step 3: They appear repeatedly across papers — high probability of testing. Master them all = guaranteed marks.\n\nTakeaway: STAR formulas = silent must-knows; memorise > look up.", "source": "Opus 4 ②", "_id": "opus_2_147", "judge_pick": true}, {"question": "When sense-checking a normal-distribution problem at the very end, what's a good 30-second mental routine? (3 steps)", "answer": "- Step 1: Check σ-magnitude: is σ a \"reasonable\" spread for the data? (e.g., for human times, σ in seconds; for heights, in cm).\n- Step 2: Check z-magnitudes: any |z| > 4 = re-do that step.\n- Step 3: Check probability bounds: are all probabilities in [0, 1]? Are conditional probabilities sensible (often higher than the unconditional in subset cases)?\n\nTakeaway: σ, z, P(0–1), conditional consistency — a 30-second sweep catches most arithmetic errors.", "source": "Opus 4 ②", "_id": "opus_2_148", "judge_pick": true}, {"question": "Why is \"0.40 × 292.31 = 116.92\" preferable to \"0.40 × N = (whole-number answer)\" in IAL marking? (3 steps)", "answer": "- Step 1: Showing your full unrounded intermediate (292.31) lets the examiner verify your method even if your final rounding differs.\n- Step 2: Rounding too early can introduce errors that propagate. 0.40 × 292 = 116.8, 0.40 × 293 = 117.2 — different answers.\n- Step 3: The convention: keep precise intermediates, round only the final answer to whole-number/3-s.f. as appropriate.\n\nTakeaway: precise intermediates → final round; never round mid-calculation.", "source": "Opus 4 ②", "_id": "opus_2_149", "judge_pick": true}], "count": 150}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 11023, "out_tokens": 20308, "reasoning_chars": 3745, "cost_eur": 0.076, "elapsed_s": 669, "content_chars": 61307}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 11023, "out_tokens": 18980, "reasoning_chars": 5242, "cost_eur": 0.0718, "elapsed_s": 189, "content_chars": 55543}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 11023, "out_tokens": 11639, "reasoning_chars": 11829, "cost_eur": 0.0481, "elapsed_s": 317, "content_chars": 28400}, "kimi_1": {"run": 1, "provider": "kimi", "model": "moonshotai/kimi-k2.6", "display": "Kimi K2.6", "temperature": 0.7, "in_tokens": 10809, "out_tokens": 26835, "reasoning_chars": 54045, "cost_eur": 0.1223, "elapsed_s": 1323, "content_chars": 37862}, "kimi_2": {"run": 2, "provider": "kimi", "m const SK='s1_may2024_pp';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),3500);
  fetch('https://hermes-flashcards.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
