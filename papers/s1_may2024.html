<script>
const DATA={"selected": [{"question": "Is PMCC r affected by coding (linear transformation) of the variables? Explain why or why not conceptually. (2 steps)", "answer": "- Step 1: **No — r is invariant under linear coding.** If you transform x → ax + b and y → cy + d (with a, c > 0), the correlation r doesn't change.\n- Step 2: Conceptually, r measures the **strength and direction of the linear pattern**, not the scale or location. Stretching or shifting the axes doesn't change how tightly the points cluster around a line — it only changes the line's slope and intercept. So r stays the same.\n\nNote: if a < 0 or c < 0, the sign of r flips (the pattern reverses direction), but |r| is unchanged.", "source": "GLM 5.1 ①", "_id": "glm_1_45"}, {"question": "Why must you use a strict inequality ($$S > R$$) rather than $$S \\ge R$$ when the question states \"the higher score wins\"?", "answer": "If \"higher score wins,\" a tie ($$S = R$$) means neither wins. Using $$\\ge$$ would incorrectly count ties as wins for $$S$$. In probability questions involving games, \"wins\" strictly means outscoring the opponent, so you only sum probabilities where $$S$$ is strictly greater than $$R$$.", "source": "GLM 5.1 ③", "_id": "glm_3_11"}, {"question": "For the histogram question, the class 30 ≤ x < 32 has width 2 mm and frequency 16. Its frequency density is 16/2 = 8 per mm. The reference class has density 20/4 = 5 per mm. How does this relate to the bar heights? (2 steps)", "answer": "- Step 1: Frequency density is proportional to bar height. The ratio of densities is 8/5 = 1.6, so the target bar should be 1.6 times taller than the reference bar. Reference height = 7.5 cm, so target = 7.5 × 1.6 = 12 cm. ✓\n- Step 2: However, this only works if both bars have the same width-per-mm scaling on the page. Since the target bar is narrower (1.25 cm vs 2.5 cm), the area method (area ∝ frequency) is more reliable and general.\n\nThe density shortcut works for height comparison but can mislead if you forget that area (not height) represents frequency.", "source": "GLM 5.1 ①", "_id": "glm_1_53"}, {"question": "Conceptual exercise: A 95% confidence-style interval for a normal distribution is μ ± 1.96σ. If the interval width is 20 (i.e., from μ−10 to μ+10), what is σ? Do this mentally. (2 steps)", "answer": "- Step 1: The half-width is 10, and 1.96σ = 10. So σ = 10/1.96.\n- Step 2: 1.96 ≈ 2, so σ ≈ 10/2 = 5. The exact value is 5.102, but the mental estimate of 5 is close enough for a sense-check. If you got σ = 0.05 or σ = 50, you'd know something was wrong.\n\nOrder-of-magnitude thinking: σ should be roughly half the half-width of a 95% interval. This 10-second check prevents the tutor's error.", "source": "GLM 5.1 ①", "_id": "glm_1_72"}, {"question": "A common pitfall on grouped median: a student writes $$L + \\dfrac{(n+1)/2 - F}{f} \\cdot c$$ instead of $$L + \\dfrac{n/2 - F}{f} \\cdot c$$. Why is this wrong for IAL? (3 steps)", "answer": "- Step 1: $$(n+1)/2$$ is the rule for finding the median position in **discrete raw data** in some textbooks.\n- Step 2: For **grouped (continuous)** data, IAL uses $$n/2$$ — there's no \"next position\" because we treat the data as continuous within classes.\n- Step 3: The grouped formula is a *linear interpolation*, not a positional rule on discrete observations, so the +1 is conceptually wrong.\n\nTakeaway: $$n/2$$ for grouped continuous (IAL); $$(n+1)/2$$ doesn't apply here.", "source": "Opus 4 ②", "_id": "opus_2_92"}, {"question": "Two independent spins X₁ and X₂ are made. X₁ = S (Sam's score), and R = 2X₂ − 3 (Rosie's score). Calculate P(Sam wins), meaning P(S > R). The distribution of X is {2,4,5,7,8} with probabilities {0.25,0.3,0.2,0.1,0.15}. (4 steps)", "answer": "- Step 1: Condition on X₂ value. Compute R = 2x₂ − 3 for each possible x₂.\n- Step 2: For each R value, find P(X₁ > R):\n  + x₂ = 2 → R = 1 → P(X₁ > 1) = 1 (all values) → 1 × 0.25 = 0.25\n  + x₂ = 4 → R = 5 → P(X₁ > 5) = P(7,8) = 0.1 + 0.15 = 0.25 → 0.25 × 0.3 = 0.075\n  + x₂ = 5 → R = 7 → P(X₁ > 7) = P(8) = 0.15 → 0.15 × 0.2 = 0.03\n  + x₂ = 7 → R = 11 → P(X₁ > 11) = 0 → contribution = 0\n  + x₂ = 8 → R = 13 → P(X₁ > 13) = 0 → contribution = 0\n- Step 3: Sum all contributions: 0.25 + 0.075 + 0.03 = **0.355**.\n- Step 4: This is P(S > R), using strict inequality — ties would count as neither winning.\n\n[Takeaway: When comparing independent random variables, condition on one and sum over all scenarios.]", "source": "MiniMax ①", "_id": "minimax_1_10"}, {"question": "When the question says \"estimate the number of teenagers who do NOT play Scrabble,\" why is the word \"estimate\" important? What does it tell you about the answer? (2 steps)", "answer": "- Step 1: \"Estimate\" signals that you're using a probability model (the Venn diagram proportions) to scale up to a population. The answer won't be exact because the probabilities are likely sample-based.\n- Step 2: It also means you should round to a **whole number** (since you're counting people) and you don't need to express uncertainty (no confidence interval required at S1 level). Just give the best integer estimate with a brief justification.\n\nDon't leave the answer as 116.92 — round and state that the number of people must be an integer.", "source": "GLM 5.1 ①", "_id": "glm_1_74"}, {"question": "When drawing a box plot for a dataset that contains an outlier, where does the right whisker stop, and how do you indicate the outlier on the diagram? (3 steps)", "answer": "- Step 1: The whisker on the side with the outlier stops at the **largest non-outlier value** (i.e. the largest data value still inside the upper fence). It does NOT extend to the actual maximum if that maximum is an outlier.\n- Step 2: The outlier itself is plotted as a **separate marker** beyond the whisker — typically a small × or asterisk at its actual data value (e.g. ×85).\n- Step 3: This convention visually separates \"extreme but typical\" from \"anomalous\" — readers can see at a glance both the bulk distribution and the unusual point.\n\nTakeaway: whisker = bound of typical range; outlier = isolated symbol beyond it.", "source": "Opus 4 ②", "_id": "opus_2_7"}, {"question": "Why is the box plot whisker rule \"stop at the largest non-outlier\" (rather than at $$Q_3 + 1.5 \\cdot \\text{IQR}$$)? (3 steps)", "answer": "- Step 1: $$Q_3 + 1.5 \\cdot \\text{IQR}$$ is an *imaginary* boundary — no data is necessarily there. The whisker should reflect actual data.\n- Step 2: The largest non-outlier is the largest *observed* value still within the fence. Drawing the whisker to it shows the true extent of typical data.\n- Step 3: Outliers are then plotted as separate × markers beyond. This way, the box plot shows: typical data ≤ whisker, outliers as separate points.\n\nTakeaway: whisker tracks data, not the abstract fence.", "source": "Opus 4 ②", "_id": "opus_2_137"}, {"question": "The linear interpolation formula for the grouped median is $$\\text{median} = L + \\frac{n/2 - F}{f} \\times c$$. Define each symbol and explain the intuition. (3 steps)", "answer": "- Step 1: $$L$$ = lower boundary of the median class; $$n/2$$ = the target cumulative position; $$F$$ = cumulative frequency of all classes *before* the median class; $$f$$ = frequency *within* the median class; $$c$$ = class width.\n- Step 2: The numerator $$n/2 - F$$ is how far *into* the median class the median falls (in frequency terms). Dividing by $$f$$ gives the **fraction** of the class we need to traverse.\n- Step 3: Multiplying by $$c$$ converts that fraction into data units, and adding $$L$$ offsets from the class boundary. Example: if we need 7 of 20 values into a class of width 4 starting at 32, we go $$32 + \\frac{7}{20} \\times 4 = 32 + 1.4 = 33.4$$.", "source": "GLM 5.1 ②", "_id": "glm_2_17"}, {"question": "Why should you always WRITE OUT the symmetric interval trick formula on a normal-distribution σ-finding problem, even though it's \"obvious\"? (3 steps)", "answer": "- Step 1: Writing $$\\dfrac{k}{\\sigma} = 1.96 \\Rightarrow \\sigma = \\dfrac{k}{1.96}$$ shows the examiner you know the trick — earns M-mark.\n- Step 2: Writing only \"σ = 5.10\" without the chain of reasoning may forfeit the M-mark even if the answer is correct.\n- Step 3: As a general rule for IAL: show the formula at the start of every numerical step. Examiners reward visible method.\n\nTakeaway: visible method = M-mark; numbers alone = risk forfeiture.", "source": "Opus 4 ②", "_id": "opus_2_129"}, {"question": "Conceptual exercise: Two events A and B have P(A) = 0.3, P(B) = 0.6, P(A∩B) = 0.18. Are A and B independent? How do you check? (2 steps)", "answer": "- Step 1: Check whether P(A∩B) = P(A)·P(B). Compute P(A)·P(B) = 0.3 × 0.6 = 0.18.\n- Step 2: P(A∩B) = 0.18 = P(A)·P(B). **Yes, A and B are independent.** The product rule is both necessary and sufficient for independence.\n\nNote: independence does NOT mean P(A∩B) = 0 (that would be mutual exclusivity). Independent events can co-occur — they just do so at the rate predicted by the product rule.", "source": "GLM 5.1 ①", "_id": "glm_1_59"}, {"question": "When computing the regression line $$g = a + bd$$ for \"girth on length\", which order of computation is correct, and why does $$b$$ come before $$a$$? (3 steps)", "answer": "- Step 1: $$b = S_{dg}/S_{dd}$$ — uses sums-of-products only.\n- Step 2: $$a = \\bar{g} - b\\bar{d}$$ — uses $$b$$ from step 1 plus the means.\n- Step 3: We can't compute $$a$$ until we know $$b$$, because $$a$$ is determined by forcing the line to pass through $$(\\bar{d}, \\bar{g})$$ — but the slope through that point depends on $$b$$.\n\nTakeaway: slope first (purely from sums), intercept second (forcing through means).", "source": "Opus 4 ②", "_id": "opus_2_39"}, {"question": "In the regression line $$y = a + bx$$, what is the formula for the gradient $$b$$ and intercept $$a$$? Why is it crucial not to swap the denominator in $$b$$? (2 steps)", "answer": "- Step 1: The gradient is $$b = \\frac{S_{xy}}{S_{xx}}$$ and the intercept is $$a = \\bar{y} - b\\bar{x}$$. The line minimizes the vertical (y-direction) squared distances from the data points.\n- Step 2: The denominator must be $$S_{xx}$$ because we are regressing $$y$$ on $$x$$ (predicting $$y$$ from $$x$$). Swapping to $$S_{yy}$$ would correspond to regressing $$x$$ on $$y$$, which is a completely different line unless $$r=1$$.\n\nRegression of $$y$$ on $$x$$ treats $$x$$ as the independent variable. The denominator must be the variation of the independent variable.", "source": "GLM 5.1 ③", "_id": "glm_3_18"}, {"question": "In a histogram with a reference bar for class 32 ≤ x < 36 having frequency 20 and dimensions 2.5 cm × 7.5 cm, what should be the height of the bar for class 30 ≤ x < 32 which has frequency 16 and width 2 mm? (3 steps)", "answer": "- Step 1: Reference bar area = 2.5 × 7.5 = 18.75 cm² represents 20 pebbles. Area per pebble = 18.75/20 = 0.9375 cm².\n- Step 2: Target class area required = 16 × 0.9375 = 15 cm². Width on page = (2/4) × 2.5 = 1.25 cm (since 4 mm on number line = 2.5 cm on page).\n- Step 3: Height = Area/Width = 15/1.25 = **12 cm**.\n\n[Takeaway: In histograms, AREA represents frequency — not height. Use area proportions to determine dimensions.]", "source": "MiniMax ①", "_id": "minimax_1_11"}, {"question": "In probability, if A ⊂ B (A is a subset of B), what is P(A | B)? What is the common error students make? (misconception probe)", "answer": "- If A ⊂ B, then A ∩ B = A, so P(A | B) = P(A)/P(B).\n- Students commonly make the error of calculating P(A | B) = P(A) × P(B), which is the formula for P(A ∩ B) when A and B are independent — NOT when one is a subset of the other.\n- In Q5(c), the event T > μ − 5 is a subset of T > μ − 10, so P(T > μ − 5 | T > μ − 10) = P(T > μ − 5)/P(T > μ − 10).\n\n[Takeaway: Subset ≠ independent. Don't confuse P(A|B) = P(A∩B)/P(B) with P(A∩B) = P(A)P(B).]", "source": "MiniMax ①", "_id": "minimax_1_39"}, {"question": "When reading a 3-circle Venn for $$P(C \\cap S \\cap G)$$, what's the geometric region you're looking at, and how does it differ from $$P(C \\cap S)$$? (3 steps)", "answer": "- Step 1: $$P(C \\cap S \\cap G)$$ = the central region where ALL three circles overlap — a single \"wedge\" in the diagram.\n- Step 2: $$P(C \\cap S)$$ = the region inside BOTH C and S, which is the union of (C∩S only) and (C∩S∩G) — two wedges.\n- Step 3: The central wedge is part of $$P(C \\cap S)$$ (it's inside both C and S), but $$P(C \\cap S)$$ is larger because it includes the part of C∩S that's outside G as well.\n\nTakeaway: triple intersection is the smallest region; pairwise intersections include the triple plus the \"outside-third\" wedge.", "source": "Opus 4 ②", "_id": "opus_2_93"}, {"question": "List the 5 fundamental probability rules used in S1 (other than independence and conditioning). (5 steps)", "answer": "- Step 1: $$0 \\leq P(A) \\leq 1$$ for any event A.\n- Step 2: P(certain) = 1; P(impossible) = 0.\n- Step 3: $$P(A') = 1 - P(A)$$ — complement rule.\n- Step 4: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$ — inclusion-exclusion.\n- Step 5: For mutually exclusive A, B: $$P(A \\cup B) = P(A) + P(B)$$.\n\nTakeaway: Five rules suffice for most S1 probability problems.", "source": "Opus 4 ①", "_id": "opus_1_63"}, {"question": "In Q6, the Venn diagram has G only = 0. What does this tell you about the region \"plays Go but not Chess or Scrabble\"? How does this affect probability calculations? (interpretation)", "answer": "- G only = 0 means no teenager plays ONLY Go — everyone who plays Go also plays at least one of Chess or Scrabble.\n- This simplifies P(G) = P(C∩G only) + P(C∩S∩G) + P(S∩G only) = p + 0.12 + 0.1.\n- It also means when calculating complements or \"not G\" regions, you don't need to account for a G-only region.\n\n[Takeaway: Zero in a Venn region means that region contributes nothing to that event's probability.]", "source": "MiniMax ①", "_id": "minimax_1_43"}, {"question": "State the symmetric interval trick for the normal distribution, and the two key z-values to memorise. (3 steps)", "answer": "- Step 1: $$P(\\mu - k < X < \\mu + k) = 0.95 \\Leftrightarrow k = 1.96\\sigma$$.\n- Step 2: $$P(\\mu - k < X < \\mu + k) = 0.99 \\Leftrightarrow k = 2.5758\\sigma$$.\n- Step 3: NB: not in the formula booklet (the percentage points table IS in the booklet, but the trick of \"use it for symmetric intervals\" must be recognised by the student).\n\nTakeaway: 95% symmetric ⇔ 1.96 SDs each side; 99% symmetric ⇔ 2.5758 SDs each side.", "source": "Opus 4 ②", "_id": "opus_2_69"}, {"question": "Original data has min = 25, Q₁ = 36, median = 45, Q₃ = 54, max = 80. You add four values: 27, a, 48, 2a. The box plot must remain unchanged. Explain why this requires satisfying MULTIPLE constraints simultaneously, and why stopping at one constraint is wrong. (3 steps)", "answer": "- Step 1: \"Box plot unchanged\" means ALL five summary statistics (min, Q₁, median, Q₃, max) must be the same. Each one imposes a constraint on a. For example: max ≤ 80 means 2a ≤ 80, so a ≤ 40.\n- Step 2: Q₁ must stay at 36. With new n = 36, Q₁ is the average of the 9th and 10th values. If both 27 and a are below 36, then Q₁ shifts down. So at most one new value can be below 36 — only 27 qualifies, meaning a ≥ 36.\n- Step 3: You must also check the median constraint (new 18th and 19th values must average to 45) and Q₃ constraint. The final answer is the **intersection** of all constraints: 36 ≤ a ≤ 40.\n\nCommon pitfall: finding a ≤ 40 from the max constraint and stopping. Each constraint narrows the range — you need them ALL.", "source": "GLM 5.1 ①", "_id": "glm_1_7"}, {"question": "A common student mistake on Q1(c) of this paper: showing only the *upper* fence (and one outlier above it) and forgetting to verify there are no *lower* outliers. Why does this lose marks? (3 steps)", "answer": "- Step 1: The question asks \"show that there is **exactly one** outlier\" — so you must verify both directions (no low outliers AND exactly one high outlier).\n- Step 2: Showing only the upper fence proves \"at most one high outlier\" but doesn't rule out low outliers.\n- Step 3: Mark scheme typically requires both fences to be stated and a comparison to data on both ends. Either omission ⇒ partial credit only.\n\nTakeaway: \"exactly one\" outlier ⇒ check BOTH fences and confirm no low outliers exist.", "source": "Opus 4 ②", "_id": "opus_2_95"}, {"question": "A dataset has mean μ and n values. A new value equal to μ is added. What happens to (i) the mean, (ii) the standard deviation? Explain. (4 steps)", "answer": "- Step 1: **Mean**: New sum = nμ + μ = (n+1)μ. New count = n+1. New mean = (n+1)μ/(n+1) = μ. **Unchanged**.\n- Step 2: **SD**: variance numerator $$\\sum (x_i - \\mu)^2$$. New value contributes $$(\\mu - \\mu)^2 = 0$$ → numerator unchanged.\n- Step 3: But denominator grew from n to n+1. New variance = $$n\\sigma^2/(n+1) < \\sigma^2$$ → SD strictly **decreases**.\n- Step 4: Conceptual: adding a value AT the mean doesn't change the centre of gravity, but tightens average squared deviation by diluting spread over more data.\n\nTakeaway: Add value = mean → mean unchanged, SD decreases.", "source": "Opus 4 ①", "_id": "opus_1_25"}, {"question": "What does the Product Moment Correlation Coefficient (PMCC, $$r$$) measure, and how is it calculated from $$S$$-statistics?", "answer": "The PMCC $$r$$ measures the strength and direction of the **linear** correlation between two variables. It is calculated as $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} S_{yy}}}$$. The numerator captures how they vary together, and the denominator scales this co-variation relative to how much each variable varies individually, ensuring $$r$$ always falls between $$-1$$ and $$1$$.", "source": "GLM 5.1 ③", "_id": "glm_3_17"}, {"question": "Why does the variance use the SQUARE of the scale factor (b²) but SD uses the ABSOLUTE value (|b|)? What if b is negative? (4 steps)", "answer": "- Step 1: Variance has units of X², so a multiplicative scaling by b is \"felt twice\" → b².\n- Step 2: SD has units of X (same as variable), so it scales by |b|.\n- Step 3: Negative b: variance gets b² ≥ 0 automatically (square kills sign). SD uses |b| because SD must be non-negative.\n- Step 4: This is why the formula is $$\\sigma_x = |b| \\sigma_y$$, not $$b \\sigma_y$$ — sign is irrelevant to spread.\n\nTakeaway: Spread is sign-agnostic; scale by |b| for SD, b² for variance.", "source": "Opus 4 ①", "_id": "opus_1_69"}, {"question": "Compute P(C | S∩G) from the Venn diagram. Explain the conditional probability formula and identify the numerator and denominator carefully. (3 steps)", "answer": "- Step 1: P(C | S∩G) = P(C ∩ S ∩ G) / P(S ∩ G). The denominator is the probability of the \"given\" event (S∩G), and the numerator is the intersection of both events.\n- Step 2: P(S∩G) = all regions inside both S and G = C∩S∩G (0.12) + S∩G-only (0.10) = 0.22. P(C∩S∩G) = 0.12.\n- Step 3: P(C | S∩G) = 0.12/0.22 = 6/11 ≈ **0.545**. Given that a teenager plays both Scrabble and Go, there's about a 54.5% chance they also play Chess.\n\nThe denominator is P(S∩G), NOT P(S)·P(G). You're conditioning on the intersection, not on independent events.", "source": "GLM 5.1 ①", "_id": "glm_1_41"}, {"question": "For grouped data with cumulative frequencies (2, 18, 38, 46, 49, 50) over class boundaries 20, 30, 32, 36, 40, 45, 50, find the median by linear interpolation. (4 steps)", "answer": "- Step 1: Position $$n/2 = 25$$ (NOT (n+1)/2 — that's for ungrouped data).\n- Step 2: Locate median class: 25 falls between cum freqs 18 and 38 → median class is [32, 36).\n- Step 3: Apply formula: $$\\text{median} = L + \\frac{n/2 - F}{f} \\cdot c$$ with L = 32, F = 18, f = 20, c = 4.\n- Step 4: $$\\text{median} = 32 + \\frac{25 - 18}{20} \\cdot 4 = 32 + 1.4 = 33.4$$ mm.\n\nTakeaway: Linear interpolation assumes uniform distribution within the median class.", "source": "Opus 4 ①", "_id": "opus_1_22"}, {"question": "A coding equation is given as 10y = w − 20, where w is weight in grams and y is the coded variable. Rewrite this as w in terms of y, then state how to decode the mean and the standard deviation. (3 steps)", "answer": "- Step 1: Rearrange: w = 10y + 20. This is of the form w = by + a with b = 10, a = 20.\n- Step 2: Mean: $$\\bar{w} = b\\bar{y} + a = 10\\bar{y} + 20$$. If ȳ = 2.08, then w̄ = 10(2.08) + 20 = 40.8.\n- Step 3: Standard deviation: $$\\sigma_w = |b| \\cdot \\sigma_y = 10\\sigma_y$$. The \"+20\" shift does NOT affect the standard deviation. If σ_y = 0.5869, then σ_w = 5.869 ≈ 5.87.\n\nCritical error to avoid: writing σ_w = 10σ_y + 20. The shift affects the mean but NOT the spread.", "source": "GLM 5.1 ①", "_id": "glm_1_21"}, {"question": "Cross-topic insight: coding appears in Q2 (DRV: Y = aX − b) and Q3 (data: 10y = w − 20). State the universal coding rules for mean, variance, and SD that apply to BOTH contexts. (2 steps)", "answer": "- Step 1: If y = (x − a)/b (equivalently x = by + a), then: x̄ = bȳ + a, Var(x) = b²Var(y), σ_x = |b|σ_y. These rules apply whether x is a random variable or a dataset.\n- Step 2: The shift (a) affects only the mean; the scale (b) affects both mean and spread. Variance scales by b² (because it involves squaring), while SD scales by |b|. The +b or −b in the coding equation NEVER affects variance or SD.\n\nThese rules are NOT in the formula booklet — they must be memorised and practised in both DRV and data contexts.", "source": "GLM 5.1 ①", "_id": "glm_1_68"}, {"question": "In a three-circle Venn diagram for Chess (C), Scrabble (S), Go (G), given C only = 0.04, C∩S only = 0.15, G only = 0, C∩G only = p, C∩S∩G = 0.12, S∩G only = 0.1, S only = 0.23, outside = q, and C and S are independent, find p. (4 steps)", "answer": "- Step 1: Sum to 1: 0.04 + p + 0 + 0.15 + 0.12 + 0.1 + 0.23 + q = 1 ⇒ p + q = 0.36. (★)\n- Step 2: Find P(C) = C only + C∩S only + C∩G only + C∩S∩G = 0.04 + 0.15 + p + 0.12 = 0.31 + p.\n- Step 3: Find P(S) = 0.15 + 0.12 + 0.1 + 0.23 = 0.60. Find P(C∩S) = C∩S only + C∩S∩G = 0.15 + 0.12 = 0.27.\n- Step 4: Independence: P(C∩S) = P(C)P(S) ⇒ 0.27 = (0.31 + p)(0.60) ⇒ 0.31 + p = 0.45 ⇒ **p = 0.14**.\n\n[Takeaway: For independence, P(A ∩ B) = P(A) × P(B). Don't confuse with P(A) + P(B).]", "source": "MiniMax ①", "_id": "minimax_1_27"}, {"question": "When solving $$P(aX + b > c)$$ for a discrete random variable $$X$$, what is the crucial first algebraic step before you can sum probabilities?", "answer": "You must rearrange the inequality to isolate $$X$$. For $$2X - 3 > 5$$, add 3 to get $$2X > 8$$, then divide by 2 to get $$X > 4$$. Only then can you identify which values of $$X$$ satisfy the condition and sum their probabilities. Skipping the rearrangement leads to testing the wrong values.", "source": "GLM 5.1 ③", "_id": "glm_3_6"}, {"question": "Suppose a question asks: \"are P(A) = 0.5, P(B) = 0.5, P(A∩B) = 0.30 mutually exclusive? Independent?\" Walk through the dual check. (3 steps)", "answer": "- Step 1: Mutually exclusive ⇔ $$P(A \\cap B) = 0$$. Here it's 0.30, so NOT mutually exclusive.\n- Step 2: Independent ⇔ $$P(A \\cap B) = P(A) \\cdot P(B) = 0.5 \\times 0.5 = 0.25$$. Here it's 0.30, so NOT independent (0.30 ≠ 0.25).\n- Step 3: Two distinct numerical tests; the events are neither in this case.\n+ Note: ME (P(A∩B)=0) and Independence (P(A∩B)=P(A)P(B)) can only both hold if at least one event has probability 0.\n\nTakeaway: ME and Independence are different — test each separately with their own formulas.", "source": "Opus 4 ②", "_id": "opus_2_122"}, {"question": "If $$Var(X) = 4.14$$ and $$Y = 4X - 5$$, what is $$Var(Y)$$? (Simple mental math exercise) (2 steps)", "answer": "- Step 1: Identify the scaling factor $$a = 4$$ and the shift $$b = -5$$.\n- Step 2: Apply the variance coding rule: $$Var(Y) = a^2 Var(X)$$. The shift $$b$$ is ignored. $$Var(Y) = 4^2 \\times 4.14 = 16 \\times 4.14 = 66.24$$.\n\nShifts change location but not spread; multipliers scale spread, and squaring the multiplier scales variance.", "source": "GLM 5.1 ③", "_id": "glm_3_9"}, {"question": "How to find the missing value `k` in the back-to-back stem-and-leaf plot for Maple seedlings’ median? (3 steps)", "answer": "- Step 1: **Identify median position** for Maple (n=32): (16th + 17th)/2 = 45 cm.  \n- Step 2: **Locate 16th and 17th values** in Maple’s cumulative frequencies: 16th = 40 + k, 17th = 47.  \n- Step 3: **Set up median equation**: (40 + k + 47)/2 = 45 ⇒ **k = 3**.  \n  + Key: Use the stem-and-leaf key to decode values (e.g., `4|1 1 1 k 7 8` ⇒ 41, 41, 41, 40 + k, 47, 48).  \n\n**Takeaway:** Always use cumulative frequencies and the median formula for discrete data.", "source": "Qwen 3 ①", "_id": "qwen_1_0"}, {"question": "For $$X \\sim N(15, 2^2)$$ and $$P(X < t) = 0.6$$, walk through finding $$t$$ using the inverse normal. (3 steps)", "answer": "- Step 1: Find $$z$$ such that $$P(Z < z) = 0.6$$. From z-tables (or percentage points): $$z \\approx 0.2533$$.\n- Step 2: De-standardise: $$t = \\mu + z\\sigma = 15 + 0.2533(2) = 15 + 0.5067 \\approx 15.5$$ min (3 s.f.).\n- Step 3: Sanity check: $$t > \\mu = 15$$ because we're past the mean (60% < 50% ⇒ above the median); ✓.\n\nTakeaway: inverse normal → z → de-standardise to original units.", "source": "Opus 4 ②", "_id": "opus_2_47"}, {"question": "For grouped data, the class $$32 \\leq x < 36$$ has frequency 20 and the cumulative frequency before it is 18. The total is $$n = 50$$. Show why the median falls in this class. (2 steps)", "answer": "- Step 1: The median position is $$n/2 = 25$$. We need the 25th value.\n- Step 2: The cumulative frequency reaches 18 before this class and 38 after it. Since $$18 < 25 \\leq 38$$, the 25th value lies within the class $$32 \\leq x < 36$$. If the median position were ≤ 18, we'd look in an earlier class.", "source": "GLM 5.1 ②", "_id": "glm_2_64"}, {"question": "A question gives you $$S_{dd} = 16\\,769.78$$, $$S_{dg} = 12\\,105.12$$, and $$S_{gg} = 9\\,094.20$$. Verify that the PMCC $$r = 0.980$$ makes directional sense — what sign should $$r$$ have and why? (2 steps)", "answer": "- Step 1: $$r = \\frac{S_{dg}}{\\sqrt{S_{dd} \\cdot S_{gg}}}$$. Since $$S_{dg} = 12\\,105.12 > 0$$, and the denominator (a square root) is always positive, $$r$$ must be **positive**.\n- Step 2: A positive $$r$$ means longer bears tend to have larger girths — biologically sensible. If you computed a negative $$r$$, you likely swapped the numerator or made a sign error in $$S_{dg}$$. Always sense-check: does the sign match the expected direction of the relationship?", "source": "GLM 5.1 ②", "_id": "glm_2_66"}, {"question": "For a DRV $$X$$ with $$E(X) = 4.6$$ and $$E(X^2) = 25.3$$, conceptually how do you obtain $$\\text{Var}(X)$$, and why is the computational form preferred over $$E[(X - \\mu)^2]$$? (3 steps)", "answer": "- Step 1: $$\\text{Var}(X) = E(X^2) - [E(X)]^2 = 25.3 - (4.6)^2 = 25.3 - 21.16 = 4.14$$.\n- Step 2: The \"raw\" form $$E[(X-\\mu)^2] = \\sum (x_i - \\mu)^2 P(X=x_i)$$ requires subtracting $$\\mu$$ from every value, squaring, then weighting — much more arithmetic.\n- Step 3: The computational form trades subtractions inside the sum for one final subtraction at the end. Algebraically identical, but with fewer arithmetic errors. (S1 booklet does NOT include this — must memorise.)\n\nTakeaway: computational form = same answer, fewer errors; not in formula booklet.", "source": "Opus 4 ②", "_id": "opus_2_18"}, {"question": "What is the computational formula for variance (the \"S1 STAR formula\"), and why is it preferred over the definition formula $$\\frac{\\Sigma(x-\\bar{x})^2}{n}$$? (2 steps)", "answer": "- Step 1: The computational formula is $$\\sigma^2 = \\frac{\\Sigma x^2}{n} - \\bar{x}^2$$ (or $$\\frac{\\Sigma f x^2}{\\Sigma f} - \\bar{x}^2$$ for frequency data).\n- Step 2: It is preferred because it uses raw sums ($$\\Sigma x^2$$ and $$\\bar{x}$$) rather than requiring you to calculate the deviation $$(x - \\bar{x})$$ for every single data point first. It is much faster and less prone to rounding errors.\n\nRemember: Variance = \"Mean of the squares minus the square of the mean.\"", "source": "GLM 5.1 ③", "_id": "glm_3_30"}, {"question": "In a 3-circle Venn diagram (C, S, G), the region \"C but not G\" includes which sub-regions? What common mistake do students make? (2 steps)", "answer": "- Step 1: \"C but not G\" = all parts of circle C that are outside circle G. This includes: C-only (0.04) + C∩S only, not G (0.15) = **0.19**.\n- Step 2: The common mistake is including C∩G only or C∩S∩G — but these are inside G, and the question says \"not G.\" Read \"but not G\" as excluding anything that touches the G circle.\n\nAlways shade the Venn diagram: highlight all of C, then erase anything overlapping with G.", "source": "GLM 5.1 ①", "_id": "glm_1_37"}, {"question": "On a histogram, what quantity is proportional to frequency — the height of a bar, or the area of a bar? Explain why this distinction matters. (2 steps)", "answer": "- Step 1: **Area** is proportional to frequency, not height. This is because class widths can differ; a tall, narrow bar might represent fewer values than a shorter, wide bar.\n- Step 2: If all classes had equal width, height would work as a proxy. But with unequal widths (e.g., one class spanning 2 mm and another spanning 4 mm), using height alone would over-represent the wider class. Area = width × height correctly accounts for both dimensions.", "source": "GLM 5.1 ②", "_id": "glm_2_13"}, {"question": "Why is **range** (Σx − Σy)/n inappropriate for measuring \"spread\" if we want to compare two distributions, when SD is more robust? (3 steps)", "answer": "- Step 1: Range = $$\\max - \\min$$. It's based on only 2 data points (the most extreme).\n- Step 2: A single outlier can blow up the range while leaving the bulk of the distribution unchanged. In contrast, SD averages over all deviations.\n- Step 3: For comparing distributions, SD (or IQR) is more representative of typical spread; range is only a quick sketch and may mislead.\n\nTakeaway: SD/IQR average over data; range depends only on extremes.", "source": "Opus 4 ②", "_id": "opus_2_89"}, {"question": "A common pitfall: a student computes P(C|S∩G) but writes the formula as $$P(C) \\cdot P(S \\cap G) / P(S \\cap G)$$ instead of $$P(C \\cap S \\cap G) / P(S \\cap G)$$. Why is the first wrong? (3 steps)", "answer": "- Step 1: $$P(C) \\cdot P(S \\cap G) / P(S \\cap G) = P(C)$$ — a circular reduction that just gives the unconditional P(C). It assumes independence of C with S∩G.\n- Step 2: But we don't know that C and S∩G are independent. The Venn might show $$P(C \\mid S \\cap G) \\ne P(C)$$.\n- Step 3: The correct formula uses the JOINT $$P(C \\cap S \\cap G)$$ as the numerator — which is a single Venn region (the central one), not derivable from marginals.\n\nTakeaway: conditional formula uses *joint* probabilities, not products of marginals.", "source": "Opus 4 ②", "_id": "opus_2_134"}, {"question": "When asked to \"show that\" a value (e.g., Var(X) = 4.14), what must you include in your working that you might skip if just \"finding\" the answer? (2 steps)", "answer": "- Step 1: \"Show that\" questions require **full method visible**: you must show the formula used, the substitution, and the computation leading to the exact stated value. Skipping steps loses method marks even if the answer is correct.\n- Step 2: For Var(X) = 4.14: show E(X²) = Σx²·P(X=x) with the full sum (1 + 4.8 + 5 + 4.9 + 9.6 = 25.3), then Var(X) = 25.3 − 4.6² = 25.3 − 21.16 = 4.14. Each step earns a method mark.\n\n\"Show that\" = prove it to the examiner. \"Find\" = just get the answer. The distinction matters for mark allocation.", "source": "GLM 5.1 ①", "_id": "glm_1_50"}, {"question": "What is the outlier detection rule using the interquartile range, and how do you apply it to identify outliers in the Birch seedling heights where Q₁ = 39, Q₃ = 57? (2 marks)", "answer": "- Step 1: Calculate IQR = Q₃ − Q₁ = 57 − 39 = 18.\n- Step 2: Compute the fences — lower fence = Q₁ − 1.5×IQR = 39 − 27 = 12; upper fence = Q₃ + 1.5×IQR = 57 + 27 = 84.\n- Step 3: Check data points — any value below 12 or above 84 is an outlier. The minimum Birch value is 28 (> 12), and only 85 exceeds 84, so **exactly one outlier: 85 cm**.\n\n[Takeaway: The 1.5×IQR rule is standard; always state the fences before identifying outliers.]", "source": "MiniMax ①", "_id": "minimax_1_0"}, {"question": "For regression $$g = -42.3 + 0.722d$$, estimate g when d = 2.5 m. (3 steps)", "answer": "- Step 1: **Convert units!** d = 2.5 m = 250 cm (the model uses cm for d).\n- Step 2: Substitute: $$g = -42.3 + 0.722 \\times 250 = -42.3 + 180.5 = 138.2$$ cm.\n- Step 3: Sense check: 250 cm is within typical bear length, so this is interpolation (reliable).\n\nTakeaway: ALWAYS check units before substituting; forgetting m→cm gives a ridiculous answer.", "source": "Opus 4 ①", "_id": "opus_1_34"}, {"question": "In a Venn diagram problem, you're told three events C, S, G and given various region probabilities plus an unknown $$p$$ and $$q$$. What is always the first equation you should write, and why? (2 steps)", "answer": "- Step 1: Write the **sum-to-1 equation**: all regions (including outside) must sum to 1. This gives a relationship between the unknowns.\n- Step 2: In the bears problem, this gave $$0.04 + p + 0 + 0.15 + 0.12 + 0.1 + 0.23 + q = 1$$, simplifying to $$p + q = 0.36$$. This equation is essential — without it, you have two unknowns and only one independence equation, which is insufficient to solve for both $$p$$ and $$q$$.", "source": "GLM 5.1 ②", "_id": "glm_2_45"}, {"question": "Why is Fuat’s answer for Q6(e) (47 students) incorrect, and how to fix it? (3 steps)", "answer": "- Step 1: **Fuat’s error**: He calculated P(S′) as 0.18 (only G-only and outside regions) but ignored S-only and C∩S-only.  \n- Step 2: **Correct P(S′)** = 1 − P(S) = 1 − 0.60 = 0.40.  \n- Step 3: **Scale to population**:  \n  + P(C∩G) = 0.26 (from C∩G only + C∩S∩G).  \n  + N = 76 / 0.26 ≈ 292.3.  \n  + # S′ = 292.3 × 0.40 ≈ **117 students**.  \n  + Alternative approach gives ~105 if scaling differently.  \n\n**Takeaway:** Use the complement rule for P(S′); avoid missing regions in Venn diagrams.", "source": "Qwen 3 ①", "_id": "qwen_1_3"}, {"question": "Why are quartiles in stem-and-leaf plots calculated using *n*/4 and rounding up instead of (n+1)/4?", "answer": "Edexcel IAL S1 specifies using *n*/4 for quartiles, not (n+1)/4. For 35 Birch seedlings:  \n- Q₁ position = 35/4 = 8.75 → round up to 9th value (39 cm).  \n- Q₃ position = 3×35/4 = 26.25 → round up to 27th value (57 cm).  \n**Contrast**: Domestic A-level often uses (n+1)/4, but IAL strictly requires *n*/4.", "source": "Qwen 3 ②", "_id": "qwen_2_1"}, {"question": "Why does the regression line always pass through the point (x̄, ȳ)? What is the significance of this? (conceptual)", "answer": "The regression line is fitted by minimising the sum of squared residuals (least squares). The mathematical solution forces the line through the point of means (x̄, ȳ) because this is where the sum of deviations in x and y are zero. This is a property of OLS (ordinary least squares) regression — it ensures the line is centered on the data cloud.\n\n[Takeaway: Always verify by substituting x̄ and ȳ into your regression equation — you should get ȳ.]", "source": "MiniMax ①", "_id": "minimax_1_34"}, {"question": "Why is $$P(B \\cap A) = P(A)$$ a really useful trick when computing $$P(A \\mid B)$$ for cases like \"T > μ−5 given T > μ−10\"? (3 steps)", "answer": "- Step 1: Naively, you'd need to compute $$P(\\mu-5 < T < \\mu+\\infty \\text{ AND } \\mu-10 < T < \\mu+\\infty)$$ = $$P(\\mu-5 < T)$$ since the more-restrictive bound dominates.\n- Step 2: Recognising $$\\{T > \\mu-5\\} \\subset \\{T > \\mu-10\\}$$ immediately tells you the intersection collapses: $$P(A \\cap B) = P(A) = P(T > \\mu-5)$$.\n- Step 3: Saves two probability calculations — you only compute one tail probability and then divide.\n\nTakeaway: subset trick = one tail probability + one division, instead of two probabilities + recombining.", "source": "Opus 4 ②", "_id": "opus_2_103"}, {"question": "Why is computing $$P(S')$$ via $$1 - P(S)$$ safer than summing the non-S Venn regions directly? (3 steps)", "answer": "- Step 1: $$P(S') = 1 - P(S)$$ — one step, given P(S) is already computed.\n- Step 2: Summing non-S regions requires correctly identifying ALL regions outside S (C only, C ∩ G only, G only, outside) — easy to forget G-only or the outside region.\n- Step 3: In Q6(e), the tutor's error was forgetting some non-S regions and getting $$P(S') \\approx 0.18$$ instead of the correct 0.40 from $$1 - 0.60$$.\n\nTakeaway: For \"not in X\" questions, prefer the complement; cross-check by summing regions only as a backup.", "source": "Opus 4 ①", "_id": "opus_1_52"}, {"question": "For $$T \\sim N(\\mu, 5.10^2)$$, conceptually walk through finding $$P(T > \\mu - 5)$$. (4 steps)", "answer": "- Step 1: Standardise the bound: $$z = \\dfrac{(\\mu - 5) - \\mu}{\\sigma} = \\dfrac{-5}{5.10} \\approx -0.98$$.\n- Step 2: $$P(T > \\mu - 5) = P(Z > -0.98)$$.\n- Step 3: By symmetry of the standard normal: $$P(Z > -0.98) = P(Z < 0.98) \\approx 0.8365$$.\n- Step 4: Interpretation: about 83.65% of the distribution is above $$\\mu - 5$$ (which makes sense — being above 1 SD below the mean covers most of the distribution).\n\nTakeaway: $$P(Z > -a) = P(Z < a)$$ by symmetry — saves a table lookup.", "source": "Opus 4 ②", "_id": "opus_2_51"}, {"question": "Given E(X) = 4.6 and E(X²) = 25.3, compute Var(X). Then explain conceptually why Var(X) can never be negative. (2 steps)", "answer": "- Step 1: Var(X) = E(X²) − [E(X)]² = 25.3 − (4.6)² = 25.3 − 21.16 = **4.14**.\n- Step 2: Var(X) = E[(X − μ)²] — it's the expected value of a squared quantity. Since squares are always ≥ 0, their weighted average (expectation) is also ≥ 0. Variance is zero only when every value equals the mean.\n\nThis is why the computational form (E(X²) − μ²) must always give a non-negative result — it's mathematically identical to the definition.", "source": "GLM 5.1 ①", "_id": "glm_1_11"}, {"question": "When comparing two distributions on a box-plot question, what two aspects must you comment on, and what must every comparison include for full marks? (2 steps)", "answer": "- Step 1: You must compare **location** (median or mean) and **spread** (IQR or range). A one-aspect answer loses the mark.\n- Step 2: Every comparison MUST include: (a) a **specific statistic** (e.g., \"median 48 vs 45\"), (b) **context** (e.g., \"Birch seedlings grow taller\"), and (c) a **directional statement** (e.g., \"Birch median is higher\"). Saying \"they are different\" with no statistic = B0.\n\nExample of a full-mark answer: \"Birch median (48 cm) is greater than Maple median (45 cm), so Birch seedlings grow taller on average.\"", "source": "GLM 5.1 ①", "_id": "glm_1_6"}, {"question": "For data with $$S_{dg} = 12{,}105.12$$, $$S_{dd} = 16{,}769.78$$, $$S_{gg} = 9{,}094.20$$, what is r structurally (without exact arithmetic)? (3 steps)", "answer": "- Step 1: $$r = S_{dg}/\\sqrt{S_{dd} \\cdot S_{gg}}$$.\n- Step 2: Denominator order: $$\\sqrt{16{,}770 \\times 9{,}094} \\approx \\sqrt{1.5 \\times 10^8} \\approx 1.23 \\times 10^4 \\approx 12{,}350$$.\n- Step 3: $$r \\approx 12{,}105/12{,}350 \\approx 0.98$$ — very strong positive correlation. ✓ within [−1, 1].\n\nTakeaway: After plugging in, ALWAYS verify $$r \\in [-1, 1]$$ and read off the strength.", "source": "Opus 4 ①", "_id": "opus_1_29"}, {"question": "In the box plot question, if a = 35 in Q1(f), would the box plot remain unchanged? What constraint is violated? (edge case)", "answer": "- If a = 35, then the four new values are 27, 35, 48, 70.\n- Q₁ = 36 (original 9th/10th average). With 27 below 36, there are now TWO values below 36, so Q₁ would change from 36 to somewhere between 27 and 36.\n- Therefore, the box plot would NOT remain unchanged.\n- The constraint violated is: Q₁ must equal 36, meaning only ONE value can be below 36 (the 27). Thus a ≥ 36 is required.\n\n[Takeaway: Check ALL five-number summary constraints when adding data points.]", "source": "MiniMax ①", "_id": "minimax_1_46"}, {"question": "A regression line has gradient $$b = 0.722$$ (girth-cm per length-cm). A separate study finds gaining x cm of length is associated with 17.3 cm increase in girth. Find x. (3 steps)", "answer": "- Step 1: From the slope: $$\\Delta g = b \\cdot \\Delta d$$. Given Δg = 17.3: $$0.722 \\cdot x = 17.3$$.\n- Step 2: Solve: $$x = 17.3 / 0.722 \\approx 23.96$$ cm.\n- Step 3: Use unrounded b for chained calculations: with $$b = 0.72184$$, $$x = 23.97$$. Mark scheme typically accepts both.\n\nTakeaway: Inverting the slope: $$x = \\Delta y / b$$.", "source": "Opus 4 ①", "_id": "opus_1_36"}, {"question": "What's the philosophical reason that \"+b\" disappears from the variance of $$aX + b$$ but not from the expectation of $$aX + b$$? (3 steps)", "answer": "- Step 1: Expectation tracks the *centre* of the distribution. Shifting all values by $$b$$ shifts the centre by $$b$$ too — it's an absolute reference point that depends on origin.\n- Step 2: Variance tracks *spread around the centre* — relative distances. Shifting all values by the same $$b$$ doesn't change relative distances; the spread is invariant under translation.\n- Step 3: Algebraically: $$X - E(X)$$ becomes $$(aX + b) - (aE(X) + b) = a(X - E(X))$$ — the $$b$$ cancels in the deviation.\n\nTakeaway: mean is *positional* (feels shifts); variance is *relational* (ignores shifts).", "source": "Opus 4 ②", "_id": "opus_2_75"}, {"question": "For Edexcel IAL, the lower quartile position is found using $$n/4$$. What happens when $$n/4$$ is a non-integer, vs when it is an integer? (3 steps)", "answer": "- Step 1: Compute $$n/4$$. If the result is **not an integer** (e.g., $$n=35$$, position = 8.75), you **round UP** to the next integer (position 9) and take that single value.\n- Step 2: If the result **is an integer** (e.g., $$n=36$$, position = 9), you take the **average of the value at position 9 and position 10**.\n+ This is the same rule as finding the median at position $$n/2$$: integer → average; non-integer → round up.\n- Step 3: The key trap: IAL uses $$n/4$$, NOT $$(n+1)/4$$. Domestic A-level may use different conventions — always follow the IAL rule on IAL papers.", "source": "GLM 5.1 ②", "_id": "glm_2_2"}, {"question": "If Y = aX − b where a, b > 0, with E(Y) = 13.4 and Var(Y) = 66.24, and given Var(X) = 4.14, find the values of a and b. (4 steps)", "answer": "- Step 1: Use variance transformation: Var(Y) = a²·Var(X) ⇒ 66.24 = a²(4.14) ⇒ a² = 16 ⇒ **a = 4** (positive).\n- Step 2: Use expectation transformation: E(Y) = a·E(X) − b ⇒ 13.4 = 4(4.6) − b ⇒ 13.4 = 18.4 − b ⇒ **b = 5**.\n- Step 3: Verify: Y = 4X − 5 gives E(Y) = 4(4.6) − 5 = 13.4 ✓.\n- Step 4: Verify: Var(Y) = 4² × 4.14 = 16 × 4.14 = 66.24 ✓.\n\n[Takeaway: Var(aX + b) = a²·Var(X); the +b term does NOT affect variance. Only a² matters.]", "source": "MiniMax ①", "_id": "minimax_1_8"}, {"question": "For the same setup, if $$X_2 = 4$$ then $$R = 5$$; carefully compute $$P(X_1 > 5)$$ and explain why $$X_1 = 5$$ is excluded. (3 steps)", "answer": "- Step 1: $$X_1 > 5$$ is **strict** inequality. The values of $$X_1$$ strictly greater than 5 are $$\\{7, 8\\}$$ (NOT including 5 itself).\n- Step 2: $$P(X_1 = 7) + P(X_1 = 8) = 0.1 + 0.15 = 0.25$$.\n- Step 3: If you mistakenly used $$\\ge 5$$, you'd add $$P(X_1 = 5) = 0.2$$ giving 0.45 — that counts ties as Sam-wins, which the question (\"higher score wins\") excludes.\n\nTakeaway: \"higher score wins\" = strict $$>$$; ties don't go to Sam.", "source": "Opus 4 ②", "_id": "opus_2_23"}, {"question": "When data is coded (e.g. $$y = (x - a)/b$$), which of these statistics are **invariant** under the coding: $$r$$, $$b_\\text{slope}$$, $$a_\\text{intercept}$$? (3 steps)", "answer": "- Step 1: $$r$$ is **invariant** — coding shifts and scales both axes uniformly, but the ratio $$S_{xy}/\\sqrt{S_{xx}\\cdot S_{yy}}$$ is unaffected. PMCC measures shape, not units.\n- Step 2: $$b_\\text{slope}$$ is **NOT** invariant — it depends on the units. Changing units of $$x$$ (or $$y$$) changes the slope by the corresponding factor.\n- Step 3: $$a_\\text{intercept}$$ is **NOT** invariant — depends on both the means and the slope.\n\nTakeaway: $$r$$ is dimensionless and invariant; $$a, b$$ are dimensional and change with coding.", "source": "Opus 4 ②", "_id": "opus_2_44"}, {"question": "To find $$P(S > R)$$ for two independent spins $$S$$ and $$R$$, where $$R$$ is a linear function of a second spin $$X_2$$, how do you structure the calculation using conditional probabilities? (2 steps)", "answer": "- Step 1: Condition on the outcome of the second spin. For each possible value $$x_2$$, calculate the resulting $$R$$ value.\n- Step 2: For each $$R$$, find $$P(S > R)$$ by summing the probabilities of $$S$$ values strictly greater than $$R$$. Then multiply this probability by $$P(X_2 = x_2)$$ and sum over all possible $$x_2$$.\n\nThis uses the law of total probability: $$P(S > R) = \\Sigma P(S > R \\mid X_2 = x_2) P(X_2 = x_2)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_10"}, {"question": "Why might computing P(S > R) = 0.355 in the Sam-vs-opponent problem actually be checked by computing P(R > S) and P(S = R)? (3 steps)", "answer": "- Step 1: $$P(S > R) + P(R > S) + P(S = R) = 1$$ (mutually exclusive and exhaustive cases).\n- Step 2: Computing the other two probabilities gives a verification: if their sum + 0.355 equals 1, your answer is consistent.\n- Step 3: If they don't sum to 1, you have an error somewhere (or a silly arithmetic slip).\n+ Useful as a sense-check rather than a primary method, since it requires more work.\n\nTakeaway: outcomes partition the sample space; sum should be 1 — useful check.", "source": "Opus 4 ②", "_id": "opus_2_116"}, {"question": "Why does adding a constant $$b$$ (as in $$Y = aX + b$$) have no effect on the variance, while multiplying by $$a$$ changes it by $$a^2$$? (2 steps)", "answer": "- Step 1: Variance measures spread—the average squared distance of data points from their mean. Adding a constant $$b$$ shifts the entire dataset (and its mean) by $$b$$, but the distances between points remain identical. Hence, spread is unchanged.\n- Step 2: Multiplying by $$a$$ scales all distances by $$a$$. When you square these scaled distances to calculate variance, the factor becomes $$a^2$$. Thus, $$Var(aX + b) = a^2 Var(X)$$.\n\nThe $$+b$$ vanishes from variance but shifts the mean: $$E(aX+b) = aE(X) + b$$.", "source": "GLM 5.1 ③", "_id": "glm_3_8"}, {"question": "What does $$r = 0$$ mean, and why is it WRONG to conclude \"X and Y are independent\"? (4 steps)", "answer": "- Step 1: $$r = 0$$ means no LINEAR association — no straight-line trend in the (X, Y) data.\n- Step 2: But X and Y can have a strong NON-LINEAR relationship and still have r = 0. Classic example: $$Y = X^2$$ with X uniform on [−1, 1] gives r = 0, yet Y is fully determined by X.\n- Step 3: Independence is stronger: $$P(X = x, Y = y) = P(X = x) \\cdot P(Y = y)$$ for all x, y — joint distribution must factorise.\n- Step 4: $$r = 0 \\Rightarrow$$ independent only in special cases (e.g., joint normal).\n\nTakeaway: r is blind to non-linear structure; r = 0 ≠ independence.", "source": "Opus 4 ①", "_id": "opus_1_58"}, {"question": "In a 3-circle Venn diagram with probabilities summing to 1, you have p + q = 0.36 (from summing all regions). Independence of C and S gives another equation. How do you set up the independence condition? (3 steps)", "answer": "- Step 1: P(C) = sum of all regions inside C = C-only + C∩G-only + C∩S-only + C∩S∩G = 0.04 + p + 0.15 + 0.12 = 0.31 + p.\n- Step 2: P(S) = sum of all regions inside S = C∩S-only + C∩S∩G + S∩G-only + S-only = 0.15 + 0.12 + 0.1 + 0.23 = 0.60.\n- Step 3: P(C∩S) = regions inside both C and S = C∩S-only + C∩S∩G = 0.15 + 0.12 = 0.27. Independence: P(C∩S) = P(C)·P(S), so 0.27 = (0.31 + p)(0.60), giving p = 0.14.\n\nKey: P(C∩S) is NOT just C∩S∩G — it includes ALL regions where C and S overlap, whether or not G is also present.", "source": "GLM 5.1 ①", "_id": "glm_1_38"}, {"question": "Why is $$P(C) = 0.31 + p$$ in a Venn but $$P(C \\cap S) = 0.27$$ doesn't depend on $$p$$, conceptually? (3 steps)", "answer": "- Step 1: $$P(C)$$ counts everything inside the C-circle, INCLUDING the C∩G-only region ($$p$$). Move $$p$$ around the C-circle and $$P(C)$$ changes.\n- Step 2: $$P(C \\cap S)$$ counts only regions inside BOTH C and S. The C∩G-only region ($$p$$) is in C but NOT in S — so it's excluded.\n- Step 3: Hence $$P(C \\cap S)$$ only depends on regions where both circles overlap (C∩S only and C∩S∩G), which are 0.15 + 0.12 = 0.27 — fixed regardless of $$p$$.\n\nTakeaway: a region matters for $$P(C)$$ if inside C; it matters for $$P(C \\cap S)$$ only if inside BOTH C and S.", "source": "Opus 4 ②", "_id": "opus_2_87"}, {"question": "Given $$P(\\mu - 10 < T < \\mu + 10) = 0.95$$ for a normal distribution, derive the relationship between the interval half-width and $$\\sigma$$. What constant emerges? (3 steps)", "answer": "- Step 1: By symmetry, the remaining 5% is split equally: $$P(T < \\mu - 10) = 0.025$$ and $$P(T > \\mu + 10) = 0.025$$.\n- Step 2: Standardise the upper boundary: $$P\\left(Z < \\frac{10}{\\sigma}\\right) = 0.975$$. From the percentage points table, $$P(Z < 1.96) = 0.975$$, so $$\\frac{10}{\\sigma} = 1.96$$.\n- Step 3: Therefore $$\\sigma = \\frac{10}{1.96} = 5.102 \\approx 5.10$$. The general rule: for a **95% symmetric interval**, the half-width equals **1.96σ**. This is NOT in the formula booklet — you must memorise it.", "source": "GLM 5.1 ②", "_id": "glm_2_31"}, {"question": "What's the cleanest 3-step procedure for verifying a Venn problem solution at the end? (3 steps)", "answer": "- Step 1: All 8 region probabilities sum to exactly 1.\n- Step 2: Each individual region probability ∈ [0, 1].\n- Step 3: Reconstructed marginals (P(C), P(S), P(G)) match any given values, and the independence/conditional constraints from the question are satisfied.\n\nTakeaway: Sum to 1 + region bounds + marginal/constraint check = full solution.", "source": "Opus 4 ①", "_id": "opus_1_90"}, {"question": "In Q3, the histogram calculation required converting mm to cm on the page. Why is this necessary, and what would happen if you used the wrong scale? (practical pitfall)", "answer": "- The reference bar shows dimensions in cm on the page representing mm in the data (e.g., 4 mm class width = 2.5 cm on page).\n- If you forget the conversion, your frequency density calculation would be off by a factor, giving wrong bar heights.\n- For class 30-32: width = 2 mm = 0.5 of the reference width (4 mm). Using wrong scale would give 2.5 cm instead of 1.25 cm → wrong area → wrong height.\n\n[Takeaway: Always check units in histogram problems — class widths in mm vs. cm on the diagram.]", "source": "MiniMax ①", "_id": "minimax_1_48"}, {"question": "For X ~ N(15, 2²), \"the fastest 60% qualify\". Find the longest qualifying time. Identify the correct probability statement and solve. (4 steps)", "answer": "- Step 1: \"Fastest\" = lowest TIMES (faster = less time). \"60% qualify\" → lowest 60% pass → $$P(X \\leq t) = 0.60$$.\n- Step 2: Find z: $$\\Phi(z) = 0.60 \\Rightarrow z \\approx 0.2533$$ (from inverse normal table).\n- Step 3: Decode: $$t = \\mu + \\sigma \\cdot z = 15 + 2(0.2533) = 15.5$$ min (3 s.f.).\n- Step 4: Sense check: 60% qualify, so cutoff above the median (15 min). 15.5 > 15 ✓. If you got 14.49 (below median), only 40% would qualify — contradicts the question.\n\nTakeaway: \"Fastest p%\" of times = lowest p% → $$P(X \\leq t) = p$$, NOT P(X > t) = p.", "source": "Opus 4 ①", "_id": "opus_1_39"}, {"question": "The regression line is g = −42.3 + 0.722d. Interpret the gradient (0.722) in context. What must you include for full marks? (2 steps)", "answer": "- Step 1: The gradient means: for each additional 1 cm of bear length, the girth increases by approximately 0.722 cm, **within the observed range of the data**.\n- Step 2: For full marks you MUST include: (a) **units** (cm of girth per cm of length), (b) **context** (bears, not abstract variables), and (c) the qualification that this applies **within the data range**. Saying \"per unit increase in d\" without context = B0.\n\nThe intercept (−42.3) has no meaningful physical interpretation — a bear of length 0 cm having negative girth is absurd.", "source": "GLM 5.1 ①", "_id": "glm_1_26"}, {"question": "What's the typical S1 layout for an \"interpret the gradient\" mark, and why is \"ASIA\" a useful mnemonic? (3 steps)", "answer": "- Step 1: A = \"Around\" the data: state the gradient is approximate / on average, within sampled range.\n- Step 2: S = Sign: positive (increase) or negative (decrease).\n- Step 3: I = (Independent variable's) Increase: \"for every 1 cm increase in length...\".\n+ A = (Dependent variable's) Action: \"...girth increases by 0.722 cm.\"\n\nTakeaway: ASIA = Approximate, Sign, Increase, Action. A complete sentence on all four = full marks.", "source": "Opus 4 ②", "_id": "opus_2_138"}, {"question": "A regression line fit on bear lengths 100–250 cm predicts girth at d = 50 cm. Why is this prediction unreliable? (4 steps)", "answer": "- Step 1: 50 cm is OUTSIDE the sampled range — the model has no data at small lengths.\n- Step 2: The line gives $$g = -42.3 + 0.722(50) = -6.2$$ cm — physically impossible (negative circumference).\n- Step 3: The linear assumption is only validated within the sampled range. Outside, the real relationship may be non-linear, change sign, or not exist.\n- Step 4: This is **extrapolation**, the cardinal sin of regression. Predictions inside range = interpolation (safe); outside = extrapolation (unreliable).\n\nTakeaway: Use regression only within the range of x-values used to fit it.", "source": "Opus 4 ①", "_id": "opus_1_33"}, {"question": "For the constraint problem where 27, a, 48, 2a are added to a dataset and the box plot must be unchanged, verify that a = 38 satisfies all constraints. The original sorted data has min=25, Q₁=36, median=45, Q₃=54, max=80, n=32. (4 steps)", "answer": "- Step 1: Max constraint: 2a = 76 ≤ 80 ✓. Min constraint: 27 > 25, so min unchanged ✓.\n- Step 2: Q₁ constraint (new n=36, Q₁ = avg of 9th and 10th): only 27 is below 36 among new values (a=38 > 36). So 9th and 10th values are still the same as before → Q₁ = 36 ✓.\n- Step 3: Median constraint (avg of 18th and 19th): new values in the 30s–40s range are 27, 38, 48. The 18th value is still 43, 19th still 47 → median = 45 ✓.\n- Step 4: Q₃ constraint (avg of 27th and 28th): 2a = 76, which is above Q₃ = 54, so it doesn't affect the 27th/28th positions → Q₃ = 54 ✓. All constraints satisfied.\n\nThis verification shows why a = 38 works — each new value lands in a position that doesn't shift the five-number summary.", "source": "GLM 5.1 ①", "_id": "glm_1_8"}, {"question": "Conceptually, why does the Edexcel rule round n/4 **UP** (rather than to nearest) when n/4 is non-integer?", "answer": "With 35 sorted values, $$n/4 = 8.75$$ means Q1 lies \"between\" the 8th and 9th values. Edexcel's convention is to take the value at the smallest integer position ≥ n/4 — i.e., the 9th. Rounding UP guarantees you skip past the boundary into the next quarter. This is a chosen convention for marking consistency, not a uniquely correct answer (other rules: linear interpolation, (n+1)/4, etc.) — just memorise: IAL discrete data rounds UP.", "source": "Opus 4 ①", "_id": "opus_1_11"}, {"question": "Why does adding a value equal to the mean change the SD by a factor of $$\\sqrt{n/(n+1)}$$? (3 steps)", "answer": "- Step 1: $$\\sigma^2_\\text{new} = n\\sigma^2_\\text{old}/(n+1)$$ from the calculation.\n- Step 2: $$\\sigma_\\text{new} = \\sigma_\\text{old} \\cdot \\sqrt{n/(n+1)}$$.\n- Step 3: For $$n = 50$$, factor = $$\\sqrt{50/51} \\approx 0.9901$$ — small decrease (about 1%). For larger $$n$$, even smaller percentage change. The decrease is real but small.\n\nTakeaway: the decrease is real but small for large $$n$$; explanation matters more than the size.", "source": "Opus 4 ②", "_id": "opus_2_135"}, {"question": "A new value v is added to a dataset of n values, mean μ, SD σ. Under what condition is (i) the mean unchanged, (ii) the SD unchanged? (4 steps)", "answer": "- Step 1: **Mean unchanged**: $$(n\\mu + v)/(n+1) = \\mu \\Rightarrow v = \\mu$$. Add a value AT the mean.\n- Step 2: **SD unchanged**: variance = (Σ(x−μ)²)/n. Adding v at distance d from mean adds d² to numerator, 1 to count.\n- Step 3: New variance = $$(n\\sigma^2 + d^2)/(n+1)$$. For = σ²: $$n\\sigma^2 + d^2 = (n+1)\\sigma^2 \\Rightarrow d^2 = \\sigma^2 \\Rightarrow d = \\sigma$$.\n- Step 4: Combined: it's nearly impossible to keep BOTH unchanged with one new value — they're tied to different geometric features.\n\nTakeaway: Mean = centre; SD = spread. Adding at mean preserves centre but reduces spread.", "source": "Opus 4 ①", "_id": "opus_1_67"}, {"question": "When computing a conditional $$P(A \\mid B)$$ where event $$A \\subset B$$, what's the special simplification, and why must $$P(A \\cap B) = P(A)$$? (3 steps)", "answer": "- Step 1: General formula: $$P(A \\mid B) = \\dfrac{P(A \\cap B)}{P(B)}$$.\n- Step 2: If $$A \\subset B$$, every outcome in $$A$$ is also in $$B$$, so $$A \\cap B = A$$. Hence $$P(A \\cap B) = P(A)$$.\n- Step 3: Simplified: $$P(A \\mid B) = \\dfrac{P(A)}{P(B)}$$. NB: do NOT use $$P(A) \\cdot P(B)$$ — that's the formula for independence (which generally doesn't hold here).\n\nTakeaway: if $$A \\subset B$$, the intersection collapses and you just divide $$P(A)/P(B)$$.", "source": "Opus 4 ②", "_id": "opus_2_52"}, {"question": "For DRV $$X \\in \\{1, 2, 3\\}$$ with probs $$\\{0.5, 0.3, 0.2\\}$$, outline (without arithmetic) how to find E(X), Var(X), E(2X−1), Var(2X−1). (5 steps)", "answer": "- Step 1: $$E(X) = \\sum x \\cdot P = 1(0.5) + 2(0.3) + 3(0.2)$$ — direct sum.\n- Step 2: $$E(X^2) = 1(0.5) + 4(0.3) + 9(0.2)$$; then $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$.\n- Step 3: $$E(2X - 1) = 2 E(X) - 1$$ — linearity.\n- Step 4: $$\\text{Var}(2X - 1) = 4 \\text{Var}(X)$$ — the −1 vanishes; scale by $$2^2$$.\n- Step 5: Master four atoms: E, E², Var via STAR, linearity for transformations.\n\nTakeaway: 4 atomic operations cover ~95% of DRV exam questions.", "source": "Opus 4 ①", "_id": "opus_1_73"}, {"question": "What is the relationship between frequency density (FD) and frequency (f) in a histogram, and why use FD as the height? (4 steps)", "answer": "- Step 1: $$\\text{FD} = \\frac{\\text{frequency}}{\\text{class width}}$$ — has units \"frequency per unit class width\".\n- Step 2: With height = FD, area = FD × width = (f/w)×w = f. Area equals frequency.\n- Step 3: This handles UNEQUAL class widths without distortion. Two bars with different widths but same FD have area-equivalent meaning.\n- Step 4: With height = frequency directly, wide bars look \"more frequent\" than they are — visually misleading.\n\nTakeaway: FD is data density per unit x; multiply by width to recover count.", "source": "Opus 4 ①", "_id": "opus_1_65"}, {"question": "Why does the linear interpolation formula $$L + \\frac{n/2 - F}{f} \\cdot c$$ assume something about the data that may not be true? Conceptually, what is that assumption? (3 steps)", "answer": "- Step 1: The formula assumes data values are **uniformly distributed** within each class — i.e., the 20 values in $$32 \\le x < 36$$ are spread evenly across that 4-mm interval.\n- Step 2: In reality, individual data values may cluster near the lower or upper end of a class. We can't tell from the grouped table alone.\n- Step 3: That's why we say \"estimate of the median\" — it's an interpolation, not the exact value. Different distributions within a class give different medians.\n\nTakeaway: grouped median = uniform-within-class assumption; gives an estimate, not the exact value.", "source": "Opus 4 ②", "_id": "opus_2_29"}, {"question": "In a back-to-back stem-and-leaf diagram, the left side (e.g., Birch) has leaves reading away from the stem. If the left row reads `9 8 8 7` next to stem `4`, what are the actual data values, and what is the common directional mistake? (2 steps)", "answer": "- Step 1: The stem is `4` and the leaves are `9 8 8 7`. On the left side, the smallest leaf is closest to the stem. So reading left-to-right visually corresponds to largest-to-smallest numerically.\n- Step 2: The values are 47, 48, 48, 49. The common mistake is reading them left-to-right as 49, 48, 48, 47, or worse, treating the string as a single number like 9887. You must read right-to-left on the left side to go from smallest to largest.\n\nAlways anchor yourself: the smallest value is always immediately next to the stem on both sides.", "source": "GLM 5.1 ③", "_id": "glm_3_0"}, {"question": "Why does the regression line $$y = a + bx$$ with $$b = S_{xy}/S_{xx}$$ and $$a = \\bar{y} - b\\bar{x}$$ always pass through $$(\\bar{x}, \\bar{y})$$? (3 steps)", "answer": "- Step 1: At $$x = \\bar{x}$$: $$y = a + b \\bar{x}$$.\n- Step 2: Substitute $$a = \\bar{y} - b \\bar{x}$$: $$y = (\\bar{y} - b\\bar{x}) + b\\bar{x} = \\bar{y}$$.\n- Step 3: So the line passes through $$(\\bar{x}, \\bar{y})$$ by construction. Why? Least squares anchors the line at the centre of the data — this is mathematical, not arbitrary.\n\nTakeaway: The y-on-x regression line ALWAYS passes through the point of means.", "source": "Opus 4 ①", "_id": "opus_1_57"}, {"question": "Two events A and B are independent. Does P(A | B) = P(A)? Does P(A | B) = P(A | B′)? Explain. (2 marks)", "answer": "- Step 1: Yes, if A and B are independent, then P(A | B) = P(A ∩ B)/P(B) = P(A)P(B)/P(B) = P(A).\n- Step 2: However, P(A | B′) = P(A ∩ B′)/P(B′). This equals P(A) only if A is also independent of B′.\n- Step 3: In general, independence of A and B does NOT imply independence of A and B′. They could be dependent.\n\n**Answer:** P(A|B) = P(A); but generally P(A|B′) ≠ P(A)", "source": "MiniMax ②", "_id": "minimax_2_6"}, {"question": "Why is $$P(A \\cap B) = P(A)$$ when A is a subset of B? Show this leads to a clean conditional probability. (4 steps)", "answer": "- Step 1: $$A \\subset B$$ means every outcome in A is also in B. So $$A \\cap B = A$$.\n- Step 2: Therefore $$P(A \\cap B) = P(A)$$.\n- Step 3: Substitute into conditional formula: $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)} = \\frac{P(A)}{P(B)}$$.\n- Step 4: Common error: computing $$P(A) \\cdot P(B)$$ as if A, B were independent. Nested events are NOT independent (in general).\n\nTakeaway: $$A \\subset B$$ ⇒ intersection = smaller set; never multiply.", "source": "Opus 4 ①", "_id": "opus_1_42"}, {"question": "When the regression line is $$y = a + bx$$, the intercept $$a = \\bar{y} - b\\bar{x}$$. Explain intuitively why the point $$(\\bar{x}, \\bar{y})$$ must lie on the regression line. (2 steps)", "answer": "- Step 1: The regression line is the **best-fit** line that minimises the sum of squared residuals. The mean point $$(\\bar{x}, \\bar{y})$$ is the \"centre of gravity\" of the data.\n- Step 2: If you substitute $$x = \\bar{x}$$: $$y = a + b\\bar{x} = (\\bar{y} - b\\bar{x}) + b\\bar{x} = \\bar{y}$$. So the predicted $$y$$ at $$x = \\bar{x}$$ is exactly $$\\bar{y}$$. The line always passes through the mean point — this is a built-in property of least-squares regression.", "source": "GLM 5.1 ②", "_id": "glm_2_49"}, {"question": "Why is it inappropriate to use linear regression to predict y for x values outside the range of the original data? What assumption is being violated? (conceptual)", "answer": "- Linear regression minimises squared errors within the observed range of x — it has no information about the relationship outside this range.\n- The assumption of linearity may not hold beyond the data — the relationship could curve, plateau, or reverse.\n- Additionally, extrapolation can produce physically impossible predictions (e.g., negative girth for small bears).\n- The further outside the range, the less reliable the prediction.\n\n[Takeaway: Interpolate with caution; never extrapolate far beyond the data unless you have theoretical justification.]", "source": "MiniMax ①", "_id": "minimax_1_42"}, {"question": "In the population-scaling problem, 76 students play C∩G. P(C∩G) = 0.26. Estimate the total population N, then estimate how many do NOT play Scrabble. (3 steps)", "answer": "- Step 1: N = (observed count) / (probability) = 76/0.26 ≈ **292.3**. This is the estimated total number of teenagers in the youth club.\n- Step 2: P(S′) = 1 − P(S) = 1 − 0.60 = **0.40**. This is the cleanest path — use the complement rather than summing individual non-S regions.\n- Step 3: Number not playing Scrabble = N × P(S′) = 292.3 × 0.40 ≈ **117** (rounded to nearest whole person).\n\nThe scaling logic: if 26% of the population represents 76 people, then 100% represents 76/0.26 people. Then 40% of that total don't play Scrabble.", "source": "GLM 5.1 ①", "_id": "glm_1_42"}, {"question": "Conceptual exercise: If P(A) = 0.3 and P(B) = 0.6, and A and B are mutually exclusive, what is P(A∩B)? Is this consistent with independence? (2 steps)", "answer": "- Step 1: Mutually exclusive means A and B cannot both occur, so P(A∩B) = **0**.\n- Step 2: For independence, we'd need P(A∩B) = P(A)·P(B) = 0.18. But P(A∩B) = 0 ≠ 0.18. So mutually exclusive events with non-zero probabilities are **never independent** (unless one has probability 0).\n\nThis is a fundamental contrast: mutual exclusivity and independence are opposite tendencies. Mutually exclusive events are strongly dependent (knowing A occurred tells you B cannot occur).", "source": "GLM 5.1 ①", "_id": "glm_1_60"}, {"question": "How to determine the range of `a` such that adding new values keeps the Maple box plot unchanged? (4 steps)", "answer": "- Step 1: **Original stats**: min=25, Q₁=36, median=45, Q₃=54, max=80.  \n- Step 2: **Constraints** (new n=36):  \n  + Max ≤ 80 ⇒ 2a ≤ 80 ⇒ a ≤ 40.  \n  + Q₁=36 ⇒ exactly one new value <36 (only 27 qualifies) ⇒ a ≥ 36.  \n  + Median=45 ⇒ a ≤ 43 (ensured by a ≤40).  \n- Step 3: **Combine constraints**: 36 ≤ a ≤ 40.  \n  + Key: Ensure all original quartiles and max remain valid after adding values.  \n\n**Takeaway:** Constraints must satisfy all box plot elements simultaneously.", "source": "Qwen 3 ①", "_id": "qwen_1_2"}, {"question": "What's the conceptual meaning of \"S1 STAR formulas\" — those NOT in the formula booklet but expected to be memorised? (3 steps)", "answer": "- Step 1: STAR = \"high-impact, low-formal-coverage\". Examples: variance computational form, coding rules for E and Var, symmetric interval trick (1.96σ), population-scaling formula.\n- Step 2: They're not in the booklet because they're considered *fundamental rearrangements* or *applied techniques* expected at the level of S1.\n- Step 3: They appear repeatedly across papers — high probability of testing. Master them all = guaranteed marks.\n\nTakeaway: STAR formulas = silent must-knows; memorise > look up.", "source": "Opus 4 ②", "_id": "opus_2_147"}, {"question": "Why is it crucial NOT to memorise the tutor's wrong answer of \"σ = 0.0510\" for Q5(c), even if it appeared confidently in a Loom video? (3 steps)", "answer": "- Step 1: Memorising a wrong number means you'll repeat the error on similar problems, reinforcing a bad mental shortcut.\n- Step 2: The correct answer (σ ≈ 5.10) follows from a clear, sense-checkable path: $$10/1.96 \\approx 5$$. Internalising the *method* and *sense-check* is more valuable than any one number.\n- Step 3: For redo: when you see \"P(μ−10 < T < μ+10) = 0.95\", instantly think \"k = 1.96σ, so σ = k/1.96\". That mental routine immunises against the original error.\n\nTakeaway: trust the method and sense-check, not authority — replicate Phuc's error-catch mindset.", "source": "Opus 4 ②", "_id": "opus_2_145"}, {"question": "To find the number of teenagers who do NOT play Scrabble, a tutor computed $$P(S') = 0.18$$ by adding only the G-only and outside regions. Why is this wrong, and what is the easiest correct approach? (3 steps)", "answer": "- Step 1: $$P(S')$$ includes EVERYONE who doesn't play Scrabble: C only, C∩G only, G only, and outside. The tutor missed C only (0.04) and C∩G only (0.14), getting only 0 + 0.22 = 0.22, not even 0.18.\n- Step 2: The easiest approach is the **complement**: $$P(S') = 1 - P(S)$$. Since $$P(S) = 0.60$$, we get $$P(S') = 1 - 0.60 = 0.40$$. No need to enumerate regions at all.\n- Step 3: Then multiply: $$0.40 \\times 292.31 \\approx 117$$ teenagers don't play Scrabble. Always use the complement when $$P(S)$$ is easier to compute than $$P(S')$$.", "source": "GLM 5.1 ②", "_id": "glm_2_38"}, {"question": "For grouped data with n = 50, the median position is n/2 = 25th value. Why does Edexcel IAL use n/2 and NOT (n+1)/2 for the grouped median? (2 steps)", "answer": "- Step 1: Grouped data uses **linear interpolation within a class**, treating the data as continuously distributed. The n/2 position is the standard for grouped/continuous data because it locates the 50th percentile directly.\n- Step 2: The (n+1)/2 convention is for discrete/ungrouped data where you identify an actual data point. In grouped data, you're interpolating between boundaries, so the +1 adjustment is unnecessary and would give a slightly different (incorrect for this context) position.\n\nFor this paper's data: cumulative frequencies are 2, 18, 38, ... The 25th value falls in the class 32 ≤ x < 36, and you interpolate: median = 32 + (25−18)/20 × 4 = 33.4.", "source": "GLM 5.1 ①", "_id": "glm_1_19"}, {"question": "When computing $$S_{xx}$$, $$S_{yy}$$, or $$S_{xy}$$, a common error is to forget to divide by $$n$$ in the correction term. What is the full formula for $$S_{xx}$$, and what goes wrong if you omit the $$n$$? (2 steps)", "answer": "- Step 1: $$S_{xx} = \\Sigma x^2 - \\frac{(\\Sigma x)^2}{n}$$. The correction term $$\\frac{(\\Sigma x)^2}{n}$$ adjusts for the fact that $$\\Sigma x^2$$ includes both the variance and the mean contribution.\n- Step 2: If you write $$S_{xx} = \\Sigma x^2 - (\\Sigma x)^2$$ (forgetting $$n$$), the correction term is $$n$$ times too large, and $$S_{xx}$$ will likely be massively negative — an impossibility since $$S_{xx}$$ is a sum of squared deviations. Sense-check: $$S_{xx}$$, $$S_{yy}$$, $$S_{xy}$$ must all be consistent in sign and magnitude.", "source": "GLM 5.1 ②", "_id": "glm_2_43"}, {"question": "For the four-constraint Maple problem, the final answer is $$36 \\le a \\le 40$$. Sketch out which constraint produces each end of the interval and which constraints are auto-satisfied. (3 steps)", "answer": "- Step 1: The lower end $$a \\ge 36$$ comes from the **$$Q_1$$ constraint** (only 27 may slip below 36; the other three new values must be at or above 36).\n- Step 2: The upper end $$a \\le 40$$ comes from the **max constraint** ($$2a \\le 80$$).\n- Step 3: The median ($$a \\le 43$$) and $$Q_3$$ constraints are **auto-satisfied** within $$36 \\le a \\le 40$$, so they don't tighten the interval. The minimum constraint is also trivially OK because $$a \\ge 36 > 25$$.\n\nTakeaway: the binding constraints are $$Q_1$$ (lower) and max (upper); the rest are slack but must still be checked.", "source": "Opus 4 ②", "_id": "opus_2_14"}, {"question": "When computing $$E(X^2)$$ for a discrete random variable, why must you square each $$x$$-value FIRST and then multiply by its probability — not square $$E(X)$$? (3 steps)", "answer": "- Step 1: $$E(X^2) = \\sum x^2 \\cdot P(X=x)$$. The squaring is applied to each value before weighting — it's a sum of weighted squares.\n- Step 2: $$[E(X)]^2 = \\left(\\sum x \\cdot P(X=x)\\right)^2$$ is a totally different quantity — the square of a weighted average.\n- Step 3: In general $$E(X^2) \\ne [E(X)]^2$$. The difference is exactly the variance: $$\\text{Var}(X) = E(X^2) - [E(X)]^2 \\ge 0$$. If they were equal, variance would be zero (constant distribution).\n\nTakeaway: $$E(X^2)$$ uses $$x^2$$ inside the sum; $$[E(X)]^2$$ squares the result of the sum.", "source": "Opus 4 ②", "_id": "opus_2_17"}, {"question": "Mental model: think of the conditional probability $$P(A \\mid B)$$ as \"rescaling the universe to B alone, then asking the probability of $$A$$ within that rescaled universe\". How does this make the formula obvious? (3 steps)", "answer": "- Step 1: Conditional on $$B$$ happening, the relevant sample space is $$B$$, with total mass $$P(B)$$.\n- Step 2: Within this rescaled universe, the event \"$$A$$\" is really \"$$A \\cap B$$\" (the part of $$A$$ that's inside $$B$$).\n- Step 3: $$P(A \\mid B) = \\dfrac{\\text{mass of } A \\cap B}{\\text{mass of } B} = \\dfrac{P(A \\cap B)}{P(B)}$$.\n+ If $$A \\subset B$$, then $$A \\cap B = A$$, so the numerator is just $$P(A)$$.\n\nTakeaway: condition on B = restrict universe to B; reweight all probabilities.", "source": "Opus 4 ②", "_id": "opus_2_96"}, {"question": "What's the role of the **percentage points table** in IAL S1, and which specific values must be memorised? (3 steps)", "answer": "- Step 1: The percentage points table gives $$z$$-values such that $$P(Z > z) = p$$ for chosen $$p$$. It's IN the formula booklet for IAL.\n- Step 2: Memorise:\n+ $$z(0.025) = 1.9600$$ → 95% symmetric interval ⇒ $$k = 1.96\\sigma$$\n+ $$z(0.005) = 2.5758$$ → 99% symmetric interval ⇒ $$k = 2.5758\\sigma$$\n+ $$z(0.05) = 1.6449$$ for one-sided 95%\n+ $$z(0.01) = 2.3263$$ for one-sided 99%\n- Step 3: Even though they're in the booklet, recognising \"95% symmetric ⇒ 1.96σ\" instantly saves time on tight 90-min papers.\n\nTakeaway: the table is in the booklet; the *symmetric trick* is the meta-skill.", "source": "Opus 4 ②", "_id": "opus_2_85"}, {"question": "For coding $$10y = w - 20$$, identify the scale factor and shift in the form $$w = by + a$$, then explain how each affects mean, variance, and SD. (4 steps)", "answer": "- Step 1: Rearrange to standard form: $$w = 10y + 20$$, so b = 10 (scale), a = 20 (shift).\n- Step 2: **Mean**: $$\\bar{w} = b\\bar{y} + a = 10\\bar{y} + 20$$ — mean inherits BOTH scale and shift.\n- Step 3: **Variance**: $$\\text{Var}(w) = b^2 \\cdot \\text{Var}(y) = 100 \\cdot \\text{Var}(y)$$ — only b² appears; the +20 vanishes.\n- Step 4: **SD**: $$\\sigma_w = |b| \\cdot \\sigma_y = 10\\sigma_y$$ — absolute value of scale; +20 vanishes.\n\nTakeaway: Spread feels scale only; shifts vanish.", "source": "Opus 4 ①", "_id": "opus_1_23"}, {"question": "When computing S_dg = Σdg − (Σd)(Σg)/n, you get 12,105.12. If you accidentally swapped the denominator to use n−1 instead of n, would r be larger, smaller, or the same? (2 steps)", "answer": "- Step 1: Using n−1 instead of n would change S_dg, S_dd, and S_gg all by the same scaling factor (approximately n/(n−1)). But PMCC divides S_dg by √(S_dd · S_gg), so the scaling cancels: $$\\frac{k \\cdot S_{dg}}{\\sqrt{k \\cdot S_{dd} \\cdot k \\cdot S_{gg}}} = \\frac{S_{dg}}{\\sqrt{S_{dd} \\cdot S_{gg}}}$$.\n- Step 2: Therefore r would be **the same**. PMCC is invariant to this scaling — it's a dimensionless correlation measure that doesn't depend on whether you divide by n or n−1.\n\nThis is a deep property: r depends only on the pattern of the data, not the sample size scaling.", "source": "GLM 5.1 ①", "_id": "glm_1_25"}, {"question": "A common student error in conditional probability is $$P(B \\mid A) = P(A \\cap B) \\cdot P(A)$$. Why is this wrong? (4 steps)", "answer": "- Step 1: $$P(B \\mid A)$$ is a probability ∈ [0, 1].\n- Step 2: $$P(A \\cap B) \\cdot P(A)$$ is a product of two probabilities, ≤ P(A) — could be in [0, 1] but is the WRONG value.\n- Step 3: Correct: $$P(B \\mid A) = P(A \\cap B)/P(A)$$. Dividing reweights the probability into the restricted universe of A.\n- Step 4: Sanity check via subset: if $$A \\subset B$$, then $$P(A \\cap B) = P(A)$$, so $$P(B \\mid A) = P(A)/P(A) = 1$$. (If A happens, B definitely happens.)\n\nTakeaway: Divide, don't multiply. Conditional = restriction + renormalisation.", "source": "Opus 4 ①", "_id": "opus_1_81"}, {"question": "Why is the IAL S1 quartile rule fundamentally different for grouped data vs raw data, and what's the practical implication? (3 steps)", "answer": "- Step 1: For grouped data, you use linear interpolation: $$Q_1 \\approx L + \\dfrac{n/4 - F}{f} \\cdot c$$ — treating the data as continuous within classes.\n- Step 2: For raw/discrete data (stem-and-leaf), you use positional rules: $$n/4$$ rounded up gives a single position, or take the average of two if integer.\n- Step 3: Using the wrong rule for the wrong data type = wrong answer. ALWAYS check: is it grouped (continuous, density) or raw (discrete, positional)?\n\nTakeaway: data type → rule. Grouped = interpolation; raw = position with round-up.", "source": "Opus 4 ②", "_id": "opus_2_100"}, {"question": "If a histogram class has frequency = 0 (no values in the range), what does the bar look like, and why? (2 steps)", "answer": "- Step 1: The bar has height 0 (no area, since area ∝ frequency = 0). Visually, no bar at all in that class.\n- Step 2: This is fine — frequency density = 0, area = 0. A gap in the histogram represents an empty class.\n\nTakeaway: zero frequency = zero area = no bar; not an error but a meaningful absence.", "source": "Opus 4 ②", "_id": "opus_2_125"}, {"question": "When given $$\\Sigma fy$$ and $$\\Sigma fy^2$$ for grouped data with $$\\Sigma f = n$$, why use the computational variance form rather than computing each $$(y_i - \\bar{y})^2$$? (3 steps)", "answer": "- Step 1: Computing $$(y_i - \\bar{y})^2$$ for each class requires subtracting the mean, squaring, multiplying by frequency, summing — many operations and error-prone.\n- Step 2: $$\\sigma^2 = \\dfrac{\\Sigma fy^2}{\\Sigma f} - \\bar{y}^2$$ uses values you already have ($$\\Sigma fy^2$$ given, $$\\bar{y} = \\Sigma fy / \\Sigma f$$ trivial).\n- Step 3: Two operations (
