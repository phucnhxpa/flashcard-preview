.]", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": true}, {"question": "In a histogram, the vertical axis shows \"frequency density\" with units that depend on the class width. What does the AREA of each bar represent, and why is this important? (conceptual)", "answer": "- Area of each bar = frequency density × class width = (frequency/width) × width = **frequency**.\n- This is why histograms represent continuous grouped data — taller bars don't necessarily mean more data if the class is narrower.\n- The reference bar method ensures area is proportional to frequency across all classes with different widths.\n\n[Takeaway: In histograms, HEIGHT ≠ frequency; AREA = frequency. Always use area proportions.]", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "When calculating the variance of a dataset using the computational formula σ² = Σx²/n − x̄², why might you get a negative value if you're not careful? (misconception probe)", "answer": "- If you compute (Σx)²/n instead of Σx²/n, you'll get a negative variance, which is impossible.\n- Example: Σx = 10, Σx² = 30, n = 5. Then Σx²/n = 6, but (Σx)²/n = 100/5 = 20. The correct variance = 6 − (10/5)² = 6 − 4 = 2. If you mistakenly did 20 − 4 = 16, you'd be wrong.\n- The formula is Σx²/n − x̄², NOT (Σx)²/n − x̄².\n\n[Takeaway: Σx² and (Σx)² are completely different — square first, then sum; versus sum, then square.]", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": true}, {"question": "What is the difference between E(X), E(X²), and Var(X)? How do you calculate each? (conceptual)", "answer": "- E(X) = Σx·P(X = x) — the weighted average (mean) of X.\n- E(X²) = Σx²·P(X = x) — the mean of the squared values.\n- Var(X) = E(X²) − [E(X)]² — how spread out X is from its mean.\n- Example: If X takes values 0, 1 with P = 0.5 each: E(X) = 0.5, E(X²) = 0.5, Var = 0.5 − 0.25 = 0.25.\n\n[Takeaway: E(X²) is NOT the same as [E(X)]². Always square before multiplying by probability.]", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "For a normal distribution, why can't you use the normal table directly to find P(X > a) when a is greater than the mean plus 4 standard deviations? (edge case)", "answer": "- Standard normal tables typically give P(Z < z) for z up to about 3.5 or 4.0 (where P ≈ 0.9999).\n- Beyond z ≈ 4, the table shows 1.0000 (or is not provided), meaning P(Z > a) ≈ 0.\n- For practical purposes, any value more than 4σ from the mean is essentially impossible in a normal model.\n- However, this doesn't mean you should stop — if you need exact values, use technology or note the probability is negligible.\n\n[Takeaway: Know your table's limits — for z > 4, P(Z > z) ≈ 0.]", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "In probability, if A ⊂ B (A is a subset of B), what is P(A | B)? What is the common error students make? (misconception probe)", "answer": "- If A ⊂ B, then A ∩ B = A, so P(A | B) = P(A)/P(B).\n- Students commonly make the error of calculating P(A | B) = P(A) × P(B), which is the formula for P(A ∩ B) when A and B are independent — NOT when one is a subset of the other.\n- In Q5(c), the event T > μ − 5 is a subset of T > μ − 10, so P(T > μ − 5 | T > μ − 10) = P(T > μ − 5)/P(T > μ − 10).\n\n[Takeaway: Subset ≠ independent. Don't confuse P(A|B) = P(A∩B)/P(B) with P(A∩B) = P(A)P(B).]", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": true}, {"question": "When finding the median from a stem-and-leaf or discrete data, what position does Edexcel IAL use: n/2 or (n+1)/2? How does this differ from domestic A-level? (key difference)", "answer": "- **Edexcel IAL S1**: Use n/2, rounding UP to the next integer.\n- **Domestic A-level (UK)**: Uses (n+1)/2.\n- Example: n = 35 → IAL: median at position 17.5 → round UP to 18th value. Domestic: position 18.\n- This is a known difference — always use n/2 (round up) for IAL exams.\n\n[Takeaway: For IAL, median position = n/2 (round up); Q₁ at n/4 (round up); Q₃ at 3n/4 (round up).]", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "A student calculates the mean of a coded dataset as ȳ = 2.08, then decodes as w̄ = 10 × 2.08 = 20.8, forgetting to add the constant. What error did they make? (misconception probe)", "answer": "- The coding was 10y = w − 20, meaning w = 10y + 20.\n- To decode the mean: w̄ = 10 × ȳ + 20 = 10(2.08) + 20 = 20.8 + 20 = **40.8**.\n- The student forgot the \"+20\" shift. The scaling (10) multiplies the mean, but the translation (+20) must be added back.\n\n[Takeaway: For coding x = by + a, decode as x̄ = b·ȳ + a. The shift a is added, not multiplied.]", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": false}, {"question": "Why is it inappropriate to use linear regression to predict y for x values outside the range of the original data? What assumption is being violated? (conceptual)", "answer": "- Linear regression minimises squared errors within the observed range of x — it has no information about the relationship outside this range.\n- The assumption of linearity may not hold beyond the data — the relationship could curve, plateau, or reverse.\n- Additionally, extrapolation can produce physically impossible predictions (e.g., negative girth for small bears).\n- The further outside the range, the less reliable the prediction.\n\n[Takeaway: Interpolate with caution; never extrapolate far beyond the data unless you have theoretical justification.]", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": true}, {"question": "In Q6, the Venn diagram has G only = 0. What does this tell you about the region \"plays Go but not Chess or Scrabble\"? How does this affect probability calculations? (interpretation)", "answer": "- G only = 0 means no teenager plays ONLY Go — everyone who plays Go also plays at least one of Chess or Scrabble.\n- This simplifies P(G) = P(C∩G only) + P(C∩S∩G) + P(S∩G only) = p + 0.12 + 0.1.\n- It also means when calculating complements or \"not G\" regions, you don't need to account for a G-only region.\n\n[Takeaway: Zero in a Venn region means that region contributes nothing to that event's probability.]", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": true}, {"question": "For the normal distribution X ~ N(μ, σ²), what does the \"symmetric interval trick\" say about the relationship between the interval width and σ for a given probability? When is this useful? (conceptual)", "answer": "- For a symmetric interval (μ − k, μ + k), P(μ − k < X < μ + k) = 0.95 ⇒ k = 1.96σ.\n- Similarly, for 99%: k = 2.576σ.\n- This is useful when you know the interval width (2k) and need to find σ, or vice versa — avoid solving the full equation each time.\n- Example in Q5(c): interval width is 20 (from μ − 10 to μ + 10), so 20 = 2 × 1.96σ ⇒ σ = 10/1.96.\n\n[Takeaway: Memorise: 95% → 1.96σ, 99% → 2.576σ.]", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": true}, {"question": "A student adds a data point exactly at the mean and claims the standard deviation will stay the same. Explain why this is incorrect. (misconception probe)", "answer": "- Adding a point at the mean increases n but keeps Σ(x − x̄)² unchanged (the new point has zero deviation).\n- Since variance = Σ(x − x̄)²/n, and n increases while numerator stays the same, the variance DECREASES.\n- Therefore, the standard deviation (square root of variance) also DECREASES.\n- Example: Original n = 4, mean = 10, variance = 5. Add value 10: n = 5, sum of squares unchanged, new variance = 5 × 4/5 = 4. SD changes from √5 ≈ 2.24 to √4 = 2.\n\n[Takeaway: Adding the mean always reduces variance/SD because you're adding a zero-deviation point while increasing the denominator.]", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": false}, {"question": "In the box plot question, if a = 35 in Q1(f), would the box plot remain unchanged? What constraint is violated? (edge case)", "answer": "- If a = 35, then the four new values are 27, 35, 48, 70.\n- Q₁ = 36 (original 9th/10th average). With 27 below 36, there are now TWO values below 36, so Q₁ would change from 36 to somewhere between 27 and 36.\n- Therefore, the box plot would NOT remain unchanged.\n- The constraint violated is: Q₁ must equal 36, meaning only ONE value can be below 36 (the 27). Thus a ≥ 36 is required.\n\n[Takeaway: Check ALL five-number summary constraints when adding data points.]", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": true}, {"question": "For the discrete random variable in Q2, explain why E(2X − 3) cannot be calculated as 2E(X) − 3 without checking. (conceptual)", "answer": "- Actually, E(aX + b) = aE(X) + b ALWAYS holds for any constants a and b.\n- For E(2X − 3): = 2E(X) − 3 = 2(4.6) − 3 = 9.2 − 3 = 6.2.\n- This is different from E(X) transformed: E(2X − 3) means first compute 2x − 3 for each x, then take expectation.\n- The linearity property holds: E(aX + b) = aE(X) + b for ANY distributions, not just normal.\n\n[Takeaway: Expectation is linear: E(aX + b) = aE(X) + b. Variance is NOT linear: Var(aX + b) = a²Var(X).]", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": true}, {"question": "In Q3, the histogram calculation required converting mm to cm on the page. Why is this necessary, and what would happen if you used the wrong scale? (practical pitfall)", "answer": "- The reference bar shows dimensions in cm on the page representing mm in the data (e.g., 4 mm class width = 2.5 cm on page).\n- If you forget the conversion, your frequency density calculation would be off by a factor, giving wrong bar heights.\n- For class 30-32: width = 2 mm = 0.5 of the reference width (4 mm). Using wrong scale would give 2.5 cm instead of 1.25 cm → wrong area → wrong height.\n\n[Takeaway: Always check units in histogram problems — class widths in mm vs. cm on the diagram.]", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": true}], "count": 49}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "In a back-to-back stem-and-leaf diagram for Birch seedlings (35 values), the stem is the tens digit. The 9th value from the left (smallest) is 39, and the 27th value is 57. Using Edexcel's quartile rule (position = n/4 rounded UP), what are Q₁ and Q₃ for Birch? (2 marks)", "answer": "- Step 1: Identify positions: Q₁ position = n/4 = 35/4 = 8.75 → round UP to position 9. Q₃ position = 3n/4 = 3×35/4 = 26.25 → round UP to position 27.\n- Step 2: Read from the left side of the stem-and-leaf (right-to-left for smallest values first): the 9th value is 39, the 27th value is 57.\n- Step 3: Q₁ = 39, Q₃ = 57.\n\n**Answer:** Q₁ = 39, Q₃ = 57", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "For a spinner with values X ∈ {2,4,5,7,8} and probabilities 0.25, 0.3, 0.2, 0.1, 0.15 respectively, calculate P(2X − 3 > 5). (1 mark)", "answer": "- Step 1: Rewrite the inequality: 2X − 3 > 5 ⟹ 2X > 8 ⟹ X > 4.\n- Step 2: Identify values in the sample space greater than 4: X = {5, 7, 8}.\n- Step 3: Sum their probabilities: P(5) + P(7) + P(8) = 0.2 + 0.1 + 0.15 = 0.45.\n\n**Answer:** 0.45", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "A histogram has a reference bar for class 32 ≤ x < 36 with frequency 20, drawn at 2.5 cm width × 7.5 cm height. For the class 30 ≤ x < 32 with frequency 16 and actual width 2 mm, what are the required width and height on the diagram? (3 marks)", "answer": "- Step 1: Calculate reference bar area: 2.5 cm × 7.5 cm = 18.75 cm² represents 20 pebbles. Area per pebble = 18.75/20 = 0.9375 cm².\n- Step 2: For frequency 16, required area = 16 × 0.9375 = 15 cm².\n- Step 3: Convert actual class width to cm: 2 mm = 0.2 cm. Width on diagram = (0.2/0.4) × 2.5 cm = 1.25 cm (since reference width 4 mm = 0.4 cm corresponds to 2.5 cm).\n- Step 4: Height = Area/Width = 15/1.25 = 12 cm.\n\n**Answer:** Width = 1.25 cm, Height = 12 cm", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "For bear data (n = 8), given Σd = 1456.8, Σg = 713.2, Σdg = 141,978.84, calculate S_dg and S_gg. (3 marks)", "answer": "- Step 1: Use S_xy = Σxy − (Σx)(Σy)/n.\n- Step 2: S_dg = 141,978.84 − (1456.8 × 713.2)/8 = 141,978.84 − 129,873.72 = 12,105.12.\n- Step 3: First find Σg²/n = (713.2)²/8 = 508,562.24/8 = 63,581.78. Then S_gg = 72,675.98 − 63,581.78 = 9,094.20.\n\n**Answer:** S_dg = 12,105.12; S_gg = 9,094.20", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "X ~ N(15, 2²). Find P(X < 18). (2 marks)", "answer": "- Step 1: Standardize: z = (x − μ)/σ = (18 − 15)/2 = 1.5.\n- Step 2: From normal tables, P(Z < 1.5) = 0.9332.\n- Step 3: Therefore P(X < 18) = 0.9332.\n\n**Answer:** 0.9332", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "In a three-circle Venn diagram for Chess (C), Scrabble (S), Go (G): C only = 0.04, C∩S only (not G) = 0.15, C∩G only = p, C∩S∩G = 0.12, S∩G only = 0.1, S only = 0.23, G only = 0. Find P(plays Chess but not Go). (1 mark)", "answer": "- Step 1: \"Chess but not Go\" means in C but NOT in G.\n- Step 2: This includes C only + C∩S only (since C∩S doesn't include G).\n- Step 3: P = 0.04 + 0.15 = 0.19.\n\n**Answer:** 0.19", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "Two events A and B are independent. Does P(A | B) = P(A)? Does P(A | B) = P(A | B′)? Explain. (2 marks)", "answer": "- Step 1: Yes, if A and B are independent, then P(A | B) = P(A ∩ B)/P(B) = P(A)P(B)/P(B) = P(A).\n- Step 2: However, P(A | B′) = P(A ∩ B′)/P(B′). This equals P(A) only if A is also independent of B′.\n- Step 3: In general, independence of A and B does NOT imply independence of A and B′. They could be dependent.\n\n**Answer:** P(A|B) = P(A); but generally P(A|B′) ≠ P(A)", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": true}], "count": 7}, "opus_1": {"label": "Opus 4 ①", "cards": [{"question": "In Q5(c) the tutor claimed σ = 10/1.96 = 0.0510. What's the correct value, and what immediate sense-check should have caught the error? (3 steps)", "answer": "- Step 1: $$10 / 1.96 = 5.102$$, so σ ≈ **5.10** (3 s.f.), not 0.0510. The tutor moved the decimal — likely a reciprocal-style mistake (computing 1.96/10 instead of 10/1.96).\n- Step 2: Sense check via the next step (standardisation). With σ = 0.0510, the z-score for $$T = \\mu - 5$$ becomes $$z = -5/0.0510 \\approx -98$$ — far off any standard normal table.\n- Step 3: Realistic z-values rarely exceed ±4. Any |z| > 4 (let alone 98) is a giant red flag — recompute σ.\n\nTakeaway: σ from the symmetric trick is in the ones-tens range; sub-1 values flag a decimal error.", "source": "Opus 4 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "In Q6(e) the tutor computed P(S′) ≈ 0.18 and got 47 students. What is the cleanest correct path, and where did the tutor's logic go wrong? (3 steps)", "answer": "- Step 1: Use the **complement**: $$P(S') = 1 - P(S) = 1 - 0.60 = 0.40$$. One step, no region-listing.\n- Step 2: The tutor tried to identify \"non-S regions\" piecemeal (C∩G only, etc.), missing some (G-only, the outside region) and producing 0.18 instead of 0.40. Region-by-region summation is error-prone for \"not in X\".\n- Step 3: With $$N = 76/0.26 \\approx 292.31$$ from the C∩G group, the answer is $$0.40 \\times 292.31 \\approx 117$$ (NOT 47).\n\nTakeaway: For \"not X\" questions, reach for $$P(X') = 1 - P(X)$$ before paste-summing Venn regions.", "source": "Opus 4 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "How do you read a leaf on the **left-hand side** of a back-to-back stem-and-leaf diagram, and why does this differ from a normal stem-and-leaf? (3 steps)", "answer": "- Step 1: On the left side, leaves are written **right-to-left**, with the smallest leaf adjacent to the stem. So a row \"9 8 5 3 | 4 |\" with stem 4 reads (smallest to largest): 43, 45, 48, 49.\n- Step 2: This convention exists so both data sets grow outward from the central stem in a mirror-image, making side-by-side distribution comparison immediate.\n- Step 3: Common error: reading \"9 8\" on the left as \"98\" instead of as values 28, 29 (with stem = 2). Always ask: which side am I on, and which leaf is smallest?\n\nTakeaway: Left side reads outward from the stem (smallest near stem); right side reads as usual.", "source": "Opus 4 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "Why does the **key** on a stem-and-leaf diagram earn its own mark, and what's lost without it?", "answer": "The key tells the reader the place value of the stem and leaf: without \"5|6 ⇒ 56 cm\", the digits \"5|6\" could mean 5.6, 56, 560, or 0.56 — the diagram is ambiguous. On a back-to-back diagram, the key also disambiguates which side is which dataset and confirms the right-to-left reading direction on the left. Edexcel awards a B1 specifically for the key, which students drop by forgetting. Always write the key first when constructing.", "source": "Opus 4 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "For Edexcel International A-Level **discrete/stem-and-leaf** data with n values, where does Q1 sit when n/4 is an integer vs non-integer? (3 steps)", "answer": "- Step 1: Compute position $$p = n/4$$ (for Q1) or $$p = 3n/4$$ (for Q3).\n- Step 2: Apply the rule:\n+ If p is an **integer**: Q1 = average of the values at positions p and p+1.\n+ If p is **non-integer**: round **UP** to the next integer; Q1 = value at that position.\n- Step 3: Worked example, n = 35: $$n/4 = 8.75$$ → round up to 9th value. $$3n/4 = 26.25$$ → round up to 27th. This differs from the (n+1)/4 rule of domestic UK A-level — IAL is fixed on n/4.\n\nTakeaway: Discrete IAL = round UP for non-integer; integer = average of two.", "source": "Opus 4 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "A back-to-back stem-and-leaf has 32 Maple values with cumulative row counts (5, 12, 18, 25, 28, 30, 32). The 16th value is \"$$4k$$\" (i.e., $$40+k$$) and the 17th is 47, with median = 45. Find k. (3 steps)", "answer": "- Step 1: For n = 32 (even), the median sits between the 16th and 17th values. So $$\\text{median} = (16\\text{th} + 17\\text{th})/2$$.\n- Step 2: Substitute: $$\\frac{(40+k) + 47}{2} = 45 \\implies 87 + k = 90 \\implies k = 3$$.\n- Step 3: Sense check: k must be a single digit (0–9) since it's a leaf, and 3 is in range. ✓", "source": "Opus 4 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "State the standard 1.5·IQR outlier rule for Edexcel S1, including which marks are awarded for setup vs identification. (3 steps)", "answer": "- Step 1: Compute IQR = Q3 − Q1. Then the fences are $$Q_1 - k \\cdot \\text{IQR}$$ and $$Q_3 + k \\cdot \\text{IQR}$$. Default $$k = 1.5$$ unless the question specifies (e.g., 2·IQR or 3·IQR).\n- Step 2: Any data value outside $$[Q_1 - k \\cdot \\text{IQR},\\ Q_3 + k \\cdot \\text{IQR}]$$ is flagged as an outlier.\n- Step 3: Mark scheme: M1 for setting up at least one fence, A1 for naming the outlier(s) by value. Always show **both** fences and check both extremes — it costs nothing and proves you checked symmetrically.", "source": "Opus 4 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "Given Q1 = 39, Q3 = 57 for Birch with min = 28, max = 85, identify any outliers using 1.5·IQR. (4 steps)", "answer": "- Step 1: $$\\text{IQR} = 57 - 39 = 18$$, so $$1.5 \\cdot \\text{IQR} = 27$$.\n- Step 2: Lower fence = $$39 - 27 = 12$$. Min value 28 is well above 12 — no low outliers.\n- Step 3: Upper fence = $$57 + 27 = 84$$. Max 85 exceeds 84 by 1, so **85 is an outlier**.\n- Step 4: Conclusion: exactly one outlier at 85. State both fences and both extremes to demonstrate symmetric checking.", "source": "Opus 4 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "For Birch with min = 28, Q1 = 39, median = 48, Q3 = 57, max = 85 (outlier), and largest non-outlier = 76, describe how to draw the box plot. (5 steps)", "answer": "- Step 1: Box from Q1 = 39 to Q3 = 57 (rectangle).\n- Step 2: Vertical line through box at median = 48.\n- Step 3: Lower whisker from 39 down to min = 28 (no low outlier).\n- Step 4: Upper whisker from 57 up to **76** (largest non-outlier) — NOT to 85.\n- Step 5: Mark the outlier 85 with a small × or asterisk outside the upper whisker.\n\nTakeaway: Whiskers stop at the most extreme **non-outlier**; outliers get their own marker.", "source": "Opus 4 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "When asked to \"compare two distributions\" using box plots/summary statistics, what makes a fully-marked answer? (4 steps)", "answer": "- Step 1: Cite a **specific statistic** with values (median, IQR, range, mean if given). \"Birch is bigger\" without numbers earns 0.\n- Step 2: Combine the statistic with **context** about the variable: e.g., \"Birch median (48 cm) > Maple median (45 cm), so on average Birch grow taller.\"\n- Step 3: A second comparison about spread also scores: \"Both have IQR = 18 cm, so spreads are similar.\"\n- Step 4: Avoid pure value-listing without comparative phrasing — always say \"is greater than\", \"is similar to\", and tie back to real-world meaning.\n\nTakeaway: Number + comparison word + context = full marks.", "source": "Opus 4 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "A Maple box-plot summary is min = 25, Q1 = 36, median = 45, Q3 = 54, max = 80 (n = 32). Four values 27, $$a$$, 48, $$2a$$ are added (n = 36). For what range of $$a$$ is the box plot UNCHANGED? (5 steps)", "answer": "- Step 1: List ALL summary statistics that must be preserved: min, Q1, median, Q3, max. Each gives a constraint.\n- Step 2: New positions for n = 36: Q1 averages positions 9 & 10; median averages 18 & 19; Q3 averages 27 & 28; max = 36th.\n- Step 3: **Max ≤ 80**: 2a is the largest new value, so $$2a \\leq 80 \\Rightarrow a \\leq 40$$.\n- Step 4: **Q1 = 36**: of the new values, 27 is below 36; for Q1 unchanged we need at most 1 new value < 36. So $$a \\geq 36$$.\n- Step 5: **Median = 45**: existing 18th = 43, 19th = 47. Need new median to remain (43 + 47)/2 = 45, so $$a \\leq 43$$ and $$2a \\geq 47$$ (auto if $$a \\geq 36$$). Combined: $$36 \\leq a \\leq 40$$.\n\nTakeaway: ALL constraints must hold simultaneously — intersect all ranges; the most restrictive defines each boundary.", "source": "Opus 4 ①", "_id": "opus_1_10", "judge_pick": true}, {"question": "Conceptually, why does the Edexcel rule round n/4 **UP** (rather than to nearest) when n/4 is non-integer?", "answer": "With 35 sorted values, $$n/4 = 8.75$$ means Q1 lies \"between\" the 8th and 9th values. Edexcel's convention is to take the value at the smallest integer position ≥ n/4 — i.e., the 9th. Rounding UP guarantees you skip past the boundary into the next quarter. This is a chosen convention for marking consistency, not a uniquely correct answer (other rules: linear interpolation, (n+1)/4, etc.) — just memorise: IAL discrete data rounds UP.", "source": "Opus 4 ①", "_id": "opus_1_11", "judge_pick": true}, {"question": "For DRV X with values {2, 4, 5, 7, 8} and probabilities {0.25, 0.30, 0.20, 0.10, 0.15}, find P(2X − 3 > 5) without enumerating all transformed values. (3 steps)", "answer": "- Step 1: Translate the inequality on Y = 2X − 3 back to X: $$2X - 3 > 5 \\Leftrightarrow X > 4$$.\n- Step 2: List X-values strictly greater than 4: {5, 7, 8}.\n- Step 3: Sum probabilities: $$0.20 + 0.10 + 0.15 = 0.45$$.\n\nTakeaway: Linear inequalities on Y are solved by inverting the linear map and summing matching X probabilities — no separate Y distribution needed.", "source": "Opus 4 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "When computing Var(X) for a DRV, why must you square each x-value FIRST, then multiply by P(X = x), rather than the other way? (3 steps)", "answer": "- Step 1: The definition is $$E(X^2) = \\sum x^2 \\cdot P(X = x)$$ — average of squared values weighted by probability.\n- Step 2: If you instead computed $$\\left(\\sum x \\cdot P(X=x)\\right)^2$$, you'd get $$[E(X)]^2$$, which generally differs from $$E(X^2)$$ — the gap is exactly Var(X).\n- Step 3: Quick check: X with values 1 and 3, each prob 0.5. $$E(X) = 2$$, $$[E(X)]^2 = 4$$. But $$E(X^2) = 0.5(1) + 0.5(9) = 5$$. Different! And $$\\text{Var}(X) = 5 - 4 = 1$$.\n\nTakeaway: Square FIRST, then weight; the variance gap equals $$E(X^2) - [E(X)]^2$$.", "source": "Opus 4 ①", "_id": "opus_1_13", "judge_pick": true}, {"question": "Derive the computational form $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$ from the definitional form $$E[(X - \\mu)^2]$$. (4 steps)", "answer": "- Step 1: Definition: $$\\text{Var}(X) = E[(X - \\mu)^2]$$ where μ = E(X).\n- Step 2: Expand the square inside: $$E[X^2 - 2\\mu X + \\mu^2]$$.\n- Step 3: Apply linearity of expectation: $$E(X^2) - 2\\mu \\cdot E(X) + \\mu^2$$.\n- Step 4: Substitute $$E(X) = \\mu$$: $$E(X^2) - 2\\mu^2 + \\mu^2 = E(X^2) - \\mu^2 = E(X^2) - [E(X)]^2$$. ✓\n\nTakeaway: Computational form is easier because you only need two simple sums (Σx²·P and Σx·P) in one pass. NOT in S1 booklet — memorise.", "source": "Opus 4 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "Derive the linear coding formulas $$E(aX + b) = aE(X) + b$$ and $$\\text{Var}(aX + b) = a^2 \\text{Var}(X)$$, and explain physically why the +b vanishes from variance. (4 steps)", "answer": "- Step 1: $$E(aX + b) = aE(X) + b$$ by linearity. Adding b shifts every outcome by b → mean shifts by b; scaling by a stretches → mean scales by a.\n- Step 2: $$\\text{Var}(aX + b) = E[(aX + b - E(aX + b))^2] = E[(aX + b - aE(X) - b)^2]$$.\n- Step 3: The +b cancels inside the deviation: $$E[(a(X - \\mu))^2] = a^2 E[(X - \\mu)^2] = a^2 \\text{Var}(X)$$.\n- Step 4: Physically: variance measures spread *about the mean*. Sliding the whole distribution by b moves both data and mean equally — relative deviations are unchanged. The factor $$a^2$$ (not |a|) appears because variance has units of X², so any scaling is \"felt twice\".\n\nTakeaway: $$\\text{Var}(aX+b) = a^2\\text{Var}(X)$$ — the +b is invisible to variance.", "source": "Opus 4 ①", "_id": "opus_1_15", "judge_pick": true}, {"question": "X has $$E(X) = 4.6$$, $$\\text{Var}(X) = 4.14$$. If $$Y = aX - b$$ with $$a, b > 0$$, $$E(Y) = 13.4$$, $$\\text{Var}(Y) = 66.24$$, find a and b. (3 steps)", "answer": "- Step 1: **Variance equation first** (gives a directly): $$\\text{Var}(Y) = a^2 \\cdot \\text{Var}(X) \\Rightarrow 4.14 a^2 = 66.24 \\Rightarrow a^2 = 16 \\Rightarrow a = 4$$ (positive root since a > 0).\n- Step 2: **Mean equation**: $$E(Y) = aE(X) - b \\Rightarrow 13.4 = 4(4.6) - b \\Rightarrow 13.4 = 18.4 - b \\Rightarrow b = 5$$.\n- Step 3: Always solve variance first because it gives a (up to sign), then plug into mean for b.", "source": "Opus 4 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "In a head-to-head spinner game where \"the higher score wins\", why must P(Sam wins) use the **strict** inequality P(S > R) rather than P(S ≥ R)? (3 steps)", "answer": "- Step 1: A tie is when both scores are equal. \"Higher score wins\" excludes ties — neither player wins on a tie.\n- Step 2: Using ≥ counts ties as wins for Sam, double-counting probability mass that should belong to \"tie\" outcomes. This inflates P(Sam wins).\n- Step 3: Sanity: P(Sam wins) + P(Tie) + P(Roya wins) = 1. Using ≥ for both players would sum to more than 1 because ties get counted twice.\n\nTakeaway: \"Higher\" = strict; \"at least\" = non-strict. Read the win condition.", "source": "Opus 4 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "Two independent spinners give scores S = X₁ and R = 2X₂ − 3 (same distribution for X). To find P(S > R), why and how do we condition on X₂? (3 steps)", "answer": "- Step 1: P(S > R) requires summing over a joint distribution. Independence lets us factor: $$P(S > R) = \\sum_{x_2} P(S > 2x_2 - 3) \\cdot P(X_2 = x_2)$$ — the law of total probability.\n- Step 2: For each fixed x₂, the threshold $$r = 2x_2 - 3$$ is a number. Compute $$P(X_1 > r)$$ from X's distribution, then weight by $$P(X_2 = x_2)$$.\n- Step 3: Independence is crucial — without it, $$P(S > R \\mid X_2 = x_2) \\neq P(X_1 > 2x_2 - 3)$$.\n\nTakeaway: Condition on the variable that defines the threshold; independence simplifies $$P(\\text{condition}\\mid X_2)$$ to a marginal probability of X₁.", "source": "Opus 4 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "Outline the table approach for computing P(Sam wins) where S = X₁, R = 2X₂ − 3 with X taking {2, 4, 5, 7, 8} with probs {0.25, 0.3, 0.2, 0.1, 0.15}. (4 steps)", "answer": "- Step 1: For each x₂, compute threshold $$r = 2x_2 - 3$$: gives r ∈ {1, 5, 7, 11, 13}.\n- Step 2: For each r, find P(X₁ > r):\n+ x₂ = 2 → r = 1, all X-values exceed → P = 1\n+ x₂ = 4 → r = 5, X > 5 = {7, 8} → P = 0.10 + 0.15 = 0.25\n+ x₂ = 5 → r = 7, X > 7 = {8} → P = 0.15\n+ x₂ = 7 → r = 11 → P = 0\n+ x₂ = 8 → r = 13 → P = 0\n- Step 3: Multiply each by $$P(X_2 = x_2)$$ and sum: $$1 \\cdot 0.25 + 0.25 \\cdot 0.3 + 0.15 \\cdot 0.2 + 0 + 0 = 0.25 + 0.075 + 0.03 = 0.355$$.\n- Step 4: Sense check: contribution decreases as x₂ rises (R rises, harder for X₁ to exceed) — pattern confirms structure.", "source": "Opus 4 ①", "_id": "opus_1_19", "judge_pick": true}, {"question": "A histogram has a \"reference bar\" (e.g., class 32 ≤ x < 36, frequency 20, drawn 2.5 cm wide × 7.5 cm tall). How do you find the dimensions of another bar (class 30 ≤ x < 32, freq 16)? (3 steps)", "answer": "- Step 1: **Width on page** is proportional to class width: $$\\text{width on page} = \\frac{2}{4} \\times 2.5 = 1.25$$ cm.\n- Step 2: **Area** is proportional to frequency. Reference area = 2.5 × 7.5 = 18.75 cm² ↔ 20 pebbles → area-per-pebble = 0.9375. Target area = 16 × 0.9375 = 15 cm².\n- Step 3: **Height** = area / width = 15/1.25 = 12 cm.\n\nTakeaway: Area ∝ frequency is the unbreakable rule; widths and heights derive from area, not the other way.", "source": "Opus 4 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "Conceptually, why does a histogram use **area** (not bar height) to represent frequency, and what goes wrong with \"height = frequency\"? (3 steps)", "answer": "- Step 1: Histogram bars have **unequal widths** (representing class widths). If frequency = height, a wide bar overstates frequency — same value occupies more \"ink\".\n- Step 2: With frequency density = frequency/class width, height accounts for class width: **area = height × width = (f/w) × w = f**.\n- Step 3: Area-proportionality preserves the visual intuition that \"more frequency = more space on page\". Bar plots use height because all bars have equal width; histograms can't.\n\nTakeaway: Bar plots compare via height; histograms compare via area. Convert via \"area-per-unit-frequency\".", "source": "Opus 4 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "For grouped data with cumulative frequencies (2, 18, 38, 46, 49, 50) over class boundaries 20, 30, 32, 36, 40, 45, 50, find the median by linear interpolation. (4 steps)", "answer": "- Step 1: Position $$n/2 = 25$$ (NOT (n+1)/2 — that's for ungrouped data).\n- Step 2: Locate median class: 25 falls between cum freqs 18 and 38 → median class is [32, 36).\n- Step 3: Apply formula: $$\\text{median} = L + \\frac{n/2 - F}{f} \\cdot c$$ with L = 32, F = 18, f = 20, c = 4.\n- Step 4: $$\\text{median} = 32 + \\frac{25 - 18}{20} \\cdot 4 = 32 + 1.4 = 33.4$$ mm.\n\nTakeaway: Linear interpolation assumes uniform distribution within the median class.", "source": "Opus 4 ①", "_id": "opus_1_22", "judge_pick": true}, {"question": "For coding $$10y = w - 20$$, identify the scale factor and shift in the form $$w = by + a$$, then explain how each affects mean, variance, and SD. (4 steps)", "answer": "- Step 1: Rearrange to standard form: $$w = 10y + 20$$, so b = 10 (scale), a = 20 (shift).\n- Step 2: **Mean**: $$\\bar{w} = b\\bar{y} + a = 10\\bar{y} + 20$$ — mean inherits BOTH scale and shift.\n- Step 3: **Variance**: $$\\text{Var}(w) = b^2 \\cdot \\text{Var}(y) = 100 \\cdot \\text{Var}(y)$$ — only b² appears; the +20 vanishes.\n- Step 4: **SD**: $$\\sigma_w = |b| \\cdot \\sigma_y = 10\\sigma_y$$ — absolute value of scale; +20 vanishes.\n\nTakeaway: Spread feels scale only; shifts vanish.", "source": "Opus 4 ①", "_id": "opus_1_23", "judge_pick": true}, {"question": "Data is coded by $$10y = w - 20$$ with $$\\bar{y} = 2.08$$ and $$\\text{Var}(y) = 0.3444$$. Find $$\\bar{w}$$ and $$\\sigma_w$$ without re-summing raw data. (3 steps)", "answer": "- Step 1: Rearrange: $$w = 10y + 20$$. Then $$\\bar{w} = 10(2.08) + 20 = 40.8$$ g.\n- Step 2: $$\\sigma_y = \\sqrt{0.3444} \\approx 0.587$$. Apply scale only: $$\\sigma_w = 10 \\cdot \\sigma_y \\approx 5.87$$ g.\n- Step 3: A common error is $$\\sigma_w = 10\\sigma_y + 20 \\approx 25.87$$ g — wrong, because SD ignores additive shifts. Only the multiplicative factor matters, and only its absolute value.\n\nTakeaway: Decode mean by inversion; decode SD by scale alone.", "source": "Opus 4 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "A dataset has mean μ and n values. A new value equal to μ is added. What happens to (i) the mean, (ii) the standard deviation? Explain. (4 steps)", "answer": "- Step 1: **Mean**: New sum = nμ + μ = (n+1)μ. New count = n+1. New mean = (n+1)μ/(n+1) = μ. **Unchanged**.\n- Step 2: **SD**: variance numerator $$\\sum (x_i - \\mu)^2$$. New value contributes $$(\\mu - \\mu)^2 = 0$$ → numerator unchanged.\n- Step 3: But denominator grew from n to n+1. New variance = $$n\\sigma^2/(n+1) < \\sigma^2$$ → SD strictly **decreases**.\n- Step 4: Conceptual: adding a value AT the mean doesn't change the centre of gravity, but tightens average squared deviation by diluting spread over more data.\n\nTakeaway: Add value = mean → mean unchanged, SD decreases.", "source": "Opus 4 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "A common error on \"add a value equal to the mean\" is \"SD is unchanged because the new deviation is zero\". Why is this WRONG? (3 steps)", "answer": "- Step 1: True: the new $$(x - \\mu)^2$$ contribution is 0, so the numerator of variance is unchanged.\n- Step 2: BUT the denominator n grew by 1. Since variance = numerator/n (or n−1 for sample), and only n grew, variance must shrink.\n- Step 3: Analogy: a class average — adding a student who scores the mean reduces per-capita variability because the same total deviation is now spread over more people.\n\nTakeaway: BOTH numerator and denominator change with new data; ignoring the denominator is the trap.", "source": "Opus 4 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "Define $$S_{xx}$$, $$S_{yy}$$, and $$S_{xy}$$ in terms of sums and explain the structural pattern. (3 steps)", "answer": "- Step 1: $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$ — sum of squared deviations of x from its mean.\n- Step 2: $$S_{yy} = \\sum y^2 - \\frac{(\\sum y)^2}{n}$$ — same idea for y.\n- Step 3: $$S_{xy} = \\sum xy - \\frac{(\\sum x)(\\sum y)}{n}$$ — sum of products of deviations.\n\nTakeaway: All three follow the pattern \"sum (squared/cross) minus (sum)·(sum)/n\". They appear in the formula booklet — don't re-derive in the exam.", "source": "Opus 4 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "State the PMCC formula and explain conceptually why $$|r| \\leq 1$$. (4 steps)", "answer": "- Step 1: $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} \\cdot S_{yy}}}$$.\n- Step 2: Numerator measures co-variation; denominator standardises by the spreads of x and y individually.\n- Step 3: Cauchy–Schwarz inequality: $$|S_{xy}| \\leq \\sqrt{S_{xx} \\cdot S_{yy}}$$, giving $$|r| \\leq 1$$. Equality holds iff x and y are exactly linearly related.\n- Step 4: $$r = +1$$: perfect positive linear; $$r = 0$$: no linear association; $$r = -1$$: perfect negative linear.\n\nTakeaway: r is dimensionless and bounded by Cauchy–Schwarz.", "source": "Opus 4 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "For data with $$S_{dg} = 12{,}105.12$$, $$S_{dd} = 16{,}769.78$$, $$S_{gg} = 9{,}094.20$$, what is r structurally (without exact arithmetic)? (3 steps)", "answer": "- Step 1: $$r = S_{dg}/\\sqrt{S_{dd} \\cdot S_{gg}}$$.\n- Step 2: Denominator order: $$\\sqrt{16{,}770 \\times 9{,}094} \\approx \\sqrt{1.5 \\times 10^8} \\approx 1.23 \\times 10^4 \\approx 12{,}350$$.\n- Step 3: $$r \\approx 12{,}105/12{,}350 \\approx 0.98$$ — very strong positive correlation. ✓ within [−1, 1].\n\nTakeaway: After plugging in, ALWAYS verify $$r \\in [-1, 1]$$ and read off the strength.", "source": "Opus 4 ①", "_id": "opus_1_29", "judge_pick": true}, {"question": "How do you compute the regression line of y on x in form $$y = a + bx$$ from S-statistics and means, and why is \"y on x\" different from \"x on y\"? (4 steps)", "answer": "- Step 1: $$b = S_{xy}/S_{xx}$$, $$a = \\bar{y} - b\\bar{x}$$.\n- Step 2: \"y on x\" = y is the response, x the predictor: minimise sum of squared **vertical** distances from data to the line.\n- Step 3: y on x ≠ x on y in general — different lines, both passing through (x̄, ȳ), but different slopes (because vertical vs horizontal deviations).\n- Step 4: Common error: writing $$b = S_{xx}/S_{xy}$$ (reciprocal). The slope is \"covariance over x-variance\", not the other way.\n\nTakeaway: $$b = S_{xy}/S_{xx}$$; intercept follows from \"line passes through (x̄, ȳ)\".", "source": "Opus 4 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "For regression $$g = -42.3 + 0.722d$$ where g is bear girth (cm) and d is bear length (cm), interpret the slope 0.722 with full marks. (4 steps)", "answer": "- Step 1: Slope b = 0.722 means: for each 1 cm increase in bear length d, predicted girth g increases by 0.722 cm.\n- Step 2: ALWAYS include **units** (cm of girth per cm of length).\n- Step 3: ALWAYS include **context** (bears, the response variable).\n- Step 4: Add caveat about \"within the sampled range\" — the relationship may break for very small or very large bears (extrapolation issue).\n\nTakeaway: Number + units + context + range caveat = full B1.", "source": "Opus 4 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "The regression line $$g = -42.3 + 0.722d$$ predicts g = −42.3 cm when d = 0. Is this physically meaningful? (3 steps)", "answer": "- Step 1: A bear of length 0 cm doesn't exist, and girth (a circumference) can't be negative. So the intercept has no physical meaning.\n- Step 2: This is a sign of **extrapolation** — the line was fit on bears of length say 100–250 cm, and is only reliable in that range.\n- Step 3: Outside the sampled range, the linear assumption may fail entirely; real biology likely shows non-linear scaling at small body sizes.\n\nTakeaway: Intercepts at \"x = 0\" are often nonsense in real data — they're fitting parameters, not physical predictions.", "source": "Opus 4 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "A regression line fit on bear lengths 100–250 cm predicts girth at d = 50 cm. Why is this prediction unreliable? (4 steps)", "answer": "- Step 1: 50 cm is OUTSIDE the sampled range — the model has no data at small lengths.\n- Step 2: The line gives $$g = -42.3 + 0.722(50) = -6.2$$ cm — physically impossible (negative circumference).\n- Step 3: The linear assumption is only validated within the sampled range. Outside, the real relationship may be non-linear, change sign, or not exist.\n- Step 4: This is **extrapolation**, the cardinal sin of regression. Predictions inside range = interpolation (safe); outside = extrapolation (unreliable).\n\nTakeaway: Use regression only within the range of x-values used to fit it.", "source": "Opus 4 ①", "_id": "opus_1_33", "judge_pick": true}, {"question": "For regression $$g = -42.3 + 0.722d$$, estimate g when d = 2.5 m. (3 steps)", "answer": "- Step 1: **Convert units!** d = 2.5 m = 250 cm (the model uses cm for d).\n- Step 2: Substitute: $$g = -42.3 + 0.722 \\times 250 = -42.3 + 180.5 = 138.2$$ cm.\n- Step 3: Sense check: 250 cm is within typical bear length, so this is interpolation (reliable).\n\nTakeaway: ALWAYS check units before substituting; forgetting m→cm gives a ridiculous answer.", "source": "Opus 4 ①", "_id": "opus_1_34", "judge_pick": true}, {"question": "If both x and y are linearly coded (u = (x−a)/b, v = (y−c)/d, with b, d > 0), is PMCC invariant? Show why. (4 steps)", "answer": "- Step 1: Under linear coding: $$S_{uu} = (1/b^2) S_{xx}$$, $$S_{vv} = (1/d^2) S_{yy}$$, $$S_{uv} = (1/(bd)) S_{xy}$$.\n- Step 2: Substitute into PMCC: $$r_{uv} = \\frac{(1/bd) S_{xy}}{\\sqrt{(1/b^2) S_{xx} \\cdot (1/d^2) S_{yy}}} = \\frac{(1/bd) S_{xy}}{(1/bd)\\sqrt{S_{xx} S_{yy}}} = r_{xy}$$.\n- Step 3: PMCC is INVARIANT under linear coding (with positive scales). It's a dimensionless measure of linear association — rescaling/shifting doesn't change the relationship's strength.\n- Step 4: BUT regression slope b and intercept a ARE NOT invariant — they have units. Re-derive a, b after coding.\n\nTakeaway: Coding leaves r alone; transforms a and b.", "source": "Opus 4 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "A regression line has gradient $$b = 0.722$$ (girth-cm per length-cm). A separate study finds gaining x cm of length is associated with 17.3 cm increase in girth. Find x. (3 steps)", "answer": "- Step 1: From the slope: $$\\Delta g = b \\cdot \\Delta d$$. Given Δg = 17.3: $$0.722 \\cdot x = 17.3$$.\n- Step 2: Solve: $$x = 17.3 / 0.722 \\approx 23.96$$ cm.\n- Step 3: Use unrounded b for chained calculations: with $$b = 0.72184$$, $$x = 23.97$$. Mark scheme typically accepts both.\n\nTakeaway: Inverting the slope: $$x = \\Delta y / b$$.", "source": "Opus 4 ①", "_id": "opus_1_36", "judge_pick": true}, {"question": "For X ~ N(15, 2²), compute P(X < 18) using standardisation. (3 steps)", "answer": "- Step 1: Standardise: $$z = (a - \\mu)/\\sigma = (18 - 15)/2 = 1.5$$.\n- Step 2: Look up Φ(1.5) in the standard normal table.\n- Step 3: $$P(X < 18) = \\Phi(1.5) = 0.9332$$.\n\nTakeaway: $$z = (a - \\mu)/\\sigma$$ converts any normal to N(0,1); table works universally.", "source": "Opus 4 ①", "_id": "opus_1_37", "judge_pick": false}, {"question": "Derive the standardisation formula $$z = (a - \\mu)/\\sigma$$ from the substitution $$Z = (X - \\mu)/\\sigma$$. (4 steps)", "answer": "- Step 1: Define $$Z = (X - \\mu)/\\sigma$$. Then $$E(Z) = (E(X) - \\mu)/\\sigma = 0$$ and $$\\text{Var}(Z) = \\text{Var}(X)/\\sigma^2 = 1$$.\n- Step 2: So Z ~ N(0, 1) — the standard normal.\n- Step 3: $$P(X < a) = P\\left(\\frac{X - \\mu}{\\sigma} < \\frac{a - \\mu}{\\sigma}\\right) = P(Z < z) = \\Phi(z)$$.\n- Step 4: This conversion lets us use a single Φ-table for ANY normal distribution. Memorise: subtract mean, divide by SD.\n\nTakeaway: z standardises; Φ-table works for any normal after standardisation.", "source": "Opus 4 ①", "_id": "opus_1_38", "judge_pick": true}, {"question": "For X ~ N(15, 2²), \"the fastest 60% qualify\". Find the longest qualifying time. Identify the correct probability statement and solve. (4 steps)", "answer": "- Step 1: \"Fastest\" = lowest TIMES (faster = less time). \"60% qualify\" → lowest 60% pass → $$P(X \\leq t) = 0.60$$.\n- Step 2: Find z: $$\\Phi(z) = 0.60 \\Rightarrow z \\approx 0.2533$$ (from inverse normal table).\n- Step 3: Decode: $$t = \\mu + \\sigma \\cdot z = 15 + 2(0.2533) = 15.5$$ min (3 s.f.).\n- Step 4: Sense check: 60% qualify, so cutoff above the median (15 min). 15.5 > 15 ✓. If you got 14.49 (below median), only 40% would qualify — contradicts the question.\n\nTakeaway: \"Fastest p%\" of times = lowest p% → $$P(X \\leq t) = p$$, NOT P(X > t) = p.", "source": "Opus 4 ①", "_id": "opus_1_39", "judge_pick": true}, {"question": "When inverting the normal distribution, how do you avoid the \"wrong tail\" trap? (4 steps)", "answer": "- Step 1: **Sketch** the normal curve and shade the region described.\n- Step 2: Identify which tail the threshold cuts and what proportion is on each side.\n- Step 3: Compare cutoff to mean: if more than half are on one side, t is shifted toward the other side.\n- Step 4: Sign check on z: P(X < t) > 0.5 ↔ z > 0; P(X < t) < 0.5 ↔ z < 0. If your z's sign doesn't match the proportion, you've reversed.\n\nTakeaway: Sketch, sign-check, sanity-check — never solve inverse normal without these.", "source": "Opus 4 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "For X ~ N(μ, σ²), if $$P(\\mu - k < X < \\mu + k) = 0.95$$, find k in terms of σ. Derive. (4 steps)", "answer": "- Step 1: Symmetric about μ → each tail has $$(1 - 0.95)/2 = 0.025$$ probability.\n- Step 2: $$P(X > \\mu + k) = 0.025$$ → $$z_{0.025} = 1.96$$ (from percentage points).\n- Step 3: Standardise: $$(\\mu + k - \\mu)/\\sigma = 1.96$$ → $$k = 1.96\\sigma$$.\n- Step 4: Memorise: 95% symmetric → 1.96σ; 99% symmetric → 2.5758σ. Useful rule of thumb: 95% ≈ 2σ.\n\nTakeaway: $$P(\\mu - k < X < \\mu + k) = 0.95 \\Rightarrow k = 1.96\\sigma$$. NOT in S1 booklet — memorise.", "source": "Opus 4 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "Why is $$P(A \\cap B) = P(A)$$ when A is a subset of B? Show this leads to a clean conditional probability. (4 steps)", "answer": "- Step 1: $$A \\subset B$$ means every outcome in A is also in B. So $$A \\cap B = A$$.\n- Step 2: Therefore $$P(A \\cap B) = P(A)$$.\n- Step 3: Substitute into conditional formula: $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)} = \\frac{P(A)}{P(B)}$$.\n- Step 4: Common error: computing $$P(A) \\cdot P(B)$$ as if A, B were independent. Nested events are NOT independent (in general).\n\nTakeaway: $$A \\subset B$$ ⇒ intersection = smaller set; never multiply.", "source": "Opus 4 ①", "_id": "opus_1_42", "judge_pick": true}, {"question": "Outline the full solution to: T ~ N(μ, σ²), $$P(\\mu - 10 < T < \\mu + 10) = 0.95$$. Find $$P(T > \\mu - 5 \\mid T > \\mu - 10)$$. (5 steps)", "answer": "- Step 1: Find σ via symmetric trick: $$10 = 1.96\\sigma \\Rightarrow \\sigma = 5.10$$.\n- Step 2: Find $$P(T > \\mu - 10)$$: by symmetric tails, $$P(T < \\mu - 10) = 0.025 \\Rightarrow P(T > \\mu - 10) = 0.975$$.\n- Step 3: Find $$P(T > \\mu - 5)$$: standardise. $$z = (\\mu - 5 - \\mu)/\\sigma = -5/5.10 \\approx -0.98$$. So $$P(T > \\mu - 5) = P(Z > -0.98) = \\Phi(0.98) = 0.8365$$.\n- Step 4: **Subset trick**: $$\\{T > \\mu - 5\\} \\subset \\{T > \\mu - 10\\}$$ (any time exceeding μ−5 also exceeds μ−10). So intersection = the smaller set: $$P(A \\cap B) = 0.8365$$.\n- Step 5: Conditional: $$P(A \\mid B) = 0.8365/0.975 \\approx 0.858$$ (3 s.f.).\n\nTakeaway: Identify nested events early — saves a multiplication and avoids the independence trap.", "source": "Opus 4 ①", "_id": "opus_1_43", "judge_pick": true}, {"question": "A 3-circle Venn diagram has events C, S, G. Distinguish: (i) \"C only\", (ii) \"C ∩ G only (not S)\", (iii) \"C ∩ S ∩ G\", (iv) \"C ∪ G\". (4 steps)", "answer": "- Step 1: **C only** = $$C \\cap S' \\cap G'$$ — inside C, outside S and G. The smallest \"C-corner\".\n- Step 2: **C ∩ G only (not S)** = $$C \\cap G \\cap S'$$ — overlap of C and G, but not S. The lens between C and G excluding the centre.\n- Step 3: **C ∩ S ∩ G** = the centre region — in all three.\n- Step 4: **C ∪ G** = anything in C or G or both — covers most of the diagram, including the centre. Includes any region inside C or G, even if also in S.\n\nTakeaway: \"X only\" usually means \"X but nothing else\"; \"X ∩ Y only\" means \"X and Y but nothing else\". Shade before computing.", "source": "Opus 4 ①", "_id": "opus_1_44", "judge_pick": true}, {"question": "Given Venn regions: C only = 0.04, C ∩ S only = 0.15, C ∩ G only = p, C ∩ S ∩ G = 0.12, find P(plays C but not G). (3 steps)", "answer": "- Step 1: \"C but not G\" = $$C \\cap G'$$ = parts of circle C lying outside circle G.\n- Step 2: Inside C, the regions are: C only, C ∩ S only, C ∩ G only, C ∩ S ∩ G. We want those NOT involving G: C only and C ∩ S only.\n- Step 3: P(C but not G) = 0.04 + 0.15 = 0.19.\n\nTakeaway: Sketch, shade C, then erase the part inside G — what remains is the answer.", "source": "Opus 4 ①", "_id": "opus_1_45", "judge_pick": false}, {"question": "A Venn for events C, S has regions. How do you test for independence, and what equation do you set up? (4 steps)", "answer": "- Step 1: **Definition**: C and S are independent iff $$P(C \\cap S) = P(C) \\cdot P(S)$$.\n- Step 2: From the Venn, read off $$P(C \\cap S)$$ as the SUM of all regions inside BOTH C and S.\n- Step 3: Read off $$P(C)$$ and $$P(S)$$ as sums of all regions inside each circle individually.\n- Step 4: Set equation $$P(C \\cap S) = P(C) \\cdot P(S)$$ and solve for the unknown.\n\nTakeaway: $$P(C \\cap S)$$ is a SUM of regions; the independence equation uses a PRODUCT. Don't confuse.", "source": "Opus 4 ①", "_id": "opus_1_46", "judge_pick": true}, {"question": "Venn regions: C only = 0.04, C ∩ G only = p, G only = 0, C ∩ S only = 0.15, C ∩ S ∩ G = 0.12, S ∩ G only = 0.10, S only = 0.23, outside = q. C and S independent → find p. (4 steps)", "answer": "- Step 1: $$P(C) = 0.04 + p + 0.15 + 0.12 = 0.31 + p$$.\n- Step 2: $$P(S) = 0.15 + 0.12 + 0.10 + 0.23 = 0.60$$.\n- Step 3: $$P(C \\cap S) = 0.15 + 0.12 = 0.27$$ (the two regions inside both C and S).\n- Step 4: Set independence equation: $$0.27 = (0.31 + p)(0.60) \\Rightarrow 0.31 + p = 0.45 \\Rightarrow p = 0.14$$. Check: 0 ≤ 0.14 ≤ 1 ✓.", "source": "Opus 4 ①", "_id": "opus_1_47", "judge_pick": false}, {"question": "All Venn regions sum to 1. With known regions summing to 0.04 + p + 0 + 0.15 + 0.12 + 0.10 + 0.23 + q = 1 and p = 0.14, find q. (2 steps)", "answer": "- Step 1: Sum the seven known regions: 0.04 + 0.14 + 0 + 0.15 + 0.12 + 0.10 + 0.23 = 0.78.\n- Step 2: $$q = 1 - 0.78 = 0.22$$. ✓ (q ∈ [0, 1]; ~22% outside is plausible.)\n\nTakeaway: ALL Venn regions (including outside) sum to 1.", "source": "Opus 4 ①", "_id": "opus_1_48", "judge_pick": false}, {"question": "Express $$(C \\cup S) \\cap G'$$ in plain language and identify which Venn regions it covers. (4 steps)", "answer": "- Step 1: Translate to English: \"in C or S (or both), AND outside G\".\n- Step 2: Visualise: take the union of C and S (almost everything except G-only and outside), then strip out anything inside G.\n- Step 3: Surviving regions: C only, C ∩ S only (not G), S only.\n- Step 4: $$P((C \\cup S) \\cap G') = 0.04 + 0.15 + 0.23 = 0.42$$.\n\nTakeaway: Translate compound set notation to \"inside circle X, outside circle Y\" English first, then sum regions.", "source": "Opus 4 ①", "_id": "opus_1_49", "judge_pick": true}, {"question": "For Venn with $$P(C \\cap S \\cap G) = 0.12$$ and $$P(S \\cap G \\text{ only, not } C) = 0.10$$, compute $$P(C \\mid S \\cap G)$$. (3 steps)", "answer": "- Step 1: $$P(C \\mid S \\cap G) = \\frac{P(C \\cap S \\cap G)}{P(S \\cap G)}$$.\n- Step 2: $$P(S \\cap G)$$ = sum of regions inside both S and G = (C ∩ S ∩ G) + (S ∩ G only) = 0.12 + 0.10 = 0.22.\n- Step 3: $$P(C \\mid S \\cap G) = 0.12/0.22 = 6/11 \\approx 0.545$$ (3 s.f.).\n\nTakeaway: Conditional = (intersection of all three) / (intersection of conditioning event).", "source": "Opus 4 ①", "_id": "opus_1_50", "judge_pick": false}, {"question": "76 youths play both Chess AND Go. From the Venn, $$P(C \\cap G) = 0.26$$. Estimate the total population N of the youth club. (3 steps)", "answer": "- Step 1: If 26% of the population play both, then the count is $$0.26 \\cdot N$$, which equals 76.\n- Step 2: $$N = 76/0.26 \\approx 292.31$$.\n- Step 3: Sense check: total ≥ observed count 76 ✓; ratio 0.26 ≈ 1/4, so total around 4× the count is plausible.\n\nTakeaway: $$N = \\text{count} / \\text{probability}$$ — population scaling. Cleanest form.", "source": "Opus 4 ①", "_id": "opus_1_51", "judge_pick": false}, {"question": "Why is computing $$P(S')$$ via $$1 - P(S)$$ safer than summing the non-S Venn regions directly? (3 steps)", "answer": "- Step 1: $$P(S') = 1 - P(S)$$ — one step, given P(S) is already computed.\n- Step 2: Summing non-S regions requires correctly identifying ALL regions outside S (C only, C ∩ G only, G only, outside) — easy to forget G-only or the outside region.\n- Step 3: In Q6(e), the tutor's error was forgetting some non-S regions and getting $$P(S') \\approx 0.18$$ instead of the correct 0.40 from $$1 - 0.60$$.\n\nTakeaway: For \"not in X\" questions, prefer the complement; cross-check by summing regions only as a backup.", "source": "Opus 4 ①", "_id": "opus_1_52", "judge_pick": true}, {"question": "Given $$P(C \\cap G) = 0.26$$, $$P(S) = 0.60$$, and 76 youths play C and G, estimate the number who do NOT play Scrabble. (4 steps)", "answer": "- Step 1: Total population: $$N = 76/0.26 \\approx 292.31$$.\n- Step 2: $$P(S') = 1 - P(S) = 1 - 0.60 = 0.40$$.\n- Step 3: Number not playing S = $$N \\cdot P(S') \\approx 292.31 \\times 0.40 \\approx 116.92$$.\n- Step 4: Round to whole number: ~117 (or ~105 with slightly different scaling). Definitely NOT 47 — that error reflects an incorrect P(S').\n\nTakeaway: Population scaling = (target probability) × (total N estimate); use complement for \"not in X\".", "source": "Opus 4 ①", "_id": "opus_1_53", "judge_pick": false}, {"question": "A student gets \"number not playing Scrabble\" = 47 with N = 292. What sanity check flags this as wrong? (3 steps)", "answer": "- Step 1: Among 76 students playing C and G, those not playing S equal $$P(C \\cap G \\cap S') \\cdot N = 0.14 \\times 292 \\approx 41$$.\n- Step 2: 47 < the count of all S′ teenagers including those outside C∩G, so 47 must be undercounting — at minimum, there are ~41 in just one slice.\n- Step 3: Correctly: $$0.40 \\times 292 \\approx 117$$. The answer should be in the 100+ range.\n\nTakeaway: Component counts inside a target subset must add up logically with the total estimate.", "source": "Opus 4 ①", "_id": "opus_1_54", "judge_pick": false}, {"question": "State the discrete (non-grouped) and grouped quartile rules for Edexcel S1, side by side. (3 steps)", "answer": "- Step 1: **Discrete/stem-and-leaf**: position $$p = n/4$$ (or 3n/4). Integer → average of pᵗʰ and (p+1)ᵗʰ values; non-integer → round UP.\n- Step 2: **Grouped via linear interpolation**: position $$p = n/4$$ used directly (no rounding); interpolate within the quartile class.\n+ $$Q_1 = L + \\frac{n/4 - F}{f} \\cdot c$$\n+ For median: position $$n/2$$ (NOT (n+1)/2 in grouped data).\n- Step 3: Memorise: discrete = round up if non-integer; grouped = linear interpolation.\n\nTakeaway: Two different paradigms for two different data formats.", "source": "Opus 4 ①", "_id": "opus_1_55", "judge_pick": true}, {"question": "Why does grouped data use position n/2 for the median (not (n+1)/2)? (3 steps)", "answer": "- Step 1: For a continuous distribution (which grouped data approximates), the median is the value where the CDF = 0.5 — half the mass is below.\n- Step 2: Half the mass = n/2 in count terms, exactly.\n- Step 3: (n+1)/2 is for ungrouped/discrete data where you literally pick \"the middle item\"; the +1 ensures symmetry for both even and odd n. Different paradigm.\n\nTakeaway: n/2 for continuous interpolation; (n+1)/2 for discrete picking.", "source": "Opus 4 ①", "_id": "opus_1_56", "judge_pick": false}, {"question": "Why does the regression line $$y = a + bx$$ with $$b = S_{xy}/S_{xx}$$ and $$a = \\bar{y} - b\\bar{x}$$ always pass through $$(\\bar{x}, \\bar{y})$$? (3 steps)", "answer": "- Step 1: At $$x = \\bar{x}$$: $$y = a + b \\bar{x}$$.\n- Step 2: Substitute $$a = \\bar{y} - b \\bar{x}$$: $$y = (\\bar{y} - b\\bar{x}) + b\\bar{x} = \\bar{y}$$.\n- Step 3: So the line passes through $$(\\bar{x}, \\bar{y})$$ by construction. Why? Least squares anchors the line at the centre of the data — this is mathematical, not arbitrary.\n\nTakeaway: The y-on-x regression line ALWAYS passes through the point of means.", "source": "Opus 4 ①", "_id": "opus_1_57", "judge_pick": true}, {"question": "What does $$r = 0$$ mean, and why is it WRONG to conclude \"X and Y are independent\"? (4 steps)", "answer": "- Step 1: $$r = 0$$ means no LINEAR association — no straight-line trend in the (X, Y) data.\n- Step 2: But X and Y can have a strong NON-LINEAR relationship and still have r = 0. Classic example: $$Y = X^2$$ with X uniform on [−1, 1] gives r = 0, yet Y is fully determined by X.\n- Step 3: Independence is stronger: $$P(X = x, Y = y) = P(X = x) \\cdot P(Y = y)$$ for all x, y — joint distribution must factorise.\n- Step 4: $$r = 0 \\Rightarrow$$ independent only in special cases (e.g., joint normal).\n\nTakeaway: r is blind to non-linear structure; r = 0 ≠ independence.", "source": "Opus 4 ①", "_id": "opus_1_58", "judge_pick": true}, {"question": "How does the sign and magnitude of r relate to the regression slope b? (4 steps)", "answer": "- Step 1: $$b = r \\cdot \\frac{\\sigma_y}{\\sigma_x}$$ — slope equals correlation times the ratio of SDs.\n- Step 2: SAME SIGN: both positive when y rises with x; both negative when y falls.\n- Step 3: $$r = 0 \\Rightarrow b = 0$$ (no linear association ⇒ no slope).\n- Step 4: $$|r|$$ near 1 doesn't mean b is large — b depends on unit scales of x and y.\n\nTakeaway: r = strength/direction; b = rate of change in y's units per x's units.", "source": "Opus 4 ①", "_id": "opus_1_59", "judge_pick": false}, {"question": "Under what condition is $$P(A \\cap B) = P(A) \\cdot P(B)$$, and when does it FAIL? (3 steps)", "answer": "- Step 1: This is the **definition of independence** of A and B. Holds iff A, B are independent.\n- Step 2: It FAILS for general events. Examples:\n+ A, B mutually exclusive: $$P(A \\cap B) = 0$$, but $$P(A) \\cdot P(B) > 0$$ if both non-empty — NOT independent.\n+ A ⊂ B: $$P(A \\cap B) = P(A)$$, and $$P(A) \\cdot P(B) = P(A) P(B) \\neq P(A)$$ unless P(B) = 1.\n- Step 3: Common error: applying product rule to nested events.\n\nTakeaway: Multiply only when independent; otherwise use the conditional formula.", "source": "Opus 4 ①", "_id": "opus_1_60", "judge_pick": true}, {"question": "Derive the conditional probability formula $$P(A \\mid B) = P(A \\cap B)/P(B)$$. (4 steps)", "answer": "- Step 1: \"Given B\" means we restrict the sample space to B alone — B becomes our new universe.\n- Step 2: Within this restricted universe, the relevant probability of A is the part of A inside B, namely $$A \\cap B$$.\n- Step 3: To get a probability ∈ [0, 1], divide by total in the new universe: P(B). So $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$.\n- Step 4: Useful rearrangement: $$P(A \\cap B) = P(A \\mid B) \\cdot P(B)$$ — the multiplication rule.\n\nTakeaway: Conditional = restrict universe + renormalise.", "source": "Opus 4 ①", "_id": "opus_1_61", "judge_pick": false}, {"question": "Why is $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$ rather than just $$P(A) + P(B)$$? (3 steps)", "answer": "- Step 1: Adding P(A) and P(B) double-counts the overlap A ∩ B (which is in both A and B).\n- Step 2: To correct, subtract one copy of $$P(A \\cap B)$$ — the **inclusion-exclusion principle**.\n- Step 3: Special case: if A, B are mutually exclusive ($$P(A \\cap B) = 0$$), then $$P(A \\cup B) = P(A) + P(B)$$. Otherwise, the overlap matters.\n\nTakeaway: Subtract the overlap to avoid double-counting.", "source": "Opus 4 ①", "_id": "opus_1_62", "judge_pick": true}, {"question": "List the 5 fundamental probability rules used in S1 (other than independence and conditioning). (5 steps)", "answer": "- Step 1: $$0 \\leq P(A) \\leq 1$$ for any event A.\n- Step 2: P(certain) = 1; P(impossible) = 0.\n- Step 3: $$P(A') = 1 - P(A)$$ — complement rule.\n- Step 4: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$ — inclusion-exclusion.\n- Step 5: For mutually exclusive A, B: $$P(A \\cup B) = P(A) + P(B)$$.\n\nTakeaway: Five rules suffice for most S1 probability problems.", "source": "Opus 4 ①", "_id": "opus_1_63", "judge_pick": true}, {"question": "When you see a 3-circle Venn diagram with multiple unknowns (like p, q), what's a robust attack strategy? (5 steps)", "answer": "- Step 1: List all 8 regions of a 3-circle Venn (7 inside + 1 outside).\n- Step 2: Identify which regions are given numerically and which are unknowns.\n- Step 3: Apply \"all regions sum to 1\" — gives one equation.\n- Step 4: Apply additional constraints: independence, given conditional probabilities, given specific events.\n- Step 5: Solve the system. Verify each unknown ∈ [0, 1] and individual probabilities are consistent.\n\nTakeaway: Sum to 1 + given constraints = solvable system.", "source": "Opus 4 ①", "_id": "opus_1_64", "judge_pick": false}, {"question": "What is the relationship between frequency density (FD) and frequency (f) in a histogram, and why use FD as the height? (4 steps)", "answer": "- Step 1: $$\\text{FD} = \\frac{\\text{frequency}}{\\text{class width}}$$ — has units \"frequency per unit class width\".\n- Step 2: With height = FD, area = FD × width = (f/w)×w = f. Area equals frequency.\n- Step 3: This handles UNEQUAL class widths without distortion. Two bars with different widths but same FD have area-equivalent meaning.\n- Step 4: With height = frequency directly, wide bars look \"more frequent\" than they are — visually misleading.\n\nTakeaway: FD is data density per unit x; multiply by width to recover count.", "source": "Opus 4 ①", "_id": "opus_1_65", "judge_pick": true}, {"question": "Outline a foolproof tabular approach for computing $$E(X^2)$$ to avoid arithmetic mistakes. (5 steps)", "answer": "- Step 1: Tabulate columns: x, P(x), x², x²·P(x).\n- Step 2: Compute x² for each row FIRST.\n- Step 3: Multiply x²·P(x) row by row.\n- Step 4: Sum the last column.\n- Step 5: This forces \"square first, weight second\" and avoids the $$(x \\cdot P)^2$$ trap on the first term.\n\nTakeaway: Table forces correct order of operations.", "source": "Opus 4 ①", "_id": "opus_1_66", "judge_pick": true}, {"question": "A new value v is added to a dataset of n values, mean μ, SD σ. Under what condition is (i) the mean unchanged, (ii) the SD unchanged? (4 steps)", "answer": "- Step 1: **Mean unchanged**: $$(n\\mu + v)/(n+1) = \\mu \\Rightarrow v = \\mu$$. Add a value AT the mean.\n- Step 2: **SD unchanged**: variance = (Σ(x−μ)²)/n. Adding v at distance d from mean adds d² to numerator, 1 to count.\n- Step 3: New variance = $$(n\\sigma^2 + d^2)/(n+1)$$. For = σ²: $$n\\sigma^2 + d^2 = (n+1)\\sigma^2 \\Rightarrow d^2 = \\sigma^2 \\Rightarrow d = \\sigma$$.\n- Step 4: Combined: it's nearly impossible to keep BOTH unchanged with one new value — they're tied to different geometric features.\n\nTakeaway: Mean = centre; SD = spread. Adding at mean preserves centre but reduces spread.", "source": "Opus 4 ①", "_id": "opus_1_67", "judge_pick": true}, {"question": "As you progress through an S1 problem, what micro sense-checks should you run at each stage? (7 steps)", "answer": "- Step 1: Probabilities: every $$P(\\cdot) \\in [0, 1]$$. Sums of mutually exclusive events ≤ 1.\n- Step 2: SD: ALWAYS ≥ 0. Negative SD = sign error.\n- Step 3: r: ALWAYS in [−1, 1]. |r| > 1 = error in S-statistics.\n- Step 4: Frequencies/counts: non-negative integers (or non-negative reals).\n- Step 5: Quartiles: $$Q_1 \\leq \\text{median} \\leq Q_3 \\leq \\text{max}$$.\n- Step 6: z-scores: realistically in [−3, 3]; |z| > 4 flags an error.\n- Step 7: $$\\text{Var}(X) = E(X^2) - [E(X)]^2 \\geq 0$$. If negative, you've squared incorrectly.\n\nTakeaway: Each statistic has a natural range; flag any out-of-range result.", "source": "Opus 4 ①", "_id": "opus_1_68", "judge_pick": false}, {"question": "Why does the variance use the SQUARE of the scale factor (b²) but SD uses the ABSOLUTE value (|b|)? What if b is negative? (4 steps)", "answer": "- Step 1: Variance has units of X², so a multiplicative scaling by b is \"felt twice\" → b².\n- Step 2: SD has units of X (same as variable), so it scales by |b|.\n- Step 3: Negative b: variance gets b² ≥ 0 automatically (square kills sign). SD uses |b| because SD must be non-negative.\n- Step 4: This is why the formula is $$\\sigma_x = |b| \\sigma_y$$, not $$b \\sigma_y$$ — sign is irrelevant to spread.\n\nTakeaway: Spread is sign-agnostic; scale by |b| for SD, b² for variance.", "source": "Opus 4 ①", "_id": "opus_1_69", "judge_pick": true}, {"question": "State the population scaling formula and explain its assumptions. (4 steps)", "answer": "- Step 1: $$N = \\frac{\\text{observed count of event } E}{P(E)}$$ — total population estimate.\n- Step 2: Assumptions: the observed count is an unbiased sample of E, and the proportions in the Venn match the population proportions.\n- Step 3: Once N is known, scale ANY other event's probability: $$\\text{count of } A = N \\cdot P(A)$$.\n- Step 4: NOT in the booklet — memorise the structure \"count = N × probability\".\n\nTakeaway: count = N × probability; rearrange both ways.", "source": "Opus 4 ①", "_id": "opus_1_70", "judge_pick": true}, {"question": "What's the conceptual justification for the \"1.5 × IQR\" outlier rule, and what alternatives exist? (4 steps)", "answer": "- Step 1: 1.5 × IQR is a Tukey heuristic (1970s) for flagging \"potential\" outliers — observations far from the bulk.\n- Step 2: For approximately normal data, ±1.5·IQR ≈ ±2.7σ, excluding ~0.7% of data — a reasonable \"unusual\" rate.\n- Step 3: 3·IQR sometimes called \"extreme outlier\" cutoff. Choice depends on context.\n- Step 4: A flagged outlier may not be wrong — just unusual relative to the rest. Investigate, don't auto-delete.\n\nTakeaway: 1.5·IQR is convention; the question may specify k = 2 or k = 3.", "source": "Opus 4 ①", "_id": "opus_1_71", "judge_pick": true}, {"question": "State the percentage points $$z(p)$$ for the standard normal where $$P(Z > z(p)) = p$$. (5 steps)", "answer": "- Step 1: $$z(0.10) = 1.2816$$ — for 80% symmetric interval.\n- Step 2: $$z(0.05) = 1.6449$$ — for 90% symmetric interval.\n- Step 3: $$z(0.025) = 1.9600$$ — for 95% symmetric interval (\"the 1.96 rule\").\n- Step 4: $$z(0.01) = 2.3263$$ — for 98% symmetric interval.\n- Step 5: $$z(0.005) = 2.5758$$ — for 99% symmetric interval.\n\nTakeaway: Memorise z(0.025) = 1.96 and z(0.005) = 2.5758 as most-tested.", "source": "Opus 4 ①", "_id": "opus_1_72", "judge_pick": false}, {"question": "For DRV $$X \\in \\{1, 2, 3\\}$$ with probs $$\\{0.5, 0.3, 0.2\\}$$, outline (without arithmetic) how to find E(X), Var(X), E(2X−1), Var(2X−1). (5 steps)", "answer": "- Step 1: $$E(X) = \\sum x \\cdot P = 1(0.5) + 2(0.3) + 3(0.2)$$ — direct sum.\n- Step 2: $$E(X^2) = 1(0.5) + 4(0.3) + 9(0.2)$$; then $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$.\n- Step 3: $$E(2X - 1) = 2 E(X) - 1$$ — linearity.\n- Step 4: $$\\text{Var}(2X - 1) = 4 \\text{Var}(X)$$ — the −1 vanishes; scale by $$2^2$$.\n- Step 5: Master four atoms: E, E², Var via STAR, linearity for transformations.\n\nTakeaway: 4 atomic operations cover ~95% of DRV exam questions.", "source": "Opus 4 ①", "_id": "opus_1_73", "judge_pick": true}, {"question": "Simple exercise: X has E(X) = 10, Var(X) = 4. Y = 3X + 5. Find E(Y) and Var(Y). (2 steps)", "answer": "- Step 1: $$E(Y) = 3 \\cdot E(X) + 5 = 3(10) + 5 = 35$$.\n- Step 2: $$\\text{Var}(Y) = 3^2 \\cdot \\text{Var}(X) = 9 \\cdot 4 = 36$$ (the +5 vanishes).\n\nTakeaway: Mean uses both 3 and 5; variance only $$3^2$$.", "source": "Opus 4 ①", "_id": "opus_1_74", "judge_pick": false}, {"question": "Simple exercise: A DRV X takes values 0 and 4 with equal probability 0.5. Find E(X), E(X²), Var(X). (3 steps)", "answer": "- Step 1: $$E(X) = 0.5(0) + 0.5(4) = 2$$.\n- Step 2: $$E(X^2) = 0.5(0)^2 + 0.5(4)^2 = 0.5(16) = 8$$.\n- Step 3: $$\\text{Var}(X) = E(X^2) - [E(X)]^2 = 8 - 4 = 4$$. SD = 2.", "source": "Opus 4 ①", "_id": "opus_1_75", "judge_pick": false}, {"question": "Simple exercise: X ~ N(50, 100). Find P(X < 60) by standardisation. (3 steps)", "answer": "- Step 1: $$\\sigma = \\sqrt{100} = 10$$.\n- Step 2: $$z = (60 - 50)/10 = 1.0$$.\n- Step 3: $$P(X < 60) = \\Phi(1.0) \\approx 0.8413$$.\n\nTakeaway: z = 1 ↔ ~84% probability below.", "source": "Opus 4 ①", "_id": "opus_1_76", "judge_pick": false}, {"question": "Simple exercise: A dataset has Q1 = 20, Q3 = 32, with values 5, 15, 22, 28, 35, 60. Identify any outliers (1.5·IQR rule). (4 steps)", "answer": "- Step 1: $$\\text{IQR} = 32 - 20 = 12$$, so $$1.5 \\cdot \\text{IQR} = 18$$.\n- Step 2: Lower fence = 20 − 18 = 2; upper fence = 32 + 18 = 50.\n- Step 3: Check each: 5 (≥ 2 ✓), 15, 22, 28, 35, 60. 60 > 50 → outlier.\n- Step 4: 60 is the only outlier.", "source": "Opus 4 ①", "_id": "opus_1_77", "judge_pick": false}, {"question": "Simple exercise: P(A) = 0.5, P(B) = 0.4, P(A ∩ B) = 0.2. Are A and B independent? (3 steps)", "answer": "- Step 1: Test: $$P(A \\cap B) = P(A) \\cdot P(B)$$?\n- Step 2: $$P(A) \\cdot P(B) = 0.5 \\times 0.4 = 0.2$$.\n- Step 3: $$P(A \\cap B) = 0.2 = 0.2$$ ✓. So A and B ARE independent.\n\nTakeaway: Multiply marginals; compare to intersection.", "source": "Opus 4 ①", "_id": "opus_1_78", "judge_pick": false}, {"question": "Simple exercise: A regression line passes through (5, 10) with slope b = 2. Write the y-on-x equation. (3 steps)", "answer": "- Step 1: Form: $$y = a + bx$$ with b = 2 → $$y = a + 2x$$.\n- Step 2: Through (5, 10): $$10 = a + 2(5) \\Rightarrow a = 0$$.\n- Step 3: Equation: $$y = 2x$$.\n\nTakeaway: Use \"line passes through (x̄, ȳ)\" to find a.", "source": "Opus 4 ①", "_id": "opus_1_79", "judge_pick": false}, {"question": "Why is the PMCC dimensionless, and what's the practical implication? (4 steps)", "answer": "- Step 1: $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} \\cdot S_{yy}}}$$.\n- Step 2: $$S_{xy}$$ has units of x·y; $$S_{xx}$$ has units of x²; $$S_{yy}$$ has units of y². So $$\\sqrt{S_{xx} \\cdot S_{yy}}$$ has units of x·y.\n- Step 3: r = (units xy) / (units xy) = **dimensionless**.\n- Step 4: Practical implication: r is invariant under unit changes (cm vs inches, kg vs lbs) — you can compare r across studies regardless of units.\n\nTakeaway: r = ratio of co-spread to product-of-own-spreads — units cancel.", "source": "Opus 4 ①", "_id": "opus_1_80", "judge_pick": true}, {"question": "A common student error in conditional probability is $$P(B \\mid A) = P(A \\cap B) \\cdot P(A)$$. Why is this wrong? (4 steps)", "answer": "- Step 1: $$P(B \\mid A)$$ is a probability ∈ [0, 1].\n- Step 2: $$P(A \\cap B) \\cdot P(A)$$ is a product of two probabilities, ≤ P(A) — could be in [0, 1] but is the WRONG value.\n- Step 3: Correct: $$P(B \\mid A) = P(A \\cap B)/P(A)$$. Dividing reweights the probability into the restricted universe of A.\n- Step 4: Sanity check via subset: if $$A \\subset B$$, then $$P(A \\cap B) = P(A)$$, so $$P(B \\mid A) = P(A)/P(A) = 1$$. (If A happens, B definitely happens.)\n\nTakeaway: Divide, don't multiply. Conditional = restriction + renormalisation.", "source": "Opus 4 ①", "_id": "opus_1_81", "judge_pick": true}, {"question": "What's the Q1(d) Birch box plot summary, with each feature located precisely? (5 steps)", "answer": "- Step 1: Box: rectangle from Q1 = 39 to Q3 = 57.\n- Step 2: Vertical line through box at median = 48.\n- Step 3: Lower whisker: from 39 down to min = 28 (no low outlier).\n- Step 4: Upper whisker: from 57 up to **76** (largest non-outlier, NOT 85).\n- Step 5: × at 85 (outlier marker).\n\nTakeaway: Whisker stops at largest non-outlier; outliers get separate markers.", "source": "Opus 4 ①", "_id": "opus_1_82", "judge_pick": false}, {"question": "What's the variance computational form for **frequency** data (rather than discrete probabilities)? (4 steps)", "answer": "- Step 1: $$\\sigma^2 = \\frac{\\sum f_i x_i^2}{\\sum f_i} - \\bar{x}^2$$, where $$n = \\sum f_i$$.\n- Step 2: Same STAR form, but sums are weighted by frequency f instead of probability p.\n- Step 3: For DRV, frequency is replaced by probability — formula structure is identical.\n- Step 4: Grouped data: use class midpoints as x-values, class frequencies as f. Estimate is approximate (assumes data clustered at midpoints).\n\nTakeaway: STAR form generalises to weighted (frequency or probability) data.", "source": "Opus 4 ①", "_id": "opus_1_83", "judge_pick": true}, {"question": "Strategy: 4-step protocol for reading S1 questions safely. (4 steps)", "answer": "- Step 1: First read: identify random variable, distribution, and what's asked.\n- Step 2: Second read: highlight key words (NOT, fastest, longest, at most, strict inequality, \"given that\", \"unchanged\", \"approximately\").\n- Step 3: Convert English to a probability statement BEFORE computing. e.g., \"fastest 60% qualify\" → P(X ≤ t) = 0.60.\n- Step 4: Sense check the answer against the wording. Does it make physical sense? Does it match the proportion?\n\nTakeaway: Slow reading = fast marks.", "source": "Opus 4 ①", "_id": "opus_1_84", "judge_pick": true}, {"question": "Why is Q5(b) ambiguous, and which interpretation is canonical? (4 steps)", "answer": "- Step 1: \"Fastest 60% take part — find the longest qualifying time\" has two readings:\n+ A: \"Fastest\" = lowest TIMES → lowest 60% qualify → P(X ≤ t) = 0.60 → t = 15.5 min.\n+ B (Fuat's): somehow P(X > t) = 0.60 → t = 14.49 min.\n- Step 2: Check logical consistency: if 60% take part, then 60% have times ≤ t, so P(X ≤ t) = 0.6 — Interpretation A.\n- Step 3: Sense check: cutoff above the median (15 min) makes sense if more than half qualify. 15.5 > 15 ✓.\n- Step 4: Canonical answer: t = 15.5 min. The 14.49 result would mean only 40% qualify, contradicting the question.\n\nTakeaway: When in doubt, ask \"what % does this t cut off?\" and match to the question.", "source": "Opus 4 ①", "_id": "opus_1_85", "judge_pick": true}, {"question": "Coding strategy: when should you code data, and how do you avoid forgetting to decode? (5 steps)", "answer": "- Step 1: Code when raw values are messy (e.g., mid-30s) and the y-values would be small integers.\n- Step 2: Choose $$y = (w - a)/b$$ with a = a \"central\" value and b = a convenient scale (often 1, 10, or class width).\n- Step 3: Compute $$\\sum y$$, $$\\sum y^2$$, $$\\bar{y}$$, Var(y) using the cleaner y-values.\n- Step 4: **Always decode**: $$\\bar{w} = b\\bar{y} + a$$, $$\\sigma_w = |b|\\sigma_y$$, $$\\text{Var}(w) = b^2 \\text{Var}(y)$$.\n- Step 5: Risk: forgetting to decode and reporting ȳ instead of w̄. Always decode at the end.\n\nTakeaway: Coding = simplify arithmetic; decoding is mandatory.", "source": "Opus 4 ①", "_id": "opus_1_86", "judge_pick": true}, {"question": "Why does Q1(c) show \"exactly one outlier\" rather than just \"85 is an outlier\"? (3 steps)", "answer": "- Step 1: The question says \"show one Birch outlier\", implying the answer should explicitly state both directions are checked.\n- Step 2: Computing both fences (lower 12, upper 84) demonstrates that no low outliers exist (min 28 > 12) AND that 85 (above 84) is the only high outlier.\n- Step 3: Stating \"exactly one\" closes the case — important for marks.\n\nTakeaway: Always check both ends and state the count of outliers.", "source": "Opus 4 ①", "_id": "opus_1_87", "judge_pick": false}, {"question": "Conceptually, what's the difference between a regression line and a \"perfect\" line of best fit? (4 steps)", "answer": "- Step 1: A regression line is the BEST linear approximation in the least-squares sense — minimising sum of squared vertical residuals.\n- Step 2: It's the optimum AMONG ALL straight lines, but the data may not be exactly linear, so individual points scatter around the line.\n- Step 3: Residuals (y − ŷ) measure scatter; their sum is zero by construction, but their squared sum is the loss.\n- Step 4: A perfect line (r = ±1) means all data points lie EXACTLY on the line — no scatter.\n\nTakeaway: Regression = best linear approximation; doesn't assume exact linearity.", "source": "Opus 4 ①", "_id": "opus_1_88", "judge_pick": true}, {"question": "The +b in $$Y = aX + b$$ \"vanishes\" from variance. State two equivalent ways to see why. (4 steps)", "answer": "- Step 1: **Algebraic**: $$Y - E(Y) = (aX + b) - (aE(X) + b) = a(X - E(X))$$ — the +b cancels in the deviation.\n- Step 2: **Geometric**: variance measures spread about the mean. Adding b shifts both data and mean by b → relative deviations unchanged.\n- Step 3: **Definitional**: $$\\text{Var}(Y) = E[(Y - E(Y))^2] = E[a^2(X - E(X))^2] = a^2 \\text{Var}(X)$$.\n- Step 4: Practical takeaway: only the multiplicative scale a (squared) survives in variance; additive shifts are invisible.\n\nTakeaway: Adding a constant doesn't change spread.", "source": "Opus 4 ①", "_id": "opus_1_89", "judge_pick": false}, {"question": "What's the cleanest 3-step procedure for verifying a Venn problem solution at the end? (3 steps)", "answer": "- Step 1: All 8 region probabilities sum to exactly 1.\n- Step 2: Each individual region probability ∈ [0, 1].\n- Step 3: Reconstructed marginals (P(C), P(S), P(G)) match any given values, and the independence/conditional constraints from the question are satisfied.\n\nTakeaway: Sum to 1 + region bounds + marginal/constraint check = full solution.", "source": "Opus 4 ①", "_id": "opus_1_90", "judge_pick": true}, {"question": "Two events A and B are independent. What does this mean intuitively about $$P(A)$$ and $$P(A \\mid B)$$? (4 steps)", "answer": "- Step 1: Independence ⇒ knowing B happened gives NO information about A. So $$P(A \\mid B) = P(A)$$.\n- Step 2: Equivalently: $$P(A \\cap B) = P(A) \\cdot P(B)$$ — probabilities multiply because events are \"informationally separate\".\n- Step 3: Concrete: rolling two dice. $$P(\\text{die 1} = 6) = 1/6$$. $$P(\\text{die 1} = 6 \\mid \\text{die 2} = 5) = 1/6$$.\n- Step 4: NOT independent: drawing 2 cards without replacement. $$P(\\text{2nd is Ace} \\mid \\text{1st is Ace}) \\neq P(\\text{2nd is Ace})$$ — first draw changed the deck.\n\nTakeaway: Independence ⇔ no information transfer; multiply probabilities.", "source": "Opus 4 ①", "_id": "opus_1_91", "judge_pick": true}], "count": 92}, "opus_2": {"label": "Opus 4 ②", "cards": [{"question": "On a back-to-back stem-and-leaf diagram, the LEFT side (e.g. Birch column) lists leaves running away from the stem. In what direction must the leaves on the left side be read, and why does this matter for picking out the smallest values? (3 steps)", "answer": "- Step 1: The left side reads **right-to-left**, i.e. the leaf nearest the stem is the smallest. The right side reads left-to-right (smallest nearest the stem) as usual.\n- Step 2: This is because the stem sits in the middle, and both sides are sorted *outward from the stem*. Reading left-to-right on the left side reverses the order.\n- Step 3: A typical fatal error: seeing \"9 8 | 2 |\" on the left and reading it as \"98, then 8\" instead of \"28, 29\". You'd report the smallest Birch leaf as 98 — instantly off by 70 cm.\n\nTakeaway: stem in the middle ⇒ both sides expand outward in increasing order from the stem.", "source": "Opus 4 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "A stem-and-leaf has the key `5|6|3` ⇒ 65 cm Birch / 63 cm Maple. What does this tell you about how the same stem digit is shared between two datasets, and why must the key always be present? (2 steps)", "answer": "- Step 1: The stem (here \"6\") is shared by both Birch (65) and Maple (63). The leaf on the left attaches to the stem to give the Birch value; the leaf on the right attaches to the stem to give the Maple value. Same stem, two readings.\n- Step 2: Without the key, leaves are ambiguous (could be tens or units, decimals or integers). Edexcel awards a B-mark just for showing a correct key — losing the key = automatic 1-mark drop on construction questions.\n\nTakeaway: the key is contractually mandatory — never omit it.", "source": "Opus 4 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "When finding quartiles on a stem-and-leaf diagram in **Edexcel International A-Level (IAL)** for a sample of size $$n$$, which positional rule applies, and how does it differ from domestic UK A-level convention? (3 steps)", "answer": "- Step 1: IAL uses position $$= n/4$$ for $$Q_1$$ and $$3n/4$$ for $$Q_3$$ (for raw/discrete/stem-and-leaf data).\n- Step 2: If the position is an **integer**, take the average of that data point and the next
