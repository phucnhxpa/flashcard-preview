ve the rough rule and the exact values for 95%. (2 steps)", "answer": "- Step 1: The empirical rule: approximately **68%** within 1σ, **95%** within 2σ (exactly 95% is within 1.96σ), and **99.7%** within 3σ of the mean.\n- Step 2: For exams, the key exact values: 95% symmetric interval → half-width = **1.96σ**; 99% symmetric interval → half-width = **2.5758σ** (or 2.576σ). These come from the percentage points table and are NOT in the formula booklet.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": true}, {"question": "List the key percentage points of the standard normal that you must memorise (not in the formula booklet), and state which symmetric confidence interval each corresponds to. (2 steps)", "answer": "- Step 1: The percentage points (upper-tail probabilities):\n+ $$z(0.10) = 1.2816$$ (90% one-sided)\n+ $$z(0.05) = 1.6449$$ (95% one-sided)\n+ $$z(0.025) = 1.9600$$ (97.5% one-sided, or 95% two-sided)\n+ $$z(0.01) = 2.3263$$ (99% one-sided)\n+ $$z(0.005) = 2.5758$$ (99.5% one-sided, or 99% two-sided)\n- Step 2: For symmetric intervals: 95% → half-width = **1.96σ**; 99% → half-width = **2.5758σ**. These appear repeatedly in normal distribution questions and must be committed to memory.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": false}, {"question": "When computing $$S_{xx}$$, $$S_{yy}$$, or $$S_{xy}$$, a common error is to forget to divide by $$n$$ in the correction term. What is the full formula for $$S_{xx}$$, and what goes wrong if you omit the $$n$$? (2 steps)", "answer": "- Step 1: $$S_{xx} = \\Sigma x^2 - \\frac{(\\Sigma x)^2}{n}$$. The correction term $$\\frac{(\\Sigma x)^2}{n}$$ adjusts for the fact that $$\\Sigma x^2$$ includes both the variance and the mean contribution.\n- Step 2: If you write $$S_{xx} = \\Sigma x^2 - (\\Sigma x)^2$$ (forgetting $$n$$), the correction term is $$n$$ times too large, and $$S_{xx}$$ will likely be massively negative — an impossibility since $$S_{xx}$$ is a sum of squared deviations. Sense-check: $$S_{xx}$$, $$S_{yy}$$, $$S_{xy}$$ must all be consistent in sign and magnitude.", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": true}, {"question": "A question gives you $$\\Sigma y = 104$$, $$\\Sigma y^2 = 233.54$$, and $$n = 50$$. Walk through finding $$\\text{Var}(y)$$ using the computational formula. (3 steps)", "answer": "- Step 1: Compute $$\\bar{y} = \\Sigma y / n = 104/50 = 2.08$$.\n- Step 2: Apply the computational formula: $$\\text{Var}(y) = \\frac{\\Sigma y^2}{n} - \\bar{y}^2 = \\frac{233.54}{50} - 2.08^2 = 4.6708 - 4.3264 = 0.3444$$.\n- Step 3: This is the variance of $$y$$. To get the standard deviation: $$\\sigma_y = \\sqrt{0.3444} = 0.5869$$. If the original variable was $$w = 10y + 20$$, then $$\\sigma_w = 10 \\times 0.5869 = 5.87$$ g.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": false}, {"question": "In a Venn diagram problem, you're told three events C, S, G and given various region probabilities plus an unknown $$p$$ and $$q$$. What is always the first equation you should write, and why? (2 steps)", "answer": "- Step 1: Write the **sum-to-1 equation**: all regions (including outside) must sum to 1. This gives a relationship between the unknowns.\n- Step 2: In the bears problem, this gave $$0.04 + p + 0 + 0.15 + 0.12 + 0.1 + 0.23 + q = 1$$, simplifying to $$p + q = 0.36$$. This equation is essential — without it, you have two unknowns and only one independence equation, which is insufficient to solve for both $$p$$ and $$q$$.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": true}, {"question": "A conditional probability question asks $$P(C \\mid S \\cap G)$$. Write the formula and identify which Venn regions contribute to numerator and denominator. (3 steps)", "answer": "- Step 1: $$P(C \\mid S \\cap G) = \\frac{P(C \\cap S \\cap G)}{P(S \\cap G)}$$. The numerator is the probability of being in ALL three circles.\n- Step 2: The denominator $$P(S \\cap G)$$ includes regions inside both S and G: **C∩S∩G** (the triple overlap) AND **S∩G only** (in S and G but not C).\n- Step 3: So $$P(C \\mid S \\cap G) = \\frac{0.12}{0.12 + 0.10} = \\frac{0.12}{0.22} = \\frac{6}{11} \\approx 0.545$$. Given that someone plays both Scrabble and Go, there's about a 54.5% chance they also play Chess.", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": false}, {"question": "Explain why $$r = 0.980$$ (very strong positive correlation) does NOT imply that the regression model can be trusted for extrapolation. (2 steps)", "answer": "- Step 1: Correlation measures the strength of **linear** relationship **within the observed data range**. A high $$r$$ means the data points cluster tightly around a straight line — but only in the range that was actually measured.\n- Step 2: Outside that range, the relationship might curve, flatten, or reverse. The model $$g = -42.3 + 0.722d$$ gives a negative girth for small bears — proof that the linear model breaks down. High $$r$$ is a local property, not a global guarantee.", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": false}, {"question": "A question states \"the gradient means that for every $$x$$ cm increase in length, girth increases by 17.3 cm\". If the original gradient was 0.722, find $$x$$. Show the reasoning. (2 steps)", "answer": "- Step 1: The gradient 0.722 means each 1 cm of length gives 0.722 cm of girth. The question asks: how many cm of length give 17.3 cm of girth increase? Set up: $$0.722 \\times x = 17.3$$.\n- Step 2: $$x = 17.3 / 0.722 = 23.96$$ cm. Use the unrounded gradient if possible: $$17.3 / 0.72184 = 23.97$$ cm. Rounding the gradient before dividing introduces a small error.", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": false}, {"question": "When the regression line is $$y = a + bx$$, the intercept $$a = \\bar{y} - b\\bar{x}$$. Explain intuitively why the point $$(\\bar{x}, \\bar{y})$$ must lie on the regression line. (2 steps)", "answer": "- Step 1: The regression line is the **best-fit** line that minimises the sum of squared residuals. The mean point $$(\\bar{x}, \\bar{y})$$ is the \"centre of gravity\" of the data.\n- Step 2: If you substitute $$x = \\bar{x}$$: $$y = a + b\\bar{x} = (\\bar{y} - b\\bar{x}) + b\\bar{x} = \\bar{y}$$. So the predicted $$y$$ at $$x = \\bar{x}$$ is exactly $$\\bar{y}$$. The line always passes through the mean point — this is a built-in property of least-squares regression.", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": true}, {"question": "In a back-to-back stem-and-leaf, the Maple column has cumulative totals (5), (12), (18), (25), (28), (30), (32). The median is the average of the 16th and 17th values. How do you locate these using the cumulative totals? (3 steps)", "answer": "- Step 1: Scan the cumulative totals to find where 16 and 17 fall. The third row cumulative is 18, meaning values 13 through 18 are in that row.\n- Step 2: Both the 16th and 17th values are in the third row (stem = 4). Within that row, count from the smallest: positions 13, 14, 15, 16, 17, 18 correspond to leaf values 1, 1, 1, k, 7, 8.\n- Step 3: So the 16th value is $$40 + k$$ and the 17th value is 47. Setting $$\\frac{(40+k) + 47}{2} = 45$$ gives $$40 + k + 47 = 90$$, so $$k = 3$$.", "source": "GLM 5.1 ②", "_id": "glm_2_50", "judge_pick": true}, {"question": "A simple exercise: Data set has values 2, 4, 5, 7, 8 with probabilities 0.25, 0.3, 0.2, 0.1, 0.15. Compute $$E(X)$$ mentally. (2 steps)", "answer": "- Step 1: $$E(X) = \\Sigma x \\cdot P(X=x) = 2(0.25) + 4(0.3) + 5(0.2) + 7(0.1) + 8(0.15)$$.\n- Step 2: $$= 0.5 + 1.2 + 1.0 + 0.7 + 1.2 = 4.6$$. The expected value is a probability-weighted average — not the arithmetic mean of the values.", "source": "GLM 5.1 ②", "_id": "glm_2_51", "judge_pick": false}, {"question": "A simple exercise: Using $$E(X) = 4.6$$ and the probabilities from the spinner, compute $$E(X^2)$$ mentally (just the first two terms to verify the method). (2 steps)", "answer": "- Step 1: $$E(X^2) = \\Sigma x^2 \\cdot P(X=x)$$. Square each value first: $$2^2 = 4$$, $$4^2 = 16$$.\n- Step 2: First two terms: $$4(0.25) + 16(0.3) = 1.0 + 4.8 = 5.8$$. Continue: $$25(0.2) + 49(0.1) + 64(0.15) = 5.0 + 4.9 + 9.6 = 19.5$$. Total: $$5.8 + 19.5 = 25.3$$. Then $$\\text{Var}(X) = 25.3 - 4.6^2 = 25.3 - 21.16 = 4.14$$.", "source": "GLM 5.1 ②", "_id": "glm_2_52", "judge_pick": false}, {"question": "A simple exercise: If $$\\text{Var}(X) = 4.14$$ and $$Y = 4X - 5$$, compute $$\\text{Var}(Y)$$ without a calculator. (2 steps)", "answer": "- Step 1: Apply the coding rule: $$\\text{Var}(aX + b) = a^2 \\cdot \\text{Var}(X)$$. Here $$a = 4$$ and $$b = -5$$.\n- Step 2: $$\\text{Var}(Y) = 4^2 \\times 4.14 = 16 \\times 4.14 = 66.24$$. The $$-5$$ shift vanishes completely — it doesn't affect spread.", "source": "GLM 5.1 ②", "_id": "glm_2_53", "judge_pick": false}, {"question": "A simple exercise: In a normal distribution, $$P(\\mu - k < X < \\mu + k) = 0.95$$ and $$k = 10$$. Find $$\\sigma$$ without a calculator (give a fraction). (2 steps)", "answer": "- Step 1: For a 95% symmetric interval, $$k = 1.96\\sigma$$. Given $$k = 10$$: $$10 = 1.96\\sigma$$.\n- Step 2: $$\\sigma = \\frac{10}{1.96} = \\frac{1000}{196} = \\frac{250}{49} \\approx 5.10$$. Sense-check: $$\\sigma \\approx 5$$ is reasonable for an interval of half-width 10 — the interval spans about 4 standard deviations, which matches the 95% rule.", "source": "GLM 5.1 ②", "_id": "glm_2_54", "judge_pick": false}, {"question": "A simple exercise: A Venn diagram has $$P(S) = 0.60$$ and the total population is estimated at 292. How many people do NOT play Scrabble? Do this mentally. (2 steps)", "answer": "- Step 1: Use the complement: $$P(S') = 1 - P(S) = 1 - 0.60 = 0.40$$.\n- Step 2: Number not playing Scrabble = $$0.40 \\times 292 = 116.8 \\approx 117$$ people. Round to nearest whole number since we're counting people.", "source": "GLM 5.1 ②", "_id": "glm_2_55", "judge_pick": false}, {"question": "Why is reading a back-to-back stem-and-leaf diagram considered a 🔴 HIGH weakness for IAL students specifically? (2 steps)", "answer": "- Step 1: The back-to-back format appears in IAL papers but is **NOT in the domestic A-level specification**. Students who practised only domestic past papers may never have seen one.\n- Step 2: The left-side reading direction (right-to-left) is counterintuitive and easy to get wrong under time pressure. Combined with the need to compute cumulative frequencies for quartiles, this creates multiple failure points on a single diagram.", "source": "GLM 5.1 ②", "_id": "glm_2_56", "judge_pick": false}, {"question": "Coding appears in both Q2 (DRV linear coding) and Q3 (data coding $$10y = w - 20$$). Summarise the universal coding rules that apply to BOTH contexts. (3 steps)", "answer": "- Step 1: For the mean: $$E(aX + b) = a \\cdot E(X) + b$$, or equivalently, $$\\bar{x} = a\\bar{y} + b$$ if $$y$$ is the coded variable. The shift $$b$$ affects the centre.\n- Step 2: For the variance: $$\\text{Var}(aX + b) = a^2 \\cdot \\text{Var}(X)$$. The shift $$b$$ vanishes. Only the scale factor $$a$$ matters.\n- Step 3: For the standard deviation: $$\\sigma_{aX+b} = |a| \\cdot \\sigma_X$$. Again, shift vanishes. The absolute value ensures SD is always non-negative. These rules are NOT in the formula booklet and must be memorised.", "source": "GLM 5.1 ②", "_id": "glm_2_57", "judge_pick": false}, {"question": "Conditional probability appears in both Q5 (normal distribution) and Q6 (Venn diagram). What is the universal formula, and what is the critical mistake to avoid when events are NOT independent? (2 steps)", "answer": "- Step 1: The universal formula: $$P(B \\mid A) = \\frac{P(A \\cap B)}{P(A)}$$. This applies regardless of the distribution — normal, Venn, or any other context.\n- Step 2: The critical mistake is writing $$P(A \\cap B) = P(A) \\cdot P(B)$$ when the events are NOT independent. This substitution is ONLY valid when independence has been established. In Q5, $$A \\subset B$$ means they're dependent; in Q6, the Venn regions show dependence. Always check independence before using the product rule.", "source": "GLM 5.1 ②", "_id": "glm_2_58", "judge_pick": true}, {"question": "The phrase \"box plot unchanged\" in Q1(f) generates multiple constraints on $$a$$. What is the general exam strategy when a question asks for a range of values subject to \"unchanged statistics\"? (3 steps)", "answer": "- Step 1: List every statistic that defines the box plot: min, $$Q_1$$, median, $$Q_3$$, max, and outlier status. Each must remain the same after adding new values.\n- Step 2: For each statistic, derive a constraint on the new values. For example, \"max unchanged\" means all new values ≤ current max. \"$$Q_1$$ unchanged\" means the new values must not shift the quartile position.\n- Step 3: Find the **intersection** of all constraints. The answer is the range of $$a$$ satisfying every condition simultaneously. Never stop after one constraint — examiners design these questions to require multiple conditions working together.", "source": "GLM 5.1 ②", "_id": "glm_2_59", "judge_pick": true}, {"question": "What is the \"sense-check\" strategy for catching arithmetic errors in normal distribution problems, as illustrated by the tutor's $$\\sigma = 0.0510$$ error? (2 steps)", "answer": "- Step 1: After computing any parameter (like $$\\sigma$$), plug it back into the context. If $$\\sigma = 0.0510$$ and the interval half-width is 10, then $$z = 10/0.0510 \\approx 196$$ — an impossible z-score. This immediately flags an error.\n- Step 2: Compare your answer to the data scale. If the data ranges over tens of units, $$\\sigma$$ should be in the same order of magnitude — not 0.05 or 500. If $$\\sigma$$ is much smaller than the interval, you've likely taken a reciprocal by mistake.", "source": "GLM 5.1 ②", "_id": "glm_2_60", "judge_pick": false}, {"question": "When a question asks you to \"show that\" a value equals something (e.g., \"show that $$\\text{Var}(X) = 4.14$$\"), what must you include that you wouldn't need for a simple \"find\" question? (2 steps)", "answer": "- Step 1: A \"show that\" question requires you to **demonstrate the full working** that leads to the given answer. You cannot just write the answer — you must show every step that produces it.\n- Step 2: If you use the given answer in your working (circular reasoning), you score M0. For example, writing \"Var(X) = 4.14, therefore Var(X) = 4.14 ✓\" earns nothing. You must compute $$E(X^2) = 25.3$$ independently, then show $$25.3 - 4.6^2 = 4.14$$.", "source": "GLM 5.1 ②", "_id": "glm_2_61", "judge_pick": false}, {"question": "In the spinner problem, $$P(S > R)$$ where $$S = X_1$$ and $$R = 2X_2 - 3$$, the table method was used. Why is a two-way table of all possible $$(S, R)$$ pairs an effective approach, and what is the key property that makes it work? (3 steps)", "answer": "- Step 1: Since $$X_1$$ and $$X_2$$ are independent, every pair $$(x_1, x_2)$$ has probability $$P(X_1 = x_1) \\times P(X_2 = x_2)$$. The table enumerates all such pairs systematically.\n- Step 2: For each row (each value of $$x_2$$), compute $$R = 2x_2 - 3$$, then find which values of $$X_1$$ exceed $$R$$. Sum those probabilities to get $$P(X_1 > R \\mid X_2 = x_2)$$.\n- Step 3: Multiply each conditional probability by $$P(X_2 = x_2)$$ and sum across all rows. This is the law of total probability in action: $$P(S > R) = \\Sigma \\, P(S > R \\mid X_2 = x_2) \\cdot P(X_2 = x_2)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_62", "judge_pick": true}, {"question": "When computing $$P(X_1 > R)$$ for a specific value of $$R$$, you need to sum the probabilities of all $$X_1$$ values strictly greater than $$R$$. For $$R = 5$$ and $$X_1 \\in \\{2, 4, 5, 7, 8\\}$$, which values qualify and what is the probability? (2 steps)", "answer": "- Step 1: Values strictly greater than 5 are: 7 and 8. The value 5 itself does NOT qualify because the inequality is strict ($$>$$, not $$\\geq$$).\n- Step 2: $$P(X_1 > 5) = P(X_1 = 7) + P(X_1 = 8) = 0.10 + 0.15 = 0.25$$. Using $$\\geq$$ would incorrectly add $$P(X_1 = 5) = 0.20$$, giving 0.45 — nearly double the correct answer.", "source": "GLM 5.1 ②", "_id": "glm_2_63", "judge_pick": false}, {"question": "For grouped data, the class $$32 \\leq x < 36$$ has frequency 20 and the cumulative frequency before it is 18. The total is $$n = 50$$. Show why the median falls in this class. (2 steps)", "answer": "- Step 1: The median position is $$n/2 = 25$$. We need the 25th value.\n- Step 2: The cumulative frequency reaches 18 before this class and 38 after it. Since $$18 < 25 \\leq 38$$, the 25th value lies within the class $$32 \\leq x < 36$$. If the median position were ≤ 18, we'd look in an earlier class.", "source": "GLM 5.1 ②", "_id": "glm_2_64", "judge_pick": true}, {"question": "The regression line $$g = -42.3 + 0.722d$$ has a negative intercept. Does this mean the model is wrong? Explain when a negative intercept is and isn't acceptable. (2 steps)", "answer": "- Step 1: A negative intercept means the model predicts negative girth when length is very small (near zero). This is physically impossible, so the model is unreliable at the extreme left.\n- Step 2: However, within the **observed data range** (approximately 140–220 cm length), the predicted girths are all positive and reasonable. The negative intercept simply means the linear trend, if extended backward, would cross zero — but we never use it there. The model is valid for interpolation, invalid for extrapolation to small lengths.", "source": "GLM 5.1 ②", "_id": "glm_2_65", "judge_pick": false}, {"question": "A question gives you $$S_{dd} = 16\\,769.78$$, $$S_{dg} = 12\\,105.12$$, and $$S_{gg} = 9\\,094.20$$. Verify that the PMCC $$r = 0.980$$ makes directional sense — what sign should $$r$$ have and why? (2 steps)", "answer": "- Step 1: $$r = \\frac{S_{dg}}{\\sqrt{S_{dd} \\cdot S_{gg}}}$$. Since $$S_{dg} = 12\\,105.12 > 0$$, and the denominator (a square root) is always positive, $$r$$ must be **positive**.\n- Step 2: A positive $$r$$ means longer bears tend to have larger girths — biologically sensible. If you computed a negative $$r$$, you likely swapped the numerator or made a sign error in $$S_{dg}$$. Always sense-check: does the sign match the expected direction of the relationship?", "source": "GLM 5.1 ②", "_id": "glm_2_66", "judge_pick": true}, {"question": "In Q3(e), adding a pebble of weight 40.8 g (the current mean) to a data set of 50 pebbles: does the new variance formula use $$n$$ or $$n+1$$ in the denominator, and does it matter conceptually? (2 steps)", "answer": "- Step 1: Edexcel S1 uses the **population variance** formula $$\\sigma^2 = \\frac{\\Sigma x^2}{n} - \\bar{x}^2$$, so the denominator is $$n$$ (not $$n-1$$). After adding one value, the new denominator is $$n+1 = 51$$.\n- Step 2: Conceptually, whether you use $$n$$ or $$n-1$$, the key point is the same: the numerator (sum of squared deviations) is essentially unchanged (the new deviation is zero), but the denominator grows. So variance decreases either way. The exact numerical answer differs slightly, but the direction is the same.", "source": "GLM 5.1 ②", "_id": "glm_2_67", "judge_pick": true}, {"question": "Summarise the two tutor errors caught in this paper, and state the principle each error illustrates for future exams. (3 steps)", "answer": "- Step 1: **Error 1 (Q5c):** Tutor wrote $$\\sigma = 10/1.96 = 0.0510$$ instead of 5.10. This is a **reciprocal/decimal error** — dividing in the wrong order. Principle: always sense-check by plugging back in; a z-score of ~98 is impossible.\n- Step 2: **Error 2 (Q6e):** Tutor computed $$P(S') = 0.18$$ by only adding some regions, getting 47 students instead of ~105–117. This is a **missing regions error** — forgetting that $$P(S')$$ includes everyone outside S, not just G-only and outside. Principle: use the complement $$P(S') = 1 - P(S)$$ whenever $$P(S)$$ is known.\n- Step 3: Both errors share a root cause: rushing the setup without verifying. The fix is always to (1) write the formula first, (2) substitute carefully, (3) sense-check the result against the context.", "source": "GLM 5.1 ②", "_id": "glm_2_68", "judge_pick": true}, {"question": "What is the \"redo strategy\" for this paper, and what three specific checkpoints should you verify during the redo? (3 steps)", "answer": "- Step 1: **Time-box** the redo: 1 hour 30 minutes on a fresh copy, no notes, calculator allowed. Simulate exam conditions.\n- Step 2: **Checkpoint 1 (Q5b):** The moment you write \"$$P(X < t) = 0.4$$\", STOP and re-read. \"Fastest 60% qualify, longest qualifying time\" means $$P(X < t) = 0.6$$, giving $$t = 15.5$$ min.\n- Step 3: **Checkpoint 2 (Q6e):** If your $$P(S') \\neq 0.40$$, re-read. Use the complement. **Checkpoint 3 (Q5c):** If $$\\sigma < 1$$ when the interval half-width is 10, you've made a reciprocal error. $$\\sigma = 5.10$$, not 0.0510.", "source": "GLM 5.1 ②", "_id": "glm_2_69", "judge_pick": false}], "count": 70}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "In a back-to-back stem-and-leaf diagram, the left side (e.g., Birch) has leaves reading away from the stem. If the left row reads `9 8 8 7` next to stem `4`, what are the actual data values, and what is the common directional mistake? (2 steps)", "answer": "- Step 1: The stem is `4` and the leaves are `9 8 8 7`. On the left side, the smallest leaf is closest to the stem. So reading left-to-right visually corresponds to largest-to-smallest numerically.\n- Step 2: The values are 47, 48, 48, 49. The common mistake is reading them left-to-right as 49, 48, 48, 47, or worse, treating the string as a single number like 9887. You must read right-to-left on the left side to go from smallest to largest.\n\nAlways anchor yourself: the smallest value is always immediately next to the stem on both sides.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": true}, {"question": "How do you find the median of a dataset displayed in a stem-and-leaf diagram if there are 32 values? How does this translate to finding the median using cumulative frequency? (2 steps)", "answer": "- Step 1: For $$n = 32$$ (even), the median is the average of the $$\\frac{n}{2}$$th and $$(\\frac{n}{2} + 1)$$th values. So, the average of the 16th and 17th values.\n- Step 2: To find these on the diagram, calculate cumulative frequencies across the rows until you reach the 16th and 17th entries. For example, if the cumulative frequency reaches 12 at the end of one row, and the next row has 6 entries, the 16th and 17th values are the 4th and 5th leaves in that next row.\n\nCumulative frequency is the safest way to navigate stem-and-leaf diagrams to avoid off-by-one errors.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "What is the Edexcel IAL rule for finding the lower quartile ($$Q_1$$) position in a dataset of size $$n$$, and what do you do if the position is a non-integer like 8.75? (2 steps)", "answer": "- Step 1: The position for $$Q_1$$ is given by $$\\frac{n}{4}$$. (Do NOT use $$\\frac{n+1}{4}$$, which is a domestic A-level convention).\n- Step 2: If $$\\frac{n}{4}$$ is an integer, take the average of that value and the next one. If it is a non-integer (like 8.75), round UP to the next integer (9th value). \n\nEdexcel IAL always rounds up for non-integer quartile positions—there is no interpolation for discrete/stem-and-leaf data.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "How do you calculate outlier fences, and what is the specific rule for drawing the whisker on a box plot when an outlier exists? (2 steps)", "answer": "- Step 1: Calculate the Interquartile Range ($$IQR = Q_3 - Q_1$$). The lower fence is $$Q_1 - k \\cdot IQR$$ and the upper fence is $$Q_3 + k \\cdot IQR$$ (where $$k$$ is given, usually 1.5). Any data point outside these fences is an outlier.\n- Step 2: The whisker does NOT extend to the fence; it extends to the highest/lowest data point that is **still within** the fences. Outliers are plotted as isolated crosses ($$\\times$$) beyond the whiskers.\n\nA common mistake is drawing the whisker all the way to the fence value itself, rather than to the nearest actual data point inside the fence.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": true}, {"question": "When comparing two distributions displayed in stem-and-leaf or box plots, what two statistical measures must you compare, and what do they tell you? (2 steps)", "answer": "- Step 1: Compare the **medians** (or means). This tells you about the central tendency—e.g., \"Distribution A has a higher median, so it typically grows faster/is larger.\"\n- Step 2: Compare the **IQRs** (or ranges/standard deviations). This tells you about the spread/consistency—e.g., \"Distribution B has a smaller IQR, so its values are more consistent/less spread out.\"\n\nAlways pair the statistic with the context of the question. Saying \"Birch is bigger\" is vague; say \"Birch has a higher median height, so it grows taller on average.\"", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "If you add 4 new values to a dataset of 32 (making $$n=36$$) and the box plot must remain completely unchanged, what constraints must the new values satisfy regarding the maximum value and $$Q_1$$? (3 steps)", "answer": "- Step 1: The maximum value must not change. If one of the new values is $$2a$$ and the original max was 80, then $$2a \\le 80$$, so $$a \\le 40$$.\n- Step 2: The new $$Q_1$$ must not change. For $$n=36$$, $$Q_1$$ is the average of the 9th and 10th values. If the original $$Q_1$$ was 36, at most one new value can be below 36 (otherwise the 9th/10th values shift down).\n- Step 3: If one new value is 27 (which is $$< 36$$), the other new value $$a$$ must be $$\\ge 36$$ to ensure the 9th and 10th values remain 36.\n\nPreserving a box plot means preserving the min, $$Q_1$$, median, $$Q_3$$, and max. Adding data inside the quartiles or exactly at existing values is safe; adding data outside them shifts the boundaries.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "When solving $$P(aX + b > c)$$ for a discrete random variable $$X$$, what is the crucial first algebraic step before you can sum probabilities?", "answer": "You must rearrange the inequality to isolate $$X$$. For $$2X - 3 > 5$$, add 3 to get $$2X > 8$$, then divide by 2 to get $$X > 4$$. Only then can you identify which values of $$X$$ satisfy the condition and sum their probabilities. Skipping the rearrangement leads to testing the wrong values.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": true}, {"question": "What is the difference between $$E(X^2)$$ and $$[E(X)]^2$$, and what is the common mistake in calculating $$E(X^2)$$? (2 steps)", "answer": "- Step 1: $$E(X^2)$$ is the expectation of the squared random variable, calculated by squaring each outcome first, then multiplying by its probability: $$\\Sigma x^2 P(X=x)$$. $$[E(X)]^2$$ is the square of the expected value.\n- Step 2: The common mistake is calculating $$[E(X)]^2$$ by squaring the product $$x \\cdot P(X=x)$$ for each term, rather than squaring $$x$$ first. You must square the outcome, then weight by probability.\n\nThe variance formula $$Var(X) = E(X^2) - [E(X)]^2$$ requires both terms calculated correctly. The first term weights the squared outcomes; the second simply squares the single mean value.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "Why does adding a constant $$b$$ (as in $$Y = aX + b$$) have no effect on the variance, while multiplying by $$a$$ changes it by $$a^2$$? (2 steps)", "answer": "- Step 1: Variance measures spread—the average squared distance of data points from their mean. Adding a constant $$b$$ shifts the entire dataset (and its mean) by $$b$$, but the distances between points remain identical. Hence, spread is unchanged.\n- Step 2: Multiplying by $$a$$ scales all distances by $$a$$. When you square these scaled distances to calculate variance, the factor becomes $$a^2$$. Thus, $$Var(aX + b) = a^2 Var(X)$$.\n\nThe $$+b$$ vanishes from variance but shifts the mean: $$E(aX+b) = aE(X) + b$$.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": true}, {"question": "If $$Var(X) = 4.14$$ and $$Y = 4X - 5$$, what is $$Var(Y)$$? (Simple mental math exercise) (2 steps)", "answer": "- Step 1: Identify the scaling factor $$a = 4$$ and the shift $$b = -5$$.\n- Step 2: Apply the variance coding rule: $$Var(Y) = a^2 Var(X)$$. The shift $$b$$ is ignored. $$Var(Y) = 4^2 \\times 4.14 = 16 \\times 4.14 = 66.24$$.\n\nShifts change location but not spread; multipliers scale spread, and squaring the multiplier scales variance.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": true}, {"question": "To find $$P(S > R)$$ for two independent spins $$S$$ and $$R$$, where $$R$$ is a linear function of a second spin $$X_2$$, how do you structure the calculation using conditional probabilities? (2 steps)", "answer": "- Step 1: Condition on the outcome of the second spin. For each possible value $$x_2$$, calculate the resulting $$R$$ value.\n- Step 2: For each $$R$$, find $$P(S > R)$$ by summing the probabilities of $$S$$ values strictly greater than $$R$$. Then multiply this probability by $$P(X_2 = x_2)$$ and sum over all possible $$x_2$$.\n\nThis uses the law of total probability: $$P(S > R) = \\Sigma P(S > R \\mid X_2 = x_2) P(X_2 = x_2)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": true}, {"question": "Why must you use a strict inequality ($$S > R$$) rather than $$S \\ge R$$ when the question states \"the higher score wins\"?", "answer": "If \"higher score wins,\" a tie ($$S = R$$) means neither wins. Using $$\\ge$$ would incorrectly count ties as wins for $$S$$. In probability questions involving games, \"wins\" strictly means outscoring the opponent, so you only sum probabilities where $$S$$ is strictly greater than $$R$$.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": true}, {"question": "In a histogram, what quantity is proportional to frequency, and how do you use a \"reference bar\" to find the dimensions of another bar? (3 steps)", "answer": "- Step 1: In a histogram, **area** (not height) is proportional to frequency. $$\\text{Area} = \\text{width} \\times \\text{height}$$.\n- Step 2: Calculate the area of the reference bar (e.g., $$2.5 \\text{ cm} \\times 7.5 \\text{ cm} = 18.75 \\text{ cm}^2$$) and note its frequency (e.g., 20). This establishes the scale: $$18.75 \\text{ cm}^2 \\leftrightarrow 20 \\text{ items}$$.\n- Step 3: For a target class, find its required area by scaling: $$(\\text{target freq} / \\text{ref freq}) \\times \\text{ref area}$$. Find its width by scaling the class width to the page scale. Finally, divide the target area by the target width to get the height.\n\nNever assume the x-axis scale is 1 unit = 1 cm on the page. Always use the reference bar to find the conversion factor for widths.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "What position do you use for the grouped median, and how does linear interpolation find the exact value within the median class? (2 steps)", "answer": "- Step 1: The median position is $$n/2$$ (not $$(n+1)/2$$ for grouped data). Find the median class using cumulative frequency to see which class contains the $$n/2$$th value.\n- Step 2: Use the formula: $$\\text{median} = L + \\frac{n/2 - F}{f} \\times c$$, where $$L$$ is the lower bound of the median class, $$F$$ is the cumulative frequency before the median class, $$f$$ is the frequency of the median class, and $$c$$ is the class width. This assumes values are uniformly distributed within the class.\n\nLinear interpolation bridges the gap proportionally—it calculates how far into the class width the $$n/2$$th value falls.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "If data is coded using $$10y = w - 20$$, how do you decode the mean and the standard deviation? Why do they decode differently? (3 steps)", "answer": "- Step 1: Rearrange the coding formula to make the original variable the subject: $$w = 10y + 20$$. This shows $$w$$ is a linear transformation of $$y$$ with scale $$a=10$$ and shift $$b=20$$.\n- Step 2: Decode the mean using both shift and scale: $$\\bar{w} = 10\\bar{y} + 20$$. The mean is a measure of location, so it shifts and scales.\n- Step 3: Decode the standard deviation using only the scale: $$\\sigma_w = 10\\sigma_y$$. Standard deviation is a measure of spread, and adding 20 shifts the data without changing how spread out it is. Only the multiplier affects the spread.\n\nA common error is adding 20 to the standard deviation. Shifts change location, not spread!", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "If a new value exactly equal to the current mean is added to a dataset, what happens to the new mean and the new standard deviation? (2 steps)", "answer": "- Step 1: The **mean is unchanged**. The sum of deviations increases by $$(\\text{new value} - \\text{mean}) = 0$$, and while the denominator increases from $$n$$ to $$n+1$$, the overall ratio remains exactly the same.\n- Step 2: The **standard deviation decreases**. The numerator of the variance formula (sum of squared deviations) does not change (because the new deviation is 0), but the denominator $$n$$ grows. A smaller variance means a smaller standard deviation.\n\nAdding a value at the mean adds no spread, but the larger denominator \"dilutes\" the existing spread, slightly reducing the standard deviation.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "What do the summary statistics $$S_{xy}$$, $$S_{xx}$$, and $$S_{yy}$$ represent conceptually, and how are they calculated from sums ($$\\Sigma x, \\Sigma y$$, etc.)? (2 steps)", "answer": "- Step 1: Conceptually, they represent the variation/co-variation of the data. $$S_{xx}$$ and $$S_{yy}$$ measure how spread out the $$x$$ and $$y$$ values are from their means. $$S_{xy}$$ measures how the $$x$$ and $$y$$ values vary together.\n- Step 2: The computational formulas are $$S_{xx} = \\Sigma x^2 - \\frac{(\\Sigma x)^2}{n}$$, $$S_{yy} = \\Sigma y^2 - \\frac{(\\Sigma y)^2}{n}$$, and $$S_{xy} = \\Sigma xy - \\frac{(\\Sigma x)(\\Sigma y)}{n}$$. \n\nThese formulas are mathematically equivalent to $$\\Sigma(x-\\bar{x})^2$$ but much faster to compute. Avoid swapping the order in $$S_{xy}$$; it's $$\\Sigma xy$$ minus the product of sums over $$n$$.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": true}, {"question": "What does the Product Moment Correlation Coefficient (PMCC, $$r$$) measure, and how is it calculated from $$S$$-statistics?", "answer": "The PMCC $$r$$ measures the strength and direction of the **linear** correlation between two variables. It is calculated as $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} S_{yy}}}$$. The numerator captures how they vary together, and the denominator scales this co-variation relative to how much each variable varies individually, ensuring $$r$$ always falls between $$-1$$ and $$1$$.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": true}, {"question": "In the regression line $$y = a + bx$$, what is the formula for the gradient $$b$$ and intercept $$a$$? Why is it crucial not to swap the denominator in $$b$$? (2 steps)", "answer": "- Step 1: The gradient is $$b = \\frac{S_{xy}}{S_{xx}}$$ and the intercept is $$a = \\bar{y} - b\\bar{x}$$. The line minimizes the vertical (y-direction) squared distances from the data points.\n- Step 2: The denominator must be $$S_{xx}$$ because we are regressing $$y$$ on $$x$$ (predicting $$y$$ from $$x$$). Swapping to $$S_{yy}$$ would correspond to regressing $$x$$ on $$y$$, which is a completely different line unless $$r=1$$.\n\nRegression of $$y$$ on $$x$$ treats $$x$$ as the independent variable. The denominator must be the variation of the independent variable.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": true}, {"question": "When interpreting the gradient of a regression line in an exam, what two elements must you include to get the full mark?", "answer": "You must include **units** and **context**. For example, do not say \"y increases by 0.722 per unit increase in x.\" Instead, say \"For every additional 1 cm increase in bear length, the girth increases by approximately 0.722 cm.\" Without units and context, the interpretation is ambiguous and loses the mark.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "Why is using a regression line to estimate a value far outside the observed data range (extrapolation) unreliable? Give a physical example using bear lengths. (2 steps)", "answer": "- Step 1: The linear relationship observed in the data sample may not hold true outside that range. The underlying biological/physical process might be non-linear at extreme values.\n- Step 2: For bears, if the sample mean length is 182 cm, predicting girth for a 50 cm bear (a small cub) using the adult regression line yields a negative girth, which is physically impossible. The proportional relationship for cubs is different from adults.\n\nExtrapolation assumes the trend continues infinitely, which is rarely true in real-world data.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "When a question says \"the fastest 60% qualify\" for a race time (where lower time is better), which percentile represents the longest qualifying time, and how do you translate this into a probability statement? (2 steps)", "answer": "- Step 1: The \"fastest 60%\" means the lowest 60% of times. The longest qualifying time is the boundary at the top of this lowest 60%, which is the **60th percentile**.\n- Step 2: This translates to finding the value $$t$$ such that $$P(X < t) = 0.60$$. A common error is reading \"fastest\" as meaning the extreme tail and writing $$P(X < t) = 0.40$$, which would only qualify the fastest 40%.\n\n\"Fastest\" refers to the quickest (lowest) times. \"Longest qualifying time\" means the slowest time that still gets in—the upper boundary of the lowest 60%.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "If $$P(\\mu - k < X < \\mu + k) = 0.95$$ for a normal distribution, what is the relationship between $$k$$ and $$\\sigma$$, and what z-value must you memorise for this? (2 steps)", "answer": "- Step 1: The 95% probability is split symmetrically, leaving 2.5% in each tail. This corresponds to a z-value of **1.96** (from the percentage points table).\n- Step 2: The relationship is $$k = 1.96\\sigma$$. If you know $$k$$, you can find $$\\sigma = k / 1.96$$. If you know $$\\sigma$$, you can find $$k$$.\n\nThis symmetric interval trick is a favourite for 5-mark questions. Memorise: 95% central probability $$\\iff k = 1.96\\sigma$$.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "If event A is a strict subset of event B ($$A \\subset B$$), what simplification occurs for $$P(A \\cap B)$$, and how does this make calculating $$P(A \\mid B)$$ much easier? (2 steps)", "answer": "- Step 1: If $$A$$ is entirely contained within $$B$$, then the intersection of $$A$$ and $$B$$ is just $$A$$ itself. So, $$P(A \\cap B) = P(A)$$.\n- Step 2: The conditional probability formula $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$ simplifies to just $$\\frac{P(A)}{P(B)}$$. You don't need to calculate a complex intersection; just divide the probability of the smaller event by the larger event.\n\nFor example, if $$A$$ is \"time > $$\\mu-5$$\" and $$B$$ is \"time > $$\\mu-10$$\", clearly $$A \\subset B$$. So $$P(A \\cap B)$$ is just $$P(A)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "How do you sense-check a calculated standard deviation (e.g., $$\\sigma = 0.0510$$ vs $$\\sigma = 5.10$$) when standardising a value a few units from the mean? (2 steps)", "answer": "- Step 1: Standardise the value to find the z-score: $$z = \\frac{x - \\mu}{\\sigma}$$. If the value is 5 units from the mean and $$\\sigma = 5.10$$, then $$z \\approx -1$$, which is perfectly reasonable for normal distribution probabilities.\n- Step 2: If you mistakenly use $$\\sigma = 0.0510$$, the z-score becomes $$z \\approx -5 / 0.0510 \\approx -98$$. The normal distribution table only goes up to about $$z = 3.5$$. A z-score off the chart is a massive red flag that your $$\\sigma$$ has a reciprocal or decimal error.\n\nAlways ask: \"Does this z-score make sense for the context?\" Most real-world events happen within 3 standard deviations of the mean.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "When asked for \"Plays Chess but not Go\" on a 3-circle Venn diagram, which regions must you include?", "answer": "You must include all regions inside the Chess circle that do NOT overlap with the Go circle. This means the \"Chess only\" region PLUS the \"Chess and Scrabble only\" region. A common mistake is only including the \"Chess only\" region, forgetting that overlapping with the third variable (Scrabble) is allowed as long as Go is excluded.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "To test if events C and S are independent, what equation must hold true involving their probabilities?", "answer": "Events C and S are independent if and only if $$P(C \\cap S) = P(C) \\times P(S)$$. You must calculate the intersection directly from the Venn diagram regions, and compare it to the product of the total probabilities of each event. If they are equal, the events are independent.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "How do you translate the set notation $$P((C \\cup S) \\cap G')$$ into Venn diagram regions? (2 steps)", "answer": "- Step 1: $$(C \\cup S)$$ means everything inside the C circle OR the S circle.\n- Step 2: $$\\cap G'$$ means we exclude everything inside the G circle. The remaining regions are \"C only\", \"S only\", and \"C and S only (not G)\".\n\nBreak down complex set notation step by step. The union expands the selection, and the intersection with a complement (like $$G'$$) acts as a filter removing regions.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "If you know the probability of an event and the actual observed count of that event in a population, how do you estimate the total population size? (Simple exercise) (2 steps)", "answer": "- Step 1: The expected count is given by $$\\text{Total Population} \\times \\text{Probability}$$. Rearrange this to solve for the total: $$\\text{Total Population} = \\frac{\\text{Observed Count}}{\\text{Probability}}$$.\n- Step 2: Example: If 76 students play both Chess and Go, and $$P(C \\cap G) = 0.26$$, then $$N = 76 / 0.26 \\approx 292$$.\n\nThis is proportion scaling. The probability represents the fraction of the whole, so dividing the part by its fractional value yields the whole.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": true}, {"question": "When finding $$P(S')$$ (the probability of NOT playing Scrabble) in a 3-circle Venn diagram, what is the easiest calculation method, and what was the tutor's error in this paper? (2 steps)", "answer": "- Step 1: The easiest method is the **complement rule**: $$P(S') = 1 - P(S)$$. You already know $$P(S)$$ from the Venn diagram, so just subtract from 1. (e.g., $$1 - 0.60 = 0.40$$).\n- Step 2: The tutor's error was trying to manually add up the regions outside S (G-only, C-and-G-only, outside all) but forgot some regions (like the outside region $$q = 0.22$$), resulting in an incorrect $$P(S') = 0.18$$ instead of 0.40.\n\nWhen asked for the complement of a major event, always use $$1 - P(\\text{event})$$. Manual summation of Venn regions is error-prone and unnecessary.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": false}, {"question": "What is the computational formula for variance (the \"S1 STAR formula\"), and why is it preferred over the definition formula $$\\frac{\\Sigma(x-\\bar{x})^2}{n}$$? (2 steps)", "answer": "- Step 1: The computational formula is $$\\sigma^2 = \\frac{\\Sigma x^2}{n} - \\bar{x}^2$$ (or $$\\frac{\\Sigma f x^2}{\\Sigma f} - \\bar{x}^2$$ for frequency data).\n- Step 2: It is preferred because it uses raw sums ($$\\Sigma x^2$$ and $$\\bar{x}$$) rather than requiring you to calculate the deviation $$(x - \\bar{x})$$ for every single data point first. It is much faster and less prone to rounding errors.\n\nRemember: Variance = \"Mean of the squares minus the square of the mean.\"", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": true}, {"question": "What are the key percentage point z-values to memorise for 90%, 95%, and 99% symmetric central intervals, and how do they relate to $$k$$ and $$\\sigma$$?", "answer": "+ 90% interval: 5% in each tail $$\\implies z = 1.6449 \\implies k = 1.6449\\sigma$$\n+ 95% interval: 2.5% in each tail $$\\implies z = 1.9600 \\implies k = 1.96\\sigma$$\n+ 99% interval: 0.5% in each tail $$\\implies z = 2.5758 \\implies k = 2.5758\\sigma$$\n\nThese z-values are found in the percentage points table (which gives the upper tail area). The 95% value (1.96) is the most frequently tested and should be committed to memory.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": false}], "count": 32}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "How to find the missing value `k` in the back-to-back stem-and-leaf plot for Maple seedlings’ median? (3 steps)", "answer": "- Step 1: **Identify median position** for Maple (n=32): (16th + 17th)/2 = 45 cm.  \n- Step 2: **Locate 16th and 17th values** in Maple’s cumulative frequencies: 16th = 40 + k, 17th = 47.  \n- Step 3: **Set up median equation**: (40 + k + 47)/2 = 45 ⇒ **k = 3**.  \n  + Key: Use the stem-and-leaf key to decode values (e.g., `4|1 1 1 k 7 8` ⇒ 41, 41, 41, 40 + k, 47, 48).  \n\n**Takeaway:** Always use cumulative frequencies and the median formula for discrete data.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": true}, {"question": "Why does the Birch box plot have exactly one outlier at 85 cm? (3 steps)", "answer": "- Step 1: **Calculate IQR** = Q₃ − Q₁ = 57 − 39 = 18.  \n- Step 2: **Determine fences**: Lower fence = 39 − 1.5×18 = 12, Upper fence = 57 + 1.5×18 = 84.  \n- Step 3: **Check data range**: Min Birch = 28 (>12), Max = 85 (>84) ⇒ **only 85 is an outlier**.  \n  + Note: Direction of reading (right-to-left for Birch) affects Q₁/Q₃ positions.  \n\n**Takeaway:** Outliers are beyond 1.5×IQR from Q₁/Q₃; direction of stem-and-leaf data matters.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "How to determine the range of `a` such that adding new values keeps the Maple box plot unchanged? (4 steps)", "answer": "- Step 1: **Original stats**: min=25, Q₁=36, median=45, Q₃=54, max=80.  \n- Step 2: **Constraints** (new n=36):  \n  + Max ≤ 80 ⇒ 2a ≤ 80 ⇒ a ≤ 40.  \n  + Q₁=36 ⇒ exactly one new value <36 (only 27 qualifies) ⇒ a ≥ 36.  \n  + Median=45 ⇒ a ≤ 43 (ensured by a ≤40).  \n- Step 3: **Combine constraints**: 36 ≤ a ≤ 40.  \n  + Key: Ensure all original quartiles and max remain valid after adding values.  \n\n**Takeaway:** Constraints must satisfy all box plot elements simultaneously.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": true}, {"question": "Why is Fuat’s answer for Q6(e) (47 students) incorrect, and how to fix it? (3 steps)", "answer": "- Step 1: **Fuat’s error**: He calculated P(S′) as 0.18 (only G-only and outside regions) but ignored S-only and C∩S-only.  \n- Step 2: **Correct P(S′)** = 1 − P(S) = 1 − 0.60 = 0.40.  \n- Step 3: **Scale to population**:  \n  + P(C∩G) = 0.26 (from C∩G only + C∩S∩G).  \n  + N = 76 / 0.26 ≈ 292.3.  \n  + # S′ = 292.3 × 0.40 ≈ **117 students**.  \n  + Alternative approach gives ~105 if scaling differently.  \n\n**Takeaway:** Use the complement rule for P(S′); avoid missing regions in Venn diagrams.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": true}, {"question": "How to derive σ in Q5(c) given P(μ−10 < T < μ+10)=0.95? (2 steps)", "answer": "- Step 1: **Apply symmetric interval trick**: For 95%, k = 1.96σ ⇒ 10 = 1.96σ ⇒ σ = 10/1.96 ≈ **5.10**.  \n- Step 2: **Avoid Fuat’s error**: σ = 10/1.96 ≠ 0.0510 (incorrect decimal placement).  \n  + Check: σ=0.0510 would give z = −5/0.0510 ≈ −98 (impossible).  \n\n**Takeaway:** Memorize k=1.96 for 95% symmetric intervals; always validate σ’s reasonableness.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Why does adding a pebble of 40.8 g (equal to the mean) leave the mean unchanged but decrease the SD? (3 steps)", "answer": "- Step 1: **Mean**: New Σw = 40.8×50 + 40.8 = 40.8×51 ⇒ mean remains 40.8.  \n- Step 2: **SD**: New deviation = (40.8−40.8)² = 0 ⇒ numerator (Σ(x−μ)²) stays same, but denominator increases (n=51).  \n- Step 3: **Conclusion**: Variance = numerator/n ⇒ smaller variance ⇒ SD decreases.  \n  + Key: Adding the mean doesn’t affect the mean but reduces variance.  \n\n**Takeaway:** Adding a value equal to the mean leaves the mean unchanged but tightens the distribution.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "How to compute P(Sam wins) in Q2(d) using conditional probabilities? (3 steps)", "answer": "- Step 1: **Define S = X₁, R = 2X₂ − 3**. Sam wins if S > R.  \n- Step 2: **Condition on X₂**: For each x₂, compute P(X₁ > 2x₂ − 3) and multiply by P(X₂=x₂).  \n- Step 3: **Sum contributions**:  \n  + x₂=2 ⇒ R=1 ⇒ P(S>1)=1 ⇒ 1×0.25=0.25.  \n  + x₂=4 ⇒ R=5 ⇒ P(S>5)=0.25 ⇒ 0.25×0.3=0.075.  \n  + x₂=5 ⇒ R=7 ⇒ P(S>7)=0.15 ⇒ 0.15×0.2=0.03.  \n  + Total = 0.25 + 0.075 + 0.03 = **0.355**.  \n\n**Takeaway:** Break into cases for each x₂ and sum probabilities.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Why is the gradient of the regression line in Q4(c) interpreted as 0.722 cm increase in girth per 1 cm increase in length?", "answer": "- Step 1: **Gradient formula**: b = S_dg / S_dd = 12,105.12 / 16,769.78 ≈ 0.722.  \n- Step 2: **Interpretation**: For every 1 cm increase in bear length, girth increases by 0.722 cm **on average** within the sampled range.  \n- Step 3: **Units matter**: Gradient has units (cm girth / cm length); omitting units is a common mistake.  \n\n**Takeaway:** Gradient is a rate of change; always include units and mention “on average.”", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "How to scale the histogram bar width and height for class 30 ≤ x < 32 in Q3(a)? (3 steps)", "answer": "- Step 1: **Reference bar**: 32 ≤ x <36 has width=4 mm, freq=20, area=18.75 cm².  \n- Step 2: **Target class width**: 2 mm ⇒ width on page = (2/4) × 2.5 cm = 1.25 cm.  \n- Step 3: **Area ∝ frequency**: freq=16 ⇒ area = (16/20) × 18.75 = 15 cm² ⇒ height = 15 / 1.25 = 12 cm.  \n  + Key: Width scales with class range; height = area / width.  \n\n**Takeaway:** Histogram area (not height) is proportional to frequency.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "Why is extrapolation in Q4(e) unreliable, e.g., predicting girth for d = 0.5 m?", "answer": "- Step 1: **Sample context**: Mean d = 182.1 cm (1.82 m); 0.5 m is far outside the data range.  \n- Step 2: **Model limitations**: Linear model may not hold beyond sampled range (e.g., bears’ girth can’t be negative).  \n- Step 3: **Example**: d=50 cm ⇒ g = −42.3 + 0.722×50 = −6.2 cm (impossible).  \n\n**Takeaway:** Extrapolation assumes the linear relationship persists, which is often invalid.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}], "count": 10}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "How to determine the value of *k* in a back-to-back stem-and-leaf plot given the median of the Maple seedlings? (3 steps)", "answer": "- Step 1: **Identify the median position**. For 32 Maple seedlings, the median lies between the 16th and 17th values.  \n- Step 2: **Extract values from the stem-and-leaf plot**. The 16th value is in the 4|*k* stem (40 + *k*), and the 17th value is 47.  \n- Step 3: **Set up the median equation**.  \n  $$\n  \\frac{(40 + k) + 47}{2} = 45 \\Rightarrow k = 3\n  $$  \n  (Solve for *k* to satisfy the median value.)", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Why are quartiles in stem-and-leaf plots calculated using *n*/4 and rounding up instead of (n+1)/4?", "answer": "Edexcel IAL S1 specifies using *n*/4 for quartiles, not (n+1)/4. For 35 Birch seedlings:  \n- Q₁ position = 35/4 = 8.75 → round up to 9th value (39 cm).  \n- Q₃ position = 3×35/4 = 26.25 → round up to 27th value (57 cm).  \n**Contrast**: Domestic A-level often uses (n+1)/4, but IAL strictly requires *n*/4.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": true}, {"question": "How to identify an outlier in a stem-and-leaf plot using fences? (3 steps)", "answer": "- Step 1: **Calculate IQR** = Q₃ − Q₁ = 57 − 39 = 18.  \n- Step 2: **Compute fences**. Lower fence = 39 − 1.5×18 = 12; upper fence = 57 + 1.5×18 = 84.  \n- Step 3: **Compare data points**. The value 85 cm (Birch) exceeds the upper fence of 84, making it an outlier.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "What constraints must *a* satisfy if adding 27, *a*, 48, 2*a* to Maple data leaves the box plot unchanged? (3 steps)", "answer": "- Step 1: **Preserve max** = 80 ⇒ 2*a* ≤ 80 ⇒ *a* ≤ 40.  \n- Step 2: **Keep Q₁ = 36**. Only 27 qualifies as a new value below Q₁, so *a* ≥ 36.  \n- Step 3: **Ensure median = 45**. New 18th and 19th values (43 and 47) require *a* ≤ 43 and 2*a* > 47 ⇒ *a* ≥ 36 (already satisfied).  \n**Final range**: 36 ≤ *a* ≤ 40.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Why does adding a value equal to the current mean leave the mean unchanged but decrease the standard deviation?", "answer": "- **Mean**: Adding *x* = μ keeps Σx + μ = (n+1)μ ⇒ new mean = (nμ + μ)/(n+1) = μ.  \n- **SD**: New deviation = (μ − μ)² = 0. Variance becomes:  \n  $$\n  \\frac{n\\sigma^2 + 0}{n+1}\n  $$  \n  Since *n* increases, variance decreases ⇒ SD decreases.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "How to calculate P(Sam wins) for independent spinners S = X₁ and R = 2X₂ − 3? (4 steps)", "answer": "- Step 1: **List all possible R values** (2X₂ − 3 for X₂ ∈ {2,4,5,7,8}).  \n- Step 2: **For each X₂, compute P(X₁ > R)**. Example: If X₂ = 4 ⇒ R = 5 ⇒ P(X₁ > 5) = P(X ∈ {5,7,8}) = 0.45.  \n- Step 3: **Multiply by P(X₂) for each case**. Example: X₂ = 4 ⇒ 0.45 × 0.3 = 0.135.  \n- Step 4: **Sum all contributions**: 0.25 + 0.075 + 0.03 = **0.355**.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Why is the variance of Y = aX + b given by Var(Y) = a²·Var(X) and not a·Var(X)?", "answer": "- **Variance measures spread**, which is unaffected by shifts (+b). Scaling by *a* affects spread quadratically:  \n  $$\n  \\text{Var}(aX + b) = \\text{Var}(aX) = a^2\\text{Var}(X)\n  $$  \n- **Example**: If X is scaled by 4, variance increases by 16 (4²), not 4.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": true}, {"question": "How to decode mean and standard deviation from coded data (*w* = 10*y* + 20)? (3 steps)", "answer": "- Step 1: **Calculate ȳ** = Σ*y*/n = 104/50 = 2.08.  \n- Step 2: **Decode mean**: *w̄* = 10×2.08 + 20 = 40.8.  \n- Step 3: **Compute Var(*y*)** = (Σ*y*²/n) − ȳ² = (233.54/50) − 2.08² = 0.3444. Then:  \n  $$\n  \\sigma_w = 10\\sqrt{0.3444} \\approx 5.87\n  $$", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "Why does the regression gradient *b* = S_xy/S_xx and not S_xx/S_xy?", "answer": "- **Regression line minimizes vertical distances**: The slope *b* relates to how much *y* changes per unit *x*.  \n- **S_xy measures covariance** between *x* and *y*; S_xx measures variance of *x*.  \n- **Intuition**: If *x* varies more (larger S_xx), the slope *b* becomes smaller to compensate.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "How to compute P(T > μ−5 | T > μ−10) for T ~ N(μ, σ²) with P(μ−10 < T < μ+10) = 0.95? (5 steps)", "answer": "- Step 1: **Find σ** from symmetric interval:  \n  $$\n  \\frac{10}{\\sigma} = 1.96 \\Rightarrow \\sigma = 5.10\n  $$  \n- Step 2: **Standardize μ−5**: z = −5/5.10 ≈ −0.98.  \n- Step 3: **Find P(Z > −0.98)** = 0.8365 (from tables).  \n- Step 4: **Find P(T > μ−10)** = 0.975 (since 2.5% lies below μ−10).  \n- Step 5: **Apply conditional probability**:  \n  $$\n  \\frac{0.8365}{0.975} \\approx 0.858\n  $$", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "Why is P(S′) in Q6(e) calculated as 1 − P(S) = 0.40 instead of 0.18?", "answer": "- **Tutor error**: He forgot G-only (0) and outside (0.22) regions when computing P(S′).  \n- **Correct approach**:  \n  $$\n  P(S′) = 1 - P(S) = 1 - 0.60 = 0.40\n  $$  \n- **Misconception**: Failing to consider all regions outside S leads to undercounting.", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "How to determine the width and height for a histogram bar given a reference class? (3 steps)", "answer": "- Step 1: **Calculate reference area** = width × height = 2.5 cm (width) × 7.5 cm (height) = 18.75 cm².  \n- Step 2: **Width of target class** (30 ≤ x < 32): class width = 2 mm ⇒ (2/4) × 2.5 cm = 1.25 cm.  \n- Step 3: **Area for target frequency** (16):  \n  $$\n  \\text{Area} = \\frac{16}{20} \\times 18.75 = 15 \\text{ cm²} \\Rightarrow \\text{Height} = \\frac{15}{1.25} = 12 \\text{ cm}\n  $$", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}], "count": 12}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "What is the outlier detection rule using the interquartile range, and how do you apply it to identify outliers in the Birch seedling heights where Q₁ = 39, Q₃ = 57? (2 marks)", "answer": "- Step 1: Calculate IQR = Q₃ − Q₁ = 57 − 39 = 18.\n- Step 2: Compute the fences — lower fence = Q₁ − 1.5×IQR = 39 − 27 = 12; upper fence = Q₃ + 1.5×IQR = 57 + 27 = 84.\n- Step 3: Check data points — any value below 12 or above 84 is an outlier. The minimum Birch value is 28 (> 12), and only 85 exceeds 84, so **exactly one outlier: 85 cm**.\n\n[Takeaway: The 1.5×IQR rule is standard; always state the fences before identifying outliers.]", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": true}, {"question": "Why is it incorrect to read the left side of a back-to-back stem-and-leaf diagram from left to right? What is the correct reading order? (1 mark)", "answer": "In a back-to-back stem-and-leaf, the left side (e.g., Birch) lists values with the smallest digits closest to the stem. You must read from right to left (toward the stem) to get ascending order. For example, \"9 8\" next to stem 2 represents 28 and 29, NOT 92 or 98.\n\n[Takeaway: Always read toward the stem for the left-hand side of a back-to-back diagram.]", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "For the Maple seedlings with median = 45 cm, n = 32, and cumulative frequencies 5, 12, 18, 25, 28, 30, 32, find the value of k in the stem-and-leaf diagram. (3 steps)", "answer": "- Step 1: Median position = n/2 = 16th and 17th values. The median class is stem 4 (18 ≤ value < 25), giving cumulative 18.\n- Step 2: The 16th value falls in stem 4, specifically in the group \"4k\" (where k is the unknown digit). Reading right-to-left, this corresponds to 40 + k. The 17th value is 47.\n- Step 3: Median = (40 + k + 47)/2 = 45 ⇒ 87 + k = 90 ⇒ **k = 3**.\n\n[Takeaway: When the median position falls between two values, average them to find the median.]", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "The Birch box plot has minimum 28, Q₁ = 39, median = 48, Q₃ = 57, maximum non-outlier = 76, and an outlier at 85. Sketch this box plot, indicating where the whiskers and outlier marker should be placed. (4 marks)", "answer": "- Step 1: Draw the box from Q₁ = 39 to Q₃ = 57, with a line at median = 48.\n- Step 2: Left whisker extends from minimum (28) to Q₁ (39). Right whisker extends from Q₃ (57) to the largest non-outlier (76).\n- Step 3: Mark the outlier at 85 with a cross (×) — do NOT connect it with a whisker.\n- Step 4: Label the axis scale appropriately (height in cm).\n\n[Takeaway: Whiskers always extend to the furthest data points WITHIN the fences; outliers are marked separately with × or ○.]", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "Comparing the Birch and Maple seedlings, Birch has median 48 cm and Maple has median 45 cm. What can you conclude about the growth of the seedlings? (1 mark)", "answer": "The higher median of Birch (48 cm > 45 cm) indicates that, on average, Birch seedlings grow taller than Maple seedlings. The IQRs are both 18 cm, suggesting similar spread/variability in both species.\n\n[Takeaway: Compare medians for central tendency and IQRs for spread; always connect statistics to the context.]", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "For the Maple data, if four new values (27, a, 48, 2a) are added and the box plot remains unchanged, what range of values must a satisfy? The original five-number summary is min=25, Q₁=36, median=45, Q₃=54, max=80. (3 steps)", "answer": "- Step 1: New n = 36. The median must stay at 45, which is now the average of 18th and 19th values (43 and 47). This requires a ≤ 43.\n- Step 2: Q₁ = 36 is now the average of 9th and 10th values. Since only 27 is less than 36, we need exactly one new value below 36: a ≥ 36.\n- Step 3: Maximum ≤ 80 ⇒ 2a ≤ 80 ⇒ a ≤ 40.\n- Combined: **36 ≤ a ≤ 40**.\n\n[Takeaway: When adding values, all five-number summary constraints must be satisfied simultaneously.]", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "For a discrete random variable X with values {2, 4, 5, 7, 8} and probabilities {0.25, 0.3, 0.2, 0.1, 0.15}, calculate P(2X − 3 > 5). (1 mark)", "answer": "- Step 1: Rewrite the inequality: 2X − 3 > 5 ⇒ 2X > 8 ⇒ X > 4.\n- Step 2: Identify values satisfying X > 4: X = 5, 7, 8.\n- Step 3: Sum probabilities: P(5) + P(7) + P(8) = 0.2 + 0.1 + 0.15 = **0.45**.\n\n[Takeaway: Always rearrange inequalities before looking up probabilities.]", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "Given E(X) = 4.6 for the spinner distribution, calculate Var(X) using the formula Var(X) = E(X²) − [E(X)]². (3 steps)", "answer": "- Step 1: Calculate E(X²) = Σx²·P(X = x) = 2²(0.25) + 4²(0.3) + 5²(0.2) + 7²(0.1) + 8²(0.15) = 1 + 4.8 + 5 + 4.9 + 9.6 = 25.3.\n- Step 2: Compute [E(X)]² = 4.6² = 21.16.\n- Step 3: Var(X) = 25.3 − 21.16 = **4.14**.\n\n[Takeaway: E(X²) means square FIRST, then multiply by probability — NOT E(X) squared then multiplied.]", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "If Y = aX − b where a, b > 0, with E(Y) = 13.4 and Var(Y) = 66.24, and given Var(X) = 4.14, find the values of a and b. (4 steps)", "answer": "- Step 1: Use variance transformation: Var(Y) = a²·Var(X) ⇒ 66.24 = a²(4.14) ⇒ a² = 16 ⇒ **a = 4** (positive).\n- Step 2: Use expectation transformation: E(Y) = a·E(X) − b ⇒ 13.4 = 4(4.6) − b ⇒ 13.4 = 18.4 − b ⇒ **b = 5**.\n- Step 3: Verify: Y = 4X − 5 gives E(Y) = 4(4.6) − 5 = 13.4 ✓.\n- Step 4: Verify: Var(Y) = 4² × 4.14 = 16 × 4.14 = 66.24 ✓.\n\n[Takeaway: Var(aX + b) = a²·Var(X); the +b term does NOT affect variance. Only a² matters.]", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": true}, {"question": "Why does adding a constant b to a random variable (Y = X + b) NOT change its variance, but scaling by a (Y = aX) DOES change it? (conceptual)", "answer": "Variance measures spread around the mean. Adding a constant b shifts all values by the same amount, so the mean also shifts by b, and the distances from the mean remain unchanged — hence variance is unchanged. Scaling by a multiplies all distances from the mean by |a|, so variance (which is squared distance) gets multiplied by a².\n\n[Takeaway: The transformation rules are Var(aX + b) = a²·Var(X) and E(aX + b) = aE(X) + b.]", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "Two independent spins X₁ and X₂ are made. X₁ = S (Sam's score), and R = 2X₂ − 3 (Rosie's score). Calculate P(Sam wins), meaning P(S > R). The distribution of X is {2,4,5,7,8} with probabilities {0.25,0.3,0.2,0.1,0.15}. (4 steps)", "answer": "- Step 1: Condition on X₂ value. Compute R = 2x₂ − 3 for each possible x₂.\n- Step 2: For each R value, find P(X₁ > R):\n  + x₂ = 2 → R = 1 → P(X₁ > 1) = 1 (all values) → 1 × 0.25 = 0.25\n  + x₂ = 4 → R = 5 → P(X₁ > 5) = P(7,8) = 0.1 + 0.15 = 0.25 → 0.25 × 0.3 = 0.075\n  + x₂ = 5 → R = 7 → P(X₁ > 7) = P(8) = 0.15 → 0.15 × 0.2 = 0.03\n  + x₂ = 7 → R = 11 → P(X₁ > 11) = 0 → contribution = 0\n  + x₂ = 8 → R = 13 → P(X₁ > 13) = 0 → contribution = 0\n- Step 3: Sum all contributions: 0.25 + 0.075 + 0.03 = **0.355**.\n- Step 4: This is P(S > R), using strict inequality — ties would count as neither winning.\n\n[Takeaway: When comparing independent random variables, condition on one and sum over all scenarios.]", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": true}, {"question": "In a histogram with a reference bar for class 32 ≤ x < 36 having frequency 20 and dimensions 2.5 cm × 7.5 cm, what should be the height of the bar for class 30 ≤ x < 32 which has frequency 16 and width 2 mm? (3 steps)", "answer": "- Step 1: Reference bar area = 2.5 × 7.5 = 18.75 cm² represents 20 pebbles. Area per pebble = 18.75/20 = 0.9375 cm².\n- Step 2: Target class area required = 16 × 0.9375 = 15 cm². Width on page = (2/4) × 2.5 = 1.25 cm (since 4 mm on number line = 2.5 cm on page).\n- Step 3: Height = Area/Width = 15/1.25 = **12 cm**.\n\n[Takeaway: In histograms, AREA represents frequency — not height. Use area proportions to determine dimensions.]", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": true}, {"question": "For grouped data with 50 pebbles, the cumulative frequencies are 2, 18, 38, 46, 49, 50. Find the median using linear interpolation. (2 steps)", "answer": "- Step 1: Median position = n/2 = 25. This falls in the class 32 ≤ x < 36 (cumulative jumps from 18 to 38).\n- Step 2: median = L + (n/2 − F)/f × c = 32 + (25 − 18)/20 × 4 = 32 + (7/20) × 4 = 32 + 1.4 = **33.4 mm**.\n- L = lower class boundary = 32, F = cumulative frequency before = 18, f = frequency in class = 20, c = class width = 4.\n\n[Takeaway: Use n/2 for median position in grouped data (IAL convention), NOT (n+1)/2.]", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "Data is coded as 10y = w − 20 (so w = 10y + 20). Given Σy = 104 and Σy² = 233.54 for n = 50, find the decoded mean w̄ and standard deviation σ_w. (4 steps)", "answer": "- Step 1: ȳ = Σy/n = 104/50 = 2.08. Decode: w̄ = 10(2.08) + 20 = **40.8 g**.\n- Step 2: Var(y) = Σy²/n − ȳ² = 233.54/50 − 2.08² = 4.6708 − 4.3264 = 0.3444.\n- Step 3: σ_y = √0.3444 ≈ 0.5869.\n- Step 4: Decode: σ_w = |b|·σ_y = 10 × 0.5869 = **5.87 g** (3 s.f.).\n\n[Takeaway: When decoding, mean uses x̄ = b·ȳ + a; SD uses σ_x = |b|·σ_y (the +a shift doesn't affect spread).]", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "If a pebble weighing exactly 40.8 g (the mean) is added to the dataset of 50 pebbles with mean 40.8 g and SD 5.87 g, what happens to the mean and standard deviation? Explain why. (2 steps)", "answer": "- Step 1 (Mean): The mean remains **unchanged** at 40.8 g. Adding a value equal to the current mean doesn't change the sum-to-mean ratio.\n- Step 2 (SD): The standard deviation **decreases**. The new value has zero deviation from the mean, so Σ(x − x̄)² doesn't increase while n increases from 50 to 51. Since variance = Σ(x − x̄)²/n, the numerator stays the same but denominator grows → smaller variance → smaller SD.\n\n[Takeaway: Adding the exact mean always reduces spread because variance = (1/n) × Σ(deviation²).]", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "Why is the standard deviation the preferred measure of spread over the range? What limitation does the range have that IQR or SD address? (conceptual)", "answer": "The range only uses two values (max and min), making it highly sensitive to outliers. A single extreme value can dramatically increase the range without reflecting the typical spread. Standard deviation uses ALL data points, weighting each by its squared deviation from the mean. The IQR uses the middle 50% of data, ignoring extremes. Both are more robust representations of typical spread.\n\n[Takeaway: Range = max − min; IQR = Q₃ − Q₁; SD = √[Σ(x − x̄)²/n].]", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "For the bear data (n = 8), given Σd = 1456.8, Σg = 713.2, Σdg = 141,978.84, S_dd = 16,769.78, calculate S_dg and S_gg. (3 steps)", "answer": "- Step 1: Formula S_xy = Σxy − (Σx)(Σy)/n.\n- Step 2: S_dg = 141,978.84 − (1456.8 × 713.2)/8 = 141,978.84 − 129,873.72 = **12,105.12**.\n- Step 3: S_gg = Σg² − (Σg)²/n. Given Σg² = 72,675.98 and (Σg)²/n = (713.2)²/8 = 63,581.78, so S_gg = 72,675.98 − 63,581.78 = **9,094.20**.\n\n[Takeaway: S-statistics measure total sum of squared deviations (S_xx) or products (S_xy).]", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "Using S_dg = 12,105.12, S_dd = 16,769.78, and S_gg = 9,094.20, calculate the PMCC r for the bear data. (2 steps)", "answer": "- Step 1: Use formula r = S_dg / √(S_dd × S_gg).\n- Step 2: r = 12,105.12 / √(16,769.78 × 9,094.20) = 12,105.12 / √152,478,804.6 = 12,105.12 / 12,349.4 ≈ **0.980** (3 s.f.).\n\n[Takeaway: r close to 1 indicates very strong positive linear correlation. PMCC is invariant under coding.]", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "Find the regression line of girth (g) on length (d) for the bear data, given d̄ = 182.1 cm, ḡ = 89.15 cm, and b = S_dg/S_dd = 0.722. Show the equation. (3 steps)", "answer": "- Step 1: Calculate gradient b = S_dg/S_dd = 12,105.12 / 16,769.78 = 0.72184... ≈ **0.722**.\n- Step 2: Calculate intercept a = ḡ − b·d̄ = 89.15 − 0.72184(182.1) = 89.15 − 131.45 = −42.30 ≈ **−42.3**.\n- Step 3: Regression line: **g = −42.3 + 0.722d**.\n\n[Takeaway: Regression line predicts g (dependent) from d (independent); always round b and a as instructed.]", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "Interpret the gradient b = 0.722 in the regression line g = −42.3 + 0.722d for bear data. Why is context important? (1 mark)", "answer": "For each additional **1 cm of bear length**, the girth increases by approximately **0.722 cm**, on average. Context matters because the interpretation must include units and apply only within the sampled range — you cannot say \"per meter\" unless you convert units, and extrapolation beyond the data range is unreliable.\n\n[Takeaway: Always state units and limit interpretation to the data range.]", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "Use the regression line g = −42.3 + 0.722d to estimate girth when length is 2.5 m. Why must you convert units? (2 steps)", "answer": "- Step 1: Convert 2.5 m to cm: 2.5 m = 250 cm.\n- Step 2: Substitute: g = −42.3 + 0.722(250) = −42.3 + 180.5 = **138.2 cm**.\n- Units must be consistent — the regression was derived from cm data, so input must be in cm.\n\n[Takeaway: Watch unit conversions! d in cm → g in cm. Missing conversion gives ridiculous results.]", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "Why is estimating girth at d = 0.5 m (50 cm) unreliable using the regression line g = −42.3 + 0.722d? (1 mark)", "answer": "The sample range is approximately 150–220 cm (mean 182 cm). Extrapolating to 50 cm is far outside this range. The model gives g = −42.3 + 0.722(50) = −6.2 cm, which is physically impossible (negative girth). Predictions outside the data range are unreliable because the linear relationship may not hold.\n\n[Takeaway: Extrapolation is risky; always check if your prediction is within the sampled range.]", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "If the gradient interpretation is \"17.3 cm girth increase per x cm length increase\", and the regression gradient is 0.722 cm/cm, find x. (2 steps)", "answer": "- Step 1: Set up proportion: 0.722 × x = 17.3.\n- Step 2: Solve: x = 17.3 / 0.722 ≈ **23.96 cm** (≈ 24.0 cm to 3 s.f.).\n\n[Takeaway: Rearranging b to find equivalent scale: b·x = target change ⇒ x = target/b.]", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "For round-1 time X ~ N(15, 2²), find P(X < 18). (2 steps)", "answer": "- Step 1: Standardise: z = (x − μ)/σ = (18 − 15)/2 = 1.5.\n- Step 2: P(X < 18) = P(Z < 1.5) = **0.9332** (from normal table).\n\n[Takeaway: Always standardise using z = (x − μ)/σ, then use the standard normal table.]", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "In a qualifying event, the fastest 60% qualify (i.e., the lowest 60% of times). If X ~ N(15, 2²), find the longest qualifying time. (3 steps)", "answer": "- Step 1: \"Fastest 60%\" means the 60th percentile: P(X < t) = 0.60.\n- Step 2: Find z such that P(Z < z) = 0.60. From tables, z ≈ **0.2533**.\n- Step 3: Reverse standardisation: t = μ + z·σ = 15 + 2(0.2533) = **15.5 min** (3 s.f.).\n\n[Takeaway: \"Fastest 60%\" = lowest 60% = P(X < t) = 0.6, NOT P(X > t) = 0.6.]", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "For T ~ N(μ, σ²), given P(μ − 10 < T < μ + 10) = 0.95, find σ. (2 steps)", "answer": "- Step 1: For a symmetric 95% interval around the mean, P(μ − k < T < μ + k) = 0.95 ⇒ k/σ = 1.96 (the 1.96 comes from 95% of the normal curve).\n- Step 2: Here k = 10, so 10/σ = 1.96 ⇒ σ = 10/1.96 ≈ **5.10**.\n\n[Takeaway: For symmetric intervals, P(μ − k < X < μ + k) = 0.95 ⇒ k = 1.96σ. Memorise: 95% → 1.96, 99% → 2.576.]", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "Given σ = 5.10 for T ~ N(μ, σ²), find P(T > μ − 5 | T > μ − 10). This is a conditional probability where the event T > μ − 5 is a subset of T > μ − 10. (5 steps)", "answer": "- Step 1: Find P(T > μ − 10). Since the symmetric interval P(μ − 10 < T < μ + 10) = 0.95, the tails each have 0.025. So P(T < μ − 10) = 0.025, and **P(T > μ − 10) = 0.975**.\n- Step 2: Find P(T > μ − 5). Standardise: z = (μ − 5 − μ)/σ = −5/5.10 ≈ −0.98.\n- Step 3: From symmetry, P(T > μ − 5) = P(Z > −0.98) = P(Z < 0.98) = **0.8365**.\n- Step 4: Apply conditional formula: P(A|B) = P(A ∩ B)/P(B). Since A = {T > μ − 5} ⊂ B = {T > μ − 10}, A ∩ B = A.\n- Step 5: P(T > μ − 5 | T > μ − 10) = 0.8365 / 0.975 = **0.858** (3 s.f.).\n\n[Takeaway: When A ⊂ B, P(A ∩ B) = P(A). Don't compute P(A) × P(B) — that's for independent events.]", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": true}, {"question": "In a three-circle Venn diagram for Chess (C), Scrabble (S), Go (G), given C only = 0.04, C∩S only = 0.15, G only = 0, C∩G only = p, C∩S∩G = 0.12, S∩G only = 0.1, S only = 0.23, outside = q, and C and S are independent, find p. (4 steps)", "answer": "- Step 1: Sum to 1: 0.04 + p + 0 + 0.15 + 0.12 + 0.1 + 0.23 + q = 1 ⇒ p + q = 0.36. (★)\n- Step 2: Find P(C) = C only + C∩S only + C∩G only + C∩S∩G = 0.04 + 0.15 + p + 0.12 = 0.31 + p.\n- Step 3: Find P(S) = 0.15 + 0.12 + 0.1 + 0.23 = 0.60. Find P(C∩S) = C∩S only + C∩S∩G = 0.15 + 0.12 = 0.27.\n- Step 4: Independence: P(C∩S) = P(C)P(S) ⇒ 0.27 = (0.31 + p)(0.60) ⇒ 0.31 + p = 0.45 ⇒ **p = 0.14**.\n\n[Takeaway: For independence, P(A ∩ B) = P(A) × P(B). Don't confuse with P(A) + P(B).]", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": true}, {"question": "Using p = 0.14 from the Venn diagram, find q (the outside region). (2 steps)", "answer": "- Step 1: From the sum constraint: p + q = 0.36.\n- Step 2: Substitute p = 0.14: 0.14 + q = 0.36 ⇒ **q = 0.22**.\n\n[Takeaway: Always use the sum-to-1 constraint to find the remaining probability.]", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "In the same Venn diagram, find P((C ∪ S) ∩ G′), meaning the probability of playing Chess or Scrabble but NOT Go. (1 mark)", "answer": "- Step 1: This is the regions in C or S but outside G: C only + C∩S only + S only.\n- Step 2: = 0.04 + 0.15 + 0.23 = **0.42**.\n\n[Takeaway: (C ∪ S) ∩ G′ excludes any region that touches G. Always shade the Venn to verify.]", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "Find P(C | S ∩ G), the probability someone plays Chess given they play both Scrabble and Go. (2 steps)", "answer": "- Step 1: Conditional formula: P(C | S ∩ G) = P(C ∩ S ∩ G) / P(S ∩ G).\n- Step 2: P(C ∩ S ∩ G) = 0.12. P(S ∩ G) = S∩G only + C∩S∩G = 0.1 + 0.12 = 0.22.\n- Therefore: P(C | S ∩ G) = 0.12 / 0.22 = 6/11 ≈ **0.545** (3 s.f.).\n\n[Takeaway: P(A | B) = P(A ∩ B) / P(B). Only consider the intersection within B's region.]", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "In a youth club of 76 teenagers who play both Chess and Go, estimate how many do NOT play Scrabble. The probabilities are P(C ∩ G) = 0.26, P(S) = 0.60. (3 steps)", "answer": "- Step 1: Find P(C ∩ G) = C∩G only + C∩S∩G = 0.14 + 0.12 = **0.26**.\n- Step 2: Estimate total population: N = 76 / 0.26 ≈ 292.31 teenagers.\n- Step 3: P(not S) = 1 − P(S) = 1 − 0.60 = 0.40. Number not playing S = 0.40 × 292.31 ≈ **117** (rounded).\n\n[Takeaway: Use complement: P(S′) = 1 − P(S), NOT just the non-S regions in the Venn.]", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "What is the key error in calculating P(S′) as only the G-only region (0) plus outside (0.22) = 0.22? Why is this wrong? (conceptual)", "answer": "- Step 1: P(S′) means \"not playing Scrabble\" — this includes ALL regions except those containing S.\n- Step 2: From the Venn: S′ = G only + C only + C∩G only + outside = 0 + 0.04 + 0.14 + 0.22 = 0.40.\n- Step 3: The shortcut is P(S′) = 1 − P(S) = 1 − 0.60 = **0.40**. The wrong method missed that C∩S∩G and S∩G only also don't play S — it's easier to use the complement.\n\n[Takeaway: Always verify by listing all non-S regions or using the complement shortcut.]", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "For the regression line, distinguish between r (correlation) and b (gradient). Which is invariant under coding, and which transforms? (conceptual)", "answer": "- r (PMCC) is **invariant under coding** — if you code x and y (linear transformation), r remains the same. This is because r measures the strength of linear relationship, not the scale.\n- b (gradient) and a (intercept) **transform under coding** according to: if y = (x − a)/b, then b_new = b/b_coding, and a_new = a_coding + b_coding·a_old. You must decode b and a before interpreting.\n\n[Takeaway: Use r to assess strength; decode b and a before making predictions.]", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "Why does the regression line always pass through the point (x̄, ȳ)? What is the significance of this? (conceptual)", "answer": "The regression line is fitted by minimising the sum of squared residuals (least squares). The mathematical solution forces the line through the point of means (x̄, ȳ) because this is where the sum of deviations in x and y are zero. This is a property of OLS (ordinary least squares) regression — it ensures the line is centered on the data cloud.\n\n[Takeaway: Always verify by substituting x̄ and ȳ into your regression equation — you should get ȳ
