0.25: the term is 4 × 0.25 = 1. You square 2 to get 4, then multiply by 0.25.\n- Step 2: The mistake is computing [E(X)]² = [$$\\sum x \\cdot P(X=x)$$]² — this is the square of the entire sum, not the sum of squares. These are different: E(X²) ≠ [E(X)]². In fact, Var(X) = E(X²) − [E(X)]², which is only zero if X is constant.\n\nThe variance formula itself proves they differ: since Var(X) ≥ 0, we always have E(X²) ≥ [E(X)]².", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "Given E(X) = 4.6 and E(X²) = 25.3, compute Var(X). Then explain conceptually why Var(X) can never be negative. (2 steps)", "answer": "- Step 1: Var(X) = E(X²) − [E(X)]² = 25.3 − (4.6)² = 25.3 − 21.16 = **4.14**.\n- Step 2: Var(X) = E[(X − μ)²] — it's the expected value of a squared quantity. Since squares are always ≥ 0, their weighted average (expectation) is also ≥ 0. Variance is zero only when every value equals the mean.\n\nThis is why the computational form (E(X²) − μ²) must always give a non-negative result — it's mathematically identical to the definition.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": true}, {"question": "If Y = aX − b with a, b > 0, explain why Var(Y) = a²Var(X) and NOT a²Var(X) − b or a²Var(X) − b². What does the \"−b\" do to the spread? (3 steps)", "answer": "- Step 1: Variance measures **spread** — how far values are from their mean. Shifting all values by a constant (subtracting b) moves the centre but doesn't change the distances between values. So the +b or −b has **zero effect** on variance.\n- Step 2: Scaling by a multiplies all deviations from the mean by a. Since variance involves squaring those deviations, the factor becomes a². Hence Var(aX − b) = a² · Var(X).\n- Step 3: Algebraically: Var(aX − b) = E[(aX − b − aμ + b)²] = E[(aX − aμ)²] = a²E[(X − μ)²] = a²Var(X). The b cancels completely.\n\nCommon error: writing Var(aX + b) = a²Var(X) + b². The b vanishes entirely — it's a location shift only.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "Y = aX − b, with a, b > 0. Given E(Y) = 13.4, Var(Y) = 66.24, E(X) = 4.6, Var(X) = 4.14. Walk through finding a and b. Which do you find first and why? (3 steps)", "answer": "- Step 1: Find **a first** from the variance equation, because Var(Y) = a²Var(X) involves only a (b vanishes). So a² = 66.24/4.14 = 16, giving a = 4 (since a > 0).\n- Step 2: Now use the mean equation: E(Y) = aE(X) − b. Substituting: 13.4 = 4(4.6) − b = 18.4 − b.\n- Step 3: Solve: b = 18.4 − 13.4 = **5**. So a = 4, b = 5.\n\nStrategy: always solve for the scaling factor from variance first (it's independent of the shift), then use the mean to find the shift.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "Two independent spinners: S = X₁ and R = 2X₂ − 3. You need P(S > R), i.e., P(X₁ > 2X₂ − 3). Explain the conditioning strategy: why do we condition on X₂'s values rather than try to solve the inequality directly? (3 steps)", "answer": "- Step 1: X₁ and X₂ are independent but come from the same distribution. The inequality X₁ > 2X₂ − 3 involves TWO random variables, making a direct approach messy. Conditioning on X₂'s value turns it into a one-variable problem.\n- Step 2: For each possible value x₂ of X₂, compute R = 2x₂ − 3 (a fixed number). Then P(X₁ > R | X₂ = x₂) = P(X₁ > 2x₂ − 3) is found by summing probabilities of X₁ values exceeding R.\n- Step 3: Use the law of total probability: P(S > R) = $$\\sum_{x_2} P(X_1 > 2x_2 - 3) \\cdot P(X_2 = x_2)$$. Each term is \"probability X₁ beats the threshold\" × \"probability X₂ takes that value\".\n\nThis works because X₁ and X₂ are independent — knowing X₂'s value doesn't change X₁'s distribution.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "In the P(Sam wins) problem, when X₂ = 2, R = 2(2)−3 = 1. Then P(X₁ > 1) = 1 (all values of X₁ exceed 1). But when X₂ = 4, R = 5, and P(X₁ > 5) = 0.25. Why isn't P(X₁ > 5) = 1? (2 steps)", "answer": "- Step 1: X₁ takes values {2, 4, 5, 7, 8}. The condition X₁ > 5 means X₁ ∈ {7, 8} only (strict inequality excludes 5). P(X₁ = 7) + P(X₁ = 8) = 0.1 + 0.15 = 0.25.\n- Step 2: The value X₁ = 5 does NOT satisfy X₁ > 5 (it's equal, not greater). This is the strict-inequality trap: \"higher score wins\" means ties are NOT wins.\n\nIf the question said \"Sam wins or draws\", you'd use ≥ and include X₁ = 5, giving 0.45. Read the wording carefully.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "Complete the P(Sam wins) calculation. X₂ = 2 gives contribution 1 × 0.25 = 0.25. X₂ = 4 gives 0.25 × 0.3 = 0.075. X₂ = 5 gives 0.15 × 0.2 = 0.03. X₂ = 7 and X₂ = 8 give 0. Why? (2 steps)", "answer": "- Step 1: When X₂ = 7: R = 2(7)−3 = 11. X₁'s maximum is 8, so P(X₁ > 11) = 0. When X₂ = 8: R = 13, likewise P(X₁ > 13) = 0. Sam cannot win when R is too high.\n- Step 2: Total P(Sam wins) = 0.25 + 0.075 + 0.03 + 0 + 0 = **0.355**.\n\nThe pattern: as X₂ increases, R increases, making it harder for X₁ to exceed R. Beyond X₂ = 5, it becomes impossible.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "On a histogram, what fundamental principle connects the drawn bars to the data, and how does a \"reference bar\" help you find dimensions of other bars? (3 steps)", "answer": "- Step 1: The fundamental principle is **area ∝ frequency**. The area of each bar is proportional to the frequency it represents. This is why histograms use frequency density (height) = frequency / class width.\n- Step 2: A reference bar gives you the constant of proportionality. If the reference bar has area A cm² representing f data points, then k = A/f (cm² per data point). Every other bar's area = k × its frequency.\n- Step 3: To find a bar's dimensions: (1) compute its required area from its frequency, (2) compute its width on the page from the class width relative to the reference class width, (3) height = area / width.\n\nCommon pitfall: confusing \"height = frequency density\" with \"height = frequency.\" In a histogram with unequal class widths, height is NOT frequency.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": true}, {"question": "A histogram reference bar covers class width 4 mm, drawn 2.5 cm wide × 7.5 cm tall (area = 18.75 cm²), representing 20 pebbles. A class of width 2 mm and frequency 16 needs drawing. Find its width and height on the page. (3 steps)", "answer": "- Step 1: Width on page scales with class width. The reference is 4 mm → 2.5 cm, so 2 mm → (2/4) × 2.5 = **1.25 cm**.\n- Step 2: Area required = (frequency / reference frequency) × reference area = (16/20) × 18.75 = **15 cm²**.\n- Step 3: Height = area / width = 15 / 1.25 = **12 cm**.\n\nSense-check: narrower class with slightly fewer observations → shorter width, but higher density (16/2 = 8 per mm vs 20/4 = 5 per mm) → taller bar. ✓", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "For grouped data with n = 50, the median position is n/2 = 25th value. Why does Edexcel IAL use n/2 and NOT (n+1)/2 for the grouped median? (2 steps)", "answer": "- Step 1: Grouped data uses **linear interpolation within a class**, treating the data as continuously distributed. The n/2 position is the standard for grouped/continuous data because it locates the 50th percentile directly.\n- Step 2: The (n+1)/2 convention is for discrete/ungrouped data where you identify an actual data point. In grouped data, you're interpolating between boundaries, so the +1 adjustment is unnecessary and would give a slightly different (incorrect for this context) position.\n\nFor this paper's data: cumulative frequencies are 2, 18, 38, ... The 25th value falls in the class 32 ≤ x < 36, and you interpolate: median = 32 + (25−18)/20 × 4 = 33.4.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": true}, {"question": "State the linear interpolation formula for the grouped median and explain what each term means. (2 steps)", "answer": "- Step 1: $$\\text{median} = L + \\frac{n/2 - F}{f} \\times c$$, where L = lower class boundary of the median class, n = total frequency, F = cumulative frequency below the median class, f = frequency of the median class, c = class width.\n- Step 2: The fraction $$\\frac{n/2 - F}{f}$$ represents \"how far through the median class the median falls.\" If n/2 = 25 and F = 18, there are 7 more values needed out of f = 20 in the class, so you're 7/20 = 35% of the way through the class width.\n\nThis is in the formula booklet, but knowing what each symbol means prevents substitution errors.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "A coding equation is given as 10y = w − 20, where w is weight in grams and y is the coded variable. Rewrite this as w in terms of y, then state how to decode the mean and the standard deviation. (3 steps)", "answer": "- Step 1: Rearrange: w = 10y + 20. This is of the form w = by + a with b = 10, a = 20.\n- Step 2: Mean: $$\\bar{w} = b\\bar{y} + a = 10\\bar{y} + 20$$. If ȳ = 2.08, then w̄ = 10(2.08) + 20 = 40.8.\n- Step 3: Standard deviation: $$\\sigma_w = |b| \\cdot \\sigma_y = 10\\sigma_y$$. The \"+20\" shift does NOT affect the standard deviation. If σ_y = 0.5869, then σ_w = 5.869 ≈ 5.87.\n\nCritical error to avoid: writing σ_w = 10σ_y + 20. The shift affects the mean but NOT the spread.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": true}, {"question": "Given Σy = 104, Σy² = 233.54, and n = 50, compute Var(y) and then decode to find σ_w. Why must you compute Var(y) first rather than trying to decode Σy² directly? (3 steps)", "answer": "- Step 1: ȳ = 104/50 = 2.08. Var(y) = Σy²/n − ȳ² = 233.54/50 − (2.08)² = 4.6708 − 4.3264 = 0.3444.\n- Step 2: σ_y = √0.3444 = 0.5869. Then σ_w = 10 × 0.5869 = **5.87 g**.\n- Step 3: You must compute Var(y) in the coded scale first because Var(w) = b²Var(y) = 100 × 0.3444 = 34.44, and σ_w = √34.44 = 5.87. Decoding Σy² directly (Σw² = 100Σy² + ...) is error-prone and unnecessary.\n\nThe computational form Var = Σx²/n − x̄² must be memorised — it is NOT in the S1 formula booklet.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": true}, {"question": "A dataset of 50 pebbles has mean 40.8 g and SD 5.87 g. A new pebble weighing exactly 40.8 g is added. What happens to the mean and the SD? Explain the SD effect carefully. (3 steps)", "answer": "- Step 1: **Mean is unchanged.** New mean = (50 × 40.8 + 40.8)/51 = 40.8(51)/51 = 40.8. Adding a value equal to the mean doesn't shift the mean.\n- Step 2: **SD decreases.** The new pebble's deviation from the mean is (40.8 − 40.8)² = 0, so the sum of squared deviations (numerator of variance) doesn't change. But the denominator increases from 50 to 51.\n- Step 3: Since variance = (sum of squared deviations)/n and the numerator is unchanged while n grows, variance decreases. Therefore SD = √(variance) also decreases.\n\nCommon wrong answer: \"SD stays the same because the deviation is zero.\" Zero deviation means this pebble doesn't add to the numerator, but the denominator still grows — pulling the average squared deviation down.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "What is the conceptual difference between S_xy and the covariance Cov(X,Y)? Why does S_xy appear in the PMCC formula instead of covariance? (2 steps)", "answer": "- Step 1: $$S_{xy} = \\sum x_i y_i - \\frac{(\\sum x_i)(\\sum y_i)}{n}$$, while $$\\text{Cov}(X,Y) = \\frac{S_{xy}}{n}$$. S_xy is the **sum of products** (uncorrected); covariance divides by n to get an average.\n- Step 2: PMCC = $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} \\cdot S_{yy}}}$$. The factors of n cancel: $$\\frac{S_{xy}/n}{\\sqrt{(S_{xx}/n)(S_{yy}/n)}} = \\frac{S_{xy}}{\\sqrt{S_{xx} \\cdot S_{yy}}}$$. So using S-statistics directly is cleaner — no need to divide by n at all.\n\nThis is why the formula booklet gives r in terms of S-statistics: it avoids unnecessary division.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": true}, {"question": "When computing S_dg = Σdg − (Σd)(Σg)/n, you get 12,105.12. If you accidentally swapped the denominator to use n−1 instead of n, would r be larger, smaller, or the same? (2 steps)", "answer": "- Step 1: Using n−1 instead of n would change S_dg, S_dd, and S_gg all by the same scaling factor (approximately n/(n−1)). But PMCC divides S_dg by √(S_dd · S_gg), so the scaling cancels: $$\\frac{k \\cdot S_{dg}}{\\sqrt{k \\cdot S_{dd} \\cdot k \\cdot S_{gg}}} = \\frac{S_{dg}}{\\sqrt{S_{dd} \\cdot S_{gg}}}$$.\n- Step 2: Therefore r would be **the same**. PMCC is invariant to this scaling — it's a dimensionless correlation measure that doesn't depend on whether you divide by n or n−1.\n\nThis is a deep property: r depends only on the pattern of the data, not the sample size scaling.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": true}, {"question": "The regression line is g = −42.3 + 0.722d. Interpret the gradient (0.722) in context. What must you include for full marks? (2 steps)", "answer": "- Step 1: The gradient means: for each additional 1 cm of bear length, the girth increases by approximately 0.722 cm, **within the observed range of the data**.\n- Step 2: For full marks you MUST include: (a) **units** (cm of girth per cm of length), (b) **context** (bears, not abstract variables), and (c) the qualification that this applies **within the data range**. Saying \"per unit increase in d\" without context = B0.\n\nThe intercept (−42.3) has no meaningful physical interpretation — a bear of length 0 cm having negative girth is absurd.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": true}, {"question": "To estimate girth for a bear of length 2.5 m using g = −42.3 + 0.722d, what unit conversion is essential, and what happens if you forget it? (2 steps)", "answer": "- Step 1: The regression was built with d in **cm** (sample mean ≈ 182 cm). So d = 2.5 m must be converted to 250 cm before substitution: g = −42.3 + 0.722(250) = 138.2 cm.\n- Step 2: If you substitute d = 2.5 directly: g = −42.3 + 0.722(2.5) = −40.5 cm — a negative girth, which is physically impossible and should immediately signal an error.\n\nAlways check: does the answer make physical sense? A negative girth is a red flag for a unit error.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "Why is using the regression line to estimate girth for d = 0.5 m (50 cm) unreliable, even though 50 cm is a valid length? (2 steps)", "answer": "- Step 1: The sample data has lengths around 182 cm (the mean). A bear of 50 cm is far **outside the observed range** — this is **extrapolation**, not interpolation.\n- Step 2: The model gives g = −42.3 + 0.722(50) = −6.2 cm — a negative girth. The linear relationship that holds near 182 cm may not hold at 50 cm. The model is only reliable **within the range of the observed data**.\n\nExtrapolation is unreliable because: (1) the relationship may not be linear outside the data range, (2) the intercept has no physical meaning, and (3) the further you go, the more uncertainty.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "The regression gradient is 0.722 cm girth per cm length. The question asks: for every x cm increase in length, girth increases by 17.3 cm. Find x. (2 steps)", "answer": "- Step 1: The gradient tells us 0.722 cm girth increase per 1 cm length increase. We need x such that 0.722 × x = 17.3.\n- Step 2: x = 17.3/0.722 ≈ **24.0 cm**. So a 24 cm increase in length corresponds to a 17.3 cm increase in girth.\n\nThis is simply reading the gradient in reverse: instead of \"per 1 cm length,\" it's \"per x cm length.\" The gradient is a rate, and you're solving for the input that gives a specified output change.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "When standardising X ~ N(15, 2²) to find P(X < 18), explain what the z-value of 1.5 means conceptually and why we then look up P(Z < 1.5). (2 steps)", "answer": "- Step 1: z = (18 − 15)/2 = 1.5. This means 18 is **1.5 standard deviations above the mean**. Standardising converts any normal distribution to Z ~ N(0,1), preserving the area (probability).\n- Step 2: P(X < 18) = P(Z < 1.5) = 0.9332. We look up Z < 1.5 because the normal table gives cumulative probabilities from −∞. The value 0.9332 means about 93.3% of observations fall below 18.\n\nThe z-score is a \"universal yardstick\" — it tells you how extreme a value is relative to its distribution's spread.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": true}, {"question": "\"The fastest 60% of adults qualify for round 2. Find the longest qualifying time.\" With X ~ N(15, 2²), explain why this translates to P(X ≤ t) = 0.6, NOT P(X ≤ t) = 0.4. (3 steps)", "answer": "- Step 1: \"Fastest 60%\" means the **lowest** 60% of times (fast = low time). These are the quickest runners, so they occupy the left portion of the distribution.\n- Step 2: \"Longest qualifying time\" = the **slowest** person who still qualifies = the boundary at the 60th percentile. So we want the value t where P(X ≤ t) = 0.6.\n- Step 3: If you wrote P(X ≤ t) = 0.4, you'd find the 40th percentile — meaning only 40% qualify, contradicting \"fastest 60% qualify.\" The 0.4 approach gives t ≈ 14.49, while the correct 0.6 approach gives t ≈ 15.5.\n\nThe key: \"fastest\" = lowest times. \"Longest qualifying time\" = the upper boundary of the lowest 60% = 60th percentile.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": false}, {"question": "For the inverse normal problem P(X ≤ t) = 0.6 with X ~ N(15, 2²), walk through finding t using the percentage points table. (3 steps)", "answer": "- Step 1: Standardise: P(Z ≤ z) = 0.6. From the percentage points table (or calculator), the z-value where the upper tail is 0.4 is z = 0.2533. Since 0.6 > 0.5, z is positive.\n- Step 2: Un-standardise: t = μ + zσ = 15 + 0.2533(2) = 15 + 0.5066 = **15.5 min** (3 s.f.).\n- Step 3: Sense-check: the 60th percentile should be above the mean (15), and 15.5 is indeed slightly above. ✓ If you got 14.49, you found the 40th percentile — re-read the question.\n\nAlways verify: does the answer lie on the correct side of the mean given the percentile?", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": true}, {"question": "The symmetric interval trick: P(μ − k < X < μ + k) = 0.95 implies k = 1.96σ. Derive this from first principles using the standard normal. (3 steps)", "answer": "- Step 1: Standardise: P(−k/σ < Z < k/σ) = 0.95. By symmetry, the central 95% leaves 2.5% in each tail.\n- Step 2: So P(Z < k/σ) = 0.975 (the middle plus the left tail). From the percentage points table, P(Z > 1.96) = 0.025, so P(Z < 1.96) = 0.975.\n- Step 3: Therefore k/σ = 1.96, giving **k = 1.96σ**. This is NOT in the formula booklet — you must memorise it.\n\nSimilarly: 90% central → k = 1.6449σ, 99% central → k = 2.5758σ. The percentage points table gives you these z-values.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": false}, {"question": "In Q5(c), P(μ−10 < T < μ+10) = 0.95. A tutor computed σ = 10/1.96 = 0.0510. The correct answer is σ = 5.10. What error did the tutor make, and how do you sense-check? (3 steps)", "answer": "- Step 1: From the symmetric trick: k = 1.96σ, with k = 10. So 10 = 1.96σ, giving σ = 10/1.96 = 5.102. The tutor's calculator gave 5.102, but they **wrote it as 0.0510** — a decimal place / reciprocal error (perhaps they computed 1.96/10 instead of 10/1.96).\n- Step 2: Sense-check with the z-value: if σ = 0.0510, then z = −5/0.0510 ≈ −98, which is off the normal table entirely. If σ = 5.10, then z = −5/5.10 ≈ −0.98, a perfectly reasonable value. ✓\n- Step 3: The rule: **always sense-check your z-values**. If |z| > 4, something is almost certainly wrong. Normal z-values for typical exam problems range between −3 and 3.\n\nThis tutor error is a perfect example of why blind calculation without verification is dangerous.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": true}, {"question": "In the conditional probability P(T > μ−5 | T > μ−10), explain the \"subset trick\" and why P(A ∩ B) = P(A) when A ⊂ B. (3 steps)", "answer": "- Step 1: Define A = {T > μ−5} and B = {T > μ−10}. Every value exceeding μ−5 also exceeds μ−10 (since μ−5 > μ−10). So A ⊂ B: A is a **subset** of B.\n- Step 2: When A ⊂ B, every outcome in A is already in B. So A ∩ B = A (the intersection of a set with its superset is the smaller set). Therefore P(A ∩ B) = P(A).\n- Step 3: The conditional formula becomes: P(A|B) = P(A ∩ B)/P(B) = P(A)/P(B) = 0.8365/0.975 = **0.858**.\n\nCommon error: computing P(A)·P(B) as if independent. These events are NOT independent — A ⊂ B means knowing B occurred makes A more likely, not less.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "In the conditional probability problem, P(T > μ−10) = 0.975. How do you get this from the information P(μ−10 < T < μ+10) = 0.95? (2 steps)", "answer": "- Step 1: The symmetric interval P(μ−10 < T < μ+10) = 0.95 leaves 0.05 in the two tails combined. By symmetry, each tail has 0.025.\n- Step 2: P(T < μ−10) = 0.025 (left tail). Therefore P(T > μ−10) = 1 − 0.025 = **0.975**.\n\nThis uses the symmetry of the normal distribution: the two tails are equal. Without symmetry, you couldn't split 0.05 into two equal 0.025 tails.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": false}, {"question": "In a 3-circle Venn diagram (C, S, G), the region \"C but not G\" includes which sub-regions? What common mistake do students make? (2 steps)", "answer": "- Step 1: \"C but not G\" = all parts of circle C that are outside circle G. This includes: C-only (0.04) + C∩S only, not G (0.15) = **0.19**.\n- Step 2: The common mistake is including C∩G only or C∩S∩G — but these are inside G, and the question says \"not G.\" Read \"but not G\" as excluding anything that touches the G circle.\n\nAlways shade the Venn diagram: highlight all of C, then erase anything overlapping with G.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": true}, {"question": "In a 3-circle Venn diagram with probabilities summing to 1, you have p + q = 0.36 (from summing all regions). Independence of C and S gives another equation. How do you set up the independence condition? (3 steps)", "answer": "- Step 1: P(C) = sum of all regions inside C = C-only + C∩G-only + C∩S-only + C∩S∩G = 0.04 + p + 0.15 + 0.12 = 0.31 + p.\n- Step 2: P(S) = sum of all regions inside S = C∩S-only + C∩S∩G + S∩G-only + S-only = 0.15 + 0.12 + 0.1 + 0.23 = 0.60.\n- Step 3: P(C∩S) = regions inside both C and S = C∩S-only + C∩S∩G = 0.15 + 0.12 = 0.27. Independence: P(C∩S) = P(C)·P(S), so 0.27 = (0.31 + p)(0.60), giving p = 0.14.\n\nKey: P(C∩S) is NOT just C∩S∩G — it includes ALL regions where C and S overlap, whether or not G is also present.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": true}, {"question": "Once you find p = 0.14 from the independence condition, and you know p + q = 0.36, find q. Then explain what q represents. (2 steps)", "answer": "- Step 1: q = 0.36 − 0.14 = **0.22**. This is the probability of being in the \"outside\" region — teenagers who play none of the three games.\n- Step 2: q must be non-negative (it's a probability). If solving gave q < 0, the independence assumption would be inconsistent with the data, signalling an error. Here q = 0.22 is valid.\n\nThe \"sum to 1\" constraint is your friend: it provides an equation linking unknowns.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": false}, {"question": "Compute P((C∪S) ∩ G′). Explain which Venn regions this corresponds to and why it's NOT the same as P(C∪S) × P(G′). (3 steps)", "answer": "- Step 1: (C∪S) ∩ G′ means \"in C or S (or both), but NOT in G.\" Shade all of C and S, then remove anything inside G.\n- Step 2: The surviving regions are: C-only (0.04) + C∩S-only (0.15) + S-only (0.23) = **0.42**.\n- Step 3: This is NOT P(C∪S)·P(G′) because C, S, and G are not mutually independent. The multiplication rule only works for independent events. Here, the regions must be identified by shading, not by multiplying probabilities.\n\nAlways shade Venn diagrams for set-operation questions — don't try to compute algebraically without visualising.", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": false}, {"question": "Compute P(C | S∩G) from the Venn diagram. Explain the conditional probability formula and identify the numerator and denominator carefully. (3 steps)", "answer": "- Step 1: P(C | S∩G) = P(C ∩ S ∩ G) / P(S ∩ G). The denominator is the probability of the \"given\" event (S∩G), and the numerator is the intersection of both events.\n- Step 2: P(S∩G) = all regions inside both S and G = C∩S∩G (0.12) + S∩G-only (0.10) = 0.22. P(C∩S∩G) = 0.12.\n- Step 3: P(C | S∩G) = 0.12/0.22 = 6/11 ≈ **0.545**. Given that a teenager plays both Scrabble and Go, there's about a 54.5% chance they also play Chess.\n\nThe denominator is P(S∩G), NOT P(S)·P(G). You're conditioning on the intersection, not on independent events.", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": true}, {"question": "In the population-scaling problem, 76 students play C∩G. P(C∩G) = 0.26. Estimate the total population N, then estimate how many do NOT play Scrabble. (3 steps)", "answer": "- Step 1: N = (observed count) / (probability) = 76/0.26 ≈ **292.3**. This is the estimated total number of teenagers in the youth club.\n- Step 2: P(S′) = 1 − P(S) = 1 − 0.60 = **0.40**. This is the cleanest path — use the complement rather than summing individual non-S regions.\n- Step 3: Number not playing Scrabble = N × P(S′) = 292.3 × 0.40 ≈ **117** (rounded to nearest whole person).\n\nThe scaling logic: if 26% of the population represents 76 people, then 100% represents 76/0.26 people. Then 40% of that total don't play Scrabble.", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": true}, {"question": "A tutor computed P(S′) = 0.18 by only including G-only and the outside region. Explain why this is wrong and why P(S′) = 1 − P(S) is the safest approach. (3 steps)", "answer": "- Step 1: P(S′) includes EVERYONE not in S: C-only (0.04) + C∩G-only (0.14) + G-only (0) + outside (0.22) = 0.40. The tutor forgot C-only and C∩G-only — regions outside S but inside C or G.\n- Step 2: The complement approach P(S′) = 1 − P(S) = 1 − 0.60 = 0.40 is safer because P(S) is easy to compute (just sum all regions inside S), and you avoid the risk of missing regions.\n- Step 3: The tutor's answer of 0.18 would give 292.3 × 0.18 ≈ 53 students — but since P(S′) must equal 1 − P(S) = 0.40, this is clearly wrong. Always verify: do your regions sum correctly?\n\nThe lesson: when computing P(not A), use the complement 1 − P(A) whenever P(A) is straightforward.", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": true}, {"question": "Why must you round the estimated number of students to a whole number, and what reasoning should you give? (2 steps)", "answer": "- Step 1: You can't have a fraction of a student. The calculation 292.3 × 0.40 = 116.92 must be rounded to **117** (or the nearest integer).\n- Step 2: State the reason: \"number of students must be an integer\" or \"you can't have a fraction of a person.\" This justifies the rounding and shows understanding that the statistical model gives a continuous estimate for a discrete reality.\n\nSome markschemes accept either 116 or 117 — but you must round and justify.", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": false}, {"question": "Is PMCC r affected by coding (linear transformation) of the variables? Explain why or why not conceptually. (2 steps)", "answer": "- Step 1: **No — r is invariant under linear coding.** If you transform x → ax + b and y → cy + d (with a, c > 0), the correlation r doesn't change.\n- Step 2: Conceptually, r measures the **strength and direction of the linear pattern**, not the scale or location. Stretching or shifting the axes doesn't change how tightly the points cluster around a line — it only changes the line's slope and intercept. So r stays the same.\n\nNote: if a < 0 or c < 0, the sign of r flips (the pattern reverses direction), but |r| is unchanged.", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": true}, {"question": "Are the regression coefficients a and b affected by coding? Explain with an example. (2 steps)", "answer": "- Step 1: **Yes — both a and b change under coding.** If x is coded to x′ = ax + c, the new gradient b′ = b/a and the new intercept a′ changes accordingly.\n- Step 2: Example: original g = −42.3 + 0.722d with d in cm. If you recode to metres (d′ = d/100), then g = −42.3 + 0.722(100d′) = −42.3 + 72.2d′. The gradient changed from 0.722 to 72.2 — a factor of 100.\n\nCoding changes the units, which changes the gradient (rate per unit) and intercept. Only r is preserved.", "source": "GLM 5.1 ①", "_id": "glm_1_46", "judge_pick": true}, {"question": "The formula Var(X) = E(X²) − [E(X)]² is called the \"computational form\" and is NOT in the S1 formula booklet. Why is it computationally more convenient than the definition Var(X) = E[(X − μ)²]? (2 steps)", "answer": "- Step 1: The definition requires computing deviations (x − μ) for every value, squaring them, then taking a weighted average. This involves subtracting the mean first — an extra step that introduces rounding errors.\n- Step 2: The computational form only needs Σx² and (Σx)²/n — both computed directly from the raw data without knowing μ in advance. You compute E(X²) and [E(X)]² separately and subtract. Fewer steps, less rounding error.\n\nFor grouped data: Var = Σfx²/Σf − x̄². Same principle — use the sums directly.", "source": "GLM 5.1 ①", "_id": "glm_1_47", "judge_pick": false}, {"question": "The percentage points table gives P(Z > 1.96) = 0.025. What is P(Z < −1.96), and why? (2 steps)", "answer": "- Step 1: P(Z < −1.96) = **0.025** — the same as P(Z > 1.96).\n- Step 2: By the symmetry of the standard normal distribution about 0, the left tail below −1.96 has the same area as the right tail above 1.96. This is why the central 95% interval is (−1.96, 1.96): 2.5% in each tail.\n\nThis symmetry is the basis of the symmetric interval trick: P(μ − 1.96σ < X < μ + 1.96σ) = 0.95.", "source": "GLM 5.1 ①", "_id": "glm_1_48", "judge_pick": true}, {"question": "A student computes σ = 10/1.96 and gets 0.0510 on their calculator. What likely happened, and how can you immediately detect this without re-computing? (2 steps)", "answer": "- Step 1: The student likely computed **1.96/10 = 0.196** (or made a similar reciprocal error) and misread or misentered the calculation. The correct computation is 10 ÷ 1.96 = 5.102.\n- Step 2: Immediate detection: ask \"does σ = 0.0510 make sense?\" The interval is μ ± 10, and 10/0.0510 ≈ 196 standard deviations — a 95% interval should be about ±2σ, not ±196σ. If σ < k/2, something is wrong. Since k = 10, σ should be around 5, not 0.05.\n\nThe sense-check rule: for a 95% symmetric interval of width 2k, σ ≈ k/2. If your σ differs by an order of magnitude, recompute.", "source": "GLM 5.1 ①", "_id": "glm_1_49", "judge_pick": false}, {"question": "When asked to \"show that\" a value (e.g., Var(X) = 4.14), what must you include in your working that you might skip if just \"finding\" the answer? (2 steps)", "answer": "- Step 1: \"Show that\" questions require **full method visible**: you must show the formula used, the substitution, and the computation leading to the exact stated value. Skipping steps loses method marks even if the answer is correct.\n- Step 2: For Var(X) = 4.14: show E(X²) = Σx²·P(X=x) with the full sum (1 + 4.8 + 5 + 4.9 + 9.6 = 25.3), then Var(X) = 25.3 − 4.6² = 25.3 − 21.16 = 4.14. Each step earns a method mark.\n\n\"Show that\" = prove it to the examiner. \"Find\" = just get the answer. The distinction matters for mark allocation.", "source": "GLM 5.1 ①", "_id": "glm_1_50", "judge_pick": true}, {"question": "In a back-to-back stem-and-leaf, the key `5|6|3` means 65 cm (Birch) and 63 cm (Maple). What happens if you forget to write the key on an exam question? (1 step)", "answer": "- Step 1: You lose **1 mark** automatically. The key is mandatory for any stem-and-leaf diagram — without it, the values are ambiguous (does `5|6` mean 56 or 65?). Always write the key, even if the question doesn't explicitly ask.\n\nThis is an easy mark to lose and an easy mark to save.", "source": "GLM 5.1 ①", "_id": "glm_1_51", "judge_pick": false}, {"question": "When adding a data point equal to the mean to a dataset, the SD decreases. Would adding a data point FAR from the mean increase or decrease the SD? Explain. (2 steps)", "answer": "- Step 1: Adding a point far from the mean **increases** the SD. The new point has a large squared deviation, which increases the numerator (sum of squared deviations) substantially.\n- Step 2: Although the denominator n also increases (from 50 to 51), the large squared deviation dominates. The average squared deviation goes up, so variance and SD increase. This is the opposite of adding a point at the mean (zero deviation, numerator unchanged, denominator grows → SD decreases).\n\nDirection of SD change depends on whether the new point's deviation is above or below the \"average\" deviation of existing data.", "source": "GLM 5.1 ①", "_id": "glm_1_52", "judge_pick": true}, {"question": "For the histogram question, the class 30 ≤ x < 32 has width 2 mm and frequency 16. Its frequency density is 16/2 = 8 per mm. The reference class has density 20/4 = 5 per mm. How does this relate to the bar heights? (2 steps)", "answer": "- Step 1: Frequency density is proportional to bar height. The ratio of densities is 8/5 = 1.6, so the target bar should be 1.6 times taller than the reference bar. Reference height = 7.5 cm, so target = 7.5 × 1.6 = 12 cm. ✓\n- Step 2: However, this only works if both bars have the same width-per-mm scaling on the page. Since the target bar is narrower (1.25 cm vs 2.5 cm), the area method (area ∝ frequency) is more reliable and general.\n\nThe density shortcut works for height comparison but can mislead if you forget that area (not height) represents frequency.", "source": "GLM 5.1 ①", "_id": "glm_1_53", "judge_pick": true}, {"question": "In the Venn diagram, G-only = 0. What does this mean in context, and does it affect the probability calculations? (2 steps)", "answer": "- Step 1: G-only = 0 means no teenager plays only Go — every Go player also plays at least one of Chess or Scrabble. This is a constraint from the data.\n- Step 2: It doesn't change any calculation method, but it's easy to forget this region exists (with probability 0) when summing regions. If you accidentally omit it, the sum might not equal 1, or you might miscalculate P(S′). The tutor's error in Q6(e) partly came from mishandling this zero-probability region.\n\nZero-probability regions are still regions — include them in your sums; they just contribute nothing.", "source": "GLM 5.1 ①", "_id": "glm_1_54", "judge_pick": false}, {"question": "Explain the difference between P(C | S∩G) and P(C∩S | G). Are they the same? (3 steps)", "answer": "- Step 1: P(C | S∩G) = P(C∩S∩G) / P(S∩G). The given condition is \"plays both Scrabble and Go.\" We ask: among those, what fraction also plays Chess?\n- Step 2: P(C∩S | G) = P(C∩S∩G) / P(G). The given condition is \"plays Go.\" We ask: among Go players, what fraction plays both Chess and Scrabble?\n- Step 3: They are NOT the same because the denominators differ: P(S∩G) = 0.22 vs P(G) = 0.12 + 0.14 + 0.10 + 0 = 0.36. P(C | S∩G) = 0.12/0.22 ≈ 0.545, while P(C∩S | G) = 0.12/0.36 ≈ 0.333.\n\nThe condition matters: \"given S∩G\" is a stricter condition than \"given G,\" yielding a different (larger) conditional probability.", "source": "GLM 5.1 ①", "_id": "glm_1_55", "judge_pick": false}, {"question": "You compute N = 76/0.26 ≈ 292.3 teenagers. Since you can't have 0.3 of a teenager, should you round to 292 before computing the number who don't play Scrabble, or use 292.3 throughout? (2 steps)", "answer": "- Step 1: Use 292.3 throughout the calculation and round only at the **final answer**. Rounding intermediate values introduces unnecessary error. 292.3 × 0.40 = 116.92 ≈ 117.\n- Step 2: If you rounded to 292 first: 292 × 0.40 = 116.8 ≈ 117. In this case the answer is the same, but in general, premature rounding can shift the final answer. The rule: round only at the end, and round to the nearest integer for \"number of people\" questions.\n\nThe markscheme typically allows a small range (116–117) but shows working with unrounded intermediates.", "source": "GLM 5.1 ①", "_id": "glm_1_56", "judge_pick": true}, {"question": "Conceptual exercise: A dataset {10, 20, 30} has mean 20 and SD ≈ 8.16. If you add the value 20, does the SD increase, decrease, or stay the same? Verify by reasoning, not calculation. (2 steps)", "answer": "- Step 1: The new value (20) equals the mean, so its squared deviation is 0. The sum of squared deviations is unchanged, but n increases from 3 to 4.\n- Step 2: Variance = (sum of squared deviations)/n. Numerator unchanged, denominator increased → variance decreases → **SD decreases**. This matches the Q3(e) principle: adding a value at the mean always decreases SD.\n\nNo calculation needed — the qualitative reasoning is sufficient and faster.", "source": "GLM 5.1 ①", "_id": "glm_1_57", "judge_pick": false}, {"question": "Conceptual exercise: X ~ N(100, 15²). Without using tables, determine whether P(X > 115) is greater than, less than, or equal to 0.5. Explain. (2 steps)", "answer": "- Step 1: 115 is one standard deviation above the mean (z = 15/15 = 1). The value is above the mean, so P(X > 115) < 0.5 (less than half the distribution is above the mean + 1σ).\n- Step 2: From the normal distribution, P(Z > 1) ≈ 0.1587. So P(X > 115) ≈ 0.16, which is indeed much less than 0.5.\n\nThe rule: any value above the mean has P(X > value) < 0.5, and vice versa. The further above, the smaller the probability.", "source": "GLM 5.1 ①", "_id": "glm_1_58", "judge_pick": true}, {"question": "Conceptual exercise: Two events A and B have P(A) = 0.3, P(B) = 0.6, P(A∩B) = 0.18. Are A and B independent? How do you check? (2 steps)", "answer": "- Step 1: Check whether P(A∩B) = P(A)·P(B). Compute P(A)·P(B) = 0.3 × 0.6 = 0.18.\n- Step 2: P(A∩B) = 0.18 = P(A)·P(B). **Yes, A and B are independent.** The product rule is both necessary and sufficient for independence.\n\nNote: independence does NOT mean P(A∩B) = 0 (that would be mutual exclusivity). Independent events can co-occur — they just do so at the rate predicted by the product rule.", "source": "GLM 5.1 ①", "_id": "glm_1_59", "judge_pick": true}, {"question": "Conceptual exercise: If P(A) = 0.3 and P(B) = 0.6, and A and B are mutually exclusive, what is P(A∩B)? Is this consistent with independence? (2 steps)", "answer": "- Step 1: Mutually exclusive means A and B cannot both occur, so P(A∩B) = **0**.\n- Step 2: For independence, we'd need P(A∩B) = P(A)·P(B) = 0.18. But P(A∩B) = 0 ≠ 0.18. So mutually exclusive events with non-zero probabilities are **never independent** (unless one has probability 0).\n\nThis is a fundamental contrast: mutual exclusivity and independence are opposite tendencies. Mutually exclusive events are strongly dependent (knowing A occurred tells you B cannot occur).", "source": "GLM 5.1 ①", "_id": "glm_1_60", "judge_pick": true}, {"question": "Why is the regression line of y on x inappropriate for predicting x from y? What would you need instead? (2 steps)", "answer": "- Step 1: The regression line of y on x minimises the sum of squared **vertical** distances (in the y-direction). It's optimised for predicting y given x, not the reverse.\n- Step 2: To predict x from y, you'd need the regression line of x on y, which minimises horizontal distances. The two lines are different (unless r = 1). Using the wrong line gives biased predictions.\n\nIn this paper's question, the regression g = −42.3 + 0.722d is for predicting girth FROM length. Don't rearrange it to predict length from girth.", "source": "GLM 5.1 ①", "_id": "glm_1_61", "judge_pick": true}, {"question": "The regression line g = −42.3 + 0.722d passes through the point (d̄, ḡ). Verify this conceptually — why must every regression line pass through (x̄, ȳ)? (2 steps)", "answer": "- Step 1: The regression line is ȳ = a + bx̄ at the mean values. Substituting: ḡ = (ȳ − bx̄) + bx̄ = ȳ. ✓ The point (d̄, ḡ) always lies on the line by construction.\n- Step 2: This is because a = ȳ − bx̄. When x = x̄, the predicted y = a + bx̄ = (ȳ − bx̄) + bx̄ = ȳ. The line is forced through the centroid of the data.\n\nThis is a useful check: if your regression line doesn't pass through (x̄, ȳ), you've made an arithmetic error.", "source": "GLM 5.1 ①", "_id": "glm_1_62", "judge_pick": false}, {"question": "In Q1(f), the constraint \"box plot unchanged\" when adding 4 values requires checking 5 statistics. List them and explain why EACH one might be affected. (3 steps)", "answer": "- Step 1: The five statistics are: minimum, Q₁, median, Q₃, maximum. Each could shift if a new value falls in the wrong position.\n- Step 2: Minimum shifts if any new value is below the current min (25). Maximum shifts if any new value exceeds the current max (80). Q₁, median, Q₃ shift if new values change the positional rankings (since n changes from 32 to 36, the quartile positions change).\n- Step 3: With n = 36: Q₁ = avg(9th, 10th), median = avg(18th, 19th), Q₃ = avg(27th, 28th). Each new value's position in the sorted order determines whether it shifts these statistics. The constraint is that NONE of them change.\n\nThe new values 27, a, 48, 2a must be placed so that all five statistics remain at their original values.", "source": "GLM 5.1 ①", "_id": "glm_1_63", "judge_pick": false}, {"question": "Memorisation check: list the five key percentage points for the standard normal distribution that you must know for S1. (1 step)", "answer": "- Step 1: The five percentage points are: z₀.₁₀ = 1.2816 (90% one-tail), z₀.₀₅ = 1.6449 (95% one-tail or 90% two-tail), z₀.₀₂₅ = 1.9600 (95% two-tail central), z₀.₀₁ = 2.3263 (99% one-tail or 98% two-tail), z₀.₀₀₅ = 2.5758 (99% two-tail central). The subscripts denote the upper-tail probability P(Z > z).\n\nThe most frequently tested: 1.96 (95% central) and 1.6449 (95% one-sided). These are NOT in the formula booklet.", "source": "GLM 5.1 ①", "_id": "glm_1_64", "judge_pick": false}, {"question": "When computing S_dd = Σd² − (Σd)²/n, what happens if you use n = 7 instead of n = 8? Would S_dd be larger or smaller? (2 steps)", "answer": "- Step 1: S_dd = Σd² − (Σd)²/n. Using a smaller n (7 instead of 8) makes (Σd)²/n larger (dividing by a smaller number), so the subtrahend increases.\n- Step 2: Since you're subtracting a larger quantity, S_dd would be **smaller** than the correct value. This would affect both the PMCC r and the regression gradient b.\n\nAlways verify n from the question. For 8 bears, n = 8 — count the data points if unsure.", "source": "GLM 5.1 ①", "_id": "glm_1_65", "judge_pick": true}, {"question": "In the spinner problem, the table for P(Sam wins) has columns: x₂, R = 2x₂−3, P(X₁ > R), P(X₂ = x₂), contribution. Why is the contribution P(X₁ > R) × P(X₂ = x₂) and not P(X₁ > R) + P(X₂ = x₂)? (2 steps)", "answer": "- Step 1: The contribution represents P(Sam wins AND X₂ = x₂). Since X₁ and X₂ are **independent**, P(X₁ > R AND X₂ = x₂) = P(X₁ > R | X₂ = x₂) × P(X₂ = x₂) = P(X₁ > R) × P(X₂ = x₂).\n- Step 2: Adding probabilities would give P(X₁ > R) + P(X₂ = x₂), which could exceed 1 and has no probabilistic meaning here. The law of total probability requires **multiplication** (for joint probability of independent events) then **addition** (to sum over all x₂ values).\n\nThe structure is: P(Sam wins) = Σ [P(win given x₂) × P(x₂)] — multiply within each row, add across rows.", "source": "GLM 5.1 ①", "_id": "glm_1_66", "judge_pick": true}, {"question": "Cross-topic insight: both Q5 and Q6 involve conditional probability, but in different contexts (normal distribution vs Venn diagram). What's the universal structure of conditional probability that applies to both? (2 steps)", "answer": "- Step 1: The universal formula is P(A|B) = P(A∩B)/P(B). This applies regardless of whether the probabilities come from a continuous distribution (normal) or a discrete Venn diagram.\n- Step 2: The challenge differs by context: in the normal problem, you compute P(A∩B) using the subset trick (A ⊂ B → P(A∩B) = P(A)). In the Venn problem, you identify P(A∩B) by reading off regions. The formula is the same; the method of finding the components differs.\n\nConditional probability is a unifying concept — master the formula, then adapt the computation method to the context.", "source": "GLM 5.1 ①", "_id": "glm_1_67", "judge_pick": false}, {"question": "Cross-topic insight: coding appears in Q2 (DRV: Y = aX − b) and Q3 (data: 10y = w − 20). State the universal coding rules for mean, variance, and SD that apply to BOTH contexts. (2 steps)", "answer": "- Step 1: If y = (x − a)/b (equivalently x = by + a), then: x̄ = bȳ + a, Var(x) = b²Var(y), σ_x = |b|σ_y. These rules apply whether x is a random variable or a dataset.\n- Step 2: The shift (a) affects only the mean; the scale (b) affects both mean and spread. Variance scales by b² (because it involves squaring), while SD scales by |b|. The +b or −b in the coding equation NEVER affects variance or SD.\n\nThese rules are NOT in the formula booklet — they must be memorised and practised in both DRV and data contexts.", "source": "GLM 5.1 ①", "_id": "glm_1_68", "judge_pick": true}, {"question": "Exam strategy: the paper has 75 marks in 90 minutes. Roughly how many minutes per mark, and what does this mean for time allocation on a 13-mark question? (2 steps)", "answer": "- Step 1: 90/75 = **1.2 minutes per mark** (about 72 seconds). This is the average pacing.\n- Step 2: A 13-mark question (like Q1 or Q4) should take roughly 13 × 1.2 = **15.6 minutes**. If you've spent 20 minutes on it, you're eating into time for later questions. Move on and return if time permits.\n\nTime management: don't get stuck. Every mark you attempt is worth the same 1.2 minutes regardless of question difficulty.", "source": "GLM 5.1 ①", "_id": "glm_1_69", "judge_pick": false}, {"question": "Exam strategy: what should you do the moment you write \"P(X < t) = 0.4\" on a question about \"the fastest 60% qualifying\"? (2 steps)", "answer": "- Step 1: **STOP and re-read the question.** \"Fastest 60%\" means the lowest 60% of times qualify. The longest qualifying time is the 60th percentile, so P(X ≤ t) = 0.6, NOT 0.4.\n- Step 2: Writing P(X < t) = 0.4 means only 40% qualify — contradicting the question. This is the #1 misinterpretation on this type of question. The checkpoint: does your probability match the percentage in the question?\n\nBuild this habit: every time you write an inverse-normal probability equation, verify the percentage matches the question wording.", "source": "GLM 5.1 ①", "_id": "glm_1_70", "judge_pick": true}, {"question": "Exam strategy: what sense-check should you perform after computing σ in a normal distribution problem? (2 steps)", "answer": "- Step 1: Compute the resulting z-value for a typical data point and check |z| < 4. If z ≈ 98 (as in the tutor's error), something is drastically wrong — normal z-values in exam problems are almost always between −3 and 3.\n- Step 2: Also check: is σ reasonable given the context? If times are in minutes and the mean is 15, σ = 5.10 is plausible but σ = 0.0510 is not (it would imply all times cluster within 0.1 minutes of the mean).\n\nThe sense-check takes 10 seconds and catches decimal-place errors, reciprocal errors, and unit mismatches.", "source": "GLM 5.1 ①", "_id": "glm_1_71", "judge_pick": false}, {"question": "Conceptual exercise: A 95% confidence-style interval for a normal distribution is μ ± 1.96σ. If the interval width is 20 (i.e., from μ−10 to μ+10), what is σ? Do this mentally. (2 steps)", "answer": "- Step 1: The half-width is 10, and 1.96σ = 10. So σ = 10/1.96.\n- Step 2: 1.96 ≈ 2, so σ ≈ 10/2 = 5. The exact value is 5.102, but the mental estimate of 5 is close enough for a sense-check. If you got σ = 0.05 or σ = 50, you'd know something was wrong.\n\nOrder-of-magnitude thinking: σ should be roughly half the half-width of a 95% interval. This 10-second check prevents the tutor's error.", "source": "GLM 5.1 ①", "_id": "glm_1_72", "judge_pick": true}, {"question": "In a Venn diagram with 3 sets, how many distinct regions are there (including the outside)? List them. (2 steps)", "answer": "- Step 1: There are **8 regions**: C-only, S-only, G-only, C∩S only, C∩G only, S∩G only, C∩S∩G, and outside (none of the three).\n- Step 2: The count comes from 2³ = 8 (each of the 3 sets is either \"in\" or \"out\"). Some regions may have probability 0 (like G-only = 0 in Q6), but they still exist conceptually.\n\nForgetting a region (especially the outside or a 2-set-only region) is the most common Venn diagram error. Always draw all 8 regions.", "source": "GLM 5.1 ①", "_id": "glm_1_73", "judge_pick": true}, {"question": "When the question says \"estimate the number of teenagers who do NOT play Scrabble,\" why is the word \"estimate\" important? What does it tell you about the answer? (2 steps)", "answer": "- Step 1: \"Estimate\" signals that you're using a probability model (the Venn diagram proportions) to scale up to a population. The answer won't be exact because the probabilities are likely sample-based.\n- Step 2: It also means you should round to a **whole number** (since you're counting people) and you don't need to express uncertainty (no confidence interval required at S1 level). Just give the best integer estimate with a brief justification.\n\nDon't leave the answer as 116.92 — round and state that the number of people must be an integer.", "source": "GLM 5.1 ①", "_id": "glm_1_74", "judge_pick": true}], "count": 75}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "On a back-to-back stem-and-leaf diagram, the left side represents one group and the right side another. In what order do you read the leaves on the LEFT side, and why? (2 steps)", "answer": "- Step 1: The left-side leaves are read **right-to-left** (starting from the stem and moving outward). The digit closest to the stem is the units digit of that data value.\n- Step 2: For example, if the left row reads `9 8 | 2 |`, the value closest to the stem is `28`, then `29` — not `82`, `92`. Reading left-to-right would produce the wrong numbers entirely.\n\nAlways verify with the key. A key like `5|6|3` means 65 (left group) and 63 (right group), confirming the left-leaf `5` is the tens-place companion to stem `6`.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "Why must you always write the Key on a stem-and-leaf diagram in an exam, and what happens if you omit it? (2 steps)", "answer": "- Step 1: The key disambiguates what the digits mean — e.g., `5|6|3` could mean 65/63 (cm) or 5.6/6.3 (mm) depending on context. Without it, the diagram is uninterpretable.\n- Step 2: On Edexcel mark schemes, omitting the key costs **B1** (one full mark) every time. It is a guaranteed, free mark — or a guaranteed loss if forgotten.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "For Edexcel IAL, the lower quartile position is found using $$n/4$$. What happens when $$n/4$$ is a non-integer, vs when it is an integer? (3 steps)", "answer": "- Step 1: Compute $$n/4$$. If the result is **not an integer** (e.g., $$n=35$$, position = 8.75), you **round UP** to the next integer (position 9) and take that single value.\n- Step 2: If the result **is an integer** (e.g., $$n=36$$, position = 9), you take the **average of the value at position 9 and position 10**.\n+ This is the same rule as finding the median at position $$n/2$$: integer → average; non-integer → round up.\n- Step 3: The key trap: IAL uses $$n/4$$, NOT $$(n+1)/4$$. Domestic A-level may use different conventions — always follow the IAL rule on IAL papers.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": true}, {"question": "On a stem-and-leaf with $$n=35$$ values, the 9th value from the smallest end is needed for $$Q_1$$. If you're reading the LEFT side of a back-to-back diagram, which direction do you count from, and why? (2 steps)", "answer": "- Step 1: The left side's smallest values are **closest to the stem**. So counting from the smallest means starting at the stem and reading **right-to-left** along each row, then moving to the next row down.\n- Step 2: The 9th value encountered this way is $$Q_1$$. If you accidentally count left-to-right, you'd be counting from the *largest* values — completely wrong position.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": true}, {"question": "A data set has $$Q_1 = 39$$, $$Q_3 = 57$$, and the outlier threshold multiplier is $$k = 1.5$$. State the outlier fences and explain what they mean. (3 steps)", "answer": "- Step 1: Compute $$\\text{IQR} = Q_3 - Q_1 = 57 - 39 = 18$$.\n- Step 2: $$k \\cdot \\text{IQR} = 1.5 \\times 18 = 27$$. The **lower fence** is $$Q_1 - 27 = 12$$ and the **upper fence** is $$Q_3 + 27 = 84$$.\n- Step 3: Any data value **strictly less than 12** or **strictly greater than 84** is classified as an outlier. Values exactly equal to a fence are NOT outliers — they must be beyond it.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "When drawing a box plot with an outlier at 85 and a largest non-outlier at 76, where does the upper whisker end and where does the outlier marker go? (2 steps)", "answer": "- Step 1: The upper whisker extends to the **largest data value that is NOT an outlier** — that is 76. The whisker does NOT extend to the fence value.\n- Step 2: The outlier at 85 is marked with a separate **×** (cross) symbol at its actual position on the scale. The whisker stops at 76, and the × sits at 85.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "When comparing two distributions in an exam, what two aspects must you always comment on, and what must each comment include beyond just the number? (2 steps)", "answer": "- Step 1: Compare a measure of **location** (median or mean) AND a measure of **spread** (IQR or range). One comment for each.\n- Step 2: Each comparison must include: the statistic value, the direction of difference, and **context**. For example: \"Birch median (48 cm) > Maple median (45 cm), so Birch seedlings grow taller on average.\" Just writing \"48 > 45\" without context scores B0.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "New values 27, $$a$$, 48, $$2a$$ are added to a data set of 32 values (now $$n=36$$). The original box plot had min=25, $$Q_1$$=36, median=45, $$Q_3$$=54, max=80, and must remain unchanged. Explain why finding just ONE constraint on $$a$$ is insufficient. (3 steps)", "answer": "- Step 1: Each of the five box-plot statistics (min, $$Q_1$$, med, $$Q_3$$, max) could potentially shift when new values are inserted. Each generates its own constraint on $$a$$.\n- Step 2: For example, \"max ≤ 80\" gives $$2a \\leq 80 \\Rightarrow a \\leq 40$$. But \"$$Q_1$$ stays at 36\" gives a lower bound: exactly one new value must fall below 36 (only 27 does), so $$a \\geq 36$$. These are different constraints from different statistics.\n- Step 3: The final answer requires ALL constraints to hold simultaneously. Stopping after one constraint gives a range that's too wide. The intersection of all constraints yields $$36 \\leq a \\leq 40$$.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "For a discrete random variable $$X$$ with values and probabilities, what is the correct order of operations to compute $$E(X^2)$$, and what is the common mistake? (2 steps)", "answer": "- Step 1: **Square each $$x$$-value first**, then multiply by its probability, then sum: $$E(X^2) = \\Sigma \\, x^2 \\cdot P(X=x)$$. For example, if $$x=4$$ with $$P=0.3$$, the term is $$16 \\times 0.3 = 4.8$$.\n- Step 2: The common mistake is computing $$[E(X)]^2$$ first and then distributing — i.e., squaring the mean instead of squaring each value. $$E(X^2) \\neq [E(X)]^2$$; the whole point of $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$ is that these differ by exactly the variance.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "Why does the constant $$b$$ vanish from $$\\text{Var}(aX + b)$$, and what does this mean intuitively? (2 steps)", "answer": "- Step 1: Variance measures **spread** — how far values are from their mean. Adding a constant $$b$$ shifts every value by the same amount, so all deviations from the mean stay identical. Spread is unchanged.\n- Step 2: Therefore $$\\text{Var}(aX + b) = a^2 \\cdot \\text{Var}(X)$$. Only the scaling factor $$a$$ matters: it stretches (or compresses and flips, if negative) the distribution. The $$+b$$ shift does nothing to spread.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "If $$Y = aX - b$$ with $$a, b > 0$$, and you're told $$E(Y) = 13.4$$ and $$\\text{Var}(Y) = 66.24$$, what is the most efficient order to find $$a$$ and $$b$$, and why? (3 steps)", "answer": "- Step 1: Start with **variance** because it involves only $$a$$: $$\\text{Var}(Y) = a^2 \\cdot \\text{Var}(X)$$. Solve $$a^2 = \\text{Var}(Y) / \\text{Var}(X)$$ to get $$a$$. This avoids dealing with the unknown $$b$$.\n- Step 2: Once $$a$$ is known, use the **mean**: $$E(Y) = a \\cdot E(X) - b$$. Substitute the known $$a$$ and $$E(X)$$, then solve for $$b$$.\n- Step 3: Always check: since $$a, b > 0$$, take the positive square root for $$a$$, and verify $$b$$ comes out positive. If $$a^2 = 16$$, then $$a = 4$$ (not $$-4$$).", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": true}, {"question": "Two independent spinners give scores $$S = X_1$$ and $$R = 2X_2 - 3$$. You need $$P(S > R)$$. Explain the conditioning strategy and why you condition on one variable's outcomes. (3 steps)", "answer": "- Step 1: $$P(S > R)$$ requires knowing the joint distribution of $$S$$ and $$R$$. Since they're independent, $$P(S=s \\cap R=r) = P(S=s) \\cdot P(R=r)$$. But direct enumeration of all pairs is messy.\n- Step 2: Instead, **condition on each outcome of $$X_2$$**. For each possible value $$x_2$$, compute $$R = 2x_2 - 3$$, then find $$P(S > R) = P(X_1 > 2x_2 - 3)$$ using the distribution of $$X_1$$ alone.\n- Step 3: Multiply each conditional probability by $$P(X_2 = x_2)$$ and sum: $$P(S > R) = \\Sigma \\, P(X_1 > 2x_2 - 3) \\cdot P(X_2 = x_2)$$. This is the law of total probability applied to a DRV problem.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "When a question says \"the person with the higher score wins\", should you use a strict inequality ($$>$$) or non-strict ($$\\geq$$), and what goes wrong if you pick the wrong one? (2 steps)", "answer": "- Step 1: \"Higher score wins\" means **strict** inequality: $$P(S > R)$$, not $$P(S \\geq R)$$. A tie means nobody wins (or it's a draw, depending on context).\n- Step 2: Using $$\\geq$$ incorrectly counts ties as wins. For example, if $$R = 5$$, then $$P(X_1 \\geq 5)$$ includes $$P(X_1 = 5)$$, but $$P(X_1 > 5)$$ does not. This inflates your answer by including the tie probability.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "On a histogram, what quantity is proportional to frequency — the height of a bar, or the area of a bar? Explain why this distinction matters. (2 steps)", "answer": "- Step 1: **Area** is proportional to frequency, not height. This is because class widths can differ; a tall, narrow bar might represent fewer values than a shorter, wide bar.\n- Step 2: If all classes had equal width, height would work as a proxy. But with unequal widths (e.g., one class spanning 2 mm and another spanning 4 mm), using height alone would over-represent the wider class. Area = width × height correctly accounts for both dimensions.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": true}, {"question": "A reference bar on a histogram has area 18.75 cm² and represents frequency 20. A target class has frequency 16. What area must the target bar have on the page? (2 steps)", "answer": "- Step 1: Since area ∝ frequency, set up the proportion: $$\\frac{\\text{target area}}{\\text{reference area}} = \\frac{\\text{target freq}}{\\text{reference freq}}$$.\n- Step 2: $$\\text{target area} = 18.75 \\times \\frac{16}{20} = 18.75 \\times 0.8 = 15 \\text{ cm}^2$$. The target bar needs 15 cm² of area on the page.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "A reference class spans 4 mm in width and is drawn 2.5 cm wide on the page. A target class spans 2 mm. How wide is the target bar on the page? (2 steps)", "answer": "- Step 1: The scale on the page is linear in data units: $$\\text{page width} = \\text{data width} \\times \\frac{\\text{reference page width}}{\\text{reference data width}}$$.\n- Step 2: $$\\text{target page width} = 2 \\times \\frac{2.5}{4} = 2 \\times 0.625 = 1.25 \\text{ cm}$$. The target bar is drawn 1.25 cm wide.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "For grouped data with 50 values, the median position uses $$n/2 = 25$$. Why do we NOT use $$(n+1)/2 = 25.5$$ for the grouped median? (2 steps)", "answer": "- Step 1: Grouped data uses **linear interpolation within a class**, which assumes values are uniformly distributed across the class interval. The formula $$L + \\frac{n/2 - F}{f} \\times c$$ locates the point that splits the total area in half.\n- Step 2: The $$(n+1)/2$$ convention is for discrete/individual data where you can identify a specific data point. With grouped data, you're estimating a continuous position, so $$n/2$$ is the standard Edexcel convention. Mixing these up shifts the median slightly.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "The linear interpolation formula for the grouped median is $$\\text{median} = L + \\frac{n/2 - F}{f} \\times c$$. Define each symbol and explain the intuition. (3 steps)", "answer": "- Step 1: $$L$$ = lower boundary of the median class; $$n/2$$ = the target cumulative position; $$F$$ = cumulative frequency of all classes *before* the median class; $$f$$ = frequency *within* the median class; $$c$$ = class width.\n- Step 2: The numerator $$n/2 - F$$ is how far *into* the median class the median falls (in frequency terms). Dividing by $$f$$ gives the **fraction** of the class we need to traverse.\n- Step 3: Multiplying by $$c$$ converts that fraction into data units, and adding $$L$$ offsets from the class boundary. Example: if we need 7 of 20 values into a class of width 4 starting at 32, we go $$32 + \\frac{7}{20} \\times 4 = 32 + 1.4 = 33.4$$.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": true}, {"question": "A coding relationship is given as $$10y = w - 20$$. Rewrite this in the form $$w = ay + b$$, then state the rule for decoding the mean and the rule for decoding the standard deviation. (3 steps)", "answer": "- Step 1: Rearrange: $$w = 10y + 20$$. So the scaling factor is $$a = 10$$ and the shift is $$b = 20$$.\n- Step 2: Mean decodes with both: $$\\bar{w} = 10\\bar{y} + 20$$. The shift matters for the mean because it changes the centre.\n- Step 3: Standard deviation decodes with the scaling only: $$\\sigma_w = 10 \\cdot \\sigma_y$$. The shift $$+20$$ does NOT affect spread. A common error is writing $$\\sigma_w = 10\\sigma_y + 20$$ — this is wrong.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "Why does the variance decode with $$b^2$$ (i.e., $$\\text{Var}(w) = a^2 \\cdot \\text{Var}(y)$$) but the standard deviation decodes with $$|a|$$ (i.e., $$\\sigma_w = |a| \\cdot \\sigma_y$$)? (2 steps)", "answer": "- Step 1: Variance is in **squared units**. When you scale by $$a$$, every deviation from the mean gets multiplied by $$a$$, so the squared deviation gets multiplied by $$a^2$$. Hence $$\\text{Var}(w) = a^2 \\cdot \\text{Var}(y)$$.\n- Step 2: Standard deviation is the **square root** of variance: $$\\sigma_w = \\sqrt{a^2 \\cdot \\text{Var}(y)} = |a| \\cdot \\sqrt{\\text{Var}(y)} = |a| \\cdot \\sigma_y$$. The absolute value appears because SD is always non-negative, even if $$a$$ is negative.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "A data set has mean $$\\bar{w} = 40.8$$ g. A new pebble weighing exactly 40.8 g is added. What happens to the mean — does it stay the same, increase, or decrease? Prove it. (3 steps)", "answer": "- Step 1: New sum = $$\\Sigma w + 40.8$$ and new count = $$n + 1$$. New mean = $$\\frac{\\Sigma w + 40.8}{n+1}$$.\n- Step 2: Since $$\\bar{w} = \\frac{\\Sigma w}{n} = 40.8$$, we have $$\\Sigma w = 40.8n$$. Substitute: $$\\frac{40.8n + 40.8}{n+1} = \\frac{40.8(n+1)}{n+1} = 40.8$$.\n- Step 3: The mean is **unchanged**. Intuitively: adding a value equal to the mean pulls the average neither up nor down.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "Continuing from the previous scenario: when a value equal to the current mean is added, does the standard deviation increase, decrease, or stay the same? Explain with reference to the variance formula. (3 steps)", "answer": "- Step 1: The new value has deviation zero from the mean: $$(40.8 - 40.8)^2 = 0$$. So the numerator $$\\Sigma(w_i - \\bar{w})^2$$ is unchanged.\n- Step 2: However, the denominator increases from $$n$$ to $$n+1$$ (for population variance) or $$n-1$$ to $$n$$ (for sample variance). Either way, you're dividing the same (or very slightly larger) sum of squares by a bigger number.\n- Step 3: Therefore the variance **decreases**, and so does the SD. The common wrong answer \"SD stays the same\" forgets that the denominator grew even though the numerator didn't change much.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "Define $$S_{xy}$$ in terms of sums, and explain what it measures conceptually. (2 steps)", "answer": "- Step 1: $$S_{xy} = \\Sigma xy - \\frac{(\\Sigma x)(\\Sigma y)}{n}$$. This is the computational (shortcut) form that avoids computing individual deviations.\n- Step 2: It measures **co-variation**: how much $$x$$ and $$y$$ move together. If large $$x$$ values tend to pair with large $$y$$ values, $$S_{xy}$$ is positive. If large $$x$$ pairs with small $$y$$, it's negative. If zero, there's no linear relationship.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "The PMCC formula is $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} \\cdot S_{yy}}}$$. Why is the denominator necessary — what would go wrong with just $$r = S_{xy}$$? (2 steps)", "answer": "- Step 1: $$S_{xy}$$ alone depends on the **units and scale** of both variables. Measuring bears in mm instead of cm would inflate $$S_{xy}$$ by a factor of 10, even though the relationship is identical.\n- Step 2: Dividing by $$\\sqrt{S_{xx} \\cdot S_{yy}}$$ **normalises** the co-variation by the individual variations. The result $$r$$ is always in $$[-1, 1]$$, unit-free, and comparable across different data sets. It isolates the *strength* of linear relationship from the *scale* of measurement.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": true}, {"question": "For the regression line $$y = a + bx$$, the gradient is $$b = S_{xy} / S_{xx}$$. A common error is to flip the fraction. How can you sense-check which way round it goes? (2 steps)", "answer": "- Step 1: The gradient $$b$$ tells you how much $$y$$ changes per unit change in $$x$$. So the units of $$b$$ are \"units of $$y$$ per unit of $$x$$\". $$S_{xy}$$ has units (units of $$x$$)(units of $$y$$), and $$S_{xx}$$ has units (units of $$x$$)².\n- Step 2: $$S_{xy}/S_{xx}$$ gives units of $$y$$ per unit of $$x$$ ✓. Flipping to $$S_{xx}/S_{xy}$$ would give units of $$x$$ per unit of $$y$$ ✗. Always check: the variable being predicted goes on top.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "When interpreting a regression gradient in an exam, what three components must your answer include to score the mark? (2 steps)", "answer": "- Step 1: You must state: (1) the **direction** of change (increases/decreases), (2) the **magnitude** (the numerical value of the gradient), and (3) the **context with units**.\n- Step 2: For example, \"For each additional 1 cm increase in bear length, the girth increases by approximately 0.722 cm.\" Writing just \"it goes up by 0.722\" with no units or context scores B0.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "A regression model is built on bear lengths in the range 140–220 cm. Why is estimating girth for a bear of length 50 cm unreliable, even if the correlation is very strong? (2 steps)", "answer": "- Step 1: 50 cm is far **outside the sampled range** (extrapolation). The linear relationship observed between 140–220 cm may not hold at 50 cm — the actual relationship could be non-linear for very small bears.\n- Step 2: The model gives $$g = -42.3 + 0.722(50) = -6.2$$ cm — a **negative girth**, which is physically impossible. This absurd result is a clear warning that extrapolation has failed. Always check whether your prediction falls within the data range.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "When a question gives bear length in metres but the model uses cm, what must you do before substituting into the regression equation, and what happens if you forget? (2 steps)", "answer": "- Step 1: **Convert units first**. If $$d = 2.5$$ m, convert to $$d = 250$$ cm before substituting into $$g = -42.3 + 0.722d$$. The model was built in cm.\n- Step 2: Forgetting gives $$g = -42.3 + 0.722(2.5) = -40.5$$ cm — a physically meaningless answer. This is a guaranteed mark-loser: always check the units of the model vs the units given in the question.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "How does coding (linear transformation) affect the PMCC $$r$$, the regression gradient $$b$$, and the intercept $$a$$? Which one is invariant and why? (3 steps)", "answer": "- Step 1: The PMCC $$r$$ is **invariant** under linear coding. Scaling and shifting don't change the *strength* or *direction* of a linear relationship — they only change the units it's expressed in.\n- Step 2: The gradient $$b$$ **changes** with scaling: if you code $$x$$ or $$y$$, the gradient adjusts accordingly. If $$y$$ is multiplied by 10, $$b$$ is multiplied by 10.\n- Step 3: The intercept $$a$$ changes with both scaling and shifting. Since $$a = \\bar{y} - b\\bar{x}$$, any shift in $$x$$ or $$y$$ alters the intercept.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "To find $$P(X < 18)$$ when $$X \\sim N(15, 2^2)$$, you standardise to get $$z$$. Write the standardisation formula and explain what each term represents. (2 steps)", "answer": "- Step 1: $$z = \\frac{x - \\mu}{\\sigma} = \\frac{18 - 15}{2} = 1.5$$. Here $$x = 18$$ is the raw value, $$\\mu = 15$$ is the mean, and $$\\sigma = 2$$ is the standard deviation.\n- Step 2: $$z = 1.5$$ means the value 18 is 1.5 standard deviations above the mean. We then look up $$P(Z < 1.5) = 0.9332$$ in the standard normal table. Standardisation converts any normal distribution to $$Z \\sim N(0,1)$$ so we can use a single table.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": true}, {"question": "A question states \"the fastest 60% of adults qualify\" and asks for the \"longest qualifying time\". Explain why this translates to $$P(X \\leq t) = 0.6$$, not $$P(X \\leq t) = 0.4$$. (3 steps)", "answer": "- Step 1: \"Fastest\" means **lowest times** (in a race, lower time = faster). The \"fastest 60%\" are the 60% with the smallest values of $$X$$.\n- Step 2: The \"longest qualifying time\" is the **slowest** person who still qualifies — the cutoff at the 60th percentile. This is the value $$t$$ such that 60% of values are below it: $$P(X \\leq t) = 0.6$$.\n- Step 3: The trap is reading \"fastest 60%\" as \"top 60%\" and setting $$P(X > t) = 0.6$$, which gives $$P(X \\leq t) = 0.4$$. This would mean only 40% qualify — contradicting \"60% qualify\". Always re-read: does the percentage refer to the lower tail or upper tail?", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "Given $$P(\\mu - 10 < T < \\mu + 10) = 0.95$$ for a normal distribution, derive the relationship between the interval half-width and $$\\sigma$$. What constant emerges? (3 steps)", "answer": "- Step 1: By symmetry, the remaining 5% is split equally: $$P(T < \\mu - 10) = 0.025$$ and $$P(T > \\mu + 10) = 0.025$$.\n- Step 2: Standardise the upper boundary: $$P\\left(Z < \\frac{10}{\\sigma}\\right) = 0.975$$. From the percentage points table, $$P(Z < 1.96) = 0.975$$, so $$\\frac{10}{\\sigma} = 1.96$$.\n- Step 3: Therefore $$\\sigma = \\frac{10}{1.96} = 5.102 \\approx 5.10$$. The general rule: for a **95% symmetric interval**, the half-width equals **1.96σ**. This is NOT in the formula booklet — you must memorise it.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": true}, {"question": "A tutor computed $$\\sigma = 10 / 1.96 = 0.0510$$ for a normal distribution problem. How can you immediately sense-check that this is wrong without recalculating? (2 steps)", "answer": "- Step 1: If $$\\sigma = 0.0510$$, then the standardised value $$z = -5 / 0.0510 \\approx -98$$. A z-score of magnitude 98 is astronomically far from the mean — off any normal table. This should immediately signal an error.\n- Step 2: The error is a **decimal/reciprocal mistake**: $$10 / 1.96 = 5.102$$, not 0.0510. The tutor likely wrote $$1.96 / 10$$ instead of $$10 / 1.96$$. Always sense-check: $$\\sigma$$ should be comparable to the interval half-width (here, 10), not 200 times smaller.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "For the conditional probability $$P(A \\mid B)$$, if event $$A$$ is a **subset** of event $$B$$ (i.e., $$A \\subset B$$), what simplification occurs and why? (3 steps)", "answer": "- Step 1: The conditional probability formula is $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$.\n- Step 2: If $$A \\subset B$$, then whenever $$A$$ occurs, $$B$$ has also occurred. So $$A \\cap B = A$$, meaning $$P(A \\cap B) = P(A)$$.\n- Step 3: The formula simplifies to $$P(A \\mid B) = \\frac{P(A)}{P(B)}$$. For example, if $$A$$ = \"T > μ−5\" and $$B$$ = \"T > μ−10\", then every value above μ−5 is also above μ−10, so $$A \\subset B$$. You do NOT use $$P(A) \\cdot P(B)$$ — that's for independent events, which these are not.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": false}, {"question": "In a 3-circle Venn diagram (C, S, G), the region \"C but not G\" consists of which sub-regions? Explain why you cannot just take all of C. (2 steps)", "answer": "- Step 1: \"C but not G\" means in C AND outside G. This includes: **C only** (outside both S and G) AND **C ∩ S only** (in C and S, but not G).\n- Step 2: You must **exclude** the regions C ∩ G only and C ∩ S ∩ G, because those are inside G. Taking all of C would incorrectly include the G-overlapping parts. Always shade the Venn diagram to identify exactly which regions qualify.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": false}, {"question": "To test whether events C and S are independent using a Venn diagram, you need $$P(C \\cap S) = P(C) \\cdot P(S)$$. How do you compute each of these three quantities from the Venn regions? (3 steps)", "answer": "- Step 1: $$P(C)$$ = sum of ALL regions inside circle C = C only + C∩S only + C∩G only + C∩S∩G.\n- Step 2: $$P(S)$$ = sum of ALL regions inside circle S = S only + C∩S only + S∩G only + C∩S∩G.\n- Step 3: $$P(C \\cap S)$$ = sum of regions inside BOTH C and S = C∩S only + C∩S∩G. Then check: does $$P(C \\cap S)$$ equal $$P(C) \\times P(S)$$? If yes, independent; if no, not independent.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "The expression $$(C \\cup S) \\cap G'$$ on a Venn diagram refers to which regions? Walk through the logic. (3 steps)", "answer": "- Step 1: $$C \\cup S$$ means \"in C OR in S (or both)\". This includes: C only, S only, C∩S only, C∩G only, S∩G only, and C∩S∩G. All regions except G only and outside.\n- Step 2: $$G'$$ means \"outside G\". This excludes any region that overlaps G: remove C∩G only, S∩G only, and C∩S∩G.\n- Step 3: The intersection $$(C \\cup S) \\cap G'$$ keeps only those regions that are in C or S AND outside G: **C only + C∩S only + S only**. Shade the Venn to verify.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": false}, {"question": "A youth club has 76 members who play both Chess and Go. From the Venn diagram, $$P(C \\cap G) = 0.26$$. How do you estimate the total population size $$N$$? (2 steps)", "answer": "- Step 1: The proportion scaling formula: $$N = \\frac{\\text{observed count}}{\\text{probability}}$$. If 76 people are observed in the event $$C \\cap G$$, and the probability of that event is 0.26, then $$N = \\frac{76}{0.26}$$.\n- Step 2: $$N = 292.31 \\approx 292$$. This assumes the club is a representative sample of the population. The key insight: you can scale from any known count–probability pair to find the total.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": false}, {"question": "To find the number of teenagers who do NOT play Scrabble, a tutor computed $$P(S') = 0.18$$ by adding only the G-only and outside regions. Why is this wrong, and what is the easiest correct approach? (3 steps)", "answer": "- Step 1: $$P(S')$$ includes EVERYONE who doesn't play Scrabble: C only, C∩G only, G only, and outside. The tutor missed C only (0.04) and C∩G only (0.14), getting only 0 + 0.22 = 0.22, not even 0.18.\n- Step 2: The easiest approach is the **complement**: $$P(S') = 1 - P(S)$$. Since $$P(S) = 0.60$$, we get $$P(S') = 1 - 0.60 = 0.40$$. No need to enumerate regions at all.\n- Step 3: Then multiply: $$0.40 \\times 292.31 \\approx 117$$ teenagers don't play Scrabble. Always use the complement when $$P(S)$$ is easier to compute than $$P(S')$$.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": true}, {"question": "When a question asks for the \"number of teenagers\" estimated from probabilities, what must you do with the final answer and why? (2 steps)", "answer": "- Step 1: Round to the **nearest whole number**, because you cannot have a fraction of a person. 116.92 rounds to 117.\n- Step 2: State the reason: \"number of people must be an integer.\" Some mark schemes award a separate mark for rounding with justification — don't lose it by leaving a decimal.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": false}, {"question": "The variance computational formula is $$\\sigma^2 = \\frac{\\Sigma x^2}{n} - \\bar{x}^2$$. Why is this preferred over $$\\sigma^2 = \\frac{\\Sigma(x_i - \\bar{x})^2}{n}$$ for calculation, even though they're algebraically identical? (2 steps)", "answer": "- Step 1: The computational form requires only two running totals ($$\\Sigma x$$ and $$\\Sigma x^2$$) and the mean. You can accumulate these as you read through data once.\n- Step 2: The definition form requires computing each $$(x_i - \\bar{x})^2$$ individually — you must first find $$\\bar{x}$$, then go back through all data subtracting and squaring. This is more error-prone and slower, especially with many data points. The computational form is NOT in the S1 booklet — you must memorise it.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": false}, {"question": "For a symmetric normal distribution, what percentage of data falls within 1, 2, and 3 standard deviations of the mean? Gi
