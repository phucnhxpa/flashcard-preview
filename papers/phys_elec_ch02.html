0^{28}\\,\\text{m}^{-3}$$ is enormous, so the *rate* of charge crossing the filament cross-section (which is what $$I = nqvA$$ measures) is large enough to heat it instantly.\n\nMarble-tube analogy: a tube already packed with marbles — push one in at one end, one pops out the other end immediately, even though no individual marble travelled the length of the tube.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": true}, {"question": "Phuc asked: \"If there's no circuit, is there still electricity inside the wire?\" How should this be answered conceptually?", "answer": "- Step 1: Yes — a piece of metal is *always* full of free electrons (number density $$\\sim 10^{28}\\,\\text{m}^{-3}$$). The \"electricity\" (mobile charge) is present regardless of whether the wire is connected to anything.\n- Step 2: However, with no potential difference applied, these electrons move randomly in all directions at high thermal speeds, and their motions cancel. The net flow across any cross-section is zero, so $$v = 0$$ and $$I = nqvA = 0$$.\n- Step 3: To get a current, you need a p.d. to set up an electric field; the field biases the random motion into a slow directed drift. So the *carriers* are always there; what's missing without a circuit is the *directing force*.\n\nThis is also why touching an isolated wire doesn't shock you — no net flow means no current through your body.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "In a series circuit, the current $$I$$ must be the same everywhere. Use $$I = nqvA$$ to explain why a narrower wire (same material) must have a *higher* drift velocity. (3 steps)", "answer": "- Step 1: Conservation of charge demands the same current at every cross-section — charge can't pile up or disappear. So $$I = nqvA$$ must give the same number on both sides.\n- Step 2: For the same material, $$n$$ and $$q$$ are fixed. Therefore $$vA$$ must be constant, meaning $$v \\propto 1/A$$.\n- Step 3: A narrower wire has smaller $$A$$, so the carriers must drift *faster* to push the same charge per second through the constricted region.\n\nWater-pipe analogy: water in a wide pipe flows slowly, but it speeds up dramatically where the pipe narrows — same volumetric flow rate, smaller area, faster speed.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": true}, {"question": "A thin tungsten filament and a thick copper lead are in series, carrying the same current. Without doing the full calculation, explain qualitatively which factors push the drift velocity in the filament to be much larger.", "answer": "- Step 1: From $$v = I/(nqA)$$, drift velocity scales inversely with both $$n$$ and $$A$$. The filament has a smaller cross-section (much smaller diameter) — so $$A$$ is dramatically smaller. This alone forces $$v$$ up.\n- Step 2: Tungsten also has roughly *half* the carrier density of copper ($$n_W \\approx 4 \\times 10^{28}$$ vs $$n_{Cu} \\approx 8 \\times 10^{28}\\,\\text{m}^{-3}$$). Half the carriers must carry the same current, so each must drift faster.\n- Step 3: Both effects compound multiplicatively. With a diameter ratio of about 30, $$A$$ shrinks by ~900×; combined with the factor of 2 in $$n$$, the filament drift velocity ends up ~10³ times that of the leads.\n\nTakeaway: same current, but the filament is a bottleneck on both axes (smaller area, sparser carriers) — so the few carriers it has must move much faster.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "Why does a small carrier number density $$n$$ in a semiconductor *increase* the drift velocity required to carry a given current, compared to a metal? (3 steps)", "answer": "- Step 1: Rearrange the transport equation: $$v = \\dfrac{I}{nqA}$$. For the same current $$I$$, geometry $$A$$, and carrier charge $$q$$, drift velocity is inversely proportional to $$n$$.\n- Step 2: A typical metal has $$n \\sim 10^{28}$$–$$10^{29}\\,\\text{m}^{-3}$$, whereas a semiconductor like silicon has $$n \\sim 10^{17}\\,\\text{m}^{-3}$$ — about $$10^{11}$$ times fewer carriers.\n- Step 3: With so few carriers available, each one must travel much faster to deliver the same charge per second. So semiconductors typically have drift velocities orders of magnitude larger than metals carrying the same current in the same geometry.\n\nCounter-intuitive takeaway: \"fewer carriers\" doesn't mean \"slower carriers\" — it means *faster* drift, because each one shoulders more of the workload.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "Why can insulators not carry a meaningful current even with a very large applied voltage? Frame the answer using $$I = nqvA$$.", "answer": "- Step 1: In an insulator (glass, rubber, dry wood), nearly all electrons are tightly bound to their atoms — there are essentially no *free* charge carriers available to move. So $$n \\approx 0$$.\n- Step 2: From $$I = nqvA$$: if $$n = 0$$, then $$I = 0$$ regardless of how large $$v$$, $$q$$, or $$A$$ are. A huge field can in principle yank an electron loose (dielectric breakdown), but at normal voltages, there's simply nothing to push.\n- Step 3: This is *qualitatively different* from a poor conductor — a poor conductor has a small $$n$$ and a small but non-zero current; an insulator has effectively zero $$n$$ and zero current. That's why insulators are used to *block* current paths, not just slow them down.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": true}, {"question": "Compare typical number densities $$n$$ for metals, semiconductors, and insulators in order of magnitude. Why is $$n$$ (rather than $$q$$ or $$v$$) the deciding factor for whether a material conducts well?", "answer": "- Step 1: Approximate values:\n+ Metals (Cu, W, Al): $$n \\sim 10^{28}$$–$$10^{29}\\,\\text{m}^{-3}$$\n+ Semiconductors (Ge, Si): $$n \\sim 10^{16}$$–$$10^{19}\\,\\text{m}^{-3}$$\n+ Insulators (glass, porcelain): $$n \\approx 0$$\n- Step 2: The charge per carrier $$q$$ is fixed (electron charge, $$1.6 \\times 10^{-19}\\,\\text{C}$$) — it doesn't vary between materials. The cross-section $$A$$ is set by the wire geometry, not the material. Drift velocity $$v$$ adapts to whatever the circuit demands.\n- Step 3: So the only intrinsic material property in $$I = nqvA$$ that varies across many orders of magnitude is $$n$$. A copper wire has ~10⁹ times more carriers per m³ than germanium and effectively infinity more than glass. This single factor explains why metals conduct, semiconductors conduct poorly, and insulators don't conduct at all.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "How and why does the carrier density $$n$$ of a semiconductor change with temperature, and what does this do to its drift velocity for a fixed current?", "answer": "- Step 1: In a semiconductor, electrons need a small amount of energy to escape their bonds and become free carriers. At low temperature, almost none have enough energy; at higher temperature, thermal energy promotes more electrons into the conduction band.\n- Step 2: So $$n$$ *increases* with temperature — the material becomes a better conductor as it heats up. (This is the opposite behaviour of metals, where heating increases lattice vibrations and slightly impedes drift.)\n- Step 3: For a fixed current $$I$$ and fixed geometry, $$v = I/(nqA)$$, so as $$n$$ rises, $$v$$ falls. Higher temperature ⇒ more carriers ⇒ each carrier needs to drift less quickly.\n\nPractical consequence: semiconductor resistance drops with temperature, which is why thermistors are useful temperature sensors and why semiconductor devices need careful thermal design.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": true}, {"question": "Why is the drift velocity in a copper wire so absurdly slow (well under 1 mm/s for everyday currents), even though copper is an excellent conductor?", "answer": "- Step 1: Free electrons in copper are never in free flight for long — they collide constantly with the vibrating positive ions of the lattice. Each collision randomises the electron's motion, dissipating directed momentum as heat.\n- Step 2: Between collisions, the field $$E$$ accelerates them, but the time between collisions is very short, so they only pick up a tiny extra velocity before the next scatter. The *average* directed velocity (drift velocity) ends up extremely small.\n- Step 3: Despite this slowness, copper conducts well because there are so many carriers — $$n \\sim 10^{29}\\,\\text{m}^{-3}$$ — and $$I = nqvA$$ multiplies these. A tiny $$v$$ times an enormous $$n$$ still gives a substantial $$I$$.\n\nTakeaway: copper's superpower is the *number* of carriers, not their speed.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": true}, {"question": "A student converts $$1\\,\\text{mm}^2$$ to SI units as $$1 \\times 10^{-3}\\,\\text{m}^2$$. What's wrong, and what's the correct conversion?", "answer": "- Step 1: The mistake is treating an *area* conversion as if it were a length conversion. $$1\\,\\text{mm} = 10^{-3}\\,\\text{m}$$ — that's the length factor.\n- Step 2: For area, you must square the length factor: $$1\\,\\text{mm}^2 = (10^{-3}\\,\\text{m})^2 = 10^{-6}\\,\\text{m}^2$$.\n- Step 3: Similarly $$1\\,\\text{cm}^2 = 10^{-4}\\,\\text{m}^2$$ (not $$10^{-2}$$). Getting this wrong by a factor of 1000 will trash your drift-velocity answer, because $$A$$ sits in the denominator of $$v = I/(nqA)$$.\n\nQuick mental check: any length-squared conversion picks up an exponent twice the prefix's.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "Why is the unit-prefix distinction between micro ($$\\mu$$) and milli (m) so easy to confuse, and what is the actual factor difference between them?", "answer": "- Step 1: They look similar in handwriting (especially $$\\mu$$ vs m), and they're both common in lab measurements (microamps, milliamps). It's tempting to misread or mis-write.\n- Step 2: But $$\\mu = 10^{-6}$$ and $$m = 10^{-3}$$ — a factor of **1000** apart. So $$1\\,\\mu\\text{A} = 10^{-6}\\,\\text{A}$$, while $$1\\,\\text{mA} = 10^{-3}\\,\\text{A}$$.\n- Step 3: In Phuc's lesson, treating $$1\\,\\mu\\text{A}$$ as $$10^{-3}\\,\\text{A}$$ inflated the current by 1000×, which would cascade into a 1000× error in drift velocity or electron count. Always write out the prefix table at the start of an exam to avoid this.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": true}, {"question": "A wire of cross-sectional area $$1\\,\\text{mm}^2$$ carries a current of 1 A. Roughly how big is the drift velocity in mm/s — closer to 0.01, 0.1, 1, or 10? Why?", "answer": "- Step 1: Use $$v = I/(nqA)$$ with $$I = 1\\,\\text{A}$$, $$n \\sim 10^{29}\\,\\text{m}^{-3}$$, $$q \\sim 10^{-19}\\,\\text{C}$$, $$A = 10^{-6}\\,\\text{m}^2$$.\n- Step 2: The denominator is roughly $$10^{29} \\times 10^{-19} \\times 10^{-6} = 10^{4}$$. So $$v \\sim 10^{-4}\\,\\text{m/s}$$.\n- Step 3: That's about $$0.1\\,\\text{mm/s}$$ — sub-mm per second. The benchmark \"typical copper, mm² area, amp-scale current → ~tenths of a mm/s\" is worth memorising for sanity-checking.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "If you double the current through a fixed copper wire, what happens to (a) $$n$$, (b) $$q$$, (c) $$A$$, and (d) $$v$$? Explain why.", "answer": "- Step 1: $$n$$ doesn't change — it's an intrinsic property of the copper, determined by the number of free electrons per atom and the atomic packing, not by what the circuit asks of it.\n- Step 2: $$q$$ doesn't change either — it's the electron charge, a constant of nature.\n- Step 3: $$A$$ obviously doesn't change — the wire's geometry is fixed.\n- Step 4: So the only adjustable quantity is $$v$$: from $$v = I/(nqA)$$, doubling $$I$$ doubles $$v$$. Drift velocity is the variable that responds to changing circuit conditions.\n\nConceptual point: the wire is a passive medium — its material properties are fixed. Currents adjust by changing how fast carriers drift, not by changing how many there are (in a metal).", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "Two copper wires X and Y are connected in series. Wire Y has twice the diameter of wire X. Compare the drift velocities $$v_X$$ and $$v_Y$$.", "answer": "- Step 1: In series, $$I$$ is the same in both. Same material, so $$n$$ and $$q$$ are equal too. From $$v = I/(nqA)$$, we get $$v \\propto 1/A$$.\n- Step 2: Area scales with diameter squared: $$A_Y = \\pi(d)^2 = 4 \\times \\pi(d/2)^2 = 4 A_X$$. Y has four times the area of X.\n- Step 3: Therefore $$v_X / v_Y = A_Y / A_X = 4$$, so $$v_X : v_Y = 4 : 1$$. The narrow wire X has the much faster drift.\n\nWatch out: a factor of 2 in *diameter* becomes a factor of 4 in *area* and hence a factor of 4 in drift velocity — squaring is easy to forget.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "A wire has its cross-sectional area given via its diameter $$d$$. What's the correct formula to plug into $$I = nqvA$$, and what's the common mistake?", "answer": "- Step 1: The correct formula is $$A = \\pi r^2 = \\pi (d/2)^2 = \\pi d^2 / 4$$.\n- Step 2: The common mistake is using $$A = \\pi d^2$$ — forgetting the factor of 1/4 from halving the diameter to get the radius. This makes $$A$$ four times too large, so $$v$$ comes out four times too small.\n- Step 3: A second common mistake: substituting $$d$$ in mm without converting to metres first. Always convert $$d$$ to metres, *then* square, *then* multiply by $$\\pi/4$$.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "Why is the order in which we write the factors in $$I = nqvA$$ (e.g. $$nAvq$$ vs $$nqvA$$) irrelevant, and is there a useful mnemonic?", "answer": "- Step 1: Multiplication is commutative — the order of scalar factors doesn't change the product. So $$nqvA$$, $$nAvq$$, $$qvnA$$ all give the same numerical value.\n- Step 2: Different textbooks write it differently. The Edexcel guide uses $$I = nqvA$$; the textbook by Benn & George writes $$I = nAvq$$. Both are correct.\n- Step 3: The useful mnemonic is the one that helps *you* remember the four factors. \"Naughty Quirky Vampires Ate\" → n-q-v-A. Pick one and stick with it.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "Phuc asked: \"What's the difference between current $$I = Q/t$$ and power $$P = E/t$$ — they're both 'something per time'?\"", "answer": "- Step 1: They're both *rates*, but of different things. Current is the rate of *charge* flow (coulombs per second); power is the rate of *energy* transfer (joules per second).\n- Step 2: Taxi analogy: charges are like taxis travelling round the circuit. Current = how many taxis pass per second. Power = total energy (passengers) those taxis deliver per second.\n- Step 3: The link between them is voltage: $$V = E/Q$$ is the energy each taxi carries (joules per coulomb). So $$P = VI$$ — energy per taxi times taxis per second equals total energy delivered per second.\n\nBottom line: current measures the *flow*; power measures the *delivery rate of energy that flow is carrying*.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": true}, {"question": "A 0.50 mm² copper wire (carrier density $$\\sim 8.5 \\times 10^{28}\\,\\text{m}^{-3}$$) carries 0.25 A to a lamp 3 m away. Roughly how long does a single electron take to traverse the wire, and how does this reconcile with the lamp lighting \"instantly\"?", "answer": "- Step 1: Estimating drift velocity: $$v = I/(nqA)$$. With these numbers, the denominator is around $$8.5 \\times 10^{28} \\times 1.6 \\times 10^{-19} \\times 5 \\times 10^{-7} \\approx 7 \\times 10^{3}$$, giving $$v \\approx 4 \\times 10^{-5}\\,\\text{m/s}$$.\n- Step 2: Time for one electron to drift 3 m: $$t = L/v = 3 / (4 \\times 10^{-5}) \\approx 8 \\times 10^{4}\\,\\text{s}$$ — roughly a day.\n- Step 3: But the lamp lights almost instantly because the *electric field* propagates at $$\\sim 3 \\times 10^{8}\\,\\text{m/s}$$, reaching all electrons (including those already in the filament) in nanoseconds. They all start drifting together — you don't have to wait for one specific electron to travel the full distance.\n\nThe two timescales differ by ~13 orders of magnitude — yet both are correct descriptions of the same physics, looked at from different angles.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "A torch filament (tungsten) and copper connecting leads carry the same current. The filament is hot and glows; the leads stay cool. Why is the filament where almost all the energy is dissipated, and how does this relate to drift velocity?", "answer": "- Step 1: From $$I = nqvA$$ with same $$I$$, the filament's much smaller $$A$$ (and smaller $$n$$ for tungsten) forces a much higher drift velocity — roughly 10³ times that in the leads.\n- Step 2: Higher drift velocity means electrons collide with the lattice much more violently and more often per unit length, dissipating more energy as heat per unit length. This is *resistive heating*.\n- Step 3: Effectively, almost all the p.d. of the battery drops across the filament (where the \"constriction\" is), so almost all the energy goes into heating it — hot enough to glow white. The leads barely dissipate anything because the drift is slow and gentle.\n\nThis is the water-pipe analogy with a vengeance: most of the pressure drop happens at the constriction, not along the wide pipe.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": true}, {"question": "What is the conceptual difference between the direction of conventional current and the direction of electron flow in a metal wire, and why do both conventions exist?", "answer": "- Step 1: Conventional current is defined as the direction *positive* charge would flow — from + terminal through the external circuit to − terminal. This convention was set before electrons were discovered.\n- Step 2: In metals, the actual carriers are electrons, which are negative. They flow from the − terminal towards the + terminal — *opposite* to conventional current.\n- Step 3: Both conventions coexist because the physics works out the same either way: a positive charge moving right is mathematically equivalent to a negative charge moving left, for current direction. Conventional current is kept because nearly all formulas and circuit diagrams were built around it.\n\nSign convention: in $$I = nqvA$$, if you use $$q = +1.6 \\times 10^{-19}\\,\\text{C}$$ for the magnitude, the resulting $$v$$ tells you the speed of the conventional flow; electrons themselves drift in the opposite direction.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "In an electrolyte, both positive and negative ions can carry current. How does $$I = nqvA$$ adapt to this situation?", "answer": "- Step 1: Conceptually, you sum the contributions of each type of carrier. Positive ions drift one way; negative ions drift the opposite way. Both contribute *positively* to the conventional current because a positive charge moving right and a negative charge moving left are equivalent for current direction.\n- Step 2: The full expression becomes $$I = (n_{+}q_{+}v_{+} + n_{-}|q_{-}|v_{-})A$$, where each species has its own density, charge magnitude, and drift speed.\n- Step 3: For exam-level problems, you usually assume one dominant carrier or are told to consider only one species. But the underlying lesson is that $$I = nqvA$$ counts charge flux per unit area — and all carriers contribute additively to that flux.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "Why is the formula $$I = nqvA$$ called a \"transport equation,\" and what's the deeper microscopic story it tells?", "answer": "- Step 1: It's called a transport equation because it describes *how much of a quantity (charge) is transported* across a surface per unit time, in terms of the microscopic properties of the carriers doing the transporting.\n- Step 2: Reading it physically: in any small slab of wire, the current is the product of \"how many movers there are per volume\" ($$n$$), \"what each one carries\" ($$q$$), \"how fast on average they're going\" ($$v$$), and \"how wide the highway is\" ($$A$$).\n- Step 3: The same structural form crops up everywhere in physics — heat flux, mass flow, particle flux — wherever a microscopic carrier transports a quantity across a surface. It's the fundamental link between the microscopic (carriers and their motion) and the macroscopic (the bulk current you measure with an ammeter).", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "Estimate (mentally, without a calculator): a copper wire with cross-section 2 mm² and $$n \\approx 8 \\times 10^{28}\\,\\text{m}^{-3}$$ carries 5 A. Is the drift velocity closer to 10⁻⁵, 10⁻⁴, 10⁻³, or 10⁻² m/s? (4 steps)", "answer": "- Step 1: $$v = I/(nqA)$$. Plug in orders of magnitude: $$I = 5$$, $$n \\sim 10^{29}$$, $$q \\sim 10^{-19}$$, $$A \\sim 2 \\times 10^{-6}$$.\n- Step 2: Compute the denominator: $$10^{29} \\times 10^{-19} \\times 10^{-6} = 10^{4}$$. With the factor of 2 from A: roughly $$2 \\times 10^{4}$$ — but with the factor 0.8 from n, it's about $$1.6 \\times 10^{4}$$.\n- Step 3: So $$v \\sim 5 / (1.6 \\times 10^{4}) \\approx 3 \\times 10^{-4}\\,\\text{m/s}$$.\n- Step 4: Closest to $$10^{-4}\\,\\text{m/s}$$ — that is, fractions of a mm per second. The benchmark \"amp-scale current, mm²-scale wire ⇒ ~0.1 mm/s drift\" is reliable.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "Why doesn't an electron-by-electron picture (one electron leaves the battery → travels along the wire → arrives at the bulb) work for explaining how circuits light up quickly?", "answer": "- Step 1: At drift speeds of ~0.1 mm/s, an electron leaving the battery would take days to travel a metre. If circuits worked that way, switching on a lamp would mean waiting days.\n- Step 2: The wire is already *packed* with electrons everywhere — including inside the filament itself. The instant the field is applied (at near-c), every electron in the wire starts drifting in unison.\n- Step 3: So the filament starts heating because the electrons *already inside it* start moving, not because new ones travelled from the battery. The \"electron-by-electron travel\" picture is wrong; the correct picture is a synchronised, gradual shuffle of the whole electron population.\n\nThis is exactly the marble-tube analogy: pushing one marble in immediately ejects one at the far end — no marble travelled the whole length.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": true}, {"question": "*Misconception probe:* A student claims \"more current means faster electrons in a metal wire\" — explain whether this is correct, and why it's a subtle point.", "answer": "- Step 1: It's correct in one specific sense and misleading in another. If we keep the wire (and hence $$n$$, $$q$$, $$A$$) fixed, then $$v = I/(nqA)$$ shows $$v \\propto I$$ — more current does mean faster *drift*.\n- Step 2: But \"fast\" here means tenths of a mm/s for low current vs maybe a few mm/s for high current — still absurdly slow. The thermal speed (~10⁶ m/s) doesn't change with current; only the small directed drift component does.\n- Step 3: The bigger misconception is that more current means more electrons are flowing, or that they suddenly travel near light speed. In a metal, the number of free electrons doesn't change — they just drift slightly faster. The field travels near c; the electrons themselves never get close to it.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": true}, {"question": "*Misconception probe:* \"Resistors store electrons, which is why current is reduced.\" Why is this wrong?", "answer": "- Step 1: Electrons are not stored or consumed in a resistor — by Kirchhoff's current law, exactly as many electrons enter one end per second as leave the other end. The current is the *same* on both sides of a resistor.\n- Step 2: What the resistor does is convert *electrical energy* into *heat*. Electrons collide with the dense lattice ions of the resistive material more frequently, transferring kinetic energy to lattice vibrations.\n- Step 3: The voltage drop across a resistor reflects the energy lost per coulomb, not a loss of charge. The carriers themselves pass straight through — they just emerge with less energy than they had on entry.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": true}, {"question": "*Limiting case:* What would happen to drift velocity if you could somehow make a perfectly clean crystal of copper at zero temperature, with no impurities or vibrations?", "answer": "- Step 1: At absolute zero with no impurities, there would be no lattice vibrations and no defects for electrons to scatter off. Between collisions becomes infinite — the electrons would accelerate continuously under the field.\n- Step 2: In that limit, there'd be no steady drift velocity at all; the carriers would just accelerate. The concept of a steady-state $$v$$ requires a balance between the field pushing and collisions resisting.\n- Step 3: This is roughly what happens in *superconductors* (which form below a critical temperature): resistance drops to zero, and current can persist indefinitely without an applied voltage. $$I = nqvA$$ still applies as a snapshot, but $$v$$ no longer settles to a small value — it can be very large with zero field.\n\nTakeaway: drift velocity is a steady-state concept that depends on the lattice acting as a brake. Remove the brake, and the equation's interpretation changes.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "A semiconductor strip 6 mm wide and 0.5 mm thick carries 10 mA, with $$n = 7 \\times 10^{22}\\,\\text{m}^{-3}$$. Roughly what's the drift velocity — closer to mm/s, cm/s, or m/s — and what does this tell you about semiconductors vs metals? (3 steps)", "answer": "- Step 1: $$A = 6 \\times 10^{-3} \\times 0.5 \\times 10^{-3} = 3 \\times 10^{-6}\\,\\text{m}^2$$. Denominator of $$v = I/(nqA)$$: $$7 \\times 10^{22} \\times 1.6 \\times 10^{-19} \\times 3 \\times 10^{-6} \\approx 3 \\times 10^{-2}$$.\n- Step 2: $$v \\approx 0.01 / 0.03 \\approx 0.3\\,\\text{m/s}$$ — that's metres per second, *not* mm/s.\n- Step 3: This is roughly 10⁴ times faster than drift in copper at the same current. Reason: $$n$$ is about a million times smaller in the semiconductor, so each carrier must work proportionately harder. Few carriers → fast carriers; many carriers → slow carriers.\n\nThis is the headline contrast between conductors and semiconductors: same equation, vastly different regimes of $$n$$ and $$v$$.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": true}, {"question": "A wire has a non-uniform cross-section — wide at one end, narrow in the middle, wide at the other end. Sketch how the drift velocity varies along the wire, and explain.", "answer": "- Step 1: Charge is conserved, so the current $$I$$ is the same at every cross-section (no electrons piling up). Same material everywhere, so $$n$$ and $$q$$ are constant.\n- Step 2: Therefore $$v = I/(nqA) \\propto 1/A$$. Where the wire is wide, $$v$$ is small; where it narrows, $$v$$ ramps up; in the constriction, $$v$$ is maximum; then it drops back as the wire widens again.\n- Step 3: The profile is exactly like water flowing through a venturi tube — slow in the wide sections, fast through the narrow throat. The electrons accelerate into the constriction and decelerate out of it, while the average current stays the same throughout.\n\nThis is one of the most physically intuitive consequences of $$I = nqvA$$.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": true}, {"question": "*Synthesis problem:* A copper wire (n ≈ 8 × 10²⁸ m⁻³) and a silicon wire (n ≈ 10¹⁷ m⁻³) have the *same* diameter and carry the *same* current. Without computing exact numbers, by what rough factor does the drift velocity in silicon exceed that in copper, and what is the practical consequence?", "answer": "- Step 1: Same $$I$$, same $$A$$, same $$q$$ — so $$v$$ scales as $$1/n$$. The ratio $$v_{Si}/v_{Cu} = n_{Cu}/n_{Si} \\sim 8 \\times 10^{28} / 10^{17} \\sim 10^{12}$$.\n- Step 2: That's a factor of about a trillion — silicon carriers would need to move trillions of times faster than copper carriers for the same current. In practice, this means silicon can't actually carry as much current as copper in the same geometry; the carriers can't drift fast enough.\n- Step 3: This is why silicon is used for *signals* and switches (where small currents suffice) and copper is used for *power* delivery (where you need to move lots of charge). The factor of $$10^{12}$$ in $$n$$ dictates the entire role each material plays in electronics.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": true}, {"question": "*Synthesis problem:* A 0.25 A lamp is fed by a copper wire of cross-section 0.5 mm². The lamp is 3 m from the switch. Approximately how long would it take a single tagged electron to travel from switch to lamp, compared to the time for the field to do so?", "answer": "- Step 1: Drift velocity roughly $$v = I/(nqA) \\approx 0.25 / (8.5 \\times 10^{28} \\times 1.6 \\times 10^{-19} \\times 5 \\times 10^{-7})$$. Denominator: $$\\sim 7 \\times 10^{3}$$. So $$v \\sim 4 \\times 10^{-5}\\,\\text{m/s}$$.\n- Step 2: Time for electron to travel 3 m: $$t_e = L/v \\approx 3 / (4 \\times 10^{-5}) \\approx 8 \\times 10^{4}\\,\\text{s} \\approx 22\\,\\text{hours}$$.\n- Step 3: Time for the field: $$t_f = L/c \\approx 3 / (3 \\times 10^{8}) = 10^{-8}\\,\\text{s} = 10\\,\\text{ns}$$.\n- Step 4: Ratio: about $$10^{13}$$. The field is roughly ten trillion times faster than the carrier. That's why the lamp lights \"instantly\" even though the carriers themselves are slower than a snail.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": true}, {"question": "*Synthesis problem:* You have two wires made of the same metal, same diameter, but one is twice as long. Same potential difference applied across each individually. Compare the drift velocities in each, and explain.", "answer": "- Step 1: Same metal, same diameter ⇒ same $$n$$, $$q$$, $$A$$. The drift velocities differ only if the currents differ.\n- Step 2: Longer wire ⇒ higher resistance (resistance ∝ length). Same voltage applied ⇒ smaller current via Ohm's law $$I = V/R$$. Specifically, the longer wire has half the current.\n- Step 3: From $$v = I/(nqA)$$: half the current means half the drift velocity. So the longer wire has a smaller $$v$$ — electrons drift more slowly because the field, while propagating instantly, has the same total p.d. spread over a longer distance, giving a weaker $$E$$ at any point.\n\nConceptual unification: $$v$$ ultimately tracks the *local electric field strength*, which is $$V/L$$. Longer wire, same V → weaker field → slower drift.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "*Edge case:* In the limit of an extremely thin nanowire, can drift velocity exceed the thermal speed of electrons? What might break down physically?", "answer": "- Step 1: From $$v = I/(nqA)$$, as $$A \\to 0$$, $$v$$ grows without bound for fixed $$I$$. Mathematically, you could push $$v$$ past thermal speeds (~10⁶ m/s).\n- Step 2: But physically, the framework assumes drift is a *small* bias on top of much larger random thermal motion — that's how steady-state drift emerges from the collision-dominated picture. Once $$v$$ approaches thermal speeds, the assumption breaks.\n- Step 3: In reality, before this regime, the wire would heat enormously (large $$I^2 R$$), melt, or hit other current-limiting effects (ballistic transport, quantum effects, electromigration). $$I = nqvA$$ is a macroscopic/semi-classical result; in nanowires you need a quantum-mechanical treatment.\n\nTakeaway: every macroscopic formula has a domain of validity — pushing it to extreme geometries reveals where it stops being physically meaningful.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": true}, {"question": "*Edge case:* Why doesn't simply increasing the area of a wire keep drift velocity arbitrarily low?", "answer": "- Step 1: At first glance, $$v = I/(nqA)$$ suggests bigger $$A$$ always means slower drift — true for *fixed current*.\n- Step 2: But in practice, if you make the wire much fatter (lower resistance), then for a given source voltage, $$I = V/R$$ goes *up*. So $$I$$ and $$A$$ both increase; the net effect on $$v$$ depends on which scales faster.\n- Step 3: For a wire connected to a fixed voltage source, $$R \\propto 1/A$$, so $$I \\propto A$$, and consequently $$v = I/(nqA)$$ becomes approximately *independent* of $$A$$. The drift velocity in a copper wire connected to a battery isn't really a property of the wire's thickness — it's set by the field along the wire, which depends on $$V/L$$.\n\nThis is a subtle but important point: drift velocity in a free wire is field-determined, not area-determined.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "*Concise exercise:* A wire with $$n = 10^{28}\\,\\text{m}^{-3}$$, $$A = 10^{-6}\\,\\text{m}^2$$, carries $$I = 1.6\\,\\text{A}$$. Roughly what's $$v$$ in mm/s? (Use $$q = 1.6 \\times 10^{-19}\\,\\text{C}$$.) (3 steps)", "answer": "- Step 1: $$v = I/(nqA) = 1.6 / (10^{28} \\times 1.6 \\times 10^{-19} \\times 10^{-6})$$.\n- Step 2: Denominator: $$1.6 \\times 10^{28 - 19 - 6} = 1.6 \\times 10^{3}$$.\n- Step 3: $$v = 1.6 / 1600 = 10^{-3}\\,\\text{m/s} = 1\\,\\text{mm/s}$$. Slightly faster than typical copper because $$n$$ is an order of magnitude lower than copper's $$\\sim 10^{29}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "*Concise exercise:* A wire with $$n$$ ten times smaller than copper carries the *same* current $$I$$ through the *same* cross-section. How does its drift velocity compare?", "answer": "- Step 1: $$v = I/(nqA)$$. With $$I$$, $$q$$, $$A$$ fixed and $$n$$ down by a factor of 10, $$v$$ goes *up* by a factor of 10.\n- Step 2: So drift velocity is ten times faster. The intuition is that, with fewer carriers available, each remaining carrier must drift faster to carry the same current.\n- Step 3: This is the principle that makes semiconductors have such high drift velocities relative to metals — their $$n$$ is many orders of magnitude smaller.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "A 1 m wire carrying 0.5 A has a certain drift velocity $$v$$. If you halve the wire's *length* but keep everything else (material, diameter, current) the same, what happens to $$v$$?", "answer": "- Step 1: $$v$$ depends only on $$I$$, $$n$$, $$q$$, and $$A$$ — not on the length of the wire. None of those change when you halve the length.\n- Step 2: So $$v$$ is unchanged. The drift velocity is a *local* property at any cross-section, not an integrated property along the wire.\n- Step 3: What *does* change is the voltage needed to push 0.5 A through the wire — a shorter wire has lower resistance, so a smaller voltage suffices. But for the given current, the drift velocity at any cross-section is the same.\n\nA subtle but important distinction: $$v$$ tracks current and geometry, not the wire's total length.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "*Mnemonic check:* In an exam, you might mix up whether $$n$$ is \"per cubic metre\" or \"per cubic mm.\" How do you sanity-check which is correct?", "answer": "- Step 1: The SI unit for $$n$$ is $$\\text{m}^{-3}$$ — always. If a question quotes $$n$$ in another unit, convert first.\n- Step 2: Sanity-check via copper benchmark: $$n_{Cu} \\approx 8.5 \\times 10^{28}\\,\\text{m}^{-3}$$. If you ever see \"$$n \\approx 8.5 \\times 10^{28}\\,\\text{mm}^{-3}$$\" — that would mean $$8.5 \\times 10^{28+9} = 8.5 \\times 10^{37}\\,\\text{m}^{-3}$$, which is absurd (more carriers than atoms!).\n- Step 3: Conversion: $$1\\,\\text{mm}^{-3} = (10^{-3})^{-3}\\,\\text{m}^{-3} = 10^{9}\\,\\text{m}^{-3}$$. So if quoted per mm³, multiply by $$10^9$$ to get per m³.\n\nQuick gut-check: copper has $$\\sim 10^{28}$$ carriers per m³ — anything more than 100× off is probably a unit issue.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "Why is the equation $$I = nqvA$$ sometimes called a \"microscopic\" expression for current, in contrast to $$I = Q/t$$?", "answer": "- Step 1: $$I = Q/t$$ is a macroscopic definition — it tells you what current *is* (charge per unit time crossing a surface) but not *how* the charge gets there. It's a measurement-level statement.\n- Step 2: $$I = nqvA$$ digs underneath: it expresses the same current in terms of the *microscopic* parameters of the material (carrier density, charge per carrier, drift velocity) and the geometry (area). It explains current as the product of carriers times their motion.\n- Step 3: The two are completely consistent: $$nqvA$$ over a time $$\\Delta t$$ gives a total charge $$\\Delta Q = nqvA \\Delta t$$, which divided by $$\\Delta t$$ returns the macroscopic $$I = Q/t$$. The transport equation is the bridge between the microscopic and macroscopic descriptions of current.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": true}, {"question": "*Conceptual probe:* Why does heating a metal *decrease* its drift velocity (for fixed current and geometry), while heating a semiconductor *also* decreases its drift velocity (for fixed current) — but for completely different reasons?", "answer": "- Step 1: In a metal, $$n$$ is fixed (free electrons are essentially temperature-independent at normal conditions). What changes with temperature is the collision rate: hotter lattice vibrates more, so electrons scatter more often. For a fixed current, you might think this raises $$v$$, but actually the *resistance* rises, so the current drops for a given p.d. — and with it $$v$$.\n- Step 2: In a semiconductor, $$n$$ is *strongly* temperature-dependent — heating frees more electrons. So for a fixed current, $$v = I/(nqA)$$ falls as $$n$$ rises.\n- Step 3: So in both cases, hotter material ⇒ slower drift for a fixed current, but via different mechanisms: metals via increased scattering (resistance up), semiconductors via increased carrier density. This contrast is the qualitative signature distinguishing the two.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": true}, {"question": "Mnemonic for must-remember benchmarks: list the order-of-magnitude values you should know cold for copper drift-velocity problems.", "answer": "- Step 1: Copper number density: $$n_{Cu} \\sim 8 \\times 10^{28}\\,\\text{m}^{-3}$$ — roughly one free electron per atom.\n- Step 2: Electron charge: $$|q_e| = 1.6 \\times 10^{-19}\\,\\text{C}$$.\n- Step 3: Typical drift velocity for copper at amp-scale currents in mm²-scale wires: $$\\sim 10^{-4}\\,\\text{m/s}$$, i.e. sub-mm/s.\n- Step 4: Field propagation speed: $$c \\approx 3 \\times 10^{8}\\,\\text{m/s}$$ — ten orders of magnitude faster than drift.\n- Step 5: Carrier density contrasts: semiconductors $$\\sim 10^{16}$$–$$10^{19}\\,\\text{m}^{-3}$$; insulators $$\\approx 0$$.\n\nThese five numbers let you sanity-check almost any drift-velocity calculation.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": true}], "count": 45}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "What does the transport equation $$I = nqvA$$ tell us, and what does each symbol represent (with SI units)?", "answer": "The transport equation links the macroscopic current flowing through a conductor to the microscopic behaviour of the charge carriers inside it.\n- $$I$$ = electric current, in amperes ($$\\text{A}$$, equivalent to $$\\text{C/s}$$)\n- $$n$$ = number density of charge carriers, i.e. how many mobile carriers exist per cubic metre of material, in $$\\text{m}^{-3}$$\n- $$q$$ = charge on each carrier, in coulombs ($$\\text{C}$$); for electrons, $$q = 1.60 \\times 10^{-19}\\,\\text{C}$$\n- $$v$$ = drift velocity, the *average* net velocity of carriers along the wire, in $$\\text{m s}^{-1}$$\n- $$A$$ = cross-sectional area of the conductor, in $$\\text{m}^2$$\n\nThe equation says: *the current equals how many carriers there are, how much charge each carries, how fast they drift, and how wide a pipe they flow through.* Strip away any of those factors and the current dies.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "Derive the transport equation $$I = nqvA$$ from first principles using the \"swept volume\" idea. (4 steps)", "answer": "- Step 1: Picture a cylindrical section of wire with cross-sectional area $$A$$. Carriers inside drift along the wire at average drift velocity $$v$$. In a small time $$\\Delta t$$, each carrier moves a distance $$\\Delta x = v\\,\\Delta t$$.\n- Step 2: The volume of wire that flows past any fixed cross-section in that time is the \"swept volume\": $$\\Delta V = A\\,\\Delta x = A v\\,\\Delta t$$. Visually: a thin disc of thickness $$v\\,\\Delta t$$ glued onto the cross-section.\n- Step 3: If there are $$n$$ carriers per cubic metre, the number of carriers inside this swept volume is $$\\Delta N = n\\,\\Delta V = nAv\\,\\Delta t$$. Each carries charge $$q$$, so the total charge crossing the section is $$\\Delta Q = q\\,\\Delta N = nqvA\\,\\Delta t$$.\n- Step 4: Current is charge per unit time: $$I = \\dfrac{\\Delta Q}{\\Delta t} = nqvA$$.\n\nThe key insight is that *current is just a counting exercise* — count the carriers in a swept slab and divide by the time it took them to sweep it.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "In a metal with no battery connected, the wire is \"full of electrons\" moving at thermal speeds of about $$10^6\\,\\text{m s}^{-1}$$. Why is there no current, and why doesn't touching the wire give you a shock? (3 steps)", "answer": "- Step 1: Without an applied potential difference, there is no electric field along the wire. The free electrons still move — and very fast — but their velocity vectors point in all directions essentially at random.\n- Step 2: When you sum a huge number of random velocities, the components cancel: the *average* velocity is zero. Since current depends on the *net* drift $$v$$ (not the random speed), $$I = nqvA = 0$$.\n- Step 3: With no net flow of charge, no charge accumulates on you and no energy is delivered, so you feel nothing.\n\nTakeaway: thermal motion gives speed but no direction; only a p.d. creates the tiny *directed* drift that we measure as current.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": true}, {"question": "Distinguish between the *random thermal speed* of free electrons in a metal and their *drift velocity*. Roughly how do their magnitudes compare? (3 steps)", "answer": "- Step 1: Thermal speed is the chaotic, undirected motion electrons have at any temperature above absolute zero. In a metal at room temperature it is roughly $$10^6\\,\\text{m s}^{-1}$$ — close to a thousandth of the speed of light.\n- Step 2: Drift velocity is the tiny *net* component superimposed on the thermal motion when an electric field is applied. It is what determines the current. In a typical copper wire it is around $$10^{-4}\\,\\text{m s}^{-1}$$ — fractions of a millimetre per second.\n- Step 3: The thermal speed is therefore roughly $$10^{10}$$ times larger than the drift speed. Picture a swarm of bees jittering wildly inside a slow-moving cloud: the jitter is thermal motion; the cloud's slow translation is the drift.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": true}, {"question": "Why do free electrons in a wire reach a *constant* drift velocity rather than accelerating indefinitely once a p.d. is applied? (3 steps)", "answer": "- Step 1: The applied electric field exerts a constant force $$F = eE$$ on each electron. By Newton's second law, in vacuum this would produce continuous acceleration.\n- Step 2: But a metal is not vacuum — it is a regular lattice of positive ions. Electrons collide repeatedly with these ions, transferring energy and effectively being \"reset\" in direction. Each collision opposes the field-driven motion.\n- Step 3: A steady state emerges where the average force from collisions balances the field force. The average velocity (the drift velocity) then becomes constant, giving a steady current. The transferred energy heats the lattice — this is why resistors get hot.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "A lamp turns on apparently instantly when you flick the switch, yet a single electron may take many hours to travel from the switch to the lamp. Explain this paradox. (3 steps)", "answer": "- Step 1: Two very different speeds are involved. The *drift velocity* of individual electrons is tiny — sub-millimetre per second. But the *electric field* that pushes them propagates along the wire at nearly $$c \\approx 3 \\times 10^8\\,\\text{m s}^{-1}$$.\n- Step 2: As soon as the switch closes, the field is established along the entire wire within nanoseconds. Every electron in the wire — including those already sitting next to the filament — begins drifting almost simultaneously.\n- Step 3: The marble-tube analogy makes this exact: imagine a tube packed end-to-end with marbles. Push one marble in and a marble pops out the far end immediately, even though no individual marble moved far. In a wire, the carriers already next to the filament start delivering energy at once, so it lights up while distant electrons have barely moved.\n\nThe current is not the journey of one electron — it is the simultaneous shuffle of an enormous population.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "In a series circuit, a thin tungsten filament is joined to a thick copper lead. The same current flows through both. Without doing any calculation, in which section is the drift velocity larger, and why? (3 steps)", "answer": "- Step 1: Rearranging $$I = nqvA$$ gives $$v = \\dfrac{I}{nqA}$$. With $$I$$ fixed and $$q$$ identical (both carry electrons), $$v$$ depends on $$n$$ and $$A$$.\n- Step 2: The filament has both a smaller cross-section ($$A$$ tiny) *and* a smaller carrier density than copper ($$n_W \\approx 4 \\times 10^{28}$$ vs $$n_{Cu} \\approx 8 \\times 10^{28}\\,\\text{m}^{-3}$$). Both factors push $$v$$ *up* in the filament.\n- Step 3: So the drift velocity in the filament is far larger than in the copper leads — easily a thousandfold. Physically: the same number of carriers per second must squeeze through a much narrower, less-populated pipe, so each must drift much faster.\n\nThis is exactly why filaments get hot enough to glow while connecting wires stay cool — more frantic drifting means more collisions and more heat per unit volume.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": true}, {"question": "Using $$I = nqvA$$, explain why insulators (like glass or rubber) cannot carry a significant current even when a very large voltage is applied.", "answer": "Insulators have essentially no mobile charge carriers — their electrons are tightly bound to atoms and not free to move through the material. So $$n \\approx 0$$. In the transport equation $$I = nqvA$$, if $$n$$ is zero then $$I$$ is zero, *no matter how large* the applied field is, how big the area is, or how fast any stray carrier moves. You cannot pump charge through a material that has none to pump. (At sufficiently extreme voltages the material can *break down* — electrons get ripped from atoms — but in normal use $$n \\approx 0$$ kills the current.)", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "Approximately what is the carrier density $$n$$ for a metal, a semiconductor, and an insulator? Why does $$n$$, rather than $$q$$, distinguish their conductivities? (3 steps)", "answer": "- Step 1: Order-of-magnitude values:\n+ Metals (copper, tungsten): $$n \\sim 10^{28}\\text{–}10^{29}\\,\\text{m}^{-3}$$\n+ Semiconductors (germanium $$\\sim 10^{19}$$, silicon $$\\sim 10^{16}\\text{–}10^{17}\\,\\text{m}^{-3}$$)\n+ Insulators (glass): $$n \\approx 0$$\n- Step 2: The carrier charge $$q$$ is almost always the electron charge $$\\pm e = 1.6 \\times 10^{-19}\\,\\text{C}$$ (or $$\\pm 2e$$ for doubly-ionised ions), so $$q$$ barely varies between materials.\n- Step 3: That leaves $$n$$ as the dominant variable. A metal has roughly $$10^{9}$$ times more free carriers per cubic metre than germanium, and effectively infinitely more than an insulator. This single factor explains the enormous range of electrical conductivities — about $$10^{20}$$ across familiar materials.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "Two semiconductor strips have the same dimensions and carry the same current as a copper strip. Roughly how does the drift velocity in the semiconductor compare to that in the copper, and why? (3 steps)", "answer": "- Step 1: From $$v = I/(nqA)$$, with $$I$$, $$q$$, and $$A$$ fixed, drift velocity is inversely proportional to $$n$$: $$v \\propto 1/n$$.\n- Step 2: A semiconductor has roughly $$10^{9}$$ times fewer carriers per cubic metre than a metal. Therefore each carrier must drift roughly $$10^9$$ times *faster* to push the same total charge per second through the same area.\n- Step 3: So while a typical metal drift is $$\\sim 10^{-4}\\,\\text{m s}^{-1}$$, the semiconductor drift can easily reach $$\\sim 10^{-1}\\,\\text{m s}^{-1}$$ — fast enough that you could practically time it. Counterintuitive but correct: in the worse conductor, the few carriers it does have move *faster*.\n\nThe lesson: fewer workers means each must work harder.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": true}, {"question": "Why does heating a semiconductor (like silicon) decrease its resistance, while heating a metal increases it? Frame the answer in terms of $$n$$ and the collision picture. (3 steps)", "answer": "- Step 1: In a semiconductor, almost all electrons start out bound. Adding thermal energy frees more electrons into the conduction band, so $$n$$ rises sharply with temperature. More carriers → lower resistance.\n- Step 2: In a metal, $$n$$ is already enormous and roughly fixed — every atom contributed its free electron long ago. Heating doesn't significantly increase $$n$$.\n- Step 3: But heating *does* make the lattice ions vibrate more vigorously, so free electrons collide with them more often. More scattering means more opposition, so resistance rises.\n\nThe two materials respond oppositely because *which factor dominates* differs: $$n$$ growth wins in semiconductors; collision rate growth wins in metals.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": true}, {"question": "A wire is connected in series with another wire of *half* the cross-sectional area but the same material. The current $$I$$ is the same everywhere. How does the drift velocity change when the carriers enter the thinner wire? (3 steps)", "answer": "- Step 1: Same current $$I$$, same material (so same $$n$$ and $$q$$). From $$v = I/(nqA)$$, drift velocity is inversely proportional to area: $$v \\propto 1/A$$.\n- Step 2: Halving $$A$$ doubles $$v$$. The carriers must drift *twice as fast* in the narrow section to deliver the same charge per second through a smaller cross-section.\n- Step 3: This is the same reason water speeds up where a pipe narrows, or where you put your thumb over a tap. Continuity of flow forces the velocity up when the channel shrinks.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "A copper cylinder has section X with diameter $$d$$ and section Y with diameter $$2d$$, carrying the same current. What is the ratio $$v_X : v_Y$$ of drift velocities? (3 steps)", "answer": "- Step 1: Cross-sectional area scales as the square of the diameter: $$A \\propto d^2$$. So $$A_Y = 4 A_X$$.\n- Step 2: With the same material and same current, $$v \\propto 1/A$$. Therefore $$\\dfrac{v_X}{v_Y} = \\dfrac{A_Y}{A_X} = 4$$.\n- Step 3: The ratio is $$v_X : v_Y = 4 : 1$$ — the thinner section has four times the drift velocity, despite only half the diameter, because area depends on diameter squared.\n\nA common trap: students halve the velocity instead of quadrupling it. Always remember to square the diameter ratio.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "A student writes \"$$1\\,\\text{mm}^2 = 1 \\times 10^{-3}\\,\\text{m}^2$$\". What is wrong, and what is the correct conversion? (3 steps)", "answer": "- Step 1: The student converted millimetres to metres once and forgot the area involves *two* length factors. $$1\\,\\text{mm} = 10^{-3}\\,\\text{m}$$, but $$\\text{mm}^2$$ is mm × mm, so both factors must be squared.\n- Step 2: Correct conversion: $$1\\,\\text{mm}^2 = (10^{-3}\\,\\text{m})^2 = 10^{-6}\\,\\text{m}^2$$.\n- Step 3: The student's value is off by a factor of $$10^3$$. Substituting it into $$v = I/(nqA)$$ would underestimate $$v$$ by a factor of 1000. Always square the prefix when converting squared units (and cube for volumes: $$1\\,\\text{mm}^3 = 10^{-9}\\,\\text{m}^3$$).", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": true}, {"question": "In a lesson, a student wrote \"$$\\mu\\text{A} = 10^{-3}$$\". What is the error, and what is the correct prefix value? (2 steps)", "answer": "- Step 1: The student confused micro ($$\\mu$$) with milli ($$\\text{m}$$). Milli is $$10^{-3}$$ (three zeros after the decimal point). Micro is $$10^{-6}$$ (six zeros).\n- Step 2: So $$1\\,\\mu\\text{A} = 1 \\times 10^{-6}\\,\\text{A}$$, not $$10^{-3}\\,\\text{A}$$. The student's value is one thousand times too large. In any calculation it would produce a number a factor of 1000 off — fatal in an exam.\n\nA safe habit: write the prefix-to-power table on the side of the page at the start of every paper.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "A copper wire of cross-section $$1\\,\\text{mm}^2$$ carries 10 A. With $$n \\approx 10^{29}\\,\\text{m}^{-3}$$ and $$q = 1.6 \\times 10^{-19}\\,\\text{C}$$, qualitatively estimate the drift velocity (in mm/s). Don't calculate — reason it. (3 steps)", "answer": "- Step 1: Rearrange: $$v = I/(nqA)$$. Plug in orders of magnitude: numerator is $$10^1$$; denominator is $$10^{29} \\times 10^{-19} \\times 10^{-6} = 10^{4}$$.\n- Step 2: So $$v \\sim 10^{1}/10^{4} = 10^{-3}\\,\\text{m s}^{-1}$$.\n- Step 3: That is about $$1\\,\\text{mm s}^{-1}$$. The numerical answer would be around $$0.6\\,\\text{mm s}^{-1}$$, but the key takeaway is the *order of magnitude*: a substantial 10 A current in a normal household-sized wire corresponds to a drift velocity below a millimetre per second. Slower than a snail.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": true}, {"question": "Why is conventional current direction opposite to the actual flow of electrons in a metal wire? (3 steps)", "answer": "- Step 1: Conventional current was defined (before the electron was discovered) as the direction in which *positive* charges would move under an applied electric field — from the positive terminal of a battery, through the external circuit, back to the negative terminal.\n- Step 2: In a metal, the actual charge carriers are electrons, which are negative. They are pushed by the field toward the *positive* terminal, i.e. opposite to where positive charges would go.\n- Step 3: When the convention was kept for backward compatibility, electron flow ended up moving \"the wrong way\" — but the physics is fine: a negative charge moving one way carries the same current as a positive charge moving the opposite way. The minus sign is absorbed into the convention.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "Why does the order of factors in $$I = nqvA$$ not matter, but the correct *value* of each factor (especially $$n$$ and $$A$$) is critical for getting the right answer? (3 steps)", "answer": "- Step 1: Multiplication is commutative — writing $$I = nAvq$$, $$I = nqvA$$, or $$I = qvAn$$ gives identical numerical results. The mnemonic order (e.g. \"naughty quirky vampires Ate\") is purely for memory.\n- Step 2: What *does* matter is using each quantity in SI base units with the correct magnitude. The factors span enormous ranges: $$n$$ can vary by $$10^{20}$$ between materials, while $$A$$ is typically squared from a small diameter — easy to get wrong by $$10^6$$.\n- Step 3: A factor-of-1000 slip in $$A$$ (mm² to m²) or a prefix slip in $$n$$ propagates linearly into $$v$$. Always: convert units first, substitute second, never mix prefixes mid-equation.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": true}, {"question": "A semiconductor strip 6 mm wide and 0.5 mm thick carries 10 mA, with $$n = 7 \\times 10^{22}\\,\\text{m}^{-3}$$. Without doing the full arithmetic, explain conceptually how to find the drift speed and roughly what magnitude you should expect. (3 steps)", "answer": "- Step 1: Identify $$A$$. The strip's cross-section is rectangular: $$A = \\text{width} \\times \\text{thickness} = 6\\,\\text{mm} \\times 0.5\\,\\text{mm} = 3\\,\\text{mm}^2 = 3 \\times 10^{-6}\\,\\text{m}^2$$.\n- Step 2: Rearrange the transport equation: $$v = I/(nqA)$$. Plug in orders of magnitude: numerator $$\\sim 10^{-2}$$; denominator $$\\sim 10^{22} \\times 10^{-19} \\times 10^{-6} = 10^{-3}$$.\n- Step 3: So $$v \\sim 10^{-2}/10^{-3} = 10^{1}\\,\\text{m s}^{-1}$$ — actually about $$0.3\\,\\text{m s}^{-1}$$ after the precise numbers. The point: semiconductors have drift velocities thousands of times larger than metals, because their tiny $$n$$ forces each carrier to work much harder.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "In the transport equation $$I = nqvA$$, what does a *negative* value of $$v$$ physically indicate, and is the current itself negative? (2 steps)", "answer": "- Step 1: A negative $$v$$ means the carriers are drifting *opposite* to the chosen positive direction along the wire. For electrons in a typical metal, that is the standard situation: the conventional current direction is one way, but the electrons drift the other.\n- Step 2: The current $$I$$ in the formula carries the sign of the product $$qv$$. For electrons, $$q$$ is negative and $$v$$ is negative (relative to conventional current direction), so the product is positive — giving a positive current in the conventional sense. The sign-mismatch is the whole point of why conventional current still \"works\".", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "A 9 V battery drives 0.25 A through a 3 m length of copper wire of area $$0.5\\,\\text{mm}^2$$ ($$n = 8.5 \\times 10^{28}\\,\\text{m}^{-3}$$). Conceptually, why does an individual electron take nearly a *day* to traverse the wire while the lamp lights up almost immediately? (3 steps)", "answer": "- Step 1: The drift velocity comes from $$v = I/(nqA)$$. Numerator $$\\sim 10^{-1}$$; denominator $$\\sim 10^{28} \\times 10^{-19} \\times 10^{-7} = 10^{2}$$. So $$v \\sim 10^{-3}\\text{ to }10^{-5}\\,\\text{m s}^{-1}$$ — roughly $$3 \\times 10^{-5}\\,\\text{m s}^{-1}$$.\n- Step 2: Travel time for one electron over 3 m: $$t = L/v \\sim 3 / (3 \\times 10^{-5}) = 10^5\\,\\text{s}$$, about a day.\n- Step 3: But the *field* spreads along the wire at $$\\sim c$$, taking $$t = L/c \\sim 10^{-8}\\,\\text{s}$$ — ten nanoseconds. Every electron in the wire (including those already at the lamp) starts drifting at once, so the filament receives charge immediately. The lamp lights from the electrons that were *already there*, not the ones that just left the switch.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "When given a wire diameter rather than its cross-sectional area, what computation must you do, and what's a common mistake? (2 steps)", "answer": "- Step 1: For a circular wire, $$A = \\pi r^2 = \\pi (d/2)^2 = \\pi d^2/4$$. You must convert diameter to radius (halve it) *and* square the result.\n- Step 2: Common mistake: students plug the diameter directly into $$A = \\pi d^2$$, forgetting the factor of $$1/4$$, or they forget to halve and use $$\\pi d^2 / 4$$ with $$d$$ already as a radius. Both errors give an area off by a factor of 4. Also, always convert $$d$$ from mm to m *before* squaring, or you'll be off by $$10^6$$.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "A wire of cross-section 1 mm² carries 10 A in a metal where $$n \\approx 10^{29}\\,\\text{m}^{-3}$$. Without computing exactly, explain why the same wire carrying 10 mA would have its drift velocity reduced by a factor of 1000.", "answer": "From $$v = I/(nqA)$$, with $$n$$, $$q$$, and $$A$$ all unchanged, the drift velocity is directly proportional to the current: $$v \\propto I$$. Reducing the current from 10 A to 10 mA is a thousandfold decrease in $$I$$, so $$v$$ drops by the same factor of 1000. The number of carriers in the wire is fixed; you are simply asking each one to shuffle more slowly to deliver less charge per second.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "Why are the charge carriers in metals specifically the *outer*, \"free\" electrons rather than the tightly bound inner electrons or the ions themselves? (3 steps)", "answer": "- Step 1: In a metallic crystal, each atom contributes one (or a few) loosely-bound outer-shell electrons to a shared \"sea\" of delocalised electrons that belong to the lattice as a whole, not to any individual atom. These are the mobile carriers.\n- Step 2: Inner electrons are deeply bound to their nuclei by strong electrostatic attraction — too tightly bound to detach and drift under any practical applied field. They stay put with the parent atom.\n- Step 3: The positive ions themselves form a fixed crystal lattice. They can vibrate around their equilibrium positions (giving rise to thermal conductivity and lattice heating) but cannot migrate, so they do not contribute to electrical current in a solid metal. In *electrolytes* and *gases*, however, ions *do* move and become the charge carriers — a key contrast.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "A student claims \"a resistor stores electrons inside it, that's why it resists current.\" Why is this wrong, and what actually happens inside a resistor? (3 steps)", "answer": "- Step 1: Charge is conserved: in a steady state, the same number of electrons per second that enter one end of a resistor must leave the other. Nothing is stored. The current $$I$$ through every cross-section is the same by continuity.\n- Step 2: What the resistor *does* is convert electrical potential energy into heat. As electrons drift through, they collide with the lattice ions, transferring kinetic energy that ends up as lattice vibrations (heat). The applied p.d. is what restores their energy.\n- Step 3: So resistance is not about storing carriers — it's about *the rate at which carriers lose energy to the lattice while drifting*. Higher resistance = more frequent or more energetic collisions per unit length.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "Apply the transport equation conceptually: a copper wire (1 mm², n ≈ 6 × 10²⁸ m⁻³) is carrying current with drift velocity 1 mm/s. Roughly what is the current — single amps, tens of amps, or much smaller? Reason without calculator. (3 steps)", "answer": "- Step 1: Substitute orders of magnitude into $$I = nqvA$$: $$n \\sim 10^{29}$$, $$q \\sim 10^{-19}$$, $$v \\sim 10^{-3}$$, $$A \\sim 10^{-6}$$.\n- Step 2: Multiply the exponents: $$10^{29} \\times 10^{-19} \\times 10^{-3} \\times 10^{-6} = 10^{29-19-3-6} = 10^{1}$$. The leading coefficients ($$6 \\times 1.6 \\times 1 \\times 1 \\approx 10$$) keep the result around $$10^{1}$$.\n- Step 3: So the current is around $$10\\,\\text{A}$$ — single-to-tens of amps. This matches the typical \"household wire\" current capacity. A \"1 mm/s drift\" is therefore not vanishingly small at the macroscopic level — it represents a substantial current because of the colossal number of carriers.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "Two wires of the same length and material but different diameters are connected in *parallel* between the same two terminals. Does the *drift velocity* differ between them? (3 steps)", "answer": "- Step 1: In parallel, each wire sees the same potential difference, but they do *not* necessarily carry the same current. Current splits between branches by Ohm's law — the thicker wire (lower resistance) carries more current.\n- Step 2: The drift velocity in each is $$v = I_{\\text{branch}}/(nqA)$$. Both $$I$$ and $$A$$ differ between the branches.\n- Step 3: For wires of the same material and same length, you can show $$I \\propto A$$ (since $$R = \\rho L / A$$). So $$v = I/(nqA) \\propto A/A = $$ constant. The drift velocity is *the same* in both parallel branches — because the larger current in the thick wire is exactly proportional to its larger area. (Contrast with series, where $$I$$ is the same and $$v \\propto 1/A$$.)\n\nThis is a great example of why series-vs-parallel reasoning differs even when the formula is the same.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": true}, {"question": "Why is the marble-tube analogy \"exact\" for explaining the instant lighting of a lamp, while the \"domino chain\" analogy is sometimes considered weaker? (3 steps)", "answer": "- Step 1: In the marble-tube picture, the tube is *already full of marbles* before you push. The marble at the far end pops out almost immediately, even though each marble barely moved. This mirrors a wire that is *already filled with electrons* at all times — the carriers don't need to travel from the battery to the lamp.\n- Step 2: A domino chain emphasises the propagation of a *disturbance*, but each domino only moves once and then stops. In a wire, the electrons keep drifting continuously as long as the field is applied, just as marbles keep emerging continuously as long as you keep pushing. The marble model captures both the speed-of-field propagation *and* the steady-state current.\n- Step 3: The marble-tube also makes vivid that *no specific carrier needs to travel the whole distance* — what propagates fast is the field, while individual carriers shuffle locally. This is the central, often-missed point.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": true}, {"question": "A student uses the formula $$R = IV$$ to compute resistance from a measured current and voltage. Why is this wrong, and what is the correct relationship? (2 steps)", "answer": "- Step 1: Ohm's law states $$V = IR$$. Rearranged for resistance, this gives $$R = V/I$$, not $$R = IV$$. The product $$IV$$ is the *power* dissipated in the resistor.\n- Step 2: Dimensionally: $$R = V/I$$ has units $$\\text{V/A} = \\Omega$$ (correct). But $$IV$$ has units $$\\text{A} \\times \\text{V} = \\text{W}$$ (watts, power). So multiplying current and voltage gives the rate of energy dissipation, while dividing voltage by current gives the opposition to current — two completely different quantities.\n\nA useful check: any time you compute a resistance, the answer's *unit* should be ohms.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "The number density of copper is sometimes quoted as $$n \\approx 8.5 \\times 10^{28}\\,\\text{m}^{-3}$$. If a question instead quotes $$n$$ in $$\\text{mm}^{-3}$$, how do you convert, and what is the trap? (3 steps)", "answer": "- Step 1: Number density has units of \"carriers per unit volume\". One $$\\text{m}^3 = (10^3\\,\\text{mm})^3 = 10^9\\,\\text{mm}^3$$, so $$1\\,\\text{mm}^{-3} = 10^9\\,\\text{m}^{-3}$$.\n- Step 2: If a question says \"$$n = 8.5 \\times 10^{19}$$ per mm³\", that converts to $$8.5 \\times 10^{19} \\times 10^9 = 8.5 \\times 10^{28}\\,\\text{m}^{-3}$$. The trap is forgetting that volumes cube the length prefix — students often multiply by $$10^3$$ instead of $$10^9$$.\n- Step 3: Always check by sanity: copper has $$\\sim 10^{29}\\,\\text{m}^{-3}$$ free electrons. If your converted value is wildly off this benchmark, you've botched the conversion.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "Why are the equations describing fluid flow in pipes (continuity equation $$A_1 v_1 = A_2 v_2$$) structurally identical to the constraint $$v \\propto 1/A$$ for current in a series wire? (3 steps)", "answer": "- Step 1: Both involve a *conserved quantity flowing through a varying cross-section*. For water, mass per second must be the same at every point (no water accumulates). For current, charge per second (= $$I$$) must be the same throughout a series loop (no charge accumulates either).\n- Step 2: For an incompressible fluid, mass flow rate = $$\\rho A v$$. If $$\\rho$$ is constant, then $$A v$$ is constant. For a wire with uniform material, $$I = nqAv$$. If $$n$$ and $$q$$ are constant, then $$Av$$ is constant.\n- Step 3: So both reduce to \"throughput $$\\propto Av$$, and throughput is fixed\". Narrower channel forces faster flow in both cases. The physics is fundamentally about conservation of carriers (or molecules) per unit time — the formulas just relabel the players.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": true}, {"question": "A learner writes their final drift-velocity answer as \"$$v = 40 \\times 10^{-3}\\,\\text{m s}^{-1}$$\", meaning 40 mm/s. What is potentially confusing about this notation, and how should it be stated for clarity? (2 steps)", "answer": "- Step 1: The expression \"$$40 \\times 10^{-3}\\,\\text{m s}^{-1}$$\" is mathematically equal to $$0.040\\,\\text{m s}^{-1}$$, which equals $$40\\,\\text{mm s}^{-1}$$. The notation isn't *wrong* per se, but it mixes a milli prefix into a coefficient, which invites confusion with the \"40 mA\" style.\n- Step 2: For clarity, choose one convention: either give a clean SI value ($$0.040\\,\\text{m s}^{-1}$$) or use a prefix attached to the unit ($$40\\,\\text{mm s}^{-1}$$). Never write \"$$40\\,\\text{m}^{-3}\\,\\text{m s}^{-1}$$\" by accident or leave ambiguity. Examiners want one unambiguous answer with explicit units.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "In a circuit diagram, conventional current flows clockwise from the positive terminal of the battery. Which way do electrons drift, and which way does the *electric field* point inside the wire? (3 steps)", "answer": "- Step 1: Conventional current flows from + to − externally — say, clockwise. Electrons (negative carriers) drift in the *opposite* direction — anti-clockwise — back toward the positive terminal.\n- Step 2: The electric field inside the wire points in the direction of *conventional* current flow (i.e. clockwise). This is because the field, by definition, points from high to low potential, which means from the + terminal toward the − terminal through the external circuit.\n- Step 3: The force on an electron is $$F = qE$$ with $$q < 0$$, so the force is opposite to $$E$$ — it pushes electrons backward against the field direction, which is exactly the anti-clockwise drift direction. So field, conventional current, and electron flow have a consistent (if backwards-looking) sign relationship.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "Simple exercise: A wire carries 2 A. How many electrons pass a cross-section per second? (Use $$e = 1.6 \\times 10^{-19}\\,\\text{C}$$.) Reason without a calculator. (3 steps)", "answer": "- Step 1: Current is charge per second: $$I = \\Delta Q/\\Delta t$$. In 1 second, 2 C of charge passes any cross-section.\n- Step 2: Number of electrons = total charge ÷ charge per electron = $$2/(1.6 \\times 10^{-19})$$.\n- Step 3: $$2/1.6 = 1.25$$, and the power of ten is $$10^{19}$$. So roughly $$1.25 \\times 10^{19}$$ electrons per second cross any point. That is the staggering carrier flux you need to keep in mind: even small currents involve quintillions of electrons per second.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "Simple exercise: A copper wire of 0.5 mm² area carries a current that gives drift velocity 0.1 mm/s. If we replace the copper with a wire of identical geometry made of a *different metal with half the carrier density*, what is the new drift velocity for the same current? (3 steps)", "answer": "- Step 1: From $$v = I/(nqA)$$, with $$I$$, $$q$$, and $$A$$ all unchanged, $$v$$ is inversely proportional to $$n$$: $$v \\propto 1/n$$.\n- Step 2: Halving $$n$$ doubles $$v$$.\n- Step 3: So the new drift velocity is $$0.2\\,\\text{mm s}^{-1}$$. The intuition: the wire now has half as many carriers available to push the same current through, so each must drift twice as fast to compensate.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "Simple exercise: A wire of diameter 1 mm tapers smoothly to a section of diameter 0.5 mm. The current entering the thick end is 0.5 A. What is the current in the thin section? What changes between the two sections? (3 steps)", "answer": "- Step 1: By conservation of charge in a series segment (no branches), the current is *identical* throughout — $$I = 0.5\\,\\text{A}$$ in both sections. Charge doesn't pile up or disappear.\n- Step 2: What changes is the drift velocity. Area scales as $$d^2$$, so $$A_{\\text{thin}}/A_{\\text{thick}} = (0.5/1)^2 = 1/4$$. Since $$v \\propto 1/A$$ at fixed $$I$$ and same material, $$v_{\\text{thin}} = 4 v_{\\text{thick}}$$.\n- Step 3: So the carriers drift four times faster in the narrow section, even though the current is unchanged. The same flux of charge per second is squeezed through a quarter of the area.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "Simple exercise: A copper wire has $$n = 10^{29}\\,\\text{m}^{-3}$$. To carry 10 A in a 1 mm² wire, the drift velocity is roughly 0.6 mm/s. If we instead use a wire of *the same area* made of silicon with $$n \\sim 10^{17}\\,\\text{m}^{-3}$$, roughly how would the drift velocity differ for the same 10 A? (3 steps)", "answer": "- Step 1: From $$v \\propto 1/n$$, replacing copper ($$10^{29}$$) with silicon ($$10^{17}$$) decreases $$n$$ by a factor of $$10^{12}$$.\n- Step 2: So the drift velocity must *increase* by a factor of $$10^{12}$$ to compensate. Starting from $$0.6\\,\\text{mm s}^{-1} = 6 \\times 10^{-4}\\,\\text{m s}^{-1}$$, we'd get $$\\sim 6 \\times 10^8\\,\\text{m s}^{-1}$$.\n- Step 3: This is *faster than the speed of light* — physically impossible. The correct conclusion is that silicon simply *cannot* carry 10 A through a 1 mm² cross-section at room temperature. It would either need to be heated to vastly increase $$n$$, or the cross-section would need to be enormous, or a much smaller current attempted. This is why insulators and pure semiconductors are poor at carrying large currents.\n\nA wonderful illustration of how the transport equation reveals physical impossibility.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "Why does heating a tungsten filament increase $$n$$ only slightly but increase the *resistance* of the filament substantially? (3 steps)", "answer": "- Step 1: Tungsten is a metal, so essentially all its outer electrons are already delocalised at room temperature. Heating frees barely any *additional* electrons — $$n$$ stays nearly constant.\n- Step 2: Heating,
