k": false}, {"question": "Inside a piece of copper wire with no battery connected, are the free electrons stationary? If not, why is there no current? (2 steps)", "answer": "- Step 1: The electrons are not stationary; they move with very fast random thermal motion (speeds around $$10^6 \\text{ m/s}$$). \n- Step 2: Because this motion is completely random, the movement of electrons in one direction is exactly cancelled out by electrons moving in the opposite direction. The net flow is zero, so there is no current. This is why touching an isolated wire gives you no shock.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "When a potential difference is applied across a metal, two types of motion combine. What are they, and which one results in the current? (3 steps)", "answer": "- Step 1: The first motion is the fast random thermal motion of the electrons ($$\\sim 10^6 \\text{ m/s}$$), which is disordered and cancels out over the bulk of the material.\n- Step 2: The second motion is a tiny net drift superimposed by the electric field ($$F = qE$$). This drift is extremely slow ($$\\sim 10^{-4} \\text{ m/s}$$).\n- Step 3: The current is caused entirely by the slow, directed drift velocity, not the fast random motion. The random motion does not contribute to the net flow of charge.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "If the electric field exerts a constant force on the free electrons, why don't they accelerate indefinitely to very high speeds? (2 steps)", "answer": "- Step 1: The electrons constantly collide with the fixed positive ion lattice of the metal. \n- Step 2: These collisions provide an opposing force that cancels the accelerating force from the electric field. As a result, the electrons reach a constant average \"terminal\" drift velocity instead of accelerating indefinitely, much like a skydiver reaching terminal velocity due to air resistance.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "In the derivation of $$I = nqvA$$, consider a time interval $$\\Delta t$$. What is the physical meaning of the term $$A \\times v \\times \\Delta t$$? (2 steps)", "answer": "- Step 1: In time $$\\Delta t$$, a charge carrier drifting at velocity $$v$$ travels a distance $$\\Delta x = v \\Delta t$$ along the wire.\n- Step 2: The volume of wire \"swept\" past a reference cross-section in this time is the cross-sectional area times this distance: $$\\Delta V = A \\Delta x = A v \\Delta t$$. It represents the exact volume containing all the carriers that will successfully cross the section in that time window.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "Continuing the derivation of $$I = nqvA$$: if the swept volume is $$A v \\Delta t$$, how do you find the total current $$I$$? (3 steps)", "answer": "- Step 1: Find the number of carriers in the swept volume by multiplying by the number density: $$\\Delta N = n \\times \\Delta V = n (A v \\Delta t)$$.\n- Step 2: Find the total charge by multiplying the number of carriers by the charge per carrier: $$\\Delta Q = q \\times \\Delta N = q (n A v \\Delta t) = n q v A \\Delta t$$.\n- Step 3: Current is charge per unit time, so divide by $$\\Delta t$$: $$I = \\frac{\\Delta Q}{\\Delta t} = \\frac{n q v A \\Delta t}{\\Delta t} = n q v A$$.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "The drift velocity of electrons in a typical wire is less than a millimetre per second. Explain why a lamp turns on almost instantly when the switch is closed. (3 steps)", "answer": "- Step 1: The electrons themselves drift very slowly, but the electric field that pushes them propagates along the wire at close to the speed of light ($$c \\approx 3 \\times 10^8 \\text{ m/s}$$).\n- Step 2: When the switch is closed, this electric field establishes itself across the entire circuit almost instantaneously (within nanoseconds for a typical room-scale circuit).\n- Step 3: All electrons in the wire begin to drift simultaneously. The effect (current) is felt at the lamp immediately, even though individual electrons have barely moved from their starting positions.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "Use the \"marble-tube\" analogy to explain the \"instant-on\" paradox. What corresponds to the electric field, and what corresponds to the current? (2 steps)", "answer": "- Step 1: Imagine a tube completely filled with marbles. If you push one marble in at one end, a marble pops out the other end immediately. The push (a pressure wave) corresponds to the electric field propagating at near-light-speed.\n- Step 2: The marble exiting the other end corresponds to the current (the immediate effect). The slow shifting of all the marbles inside the tube corresponds to the slow drift velocity of the electrons.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "A light bulb has a very thin tungsten filament and thick copper connecting leads. The same current flows through both. Which part has a higher drift velocity, and why? (3 steps)", "answer": "- Step 1: In a series circuit, current $$I$$ is the same everywhere (conservation of charge).\n- Step 2: Rearranging the transport equation gives $$v = \\frac{I}{nqA}$$. Since $$I$$, $$n$$, and $$q$$ are roughly similar or constant for the comparison, $$v \\propto \\frac{1}{A}$$.\n- Step 3: The filament has a much smaller cross-sectional area $$A$$, so the electrons must drift much faster there to carry the same current. Thus, the thin filament has the higher drift velocity.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "Wire X has diameter $$d$$, and Wire Y has diameter $$2d$$. They are made of the same material and carry the same current. What is the ratio of their drift velocities $$v_X : v_Y$$? (3 steps)", "answer": "- Step 1: Since $$v = \\frac{I}{nqA}$$ and $$I, n, q$$ are the same for both wires, the ratio of drift velocities is inversely proportional to the ratio of areas: $$\\frac{v_X}{v_Y} = \\frac{A_Y}{A_X}$$.\n- Step 2: Calculate the areas: $$A_X = \\pi(d/2)^2$$ and $$A_Y = \\pi(2d/2)^2 = \\pi d^2$$. Notice that $$A_Y = 4 A_X$$.\n- Step 3: Substitute back: $$\\frac{v_X}{v_Y} = \\frac{4A_X}{A_X} = 4$$. The ratio is 4 : 1. Halving the diameter (by a factor of 2) reduces the area by a factor of 4, so the drift velocity must increase by a factor of 4.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "Copper (a metal) has $$n \\approx 10^{28} \\text{ m}^{-3}$$, while silicon (a semiconductor) has $$n \\approx 10^{16} \\text{ m}^{-3}$$. For wires of the same size carrying the same current, how do their drift velocities compare qualitatively? (2 steps)", "answer": "- Step 1: From $$v = \\frac{I}{nqA}$$, drift velocity is inversely proportional to number density $$n$$ (assuming same $$I, q, A$$).\n- Step 2: Silicon has roughly $$10^{12}$$ times fewer charge carriers per unit volume. The few available carriers must therefore drift roughly $$10^{12}$$ times faster to carry the same current. Semiconductors have vastly higher drift velocities than metals for the same current.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "Using the transport equation $$I = nqvA$$, explain why insulators (like glass) carry virtually no current even when a large voltage is applied. (2 steps)", "answer": "- Step 1: For an insulator, the number density of free charge carriers $$n$$ is effectively zero (or extremely close to it). There are no delocalised electrons available to move.\n- Step 2: Since $$I = nqvA$$, if $$n \\approx 0$$, then $$I \\approx 0$$ regardless of the values of $$v$$ or $$A$$. You cannot have a current if there are no mobile charge carriers to carry it.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "When a semiconductor is heated, its resistance decreases. Explain this using the concept of number density $$n$$. (2 steps)", "answer": "- Step 1: In a semiconductor, heating provides thermal energy that frees more electrons from their atoms, dramatically increasing the number density $$n$$ of free charge carriers.\n- Step 2: With more charge carriers available to carry the current, the material conducts better, which means its resistance decreases. This is the opposite of a metal, where increased temperature causes more lattice vibrations and increases resistance.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "Exam trap: A wire has a cross-sectional area of $$2 \\text{ mm}^2$$. Why is it incorrect to substitute this as $$2 \\times 10^{-3} \\text{ m}^2$$, and what is the correct conversion? (2 steps)", "answer": "- Step 1: The mistake is treating $$1 \\text{ mm}^2$$ as a \"milli-square-metre\" ($$10^{-3} \\text{ m}^2$$). However, $$1 \\text{ mm}^2$$ is a square millimetre—a square with sides of $$1 \\text{ mm}$$. You must square the conversion factor for the side length.\n- Step 2: Since $$1 \\text{ mm} = 10^{-3} \\text{ m}$$, then $$1 \\text{ mm}^2 = (10^{-3} \\text{ m})^2 = 10^{-6} \\text{ m}^2$$. Thus, $$2 \\text{ mm}^2 = 2 \\times 10^{-6} \\text{ m}^2$$.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "Exam trap: A student converts 40 µA to Amperes by writing $$40 \\times 10^{-3} \\text{ A}$$. Identify the error and correct it. (2 steps)", "answer": "- Step 1: The student has confused the prefix \"micro\" (µ) with \"milli\" (m). Milli means $$10^{-3}$$, but micro means $$10^{-6}$$ (six zeros, not three).\n- Step 2: The correct conversion is $$40 \\text{ µA} = 40 \\times 10^{-6} \\text{ A} = 4.0 \\times 10^{-5} \\text{ A}$$. Writing it as $$10^{-3}$$ makes the current 1000 times too large, ruining any subsequent calculation.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "If a wire's diameter is given as $$d$$, what is the formula for its cross-sectional area $$A$$ that should be used in the transport equation? (2 steps)", "answer": "- Step 1: The cross-section of a wire is a circle. The radius $$r$$ is half the diameter: $$r = \\frac{d}{2}$$.\n- Step 2: The area of a circle is $$A = \\pi r^2 = \\pi \\left(\\frac{d}{2}\\right)^2 = \\frac{\\pi d^2}{4}$$. Always convert $$d$$ to metres before applying the formula to avoid unit errors.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "Estimate the order of magnitude of the drift velocity for electrons in a typical $$1 \\text{ mm}^2$$ copper wire carrying 10 A. (Given $$n \\sim 10^{29} \\text{ m}^{-3}$$, $$q \\sim 10^{-19} \\text{ C}$$). (3 steps)", "answer": "- Step 1: Use $$v = \\frac{I}{nqA}$$. Substitute the approximate values: $$v \\approx \\frac{10}{10^{29} \\times 10^{-19} \\times 10^{-6}}$$. (Note: $$1 \\text{ mm}^2 = 10^{-6} \\text{ m}^2$$).\n- Step 2: Combine the powers of 10 in the denominator: $$10^{29} \\times 10^{-19} \\times 10^{-6} = 10^{4}$$.\n- Step 3: Calculate the order of magnitude: $$v \\approx \\frac{10}{10^{4}} = 10^{-3} \\text{ m/s}$$. Drift velocities in metals are typically around $$10^{-4}$$ to $$10^{-3} \\text{ m/s}$$, which is slower than a snail.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "A question states the carrier density of copper is $$10^{29}$$ per $$\\text{mm}^3$$. Is this a typical value for $$n$$ in standard SI units? Explain. (2 steps)", "answer": "- Step 1: No, the standard SI unit for number density $$n$$ is per cubic metre ($$\\text{m}^{-3}$$), not per cubic millimetre ($$\\text{mm}^{-3}$$).\n- Step 2: To convert from $$\\text{mm}^{-3}$$ to $$\\text{m}^{-3}$$, you must multiply by $$10^9$$ (since $$1 \\text{ m} = 10^3 \\text{ mm}$$, cubing gives $$1 \\text{ m}^3 = 10^9 \\text{ mm}^3$$). If a material has $$10^{29} \\text{ m}^{-3}$$, that would be $$10^{20} \\text{ mm}^{-3}$$. Always verify the units of $$n$$ in exam questions.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "In a metal wire, electrons drift to the right. In which direction does the conventional current flow, and why? (2 steps)", "answer": "- Step 1: Conventional current is historically defined as the direction in which positive charges would flow.\n- Step 2: Since electrons are negatively charged, their physical drift direction is opposite to the direction of conventional current. If electrons drift right, conventional current flows to the left.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "What is the exact, mark-scheme definition of \"drift velocity\"?", "answer": "Drift velocity is the mean (average) velocity of charge carriers along the conductor due to an applied electric field. It specifically refers to the net directed component of their motion, excluding the fast random thermal motion which cancels out.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "Why does the thin tungsten filament in a bulb develop a large potential difference across it compared to the thick copper leads? (3 steps)", "answer": "- Step 1: To maintain the same current in a series circuit, the thin filament requires a much higher drift velocity ($$v \\propto 1/A$$) compared to the thick leads.\n- Step 2: To accelerate the electrons to this higher drift velocity against frequent lattice collisions, a stronger electric field $$E$$ is needed within the filament.\n- Step 3: A stronger electric field over the length of the filament corresponds to a larger potential difference ($$V = E \\times \\text{length}$$). Thus, nearly all the battery's voltage drops across the filament, causing it to heat up and glow.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": true}, {"question": "If the current in a wire doubles (and all other physical properties of the wire remain the same), what happens to the drift velocity? (2 steps)", "answer": "- Step 1: From the transport equation rearranged, $$v = \\frac{I}{nqA}$$. The properties $$n, q,$$ and $$A$$ are intrinsic or geometric and remain constant.\n- Step 2: Therefore, $$v$$ is directly proportional to $$I$$. If the current $$I$$ doubles, the drift velocity also doubles.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "Misconception probe: A student says \"Resistors store electrons.\" Why is this incorrect, and what do resistors actually do? (2 steps)", "answer": "- Step 1: Resistors do not store electrons; charge is conserved. The number of electrons entering a resistor per second equals the number leaving it (which is why current is constant in series).\n- Step 2: Instead, resistors convert electrical energy into heat. This happens because the drifting electrons collide with the lattice ions, transferring their kinetic energy to the lattice and increasing its thermal vibration.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": true}], "count": 24}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "What are the different types of charge carriers in metals, electrolytes/gases, semiconductors, and insulators? (4 steps)", "answer": "- Step 1: **Metals** → Free electrons (delocalized from metal atoms). One electron per atom on average.  \n- Step 2: **Electrolytes/Gases** → **Ions** (positively/negatively charged atoms/molecules). In electrolytes, ions move in solution; in gases, ions form during ionization.  \n- Step 3: **Semiconductors** → **Electrons and \"holes\"**. Fewer carriers than metals (e.g., silicon has ~10¹⁶–10¹⁷ m⁻³ at room temperature). Heating increases n.  \n- Step 4: **Insulators** → **Negligible free carriers** (n ≈ 0). No mobile charge carriers to sustain current.  \n\n+ Example: Copper (metal) has n ≈ 8 × 10²⁸ m⁻³; glass (insulator) has n ≈ 0.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Derive the transport equation I = nqvA from first principles. (4 steps)", "answer": "- Step 1: **Define variables**:  \n  - n = number density of carriers (m⁻³)  \n  - q = charge per carrier (C)  \n  - v = drift velocity (m/s)  \n  - A = cross-sectional area (m²)  \n\n- Step 2: **Volume swept by carriers in time Δt**:  \n  A carrier moves distance Δx = vΔt. Volume swept: ΔV = AΔx = AvΔt.  \n\n- Step 3: **Total charge in swept volume**:  \n  Number of carriers: ΔN = nΔV = nAvΔt.  \n  Total charge: ΔQ = qΔN = nqAvΔt.  \n\n- Step 4: **Current (ΔQ/Δt)**:  \n  I = ΔQ/Δt = nqvA.  \n\n+ The order of factors (n, q, v, A) doesn’t affect the product.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "Why do lamps light almost instantly despite electrons’ slow drift velocity (~mm/s)? (3 steps)", "answer": "- Step 1: **Electric field propagates at ~c (3 × 10⁸ m/s)**:  \n  The field established by the battery moves through the circuit at near light speed, causing all electrons to drift simultaneously.  \n\n- Step 2: **Marble-tube analogy**:  \n  Pushing one marble into a tube filled with marbles instantly ejects a marble at the far end, even though individual marbles only move slightly.  \n\n- Step 3: **High number density n**:  \n  Copper has n ≈ 8 × 10²⁸ m⁻³. Even with v ~10⁻⁴ m/s, the total charge flow per second (I = nqvA) is large.  \n\n+ Example: A 0.25 A current in a 0.50 mm² copper wire has drift velocity ~3.7 × 10⁻⁵ m/s (takes 22 hours to drift 3 m!), yet the lamp lights in microseconds.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "How does the drift velocity v change in a series circuit when the wire’s cross-sectional area A decreases? Explain using I = nqvA. (3 steps)", "answer": "- Step 1: **Current conservation**:  \n  In a series circuit, I is the same everywhere (Kirchhoff’s current law).  \n\n- Step 2: **Rearrange I = nqvA**:  \n  v = I / (nqA). For fixed I, n, and q: v ∝ 1/A.  \n\n- Step 3: **Conclusion**:  \n  Smaller A ⇒ larger v. A tungsten filament (A ≈ 4.9 × 10⁻¹⁰ m²) has much higher v than thick copper leads (A ≈ 4.07 × 10⁻⁷ m²).  \n\n+ Counterexample: If A halves, v doubles. If A triples, v reduces to 1/3.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "Compare the number density n for metals (e.g., copper), semiconductors (e.g., silicon), and insulators (e.g., glass). How does n affect conductivity? (4 steps)", "answer": "- Step 1: **Metals (e.g., copper)**:  \n  n ≈ 8 × 10²⁸–10²⁹ m⁻³. High n ⇒ excellent conductivity.  \n\n- Step 2: **Semiconductors (e.g., silicon)**:  \n  n ≈ 10¹⁶–10¹⁹ m⁻³. Lower n ⇒ poorer conductivity. Heating increases n (reduces resistance).  \n\n- Step 3: **Insulators (e.g., glass)**:  \n  n ≈ 0. No free carriers ⇒ no current.  \n\n- Step 4: **Effect of n on conductivity**:  \n  Since I = nqvA, higher n allows more current for the same v, q, and A.  \n\n+ Misconception probe: Why don’t semiconductors conduct better when heated?  \n  → Heating increases n, which raises I and lowers resistance (unlike metals).", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "What are the key unit conversions and common traps in drift velocity calculations? (3 steps)", "answer": "- Step 1: **Area conversions**:  \n  1 mm² = (10⁻³ m)² = 10⁻⁶ m².  \n  1 cm² = (10⁻² m)² = 10⁻⁴ m².  \n\n- Step 2: **Prefix confusion**:  \n  micro (µ) = 10⁻⁶ (e.g., 1 µA = 10⁻⁶ A), not 10⁻³.  \n  milli (m) = 10⁻³ (e.g., 1 mm = 10⁻³ m).  \n\n- Step 3: **Number density n**:  \n  n is always in **m⁻³**. If given in mm⁻³, convert:  \n  1 mm⁻³ = (10³ mm/m)³ = 10⁹ m⁻³.  \n\n+ Trap: Using 1 mm² = 10⁻³ m² (incorrect). Correct: 10⁻⁶ m².", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "Why is the drift velocity in a semiconductor (~0.1 m/s) much faster than in a copper wire (~0.1 mm/s) for the same current and geometry? (3 steps)", "answer": "- Step 1: **Rearrange I = nqvA**:  \n  v = I / (nqA). For fixed I, q, and A: v ∝ 1/n.  \n\n- Step 2: **Compare n values**:  \n  Semiconductor (e.g., silicon): n ≈ 10¹⁶–10¹⁹ m⁻³.  \n  Copper: n ≈ 8 × 10²⁸ m⁻³.  \n\n- Step 3: **Magnitude difference**:  \n  Semiconductor n is ~10⁹ times smaller than copper ⇒ v is ~10⁹ times faster.  \n\n+ Example: A 10 mA current in a 6.0 mm × 0.50 mm semiconductor strip (n = 7.0 × 10²² m⁻³) gives v ≈ 0.3 m/s.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "An insulator cannot carry a significant current even with a large potential difference. Use I = nqvA to explain. (2 steps)", "answer": "- Step 1: **n ≈ 0 in insulators**:  \n  No free charge carriers to drift (e.g., glass or rubber).  \n\n- Step 2: **Effect on current**:  \n  I = nqvA. If n = 0 ⇒ I = 0, regardless of v, q, or A.  \n\n+ Edge case: Even with a huge electric field (high V), insulators remain non-conductive.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "A copper wire (n = 8.5 × 10²⁸ m⁻³) has a 0.50 mm² cross-section and carries 0.25 A. Calculate the drift velocity. (3 steps)", "answer": "- Step 1: **Convert A to m²**:  \n  A = 0.50 mm² = 0.50 × 10⁻⁶ m² = 5.0 × 10⁻⁷ m².  \n\n- Step 2: **Use v = I / (nqA)**:  \n  v = 0.25 / (8.5 × 10²⁸ × 1.6 × 10⁻¹⁹ × 5.0 × 10⁻⁷).  \n\n- Step 3: **Calculate**:  \n  v ≈ 3.7 × 10⁻⁵ m/s (~0.037 mm/s).  \n\n+ Key takeaway: Drift velocity is tiny, but the large n ensures sufficient charge flow for macroscopic current.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "Why does the electric field propagate at near-light speed (~3 × 10⁸ m/s) in a wire, while electrons drift at ~10⁻⁴ m/s? (3 steps)", "answer": "- Step 1: **Electric field vs. electrons**:  \n  The field (voltage signal) moves at ~c, pushing all electrons simultaneously.  \n\n- Step 2: **Electron collisions**:  \n  Electrons undergo frequent collisions with the lattice, limiting their net drift to ~mm/s.  \n\n- Step 3: **Collective vs. individual motion**:  \n  The field’s propagation is a coordinated response; drift velocity is the slow net movement from collisions.  \n\n+ Misconception probe: If electrons move slowly, how does the lamp light instantly?  \n  → The field’s speed, not individual electrons, determines the response time.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}], "count": 10}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Define each symbol in the transport equation $ I = nqvA $, including SI units.", "answer": "- **I:** Current, measured in Amperes (A). It's the rate of flow of electric charge.  \n- **n:** Number density of charge carriers, measured in per cubic meter (m⁻³). Represents the number of free charge carriers per unit volume.  \n- **q:** Charge per carrier, measured in Coulombs (C). For electrons, this is the elementary charge $ e = 1.60 \\times 10^{-19} \\, \\text{C} $.  \n- **v:** Drift velocity, measured in meters per second (m s⁻¹). The average velocity of charge carriers along the conductor.  \n- **A:** Cross-sectional area of the conductor, measured in square meters (m²).  \n\n*Why this matters:* This equation links macroscopic current (I) to microscopic properties (n, q, v) and geometry (A).", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Derive $ I = nqvA $ from the swept-volume concept (4 steps).", "answer": "- **Step 1:** Volume swept by charge carriers in time $ \\Delta t $:  \n  $$ \\Delta V = A \\cdot v \\Delta t $$  \n  (A cross-section area $ A $, drifting at speed $ v $ for time $ \\Delta t $).  \n\n- **Step 2:** Number of charge carriers in this volume:  \n  $$ \\Delta N = n \\cdot \\Delta V = n A v \\Delta t $$  \n\n- **Step 3:** Total charge passing through the area:  \n  $$ \\Delta Q = q \\cdot \\Delta N = n A v q \\Delta t $$  \n\n- **Step 4:** Current (charge per unit time):  \n  $$ I = \\frac{\\Delta Q}{\\Delta t} = n q v A $$  \n\n*Why this works:* The derivation shows how the current depends on the density of carriers (n), their charge (q), drift speed (v), and the conductor’s width (A).", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Why do lamps light up instantly if drift velocity is ~10⁻⁴ m s⁻¹? (3 steps)", "answer": "- **Step 1:** The **electric field** that drives electrons propagates at ~speed of light ($ 3 \\times 10^8 \\, \\text{m s}^{-1} $).  \n- **Step 2:** All electrons in the wire start drifting **simultaneously** when the field is applied.  \n- **Step 3:** Even though each electron moves slowly ($ v \\sim \\text{mm/s} $), there are $ \\sim 10^{28} \\, \\text{m}^{-3} $ carriers. The total charge flow per second (current) is large enough to power the lamp.  \n\n*Marble-tube analogy:* Pushing a marble into a full tube instantly pops one out the other end, even if individual marbles only move slightly.  \n\n*Why this matters:* Distinguishes field propagation (fast) from carrier motion (slow).", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": true}, {"question": "In a series circuit, why does a narrower wire (same material/current) have a higher drift velocity? (2 steps)", "answer": "- **Step 1:** Rearrange $ I = n q v A $ for drift velocity:  \n  $$ v = \\frac{I}{n q A} $$  \n- **Step 2:** For constant $ I $, $ n $, and $ q $, $ v \\propto \\frac{1}{A} $. Smaller cross-sectional area $ A $ forces carriers to move faster to maintain the same current.  \n\n*Real-world example:* Thinner tungsten filament in a bulb has much higher $ v $ than thick copper leads, even with the same $ I $.  \n\n*Boundary case:* If $ A \\to 0 $, $ v \\to \\infty $ (impossible), but in reality, resistivity and material limits dominate.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": true}, {"question": "Compare the number density $ n $ of metals, semiconductors, and insulators. How does $ n $ affect drift velocity $ v $? (3 steps)", "answer": "- **Step 1:** $ n $ values:  \n  - Metals (e.g., copper): $ n \\sim 10^{28} \\, \\text{m}^{-3} $.  \n  - Semiconductors (e.g., silicon): $ n \\sim 10^{16}–10^{19} \\, \\text{m}^{-3} $.  \n  - Insulators (e.g., glass): $ n \\approx 0 $ (no free carriers).  \n\n- **Step 2:** From $ v = I/(n q A) $, lower $ n $ requires higher $ v $ to sustain the same current $ I $.  \n- **Step 3:** Semiconductors have much smaller $ n $ than metals, so their $ v $ is significantly faster (e.g., $ v_{\\text{semiconductor}} \\sim 10^3 \\times v_{\\text{metal}} $).  \n\n*Why this works:* Metals conduct well due to high $ n $, not fast $ v $.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "What happens to $ v $ in a semiconductor if its temperature increases? Explain using $ n $.", "answer": "- **Step 1:** Heating semiconductors frees more electrons, increasing $ n $.  \n- **Step 2:** From $ v = \\frac{I}{n q A} $, increasing $ n $ decreases $ v $ for fixed $ I $.  \n- **Step 3:** Resistance also decreases with higher $ n $, so even less voltage is needed to drive the same current.  \n\n*Why this matters:* Semiconductors have negative temperature coefficients (resistance drops with rising temperature).", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "A copper wire (n = 8.5 × 10²⁸ m⁻³) has a cross-sectional area of 0.50 mm² and carries 0.25 A. Show that an electron takes ~22 hours to travel 3 m. (3 steps)", "answer": "- **Step 1:** Convert area to m²:  \n  $$ 0.50 \\, \\text{mm}^2 = 0.50 \\times 10^{-6} \\, \\text{m}^2 $$  \n- **Step 2:** Calculate drift velocity $ v $:  \n  $$ v = \\frac{I}{n q A} = \\frac{0.25}{8.5 \\times 10^{28} \\times 1.6 \\times 10^{-19} \\times 0.50 \\times 10^{-6}} \\approx 3.7 \\times 10^{-5} \\, \\text{m s}^{-1} $$  \n- **Step 3:** Time to drift 3 m:  \n  $$ t = \\frac{L}{v} = \\frac{3}{3.7 \\times 10^{-5}} \\approx 81,000 \\, \\text{s} \\approx 22 \\, \\text{hours} $$  \n\n*Why this works:* Despite the slow drift, the electric field propagates at light speed, so the lamp lights instantly.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "Common misconception: \"Insulators have high resistance because electrons move slowly.\" Correct this using $ n $.", "answer": "- **Step 1:** Resistance $ R = V/I $. For $ I = n q v A $, if $ n \\approx 0 $, $ I = 0 $, so $ R \\to \\infty $.  \n- **Step 2:** Insulators fail to conduct because they **lack free charge carriers** (tiny $ n $), not due to slow $ v $.  \n- **Step 3:** Even with a large $ v $ (hypothetically), no carriers means no current.  \n\n*Edge case:* A hypothetical perfect vacuum (n = 0) would have infinite resistance, but real insulators have tiny $ n $, allowing *some* current (e.g., dielectric breakdown).", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "Convert 2 mm² to m². What error arises if you treat 1 mm² as 10⁻³ m²?", "answer": "- **Step 1:** 1 mm = $ 10^{-3} $ m, so 1 mm² = $ (10^{-3})^2 = 10^{-6} $ m².  \n- **Step 2:** 2 mm² = $ 2 \\times 10^{-6} $ m².  \n- **Step 3:** Mistake: Treating 1 mm² as $ 10^{-3} $ m² instead of $ 10^{-6} $ m² leads to a **1000× error** in calculations (e.g., $ v = I/(n q A) $ would be 1000× too small).  \n\n*Why this matters:* Area conversions are a major exam trap. Always square the prefix!", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "Why is the direction of conventional current opposite to electron drift in metals?", "answer": "- **Step 1:** Historically, scientists defined current as the flow of positive charge (before electrons were discovered).  \n- **Step 2:** In metals, electrons (negative) drift toward the positive terminal.  \n- **Step 3:** Conventional current is defined as the direction a **positive charge** would move, hence opposite to electron flow.  \n\n*Why this works:* The definition persists for consistency in circuit analysis, even though electrons are the actual carriers.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}], "count": 10}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "Define drift velocity and explain why charge carriers in a metal have both a random thermal velocity and a drift velocity. (2 steps)", "answer": "- **Definition:** Drift velocity is the average velocity of charge carriers (such as free electrons) along a conductor when a potential difference is applied. It is the net directed component of motion superimposed on their random thermal motion.\n- **Why both exist:** In a metal, free electrons move randomly in all directions at high thermal speeds (∼ 10⁶ m s⁻¹) due to thermal energy. These random motions cancel out, so there is no net current. When a battery is connected, an electric field exerts a force (F = qE) on each electron, causing a tiny net drift in the direction opposite to the conventional current. Frequent collisions with the positive ion lattice prevent continuous acceleration, resulting in a constant average drift velocity typically around 10⁻⁴ to 10⁻³ m s⁻¹ — far slower than the random thermal motion.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "A copper wire of cross-sectional area 1.0 mm² carries a current of 1.0 A. Given n ≈ 8 × 10²⁸ m⁻³ and q = 1.6 × 10⁻¹⁹ C, estimate the drift velocity using mental math only. (2 steps)", "answer": "- **Step 1: Convert units**\n  A = 1.0 mm² = 1.0 × 10⁻⁶ m²\n- **Step 2: Use v = I/(nqA)**\n  v ≈ 1.0 / (8 × 10²⁸ × 1.6 × 10⁻¹⁹ × 10⁻⁶)\n  = 1.0 / (8 × 1.6 × 10³) = 1.0 / (12.8 × 10³)\n  ≈ 8 × 10⁻⁵ m s⁻¹ = 0.08 mm s⁻¹\n\nThis is about 0.08 millimetres per second — slower than a snail. Even at 10 A, drift velocity is only about 0.8 mm s⁻¹.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "Derive the transport equation I = nqvA from first principles using the swept-volume approach. (4 steps)", "answer": "- **Step 1: Consider a cylindrical section of conductor with cross-sectional area A**\n  Let charge carriers drift at average velocity v along the wire.\n- **Step 2: Volume swept in time Δt**\n  In time Δt, each carrier travels distance Δx = vΔt. The volume of wire that passes through a cross-section is:\n  ΔV = A × Δx = A v Δt\n- **Step 3: Number of carriers in that volume**\n  With n carriers per unit volume, the number crossing the section is:\n  ΔN = n ΔV = n A v Δt\n- **Step 4: Total charge and current**\n  If each carrier carries charge q, the total charge crossing is:\n  ΔQ = q ΔN = n A v q Δt\n  Since current I = ΔQ/Δt, we get:\n  **I = nqvA**\n\nThis shows current depends on how many carriers (n), how much charge each carries (q), how fast they move (v), and how thick the wire is (A).", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": true}, {"question": "Explain using the marble-tube analogy why a lamp lights almost instantly when switched on, even though individual electrons drift at only ~10⁻⁴ m s⁻¹. (2 steps)", "answer": "- **The analogy:** Imagine a tube completely filled with marbles. Push one marble in at one end — a marble immediately exits the other end, even though each marble barely moved. The *effect* travels fast; the *individual marbles* move slowly.\n- **Application to circuits:** The electric field that pushes electrons through the wire propagates at approximately the speed of light (c ≈ 3 × 10⁸ m s⁻¹). When the switch closes, the field is established along the entire circuit almost instantly. All electrons begin drifting simultaneously. Even though each electron moves slowly, there are ~10²⁸ carriers per m³, so the net charge flow per second (I = nqvA) is substantial. The lamp illuminates as soon as current reaches the filament — within nanoseconds.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "In a series circuit, the same current flows through a thin tungsten filament (diameter 0.025 mm) and thick copper connecting leads (diameter 0.72 mm). Without calculation, which has the higher drift velocity? Explain using I = nqvA. (2 steps)", "answer": "- **Answer:** The tungsten filament has the higher drift velocity.\n- **Explanation:** In a series circuit, current I is the same everywhere (conservation of charge). Rearranging I = nqvA gives v = I/(nqA). Both materials have similar number densities (copper: ~8 × 10²⁸ m⁻³; tungsten: ~4 × 10²⁸ m⁻³), but the filament's cross-sectional area is much smaller:\n  - Filament area ∝ (0.025)² ≈ 6.25 × 10⁻⁴ relative to leads\n  - Leads area ∝ (0.72)² ≈ 0.52 relative\n  \n  The filament area is ~830 times smaller. Since v ∝ 1/A, the drift velocity in the filament is roughly 830 times higher. Even though tungsten has slightly lower n, the dominant factor is the much smaller area — so v_filament >> v_leads.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "Compare the number density n of charge carriers for metals, semiconductors, and insulators. Explain why this affects their conductivity. (3 steps)", "answer": "- **Typical values:**\n  - Metals (copper, tungsten): n ≈ 10²⁸ – 10²⁹ m⁻³\n  - Semiconductors (silicon, germanium): n ≈ 10¹⁶ – 10¹⁹ m⁻³\n  - Insulators (glass, rubber): n ≈ 0 (virtually no free carriers)\n- **Why this matters:** From I = nqvA, for the same current I, cross-section A, and carrier charge q, a smaller n requires a larger drift velocity v. More importantly, with far fewer charge carriers, semiconductors can only sustain significant current if either:\n  (a) A much larger electric field is applied (higher v), or\n  (b) The temperature is raised, freeing more electrons (n increases with temperature — opposite of metals).\n- **Conductivity ranking:** Metals are excellent conductors because their huge n means many carriers are available. Insulators have essentially zero n, so no current flows regardless of applied voltage. Semiconductors fall in between, with conductivity highly sensitive to temperature and impurity doping.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "A student writes \"40 mA = 40 × 10⁻³ A\" and then states that a drift velocity of \"40 mm s⁻¹ = 40 × 10⁻³ m s⁻¹.\" Identify the error and explain the correct conversion. (2 steps)", "answer": "- **The error:** The student has correctly converted 40 mA to amperes (40 mA = 40 × 10⁻³ A = 0.040 A). However, they then incorrectly applied the same numerical value to drift velocity. The quantity 40 mm s⁻¹ means 40 millimetres per second, which is a *distance per time* unit — not 40 times 10⁻³.\n- **Correct conversion:** \n  - 40 mm s⁻¹ = 40 × (10⁻³ m) s⁻¹ = 40 × 10⁻³ m s⁻¹ = 0.040 m s⁻¹\n  - Alternatively: 1 mm = 10⁻³ m, so divide by 1000.\n  \nThe key distinction: the prefix \"milli-\" (m) means 10⁻³ when attached to a unit. When converting \"40 mA\" (milliamperes), you multiply by 10⁻³. When converting \"40 mm/s\" (millimetres per second), you also multiply by 10⁻³ to get metres per second. The numerical value *decreases* when converting to smaller units.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "A wire with cross-sectional area 1 mm² is stated to have n = 10²⁹ m⁻³. A student converts this to \"10²⁹ per mm³.\" Explain why this is wrong and give the correct conversion. (2 steps)", "answer": "- **The error:** The student has confused the units. Number density n is defined per **cubic metre (m⁻³)**, not per cubic millimetre.\n- **Why it matters:** 1 mm = 10⁻³ m, so 1 mm³ = (10⁻³)³ m³ = 10⁻⁹ m³.\n  - To convert from per mm³ to per m³: multiply by 10⁹\n  - To convert from per m³ to per mm³: divide by 10⁹\n- **Correct interpretation:** If n = 10²⁹ m⁻³, this equals 10²⁹ ÷ 10⁹ = 10²⁰ per mm³. Conversely, if someone states n = 10²⁰ mm⁻³, this equals 10²⁰ × 10⁹ = 10²⁹ m⁻³. The exam trap is failing to square or cube the conversion factor when dealing with area (×10⁶) or volume (×10⁹).", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "Why can't an insulator conduct significant current even with a very large potential difference applied? Use I = nqvA in your explanation. (2 steps)", "answer": "- **Step 1: Apply the transport equation**\n  In I = nqvA, the current I depends on n (number density), q (charge per carrier), v (drift velocity), and A (cross-sectional area).\n- **Step 2: For insulators, n ≈ 0**\n  Insulators like glass or rubber have virtually zero free charge carriers — n is essentially zero. Even if you apply an enormous electric field (causing maximum possible drift velocity v) across a large area A, the term nqvA remains zero because there are no carriers to move. With q also being finite but n being zero, the product is zero. Therefore I = 0 regardless of the voltage applied. A perfect insulator would have n = 0, meaning no current flows under any circumstances.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "In a circuit, the wire suddenly narrows. What happens to the drift velocity of electrons passing through the narrow section, assuming the same current? Explain using continuity. (2 steps)", "answer": "- **What happens:** The drift velocity increases in the narrower section.\n- **Explanation:** In a series circuit, current I is the same at every point (Kirchhoff's current law / conservation of charge). From I = nqvA, rearranged as v = I/(nqA), for the same material (same n, same q) and same current I:\n  v ∝ 1/A\n  \n  Halving the cross-sectional area doubles the drift velocity. This is analogous to water speeding up when a pipe narrows (like putting your finger over a tap). The narrow filament in a light bulb has much higher drift velocity than the thick connecting leads for this reason.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "A student claims: \"Resistors store electrons.\" Is this correct? Explain what actually happens to electrons in a resistor. (2 steps)", "answer": "- **The claim is incorrect.** Resistors do not store electrons.\n- **What actually happens:** Electrons flow *through* the resistor continuously. As they move, they collide frequently with the positive ions in the crystal lattice of the resistor material. Each collision transfers energy from the electrons to the lattice ions, converting electrical energy into thermal energy (heat). This is why resistors get warm. The number of electrons entering one end of the resistor equals the number leaving the other end (steady-state current). No electrons are \"stored\" inside.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "Explain why semiconductors have much faster drift velocities than metals for the same current and geometry. (2 steps)", "answer": "- **Step 1: Rearrange the transport equation**\n  From v = I/(nqA), for the same current I, charge q, and cross-sectional area A, drift velocity v is inversely proportional to number density n: v ∝ 1/n.\n- **Step 2: Compare n values**\n  Metals: n ≈ 10²⁸ – 10²⁹ m⁻³\n  Semiconductors: n ≈ 10¹⁶ – 10¹⁹ m⁻³\n  \n  Semiconductors have ~10⁹ to 10¹³ fewer charge carriers than metals. To carry the same current with far fewer carriers, each carrier must drift much faster. Therefore, drift velocities in semiconductors are typically millions of times higher than in metals under identical conditions.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "A torch bulb filament carries 160 mA. The filament is tungsten (n = 4.0 × 10²⁸ m⁻³) with diameter 0.025 mm. Calculate the drift velocity in the filament. (2 steps)", "answer": "- **Step 1: Calculate cross-sectional area**\n  Radius r = d/2 = 0.025 mm ÷ 2 = 0.0125 mm = 1.25 × 10⁻⁵ m\n  A = πr² = π × (1.25 × 10⁻⁵)² = π × 1.5625 × 10⁻¹⁰ ≈ 4.91 × 10⁻¹⁰ m²\n- **Step 2: Calculate drift velocity**\n  v = I/(nqA) = (160 × 10⁻³) / (4.0 × 10²⁸ × 1.6 × 10⁻¹⁹ × 4.91 × 10⁻¹⁰)\n  v ≈ 0.16 / (4.0 × 1.6 × 4.91 × 10⁻¹)\n  v ≈ 0.16 / 3.14 × 10⁻¹ = 0.16 / 0.314 ≈ 0.51 m s⁻¹\n  \n  ≈ **0.5 m s⁻¹** (or ~500 mm s⁻¹)\n\nThis is much faster than in copper leads because the filament is so thin.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "A copper wire is 3.0 m long, carries 0.25 A, and has cross-section 0.50 mm² (n = 8.5 × 10²⁸ m⁻³). Calculate how long it would take an electron to travel from the switch to the lamp. Why does the lamp still light instantly? (3 steps)", "answer": "- **Step 1: Calculate drift velocity**\n  A = 0.50 mm² = 5.0 × 10⁻⁷ m²\n  v = I/(nqA) = 0.25 / (8.5 × 10²⁸ × 1.6 × 10⁻¹⁹ × 5.0 × 10⁻⁷)\n  v ≈ 0.25 / (6.8 × 10³) ≈ 3.7 × 10⁻⁵ m s⁻¹\n- **Step 2: Calculate travel time**\n  t = L/v = 3.0 / (3.7 × 10⁻⁵) ≈ 81,000 s ≈ 22.5 hours\n- **Step 3: Why instant light?**\n  The electron takes almost a day to reach the lamp, yet it lights in microseconds. This is because the **electric field propagates at ~c = 3 × 10⁸ m s⁻¹**, reaching the filament in about t = L/c = 3/3 × 10⁸ = 10 nanoseconds. All electrons throughout the wire begin drifting simultaneously. The effect is instant; only the individual carriers are slow.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": true}, {"question": "In the derivation of I = nqvA, what is the \"swept volume\" and why is it important? (2 steps)", "answer": "- **What it is:** The swept volume is the volume of conductor that charge carriers pass through in a given time interval. It is calculated as A × v × Δt, where A is cross-sectional area, v is drift velocity, and Δt is the time interval.\n- **Why it matters:** The swept volume tells us how much \"territory\" the carriers cover. Multiplying this by the number density n gives the total number of carriers crossing the wire's cross-section in that time. This directly leads to the charge ΔQ = nqvAΔt, and dividing by Δt yields the current I = nqvA. It provides the physical picture of how current relates to microscopic motion.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "What is the difference between thermal velocity and drift velocity in a metallic conductor? (2 steps)", "answer": "- **Thermal velocity:** The random, rapid motion of free electrons in all directions due to thermal energy. Speeds are typically ~10⁶ m s⁻¹ (about 0.1% the speed of light). Since this motion is random, it averages to zero net movement — no current flows.\n- **Drift velocity:** The tiny net velocity superimposed on the random motion when an electric field is applied. Typically ~10⁻⁴ to 10⁻³ m s⁻¹ — millions of times slower than thermal velocity. This is the directed component that actually constitutes current. The much larger thermal velocities are responsible for why electrons collide frequently with the lattice, limiting the drift velocity to a constant value.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "In a cathode ray tube, electrons travel at 4.2 × 10⁷ m s⁻¹ through a distance of 21 cm. If the beam current is 32 mA, estimate the number of electrons striking the screen per second. (2 steps)", "answer": "- **Step 1: Use I = nqvA, but recognise we need electrons per second**\n  Current I = Q/t = ne/t, so number of electrons per second = I/e\n  = 32 × 10⁻³ A / (1.6 × 10⁻¹⁹ C)\n  = 32 × 10⁻³ / 1.6 × 10¹⁹\n  = 20 × 10¹⁶ = 2.0 × 10¹⁷ electrons per second\n- **Step 2: For one hour (3600 s)**\n  = 2.0 × 10¹⁷ × 3600 = 7.2 × 10²⁰ electrons\n\nThis matches the order of magnitude from exam questions — note that the speed of electrons doesn't affect the count directly; what matters is current and charge per electron.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "Two copper wires of the same length are connected in series. Wire X has diameter d, wire Y has diameter 2d. The same current flows through both. What is the ratio of drift velocities vX : vY? (2 steps)", "answer": "- **Step 1: Relate area to diameter**\n  For circular wires: A = πd²/4\n  So AX ∝ d², AY ∝ (2d)² = 4d²\n  Therefore AY = 4AX\n- **Step 2: Use v ∝ 1/A for same I, n, q**\n  vX/vY = AY/AX = 4\n  vX : vY = 4 : 1\n\nThe thinner wire (X) has drift velocity four times greater than the thicker wire (Y).", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "State whether each quantity in I = nqvA increases or decreases, and why, when a wire is heated: (a) n in a metal (b) n in a semiconductor. (2 steps)", "answer": "- **(a) In a metal:** n **decreases slightly** (or stays roughly constant). As metal heats up, lattice ions vibrate more intensely, increasing scattering. However, the number of free electrons per atom remains approximately one per atom — n doesn't change much. The main effect is increased resistance due to more frequent collisions, not change in n.\n- **(b) In a semiconductor:** n **increases significantly** with temperature. Heating promotes more electrons from the valence band to the conduction band, creating more free electrons (and holes). This exponential increase in n is why semiconductors conduct better at higher temperatures (negative temperature coefficient of resistance), unlike metals.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "Why is it important to convert cross-sectional area to m² before substituting into I = nqvA? What is the correct conversion for a wire with diameter 0.5 mm? (2 steps)", "answer": "- **Why it matters:** The SI unit for n is m⁻³ (per cubic metre). If you leave area in mm², your units become inconsistent — you'd be mixing per mm² with per m³, giving an answer off by a factor of 10⁶ or 10¹².\n- **Conversion for d = 0.5 mm:**\n  Radius r = d/2 = 0.25 mm = 2.5 × 10⁻⁴ m\n  A = πr² = π × (2.5 × 10⁻⁴)² = π × 6.25 × 10⁻⁸ ≈ 1.96 × 10⁻⁷ m²\n  \n  Alternatively: 0.5 mm = 5 × 10⁻⁴ m\n  A = πd²/4 = π × (5 × 10⁻⁴)² / 4 = π × 2.5 × 10⁻⁷ / 4 ≈ 1.96 × 10⁻⁷ m²\n\nAlways convert diameter to metres first, then calculate area in m².", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": true}, {"question": "The current in a copper wire is 5.0 A. The wire has cross-section 2.0 mm² and n = 8.5 × 10²⁸ m⁻³. Calculate the drift velocity. (2 steps)", "answer": "- **Step 1: Convert units**\n  A = 2.0 mm² = 2.0 × 10⁻⁶ m²\n- **Step 2: Calculate v**\n  v = I/(nqA) = 5.0 / (8.5 × 10²⁸ × 1.6 × 10⁻¹⁹ × 2.0 × 10⁻⁶)\n  = 5.0 / (8.5 × 1.6 × 2.0 × 10³)\n  = 5.0 / (27.2 × 10³)\n  ≈ 1.84 × 10⁻⁴ m s⁻¹\n  \n  ≈ **0.18 mm s⁻¹**\n\nThis is less than a fifth of a millimetre per second — incredibly slow, yet current flows normally.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "Explain why the charge of an electron in the formula I = nqvA is taken as 1.6 × 10⁻¹⁹ C (positive value) rather than the negative sign. (1 step)", "answer": "The negative sign indicates direction (electrons flow opposite to conventional current). When calculating drift speed from current magnitude, we use the magnitude of charge because:\n1. Current I is defined as conventional current (positive to negative direction)\n2. The formula I = nqvA gives the *magnitude* of current\n3. If we used the negative charge, we'd get a negative drift velocity, indicating direction — which is useful for understanding but not for calculating speed magnitude\n4. In exam questions, unless specifically asked about direction, use q = 1.60 × 10⁻¹⁹ C (the elementary charge magnitude)", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "A semiconducting strip is 6.0 mm wide and 0.50 mm thick, carrying 10 mA. Given n = 7.0 × 10²² m⁻³ and q = 1.6 × 10⁻¹⁹ C, show that drift speed is about 0.3 m s⁻¹. (2 steps)", "answer": "- **Step 1: Calculate cross-sectional area**\n  Width = 6.0 mm = 6.0 × 10⁻³ m\n  Thickness = 0.50 mm = 5.0 × 10⁻⁴ m\n  A = width × thickness = 6.0 × 10⁻³ × 5.0 × 10⁻⁴ = 3.0 × 10⁻⁶ m²\n- **Step 2: Calculate drift speed**\n  v = I/(nqA) = (10 × 10⁻³) / (7.0 × 10²² × 1.6 × 10⁻¹⁹ × 3.0 × 10⁻⁶)\n  = 0.01 / (7.0 × 1.6 × 3.0 × 10⁻³)\n  = 0.01 / (33.6 × 10⁻³)\n  = 0.01 / 0.0336 ≈ 0.30 m s⁻¹ ✓\n\nThis is ~0.3 m/s — far faster than copper under the same conditions because n is much smaller.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "A student attempts to calculate drift velocity by first finding the time for one electron to travel the wire length, then using v = L/t. Why is this approach flawed? (2 steps)", "answer": "- **The flaw:** This method assumes a single electron travels the entire length. In reality, electrons don't travel in a straight line from one end to the other — they undergo millions of collisions with lattice ions.\n- **What really happens:** Each electron has a very small mean free path (distance between collisions). It drifts forward very slowly while constantly colliding and randomly changing direction. The \"drift velocity\" is the net result of many such collisions, not the motion of any single electron over the full length. The correct approach is to use v = I/(nqA), which gives the average velocity of the collective flow — not the path of an individual carrier.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": true}, {"question": "Why do ions in electrolytes and gases also act as charge carriers, and how does this differ from metals? (2 steps)", "answer": "- **In electrolytes/gases:** Charge is carried by **positive and/or negative ions** — atoms or molecules that have gained or lost electrons. When a voltage is applied, these ions drift through the liquid or gas. The charge q on each ion can be ±e, ±2e, or larger multiples depending on ionisation state.\n- **Difference from metals:** In metals, only electrons (negative) carry charge, and they are already free (delocalised). In electrolytes, the carriers are whole ions (much more massive than electrons), so they drift much slower for the same electric field. Also, the number density n depends on concentration and degree of ionisation, not on a fixed crystal structure.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "If you double the current in a copper wire while keeping the same cross-sectional area and material, what happens to the drift velocity? What if you double the diameter instead? (2 steps)", "answer": "- **Doubling current (same A, n, q):**\n  From v = I/(nqA), v ∝ I. Doubling I → v doubles.\n- **Doubling diameter (same length, same material, same current):**\n  Diameter doubles → area quadruples (A ∝ d²). Since v ∝ 1/A for constant I, v becomes 1/4 of its original value. The wire is four times thicker, so each carrier contributes to more current, requiring less speed to maintain the same flow.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "A 15 A fuse wire has cross-sectional area 0.20 mm². Estimate the diameter and calculate drift velocity for 15 A in copper (n = 8.5 × 10²⁸ m⁻³). (3 steps)", "answer": "- **Step 1: Find diameter from area**\n  A = 0.20 mm² = 2.0 × 10⁻⁷ m²\n  A = πd²/4 → d² = 4A/π = (4 × 2.0 × 10⁻⁷)/π = 2.55 × 10⁻⁷\n  d ≈ 5.05 × 10⁻⁴ m = 0.505 mm ≈ 0.5 mm ✓\n- **Step 2: Calculate drift velocity**\n  v = I/(nqA) = 15 / (8.5 × 10²⁸ × 1.6 × 10⁻¹⁹ × 2.0 × 10⁻⁷)\n  = 15 / (8.5 × 1.6 × 2.0 × 10²)\n  = 15 / (27.2 × 10²) = 15 / 2720 ≈ 5.5 × 10⁻³ m s⁻¹\n  ≈ **5.5 mm s⁻¹**\n\nThis is still slow — less than a centimetre per second even at the rated fuse current.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}], "count": 27}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "Define drift velocity and explain why it is much slower than the random thermal motion of electrons in a metal. (2 steps)", "answer": "- Step 1: Drift velocity is the average velocity of charge carriers along a conductor when a potential difference is applied. It represents the net directed motion superimposed on the random thermal motion.\n- Step 2: Electrons in a metal move randomly at thermal speeds of ∼10⁶ m/s (about one-thousandth the speed of light). These random motions cancel out in all directions, producing no net current. When an electric field is applied, it exerts a tiny force causing a small bias in one direction. Collisions with the ion lattice limit acceleration, resulting in a constant drift velocity of only ∼10⁻⁴ to 10⁻³ m/s — slower than a snail.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "What are charge carriers in (a) metals, (b) electrolytes and gases, and (c) semiconductors? Give one example of each. (3 steps)", "answer": "- Step 1: In metals, charge carriers are free (delocalised) electrons — one per atom on average. Example: copper (Cu), silver (Ag).\n- Step 2: In electrolytes and gases, charge carriers are positive and/or negative ions. Example: Cu²⁺ and SO₄²⁻ in copper sulfate solution.\n- Step 3: In semiconductors like silicon or germanium, charge carriers are electrons and \"holes\" (positive charge carriers representing missing electrons). Example: silicon (Si) doped with phosphorus.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "State what each symbol represents in the transport equation I = nqvA, including their SI units. (1 step)", "answer": "I = current (amperes, A); n = number density of charge carriers (carriers per cubic metre, m⁻³); q = charge per carrier (coulombs, C); v = drift velocity (metres per second, m s⁻¹); A = cross-sectional area of the conductor (square metres, m²).", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "Derive the transport equation I = nqvA from first principles using the \"swept-volume\" approach. (4 steps)", "answer": "- Step 1: Consider a cylindrical section of conductor with cross-sectional area A. In time Δt, a charge carrier travels distance Δx = vΔt.\n- Step 2: The volume of wire that passes through a cross-section in time Δt is ΔV = A × Δx = AvΔt.\n- Step 3: The number of carriers in this volume is ΔN = nΔV = nAvΔt, where n is the number density (carriers per m³).\n- Step 4: The total charge crossing the section is ΔQ = qΔN = nqvAΔt. Dividing by Δt gives I = ΔQ/Δt = nqvA.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "Explain why a lamp illuminates almost instantly when switched on, even though individual electrons drift at only ~10⁻⁴ m/s. Use the marble-tube analogy in your explanation. (3 steps)", "answer": "- Step 1: The electric field that pushes electrons through the wire propagates at nearly the speed of light (c ≈ 3 × 10⁸ m/s) — about ten orders of magnitude faster than drift velocity.\n- Step 2: Using the marble-tube analogy: imagine a pipe completely filled with marbles. Push one marble in at one end — a marble exits the other end immediately, even though each marble moved only a tiny distance. The effect propagates fast; the carriers move slowly.\n- Step 3: When the switch closes, the field reaches all electrons almost simultaneously throughout the circuit. All electrons begin drifting at once, so current flows through the filament immediately, causing it to light up in microseconds despite the slow drift of individual electrons.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "Two copper wires of the same length are connected in series. Wire X has diameter d, and wire Y has diameter 2d. The same current I flows through both. Using I = nqvA, explain which wire has the larger drift velocity and calculate the ratio v_X : v_Y. (3 steps)", "answer": "- Step 1: In a series circuit, current I is the same everywhere (Kirchhoff's current law). Both wires are copper, so they have the same number density n and carrier charge q.\n- Step 2: Rearranging I = nqvA gives v = I/(nqA). Since I, n, and q are constant, v ∝ 1/A. The wire with the smaller cross-sectional area has the larger drift velocity.\n- Step 3: Wire X has area A_X = π(d/2)²; Wire Y has area A_Y = π(2d/2)² = πd² = 4A_X. Since v ∝ 1/A, v_X/v_Y = A_Y/A_X = 4. Therefore v_X : v_Y = 4 : 1. Wire X has four times the drift velocity of wire Y.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "Why is the drift velocity much higher in a thin tungsten filament than in thick copper connecting leads, even when the same current flows through both? (2 steps)", "answer": "- Step 1: For the same current I, rearranged I = nqvA gives v = I/(nqA). Both the smaller cross-sectional area A and the smaller number density n in tungsten (compared to copper) increase the drift velocity.\n- Step 2: The tungsten filament has a much smaller area (by a factor of ~830 for the given dimensions) and about half the number density of copper. Both factors multiply to give a drift velocity about 1600× higher in the filament than in the copper leads.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "Compare the typical number density n of charge carriers for (a) copper, (b) germanium, (c) silicon, and (d) glass. Explain how this affects their electrical conductivity. (3 steps)", "answer": "- Step 1: Approximate values: copper n ≈ 8 × 10²⁸ m⁻³; germanium n ≈ 10¹⁹ m⁻³; silicon n ≈ 10¹⁶–10¹⁷ m⁻³; glass n ≈ 0 (essentially no free carriers).\n- Step 2: Since current I = nqvA, for the same area and drift velocity, a larger n produces a larger current. Metals have extremely high n, making them good conductors. Semiconductors have much lower n (about 10⁹ times fewer than metals), so they conduct poorly. Insulators have virtually no charge carriers.\n- Step 3: This is why metals like copper are excellent conductors, semiconductors like silicon can be made conductive with doping or heat, and insulators like glass block current almost completely regardless of applied voltage.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "A student converts 1 mm² to m² as 1 × 10⁻³ m². Explain why this is wrong and give the correct conversion. What other common unit conversion error occurs with prefixes? (2 steps)", "answer": "- Step 1: 1 mm² = (10⁻³ m)² = 10⁻⁶ m², not 10⁻³ m². When converting areas, you must square the conversion factor. For example, 2 mm² = 2 × 10⁻⁶ m².\n- Step 2: A common error is confusing micro (µ, 10⁻⁶) with milli (m, 10⁻³). Remember: 1 µA = 10⁻⁶ A (one-millionth of an ampere), while 1 mA = 10⁻³ A (one-thousandth). A microampere is 1000 times smaller than a milliampere.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "If n = 9.2 × 10²⁸ m⁻³, I = 2.5 A, and diameter = 1.5 mm, calculate the drift velocity in a copper wire. (3 steps)", "answer": "- Step 1: Calculate cross-sectional area. Diameter = 1.5 mm = 1.5 × 10⁻³ m, so radius r = 0.75 × 10⁻³ m. A = πr² = π(0.75 × 10⁻³)² = π × 0.5625 × 10⁻⁶ = 1.77 × 10⁻⁶ m².\n- Step 2: Rearrange I = nqvA to find v: v = I/(nqA) = 2.5 / (9.2 × 10²⁸ × 1.6 × 10⁻¹⁹ × 1.77 × 10⁻⁶).\n- Step 3: Calculate denominator: 9.2 × 1.6 × 1.77 × 10²⁸⁻¹⁹⁻⁶ = 26.1 × 10³ = 2.61 × 10⁴. Then v = 2.5 / 2.61 × 10⁴ ≈ 9.6 × 10⁻⁵ m/s = 0.096 mm/s. This is less than 0.1 mm per second — slower than a snail.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "Explain why semiconductors have much higher drift velocities than metals for the same current and geometry, despite being poorer conductors. (2 steps)", "answer": "- Step 1: From v = I/(nqA), for the same current I, cross-sectional area A, and carrier charge q, drift velocity v is inversely proportional to number density n (v ∝ 1/n).\n- Step 2: Semiconductors have n ~ 10¹⁶–10¹⁹ m⁻³, while metals have n ~ 10²⁸ m⁻³ — about 10⁹ to 10¹² times larger. To carry the same current with far fewer carriers, each carrier must move much faster. Thus semiconductors have drift velocities about 10³ to 10⁶ times higher than metals under identical conditions.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "What is the relationship between drift velocity v and cross-sectional area A when current I, number density n, and charge q remain constant? If the area is halved, what happens to v? (2 steps)", "answer": "- Step 1: From v = I/(nqA), drift velocity is inversely proportional to cross-sectional area: v ∝ 1/A. This is the continuity constraint in series circuits.\n- Step 2: If the area is halved (A → A/2), the drift velocity doubles (v → 2v). This is why current flows faster through narrower sections of a conductor — like water speeding up through a constricted pipe.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "In a copper wire carrying 0.25 A with cross-section 0.50 mm², calculate approximately how long it would take an electron to travel 3 m. Hence explain the \"instant-on\" paradox. (3 steps)", "answer": "- Step 1: First convert units: A = 0.50 mm² = 0.50 × 10⁻⁶ m² = 5.0 × 10⁻⁷ m². Using n = 8.5 × 10²⁸ m⁻³ and q = 1.6 × 10⁻¹⁹ C: v = I/(nqA) = 0.25 / (8.5 × 10²⁸ × 1.6 × 10⁻¹⁹ × 5.0 × 10⁻⁷) ≈ 3.7 × 10⁻⁵ m/s.\n- Step 2: Time to travel 3 m: t = distance/v = 3 / (3.7 × 10⁻⁵) ≈ 81,000 s ≈ 22 hours.\n- Step 3: Yet the lamp appears to light instantly. The explanation: the electric field propagates at c ≈ 3 × 10⁸ m/s, reaching the filament in t = L/c ≈ 3/3 × 10⁸ = 10 nanoseconds. The field causes all electrons to begin drifting simultaneously, so current flows immediately despite the slow drift of individual electrons.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": true}, {"question": "Define number density n and state its typical value for copper. Why does n matter more than carrier charge q for determining conductivity differences between materials? (2 steps)", "answer": "- Step 1: Number density n is the number of free charge carriers per unit volume of the material, measured in m⁻³. For copper, n ≈ 8 × 10²⁸ m⁻³ (approximately one free electron per atom).\n- Step 2: The carrier charge q is usually the electron charge e = 1.60 × 10⁻¹⁹ C (or 2e for doubly charged ions), which is essentially the same for all materials using electrons as carriers. Therefore, differences in conductivity arise almost entirely from differences in n. Metals have huge n; semiconductors have moderate n; insulators have n ≈ 0.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "A wire carries a current of 40 mA. (a) Convert 40 mA to amperes. (b) A student writes the drift velocity as 40 × 10⁻³ m/s for an answer of 40 mm/s. Identify the error and write the correct conversion. (2 steps)", "answer": "- Step 1: (a) 40 mA = 40 × 10⁻³ A = 0.040 A (or 4.0 × 10⁻² A).\n- Step 2: (b) The student confused the numerical value (40) with the unit prefix. The drift velocity 40 mm/s should be written as 40 × 10⁻³ m/s = 0.040 m/s, not 40 × 10⁻³ m/s as the final answer. The correct conversion is: 40 mm/s = 40 × (10⁻³ m)/s = 0.040 m/s.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "Using the transport equation I = nqvA, explain why insulators cannot carry significant current even with a very large potential difference applied. (2 steps)", "answer": "- Step 1: Insulators like glass or rubber have virtually zero free charge carriers (n ≈ 0). In the equation I = nqvA, if n = 0, then I = 0 regardless of how large v or A is.\n- Step 2: Even with an enormous electric field (creating a large drift velocity v), there are no charge carriers available to move. With no carriers to transport charge, no current can flow. A perfect insulator would have I = 0 for any voltage.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "Why is conventional current defined as flowing from positive to negative, even though electrons (the charge carriers in metals) flow from negative to positive? (1 step)", "answer": "Before scientists discovered that electrons carry current in metals, they defined current as the flow of positive charge. This convention persists today: conventional current flows from the positive terminal to the negative terminal (externally), while electrons (negative charges) flow in the opposite direction. The sign of v in I = nqvA is negative for electrons, indicating they move opposite to conventional current direction.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "In the experiment with a metallised polystyrene sphere moving between charged plates, the sphere takes 16 s to travel across and back 40 times (80 transits). The average current is 30 nA. How much charge is carried on the sphere each time? (3 steps)", "answer": "- Step 1: Calculate total charge transferred. ΔQ = I × Δt = 30 nA × 16 s = 30 × 10⁻⁹ A × 16 s = 480 × 10⁻⁹ C = 480 nC.\n- Step 2: The sphere makes 80 transits (40 round trips, each with 2 crossings).\n- Step 3: Charge per transit = total charge / number of transits = 480 nC / 80 = 6 nC. Each time the sphere travels across the plates, it carries 6 nC of charge.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "When a battery is connected to a circuit, what happens to the free electrons in a metal wire before any current flows? Why doesn't this cause a shock when touching an isolated wire? (2 steps)", "answer": "- Step 1: Even before a battery is connected, free electrons in a metal wire move randomly in all directions at high thermal speeds (~10⁶ m/s). This random motion is completely random, so the net charge flow in any direction is zero.\n- Step 2: Without a potential difference (voltage) applied, there is no electric field to create a directed drift. The random motions cancel out perfectly, so no net current flows. That's why touching an isolated wire gives you no shock — there is no net movement of charge, only chaotic thermal motion.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "Explain why heating a semiconductor increases its electrical conductivity, whereas heating a metal typically decreases it. (2 steps)", "answer": "- Step 1: In semiconductors, thermal energy frees more electrons from their atomic bonds, significantly increasing the number density n of charge carriers. Since I = nqvA, more carriers mean larger current for the same voltage, so conductivity increases with temperature.\n- Step 2: In metals, there are already abundant free electrons (high n), so increased temperature primarily increases the rate of collisions between electrons and ion lattice atoms. This increases resistance, reducing conductivity. The dominant effect in metals is increased scattering, not increased carrier density.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": true}, {"question": "A torch bulb filament (tungsten, n = 4.0 × 10²⁸ m⁻³, diameter 0.025 mm) carries 160 mA. The connecting copper leads have diameter 0.72 mm (n = 8.0 × 10²⁸ m⁻³). Without detailed calculation, which has the faster drift velocity? Justify using v = I/(nqA). (2 steps)", "answer": "- Step 1: The filament has much smaller area (diameter 0.025 mm vs 0.72 mm, so area ratio ≈ (0.025/0.72)² ≈ 0.0012) and slightly smaller n (4.0 × 10²⁸ vs 8.0 × 10²⁸, a factor of 2 lower).\n- Step 2: Since v = I/(nqA), both the smaller area and smaller n in the filament increase v. The filament has dramatically faster drift velocity — about 1600× faster than the copper leads for the same current, as confirmed by calculation.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "What is the order of magnitude difference between (a) the speed of electric field propagation in a wire and (b) typical drift velocity of electrons in a copper wire? Give approximate values. (1 step)", "answer": "(a) The electric field propagates at approximately the speed of light, c ≈ 3 × 10⁸ m/s. (b) Typical drift velocity in a copper wire under normal currents is about 10⁻⁴ to 10⁻³ m/s (0.1 mm/s to 1 mm/s). The ratio is about 10¹¹ to 10¹² — the field travels about a hundred billion to a trillion times faster than the electrons drift.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "In the derivation of I = nqvA, why can we treat n as constant for a given material at a given temperature? What condition would make n change significantly? (2 steps)", "answer": "- Step 1: At a fixed temperature, the number of free electrons per atom in a metal is essentially constant (typically one per atom). The number density n depends primarily on the material's atomic structure and density, not on the applied voltage.\n- Step 2: For semiconductors, however, n is strongly temperature-dependent. Heating releases more electrons from valence bands to conduction bands, dramatically increasing n. This is why semiconductors conduct better when hot. Doping (adding impurity atoms) also changes n significantly.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "If you double the current in a copper wire while keeping all other factors constant, what happens to the drift velocity? If you double the cross-sectional area instead, what happens? (2 steps)", "answer": "- Step 1: From v = I/(nqA), drift velocity is directly proportional to current (v ∝ I). Doubling the current doubles the drift velocity, assuming area stays the same.\n- Step 2: Drift velocity is inversely proportional to area (v ∝ 1/A). Doubling the cross-sectional area halves the drift velocity, assuming current stays the same. This is why thicker wires carry the same current with slower-moving electrons.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "A student says: \"Resistors store electrons.\" Explain why this statement is incorrect and what actually happens to electrons in a resistor. (1 step)", "answer": "Electrons are not stored in resistors. They flow through the resistor continuously. As electrons drift through, they collide frequently with the positive ion lattice of the resistor material. These collisions convert electrical energy into thermal energy (heat), which is why resistors get warm. The current entering equals the current leaving (conservation of charge); no electrons accumulate or are stored.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "Calculate the number of electrons passing a point in a wire in 10 minutes when the current is 1.0 µA. (3 steps)", "answer": "- Step 1: Convert units. Current I = 1.0 µA = 1.0 × 10⁻⁶ A. Time t = 10 minutes = 600 s.\n- Step 2: Calculate total charge passing: Q = I × t = 1.0 × 10⁻⁶ A × 600 s = 6.0 × 10⁻⁴ C.\n- Step 3: Number of electrons = Q/e, where e = 1.60 × 10⁻¹⁹ C. Number = (6.0 × 10⁻⁴) / (1.60 × 10⁻¹⁹) = 3.75 × 10¹⁵ electrons.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "Why does the drift velocity formula v = I/(nqA) give a negative value for electrons, and how should you interpret this? (1 step)", "answer": "The charge q of an electron is negative (-e = -1.60 × 10⁻¹⁹ C). Substituting this into v = I/(nqA) gives a negative drift velocity. This negative sign indicates the carriers move in the opposite direction to the conventional current direction (electrons flow toward the positive terminal). When computing speed magnitude, use the magnitude of q (1.60 × 10⁻¹⁹ C), not the signed value.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "A copper wire of area 1 mm² carries 10 A. Estimate the drift velocity and comment on how this compares to a snail's speed. (2 steps)", "answer": "- Step 1: Using typical values: n ≈ 8.5 × 10²⁸ m⁻³, q = 1.6 × 10⁻¹⁹ C, A = 1 mm² = 1 × 10⁻⁶ m². v = I/(nqA) = 10 / (8.5 × 10²⁸ × 1.6 × 10⁻¹⁹ × 10⁻⁶) ≈ 7.4 × 10⁻⁴ m/s = 0.74 mm/s.\n- Step 2: A typical snail moves at about 1 mm/s. This drift velocity of ~0.7 mm/s is comparable to a snail's pace — electrons drift slower than a snail crawls!", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "Explain the difference between thermal velocity and drift velocity in a metal conductor. Why does the thermal velocity not contribute to electric current? (2 steps)", "answer": "- Step 1: Thermal velocity is the random speed of electrons (~10⁶ m/s) due to heat energy. Each electron moves in random directions, colliding with ions frequently. The net motion in any direction averages to zero over time.\n- Step 2: Drift velocity is the tiny additional velocity component (∼10⁻⁴ m/s) superimposed on the random motion when an electric field is applied. This small directed component is the same for all electrons (on average), creating a net flow of charge. The random thermal motion cancels out and produces no net current.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "A semiconducting strip 6.0 mm wide and 0.50 mm thick carries 10 mA. Given n = 7.0 × 10²² m⁻³ and q = 1.6 × 10⁻¹⁹ C, show that the drift speed is about 0.3 m/s. (3 steps)", "answer": "- Step 1: Calculate cross-sectional area: width = 6.0 mm = 6.0 × 10⁻³ m, thickness = 0.50 mm = 0.50 × 10⁻³ m. A = 6.0 × 10⁻³ × 0.50 × 10⁻³ = 3.0 × 10⁻⁶ m².\n- Step 2: Rearrange v = I/(nqA) = (10 × 10⁻³) / (7.0 × 10²² × 1.6 × 10⁻¹⁹ × 3.0 × 10⁻⁶).\n- Step 3: Denominator = 7.0 × 1.6 × 3.0 × 10²²⁻¹⁹⁻⁶ = 33.6 × 10⁻³ = 3.36 × 10⁻². So v = 0.01 / 3.36 × 10⁻² ≈ 0.30 m/s. This is about 0.3 m/s, which is roughly 10⁶ times faster than typical drift velocities in metals.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}], "count": 30}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "What is a \"charge carrier,\" and why is the concept needed at all when describing electric current?", "answer": "A charge carrier is any mobile particle that physically transports electric charge through a material when an electric field is applied. The concept is needed because current is not some abstract \"flow\" — it requires real particles with charge that can move. Without mobile charges, an applied voltage cannot produce a current, no matter how large. In metals these carriers are delocalised free electrons (roughly one per atom); in electrolytes and gases they are positive and negative ions; in semiconductors they are electrons and \"holes.\" This is why the same equation $$I = nqvA$$ works universally — you just substitute the relevant carrier's charge and density.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "In the transport equation $$I = nqvA$$, state what each symbol represents and its SI unit.", "answer": "- Step 1: $$I$$ is the current, measured in amperes (A), i.e. coulombs per second.\n- Step 2: $$n$$ is the number density of free charge carriers — the number of mobile carriers per cubic metre, with unit $$\\text{m}^{-3}$$. Crucially, *per cubic metre*, not per mm³.\n- Step 3: $$q$$ is the charge carried by each individual carrier, in coulombs (C). For electrons, $$|q| = 1.60 \\times 10^{-19}\\,\\text{C}$$.\n- Step 4: $$v$$ is the drift velocity — the mean directed velocity of carriers along the wire — in $$\\text{m s}^{-1}$$.\n- Step 5: $$A$$ is the cross-sectional area of the conductor perpendicular to current flow, in $$\\text{m}^2$$.\n\nMnemonic: \"Naughty Quirky Vampires Ate\" → $$nqvA$$.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "Walk through the first-principles derivation of $$I = nqvA$$ using the swept-volume argument. (4 steps)", "answer": "- Step 1: Imagine a cylindrical slice of wire with cross-sectional area $$A$$. In a small time $$\\Delta t$$, every carrier drifts a distance $$\\Delta x = v\\,\\Delta t$$ along the wire. So the *volume* of conductor that flows past a fixed reference cross-section in that time is $$\\Delta V = A\\,\\Delta x = A v\\,\\Delta t$$.\n- Step 2: This volume contains carriers at density $$n$$. The number of carriers crossing the cross-section in $$\\Delta t$$ is $$\\Delta N = n\\,\\Delta V = nAv\\,\\Delta t$$.\n- Step 3: Each carrier carries charge $$q$$, so the total charge crossing the section is $$\\Delta Q = q\\,\\Delta N = nqvA\\,\\Delta t$$.\n- Step 4: Current is charge per unit time: $$I = \\dfrac{\\Delta Q}{\\Delta t} = nqvA$$.\n\nThe whole derivation is just \"how many carriers sweep past per second × the charge each one carries.\"", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "Why does the swept-volume derivation use the *drift* velocity $$v$$ rather than the thermal speed of the electrons (which is around $$10^6\\,\\text{m s}^{-1}$$)?", "answer": "- Step 1: Without an applied field, electrons in a metal move with very high thermal speeds (~10⁶ m/s) but in *random directions*. When you sum their velocity vectors, the contributions cancel — no preferred direction means no net charge transport across any cross-section.\n- Step 2: When a p.d. is applied, an electric field $$E$$ adds a small *directed* velocity component on top of the random motion. The thermal motion still averages to zero; only the directed component contributes to net flow past a cross-section.\n- Step 3: The drift velocity $$v$$ is precisely this small *net* component. So in $$\\Delta Q = nqvA\\,\\Delta t$$, only $$v$$ counts because the thermal contributions exactly cancel out over any reasonable time interval.\n\nTakeaway: current = the *bias* on top of random motion, not the random motion itself.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "Why do lamps appear to light up instantly when the switch is closed, even though the drift velocity of electrons in copper is well under 1 mm/s? (3 steps)", "answer": "- Step 1: Closing the switch establishes an *electric field* throughout the entire circuit. This field propagates along the wire at close to the speed of light, $$\\sim 3 \\times 10^{8}\\,\\text{m s}^{-1}$$ — for a 3 m circuit, the field reaches every electron in about 10 ns.\n- Step 2: Every free electron in the wire — including those already inside the filament — begins drifting almost simultaneously. The filament does not have to wait for an electron from the battery to physically arrive.\n- Step 3: Even though each electron creeps along at sub-mm/s, the number density $$n \\sim 1
