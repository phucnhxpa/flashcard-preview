<script>
const DATA={"selected": [{"question": "A copper wire of cross-section $$1\\,\\text{mm}^2$$ carries 10 A. With $$n \\approx 10^{29}\\,\\text{m}^{-3}$$ and $$q = 1.6 \\times 10^{-19}\\,\\text{C}$$, qualitatively estimate the drift velocity (in mm/s). Don't calculate — reason it. (3 steps)", "answer": "- Step 1: Rearrange: $$v = I/(nqA)$$. Plug in orders of magnitude: numerator is $$10^1$$; denominator is $$10^{29} \\times 10^{-19} \\times 10^{-6} = 10^{4}$$.\n- Step 2: So $$v \\sim 10^{1}/10^{4} = 10^{-3}\\,\\text{m s}^{-1}$$.\n- Step 3: That is about $$1\\,\\text{mm s}^{-1}$$. The numerical answer would be around $$0.6\\,\\text{mm s}^{-1}$$, but the key takeaway is the *order of magnitude*: a substantial 10 A current in a normal household-sized wire corresponds to a drift velocity below a millimetre per second. Slower than a snail.", "source": "Opus 4.7 ②", "_id": "opus_2_15"}, {"question": "In a copper wire carrying 0.25 A with cross-section 0.50 mm², calculate approximately how long it would take an electron to travel 3 m. Hence explain the \"instant-on\" paradox. (3 steps)", "answer": "- Step 1: First convert units: A = 0.50 mm² = 0.50 × 10⁻⁶ m² = 5.0 × 10⁻⁷ m². Using n = 8.5 × 10²⁸ m⁻³ and q = 1.6 × 10⁻¹⁹ C: v = I/(nqA) = 0.25 / (8.5 × 10²⁸ × 1.6 × 10⁻¹⁹ × 5.0 × 10⁻⁷) ≈ 3.7 × 10⁻⁵ m/s.\n- Step 2: Time to travel 3 m: t = distance/v = 3 / (3.7 × 10⁻⁵) ≈ 81,000 s ≈ 22 hours.\n- Step 3: Yet the lamp appears to light instantly. The explanation: the electric field propagates at c ≈ 3 × 10⁸ m/s, reaching the filament in t = L/c ≈ 3/3 × 10⁸ = 10 nanoseconds. The field causes all electrons to begin drifting simultaneously, so current flows immediately despite the slow drift of individual electrons.", "source": "MiniMax ②", "_id": "minimax_2_12"}, {"question": "Distinguish between the *random thermal speed* of free electrons in a metal and their *drift velocity*. Roughly how do their magnitudes compare? (3 steps)", "answer": "- Step 1: Thermal speed is the chaotic, undirected motion electrons have at any temperature above absolute zero. In a metal at room temperature it is roughly $$10^6\\,\\text{m s}^{-1}$$ — close to a thousandth of the speed of light.\n- Step 2: Drift velocity is the tiny *net* component superimposed on the thermal motion when an electric field is applied. It is what determines the current. In a typical copper wire it is around $$10^{-4}\\,\\text{m s}^{-1}$$ — fractions of a millimetre per second.\n- Step 3: The thermal speed is therefore roughly $$10^{10}$$ times larger than the drift speed. Picture a swarm of bees jittering wildly inside a slow-moving cloud: the jitter is thermal motion; the cloud's slow translation is the drift.", "source": "Opus 4.7 ②", "_id": "opus_2_3"}, {"question": "*Edge case:* Why doesn't simply increasing the area of a wire keep drift velocity arbitrarily low?", "answer": "- Step 1: At first glance, $$v = I/(nqA)$$ suggests bigger $$A$$ always means slower drift — true for *fixed current*.\n- Step 2: But in practice, if you make the wire much fatter (lower resistance), then for a given source voltage, $$I = V/R$$ goes *up*. So $$I$$ and $$A$$ both increase; the net effect on $$v$$ depends on which scales faster.\n- Step 3: For a wire connected to a fixed voltage source, $$R \\propto 1/A$$, so $$I \\propto A$$, and consequently $$v = I/(nqA)$$ becomes approximately *independent* of $$A$$. The drift velocity in a copper wire connected to a battery isn't really a property of the wire's thickness — it's set by the field along the wire, which depends on $$V/L$$.\n\nThis is a subtle but important point: drift velocity in a free wire is field-determined, not area-determined.", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "Two semiconductor strips have the same dimensions and carry the same current as a copper strip. Roughly how does the drift velocity in the semiconductor compare to that in the copper, and why? (3 steps)", "answer": "- Step 1: From $$v = I/(nqA)$$, with $$I$$, $$q$$, and $$A$$ fixed, drift velocity is inversely proportional to $$n$$: $$v \\propto 1/n$$.\n- Step 2: A semiconductor has roughly $$10^{9}$$ times fewer carriers per cubic metre than a metal. Therefore each carrier must drift roughly $$10^9$$ times *faster* to push the same total charge per second through the same area.\n- Step 3: So while a typical metal drift is $$\\sim 10^{-4}\\,\\text{m s}^{-1}$$, the semiconductor drift can easily reach $$\\sim 10^{-1}\\,\\text{m s}^{-1}$$ — fast enough that you could practically time it. Counterintuitive but correct: in the worse conductor, the few carriers it does have move *faster*.\n\nThe lesson: fewer workers means each must work harder.", "source": "Opus 4.7 ②", "_id": "opus_2_9"}, {"question": "Derive the transport equation I = nqvA from first principles using the swept-volume approach. (4 steps)", "answer": "- **Step 1: Consider a cylindrical section of conductor with cross-sectional area A**\n  Let charge carriers drift at average velocity v along the wire.\n- **Step 2: Volume swept in time Δt**\n  In time Δt, each carrier travels distance Δx = vΔt. The volume of wire that passes through a cross-section is:\n  ΔV = A × Δx = A v Δt\n- **Step 3: Number of carriers in that volume**\n  With n carriers per unit volume, the number crossing the section is:\n  ΔN = n ΔV = n A v Δt\n- **Step 4: Total charge and current**\n  If each carrier carries charge q, the total charge crossing is:\n  ΔQ = q ΔN = n A v q Δt\n  Since current I = ΔQ/Δt, we get:\n  **I = nqvA**\n\nThis shows current depends on how many carriers (n), how much charge each carries (q), how fast they move (v), and how thick the wire is (A).", "source": "MiniMax ①", "_id": "minimax_1_2"}, {"question": "Explain why heating a semiconductor increases its electrical conductivity, whereas heating a metal typically decreases it. (2 steps)", "answer": "- Step 1: In semiconductors, thermal energy frees more electrons from their atomic bonds, significantly increasing the number density n of charge carriers. Since I = nqvA, more carriers mean larger current for the same voltage, so conductivity increases with temperature.\n- Step 2: In metals, there are already abundant free electrons (high n), so increased temperature primarily increases the rate of collisions between electrons and ion lattice atoms. This increases resistance, reducing conductivity. The dominant effect in metals is increased scattering, not increased carrier density.", "source": "MiniMax ②", "_id": "minimax_2_19"}, {"question": "Why is it important to convert cross-sectional area to m² before substituting into I = nqvA? What is the correct conversion for a wire with diameter 0.5 mm? (2 steps)", "answer": "- **Why it matters:** The SI unit for n is m⁻³ (per cubic metre). If you leave area in mm², your units become inconsistent — you'd be mixing per mm² with per m³, giving an answer off by a factor of 10⁶ or 10¹².\n- **Conversion for d = 0.5 mm:**\n  Radius r = d/2 = 0.25 mm = 2.5 × 10⁻⁴ m\n  A = πr² = π × (2.5 × 10⁻⁴)² = π × 6.25 × 10⁻⁸ ≈ 1.96 × 10⁻⁷ m²\n  \n  Alternatively: 0.5 mm = 5 × 10⁻⁴ m\n  A = πd²/4 = π × (5 × 10⁻⁴)² / 4 = π × 2.5 × 10⁻⁷ / 4 ≈ 1.96 × 10⁻⁷ m²\n\nAlways convert diameter to metres first, then calculate area in m².", "source": "MiniMax ①", "_id": "minimax_1_19"}, {"question": "In a series circuit, a thin tungsten filament is joined to a thick copper lead. The same current flows through both. Without doing any calculation, in which section is the drift velocity larger, and why? (3 steps)", "answer": "- Step 1: Rearranging $$I = nqvA$$ gives $$v = \\dfrac{I}{nqA}$$. With $$I$$ fixed and $$q$$ identical (both carry electrons), $$v$$ depends on $$n$$ and $$A$$.\n- Step 2: The filament has both a smaller cross-section ($$A$$ tiny) *and* a smaller carrier density than copper ($$n_W \\approx 4 \\times 10^{28}$$ vs $$n_{Cu} \\approx 8 \\times 10^{28}\\,\\text{m}^{-3}$$). Both factors push $$v$$ *up* in the filament.\n- Step 3: So the drift velocity in the filament is far larger than in the copper leads — easily a thousandfold. Physically: the same number of carriers per second must squeeze through a much narrower, less-populated pipe, so each must drift much faster.\n\nThis is exactly why filaments get hot enough to glow while connecting wires stay cool — more frantic drifting means more collisions and more heat per unit volume.", "source": "Opus 4.7 ②", "_id": "opus_2_6"}, {"question": "*Conceptual probe:* Why does heating a metal *decrease* its drift velocity (for fixed current and geometry), while heating a semiconductor *also* decreases its drift velocity (for fixed current) — but for completely different reasons?", "answer": "- Step 1: In a metal, $$n$$ is fixed (free electrons are essentially temperature-independent at normal conditions). What changes with temperature is the collision rate: hotter lattice vibrates more, so electrons scatter more often. For a fixed current, you might think this raises $$v$$, but actually the *resistance* rises, so the current drops for a given p.d. — and with it $$v$$.\n- Step 2: In a semiconductor, $$n$$ is *strongly* temperature-dependent — heating frees more electrons. So for a fixed current, $$v = I/(nqA)$$ falls as $$n$$ rises.\n- Step 3: So in both cases, hotter material ⇒ slower drift for a fixed current, but via different mechanisms: metals via increased scattering (resistance up), semiconductors via increased carrier density. This contrast is the qualitative signature distinguishing the two.", "source": "Opus 4.7 ①", "_id": "opus_1_43"}, {"question": "Why do lamps light up instantly if drift velocity is ~10⁻⁴ m s⁻¹? (3 steps)", "answer": "- **Step 1:** The **electric field** that drives electrons propagates at ~speed of light ($ 3 \\times 10^8 \\, \\text{m s}^{-1} $).  \n- **Step 2:** All electrons in the wire start drifting **simultaneously** when the field is applied.  \n- **Step 3:** Even though each electron moves slowly ($ v \\sim \\text{mm/s} $), there are $ \\sim 10^{28} \\, \\text{m}^{-3} $ carriers. The total charge flow per second (current) is large enough to power the lamp.  \n\n*Marble-tube analogy:* Pushing a marble into a full tube instantly pops one out the other end, even if individual marbles only move slightly.  \n\n*Why this matters:* Distinguishes field propagation (fast) from carrier motion (slow).", "source": "Qwen 3 ②", "_id": "qwen_2_2"}, {"question": "Explain the \"marble-tube analogy\" and how it models the instant-on behavior of an electric circuit. (2 steps)", "answer": "- Step 1: Imagine a pipe completely filled with marbles. If you push one marble in at one end, a marble pops out the other end almost instantly, even though each individual marble barely moved.\n- Step 2: In a wire, the electrons are the marbles. Pushing an electron in at the switch causes the electromagnetic push (the field) to travel at near light-speed, pushing electrons out at the lamp instantly, despite the slow individual drift of each electron.", "source": "GLM 5.1 ②", "_id": "glm_2_7"}, {"question": "A student attempts to calculate drift velocity by first finding the time for one electron to travel the wire length, then using v = L/t. Why is this approach flawed? (2 steps)", "answer": "- **The flaw:** This method assumes a single electron travels the entire length. In reality, electrons don't travel in a straight line from one end to the other — they undergo millions of collisions with lattice ions.\n- **What really happens:** Each electron has a very small mean free path (distance between collisions). It drifts forward very slowly while constantly colliding and randomly changing direction. The \"drift velocity\" is the net result of many such collisions, not the motion of any single electron over the full length. The correct approach is to use v = I/(nqA), which gives the average velocity of the collective flow — not the path of an individual carrier.", "source": "MiniMax ①", "_id": "minimax_1_23"}, {"question": "Why can insulators not carry a meaningful current even with a very large applied voltage? Frame the answer using $$I = nqvA$$.", "answer": "- Step 1: In an insulator (glass, rubber, dry wood), nearly all electrons are tightly bound to their atoms — there are essentially no *free* charge carriers available to move. So $$n \\approx 0$$.\n- Step 2: From $$I = nqvA$$: if $$n = 0$$, then $$I = 0$$ regardless of how large $$v$$, $$q$$, or $$A$$ are. A huge field can in principle yank an electron loose (dielectric breakdown), but at normal voltages, there's simply nothing to push.\n- Step 3: This is *qualitatively different* from a poor conductor — a poor conductor has a small $$n$$ and a small but non-zero current; an insulator has effectively zero $$n$$ and zero current. That's why insulators are used to *block* current paths, not just slow them down.", "source": "Opus 4.7 ①", "_id": "opus_1_9"}, {"question": "*Edge case:* In the limit of an extremely thin nanowire, can drift velocity exceed the thermal speed of electrons? What might break down physically?", "answer": "- Step 1: From $$v = I/(nqA)$$, as $$A \\to 0$$, $$v$$ grows without bound for fixed $$I$$. Mathematically, you could push $$v$$ past thermal speeds (~10⁶ m/s).\n- Step 2: But physically, the framework assumes drift is a *small* bias on top of much larger random thermal motion — that's how steady-state drift emerges from the collision-dominated picture. Once $$v$$ approaches thermal speeds, the assumption breaks.\n- Step 3: In reality, before this regime, the wire would heat enormously (large $$I^2 R$$), melt, or hit other current-limiting effects (ballistic transport, quantum effects, electromigration). $$I = nqvA$$ is a macroscopic/semi-classical result; in nanowires you need a quantum-mechanical treatment.\n\nTakeaway: every macroscopic formula has a domain of validity — pushing it to extreme geometries reveals where it stops being physically meaningful.", "source": "Opus 4.7 ①", "_id": "opus_1_36"}, {"question": "Misconception probe: A student says \"Resistors store electrons.\" Why is this incorrect, and what do resistors actually do? (2 steps)", "answer": "- Step 1: Resistors do not store electrons; charge is conserved. The number of electrons entering a resistor per second equals the number leaving it (which is why current is constant in series).\n- Step 2: Instead, resistors convert electrical energy into heat. This happens because the drifting electrons collide with the lattice ions, transferring their kinetic energy to the lattice and increasing its thermal vibration.", "source": "GLM 5.1 ③", "_id": "glm_3_23"}, {"question": "Why does heating a semiconductor (like silicon) decrease its resistance, while heating a metal increases it? Frame the answer in terms of $$n$$ and the collision picture. (3 steps)", "answer": "- Step 1: In a semiconductor, almost all electrons start out bound. Adding thermal energy frees more electrons into the conduction band, so $$n$$ rises sharply with temperature. More carriers → lower resistance.\n- Step 2: In a metal, $$n$$ is already enormous and roughly fixed — every atom contributed its free electron long ago. Heating doesn't significantly increase $$n$$.\n- Step 3: But heating *does* make the lattice ions vibrate more vigorously, so free electrons collide with them more often. More scattering means more opposition, so resistance rises.\n\nThe two materials respond oppositely because *which factor dominates* differs: $$n$$ growth wins in semiconductors; collision rate growth wins in metals.", "source": "Opus 4.7 ②", "_id": "opus_2_10"}, {"question": "A student writes \"$$1\\,\\text{mm}^2 = 1 \\times 10^{-3}\\,\\text{m}^2$$\". What is wrong, and what is the correct conversion? (3 steps)", "answer": "- Step 1: The student converted millimetres to metres once and forgot the area involves *two* length factors. $$1\\,\\text{mm} = 10^{-3}\\,\\text{m}$$, but $$\\text{mm}^2$$ is mm × mm, so both factors must be squared.\n- Step 2: Correct conversion: $$1\\,\\text{mm}^2 = (10^{-3}\\,\\text{m})^2 = 10^{-6}\\,\\text{m}^2$$.\n- Step 3: The student's value is off by a factor of $$10^3$$. Substituting it into $$v = I/(nqA)$$ would underestimate $$v$$ by a factor of 1000. Always square the prefix when converting squared units (and cube for volumes: $$1\\,\\text{mm}^3 = 10^{-9}\\,\\text{m}^3$$).", "source": "Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "Why is the formula $$I = nqvA$$ called a \"transport equation,\" and what's the deeper microscopic story it tells?", "answer": "- Step 1: It's called a transport equation because it describes *how much of a quantity (charge) is transported* across a surface per unit time, in terms of the microscopic properties of the carriers doing the transporting.\n- Step 2: Reading it physically: in any small slab of wire, the current is the product of \"how many movers there are per volume\" ($$n$$), \"what each one carries\" ($$q$$), \"how fast on average they're going\" ($$v$$), and \"how wide the highway is\" ($$A$$).\n- Step 3: The same structural form crops up everywhere in physics — heat flux, mass flow, particle flux — wherever a microscopic carrier transports a quantity across a surface. It's the fundamental link between the microscopic (carriers and their motion) and the macroscopic (the bulk current you measure with an ammeter).", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "In a metal with no battery connected, the wire is \"full of electrons\" moving at thermal speeds of about $$10^6\\,\\text{m s}^{-1}$$. Why is there no current, and why doesn't touching the wire give you a shock? (3 steps)", "answer": "- Step 1: Without an applied potential difference, there is no electric field along the wire. The free electrons still move — and very fast — but their velocity vectors point in all directions essentially at random.\n- Step 2: When you sum a huge number of random velocities, the components cancel: the *average* velocity is zero. Since current depends on the *net* drift $$v$$ (not the random speed), $$I = nqvA = 0$$.\n- Step 3: With no net flow of charge, no charge accumulates on you and no energy is delivered, so you feel nothing.\n\nTakeaway: thermal motion gives speed but no direction; only a p.d. creates the tiny *directed* drift that we measure as current.", "source": "Opus 4.7 ②", "_id": "opus_2_2"}, {"question": "Two wires of the same length and material but different diameters are connected in *parallel* between the same two terminals. Does the *drift velocity* differ between them? (3 steps)", "answer": "- Step 1: In parallel, each wire sees the same potential difference, but they do *not* necessarily carry the same current. Current splits between branches by Ohm's law — the thicker wire (lower resistance) carries more current.\n- Step 2: The drift velocity in each is $$v = I_{\\text{branch}}/(nqA)$$. Both $$I$$ and $$A$$ differ between the branches.\n- Step 3: For wires of the same material and same length, you can show $$I \\propto A$$ (since $$R = \\rho L / A$$). So $$v = I/(nqA) \\propto A/A = $$ constant. The drift velocity is *the same* in both parallel branches — because the larger current in the thick wire is exactly proportional to its larger area. (Contrast with series, where $$I$$ is the same and $$v \\propto 1/A$$.)\n\nThis is a great example of why series-vs-parallel reasoning differs even when the formula is the same.", "source": "Opus 4.7 ②", "_id": "opus_2_26"}, {"question": "Why does the thin tungsten filament in a bulb develop a large potential difference across it compared to the thick copper leads? (3 steps)", "answer": "- Step 1: To maintain the same current in a series circuit, the thin filament requires a much higher drift velocity ($$v \\propto 1/A$$) compared to the thick leads.\n- Step 2: To accelerate the electrons to this higher drift velocity against frequent lattice collisions, a stronger electric field $$E$$ is needed within the filament.\n- Step 3: A stronger electric field over the length of the filament corresponds to a larger potential difference ($$V = E \\times \\text{length}$$). Thus, nearly all the battery's voltage drops across the filament, causing it to heat up and glow.", "source": "GLM 5.1 ③", "_id": "glm_3_21"}, {"question": "Why is the equation $$I = nqvA$$ sometimes called a \"microscopic\" expression for current, in contrast to $$I = Q/t$$?", "answer": "- Step 1: $$I = Q/t$$ is a macroscopic definition — it tells you what current *is* (charge per unit time crossing a surface) but not *how* the charge gets there. It's a measurement-level statement.\n- Step 2: $$I = nqvA$$ digs underneath: it expresses the same current in terms of the *microscopic* parameters of the material (carrier density, charge per carrier, drift velocity) and the geometry (area). It explains current as the product of carriers times their motion.\n- Step 3: The two are completely consistent: $$nqvA$$ over a time $$\\Delta t$$ gives a total charge $$\\Delta Q = nqvA \\Delta t$$, which divided by $$\\Delta t$$ returns the macroscopic $$I = Q/t$$. The transport equation is the bridge between the microscopic and macroscopic descriptions of current.", "source": "Opus 4.7 ①", "_id": "opus_1_42"}, {"question": "A copper wire is 3.0 m long, carries 0.25 A, and has cross-section 0.50 mm² (n = 8.5 × 10²⁸ m⁻³). Calculate how long it would take an electron to travel from the switch to the lamp. Why does the lamp still light instantly? (3 steps)", "answer": "- **Step 1: Calculate drift velocity**\n  A = 0.50 mm² = 5.0 × 10⁻⁷ m²\n  v = I/(nqA) = 0.25 / (8.5 × 10²⁸ × 1.6 × 10⁻¹⁹ × 5.0 × 10⁻⁷)\n  v ≈ 0.25 / (6.8 × 10³) ≈ 3.7 × 10⁻⁵ m s⁻¹\n- **Step 2: Calculate travel time**\n  t = L/v = 3.0 / (3.7 × 10⁻⁵) ≈ 81,000 s ≈ 22.5 hours\n- **Step 3: Why instant light?**\n  The electron takes almost a day to reach the lamp, yet it lights in microseconds. This is because the **electric field propagates at ~c = 3 × 10⁸ m s⁻¹**, reaching the filament in about t = L/c = 3/3 × 10⁸ = 10 nanoseconds. All electrons throughout the wire begin drifting simultaneously. The effect is instant; only the individual carriers are slow.", "source": "MiniMax ①", "_id": "minimax_1_13"}, {"question": "*Synthesis problem:* A copper wire (n ≈ 8 × 10²⁸ m⁻³) and a silicon wire (n ≈ 10¹⁷ m⁻³) have the *same* diameter and carry the *same* current. Without computing exact numbers, by what rough factor does the drift velocity in silicon exceed that in copper, and what is the practical consequence?", "answer": "- Step 1: Same $$I$$, same $$A$$, same $$q$$ — so $$v$$ scales as $$1/n$$. The ratio $$v_{Si}/v_{Cu} = n_{Cu}/n_{Si} \\sim 8 \\times 10^{28} / 10^{17} \\sim 10^{12}$$.\n- Step 2: That's a factor of about a trillion — silicon carriers would need to move trillions of times faster than copper carriers for the same current. In practice, this means silicon can't actually carry as much current as copper in the same geometry; the carriers can't drift fast enough.\n- Step 3: This is why silicon is used for *signals* and switches (where small currents suffice) and copper is used for *power* delivery (where you need to move lots of charge). The factor of $$10^{12}$$ in $$n$$ dictates the entire role each material plays in electronics.", "source": "Opus 4.7 ①", "_id": "opus_1_33"}, {"question": "Phuc asked: \"What's the difference between current $$I = Q/t$$ and power $$P = E/t$$ — they're both 'something per time'?\"", "answer": "- Step 1: They're both *rates*, but of different things. Current is the rate of *charge* flow (coulombs per second); power is the rate of *energy* transfer (joules per second).\n- Step 2: Taxi analogy: charges are like taxis travelling round the circuit. Current = how many taxis pass per second. Power = total energy (passengers) those taxis deliver per second.\n- Step 3: The link between them is voltage: $$V = E/Q$$ is the energy each taxi carries (joules per coulomb). So $$P = VI$$ — energy per taxi times taxis per second equals total energy delivered per second.\n\nBottom line: current measures the *flow*; power measures the *delivery rate of energy that flow is carrying*.", "source": "Opus 4.7 ①", "_id": "opus_1_20"}, {"question": "*Misconception probe:* A student claims \"more current means faster electrons in a metal wire\" — explain whether this is correct, and why it's a subtle point.", "answer": "- Step 1: It's correct in one specific sense and misleading in another. If we keep the wire (and hence $$n$$, $$q$$, $$A$$) fixed, then $$v = I/(nqA)$$ shows $$v \\propto I$$ — more current does mean faster *drift*.\n- Step 2: But \"fast\" here means tenths of a mm/s for low current vs maybe a few mm/s for high current — still absurdly slow. The thermal speed (~10⁶ m/s) doesn't change with current; only the small directed drift component does.\n- Step 3: The bigger misconception is that more current means more electrons are flowing, or that they suddenly travel near light speed. In a metal, the number of free electrons doesn't change — they just drift slightly faster. The field travels near c; the electrons themselves never get close to it.", "source": "Opus 4.7 ①", "_id": "opus_1_28"}, {"question": "Synthesis: A circuit has a 9 V battery driving 0.2 A through a series circuit consisting of a thin nichrome heating element and thick copper leads. Use $$I = nqvA$$ ideas to explain (a) why the heating element gets hot but the copper wires don't, and (b) why charge isn't \"consumed\" in the heating element. (3 steps)", "answer": "- Step 1: Continuity demands the same current through both — so the same number of electrons per second pass through the leads and the element. But the heating element has both a *smaller area* and (for nichrome vs copper) a smaller $$n$$, so its drift velocity is *much higher*. Faster drifting electrons collide more energetically and more often with the lattice, depositing more energy per unit volume per second.\n- Step 2: Most of the supplied potential difference drops across the heating element (since it has by far the highest resistance), so most of the energy delivered by the battery is dissipated there as heat. The copper leads see only a tiny voltage drop and dissipate little heat.\n- Step 3: Crucially, no electrons are *stored* or destroyed anywhere in the circuit. The same flux enters and exits each segment. What is consumed is *energy* — the battery's stored chemical energy is converted into kinetic energy of carriers, then into lattice heat at the resistive element. Charge is conserved; energy is transformed.", "source": "Opus 4.7 ②", "_id": "opus_2_38"}, {"question": "How and why does the carrier density $$n$$ of a semiconductor change with temperature, and what does this do to its drift velocity for a fixed current?", "answer": "- Step 1: In a semiconductor, electrons need a small amount of energy to escape their bonds and become free carriers. At low temperature, almost none have enough energy; at higher temperature, thermal energy promotes more electrons into the conduction band.\n- Step 2: So $$n$$ *increases* with temperature — the material becomes a better conductor as it heats up. (This is the opposite behaviour of metals, where heating increases lattice vibrations and slightly impedes drift.)\n- Step 3: For a fixed current $$I$$ and fixed geometry, $$v = I/(nqA)$$, so as $$n$$ rises, $$v$$ falls. Higher temperature ⇒ more carriers ⇒ each carrier needs to drift less quickly.\n\nPractical consequence: semiconductor resistance drops with temperature, which is why thermistors are useful temperature sensors and why semiconductor devices need careful thermal design.", "source": "Opus 4.7 ①", "_id": "opus_1_11"}, {"question": "Synthesis: Why is the equation $$I = nqvA$$ called a \"transport equation\", and why is the same structural form valid for current in a wire, ions in a solution, and even cars on a highway? (3 steps)", "answer": "- Step 1: The equation describes the *transport of something* through a cross-section, per unit time. In each case, the rate of flow equals (number of carriers per unit volume) × (amount carried by each) × (their drift velocity) × (the area they cross).\n- Step 2: For electrons in a wire: $$I = n e v A$$ (charge per second). For ions in an electrolyte: same form. For cars per second on a highway: (cars per cubic metre of road) × (charge or property per car = 1) × (average road speed) × (number of lanes × lane area). For molecules diffusing through a membrane: same form again.\n- Step 3: This structural universality reveals that any conserved quantity that flows through space obeys a transport equation of the form \"density × velocity × area × per-carrier amount = flux\". The transport equation isn't a quirk of electricity — it's a fundamental statement of how *anything* moves through a region of space.", "source": "Opus 4.7 ②", "_id": "opus_2_39"}, {"question": "A semiconductor strip 6 mm wide and 0.5 mm thick carries 10 mA, with $$n = 7 \\times 10^{22}\\,\\text{m}^{-3}$$. Roughly what's the drift velocity — closer to mm/s, cm/s, or m/s — and what does this tell you about semiconductors vs metals? (3 steps)", "answer": "- Step 1: $$A = 6 \\times 10^{-3} \\times 0.5 \\times 10^{-3} = 3 \\times 10^{-6}\\,\\text{m}^2$$. Denominator of $$v = I/(nqA)$$: $$7 \\times 10^{22} \\times 1.6 \\times 10^{-19} \\times 3 \\times 10^{-6} \\approx 3 \\times 10^{-2}$$.\n- Step 2: $$v \\approx 0.01 / 0.03 \\approx 0.3\\,\\text{m/s}$$ — that's metres per second, *not* mm/s.\n- Step 3: This is roughly 10⁴ times faster than drift in copper at the same current. Reason: $$n$$ is about a million times smaller in the semiconductor, so each carrier must work proportionately harder. Few carriers → fast carriers; many carriers → slow carriers.\n\nThis is the headline contrast between conductors and semiconductors: same equation, vastly different regimes of $$n$$ and $$v$$.", "source": "Opus 4.7 ①", "_id": "opus_1_31"}, {"question": "Why do lamps appear to light up instantly when the switch is closed, even though the drift velocity of electrons in copper is well under 1 mm/s? (3 steps)", "answer": "- Step 1: Closing the switch establishes an *electric field* throughout the entire circuit. This field propagates along the wire at close to the speed of light, $$\\sim 3 \\times 10^{8}\\,\\text{m s}^{-1}$$ — for a 3 m circuit, the field reaches every electron in about 10 ns.\n- Step 2: Every free electron in the wire — including those already inside the filament — begins drifting almost simultaneously. The filament does not have to wait for an electron from the battery to physically arrive.\n- Step 3: Even though each electron creeps along at sub-mm/s, the number density $$n \\sim 10^{28}\\,\\text{m}^{-3}$$ is enormous, so the *rate* of charge crossing the filament cross-section (which is what $$I = nqvA$$ measures) is large enough to heat it instantly.\n\nMarble-tube analogy: a tube already packed with marbles — push one in at one end, one pops out the other end immediately, even though no individual marble travelled the length of the tube.", "source": "Opus 4.7 ①", "_id": "opus_1_4"}, {"question": "In a series circuit, why does a narrower wire (same material/current) have a higher drift velocity? (2 steps)", "answer": "- **Step 1:** Rearrange $ I = n q v A $ for drift velocity:  \n  $$ v = \\frac{I}{n q A} $$  \n- **Step 2:** For constant $ I $, $ n $, and $ q $, $ v \\propto \\frac{1}{A} $. Smaller cross-sectional area $ A $ forces carriers to move faster to maintain the same current.  \n\n*Real-world example:* Thinner tungsten filament in a bulb has much higher $ v $ than thick copper leads, even with the same $ I $.  \n\n*Boundary case:* If $ A \\to 0 $, $ v \\to \\infty $ (impossible), but in reality, resistivity and material limits dominate.", "source": "Qwen 3 ②", "_id": "qwen_2_3"}, {"question": "Why is the drift velocity in a copper wire so absurdly slow (well under 1 mm/s for everyday currents), even though copper is an excellent conductor?", "answer": "- Step 1: Free electrons in copper are never in free flight for long — they collide constantly with the vibrating positive ions of the lattice. Each collision randomises the electron's motion, dissipating directed momentum as heat.\n- Step 2: Between collisions, the field $$E$$ accelerates them, but the time between collisions is very short, so they only pick up a tiny extra velocity before the next scatter. The *average* directed velocity (drift velocity) ends up extremely small.\n- Step 3: Despite this slowness, copper conducts well because there are so many carriers — $$n \\sim 10^{29}\\,\\text{m}^{-3}$$ — and $$I = nqvA$$ multiplies these. A tiny $$v$$ times an enormous $$n$$ still gives a substantial $$I$$.\n\nTakeaway: copper's superpower is the *number* of carriers, not their speed.", "source": "Opus 4.7 ①", "_id": "opus_1_12"}, {"question": "A copper wire ($$n_{Cu} \\approx 8 \\times 10^{28}$$) and a silicon strip ($$n_{Si} \\approx 10^{16}$$) have the same cross-sectional area and carry the same current. Without exact calculation, which has a faster drift velocity, and by roughly how many orders of magnitude? (2 steps)", "answer": "- Step 1: From $$v = \\frac{I}{nqA}$$, drift velocity is inversely proportional to $$n$$. Since $$I, q, A$$ are the same, the ratio of velocities is the inverse ratio of number densities: $$v_{Si} / v_{Cu} = n_{Cu} / n_{Si}$$.\n- Step 2: $$n_{Cu} / n_{Si} \\approx (8 \\times 10^{28}) / 10^{16} \\approx 10^{13}$$. The silicon has a drift velocity roughly 13 orders of magnitude (10 trillion times) faster than the copper.", "source": "GLM 5.1 ②", "_id": "glm_2_21"}, {"question": "Why doesn't an electron-by-electron picture (one electron leaves the battery → travels along the wire → arrives at the bulb) work for explaining how circuits light up quickly?", "answer": "- Step 1: At drift speeds of ~0.1 mm/s, an electron leaving the battery would take days to travel a metre. If circuits worked that way, switching on a lamp would mean waiting days.\n- Step 2: The wire is already *packed* with electrons everywhere — including inside the filament itself. The instant the field is applied (at near-c), every electron in the wire starts drifting in unison.\n- Step 3: So the filament starts heating because the electrons *already inside it* start moving, not because new ones travelled from the battery. The \"electron-by-electron travel\" picture is wrong; the correct picture is a synchronised, gradual shuffle of the whole electron population.\n\nThis is exactly the marble-tube analogy: pushing one marble in immediately ejects one at the far end — no marble travelled the whole length.", "source": "Opus 4.7 ①", "_id": "opus_1_27"}, {"question": "A wire has a non-uniform cross-section — wide at one end, narrow in the middle, wide at the other end. Sketch how the drift velocity varies along the wire, and explain.", "answer": "- Step 1: Charge is conserved, so the current $$I$$ is the same at every cross-section (no electrons piling up). Same material everywhere, so $$n$$ and $$q$$ are constant.\n- Step 2: Therefore $$v = I/(nqA) \\propto 1/A$$. Where the wire is wide, $$v$$ is small; where it narrows, $$v$$ ramps up; in the constriction, $$v$$ is maximum; then it drops back as the wire widens again.\n- Step 3: The profile is exactly like water flowing through a venturi tube — slow in the wide sections, fast through the narrow throat. The electrons accelerate into the constriction and decelerate out of it, while the average current stays the same throughout.\n\nThis is one of the most physically intuitive consequences of $$I = nqvA$$.", "source": "Opus 4.7 ①", "_id": "opus_1_32"}, {"question": "Why is the unit-prefix distinction between micro ($$\\mu$$) and milli (m) so easy to confuse, and what is the actual factor difference between them?", "answer": "- Step 1: They look similar in handwriting (especially $$\\mu$$ vs m), and they're both common in lab measurements (microamps, milliamps). It's tempting to misread or mis-write.\n- Step 2: But $$\\mu = 10^{-6}$$ and $$m = 10^{-3}$$ — a factor of **1000** apart. So $$1\\,\\mu\\text{A} = 10^{-6}\\,\\text{A}$$, while $$1\\,\\text{mA} = 10^{-3}\\,\\text{A}$$.\n- Step 3: In Phuc's lesson, treating $$1\\,\\mu\\text{A}$$ as $$10^{-3}\\,\\text{A}$$ inflated the current by 1000×, which would cascade into a 1000× error in drift velocity or electron count. Always write out the prefix table at the start of an exam to avoid this.", "source": "Opus 4.7 ①", "_id": "opus_1_14"}, {"question": "Why does the order of factors in $$I = nqvA$$ not matter, but the correct *value* of each factor (especially $$n$$ and $$A$$) is critical for getting the right answer? (3 steps)", "answer": "- Step 1: Multiplication is commutative — writing $$I = nAvq$$, $$I = nqvA$$, or $$I = qvAn$$ gives identical numerical results. The mnemonic order (e.g. \"naughty quirky vampires Ate\") is purely for memory.\n- Step 2: What *does* matter is using each quantity in SI base units with the correct magnitude. The factors span enormous ranges: $$n$$ can vary by $$10^{20}$$ between materials, while $$A$$ is typically squared from a small diameter — easy to get wrong by $$10^6$$.\n- Step 3: A factor-of-1000 slip in $$A$$ (mm² to m²) or a prefix slip in $$n$$ propagates linearly into $$v$$. Always: convert units first, substitute second, never mix prefixes mid-equation.", "source": "Opus 4.7 ②", "_id": "opus_2_17"}, {"question": "Why are the equations describing fluid flow in pipes (continuity equation $$A_1 v_1 = A_2 v_2$$) structurally identical to the constraint $$v \\propto 1/A$$ for current in a series wire? (3 steps)", "answer": "- Step 1: Both involve a *conserved quantity flowing through a varying cross-section*. For water, mass per second must be the same at every point (no water accumulates). For current, charge per second (= $$I$$) must be the same throughout a series loop (no charge accumulates either).\n- Step 2: For an incompressible fluid, mass flow rate = $$\\rho A v$$. If $$\\rho$$ is constant, then $$A v$$ is constant. For a wire with uniform material, $$I = nqAv$$. If $$n$$ and $$q$$ are constant, then $$Av$$ is constant.\n- Step 3: So both reduce to \"throughput $$\\propto Av$$, and throughput is fixed\". Narrower channel forces faster flow in both cases. The physics is fundamentally about conservation of carriers (or molecules) per unit time — the formulas just relabel the players.", "source": "Opus 4.7 ②", "_id": "opus_2_30"}, {"question": "*Synthesis problem:* A 0.25 A lamp is fed by a copper wire of cross-section 0.5 mm². The lamp is 3 m from the switch. Approximately how long would it take a single tagged electron to travel from switch to lamp, compared to the time for the field to do so?", "answer": "- Step 1: Drift velocity roughly $$v = I/(nqA) \\approx 0.25 / (8.5 \\times 10^{28} \\times 1.6 \\times 10^{-19} \\times 5 \\times 10^{-7})$$. Denominator: $$\\sim 7 \\times 10^{3}$$. So $$v \\sim 4 \\times 10^{-5}\\,\\text{m/s}$$.\n- Step 2: Time for electron to travel 3 m: $$t_e = L/v \\approx 3 / (4 \\times 10^{-5}) \\approx 8 \\times 10^{4}\\,\\text{s} \\approx 22\\,\\text{hours}$$.\n- Step 3: Time for the field: $$t_f = L/c \\approx 3 / (3 \\times 10^{8}) = 10^{-8}\\,\\text{s} = 10\\,\\text{ns}$$.\n- Step 4: Ratio: about $$10^{13}$$. The field is roughly ten trillion times faster than the carrier. That's why the lamp lights \"instantly\" even though the carriers themselves are slower than a snail.", "source": "Opus 4.7 ①", "_id": "opus_1_34"}, {"question": "In a series circuit, the current $$I$$ must be the same everywhere. Use $$I = nqvA$$ to explain why a narrower wire (same material) must have a *higher* drift velocity. (3 steps)", "answer": "- Step 1: Conservation of charge demands the same current at every cross-section — charge can't pile up or disappear. So $$I = nqvA$$ must give the same number on both sides.\n- Step 2: For the same material, $$n$$ and $$q$$ are fixed. Therefore $$vA$$ must be constant, meaning $$v \\propto 1/A$$.\n- Step 3: A narrower wire has smaller $$A$$, so the carriers must drift *faster* to push the same charge per second through the constricted region.\n\nWater-pipe analogy: water in a wide pipe flows slowly, but it speeds up dramatically where the pipe narrows — same volumetric flow rate, smaller area, faster speed.", "source": "Opus 4.7 ①", "_id": "opus_1_6"}, {"question": "Why is the marble-tube analogy \"exact\" for explaining the instant lighting of a lamp, while the \"domino chain\" analogy is sometimes considered weaker? (3 steps)", "answer": "- Step 1: In the marble-tube picture, the tube is *already full of marbles* before you push. The marble at the far end pops out almost immediately, even though each marble barely moved. This mirrors a wire that is *already filled with electrons* at all times — the carriers don't need to travel from the battery to the lamp.\n- Step 2: A domino chain emphasises the propagation of a *disturbance*, but each domino only moves once and then stops. In a wire, the electrons keep drifting continuously as long as the field is applied, just as marbles keep emerging continuously as long as you keep pushing. The marble model captures both the speed-of-field propagation *and* the steady-state current.\n- Step 3: The marble-tube also makes vivid that *no specific carrier needs to travel the whole distance* — what propagates fast is the field, while individual carriers shuffle locally. This is the central, often-missed point.", "source": "Opus 4.7 ②", "_id": "opus_2_27"}, {"question": "A torch filament (tungsten) and copper connecting leads carry the same current. The filament is hot and glows; the leads stay cool. Why is the filament where almost all the energy is dissipated, and how does this relate to drift velocity?", "answer": "- Step 1: From $$I = nqvA$$ with same $$I$$, the filament's much smaller $$A$$ (and smaller $$n$$ for tungsten) forces a much higher drift velocity — roughly 10³ times that in the leads.\n- Step 2: Higher drift velocity means electrons collide with the lattice much more violently and more often per unit length, dissipating more energy as heat per unit length. This is *resistive heating*.\n- Step 3: Effectively, almost all the p.d. of the battery drops across the filament (where the \"constriction\" is), so almost all the energy goes into heating it — hot enough to glow white. The leads barely dissipate anything because the drift is slow and gentle.\n\nThis is the water-pipe analogy with a vengeance: most of the pressure drop happens at the constriction, not along the wide pipe.", "source": "Opus 4.7 ①", "_id": "opus_1_22"}, {"question": "Why does heating a tungsten filament increase $$n$$ only slightly but increase the *resistance* of the filament substantially? (3 steps)", "answer": "- Step 1: Tungsten is a metal, so essentially all its outer electrons are already delocalised at room temperature. Heating frees barely any *additional* electrons — $$n$$ stays nearly constant.\n- Step 2: Heating, however, makes the lattice ions vibrate with much larger amplitude. The vibrating ions present a larger effective \"obstacle\" to drifting electrons, so collisions become more frequent.\n- Step 3: More frequent collisions reduce the achievable drift velocity at a given applied field, which means higher resistance. So in tungsten, the dominant effect is *lattice scattering*, not carrier-density change. In a semiconductor, the dominant effect is *carrier generation* — opposite sign.", "source": "Opus 4.7 ②", "_id": "opus_2_37"}, {"question": "Simple exercise: A copper wire has $$n = 10^{29}\\,\\text{m}^{-3}$$. To carry 10 A in a 1 mm² wire, the drift velocity is roughly 0.6 mm/s. If we instead use a wire of *the same area* made of silicon with $$n \\sim 10^{17}\\,\\text{m}^{-3}$$, roughly how would the drift velocity differ for the same 10 A? (3 steps)", "answer": "- Step 1: From $$v \\propto 1/n$$, replacing copper ($$10^{29}$$) with silicon ($$10^{17}$$) decreases $$n$$ by a factor of $$10^{12}$$.\n- Step 2: So the drift velocity must *increase* by a factor of $$10^{12}$$ to compensate. Starting from $$0.6\\,\\text{mm s}^{-1} = 6 \\times 10^{-4}\\,\\text{m s}^{-1}$$, we'd get $$\\sim 6 \\times 10^8\\,\\text{m s}^{-1}$$.\n- Step 3: This is *faster than the speed of light* — physically impossible. The correct conclusion is that silicon simply *cannot* carry 10 A through a 1 mm² cross-section at room temperature. It would either need to be heated to vastly increase $$n$$, or the cross-section would need to be enormous, or a much smaller current attempted. This is why insulators and pure semiconductors are poor at carrying large currents.\n\nA wonderful illustration of how the transport equation reveals physical impossibility.", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "*Misconception probe:* \"Resistors store electrons, which is why current is reduced.\" Why is this wrong?", "answer": "- Step 1: Electrons are not stored or consumed in a resistor — by Kirchhoff's current law, exactly as many electrons enter one end per second as leave the other end. The current is the *same* on both sides of a resistor.\n- Step 2: What the resistor does is convert *electrical energy* into *heat*. Electrons collide with the dense lattice ions of the resistive material more frequently, transferring kinetic energy to lattice vibrations.\n- Step 3: The voltage drop across a resistor reflects the energy lost per coulomb, not a loss of charge. The carriers themselves pass straight through — they just emerge with less energy than they had on entry.", "source": "Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "Mnemonic for must-remember benchmarks: list the order-of-magnitude values you should know cold for copper drift-velocity problems.", "answer": "- Step 1: Copper number density: $$n_{Cu} \\sim 8 \\times 10^{28}\\,\\text{m}^{-3}$$ — roughly one free electron per atom.\n- Step 2: Electron charge: $$|q_e| = 1.6 \\times 10^{-19}\\,\\text{C}$$.\n- Step 3: Typical drift velocity for copper at amp-scale currents in mm²-scale wires: $$\\sim 10^{-4}\\,\\text{m/s}$$, i.e. sub-mm/s.\n- Step 4: Field propagation speed: $$c \\approx 3 \\times 10^{8}\\,\\text{m/s}$$ — ten orders of magnitude faster than drift.\n- Step 5: Carrier density contrasts: semiconductors $$\\sim 10^{16}$$–$$10^{19}\\,\\text{m}^{-3}$$; insulators $$\\approx 0$$.\n\nThese five numbers let you sanity-check almost any drift-velocity calculation.", "source": "Opus 4.7 ①", "_id": "opus_1_44"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "In a metallic conductor, what particles act as the charge carriers, and how does this differ from an electrolyte or gas? (2 steps)", "answer": "- Step 1: In a metallic conductor, the charge carriers are free (delocalised) electrons. These are outer-shell electrons that have detached from their atoms and can move freely throughout the metal lattice.\n+ In electrolytes and gases, the charge carriers are positive and/or negative ions (whole atoms or molecules that have lost or gained electrons).\n- Step 2: The key difference is the nature of the mobile particle. Electrons are single, tiny subatomic particles with a fixed charge ($$q = -1.6 \\times 10^{-19}$$ C), while ions are much heavier and can carry multiple units of charge (e.g., $$q = +2e$$ for a doubly charged ion).", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "A piece of copper wire sitting on a table is full of free electrons moving at thermal speeds of around $$10^6$$ m/s. Why does this wire not produce an electric current or shock you when you touch it? (2 steps)", "answer": "- Step 1: While the electrons are moving incredibly fast, their motion is entirely random in all directions. At any instant, for every electron moving left, there is approximately one moving right, one moving up, one moving down, etc.\n- Step 2: An electric current requires a *net* flow of charge in a specific direction. Because the random velocities cancel out perfectly over the cross-section, the average (net) drift velocity is zero. Without a potential difference to align the drift, there is no net current—just chaotic thermal motion.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "Define \"drift velocity\" and explain why it is so much slower than the thermal speed of electrons in a metal. (3 steps)", "answer": "- Step 1: Drift velocity is the average velocity of charge carriers along the conductor when a potential difference is applied. It is the slow, net directional movement superimposed on the fast random motion.\n- Step 2: When a p.d. is applied, an electric field $$E$$ exerts a force $$F = eE$$ on the electrons, causing them to accelerate in one direction.\n- Step 3: However, the electrons constantly collide with the positive ion lattice. These collisions reset their directed velocity, so the acceleration only happens for a very short time between collisions. The result is a very slow, constant average drift rather than a continuous acceleration.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "Derive the transport equation $$I = nqvA$$ from first principles using the concept of a \"swept volume.\" (5 steps)", "answer": "- Step 1: Imagine a reference cross-section of the wire with area $$A$$. In a time interval $$\\Delta t$$, charge carriers with drift velocity $$v$$ move a distance $$\\Delta x = v \\Delta t$$.\n- Step 2: The volume of wire that \"sweeps\" past the reference cross-section in this time is a cylinder: $$\\Delta V = A \\times \\Delta x = A v \\Delta t$$.\n- Step 3: The number of charge carriers in this swept volume is the number density $$n$$ multiplied by the volume: $$\\Delta N = n \\times \\Delta V = n A v \\Delta t$$.\n- Step 4: The total charge that crosses the section is the number of carriers multiplied by the charge per carrier $$q$$: $$\\Delta Q = q \\times \\Delta N = n q A v \\Delta t$$.\n- Step 5: Current is charge per unit time, so divide by $$\\Delta t$$: $$I = \\frac{\\Delta Q}{\\Delta t} = \\frac{n q A v \\Delta t}{\\Delta t} = nqvA$$.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "In the derivation of $$I = nqvA$$, the term $$A v \\Delta t$$ represents the \"swept volume.\" Physically, what does this volume represent in the context of the wire? (2 steps)", "answer": "- Step 1: It represents the exact section of the wire's interior that passes by a fixed point (or cross-section) during the time interval $$\\Delta t$$.\n- Step 2: Because the carriers are moving at drift velocity $$v$$, any carrier within this cylindrical volume of length $$v \\Delta t$$ will cross the reference plane before the time $$\\Delta t$$ is over. Carriers outside this volume are too far back and won't make it across in time.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "If the drift velocity of electrons in a copper wire is only about $$10^{-4}$$ m/s (slower than a snail), why does a lamp turn on almost instantly when you flip the switch? (3 steps)", "answer": "- Step 1: The electrons themselves do not need to travel from the switch to the lamp. The wire is already packed tightly with free electrons, like a pipe completely filled with marbles.\n- Step 2: When the switch is closed, the electric field is established along the entire wire at approximately the speed of light ($$c \\approx 3 \\times 10^8$$ m/s).\n- Step 3: This field causes *all* the electrons in the wire to start drifting almost simultaneously. The electrons at the filament begin moving immediately, pushing the \"marble chain\" along, so the lamp lights up in nanoseconds, not hours.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "Explain the \"marble-tube analogy\" and how it resolves the paradox of slow drift velocity but instantaneous current. (2 steps)", "answer": "- Step 1: Imagine a pipe completely filled with marbles. If you push one marble in at one end, a marble at the far end pops out almost instantly, even though each individual marble only shifted a tiny distance.\n- Step 2: In a wire, the \"marbles\" are the free electrons. The push you apply at one end is analogous to the electric field propagating at near light-speed. The effect (current) is transmitted instantly, while the individual carriers (marbles/electrons) move very slowly.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "A light bulb has a very thin tungsten filament connected by thick copper leads. The current is the same everywhere in the circuit. How does the drift velocity in the filament compare to the drift velocity in the leads, and why? (3 steps)", "answer": "- Step 1: According to the transport equation, $$v = \\frac{I}{nqA}$$. Since the current $$I$$ is the same everywhere in series, and the charge $$q$$ is constant, the drift velocity depends inversely on the product of number density $$n$$ and cross-sectional area $$A$$.\n- Step 2: The filament has a much smaller cross-sectional area ($$A_{filament} \\ll A_{leads}$$). Even though tungsten's $$n$$ is slightly lower than copper's, the massive reduction in $$A$$ dominates the equation.\n- Step 3: To maintain the same current through a much narrower \"pipe,\" the electrons must drift much faster. Therefore, $$v_{filament} \\gg v_{leads}$$. This is analogous to water speeding up when you put your finger over the end of a tap.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "If the cross-sectional area of a wire is reduced by a factor of 4 while the current and material stay the same, what happens to the drift velocity of the charge carriers? (2 steps)", "answer": "- Step 1: Rearranging the transport equation gives $$v = \\frac{I}{nqA}$$. For a constant current $$I$$, constant charge $$q$$, and same material (constant $$n$$), drift velocity is inversely proportional to area: $$v \\propto \\frac{1}{A}$$.\n- Step 2: If the area is quartered ($$A \\to A/4$$), the drift velocity must increase by a factor of 4 to maintain the same current. The carriers must speed up to squeeze the same amount of charge through a narrower space.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "What is the primary physical quantity that distinguishes a metal from a semiconductor and an insulator in terms of their ability to conduct electricity? (2 steps)", "answer": "- Step 1: The primary quantity is the number density of free charge carriers, $$n$$.\n+ Metals have a very high $$n$$ (e.g., $$\\sim 10^{28}$$ to $$10^{29}$$ m⁻³).\n+ Semiconductors have a much lower $$n$$ (e.g., $$\\sim 10^{16}$$ to $$10^{19}$$ m⁻³).\n+ Insulators have virtually no free carriers ($$n \\approx 0$$).\n- Step 2: Since $$I = nqvA$$, a higher $$n$$ means more charge carriers are available to move, resulting in much greater conductivity for the same applied field, area, and drift velocity.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "For the same current and cross-sectional area, how does the drift velocity in a semiconductor compare to that in a metal, and why? (2 steps)", "answer": "- Step 1: From $$v = \\frac{I}{nqA}$$, if $$I$$ and $$A$$ are held constant, the drift velocity $$v$$ is inversely proportional to the number density $$n$$.\n- Step 2: Because a semiconductor has a much smaller $$n$$ than a metal (by a factor of around $$10^9$$), the few available carriers must drift much faster to carry the same current. Thus, drift velocity in a semiconductor is much higher than in a metal for the same conditions.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "How does increasing the temperature of a pure semiconductor affect its number density $$n$$ and, consequently, its drift velocity (assuming the current is kept constant)? (3 steps)", "answer": "- Step 1: In a semiconductor, increasing the temperature provides thermal energy that frees more electrons from their atoms, increasing the number of free charge carriers.\n- Step 2: Therefore, the number density $$n$$ increases with temperature.\n- Step 3: Since $$v = \\frac{I}{nqA}$$ and $$n$$ has increased, the drift velocity $$v$$ must decrease to maintain the same current. (This is also why resistance decreases in semiconductors as they heat up).", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "A wire has a cross-sectional area given as 2 mm². What is the correct way to convert this to m², and what is a common exam trap? (2 steps)", "answer": "- Step 1: The correct conversion uses the fact that 1 mm = $$10^{-3}$$ m. Since area is length squared, 1 mm² = $$(10^{-3} \\text{ m})^2 = 10^{-6} \\text{ m}^2$$. So, 2 mm² = $$2 \\times 10^{-6} \\text{ m}^2$$.\n- Step 2: The common exam trap is to treat \"milli\" as just $$10^{-3}$$ for area, leading to the incorrect answer $$2 \\times 10^{-3} \\text{ m}^2$$. You must square the prefix conversion factor when dealing with area units.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "What is the numerical multiplier for the prefix \"micro\" ($$\\mu$$), and how is it commonly confused with \"milli\" (m) in exams? (2 steps)", "answer": "- Step 1: \"Micro\" ($$\\mu$$) represents $$10^{-6}$$ (one millionth), whereas \"milli\" (m) represents $$10^{-3}$$ (one thousandth).\n- Step 2: A common exam trap is writing $$\\mu A = 10^{-3}$$ A instead of $$10^{-6}$$ A. This mistake makes the calculated current 1000 times larger than it actually is. Remember: micro has 6 zeros, milli has 3 zeros.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "If a question accidentally gives the number density of charge carriers as $$n$$ per mm³, how do you convert it to the standard SI unit of m⁻³? (2 steps)", "answer": "- Step 1: 1 mm = $$10^{-3}$$ m, so 1 mm³ = $$(10^{-3} \\text{ m})^3 = 10^{-9} \\text{ m}^3$$.\n- Step 2: Therefore, 1 carrier per mm³ is equivalent to $$10^9$$ carriers per m³. You must multiply the given value by $$10^9$$ to get the correct $$n$$ in m⁻³.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "A copper wire has a number density $$n \\approx 10^{29}$$ m⁻³ and carries a current of 1.6 A. The cross-sectional area is 1 mm². Estimate the order of magnitude of the drift velocity. (Use $$q = 1.6 \\times 10^{-19}$$ C). (3 steps)", "answer": "- Step 1: First, convert the area to m²: 1 mm² = $$10^{-6}$$ m².\n- Step 2: Set up the equation: $$v = \\frac{I}{nqA} = \\frac{1.6}{10^{29} \\times 1.6 \\times 10^{-19} \\times 10^{-6}}$$.\n- Step 3: Simplify the numbers: $$\\frac{1.6}{1.6} = 1$$. Simplify the powers of 10 in the denominator: $$10^{29} \\times 10^{-19} \\times 10^{-6} = 10^{4}$$. So $$v = \\frac{1}{10^4} = 10^{-4}$$ m/s. The order of magnitude is $$10^{-4}$$ m/s.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "Two wires of the same material are connected in series. Wire X has diameter $$d$$, and Wire Y has diameter $$2d$$. Find the ratio of their drift velocities, $$v_X : v_Y$$. (3 steps)", "answer": "- Step 1: In a series circuit, the current $$I$$ is the same through both wires. The material is the same, so $$n$$ and $$q$$ are identical. Thus, $$v \\propto \\frac{1}{A}$$.\n- Step 2: Calculate the area ratio. $$A_X = \\pi(d/2)^2 = \\frac{\\pi d^2}{4}$$. $$A_Y = \\pi(2d/2)^2 = \\pi d^2$$. The ratio of areas is $$A_X : A_Y = 1 : 4$$.\n- Step 3: Since $$v \\propto 1/A$$, the ratio of velocities is the inverse of the area ratio: $$v_X : v_Y = 4 : 1$$.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "A wire carries a current of 40 mA. Express this current in Amperes (A) using standard form. (1 step)", "answer": "- Step 1: The prefix \"milli\" (m) means $$10^{-3}$$. Therefore, 40 mA = $$40 \\times 10^{-3}$$ A, which is 0.040 A.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "In a metal wire, electrons drift towards the positive terminal. In what direction does the conventional current flow, and why? (2 steps)", "answer": "- Step 1: Conventional current is defined as the direction in which positive charge would flow. It flows from the positive terminal to the negative terminal externally.\n- Step 2: Because electrons are negatively charged, they drift in the opposite direction to the conventional current. Therefore, the electron drift is opposite to the direction of conventional current.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "Using the transport equation $$I = nqvA$$, explain why an insulator cannot carry a significant current even if a very large potential difference is applied. (2 steps)", "answer": "- Step 1: In an insulator, the number density of free charge carriers is virtually zero ($$n \\approx 0$$).\n- Step 2: Looking at the equation $$I = nqvA$$, if $$n = 0$$, then $$I = 0$$ regardless of how large the drift velocity $$v$$ or area $$A$$ becomes. There are simply no free carriers available to move and carry the current.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}], "count": 20}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "What particles act as the mobile charge carriers in (a) metals, (b) electrolytes and gases, and (c) semiconductors?", "answer": "- Step 1: In **metals**, the charge carriers are free (delocalised) electrons — roughly one per atom — that detach from the outer shell and roam the lattice.\n- Step 2: In **electrolytes and gases**, the charge carriers are **ions** — atoms or molecules that have gained or lost electrons, giving them a net positive or negative charge.\n- Step 3: In **semiconductors** (like silicon), the carriers are a much smaller number of free **electrons** and \"holes\" (the absence of an electron, which acts like a positive charge carrier).", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "A piece of metal wire sits on a table, not connected to any circuit. Is it full of free electrons? If so, why is there no electric current, and why don't you get a shock touching it? (2 steps)", "answer": "- Step 1: Yes, the metal is packed with free electrons (number density $$n \\sim 10^{28} \\text{ m}^{-3}$$). However, without an applied potential difference (p.d.), there is no electric field to push them in a single direction.\n- Step 2: The electrons move randomly at high thermal speeds ($$\\sim 10^6 \\text{ m/s}$$), but their motions cancel out in all directions, resulting in zero net flow (no current). To get a shock, a net charge must flow through your body to the ground; since there is no net drift, no charge flows.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "In a metal with no applied voltage, free electrons move at thermal speeds of $$\\sim 10^6 \\text{ m/s}$$. When a battery is connected, the drift velocity is only $$\\sim 10^{-4} \\text{ m/s}$$. Why is the drift velocity so much slower than the thermal speed? (2 steps)", "answer": "- Step 1: The applied electric field exerts a force on the electrons, causing them to accelerate in one direction.\n- Step 2: However, they constantly collide with the positive ion lattice. These collisions reset their directed velocity, limiting the net displacement to a tiny average drift superimposed on top of their fast, chaotic random motion. The drift is just a slight bias in one direction.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "Define the quantity 'number density' ($$n$$) and state its SI unit. What is the approximate order of magnitude of $$n$$ for a typical metal like copper?", "answer": "Number density is the number of free charge carriers per unit volume of the material. Its SI unit is $$\\text{m}^{-3}$$ (carriers per cubic metre). For a typical metal like copper, $$n$$ is very large, on the order of $$10^{28}$$ to $$10^{29} \\text{ m}^{-3}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "Derive the transport equation $$I = nqvA$$ from first principles by considering the volume swept by charge carriers in time $$\\Delta t$$. (4 steps)", "answer": "- Step 1: Consider a wire with cross-sectional area $$A$$. In time $$\\Delta t$$, carriers moving at drift velocity $$v$$ travel a distance $$\\Delta x = v\\Delta t$$. The volume of wire that passes through a cross-section is the \"swept volume\": $$\\Delta V = A \\Delta x = Av\\Delta t$$.\n- Step 2: The number of carriers in this swept volume is the number density times the volume: $$\\Delta N = n \\Delta V = nAv\\Delta t$$.\n- Step 3: Each carrier has charge $$q$$, so the total charge crossing the section is $$\\Delta Q = q \\Delta N = nqAv\\Delta t$$.\n- Step 4: Current is charge per unit time: $$I = \\frac{\\Delta Q}{\\Delta t} = \\frac{nqAv\\Delta t}{\\Delta t} = nqvA$$.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "In the derivation of $$I = nqvA$$, what does the term $$Av\\Delta t$$ physically represent?", "answer": "It represents the **swept volume** of the conductor — the cylindrical region of length $$v\\Delta t$$ and cross-section $$A$$ that contains exactly all the charge carriers that will cross a reference plane in time $$\\Delta t$$. It translates the linear motion of the carriers ($$v\\Delta t$$) into a volumetric measure ($$Av\\Delta t$$) so we can multiply by the number density $$n$$ to count the carriers.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "If electrons drift at a snail's pace ($$\\sim 0.1 \\text{ mm/s}$$), why does a lamp light up almost instantly when the switch is closed? (2 steps)", "answer": "- Step 1: The electric field (electromagnetic signal) propagates through the wire at nearly the speed of light ($$\\sim 3 \\times 10^8 \\text{ m/s}$$).\n- Step 2: This field reaches all electrons in the circuit almost simultaneously, causing them all to start drifting at once. The lamp lights up as soon as the electrons in the filament begin moving, not when electrons from the battery physically arrive at the lamp.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "Explain the \"marble-tube analogy\" and how it models the instant-on behavior of an electric circuit. (2 steps)", "answer": "- Step 1: Imagine a pipe completely filled with marbles. If you push one marble in at one end, a marble pops out the other end almost instantly, even though each individual marble barely moved.\n- Step 2: In a wire, the electrons are the marbles. Pushing an electron in at the switch causes the electromagnetic push (the field) to travel at near light-speed, pushing electrons out at the lamp instantly, despite the slow individual drift of each electron.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": true}, {"question": "A wire consists of a thick section and a thin section in series. The same current $$I$$ flows through both. How does the drift velocity in the thin section compare to the thick section, and why? (2 steps)", "answer": "- Step 1: Current is constant in a series circuit (conservation of charge). Rearranging $$I = nqvA$$ gives $$v = \\frac{I}{nqA}$$.\n- Step 2: For the same material ($$n$$) and same current ($$I$$), drift velocity $$v$$ is inversely proportional to area $$A$$ ($$v \\propto 1/A$$). Therefore, the thinner section (smaller $$A$$) must have a higher drift velocity to carry the same current.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "A light bulb has a very thin tungsten filament connected by thick copper leads. The same current flows through both. Why is the drift velocity much faster in the filament than in the leads? (2 steps)", "answer": "- Step 1: From $$v = \\frac{I}{nqA}$$, drift velocity depends inversely on both number density $$n$$ and cross-sectional area $$A$$.\n- Step 2: The filament has a much smaller cross-sectional area ($$A$$) than the leads. Additionally, tungsten has a slightly lower $$n$$ than copper. Both factors (smaller $$A$$ and smaller $$n$$) force the drift velocity to be significantly higher in the filament to maintain the same current $$I$$.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "For a wire of the same dimensions carrying the same current, why do charge carriers in a semiconductor drift much faster than in a metal? (2 steps)", "answer": "- Step 1: In $$v = \\frac{I}{nqA}$$, for the same $$I$$, $$q$$, and $$A$$, drift velocity $$v$$ is inversely proportional to number density $$n$$.\n- Step 2: Semiconductors have a much smaller number density ($$n \\sim 10^{16}\\text{–}10^{19} \\text{ m}^{-3}$$) compared to metals ($$n \\sim 10^{28}\\text{–}10^{29} \\text{ m}^{-3}$$). With far fewer carriers available, each carrier must move much faster to transport the same amount of charge per second.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "How does increasing the temperature of a pure semiconductor affect its number density $$n$$, and how does this change the drift velocity if the current is kept constant? (2 steps)", "answer": "- Step 1: Heating a semiconductor frees more electrons from their atoms, significantly increasing the number density $$n$$ of free charge carriers.\n- Step 2: Since $$v = \\frac{I}{nqA}$$, if $$n$$ increases and the current $$I$$ is kept the same, the drift velocity $$v$$ must decrease. (This also lowers resistance, which is why semiconductors have a negative temperature coefficient of resistance).", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "Why can't an insulator carry a significant current even if a very large potential difference is applied across it?", "answer": "In the transport equation $$I = nqvA$$, an insulator has a number density $$n \\approx 0$$ (virtually no free charge carriers). Regardless of the applied voltage (which might increase $$v$$) or the cross-sectional area $$A$$, if there are no carriers to move ($$n=0$$), the current $$I$$ remains zero. You cannot transport charge without charge carriers.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "A wire has a cross-sectional area of $$2 \\text{ mm}^2$$. A student substitutes this as $$2 \\times 10^{-3} \\text{ m}^2$$ into $$I = nqvA$$. Identify the error and provide the correct conversion. (2 steps)", "answer": "- Step 1: The error is treating $$\\text{mm}^2$$ as a linear millimetre. The conversion factor must be squared because area is a two-dimensional quantity.\n- Step 2: $$1 \\text{ mm} = 10^{-3} \\text{ m}$$, so $$1 \\text{ mm}^2 = (10^{-3} \\text{ m})^2 = 10^{-6} \\text{ m}^2$$. Therefore, $$2 \\text{ mm}^2 = 2 \\times 10^{-6} \\text{ m}^2$$, not $$2 \\times 10^{-3} \\text{ m}^2$$.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "A student calculates a current as $$40 \\mu\\text{A}$$ and writes it as $$40 \\times 10^{-3} \\text{ A}$$ for substitution. Identify the mistake and correct it.", "answer": "The student confused the prefix \"micro\" ($$\\mu$$) with \"milli\" (m). Milli means $$10^{-3}$$, but micro means $$10^{-6}$$. The correct substitution is $$40 \\times 10^{-6} \\text{ A}$$. A helpful memory hook is: micro is six zeros ($$10^{-6}$$), milli is three zeros ($$10^{-3}$$).", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "A data sheet states the carrier density of copper is $$8 \\times 10^{28} \\text{ m}^{-3}$$. A student mistakenly thinks this means $$8 \\times 10^{28}$$ carriers per cubic millimetre. Why is this a massive error?", "answer": "The unit is per cubic **metre**, not per cubic millimetre. There are $$10^9$$ cubic millimetres in a cubic metre. If the number were per $$\\text{mm}^3$$, the number per $$\\text{m}^3$$ would be $$10^9$$ times larger. $$8 \\times 10^{28} \\text{ m}^{-3}$$ is the correct density per full cubic metre; using it as $$\\text{mm}^{-3}$$ would underestimate the carrier count by a factor of a billion.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "Wire X has diameter $$d$$ and wire Y has diameter $$2d$$. They are made of the same material and carry the same current. Find the ratio of their drift velocities $$v_X : v_Y$$. (2 steps)", "answer": "- Step 1: Area $$A = \\frac{\\pi d^2}{4}$$. If diameter doubles, area increases by a factor of 4. So $$A_Y = 4A_X$$.\n- Step 2: Since $$v = \\frac{I}{nqA}$$ and $$I, n, q$$ are the same, $$v \\propto \\frac{1}{A}$$. The smaller wire has the faster drift. Therefore, $$v_X / v_Y = A_Y / A_X = 4$$. The ratio is 4:1.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "Estimate the order of magnitude of drift velocity for a $$1 \\text{ A}$$ current in a $$1 \\text{ mm}^2$$ copper wire. Given: $$n \\approx 10^{29} \\text{ m}^{-3}$$, $$q \\approx 1.6 \\times 10^{-19} \\text{ C}$$, $$A \\approx 10^{-6} \\text{ m}^2$$. (3 steps)", "answer": "- Step 1: Write the formula: $$v = \\frac{I}{nqA}$$.\n- Step 2: Substitute the orders of magnitude: $$v \\approx \\frac{1}{10^{29} \\times (1.6 \\times 10^{-19}) \\times 10^{-6}} = \\frac{1}{1.6 \\times 10^4}$$.\n- Step 3: Calculate the order: $$\\frac{1}{1.6 \\times 10^4} \\approx 0.6 \\times 10^{-4} \\text{ m/s}$$. The order of magnitude is $$10^{-4} \\text{ m/s}$$ (a fraction of a millimetre per second).", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "In a metallic conductor, electrons drift towards the positive terminal of the battery. How does this relate to the direction of conventional current?", "answer": "Conventional current is defined as the direction positive charges would move. Since electrons are negative, they drift in the opposite direction to conventional current. If electrons drift left, conventional current flows right. They are always opposite in a metal.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "In a metal, the charge per carrier is $$q = 1.6 \\times 10^{-19} \\text{ C}$$ (one electron). In an electrolyte, what might the charge per carrier be?", "answer": "In electrolytes, charge carriers are ions. A singly charged ion (like $$\\text{Na}^+$$ or $$\\text{Cl}^-$$) carries a charge of $$1.6 \\times 10^{-19} \\text{ C}$$. A doubly charged ion (like $$\\text{Ca}^{2+}$$ or $$\\text{SO}_4^{2-}$$) carries a charge of $$2 \\times 1.6 \\times 10^{-19} \\text{ C} = 3.2 \\times 10^{-19} \\text{ C}$$. So $$q$$ can be integer multiples of the elementary charge.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "In a vacuum (like a cathode ray tube), electrons travel at very high speeds ($$10^7 \\text{ m/s}$$) with no lattice to collide with. Does the equation $$I = nqvA$$ still apply? How is the drift concept different here? (2 steps)", "answer": "- Step 1: Yes, the transport equation $$I = nqvA$$ still applies because it is just a statement of charge conservation (how much charge crosses an area per second).\n- Step 2: However, the concept of \"drift\" is different. There are no collisions to limit the velocity, so the electrons accelerate continuously under the electric field. The $$v$$ in the equation is their actual instantaneous velocity, not a slow average drift superimposed on random motion.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "A copper wire ($$n_{Cu} \\approx 8 \\times 10^{28}$$) and a silicon strip ($$n_{Si} \\approx 10^{16}$$) have the same cross-sectional area and carry the same current. Without exact calculation, which has a faster drift velocity, and by roughly how many orders of magnitude? (2 steps)", "answer": "- Step 1: From $$v = \\frac{I}{nqA}$$, drift velocity is inversely proportional to $$n$$. Since $$I, q, A$$ are the same, the ratio of velocities is the inverse ratio of number densities: $$v_{Si} / v_{Cu} = n_{Cu} / n_{Si}$$.\n- Step 2: $$n_{Cu} / n_{Si} \\approx (8 \\times 10^{28}) / 10^{16} \\approx 10^{13}$$. The silicon has a drift velocity roughly 13 orders of magnitude (10 trillion times) faster than the copper.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": true}, {"question": "Using $$I = nqvA$$, explain why metals are excellent conductors despite having extremely slow drift velocities.", "answer": "Metals have a huge number density $$n$$ ($$\\sim 10^{28} \\text{ m}^{-3}$$). In the equation $$I = nqvA$$, even if $$v$$ is tiny ($$\\sim 10^{-4} \\text{ m/s}$$), multiplying by a massive $$n$$ results in a substantial current $$I$$. The sheer number of available carriers compensates for their slow speed, allowing significant charge flow per second.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}], "count": 23}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "In a metallic conductor like copper, what specific particles act as the charge carriers, and where do they come from? (2 steps)", "answer": "- Step 1: In metals, the charge carriers are free (delocalised) electrons. \n- Step 2: These electrons come from the outermost shells of the metal atoms. When the atoms bond into a metallic lattice, these outer electrons detach, leaving the rest of the atom as a fixed positive ion. On average, there is approximately one free electron per atom.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "If metals use electrons as charge carriers, what acts as the charge carrier in electrolytes and gases?", "answer": "In electrolytes and gases, the charge carriers are ions—atoms or molecules that have gained or lost electrons and therefore carry a net positive or negative charge. For example, in an electrolyte, positive ions drift toward the negative terminal and negative ions drift toward the positive terminal.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pic
