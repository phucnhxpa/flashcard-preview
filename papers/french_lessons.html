lez-vous ?**", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Why does \"I’m Vietnamese\" use **Je suis** (être) instead of **J’ai** (avoir)? Explain the logic of \"state of being\" vs \"possession.\" (3 steps)", "answer": "- Step 1: **Être** (to be) describes identity or origin, e.g., nationality.  \n- Step 2: **Avoir** (to have) describes possession or age.  \n- Step 3: **Je suis vietnamien(ne)** = \"I am Vietnamese\" (state of being); **J’ai 24 ans** = \"I have 24 years\" (possession metaphor).  \n+ Misconception check: Why not **J’ai vietnamien**? \"To have\" implies ownership, which doesn’t apply to identity.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": true}, {"question": "In French, how do you ask \"Where are you from?\" and respond with \"I’m from Vietnam\"? Include the prepositions. (3 steps)", "answer": "- Step 1: **Tu viens d'où ?** = \"You come from where?\" (D'où = de + où).  \n- Step 2: Respond with **Je suis de + [country]**.  \n- Step 3: **Je suis de Vietnam.**  \n+ Example: Je suis de France = I’m from France.  \n+ Note: \"De\" contracts to **d'** before vowels (e.g., **Je suis d'Italie**).", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "What’s the difference between **Bonjour** and **Salut** in terms of formality and usage? Provide examples. (3 steps)", "answer": "- Step 1: **Bonjour** is formal/polite (used in shops, with strangers).  \n- Step 2: **Salut** is informal (greetings among friends, goodbye).  \n- Step 3: **Coucou** is very casual, like \"Hey!\" (used only with close friends).  \n+ Examples:  \n  - Bonjour, madame = Hello, ma’am.  \n  - Salut ! À demain = Hi! See you tomorrow.  \n  - Coucou, ça va ? = Hey! How are you?", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "Why is the final consonant in French often silent? Explain with examples like **un café** vs **un café avec une amie**. (3 steps)", "answer": "- Step 1: Final consonants are silent unless followed by a vowel sound (liaison).  \n- Step 2: **un café** = /œ̃ kaˈfe/ (n is silent).  \n- Step 3: In **un café avec une amie**, the \"n\" in **un** links to **amie**: /œ̃ kaˈfe aˈvɛk z‿aˈmi/ (liaison).  \n+ Example: **les amis** = /le za'mi/ (s is pronounced as /z/ before a vowel).  \n+ Rule: Plural -s is never pronounced; plural is shown only by the article (les, des).", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "How do you form the feminine of nouns ending in -é, like **un café**? What is the general rule for gender based on endings? (3 steps)", "answer": "- Step 1: Words ending in **-é** are masculine (un café, un thé).  \n- Step 2: Feminine form: **une cafetière** (coffee machine — from -ette rule).  \n- Step 3: General gender rules:  \n  - **-ette** = feminine (une omelette).  \n  - **-é** = masculine (un café).  \n  - Animals default to masculine if unsure.  \n+ Exception: **une victime** (feminine) but ends in -e.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "Why does **\"C'est beau\"** use the masculine form even if the noun is feminine (e.g., **c'est une belle femme**)? Explain the exception. (3 steps)", "answer": "- Step 1: **C’est** is a neutral subject (it/this/that).  \n- Step 2: Adjectives after **c’est** stay masculine **unless describing a person**.  \n- Step 3: **C’est une femme belle** = \"It is a beautiful woman\" (adjective agrees with **femme**).  \n+ Common mistake: Why not **C’est belle**? Because **c’est** is neutral unless describing a person.  \n+ Example: **C’est bien** (It’s good) vs **C’est un bon livre** (It’s a good book).", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "When would you use **partitive articles** (du, de la, des) instead of indefinite articles (un, une, des)? Give examples like **du café** vs **un café**. (3 steps)", "answer": "- Step 1: Partitive articles (du/de la/des) = \"some\" for uncountable nouns (food, liquids).  \n- Step 2: Indefinite articles (un/une/des) = \"a/an/some\" for countable nouns.  \n- Step 3:  \n  - **Je bois du café** = I drink (some) coffee (uncountable).  \n  - **Je veux un café** = I want a coffee (countable, one cup).  \n+ Misconception check: Why not **un café** in **Je bois un café**? \"Drink coffee\" is uncountable.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": true}, {"question": "How do you negate **\"J’ai une réservation\"** to say \"I don’t have a reservation\"? Explain the structure **ne...pas** and the article change. (3 steps)", "answer": "- Step 1: Wrap the verb with **ne...pas**: **Je n’ai pas une réservation**.  \n- Step 2: In the negative, **un/une/des** become **pas de** (or **pas d’** before vowels).  \n- Step 3: Final sentence: **Je n’ai pas de réservation.**  \n+ Example: **Il y a des croissants** → **Il n’y a pas de croissants.**  \n+ Note: **Pas de** avoids repetition of the noun’s gender.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "Conjugate **avoir** in the present tense. What is the pattern for nous/vous compared to je/tu/il? (3 steps)", "answer": "- Step 1: Base forms: **j’ai, tu as, il/elle/on a**.  \n- Step 2: **Nous avons** (add -ons to root **av-**).  \n- Step 3: **Vous avez** (add -ez to root **av-**), **ils/elles ont** (add -ont to root **av-**).  \n+ Pattern: First three persons are irregular; last three follow -ons/-ez/-ont.  \n+ Example: **Nous avons un chat** = We have a cat.", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "Why is **être** used in **\"La réunion est finie\"** instead of **avoir**? Explain the adjective agreement rule. (3 steps)", "answer": "- Step 1: **Être** is used for identity, location, and states (e.g., being finished).  \n- Step 2: The adjective **finie** agrees with **réunion** (feminine singular).  \n- Step 3: **La réunion est finie** = \"The meeting is finished.\"  \n+ Compare: **La réunion a une fin** = \"The meeting has an end.\"  \n+ Rule: Adjectives agree in gender/number with the noun they describe.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}, {"question": "What is the difference between **il y a** and **il n’y a pas de**? Form sentences with **des croissants** and **pas de tarte**. (3 steps)", "answer": "- Step 1: **Il y a** = \"there is/are\" (positive).  \n- Step 2: **Il n’y a pas de** = \"there is/are no\" (negative).  \n- Step 3:  \n  - **Il y a des croissants** = There are (some) croissants.  \n  - **Il n’y a pas de tarte** = There is no pie.  \n+ Note: Prepositions: **de** after **pas** replaces the original article.", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": false}, {"question": "How do you choose between **on** and **nous** in casual vs formal contexts? Give examples for ordering food and making plans. (3 steps)", "answer": "- Step 1: **On** is informal (used in speech; conjugates like il/elle).  \n- Step 2: **Nous** is formal (used in writing or formal speech).  \n- Step 3:  \n  - **On va prendre une pizza** = We’ll have a pizza (casual).  \n  - **Nous allons prendre une pizza** = We are going to have a pizza (formal).  \n+ Example: **On a faim** = We’re hungry (spoken).", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "Why is 70 **soixante-dix** in French? Explain the base-20 system in numbers 70–99. (3 steps)", "answer": "- Step 1: French uses a base-20 (vigesimal) system for 70–99.  \n- Step 2: **70 = 60 + 10** → **soixante-dix**.  \n- Step 3: **80 = 4×20** → **quatre-vingts**; **90 = 80 + 10** → **quatre-vingt-dix**.  \n+ Compare: 60 = **soixante** (60), 100 = **cent** (100).  \n+ Mnemonic: Think of 70 as \"60 + 10\" and 90 as \"80 + 10.\"", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": false}, {"question": "What is the correct way to say \"I would like the hamburger\"? Explain the phrases **Je voudrais**, **Je pourrais**, and **Je vais prendre**. (3 steps)", "answer": "- Step 1: **Je voudrais** (conditional) = \"I would like\" (polite request).  \n- Step 2: **Je pourrais** (conditional) = \"I could\" (less common for ordering).  \n- Step 3: **Je vais prendre** (near future) = \"I’m going to take\" (common in casual speech).  \n+ Example: **Je voudrais un café** = I would like a coffee.  \n+ Note: **Je vais prendre le hamburger** is more direct.", "source": "Qwen 3 ②", "_id": "qwen_2_15", "judge_pick": false}, {"question": "How do you ask \"What’s in…?\" to inquire about ingredients? Provide an example with **une entrecôte saignante**. (3 steps)", "answer": "- Step 1: Use **Qu’est-ce qu’il y a dans… ?** = \"What is there in…?\"  \n- Step 2: Replace **il y a** with **il y a dans** for \"in.\"  \n- Step 3: Example: **Qu’est-ce qu’il y a dans l’entrecôte saignante ?** = What’s in the rare steak?  \n+ Alternate phrasing: **Qu’est-ce que c’est comme plat ?** = What kind of dish is it?", "source": "Qwen 3 ②", "_id": "qwen_2_16", "judge_pick": false}, {"question": "Why is **une carafe d’eau** correct but **un carafe** incorrect? Explain adjective agreement with gender markers. (3 steps)", "answer": "- Step 1: **Carafe** ends in -e but is feminine (une carafe).  \n- Step 2: Adjective **pleine** agrees: **une carafe pleine** (not *plein*).  \n- Step 3: Gender determined by noun ending, not the article.  \n+ Compare: **un café** (masculine) → **un café froid**; **une carafe** → **une carafe pleine**.  \n+ Exception: **un problème** (masculine) ends in -e.", "source": "Qwen 3 ②", "_id": "qwen_2_17", "judge_pick": false}], "count": 18}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "What is the informal way to ask \"What is your name?\" in French? (1 step)", "answer": "**Comment tu t'appelles ?** This uses the informal \"tu\" (you). Note that \"t'appelles\" is the verb \"s'appeler\" conjugated for \"tu\" — the double \"l\" is pronounced like a \"y\" sound (like in \"yes\"), not like two separate L's. The formal version would be \"Comment vous appelez-vous ?\"", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "In French, how do you ask someone \"How old are you?\" and how would a 24-year-old respond? (2 steps)", "answer": "- Step 1: The question is **Quel âge as-tu ?** — notice French uses the verb AVOIR (to have), not \"to be\" as in English. The literal translation is \"What age do you have?\"\n\n- Step 2: The answer would be **J'ai 24 ans** (\"I have 24 years\"). The word \"ans\" (years) is always plural, even if you have just one year — you'd say \"j'ai un an.\"\n\nThis is a classic example of a *false friend* in thinking: English uses \"to be\" for age, French uses \"to have.\"", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": true}, {"question": "How do you ask \"Where are you from?\" and \"Where do you live?\" in informal French? (2 steps)", "answer": "- Step 1: **Tu viens d'où ?** = \"Where are you from?\" The verb \"venir\" means \"to come,\" so \"venir de\" = \"to come from.\" The d' drops the d before a vowel: \"d'où\" (from where).\n\n- Step 2: **Tu habites où ?** = \"Where do you live?\" The verb \"habiter\" means \"to live\" (as in residence). A full answer might be \"J'habite à Paris, en France\" — note that cities typically take \"à\" and countries take \"à\" (if feminine: \"en France\" because France is feminine) or \"au\" (if masculine).", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "What are three ways to say \"hello\" in French, and when would you use each? (2 steps)", "answer": "- Step 1: **Bonjour** — the standard, polite greeting used almost any time of day. This is the safe choice with strangers, in shops, with elders.\n\n- Step 2: **Salut** — informal \"hi,\" used among friends and peers. It also means \"bye\" when leaving. **Coucou** — very casual, like \"hey!\" among close friends or family. It's considered cutesy/playful.\n\nThe rule of thumb: default to **Bonjour** until invited to be informal.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "How do you ask \"How are you?\" in French, and what are typical responses? (2 steps)", "answer": "- Step 1: **Ça va ?** is the most common informal way to ask \"How are things?\" (literally \"It goes?\"). The more formal version is **Comment vas-tu ?** or **Comment allez-vous ?**\n\n- Step 2: Typical responses: **Ça va.** (I'm fine.) / **Très bien, et toi ?** (Very well, and you?) / **Ça va bien, merci.** (It goes well, thank you.) A less enthusiastic response might be **Ça peut aller.** (It goes / It's okay.)", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": true}, {"question": "What is the key French pronunciation rule about final consonants? (2 steps)", "answer": "- Step 1: **Final consonants are usually SILENT.** For example: \"petit\" (small) is pronounced \"puh-TEE\" — the final T is silent. \"grand\" (big) is pronounced \"grahn\" — the D is silent.\n\n- Step 2: **EXCEPTION: When the next word starts with a vowel, the final consonant \"links\" (liaison) and is pronounced.** For example: \"les amis\" (the friends) is pronounced \"lay-zah-MEE\" — the S links to the vowel. This is why hearing the plural -s in French can be tricky: you must listen to what follows, not just the noun itself.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "Is the plural -s on French nouns pronounced? How do you know if a noun is plural? (1 step)", "answer": "**No, the plural -s is NOT pronounced.** For example: \"un croissant\" (a croissant) vs \"des croissants\" (some croissants) — both sound identical in the noun itself. You know a noun is plural from the **article** that precedes it: \"des\" (the plural indefinite article) or \"les\" (the definite article plural), not from the sound of the noun.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "Name three pronunciation traps in French numbers that trip up beginners. (2 steps)", "answer": "- Step 1: **14 quatorze** — pronounced \"katorz\" (the Q is hard, like \"k,\" not like \"kw\"), not \"kwor-tiz.\"\n\n- Step 2: **60 soixante** — pronounced \"swa-sont\" (the final T is silent), and **70 soixante-dix** — literally \"sixty-ten\" (60+10), pronounced \"swa-son-DEESS.\" This is because French didn't historically have unique words for 70-99 in many regions — they build on 60.\n\n+ **Additional trap:** 80 is \"quatre-vingts\" (four twenties), 90 is \"quatre-vingt-dix\" (four twenties + ten).", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "What is the gender rule for French nouns ending in -ette and -é? (1 step)", "answer": "- **Words ending in -ette are usually feminine:** une omelette, une carafe, une basket (sneaker), une chanson (song — wait, actually -son is a different ending!).\n\n- **Words ending in -é are usually masculine:** un café, un thé, unrosé (rosé wine), unillé (island).\n\nThis is a helpful pattern but NOT a 100% rule — it's a strong tendency. Always check with the article (un/une) when learning a new word.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "What do you use after \"c'est\" — masculine or feminine adjective? What about \"il est\" vs \"elle est\"? (2 steps)", "answer": "- Step 1: After **\"c'est\"** (it is / this is), the adjective is **ALWAYS masculine**: \"C'est beau\" (It's beautiful), not \"*c'est belle.\" This is because \"c'est\" treats the noun as a general thing, taking the default masculine form.\n\n- Step 2: After **\"il est\"** or **\"elle est\"** (he is / she is), the adjective **AGREES** with the gender of the pronoun: \"Elle est belle\" (She is beautiful), \"Il est beau\" (He is beautiful).", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "If you don't know the gender of a French animal word, what should you default to? (1 step)", "answer": "**Default to masculine (un).** For example, if you forget whether it's \"un araignée\" or \"une araignée\" (spider), use the masculine form. This follows the general French pattern that the masculine form is the \"default\" or \"base\" form. However, if you know the animal is specifically female, you would use \"une\": \"une chatte\" (a female cat).", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "What are the three definite articles in French (the) for singular and plural? (1 step)", "answer": "**le** (masculine singular) — le café\n**la** (feminine singular) — la table\n**les** (plural, any gender) — les cafés, les tables\n\nNote: Before a vowel, le and la become **l'**: l'arbre (the tree), l'eau (the water). This is called \"élision.\"", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "What are the three indefinite articles in French (a/an/some)? (1 step)", "answer": "**un** (masculine singular) — un café\n**une** (feminine singular) — une table\n**des** (plural, any gender) — des cafés, des tables\n\nThese correspond to English \"a,\" \"an,\" or \"some\" before plural nouns.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "What are the partitive articles in French, and when do you use them? (2 steps)", "answer": "- Step 1: **du** (masculine), **de la** (feminine), **des** (plural) — these mean \"some\" and are used with **uncountable** or mass nouns: du café (some coffee), de la crème (some cream), des légumes (some vegetables).\n\n- Step 2: You use partitives when talking about an unspecific amount of something you can't easily count: \"Je mange du saumon\" (I'm eating some salmon), \"Je bois de l'eau\" (I'm drinking water). Compare: \"un café\" (a cup of coffee — countable) vs \"du café\" (some coffee — the substance).", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "In French negation, what happens to un/une/des and du/de la when you make a sentence negative? (2 steps)", "answer": "- Step 1: When you negate a sentence with \"ne...pas,\" the indefinite articles **un/une/des** and partitive articles **du/de la** ALL become **\"pas de\"** (or **\"pas d'\"** before a vowel).\n\n- Step 2: Examples:\n  - \"J'ai un café\" → \"Je n'ai **pas de** café\" (I don't have a coffee)\n  - \"Je bois du lait\" → \"Je ne bois **pas de** lait\" (I don't drink milk)\n  - \"Il y a des croissants\" → \"Il n'y a **pas de** croissants\" (There are no croissants)\n  - \"Elle mange de la salade\" → \"Elle ne mange **pas de** salade\" (She doesn't eat salad)", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "What is the structure of French negation, and when does \"ne\" become \"n'\"? (2 steps)", "answer": "- Step 1: French negation \"wraps\" the verb: **ne + verb + pas**. You place \"ne\" before the verb and \"pas\" after it: \"Je **ne** suis **pas** content.\" (I'm not happy.)\n\n- Step 2: When the verb starts with a **vowel sound**, \"ne\" becomes **\"n'\"** — this is called élision: \"Je **n'**ai **pas**\" (I don't have), \"Il **n'**est **pas**\" (He isn't), \"Ils **n'**ont **pas**\" (They don't have). Note: it's the SOUND that matters, not the letter — \"h\" can be silent or aspirated.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "Negate this sentence: \"Je suis à Paris.\" (1 step)", "answer": "**Je ne suis pas à Paris.** The structure is straightforward: add \"ne\" before \"suis\" and \"pas\" after it. No change to \"à Paris\" — the preposition stays.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "How do you say \"No, I don't have a reservation\" in French? (1 step)", "answer": "**Non, je n'ai pas de réservation.** Note: the \"de\" comes from the negative transformation of \"une réservation\" → \"pas de réservation.\" This is a very useful phrase for restaurant situations.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "Conjugate the verb AVOIR (to have) in the present tense, affirmative and negative. (2 steps)", "answer": "- Step 1: **Affirmative:**\n  - j'ai (I have)\n  - tu as (you have)\n  - il/elle/on a (he/she/one has)\n  - nous avons (we have)\n  - vous avez (you have — formal or plural)\n  - ils/elles ont (they have)\n\n- Step 2: **Negative (ne...pas):**\n  - je n'ai pas\n  - tu n'as pas\n  - il/elle/on n'a pas\n  - nous n'avons pas\n  - vous n'avez pas\n  - ils/elles n'ont pas\n\n+ **Memory tip:** The tricky part is \"avez\" (you have) vs \"avons\" (we have) — they're easily confused! Also: \"on a\" sounds exactly like \"on est\" (we are) when spoken quickly — context tells them apart.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "Why is \"AVOIR\" used in \"J'ai 24 ans\" (I'm 24 years old) instead of \"ÊTRE\"? (1 step)", "answer": "This is a **French idiom** — French uses \"avoir\" (to have) for age, not \"être\" (to be). English says \"I am 24 years old\" (using \"to be\"), but French says \"I have 24 years\" (j'ai vingt-quatre ans). This is one of several French expressions that use \"avoir\": avoir faim (to be hungry), avoir chaud (to be hot), avoir raison (to be right).", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "Conjugate the verb ÊTRE (to be) in the present tense, affirmative and negative. (2 steps)", "answer": "- Step 1: **Affirmative:**\n  - je suis (I am)\n  - tu es (you are)\n  - il/elle/on est (he/she/one is)\n  - nous sommes (we are)\n  - vous êtes (you are — formal or plural)\n  - ils/elles sont (they are)\n\n- Step 2: **Negative (ne...pas):**\n  - je ne suis pas\n  - tu n'es pas\n  - il/elle/on n'est pas\n  - nous ne sommes pas\n  - vous n'êtes pas\n  - ils/elles ne sont pas\n\n+ **Memory trick:** \"Nous sommes\" (we are) has the same root as \"sommeil\" (sleep) — maybe think: \"We are... sleeping\"? Or remember \"sommes\" sounds a bit like \"some\" — \"some of us are...\"", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "Explain adjective agreement with the example \"La réunion est urgente\" vs \"Le dossier est urgent.\" (2 steps)", "answer": "- Step 1: In **\"La réunion est urgente,\"** \"réunion\" (meeting) is a **feminine noun**, so the adjective \"urgente\" takes the feminine form with -e.\n\n- Step 2: In **\"Le dossier est urgent,\"** \"dossier\" (file/folder) is a **masculine noun**, so \"urgent\" stays in the masculine form (no -e).\n\nThe general rule: adjectives agree in gender and number with the noun they describe. Feminine singular = add -e. Masculine plural = add -s (or -x for some adjectives).", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "How do you say \"I'm sorry\" (masculine) and \"I'm late\" in French? (1 step)", "answer": "**Je suis désolé !** (I'm sorry) — \"désolé\" is masculine. If a woman were apologizing, she'd say **\"Je suis désolée !\"** (with -e). \n\n**\"I'm late\"** = **Je suis en retard.** Note: \"retard\" (delay) doesn't change because it follows \"en\" — prepositions often \"block\" adjective agreement in French.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": true}, {"question": "How do you say \"there is / there are\" and \"there is not / there are not\" in French? (2 steps)", "answer": "- Step 1: **Il y a** = there is / there are (can be singular or plural). Example: \"Il y a des croissants\" (There are some croissants).\n\n- Step 2: **Il n'y a pas de** = there is not / there are not (negative). Example: \"Il n'y a pas de tarte\" (There is no tart). Notice the \"de\" appears in the negative — it's essentially \"pas de\" (no) after \"il y a.\"", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "What is the difference between \"on\" and \"nous\" for \"we\" in French? (2 steps)", "answer": "- Step 1: **on** = informal \"we\" used in everyday spoken French. It takes the **same verb form as il/elle** (third person singular): \"on a\" (we have), \"on est\" (we are), \"on va\" (we go). This is extremely common in casual conversation.\n\n- Step 2: **nous** = formal \"we\" used in writing and formal speech. It takes its own conjugation: \"nous avons,\" \"nous sommes,\" \"nous allons.\" In real spoken French, \"on\" is far more common than \"nous\" — you'll hear \"on va au cinéma\" constantly, rarely \"nous allons.\"", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "Spell out the numbers 17, 18, 19, and 21 in French, noting any special patterns. (2 steps)", "answer": "- Step 1: **17 dix-sept** (10+7), **18 dix-huit** (10+8), **19 dix-neuf** (10+9) — these build on 10.\n\n- Step 2: **21 vingt-et-un** — note the special \"et\" (and) for 21. This pattern continues for 31, 41, 51, 61, 71: \"trente-et-un,\" \"quarante-et-un,\" etc. BUT for 22, 23, 28, etc., you simply combine without \"et\": vingt-deux, vingt-trois, vingt-huit.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "How do you say 70, 71, and 72 in French? Explain why. (2 steps)", "answer": "- Step 1: **70 soixante-dix** (60 + 10), **71 soixante-et-onze** (60 + 11), **72 soixante-douze** (60 + 12). French doesn't have a unique word for 70 — it's literally \"sixty-ten,\" \"sixty-eleven,\" etc.\n\n- Step 2: This comes from historical French counting systems. In parts of Switzerland and Belgium, they use \"septante\" (70), \"octante\" or \"huitante\" (80), and \"nonante\" (90), but the French (Paris) system uses the base-60 inherited from the old French numbering system.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "How do you say 80, 81, 90, and 91 in French? (2 steps)", "answer": "- Step 1: **80 quatre-vingts** (4 × 20) — note the -s on \"vingts\" when it stands alone. **81 quatre-vingt-un** (no -s because \"un\" follows).\n\n- Step 2: **90 quatre-vingt-dix** (4 × 20 + 10), **91 quatre-vingt-onze**. The pattern follows: 80 and 90 build on ×20 because of the old French vigesimal (base-20) system — think \"score\" as in \"four score and seven years ago.\"", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "What are the French words for yesterday, today, and tomorrow? (1 step)", "answer": "**hier** = yesterday\n**aujourd'hui** = today (literally \"on the day of today\")\n**demain** = tomorrow\n\nThese are essential time markers for narration and scheduling. Combined with the 24-hour clock, you can pinpoint any time: \"aujourd'hui à 14h\" = today at 2pm.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "Explain how \"quel\" agrees with nouns, with examples. (2 steps)", "answer": "- Step 1: **quel** is a question word meaning \"which\" or \"what,\" and it must **agree with the noun it modifies**:\n\n- quel (masc. sing.): Quel café ? (Which coffee?)\n- quelle (fem. sing.): Quelle heure ? (What time?)\n- quels (masc. pl.): Quels plats ? (Which dishes?)\n- quelles (fem. pl.): Quelles salles ? (Which rooms?)\n\n- Step 2: Example: **À quelle heure ?** (At what time?) — \"heure\" is feminine, so \"quelle\" is feminine. **Quel âge as-tu ?** (How old are you?) — \"âge\" is masculine, so \"quel\" is masculine.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "How do you make an order at a café/restaurant using \"Je voudrais,\" \"Je pourrais,\" and \"Je vais prendre\"? (2 steps)", "answer": "- Step 1: **Je voudrais…** = I would like… (polite, very common)\n  - \"Je voudrais un café, s'il vous plaît.\"\n\n- Step 2: **Je pourrais avoir… ?** = Could I have…? (slightly more tentative)\n  - \"Je pourrais avoir l'addition, s'il vous plaît?\"\n\n- **Je vais prendre…** = I'm going to have… (the future tense, sounds like a firm decision)\n  - \"Je vais prendre le saumon grillé.\"\n\n+ All three are appropriate in restaurants, with \"Je voudrais\" being the most commonly taught to beginners.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "What does \"Qu'est-ce que c'est ?\" mean, and how is it pronounced in casual speech? (1 step)", "answer": "**\"What is this?\"** — literally \"What is it that it is?\" In fast, casual speech, it sounds like **\"keske c'est\"** (pronounced \"keskuh say\"). This is a great example of French liaison and elision in action — the phrase is unrecognizable from the written form when spoken quickly!", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "What are the French terms for steak doneness levels? (2 steps)", "answer": "- Step 1: **bleu** = very rare (literally \"blue\" — seared outside, cold raw inside)\n  **saignant** = rare (literally \"bleeding\")\n\n- Step 2: **à point** = medium (literally \"to the point\")\n  **bien cuit** = well done (literally \"well cooked\")\n\nWhen the waiter asks **\"Quelle cuisson pour la viande ?\"** (What cooking for the meat?), you'd respond with one of these.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "How do you ask for the bill in French? (1 step)", "answer": "**L'addition, s'il vous plaît.** (The bill, please.) \n\nAlternative: **Je pourrais avoir l'addition, s'il vous plaît ?** (Could I have the bill, please?)\n\n+ Note: **la note** is also used for \"the bill\" in casual French. Both are correct and widely understood.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "How would the waiter's question \"Est-ce que vous les voulez en même temps ?\" be translated, and what does it mean for ordering? (1 step)", "answer": "**\"Would you like them at the same time?\"** The waiter is asking whether you want multiple items (courses, drinks, etc.) served together or separately. If you're sharing appetizers and main courses, you might say \"Oui, en même temps\" (yes, together) or \"Non, séparément\" (no, separately).", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "Translate these restaurant service phrases: \"Suivez-moi, s'il vous plaît,\" \"Installez-vous,\" \"Que désirez-vous boire?\" (2 steps)", "answer": "- Step 1: **Suivez-moi, s'il vous plaît.** = Follow me, please. ( waiter escorts you to a table)\n  **Installez-vous.** = Get settled / Take a seat. (literally \"install yourself\")\n\n- Step 2: **Que désirez-vous boire ?** = What would you like to drink? (formal)\n  Alternatives: **Que voulez-vous boire ?** (what do you want to drink?), **Qu'est-ce que vous prenez ?** (what will you have?)", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "How would a waiter ask if you've decided, and how would they offer still vs sparkling water? (2 steps)", "answer": "- Step 1: **Avez-vous fait votre choix ?** or **Avez-vous choisi ?** = Have you decided? (Have you made your choice? / Have you chosen?)\n\n- Step 2: **Souhaiteriez une bouteille d'eau gazeuse ou d'eau plate ?** = Would you like a bottle of sparkling or still water?\n  - **eau gazeuse** = sparkling water (has gas)\n  - **eau plate** = still water (flat water)\n\n+ **Grammar note:** \"d'eau\" is \"de + l'eau\" — the article \"le\" merges with \"de\" because \"eau\" starts with a vowel.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "What does the waiter say to assure customers they'll return quickly, and how do they check if everything is okay? (1 step)", "answer": "**\"Je reviens tout de suite.\"** = I'll be right back. (literally \"I return immediately\")\n\n**\"Est-ce que tout va bien ?\"** = Is everything okay? / Is everything going well?\n\nThese are standard phrases used by servers throughout the meal to check on tables.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "How do you ask \"What's in…?\" in French, particularly for a dish you're considering ordering? (1 step)", "answer": "**\"Qu'est-ce qu'il y a dans… ?\"** = What's in…? \n\nExample: **\"Qu'est-ce qu'il y a dans la salade niçoise ?\"** (What's in the niçoise salad?) This is essential for checking for allergies or ingredients you don't want.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "When ordering for two people using informal \"on,\" what phrases would you use? (2 steps)", "answer": "- Step 1: Since \"on\" takes the third-person singular verb form, you'd say:\n  - **On va prendre…** (We're going to have…)\n  - **On aimerait…** (We would like…)\n  - **On pourrait avoir… ?** (Could we have…?)\n\n- Step 2: Example: **\"On va prendre deux cafés et un croissant, s'il vous plaît.\"** Using \"on\" is extremely common in casual French restaurant conversation — much more natural than the formal \"nous\" in everyday settings.", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}, {"question": "What is \"une entrecôte saignante\" and how would you order a steak like this? (1 step)", "answer": "**Une entrecôte saignante** = a rare steak (literally \"a bleeding rib steak\"). \"Une entrecôte\" is a rib steak (between the ribs). If you want it rare, you'd say: **\"Je voudrais une entrecôte saignante, s'il vous plaît.\"**", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "Walk through a complete restaurant reservation dialogue in French. What information is exchanged? (3 steps)", "answer": "- Step 1: **Server:** \"C'est pour une réservation ?\" (Is it for a reservation?)\n  **You:** \"Oui, pour ce soir.\" (Yes, for tonight.)\n\n- Step 2: **Server:** \"À quelle heure ?\" (At what time?)\n  **You:** \"À 19h30, s'il vous plaît.\" (At 7:30pm, please.)\n\n- Step 3: **Server:** \"Pour combien de personnes ?\" (For how many people?)\n  **You:** \"Pour 2 personnes, s'il vous plaît.\" (For 2 people, please.)\n  **Server:** \"Votre numéro de téléphone pour confirmer la réservation ?\" (Your phone number to confirm?)\n\n+ End: **Server:** \"C'est noté, Monsieur. À ce soir !\" / **You:** \"Merci beaucoup, au revoir !\"", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": true}, {"question": "What is the difference between \"tu\" and \"vous\" in a restaurant context? (1 step)", "answer": "**\"tu\"** = informal \"you\" (used with friends, children, peers)\n**\"vous\"** = formal \"you\" (used with strangers, elders, service staff, anyone you want to show respect)\n\nIn a restaurant, you'll almost always use **\"vous\"** when speaking to the waiter (and they to you). You'd only use \"tu\" if you knew the waiter personally as a friend. Using \"vous\" incorrectly to a stranger is considered rude; using \"tu\" to an elder or in a formal setting is too familiar.", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "Translate these café/restaurant vocabulary words: un café, un thé, une orange pressée, un croissant, un pain au chocolat, un croque-mademoiselle? (2 steps)", "answer": "- Step 1: **un café** = coffee (usually an espresso)\n  **un thé** = tea\n  **une orange pressée** = fresh orange juice (literally \"pressed orange\")\n  **un croissant** = croissant\n\n- Step 2: **un pain au chocolat** = chocolate bread / chocolate croissant (a pastry with a chocolate bar inside)\n  **un croque-monsieur** = toasted ham and cheese sandwich (literally \"Mister crunch\") — the female version is **une croque-madame** (adds a fried egg on top)", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": false}, {"question": "What are these café items: une salade, un sandwich, un saumon grillé, une crème brûlée, une carafe d'eau, un plat du jour? (2 steps)", "answer": "- Step 1: **une salade** = salad\n  **un sandwich** = sandwich\n  **un saumon grillé** = grilled salmon\n\n- Step 2: **une crème brûlée** = crème brûlée (burnt cream — a caramelized custard dessert)\n  **une carafe d'eau** = a pitcher of water / carafe of water\n  **un plat du jour** = dish of the day / today's special", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": false}, {"question": "What is \"un rosé de Provence\" and what does \"rosé\" mean? (1 step)", "answer": "**Un rosé de Provence** = a rosé wine from Provence (the Provence region of France, famous for its pale pink rosé).\n\n**Rosé** literally means \"pink\" — it's rosé wine (not red, not white). It's a staple in French café culture, especially in the south of France.", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": false}, {"question": "Explain adjective agreement with these examples: deux petits verres, une salade verte, des légumes cuits, une orange pressée. (2 steps)", "answer": "- Step 1: **deux petits verres** — \"petits\" (small) is masculine PLURAL (adds -s), agreeing with \"verres\" (glasses, masculine). \"Verres\" is plural, so \"petits\" is plural.\n\n- **une salade verte** — \"verte\" is feminine SINGULAR (adds -e), agreeing with \"salade\" (salad, feminine).\n\n- Step 2: **des légumes cuits** — \"cuits\" is masculine PLURAL, agreeing with \"légumes\" (vegetables, masculine plural). Note: \"légume\" normally ends in -e (feminine sound) but is actually masculine!\n\n- **une orange pressée** — \"pressée\" is feminine SINGULAR, agreeing with \"orange\" (feminine). The verb \"presser\" (to press) becomes \"pressée\" to agree with a feminine noun.", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": false}, {"question": "What does the phrase \"À l'intérieur ou en terrasse ?\" mean, and how would you respond if you prefer outside seating? (1 step)", "answer": "**\"À l'intérieur ou en terrasse ?\"** = \"Inside or on the terrace?\" This is a common question at cafés in France — many have outdoor seating (la terrasse).\n\nIf you prefer outside, you'd say: **\"Je préfère en terrasse, s'il vous plaît.\"** (I prefer outside, please.) If you want inside: **\"À l'intérieur, s'il vous plaît.\"**", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": false}, {"question": "What are the Léa vocabulary words: \"lit\" and \"toujours\"? (1 step)", "answer": "**lit** = bed\n**toujours** = always\n\nThese were extra words from Léa's contribution to the lessons. Combined: \"Je suis toujours dans mon lit\" = \"I'm always in my bed.\"", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": false}, {"question": "Create a practice dialogue: You walk into a café, the waiter greets you, you ask for a table for two, and you ask what the dish of the day is. Write it in French. (3 steps)", "answer": "- Step 1: **Waiter:** \"Bonjour, bienvenue ! À l'intérieur ou en terrasse ?\"\n  **You:** \"Bonjour ! Je préfère en terrasse, s'il vous plaît.\"\n\n- Step 2: **Waiter:** \"Suivez-moi, s'il vous plaît. Installez-vous. Voici le menu.\"\n  **You:** \"Merci.Excusez-moi, c'est quoi le plat du jour ?\"\n\n- Step 3: **Waiter:** \"Aujourd'hui, nous avons un saumon grillé avec des légumes.\"\n  **You:** \"Parfait ! Je voudrais le saumon, s'il vous plaît.\"", "source": "MiniMax ①", "_id": "minimax_1_49", "judge_pick": true}, {"question": "A beginner French student says \"*C'est une belle jour.*\" Identify the error and correct it. (1 step)", "answer": "The error is in the adjective \"belle.\" After **\"c'est\"** (it is / this is), the adjective should be **masculine**, not feminine. Even though \"jour\" (day) might seem feminine (ends in -eur), it's actually masculine: **\"C'est un beau jour.\"**\n\nThe correct phrase is: **\"C'est un beau jour.\"** \n- \"beau\" is the masculine form (becomes \"bel\" before a vowel: \"un bel arbre\")\n- \"belle\" would be used after \"elle est\" (she is): \"Elle est belle\" (She is beautiful)", "source": "MiniMax ①", "_id": "minimax_1_50", "judge_pick": true}, {"question": "A student says \"Je suis hunger.\" Why is this wrong, and what is the correct way to say \"I am hungry\"? (1 step)", "answer": "This is a classic **interference error** from English. In French, \"to be hungry\" uses **AVOIR**, not ÊTRE:\n\n**正确: \"J'ai faim.\"** (I have hunger / I'm hungry)\n\nOther common AVOIR expressions:\n- **J'ai chaud** = I'm hot\n- **J'ai froid** = I'm cold\n- **J'ai soif** = I'm thirsty\n- **J'ai raison** = I'm right\n- **J'ai tort** = I'm wrong\n\nThe structure is always **avoir + noun** (faim, chaud, froid, soif), not \"to be + adjective.\"", "source": "MiniMax ①", "_id": "minimax_1_51", "judge_pick": true}, {"question": "You hear a French speaker say \"On est deux.\" What does this mean, and why not \"nous sommes\"? (1 step)", "answer": "**\"On est deux\"** means \"There are two of us\" / \"We're two (people).\" \n\nThis is extremely common in casual French when talking about group size — at a restaurant, you'd say \"On est quatre\" (We're four) rather than the formal \"Nous sommes quatre.\" \n\nThe verb \"est\" is third-person singular (like il/elle est), which is what \"on\" takes. In practice, \"on est\" has basically replaced \"nous sommes\" in spoken French.", "source": "MiniMax ①", "_id": "minimax_1_52", "judge_pick": true}, {"question": "If a French friend asks \"Tu as un stylo?\" and you don't have one, how would you respond negatively? (1 step)", "answer": "**\"Non, je n'ai pas de stylo.\"**\n\nThis demonstrates three things:\n1. Negation structure: ne + verb + pas\n2. Élision before vowel: \"n'ai\" (not \"ne ai\")\n3. Article change in negation: \"un stylo\" → \"pas de stylo\" (the un becomes \"de\")\n\nA fuller response might be: **\"Désolé, je n'ai pas de stylo. Tu peux acheter un stylo ?\"** (Sorry, I don't have a pen. Can you buy a pen?)", "source": "MiniMax ①", "_id": "minimax_1_53", "judge_pick": true}, {"question": "Explain why French has both \"un café\" (a coffee) and \"du café\" (some coffee). What's the difference? (2 steps)", "answer": "- Step 1: **\"Un café\"** = a cup of coffee (countable — you can count the cups: un café, deux cafés). This treats coffee as individual servings.\n\n- Step 2: **\"Du café\"** = some coffee (uncountable/mass — the substance itself). This is used when talking about coffee as a substance: \"Je bois du café\" (I drink coffee) — you're talking about the liquid, not a specific cup.\n\n+ Think of it this way: \"un café\" = \"a coffee\" (the item), \"du café\" = \"some coffee\" (the stuff). Similar to English: \"I ate an apple\" (the fruit) vs \"I ate some apple\" (the substance, like in a pie).", "source": "MiniMax ①", "_id": "minimax_1_54", "judge_pick": true}, {"question": "A student writes \"J'aime le poisson.\" Another says \"Je n'aime pas le poisson.\" What is the difference in meaning? (1 step)", "answer": "**\"J'aime le poisson\"** = I like fish (in general, fish as a category)\n\n**\"Je n'aime pas le poisson\"** = I don't like fish (in general, fish as a category)\n\nNotice: In both cases, \"le poisson\" uses the definite article \"le,\" not \"un poisson.\" When expressing general likes/dislikes about a category of food, French uses the definite article, not the indefinite. Compare:\n\n- \"J'aime les pommes\" = I like apples (apples in general)\n- \"Je mange une pomme\" = I'm eating an apple (a specific apple)", "source": "MiniMax ①", "_id": "minimax_1_55", "judge_pick": true}, {"question": "What is the correct order of words in a French question: \"What time is the meeting?\" using \"à quelle heure\"? (1 step)", "answer": "**\"À quelle heure est la réunion ?\"**\n\nThe question word \"à quelle heure\" goes at the beginning, followed by the verb (est), then the subject (la réunion). This is the standard word order for question-word questions in French.\n\nOther examples:\n- **Quel âge as-tu ?** (How old are you? — literally \"What age have you?\")\n- **Où habites-tu ?** (Where do you live?)", "source": "MiniMax ①", "_id": "minimax_1_56", "judge_pick": false}, {"question": "Why is \"vous avez\" (you have) potentially confusing for English speakers, and how do you avoid the mistake? (1 step)", "answer": "**\"Vous avez\"** (you have) sounds very similar to **\"nous avons\"** (we have) — the difference is just one letter (the \"vous\" vs \"nous\" prefix). \n\nThis is a common mistake:\n- ❌ \"Nous avez un café?\" (wrong — \"have\" doesn't agree)\n- ✅ \"Nous avons un café?\" (correct — \"we have\")\n\n+ The trick: remember that in French, verb endings are different for each subject pronoun. Listen for whether they say \"vous\" (you) or \"nous\" (we) BEFORE the verb — that's your cue.", "source": "MiniMax ①", "_id": "minimax_1_57", "judge_pick": false}, {"question": "A waiter says \"Vous avez choisi ?\" and you want to say \"Yes, I'll have the salmon.\" Give the full response in French. (2 steps)", "answer": "- Step 1: **\"Oui, j'ai choisi.\"** = Yes, I've decided / chosen.\n\n- Step 2: **\"Je vais prendre le saumon grillé, s'il vous plaît.\"** = I'll have the grilled salmon, please.\n\nNote: \"le saumon grillé\" uses \"le\" (definite article) because you're selecting from the menu — this is the specific dish you're ordering. If you were saying \"I'd like A salmon\" vaguely, you'd use \"un saumon,\" but when pointing at a menu item, \"le\" is natural.", "source": "MiniMax ①", "_id": "minimax_1_58", "judge_pick": false}], "count": 59}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "Translate: \"My name is Phuc. What's your name?\" (3 steps)", "answer": "- Step 1: \"My name is...\" in French uses the verb s'appeler (to be called). The phrase is \"Je m'appelle [name].\"\n- Step 2: \"What's your name?\" in informal French is \"Comment tu t'appelles ?\" — note the reflexive pronoun structure.\n- Step 3: So: \"Je m'appelle Phuc. Comment tu t'appelles ?\"\n\nNote: In formal situations, you would say \"Comment vous appelez-vous ?\" instead.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "In French, \"How old are you?\" literally translates to \"What age do you have?\" Why does French use AVOIR (to have) here instead of ÊTRE (to be)? (3 steps)", "answer": "- Step 1: In many Romance languages (French, Spanish, Italian, Portuguese), age is expressed with \"to have\" rather than \"to be\" — this is a fundamental structural difference from English.\n- Step 2: French treats age as something you possess (years), not a state of being. So \"I am 24 years old\" becomes \"I have 24 years\" = \"J'ai vingt-quatre ans.\"\n- Step 3: The word \"ans\" (years) never changes — it's always plural, even for \"one year\": \"J'ai un an.\"\n\nThis is a common source of transfer errors for English speakers — you must mentally switch from \"to be\" to \"to have\" when talking about age.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": true}, {"question": "What is the difference between \"Bonjour!\", \"Salut!\", and \"Coucou!\"? When would you use each? (2 steps)", "answer": "- Step 1: \"Bonjour\" is the standard, polite greeting used almost anytime — with strangers, in shops, with teachers. It means \"good day\" and is appropriate in virtually any formal or semi-formal context.\n- Step 2: \"Salut\" and \"Coucou\" are both informal/casual. \"Salut\" means both \"hi\" and \"bye\" among friends. \"Coucou\" is very familiar, like saying \"hey!\" to close friends or family. Never use these with people you don't know well.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "A final consonant in French is usually silent. When is it NOT silent? (2 steps)", "answer": "- Step 1: A final consonant is SILENT in French — that's the general rule. For example: \"port\" (door) is pronounced \"por,\" \"fromage\" is pronounced \"fromage\" (the -e is silent).\n- Step 2: However, if another word begins with a vowel immediately after, the final consonant \"links\" to the next word — this is called liaison. Example: \"les amis\" (the friends) is pronounced \"lay-zami\" with a soft \"z\" sound linking the words.\n\nThe plural -s is NEVER pronounced — you only know a noun is plural from the article (les, des), not from any sound.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "You see a French word ending in \"-é\" (like \"café\") and one ending in \"-ette\" (like \"omelette\"). Without looking them up, what gender would you guess, and why? (2 steps)", "answer": "- Step 1: Words ending in -é are almost always MASCULINE: un café, un thé, un rosé. The -é ending sounds like \"ay\" and is typically masculine.\n- Step 2: Words ending in -ette are almost always FEMININE: une omelette, une carafe, une serviette. This is a strong pattern — feminine nouns often end in -ette, -tion, -ité, -elle, -esse.\n\nThis is a useful heuristic, but there are exceptions (like \"une clé\" from \"clé\" which ends in -é but is feminine).", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": true}, {"question": "You want to say \"It's beautiful\" about a painting (feminine noun). Do you say \"C'est beau\" or \"C'est belle\"? What about \"Elle est belle\"? (2 steps)", "answer": "- Step 1: After \"c'est\" (it's / that is), the adjective is ALWAYS in the MASCULINE form, regardless of what noun follows. So \"It's beautiful\" about any noun — even a feminine noun like \"la peinture\" — is always \"C'est beau.\"\n- Step 2: BUT if you use a pronoun like \"elle\" (she/it) to refer to the noun, THEN the adjective agrees: \"La peinture est belle. Elle est belle.\"\n\nThis is a common error: learners often want to make \"c'est\" agree, but it never does.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "What are the three French indefinite articles meaning \"a/an/some\"? Give an example of each. (3 steps)", "answer": "- Step 1: un = masculine singular: \"un croissant\" (a croissant)\n- Step 2: une = feminine singular: \"une omelette\" (an omelette)\n- Step 3: des = plural (some): \"des sandwichs\" (some sandwiches)\n\nRemember: des is used for plural nouns even when English might use \"a\" or omit the article.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "What are the partitive articles in French, and when do you use them? Give an example with a food/drink item. (3 steps)", "answer": "- Step 1: The partitive articles are: du (masc.), de la (fem.), des (pl.) — they mean \"some\" and are used for UNCOUNTABLE quantities of things.\n- Step 2: You use them when talking about an unspecified amount of something: \"du café\" (some coffee), \"de la crème\" (some cream), \"des légumes\" (some vegetables).\n- Step 3: The key distinction: if you can count it, you use des (plural); if it's a mass/un countable substance, you use du/de la. Compare: \"un croissant\" (a countable croissant) vs. \"du café\" (some coffee — uncountable).", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "How do you negate a verb in French using ne...pas? What happens when the verb starts with a vowel? (3 steps)", "answer": "- Step 1: To make a verb negative, you \"wrap\" it: ne + verb + pas. Example: \"Je suis à Paris\" → \"Je ne suis pas à Paris.\"\n- Step 2: Before a vowel sound, ne becomes n' (elision): \"Je n'ai pas,\" \"Je n'habite pas,\" \"Il n'est pas.\"\n- Step 3: The n' contraction happens with ANY vowel sound, not just vowels at the start of words — it happens at the syllable level: \"n'habite\" (the h is silent), \"n'y\" (n'y a).", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "In negative sentences, what happens to \"un/une/des\" and \"du/de la\"? Give an example. (2 steps)", "answer": "- Step 1: In the negative, both indefinite articles (un/une/des) AND partitive articles (du/de la) become \"pas de\" (or \"pas d'\" before a vowel).\n- Step 2: Examples:\n  - \"J'ai un café\" → \"Je n'ai pas de café\" (not \"pas un café\")\n  - \"Je bois du thé\" → \"Je ne bois pas de thé\"\n  - \"Il y a des croissants\" → \"Il n'y a pas de croissants\"\n  - \"pas d'omelette\" (before a vowel)\n\nThis is a key French pattern: the article completely disappears in negation and is replaced by \"de\" (meaning \"any\" or \"some\" becomes \"no\").", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "Conjugate AVOIR (to have) in the present tense, affirmative and negative. (3 steps)", "answer": "- Step 1: Affirmative (positive):\n  - j'ai (I have)\n  - tu as (you have)\n  - il/elle/on a (he/she/one has)\n  - nous avons (we have)\n  - vous avez (you have — formal/plural)\n  - ils/elles ont (they have)\n\n- Step 2: Negative:\n  - je n'ai pas · tu n'as pas · il/elle/on n'a pas · nous n'avons pas · vous n'avez pas · ils/elles n'ont pas\n\n- Step 3: Common trap: \"avez\" (you have) sounds very similar to \"avons\" (we have) — be careful! They are NOT interchangeable. Also note: the third person singular (il/elle/on a) does NOT have a silent letter before \"a\" — it's just \"a.\"", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "Why is \"avoir\" (to have) essential in French beyond just meaning \"to possess\"? Give two examples. (2 steps)", "answer": "- Step 1: AVOIR is used in many idiomatic expressions that English handles differently:\n  - Age: \"J'ai 24 ans\" (I am 24 years old — literally \"I have 24 years\")\n  - Hunger/Thirst: \"J'ai faim\" (I'm hungry), \"J'ai soif\" (I'm thirsty)\n  - Being right/wrong: \"J'ai raison\" (I'm right), \"J'ai tort\" (I'm wrong)\n  - Being hot/cold: \"J'ai chaud,\" \"J'ai froid\"\n\n- Step 2: Many English \"to be\" expressions are French \"to have\" expressions. This is a major source of errors — you must think in French patterns, not translate word-for-word.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "Conjugate ÊTRE (to be) in the present tense, affirmative and negative. (3 steps)", "answer": "- Step 1: Affirmative:\n  - je suis (I am)\n  - tu es (you are)\n  - il/elle/on est (he/she/one is)\n  - nous sommes (we are)\n  - vous êtes (you are — formal/plural)\n  - ils/elles sont (they are)\n\n- Step 2: Negative:\n  - je ne suis pas · tu n'es pas · il/elle/on n'est pas · nous ne sommes pas · vous n'êtes pas · ils/elles ne sont pas\n\n- Step 3: Note the patterns: \"suis\" (I am) and \"sommes\" (we are) are unique to ÊTRE — other verbs don't use these forms. Also remember that n' before vowels applies: \"je n'habite pas.\"", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "What does \"il y a\" mean, and how do you make it negative? Give an example. (2 steps)", "answer": "- Step 1: \"Il y a\" means \"there is\" or \"there are\" — it's the French equivalent of \"there is/there are.\" It can refer to one item or multiple: \"Il y a un café\" (there's a coffee), \"Il y a des croissant(s)\" (there are croissants).\n- Step 2: The negative is \"il n'y a pas de\" — the article disappears: \"Il n'y a pas de café\" (there's no coffee), \"Il n'y a pas de réservation\" (there's no reservation).\n\nNote: The \"de\" in negative \"il y a pas de\" is essential — just \"pas\" alone would be incorrect.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "What is the difference between \"on\" and \"nous\" for saying \"we\" in French? When would you use each? (3 steps)", "answer": "- Step 1: \"nous\" is the formal subject pronoun for \"we\" — it's grammatically correct in all contexts and is used in writing and formal speech: \"nous avons,\" \"nous sommes,\" \"nous voulons.\"\n- Step 2: \"on\" is the informal, conversational \"we\" — in spoken French, it's FAR more common. It takes the same verb form as il/elle (third person singular): \"on a,\" \"on est,\" \"on va.\"\n- Step 3: In a restaurant, when ordering for two, you'd typically say: \"On va prendre...\" (We're going to have...), \"On pourrait avoir...\" (Could we have...). This sounds natural and friendly. Using \"nous\" in a café would sound overly formal.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "Spell out these numbers in French: 21, 22, 31, 41, 70, 71, 80, 81, 90, 91 (3 steps)", "answer": "- Step 1: 21 = vingt-et-un (note the \"et\"), 22 = vingt-deux (no \"et\"), 31 = trente-et-un, 41 = quarante-et-un.\n- Step 2: 70 = soixante-dix (60 + 10), 71 = soixante-et-onze (60 + 11), 72 = soixante-douze.\n- Step 3: 80 = quatre-vingts (4 × 20), 81 = quatre-vingt-un. 90 = quatre-vingt-dix (4×20+10), 91 = quatre-vingt-onze.\n\nKey rule: The French count in multiples of 20 for 70-99, and \"et\" only appears in numbers ending in 1 (21, 31, 41, 51, 61, 71, 81, 91).", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "How do you say 100, 1000, 1,000,000, and 1,000,000,000 in French? (2 steps)", "answer": "- Step 1: 100 = cent (note: \"cent\" with an s when plural AND no number after: 200 = deux cents, but 201 = deux cent un)\n- Step 2: 1000 = mille · 1,000,000 = un million · 1,000,000,000 = un milliard (a billion)\n\nNote: French uses periods for thousands in writing (1 000, 1 000 000) rather than commas, unlike English.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "What are the three time words for \"yesterday,\" \"today,\" and \"tomorrow\"? (1 step)", "answer": "- Step 1: hier = yesterday · aujourd'hui = today · demain = tomorrow\n\nNote: Notice that \"aujourd'hui\" literally means \"on the day of today\" — a compound word. These are essential for talking about when events happen.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "How does \"quel\" agree with nouns? Give examples of all four forms. (3 steps)", "answer": "- Step 1: \"Quel\" (which/what) is a question word that MUST agree with the noun it modifies:\n  - quel (masc. sing.): \"Quel café?\" (which coffee?)\n  - quelle (fem. sing.): \"Quelle heure?\" (what time?)\n  - quels (masc. pl.): \"Quels restaurants?\" (which restaurants?)\n  - quelles (fem. pl.): \"Quelles salades?\" (which salads?)\n\n- Step 2: Common phrase: \"À quelle heure?\" = At what time?\n- Step 3: The agreement is with the noun, NOT with the answer you receive. If you ask \"Quelle heure est-il?\", the answer \"Il est trois heures\" doesn't change \"quelle.\"", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "What does \"Je voudrais,\" \"Je pourrais,\" and \"J'aimerais\" all mean, and how would you use them to order food? (3 steps)", "answer": "- Step 1: All three mean variations of \"I would like\" — they're polite ways to make requests:\n  - Je voudrais = I would like (most common in restaurants)\n  - Je pourrais avoir = Could I have (slightly more tentative)\n  - J'aimerais avoir = I would like to have (slightly more formal)\n\n- Step 2: To order, you'd say: \"Je voudrais un café, s'il vous plaît\" or \"Je pourrais avoir le saumon grillé?\"\n- Step 3: You can also use \"Je vais prendre...\" (I'm going to have...) — this is a common, natural way to order: \"Je vais prendre le croque-monsieur.\"", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "What is \"Qu'est-ce que c'est ?\" and why does it sound like \"keske c'est\"? (2 steps)", "answer": "- Step 1: \"Qu'est-ce que c'est ?\" means \"What is this?\" / \"What is it?\" — essential for asking about menu items you don't recognize.\n- Step 2: In fast speech, the unstressed \"ce\" and \"que\" collapse: \"qu'est-ce que\" → \"keske\" (rhymes with \"desk\"). This is normal French connected speech — you don't pronounce each word clearly.\n\nListen for this phrase when the waiter describes the plat du jour (dish of the day).", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "A waiter asks \"Quelle cuisson pour la viande ?\" What do \"bleu,\" \"saignant,\" \"à point,\" and \"bien cuit\" mean? (2 steps)", "answer": "- Step 1: These are steak doneness levels:\n  - bleu = very rare (barely cooked, cold center)\n  - saignant = rare (still bloody)\n  - à point = medium\n  - bien cuit = well done\n\n- Step 2: The question uses feminine agreement because \"viande\" (meat) is feminine: \"Quelle cuisson?\" (not \"quel\")\n\nIn a French restaurant, if you want your steak rare, say \"saignante, s'il vous plaît\" (feminine adjective agreement with \"l'entrecôte\").", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "How do you ask for the bill in French? Give two ways. (2 steps)", "answer": "- Step 1: The most common way: \"L'addition, s'il vous plaît\" (the bill, please).\n- Step 2: More polite/formal: \"Je pourrais avoir l'addition, s'il vous plaît ?\" or \"Je pourrais avoir la note, s'il vous plaît?\"\n\nNote: \"L'addition\" and \"la note\" both mean \"the bill\" — they're interchangeable.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "The waiter asks \"À l'intérieur ou en terrasse ?\" How would you respond if you want to sit outside? (1 step)", "answer": "- Step 1: You'd say: \"Je préfère en terrasse, s'il vous plaît\" (I'd prefer outside, please).\n\nNote: \"en terrasse\" literally means \"on the terrace\" — the opposite is \"à l'intérieur\" (inside). Remember that \"en\" is used with feminine nouns (la terrasse) whereas \"à + le\" = \"au.\"", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "Match the waiter phrases with their meanings: (a) \"Que désirez-vous boire ?\" (b) \"Avez-vous fait votre choix ?\" (c) \"Est-ce que tout va bien ?\" (d) \"Je reviens tout de suite.\" (2 steps)", "answer": "- Step 1:\n  - (a) = What would you like to drink?\n  - (b) = Have you made your choice? / Have you decided?\n  - (c) = Is everything okay? / Is everything all right?\n  - (d) = I'll be right back.\n\n- Step 2: These are all standard service phrases you'll hear repeatedly in French restaurants. Recognizing them helps you understand the flow of service.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "How would you make a restaurant reservation? Walk through a dialogue with the key phrases. (4 steps)", "answer": "- Step 1: Host: \"C'est pour une réservation ?\" (Is it for a reservation?)\n- Step 2: You: \"Oui, pour ce soir, s'il vous plaît.\" / \"Oui, pour demain soir.\"\n- Step 3: Host: \"À quelle heure ?\" — You: \"À 19h30, s'il vous plaît.\" (7:30 PM)\n- Step 4: Host: \"Pour combien de personnes ?\" — You: \"Pour 2 personnes, s'il vous plaît.\" — Host: \"Votre numéro de téléphone pour confirmer?\" — You: [give number]\n\nClosing: \"C'est noté, Monsieur. À ce soir!\" — \"Merci beaucoup, au revoir!\"", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "How do you say you DON'T have a reservation? (1 step)", "answer": "- Step 1: \"Non, je n'ai pas de réservation\" — note the negative structure: \"n'ai pas\" (ne + ai + pas) + \"de\" (no article).\n\nThis is essential for walking into a restaurant without a booking.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "Match these café/restaurant vocabulary items with their meanings: (a) un pain au chocolat (b) un croque-monsieur (c) une orange pressée (d) un plat du jour (e) une crème brûlée (f) une carafe d'eau (3 steps)", "answer": "- Step 1: (a) pain au chocolat = chocolate bread (pastry with chocolate inside)\n- Step 2: (b) croque-monsieur = toasted ham and cheese sandwich (hot, pressed)\n  - (c) orange pressée = fresh squeezed orange juice\n  - (d) plat du jour = dish of the day (today's special)\n  - (e) crème brûlée = burned cream (classic French dessert with caramelized sugar top)\n  - (f) carafe d'eau = pitcher of water (usually still water)\n\n- Step 3: Note that \"pressée\" (pressed/squeezed) and \"brûlée\" (burned) are both feminine adjectives, agreeing with their feminine nouns.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "Explain adjective agreement: Why is it \"deux petits verres\" but \"une petite sauce\" and \"des petits pains\"? (3 steps)", "answer": "- Step 1: In French, adjectives must agree in GENDER and NUMBER with the noun they modify:\n  - \"petit\" (masc. sing.) → \"petits\" (masc. pl.) · \"petite\" (fem. sing.) → \"petites\" (fem. pl.)\n\n- Step 2: Examples:\n  - \"deux petits verres\" (masc. pl. = petits) — two small glasses\n  - \"une petite sauce\" (fem. sing. = petite) — a small sauce\n  - \"des petits pains\" (masc. pl. = petits) — some small breads\n\n- Step 3: Rule: With plural articles like \"des,\" the adjective can stay masculine if the noun is masculine. So \"des petits pains\" not \"des petites pains\" (unless the noun were feminine).", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "What is the difference between \"tu\" and \"vous\"? When would you use each? (2 steps)", "answer": "- Step 1: \"tu\" is the informal \"you\" — used with friends, family, children, peers, and anyone you know well. It's singular.\n- Step 2: \"vous\" is the formal/polite \"you\" — used with strangers, elders, authority figures, in professional settings, and it's also the plural \"you\" (for two or more people).\n\nIn a French restaurant with a waiter, you'd typically use \"vous\" (polite). If you become friends with the waiter, you might switch to \"tu\" — but that's a social decision, not a grammatical one.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "What do \"hier,\" \"aujourd'hui,\" and \"demain\" mean, and what tense would you use with each? (2 steps)", "answer": "- Step 1: hier = yesterday · aujourd'hui = today · demain = tomorrow\n- Step 2: You'd use:\n  - Hier, j'ai mangé... (past tense: \"I ate...\")\n  - Aujourd'hui, je mange... or Je vais manger... (present or near future)\n  - Demain, je vais manger... (near future)\n\nThese time markers are crucial for placing events in time. They're often used with the passé composé (past) or near future (aller + infinitive).", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": true}, {"question": "What is the negative of \"il y a\"? How do you say \"There isn't/aren't any...\"? (1 step)", "answer": "- Step 1: \"Il n'y a pas de...\" — note that \"de\" replaces any article. Examples: \"Il n'y a pas de café\" (there's no coffee), \"Il n'y a pas de réservation\" (there's no reservation), \"Il n'y a pas d'omelette\" (there's no omelette — with elision).\n\nThe \"de\" is essential — without it, the sentence would be grammatically incorrect.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "In restaurant service, what does \"Suivez-moi, s'il vous plaît\" mean, and what would the waiter say next? (2 steps)", "answer": "- Step 1: \"Suivez-moi, s'il vous plaît\" = \"Follow me, please\" — the waiter is showing you to your table.\n- Step 2: After this, the waiter typically says \"Installez-vous\" = \"Get settled / take a seat.\"\n\nThese are the first phrases you'll hear when entering a restaurant with table service.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "What does \"Souhaiteriez une bouteille d'eau gazeuse ou d'eau plate ?\" mean, and how would you respond? (2 steps)", "answer": "- Step 1: This means \"Would you like a bottle of sparkling water or still water?\" — \"gazeuse\" = sparkling/fizzy, \"plate\" = still/flat.\n- Step 2: You'd respond: \"Une bouteille d'eau gazeuse, s'il vous plaît\" or \"De l'eau plate, s'il vous plaît.\"\n\nIn France, restaurants often serve tap water only if you ask for \"une carafe d'eau\" — otherwise, bottled water is standard.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "How do you say \"I am sorry\" or \"I am late\" in French? What does the structure reveal about adjective agreement? (2 steps)", "answer": "- Step 1: \"Je suis désolé\" (I'm sorry) · \"Je suis en retard\" (I'm late)\n- Step 2: The adjective \"désolé\" (sorry) agrees with the speaker. A woman would say \"je suis désolée.\" The verb \"être\" + adjective pattern shows that adjectives must agree with the subject in gender and number.\n\nThis is why \"Je suis désolé\" spoken by a man and \"Je suis désolée\" spoken by a woman are both correct — they just agree differently.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "What are some common French pronunciation traps for numbers? Give at least three. (2 steps)", "answer": "- Step 1: 14 quatorze: sounds like \"katorz\" (not \"four-teen\")\n- Step 2: 60 soixante: sounds like \"swa-sont\" (not \"six-ty\")\n- Step 3: 70 soixante-dix: combines 60+10, so \"swa-son-diss\"\n- 80 quatre-vingts: \"katruh-vang\" (the -g is silent)\n- Note: French numbers don't sound like English at all — you must learn them as completely new sounds, not translations.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "You see on a menu: \"un saumon grillé\" and \"une entrecôte saignante.\" Identify the gender of each noun and the adjective agreement in each phrase. (2 steps)", "answer": "- Step 1: \"un saumon grillé\" — masculine noun \"saumon,\" masculine singular adjective \"grillé\" (grilled)\n- Step 2: \"une entrecôte saignante\" — feminine noun \"entrecôte,\" feminine singular adjective \"saignante\" (rare/bleeding)\n\nThe -e endings on adjectives signal femininity. Note that \"saignant\" → \"saignante\" adds an -e because \"entrecôte\" is feminine.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "What does \"Qu'est-ce qu'il y a dans...?\" mean, and when would you use it? (1 step)", "answer": "- Step 1: This means \"What's in...?\" — you'd use it to ask about ingredients in a dish: \"Qu'est-ce qu'il y a dans la sauce?\" (What's in the sauce?) or \"Qu'est-ce qu'il y a dans le plat du jour?\" (What's in the dish of the day?)\n\nThis is essential for asking about allergens or ingredients.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "What is the rule for forming the 70s and 80s in French numbers? Why is this system used? (3 steps)", "answer": "- Step 1: 70 = soixante-dix (60 + 10), 71 = soixante-et-onze, 72 = soixante-douze... up to 79 = soixante-dix-neuf.\n- Step 2: 80 = quatre-vingts (4 × 20), 81 = quatre-vingt-un, etc. Note the -s on \"vingts\" only when it stands alone (80, not 81, 82...).\n- Step 3: This is a vestige of the old French counting system (vigesimal, based on 20). It reflects historical French number systems and persists today — even though it's mathematically \"odd\" from an English perspective, it's completely natural for French speakers.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}, {"question": "A waiter says \"Est-ce que vous les voulez en même temps ?\" What does this mean, and what is \"les\" referring to? (2 steps)", "answer": "- Step 1: The phrase means \"Would you like them at the same time?\" — the waiter is asking if you want both drinks/foods served together or separately.\n- Step 2: \"Les\" is a direct object pronoun replacing a previously mentioned plural noun — likely multiple items ordered. For example, if you ordered \"un café et un thé,\" the waiter might ask if you want \"them\" (les) together.\n\nThis is a common service question when ordering multiple drinks or courses.", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "What do \"lit,\" \"toujours,\" and \"toujours\" mean from Léa's vocabulary list? (1 step)", "answer": "- Step 1: lit = bed · toujours = always\n\nThese are extra vocabulary items from Léa's lessons. \"Lit\" is masculine (un lit), and \"toujours\" is an adverb that doesn't change.", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": false}, {"question": "If you're unsure about the gender of a singular animal noun in French, what should you default to, and why? (1 step)", "answer": "- Step 1: Default to MASCULINE (un). This is the convention in French — when gender is unknown or irrelevant, masculine is the default. For example: \"un oiseau\" (a bird) can be either, but you'd say \"c'est un bel oiseau\" (it's a beautiful bird, masculine form).\n\nThis is a practical convention, not a grammatical rule — but it's widely observed.", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "What resources did Isabelle recommend for improving French pronunciation and listening? (1 step)", "answer": "- Step 1: Coffee Break French (podcast), Easy French (YouTube), Duolingo French podcast. These are all free, beginner-friendly resources for developing listening comprehension and pronunciation.\n\nRegular exposure to these materials helps train your ear to French sounds and intonation patterns.", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": false}, {"question": "Practice: You walk into a café. The waiter says \"Bonjour, bienvenue! À l'intérieur ou en terrasse?\" How do you respond to sit outside and order a coffee? (3 steps)", "answer": "- Step 1: Choose your seating: \"En terrasse, s'il vous plaît.\"\n- Step 2: Waiter might ask: \"Que désirez-vous boire?\" or \"Qu'est-ce que vous voulez?\"\n- Step 3: Respond: \"Un café, s'il vous plaît. Je voudrais un café noir.\"\n\nThis simulates a real French café interaction from start to finish.", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}, {"question": "Practice: You're at a restaurant and want to ask what's in the sauce. How do you phrase this question? (1 step)", "answer": "- Step 1: \"Qu'est-ce qu'il y a dans la sauce, s'il vous plaît?\" — or more simply: \"Il y a quoi dans la sauce?\" (informal), or \"C'est quoi, la sauce?\" (very informal among friends).\n\nThe formal version uses \"qu'est-ce que\" structure.", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": false}, {"question": "Practice: You want to reserve a table for two people at 8pm tomorrow evening. Write out the complete reservation dialogue. (4 steps)", "answer": "- Step 1: You: \"Bonsoir, c'est pour une réservation, s'il vous plaît.\"\n- Step 2: Host: \"Oui, pour quand?\" — You: \"Pour demain soir.\"\n- Step 3: Host: \"À quelle heure?\" — You: \"À 20h, s'il vous plaît.\"\n- Step 4: Host: \"Pour combien de personnes?\" — You: \"Pour 2 personnes.\" — Host: \"Votre numéro?\" — You: [give number]\n\nClosing: \"C'est noté. À demain!\" — \"Merci, au revoir!\"", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": false}, {"question": "Practice: You've finished eating and want the bill. The waiter comes over and asks \"Est-ce que tout va bien?\" What do you say? (2 steps)", "answer": "- Step 1: If you need the bill: \"Oui, très bien, merci. Je pourrais avoir l'addition, s'il vous plaît?\"\n- Step 2: If you need something else first: \"Oui, encore un café, s'il vous plaît\" or \"Non, tout va bien, merci.\"\n\nThe waiter's question is a check-in — not a signal that they're bringing the bill.", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": false}, {"question": "In negation, what is the difference between \"je n'ai pas\" and \"je n'ai pas de\"? When would you use each? (2 steps)", "answer": "- Step 1: \"Je n'ai pas\" (without \"de\") negates a verb but keeps the object: \"Je n'ai pas mon téléphone\" = I don't have my phone (the phone exists, I just don't have it with me).\n- Step 2: \"Je n'ai pas de\" (with \"de\") means \"I don't have any...\" — the article disappears: \"Je n'ai pas de réservation\" = I don't have a reservation (no reservation exists).\n\nThe presence of \"de\" signals a more absolute negation — \"no X at all\" rather than \"not X right now.\"", "source": "MiniMax ②", "_id": "minimax_2_47", "judge_pick": true}, {"question": "Why does French say \"Je suis vietnamien\" (I am Vietnamese) rather than \"J'ai vietnamien\"? (1 step)", "answer": "- Step 1: Nationalities and professions use ÊTRE (to be), not AVOIR. This is one of the few areas where French and English align: \"Je suis français\" = I am French, \"Elle est américaine\" = She is American.\n\nThe AVOIR rule for age is the exception, not the rule — most descriptive states use ÊTRE.", "source": "MiniMax ②", "_id": "minimax_2_48", "judge_pick": false}], "count": 49}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "In French, how do you say \"My name is Phuc,\" and what does the verb literally mean?", "answer": "- Step 1: The phrase is $$Je\\ m'appelle\\ Phuc$$.\n- Step 2: Literally, this means \"I call myself Phuc\" — the verb $$s'appeler$$ is reflexive (the $$m'$$ means \"myself\"), so French doesn't say \"my name IS X\" but rather \"I call myself X.\"\n- Step 3: This is why you'll see $$Comment\\ tu\\ t'appelles\\ ?$$ for \"What's your name?\" — literally \"How do you call yourself?\"\n\nTakeaway: French treats naming as a reflexive action, not a state of being.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": true}, {"question": "Why does French use the verb \"to have\" (avoir) instead of \"to be\" (être) when stating your age?", "answer": "- Step 1: In English we say \"I AM 24 years old,\" treating age as a state of being.\n- Step 2: French instead says $$J'ai\\ 24\\ ans$$, literally \"I HAVE 24 years\" — age is conceived as a possession, something you've accumulated.\n- Step 3: This is why the question is $$Quel\\ âge\\ as-tu\\ ?$$ — literally \"What age do you have?\" — using $$avoir$$, not $$être$$.\n\nMisconception probe: Saying $$Je\\ suis\\ 24\\ ans$$ is a classic English-speaker mistake; it's grammatically wrong in French.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": true}, {"question": "How do you ask \"Where are you from?\" and \"Where do you live?\" informally in French, and what's the structural difference between them?", "answer": "- Step 1: \"Where are you from?\" = $$Tu\\ viens\\ d'où\\ ?$$ — uses $$venir$$ (to come) + $$de$$ (from) → \"You come from where?\"\n- Step 2: \"Where do you live?\" = $$Tu\\ habites\\ où\\ ?$$ — uses $$habiter$$ (to live/reside) directly with $$où$$ (where).\n- Step 3: The difference: \"from where\" needs the preposition $$de$$ (which contracts to $$d'$$ before vowel $$où$$), whereas \"live where\" needs no preposition.\n\nTakeaway: $$d'où$$ always pairs with motion/origin verbs; $$où$$ alone pairs with location verbs.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": true}, {"question": "What's the difference in register between Bonjour, Coucou, and Salut?", "answer": "- Step 1: $$Bonjour$$ is the standard polite greeting — safe in any context: shops, work, strangers, formal meetings.\n- Step 2: $$Salut$$ is informal — like English \"Hi\" or \"Bye\" — used with friends and peers. It works as both hello AND goodbye.\n- Step 3: $$Coucou$$ is very casual/affectionate — close friends, family, children. Saying it to your boss would feel strange.\n\nTakeaway: Default to $$Bonjour$$ if unsure; $$Salut$$ only when you know the person is a peer.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "When someone asks $$Ça\\ va\\ ?$$, what does the question literally mean, and what's a typical response?", "answer": "- Step 1: Literally $$Ça\\ va\\ ?$$ means \"It goes?\" — $$ça$$ = it/that, $$va$$ = goes. The implied meaning is \"Is it going [well]?\"\n- Step 2: The typical short reply is $$Ça\\ va$$ (\"It goes\" → I'm fine) or $$Très\\ bien,\\ et\\ toi\\ ?$$ (Very well, and you?).\n- Step 3: Notice the reply uses the same words — French often answers a question by echoing the verb back, with or without a qualifier.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "In French, why is the final consonant of a word usually silent — and what happens when the next word starts with a vowel?", "answer": "- Step 1: Final consonants are usually silent because French phonology favors open syllables ending in vowel sounds. E.g., $$petit$$ → \"puh-TEE\" (no t), $$vous$$ → \"voo\" (no s).\n- Step 2: BUT when the next word begins with a vowel sound, the silent consonant \"wakes up\" and links onto the next word — t
