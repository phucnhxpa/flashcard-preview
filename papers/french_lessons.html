his is called **liaison**.\n+ Example: $$vous\\ avez$$ → \"voo-zah-vay\" (the s wakes up as a z sound).\n+ Example: $$nous\\ avons$$ → \"noo-zah-vohn\".\n- Step 3: This is why $$des$$ + $$omelettes$$ sounds like \"day-zomelettes\" — fluency depends on hearing these links.\n\nMisconception probe: Liaison isn't optional decoration; missing it sounds robotic and can obscure meaning.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": true}, {"question": "How do you know a French noun is plural when speaking, given that the plural -s isn't pronounced?", "answer": "- Step 1: The plural -s on the noun itself is silent, so $$croissant$$ and $$croissants$$ sound identical in isolation.\n- Step 2: You identify plurality from the **article** that precedes the noun, since articles are pronounced differently:\n+ $$le/la$$ (singular) vs $$les$$ (plural) — \"luh/lah\" vs \"lay\"\n+ $$un/une$$ (singular) vs $$des$$ (plural) — \"uhn/oon\" vs \"day\"\n- Step 3: Liaison also helps: $$les\\ amis$$ → \"lay-zah-mee\" (the z gives away the plural).\n\nTakeaway: French shifts the grammatical signal from the noun ending (as in English) to the preceding article.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": true}, {"question": "Why do native speakers say 14 (quatorze) and 60 (soixante) might sound surprising to a learner, and what's the pronunciation trap?", "answer": "- Step 1: 14 = $$quatorze$$ is pronounced \"ka-TORZ\" — the final -ze is pronounced as a \"z\" sound, not silent. Beginners often try to drop the ending.\n- Step 2: 60 = $$soixante$$ is pronounced \"swa-SONT\" — the \"oi\" makes a \"wah\" sound (not \"oy\"), and the final -e is silent but the -nt is nasalized.\n- Step 3: 70 = $$soixante-dix$$ has another trap: $$dix$$ here is pronounced \"deess\" (with the s sounded), not \"dee\" as it is in $$dix\\ euros$$.\n\nTakeaway: The pronunciation of $$dix$$ changes depending on what follows — silent before a consonant, \"z\" before a vowel (liaison), and \"ss\" at the end of a number phrase.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "What's a reliable shortcut for guessing the gender of a French noun ending in -ette or -é?", "answer": "- Step 1: Nouns ending in $$-ette$$ are almost always **feminine** — $$une\\ omelette$$, $$une\\ carafe$$ ... wait, $$carafe$$ ends in -e not -ette; but the diminutive -ette ending (omelette, baguette, fourchette) signals feminine.\n- Step 2: Nouns ending in $$-é$$ (with acute accent) are almost always **masculine** — $$un\\ café$$, $$un\\ thé$$, $$un\\ canapé$$.\n- Step 3: These aren't laws but strong patterns — they help you guess when you don't know a word.\n\nMisconception probe: Don't confuse -é (masculine) with -ée (feminine, like $$une\\ journée$$) — the silent extra e flips the gender.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": true}, {"question": "Why is \"It's beautiful!\" always $$C'est\\ beau$$ in French, even when pointing at a feminine noun like $$une\\ maison$$?", "answer": "- Step 1: After $$c'est$$ (\"it is\"), the adjective doesn't agree with any specific noun — it agrees with the implicit, abstract \"it\" ($$ce$$), which French treats as **masculine by default**.\n- Step 2: So even pointing at a house ($$une\\ maison$$, feminine), you say $$C'est\\ beau\\ !$$ — not $$C'est\\ belle$$.\n- Step 3: Compare with $$Elle\\ est\\ belle$$ (She/it is beautiful), where you've explicitly used the feminine pronoun $$elle$$ referring to the house — then the adjective MUST agree → belle.\n\nTakeaway: $$c'est$$ + masculine adjective is a frozen rule; $$elle\\ est$$ / $$il\\ est$$ forces agreement.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "What are the three French indefinite articles, and how do they correspond to English a/an/some?", "answer": "- Step 1: $$un$$ = \"a/an\" for a masculine singular noun: $$un\\ café$$ (a coffee).\n- Step 2: $$une$$ = \"a/an\" for a feminine singular noun: $$une\\ salade$$ (a salad).\n- Step 3: $$des$$ = \"some\" for plural nouns of any gender: $$des\\ croissants$$, $$des\\ salades$$.\n\nMisconception probe: English often DROPS \"some\" (\"I want croissants\"), but French requires $$des$$ — you cannot say $$Je\\ veux\\ croissants$$. The article is grammatically mandatory.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": true}, {"question": "What are partitive articles in French, and when do you use them instead of un/une?", "answer": "- Step 1: Partitives are $$du$$ (masc.), $$de\\ la$$ (fem.), and $$des$$ (plural) — they mean \"some\" but specifically for **uncountable** quantities, i.e., a portion of something.\n- Step 2: Use them with mass/uncountable nouns: $$du\\ café$$ (some coffee — you can't count individual coffees), $$de\\ la\\ crème$$ (some cream), $$du\\ saumon$$ (some salmon).\n- Step 3: Contrast with countable: $$un\\ café$$ = \"a [cup of] coffee\" (one unit), versus $$du\\ café$$ = \"some coffee\" (an unspecified amount of the substance).\n\nTakeaway: $$un/une$$ counts units; $$du/de\\ la$$ measures portions. English collapses both into \"a/some\"; French keeps them separate.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "When you negate a sentence with un/une/des or du/de la, what happens to the article?", "answer": "- Step 1: All these articles collapse to a single form: $$pas\\ de$$ (or $$pas\\ d'$$ before a vowel sound).\n- Step 2: Examples:\n+ $$J'ai\\ un\\ café$$ → $$Je\\ n'ai\\ pas\\ de\\ café$$ (not \"pas un café\").\n+ $$Il\\ y\\ a\\ des\\ croissants$$ → $$Il\\ n'y\\ a\\ pas\\ de\\ croissants$$.\n+ $$J'ai\\ une\\ omelette$$ → $$Je\\ n'ai\\ pas\\ d'omelette$$ (d' before vowel).\n- Step 3: The logic: when you negate, you're asserting \"zero quantity,\" and French marks zero with a single neutral $$de$$ regardless of the original gender/number.\n\nMisconception probe: $$Je\\ n'ai\\ pas\\ un\\ café$$ sounds wrong to a French ear — it would imply \"I don't have ONE [specific] coffee,\" not \"I have no coffee.\"", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "How do you make a French verb negative, and what happens before a vowel?", "answer": "- Step 1: French negation **wraps** the conjugated verb with two pieces: $$ne$$ + verb + $$pas$$.\n+ $$Je\\ suis$$ → $$Je\\ ne\\ suis\\ pas$$ (I am not).\n+ $$Tu\\ as$$ → $$Tu\\ n'as\\ pas$$ (you don't have).\n- Step 2: When the verb starts with a vowel sound (or silent h), $$ne$$ elides to $$n'$$: $$n'ai$$, $$n'est$$, $$n'ont$$, $$n'avons$$.\n- Step 3: This is the standard \"two-part negation\" — unlike English's single \"not,\" French historically used both an old negative ($$ne$$) and a reinforcer ($$pas$$ = \"step\"), and both stuck.\n\nTakeaway: In casual spoken French, the $$ne$$ is often dropped (\"$$je\\ sais\\ pas$$\"), but in writing and proper speech, always include both.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": true}, {"question": "Conjugate the verb $$avoir$$ (to have) in the present tense for all six subjects.", "answer": "- Step 1: The six forms:\n+ $$j'ai$$ (I have)\n+ $$tu\\ as$$ (you have, informal)\n+ $$il/elle/on\\ a$$ (he/she/one has)\n- Step 2: Plural forms:\n+ $$nous\\ avons$$ (we have)\n+ $$vous\\ avez$$ (you have, plural/formal)\n+ $$ils/elles\\ ont$$ (they have)\n- Step 3: Note the spelling looks irregular but follows a pattern: the singular forms are short (ai/as/a), and plural forms add endings (-ons/-ez/-ont).\n\nMisconception probe: $$avez$$ (you) and $$avons$$ (we) sound similar — drill them. Confusing them flips who's being talked about.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "Conjugate $$avoir$$ in the negative present — all six persons.", "answer": "- Step 1: Singular negative — note $$ne$$ becomes $$n'$$ before vowel:\n+ $$je\\ n'ai\\ pas$$\n+ $$tu\\ n'as\\ pas$$\n+ $$il/elle/on\\ n'a\\ pas$$\n- Step 2: Plural negative:\n+ $$nous\\ n'avons\\ pas$$\n+ $$vous\\ n'avez\\ pas$$\n+ $$ils/elles\\ n'ont\\ pas$$\n- Step 3: ALL forms of $$avoir$$ start with a vowel, so $$ne$$ ALWAYS elides to $$n'$$ — there's no form where you'd say $$ne\\ ai$$.\n\nTakeaway: With $$avoir$$, you always get the contracted $$n'...pas$$ wrapping.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "Conjugate the verb $$être$$ (to be) in the present tense for all six subjects.", "answer": "- Step 1: Singular forms:\n+ $$je\\ suis$$ (I am)\n+ $$tu\\ es$$ (you are)\n+ $$il/elle/on\\ est$$ (he/she/one is)\n- Step 2: Plural forms:\n+ $$nous\\ sommes$$ (we are)\n+ $$vous\\ êtes$$ (you are, plural/formal)\n+ $$ils/elles\\ sont$$ (they are)\n- Step 3: $$être$$ is highly irregular — there's no obvious stem; you have to memorize all six. Note $$vous\\ êtes$$ has the circumflex and triggers liaison (\"voo-ZET\").\n\nTakeaway: $$être$$ and $$avoir$$ are THE two most important verbs — every other tense and many constructions build on them.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "Conjugate $$être$$ in the negative present, paying attention to where $$ne$$ elides.", "answer": "- Step 1: Singular:\n+ $$je\\ ne\\ suis\\ pas$$ (suis starts with consonant s — no elision)\n+ $$tu\\ n'es\\ pas$$ (es starts with vowel — elision)\n+ $$il/elle/on\\ n'est\\ pas$$ (est starts with vowel — elision)\n- Step 2: Plural:\n+ $$nous\\ ne\\ sommes\\ pas$$ (sommes starts with consonant)\n+ $$vous\\ n'êtes\\ pas$$ (êtes starts with vowel)\n+ $$ils/elles\\ ne\\ sont\\ pas$$ (sont starts with consonant)\n- Step 3: The rule: $$ne$$ becomes $$n'$$ only when the next sound is a vowel — so it's mixed with $$être$$ unlike $$avoir$$.\n\nTakeaway: Train your ear: $$je\\ ne\\ suis\\ pas$$ keeps the $$ne$$ separate; $$il\\ n'est\\ pas$$ blends together.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "What does $$il\\ y\\ a$$ mean, and how do you negate it?", "answer": "- Step 1: $$il\\ y\\ a$$ = \"there is\" / \"there are\" — works for both singular and plural in French (unlike English which switches).\n+ $$Il\\ y\\ a\\ un\\ croissant$$ = There is a croissant.\n+ $$Il\\ y\\ a\\ des\\ croissants$$ = There are croissants.\n- Step 2: Literally it breaks down as $$il$$ (it) + $$y$$ (there) + $$a$$ (has) — \"it has there\" → \"there exists.\"\n- Step 3: Negative: $$il\\ n'y\\ a\\ pas\\ de$$ — and remember the article collapses to $$de$$.\n+ $$Il\\ n'y\\ a\\ pas\\ de\\ tarte$$ = There is no tart.\n\nTakeaway: $$il\\ y\\ a$$ is a frozen expression — don't try to break it apart; learn it as a unit.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": true}, {"question": "What's the difference between $$on$$ and $$nous$$ when meaning \"we\"?", "answer": "- Step 1: $$nous$$ is the formal/written \"we\" — used in writing, formal speech, and when emphasizing the group. Takes its own verb form: $$nous\\ avons$$, $$nous\\ sommes$$.\n- Step 2: $$on$$ is the informal/spoken \"we\" — what you'll hear constantly in everyday conversation. Crucially, it takes the **third-person-singular** verb form (like il/elle): $$on\\ a$$, $$on\\ est$$, $$on\\ va$$.\n- Step 3: At a restaurant ordering for two, you'd naturally say $$On\\ va\\ prendre\\ deux\\ cafés$$ rather than $$Nous\\ allons\\ prendre$$ — the latter sounds stiff.\n\nMisconception probe: Even though $$on$$ means \"we,\" its verb conjugates as if singular — $$on\\ est$$ NOT $$on\\ sont$$. The form looks like he/she but the meaning is we.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": true}, {"question": "Count from 1 to 10 in French.", "answer": "- Step 1: 1–5: $$un,\\ deux,\\ trois,\\ quatre,\\ cinq$$.\n- Step 2: 6–10: $$six,\\ sept,\\ huit,\\ neuf,\\ dix$$.\n- Step 3: Pronunciation traps to note:\n+ $$six$$ and $$dix$$ — the final x is \"ss\" alone, silent before a consonant (six livres → \"see leevr\"), \"z\" before a vowel (six ans → \"see-zan\").\n+ $$sept$$ — the p is silent (\"set\").\n+ $$neuf$$ — the f stays (\"nuhf\"), but becomes \"v\" before vowels (neuf ans → \"nuh-VAN\").", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": true}, {"question": "Count 11 through 20 in French, and identify which numbers are pronunciation traps.", "answer": "- Step 1: 11–15: $$onze,\\ douze,\\ treize,\\ quatorze,\\ quinze$$.\n- Step 2: 16–20: $$seize,\\ dix-sept,\\ dix-huit,\\ dix-neuf,\\ vingt$$.\n- Step 3: Key traps:\n+ $$quatorze$$ (14) sounds \"ka-TORZ\" — the -ze IS pronounced.\n+ Starting at $$dix-sept$$ (17), French builds compound numbers: literally \"ten-seven.\" This pattern stops at 19; then 20 becomes its own word $$vingt$$ (\"van\").\n+ $$vingt$$ has a silent t alone, but the t reactivates before a vowel in liaison: $$vingt\\ ans$$ → \"van-tan\".", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "What's the special pattern for numbers like 21, 31, 41, 51, 61 in French — and how is 22 different?", "answer": "- Step 1: For 21, 31, 41, 51, 61, French inserts \"et un\" (and one): $$vingt-et-un,\\ trente-et-un,\\ quarante-et-un,\\ cinquante-et-un,\\ soixante-et-un$$.\n- Step 2: BUT for 22, 23, 32, 33, etc., there's NO \"et\" — just hyphenation: $$vingt-deux,\\ vingt-trois,\\ trente-deux$$.\n- Step 3: Why? Historically the \"et\" was a courtesy linker only for \"one\" (the smallest unit), like saying \"twenty AND one\" in old languages. For other digits, French just stacks them.\n\nMisconception probe: 71 = $$soixante-et-onze$$ keeps the \"et\" (because of the 1 in 11), but 72 = $$soixante-douze$$ doesn't.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": true}, {"question": "How does French construct 70, 80, and 90 — and why is the logic different for 80/90 vs 70?", "answer": "- Step 1: 70 = $$soixante-dix$$ — literally \"sixty-ten\" (60 + 10). So 71 = $$soixante-et-onze$$ (60+11), 79 = $$soixante-dix-neuf$$ (60+19).\n- Step 2: 80 = $$quatre-vingts$$ — literally \"four-twenties\" (4 × 20). This is a **vigesimal** (base-20) leftover from Old French/Celtic. So 81 = $$quatre-vingt-un$$, 99 = $$quatre-vingt-dix-neuf$$.\n- Step 3: 90 = $$quatre-vingt-dix$$ — \"four-twenties-ten\" (4×20+10). So 91 = $$quatre-vingt-onze$$, 99 = $$quatre-vingt-dix-neuf$$.\n\nTakeaway: 70 builds on ×10 (extending 60), but 80 and 90 build on ×20. Switzerland/Belgium simplify with $$septante, huitante/octante, nonante$$ — but standard French keeps the old system.\n\nMisconception probe: $$quatre-vingts$$ has an -s only when it ends a number; $$quatre-vingt-un$$ drops the s because something follows.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": true}, {"question": "Say 100, 1,000, 1 million, and 1 billion in French. Which one is a \"false friend\"?", "answer": "- Step 1: 100 = $$cent$$, 1,000 = $$mille$$.\n- Step 2: 1,000,000 = $$un\\ million$$, 1,000,000,000 = $$un\\ milliard$$.\n- Step 3: The false friend is $$un\\ milliard$$ — it means **billion** (10⁹), not million. Don't confuse with English \"milliard\" (rare/archaic in English).\n\nTakeaway: A French \"billion\" ($$un\\ billion$$) historically meant 10¹², not 10⁹ — but in modern usage, just remember: $$milliard$$ = billion (American sense), $$million$$ = million.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "What are the three French time-frame words for yesterday, today, and tomorrow?", "answer": "- Step 1: $$hier$$ = yesterday (pronounced \"yair\").\n- Step 2: $$aujourd'hui$$ = today — a long word literally meaning \"on the day of today\" ($$au\\ jour\\ d'hui$$, where \"hui\" itself was old French for \"today\"; the modern form is redundant).\n- Step 3: $$demain$$ = tomorrow (pronounced \"duh-MAN\" with nasal vowel).\n\nTakeaway: $$aujourd'hui$$ looks intimidating but is one fixed word — pronounce it \"oh-zhoor-DWEE.\"", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "What does $$quel$$ mean, and why does it have four different forms?", "answer": "- Step 1: $$quel$$ means \"which\" or \"what\" — used to ask about a specific noun.\n- Step 2: It's an **adjective**, so it must agree with the noun it modifies in gender and number:\n+ $$quel$$ (masc. sing.) — $$Quel\\ âge\\ ?$$ (What age?)\n+ $$quelle$$ (fem. sing.) — $$Quelle\\ heure\\ ?$$ (What time?)\n+ $$quels$$ (masc. pl.) — $$Quels\\ livres\\ ?$$ (Which books?)\n+ $$quelles$$ (fem. pl.) — $$Quelles\\ salades\\ ?$$ (Which salads?)\n- Step 3: All four forms sound IDENTICAL when spoken (just \"kel\") — agreement only shows in spelling. So in speech you don't worry, but in writing it matters.\n\nTakeaway: $$quel$$ behaves like any French adjective — gender/number agreement applies even to question words.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "Give three polite ways to say \"I would like to have…\" in a French restaurant.", "answer": "- Step 1: $$Je\\ voudrais\\ldots$$ — the most common; conditional form of $$vouloir$$ (\"I would want\"). Softer than $$Je\\ veux$$ (I want), which sounds blunt.\n- Step 2: $$Je\\ pourrais\\ avoir\\ldots$$ — \"Could I have…\" — conditional of $$pouvoir$$ (to be able). Used to ask politely if you may have something.\n- Step 3: $$J'aimerais\\ avoir\\ldots$$ — \"I would like to have…\" — conditional of $$aimer$$. Slightly warmer/wishful tone.\n\nMisconception probe: Saying $$Je\\ veux$$ to a waiter is grammatically fine but socially curt — like demanding rather than asking. Always use the conditional in service contexts.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": true}, {"question": "How do you say \"I'm going to have the hamburger\" when ordering in French?", "answer": "- Step 1: $$Je\\ vais\\ prendre\\ le\\ hamburger$$ — literally \"I am going to take the hamburger.\"\n- Step 2: $$Je\\ vais$$ + infinitive = \"I'm going to [do]\" — the near-future construction (futur proche), like English's \"going to\" future.\n- Step 3: Note: at a restaurant, French uses $$prendre$$ (to take), not $$avoir$$ or $$manger$$, for ordering — it's the natural verb of choosing from a menu.\n\nTakeaway: $$Je\\ vais\\ prendre$$ is the most natural everyday way to order; $$Je\\ voudrais$$ is slightly more formal/polite.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": true}, {"question": "When a French waiter asks $$Quelle\\ cuisson\\ pour\\ la\\ viande\\ ?$$, what are they asking, and what are the four standard responses?", "answer": "- Step 1: They're asking \"What cooking [doneness] for the meat?\" — $$cuisson$$ means the degree of cooking.\n- Step 2: The four responses, from least to most cooked:\n+ $$bleu$$ = blue / very rare (barely seared)\n+ $$saignant$$ = bloody / rare\n+ $$à\\ point$$ = \"to the point\" / medium\n+ $$bien\\ cuit$$ = well-cooked / well done\n- Step 3: Note that French steak culture skews rarer than American — $$à\\ point$$ in France is closer to medium-rare elsewhere.\n\nTakeaway: $$saignant$$ literally means \"bleeding\" — French doesn't soften the description.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": true}, {"question": "Give two ways to ask for the bill politely in French, and the word that means \"the bill.\"", "answer": "- Step 1: The bill = $$l'addition$$ (feminine) — the standard restaurant word. $$la\\ note$$ is an alternative (more for hotels/bars).\n- Step 2: Polite ways to ask:\n+ $$L'addition,\\ s'il\\ vous\\ plaît$$ — short and standard.\n+ $$Je\\ pourrais\\ avoir\\ l'addition,\\ s'il\\ vous\\ plaît\\ ?$$ — fuller, more polite (\"Could I have the bill?\").\n- Step 3: Don't shout for the waiter — make eye contact and use one of these phrases or a small hand gesture (mimicking writing).\n\nTakeaway: $$addition$$ is feminine because it ends in -tion (a reliable rule: -tion nouns are almost always feminine).", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "What's the difference between asking $$À\\ l'intérieur\\ ou\\ en\\ terrasse\\ ?$$ and how would you choose outdoor seating?", "answer": "- Step 1: The waiter is asking \"Inside or on the terrace?\" — $$à\\ l'intérieur$$ = indoors; $$en\\ terrasse$$ = on the outdoor patio.\n- Step 2: To choose outdoor: $$Je\\ préfère\\ en\\ terrasse$$ (I prefer the terrace).\n- Step 3: Note the prepositions: $$à\\ l'intérieur$$ uses $$à$$ + the definite article (because \"interior\" is a defined place), while $$en\\ terrasse$$ uses $$en$$ without an article (terrasse is treated as a general state/location, like $$en\\ classe$$ \"in class\").\n\nTakeaway: French terrace culture is huge — the question is asked at almost every café.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "When a waiter says $$Suivez-moi,\\ s'il\\ vous\\ plaît$$ and $$Installez-vous$$, what are they telling you to do?", "answer": "- Step 1: $$Suivez-moi,\\ s'il\\ vous\\ plaît$$ = \"Follow me, please.\" $$Suivez$$ is the imperative (command form) of $$suivre$$ (to follow), formal/plural form.\n- Step 2: $$Installez-vous$$ = \"Settle yourselves\" / \"Take a seat / make yourself comfortable.\" It's reflexive: $$s'installer$$ = to settle oneself in.\n- Step 3: Both use the formal/polite $$vous$$ form — appropriate because the staff is addressing a customer.\n\nTakeaway: $$Installez-vous$$ is warmer than just \"Sit down\" — it invites you to make yourself at home.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "Translate and unpack: $$Souhaiteriez-vous\\ une\\ bouteille\\ d'eau\\ gazeuse\\ ou\\ d'eau\\ plate\\ ?$$", "answer": "- Step 1: Overall meaning: \"Would you like a bottle of sparkling water or still water?\"\n- Step 2: Breakdown:\n+ $$Souhaiteriez-vous$$ = \"Would you like\" — conditional of $$souhaiter$$ (to wish). Very polite, more elegant than $$voulez-vous$$.\n+ $$une\\ bouteille\\ d'eau$$ = \"a bottle of water\" — $$de$$ + $$eau$$ contracts to $$d'eau$$.\n+ $$gazeuse$$ = sparkling (literally \"gassy\"); $$plate$$ = still / flat.\n- Step 3: Note: water is $$l'eau$$ (feminine), so the adjectives agree as feminine: $$gazeuse$$ (not gazeux), $$plate$$ (not plat).\n\nTakeaway: French waiters almost always offer this choice — sparkling vs. still is a default question.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": true}, {"question": "What does the waiter mean when they ask $$Avez-vous\\ fait\\ votre\\ choix\\ ?$$ vs $$Avez-vous\\ choisi\\ ?$$", "answer": "- Step 1: Both mean \"Have you decided / made your choice?\" They're interchangeable.\n- Step 2: Structural difference:\n+ $$Avez-vous\\ fait\\ votre\\ choix\\ ?$$ — literally \"Have you made your choice?\" Uses $$faire$$ (to make) + noun $$choix$$.\n+ $$Avez-vous\\ choisi\\ ?$$ — literally \"Have you chosen?\" Uses the verb $$choisir$$ (to choose) in past participle.\n- Step 3: Both are in the $$passé\\ composé$$ (compound past), with $$avoir$$ as the auxiliary — the typical French way to ask about a recently completed action.\n\nTakeaway: When the waiter asks this, they're prompting you to order — answer either \"Oui, je voudrais…\" or \"Non, pas encore\" (Not yet).", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "How do you say \"What's in it?\" / \"What's in the [dish]?\" when asking about ingredients in French?", "answer": "- Step 1: $$Qu'est-ce\\ qu'il\\ y\\ a\\ dans\\ \\ldots\\ ?$$ = \"What is there in…?\"\n- Step 2: Breakdown:\n+ $$Qu'est-ce\\ que$$ = \"What\" (question opener) — literally \"What is it that\"\n+ $$il\\ y\\ a$$ = \"there is\"\n+ $$dans$$ = in\n- Step 3: Example: $$Qu'est-ce\\ qu'il\\ y\\ a\\ dans\\ la\\ salade\\ niçoise\\ ?$$ = What's in the niçoise salad?\n\nTakeaway: $$Qu'est-ce\\ que$$ is the universal question-opener — drill it. Pronounced \"kess-kuh.\"", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": true}, {"question": "Imagine you and a friend are ordering — give three on-forms a French speaker would naturally use.", "answer": "- Step 1: $$On\\ va\\ prendre\\ldots$$ = \"We're going to have…\" (futur proche with $$aller$$).\n- Step 2: $$On\\ aimerait\\ldots$$ = \"We would like…\" (conditional of $$aimer$$, the warm/polite \"we'd love\").\n- Step 3: $$On\\ pourrait\\ avoir\\ldots$$ = \"Could we have…\" (conditional of $$pouvoir$$, asking permission).\n\nMisconception probe: All three use the singular verb form (a, aimerait, pourrait) because $$on$$ grammatically counts as he/she. Saying $$on\\ aimerions$$ is wrong.\n\nTakeaway: At a table for two, $$on$$ is your default — it's how real French people order.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "Walk through the dialogue for making a French restaurant reservation by phone — what does each party say?", "answer": "- Step 1: The restaurant opens: $$C'est\\ pour\\ une\\ réservation\\ ?$$ (\"Is this for a reservation?\"). You confirm: $$Oui,\\ pour\\ ce\\ soir$$ (Yes, for tonight).\n- Step 2: They ask the details:\n+ $$À\\ quelle\\ heure\\ ?$$ → $$À\\ 19h30,\\ s'il\\ vous\\ plaît$$ (At 7:30 PM, please).\n+ $$Pour\\ combien\\ de\\ personnes\\ ?$$ → $$Pour\\ 2\\ personnes,\\ s'il\\ vous\\ plaît$$.\n+ $$Votre\\ numéro\\ de\\ téléphone\\ pour\\ confirmer\\ ?$$ (give your number).\n- Step 3: They close: $$C'est\\ noté,\\ Monsieur.\\ À\\ ce\\ soir\\ !$$ (\"It's noted, sir. See you tonight!\") → You: $$Merci\\ beaucoup,\\ au\\ revoir\\ !$$\n\nTakeaway: French uses 24-hour time for reservations (19h30, not 7:30 PM). The phrase $$à\\ ce\\ soir$$ literally \"to this evening\" = \"see you tonight.\"", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": false}, {"question": "How do you respond to \"Do you have a reservation?\" — both yes and no — in French?", "answer": "- Step 1: Affirmative: $$Oui,\\ j'ai\\ une\\ réservation\\ pour\\ deux\\ personnes$$ (Yes, I have a reservation for two people).\n- Step 2: Negative: $$Non,\\ je\\ n'ai\\ pas\\ de\\ réservation$$ (No, I don't have a reservation).\n- Step 3: Notice the negation rule in action: $$une\\ réservation$$ (a reservation) becomes $$de\\ réservation$$ when negated — the article collapses to $$de$$.\n\nMisconception probe: $$Je\\ n'ai\\ pas\\ une\\ réservation$$ is wrong; remember un/une → de in negation.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": true}, {"question": "What's the fundamental social difference between using $$tu$$ and $$vous$$ in French?", "answer": "- Step 1: $$tu$$ = informal singular \"you\" — for friends, family, peers, children, animals, anyone with whom you have a casual or close relationship.\n- Step 2: $$vous$$ has TWO uses:\n+ Formal singular \"you\" — for strangers, elders, professionals, business contexts (one person, but you show respect).\n+ Plural \"you\" — addressing multiple people, regardless of formality.\n- Step 3: Defaults: with anyone you don't know well, START with $$vous$$. The other person may invite you to switch ($$On\\ peut\\ se\\ tutoyer$$ — \"We can use tu with each other\"). Using $$tu$$ prematurely with a stranger can feel disrespectful or overly familiar.\n\nTakeaway: Tu/vous isn't just grammar — it's a social signal about your relationship.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": true}, {"question": "When you say $$une\\ salade\\ verte$$ but $$deux\\ petits\\ verres$$, why do the adjective endings differ?", "answer": "- Step 1: French adjectives must agree with the noun in **gender** AND **number**.\n- Step 2: Breakdown:\n+ $$une\\ salade\\ verte$$ — $$salade$$ is feminine singular, so $$vert$$ → $$verte$$ (add -e for feminine).\n+ $$deux\\ petits\\ verres$$ — $$verres$$ is masculine plural, so $$petit$$ → $$petits$$ (add -s for plural).\n- Step 3: General rule: default adjective form is masculine singular. Add -e for feminine, -s for plural, -es for feminine plural.\n+ $$des\\ légumes\\ cuits$$ — masc. pl. → adds -s.\n+ $$une\\ orange\\ pressée$$ — fem. sing. → adds -e.\n\nTakeaway: The adjective changes shape to \"echo\" the noun — gender and number ripple through the whole noun phrase.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "Match these French café items to what they are: $$un\\ croque-monsieur$$, $$une\\ orange\\ pressée$$, $$un\\ plat\\ du\\ jour$$, $$une\\ carafe\\ d'eau$$.", "answer": "- Step 1: $$un\\ croque-monsieur$$ = a toasted ham-and-cheese sandwich. Literally \"Mr. Crunch\" — $$croquer$$ means \"to crunch.\"\n- Step 2: $$une\\ orange\\ pressée$$ = a freshly squeezed orange juice (literally \"a pressed orange\"). $$pressée$$ is the feminine past participle of $$presser$$ (to press).\n- Step 3: $$un\\ plat\\ du\\ jour$$ = the dish of the day — $$plat$$ = dish, $$du\\ jour$$ = of the day. $$une\\ carafe\\ d'eau$$ = a carafe of (tap) water — asking for this gets you FREE water in France, not bottled.\n\nTakeaway: Knowing $$carafe\\ d'eau$$ saves you €5 — bottled water (gazeuse/plate) costs, tap water in a carafe is free by law.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "What does $$Je\\ suis\\ désolé$$ mean, and why might it sometimes be spelled $$désolée$$?", "answer": "- Step 1: $$Je\\ suis\\ désolé$$ = \"I am sorry\" — literally \"I am desolated/devastated.\"\n- Step 2: $$désolé$$ is an adjective describing the subject (you), so it must agree:\n+ A male speaker: $$Je\\ suis\\ désolé$$ (no extra e).\n+ A female speaker: $$Je\\ suis\\ désolée$$ (add -e for feminine).\n- Step 3: This is the general rule for any adjective after $$être$$ — the subject's gender determines the ending.\n\nTakeaway: When YOU describe yourself, the adjective agrees with your gender. Female speakers add -e in writing (silent in speech).", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": true}, {"question": "Why does $$La\\ réunion\\ est\\ finie$$ have $$finie$$ with an -e, but you'd say $$Le\\ repas\\ est\\ fini$$ without?", "answer": "- Step 1: $$fini$$ here is acting like an adjective (past participle used adjectivally), so it agrees with the subject.\n- Step 2: $$La\\ réunion$$ (the meeting) is feminine — so $$fini$$ becomes $$finie$$.\n- Step 3: $$Le\\ repas$$ (the meal) is masculine — so $$fini$$ stays as $$fini$$ (default form).\n\nTakeaway: Adjective agreement after $$être$$ is automatic — even past participles like $$fini, fait, parti$$ shift their endings.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": true}, {"question": "What does $$Je\\ reviens\\ tout\\ de\\ suite$$ mean, and when would a waiter say it?", "answer": "- Step 1: $$Je\\ reviens\\ tout\\ de\\ suite$$ = \"I'll be right back\" / \"I'm coming back immediately.\"\n- Step 2: Breakdown:\n+ $$Je\\ reviens$$ = \"I come back\" (present tense of $$revenir$$, used here for near future).\n+ $$tout\\ de\\ suite$$ = \"right away\" / \"immediately\" — literally \"all of following.\"\n- Step 3: A waiter says this after taking your order or when stepping away briefly. It's also useful for you to say if you need to leave the table temporarily.\n\nTakeaway: $$tout\\ de\\ suite$$ is one of the most common time expressions — drill the pronunciation (\"toot-SWEET\").", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": false}, {"question": "What's the difference between $$Est-ce\\ que\\ tout\\ va\\ bien\\ ?$$ and $$Ça\\ va\\ ?$$", "answer": "- Step 1: $$Ça\\ va\\ ?$$ = casual \"How's it going?\" — used between friends or as a general greeting.\n- Step 2: $$Est-ce\\ que\\ tout\\ va\\ bien\\ ?$$ = \"Is everything alright?\" — more formal, often asked by a waiter mid-meal to check on you.\n- Step 3: Structurally:\n+ $$Ça\\ va\\ ?$$ uses just intonation to make a question (the most casual French question form).\n+ $$Est-ce\\ que\\ldots$$ is the polite/formal question-opener, signaling a complete sentence is following.\n\nTakeaway: $$Est-ce\\ que$$ + statement is the easiest way to form polite questions — no inversion needed.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": true}, {"question": "Translate $$Est-ce\\ que\\ vous\\ les\\ voulez\\ en\\ même\\ temps\\ ?$$ and explain what $$les$$ refers to.", "answer": "- Step 1: Meaning: \"Do you want them at the same time?\" — a waiter might ask this if you ordered multiple dishes.\n- Step 2: Breakdown:\n+ $$Est-ce\\ que$$ — question opener.\n+ $$vous\\ les\\ voulez$$ — \"you want them\"; $$les$$ is the direct object pronoun for \"them\" (placed BEFORE the verb in French).\n+ $$en\\ même\\ temps$$ — \"at the same time.\"\n- Step 3: $$les$$ refers back to whatever dishes/items were just mentioned in the conversation — e.g., your starter and main course.\n\nMisconception probe: Unlike English (\"Do you want THEM\"), French puts the object pronoun BEFORE the verb ($$les\\ voulez$$, not $$voulez\\ les$$).", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": true}, {"question": "If you want a rare steak in French, what's the full phrase you'd say?", "answer": "- Step 1: A steak (specifically rib steak) = $$une\\ entrecôte$$ (feminine).\n- Step 2: Rare = $$saignant$$ — but since $$entrecôte$$ is feminine, the adjective agrees: $$saignante$$.\n- Step 3: Full phrase: $$une\\ entrecôte\\ saignante$$, or in a sentence: $$Je\\ voudrais\\ une\\ entrecôte\\ saignante,\\ s'il\\ vous\\ plaît$$.\n\nTakeaway: Always check noun gender before applying the doneness adjective — $$un\\ steak\\ saignant$$ (masc.) vs $$une\\ entrecôte\\ saignante$$ (fem.).", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": true}, {"question": "Why are partitive articles ($$du,\\ de\\ la$$) more natural than indefinite articles ($$un,\\ une$$) when ordering coffee or wine?", "answer": "- Step 1: $$un\\ café$$ = \"a [cup of] coffee\" — refers to ONE unit, a specific serving. Natural at a café where coffee comes by the cup.\n- Step 2: $$du\\ café$$ = \"some coffee\" — refers to coffee as a substance, an unspecified portion. More natural when discussing coffee generally ($$Je\\ bois\\ du\\ café\\ le\\ matin$$ — I drink coffee in the morning).\n- Step 3: Context decides:\n+ Ordering: $$Un\\ café,\\ s'il\\ vous\\ plaît$$ (one cup).\n+ Describing habits: $$J'aime\\ le\\ café$$ (definite article: coffee in general) or $$Je\\ veux\\ du\\ café$$ (some).\n\nTakeaway: Use $$un/une$$ for countable servings, $$du/de\\ la$$ for portions of an uncountable substance. English collapses both — French keeps them precise.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": false}, {"question": "What does $$toujours$$ mean, and what's its position in a sentence?", "answer": "- Step 1: $$toujours$$ = \"always\" (also sometimes \"still,\" depending on context).\n- Step 2: Placement: usually right after the conjugated verb.\n+ $$Je\\ suis\\ toujours\\ en\\ retard$$ = I'm always late.\n+ $$Il\\ a\\ toujours\\ raison$$ = He's always right.\n- Step 3: With negation, $$ne\\ \\ldots\\ jamais$$ is the opposite (\"never\"), wrapping the verb just like $$ne\\ \\ldots\\ pas$$.\n\nTakeaway: French adverbs of frequency (toujours, souvent, jamais) typically sit BETWEEN the verb and the rest of the sentence — unlike English which often puts them before.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": true}, {"question": "Why is $$un\\ lit$$ (a bed) masculine, and how does this affect related sentences?", "answer": "- Step 1: $$lit$$ ends in a consonant (-t, silent) and doesn't follow any feminine pattern (-tion, -ette, -ée, etc.) — defaults to masculine.\n- Step 2: Consequences:\n+ Article: $$un\\ lit$$, $$le\\ lit$$.\n+ Adjective agreement: $$un\\ grand\\ lit$$ (a big bed) — masculine adjective form.\n+ Pronoun: $$il$$ — $$Le\\ lit\\ est\\ grand$$ → $$Il\\ est\\ grand$$.\n- Step 3: Pronunciation: $$lit$$ sounds like \"lee\" — the final t is silent. The plural $$lits$$ also sounds like \"lee.\"\n\nTakeaway: When learning a French noun, always learn it WITH its article ($$un\\ lit$$, not just $$lit$$) so gender sticks naturally.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": true}, {"question": "Practice production: How would you introduce yourself in French saying your name, age, nationality, and where you live? Give one connected speech.", "answer": "- Step 1: Name: $$Bonjour,\\ je\\ m'appelle\\ [name]$$.\n- Step 2: Age and nationality: $$J'ai\\ [number]\\ ans$$ + $$Je\\ suis\\ [nationality]$$.\n+ E.g., $$J'ai\\ vingt-quatre\\ ans.\\ Je\\ suis\\ vietnamien$$ (or $$vietnamienne$$ if female).\n- Step 3: Location: $$J'habite\\ à\\ [city],\\ en\\ [country]$$.\n+ E.g., $$J'habite\\ à\\ Paris,\\ en\\ France.$$\n\nPutting it together: $$Bonjour,\\ je\\ m'appelle\\ Phuc.\\ J'ai\\ vingt-quatre\\ ans.\\ Je\\ suis\\ vietnamien.\\ J'habite\\ à\\ Paris,\\ en\\ France.$$\n\nTakeaway: Notice the alternation: $$avoir$$ for age, $$être$$ for nationality, $$habiter$$ for residence. Each statement needs the right verb.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": true}, {"question": "When saying \"I live in [country],\" when do you use $$en$$, $$au$$, or $$aux$$?", "answer": "- Step 1: $$en$$ = before a feminine country or one starting with a vowel.\n+ $$en\\ France,\\ en\\ Italie,\\ en\\ Espagne,\\ en\\ Iran$$.\n- Step 2: $$au$$ = before a masculine country starting with a consonant.\n+ $$au\\ Canada,\\ au\\ Japon,\\ au\\ Portugal,\\ au\\ Vietnam$$.\n- Step 3: $$aux$$ = before a plural country name.\n+ $$aux\\ États-Unis,\\ aux\\ Pays-Bas$$.\n\nTakeaway: Most countries ending in -e are feminine (France, Italie, Belgique); others are masculine. Mexique is a famous exception (masculine despite -e).", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": true}, {"question": "A waiter says $$Que\\ désirez-vous\\ boire\\ ?$$ — what are they asking, and how would you reply with \"I would like a glass of red wine\"?", "answer": "- Step 1: $$Que\\ désirez-vous\\ boire\\ ?$$ = \"What do you wish to drink?\" — $$désirer$$ (to wish/desire) is more formal than $$vouloir$$.\n- Step 2: Reply: $$Je\\ voudrais\\ un\\ verre\\ de\\ vin\\ rouge$$.\n+ $$un\\ verre\\ de\\ vin$$ = a glass of wine (note: $$de$$ links glass and wine — no article between them).\n+ $$rouge$$ = red (invariable for this color).\n- Step 3: Notice $$vin$$ is masculine, so $$rouge$$ doesn't change form here, but adjectives like $$blanc/blanche$$ would.\n\nTakeaway: Quantity expressions like \"a glass of,\" \"a bottle of,\" \"a cup of\" all use $$de$$ (not du/de la) — $$un\\ verre\\ de\\ vin$$, not $$un\\ verre\\ du\\ vin$$.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": true}, {"question": "Compare the two negations: $$Je\\ ne\\ suis\\ pas\\ vietnamien$$ vs $$Je\\ n'ai\\ pas\\ vingt-quatre\\ ans$$. Why does one have $$ne$$ and the other $$n'$$?", "answer": "- Step 1: The rule: $$ne$$ elides to $$n'$$ when followed by a vowel sound.\n- Step 2: $$Je\\ ne\\ suis\\ pas$$ — $$suis$$ starts with \"s\" (consonant) → $$ne$$ stays intact.\n- Step 3: $$Je\\ n'ai\\ pas$$ — $$ai$$ starts with \"a\" (vowel) → $$ne$$ becomes $$n'$$.\n\nTakeaway: Elision is purely phonetic — French dislikes two vowels colliding (\"ne ai\" sounds awkward), so it crunches them together.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": true}, {"question": "What's a quick way to test if you've correctly applied indefinite vs partitive vs negation rules? Walk through ordering \"I'd like a coffee, but no sugar.\"", "answer": "- Step 1: \"A coffee\" — countable serving → $$un\\ café$$. So: $$Je\\ voudrais\\ un\\ café$$.\n- Step 2: \"No sugar\" — sugar is a substance, normally needing partitive $$du\\ sucre$$. But it's NEGATED, so the partitive collapses to $$pas\\ de$$.\n- Step 3: Combine: $$Je\\ voudrais\\ un\\ café,\\ mais\\ pas\\ de\\ sucre$$ (or more naturally: $$Je\\ voudrais\\ un\\ café\\ sans\\ sucre$$ — \"without sugar\").\n\nTakeaway: Indefinite and partitive both collapse to $$de$$ in negation — this is one of the most testable French rules.", "source": "Opus 4.7 ①", "_id": "opus_1_55", "judge_pick": true}, {"question": "Why does the question $$Quel\\ âge\\ as-tu\\ ?$$ have $$as-tu$$ with a hyphen, and what construction is this?", "answer": "- Step 1: This is **inversion** — the formal/written way to make a question in French, by flipping subject and verb.\n- Step 2: Normal statement: $$Tu\\ as\\ [number]\\ ans$$. Inverted question: $$As-tu\\ [number]\\ ans\\ ?$$ — verb and pronoun swap, with a hyphen joining them.\n- Step 3: Three ways to ask the same thing in French:\n+ Informal: $$Tu\\ as\\ quel\\ âge\\ ?$$ (intonation only, very casual).\n+ Standard: $$Quel\\ âge\\ tu\\ as\\ ?$$ or with est-ce que.\n+ Formal/written: $$Quel\\ âge\\ as-tu\\ ?$$ (inversion).\n\nTakeaway: Inversion adds a hyphen, sounds formal, and is more common in writing than everyday speech.", "source": "Opus 4.7 ①", "_id": "opus_1_56", "judge_pick": true}, {"question": "What's the difference between $$On\\ a$$ and $$On\\ est$$ in everyday French, and why might a beginner confuse them?", "answer": "- Step 1: $$On\\ a$$ = \"we have\" (from $$avoir$$); $$On\\ est$$ = \"we are\" (from $$être$$).\n- Step 2: Confusion arises because both are short, both use $$on$$, and the verbs sound somewhat similar in fast speech (\"ona\" vs \"ones-t\").\n- Step 3: Examples to drill:\n+ $$On\\ a\\ une\\ réservation$$ = We have a reservation.\n+ $$On\\ est\\ en\\ retard$$ = We're late.\n+ $$On\\ a\\ faim$$ = We're hungry (literally \"we have hunger\" — French uses $$avoir$$ for hunger!).\n+ $$On\\ est\\ fatigués$$ = We're tired.\n\nTakeaway: French uses $$avoir$$ for many states English expresses with \"to be\" (hunger, thirst, age, fear). Memorize: $$avoir\\ faim,\\ avoir\\ soif,\\ avoir\\ peur,\\ avoir\\ \\ldots\\ ans$$.", "source": "Opus 4.7 ①", "_id": "opus_1_57", "judge_pick": true}, {"question": "Imagine you walk into a French restaurant. Construct the first three exchanges (you and the host).", "answer": "- Step 1: Host greets: $$Bonjour\\ !\\ Vous\\ avez\\ une\\ réservation\\ ?$$ You: $$Oui,\\ j'ai\\ une\\ réservation\\ pour\\ deux\\ personnes\\ au\\ nom\\ de\\ [name]$$.\n- Step 2: Host: $$Très\\ bien,\\ suivez-moi,\\ s'il\\ vous\\ plaît$$. (You follow.) Then: $$Installez-vous$$.\n- Step 3: Host asks about seating preference / drink: $$À\\ l'intérieur\\ ou\\ en\\ terrasse\\ ?$$ / $$Que\\ désirez-vous\\ boire\\ ?$$ You: $$En\\ terrasse,\\ s'il\\ vous\\ plaît.\\ Une\\ carafe\\ d'eau,\\ s'il\\ vous\\ plaît$$.\n\nTakeaway: Free tap water = $$une\\ carafe\\ d'eau$$ — your wallet will thank you.", "source": "Opus 4.7 ①", "_id": "opus_1_58", "judge_pick": false}, {"question": "Why does French say $$J'ai\\ faim$$ (literally \"I have hunger\") instead of \"I am hungry\"? What's the conceptual pattern?", "answer": "- Step 1: French treats many physical/emotional states as **possessions** rather than states of being. You \"have\" hunger, thirst, fear, an age.\n- Step 2: The pattern: $$avoir$$ + noun (faim, soif, peur, sommeil, chaud, froid, raison).\n+ $$J'ai\\ chaud$$ = \"I'm hot\" (lit. \"I have hot\").\n+ $$J'ai\\ raison$$ = \"I'm right\" (lit. \"I have reason\").\n- Step 3: Etymologically, this comes from Latin where many states were nouns of acquisition (you \"acquire\" hunger). English shifted to \"to be + adjective\"; French kept the older idiom.\n\nMisconception probe: $$Je\\ suis\\ chaud$$ does NOT mean \"I'm hot (temperature)\" — it can mean \"I'm aroused\" or \"I'm up for it.\" Always use $$J'ai\\ chaud$$ for temperature!", "source": "Opus 4.7 ①", "_id": "opus_1_59", "judge_pick": true}, {"question": "Practice: How would you say \"There are two croissants but no tart\" in French?", "answer": "- Step 1: \"There are two croissants\" → $$Il\\ y\\ a\\ deux\\ croissants$$. ($$il\\ y\\ a$$ doesn't change for plural.)\n- Step 2: \"No tart\" → need to negate $$il\\ y\\ a$$ and remember the article collapses: $$il\\ n'y\\ a\\ pas\\ de\\ tarte$$.\n- Step 3: Combine with $$mais$$ (but): $$Il\\ y\\ a\\ deux\\ croissants,\\ mais\\ il\\ n'y\\ a\\ pas\\ de\\ tarte$$.\n\nTakeaway: Two key rules in one sentence — $$il\\ y\\ a$$ is invariable, and the article disappears in negation.", "source": "Opus 4.7 ①", "_id": "opus_1_60", "judge_pick": true}, {"question": "What's the underlying logic of why French has so much agreement (gender, number) in nouns, articles, and adjectives — and why is it useful?", "answer": "- Step 1: French inherited from Latin a system where noun endings carried gender/case information. Over centuries, endings eroded, so French shifted these signals onto **articles and adjectives**.\n- Step 2: Practical benefit: agreement creates redundancy that aids comprehension in noisy speech. If you miss the noun, the article or adjective tells you its gender and number.\n+ $$Les\\ petites\\ filles$$ — even if you only catch $$petites$$, the -es ending tells you it's feminine plural.\n- Step 3: Cost for learners: you must track gender for every noun and adjust everything that touches it. But this becomes intuitive with exposure.\n\nTakeaway: Agreement isn't decoration — it's a redundancy mechanism that makes spoken French more parseable.", "source": "Opus 4.7 ①", "_id": "opus_1_61", "judge_pick": true}, {"question": "What's the conceptual difference between $$le\\ café$$, $$un\\ café$$, and $$du\\ café$$ — all involving the noun \"coffee\"?", "answer": "- Step 1: $$le\\ café$$ = \"the coffee\" (definite) — refers to a specific coffee already known, OR coffee as an abstract category ($$J'aime\\ le\\ café$$ = I like coffee [in general]).\n- Step 2: $$un\\ café$$ = \"a coffee\" (indefinite, countable) — one specific serving/unit ($$Je\\ voudrais\\ un\\ café$$).\n- Step 3: $$du\\ café$$ = \"some coffee\" (partitive) — an unspecified portion of the substance ($$Je\\ veux\\ du\\ café$$ = I want some coffee).\n\nTakeaway: Three articles, three different relationships with the noun:\n+ Definite → known/general\n+ Indefinite → one unit\n+ Partitive → portion of a mass", "source": "Opus 4.7 ①", "_id": "opus_1_62", "judge_pick": true}, {"question": "Why do French nouns ending in -tion (like $$l'addition$$, $$la\\ réservation$$) follow a reliable gender rule, and what is it?", "answer": "- Step 1: All nouns ending in $$-tion$$ are **feminine** — no exceptions in common vocabulary.\n- Step 2: Examples: $$la\\ nation,\\ la\\ situation,\\ l'action,\\ l'addition,\\ la\\ réservation,\\ la\\ question$$.\n- Step 3: Why reliable? The -tion suffix comes from Latin -tio/-tionis, which was always feminine. French preserved this faithfully.\n\nTakeaway: -tion, -sion, -té, -ette, -ence, -ance → almost always feminine. -age, -ment, -eau → usually masculine. These suffix rules are gold for guessing gender.", "source": "Opus 4.7 ①", "_id": "opus_1_63", "judge_pick": true}, {"question": "Conceptual probe: French uses 24-hour time more often than English. Why might that be culturally/linguistically helpful, especially for restaurant reservations?", "answer": "- Step 1: 24-hour time avoids the AM/PM ambiguity that exists in English.\n- Step 2: For reservations, restaurants only operate in certain hours (lunch ~12-14h, dinner ~19-22h). Saying $$à\\ 19h30$$ is unambiguous — clearly evening.\n- Step 3: French speakers also use 24-hour time for transport schedules, TV listings, formal appointments — anywhere precision matters.\n\nTakeaway: When making a reservation, default to 24-hour ($$dix-neuf\\ heures\\ trente$$ = 19h30 = 7:30 PM). Saying $$à\\ sept\\ heures$$ alone is ambiguous (morning or evening?).", "source": "Opus 4.7 ①", "_id": "opus_1_64", "judge_pick": true}], "count": 65}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "How does French express \"My name is Phuc,\" and what is the literal grammatical structure?", "answer": "- Step 1: The phrase is $$Je\\ m'appelle\\ Phuc$$.\n- Step 2: Literally it means \"I call myself Phuc\" — $$appeler$$ means \"to call,\" and $$m'$$ is the reflexive pronoun \"myself\" (shortened from $$me$$ before a vowel).\n- Step 3: So French doesn't say \"my name is\" with a possessive; it uses a reflexive verb structure. This is why you also hear $$Comment\\ tu\\ t'appelles\\ ?$$ — \"How do you call yourself?\"\n\nFrench uses reflexive verbs in places where English uses \"to be\" + noun.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": true}, {"question": "How does French ask \"How old are you?\" informally, and why is the verb choice surprising to English speakers? (2 steps)", "answer": "- Step 1: The question is $$Quel\\ \\hat{a}ge\\ as$$-$$tu\\ ?$$ — literally \"What age do you have?\"\n- Step 2: French uses $$AVOIR$$ (to have) for age, not $$\\hat{E}TRE$$ (to be). The answer mirrors this: $$J'ai\\ 24\\ ans$$ = \"I have 24 years.\"\n\nTakeaway: age, hunger, thirst, fear, and being cold/hot all use $$AVOIR$$ in French — they are conceived as things you \"possess,\" not states you \"are.\"", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "What's the difference in register between $$Bonjour$$, $$Salut$$, and $$Coucou$$?", "answer": "- Step 1: $$Bonjour$$ is the standard polite greeting — safe in any situation, especially with strangers, shopkeepers, or formal contexts.\n- Step 2: $$Salut$$ is informal — used with friends, and (unlike English \"hi\") can mean both hello AND goodbye.\n- Step 3: $$Coucou$$ is very casual/affectionate — used with close friends, family, or children. Using it with a stranger would feel oddly intimate.\n\nChoose by relationship, not time of day.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "How would you ask \"Where are you from?\" and \"Where do you live?\" informally in French, and what's the typical answer pattern? (3 steps)", "answer": "- Step 1: \"Where are you from?\" = $$Tu\\ viens\\ d'o\\grave{u}\\ ?$$ — literally \"You come from where?\"\n- Step 2: \"Where do you live?\" = $$Tu\\ habites\\ o\\grave{u}\\ ?$$ — literally \"You live where?\"\n- Step 3: Typical answers:\n+ Nationality: $$Je\\ suis\\ vietnamien$$ (uses $$\\hat{E}TRE$$)\n+ Location: $$J'habite\\ \\grave{a}\\ Paris,\\ en\\ France$$ ($$\\grave{a}$$ before a city, $$en$$ before a feminine country).\n\nThe question word $$o\\grave{u}$$ (where) typically sits at the END in informal spoken French.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "In French pronunciation, why can you usually not hear whether a noun is singular or plural just by listening?", "answer": "- Step 1: The plural marker $$-s$$ at the end of words is silent. $$un\\ croissant$$ and $$des\\ croissants$$ sound identical at the noun.\n- Step 2: You detect plurality from the ARTICLE: $$le/la$$ vs $$les$$, $$un/une$$ vs $$des$$. The article carries the grammatical information that the spelling hides.\n- Step 3: This is part of a broader French pattern: final consonants are usually silent, so much of the grammatical info (number, gender, conjugation endings) lives in the small words before the noun/verb.\n\nListen for the article, not the noun ending.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "What is \"liaison\" in French pronunciation, and why does it exist? (3 steps)", "answer": "- Step 1: Final consonants in French are normally silent — e.g., the $$-s$$ in $$les$$ or the $$-t$$ in $$est$$.\n- Step 2: BUT when the next word starts with a vowel sound, that silent consonant \"links\" and IS pronounced, attaching to the next word.\n+ $$les\\ amis$$ sounds like \"lay-zah-mee\" (the silent $$s$$ becomes a $$z$$ sound)\n+ $$vous\\ avez$$ sounds like \"voo-zah-vay\"\n- Step 3: This exists because French dislikes vowel-vowel collisions between words — liaison smooths the flow.\n\nLiaison = a silent consonant waking up because the next word starts with a vowel.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": true}, {"question": "Why is the number 14 ($$quatorze$$) a pronunciation trap, and what about 60 and 70?", "answer": "- Step 1: $$quatorze$$ is pronounced \"ka-TORZ\" — the $$-ze$$ is voiced, not silent like many other final-letter cases. Beginners often mispronounce it as \"kator.\"\n- Step 2: $$soixante$$ (60) sounds like \"swa-SONT\" — the $$oi$$ makes a \"wa\" sound, not \"oy.\"\n- Step 3: $$soixante$$-$$dix$$ (70) ends in \"diss\" — the final $$x$$ in $$dix$$ IS pronounced here as $$s$$, unlike in $$dix\\ croissants$$ where it would be silent.\n\nThese are exceptions to the \"final consonant is silent\" rule — you just have to memorize the sounds.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": true}, {"question": "What's the gender rule for French nouns ending in $$-ette$$ vs $$-\\acute{e}$$?", "answer": "- Step 1: Nouns ending in $$-ette$$ are feminine: $$une\\ omelette$$, $$une\\ carafe$$, $$une\\ baguette$$.\n- Step 2: Nouns ending in $$-\\acute{e}$$ (with the accent) are masculine: $$un\\ caf\\acute{e}$$, $$un\\ th\\acute{e}$$, $$un\\ \\acute{e}t\\acute{e}$$ (summer).\n- Step 3: These are useful pattern-spotting shortcuts, but they're rules of thumb — there are exceptions. Still, for café vocabulary they work reliably.\n\nEnding shapes often hint at gender — collect these patterns as you learn.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "Why is \"It's beautiful\" always $$C'est\\ beau$$ in French, even if you're talking about a feminine noun?", "answer": "- Step 1: After the construction $$c'est$$ (\"it is\"), the adjective is ALWAYS in the masculine form. So even pointing at a beautiful $$tarte$$ (feminine), you say $$C'est\\ beau\\ !$$ not $$C'est\\ belle$$.\n- Step 2: The reason: $$c'$$ (from $$ce$$, \"this/it\") is a neuter/default pronoun referring to a vague \"it/situation,\" not the specific noun. With no specific gendered noun to agree with, French defaults to masculine.\n- Step 3: Contrast: $$La\\ tarte\\ est\\ belle$$ — here the subject IS the feminine noun $$la\\ tarte$$, so the adjective agrees and becomes $$belle$$.\n\nAfter $$c'est$$ → default masculine. With a specific gendered subject → agree.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": true}, {"question": "What are the three definite articles (\"the\") in French, and how do you choose between them?", "answer": "- Step 1: $$le$$ = masculine singular ($$le\\ caf\\acute{e}$$).\n- Step 2: $$la$$ = feminine singular ($$la\\ tarte$$).\n- Step 3: $$les$$ = plural for BOTH genders ($$les\\ caf\\acute{e}s$$, $$les\\ tartes$$).\n\nNote: before a vowel sound, $$le$$ and $$la$$ both contract to $$l'$$ ($$l'omelette$$, $$l'ami$$). This is purely for pronunciation flow.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "What's the difference between indefinite articles ($$un/une/des$$) and partitive articles ($$du/de\\ la/des$$)? (3 steps)", "answer": "- Step 1: Indefinite ($$un$$, $$une$$, $$des$$) = \"a / an / some\" for COUNTABLE things you can have one of.\n+ $$un\\ croissant$$ = a croissant\n+ $$une\\ omelette$$ = an omelette\n- Step 2: Partitive ($$du$$, $$de\\ la$$, $$des$$) = \"some\" for UNCOUNTABLE things or unspecified quantities — things you take a portion of.\n+ $$du\\ caf\\acute{e}$$ = some coffee (a portion of liquid)\n+ $$de\\ la\\ cr\\grave{e}me$$ = some cream\n+ $$du\\ saumon$$ = some salmon\n- Step 3: The key intuition: do you count it in units (use indefinite) or scoop/pour it (use partitive)? English often hides this distinction, but French forces you to choose.\n\nCountable = $$un/une$$; bulk/portion = $$du/de\\ la$$.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": true}, {"question": "In a negative sentence, what happens to $$un$$, $$une$$, $$des$$, $$du$$, and $$de\\ la$$?", "answer": "- Step 1: ALL of them collapse into a single form: $$pas\\ de$$ (or $$pas\\ d'$$ before a vowel sound).\n- Step 2: Examples:\n+ $$J'ai\\ un\\ caf\\acute{e}$$ → $$Je\\ n'ai\\ pas\\ de\\ caf\\acute{e}$$\n+ $$Il\\ y\\ a\\ des\\ croissants$$ → $$Il\\ n'y\\ a\\ pas\\ de\\ croissants$$\n+ $$Je\\ veux\\ de\\ la\\ cr\\grave{e}me$$ → $$Je\\ ne\\ veux\\ pas\\ de\\ cr\\grave{e}me$$\n+ $$J'ai\\ une\\ omelette$$ → $$Je\\ n'ai\\ pas\\ d'omelette$$\n- Step 3: The intuition: in the negative, you're saying \"zero of X,\" and French expresses zero quantity uniformly with $$de$$, regardless of the original article's gender or number.\n\nNegation flattens articles to $$pas\\ de$$.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "What's the basic structure for negating a French verb, and what happens before a vowel? (2 steps)", "answer": "- Step 1: You wrap the verb with two words: $$ne$$ + VERB + $$pas$$. The $$ne$$ goes before the verb, the $$pas$$ goes after.\n+ $$Je\\ suis\\ \\grave{a}\\ Paris$$ → $$Je\\ ne\\ suis\\ pas\\ \\grave{a}\\ Paris$$\n- Step 2: When the verb starts with a vowel sound, $$ne$$ contracts to $$n'$$ to avoid the vowel collision.\n+ $$J'ai$$ → $$Je\\ n'ai\\ pas$$\n+ $$Il\\ est$$ → $$Il\\ n'est\\ pas$$\n+ $$Ils\\ ont$$ → $$Ils\\ n'ont\\ pas$$\n\nThink of $$ne...pas$$ as a sandwich around the verb.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "Conjugate $$AVOIR$$ (to have) in the present tense for all six persons. (6 steps)", "answer": "- Step 1: $$j'ai$$ — \"I have\" (note the elision $$j'$$ because $$ai$$ starts with a vowel).\n- Step 2: $$tu\\ as$$ — \"you have\" (informal singular).\n- Step 3: $$il/elle/on\\ a$$ — \"he/she/one has.\"\n- Step 4: $$nous\\ avons$$ — \"we have.\"\n- Step 5: $$vous\\ avez$$ — \"you have\" (formal or plural).\n- Step 6: $$ils/elles\\ ont$$ — \"they have.\"\n\nWatch out: $$avons$$ (we) vs $$avez$$ (you) — these are commonly mixed up. Liaison: $$nous\\ avons$$ → \"noo-zavon,\" $$vous\\ avez$$ → \"voo-zavay,\" $$ils\\ ont$$ → \"eel-zon.\"", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "Conjugate $$\\hat{E}TRE$$ (to be) in the present tense for all six persons. (6 steps)", "answer": "- Step 1: $$je\\ suis$$ — \"I am.\"\n- Step 2: $$tu\\ es$$ — \"you are\" (informal).\n- Step 3: $$il/elle/on\\ est$$ — \"he/she/one is.\"\n- Step 4: $$nous\\ sommes$$ — \"we are.\"\n- Step 5: $$vous\\ \\hat{e}tes$$ — \"you are\" (formal/plural). Note the circumflex on $$\\hat{e}$$.\n- Step 6: $$ils/elles\\ sont$$ — \"they are.\"\n\n$$\\hat{E}TRE$$ is highly irregular — there's no pattern, only memorization. Note $$est$$ and $$es$$ sound identical (\"eh\").", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "How would you say \"I am not late\" in French, and what's the negation pattern with $$\\hat{E}TRE$$?", "answer": "- Step 1: \"I am late\" = $$Je\\ suis\\ en\\ retard$$.\n- Step 2: To negate, wrap the verb $$suis$$ with $$ne...pas$$: $$Je\\ ne\\ suis\\ pas\\ en\\ retard$$.\n- Step 3: Note $$ne$$ does NOT contract here because $$suis$$ starts with a consonant. Contrast with $$\\hat{e}tes$$ → $$Vous\\ n'\\hat{e}tes\\ pas$$ (vowel-start, so $$n'$$).\n\nFull negative table:\n+ $$je\\ ne\\ suis\\ pas$$\n+ $$tu\\ n'es\\ pas$$\n+ $$il/elle/on\\ n'est\\ pas$$\n+ $$nous\\ ne\\ sommes\\ pas$$\n+ $$vous\\ n'\\hat{e}tes\\ pas$$\n+ $$ils/elles\\ ne\\ sont\\ pas$$", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "What does $$il\\ y\\ a$$ mean, and how do you negate it? (3 steps)", "answer": "- Step 1: $$il\\ y\\ a$$ = \"there is\" / \"there are\" — it's used for both singular and plural. Literally: \"it there has\" (using $$AVOIR$$).\n- Step 2: The negative is $$il\\ n'y\\ a\\ pas\\ de\\ ...$$ — \"there isn't / aren't any ...\".\n+ $$Il\\ y\\ a\\ des\\ croissants$$ → $$Il\\ n'y\\ a\\ pas\\ de\\ croissants$$\n- Step 3: Notice that $$il\\ y\\ a$$ is built from $$AVOIR$$, which is why the article collapses to $$de$$ in the negative (same rule as Q12).\n\nIt's a frozen expression — never conjugate $$il\\ y\\ a$$, just memorize it as a unit.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "What's the difference between $$on$$ and $$nous$$, and which verb form does $$on$$ take? (3 steps)", "answer": "- Step 1: Both can mean \"we.\" $$Nous$$ is the formal/written form; $$on$$ is the informal everyday spoken form. In actual conversation, French people use $$on$$ far more than $$nous$$.\n- Step 2: Crucially, $$on$$ takes the SAME verb form as $$il/elle$$ (3rd person singular), even though it means \"we.\"\n+ $$nous\\ avons$$ → $$on\\ a$$\n+ $$nous\\ sommes$$ → $$on\\ est$$\n+ $$nous\\ allons$$ → $$on\\ va$$\n- Step 3: $$on$$ can also mean \"one\" / \"people in general\" (like English \"one says...\"). Context disambiguates.\n\nIn a café with a friend: \"We'll have two coffees\" is more naturally $$On\\ va\\ prendre\\ deux\\ caf\\acute{e}s$$ than the stiff $$Nous$$ version.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": true}, {"question": "How do you build numbers 17, 18, 19 in French, and what's the pattern?", "answer": "- Step 1: French numbers 11–16 are single irregular words ($$onze, douze, treize, quatorze, quinze, seize$$).\n- Step 2: But 17, 18, 19 switch to a transparent \"10 + n\" pattern:\n+ 17 = $$dix$$-$$sept$$ (10+7)\n+ 18 = $$dix$$-$$huit$$ (10+8)\n+ 19 = $$dix$$-$$neuf$$ (10+9)\n- Step 3: So the cutoff for irregular teen words is 16. From 17 onward, French composes them additively until 20 ($$vingt$$).\n\nThis mirrors the irregular/regular split in many languages (English: eleven, twelve, then -teen forms).", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": true}, {"question": "Why is the French word for \"21\" $$vingt$$-$$et$$-$$un$$ but \"22\" is just $$vingt$$-$$deux$$ (no $$et$$)? (3 steps)", "answer": "- Step 1: For numbers ending in 1 (21, 31, 41, 51, 61), French inserts $$et$$ (\"and\") between the tens and the one: $$vingt$$-$$et$$-$$un$$, $$trente$$-$$et$$-$$un$$.\n- Step 2: For numbers 22–29, 32–39, etc., no $$et$$ — just hyphenate: $$vingt$$-$$deux$$, $$trente$$-$$trois$$.\n- Step 3: One exception worth knowing: 71 = $$soixante$$-$$et$$-$$onze$$ (because it's really \"60 and 11\"), but 81 = $$quatre$$-$$vingt$$-$$un$$ (NO $$et$$, because 80 has a different logic — see next card).\n\nRule of thumb: $$et$$ appears with -1 only, and only in the \"normal\" tens (20-60), plus 71.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": true}, {"question": "Why does French build 70, 80, and 90 in such a strange way? Walk through the logic. (4 steps)", "answer": "- Step 1: French has no dedicated word for 70, 80, or 90 — instead it constructs them additively/multiplicatively.\n- Step 2: 70 = $$soixante$$-$$dix$$ = 60 + 10. So 71 = $$soixante$$-$$et$$-$$onze$$ (60 + 11), 72 = $$soixante$$-$$douze$$ (60 + 12), up to 79 = $$soixante$$-$$dix$$-$$neuf$$ (60 + 19).\n- Step 3: 80 = $$quatre$$-$$vingts$$ = 4 × 20 (a vestige of an old base-20 counting system, like English \"fourscore\"). So 81 = $$quatre$$-$$vingt$$-$$un$$, 82 = $$quatre$$-$$vingt$$-$$deux$$.\n- Step 4: 90 = $$quatre$$-$$vingt$$-$$dix$$ = (4×20) + 10. So 91 = $$quatre$$-$$vingt$$-$$onze$$ (4×20+11), 99 = $$quatre$$-$$vingt$$-$$dix$$-$$neuf$$.\n\nPattern: 70 builds on ×10 from 60; 80 and 90 build on ×20. Belgian/Swiss French use simpler $$septante, huitante, nonante$$ — but standard France French keeps the old system.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "Why does $$quatre$$-$$vingts$$ have an $$-s$$ at the end, but $$quatre$$-$$vingt$$-$$un$$ doesn't? (2 steps)", "answer": "- Step 1: $$quatre$$-$$vingts$$ (exactly 80) takes a plural $$-s$$ because $$vingt$$ is being multiplied: \"four twenties.\" This is a special agreement rule.\n- Step 2: But when another number FOLLOWS $$vingt$$ (like 81, 82...), the $$-s$$ drops: $$quatre$$-$$vingt$$-$$un$$, $$quatre$$-$$vingt$$-$$deux$$. The presence of a following number \"uses up\" the multiplication.\n\nSame rule applies to $$cent$$: $$deux\\ cents$$ (200) but $$deux\\ cent\\ un$$ (201).", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": true}, {"question": "What do $$cent$$, $$mille$$, $$million$$, and $$milliard$$ mean? (4 steps)", "answer": "- Step 1: $$cent$$ = 100. No article needed: just say $$cent$$ for \"one hundred.\"\n- Step 2: $$mille$$ = 1,000. Same — no article ($$mille$$, not $$un\\ mille$$).\n- Step 3: $$un\\ million$$ = 1,000,000 — but here you DO use $$un$$ (it behaves as a noun).\n- Step 4: $$un\\ milliard$$ = 1,000,000,000 (one BILLION in English — careful, false-friend territory).\n\nTrap: French $$milliard$$ ≠ English \"milliard\" in everyday use. $$milliard$$ = 10⁹ = English billion.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": true}, {"question": "What are $$hier$$, $$aujourd'hui$$, and $$demain$$?", "answer": "- Step 1: $$hier$$ = yesterday (the $$h$$ is silent, pronounce \"ee-ehr\").\n- Step 2: $$aujourd'hui$$ = today (literally a frozen phrase meaning \"on the day of today\").\n- Step 3: $$demain$$ = tomorrow.\n\nThese three anchor any beginner time-talk: \"I went yesterday, I'm here today, I'm leaving tomorrow.\"", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "What are the four forms of $$quel$$, and why are there four?", "answer": "- Step 1: $$quel$$ means \"which\" or \"what\" and behaves like an adjective — so it agrees with the noun it modifies in gender and number.\n- Step 2: The four forms:\n+ $$quel$$ (masculine singular): $$quel\\ \\hat{a}ge\\ ?$$\n+ $$quelle$$ (feminine singular): $$quelle\\ heure\\ ?$$\n+ $$quels$$ (masculine plural): $$quels\\ livres\\ ?$$\n+ $$quelles$$ (feminine plural): $$quelles\\ tartes\\ ?$$\n- Step 3: All four sound identical when spoken (pronounced \"kel\"). The agreement only shows up in spelling — important for writing but not for listening.\n\n$$quel$$ is an adjective in disguise — that's why it agrees.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "What are three polite ways to say \"I would like...\" when ordering in French? (3 steps)", "answer": "- Step 1: $$Je\\ voudrais...$$ — the most common; conditional of $$vouloir$$ (to want). Softens \"I want\" into \"I would like.\"\n- Step 2: $$Je\\ pourrais\\ avoir...$$ — \"Could I have...\" (conditional of $$pouvoir$$ — \"to be able to\"). Slightly more polite/tentative.\n- Step 3: $$J'aimerais\\ avoir...$$ — \"I would like to have...\" (conditional of $$aimer$$ — \"to love/like\"). Equivalent in politeness to $$je\\ voudrais$$.\n\nAll three are conditional tense — French marks politeness by shifting from \"I want\" to \"I would want.\"", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "How does a French waiter ask about steak doneness, and what are the four levels?", "answer": "- Step 1: The question is $$Quelle\\ cuisson\\ pour\\ la\\ viande\\ ?$$ — literally \"Which cooking for the meat?\" ($$cuisson$$ = the degree of cooking).\n- Step 2: The four answers, from least to most cooked:\n+ $$bleu$$ = very rare (barely seared, \"blue\")\n+ $$saignant$$ = rare (literally \"bleeding\")\n+ $$\\grave{a}\\ point$$ = medium (\"at the point\")\n+ $$bien\\ cuit$$ = well done (\"well cooked\")\n- Step 3: Order of intuition: $$bleu \\to saignant \\to \\grave{a}\\ point \\to bien\\ cuit$$. Note French has no exact \"medium-rare\" word — $$\\grave{a}\\ point$$ covers medium-ish.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "What's the standard polite way to ask for the bill in French? (2 steps)", "answer": "- Step 1: The shortest: $$L'addition,\\ s'il\\ vous\\ pla\\hat{i}t$$ — \"The bill, please.\" This is fine and not rude.\n- Step 2: More polite version: $$Je\\ pourrais\\ avoir\\ l'addition,\\ s'il\\ vous\\ pla\\hat{i}t\\ ?$$ — \"Could I have the bill, please?\"\n\nAlternative word: $$la\\ note$$ also means \"the bill.\" Either works.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "What's a quick way to ask \"What is this?\" in French, and how does it sound spoken?", "answer": "- Step 1: The phrase is $$Qu'est$$-$$ce\\ que\\ c'est\\ ?$$ — literally \"What is it that it is?\"\n- Step 2: When spoken at normal speed, it collapses to something like \"keske-say.\" The first three words ($$Qu'est$$-$$ce\\ que$$) function as a frozen question-opener meaning \"what.\"\n- Step 3: This same opener can introduce any object question:\n+ $$Qu'est$$-$$ce\\ qu'il\\ y\\ a\\ dans\\ ...\\ ?$$ = \"What's in...?\"\n+ $$Qu'est$$-$$ce\\ que\\ tu\\ veux\\ ?$$ = \"What do you want?\"\n\nTreat $$Qu'est$$-$$ce\\ que$$ as a single chunk = \"What ___?\"", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": true}, {"question": "A waiter says $$Suivez$$-$$moi,\\ s'il\\ vous\\ pla\\hat{i}t$$ then $$Installez$$-$$vous$$. What is each saying?", "answer": "- Step 1: $$Suivez$$-$$moi$$ = \"Follow me\" — $$suivez$$ is the formal imperative of $$suivre$$ (to follow), and $$-moi$$ (\"me\") attaches with a hyphen because it's an imperative.\n- Step 2: $$Installez$$-$$vous$$ = \"Get settled / take a seat / make yourself comfortable.\" $$installer$$ literally means \"to install\"; with the reflexive $$-vous$$, it means \"install yourselves\" → settle in.\n- Step 3: Both use the $$-ez$$ ending typical of formal $$vous$$ imperatives. Imperatives drop the pronoun ($$vous\\ suivez$$ → $$suivez$$).\n\nThese two phrases are essentially the standard \"Please follow me to your table; have a seat\" of French restaurants.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": true}, {"question": "What's the typical French question for \"Have you decided (what to order)?\" and what are two variations?", "answer": "- Step 1: $$Avez$$-$$vous\\ fait\\ votre\\ choix\\ ?$$ — literally \"Have you made your choice?\" (uses $$AVOIR$$ + past participle $$fait$$).\n- Step 2: $$Avez$$-$$vous\\ choisi\\ ?$$ — literally \"Have you chosen?\" (uses past participle $$choisi$$ from $$choisir$$).\n- Step 3: Both mean the same thing — the waiter checking if you're ready to order. The first is slightly more formal/polished.\n\nNotice the inversion ($$Avez$$-$$vous$$ instead of $$Vous\\ avez$$) — typical of formal questions.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "When ordering for two people, what's the natural way to phrase \"We'll have...\", \"We'd like...\", and \"Could we have...\"?", "answer": "- Step 1: Because spoken French uses $$on$$ for \"we,\" the natural restaurant phrases are:\n+ $$on\\ va\\ prendre$$ = \"we'll have\" (going-to future)\n+ $$on\\ aimerait$$ = \"we'd like\" (conditional of $$aimer$$)\n+ $$on\\ pourrait\\ avoir$$ = \"could we have\" (conditional of $$pouvoir$$)\n- Step 2: All three take the $$il/elle$$ verb form because $$on$$ grammatically behaves like 3rd-person singular, even though it semantically means \"we.\"\n- Step 3: Using $$nous$$ versions ($$nous\\ allons\\ prendre$$, $$nous\\ aimerions$$) would sound stiff/formal — fine in writing but unusual in everyday café speech.\n\nThe $$on$$-forms are your go-to for casual ordering with a companion.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "Walk through a basic French restaurant reservation dialogue. What does the host ask and how do you answer? (4 steps)", "answer": "- Step 1: First the host confirms purpose: $$C'est\\ pour\\ une\\ r\\acute{e}servation\\ ?$$ (\"Is this for a reservation?\") — answer: $$Oui,\\ pour\\ ce\\ soir$$ (\"Yes, for tonight\").\n- Step 2: Then time: $$\\grave{A}\\ quelle\\ heure\\ ?$$ — answer with the 24-hour time: $$\\grave{a}\\ 19h30,\\ s'il\\ vous\\ pla\\hat{i}t$$.\n- Step 3: Then group size: $$Pour\\ combien\\ de\\ personnes\\ ?$$ — answer: $$Pour\\ 2\\ personnes$$.\n- Step 4: Finally phone for confirmation: $$Votre\\ num\\acute{e}ro\\ de\\ t\\acute{e}l\\acute{e}phone\\ pour\\ confirmer\\ la\\ r\\acute{e}servation\\ ?$$ Then sign-off: $$C'est\\ not\\acute{e}.\\ \\grave{A}\\ ce\\ soir\\ !$$ — \"Noted. See you tonight!\"\n\nMemorize this script — it covers ~95% of phone reservations.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "What's the difference between $$tu$$ and $$vous$$, and when do you use each? (3 steps)", "answer": "- Step 1: $$tu$$ = informal \"you,\" used with friends, family, children, peers, animals — any close/casual relationship.\n- Step 2: $$vous$$ = either formal \"you\" (singular, to a stranger / older person / customer / boss) OR plural \"you\" (any group). The formal singular and the plural share one form.\n- Step 3: Defaults for beginners:\n+ Speaking to a waiter, shopkeeper, taxi driver, or anyone older you don't know → $$vous$$.\n+ Speaking to your tutor's child, a friend's friend your age in casual setting → $$tu$$.\n+ When unsure, start with $$vous$$ — the other person can invite you to switch with $$On\\ peut\\ se\\ tutoyer$$ (\"We can use $$tu$$\").\n\nUsing $$tu$$ inappropriately can feel rude; using $$vous$$ unnecessarily just feels stiff — much safer error.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "In French, how does an adjective change when describing $$deux\\ petits\\ verres$$ vs $$une\\ salade\\ verte$$? Explain the agreement rule. (3 steps)", "answer": "- Step 1: Adjectives in French agree with their noun in BOTH gender and number — so they have up to 4 forms (masc sing, fem sing, masc pl, fem pl).\n- Step 2: Examples:\n+ $$deux\\ petits\\ verres$$ — $$verres$$ is masculine plural, so $$petit$$ → $$petits$$ (add $$-s$$).\n+ $$une\\ salade\\ verte$$ — $$salade$$ is feminine singular, so $$vert$$ → $$verte$$ (add $$-e$$).\n+ $$des\\ l\\acute{e}gumes\\ cuits$$ — $$l\\acute{e}gumes$$ is masculine plural, $$cuit$$ → $$cuits$$.\n+ $$une\\ orange\\ press\\acute{e}e$$ — $$orange$$ is feminine singular, $$press\\acute{e}$$ → $$press\\acute{e}e$$.\n- Step 3: General pattern: feminine adds $$-e$$, plural adds $$-s$$, fem plural adds $$-es$$. Most $$-s$$ endings are silent, but the $$-e$$ makes a previously silent final consonant audible ($$vert$$ \"vehr\" → $$verte$$ \"vehrt\").\n\nAgreement is mostly invisible in speech (the $$-s$$), but pronounceable when the consonant wakes up via $$-e$$.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": true}, {"question": "A waiter asks $$Souhaiteriez$$-$$vous\\ une\\ bouteille\\ d'eau\\ gazeuse\\ ou\\ d'eau\\ plate\\ ?$$. What's the question and what are the two choices?", "answer": "- Step 1: Translation: \"Would you like a bottle of sparkling water or still water?\" $$Souhaiteriez$$-$$vous$$ is the conditional polite form (\"would you like\").\n- Step 2: The two key vocab pieces:\n+ $$eau\\ gazeuse$$ = sparkling/carbonated water ($$gazeuse$$ = \"gassy,\" feminine because $$eau$$ is feminine)\n+ $$eau\\ plate$$ = still water (\"flat\" water)\n- Step 3: $$bouteille$$ = bottle. So a typical answer might be $$Une\\ bouteille\\ d'eau\\ plate,\\ s'il\\ vous\\ pla\\hat{i}t$$.\n\nMany French restaurants will ask this immediately after seating.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "What does $$Je\\ reviens\\ tout\\ de\\ suite$$ mean, and what's the literal breakdown?", "answer": "- Step 1: It means \"I'll be right back\" — a phrase a waiter uses when stepping away briefly.\n- Step 2: Breakdown:\n+ $$Je\\ reviens$$ = \"I come back\" (from $$revenir$$ = to return)\n+ $$tout\\ de\\ suite$$ = \"right away / immediately\" (literally \"all of immediately\")\n- Step 3: French uses the simple present tense to express near-future actions, where English uses \"will\" — so $$je\\ reviens$$ literally means \"I return\" but functionally \"I will return.\"\n\nNote: present tense for the near future is very common in French — $$Je\\ pars\\ demain$$ = \"I'm leaving tomorrow.\"", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "What's the difference between $$caf\\acute{e}$$, $$th\\acute{e}$$, and $$une\\ orange\\ press\\acute{e}e$$ — and what gender is each?", "answer": "- Step 1: $$un\\ caf\\acute{e}$$ = coffee. Masculine (ends in $$-\\acute{e}$$, the masculine-ending pattern).\n- Step 2: $$un\\ th\\acute{e}$$ = tea. Also masculine (same $$-\\acute{e}$$ pattern).\n- Step 3: $$une\\ orange\\ press\\acute{e}e$$ = fresh-squeezed orange juice. Feminine ($$orange$$ is feminine, so the adjective $$press\\acute{e}$$ becomes $$press\\acute{e}e$$ with an extra $$-e$$). Literally \"a pressed orange.\"\n\nVocabulary insight: $$press\\acute{e}$$ = \"pressed,\" so $$un\\ citron\\ press\\acute{e}$$ = fresh-squeezed lemonade by the same logic.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": true}, {"question": "What is a $$croque$$-$$monsieur$$ and what is a $$plat\\ du\\ jour$$?", "answer": "- Step 1: $$un\\ croque$$-$$monsieur$$ = a hot/toasted ham and cheese sandwich, typically served in cafés. Literally \"Mr. Crunch\" — the name is whimsical, no agreement issues to worry about.\n- Step 2: $$un\\ plat\\ du\\ jour$$ = \"dish of the day\" — the daily special. Literally \"plate of the day\" ($$plat$$ = plate/dish, $$du$$ = $$de + le$$ = \"of the\").\n- Step 3: Both are masculine, so you say $$Je\\ voudrais\\ un\\ croque$$-$$monsieur$$ and $$Quel\\ est\\ le\\ plat\\ du\\ jour\\ ?$$ — \"What is the dish of the day?\"", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "Why is the question $$Est$$-$$ce\\ que\\ vous\\ les\\ voulez\\ en\\ m\\hat{e}me\\ temps\\ ?$$ structured the way it is? (3 steps)", "answer": "- Step 1: Translation: \"Would you like them at the same time?\" (Asked when you've ordered an appetizer and a main — does the waiter bring both together or sequentially?)\n- Step 2: Components:\n+ $$Est$$-$$ce\\ que$$ = a question-opener (turns any statement into a yes/no question). Treat as a frozen chunk.\n+ $$vous\\ les\\ voulez$$ = \"you want them\" — $$les$$ is the object pronoun \"them,\" placed BEFORE the verb (unlike English).\n+ $$en\\ m\\hat{e}me\\ temps$$ = \"at the same time\" (literally \"in same time\").\n- Step 3: Key structural point: French puts object pronouns ($$le, la, les, me, te$$) BEFORE the verb. English: \"you want THEM.\" French: \"you THEM want\" ($$vous\\ les\\ voulez$$).\n\nThis pronoun-before-verb structure is one of the biggest English/French differences.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": false}, {"question": "When ordering, what's the difference between $$Je\\ voudrais...$$ and $$Je\\ vais\\ prendre...$$?", "answer": "- Step 1: $$Je\\ voudrais...$$ = \"I would like...\" — uses the conditional of $$vouloir$$. Polite, classic, never wrong.\n- Step 2: $$Je\\ vais\\ prendre...$$ = \"I'm going to have...\" — uses the futur proche (\"near future\") construction $$aller$$ + infinitive. Slightly more decisive/casual.\n- Step 3: Both are equally polite in a café:\n+ $$Je\\ voudrais\\ un\\ caf\\acute{e}$$ — softer, \"I would like...\"\n+ $$Je\\ vais\\ prendre\\ un\\ caf\\acute{e}$$ — more direct, \"I'll have...\"\n\nNative speakers use both interchangeably. Choose based on whether you want to sound deliberative or decisive.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "Practical mini-exercise: A friend asks $$Quel\\ \\hat{a}ge\\ as$$-$$tu\\ ?$$. You want to say \"I'm 21.\" How do you respond, and why is the structure as it is? (3 steps)", "answer": "- Step 1: The answer is $$J'ai\\ vingt$$-$$et$$-$$un\\ ans$$.\n- Step 2: Why this structure?\n+ Age uses $$AVOIR$$, not $$\\hat{E}TRE$$ — so \"I have 21 years,\" $$j'ai$$.\n+ 21 = $$vingt$$-$$et$$-$$un$$ because numbers ending in 1 (between 20-60) take $$et$$.\n+ $$ans$$ = \"years\" — required! Saying just $$j'ai\\ vingt$$-$$et$$-$$un$$ would mean \"I have 21 [of something]\" — incomplete.\n- Step 3: Pronunciation: the final $$-s$$ in $$ans$$ is silent. Liaison: $$un\\ an$$ would link → \"uhn-nahn,\" but $$un\\ ans$$ — the plural here doesn't change the sound, you still hear \"uhn-nahn.\"\n\nThree pieces to remember: $$j'ai$$ + number + $$ans$$.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": true}, {"question": "Practical mini-exercise: You want to say \"There aren't any croissants\" in French. How do you build it from \"There are some croissants\"? (3 steps)", "an
