swer": "- Step 1: Start with the affirmative: $$Il\\ y\\ a\\ des\\ croissants$$ (\"There are some croissants\").\n- Step 2: Apply negation: wrap the verb $$a$$ with $$ne...pas$$. Since $$a$$ starts with a vowel, $$ne$$ → $$n'$$. So: $$Il\\ n'y\\ a\\ pas\\ ...\\ croissants$$.\n- Step 3: Apply the article rule: $$des$$ in the negative collapses to $$de$$. Final: $$Il\\ n'y\\ a\\ pas\\ de\\ croissants$$.\n\nTwo rule applications stacked: negation wrap + article collapse.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": true}, {"question": "Practical mini-exercise: How do you say \"We are not Vietnamese\" using informal \"we\" and explain the structure? (3 steps)", "answer": "- Step 1: Informal \"we\" = $$on$$, which takes the $$il/elle$$ verb form. So $$\\hat{E}TRE$$ becomes $$on\\ est$$.\n- Step 2: Negate: wrap $$est$$ with $$ne...pas$$. Since $$est$$ starts with a vowel, $$ne$$ → $$n'$$. Result: $$on\\ n'est\\ pas$$.\n- Step 3: Add the nationality. \"Vietnamese\" (masculine) is $$vietnamien$$. Full sentence: $$On\\ n'est\\ pas\\ vietnamien$$.\n\nNote: with $$on$$, the adjective typically stays singular masculine (matching the grammatical form), though some speakers pluralize when $$on$$ clearly means \"we\" (multiple people). For beginner level, singular is safe.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": false}, {"question": "Practical mini-exercise: At a café for two, how do you order \"We'd like two coffees and a croissant, please\"?", "answer": "- Step 1: Use the casual $$on$$-form: $$on\\ aimerait$$ (\"we'd like\").\n- Step 2: Quantity + items: $$deux\\ caf\\acute{e}s\\ et\\ un\\ croissant$$. ($$deux$$ = 2; both nouns get the right article — $$un$$ singular, no article needed before $$deux$$ since the number replaces it.)\n- Step 3: Politeness tag: $$s'il\\ vous\\ pla\\hat{i}t$$ (formal — appropriate with a waiter).\n\nFull: $$On\\ aimerait\\ deux\\ caf\\acute{e}s\\ et\\ un\\ croissant,\\ s'il\\ vous\\ pla\\hat{i}t$$.\n\nAlternative starters: $$Je\\ voudrais...$$ (just yourself), $$On\\ va\\ prendre...$$, $$On\\ pourrait\\ avoir...$$", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": true}, {"question": "Misconception probe: A beginner says $$Je\\ suis\\ 24$$ to mean \"I'm 24.\" Why is this wrong, and what's the fix?", "answer": "- Step 1: The English mental model \"I AM 24\" tempts you to use $$\\hat{E}TRE$$ ($$je\\ suis$$). But in French, age uses $$AVOIR$$.\n- Step 2: Correct: $$J'ai\\ 24\\ ans$$ — literally \"I have 24 years.\" Without $$ans$$ (\"years\"), it sounds incomplete or absurd (\"I have 24 [what?]\").\n- Step 3: The same logic applies to several states French treats as possessions:\n+ $$J'ai\\ faim$$ = \"I'm hungry\" (I have hunger)\n+ $$J'ai\\ soif$$ = \"I'm thirsty\" (I have thirst)\n+ $$J'ai\\ froid$$ = \"I'm cold\" (I have cold)\n+ $$J'ai\\ peur$$ = \"I'm afraid\" (I have fear)\n\nSwitch your mental model: French \"has\" sensations; English \"is\" them.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": true}, {"question": "Misconception probe: Why is $$Je\\ n'ai\\ pas\\ un\\ caf\\acute{e}$$ wrong, and what should it be?", "answer": "- Step 1: After a negation, the indefinite article $$un$$ (and $$une$$, $$des$$, $$du$$, $$de\\ la$$) collapses to $$de$$ (or $$d'$$ before a vowel). So $$pas\\ un\\ caf\\acute{e}$$ violates this rule.\n- Step 2: Correct: $$Je\\ n'ai\\ pas\\ de\\ caf\\acute{e}$$ — \"I don't have any coffee.\"\n- Step 3: The one exception: with $$\\hat{E}TRE$$, the article does NOT collapse. $$Ce\\ n'est\\ pas\\ un\\ caf\\acute{e}$$ (\"It's not a coffee\") is correct — because $$\\hat{e}tre$$ is identifying, not denying possession/quantity.\n\nQuantity verbs ($$avoir$$, $$il\\ y\\ a$$, $$prendre$$, etc.) → collapse article. Identifying verbs ($$\\hat{e}tre$$) → keep article.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": true}, {"question": "Misconception probe: A learner writes $$nous\\ a$$ for \"we have.\" What did they get wrong, and what's the right form?", "answer": "- Step 1: The confusion: they remembered that $$on$$ (informal \"we\") takes the $$il/elle$$ form ($$on\\ a$$), and accidentally extended this to $$nous$$.\n- Step 2: But $$nous$$ has its own dedicated form: $$nous\\ avons$$. Each pronoun in French has its own conjugation; only $$on$$ piggybacks on $$il/elle$$.\n- Step 3: So the contrast is:\n+ $$nous\\ avons$$ (formal \"we have\")\n+ $$on\\ a$$ (informal \"we have\")\n\nThey mean the same thing, but the verb form differs because the pronouns are grammatically different.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": true}, {"question": "Édge case: When you negate $$Il\\ y\\ a\\ une\\ tarte$$, what happens — and why is the result a small surprise?", "answer": "- Step 1: Apply negation: $$Il\\ n'y\\ a\\ pas\\ une\\ tarte$$? No — apply the article-collapse rule.\n- Step 2: Correct: $$Il\\ n'y\\ a\\ pas\\ de\\ tarte$$.\n- Step 3: The small surprise: English speakers expect \"There isn't A tart\" (keeping \"a\"), but French replaces $$une$$ with $$de$$ in the negative. The meaning shifts subtly: not \"there isn't ONE tart\" but \"there isn't ANY tart.\"\n\nThis is the same rule as Q12 — negation flattens articles. The surprise is that this rule even applies to clearly countable singulars.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": true}, {"question": "Synthesis: A waiter says $$Avez$$-$$vous\\ choisi\\ ?$$. You want to order a medium steak and a sparkling water for two people. Compose the answer. (3 steps)", "answer": "- Step 1: Confirm yes and use the $$on$$-form since ordering for two: $$Oui,\\ on\\ va\\ prendre...$$\n- Step 2: The steak: $$une\\ entrec\\hat{o}te\\ \\grave{a}\\ point$$ ($$entrec\\hat{o}te$$ is feminine; $$\\grave{a}\\ point$$ = medium). For two people, $$deux\\ entrec\\hat{o}tes\\ \\grave{a}\\ point$$.\n- Step 3: Add the drink and politeness: $$et\\ une\\ bouteille\\ d'eau\\ gazeuse,\\ s'il\\ vous\\ pla\\hat{i}t$$.\n\nFull: $$Oui,\\ on\\ va\\ prendre\\ deux\\ entrec\\hat{o}tes\\ \\grave{a}\\ point\\ et\\ une\\ bouteille\\ d'eau\\ gazeuse,\\ s'il\\ vous\\ pla\\hat{i}t$$.\n\nNotice the integration: $$on$$-form + $$prendre$$ + numbered noun + adjective for doneness + connector $$et$$ + drink + politeness.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": true}, {"question": "Synthesis: You're meeting a French friend for the first time. Construct a 4-sentence introduction covering name, age, origin, and where you live. (4 steps)", "answer": "- Step 1: Name: $$Je\\ m'appelle\\ Phuc$$. (Reflexive verb — \"I call myself.\")\n- Step 2: Age: $$J'ai\\ 24\\ ans$$. (Uses $$AVOIR$$, not $$\\hat{E}TRE$$; don't forget $$ans$$.)\n- Step 3: Origin: $$Je\\ suis\\ vietnamien$$. (Uses $$\\hat{E}TRE$$ for nationality; masculine ending since speaker is male.)\n- Step 4: Residence: $$J'habite\\ \\grave{a}\\ Paris,\\ en\\ France$$. ($$\\grave{a}$$ before a city, $$en$$ before a feminine country.)\n\nOptional turnaround: $$Et\\ toi\\ ?$$ (\"And you?\") to invite them to share — informal because using $$tu$$.", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": true}, {"question": "What do $$lit$$ and $$toujours$$ mean?", "answer": "- Step 1: $$lit$$ = bed. Masculine: $$un\\ lit$$. The final $$-t$$ is silent (\"lee\").\n- Step 2: $$toujours$$ = always. The final $$-s$$ is silent (\"too-zhoor\").\n\nThese are everyday vocabulary words — $$toujours$$ is especially common (\"I always drink coffee in the morning\" → $$Je\\ bois\\ toujours\\ du\\ caf\\acute{e}\\ le\\ matin$$).", "source": "Opus 4.7 ②", "_id": "opus_2_51", "judge_pick": false}, {"question": "Why does the article $$de$$ become $$d'$$ in $$pas\\ d'omelette$$ but stays $$de$$ in $$pas\\ de\\ croissants$$? (2 steps)", "answer": "- Step 1: French avoids vowel-vowel collisions across word boundaries. $$omelette$$ starts with a vowel sound, so $$de\\ omelette$$ would be ugly — French contracts $$de$$ → $$d'$$ to merge: $$d'omelette$$.\n- Step 2: $$croissants$$ starts with a consonant ($$c$$), so no contraction needed — $$de\\ croissants$$ flows fine.\n\nSame principle as $$je$$ → $$j'$$, $$le$$ → $$l'$$, $$ne$$ → $$n'$$. French is consistent about eliding small words before vowels.", "source": "Opus 4.7 ②", "_id": "opus_2_52", "judge_pick": true}, {"question": "Synthesis: How would you ask politely \"Could I have the bill at the same time as the dessert?\" combining several phrases? (3 steps)", "answer": "- Step 1: Polite request frame: $$Je\\ pourrais\\ avoir...$$ (\"Could I have...\").\n- Step 2: The objects: $$l'addition$$ (the bill) and $$le\\ dessert$$ (the dessert), connected by $$avec$$ (\"with\") or as a comparison via $$en\\ m\\hat{e}me\\ temps\\ que$$ (\"at the same time as\").\n- Step 3: Politeness close: $$s'il\\ vous\\ pla\\hat{i}t$$.\n\nFull: $$Je\\ pourrais\\ avoir\\ l'addition\\ en\\ m\\hat{e}me\\ temps\\ que\\ le\\ dessert,\\ s'il\\ vous\\ pla\\hat{i}t\\ ?$$\n\nThis combines: polite frame + two nouns + connecting phrase + politeness — typical French restaurant complexity.", "source": "Opus 4.7 ②", "_id": "opus_2_53", "judge_pick": false}, {"question": "Edge case: Why does $$J'habite\\ \\grave{a}\\ Paris$$ use $$\\grave{a}$$ but $$J'habite\\ en\\ France$$ use $$en$$? (2 steps)", "answer": "- Step 1: French uses different prepositions depending on the type of place:\n+ $$\\grave{a}$$ before cities ($$\\grave{a}\\ Paris$$, $$\\grave{a}\\ Londres$$, $$\\grave{a}\\ Hanoi$$)\n+ $$en$$ before feminine countries and most continents ($$en\\ France$$, $$en\\ Italie$$, $$en\\ Europe$$)\n+ $$au$$ before masculine countries ($$au\\ Japon$$, $$au\\ Canada$$, $$au\\ Vietnam$$)\n+ $$aux$$ before plural countries ($$aux\\ \\acute{E}tats$$-$$Unis$$)\n- Step 2: How to remember country gender: most countries ending in $$-e$$ are feminine (France, Italie, Chine). Exceptions exist (le Mexique).\n\nSo for a beginner: $$\\grave{a}$$ for cities, $$en$$ for most countries — that covers most situations.", "source": "Opus 4.7 ②", "_id": "opus_2_54", "judge_pick": true}, {"question": "Café vocab quick check: match each item to its likely category — $$une\\ carafe\\ d'eau$$, $$un\\ ros\\acute{e}\\ de\\ Provence$$, $$une\\ cr\\grave{e}me\\ br\\hat{u}l\\acute{e}e$$, $$un\\ saumon\\ grill\\acute{e}$$.", "answer": "- Step 1: $$une\\ carafe\\ d'eau$$ = a carafe of water — a drink (water served in a pitcher). $$carafe$$ is feminine ($$-e$$ ending pattern).\n- Step 2: $$un\\ ros\\acute{e}\\ de\\ Provence$$ = a rosé wine from Provence — a wine. Masculine ($$-\\acute{e}$$ ending).\n- Step 3: $$une\\ cr\\grave{e}me\\ br\\hat{u}l\\acute{e}e$$ = the classic dessert — feminine ($$cr\\grave{e}me$$ ends in $$-e$$). Note the adjective $$br\\hat{u}l\\acute{e}e$$ also takes feminine $$-e$$ to agree.\n- Step 4: $$un\\ saumon\\ grill\\acute{e}$$ = grilled salmon — a main course. Masculine. The adjective $$grill\\acute{e}$$ stays masculine.\n\nPattern reinforcement: nouns ending in $$-e$$ tend to be feminine and trigger $$-e$$ on adjectives; $$-\\acute{e}$$ nouns are masculine and don't.", "source": "Opus 4.7 ②", "_id": "opus_2_55", "judge_pick": false}], "count": 56}}, "meta": {"minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 4258, "out_tokens": 10450, "reasoning_chars": 1576, "cost_eur": 0.0114, "elapsed_s": 94, "content_chars": 34705}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.8, "in_tokens": 4258, "out_tokens": 9300, "reasoning_chars": 1446, "cost_eur": 0.0102, "elapsed_s": 84, "content_chars": 31010}, "opus_1": {"run": 1, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 6713, "out_tokens": 25341, "reasoning_chars": 0, "cost_eur": 1.8412, "elapsed_s": 328, "content_chars": 53252}, "opus_2": {"run": 2, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 6713, "out_tokens": 22504, "reasoning_chars": 0, "cost_eur": 1.6454, "elapsed_s": 287, "content_chars": 45420}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.7, "in_tokens": 4529, "out_tokens": 2896, "reasoning_chars": 5219, "cost_eur": 0.004, "elapsed_s": 45, "content_chars": 5309}, "qwen_2": {"run": 2, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.75, "in_tokens": 4529, "out_tokens": 4596, "reasoning_chars": 4442, "cost_eur": 0.0059, "elapsed_s": 66, "content_chars": 11042}, "qwen_3": {"run": 3, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.8, "in_tokens": 4529, "out_tokens": 5970, "reasoning_chars": 4705, "cost_eur": 0.0074, "elapsed_s": 91, "content_chars": 15085}, "qwen_4": {"run": 4, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.85, "in_tokens": 4529, "out_tokens": 8434, "reasoning_chars": 941, "cost_eur": 0.0101, "elapsed_s": 129, "content_chars": 32330}}};
const SK='french_lessons';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
