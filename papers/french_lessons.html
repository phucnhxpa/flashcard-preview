<script>
const DATA={"selected": [{"question": "Give three polite ways to say \"I would like to have…\" in a French restaurant.", "answer": "- Step 1: $$Je\\ voudrais\\ldots$$ — the most common; conditional form of $$vouloir$$ (\"I would want\"). Softer than $$Je\\ veux$$ (I want), which sounds blunt.\n- Step 2: $$Je\\ pourrais\\ avoir\\ldots$$ — \"Could I have…\" — conditional of $$pouvoir$$ (to be able). Used to ask politely if you may have something.\n- Step 3: $$J'aimerais\\ avoir\\ldots$$ — \"I would like to have…\" — conditional of $$aimer$$. Slightly warmer/wishful tone.\n\nMisconception probe: Saying $$Je\\ veux$$ to a waiter is grammatically fine but socially curt — like demanding rather than asking. Always use the conditional in service contexts.", "source": "Opus 4.7 ①", "_id": "opus_1_27"}, {"question": "A student says \"Je suis hunger.\" Why is this wrong, and what is the correct way to say \"I am hungry\"? (1 step)", "answer": "This is a classic **interference error** from English. In French, \"to be hungry\" uses **AVOIR**, not ÊTRE:\n\n**正确: \"J'ai faim.\"** (I have hunger / I'm hungry)\n\nOther common AVOIR expressions:\n- **J'ai chaud** = I'm hot\n- **J'ai froid** = I'm cold\n- **J'ai soif** = I'm thirsty\n- **J'ai raison** = I'm right\n- **J'ai tort** = I'm wrong\n\nThe structure is always **avoir + noun** (faim, chaud, froid, soif), not \"to be + adjective.\"", "source": "MiniMax ①", "_id": "minimax_1_51"}, {"question": "How do you ask \"Where are you from?\" and \"Where do you live?\" informally in French, and what's the structural difference between them?", "answer": "- Step 1: \"Where are you from?\" = $$Tu\\ viens\\ d'où\\ ?$$ — uses $$venir$$ (to come) + $$de$$ (from) → \"You come from where?\"\n- Step 2: \"Where do you live?\" = $$Tu\\ habites\\ où\\ ?$$ — uses $$habiter$$ (to live/reside) directly with $$où$$ (where).\n- Step 3: The difference: \"from where\" needs the preposition $$de$$ (which contracts to $$d'$$ before vowel $$où$$), whereas \"live where\" needs no preposition.\n\nTakeaway: $$d'où$$ always pairs with motion/origin verbs; $$où$$ alone pairs with location verbs.", "source": "Opus 4.7 ①", "_id": "opus_1_2"}, {"question": "What's a reliable shortcut for guessing the gender of a French noun ending in -ette or -é?", "answer": "- Step 1: Nouns ending in $$-ette$$ are almost always **feminine** — $$une\\ omelette$$, $$une\\ carafe$$ ... wait, $$carafe$$ ends in -e not -ette; but the diminutive -ette ending (omelette, baguette, fourchette) signals feminine.\n- Step 2: Nouns ending in $$-é$$ (with acute accent) are almost always **masculine** — $$un\\ café$$, $$un\\ thé$$, $$un\\ canapé$$.\n- Step 3: These aren't laws but strong patterns — they help you guess when you don't know a word.\n\nMisconception probe: Don't confuse -é (masculine) with -ée (feminine, like $$une\\ journée$$) — the silent extra e flips the gender.", "source": "Opus 4.7 ①", "_id": "opus_1_8"}, {"question": "What's a quick way to ask \"What is this?\" in French, and how does it sound spoken?", "answer": "- Step 1: The phrase is $$Qu'est$$-$$ce\\ que\\ c'est\\ ?$$ — literally \"What is it that it is?\"\n- Step 2: When spoken at normal speed, it collapses to something like \"keske-say.\" The first three words ($$Qu'est$$-$$ce\\ que$$) function as a frozen question-opener meaning \"what.\"\n- Step 3: This same opener can introduce any object question:\n+ $$Qu'est$$-$$ce\\ qu'il\\ y\\ a\\ dans\\ ...\\ ?$$ = \"What's in...?\"\n+ $$Qu'est$$-$$ce\\ que\\ tu\\ veux\\ ?$$ = \"What do you want?\"\n\nTreat $$Qu'est$$-$$ce\\ que$$ as a single chunk = \"What ___?\"", "source": "Opus 4.7 ②", "_id": "opus_2_28"}, {"question": "What does $$Je\\ suis\\ désolé$$ mean, and why might it sometimes be spelled $$désolée$$?", "answer": "- Step 1: $$Je\\ suis\\ désolé$$ = \"I am sorry\" — literally \"I am desolated/devastated.\"\n- Step 2: $$désolé$$ is an adjective describing the subject (you), so it must agree:\n+ A male speaker: $$Je\\ suis\\ désolé$$ (no extra e).\n+ A female speaker: $$Je\\ suis\\ désolée$$ (add -e for feminine).\n- Step 3: This is the general rule for any adjective after $$être$$ — the subject's gender determines the ending.\n\nTakeaway: When YOU describe yourself, the adjective agrees with your gender. Female speakers add -e in writing (silent in speech).", "source": "Opus 4.7 ①", "_id": "opus_1_42"}, {"question": "Create a practice dialogue: You walk into a café, the waiter greets you, you ask for a table for two, and you ask what the dish of the day is. Write it in French. (3 steps)", "answer": "- Step 1: **Waiter:** \"Bonjour, bienvenue ! À l'intérieur ou en terrasse ?\"\n  **You:** \"Bonjour ! Je préfère en terrasse, s'il vous plaît.\"\n\n- Step 2: **Waiter:** \"Suivez-moi, s'il vous plaît. Installez-vous. Voici le menu.\"\n  **You:** \"Merci.Excusez-moi, c'est quoi le plat du jour ?\"\n\n- Step 3: **Waiter:** \"Aujourd'hui, nous avons un saumon grillé avec des légumes.\"\n  **You:** \"Parfait ! Je voudrais le saumon, s'il vous plaît.\"", "source": "MiniMax ①", "_id": "minimax_1_49"}, {"question": "Misconception probe: A learner writes $$nous\\ a$$ for \"we have.\" What did they get wrong, and what's the right form?", "answer": "- Step 1: The confusion: they remembered that $$on$$ (informal \"we\") takes the $$il/elle$$ form ($$on\\ a$$), and accidentally extended this to $$nous$$.\n- Step 2: But $$nous$$ has its own dedicated form: $$nous\\ avons$$. Each pronoun in French has its own conjugation; only $$on$$ piggybacks on $$il/elle$$.\n- Step 3: So the contrast is:\n+ $$nous\\ avons$$ (formal \"we have\")\n+ $$on\\ a$$ (informal \"we have\")\n\nThey mean the same thing, but the verb form differs because the pronouns are grammatically different.", "source": "Opus 4.7 ②", "_id": "opus_2_47"}, {"question": "What's the difference between $$On\\ a$$ and $$On\\ est$$ in everyday French, and why might a beginner confuse them?", "answer": "- Step 1: $$On\\ a$$ = \"we have\" (from $$avoir$$); $$On\\ est$$ = \"we are\" (from $$être$$).\n- Step 2: Confusion arises because both are short, both use $$on$$, and the verbs sound somewhat similar in fast speech (\"ona\" vs \"ones-t\").\n- Step 3: Examples to drill:\n+ $$On\\ a\\ une\\ réservation$$ = We have a reservation.\n+ $$On\\ est\\ en\\ retard$$ = We're late.\n+ $$On\\ a\\ faim$$ = We're hungry (literally \"we have hunger\" — French uses $$avoir$$ for hunger!).\n+ $$On\\ est\\ fatigués$$ = We're tired.\n\nTakeaway: French uses $$avoir$$ for many states English expresses with \"to be\" (hunger, thirst, age, fear). Memorize: $$avoir\\ faim,\\ avoir\\ soif,\\ avoir\\ peur,\\ avoir\\ \\ldots\\ ans$$.", "source": "Opus 4.7 ①", "_id": "opus_1_57"}, {"question": "Why does French say $$J'ai\\ faim$$ (literally \"I have hunger\") instead of \"I am hungry\"? What's the conceptual pattern?", "answer": "- Step 1: French treats many physical/emotional states as **possessions** rather than states of being. You \"have\" hunger, thirst, fear, an age.\n- Step 2: The pattern: $$avoir$$ + noun (faim, soif, peur, sommeil, chaud, froid, raison).\n+ $$J'ai\\ chaud$$ = \"I'm hot\" (lit. \"I have hot\").\n+ $$J'ai\\ raison$$ = \"I'm right\" (lit. \"I have reason\").\n- Step 3: Etymologically, this comes from Latin where many states were nouns of acquisition (you \"acquire\" hunger). English shifted to \"to be + adjective\"; French kept the older idiom.\n\nMisconception probe: $$Je\\ suis\\ chaud$$ does NOT mean \"I'm hot (temperature)\" — it can mean \"I'm aroused\" or \"I'm up for it.\" Always use $$J'ai\\ chaud$$ for temperature!", "source": "Opus 4.7 ①", "_id": "opus_1_59"}, {"question": "How do you say \"I'm going to have the hamburger\" when ordering in French?", "answer": "- Step 1: $$Je\\ vais\\ prendre\\ le\\ hamburger$$ — literally \"I am going to take the hamburger.\"\n- Step 2: $$Je\\ vais$$ + infinitive = \"I'm going to [do]\" — the near-future construction (futur proche), like English's \"going to\" future.\n- Step 3: Note: at a restaurant, French uses $$prendre$$ (to take), not $$avoir$$ or $$manger$$, for ordering — it's the natural verb of choosing from a menu.\n\nTakeaway: $$Je\\ vais\\ prendre$$ is the most natural everyday way to order; $$Je\\ voudrais$$ is slightly more formal/polite.", "source": "Opus 4.7 ①", "_id": "opus_1_28"}, {"question": "What does $$il\\ y\\ a$$ mean, and how do you negate it?", "answer": "- Step 1: $$il\\ y\\ a$$ = \"there is\" / \"there are\" — works for both singular and plural in French (unlike English which switches).\n+ $$Il\\ y\\ a\\ un\\ croissant$$ = There is a croissant.\n+ $$Il\\ y\\ a\\ des\\ croissants$$ = There are croissants.\n- Step 2: Literally it breaks down as $$il$$ (it) + $$y$$ (there) + $$a$$ (has) — \"it has there\" → \"there exists.\"\n- Step 3: Negative: $$il\\ n'y\\ a\\ pas\\ de$$ — and remember the article collapses to $$de$$.\n+ $$Il\\ n'y\\ a\\ pas\\ de\\ tarte$$ = There is no tart.\n\nTakeaway: $$il\\ y\\ a$$ is a frozen expression — don't try to break it apart; learn it as a unit.", "source": "Opus 4.7 ①", "_id": "opus_1_18"}, {"question": "Why does $$quatre$$-$$vingts$$ have an $$-s$$ at the end, but $$quatre$$-$$vingt$$-$$un$$ doesn't? (2 steps)", "answer": "- Step 1: $$quatre$$-$$vingts$$ (exactly 80) takes a plural $$-s$$ because $$vingt$$ is being multiplied: \"four twenties.\" This is a special agreement rule.\n- Step 2: But when another number FOLLOWS $$vingt$$ (like 81, 82...), the $$-s$$ drops: $$quatre$$-$$vingt$$-$$un$$, $$quatre$$-$$vingt$$-$$deux$$. The presence of a following number \"uses up\" the multiplication.\n\nSame rule applies to $$cent$$: $$deux\\ cents$$ (200) but $$deux\\ cent\\ un$$ (201).", "source": "Opus 4.7 ②", "_id": "opus_2_21"}, {"question": "When would you use **partitive articles** (du, de la, des) instead of indefinite articles (un, une, des)? Give examples like **du café** vs **un café**. (3 steps)", "answer": "- Step 1: Partitive articles (du/de la/des) = \"some\" for uncountable nouns (food, liquids).  \n- Step 2: Indefinite articles (un/une/des) = \"a/an/some\" for countable nouns.  \n- Step 3:  \n  - **Je bois du café** = I drink (some) coffee (uncountable).  \n  - **Je veux un café** = I want a coffee (countable, one cup).  \n+ Misconception check: Why not **un café** in **Je bois un café**? \"Drink coffee\" is uncountable.", "source": "Qwen 3 ②", "_id": "qwen_2_8"}, {"question": "What are the four forms of $$quel$$, and why are there four?", "answer": "- Step 1: $$quel$$ means \"which\" or \"what\" and behaves like an adjective — so it agrees with the noun it modifies in gender and number.\n- Step 2: The four forms:\n+ $$quel$$ (masculine singular): $$quel\\ \\hat{a}ge\\ ?$$\n+ $$quelle$$ (feminine singular): $$quelle\\ heure\\ ?$$\n+ $$quels$$ (masculine plural): $$quels\\ livres\\ ?$$\n+ $$quelles$$ (feminine plural): $$quelles\\ tartes\\ ?$$\n- Step 3: All four sound identical when spoken (pronounced \"kel\"). The agreement only shows up in spelling — important for writing but not for listening.\n\n$$quel$$ is an adjective in disguise — that's why it agrees.", "source": "Opus 4.7 ②", "_id": "opus_2_24"}, {"question": "What are the three French indefinite articles, and how do they correspond to English a/an/some?", "answer": "- Step 1: $$un$$ = \"a/an\" for a masculine singular noun: $$un\\ café$$ (a coffee).\n- Step 2: $$une$$ = \"a/an\" for a feminine singular noun: $$une\\ salade$$ (a salad).\n- Step 3: $$des$$ = \"some\" for plural nouns of any gender: $$des\\ croissants$$, $$des\\ salades$$.\n\nMisconception probe: English often DROPS \"some\" (\"I want croissants\"), but French requires $$des$$ — you cannot say $$Je\\ veux\\ croissants$$. The article is grammatically mandatory.", "source": "Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "What's the difference between $$caf\\acute{e}$$, $$th\\acute{e}$$, and $$une\\ orange\\ press\\acute{e}e$$ — and what gender is each?", "answer": "- Step 1: $$un\\ caf\\acute{e}$$ = coffee. Masculine (ends in $$-\\acute{e}$$, the masculine-ending pattern).\n- Step 2: $$un\\ th\\acute{e}$$ = tea. Also masculine (same $$-\\acute{e}$$ pattern).\n- Step 3: $$une\\ orange\\ press\\acute{e}e$$ = fresh-squeezed orange juice. Feminine ($$orange$$ is feminine, so the adjective $$press\\acute{e}$$ becomes $$press\\acute{e}e$$ with an extra $$-e$$). Literally \"a pressed orange.\"\n\nVocabulary insight: $$press\\acute{e}$$ = \"pressed,\" so $$un\\ citron\\ press\\acute{e}$$ = fresh-squeezed lemonade by the same logic.", "source": "Opus 4.7 ②", "_id": "opus_2_37"}, {"question": "Synthesis: You're meeting a French friend for the first time. Construct a 4-sentence introduction covering name, age, origin, and where you live. (4 steps)", "answer": "- Step 1: Name: $$Je\\ m'appelle\\ Phuc$$. (Reflexive verb — \"I call myself.\")\n- Step 2: Age: $$J'ai\\ 24\\ ans$$. (Uses $$AVOIR$$, not $$\\hat{E}TRE$$; don't forget $$ans$$.)\n- Step 3: Origin: $$Je\\ suis\\ vietnamien$$. (Uses $$\\hat{E}TRE$$ for nationality; masculine ending since speaker is male.)\n- Step 4: Residence: $$J'habite\\ \\grave{a}\\ Paris,\\ en\\ France$$. ($$\\grave{a}$$ before a city, $$en$$ before a feminine country.)\n\nOptional turnaround: $$Et\\ toi\\ ?$$ (\"And you?\") to invite them to share — informal because using $$tu$$.", "source": "Opus 4.7 ②", "_id": "opus_2_50"}, {"question": "Why does French use the verb \"to have\" (avoir) instead of \"to be\" (être) when stating your age?", "answer": "- Step 1: In English we say \"I AM 24 years old,\" treating age as a state of being.\n- Step 2: French instead says $$J'ai\\ 24\\ ans$$, literally \"I HAVE 24 years\" — age is conceived as a possession, something you've accumulated.\n- Step 3: This is why the question is $$Quel\\ âge\\ as-tu\\ ?$$ — literally \"What age do you have?\" — using $$avoir$$, not $$être$$.\n\nMisconception probe: Saying $$Je\\ suis\\ 24\\ ans$$ is a classic English-speaker mistake; it's grammatically wrong in French.", "source": "Opus 4.7 ①", "_id": "opus_1_1"}, {"question": "What's the special pattern for numbers like 21, 31, 41, 51, 61 in French — and how is 22 different?", "answer": "- Step 1: For 21, 31, 41, 51, 61, French inserts \"et un\" (and one): $$vingt-et-un,\\ trente-et-un,\\ quarante-et-un,\\ cinquante-et-un,\\ soixante-et-un$$.\n- Step 2: BUT for 22, 23, 32, 33, etc., there's NO \"et\" — just hyphenation: $$vingt-deux,\\ vingt-trois,\\ trente-deux$$.\n- Step 3: Why? Historically the \"et\" was a courtesy linker only for \"one\" (the smallest unit), like saying \"twenty AND one\" in old languages. For other digits, French just stacks them.\n\nMisconception probe: 71 = $$soixante-et-onze$$ keeps the \"et\" (because of the 1 in 11), but 72 = $$soixante-douze$$ doesn't.", "source": "Opus 4.7 ①", "_id": "opus_1_22"}, {"question": "You see a French word ending in \"-é\" (like \"café\") and one ending in \"-ette\" (like \"omelette\"). Without looking them up, what gender would you guess, and why? (2 steps)", "answer": "- Step 1: Words ending in -é are almost always MASCULINE: un café, un thé, un rosé. The -é ending sounds like \"ay\" and is typically masculine.\n- Step 2: Words ending in -ette are almost always FEMININE: une omelette, une carafe, une serviette. This is a strong pattern — feminine nouns often end in -ette, -tion, -ité, -elle, -esse.\n\nThis is a useful heuristic, but there are exceptions (like \"une clé\" from \"clé\" which ends in -é but is feminine).", "source": "MiniMax ②", "_id": "minimax_2_4"}, {"question": "A waiter says $$Suivez$$-$$moi,\\ s'il\\ vous\\ pla\\hat{i}t$$ then $$Installez$$-$$vous$$. What is each saying?", "answer": "- Step 1: $$Suivez$$-$$moi$$ = \"Follow me\" — $$suivez$$ is the formal imperative of $$suivre$$ (to follow), and $$-moi$$ (\"me\") attaches with a hyphen because it's an imperative.\n- Step 2: $$Installez$$-$$vous$$ = \"Get settled / take a seat / make yourself comfortable.\" $$installer$$ literally means \"to install\"; with the reflexive $$-vous$$, it means \"install yourselves\" → settle in.\n- Step 3: Both use the $$-ez$$ ending typical of formal $$vous$$ imperatives. Imperatives drop the pronoun ($$vous\\ suivez$$ → $$suivez$$).\n\nThese two phrases are essentially the standard \"Please follow me to your table; have a seat\" of French restaurants.", "source": "Opus 4.7 ②", "_id": "opus_2_29"}, {"question": "How do you ask \"How are you?\" in French, and what are typical responses? (2 steps)", "answer": "- Step 1: **Ça va ?** is the most common informal way to ask \"How are things?\" (literally \"It goes?\"). The more formal version is **Comment vas-tu ?** or **Comment allez-vous ?**\n\n- Step 2: Typical responses: **Ça va.** (I'm fine.) / **Très bien, et toi ?** (Very well, and you?) / **Ça va bien, merci.** (It goes well, thank you.) A less enthusiastic response might be **Ça peut aller.** (It goes / It's okay.)", "source": "MiniMax ①", "_id": "minimax_1_4"}, {"question": "What's the difference between $$on$$ and $$nous$$ when meaning \"we\"?", "answer": "- Step 1: $$nous$$ is the formal/written \"we\" — used in writing, formal speech, and when emphasizing the group. Takes its own verb form: $$nous\\ avons$$, $$nous\\ sommes$$.\n- Step 2: $$on$$ is the informal/spoken \"we\" — what you'll hear constantly in everyday conversation. Crucially, it takes the **third-person-singular** verb form (like il/elle): $$on\\ a$$, $$on\\ est$$, $$on\\ va$$.\n- Step 3: At a restaurant ordering for two, you'd naturally say $$On\\ va\\ prendre\\ deux\\ cafés$$ rather than $$Nous\\ allons\\ prendre$$ — the latter sounds stiff.\n\nMisconception probe: Even though $$on$$ means \"we,\" its verb conjugates as if singular — $$on\\ est$$ NOT $$on\\ sont$$. The form looks like he/she but the meaning is we.", "source": "Opus 4.7 ①", "_id": "opus_1_19"}, {"question": "In French, how do you say \"My name is Phuc,\" and what does the verb literally mean?", "answer": "- Step 1: The phrase is $$Je\\ m'appelle\\ Phuc$$.\n- Step 2: Literally, this means \"I call myself Phuc\" — the verb $$s'appeler$$ is reflexive (the $$m'$$ means \"myself\"), so French doesn't say \"my name IS X\" but rather \"I call myself X.\"\n- Step 3: This is why you'll see $$Comment\\ tu\\ t'appelles\\ ?$$ for \"What's your name?\" — literally \"How do you call yourself?\"\n\nTakeaway: French treats naming as a reflexive action, not a state of being.", "source": "Opus 4.7 ①", "_id": "opus_1_0"}, {"question": "What's the underlying logic of why French has so much agreement (gender, number) in nouns, articles, and adjectives — and why is it useful?", "answer": "- Step 1: French inherited from Latin a system where noun endings carried gender/case information. Over centuries, endings eroded, so French shifted these signals onto **articles and adjectives**.\n- Step 2: Practical benefit: agreement creates redundancy that aids comprehension in noisy speech. If you miss the noun, the article or adjective tells you its gender and number.\n+ $$Les\\ petites\\ filles$$ — even if you only catch $$petites$$, the -es ending tells you it's feminine plural.\n- Step 3: Cost for learners: you must track gender for every noun and adjust everything that touches it. But this becomes intuitive with exposure.\n\nTakeaway: Agreement isn't decoration — it's a redundancy mechanism that makes spoken French more parseable.", "source": "Opus 4.7 ①", "_id": "opus_1_61"}, {"question": "Why does $$La\\ réunion\\ est\\ finie$$ have $$finie$$ with an -e, but you'd say $$Le\\ repas\\ est\\ fini$$ without?", "answer": "- Step 1: $$fini$$ here is acting like an adjective (past participle used adjectivally), so it agrees with the subject.\n- Step 2: $$La\\ réunion$$ (the meeting) is feminine — so $$fini$$ becomes $$finie$$.\n- Step 3: $$Le\\ repas$$ (the meal) is masculine — so $$fini$$ stays as $$fini$$ (default form).\n\nTakeaway: Adjective agreement after $$être$$ is automatic — even past participles like $$fini, fait, parti$$ shift their endings.", "source": "Opus 4.7 ①", "_id": "opus_1_43"}, {"question": "What are the French doneness options for meat, and what do they literally mean in English? Explain why this system is important in French dining culture.", "answer": "French doneness options for meat:  \n- \"bleu\" = very rare (\"blue\")  \n+ The meat is seared on the outside but almost raw inside  \n+ Comes from the German \"blau,\" referring to the bluish color of undercooked meat  \n\n- \"saignant\" = rare (\"bleeding\")  \n+ The meat is red and warm in the center  \n+ Literally means \"bleeding\"  \n\n- \"à point\" = medium (\"to the point\")  \n+ The meat is cooked but still pink in the center  \n+ Literally means \"at the point,\" referring to perfect cooking  \n\n- \"bien cuit\" = well done (\"well cooked\")  \n+ The meat is fully cooked with no pink  \n+ Literally means \"well cooked\"  \n\nThis system is important in French dining culture because it allows precise specification of cooking preferences and reflects the French emphasis on culinary perfection and detail.", "source": "Qwen 3 ④", "_id": "qwen_4_30"}, {"question": "In negation, what is the difference between \"je n'ai pas\" and \"je n'ai pas de\"? When would you use each? (2 steps)", "answer": "- Step 1: \"Je n'ai pas\" (without \"de\") negates a verb but keeps the object: \"Je n'ai pas mon téléphone\" = I don't have my phone (the phone exists, I just don't have it with me).\n- Step 2: \"Je n'ai pas de\" (with \"de\") means \"I don't have any...\" — the article disappears: \"Je n'ai pas de réservation\" = I don't have a reservation (no reservation exists).\n\nThe presence of \"de\" signals a more absolute negation — \"no X at all\" rather than \"not X right now.\"", "source": "MiniMax ②", "_id": "minimax_2_47"}, {"question": "What do $$cent$$, $$mille$$, $$million$$, and $$milliard$$ mean? (4 steps)", "answer": "- Step 1: $$cent$$ = 100. No article needed: just say $$cent$$ for \"one hundred.\"\n- Step 2: $$mille$$ = 1,000. Same — no article ($$mille$$, not $$un\\ mille$$).\n- Step 3: $$un\\ million$$ = 1,000,000 — but here you DO use $$un$$ (it behaves as a noun).\n- Step 4: $$un\\ milliard$$ = 1,000,000,000 (one BILLION in English — careful, false-friend territory).\n\nTrap: French $$milliard$$ ≠ English \"milliard\" in everyday use. $$milliard$$ = 10⁹ = English billion.", "source": "Opus 4.7 ②", "_id": "opus_2_22"}, {"question": "In French, how do you ask someone \"How old are you?\" and how would a 24-year-old respond? (2 steps)", "answer": "- Step 1: The question is **Quel âge as-tu ?** — notice French uses the verb AVOIR (to have), not \"to be\" as in English. The literal translation is \"What age do you have?\"\n\n- Step 2: The answer would be **J'ai 24 ans** (\"I have 24 years\"). The word \"ans\" (years) is always plural, even if you have just one year — you'd say \"j'ai un an.\"\n\nThis is a classic example of a *false friend* in thinking: English uses \"to be\" for age, French uses \"to have.\"", "source": "MiniMax ①", "_id": "minimax_1_1"}, {"question": "What does $$toujours$$ mean, and what's its position in a sentence?", "answer": "- Step 1: $$toujours$$ = \"always\" (also sometimes \"still,\" depending on context).\n- Step 2: Placement: usually right after the conjugated verb.\n+ $$Je\\ suis\\ toujours\\ en\\ retard$$ = I'm always late.\n+ $$Il\\ a\\ toujours\\ raison$$ = He's always right.\n- Step 3: With negation, $$ne\\ \\ldots\\ jamais$$ is the opposite (\"never\"), wrapping the verb just like $$ne\\ \\ldots\\ pas$$.\n\nTakeaway: French adverbs of frequency (toujours, souvent, jamais) typically sit BETWEEN the verb and the rest of the sentence — unlike English which often puts them before.", "source": "Opus 4.7 ①", "_id": "opus_1_49"}, {"question": "How does French construct 70, 80, and 90 — and why is the logic different for 80/90 vs 70?", "answer": "- Step 1: 70 = $$soixante-dix$$ — literally \"sixty-ten\" (60 + 10). So 71 = $$soixante-et-onze$$ (60+11), 79 = $$soixante-dix-neuf$$ (60+19).\n- Step 2: 80 = $$quatre-vingts$$ — literally \"four-twenties\" (4 × 20). This is a **vigesimal** (base-20) leftover from Old French/Celtic. So 81 = $$quatre-vingt-un$$, 99 = $$quatre-vingt-dix-neuf$$.\n- Step 3: 90 = $$quatre-vingt-dix$$ — \"four-twenties-ten\" (4×20+10). So 91 = $$quatre-vingt-onze$$, 99 = $$quatre-vingt-dix-neuf$$.\n\nTakeaway: 70 builds on ×10 (extending 60), but 80 and 90 build on ×20. Switzerland/Belgium simplify with $$septante, huitante/octante, nonante$$ — but standard French keeps the old system.\n\nMisconception probe: $$quatre-vingts$$ has an -s only when it ends a number; $$quatre-vingt-un$$ drops the s because something follows.", "source": "Opus 4.7 ①", "_id": "opus_1_23"}, {"question": "Explain why *\"C'est belle\"* is wrong (for \"It's beautiful\") but *\"une belle table\"* is correct (3 steps)", "answer": "- Step 1: **C'est** = \"It is\" uses neutral subject (not referring to a specific noun) → always masculine: *C'est beau*  \n- Step 2: Adjective in *\"une belle table\"* AGREES with the FEMININE SINGULAR noun *table* (ending → -e)  \n- Step 3: Structural difference:  \n+ *C'est + adjective* → neutral subject (genderless)  \n+ *noun + adjective* → adjective matches noun gender/number  \n+ Compare: *C'est un homme fort / C'est une femme forte* (adjective after noun agrees)", "source": "Qwen 3 ③", "_id": "qwen_3_2"}, {"question": "How would you correctly use \"je suis vietnamien\" to express your nationality while accounting for gender? Explain the rule. (2 steps)", "answer": "- Step 1: The gender of the speaker determines the ending of the nationality adjective \"vietnamien\":  \n+ \"Je suis vietnamien\" for a masculine speaker  \n+ \"Je suis vietnamienne\" for a feminine speaker  \n\n- Step 2: Nationality adjectives in French agree in gender and number with the person describing themselves, unlike in English where nationality words remain unchanged  \n+ \"Je suis français/e\" for French nationality  \n+ \"Il/Elle est espagnol/spagnole\" for Spanish nationality  \n+ \"Nous sommes italiens/italiennes\" for plural Italian nationality  \n\nThis gender agreement is a fundamental feature of French adjectives that applies to both nationalities and other descriptive terms.", "source": "Qwen 3 ④", "_id": "qwen_4_7"}, {"question": "Practice production: How would you introduce yourself in French saying your name, age, nationality, and where you live? Give one connected speech.", "answer": "- Step 1: Name: $$Bonjour,\\ je\\ m'appelle\\ [name]$$.\n- Step 2: Age and nationality: $$J'ai\\ [number]\\ ans$$ + $$Je\\ suis\\ [nationality]$$.\n+ E.g., $$J'ai\\ vingt-quatre\\ ans.\\ Je\\ suis\\ vietnamien$$ (or $$vietnamienne$$ if female).\n- Step 3: Location: $$J'habite\\ à\\ [city],\\ en\\ [country]$$.\n+ E.g., $$J'habite\\ à\\ Paris,\\ en\\ France.$$\n\nPutting it together: $$Bonjour,\\ je\\ m'appelle\\ Phuc.\\ J'ai\\ vingt-quatre\\ ans.\\ Je\\ suis\\ vietnamien.\\ J'habite\\ à\\ Paris,\\ en\\ France.$$\n\nTakeaway: Notice the alternation: $$avoir$$ for age, $$être$$ for nationality, $$habiter$$ for residence. Each statement needs the right verb.", "source": "Opus 4.7 ①", "_id": "opus_1_51"}, {"question": "What are the three French time-frame words for yesterday, today, and tomorrow?", "answer": "- Step 1: $$hier$$ = yesterday (pronounced \"yair\").\n- Step 2: $$aujourd'hui$$ = today — a long word literally meaning \"on the day of today\" ($$au\\ jour\\ d'hui$$, where \"hui\" itself was old French for \"today\"; the modern form is redundant).\n- Step 3: $$demain$$ = tomorrow (pronounced \"duh-MAN\" with nasal vowel).\n\nTakeaway: $$aujourd'hui$$ looks intimidating but is one fixed word — pronounce it \"oh-zhoor-DWEE.\"", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "What's the difference between $$Est-ce\\ que\\ tout\\ va\\ bien\\ ?$$ and $$Ça\\ va\\ ?$$", "answer": "- Step 1: $$Ça\\ va\\ ?$$ = casual \"How's it going?\" — used between friends or as a general greeting.\n- Step 2: $$Est-ce\\ que\\ tout\\ va\\ bien\\ ?$$ = \"Is everything alright?\" — more formal, often asked by a waiter mid-meal to check on you.\n- Step 3: Structurally:\n+ $$Ça\\ va\\ ?$$ uses just intonation to make a question (the most casual French question form).\n+ $$Est-ce\\ que\\ldots$$ is the polite/formal question-opener, signaling a complete sentence is following.\n\nTakeaway: $$Est-ce\\ que$$ + statement is the easiest way to form polite questions — no inversion needed.", "source": "Opus 4.7 ①", "_id": "opus_1_45"}, {"question": "Translate $$Est-ce\\ que\\ vous\\ les\\ voulez\\ en\\ même\\ temps\\ ?$$ and explain what $$les$$ refers to.", "answer": "- Step 1: Meaning: \"Do you want them at the same time?\" — a waiter might ask this if you ordered multiple dishes.\n- Step 2: Breakdown:\n+ $$Est-ce\\ que$$ — question opener.\n+ $$vous\\ les\\ voulez$$ — \"you want them\"; $$les$$ is the direct object pronoun for \"them\" (placed BEFORE the verb in French).\n+ $$en\\ même\\ temps$$ — \"at the same time.\"\n- Step 3: $$les$$ refers back to whatever dishes/items were just mentioned in the conversation — e.g., your starter and main course.\n\nMisconception probe: Unlike English (\"Do you want THEM\"), French puts the object pronoun BEFORE the verb ($$les\\ voulez$$, not $$voulez\\ les$$).", "source": "Opus 4.7 ①", "_id": "opus_1_46"}, {"question": "Why is \"It's beautiful\" always $$C'est\\ beau$$ in French, even if you're talking about a feminine noun?", "answer": "- Step 1: After the construction $$c'est$$ (\"it is\"), the adjective is ALWAYS in the masculine form. So even pointing at a beautiful $$tarte$$ (feminine), you say $$C'est\\ beau\\ !$$ not $$C'est\\ belle$$.\n- Step 2: The reason: $$c'$$ (from $$ce$$, \"this/it\") is a neuter/default pronoun referring to a vague \"it/situation,\" not the specific noun. With no specific gendered noun to agree with, French defaults to masculine.\n- Step 3: Contrast: $$La\\ tarte\\ est\\ belle$$ — here the subject IS the feminine noun $$la\\ tarte$$, so the adjective agrees and becomes $$belle$$.\n\nAfter $$c'est$$ → default masculine. With a specific gendered subject → agree.", "source": "Opus 4.7 ②", "_id": "opus_2_8"}, {"question": "How do you say \"What's in it?\" / \"What's in the [dish]?\" when asking about ingredients in French?", "answer": "- Step 1: $$Qu'est-ce\\ qu'il\\ y\\ a\\ dans\\ \\ldots\\ ?$$ = \"What is there in…?\"\n- Step 2: Breakdown:\n+ $$Qu'est-ce\\ que$$ = \"What\" (question opener) — literally \"What is it that\"\n+ $$il\\ y\\ a$$ = \"there is\"\n+ $$dans$$ = in\n- Step 3: Example: $$Qu'est-ce\\ qu'il\\ y\\ a\\ dans\\ la\\ salade\\ niçoise\\ ?$$ = What's in the niçoise salad?\n\nTakeaway: $$Qu'est-ce\\ que$$ is the universal question-opener — drill it. Pronounced \"kess-kuh.\"", "source": "Opus 4.7 ①", "_id": "opus_1_35"}, {"question": "Contrast *un café* vs *du café* – when would you use each, and what happens in negation? (3 steps)", "answer": "- Step 1: **Indefinite un/une/des** = countable (specific quantities): *un croissant* (I'll eat this one)  \n- Step 2: **Partitive du/de la/des** = uncountable mass nouns: *du café* (some coffee, unspecified amount)  \n+ Physical mass: *de l'eau, de la farine*  \n+ Abstract: *de l'amour, de la patience*  \n- Step 3: Negation collapses both to *pas de*:  \n+ *Je n'ai pas de livre* (no book)  \n+ *Je n'ai pas de café* (no coffee)  \n+ *Pas de* avoids specifying quantity", "source": "Qwen 3 ③", "_id": "qwen_3_3"}, {"question": "How do you know a French noun is plural when speaking, given that the plural -s isn't pronounced?", "answer": "- Step 1: The plural -s on the noun itself is silent, so $$croissant$$ and $$croissants$$ sound identical in isolation.\n- Step 2: You identify plurality from the **article** that precedes the noun, since articles are pronounced differently:\n+ $$le/la$$ (singular) vs $$les$$ (plural) — \"luh/lah\" vs \"lay\"\n+ $$un/une$$ (singular) vs $$des$$ (plural) — \"uhn/oon\" vs \"day\"\n- Step 3: Liaison also helps: $$les\\ amis$$ → \"lay-zah-mee\" (the z gives away the plural).\n\nTakeaway: French shifts the grammatical signal from the noun ending (as in English) to the preceding article.", "source": "Opus 4.7 ①", "_id": "opus_1_6"}, {"question": "How does French express \"My name is Phuc,\" and what is the literal grammatical structure?", "answer": "- Step 1: The phrase is $$Je\\ m'appelle\\ Phuc$$.\n- Step 2: Literally it means \"I call myself Phuc\" — $$appeler$$ means \"to call,\" and $$m'$$ is the reflexive pronoun \"myself\" (shortened from $$me$$ before a vowel).\n- Step 3: So French doesn't say \"my name is\" with a possessive; it uses a reflexive verb structure. This is why you also hear $$Comment\\ tu\\ t'appelles\\ ?$$ — \"How do you call yourself?\"\n\nFrench uses reflexive verbs in places where English uses \"to be\" + noun.", "source": "Opus 4.7 ②", "_id": "opus_2_0"}, {"question": "Why does the question $$Quel\\ âge\\ as-tu\\ ?$$ have $$as-tu$$ with a hyphen, and what construction is this?", "answer": "- Step 1: This is **inversion** — the formal/written way to make a question in French, by flipping subject and verb.\n- Step 2: Normal statement: $$Tu\\ as\\ [number]\\ ans$$. Inverted question: $$As-tu\\ [number]\\ ans\\ ?$$ — verb and pronoun swap, with a hyphen joining them.\n- Step 3: Three ways to ask the same thing in French:\n+ Informal: $$Tu\\ as\\ quel\\ âge\\ ?$$ (intonation only, very casual).\n+ Standard: $$Quel\\ âge\\ tu\\ as\\ ?$$ or with est-ce que.\n+ Formal/written: $$Quel\\ âge\\ as-tu\\ ?$$ (inversion).\n\nTakeaway: Inversion adds a hyphen, sounds formal, and is more common in writing than everyday speech.", "source": "Opus 4.7 ①", "_id": "opus_1_56"}, {"question": "You hear a French speaker say \"On est deux.\" What does this mean, and why not \"nous sommes\"? (1 step)", "answer": "**\"On est deux\"** means \"There are two of us\" / \"We're two (people).\" \n\nThis is extremely common in casual French when talking about group size — at a restaurant, you'd say \"On est quatre\" (We're four) rather than the formal \"Nous sommes quatre.\" \n\nThe verb \"est\" is third-person singular (like il/elle est), which is what \"on\" takes. In practice, \"on est\" has basically replaced \"nous sommes\" in spoken French.", "source": "MiniMax ①", "_id": "minimax_1_52"}, {"question": "How do you respond to \"Do you have a reservation?\" — both yes and no — in French?", "answer": "- Step 1: Affirmative: $$Oui,\\ j'ai\\ une\\ réservation\\ pour\\ deux\\ personnes$$ (Yes, I have a reservation for two people).\n- Step 2: Negative: $$Non,\\ je\\ n'ai\\ pas\\ de\\ réservation$$ (No, I don't have a reservation).\n- Step 3: Notice the negation rule in action: $$une\\ réservation$$ (a reservation) becomes $$de\\ réservation$$ when negated — the article collapses to $$de$$.\n\nMisconception probe: $$Je\\ n'ai\\ pas\\ une\\ réservation$$ is wrong; remember un/une → de in negation.", "source": "Opus 4.7 ①", "_id": "opus_1_38"}, {"question": "How does adjective agreement work with ÊTRE compared to AVOIR? Why must adjectives change after ÊTRE but not after AVOIR? Provide examples.", "answer": "With ÊTRE:  \n- Adjectives must agree in gender and number with the subject  \n+ \"La réunion est urgente\" (feminine singular)  \n+ \"Le problème est urgent\" (masculine singular)  \n+ \"Les réunions sont urgentes\" (feminine plural)  \n\nWith AVOIR:  \n- Adjectives do not change to match the subject  \n+ \"J'ai un chat noir\" (masculine)  \n+ \"J'ai une chatte noire\" (feminine)  \n+ The color \"noir/noire\" changes to match the gender of the noun, not the subject  \n\nThe reason for this difference:  \n- ÊTRE implies identity or essential qualities (\"to be\" something) which makes the adjective part of the subject  \n- AVOIR indicates possession, not identity, so the adjective describes the object, not the subject  \n\nThis distinction reflects how French grammar conceptualizes identity versus possession.", "source": "Qwen 3 ④", "_id": "qwen_4_20"}, {"question": "In French, why is the final consonant of a word usually silent — and what happens when the next word starts with a vowel?", "answer": "- Step 1: Final consonants are usually silent because French phonology favors open syllables ending in vowel sounds. E.g., $$petit$$ → \"puh-TEE\" (no t), $$vous$$ → \"voo\" (no s).\n- Step 2: BUT when the next word begins with a vowel sound, the silent consonant \"wakes up\" and links onto the next word — this is called **liaison**.\n+ Example: $$vous\\ avez$$ → \"voo-zah-vay\" (the s wakes up as a z sound).\n+ Example: $$nous\\ avons$$ → \"noo-zah-vohn\".\n- Step 3: This is why $$des$$ + $$omelettes$$ sounds like \"day-zomelettes\" — fluency depends on hearing these links.\n\nMisconception probe: Liaison isn't optional decoration; missing it sounds robotic and can obscure meaning.", "source": "Opus 4.7 ①", "_id": "opus_1_5"}, {"question": "A waiter says $$Que\\ désirez-vous\\ boire\\ ?$$ — what are they asking, and how would you reply with \"I would like a glass of red wine\"?", "answer": "- Step 1: $$Que\\ désirez-vous\\ boire\\ ?$$ = \"What do you wish to drink?\" — $$désirer$$ (to wish/desire) is more formal than $$vouloir$$.\n- Step 2: Reply: $$Je\\ voudrais\\ un\\ verre\\ de\\ vin\\ rouge$$.\n+ $$un\\ verre\\ de\\ vin$$ = a glass of wine (note: $$de$$ links glass and wine — no article between them).\n+ $$rouge$$ = red (invariable for this color).\n- Step 3: Notice $$vin$$ is masculine, so $$rouge$$ doesn't change form here, but adjectives like $$blanc/blanche$$ would.\n\nTakeaway: Quantity expressions like \"a glass of,\" \"a bottle of,\" \"a cup of\" all use $$de$$ (not du/de la) — $$un\\ verre\\ de\\ vin$$, not $$un\\ verre\\ du\\ vin$$.", "source": "Opus 4.7 ①", "_id": "opus_1_53"}, {"question": "Why confirm a reservation with *\"J'ai une réservation\"* instead of *\"Je suis une réservation\"*? (2 steps)", "answer": "- Step 1: **Avoir** expresses possession – \"I have a reservation\" (*j'ai*)  \n- Step 2: **Être** would mean \"I am a reservation\" (literal translation error)  \n+ Compare: *J'ai un billet* (I have a ticket) vs *Je suis un billet* (nonsensical)  \n+ Mnemonic: Use *avoir* for abstract possessions", "source": "Qwen 3 ③", "_id": "qwen_3_13"}, {"question": "In French, \"How old are you?\" literally translates to \"What age do you have?\" Why does French use AVOIR (to have) here instead of ÊTRE (to be)? (3 steps)", "answer": "- Step 1: In many Romance languages (French, Spanish, Italian, Portuguese), age is expressed with \"to have\" rather than \"to be\" — this is a fundamental structural difference from English.\n- Step 2: French treats age as something you possess (years), not a state of being. So \"I am 24 years old\" becomes \"I have 24 years\" = \"J'ai vingt-quatre ans.\"\n- Step 3: The word \"ans\" (years) never changes — it's always plural, even for \"one year\": \"J'ai un an.\"\n\nThis is a common source of transfer errors for English speakers — you must mentally switch from \"to be\" to \"to have\" when talking about age.", "source": "MiniMax ②", "_id": "minimax_2_1"}, {"question": "If you want a rare steak in French, what's the full phrase you'd say?", "answer": "- Step 1: A steak (specifically rib steak) = $$une\\ entrecôte$$ (feminine).\n- Step 2: Rare = $$saignant$$ — but since $$entrecôte$$ is feminine, the adjective agrees: $$saignante$$.\n- Step 3: Full phrase: $$une\\ entrecôte\\ saignante$$, or in a sentence: $$Je\\ voudrais\\ une\\ entrecôte\\ saignante,\\ s'il\\ vous\\ plaît$$.\n\nTakeaway: Always check noun gender before applying the doneness adjective — $$un\\ steak\\ saignant$$ (masc.) vs $$une\\ entrecôte\\ saignante$$ (fem.).", "source": "Opus 4.7 ①", "_id": "opus_1_47"}, {"question": "What's the fundamental social difference between using $$tu$$ and $$vous$$ in French?", "answer": "- Step 1: $$tu$$ = informal singular \"you\" — for friends, family, peers, children, animals, anyone with whom you have a casual or close relationship.\n- Step 2: $$vous$$ has TWO uses:\n+ Formal singular \"you\" — for strangers, elders, professionals, business contexts (one person, but you show respect).\n+ Plural \"you\" — addressing multiple people, regardless of formality.\n- Step 3: Defaults: with anyone you don't know well, START with $$vous$$. The other person may invite you to switch ($$On\\ peut\\ se\\ tutoyer$$ — \"We can use tu with each other\"). Using $$tu$$ prematurely with a stranger can feel disrespectful or overly familiar.\n\nTakeaway: Tu/vous isn't just grammar — it's a social signal about your relationship.", "source": "Opus 4.7 ①", "_id": "opus_1_39"}, {"question": "Misconception probe: Why is $$Je\\ n'ai\\ pas\\ un\\ caf\\acute{e}$$ wrong, and what should it be?", "answer": "- Step 1: After a negation, the indefinite article $$un$$ (and $$une$$, $$des$$, $$du$$, $$de\\ la$$) collapses to $$de$$ (or $$d'$$ before a vowel). So $$pas\\ un\\ caf\\acute{e}$$ violates this rule.\n- Step 2: Correct: $$Je\\ n'ai\\ pas\\ de\\ caf\\acute{e}$$ — \"I don't have any coffee.\"\n- Step 3: The one exception: with $$\\hat{E}TRE$$, the article does NOT collapse. $$Ce\\ n'est\\ pas\\ un\\ caf\\acute{e}$$ (\"It's not a coffee\") is correct — because $$\\hat{e}tre$$ is identifying, not denying possession/quantity.\n\nQuantity verbs ($$avoir$$, $$il\\ y\\ a$$, $$prendre$$, etc.) → collapse article. Identifying verbs ($$\\hat{e}tre$$) → keep article.", "source": "Opus 4.7 ②", "_id": "opus_2_46"}, {"question": "Practical mini-exercise: A friend asks $$Quel\\ \\hat{a}ge\\ as$$-$$tu\\ ?$$. You want to say \"I'm 21.\" How do you respond, and why is the structure as it is? (3 steps)", "answer": "- Step 1: The answer is $$J'ai\\ vingt$$-$$et$$-$$un\\ ans$$.\n- Step 2: Why this structure?\n+ Age uses $$AVOIR$$, not $$\\hat{E}TRE$$ — so \"I have 21 years,\" $$j'ai$$.\n+ 21 = $$vingt$$-$$et$$-$$un$$ because numbers ending in 1 (between 20-60) take $$et$$.\n+ $$ans$$ = \"years\" — required! Saying just $$j'ai\\ vingt$$-$$et$$-$$un$$ would mean \"I have 21 [of something]\" — incomplete.\n- Step 3: Pronunciation: the final $$-s$$ in $$ans$$ is silent. Liaison: $$un\\ an$$ would link → \"uhn-nahn,\" but $$un\\ ans$$ — the plural here doesn't change the sound, you still hear \"uhn-nahn.\"\n\nThree pieces to remember: $$j'ai$$ + number + $$ans$$.", "source": "Opus 4.7 ②", "_id": "opus_2_41"}, {"question": "Compare the two negations: $$Je\\ ne\\ suis\\ pas\\ vietnamien$$ vs $$Je\\ n'ai\\ pas\\ vingt-quatre\\ ans$$. Why does one have $$ne$$ and the other $$n'$$?", "answer": "- Step 1: The rule: $$ne$$ elides to $$n'$$ when followed by a vowel sound.\n- Step 2: $$Je\\ ne\\ suis\\ pas$$ — $$suis$$ starts with \"s\" (consonant) → $$ne$$ stays intact.\n- Step 3: $$Je\\ n'ai\\ pas$$ — $$ai$$ starts with \"a\" (vowel) → $$ne$$ becomes $$n'$$.\n\nTakeaway: Elision is purely phonetic — French dislikes two vowels colliding (\"ne ai\" sounds awkward), so it crunches them together.", "source": "Opus 4.7 ①", "_id": "opus_1_54"}, {"question": "Count from 1 to 10 in French.", "answer": "- Step 1: 1–5: $$un,\\ deux,\\ trois,\\ quatre,\\ cinq$$.\n- Step 2: 6–10: $$six,\\ sept,\\ huit,\\ neuf,\\ dix$$.\n- Step 3: Pronunciation traps to note:\n+ $$six$$ and $$dix$$ — the final x is \"ss\" alone, silent before a consonant (six livres → \"see leevr\"), \"z\" before a vowel (six ans → \"see-zan\").\n+ $$sept$$ — the p is silent (\"set\").\n+ $$neuf$$ — the f stays (\"nuhf\"), but becomes \"v\" before vowels (neuf ans → \"nuh-VAN\").", "source": "Opus 4.7 ①", "_id": "opus_1_20"}, {"question": "What do \"hier,\" \"aujourd'hui,\" and \"demain\" mean, and what tense would you use with each? (2 steps)", "answer": "- Step 1: hier = yesterday · aujourd'hui = today · demain = tomorrow\n- Step 2: You'd use:\n  - Hier, j'ai mangé... (past tense: \"I ate...\")\n  - Aujourd'hui, je mange... or Je vais manger... (present or near future)\n  - Demain, je vais manger... (near future)\n\nThese time markers are crucial for placing events in time. They're often used with the passé composé (past) or near future (aller + infinitive).", "source": "MiniMax ②", "_id": "minimax_2_30"}, {"question": "Conceptual probe: French uses 24-hour time more often than English. Why might that be culturally/linguistically helpful, especially for restaurant reservations?", "answer": "- Step 1: 24-hour time avoids the AM/PM ambiguity that exists in English.\n- Step 2: For reservations, restaurants only operate in certain hours (lunch ~12-14h, dinner ~19-22h). Saying $$à\\ 19h30$$ is unambiguous — clearly evening.\n- Step 3: French speakers also use 24-hour time for transport schedules, TV listings, formal appointments — anywhere precision matters.\n\nTakeaway: When making a reservation, default to 24-hour ($$dix-neuf\\ heures\\ trente$$ = 19h30 = 7:30 PM). Saying $$à\\ sept\\ heures$$ alone is ambiguous (morning or evening?).", "source": "Opus 4.7 ①", "_id": "opus_1_64"}, {"question": "Why is $$un\\ lit$$ (a bed) masculine, and how does this affect related sentences?", "answer": "- Step 1: $$lit$$ ends in a consonant (-t, silent) and doesn't follow any feminine pattern (-tion, -ette, -ée, etc.) — defaults to masculine.\n- Step 2: Consequences:\n+ Article: $$un\\ lit$$, $$le\\ lit$$.\n+ Adjective agreement: $$un\\ grand\\ lit$$ (a big bed) — masculine adjective form.\n+ Pronoun: $$il$$ — $$Le\\ lit\\ est\\ grand$$ → $$Il\\ est\\ grand$$.\n- Step 3: Pronunciation: $$lit$$ sounds like \"lee\" — the final t is silent. The plural $$lits$$ also sounds like \"lee.\"\n\nTakeaway: When learning a French noun, always learn it WITH its article ($$un\\ lit$$, not just $$lit$$) so gender sticks naturally.", "source": "Opus 4.7 ①", "_id": "opus_1_50"}, {"question": "Contrast *Je voudrais* vs *Je vais prendre* when ordering food (3 steps)", "answer": "- Step 1: **Je voudrais** = \"I would like\" (conditional tense) → polite request  \n- Step 2: **Je vais prendre** = \"I'm going to take\" (near future) → decisive choice  \n- Step 3: Contextual use:  \n+ *Je voudrais...* when considering options  \n+ *Je vais prendre...* when decided  \n+ Compare: *Je prends* (present) = \"I take\" → too direct for orders", "source": "Qwen 3 ③", "_id": "qwen_3_11"}, {"question": "Compare formal and informal greetings in French, explaining when to use *Bonjour*, *Coucou*, and *Salut* (3 steps)", "answer": "- Step 1: **Bonjour** is the standard formal/polite greeting used in all professional/social situations (e.g., greeting a teacher: *\"Bonjour, Madame!\"*)\n- Step 2: **Coucou** is ultra-casual like \"hey\" – used only with close friends/family (e.g., siblings texting: *\"Coucou, comment ça va?\"*)\n- Step 3: **Salut** straddles informal settings – both \"hi\" and \"bye\" (e.g., at a café: *\"Salut! Tu veux un café?\"*). Avoid in formal contexts.\n\n+ Example confusion: Using \"Coucou\" at a job interview would seem disrespectful  \n+ Cultural insight: French prioritize formality until invited to be informal", "source": "Qwen 3 ③", "_id": "qwen_3_0"}, {"question": "Edge case: Why does $$J'habite\\ \\grave{a}\\ Paris$$ use $$\\grave{a}$$ but $$J'habite\\ en\\ France$$ use $$en$$? (2 steps)", "answer": "- Step 1: French uses different prepositions depending on the type of place:\n+ $$\\grave{a}$$ before cities ($$\\grave{a}\\ Paris$$, $$\\grave{a}\\ Londres$$, $$\\grave{a}\\ Hanoi$$)\n+ $$en$$ before feminine countries and most continents ($$en\\ France$$, $$en\\ Italie$$, $$en\\ Europe$$)\n+ $$au$$ before masculine countries ($$au\\ Japon$$, $$au\\ Canada$$, $$au\\ Vietnam$$)\n+ $$aux$$ before plural countries ($$aux\\ \\acute{E}tats$$-$$Unis$$)\n- Step 2: How to remember country gender: most countries ending in $$-e$$ are feminine (France, Italie, Chine). Exceptions exist (le Mexique).\n\nSo for a beginner: $$\\grave{a}$$ for cities, $$en$$ for most countries — that covers most situations.", "source": "Opus 4.7 ②", "_id": "opus_2_54"}, {"question": "What is \"liaison\" in French pronunciation, and why does it exist? (3 steps)", "answer": "- Step 1: Final consonants in French are normally silent — e.g., the $$-s$$ in $$les$$ or the $$-t$$ in $$est$$.\n- Step 2: BUT when the next word starts with a vowel sound, that silent consonant \"links\" and IS pronounced, attaching to the next word.\n+ $$les\\ amis$$ sounds like \"lay-zah-mee\" (the silent $$s$$ becomes a $$z$$ sound)\n+ $$vous\\ avez$$ sounds like \"voo-zah-vay\"\n- Step 3: This exists because French dislikes vowel-vowel collisions between words — liaison smooths the flow.\n\nLiaison = a silent consonant waking up because the next word starts with a vowel.", "source": "Opus 4.7 ②", "_id": "opus_2_5"}, {"question": "Explain why French has both \"un café\" (a coffee) and \"du café\" (some coffee). What's the difference? (2 steps)", "answer": "- Step 1: **\"Un café\"** = a cup of coffee (countable — you can count the cups: un café, deux cafés). This treats coffee as individual servings.\n\n- Step 2: **\"Du café\"** = some coffee (uncountable/mass — the substance itself). This is used when talking about coffee as a substance: \"Je bois du café\" (I drink coffee) — you're talking about the liquid, not a specific cup.\n\n+ Think of it this way: \"un café\" = \"a coffee\" (the item), \"du café\" = \"some coffee\" (the stuff). Similar to English: \"I ate an apple\" (the fruit) vs \"I ate some apple\" (the substance, like in a pie).", "source": "MiniMax ①", "_id": "minimax_1_54"}, {"question": "How do you say \"I'm sorry\" (masculine) and \"I'm late\" in French? (1 step)", "answer": "**Je suis désolé !** (I'm sorry) — \"désolé\" is masculine. If a woman were apologizing, she'd say **\"Je suis désolée !\"** (with -e). \n\n**\"I'm late\"** = **Je suis en retard.** Note: \"retard\" (delay) doesn't change because it follows \"en\" — prepositions often \"block\" adjective agreement in French.", "source": "MiniMax ①", "_id": "minimax_1_22"}, {"question": "What does $$Je\\ reviens\\ tout\\ de\\ suite$$ mean, and what's the literal breakdown?", "answer": "- Step 1: It means \"I'll be right back\" — a phrase a waiter uses when stepping away briefly.\n- Step 2: Breakdown:\n+ $$Je\\ reviens$$ = \"I come back\" (from $$revenir$$ = to return)\n+ $$tout\\ de\\ suite$$ = \"right away / immediately\" (literally \"all of immediately\")\n- Step 3: French uses the simple present tense to express near-future actions, where English uses \"will\" — so $$je\\ reviens$$ literally means \"I return\" but functionally \"I will return.\"\n\nNote: present tense for the near future is very common in French — $$Je\\ pars\\ demain$$ = \"I'm leaving tomorrow.\"", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "What's the conceptual difference between $$le\\ café$$, $$un\\ café$$, and $$du\\ café$$ — all involving the noun \"coffee\"?", "answer": "- Step 1: $$le\\ café$$ = \"the coffee\" (definite) — refers to a specific coffee already known, OR coffee as an abstract category ($$J'aime\\ le\\ café$$ = I like coffee [in general]).\n- Step 2: $$un\\ café$$ = \"a coffee\" (indefinite, countable) — one specific serving/unit ($$Je\\ voudrais\\ un\\ café$$).\n- Step 3: $$du\\ café$$ = \"some coffee\" (partitive) — an unspecified portion of the substance ($$Je\\ veux\\ du\\ café$$ = I want some coffee).\n\nTakeaway: Three articles, three different relationships with the noun:\n+ Definite → known/general\n+ Indefinite → one unit\n+ Partitive → portion of a mass", "source": "Opus 4.7 ①", "_id": "opus_1_62"}, {"question": "How do you build numbers 17, 18, 19 in French, and what's the pattern?", "answer": "- Step 1: French numbers 11–16 are single irregular words ($$onze, douze, treize, quatorze, quinze, seize$$).\n- Step 2: But 17, 18, 19 switch to a transparent \"10 + n\" pattern:\n+ 17 = $$dix$$-$$sept$$ (10+7)\n+ 18 = $$dix$$-$$huit$$ (10+8)\n+ 19 = $$dix$$-$$neuf$$ (10+9)\n- Step 3: So the cutoff for irregular teen words is 16. From 17 onward, French composes them additively until 20 ($$vingt$$).\n\nThis mirrors the irregular/regular split in many languages (English: eleven, twelve, then -teen forms).", "source": "Opus 4.7 ②", "_id": "opus_2_18"}, {"question": "A beginner French student says \"*C'est une belle jour.*\" Identify the error and correct it. (1 step)", "answer": "The error is in the adjective \"belle.\" After **\"c'est\"** (it is / this is), the adjective should be **masculine**, not feminine. Even though \"jour\" (day) might seem feminine (ends in -eur), it's actually masculine: **\"C'est un beau jour.\"**\n\nThe correct phrase is: **\"C'est un beau jour.\"** \n- \"beau\" is the masculine form (becomes \"bel\" before a vowel: \"un bel arbre\")\n- \"belle\" would be used after \"elle est\" (she is): \"Elle est belle\" (She is beautiful)", "source": "MiniMax ①", "_id": "minimax_1_50"}, {"question": "Practical mini-exercise: At a café for two, how do you order \"We'd like two coffees and a croissant, please\"?", "answer": "- Step 1: Use the casual $$on$$-form: $$on\\ aimerait$$ (\"we'd like\").\n- Step 2: Quantity + items: $$deux\\ caf\\acute{e}s\\ et\\ un\\ croissant$$. ($$deux$$ = 2; both nouns get the right article — $$un$$ singular, no article needed before $$deux$$ since the number replaces it.)\n- Step 3: Politeness tag: $$s'il\\ vous\\ pla\\hat{i}t$$ (formal — appropriate with a waiter).\n\nFull: $$On\\ aimerait\\ deux\\ caf\\acute{e}s\\ et\\ un\\ croissant,\\ s'il\\ vous\\ pla\\hat{i}t$$.\n\nAlternative starters: $$Je\\ voudrais...$$ (just yourself), $$On\\ va\\ prendre...$$, $$On\\ pourrait\\ avoir...$$", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "When saying \"I live in [country],\" when do you use $$en$$, $$au$$, or $$aux$$?", "answer": "- Step 1: $$en$$ = before a feminine country or one starting with a vowel.\n+ $$en\\ France,\\ en\\ Italie,\\ en\\ Espagne,\\ en\\ Iran$$.\n- Step 2: $$au$$ = before a masculine country starting with a consonant.\n+ $$au\\ Canada,\\ au\\ Japon,\\ au\\ Portugal,\\ au\\ Vietnam$$.\n- Step 3: $$aux$$ = before a plural country name.\n+ $$aux\\ États-Unis,\\ aux\\ Pays-Bas$$.\n\nTakeaway: Most countries ending in -e are feminine (France, Italie, Belgique); others are masculine. Mexique is a famous exception (masculine despite -e).", "source": "Opus 4.7 ①", "_id": "opus_1_52"}, {"question": "Why do French nouns ending in -tion (like $$l'addition$$, $$la\\ réservation$$) follow a reliable gender rule, and what is it?", "answer": "- Step 1: All nouns ending in $$-tion$$ are **feminine** — no exceptions in common vocabulary.\n- Step 2: Examples: $$la\\ nation,\\ la\\ situation,\\ l'action,\\ l'addition,\\ la\\ réservation,\\ la\\ question$$.\n- Step 3: Why reliable? The -tion suffix comes from Latin -tio/-tionis, which was always feminine. French preserved this faithfully.\n\nTakeaway: -tion, -sion, -té, -ette, -ence, -ance → almost always feminine. -age, -ment, -eau → usually masculine. These suffix rules are gold for guessing gender.", "source": "Opus 4.7 ①", "_id": "opus_1_63"}, {"question": "What's the difference between $$on$$ and $$nous$$, and which verb form does $$on$$ take? (3 steps)", "answer": "- Step 1: Both can mean \"we.\" $$Nous$$ is the formal/written form; $$on$$ is the informal everyday spoken form. In actual conversation, French people use $$on$$ far more than $$nous$$.\n- Step 2: Crucially, $$on$$ takes the SAME verb form as $$il/elle$$ (3rd person singular), even though it means \"we.\"\n+ $$nous\\ avons$$ → $$on\\ a$$\n+ $$nous\\ sommes$$ → $$on\\ est$$\n+ $$nous\\ allons$$ → $$on\\ va$$\n- Step 3: $$on$$ can also mean \"one\" / \"people in general\" (like English \"one says...\"). Context disambiguates.\n\nIn a café with a friend: \"We'll have two coffees\" is more naturally $$On\\ va\\ prendre\\ deux\\ caf\\acute{e}s$$ than the stiff $$Nous$$ version.", "source": "Opus 4.7 ②", "_id": "opus_2_17"}, {"question": "Translate and unpack: $$Souhaiteriez-vous\\ une\\ bouteille\\ d'eau\\ gazeuse\\ ou\\ d'eau\\ plate\\ ?$$", "answer": "- Step 1: Overall meaning: \"Would you like a bottle of sparkling water or still water?\"\n- Step 2: Breakdown:\n+ $$Souhaiteriez-vous$$ = \"Would you like\" — conditional of $$souhaiter$$ (to wish). Very polite, more elegant than $$voulez-vous$$.\n+ $$une\\ bouteille\\ d'eau$$ = \"a bottle of water\" — $$de$$ + $$eau$$ contracts to $$d'eau$$.\n+ $$gazeuse$$ = sparkling (literally \"gassy\"); $$plate$$ = still / flat.\n- Step 3: Note: water is $$l'eau$$ (feminine), so the adjectives agree as feminine: $$gazeuse$$ (not gazeux), $$plate$$ (not plat).\n\nTakeaway: French waiters almost always offer this choice — sparkling vs. still is a default question.", "source": "Opus 4.7 ①", "_id": "opus_1_33"}, {"question": "Why is the default article \"un\" used for singular animal names when the gender is unknown? How does this compare to English?", "answer": "In French, when the gender of an animal is unknown or unspecified, the masculine article \"un\" is used by default:  \n\nFor example:  \n- \"C'est un chat\" = \"It's a cat\" (gender unknown)  \n- \"J'ai un chien\" = \"I have a dog\" (gender unstated)  \n\nThis differs from English, where there's no default gender for non-specific animals:  \n- \"It's a cat\" doesn't use a specific gender form  \n- The article \"a\" remains the same regardless of animal gender  \n\nThe French convention reflects a general tendency in Romance languages to use the masculine form as the default or neutral case when gender is unspecified, a feature that doesn't exist in English.", "source": "Qwen 3 ④", "_id": "qwen_4_11"}, {"question": "Practice: How would you say \"There are two croissants but no tart\" in French?", "answer": "- Step 1: \"There are two croissants\" → $$Il\\ y\\ a\\ deux\\ croissants$$. ($$il\\ y\\ a$$ doesn't change for plural.)\n- Step 2: \"No tart\" → need to negate $$il\\ y\\ a$$ and remember the article collapses: $$il\\ n'y\\ a\\ pas\\ de\\ tarte$$.\n- Step 3: Combine with $$mais$$ (but): $$Il\\ y\\ a\\ deux\\ croissants,\\ mais\\ il\\ n'y\\ a\\ pas\\ de\\ tarte$$.\n\nTakeaway: Two key rules in one sentence — $$il\\ y\\ a$$ is invariable, and the article disappears in negation.", "source": "Opus 4.7 ①", "_id": "opus_1_60"}, {"question": "Why does the article $$de$$ become $$d'$$ in $$pas\\ d'omelette$$ but stays $$de$$ in $$pas\\ de\\ croissants$$? (2 steps)", "answer": "- Step 1: French avoids vowel-vowel collisions across word boundaries. $$omelette$$ starts with a vowel sound, so $$de\\ omelette$$ would be ugly — French contracts $$de$$ → $$d'$$ to merge: $$d'omelette$$.\n- Step 2: $$croissants$$ starts with a consonant ($$c$$), so no contraction needed — $$de\\ croissants$$ flows fine.\n\nSame principle as $$je$$ → $$j'$$, $$le$$ → $$l'$$, $$ne$$ → $$n'$$. French is consistent about eliding small words before vowels.", "source": "Opus 4.7 ②", "_id": "opus_2_52"}, {"question": "Walk through a complete restaurant reservation dialogue in French. What information is exchanged? (3 steps)", "answer": "- Step 1: **Server:** \"C'est pour une réservation ?\" (Is it for a reservation?)\n  **You:** \"Oui, pour ce soir.\" (Yes, for tonight.)\n\n- Step 2: **Server:** \"À quelle heure ?\" (At what time?)\n  **You:** \"À 19h30, s'il vous plaît.\" (At 7:30pm, please.)\n\n- Step 3: **Server:** \"Pour combien de personnes ?\" (For how many people?)\n  **You:** \"Pour 2 personnes, s'il vous plaît.\" (For 2 people, please.)\n  **Server:** \"Votre numéro de téléphone pour confirmer la réservation ?\" (Your phone number to confirm?)\n\n+ End: **Server:** \"C'est noté, Monsieur. À ce soir !\" / **You:** \"Merci beaucoup, au revoir !\"", "source": "MiniMax ①", "_id": "minimax_1_41"}, {"question": "When a French waiter asks $$Quelle\\ cuisson\\ pour\\ la\\ viande\\ ?$$, what are they asking, and what are the four standard responses?", "answer": "- Step 1: They're asking \"What cooking [doneness] for the meat?\" — $$cuisson$$ means the degree of cooking.\n- Step 2: The four responses, from least to most cooked:\n+ $$bleu$$ = blue / very rare (barely seared)\n+ $$saignant$$ = bloody / rare\n+ $$à\\ point$$ = \"to the point\" / medium\n+ $$bien\\ cuit$$ = well-cooked / well done\n- Step 3: Note that French steak culture skews rarer than American — $$à\\ point$$ in France is closer to medium-rare elsewhere.\n\nTakeaway: $$saignant$$ literally means \"bleeding\" — French doesn't soften the description.", "source": "Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "What's the difference between indefinite articles ($$un/une/des$$) and partitive articles ($$du/de\\ la/des$$)? (3 steps)", "answer": "- Step 1: Indefinite ($$un$$, $$une$$, $$des$$) = \"a / an / some\" for COUNTABLE things you can have one of.\n+ $$un\\ croissant$$ = a croissant\n+ $$une\\ omelette$$ = an omelette\n- Step 2: Partitive ($$du$$, $$de\\ la$$, $$des$$) = \"some\" for UNCOUNTABLE things or unspecified quantities — things you take a portion of.\n+ $$du\\ caf\\acute{e}$$ = some coffee (a portion of liquid)\n+ $$de\\ la\\ cr\\grave{e}me$$ = some cream\n+ $$du\\ saumon$$ = some salmon\n- Step 3: The key intuition: do you count it in units (use indefinite) or scoop/pour it (use partitive)? English often hides this distinction, but French forces you to choose.\n\nCountable = $$un/une$$; bulk/portion = $$du/de\\ la$$.", "source": "Opus 4.7 ②", "_id": "opus_2_10"}, {"question": "If a French friend asks \"Tu as un stylo?\" and you don't have one, how would you respond negatively? (1 step)", "answer": "**\"Non, je n'ai pas de stylo.\"**\n\nThis demonstrates three things:\n1. Negation structure: ne + verb + pas\n2. Élision before vowel: \"n'ai\" (not \"ne ai\")\n3. Article change in negation: \"un stylo\" → \"pas de stylo\" (the un becomes \"de\")\n\nA fuller response might be: **\"Désolé, je n'ai pas de stylo. Tu peux acheter un stylo ?\"** (Sorry, I don't have a pen. Can you buy a pen?)", "source": "MiniMax ①", "_id": "minimax_1_53"}, {"question": "Why does *on* use third person conjugation but mean \"we\"? (3 steps)", "answer": "- Step 1: *On* originated as indefinite pronoun (like English \"one\") → \"One eats...\"  \n- Step 2: Evolved into informal \"we\" in spoken French:  \n+ *On va au café* = *Nous allons au café*  \n+ Uses *il/elle* verb forms (*va* instead of *allons*)  \n- Step 3: Context-dependent meanings:  \n+ General statements: *On dit que...* (They say...)  \n+ Inclusive \"we\": *On partage ?*  \n+ Formal writing still uses *nous*", "source": "Qwen 3 ③", "_id": "qwen_3_7"}, {"question": "A student writes \"J'aime le poisson.\" Another says \"Je n'aime pas le poisson.\" What is the difference in meaning? (1 step)", "answer": "**\"J'aime le poisson\"** = I like fish (in general, fish as a category)\n\n**\"Je n'aime pas le poisson\"** = I don't like fish (in general, fish as a category)\n\nNotice: In both cases, \"le poisson\" uses the definite article \"le,\" not \"un poisson.\" When expressing general likes/dislikes about a category of food, French uses the definite article, not the indefinite. Compare:\n\n- \"J'aime les pommes\" = I like apples (apples in general)\n- \"Je mange une pomme\" = I'm eating an apple (a specific apple)", "source": "MiniMax ①", "_id": "minimax_1_55"}, {"question": "Why is the number 14 ($$quatorze$$) a pronunciation trap, and what about 60 and 70?", "answer": "- Step 1: $$quatorze$$ is pronounced \"ka-TORZ\" — the $$-ze$$ is voiced, not silent like many other final-letter cases. Beginners often mispronounce it as \"kator.\"\n- Step 2: $$soixante$$ (60) sounds like \"swa-SONT\" — the $$oi$$ makes a \"wa\" sound, not \"oy.\"\n- Step 3: $$soixante$$-$$dix$$ (70) ends in \"diss\" — the final $$x$$ in $$dix$$ IS pronounced here as $$s$$, unlike in $$dix\\ croissants$$ where it would be silent.\n\nThese are exceptions to the \"final consonant is silent\" rule — you just have to memorize the sounds.", "source": "Opus 4.7 ②", "_id": "opus_2_6"}, {"question": "Contrast *\"Quelle heure?\"* vs *\"À quelle heure?\"* (2 steps)", "answer": "- Step 1: **Quelle heure** = \"What time?\" (noun question)  \n- Step 2: **À quelle heure** = \"At what time?\" (preposition + noun)  \n+ *À* required with time expressions  \n+ Compare: *À quelle date?* (At what date?)", "source": "Qwen 3 ③", "_id": "qwen_3_21"}, {"question": "Practical mini-exercise: You want to say \"There aren't any croissants\" in French. How do you build it from \"There are some croissants\"? (3 steps)", "answer": "- Step 1: Start with the affirmative: $$Il\\ y\\ a\\ des\\ croissants$$ (\"There are some croissants\").\n- Step 2: Apply negation: wrap the verb $$a$$ with $$ne...pas$$. Since $$a$$ starts with a vowel, $$ne$$ → $$n'$$. So: $$Il\\ n'y\\ a\\ pas\\ ...\\ croissants$$.\n- Step 3: Apply the article rule: $$des$$ in the negative collapses to $$de$$. Final: $$Il\\ n'y\\ a\\ pas\\ de\\ croissants$$.\n\nTwo rule applications stacked: negation wrap + article collapse.", "source": "Opus 4.7 ②", "_id": "opus_2_42"}, {"question": "Synthesis: A waiter says $$Avez$$-$$vous\\ choisi\\ ?$$. You want to order a medium steak and a sparkling water for two people. Compose the answer. (3 steps)", "answer": "- Step 1: Confirm yes and use the $$on$$-form since ordering for two: $$Oui,\\ on\\ va\\ prendre...$$\n- Step 2: The steak: $$une\\ entrec\\hat{o}te\\ \\grave{a}\\ point$$ ($$entrec\\hat{o}te$$ is feminine; $$\\grave{a}\\ point$$ = medium). For two people, $$deux\\ entrec\\hat{o}tes\\ \\grave{a}\\ point$$.\n- Step 3: Add the drink and politeness: $$et\\ une\\ bouteille\\ d'eau\\ gazeuse,\\ s'il\\ vous\\ pla\\hat{i}t$$.\n\nFull: $$Oui,\\ on\\ va\\ prendre\\ deux\\ entrec\\hat{o}tes\\ \\grave{a}\\ point\\ et\\ une\\ bouteille\\ d'eau\\ gazeuse,\\ s'il\\ vous\\ pla\\hat{i}t$$.\n\nNotice the integration: $$on$$-form + $$prendre$$ + numbered noun + adjective for doneness + connector $$et$$ + drink + politeness.", "source": "Opus 4.7 ②", "_id": "opus_2_49"}, {"question": "Misconception probe: A beginner says $$Je\\ suis\\ 24$$ to mean \"I'm 24.\" Why is this wrong, and what's the fix?", "answer": "- Step 1: The English mental model \"I AM 24\" tempts you to use $$\\hat{E}TRE$$ ($$je\\ suis$$). But in French, age uses $$AVOIR$$.\n- Step 2: Correct: $$J'ai\\ 24\\ ans$$ — literally \"I have 24 years.\" Without $$ans$$ (\"years\"), it sounds incomplete or absurd (\"I have 24 [what?]\").\n- Step 3: The same logic applies to several states French treats as possessions:\n+ $$J'ai\\ faim$$ = \"I'm hungry\" (I have hunger)\n+ $$J'ai\\ soif$$ = \"I'm thirsty\" (I have thirst)\n+ $$J'ai\\ froid$$ = \"I'm cold\" (I have cold)\n+ $$J'ai\\ peur$$ = \"I'm afraid\" (I have fear)\n\nSwitch your mental model: French \"has\" sensations; English \"is\" them.", "source": "Opus 4.7 ②", "_id": "opus_2_45"}, {"question": "When ordering food, why use \"Je vais prendre\" instead of \"Je veux\"? (1 step)", "answer": "Using \"Je vais prendre\" (I'm going to have) is more polite and indirect in service contexts. \"Je veux\" (I want) sounds abrupt and direct, especially in formal settings.", "source": "Qwen 3 ①", "_id": "qwen_1_3"}, {"question": "Édge case: When you negate $$Il\\ y\\ a\\ une\\ tarte$$, what happens — and why is the result a small surprise?", "answer": "- Step 1: Apply negation: $$Il\\ n'y\\ a\\ pas\\ une\\ tarte$$? No — apply the article-collapse rule.\n- Step 2: Correct: $$Il\\ n'y\\ a\\ pas\\ de\\ tarte$$.\n- Step 3: The small surprise: English speakers expect \"There isn't A tart\" (keeping \"a\"), but French replaces $$une$$ with $$de$$ in the negative. The meaning shifts subtly: not \"there isn't ONE tart\" but \"there isn't ANY tart.\"\n\nThis is the same rule as Q12 — negation flattens articles. The surprise is that this rule even applies to clearly countable singulars.", "source": "Opus 4.7 ②", "_id": "opus_2_48"}, {"question": "Why is the French word for \"21\" $$vingt$$-$$et$$-$$un$$ but \"22\" is just $$vingt$$-$$deux$$ (no $$et$$)? (3 steps)", "answer": "- Step 1: For numbers ending in 1 (21, 31, 41, 51, 61), French inserts $$et$$ (\"and\") between the tens and the one: $$vingt$$-$$et$$-$$un$$, $$trente$$-$$et$$-$$un$$.\n- Step 2: For numbers 22–29, 32–39, etc., no $$et$$ — just hyphenate: $$vingt$$-$$deux$$, $$trente$$-$$trois$$.\n- Step 3: One exception worth knowing: 71 = $$soixante$$-$$et$$-$$onze$$ (because it's really \"60 and 11\"), but 81 = $$quatre$$-$$vingt$$-$$un$$ (NO $$et$$, because 80 has a different logic — see next card).\n\nRule of thumb: $$et$$ appears with -1 only, and only in the \"normal\" tens (20-60), plus 71.", "source": "Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "What's a quick way to test if you've correctly applied indefinite vs partitive vs negation rules? Walk through ordering \"I'd like a coffee, but no sugar.\"", "answer": "- Step 1: \"A coffee\" — countable serving → $$un\\ café$$. So: $$Je\\ voudrais\\ un\\ café$$.\n- Step 2: \"No sugar\" — sugar is a substance, normally needing partitive $$du\\ sucre$$. But it's NEGATED, so the partitive collapses to $$pas\\ de$$.\n- Step 3: Combine: $$Je\\ voudrais\\ un\\ café,\\ mais\\ pas\\ de\\ sucre$$ (or more naturally: $$Je\\ voudrais\\ un\\ café\\ sans\\ sucre$$ — \"without sugar\").\n\nTakeaway: Indefinite and partitive both collapse to $$de$$ in negation — this is one of the most testable French rules.", "source": "Opus 4.7 ①", "_id": "opus_1_55"}, {"question": "How do you make a French verb negative, and what happens before a vowel?", "answer": "- Step 1: French negation **wraps** the conjugated verb with two pieces: $$ne$$ + verb + $$pas$$.\n+ $$Je\\ suis$$ → $$Je\\ ne\\ suis\\ pas$$ (I am not).\n+ $$Tu\\ as$$ → $$Tu\\ n'as\\ pas$$ (you don't have).\n- Step 2: When the verb starts with a vowel sound (or silent h), $$ne$$ elides to $$n'$$: $$n'ai$$, $$n'est$$, $$n'ont$$, $$n'avons$$.\n- Step 3: This is the standard \"two-part negation\" — unlike English's single \"not,\" French historically used both an old negative ($$ne$$) and a reinforcer ($$pas$$ = \"step\"), and both stuck.\n\nTakeaway: In casual spoken French, the $$ne$$ is often dropped (\"$$je\\ sais\\ pas$$\"), but in writing and proper speech, always include both.", "source": "Opus 4.7 ①", "_id": "opus_1_13"}, {"question": "In French, how does an adjective change when describing $$deux\\ petits\\ verres$$ vs $$une\\ salade\\ verte$$? Explain the agreement rule. (3 steps)", "answer": "- Step 1: Adjectives in French agree with their noun in BOTH gender and number — so they have up to 4 forms (masc sing, fem sing, masc pl, fem pl).\n- Step 2: Examples:\n+ $$deux\\ petits\\ verres$$ — $$verres$$ is masculine plural, so $$petit$$ → $$petits$$ (add $$-s$$).\n+ $$une\\ salade\\ verte$$ — $$salade$$ is feminine singular, so $$vert$$ → $$verte$$ (add $$-e$$).\n+ $$des\\ l\\acute{e}gumes\\ cuits$$ — $$l\\acute{e}gumes$$ is masculine plural, $$cuit$$ → $$cuits$$.\n+ $$une\\ orange\\ press\\acute{e}e$$ — $$orange$$ is feminine singular, $$press\\acute{e}$$ → $$press\\acute{e}e$$.\n- Step 3: General pattern: feminine adds $$-e$$, plural adds $$-s$$, fem plural adds $$-es$$. Most $$-s$$ endings are silent, but the $$-e$$ makes a previously silent final consonant audible ($$vert$$ \"vehr\" → $$verte$$ \"vehrt\").\n\nAgreement is mostly invisible in speech (the $$-s$$), but pronounceable when the consonant wakes up via $$-e$$.", "source": "Opus 4.7 ②", "_id": "opus_2_34"}, {"question": "Why does \"I’m Vietnamese\" use **Je suis** (être) instead of **J’ai** (avoir)? Explain the logic of \"state of being\" vs \"possession.\" (3 steps)", "answer": "- Step 1: **Être** (to be) describes identity or origin, e.g., nationality.  \n- Step 2: **Avoir** (to have) describes possession or age.  \n- Step 3: **Je suis vietnamien(ne)** = \"I am Vietnamese\" (state of being); **J’ai 24 ans** = \"I have 24 years\" (possession metaphor).  \n+ Misconception check: Why not **J’ai vietnamien**? \"To have\" implies ownership, which doesn’t apply to identity.", "source": "Qwen 3 ②", "_id": "qwen_2_2"}, {"question": "Contrast *\"Je suis en retard\"* vs *\"J'ai du retard\"* (2 steps)", "answer": "- Step 1: **Je suis en retard** = \"I'm late\" (être + state)  \n- Step 2: **J'ai du retard** = \"I have delay\" (avoir + concrete quantity)  \n+ *Avoir* implies measurable delay amount  \n+ Compare: *Être en vacances* vs *Avoir des vacances*", "source": "Qwen 3 ③", "_id": "qwen_3_29"}], "models": {"qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Why do we say \"C'est beau\" instead of \"C'est belle\" even when describing a feminine noun? (2 steps)", "answer": "- Step 1: After \"c'est\", the adjective always agrees with the subject \"ce\" (neuter demonstrative), which defaults to masculine singular: \"beau\".  \n- Step 2: This is a special rule for demonstrative phrases. Example: \"C'est une belle maison\" (It's a beautiful house) vs. \"C'est beau!\" (That's beautiful!) when referring to a feminine object.  \n+ Exception: If the noun is explicitly stated, the adjective agrees: \"Cette maison est belle\".", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "How does liaison affect final consonants in French pronunciation? (2 steps)", "answer": "- Step 1: Final consonants are silent when a word ends a sentence or before a consonant: \"chat\" [ʃa], \"chats\" [ʃa].  \n- Step 2: The consonant is pronounced when linking to a vowel sound: \"les amis\" [le.z‿a.mi] vs. \"les chats\" [le ʃa].  \n+ Example: \"un ami\" [œ̃.na.mi] vs. \"une amie\" [y.n‿a.mi].", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "Why does \"vingt-et-un\" (21) include \"et\" but \"vingt-deux\" (22) does not? (2 steps)", "answer": "- Step 1: \"Et\" (and) is used only between the base ten and unit 1: \"vingt-et-un\", \"trente-et-un\".  \n- Step 2: From 2 onward, hyphens connect the numbers: \"vingt-deux\", \"trente-trois\".  \n+ Exception: \"soixante-et-onze\" (71) follows the same rule.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "When ordering food, why use \"Je vais prendre\" instead of \"Je veux\"? (1 step)", "answer": "Using \"Je vais prendre\" (I'm going to have) is more polite and indirect in service contexts. \"Je veux\" (I want) sounds abrupt and direct, especially in formal settings.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": true}, {"question": "Compare \"on\" and \"nous\" in spoken vs. written French. (2 steps)", "answer": "- Step 1: \"On\" is informal, replaces \"nous\" in spoken French, and uses third-person singular conjugation: \"On va\" vs. \"Nous allons\".  \n- Step 2: \"Nous\" is formal/reserved for writing, uses first-person plural: \"Nous mangeons\".  \n+ Example: \"On aimerait une table\" (We'd like a table) vs. \"Nous voulons une table\" (We want a table).", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Why does \"quatre-vingts\" (80) use 4×20 instead of 8×10? (1 step)", "answer": "This reflects historical Celtic influence on French numbering. The vigesimal (base-20) system persists in 80 (4×20) and 90 (4×20 + 10). Compare with 60 (soixante, 6×10).", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "How does adjective agreement differ between \"une salade verte\" and \"des légumes cuits\"? (3 steps)", "answer": "- Step 1: Feminine singular: \"verte\" matches \"salade\" (feminine singular noun).  \n- Step 2: Masculine plural: \"cuits\" matches \"légumes\" (masculine plural noun).  \n- Step 3: Adjective endings change: -e for feminine, -s for plural. Example: \"un verre petit\" → \"des verres petits\" (masculine plural).", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Why does \"il y a\" become \"il n'y a pas de\" in negation? (2 steps)", "answer": "- Step 1: \"Il y a\" (there is/are) requires \"de\" in negation to indicate absence: \"pas de café\".  \n- Step 2: This applies to both countable and uncountable nouns vs. \"pas des\" (some) → \"pas de\".  \n+ Example: \"Il y a des croissants\" → \"Il n'y a pas de croissants\".", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "Translate \"What is this?\" to French. Why does it use \"c'\" instead of \"ce\"? (2 steps)", "answer": "- Step 1: \"Qu'est-ce que c'est ?\" (Literally: \"What is it that it is?\")  \n- Step 2: \"c'\" is a contraction of \"ce\" before vowels for pronunciation: \"ce est\" → \"c'est\".  \n+ Similar contractions: \"s'il vous plaît\", \"j'aime\".", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "Explain the use of \"avoir\" in \"J'ai 24 ans\". (2 steps)", "answer": "- Step 1: \"Avoir\" (to have) is used to express age in French, unlike English \"I am 24 years old\".  \n- Step 2: Literally: \"I have 24 years\" → \"J'ai 24 ans\". Irregular plural: \"ans\" for age, \"an\" (singular).", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}], "count": 10}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "What is the French equivalent of \"My name is Phuc\"? Include the verb and pronoun. (3 steps)", "answer": "- Step 1: Start with the phrase \"Je m'appelle\" (I call myself), where \"me\" is the reflexive pronoun.  \n- Step 2: Add the name \"Phuc\" directly after. The structure is **Je m'appelle + [name]**.  \n- Step 3: Combine: **Je m'appelle Phuc.**  \n+ Example: Je m'appelle Marie = My name is Marie.  \n+ Note: \"m'\" is a contraction of \"me\" before a vowel sound.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "How do you ask \"What’s your name?\" to a friend in French? Explain the informal pronoun and verb form. (3 steps)", "answer": "- Step 1: Use the informal pronoun **tu** (you) for friends, family, or peers.  \n- Step 2: The verb \"s'appeler\" (to be called) is conjugated as **t'appelles**.  \n- Step 3: Combine: **Comment tu t'appelles ?** (Literally: \"How are you called?\").  \n+ Structure: **Comment + tu + te + verb** + ?  \n+ Formal alternative with **vous**: **Comment vous appe
