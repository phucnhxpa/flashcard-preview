asymptote lifts with it.\n\nThis is the core insight for the intersection questions with tan.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_37", "judge_pick": false}, {"question": "For the function y = 1 + sin ╬Ė, what is the range and where does it touch the x-axis? (2 steps)", "answer": "- Step 1: The range is 0 Ōēż y Ōēż 2 (shifted up by 1 from the original ŌłÆ1 to 1).\n- Step 2: It touches the x-axis at ╬Ė = 270┬░ (the minimum of sine), because 1 + (ŌłÆ1) = 0.\n\nThis is an example of a vertical shift affecting both the range and the x-intercepts.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_38", "judge_pick": false}, {"question": "What is the key step when solving tan ╬Ė = 1 + sin ╬Ė over a large interval like 0┬░ Ōēż ╬Ė Ōēż 2160┬░? (2 steps)", "answer": "- Step 1: Recognize that 2160┬░ = 6 ├Ś 360┬░, i.e., 6 complete periods of the longer period (360┬░).\n- Step 2: Count intersections in ONE 360┬░ period, then multiply by 6.\n\nThis \"find pattern, then scale\" approach is essential for extrapolation problems.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_39", "judge_pick": false}, {"question": "What does it mean that sin x and tan x are odd functions, while cos x is even? (1 step)", "answer": "- Odd: sin(ŌłÆx) = ŌłÆsin x and tan(ŌłÆx) = ŌłÆtan x ŌĆö symmetric about the origin (rotational symmetry).\n- Even: cos(ŌłÆx) = cos x ŌĆö symmetric about the y-axis (mirror symmetry).\n\nThis tells you how the graphs behave when reflected across the axes.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_40", "judge_pick": false}, {"question": "When counting solutions to tan x = 1/x + 1 in a negative interval like ŌłÆ10ŽĆ Ōēż x Ōēż 0, what special case must you watch for? (1 step)", "answer": "The branch crossing x = 0 (the pole) behaves differently: on one side the curve 1/x + 1 goes to +Ōł×, on the other it goes to ŌłÆŌł×.\n\nThis creates an \"odd one out\" crossing below the x-axis that students often miss (the 12 vs. 14 trap).", "source": "MiniMax ŌæĪ", "_id": "minimax_2_41", "judge_pick": false}, {"question": "For y = cos 2x┬░ on the interval 0 Ōēż x Ōēż 225┬░, how many monotonic pieces does the curve have, and why does this matter for solving cos 2x┬░ = p? (2 steps)", "answer": "- Step 1: The curve has three monotonic pieces: (0ŌåÆ90┬░), (90┬░ŌåÆ180┬░), (180┬░ŌåÆ225┬░).\n- Step 2: Each monotonic piece can be cut at most once by a horizontal line y = p, so to get exactly two solutions you need p to cut exactly two of the three pieces.\n\nThis is the reasoning behind the A* trap answer.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_42", "judge_pick": false}, {"question": "What is the relationship between the zeros of tan x and the zeros of sin x? (1 step)", "answer": "They are identical: both occur at x = nŽĆ (0┬░, 180┬░, 360┬░, ...).\n\nThis is because tan x = sin x / cos x, and tan = 0 precisely when sin = 0 (provided cos ŌēĀ 0, which it isn't at these points).", "source": "MiniMax ŌæĪ", "_id": "minimax_2_43", "judge_pick": false}, {"question": "What is the visual difference between f(x) + a and f(x + a) transformations? (1 step)", "answer": "- f(x) + a: translate UP by a (all y-values increase by a; horizontal asymptotes move up).\n- f(x + a): translate LEFT by a (all x-values decrease by a; the graph shifts in the opposite direction of the sign).\n\nThis distinction is crucial for interpreting transformations correctly.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_44", "judge_pick": false}, {"question": "In the exam question \"State the number of solutions, giving a reason,\" what three elements must your reason contain? (1 step)", "answer": "Your reason must contain:\n1. The number of solutions (N)\n2. The name of both curves being intersected\n3. The interval given\n\nFor example: \"There are 4 solutions because the graph of y = 1/x + 1 intersects the graph of y = tan x 4 times in the interval ŌłÆ2ŽĆ Ōēż x < 2ŽĆ.\"", "source": "MiniMax ŌæĪ", "_id": "minimax_2_45", "judge_pick": false}, {"question": "Why does the graph of y = 1/x + 1 have a horizontal asymptote at y = 1 rather than y = 0? (2 steps)", "answer": "- Step 1: The basic hyperbola y = 1/x has horizontal asymptote y = 0 because 1/x ŌåÆ 0 as x ŌåÆ Ōł×.\n- Step 2: Adding 1 to the entire function shifts it up by 1, so y = 1/x + 1 ŌåÆ 0 + 1 = 1 as x ŌåÆ Ōł×. The asymptote shifts with the graph.\n\nThis is the key insight for Phuc's Mistake #1.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_46", "judge_pick": false}, {"question": "How do you apply the transformation rules to find the period of y = sin(3x┬░)? (1 step)", "answer": "Write the period formula immediately: $$\\text{Period} = \\frac{360┬░}{3} = 120┬░$$\n\nFor y = sin(kx)┬░ or cos(kx)┬░, the period is always 360┬░/k (or 2ŽĆ/k in radians).", "source": "MiniMax ŌæĪ", "_id": "minimax_2_47", "judge_pick": false}, {"question": "For y = tan(kx), what is the period and how do you calculate it? (1 step)", "answer": "$$\\text{Period} = \\frac{180┬░}{k} = \\frac{\\pi}{k} \\text{ (radians)}$$\n\nThis is half the period of sin(kx) or cos(kx) because tan has inherent 180┬░ periodicity.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_48", "judge_pick": false}, {"question": "What is the method for handling partial intervals when extrapolating solution counts? (3 steps)", "answer": "- Step 1: Divide the interval into whole periods plus a remainder.\n- Step 2: Multiply the number of whole periods by the solutions per period.\n- Step 3: Count solutions in the remainder (the partial period at the end) and add them.\n\nFor example, 1980┬░ = 5 full 360┬░ periods + 180┬░ remainder.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_49", "judge_pick": false}, {"question": "What are the x-axis crossing patterns for sin, cos, and tan over one full period? (1 step)", "answer": "- sin x: 2 crossings per 360┬░ period (at 0┬░ and 180┬░ within the period)\n- cos x: 2 crossings per 360┬░ period (at 90┬░ and 270┬░)\n- tan x: 1 crossing per 180┬░ period (at 0┬░ within each branch)\n\nThis reflects their different starting positions and periods.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_50", "judge_pick": false}, {"question": "When solving cos 2x┬░ = p for exactly two solutions, why does p = 1 count but p = 0.5 does not? (3 steps)", "answer": "- Step 1: The curve on 0 Ōēż x Ōēż 225┬░ has three monotonic pieces.\n- Step 2: p = 0.5 (between 0 and 1) cuts all three pieces ŌåÆ 3 solutions.\n- Step 3: p = 1 touches the maxima at x = 0┬░ and x = 180┬░ (tangentially), giving exactly 2 solutions. Similarly, p in (ŌłÆ1, 0) cuts exactly 2 pieces.\n\nThis is why the answer is ŌłÆ1 < p < 0 or p = 1.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_51", "judge_pick": false}, {"question": "What is the key property that guarantees exactly one intersection between tan x and any horizontal line y = c? (1 step)", "answer": "The Intermediate Value Theorem (IVT): on each branch between asymptotes, tan x is continuous and strictly increasing from ŌłÆŌł× to +Ōł×, so it must cross every horizontal line exactly once.\n\nThis is why \"one-per-branch\" is always true for tan.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_52", "judge_pick": false}, {"question": "How do you identify the transformation type from an equation like y = 3 sin(2x┬░)? (2 steps)", "answer": "- Step 1: The coefficient 3 outside the function is a vertical stretch by factor 3 (affects range: ŌłÆ3 to 3).\n- Step 2: The coefficient 2 inside the argument is a horizontal squash by factor 1/2 (affects period: 360┬░/2 = 180┬░).\n\nOrder of operations: horizontal transformations affect the x-coordinate first, then vertical transformations affect the y-coordinate.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_53", "judge_pick": false}, {"question": "What is the correct answer to the \"exactly two solutions\" question for cos 2x┬░ = p on 0 Ōēż x Ōēż 225┬░, and why do most students get it wrong? (2 steps)", "answer": "- Step 1: The correct range is $$-1 < p < 0 \\text{ or } p = 1$$.\n- Step 2: Most students answer ŌłÆ1 < p < 1 because they think any p between the max and min gives two solutions. They forget to count the three monotonic pieces and that p between 0 and 1 actually cuts all three pieces ŌåÆ 3 solutions.\n\nThis is the A* trap that Harry highlighted.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_54", "judge_pick": false}, {"question": "What is the coordinate of the minimum point for y = 4 sin ╬Ė, and why must you give both x and y values? (2 steps)", "answer": "- Step 1: The minimum of sin ╬Ė is ŌłÆ1 at ╬Ė = 270┬░ + 360┬░n. With the vertical stretch, minimum = 4 ├Ś (ŌłÆ1) = ŌłÆ4.\n- Step 2: The coordinate is (270┬░, ŌłÆ4). The question specifically asked for \"coordinates,\" so a bare \"-4\" would lose the second B mark.\n\nThis is Phuc's Mistake #5 ŌĆö always check what the question asks for.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_55", "judge_pick": false}, {"question": "How many solutions does tan x = 1/x + 1 have in the interval ŌłÆ2ŽĆ Ōēż x < 2ŽĆ, and what is the reasoning? (2 steps)", "answer": "- Step 1: There are 4 ŽĆ-length branches in this interval: (ŌłÆ2ŽĆ, ŌłÆŽĆ), (ŌłÆŽĆ, 0), (0, ŽĆ), (ŽĆ, 2ŽĆ).\n- Step 2: Each branch gives one intersection (the IVT ensures one crossing per branch). Total = 4 solutions.\n\nThis is the basis for extrapolating to larger intervals.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_56", "judge_pick": false}, {"question": "What must you remember about open versus closed intervals when counting endpoint solutions? (1 step)", "answer": "If an endpoint is excluded (using < or >), any solution at that exact point does NOT count. If the endpoint is included (using Ōēż or Ōēź), the solution DOES count.\n\nAlways check the inequality symbols carefully.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_57", "judge_pick": false}, {"question": "What is the relationship between the period of f(ax) and the value of a? (1 step)", "answer": "The period is the original period divided by |a|. For example, if f(x) has period 360┬░, then f(2x) has period 360┬░/2 = 180┬░, and f(x/2) has period 360┬░/(1/2) = 720┬░.\n\nThe key is: larger a ŌåÆ shorter period (squash); smaller a ŌåÆ longer period (stretch).", "source": "MiniMax ŌæĪ", "_id": "minimax_2_58", "judge_pick": false}, {"question": "In the comparison of sin, cos, and tan, what are the three key memory hooks? (1 step)", "answer": "1. \"Sin and tan both pass through the origin; cos starts at the top\"\n2. \"Tan is the odd one out: half period, infinite range, has asymptotes\"\n3. \"Where sin is 0, tan is 0; where cos is 0, tan blows up\"\n\nThese help you quickly recall the properties during the exam.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_59", "judge_pick": false}], "count": 60}, "opus_1": {"label": "Opus 4.7 ŌæĀ", "cards": [{"question": "Why does the graph of $$y = \\sin x$$ pass through the origin going upward, and what does this tell you about its symmetry?", "answer": "- Step 1: At $$x=0$$, $$\\sin 0 = 0$$, and the gradient $$\\cos 0 = 1 > 0$$, so the curve leaves the origin rising.\n- Step 2: Because $$\\sin(-x) = -\\sin x$$, the graph has rotational symmetry about the origin ŌĆö it's an **odd function**.\n- Step 3: Visually, reflecting the curve in the y-axis then in the x-axis gives back the original curve.\n\nTakeaway: sine is the \"origin-rising odd wave\".", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_0", "judge_pick": true}, {"question": "What is the range and period of $$y = \\sin x$$, and at which $$x$$-values does it reach its maximum and minimum?", "answer": "- Step 1: Range: $$-1 \\le \\sin x \\le 1$$ (amplitude 1).\n- Step 2: Period: $$360┬░$$ ($$2\\pi$$ radians) ŌĆö the entire pattern repeats every $$360┬░$$.\n- Step 3: Maxima at $$x = 90┬░ + 360┬░n$$ ($$\\pi/2 + 2\\pi n$$); minima at $$x = 270┬░ + 360┬░n$$ ($$3\\pi/2 + 2\\pi n$$).", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_1", "judge_pick": true}, {"question": "Over $$0 \\le x \\le 360┬░$$, how many times does $$y = \\sin x$$ cross the x-axis, and at which points?", "answer": "- Step 1: Zeros of $$\\sin x$$ occur where $$x = 180┬░n$$, i.e. every $$180┬░$$.\n- Step 2: On $$[0┬░, 360┬░]$$ inclusive the zeros are $$0┬░, 180┬░, 360┬░$$ ŌĆö **3 crossings**.\n- Step 3: Per single open period the count is 2 (since the endpoints overlap with the next period).", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_2", "judge_pick": false}, {"question": "For the graph $$y = 4\\sin\\theta$$, what is the minimum point ŌĆö and what trap is being tested by asking for the \"minimum point\"?", "answer": "- Step 1: Vertical stretch ├Ś4 maps each $$(x, y)$$ to $$(x, 4y)$$, giving range $$-4 \\le y \\le 4$$.\n- Step 2: The minimum still occurs at $$\\theta = 270┬░$$ (sine's minimum location is unchanged by vertical stretching).\n- Step 3: The trap: \"minimum point\" demands a **coordinate pair** $$(270┬░, -4)$$, NOT the bare value $$-4$$. Underline \"coordinates\" in the question to remember.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_3", "judge_pick": true}, {"question": "What is the range of $$y = 1 + \\sin\\theta$$, and what's the geometric significance of where this curve touches the x-axis?", "answer": "- Step 1: The \"+1\" shifts the entire sine wave UP by 1.\n- Step 2: New range: $$0 \\le y \\le 2$$.\n- Step 3: At $$\\theta = 270┬░$$ (where the original sine reaches its minimum $$-1$$), the new curve dips to exactly $$0$$ ŌĆö it just **touches** the x-axis from above and never crosses it.\n\nTakeaway: vertical shifts change where (and whether) a curve meets the x-axis.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_4", "judge_pick": false}, {"question": "What's the key distinguishing feature of $$y = \\cos x$$ at $$x=0$$ compared to $$y = \\sin x$$?", "answer": "- Step 1: $$\\cos 0 = 1$$ (the maximum), so the cosine curve **starts at the top**.\n- Step 2: In contrast, $$\\sin 0 = 0$$ ŌĆö sine starts on the axis.\n- Step 3: This is why cosine is an **even** function ($$\\cos(-x) = \\cos x$$, symmetric about the y-axis) while sine is odd.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_5", "judge_pick": false}, {"question": "How is $$y = \\cos x$$ related to $$y = \\sin x$$ as a transformation?", "answer": "- Step 1: $$\\cos x = \\sin(x + 90┬░)$$.\n- Step 2: So cosine is the sine graph translated LEFT by $$90┬░$$ (replace $$x$$ with $$x + 90┬░$$).\n- Step 3: Equivalently, sine is cosine shifted RIGHT by $$90┬░$$. They are the same wave, just $$90┬░$$ out of phase.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_6", "judge_pick": false}, {"question": "Where does $$y = \\cos x$$ cross the x-axis, and how does this pattern compare to sine's zeros?", "answer": "- Step 1: Zeros of cosine occur at $$x = 90┬░ + 180┬░n$$, i.e. $$90┬░, 270┬░, 450┬░, \\dots$$ ($$\\pi/2 + \\pi n$$).\n- Step 2: Compared to sine (zeros at $$180┬░n$$), cosine's zeros are offset by exactly $$90┬░$$.\n- Step 3: Over $$[0┬░, 360┬░]$$ cosine crosses the x-axis **twice** (at $$90┬░$$ and $$270┬░$$), unlike sine which crosses 3 times because sine's zeros land on the endpoints.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_7", "judge_pick": true}, {"question": "For $$y = \\cos 2x┬░$$, what type of transformation is applied to $$y = \\cos x┬░$$, and what's the new period?", "answer": "- Step 1: Replacing $$x$$ with $$2x$$ corresponds to $$f(ax)$$ with $$a = 2$$ ŌĆö a **horizontal squash** with scale factor $$1/2$$.\n- Step 2: Each point $$(x, y)$$ on the original cosine maps to $$(x/2, y)$$ ŌĆö x-coordinates halve, y unchanged.\n- Step 3: New period: $$360┬░/2 = 180┬░$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_8", "judge_pick": false}, {"question": "Why does $$f(ax)$$ with $$a > 1$$ SQUASH the graph horizontally rather than stretch it? (3 steps)", "answer": "- Step 1: To get the same $$y$$ value as the original, the new input must satisfy $$ax = x_{\\text{old}}$$, so $$x_{\\text{new}} = x_{\\text{old}}/a$$.\n- Step 2: Hence each x-coordinate is divided by $$a$$; with $$a > 1$$ this brings points CLOSER to the y-axis.\n- Step 3: Anchor with the point mapping $$(x, y) \\mapsto (x/a, y)$$. If you ever forget, test on a known landmark: $$\\cos 0 = 1$$ stays at $$(0,1)$$; the next zero $$\\cos 90┬░ = 0$$ moves to $$(45┬░, 0)$$ ŌĆö confirming squash.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_9", "judge_pick": true}, {"question": "For $$f(x) = \\cos 2x┬░$$ on $$0 \\le x \\le k$$, sketched with a minimum point $$Q$$ and an x-intercept $$R(k, 0)$$ shown as the third zero ŌĆö what are $$Q$$ and $$k$$?", "answer": "- Step 1: Minimum of $$\\cos 2x┬░$$ occurs where $$2x = 180┬░$$, i.e. $$x = 90┬░$$, with $$y = -1$$. So $$Q = (90┬░, -1)$$.\n- Step 2: Zeros occur where $$2x = 90┬░, 270┬░, 450┬░$$, i.e. $$x = 45┬░, 135┬░, 225┬░$$.\n- Step 3: $$R$$ is the **third** zero, so $$k = 225$$.\n\nTrap warning: writing $$k = 270$$ confuses the next MINIMUM location ($$2x = 540┬░$$ Ō¤╣ $$x = 270┬░$$) with the third zero.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_10", "judge_pick": false}, {"question": "(P1 June 12 Q5) For \"$$\\cos 2x┬░ = p$$ has exactly TWO solutions on $$0 \\le x \\le 225┬░$$, find the range of $$p$$\" ŌĆö why is the tempting answer $$-1 < p < 1$$ wrong? (4 steps)", "answer": "- Step 1: The curve on $$[0┬░, 225┬░]$$ goes $$(0,1) \\downarrow (90┬░, -1) \\uparrow (180┬░, 1) \\downarrow (225┬░, 0)$$ ŌĆö three **monotonic pieces** (down, up, down).\n- Step 2: A horizontal line $$y = p$$ at a height $$0 \\le p < 1$$ cuts all three monotonic pieces ŌåÆ **3 solutions**, not 2.\n- Step 3: For exactly two intersections, the line must miss one piece. Heights $$-1 < p < 0$$ cut only the first down-piece and the middle up-piece (missing the final short down-piece which only reaches $$y=1$$ down to $$0$$).\n- Step 4: Special exact-touch case: $$p = 1$$ touches the two maxima at $$x = 0$$ and $$x = 180┬░$$ ŌĆö exactly 2 contacts. So: $$-1 < p < 0$$ OR $$p = 1$$.\n\nTakeaway: count monotonic pieces, then count which pieces a horizontal band of $$p$$ values intersects.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_11", "judge_pick": true}, {"question": "What's the general STRATEGY for finding the range of $$p$$ such that an equation like \"trig-curve $$= p$$ has exactly $$n$$ solutions on a given interval\"?", "answer": "- Step 1: Sketch the curve carefully on the interval, marking all maxima, minima, and endpoints.\n- Step 2: Split the curve into **monotonic pieces** (down-runs and up-runs between turning points/endpoints).\n- Step 3: For each horizontal band of $$p$$ values, count how many monotonic pieces a line $$y = p$$ at that height would cross.\n- Step 4: Pick the bands giving exactly $$n$$ intersections; also check **exact tangency** cases where $$p$$ equals a max/min value (these often give a discrete extra answer like $$p = 1$$).", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_12", "judge_pick": false}, {"question": "What is the period of $$y = \\tan x$$, and why is it HALF the period of sine and cosine?", "answer": "- Step 1: $$\\tan x = \\sin x / \\cos x$$. Both $$\\sin$$ and $$\\cos$$ flip sign together every $$180┬░$$ ŌĆö the sign reversal cancels in the quotient.\n- Step 2: Hence $$\\tan(x + 180┬░) = \\tan x$$: period is $$180┬░$$ ($$\\pi$$ rad), half of sine/cosine's $$360┬░$$.\n- Step 3: This is why $$\\tan$$ has roughly twice as many \"events\" (zeros, asymptotes) per $$360┬░$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_13", "judge_pick": false}, {"question": "Where are the vertical asymptotes of $$y = \\tan x$$ located, in both degrees and radians?", "answer": "- Step 1: Asymptotes occur where $$\\cos x = 0$$ (the denominator vanishes).\n- Step 2: In degrees: $$x = 90┬░ + 180┬░n$$, i.e. $$\\pm 90┬░, \\pm 270┬░, \\dots$$\n- Step 3: In radians: $$x = (2n+1)\\pi/2$$, i.e. $$\\pm\\pi/2, \\pm 3\\pi/2, \\pm 5\\pi/2, \\dots$$ (all odd multiples of $$\\pi/2$$).", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_14", "judge_pick": false}, {"question": "Where does $$y = \\tan x$$ cross the x-axis, and how does this relate to sine?", "answer": "- Step 1: $$\\tan x = 0$$ iff $$\\sin x = 0$$ (with $$\\cos x \\ne 0$$).\n- Step 2: So $$\\tan$$ zeros are at $$x = 180┬░n$$ ($$\\pi n$$) ŌĆö exactly the same as sine's zeros.\n- Step 3: Memory hook: \"Where $$\\sin$$ is 0, $$\\tan$$ is 0; where $$\\cos$$ is 0, $$\\tan$$ blows up.\"", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_15", "judge_pick": false}, {"question": "What is Harry's \"rhythm rule\" for tan x, and why is it useful?", "answer": "- Step 1: \"Something interesting happens every $$90┬░$$ ($$\\pi/2$$)\" ŌĆö alternating zero, asymptote, zero, asymptote, ŌĆ”\n- Step 2: Useful because it gives you a clean way to mark every key landmark on a tan sketch without confusing zeros and asymptotes.\n- Step 3: Starting at $$x=0$$ (zero), the rhythm is: $$0$$ ŌåÆ asymptote at $$\\pi/2$$ ŌåÆ zero at $$\\pi$$ ŌåÆ asymptote at $$3\\pi/2$$ ŌåÆ zero at $$2\\pi$$ ŌĆ”", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_16", "judge_pick": false}, {"question": "Why does the Intermediate Value Theorem (IVT) guarantee that a horizontal line $$y = c$$ meets each tan-branch exactly ONCE?", "answer": "- Step 1: On each open branch (between consecutive asymptotes), $$\\tan x$$ is **continuous** and **strictly increasing** from $$-\\infty$$ to $$+\\infty$$.\n- Step 2: IVT says: for any value $$c$$ between $$-\\infty$$ and $$+\\infty$$, there exists at least one $$x$$ on the branch with $$\\tan x = c$$.\n- Step 3: Strict monotonicity makes this $$x$$ **unique** ŌĆö exactly one intersection per branch.\n\nTakeaway: this is the engine that makes counting tan-vs-flat-line intersections so easy: count the branches.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_17", "judge_pick": true}, {"question": "For $$y = \\tan x$$ on $$-2\\pi \\le x < 2\\pi$$, what is the equation of the rightmost asymptote?", "answer": "- Step 1: Asymptotes lie at $$(2n+1)\\pi/2$$: $$\\dots, -3\\pi/2, -\\pi/2, \\pi/2, 3\\pi/2, 5\\pi/2, \\dots$$\n- Step 2: The rightmost one strictly less than $$2\\pi$$ is $$3\\pi/2$$ (since $$5\\pi/2 = 2.5\\pi > 2\\pi$$).\n- Step 3: Answer: $$x = 3\\pi/2$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_18", "judge_pick": false}, {"question": "In the sin/cos/tan comparison, which functions are odd and which are even ŌĆö and what visual symmetry does each give?", "answer": "- Step 1: $$\\sin$$ is **odd** ($$\\sin(-x) = -\\sin x$$) ŌĆö rotational symmetry about the origin.\n- Step 2: $$\\cos$$ is **even** ($$\\cos(-x) = \\cos x$$) ŌĆö reflection symmetry about the y-axis.\n- Step 3: $$\\tan$$ is **odd** ($$\\tan(-x) = -\\tan x$$) ŌĆö rotational symmetry about the origin (like sine).", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_19", "judge_pick": false}, {"question": "Which of sin, cos, tan have asymptotes, and which have unbounded range?", "answer": "- Step 1: Only $$\\tan$$ has asymptotes (vertical, at odd multiples of $$\\pi/2$$).\n- Step 2: Only $$\\tan$$ has unbounded range ŌĆö all real numbers.\n- Step 3: Both $$\\sin$$ and $$\\cos$$ are defined everywhere and bounded in $$[-1, 1]$$. **Tan is the odd one out.**", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_20", "judge_pick": true}, {"question": "Which of sin, cos, tan pass through the origin?", "answer": "- Step 1: $$\\sin 0 = 0$$ and $$\\tan 0 = 0$$ ŌĆö both pass through the origin.\n- Step 2: $$\\cos 0 = 1$$ ŌĆö cosine starts at the **top**, not the origin.\n- Step 3: Memory hook: \"sin and tan share the origin; cos starts at the top.\"", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_21", "judge_pick": false}, {"question": "What's the trigger phrase / sketch cue that should make you suspect a \"below-the-axis crossing near a pole\" trap when counting intersections?", "answer": "- Step 1: When one curve has a vertical asymptote (e.g. $$y = 1/x + 1$$ at $$x = 0$$) and the other is unbounded (e.g. $$\\tan x$$), look at what happens **as you approach the pole from each side**.\n- Step 2: On one side, the rational curve plunges to $$-\\infty$$ while a tan branch sweeps $$-\\infty$$ to $$+\\infty$$ ŌĆö they can meet BELOW the x-axis.\n- Step 3: Trigger: always check if the standard \"above-axis\" count missed an extra crossing on the interval $$(-\\pi/2, 0)$$ or similar near-pole stretches.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_22", "judge_pick": true}, {"question": "Why does $$y = 1/x + 1$$ have horizontal asymptote $$y = 1$$ instead of $$y = 0$$?", "answer": "- Step 1: The parent $$y = 1/x$$ has horizontal asymptote $$y = 0$$.\n- Step 2: The transformation $$f(x) + 1$$ translates the entire graph UP by 1 ŌĆö including the asymptote line itself.\n- Step 3: As $$|x| \\to \\infty$$, $$1/x \\to 0$$ so $$1/x + 1 \\to 1$$, confirming $$y = 1$$ is the new horizontal asymptote.\n\nTakeaway: a \"+ constant\" always shifts horizontal asymptotes; vertical asymptotes (like $$x=0$$ here) are unaffected.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_23", "judge_pick": true}, {"question": "(P1 June 12 Q4b/ii) When asked to state the number of solutions and give a reason for $$\\tan x = 1/x + 1$$ on $$-2\\pi \\le x < 2\\pi$$, what wording habit must you use?", "answer": "- Step 1: State the number with a full sentence naming **both curves** and the **interval**.\n- Step 2: Template: \"There are N solutions because the graph of $$y = \\tan x$$ intersects the graph of $$y = 1/x + 1$$ N times in the interval $$-2\\pi \\le x < 2\\pi$$.\"\n- Step 3: Just writing \"4\" loses marks because the question says \"giving a reason\".", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_24", "judge_pick": false}, {"question": "Why does $$\\tan x = 1/x + 1$$ on $$0 \\le x \\le 40\\pi$$ have exactly 40 solutions?", "answer": "- Step 1: On this interval, $$y = 1/x + 1$$ is near the line $$y = 1$$ (especially away from $$x = 0$$).\n- Step 2: $$\\tan x$$ has period $$\\pi$$, so on $$[0, 40\\pi]$$ there are $$40$$ tan-branches.\n- Step 3: By IVT each branch meets the near-horizontal line exactly once ŌåÆ 40 intersections.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_25", "judge_pick": false}, {"question": "(P1 June 12 Q4c/ii) Why is the count for $$\\tan x = 1/x + 1$$ on $$-10\\pi \\le x \\le 5\\pi/2$$ equal to **14**, not 12 ŌĆö and what is the trap?", "answer": "- Step 1: Count 10 ordinary tan-branches from $$-10\\pi$$ up to roughly $$-\\pi/2$$ ŌĆö each meets the near-1 line once: 10 intersections.\n- Step 2: The **\"odd one out below the axis\"** lives on $$(-\\pi/2, 0)$$: as $$x \\to 0^-$$, $$1/x + 1 \\to -\\infty$$; as $$x \\to (-\\pi/2)^+$$, $$\\tan x \\to -\\infty$$ too. The rising tan branch and the diving rational curve cross BELOW the x-axis ŌĆö 1 extra intersection.\n- Step 3: From $$0$$ to $$5\\pi/2$$ there are 3 more ordinary branches: 3 intersections.\n- Step 4: Total $$= 10 + 1 + 3 = 14$$. The trap that gives 12: forgetting the below-axis crossing on $$(-\\pi/2, 0)$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_26", "judge_pick": true}, {"question": "What's the general 5-step strategy for extrapolating \"how many solutions of $$f(x) = g(x)$$\" to a large or negative interval? (5 steps)", "answer": "- Step 1: **Identify the repeating unit.** For tan-vs-near-horizontal, it's one $$\\pi$$-branch. For periodic-vs-periodic, it's the longer period (often $$360┬░$$).\n- Step 2: **Count solutions in one unit** by careful sketching, including any below-axis crossings near poles.\n- Step 3: **Count whole units** in the interval: $$(\\text{length})/(\\text{unit length})$$.\n- Step 4: **Multiply:** solutions per unit ├Ś number of whole units.\n- Step 5: **Adjust the ends**: a partial leftover piece may add or remove crossings; check it by hand and watch open vs closed endpoints.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_27", "judge_pick": false}, {"question": "For $$\\tan\\theta = 1 + \\sin\\theta$$ on $$0 \\le \\theta \\le 1980┬░$$, what's the structure of the count?", "answer": "- Step 1: $$1980┬░ = 5 \\times 360┬░ + 180┬░$$ ŌĆö i.e. 5 full periods of $$360┬░$$ plus a half period.\n- Step 2: Count intersections in one $$360┬░$$ period ŌĆö call this $$N$$.\n- Step 3: Total $$= 5N + (\\text{intersections in the final leftover } 180┬░)$$, the leftover counted by sketching that final half.\n\nTakeaway: don't just multiply ŌĆö always handle the leftover endpoint piece separately.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_28", "judge_pick": true}, {"question": "When does the OPEN vs CLOSED endpoint convention ($$<$$ vs $$\\le$$) actually change a solution count?", "answer": "- Step 1: It changes the count only when a solution lands EXACTLY at the endpoint.\n- Step 2: For example, on $$-2\\pi \\le x < 2\\pi$$, a solution at $$x = 2\\pi$$ would NOT be counted (the right endpoint is excluded).\n- Step 3: Always re-check by computing the function value at each endpoint ŌĆö if it equals the target, the inclusion/exclusion matters.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_29", "judge_pick": false}, {"question": "Summarise how each of these transformations affects a graph: $$f(x) + a$$, $$f(x+a)$$, $$f(ax)$$, $$f(x/a)$$, $$a\\cdot f(x)$$.", "answer": "- Step 1: $$f(x) + a$$: translate UP by $$a$$ (horizontal asymptote moves up; vertical asymptote unchanged).\n- Step 2: $$f(x+a)$$: translate LEFT by $$a$$.\n- Step 3: $$f(ax)$$: horizontal stretch, **scale factor $$1/a$$**. If $$a > 1$$ this squashes toward y-axis; period of $$\\sin/\\cos$$ becomes $$360┬░/a$$.\n- Step 4: $$f(x/a)$$: horizontal stretch, scale factor $$a$$ (widens; period grows).\n- Step 5: $$a\\cdot f(x)$$: vertical stretch by factor $$a$$ (range scales: e.g. $$4\\sin\\theta$$ has range $$\\pm 4$$).", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_30", "judge_pick": true}, {"question": "What's the formula for the period of $$\\sin(kx)$$, $$\\cos(kx)$$, and $$\\tan(kx)$$?", "answer": "- Step 1: $$\\sin(kx)$$ and $$\\cos(kx)$$: period $$= 360┬░/k = 2\\pi/k$$.\n- Step 2: $$\\tan(kx)$$: period $$= 180┬░/k = \\pi/k$$ (because tan's base period is $$\\pi$$, half of sine's).\n- Step 3: The pattern: divide the base period by $$k$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_31", "judge_pick": true}, {"question": "Why does $$\\sin^{-1}$$ only return acute angles, and how do you find the OBTUSE angle whose sine is the same?", "answer": "- Step 1: The principal range of $$\\sin^{-1}$$ is $$[-90┬░, 90┬░]$$ ($$[-\\pi/2, \\pi/2]$$), which contains only acute (or zero) angles for positive sine values.\n- Step 2: Since $$\\sin(180┬░ - \\theta) = \\sin\\theta$$, the obtuse angle with the same sine is $$180┬░ - (\\text{acute answer})$$.\n- Step 3: In radians: obtuse $$= \\pi - (\\text{acute})$$. Example: if calculator gives $$0.884$$ rad, obtuse is $$\\pi - 0.884 \\approx 2.258$$ rad.\n\nTrigger: underline \"obtuse\" in any trig question to avoid the slip.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_32", "judge_pick": true}, {"question": "What's the answer-format pitfall when a question asks for the \"coordinates\" of a max/min point?", "answer": "- Step 1: A bare value (like $$-4$$) is INSUFFICIENT ŌĆö you must give a coordinate pair.\n- Step 2: Format: $$(x, y)$$, e.g. for the minimum of $$y = 4\\sin\\theta$$ on $$[0┬░, 360┬░]$$, write $$(270┬░, -4)$$.\n- Step 3: Habit: underline \"coordinates\" in the question stem; check your final answer is a pair.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_33", "judge_pick": false}, {"question": "What's the practical sketching habit Harry recommends for any trig-graph intersection problem?", "answer": "- Step 1: Always sketch BOTH curves on the same axes.\n- Step 2: Mark asymptotes as **dashed lines**, label every max/min and every x-axis crossing.\n- Step 3: Check **below the x-axis near each pole** before committing to a count ŌĆö that's where the trap crossings hide.\n- Step 4: Verify the answer matches the wording: name both curves and the interval in the reason sentence.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_34", "judge_pick": false}, {"question": "For the curve $$y = \\cos 2x┬░$$ on $$[0┬░, 225┬░]$$, what landmarks should you mark on the sketch, and why?", "answer": "- Step 1: The squash halves x-coordinates, so landmarks are at $$x = 0, 45, 90, 135, 180, 225$$.\n- Step 2: Values at those points: $$(0,1), (45,0), (90,-1), (135,0), (180,1), (225,0)$$ ŌĆö i.e. max, zero, MIN, zero, MAX, zero.\n- Step 3: Two maxima within the interval is what enables the \"$$p = 1$$ exact-touch\" two-solution case to exist.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_35", "judge_pick": false}, {"question": "Why does the graph of $$y = 1 + \\sin\\theta$$ \"just touch\" the x-axis rather than cross it?", "answer": "- Step 1: The range of $$1 + \\sin\\theta$$ is $$[0, 2]$$ ŌĆö its minimum value is exactly $$0$$.\n- Step 2: The graph reaches $$y = 0$$ only at the single point $$\\theta = 270┬░$$ (per period), and immediately rises away.\n- Step 3: A \"touch\" means the curve is tangent to the x-axis at that point ŌĆö it does not pass through to negative values, unlike a normal sine zero which crosses.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_36", "judge_pick": true}, {"question": "How can you tell whether tan x changes sign across an asymptote vs whether it has the same sign on both sides?", "answer": "- Step 1: As $$x$$ increases through an asymptote at $$\\pi/2 + n\\pi$$, $$\\cos x$$ changes sign.\n- Step 2: $$\\sin x$$ is roughly constant near that point (it's at $$\\pm 1$$), so $$\\tan = \\sin/\\cos$$ flips sign too.\n- Step 3: Result: tan jumps from $$+\\infty$$ on the left of an asymptote to $$-\\infty$$ on the right (each branch goes $$-\\infty$$ to $$+\\infty$$). So tan always changes sign across an asymptote.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_37", "judge_pick": true}, {"question": "What's the conceptual difference between \"x-axis crossings\" and \"curveŌĆōcurve intersections\" ŌĆö and what's the unifying principle?", "answer": "- Step 1: x-axis crossings: solutions of $$f(x) = 0$$, where the curve meets the line $$y = 0$$.\n- Step 2: CurveŌĆōcurve intersections: solutions of $$f(x) = g(x)$$, where the two curves meet.\n- Step 3: Unifying principle: x-axis crossings are just a special case of curveŌĆōcurve intersection where $$g(x) = 0$$ (the x-axis is itself a curve). Both are counted by **sketching and counting visual intersections**.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_38", "judge_pick": true}, {"question": "When counting solutions of $$\\tan\\theta = 1 + \\sin\\theta$$ in a single $$360┬░$$ period, what general approach should you use?", "answer": "- Step 1: Sketch $$y = 1 + \\sin\\theta$$ (lifted sine, range $$[0, 2]$$) and $$y = \\tan\\theta$$ (with asymptotes at $$90┬░$$ and $$270┬░$$) on the same axes.\n- Step 2: Identify each branch of tan and visually check how many times it crosses the shifted sine.\n- Step 3: Note: on each tan branch, tan goes $$-\\infty$$ to $$+\\infty$$, while the sine wave stays bounded in $$[0,2]$$ ŌĆö IVT guarantees at least one crossing per branch; the bounded sine guarantees finitely many.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_39", "judge_pick": false}, {"question": "Why is the period of \"events\" on the tan graph $$90┬░$$, even though the period of tan itself is $$180┬░$$?", "answer": "- Step 1: Within each $$180┬░$$ period, two distinct events happen: a zero (mid-branch) and an asymptote (at the end).\n- Step 2: They alternate every $$90┬░$$: zero at $$0┬░$$, asymptote at $$90┬░$$, zero at $$180┬░$$, asymptote at $$270┬░$$, ŌĆ”\n- Step 3: So the **landmark spacing** is $$90┬░$$, but the full curve only repeats every $$180┬░$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_40", "judge_pick": true}, {"question": "What's the difference between $$\\cos(2x┬░)$$ squashing the graph vs $$\\cos(x┬░/2)$$ stretching it ŌĆö and how do you avoid confusing them?", "answer": "- Step 1: $$\\cos(2x┬░)$$: here $$a = 2$$, scale factor $$1/a = 1/2$$, so it SQUASHES (period halves to $$180┬░$$).\n- Step 2: $$\\cos(x┬░/2)$$: here $$a = 1/2$$, scale factor $$1/a = 2$$, so it STRETCHES (period doubles to $$720┬░$$).\n- Step 3: Anchor: check what happens to the first zero of cos (originally at $$90┬░$$). For $$\\cos(2x┬░)$$: first zero at $$x = 45┬░$$ (closer, squashed). For $$\\cos(x┬░/2)$$: first zero at $$x = 180┬░$$ (further, stretched).", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_41", "judge_pick": true}, {"question": "What's the simplest mental check that $$f(ax)$$ with $$a > 1$$ squashes, using a single landmark?", "answer": "- Step 1: Take any landmark $$(x_0, y_0)$$ on the original ŌĆö say the first zero of $$\\cos$$ at $$(90┬░, 0)$$.\n- Step 2: It moves to $$(x_0/a, y_0)$$ ŌĆö for $$\\cos 2x┬░$$ that's $$(45┬░, 0)$$.\n- Step 3: $$45┬░ < 90┬░$$, so the landmark moved CLOSER to the y-axis: confirms squash.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_42", "judge_pick": true}, {"question": "Why is it especially important to sketch carefully when the asymptote of one curve lies at the SAME x-value as the asymptote of the other?", "answer": "- Step 1: Both curves blowing up at the same x means their behavior near that point is unusually rich ŌĆö they could meet BELOW the axis as one curve dives and the other rises through.\n- Step 2: For instance, $$\\tan x$$ has asymptotes at $$\\pm \\pi/2$$; $$1/x + 1$$ has its asymptote at $$x = 0$$. The tan branch on $$(-\\pi/2, 0)$$ shares the asymptote of $$1/x + 1$$ at $$x = 0$$.\n- Step 3: This is precisely the \"odd one out below the axis\" ŌĆö a hidden crossing easily missed without a detailed sketch.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_43", "judge_pick": true}, {"question": "Suppose you're told $$y = 4 + \\tan x$$. Where are the asymptotes, and where are the new zeros?", "answer": "- Step 1: Asymptotes: where $$\\tan x$$ blows up, i.e. $$x = (2n+1)\\pi/2$$ ŌĆö UNCHANGED by the \"+4\" vertical shift.\n- Step 2: Zeros: solve $$4 + \\tan x = 0 \\Rightarrow \\tan x = -4$$. By IVT, this gives exactly one solution per branch (since $$-4$$ is finite and tan is monotonic on each branch).\n- Step 3: So asymptotes stay put; zeros shift away from $$n\\pi$$ to wherever $$\\tan x = -4$$.\n\nTakeaway: vertical shifts don't move vertical asymptotes but DO move zeros.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_44", "judge_pick": true}, {"question": "What's the role of monotonic-piece counting when a question asks \"for what values of $$p$$ does $$f(x) = p$$ have exactly $$n$$ solutions\"?", "answer": "- Step 1: Each monotonic piece can supply AT MOST one solution to $$f(x) = p$$ (because on a monotonic piece, $$f$$ takes each value at most once).\n- Step 2: Count pieces, then for each horizontal band of $$p$$ values, ask: how many pieces does $$y = p$$ cross?\n- Step 3: Exact-touch cases ($$p$$ = a turning-point value) often contribute exactly one isolated $$p$$-value that gives a borderline count ŌĆö handle them separately.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_45", "judge_pick": true}, {"question": "Why does the \"$$p = 1$$\" exact-touch case in $$\\cos 2x┬░ = p$$ on $$[0┬░, 225┬░]$$ give EXACTLY 2 solutions (not 1, not 3)?", "answer": "- Step 1: On $$[0┬░, 225┬░]$$, $$\\cos 2x┬░ = 1$$ requires $$2x = 360┬░n$$, i.e. $$x = 0┬░, 180┬░$$.\n- Step 2: Both lie inside the interval $$[0┬░, 225┬░]$$, giving exactly 2 solutions.\n- Step 3: The next value, $$x = 360┬░$$, is outside the interval, so we don't get a third.\n\nTakeaway: max/min values often deliver discrete \"bonus\" cases in range-of-p questions.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_46", "judge_pick": true}, {"question": "Why is it INCORRECT to write \"the period of $$\\tan x$$ is $$2\\pi$$\"?", "answer": "- Step 1: The period is the smallest positive $$T$$ with $$\\tan(x + T) = \\tan x$$ for all $$x$$.\n- Step 2: We have $$\\tan(x + \\pi) = \\tan x$$ (since adding $$\\pi$$ flips both sin and cos signs, cancelling in the ratio), and $$\\pi$$ is the smallest such $$T$$.\n- Step 3: $$2\\pi$$ is also a period, but not the **fundamental** period. Conventionally, \"the period\" means the smallest, so $$\\pi$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_47", "judge_pick": true}, {"question": "A horizontal line $$y = 0.5$$ is drawn over $$y = \\sin x$$ on $$[0┬░, 720┬░]$$. How many intersections, by the period-scaling argument?", "answer": "- Step 1: On one period $$[0┬░, 360┬░]$$, $$y = 0.5$$ cuts the sine wave on its way up at $$30┬░$$ and on its way down at $$150┬░$$ ŌĆö that's 2 intersections per period.\n- Step 2: $$[0┬░, 720┬░]$$ contains 2 full periods.\n- Step 3: Total: $$2 \\times 2 = 4$$ intersections.\n\nTakeaway: count per period, then multiply. This is the same logic as the tan-vs-curve extrapolation.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_48", "judge_pick": true}, {"question": "Why are the zeros of $$\\tan x$$ the same as the zeros of $$\\sin x$$?", "answer": "- Step 1: $$\\tan x = \\sin x / \\cos x$$ ŌĆö a fraction equals zero iff its numerator is zero (and denominator nonzero).\n- Step 2: $$\\sin x = 0$$ gives $$x = n\\pi$$; at those points, $$\\cos x = \\pm 1 \\ne 0$$, so the fraction is well-defined.\n- Step 3: Hence $$\\tan x = 0$$ iff $$x = n\\pi$$ ŌĆö exactly the sine zeros.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_49", "judge_pick": true}, {"question": "What's the visual difference between how sine and cosine cross the x-axis, and why does it matter for counting?", "answer": "- Step 1: Both crossings are **transversal** (curve passes through the axis with nonzero gradient): $$\\sin'$$ and $$\\cos'$$ are nonzero at their zeros.\n- Step 2: They differ only in LOCATION: sine zeros at $$n\\pi$$ (including the origin), cosine zeros at $$\\pi/2 + n\\pi$$ (offset by $$90┬░$$).\n- Step 3: For counting, this offset matters for endpoint-inclusion: on $$[0┬░, 360┬░]$$, sine catches BOTH endpoints (3 zeros), but cosine catches neither (2 zeros).", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_50", "judge_pick": true}, {"question": "Edge case: how many solutions does $$\\cos x = -1$$ have on $$[0┬░, 360┬░]$$, and why is it just 1 ŌĆö not 2?", "answer": "- Step 1: $$\\cos x = -1$$ only at $$x = 180┬░ + 360┬░n$$.\n- Step 2: On $$[0┬░, 360┬░]$$, only $$x = 180┬░$$ qualifies.\n- Step 3: This is the touching case ŌĆö the cosine curve reaches its minimum value at exactly one point per period, not two. Compare with $$\\cos x = -0.5$$ which gives 2 solutions per period.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_51", "judge_pick": true}, {"question": "Why does the count \"10 + 1 + 3\" for $$\\tan x = 1/x + 1$$ on $$[-10\\pi, 5\\pi/2]$$ regroup as \"10 + 2 + 2\" giving the SAME total of 14?", "answer": "- Step 1: Either grouping just partitions the same 14 crossings differently ŌĆö say, by re-attributing the below-axis crossing on $$(-\\pi/2, 0)$$ to either the \"left of zero\" or \"right of zero\" tally.\n- Step 2: The key invariant is the TOTAL count (14), not the partition.\n- Step 3: Whatever grouping you use, the critical check is that the **odd-one-out below-axis crossing is counted exactly once**, not zero times.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_52", "judge_pick": false}, {"question": "In what sense is the \"horizontal line meets each tan branch once\" argument an application of the Intermediate Value Theorem PLUS strict monotonicity?", "answer": "- Step 1: IVT alone says: for a continuous function going from $$-\\infty$$ to $$+\\infty$$, every value in between is achieved AT LEAST once.\n- Step 2: Strict monotonicity (tan strictly increasing on each branch) upgrades this to \"EXACTLY once\".\n- Step 3: So the count \"exactly one per branch\" requires BOTH ingredients: continuity for existence, monotonicity for uniqueness.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_53", "judge_pick": true}, {"question": "Suppose you didn't recall the formula $$x = (2n+1)\\pi/2$$ for tan's asymptotes. How could you derive their locations from first principles?", "answer": "- Step 1: Tan blows up where its denominator $$\\cos x = 0$$.\n- Step 2: $$\\cos x = 0$$ at $$x = \\pi/2, 3\\pi/2, 5\\pi/2, \\dots$$ ŌĆö odd multiples of $$\\pi/2$$.\n- Step 3: In a single formula: $$x = (2n+1) \\cdot \\pi/2$$ for integer $$n$$ (positive, negative, or zero). Plugging $$n = 0$$ gives $$\\pi/2$$, $$n = 1$$ gives $$3\\pi/2$$, etc.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_54", "judge_pick": true}], "count": 55}, "opus_2": {"label": "Opus 4.7 ŌæĪ", "cards": [{"question": "Why does the sine curve $$y = \\sin x$$ pass through the origin while the cosine curve $$y = \\cos x$$ starts at its peak, and how is this captured in a single identity?", "answer": "- Step 1: At $$x=0$$, $$\\sin 0 = 0$$ (origin) and $$\\cos 0 = 1$$ (peak). So sine \"starts climbing from zero\" and cosine \"starts already at the top heading down\".\n- Step 2: The two graphs are literally the same wave, just offset by $$90┬░$$: $$\\cos x = \\sin(x + 90┬░)$$.\n- Step 3: Equivalently, cosine is the sine graph translated LEFT by $$90┬░$$. This is why every sine landmark you know has a cosine twin $$90┬░$$ earlier.\n\nMemory hook: \"sin and tan go through the origin; cos starts at the top.\"", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_0", "judge_pick": true}, {"question": "What is the period of $$y = \\tan x$$, and why is it HALF the period of $$\\sin x$$ and $$\\cos x$$?", "answer": "- Step 1: Period of $$\\tan x$$ is $$180┬░$$ ($$\\pi$$ rad), whereas $$\\sin x$$ and $$\\cos x$$ both have period $$360┬░$$ ($$2\\pi$$).\n- Step 2: Reason: $$\\tan x = \\sin x / \\cos x$$. After $$180┬░$$ both $$\\sin$$ and $$\\cos$$ flip sign together, so their RATIO is unchanged.\n- Step 3: Consequence: in any interval of width $$\\pi$$, the whole tan pattern (one branch, one zero, one asymptote nearby) repeats.\n\nTakeaway: tan is the \"odd one out\" ŌĆö half the period, infinite range, has asymptotes.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_1", "judge_pick": true}, {"question": "Where are the vertical asymptotes of $$y = \\tan x$$ located, expressed as a single formula in radians, and WHY are they there?", "answer": "- Step 1: Asymptotes at $$x = \\dfrac{(2n+1)\\pi}{2}$$ for integer $$n$$ ŌĆö i.e. $$\\pm \\pi/2, \\pm 3\\pi/2, \\pm 5\\pi/2, \\ldots$$.\n- Step 2: Reason: $$\\tan x = \\sin x / \\cos x$$ blows up exactly where the denominator $$\\cos x = 0$$.\n- Step 3: And $$\\cos x = 0$$ at every odd multiple of $$\\pi/2$$.\n\nMemory hook: \"Where $$\\cos$$ is zero, $$\\tan$$ blows up; where $$\\sin$$ is zero, $$\\tan$$ is zero.\"", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_2", "judge_pick": true}, {"question": "Why does any horizontal (or near-horizontal) line $$y = c$$ cross EVERY branch of $$y = \\tan x$$ exactly once? (3 steps)", "answer": "- Step 1: On each $$\\pi$$-wide branch, $$\\tan x$$ is continuous (no breaks inside the branch).\n- Step 2: On the branch, $$\\tan x$$ strictly INCREASES from $$-\\infty$$ to $$+\\infty$$.\n- Step 3: By the Intermediate Value Theorem, a continuous strictly increasing function spanning all real values hits any horizontal level exactly once per branch.\n\nThis \"one-per-branch\" fact is the whole engine for counting solutions of $$\\tan x = (\\text{slow-varying thing})$$.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_3", "judge_pick": false}, {"question": "For the question \"$$\\tan x = \\frac{1}{x} + 1$$ on $$0 \\le x \\le 40\\pi$$, how many solutions?\", what's the strategy that gives the answer almost instantly?", "answer": "- Step 1: Recognise $$y = \\frac{1}{x}+1$$ is nearly horizontal at height $$y \\approx 1$$ for moderate-to-large $$x$$ (horizontal asymptote $$y=1$$).\n- Step 2: Each $$\\pi$$-wide branch of $$\\tan x$$ meets a near-horizontal line exactly once (IVT, one-per-branch).\n- Step 3: Length of interval $$/ \\pi = 40\\pi/\\pi = 40$$ branches, so $$40$$ solutions.\n\nThe trick: don't try to solve ŌĆö count branches.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_4", "judge_pick": true}, {"question": "P1 June 12 Q4b ŌĆö what is the horizontal asymptote of $$y = \\dfrac{1}{x} + 1$$, and what's the common slip?", "answer": "- Step 1: The asymptote is $$y = 1$$, NOT $$y = 0$$.\n- Step 2: Reason: $$y = 1/x$$ has asymptote $$y=0$$; the \"$$+1$$\" translates the WHOLE curve up by 1, dragging the horizontal asymptote up with it.\n- Step 3: Slip: forgetting that vertical translations move the horizontal asymptote ŌĆö students absent-mindedly keep the asymptote at $$y=0$$.\n\nGeneral rule: $$f(x)+a$$ shifts the horizontal asymptote up by $$a$$; the vertical asymptote (here $$x=0$$) is unchanged.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_5", "judge_pick": true}, {"question": "In the count \"$$\\tan x = 1/x + 1$$ on $$-10\\pi \\le x \\le 5\\pi/2$$\", why is the answer 14 (not 12)? What's the \"odd one out\"?", "answer": "- Step 1: On $$(-\\pi/2, 0)$$, near $$x=0$$ the curve $$1/x + 1$$ dives to $$-\\infty$$ (because $$1/x \\to -\\infty$$).\n- Step 2: On this branch, the rising tan branch (going $$-\\infty$$ to $$+\\infty$$) is met by the plunging $$1/x+1$$ curve BELOW the x-axis ŌĆö a crossing that is easy to miss because it sits underneath.\n- Step 3: So the count is $$10$$ ordinary branches (from $$-10\\pi$$ to $$\\approx -\\pi/2$$) + $$1$$ below-axis branch + $$3$$ branches on $$[0, 5\\pi/2]$$ = $$14$$.\n\nLesson: when one curve has a vertical asymptote, ALWAYS check what happens BELOW the x-axis near the pole before counting.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_6", "judge_pick": true}, {"question": "What's the trigger phrase that warns you a \"find the range of $$p$$ such that $$\\cos 2x┬░ = p$$ has EXACTLY TWO solutions\" question is an A* trap, and why is \"$$-1 < p < 1$$\" wrong?", "answer": "- Step 1: Trigger: \"exactly two solutions\" on an interval that's MORE than one full period.\n- Step 2: On $$0 \\le x \\le 225$$, the curve $$\\cos 2x┬░$$ goes $$(0,1) \\downarrow (90,-1) \\uparrow (180,1) \\downarrow (225,0)$$ ŌĆö that's THREE monotonic pieces.\n- Step 3: A horizontal line $$y=p$$ with $$0 \\le p < 1$$ cuts ALL three pieces ŌåÆ 3 solutions, not 2. The naive answer $$-1<p<1$$ overcounts.\n- Step 4: Correct range: $$-1 < p < 0$$ (line cuts only the first two pieces, missing the third) OR $$p = 1$$ (touches the two maxima at $$x=0$$ and $$x=180$$ ŌĆö exactly two).\n\nStrategy: split the curve into monotonic pieces and count how many pieces a line at each height crosses.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_7", "judge_pick": false}, {"question": "What's the rule for the horizontal scaling of $$y = f(ax)$$, and how do you avoid getting \"stretch\" vs \"squash\" the wrong way round?", "answer": "- Step 1: $$y = f(ax)$$ is a horizontal stretch with scale factor $$1/a$$ (NOT $$a$$).\n- Step 2: If $$a > 1$$, $$1/a < 1$$ ŌåÆ the graph SQUASHES toward the y-axis (period shrinks).\n- Step 3: Anchor mapping: every point $$(x, y)$$ on $$f$$ maps to $$(x/a, y)$$ on $$f(ax)$$. Try $$a=2$$: $$(x,y) \\to (x/2, y)$$ ŌĆö x-coordinates halve ŌåÆ squash. Confirms it.\n\nMnemonic: \"the $$a$$ goes UNDERNEATH the $$x$$\" when scaling ŌĆö so the factor is $$1/a$$.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_8", "judge_pick": false}, {"question": "For $$y = \\cos 2x┬░$$, what's the period, and where are the new max, min, and zeros for the first cycle?", "answer": "- Step 1: Period $$= 360/2 = 180┬░$$.\n- Step 2: Apply the mapping $$(x,y) \\to (x/2, y)$$ to cosine landmarks $$(0,1),(90,0),(180,-1),(270,0),(360,1)$$ ŌåÆ new landmarks $$(0,1),(45,0),(90,-1),(135,0),(180,1)$$.\n- Step 3: So min is at $$(90┬░, -1)$$, zeros at $$x = 45┬░, 135┬░, 225┬░, \\ldots$$, max at $$0┬░, 180┬░, 360┬░, \\ldots$$.\n\nTrick: don't re-derive ŌĆö just halve every x-coordinate of the cos landmarks.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_9", "judge_pick": false}, {"question": "P1 June 12 Q5 ŌĆö for $$f(x) = \\cos 2x┬░$$ on $$0 \\le x \\le k$$ with minimum $$Q$$ and third zero $$R(k,0)$$, what are $$Q$$ and $$k$$? What was the on-the-board error?", "answer": "- Step 1: Min: $$2x = 180 \\Rightarrow x=90$$, so $$Q = (90┬░, -1)$$.\n- Step 2: Zeros at $$2x = 90, 270, 450 \\Rightarrow x = 45, 135, 225$$. Third zero gives $$k = 225$$.\n- Step 3: Error: the board first wrote $$k=270$$ ŌĆö but $$x=270$$ corresponds to the NEXT MINIMUM ($$2x=540$$), not an x-intercept.\n\nLesson: always re-derive zeros from $$2x = 90 + 180n$$; don't guess from the unsquashed graph.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_10", "judge_pick": true}, {"question": "P1 June 14 Q9(a) ŌĆö for $$y = 4\\sin\\theta$$, why is answering \"$$-4$$\" for the minimum point wrong, and what is the correct answer?", "answer": "- Step 1: Question said \"coordinates of the minimum point\" ŌĆö that demands a POINT $$(x,y)$$, not a value.\n- Step 2: Minimum of $$4\\sin\\theta$$ occurs where $$\\sin\\theta = -1$$, i.e. $$\\theta = 270┬░$$, value $$-4$$.\n- Step 3: Correct answer: $$(270┬░, -4)$$. Writing just \"$$-4$$\" loses the second B-mark.\n\nExam habit: underline \"coordinates\" ŌĆö it forces the $$(x,y)$$ pair.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_11", "judge_pick": true}, {"question": "What's the effect of writing $$y = 1 + \\sin\\theta$$ instead of $$y = \\sin\\theta$$, and what's special about its minimum?", "answer": "- Step 1: Vertical shift UP by 1.\n- Step 2: Range goes from $$[-1,1]$$ to $$[0,2]$$.\n- Step 3: At the minimum ($$\\theta=270┬░$$) the curve TOUCHES the x-axis ($$y=0$$) but never crosses it ŌĆö single contact point.\n\nThis is why $$y = 1+\\sin\\theta$$ never has solutions to \"$$=$$ something negative\" ŌĆö it's always $$\\ge 0$$.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_12", "judge_pick": true}, {"question": "What's the trigger phrase that forces you to write a \"state and reason\" sentence in trig-graph exam questions, and what's the required template?", "answer": "- Step 1: Trigger: \"State the number of solutions, giving a reason\" (or \"explain why\").\n- Step 2: Template: \"There are $$N$$ solutions because the graph of $$y = \\text{[curve 1]}$$ intersects the graph of $$y = \\text{[curve 2]}$$ $$N$$ times in the interval given.\"\n- Step 3: Must NAME both curves explicitly AND mention the interval ŌĆö examiners want all three elements.\n\nA bare number loses the reason mark even if numerically correct.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_13", "judge_pick": true}, {"question": "What's the general strategy for counting solutions of \"periodic-vs-periodic\" trig equations like $$\\tan\\theta = 1+\\sin\\theta$$ on a huge interval? (5 steps)", "answer": "- Step 1: Identify the LONGER period ŌĆö here $$1+\\sin\\theta$$ has period $$360┬░$$, tan has $$180┬░$$, so use $$360┬░$$ as the repeat unit.\n- Step 2: Sketch carefully on ONE period $$[0, 360┬░]$$ and count the intersections (say $$S$$).\n- Step 3: Count whole periods in the interval: $$\\lfloor \\text{length}/360 \\rfloor$$.\n- Step 4: Multiply: $$S \\times (\\text{whole periods})$$.\n- Step 5: Adjust for the leftover end-piece by sketching it and counting intersections there directly.\n\nExample: on $$0 \\le \\theta \\le 1980┬░$$ = $$5$$ full periods + $$180┬░$$ leftover, answer = $$5S + (\\text{count on final } 180┬░)$$.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_14", "judge_pick": true}, {"question": "Why must you watch open vs closed endpoints ($$<$$ vs $$\\le$$) when counting solutions on an interval?", "answer": "- Step 1: A solution lying EXACTLY at an endpoint contributes only if that endpoint is included.\n- Step 2: Example: tan zeros at $$x = n\\pi$$ ŌĆö if the interval is $$-2\\pi \\le x < 2\\pi$$, $$x=-2\\pi$$ counts but $$x=2\\pi$$ does NOT.\n- Step 3: This can shift your count by 1 or 2 ŌĆö a costly slip.\n\nHabit: re-read the inequality signs immediately before stating the final count.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_15", "judge_pick": true}, {"question": "P1 June 14 Q7b adjacent slip ŌĆö when the question says \"obtuse angle\" and your calculator gives $$\\sin^{-1}(\\ldots) = 0.884$$ rad, what do you do?", "answer": "- Step 1: $$\\sin^{-1}$$ only returns values in $$[-\\pi/2, \\pi/2]$$ ŌĆö i.e. acute angles only.\n- Step 2: For an obtuse angle (between $$\\pi/2$$ and $$\\pi$$), use the \"supplement\" branch: $$\\pi - (\\text{acute})$$.\n- Step 3: So obtuse $$= \\pi - 0.884 = 2.258$$ rad.\n\nHabit: underline \"obtuse\" ŌĆö it's the trigger to flip into the second-quadrant solution.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_16", "judge_pick": true}, {"question": "Why do $$\\sin x$$ and $$\\tan x$$ share the SAME x-axis crossings, while $$\\cos x$$ has different ones?", "answer": "- Step 1: $$\\tan x = \\sin x / \\cos x$$ ŌĆö so $$\\tan x = 0$$ iff $$\\sin x = 0$$ (numerator), giving $$x = n\\pi$$ for both.\n- Step 2: $$\\cos x = 0$$ at $$x = \\pi/2 + n\\pi$$ ŌĆö offset by $$\\pi/2$$ from sine's zeros.\n- Step 3: Same offset of $$\\pi/2$$ that makes $$\\cos x = \\sin(x+\\pi/2)$$ ŌĆö the whole cosine pattern is shifted left by $$\\pi/2$$.\n\nBonus insight: cosine's zeros are exactly tan's asymptotes.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_17", "judge_pick": true}, {"question": "What's the odd/even symmetry of each of $$\\sin$$, $$\\cos$$, $$\\tan$$, and what does this mean geometrically?", "answer": "- Step 1: $$\\sin(-x) = -\\sin x$$ ŌĆö ODD, rotational symmetry about the origin.\n- Step 2: $$\\cos(-x) = \\cos x$$ ŌĆö EVEN, mirror symmetry about the y-axis.\n- Step 3: $$\\tan(-x) = -\\tan x$$ ŌĆö ODD (since $$\\tan = \\sin/\\cos = $$ odd/even $$=$$ odd), rotational symmetry about origin.\n\nMemory hook: cosine is the EVEN sibling; sine and tan are ODD twins.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_18", "judge_pick": true}, {"question": "Why does $$y = \\tan x$$ have NO maximum or minimum, while $$\\sin x$$ and $$\\cos x$$ are bounded by $$\\pm 1$$?", "answer": "- Step 1: $$\\sin x$$ and $$\\cos x$$ are coordinates on the unit circle ŌĆö they're always between $$-1$$ and $$1$$.\n- Step 2: $$\\tan x = \\sin x / \\cos x$$ ŌĆö as $$\\cos x \\to 0$$, $$\\tan x \\to \\pm \\infty$$ (division by something tiny).\n- Step 3: So $$\\tan$$ achieves every real value on each branch; the range is $$(-\\infty, \\infty)$$ with no extreme.\n\nThis is why \"max/min\" questions only ever apply to $$\\sin$$ and $$\\cos$$.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_19", "judge_pick": true}, {"question": "What's Harry's \"rhythm rule\" for the tangent graph, and how do you use it to sketch quickly?", "answer": "- Step 1: Rhythm: \"something interesting happens every $$90┬░$$ (every $$\\pi/2$$)\" ŌĆö alternating zero, asymptote, zero, asymptoteŌĆ”\n- Step 2: Starting from $$x=0$$: zero at $$0$$, asymptote at $$\\pi/2$$, zero at $$\\pi$$, asymptote at $$3\\pi/2$$, zero at $$2\\pi$$, ...\n- Step 3: Use it to label landmarks before drawing branches: place dashed asymptotes first, then draw the S-curve between each pair.\n\nThis guarantees you don't accidentally swap zeros and asymptotes.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_20", "judge_pick": false}, {"question": "For $$y = \\tan x$$ on $$-2\\pi \\le x < 2\\pi$$, what's the rightmost vertical asymptote, and how do you find it quickly?", "answer": "- Step 1: Asymptotes occur at $$x = (2n+1)\\pi/2$$.\n- Step 2: The candidates in $$[-2\\pi, 2\\pi)$$ are $$\\pm \\pi/2, \\pm 3\\pi/2$$ ŌĆö the largest under $$2\\pi$$ is $$3\\pi/2$$ (since $$3\\pi/2 \\approx 4.71 < 2\\pi \\approx 6.28$$, while $$5\\pi/2 \\approx 7.85 > 2\\pi$$).\n- Step 3: So $$l: x = 3\\pi/2$$.\n\nTrick: compare candidates to $$2\\pi$$ as decimals if you're unsure.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_21", "judge_pick": false}, {"question": "What's the recipe for sketching $$y = a\\sin(bx)$$, and which transformations interact?", "answer": "- Step 1: The \"$$a$$\" is a vertical stretch ŌĆö range becomes $$[-a, a]$$. Max/min y-values scale, x-coordinates of max/min UNCHANGED.\n- Step 2: The \"$$b$$\" is a horizontal squash by factor $$1/b$$ ŌĆö period becomes $$360┬░/b$$. x-coordinates of zeros, max, min all DIVIDE by $$b$$.\n- Step 3: They don't interfere: $$a$$ only touches y-values, $$b$$ only touches x-values.\n\nExample: $$y = 4\\sin(2x)$$ ŌåÆ range $$[-4,4]$$, period $$180┬░$$, min at $$(135┬░, -4)$$ (was $$(270┬░, -1)$$ ŌåÆ divide x by 2, multiply y by 4).", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_22", "judge_pick": true}, {"question": "Why does the line $$y = 1 + \\sin\\theta$$ make EXTRA intersections with $$\\tan\\theta$$ compared to $$y = \\sin\\theta$$? (Conceptual.)", "answer": "- Step 1: $$\\sin\\theta$$ and $$\\tan\\theta$$ both start at origin, both rise ŌĆö near $$\\theta=0$$ they're close; intersection there only at $$\\theta=0$$ essentially.\n- Step 2: Adding $$+1$$ lifts the sine curve up, so it now sits at height between $$0$$ and $$2$$ ŌĆö well within tan's range on every branch.\n- Step 3: Each tan branch (sweeping $$-\\infty$$ to $$+\\infty$$) must cross any horizontal-ish curve at that height at least once, often more if the branch is steep at the right place.\n\nKey intuition: lifting a bounded curve into the \"operating range\" of tan creates intersections on every branch.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_23", "judge_pick": true}, {"question": "What's the universal \"count solutions\" strategy summarised in one sentence, and what are the 5 sub-steps? (5 steps)", "answer": "- Step 1: Find the REPEATING UNIT (one period for periodic-vs-periodic; one $$\\pi$$-branch for tan-vs-near-horizontal).\n- Step 2: Sketch carefully and count solutions in ONE unit, checking BELOW the x-axis near any pole.\n- Step 3: Count how many whole units fit in the interval (length/unit-length, take floor).\n- Step 4: Multiply: $$(\\text{per unit}) \\times (\\text{whole units})$$.\n- Step 5: Adjust by hand for the leftover end-piece, watching open/closed endpoints.\n\nOne-sentence summary: \"Per-unit count ├Ś number of units + leftover adjustment.\"", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_24", "judge_pick": true}, {"question": "Without computing, why does $$\\tan x = 1/x + 1$$ on $$0 \\le x \\le 40\\pi$$ give EXACTLY 40 (and not 39 or 41)?", "answer": "- Step 1: The interval $$[0, 40\\pi]$$ contains exactly 40 tan branches (one per $$\\pi$$-interval) ŌĆö well, it contains branches at $$(\\pi/2, 3\\pi/2), (3\\pi/2, 5\\pi/2), \\ldots$$ ŌĆö but more importantly, 40 zeros at $$0, \\pi, 2\\pi, \\ldots, 40\\pi$$.\n- Step 2: For each of the 40 monotonic branches (each sweeping $$-\\infty$$ to $$\\infty$$), the near-horizontal line $$y \\approx 1$$ is hit exactly once (IVT).\n- Step 3: Near $$x=0$$ the curve $$1/x+1$$ shoots to $$+\\infty$$, so the first branch still gets one intersection (just at a finite point near $$x=0$$), and large-$$x$$ branches all behave near-horizontally ŌĆö no doubles.\n\nAnswer: $$40$$.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_25", "judge_pick": false}, {"question": "What's the common misconception about how the graph of $$y = \\cos(2x┬░)$$ differs from $$y = \\cos(x┬░)$$, and how do you fix it on the spot?", "answer": "- Step 1: Misconception: students think \"doubling\" inside the function stretches the graph horizontally (makes it wider).\n- Step 2: Actually $$f(2x)$$ SQUASHES ŌĆö every x-coordinate is HALVED, period shrinks.\n- Step 3: Sanity check: at $$x=180$$, $$\\cos(2\\cdot 180┬░)= \\cos 360┬░ = 1$$. So the curve has completed TWO full waves by $$x=360┬░$$ ŌĆö clearly squashed, not stretched.\n\nPermanent fix: write $$(x,y) \\to (x/a, y)$$ on every sketch.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_26", "judge_pick": true}, {"question": "Why does the equation $$\\cos 2x┬░ = 1$$ on $$[0, 225]$$ have exactly TWO solutions, and what does this tell us about the $$p=1$$ case in the range-of-$$p$$ question?", "answer": "- Step 1: $$\\cos 2x┬░ = 1$$ requires $$2x = 0, 360, 720, \\ldots$$ ŌåÆ $$x = 0, 180, 360, \\ldots$$.\n- Step 2: In $$[0, 225]$$, that's $$x=0$$ and $$x=180$$ only ŌĆö TWO solutions.\n- Step 3: So $$p=1$$ is a valid value where the horizontal line touches the curve exactly twice (at the two maxima). This is why the answer to \"exactly two solutions\" includes the isolated point $$p=1$$, not just an interval.\n\nThe deep insight: \"exactly two\" can be achieved by line strictly between two pieces OR by line tangent at multiple maxima/minima.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_27", "judge_pick": true}, {"question": "What's the value at $$x = 90┬░$$ of each of $$\\sin x$$, $$\\cos x$$, $$\\tan x$$, and which one is undefined and why?", "answer": "- Step 1: $$\\sin 90┬░ = 1$$ ŌĆö its maximum.\n- Step 2: $$\\cos 90┬░ = 0$$ ŌĆö it's at a zero.\n- Step 3: $$\\tan 90┬░ = $$ undefined, because $$\\tan = \\sin/\\cos$$ and $$\\cos 90┬░ = 0$$ ŌĆö division by zero, vertical asymptote.\n\nThis single landmark $$x=90┬░$$ exhibits all three behaviours simultaneously: max, zero, asymptote.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_28", "judge_pick": true}, {"question": "Why is it crucial to sketch BOTH curves and check the region BELOW the x-axis when counting tan-vs-other intersections near a pole?", "answer": "- Step 1: Near a vertical asymptote of a rational curve (like $$1/x+1$$ at $$x=0$$), the curve plunges to $$\\pm\\infty$$.\n- Step 2: If it plunges DOWNWARD (toward $$-\\infty$$) while the adjacent tan branch is climbing through negative values up to $$+\\infty$$, they MUST intersect at some negative $$y$$ ŌĆö below the x-axis.\n- Step 3: A casual sketch only showing the curves where they're \"obviously\" near each other misses this ŌĆö the crossing sits in the lower half-plane and is invisible if you only count where tan is positive.\n\nLesson: extend your sketch's y-range and look beneath the axis. (This is exactly why Phuc got 12 instead of 14.)", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_29", "judge_pick": false}, {"question": "Compare zeros per period for $$\\sin x$$, $$\\cos x$$, $$\\tan x$$ ŌĆö what's the count, and why does tan have FEWER per $$360┬░$$?", "answer": "- Step 1: $$\\sin x$$: zeros at $$0, 180┬░, 360┬░$$ ŌĆö over one period $$[0, 360┬░)$$, 2 zeros (counting only one endpoint).\n- Step 2: $$\\cos x$$: zeros at $$90┬░, 270┬░$$ ŌĆö 2 per period.\n- Step 3: $$\\tan x$$: zero at $$0┬░, 180┬░$$ ŌĆö also 2 in $$[0, 360┬░)$$, but its period is $$180┬░$$ so that's 1 zero PER PERIOD.\n\nInsight: tan and sin have the same zero positions, but tan's \"period\" is half as long, so per-period it has half as many zeros.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_30", "judge_pick": false}, {"question": "What's the difference between the transformation $$y = f(x+a)$$ and $$y = f(x)+a$$, and why does sign convention bite?", "answer": "- Step 1: $$f(x+a)$$: translate LEFT by $$a$$ (inside the function ŌĆö counterintuitive sign).\n- Step 2: $$f(x)+a$$: translate UP by $$a$$ (outside the function ŌĆö natural sign).\n- Step 3: Reason for the inside-flip: to get the same y-value, you need $$x$$ smaller by $$a$$, so the point that USED to be at $$x$$ now appears at $$x-a$$ ŌĆö graph moves left.\n\nQuick check: $$f(x+1)$$ at $$x=0$$ equals $$f(1)$$ ŌĆö so the value $$f$$ HAD at $$1$$ now appears at $$0$$, i.e. shifted LEFT.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_31", "judge_pick": true}, {"question": "For exam questions asking \"find $$k$$ such that $$R(k, 0)$$ is the third x-intercept of $$y = \\cos(2x┬░)$$\", what's the systematic approach? (3 steps)", "answer": "- Step 1: Write the general zero equation: $$\\cos(2x┬░) = 0 \\Leftrightarrow 2x = 90 + 180n$$.\n- Step 2: Solve for x: $$x = 45 + 90n$$ ŌåÆ zeros at $$45, 135, 225, 315, \\ldots$$.\n- Step 3: The \"third\" zero (counting from the leftmost in the domain $$[0, k]$$) is $$x=225$$, so $$k=225$$.\n\nTrap to avoid: confusing the \"third zero\" with the \"third interesting landmark\" (which would include max/min) ŌĆö read the question carefully.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_32", "judge_pick": false}, {"question": "What's the deep reason the formula \"Period of $$\\sin(kx) = 360/k$$\" works ŌĆö derive it from first principles.", "answer": "- Step 1: $$\\sin$$ repeats when its argument advances by $$360┬░$$: $$\\sin(\\theta + 360┬░) = \\sin\\theta$$.\n- Step 2: For $$\\sin(kx)$$, the argument is $$kx$$. We need $$kx$$ to advance by $$360┬░$$, i.e. $$x$$ to advance by $$360/k$$.\n- Step 3: So the smallest positive period in $$x$$ is $$360/k$$ degrees (or $$2\\pi/k$$ radians).\n\nSame logic for tan: period is $$180┬░$$ for $$\\tan x$$, so $$\\tan(kx)$$ has period $$180/k$$ degrees.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_33", "judge_pick": true}, {"question": "What's the \"monotonic piece\" technique for counting solutions of $$f(x) = p$$ on a fixed interval, and when is it the right tool?", "answer": "- Step 1: Split the graph into pieces where $$f$$ is strictly increasing or strictly decreasing ŌĆö i.e. between consecutive max/min.\n- Step 2: On each monotonic piece, a horizontal line $$y=p$$ crosses AT MOST ONCE ŌĆö it crosses iff $$p$$ is between the piece's two endpoint y-values.\n- Step 3: Count pieces where $$p$$ lies in the y-range; that's the number of solutions.\n\nUse it whenever the question asks \"how many solutions does $$f(x) = p$$ have\" or \"find $$p$$ for exactly $$n$$ solutions\" ŌĆö it's the rigorous way to handle endpoint cases like $$p=1$$ touching maxima.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_34", "judge_pick": true}, {"question": "Conceptually, why is $$\\cos x$$ NEVER an asymptote-having function but $$\\sec x = 1/\\cos x$$ would be? (Not directly examined but builds intuition.)", "answer": "- Step 1: $$\\cos x$$ is itself continuous and bounded ŌĆö no division anywhere, so it can't blow up.\n- Step 2: $$\\sec x = 1/\\cos x$$ has a denominator that hits zero at $$x = \\pi/2 + n\\pi$$ ŌĆö same places tan has asymptotes.\n- Step 3: So both $$\\tan$$ and $$\\sec$$ inherit their asymptotes from cosine's zeros.\n\nThis is why zeros of cosine matter so much in trig graphs: they're \"the source\" of all the asymptotes you'll see.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_35", "judge_pick": true}, {"question": "What's the verbal template for \"explain why the graph never crosses the x-axis\" for $$y = 1+\\sin\\theta$$? (Practice exam phrasing.)", "answer": "- Step 1: State the range: \"$$-1 \\le \\sin\\theta \\le 1$$, so $$0 \\le 1+\\sin\\theta \\le 2$$.\"\n- Step 2: State the conclusion: \"Therefore $$y \\ge 0$$ for all $$\\theta$$, so the curve never goes below the x-axis.\"\n- Step 3: Add the contact: \"It touches the x-axis at $$\\theta = 270┬░$$ where $$\\sin\\theta = -1$$, but does not cross.\"\n\nExaminers want the range argument AND the conclusion in the same breath.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_36", "judge_pick": true}, {"question": "Why does Harry call cosine \"the same wave as sine, $$90┬░$$ apart\" ŌĆö what's the rigorous identity, and what's its graphical meaning?", "answer": "- Step 1: Identity: $$\\cos x = \\sin(x + 90┬░)$$, equivalently $$\\sin x = \\cos(x - 90┬░)$$.\n- Step 2: Graphically: the cosine graph is the sine graph translated LEFT by $$90┬░$$ (or sine is cosine translated RIGHT by $$90┬░$$).\n- Step 3: So everything you know about sine landmarks gives you cosine landmarks for free: sin's max at $$90┬░$$ ŌåÆ cos's max at $$90┬░-90┬░=0┬░$$; sin's zero at $$180┬░$$ ŌåÆ cos's zero at $$180┬░-90┬░=90┬░$$.\n\nSaves memorising two sets of landmarks.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_37", "judge_pick": true}, {"question": "For \"exactly two solutions of $$f(x) = p$$\" type questions, what are the TWO geometric situations that give exactly two intersections?", "answer": "- Step 1: Situation A: $$p$$ is strictly between two adjacent extrema, and the line $$y=p$$ cuts exactly two monotonic pieces (the others either miss it entirely or aren't in the domain).\n- Step 2: Situation B: $$p$$ equals an extreme value that the function attains at exactly two points in the domain (line tangent at two maxima, or two minima).\n- Step 3: That's why answers to such questions are often a UNION: an OPEN interval (situation A) plus an ISOLATED point (situation B).\n\nFor $$\\cos 2x┬░$$ on $$[0,225]$$: $$-1<p<0$$ (Situation A) Ōł¬ $$p=1$$ (Situation B).", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_38", "judge_pick": true}, {"question": "What's the quick way to extrapolate \"intersections of two periodic curves\" to a negative-and-positive mixed interval like $$-10\\pi \\le x \\le 5\\pi/2$$?", "answer": "- Step 1: Treat positive and negative parts separately if
