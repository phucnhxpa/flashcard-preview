<script>
const DATA={"selected": [{"question": "Why does $$y = 1/x + 1$$ have horizontal asymptote $$y = 1$$ instead of $$y = 0$$?", "answer": "- Step 1: The parent $$y = 1/x$$ has horizontal asymptote $$y = 0$$.\n- Step 2: The transformation $$f(x) + 1$$ translates the entire graph UP by 1 ŌĆö including the asymptote line itself.\n- Step 3: As $$|x| \\to \\infty$$, $$1/x \\to 0$$ so $$1/x + 1 \\to 1$$, confirming $$y = 1$$ is the new horizontal asymptote.\n\nTakeaway: a \"+ constant\" always shifts horizontal asymptotes; vertical asymptotes (like $$x=0$$ here) are unaffected.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_23"}, {"question": "A horizontal line $$y = 0.5$$ is drawn over $$y = \\sin x$$ on $$[0┬░, 720┬░]$$. How many intersections, by the period-scaling argument?", "answer": "- Step 1: On one period $$[0┬░, 360┬░]$$, $$y = 0.5$$ cuts the sine wave on its way up at $$30┬░$$ and on its way down at $$150┬░$$ ŌĆö that's 2 intersections per period.\n- Step 2: $$[0┬░, 720┬░]$$ contains 2 full periods.\n- Step 3: Total: $$2 \\times 2 = 4$$ intersections.\n\nTakeaway: count per period, then multiply. This is the same logic as the tan-vs-curve extrapolation.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_48"}, {"question": "What is the specific mistake regarding $$f(ax)$$ vs $$f(x/a)$$ transformations, and what is the quick rule to distinguish them?", "answer": "The mistake is confusing whether $$x \\to 2x$$ stretches or squashes. The quick rule: **$$f(ax)$$ applies a horizontal scale factor $$1/a$$** (if $$a>1$$, it SQUASHES); **$$f(x/a)$$ applies a horizontal scale factor $$a$$** (if $$a>1$$, it STRETCHES). Always anchor with $$(x,y) \\mapsto (x/a, y)$$ for $$f(ax)$$.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_34"}, {"question": "What's the difference between the transformation $$y = f(x+a)$$ and $$y = f(x)+a$$, and why does sign convention bite?", "answer": "- Step 1: $$f(x+a)$$: translate LEFT by $$a$$ (inside the function ŌĆö counterintuitive sign).\n- Step 2: $$f(x)+a$$: translate UP by $$a$$ (outside the function ŌĆö natural sign).\n- Step 3: Reason for the inside-flip: to get the same y-value, you need $$x$$ smaller by $$a$$, so the point that USED to be at $$x$$ now appears at $$x-a$$ ŌĆö graph moves left.\n\nQuick check: $$f(x+1)$$ at $$x=0$$ equals $$f(1)$$ ŌĆö so the value $$f$$ HAD at $$1$$ now appears at $$0$$, i.e. shifted LEFT.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_31"}, {"question": "Why does the \"$$p = 1$$\" exact-touch case in $$\\cos 2x┬░ = p$$ on $$[0┬░, 225┬░]$$ give EXACTLY 2 solutions (not 1, not 3)?", "answer": "- Step 1: On $$[0┬░, 225┬░]$$, $$\\cos 2x┬░ = 1$$ requires $$2x = 360┬░n$$, i.e. $$x = 0┬░, 180┬░$$.\n- Step 2: Both lie inside the interval $$[0┬░, 225┬░]$$, giving exactly 2 solutions.\n- Step 3: The next value, $$x = 360┬░$$, is outside the interval, so we don't get a third.\n\nTakeaway: max/min values often deliver discrete \"bonus\" cases in range-of-p questions.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_46"}, {"question": "What's the general strategy for counting solutions of \"periodic-vs-periodic\" trig equations like $$\\tan\\theta = 1+\\sin\\theta$$ on a huge interval? (5 steps)", "answer": "- Step 1: Identify the LONGER period ŌĆö here $$1+\\sin\\theta$$ has period $$360┬░$$, tan has $$180┬░$$, so use $$360┬░$$ as the repeat unit.\n- Step 2: Sketch carefully on ONE period $$[0, 360┬░]$$ and count the intersections (say $$S$$).\n- Step 3: Count whole periods in the interval: $$\\lfloor \\text{length}/360 \\rfloor$$.\n- Step 4: Multiply: $$S \\times (\\text{whole periods})$$.\n- Step 5: Adjust for the leftover end-piece by sketching it and counting intersections there directly.\n\nExample: on $$0 \\le \\theta \\le 1980┬░$$ = $$5$$ full periods + $$180┬░$$ leftover, answer = $$5S + (\\text{count on final } 180┬░)$$.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_14"}, {"question": "What is the core principle for counting the number of solutions to an equation like $$f(x) = g(x)$$ using graphs? (2 steps)", "answer": "- Step 1: Rearrange the equation so both sides are explicit functions: $$y = f(x)$$ and $$y = g(x)$$.\n- Step 2: The number of solutions equals the **number of times the two graphs intersect**. Always SKETCH both curves on the same axes and physically count the crossing points.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_23"}, {"question": "Why does the sine curve $$y = \\sin x$$ pass through the origin while the cosine curve $$y = \\cos x$$ starts at its peak, and how is this captured in a single identity?", "answer": "- Step 1: At $$x=0$$, $$\\sin 0 = 0$$ (origin) and $$\\cos 0 = 1$$ (peak). So sine \"starts climbing from zero\" and cosine \"starts already at the top heading down\".\n- Step 2: The two graphs are literally the same wave, just offset by $$90┬░$$: $$\\cos x = \\sin(x + 90┬░)$$.\n- Step 3: Equivalently, cosine is the sine graph translated LEFT by $$90┬░$$. This is why every sine landmark you know has a cosine twin $$90┬░$$ earlier.\n\nMemory hook: \"sin and tan go through the origin; cos starts at the top.\"", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_0"}, {"question": "June 14 Q9b ŌĆö How does the transformation $$y = 1 + \\sin \\theta$$ affect the graph's position and its relationship to the x-axis? (2 steps)", "answer": "- Step 1: It translates the entire sine wave UP by 1. The new range is $$0 \\le y \\le 2$$.\n- Step 2: Because the minimum value is now exactly 0, the graph **just touches** the x-axis at $$\\theta = 270┬░$$ and never goes below it. This is a critical visual shift from the standard sine wave crossing the axis.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_4"}, {"question": "What's the \"monotonic piece\" technique for counting solutions of $$f(x) = p$$ on a fixed interval, and when is it the right tool?", "answer": "- Step 1: Split the graph into pieces where $$f$$ is strictly increasing or strictly decreasing ŌĆö i.e. between consecutive max/min.\n- Step 2: On each monotonic piece, a horizontal line $$y=p$$ crosses AT MOST ONCE ŌĆö it crosses iff $$p$$ is between the piece's two endpoint y-values.\n- Step 3: Count pieces where $$p$$ lies in the y-range; that's the number of solutions.\n\nUse it whenever the question asks \"how many solutions does $$f(x) = p$$ have\" or \"find $$p$$ for exactly $$n$$ solutions\" ŌĆö it's the rigorous way to handle endpoint cases like $$p=1$$ touching maxima.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_34"}, {"question": "How many solutions does tan x = 1/x + 1 have in ŌłÆ10ŽĆ Ōēż x Ōēż 5ŽĆ/2, and what is the \"odd one out below the axis\" trap? (4 steps)", "answer": "- Step 1: Count ordinary branches: from ŌłÆ10ŽĆ to approximately ŌłÆŽĆ/2, there are 10 complete branches ŌåÆ 10 solutions.\n- Step 2: The branch on (ŌłÆŽĆ/2, 0) is special: as x ŌåÆ 0Ōü║, 1/x + 1 ŌåÆ +Ōł×; as x ŌåÆ 0Ōü╗, 1/x + 1 ŌåÆ ŌłÆŌł×.\n- Step 3: Near x = 0 from the negative side, the curve dives to ŌłÆŌł× while tan rises from ŌłÆŌł× to +Ōł×, so they intersect BELOW the x-axis. This gives 1 additional solution.\n- Step 4: From 0 to 5ŽĆ/2 there are 3 more branches ŌåÆ 3 solutions. Total = 10 + 1 + 3 = 14.\n\nThe trap is missing this below-axis crossing ŌĆö answering 12 instead of 14.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_13"}, {"question": "What's the effect of writing $$y = 1 + \\sin\\theta$$ instead of $$y = \\sin\\theta$$, and what's special about its minimum?", "answer": "- Step 1: Vertical shift UP by 1.\n- Step 2: Range goes from $$[-1,1]$$ to $$[0,2]$$.\n- Step 3: At the minimum ($$\\theta=270┬░$$) the curve TOUCHES the x-axis ($$y=0$$) but never crosses it ŌĆö single contact point.\n\nThis is why $$y = 1+\\sin\\theta$$ never has solutions to \"$$=$$ something negative\" ŌĆö it's always $$\\ge 0$$.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_12"}, {"question": "Why does $$f(ax)$$ with $$a > 1$$ SQUASH the graph horizontally rather than stretch it? (3 steps)", "answer": "- Step 1: To get the same $$y$$ value as the original, the new input must satisfy $$ax = x_{\\text{old}}$$, so $$x_{\\text{new}} = x_{\\text{old}}/a$$.\n- Step 2: Hence each x-coordinate is divided by $$a$$; with $$a > 1$$ this brings points CLOSER to the y-axis.\n- Step 3: Anchor with the point mapping $$(x, y) \\mapsto (x/a, y)$$. If you ever forget, test on a known landmark: $$\\cos 0 = 1$$ stays at $$(0,1)$$; the next zero $$\\cos 90┬░ = 0$$ moves to $$(45┬░, 0)$$ ŌĆö confirming squash.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_9"}, {"question": "What is the period of $$y = \\tan x$$, and why is it HALF the period of $$\\sin x$$ and $$\\cos x$$?", "answer": "- Step 1: Period of $$\\tan x$$ is $$180┬░$$ ($$\\pi$$ rad), whereas $$\\sin x$$ and $$\\cos x$$ both have period $$360┬░$$ ($$2\\pi$$).\n- Step 2: Reason: $$\\tan x = \\sin x / \\cos x$$. After $$180┬░$$ both $$\\sin$$ and $$\\cos$$ flip sign together, so their RATIO is unchanged.\n- Step 3: Consequence: in any interval of width $$\\pi$$, the whole tan pattern (one branch, one zero, one asymptote nearby) repeats.\n\nTakeaway: tan is the \"odd one out\" ŌĆö half the period, infinite range, has asymptotes.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_1"}, {"question": "What is the relationship between the zeros of sin x, cos x, and tan x? (2 steps)", "answer": "- Step 1: sin x and tan x share the same zeros: at x = 0┬░, 180┬░, 360┬░, ... (x = ŽĆn or 180┬░n), because tan x = sin x / cos x and tan x = 0 when sin x = 0.\n- Step 2: cos x zeros are offset by 90┬░: at x = 90┬░, 270┬░, 450┬░, ... (x = ŽĆ/2 + ŽĆn or 90┬░ + 180┬░n). These are exactly where tan x has its asymptotes.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_37"}, {"question": "When counting intersections between y = tan x and y = 1/x + 1, why does the \"odd one out\" branch on the interval (ŌłÆŽĆ/2, 0) catch students out? (3 steps)", "answer": "- Step 1: On most branches, tan x crosses the near-horizontal line y Ōēł 1 *above* the x-axis.\n- Step 2: However, near x = 0, the curve 1/x + 1 dives down to ŌłÆŌł×. As it comes back up to its asymptote y = 1, it intersects the rising tan branch *below* the x-axis.\n- Step 3: Students who only count the obvious crossings near the top of the tan branches miss this lower intersection, leading to an undercount (e.g., answering 12 instead of 14).\n\nTakeaway: Always check for below-axis intersections near the poles of 1/x.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_11"}, {"question": "Edge case: how many solutions does $$\\cos x = -1$$ have on $$[0┬░, 360┬░]$$, and why is it just 1 ŌĆö not 2?", "answer": "- Step 1: $$\\cos x = -1$$ only at $$x = 180┬░ + 360┬░n$$.\n- Step 2: On $$[0┬░, 360┬░]$$, only $$x = 180┬░$$ qualifies.\n- Step 3: This is the touching case ŌĆö the cosine curve reaches its minimum value at exactly one point per period, not two. Compare with $$\\cos x = -0.5$$ which gives 2 solutions per period.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_51"}, {"question": "What is the Intermediate Value Theorem (IVT) argument that guarantees a horizontal line y = c meets each branch of y = tan x exactly once? (2 steps)", "answer": "- Step 1: On each 180┬░-wide branch between two asymptotes, tan x is continuous and strictly increasing from ŌłÆŌł× to +Ōł×.\n- Step 2: By the IVT, since tan x passes through every real number value without doubling back, any horizontal line y = c must intersect that branch exactly once. It cannot miss it, and it cannot hit it twice.\n\nTakeaway: One branch + strictly monotonic sweep from ŌłÆŌł× to +Ōł× = exactly one intersection per horizontal line.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_9"}, {"question": "Why is it INCORRECT to write \"the period of $$\\tan x$$ is $$2\\pi$$\"?", "answer": "- Step 1: The period is the smallest positive $$T$$ with $$\\tan(x + T) = \\tan x$$ for all $$x$$.\n- Step 2: We have $$\\tan(x + \\pi) = \\tan x$$ (since adding $$\\pi$$ flips both sin and cos signs, cancelling in the ratio), and $$\\pi$$ is the smallest such $$T$$.\n- Step 3: $$2\\pi$$ is also a period, but not the **fundamental** period. Conventionally, \"the period\" means the smallest, so $$\\pi$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_47"}, {"question": "How can you tell whether tan x changes sign across an asymptote vs whether it has the same sign on both sides?", "answer": "- Step 1: As $$x$$ increases through an asymptote at $$\\pi/2 + n\\pi$$, $$\\cos x$$ changes sign.\n- Step 2: $$\\sin x$$ is roughly constant near that point (it's at $$\\pm 1$$), so $$\\tan = \\sin/\\cos$$ flips sign too.\n- Step 3: Result: tan jumps from $$+\\infty$$ on the left of an asymptote to $$-\\infty$$ on the right (each branch goes $$-\\infty$$ to $$+\\infty$$). So tan always changes sign across an asymptote.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_37"}, {"question": "Why does the graph of $$y = 1 + \\sin\\theta$$ \"just touch\" the x-axis rather than cross it?", "answer": "- Step 1: The range of $$1 + \\sin\\theta$$ is $$[0, 2]$$ ŌĆö its minimum value is exactly $$0$$.\n- Step 2: The graph reaches $$y = 0$$ only at the single point $$\\theta = 270┬░$$ (per period), and immediately rises away.\n- Step 3: A \"touch\" means the curve is tangent to the x-axis at that point ŌĆö it does not pass through to negative values, unlike a normal sine zero which crosses.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_36"}, {"question": "What's the value at $$x = 90┬░$$ of each of $$\\sin x$$, $$\\cos x$$, $$\\tan x$$, and which one is undefined and why?", "answer": "- Step 1: $$\\sin 90┬░ = 1$$ ŌĆö its maximum.\n- Step 2: $$\\cos 90┬░ = 0$$ ŌĆö it's at a zero.\n- Step 3: $$\\tan 90┬░ = $$ undefined, because $$\\tan = \\sin/\\cos$$ and $$\\cos 90┬░ = 0$$ ŌĆö division by zero, vertical asymptote.\n\nThis single landmark $$x=90┬░$$ exhibits all three behaviours simultaneously: max, zero, asymptote.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_28"}, {"question": "Why does $$y = \\tan x$$ have NO maximum or minimum, while $$\\sin x$$ and $$\\cos x$$ are bounded by $$\\pm 1$$?", "answer": "- Step 1: $$\\sin x$$ and $$\\cos x$$ are coordinates on the unit circle ŌĆö they're always between $$-1$$ and $$1$$.\n- Step 2: $$\\tan x = \\sin x / \\cos x$$ ŌĆö as $$\\cos x \\to 0$$, $$\\tan x \\to \\pm \\infty$$ (division by something tiny).\n- Step 3: So $$\\tan$$ achieves every real value on each branch; the range is $$(-\\infty, \\infty)$$ with no extreme.\n\nThis is why \"max/min\" questions only ever apply to $$\\sin$$ and $$\\cos$$.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_19"}, {"question": "Why does Harry call cosine \"the same wave as sine, $$90┬░$$ apart\" ŌĆö what's the rigorous identity, and what's its graphical meaning?", "answer": "- Step 1: Identity: $$\\cos x = \\sin(x + 90┬░)$$, equivalently $$\\sin x = \\cos(x - 90┬░)$$.\n- Step 2: Graphically: the cosine graph is the sine graph translated LEFT by $$90┬░$$ (or sine is cosine translated RIGHT by $$90┬░$$).\n- Step 3: So everything you know about sine landmarks gives you cosine landmarks for free: sin's max at $$90┬░$$ ŌåÆ cos's max at $$90┬░-90┬░=0┬░$$; sin's zero at $$180┬░$$ ŌåÆ cos's zero at $$180┬░-90┬░=90┬░$$.\n\nSaves memorising two sets of landmarks.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_37"}, {"question": "Why does the Intermediate Value Theorem (IVT) guarantee that a horizontal line $$y = c$$ meets each tan-branch exactly ONCE?", "answer": "- Step 1: On each open branch (between consecutive asymptotes), $$\\tan x$$ is **continuous** and **strictly increasing** from $$-\\infty$$ to $$+\\infty$$.\n- Step 2: IVT says: for any value $$c$$ between $$-\\infty$$ and $$+\\infty$$, there exists at least one $$x$$ on the branch with $$\\tan x = c$$.\n- Step 3: Strict monotonicity makes this $$x$$ **unique** ŌĆö exactly one intersection per branch.\n\nTakeaway: this is the engine that makes counting tan-vs-flat-line intersections so easy: count the branches.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_17"}, {"question": "P1 June 14 Q7b adjacent slip ŌĆö when the question says \"obtuse angle\" and your calculator gives $$\\sin^{-1}(\\ldots) = 0.884$$ rad, what do you do?", "answer": "- Step 1: $$\\sin^{-1}$$ only returns values in $$[-\\pi/2, \\pi/2]$$ ŌĆö i.e. acute angles only.\n- Step 2: For an obtuse angle (between $$\\pi/2$$ and $$\\pi$$), use the \"supplement\" branch: $$\\pi - (\\text{acute})$$.\n- Step 3: So obtuse $$= \\pi - 0.884 = 2.258$$ rad.\n\nHabit: underline \"obtuse\" ŌĆö it's the trigger to flip into the second-quadrant solution.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_16"}, {"question": "Where are the vertical asymptotes of $$y = \\tan x$$ located, expressed as a single formula in radians, and WHY are they there?", "answer": "- Step 1: Asymptotes at $$x = \\dfrac{(2n+1)\\pi}{2}$$ for integer $$n$$ ŌĆö i.e. $$\\pm \\pi/2, \\pm 3\\pi/2, \\pm 5\\pi/2, \\ldots$$.\n- Step 2: Reason: $$\\tan x = \\sin x / \\cos x$$ blows up exactly where the denominator $$\\cos x = 0$$.\n- Step 3: And $$\\cos x = 0$$ at every odd multiple of $$\\pi/2$$.\n\nMemory hook: \"Where $$\\cos$$ is zero, $$\\tan$$ blows up; where $$\\sin$$ is zero, $$\\tan$$ is zero.\"", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_2"}, {"question": "P1 June 14 Q9(a) ŌĆö for $$y = 4\\sin\\theta$$, why is answering \"$$-4$$\" for the minimum point wrong, and what is the correct answer?", "answer": "- Step 1: Question said \"coordinates of the minimum point\" ŌĆö that demands a POINT $$(x,y)$$, not a value.\n- Step 2: Minimum of $$4\\sin\\theta$$ occurs where $$\\sin\\theta = -1$$, i.e. $$\\theta = 270┬░$$, value $$-4$$.\n- Step 3: Correct answer: $$(270┬░, -4)$$. Writing just \"$$-4$$\" loses the second B-mark.\n\nExam habit: underline \"coordinates\" ŌĆö it forces the $$(x,y)$$ pair.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_11"}, {"question": "What is the general formula for the x-coordinates of the maximum and minimum points of y = sin x, and why do they alternate every 180┬░? (2 steps)", "answer": "- Step 1: Maximum +1 at x = 90┬░ + 360┬░n (or $$\\pi/2 + 2\\pi n$$); Minimum ŌłÆ1 at x = 270┬░ + 360┬░n (or $$3\\pi/2 + 2\\pi n$$).\n- Step 2: The wave completes a full oscillation (peak ŌåÆ trough ŌåÆ peak) over its 360┬░ period. Because the peak and trough are opposite phases of the same oscillation, they are separated by half the period (180┬░), causing them to alternate.\n\nTakeaway: Max and min are locked into a 180┬░ alternating rhythm.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_1"}, {"question": "What's the difference between $$\\cos(2x┬░)$$ squashing the graph vs $$\\cos(x┬░/2)$$ stretching it ŌĆö and how do you avoid confusing them?", "answer": "- Step 1: $$\\cos(2x┬░)$$: here $$a = 2$$, scale factor $$1/a = 1/2$$, so it SQUASHES (period halves to $$180┬░$$).\n- Step 2: $$\\cos(x┬░/2)$$: here $$a = 1/2$$, scale factor $$1/a = 2$$, so it STRETCHES (period doubles to $$720┬░$$).\n- Step 3: Anchor: check what happens to the first zero of cos (originally at $$90┬░$$). For $$\\cos(2x┬░)$$: first zero at $$x = 45┬░$$ (closer, squashed). For $$\\cos(x┬░/2)$$: first zero at $$x = 180┬░$$ (further, stretched).", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_41"}, {"question": "For \"exactly two solutions of $$f(x) = p$$\" type questions, what are the TWO geometric situations that give exactly two intersections?", "answer": "- Step 1: Situation A: $$p$$ is strictly between two adjacent extrema, and the line $$y=p$$ cuts exactly two monotonic pieces (the others either miss it entirely or aren't in the domain).\n- Step 2: Situation B: $$p$$ equals an extreme value that the function attains at exactly two points in the domain (line tangent at two maxima, or two minima).\n- Step 3: That's why answers to such questions are often a UNION: an OPEN interval (situation A) plus an ISOLATED point (situation B).\n\nFor $$\\cos 2x┬░$$ on $$[0,225]$$: $$-1<p<0$$ (Situation A) Ōł¬ $$p=1$$ (Situation B).", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_38"}, {"question": "What's the role of monotonic-piece counting when a question asks \"for what values of $$p$$ does $$f(x) = p$$ have exactly $$n$$ solutions\"?", "answer": "- Step 1: Each monotonic piece can supply AT MOST one solution to $$f(x) = p$$ (because on a monotonic piece, $$f$$ takes each value at most once).\n- Step 2: Count pieces, then for each horizontal band of $$p$$ values, ask: how many pieces does $$y = p$$ cross?\n- Step 3: Exact-touch cases ($$p$$ = a turning-point value) often contribute exactly one isolated $$p$$-value that gives a borderline count ŌĆö handle them separately.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_45"}, {"question": "What's the odd/even symmetry of each of $$\\sin$$, $$\\cos$$, $$\\tan$$, and what does this mean geometrically?", "answer": "- Step 1: $$\\sin(-x) = -\\sin x$$ ŌĆö ODD, rotational symmetry about the origin.\n- Step 2: $$\\cos(-x) = \\cos x$$ ŌĆö EVEN, mirror symmetry about the y-axis.\n- Step 3: $$\\tan(-x) = -\\tan x$$ ŌĆö ODD (since $$\\tan = \\sin/\\cos = $$ odd/even $$=$$ odd), rotational symmetry about origin.\n\nMemory hook: cosine is the EVEN sibling; sine and tan are ODD twins.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_18"}, {"question": "For the question \"$$\\tan x = \\frac{1}{x} + 1$$ on $$0 \\le x \\le 40\\pi$$, how many solutions?\", what's the strategy that gives the answer almost instantly?", "answer": "- Step 1: Recognise $$y = \\frac{1}{x}+1$$ is nearly horizontal at height $$y \\approx 1$$ for moderate-to-large $$x$$ (horizontal asymptote $$y=1$$).\n- Step 2: Each $$\\pi$$-wide branch of $$\\tan x$$ meets a near-horizontal line exactly once (IVT, one-per-branch).\n- Step 3: Length of interval $$/ \\pi = 40\\pi/\\pi = 40$$ branches, so $$40$$ solutions.\n\nThe trick: don't try to solve ŌĆö count branches.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_4"}, {"question": "What's the formula for the period of $$\\sin(kx)$$, $$\\cos(kx)$$, and $$\\tan(kx)$$?", "answer": "- Step 1: $$\\sin(kx)$$ and $$\\cos(kx)$$: period $$= 360┬░/k = 2\\pi/k$$.\n- Step 2: $$\\tan(kx)$$: period $$= 180┬░/k = \\pi/k$$ (because tan's base period is $$\\pi$$, half of sine's).\n- Step 3: The pattern: divide the base period by $$k$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_31"}, {"question": "What's the verbal template for \"explain why the graph never crosses the x-axis\" for $$y = 1+\\sin\\theta$$? (Practice exam phrasing.)", "answer": "- Step 1: State the range: \"$$-1 \\le \\sin\\theta \\le 1$$, so $$0 \\le 1+\\sin\\theta \\le 2$$.\"\n- Step 2: State the conclusion: \"Therefore $$y \\ge 0$$ for all $$\\theta$$, so the curve never goes below the x-axis.\"\n- Step 3: Add the contact: \"It touches the x-axis at $$\\theta = 270┬░$$ where $$\\sin\\theta = -1$$, but does not cross.\"\n\nExaminers want the range argument AND the conclusion in the same breath.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_36"}, {"question": "What's the trigger phrase / sketch cue that should make you suspect a \"below-the-axis crossing near a pole\" trap when counting intersections?", "answer": "- Step 1: When one curve has a vertical asymptote (e.g. $$y = 1/x + 1$$ at $$x = 0$$) and the other is unbounded (e.g. $$\\tan x$$), look at what happens **as you approach the pole from each side**.\n- Step 2: On one side, the rational curve plunges to $$-\\infty$$ while a tan branch sweeps $$-\\infty$$ to $$+\\infty$$ ŌĆö they can meet BELOW the x-axis.\n- Step 3: Trigger: always check if the standard \"above-axis\" count missed an extra crossing on the interval $$(-\\pi/2, 0)$$ or similar near-pole stretches.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_22"}, {"question": "Suppose you're told $$y = 4 + \\tan x$$. Where are the asymptotes, and where are the new zeros?", "answer": "- Step 1: Asymptotes: where $$\\tan x$$ blows up, i.e. $$x = (2n+1)\\pi/2$$ ŌĆö UNCHANGED by the \"+4\" vertical shift.\n- Step 2: Zeros: solve $$4 + \\tan x = 0 \\Rightarrow \\tan x = -4$$. By IVT, this gives exactly one solution per branch (since $$-4$$ is finite and tan is monotonic on each branch).\n- Step 3: So asymptotes stay put; zeros shift away from $$n\\pi$$ to wherever $$\\tan x = -4$$.\n\nTakeaway: vertical shifts don't move vertical asymptotes but DO move zeros.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_44"}, {"question": "Why does the curve $$y = \\frac{1}{x} + 1$$ intersect every branch of $$y = \\tan x$$ exactly once, even though it isn't a perfectly flat horizontal line? (2 steps)", "answer": "- Step 1: For large $$|x|$$, the term $$\\frac{1}{x}$$ shrinks to near-zero, making $$y = \\frac{1}{x} + 1$$ behave like a near-horizontal line at height $$y \\approx 1$$.\n- Step 2: Since each $$\\tan x$$ branch sweeps continuously from $$-\\infty$$ to $$+\\infty$$ (IVT), it must cross this near-horizontal line exactly once, regardless of the slight wobble in the hyperbola.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_25"}, {"question": "What's the visual difference between how sine and cosine cross the x-axis, and why does it matter for counting?", "answer": "- Step 1: Both crossings are **transversal** (curve passes through the axis with nonzero gradient): $$\\sin'$$ and $$\\cos'$$ are nonzero at their zeros.\n- Step 2: They differ only in LOCATION: sine zeros at $$n\\pi$$ (including the origin), cosine zeros at $$\\pi/2 + n\\pi$$ (offset by $$90┬░$$).\n- Step 3: For counting, this offset matters for endpoint-inclusion: on $$[0┬░, 360┬░]$$, sine catches BOTH endpoints (3 zeros), but cosine catches neither (2 zeros).", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_50"}, {"question": "Why does the line $$y = 1 + \\sin\\theta$$ make EXTRA intersections with $$\\tan\\theta$$ compared to $$y = \\sin\\theta$$? (Conceptual.)", "answer": "- Step 1: $$\\sin\\theta$$ and $$\\tan\\theta$$ both start at origin, both rise ŌĆö near $$\\theta=0$$ they're close; intersection there only at $$\\theta=0$$ essentially.\n- Step 2: Adding $$+1$$ lifts the sine curve up, so it now sits at height between $$0$$ and $$2$$ ŌĆö well within tan's range on every branch.\n- Step 3: Each tan branch (sweeping $$-\\infty$$ to $$+\\infty$$) must cross any horizontal-ish curve at that height at least once, often more if the branch is steep at the right place.\n\nKey intuition: lifting a bounded curve into the \"operating range\" of tan creates intersections on every branch.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_23"}, {"question": "Which of sin, cos, tan have asymptotes, and which have unbounded range?", "answer": "- Step 1: Only $$\\tan$$ has asymptotes (vertical, at odd multiples of $$\\pi/2$$).\n- Step 2: Only $$\\tan$$ has unbounded range ŌĆö all real numbers.\n- Step 3: Both $$\\sin$$ and $$\\cos$$ are defined everywhere and bounded in $$[-1, 1]$$. **Tan is the odd one out.**", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_20"}, {"question": "Why must you watch open vs closed endpoints ($$<$$ vs $$\\le$$) when counting solutions on an interval?", "answer": "- Step 1: A solution lying EXACTLY at an endpoint contributes only if that endpoint is included.\n- Step 2: Example: tan zeros at $$x = n\\pi$$ ŌĆö if the interval is $$-2\\pi \\le x < 2\\pi$$, $$x=-2\\pi$$ counts but $$x=2\\pi$$ does NOT.\n- Step 3: This can shift your count by 1 or 2 ŌĆö a costly slip.\n\nHabit: re-read the inequality signs immediately before stating the final count.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_15"}, {"question": "Why does $$\\sin^{-1}$$ only return acute angles, and how do you find the OBTUSE angle whose sine is the same?", "answer": "- Step 1: The principal range of $$\\sin^{-1}$$ is $$[-90┬░, 90┬░]$$ ($$[-\\pi/2, \\pi/2]$$), which contains only acute (or zero) angles for positive sine values.\n- Step 2: Since $$\\sin(180┬░ - \\theta) = \\sin\\theta$$, the obtuse angle with the same sine is $$180┬░ - (\\text{acute answer})$$.\n- Step 3: In radians: obtuse $$= \\pi - (\\text{acute})$$. Example: if calculator gives $$0.884$$ rad, obtuse is $$\\pi - 0.884 \\approx 2.258$$ rad.\n\nTrigger: underline \"obtuse\" in any trig question to avoid the slip.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_32"}, {"question": "What's the conceptual difference between \"x-axis crossings\" and \"curveŌĆōcurve intersections\" ŌĆö and what's the unifying principle?", "answer": "- Step 1: x-axis crossings: solutions of $$f(x) = 0$$, where the curve meets the line $$y = 0$$.\n- Step 2: CurveŌĆōcurve intersections: solutions of $$f(x) = g(x)$$, where the two curves meet.\n- Step 3: Unifying principle: x-axis crossings are just a special case of curveŌĆōcurve intersection where $$g(x) = 0$$ (the x-axis is itself a curve). Both are counted by **sketching and counting visual intersections**.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_38"}, {"question": "What's the simplest mental check that $$f(ax)$$ with $$a > 1$$ squashes, using a single landmark?", "answer": "- Step 1: Take any landmark $$(x_0, y_0)$$ on the original ŌĆö say the first zero of $$\\cos$$ at $$(90┬░, 0)$$.\n- Step 2: It moves to $$(x_0/a, y_0)$$ ŌĆö for $$\\cos 2x┬░$$ that's $$(45┬░, 0)$$.\n- Step 3: $$45┬░ < 90┬░$$, so the landmark moved CLOSER to the y-axis: confirms squash.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_42"}, {"question": "What is the range and period of $$y = \\sin x$$, and at which $$x$$-values does it reach its maximum and minimum?", "answer": "- Step 1: Range: $$-1 \\le \\sin x \\le 1$$ (amplitude 1).\n- Step 2: Period: $$360┬░$$ ($$2\\pi$$ radians) ŌĆö the entire pattern repeats every $$360┬░$$.\n- Step 3: Maxima at $$x = 90┬░ + 360┬░n$$ ($$\\pi/2 + 2\\pi n$$); minima at $$x = 270┬░ + 360┬░n$$ ($$3\\pi/2 + 2\\pi n$$).", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_1"}, {"question": "In the count \"$$\\tan x = 1/x + 1$$ on $$-10\\pi \\le x \\le 5\\pi/2$$\", why is the answer 14 (not 12)? What's the \"odd one out\"?", "answer": "- Step 1: On $$(-\\pi/2, 0)$$, near $$x=0$$ the curve $$1/x + 1$$ dives to $$-\\infty$$ (because $$1/x \\to -\\infty$$).\n- Step 2: On this branch, the rising tan branch (going $$-\\infty$$ to $$+\\infty$$) is met by the plunging $$1/x+1$$ curve BELOW the x-axis ŌĆö a crossing that is easy to miss because it sits underneath.\n- Step 3: So the count is $$10$$ ordinary branches (from $$-10\\pi$$ to $$\\approx -\\pi/2$$) + $$1$$ below-axis branch + $$3$$ branches on $$[0, 5\\pi/2]$$ = $$14$$.\n\nLesson: when one curve has a vertical asymptote, ALWAYS check what happens BELOW the x-axis near the pole before counting.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_6"}, {"question": "What is the memory hook that links the zeros and asymptotes of tangent to the zeros of sine and cosine?", "answer": "\"Where sin is 0, tan is 0; where cos is 0, tan blows up.\" Because $$\\tan x = \\frac{\\sin x}{\\cos x}$$, the zeros of tangent are inherited directly from the numerator (sine zeros at $$n\\pi$$), while the vertical asymptotes of tangent are inherited directly from the denominator (cosine zeros at $$\\frac{\\pi}{2} + n\\pi$$).", "source": "GLM 5.1 Ōæó", "_id": "glm_3_21"}, {"question": "Why is the period of \"events\" on the tan graph $$90┬░$$, even though the period of tan itself is $$180┬░$$?", "answer": "- Step 1: Within each $$180┬░$$ period, two distinct events happen: a zero (mid-branch) and an asymptote (at the end).\n- Step 2: They alternate every $$90┬░$$: zero at $$0┬░$$, asymptote at $$90┬░$$, zero at $$180┬░$$, asymptote at $$270┬░$$, ŌĆ”\n- Step 3: So the **landmark spacing** is $$90┬░$$, but the full curve only repeats every $$180┬░$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_40"}, {"question": "What's the deep reason the formula \"Period of $$\\sin(kx) = 360/k$$\" works ŌĆö derive it from first principles.", "answer": "- Step 1: $$\\sin$$ repeats when its argument advances by $$360┬░$$: $$\\sin(\\theta + 360┬░) = \\sin\\theta$$.\n- Step 2: For $$\\sin(kx)$$, the argument is $$kx$$. We need $$kx$$ to advance by $$360┬░$$, i.e. $$x$$ to advance by $$360/k$$.\n- Step 3: So the smallest positive period in $$x$$ is $$360/k$$ degrees (or $$2\\pi/k$$ radians).\n\nSame logic for tan: period is $$180┬░$$ for $$\\tan x$$, so $$\\tan(kx)$$ has period $$180/k$$ degrees.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_33"}, {"question": "Why are the zeros of $$\\tan x$$ the same as the zeros of $$\\sin x$$?", "answer": "- Step 1: $$\\tan x = \\sin x / \\cos x$$ ŌĆö a fraction equals zero iff its numerator is zero (and denominator nonzero).\n- Step 2: $$\\sin x = 0$$ gives $$x = n\\pi$$; at those points, $$\\cos x = \\pm 1 \\ne 0$$, so the fraction is well-defined.\n- Step 3: Hence $$\\tan x = 0$$ iff $$x = n\\pi$$ ŌĆö exactly the sine zeros.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_49"}, {"question": "For the graph $$y = 4\\sin\\theta$$, what is the minimum point ŌĆö and what trap is being tested by asking for the \"minimum point\"?", "answer": "- Step 1: Vertical stretch ├Ś4 maps each $$(x, y)$$ to $$(x, 4y)$$, giving range $$-4 \\le y \\le 4$$.\n- Step 2: The minimum still occurs at $$\\theta = 270┬░$$ (sine's minimum location is unchanged by vertical stretching).\n- Step 3: The trap: \"minimum point\" demands a **coordinate pair** $$(270┬░, -4)$$, NOT the bare value $$-4$$. Underline \"coordinates\" in the question to remember.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_3"}, {"question": "Where does $$y = \\cos x$$ cross the x-axis, and how does this pattern compare to sine's zeros?", "answer": "- Step 1: Zeros of cosine occur at $$x = 90┬░ + 180┬░n$$, i.e. $$90┬░, 270┬░, 450┬░, \\dots$$ ($$\\pi/2 + \\pi n$$).\n- Step 2: Compared to sine (zeros at $$180┬░n$$), cosine's zeros are offset by exactly $$90┬░$$.\n- Step 3: Over $$[0┬░, 360┬░]$$ cosine crosses the x-axis **twice** (at $$90┬░$$ and $$270┬░$$), unlike sine which crosses 3 times because sine's zeros land on the endpoints.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_7"}, {"question": "What's the common misconception about how the graph of $$y = \\cos(2x┬░)$$ differs from $$y = \\cos(x┬░)$$, and how do you fix it on the spot?", "answer": "- Step 1: Misconception: students think \"doubling\" inside the function stretches the graph horizontally (makes it wider).\n- Step 2: Actually $$f(2x)$$ SQUASHES ŌĆö every x-coordinate is HALVED, period shrinks.\n- Step 3: Sanity check: at $$x=180$$, $$\\cos(2\\cdot 180┬░)= \\cos 360┬░ = 1$$. So the curve has completed TWO full waves by $$x=360┬░$$ ŌĆö clearly squashed, not stretched.\n\nPermanent fix: write $$(x,y) \\to (x/a, y)$$ on every sketch.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_26"}, {"question": "What's the trigger phrase that forces you to write a \"state and reason\" sentence in trig-graph exam questions, and what's the required template?", "answer": "- Step 1: Trigger: \"State the number of solutions, giving a reason\" (or \"explain why\").\n- Step 2: Template: \"There are $$N$$ solutions because the graph of $$y = \\text{[curve 1]}$$ intersects the graph of $$y = \\text{[curve 2]}$$ $$N$$ times in the interval given.\"\n- Step 3: Must NAME both curves explicitly AND mention the interval ŌĆö examiners want all three elements.\n\nA bare number loses the reason mark even if numerically correct.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_13"}, {"question": "(P1 June 12 Q5) For \"$$\\cos 2x┬░ = p$$ has exactly TWO solutions on $$0 \\le x \\le 225┬░$$, find the range of $$p$$\" ŌĆö why is the tempting answer $$-1 < p < 1$$ wrong? (4 steps)", "answer": "- Step 1: The curve on $$[0┬░, 225┬░]$$ goes $$(0,1) \\downarrow (90┬░, -1) \\uparrow (180┬░, 1) \\downarrow (225┬░, 0)$$ ŌĆö three **monotonic pieces** (down, up, down).\n- Step 2: A horizontal line $$y = p$$ at a height $$0 \\le p < 1$$ cuts all three monotonic pieces ŌåÆ **3 solutions**, not 2.\n- Step 3: For exactly two intersections, the line must miss one piece. Heights $$-1 < p < 0$$ cut only the first down-piece and the middle up-piece (missing the final short down-piece which only reaches $$y=1$$ down to $$0$$).\n- Step 4: Special exact-touch case: $$p = 1$$ touches the two maxima at $$x = 0$$ and $$x = 180┬░$$ ŌĆö exactly 2 contacts. So: $$-1 < p < 0$$ OR $$p = 1$$.\n\nTakeaway: count monotonic pieces, then count which pieces a horizontal band of $$p$$ values intersects.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_11"}, {"question": "Summarise how each of these transformations affects a graph: $$f(x) + a$$, $$f(x+a)$$, $$f(ax)$$, $$f(x/a)$$, $$a\\cdot f(x)$$.", "answer": "- Step 1: $$f(x) + a$$: translate UP by $$a$$ (horizontal asymptote moves up; vertical asymptote unchanged).\n- Step 2: $$f(x+a)$$: translate LEFT by $$a$$.\n- Step 3: $$f(ax)$$: horizontal stretch, **scale factor $$1/a$$**. If $$a > 1$$ this squashes toward y-axis; period of $$\\sin/\\cos$$ becomes $$360┬░/a$$.\n- Step 4: $$f(x/a)$$: horizontal stretch, scale factor $$a$$ (widens; period grows).\n- Step 5: $$a\\cdot f(x)$$: vertical stretch by factor $$a$$ (range scales: e.g. $$4\\sin\\theta$$ has range $$\\pm 4$$).", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_30"}, {"question": "(P1 June 12 Q4c/ii) Why is the count for $$\\tan x = 1/x + 1$$ on $$-10\\pi \\le x \\le 5\\pi/2$$ equal to **14**, not 12 ŌĆö and what is the trap?", "answer": "- Step 1: Count 10 ordinary tan-branches from $$-10\\pi$$ up to roughly $$-\\pi/2$$ ŌĆö each meets the near-1 line once: 10 intersections.\n- Step 2: The **\"odd one out below the axis\"** lives on $$(-\\pi/2, 0)$$: as $$x \\to 0^-$$, $$1/x + 1 \\to -\\infty$$; as $$x \\to (-\\pi/2)^+$$, $$\\tan x \\to -\\infty$$ too. The rising tan branch and the diving rational curve cross BELOW the x-axis ŌĆö 1 extra intersection.\n- Step 3: From $$0$$ to $$5\\pi/2$$ there are 3 more ordinary branches: 3 intersections.\n- Step 4: Total $$= 10 + 1 + 3 = 14$$. The trap that gives 12: forgetting the below-axis crossing on $$(-\\pi/2, 0)$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_26"}, {"question": "Conceptually, why is $$\\cos x$$ NEVER an asymptote-having function but $$\\sec x = 1/\\cos x$$ would be? (Not directly examined but builds intuition.)", "answer": "- Step 1: $$\\cos x$$ is itself continuous and bounded ŌĆö no division anywhere, so it can't blow up.\n- Step 2: $$\\sec x = 1/\\cos x$$ has a denominator that hits zero at $$x = \\pi/2 + n\\pi$$ ŌĆö same places tan has asymptotes.\n- Step 3: So both $$\\tan$$ and $$\\sec$$ inherit their asymptotes from cosine's zeros.\n\nThis is why zeros of cosine matter so much in trig graphs: they're \"the source\" of all the asymptotes you'll see.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_35"}, {"question": "P1 June 12 Q4b ŌĆö what is the horizontal asymptote of $$y = \\dfrac{1}{x} + 1$$, and what's the common slip?", "answer": "- Step 1: The asymptote is $$y = 1$$, NOT $$y = 0$$.\n- Step 2: Reason: $$y = 1/x$$ has asymptote $$y=0$$; the \"$$+1$$\" translates the WHOLE curve up by 1, dragging the horizontal asymptote up with it.\n- Step 3: Slip: forgetting that vertical translations move the horizontal asymptote ŌĆö students absent-mindedly keep the asymptote at $$y=0$$.\n\nGeneral rule: $$f(x)+a$$ shifts the horizontal asymptote up by $$a$$; the vertical asymptote (here $$x=0$$) is unchanged.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_5"}, {"question": "Suppose you didn't recall the formula $$x = (2n+1)\\pi/2$$ for tan's asymptotes. How could you derive their locations from first principles?", "answer": "- Step 1: Tan blows up where its denominator $$\\cos x = 0$$.\n- Step 2: $$\\cos x = 0$$ at $$x = \\pi/2, 3\\pi/2, 5\\pi/2, \\dots$$ ŌĆö odd multiples of $$\\pi/2$$.\n- Step 3: In a single formula: $$x = (2n+1) \\cdot \\pi/2$$ for integer $$n$$ (positive, negative, or zero). Plugging $$n = 0$$ gives $$\\pi/2$$, $$n = 1$$ gives $$3\\pi/2$$, etc.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_54"}, {"question": "What's the recipe for sketching $$y = a\\sin(bx)$$, and which transformations interact?", "answer": "- Step 1: The \"$$a$$\" is a vertical stretch ŌĆö range becomes $$[-a, a]$$. Max/min y-values scale, x-coordinates of max/min UNCHANGED.\n- Step 2: The \"$$b$$\" is a horizontal squash by factor $$1/b$$ ŌĆö period becomes $$360┬░/b$$. x-coordinates of zeros, max, min all DIVIDE by $$b$$.\n- Step 3: They don't interfere: $$a$$ only touches y-values, $$b$$ only touches x-values.\n\nExample: $$y = 4\\sin(2x)$$ ŌåÆ range $$[-4,4]$$, period $$180┬░$$, min at $$(135┬░, -4)$$ (was $$(270┬░, -1)$$ ŌåÆ divide x by 2, multiply y by 4).", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_22"}, {"question": "Why is it especially important to sketch carefully when the asymptote of one curve lies at the SAME x-value as the asymptote of the other?", "answer": "- Step 1: Both curves blowing up at the same x means their behavior near that point is unusually rich ŌĆö they could meet BELOW the axis as one curve dives and the other rises through.\n- Step 2: For instance, $$\\tan x$$ has asymptotes at $$\\pm \\pi/2$$; $$1/x + 1$$ has its asymptote at $$x = 0$$. The tan branch on $$(-\\pi/2, 0)$$ shares the asymptote of $$1/x + 1$$ at $$x = 0$$.\n- Step 3: This is precisely the \"odd one out below the axis\" ŌĆö a hidden crossing easily missed without a detailed sketch.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_43"}, {"question": "Why does cosx = sin(x + 90┬░) hold true? (3 steps)", "answer": "- Step 1: Use the phase shift relationship: cosine is a sine wave shifted left by 90┬░.\n- Step 2: Graphically, cosx starts at a maximum (0┬░,1), while sin(x + 90┬░) shifts the sine curve left by 90┬░, aligning with cosine.\n- Step 3: Algebraically verify with angle addition: sin(x + 90┬░) = sinx cos90┬░ + cosx sin90┬░ = cosx.\n\n+ **Memory hook**: \"Cosine is Sine shifted Left by 90┬░.\"", "source": "Qwen 3 Ōæó", "_id": "qwen_3_13"}, {"question": "In the intersection of y = tan x and y = 1/x + 1 on ŌłÆ2ŽĆ Ōēż x < 2ŽĆ, why are there exactly 4 solutions? (3 steps)", "answer": "- Step 1: The graph of tan x has four complete branches in this interval: from ŌłÆ2ŽĆ to ŌłÆ3ŽĆ/2, ŌłÆ3ŽĆ/2 to ŌłÆŽĆ, ŌłÆŽĆ to ŌłÆŽĆ/2, ŌłÆŽĆ/2 to 0, 0 to ŽĆ/2, ŽĆ/2 to ŽĆ, ŽĆ to 3ŽĆ/2, 3ŽĆ/2 to 2ŽĆ (excluding the endpoint).\n- Step 2: Each branch of tan x crosses the near-horizontal line y = 1/x + 1 exactly once by the IVT, because tan x goes from ŌłÆŌł× to +Ōł× while 1/x + 1 stays finite.\n- Step 3: There are 4 solutions because the graph of y = 1/x + 1 intersects the graph of y = tan x four times in the interval ŌłÆ2ŽĆ Ōēż x < 2ŽĆ.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_10"}, {"question": "Why does the graph of $$y = \\sin x$$ pass through the origin going upward, and what does this tell you about its symmetry?", "answer": "- Step 1: At $$x=0$$, $$\\sin 0 = 0$$, and the gradient $$\\cos 0 = 1 > 0$$, so the curve leaves the origin rising.\n- Step 2: Because $$\\sin(-x) = -\\sin x$$, the graph has rotational symmetry about the origin ŌĆö it's an **odd function**.\n- Step 3: Visually, reflecting the curve in the y-axis then in the x-axis gives back the original curve.\n\nTakeaway: sine is the \"origin-rising odd wave\".", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_0"}, {"question": "What's the universal \"count solutions\" strategy summarised in one sentence, and what are the 5 sub-steps? (5 steps)", "answer": "- Step 1: Find the REPEATING UNIT (one period for periodic-vs-periodic; one $$\\pi$$-branch for tan-vs-near-horizontal).\n- Step 2: Sketch carefully and count solutions in ONE unit, checking BELOW the x-axis near any pole.\n- Step 3: Count how many whole units fit in the interval (length/unit-length, take floor).\n- Step 4: Multiply: $$(\\text{per unit}) \\times (\\text{whole units})$$.\n- Step 5: Adjust by hand for the leftover end-piece, watching open/closed endpoints.\n\nOne-sentence summary: \"Per-unit count ├Ś number of units + leftover adjustment.\"", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_24"}, {"question": "How does the period of tangent fundamentally differ from sin and cos, and what is the visual consequence for crossings per period?", "answer": "Tangent has a period of **$$180^\\circ$$** (half of sin/cos's $$360^\\circ$$). The visual consequence is that a single period of tangent contains only **1 x-axis crossing** and **2 asymptotes**, whereas one full period of sin/cos contains 2 crossings and no asymptotes. Tan is the \"odd one out\" of the trio.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_22"}, {"question": "P1 June 12 Q5 ŌĆö for $$f(x) = \\cos 2x┬░$$ on $$0 \\le x \\le k$$ with minimum $$Q$$ and third zero $$R(k,0)$$, what are $$Q$$ and $$k$$? What was the on-the-board error?", "answer": "- Step 1: Min: $$2x = 180 \\Rightarrow x=90$$, so $$Q = (90┬░, -1)$$.\n- Step 2: Zeros at $$2x = 90, 270, 450 \\Rightarrow x = 45, 135, 225$$. Third zero gives $$k = 225$$.\n- Step 3: Error: the board first wrote $$k=270$$ ŌĆö but $$x=270$$ corresponds to the NEXT MINIMUM ($$2x=540$$), not an x-intercept.\n\nLesson: always re-derive zeros from $$2x = 90 + 180n$$; don't guess from the unsquashed graph.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_10"}, {"question": "Why does the equation $$\\cos 2x┬░ = 1$$ on $$[0, 225]$$ have exactly TWO solutions, and what does this tell us about the $$p=1$$ case in the range-of-$$p$$ question?", "answer": "- Step 1: $$\\cos 2x┬░ = 1$$ requires $$2x = 0, 360, 720, \\ldots$$ ŌåÆ $$x = 0, 180, 360, \\ldots$$.\n- Step 2: In $$[0, 225]$$, that's $$x=0$$ and $$x=180$$ only ŌĆö TWO solutions.\n- Step 3: So $$p=1$$ is a valid value where the horizontal line touches the curve exactly twice (at the two maxima). This is why the answer to \"exactly two solutions\" includes the isolated point $$p=1$$, not just an interval.\n\nThe deep insight: \"exactly two\" can be achieved by line strictly between two pieces OR by line tangent at multiple maxima/minima.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_27"}, {"question": "When solving tan ╬Ė = 1 + sin ╬Ė over a large interval like 0 Ōēż ╬Ė Ōēż 2160┬░, what should you choose as the \"repeating unit\" and why? (2 steps)", "answer": "- Step 1: The repeating unit is **360┬░**.\n- Step 2: You must use the longest period among the functions involved. Tan has period 180┬░, but 1 + sin ╬Ė has period 360┬░. The combined intersection pattern only fully repeats when the slower function (sin) completes a full cycle.\n\nTakeaway: The repeating unit for a combination of periodic functions is the LCM of their periods.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_13"}, {"question": "For $$\\tan\\theta = 1 + \\sin\\theta$$ on $$0 \\le \\theta \\le 1980┬░$$, what's the structure of the count?", "answer": "- Step 1: $$1980┬░ = 5 \\times 360┬░ + 180┬░$$ ŌĆö i.e. 5 full periods of $$360┬░$$ plus a half period.\n- Step 2: Count intersections in one $$360┬░$$ period ŌĆö call this $$N$$.\n- Step 3: Total $$= 5N + (\\text{intersections in the final leftover } 180┬░)$$, the leftover counted by sketching that final half.\n\nTakeaway: don't just multiply ŌĆö always handle the leftover endpoint piece separately.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_28"}, {"question": "Why do $$\\sin x$$ and $$\\tan x$$ share the SAME x-axis crossings, while $$\\cos x$$ has different ones?", "answer": "- Step 1: $$\\tan x = \\sin x / \\cos x$$ ŌĆö so $$\\tan x = 0$$ iff $$\\sin x = 0$$ (numerator), giving $$x = n\\pi$$ for both.\n- Step 2: $$\\cos x = 0$$ at $$x = \\pi/2 + n\\pi$$ ŌĆö offset by $$\\pi/2$$ from sine's zeros.\n- Step 3: Same offset of $$\\pi/2$$ that makes $$\\cos x = \\sin(x+\\pi/2)$$ ŌĆö the whole cosine pattern is shifted left by $$\\pi/2$$.\n\nBonus insight: cosine's zeros are exactly tan's asymptotes.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_17"}, {"question": "June 12 Q4a ŌĆö For $$y = \\tan x$$ on $$-2\\pi \\le x < 2\\pi$$, if you need to find the rightmost asymptote $$l$$, how do you find it without drawing the whole graph? (2 steps)", "answer": "- Step 1: The general formula for asymptotes is $$x = (2n+1)\\frac{\\pi}{2}$$. List them out using Harry's rhythm rule until you exceed the boundary $$2\\pi$$.\n- Step 2: The asymptotes near $$2\\pi$$ are $$\\dots, \\frac{3\\pi}{2}, \\frac{5\\pi}{2} \\dots$$. Since $$x < 2\\pi$$ (strictly less than), the asymptote at $$\\frac{5\\pi}{2}$$ is excluded, making the rightmost one $$x = \\frac{3\\pi}{2}$$.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_30"}, {"question": "In what sense is the \"horizontal line meets each tan branch once\" argument an application of the Intermediate Value Theorem PLUS strict monotonicity?", "answer": "- Step 1: IVT alone says: for a continuous function going from $$-\\infty$$ to $$+\\infty$$, every value in between is achieved AT LEAST once.\n- Step 2: Strict monotonicity (tan strictly increasing on each branch) upgrades this to \"EXACTLY once\".\n- Step 3: So the count \"exactly one per branch\" requires BOTH ingredients: continuity for existence, monotonicity for uniqueness.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_53"}], "models": {"glm_1": {"label": "GLM 5.1 ŌæĀ", "cards": [{"question": "What visual feature of the sine graph at the origin immediately distinguishes it from the cosine graph? (2 steps)", "answer": "- Step 1: The sine graph passes directly through the origin (0,0) and is initially rising.\n- Step 2: In contrast, the cosine graph starts at its maximum value of 1 at x = 0. This starting point difference reflects the phase shift: cos x = sin(x + 90┬░).\n\nTakeaway: \"Sin starts at zero rising; cos starts at the top.\"", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_0", "judge_pick": false}, {"question": "What is the general formula for the x-coordinates of the maximum and minimum points of y = sin x, and why do they alternate every 180┬░? (2 steps)", "answer": "- Step 1: Maximum +1 at x = 90┬░ + 360┬░n (or $$\\pi/2 + 2\\pi n$$); Minimum ŌłÆ1 at x = 270┬░ + 360┬░n (or $$3\\pi/2 + 2\\pi n$$).\n- Step 2: The wave completes a full oscillation (peak ŌåÆ trough ŌåÆ peak) over its 360┬░ period. Because the peak and trough are opposite phases of the same oscillation, they are separated by half the period (180┬░), causing them to alternate.\n\nTakeaway: Max and min are locked into a 180┬░ alternating rhythm.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_1", "judge_pick": true}, {"question": "How many times does y = sin x cross the x-axis over the closed interval 0 Ōēż x Ōēż 360┬░, and why is this different from \"crossings per period\"? (2 steps)", "answer": "- Step 1: It crosses **3 times** at x = 0┬░, 180┬░, and 360┬░.\n- Step 2: A single *period* of sin x is 360┬░. If you look at one open period (e.g., 0 < x < 360┬░), it only crosses twice (at 180┬░). The closed interval 0 Ōēż x Ōēż 360┬░ includes both boundary endpoints, adding two extra crossings (at 0┬░ and 360┬░), though one of them is shared with the next period.\n\nTakeaway: Endpoint inclusion (Ōēż vs <) changes the crossing count.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_2", "judge_pick": false}, {"question": "When you see the transformation y = 4 sin ╬Ė, what happens to the range of the graph, and what is the critical mistake to avoid when stating the coordinates of the minimum point? (3 steps)", "answer": "- Step 1: The \"4\" is a vertical stretch with scale factor 4, so the new range is ŌłÆ4 Ōēż y Ōēż 4.\n- Step 2: The x-coordinates of key points remain unchanged; the minimum still occurs at ╬Ė = 270┬░.\n- Step 3: The critical mistake is giving just the value \"ŌłÆ4\" instead of the coordinate pair **(270┬░, ŌłÆ4)**. Exam questions asking for \"coordinates\" require an (x, y) pair to get full marks.\n\nTakeaway: \"Coordinates\" means an (x, y) pair, never a bare y-value.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_3", "judge_pick": false}, {"question": "How does the transformation y = 1 + sin ╬Ė affect the range and the x-axis crossings of the standard sine wave? (2 steps)", "answer": "- Step 1: The \"+1\" translates the entire graph upwards by 1. The original range [ŌłÆ1, 1] becomes [0, 2].\n- Step 2: Because the minimum value is now 0 (at ╬Ė = 270┬░), the graph never goes below the x-axis; it merely *touches* the x-axis at (270┬░, 0). It loses its negative crossings.\n\nTakeaway: A vertical shift of +1 moves the horizontal asymptote and the x-axis touching behavior.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_4", "judge_pick": false}, {"question": "What is the algebraic symmetry property of y = sin x, and what does this look like visually? (2 steps)", "answer": "- Step 1: It is an **odd function**, meaning $$\\sin(-x) = -\\sin(x)$$.\n- Step 2: Visually, this means the graph has **rotational symmetry of order 2 about the origin**. If you spin the graph 180┬░ around (0,0), it maps perfectly onto itself.\n\nTakeaway: Odd function = origin rotational symmetry.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_5", "judge_pick": false}, {"question": "What is the relationship between the zeros of y = sin x and y = tan x? (2 steps)", "answer": "- Step 1: They share the exact same zeros: x = 180┬░n (or $$\\pi n$$).\n- Step 2: This is because $$\\tan x = \\frac{\\sin x}{\\cos x}$$. For tan x to be 0, the numerator $$\\sin x$$ must be 0 (while the denominator is non-zero). Hence, \"where sin is 0, tan is 0.\"\n\nTakeaway: The zeros of tan are inherited directly from the zeros of sin.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_6", "judge_pick": false}, {"question": "Where are the vertical asymptotes of y = tan x, and what is the compact general formula for them in radians? (2 steps)", "answer": "- Step 1: Asymptotes occur where cos x = 0, at x = 90┬░, 270┬░, 450┬░, etc. (every 180┬░ starting from 90┬░).\n- Step 2: In radians, the compact formula is $$x = \\frac{(2n+1)\\pi}{2}$$. This generates the sequence $$\\pm\\pi/2, \\pm3\\pi/2, \\pm5\\pi/2$$ because the odd integer (2n+1) ensures we only hit the \"odd multiples of $$\\pi/2$$\" where cosine is zero.\n\nTakeaway: Asymptotes of tan = zeros of cos = odd multiples of $$\\pi/2$$.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_7", "judge_pick": false}, {"question": "What is the period of y = tan x, and how does this affect the number of x-axis crossings per 360┬░ compared to sin and cos? (2 steps)", "answer": "- Step 1: The period of tan x is **180┬░ (or $$\\pi$$ radians)**, which is half the period of sin and cos.\n- Step 2: Because tan completes a full pattern in 180┬░, it crosses the x-axis once per period. Over 360┬░, tan crosses twice (at 0┬░ and 180┬░), matching sin and cos's crossing count, but tan does it with two complete cycles rather than one.\n\nTakeaway: Tan's period is 180┬░, making it the \"fast\" trig function.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_8", "judge_pick": false}, {"question": "What is the Intermediate Value Theorem (IVT) argument that guarantees a horizontal line y = c meets each branch of y = tan x exactly once? (2 steps)", "answer": "- Step 1: On each 180┬░-wide branch between two asymptotes, tan x is continuous and strictly increasing from ŌłÆŌł× to +Ōł×.\n- Step 2: By the IVT, since tan x passes through every real number value without doubling back, any horizontal line y = c must intersect that branch exactly once. It cannot miss it, and it cannot hit it twice.\n\nTakeaway: One branch + strictly monotonic sweep from ŌłÆŌł× to +Ōł× = exactly one intersection per horizontal line.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_9", "judge_pick": true}, {"question": "For the graph y = 1/x + 1, what is the equation of its horizontal asymptote, and what is the common mistake? (2 steps)", "answer": "- Step 1: The horizontal asymptote is **y = 1**.\n- Step 2: The common mistake (Phuc's error) is to write y = 0. The \"+1\" in $$y = \\frac{1}{x} + 1$$ translates the entire standard hyperbola $$y = \\frac{1}{x}$$ (which has asymptote y = 0) upwards by 1. The asymptote shifts with the curve.\n\nTakeaway: A vertical translation f(x) + a shifts *both* the curve and its horizontal asymptote by a.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_10", "judge_pick": false}, {"question": "When counting intersections between y = tan x and y = 1/x + 1, why does the \"odd one out\" branch on the interval (ŌłÆŽĆ/2, 0) catch students out? (3 steps)", "answer": "- Step 1: On most branches, tan x crosses the near-horizontal line y Ōēł 1 *above* the x-axis.\n- Step 2: However, near x = 0, the curve 1/x + 1 dives down to ŌłÆŌł×. As it comes back up to its asymptote y = 1, it intersects the rising tan branch *below* the x-axis.\n- Step 3: Students who only count the obvious crossings near the top of the tan branches miss this lower intersection, leading to an undercount (e.g., answering 12 instead of 14).\n\nTakeaway: Always check for below-axis intersections near the poles of 1/x.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_11", "judge_pick": true}, {"question": "What is the systematic method for extrapolating intersection counts to large intervals (e.g., 0 Ōēż x Ōēż 40ŽĆ)? (4 steps)", "answer": "- Step 1: **Identify the repeating unit.** For tan x vs a near-flat line, it's one $$\\pi$$-wide branch (1 intersection).\n- Step 2: **Count whole units** in the interval: length of interval ├Ę length of unit. (e.g., $$40\\pi \\div \\pi = 40$$).\n- Step 3: **Multiply** to get the base count: intersections per unit ├Ś number of units.\n- Step 4: **Adjust the ends.** Check if there are leftover partial units and verify if the boundary endpoints are included (Ōēż vs <). A solution exactly at an endpoint only counts if the endpoint is included.\n\nTakeaway: Unit ŌåÆ Count units ŌåÆ Multiply ŌåÆ Adjust endpoints.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_12", "judge_pick": false}, {"question": "When solving tan ╬Ė = 1 + sin ╬Ė over a large interval like 0 Ōēż ╬Ė Ōēż 2160┬░, what should you choose as the \"repeating unit\" and why? (2 steps)", "answer": "- Step 1: The repeating unit is **360┬░**.\n- Step 2: You must use the longest period among the functions involved. Tan has period 180┬░, but 1 + sin ╬Ė has period 360┬░. The combined intersection pattern only fully repeats when the slower function (sin) completes a full cycle.\n\nTakeaway: The repeating unit for a combination of periodic functions is the LCM of their periods.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_13", "judge_pick": true}, {"question": "How do you handle an interval like 0 Ōēż ╬Ė Ōēż 1980┬░ for tan ╬Ė = 1 + sin ╬Ė, which is not an exact multiple of the 360┬░ repeating unit? (2 steps)", "answer": "- Step 1: Divide the interval into whole periods and a leftover piece: 1980┬░ = (5 ├Ś 360┬░) + 180┬░.\n- Step 2: Calculate the intersections in the 5 whole periods (5 ├Ś crossings per 360┬░), then separately sketch and count the intersections in the leftover 180┬░ piece at the end.\n\nTakeaway: Isolate the leftover partial period and count it by hand.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_14", "judge_pick": false}, {"question": "What does the transformation f(ax) do to the graph of f(x) horizontally, and what is the common confusion? (2 steps)", "answer": "- Step 1: f(ax) is a **horizontal squash by scale factor 1/a**. If a > 1, the graph compresses toward the y-axis. Point (x, y) moves to (x/a, y).\n- Step 2: The common confusion (Phuc's error) is thinking that multiplying x by 2 (a=2) stretches the graph. It actually squashes it because the x-values required to reach the same y-value are halved (e.g., cos 2x┬░ reaches its minimum at 90┬░ instead of 180┬░).\n\nTakeaway: f(ax) means \"x gets there faster,\" so the graph squashes.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_15", "judge_pick": false}, {"question": "How does the transformation f(ax) change the period of trigonometric graphs like y = sin(kx) or y = tan(kx)? (2 steps)", "answer": "- Step 1: The period is squashed by the same scale factor 1/k.\n- Step 2: For sin(kx) or cos(kx), the period becomes 360/k┬░ (or $$2\\pi/k$$ rad). For tan(kx), the period becomes 180/k┬░ (or $$\\pi/k$$ rad). The entire cycle completes k times faster.\n\nTakeaway: Period of sin/cos(kx) = 360/k; Period of tan(kx) = 180/k.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_16", "judge_pick": false}, {"question": "For y = cos 2x┬░ on 0 Ōēż x Ōēż 225, what are the key landmark coordinates, and what trap did the class fall into regarding the x-intercept? (3 steps)", "answer": "- Step 1: The period is 360/2 = 180┬░. The mapping is (x, y) Ōå” (x/2, y).\n- Step 2: The standard cos landmarks (0,1), (90,0), (180,ŌłÆ1), (270,0), (360,1) become (0,1), (45,0), (90,ŌłÆ1), (135,0), (180,1), (225,0).\n- Step 3: The trap was guessing the final x-intercept R was at 270. However, 270 is the next *minimum* (2x=540 Ō¤╣ x=270). The x-intercept at 2x=450 gives x=225.\n\nTakeaway: Map landmarks carefully using x/2; don't just guess based on the original graph's rhythm.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_17", "judge_pick": false}, {"question": "For the equation cos 2x┬░ = p having *exactly two* solutions on 0 Ōēż x Ōēż 225, what is the valid range of p, and why is the tempting answer of ŌłÆ1 < p < 1 wrong? (3 steps)", "answer": "- Step 1: The curve from x=0 to 225 has three monotonic pieces: (0,1)Ōåō(90,ŌłÆ1), then (90,ŌłÆ1)Ōåæ(180,1), then (180,1)Ōåō(225,0).\n- Step 2: A horizontal line y = p with 0 < p < 1 cuts all three pieces, giving *three* solutions, not two.\n- Step 3: To get exactly two solutions, p must only cut two pieces. This happens if **ŌłÆ1 < p < 0** (cuts the first descending and second ascending pieces, misses the third) OR if **p = 1** (touches the maxima at x=0 and x=180 exactly).\n\nTakeaway: The \"exactly N solutions\" trap requires analyzing monotonic pieces, not just the max/min bounds.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_18", "judge_pick": false}, {"question": "Why does p = 1 count as having exactly two solutions for cos 2x┬░ = p on 0 Ōēż x Ōēż 225? (2 steps)", "answer": "- Step 1: At p = 1, the horizontal line touches the maximum points of the curve at x = 0 and x = 180.\n- Step 2: It does not intersect the third descending piece (which goes from 1 down to 0). Thus, it yields exactly two solutions (the endpoints of the first two monotonic pieces).\n\nTakeaway: A line touching maxima/minima counts as a solution at those specific points.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_19", "judge_pick": false}, {"question": "If an exam question asks for the \"coordinates\" of a minimum point on y = 4 sin ╬Ė, what must you include to avoid losing a mark? (2 steps)", "answer": "- Step 1: You must write the answer as an ordered pair: (╬Ė, y).\n- Step 2: For the minimum of 4 sin ╬Ė, writing just \"ŌłÆ4\" loses the mark; you must write **(270┬░, ŌłÆ4)**. Underline the word \"coordinates\" in the question to trigger this.\n\nTakeaway: Coordinates = (x, y) pair. Never leave out the x-value.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_20", "judge_pick": false}, {"question": "When solving a trig equation where the question specifies the angle is \"obtuse\", what adjustment must you make after finding the acute angle from $$\\sin^{-1}$$? (2 steps)", "answer": "- Step 1: The $$\\sin^{-1}$$ function only returns angles in its principal range [ŌłÆ90┬░, 90", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_21", "judge_pick": false}], "count": 22}, "glm_2": {"label": "GLM 5.1 ŌæĪ", "cards": [{"question": "When sketching $$y = \\sin x$$, what is the crucial starting point and initial direction that dictates the entire shape of the graph? (2 steps)", "answer": "- Step 1: The sine graph always starts at the origin, which is the point $$(0, 0)$$.\n+ This is because $$\\sin 0 = 0$$.\n- Step 2: From the origin, the curve initially goes **upwards** towards its maximum at $$(90┬░, 1)$$ (or $$(\\pi/2, 1)$$).\n+ Visualising this initial \"upward launch\" prevents you from accidentally drawing a cosine graph (which starts at a maximum) or an inverted sine graph.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_0", "judge_pick": false}, {"question": "What are the general formulas for the x-coordinates of the maximum and minimum points of $$y = \\sin x$$, and why do they have that specific spacing? (2 steps)", "answer": "- Step 1: Maximum value $$+1$$ occurs at $$x = 90┬░ + 360┬░n$$ (or $$\\pi/2 + 2\\pi n$$). Minimum value $$-1$$ occurs at $$x = 270┬░ + 360┬░n$$ (or $$3\\pi/2 + 2\\pi n$$).\n- Step 2: The spacing is $$360┬░$$ (one full period) because the entire wave pattern repeats every $$360┬░$$. The max and min are separated by half a period ($$180┬░$$), representing the transition from peak to trough.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_1", "judge_pick": false}, {"question": "How do you state the general formula for the zeros (x-axis crossings) of $$y = \\sin x$$, and how does this explain the number of crossings in a standard $$0┬░$$ to $$360┬░$$ interval? (3 steps)", "answer": "- Step 1: The zeros occur at $$x = 180┬░n$$ (or $$\\pi n$$), meaning they happen every $$180┬░$$.\n- Step 2: Over the closed interval $$0 \\le x \\le 360┬░$$, the crossings are at $$0┬░, 180┬░,$$ and $$360┬░$$. This gives **3 crossings** because both endpoints are included.\n- Step 3: Over one open period (e.g., $$0 < x < 360┬░$$), there are only **2 crossings** (at $$180┬░$$ only), because the endpoints where the pattern repeats are excluded.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_2", "judge_pick": false}, {"question": "June 14 Q9a ŌĆö When transforming $$y = \\sin \\theta$$ to $$y = 4\\sin \\theta$$, what happens to the range, and what is the trap when asked for the \"minimum point\"? (2 steps)", "answer": "- Step 1: The transformation is a vertical stretch by a scale factor of 4. This changes the range from $$-1 \\le y \\le 1$$ to $$-4 \\le y \\le 4$$.\n- Step 2: The trap is giving just the value $$-4$$. The question asks for the minimum *point*, which requires a **coordinate pair**: $$(270┬░, -4)$$. You lose the second B mark if you omit the $$x$$-coordinate.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_3", "judge_pick": false}, {"question": "June 14 Q9b ŌĆö How does the transformation $$y = 1 + \\sin \\theta$$ affect the graph's position and its relationship to the x-axis? (2 steps)", "answer": "- Step 1: It translates the entire sine wave UP by 1. The new range is $$0 \\le y \\le 2$$.\n- Step 2: Because the minimum value is now exactly 0, the graph **just touches** the x-axis at $$\\theta = 270┬░$$ and never goes below it. This is a critical visual shift from the standard sine wave crossing the axis.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_4", "judge_pick": true}, {"question": "What is the shape and starting point of the $$y = \\cos x$$ graph, and how does this immediately distinguish it from the sine graph? (2 steps)", "answer": "- Step 1: The cosine graph starts at its **maximum** point $$(0, 1)$$.\n- Step 2: Unlike sine which starts at $$(0,0)$$ rising, cosine starts at the top and initially goes **downwards** towards zero at $$90┬░$$. If your wave starts at a peak, it's cosine; if it starts at the origin, it's sine.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_5", "judge_pick": false}, {"question": "How can you express $$y = \\cos x$$ in terms of sine, and what does this tell you about the geometric relationship between the two graphs? (2 steps)", "answer": "- Step 1: $$\\cos x = \\sin(x + 90┬░)$$.\n- Step 2: This means the cosine graph is exactly the sine graph shifted **LEFT by 90┬░**. They are the identical wave shape, just offset by a quarter of a period.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_6", "judge_pick": false}, {"question": "June 12 Q5 ŌĆö For the transformation $$y = \\cos 2x┬░$$, what is the period, and what is the precise mapping rule for coordinates? (2 steps)", "answer": "- Step 1: The period is $$360┬░ / 2 = 180┬░$$. The $$x \\to 2x$$ substitution causes a **horizontal squash, scale factor 1/2**.\n- Step 2: Every point maps as $$(x, y) \\mapsto (x/2, y)$$. The $$x$$-coordinates halve (squash towards the y-axis) while the $$y$$-values remain unchanged. For example, the minimum at $$(180┬░, -1)$$ in $$\\cos x$$ moves to $$(90┬░, -1)$$ in $$\\cos 2x$$.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_7", "judge_pick": false}, {"question": "June 12 Q5 ŌĆö When finding the x-intercept $$R(k, 0)$$ of $$y = \\cos 2x┬░$$ after its minimum, why is $$k = 225$$ and not 270? (3 steps)", "answer": "- Step 1: The zeros of $$\\cos 2x┬░$$ occur where $$2x = 90┬░, 270┬░, 450┬░, \\dots$$ Solving for $$x$$ gives $$x = 45┬░, 135┬░, 225┬░, \\dots$$\n- Step 2: The minimum occurs at $$x = 90┬░$$. The next zero after this minimum is at $$x = 225┬░$$.\n- Step 3: The trap is writing $$270$$, which is the next *minimum* (where $$2x = 540┬░$$), not an x-intercept. You must solve for the specific type of point requested (intercept vs. min/max).", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_8", "judge_pick": false}, {"question": "June 12 Q5b (The A* Trap) ŌĆö For $$\\cos 2x┬░ = p$$ having **exactly TWO** solutions on $$0 \\le x \\le 225┬░$$, why is the answer $$-1 < p < 0$$ OR $$p = 1$$, and NOT $$-1 < p < 1$$? (4 steps)", "answer": "- Step 1: Sketch the curve from $$0$$ to $$225┬░$$: it starts at $$(0,1)$$, drops to a minimum at $$(90,-1)$$, rises to a maximum at $$(180,1)$$, then drops to $$(225,0)$$. This creates **three monotonic pieces** (down, up, down).\n- Step 2: If $$0 < p < 1$$, a horizontal line $$y = p$$ cuts all three pieces, giving **three** solutions. This is why the broad range $$-1 < p < 1$$ fails.\n- Step 3: If $$-1 < p < 0$$, the line cuts the first descending piece and the last descending piece, but misses the middle ascending piece (which only spans $$-1$$ to $$1$$). This gives exactly **two** solutions.\n- Step 4: If $$p = 1$$, the line touches the two maxima exactly at $$x = 0$$ and $$x = 180$$, giving exactly **two** solutions.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_9", "judge_pick": false}, {"question": "What is the key visual difference in the shape of $$y = \\tan x$$ compared to $$y = \\sin x$$ and $$y = \\cos x$$? (2 steps)", "answer": "- Step 1: Tangent consists of repeating **S-shaped branches**, each rising continuously from $$-\\infty$$ to $$+\\infty$$, unlike the smooth bounded waves of sin and cos.\n- Step 2: Because each branch goes to infinity, tangent has **vertical asymptotes** and a range of all real numbers (no maximum or minimum value).", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_10", "judge_pick": false}, {"question": "What is the period of $$y = \\tan x$$, and how does it compare to sin and cos? (2 steps)", "answer": "- Step 1: The period of tangent is $$180┬░$$ (or $$\\pi$$ radians).\n- Step 2: This is **half** the period of sin and cos ($$360┬░$$ or $$2\\pi$$). Tangle completes a full repeat twice as fast as the other two.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_11", "judge_pick": false}, {"question": "What are the general formulas for the zeros and vertical asymptotes of $$y = \\tan x$$, and what trigonometric fact dictates each? (2 steps)", "answer": "- Step 1: Zeros are at $$x = 180┬░n$$ (or $$\\pi n$$), dictated by where $$\\sin x = 0$$. Asymptotes are at $$x = 90┬░ + 180┬░n$$ (or $$(2n+1)\\frac{\\pi}{2}$$), dictated by where $$\\cos x = 0$$ (division by zero).\n- Step 2: Memory hook: \"Where sin is 0, tan is 0; where cos is 0, tan blows up.\" This links tan's features directly to sin and cos.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_12", "judge_pick": false}, {"question": "What is Harry's \"rhythm rule\" for the tangent graph, and how does it help you sketch asymptotes and zeros? (2 steps)", "answer": "- Step 1: \"Something interesting happens every $$90┬░$$ (every $$\\pi/2$$).\"\n- Step 2: Starting at $$0$$, the pattern alternates: zero at $$0$$, asymptote at $$90┬░$$, zero at $$180┬░$$, asymptote at $$270┬░$$, etc. This ensures you never miss an asymptote or zero when sketching over a wide interval.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_13", "judge_pick": false}, {"question": "How does the Intermediate Value Theorem (IVT) guarantee that a near-horizontal line like $$y = 1$$ intersects each branch of $$y = \\tan x$$ exactly once? (2 steps)", "answer": "- Step 1: On each $$\\pi$$-wide branch between asymptotes, $$\\tan x$$ is continuous and **strictly increasing** from $$-\\infty$$ to $$+\\infty$$.\n- Step 2: Because it sweeps through every possible $$y$$-value without turning around, any horizontal line $$y = c$$ must cross it exactly once per branch. There is no way to miss the line or cross it twice.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_14", "judge_pick": false}, {"question": "When counting solutions to $$f(x) = g(x)$$, what is the core geometric principle you must always apply? (2 steps)", "answer": "- Step 1: The number of solutions equals the number of times the graphs $$y = f(x)$$ and $$y = g(x)$$ **intersect** (cross each other).\n- Step 2: To count them reliably, you must **always sketch both** curves on the same axes and physically count the crossings. Never try to count solutions algebraically for trig vs. non-trig curves.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_15", "judge_pick": false}, {"question": "June 12 Q4b ŌĆö What is the trap regarding the horizontal asymptote of the curve $$y = \\frac{1}{x} + 1$$, and why does it happen? (2 steps)", "answer": "- Step 1: The trap is placing the horizontal asymptote at $$y = 0$$. The correct asymptote is at $$y = 1$$.\n- Step 2: The $$+1$$ is a vertical translation UP. It lifts the entire rectangular hyperbola (and its horizontal asymptote) up by 1. For large $$|x|$$, $$\\frac{1}{x} + 1 \\approx 1$$, so the curve flattens near $$y=1$$.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_16", "judge_pick": false}, {"question": "June 12 Q4c ŌĆö In the interval $$-\\frac{\\pi}{2} < x < 0$$, why does $$y = \\frac{1}{x} + 1$$ intersect $$y = \\tan x$$ below the x-axis, and why is this easy to miss? (3 steps)", "answer": "- Step 1: On this interval, $$\\tan x$$ is negative (rising from $$-\\infty$$ to $$0$$).\n- Step 2: The curve $$\\frac{1}{x} + 1$$ dives to $$-\\infty$$ as $$x$$ approaches $$0$$ from the left, so it is also negative near $$x=0$$.\n- Step 3: Because both curves are in negative territory (below the x-axis) and both sweep from $$-\\infty$$ to finite values, they must cross. It is missed because sketches are often too small to show the dive below the axis near the pole.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_17", "judge_pick": false}, {"question": "What is the 5-step strategy for extrapolating the number of intersections to large or negative intervals? (5 steps)", "answer": "- Step 1: **Identify the repeating unit** (e.g., one $$\\pi$$-branch for tan, one $$360┬░$$ period for sin/cos).\n- Step 2: **Count solutions in one unit** by sketching carefully.\n- Step 3: **Count whole units** in the interval: (interval length) ├Ę (unit length).\n- Step 4: **Multiply** solutions per unit by the number of whole units.\n- Step 5: **Adjust the ends** by checking any leftover partial unit at the boundaries by hand.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_18", "judge_pick": false}, {"question": "When adjusting endpoints in intersection counting, how do open ($$<$$) vs. closed ($$\\le$$) intervals affect your count? (2 steps)", "answer": "- Step 1: A solution exactly at an endpoint only counts if the endpoint is **included** (closed, $$\\le$$).\n- Step 2: If the endpoint is excluded (open, $$<$$), a crossing sitting exactly on that boundary line must be subtracted from your total count.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_19", "judge_pick": false}, {"question": "How do you count intersections for two periodic curves (like $$\\tan \\theta = 1 + \\sin \\theta$$) over a large interval? (2 steps)", "answer": "- Step 1: Count the intersections in ONE full period of the **longer** period (in this case, $$360┬░$$, which accommodates both the $$180┬░$$ tan period and the $$360┬░$$ sine period).\n- Step 2: Multiply by the number of full periods in the interval, then carefully add any intersections from the leftover partial period at the end.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_20", "judge_pick": false}, {"question": "Transformation Rule ŌĆö How does $$f(x) + a$$ affect the vertical and horizontal asymptotes of a graph? (2 steps)", "answer": "- Step 1: It translates the graph UP by $$a$$, so any **horizontal asymptote** moves UP by $$a$$ (e.g., $$y=0$$ becomes $$y=a$$).\n- Step 2: **Vertical asymptotes remain unchanged** because shifting up/down does not affect where the graph blows up sideways.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_21", "judge_pick": false}, {"question": "Transformation Rule ŌĆö What is the mapping rule for $$f(ax)$$, and why is it described as a horizontal squash when $$a > 1$$? (2 steps)", "answer": "- Step 1: The mapping rule is $$(x, y) \\mapsto (x/a, y)$$. The $$x$$-coordinates are divided by $$a$$, while $$y$$-values stay the same.\n- Step 2: When $$a > 1$$, dividing $$x$$ by $$a$$ makes the coordinates smaller, pulling points closer to the $$y$$-axis. This is a **horizontal squash, scale factor $$1/a$$** (not a stretch). For example, $$f(2x)$$ squashes by $$1/2$$.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_22", "judge_pick": false}, {"question": "What is the general formula for the period of $$y = \\tan(kx)$$, and how does it differ from the period formula for $$y = \\sin(kx)$$? (2 steps)", "answer": "- Step 1: Period of $$\\tan(kx) = 180┬░/k$$ (or $$\\pi/k$$ rad).\n- Step 2: This differs from sin/cos, whose period is $$360┬░/k$$ (or $$2\\pi/k$$ rad). Tangle's base period is half that of sin/cos, so its transformed period is also halved.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_23", "judge_pick": false}, {"question": "Phuc's Mistake ŌĆö When asked for the \"coordinates of the minimum point\" of $$y = 4\\sin \\theta$$, what is the exact required answer format, and what is the common slip? (2 steps)", "answer": "- Step 1: The required format is a coordinate pair: $$(270┬░, -4)$$.\n- Step 2: The common slip is writing just the value \"$$-4$$\". You must underline the word \"coordinates\" in the question to remind yourself to provide both the $$x$$ and $$y$$ values.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_24", "judge_pick": false}, {"question": "Phuc's Mistake ŌĆö When solving $$\\sin^{-1}$$ for an **obtuse** angle, what is the required adjustment, and why is it necessary? (3 steps)", "answer": "- Step 1: The function $$\\sin^{-1}$$ only returns acute angles (its range is $$[-90┬░, 90┬░]$$ or $$[-\\pi/2, \\pi/2]$$).\n- Step 2: Because sine is positive in both the 1st (acute) and 2nd (obtuse) quadrants, there is a second solution.\n- Step 3: To find the obtuse angle, calculate: $$180┬░ - (\\text{acute angle})$$, or
