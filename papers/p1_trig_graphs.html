 $$\\pi - (\\text{acute angle})$$. You must underline the word \"obtuse\" in the question to trigger this adjustment.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_25", "judge_pick": false}, {"question": "Exam wording ŌĆö If a question says \"State the number of solutions, giving a reason\", what exact phrasing structure earns full marks? (2 steps)", "answer": "- Step 1: Write: \"There are N solutions because the graph of [curve 1] intersects the graph of [curve 2] N times in the interval given.\"\n- Step 2: You must name **both curves**, state the **number of intersections**, and specify the **interval**. Vague reasons like \"the graphs cross 4 times\" without naming the specific functions/interval will lose marks.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_26", "judge_pick": false}, {"question": "Exam method ŌĆö To find the range of $$p$$ such that a curve $$f(x) = p$$ has exactly $$n$$ solutions, what is the strategic approach? (3 steps)", "answer": "- Step 1: Sketch the curve $$y = f(x)$$ and split it into its **monotonic pieces** (sections that are strictly increasing or strictly decreasing without turning).\n- Step 2: Imagine drawing a horizontal line $$y = p$$ across the graph.\n- Step 3: Count how many monotonic pieces the line crosses for different bands of $$p$$ values. The bands where the line crosses exactly $$n$$ pieces give you the valid ranges for $$p$$.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_27", "judge_pick": false}, {"question": "Comparison ŌĆö What are the values of $$\\sin x$$, $$\\cos x$$, and $$\\tan x$$ at $$x = 90┬░$$ ($$\\pi/2$$), and what does this tell you about their graphs? (2 steps)", "answer": "- Step 1: $$\\sin(90┬░) = 1$$, $$\\cos(90┬░) = 0$$, $$\\tan(90┬░)$$ is undefined.\n- Step 2: This shows sin reaches its max, cos crosses the x-axis, and tan has a vertical asymptote at $$90┬░$$. It's a critical landmark distinguishing all three graphs.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_28", "judge_pick": false}, {"question": "Comparison ŌĆö Which of the three basic trig graphs are \"odd\" (origin symmetry) and which is \"even\" (y-axis symmetry)? (2 steps)", "answer": "- Step 1: $$y = \\sin x$$ and $$y = \\tan x$$ are **odd functions** ($$f(-x) = -f(x)$$), meaning they have rotational symmetry about the origin.\n- Step 2: $$y = \\cos x$$ is an **even function** ($$f(-x) = f(x)$$), meaning it is symmetric about the y-axis. This is why cosine starts at a peak, while sine and tan pass through the origin.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_29", "judge_pick": false}, {"question": "June 12 Q4a ŌĆö For $$y = \\tan x$$ on $$-2\\pi \\le x < 2\\pi$$, if you need to find the rightmost asymptote $$l$$, how do you find it without drawing the whole graph? (2 steps)", "answer": "- Step 1: The general formula for asymptotes is $$x = (2n+1)\\frac{\\pi}{2}$$. List them out using Harry's rhythm rule until you exceed the boundary $$2\\pi$$.\n- Step 2: The asymptotes near $$2\\pi$$ are $$\\dots, \\frac{3\\pi}{2}, \\frac{5\\pi}{2} \\dots$$. Since $$x < 2\\pi$$ (strictly less than), the asymptote at $$\\frac{5\\pi}{2}$$ is excluded, making the rightmost one $$x = \\frac{3\\pi}{2}$$.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_30", "judge_pick": true}, {"question": "What is the relationship between the zeros of $$\\tan x$$ and the zeros of $$\\sin x$$, and why does it make sense conceptually? (2 steps)", "answer": "- Step 1: The zeros of $$\\tan x$$ occur at exactly the same places as the zeros of $$\\sin x$$: $$x = 180┬░n$$ (or $$\\pi n$$).\n- Step 2: Conceptually, $$\\tan x = \\frac{\\sin x}{\\cos x}$$. A fraction equals zero only when its numerator is zero (and denominator is not), so $$\\tan x = 0$$ precisely when $$\\sin x = 0$$.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_31", "judge_pick": false}, {"question": "Transformation Rule ŌĆö How does $$f(x/a)$$ differ from $$f(ax)$$, and what is its effect on the period? (2 steps)", "answer": "- Step 1: $$f(x/a)$$ is a horizontal **stretch** with scale factor $$a$$ (points move away from the y-axis: $$(x,y) \\mapsto (ax, y)$$). This is the opposite of the squash in $$f(ax)$$.\n- Step 2: The period grows. For $$y = \\sin(x/a)$$, the period becomes $$360┬░ \\times a$$, stretching the wave wider.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_32", "judge_pick": false}, {"question": "Phuc's Mistake ŌĆö When solving $$y = \\frac{1}{x} + 1$$ intersections, Phuc placed the horizontal asymptote at $$y = 0$$. What is the quick visual check to prevent this? (2 steps)", "answer": "- Step 1: Always identify the base graph (here, $$y = \\frac{1}{x}$$ with asymptotes $$x=0, y=0$$) before applying transformations.\n- Step 2: Apply the vertical shift to the asymptote just like you would to a point. Since the whole graph shifts UP by 1, drag the horizontal asymptote line UP to $$y=1$$.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_33", "judge_pick": false}, {"question": "Exam habit ŌĆö Before counting intersections on a trig graph, what three features must you mark on your sketch to ensure you don't miss crossings? (2 steps)", "answer": "- Step 1: Mark **asymptotes as dashed lines**, mark every **max/min** point, and mark every **axis-crossing**.\n- Step 2: This visual rigour forces you to see the \"below-axis\" branches near poles (like the $$-\\pi/2 < x < 0$$ branch for $$\\tan x$$) that are easily missed on a sloppy sketch.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_34", "judge_pick": false}], "count": 35}, "glm_3": {"label": "GLM 5.1 Ōæó", "cards": [{"question": "What is the visual shape and starting behaviour of the $$y = \\sin x$$ graph, and why does it start this way? (2 steps)", "answer": "- Step 1: The sine graph is a smooth, continuous wave that starts at the origin $$(0,0)$$ and initially rises upwards.\n- Step 2: It starts at $$(0,0)$$ because $$\\sin 0 = 0$$, and it rises because for small positive angles, $$\\sin x$$ produces positive values (e.g., $$\\sin 90^\\circ = 1$$).", "source": "GLM 5.1 Ōæó", "_id": "glm_3_0", "judge_pick": false}, {"question": "What are the maximum and minimum coordinates of $$y = \\sin x$$, expressed as general formulas in both degrees and radians?", "answer": "The maximum value is $$+1$$ at $$x = 90^\\circ + 360^\\circ n$$ (or $$x = \\pi/2 + 2\\pi n$$). The minimum value is $$-1$$ at $$x = 270^\\circ + 360^\\circ n$$ (or $$x = 3\\pi/2 + 2\\pi n$$). These occur because the sine wave oscillates strictly between these bounds with an amplitude of 1, hitting the top at the quarter-period mark and the bottom at the three-quarter-period mark.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_1", "judge_pick": false}, {"question": "How many times does $$y = \\sin x$$ cross the x-axis in the closed interval $$0 \\le x \\le 360^\\circ$$, and why is it 3 rather than 2? (2 steps)", "answer": "- Step 1: It crosses **3 times** at $$x = 0^\\circ, 180^\\circ, 360^\\circ$$ (i.e., at $$x = 180^\\circ n$$).\n- Step 2: Although one full open period (e.g., $$0 < x < 360^\\circ$$) contains exactly 2 crossings, the closed interval $$0 \\le x \\le 360^\\circ$$ includes both endpoints. Since $$\\sin 0 = \\sin 360 = 0$$, both boundary points count as x-axis crossings.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_2", "judge_pick": false}, {"question": "What symmetry property does $$y = \\sin x$$ possess, and how is it expressed algebraically?", "answer": "$$y = \\sin x$$ is an **odd function**, meaning it has rotational symmetry of order 2 about the origin. Algebraically, this is expressed as $$\\sin(-x) = -\\sin x$$. Visually, if you rotate the right half of the sine wave by $$180^\\circ$$ around the origin, it perfectly overlaps the left half.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_3", "judge_pick": false}, {"question": "When a question asks for the \"coordinates of the minimum point\" of a transformed sine graph like $$y = 4\\sin\\theta$$, what is the common mistake and what must you write instead? (2 steps)", "answer": "- Step 1: The common mistake (Phuc's error) is giving just the bare minimum **value**, e.g., writing only \"$$-4$$\".\n- Step 2: The word \"coordinates\" demands an $$(x, y)$$ point pair. You must write **$$(270^\\circ, -4)$$** ŌĆö combining the $$x$$-coordinate where the base sine hits its minimum with the transformed $$y$$-value.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_4", "judge_pick": false}, {"question": "How does the transformation $$y = 1 + \\sin\\theta$$ alter the range and the x-axis behaviour of the sine wave? (2 steps)", "answer": "- Step 1: The \"$$+1$$\" translates the entire graph vertically UP by 1. The original range $$-1 \\le \\sin\\theta \\le 1$$ shifts up to become $$0 \\le y \\le 2$$.\n- Step 2: Because the new minimum value is exactly $$0$$, the curve **just touches** the x-axis at $$\\theta = 270^\\circ$$, but it never crosses below it. This is unlike the base sine wave, which passes through the x-axis.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_5", "judge_pick": false}, {"question": "What is the formula for the period of a horizontally squashed/stretched sine or cosine graph $$y = \\sin(kx)$$ or $$y = \\cos(kx)$$, in both degrees and radians?", "answer": "The period becomes $$\\frac{360^\\circ}{k}$$ in degrees, or $$\\frac{2\\pi}{k}$$ in radians. The factor $$k$$ inside the argument accelerates the cycle: if $$k=2$$, the wave completes a full oscillation twice as fast, halving the period to $$180^\\circ$$ ($$\\pi$$ rad).", "source": "GLM 5.1 Ōæó", "_id": "glm_3_6", "judge_pick": false}, {"question": "What is the visual shape and starting behaviour of the $$y = \\cos x$$ graph, and why does it start differently from sine? (2 steps)", "answer": "- Step 1: The cosine graph is a smooth wave that starts at its **maximum height**, the point $$(0,1)$$, and initially descends.\n- Step 2: It starts at $$(0,1)$$ because $$\\cos 0 = 1$$ (unlike $$\\sin 0 = 0$$). It descends because for small positive angles, the cosine value decreases toward zero at $$90^\\circ$$.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_7", "judge_pick": false}, {"question": "What are the maximum and minimum coordinates of $$y = \\cos x$$, expressed as general formulas in both degrees and radians?", "answer": "The maximum value is $$+1$$ at $$x = 360^\\circ n$$ (or $$x = 2\\pi n$$) ŌĆö it peaks at the start/end of each period. The minimum value is $$-1$$ at $$x = 180^\\circ + 360^\\circ n$$ (or $$x = \\pi + 2\\pi n$$) ŌĆö it hits the bottom exactly halfway through each period.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_8", "judge_pick": false}, {"question": "Where does $$y = \\cos x$$ cross the x-axis, and how many crossings occur in the interval $$0 \\le x \\le 360^\\circ$$? (2 steps)", "answer": "- Step 1: Zeros occur at $$x = 90^\\circ + 180^\\circ n$$ (or $$x = \\pi/2 + \\pi n$$), which is offset by $$90^\\circ$$ from the sine zeros.\n- Step 2: Over $$0 \\le x \\le 360^\\circ$$, there are exactly **2 crossings** (at $$90^\\circ$$ and $$270^\\circ$$). Unlike sine, cosine does not cross at the endpoints $$x=0$$ and $$x=360$$ because $$\\cos 0 = \\cos 360 = 1$$, not 0.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_9", "judge_pick": false}, {"question": "What symmetry property does $$y = \\cos x$$ possess, and how is it expressed algebraically?", "answer": "$$y = \\cos x$$ is an **even function**, meaning it is symmetric about the y-axis (a mirror line). Algebraically, this is expressed as $$\\cos(-x) = \\cos x$$. Visually, the left half of the cosine wave (negative $$x$$) is a perfect mirror image of the right half.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_10", "judge_pick": false}, {"question": "How can you view the cosine graph as a transformation of the sine graph, and what is the algebraic identity that proves it?", "answer": "The cosine graph is exactly the sine graph shifted **LEFT by $$90^\\circ$$** (or $$\\pi/2$$ radians). The identity proving this is $$\\cos x = \\sin(x + 90^\\circ)$$ (or $$\\cos x = \\sin(x + \\pi/2)$$). This shift aligns sine's origin-crossing with cosine's y-axis peak.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_11", "judge_pick": false}, {"question": "When sketching $$y = \\cos 2x^\\circ$$, what is the transformation effect, the new period, and the coordinate mapping rule? (3 steps)", "answer": "- Step 1: The $$2x$$ inside the argument causes a **horizontal squash, scale factor $$1/2$$**. The wave is compressed toward the y-axis.\n- Step 2: The new period is $$\\frac{360^\\circ}{2} = 180^\\circ$$.\n- Step 3: Every landmark point $$(x, y)$$ on the base $$\\cos x$$ map maps to **$$(x/2, y)$$** on the new graph. E.g., the base minimum $$(180, -1)$$ moves to $$(90, -1)$$.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_12", "judge_pick": false}, {"question": "For $$f(x) = \\cos 2x^\\circ$$ on $$0 \\le x \\le 225$$, if R is the x-intercept at the rightmost end of the interval, why is R $$x = 225$$ and NOT $$x = 270$$? (2 steps)", "answer": "- Step 1: x-intercepts of $$\\cos 2x$$ occur where $$2x = 90, 270, 450, \\ldots$$, giving $$x = 45, 135, 225, \\ldots$$.\n- Step 2: The value $$x = 270$$ is a common trap because it is where the **next minimum** occurs ($$2x = 540$$), not an x-intercept. The third x-intercept is $$x = 225$$, which perfectly lands on the interval's endpoint.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_13", "judge_pick": false}, {"question": "For $$\\cos 2x^\\circ = p$$ on $$0 \\le x \\le 225$$, why is the range for \"exactly TWO solutions\" NOT simply $$-1 < p < 1$$, and what is the correct range? (4 steps)", "answer": "- Step 1: Sketch the curve's path: it starts at $$(0,1)$$, descends to a minimum $$(90,-1)$$, rises to a max $$(180,1)$$, and descends to an intercept $$(225,0)$$.\n- Step 2: This path forms **three monotonic pieces** (down, up, down). A horizontal line $$y = p$$ where $$0 < p < 1$$ cuts across ALL three pieces, yielding THREE solutions.\n- Step 3: To get exactly two solutions, $$p$$ must only cut two pieces. This happens if $$p$$ is strictly between the minimum and the x-axis: $$-1 < p < 0$$ (cuts the two descending pieces).\n- Step 4: There is one special exception: $$p = 1$$ touches exactly two maxima (at $$x=0$$ and $$x=180$$). Thus, the correct A* answer is **$$-1 < p < 0$$ OR $$p = 1$$**.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_14", "judge_pick": false}, {"question": "What is the visual shape and range of the $$y = \\tan x$$ graph, and how does its range differ fundamentally from sine and cosine?", "answer": "The tangent graph consists of repeating S-shaped **branches**, each rising continuously from $$-\\infty$$ to $$+\\infty$$. Its range is **all real numbers** ($$-\\infty < \\tan x < \\infty$$). This fundamentally differs from sin/cos because tan has **no maximum or minimum value**; it heads toward infinity at its asymptotes.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_15", "judge_pick": false}, {"question": "What is the period of $$y = \\tan x$$ in both degrees and radians, and why is it half the period of sine and cosine?", "answer": "The period of $$y = \\tan x$$ is **$$180^\\circ$$** (or **$$\\pi$$** radians). It is half the sin/cos period because $$\\tan x = \\frac{\\sin x}{\\cos x}$$; both the numerator and denominator flip their signs after $$180^\\circ$$, so a negative divided by a negative returns the original positive value, completing a full cycle in just half a rotation.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_16", "judge_pick": false}, {"question": "What are the general formulas in radians for the zeros and the vertical asymptotes of $$y = \\tan x$$, and which basic trig functions trigger them? (2 steps)", "answer": "- Step 1: **Zeros** occur where $$\\sin x = 0$$, at **$$x = n\\pi$$** (where $$n$$ is any integer). This is the middle of each branch.\n- Step 2: **Asymptotes** occur where $$\\cos x = 0$$, at **$$x = (2n+1)\\frac{\\pi}{2}$$** (e.g., $$\\pm\\pi/2, \\pm3\\pi/2$$). The denominator blows up, causing the curve to approach infinity.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_17", "judge_pick": false}, {"question": "What is \"Harry's rhythm rule\" for $$y = \\tan x$$, and why is it useful for sketching?", "answer": "\"Something interesting happens every $$90^\\circ$$ (every $$\\pi/2$$).\" As you move along the x-axis, the pattern strictly alternates: zero, asymptote, zero, asymptote... This rhythm ensures you never miss a key landmark when sketching; just start at the origin (a zero) and place the next feature $$90^\\circ$$ away.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_18", "judge_pick": false}, {"question": "Why does any horizontal (or near-horizontal) line $$y = c$$ intersect each branch of $$y = \\tan x$$ exactly once? (2 steps)", "answer": "- Step 1: On each $$\\pi$$-wide interval between two asymptotes, the tangent branch is **strictly monotonic** (continuously rising) and covers all real numbers from $$-\\infty$$ to $$+\\infty$$.\n- Step 2: By the Intermediate Value Theorem (IVT), since the branch sweeps through every possible $$y$$-value without dipping or turning, it must cross the horizontal line $$y = c$$ exactly one time per branch.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_19", "judge_pick": false}, {"question": "What is the memory hook that relates the sine and cosine graphs, and how many degrees separate their identical shapes?", "answer": "Sine and cosine are the **SAME wave, just $$90^\\circ$$ apart**. The identity $$\\cos x = \\sin(x + 90^\\circ)$$ means cosine is just the sine graph shifted left by $$90^\\circ$$ (or $$\\pi/2$$ radians). If you slide the sine wave left by a quarter-turn, it perfectly becomes the cosine wave.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_20", "judge_pick": false}, {"question": "What is the memory hook that links the zeros and asymptotes of tangent to the zeros of sine and cosine?", "answer": "\"Where sin is 0, tan is 0; where cos is 0, tan blows up.\" Because $$\\tan x = \\frac{\\sin x}{\\cos x}$$, the zeros of tangent are inherited directly from the numerator (sine zeros at $$n\\pi$$), while the vertical asymptotes of tangent are inherited directly from the denominator (cosine zeros at $$\\frac{\\pi}{2} + n\\pi$$).", "source": "GLM 5.1 Ōæó", "_id": "glm_3_21", "judge_pick": true}, {"question": "How does the period of tangent fundamentally differ from sin and cos, and what is the visual consequence for crossings per period?", "answer": "Tangent has a period of **$$180^\\circ$$** (half of sin/cos's $$360^\\circ$$). The visual consequence is that a single period of tangent contains only **1 x-axis crossing** and **2 asymptotes**, whereas one full period of sin/cos contains 2 crossings and no asymptotes. Tan is the \"odd one out\" of the trio.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_22", "judge_pick": true}, {"question": "What is the core principle for counting the number of solutions to an equation like $$f(x) = g(x)$$ using graphs? (2 steps)", "answer": "- Step 1: Rearrange the equation so both sides are explicit functions: $$y = f(x)$$ and $$y = g(x)$$.\n- Step 2: The number of solutions equals the **number of times the two graphs intersect**. Always SKETCH both curves on the same axes and physically count the crossing points.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_23", "judge_pick": true}, {"question": "When sketching $$y = \\frac{1}{x} + 1$$, what is the common mistake regarding its horizontal asymptote, and why is the correct asymptote at $$y=1$$? (2 steps)", "answer": "- Step 1: The common mistake (Phuc's error) is placing the horizontal asymptote at **$$y = 0$$**, treating it like the base hyperbola $$y = \\frac{1}{x}$$.\n- Step 2: The \"$$+1$$\" is a vertical translation that shifts the entire base graph (including its asymptotes) UP by 1. As $$x \\to \\infty$$, $$\\frac{1}{x} \\to 0$$, so $$y \\to 0 + 1 = 1$$. The correct horizontal asymptote is **$$y = 1$$**.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_24", "judge_pick": false}, {"question": "Why does the curve $$y = \\frac{1}{x} + 1$$ intersect every branch of $$y = \\tan x$$ exactly once, even though it isn't a perfectly flat horizontal line? (2 steps)", "answer": "- Step 1: For large $$|x|$$, the term $$\\frac{1}{x}$$ shrinks to near-zero, making $$y = \\frac{1}{x} + 1$$ behave like a near-horizontal line at height $$y \\approx 1$$.\n- Step 2: Since each $$\\tan x$$ branch sweeps continuously from $$-\\infty$$ to $$+\\infty$$ (IVT), it must cross this near-horizontal line exactly once, regardless of the slight wobble in the hyperbola.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_25", "judge_pick": true}, {"question": "When counting intersections of $$y = \\tan x$$ and $$y = \\frac{1}{x} + 1$$ on $$-10\\pi \\le x \\le \\frac{5\\pi}{2}$$, what specific intersection isµ£ĆÕ«╣µśō missed, and why does it occur below the x-axis? (3 steps)", "answer": "- Step 1: The missed intersection is the **\"odd one out\"** on the interval $$(-\\pi/2, 0)$$, which causes an answer of 12 instead of the correct 14.\n- Step 2: Near the pole at $$x = 0$$ from the left ($$x \\to 0^-$$), the term $$\\frac{1}{x}$$ dives to $$-\\infty$$, dominating the \"$$+1$$\" and dragging the whole curve deeply negative.\n- Step 3: The $$\\tan x$$ branch in this interval rises from $$-\\infty$$ to $$0$$. Since both curves are negative here, their intersection must occur **below the x-axis**. Sketches that don't track the hyperbola's dive miss this crossing.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_26", "judge_pick": false}, {"question": "When counting intersections for periodic-vs-periodic equations (e.g., $$\\tan\\theta = 1 + \\sin\\theta$$), what is the general method strategy? (3 steps)", "answer": "- Step 1: Identify the **longest period** involved (here, $$360^\\circ$$ for sine vs $$180^\\circ$$ for tan) ŌĆö this is your repeating unit.\n- Step 2: Carefully sketch and count the intersections in **ONE full period** (e.g., $$0 \\le \\theta \\le 360^\\circ$$), watching for asymptote traps.\n- Step 3: Multiply the intersections per period by the number of whole periods in the interval, then manually adjust for any leftover partial period at the end.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_27", "judge_pick": false}, {"question": "When extrapolating intersection counts to large intervals, what is the first step to determine your \"repeating unit\"? (2 steps)", "answer": "- Step 1: Look at the periods of the functions involved. For a tan-vs-flat-line (like $$\\tan x = 1$$), the repeating unit is one $$\\pi$$-wide branch. For periodic-vs-periodic (like $$\\tan\\theta = 1+\\sin\\theta$$), it is the longer period ($$360^\\circ$$).\n- Step 2: The repeating unit is the smallest interval that captures the full, unvarying pattern of intersections that will simply tile across the larger domain.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_28", "judge_pick": false}, {"question": "When extrapolating counts to large intervals, why must you check the endpoints for $$\\le$$ vs $$<$$, and how does it affect the final count? (2 steps)", "answer": "- Step 1: An intersection exactly at an endpoint only counts if the endpoint is **included** ($$\\le$$). If it is excluded ($$<$$), that intersection must be subtracted from your total.\n- Step 2: For example, if $$\\tan x$$ hits a solution exactly at $$x = 2\\pi$$, it counts in $$0 \\le x \\le 2\\pi$$ but does NOT count in $$0 \\le x < 2\\pi$$. Always check boundary inclusion.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_29", "judge_pick": false}, {"question": "How does counting intersections on negative intervals (e.g., $$-10\\pi \\le x \\le 0$$) differ from positive intervals, and what trap must you watch for?", "answer": "Counting works identically by extending the branch-counting to the left. The only trap is the **special branch straddling a pole/pole-shift** (like the \"odd one out below the axis\" near $$x=0$$). The hyperbola $$y = 1/x + 1$$ behaves asymmetrically near $$x=0$$ (dives to $$-\\infty$$ on the left, $$+\\infty$$ on the right), so you cannot blindly mirror the positive-side count; you must sketch the negative side's pole behaviour specifically.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_30", "judge_pick": false}, {"question": "When applying the transformation $$y = f(x) + a$$ (e.g., $$y = 1 + \\sin\\theta$$ or $$y = \\frac{1}{x} + 1$$), what happens to both the curve and its asymptotes?", "answer": "The entire graph translates **UP by $$a$$**. Every point $$(x, y)$$ moves to $$(x, y+a)$$, and **both horizontal asymptotes move up by $$a$$**. Vertical asymptotes remain unchanged because shifting vertically doesn't alter where the function blows up horizontally (e.g., $$x=0$$ for $$1/x$$ stays at $$x=0$$).", "source": "GLM 5.1 Ōæó", "_id": "glm_3_31", "judge_pick": false}, {"question": "When applying the transformation $$y = f(ax)$$ (e.g., $$y = \\cos 2x$$), what is the common confusion between \"stretch\" and \"squash\", and what is the mapping rule to fix it? (2 steps)", "answer": "- Step 1: The common mistake (Phuc's error) is thinking $$x \\to 2x$$ stretches the graph wider. It actually **squashes** it horizontally by a scale factor $$1/a$$ (here, SF $$1/2$$), because the cycle completes twice as fast.\n- Step 2: Anchor it with the mapping rule: **$$(x, y) \\mapsto (x/a, y)$$**. For $$\\cos 2x$$, every landmark's x-coordinate halves (e.g., max at $$360^\\circ$$ moves to $$180^\\circ$$), proving it compresses toward the y-axis.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_32", "judge_pick": false}, {"question": "What is the specific mistake regarding the horizontal asymptote of $$y = \\frac{1}{x} + 1$$, and what conceptual misunderstanding causes it? (2 steps)", "answer": "- Step 1: The mistake is placing the horizontal asymptote at $$y = 0$$ instead of $$y = 1$$.\n- Step 2: This comes from ignoring the vertical translation. The \"$$+1$$\" shifts the entire base hyperbola and its horizontal asymptote up by 1. Failing to apply the shift to the asymptote leaves it at the base position.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_33", "judge_pick": false}, {"question": "What is the specific mistake regarding $$f(ax)$$ vs $$f(x/a)$$ transformations, and what is the quick rule to distinguish them?", "answer": "The mistake is confusing whether $$x \\to 2x$$ stretches or squashes. The quick rule: **$$f(ax)$$ applies a horizontal scale factor $$1/a$$** (if $$a>1$$, it SQUASHES); **$$f(x/a)$$ applies a horizontal scale factor $$a$$** (if $$a>1$$, it STRETCHES). Always anchor with $$(x,y) \\mapsto (x/a, y)$$ for $$f(ax)$$.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_34", "judge_pick": true}, {"question": "What is the specific mistake when solving \"cos $$2x^\\circ = p$$ has exactly TWO solutions,\" and how does the monotonic pieces strategy correct it? (2 steps)", "answer": "- Step 1: The mistake is giving the over-broad range $$-1 < p < 1$$, which actually yields THREE solutions because the line $$y = p$$ cuts all three monotonic pieces of the squashed wave.\n- Step 2: The correction is to split the curve into monotonic segments (down, up, down) and count which segments the line crosses. To hit exactly two, $$p$$ must miss the middle segment, requiring $$-1 < p < 0$$ or the exact peak $$p = 1$$.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_35", "judge_pick": false}, {"question": "What is the specific mistake when counting intersections for $$\\tan x = \\frac{1}{x} + 1$$ on $$-10\\pi \\le x \\le \\frac{5\\pi}{2}$$, and why does it happen?", "answer": "The mistake is answering **12** instead of **14** by missing the \"odd one out\" intersection below the x-axis. This happens because near the pole at $$x=0$$ from the left, the hyperbola dives to $$-\\infty$$, creating an intersection in the negative $$y$$-region. Sketches that only look for intersections near the positive $$y \\approx 1$$ line miss this dive.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_36", "judge_pick": false}, {"question": "What is the specific mistake when a question asks for the \"coordinates of the minimum point\" of a transformed trig graph, and how do you fix it?", "answer": "The mistake is giving a bare value like \"$$-4$$\" instead of a coordinate pair. The fix is to underline the word **\"coordinates\"** in the exam question, which demands an $$(x, y)$$ format. You must pair the $$x$$-value where the base function hits its min (e.g., $$270^\\circ$$) with the transformed $$y$$-value (e.g., $$-4$$) to write **$$(270^\\circ, -4)$$**.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_37", "judge_pick": false}, {"question": "What is the specific mistake when solving for an \"obtuse\" angle using $$\\sin^{-1}$$, and what is the fix?", "answer": "The mistake is taking the acute angle directly from the calculator (e.g., $$0.884$$ rad) and stopping. The fix is to underline **\"obtuse\"** and recall that $$\\sin^{-1}$$ only has a range of $$[-90^\\circ, 90^\\circ]$$ (or $$[-\\pi/2, \\pi/2]$$), so it can never spit out an obtuse angle. You must take the supplementary angle: **$$180^\\circ - \\text{acute}$$** (or $$\\pi - \\text{acute}$$), e.g., $$\\pi - 0.884 = 2.258$$ rad.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_38", "judge_pick": false}, {"question": "When an exam question says \"State the number of solutions, giving a reason,\" what exact phrasing structure is required for full marks? (2 steps)", "answer": "- Step 1: You must state the number explicitly, then provide a reason referencing the graphs.\n- Step 2: The required template is: \"There are **N** solutions because the graph of **[Curve 1]** intersects the graph of **[Curve 2]** **N** times in the interval **[given bounds]**.\" You must name BOTH curves and the interval.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_39", "judge_pick": false}, {"question": "When an exam question uses the word \"coordinates,\" what must you do to avoid losing the second B mark?", "answer": "You must provide an **$$(x, y)$$ point pair**, never a bare $$y$$-value. For example, if asked for the coordinates of the minimum of $$y = 4\\sin\\theta$$, writing \"$$-4$$\" loses a mark; writing \"$$(270^\\circ, -4)$$\" earns both. Underline \"coordinates\" to trigger this format.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_40", "judge_pick": false}, {"question": "When an exam question specifies an angle is \"obtuse,\" what trig range limitation forces you to adjust, and what is the adjustment formula?", "answer": "The $$\\sin^{-1}$$ function has a restricted range of $$[-\\pi/2, \\pi/2]$$ (acute and negative acute angles only); it physically cannot output an obtuse angle ($$\\pi/2 < \\theta < \\pi$$). The adjustment formula to find the obtuse solution is **$$\\theta = \\pi - \\sin^{-1}(x)$$** (or $$180^\\circ - \\text{acute}$$), which maps the acute angle to its supplementary obtuse partner in the second quadrant.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_41", "judge_pick": false}, {"question": "To count exactly $$N$$ solutions of a curve $$f(x) = p$$ on an interval, what is the general method strategy using monotonic pieces? (3 steps)", "answer": "- Step 1: Sketch the curve on the specific interval and split it into its **monotonic pieces** (segments that only go UP or only go DOWN without turning).\n- Step 2: Imagine drawing a horizontal line $$y = p$$ across the graph. Count how many monotonic pieces the line crosses based on the height $$p$$.\n- Step 3: Adjust for boundaries: if $$p$$ equals an exact maximum or minimum, it might \"touch\" instead of \"cross,\" altering the count (e.g., $$p=1$$ touching two maxima gives exactly 2 solutions).", "source": "GLM 5.1 Ōæó", "_id": "glm_3_42", "judge_pick": false}], "count": 43}, "qwen_1": {"label": "Qwen 3 ŌæĀ", "cards": [{"question": "What is the shape and starting point of the sine graph y = sin x? (1 step)", "answer": "The sine graph y = sin x starts at the origin (0,0) and rises smoothly to a maximum at 90┬░ (ŽĆ/2 rad), then decreases to zero at 180┬░ (ŽĆ rad), continues to a minimum at 270┬░ (3ŽĆ/2 rad), and returns to zero at 360┬░ (2ŽĆ rad). It repeats this wave pattern periodically.", "source": "Qwen 3 ŌæĀ", "_id": "qwen_1_0", "judge_pick": false}, {"question": "How does a vertical stretch transformation affect the range of y = sin x? (1 step)", "answer": "A vertical stretch by a factor of *a* (e.g., y = 4 sin x) scales the amplitude, making the range ŌłÆa Ōēż y Ōēż a. For y = 4 sin x, the range becomes ŌłÆ4 Ōēż y Ōēż 4.", "source": "Qwen 3 ŌæĀ", "_id": "qwen_1_1", "judge_pick": false}, {"question": "What happens to the sine graph when you apply y = 1 + sin x? (1 step)", "answer": "The graph shifts upward by 1 unit, so its range becomes 0 Ōēż y Ōēż 2. The minimum point at 270┬░ (3ŽĆ/2 rad) touches the x-axis (y = 0).", "source": "Qwen 3 ŌæĀ", "_id": "qwen_1_2", "judge_pick": false}, {"question": "How do you calculate the period of y = sin(kx) or y = cos(kx)? (1 step)", "answer": "The period is 360┬░/k (or 2ŽĆ/k radians). For example, y = sin(2x) has a period of 180┬░ (ŽĆ radians).", "source": "Qwen 3 ŌæĀ", "_id": "qwen_1_3", "judge_pick": false}, {"question": "Why does the cosine graph y = cos x start at (0,1)? (1 step)", "answer": "Cosine is the sine graph shifted left by 90┬░ (ŽĆ/2 rad). At x = 0, cos x = 1, making it start at its maximum value.", "source": "Qwen 3 ŌæĀ", "_id": "qwen_1_4", "judge_pick": false}, {"question": "How do you find the zeros of y = cos x? (1 step)", "answer": "Cos x = 0 at x = 90┬░ + 180┬░n (ŽĆ/2 + ŽĆn radians), where n is an integer. Over 0 Ōēż x Ōēż 360┬░, zeros occur at 90┬░ and 270┬░.", "source": "Qwen 3 ŌæĀ", "_id": "qwen_1_5", "judge_pick": false}, {"question": "What transformation occurs in y = cos 2x┬░, and how does it affect the period? (1 step)", "answer": "The graph undergoes a horizontal squash by a factor of 1/2, making the period 360┬░/2 = 180┬░. Every point (x, y) maps to (x/2, y).", "source": "Qwen 3 ŌæĀ", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Why is the range of p for \"cos 2x┬░ = p has exactly two solutions\" ŌłÆ1 < p < 0 OR p = 1, not ŌłÆ1 < p < 1? (2 steps)", "answer": "- Step 1: The graph of y = cos 2x┬░ has three monotonic pieces over 0 Ōēż x Ōēż 225┬░: decreasing (0ŌĆō90┬░), increasing (90ŌĆō180┬░), and decreasing (180ŌĆō225┬░).  \n- Step 2: A horizontal line y = p with 0 Ōēż p < 1 dding 1 shifts this to [0, 2], so the minimum value is 0 (touching the x-axis at ╬Ė = 270┬░).  \n\n**Takeaway:** Vertical shifts preserve shape but move the graph up/down, directly altering its range.", "source": "Qwen 3 ŌæĪ", "_id": "qwen_2_2", "judge_pick": false}, {"question": "How do you sketch y = cos 2x┬░ and why is its period 180┬░? (3 steps)", "answer": "- Step 1: Recognize horizontal compression. The transformation x ŌåÆ 2x compresses the graph horizontally by a factor of ┬Į.  \n- Step 2: Calculate the new period. For cos(kx┬░), period = $ \\frac{360^\\circ}{k} $. Here, k = 2 ŌćÆ 180┬░.  \n- Step 3: Plot key points. (0┬░, 1) ŌåÆ (45┬░, 0) ŌåÆ (90┬░, ŌłÆ1) ŌåÆ (135┬░, 0) ŌåÆ (180┬░, 1).  \n\n**Takeaway:** Compressing the cosine graph horizontally halves its period and doubles the frequency.", "source": "Qwen 3 ŌæĪ", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Why is the range of p in \"cos 2x┬░ = p has exactly two solutions\" ŌłÆ1 < p < 0 OR p = 1 instead of ŌłÆ1 < p < 1? (3 steps)", "answer": "- Step 1: Split the graph into monotonic pieces. The function cos 2x┬░ on 0 Ōēż x Ōēż 225┬░ has three monotonic segments: decreasing (0┬░ŌĆō90┬░), increasing (90┬░ŌĆō180┬░), decreasing (180┬░ŌĆō225┬░).  \n- Step 2: Analyze how horizontal lines intersect.  \n  + For 0 < p < 1: The line y = p intersects all three segments ŌćÆ 3 solutions.  \n  + For ŌłÆ1 < p < 0: The line y = p intersects two segments ŌćÆ 2 solutions.  \n  + For p = 1: The line touches the maximums at x = 0┬░ and 180┬░ ŌćÆ 2 solutions.  \n- Step 3: Conclude valid ranges. Only ŌłÆ1 < p < 0 or p = 1 yield exactly two solutions.  \n\n**Takeaway:** The number of solutions depends on how many monotonic segments a horizontal line intersects.", "source": "Qwen 3 ŌæĪ", "_id": "qwen_2_4", "judge_pick": false}, {"question": "What is the first step when solving tan x = 1/x + 1 graphically? (2 steps)", "answer": "- Step 1: Sketch y = tan x and y = 1/x + 1 on the same axes.  \n- Step 2: Identify key features:  \n  + y = 1/x + 1 has a horizontal asymptote at y = 1 (not y = 0) and a vertical asymptote at x = 0.  \n  + Each branch of tan x spans ŌłÆŌł× to +Ōł×, ensuring one intersection per branch with the nearly horizontal y Ōēł 1 line.  \n\n**Takeaway:** The horizontal asymptote of y = 1/x + 1 determines where intersections occur.", "source": "Qwen 3 ŌæĪ", "_id": "qwen_2_5", "judge_pick": false}, {"question": "How do you count solutions for y = tan ╬Ė intersecting y = 1 + sin ╬Ė over 0 Ōēż ╬Ė Ōēż 2160┬░? (3 steps)", "answer": "- Step 1: Determine the period of the composite system. Since y = 1 + sin ╬Ė has period 360┬░ and y = tan ╬Ė has period 180┬░, the combined period is 360┬░ (the longer period).  \n- Step 2: Count solutions in one 360┬░ interval. Sketch both graphs and count intersections (e.g., 2 solutions in 0┬░ŌĆō360┬░).  \n- Step 3: Multiply by the number of full periods in 2160┬░. 2160┬░ ├Ę 360┬░ = 6 ŌćÆ 6 ├Ś 2 = 12 solutions.  \n\n**Takeaway:** Use the longer period to define the repeating unit and extrapolate multiplicatively.", "source": "Qwen 3 ŌæĪ", "_id": "qwen_2_6", "judge_pick": false}, {"question": "Why is the horizontal asymptote of y = 1/x + 1 at y = 1 instead of y = 0?", "answer": "The \"+1\" vertically shifts the entire graph of y = 1/x upward by 1 unit. As x ŌåÆ ┬▒Ōł×, 1/x ŌåÆ 0, so y ŌåÆ 0 + 1 = 1. This applies to all rational functions: y = f(x) + a has a horizontal asymptote at y = a (if f(x) approaches a limit).  \n\n**Takeaway:** Vertical shifts directly affect horizontal asymptotes; ignore the \"+a\" only at your peril.", "source": "Qwen 3 ŌæĪ", "_id": "qwen_2_7", "judge_pick": false}, {"question": "How do you adjust the period for y = tan(kx)?", "answer": "The period of y = tan(kx) is $ \\frac{180^\\circ}{k} $ (or $ \\frac{\\pi}{k} $ radians). For example:  \n- If k = 2, the period becomes 90┬░, meaning the graph completes one full cycle in 90┬░ (double the frequency of tan x).  \n- This rule differs from sin/cos because tan has an intrinsic period of 180┬░, not 360┬░.  \n\n**Takeaway:** TangentŌĆÖs period halves faster than sine/cosine under horizontal scaling.", "source": "Qwen 3 ŌæĪ", "_id": "qwen_2_8", "judge_pick": false}, {"question": "What is the trick for avoiding missing solutions near asymptotes in tan x = 1/x + 1?", "answer": "Always sketch the graph near poles (asymptotes) and check for **below-axis** intersections. For example:  \n- Near x = 0, y = 1/x + 1 plunges to ŌłÆŌł× as x approaches 0 from the left, intersecting the tan x branch below the x-axis.  \n- Phuc missed this in ŌłÆ10ŽĆ Ōēż x Ōēż 5ŽĆ/2, answering 12 instead of 14.  \n\n**Takeaway:** Draw detailed sketches near asymptotes and count both above and below intersections.", "source": "Qwen 3 ŌæĪ", "_id": "qwen_2_9", "judge_pick": false}, {"question": "When is the range of p in \"cos 2x┬░ = p\" answered with p = 1?", "answer": "When the horizontal line y = p touches **exactly two** maxima of the graph. For cos 2x┬░ on 0 Ōēż x Ōēż 225┬░:  \n- The maximum y = 1 occurs at x = 0┬░ and x = 180┬░, both within the interval.  \n- A horizontal line at y = 1 intersects the graph at these two points, satisfying \"exactly two solutions\".  \n\n**Takeaway:** Endpoints matterŌĆöextreme values of p (like maxima/minima) can intersect multiple times.", "source": "Qwen 3 ŌæĪ", "_id": "qwen_2_10", "judge_pick": false}, {"question": "How do you transform coordinates under y = f(ax)?", "answer": "Apply the rule (x, y) Ōå” (x/a, y). For example:  \n- y = cos 2x┬░ maps the point (180┬░, ŌłÆ1) on y = cos x┬░ to (90┬░, ŌłÆ1) on y = cos 2x┬░.  \n- This scales the x-axis by 1/a, effectively squashing the graph horizontally when a > 1.  \n\n**Takeaway:** Horizontal scaling affects x-coordinates only; compressing by 1/a increases frequency.", "source": "Qwen 3 ŌæĪ", "_id": "qwen_2_11", "judge_pick": false}, {"question": "What is the key difference between the x-axis crossings of sin x and tan x?", "answer": "| Function | Zero-Crossings | Frequency |  \n| estion": "How does the transformation y = 1 + sin ╬Ė affect the graph, and what is its new range? (2 steps)", "answer": "- Step 1: Adding 1 to the function translates the entire graph upward by 1 unit. The horizontal asymptote (if any) also moves up by 1.\n- Step 2: Since sin ╬Ė ranges from ŌłÆ1 to 1, adding 1 shifts this to (1 + (ŌłÆ1)) Ōēż y Ōēż (1 + 1), giving range 0 Ōēż y Ōēż 2. The curve now just touches the x-axis at its minimum point (╬Ė = 270┬░) and never goes below.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_1", "judge_pick": false}, {"question": "What are the key landmark points of y = cos x over 0┬░ Ōēż x Ōēż 360┬░? (3 steps)", "answer": "- Step 1: Identify the five key points at x = 0┬░, 90┬░, 180┬░, 270┬░, 360┬░.\n- Step 2: Compute y-values: cos(0┬░) = 1, cos(90┬░) = 0, cos(180┬░) = ŌłÆ1, cos(270┬░) = 0, cos(360┬░) = 1.\n+ Coordinates: (0,1), (90,0), (180,ŌłÆ1), (270,0), (360,1).\n- Step 3: The cosine graph starts at its maximum (1), falls to zero, continues to its minimum (ŌłÆ1), returns to zero, then back to maximum ŌĆö one complete period.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_2", "judge_pick": false}, {"question": "For the transformation y = cos 2x┬░, what happens to the x-coordinates of the landmark points and what is the new period? (3 steps)", "answer": "- Step 1: The transformation x ŌåÆ 2x is a horizontal squash with scale factor 1/2. The mapping is (x, y) Ōå” (x/2, y), meaning every x-coordinate is halved.\n- Step 2: Apply this to the landmarks: (0,1) ŌåÆ (0,1); (45┬░,0) because 2(45┬░) = 90┬░; (90┬░,ŌłÆ1) because 2(90┬░) = 180┬░; (135┬░,0); (180┬░,1); and so on.\n- Step 3: The period of cos 2x┬░ is 360┬░/2 = 180┬░, since period = 360/k for cos(kx┬░).", "source": "MiniMax ŌæĀ", "_id": "minimax_1_3", "judge_pick": false}, {"question": "What is the trap in the question \"cos 2x┬░ = p has exactly two solutions on 0 Ōēż x Ōēż 225┬░, find the range of p\"? Why is the answer NOT ŌłÆ1 < p < 1? (3 steps)", "answer": "- Step 1: Sketch y = cos 2x┬░ from x = 0 to 225┬░. The curve goes (0,1) ŌåÆ (45┬░,0) ŌåÆ (90┬░,ŌłÆ1) ŌåÆ (135┬░,0) ŌåÆ (180┬░,1) ŌåÆ (225┬░,0). This creates three monotonic (single-direction) pieces.\n- Step 2: A horizontal line y = p cuts each monotonic piece at most once. For 0 Ōēż p < 1, the line cuts ALL three pieces ŌåÆ three solutions. Only for ŌłÆ1 < p < 0 does the line cut exactly two pieces (the middle and one end piece).\n- Step 3: Additionally, p = 1 touches exactly two points (the maxima at x = 0┬░ and x = 180┬░), giving exactly two solutions. So the correct range is ŌłÆ1 < p < 0 OR p = 1, not ŌłÆ1 < p < 1.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_4", "judge_pick": false}, {"question": "What are the vertical asymptotes of y = tan x, and why do they occur at those x-values? (2 steps)", "answer": "- Step 1: Vertical asymptotes occur where tan x is undefined, i.e., where cos x = 0 (since tan x = sin x / cos x). Cos x = 0 at x = 90┬░, 270┬░, 450┬░, ... which is x = 90┬░ + 180┬░n or in radians x = (2n+1)┬ĘŽĆ/2.\n- Step 2: At these angles, the denominator cos x equals zero, so tan x tends to ┬▒Ōł×. The graph has asymptotes at these vertical lines and never crosses them.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_5", "judge_pick": false}, {"question": "What is the period of y = tan x, and how does it compare to sin x and cos x? (1 step)", "answer": "- Step 1: tan x has period 180┬░ (ŽĆ radians), which is HALF the period of sin x and cos x (360┬░ or 2ŽĆ). This is because tan(x + 180┬░) = tan x, and the pattern of branches repeats every 180┬░.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_6", "judge_pick": false}, {"question": "How many times does y = tan x cross the x-axis over the interval 0 Ōēż x Ōēż 360┬░, and where are these crossings? (2 steps)", "answer": "- Step 1: tan x = 0 when sin x = 0 (since tan = sin/cos). This occurs at x = 0┬░, 180┬░, 360┬░, ... i.e. x = 180┬░n.\n- Step 2: Over 0 Ōēż x Ōēż 360┬░, the crossings are at x = 0┬░, 180┬░, and 360┬░ ŌĆö three crossings (including both endpoints). Per open period (0 to 180┬░), there are two crossings (one inside, one at the endpoint).", "source": "MiniMax ŌæĀ", "_id": "minimax_1_7", "judge_pick": false}, {"question": "Why does any horizontal line y = c intersect each branch of y = tan x exactly once? (2 steps)", "answer": "- Step 1: This is the Intermediate Value Theorem (IVT) in action. Each branch of tan x (over an interval of width ŽĆ) is a continuous function that rises strictly from ŌłÆŌł× to +Ōł×.\n- Step 2: Since the function takes all values between ŌłÆŌł× and +Ōł× as it increases, it must cross any finite horizontal line y = c exactly once on each branch.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_8", "judge_pick": false}, {"question": "What is the horizontal asymptote of y = 1/x + 1, and why is it y = 1 and NOT y = 0? (2 steps)", "answer": "- Step 1: The basic hyperbola y = 1/x has a horizontal asymptote at y = 0 (as x ŌåÆ ┬▒Ōł×, 1/x ŌåÆ 0).\n- Step 2: Adding 1 to the entire function, y = 1/x + 1, translates the graph up by 1 unit. Both the curve and its horizontal asymptote move up by 1, so the horizontal asymptote becomes y = 1.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_9", "judge_pick": false}, {"question": "In the intersection of y = tan x and y = 1/x + 1 on ŌłÆ2ŽĆ Ōēż x < 2ŽĆ, why are there exactly 4 solutions? (3 steps)", "answer": "- Step 1: The graph of tan x has four complete branches in this interval: from ŌłÆ2ŽĆ to ŌłÆ3ŽĆ/2, ŌłÆ3ŽĆ/2 to ŌłÆŽĆ, ŌłÆŽĆ to ŌłÆŽĆ/2, ŌłÆŽĆ/2 to 0, 0 to ŽĆ/2, ŽĆ/2 to ŽĆ, ŽĆ to 3ŽĆ/2, 3ŽĆ/2 to 2ŽĆ (excluding the endpoint).\n- Step 2: Each branch of tan x crosses the near-horizontal line y = 1/x + 1 exactly once by the IVT, because tan x goes from ŌłÆŌł× to +Ōł× while 1/x + 1 stays finite.\n- Step 3: There are 4 solutions because the graph of y = 1/x + 1 intersects the graph of y = tan x four times in the interval ŌłÆ2ŽĆ Ōēż x < 2ŽĆ.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_10", "judge_pick": true}, {"question": "For tan x = 1/x + 1 on ŌłÆ10ŽĆ Ōēż x Ōēż 5ŽĆ/2, why does Phuc's answer of 12 miss the correct answer of 14? What was missed? (3 steps)", "answer": "- Step 1: The naive count would be 10 ordinary branches from ŌłÆ10ŽĆ up to ŌłÆŽĆ/2, plus 3 more from 0 to 5ŽĆ/2, giving 13.\n- Step 2: However, there's an \"odd one out\" branch in the interval (ŌłÆŽĆ/2, 0). Near the pole at x = 0, the curve 1/x + 1 dives down to ŌłÆŌł× (since 1/x ŌåÆ ŌłÆŌł× as x approaches 0 from the right).\n- Step 3: This branch of tan x (which still rises from ŌłÆŌł× to +Ōł×) intersects 1/x + 1 BELOW the x-axis ŌĆö a crossing that is easily missed if you only look above the axis. This gives the extra crossing, making 14 total.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_11", "judge_pick": false}, {"question": "What is the transformation rule for f(ax) and how does it affect the period? (2 steps)", "answer": "- Step 1: f(ax) represents a horizontal stretch with scale factor 1/a. The mapping is (x, y) Ōå” (x/a, y). If a > 1, this is a squash toward the y-axis (x-coordinates get smaller); if 0 < a < 1, it's a stretch away from the y-axis.\n- Step 2: The period changes inversely: period of f(ax) = (original period)/a. For sin(kx) and cos(kx), period = 360┬░/k (or 2ŽĆ/k radians). For tan(kx), period = 180┬░/k (or ŽĆ/k radians).", "source": "MiniMax ŌæĀ", "_id": "minimax_1_12", "judge_pick": false}, {"question": "For the question \"state the number of solutions, giving a reason,\" what specific phrasing must you include to get full marks? (2 steps)", "answer": "- Step 1: You must name BOTH curves being intersected and state the interval.\n- Step 2: The answer should follow the format: \"There are N solutions because the graph of [curve 1] intersects the graph of [curve 2] N times in the interval given.\" For example: \"There are 4 solutions because the graph of y = tan x intersects the graph of y = 1/x + 1 four times in the interval ŌłÆ2ŽĆ Ōēż x < 2ŽĆ.\"", "source": "MiniMax ŌæĀ", "_id": "minimax_1_13", "judge_pick": false}, {"question": "When a question asks for \"coordinates,\" why is answering just \"ŌłÆ4\" for the minimum point of y = 4 sin ╬Ė insufficient? (1 step)", "answer": "- Step 1: The word \"coordinates\" specifically demands a point pair (x, y). The correct answer is (270┬░, ŌłÆ4), not just ŌłÆ4. The first B mark goes for the value, but the second B mark is lost without the coordinate pair. Always underline \"coordinates\" in the question.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_14", "judge_pick": false}, {"question": "What is Harry's \"rhythm rule\" for tan x, and how does it help you remember the pattern of zeros and asymptotes? (1 step)", "answer": "- Step 1: \"Something interesting happens every 90┬░ (every ŽĆ/2)\" ŌĆö alternating between zeros and asymptotes: at 0┬░ there's a zero, at 90┬░ an asymptote, at 180┬░ a zero, at 270┬░ an asymptote, and so on. This alternating pattern continues throughout.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_15", "judge_pick": false}, {"question": "How do you count solutions when solving tan ╬Ė = 1 + sin ╬Ė over a large interval like 0 Ōēż ╬Ė Ōēż 2160┬░? (3 steps)", "answer": "- Step 1: Identify the repeating unit. Since tan has period 180┬░ and 1 + sin has period 360┬░, the combined pattern repeats every 360┬░ (the least common multiple).\n- Step 2: Count the solutions in ONE 360┬░ period by sketching or analyzing the curves. Then determine how many whole periods fit in the interval: 2160┬░ ├Ę 360┬░ = 6 complete periods.\n- Step 3: Multiply: solutions per period ├Ś number of periods = total solutions.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_16", "judge_pick": false}, {"question": "For tan ╬Ė = 1 + sin ╬Ė on 0 Ōēż ╬Ė Ōēż 1980┬░, how do you handle the leftover partial period at the end? (3 steps)", "answer": "- Step 1: 1980┬░ ├Ę 360┬░ = 5 full periods (1800┬░) with 180┬░ remaining.\n- Step 2: Count solutions in the first 5 complete periods (multiply by 5).\n- Step 3: For the leftover 180┬░ (from 1800┬░ to 1980┬░), count the crossings in that final half-period separately (either 0, 1, or 2 depending on the positions), then add to the previous total.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_17", "judge_pick": false}, {"question": "What is the relationship between sin x and cos x, and how does this show in their graphs? (2 steps)", "answer": "- Step 1: cos x = sin(x + 90┬░). This means the cosine graph is the sine graph shifted LEFT by 90┬░.\n- Step 2: Both have period 360┬░, range ŌłÆ1 to 1, but sine starts at (0,0) rising, while cosine starts at (0,1) falling. They are the same wave, just 90┬░ out of phase.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_18", "judge_pick": false}, {"question": "How do the symmetries of sin x, cos x, and tan x differ? (2 steps)", "answer": "- Step 1: sin is an odd function: sin(ŌłÆx) = ŌłÆsin x, giving rotational symmetry about the origin. cos is an even function: cos(ŌłÆx) = cos x, giving reflection symmetry about the y-axis. tan is also odd: tan(ŌłÆx) = ŌłÆtan x.\n- Step 2: This means sin and tan graphs are symmetric through the origin (if you rotate 180┬░ you get the same graph); cos is symmetric about the y-axis (mirrored left-right).", "source": "MiniMax ŌæĀ", "_id": "minimax_1_19", "judge_pick": false}, {"question": "Why does y = 1 + sin ╬Ė touch the x-axis at its minimum, while y = sin ╬Ė crosses through it? (2 steps)", "answer": "- Step 1: y = sin ╬Ė has minimum value ŌłÆ1 at ╬Ė = 270┬░, so the graph crosses the x-axis at (0,0), (180,0), (360,0), etc.\n- Step 2: y = 1 + sin ╬Ė shifts the entire graph up by 1, so its minimum becomes (ŌłÆ1 + 1) = 0 at ╬Ė = 270┬░. The graph now just touches the x-axis at its lowest points (tangent, not crossing), and never goes below it.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_20", "judge_pick": false}, {"question": "What is the memory hook for remembering which trig functions have asymptotes and which don't? (1 step)", "answer": "- Step 1: Only tan has asymptotes. Sin and cos are \"bounded\" (range ŌłÆ1 to 1), so they never blow up to infinity. Tan is unbounded (range all real numbers), so it has vertical asymptotes where cos = 0. Remember: \"Where cos is zero, tan blows up.\"", "source": "MiniMax ŌæĀ", "_id": "minimax_1_21", "judge_pick": false}, {"question": "When solving \"f(ax) = p has exactly N solutions,\" what is the key method to avoid the trap of giving too wide a range for p? (3 steps)", "answer": "- Step 1: Split the curve into monotonic (single-direction) pieces across the interval. Each monotonic piece can be crossed by a horizontal line at most once.\n- Step 2: Determine how many of these pieces a horizontal line y = p will cut for different values of p. Count carefully which p values give exactly N intersections.\n- Step 3: For the \"exactly two solutions\" case with cos 2x┬░ on 0 Ōēż x Ōēż 225┬░, the curve has three monotonic pieces. Only p in (ŌłÆ1, 0) cuts two pieces, plus p = 1 touches two maxima ŌĆö this is the narrow correct range, not (ŌłÆ1, 1).", "source": "MiniMax ŌæĀ", "_id": "minimax_1_22", "judge_pick": false}, {"question": "How many x-axis crossings does each trig function have per period? (2 steps)", "answer": "- Step 1: sin x crosses twice per period (at x = 0 and x = ŽĆ within 0 to 2ŽĆ). Over 0 to 360┬░ it crosses 3 times if you include both endpoints.\n- Step 2: cos x crosses twice per period (at x = ŽĆ/2 and 3ŽĆ/2 within 0 to 2ŽĆ). tan crosses once per period (at x = 0 within 0 to ŽĆ), since its period is only 180┬░.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_23", "judge_pick": false}, {"question": "What is the correct period formula for sin(kx), cos(kx), and tan(kx) in both degrees and radians? (1 step)", "answer": "- Step 1: For sin(kx) and cos(kx): period = 360┬░/k or 2ŽĆ/k radians. For tan(kx): period = 180┬░/k or ŽĆ/k radians. Note that tan's period is always half that of sin/cos for the same k.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_24", "judge_pick": false}, {"question": "What is the transformation effect of f(x) + a versus f(x + a)? (2 steps)", "answer": "- Step 1: f(x) + a translates the graph UP by a units. The horizontal asymptote (if any) moves up by a. The vertical asymptotes (if any) stay in the same position.\n- Step 2: f(x + a) translates the graph LEFT by a units (the opposite of what you might expect ŌĆö it's a shift in the opposite direction of the sign).", "source": "MiniMax ŌæĀ", "_id": "minimax_1_25", "judge_pick": false}, {"question": "In the comparison table, what are the zeros and asymptotes of tan x in terms of sin and cos? (2 steps)", "answer": "- Step 1: tan x = 0 when sin x = 0 (since tan = sin/cos). This gives zeros at x = 0, ŽĆ, 2ŽĆ, ... i.e. x = ŽĆn or 180┬░n.\n- Step 2: tan x is undefined (asymptote) when cos x = 0. This gives asymptotes at x = ŽĆ/2, 3ŽĆ/2, 5ŽĆ/2, ... i.e. x = (2n+1)ŽĆ/2 or 90┬░ + 180┬░n.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_26", "judge_pick": false}, {"question": "Why is the question \"find the range of p such that cos 2x┬░ = p has exactly two solutions\" considered an A* question? (2 steps)", "answer": "- Step 1: Most students would think any p between ŌłÆ1 and 1 gives solutions, and perhaps think \"exactly two\" means p between ŌłÆ1 and 1 ŌĆö this is the common trap.\n- Step 2: The correct analysis requires splitting the curve into monotonic pieces and carefully counting which p values cross exactly two pieces. This level of strategic thinking and careful counting is what distinguishes A* work from standard A-grade work.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_27", "judge_pick": false}, {"question": "For negative intervals like ŌłÆ2ŽĆ Ōēż x < 0, how do you count tan x intersections with a horizontal line? (2 steps)", "answer": "- Step 1: The same principles apply ŌĆö each branch of tan (each ŽĆ-width interval between asymptotes) gives exactly one intersection by IVT.\n- Step 2: You must be careful with the branch straddling the pole at x = 0 (or any asymptote). Near asymptotes, check whether the other curve goes to ┬▒Ōł× or stays finite, and whether the intersection occurs above or below the x-axis. This is where crossings are easily missed.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_28", "judge_pick": false}, {"question": "What does \"obtuse\" mean in the context of inverse trig functions, and how do you find the obtuse angle solution? (2 steps)", "answer": "- Step 1: The inverse sine function sinŌü╗┬╣ returns values only in the range [ŌłÆ90┬░, 90┬░] (or [ŌłÆŽĆ/2, ŽĆ/2] in radians) ŌĆö the principal value range, which gives acute angles (or their negatives).\n- Step 2: To find an obtuse angle (between 90┬░ and 180┬░, or ŽĆ/2 and ŽĆ), you must take 180┬░ ŌłÆ (acute angle) = ŽĆ ŌłÆ (acute). For example, if the acute angle is 0.884 rad, the obtuse solution is ŽĆ ŌłÆ 0.884 = 2.258 rad. Always look for \"obtuse\" in the question to trigger this adjustment.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_29", "judge_pick": false}, {"question": "Why does the question \"state the number of solutions\" require both a number AND a reason? (1 step)", "answer": "- Step 1: The mark scheme awards one mark for the correct number and a second mark for a clear, mathematically precise reason that demonstrates understanding of the graphical intersection. Without the reason, you can only score half the available marks.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_30", "judge_pick": false}, {"question": "When extrapolating solutions for periodic functions over large intervals, what are the five steps to follow? (5 steps)", "answer": "- Step 1: Identify the repeating unit (one period for periodic curves, one ŽĆ-branch for tan-vs-flat-line).\n- Step 2: Count solutions in one unit by sketching carefully.\n- Step 3: Count whole units in the interval: (length of interval) ├Ę (length of unit).\n- Step 4: Multiply: solutions per unit ├Ś number of whole units.\n- Step 5: Adjust for partial units at the ends, checking open vs closed endpoints (Ōēż vs <) and any special crossings below the axis.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_31", "judge_pick": false}, {"question": "Why is there no maximum or minimum value for y = tan x, unlike sin x and cos x? (1 step)", "answer": "- Step 1: tan x = sin x / cos x has range all real numbers (ŌłÆŌł× < tan x < Ōł×). As x approaches the asymptotes, tan x grows unboundedly positive or negative, so there is no finite maximum or minimum ŌĆö the function is unbounded.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_32", "judge_pick": false}, {"question": "What is the key difference in how f(ax) and f(x/a) affect the x-coordinates of points on the graph? (2 steps)", "answer": "- Step 1: For f(ax) with a > 1, the mapping is (x, y) ŌåÆ (x/a, y), so x-coordinates are divided by a ŌĆö this is a horizontal squash (scale factor 1/a).\n- Step 2: For f(x/a) with a > 1, the mapping is (ax, y), so x-coordinates are multiplied by a ŌĆö this is a horizontal stretch (scale factor a). The key is: inside the parentheses, multiply by a ŌåÆ divide the x-coordinate.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_33", "judge_pick": false}, {"question": "For the transformation y = 4 sin ╬Ė, what is the amplitude and how does it relate to the range? (2 steps)", "answer": "- Step 1: The amplitude is the coefficient of the sine function: 4. Amplitude measures the vertical stretch factor from the midline.\n- Step 2: The range extends from (ŌłÆamplitude) to (+amplitude), i.e., from ŌłÆ4 to +4. More generally, for y = a sin ╬Ė, the range is [ŌłÆ|a|, |a|].", "source": "MiniMax ŌæĀ", "_id": "minimax_1_34", "judge_pick": false}, {"question": "In the tan x = 1/x + 1 question, why does the curve 1/x + 1 have a vertical asymptote at x = 0? (1 step)", "answer": "- Step 1: At x = 0, the expression 1/x + 1 is undefined (division by zero). As x approaches 0 from the right, 1/x ŌåÆ +Ōł×; from the left, 1/x ŌåÆ ŌłÆŌł×. This creates a vertical asymptote at x = 0.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_35", "judge_pick": false}, {"question": "What are the coordinates of the maximum and minimum points of y = cos x in degrees, and how do you express them generally? (2 steps)", "answer": "- Step 1: Maximum (+1) occurs at x = 0┬░ + 360┬░n, i.e., x = 360┬░n (or 2ŽĆn radians). The coordinates are (360┬░n, 1).\n- Step 2: Minimum (ŌłÆ1) occurs at x = 180┬░ + 360┬░n, i.e., x = 180┬░ + 360┬░n (or ŽĆ + 2ŽĆn radians). The coordinates are (180┬░ + 360┬░n, ŌłÆ1).", "source": "MiniMax ŌæĀ", "_id": "minimax_1_36", "judge_pick": false}, {"question": "What is the relationship between the zeros of sin x, cos x, and tan x? (2 steps)", "answer": "- Step 1: sin x and tan x share the same zeros: at x = 0┬░, 180┬░, 360┬░, ... (x = ŽĆn or 180┬░n), because tan x = sin x / cos x and tan x = 0 when sin x = 0.\n- Step 2: cos x zeros are offset by 90┬░: at x = 90┬░, 270┬░, 450┬░, ... (x = ŽĆ/2 + ŽĆn or 90┬░ + 180┬░n). These are exactly where tan x has its asymptotes.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_37", "judge_pick": true}, {"question": "Why must you check \"below the axis\" when counting intersections between tan x and 1/x + 1? (2 steps)", "answer": "- Step 1: The curve 1/x + 1 stays near y = 1 for large |x|, but near the pole at x = 0, it dives to ŌłÆŌł× from the right and to +Ōł× from the left.\n- Step 2: The branch of tan x in (ŌłÆŽĆ/2, 0) still goes from ŌłÆŌł× to +Ōł×, so it must cross 1/x + 1 somewhere below the x-axis. If you only check above the axis, you miss this \"odd one out\" crossing, undercounting solutions.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_38", "judge_pick": false}], "count": 39}, "minimax_2": {"label": "MiniMax ŌæĪ", "cards": [{"question": "What is the first formula you should write when you see the phrase \"given that B\" in a probability question? (1 step)", "answer": "$$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$\n\nThis is the definition of conditional probability ŌĆö always write it before substituting any numbers.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_0", "judge_pick": false}, {"question": "For grouped-data quartiles in Edexcel S1, what formula do you use for the position of Q1, and what is the common mistake to avoid? (2 steps)", "answer": "- Step 1: Use $$\\frac{n}{4}$$ directly ŌĆö do NOT add 1 like you would for discrete data.\n- Step 2: For example, with n = 40, Q1 is at position 10, not 10.25.\n\nThe key insight is that grouped data are continuous, so you use the simple fraction rather than the (n+1) adjustment.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_1", "judge_pick": false}, {"question": "What is the trigger phrase that forces you to use the transformation period formula for y = sin(kx) or y = cos(kx)? (1 step)", "answer": "When you see \"period\" or \"how many complete cycles\" in the question ŌĆö write down immediately:\n$$\\text{Period} = \\frac{360┬░}{k} \\text{ (degrees)} = \\frac{2\\pi}{k} \\text{ (radians)}$$\n\nThis formula is your first step before any sketching or counting.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_2", "judge_pick": false}, {"question": "In the cosine graph y = cos x, where are the x-axis crossings (zeros), and how many occur in the interval 0┬░ Ōēż x Ōēż 360┬░? (2 steps)", "answer": "- Step 1: Zeros occur where cos x = 0, which happens at $$x = 90┬░ + 180┬░n$$ or in radians $$x = \\frac{\\pi}{2} + \\pi n$$.\n- Step 2: Over 0┬░ Ōēż x Ōēż 360┬░, there are exactly 2 crossings: at x = 90┬░ and x = 270┬░.\n\nThe pattern is offset by 90┬░ from sine, which crosses at 0┬░, 180┬░, 360┬░.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_3", "judge_pick": false}, {"question": "For the tangent graph y = tan x, what are the locations of the vertical asymptotes in both degrees and radians? (1 step)", "answer": "$$x = 90┬░ + 180┬░n$$ or equivalently $$x = (2n+1)\\cdot\\frac{\\pi}{2}$$ radians, where n is any integer.\n\nThis occurs because tan x = sin x / cos x, and cos x = 0 at these points. The asymptotes repeat every 180┬░ (ŽĆ radians).", "source": "MiniMax ŌæĪ", "_id": "minimax_2_4", "judge_pick": false}, {"question": "What is the range of y = 4 sin ╬Ė, and what is the coordinate of its minimum point? (2 steps)", "answer": "- Step 1: The vertical stretch by factor 4 multiplies the amplitude, giving range $$-4 \\leq y \\leq 4$$.\n- Step 2: The minimum occurs at ╬Ė = 270┬░ (or 3ŽĆ/2 rad), so the coordinate is $$(270┬░, -4)$$ ŌĆö you must give BOTH x and y values.\n\nThis is a common mark-scheme trap: they ask for \"coordinates\" so a bare \"-4\" loses the second B mark.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_5", "judge_pick": false}, {"question": "For y = 1 + sin ╬Ė, what is the new range after the vertical shift, and where does the graph now touch the x-axis? (2 steps)", "answer": "- Step 1: The \"+1\" translates the entire sine wave upward by 1 unit, so the range becomes $$0 \\leq y \\leq 2$$.\n- Step 2: The graph now touches the x-axis at its minimum point, ╬Ė = 270┬░ (or 3ŽĆ/2), because sin ╬Ė = ŌłÆ1 there, giving 1 + (ŌłÆ1) = 0.\n\nThe key insight is that vertical shifts move both the graph AND the horizontal asymptote (if any) by the same amount.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_6", "judge_pick": false}, {"question": "What is the horizontal asymptote of y = 1/x + 1, and why is it NOT y = 0? (2 steps)", "answer": "- Step 1: The horizontal asymptote is y = 1.\n- Step 2: As x ŌåÆ ┬▒Ōł×, the term 1/x ŌåÆ 0, so y ŌåÆ 0 + 1 = 1. The \"+1\" vertical shift lifts both the curve and its horizontal asymptote up by 1.\n\nThis is Phuc's Mistake #1 ŌĆö the most common error in this topic.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_7", "judge_pick": false}, {"question": "For y = cos 2x┬░, what transformation occurs and what is the new period? (2 steps)", "answer": "- Step 1: The substitution x ŌåÆ 2x represents a horizontal squash with scale factor 1/2. Visually, all x-coordinates halve: (x, y) Ōå” (x/2, y).\n- Step 2: The period becomes $$\\frac{360┬░}{2} = 180┬░$$ (or ŽĆ radians).\n\nThe formula to write first is Period = 360/k for sin(kx)┬░ or cos(kx)┬░.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_8", "judge_pick": false}, {"question": "For cos 2x┬░ on 0 Ōēż x Ōēż 225┬░, what are the coordinates of the minimum point Q and the x-intercept R? (3 steps)", "answer": "- Step 1: The minimum of cos occurs when 2x = 180┬░, so x = 90┬░. At this point cos 2x┬░ = ŌłÆ1, giving Q = (90┬░, ŌłÆ1).\n- Step 2: Zeros occur when 2x = 90┬░, 270┬░, 450┬░. These give x = 45┬░, 135┬░, 225┬░.\n- Step 3: R is the third zero, at x = 225┬░, so R = (225┬░, 0). Note that 270┬░ is the next minimum, NOT an x-intercept.\n\nThe key is setting the inner argument equal to the known angles (90┬░, 180┬░, 270┬░).", "source": "MiniMax ŌæĪ", "_id": "minimax_2_9", "judge_pick": false}, {"question": "What is the \"exactly-two-solutions\" A* trap for cos 2x┬░ = p on 0 Ōēż x Ōēż 225┬░, and what is the correct range of p? (3 steps)", "answer": "- Step 1: Sketch the curve: it runs (0,1) ŌåÆ (90┬░,ŌłÆ1) ŌåÆ (180┬░,1) ŌåÆ (225┬░,0), giving THREE monotonic pieces.\n- Step 2: A horizontal line y = p with 0 Ōēż p < 1 cuts ALL three pieces ŌåÆ three solutions.\n- Step 3: Only p in the range ŌłÆ1 < p < 0 cuts exactly TWO pieces. Also p = 1 touches two maxima (x = 0 and x = 180┬░) giving exactly two solutions. So the answer is $$-1 < p < 0 \\text{ or } p = 1$$.\n\nMost students incorrectly answer ŌłÆ1 < p < 1, missing the crucial distinction between \"cuts\" and \"touches.\"", "source": "MiniMax ŌæĪ", "_id": "minimax_2_10", "judge_pick": false}, {"question": "What is the \"one-per-branch\" property of tan x, and what theorem guarantees it? (2 steps)", "answer": "- Step 1: On each ŽĆ-wide branch (between consecutive asymptotes), tan x rises continuously from ŌłÆŌł× to +Ōł×.\n- Step 2: By the Intermediate Value Theorem (IVT), any horizontal line y = c must intersect each branch exactly once.\n\nThis is why tan x = c always has exactly one solution per branch, regardless of the value of c.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_11", "judge_pick": false}, {"question": "How many solutions does tan x = 1/x + 1 have in the interval 0 Ōēż x Ōēż 40ŽĆ, and what is the reasoning? (3 steps)", "answer": "- Step 1: The curve y = 1/x + 1 has a horizontal asymptote at y = 1, so for large x it approaches y = 1 from above.\n- Step 2: Each tan branch (one per ŽĆ interval) rises from ŌłÆŌł× to +Ōł×, so it must cross y Ōēł 1 exactly once.\n- Step 3: There are 40 ŽĆ-length branches from 0 to 40ŽĆ, so there are 40 solutions.\n\nThe pattern is: one solution per ŽĆ-branch.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_12", "judge_pick": false}, {"question": "How many solutions does tan x = 1/x + 1 have in ŌłÆ10ŽĆ Ōēż x Ōēż 5ŽĆ/2, and what is the \"odd one out below the axis\" trap? (4 steps)", "answer": "- Step 1: Count ordinary branches: from ŌłÆ10ŽĆ to approximately ŌłÆŽĆ/2, there are 10 complete branches ŌåÆ 10 solutions.\n- Step 2: The branch on (ŌłÆŽĆ/2, 0) is special: as x ŌåÆ 0Ōü║, 1/x + 1 ŌåÆ +Ōł×; as x ŌåÆ 0Ōü╗, 1/x + 1 ŌåÆ ŌłÆŌł×.\n- Step 3: Near x = 0 from the negative side, the curve dives to ŌłÆŌł× while tan rises from ŌłÆŌł× to +Ōł×, so they intersect BELOW the x-axis. This gives 1 additional solution.\n- Step 4: From 0 to 5ŽĆ/2 there are 3 more branches ŌåÆ 3 solutions. Total = 10 + 1 + 3 = 14.\n\nThe trap is missing this below-axis crossing ŌĆö answering 12 instead of 14.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_13", "judge_pick": true}, {"question": "What is the period of y = tan x, and how does it differ from sin and cos? (1 step)", "answer": "The period of tan x is 180┬░ (ŽĆ radians), which is HALF the period of sin x and cos x (360┬░ or 2ŽĆ).\n\nThis is because tan x = sin x / cos x, and both sin and cos repeat every 360┬░, but the ratio has symmetry every 180┬░.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_14", "judge_pick": false}, {"question": "For the transformation f(ax), how do you determine whether it stretches or squashes, and what happens to the coordinates? (2 steps)", "answer": "- Step 1: f(ax) represents a horizontal stretch with scale factor 1/a. If a > 1, it squashes toward the y-axis; if 0 < a < 1, it stretches away.\n- Step 2: The point (x, y) on y = f(x) maps to (x/a, y) on y = f(ax). For example, cos 2x┬░ squashes by factor ┬Į: (180┬░, ŌłÆ1) ŌåÆ (90┬░, ŌłÆ1).\n\nThis is Phuc's Mistake #2 ŌĆö the common confusion between f(ax) and f(x/a).", "source": "MiniMax ŌæĪ", "_id": "minimax_2_15", "judge_pick": false}, {"question": "What are the zeros and asymptotes of tan x in terms of sin and cos? (2 steps)", "answer": "- Step 1: tan x = 0 when sin x = 0, i.e. at x = nŽĆ (0┬░, 180┬░, 360┬░, ...).\n- Step 2: tan x is undefined (asymptotes) when cos x = 0, i.e. at x = ŽĆ/2 + nŽĆ (90┬░, 270┬░, ...).\n\nThe memory hook: \"Where sin is 0, tan is 0; where cos is 0, tan blows up.\"", "source": "MiniMax ŌæĪ", "_id": "minimax_2_16", "judge_pick": false}, {"question": "What is the symmetry of sin x, cos x, and tan x? (1 step)", "answer": "- sin(ŌłÆx) = ŌłÆsin x ŌåÆ odd function, origin symmetry.\n- cos(ŌłÆx) = cos x ŌåÆ even function, y-axis symmetry.\n- tan(ŌłÆx) = ŌłÆtan x ŌåÆ odd function, origin symmetry.\n\nThis helps with sketching and understanding reflections.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_17", "judge_pick": false}, {"question": "What is the method for counting intersections of tan ╬Ė = 1 + sin ╬Ė over a large interval? (3 steps)", "answer": "- Step 1: Identify the repeating unit ŌĆö the longer period, which is 360┬░ (from sin).\n- Step 2: Count intersections in ONE 360┬░ period by sketching.\n- Step 3: Multiply by the number of whole periods, then add intersections in any leftover partial interval at the end.\n\nFor example, 0 Ōēż ╬Ė Ōēż 2160┬░ = 6 full periods of 360┬░.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_18", "judge_pick": false}, {"question": "In the exam phrase \"State the number of solutions, giving a reason,\" what must you include in your answer? (1 step)", "answer": "Write: \"There are N solutions because the graph of [curve 1] intersects the graph of [curve 2] N times in the interval given.\"\n\nYou must name BOTH curves and state the interval ŌĆö this is exactly what the mark scheme expects.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_19", "judge_pick": false}, {"question": "Why does the sine graph cross the x-axis three times from 0┬░ to 360┬░ while cosine crosses only twice? (2 steps)", "answer": "- Step 1: sin x = 0 at x = 0┬░, 180┬░, 360┬░ ŌĆö three zeros (including both endpoints).\n- Step 2: cos x = 0 at x = 90┬░, 270┬░ ŌĆö only two zeros in the open interval (0┬░, 360┬░).\n\nThe key is that sin starts at 0 (a crossing) while cos starts at its maximum (1), not crossing until 90┬░.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_20", "judge_pick": false}, {"question": "What is Harry's \"rhythm rule\" for tan x, and how does it help you remember the pattern? (1 step)", "answer": "\"Something interesting happens every 90┬░ (every ŽĆ/2)\" ŌĆö the pattern alternates: zero (0┬░), asymptote (90┬░), zero (180┬░), asymptote (270┬░), zero (360┬░).\n\nThis gives a quick way to locate any zero or asymptote without calculating.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_21", "judge_pick": false}, {"question": "For tan ╬Ė = 1 + sin ╬Ė on 0 Ōēż ╬Ė Ōēż 1980┬░, how do you count the solutions? (4 steps)", "answer": "- Step 1: 1980┬░ = 5 full periods (5 ├Ś 360┬░ = 1800┬░) plus a leftover 180┬░.\n- Step 2: Count solutions per 360┬░ period ŌåÆ multiply by 5.\n- Step 3: For the remaining 180┬░ (the last half-period), count any additional intersections.\n- Step 4: Add them together.\n\nThis is the extrapolation method: solutions per unit ├Ś number of units + endpoint adjustment.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_22", "judge_pick": false}, {"question": "What is the memory hook for remembering that tan has period 180┬░ while sin and cos have 360┬░? (1 step)", "answer": "Tan is the \"odd one out\" ŌĆö it's the only one with asymptotes and an infinite range, so it also has the shorter period (half the length).\n\nAlso: tan = sin/cos, and since sin repeats at 360┬░ but cos = 0 at 180┬░, the ratio has symmetry every 180┬░.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_23", "judge_pick": false}, {"question": "When answering questions about obtuse angles in trigonometry, what must you do and why? (2 steps)", "answer": "- Step 1: The inverse trig functions (sinŌü╗┬╣, cosŌü╗┬╣) have restricted ranges: sinŌü╗┬╣ returns angles in [ŌłÆ90┬░, 90┬░] (acute or negative), cosŌü╗┬╣ returns [0┬░, 180┬░].\n- Step 2: For an obtuse solution, take 180┬░ ŌłÆ (acute angle) = ŽĆ ŌłÆ (acute). For example, if the acute solution is 0.884 rad, the obtuse solution is ŽĆ ŌłÆ 0.884 = 2.258 rad.\n\nThis is Phuc's Mistake #6 ŌĆö underline \"obtuse\" in the question.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_24", "judge_pick": false}, {"question": "What are the key landmarks for y = sin x on 0┬░ Ōēż x Ōēż 360┬░? (1 step)", "answer": "(0,0) ŌåÆ (90┬░, 1) ŌåÆ (180┬░, 0) ŌåÆ (270┬░, ŌłÆ1) ŌåÆ (360┬░, 0)\n\nThis sequence of five key points lets you sketch the sine wave accurately and identify all maxima, minima, and zeros.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_25", "judge_pick": false}, {"question": "What are the key landmarks for y = cos x on 0┬░ Ōēż x Ōēż 360┬░? (1 step)", "answer": "(0, 1) ŌåÆ (90┬░, 0) ŌåÆ (180┬░, ŌłÆ1) ŌåÆ (270┬░, 0) ŌåÆ (360┬░, 1)\n\nNotice it starts at the maximum, unlike sin which starts at zero.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_26", "judge_pick": false}, {"question": "How do you determine whether f(ax) stretches or squashes, and what is the formal rule? (2 steps)", "answer": "- Step 1: f(ax) is a horizontal stretch with scale factor 1/a. The x-coordinates divide by a.\n- Step 2: If a > 1 (like f(2x)), the graph squashes toward the y-axis (period shrinks). If 0 < a < 1 (like f(x/2)), it stretches away.\n\nThe point (x, y) becomes (x/a, y).", "source": "MiniMax ŌæĪ", "_id": "minimax_2_27", "judge_pick": false}, {"question": "What is the relationship between sin x and cos x, and how does this help you sketch? (1 step)", "answer": "$$\\cos x = \\sin(x + 90┬░)$$\n\nCosine is the sine graph shifted LEFT by 90┬░. This means every property of sine (period, range, maxima/minima) carries over, just 90┬░ offset.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_28", "judge_pick": false}, {"question": "For the intersection of tan x = 1/x + 1, why does the branch on (ŌłÆŽĆ/2, 0) give a solution below the x-axis? (2 steps)", "answer": "- Step 1: As x ŌåÆ 0Ōü╗, 1/x + 1 ŌåÆ ŌłÆŌł× (the curve dives downward).\n- Step 2: On the branch (ŌłÆŽĆ/2, 0), tan x rises from ŌłÆŌł× (at ŌłÆŽĆ/2) to 0 (at 0). Since 1/x + 1 goes to ŌłÆŌł×, the intersection occurs where tan x is also very negative ŌĆö i.e., below the x-axis.\n\nYou must check below the axis near each pole.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_29", "judge_pick": false}, {"question": "What is the formula for the period of tan(kx), and how does it differ from sin(kx) and cos(kx)? (1 step)", "answer": "$$\\text{Period of } \\tan(kx) = \\frac{180┬░}{k} = \\frac{\\pi}{k} \\text{ (radians)}$$\n\nThis is half the period of sin(kx) or cos(kx), which use 360┬░/k (or 2ŽĆ/k).", "source": "MiniMax ŌæĪ", "_id": "minimax_2_30", "judge_pick": false}, {"question": "When a question asks for \"coordinates\" of a point on a transformed trig graph, what must you give? (1 step)", "answer": "You must give the ordered pair (x, y), not just the y-value.\n\nThis is Phuc's Mistake #5 ŌĆö answering \"ŌłÆ4\" instead of \"(270┬░, ŌłÆ4)\" loses the second B mark.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_31", "judge_pick": false}, {"question": "How do you handle open vs. closed endpoints (< vs. Ōēż) when counting solutions? (1 step)", "answer": "A solution exactly at an endpoint counts only if that endpoint is included (Ōēż). If the interval is open (<), the endpoint solution does NOT count.\n\nAlways check: \"0 Ōēż x Ōēż 40ŽĆ\" includes endpoints; \"0 < x < 40ŽĆ\" excludes them.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_32", "judge_pick": false}, {"question": "What is the method for solving \"exactly n solutions\" problems like cos 2x┬░ = p? (3 steps)", "answer": "- Step 1: Split the curve into monotonic (strictly increasing or decreasing) pieces.\n- Step 2: For each piece, determine whether a horizontal line y = p cuts it (crosses) or touches it (tangent).\n- Step 3: Count total cuts + touches to get the total number of solutions.\n\nThis is the key to the A* trap question.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_33", "judge_pick": false}, {"question": "What are the zeros of tan x, and how do they relate to the zeros of sin x? (1 step)", "answer": "tan x = 0 when sin x = 0, i.e. at x = nŽĆ (0┬░, 180┬░, 360┬░, ...).\n\nBoth sin and tan share the same zeros because tan x = sin x / cos x, and tan = 0 when numerator sin x = 0.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_34", "judge_pick": false}, {"question": "In the comparison table, what are the three key differences that set tan apart from sin and cos? (1 step)", "answer": "1. Period is 180┬░ (half the period of sin/cos)\n2. Range is all real numbers (ŌłÆŌł× to Ōł×), not limited to [ŌłÆ1, 1]\n3. Has vertical asymptotes (where cos x = 0)\n\nThese make tan the \"odd one out\" in the family.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_35", "judge_pick": false}, {"question": "How many times does tan x cross the x-axis in one period (180┬░), and why? (1 step)", "answer": "Once ŌĆö at the center of each branch (x = nŽĆ).\n\nUnlike sin and cos which cross twice per 360┬░ (their full period), tan crosses once per 180┬░ (its period), right in the middle of each branch.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_36", "judge_pick": false}, {"question": "What is the horizontal asymptote of y = 1/x + 1, and what is the visual intuition for this? (2 steps)", "answer": "- Step 1: y = 1.\n- Step 2: As x gets very large (positive or negative), 1/x becomes negligibly small, so y approaches 1. The \"+1\" lifts the entire rectangular hyperbola y = 1/x upward, and its
