questions, never work backwards from the given answer — the examiner checks for forward derivation.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": false}, {"question": "Exam strategy — For conic geometry questions (tangents, normals), why is the parametric form almost always superior to Cartesian? (2 steps)", "answer": "- Step 1: The parametric form (e.g., $$(at^2, 2at)$$ for parabola, $$(ct, c/t)$$ for hyperbola) makes differentiation and algebraic manipulation dramatically simpler. The derivative $$\\frac{dy}{dx}$$ comes out as a clean function of the parameter $$t$$.\n- Step 2: If the question gives you a parametric point $$P$$, use the parametric form for the other point $$Q$$ too. Mixing parametric for one point and Cartesian for the other creates brutal algebra (e.g., substituting $$y$$ from the normal into $$y^2 = \\frac{4}{3}x$$ gives a nasty quadratic in $$x$$).\n\nParametric thinking is the single biggest time-saver on conic questions.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": false}, {"question": "Exam strategy — Whenever an equation produces multiple algebraic solutions (e.g., $$\\lambda = 3 \\pm \\sqrt{17}$$), what question must you always ask yourself? (2 steps)", "answer": "- Step 1: Ask: \"Does the geometric/physical constraint reject any of these candidates?\" Common constraints: sign of $$x$$, sign of $$y$$, principal argument range $$(-\\pi, \\pi]$$, $$c > 0$$ in conics, positive-definite conditions.\n- Step 2: This discrimination step is where marks are quietly lost. The algebra gives you candidates; the context tells you which ones survive. Always check signs, quadrants, and domain restrictions before committing to a final answer.", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": false}, {"question": "Exam strategy — What's the time guide per mark, and how should you allocate time to a 10-mark question vs a 5-mark question? (2 steps)", "answer": "- Step 1: 75 marks in 90 minutes ≈ 1.15 minutes per mark. A 10-mark question deserves about 11–12 minutes; a 5-mark question about 6 minutes.\n- Step 2: If you're past the target time on a question, **move on** and come back later. Time spent stuck on one question is time stolen from easier marks elsewhere. You can always return with fresh eyes.", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": false}, {"question": "Q8 — When the question says \"hence show that $$\\sum_{r=n}^{2n} \\ldots = \\tfrac{1}{2}n(n+1)(an+b)(cn+d)$$\", what does the word \"hence\" signal about your method? (2 steps)", "answer": "- Step 1: \"Hence\" means you **must** use the result from part (a). You cannot start from scratch or use a different approach — the marks are for connecting (a) to (b).\n- Step 2: The connection is: define $$S(N)$$ using the closed form from (a), then compute $$S(2n) - S(n-1)$$. If you try to re-derive the sum from the standard formulas, you'll earn zero method marks even if the answer is correct.\n\n\"Hence\" = mandatory link to previous part.", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": false}, {"question": "Q9 — When equating $$y = x$$ to find $$\\arg z = \\frac{\\pi}{4}$$, why can you equate numerators directly instead of cross-multiplying? (2 steps)", "answer": "- Step 1: Both $$x$$ and $$y$$ share the same denominator $$\\lambda^2 + 16$$, which is always positive (since $$\\lambda^2 \\geq 0$$). So $$y = x$$ reduces to $$\\frac{6\\lambda}{\\lambda^2+16} = \\frac{\\lambda^2-8}{\\lambda^2+16}$$.\n- Step 2: Since the denominators are identical and non-zero, equating the fractions is equivalent to equating numerators: $$6\\lambda = \\lambda^2 - 8$$. No cross-multiplication needed — it simplifies to a quadratic immediately.\n\nIf the denominators were different or could be zero, you'd need to be more careful.", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": false}, {"question": "What's the general formula $$\\sum_{r=a}^{b} f(r)$$ in terms of the cumulative sum $$S(N) = \\sum_{r=1}^{N} f(r)$$? What if the lower limit is $$a+1$$ instead of $$a$$? (2 steps)", "answer": "- Step 1: $$\\sum_{r=a}^{b} f(r) = S(b) - S(a-1)$$. You subtract everything before the lower limit.\n- Step 2: If the sum were $$\\sum_{r=a+1}^{b}$$, then you'd subtract one more term: $$S(b) - S(a)$$. The rule: the upper argument of $$S$$ in the subtraction is always \"one less than the lower limit of the sum.\"\n\nThe off-by-one is the most common error: including or excluding the boundary term.", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": false}, {"question": "Q10 — In the base case of a divisibility induction, why must you compute $$f(1)$$ directly rather than using the inductive framework? (2 steps)", "answer": "- Step 1: The base case is a **direct verification** that the statement holds for the smallest value. For divisibility, you compute $$f(1)$$ and check it's a multiple of 7: $$8^3 + 6^1 = 512 + 6 = 518 = 7 \\times 74$$. ✓\n- Step 2: You cannot use the inductive step logic (which assumes $$P(k)$$) because there's no prior case to assume. The base case stands alone as a factual check. Skipping it (\"obviously true\") is an automatic mark loss.", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": false}, {"question": "Q10(ii) — In the inductive step, you write \"Assume $$P(k)$$: $$f(k) = 7m$$ for some integer $$m$$.\" Why introduce the variable $$m$$, and what goes wrong if you don't? (2 steps)", "answer": "- Step 1: Introducing $$m$$ makes the divisibility explicit: \"$$f(k)$$ is divisible by 7\" means $$f(k) = 7m$$ for some integer $$m$$. This lets you substitute $$7m$$ for $$f(k)$$ algebraically in the expression for $$f(k+1)$$.\n- Step 2: Without $$m$$, you'd be writing things like \"since $$f(k)$$ is divisible by 7, and $$64f(k)$$ is also divisible by 7...\" — this is verbally true but doesn't produce the explicit factor of 7 that the mark scheme requires. You need to **show** the factor of 7 coming out of the algebra.\n\nAlways name the integer ($$m$$, $$q$$, etc.) so you can substitute and factor.", "source": "GLM 5.1 ①", "_id": "glm_1_46", "judge_pick": false}, {"question": "What three meta-skills does this paper reward, according to the pattern summary? Give a concrete example of each. (3 steps)", "answer": "- Step 1: **Formula-booklet awareness** — knowing what's IN vs NOT in the booklet. Example: Q1 needs det/inverse (NOT in booklet), but Q8's $$\\sum r^3$$ IS in the booklet.\n- Step 2: **Structural discipline** — not skipping mandatory lines. Examples: Q4's composition order ($$\\mathbf{BA}$$ not $$\\mathbf{AB}$$), Q8's $$S(2n)-S(n-1)$$ not $$S(2n)-S(n)$$, Q10's induction skeleton.\n- Step 3: **Discrimination of multiple algebraic candidates** — checking which solutions satisfy the geometric constraints. Examples: Q9 (which $$\\lambda$$ gives $$\\arg = \\pi/4$$?), Q5 (sign of $$\\alpha + \\beta$$).\n\nThe bottleneck isn't technique knowledge — it's technique **reliability**: converting \"I know how\" into \"I do it correctly in 4 minutes.\"", "source": "GLM 5.1 ①", "_id": "glm_1_47", "judge_pick": true}, {"question": "Q9 — When rationalising $$z = \\frac{\\lambda+2i}{\\lambda-4i}$$, a student multiplies top and bottom by $$\\lambda - 4i$$. What goes wrong? (2 steps)", "answer": "- Step 1: The denominator becomes $$(\\lambda - 4i)(\\lambda - 4i) = (\\lambda-4i)^2 = \\lambda^2 - 8i\\lambda - 16$$, which is **still complex** (it has an $$i\\lambda$$ term). You haven't rationalised at all.\n- Step 2: The conjugate of $$\\lambda - 4i$$ is $$\\lambda + 4i$$, not $$\\lambda - 4i$$. Multiplying by the conjugate gives $$(\\lambda-4i)(\\lambda+4i) = \\lambda^2 + 16$$, which is purely real. The whole point of conjugate multiplication is to use $$(a-b)(a+b) = a^2-b^2$$ with $$b = 4i$$, so $$b^2 = -16$$ and the imaginary parts cancel.", "source": "GLM 5.1 ①", "_id": "glm_1_48", "judge_pick": false}, {"question": "Q8 — A student computes $$\\sum_{r=n}^{2n}$$ as $$S(2n) - S(n)$$. What single term is missing from their answer? (2 steps)", "answer": "- Step 1: $$S(2n) - S(n) = \\sum_{r=1}^{2n} - \\sum_{r=1}^{n} = \\sum_{r=n+1}^{2n}$$. This excludes the term $$r = n$$.\n- Step 2: The correct subtraction is $$S(2n) - S(n-1) = \\sum_{r=1}^{2n} - \\sum_{r=1}^{n-1} = \\sum_{r=n}^{2n}$$. The missing term is precisely the $$r = n$$ term: $$n(2n+1)(n+1)$$.\n\nOne term off — but it changes the entire final answer.", "source": "GLM 5.1 ①", "_id": "glm_1_49", "judge_pick": false}, {"question": "Q10(i) — In a matrix induction proof, after computing each entry of $$\\mathbf{M}^{k+1}$$, you must verify it matches the proposition. For the $$(2,2)$$ entry: $$(4k)(-1) + (1-2k)(-1) = -4k - 1 + 2k = 1 - 2k - 1 = -2k$$. How do you rewrite this as $$1 - 2(k+1)$$? (2 steps)", "answer": "- Step 1: $$-2k = -2k + 1 - 1 = (1-1) - 2k = 1 - 2k - 1$$. Now group: $$1 - (2k+1) = 1 - 2(k+1)$$.\n- Step 2: This is the \"express in the form of $$P(k+1)$$\" step. The proposition says the $$(2,2)$$ entry is $$1 - 2n$$, so for $$n = k+1$$ it's $$1 - 2(k+1)$$. You must show your computed entry simplifies to exactly this form — not leave it as $$-2k$$ or $$1-2k-1$$.", "source": "GLM 5.1 ①", "_id": "glm_1_50", "judge_pick": false}, {"question": "Q9 — A student writes \"$$\\tan(\\arg z) = 1$$, so $$\\arg z = \\frac{\\pi}{4}$$\". What's wrong with this reasoning? (2 steps)", "answer": "- Step 1: $$\\tan\\theta = 1$$ has solutions $$\\theta = \\frac{\\pi}{4} + n\\pi$$ for any integer $$n$$. Within the principal range $$(-\\pi, \\pi]$$, this gives $$\\theta = \\frac{\\pi}{4}$$ OR $$\\theta = \\frac{\\pi}{4} - \\pi = -\\frac{3\\pi}{4}$$.\n- Step 2: The tangent function has period $$\\pi$$, so knowing $$\\tan(\\arg z) = 1$$ narrows the argument to two possibilities per period. You MUST check the quadrant (signs of $$x$$ and $$y$$) to determine which one. The equation $$\\tan\\theta = 1$$ alone is insufficient.", "source": "GLM 5.1 ①", "_id": "glm_1_51", "judge_pick": false}, {"question": "What's the Newton–Raphson formula, and is it in the booklet? What mode must your calculator be in when using it for trigonometric functions? (2 steps)", "answer": "- Step 1: $$x_{n+1} = x_n - \\frac{f(x_n)}{f'(x_n)}$$. This IS in the formula booklet.\n- Step 2: When $$f$$ involves trigonometric functions, your calculator MUST be in **radians** mode. If it's in degrees, $$f'(x_n)$$ will be wrong (the derivative of $$\\sin x$$ is $$\\cos x$$ only in radians), and the iteration will diverge or converge to a wrong value.", "source": "GLM 5.1 ①", "_id": "glm_1_52", "judge_pick": false}, {"question": "Q8 — After factoring $$15n^2 + 17n + 4 = (3n+1)(5n+4)$$, the question asks for integers $$a, b, c, d$$ in $$\\tfrac{1}{2}n(n+1)(an+b)(cn+d)$$. Why is it acceptable to swap $$(a,b)$$ with $$(c,d)$$? (2 steps)", "answer": "- Step 1: The product $$(an+b)(cn+d)$$ is commutative — $$(3n+1)(5n+4) = (5n+4)(3n+1)$$. So either $$(a,b,c,d) = (3,1,5,4)$$ or $$(a,b,c,d) = (5,4,3,1)$$ is valid.\n- Step 2: The question says \"where $$a, b, c$$ and $$d$$ are integers to be determined\" — it doesn't specify which factor is first. Both orderings are correct. But you MUST state the values explicitly at the end; don't leave them embedded in the expression.", "source": "GLM 5.1 ①", "_id": "glm_1_53", "judge_pick": false}, {"question": "Conceptual — Why does $$\\sum_{r=1}^{N} f(r) = S(N)$$ work as a function, and why is $$S(b) - S(a-1)$$ the correct telescoping for restricted limits? (3 steps)", "answer": "- Step 1: $$S(N) = \\sum_{r=1}^{N} f(r)$$ is a cumulative sum — it adds up all terms from 1 to $$N$$. Think of it as a \"running total\" function.\n- Step 2: To get the sum from $$r = a$$ to $$r = b$$, you want all terms from 1 to $$b$$, MINUS all terms from 1 to $$a-1$$ (everything before the lower limit). This \"peels off\" the unwanted early terms.\n- Step 3: The key insight: the lower limit $$a$$ is INCLUDED, so you subtract $$S(a-1)$$ (terms up to $$a-1$$), not $$S(a)$$ (which would also remove the $$r=a$$ term). It's the same logic as \"counting from the 5th floor to the 10th floor = 10 - 4 = 6 floors.\"", "source": "GLM 5.1 ①", "_id": "glm_1_54", "judge_pick": true}, {"question": "Q10 — A student proves the inductive step correctly but writes the conclusion as \"therefore it is true for all $$n$$.\" What's missing, and why does it matter? (2 steps)", "answer": "- Step 1: Two things are missing: (a) the reference to the base case (\"Since $$P(1)$$ is true\"), and (b) the domain specification (\"for all $$n \\in \\mathbb{Z}^+$$\").\n- Step 2: Without the base case reference, the logic is incomplete — induction requires BOTH the base and the inductive step. Without the domain, \"all $$n$$\" could mean all integers (including negatives), which wasn't proved. Edexcel awards a specific mark for the full conclusion sentence.", "source": "GLM 5.1 ①", "_id": "glm_1_55", "judge_pick": false}, {"question": "Simple drill — If $$\\alpha + \\beta = 5$$ and $$\\alpha\\beta = 6$$, what is $$\\alpha^2 + \\beta^2$$? Use the identity, not the actual roots. (2 steps)", "answer": "- Step 1: Apply $$\\alpha^2 + \\beta^2 = (\\alpha+\\beta)^2 - 2\\alpha\\beta$$.\n- Step 2: $$= 5^2 - 2(6) = 25 - 12 = 13$$. No need to find that the roots are 2 and 3 — the identity gives the answer directly from Vieta's formulas.", "source": "GLM 5.1 ①", "_id": "glm_1_56", "judge_pick": false}, {"question": "Simple drill — If $$\\alpha + \\beta = 5$$ and $$\\alpha\\beta = 6$$, what is $$\\frac{1}{\\alpha} + \\frac{1}{\\beta}$$? (2 steps)", "answer": "- Step 1: Apply $$\\frac{1}{\\alpha} + \\frac{1}{\\beta} = \\frac{\\alpha+\\beta}{\\alpha\\beta}$$.\n- Step 2: $$= \\frac{5}{6}$$. Again, no need to find the actual roots.", "source": "GLM 5.1 ①", "_id": "glm_1_57", "judge_pick": false}, {"question": "Simple drill — A transformation stretches by factor 3 parallel to the $$x$$-axis, then rotates 90° anticlockwise. Write the composite matrix. (2 steps)", "answer": "- Step 1: Stretch: $$\\mathbf{A} = \\begin{pmatrix}3&0\\\\0&1\\end{pmatrix}$$. Rotation 90°: $$\\mathbf{B} = \\begin{pmatrix}\\cos 90°&-\\sin 90°\\\\\\sin 90°&\\cos 90°\\end{pmatrix} = \\begin{pmatrix}0&-1\\\\1&0\\end{pmatrix}$$.\n- Step 2: \"A then B\" = $$\\mathbf{BA} = \\begin{pmatrix}0&-1\\\\1&0\\end{pmatrix}\\begin{pmatrix}3&0\\\\0&1\\end{pmatrix} = \\begin{pmatrix}0&-1\\\\3&0\\end{pmatrix}$$. Note: $$\\mathbf{AB} = \\begin{pmatrix}0&-3\\\\1&0\\end{pmatrix}$$ — completely different!", "source": "GLM 5.1 ①", "_id": "glm_1_58", "judge_pick": false}, {"question": "Simple drill — If $$z = \\frac{-3 + i}{-3 - i}$$, what's the first step to express it as $$x + yi$$? (2 steps)", "answer": "- Step 1: Multiply numerator and denominator by the **conjugate of the denominator**: $$\\frac{(-3+i)(-3+i)}{(-3-i)(-3+i)}$$. The conjugate of $$-3-i$$ is $$-3+i$$.\n- Step 2: Denominator: $$(-3)^2 - (i)^2 = 9-(-1) = 9+1 = 10$$. Numerator: $$(-3+i)^2 = 9 - 6i + i^2 = 9 - 6i - 1 = 8 - 6i$$. So $$z = \\frac{8-6i}{10} = \\frac{4}{5} - \\frac{3}{5}i$$.", "source": "GLM 5.1 ①", "_id": "glm_1_59", "judge_pick": false}, {"question": "Q10(ii) — In the inductive step, you reach $$f(k+1) = 64\\,f(k) - 28 \\cdot 6^{2k-1}$$. Why is it important to write this as $$7(64m - 4\\cdot 6^{2k-1})$$ rather than just saying \"both terms are divisible by 7\"? (2 steps)", "answer": "- Step 1: The mark scheme requires you to **show** the explicit factor of 7 coming out. Writing $$7(\\ldots)$$ demonstrates that $$f(k+1)$$ equals 7 times an integer, which is the definition of divisibility by 7.\n- Step 2: Saying \"both terms are divisible by 7\" is a **claim**, not a demonstration. You need to exhibit the integer that $$f(k+1)/7$$ equals. The expression $$64m - 4\\cdot 6^{2k-1}$$ is clearly an integer (sum and product of integers), so the factorisation is complete and rigorous.", "source": "GLM 5.1 ①", "_id": "glm_1_60", "judge_pick": false}, {"question": "What are the parametric equations for the parabola $$y^2 = 4ax$$, and what's the advantage of using them for tangent/normal problems? (2 steps)", "answer": "- Step 1: Parametric form: $$(x, y) = (at^2, 2at)$$. This IS in the booklet.\n- Step 2: The advantage: differentiation gives $$\\frac{dy}{dx} = \\frac{1}{t}$$, a simple expression. The tangent at parameter $$t$$ is $$ty = x + at^2$$, and the normal is $$y + tx = 2at + at^3$$. These are clean linear equations — much simpler than differentiating $$y = \\pm\\sqrt{4ax}$$ in Cartesian form.", "source": "GLM 5.1 ①", "_id": "glm_1_61", "judge_pick": false}, {"question": "What are the parametric equations for the rectangular hyperbola $$xy = c^2$$? (2 steps)", "answer": "- Step 1: $$(x, y) = (ct, c/t)$$. The parameter $$t$$ represents the \"angle\" in a hyperbolic sense — as $$t$$ varies, the point traces out the curve.\n- Step 2: Check: $$xy = (ct)(c/t) = c^2$$. ✓ This IS in the booklet. The tangent at parameter $$t$$ is $$x + t^2 y = 2ct$$, and $$\\frac{dy}{dx} = -\\frac{1}{t^2}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_62", "judge_pick": false}, {"question": "Q9 — When the question says \"giving your answer in the form $$x + yi$$\", why is it crucial to state $$x$$ and $$y$$ separately with a common denominator before moving to part (b)? (2 steps)", "answer": "- Step 1: Part (b) requires comparing $$x$$ and $$y$$ (for $$\\arg z = \\frac{\\pi}{4}$$, we need $$y = x$$ and $$x > 0$$). Having them as $$x = \\frac{\\lambda^2-8}{\\lambda^2+16}$$ and $$y = \\frac{6\\lambda}{\\lambda^2+16}$$ makes this comparison trivial.\n- Step 2: If you leave $$z$$ as a single complex fraction, you'd need to separate real and imaginary parts anyway for part (b) — so doing it cleanly in (a) saves time and reduces errors. The common denominator also means equating $$y = x$$ reduces to equating numerators.", "source": "GLM 5.1 ①", "_id": "glm_1_63", "judge_pick": false}, {"question": "Q8 — Why is it important to simplify $$S(2n)$$ fully before subtracting $$S(n-1)$$? What happens if you don't? (2 steps)", "answer": "- Step 1: $$S(2n) = \\tfrac{1}{2}(2n)(2n+1)^2(2n+2)$$ simplifies to $$2n(n+1)(2n+1)^2$$, which reveals the common factor $$n(n+1)$$ with $$S(n-1) = \\tfrac{1}{2}n^2(n-1)(n+1)$$.\n- Step 2: If you don't simplify, you're subtracting two expressions with different forms — hard to identify common factors, and the resulting polynomial is much harder to simplify. Simplification first reveals structure; subtraction without it creates chaos.", "source": "GLM 5.1 ①", "_id": "glm_1_64", "judge_pick": false}], "count": 65}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "Q8(a) — When faced with a sum of a product like $$\\sum_{r=1}^{n} r(2r+1)(r+1)$$, what must you do to the summand BEFORE applying standard summation results, and why? (2 steps)", "answer": "- Step 1: You must fully expand the product into a polynomial in $r$. For this example, expanding gives $$r(2r^2 + 3r + 1) = 2r^3 + 3r^2 + r$$.\n- Step 2: You do this because standard summation results (like $$\\sum r^2$$ or $$\\sum r^3$$) only apply to individual powers of $r$, not to products of terms. Trying to sum products term-by-term without expanding first is algebraically invalid and will lead to incorrect results.\n\nYou cannot split a sum across a product: $$\\sum (A \\cdot B) \\neq (\\sum A)(\\sum B)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "Q8(b) — When converting a restricted-limit sum like $$\\sum_{r=n}^{2n} f(r)$$ into a difference of sums starting from 1, what is the exact formula, and what is the critical off-by-one pitfall? (3 steps)", "answer": "- Step 1: Define the \"sum from 1\" function as $$S(N) = \\sum_{r=1}^N f(r)$$.\n- Step 2: To find the sum from $n$ to $2n$, you want all the terms from 1 to $2n$, minus all the terms from 1 to $n-1$. The formula is $$\\sum_{r=n}^{2n} f(r) = S(2n) - S(n-1)$$.\n- Step 3: The critical pitfall is writing $$S(2n) - S(n)$$, which incorrectly excludes the lower limit $r=n$. Because $S(n)$ includes the $n$-th term, subtracting it removes the term you want to keep. Subtracting $S(n-1)$ removes only the terms up to $r=n-1$, correctly leaving $r=n$ as the new starting point.\n\nThe lower limit is included, so you subtract the sum up to one index *before* the lower limit.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "Q8(a) — After applying standard summation formulas, you often get an expression like $$\\frac{1}{2}n^2(n+1)^2 + \\frac{1}{2}n(n+1)(2n+1) + \\frac{1}{2}n(n+1)$$. What is the first algebraic move to simplify this cleanly? (2 steps)", "answer": "- Step 1: Factor out the greatest common factor immediately. Here, every term shares a factor of $$\\frac{1}{2}n(n+1)$$.\n- Step 2: Factor it out to get $$\\frac{1}{2}n(n+1)\\big[n(n+1) + (2n+1) + 1\\big]$$. This collapses the expression into a single bracket to simplify, rather than trying to expand everything into a massive quartic polynomial.\n\nFactoring early prevents cascading sign errors and massive expansions that are hard to factorise later.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "Q8(a) — When applying the formula for $$\\sum_{r=1}^n r^3 = \\frac{1}{4}n^2(n+1)^2$$, what is the common pitfall if the summand has a coefficient of 2, i.e., $$2\\sum r^3$$? (2 steps)", "answer": "- Step 1: The correct calculation is to multiply the entire standard result by 2: $$2 \\times \\frac{1}{4}n^2(n+1)^2 = \\frac{1}{2}n^2(n+1)^2$$.\n- Step 2: The common pitfall is misapplying the coefficient—either forgetting to double it entirely (leaving $$\\frac{1}{4}$$) or doubling the denominator incorrectly. Always handle the coefficient outside the sum first, then substitute the formula booklet result.\n\nCoefficients outside the sum multiply the entire closed-form result.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "Q8(b) — After subtracting $$S(2n) - S(n-1)$$, you are left with a quadratic in $n$ inside a bracket, such as $$15n^2 + 17n + 4$$. How do you factorise this, and what is the common checking pitfall? (3 steps)", "answer": "- Step 1: Calculate the discriminant to ensure it factorises nicely: $$17^2 - 4(15)(4) = 289 - 240 = 49 = 7^2$$. Since it's a perfect square, it factorises over the integers.\n- Step 2: Find the factors. The numbers that multiply to $$15 \\times 4 = 60$$ and add to 17 are 12 and 5. So, $$(15n^2 + 12n) + (5n + 4) = 3n(5n+4) + 1(5n+4) = (3n+1)(5n+4)$$.\n- Step 3: The common pitfall is swapping the coefficients, writing $$(5n+1)(3n+4)$$. Always check by expanding back: $$(3n+1)(5n+4) = 15n^2 + 12n + 5n + 4 = 15n^2 + 17n + 4$$. The swapped version gives $$15n^2 + 23n + 4$$, which is wrong.\n\nAlways multiply back to verify factorisation, especially when coefficients are swapped between brackets.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "Q9(a) — When you have a complex number in the form $$z = \\frac{\\text{complex}}{\\text{complex}}$$ (e.g., $$\\frac{\\lambda + 2i}{\\lambda - 4i}$$), what is the mandatory first algebraic step to express it as $x + yi$? (2 steps)", "answer": "- Step 1: Rationalise the denominator by multiplying both the numerator and the denominator by the complex conjugate of the denominator. For $$\\frac{\\lambda + 2i}{\\lambda - 4i}$$, multiply by $$\\frac{\\lambda + 4i}{\\lambda + 4i}$$.\n- Step 2: This clears the imaginary part from the denominator, turning it into a real number $$(\\lambda^2 + 16)$$, which allows you to separate the real and imaginary parts in the numerator.\n\nNever leave a complex number in the denominator; always rationalise to proceed.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "Q9(a) — When rationalising a complex fraction, what is the common pitfall regarding what you multiply the numerator and denominator by? (2 steps)", "answer": "- Step 1: The pitfall is multiplying by the *same* complex number instead of its *conjugate*. For a denominator of $$\\lambda - 4i$$, multiplying by $$\\lambda - 4i$$ gives $$(\\lambda - 4i)^2 = \\lambda^2 - 8i\\lambda - 16$$, which leaves a complex denominator and makes the problem worse.\n- Step 2: You must multiply by the conjugate $$\\lambda + 4i$$, which uses the difference of two squares $$(\\lambda - 4i)(\\lambda + 4i) = \\lambda^2 + 16$$ to produce a purely real denominator.\n\nConjugate means flipping the sign of the imaginary part only; the real part stays the same.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "Q9(b) — When solving for an argument constraint like $$\\arg z = \\frac{\\pi}{4}$$, you might algebraically arrive at $$\\frac{y}{x} = 1$$ (or $$y = x$$). Why is this equation alone insufficient, and what extra check must you perform? (3 steps)", "answer": "- Step 1: The equation $$y = x$$ only tells you that the line from the origin to $z$ has a gradient of 1. This line passes through the first quadrant (where $$\\arg z = \\frac{\\pi}{4}$$) AND the third quadrant (where $$\\arg z = -\\frac{3\\pi}{4}$$).\n- Step 2: To ensure the argument is specifically $$\\frac{\\pi}{4}$$, the point must lie in the first quadrant. This requires both the real part $x > 0$ and the imaginary part $y > 0$.\n- Step 3: Therefore, after solving $$y = x$$, you must substitute the solutions back to check the signs of $x$ and $y$. If a solution gives $x < 0$ and $y < 0$, it corresponds to an argument of $$-\\frac{3\\pi}{4}$$, not $$\\frac{\\pi}{4}$$, and must be rejected.\n\n$$\\tan(\\theta) = k$$ always has two solutions per period; you must use quadrant signs to pick the correct one.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "Q9(b) — What is the range of the principal argument $$\\arg z$$, and why does it matter when rejecting algebraic candidates? (2 steps)", "answer": "- Step 1: The principal argument is defined to lie in the interval $$-\\pi < \\arg z \\leq \\pi$$.\n- Step 2: This matters because a point in the third quadrant (where $x < 0, y < 0$) has an angle of $$\\frac{5\\pi}{4}$$ if measured as a positive rotation, but the principal argument must be expressed as $$-\\frac{3\\pi}{4}$$ (measuring clockwise). If a question asks for $$\\arg z = \\frac{\\pi}{4}$$, a third-quadrant point is incorrect not just because of the quadrant, but because its principal argument is a negative angle, not a positive one.\n\nNever use angles outside $$(-\\pi, \\pi]$$ for the principal argument.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": true}, {"question": "Q10 — What is the very first statement you must write down in ANY proof by induction, before you touch any algebra? (2 steps)", "answer": "- Step 1: You must explicitly state the proposition $$P(n)$$ in full. For example, \"Let $$P(n)$$ be the proposition that $$\\mathbf{M}^n = \\begin{pmatrix} 2n+1 & -n \\\\ 4n & 1-2n \\end{pmatrix}$$\" or \"Let $$P(n)$$ be the statement that $$f(n)$$ is divisible by 7\".\n- Step 2: This is critical because your entire proof is about proving $$P(n)$$; without defining it, your base case and inductive step have no clear target. Edexcel marks depend on this explicit statement.\n\nNever assume the examiner knows what $$P(n)$$ is; write it out verbatim.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "Q10(i) — In matrix induction, you assume $$\\mathbf{M}^k = \\text{formula}$$ and need to find $$\\mathbf{M}^{k+1}$$. Should you compute $$\\mathbf{M}^k \\cdot \\mathbf{M}$$ or $$\\mathbf{M} \\cdot \\mathbf{M}^k$$? Why might one be preferable? (3 steps)", "answer": "- Step 1: By the associativity of matrix multiplication, $$\\mathbf{M}^{k+1} = \\mathbf{M}^k \\cdot \\mathbf{M} = \\mathbf{M} \\cdot \\mathbf{M}^k$$. Algebraically, both are valid and will yield the same result.\n- Step 2: However, if your assumed formula for $$\\mathbf{M}^k$$ is on the left side of the product, computing $$\\mathbf{M}^k \\cdot \\mathbf{M}$$ means your formula matrix is on the left and the original matrix $\\mathbf{M}$ is on the right.\n- Step 3: This often makes the row-column dot products cleaner to compute because you are multiplying the algebraic expressions in $$\\mathbf{M}^k$$ by the simple integers in $$\\mathbf{M}$$, making it easier to collect terms and match the target formula for $$\\mathbf{M}^{k+1}$$.\n\nChoose the multiplication order that makes the arithmetic easiest, but be consistent in your written working.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "Q10(ii) — In a divisibility induction proof, you assume $$7 \\mid f(k)$$ and want to show $$7 \\mid f(k+1)$$. What structural form must your working take to earn the method marks? (2 steps)", "answer": "- Step 1: You must rewrite $$f(k+1)$$ explicitly in terms of $$f(k)$$ and a multiple of the divisor. The goal is to arrive at a line like $$f(k+1) = A \\cdot f(k) + 7 \\cdot (\\text{integer})$$.\n- Step 2: This structure earns the marks because it directly uses the inductive hypothesis (that $$f(k) = 7m$$). Substituting this gives $$f(k+1) = A(7m) + 7(\\text{integer}) = 7(Am + \\text{integer})$$, proving divisibility. If you don't explicitly write $$f(k+1)$$ in terms of $$f(k)$$, you cannot logically invoke the hypothesis.\n\nThe line $$f(k+1) = A \\cdot f(k) + 7 \\cdot (\\text{something})$$ is the crux of the proof; do not skip it.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "Q10(ii) — In proving $$8^{2k+3} + 6^{2k+1}$$ is divisible by 7, you rewrite it as $$64 \\cdot 8^{2k+1} + 36 \\cdot 6^{2k-1}$$. What algebraic trick do you use next to introduce $$f(k) = 8^{2k+1} + 6^{2k-1}$$? (3 steps)", "answer": "- Step 1: You want to express $$f(k+1)$$ in terms of $$f(k)$$. The first term already has the correct base and index, multiplied by 64. The second term has the correct index but is multiplied by 36 instead of 1.\n- Step 2: The trick is to rewrite the coefficient 36 as a difference that includes 64. Specifically, $$36 = 64 - 28$$.\n- Step 3: Substitute this back: $$f(k+1) = 64 \\cdot 8^{2k+1} + (64 - 28) \\cdot 6^{2k-1} = 64(8^{2k+1} + 6^{2k-1}) - 28 \\cdot 6^{2k-1}$$. Now the first bracket is exactly $$f(k)$$, and the second term has 28 as a factor, which is $$7 \\times 4$$.\n\nWhen coefficients don't match, rewrite the \"wrong\" coefficient as \"target coefficient - multiple of the divisor\".", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": true}, {"question": "Q10(ii) — When moving from $$f(k) = 8^{2k+1} + 6^{2k-1}$$ to $$f(k+1)$$, the second term becomes $$6^{2(k+1)-1} = 6^{2k+1}$$. How do you correctly express this in terms of the index $$2k-1$$ found in $f(k)$, and what is the common mistake? (3 steps)", "answer": "- Step 1: The goal is to express the new term using the old index so you can factor out $$f(k)$$. You have $$6^{2k+1}$$ and you want to introduce $$6^{2k-1}$$.\n- Step 2: Use the law of indices: $$6^{2k+1} = 6^{(2k-1) + 2} = 6^2 \\cdot 6^{2k-1} = 36 \\cdot 6^{2k-1}$$.\n- Step 3: The common mistake is miscounting the shift in the index. For example, writing $$6^{2k+1} = 6 \\cdot 6^{2k}$$ is algebraically true, but it introduces $$6^{2k}$$, which is NOT the term present in $$f(k)$$. This breaks the connection to the inductive hypothesis.\n\nAlways calculate the exact difference between the new exponent and the old exponent to ensure you are factoring out the correct term.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "Q10 — What exact sentence must you write at the end of a proof by induction to secure the final conclusion mark? (2 steps)", "answer": "- Step 1: You must state: \"Since $$P(1)$$ is true, and $$P(k) \\Rightarrow P(k+1)$$, by the principle of mathematical induction, $$P(n)$$ is true for all $$n \\in \\mathbb{Z}^+$$.\"\n- Step 2: The common pitfall is concluding \"true for all $n$\" without specifying the domain $$\\mathbb{Z}^+$$. Edexcel awards a mark for this verbatim conclusion, so memorise it and write it every time.\n\nDo not paraphrase the conclusion; use the exact logical structure required by the mark scheme.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "Q3/Q7 — When finding the equation of a normal to a conic given in parametric form, you find $$\\frac{dy}{dx}$$ and then take the negative reciprocal for the normal's gradient. What is a common algebraic pitfall when substituting the point into the normal equation? (2 steps)", "answer": "- Step 1: The normal equation is $$y - y_1 = m_{\\text{norm}}(x - x_1)$$. The pitfall occurs when trying to clear fractions or negative signs by multiplying through by a denominator.\n- Step 2: A common error is forgetting to distribute the multiplication to both terms in the bracket (e.g., forgetting to halve a term, or dividing by $$2y$$ on only one side of the equation), which causes sign errors to cascade. To avoid this, write the gradient clearly, then carefully distribute the multiplication to both the $x$ and the $x_1$ terms. Do not try to do \"shortcut\" division across an addition.\n\nWith parametric normals, the gradients are often messy fractions—write every step of the expansion explicitly.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "Q3/Q7 — When finding where a normal intersects a conic again, you solve for a parameter $T$ and get a value like $$T = -\\frac{83}{9}$$. Why is this not the final answer, and what must you do instead? (2 steps)", "answer": "- Step 1: The question asks for the *coordinates* of the point, not the parameter value. $T$ is just a placeholder that describes the point on the parametric curve.\n- Step 2: To find the actual coordinates, you must substitute $T$ back into the parametric equations for $x$ and $y$. Leaving $$T = -\\frac{83}{9}$$ as the final answer loses the final mark because it does not specify the location of the point on the Cartesian plane.\n\nAlways check if the question asks for \"the value of the parameter\" or \"the coordinates of the point.\" If it asks for coordinates, substitute back.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "Q3/Q7 — After substituting a parameter back into a parametric equation, you get a coordinate like $$\\frac{6889}{243}$$. Should you attempt to simplify this fraction, and why or why not? (3 steps)", "answer": "- Step 1: You should check for common factors, but in this case, there are none. The denominator $$243 = 3^5$$, which means any common factor must be a power of 3.\n- Step 2: The numerator $$6889 = 83^2$$. Since 83 is a prime number and not divisible by 3, the fraction cannot be simplified.\n- Step 3: The pitfall is wasting exam time trying to divide 6889 by 3, 9, 27, etc., or making a calculation error and \"simplifying\" it incorrectly. If the denominator is a pure power of a prime and the numerator isn't divisible by that prime, leave the fraction as is.\n\nDo a quick mental check for prime factors (e.g., is the numerator divisible by 3? Sum of digits = 6+8+8+9=31, not divisible by 3). If not, leave it.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "Q3/Q7 — When finding where a normal meets a conic again, you have the normal's equation and the conic's Cartesian equation (e.g., $$y^2 = \\frac{4}{3}x$$). Why is substituting $y$ from the normal into the conic a bad strategic choice? (3 steps)", "answer": "- Step 1: The normal equation is typically linear in $x$ and $y$, like $$y = mx + c$$. Substituting this into $$y^2 = \\frac{4}{3}x$$ gives $$(mx+c)^2 = \\frac{4}{3}x$$.\n- Step 2: Expanding the left side yields a quadratic in $x$, but with messy coefficients coming from $$m^2$$, $2mc$, and $$c^2$$. The algebra becomes brutal and error-prone.\n- Step 3: The better strategy is to use the parametric form. Express both the normal and the conic in terms of the parameter $t$, which often leads to a simpler quadratic in $t$ that is easier to solve and factorise.\n\nParametric substitution almost always yields cleaner algebra than Cartesian substitution on conics.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "Q1 — To show that a matrix inverse exists for all values of $k$, what property must you prove about the determinant, and what is a common algebraic method to do so? (3 steps)", "answer": "- Step 1: A matrix inverse exists if and only if the determinant is non-zero. So you must prove that $$\\det(\\mathbf{M}) \\neq 0$$ for all $k$.\n- Step 2: Calculate the determinant, which will typically be a quadratic in $k$, say $$ak^2 + bk + c$$. You need to show this quadratic is never zero.\n- Step 3: The standard method is completing the square. Show that the quadratic can be written as $$a(k + p)^2 + q$$ where $q > 0$. This proves the expression is always positive (and thus non-zero). Alternatively, check the discriminant $$b^2 - 4ac$$; if it is negative and $a > 0$, the quadratic is always positive.\n\n\"Inverse exists for all $k$\" $$\\iff$$ \"determinant is never zero\" $$\\iff$$ \"quadratic det is always positive/negative\" $$\\iff$$ complete the square.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "Q2 — If a cubic polynomial with real coefficients has a complex root $\\alpha$, what must the other roots be, and what is the common pitfall regarding the number of roots? (3 steps)", "answer": "- Step 1: For a polynomial with real coefficients, complex roots always come in conjugate pairs. So if $\\alpha$ is a root, $$\\bar{\\alpha}$$ must also be a root.\n- Step 2: A cubic polynomial has exactly 3 roots (by the Fundamental Theorem of Algebra). If two of them are $\\alpha$ and $$\\bar{\\alpha}$$, the third must be a real root, say $\\beta$.\n- Step 3: The common pitfall is assuming a cubic can have 4 roots (e.g., $\\alpha$, $$\\bar{\\alpha}$$, $\\beta$, $$\\bar{\\beta}$$) because you are used to seeing conjugate pairs in quartics. You must remember: degree = number of roots. A cubic has 3 roots, so only ONE conjugate pair and ONE real root.\n\n\"Degree = # roots\". A real cubic with one complex root has exactly one conjugate pair and one real root.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "Q4 — A transformation $A$ is applied to a point, followed by transformation $B$. When writing this as a single matrix multiplication, what is the order, and why? (3 steps)", "answer": "- Step 1: When a point is represented as a column vector $\\mathbf{v}$, transformation $A$ acts first, giving $A\\mathbf{v}$.\n- Step 2: Then transformation $B$ acts on the result, giving $$B(A\\mathbf{v}) = (BA)\\mathbf{v}$$.\n- Step 3: Therefore, the combined matrix for \"A then B\" is $$\\mathbf{BA}$$, NOT $$\\mathbf{AB}$$. The rightmost matrix in the product always acts first on the column vector. The common pitfall is writing \"A then B\" as $\\mathbf{AB}$ because we read from left to right.\n\n\"A then B\" = $$\\mathbf{BA}$$. The rightmost matrix acts first.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "Q5 — When asked to find a new quadratic with roots like $$\\alpha + \\frac{1}{\\beta^2}$$ and $$\\beta + \\frac{1}{\\alpha^2}$$, what is the most reliable strategy to find the sum and product of the new roots? (4 steps)", "answer": "- Step 1: Do not try to find $\\alpha$ and $\\beta$ individually if they are irrational/complex. Instead, use symmetric identities based on the original sum $$S = \\alpha + \\beta$$ and product $$P = \\alpha\\beta$$ (from Vieta's formulas).\n- Step 2: For the sum of the new roots, add them together: $$(\\alpha + \\frac{1}{\\beta^2}) + (\\beta + \\frac{1}{\\alpha^2}) = (\\alpha + \\beta) + (\\frac{1}{\\alpha^2} + \\frac{1}{\\beta^2})$$.\n- Step 3: Simplify the second term by combining over a common denominator: $$\\frac{\\alpha^2 + \\beta^2}{\\alpha^2\\beta^2} = \\frac{(\\alpha+\\beta)^2 - 2\\alpha\\beta}{(\\alpha\\beta)^2} = \\frac{S^2 - 2P}{P^2}$$.\n- Step 4: Substitute the known values of $S$ and $P$. Follow a similar process for the product of the new roots. The pitfall is making sign errors in the cross-term expansion; write out every step of the substitution.\n\nAlways express new symmetric functions in terms of the elementary symmetric polynomials $S$ and $P$ before substituting numbers.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "Q6 — When using numerical methods like Newton-Raphson or linear interpolation, what must you always check regarding the final answer's format? (3 steps)", "answer": "- Step 1: The exam paper's front cover usually states a default rounding requirement (e.g., \"3 significant figures\").\n- Step 2: However, individual parts of a question can override this default (e.g., \"give your answer to 2 decimal places\" or \"give your answer to 3 decimal places\").\n- Step 3: The common pitfall is blindly applying the front-cover default to all parts. Even within the same question, part (a) might ask for 2 dp and part (b) for 3 dp. Always re-read the rounding clause in the exact phrasing of the part you are answering.\n\nNever assume the default rounding; read the specific instruction for each part.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "If a polynomial has complex roots $\\alpha$ and $$\\bar{\\alpha}$$, what is the real quadratic factor corresponding to this conjugate pair? (3 steps)", "answer": "- Step 1: The quadratic factor is $$(z - \\alpha)(z - \\bar{\\alpha})$$.\n- Step 2: Expand this: $$z^2 - (\\alpha + \\bar{\\alpha})z + \\alpha\\bar{\\alpha}$$.\n- Step 3: Recognise that $$\\alpha + \\bar{\\alpha} = 2\\text{Re}(\\alpha)$$ (twice the real part) and $$\\alpha\\bar{\\alpha} = |\\alpha|^2$$ (the modulus squared). Therefore, the real quadratic factor is $$z^2 - 2\\text{Re}(\\alpha)z + |\\alpha|^2$$.\n\nThis is NOT in the formula booklet, so you must memorise it or be able to derive it instantly.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "What are the standard identities for $$\\alpha^2 + \\beta^2$$, $$\\alpha^3 + \\beta^3$$, and $$\\frac{1}{\\alpha} + \\frac{1}{\\beta}$$ in terms of the sum $$S = \\alpha + \\beta$$ and product $$P = \\alpha\\beta$$? (3 steps)", "answer": "- Step 1: $$\\alpha^2 + \\beta^2 = (\\alpha + \\beta)^2 - 2\\alpha\\beta = S^2 - 2P$$. This comes from expanding $$(\\alpha + \\beta)^2$$ and rearranging.\n- Step 2: $$\\alpha^3 + \\beta^3 = (\\alpha + \\beta)^3 - 3\\alpha\\beta(\\alpha + \\beta) = S^3 - 3PS$$. This comes from expanding $$(\\alpha + \\beta)^3$$ and rearranging.\n- Step 3: $$\\frac{1}{\\alpha} + \\frac{1}{\\beta} = \\frac{\\alpha + \\beta}{\\alpha\\beta} = \\frac{S}{P}$$. This comes from combining over a common denominator.\n\nThese are NOT in the booklet. Memorise them or derive them from expanding $$(\\alpha+\\beta)^n$$.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "What are the standard $$2 \\times 2$$ matrices for: (a) a stretch of scale factor $k$ parallel to the $x$-axis, (b) a stretch of scale factor $k$ parallel to the $y$-axis, and (c) an anticlockwise rotation by $\\theta$ about the origin? (3 steps)", "answer": "- Step 1: Stretch sf $k$ parallel to $x$-axis: The $x$-coordinates are multiplied by $k$, $y$ stays the same. Matrix: $$\\begin{pmatrix} k & 0 \\\\ 0 & 1 \\end{pmatrix}$$.\n- Step 2: Stretch sf $k$ parallel to $y$-axis: The $y$-coordinates are multiplied by $k$, $x$ stays the same. Matrix: $$\\begin{pmatrix} 1 & 0 \\\\ 0 & k \\end{pmatrix}$$.\n- Step 3: Anticlockwise rotation $\\theta$: The image of $(1,0)$ is $$(\\cos\\theta, \\sin\\theta)$$, and the image of $(0,1)$$ is $$(-\\sin\\theta, \\cos\\theta)$$. Matrix: $$\\begin{pmatrix} \\cos\\theta & -\\sin\\theta \\\\ \\sin\\theta & \\cos\\theta \\end{pmatrix}$$.\n\nThese are NOT in the booklet. For stretches, the $k$ goes on the diagonal corresponding to the axis. For rotation, main diagonal is cosines, other is sines with a minus top right.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "What is the $$2 \\times 2$$ matrix for a reflection in the line $$y = x\\tan\\theta$$? (2 steps)", "answer": "- Step 1: The matrix is $$\\begin{pmatrix} \\cos 2\\theta & \\sin 2\\theta \\\\ \\sin 2\\theta & -\\cos 2\\theta \\end{pmatrix}$$.\n- Step 2: Notice the structure: the main diagonal has $$\\cos 2\\theta$$ and $$-\\cos 2\\theta$$, while the off-diagonal has $$\\sin 2\\theta$$ on both sides (symmetric). Special cases: reflection in $y=x$ ($$\\theta = \\pi/4$$) gives $$\\begin{pmatrix} 0 & 1 \\\\ 1 & 0 \\end{pmatrix}$$. Reflection in the $x$-axis ($$\\theta = 0$$) gives $$\\begin{pmatrix} 1 & 0 \\\\ 0 & -1 \\end{pmatrix}$$.\n\nThis is NOT in the booklet. Memorise the general form or derive it from the rotation matrix.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "How does a linear transformation represented by matrix $\\mathbf{M}$ affect the area of a shape, and what is the formula? (2 steps)", "answer": "- Step 1: A linear transformation scales areas by a factor equal to the absolute value of the determinant of the transformation matrix.\n- Step 2: The formula is: $$\\text{New Area} = |\\det(\\mathbf{M})| \\times \\text{Original Area}$$. The absolute value is crucial because a negative determinant indicates a reversal of orientation (like a reflection), but area is a positive quantity. For example, a reflection in the $y$-axis has $\\det = -1$, but the area scale factor is $$|-1| = 1$$.\n\nArea scale factor = $$|\\det \\mathbf{M}|$$. Don't forget the absolute value.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "What is the formula for linear interpolation to find a root between $$x_1$$ and $$x_2$$, and what do the terms represent? (2 steps)", "answer": "- Step 1: The formula is $$x_3 = x_1 + \\frac{|f(x_1)|}{|f(x_1)| + |f(x_2)|}(x_2 - x_1)$$.\n- Step 2: $$x_1$$ is the starting point. The fraction $$\\frac{|f(x_1)|}{|f(x_1)| + |f(x_2)|}$$ represents the proportion of the interval $$[x_1, x_2]$$ you need to travel from $x_1$ to reach the root. We use absolute values because we are dealing with distances/magnitudes. The closer $$f(x_1)$$ is to 0 (relative to $$f(x_2)$$), the smaller the fraction, meaning the root is closer to $x_1$.\n\nThis is NOT in the booklet. It comes from similar triangles on the graph between the two points.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "In an exam, what is the fundamental difference in how you should approach a \"show that\" question versus a \"find\" question? (3 steps)", "answer": "- Step 1: In a \"show that\" question, the answer is given to you. The marks are entirely for the **working** and logical steps that lead to that answer. You cannot skip steps or work backwards from the answer.\n- Step 2: In a \"find\" question, the answer is not given. The result mark is often independent—meaning even if your working is messy or has errors, if you arrive at the correct final answer, you can still earn the final mark.\n- Step 3: Therefore, for \"show that\", be meticulous and write every line of algebra. For \"find\", focus on getting the right answer, but still show enough working to earn method marks in case you make a slip.\n\n\"Show that\" = marks for the journey. \"Find\" = marks for the destination (with some journey marks).", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "What is the strategic difference between formulas IN the Edexcel formula booklet versus those NOT in the booklet, regarding your exam preparation? (3 steps)", "answer": "- Step 1: Formulas IN the booklet (e.g., $$\\sum r^2$$, $$\\sum r^3$$, Newton-Raphson, parametric equations for conics) require zero memorisation time. In the exam, you just open the booklet and copy them.\n- Step 2: Formulas NOT in the booklet (e.g., matrix det/inverse, rotation matrices, conjugate-pair quadratic factor, Vieta's identities) must be committed to reflex memory. If you have to derive them in the exam, you waste precious time.\n- Step 3: Your preparation should heavily drill the NOT-in-booklet formulas until they are automatic. Spend zero rehearsal time trying to memorise things you can just look up.\n\nKnow what's in the booklet. Drill what isn't.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "What is the rough time allocation per mark in a 75-mark, 90-minute Edexcel FP1 exam, and how should you apply this? (3 steps)", "answer": "- Step 1: 90 minutes / 75 marks = 1.2 minutes per mark (roughly 1 minute per mark, with a small buffer).\n- Step 2: A 5-mark question deserves about 6 minutes. A 10-mark question deserves about 12 minutes.\n- Step 3: If you are spending significantly more time than the marks warrant on a question (e.g., 10 minutes on a 4-mark part), you are likely on the wrong track or stuck in an algebraic hole. Move on to the next question and come back later.\n\n~1.2 min/mark. If you're over time, MOVE ON.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": true}], "count": 33}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "FP1 Jan 2024 Q8 — When you see a sum like $$\\sum_{r=1}^{n} r(2r+1)(r+1)$$, what must you do BEFORE applying any standard sum formula, and why? (2 steps)", "answer": "- Step 1: **Expand the product fully** into a polynomial in $$r$$. Here: $$r(2r+1)(r+1) = r(2r^2 + 3r + 1) = 2r^3 + 3r^2 + r$$.\n- Step 2: The reason is that standard sum formulas only apply to **individual powers** $$\\sum r$$, $$\\sum r^2$$, $$\\sum r^3$$. You **cannot** sum a product term-by-term — $$\\sum r(2r+1)(r+1) \\neq (\\sum r)(2\\sum r + 1)(\\sum r + 1)$$. Expansion converts the product into a sum of powers, which the formulas *can* handle.\n\nAlways expand first; only then apply linearity of summation: $$\\sum(2r^3 + 3r^2 + r) = 2\\sum r^3 + 3\\sum r^2 + \\sum r$$.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "Which three standard sum formulas are provided IN the Edexcel formula booklet, and what's their exact form?", "answer": "$$\\sum_{r=1}^n r = \\tfrac{1}{2}n(n+1)$$, $$\\sum_{r=1}^n r^2 = \\tfrac{1}{6}n(n+1)(2n+1)$$, $$\\sum_{r=1}^n r^3 = \\tfrac{1}{4}n^2(n+1)^2$$.\n\nThese are **given** — don't waste time memorising them. What's NOT in the booklet is the **technique** of splitting a polynomial summand, factoring out common factors early, and the restricted-limit formula $$\\sum_{r=a}^b = S(b) - S(a-1)$$. Those are the skills you must rehearse.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "FP1 Jan 2024 Q8 — After substituting the standard sum formulas into $$2\\sum r^3 + 3\\sum r^2 + \\sum r$$, you get $$\\frac{1}{2}n^2(n+1)^2 + \\frac{1}{2}n(n+1)(2n+1) + \\frac{1}{2}n(n+1)$$. What's the trick that keeps the algebra clean? (3 steps)", "answer": "- Step 1: **Factor out** $$\\frac{1}{2}n(n+1)$$ from every term immediately. Every standard sum formula has $$n(n+1)$$ as a factor (or $$n^2(n+1)^2$$ which is $$n(n+1) \\cdot n(n+1)$$).\n- Step 2: This leaves a bracket: $$\\frac{1}{2}n(n+1)\\big[n(n+1) + (2n+1) + 1\\big]$$.\n- Step 3: Simplify the bracket: $$n^2 + n + 2n + 1 + 1 = n^2 + 3n + 2 = (n+1)(n+2)$$.\n\nWithout factoring early, you'd be expanding three separate terms and then trying to recombine — a mess that breeds sign errors. Factoring first collapses everything into one clean bracket.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": true}, {"question": "FP1 Jan 2024 Q8 — For a sum with restricted limits $$\\sum_{r=a}^{b} f(r)$$, what formula do you write down, and what's the common off-by-one pitfall? (2 steps)", "answer": "- Step 1: The formula is $$\\sum_{r=a}^{b} f(r) = S(b) - S(a-1)$$, where $$S(N) = \\sum_{r=1}^{N} f(r)$$ is the closed-form sum from 1 to $$N$$.\n- Step 2: The pitfall is writing $$S(b) - S(a)$$ instead of $$S(b) - S(a-1)$$. The error: subtracting $$S(a)$$ removes the term $$r = a$$, but $$r = a$$ is **included** in the sum $$\\sum_{r=a}^{b}$$. You only want to remove terms $$r = 1$$ through $$r = a-1$$, hence subtract $$S(a-1)$$.\n\nThink of it as: \"I want everything from 1 to $$b$$, minus everything from 1 to $$a-1$$. The term $$r=a$$ stays.\"", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "FP1 Jan 2024 Q8(b) — Why must you subtract $$S(n-1)$$ and NOT $$S(n)$$ when computing $$\\sum_{r=n}^{2n}$$?", "answer": "Because the lower limit $$r = n$$ is **included** in the sum. If you subtracted $$S(n)$$, you'd be removing all terms from $$r = 1$$ through $$r = n$$ — but the term at $$r = n$$ belongs in your answer.\n\n$$S(n) = \\sum_{r=1}^{n}$$ removes one term too many. $$S(n-1) = \\sum_{r=1}^{n-1}$$ removes exactly the terms before $$r = n$$.\n\nThe mnemonic: the subscript on $$S$$ is always **one less** than the lower limit of your restricted sum.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": true}, {"question": "FP1 Jan 2024 Q8(b) — After computing $$S(2n) - S(n-1)$$, you get two terms with different structures. What's the strategic next step before simplifying? (2 steps)", "answer": "- Step 1: **Factor out the common factor** from both terms before expanding. Here: $$S(2n) = 2n(n+1)(2n+1)^2$$ and $$S(n-1) = \\frac{1}{2}n^2(n-1)(n+1)$$ both contain $$\\frac{n(n+1)}{2}$$.\n- Step 2: Write $$\\sum_{r=n}^{2n} = \\frac{n(n+1)}{2}\\big[4(2n+1)^2 - n(n-1)\\big]$$. Now simplify the bracket — much cleaner than expanding both terms separately and then trying to recombine.\n\nIf you skip this and expand first, you get fourth-degree polynomials that are brutal to recombine. Factor first, expand the bracket second.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "FP1 Jan 2024 Q8(b) — When you need to factor a quadratic like $$15n^2 + 17n + 4$$, what two-step verification prevents the common mis-factoring pitfall? (2 steps)", "answer": "- Step 1: **Check the discriminant** to confirm it's a perfect square. $$\\Delta = 17^2 - 4(15)(4) = 289 - 240 = 49 = 7^2$$. Since the discriminant is a perfect square, the quadratic factors nicely over the integers.\n- Step 2: **Multiply back** to verify. The correct factorization is $$(3n+1)(5n+4) = 15n^2 + 12n + 5n + 4 = 15n^2 + 17n + 4$$ ✓. The common mis-factoring is $$(5n+1)(3n+4) = 15n^2 + 17n + 4$$ — wait, that also gives $$15n^2 + 17n + 4$$! Actually, both work numerically. But $$(3n+1)(5n+4)$$ and $$(5n+1)(3n+4)$$ are different factorizations. Always multiply back to confirm the cross-term matches.\n\nThe key insight: the question asks for $$(an+b)(cn+d)$$ where $$a, b, c, d$$ are integers — either ordering is valid since the pair $$(a,c) = (3,5)$$ or $$(5,3)$$ is symmetric.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "FP1 Jan 2024 Q8 — When computing $$2 \\cdot \\sum_{r=1}^n r^3$$, what's the coefficient pitfall, and how do you avoid it? (2 steps)", "answer": "- Step 1: The formula booklet gives $$\\sum r^3 = \\frac{1}{4}n^2(n+1)^2$$. When your summand has $$2r^3$$, you multiply: $$2 \\cdot \\frac{1}{4}n^2(n+1)^2 = \\frac{1}{2}n^2(n+1)^2$$.\n- Step 2: The pitfall is accidentally using $$\\frac{1}{2}n^2(n+1)^2$$ as the formula for $$\\sum r^3$$ itself (confusing it with the already-doubled result), and then doubling again to get $$n^2(n+1)^2$$. This cascades into a wrong final answer.\n\nThe safeguard: always write the formula **straight from the booklet** first, then multiply by the coefficient. Never do both in your head.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "FP1 Jan 2024 Q9 — When you have a complex fraction equation like $$\\frac{3z-1}{2} = \\frac{\\lambda + 5i}{\\lambda - 4i}$$, what's the first algebraic step and why? (2 steps)", "answer": "- Step 1: **Clear all simple fractions first**. Multiply both sides by 2: $$3z - 1 = \\frac{2(\\lambda + 5i)}{\\lambda - 4i}$$. Then isolate $$3z$$: $$3z = 1 + \\frac{2(\\lambda + 5i)}{\\lambda - 4i}$$.\n- Step 2: Combine the right side over a common denominator: $$3z = \\frac{(\\lambda - 4i) + 2(\\lambda + 5i)}{\\lambda - 4i} = \\frac{3\\lambda + 6i}{\\lambda - 4i}$$. Only now are you ready to rationalize.\n\nIf you try to rationalize before clearing the outer fraction, you end up with nested fractions — algebra that's much harder to simplify. Always simplify the structure first.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "FP1 Jan 2024 Q9 — To rationalize $$z = \\frac{\\lambda + 2i}{\\lambda - 4i}$$, what exactly do you multiply by, and what's the common pitfall?", "answer": "Multiply numerator and denominator by the **conjugate of the denominator**: $$\\frac{\\lambda + 4i}{\\lambda + 4i}$$.\n\nThe pitfall: multiplying by $$\\lambda - 4i$$ (the same as the denominator) instead of $$\\lambda + 4i$$ (the conjugate). This gives $$(\\lambda - 4i)^2$$ in the denominator — still complex, no simplification. The conjugate $$\\lambda + 4i$$ gives $$(\\lambda - 4i)(\\lambda + 4i) = \\lambda^2 + 16$$, a **real** denominator. That's the entire point of rationalizing.\n\nRule: conjugate of $$a + bi$$ is $$a - bi$$. Flip the sign of the imaginary part.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "FP1 Jan 2024 Q9 — When expanding $$(\\lambda + 2i)(\\lambda + 4i)$$ in the numerator, what happens to the $$8i^2$$ term, and why is this a common source of error?", "answer": "$$8i^2 = 8(-1) = -8$$. So the product becomes $$\\lambda^2 + 4i\\lambda + 2i\\lambda + 8i^2 = \\lambda^2 + 6i\\lambda - 8 = (\\lambda^2 - 8) + 6\\lambda i$$.\n\nThe error: writing $$8i^2 = +8$$ (forgetting that $$i^2 = -1$$). This flips the sign of the real part and gives $$(\\lambda^2 + 8) + 6\\lambda i$$ instead of $$(\\lambda^2 - 8) + 6\\lambda i$$. Since the real part appears in the argument condition, this sign error propagates into a completely wrong quadratic equation for $$\\lambda$$.\n\nAlways replace $$i^2$$ with $$-1$$ explicitly. Don't skip this step mentally.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": true}, {"question": "FP1 Jan 2024 Q9(b) — Given $$\\arg z = \\frac{\\pi}{4}$$, what two conditions must simultaneously hold, and why is the second condition often forgotten?", "answer": "$$\\arg z = \\frac{\\pi}{4}$$ means: (1) $$y = x$$ (the point lies on the line $$y = x$$), **AND** (2) $$x > 0$$ (the point is in the first quadrant, not the third).\n\nThe second condition is forgotten because students equate $$\\arg z = \\frac{\\pi}{4}$$ with $$\\tan(\\arg z) = 1$$, i.e., $$y/x = 1$$. But $$y/x = 1$$ is satisfied by **any** point on the line $$y = x$$, including points in the third quadrant where both $$x < 0$$ and $$y < 0$$. There, $$\\arg z = -\\frac{3\\pi}{4}$$, not $$\\frac{\\pi}{4}$$.\n\nThe tangent function has period $$\\pi$$, so $$\\tan^{-1}(1)$$ has two solutions per $$2\\pi$$ cycle. You must check quadrant to pick the right one.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": true}, {"question": "FP1 Jan 2024 Q9(b) — If $$y = x$$ but $$x < 0$$ and $$y < 0$$, what is $$\\arg z$$, and why can't it be $$\\frac{5\\pi}{4}$$?", "answer": "The point is in the third quadrant, so $$\\arg z = -\\frac{3\\pi}{4}$$.\n\nIt can't be $$\\frac{5\\pi}{4}$$ because the **principal argument** is defined to lie in $$(-\\pi, \\pi]$$. The value $$\\frac{5\\pi}{4} > \\pi$$, so it's outside the principal range. The equivalent angle within the range is $$\\frac{5\\pi}{4} - 2\\pi = -\\frac{3\\pi}{4}$$.\n\nThis is why the sign-check matters: both $$\\lambda = 3 + \\sqrt{17}$$ and $$\\lambda = 3 - \\sqrt{17}$$ satisfy $$y = x$$, but only the first gives $$x > 0$$. The second gives negative $$x$$ and $$y$$, yielding $$\\arg z = -\\frac{3\\pi}{4} \\neq \\frac{\\pi}{4}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": true}, {"question": "FP1 Jan 2024 Q9(b) — After solving $$\\lambda^2 - 6\\lambda - 8 = 0$$ to get $$\\lambda = 3 \\pm \\sqrt{17}$$, what critical step must you perform before stating the final answer?", "answer": "**Sign-check both $$x$$ and $$y$$** for each candidate value of $$\\lambda$$.\n\n- For $$\\lambda = 3 + \\sqrt{17} \\approx 7.12$$: $$y = \\frac{6\\lambda}{\\lambda^2+16} > 0$$ and $$x = \\frac{\\lambda^2 - 8}{\\lambda^2+16} > 0$$. Both positive → first quadrant → $$\\arg z = \\frac{\\pi}{4}$$ ✓.\n- For $$\\lambda = 3 - \\sqrt{17} \\approx -1.12$$: $$6\\lambda < 0$$ so $$y < 0$$. Third quadrant → $$\\arg z = -\\frac{3\\pi}{4} \\neq \\frac{\\pi}{4}$$ ✗.\n\nLeaving the answer as $$\\lambda = 3 \\pm \\sqrt{17}$$ **without this check** loses the discrimination mark. Every time you solve for a parameter constrained by $$\\arg z = \\theta$$, verify the quadrant.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "FP1 Jan 2024 Q9 — When the denominator of $$z$$ is $$\\lambda^2 + 16$$ (always positive), what simplification does this allow when checking the argument condition?", "answer": "Since $$\\lambda^2 + 16 > 0$$ for all real $$\\lambda$$, the **sign of $$x$$ and $$y$$ is determined entirely by their numerators**. You can equate numerators directly: $$y = x$$ becomes $$6\\lambda = \\lambda^2 - 8$$, without worrying about sign flips from a negative denominator.\n\nIf the denominator could be negative, you'd need to consider two cases (flip the inequality). Here, the positive denominator means the signs of $$x$$ and $$y$$ are exactly the signs of $$\\lambda^2 - 8$$ and $$6\\lambda$$ respectively — a clean, direct check.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "FP1 Jan 2024 Q10 — In a proof by induction, what must you state at the very beginning, and why does Edexcel award marks for it?", "answer": "You must state the **proposition** $$P(n)$$ explicitly. For example: \"Let $$P(n)$$ be the statement that $$\\mathbf{M}^n = \\begin{pmatrix} 2n+1 & -n \\\\ 4n & 1-2n \\end{pmatrix}$$\" or \"Let $$P(n)$$ be the statement that $$f(n) = 8^{2n+1} + 6^{2n-1}$$ is divisible by 7.\"\n\nEdexcel awards a mark for this because without it, the logical structure of the proof is ambiguous — the reader doesn't know what \"it\" refers to in subsequent steps. The proposition defines what you're proving, makes the base case checkable, and gives the inductive step a clear target.\n\nSkipping this is an automatic mark loss, even if all the algebra is correct.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "FP1 Jan 2024 Q10 — In the base case of induction, what must you compute directly, and what must you NOT do?", "answer": "Compute the LHS directly from the definition, and show it equals the RHS from the formula.\n\nFor example, in matrix induction with $$n=1$$: compute $$\\mathbf{M}^1 = \\begin{pmatrix} 3 & -1 \\\\ 4 & -1 \\end{pmatrix}$$ directly, then show this equals $$\\begin{pmatrix} 2(1)+1 & -1 \\\\ 4(1) & 1-2(1) \\end{pmatrix}$$. ✓\n\nWhat you must **NOT** do: substitute $$n=1$$ into the formula you're trying to prove and say \"it works.\" That's circular — you're assuming the formula is true to prove it's true. The base case must be verified independently.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": true}, {"question": "FP1 Jan 2024 Q10(i) — In matrix induction, should you compute $$\\mathbf{M}^{k+1} = \\mathbf{M} \\cdot \\mathbf{M}^k$$ or $$\\mathbf{M}^k \\cdot \\mathbf{M}$$? Does it matter, and why might you prefer one?", "answer": "Algebraically, both are equal by associativity of matrix multiplication, so it doesn't affect the result. However, you might prefer $$\\mathbf{M}^k \\cdot \\mathbf{M}$$ because:\n\n- The inductive hypothesis gives you $$\\mathbf{M}^k$$ as a specific matrix with entries in terms of $$k$$.\n- Multiplying this known matrix by $$\\mathbf{M}$$ (on the right) keeps the computation organized: you substitute the hypothesis directly and then multiply by the constant matrix $$\\mathbf{M}$$.\n\nThe pitfall: writing $$\\mathbf{M}^k \\cdot \\mathbf{M}$$ in your working but computing $$\\mathbf{M} \\cdot \\mathbf{M}^k$$ (left multiplication). For $$2 \\times 2$$ matrices with the identity this may work out, but the **working must match what you write**. Consistency prevents algebraic errors.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "FP1 Jan 2024 Q10(ii) — In divisibility induction, what's the key structural goal for the inductive step, and what form must you reach? (2 steps)", "answer": "- Step 1: The goal is to express $$f(k+1)$$ in terms of $$f(k)$$ plus a multiple of 7. You need to reach: $$f(k+1) = A \\cdot f(k) + 7 \\cdot (\\text{integer})$$ for some integer $$A$$.\n- Step 2: Since the hypothesis says $$f(k) = 7m$$ for some integer $$m$$, substituting gives $$f(k+1) = A \\cdot 7m + 7 \\cdot (\\text{integer}) = 7(Am + \\text{integer})$$, which is divisible by 7.\n\nThe structure mark is for **explicitly writing** $$f(k+1) = (\\text{integer}) \\cdot f(k) + 7 \\cdot (\\text{integer})$$. If you just show $$f(k+1) - f(k)$$ is divisible by 7, that's not enough — you must use the hypothesis that $$f(k)$$ itself is divisible by 7.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "FP1 Jan 2024 Q10(ii) — When proving $$f(n) = 8^{2n+1} + 6^{2n-1}$$ is divisible by 7, the inductive step requires expressing $$f(k+1) = 8^{2k+3} + 6^{2k+1}$$ in terms of $$f(k)$$. What's the trick, and why does it work? (3 steps)", "answer": "- Step 1: Rewrite each term of $$f(k+1)$$ so it contains the corresponding term of $$f(k)$$: $$8^{2k+3} = 64 \\cdot 8^{2k+1}$$ and $$6^{2k+1} = 36 \\cdot 6^{2k-1}$$.\n- Step 2: The trick: **split** $$36 = 64 - 28$$. Then $$6^{2k+1} = (64 - 28) \\cdot 6^{2k-1} = 64 \\cdot 6^{2k-1} - 28 \\cdot 6^{2k-1}$$.\n- Step 3: Now $$f(k+1) = 64 \\cdot 8^{2k+1} + 64 \\cdot 6^{2k-1} - 28 \\cdot 6^{2k-1} = 64(8^{2k+1} + 6^{2k-1}) - 28 \\cdot 6^{2k-1} = 64 \\cdot f(k) - 28 \\cdot 6^{2k-1}$$.\n\nWhy split $$36 = 64 - 28$$? Because 64 is the ratio $$8^2$$ between successive odd-power terms of 8, so factoring out 64 groups both terms into $$f(k)$$. And 28 is divisible by 7 ($$28 = 4 \\times 7$$), so the remainder is automatically a multiple of 7.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": true}, {"question": "FP1 Jan 2024 Q10(ii) — Why split 36 as $$64 - 28$$ specifically? What's the motivation, and what would go wrong with other splits?", "answer": "The motivation: you need the coefficient of $$6^{2k-1}$$ to match the coefficient of $$8^{2k+1}$$ so you can **factor out** $$f(k) = 8^{2k+1} + 6^{2k-1}$$. The coefficient of $$8^{2k+1}$$ in $$f(k+1)$$ is 64 (= $$8^2$$), so you want 36 to also contain 64 as a component.\n\nWriting $$36 = 64 - 28$$ gives: $$f(k+1) = 64 \\cdot f(k) - 28 \\cdot 6^{2k-1} = 64 \\cdot f(k) - 7 \\cdot (4 \\cdot 6^{2k-1})$$. Both terms are divisible by 7 (the first by hypothesis, the second explicitly).\n\nIf you split differently, say $$36 = 7 + 29$$, you'd get $$7 \\cdot 6^{2k-1} + 29 \\cdot 6^{2k-1}$$. The 7 part works, but the 29 part doesn't combine with the $$8^{2k+1}$$ term to form $$f(k)$$ — you lose the clean factorization.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": true}, {"question": "FP1 Jan 2024 Q10(ii) — What's the correct way to rewrite $$6^{2k+1}$$ in terms of $$6^{2k-1}$$, and what's the common index-manipulation error?", "answer": "$$6^{2k+1} = 6^{(2k-1)+2} = 6^2 \\cdot 6^{2k-1} = 36 \\cdot 6^{2k-1}$$.\n\nThe common error: writing $$6^{2k+1} = 6 \\cdot 6^{2k}$$, which is algebraically correct but useless for this problem — it doesn't connect to $$f(k) = 8^{2k+1} + 6^{2k-1}$$, which involves $$6^{2k-1}$$, not $$6^{2k}$$.\n\nThe key: identify which power appears in $$f(k)$$ (here, $$6^{2k-1}$$), then express the corresponding term in $$f(k+1)$$ as a **multiple** of that power. The exponent difference is $$(2k+1) - (2k-1) = 2$$, hence the factor $$6^2 = 36$$.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "FP1 Jan 2024 Q10 — What is the exact conclusion sentence that Edexcel requires for full marks in an induction proof?", "answer": "\"Since $$P(1)$$ is true, and $$P(k) \\Rightarrow P(k+1)$$, by the principle of mathematical induction, $$P(n)$$ holds for all $$n \\in \\mathbb{Z}^+$$.\"\n\nThree required elements: (1) the base case is true, (2) the inductive step $$P(k) \\Rightarrow P(k+1)$$ holds, (3) the conclusion names the domain ($$\\mathbb{Z}^+$$, not just \"all $$n$$\"). Missing any of these loses the conclusion mark.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "FP1 Jan 2024 Q10 — What's the pitfall of skipping the base case in induction, and why can't you argue \"it's obvious\"?", "answer": "The base case is the **anchor** of the entire inductive chain. Without it, you've proved \"if $$P(k)$$ is true then $$P(k+1)$$ is true\" — but this is a **vacuously true** statement if $$P(k)$$ is never true for any starting value. It's like proving \"if I'm a billionaire, then I can buy a yacht\" — logically valid, but useless if the hypothesis never holds.\n\nEdexcel awards a specific mark for the base case. Skipping it is an automatic mark loss regardless of how perfect the inductive step is. Always compute the base case explicitly, even if it seems trivial.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": true}, {"question": "FP1 Jan 2024 Q10 — In the induction hypothesis, what phrase must you include, and what's the pitfall of omitting it?", "answer": "You must write: \"Assume $$P(k)$$ is true **for some** $$k \\in \\mathbb{Z}^+$$.\"\n\nThe pitfall: writing \"Assume $$P(k)$$ is true for **all** $$k$$\" — that's circular reasoning. If $$P(k)$$ is true for all $$k$$, then there's nothing left to prove! The hypothesis is that $$P(k)$$ holds for **one particular but unspecified** positive integer $$k$$, and you then show this implies $$P(k+1)$$.\n\nThe word \"some\" (or \"a particular\") is critical. You're not assuming the conclusion; you're assuming the proposition holds at one specific point and deducing it holds at the next.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": true}, {"question": "What's the determinant of $$\\begin{pmatrix} a & b \\\\ c & d \\end{pmatrix}$$, and why must you memorise it?", "answer": "$$\\det \\begin{pmatrix} a & b \\\\ c & d \\end{pmatrix} = ad - bc$$.\n\nThis is **NOT in the formula booklet**. You need it for: finding inverses (the denominator), checking if a matrix is singular (det = 0), computing area scale factors ($$|\\det \\mathbf{M}|$$), and solving systems via Cramer's rule. It's a one-line formula that underpins half the matrix topic — commit it to reflex memory.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "What's the inverse of $$\\begin{pmatrix} a & b \\\\ c & d \\end{pmatrix}$$, and what's the \"swap-and-negate\" memory trick? (2 steps)", "answer": "- Step 1: $$\\begin{pmatrix} a & b \\\\ c & d \\end{pmatrix}^{-1} = \\frac{1}{ad-bc}\\begin{pmatrix} d & -b \\\\ -c & a \\end{pmatrix}$$.\n- Step 2: The memory trick: **swap** the diagonal entries ($$a \\leftrightarrow d$$), **negate** the off-diagonal entries ($$b \\to -b$$, $$c \\to -c$$), then divide everything by $$ad - bc$$.\n\nThis is NOT in the formula booklet. The most common error: negating the diagonal entries instead of swapping them, or swapping the off-diagonals instead of negating them. Practice: for $$\\begin{pmatrix} 3 & -1 \\\\ 4 & -1 \\end{pmatrix}$$, the adjugate is $$\\begin{pmatrix} -1 & 1 \\\\ -4 & 3 \\end{pmatrix}$$ (swap 3↔−1, negate −1→1 and 4→−4).", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "Given a complex root $$\\alpha = p + qi$$ of a real polynomial, what's the real quadratic factor, and why does it work? (2 steps)", "answer": "- Step 1: The quadratic factor is $$z^2 - 2pz + (p^2 + q^2)$$, i.e., $$z^2 - 2\\operatorname{Re}(\\alpha)\\,z + |\\alpha|^2$$.\n- Step 2: Why it works: the conjugate $$\\bar{\\alpha} = p - qi$$ is also a root (since the polynomial has real coefficients). The factor $$(z - \\alpha)(z - \\bar{\\alpha})$$ expands to $$z^2 - (\\alpha + \\bar{\\alpha})z + \\alpha\\bar{\\alpha} = z^2 - 2pz + (p^2 + q^2)$$, which has all real coefficients.\n\nThis is NOT in the booklet. It's essential for Q2-style problems where you're given a complex root and must construct the real quadratic factor to find other roots.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "For $$ax^2 + bx + c = 0$$ with roots $$\\alpha, \\beta$$, what are Vieta's formulas, and what's the sign pitfall? (2 steps)", "answer": "- Step 1: $$\\alpha + \\beta = -\\frac{b}{a}$$ and $$\\alpha\\beta = \\frac{c}{a}$$.\n- Step 2: The sign pitfall: writing $$\\alpha + \\beta = \\frac{b}{a}$$ (missing the negative sign). The minus comes from the factorization $$a(x - \\alpha)(x - \\beta) = ax^2 - a(\\alpha+\\beta)x + a\\alpha\\beta$$, so comparing with $$ax^2 + bx + c$$ gives $$b = -a(\\alpha+\\beta)$$, hence $$\\alpha + \\beta = -b/a$$.\n\nNOT in the booklet. The negative sign in the sum formula is the single most common Vieta error.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "What's the identity for $$\\alpha^2 + \\beta^2$$ in terms of $$\\alpha + \\beta$$ and $$\\alpha\\beta$$, and why is it derived this way?", "answer": "$$\\alpha^2 + \\beta^2 = (\\alpha + \\beta)^2 - 2\\alpha\\beta$$.\n\nWhy derived this way: Vieta gives you $$\\alpha + \\beta$$ and $$\\alpha\\beta$$ directly. The identity expresses $$\\alpha^2 + \\beta^2$$ entirely in terms of these known quantities, avoiding the need to find $$\\alpha$$ and $$\\beta$$ individually. It comes from expanding $$(\\alpha + \\beta)^2 = \\alpha^2 + 2\\alpha\\beta + \\beta^2$$ and rearranging.\n\nNOT in the booklet. Essential for Q5-style problems where you need symmetric functions of roots but can't (or shouldn't) solve for the roots individually.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": false}, {"question": "What's the identity for $$\\alpha^3 + \\beta^3$$, and how does it extend the pattern from $$\\alpha^2 + \\beta^2$$?", "answer": "$$\\alpha^3 + \\beta^3 = (\\alpha + \\beta)^3 - 3\\alpha\\beta(\\alpha + \\beta)$$.\n\nThis extends the pattern: the sum of $$n$$th powers is expressed in terms of $$(\\alpha + \\beta)$$ and $$\\alpha\\beta$$. It comes from expanding $$(\\alpha + \\beta)^3 = \\alpha^3 + 3\\alpha^2\\beta + 3\\alpha\\beta^2 + \\beta^3 = \\alpha^3 + \\beta^3 + 3\\alpha\\beta(\\alpha + \\beta)$$, then rearranging.\n\nNOT in the booklet. The pattern: even powers use $$(\\alpha+\\beta)^2 - 2\\alpha\\beta$$; odd powers use $$(\\alpha+\\beta)^3 - 3\\alpha\\beta(\\alpha+\\beta)$$. The coefficients 2 and 3 come from the binomial expansion.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": false}, {"question": "What's the identity for $$\\frac{1}{\\alpha} + \\frac{1}{\\beta}$$, and what's the common algebraic error?", "answer": "$$\\frac{1}{\\alpha} + \\frac{1}{\\beta} = \\frac{\\alpha + \\beta}{\\alpha\\beta}$$.\n\nThe common error: writing this as $$\\frac{2}{\\alpha + \\beta}$$ or $$\\frac{1}{\\alpha + \\beta}$$, which would only be true if $$\\alpha = \\beta$$. The correct derivation: combine over a common denominator to get $$\\frac{\\beta + \\alpha}{\\alpha\\beta}$$, then substitute Vieta's formulas.\n\nNOT in the booklet. This is the building block for problems asking \"find a quadratic with roots $$1/\\alpha$$ and $$1/\\beta$$\" — the new sum is $$\\frac{\\alpha+\\beta}{\\alpha\\beta}$$ and the new product is $$\\frac{1}{\\alpha\\beta}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": false}, {"question": "What's the matrix for a stretch of scale factor $$k$$ parallel to the $$x$$-axis, and how do you remember which axis is affected? (2 steps)", "answer": "- Step 1: Stretch sf $$k$$ parallel to the $$x$$-axis: $$\\begin{pmatrix} k & 0 \\\\ 0 & 1 \\end{pmatrix}$$. The $$x$$-coordinates are multiplied by $$k$$; $$y$$-coordinates unchanged.\n- Step 2: Memory rule: \"parallel to the $$x$$-axis\" means the stretching happens **along** the $$x$$-direction, so $$k$$ goes in the $$(1,1)$$ entry. The **other** axis is unchanged (1 in the $$(2,2)$$ entry). Similarly, stretch parallel to $$y$$-axis: $$\\begin{pmatrix} 1 & 0 \\\\ 0 & k \\end{pmatrix}$$ — $$k$$ goes in the $$(2,2)$$ entry.\n\nCommon confusion: \"parallel to $$x$$-axis\" sounds like the $$x$$-axis stays fixed. It doesn't — the $$x$$-axis is the **direction** of stretching. Points move away from the $$y$$-axis.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": true}, {"question": "What's the matrix for an anticlockwise rotation by angle $$\\theta$$ about the origin, and what's the sign trick for remembering it?", "answer": "$$\\begin{pmatrix} \\cos\\theta & -\\sin\\theta \\\\ \\sin\\theta & \\cos\\theta \\end{pmatrix}$$.\n\nThe sign trick: the **negative sign is always on the sine in the first row**. Think of it as: $$\\cos\\theta$$ on the diagonal (both positive), and the off-diagonals are $$\\pm\\sin\\theta$$ with the minus sign \"up and right\" — i.e., position $$(1,2)$$.\n\nFor clockwise rotation, replace $$\\theta$$ with $$-\\theta$$: $$\\begin{pmatrix} \\cos\\theta & \\sin\\theta \\\\ -\\sin\\theta & \\cos\\theta \\end{pmatrix}$$ (the minus sign moves to position $$(2,1)$$).\n\nNOT in the booklet.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": false}, {"question": "What's the matrix for reflection in the line $$y = x\\tan\\theta$$, and what are the key features to check? (3 steps)", "answer": "- Step 1: $$\\begin{pmatrix} \\cos 2\\theta & \\sin 2\\theta \\\\ \\sin 2\\theta & -\\cos 2\\theta \\end{pmatrix}$$.\n- Step 2: Key features: the diagonal entries are $$\\cos 2\\theta$$ and $$-\\cos 2\\theta$$ (opposite signs), and the off-diagonal entries are **both** $$\\sin 2\\theta$$ (symmetric). The determinant is $$-\\cos^2 2\\theta - \\sin^2 2\\theta = -1$$, confirming it's a reflection.\n- Step 3: Special cases to verify: reflection in $$y = x$$ ($$\\theta = \\pi/4$$) gives $$\\begin{pmatrix} 0 & 1 \\\\ 1 & 0 \\end{pmatrix}$$ ✓. Reflection in the $$x$$-axis ($$\\theta = 0$$) gives $$\\begin{pmatrix} 1 & 0 \\\\ 0 & -1 \\end{pmatrix}$$ ✓.\n\nNOT in the booklet.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": false}, {"question": "What's the area scale factor under a linear transformation represented by matrix $$\\mathbf{M}$$, and why the absolute value?", "answer": "Area scale factor = $$|\\det \\mathbf{M}|$$.\n\nThe absolute value because: if $$\\det \\mathbf{M} < 0$$, the transformation reverses orientation (e.g., a reflection flips a shape), but the **area** is still positive. The determinant's magnitude gives the scaling; its sign gives the orientation change.\n\nFor example, a reflection has $$\\det = -1$$, so area scale factor = $$|-1| = 1$$ (areas are preserved, but orientation is reversed). A stretch by factor 2 parallel to the $$x$$-axis has $$\\det = 2$$, so areas double.\n\nNOT in the booklet.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": true}, {"question": "For a transformation described as \"first A, then B,\" what's the composite matrix, and what's the common ordering pitfall?", "answer": "\"First A, then B\" = $$\\mathbf{BA}$$ (B on the left, A on the right).\n\nThe pitfall: writing $$\\mathbf{AB}$$ instead. The rule is: **the rightmost matrix acts first** on the position vector. So $$\\mathbf{BA}\\mathbf{v}$$ means: first apply A to $$\\mathbf{v}$$, then apply B to the result. The composition reads right-to-left, like function composition $$f(g(x))$$.\n\nMemory aid: \"A then B\" means A happens first, so A sits closest to the input vector, i.e., on the right. The one that acts later sits on the left.\n\nNOT in the booklet.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": true}, {"question": "What's the linear interpolation formula for approximating a root between $$x_1$$ and $$x_2$$ where $$f$$ changes sign?", "answer": "$$\\alpha \\approx x_1 + \\frac{|f(x_1)|}{|f(x_1)| + |
