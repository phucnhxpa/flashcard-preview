<script>
const DATA={"selected": [{"question": "What's the area scale factor under a linear transformation represented by matrix $$\\mathbf{M}$$, and why the absolute value?", "answer": "Area scale factor = $$|\\det \\mathbf{M}|$$.\n\nThe absolute value because: if $$\\det \\mathbf{M} < 0$$, the transformation reverses orientation (e.g., a reflection flips a shape), but the **area** is still positive. The determinant's magnitude gives the scaling; its sign gives the orientation change.\n\nFor example, a reflection has $$\\det = -1$$, so area scale factor = $$|-1| = 1$$ (areas are preserved, but orientation is reversed). A stretch by factor 2 parallel to the $$x$$-axis has $$\\det = 2$$, so areas double.\n\nNOT in the booklet.", "source": "GLM 5.1 ③", "_id": "glm_3_35"}, {"question": "FP1 (exam strategy) — When a question on $$\\arg z$$, modulus, or $$\\sqrt{\\cdot}$$ produces multiple algebraic solutions, what's the universal discrimination question to ask?", "answer": "\"Does the geometric constraint reject any of these?\"\n\nSpecific checks:\n+ For $$\\arg z = \\theta$$: check sign of $$x$$ AND sign of $$y$$ against the quadrant of $$\\theta$$.\n+ For $$|z| = r$$: $$r$$ must be non-negative; reject candidates giving negative modulus.\n+ For $$\\sqrt{\\cdot}$$: the radicand must be non-negative; the principal square root is non-negative.\n+ For conics like $$y^2 = 4ax$$: $$a > 0$$ typically (focus on positive $$x$$-axis); reject sign-flipped candidates.\n\nThis is the \"discrimination of multiple algebraic candidates\" meta-skill. Every $$\\pm$$ or $$\\tan^{-1}$$ multivalued step requires this check.", "source": "Opus 4.7 ①", "_id": "opus_1_30"}, {"question": "Q10(ii) — In proving $$8^{2k+3} + 6^{2k+1}$$ is divisible by 7, you rewrite it as $$64 \\cdot 8^{2k+1} + 36 \\cdot 6^{2k-1}$$. What algebraic trick do you use next to introduce $$f(k) = 8^{2k+1} + 6^{2k-1}$$? (3 steps)", "answer": "- Step 1: You want to express $$f(k+1)$$ in terms of $$f(k)$$. The first term already has the correct base and index, multiplied by 64. The second term has the correct index but is multiplied by 36 instead of 1.\n- Step 2: The trick is to rewrite the coefficient 36 as a difference that includes 64. Specifically, $$36 = 64 - 28$$.\n- Step 3: Substitute this back: $$f(k+1) = 64 \\cdot 8^{2k+1} + (64 - 28) \\cdot 6^{2k-1} = 64(8^{2k+1} + 6^{2k-1}) - 28 \\cdot 6^{2k-1}$$. Now the first bracket is exactly $$f(k)$$, and the second term has 28 as a factor, which is $$7 \\times 4$$.\n\nWhen coefficients don't match, rewrite the \"wrong\" coefficient as \"target coefficient - multiple of the divisor\".", "source": "GLM 5.1 ②", "_id": "glm_2_12"}, {"question": "What are the three meta-skills that the FP1 Jan 2024 paper rewards, and how do they manifest? (3 steps)", "answer": "- Step 1: **Formula-booklet awareness** — knowing which formulas are IN the booklet (so don't memorise them) and which are NOT (so you must). Q1 (det/inverse), Q4 (rotation/stretch matrices), and Q8 (knowing $$\\sum r^3$$ IS in the booklet) all hinge on this.\n- Step 2: **Structural discipline** — writing every required line, in the right order, with the right notation. Q2's cubic root count, Q4's composition order ($$\\mathbf{BA}$$ not $$\\mathbf{AB}$$), Q8's $$S(2n) - S(n-1)$$ off-by-one, and Q10's induction skeleton are all \"lose marks if you skip a line\" moments.\n- Step 3: **Discrimination of multiple algebraic candidates** — whenever an equation produces multiple solutions, checking which ones satisfy geometric/physical constraints. Q9 (which $$\\lambda$$ gives $$\\arg = \\pi/4$$?) and Q5 (sign of $$\\alpha + \\beta$$) demand checking sign and quadrant before committing.\n\nThe bottleneck isn't technique mastery — it's technique **reliability**: converting \"I know how\" into \"I do it in 4 minutes without errors.\"", "source": "GLM 5.1 ③", "_id": "glm_3_41"}, {"question": "FP1 Jan 2024 Q9(b) — Given $$\\arg z = \\frac{\\pi}{4}$$, what two conditions must simultaneously hold, and why is the second condition often forgotten?", "answer": "$$\\arg z = \\frac{\\pi}{4}$$ means: (1) $$y = x$$ (the point lies on the line $$y = x$$), **AND** (2) $$x > 0$$ (the point is in the first quadrant, not the third).\n\nThe second condition is forgotten because students equate $$\\arg z = \\frac{\\pi}{4}$$ with $$\\tan(\\arg z) = 1$$, i.e., $$y/x = 1$$. But $$y/x = 1$$ is satisfied by **any** point on the line $$y = x$$, including points in the third quadrant where both $$x < 0$$ and $$y < 0$$. There, $$\\arg z = -\\frac{3\\pi}{4}$$, not $$\\frac{\\pi}{4}$$.\n\nThe tangent function has period $$\\pi$$, so $$\\tan^{-1}(1)$$ has two solutions per $$2\\pi$$ cycle. You must check quadrant to pick the right one.", "source": "GLM 5.1 ③", "_id": "glm_3_11"}, {"question": "FP1 numerical methods — What's the Newton-Raphson iteration formula, and what's the geometric intuition?", "answer": "$$x_{n+1} = x_n - \\dfrac{f(x_n)}{f'(x_n)}$$.\n\nGeometric intuition: draw the tangent line to $$y = f(x)$$ at $$x = x_n$$. This tangent crosses the $$x$$-axis at some point $$x_{n+1}$$. If $$f$$ is reasonably smooth and we're near a root, the tangent's $$x$$-intercept is a better approximation than $$x_n$$.\n\nDerivation: tangent line is $$y - f(x_n) = f'(x_n)(x - x_n)$$. Set $$y = 0$$: $$x = x_n - \\tfrac{f(x_n)}{f'(x_n)}$$.\n\nFailure modes: $$f'(x_n) = 0$$ (tangent is horizontal, no intercept); near-inflection points (oscillation); far from the root (may diverge).", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "What is the mnemonic or check to remember the correct composition order for matrix transformations, and what happens if you get it wrong? (1 step)", "answer": "- Mnemonic: \"A then B = BA\" — the rightmost matrix acts first\n- For transformations: if you apply A first, then B, the combined matrix is BA\n- If you compute AB instead, you apply B first, then A — the opposite of what the question asks\n- Example: Q4 likely tested \"reflection THEN rotation\" which requires $\\mathbf{R} \\cdot \\mathbf{M}$ not $\\mathbf{M} \\cdot \\mathbf{R}$\n\n**Takeaway:** The order matters and is non-commutative — always write the transformation matrices in the order they are applied, reading right-to-left.", "source": "MiniMax ①", "_id": "minimax_1_15"}, {"question": "What's the linear interpolation formula for estimating a root $$\\alpha$$ between $$x_1$$ and $$x_2$$ (with $$f(x_1)$$ and $$f(x_2)$$ of opposite signs)?", "answer": "$$\\alpha \\approx x_1 + \\dfrac{|f(x_1)|}{|f(x_1)| + |f(x_2)|}(x_2 - x_1)$$. Intuition: the fraction weights how far $$\\alpha$$ is from $$x_1$$ proportional to how far $$f(x_1)$$ is from zero, relative to total drop. This is NOT in the formula booklet.", "source": "Opus 4.7 ②", "_id": "opus_2_26"}, {"question": "FP1 (general) — What's the relationship between the degree of a real polynomial and the number of complex roots, and what's the trap with cubics specifically?", "answer": "A real polynomial of degree $$n$$ has EXACTLY $$n$$ roots in $$\\mathbb{C}$$ (counted with multiplicity). Complex (non-real) roots come in CONJUGATE PAIRS for real polynomials.\n\nThe cubic trap: students sometimes assume \"complex roots → 4 roots\" because most exam problems with conjugate pairs are quartics. But a CUBIC has exactly 3 roots. If one is non-real, then the conjugate is another root, giving 2 complex + 1 real (the real one is forced because 3 - 2 = 1).\n\nMnemonic: \"degree = number of roots\". For a cubic with a complex root $$\\alpha$$: roots are $$\\alpha, \\bar\\alpha$$, and one real root determined by Vieta's.", "source": "Opus 4.7 ①", "_id": "opus_1_20"}, {"question": "FP1 Jan 2024 — For a cubic polynomial with real coefficients and one complex root $$\\alpha$$, how many roots does the cubic have in total, and why?", "answer": "Three roots in total (counting multiplicity).\n\nThe key: if $$\\alpha$$ is a root, then so is $$\\bar{\\alpha}$$ (the complex conjugate), because the polynomial has real coefficients. That's two roots. Since the polynomial is degree 3, there must be a **third root**, which must be real (because if it were complex, its conjugate would also be a root, giving four roots for a cubic — contradiction).\n\nCommon pitfall: assuming a cubic with a complex root has only that one complex root plus one real root (two roots total). You must count the conjugate. Degree = number of roots (fundamental theorem of algebra).", "source": "GLM 5.1 ③", "_id": "glm_3_45"}, {"question": "FP1 Jan 2024 Q8(b) — The question asks for $$\\sum_{r=n}^{2n}$$. What is the off-by-one trap on the lower limit, and what is the correct subtraction formula? (2 steps)", "answer": "- Step 1: The standard identity is $$\\sum_{r=a}^{b} f(r) = S(b) - S(a-1)$$ where $$S(N) = \\sum_{r=1}^{N} f(r)$$. The $$-1$$ is because we must STOP $$S$$ just before $$r=a$$ so the $$r=a$$ term is INCLUDED in the difference.\n- Step 2: For $$\\sum_{r=n}^{2n}$$, use $$S(2n) - S(n-1)$$ — NOT $$S(2n) - S(n)$$. Using $$S(n)$$ would exclude the $$r=n$$ term.\n\nMnemonic: \"the floor is one BELOW the start\". Whenever the lower limit is a variable like $$n$$, write it down as $$S(2n) - S(n-1)$$ before substituting.", "source": "Opus 4.7 ①", "_id": "opus_1_2"}, {"question": "FP1 matrices — What's the determinant and inverse of a $$2\\times 2$$ matrix, and why must you memorise these?", "answer": "$$\\det\\begin{pmatrix}a&b\\\\c&d\\end{pmatrix} = ad - bc$$ and $$\\begin{pmatrix}a&b\\\\c&d\\end{pmatrix}^{-1} = \\dfrac{1}{ad-bc}\\begin{pmatrix}d&-b\\\\-c&a\\end{pmatrix}$$.\n\nWhy memorise: these are NOT in the FP1 formula booklet. Wasting exam time deriving them from $$\\mathbf{M}\\mathbf{M}^{-1} = \\mathbf{I}$$ costs minutes you don't have.\n\nMemory aid for inverse: \"swap the diagonal, negate the off-diagonal, divide by det\". Order is $$d, -b, -c, a$$ — the main-diagonal entries swap places, the off-diagonal entries flip sign.", "source": "Opus 4.7 ①", "_id": "opus_1_22"}, {"question": "FP1 Jan 2024 — What's the \"formula booklet awareness\" strategy, and how do you partition your memorisation effort?", "answer": "Partition your effort into two categories:\n\n**IN the booklet** (spend ZERO memorisation time): $$\\sum r$$, $$\\sum r^2$$, $$\\sum r^3$$, Newton–Raphson, parabola/hyperbola/ellipse parametric forms. Know these exist and where to find them, but don't drill them.\n\n**NOT in the booklet** (spend ALL memorisation time): $$\\det$$, matrix inverse, conjugate-pair quadratic factor, Vieta's, $$\\alpha^2 + \\beta^2$$ identity, stretch/rotation/reflection matrices, area scale factor = $$|\\det|$$, composition order \"A then B\" = $$\\mathbf{BA}$$, linear interpolation formula.\n\nThe technique (split-and-factor, $$S(b) - S(a-1)$$, rationalization, induction skeleton) is also NOT in the booklet — these must be rehearsed through practice.", "source": "GLM 5.1 ③", "_id": "glm_3_64"}, {"question": "Why must you multiply by the conjugate $$\\lambda + 4i$$ (not $$\\lambda - 4i$$ or $$4i$$) to separate real/imaginary parts of a complex fraction?", "answer": "Only the conjugate produces a real denominator: $$(\\lambda - 4i)(\\lambda + 4i) = \\lambda^2 + 16$$, by the difference-of-squares identity with $$i^2 = -1$$. Any other multiplier leaves an $$i$$ term in the denominator, defeating the purpose of separating $$x + yi$$.", "source": "Opus 4.7 ②", "_id": "opus_2_6"}, {"question": "FP1 Jan 2024 Q10 — In the induction hypothesis, what phrase must you include, and what's the pitfall of omitting it?", "answer": "You must write: \"Assume $$P(k)$$ is true **for some** $$k \\in \\mathbb{Z}^+$$.\"\n\nThe pitfall: writing \"Assume $$P(k)$$ is true for **all** $$k$$\" — that's circular reasoning. If $$P(k)$$ is true for all $$k$$, then there's nothing left to prove! The hypothesis is that $$P(k)$$ holds for **one particular but unspecified** positive integer $$k$$, and you then show this implies $$P(k+1)$$.\n\nThe word \"some\" (or \"a particular\") is critical. You're not assuming the conclusion; you're assuming the proposition holds at one specific point and deducing it holds at the next.", "source": "GLM 5.1 ③", "_id": "glm_3_24"}, {"question": "FP1 numerical methods — What's the linear interpolation formula for estimating a root between $$x_1$$ and $$x_2$$ where $$f$$ changes sign, and how do you remember which absolute value goes in the numerator?", "answer": "$$\\alpha \\approx x_1 + \\dfrac{|f(x_1)|}{|f(x_1)| + |f(x_2)|}(x_2 - x_1)$$.\n\nIntuition: the root lies between $$x_1$$ and $$x_2$$. The weight in the numerator is the \"distance in $$f$$\" from $$x_1$$. A LARGE $$|f(x_1)|$$ means $$x_1$$ is far from the root, so we move further from $$x_1$$ — hence $$|f(x_1)|$$ in the numerator pushes us toward $$x_2$$.\n\nSanity check: if $$|f(x_1)| = |f(x_2)|$$, the formula gives the midpoint — correct by symmetry.", "source": "Opus 4.7 ①", "_id": "opus_1_28"}, {"question": "FP1 Jan 2024 Q9(b) — The condition $$\\arg z = \\tfrac{\\pi}{4}$$ produces $$y = x$$. Why is this NOT a complete characterisation, and what extra constraint must you impose?", "answer": "$$y = x$$ alone is the locus $$\\tan(\\arg z) = 1$$, which has TWO solutions per period of $$\\tan$$: $$\\arg z = \\tfrac{\\pi}{4}$$ (first quadrant, $$x>0, y>0$$) OR $$\\arg z = -\\tfrac{3\\pi}{4}$$ (third quadrant, $$x<0, y<0$$).\n\nTo pin down $$\\arg z = \\tfrac{\\pi}{4}$$ specifically, you must add: $$x > 0$$ AND $$y > 0$$ (first quadrant).\n\nWhy this is a discrimination mark: the algebraic equation $$y = x$$ will produce candidate values of $$\\lambda$$, but you must REJECT any value that puts $$z$$ in the third quadrant. Phuc's pattern of losing this kind of mark is the \"$$\\tan$$-period blindness\".", "source": "Opus 4.7 ①", "_id": "opus_1_9"}, {"question": "What's the matrix for a stretch of scale factor $$k$$ parallel to the $$x$$-axis, and how do you remember which axis is affected? (2 steps)", "answer": "- Step 1: Stretch sf $$k$$ parallel to the $$x$$-axis: $$\\begin{pmatrix} k & 0 \\\\ 0 & 1 \\end{pmatrix}$$. The $$x$$-coordinates are multiplied by $$k$$; $$y$$-coordinates unchanged.\n- Step 2: Memory rule: \"parallel to the $$x$$-axis\" means the stretching happens **along** the $$x$$-direction, so $$k$$ goes in the $$(1,1)$$ entry. The **other** axis is unchanged (1 in the $$(2,2)$$ entry). Similarly, stretch parallel to $$y$$-axis: $$\\begin{pmatrix} 1 & 0 \\\\ 0 & k \\end{pmatrix}$$ — $$k$$ goes in the $$(2,2)$$ entry.\n\nCommon confusion: \"parallel to $$x$$-axis\" sounds like the $$x$$-axis stays fixed. It doesn't — the $$x$$-axis is the **direction** of stretching. Points move away from the $$y$$-axis.", "source": "GLM 5.1 ③", "_id": "glm_3_32"}, {"question": "What is the rough time allocation per mark in a 75-mark, 90-minute Edexcel FP1 exam, and how should you apply this? (3 steps)", "answer": "- Step 1: 90 minutes / 75 marks = 1.2 minutes per mark (roughly 1 minute per mark, with a small buffer).\n- Step 2: A 5-mark question deserves about 6 minutes. A 10-mark question deserves about 12 minutes.\n- Step 3: If you are spending significantly more time than the marks warrant on a question (e.g., 10 minutes on a 4-mark part), you are likely on the wrong track or stuck in an algebraic hole. Move on to the next question and come back later.\n\n~1.2 min/mark. If you're over time, MOVE ON.", "source": "GLM 5.1 ②", "_id": "glm_2_32"}, {"question": "For a parabola $$y^2 = 4ax$$ with parametric point $$P(at^2, 2at)$$, why should you use the parametric form for ANOTHER point $$Q$$ on the curve, not re-derive in $$(x,y)$$?", "answer": "- Step 1: Using parametric $$Q(as^2, 2as)$$ keeps all algebra in terms of two parameters $$t, s$$, which collapse cleanly under tangent/normal/chord conditions.\n- Step 2: Re-deriving with $$Q = (x_2, y_2)$$ and $$y_2^2 = 4ax_2$$ creates a constrained algebraic system that's much messier.\n- Step 3: The parametric form encodes the curve constraint automatically — you never have to enforce $$y^2 = 4ax$$ as a separate equation.", "source": "Opus 4.7 ②", "_id": "opus_2_24"}, {"question": "FP1 Jan 2024 — What does it mean for the principal argument to live in $$(-\\pi, \\pi]$$, and what's the edge case at the boundary?", "answer": "The principal argument $$\\arg z$$ is the unique angle in the interval $$(-\\pi, \\pi]$$ such that $$z = |z|(\\cos(\\arg z) + i\\sin(\\arg z))$$.\n\nThe interval is **half-open**: it includes $$\\pi$$ but excludes $$-\\pi$$. This is because $$\\pi$$ and $$-\\pi$$ represent the same direction (the negative real axis), and we must choose one. By convention, $$\\arg z = \\pi$$ for points on the negative real axis (not $$-\\pi$$).\n\nPractical implication: when checking quadrant constraints, a point on the negative real axis has $$\\arg z = \\pi$$, not $$-\\pi$$. A point just below the negative real axis (in Q3) has $$\\arg z$$ slightly greater than $$-\\pi$$, like $$-\\pi + \\epsilon$$.", "source": "GLM 5.1 ③", "_id": "glm_3_60"}, {"question": "FP1 matrices — What's the matrix for an anticlockwise rotation by angle $$\\theta$$ about the origin, and how do you remember the sign pattern?", "answer": "$$\\begin{pmatrix}\\cos\\theta & -\\sin\\theta \\\\ \\sin\\theta & \\cos\\theta\\end{pmatrix}$$.\n\nMemory anchor: check on $$\\theta = 90°$$ anticlockwise. This should send $$(1, 0) \\to (0, 1)$$. The first column of the matrix IS the image of $$(1, 0)$$, which should be $$(0, 1) = (\\cos 90°, \\sin 90°)$$. So the first column is $$(\\cos\\theta, \\sin\\theta)$$, putting $$-\\sin\\theta$$ in the top-right.\n\nClockwise rotation: replace $$\\theta$$ with $$-\\theta$$, giving $$\\begin{pmatrix}\\cos\\theta & \\sin\\theta \\\\ -\\sin\\theta & \\cos\\theta\\end{pmatrix}$$ (sign of $$\\sin$$ flips).", "source": "Opus 4.7 ①", "_id": "opus_1_24"}, {"question": "FP1 Jan 2024 Q10(i) — When showing $$\\mathbf{M}^{k+1}$$ matches the proposition for $$n=k+1$$, what algebraic rewriting must each entry undergo? (2 steps)", "answer": "- Step 1: Compute the matrix product entry-by-entry, obtaining expressions in $$k$$ (e.g. $$2k+3$$, $$-(k+1)$$, $$4k+4$$, $$-2k-1$$).\n- Step 2: Rewrite each expression in terms of $$k+1$$ to MATCH the proposition's form:\n+ $$2k+3 = 2(k+1) + 1$$\n+ $$-(k+1) = -(k+1)$$\n+ $$4k+4 = 4(k+1)$$\n+ $$-2k - 1 = 1 - 2(k+1)$$\n\nThe final matrix must look like the proposition with $$n$$ replaced by $$k+1$$, not merely \"an equivalent form\". Examiners want to see the substitution $$n \\mapsto k+1$$ visibly performed.", "source": "Opus 4.7 ①", "_id": "opus_1_15"}, {"question": "FP1 Jan 2024 Q8 — After substituting the standard sum formulas into $$2\\sum r^3 + 3\\sum r^2 + \\sum r$$, you get $$\\frac{1}{2}n^2(n+1)^2 + \\frac{1}{2}n(n+1)(2n+1) + \\frac{1}{2}n(n+1)$$. What's the trick that keeps the algebra clean? (3 steps)", "answer": "- Step 1: **Factor out** $$\\frac{1}{2}n(n+1)$$ from every term immediately. Every standard sum formula has $$n(n+1)$$ as a factor (or $$n^2(n+1)^2$$ which is $$n(n+1) \\cdot n(n+1)$$).\n- Step 2: This leaves a bracket: $$\\frac{1}{2}n(n+1)\\big[n(n+1) + (2n+1) + 1\\big]$$.\n- Step 3: Simplify the bracket: $$n^2 + n + 2n + 1 + 1 = n^2 + 3n + 2 = (n+1)(n+2)$$.\n\nWithout factoring early, you'd be expanding three separate terms and then trying to recombine — a mess that breeds sign errors. Factoring first collapses everything into one clean bracket.", "source": "GLM 5.1 ③", "_id": "glm_3_2"}, {"question": "FP1 Jan 2024 — In divisibility induction, what's the wrong approach of \"subtracting $$f(k)$$ from $$f(k+1)$$,\" and why is it incomplete without the hypothesis?", "answer": "The approach: compute $$f(k+1) - f(k)$$ and show it's divisible by 7. This is **incomplete** on its own because showing the **difference** is divisible by 7 doesn't prove $$f(k+1)$$ is divisible by 7 — unless you also use the hypothesis that $$f(k)$$ is divisible by 7.\n\nThe correct logic: $$f(k+1) = f(k+1) - f(k) + f(k)$$. If both $$f(k+1) - f(k)$$ and $$f(k)$$ are divisible by 7, then $$f(k+1)$$ is divisible by 7. You must explicitly invoke the hypothesis.\n\nThe cleaner approach: express $$f(k+1) = A \\cdot f(k) + 7 \\cdot (\\text{integer})$$, which makes the use of the hypothesis transparent and earns the structure marks directly.", "source": "GLM 5.1 ③", "_id": "glm_3_59"}, {"question": "The phrase \"transformation A followed by transformation B\" is represented by which matrix product, and why does the order appear reversed? (2 steps)", "answer": "- Step 1: The composite matrix is $$\\mathbf{BA}$$, with $$\\mathbf{B}$$ on the left and $$\\mathbf{A}$$ on the right.\n- Step 2: When a column vector $$\\mathbf{v}$$ is transformed, the first map acts as $$\\mathbf{A}\\mathbf{v}$$; the second map then acts as $$\\mathbf{B}(\\mathbf{A}\\mathbf{v}) = (\\mathbf{BA})\\mathbf{v}$$. The rightmost matrix is adjacent to the vector and therefore acts first.", "source": "Kimi K2.6 ②", "_id": "kimi_2_23"}, {"question": "Q10(ii) — In the divisibility proof for $$f(n) = 8^{2n+1} + 6^{2n-1}$$, what's the key algebraic trick for the inductive step? (3 steps)", "answer": "- Step 1: Write $$f(k+1) = 8^{2k+3} + 6^{2k+1} = 64 \\cdot 8^{2k+1} + 36 \\cdot 6^{2k-1}$$. The coefficients 64 and 36 come from $$8^2$$ and $$6^2$$ respectively (increasing each exponent by 2).\n- Step 2: **Split** 36 as $$64 - 28$$, so $$f(k+1) = 64 \\cdot 8^{2k+1} + (64-28)\\cdot 6^{2k-1} = 64(8^{2k+1} + 6^{2k-1}) - 28 \\cdot 6^{2k-1} = 64\\,f(k) - 28 \\cdot 6^{2k-1}$$.\n- Step 3: Since $$f(k) = 7m$$ by hypothesis, and $$28 = 7 \\times 4$$, we get $$f(k+1) = 7(64m - 4\\cdot 6^{2k-1})$$, which is divisible by 7.\n\nThe trick is choosing to split 36 as $$64 - 28$$ so that the $$64$$ factors out with $$f(k)$$, and the remainder is a multiple of 7.", "source": "GLM 5.1 ①", "_id": "glm_1_19"}, {"question": "FP1 Jan 2024 Q10(ii) — Why split 36 as $$64 - 28$$ specifically? What's the motivation, and what would go wrong with other splits?", "answer": "The motivation: you need the coefficient of $$6^{2k-1}$$ to match the coefficient of $$8^{2k+1}$$ so you can **factor out** $$f(k) = 8^{2k+1} + 6^{2k-1}$$. The coefficient of $$8^{2k+1}$$ in $$f(k+1)$$ is 64 (= $$8^2$$), so you want 36 to also contain 64 as a component.\n\nWriting $$36 = 64 - 28$$ gives: $$f(k+1) = 64 \\cdot f(k) - 28 \\cdot 6^{2k-1} = 64 \\cdot f(k) - 7 \\cdot (4 \\cdot 6^{2k-1})$$. Both terms are divisible by 7 (the first by hypothesis, the second explicitly).\n\nIf you split differently, say $$36 = 7 + 29$$, you'd get $$7 \\cdot 6^{2k-1} + 29 \\cdot 6^{2k-1}$$. The 7 part works, but the 29 part doesn't combine with the $$8^{2k+1}$$ term to form $$f(k)$$ — you lose the clean factorization.", "source": "GLM 5.1 ③", "_id": "glm_3_20"}, {"question": "FP1 (general) — What's the conjugate-of-denominator rationalisation rule, and when does it apply versus not apply?", "answer": "Rule: to simplify $$\\tfrac{\\text{complex}}{\\text{complex}}$$, multiply top and bottom by the CONJUGATE of the denominator. This makes the denominator real because $$(a+bi)(a-bi) = a^2 + b^2 \\in \\mathbb{R}^{\\geq 0}$$.\n\nApplies: any fraction with a complex denominator.\n\nDoes NOT apply: if the denominator is ALREADY real (e.g. $$\\tfrac{a+bi}{3}$$ — just divide). Multiplying by the \"conjugate\" of a real number (itself) wastes time.\n\nEdge case: if the denominator is purely imaginary ($$bi$$), the conjugate is $$-bi$$. Multiplying gives $$b^2 > 0$$ in the denominator — same principle, real result.", "source": "Opus 4.7 ①", "_id": "opus_1_36"}, {"question": "FP1 Jan 2024 — When a conic question gives you a parametric point $$P$$, what's the strategic principle for handling the other point $$Q$$?", "answer": "**Always use the parametric form for both $$P$$ and $$Q$$**. If $$P$$ is given as $$(at_1^2, 2at_1)$$, express $$Q$$ as $$(at_2^2, 2at_2)$$ using a different parameter $$t_2$$.\n\nWhy: the parametric form reduces the problem to algebra in one variable ($$t$$) per point, rather than two variables ($$x, y$$). When you substitute into the conic equation, the parametric form is automatically satisfied (no need to check $$y^2 = 4ax$$), and tangent/normal equations become linear in $$t$$ instead of quadratic in $$x$$.\n\nThe pitfall: converting $$P$$ to Cartesian and then trying to find $$Q$$ in Cartesian. This produces $$y^2 = 4ax$$ substitutions that yield brutal quadratics. Stay parametric throughout.", "source": "GLM 5.1 ③", "_id": "glm_3_62"}, {"question": "For the quadratic $$ax^2 + bx + c = 0$$ with roots $$\\alpha$$ and $$\\beta$$, what are Vieta's formulas? Why are they NOT just \"the quadratic formula backwards\"? (2 steps)", "answer": "- Step 1: $$\\alpha + \\beta = -\\frac{b}{a}$$ and $$\\alpha\\beta = \\frac{c}{a}$$. Note the signs: the sum has a **negative** sign because $$(x-\\alpha)(x-\\beta) = x^2 - (\\alpha+\\beta)x + \\alpha\\beta$$, and comparing with $$ax^2+bx+c$$ gives $$-a(\\alpha+\\beta) = b$$.\n- Step 2: They're deeper than \"quadratic formula backwards\" — they express symmetric functions of the roots directly in terms of coefficients, WITHOUT needing to find the roots. This lets you compute $$\\alpha^2+\\beta^2$$, $$\\alpha^3+\\beta^3$$, etc. from coefficients alone.\n\nThese are NOT in the booklet. Memorise both.", "source": "GLM 5.1 ①", "_id": "glm_1_27"}, {"question": "FP1 Jan 2024 — What's the quick mental check for whether a factorization like $$(3n+1)(5n+4)$$ is correct?", "answer": "Multiply back and check three things:\n1. **First terms**: $$3n \\times 5n = 15n^2$$ ✓ (matches leading coefficient × $$n^2$$)\n2. **Last terms**: $$1 \\times 4 = 4$$ ✓ (matches constant term)\n3. **Cross terms**: $$3n \\times 4 + 5n \\times 1 = 12n + 5n = 17n$$ ✓ (matches middle coefficient × $$n$$)\n\nIf all three check out, the factorization is correct. The common mis-factoring $$(5n+1)(3n+4)$$ gives cross terms $$5n \\times 4 + 3n \\times 1 = 23n \\neq 17n$$ — caught immediately by the cross-term check.", "source": "GLM 5.1 ③", "_id": "glm_3_61"}, {"question": "FP1 Jan 2024 — What's the general strategy for \"show that\" questions where the answer is given, and why can't you work backwards?", "answer": "The strategy: start from the LHS (or a known starting point) and derive the RHS step by step, showing all working.\n\nYou cannot work backwards (starting from the given answer and manipulating it) because: (a) the marks are for the **forward derivation**, and (b) working backwards can hide logical errors — you might perform a step that's irreversible (like squaring both sides), which doesn't prove the original statement.\n\nException: you CAN work backwards on scratch paper to figure out the approach, but your written solution must flow forward. The examiner needs to see: \"starting from X, by doing Y, I arrive at Z.\"", "source": "GLM 5.1 ③", "_id": "glm_3_66"}, {"question": "FP1 Jan 2024 Q8 — Why is the \"$$\\sum r^3$$ is in the booklet\" fact strategically important to know?", "answer": "It frees up exam-time mental bandwidth. The booklet provides:\n- $$\\sum r = \\tfrac{1}{2}n(n+1)$$\n- $$\\sum r^2 = \\tfrac{1}{6}n(n+1)(2n+1)$$\n- $$\\sum r^3 = \\tfrac{1}{4}n^2(n+1)^2$$\n\nWhat's NOT given: the SKILLS — splitting products, factoring, off-by-one limit subtraction, factor-finding via discriminant.\n\nStrategic implication: don't waste rehearsal time memorising the three formulas (you can look them up in 5 seconds). DO rehearse the techniques. Phuc's note \"i've to memorize this one\" is half-wrong — memorise the technique, not the formula.", "source": "Opus 4.7 ①", "_id": "opus_1_35"}, {"question": "FP1 matrices — What's the geometric meaning of $$|\\det \\mathbf{M}|$$ for a linear transformation?", "answer": "$$|\\det \\mathbf{M}|$$ is the AREA SCALE FACTOR. A region of area $$A$$ before the transformation maps to a region of area $$|\\det\\mathbf{M}|\\cdot A$$.\n\nAdditional info from the sign:\n- $$\\det\\mathbf{M} > 0$$: orientation preserved (rotation, stretch).\n- $$\\det\\mathbf{M} < 0$$: orientation reversed (reflection).\n- $$\\det\\mathbf{M} = 0$$: transformation is singular — collapses to a line or point, no inverse exists.\n\nWhy $$|\\cdot|$$: area is always positive; the sign tracks orientation, not magnitude.", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "FP1 matrices — For the composition \"transformation $$\\mathbf{A}$$ then transformation $$\\mathbf{B}$$\", which matrix product represents the combined transformation, and why?", "answer": "The combined matrix is $$\\mathbf{B}\\mathbf{A}$$, NOT $$\\mathbf{A}\\mathbf{B}$$.\n\nReason: matrices act on column vectors from the LEFT. So a vector $$\\mathbf{v}$$ is first acted on by $$\\mathbf{A}$$: $$\\mathbf{A}\\mathbf{v}$$. Then $$\\mathbf{B}$$ acts on that: $$\\mathbf{B}(\\mathbf{A}\\mathbf{v}) = (\\mathbf{B}\\mathbf{A})\\mathbf{v}$$. The matrix that acts first is written CLOSEST to $$\\mathbf{v}$$ (rightmost).\n\nMnemonic: \"rightmost first\". Read composition right-to-left, like function composition $$(f \\circ g)(x) = f(g(x))$$ — $$g$$ acts first.", "source": "Opus 4.7 ①", "_id": "opus_1_23"}, {"question": "FP1 Jan 2024 Q9 — Why does the principal argument live in $$(-\\pi, \\pi]$$, and what's the name for the third-quadrant case where $$y=x$$?", "answer": "Principal argument convention: $$\\arg z \\in (-\\pi, \\pi]$$. This makes the argument single-valued and consistent with the standard branch of the complex logarithm.\n\nFor a point in the third quadrant on the line $$y=x$$ (e.g. $$z = -1 - i$$), the angle measured from positive $$x$$-axis is $$\\tfrac{5\\pi}{4}$$ going anticlockwise, but in principal form we subtract $$2\\pi$$: $$\\arg z = -\\tfrac{3\\pi}{4}$$.\n\nCommon mistake: writing $$\\arg z = \\tfrac{5\\pi}{4}$$ in a final answer — that's outside the principal range. Always reduce to $$(-\\pi, \\pi]$$.", "source": "Opus 4.7 ①", "_id": "opus_1_11"}, {"question": "FP1 Jan 2024 Q10(ii) — Walk through the splitting trick to express $$f(k+1) = 8^{2k+3} + 6^{2k+1}$$ in terms of $$f(k) = 8^{2k+1} + 6^{2k-1}$$. (3 steps)", "answer": "- Step 1: Use index laws: $$8^{2k+3} = 64 \\cdot 8^{2k+1}$$ and $$6^{2k+1} = 36 \\cdot 6^{2k-1}$$.\n- Step 2: To create the combination $$8^{2k+1} + 6^{2k-1}$$ (which is $$f(k)$$), we want matching coefficients. Split $$36 = 64 - 28$$ so the $$6^{2k-1}$$ term shares the coefficient 64 with the $$8^{2k+1}$$ term: $$f(k+1) = 64\\cdot 8^{2k+1} + 64\\cdot 6^{2k-1} - 28\\cdot 6^{2k-1} = 64\\,f(k) - 28\\cdot 6^{2k-1}$$.\n- Step 3: Factor out 7: $$f(k+1) = 7\\big(64m - 4\\cdot 6^{2k-1}\\big)$$ where $$f(k) = 7m$$. The bracket is an integer, so $$7 \\mid f(k+1)$$.\n\nWhy split $$36$$ and not $$64$$: we choose the SMALLER coefficient to split, so the leftover $$28 = 4\\cdot 7$$ conveniently contains a factor of 7.", "source": "Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "FP1 Jan 2024 Q8(b) — Why must you subtract $$S(n-1)$$ and NOT $$S(n)$$ when computing $$\\sum_{r=n}^{2n}$$?", "answer": "Because the lower limit $$r = n$$ is **included** in the sum. If you subtracted $$S(n)$$, you'd be removing all terms from $$r = 1$$ through $$r = n$$ — but the term at $$r = n$$ belongs in your answer.\n\n$$S(n) = \\sum_{r=1}^{n}$$ removes one term too many. $$S(n-1) = \\sum_{r=1}^{n-1}$$ removes exactly the terms before $$r = n$$.\n\nThe mnemonic: the subscript on $$S$$ is always **one less** than the lower limit of your restricted sum.", "source": "GLM 5.1 ③", "_id": "glm_3_4"}, {"question": "FP1 Jan 2024 — What's the relationship between the sign of the discriminant and the nature of the roots, and how does this apply to \"show that\" positivity questions?", "answer": "For $$ax^2 + bx + c$$:\n+ $$b^2 - 4ac > 0$$: two distinct real roots (the quadratic crosses zero).\n+ $$b^2 - 4ac = 0$$: one repeated real root (the quadratic touches zero).\n+ $$b^2 - 4ac < 0$$: no real roots (the quadratic never crosses zero).\n\nFor \"show that $$ak^2 + bk + c > 0$$ for all $$k$$\": you need the quadratic to never cross zero AND open upward. So: $$a > 0$$ AND $$b^2 - 4ac < 0$$. The discriminant condition ensures no real roots; the sign of $$a$$ ensures the parabola is above the $$k$$-axis (not below it).", "source": "GLM 5.1 ③", "_id": "glm_3_57"}, {"question": "FP1 Jan 2024 Q10 — What's the pitfall of skipping the base case in induction, and why can't you argue \"it's obvious\"?", "answer": "The base case is the **anchor** of the entire inductive chain. Without it, you've proved \"if $$P(k)$$ is true then $$P(k+1)$$ is true\" — but this is a **vacuously true** statement if $$P(k)$$ is never true for any starting value. It's like proving \"if I'm a billionaire, then I can buy a yacht\" — logically valid, but useless if the hypothesis never holds.\n\nEdexcel awards a specific mark for the base case. Skipping it is an automatic mark loss regardless of how perfect the inductive step is. Always compute the base case explicitly, even if it seems trivial.", "source": "GLM 5.1 ③", "_id": "glm_3_23"}, {"question": "Q10(ii) — Why split 36 as $$64 - 28$$ rather than some other decomposition? What's the motivation? (2 steps)", "answer": "- Step 1: The goal is to express $$f(k+1)$$ in terms of $$f(k)$$. Since $$f(k) = 8^{2k+1} + 6^{2k-1}$$, we need the same combination to appear. The first term already has $$64 \\cdot 8^{2k+1}$$, so we need the coefficient of $$6^{2k-1}$$ to also be 64 to factor out $$f(k)$$.\n- Step 2: But the actual coefficient is 36. So we write $$36 = 64 - 28$$: the 64 pairs with the first term to give $$64\\,f(k)$$, and the $$-28$$ is a convenient remainder because $$28 = 7 \\times 4$$, immediately giving divisibility by 7.\n\nThe decomposition isn't random — it's engineered so that (a) $$f(k)$$ factors out, and (b) the remainder is divisible by 7.", "source": "GLM 5.1 ①", "_id": "glm_1_20"}, {"question": "FP1 (general) — Why are reflection matrices $$\\begin{pmatrix}\\cos 2\\theta & \\sin 2\\theta \\\\ \\sin 2\\theta & -\\cos 2\\theta\\end{pmatrix}$$ given in terms of $$2\\theta$$ rather than $$\\theta$$ (for reflection in $$y = x\\tan\\theta$$)?", "answer": "A reflection doubles the angle. If the mirror line makes angle $$\\theta$$ with the $$x$$-axis, a point at angle $$\\phi$$ reflects to angle $$2\\theta - \\phi$$. So the rotation-equivalent angle relating original to image is $$2\\theta$$.\n\nIntuition check: reflect in the $$x$$-axis ($$\\theta = 0$$). Matrix becomes $$\\begin{pmatrix}1 & 0 \\\\ 0 & -1\\end{pmatrix}$$ ✓ (flips $$y$$).\n\nReflect in $$y = x$$ ($$\\theta = 45°$$, so $$2\\theta = 90°$$): matrix becomes $$\\begin{pmatrix}0 & 1 \\\\ 1 & 0\\end{pmatrix}$$ ✓ (swaps $$x$$ and $$y$$).\n\nThe determinant is $$-\\cos^2 2\\theta - \\sin^2 2\\theta = -1$$ — confirms orientation reversal.", "source": "Opus 4.7 ①", "_id": "opus_1_41"}, {"question": "For $\\arg z = \\frac{\\pi}{4}$, why is it insufficient to just state $y = x$ without the $x > 0$ condition? (1 step)", "answer": "- The equation $y = x$ describes a line through the origin with slope 1\n- This line passes through TWO quadrants: the first quadrant (where $\\arg = \\frac{\\pi}{4}$) and the third quadrant (where $\\arg = \\frac{5\\pi}{4}$ or equivalently $-\\frac{3\\pi}{4}$)\n- Since principal argument must satisfy $-\\pi < \\arg z \\leq \\pi$, the third quadrant case is $\\arg = -\\frac{3\\pi}{4}$, not $\\frac{\\pi}{4}$\n- The condition $x > 0$ (and equivalently $y > 0$) selects ONLY the first quadrant\n\n**Takeaway:** Every argument constraint requires both the tangent equation AND quadrant verification.", "source": "MiniMax ①", "_id": "minimax_1_17"}, {"question": "Conceptual — Why does $$\\sum_{r=1}^{N} f(r) = S(N)$$ work as a function, and why is $$S(b) - S(a-1)$$ the correct telescoping for restricted limits? (3 steps)", "answer": "- Step 1: $$S(N) = \\sum_{r=1}^{N} f(r)$$ is a cumulative sum — it adds up all terms from 1 to $$N$$. Think of it as a \"running total\" function.\n- Step 2: To get the sum from $$r = a$$ to $$r = b$$, you want all terms from 1 to $$b$$, MINUS all terms from 1 to $$a-1$$ (everything before the lower limit). This \"peels off\" the unwanted early terms.\n- Step 3: The key insight: the lower limit $$a$$ is INCLUDED, so you subtract $$S(a-1)$$ (terms up to $$a-1$$), not $$S(a)$$ (which would also remove the $$r=a$$ term). It's the same logic as \"counting from the 5th floor to the 10th floor = 10 - 4 = 6 floors.\"", "source": "GLM 5.1 ①", "_id": "glm_1_54"}, {"question": "FP1 Jan 2024 Q8(a) — After expanding $$\\sum (2r^3 + 3r^2 + r)$$ and substituting the three standard results, what algebraic trick keeps the working clean instead of expanding everything into a polynomial in $$n$$?", "answer": "Factor out the common factor $$\\tfrac{1}{2}n(n+1)$$ from all three terms EARLY. Each standard result contains this factor:\n- $$\\sum r = \\tfrac{1}{2}n(n+1)$$\n- $$\\sum r^2 = \\tfrac{1}{6}n(n+1)(2n+1) = \\tfrac{1}{2}n(n+1)\\cdot\\tfrac{2n+1}{3}$$ — so after multiplying by 3 the $$\\tfrac{1}{3}$$ cancels\n- $$\\sum r^3 = \\tfrac{1}{4}n^2(n+1)^2 = \\tfrac{1}{2}n(n+1)\\cdot\\tfrac{n(n+1)}{2}$$ — after multiplying by 2 the $$\\tfrac{1}{2}$$ cancels\n\nPulling out $$\\tfrac{1}{2}n(n+1)$$ leaves a small bracket to simplify: $$[n(n+1) + (2n+1) + 1]$$. If you expand instead, you'll wrestle with a quartic in $$n$$ and lose factoring marks.", "source": "Opus 4.7 ①", "_id": "opus_1_1"}, {"question": "For a transformation described as \"first A, then B,\" what's the composite matrix, and what's the common ordering pitfall?", "answer": "\"First A, then B\" = $$\\mathbf{BA}$$ (B on the left, A on the right).\n\nThe pitfall: writing $$\\mathbf{AB}$$ instead. The rule is: **the rightmost matrix acts first** on the position vector. So $$\\mathbf{BA}\\mathbf{v}$$ means: first apply A to $$\\mathbf{v}$$, then apply B to the result. The composition reads right-to-left, like function composition $$f(g(x))$$.\n\nMemory aid: \"A then B\" means A happens first, so A sits closest to the input vector, i.e., on the right. The one that acts later sits on the left.\n\nNOT in the booklet.", "source": "GLM 5.1 ③", "_id": "glm_3_36"}, {"question": "Q9(b) — What is the range of the principal argument $$\\arg z$$, and why does it matter when rejecting algebraic candidates? (2 steps)", "answer": "- Step 1: The principal argument is defined to lie in the interval $$-\\pi < \\arg z \\leq \\pi$$.\n- Step 2: This matters because a point in the third quadrant (where $x < 0, y < 0$) has an angle of $$\\frac{5\\pi}{4}$$ if measured as a positive rotation, but the principal argument must be expressed as $$-\\frac{3\\pi}{4}$$ (measuring clockwise). If a question asks for $$\\arg z = \\frac{\\pi}{4}$$, a third-quadrant point is incorrect not just because of the quadrant, but because its principal argument is a negative angle, not a positive one.\n\nNever use angles outside $$(-\\pi, \\pi]$$ for the principal argument.", "source": "GLM 5.1 ②", "_id": "glm_2_8"}, {"question": "FP1 Jan 2024 Q9 — When expanding $$(\\lambda + 2i)(\\lambda + 4i)$$ in the numerator, what happens to the $$8i^2$$ term, and why is this a common source of error?", "answer": "$$8i^2 = 8(-1) = -8$$. So the product becomes $$\\lambda^2 + 4i\\lambda + 2i\\lambda + 8i^2 = \\lambda^2 + 6i\\lambda - 8 = (\\lambda^2 - 8) + 6\\lambda i$$.\n\nThe error: writing $$8i^2 = +8$$ (forgetting that $$i^2 = -1$$). This flips the sign of the real part and gives $$(\\lambda^2 + 8) + 6\\lambda i$$ instead of $$(\\lambda^2 - 8) + 6\\lambda i$$. Since the real part appears in the argument condition, this sign error propagates into a completely wrong quadratic equation for $$\\lambda$$.\n\nAlways replace $$i^2$$ with $$-1$$ explicitly. Don't skip this step mentally.", "source": "GLM 5.1 ③", "_id": "glm_3_10"}, {"question": "FP1 Jan 2024 Q10(ii) — When proving $$f(n) = 8^{2n+1} + 6^{2n-1}$$ is divisible by 7, the inductive step requires expressing $$f(k+1) = 8^{2k+3} + 6^{2k+1}$$ in terms of $$f(k)$$. What's the trick, and why does it work? (3 steps)", "answer": "- Step 1: Rewrite each term of $$f(k+1)$$ so it contains the corresponding term of $$f(k)$$: $$8^{2k+3} = 64 \\cdot 8^{2k+1}$$ and $$6^{2k+1} = 36 \\cdot 6^{2k-1}$$.\n- Step 2: The trick: **split** $$36 = 64 - 28$$. Then $$6^{2k+1} = (64 - 28) \\cdot 6^{2k-1} = 64 \\cdot 6^{2k-1} - 28 \\cdot 6^{2k-1}$$.\n- Step 3: Now $$f(k+1) = 64 \\cdot 8^{2k+1} + 64 \\cdot 6^{2k-1} - 28 \\cdot 6^{2k-1} = 64(8^{2k+1} + 6^{2k-1}) - 28 \\cdot 6^{2k-1} = 64 \\cdot f(k) - 28 \\cdot 6^{2k-1}$$.\n\nWhy split $$36 = 64 - 28$$? Because 64 is the ratio $$8^2$$ between successive odd-power terms of 8, so factoring out 64 groups both terms into $$f(k)$$. And 28 is divisible by 7 ($$28 = 4 \\times 7$$), so the remainder is automatically a multiple of 7.", "source": "GLM 5.1 ③", "_id": "glm_3_19"}, {"question": "When proving divisibility by induction, why is it important that the integer $$m$$ in the hypothesis $$f(k) = 7m$$ is generic, and how does this affect the inductive step? (2 steps)", "answer": "- Step 1: The hypothesis states there exists *some* integer $$m$$ such that $$f(k)=7m$$, without needing to know its value. This genericity is crucial because the exact value of $$m$$ is irrelevant.\n- Step 2: In the inductive step, you express $$f(k+1)$$ as a combination involving $$f(k)$$, yielding $$7(\\text{integer})$$. The new integer may be different from $$m$$, but because it is demonstrably an integer, the divisibility of $$f(k+1)$$ follows.", "source": "Kimi K2.6 ②", "_id": "kimi_2_53"}, {"question": "Why is splitting \"$$36 = 64 - 28$$\" the right choice in this induction, and how would you find the analogous split for a different base?", "answer": "- Step 1: You want the form $$f(k+1) = A\\cdot f(k) + (\\text{multiple of 7})$$. Choose $$A$$ = one of the two multipliers (here 64), and write the OTHER multiplier (36) as $$A - (A - \\text{other}) = 64 - 28$$.\n- Step 2: The residual must be divisible by 7. Check: $$64 - 36 = 28 = 7\\cdot 4$$ ✓. This works because $$64 \\equiv 36 \\pmod 7$$ (both $$\\equiv 1$$).\n- Step 3: In general, for $$f(n) = a^{pn+\\alpha} + b^{qn+\\beta}$$ divisible by $$d$$, the split $$b^q = a^p - (a^p - b^q)$$ works iff $$a^p \\equiv b^q \\pmod d$$.", "source": "Opus 4.7 ②", "_id": "opus_2_14"}, {"question": "FP1 induction — Why must you verify the base case by DIRECT calculation rather than substituting $$n=1$$ into the formula you're trying to prove?", "answer": "The whole point of the base case is to confirm the formula is true at the starting value — independently. If you \"verify\" by substituting into the claimed formula, you're assuming what you're trying to prove (circular reasoning).\n\nCorrect method: compute the LHS directly (e.g. for the matrix question, compute $$\\mathbf{M}^1 = \\mathbf{M}$$ from the original definition of $$\\mathbf{M}$$). Then compute the RHS by substituting $$n=1$$ into the closed form. Show LHS = RHS.\n\nEdexcel mark: this is typically 1 mark of the 5 for the question — easy to earn, easy to lose to vague phrasing like \"obviously true for $$n=1$$\".", "source": "Opus 4.7 ①", "_id": "opus_1_13"}, {"question": "FP1 Jan 2024 Q9 — What's the trap when interpreting \"$$\\tan(\\arg z) = 1$$\" versus \"$$\\arg z = \\tfrac{\\pi}{4}$$\"?", "answer": "$$\\tan(\\arg z) = 1$$ has TWO solutions in $$(-\\pi, \\pi]$$:\n+ $$\\arg z = \\tfrac{\\pi}{4}$$ (first quadrant)\n+ $$\\arg z = -\\tfrac{3\\pi}{4}$$ (third quadrant)\n\n$$\\arg z = \\tfrac{\\pi}{4}$$ specifies ONE solution.\n\nThe equation $$y/x = 1$$ (or equivalently $$y = x$$, ignoring division by zero) captures BOTH cases. To restrict to $$\\arg = \\tfrac{\\pi}{4}$$, also require $$x > 0$$ (and $$y > 0$$).\n\nThis is the same kind of multivalue trap as $$\\sin\\theta = 1/2 \\Rightarrow \\theta = \\tfrac{\\pi}{6}$$ OR $$\\theta = \\tfrac{5\\pi}{6}$$ — extra geometric info disambiguates.", "source": "Opus 4.7 ①", "_id": "opus_1_40"}, {"question": "FP1 Jan 2024 Q9(b) — If $$y = x$$ but $$x < 0$$ and $$y < 0$$, what is $$\\arg z$$, and why can't it be $$\\frac{5\\pi}{4}$$?", "answer": "The point is in the third quadrant, so $$\\arg z = -\\frac{3\\pi}{4}$$.\n\nIt can't be $$\\frac{5\\pi}{4}$$ because the **principal argument** is defined to lie in $$(-\\pi, \\pi]$$. The value $$\\frac{5\\pi}{4} > \\pi$$, so it's outside the principal range. The equivalent angle within the range is $$\\frac{5\\pi}{4} - 2\\pi = -\\frac{3\\pi}{4}$$.\n\nThis is why the sign-check matters: both $$\\lambda = 3 + \\sqrt{17}$$ and $$\\lambda = 3 - \\sqrt{17}$$ satisfy $$y = x$$, but only the first gives $$x > 0$$. The second gives negative $$x$$ and $$y$$, yielding $$\\arg z = -\\frac{3\\pi}{4} \\neq \\frac{\\pi}{4}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_12"}, {"question": "In divisibility induction like Q10(ii), why is showing $$f(k+1) - f(k)$$ is divisible by $$7$$ considered structurally weaker than expressing $$f(k+1) = A\\cdot f(k) + 7B$$? (2 steps)", "answer": "- Step 1: Proving $$7 \\mid \\big(f(k+1) - f(k)\\big)$$ only gives $$f(k+1) \\equiv f(k) \\pmod{7}$$; this is circular unless you separately invoke the hypothesis that $$f(k) \\equiv 0 \\pmod{7}$$.\n- Step 2: Writing $$f(k+1) = 64f(k) - 28\\cdot 6^{2k-1}$$ invokes the hypothesis $$f(k)=7m$$ directly and isolates an explicit integer multiple of $$7$$ in the remainder, making the logical chain complete and transparent to the examiner.", "source": "Kimi K2.6 ②", "_id": "kimi_2_13"}, {"question": "What three meta-skills does this paper reward, according to the pattern summary? Give a concrete example of each. (3 steps)", "answer": "- Step 1: **Formula-booklet awareness** — knowing what's IN vs NOT in the booklet. Example: Q1 needs det/inverse (NOT in booklet), but Q8's $$\\sum r^3$$ IS in the booklet.\n- Step 2: **Structural discipline** — not skipping mandatory lines. Examples: Q4's composition order ($$\\mathbf{BA}$$ not $$\\mathbf{AB}$$), Q8's $$S(2n)-S(n-1)$$ not $$S(2n)-S(n)$$, Q10's induction skeleton.\n- Step 3: **Discrimination of multiple algebraic candidates** — checking which solutions satisfy the geometric constraints. Examples: Q9 (which $$\\lambda$$ gives $$\\arg = \\pi/4$$?), Q5 (sign of $$\\alpha + \\beta$$).\n\nThe bottleneck isn't technique knowledge — it's technique **reliability**: converting \"I know how\" into \"I do it correctly in 4 minutes.\"", "source": "GLM 5.1 ①", "_id": "glm_1_47"}, {"question": "FP1 induction (matrices) — Why must the result for $$\\mathbf{M}^{k+1}$$ be written in the SAME form as the proposition (with $$k+1$$ substituted), rather than just any equivalent expression?", "answer": "Induction proves $$P(n)$$ for all $$n$$. To conclude $$P(k+1)$$, you must literally produce the statement of $$P$$ with $$n$$ replaced by $$k+1$$. An \"equivalent but differently arranged\" expression doesn't visibly demonstrate this.\n\nConcrete: if $$P(n)$$ says the $$(1,1)$$ entry is $$2n+1$$, and you obtain $$2k+3$$, rewrite it as $$2(k+1) + 1$$. Even though $$2k+3 = 2(k+1)+1$$ algebraically, the LATTER form makes the pattern-match visible to the examiner.\n\nMark scheme: Edexcel awards a mark for \"expressing the result in the form of $$P(k+1)$$\".", "source": "Opus 4.7 ①", "_id": "opus_1_33"}, {"question": "FP1 Jan 2024 Q10 — In the base case of induction, what must you compute directly, and what must you NOT do?", "answer": "Compute the LHS directly from the definition, and show it equals the RHS from the formula.\n\nFor example, in matrix induction with $$n=1$$: compute $$\\mathbf{M}^1 = \\begin{pmatrix} 3 & -1 \\\\ 4 & -1 \\end{pmatrix}$$ directly, then show this equals $$\\begin{pmatrix} 2(1)+1 & -1 \\\\ 4(1) & 1-2(1) \\end{pmatrix}$$. ✓\n\nWhat you must **NOT** do: substitute $$n=1$$ into the formula you're trying to prove and say \"it works.\" That's circular — you're assuming the formula is true to prove it's true. The base case must be verified independently.", "source": "GLM 5.1 ③", "_id": "glm_3_16"}, {"question": "Why must the base case in an induction be verified by DIRECT computation, not by substituting $$n=1$$ into the formula you're trying to prove?", "answer": "Logical circularity. The formula is the conclusion you're proving — using it to verify itself proves nothing. You must compute the LHS independently (e.g., $$\\mathbf{M}^1$$ is just $$\\mathbf{M}$$; $$f(1) = 8^3 + 6 = 518$$) and the RHS by substituting $$n=1$$ into the claimed formula, then check they agree.", "source": "Opus 4.7 ②", "_id": "opus_2_16"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "Q8 — When you see a summation like $$\\sum_{r=1}^{n} r(2r+1)(r+1)$$, what must you do to the summand BEFORE applying any standard summation formulas, and why? (2 steps)", "answer": "- Step 1: **Expand the product fully** into a polynomial in $$r$$. Here: $$r(2r+1)(r+1) = r(2r^2+3r+1) = 2r^3 + 3r^2 + r$$. You cannot apply $$\\sum r$$, $$\\sum r^2$$, $$\\sum r^3$$ to a factored product directly — summation is linear ($$\\sum(a+b) = \\sum a + \\sum b$$), but it does **not** distribute over products.\n- Step 2: Only after expansion can you apply the standard formulas term-by-term: $$\\sum(2r^3+3r^2+r) = 2\\sum r^3 + 3\\sum r^2 + \\sum r$$.\n\nTrying to sum a factored form directly is the #1 algebraic catastrophe in this question type.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "Q8 — Which three standard summation formulas ARE provided in the Edexcel formula booklet? Write them out. (3 steps)", "answer": "- Step 1: $$\\sum_{r=1}^{n} r = \\tfrac{1}{2}n(n+1)$$\n- Step 2: $$\\sum_{r=1}^{n} r^2 = \\tfrac{1}{6}n(n+1)(2n+1)$$\n- Step 3: $$\\sum_{r=1}^{n} r^3 = \\tfrac{1}{4}n^2(n+1)^2$$\n\nThese are **in** the booklet. You do NOT need to memorise them — but you DO need to know they exist so you don't waste time deriving them.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "Q8 — After substituting the standard formulas into $$2\\sum r^3 + 3\\sum r^2 + \\sum r$$, you get $$\\tfrac{1}{2}n^2(n+1)^2 + \\tfrac{1}{2}n(n+1)(2n+1) + \\tfrac{1}{2}n(n+1)$$. What algebraic trick keeps the simplification clean? (2 steps)", "answer": "- Step 1: **Factor out** $$\\tfrac{1}{2}n(n+1)$$ from ALL three terms immediately. Every term has this factor, so pulling it out avoids multiplying through and creating a quartic mess.\n- Step 2: The bracket becomes $$n(n+1) + (2n+1) + 1 = n^2 + 3n + 2 = (n+1)(n+2)$$, giving $$\\tfrac{1}{2}n(n+1)^2(n+2)$$.\n\nIf you skip the early factor-out, you'll face expanding $$n^2(n+1)^2$$ and combining with the other terms — error-prone and slow.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "Q8 — What notation trick should you set up BEFORE computing $$\\sum_{r=n}^{2n}$$, and why does it prevent off-by-one errors? (2 steps)", "answer": "- Step 1: **Define** $$S(N) = \\sum_{r=1}^{N} r(2r+1)(r+1) = \\tfrac{1}{2}N(N+1)^2(N+2)$$ as a named function. Writing \"$$S(N)$$\" makes the subtraction structure explicit.\n- Step 2: Then $$\\sum_{r=n}^{2n} = S(2n) - S(n-1)$$. The key: it is $$S(n-1)$$, NOT $$S(n)$$, because the term $$r=n$$ is **included** in the sum. Subtracting $$S(n)$$ would remove the $$r=n$$ term incorrectly.\n\nThe off-by-one error ($$S(n)$$ vs $$S(n-1)$$) is the single most common mistake in restricted-limit summation questions.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "Q8 — Why is it $$S(2n) - S(n-1)$$ and not $$S(2n) - S(n)$$ for $$\\sum_{r=n}^{2n}$$? What's the intuition? (2 steps)", "answer": "- Step 1: $$S(2n) = \\sum_{r=1}^{2n}$$ includes every term from $$r=1$$ to $$r=2n$$. You want to remove terms from $$r=1$$ to $$r=n-1$$ (everything before the lower limit), keeping $$r=n$$ onwards.\n- Step 2: $$S(n-1) = \\sum_{r=1}^{n-1}$$ removes exactly the terms before $$r=n$$. If you subtracted $$S(n)$$, you'd also remove the $$r=n$$ term itself — one term too many.\n\nThink of it as: \"subtract everything UP TO but NOT INCLUDING the lower limit.\"", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "Q8 — When computing $$S(2n) = \\tfrac{1}{2}(2n)(2n+1)^2(2n+2)$$, what simplification should you spot immediately? (2 steps)", "answer": "- Step 1: Factor out the 2s: $$(2n) = 2 \\cdot n$$ and $$(2n+2) = 2(n+1)$$.\n- Step 2: The $$\\tfrac{1}{2}$$ cancels one factor of 2, giving $$S(2n) = 2n(n+1)(2n+1)^2$$.\n\nLeaving $$S(2n)$$ un-simplified makes the subsequent subtraction with $$S(n-1)$$ much harder, because you can't identify common factors.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "Q8 — When you reach $$2n(n+1)(2n+1)^2 - \\tfrac{1}{2}n^2(n-1)(n+1)$$, what should you factor out before expanding anything? (2 steps)", "answer": "- Step 1: Factor out $$\\tfrac{n(n+1)}{2}$$ — it's the common factor present in both terms (the second term already has $$\\tfrac{1}{2}n^2(n-1)(n+1) = \\tfrac{n(n+1)}{2} \\cdot n(n-1)$$, and the first term has $$2n(n+1) = \\tfrac{n(n+1)}{2} \\cdot 4$$).\n- Step 2: This leaves a bracket $$\\big[4(2n+1)^2 - n(n-1)\\big]$$ that expands to a **quadratic** in $$n$$, not a quartic. Much cleaner.\n\nExpanding both terms fully before subtracting creates a degree-4 polynomial — possible, but error-prone and slow.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "Q8 — After simplification you get $$\\tfrac{n(n+1)}{2}(15n^2 + 17n + 4)$$. Why must you factor the quadratic, and what's the verification trick? (2 steps)", "answer": "- Step 1: The question asks for the form $$\\tfrac{1}{2}n(n+1)(an+b)(cn+d)$$, so you **must** factor $$15n^2+17n+4$$ into two linear factors. Compute the discriminant: $$17^2 - 4(15)(4) = 289-240 = 49 = 7^2$$, confirming it factors nicely.\n- Step 2: Factor as $$(3n+1)(5n+4)$$. **Verification trick:** multiply back — $$(3n)(5n) = 15n^2$$ ✓, outer+inner = $$12n + 5n = 17n$$ ✓, $$(1)(4) = 4$$ ✓. A common error is writing $$(5n+1)(3n+4)$$ — this gives $$15n^2 + 23n + 4$$, which is wrong.\n\nAlways multiply back to check your factorisation under exam pressure.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "Q8 — A common pitfall when the coefficient of $$\\sum r^3$$ is 2: what formula do you actually use, and what's the mistake? (2 steps)", "answer": "- Step 1: The booklet gives $$\\sum r^3 = \\tfrac{1}{4}n^2(n+1)^2$$. When the summand has $$2r^3$$, you compute $$2 \\times \\tfrac{1}{4}n^2(n+1)^2 = \\tfrac{1}{2}n^2(n+1)^2$$.\n- Step 2: The mistake is using $$\\tfrac{1}{2}n^2(n+1)^2$$ as if it were the formula for $$\\sum r^3$$ itself (confusing the 2 coefficient with the formula). The booklet formula has $$\\tfrac{1}{4}$$; the $$\\tfrac{1}{2}$$ only appears after you multiply by 2.\n\nWrite the booklet formula first, then multiply by the coefficient — don't try to recall a \"modified\" formula.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "Q9 — When solving $$\\frac{3z-1}{2} = \\frac{\\lambda+5i}{\\lambda-4i}$$ for $$z$$, what's the first algebraic move and why? (2 steps)", "answer": "- Step 1: **Clear the fraction on the left** by multiplying both sides by 2: $$3z - 1 = \\frac{2(\\lambda+5i)}{\\lambda-4i}$$. Then isolate $$3z$$ and combine into a single fraction over the common denominator $$(\\lambda - 4i)$$.\n- Step 2: This gives $$3z = \\frac{3\\lambda + 6i}{\\lambda - 4i}$$, so $$z = \\frac{\\lambda + 2i}{\\lambda - 4i}$$. Now you're set up to rationalise.\n\nDon't try to separate real and imaginary parts while there are still nested fractions — clear everything first.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "Q9 — To express $$z = \\frac{\\lambda + 2i}{\\lambda - 4i}$$ in the form $$x + yi$$, what do you multiply numerator and denominator by, and what's the common wrong choice? (2 steps)", "answer": "- Step 1: Multiply by the **conjugate of the denominator**: $$\\frac{\\lambda + 4i}{\\lambda + 4i}$$. This makes the denominator real: $$(\\lambda-4i)(\\lambda+4i) = \\lambda^2 + 16$$.\n- Step 2: The common wrong choice is multiplying by $$\\lambda - 4i$$ (the same as the denominator), which gives $$(\\lambda-4i)^2$$ in the denominator — still complex, making everything worse. Or multiplying by just $$\\lambda$$ or just $$4i$$, which doesn't eliminate the imaginary part.\n\nThe conjugate is the unique multiplier that makes the denominator purely real.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "Q9 — When expanding the numerator $$(\\lambda+2i)(\\lambda+4i)$$, what's the $$i^2$$ pitfall? (2 steps)", "answer": "- Step 1: Expand carefully: $$\\lambda^2 + 4i\\lambda + 2i\\lambda + 8i^2$$. The real part comes from $$\\lambda^2 + 8i^2 = \\lambda^2 + 8(-1) = \\lambda^2 - 8$$.\n- Step 2: The pitfall is writing $$8i^2 = +8$$ (forgetting $$i^2 = -1$$). This would give real part $$\\lambda^2 + 8$$ instead of $$\\lambda^2 - 8$$, which cascades into wrong answers for both parts of (b).\n\nAlways replace $$i^2$$ with $$-1$$ immediately — don't carry $$i^2$$ through multiple lines.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "Q9 — After rationalising, you get $$z = \\frac{(\\lambda^2 - 8) + 6\\lambda i}{\\lambda^2 + 16}$$. Why should you state $$x$$ and $$y$$ separately before proceeding to part (b)? (2 steps)", "answer": "- Step 1: Write $$x = \\frac{\\lambda^2 - 8}{\\lambda^2 + 16}$$ and $$y = \\frac{6\\lambda}{\\lambda^2 + 16}$$. This makes the real and imaginary parts explicit and crystallises what you're working with.\n- Step 2: Since $$\\lambda^2 + 16 > 0$$ always, the signs of $$x$$ and $$y$$ are determined entirely by their numerators. This observation is the key to part (b) — you can equate numerators directly when comparing $$x$$ and $$y$$.\n\nSkipping this step means you'll be juggling a complex fraction when you should be doing a simple sign check.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "Q9 — \"Given that $$\\arg z = \\frac{\\pi}{4}$$\" — what two conditions does this impose on $$x$$ and $$y$$, and why isn't $$\\tan(\\arg z) = 1$$ sufficient? (3 steps)", "answer": "- Step 1: $$\\arg z = \\frac{\\pi}{4}$$ means $$z$$ lies on the ray at 45° in the **first quadrant**. This requires BOTH $$y = x$$ (the 45° line) AND $$x > 0$$ (first quadrant, not third).\n- Step 2: The equation $$\\frac{y}{x} = 1$$ (i.e., $$\\tan(\\arg z) = 1$$) is satisfied by any point on the line $$y = x$$ — including the third quadrant where $$x < 0, y < 0$$, which gives $$\\arg z = -\\frac{3\\pi}{4}$$ (or equivalently $$\\frac{5\\pi}{4}$$, but principal argument is in $$(-\\pi, \\pi]$$).\n- Step 3: So $$\\tan(\\arg z) = 1$$ gives two candidates: $$\\arg z = \\frac{\\pi}{4}$$ or $$\\arg z = -\\frac{3\\pi}{4}$$. Only the sign check on $$x$$ (and $$y$$) discriminates between them.\n\nThis is the exact spot where students lose the final mark — solving $$y = x$$ and declaring both roots valid.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "Q9 — For $$\\lambda = 3 - \\sqrt{17} \\approx -1.12$$, why does this NOT give $$\\arg z = \\frac{\\pi}{4}$$ even though it satisfies $$y = x$$? (2 steps)", "answer": "- Step 1: With $$\\lambda < 0$$: $$6\\lambda < 0$$ so $$y < 0$$, and $$\\lambda^2 - 8 = (3-\\sqrt{17})^2 - 8 = 9 - 6\\sqrt{17} + 17 - 8 = 18 - 6\\sqrt{17} \\approx 18 - 24.7 < 0$$, so $$x < 0$$.\n- Step 2: Both $$x$$ and $$y$$ are negative, placing $$z$$ in the **third quadrant**. The principal argument there is $$-\\frac{3\\pi}{4}$$, not $$\\frac{\\pi}{4}$$. The line $$y = x$$ passes through two quadrants; only the first-quadrant ray gives $$\\arg = \\frac{\\pi}{4}$$.\n\nAlways check the signs of BOTH $$x$$ and $$y$$ for every $$\\arg z = \\theta$$ problem.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "Q9 — The principal argument range is $$(-\\pi, \\pi]$$. Why is the third-quadrant point's argument $$-\\frac{3\\pi}{4}$$ rather than $$\\frac{5\\pi}{4}$$? (2 steps)", "answer": "- Step 1: A point in the third quadrant (negative real, negative imaginary) has an argument measured anticlockwise from the positive real axis that exceeds $$\\pi$$. For example, the point $$(-1, -1)$$ sits at angle $$\\frac{5\\pi}{4}$$ anticlockwise.\n- Step 2: But the principal argument must lie in $$(-\\pi, \\pi]$$. Since $$\\frac{5\\pi}{4} > \\pi$$, we subtract $$2\\pi$$ to get $$\\frac{5\\pi}{4} - 2\\pi = -\\frac{3\\pi}{4}$$, which IS in the range.\n\nWriting $$\\arg z = \\frac{5\\pi}{4}$$ is wrong for the principal value — it's outside the defined range.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "Q10 — What are the FIVE mandatory structural elements of a proof by induction, in order? (5 steps)", "answer": "- Step 1: **Proposition**: \"Let $$P(n)$$ be the statement that...\" — define what you're proving explicitly.\n- Step 2: **Base case**: \"When $$n = 1$$, LHS = ..., RHS = ..., so $$P(1)$$ is true.\" — verify directly, don't use the formula you're proving.\n- Step 3: **Hypothesis**: \"Assume $$P(k)$$ is true for some $$k \\in \\mathbb{Z}^+$$.\" — clearly state the assumption.\n- Step 4: **Inductive step**: Show $$P(k) \\Rightarrow P(k+1)$$ algebraically, expressing the result in the SAME form as the proposition.\n- Step 5: **Conclusion**: \"Since $$P(1)$$ is true and $$P(k) \\Rightarrow P(k+1)$$, by the principle of mathematical induction, $$P(n)$$ holds for all $$n \\in \\mathbb{Z}^+$$.\"\n\nEdexcel awards a mark for the conclusion sentence — write it verbatim every time.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "Q10(i) — In matrix induction, when computing $$\\mathbf{M}^{k+1}$$, should you write $$\\mathbf{M}^k \\cdot \\mathbf{M}$$ or $$\\mathbf{M} \\cdot \\mathbf{M}^k$$? Why does it matter for the working? (2 steps)", "answer": "- Step 1: Either works algebraically (matrix multiplication is associative), but you should write the one that makes your computation easiest. If $$\\mathbf{M}^k$$ has the conjectured closed form (a matrix with entries in $$k$$), then $$\\mathbf{M}^k \\cdot \\mathbf{M}$$ means you multiply the \"formula matrix\" by the simple original $$\\mathbf{M}$$ — the right-multiplication is cleaner.\n- Step 2: The pitfall is writing $$\\mathbf{M} \\cdot \\mathbf{M}^k$$ in your working but actually computing $$\\mathbf{M}^k \\cdot \\mathbf{M}$$ (or vice versa). The working must match what you write. Since $$\\mathbf{M}$$ is the same either way, the entries come out the same, but the intermediate calculations differ.\n\nConsistency between notation and computation matters for method marks.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "Q10(i) — After computing $$\\mathbf{M}^{k+1}$$ entry by entry, what must you do with each entry to earn full marks? (2 steps)", "answer": "- Step 1: Rewrite each entry in the form required by the proposition $$P(k+1)$$. For example, the $$(1,1)$$ entry becomes $$2k+3 = 2(k+1)+1$$, and the $$(1,2)$$ entry becomes $$-(k+1)$$.\n- Step 2: This shows explicitly that the result matches the proposition with $$n = k+1$$, completing the inductive step. Leaving entries as $$2k+3$$ without rewriting as $$2(k+1)+1$$ may lose the \"conclusion of inductive step\" mark.\n\nThe examiner needs to see that you've **recognised** the result is in the correct form, not just computed correctly.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "Q10(ii) — In the divisibility proof for $$f(n) = 8^{2n+1} + 6^{2n-1}$$, what's the key algebraic trick for the inductive step? (3 steps)", "answer": "- Step 1: Write $$f(k+1) = 8^{2k+3} + 6^{2k+1} = 64 \\cdot 8^{2k+1} + 36 \\cdot 6^{2k-1}$$. The coefficients 64 and 36 come from $$8^2$$ and $$6^2$$ respectively (increasing each exponent by 2).\n- Step 2: **Split** 36 as $$64 - 28$$, so $$f(k+1) = 64 \\cdot 8^{2k+1} + (64-28)\\cdot 6^{2k-1} = 64(8^{2k+1} + 6^{2k-1}) - 28 \\cdot 6^{2k-1} = 64\\,f(k) - 28 \\cdot 6^{2k-1}$$.\n- Step 3: Since $$f(k) = 7m$$ by hypothesis, and $$28 = 7 \\times 4$$, we get $$f(k+1) = 7(64m - 4\\cdot 6^{2k-1})$$, which is divisible by 7.\n\nThe trick is choosing to split 36 as $$64 - 28$$ so that the $$64$$ factors out with $$f(k)$$, and the remainder is a multiple of 7.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": true}, {"question": "Q10(ii) — Why split 36 as $$64 - 28$$ rather than some other decomposition? What's the motivation? (2 steps)", "answer": "- Step 1: The goal is to express $$f(k+1)$$ in terms of $$f(k)$$. Since $$f(k) = 8^{2k+1} + 6^{2k-1}$$, we need the same combination to appear. The first term already has $$64 \\cdot 8^{2k+1}$$, so we need the coefficient of $$6^{2k-1}$$ to also be 64 to factor out $$f(k)$$.\n- Step 2: But the actual coefficient is 36. So we write $$36 = 64 - 28$$: the 64 pairs with the first term to give $$64\\,f(k)$$, and the $$-28$$ is a convenient remainder because $$28 = 7 \\times 4$$, immediately giving divisibility by 7.\n\nThe decomposition isn't random — it's engineered so that (a) $$f(k)$$ factors out, and (b) the remainder is divisible by 7.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": true}, {"question": "Q10(ii) — When going from $$f(k) = 8^{2k+1} + 6^{2k-1}$$ to $$f(k+1)$$, a common error is mishandling the exponent on 6. What's the correct relationship? (2 steps)", "answer": "- Step 1: $$f(k+1) = 8^{2(k+1)+1} + 6^{2(k+1)-1} = 8^{2k+3} + 6^{2k+1}$$. The exponent on 6 goes from $$2k-1$$ to $$2k+1$$, an increase of 2.\n- Step 2: So $$6^{2k+1} = 6^2 \\cdot 6^{2k-1} = 36 \\cdot 6^{2k-1}$$, NOT $$6 \\cdot 6^{2k}$$. The pitfall is incrementing $$n$$ by 1 but only adding 1 to the exponent instead of 2. Since the exponent is $$2n-1$$, increasing $$n$$ by 1 increases the exponent by 2.\n\nWrite out the substitution $$n \\to k+1$$ explicitly in the exponent before simplifying.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "Q10 — Why can't you just say \"$$f(k+1) - f(k)$$ is divisible by 7, therefore $$f(k+1)$$ is divisible by 7\" without further justification? (2 steps)", "answer": "- Step 1: The difference $$f(k+1) - f(k)$$ being divisible by 7 only tells you that $$f(k+1) \\equiv f(k) \\pmod{7}$$. To conclude $$7 \\mid f(k+1)$$, you ALSO need $$7 \\mid f(k)$$.\n- Step 2: The inductive hypothesis gives you $$7 \\mid f(k)$$, so the argument DOES work — but you must **state** this explicitly. Writing just \"the difference is divisible by 7\" without invoking the hypothesis loses the logical connection mark.\n\nThe inductive hypothesis is the bridge; always name it when you use it.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "Q10 — What must the conclusion sentence contain for full marks, and what's commonly omitted? (2 steps)", "answer": "- Step 1: The full conclusion: \"Since $$P(1)$$ is true and $$P(k) \\Rightarrow P(k+1)$$, by the principle of mathematical induction, $$P(n)$$ holds for all $$n \\in \\mathbb{Z}^+$$.\"\n- Step 2: Common omissions: forgetting to mention the base case (\"Since $$P(1)$$ is true\"), forgetting to specify the domain (\"$$n \\in \\mathbb{Z}^+$$\"), or writing \"true for all $$n$$\" without qualifying the domain. Edexcel awards a specific mark for this sentence.\n\nMemorise the conclusion verbatim — it's free marks if you write it correctly.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "What is the determinant of $$\\begin{pmatrix}a&b\\\\c&d\\end{pmatrix}$$, and why must you memorise it? (2 steps)", "answer": "- Step 1: $$\\det\\begin{pmatrix}a&b\\\\c&d\\end{pmatrix} = ad - bc$$. It's the \"top-left times bottom-right minus top-right times bottom-left\" pattern.\n- Step 2: This formula is **NOT in the formula booklet**. It's needed in virtually every FP1 matrix question (inverses, singular matrices, area scale factors). You must recall it instantly — there's no time to derive it in the exam.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "What is the inverse of $$\\begin{pmatrix}a&b\\\\c&d\\end{pmatrix}$$, and what's the easy way to remember the \"swap and negate\" pattern? (2 steps)", "answer": "- Step 1: $$\\begin{pmatrix}a&b\\\\c&d\\end{pmatrix}^{-1} = \\frac{1}{ad-bc}\\begin{pmatrix}d&-b\\\\-c&a\\end{pmatrix}$$. The scalar out front is $$\\frac{1}{\\det}$$.\n- Step 2: The matrix part has a simple pattern: **swap** the diagonal entries ($$a \\leftrightarrow d$$), and **negate** the off-diagonal entries ($$b \\to -b$$, $$c \\to -c$$). This is NOT in the booklet — memorise it.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "If a complex number $$\\alpha$$ is a root of a polynomial with real coefficients, what quadratic factor does $$\\alpha$$ and its conjugate $$\\bar{\\alpha}$$ contribute? Derive it. (3 steps)", "answer": "- Step 1: The two roots are $$\\alpha$$ and $$\\bar{\\alpha}$$. The quadratic with these roots is $$(z - \\alpha)(z - \\bar{\\alpha})$$.\n- Step 2: Expand: $$z^2 - (\\alpha + \\bar{\\alpha})z + \\alpha\\bar{\\alpha}$$. Now $$\\alpha + \\bar{\\alpha} = 2\\,\\text{Re}(\\alpha)$$ and $$\\alpha\\bar{\\alpha} = |\\alpha|^2$$.\n- Step 3: So the quadratic factor is $$z^2 - 2\\,\\text{Re}(\\alpha)\\,z + |\\alpha|^2$$. This is NOT in the booklet — memorise it. It's essential for factorising polynomials with complex roots.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "For the quadratic $$ax^2 + bx + c = 0$$ with roots $$\\alpha$$ and $$\\beta$$, what are Vieta's formulas? Why are they NOT just \"the quadratic formula backwards\"? (2 steps)", "answer": "- Step 1: $$\\alpha + \\beta = -\\frac{b}{a}$$ and $$\\alpha\\beta = \\frac{c}{a}$$. Note the signs: the sum has a **negative** sign because $$(x-\\alpha)(x-\\beta) = x^2 - (\\alpha+\\beta)x + \\alpha\\beta$$, and comparing with $$ax^2+bx+c$$ gives $$-a(\\alpha+\\beta) = b$$.\n- Step 2: They're deeper than \"quadratic formula backwards\" — they express symmetric functions of the roots directly in terms of coefficients, WITHOUT needing to find the roots. This lets you compute $$\\alpha^2+\\beta^2$$, $$\\alpha^3+\\beta^3$$, etc. from coefficients alone.\n\nThese are NOT in the booklet. Memorise both.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": true}, {"question": "What's the identity for $$\\alpha^2 + \\beta^2$$ in terms of $$\\alpha + \\beta$$ and $$\\alpha\\beta$$, and what's the intuition behind it? (2 steps)", "answer": "- Step 1: $$\\alpha^2 + \\beta^2 = (\\alpha+\\beta)^2 - 2\\alpha\\beta$$. This comes from expanding $$(\\alpha+\\beta)^2 = \\alpha^2 + 2\\alpha\\beta + \\beta^2$$ and subtracting the cross-term.\n- Step 2: The intuition: you can't compute $$\\alpha^2+\\beta^2$$ directly without finding the roots, but you CAN compute $$(\\alpha+\\beta)^2$$ and $$\\alpha\\beta$$ from Vieta's. The identity bridges the gap — it's a \"completion\" trick.\n\nNOT in the booklet. Essential for Q5-type problems.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "What's the identity for $$\\alpha^3 + \\beta^3$$, and why can't you just cube $$\\alpha + \\beta$$? (2 steps)", "answer": "- Step 1: $$\\alpha^3 + \\beta^3 = (\\alpha+\\beta)^3 - 3\\alpha\\beta(\\alpha+\\beta)$$. This comes from $$(\\alpha+\\beta)^3 = \\alpha^3 + 3\\alpha^2\\beta + 3\\alpha\\beta^2 + \\beta^3 = \\alpha^3+\\beta^3 + 3\\alpha\\beta(\\alpha+\\beta)$$.\n- Step 2: You can't just cube $$\\alpha+\\beta$$ because $$(\\alpha+\\beta)^3$$ contains the cross-terms $$3\\alpha\\beta(\\alpha+\\beta)$$. The identity subtracts these out to isolate the pure sum of cubes.\n\nNOT in the booklet.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "What's the identity for $$\\frac{1}{\\alpha} + \\frac{1}{\\beta}$$, and what's the quick way to derive it? (2 steps)", "answer": "- Step 1: $$\\frac{1}{\\alpha} + \\frac{1}{\\beta} = \\frac{\\alpha+\\beta}{\\alpha\\beta}$$. Combine over a common denominator: $$\\frac{\\beta + \\alpha}{\\alpha\\beta}$$.\n- Step 2: This is just the standard fraction addition — but the key insight is that both $$\\alpha+\\beta$$ and $$\\alpha\\beta$$ are available from Vieta's. So you never need to find the actual roots.\n\nNOT in the booklet.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "What matrix represents a stretch of scale factor $$k$$ parallel to the $$x$$-axis? What changes and what stays the same? (2 steps)", "answer": "- Step 1: $$\\begin{pmatrix}k&0\\\\0&1\\end{pmatrix}$$. The $$x$$-coordinates are multiplied by $$k$$; the $$y$$-coordinates are unchanged.\n- Step 2: The intuition: the first column is the image of $$\\begin{pmatrix}1\\\\0\\end{pmatrix}$$ (the unit $$x$$-vector), which becomes $$\\begin{pmatrix}k\\\\0\\end{pmatrix}$$. The second column is the image of $$\\begin{pmatrix}0\\\\1\\end{pmatrix}$$, which stays $$\\begin{pmatrix}0\\\\1\\end{pmatrix}$$.\n\nNOT in the booklet. For stretch parallel to the $$y$$-axis, it's $$\\begin{pmatrix}1&0\\\\0&k\\end{pmatrix}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": false}, {"question": "What matrix represents an anticlockwise rotation by angle $$\\theta$$ about the origin? How do you remember which entry is negative? (2 steps)", "answer": "- Step 1: $$\\begin{pmatrix}\\cos\\theta&-\\sin\\theta\\\\\\sin\\theta&\\cos\\theta\\end{pmatrix}$$. The negative sign is on $$\\sin\\theta$$ in the top-right.\n- Step 2: Memory aid: \"cos stays close to the diagonal\" (both diagonal entries are $$\\cos\\theta$$), and \"the negative sin goes to the opposite corner from where sin sits.\" Alternatively: the first column is the image of $$\\begin{pmatrix}1\\\\0\\end{pmatrix}$$ rotated by $$\\theta$$, which is $$\\begin{pmatrix}\\cos\\theta\\\\\\sin\\theta\\end{pmatrix}$$.\n\nNOT in the booklet.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "What matrix represents reflection in the line $$y = x\\tan\\theta$$? What's the pattern of signs? (2 steps)", "answer": "- Step 1: $$\\begin{pmatrix}\\cos 2\\theta&\\sin 2\\theta\\\\\\sin 2\\theta&-\\cos 2\\theta\\end{pmatrix}$$. Note: it's $$2\\theta$$ everywhere, the matrix is symmetric, and the bottom-right entry is **negative**.\n- Step 2: The signature pattern: a reflection matrix has determinant $$-1$$ (you can verify: $$-\\cos^2 2\\theta - \\sin^2 2\\theta = -1$$). The negative on the bottom-right is what makes the determinant negative. If you forget which entry is negative, compute the determinant — it must be $$-1$$.\n\nNOT in the booklet.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": false}, {"question": "What is the area scale factor under a linear transformation represented by matrix $$\\mathbf{M}$$? Why? (2 steps)", "answer": "- Step 1: The area scale factor is $$|\\det \\mathbf{M}|$$. The absolute value is needed because a negative determinant means orientation is reversed (e.g., reflection), but area is always positive.\n- Step 2: Intuition: the determinant measures how the unit square is transformed. $$\\det \\mathbf{M}$$ is the signed area of the image of the unit square; taking the absolute value gives the actual area scaling.\n\nNOT in the booklet.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": false}, {"question": "If transformation A is applied first, then transformation B, what's the composite matrix — $$\\mathbf{AB}$$ or $$\\mathbf{BA}$$? What's the memory trick? (2 steps)", "answer": "- Step 1: \"A then B\" = $$\\mathbf{BA}$$. The rightmost matrix acts first on the position vector: $$\\mathbf{BA}\\mathbf{v} = \\mathbf{B}(\\mathbf{A}\\mathbf{v})$$.\n- Step 2: Memory trick: read right-to-left. In $$\\mathbf{BA}\\mathbf{v}$$, $$\\mathbf{A}$$ hits $$\\mathbf{v}$$ first (rightmost operation), then $$\\mathbf{B}$$ hits the result. The order of application is the **reverse** of the order of writing.\n\nThis is the #1 composition-order trap. Computing $$\\mathbf{AB}$$ instead of $$\\mathbf{BA}$$ gives a completely different matrix.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "What's the linear interpolation formula for locating a root between $$x_1$$ and $$x_2$$? When do you use it? (2 steps)", "answer": "- Step 1: $$\\alpha \\approx x_1 + \\frac{|f(x_1)|}{|f(x_1)| + |f(x_2)|}(x_2 - x_1)$$. The fraction weights the step towards $$x_2$$ by how close $$f(x_1)$$ is to zero relative to the total sign-change magnitude.\n- Step 2: Use it when $$f(x_1)$$ and $$f(x_2)$$ have opposite signs (sign change = root between them), and you need a better approximation without calculus. It's a \"weighted midpoint\" — closer to the endpoint whose function value is nearer zero.\n\nNOT in the booklet.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": false}, {"question": "Exam strategy — What's the \"front-cover discipline\" rule, and what's the common trap? (2 steps)", "answer": "- Step 1: Read the rounding instruction in **each part of each question**. The front cover says \"3 significant figures unless otherwise stated\", but individual parts frequently override this (e.g., \"give your answer to 2 decimal places\").\n- Step 2: The trap: a single question can use different rounding in different parts (e.g., Q6 used both 2 dp and 3 dp). If you apply the front-cover default blindly, you lose accuracy marks. Always re-read the rounding clause.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": false}, {"question": "Exam strategy — What's the crucial difference between \"show that\" and \"find\" questions, and how does it affect your working? (2 steps)", "answer": "- Step 1: \"Show that\" means the answer is **given** — marks are for the **working**, not the result. You must show every algebraic step clearly; skipping lines loses marks even if the answer is correct.\n- Step 2: \"Find\" means the answer is **not given** — the result mark is independent. Even messy or partially incomplete working can earn the final-answer mark. But you still need enough working to show method.\n\nIn \"show that\"
