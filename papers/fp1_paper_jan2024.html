f(x_2)|}(x_2 - x_1)$$.\n\nThe intuition: you're finding where the straight line between $$(x_1, f(x_1))$$ and $$(x_2, f(x_2))$$ crosses the $$x$$-axis. The ratio $$\\frac{|f(x_1)|}{|f(x_1)| + |f(x_2)|}$$ tells you how far from $$x_1$$ the crossing point is, as a fraction of the interval width. If $$|f(x_1)|$$ is small relative to $$|f(x_2)|$$, the root is close to $$x_1$$.\n\nNOT in the booklet.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": false}, {"question": "What's the \"front-cover discipline\" for rounding in Edexcel exams, and what's the common mistake?", "answer": "Read the rounding instruction in **each part** of **each question**. The front cover says \"3 significant figures unless otherwise stated,\" but individual parts frequently override this — e.g., \"give your answer to 2 decimal places\" or \"give your answer as an exact fraction.\"\n\nThe common mistake: applying the default 3 sf throughout without re-reading each part's specific instruction. In Q6 of this paper, different parts used 2 dp and 3 dp within the same question. If you give 3 sf when 2 dp was requested, you lose the accuracy mark.\n\nThe rule: every time you start a new part, glance at its rounding instruction.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": false}, {"question": "What's the fundamental difference between \"show that\" and \"find\" questions in Edexcel exams, and how does it affect your working? (2 steps)", "answer": "- Step 1: **\"Show that\"** questions give you the answer. The marks are entirely for the **working** — you must demonstrate each step clearly, because the result is already known. Skipping lines or working backwards from the answer loses marks even if you arrive at the correct statement.\n- Step 2: **\"Find\"** questions don't give you the answer. The result mark is independent — even messy or unconventional working can earn the final-answer mark if the answer is correct. However, you still need enough working to show the method.\n\nStrategy: for \"show that,\" write every step explicitly. For \"find,\" focus on getting the right answer with enough working to show it's not a guess.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": false}, {"question": "Why should you prefer parametric over Cartesian forms when working with conics, and what's the specific advantage? (2 steps)", "answer": "- Step 1: Parametric forms (like $$(at^2, 2at)$$ for the parabola or $$(ct, c/t)$$ for the hyperbola) make the algebra **collapse** when computing tangents, normals, and intersections. The parameter $$t$$ encodes the point in one variable instead of two.\n- Step 2: The specific advantage: when the question gives you a parametric point $$P$$, use the parametric form for the other point $$Q$$ too. If you try to work in $$(x, y)$$-coordinates, you end up with $$y^2 = 4ax$$ substitutions that produce quadratics in $$x$$ — algebraically brutal compared to the linear-in-$$t$$ parametric approach.\n\nRule: if the question mentions a parametric point, stay in parametric form throughout. Never re-derive in Cartesian.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": false}, {"question": "What are the three meta-skills that the FP1 Jan 2024 paper rewards, and how do they manifest? (3 steps)", "answer": "- Step 1: **Formula-booklet awareness** — knowing which formulas are IN the booklet (so don't memorise them) and which are NOT (so you must). Q1 (det/inverse), Q4 (rotation/stretch matrices), and Q8 (knowing $$\\sum r^3$$ IS in the booklet) all hinge on this.\n- Step 2: **Structural discipline** — writing every required line, in the right order, with the right notation. Q2's cubic root count, Q4's composition order ($$\\mathbf{BA}$$ not $$\\mathbf{AB}$$), Q8's $$S(2n) - S(n-1)$$ off-by-one, and Q10's induction skeleton are all \"lose marks if you skip a line\" moments.\n- Step 3: **Discrimination of multiple algebraic candidates** — whenever an equation produces multiple solutions, checking which ones satisfy geometric/physical constraints. Q9 (which $$\\lambda$$ gives $$\\arg = \\pi/4$$?) and Q5 (sign of $$\\alpha + \\beta$$) demand checking sign and quadrant before committing.\n\nThe bottleneck isn't technique mastery — it's technique **reliability**: converting \"I know how\" into \"I do it in 4 minutes without errors.\"", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": true}, {"question": "What's the time guide per mark in Edexcel FP1, and how should you allocate time across questions?", "answer": "75 marks in 90 minutes ≈ 1.15 minutes per mark.\n\nAllocation: 9- and 10-mark questions (Q2, Q5, Q10) deserve 10–12 minutes each. 5- and 6-mark questions (Q1, Q3, Q9) deserve 5–7 minutes each.\n\nIf you're past your target time on a question, **MOVE ON** and come back. A partially attempted 10-mark question with 4 marks earned is better than a fully solved one that cost you 20 minutes and left no time for two 5-mark questions at the end.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": false}, {"question": "FP1 Jan 2024 Q8 — What's the \"simplifying fractions\" pitfall with $$6889/243$$, and what's the correct approach?", "answer": "$$6889 = 83^2$$ and $$243 = 3^5$$. There is **no common factor** between 83 and 3, so the fraction $$6889/243$$ cannot be simplified further. Leave it as is.\n\nThe pitfall: trying to simplify and getting confused, or worse, making an error that changes the value. In exam questions, if a fraction doesn't simplify obviously, it probably doesn't simplify at all. Check for common factors of the numerator and denominator; if none exist, state the fraction and move on.", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": false}, {"question": "FP1 Jan 2024 — When a question about conics asks for a coordinate and you've found a parameter like $$T = -83/9$$, what must you do before stating the final answer?", "answer": "Convert the parameter to the actual **coordinate**. The parameter is not the answer — it's an intermediate value used to find the coordinate.\n\nFor example, if the point is on a parabola with parametric form $$(at^2, 2at)$$ and you find $$t = -83/9$$, you must substitute back to get $$x = a(-83/9)^2$$ and $$y = 2a(-83/9)$$. Leaving $$T = -83/9$$ as the final answer loses the final mark because the question asks for the coordinate, not the parameter.\n\nThe parameter is a tool; the coordinate is the answer. Always finish the substitution.", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": false}, {"question": "FP1 Jan 2024 — For a cubic polynomial with real coefficients and one complex root $$\\alpha$$, how many roots does the cubic have in total, and why?", "answer": "Three roots in total (counting multiplicity).\n\nThe key: if $$\\alpha$$ is a root, then so is $$\\bar{\\alpha}$$ (the complex conjugate), because the polynomial has real coefficients. That's two roots. Since the polynomial is degree 3, there must be a **third root**, which must be real (because if it were complex, its conjugate would also be a root, giving four roots for a cubic — contradiction).\n\nCommon pitfall: assuming a cubic with a complex root has only that one complex root plus one real root (two roots total). You must count the conjugate. Degree = number of roots (fundamental theorem of algebra).", "source": "GLM 5.1 ③", "_id": "glm_3_45", "judge_pick": true}, {"question": "FP1 Jan 2024 — For \"show that $$ak^2 + bk + c > 0$$ for all real $$k$$,\" what method do you use, and what two conditions must hold? (2 steps)", "answer": "- Step 1: **Complete the square** (or use the discriminant method). Writing the quadratic in completed-square form: $$a(k + \\frac{b}{2a})^2 + (c - \\frac{b^2}{4a})$$.\n- Step 2: Two conditions: (i) $$a > 0$$ (leading coefficient positive, so the parabola opens upward), and (ii) the minimum value $$c - \\frac{b^2}{4a} > 0$$ (equivalently, discriminant $$b^2 - 4ac < 0$$, so no real roots and the quadratic never touches zero).\n\nIf both hold, the quadratic is always positive. The discriminant condition alone isn't sufficient — you also need to know the sign of $$a$$ (if $$a < 0$$, the parabola opens downward and the quadratic is always negative, not positive).", "source": "GLM 5.1 ③", "_id": "glm_3_46", "judge_pick": false}, {"question": "FP1 Jan 2024 Q9 — When an equation yields multiple algebraic solutions (like $$\\lambda = 3 \\pm \\sqrt{17}$$), what question must you always ask yourself before writing the final answer?", "answer": "\"Does the **geometric constraint** reject any of these candidates?\"\n\nSpecific checks:\n+ For $$\\arg z = \\theta$$: does each solution give the correct **quadrant** (signs of both $$x$$ and $$y$$)?\n+ For modulus constraints: does each solution give a positive modulus?\n+ For conic parameters: does each solution give a valid point on the curve (e.g., $$c > 0$$ in hyperbola $$xy = c^2$$)?\n+ For principal argument: is the value in $$(-\\pi, \\pi]$$?\n\nThe algebra produces all solutions to the equation you set up, but the original problem may impose additional constraints that eliminate some of them. Always check.", "source": "GLM 5.1 ③", "_id": "glm_3_47", "judge_pick": false}, {"question": "FP1 Jan 2024 — What's the parametric form for the rectangular hyperbola $$xy = c^2$$, and what's a quick way to verify it works?", "answer": "Parametric form: $$(ct, c/t)$$.\n\nQuick verification: $$x \\cdot y = ct \\cdot \\frac{c}{t} = c^2$$ ✓ (the $$t$$ cancels).\n\nNote: as $$t \\to 0^+$$, $$x \\to 0$$ and $$y \\to \\infty$$; as $$t \\to \\infty$$, $$x \\to \\infty$$ and $$y \\to 0$$. The parameter $$t$$ traces the curve smoothly. This is IN the booklet.", "source": "GLM 5.1 ③", "_id": "glm_3_48", "judge_pick": false}, {"question": "FP1 Jan 2024 — What's the parametric form for the parabola $$y^2 = 4ax$$, and what's a quick way to verify it works?", "answer": "Parametric form: $$(at^2, 2at)$$.\n\nQuick verification: $$y^2 = (2at)^2 = 4a^2t^2$$ and $$4ax = 4a \\cdot at^2 = 4a^2t^2$$. So $$y^2 = 4ax$$ ✓.\n\nThe parameter $$t$$ has a geometric meaning: it's related to the angle the tangent makes with the axis. This is IN the booklet.", "source": "GLM 5.1 ③", "_id": "glm_3_49", "judge_pick": false}, {"question": "FP1 Jan 2024 — What's the Newton–Raphson formula, and what are the two critical pitfalls?", "answer": "$$x_{n+1} = x_n - \\frac{f(x_n)}{f'(x_n)}$$.\n\nPitfall 1: **Radians vs degrees** — if the function involves trig, your calculator must be in radian mode. Using degrees gives wrong derivative values and the iteration diverges or converges to the wrong root.\n\nPitfall 2: **Rounding** — apply the rounding instruction only to the **final** answer in each part. Intermediate values should be carried at full calculator precision. If you round each $$x_n$$ before substituting into the next iteration, rounding errors accumulate and your final answer may be off.\n\nThis formula IS in the booklet.", "source": "GLM 5.1 ③", "_id": "glm_3_50", "judge_pick": false}, {"question": "FP1 Jan 2024 — What's the parametric form for the ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$, and what's the verification?", "answer": "Parametric form: $$(a\\cos\\theta, b\\sin\\theta)$$.\n\nVerification: $$\\frac{(a\\cos\\theta)^2}{a^2} + \\frac{(b\\sin\\theta)^2}{b^2} = \\cos^2\\theta + \\sin^2\\theta = 1$$ ✓.\n\nThe parameter $$\\theta$$ is NOT the angle from the origin to the point (that's a common misconception). It's an eccentric anomaly. This is IN the booklet.", "source": "GLM 5.1 ③", "_id": "glm_3_51", "judge_pick": false}, {"question": "FP1 Jan 2024 Q10 — In the inductive step of matrix induction, after computing $$\\mathbf{M}^{k+1} = \\mathbf{M}^k \\cdot \\mathbf{M}$$, what must each entry of the result match, and how do you verify it?", "answer": "Each entry of $$\\mathbf{M}^{k+1}$$ must match the corresponding entry of the proposition $$P(k+1)$$, i.e., the formula with $$k$$ replaced by $$k+1$$.\n\nFor the matrix $$\\begin{pmatrix} 2k+1 & -k \\\\ 4k & 1-2k \\end{pmatrix}$$, the $$(1,1)$$ entry of $$\\mathbf{M}^{k+1}$$ must equal $$2(k+1)+1 = 2k+3$$. You verify by computing: $$(2k+1)(3) + (-k)(4) = 6k+3-4k = 2k+3$$ ✓.\n\nCheck all four entries. If any entry doesn't match, either the algebra is wrong or the proposition is wrong. Each entry is a separate verification.", "source": "GLM 5.1 ③", "_id": "glm_3_52", "judge_pick": false}, {"question": "FP1 Jan 2024 — What's the \"induction skeleton\" that you should write out every time, and how long should it take?", "answer": "The 5-step skeleton:\n1. **Proposition**: \"Let $$P(n)$$ be the statement that...\"\n2. **Base case**: \"When $$n=1$$, LHS = ... , RHS = ... , so $$P(1)$$ is true.\"\n3. **Hypothesis**: \"Assume $$P(k)$$ is true for some $$k \\in \\mathbb{Z}^+$$.\"\n4. **Inductive step**: Show $$P(k) \\Rightarrow P(k+1)$$ algebraically.\n5. **Conclusion**: \"Since $$P(1)$$ is true and $$P(k) \\Rightarrow P(k+1)$$, by the principle of mathematical induction $$P(n)$$ holds for all $$n \\in \\mathbb{Z}^+$$.\"\n\nThis structure is worth 1–2 marks even when the algebra is shaky. Time target: **3 minutes** for the skeleton (before filling in the algebra). Memorise the conclusion sentence verbatim.", "source": "GLM 5.1 ③", "_id": "glm_3_53", "judge_pick": false}, {"question": "FP1 Jan 2024 Q8 — When you see \"hence\" connecting part (a) to part (b), what does it mean, and what's the penalty for ignoring it?", "answer": "\"Hence\" means you **must** use the result from part (a) to solve part (b). You're not allowed to start from scratch with a different method.\n\nIn Q8(b), \"hence show that $$\\sum_{r=n}^{2n} = \\ldots$$\" means you must use $$S(N) = \\frac{1}{2}N(N+1)^2(N+2)$$ from part (a) and compute $$S(2n) - S(n-1)$$. If you try to evaluate the sum from scratch (e.g., by expanding and using sum formulas directly with shifted limits), you may get the right answer but lose method marks.\n\n\"Hence\" = mandatory connection to previous work. \"Hence, or otherwise\" = preferred connection, but alternative methods accepted.", "source": "GLM 5.1 ③", "_id": "glm_3_54", "judge_pick": false}, {"question": "FP1 Jan 2024 — What's the bookkeeping trick for managing $$S(2n)$$ and $$S(n-1)$$ in restricted-limit sums, and why does it prevent errors?", "answer": "**Define a named function** $$S(N) = \\sum_{r=1}^{N} f(r)$$ with its closed form, then compute $$S(2n)$$ and $$S(n-1)$$ separately before subtracting.\n\nWhy it prevents errors:\n+ You substitute $$N = 2n$$ into the closed form carefully (not into the sum directly).\n+ You substitute $$N = n - 1$$ into the closed form carefully.\n+ Then you subtract: $$\\sum_{r=n}^{2n} = S(2n) - S(n-1)$$.\n\nWithout this structure, students try to manipulate the sum index directly and make off-by-one errors. The named function makes the substitution explicit and the subtraction clean. Write $$S(2n) = ...$$ and $$S(n-1) = ...$$ on separate lines before combining.", "source": "GLM 5.1 ③", "_id": "glm_3_55", "judge_pick": false}, {"question": "FP1 Jan 2024 Q9 — When rationalizing a complex fraction, why must you multiply by the conjugate of the **denominator** (not the numerator), and what goes wrong if you pick the wrong one?", "answer": "The goal of rationalizing is to make the **denominator real** so you can separate real and imaginary parts of $$z$$. Multiplying by the conjugate of the denominator achieves this: $$(a - bi)(a + bi) = a^2 + b^2$$ (real).\n\nIf you multiply by the conjugate of the **numerator** instead, the denominator stays complex, and you can't read off $$x$$ and $$y$$ in the form $$z = x + yi$$.\n\nIf you multiply by the same complex number as the denominator (not its conjugate), you get $$(\\lambda - 4i)^2$$ in the denominator — still complex, no progress.\n\nRule: always conjugate the **denominator** to rationalize. This is the standard technique, not in the booklet, and must be practised until reflexive.", "source": "GLM 5.1 ③", "_id": "glm_3_56", "judge_pick": false}, {"question": "FP1 Jan 2024 — What's the relationship between the sign of the discriminant and the nature of the roots, and how does this apply to \"show that\" positivity questions?", "answer": "For $$ax^2 + bx + c$$:\n+ $$b^2 - 4ac > 0$$: two distinct real roots (the quadratic crosses zero).\n+ $$b^2 - 4ac = 0$$: one repeated real root (the quadratic touches zero).\n+ $$b^2 - 4ac < 0$$: no real roots (the quadratic never crosses zero).\n\nFor \"show that $$ak^2 + bk + c > 0$$ for all $$k$$\": you need the quadratic to never cross zero AND open upward. So: $$a > 0$$ AND $$b^2 - 4ac < 0$$. The discriminant condition ensures no real roots; the sign of $$a$$ ensures the parabola is above the $$k$$-axis (not below it).", "source": "GLM 5.1 ③", "_id": "glm_3_57", "judge_pick": true}, {"question": "FP1 Jan 2024 — When solving for a parameter constrained by $$\\arg z = \\theta$$ for a specific angle, what's the general discrimination strategy? (3 steps)", "answer": "- Step 1: Set up the equation from $$\\tan(\\arg z) = \\tan\\theta$$, i.e., $$y/x = \\tan\\theta$$, and solve for the parameter. This gives all points on the line through the origin with gradient $$\\tan\\theta$$.\n- Step 2: **Check the quadrant**: $$\\arg z = \\theta$$ requires the point to be in the specific quadrant determined by $$\\theta$$. For $$\\theta = \\pi/4$$, need $$x > 0$$ and $$y > 0$$ (first quadrant). For $$\\theta = -\\pi/4$$, need $$x > 0$$ and $$y < 0$$ (fourth quadrant).\n- Step 3: **Reject** solutions that place the point in the wrong quadrant. For example, $$y/x = 1$$ gives points in both Q1 and Q3; only Q1 points have $$\\arg z = \\pi/4$$.\n\nThe tangent equation always gives two candidate quadrants (diametrically opposite). The argument constraint picks exactly one.", "source": "GLM 5.1 ③", "_id": "glm_3_58", "judge_pick": false}, {"question": "FP1 Jan 2024 — In divisibility induction, what's the wrong approach of \"subtracting $$f(k)$$ from $$f(k+1)$$,\" and why is it incomplete without the hypothesis?", "answer": "The approach: compute $$f(k+1) - f(k)$$ and show it's divisible by 7. This is **incomplete** on its own because showing the **difference** is divisible by 7 doesn't prove $$f(k+1)$$ is divisible by 7 — unless you also use the hypothesis that $$f(k)$$ is divisible by 7.\n\nThe correct logic: $$f(k+1) = f(k+1) - f(k) + f(k)$$. If both $$f(k+1) - f(k)$$ and $$f(k)$$ are divisible by 7, then $$f(k+1)$$ is divisible by 7. You must explicitly invoke the hypothesis.\n\nThe cleaner approach: express $$f(k+1) = A \\cdot f(k) + 7 \\cdot (\\text{integer})$$, which makes the use of the hypothesis transparent and earns the structure marks directly.", "source": "GLM 5.1 ③", "_id": "glm_3_59", "judge_pick": true}, {"question": "FP1 Jan 2024 — What does it mean for the principal argument to live in $$(-\\pi, \\pi]$$, and what's the edge case at the boundary?", "answer": "The principal argument $$\\arg z$$ is the unique angle in the interval $$(-\\pi, \\pi]$$ such that $$z = |z|(\\cos(\\arg z) + i\\sin(\\arg z))$$.\n\nThe interval is **half-open**: it includes $$\\pi$$ but excludes $$-\\pi$$. This is because $$\\pi$$ and $$-\\pi$$ represent the same direction (the negative real axis), and we must choose one. By convention, $$\\arg z = \\pi$$ for points on the negative real axis (not $$-\\pi$$).\n\nPractical implication: when checking quadrant constraints, a point on the negative real axis has $$\\arg z = \\pi$$, not $$-\\pi$$. A point just below the negative real axis (in Q3) has $$\\arg z$$ slightly greater than $$-\\pi$$, like $$-\\pi + \\epsilon$$.", "source": "GLM 5.1 ③", "_id": "glm_3_60", "judge_pick": true}, {"question": "FP1 Jan 2024 — What's the quick mental check for whether a factorization like $$(3n+1)(5n+4)$$ is correct?", "answer": "Multiply back and check three things:\n1. **First terms**: $$3n \\times 5n = 15n^2$$ ✓ (matches leading coefficient × $$n^2$$)\n2. **Last terms**: $$1 \\times 4 = 4$$ ✓ (matches constant term)\n3. **Cross terms**: $$3n \\times 4 + 5n \\times 1 = 12n + 5n = 17n$$ ✓ (matches middle coefficient × $$n$$)\n\nIf all three check out, the factorization is correct. The common mis-factoring $$(5n+1)(3n+4)$$ gives cross terms $$5n \\times 4 + 3n \\times 1 = 23n \\neq 17n$$ — caught immediately by the cross-term check.", "source": "GLM 5.1 ③", "_id": "glm_3_61", "judge_pick": true}, {"question": "FP1 Jan 2024 — When a conic question gives you a parametric point $$P$$, what's the strategic principle for handling the other point $$Q$$?", "answer": "**Always use the parametric form for both $$P$$ and $$Q$$**. If $$P$$ is given as $$(at_1^2, 2at_1)$$, express $$Q$$ as $$(at_2^2, 2at_2)$$ using a different parameter $$t_2$$.\n\nWhy: the parametric form reduces the problem to algebra in one variable ($$t$$) per point, rather than two variables ($$x, y$$). When you substitute into the conic equation, the parametric form is automatically satisfied (no need to check $$y^2 = 4ax$$), and tangent/normal equations become linear in $$t$$ instead of quadratic in $$x$$.\n\nThe pitfall: converting $$P$$ to Cartesian and then trying to find $$Q$$ in Cartesian. This produces $$y^2 = 4ax$$ substitutions that yield brutal quadratics. Stay parametric throughout.", "source": "GLM 5.1 ③", "_id": "glm_3_62", "judge_pick": true}, {"question": "FP1 Jan 2024 — For the sum $$\\sum_{r=1}^n r^3 = \\frac{1}{4}n^2(n+1)^2$$, what's the quick way to remember it, and what's the relationship to $$\\sum r$$?", "answer": "Notice that $$\\sum r^3 = \\left(\\sum r\\right)^2$$, since $$\\sum r = \\frac{1}{2}n(n+1)$$ and $$\\left(\\frac{1}{2}n(n+1)\\right)^2 = \\frac{1}{4}n^2(n+1)^2 = \\sum r^3$$.\n\nThis is a remarkable identity: the sum of the first $$n$$ cubes equals the square of the sum of the first $$n$$ integers. It's useful as a sanity check — if your computation of $$\\sum r^3$$ doesn't match $$(\\sum r)^2$$, something is wrong.\n\nThis IS in the booklet, so you don't need to memorise it. But knowing the relationship helps you spot errors.", "source": "GLM 5.1 ③", "_id": "glm_3_63", "judge_pick": false}, {"question": "FP1 Jan 2024 — What's the \"formula booklet awareness\" strategy, and how do you partition your memorisation effort?", "answer": "Partition your effort into two categories:\n\n**IN the booklet** (spend ZERO memorisation time): $$\\sum r$$, $$\\sum r^2$$, $$\\sum r^3$$, Newton–Raphson, parabola/hyperbola/ellipse parametric forms. Know these exist and where to find them, but don't drill them.\n\n**NOT in the booklet** (spend ALL memorisation time): $$\\det$$, matrix inverse, conjugate-pair quadratic factor, Vieta's, $$\\alpha^2 + \\beta^2$$ identity, stretch/rotation/reflection matrices, area scale factor = $$|\\det|$$, composition order \"A then B\" = $$\\mathbf{BA}$$, linear interpolation formula.\n\nThe technique (split-and-factor, $$S(b) - S(a-1)$$, rationalization, induction skeleton) is also NOT in the booklet — these must be rehearsed through practice.", "source": "GLM 5.1 ③", "_id": "glm_3_64", "judge_pick": true}, {"question": "FP1 Jan 2024 Q9(a) — When combining $$1 + \\frac{2(\\lambda + 5i)}{\\lambda - 4i}$$ into a single fraction, what's the common denominator trick, and what's the pitfall?", "answer": "Write 1 as $$\\frac{\\lambda - 4i}{\\lambda - 4i}$$, then: $$1 + \\frac{2(\\lambda + 5i)}{\\lambda - 4i} = \\frac{(\\lambda - 4i) + 2(\\lambda + 5i)}{\\lambda - 4i} = \\frac{3\\lambda + 6i}{\\lambda - 4i}$$.\n\nThe pitfall: expanding the numerator incorrectly. $$(\\lambda - 4i) + 2(\\lambda + 5i) = \\lambda - 4i + 2\\lambda + 10i = 3\\lambda + 6i$$, NOT $$3\\lambda + i$$ (forgetting to distribute the 2 to the $$5i$$ term).\n\nAfter this, divide by 3: $$3z = \\frac{3\\lambda + 6i}{\\lambda - 4i}$$ gives $$z = \\frac{\\lambda + 2i}{\\lambda - 4i}$$. The 3 cancels: $$\\frac{3(\\lambda + 2i)}{3(\\lambda - 4i)} = \\frac{\\lambda + 2i}{\\lambda - 4i}$$. Don't forget to simplify.", "source": "GLM 5.1 ③", "_id": "glm_3_65", "judge_pick": false}, {"question": "FP1 Jan 2024 — What's the general strategy for \"show that\" questions where the answer is given, and why can't you work backwards?", "answer": "The strategy: start from the LHS (or a known starting point) and derive the RHS step by step, showing all working.\n\nYou cannot work backwards (starting from the given answer and manipulating it) because: (a) the marks are for the **forward derivation**, and (b) working backwards can hide logical errors — you might perform a step that's irreversible (like squaring both sides), which doesn't prove the original statement.\n\nException: you CAN work backwards on scratch paper to figure out the approach, but your written solution must flow forward. The examiner needs to see: \"starting from X, by doing Y, I arrive at Z.\"", "source": "GLM 5.1 ③", "_id": "glm_3_66", "judge_pick": true}, {"question": "FP1 Jan 2024 — What's the relationship between the discriminant of $$15n^2 + 17n + 4$$ being a perfect square ($$49 = 7^2$$) and the factorizability over the integers?", "answer": "For a quadratic $$an^2 + bn + c$$ with integer coefficients, the discriminant $$\\Delta = b^2 - 4ac$$ determines factorizability:\n+ If $$\\Delta$$ is a perfect square, the roots are rational, so the quadratic factors over the integers (after clearing denominators).\n+ If $$\\Delta$$ is not a perfect square, the roots are irrational, and the quadratic doesn't factor nicely over the integers.\n\nHere, $$\\Delta = 49 = 7^2$$, so the roots are $$\\frac{-17 \\pm 7}{30}$$, giving $$n = \\frac{-10}{30} = -\\frac{1}{3}$$ and $$n = \\frac{-24}{30} = -\\frac{4}{5}$$. The factors are $$(n + \\frac{1}{3})$$ and $$(n + \\frac{4}{5})$$, which clear to $$(3n+1)(5n+4)$$ after multiplying by 3 and 5 respectively.\n\nChecking the discriminant first tells you whether factoring is worth attempting.", "source": "GLM 5.1 ③", "_id": "glm_3_67", "judge_pick": false}, {"question": "FP1 Jan 2024 — When the question says \"where $$a$$, $$b$$, $$c$$ and $$d$$ are integers to be determined,\" what must you do at the end of the problem?", "answer": "**State the values** of $$a$$, $$b$$, $$c$$, and $$d$$ explicitly. Don't leave them embedded in the factorized form without extraction.\n\nFor $$\\sum_{r=n}^{2n} r(2r+1)(r+1) = \\frac{1}{2}n(n+1)(3n+1)(5n+4)$$, you must write: $$a = 3$$, $$b = 1$$, $$c = 5$$, $$d = 4$$.\n\nThe question asks for integers \"to be determined\" — this is a specific instruction to identify and state them. Even if the factorization is correct, not stating the values loses the final mark. Note: since $$(3n+1)(5n+4) = (5n+4)(3n+1)$$, swapping $$a \\leftrightarrow c$$ and $$b \\leftrightarrow d$$ is also acceptable.", "source": "GLM 5.1 ③", "_id": "glm_3_68", "judge_pick": false}, {"question": "FP1 Jan 2024 — What's the \"reliability bottleneck\" identified in the pattern summary, and how does it change your revision strategy?", "answer": "The bottleneck isn't **knowing** how to do questions — it's doing them **reliably in 4 minutes without errors**. The difference between \"I know how\" and \"I do it correctly under time pressure\" is where marks are lost.\n\nRevision strategy shift: instead of learning new techniques, focus on:\n+ **Speed drills**: time yourself on each question type.\n+ **Error tracking**: log which specific errors recur (sign errors, off-by-one, forgotten steps) and create targeted flashcards for each.\n+ **Skeleton memorisation**: the structural parts of proofs (induction conclusion, proposition statement) should be automatic, freeing mental bandwidth for algebra.\n\nThe goal: convert \"I can do this given 15 minutes\" into \"I can do this in 5 minutes, first time, every time.\"", "source": "GLM 5.1 ③", "_id": "glm_3_69", "judge_pick": false}], "count": 70}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "What is the first step when expanding the summand in a summation problem like ∑r(2r+1)(r+1)? (3 steps)", "answer": "- Step 1: **Expand the product fully** into a polynomial:  \n$$r(2r+1)(r+1) = r(2r^2 + 3r + 1) = 2r^3 + 3r^2 + r$$  \n- Step 2: Apply standard summation formulas to each term:  \n$$\\sum 2r^3 = 2\\left(\\tfrac{1}{4}n^2(n+1)^2\\right),\\quad \\sum 3r^2 = 3\\left(\\tfrac{1}{6}n(n+1)(2n+1)\\right),\\quad \\sum r = \\tfrac{1}{2}n(n+1)$$  \n- Step 3: Factor out common terms (e.g., $\\tfrac{1}{2}n(n+1)$) to simplify algebra and factor the resulting quadratic.  \n\n**Takeaway:** Expanding ensures the sum can be split into standard forms, and factoring early prevents messy arithmetic.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why must you use $S(2n) - S(n-1)$ for $\\sum_{r=n}^{2n}$ instead of $S(2n) - S(n)$? (2 steps)", "answer": "- Step 1: The formula $\\sum_{r=a}^b = S(b) - S(a-1)$ ensures the **lower limit $r=n$ is included**.  \n- Step 2: Using $S(2n) - S(n)$ would **exclude $r=n$** because $S(n)$ includes up to $r=n$, but $S(n-1)$ excludes $r=n$, making the subtraction include $r=n$.  \n\n**Takeaway:** The off-by-one adjustment in $S(n-1)$ corrects the lower bound.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "What is the trigger phrase that forces you to use discriminant analysis when factoring quadratics like $15n^2 + 17n + 4$? (1 step)", "answer": "- Step 1: The phrase **\"factor explicitly\"** or **\"quadratic with non-integer roots\"** signals discriminant calculation:  \n$$\\Delta = 17^2 - 4(15)(4) = 289 - 240 = 49 = 7^2$$  \nSince $\\Delta$ is a perfect square, factor as $(3n+1)(5n+4)$.  \n\n**Takeaway:** Discriminant confirms factorability and guides coefficient splits.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "How do you rationalize a complex denominator like $\\lambda - 4i$ in $z = \\frac{\\lambda + 2i}{\\lambda - 4i}$? (3 steps)", "answer": "- Step 1: Multiply numerator and denominator by the **conjugate** $\\lambda + 4i$:  \n$$z = \\frac{(\\lambda + 2i)(\\lambda + 4i)}{(\\lambda - 4i)(\\lambda + 4i)}$$  \n- Step 2: Expand numerator:  \n$$(\\lambda^2 - 8) + 6\\lambda i$$  \n- Step 3: Simplify denominator:  \n$$\\lambda^2 + 16$$  \nFinal result:  \n$$z = \\frac{\\lambda^2 - 8}{\\lambda^2 + 16} + \\frac{6\\lambda}{\\lambda^2 + 16}i$$  \n\n**Takeaway:** Rationalization eliminates the imaginary component in the denominator.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "Why must you check both $x > 0$ and $y = x$ for $\\arg z = \\tfrac{\\pi}{4}$? (2 steps)", "answer": "- Step 1: $\\arg z = \\tfrac{\\pi}{4}$ requires **first quadrant** location, so $x > 0$ and $y > 0$.  \n- Step 2: Solving $y = x$ gives two solutions ($\\lambda = 3 \\pm \\sqrt{17}$), but only $\\lambda = 3 + \\sqrt{17}$ satisfies $x > 0$ and $y > 0$.  \n\n**Takeaway:** $\\tan(\\arg z) = 1$ has two solutions, but the principal argument discriminates by quadrant.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "What is the 5-step structure for proof by induction in matrix or divisibility problems? (5 steps)", "answer": "- Step 1: **Define proposition** $P(n)$ explicitly.  \n- Step 2: **Base case**: Verify $P(1)$ directly.  \n- Step 3: **Inductive hypothesis**: Assume $P(k)$ is true.  \n- Step 4: **Inductive step**: Derive $P(k+1)$ from $P(k)$ (e.g., matrix multiplication or algebraic manipulation).  \n- Step 5: **Conclusion**: \"Since $P(1)$ holds and $P(k) \\Rightarrow P(k+1)$, $P(n)$ is true for all $n \\in \\mathbb{Z}^+$.\"  \n\n**Takeaway:** Structure earns marks even if algebra is messy.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "Why is $\\mathbf{M}^{k+1} = \\mathbf{M}^k \\cdot \\mathbf{M}$ preferred over $\\mathbf{M} \\cdot \\mathbf{M}^k$ in induction? (1 step)", "answer": "- Step 1: The formula for $\\mathbf{M}^k$ matches the matrix order in $\\mathbf{M}^k \\cdot \\mathbf{M}$, simplifying multiplication. Reversing order ($\\mathbf{M} \\cdot \\mathbf{M}^k$) requires rechecking indices and increases error risk.  \n\n**Takeaway:** Matrix multiplication is associative but not commutative; follow the formula’s structure.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "How do you express $f(k+1)$ in terms of $f(k)$ for divisibility proofs like $8^{2n+1} + 6^{2n-1}$? (3 steps)", "answer": "- Step 1: Expand $f(k+1) = 64 \\cdot 8^{2k+1} + 36 \\cdot 6^{2k-1}$.  \n- Step 2: Rewrite $36 = 64 - 28$ to factor out $64f(k)$:  \n$$f(k+1) = 64f(k) - 28 \\cdot 6^{2k-1}$$  \n- Step 3: Factor 7:  \n$$= 7\\left(64m - 4 \\cdot 6^{2k-1}\\right)$$  \nSince $m$ and $6^{2k-1}$ are integers, $f(k+1)$ is divisible by 7.  \n\n**Takeaway:** Express $f(k+1)$ as a multiple of $f(k)$ plus a multiple of 7.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "What are the four formulas NOT in the FP1 booklet that you must memorize?", "answer": "- Determinant: $\\det\\begin{pmatrix}a&b\\\\c&d\\end{pmatrix} = ad - bc$  \n- Inverse: $\\begin{pmatrix}a&b\\\\c&d\\end{pmatrix}^{-1} = \\dfrac{1}{ad-bc}\\begin{pmatrix}d&-b\\\\-c&a\\end{pmatrix}$  \n- Complex conjugate quadratic: $z^2 - 2\\text{Re}(\\alpha)z + |\\alpha|^2$  \n- Matrix composition order: \"A then B\" = $\\mathbf{BA}$  \n\n**Takeaway:** Prioritize memorizing these over formulas in the booklet.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "What is the key difference between parametric and Cartesian approaches for conic questions?", "answer": "- Step 1: **Parametric** equations simplify algebra (e.g., tangents/normals at parameter $t$).  \n- Step 2: **Cartesian** methods often lead to messy substitutions (e.g., solving $y = mx + c$ with $y^2 = 4ax$).  \n\n**Takeaway:** Use parametric forms when given a parameter; avoid Cartesian unless forced.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}], "count": 10}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "What is the first step you must do before applying standard summation formulas to a product like $ r(2r+1)(r+1) $? (1 step)", "answer": "Expand the product fully to express it as a polynomial in $ r $. This allows applying standard results for $ \\sum r^k $, which only work for individual powers, not products.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Why must you factor out $ \\tfrac{1}{2}n(n+1) $ early in Q8(a)? (1 step)", "answer": "Factoring out common terms like $ \\tfrac{1}{2}n(n+1) $ simplifies the algebra by reducing the number of terms. For example, in Q8(a), this step combines all terms into a single expression with $ n(n+1) $ as a factor, making polynomial simplification manageable.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "How do you handle summation limits $ \\sum_{r=n}^{2n} $ in Q8(b)? (1 step)", "answer": "Use the identity $ \\sum_{r=n}^{2n} = S(2n) - S(n-1) $, where $ S(N) $ is the closed-form expression for $ \\sum_{r=1}^N $. This accounts for the inclusive lower limit $ r = n $; omitting $ S(n-1) $ instead of $ S(n) $ causes off-by-one errors.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "What discriminant check is required when factoring the quadratic $ 15n^2 + 17n + 4 $ in Q8(b)? (1 step)", "answer": "Compute the discriminant $ D = 17^2 - 4(15)(4) = 289 - 240 = 49 $, which is a perfect square. This confirms the quadratic factors into integer coefficients: $ (3n + 1)(5n + 4) $. A non-square discriminant would require leaving it unfactored.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Why does Q8's summation technique NOT appear in the formula booklet? (1 step)", "answer": "The booklet provides standard sums $ \\sum r, \\sum r^2, \\sum r^3 $, but NOT the method to split products into polynomials and recombine them. This strategy must be memorized separately.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "How do you rationalize a complex denominator like $ \\lambda - 4i $ in Q9(a)? (1 step)", "answer": "Multiply numerator and denominator by the conjugate $ \\lambda + 4i $. This eliminates the imaginary unit in the denominator since $ (\\lambda - 4i)(\\lambda + 4i) = \\lambda^2 + 16 $, a real number.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Why does solving $ \\arg z = \\tfrac{\\pi}{4} $ in Q9(b) require checking the sign of $ x $ and $ y $? (1 step)", "answer": "The condition $ \\arg z = \\tfrac{\\pi}{4} $ implies $ y = x $ AND $ x > 0 $ (first quadrant). Solving $ y = x $ alone gives two solutions (e.g., $ 3 \\pm \\sqrt{17} $), but only $ \\lambda = 3 + \\sqrt{17} $ satisfies $ x > 0 $, as $ \\lambda = 3 - \\sqrt{17} $ makes $ x < 0 $, placing $ z $ in the third quadrant with $ \\arg = -\\tfrac{3\\pi}{4} $.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "What structural elements must be included in an induction proof for Q10(i)? (5 steps)", "answer": "- Step 1: Define $ P(n) $ explicitly, e.g., \"Let $ P(n) $ be the statement $ \\mathbf{M}^n = \\text{[matrix]} $.\"  \n- Step 2: Verify the base case $ P(1) $ by direct computation.  \n- Step 3: Assume $ P(k) $ holds (inductive hypothesis).  \n- Step 4: Prove $ P(k+1) $ via matrix multiplication $ \\mathbf{M}^{k+1} = \\mathbf{M}^k \\cdot \\mathbf{M} $.  \n- Step 5: Conclude by induction: \"Since $ P(1) $ and $ P(k) \\Rightarrow P(k+1) $, $ P(n) $ holds for all $ n \\in \\mathbb{Z}^+ $.\"", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "How do you express $ f(k+1) $ in terms of $ f(k) $ for divisibility in Q10(ii)? (1 step)", "answer": "Rewrite $ f(k+1) = 64 \\cdot f(k) - 28 \\cdot 6^{2k-1} $. This exposes $ f(k+1) $ as a multiple of $ 64m $ (from $ f(k) = 7m $) and $ 28 \\cdot 6^{2k-1} $, both divisible by 7. Thus, $ f(k+1) = 7(\\text{integer}) $.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "Why is matrix multiplication order critical in Q10(i)'s inductive step? (1 step)", "answer": "Matrix multiplication is not commutative, so $ \\mathbf{M}^{k+1} $ must be formed by multiplying $ \\mathbf{M}^k \\cdot \\mathbf{M} $ (right-multiplication), not $ \\mathbf{M} \\cdot \\mathbf{M}^k $. While the result may coincidentally match for this matrix, the working must align with the proposition's structure.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "What common pitfall occurs when applying Q8's summation technique? (1 step)", "answer": "Forgetting that $ \\sum_{r=n}^{2n} $ includes $ r = n $, leading to $ S(2n) - S(n) $ instead of $ S(2n) - S(n-1) $. This omits the $ r = n $ term, causing a systematic error in the result.", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "How do you verify the quadratic factor in Q8(b)'s discriminant check? (1 step)", "answer": "After computing $ D = 49 $, check factor pairs of $ 15 \\times 4 = 60 $ that sum to 17 (e.g., 12 and 5). This gives $ (3n + 1)(5n + 4) $, confirmed by expanding $ 3n \\cdot 5n = 15n^2 $, $ 3n \\cdot 4 = 12n $, $ 1 \\cdot 5n = 5n $, $ 1 \\cdot 4 = 4 $, totaling $ 15n^2 + 17n + 4 $.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}, {"question": "What mistake occurs in Q9(a) when multiplying by the wrong conjugate? (1 step)", "answer": "Multiplying numerator and denominator by $ \\lambda - 4i $ (same as the original denominator) leaves the denominator complex, as $ (\\lambda - 4i)^2 $ introduces an imaginary term. The correct conjugate $ \\lambda + 4i $ ensures cancellation of the imaginary unit.", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": false}, {"question": "Why does Q10's induction conclusion require a verbatim statement? (1 step)", "answer": "Edexcel awards a mark for writing the conclusion sentence explicitly: \"By induction, $ P(n) $ holds for all $ n \\in \\mathbb{Z}^+ $.\" Omitting this, even with correct algebra, loses a structural mark.", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "What is the key algebraic trick in Q10(ii)'s inductive step? (1 step)", "answer": "Express $ 36 $ as $ 64 - 28 $ to factor out $ 64 \\cdot f(k) $. This allows grouping $ f(k+1) = 64f(k) - 28 \\cdot 6^{2k-1} $, revealing divisibility by 7 through factoring $ 7(\\text{expression}) $.", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": false}, {"question": "How does Q8(a)'s expansion strategy prevent errors? (1 step)", "answer": "Expanding $ r(2r+1)(r+1) $ into $ 2r^3 + 3r^2 + r $ before summing ensures each term aligns with standard formulas. Attempting to sum products directly (e.g., $ \\sum r(2r+1) $) leads to incorrect intermediate steps.", "source": "Qwen 3 ②", "_id": "qwen_2_15", "judge_pick": false}, {"question": "What visual intuition applies to $ \\arg z = \\tfrac{\\pi}{4} $ in Q9? (1 step)", "answer": "$ \\arg z = \\tfrac{\\pi}{4} $ corresponds to the line $ y = x $ in the first quadrant. Points on this line have equal positive real and imaginary parts, distinguishing it from the line $ y = x $ in the third quadrant (principal argument $ -\\tfrac{3\\pi}{4} $).", "source": "Qwen 3 ②", "_id": "qwen_2_16", "judge_pick": false}, {"question": "What is the off-by-one risk in Q8(b)'s summation? (1 step)", "answer": "Using $ S(2n) - S(n) $ instead of $ S(2n) - S(n-1) $ excludes the term $ r = n $, leading to an incorrect lower limit. The subtraction $ S(2n) - S(n-1) $ ensures all terms from $ r = n $ to $ r = 2n $ are included.", "source": "Qwen 3 ②", "_id": "qwen_2_17", "judge_pick": false}], "count": 18}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "For the summation $$\\sum_{r=n}^{2n} r(2r+1)(r+1)$$, what is the key formula relating this to the cumulative sum function $S(N)$? (1 step)", "answer": "- The formula is: $$\\sum_{r=n}^{2n} = S(2n) - S(n-1)$$\n+ This is because $S(N) = \\sum_{r=1}^N$ includes all terms from $r=1$ to $N$\n+ To get from $r=n$ to $2n$, subtract everything up to $r=n-1$\n- Note: It is $S(n-1)$, NOT $S(n)$ — the term at $r=n$ is included in the final answer.\n\n**Takeaway:** The lower limit $r=n$ means you must exclude terms 1 through $n-1$.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "After computing $S(2n) - S(n-1)$ for the restricted sum, what strategic simplification makes the algebra much cleaner? (2 steps)", "answer": "- Step 1: Compute each term:\n$$S(2n) = 2n(n+1)(2n+1)^2$$\n$$S(n-1) = \\tfrac{1}{2}n^2(n-1)(n+1)$$\n- Step 2: Factor out $\\frac{n(n+1)}{2}$ from both terms BEFORE subtracting:\n$$\\sum_{r=n}^{2n} = \\frac{n(n+1)}{2}\\big[\\,4(2n+1)^2 - n(n-1)\\,\\big]$$\n+ This avoids expanding everything fully and keeps the quadratic factored form visible\n- Step 3: Expand the bracket carefully: $= \\frac{n(n+1)}{2}(15n^2 + 17n + 4)$\n\n**Takeaway:** Always factor out the greatest common factor early — it reduces algebraic errors dramatically.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "How do you factor the quadratic $15n^2 + 17n + 4$ to verify it equals $(3n+1)(5n+4)$? What check prevents mis-factoring? (2 steps)", "answer": "- Step 1: Compute the discriminant: $$\\Delta = 17^2 - 4(15)(4) = 289 - 240 = 49 = 7^2$$\n+ Since 49 is a perfect square, the quadratic factors into linear terms with integer coefficients.\n- Step 2: Find the factors: $(3n+1)(5n+4)$ gives $15n^2 + 12n + 5n + 4 = 15n^2 + 17n + 4$ ✓\n- Step 3: The common mis-memorization is $(5n+1)(3n+4)$ — always multiply back to check:\n$$(5n+1)(3n+4) = 15n^2 + 20n + 3n + 4 = 15n^2 + 23n + 4 \\neq 15n^2 + 17n + 4$$\n\n**Takeaway:** When factoring with integer coefficients, check the discriminant first; then always verify by FOILing.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "When solving the complex equation $$\\frac{3z-1}{2} = \\frac{\\lambda+5i}{\\lambda-4i}$$ for $z$ in terms of $\\lambda$, what is the FIRST algebraic operation to perform and why? (3 steps)", "answer": "- Step 1: Clear the denominator by multiplying both sides by 2:\n$$3z - 1 = \\frac{2(\\lambda + 5i)}{\\lambda - 4i}$$\n- Step 2: Add 1 to both sides to isolate $3z$:\n$$3z = 1 + \\frac{2(\\lambda + 5i)}{\\lambda - 4i}$$\n- Step 3: Combine into a single fraction using the common denominator $(\\lambda - 4i)$:\n$$3z = \\frac{(\\lambda - 4i) + 2(\\lambda + 5i)}{\\lambda - 4i} = \\frac{3\\lambda + 6i}{\\lambda - 4i}$$\n+ Then $z = \\frac{3\\lambda + 6i}{3(\\lambda - 4i)} = \\frac{\\lambda + 2i}{\\lambda - 4i}$\n\n**Takeaway:** Clear all fractions first — combine terms over a common denominator before separating real and imaginary parts.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "After obtaining $$z = \\frac{\\lambda + 2i}{\\lambda - 4i}$$, what is the correct rationalization technique to express $z$ in the form $x + yi$? (3 steps)", "answer": "- Step 1: Multiply numerator and denominator by the conjugate of the denominator: $\\lambda + 4i$\n$$z = \\frac{(\\lambda + 2i)(\\lambda + 4i)}{(\\lambda - 4i)(\\lambda + 4i)}$$\n- Step 2: Simplify the denominator using $i^2 = -1$:\n$$(\\lambda - 4i)(\\lambda + 4i) = \\lambda^2 - (4i)^2 = \\lambda^2 - (-16) = \\lambda^2 + 16$$\n- Step 3: Expand the numerator:\n$$(\\lambda + 2i)(\\lambda + 4i) = \\lambda^2 + 4i\\lambda + 2i\\lambda + 8i^2 = \\lambda^2 + 6\\lambda i - 8$$\n+ So $z = \\frac{(\\lambda^2 - 8) + 6\\lambda i}{\\lambda^2 + 16}$\n\n**Takeaway:** Multiply by the conjugate of the denominator, NOT by the conjugate of the numerator — that would undo your work.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "Given $z = \\frac{\\lambda^2 - 8}{\\lambda^2 + 16} + i\\frac{6\\lambda}{\\lambda^2 + 16}$, what equation do you set up to find $\\arg z = \\frac{\\pi}{4}$? What TWO conditions must be satisfied? (2 steps)", "answer": "- Step 1: For $\\arg z = \\frac{\\pi}{4}$, we need $\\tan(\\arg z) = 1$, which gives:\n$$\\frac{y}{x} = 1 \\Rightarrow y = x$$\n+ This gives: $6\\lambda = \\lambda^2 - 8$\n- Step 2: BUT $\\arg z = \\frac{\\pi}{4}$ specifically means the point is in the FIRST quadrant, so you must have BOTH:\n$$x > 0 \\text{ AND } y > 0$$\n+ The denominator $\\lambda^2 + 16$ is always positive, so check the numerators\n+ The condition $y = x$ alone allows $\\arg = \\frac{\\pi}{4}$ OR $\\arg = -\\frac{3\\pi}{4}$ — only the sign check distinguishes them\n\n**Takeaway:** $\\tan(\\arg z) = 1$ has two solutions per period; you need the quadrant check to get the principal argument.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "Solving $6\\lambda = \\lambda^2 - 8$ gives $\\lambda = 3 \\pm \\sqrt{17}$. Which value must be rejected and why? (2 steps)", "answer": "- Step 1: Compute approximate values:\n$$\\lambda = 3 + \\sqrt{17} \\approx 7.12$$\n$$\\lambda = 3 - \\sqrt{17} \\approx -1.12$$\n- Step 2: For $\\lambda = 3 + \\sqrt{17}$:\n+ $y = \\frac{6\\lambda}{\\lambda^2 + 16} > 0$ ✓\n+ $x = \\frac{\\lambda^2 - 8}{\\lambda^2 + 16} > 0$ ✓\n+ So $\\arg z = \\frac{\\pi}{4}$\n- Step 3: For $\\lambda = 3 - \\sqrt{17}$:\n+ $y = \\frac{6\\lambda}{\\lambda^2 + 16} < 0$ (negative)\n+ This puts $z$ in the fourth quadrant, so $\\arg z = -\\frac{3\\pi}{4}$, not $\\frac{\\pi}{4}$\n- Therefore reject $\\lambda = 3 - \\sqrt{17}$\n\n**Takeaway:** Always check the sign of both $x$ and $y$ when solving argument constraints — the algebraic solution may include extraneous quadrant cases.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "In a proof by induction for the matrix statement $$\\begin{pmatrix} 3 & -1 \\\\ 4 & -1 \\end{pmatrix}^{\\!n} = \\begin{pmatrix} 2n+1 & -n \\\\ 4n & 1-2n \\end{pmatrix}$$, what is the correct multiplication order for the inductive step, and why? (3 steps)", "answer": "- Step 1: Write the hypothesis for some $k \\in \\mathbb{Z}^+$:\nAssume $P(k)$ is true: $\\mathbf{M}^k = \\begin{pmatrix} 2k+1 & -k \\\\ 4k & 1-2k \\end{pmatrix}$\n- Step 2: Multiply by $\\mathbf{M}$ on the RIGHT (not left):\n$$\\mathbf{M}^{k+1} = \\mathbf{M}^k \\cdot \\mathbf{M} = \\begin{pmatrix} 2k+1 & -k \\\\ 4k & 1-2k \\end{pmatrix}\\begin{pmatrix} 3 & -1 \\\\ 4 & -1 \\end{pmatrix}$$\n+ This is easier because the formula you want to prove has $k+1$ in the positions of the current $k$\n- Step 3: Compute entry-by-entry:\n+ $(1,1): (2k+1)(3) + (-k)(4) = 2k+3 = 2(k+1)+1$\n+ $(1,2): (2k+1)(-1) + (-k)(-1) = -(k+1)$\n+ $(2,1): (4k)(3) + (1-2k)(4) = 4(k+1)$\n+ $(2,2): (4k)(-1) + (1-2k)(-1) = 1-2(k+1)$\n\n**Takeaway:** Multiply by $\\mathbf{M}$ on the right to get $k+1$ in the result; multiplying on the left also works (commutes) but the entry computation is less intuitive.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "For the induction proof that $f(n) = 8^{2n+1} + 6^{2n-1}$ is divisible by 7, what is the key strategic step in the inductive step? (3 steps)", "answer": "- Step 1: Write $f(k+1)$ in terms of $f(k)$:\n$$f(k+1) = 8^{2k+3} + 6^{2k+1} = 64 \\cdot 8^{2k+1} + 36 \\cdot 6^{2k-1}$$\n- Step 2: Express 36 as $64 - 28$ (so 28 = 7 × 4):\n$$f(k+1) = 64\\cdot 8^{2k+1} + (64 - 28)\\cdot 6^{2k-1}$$\n- Step 3: Factor out $64$:\n$$f(k+1) = 64\\big(8^{2k+1} + 6^{2k-1}\\big) - 28\\cdot 6^{2k-1}$$\n$$= 64 \\cdot f(k) - 28 \\cdot 6^{2k-1}$$\n$$= 7\\big(64m - 4\\cdot 6^{2k-1}\\big)$$\n\n**Takeaway:** The crucial move is writing $f(k+1)$ as (integer) × $f(k)$ + 7×(integer) — this explicitly shows divisibility by 7.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "In induction proofs, what five components must be written to earn full structure marks, and which one is commonly lost? (1 step)", "answer": "The five components are:\n1. **Proposition:** \"Let $P(n)$ be the statement that...\"\n2. **Base case:** Verify $P(1)$ directly (or $P(0)$ if needed)\n3. **Hypothesis:** \"Assume $P(k)$ is true for some $k \\in \\mathbb{Z}^+$\"\n4. **Inductive step:** Show algebraically that $P(k) \\Rightarrow P(k+1)$\n5. **Conclusion:** \"Since $P(1)$ is true and $P(k) \\Rightarrow P(k+1)$, by the principle of mathematical induction, $P(n)$ holds for all $n \\in \\mathbb{Z}^+$\"\n\n**Commonly lost:** The explicit conclusion sentence — many students state \"therefore true for all $n$\" but lose the mark for not stating the full formal conclusion.\n\n**Takeaway:** Write the conclusion sentence verbatim — it's a guaranteed mark if your induction logic is sound.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "What is the trigger phrase in the exam that tells you to use the $S(2n) - S(n-1)$ technique instead of a direct summation? (1 step)", "answer": "The trigger phrase is \"restricted limits\" or a summation with a lower limit other than 1, such as:\n- $\\sum_{r=n}^{2n}$\n- $\\sum_{r=5}^{n}$\n- $\\sum_{r=a}^{b}$ where $a \\neq 1$\n\nThe technique is: define $S(N) = \\sum_{r=1}^{N}$, then compute $S(\\text{upper}) - S(\\text{lower} - 1)$.\n\n**Takeaway:** Any summation not starting at $r=1$ is a signal to use the cumulative sum subtraction method.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "In the matrix induction problem, why is it important to verify the base case $n=1$ directly rather than just assuming the formula works? (1 step)", "answer": "- The base case establishes that the proposition is TRUE for the smallest value\n- For $n=1$: $\\mathbf{M}^1 = \\begin{pmatrix} 3 & -1 \\\\ 4 & -1 \\end{pmatrix}$ must equal $\\begin{pmatrix} 2(1)+1 & -1 \\\\ 4(1) & 1-2(1) \\end{pmatrix} = \\begin{pmatrix} 3 & -1 \\\\ 4 & -1 \\end{pmatrix}$ ✓\n- Skipping the base case loses an automatic mark\n- More importantly, if the base case fails, the entire induction is invalid — it serves as the foundation\n\n**Takeaway:** Always compute the base case directly from the left-hand side of what you're proving.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "For the complex rationalization $$z = \\frac{\\lambda + 2i}{\\lambda - 4i}$$, what happens if you multiply by $\\lambda - 4i$ instead of $\\lambda + 4i$, and why is this a common error? (1 step)", "answer": "- If you multiply by $\\lambda - 4i$ (the same as the denominator), you get:\n$$z = \\frac{(\\lambda + 2i)(\\lambda - 4i)}{(\\lambda - 4i)^2}$$\n+ This leaves a complex denominator $(\\lambda - 4i)^2 = (\\lambda^2 - 8\\lambda i - 16)$, making the separation into $x + yi$ much harder\n- The error occurs because students confuse \"multiply by the denominator's conjugate\" with \"multiply by something that looks like the denominator\"\n- The correct conjugate always has the opposite sign on the imaginary part: for $a - bi$, use $a + bi$\n\n**Takeaway:** The conjugate always flips the sign of the imaginary part only — $a - bi \\rightarrow a + bi$.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "In the summation proof, what is the significance of factoring out $\\frac{1}{2}n(n+1)$ at this step: $$\\frac{1}{2}n^2(n+1)^2 + \\frac{1}{2}n(n+1)(2n+1) + \\frac{1}{2}n(n+1)$$ and what does this illustrate about effective algebraic manipulation? (2 steps)", "answer": "- Step 1: Each term has a common factor of $\\frac{1}{2}n(n+1)$:\n$$\\frac{1}{2}n(n+1)\\big[\\,n(n+1) + (2n+1) + 1\\,\\big]$$\n- Step 2: This reduces three terms to one factored form, making the next steps cleaner:\n$$= \\frac{1}{2}n(n+1)(n^2 + 3n + 2)$$\n$$= \\frac{1}{2}n(n+1)(n+1)(n+2)$$\n$$= \\frac{1}{2}n(n+1)^2(n+2)$$\n\n**Takeaway:** Factoring early reveals the hidden structure $(n+1)(n+2) = n^2 + 3n + 2$; expanding too early hides this and causes more algebra errors.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "When the question asks to \"show that\" a result is true (like in part (a) of Q8), where do the marks actually come from? (1 step)", "answer": "- The marks are awarded for the WORKING, not the result\n- Even if you already know the answer from memory, you must show each step:\n+ Expand the summand\n+ Apply each summation formula correctly\n+ Factor at each stage\n+ State the final result\n- Conversely, when the answer is NOT given (like finding $\\lambda$), you can still earn the final answer mark even with messy working\n\n**Takeaway:** \"Show that\" questions test your ability to demonstrate the algebraic journey, not your ability to recall the destination.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "What is the mnemonic or check to remember the correct composition order for matrix transformations, and what happens if you get it wrong? (1 step)", "answer": "- Mnemonic: \"A then B = BA\" — the rightmost matrix acts first\n- For transformations: if you apply A first, then B, the combined matrix is BA\n- If you compute AB instead, you apply B first, then A — the opposite of what the question asks\n- Example: Q4 likely tested \"reflection THEN rotation\" which requires $\\mathbf{R} \\cdot \\mathbf{M}$ not $\\mathbf{M} \\cdot \\mathbf{R}$\n\n**Takeaway:** The order matters and is non-commutative — always write the transformation matrices in the order they are applied, reading right-to-left.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": true}, {"question": "In the divisibility induction $f(n) = 8^{2n+1} + 6^{2n-1}$, why must you rewrite $6^{2k+1}$ as $36 \\cdot 6^{2k-1}$ rather than $6 \\cdot 6^{2k}$? (1 step)", "answer": "- The hypothesis gives you $f(k) = 8^{2k+1} + 6^{2k-1}$ — notice the exponent on 6 is $2k-1$\n- To factor out $f(k)$, you need the same exponents: $8^{2k+1}$ and $6^{2k-1}$\n- $6^{2k+1} = 6^{2k-1} \\cdot 6^2 = 36 \\cdot 6^{2k-1}$ ✓\n- Using $6 \\cdot 6^{2k}$ would give $6^{2k+1}$ but wouldn't match the $6^{2k-1}$ term in $f(k)$\n\n**Takeaway:** Index manipulation must preserve the base form from the hypothesis — match exponents exactly when rewriting.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "For $\\arg z = \\frac{\\pi}{4}$, why is it insufficient to just state $y = x$ without the $x > 0$ condition? (1 step)", "answer": "- The equation $y = x$ describes a line through the origin with slope 1\n- This line passes through TWO quadrants: the first quadrant (where $\\arg = \\frac{\\pi}{4}$) and the third quadrant (where $\\arg = \\frac{5\\pi}{4}$ or equivalently $-\\frac{3\\pi}{4}$)\n- Since principal argument must satisfy $-\\pi < \\arg z \\leq \\pi$, the third quadrant case is $\\arg = -\\frac{3\\pi}{4}$, not $\\frac{\\pi}{4}$\n- The condition $x > 0$ (and equivalently $y > 0$) selects ONLY the first quadrant\n\n**Takeaway:** Every argument constraint requires both the tangent equation AND quadrant verification.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": true}, {"question": "In the summation problem, if you mistakenly used $S(2n) - S(n)$ instead of $S(2n) - S(n-1)$, what would be the algebraic consequence? (1 step)", "answer": "- Using $S(2n) - S(n)$ would exclude the term at $r=n$ from your sum\n- Your result would be missing exactly one term: at $r = n$, the summand is $n(2n+1)(n+1) = n(n+1)(2n+1)$\n- So your answer would be short by $n(n+1)(2n+1)$\n- The correct answer is $\\frac{1}{2}n(n+1)(3n+1)(5n+4)$, but with the error you'd get this minus $n(n+1)(2n+1)$\n\n**Takeaway:** Off-by-one errors are common and devastating — always verify your lower limit carefully: include $r=n$ means exclude up to $r=n-1$.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "What are the three summation formulas from the formula booklet that you need for Q8(a), and what is the fourth formula that's NOT in the booklet but needed for this type of problem? (1 step)", "answer": "- IN the booklet:\n+ $\\sum_{r=1}^n r = \\frac{1}{2}n(n+1)$\n+ $\\sum_{r=1}^n r^2 = \\frac{1}{6}n(n+1)(2n+1)$\n+ $\\sum_{r=1}^n r^3 = \\frac{1}{4}n^2(n+1)^2$\n- NOT in the booklet (must memorize):\n+ The technique for restricted sums: $\\sum_{r=a}^b = S(b) - S(a-1)$\n\n**Takeaway:** You don't need to memorize the power summation formulas — they're in the booklet. But you MUST memorize when and how to use the subtraction technique.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "When rationalizing $\\frac{\\lambda + 2i}{\\lambda - 4i}$, what is special about the denominator $\\lambda^2 + 16$ that simplifies the final form of $x$ and $y$? (1 step)", "answer": "- The denominator $\\lambda^2 + 16$ is always POSITIVE for all real $\\lambda$\n+ Since $\\lambda^2 \\geq 0$, we have $\\lambda^2 + 16 \\geq 16 > 0$\n- This means the sign of $x$ and $y$ depends entirely on their numerators:\n+ $x = \\frac{\\lambda^2 - 8}{\\lambda^2 + 16}$ has the sign of $\\lambda^2 - 8$\n+ $y = \\frac{6\\lambda}{\\lambda^2 + 16}$ has the sign of $\\lambda$\n- The positivity of the denominator also means we can directly compare numerators when checking $x > 0$ or $y > 0$\n\n**Takeaway:** Always check the sign of denominators when analyzing complex numbers — it determines quadrant behavior.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "In matrix induction, if you computed $\\mathbf{M} \\cdot \\mathbf{M}^k$ instead of $\\mathbf{M}^k \\cdot \\mathbf{M}$, would the result be the same? Why might this still lose marks? (1 step)", "answer": "- For this specific matrix, $\\mathbf{M}^k \\cdot \\mathbf{M} = \\mathbf{M} \\cdot \\mathbf{M}^k$ because matrix multiplication is associative: $(\\mathbf{M}^k) \\mathbf{M} = \\mathbf{M}^k \\mathbf{M}^1$\n- However, the working must MATCH what you claim to be doing\n- If you write \"$\\mathbf{M}^{k+1} = \\mathbf{M} \\cdot \\mathbf{M}^k$\" but then compute using the rows of $\\mathbf{M}^k$ (the right-factor method), the algebra still works\n- The mark loss comes from inconsistency between your statement and your computation — examiners check that your matrix multiplication follows your notation\n\n**Takeaway:** Either order works mathematically, but pick one and be consistent throughout your working.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "What is the trigger phrase that tells you to check both solutions of a quadratic when solving for an argument condition? (1 step)", "answer": "The trigger is any problem that asks for a SPECIFIC argument value like:\n- \"find $\\lambda$ such that $\\arg z = \\frac{\\pi}{4}$\" (not $\\arg z = \\frac{5\\pi}{4}$)\n- \"find the principal argument\"\n- Any time $\\tan(\\arg z)$ equals a specific value (1, -1, $\\sqrt{3}$, etc.)\n\nThe algebraic equation $\\tan(\\arg z) = \\text{value}$ always has two solutions per period — you must use the geometric constraint to discriminate.\n\n**Takeaway:** \"Find the values\" (plural) is a hint that multiple algebraic solutions exist and need filtering.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "In part (b) of Q8, after deriving $\\frac{n(n+1)}{2}(15n^2 + 17n + 4)$, what is the very next algebraic step before identifying $a, b, c, d$? (1 step)", "answer": "- The next step is to FACTOR the quadratic $15n^2 + 17n + 4$ into $(3n+1)(5n+4)$\n- This factorization is essential because the answer form is $\\frac{1}{2}n(n+1)(an+b)(cn+d)$\n- Without factoring, you cannot identify the integer coefficients $a, b, c, d$\n- The factorization gives $a=3, b=1, c=5, d=4$ (or with $a$ and $c$ swapped, which is mathematically equivalent)\n\n**Takeaway:** Always factor when the final form expects factored factors — the coefficients $a, b, c, d$ require explicit factors.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "Why is the conclusion sentence in an induction proof considered a \"structure mark\" that should be memorized verbatim? (1 step)", "answer": "- The conclusion sentence formally links the base case and inductive step to the claim for all positive integers\n- Edexcel awards a specific mark for writing something equivalent to: \"Since $P(1)$ is true and $P(k) \\Rightarrow P(k+1)$, by the principle of mathematical induction, $P(n)$ holds for all $n \\in \\mathbb{Z}^+$\"\n- This is a logic check — it proves you understand that both the base case AND the inductive step are necessary\n- Students who skip this lose a guaranteed mark even with perfect algebra\n\n**Takeaway:** The conclusion is not optional — it's the formal statement that the induction principle has been applied correctly.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "In the complex number part (b), the equation $6\\lambda = \\lambda^2 - 8$ produces a quadratic. What is the discriminant and what does it tell you about the factorization? (1 step)", "answer": "- The quadratic is $\\lambda^2 - 6\\lambda - 8 = 0$\n- The discriminant is: $\\Delta = (-6)^2 - 4(1)(-8) = 36 + 32 = 68$\n- Since 68 is not a perfect square, the solutions are $3 \\pm \\sqrt{17}$ (irrational)\n- However, this doesn't prevent the quadratic from factoring over integers in the original $15n^2 + 17n + 4$ — that's a DIFFERENT quadratic from the $\\lambda$ problem\n\n**Takeaway:** The discriminant tells you whether roots are rational (perfect square) or irrational — but both cases are solvable and acceptable in the answer.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "For the summation $\\sum_{r=1}^n r(2r+1)(r+1)$, what is the quickest way to verify your expanded form $2r^3 + 3r^2 + r$ is correct? (1 step)", "answer": "- Test with a small value, say $n=1$:\n+ Original: $r(2r+1)(r+1) = 1(2+1)(2) = 1 \\times 3 \\times 2 = 6$\n+ Expanded: $2(1)^3 + 3(1)^2 + 1 = 2 + 3 + 1 = 6$ ✓\n- Test $n=2$: $1 \\cdot 3 \\cdot 2 + 2 \\cdot 5 \\cdot 3 = 6 + 30 = 36$\n+ Expanded sum: $(2+3+1) + (16+12+2) = 6 + 30 = 36$ ✓\n\n**Takeaway:** Quick sanity checks with small $n$ catch algebraic expansion errors before you proceed to the summation formulas.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "In the matrix induction, the entry $(2,1)$ computes to $4k + 4$. How does this equal $4(k+1)$ and why is this form important? (1 step)", "answer": "- $4k + 4 = 4(k+1)$ by factoring out the common factor 4\n- This form is important because the proposition states that the $(2,1)$ entry should be $4n$ where $n$ is the power\n- For $\\mathbf{M}^{k+1}$, we need $4(k+1)$, not $4k + 4$\n- The factored form $4(k+1)$ directly matches the pattern in the proposition: the entry equals $4 \\times \\text{power}$\n\n**Takeaway:** Always express your result in the same structural form as the proposition — this makes it trivial to verify $P(k+1)$.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "What two specific things should you check when reading the front cover of the FP1 exam paper regarding numerical precision? (1 step)", "answer": "- Check the DEFAULT instruction: usually \"3 significant figures unless otherwise stated\"\n- Check for OVERRIDES: each question part may specify different precision (e.g., \"2 decimal places\" or \"exact\")\n- Q6 specifically used BOTH 2 dp and 3 dp on different parts of the same question\n- Re-read the rounding instruction in EACH part of EACH question\n\n**Takeaway:** The default on the cover is constantly overridden — never assume, always check each part.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "In Q9(a), after rationalizing you obtained $x = \\frac{\\lambda^2 - 8}{\\lambda^2 + 16}$ and $y = \\frac{6\\lambda}{\\lambda^2 + 16}$. What condition on $\\lambda$ would make these expressions undefined? (1 step)", "answer": "- The expressions are undefined when the denominator is zero: $\\lambda^2 + 16 = 0$\n- This requires $\\lambda^2 = -16$, which has no real solutions\n- Since $\\lambda$ is given as a REAL constant, the denominator is never zero\n- Therefore $z$ is defined for all real $\\lambda$\n\n**Takeaway:** For real $\\lambda$, $\\lambda^2 + 16 > 0$ always — no division by zero is possible in this problem.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "In the divisibility induction, what would be WRONG with concluding \"since $f(k+1) - f(k)$ is divisible by 7, and $f(k)$ is divisible by 7, therefore $f(k+1)$ is divisible by 7\"? (1 step)", "answer": "- This reasoning is actually CORRECT: if $7|f(k)$ and $7|(f(k+1)-f(k))$, then $7|f(k+1)$\n- However, you must explicitly STATE both conditions in your proof:\n+ State that $f(k) = 7m$ (from hypothesis)\n+ Compute $f(k+1) - f(k)$ and show it's divisible by 7\n+ Then conclude $f(k+1)$ is divisible by 7\n- The error is not stating the hypothesis as part of the reasoning — the structure mark requires showing $P(k) \\Rightarrow P(k+1)$\n\n**Takeaway:** The reasoning is valid but you must show the link explicitly — hiding the hypothesis loses structure marks.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "What is the key insight in part (b) of Q8 that makes the \"hence\" connection work, and what does this illustrate about exam technique? (1 step)", "answer": "- The insight is: once you have the closed form for $\\sum_{r=1}^N$, you can find ANY restricted sum by computing $S(\\text{upper}) - S(\\text{lower}-1)$\n- This is a general technique: solve the general case first, then apply to the specific case\n- The \"hence\" signals: use your result from part (a), not a new method\n- This illustrates exam technique: when a question has multiple parts with \"hence,\" the later parts are designed to build on the earlier work\n\n**Takeaway:** The \"hence\" is a hint about methodology, not just a transition word — it tells you which technique to apply.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "In the matrix induction, each entry verification involves simplifying a linear combination like $(2k+1)(3) + (-k)(4)$. What is the systematic way to ensure you compute all four entries correctly? (1 step)", "answer": "- Use the row-by-column rule: the $(i,j)$ entry of $\\mathbf{A}\\mathbf{B}$ is $\\sum_{r} A_{ir} B_{rj}$\n- For $\\begin{pmatrix} a & b \\\\ c & d \\end{pmatrix} \\begin{pmatrix} e & f \\\\ g & h \\end{pmatrix}$:\n+ $(1,1) = ae + bg$\n+ $(1,2) = af + bh$\n+ $(2,1) = ce + dg$\n+ $(2,2) = cf + dh$\n- Write these four formulas once, then substitute your specific values\n\n**Takeaway:** The row-by-column rule is systematic — always compute all four entries using the same pattern to avoid missing any.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "For the complex argument problem, what is the principal argument range and why does $-\\frac{3\\pi}{4}$ qualify as a valid principal argument but $\\frac{5\\pi}{4}$ does not? (1 step)", "answer": "- Principal argument satisfies: $-\\pi < \\arg z \\leq \\pi$\n- $-\\frac{3\\pi}{4} = -0.75\\pi$ is within the range $(-\\pi, \\pi]$ ✓\n- $\\frac{5\\pi}{4} = 1.25\\pi$ is GREATER than $\\pi$, so it's outside the range\n- Both represent the same geometric direction (third quadrant), but only $-\\frac{3\\pi}{4}$ is the principal argument\n\n**Takeaway:** When converting between equivalent angles, always check the principal argument range — use the one within $(-\\pi, \\pi]$.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "In the summation expansion $2r^3 + 3r^2 + r$, the coefficient of $r^3$ is 2. When applying $\\sum_{r=1}^n r^3$, what multiplier should you use and why is it not 1? (1 step)", "answer": "- $\\sum_{r=1}^n 2r^3 = 2 \\sum_{r=1}^n r^3$\n- The formula booklet gives $\\sum r^3 = \\frac{1}{4}n^2(n+1)^2$\n- So $2 \\sum r^3 = 2 \\times \\frac{1}{4}n^2(n+1)^2 = \\frac{1}{2}n^2(n+1)^2$\n- A common error is using $\\frac{1}{2}n^2(n+1)^2$ as the formula for $\\sum r^3$ itself (that's wrong) — it's only correct when the coefficient is 2\n\n**Takeaway:** Always apply the coefficient OUTSIDE the summation sign first, then use the formula.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "What does it mean when a flashcard says a topic is \"NOT in the formula booklet\" versus \"IN the booklet,\" and how should this affect your exam preparation? (1 step)", "answer": "- IN the booklet: don't waste rehearsal time memorizing — you can refer to it during the exam\n- NOT in the booklet: you must have these formulas/methods memorized BEFORE entering the exam\n- For FP1, the NOT-in-booklet list includes: matrix determinant/inverse formulas, rotation matrices, reflection matrices, the restricted-sum technique, conjugate-pair quadratic factors\n\n**Takeaway:** Allocate your memorization effort to the NOT-in-booklet list — everything else is available during the exam.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "In the divisibility induction, the step $f(k+1) = 64 \\cdot f(k) - 28 \\cdot 6^{2k-1}$ leads to $7 | f(k+1)$. What property allows us to conclude this? (1 step)", "answer": "- If $f(k) = 7m$ (by the inductive hypothesis), then $64 \\cdot f(k) = 64 \\cdot 7m = 7(64m)$\n- And $-28 \\cdot 6^{2k-1} = 7(-4 \\cdot 6^{2k-1})$\n- Adding: $7(64m) + 7(-4 \\cdot 6^{2k-1}) = 7(64m - 4 \\cdot 6^{2k-1})$\n- Since the entire expression is $7 \\times (\\text{integer})$, it is divisible by 7\n\n**Takeaway:** The property is: if $7|a$ and $7|b$, then $7|(a+b)$. Factor out 7 explicitly to show this.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "In Q9(a), what would be the consequence of failing to combine into a single fraction before adding the \"1\" to the complex fraction, and how does this affect solving? (1 step)", "answer": "- If you don't combine, you'd have: $3z = 1 + \\frac{2(\\lambda + 5i)}{\\lambda - 4i}$\n- This is fine, but you'd then need to separate real and imaginary parts of a sum of a real number and a complex fraction\n- Combining first: $3z = \\frac{(\\lambda - 4i) + 2(\\lambda + 5i)}{\\lambda - 4i} = \\frac{3\\lambda + 6i}{\\lambda - 4i}$ gives a single complex fraction to rationalize\n- The combined form is cleaner and less error-prone\n\n**Takeaway:** Combining fractions early reduces the number of complex expressions you need to manage.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "In the summation question, the final answer is $\\frac{1}{2}n(n+1)(3n+1)(5n+4)$. What do the integers $a=3, b=1, c=5, d=4$ represent in the form $\\frac{1}{2}n(n+1)(an+b)(cn+d)$? (1 step)", "answer": "- The form $\\frac{1}{2}n(n+1)(an+b)(cn+d)$ is a product of four factors\n- $n(n+1)$ comes from the original summation structure\n- $(an+b)$ and $(cn+d)$ are the two linear factors that multiply to give the quadratic $15n^2 + 17n + 4$\n- Specifically: $(3n+1)(5n+4) = 15n^2 + 12n + 5n + 4 = 15n^2 + 17n + 4$\n- So $a=3, b=1$ gives the first factor, $c=5, d=4$ gives the second\n\n**Takeaway:** The coefficients $a,b,c,d$ are simply the integers in the two linear factors — order doesn't matter since multiplication is commutative.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}], "count": 39}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "In Q8, what's the FIRST step when summing a product like $r(2r+1)(r+1)$ from $r=1$ to $n$? (3 steps)", "answer": "- Step 1: **Expand the product fully** before applying summation formulas — do NOT try to sum term-by-term products.\n- Step 2: Write $r(2r+1)(r+1) = r(2r^2 + 3r + 1) = 2r^3 + 3r^2 + r$\n- Step 3: Then apply the standard results: $\\sum r = \\tfrac{1}{2}n(n+1)$, $\\sum r^2 = \\tfrac{1}{6}n(n+1)(2n+1)$, $\\sum r^3 = \\tfrac{1}{4}n^2(n+1)^2$\n\n*Why? The summation formulas in the booklet work on individual powers of r, not products. Expanding first is mandatory.*", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "In Q9(a), what's the FIRST algebraic move after writing $3z - 1 = \\frac{2(\\lambda + 5i)}{\\lambda - 4i}$? (3 steps)", "answer": "- Step 1: Clear the fraction by multiplying out: $3z = 1 + \\frac{2(\\lambda + 5i)}{\\lambda - 4i}$\n- Step 2: Combine to a single fraction: $3z = \\frac{(\\lambda - 4i) + 2(\\lambda + 5i)}{\\lambda - 4i} = \\frac{3\\lambda + 6i}{\\lambda - 4i}$\n- Step 3: Then divide by 3 to get $z = \\frac{\\lambda + 2i}{\\lambda - 4i}$\n\n*Never try to separate real and imaginary parts while fractions are still present — the algebra becomes impossible.*", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "In Q10 matrix induction, what's the FIRST line of the proof, and why is it crucial for the structure marks? (3 steps)", "answer": "- Step 1: Write: \"Let $P(n)$ be the statement that $\\mathbf{M}^n = \\begin{pmatrix} 2n+1 & -n \\\\ 4n & 1-2n \\end{pmatrix}$\"\n- Step 2: This defines the proposition you will prove — the examiner wants to see this explicitly.\n- Step 3: Without stating $P(n)$, you lose the structure mark even if the algebra is perfect.\n\n*The proposition tells the examiner exactly what you're trying to prove by induction.*", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}], "count": 3}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "FP1 Jan 2024 Q8(a) — When you see a sum like $$\\sum_{r=1}^{n} r(2r+1)(r+1)$$, what is the very first algebraic move before applying any standard results? (2 steps)", "answer": "- Step 1: Expand the product fully into a sum of powers of $$r$$: $$r(2r+1)(r+1) = 2r^3 + 3r^2 + r$$. You CANNOT sum a product term-by-term using the standard results — they only apply to $$\\sum r$$, $$\\sum r^2$$, $$\\sum r^3$$ individually.\n- Step 2: Now $$\\sum$$ distributes over the sum, and each piece matches a booklet formula.\n\nTakeaway: \"expand BEFORE you sum\" — products of $$r$$-terms must be linearised first.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "FP1 Jan 2024 Q8(a) — After expanding $$\\sum (2r^3 + 3r^2 + r)$$ and substituting the three standard results, what algebraic trick keeps the working clean instead of expanding everything into a polynomial in $$n$$?", "answer": "Factor out the common factor $$\\tfrac{1}{2}n(n+1)$$ from all three terms EARLY. Each standard result contains this factor:\n- $$\\sum r = \\tfrac{1}{2}n(n+1)$$\n- $$\\sum r^2 = \\tfrac{1}{6}n(n+1)(2n+1) = \\tfrac{1}{2}n(n+1)\\cdot\\tfrac{2n+1}{3}$$ — so after multiplying by 3 the $$\\tfrac{1}{3}$$ cancels\n- $$\\sum r^3 = \\tfrac{1}{4}n^2(n+1)^2 = \\tfrac{1}{2}n(n+1)\\cdot\\tfrac{n(n+1)}{2}$$ — after multiplying by 2 the $$\\tfrac{1}{2}$$ cancels\n\nPulling out $$\\tfrac{1}{2}n(n+1)$$ leaves a small bracket to simplify: $$[n(n+1) + (2n+1) + 1]$$. If you expand instead, you'll wrestle with a quartic in $$n$$ and lose factoring marks.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": true}, {"question": "FP1 Jan 2024 Q8(b) — The question asks for $$\\sum_{r=n}^{2n}$$. What is the off-by-one trap on the lower limit, and what is the correct subtraction formula? (2 steps)", "answer": "- Step 1: The standard identity is $$\\sum_{r=a}^{b} f(r) = S(b) - S(a-1)$$ where $$S(N) = \\sum_{r=1}^{N} f(r)$$. The $$-1$$ is because we must STOP $$S$$ just before $$r=a$$ so the $$r=a$$ term is INCLUDED in the difference.\n- Step 2: For $$\\sum_{r=n}^{2n}$$, use $$S(2n) - S(n-1)$$ — NOT $$S(2n) - S(n)$$. Using $$S(n)$$ would exclude the $$r=n$$ term.\n\nMnemonic: \"the floor is one BELOW the start\". Whenever the lower limit is a variable like $$n$$, write it down as $$S(2n) - S(n-1)$$ before substituting.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": true}, {"question": "FP1 Jan 2024 Q8(b) — Given $$S(N) = \\tfrac{1}{2}N(N+1)^2(N+2)$$, what simplifications turn $$S(2n)$$ into a clean form? (2 steps)", "answer": "- Step 1: Substitute and pull out the 2's: $$S(2n) = \\tfrac{1}{2}(2n)(2n+1)^2(2n+2)$$.\n- Step 2: Notice $$2n+2 = 2(n+1)$$, and combine the factors of 2: $$\\tfrac{1}{2}\\cdot 2n \\cdot 2(n+1) = 2n(n+1)$$, giving $$S(2n) = 2n(n+1)(2n+1)^2$$.\n\nWhy this matters: leaving it as $$\\tfrac{1}{2}(2n)(2n+1)^2(2n+2)$$ makes the subtraction $$S(2n) - S(n-1)$$ messy. Pre-simplifying both $$S(2n)$$ and $$S(n-1) = \\tfrac{1}{2}n^2(n-1)(n+1)$$ exposes the common factor $$\\tfrac{n(n+1)}{2}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "FP1 Jan 2024 Q8(b) — When subtracting $$S(2n) - S(n-1)$$, what's the strategic factor to pull out before simplifying the bracketed expression?", "answer": "Pull out $$\\tfrac{n(n+1)}{2}$$ from BOTH terms first:\n- $$S(2n) = 2n(n+1)(2n+1)^2 = \\tfrac{n(n+1)}{2}\\cdot 4(2n+1)^2$$\n- $$S(n-1) = \\tfrac{1}{2}n^2(n-1)(n+1) = \\tfrac{n(n+1)}{2}\\cdot n(n-1)$$\n\nThen $$S(2n) - S(n-1) = \\tfrac{n(n+1)}{2}\\big[4(2n+1)^2 - n(n-1)\\big]$$. The bracket is a quadratic in $$n$$ to simplify. The target form $$\\tfrac{1}{2}n(n+1)(an+b)(cn+d)$$ already shows $$\\tfrac{n(n+1)}{2}$$ is the natural pre-factor — work backwards from the target shape.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "FP1 Jan 2024 Q8(b) — You arrive at $$15n^2 + 17n + 4$$ inside the bracket. What's the systematic way to factorise it (rather than guessing)?", "answer": "Compute the discriminant: $$17^2 - 4(15)(4) = 289 - 240 = 49 = 7^2$$. The perfect square confirms it factors over the integers. Then write $$15n^2 + 17n + 4 = (3n+1)(5n+4)$$.\n\nVerification trick: multiply back — $$3n\\cdot 5n = 15n^2$$ ✓, $$1\\cdot 4 = 4$$ ✓, cross terms $$3n\\cdot 4 + 1\\cdot 5n = 12n + 5n = 17n$$ ✓. Always multiply back to avoid the common slip $$(5n+1)(3n+4)$$ which gives the wrong middle term ($$20n+3n = 23n$$).", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "FP1 Jan 2024 Q8 — Which sum formulas ARE in the formula booklet, and which technique is NOT and must be remembered?", "answer": "IN the booklet:\n- $$\\sum_{r=1}^n r = \\tfrac{1}{2}n(n+1)$$\n- $$\\sum_{r=1}^n r^2 = \\tfrac{1}{6}n(n+1)(2n+1)$$\n- $$\\sum_{r=1}^n r^3
