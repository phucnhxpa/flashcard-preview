 = \\tfrac{1}{4}n^2(n+1)^2$$\n\nNOT in the booklet (must memorise the technique, not a formula):\n- The split-and-factor strategy for polynomial-in-$$r$$ summands\n- The off-by-one rule $$\\sum_{r=a}^{b} = S(b) - S(a-1)$$\n- The discriminant test for factorising the resulting quadratic\n\nCommon student error (per Phuc's note): thinking $$\\sum r^3$$ isn't in the booklet — it IS. Don't waste exam time memorising it.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "FP1 Jan 2024 Q9(a) — When you see $$\\dfrac{3z-1}{2} = \\dfrac{\\lambda + 5i}{\\lambda - 4i}$$ and need $$z$$ in the form $$x+yi$$, what's the order of operations? (3 steps)", "answer": "- Step 1: Clear the fraction-of-fractions FIRST. Isolate $$3z$$: $$3z = 1 + \\tfrac{2(\\lambda+5i)}{\\lambda-4i}$$, then combine over a common denominator: $$3z = \\tfrac{(\\lambda-4i) + 2(\\lambda+5i)}{\\lambda-4i} = \\tfrac{3\\lambda + 6i}{\\lambda-4i}$$.\n- Step 2: Divide by 3: $$z = \\tfrac{\\lambda+2i}{\\lambda-4i}$$.\n- Step 3: ONLY NOW rationalise by multiplying top and bottom by the conjugate $$\\lambda + 4i$$.\n\nWhy this order: rationalising before clearing the outer fraction means you carry $$\\lambda+4i$$ through three operations. Simplify the rational expression first, conjugate-multiply ONCE at the end.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "FP1 Jan 2024 Q9(a) — What is the WRONG conjugate to multiply by when rationalising $$\\dfrac{\\lambda+2i}{\\lambda-4i}$$, and why?", "answer": "WRONG choice: multiplying top and bottom by $$\\lambda - 4i$$ (the same as the denominator). This squares the denominator into $$(\\lambda - 4i)^2 = \\lambda^2 - 8i\\lambda - 16$$, which is STILL complex — you've made things worse.\n\nCORRECT choice: multiply by the conjugate of the denominator, $$\\lambda + 4i$$. Then $$(\\lambda - 4i)(\\lambda + 4i) = \\lambda^2 + 16$$ is purely real.\n\nRule: \"rationalise\" = \"make the denominator real\" = \"multiply by the complex conjugate of the denominator\", not by the denominator itself. The conjugate flips the sign of the imaginary part.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "FP1 Jan 2024 Q9(b) — The condition $$\\arg z = \\tfrac{\\pi}{4}$$ produces $$y = x$$. Why is this NOT a complete characterisation, and what extra constraint must you impose?", "answer": "$$y = x$$ alone is the locus $$\\tan(\\arg z) = 1$$, which has TWO solutions per period of $$\\tan$$: $$\\arg z = \\tfrac{\\pi}{4}$$ (first quadrant, $$x>0, y>0$$) OR $$\\arg z = -\\tfrac{3\\pi}{4}$$ (third quadrant, $$x<0, y<0$$).\n\nTo pin down $$\\arg z = \\tfrac{\\pi}{4}$$ specifically, you must add: $$x > 0$$ AND $$y > 0$$ (first quadrant).\n\nWhy this is a discrimination mark: the algebraic equation $$y = x$$ will produce candidate values of $$\\lambda$$, but you must REJECT any value that puts $$z$$ in the third quadrant. Phuc's pattern of losing this kind of mark is the \"$$\\tan$$-period blindness\".", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": true}, {"question": "FP1 Jan 2024 Q9(b) — Given the candidate solutions $$\\lambda = 3 \\pm \\sqrt{17}$$ to $$\\lambda^2 - 6\\lambda - 8 = 0$$, how do you quickly check which one gives $$\\arg z = \\tfrac{\\pi}{4}$$ versus $$\\arg z = -\\tfrac{3\\pi}{4}$$? (2 steps)", "answer": "- Step 1: Recall $$y = \\tfrac{6\\lambda}{\\lambda^2 + 16}$$. The denominator is always positive, so $$\\operatorname{sgn}(y) = \\operatorname{sgn}(\\lambda)$$. For first quadrant we need $$y > 0$$, so $$\\lambda > 0$$.\n- Step 2: Check both candidates: $$3 + \\sqrt{17} \\approx 7.12 > 0$$ ✓; $$3 - \\sqrt{17} \\approx -1.12 < 0$$ ✗. Only $$\\lambda = 3 + \\sqrt{17}$$ is admitted.\n\nSpeed trick: $$\\sqrt{17}$$ is slightly more than $$4$$, so $$3 - \\sqrt{17}$$ is just below $$-1$$. No calculator needed — sign of $$\\lambda$$ is the whole game.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "FP1 Jan 2024 Q9 — Why does the principal argument live in $$(-\\pi, \\pi]$$, and what's the name for the third-quadrant case where $$y=x$$?", "answer": "Principal argument convention: $$\\arg z \\in (-\\pi, \\pi]$$. This makes the argument single-valued and consistent with the standard branch of the complex logarithm.\n\nFor a point in the third quadrant on the line $$y=x$$ (e.g. $$z = -1 - i$$), the angle measured from positive $$x$$-axis is $$\\tfrac{5\\pi}{4}$$ going anticlockwise, but in principal form we subtract $$2\\pi$$: $$\\arg z = -\\tfrac{3\\pi}{4}$$.\n\nCommon mistake: writing $$\\arg z = \\tfrac{5\\pi}{4}$$ in a final answer — that's outside the principal range. Always reduce to $$(-\\pi, \\pi]$$.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": true}, {"question": "FP1 induction — What are the five structural components of an induction proof that Edexcel awards marks for, in order?", "answer": "- Step 1: **Proposition**: \"Let $$P(n)$$ be the statement [exact claim].\" Naming $$P(n)$$ explicitly.\n- Step 2: **Base case**: Verify $$P(1)$$ (or $$P(n_0)$$) by DIRECT computation — never by using the formula being proved.\n- Step 3: **Inductive hypothesis**: \"Assume $$P(k)$$ is true for some $$k \\in \\mathbb{Z}^+$$.\"\n- Step 4: **Inductive step**: Derive $$P(k+1)$$ from $$P(k)$$ algebraically, expressing the result in the SAME form as the proposition.\n- Step 5: **Conclusion**: \"Since $$P(1)$$ is true and $$P(k) \\Rightarrow P(k+1)$$, by the principle of mathematical induction $$P(n)$$ holds for all $$n \\in \\mathbb{Z}^+$$.\"\n\nEach of these is worth a mark even when the algebra is shaky. The skeleton is non-negotiable.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "FP1 induction — Why must you verify the base case by DIRECT calculation rather than substituting $$n=1$$ into the formula you're trying to prove?", "answer": "The whole point of the base case is to confirm the formula is true at the starting value — independently. If you \"verify\" by substituting into the claimed formula, you're assuming what you're trying to prove (circular reasoning).\n\nCorrect method: compute the LHS directly (e.g. for the matrix question, compute $$\\mathbf{M}^1 = \\mathbf{M}$$ from the original definition of $$\\mathbf{M}$$). Then compute the RHS by substituting $$n=1$$ into the closed form. Show LHS = RHS.\n\nEdexcel mark: this is typically 1 mark of the 5 for the question — easy to earn, easy to lose to vague phrasing like \"obviously true for $$n=1$$\".", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": true}, {"question": "FP1 Jan 2024 Q10(i) — In the inductive step for $$\\mathbf{M}^{k+1}$$, why is it better to write $$\\mathbf{M}^{k+1} = \\mathbf{M}^k \\cdot \\mathbf{M}$$ rather than $$\\mathbf{M} \\cdot \\mathbf{M}^k$$?", "answer": "Both are equal by associativity, but the working differs:\n- $$\\mathbf{M}^k \\cdot \\mathbf{M}$$: you multiply the EXPLICIT formula (with entries in $$k$$) on the LEFT by the simple constant matrix on the right. Each entry of the result is a small calculation $$(2k+1)\\cdot 3 + (-k)\\cdot 4$$ etc., which directly produces expressions in $$k+1$$.\n- $$\\mathbf{M} \\cdot \\mathbf{M}^k$$: you'd be multiplying the constant matrix on the left by the $$k$$-formula on the right — same calculation but more visually awkward.\n\nMark-scheme practical tip: write the multiplication in the SAME order as you compute it. Inconsistency between \"$$\\mathbf{M}\\cdot\\mathbf{M}^k$$\" written and \"$$\\mathbf{M}^k\\cdot\\mathbf{M}$$\" computed can cost a method mark.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "FP1 Jan 2024 Q10(i) — When showing $$\\mathbf{M}^{k+1}$$ matches the proposition for $$n=k+1$$, what algebraic rewriting must each entry undergo? (2 steps)", "answer": "- Step 1: Compute the matrix product entry-by-entry, obtaining expressions in $$k$$ (e.g. $$2k+3$$, $$-(k+1)$$, $$4k+4$$, $$-2k-1$$).\n- Step 2: Rewrite each expression in terms of $$k+1$$ to MATCH the proposition's form:\n+ $$2k+3 = 2(k+1) + 1$$\n+ $$-(k+1) = -(k+1)$$\n+ $$4k+4 = 4(k+1)$$\n+ $$-2k - 1 = 1 - 2(k+1)$$\n\nThe final matrix must look like the proposition with $$n$$ replaced by $$k+1$$, not merely \"an equivalent form\". Examiners want to see the substitution $$n \\mapsto k+1$$ visibly performed.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": true}, {"question": "FP1 Jan 2024 Q10(ii) — For divisibility induction on $$f(n) = 8^{2n+1} + 6^{2n-1}$$, what is the key strategy for the inductive step?", "answer": "Express $$f(k+1)$$ as $$A \\cdot f(k) + 7 \\cdot (\\text{integer})$$, where $$A$$ is some constant. Then divisibility of $$f(k+1)$$ by 7 follows from the hypothesis $$7 \\mid f(k)$$ plus the explicit $$7 \\cdot (\\cdot)$$ term.\n\nWhy this works: $$f(k+1)$$ on its own is a sum of large powers — direct divisibility isn't obvious. But by factoring out $$f(k)$$ (whose divisibility we've assumed), we reduce the new problem to checking that the LEFTOVER is divisible by 7.\n\nThe \"split a coefficient to create $$f(k)$$\" trick is the heart of every divisibility induction.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "FP1 Jan 2024 Q10(ii) — Walk through the splitting trick to express $$f(k+1) = 8^{2k+3} + 6^{2k+1}$$ in terms of $$f(k) = 8^{2k+1} + 6^{2k-1}$$. (3 steps)", "answer": "- Step 1: Use index laws: $$8^{2k+3} = 64 \\cdot 8^{2k+1}$$ and $$6^{2k+1} = 36 \\cdot 6^{2k-1}$$.\n- Step 2: To create the combination $$8^{2k+1} + 6^{2k-1}$$ (which is $$f(k)$$), we want matching coefficients. Split $$36 = 64 - 28$$ so the $$6^{2k-1}$$ term shares the coefficient 64 with the $$8^{2k+1}$$ term: $$f(k+1) = 64\\cdot 8^{2k+1} + 64\\cdot 6^{2k-1} - 28\\cdot 6^{2k-1} = 64\\,f(k) - 28\\cdot 6^{2k-1}$$.\n- Step 3: Factor out 7: $$f(k+1) = 7\\big(64m - 4\\cdot 6^{2k-1}\\big)$$ where $$f(k) = 7m$$. The bracket is an integer, so $$7 \\mid f(k+1)$$.\n\nWhy split $$36$$ and not $$64$$: we choose the SMALLER coefficient to split, so the leftover $$28 = 4\\cdot 7$$ conveniently contains a factor of 7.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": true}, {"question": "FP1 induction — In divisibility induction, why is it not enough to show $$f(k+1) - f(k)$$ is divisible by 7?", "answer": "$$f(k+1) - f(k)$$ divisible by 7 only tells you the DIFFERENCE is a multiple of 7. For $$f(k+1)$$ itself to be divisible by 7, you ALSO need $$f(k)$$ to be divisible by 7.\n\nThe hypothesis gives you $$7 \\mid f(k)$$. Combined with $$7 \\mid (f(k+1) - f(k))$$, you get $$7 \\mid f(k+1)$$.\n\nState this combination explicitly in your working: \"By hypothesis $$f(k) = 7m$$; we showed $$f(k+1) - 64f(k) = -28\\cdot 6^{2k-1}$$; therefore $$f(k+1) = 64\\cdot 7m - 28\\cdot 6^{2k-1} = 7(\\cdots)$$.\" Don't skip the algebraic link.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "FP1 Jan 2024 Q10(ii) — What index-law error is easy to make on $$6^{2k+1}$$ and how do you avoid it?", "answer": "Wrong: writing $$6^{2k+1} = 6 \\cdot 6^{2k}$$ — technically correct but USELESS, because $$6^{2k}$$ is not the term in $$f(k)$$ ($$f(k)$$ contains $$6^{2k-1}$$).\n\nRight: $$6^{2k+1} = 6^{(2k-1) + 2} = 6^2 \\cdot 6^{2k-1} = 36 \\cdot 6^{2k-1}$$. The exponent shift is $$+2$$ from $$2k-1$$ to $$2k+1$$, giving a factor of $$6^2 = 36$$.\n\nGeneral rule: when matching to the hypothesis, increase the exponent of $$f(k)$$ by EXACTLY the difference in indices, no more. Write out the exponent arithmetic explicitly: \"$$2k+1 - (2k-1) = 2$$, so factor out $$6^2$$\".", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "FP1 (general) — What's the relationship between the degree of a real polynomial and the number of complex roots, and what's the trap with cubics specifically?", "answer": "A real polynomial of degree $$n$$ has EXACTLY $$n$$ roots in $$\\mathbb{C}$$ (counted with multiplicity). Complex (non-real) roots come in CONJUGATE PAIRS for real polynomials.\n\nThe cubic trap: students sometimes assume \"complex roots → 4 roots\" because most exam problems with conjugate pairs are quartics. But a CUBIC has exactly 3 roots. If one is non-real, then the conjugate is another root, giving 2 complex + 1 real (the real one is forced because 3 - 2 = 1).\n\nMnemonic: \"degree = number of roots\". For a cubic with a complex root $$\\alpha$$: roots are $$\\alpha, \\bar\\alpha$$, and one real root determined by Vieta's.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": true}, {"question": "FP1 (general) — Given a complex conjugate pair $$\\alpha, \\bar\\alpha$$ as roots, what's the quadratic factor with real coefficients?", "answer": "$$z^2 - 2\\,\\operatorname{Re}(\\alpha)\\,z + |\\alpha|^2$$.\n\nWhy: $$(z - \\alpha)(z - \\bar\\alpha) = z^2 - (\\alpha + \\bar\\alpha)z + \\alpha\\bar\\alpha$$. Then $$\\alpha + \\bar\\alpha = 2\\operatorname{Re}(\\alpha)$$ and $$\\alpha\\bar\\alpha = |\\alpha|^2$$, both real.\n\nConcrete example: if $$\\alpha = 3 + 2i$$, the real quadratic factor is $$z^2 - 6z + 13$$ (since $$2\\operatorname{Re}(\\alpha) = 6$$ and $$|\\alpha|^2 = 9+4 = 13$$). Never multiply $$(z - (3+2i))(z - (3-2i))$$ out fully — use the formula.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "FP1 matrices — What's the determinant and inverse of a $$2\\times 2$$ matrix, and why must you memorise these?", "answer": "$$\\det\\begin{pmatrix}a&b\\\\c&d\\end{pmatrix} = ad - bc$$ and $$\\begin{pmatrix}a&b\\\\c&d\\end{pmatrix}^{-1} = \\dfrac{1}{ad-bc}\\begin{pmatrix}d&-b\\\\-c&a\\end{pmatrix}$$.\n\nWhy memorise: these are NOT in the FP1 formula booklet. Wasting exam time deriving them from $$\\mathbf{M}\\mathbf{M}^{-1} = \\mathbf{I}$$ costs minutes you don't have.\n\nMemory aid for inverse: \"swap the diagonal, negate the off-diagonal, divide by det\". Order is $$d, -b, -c, a$$ — the main-diagonal entries swap places, the off-diagonal entries flip sign.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": true}, {"question": "FP1 matrices — For the composition \"transformation $$\\mathbf{A}$$ then transformation $$\\mathbf{B}$$\", which matrix product represents the combined transformation, and why?", "answer": "The combined matrix is $$\\mathbf{B}\\mathbf{A}$$, NOT $$\\mathbf{A}\\mathbf{B}$$.\n\nReason: matrices act on column vectors from the LEFT. So a vector $$\\mathbf{v}$$ is first acted on by $$\\mathbf{A}$$: $$\\mathbf{A}\\mathbf{v}$$. Then $$\\mathbf{B}$$ acts on that: $$\\mathbf{B}(\\mathbf{A}\\mathbf{v}) = (\\mathbf{B}\\mathbf{A})\\mathbf{v}$$. The matrix that acts first is written CLOSEST to $$\\mathbf{v}$$ (rightmost).\n\nMnemonic: \"rightmost first\". Read composition right-to-left, like function composition $$(f \\circ g)(x) = f(g(x))$$ — $$g$$ acts first.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": true}, {"question": "FP1 matrices — What's the matrix for an anticlockwise rotation by angle $$\\theta$$ about the origin, and how do you remember the sign pattern?", "answer": "$$\\begin{pmatrix}\\cos\\theta & -\\sin\\theta \\\\ \\sin\\theta & \\cos\\theta\\end{pmatrix}$$.\n\nMemory anchor: check on $$\\theta = 90°$$ anticlockwise. This should send $$(1, 0) \\to (0, 1)$$. The first column of the matrix IS the image of $$(1, 0)$$, which should be $$(0, 1) = (\\cos 90°, \\sin 90°)$$. So the first column is $$(\\cos\\theta, \\sin\\theta)$$, putting $$-\\sin\\theta$$ in the top-right.\n\nClockwise rotation: replace $$\\theta$$ with $$-\\theta$$, giving $$\\begin{pmatrix}\\cos\\theta & \\sin\\theta \\\\ -\\sin\\theta & \\cos\\theta\\end{pmatrix}$$ (sign of $$\\sin$$ flips).", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": true}, {"question": "FP1 matrices — What's the geometric meaning of $$|\\det \\mathbf{M}|$$ for a linear transformation?", "answer": "$$|\\det \\mathbf{M}|$$ is the AREA SCALE FACTOR. A region of area $$A$$ before the transformation maps to a region of area $$|\\det\\mathbf{M}|\\cdot A$$.\n\nAdditional info from the sign:\n- $$\\det\\mathbf{M} > 0$$: orientation preserved (rotation, stretch).\n- $$\\det\\mathbf{M} < 0$$: orientation reversed (reflection).\n- $$\\det\\mathbf{M} = 0$$: transformation is singular — collapses to a line or point, no inverse exists.\n\nWhy $$|\\cdot|$$: area is always positive; the sign tracks orientation, not magnitude.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "FP1 conics — Why is the parametric form usually better than the Cartesian form for tangent/normal problems on conics?", "answer": "Cartesian form: implicit differentiation gives $$\\tfrac{dy}{dx}$$ as a function of both $$x$$ and $$y$$, requiring you to substitute the coordinates of the specific point.\n\nParametric form: each point on the conic is uniquely $$(x(t), y(t))$$, so $$\\tfrac{dy}{dx} = \\tfrac{dy/dt}{dx/dt}$$ is a clean function of $$t$$. No substitution gymnastics.\n\nFor tangents/normals at parametric point $$P$$ meeting the curve again at $$Q$$, ALSO use parametric form for $$Q$$ (say parameter $$s$$). Solving for $$s$$ from the line equation is FAR easier than re-deriving in $$(x,y)$$.\n\nExample for $$y^2 = 4ax$$: parametric $$(at^2, 2at)$$ gives tangent slope $$1/t$$ — instant.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "FP1 Vieta's — For the quadratic $$ax^2 + bx + c = 0$$ with roots $$\\alpha, \\beta$$, what are the four symmetric-function identities you should reflex-recall?", "answer": "- $$\\alpha + \\beta = -b/a$$ (sum of roots)\n- $$\\alpha\\beta = c/a$$ (product of roots)\n- $$\\alpha^2 + \\beta^2 = (\\alpha+\\beta)^2 - 2\\alpha\\beta$$ (from expanding $$(\\alpha+\\beta)^2$$)\n- $$\\alpha^3 + \\beta^3 = (\\alpha+\\beta)^3 - 3\\alpha\\beta(\\alpha+\\beta)$$ (from $$(\\alpha+\\beta)^3$$ expansion)\n\nAlso useful: $$\\tfrac{1}{\\alpha} + \\tfrac{1}{\\beta} = \\tfrac{\\alpha+\\beta}{\\alpha\\beta}$$ and $$\\tfrac{1}{\\alpha\\beta} = \\tfrac{1}{\\alpha\\beta}$$.\n\nThese let you compute any symmetric function of $$\\alpha, \\beta$$ without finding the roots themselves.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "FP1 numerical methods — What's the linear interpolation formula for estimating a root between $$x_1$$ and $$x_2$$ where $$f$$ changes sign, and how do you remember which absolute value goes in the numerator?", "answer": "$$\\alpha \\approx x_1 + \\dfrac{|f(x_1)|}{|f(x_1)| + |f(x_2)|}(x_2 - x_1)$$.\n\nIntuition: the root lies between $$x_1$$ and $$x_2$$. The weight in the numerator is the \"distance in $$f$$\" from $$x_1$$. A LARGE $$|f(x_1)|$$ means $$x_1$$ is far from the root, so we move further from $$x_1$$ — hence $$|f(x_1)|$$ in the numerator pushes us toward $$x_2$$.\n\nSanity check: if $$|f(x_1)| = |f(x_2)|$$, the formula gives the midpoint — correct by symmetry.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": true}, {"question": "FP1 (exam strategy) — Why is \"Show that...\" different from \"Find...\" in terms of mark allocation, and what's the implication for your working?", "answer": "\"Show that...\" gives you the target answer. The marks are entirely for the WORKING — examiners need to see every justified step. Skipping algebraic lines loses method marks even if your final line matches.\n\n\"Find...\" doesn't give the target. The final-answer mark is independent of the working, so if your working is messy but the answer is correct, you still get the answer mark. Conversely, if your working is perfect but the answer is wrong, you only lose the answer mark.\n\nStrategic implication: in \"show that\" questions, write OUT every line — don't compress. In \"find\" questions, you can move faster but double-check the final number.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "FP1 (exam strategy) — When a question on $$\\arg z$$, modulus, or $$\\sqrt{\\cdot}$$ produces multiple algebraic solutions, what's the universal discrimination question to ask?", "answer": "\"Does the geometric constraint reject any of these?\"\n\nSpecific checks:\n+ For $$\\arg z = \\theta$$: check sign of $$x$$ AND sign of $$y$$ against the quadrant of $$\\theta$$.\n+ For $$|z| = r$$: $$r$$ must be non-negative; reject candidates giving negative modulus.\n+ For $$\\sqrt{\\cdot}$$: the radicand must be non-negative; the principal square root is non-negative.\n+ For conics like $$y^2 = 4ax$$: $$a > 0$$ typically (focus on positive $$x$$-axis); reject sign-flipped candidates.\n\nThis is the \"discrimination of multiple algebraic candidates\" meta-skill. Every $$\\pm$$ or $$\\tan^{-1}$$ multivalued step requires this check.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": true}, {"question": "FP1 numerical methods — What's the trap with the \"3 significant figures unless otherwise stated\" front-cover instruction?", "answer": "The default is OVERRIDDEN constantly. Individual question parts may specify \"2 decimal places\", \"3 decimal places\", \"to the nearest integer\", etc.\n\nTrap: students apply 3 sf to a part that asks for 3 dp (or vice versa), losing the accuracy mark.\n\nDiscipline: RE-READ the rounding clause in EACH part of EACH question, not just the front page. In Jan 2024 Q6, the same question switched between 2 dp and 3 dp across parts.\n\nAlso: angles in radians vs degrees — check the calculator mode AND the question's units explicitly.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "FP1 Jan 2024 Q9(a) — When combining $$1 + \\tfrac{2(\\lambda+5i)}{\\lambda-4i}$$ into a single fraction, what's the easy-to-miss step?", "answer": "Rewrite $$1 = \\tfrac{\\lambda - 4i}{\\lambda - 4i}$$ to use the common denominator $$\\lambda - 4i$$. Then $$1 + \\tfrac{2(\\lambda+5i)}{\\lambda-4i} = \\tfrac{(\\lambda-4i) + 2(\\lambda+5i)}{\\lambda-4i}$$.\n\nExpand the numerator carefully: $$(\\lambda - 4i) + 2\\lambda + 10i = 3\\lambda + 6i$$ (the $$-4i + 10i = 6i$$).\n\nCommon slip: forgetting to multiply the \"1\" by $$\\tfrac{\\lambda-4i}{\\lambda-4i}$$ before combining — leading to nonsense like $$1 + 2(\\lambda+5i)$$ over $$\\lambda - 4i$$.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "FP1 induction (matrices) — Why must the result for $$\\mathbf{M}^{k+1}$$ be written in the SAME form as the proposition (with $$k+1$$ substituted), rather than just any equivalent expression?", "answer": "Induction proves $$P(n)$$ for all $$n$$. To conclude $$P(k+1)$$, you must literally produce the statement of $$P$$ with $$n$$ replaced by $$k+1$$. An \"equivalent but differently arranged\" expression doesn't visibly demonstrate this.\n\nConcrete: if $$P(n)$$ says the $$(1,1)$$ entry is $$2n+1$$, and you obtain $$2k+3$$, rewrite it as $$2(k+1) + 1$$. Even though $$2k+3 = 2(k+1)+1$$ algebraically, the LATTER form makes the pattern-match visible to the examiner.\n\nMark scheme: Edexcel awards a mark for \"expressing the result in the form of $$P(k+1)$$\".", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": true}, {"question": "FP1 (general) — What's the canonical \"induction conclusion\" sentence you should memorise verbatim?", "answer": "\"Since $$P(1)$$ is true and $$P(k) \\Rightarrow P(k+1)$$, by the principle of mathematical induction, $$P(n)$$ is true for all $$n \\in \\mathbb{Z}^+$$.\"\n\nWhy memorise: this is worth a mark in every induction question. Vague phrasings like \"so it's true for all $$n$$\" or \"by induction, done\" lose this mark.\n\nVariants by domain: replace $$\\mathbb{Z}^+$$ with $$n \\geq n_0$$ if the base case isn't $$n=1$$. State the base case index that you actually verified.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "FP1 Jan 2024 Q8 — Why is the \"$$\\sum r^3$$ is in the booklet\" fact strategically important to know?", "answer": "It frees up exam-time mental bandwidth. The booklet provides:\n- $$\\sum r = \\tfrac{1}{2}n(n+1)$$\n- $$\\sum r^2 = \\tfrac{1}{6}n(n+1)(2n+1)$$\n- $$\\sum r^3 = \\tfrac{1}{4}n^2(n+1)^2$$\n\nWhat's NOT given: the SKILLS — splitting products, factoring, off-by-one limit subtraction, factor-finding via discriminant.\n\nStrategic implication: don't waste rehearsal time memorising the three formulas (you can look them up in 5 seconds). DO rehearse the techniques. Phuc's note \"i've to memorize this one\" is half-wrong — memorise the technique, not the formula.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": true}, {"question": "FP1 (general) — What's the conjugate-of-denominator rationalisation rule, and when does it apply versus not apply?", "answer": "Rule: to simplify $$\\tfrac{\\text{complex}}{\\text{complex}}$$, multiply top and bottom by the CONJUGATE of the denominator. This makes the denominator real because $$(a+bi)(a-bi) = a^2 + b^2 \\in \\mathbb{R}^{\\geq 0}$$.\n\nApplies: any fraction with a complex denominator.\n\nDoes NOT apply: if the denominator is ALREADY real (e.g. $$\\tfrac{a+bi}{3}$$ — just divide). Multiplying by the \"conjugate\" of a real number (itself) wastes time.\n\nEdge case: if the denominator is purely imaginary ($$bi$$), the conjugate is $$-bi$$. Multiplying gives $$b^2 > 0$$ in the denominator — same principle, real result.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": true}, {"question": "FP1 numerical methods — What's the Newton-Raphson iteration formula, and what's the geometric intuition?", "answer": "$$x_{n+1} = x_n - \\dfrac{f(x_n)}{f'(x_n)}$$.\n\nGeometric intuition: draw the tangent line to $$y = f(x)$$ at $$x = x_n$$. This tangent crosses the $$x$$-axis at some point $$x_{n+1}$$. If $$f$$ is reasonably smooth and we're near a root, the tangent's $$x$$-intercept is a better approximation than $$x_n$$.\n\nDerivation: tangent line is $$y - f(x_n) = f'(x_n)(x - x_n)$$. Set $$y = 0$$: $$x = x_n - \\tfrac{f(x_n)}{f'(x_n)}$$.\n\nFailure modes: $$f'(x_n) = 0$$ (tangent is horizontal, no intercept); near-inflection points (oscillation); far from the root (may diverge).", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "FP1 conics — What are the standard parametric forms for parabola, rectangular hyperbola, and ellipse?", "answer": "- Parabola $$y^2 = 4ax$$: parametric $$(at^2, 2at)$$. Focus at $$(a, 0)$$, directrix $$x = -a$$.\n- Rectangular hyperbola $$xy = c^2$$: parametric $$(ct, c/t)$$.\n- Ellipse $$\\tfrac{x^2}{a^2} + \\tfrac{y^2}{b^2} = 1$$: parametric $$(a\\cos\\theta, b\\sin\\theta)$$.\n\nThese ARE in the formula booklet — don't memorise the forms, but DO memorise:\n+ How to differentiate them parametrically: $$\\tfrac{dy}{dx} = \\tfrac{dy/dt}{dx/dt}$$.\n+ The standard tangent/normal equations (chord properties, focus-directrix).", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "FP1 (exam strategy) — What's the time-per-mark guideline and what should you do when you exceed it?", "answer": "75 marks in 90 minutes = approximately 1.15 minutes per mark. So:\n+ 5-6 mark question: ~5-7 minutes\n+ 8-mark question: ~9 minutes\n+ 10-mark question: ~11-12 minutes\n\nIf you're past target time on a question: MOVE ON immediately. Come back later if time allows. Sunk-cost reasoning (\"I've already spent 8 minutes, I'll finish this\") costs marks elsewhere.\n\nThe 9- and 10-mark questions deserve more time per mark because they have more structure to set up. The short questions should be fast.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "FP1 Jan 2024 Q9 — What's the trap when interpreting \"$$\\tan(\\arg z) = 1$$\" versus \"$$\\arg z = \\tfrac{\\pi}{4}$$\"?", "answer": "$$\\tan(\\arg z) = 1$$ has TWO solutions in $$(-\\pi, \\pi]$$:\n+ $$\\arg z = \\tfrac{\\pi}{4}$$ (first quadrant)\n+ $$\\arg z = -\\tfrac{3\\pi}{4}$$ (third quadrant)\n\n$$\\arg z = \\tfrac{\\pi}{4}$$ specifies ONE solution.\n\nThe equation $$y/x = 1$$ (or equivalently $$y = x$$, ignoring division by zero) captures BOTH cases. To restrict to $$\\arg = \\tfrac{\\pi}{4}$$, also require $$x > 0$$ (and $$y > 0$$).\n\nThis is the same kind of multivalue trap as $$\\sin\\theta = 1/2 \\Rightarrow \\theta = \\tfrac{\\pi}{6}$$ OR $$\\theta = \\tfrac{5\\pi}{6}$$ — extra geometric info disambiguates.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": true}, {"question": "FP1 (general) — Why are reflection matrices $$\\begin{pmatrix}\\cos 2\\theta & \\sin 2\\theta \\\\ \\sin 2\\theta & -\\cos 2\\theta\\end{pmatrix}$$ given in terms of $$2\\theta$$ rather than $$\\theta$$ (for reflection in $$y = x\\tan\\theta$$)?", "answer": "A reflection doubles the angle. If the mirror line makes angle $$\\theta$$ with the $$x$$-axis, a point at angle $$\\phi$$ reflects to angle $$2\\theta - \\phi$$. So the rotation-equivalent angle relating original to image is $$2\\theta$$.\n\nIntuition check: reflect in the $$x$$-axis ($$\\theta = 0$$). Matrix becomes $$\\begin{pmatrix}1 & 0 \\\\ 0 & -1\\end{pmatrix}$$ ✓ (flips $$y$$).\n\nReflect in $$y = x$$ ($$\\theta = 45°$$, so $$2\\theta = 90°$$): matrix becomes $$\\begin{pmatrix}0 & 1 \\\\ 1 & 0\\end{pmatrix}$$ ✓ (swaps $$x$$ and $$y$$).\n\nThe determinant is $$-\\cos^2 2\\theta - \\sin^2 2\\theta = -1$$ — confirms orientation reversal.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": true}], "count": 42}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "FP1 Jan 2024 Q8(a) — When you see $$\\sum_{r=1}^{n} r(2r+1)(r+1)$$, what's the very first move BEFORE applying any standard results?", "answer": "Expand the product fully into a polynomial in $$r$$: $$r(2r+1)(r+1) = 2r^3 + 3r^2 + r$$. Only then can you apply $$\\sum r$$, $$\\sum r^2$$, $$\\sum r^3$$ separately. Trying to sum the product directly is a dead end — there's no \"product rule\" for $$\\sum$$.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "FP1 Jan 2024 Q8(b) — When a \"hence\" part asks for $$\\sum_{r=n}^{2n}$$, what's the correct decomposition in terms of the closed-form $$S(N) = \\sum_{r=1}^N \\cdots$$, and why? (2 steps)", "answer": "- Step 1: Write $$\\sum_{r=n}^{2n} = S(2n) - S(n-1)$$, NOT $$S(2n) - S(n)$$.\n- Step 2: The reason is that the lower limit $$r=n$$ is INCLUDED in the sum. Subtracting $$S(n)$$ would remove the $$r=n$$ term. You always subtract one less than the lower limit.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "After applying standard results to $$\\sum(2r^3 + 3r^2 + r)$$, what's the algebraic trick that keeps the working clean before simplifying further?", "answer": "Factor out $$\\tfrac{1}{2}n(n+1)$$ from EVERY term first. Each piece — $$\\tfrac{1}{2}n^2(n+1)^2$$, $$\\tfrac{1}{2}n(n+1)(2n+1)$$, $$\\tfrac{1}{2}n(n+1)$$ — shares this factor. Pulling it out leaves a simple bracket $$[n(n+1) + (2n+1) + 1] = n^2 + 3n + 2 = (n+1)(n+2)$$, collapsing to $$\\tfrac{1}{2}n(n+1)^2(n+2)$$ without expansion mess.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "In FP1 Jan 2024 Q8(b), after subtracting $$S(2n) - S(n-1)$$, you get a quadratic factor like $$15n^2 + 17n + 4$$. How do you factor it reliably?", "answer": "- Step 1: Compute the discriminant: $$17^2 - 4(15)(4) = 289 - 240 = 49 = 7^2$$. A perfect square confirms it factors over the integers.\n- Step 2: Find factor pairs of $$15\\cdot 4 = 60$$ summing to $$17$$: that's $$12$$ and $$5$$. Split: $$15n^2 + 12n + 5n + 4 = 3n(5n+4) + 1(5n+4) = (3n+1)(5n+4)$$.\n- Step 3: Multiply back to verify — common pitfall is writing $$(5n+1)(3n+4)$$ which gives the wrong cross-term.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "Which summation formulas ARE in the FP1 formula booklet, and which crucial sum-manipulation technique is NOT?", "answer": "- Step 1: IN the booklet: $$\\sum r = \\tfrac{1}{2}n(n+1)$$, $$\\sum r^2 = \\tfrac{1}{6}n(n+1)(2n+1)$$, $$\\sum r^3 = \\tfrac{1}{4}n^2(n+1)^2$$.\n- Step 2: NOT in the booklet: the technique $$\\sum_{r=a}^{b} = S(b) - S(a-1)$$, and the strategy of expand-then-split-then-factor. The formulas are given; how to use them on restricted limits is your job.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "FP1 Jan 2024 Q9(a) — Given $$\\dfrac{3z-1}{2} = \\dfrac{\\lambda + 5i}{\\lambda - 4i}$$, what's the FIRST move and what trap should you avoid?", "answer": "- Step 1: Clear fractions to isolate $$z$$ as a single complex fraction: $$3z = 1 + \\dfrac{2(\\lambda+5i)}{\\lambda - 4i}$$, then combine over the common denominator $$\\lambda - 4i$$.\n- Step 2: TRAP: do NOT multiply both sides by $$\\lambda - 4i$$ (same as denominator) thinking it rationalises — that leaves the imaginary part on the LEFT. You rationalise by multiplying by the CONJUGATE $$\\lambda + 4i$$, only after isolating $$z$$ as a single fraction.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "Why must you multiply by the conjugate $$\\lambda + 4i$$ (not $$\\lambda - 4i$$ or $$4i$$) to separate real/imaginary parts of a complex fraction?", "answer": "Only the conjugate produces a real denominator: $$(\\lambda - 4i)(\\lambda + 4i) = \\lambda^2 + 16$$, by the difference-of-squares identity with $$i^2 = -1$$. Any other multiplier leaves an $$i$$ term in the denominator, defeating the purpose of separating $$x + yi$$.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": true}, {"question": "FP1 Jan 2024 Q9(b) — Given $$\\arg z = \\tfrac{\\pi}{4}$$, what TWO conditions must hold simultaneously, and why isn't $$y = x$$ alone enough? (3 steps)", "answer": "- Step 1: $$\\arg z = \\tfrac{\\pi}{4}$$ means $$z$$ lies on the ray at angle $$\\pi/4$$ from the positive real axis — the FIRST QUADRANT ray.\n- Step 2: This requires BOTH $$y = x$$ AND $$x > 0$$ (equivalently $$y > 0$$).\n- Step 3: $$y = x$$ alone allows the third-quadrant ray too, which has $$\\arg z = -\\tfrac{3\\pi}{4}$$. So setting $$\\tan(\\arg z) = 1$$ gives two algebraic solutions per period — you must reject the one in the third quadrant.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "After solving $$\\lambda^2 - 6\\lambda - 8 = 0$$ to get $$\\lambda = 3 \\pm \\sqrt{17}$$, how do you discriminate which value gives $$\\arg z = \\pi/4$$?", "answer": "- Step 1: Check the sign of $$y = \\dfrac{6\\lambda}{\\lambda^2 + 16}$$ for each candidate. The denominator is always positive, so the sign matches the sign of $$\\lambda$$.\n- Step 2: $$\\lambda = 3+\\sqrt{17} \\approx 7.12 > 0$$, so $$y > 0$$ ✓ (first quadrant).\n- Step 3: $$\\lambda = 3-\\sqrt{17} \\approx -1.12 < 0$$, so $$y < 0$$ ✗ (gives $$\\arg z = -3\\pi/4$$, not $$\\pi/4$$).\n\nReject $$\\lambda = 3 - \\sqrt{17}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "What is the range of the principal argument $$\\arg z$$, and why does this matter for naming third-quadrant angles?", "answer": "Principal argument lies in $$(-\\pi, \\pi]$$. A third-quadrant complex number has $$\\arg z = -\\tfrac{3\\pi}{4}$$, NOT $$+\\tfrac{5\\pi}{4}$$. Writing $$5\\pi/4$$ in an \"argument\" answer is wrong — it's outside the principal range. This is the convention examiners enforce.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "FP1 Jan 2024 Q10(i) matrix induction — when computing $$\\mathbf{M}^{k+1}$$ from the inductive hypothesis, should you write $$\\mathbf{M}\\cdot\\mathbf{M}^k$$ or $$\\mathbf{M}^k\\cdot\\mathbf{M}$$, and why does it matter?", "answer": "Write $$\\mathbf{M}^{k+1} = \\mathbf{M}^k \\cdot \\mathbf{M}$$. They're algebraically equal by associativity, but practically: your inductive hypothesis gives you the formula for $$\\mathbf{M}^k$$ (a matrix with parameter $$k$$ in it), and you're multiplying it by the fixed matrix $$\\mathbf{M}$$ on the right. This matches the entry-by-entry computation cleanly and the working must match what you wrote.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "In a matrix induction $$\\mathbf{M}^n = \\begin{pmatrix}2n+1 & -n \\\\ 4n & 1-2n\\end{pmatrix}$$, after computing $$\\mathbf{M}^{k+1}$$, what specific form must the answer be massaged into?", "answer": "The SAME parametric form as the proposition, but with $$n$$ replaced by $$k+1$$. So the $$(1,1)$$ entry must read as $$2(k+1)+1$$, not $$2k+3$$. Even though they're equal, examiners want to see the structural match — it shows you've actually proven $$P(k+1)$$, not just derived some matrix.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "FP1 Jan 2024 Q10(ii) — to prove $$f(n) = 8^{2n+1} + 6^{2n-1}$$ is divisible by 7, what's the index manipulation needed for $$f(k+1)$$?", "answer": "- Step 1: $$f(k+1) = 8^{2(k+1)+1} + 6^{2(k+1)-1} = 8^{2k+3} + 6^{2k+1}$$.\n- Step 2: Factor each exponent to expose $$f(k)$$: $$8^{2k+3} = 8^2 \\cdot 8^{2k+1} = 64\\cdot 8^{2k+1}$$ and $$6^{2k+1} = 6^2\\cdot 6^{2k-1} = 36\\cdot 6^{2k-1}$$.\n\nCommon error: writing $$6^{2k+1} = 6\\cdot 6^{2k}$$ — that doesn't match the $$6^{2k-1}$$ in $$f(k)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "In the divisibility induction for $$f(n) = 8^{2n+1} + 6^{2n-1}$$, what's the algebraic trick to express $$f(k+1)$$ in terms of $$f(k)$$?", "answer": "- Step 1: Split one of the multipliers to match the other. Here, write $$36 = 64 - 28$$ (where $$28 = 7\\cdot 4$$).\n- Step 2: Then $$f(k+1) = 64\\cdot 8^{2k+1} + (64-28)\\cdot 6^{2k-1} = 64(8^{2k+1} + 6^{2k-1}) - 28\\cdot 6^{2k-1} = 64\\,f(k) - 28\\cdot 6^{2k-1}$$.\n- Step 3: Both terms are divisible by 7: $$64\\,f(k) = 64\\cdot 7m$$ by hypothesis, and $$28 = 7\\cdot 4$$. So $$f(k+1) = 7(64m - 4\\cdot 6^{2k-1})$$.\n\nThe trick: choose the split so that the residual is a multiple of 7.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "Why is splitting \"$$36 = 64 - 28$$\" the right choice in this induction, and how would you find the analogous split for a different base?", "answer": "- Step 1: You want the form $$f(k+1) = A\\cdot f(k) + (\\text{multiple of 7})$$. Choose $$A$$ = one of the two multipliers (here 64), and write the OTHER multiplier (36) as $$A - (A - \\text{other}) = 64 - 28$$.\n- Step 2: The residual must be divisible by 7. Check: $$64 - 36 = 28 = 7\\cdot 4$$ ✓. This works because $$64 \\equiv 36 \\pmod 7$$ (both $$\\equiv 1$$).\n- Step 3: In general, for $$f(n) = a^{pn+\\alpha} + b^{qn+\\beta}$$ divisible by $$d$$, the split $$b^q = a^p - (a^p - b^q)$$ works iff $$a^p \\equiv b^q \\pmod d$$.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": true}, {"question": "What is the 5-line skeleton for an Edexcel induction proof, and which line is most commonly skipped for lost marks?", "answer": "- Step 1: **Proposition** — \"Let $$P(n)$$ be the statement…\" (state it explicitly).\n- Step 2: **Base case** — verify $$P(1)$$ by direct computation (NOT by using the formula being proved).\n- Step 3: **Hypothesis** — \"Assume $$P(k)$$ is true for some $$k\\in\\mathbb{Z}^+$$.\"\n- Step 4: **Inductive step** — show $$P(k)\\Rightarrow P(k+1)$$ algebraically.\n- Step 5: **Conclusion** — \"Since $$P(1)$$ true and $$P(k)\\Rightarrow P(k+1)$$, by induction $$P(n)$$ holds for all $$n\\in\\mathbb{Z}^+$$.\"\n\nMost commonly skipped: the CONCLUSION sentence. Edexcel awards a dedicated mark for it; saying \"QED\" or trailing off loses it.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "Why must the base case in an induction be verified by DIRECT computation, not by substituting $$n=1$$ into the formula you're trying to prove?", "answer": "Logical circularity. The formula is the conclusion you're proving — using it to verify itself proves nothing. You must compute the LHS independently (e.g., $$\\mathbf{M}^1$$ is just $$\\mathbf{M}$$; $$f(1) = 8^3 + 6 = 518$$) and the RHS by substituting $$n=1$$ into the claimed formula, then check they agree.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": true}, {"question": "In a divisibility induction, why is it insufficient to say \"$$f(k+1) - f(k)$$ is divisible by 7, hence $$f(k+1)$$ is divisible by 7\"?", "answer": "That argument only works if you also explicitly invoke the inductive hypothesis ($$f(k)$$ divisible by 7). $$f(k+1) = [f(k+1) - f(k)] + f(k)$$, and BOTH terms being divisible by 7 is what makes the sum divisible. You must state this — examiners want to see the hypothesis used by name.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "What's the trigger phrase in an induction conclusion that's worth a mark and is easy to forget?", "answer": "\"…for all $$n\\in\\mathbb{Z}^+$$\" (or \"for all positive integers $$n$$\"). Saying just \"true for all $$n$$\" risks losing the mark because it's ambiguous about the domain — induction over positive integers must explicitly cite the domain.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "What's the recurring meta-weakness across past-paper redos that distinguishes \"knowing the technique\" from exam reliability?", "answer": "- Step 1: The bottleneck is converting \"I know how to do it\" into \"I do it in 4 minutes without errors.\" Technique mastery is present; reliability isn't.\n- Step 2: Specific failure modes: off-by-one on sum limits ($$S(n)$$ vs $$S(n-1)$$), skipping the discrimination step after solving (sign of $$\\lambda$$, quadrant of $$\\arg z$$), omitting the induction conclusion sentence.\n- Step 3: Fix: drill the structural skeletons until they're automatic, freeing cognitive load for the unique algebra of each question.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "In the formula booklet for FP1, which matrix-related formulas are NOT provided and must be memorised?", "answer": "- Step 1: $$\\det\\begin{pmatrix}a&b\\\\c&d\\end{pmatrix} = ad - bc$$ and the $$2\\times 2$$ inverse $$\\dfrac{1}{ad-bc}\\begin{pmatrix}d&-b\\\\-c&a\\end{pmatrix}$$.\n- Step 2: Rotation matrix $$\\begin{pmatrix}\\cos\\theta&-\\sin\\theta\\\\\\sin\\theta&\\cos\\theta\\end{pmatrix}$$, reflection in $$y = x\\tan\\theta$$ $$\\begin{pmatrix}\\cos 2\\theta&\\sin 2\\theta\\\\\\sin 2\\theta&-\\cos 2\\theta\\end{pmatrix}$$, stretch matrices.\n- Step 3: The rule that \"A then B\" = $$\\mathbf{BA}$$ (composition order).", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "What's the composition order rule for matrix transformations — if you apply transformation $$\\mathbf{A}$$ first then $$\\mathbf{B}$$, which matrix product represents the combined map?", "answer": "The combined map is $$\\mathbf{BA}$$, with the FIRST-APPLIED matrix on the RIGHT. Reasoning: applied to vector $$\\mathbf{v}$$, you get $$\\mathbf{B}(\\mathbf{A}\\mathbf{v}) = (\\mathbf{BA})\\mathbf{v}$$ — the rightmost matrix acts first because it's adjacent to $$\\mathbf{v}$$. Writing $$\\mathbf{AB}$$ instead gives the wrong transformation.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "What's the formula for the quadratic factor of a polynomial with a known complex root $$\\alpha$$, and why does this work?", "answer": "- Step 1: The quadratic factor is $$z^2 - 2\\,\\text{Re}(\\alpha)\\,z + |\\alpha|^2$$.\n- Step 2: Derivation: real-coefficient polynomials have complex roots in conjugate pairs, so both $$\\alpha$$ and $$\\bar\\alpha$$ are roots. The factor is $$(z-\\alpha)(z-\\bar\\alpha) = z^2 - (\\alpha + \\bar\\alpha)z + \\alpha\\bar\\alpha = z^2 - 2\\,\\text{Re}(\\alpha)\\,z + |\\alpha|^2$$.\n\nThis bypasses needing to multiply $$(z-\\alpha)(z-\\bar\\alpha)$$ in $$x+iy$$ form.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "When a real-coefficient cubic has a known complex root, how many roots remain to find and what type are they?", "answer": "Cubic has degree 3 → exactly 3 roots (counting multiplicity). A complex root forces its conj ck": true}, {"question": "What's the rounding-instruction trap on exam papers, and how do you avoid it?", "answer": "The cover page says \"3 sig fig unless otherwise stated,\" but individual question parts override this CONSTANTLY (e.g., \"to 2 dp\", \"to 3 dp\", \"exact form\"). Even within ONE question, different parts can require different precisions. Discipline: RE-READ the rounding clause at the start of each part before writing the final answer.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "When a \"show that…\" question gives the answer, what should your strategy be regarding working?", "answer": "The marks are for the WORKING, not the result. Don't skip lines, don't shortcut. Examiners can tell when you reverse-engineer from the given answer. Conversely, when the answer is NOT given, the final-answer mark is independent — you can earn it even with messy working, as long as your final value is correct.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "Useful symmetric-function identities for \"roots of a quadratic\" problems (Vieta's-based questions)?", "answer": "- Step 1: $$\\alpha + \\beta = -b/a$$, $$\\alpha\\beta = c/a$$ (from $$ax^2 + bx + c = 0$$).\n- Step 2: $$\\alpha^2 + \\beta^2 = (\\alpha+\\beta)^2 - 2\\alpha\\beta$$ — avoids needing each root individually.\n- Step 3: $$\\alpha^3 + \\beta^3 = (\\alpha+\\beta)^3 - 3\\alpha\\beta(\\alpha+\\beta)$$.\n- Step 4: $$\\dfrac{1}{\\alpha} + \\dfrac{1}{\\beta} = \\dfrac{\\alpha+\\beta}{\\alpha\\beta}$$.\n\nThese let you compute symmetric functions of roots WITHOUT solving for the roots.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "When you're told $$\\arg z = \\theta$$ (any specified angle), what's the universal discrimination step after solving?", "answer": "Check the sign of $$x = \\text{Re}(z)$$ and $$y = \\text{Im}(z)$$ explicitly against the quadrant required by $$\\theta$$. Algebraic equations like $$\\tan(\\arg z) = \\tan\\theta$$ have two solutions per period (a ray and its opposite), but $$\\arg z = \\theta$$ specifies ONE ray. Always reject the candidate giving the opposite-quadrant ray.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "When summing a sequence with restricted limits $$\\sum_{r=a}^{b}$$, what's the practical workflow that prevents off-by-one errors?", "answer": "- Step 1: Define $$S(N) = \\sum_{r=1}^{N}(\\text{summand})$$ as a NAMED function.\n- Step 2: Then write $$\\sum_{r=a}^{b} = S(b) - S(a-1)$$ — the lower bound becomes $$a-1$$ because you subtract everything STRICTLY BELOW $$a$$.\n- Step 3: Substituting closed forms last (not in the middle of the subtraction) keeps the algebra readable.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "How do you allocate time across an Edexcel FP1 paper (75 marks / 90 minutes)?", "answer": "Roughly $$1.15$$ min/mark. Practical guide: 9- and 10-mark questions get 10–12 min each, 5–6-mark questions get 5–7 min. If you're past target on a question, MOVE ON — partial marks on the next question are worth more than 5 extra minutes scraping the current one.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "What is the area scale factor under a linear map represented by matrix $$\\mathbf{M}$$, and why?", "answer": "$$|\\det \\mathbf{M}|$$. Intuition: the unit square's image is the parallelogram spanned by the columns of $$\\mathbf{M}$$, whose area equals $$|\\det \\mathbf{M}|$$. Negative determinant means orientation flipped (reflection component), so absolute value gives the area magnitude. Zero determinant collapses to a line — area is zero.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "For symbolic problems like $$(\\alpha + 1/\\beta^2)(\\beta + 1/\\alpha^2)$$ where $$\\alpha, \\beta$$ are roots of a quadratic, what's the systematic expansion approach?", "answer": "- Step 1: E const SK='fp1_paper_jan2024';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}

  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
