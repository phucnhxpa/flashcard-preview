M 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "The Stefan-Boltzmann law gives stellar luminosity as $$L \\propto r^2 T^4$$. If a star's radius increases by a factor of 100 and its temperature decreases by a factor of 2, by what factor does its luminosity change? (3 steps)", "answer": "- Step 1: The scaling relationship is: if radius multiplies by $$k_r$$ and temperature multiplies by $$k_T$$, then luminosity scales by $$k_r^2 \\times k_T^4$$. This comes from $$L = \\sigma A T^4$$ with $$A \\propto r^2$$.\n- Step 2: Here, $$k_r = 100$$ (radius increases by factor 100) and $$k_T = 1/2$$ (temperature halves). So: radius factor: $$k_r^2 = 100^2 = 10{,}000$$. Temperature factor: $$k_T^4 = (1/2)^4 = 1/16$$.\n- Step 3: Combined luminosity factor: $$10{,}000 \\times 1/16 = 625$$. The luminosity increases by a factor of 625. Even though the temperature halved, the enormous increase in surface area (10,000×) dominates over the temperature decrease (1/16×).\n\nThe intuition: luminosity depends much more strongly on temperature (fourth power) than on radius (square), but when radius changes by a huge factor like 100, the area effect can still dominate.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "Why does luminosity depend on the fourth power of temperature ($$T^4$$) rather than just linearly on T? What would happen to luminosity if you doubled the temperature of a star with the same radius? (2 steps)", "answer": "- Step 1: The Stefan-Boltzmann law arises from thermal radiation theory: each unit area of a black body surface radiates power proportional to $$T^4$$. This fourth-power dependence comes from integrating the Planck radiation spectrum over all wavelengths — it is a fundamental result of quantum physics, not an arbitrary choice. Hotter surfaces emit dramatically more radiation per unit area.\n- Step 2: If you double the temperature (T → 2T) while keeping the radius the same: $$L_{new}/L_{old} = (2T)^4/T^4 = 2^4 = 16$$. The luminosity increases by a factor of 16, not 2. This dramatic sensitivity to temperature is why even modest temperature differences between stars produce enormous luminosity differences.\n\nA small temperature increase causes a huge luminosity increase — this is why hot blue stars are vastly more luminous than cool red stars of the same size.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": true}, {"question": "A transverse wave has amplitude 3 cm and frequency 5 Hz. In one complete cycle, what total distance does a single particle of the medium travel, and why is this not equal to the wavelength? (3 steps)", "answer": "- Step 1: A particle in a transverse wave oscillates about its rest position. In one complete cycle, it moves: up by one amplitude (3 cm) to the peak, down through the rest position by two amplitudes (6 cm) to the trough, and back up by one amplitude (3 cm) to the rest position.\n- Step 2: Total distance per cycle = 3 + 3 + 3 + 3 = 4 × amplitude = 4 × 3 = 12 cm. The particle traces a path of 4A per cycle regardless of the wavelength or wave speed.\n- Step 3: This is not the wavelength. The wavelength is the distance the wave shape travels during one cycle (how far the pattern moves forward). The particle doesn't travel with the wave — it only bobs up and down. The wave moves energy forward, but the particle stays near its equilibrium position.\n\nKey distinction: the particle's path (4A per cycle) is a vertical oscillation distance, while the wavelength is a horizontal distance between successive peaks of the wave pattern.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "A wave has amplitude 4 cm and frequency 2 Hz. How far does a particle of the medium travel in 10 seconds? (3 steps)", "answer": "- Step 1: Distance per cycle = 4A = 4 × 4 = 16 cm. Each full oscillation takes the particle through 4 amplitudes of path.\n- Step 2: Number of cycles in 10 seconds = frequency × time = 2 × 10 = 20 cycles.\n- Step 3: Total distance = 20 × 16 = 320 cm = 3.2 m. The particle oscillates back and forth, covering 3.2 m of total path length in 10 seconds, even though its net displacement from the starting position is zero (it returns to rest after each cycle).\n\nThe formula: total distance = 4A × f × t, where f is frequency and t is time. This gives distance per unit time = 4Af.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "A 5 kg mass is lifted vertically upward with an acceleration of 0.8 m/s² (g = 10 m/s²). Why is the tension in the rope NOT simply equal to the weight (50 N)? What is the tension, and what common mistake leads to the wrong answer? (3 steps)", "answer": "- Step 1: Newton's second law states that the resultant (net) force equals ma: $$F_{res} = ma$$. The resultant force is the vector sum of all forces on the object, not just one of them. Here, two forces act: tension T upward and weight mg downward.\n- Step 2: Taking upward as positive: $$F_{res} = T - mg = ma$$. So $$T = m(g + a) = 5 \\times (10 + 0.8) = 5 \\times 10.8 = 54$$ N. The tension must exceed the weight by exactly enough to produce the upward acceleration.\n- Step 3: The common mistake is setting T = mg = 50 N, which would give a resultant force of zero and therefore zero acceleration — the object would move at constant velocity (or remain stationary), not accelerate upward. If T = 50 N, the object is in equilibrium, not accelerating.\n\nThe golden rule: F = ma uses the resultant force, not the applied force. You must account for all forces, including weight.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "A pulley redirects a rope that lifts a mass. The tension in the rope is T. Why does the pulley's coupling (axle) experience a force of 2T, not T? (2 steps)", "answer": "- Step 1: The rope enters the pulley from one side and exits from the other. Both segments of rope pull on the pulley with tension T — one pulling down from the motor side, and one pulling down from the mass side. The pulley feels T downward from each side.\n- Step 2: The coupling/axle supporting the pulley must resist the combined pull of both rope segments. Total downward force on the pulley = T + T = 2T. The coupling provides an upward force of 2T to keep the pulley in equilibrium.\n\nThink of it like two people pulling down on opposite ends of a rope draped over a bar — the bar feels twice the tension. The pulley doesn't \"halve\" the force on its support; it doubles it.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "A 2 kg mass is lifted at 1.5 m/s² over a pulley (g = 10 m/s²). Find the tension in the rope and the force on the pulley's coupling. (2 steps)", "answer": "- Step 1: Tension: $$T = m(g + a) = 2 \\times (10 + 1.5) = 2 \\times 11.5 = 23$$ N. The tension must overcome both the weight (20 N) and provide the net upward force (3 N) for the acceleration.\n- Step 2: Coupling force = 2T = 2 × 23 = 46 N. The pulley's axle feels both rope segments pulling down, each with 23 N.\n\nThe coupling force is always exactly double the tension for a simple pulley redirecting a rope — regardless of whether the mass is accelerating or at constant speed.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "If the mass in a pulley system is lowered (accelerating downward) instead of lifted, does the tension increase or decrease compared to the weight? What happens to the coupling force? (3 steps)", "answer": "- Step 1: When accelerating downward, the net force must be downward. Taking upward as positive: $$T - mg = ma$$, where a is negative (downward acceleration). So $$T = m(g + a)$$ with a < 0, meaning T < mg.\n- Step 2: For example, if a = −2 m/s² and g = 10 m/s²: $$T = m(10 - 2) = 8m$$. The tension is less than the weight because gravity is doing most of the pulling — the rope doesn't need to provide as much upward force.\n- Step 3: The coupling force is still 2T, but since T is smaller, the coupling force is smaller too. If the object were in free fall (a = −g), T = 0 and the coupling force would also be 0 — the rope would go slack.\n\nEdge case: if the object accelerates downward at exactly g, the tension drops to zero. The coupling force is always 2T, so it also drops to zero.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": true}, {"question": "Why does gamma radiation ($$^{0}_{0}\\gamma$$) not change the mass number or proton number of a nucleus, and what does this mean about its role in nuclear equations? (2 steps)", "answer": "- Step 1: Gamma radiation is a high-energy photon — it has zero mass (A = 0) and zero charge (Z = 0). Since it carries away no nucleons and no protons, the daughter nucleus has exactly the same A and Z as the parent.\n- Step 2: In nuclear equations, gamma emission is often written alongside alpha or beta decay because the daughter nucleus is typically in an excited state and releases energy as gamma radiation to reach its ground state. But the gamma emission itself doesn't change the nuclear identity — it only releases energy. So in conservation checks (A and Z), gamma can be safely ignored.\n\nGamma is like the \"receipt\" for energy released — the nucleus rearranges (via α or β), then sheds excess energy as a photon without changing its composition.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "You have three power formulas: $$P = IV$$, $$P = I^2R$$, and $$P = V^2/R$$. In a circuit with a fixed resistor and a variable supply, why might you choose one form over another? (3 steps)", "answer": "- Step 1: Choose the form that uses the quantity you know is fixed or easily calculated. If R is the fixed resistor and you've calculated I from the total circuit, use $$P = I^2R$$ — R is fixed and I is known.\n- Step 2: If instead you know the voltage across R (perhaps from a potential divider), use $$P = V^2/R$$ — V is known and R is fixed. This avoids recalculating current.\n- Step 3: If you know both I and V directly (e.g., from ammeter and voltmeter readings), use $$P = IV$$ — it's the most direct. The key ESAT strategy: identify which quantities are fixed or given, then pick the formula that uses those quantities and avoids unknowns.\n\nMisconception: \"all three formulas always give different answers.\" No — they are mathematically equivalent (substitute V = IR into any one to derive the others). They just differ in convenience depending on what you know.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "A 6 V supply is connected to a 2 Ω variable resistor (minimum 2 Ω) in series with a fixed 4 Ω resistor. What is the maximum power dissipated in the 4 Ω resistor? (3 steps)", "answer": "- Step 1: To maximise power in the fixed 4 Ω resistor, maximise current by minimising the variable resistor to its minimum of 2 Ω. Total resistance: $$R_{total} = 4 + 2 = 6$$ Ω.\n- Step 2: Current: $$I = V/R_{total} = 6/6 = 1$$ A.\n- Step 3: Power in 4 Ω: $$P = I^2 R = 1^2 \\times 4 = 4$$ W. Cross-check: voltage across 4 Ω = $$\\frac{4}{6} \\times 6 = 4$$ V, so $$P = V^2/R = 16/4 = 4$$ W. ✓\n\nMaximum power in a fixed resistor is achieved when current through it is maximised — which means minimising all other resistances in series.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": false}, {"question": "When a question asks for \"minimum tension\" or \"maximum power,\" why should you treat these words as hints about the physics, not just as arbitrary conditions? (2 steps)", "answer": "- Step 1: \"Minimum\" or \"maximum\" tells you that the answer depends on a variable quantity, and you should set that variable to its most extreme value. For maximum power in a fixed resistor, the variable is the other resistance — set it to minimum. For minimum tension in a pulley, the variable is the acceleration — set it to the given value (not higher).\n- Step 2: Without the \"minimum\" or \"maximum\" constraint, the problem would be underdetermined (infinite possible answers). The constraint makes it solvable by forcing you to consider the boundary case. ESAT questions use these words deliberately — they are signals telling you which quantity to extremise and which formula to apply.\n\nRead \"minimum\" as \"set all other quantities to their least favourable values\" and \"maximum\" as \"set all other quantities to their most favourable values.\"", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": true}, {"question": "A star's radius triples and its temperature doubles. By what factor does its luminosity change? Show the step-by-step scaling. (3 steps)", "answer": "- Step 1: Luminosity scales as $$L \\propto r^2 T^4$$. Write the scaling factors: $$k_r = 3$$ (radius triples) and $$k_T = 2$$ (temperature doubles).\n- Step 2: Apply each factor: radius contributes $$k_r^2 = 3^2 = 9$$, and temperature contributes $$k_T^4 = 2^4 = 16$$.\n- Step 3: Combined factor: $$9 \\times 16 = 144$$. The luminosity increases by a factor of 144.\n\nMental math tip: $$9 \\times 16 = 9 \\times (10 + 6) = 90 + 54 = 144$$, or recognise that $$3^2 \\times 2^4 = 9 \\times 16 = 144$$.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "In a parallel circuit with a 12 V supply, branch A has one 30 Ω resistor and branch B has two 30 Ω resistors in series. When a switch shorts out one resistor in branch B, explain why the total current from the battery increases by exactly 0.2 A. (3 steps)", "answer": "- Step 1: Before the switch: $$I_A = 12/30 = 0.4$$ A, $$I_B = 12/60 = 0.2$$ A, total = 0.6 A. Each branch independently draws current based on its own total resistance.\n- Step 2: After the switch: branch B now has only one 30 Ω resistor (the other is bypassed by the ideal wire). The short circuit across one resistor means all current in branch B flows through the wire (zero resistance path), and no current flows through the shorted resistor.\n- Step 3: New $$I_B' = 12/30 = 0.4$$ A. Branch A is unchanged at 0.4 A. New total = 0.8 A. The increase is exactly 0.8 − 0.6 = 0.2 A, which equals the increase in branch B's current (0.4 − 0.2 = 0.2 A). Branch A's current doesn't change because its voltage (12 V) and resistance (30 Ω) haven't changed.\n\nThe 0.2 A increase comes entirely from branch B becoming less resistive. The battery must now supply more total current, but each branch still independently sees 12 V.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": false}, {"question": "Why does a kinetic energy vs velocity graph form a parabola rather than a straight line, and what would the graph of KE vs speed squared ($$v^2$$) look like? (2 steps)", "answer": "- Step 1: $$E_k = \\frac{1}{2}mv^2$$ means KE is proportional to v², not v. Plotting KE against v gives a parabolic curve (quadratic). The gradient increases as v increases — at high speeds, small speed increases produce large KE increases.\n- Step 2: If you plot KE against v² instead (i.e., $$E_k = \\frac{1}{2}m \\cdot v^2$$, treating v² as the x-variable), you get a straight line through the origin with gradient $$m/2$$. This is a useful trick: if you suspect a quadratic relationship, plot y against x² and check for linearity.\n\nCommon trap: assuming KE vs v is linear. It is not — doubling the speed quadruples the KE.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": true}, {"question": "A GPE vs height graph for a 20 kg object (g = 10 m/s²) gives a point at (2 m, 10 J). Is this consistent? If not, what would the correct value be? (2 steps)", "answer": "- Step 1: Using $$E_p = mgh$$: $$E_p = 20 \\times 10 \\times 2 = 400$$ J. But the graph shows 10 J at h = 2 m, which is far less than 400 J.\n- Step 2: The graph point is inconsistent with m = 20 kg and g = 10 m/s². For the point (2, 10) to be correct, the mass would need to be $$m = E_p/(gh) = 10/(10 \\times 2) = 0.5$$ kg. Alternatively, if m = 20 kg, the correct GPE at h = 2 m would be 400 J.\n\nThis type of cross-checking is essential in ESAT: always verify that graph data is consistent with the stated parameters.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": false}, {"question": "What is EMF, how does it differ from potential difference, and what does Kirchhoff's second law say about their relationship? (3 steps)", "answer": "- Step 1: EMF (electromotive force) is the energy supplied per unit charge by a power source (like a battery). It's measured in volts (J/C). EMF represents energy being given to the charges.\n- Step 2: Potential difference (p.d.) is the energy transferred per unit charge across a component (like a resistor). It's also measured in volts, but it represents energy being taken from the charges — converted to heat, light, motion, etc.\n- Step 3: Kirchhoff's second law states that around any closed loop, $$\\Sigma \\text{EMF} = \\Sigma \\text{p.d.}$$ (or $$\\Sigma \\text{EMF} = \\Sigma IR$$). The total energy given to the charges by the sources equals the total energy taken from them by the components. Every joule of energy the battery provides is spent by the time the charge completes the loop.\n\nEMF is \"income\" (energy in), p.d. is \"expenditure\" (energy out). Kirchhoff's second law says: total income = total expenditure around the loop.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": false}, {"question": "In a circuit with a 12 V battery and two 30 Ω resistors in series, what is the voltage across each resistor, and why must they add up to 12 V? (3 steps)", "answer": "- Step 1: The total resistance is 30 + 30 = 60 Ω. Current: $$I = 12/60 = 0.2$$ A. The same current flows through both resistors (series circuit).\n- Step 2: Voltage across each resistor: $$V = IR = 0.2 \\times 30 = 6$$ V each. Since both resistances are equal, the 12 V splits equally: 6 V and 6 V.\n- Step 3: By Kirchhoff's second law, the voltage drops must sum to the EMF: 6 + 6 = 12 V. The charges receive 12 J/C from the battery and spend exactly 6 J/C on each resistor, returning to the battery with zero net energy gain.\n\nEqual resistances in series always share the supply voltage equally. Unequal resistances share proportionally.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": false}, {"question": "A wave has amplitude 2 cm and frequency 10 Hz. What is the total distance a particle travels in 5 seconds, and what is its net displacement after 5 seconds? (3 steps)", "answer": "- Step 1: Distance per cycle = 4A = 4 × 2 = 8 cm.\n- Step 2: Number of cycles in 5 seconds = 10 × 5 = 50 cycles. Total distance = 50 × 8 = 400 cm = 4 m.\n- Step 3: Net displacement after 5 seconds = 0 cm (assuming the particle started at its rest position). After each complete cycle, the particle returns to its starting point. Since 50 is an integer number of cycles, the particle is back at rest. Distance (total path length) and displacement (start-to-end vector) are fundamentally different quantities.\n\nThis highlights the distinction: distance is a scalar (always increasing), displacement is a vector (can be zero even after large distances).", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": false}, {"question": "If a nucleus with A = 236 and Z = 92 undergoes fission producing two fragments with A = 90, Z = 36 and A = 143, Z = 55, plus some neutrons, how many neutrons are released? Verify using both conservation laws. (3 steps)", "answer": "- Step 1: Conservation of nucleon number: total A on the left = 236. Total A on the right from the two fragments = 90 + 143 = 233. Remaining A for neutrons = 236 − 233 = 3. Each neutron has A = 1, so 3 neutrons are released.\n- Step 2: Conservation of proton number: total Z on the left = 92. Total Z on the right from fragments = 36 + 55 = 91. But neutrons have Z = 0, so total Z on the right = 91 + 0 = 91. This does NOT equal 92.\n- Step 3: The equation as stated violates proton number conservation (92 ≠ 91). This means the proposed fission products are incorrect, or there's an additional charged particle. A valid equation must satisfy both A and Z conservation simultaneously.\n\nThis demonstrates that you must check both A and Z. Getting A to balance doesn't guarantee Z balances, and vice versa.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": true}, {"question": "Why can't you have \"voltage in a wire\" between two points connected by an ideal wire, and what does this imply for drawing circuit diagrams? (2 steps)", "answer": "- Step 1: An ideal wire has zero resistance. By $$V = IR$$, if R = 0 then V = 0 regardless of current. There is no voltage drop across an ideal wire. Any two points connected only by wire are at the same potential.\n- Step 2: In circuit analysis, this means you can label all wire-connected points on one side of the circuit at the same voltage (e.g., 12 V on the positive side, 0 V on the negative side). Voltage differences only appear across components (resistors, bulbs, etc.). When drawing circuit diagrams, mentally colour-code or label potentials: everything on the same wire \"level\" has the same voltage.\n\nMisconception: \"current flows through a wire, so there must be a voltage across it.\" No — current flows through a wire precisely because there's no resistance to oppose it. Voltage drops only occur where there is resistance.", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": false}, {"question": "A mass is being lowered at constant speed using a rope over a pulley. What is the tension in the rope, and how does this differ from the case where the mass accelerates downward? (3 steps)", "answer": "- Step 1: At constant speed, acceleration a = 0. Newton's second law: $$T - mg = ma = 0$$, so $$T = mg$$. The tension exactly equals the weight. The rope supports the mass without any net force.\n- Step 2: If the mass accelerates downward (a < 0, taking upward as positive): $$T - mg = ma$$ where a is negative. So $$T = m(g + a) = mg - m|a|$$. The tension is less than the weight because gravity alone provides more downward force than needed; the rope just slows the descent slightly.\n- Step 3: The coupling force on the pulley is always 2T. For constant speed: coupling = 2mg. For downward acceleration: coupling = 2m(g + a) < 2mg. For upward acceleration: coupling = 2m(g + a) > 2mg.\n\nConstant speed is the special case where T = mg. Any acceleration changes T: upward acceleration increases T, downward acceleration decreases T.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": true}, {"question": "Three forms of the power equation are $$P = IV$$, $$P = I^2R$$, and $$P = V^2/R$$. Starting from $$P = IV$$ and Ohm's law, derive the other two forms. (3 steps)", "answer": "- Step 1: Start with $$P = IV$$. Ohm's law gives $$V = IR$$. Substitute V into the power equation: $$P = I \\times IR = I^2R$$. This form is useful when you know the current through and resistance of a component.\n- Step 2: Again from $$P = IV$$, but this time rearrange Ohm's law to $$I = V/R$$. Substitute I into the power equation: $$P = (V/R) \\times V = V^2/R$$. This form is useful when you know the voltage across and resistance of a component.\n- Step 3: All three forms are mathematically equivalent — they describe the same physical quantity (power) expressed in terms of different variable pairs. The choice of which to use depends on which quantities are known or fixed in the problem. For a fixed R, use $$I^2R$$ or $$V^2/R$$ to avoid unknowns.\n\nDeriving these is straightforward algebra; the key is knowing when each form is most convenient.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": false}, {"question": "The rate of thermal conduction is $$C \\propto A \\cdot \\Delta T / L$$. If you want to triple the conduction rate through a bar without changing the temperature difference, what are two different ways to achieve this? (2 steps)", "answer": "- Step 1: Method 1 — triple the cross-sectional area. Since $$C \\propto A$$, making A → 3A while keeping L and ΔT constant triples C. A thicker bar conducts three times as much heat because it has three times as many molecular \"pathways\" for energy transfer.\n- Step 2: Method 2 — reduce the length to one-third. Since $$C \\propto 1/L$$, making L → L/3 while keeping A and ΔT constant also triples C. A shorter bar conducts heat more efficiently because the energy has less distance to travel. Other combinations work too (e.g., double A and reduce L to 2L/3), but these are the simplest single-variable changes.\n\nThe formula makes intuitive predictions: thicker or shorter bars conduct more heat; longer or thinner bars conduct less.", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": false}, {"question": "In the context of ESAT exam technique, why is it important to identify whether a quantity is \"fixed\" or \"variable\" before choosing which power formula to use? (2 steps)", "answer": "- Step 1: In a circuit, some quantities are fixed by the problem (e.g., a fixed resistor value, a fixed supply voltage). Others are variable (e.g., a variable resistor, the resulting current). If you use a formula that involves an unknown variable, you'll need extra steps to find it. If you use a formula that involves only known/fixed quantities, you can compute directly.\n- Step 2: For example, when maximising power in a fixed resistor R, use $$P = I^2R$$ because R is fixed and I can be calculated from the total circuit. Using $$P = V^2/R$$ would require finding V across R first (an extra potential-divider step). Using $$P = IV$$ would require finding both I and V. The form $$I^2R$$ minimises the number of unknowns.\n\nStrategy: list what's fixed, list what's variable, then pick the formula that uses fixed quantities and avoids unnecessary intermediate calculations.", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": false}, {"question": "Explain why the CMBR is specifically in the microwave region of the electromagnetic spectrum, rather than still being in the gamma-ray region where it was originally emitted. (2 steps)", "answer": "- Step 1: The original radiation was thermal gamma radiation from the extremely hot early universe (temperatures of billions of Kelvin). As the universe expanded over ~13.8 billion years, space itself stretched, and the wavelengths of this radiation stretched with it.\n- Step 2: The expansion factor is enormous — roughly 1000×. Gamma rays have wavelengths of ~$$10^{-12}$$ m; stretched by 1000× they become ~$$10^{-9}$$ m, which is in the microwave range. The CMBR today has a temperature of about 2.7 K, corresponding to peak wavelengths in the microwave region. It's not that the radiation was \"replaced\" — the same photons have simply been redshifted.\n\nThe CMBR is literally the afterglow of the Big Bang, still travelling through space, but its wavelength has been stretched so much by cosmic expansion that it's now in the microwave band.", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": false}, {"question": "A circuit has a 12 V supply with two parallel branches. Branch A has a single 30 Ω resistor. Branch B has two 30 Ω resistors in series with a switch that can short one of them. Explain what happens to the voltage distribution in branch B when the switch is closed. (3 steps)", "answer": "- Step 1: With the switch open: the two 30 Ω resistors in branch B split the 12 V equally — 6 V across each. Current through branch B is $$I_B = 12/60 = 0.2$$ A.\n- Step 2: When the switch closes, an ideal wire (zero resistance) is placed in parallel with one of the 30 Ω resistors. All current in branch B takes the zero-resistance path through the wire, and no current flows through the shorted resistor. The shorted resistor has 0 V across it (because the wire bypasses it).\n- Step 3: The remaining 30 Ω resistor in branch B now has the full 12 V across it. Current through branch B becomes $$I_B' = 12/30 = 0.4$$ A. The voltage distribution has changed from 6 V + 6 V to 12 V + 0 V.\n\nShorting a component means bypassing it entirely — no current flows through it, no voltage drops across it, and the remaining components in the branch see the full supply voltage.", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": true}, {"question": "Why is it incorrect to say \"the particle moves with the wave\" in a transverse wave, and what is the correct description of particle motion? (2 steps)", "answer": "- Step 1: In a transverse wave, the wave pattern (the disturbance) travels horizontally, but each individual particle of the medium only oscillates vertically about its equilibrium position. The particle does not travel horizontally with the wave — it returns to its starting point after each cycle.\n- Step 2: The correct description: each particle undergoes simple harmonic motion perpendicular to the direction of wave propagation. The wave transfers energy (and information) forward, but the particles themselves stay locally confined, moving up and down (or side to side) without net horizontal displacement.\n\nAnalogy: a crowd doing \"the wave\" in a stadium — each person stands up and sits down in place, but the pattern of standing travels around the stadium. No person actually moves around the stadium.", "source": "GLM 5.1 ②", "_id": "glm_2_50", "judge_pick": false}, {"question": "A nuclear decay chain reduces a nucleus's mass number by 8 and its proton number by 2. What combination of alpha and beta-minus decays could produce this result? (3 steps)", "answer": "- Step 1: Each alpha decay reduces A by 4 and Z by 2. Each beta-minus decay changes A by 0 and Z by +1. We need to find integers n (alpha) and m (beta) such that: $$-4n = -8$$ and $$-2n + m = -2$$.\n- Step 2: From the first equation: n = 2 (two alpha decays). From the second equation: $$-2(2) + m = -2$$, so $$-4 + m = -2$$, giving m = 2. So we need 2 alpha decays and 2 beta-minus decays.\n- Step 3: Check: 2 alphas give ΔA = −8, ΔZ = −4. 2 betas give ΔA = 0, ΔZ = +2. Net: ΔA = −8, ΔZ = −2. ✓\n\nThis type of algebraic approach is essential for ESAT decay chain questions — set up equations for both A and Z, then solve simultaneously.", "source": "GLM 5.1 ②", "_id": "glm_2_51", "judge_pick": true}, {"question": "A velocity–time graph for an object of mass 20 kg shows a straight line from the origin to the point (2 s, 10 m/s). What force is being applied, and how would you verify this using a work–distance graph? (3 steps)", "answer": "- Step 1: The gradient of the velocity–time graph is the acceleration: $$a = \\Delta v / \\Delta t = 10/2 = 5$$ m/s².\n- Step 2: Using Newton's second law: $$F = ma = 20 \\times 5 = 100$$ N. This is the resultant force on the object.\n- Step 3: On a work–distance graph, if the same force is applied, the gradient should be F = 100 N. The work done over 2 m would be W = Fd = 100 × 2 = 200 J, giving a point (2, 200) with gradient 200/2 = 100 N. The gradients of both graphs should give consistent force values.\n\nCross-checking between different graph types is a powerful ESAT technique — if the forces don't match, at least one graph is inconsistent.", "source": "GLM 5.1 ②", "_id": "glm_2_52", "judge_pick": false}, {"question": "What is the definition of frequency, and how does it connect the number of wave cycles to the total distance a particle travels? Give the formula. (2 steps)", "answer": "- Step 1: Frequency (f) is the number of complete cycles per second, measured in hertz (Hz), where 1 Hz = 1 cycle per second. If a wave has frequency f, then in t seconds, the number of cycles is $$N = f \\times t$$.\n- Step 2: Each cycle, a particle travels a path of 4A (4 amplitudes). So total distance = $$4A \\times f \\times t$$. This gives the distance per unit time as 4Af, which has units of m/s (a speed — but it's the particle's oscillation speed, not the wave speed).\n\nThe wave speed $$c = f\\lambda$$ tells you how fast the wave pattern moves; the particle speed $$4Af$$ tells you how fast the particle oscillates. These are completely different quantities.", "source": "GLM 5.1 ②", "_id": "glm_2_53", "judge_pick": false}, {"question": "In a potential divider, $$R_1 = 20\\;\\Omega$$ and $$R_2 = 10\\;\\Omega$$ are in series across a 9 V supply. What is the voltage across $$R_2$$, and what would happen to this voltage if $$R_1$$ were replaced with a wire? (3 steps)", "answer": "- Step 1: The voltage across $$R_2$$ is given by the potential divider formula: $$V_2 = \\frac{R_2}{R_1 + R_2} \\times V = \\frac{10}{20 + 10} \\times 9 = \\frac{10}{30} \\times 9 = 3$$ V. The smaller resistor gets the smaller share.\n- Step 2: If $$R_1$$ were replaced with a wire (0 Ω), then $$R_{total} = 0 + 10 = 10$$ Ω, and $$V_2 = \\frac{10}{0 + 10} \\times 9 = 9$$ V. The full supply voltage appears across $$R_2$$ because the wire drops no voltage.\n- Step 3: Conversely, if $$R_2$$ were replaced with a wire, then $$V_2 = 0$$ V (no voltage across a wire) and all 9 V would drop across $$R_1$$. Shorting a resistor in a potential divider removes its voltage share entirely.\n\nThe potential divider rule is simply \"voltage divides in the ratio of resistances\" — the bigger resistor gets the bigger voltage share.", "source": "GLM 5.1 ②", "_id": "glm_2_54", "judge_pick": false}, {"question": "The conduction rate through a bar is C. If the temperature difference ΔT is doubled and the length L is halved (with area A unchanged), by what factor does C change? (2 steps)", "answer": "- Step 1: The original rate is $$C \\propto \\frac{A \\cdot \\Delta T}{L}$$. The new conditions are: ΔT → 2ΔT and L → L/2.\n- Step 2: New rate: $$C' \\propto \\frac{A \\cdot 2\\Delta T}{L/2} = \\frac{2A \\cdot \\Delta T}{L/2} = 4 \\times \\frac{A \\cdot \\Delta T}{L} = 4C$$. Douling ΔT doubles C, and halving L doubles C again. The combined effect is a factor of 4.\n\nBoth changes increase the conduction rate: a steeper temperature gradient (larger ΔT) and a shorter path (smaller L) both help heat flow faster.", "source": "GLM 5.1 ②", "_id": "glm_2_55", "judge_pick": false}, {"question": "Why does the ESAT frequently test electricity more than other topics, and what does this mean for your preparation strategy? (2 steps)", "answer": "- Step 1: Based on tutor experience with past papers (NSAA/ESAT), electricity questions appear disproportionately often. They test multiple concepts simultaneously (Ohm's law, Kirchhoff's laws, power, potential dividers, parallel circuits) and can be made challenging with switches, variable resistors, and maximum/minimum conditions.\n- Step 2: Preparation strategy: prioritise electricity practice. Master the three power forms, Kirchhoff's laws, potential dividers, and parallel circuit analysis. Many ESAT electricity questions use GCSE-level equations but in unfamiliar combinations. Speed and accuracy come from making the methods automatic — identify the circuit type, choose the right formula, and compute quickly.\n\nThe ESAT rewards speed under pressure. Electricity is the most time-intensive topic, so making these methods automatic frees up time for other questions.", "source": "GLM 5.1 ②", "_id": "glm_2_56", "judge_pick": true}, {"question": "A mass of 3 kg is held stationary by a rope over a pulley (g = 10 m/s²). What is the tension, and what is the force on the pulley's coupling? If the mass is then lowered at constant speed, do these values change? (3 steps)", "answer": "- Step 1: Stationary means a = 0. Tension: $$T = m(g + a) = 3 \\times (10 + 0) = 30$$ N. The tension exactly equals the weight.\n- Step 2: Coupling force = 2T = 60 N. The pulley feels two lots of 30 N pulling down.\n- Step 3: Lowering at constant speed also means a = 0, so the tension and coupling force are unchanged: T = 30 N and coupling = 60 N. Constant velocity (whether upward, downward, or zero) always gives T = mg. Only acceleration changes the tension.\n\nThe key insight: \"stationary\" and \"constant speed\" are both zero-acceleration cases. Newton's first law — no resultant force means no acceleration, regardless of direction of motion.", "source": "GLM 5.1 ②", "_id": "glm_2_57", "judge_pick": false}, {"question": "In the formula $$C \\propto A \\cdot \\Delta T / L$$, what happens to the conduction rate if the bar is perfectly insulated on its sides and you double the length while keeping everything else constant? What physical reasoning explains this? (2 steps)", "answer": "- Step 1: Since $$C \\propto 1/L$$, doubling the length halves the conduction rate: C → C/2. The heat must travel twice as far through the bar, encountering twice the thermal resistance.\n- Step 2: The insulation on the sides means all heat must travel along the bar (no heat escapes sideways). A longer bar means each unit of heat energy must be passed between more atomic layers to get from the hot end to the cold end. Each layer adds resistance, so twice the length means twice the resistance and half the rate.\n\nThe insulation condition simplifies the problem: without it, some heat would escape through the sides, and the calculation would be much more complex. ESAT questions typically assume insulated bars for this reason.", "source": "GLM 5.1 ②", "_id": "glm_2_58", "judge_pick": true}, {"question": "A 6 V supply powers a circuit with a 2 Ω variable resistor (minimum 2 Ω) in series with a fixed 4 Ω resistor. What is the voltage across the 4 Ω resistor when the variable resistor is at its minimum, and how does this relate to the power calculation? (3 steps)", "answer": "- Step 1: At minimum variable resistance (2 Ω), total resistance = 4 + 2 = 6 Ω. Current: $$I = 6/6 = 1$$ A.\n- Step 2: Voltage across the 4 Ω resistor: $$V_4 = IR = 1 \\times 4 = 4$$ V. Alternatively, by the potential divider: $$V_4 = \\frac{4}{4+2} \\times 6 = \\frac{4}{6} \\times 6 = 4$$ V.\n- Step 3: Power in the 4 Ω resistor: $$P = V^2/R = 16/4 = 4$$ W, or equivalently $$P = I^2R = 1 \\times 4 = 4$$ W. Both methods give the same answer, confirming consistency.\n\nThe voltage across the fixed resistor (4 V) is less than the supply voltage (6 V) because the variable resistor claims its share: 2 V across 2 Ω.", "source": "GLM 5.1 ②", "_id": "glm_2_59", "judge_pick": false}], "count": 60}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "What is the Cosmic Microwave Background Radiation (CMBR), and what cosmological event does it serve as direct evidence for?", "answer": "The CMBR is the relic electromagnetic radiation that filled the early universe when it was hot and dense. Originally this radiation was in the **gamma** region of the spectrum (short wavelength, high frequency). As the universe expanded over billions of years since the 1920s discovery of expansion, those gamma waves were physically stretched by the expanding space itself, shifting them into the **microwave** region (long wavelength, low frequency). The CMBR is considered **direct evidence of the Big Bang** because it is exactly the thermal afterglow you would predict if the universe began in an extremely hot, dense state and then expanded and cooled.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "In an expanding universe, why does the relic radiation shift from the gamma region to the microwave region? Use the wave speed equation to walk through the mechanism. (3 steps)", "answer": "- Step 1: All electromagnetic radiation travels at the same speed in vacuum: $$c = f\\lambda$$, where $$c$$ is constant (the speed of light). This means frequency and wavelength are locked together — if one changes, the other must change inversely.\n- Step 2: Cosmic expansion physically stretches the space between wave crests, increasing the wavelength $$\\lambda$$. The gamma radiation from the early universe had a very short $$\\lambda$$; after billions of years of expansion, $$\\lambda$$ has grown enormously.\n- Step 3: Since $$c$$ is constant and $$\\lambda$$ has increased, the frequency $$f = c/\\lambda$$ must decrease. The radiation shifts from gamma (high $$f$$, short $$\\lambda$$) → microwave (low $$f$$, long $$\\lambda$$). This is cosmological redshift: \"red\" because longer wavelengths correspond to the red end of the spectrum and beyond.\n\nTakeaway: Expansion stretches $$\\lambda$$ up, forcing $$f$$ down — the wave doesn't slow down, it just oscillates more slowly.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": true}, {"question": "Misconception probe: A student argues that if cosmic expansion stretches the wavelength of light, the light must also slow down to compensate, so the frequency stays the same. Why is this fundamentally wrong?", "answer": "Electromagnetic radiation in vacuum **always** travels at $$c$$, regardless of wavelength or frequency. This is a foundational result of physics — the speed of light in vacuum is invariant. In the equation $$c = f\\lambda$$, $$c$$ is the fixed constant, not $$f$$. When expansion stretches $$\\lambda$$, $$c$$ does not change; instead, $$f$$ must decrease to keep the product $$f\\lambda$$ equal to $$c$$. The student's error is treating $$f$$ as the constant and $$c$$ as the variable, which reverses the causal logic. The frequency drops precisely *because* the speed cannot.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": true}, {"question": "What are the mass number (A) and proton number (Z) of an alpha particle, and what common element is it equivalent to?", "answer": "An alpha particle is written as $$^{4}_{2}\\text{He}$$ — it is a **helium-4 nucleus**. It has mass number $$A = 4$$ (2 protons + 2 neutrons) and proton number $$Z = 2$$ (2 protons). When a nucleus emits an alpha particle, it loses 4 nucleons and 2 protons, so the daughter nucleus has $$A - 4$$ and $$Z - 2$$.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "What are the mass number (A) and proton number (Z) of a beta-minus particle, and what is it physically?", "answer": "A beta-minus particle is written as $$^{0}_{-1}e$$ — it is a **fast-moving electron**. It has mass number $$A = 0$$ (negligible mass compared to a nucleon) and proton number $$Z = -1$$ (the electron carries one unit of negative charge, which is accounted for as $$-1$$ in the proton-number accounting system). When a nucleus emits a beta-minus particle, the mass number stays the same ($$A$$ unchanged) but the proton number increases by 1 ($$Z + 1$$), because a neutron has effectively converted into a proton plus an electron.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "What happens to the mass number and proton number of a nucleus when it emits gamma radiation?", "answer": "Gamma radiation is written as $$^{0}_{0}\\gamma$$ — it has **zero mass number and zero proton number**. It is pure electromagnetic energy (a photon), not a particle with mass or charge. Emitting gamma radiation changes **nothing** about the nucleus's identity: both $$A$$ and $$Z$$ remain the same. The nucleus simply drops to a lower energy state, releasing the excess energy as a photon. This is why gamma emission alone cannot transform one element into another.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "In a nuclear decay equation, what conservation rule must hold on both sides, and what two quantities must each balance?", "answer": "The conservation rule is that **total mass number (nucleon number) and total proton number must each balance** on the left and right sides of the equation. You add up all the $$A$$ values on the left and all the $$A$$ values on the right — they must be equal. Then you add up all the $$Z$$ values on the left and all the $$Z$$ values on the right — they must also be equal. This reflects the conservation of nucleon number and charge in nuclear processes. If either sum fails to match, the equation is invalid.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "A nucleus undergoes decay that reduces its mass number by 4 but leaves its proton number unchanged. What combination of alpha and beta-minus decays produces this result? Walk through the arithmetic. (3 steps)", "answer": "- Step 1: One alpha emission changes the nucleus by $$\\Delta A = -4$$ and $$\\Delta Z = -2$$. This gets the mass number reduction we want (−4), but it also lowers the proton number by 2, which we don't want.\n- Step 2: Each beta-minus emission changes the nucleus by $$\\Delta A = 0$$ and $$\\Delta Z = +1$$. To cancel the $$-2$$ shift in $$Z$$ from the alpha, we need exactly **two** beta-minus emissions: $$2 \\times (+1) = +2$$, restoring $$Z$$ to its original value.\n- Step 3: The total effect of **1 alpha + 2 beta-minus** is: $$\\Delta A = -4 + 0 + 0 = -4$$ and $$\\Delta Z = -2 + 1 + 1 = 0$$. Mass number drops by 4, proton number unchanged. This \"1α + 2β\" pattern is a classic ESAT recurrence.\n\nTakeaway: Alpha reduces both $$A$$ and $$Z$$; beta-minus only increases $$Z$$. Two betas exactly undo the alpha's proton-number change.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": true}, {"question": "Misconception probe: A nucleus with $$Z = 82$$ emits one alpha particle (dropping $$Z$$ to 80). A student thinks emitting **three** beta-minus particles would correctly restore the proton number to 82. Why is this wrong? (2 steps)", "answer": "- Step 1: After one alpha emission, $$Z$$ drops by 2: from 82 to 80. Each beta-minus emission raises $$Z$$ by 1. Three beta emissions would raise $$Z$$ by 3: from 80 to 83, which overshoots the original value of 82 by 1.\n- Step 2: The correct count is **two** beta-minus emissions, which raise $$Z$$ by exactly 2 (from 80 back to 82). Three betas would produce $$Z = 83$$, violating the requirement that the proton number stays unchanged. The student failed to check the arithmetic: $$-2 + 3 = +1$$, not 0.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "The rate of thermal conduction $$C$$ through a bar is proportional to $$A \\cdot \\Delta T / L$$. What does each symbol represent, and what is the physical meaning of $$\\Delta T = 0$$?", "answer": "- $$A$$ = cross-sectional area of the bar (a bigger area allows more heat to flow through simultaneously, like a wider pipe carrying more water).\n- $$\\Delta T = T_1 - T_2$$ = temperature difference between the two ends (the \"thermal driving force\"; heat flows from hot to cold).\n- $$L$$ = length of the bar (a longer bar means heat has to travel further, slowing the rate — analogous to electrical resistance increasing with length).\n- If $$\\Delta T = 0$$, both ends are at the same temperature, so there is **no net heat flow**. There is no \"driving force\" pushing energy from one side to the other. Conduction stops entirely, regardless of $$A$$ or $$L$$.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "If you double the cross-sectional area $$A$$ of a thermally conducting bar, what change to the length $$L$$ would keep the conduction rate $$C$$ unchanged? Explain using the proportionality. (2 steps)", "answer": "- Step 1: The conduction rate depends on the ratio $$A/L$$: $$C \\propto A \\cdot \\Delta T / L$$, so for fixed $$\\Delta T$$, $$C \\propto A/L$$. Doubling $$A$$ (making it $$2A$$) while keeping $$L$$ the same would double $$C$$, because $$2A/L = 2 \\times (A/L)$$.\n- Step 2: To restore the original $$C$$, we need the ratio $$A/L$$ to return to its original value. If $$A$$ is now $$2A$$, we must also make $$L$$ become $$2L$$, so that $$2A / 2L = A/L$$ — the ratio is unchanged, and $$C$$ is unchanged. Doubling both $$A$$ and $$L$$ together preserves the conduction rate.\n\nTakeaway: It's the ratio $$A/L$$ that matters, not either quantity alone.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": true}, {"question": "Edge case: Both ends of a thermally conducting bar are simultaneously heated, raising $$T_1$$ by 15 K and $$T_2$$ by 15 K. What happens to the conduction rate $$C$$, and why?", "answer": "The conduction rate **does not change**. The key variable is the temperature **difference** $$\\Delta T = T_1 - T_2$$. If both temperatures increase by the same amount (15 K), the difference between them remains exactly what it was before: $$\\Delta T_{\\text{new}} = (T_1 + 15) - (T_2 + 15) = T_1 - T_2 = \\Delta T_{\\text{old}}$$. Since $$C \\propto \\Delta T$$ and $$\\Delta T$$ is unchanged, $$C$$ is unchanged. This is a classic ESAT trap — the question tempts you to think \"more heat = more conduction,\" but conduction depends on the *gradient*, not the absolute temperatures.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": true}, {"question": "On a graph of gravitational potential energy vs height, what physical quantity does the gradient represent, and what is the graph's shape?", "answer": "The relationship is $$E_p = mgh$$, which is **linear** in $$h$$ (height). The graph is a straight line through the origin. The gradient (slope) is $$mg$$ — the object's weight. This makes intuitive sense: each additional metre of height adds exactly $$mg$$ joules of potential energy, so the energy rises at a constant rate equal to the weight. If you read the gradient off the graph and divide by $$g$$, you can extract the mass $$m$$.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "On a graph of work done vs distance, what physical quantity does the gradient represent?", "answer": "The relationship is $$W = Fd$$ (work = force × distance in the direction of the force). This is linear in $$d$$, so the graph is a straight line through the origin. The gradient equals the **force $$F$$**. Intuitively: each additional metre the object is pushed adds $$F$$ joules of work, so the work rises at a constant rate equal to the applied force. If the line is steeper, a larger force is being applied; if the line is flat (zero gradient), no force is acting (or the force is perpendicular to the displacement).", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "On a velocity–time graph for an object with constant acceleration, what physical quantity does the gradient represent?", "answer": "The relationship is $$v = u + at$$, which is linear in $$t$$ (time). The gradient equals the **acceleration $$a$$**. This follows directly from the definition $$a = \\Delta v / \\Delta t$$ — the gradient of a velocity–time graph is literally \"change in velocity per unit time,\" which is acceleration. A steeper gradient means greater acceleration; a horizontal line (zero gradient) means constant velocity (no acceleration). If you know the mass, you can combine the gradient with $$F = ma$$ to find the net force.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "Misconception probe: A student plots kinetic energy on the y-axis and velocity on the x-axis, expecting a straight line through the origin. Why is this wrong, and what shape should the graph actually be? (2 steps)", "answer": "- Step 1: The relationship is $$E_k = \\frac{1}{2}mv^2$$, which is **quadratic** (parabolic) in $$v$$, not linear. Kinetic energy depends on the *square* of velocity, so doubling the velocity quadruples the kinetic energy — this is not the behaviour of a straight line.\n- Step 2: The correct graph is a **parabola** opening upwards, starting at the origin. The gradient is not constant; it increases as $$v$$ increases (the curve gets steeper). A straight-line graph for $$E_k$$ vs $$v$$ would only be correct if the relationship were $$E_k \\propto v$$, but it is actually $$E_k \\propto v^2$$. This is one of the most common ESAT traps.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "Electrical power has three equivalent forms: $$P = IV$$, $$P = I^2R$$, and $$P = V^2/R$$. When you are analysing power in a **fixed** resistor in a circuit, which form should you prioritise, and why?", "answer": "You should choose the form that **isolates the quantity you know is fixed**. For a fixed resistor, $$R$$ is constant and known. Therefore, use $$P = I^2R$$ (if you can find the current) or $$P = V^2/R$$ (if you can find the voltage across that resistor). The form $$P = IV$$ requires you to know *both* current and voltage, which may be harder to determine. The strategic principle: since $$R$$ won't change, any change in power must come from a change in $$I$$ or $$V$$, so pick the form that makes the variable you're manipulating (current or voltage) the prominent factor and the fixed quantity a simple multiplier.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "To maximise the power dissipated in a fixed resistor that is in series with a variable resistor, what should you do with the variable resistor, and why? (3 steps)", "answer": "- Step 1: For the fixed resistor, $$R$$ is constant, so use $$P = I^2R$$. Maximising $$P$$ means maximising the current $$I$$ through the circuit, since $$R$$ can't change.\n- Step 2: The current in a series circuit is $$I = V / R_{\\text{total}}$$, where $$R_{\\text{total}} = R_{\\text{fixed}} + R_{\\text{variable}}$$. To maximise $$I$$, you must minimise $$R_{\\text{total}}$$.\n- Step 3: Since $$R_{\\text{fixed}}$$ can't change, the only way to minimise $$R_{\\text{total}}$$ is to set $$R_{\\text{variable}}$$ to its **minimum** value. This gives the largest current, and therefore the maximum power in the fixed resistor.\n\nTakeaway: \"Maximum power\" → maximise current → minimise all other resistances. The \"minimum\" in the question is a hint telling you exactly what to do.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "Common trap: A 24 V supply connects a 5 Ω fixed resistor in series with a 3 Ω variable resistor (at its minimum). A student calculates $$I = 24/5 = 4.8$$ A and then finds power in the 5 Ω resistor. Why is this current value wrong, and what is the correct approach? (2 steps)", "answer": "- Step 1: The student's error is dividing the supply voltage by only the fixed resistor's resistance, as if the full 24 V drops across the 5 Ω alone. But in a **series** circuit, the total resistance is $$R_{\\text{total}} = 5 + 3 = 8$$ Ω. The current must be $$I = V / R_{\\text{total}} = 24/8 = 3$$ A, not 4.8 A. Both resistors share the voltage; neither gets the full 24 V.\n- Step 2: With the correct current $$I = 3$$ A, the power in the 5 Ω resistor is $$P = I^2R = 3^2 \\times 5 = 45$$ W. Alternatively, the 5 Ω resistor gets $$\\frac{5}{8} \\times 24 = 15$$ V (potential divider), and $$P = V^2/R = 15^2/5 = 45$$ W. Both methods agree once you use the correct current.\n\nTakeaway: In a series circuit, always divide by the **total** resistance to find current. Never drop the full supply voltage across one resistor.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": true}, {"question": "In a potential divider with two resistors $$R_1$$ and $$R_2$$ in series across a supply voltage $$V$$, what fraction of $$V$$ appears across $$R_1$$, and why?", "answer": "The voltage across $$R_1$$ is $$V_1 = \\frac{R_1}{R_1 + R_2} \\cdot V$$. The reasoning: in a series circuit, the current $$I = V/(R_1 + R_2)$$ is the same through both resistors. The voltage across $$R_1$$ is then $$V_1 = I \\times R_1 = \\frac{V}{R_1 + R_2} \\times R_1 = \\frac{R_1}{R_1 + R_2} \\cdot V$$. The voltage splits **in proportion to the resistances** — the larger resistor gets the larger share of the voltage. If $$R_1 = R_2$$, each gets half; if $$R_1$$ is three times $$R_2$$, $$R_1$$ gets three-quarters.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": true}, {"question": "Two points in a circuit are connected only by ideal wire (zero resistance, no components between them). What can you conclude about their potentials (voltages), and what would happen if they weren't equal? (2 steps)", "answer": "- Step 1: The two points are at **the same potential (same voltage)**. Ideal wire has zero resistance, so by $$V = IR$$, the voltage drop across the wire is $$I \\times 0 = 0$$, regardless of the current flowing. There is no potential difference between any two points joined only by ideal wire.\n- Step 2: If there *were* a potential difference between two points connected by ideal wire, electrons would redistribute almost instantaneously to cancel that difference — they would flow from the higher-potential region to the lower-potential region until equilibrium is reached. A potential difference can only exist across a component (resistor, battery, etc.) that actually resists current and converts energy. This is why \"same wire = same potential\" is a powerful shortcut for circuit analysis.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "A parallel circuit has a 12 V supply with two branches. Branch A: one 30 Ω resistor. Branch B: two 30 Ω resistors in series. What is the current through each branch, and what is the total supply current? (3 steps)", "answer": "- Step 1: Branch A has a single 30 Ω resistor across the full 12 V. By Ohm's law: $$I_A = 12/30 = 0.4$$ A. This branch always carries 0.4 A regardless of what happens in other branches.\n- Step 2: Branch B has two 30 Ω resistors in series, giving total resistance $$30 + 30 = 60$$ Ω across 12 V. The current is $$I_B = 12/60 = 0.2$$ A. The 12 V splits equally (6 V across each) because the resistances are equal.\n- Step 3: By Kirchhoff's first law, the total supply current is the sum of the branch currents: $$I_{\\text{total}} = I_A + I_B = 0.4 + 0.2 = 0.6$$ A. Each branch operates independently — parallel branches don't affect each other's current, but they do add to drain the battery faster.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "In the same parallel circuit, a switch is closed that shorts out (bypasses) one of the two 30 Ω resistors in branch B. What happens to the total supply current, and why? (2 steps)", "answer": "- Step 1: Shorting one resistor means ideal wire now connects across it. Since same wire = same potential, there is zero voltage across that resistor, so no current flows through it. All current in branch B now goes through the wire (the path of zero resistance) and the remaining single 30 Ω resistor. Branch B's total resistance drops from 60 Ω to 30 Ω.\n- Step 2: Branch B now has the same resistance as branch A (30 Ω across 12 V), so $$I_B' = 12/30 = 0.4$$ A. The total current becomes $$I_{\\text{total}}' = 0.4 + 0.4 = 0.8$$ A, an increase of 0.2 A from the original 0.6 A. Lower resistance in any parallel branch increases that branch's current and therefore increases the total current drawn from the supply.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "State Kirchhoff's first law and explain what fundamental physical principle it embodies.", "answer": "Kirchhoff's first law states: **at any junction in a circuit, the sum of currents entering equals the sum of currents leaving** ($$\\Sigma I_{\\text{in}} = \\Sigma I_{\\text{out}}$$). This embodies the **conservation of charge** — charge cannot be created or destroyed at a junction. Every electron that arrives must leave; there is no accumulation of charge at a point in a steady-state circuit. If you track currents carefully at every junction, this law lets you solve for unknown currents in complex circuits.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "State Kirchhoff's second law and explain what \"EMF\" means in this context.", "answer": "Kirchhoff's second law states: **around any closed loop in a circuit, the sum of EMFs equals the sum of potential differences across all components** ($$\\Sigma \\text{EMF} = \\Sigma IR$$). This embodies the **conservation of energy** — the energy given to each unit of charge by the sources (EMFs) must be exactly spent as the charge passes through resistors and other components in that loop. \"EMF\" stands for **electromotive force**, which is the energy supplied per unit charge by a source (a battery, etc.), measured in volts (J/C). A charge going round a complete loop receives all its energy from the EMFs and spends all of it on the components — it returns to the start with zero net energy change.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "A star's luminosity scales as $$L \\propto r^2 T^4$$ (Stefan–Boltzmann law). If a star's radius is multiplied by 100 and its temperature is halved, by what factor does the luminosity change? Walk through the scaling. (3 steps)", "answer": "- Step 1: Write the scaling rule: if radius changes by factor $$k_r$$ and temperature by factor $$k_T$$, then luminosity changes by factor $$k_r^2 \\cdot k_T^4$$. This comes directly from $$L \\propto r^2 T^4$$ — multiply each input variable by its factor and raise to the appropriate power.\n- Step 2: Here, $$k_r = 100$$ and $$k_T = 1/2$$ (halving). So the luminosity factor is $$100^2 \\times (1/2)^4 = 10000 \\times 1/16$$.\n- Step 3: Compute: $$10000 / 16 = 625$$. Mental-math trick: $$10^4 / 16$$; note that $$100/16 = 6.25$$, so $$10000/16 = 625$$. The luminosity increases by a factor of **625**. Despite the temperature dropping, the enormous radius increase dominates because radius is squared and temperature is only raised to the 4th power of a small fraction.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "In a transverse wave, does an individual particle of the medium travel horizontally with the wave shape? Describe what the particle actually does.", "answer": "No — each particle **only oscillates vertically** (up and down) about its equilibrium position. It does not travel horizontally with the wave. The wave *shape* (the pattern of crests and troughs) moves horizontally, but the particles themselves just bob up and down. Think of a crowd doing a \"wave\" in a stadium: each person stands up and sits down in place; the pattern of standing moves around the stadium, but no person actually walks around it. The distinction is crucial: wave speed ≠ particle speed. The wave propagates; the particles oscillate.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": true}, {"question": "In one complete oscillation cycle, a wave particle starts at the top (amplitude $$A$$ above equilibrium), drops to equilibrium, continues to the bottom ($$A$$ below equilibrium), and returns to the top. How many amplitude-lengths of distance does the particle trace in one full cycle?", "answer": "The particle traces **4 amplitudes** of distance per cycle: $$4A$$.\n+ Top to equilibrium: distance $$A$$ (1 amplitude down)\n+ Equilibrium to bottom: distance $$A$$ (1 amplitude down)\n+ Bottom to equilibrium: distance $$A$$ (1 amplitude up)\n+ Equilibrium to top: distance $$A$$ (1 amplitude up)\nTotal: $$A + A + A + A = 4A$$. The particle goes down 2A and up 2A, but the total *path length* (distance travelled, not displacement) is 4A. Displacement after one full cycle is zero (it returns to where it started), but distance travelled is 4A.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": true}, {"question": "A wave has amplitude 3 cm and frequency 5 Hz. What is the total distance a particle travels in one minute (60 seconds)? Walk through the logic. (3 steps)", "answer": "- Step 1: Distance per cycle = $$4A = 4 \\times 3 = 12$$ cm. Each full oscillation, the particle covers 12 cm of path.\n- Step 2: Number of cycles in 60 seconds: frequency is 5 Hz = 5 cycles per second, so in 60 seconds there are $$5 \\times 60 = 300$$ complete cycles.\n- Step 3: Total distance = distance per cycle × number of cycles = $$12 \\times 300 = 3600$$ cm = 36 m. The particle oscillates 300 times, each time covering 12 cm, giving 3600 cm total path length. Note: its *displacement* after 60 s is still zero (or whatever the phase dictates), but the *distance travelled* is large.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "When applying Newton's second law to a mass being lifted vertically with acceleration $$a$$, the equation is $$T - mg = ma$$. Why is the left side written as $$T - mg$$ rather than just $$T$$, and what does each term represent? (2 steps)", "answer": "- Step 1: Newton's second law states $$F_{\\text{res}} = ma$$, where $$F_{\\text{res}}$$ is the **resultant (net) force** — not just any single force. Two forces act on the mass: tension $$T$$ pulling upward and weight $$mg$$ pulling downward. The resultant is $$T - mg$$ (upward minus downward).\n- Step 2: Setting $$T - mg = ma$$ and solving: $$T = m(g + a)$$. If $$a = 0$$ (no acceleration, just hovering), $$T = mg$$ — the tension exactly balances weight. If $$a > 0$$ (accelerating upward), $$T > mg$$ — the tension must exceed weight to produce a net upward force. If $$a < 0$$ (accelerating downward, i.e., falling), $$T < mg$$. The common trap is writing $$T = ma$$ and forgetting the weight term entirely.\n\nTakeaway: $$ma$$ is the resultant, not the tension. You must include all forces on the left side.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": true}, {"question": "A pulley redirects a rope with tension $$T$$ so that the rope goes down on one side and down on the other side of the pulley. How much downward force does the pulley's coupling (axle/support) experience, and why? (2 steps)", "answer": "- Step 1: The tension $$T$$ in the rope acts everywhere along the rope (tension is the same throughout an ideal rope). On one side of the pulley, the rope pulls down with force $$T$$ (e.g., the motor pulling down). On the other side, the rope also pulls down with force $$T$$ (e.g., the weight of the mass pulling down).\n- Step 2: The pulley coupling must support **both** downward pulls simultaneously. The total force on the coupling is $$T + T = 2T$$. This is not a vector addition where opposite directions cancel — both rope segments are pulling the pulley *in the same direction* (downward), so they add. A pulley changes the direction of the rope but doubles the force on its own support.\n\nTakeaway: A redirecting pulley puts twice the tension on its axle — $$2T$$, not $$T$$.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": true}, {"question": "Misconception probe: A 5 kg mass is lifted upward at $$a = 0.8$$ m/s² (with $$g = 10$$ m/s²). A student says the rope tension must be 50 N (just the weight). Why is this wrong, and what is the correct tension?", "answer": "If the tension were only 50 N (equal to weight $$mg = 5 \\times 10 = 50$$ N), the resultant force would be $$T - mg = 50 - 50 = 0$$ N, giving $$a = 0$$ — the mass would be in equilibrium, not accelerating upward. Since the mass *is* accelerating upward at 0.8 m/s², there must be a net upward force of $$ma = 5 \\times 0.8 = 4$$ N. The tension must therefore be $$T = mg + ma = 50 + 4 = 54$$ N. The 4 N extra beyond the weight is what provides the upward acceleration. The student's error: confusing the applied force (tension) with the resultant force ($$ma$$).", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": true}, {"question": "Synthesis: A circuit has a 6 V supply, a variable resistor (minimum value 2 Ω) in series with a fixed 4 Ω resistor. What is the maximum power dissipated in the 4 Ω resistor? Walk through the complete reasoning. (3 steps)", "answer": "- Step 1: For maximum power in the fixed 4 Ω resistor, use $$P = I^2R$$ with $$R = 4$$ Ω fixed. Maximising $$P$$ means maximising current $$I$$, which means minimising total resistance. Set the variable resistor to its minimum: 2 Ω.\n- Step 2: Total resistance: $$R_{\\text{total}} = 2 + 4 = 6$$ Ω. Current: $$I = V / R_{\\text{total}} = 6/6 = 1$$ A.\n- Step 3: Power in the 4 Ω resistor: $$P = I^2R = 1^2 \\times 4 = 4$$ W. Quick check via potential divider: the 4 Ω resistor gets $$\\frac{4}{6} \\times 6 = 4$$ V, and $$P = V^2/R = 4^2/4 = 4$$ W. Both methods confirm 4 W.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "Synthesis: A star's radius doubles and its temperature triples. By what factor does its luminosity change?", "answer": "Using $$L \\propto r^2 T^4$$: the radius factor is $$k_r = 2$$ and the temperature factor is $$k_T = 3$$. Luminosity scales by $$k_r^2 \\times k_T^4 = 2^2 \\times 3^4 = 4 \\times 81 = 324$$. The luminosity increases by a factor of **324**. The temperature term dominates heavily because it is raised to the 4th power: tripling temperature alone would give $$3^4 = 81$$, and doubling radius adds only another factor of 4 on top.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": false}, {"question": "Synthesis: A 2 kg mass is lifted at 1.5 m/s² via a pulley system (with $$g = 10$$ m/s²). Calculate the rope tension and the force on the pulley coupling. (2 steps)", "answer": "- Step 1: Apply Newton's second law to the mass. Resultant force = $$ma = 2 \\times 1.5 = 3$$ N upward. Weight = $$mg = 2 \\times 10 = 20$$ N downward. Tension: $$T - mg = ma$$ → $$T = m(g + a) = 2 \\times (10 + 1.5) = 2 \\times 11.5 = 23$$ N.\n- Step 2: The pulley coupling feels tension on both sides of the rope, both pulling downward: force on coupling = $$2T = 2 \\times 23 = 46$$ N. The pulley support must hold 46 N to keep the system in place.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": false}, {"question": "Synthesis: A wave particle has amplitude 4 cm and frequency 2 Hz. How far does the particle travel in 10 seconds?", "answer": "Distance per cycle = $$4A = 4 \\times 4 = 16$$ cm. Number of cycles in 10 s = $$2 \\times 10 = 20$$ cycles. Total distance = $$16 \\times 20 = 320$$ cm = 3.2 m. The particle oscillates 20 times, each covering 16 cm of path, totalling 320 cm.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": false}, {"question": "In ESAT mechanics questions, when the problem specifies a \"minimum\" or \"maximum\" value (e.g., \"minimum tension,\" \"maximum power\"), what strategic hint does this give you?", "answer": "The \"minimum\" or \"maximum\" is not just describing the answer — it is a **hint about what makes the problem solvable**. If the question asks for \"minimum tension,\" it means the tension would otherwise be unbounded (you could accelerate the mass infinitely fast, requiring infinite tension), so the minimum gives you the specific condition where you *can* calculate a definite answer (often the case where the system is just barely working, or where a variable is at its extreme value). Similarly, \"maximum power\" tells you to push a variable resistor to its minimum, because that's the extreme that maximises current. Read min/max as the exam telling you: \"set the variable to its extreme — that's the solvable case.\"", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": true}, {"question": "Why is speed particularly important for the ESAT compared to typical A-Level physics exams?", "answer": "The ESAT is a **multiple-choice, timed admissions test** — you must answer many questions in limited time with no partial credit. A-Level exams reward thorough written explanations and method marks even if you make arithmetic errors. The ESAT rewards only the correct final option, chosen quickly. This means you need **automaticity**: the method must be instinctive, not something you figure out from scratch each time. Mental-arithmetic shortcuts (e.g., recognising $$5/8$$ as a ratio, computing $$10^4/16 = 625$$ without a calculator, knowing which power formula to use instantly) are essential. Speed comes from practiced pattern recognition, not from rushing — you must already *know* the path before you see the question.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": true}, {"question": "A nuclear equation has a parent nucleus $$^{236}_{92}\\text{U}$$ splitting into products. One proposed equation has total $$A = 236$$ on both sides but total $$Z = 93$$ on the right vs $$92$$ on the left. Is this equation valid, and why?", "answer": "No, it is **invalid**. Both conservation rules must hold simultaneously: total mass number AND total proton number must each balance. Even though the mass numbers match ($$A = 236$$ on both sides), the proton numbers do not ($$Z = 92$$ on the left, $$Z = 93$$ on the right). One extra proton has appeared from nowhere, violating conservation of charge. A valid nuclear equation requires **both** $$\\Sigma A$$ and $$\\Sigma Z$$ to balance independently — satisfying one but not the other is still wrong.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": false}, {"question": "A parallel circuit has three branches across a 12 V supply: branch A with 30 Ω, branch B with 60 Ω, and branch C with 30 Ω. If branch B is removed, what happens to the total current, and why?", "answer": "Each branch operates independently across the full supply voltage. Initially: $$I_A = 12/30 = 0.4$$ A, $$I_B = 12/60 = 0.2$$ A, $$I_C = 12/30 = 0.4$$ A, total = 1.0 A. Removing branch B eliminates its 0.2 A contribution. The remaining branches are unaffected — they still see 12 V across their same resistances. New total = $$0.4 + 0.4 = 0.8$$ A. Removing a parallel branch reduces total current but does not change the current in any remaining branch.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": false}, {"question": "Edge case: A thermally conducting bar has one end at temperature $$T_1$$ and the other at $$T_2$$, with $$T_1 > T_2$$. If you cool $$T_1$$ by 5 K and heat $$T_2$$ by 5 K, what happens to the conduction rate, and why?", "answer": "The conduction rate **decreases**. The original temperature difference was $$\\Delta T = T_1 - T_2$$. After cooling $$T_1$$ by 5 K and heating $$T_2$$ by 5 K, the new difference is $$\\Delta T' = (T_1 - 5) - (T_2 + 5) = T_1 - T_2 - 10 = \\Delta T - 10$$. The driving force for conduction has shrunk by 10 K, so $$C$$ decreases proportionally. This is the opposite of the \"both ends heated equally\" case — here, the changes *reduce* the gap rather than preserving it.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": true}, {"question": "A student sees a velocity–time graph with gradient 5 m/s² for a 20 kg object and calculates a force. Then they see a work–distance graph with gradient 5 N. They conclude both graphs represent the same physical quantity. Is this correct?", "answer": "No — the gradients represent **different physical quantities**. The gradient of a velocity–time graph is **acceleration** (5 m/s²), and multiplying by mass ($$F = ma = 20 \\times 5 = 100$$ N) gives force. The gradient of a work–distance graph is **force** directly (5 N). The numerical value \"5\" appears in both, but the units and meanings are entirely different: one is 5 m/s² (acceleration), the other is 5 N (force). The coincidence that both are \"5\" is just a feature of this particular problem's numbers, not a general principle. Always check what the y-axis and x-axis represent before interpreting a gradient.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": false}, {"question": "Synthesis trap check: A 24 V supply has a 5 Ω resistor in series with a 3 Ω resistor. A student wants the power in the 3 Ω resistor and uses $$P = V^2/R = 24^2/3 = 192$$ W. Why is this wrong?", "answer": "The student has assumed the full 24 V drops across the 3 Ω resistor alone. In a series circuit, the voltage **splits** across both resistors in proportion to their resistances. The 3 Ω resistor gets only $$\\frac{3}{8} \\times 24 = 9$$ V, not 24 V. The correct power is $$P = V_{3}^2 / R = 9^2 / 3 = 27$$ W, or equivalently $$P = I^2 R = 3^2 \\times 3 = 27$$ W using the series current of 3 A. Never substitute the supply voltage directly into $$V^2/R$$ for a single series component — use the voltage *across that specific component*.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": true}, {"question": "The ESAT frequently tests electricity, nuclear physics, and efficiency questions (based on tutor observation). What foundational level are most of the electricity equations, and why does this make them tricky?", "answer": "Most electricity equations tested (Ohm's law $$V = IR$$, power $$P = IV = I^2R = V^2/R$$, potential divider formula, Kirchhoff's laws) are **GCSE/AS-level fundamentals**. They are not advanced A2 content. The trickiness comes from the **way they are asked**: the ESAT combines simple equations in novel, multi-step configurations (parallel branches with switches, series circuits with variable resistors, maximum-power constraints) under severe time pressure. The equations themselves are easy; the *application* is hard because you must quickly identify which form to use, which quantity is fixed, and how the circuit topology affects current and voltage distribution. Mastery means making the selection of method automatic.", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": true}], "count": 44}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "What is the Cosmic Microwave Background Radiation (CMBR) in terms of its physical origin, and how does its current wavelength compare to its original wavelength when it was first emitted? (2 steps)", "answer": "- Step 1: The CMBR is the relic thermal radiation left over from the hot, dense early universe (the Big Bang). Originally, it was emitted as high-energy, short-wavelength gamma radiation.\n- Step 2: Due to the cosmological expansion of the universe, the fabric of space itself has stretched. This stretching has increased the wavelength of these photons, shifting them from the gamma region of the electromagnetic spectrum all the way down to the microwave region.\n\nTakeaway: The CMBR is the redshifted \"afterglow\" of the Big Bang.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Given that the speed of light ($$c$$) is constant in a vacuum, explain mathematically and conceptually why the expansion of the universe causes the frequency of the CMBR photons to decrease. (2 steps)", "answer": "- Step 1: The wave equation relates speed, frequency, and wavelength: $$c = f \\lambda$$. Since $$c$$ is a universal constant, frequency ($$f$$) and wavelength ($$\\lambda$$) are inversely proportional ($$f = \\frac{c}{\\lambda}$$).\n- Step 2: As the universe expands, it stretches the physical wavelength ($$\\lambda$$ increases). Because $$\\lambda$$ is in the denominator of $$f = \\frac{c}{\\lambda}$$, an increase in wavelength mathematically forces a decrease in frequency. Conceptually, the wave is \"stretched out\" in space, meaning fewer wave crests pass a given point per second.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "Misconception probe: If the universe is expanding and stretching the CMBR photons (increasing their wavelength), does the speed of these photons decrease over time to compensate? Why or why not? (2 steps)", "answer": "- Step 1: No, the speed of the photons does not decrease. The speed of light in a vacuum ($$c$$) is a fundamental constant of nature and is independent of the expansion of space or the photon's wavelength.\n- Step 2: The expansion of space stretches the *distance* between wave crests (wavelength), which inherently lowers the *rate* at which crests pass an observer (frequency). The product of this longer wavelength and lower frequency still exactly equals $$c$$. The photon loses energy (since $$E = hf$$), but it does not lose speed.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "What are the specific changes to the nucleon number ($$A$$) and proton number ($$Z$$) of a parent nucleus when it emits an alpha ($$\\alpha$$) particle versus a beta-minus ($$\\beta^-$$) particle? (2 steps)", "answer": "- Step 1: An alpha particle is a helium-4 nucleus ($$^4_2\\text{He}$$). Emitting it removes 4 nucleons and 2 protons, so the parent nucleus experiences $$\\Delta A = -4$$ and $$\\Delta Z = -2$$.\n- Step 2: A beta-minus particle is a fast-moving electron ($$^0_{-1}\\text{e}$$) created when a neutron turns into a proton. Emitting it removes negligible mass but adds a proton, so the parent nucleus experiences $$\\Delta A = 0$$ and $$\\Delta Z = +1$$.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "A radioactive de
