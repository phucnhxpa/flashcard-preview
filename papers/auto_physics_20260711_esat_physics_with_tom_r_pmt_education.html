"What is the Cosmic Microwave Background Radiation (CMBR), and what does its existence evidence?", "answer": "The CMBR is electromagnetic radiation that fills the universe, observed in the microwave region of the spectrum. According to the Big Bang model, the early universe was extremely hot and dense, so hot that it was glowing with high-energy gamma radiation. As the universe expanded, this light was stretched along with the space it was travelling through, its wavelength getting longer and longer until the original gamma photons are now detected as microwaves. The fact that we can still detect this relic light — coming uniformly from all directions — is direct evidence that the universe began in a hot, dense, rapidly expanding state. It's not just consistent with the Big Bang; it's the \"afterglow\" we'd expect, frozen into the sky by cosmic expansion.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "A gamma-ray photon in the early universe is stretched by cosmic expansion so that its wavelength doubles. Using c = fλ (with c constant for light in vacuum), what must happen to its frequency, and what region of the EM spectrum does it end up in?", "answer": "- Step 1: Recall that for light in vacuum, c is a fixed constant (≈ 3 × 10⁸ m/s). The relationship c = fλ must always hold, so if one of f or λ changes, the other must compensate.\n- Step 2: If λ doubles (λ → 2λ), then to keep c constant, f must halve (f → f/2). Wavelength and frequency are inversely related when c is fixed.\n- Step 3: Gamma rays have very short wavelengths and very high frequencies. Halving the frequency and doubling the wavelength pushes the photon down through X-ray, ultraviolet, visible, infrared, and into the microwave region. That's exactly why we call it the \"microwave\" background.\n+ Visual: imagine drawing a short, tightly compressed wave on a rubber sheet, then stretching the sheet. The same wave gets longer; its frequency, when you count peaks passing a point per second, must drop.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": true}, {"question": "Why is the CMBR considered *direct* evidence for the Big Bang rather than just compatible with it?", "answer": "- Step 1: A theory can be consistent with many observations but not directly proven by all of them. For the Big Bang, the *prediction* was that if the universe really did begin in a hot, dense state and has been expanding ever since, then the original light from that early fireball should still be travelling through space today, hugely redshifted.\n- Step 2: This relic light was predicted before it was detected. In 1965 Penzias and Wilson actually found a uniform microwave \"hiss\" coming from every direction in the sky, with a near-perfect blackbody spectrum at about 2.7 K.\n- Step 3: The detection matched the prediction in detail — the spectrum, the uniformity, and the temperature all lined up. Few cosmological predictions come with that level of specificity, so the CMBR is widely regarded as a \"smoking gun\": an imprint of the Big Bang that no other mainstream theory naturally reproduces.\n+ Key contrast: the expansion of the universe (Hubble) is also evidence for the Big Bang, but it's compatible with some non-Big-Bang cosmologies (e.g., tired-light models). The CMBR's blackbody spectrum and uniformity are much harder to mimic without a hot, dense origin.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": true}, {"question": "Write the symbol, mass number, and proton number of (a) an alpha particle, (b) a beta-minus particle, and (c) a gamma ray.", "answer": "+ (a) Alpha: symbol ⁴₂He, mass number A = 4, proton number Z = 2. It is a helium-4 nucleus (two protons + two neutrons) emitted from a heavy nucleus.\n+ (b) Beta-minus: symbol ⁰₋₁e, mass number A = 0, proton number Z = −1. It is a fast electron emitted when a neutron inside a nucleus converts into a proton.\n+ (c) Gamma: symbol ⁰₀γ, mass number A = 0, proton number Z = 0. It is a high-energy photon emitted from an excited nucleus; nothing in the nucleus changes — it just sheds energy.\n\nThe pattern: an emitted particle is shown as ᴬ_Z X on the right-hand side of the decay equation, and you subtract its (A, Z) from the parent to get the daughter.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "When a parent nucleus ᴬ_Z X emits an alpha particle, by how much do A and Z of the daughter nucleus change?", "answer": "- Step 1: The alpha carries (A=4, Z=2) out of the nucleus, so mass is lost and protons are lost.\n- Step 2: Daughter's mass number = A − 4 (four nucleons gone).\n- Step 3: Daughter's proton number = Z − 2 (two protons gone).\n+ Quick check: ᴬ_Z X → ᴬ⁻⁴_Z₋₂Y + ⁴₂He. A and Z both drop.\n+ Why this matters: alpha decay is how heavy nuclei (e.g., uranium, thorium) shed mass and charge on their way down the decay chain.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "When a parent nucleus ᴬ_Z X emits a beta-minus particle, by how much do A and Z of the daughter nucleus change?", "answer": "- Step 1: The beta carries (A=0, Z=−1). A = 0 means no nucleons are lost — but the proton count actually *rises*.\n- Step 2: Daughter's mass number = A − 0 = A (unchanged).\n- Step 3: Daughter's proton number = Z − (−1) = Z + 1. A neutron in the nucleus has turned into a proton, ejecting the electron (the beta) and an antineutrino.\n+ Intuition: beta-minus happens when a nucleus has too many neutrons for stability. Converting a neutron into a proton moves it toward the valley of stability.\n+ Why no mass change: the total number of nucleons (protons + neutrons) is preserved; you just rearranged them.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": true}, {"question": "When a nucleus emits gamma radiation, by how much do A and Z change? Why?", "answer": "- Step 1: A gamma is ⁰₀γ: A = 0, Z = 0.\n- Step 2: Therefore A and Z of the daughter are exactly the same as the parent.\n- Step 3: Gamma emission does not change the *composition* of the nucleus, only its energy state. An excited nucleus drops to a lower energy state by emitting a high-energy photon. It's the nucleus's way of \"cooling off,\" not of changing identity.\n+ Important consequence: gamma emission on its own does not move you along a decay chain in the (A, Z) plane — only alpha and beta do.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": true}, {"question": "A nucleus needs to reduce A by 4 while leaving Z unchanged. What combination of alpha and beta-minus emissions achieves this? Why does this \"1 alpha + 2 beta\" pattern show up so often in ESAT nuclear questions?", "answer": "- Step 1: An alpha emission alone changes (ΔA, ΔZ) = (−4, −2). The proton number drops by 2, which is too far.\n- Step 2: To restore Z, we need beta-minus emissions, each of which gives ΔZ = +1 (ΔA = 0).\n- Step 3: Two betas give ΔZ = +2 in total. Net change from 1 alpha + 2 beta: ΔA = −4 + 0 + 0 = −4, ΔZ = −2 + 1 + 1 = 0. Exactly what we want.\n+ Why this is the canonical ESAT pattern: \"reduce A by 4 but keep Z the same\" appears in nuclear equations over and over, and the answer is *always* \"1 alpha + 2 beta-minus\" (or any reordering thereof, since the order doesn't change the net ΔA and ΔZ).\n+ Misconception trap: a common wrong answer is \"3 betas,\" but three betas would give ΔZ = +3, making Z *increase* by 3 and ΔA still 0, so neither A is reduced nor Z is preserved. You must emit real mass (an alpha) to drop A.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": true}, {"question": "State the two conservation rules you must apply when balancing any nuclear equation. Why are they the right rules?", "answer": "+ (1) Total mass number A is conserved: ΣA(left) = ΣA(right). Nucleons cannot be created or destroyed in a single decay — they just get rearranged.\n+ (2) Total proton number Z is conserved: ΣZ(left) = ΣZ(right). Charge is conserved. Beta-minus looks weird because a proton appears from a neutron, but the ejected electron carries Z = −1, so the total Z is unchanged.\n- Step 1: These two rules give you two equations for any given nuclear equation. With two equations you can usually solve for two unknowns (e.g., identify an unknown daughter nucleus).\n- Step 2: In ESAT-style questions you typically need to test each answer option against both rules and eliminate those that fail either one.\n+ Edge case: in some equations you may have an alpha, a daughter, and a beta on the right. The rules still apply — sum A and sum Z across *all* products.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": true}, {"question": "The rate of thermal conduction C through a bar is given by C ∝ A·ΔT/L. Explain qualitatively *why* C is proportional to cross-sectional area A.", "answer": "- Step 1: Heat conduction is the transfer of thermal energy through a material. Energy carriers (electrons in metals, lattice vibrations / phonons in insulators) carry heat across the cross-section.\n- Step 2: Doubling the cross-sectional area A means you have twice as many \"lanes\" through which heat can flow per unit time, like doubling the number of lanes on a motorway.\n- Step 3: With twice as many carriers crossing per second, the rate of energy flow doubles. Direct proportionality to A is the natural consequence.\n+ Visual: imagine a pipe with water flowing through. Doubling the cross-section roughly doubles the flow rate (at the same pressure difference). The same logic applies to heat.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": true}, {"question": "The rate of thermal conduction C is given by C ∝ A·ΔT/L. Explain qualitatively *why* C is inversely proportional to length L.", "answer": "- Step 1: Heat is deposited at the hot end and removed at the cold end. The energy has to \"leak\" all the way through the bar.\n- Step 2: The longer the bar, the more material the heat has to traverse, and the more opportunities there are for the heat carriers to lose energy along the way (collisions, scattering).\n- Step 3: For a uniform material, doubling L doubles the thermal \"resistance\" — the same way doubling the length of an electrical resistor doubles its resistance to current. Therefore C is inversely proportional to L.\n+ Intuition: a thin foil conducts heat away fast; a thick wall insulates well. The trade-off is exactly captured by 1/L.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": true}, {"question": "The rate of thermal conduction C is given by C ∝ A·ΔT/L. Explain qualitatively *why* C is proportional to the temperature difference ΔT = T₁ − T₂, rather than to T₁ or T₂ separately.", "answer": "- Step 1: Heat flows only because one end is hotter than the other. If both ends are at the same temperature, the carriers on each side have the same average energy, and there is no *net* flow — random thermal motion in both directions cancels out.\n- Step 2: The bigger the temperature difference, the bigger the imbalance in average carrier energy between the two ends, and the steeper the energy gradient driving the flow.\n- Step 3: Therefore C depends on the *difference* ΔT = T₁ − T₂, not on T₁ or T₂ individually. Doubling both T₁ and T₂ leaves ΔT unchanged, so C is unchanged.\n+ Edge case: ΔT = 0 ⇒ C = 0. The proportionality must collapse at zero difference, which is why a linear-in-ΔT law (rather than a quadratic or exponential one) is the natural local form near equilibrium.\n+ Common misconception: \"raising the temperature of the bar will increase conduction.\" Not necessarily — only raising the *difference* does. This is exactly the kind of trick the ESAT loves to set.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": true}, {"question": "A bar's cross-sectional area A is doubled and its length L is also doubled, while ΔT is unchanged. By what factor does the conduction rate C change? (Use C ∝ A·ΔT/L.)", "answer": "- Step 1: New area A' = 2A; new length L' = 2L; ΔT unchanged.\n- Step 2: New C' ∝ A'·ΔT/L' = (2A)·ΔT/(2L) = (A·ΔT/L) = C.\n- Step 3: The factors of 2 cancel — C is unchanged.\n+ Takeaway: doubling A and L together preserves the A/L ratio, which is the geometric \"figure of merit\" for a conducting bar.\n+ Misconception trap: a quick guess is \"C doubles because A doubles,\" but you also have to account for the doubled length. Always check both factors before answering.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "Both ends of a bar are heated by the same amount, say 15 K. What happens to the conduction rate, and why? (Use C ∝ A·ΔT/L.)", "answer": "- Step 1: ΔT = T₁ − T₂ is the *difference* between the two ends, not the absolute temperature of either.\n- Step 2: Raising both T₁ and T₂ by the same amount leaves the difference unchanged: (T₁ + 15) − (T₂ + 15) = T₁ − T₂.\n- Step 3: Since ΔT is unchanged and A and L are unchanged, C is unchanged.\n+ Key insight: the conduction rate is driven by the temperature gradient, not the absolute temperature. Heating both ends equally is like adding the same number to the top and bottom of a fraction — the value of the fraction doesn't move.\n+ ESAT trap: the distractor options often involve \"raise T₁\" or \"raise T₂\" alone, which *would* change C. The correct answer is \"raise both by the same amount,\" which leaves C the same.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": true}, {"question": "In a thermal-conduction problem, what does \"an insulated bar\" mean, and how does it affect the proportionality C ∝ A·ΔT/L?", "answer": "- Step 1: \"Insulated bar\" means the sides of the bar lose no heat to the surroundings — all the heat that enters one end must leave through the other end.\n- Step 2: This is a *boundary condition*, not a change in the proportionality. The law C ∝ A·ΔT/L still holds for the heat flowing down the length of the bar.\n- Step 3: The insulation simply ensures that the steady-state ΔT is well-defined and that the heat we account for in the equation is the same heat flowing through every cross-section along the bar.\n+ Visual: imagine a pipe lagged with foam on the outside. Water can only enter at one end and leave at the other; no leakage through the walls. The flow rate through the pipe is still set by the pressure difference and the pipe geometry.\n+ Common confusion: students sometimes think \"insulated\" means the bar itself conducts less. It doesn't — it means the bar doesn't lose heat to its surroundings along the way.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": true}, {"question": "For each of the following mechanics graphs, state the equation, the shape, and what the gradient represents: (a) GPE vs height, (b) work vs distance, (c) velocity vs time, (d) KE vs velocity.", "answer": "+ (a) GPE vs height: E_p = mgh. Linear, passes through origin (if h = 0 ⇒ E_p = 0). Gradient = mg.\n+ (b) Work vs distance: W = Fd. Linear. Gradient = the applied force F.\n+ (c) Velocity vs time: v = u + at. Linear, y-intercept = u, gradient = acceleration a.\n+ (d) KE vs velocity: E_k = ½mv². This is a **parabola** in v (quadratic), not a straight line. Gradient is not constant — it grows with v.\n+ Big idea: every \"y = (constant) × x\" graph is linear with the constant as the gradient. The moment the relationship is y ∝ x², the graph curves.\n+ ESAT trap: don't pick \"KE vs velocity is linear\" — it's the classic wrong answer in graph-matching questions.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": true}, {"question": "Why is the KE-vs-velocity graph a parabola and not a straight line? Build the intuition from the equation E_k = ½mv².", "answer": "- Step 1: KE depends on v *squared*. If you double v, E_k becomes 2² = 4 times bigger — not twice as big.\n- Step 2: A straight-line graph requires a constant gradient (y = mx + c). For a quadratic, the gradient itself changes with v: dE_k/dv = mv, which grows linearly with v.\n- Step 3: So the curve gets steeper as v increases. That's the shape of a parabola opening upward.\n+ Visual: plot (1, 0.5m), (2, 2m), (3, 4.5m), (4, 8m) — the points bend upward, not in a straight line.\n+ Why this matters for ESAT: a graph-matching question will offer you a \"linear KE–v graph\" as a distractor. The shape test alone is enough to eliminate it.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": true}, {"question": "A work-vs-distance graph is linear and passes through the origin. A point on the graph is (2 m, 10 J). What is the force, and what is the work done at d = 4 m? Why?", "answer": "- Step 1: The graph is W = Fd. Linear through the origin ⇒ gradient is constant and equal to F.\n- Step 2: Gradient = W/d = 10 J / 2 m = 5 N. So the force is F = 5 N.\n- Step 3: At d = 4 m, W = Fd = 5 N × 4 m = 20 J. (Or: double the distance, double the work — the line just continues linearly.)\n+ Why the gradient is force: rearrange W = Fd to W = (F) × d, matching y = (gradient) × x. The \"×\" quantity is F, which must be the gradient.\n+ Sanity check: 20 J is consistent with the line — at d = 4 m you'd be at twice the height, so twice the work.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "A 20 kg object has its velocity increase from 0 to 10 m/s over 2 s. A student argues: \"Force = ma, and a = 10/2 = 5 m/s², so the force is 100 N. But wait, the gradient of the v–t graph is also 5, so gradient = force.\" Identify and correct the misconception.", "answer": "- Step 1: The student's calculation is *numerically* right, but the *labels* are mixed up. F = ma gives 20 × 5 = 100 N. The gradient of the v–t graph is a = 5 m/s², not 100 N.\n- Step 2: The gradient of a velocity-time graph is the *acceleration*, not the force. To get force you must multiply the gradient by the mass.\n- Step 3: So the chain is: gradient of v–t = a (in m/s²); then F = m × a, where m = 20 kg, gives F in N.\n+ General rule: the gradient always has the units of (y-axis units) / (x-axis units). For v–t, that's (m/s) / s = m/s², which is acceleration. The force is one multiplication further on.\n+ ESAT trap: students get excited that \"the numbers match\" and assume gradient = force for v–t. It doesn't — only for work–distance does gradient = force directly.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": true}, {"question": "State the three equivalent forms of electrical power dissipation and explain when to use each.", "answer": "+ P = IV — use this when you know current and voltage directly.\n+ P = I²R — use this when you know the current and the resistance (and not the voltage across R).\n+ P = V²/R — use this when you know the voltage and the resistance (and not the current through R).\n- Step 1: All three follow from P = IV and V = IR. Substituting V = IR into P = IV gives P = I × (IR) = I²R. Substituting I = V/R into P = IV gives P = (V/R) × V = V²/R.\n- Step 2: They are not three different physics laws; they are three algebraic rearrangements of the same two laws. Pick the form that uses the quantities you already have.\n+ ESAT technique: when the question gives a fixed resistor and a variable supply, you can't change R, so maximise current → use P = I²R and minimise the rest of the circuit's resistance. When the supply voltage is fixed and you can change R, use P = V²/R.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": true}, {"question": "A 24 V supply drives current through a variable resistor (minimum value 3 Ω) in series with a fixed 5 Ω resistor. How do you maximise the power dissipated in the 5 Ω resistor, and why?", "answer": "- Step 1: The 5 Ω resistor is fixed — its R can't change. To maximise P in this resistor, maximise the current through it.\n- Step 2: Use P = I²R. With R fixed, P scales with I², so bigger I ⇒ bigger P.\n- Step 3: For a series circuit, I = V_total / R_total. To maximise I at fixed V_total = 24 V, minimise R_total. So set the variable resistor to its minimum value, 3 Ω.\n- Step 4: R_total = 3 + 5 = 8 Ω, so I = 24/8 = 3 A, and P = I²R = 3² × 5 = 45 W.\n+ Alternative check: P = V²/R for the 5 Ω resistor. Voltage across it = (5/8) × 24 = 15 V (potential divider). P = 15²/5 = 225/5 = 45 W. Same answer.\n+ ESAT trap: a common wrong answer is to put the full 24 V across the 5 Ω (I = 24/5 = 4.8 A). That ignores the voltage drop across the other resistor and the need to divide by the *total* series resistance.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": true}, {"question": "What is the potential-divider equation for V₁ across R₁ in series with R₂, and *why* does the voltage split in proportion to the resistances?", "answer": "- Step 1: In a series circuit the same current I flows through both resistors. The total voltage V must be the sum: V = V₁ + V₂ = I(R₁ + R₂).\n- Step 2: Solve for I: I = V/(R₁ + R₂). Then V₁ = I × R₁ = R₁ × V/(R₁ + R₂), so V₁ = [R₁/(R₁ + R₂)] × V. Same form for V₂ with R₂ in the numerator.\n- Step 3: Bigger resistance gets a bigger share of the voltage. The ratio V₁/V₂ = R₁/R₂ — voltage splits in the same ratio as the resistance.\n+ Intuition: a bigger resistance \"absorbs\" more voltage per unit current, just as a stiffer spring absorbs more force per unit extension. The supply's voltage is the budget, and the resistors spend it in proportion to their R.\n+ ESAT use: this lets you find the voltage across one resistor in a series pair without first computing the current — useful when the question gives you the supply voltage and the two resistances.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": true}, {"question": "In a circuit, two points are connected only by an ideal wire (no resistor, no component). What is the potential difference between them, and why can't it be nonzero?", "answer": "- Step 1: An ideal wire has zero resistance. By V = IR, if R = 0 then V across the wire is 0, regardless of the current through it.\n- Step 2: Physically, if there *were* a potential difference between two wire-connected points, the free electrons in the metal would feel an enormous force and would rush around the circuit almost instantly to neutralise the imbalance. This happens on a timescale much shorter than anything else in the circuit.\n- Step 3: Therefore, in any DC analysis, points connected only by ideal wire are at the *same* potential.\n+ ESAT consequence: a voltmeter placed across a plain wire reads 0 V. The whole length of the wire is one equipotential.\n+ Contrast: a resistor in the circuit *can* sustain a potential difference, because it does work on the charge flowing through it (energy per unit charge is \"spent\" across the resistor). Wire cannot spend energy, so it cannot host a voltage drop.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": true}, {"question": "A 12 V battery has branch A with a single 30 Ω resistor and branch B with two 30 Ω resistors in series. Find the current in each branch and the total current from the battery. (3 steps)", "answer": "- Step 1: Each branch is connected directly across the 12 V battery. By Kirchhoff's voltage law, the full 12 V is across each branch.\n- Step 2: Branch A has 30 Ω across 12 V, so I_A = V/R = 12/30 = 0.4 A. Branch B has 30 + 30 = 60 Ω across 12 V, so I_B = 12/60 = 0.2 A. (Equivalently, two equal resistors split the 12 V into 6 V + 6 V, and 6/30 = 0.2 A through each, same current through both in series.)\n- Step 3: By Kirchhoff's current law, the total current from the battery is the sum: I_total = I_A + I_B = 0.4 + 0.2 = 0.6 A.\n+ Visual: imagine two rivers flowing out of a lake into a common downstream point. Each river has its own flow rate set by the height difference and the riverbed resistance; the lake supplies the sum.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "In the same 12 V parallel circuit, a switch is closed that shorts out one of the 30 Ω resistors in branch B. What happens to the total current, and why?", "answer": "- Step 1: Before the switch is closed, branch B has 60 Ω total, so I_B = 0.2 A and the battery supplies 0.6 A.\n- Step 2: When the switch closes, it puts a zero-resistance wire across the lower 30 Ω resistor in branch B. Since both ends of that resistor are now connected by ideal wire, both ends are at the same potential, so V across that resistor = 0 and I through it = 0.\n- Step 3: All the current in branch B now flows through the short. Branch B is effectively a single 30 Ω resistor across 12 V, so I_B' = 12/30 = 0.4 A. Branch A is unchanged at 0.4 A.\n- Step 4: New total I_total' = 0.4 + 0.4 = 0.8 A. The current rose from 0.6 A to 0.8 A.\n+ Why it rises: a short removes a resistance from the circuit, lowering the equivalent resistance of branch B, which raises the current in that branch (and hence the total). The supply voltage is unchanged, but it's now driving current through a smaller total resistance.\n+ ESAT technique: when a switch shorts a resistor, the resistor is \"removed\" from the circuit (no current through it, no voltage across it). Recompute the circuit as if that resistor weren't there.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": true}, {"question": "State Kirchhoff's first law and explain the physical reasoning behind it.", "answer": "- Statement: At any junction in a circuit, the sum of currents flowing into the junction equals the sum of currents flowing out: ΣI_in = ΣI_out.\n- Step 1: Current is the rate of flow of charge. If 1 C of charge per second flows in, but only 0.6 C per second flows out, then 0.4 C per second is piling up at the junction.\n- Step 2: Charge cannot pile up indefinitely in a wire — there is nowhere for it to go. So whatever flows in must flow out, instantaneously.\n- Step 3: That's the law of conservation of charge, applied to a single point in the circuit.\n+ Visual: a junction is like a pipe junction. Water in = water out, otherwise the junction would flood or empty.\n+ ESAT use: it lets you find an unknown current from the others at a junction without doing any further circuit analysis.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "State Kirchhoff's second law and explain the physical reasoning behind it.", "answer": "- Statement: Around any closed loop in a circuit, the sum of EMFs equals the sum of the IR voltage drops: ΣEMF = ΣIR.\n- Step 1: An EMF (in volts) is the energy supplied per unit charge. A voltage drop IR is the energy transferred per unit charge across a resistor.\n- Step 2: Imagine a charge makes one full trip around the loop. By the time it returns to its starting point, it must have exactly the same total energy it began with — energy is conserved.\n- Step 3: Therefore, all the energy the EMF gave the charge must have been spent on IR drops around the loop. Hence ΣEMF = ΣIR.\n+ Visual: it's like a roller coaster. The lift (EMF) gives the car a fixed amount of gravitational PE; the car spends that PE climbing and descending hills (IR drops), and ends up back at the start with the same energy.\n+ ESAT use: pick a closed loop, write down all the EMFs and IR drops with signs, and solve for an unknown current or resistance.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "Write the Stefan-Boltzmann law for a star in the form L = σAT⁴, and identify what σ, A, and T represent.", "answer": "+ L: luminosity, the total power (energy per unit time) radiated by the star, in watts.\n+ σ: the Stefan-Boltzmann constant, a fixed physical constant (≈ 5.67 × 10⁻⁸ W m⁻² K⁻⁴). It is the same for all black-body radiators.\n+ A: the surface area of the radiating body, in m². For a sphere of radius r, A = 4πr².\n+ T: the surface temperature of the body, in kelvin (K). It enters as T⁴ — temperature matters a *lot*.\n- Step 1: This is a black-body radiation law: any object at temperature T radiates power per unit area σT⁴, and total power = that rate × the area.\n- Step 2: The T⁴ dependence is what makes a small change in temperature produce a huge change in luminosity.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": true}, {"question": "For a spherical star, A = 4πr², so the Stefan-Boltzmann law gives L ∝ r²T⁴. If a star's radius is multiplied by k_r and its temperature by k_T, by what factor does its luminosity change? (3 steps)", "answer": "- Step 1: The new radius is r' = k_r · r and the new temperature is T' = k_T · T.\n- Step 2: New luminosity L' ∝ (r')² × (T')⁴ = (k_r · r)² × (k_T · T)⁴ = k_r² · r² · k_T⁴ · T⁴ = (k_r² · k_T⁴) × (r²T⁴).\n- Step 3: So L'/L = k_r² · k_T⁴. Luminosity scales as the *square* of the radius factor and the *fourth power* of the temperature factor.\n+ Quick intuition: temperature dominates. Doubling T (k_T = 2) alone multiplies L by 2⁴ = 16, even if r is unchanged. Doubling r alone only multiplies L by 4.\n+ This is why a small, very hot star can outshine a giant, cool one.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": true}, {"question": "A star's radius is multiplied by 100 and its temperature is halved. By what factor does its luminosity change, using L ∝ r²T⁴?", "answer": "- Step 1: k_r = 100, k_T = 1/2.\n- Step 2: L'/L = k_r² · k_T⁴ = (100)² × (1/2)⁴ = 10⁴ × 1/16 = 10⁴/16.\n- Step 3: 10⁴/16 = 10000/16 = 625. So the luminosity increases by a factor of 625.\n+ Sanity check: radius ×100 boosts L by 10⁴, but halving T reduces L by 16. Net = 10000/16 = 625. The radius increase wins by a lot.\n+ Mental-arithmetic tip: dividing by 16 is the same as dividing by 2 four times — useful when you can't reach for a calculator.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "A star's radius doubles (k_r = 2) and its temperature triples (k_T = 3). By what factor does its luminosity change, using L ∝ r²T⁴?", "answer": "- Step 1: L'/L = k_r² · k_T⁴ = 2² × 3⁴ = 4 × 81 = 324.\n+ Luminosity increases by a factor of 324.\n+ Intuition: the temperature term dominates (3⁴ = 81) over the radius term (2² = 4). Temperature has the louder voice in stellar luminosity.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": true}, {"question": "A star's temperature stays the same but its radius doubles. By what factor does the luminosity change? What if instead the temperature doubles at fixed radius?", "answer": "- Step 1: Temperature fixed, radius doubled: L'/L = (2)² × 1⁴ = 4. L quadruples.\n- Step 2: Radius fixed, temperature doubled: L'/L = 1² × (2)⁴ = 16. L increases 16-fold.\n+ Takeaway: temperature has a much stronger leverage on luminosity than radius. A modest temperature increase can swamp a large radius change.\n+ General rule: every doubling of T multiplies L by 16. Every doubling of r multiplies L by 4. So T acts like four doublings stacked on top of one.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": true}, {"question": "In a transverse wave on a rope, does a single particle of the rope travel with the wave? Explain what it actually does.", "answer": "- Step 1: A wave is a *pattern* of disturbance that moves through a medium. The medium itself does not move with the pattern.\n- Step 2: Each particle of the rope oscillates up and down about its equilibrium position. The wave shape moves along the rope, but the particles that make up the rope just bob in place.\n- Step 3: When a wave moves from left to right, a particle on the left starts oscillating first, then a neighbour starts, and so on — but each individual particle only moves vertically.\n+ Visual: imagine a Mexican wave in a stadium. The \"wave\" travels around the stadium, but the people stand up and sit back down in place. They never run around the stadium with the wave.\n+ Why this matters: it clarifies that wave speed is not the speed of any individual particle, but the speed of the pattern.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "A wave particle of amplitude A makes one full oscillation. What total distance does the particle travel, and why? (3 steps)", "answer": "- Step 1: One full cycle: the particle moves from rest position up to the top (distance A), back down through rest to the bottom (distance A), and back up to rest (distance A). That's three A's so far.\n- Step 2: Wait — count again carefully. Up to top = A. Down through rest to bottom = 2A. Back up to rest = A. Total per full cycle = 4A.\n- Step 3: So in one full oscillation the particle traces out a total path length of 4A — not 2A, not A.\n+ Why 4A and not 2A: 2A would be the *displacement range* (top to bottom), not the *distance travelled*. The particle covers the top-to-bottom range twice per cycle (down and back up) plus two more A's (rest to top, rest to top again at the end). The total is 4A.\n+ ESAT trap: students often guess \"2A\" or \"A\" for the per-cycle distance. Memorise \"4A per cycle\" — it appears in ESAT problems.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": true}, {"question": "A wave has amplitude 3 cm and frequency 5 Hz. How far does a single particle travel in one minute?", "answer": "- Step 1: Per cycle, the particle covers 4A = 4 × 3 = 12 cm.\n- Step 2: Frequency = 5 Hz means 5 complete cycles per second. In 60 s the particle completes 5 × 60 = 300 cycles.\n- Step 3: Total distance = 300 cycles × 12 cm/cycle = 3600 cm = 36 m.\n+ Why 4A and not 2A: the particle has to come back to the start to \"complete\" each cycle, which doubles the trip.\n+ ESAT technique: 4A × f gives \"cm/s\" if A is in cm; multiply by the time to get total distance. No need to find wave speed or wavelength for this kind of question.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "A mass m is being lifted vertically upward by a rope with tension T, accelerating upward at a. Write the equation relating T, m, g, and a, and explain why T is *not* equal to mg in general.", "answer": "- Step 1: Apply Newton's second law along the vertical. The net (resultant) upward force is T (up) − mg (down). So F_res = T − mg.\n- Step 2: F_res = ma (Newton's second law). Equate: T − mg = ma.\n- Step 3: Solve for T: T = mg + ma = m(g + a).\n+ Why T ≠ mg in general: if the mass is accelerating, there must be a net force. T and mg are the only two vertical forces. If they were equal, F_res = 0 and a = 0. The instant a > 0, T must exceed mg by exactly ma to produce that acceleration.\n+ Edge case: a = 0 ⇒ T = mg. The mass is in equilibrium (lifted at constant velocity or held still). Only then is tension equal to weight.\n+ ESAT trap: writing \"T = mg\" without checking the acceleration. Always start from F_res = ma and identify the net force.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": true}, {"question": "A 5 kg mass is lifted upward at acceleration 0.8 m/s². Using g = 10 m/s², find (i) the minimum tension in the rope and (ii) the force on the pulley coupling. (3 steps)", "answer": "- Step 1: Weight mg = 5 × 10 = 50 N. Resultant force needed: ma = 5 × 0.8 = 4 N (upward, because the mass is accelerating up).\n- Step 2: Tension: T = m(g + a) = 5 × (10 + 0.8) = 5 × 10.8 = 54 N. This is the *minimum* tension because any smaller value would give an acceleration less than 0.8 m/s² (or even a downward acceleration).\n- Step 3: The pulley redirects the rope. Tension T pulls down on the pulley on the rope side, and T pulls down on the pulley on the motor side. The coupling must support both, so the force on the coupling is 2T = 108 N.\n+ Why \"minimum\": the question says minimum because the problem only makes sense at the minimum — if you allow T to be larger, the acceleration could be larger too, and the question would have no single answer. \"Minimum\" is a hint that the value is fixed by the kinematics.\n+ ESAT trap: writing T = 50 N (= mg) misses the ma term. Always use F_res = ma.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "A pulley redirects a rope with tension T on both sides. Explain intuitively why the force on the pulley coupling is 2T and not T.", "answer": "- Step 1: The rope is in equilibrium as a whole — it's not accelerating anywhere. So the *external* agent that holds the pulley in place must balance every force the rope exerts on it.\n- Step 2: The rope presses down on the pulley on the side attached to the load, with force T (the rope's tension pulling the pulley toward the load). The rope also presses down on the pulley on the side going to the motor, with force T (the rope's tension pulling the pulley toward the motor).\n- Step 3: The two forces point in different directions (one side of the pulley vs the other), but both pull *away* from the pulley centre. The coupling must hold the pulley *up* against both pulls. The total downward pull is T + T = 2T, so the coupling exerts 2T upward.\n+ Visual: imagine the pulley as a person holding a rope that has two people hanging off it, one on each side, each pulling down with force T. The person holding the rope feels 2T downward.\n+ ESAT trap: writing \"coupling feels T\" treats the rope as if it only pulls on one side. A redirected rope always pulls on both sides, so the coupling always feels 2T.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": true}, {"question": "Misconception probe: A student says \"In a potential divider, the current through R₁ is V/R₁, where V is the supply voltage.\" Identify the misconception and the correct procedure.", "answer": "- The misconception: treating each resistor in the series chain as if it had the *full* supply voltage across it. In a series circuit, the supply voltage is *shared* across the resistors, not given in full to each one.\n- Step 1: The current through R₁ is the same as the current through R₂ (series), so it must be calculated using the *total* resistance.\n- Step 2: I = V_total / R_total = V / (R₁ + R₂).\n- Step 3: To find the voltage across R₁, use the potential divider: V₁ = [R₁/(R₁ + R₂)] × V. Or use I × R₁ with the correct I.\n+ Concrete example: 24 V supply, 3 Ω in series with 5 Ω. The wrong answer is I = 24/3 = 8 A (or 24/5 = 4.8 A). The right answer is I = 24/(3+5) = 24/8 = 3 A, with V₅ = 3 × 5 = 15 V.\n+ Why this is so common: students want to \"use\" the supply voltage immediately, before doing the series analysis. The discipline is: series first, then the supply voltage drops across the total.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": true}, {"question": "Misconception probe: A student says \"Gamma radiation is dangerous, so the CMBR must be dangerous gamma radiation.\" Identify the flaw.", "answer": "- The flaw: the CMBR is called \"microwave background\" precisely because it is *not* gamma radiation anymore. The wavelength has been stretched by cosmic expansion.\n- Step 1: The early universe emitted gamma radiation (very high frequency, very short wavelength).\n- Step 2: Over billions of years, cosmic expansion stretched the wavelength by a factor of about 1000, shifting the photons from the gamma region down into the microwave region.\n- Step 3: Microwave photons have much lower energy per photon than gamma photons. The CMBR is therefore a low-energy background; it is not \"gamma radiation redivivus.\" Individual CMBR photons cannot ionise atoms.\n+ The take-home: the *spectrum* of the radiation is determined by the *current* frequency/wavelength, not by the historical label. What it was emitted as is astrophysics; what it is now is what interacts with you.", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": true}, {"question": "Why does a wave particle travel 4A per cycle and not 2A? Construct the path step by step from the equilibrium position.", "answer": "- Step 1: Start at rest (the equilibrium position). Move up to the top of the oscillation. Path length so far: A.\n- Step 2: Move down through the equilibrium position to the bottom. Path length so far: A + 2A = 3A.\n- Step 3: Move back up to the equilibrium position. Path length so far: 3A + A = 4A. We're back at the start, having completed one full cycle.\n+ Why 2A is wrong: 2A is the *peak-to-trough* displacement. Distance is a path length, which counts every metre the particle actually walks. Going from peak to trough and back to peak is a round trip — twice the peak-to-trough distance.\n+ Quick mnemonic: amplitude × 4 = \"Around the four cardinal points of one cycle\" (rest → up → rest → down → rest).", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": true}, {"question": "Synthesis: A 4 kg mass is lifted upward at constant velocity 2 m/s by a motor-pulley system. Using g = 10 m/s², find the tension in the rope and the force on the pulley coupling. What changes if the system instead accelerates the mass upward at 1.5 m/s²?", "answer": "- Step 1: Constant velocity ⇒ a = 0. So F_res = 0. T − mg = 0 ⇒ T = mg = 4 × 10 = 40 N. Coupling force = 2T = 80 N.\n- Step 2: Now with a = 1.5 m/s² upward, F_res = ma = 4 × 1.5 = 6 N upward. T − mg = ma ⇒ T = m(g + a) = 4 × 11.5 = 46 N. Coupling force = 2T = 92 N.\n- Step 3: Compare: tension rose from 40 N to 46 N, an increase of 6 N — exactly equal to ma. The extra ma is \"spent\" accelerating the mass; the rope has to provide it.\n+ Key takeaway: at constant velocity the system is in equilibrium and T = mg. The instant you accelerate the mass, T must exceed mg by ma. The pulley coupling always feels 2T regardless of motion state.\n+ Why \"minimum\" matters in such questions: the *minimum* tension is the one that gives the requested acceleration. Anything larger would also accelerate the mass (and the question would have no unique answer).", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": true}, {"question": "Synthesis: A 6 V supply is connected to a 2 Ω variable resistor in series with a fixed 4 Ω resistor. The variable resistor can be set to any value from 2 Ω upward. Find the maximum power dissipated in the 4 Ω resistor.", "answer": "- Step 1: The 4 Ω resistor is fixed; to maximise P in it, maximise the current (since P = I²R with R fixed).\n- Step 2: For maximum current, minimise the total series resistance. Set the variable resistor to its minimum value, 2 Ω.\n- Step 3: R_total = 2 + 4 = 6 Ω. I = V/R_total = 6/6 = 1 A. P = I²R = 1² × 4 = 4 W.\n+ Sanity check (alternative route): potential divider — V across 4 Ω = [4/(2+4)] × 6 = (4/6) × 6 = 4 V. P = V²/R = 16/4 = 4 W. Same answer.\n+ ESAT discipline: in a max-power-in-fixed-R problem, the answer is always reached by (a) using the form P = I²R or P = V²/R with the fixed R, and (b) minimising every other resistance in series.", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": false}, {"question": "Synthesis: A wire of length L and cross-section A carries a steady current I. If you double the length, double the area, and double the current, what happens to the power dissipated in the wire? (P = I²R; R = ρL/A.)", "answer": "- Step 1: R ∝ L/A. New R' = ρ(2L)/(2A) = ρL/A = R. The resistance is unchanged because the length and area factors cancel.\n- Step 2: New current I' = 2I. P' = (I')² × R' = (2I)² × R = 4I²R = 4P. The power quadruples.\n+ Take-home: doubling the current quadruples the dissipated power at fixed resistance. The geometry change is a red herring — it leaves R unchanged, so it doesn't enter the final scaling.\n+ ESAT check: don't be distracted by geometry changes that cancel in the ratio L/A. Focus on which quantity actually enters the power formula.", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": true}, {"question": "Synthesis: Why is the alpha-particle symbol written as ⁴₂He rather than ²₁H or ⁴₂H? In other words, why does an alpha carry A = 4 and Z = 2 specifically?", "answer": "- Step 1: An alpha particle is a helium-4 nucleus, meaning it has 2 protons and 2 neutrons — total of 4 nucleons.\n- Step 2: Z (proton number) counts protons only ⇒ Z = 2.\n- Step 3: A (mass/nucleon number) counts total nucleons (protons + neutrons) ⇒ A = 2 + 2 = 4.\n+ The symbol uses the element whose name tells you the proton count: helium (He) means Z = 2, and the ⁴ tells you A = 4.\n+ Common confusion: ²₁H would be a deuteron (one proton + one neutron). ⁴₂H would be wrong because hydrogen cannot have Z = 2; you'd have to call it helium.\n+ Why this matters: when you see ⁴₂He in a decay equation, you should immediately read off (ΔA, ΔZ) = (−4, −2) without re-deriving the values.", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": true}, {"question": "Synthesis: A 12 V supply is connected to a circuit with three parallel branches. Branch A has a single 6 Ω resistor, branch B has a single 12 Ω resistor, and branch C has a single 24 Ω resistor. What is the total current from the supply, and what fraction of it flows in branch A?", "answer": "- Step 1: Each branch is across the full 12 V. I_A = 12/6 = 2 A. I_B = 12/12 = 1 A. I_C = 12/24 = 0.5 A.\n- Step 2: Total I = 2 + 1 + 0.5 = 3.5 A.\n- Step 3: Fraction in A = I_A/I_total = 2/3.5 = 4/7 ≈ 0.57.\n+ Key principle: in parallel, current is *inversely* proportional to resistance. The branch with the *smallest* resistance carries the *largest* current.\n+ ESAT use: this lets you rank branch currents without calculating them all, just from the resistances.\n+ Sanity check: bigger current means more charge per second, which means more charge carriers per second — that happens in the path of least resistance. The supply \"wants\" to drive current through the easiest path.", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": true}, {"question": "Edge case: A wire of length L has a steady current I. If you keep everything else the same but reduce L to L/2, what happens to the dissipated power? What if you keep L fixed but double the cross-sectional area A?", "answer": "- Step 1: R = ρL/A. If L → L/2 (area unchanged), R → R/2. Then P = I²R → I²(R/2) = P/2. Power halves.\n- Step 2: If A → 2A (length unchanged), R → R/2 also. Power halves.\n- Step 3: Both changes halve R and halve the power. This is because power at fixed I scales linearly with R.\n+ Why the same answer: in both cases, halving R has the same effect on P at fixed I. The geometric origin of the change doesn't matter for the power — only the resulting R does.\n+ Why it's a useful check: if you get \"power changes\" in the wrong direction here, you've forgotten that P = I²R — and you may have grabbed the wrong power form for the question.", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": false}, {"question": "Edge case: In the rate of thermal conduction C ∝ A·ΔT/L, what happens to C in each of the following scenarios? (a) A and L both double. (b) ΔT is halved. (c) The bar is replaced with one of double A and double L but kept at the same ΔT. (d) The bar's two ends are at 50 °C and 50 °C.", "answer": "+ (a) Doubling A doubles C; doubling L halves C; together they cancel. C unchanged.\n+ (b) ΔT halved ⇒ C halved (linear proportionality).\n+ (c) Identical to (a) — same outcome. C unchanged.\n+ (d) ΔT = 0 ⇒ C = 0. No net heat flow.\n+ Big idea: the only geometric ratio that matters for C is A/L. If A/L is preserved, C is preserved. The only \"driver\" is ΔT. If ΔT = 0, no flow regardless of geometry.\n+ These edge cases are exactly the kind of \"no change\" options the ESAT includes among the multiple-choice answers, so they test whether you've understood the proportionality.", "source": "MiniMax ②", "_id": "minimax_2_47", "judge_pick": true}, {"question": "Edge case: Why is the minimum tension in a pulley problem the value that matches the requested kinematics? What would happen if the rope tension were larger than that minimum?", "answer": "- Step 1: Newton's second law is a one-to-one map: given F_res, the acceleration is determined by a = F_res/m. Conversely, given the acceleration, F_res is determined.\n- Step 2: F_res = T − mg. So given a, T is uniquely determined: T = m(g + a).\n- Step 3: If the rope tension were *larger* than this T, then F_res would be larger than ma, and the mass would accelerate *faster* upward — not at the requested 0.8 m/s². The mass would still rise, but the question's answer would be ill-defined.\n+ Why \"minimum\" is the magic word: the question says \"minimum tension\" because that's the *unique* value that produces the *specified* acceleration. Any larger tension is also physically possible but would correspond to a different (larger) acceleration. The keyword \"minimum\" pins the kinematics to a single value of T.\n+ ESAT pattern: whenever you see \"minimum\" or \"maximum\" in a mechanics question, treat it as a hint that the kinematics determine the answer uniquely only at that extremum.", "source": "MiniMax ②", "_id": "minimax_2_48", "judge_pick": true}, {"question": "Why is the Stefan-Boltzmann constant σ sometimes called a \"constant,\" and why does it appear in the same form for every radiating body?", "answer": "- Step 1: σ ≈ 5.67 × 10⁻⁸ W m⁻² K⁻⁴ is a *universal* constant: it doesn't depend on the size, shape, temperature, or composition of the radiator.\n- Step 2: The deeper reason is that σ comes from fundamental constants of nature (Boltzmann's constant k, Planck's constant h, and the speed of light c) combined in a particular way. Since those don't change, σ doesn't change either.\n- Step 3: So whether you're heating a tiny wire or a giant star, the power per unit area is σT⁴ — same formula, same σ.\n+ Why this is useful: you can use the same L ∝ r²T⁴ scaling for any spherical black-body radiator — a light bulb filament, a hot iron ball, a star — without re-deriving anything.\n+ ESAT note: don't memorise σ numerically; remember the form L = σAT⁴ and how it scales.", "source": "MiniMax ②", "_id": "minimax_2_49", "judge_pick": true}, {"question": "Why does a wire's resistance R = ρL/A scale linearly with L and inversely with A? Build the intuition from \"resistance as obstacle to flow.\"", "answer": "- Step 1: Resistance is the \"obstacle\" that charge carriers (electrons) face as they drift through the material. More obstacle ⇒ larger R.\n- Step 2: A longer wire (L larger) means more material for the electrons to push through — more scattering events per trip. So R grows with L.\n- Step 3: A bigger cross-sectional area A means more parallel paths for the electrons — more lanes on the highway. The \"obstacle per lane\" decreases, so R decreases as 1/A.\n+ Combine: R ∝ L/A. The constant of proportionality is the resistivity ρ, which is a property of the *material*, not its shape.\n+ Visual: think of a pipe. A longer pipe (bigger L) makes it harder to push water through (bigger R). A fatter pipe (bigger A) makes it easier (smaller R). Water flow is the analogue of current.\n+ This is why the same wire, doubled in length, has double the resistance — and the same wire, doubled in cross-section, has half the resistance.", "source": "MiniMax ②", "_id": "minimax_2_50", "judge_pick": true}, {"question": "Misconception probe: A student says \"The CMBR is the afterglow of the Big Bang, so the Big Bang is still happening somewhere.\" Identify and correct the misconception.", "answer": "- The misconception: the Big Bang is not an *ongoing explosion* happening at some location. The Big Bang is the name for the *expansion of the universe itself* from a hot, dense early state, roughly 13.8 billion years ago.\n- Step 1: The CMBR is the light that *decoupled* from matter about 380,000 years after the Big Bang, when the universe became transparent. That light has been travelling through space ever since.\n- Step 2: We see it today not because the Big Bang is still happening, but because the light has only just reached us. The \"source\" of the CMBR is everywhere — it surrounds us in all directions, because the early universe was everywhere.\n- Step 3: There is no \"centre\" of the Big Bang in space. The expansion is the stretching of space itself, with no special origin point.\n+ The key intuition: the Big Bang happened *everywhere* — not at one place, but to the universe as a whole. The CMBR is the relic of the moment the universe first became transparent, observed now from a vantage point inside that very early light.\n+ This is the most common conceptual confusion about cosmology; getting it right sets the foundation for the rest of the topic.", "source": "MiniMax ②", "_id": "minimax_2_51", "judge_pick": true}, {"question": "Why is gamma emission usually drawn in a decay chain but is sometimes omitted from the (A, Z) bookkeeping? Why does it still matter?", "answer": "- Step 1: Gamma emission is ⁰₀γ, so ΔA = 0 and ΔZ = 0. In a decay chain we usually only track changes in (A, Z), so gamma does not change the bookkeeping.\n- Step 2: But gamma emission matters because it carries away energy. The daughter nucleus is in a *lower* energy (more stable) state after the gamma is emitted.\n- Step 3: So in a decay chain, we still include the gamma as a \"step\" but it doesn't move us to a new (A, Z) point. It's a \"vertical\" transition in the energy diagram, not a \"horizontal\" one in the (A, Z) plane.\n+ ESAT use: when asked \"what is emitted in the next step of this chain?\", gamma is often the answer for the \"settling\" step that follows an alpha or beta emission. The nucleus was left in an excited state by the previous decay; the gamma is what brings it back down.\n+ Common confusion: students sometimes think \"no particle\" is emitted in the gamma step. There is — a high-energy photon, even though it carries no charge or nucleons.", "source": "MiniMax ②", "_id": "minimax_2_52", "judge_pick": true}, {"question": "Apply Kirchhoff's laws to a single-loop circuit: a 12 V battery connected to two resistors in series, R₁ = 3 Ω and R₂ = 9 Ω. Verify Kirchhoff's voltage law and Kirchhoff's current law. (3 steps)", "answer": "- Step 1: Total resistance R_total = 3 + 9 = 12 Ω. Current I = V/R_total = 12/12 = 1 A.\n- Step 2: Voltage drops: V₁ = I × R₁ = 1 × 3 = 3 V. V₂ = I × R₂ = 1 × 9 = 9 V. Sum V₁ + V₂ = 12 V = EMF. Kirchhoff's voltage law satisfied.\n- Step 3: There is only one loop, so the current is the same at every point in the loop (1 A in, 1 A out at every junction). Kirchhoff's current law satisfied trivially.\n+ The verification is the point: KVL is energy conservation (energy in = energy spent); KCL is charge conservation (charge in = charge out, so no charge piles up).\n+ This is the foundation for any two-loop circuit problem: write KCL at junctions, write KVL around loops, and solve the resulting system for the unknowns.", "source": "MiniMax ②", "_id": "minimax_2_53", "judge_pick": false}], "count": 54}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 16027, "out_tokens": 11602, "reasoning_chars": 21150, "cost_eur": 0.0466, "elapsed_s": 178, "content_chars": 21705}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 16027, "out_tokens": 16000, "reasoning_chars": 848, "cost_eur": 0.0589, "elapsed_s": 227, "content_chars": 59032}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 16027, "out_tokens": 14264, "reasoning_chars": 10703, "cost_eur": 0.0541, "elapsed_s": 226, "content_chars": 42722}, "kimi_1": {"run": 1, "provider": "kimi", "model": "moonshotai/kimi-k2.6", "display": "Kimi K2.6", "temperature": 0.7, "in_tokens": 15656, "out_tokens": 16000, "reasoning_chars": 46550, "cost_eur": 0.0792, "elapsed_s": 352, "content_chars": 13950}, "kimi_2": {"run": 2, "provider": "kimi", "model": "moonshotai/kimi-k2.6", "display": "Kimi K2.6", "temperature": 0.8, "in_tokens": 15657, "out_tokens": 16000, "reasoning_chars": 38492, "cost_eur": 0.0793, "elapsed_s": 351, "content_chars": 19697}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m3", "display": "MiniMax M3", "temperature": 0.7, "in_tokens": 15646, "out_tokens": 12181, "reasoning_chars": 4310, "cost_eur": 0.0178, "elapsed_s": 127, "content_chars": 41643}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m3", "display": "MiniMax M3", "temperature": 0.8, "in_tokens": 15646, "out_tokens": 16000, "reasoning_chars": 8123, "cost_eur": 0.022, "elapsed_s": 168, "content_chars": 51883}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3.7-max", "display": "Qwen 3.7 Max", "temperature": 0.7, "in_tokens": 16410, "out_tokens": 14542, "reasoning_chars": 29165, "cost_eur": 0.069, "elapsed_s": 264, "content_chars": 25089}, "qwen_2": {"run": 2, "provider": "qwen", "model": "qwen/qwen3.7-max", "display": "Qwen 3.7 Max", "temperature": 0.7, "in_tokens": 16410, "out_tokens": 14153, "reasoning_chars": 26525, "cost_eur": 0.0677, "elapsed_s": 257, "content_chars": 26354}, "qwen_3": {"run": 3, "provider": "qwen", "model": "qwen/qwen3.7-max", "display": "Qwen 3.7 Max", "temperature": 0.8, "in_tokens": 16410, "out_tokens": 13113, "reasoning_chars": 25315, "cost_eur": 0.0641, "elapsed_s": 238, "content_chars": 21480}, "qwen_4": {"run": 4, "provider": "qwen", "model": "qwen/qwen3.7-max", "display": "Qwen 3.7 Max", "temperature": 0.8, "in_tokens": 16410, "out_tokens": 11081, "reasoning_chars": 16168, "cost_eur": 0.0571, "elapsed_s": 201, "content_chars": 25585}}};
const SK='auto_physics_20260711_esat_physics_with_tom_r_pmt_education';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function eI(s){return eH(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>').replace(/`([^`]+)`/g,'<code>$1</code>')}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eI(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eI(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eI(tr.slice(2))}</div>`;continue}
    h+=`<div>${eI(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    const cardClass=(im||cur==='judge')?'':'ds';
    h+=`<div class="cd ${cardClass}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eI(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch&&cur!=='judge');
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
