nstant gradients that carry clear physical meaning.", "source": "GLM 5.1 ②", "_id": "glm_2_11"}, {"question": "A rope passes over a fixed pulley to lift a mass, with the other end pulled by a motor. If the tension in the rope is $$T$$, explain conceptually why the force exerted on the pulley's coupling (the axle or support) is $$2T$$ rather than just $$T$$. (2 steps)", "answer": "- Step 1: The pulley's job is to change the direction of the rope. The rope pulls *down* on the right side of the pulley (towards the mass) with a force equal to the tension $$T$$. Simultaneously, the rope pulls *down* on the left side of the pulley (towards the motor) with the exact same tension $$T$$.\n- Step 2: The pulley's coupling (the physical mount attaching it to the ceiling or support structure) must hold the pulley in place against *both* of these downward pulls. Since there are two sections of rope pulling down on the pulley, each with force $$T$$, the coupling must exert an upward support force of $$T + T = 2T$$ to keep the pulley stationary.\n\n*Takeaway: A pulley redirecting a rope experiences the tension force twice—once from the load side and once from the effort side.*", "source": "Qwen 3 ④", "_id": "qwen_4_20"}, {"question": "Edge case: A thermally conducting bar has one end at temperature $$T_1$$ and the other at $$T_2$$, with $$T_1 > T_2$$. If you cool $$T_1$$ by 5 K and heat $$T_2$$ by 5 K, what happens to the conduction rate, and why?", "answer": "The conduction rate **decreases**. The original temperature difference was $$\\Delta T = T_1 - T_2$$. After cooling $$T_1$$ by 5 K and heating $$T_2$$ by 5 K, the new difference is $$\\Delta T' = (T_1 - 5) - (T_2 + 5) = T_1 - T_2 - 10 = \\Delta T - 10$$. The driving force for conduction has shrunk by 10 K, so $$C$$ decreases proportionally. This is the opposite of the \"both ends heated equally\" case — here, the changes *reduce* the gap rather than preserving it.", "source": "GLM 5.1 ③", "_id": "glm_3_40"}, {"question": "A common error on pulley-lift problems is to say the tension equals the weight ($$T = mg$$) because \"the mass is being supported.\" Why is this wrong when the mass is *accelerating* upward? (2 steps)", "answer": "- Step 1: If $$T = mg$$ exactly, the net (resultant) force on the mass is zero — the tensions up and down balance.\n- Step 2: Zero net force means zero acceleration (Newton's first law). But we are told the mass is accelerating upward at $$a$$ — that requires a **net upward** force, which means $$T > mg$$.\n\nThe correct value is $$T = m(g+a)$$, which is strictly greater than $$mg$$ whenever $$a > 0$$. The mistake comes from confusing *equilibrium* (no acceleration) with *steady motion with acceleration* — only the former allows $$T = mg$$.", "source": "MiniMax ①", "_id": "minimax_1_23"}, {"question": "Four mechanics graphs are listed: (i) GPE vs height, (ii) work done vs distance, (iii) velocity vs time, (iv) kinetic energy vs velocity. Three of these are linear through the origin; one is a **parabola**. Which one is the parabola, and *why*? (2 steps)", "answer": "- Step 1: Kinetic energy is given by $$E_k = \\tfrac{1}{2} m v^2$$. The variable on the x-axis ($$v$$) appears **squared**, so $$E_k$$ versus $$v$$ is a quadratic curve — a parabola opening upward.\n- Step 2: The other three (GPE = $$mgh$$, work = $$Fd$$, $$v = u + at$$ from rest) all have the y-quantity proportional to the x-quantity raised only to the first power, so they are straight lines through the origin.\n\nA common trap is to assume \"more speed, more energy\" implies linear. It doesn't — the relationship is genuinely quadratic, and a straight-line KE-vs-v graph is *always* wrong.", "source": "MiniMax ①", "_id": "minimax_1_8"}, {"question": "The CMBR is detected today as microwave radiation. Without any instruments, just from the fact that the universe is expanding and that $$c = f\\lambda$$, could you predict that the *original* early-universe radiation must have been at higher frequency than microwave? Walk through the chain. (2 steps)", "answer": "- Step 1: Expansion means wavelengths in the universe get *stretched* over time. So whatever the original wavelength was, it has been getting *longer* ever since.\n- Step 2: From $$f = c/\\lambda$$, a longer wavelength means a *lower* frequency today than in the past. So the radiation we see as microwave *now* must have been at higher frequency *then*. To get a much higher frequency, you go all the way up to **gamma** rays (very short $$\\lambda$$, very high $$f$$).\n\nThis is the reverse logic of WE1 in the lesson: don't start with \"gamma\" — start with \"wavelength has been stretched\" and use $$c = f\\lambda$$ to conclude frequency has dropped.", "source": "MiniMax ①", "_id": "minimax_1_26"}, {"question": "A star's radius doubles (k_r = 2) and its temperature triples (k_T = 3). By what factor does its luminosity change, using L ∝ r²T⁴?", "answer": "- Step 1: L'/L = k_r² · k_T⁴ = 2² × 3⁴ = 4 × 81 = 324.\n+ Luminosity increases by a factor of 324.\n+ Intuition: the temperature term dominates (3⁴ = 81) over the radius term (2² = 4). Temperature has the louder voice in stellar luminosity.", "source": "MiniMax ②", "_id": "minimax_2_30"}, {"question": "Why does a wave particle travel 4A per cycle and not 2A? Construct the path step by step from the equilibrium position.", "answer": "- Step 1: Start at rest (the equilibrium position). Move up to the top of the oscillation. Path length so far: A.\n- Step 2: Move down through the equilibrium position to the bottom. Path length so far: A + 2A = 3A.\n- Step 3: Move back up to the equilibrium position. Path length so far: 3A + A = 4A. We're back at the start, having completed one full cycle.\n+ Why 2A is wrong: 2A is the *peak-to-trough* displacement. Distance is a path length, which counts every metre the particle actually walks. Going from peak to trough and back to peak is a round trip — twice the peak-to-trough distance.\n+ Quick mnemonic: amplitude × 4 = \"Around the four cardinal points of one cycle\" (rest → up → rest → down → rest).", "source": "MiniMax ②", "_id": "minimax_2_40"}, {"question": "Electrical power can be written in three equivalent forms: $$P = IV = I^2 R = V^2 / R$$. In a problem where the resistor $$R$$ is fixed but the supply voltage $$V$$ is allowed to vary, which form of the power equation is most *useful* for finding the power, and why?", "answer": "- Step 1: You want a form that uses the **known/fixed** quantities and the variable that is changing.\n- Step 2: Since $$R$$ is fixed and $$V$$ is the variable you are sweeping, $$P = V^2 / R$$ is the natural form — it tells you directly that $$P$$ scales with $$V^2$$.\n- Step 3: Using $$P = I^2 R$$ here would force you to first compute $$I = V/R$$ from Ohm's law, then square it, then multiply by $$R$$ — same answer, more steps, more places to slip up.\n\nThe golden rule: **pick the power form that lets the fixed quantity cancel out or sit passively.**", "source": "MiniMax ①", "_id": "minimax_1_10"}, {"question": "A graph of GPE vs height for a 2 kg mass near Earth's surface is plotted. What is the gradient of the line, in SI units, and *why* is the gradient numerically equal to the weight? (2 steps)", "answer": "- Step 1: The equation is $$E_p = mgh$$. For a fixed mass, $$E_p$$ vs $$h$$ is a straight line through the origin with gradient = $$mg$$.\n- Step 2: With $$m = 2\\,\\text{kg}$$ and $$g = 9.81\\,\\text{m/s}^2$$ (or 10 N/kg), the gradient is $$mg \\approx 19.6\\,\\text{N}$$ (or 20 N). Numerically, the gradient equals the weight because the weight *is* $$mg$$ — and \"GPE per unit height\" is exactly the weight (J per m = N).\n\nThis is the same reason a velocity–time graph has gradient = acceleration: gradient = (y-quantity per unit x-quantity) = the constant of proportionality in the underlying equation.", "source": "MiniMax ①", "_id": "minimax_1_27"}, {"question": "If the wavelength of the CMBR radiation has been stretched by a factor of roughly 1000 since emission, what happened to its frequency, and why can't the frequency stay the same while only the wavelength changes? (2 steps)", "answer": "- Step 1: Since $$c = f\\lambda$$ and $$c$$ is constant, if λ increases by a factor of 1000, then f must decrease by a factor of 1000. The frequency and wavelength are inversely proportional when the wave speed is fixed.\n- Step 2: You cannot change only the wavelength while keeping frequency constant, because that would require changing the wave speed: $$c = f\\lambda$$. If f stayed the same and λ increased 1000×, then c would need to be 1000× larger — but c is a universal constant. The constraint that c is fixed is what forces frequency and wavelength to move in opposite directions.\n\nThis is why cosmological redshift is sometimes called \"stretching\" — space stretches the wave, and the frequency must compensate downward.", "source": "GLM 5.1 ②", "_id": "glm_2_1"}, {"question": "Why does it make sense that the same current flows through *every* component in a series circuit? (2 steps)", "answer": "- Step 1: The components are connected end-to-end in a single loop — there is no junction where charge can \"branch off\" or \"leak in.\"\n- Step 2: By Kirchhoff's first law, at any junction the current in equals the current out. In a series loop, the wire between components acts as a \"junction\" with no branching — so the current entering one component must equal the current leaving it, and that current is the same as in the next component, and so on all the way around.\n\nThis is also why *adding* a resistor in series always *reduces* the current: more resistance in the loop, same supply voltage, so the only current consistent with conservation of charge is smaller.", "source": "MiniMax ①", "_id": "minimax_1_25"}, {"question": "When plotting Kinetic Energy ($$E_k$$) against velocity ($$v$$), what is the mathematical shape of the graph, and why is it fundamentally different from a Work vs. Distance graph? (2 steps)", "answer": "- Step 1: The equation for kinetic energy is $$E_k = \\frac{1}{2}mv^2$$. Because velocity is squared, the relationship is quadratic, meaning the graph of $$E_k$$ vs $$v$$ is a parabola (a curve starting at the origin and getting steeper).\n- Step 2: In contrast, Work done is $$W = Fd$$. Assuming a constant force, this is a linear relationship ($$y = mx$$), so a Work vs. Distance graph is a straight line. The fundamental difference is that kinetic energy scales with the *square* of the kinematic variable, while work scales *linearly* with distance.", "source": "Qwen 3 ①", "_id": "qwen_1_9"}, {"question": "Why does the formula $$C \\propto A \\Delta T / L$$ for thermal conduction have a **temperature *difference*** in it, rather than an absolute temperature? What's the conceptual point?", "answer": "- Step 1: Heat flows from hot to cold because of a temperature *gradient* — energy moves down a thermal \"hill.\"\n- Step 2: If both ends of the bar are at the **same** temperature ($$\\Delta T = 0$$), there is no \"hill\" to slide down — no driving force for net heat flow. Even if both ends are at 1000 K, with no difference, no net heat travels along the bar.\n- Step 3: So the relevant quantity is the *imbalance* between the two ends, not how hot the bar is in some absolute sense. This is the same reason electrical current depends on a *voltage difference*, not the absolute voltage at a point.\n\nThe deeper analogy: both heat and charge flow down a \"potential difference\" (thermal or electrical). No difference, no flow.", "source": "MiniMax ①", "_id": "minimax_1_32"}, {"question": "Why is the KE-vs-velocity graph a parabola and not a straight line? Build the intuition from the equation E_k = ½mv².", "answer": "- Step 1: KE depends on v *squared*. If you double v, E_k becomes 2² = 4 times bigger — not twice as big.\n- Step 2: A straight-line graph requires a constant gradient (y = mx + c). For a quadratic, the gradient itself changes with v: dE_k/dv = mv, which grows linearly with v.\n- Step 3: So the curve gets steeper as v increases. That's the shape of a parabola opening upward.\n+ Visual: plot (1, 0.5m), (2, 2m), (3, 4.5m), (4, 8m) — the points bend upward, not in a straight line.\n+ Why this matters for ESAT: a graph-matching question will offer you a \"linear KE–v graph\" as a distractor. The shape test alone is enough to eliminate it.", "source": "MiniMax ②", "_id": "minimax_2_16"}, {"question": "If a nucleus with A = 236 and Z = 92 undergoes fission producing two fragments with A = 90, Z = 36 and A = 143, Z = 55, plus some neutrons, how many neutrons are released? Verify using both conservation laws. (3 steps)", "answer": "- Step 1: Conservation of nucleon number: total A on the left = 236. Total A on the right from the two fragments = 90 + 143 = 233. Remaining A for neutrons = 236 − 233 = 3. Each neutron has A = 1, so 3 neutrons are released.\n- Step 2: Conservation of proton number: total Z on the left = 92. Total Z on the right from fragments = 36 + 55 = 91. But neutrons have Z = 0, so total Z on the right = 91 + 0 = 91. This does NOT equal 92.\n- Step 3: The equation as stated violates proton number conservation (92 ≠ 91). This means the proposed fission products are incorrect, or there's an additional charged particle. A valid equation must satisfy both A and Z conservation simultaneously.\n\nThis demonstrates that you must check both A and Z. Getting A to balance doesn't guarantee Z balances, and vice versa.", "source": "GLM 5.1 ②", "_id": "glm_2_42"}, {"question": "A star's radius becomes 100 times larger, but its surface temperature becomes **half** of what it was. By what factor does the luminosity change, and which effect dominates? (2 steps)", "answer": "- Step 1: Radius factor: $$k_r = 100 \\Rightarrow k_r^2 = 100^2 = 10{,}000$$. Temperature factor: $$k_T = 1/2 \\Rightarrow k_T^4 = (1/2)^4 = 1/16$$.\n- Step 2: Luminosity factor = $$10{,}000 \\times \\dfrac{1}{16} = 625$$. So the star is **625 times more luminous**, despite being cooler. The radius increase wins because it goes as the *square*, while the temperature only *halves* (and is raised to the 4th).\n\nThis is a useful sanity check: cooling by a factor of 2 costs you a factor of 16, but growing by a factor of 100 buys you a factor of 10,000.", "source": "MiniMax ①", "_id": "minimax_1_18"}, {"question": "Write the Stefan-Boltzmann law for a star in the form L = σAT⁴, and identify what σ, A, and T represent.", "answer": "+ L: luminosity, the total power (energy per unit time) radiated by the star, in watts.\n+ σ: the Stefan-Boltzmann constant, a fixed physical constant (≈ 5.67 × 10⁻⁸ W m⁻² K⁻⁴). It is the same for all black-body radiators.\n+ A: the surface area of the radiating body, in m². For a sphere of radius r, A = 4πr².\n+ T: the surface temperature of the body, in kelvin (K). It enters as T⁴ — temperature matters a *lot*.\n- Step 1: This is a black-body radiation law: any object at temperature T radiates power per unit area σT⁴, and total power = that rate × the area.\n- Step 2: The T⁴ dependence is what makes a small change in temperature produce a huge change in luminosity.", "source": "MiniMax ②", "_id": "minimax_2_27"}, {"question": "When applying Newton's second law to a mass being lifted vertically with acceleration $$a$$, the equation is $$T - mg = ma$$. Why is the left side written as $$T - mg$$ rather than just $$T$$, and what does each term represent? (2 steps)", "answer": "- Step 1: Newton's second law states $$F_{\\text{res}} = ma$$, where $$F_{\\text{res}}$$ is the **resultant (net) force** — not just any single force. Two forces act on the mass: tension $$T$$ pulling upward and weight $$mg$$ pulling downward. The resultant is $$T - mg$$ (upward minus downward).\n- Step 2: Setting $$T - mg = ma$$ and solving: $$T = m(g + a)$$. If $$a = 0$$ (no acceleration, just hovering), $$T = mg$$ — the tension exactly balances weight. If $$a > 0$$ (accelerating upward), $$T > mg$$ — the tension must exceed weight to produce a net upward force. If $$a < 0$$ (accelerating downward, i.e., falling), $$T < mg$$. The common trap is writing $$T = ma$$ and forgetting the weight term entirely.\n\nTakeaway: $$ma$$ is the resultant, not the tension. You must include all forces on the left side.", "source": "GLM 5.1 ③", "_id": "glm_3_29"}, {"question": "Why does a wire's resistance R = ρL/A scale linearly with L and inversely with A? Build the intuition from \"resistance as obstacle to flow.\"", "answer": "- Step 1: Resistance is the \"obstacle\" that charge carriers (electrons) face as they drift through the material. More obstacle ⇒ larger R.\n- Step 2: A longer wire (L larger) means more material for the electrons to push through — more scattering events per trip. So R grows with L.\n- Step 3: A bigger cross-sectional area A means more parallel paths for the electrons — more lanes on the highway. The \"obstacle per lane\" decreases, so R decreases as 1/A.\n+ Combine: R ∝ L/A. The constant of proportionality is the resistivity ρ, which is a property of the *material*, not its shape.\n+ Visual: think of a pipe. A longer pipe (bigger L) makes it harder to push water through (bigger R). A fatter pipe (bigger A) makes it easier (smaller R). Water flow is the analogue of current.\n+ This is why the same wire, doubled in length, has double the resistance — and the same wire, doubled in cross-section, has half the resistance.", "source": "MiniMax ②", "_id": "minimax_2_50"}, {"question": "A copper bar conducts heat at rate C. If you double the cross-sectional area (2A) while keeping the length and temperature difference the same, what happens to C? If you then also double the length (2L), what happens to C compared to the original? (2 steps)", "answer": "- Step 1: Doubling A while keeping L and ΔT constant: since $$C \\propto A/L$$, doubling A doubles the numerator while the denominator stays the same. The rate becomes 2C. More area means more thermal pathways.\n- Step 2: Now also doubling L to 2L: the expression becomes $$C' \\propto \\frac{2A \\cdot \\Delta T}{2L} = \\frac{A \\cdot \\Delta T}{L} = C$$. Doubling both A and L leaves the ratio A/L unchanged, so the conduction rate returns to its original value C. The extra area is exactly cancelled by the extra length.\n\nThis is why the formula combines as a ratio: it's the ratio A/L that matters, not A or L individually.", "source": "GLM 5.1 ②", "_id": "glm_2_8"}, {"question": "In a potential divider with two resistors $$R_1$$ and $$R_2$$ in series across a supply voltage $$V$$, what fraction of $$V$$ appears across $$R_1$$, and why?", "answer": "The voltage across $$R_1$$ is $$V_1 = \\frac{R_1}{R_1 + R_2} \\cdot V$$. The reasoning: in a series circuit, the current $$I = V/(R_1 + R_2)$$ is the same through both resistors. The voltage across $$R_1$$ is then $$V_1 = I \\times R_1 = \\frac{V}{R_1 + R_2} \\times R_1 = \\frac{R_1}{R_1 + R_2} \\cdot V$$. The voltage splits **in proportion to the resistances** — the larger resistor gets the larger share of the voltage. If $$R_1 = R_2$$, each gets half; if $$R_1$$ is three times $$R_2$$, $$R_1$$ gets three-quarters.", "source": "GLM 5.1 ③", "_id": "glm_3_19"}, {"question": "In the same circuit, the switch in branch B is now closed, shorting out the lower 30 Ω resistor in that branch. Why does the total current from the battery **increase**, and by how much? (2 steps)", "answer": "- Step 1: Closing the switch puts a piece of **wire** directly across that 30 Ω resistor. Since the wire holds both ends at the same potential, there is now **0 V** across the shorted resistor — all 12 V drops across the remaining 30 Ω in branch B.\n- Step 2: So branch B is now effectively a single 30 Ω across 12 V, giving $$I_B' = 12/30 = 0.4\\,\\text{A}$$. New total = $$0.4 + 0.4 = 0.8\\,\\text{A}$$. The current has risen from 0.6 A to 0.8 A, an **increase of 0.2 A**.\n\nThe intuition: shorting a resistor in a series chain lowers that branch's resistance, so the branch draws more current at the same supply voltage, and the battery has to supply more.", "source": "MiniMax ①", "_id": "minimax_1_16"}, {"question": "If you double the cross-sectional area $$A$$ of a thermally conducting bar, what change to the length $$L$$ would keep the conduction rate $$C$$ unchanged? Explain using the proportionality. (2 steps)", "answer": "- Step 1: The conduction rate depends on the ratio $$A/L$$: $$C \\propto A \\cdot \\Delta T / L$$, so for fixed $$\\Delta T$$, $$C \\propto A/L$$. Doubling $$A$$ (making it $$2A$$) while keeping $$L$$ the same would double $$C$$, because $$2A/L = 2 \\times (A/L)$$.\n- Step 2: To restore the original $$C$$, we need the ratio $$A/L$$ to return to its original value. If $$A$$ is now $$2A$$, we must also make $$L$$ become $$2L$$, so that $$2A / 2L = A/L$$ — the ratio is unchanged, and $$C$$ is unchanged. Doubling both $$A$$ and $$L$$ together preserves the conduction rate.\n\nTakeaway: It's the ratio $$A/L$$ that matters, not either quantity alone.", "source": "GLM 5.1 ③", "_id": "glm_3_10"}, {"question": "Misconception probe: A student says \"Gamma radiation is dangerous, so the CMBR must be dangerous gamma radiation.\" Identify the flaw.", "answer": "- The flaw: the CMBR is called \"microwave background\" precisely because it is *not* gamma radiation anymore. The wavelength has been stretched by cosmic expansion.\n- Step 1: The early universe emitted gamma radiation (very high frequency, very short wavelength).\n- Step 2: Over billions of years, cosmic expansion stretched the wavelength by a factor of about 1000, shifting the photons from the gamma region down into the microwave region.\n- Step 3: Microwave photons have much lower energy per photon than gamma photons. The CMBR is therefore a low-energy background; it is not \"gamma radiation redivivus.\" Individual CMBR photons cannot ionise atoms.\n+ The take-home: the *spectrum* of the radiation is determined by the *current* frequency/wavelength, not by the historical label. What it was emitted as is astrophysics; what it is now is what interacts with you.", "source": "MiniMax ②", "_id": "minimax_2_39"}, {"question": "A 20 kg object has its velocity increase from 0 to 10 m/s over 2 s. A student argues: \"Force = ma, and a = 10/2 = 5 m/s², so the force is 100 N. But wait, the gradient of the v–t graph is also 5, so gradient = force.\" Identify and correct the misconception.", "answer": "- Step 1: The student's calculation is *numerically* right, but the *labels* are mixed up. F = ma gives 20 × 5 = 100 N. The gradient of the v–t graph is a = 5 m/s², not 100 N.\n- Step 2: The gradient of a velocity-time graph is the *acceleration*, not the force. To get force you must multiply the gradient by the mass.\n- Step 3: So the chain is: gradient of v–t = a (in m/s²); then F = m × a, where m = 20 kg, gives F in N.\n+ General rule: the gradient always has the units of (y-axis units) / (x-axis units). For v–t, that's (m/s) / s = m/s², which is acceleration. The force is one multiplication further on.\n+ ESAT trap: students get excited that \"the numbers match\" and assume gradient = force for v–t. It doesn't — only for work–distance does gradient = force directly.", "source": "MiniMax ②", "_id": "minimax_2_18"}, {"question": "You have three formulas for electrical power: $$P = IV$$, $$P = I^2R$$, and $$P = \\frac{V^2}{R}$$. Conceptually, how do you decide which formula to use when analyzing a circuit to find the power dissipated by a specific resistor? (2 steps)", "answer": "- Step 1: Identify the \"fixed\" or \"known\" quantity for that specific component or circuit configuration. The goal is to use the formula that isolates the variable you know is constant, preventing cascading calculation errors when other variables change.\n- Step 2: Apply the rule of thumb based on circuit topology.\n+ In a **series circuit**, the current ($$I$$) is identical through all components. Therefore, use $$P = I^2R$$ to easily compare power dissipation (the resistor with the highest $$R$$ dissipates the most power).\n+ In a **parallel circuit**, the potential difference ($$V$$) is identical across all branches. Therefore, use $$P = \\frac{V^2}{R}$$ to compare power (the resistor with the lowest $$R$$ dissipates the most power).", "source": "Qwen 3 ③", "_id": "qwen_3_6"}, {"question": "A nuclear decay chain reduces a nucleus's mass number by 8 and its proton number by 2. What combination of alpha and beta-minus decays could produce this result? (3 steps)", "answer": "- Step 1: Each alpha decay reduces A by 4 and Z by 2. Each beta-minus decay changes A by 0 and Z by +1. We need to find integers n (alpha) and m (beta) such that: $$-4n = -8$$ and $$-2n + m = -2$$.\n- Step 2: From the first equation: n = 2 (two alpha decays). From the second equation: $$-2(2) + m = -2$$, so $$-4 + m = -2$$, giving m = 2. So we need 2 alpha decays and 2 beta-minus decays.\n- Step 3: Check: 2 alphas give ΔA = −8, ΔZ = −4. 2 betas give ΔA = 0, ΔZ = +2. Net: ΔA = −8, ΔZ = −2. ✓\n\nThis type of algebraic approach is essential for ESAT decay chain questions — set up equations for both A and Z, then solve simultaneously.", "source": "GLM 5.1 ②", "_id": "glm_2_51"}, {"question": "In a potential divider circuit with a $$24\\text{ V}$$ supply, a $$3\\,\\Omega$$ resistor, and a $$5\\,\\Omega$$ resistor in series, a student calculates the current as $$I = \\frac{24}{5} = 4.8\\text{ A}$$. Explain the fundamental circuit error the student made, and provide the correct conceptual framework for finding the voltage across the $$5\\,\\Omega$$ resistor. (3 steps)", "answer": "- Step 1: The error. The student assumed the entire $$24\\text{ V}$$ supply was dropped across the $$5\\,\\Omega$$ resistor alone. This violates Kirchhoff's Second Law, as the $$3\\,\\Omega$$ resistor must also \"spend\" some of the voltage.\n- Step 2: Correct current. The battery \"sees\" the total series resistance. $$R_{total} = 3 + 5 = 8\\,\\Omega$$. The actual current flowing through the entire loop is $$I = \\frac{V_{total}}{R_{total}} = \\frac{24}{8} = 3\\text{ A}$$.\n- Step 3: Correct voltage. The voltage across the $$5\\,\\Omega$$ resistor is the current multiplied by its specific resistance: $$V_5 = I \\times R_5 = 3 \\times 5 = 15\\text{ V}$$. \n+ Alternatively, using the potential divider ratio: it gets $$\\frac{5}{8}$$ of the total $$24\\text{ V}$$, which is $$\\frac{5}{8} \\times 24 = 15\\text{ V}$$.", "source": "Qwen 3 ②", "_id": "qwen_2_17"}, {"question": "Synthesis: A 12 V supply is connected to a circuit with three parallel branches. Branch A has a single 6 Ω resistor, branch B has a single 12 Ω resistor, and branch C has a single 24 Ω resistor. What is the total current from the supply, and what fraction of it flows in branch A?", "answer": "- Step 1: Each branch is across the full 12 V. I_A = 12/6 = 2 A. I_B = 12/12 = 1 A. I_C = 12/24 = 0.5 A.\n- Step 2: Total I = 2 + 1 + 0.5 = 3.5 A.\n- Step 3: Fraction in A = I_A/I_total = 2/3.5 = 4/7 ≈ 0.57.\n+ Key principle: in parallel, current is *inversely* proportional to resistance. The branch with the *smallest* resistance carries the *largest* current.\n+ ESAT use: this lets you rank branch currents without calculating them all, just from the resistances.\n+ Sanity check: bigger current means more charge per second, which means more charge carriers per second — that happens in the path of least resistance. The supply \"wants\" to drive current through the easiest path.", "source": "MiniMax ②", "_id": "minimax_2_45"}, {"question": "In a potential divider with two resistors $$R_1$$ and $$R_2$$ in series across a supply $$V$$, the voltage across $$R_1$$ is given by $$V_1 = \\dfrac{R_1}{R_1 + R_2} \\cdot V$$. Why does the larger resistor get the larger share of the voltage? (2 steps)", "answer": "- Step 1: The same current $$I$$ flows through both resistors (it's a series loop). The voltage drop across each is $$V_i = IR_i$$.\n- Step 2: So the voltages are in the *same ratio* as the resistances: $$V_1 : V_2 = IR_1 : IR_2 = R_1 : R_2$$. The bigger resistor \"spends\" more of the supply's volts, because the current has to \"push\" through more resistance there.\n\nA common intuition check: in the limit $$R_2 \\to 0$$, all of $$V$$ drops across $$R_1$$ ($$V_1 \\to V$$). In the limit $$R_2 \\to \\infty$$, the second resistor is essentially a break, no current flows, and the full supply appears across the open circuit — none across $$R_1$$.", "source": "MiniMax ①", "_id": "minimax_1_13"}, {"question": "A star's temperature stays the same but its radius doubles. By what factor does the luminosity change? What if instead the temperature doubles at fixed radius?", "answer": "- Step 1: Temperature fixed, radius doubled: L'/L = (2)² × 1⁴ = 4. L quadruples.\n- Step 2: Radius fixed, temperature doubled: L'/L = 1² × (2)⁴ = 16. L increases 16-fold.\n+ Takeaway: temperature has a much stronger leverage on luminosity than radius. A modest temperature increase can swamp a large radius change.\n+ General rule: every doubling of T multiplies L by 16. Every doubling of r multiplies L by 4. So T acts like four doublings stacked on top of one.", "source": "MiniMax ②", "_id": "minimax_2_31"}, {"question": "Why is gamma emission usually drawn in a decay chain but is sometimes omitted from the (A, Z) bookkeeping? Why does it still matter?", "answer": "- Step 1: Gamma emission is ⁰₀γ, so ΔA = 0 and ΔZ = 0. In a decay chain we usually only track changes in (A, Z), so gamma does not change the bookkeeping.\n- Step 2: But gamma emission matters because it carries away energy. The daughter nucleus is in a *lower* energy (more stable) state after the gamma is emitted.\n- Step 3: So in a decay chain, we still include the gamma as a \"step\" but it doesn't move us to a new (A, Z) point. It's a \"vertical\" transition in the energy diagram, not a \"horizontal\" one in the (A, Z) plane.\n+ ESAT use: when asked \"what is emitted in the next step of this chain?\", gamma is often the answer for the \"settling\" step that follows an alpha or beta emission. The nucleus was left in an excited state by the previous decay; the gamma is what brings it back down.\n+ Common confusion: students sometimes think \"no particle\" is emitted in the gamma step. There is — a high-energy photon, even though it carries no charge or nucleons.", "source": "MiniMax ②", "_id": "minimax_2_52"}, {"question": "Why is the CMBR considered *direct* evidence for the Big Bang rather than just compatible with it?", "answer": "- Step 1: A theory can be consistent with many observations but not directly proven by all of them. For the Big Bang, the *prediction* was that if the universe really did begin in a hot, dense state and has been expanding ever since, then the original light from that early fireball should still be travelling through space today, hugely redshifted.\n- Step 2: This relic light was predicted before it was detected. In 1965 Penzias and Wilson actually found a uniform microwave \"hiss\" coming from every direction in the sky, with a near-perfect blackbody spectrum at about 2.7 K.\n- Step 3: The detection matched the prediction in detail — the spectrum, the uniformity, and the temperature all lined up. Few cosmological predictions come with that level of specificity, so the CMBR is widely regarded as a \"smoking gun\": an imprint of the Big Bang that no other mainstream theory naturally reproduces.\n+ Key contrast: the expansion of the universe (Hubble) is also evidence for the Big Bang, but it's compatible with some non-Big-Bang cosmologies (e.g., tired-light models). The CMBR's blackbody spectrum and uniformity are much harder to mimic without a hot, dense origin.", "source": "MiniMax ②", "_id": "minimax_2_2"}, {"question": "Misconception probe: A 5 kg mass is lifted upward at $$a = 0.8$$ m/s² (with $$g = 10$$ m/s²). A student says the rope tension must be 50 N (just the weight). Why is this wrong, and what is the correct tension?", "answer": "If the tension were only 50 N (equal to weight $$mg = 5 \\times 10 = 50$$ N), the resultant force would be $$T - mg = 50 - 50 = 0$$ N, giving $$a = 0$$ — the mass would be in equilibrium, not accelerating upward. Since the mass *is* accelerating upward at 0.8 m/s², there must be a net upward force of $$ma = 5 \\times 0.8 = 4$$ N. The tension must therefore be $$T = mg + ma = 50 + 4 = 54$$ N. The 4 N extra beyond the weight is what provides the upward acceleration. The student's error: confusing the applied force (tension) with the resultant force ($$ma$$).", "source": "GLM 5.1 ③", "_id": "glm_3_31"}, {"question": "Why does luminosity depend on the fourth power of temperature ($$T^4$$) rather than just linearly on T? What would happen to luminosity if you doubled the temperature of a star with the same radius? (2 steps)", "answer": "- Step 1: The Stefan-Boltzmann law arises from thermal radiation theory: each unit area of a black body surface radiates power proportional to $$T^4$$. This fourth-power dependence comes from integrating the Planck radiation spectrum over all wavelengths — it is a fundamental result of quantum physics, not an arbitrary choice. Hotter surfaces emit dramatically more radiation per unit area.\n- Step 2: If you double the temperature (T → 2T) while keeping the radius the same: $$L_{new}/L_{old} = (2T)^4/T^4 = 2^4 = 16$$. The luminosity increases by a factor of 16, not 2. This dramatic sensitivity to temperature is why even modest temperature differences between stars produce enormous luminosity differences.\n\nA small temperature increase causes a huge luminosity increase — this is why hot blue stars are vastly more luminous than cool red stars of the same size.", "source": "GLM 5.1 ②", "_id": "glm_2_24"}, {"question": "In a transverse wave, does an individual particle of the medium travel horizontally with the wave shape? Describe what the particle actually does.", "answer": "No — each particle **only oscillates vertically** (up and down) about its equilibrium position. It does not travel horizontally with the wave. The wave *shape* (the pattern of crests and troughs) moves horizontally, but the particles themselves just bob up and down. Think of a crowd doing a \"wave\" in a stadium: each person stands up and sits down in place; the pattern of standing moves around the stadium, but no person actually walks around it. The distinction is crucial: wave speed ≠ particle speed. The wave propagates; the particles oscillate.", "source": "GLM 5.1 ③", "_id": "glm_3_26"}, {"question": "Why is speed particularly important for the ESAT compared to typical A-Level physics exams?", "answer": "The ESAT is a **multiple-choice, timed admissions test** — you must answer many questions in limited time with no partial credit. A-Level exams reward thorough written explanations and method marks even if you make arithmetic errors. The ESAT rewards only the correct final option, chosen quickly. This means you need **automaticity**: the method must be instinctive, not something you figure out from scratch each time. Mental-arithmetic shortcuts (e.g., recognising $$5/8$$ as a ratio, computing $$10^4/16 = 625$$ without a calculator, knowing which power formula to use instantly) are essential. Speed comes from practiced pattern recognition, not from rushing — you must already *know* the path before you see the question.", "source": "GLM 5.1 ③", "_id": "glm_3_37"}, {"question": "Misconception probe: If you increase the absolute temperature of *both* ends of an insulated metal bar by the exact same amount (e.g., adding 50 K to both the hot and cold ends), how does the rate of thermal conduction change, and why? (2 steps)", "answer": "- Step 1: The rate of thermal conduction does not change; it remains exactly the same.\n- Step 2: The driving force for thermal conduction is the temperature *difference* ($$\\Delta T = T_{hot} - T_{cold}$$), not the absolute temperatures. If you add 50 K to both ends, the new difference is $$(T_{hot} + 50) - (T_{cold} + 50) = T_{hot} - T_{cold}$$. Since $$\\Delta T$$ is unchanged, the rate of conduction is unchanged.", "source": "Qwen 3 ①", "_id": "qwen_1_8"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "What is the Cosmic Microwave Background Radiation (CMBR), and what major cosmological event does it serve as direct evidence for?", "answer": "The CMBR is the relic gamma radiation from the hot, dense early universe. As the universe expanded over billions of years, this high-energy radiation was stretched (redshifted) into the microwave region of the electromagnetic spectrum. It serves as direct evidence for the Big Bang because it is the faded \"afterglow\" of the universe's hot origin.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "As the universe expands, the wavelength of the relic radiation from the early universe increases. Using the wave speed equation, explain why this expansion causes the frequency of the radiation to decrease. (2 steps)", "answer": "- Step 1: For electromagnetic radiation travelling through a vacuum, the wave speed equation is $$c = f\\lambda$$, where $$c$$ is the constant speed of light.\n- Step 2: Since $$c$$ is a universal constant, the equation can be rearranged to $$f = \\frac{c}{\\lambda}$$. If cosmic expansion physically stretches the wave, increasing its wavelength $$\\lambda$$, the frequency $$f$$ must decrease proportionally to keep $$c$$ constant.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "A student claims that the CMBR has shifted from gamma rays to microwaves because the expansion of the universe slowed the light down. Why is this incorrect? (2 steps)", "answer": "- Step 1: The speed of light $$c$$ in a vacuum is a universal constant and does not change due to the expansion of the universe.\n- Step 2: The shift is caused by the literal stretching of space itself, which stretches the wavelength $$\\lambda$$ of the photon. Because $$c = f\\lambda$$ must remain constant, an increase in $$\\lambda$$ forces a decrease in $$f$$, changing the wave's classification from gamma to microwave without altering its speed.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "What are the mass number (A) and proton number (Z) of an alpha particle, and by how much do A and Z of a parent nucleus change when it emits an alpha particle? (2 steps)", "answer": "- Step 1: An alpha particle is a helium-4 nucleus, denoted as $$^4_2\\text{He}$$. It has a mass number $$A = 4$$ and a proton number $$Z = 2$$.\n- Step 2: When a nucleus emits an alpha particle, it loses 4 nucleons and 2 protons. Therefore, the mass number decreases by 4 ($$\\Delta A = -4$$) and the proton number decreases by 2 ($$\\Delta Z = -2$$).", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "What particle is emitted in beta-minus decay, and what are the changes to the mass number (A) and proton number (Z) of the decaying nucleus? (2 steps)", "answer": "- Step 1: A beta-minus particle is a fast-moving electron, denoted as $$^0_{-1}\\text{e}$$. It has negligible mass ($$A = 0$$) and a charge equivalent to -1 ($$Z = -1$$).\n- Step 2: Because a neutron converts into a proton and an electron during beta-minus decay, the mass number remains unchanged ($$\\Delta A = 0$$), but the proton number increases by 1 ($$\\Delta Z = +1$$).", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "A radioactive nucleus undergoes decay to produce a daughter nucleus with a mass number 4 less, but the exact same proton number. What combination of alpha and beta-minus decays could achieve this? (3 steps)", "answer": "- Step 1: An alpha decay reduces the mass number by 4 and the proton number by 2 ($$\\Delta A = -4, \\Delta Z = -2$$). This matches the mass number requirement but leaves the proton number too low.\n- Step 2: A beta-minus decay leaves the mass number unchanged but increases the proton number by 1 ($$\\Delta A = 0, \\Delta Z = +1$$).\n- Step 3: To restore the proton number while keeping the mass number reduced by 4, we need two beta-minus decays ($$\\Delta Z = +2$$). Thus, 1 alpha decay followed by 2 beta-minus decays yields $$\\Delta A = -4$$ and $$\\Delta Z = 0$$.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": true}, {"question": "To reduce the mass number by 4 and keep the proton number unchanged, why can't we simply emit 3 beta-minus particles instead of 1 alpha and 2 beta particles? (2 steps)", "answer": "- Step 1: A beta-minus particle has $$A = 0$$. Emitting any number of beta particles will not change the mass number at all, so it cannot achieve the required $$\\Delta A = -4$$.\n- Step 2: Furthermore, 3 beta-minus decays would increase the proton number by 3 ($$\\Delta Z = +3$$), which violates the requirement that the proton number must remain unchanged.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "The rate of thermal conduction $$C$$ through an insulated bar is proportional to the cross-sectional area $$A$$ and the temperature difference $$\\Delta T$$, and inversely proportional to its length $$L$$. Write the proportionality and explain why $$\\Delta T$$ must be in the numerator. (2 steps)", "answer": "- Step 1: The proportionality is $$C \\propto \\frac{A \\cdot \\Delta T}{L}$$.\n- Step 2: $$\\Delta T$$ is the driving force for heat flow. If both ends of the bar are at the same temperature ($$\\Delta T = 0$$), there is no net energy transfer from one end to the other. A larger temperature difference means a steeper \"energy gradient,\" causing a faster rate of conduction.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "If both ends of a conducting bar are simultaneously heated so that each temperature increases by exactly 15 K, what happens to the rate of thermal conduction through the bar, and why? (2 steps)", "answer": "- Step 1: The rate of conduction depends on the temperature difference: $$C \\propto \\Delta T = T_1 - T_2$$.\n- Step 2: If both temperatures increase by the same amount (15 K), the difference $$\\Delta T$$ between them remains exactly the same. Therefore, the rate of conduction $$C$$ is unchanged.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "A bar conducts heat at a certain rate. If the cross-sectional area of the bar is doubled, what must be done to the length of the bar to keep the rate of conduction the same? (2 steps)", "answer": "- Step 1: The rate of conduction is proportional to the ratio of area to length: $$C \\propto \\frac{A}{L}$$.\n- Step 2: If the area $$A$$ is doubled, the ratio $$\\frac{A}{L}$$ would double, causing $$C$$ to double. To keep $$C$$ constant, the length $$L$$ must also be doubled so that the ratio $$\\frac{2A}{2L} = \\frac{A}{L}$$ remains unchanged.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "For a linear graph of Work versus Distance, what physical quantity does the gradient represent? (2 steps)", "answer": "- Step 1: The equation for work done by a constant force is $$W = Fd$$, where $$W$$ is on the y-axis and $$d$$ is on the x-axis.\n- Step 2: Rearranging gives $$W = F \\cdot d$$, which is in the form $$y = mx$$. Therefore, the gradient of a Work-Distance graph equals the force $$F$$ applied in the direction of motion.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "Why is a graph of Kinetic Energy ($$E_k$$) versus Velocity ($$v$$) a parabola rather than a straight line? (2 steps)", "answer": "- Step 1: The equation for kinetic energy is $$E_k = \\frac{1}{2}mv^2$$.\n- Step 2: Because $$E_k$$ is proportional to the square of velocity ($$v^2$$), the relationship is quadratic, not linear. This produces a parabolic curve, meaning the gradient is not constant—it increases as velocity increases.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "What physical quantity is represented by the gradient of a Velocity versus Time graph? (2 steps)", "answer": "- Step 1: The kinematic equation for constant acceleration is $$v = u + at$$, where $$v$$ is on the y-axis and $$t$$ is on the x-axis.\n- Step 2: This is in the form $$y = mx + c$$, where the gradient $$m$$ corresponds to the acceleration $$a$$, and the y-intercept $$c$$ corresponds to the initial velocity $$u$$.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "Ohm's Law allows us to substitute $$V = IR$$ into $$P = IV$$ to create two alternative power equations. State these two equations and the condition under which each is most useful. (3 steps)", "answer": "- Step 1: Substituting $$V = IR$$ into $$P = IV$$ gives $$P = I(IR) = I^2R$$. This form is best when the current $$I$$ through the resistor is the fixed or known quantity.\n- Step 2: Substituting $$I = V/R$$ into $$P = IV$$ gives $$P = V(V/R) = V^2/R$$. This form is best when the voltage $$V$$ across the resistor is the fixed or known quantity.\n- Step 3: Strategy: Always choose the power form that isolates the quantity you already know is constant in the circuit to avoid unnecessary calculations.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "A fixed resistor is in series with a variable resistor across a constant voltage supply. To maximise the power dissipated in the fixed resistor, should the variable resistor be set to its minimum or maximum value, and why? (3 steps)", "answer": "- Step 1: Power in the fixed resistor is given by $$P = I^2R_{fixed}$$. Since $$R_{fixed}$$ cannot change, maximising $$P$$ requires maximising the current $$I$$.\n- Step 2: The current from the supply is $$I = \\frac{V_{supply}}{R_{total}}$$. To maximise $$I$$, we must minimise the total resistance $$R_{total}$$.\n- Step 3: Since $$R_{total} = R_{fixed} + R_{variable}$$, we must minimise $$R_{variable}$$ by setting it to its minimum value. This allows the maximum possible current to flow through the circuit.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "A 24 V supply is connected to a 5 Ω fixed resistor and a 3 Ω variable resistor in series. A student calculates the current as $$I = 24/5 = 4.8$$ A to find the power in the 5 Ω resistor. Why is this incorrect, and what is the correct method? (3 steps)", "answer": "- Step 1: The student incorrectly assumed that the full 24 V drops across the 5 Ω resistor alone. In a series circuit, the supply voltage splits proportionally across all components based on their resistance.\n- Step 2: The current must be calculated using the total series resistance: $$I = \\frac{V_{supply}}{R_{total}} = \\frac{24}{5 + 3} = 3$$ A.\n- Step 3: Using the correct current, the power in the 5 Ω resistor is $$P = I^2R = 3^2 \\times 5 = 45$$ W. (Alternatively, the 5 Ω resistor gets $$\\frac{5}{8}$$ of the voltage: $$V = 15$$ V, so $$P = \\frac{15^2}{5} = 45$$ W).", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "In an ideal circuit, points connected only by a wire (with no components between them) are at the same electrical potential. Why can't there be a potential difference between two points joined by an ideal wire? (2 steps)", "answer": "- Step 1: A potential difference would create an electric field along the wire, exerting a force on the mobile electrons and causing them to accelerate.\n- Step 2: Because the wire is an ideal conductor, electrons redistribute almost instantaneously to cancel out this internal electric field. Equilibrium is reached where there is no net potential difference across an ideal wire; voltage drops only appear across components (like resistors) that resist the flow of charge.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "A 12 V battery connects to two parallel branches. Branch A has a single 30 Ω resistor. Branch B has two 30 Ω resistors in series. If a switch is closed to short-circuit one of the resistors in Branch B, what happens to the total current drawn from the battery? (3 steps)", "answer": "- Step 1: Initially, Branch B has 60 Ω total resistance, drawing $$I_B = 12/60 = 0.2$$ A. Branch A draws $$I_A = 12/30 = 0.4$$ A. Total current is 0.6 A.\n- Step 2: Shorting one resistor in Branch B means the current bypasses it entirely. Branch B now only has one 30 Ω resistor across the full 12 V.\n- Step 3: Branch B's current rises to $$I_B' = 12/30 = 0.4$$ A. Branch A is unaffected. The new total current is $$0.4 + 0.4 = 0.8$$ A, an increase of 0.2 A.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "State Kirchhoff's two laws for electrical circuits, explaining the physical principle each is based upon. (2 steps)", "answer": "- Step 1: Kirchhoff's First Law states that the sum of currents entering a junction equals the sum of currents leaving it ($$\\Sigma I_{in} = \\Sigma I_{out}$$). This is based on the conservation of charge; charge cannot accumulate or disappear at a junction.\n- Step 2: Kirchhoff's Second Law states that the sum of EMFs around any closed loop equals the sum of the potential drops across the components in that loop ($$\\Sigma \\text{EMF} = \\Sigma IR$$). This is based on the conservation of energy; the total energy supplied per unit charge (EMF) must equal the total energy dissipated per unit charge in one complete loop.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "The luminosity of a star scales as $$L \\propto r^2 T^4$$, where $$r$$ is the radius and $$T$$ is the surface temperature. If a star's radius is multiplied by 100 and its temperature is halved, by what factor does its luminosity change? (3 steps)", "answer": "- Step 1: Identify the scaling factors. The radius factor $$k_r = 100$$, and the temperature factor $$k_T = 1/2$$.\n- Step 2: Substitute these into the scaling law: the new luminosity $$L' \\propto (k_r)^2 (k_T)^4 = (100)^2 \\times (1/2)^4$$.\n- Step 3: Calculate the factor: $$10000 \\times \\frac{1}{16} = \\frac{10000}{16}$$. Since $$16 \\times 6 = 96$$, and $$16 \\times 0.25 = 4$$, the factor is $$625$$. The luminosity is multiplied by 625.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "In a transverse wave, does an individual particle of the medium travel horizontally with the wave? Describe the actual path of one particle over one complete cycle. (2 steps)", "answer": "- Step 1: No, the particle does not travel with the wave. The wave transfers energy horizontally, but the particles only oscillate locally about their rest positions.\n- Step 2: Over one complete cycle, a particle moves from its rest position to maximum positive displacement (1 amplitude), down to maximum negative displacement (2 amplitudes), and back to rest (1 amplitude). The total distance travelled in one cycle is 4 times the amplitude ($$4A$$).", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "A wave has an amplitude of 3 cm and a frequency of 5 Hz. How far does a single particle in the medium travel in one minute? (3 steps)", "answer": "- Step 1: In one cycle, the particle travels a distance of $$4A$$. Here, $$4 \\times 3 = 12$$ cm per cycle.\n- Step 2: The frequency is 5 Hz, meaning 5 cycles per second. In one minute (60 seconds), the number of cycles is $$5 \\times 60 = 300$$ cycles.\n- Step 3: Total distance is the distance per cycle multiplied by the number of cycles: $$12 \\text{ cm} \\times 300 = 3600 \\text{ cm}$$ (or 36 m).", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "A 5 kg mass is being lifted vertically upwards by a rope with an acceleration of 0.8 m/s². A student calculates the tension as simply $$T = mg = 50$$ N. Why is this incorrect? (2 steps)", "answer": "- Step 1: Newton's Second Law states that the resultant (net) force equals mass times acceleration ($$F_{res} = ma$$), not just the applied force. The tension must overcome weight AND provide the upward acceleration.\n- Step 2: If $$T = 50$$ N, the upward force would exactly balance the 50 N weight, making the resultant force zero and the acceleration zero. To accelerate upwards at 0.8 m/s², the tension must be greater than the weight.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "A 5 kg mass is lifted upwards at 0.8 m/s² (with $$g = 10$$ m/s²). Calculate the tension in the rope and explain the steps. (3 steps)", "answer": "- Step 1: Identify the forces. Weight acts downwards: $$W = mg = 5 \\times 10 = 50$$ N. Tension $$T$$ acts upwards. The resultant force is $$T - W$$.\n- Step 2: Apply Newton's Second Law: $$T - mg = ma$$. So, $$T - 50 = 5 \\times 0.8 = 4$$ N.\n- Step 3: Solve for T: $$T = 50 + 4 = 54$$ N. The tension must be 54 N to provide the 4 N upward resultant force while supporting the 50 N weight.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "A motor lifts a mass over a pulley. The tension in the rope is $$T$$. Why is the downward force on the pulley's coupling axle equal to $$2T$$, rather than just $$T$$? (2 steps)", "answer": "- Step 1: The pulley redirects the rope. One side of the rope pulls down on the pulley with tension $$T$$ (due to the motor pulling upwards on the rope), and the other side pulls down with tension $$T$$ (due to the weight of the hanging mass).\n- Step 2: The pulley axle must support both of these downward pulls. Since the tension is the same throughout an ideal rope, the total downward force on the axle is the sum of the two tensions: $$T + T = 2T$$.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "When balancing a nuclear equation, what two quantities must be conserved on both sides of the equation? (2 steps)", "answer": "- Step 1: The total nucleon (mass) number $$A$$ must be conserved. The sum of the top numbers on the left must equal the sum of the top numbers on the right.\n- Step 2: The total proton (atomic) number $$Z$$ must be conserved. The sum of the bottom numbers on the left must equal the sum of the bottom numbers on the right. This ensures conservation of baryon number and conservation of charge.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "What is the shape of a Gravitational Potential Energy ($$E_p$$) versus Height ($$h$$) graph, and what does its gradient represent? (2 steps)", "answer": "- Step 1: The equation is $$E_p = mgh$$. Since $$m$$ and $$g$$ are constants, this is a linear relationship of the form $$y = mx$$, producing a straight line through the origin.\n- Step 2: Comparing $$E_p = (mg)h$$ to $$y = mx$$, the gradient $$m$$ corresponds to $$mg$$ (the weight of the object).", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "The rate of thermal conduction $$C \\propto A \\cdot \\Delta T / L$$ is often compared to electrical conduction. What electrical quantity is analogous to the temperature difference $$\\Delta T$$, and what is analogous to the rate of heat flow $$C$$? (2 steps)", "answer": "- Step 1: The temperature difference $$\\Delta T$$ is the \"driving force\" that causes heat to flow. In an electrical circuit, the potential difference (voltage) $$V$$ is the driving force that causes charge to flow. So, $$\\Delta T$$ is analogous to $$V$$.\n- Step 2: The rate of heat flow $$C$$ (energy per second, measured in Watts) is analogous to the electrical power $$P$$ dissipated, or conceptually to the electrical current $$I$$ (charge per second), since both represent a flow rate driven by a difference across a resistance.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}], "count": 28}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "The Cosmic Microwave Background Radiation (CMBR) is considered direct evidence of the Big Bang. What physical process transformed high-frequency gamma radiation into low-frequency microwave radiation, and what fundamental constant governs this transformation? (3 steps)", "answer": "- Step 1: The universe has been expanding since the Big Bang (discovered in the 1920s). This expansion stretches the fabric of space itself, and electromagnetic waves travelling through space get stretched along with it.\n- Step 2: Gamma radiation has short wavelength and high frequency. As space expands, the wavelength λ of this radiation increases — the wave is physically stretched. Using $$c = f\\lambda$$, where $$c$$ (the speed of light) is constant, if λ increases then $$f = c/\\lambda$$ must decrease.\n- Step 3: The fundamental constant governing this is the speed of light $$c$$. Because $$c$$ is fixed, the relationship between frequency and wavelength is locked: stretching λ forces f down proportionally. Gamma (short λ, high f) → microwave (long λ, low f).\n\nThe CMBR is relic radiation from the hot early universe, redshifted by cosmic expansion — not a new emission, but ancient light stretched over billions of years.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "If the wavelength of the CMBR radiation has been stretched by a factor of roughly 1000 since emission, what happened to its frequency, and why can't the frequency stay the same while only the wavelength changes? (2 steps)", "answer": "- Step 1: Since $$c = f\\lambda$$ and $$c$$ is constant, if λ increases by a factor of 1000, then f must decrease by a factor of 1000. The frequency and wavelength are inversely proportional when the wave speed is fixed.\n- Step 2: You cannot change only the wavelength while keeping frequency constant, because that would require changing the wave speed: $$c = f\\lambda$$. If f stayed the same and λ increased 1000×, then c would need to be 1000× larger — but c is a universal constant. The constraint that c is fixed is what forces frequency and wavelength to move in opposite directions.\n\nThis is why cosmological redshift is sometimes called \"stretching\" — space stretches the wave, and the frequency must compensate downward.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": true}, {"question": "An alpha particle is emitted from a nucleus with nucleon number A and proton number Z. What are the symbol, mass number, and proton number of an alpha particle, and exactly how do A and Z change? (2 steps)", "answer": "- Step 1: An alpha particle is a helium-4 nucleus, written as $$^{4}_{2}\\text{He}$$. It has mass number (nucleon number) A = 4 and proton number (atomic number) Z = 2.\n- Step 2: When a nucleus emits an alpha particle, it loses 4 nucleons and 2 protons. So the daughter nucleus has $$\\Delta A = -4$$ and $$\\Delta Z = -2$$. For example, if the parent is $$^{238}_{92}\\text{U}$$, the daughter becomes $$^{234}_{90}\\text{Th}$$.\n\nThink of it as the nucleus literally ejecting a tightly-bound cluster of 2 protons and 2 neutrons — that's what an alpha particle is.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "A beta-minus particle is emitted from a nucleus. What is the symbol and composition of a beta-minus particle, and how do the nucleon number A and proton number Z of the parent nucleus change? (2 steps)", "answer": "- Step 1: A beta-minus particle is a fast-moving electron, written as $$^{0}_{-1}e$$. It has effectively zero mass (compared to a nucleon) and carries a charge of −1, hence Z = −1 in nuclear equation notation.\n- Step 2: Emission changes the parent nucleus by $$\\Delta A = 0$$ (no nucleons are lost — a neutron converts into a proton plus an electron) and $$\\Delta Z = +1$$ (the proton count increases by one, because a neutron became a proton). The nucleon number is conserved because the electron carries away zero nucleon number.\n\nThe key insight: beta-minus decay is a neutron splitting into a proton and an electron inside the nucleus. The total charge is conserved (0 → +1 + (−1) = 0).", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "A nucleus undergoes one alpha decay followed by two beta-minus decays. The net effect on the nucleon number A and proton number Z is what, and why does this specific combination produce that result? (3 steps)", "answer": "- Step 1: One alpha decay changes the nucleus by $$\\Delta A = -4$$ and $$\\Delta Z = -2$$. The nucleus loses 4 nucleons (2 protons + 2 neutrons).\n- Step 2: Two beta-minus decays each change by $$\\Delta A = 0$$ and $$\\Delta Z = +1$$. Combined, they give $$\\Delta A = 0$$ and $$\\Delta Z = +2$$.\n- Step 3: Net effect: $$\\Delta A = -4 + 0 = -4$$ and $$\\Delta Z = -2 + 2 = 0$$. So the mass number drops by 4, but the proton number returns to its original value. This \"α + 2β\" pattern is a favourite ESAT question because it looks like the element hasn't changed (same Z), but the isotope has (A decreased by 4).\n\nThe element identity depends on Z, so the daughter nucleus is the same element as the parent — but a different isotope, 4 nucleons lighter.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "Why can't three beta-minus decays (and no alpha decay) reduce the nucleon number by 4 while keeping the proton number unchanged? What would actually happen? (2 steps)", "answer": "- Step 1: Each beta-minus decay gives $$\\Delta A = 0$$ and $$\\Delta Z = +1$$. Three beta-minus decays would give $$\\Delta A = 0$$ (not −4) and $$\\Delta Z = +3$$ (not 0). The nucleon number doesn't decrease at all, and the proton number increases by 3.\n- Step 2: Beta-minus decay converts neutrons to protons — it never reduces the nucleon number. Only alpha decay reduces A. To decrease A by 4, you must have at least one alpha emission. To then restore Z to its original value after that alpha (which lowered Z by 2), you need exactly two beta-minus decays (each raising Z by 1).\n\nThis is a common trap: students see \"Z unchanged\" and reach for beta decays alone, forgetting that betas cannot change A.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "In a nuclear equation, what two conservation rules must be satisfied, and what is a quick way to check whether a proposed equation is valid? (2 steps)", "answer": "- Step 1: The two conservation rules are: (1) total nucleon number (mass number A) must balance on both sides, and (2) total proton number (atomic number Z) must balance on both sides. These are conservation of nucleon count and conservation of charge, respectively.\n- Step 2: To check a proposed equation, sum all the top numbers (A) on the left and compare with the sum on the right; then do the same for all the bottom numbers (Z). If both sums match, the equation is valid. If either sum fails, reject it. For example, if the left side has total A = 236 and Z = 92, the right side must also total A = 236 and Z = 92.\n\nMisconception: you cannot check just one of them. A proposed equation might balance A but fail on Z (or vice versa). Both must be verified independently.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "The rate of thermal conduction through a bar is given by $$C \\propto \\frac{A \\cdot \\Delta T}{L}$$. Why is the conduction rate proportional to the cross-sectional area A, and why is it inversely proportional to the length L? (3 steps)", "answer": "- Step 1: Think of area A as \"how many parallel pathways are available.\" A thicker bar has more cross-sectional area, meaning more atoms are available to pass vibrational energy along simultaneously. Double the area → double the pathways → double the conduction rate. So $$C \\propto A$$.\n- Step 2: Think of length L as \"how far the energy must travel.\" A longer bar means each unit of thermal energy must be passed through more atomic layers to get from the hot end to the cold end. Each layer introduces resistance. Double the length → double the resistance → half the rate. So $$C \\propto 1/L$$.\n- Step 3: The temperature difference $$\\Delta T = T_1 - T_2$$ is the driving force. If $$\\Delta T = 0$$, there's no reason for heat to flow — both ends are at the same temperature and the system is in thermal equilibrium. Larger ΔT means a steeper \"thermal push,\" so $$C \\propto \\Delta T$$.\n\nThe analogy to electrical conduction is direct: more area = more parallel wires (higher current), longer wire = more resistance (lower current), and voltage difference = driving force (like ΔT).", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "A copper bar conducts heat at rate C. If you double the cross-sectional area (2A) while keeping the length and temperature difference the same, what happens to C? If you then also double the length (2L), what happens to C compared to the original? (2 steps)", "answer": "- Step 1: Doubling A while keeping L and ΔT constant: since $$C \\propto A/L$$, doubling A doubles the numerator while the denominator stays the same. The rate becomes 2C. More area means more thermal pathways.\n- Step 2: Now also doubling L to 2L: the expression becomes $$C' \\propto \\frac{2A \\cdot \\Delta T}{2L} = \\frac{A \\cdot \\Delta T}{L} = C$$. Doubling both A and L leaves the ratio A/L unchanged, so the conduction rate returns to its original value C. The extra area is exactly cancelled by the extra length.\n\nThis is why the formula combines as a ratio: it's the ratio A/L that matters, not A or L individually.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": true}, {"question": "Both ends of an insulated conducting bar are heated so that each temperature increases by 15 K. What happens to the rate of thermal conduction, and why? (2 steps)", "answer": "- Step 1: The conduction rate depends on the temperature difference $$\\Delta T = T_1 - T_2$$. If both temperatures rise by the same 15 K, then $$T_1' = T_1 + 15$$ and $$T_2' = T_2 + 15$$, so $$\\Delta T' = (T_1 + 15) - (T_2 + 15) = T_1 - T_2 = \\Delta T$$.\n- Step 2: The temperature difference is unchanged, so the conduction rate C is unchanged. What matters is not the absolute temperatures but the difference between them. Raising both equally is like raising both sides of a hill by the same amount — the slope (which drives the flow) hasn't changed.\n\nEdge case: if you raised only one end, ΔT would change, and C would change proportionally.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": true}, {"question": "On a velocity–time graph, what does the gradient represent physically, and why is this different from what the gradient of a kinetic energy–velocity graph represents? (3 steps)", "answer": "- Step 1: On a velocity–time graph, the relationship is $$v = u + at$$, which is linear (for constant acceleration). The gradient is $$\\Delta v / \\Delta t = a$$, the acceleration. A steeper slope means greater acceleration.\n- Step 2: On a kinetic energy–velocity graph, the relationship is $$E_k = \\frac{1}{2}mv^2$$. This is quadratic (a parabola), not linear. The gradient at any point is $$dE_k/dv = mv$$, which depends on v itself — it is not a constant.\n- Step 3: The key distinction: a linear graph has a constant gradient that represents a single physical quantity (like acceleration or force). A quadratic graph has a varying gradient, so you cannot read off \"the gradient\" as one number — it changes depending on where you are on the curve. Confusing KE vs velocity as linear is a common error; it is always parabolic.\n\nTakeaway: if the equation relating y and x is of the form $$y = kx^2$$, the graph is a parabola, and \"the gradient\" is not a single value.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "On a work–distance graph ($$W$$ vs $$d$$), what does the gradient represent, and how can you verify this from the equation? What about the gradient of a GPE–height graph? (2 steps)", "answer": "- Step 1: For a work–distance graph, the equation is $$W = Fd$$ (for a constant force in the direction of motion). This is of the form $$y = mx$$ where y = W, x = d, and the gradient m = F. So the gradient of a W vs d graph is the force. For example, a gradient of 5 N/distance-unit means the force is 5 N.\n- Step 2: For a GPE–height graph, the equation is $$E_p = mgh$$. This is also linear: $$y = (mg) \\cdot h$$, so the gradient is mg (the weight). If m = 2 kg and g = 10 m/s², the gradient would be 20 N. A steeper gradient means a heavier object or stronger gravitational field.\n\nBoth are linear relationships, so both have constant gradients that carry clear physical meaning.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": true}, {"question": "A graph shows a straight line through the origin with gradient 5 on axes labelled \"work done (J)\" vs \"distance (m)\". An object of mass 20 kg is being accelerated, and another graph shows velocity vs time with gradient 5 m/s². Are these two graphs consistent with each other? (3 steps)", "answer": "- Step 1: From the work–distance graph, gradient = force, so F = 5 N. The work done over 2 m would be W = Fd = 5 × 2 = 10 J, which matches a data point (2, 10).\n- Step 2: From the velocity–time graph, gradient = acceleration, so a = 5 m/s². Using F = ma with m = 20 kg: F = 20 × 5 = 100 N. But the work–distance graph gives F = 5 N. These are wildly inconsistent (5 N vs 100 N).\n- Step 3: The graphs are consistent only if the forces match. Here they don't — 5 N ≠ 100 N. To be consistent, either the mass would need to be much smaller (m = 5/5 = 1 kg for F = 5 N with a = 5 m/s²), or the force would need to be much larger (F = 100 N, giving a gradient of 100 on the work–distance graph).\n\nAlways cross-check: the same physical situation must produce consistent values across different graph representations.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "Why is it wrong to calculate the current through a fixed 5 Ω resistor in series with a 3 Ω variable resistor (connected to a 24 V supply) as $$I = 24/5 = 4.8$$ A? What is the correct approach? (3 steps)", "answer": "- Step 1: The 24 V is the supply voltage across the entire series combination, not across the 5 Ω resistor alone. In a series circuit, the supply voltage is shared between all components in proportion to their resistances (this is the potential divider principle).\n- Step 2: The correct current uses the total series resistance: $$I = V / R_{total} = 24 / (5 + 3) = 24/8 = 3$$ A. Every component in the series loop carries the same 3 A.\n- Step 3: The voltage across the 5 Ω resistor is then $$V_5 = I \\times R_5 = 3 \\times 5 = 15$$ V (or by the divider: $$V_5 = \\frac{5}{8} \\times 24 = 15$$ V). The remaining 9 V drops across the 3 Ω resistor. The error of 4.8 A would only be correct if the full 24 V appeared across the 5 Ω resistor — but it doesn't, because the 3 Ω resistor shares the voltage.\n\nThis is the most common ESAT electricity trap: forgetting that series resistors share the supply voltage.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "You want to maximise the power dissipated in a fixed resistor R that is in series with a variable resistor. Which form of the power equation should you use, and why? What do you set the variable resistor to? (3 steps)", "answer": "- Step 1: Power has three forms: $$P = IV$$, $$P = I^2R$$, and $$P = V^2/R$$. Since R is fixed (it's the resistor we're maximising power in), we should use the form where R appears and the other variable is something we can control.\n- Step 2: Use $$P = I^2R$$. Since R is fixed, maximising P means maximising I. The current depends on the total resistance in the circuit: $$I = V/R_{total}$$. To maximise I, we must minimise $$R_{total}$$.\n- Step 3: $$R_{total} = R + R_{variable}$$. Since R is fixed, the minimum total resistance occurs when the variable resistor is set to its minimum value. So set the variable resistor to its minimum and use $$P = I^2R$$ with the maximised current.\n\nKey principle: choose the power form that isolates the fixed quantity (here R), then maximise the remaining variable (here I) by minimising all other resistances.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": true}, {"question": "A 24 V supply drives a circuit with a variable resistor (minimum 3 Ω) in series with a fixed 5 Ω resistor. What is the maximum power in the 5 Ω resistor? (3 steps)", "answer": "- Step 1: To maximise power in the fixed 5 Ω resistor, maximise current by minimising the variable resistor to 3 Ω. Total resistance: $$R_{total} = 5 + 3 = 8$$ Ω.\n- Step 2: Current: $$I = V/R_{total} = 24/8 = 3$$ A.\n- Step 3: Power in the 5 Ω resistor: $$P = I^2 R = 3^2 \\times 5 = 45$$ W. Cross-check with the voltage form: $$V_5 = \\frac{5}{8} \\times 24 = 15$$ V, then $$P = V^2/R = 225/5 = 45$$ W. Both methods agree.\n\nThe answer is 45 W. The common error (I = 24/5 = 4.8 A, giving P = 115.2 W) is wrong because it ignores the voltage drop across the variable resistor.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "In a potential divider with two series resistors $$R_1$$ and $$R_2$$ connected across a supply voltage V, what fraction of V appears across $$R_1$$, and why? (3 steps)", "answer": "- Step 1: In a series circuit, the same current I flows through both resistors. The current is $$I = V/(R_1 + R_2)$$, determined by the total resistance.\n- Step 2: The voltage across $$R_1$$ is $$V_1 = I \\times R_1 = \\frac{V}{R_1 + R_2} \\times R_1 = \\frac{R_1}{R_1 + R_2} \\times V$$. Similarly, $$V_2 = \\frac{R_2}{R_1 + R_2} \\times V$$.\n- Step 3: Each resistor gets a share proportional to its resistance. If $$R_1 = R_2$$, each gets half. If $$R_1 = 3R_2$$, then $$R_1$$ gets 3/4 of V and $$R_2$$ gets 1/4. The larger resistance claims the larger voltage share — this is the potential divider rule.\n\nThink of it as \"voltage divides in the ratio of resistances\" — the bigger resistor drops more voltage.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "In a parallel circuit, why does every branch connected directly across the supply experience the full supply voltage, regardless of what other branches exist? (2 steps)", "answer": "- Step 1: Each parallel branch connects from the supply's positive terminal to its negative terminal via ideal wires. Ideal wires have zero resistance, so there is no voltage drop along them. Every point connected by wire to the positive terminal is at the same potential (supply voltage), and every point connected by wire to the negative terminal is at 0 V.\n- Step 2: Therefore each branch has the full potential difference across it, and each branch's current is determined independently by $$I = V/R_{branch}$$. Adding more branches doesn't change the voltage across any existing branch — it only increases the total current drawn from the supply.\n\nMisconception: \"adding a branch reduces the voltage on other branches.\" No — each branch still sees the full supply voltage. What changes is the total current the supply must provide.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "A 12 V battery powers a parallel circuit. Branch A has a single 30 Ω resistor. Branch B has two 30 Ω resistors in series. What is the total current drawn from the battery? (3 steps)", "answer": "- Step 1: Branch A: full 12 V across 30 Ω. Current: $$I_A = 12/30 = 0.4$$ A.\n- Step 2: Branch B: full 12 V across 60 Ω total (two 30 Ω resistors in series). The 12 V splits equally (6 V each, since equal resistances), and current: $$I_B = 12/60 = 0.2$$ A.\n- Step 3: By Kirchhoff's first law, total current from battery: $$I_{total} = I_A + I_B = 0.4 + 0.2 = 0.6$$ A.\n\nEach branch is independent — they each see 12 V and draw current according to their own total resistance.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "In the circuit from Q19, a switch is closed that shorts out (bypasses) one of the two 30 Ω resistors in branch B. What happens to the total current, and why does it increase? (3 steps)", "answer": "- Step 1: Shorting one resistor means branch B now has only one 30 Ω resistor across the full 12 V. The new branch B current: $$I_B' = 12/30 = 0.4$$ A.\n- Step 2: Branch A is unaffected — it still has 12 V across 30 Ω, so $$I_A = 0.4$$ A. The shorted resistor carries no current because an ideal wire offers zero resistance, and all current takes the path of zero resistance.\n- Step 3: New total: $$I_{total}' = 0.4 + 0.4 = 0.8$$ A, an increase of 0.2 A from the original 0.6 A. The total current increases because branch B now has lower resistance (30 Ω instead of 60 Ω), drawing more current, while branch A is unchanged.\n\nKey insight: shorting a resistor in a branch reduces that branch's resistance, which increases that branch's current. The other branches are unaffected because each sees the same supply voltage.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "Why do points connected only by ideal wire in a circuit sit at the same potential? What would happen if they didn't? (2 steps)", "answer": "- Step 1: Ideal wire has zero resistance. By Ohm's law, $$V = IR$$, so if R = 0 then V = 0 regardless of current. There is no voltage drop across ideal wire, so every point along it is at the same potential.\n- Step 2: If there were a potential difference between two points connected by wire, electrons would flow almost instantaneously from the higher-potential point to the lower-potential point, redistributing charge until the potential equalises. This happens on timescales of picoseconds in real wires. So in circuit analysis, we treat all wire-connected points as being at the same potential.\n\nVoltage drops only appear across components (resistors, bulbs, etc.) — never across ideal wires. This is why we can confidently label all wire-connected points at the same voltage.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "State both of Kirchhoff's laws in words, and explain the physical principle underlying each. (2 steps)", "answer": "- Step 1: Kirchhoff's first law (current law): at any junction, the sum of currents entering equals the sum of currents leaving ($$\\Sigma I_{in} = \\Sigma I_{out}$$). This is a consequence of conservation of charge — charge cannot accumulate at a junction; whatever flows in must flow out.\n- Step 2: Kirchhoff's second law (voltage law): around any closed loop, the sum of EMFs equals the sum of voltage drops ($$\\Sigma \\text{EMF} = \\Sigma IR$$). This is a consequence of conservation of energy — each charge is given a certain amount of energy by the EMF sources, and it must spend all of that energy traversing the resistors in the loop. The charge returns to its starting point with the same potential energy it started with.\n\nTogether, these two laws allow you to analyse any circuit, no matter how complex, by writing equations for currents at junctions and voltages around loops.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "A 12 V battery is in a loop with a 4 Ω and a 2 Ω resistor in series. Use Kirchhoff's second law to find the current, and explain what would be wrong with claiming the current is 12/4 = 3 A. (3 steps)", "answer": "- Step 1: Kirchhoff's second law: around the loop, $$\\Sigma \\text{EMF} = \\Sigma IR$$. Here, the only EMF is 12 V, and the total resistance is 4 + 2 = 6 Ω. So: $$12 = I \\times 6$$, giving $$I = 2$$ A.\n- Step 2: The error of 3 A comes from dividing the EMF by only one resistor (4 Ω), ignoring the 2 Ω resistor. This would violate Kirchhoff's second law because the voltage drops wouldn't add up: $$3 \\times 4 = 12$$ V leaves nothing for the 2 Ω resistor, but there must be a drop across it.\n- Step 3: Correctly, the 2 A current gives voltage drops of $$2 \\times 4 = 8$$ V and $$2 \\times 2 = 4$$ V, totalling 12 V — matching the EMF exactly, as the law requires.\n\nThe rule: always divide by the total resistance in the loop, not by a single component's resistance.", "source": "GL
