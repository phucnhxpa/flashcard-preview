<script>
const DATA={"selected": [{"question": "Edge case: In the rate of thermal conduction C ∝ A·ΔT/L, what happens to C in each of the following scenarios? (a) A and L both double. (b) ΔT is halved. (c) The bar is replaced with one of double A and double L but kept at the same ΔT. (d) The bar's two ends are at 50 °C and 50 °C.", "answer": "+ (a) Doubling A doubles C; doubling L halves C; together they cancel. C unchanged.\n+ (b) ΔT halved ⇒ C halved (linear proportionality).\n+ (c) Identical to (a) — same outcome. C unchanged.\n+ (d) ΔT = 0 ⇒ C = 0. No net heat flow.\n+ Big idea: the only geometric ratio that matters for C is A/L. If A/L is preserved, C is preserved. The only \"driver\" is ΔT. If ΔT = 0, no flow regardless of geometry.\n+ These edge cases are exactly the kind of \"no change\" options the ESAT includes among the multiple-choice answers, so they test whether you've understood the proportionality.", "source": "MiniMax ②", "_id": "minimax_2_47"}, {"question": "State **Kirchhoff's first law** and **Kirchhoff's second law** in words, and give the physical *reason* each one is true. (3 steps)", "answer": "- Step 1: **First law (current):** the sum of currents flowing **into** a junction equals the sum flowing **out**. *Reason:* electric charge is conserved — current is just charge per unit time in motion, and charge cannot pile up at a point.\n- Step 2: **Second law (voltage):** the sum of EMFs around any closed loop equals the sum of the $$IR$$ voltage drops around that loop. *Reason:* the EMF is the energy per unit charge *given* to charges by the source; going once around a loop, a charge returns to its starting potential, so all that energy must have been *spent* (deposited as $$IR$$ drops).\n- Step 3: Both laws are bookkeeping identities — they follow from **conservation of charge** and **conservation of energy** applied to circuits. They hold for *any* network, no matter how tangled.\n\nThis is why they are so useful: they always apply, even in complicated circuits where intuition fails.", "source": "MiniMax ①", "_id": "minimax_1_14"}, {"question": "Synthesis trap check: A 24 V supply has a 5 Ω resistor in series with a 3 Ω resistor. A student wants the power in the 3 Ω resistor and uses $$P = V^2/R = 24^2/3 = 192$$ W. Why is this wrong?", "answer": "The student has assumed the full 24 V drops across the 3 Ω resistor alone. In a series circuit, the voltage **splits** across both resistors in proportion to their resistances. The 3 Ω resistor gets only $$\\frac{3}{8} \\times 24 = 9$$ V, not 24 V. The correct power is $$P = V_{3}^2 / R = 9^2 / 3 = 27$$ W, or equivalently $$P = I^2 R = 3^2 \\times 3 = 27$$ W using the series current of 3 A. Never substitute the supply voltage directly into $$V^2/R$$ for a single series component — use the voltage *across that specific component*.", "source": "GLM 5.1 ③", "_id": "glm_3_42"}, {"question": "When a parent nucleus ᴬ_Z X emits a beta-minus particle, by how much do A and Z of the daughter nucleus change?", "answer": "- Step 1: The beta carries (A=0, Z=−1). A = 0 means no nucleons are lost — but the proton count actually *rises*.\n- Step 2: Daughter's mass number = A − 0 = A (unchanged).\n- Step 3: Daughter's proton number = Z − (−1) = Z + 1. A neutron in the nucleus has turned into a proton, ejecting the electron (the beta) and an antineutrino.\n+ Intuition: beta-minus happens when a nucleus has too many neutrons for stability. Converting a neutron into a proton moves it toward the valley of stability.\n+ Why no mass change: the total number of nucleons (protons + neutrons) is preserved; you just rearranged them.", "source": "MiniMax ②", "_id": "minimax_2_5"}, {"question": "The rate of thermal conduction $$C$$ through a solid bar is given by $$C \\propto \\frac{A \\Delta T}{L}$$. Conceptually explain *why* the rate is inversely proportional to the length $$L$$ and directly proportional to the cross-sectional area $$A$$. (2 steps)", "answer": "- Step 1: Explain the area ($$A$$) dependence. Think of heat flow like traffic on a highway. A larger cross-sectional area provides more \"lanes\" or parallel pathways for phonons (lattice vibrations) and free electrons to travel through simultaneously, increasing the total thermal energy transferred per second.\n- Step 2: Explain the length ($$L$$) dependence. A longer bar means the heat carriers must undergo more collisions and travel a greater distance to get from the hot end to the cold end. This increased \"resistance\" to flow restricts the rate at which thermal energy can be conducted, making the rate inversely proportional to $$L$$.", "source": "Qwen 3 ③", "_id": "qwen_3_2"}, {"question": "In a potential divider circuit with two resistors $$R_1$$ and $$R_2$$ in series across a supply voltage $$V$$, the voltage across $$R_1$$ is $$V_1 = V \\frac{R_1}{R_1 + R_2}$$. Conceptually, why does the voltage split in direct proportion to the resistances, rather than being shared equally? (2 steps)", "answer": "- Step 1: In a series circuit, the current $$I$$ is identical through all components. Voltage (potential difference) represents the energy transferred per unit charge. \n- Step 2: Resistance is a measure of how much \"effort\" or energy is required to push charge through a component. A larger resistance requires more energy to push the same current through it. Therefore, the component with the higher resistance will \"spend\" a larger proportion of the total available energy (voltage) supplied by the battery. The voltage splits exactly in ratio to the resistances because energy expenditure is directly proportional to the resistance encountered by the constant current.", "source": "Qwen 3 ④", "_id": "qwen_4_12"}, {"question": "Synthesis: A wire of length L and cross-section A carries a steady current I. If you double the length, double the area, and double the current, what happens to the power dissipated in the wire? (P = I²R; R = ρL/A.)", "answer": "- Step 1: R ∝ L/A. New R' = ρ(2L)/(2A) = ρL/A = R. The resistance is unchanged because the length and area factors cancel.\n- Step 2: New current I' = 2I. P' = (I')² × R' = (2I)² × R = 4I²R = 4P. The power quadruples.\n+ Take-home: doubling the current quadruples the dissipated power at fixed resistance. The geometry change is a red herring — it leaves R unchanged, so it doesn't enter the final scaling.\n+ ESAT check: don't be distracted by geometry changes that cancel in the ratio L/A. Focus on which quantity actually enters the power formula.", "source": "MiniMax ②", "_id": "minimax_2_43"}, {"question": "A wave particle of amplitude A makes one full oscillation. What total distance does the particle travel, and why? (3 steps)", "answer": "- Step 1: One full cycle: the particle moves from rest position up to the top (distance A), back down through rest to the bottom (distance A), and back up to rest (distance A). That's three A's so far.\n- Step 2: Wait — count again carefully. Up to top = A. Down through rest to bottom = 2A. Back up to rest = A. Total per full cycle = 4A.\n- Step 3: So in one full oscillation the particle traces out a total path length of 4A — not 2A, not A.\n+ Why 4A and not 2A: 2A would be the *displacement range* (top to bottom), not the *distance travelled*. The particle covers the top-to-bottom range twice per cycle (down and back up) plus two more A's (rest to top, rest to top again at the end). The total is 4A.\n+ ESAT trap: students often guess \"2A\" or \"A\" for the per-cycle distance. Memorise \"4A per cycle\" — it appears in ESAT problems.", "source": "MiniMax ②", "_id": "minimax_2_33"}, {"question": "A mass m is being lifted vertically upward by a rope with tension T, accelerating upward at a. Write the equation relating T, m, g, and a, and explain why T is *not* equal to mg in general.", "answer": "- Step 1: Apply Newton's second law along the vertical. The net (resultant) upward force is T (up) − mg (down). So F_res = T − mg.\n- Step 2: F_res = ma (Newton's second law). Equate: T − mg = ma.\n- Step 3: Solve for T: T = mg + ma = m(g + a).\n+ Why T ≠ mg in general: if the mass is accelerating, there must be a net force. T and mg are the only two vertical forces. If they were equal, F_res = 0 and a = 0. The instant a > 0, T must exceed mg by exactly ma to produce that acceleration.\n+ Edge case: a = 0 ⇒ T = mg. The mass is in equilibrium (lifted at constant velocity or held still). Only then is tension equal to weight.\n+ ESAT trap: writing \"T = mg\" without checking the acceleration. Always start from F_res = ma and identify the net force.", "source": "MiniMax ②", "_id": "minimax_2_35"}, {"question": "In a thermal-conduction problem, what does \"an insulated bar\" mean, and how does it affect the proportionality C ∝ A·ΔT/L?", "answer": "- Step 1: \"Insulated bar\" means the sides of the bar lose no heat to the surroundings — all the heat that enters one end must leave through the other end.\n- Step 2: This is a *boundary condition*, not a change in the proportionality. The law C ∝ A·ΔT/L still holds for the heat flowing down the length of the bar.\n- Step 3: The insulation simply ensures that the steady-state ΔT is well-defined and that the heat we account for in the equation is the same heat flowing through every cross-section along the bar.\n+ Visual: imagine a pipe lagged with foam on the outside. Water can only enter at one end and leave at the other; no leakage through the walls. The flow rate through the pipe is still set by the pressure difference and the pipe geometry.\n+ Common confusion: students sometimes think \"insulated\" means the bar itself conducts less. It doesn't — it means the bar doesn't lose heat to its surroundings along the way.", "source": "MiniMax ②", "_id": "minimax_2_14"}, {"question": "A circuit has a 12 V supply with two parallel branches. Branch A has a single 30 Ω resistor. Branch B has two 30 Ω resistors in series with a switch that can short one of them. Explain what happens to the voltage distribution in branch B when the switch is closed. (3 steps)", "answer": "- Step 1: With the switch open: the two 30 Ω resistors in branch B split the 12 V equally — 6 V across each. Current through branch B is $$I_B = 12/60 = 0.2$$ A.\n- Step 2: When the switch closes, an ideal wire (zero resistance) is placed in parallel with one of the 30 Ω resistors. All current in branch B takes the zero-resistance path through the wire, and no current flows through the shorted resistor. The shorted resistor has 0 V across it (because the wire bypasses it).\n- Step 3: The remaining 30 Ω resistor in branch B now has the full 12 V across it. Current through branch B becomes $$I_B' = 12/30 = 0.4$$ A. The voltage distribution has changed from 6 V + 6 V to 12 V + 0 V.\n\nShorting a component means bypassing it entirely — no current flows through it, no voltage drops across it, and the remaining components in the branch see the full supply voltage.", "source": "GLM 5.1 ②", "_id": "glm_2_49"}, {"question": "In an expanding universe, why does the relic radiation shift from the gamma region to the microwave region? Use the wave speed equation to walk through the mechanism. (3 steps)", "answer": "- Step 1: All electromagnetic radiation travels at the same speed in vacuum: $$c = f\\lambda$$, where $$c$$ is constant (the speed of light). This means frequency and wavelength are locked together — if one changes, the other must change inversely.\n- Step 2: Cosmic expansion physically stretches the space between wave crests, increasing the wavelength $$\\lambda$$. The gamma radiation from the early universe had a very short $$\\lambda$$; after billions of years of expansion, $$\\lambda$$ has grown enormously.\n- Step 3: Since $$c$$ is constant and $$\\lambda$$ has increased, the frequency $$f = c/\\lambda$$ must decrease. The radiation shifts from gamma (high $$f$$, short $$\\lambda$$) → microwave (low $$f$$, long $$\\lambda$$). This is cosmological redshift: \"red\" because longer wavelengths correspond to the red end of the spectrum and beyond.\n\nTakeaway: Expansion stretches $$\\lambda$$ up, forcing $$f$$ down — the wave doesn't slow down, it just oscillates more slowly.", "source": "GLM 5.1 ③", "_id": "glm_3_1"}, {"question": "A pulley redirects a rope with tension $$T$$ so that the rope goes down on one side and down on the other side of the pulley. How much downward force does the pulley's coupling (axle/support) experience, and why? (2 steps)", "answer": "- Step 1: The tension $$T$$ in the rope acts everywhere along the rope (tension is the same throughout an ideal rope). On one side of the pulley, the rope pulls down with force $$T$$ (e.g., the motor pulling down). On the other side, the rope also pulls down with force $$T$$ (e.g., the weight of the mass pulling down).\n- Step 2: The pulley coupling must support **both** downward pulls simultaneously. The total force on the coupling is $$T + T = 2T$$. This is not a vector addition where opposite directions cancel — both rope segments are pulling the pulley *in the same direction* (downward), so they add. A pulley changes the direction of the rope but doubles the force on its own support.\n\nTakeaway: A redirecting pulley puts twice the tension on its axle — $$2T$$, not $$T$$.", "source": "GLM 5.1 ③", "_id": "glm_3_30"}, {"question": "Two points in a circuit are connected **only by ideal wire** (no resistor, no component, no source between them). What can you say for certain about the electric potential at those two points, and *why* does the wire enforce that? (2 steps)", "answer": "- Step 1: The two points are at the **same potential**. Any potential difference across a length of ideal wire would create an electric field along the wire, which would push charge along it almost instantaneously.\n- Step 2: That charge motion continues until the field is zero — i.e., until the potential difference is gone. Equilibrium is reached on an extremely short timescale, after which the wire acts as an equipotential.\n\nThis is why a voltmeter placed across a plain piece of wire reads **0 V**, but a voltmeter across a resistor reads the voltage drop. The wire cannot *spend* any energy, so it cannot sustain a potential difference.", "source": "MiniMax ①", "_id": "minimax_1_12"}, {"question": "When plotting Kinetic Energy ($$E_k$$) on the y-axis against velocity ($$v$$) on the x-axis for a constant mass, the resulting graph is a parabola rather than a straight line. Explain the mathematical and physical reason for this shape, and contrast it with the graph of Work Done vs Distance. (2 steps)", "answer": "- Step 1: Mathematical and physical reason for KE vs velocity. The formula for kinetic energy is $$E_k = \\frac{1}{2}mv^2$$. Because velocity $$v$$ is squared, the relationship is quadratic ($$y \\propto x^2$$). Geometrically, this produces a parabola that curves upwards, getting steeper as velocity increases. Physically, this means doubling your speed requires *four times* the energy, not twice.\n- Step 2: Contrast with Work vs Distance. Work done is defined as $$W = F \\cdot d$$. Here, the relationship between $$W$$ (y-axis) and $$d$$ (x-axis) is strictly linear ($$y = mx$$). The graph is a straight line passing through the origin, and its constant gradient represents the magnitude of the constant force $$F$$.", "source": "Qwen 3 ②", "_id": "qwen_2_5"}, {"question": "Why does a kinetic energy vs velocity graph form a parabola rather than a straight line, and what would the graph of KE vs speed squared ($$v^2$$) look like? (2 steps)", "answer": "- Step 1: $$E_k = \\frac{1}{2}mv^2$$ means KE is proportional to v², not v. Plotting KE against v gives a parabolic curve (quadratic). The gradient increases as v increases — at high speeds, small speed increases produce large KE increases.\n- Step 2: If you plot KE against v² instead (i.e., $$E_k = \\frac{1}{2}m \\cdot v^2$$, treating v² as the x-variable), you get a straight line through the origin with gradient $$m/2$$. This is a useful trick: if you suspect a quadratic relationship, plot y against x² and check for linearity.\n\nCommon trap: assuming KE vs v is linear. It is not — doubling the speed quadruples the KE.", "source": "GLM 5.1 ②", "_id": "glm_2_37"}, {"question": "Edge case: Both ends of a thermally conducting bar are simultaneously heated, raising $$T_1$$ by 15 K and $$T_2$$ by 15 K. What happens to the conduction rate $$C$$, and why?", "answer": "The conduction rate **does not change**. The key variable is the temperature **difference** $$\\Delta T = T_1 - T_2$$. If both temperatures increase by the same amount (15 K), the difference between them remains exactly what it was before: $$\\Delta T_{\\text{new}} = (T_1 + 15) - (T_2 + 15) = T_1 - T_2 = \\Delta T_{\\text{old}}$$. Since $$C \\propto \\Delta T$$ and $$\\Delta T$$ is unchanged, $$C$$ is unchanged. This is a classic ESAT trap — the question tempts you to think \"more heat = more conduction,\" but conduction depends on the *gradient*, not the absolute temperatures.", "source": "GLM 5.1 ③", "_id": "glm_3_11"}, {"question": "A copper bar has a hot end at $$80^\\circ\\text{C}$$ and a cold end at $$20^\\circ\\text{C}$$. If the entire bar is placed in an oven that uniformly raises the temperature of *both* ends by $$15^\\circ\\text{C}$$, what happens to the rate of thermal conduction through the bar, and why?", "answer": "The rate of thermal conduction remains **unchanged**. The rate of conduction depends strictly on the temperature *difference* ($$\\Delta T = T_{hot} - T_{cold}$$), not the absolute temperatures of the ends. Initially, $$\\Delta T = 80 - 20 = 60^\\circ\\text{C}$$. After heating, the ends are at $$95^\\circ\\text{C}$$ and $$35^\\circ\\text{C}$$, so the new $$\\Delta T = 95 - 35 = 60^\\circ\\text{C}$$. Since the cross-sectional area $$A$$, length $$L$$, and temperature difference $$\\Delta T$$ are all unchanged, the conduction rate $$C$$ remains exactly the same.", "source": "Qwen 3 ③", "_id": "qwen_3_3"}, {"question": "Using the wave equation $$c = f\\lambda$$ and the fact that the speed of light $$c$$ is constant, explain in one short chain of reasoning why the expansion of the universe *lowers* the frequency of the CMBR.", "answer": "- Step 1: The expansion of space stretches the wavelength of any light travelling through it, so $$\\lambda$$ (the wavelength of the relic radiation) **increases** over time.\n- Step 2: For light, $$c = f\\lambda$$ with $$c$$ fixed. Rearranging, $$f = c/\\lambda$$.\n- Step 3: If $$c$$ is constant and $$\\lambda$$ increases, then the ratio $$c/\\lambda$$ must **decrease** — so $$f$$ falls. Frequency drops as the wave is redshifted toward longer wavelengths.\n\nThis is why the same radiation that was once gamma is now microwave.", "source": "MiniMax ①", "_id": "minimax_1_1"}, {"question": "Kirchhoff's first law (current) and second law (voltage) are usually taught as two separate rules, but they actually have a deep conceptual link. What do they have in common, and what conservation principle underlies each? (2 steps)", "answer": "- Step 1: **Kirchhoff's first law** is a statement of **conservation of charge**. Current is just charge in motion; charge cannot appear or disappear at a junction, so what flows in must flow out.\n- Step 2: **Kirchhoff's second law** is a statement of **conservation of energy**. Going around a closed loop, a charge returns to its starting potential, so the energy it gained from EMFs along the way must equal the energy it lost as $$IR$$ drops.\n\nBoth are bookkeeping: they say that two fundamental conserved quantities (charge, energy) cannot be created or destroyed in a circuit. That's why these two laws are universally true, in any circuit, however complex.", "source": "MiniMax ①", "_id": "minimax_1_28"}, {"question": "Common trap: A 24 V supply connects a 5 Ω fixed resistor in series with a 3 Ω variable resistor (at its minimum). A student calculates $$I = 24/5 = 4.8$$ A and then finds power in the 5 Ω resistor. Why is this current value wrong, and what is the correct approach? (2 steps)", "answer": "- Step 1: The student's error is dividing the supply voltage by only the fixed resistor's resistance, as if the full 24 V drops across the 5 Ω alone. But in a **series** circuit, the total resistance is $$R_{\\text{total}} = 5 + 3 = 8$$ Ω. The current must be $$I = V / R_{\\text{total}} = 24/8 = 3$$ A, not 4.8 A. Both resistors share the voltage; neither gets the full 24 V.\n- Step 2: With the correct current $$I = 3$$ A, the power in the 5 Ω resistor is $$P = I^2R = 3^2 \\times 5 = 45$$ W. Alternatively, the 5 Ω resistor gets $$\\frac{5}{8} \\times 24 = 15$$ V (potential divider), and $$P = V^2/R = 15^2/5 = 45$$ W. Both methods agree once you use the correct current.\n\nTakeaway: In a series circuit, always divide by the **total** resistance to find current. Never drop the full supply voltage across one resistor.", "source": "GLM 5.1 ③", "_id": "glm_3_18"}, {"question": "In a circuit, a battery provides 12 V to a parallel combination of two branches. Branch A is a single 30 Ω resistor; branch B is two 30 Ω resistors in series. What is the current in each branch *before* a switch (placed to short out one of the resistors in branch B) is closed? (3 steps)", "answer": "- Step 1: Both branches sit directly across the 12 V supply (parallel = full supply voltage on each branch). So branch A has 12 V across its single 30 Ω, giving $$I_A = 12/30 = 0.4\\,\\text{A}$$.\n- Step 2: Branch B has two 30 Ω resistors in series, total 60 Ω. The 12 V splits equally (6 V across each, by symmetry), so the current is $$I_B = 12/60 = 0.2\\,\\text{A}$$ (or equivalently $$6/30 = 0.2$$).\n- Step 3: Total current from the battery is the sum: $$I_\\text{total} = 0.4 + 0.2 = 0.6\\,\\text{A}$$.\n\nThe key insight: each parallel branch is \"indifferent\" to the other — each one sees the full 12 V because it's connected directly to the battery terminals by wire.", "source": "MiniMax ①", "_id": "minimax_1_15"}, {"question": "A gamma-ray photon in the early universe is stretched by cosmic expansion so that its wavelength doubles. Using c = fλ (with c constant for light in vacuum), what must happen to its frequency, and what region of the EM spectrum does it end up in?", "answer": "- Step 1: Recall that for light in vacuum, c is a fixed constant (≈ 3 × 10⁸ m/s). The relationship c = fλ must always hold, so if one of f or λ changes, the other must compensate.\n- Step 2: If λ doubles (λ → 2λ), then to keep c constant, f must halve (f → f/2). Wavelength and frequency are inversely related when c is fixed.\n- Step 3: Gamma rays have very short wavelengths and very high frequencies. Halving the frequency and doubling the wavelength pushes the photon down through X-ray, ultraviolet, visible, infrared, and into the microwave region. That's exactly why we call it the \"microwave\" background.\n+ Visual: imagine drawing a short, tightly compressed wave on a rubber sheet, then stretching the sheet. The same wave gets longer; its frequency, when you count peaks passing a point per second, must drop.", "source": "MiniMax ②", "_id": "minimax_2_1"}, {"question": "When a nucleus emits gamma radiation, by how much do A and Z change? Why?", "answer": "- Step 1: A gamma is ⁰₀γ: A = 0, Z = 0.\n- Step 2: Therefore A and Z of the daughter are exactly the same as the parent.\n- Step 3: Gamma emission does not change the *composition* of the nucleus, only its energy state. An excited nucleus drops to a lower energy state by emitting a high-energy photon. It's the nucleus's way of \"cooling off,\" not of changing identity.\n+ Important consequence: gamma emission on its own does not move you along a decay chain in the (A, Z) plane — only alpha and beta do.", "source": "MiniMax ②", "_id": "minimax_2_6"}, {"question": "A bar's rate of thermal conduction is initially $$C_0 \\propto A_0 \\Delta T_0 / L_0$$. You double the cross-sectional area ($$A \\to 2A_0$$) but want the conduction rate to stay *exactly* the same. What must you also do to $$L$$ and/or $$\\Delta T$$? Explain using the formula.", "answer": "- Step 1: The new rate is $$C \\propto (2A_0) \\cdot \\Delta T / L$$. For $$C = C_0 \\propto A_0 \\Delta T_0 / L_0$$ to still hold, the ratio $$A/L$$ (or the whole numerator) must stay equal to its original value.\n- Step 2: The cleanest fix is to **double the length** ($$L \\to 2L_0$$). Then $$\\dfrac{2A_0}{2L_0} = \\dfrac{A_0}{L_0}$$ and the rate is unchanged.\n- Step 3: Alternatively, halving $$\\Delta T$$ would also work — but only if the question allows it. In ESAT-style problems, the usual trap-tested scenario is the \"$$A$$ and $$L$$\" doubling trick, where doubling only one of them without the other changes the rate.\n\nThe key principle: $$C$$ depends on the *combination* $$A\\Delta T / L$$, not on any single variable in isolation.", "source": "MiniMax ①", "_id": "minimax_1_6"}, {"question": "A mass is being lowered at constant speed using a rope over a pulley. What is the tension in the rope, and how does this differ from the case where the mass accelerates downward? (3 steps)", "answer": "- Step 1: At constant speed, acceleration a = 0. Newton's second law: $$T - mg = ma = 0$$, so $$T = mg$$. The tension exactly equals the weight. The rope supports the mass without any net force.\n- Step 2: If the mass accelerates downward (a < 0, taking upward as positive): $$T - mg = ma$$ where a is negative. So $$T = m(g + a) = mg - m|a|$$. The tension is less than the weight because gravity alone provides more downward force than needed; the rope just slows the descent slightly.\n- Step 3: The coupling force on the pulley is always 2T. For constant speed: coupling = 2mg. For downward acceleration: coupling = 2m(g + a) < 2mg. For upward acceleration: coupling = 2m(g + a) > 2mg.\n\nConstant speed is the special case where T = mg. Any acceleration changes T: upward acceleration increases T, downward acceleration decreases T.", "source": "GLM 5.1 ②", "_id": "glm_2_44"}, {"question": "In a series circuit, the supply voltage is 24 V and the resistors are 3 Ω (variable, set to minimum) and 5 Ω (fixed). Without doing arithmetic, *qualitatively* — does most of the 24 V drop across the 3 Ω or the 5 Ω, and why?", "answer": "- Step 1: Both resistors carry the same current (series). The voltage drop across each is $$V_i = I R_i$$.\n- Step 2: So the larger resistor drops the larger share of the voltage. The 5 Ω is bigger, so the 5 Ω drops **more** of the 24 V than the 3 Ω does.\n- Step 3: Quantitatively, the splits are in the ratio 3 : 5, so the 3 Ω gets 9 V and the 5 Ω gets 15 V. The 5 Ω gets the bigger share because it \"resists\" the current more.\n\nThis is a potential-divider situation: voltages in a series chain split in proportion to the resistances.", "source": "MiniMax ①", "_id": "minimax_1_33"}, {"question": "Why would a sequence of 1 alpha decay plus 3 beta-minus decays fail to leave the proton number unchanged? Use the conservation of $$Z$$ to justify your answer. (2 steps)", "answer": "- Step 1: One alpha decay reduces the proton number by 2, while three beta-minus decays increase it by $$3 \\times (+1) = +3$$.\n- Step 2: The net change in $$Z$$ would be $$-2 + 3 = +1$$, so the nucleus would end up as a different element with one more proton, violating the requirement that $$Z$$ remain unchanged.", "source": "Kimi K2.6 ①", "_id": "kimi_1_5"}, {"question": "Misconception probe: In a parallel circuit connected to a fixed voltage supply, if you close a switch that shorts out (bypasses) one of the resistors in Branch A, how does this affect the current flowing through a completely separate Branch B, and why? (2 steps)", "answer": "- Step 1: The current in Branch B remains completely unchanged.\n- Step 2: In a parallel circuit, every branch is connected directly across the same two nodes (the same potential difference). Because the power supply maintains a fixed voltage, and the resistance of Branch B hasn't changed, Ohm's law ($$I_B = \\frac{V}{R_B}$$) dictates that the current in Branch B must stay exactly the same. The short circuit only increases the current in Branch A and the total current drawn from the battery.", "source": "Qwen 3 ①", "_id": "qwen_1_14"}, {"question": "Both ends of an insulated conducting bar are heated so that each temperature increases by 15 K. What happens to the rate of thermal conduction, and why? (2 steps)", "answer": "- Step 1: The conduction rate depends on the temperature difference $$\\Delta T = T_1 - T_2$$. If both temperatures rise by the same 15 K, then $$T_1' = T_1 + 15$$ and $$T_2' = T_2 + 15$$, so $$\\Delta T' = (T_1 + 15) - (T_2 + 15) = T_1 - T_2 = \\Delta T$$.\n- Step 2: The temperature difference is unchanged, so the conduction rate C is unchanged. What matters is not the absolute temperatures but the difference between them. Raising both equally is like raising both sides of a hill by the same amount — the slope (which drives the flow) hasn't changed.\n\nEdge case: if you raised only one end, ΔT would change, and C would change proportionally.", "source": "GLM 5.1 ②", "_id": "glm_2_9"}, {"question": "Synthesis: A 4 kg mass is lifted upward at constant velocity 2 m/s by a motor-pulley system. Using g = 10 m/s², find the tension in the rope and the force on the pulley coupling. What changes if the system instead accelerates the mass upward at 1.5 m/s²?", "answer": "- Step 1: Constant velocity ⇒ a = 0. So F_res = 0. T − mg = 0 ⇒ T = mg = 4 × 10 = 40 N. Coupling force = 2T = 80 N.\n- Step 2: Now with a = 1.5 m/s² upward, F_res = ma = 4 × 1.5 = 6 N upward. T − mg = ma ⇒ T = m(g + a) = 4 × 11.5 = 46 N. Coupling force = 2T = 92 N.\n- Step 3: Compare: tension rose from 40 N to 46 N, an increase of 6 N — exactly equal to ma. The extra ma is \"spent\" accelerating the mass; the rope has to provide it.\n+ Key takeaway: at constant velocity the system is in equilibrium and T = mg. The instant you accelerate the mass, T must exceed mg by ma. The pulley coupling always feels 2T regardless of motion state.\n+ Why \"minimum\" matters in such questions: the *minimum* tension is the one that gives the requested acceleration. Anything larger would also accelerate the mass (and the question would have no unique answer).", "source": "MiniMax ②", "_id": "minimax_2_41"}, {"question": "Synthesis: Why is the alpha-particle symbol written as ⁴₂He rather than ²₁H or ⁴₂H? In other words, why does an alpha carry A = 4 and Z = 2 specifically?", "answer": "- Step 1: An alpha particle is a helium-4 nucleus, meaning it has 2 protons and 2 neutrons — total of 4 nucleons.\n- Step 2: Z (proton number) counts protons only ⇒ Z = 2.\n- Step 3: A (mass/nucleon number) counts total nucleons (protons + neutrons) ⇒ A = 2 + 2 = 4.\n+ The symbol uses the element whose name tells you the proton count: helium (He) means Z = 2, and the ⁴ tells you A = 4.\n+ Common confusion: ²₁H would be a deuteron (one proton + one neutron). ⁴₂H would be wrong because hydrogen cannot have Z = 2; you'd have to call it helium.\n+ Why this matters: when you see ⁴₂He in a decay equation, you should immediately read off (ΔA, ΔZ) = (−4, −2) without re-deriving the values.", "source": "MiniMax ②", "_id": "minimax_2_44"}, {"question": "The rope from the previous question runs over a pulley, with a motor pulling on the other end. The pulley coupling (the axle) supports the rope on both sides. What is the **force on the coupling**, and why is it not just $$T$$? (2 steps)", "answer": "- Step 1: The rope has tension $$T$$ on the load side *and* tension $$T$$ on the motor side (the rope is continuous, and the pulley is frictionless, so the tension is the same on both sides).\n- Step 2: The coupling must support **both** tensions. So the total downward force on the coupling is $$2T$$.\n\n**Intuition:** imagine a single rope going over a hook with two people pulling each end with force $$T$$ — the hook feels $$2T$$. A pulley is the same idea, just redirecting the rope's direction.", "source": "MiniMax ①", "_id": "minimax_1_22"}, {"question": "Why is the name \"redshift\" used for cosmological redshift, even though the radiation in question is now in the microwave region rather than the red part of the visible spectrum?", "answer": "- Step 1: \"Redshift\" was originally coined in astronomy for the Doppler effect: a receding source shifts its spectral lines toward the **red** (longer-wavelength) end of the visible spectrum.\n- Step 2: Cosmological redshift uses the *same* logic — wavelength is **increasing** — but it is caused by the stretching of space itself, not by motion through space.\n- Step 3: The name stuck because the underlying fact is identical in both cases: $$\\lambda$$ grows and $$f$$ falls. The \"red\" in redshift is a historical label for \"wavelength getting longer,\" not a literal colour claim.\n\nSo the term is about the *direction* of the shift, not the actual colour region the light ends up in.", "source": "MiniMax ①", "_id": "minimax_1_2"}, {"question": "A student argues that because the CMBR photons have lost energy (shifting from gamma to microwave), they must have slowed down over billions of years of travel. Refute this using the fundamental wave equation and the nature of electromagnetic waves. (2 steps)", "answer": "- Step 1: Electromagnetic waves, including gamma rays and microwaves, always travel at the exact same constant speed ($$c \\approx 3 \\times 10^8 \\text{ m/s}$$) in a vacuum, regardless of their energy, frequency, or wavelength. They do not slow down over time or distance.\n- Step 2: The energy of a photon is determined by its frequency, given by Planck's equation $$E = hf$$. As cosmological expansion stretches the wavelength ($$\\lambda$$), the wave equation $$c = f\\lambda$$ dictates that the frequency ($$f$$) must decrease. Therefore, the photon loses energy because its frequency drops, entirely independent of its speed, which remains strictly $$c$$.", "source": "Qwen 3 ②", "_id": "qwen_2_1"}, {"question": "A $$12\\text{ V}$$ battery powers two parallel branches. Branch A has a single $$30\\,\\Omega$$ resistor. Branch B has two $$30\\,\\Omega$$ resistors in series. If a switch is closed that \"shorts out\" (bypasses) one of the resistors in Branch B, explain conceptually why the total current drawn from the battery increases, without just calculating the numbers. (2 steps)", "answer": "- Step 1: Independence of parallel branches. In a parallel circuit, each branch operates independently across the same fixed supply voltage ($$12\\text{ V}$$). The current in Branch A remains completely unaffected by any changes in Branch B because the voltage across it remains $$12\\text{ V}$$.\n- Step 2: Effect of shorting. Shorting out a resistor in Branch B removes its resistance, lowering the total resistance of Branch B. Since the voltage across Branch B remains fixed at $$12\\text{ V}$$, Ohm's law ($$I = \\frac{V}{R}$$) dictates that the current through Branch B must increase. Because total current is the sum of the branch currents ($$I_{total} = I_A + I_B$$), and $$I_B$$ increased while $$I_A$$ stayed the same, the total current drawn from the battery must increase.", "source": "Qwen 3 ②", "_id": "qwen_2_8"}, {"question": "State the two conservation rules you must apply when balancing any nuclear equation. Why are they the right rules?", "answer": "+ (1) Total mass number A is conserved: ΣA(left) = ΣA(right). Nucleons cannot be created or destroyed in a single decay — they just get rearranged.\n+ (2) Total proton number Z is conserved: ΣZ(left) = ΣZ(right). Charge is conserved. Beta-minus looks weird because a proton appears from a neutron, but the ejected electron carries Z = −1, so the total Z is unchanged.\n- Step 1: These two rules give you two equations for any given nuclear equation. With two equations you can usually solve for two unknowns (e.g., identify an unknown daughter nucleus).\n- Step 2: In ESAT-style questions you typically need to test each answer option against both rules and eliminate those that fail either one.\n+ Edge case: in some equations you may have an alpha, a daughter, and a beta on the right. The rules still apply — sum A and sum Z across *all* products.", "source": "MiniMax ②", "_id": "minimax_2_8"}, {"question": "Why is the Stefan-Boltzmann constant σ sometimes called a \"constant,\" and why does it appear in the same form for every radiating body?", "answer": "- Step 1: σ ≈ 5.67 × 10⁻⁸ W m⁻² K⁻⁴ is a *universal* constant: it doesn't depend on the size, shape, temperature, or composition of the radiator.\n- Step 2: The deeper reason is that σ comes from fundamental constants of nature (Boltzmann's constant k, Planck's constant h, and the speed of light c) combined in a particular way. Since those don't change, σ doesn't change either.\n- Step 3: So whether you're heating a tiny wire or a giant star, the power per unit area is σT⁴ — same formula, same σ.\n+ Why this is useful: you can use the same L ∝ r²T⁴ scaling for any spherical black-body radiator — a light bulb filament, a hot iron ball, a star — without re-deriving anything.\n+ ESAT note: don't memorise σ numerically; remember the form L = σAT⁴ and how it scales.", "source": "MiniMax ②", "_id": "minimax_2_49"}, {"question": "If an ESAT mechanics question asks for the \"minimum\" tension required to lift a mass via a pulley, what physical scenario does this \"minimum\" imply about the acceleration, and why do examiners use the word \"minimum\"? (2 steps)", "answer": "- Step 1: The \"minimum\" tension implies the scenario where the mass is lifted at a constant velocity (or is just on the verge of moving), meaning acceleration $$a = 0$$. In this case, $$T_{min} = m(g + 0) = mg$$. Any acceleration $$a > 0$$ would require a higher tension ($$T = m(g+a)$$).\n- Step 2: Examiners use the word \"minimum\" to make the question mathematically solvable. If they just said \"lifting a mass\", the acceleration could be anything, making the tension impossible to calculate without more data. \"Minimum\" locks the acceleration to zero, testing if you understand the boundary condition between static/constant velocity and accelerated motion.", "source": "Qwen 3 ①", "_id": "qwen_1_24"}, {"question": "In a travelling mechanical wave, does an individual particle travel along with the wave crest? Describe its actual motion. (1 step)", "answer": "No; each particle oscillates about its fixed equilibrium position perpendicular (transverse) or parallel (longitudinal) to the wave direction, executing periodic motion while the wave profile moves through the medium.", "source": "Kimi K2.6 ②", "_id": "kimi_2_28"}, {"question": "The luminosity of a star scales according to $$L \\propto r^2 T^4$$. If a star's radius is multiplied by $$100$$ and its surface temperature is halved, determine the factor by which its luminosity changes using mental math and order-of-magnitude reasoning, explaining the competing effects. (3 steps)", "answer": "- Step 1: Radius effect. The radius increases by a factor of $$100$$ ($$10^2$$). Since $$L \\propto r^2$$, the luminosity scales by $$(10^2)^2 = 10^4$$ (or $$10,000$$). This massively increases the star's surface area and thus its luminosity.\n- Step 2: Temperature effect. The temperature is halved (multiplied by $$\\frac{1}{2}$$). Since $$L \\propto T^4$$, the luminosity scales by $$(\\frac{1}{2})^4 = \\frac{1}{16}$$. This decreases the energy emitted per unit area.\n- Step 3: Combined effect. Multiply the scaling factors together: $$10,000 \\times \\frac{1}{16}$$. \n+ Mental math: $$\\frac{10,000}{16} = \\frac{5,000}{8} = \\frac{2,500}{4} = 625$$. \n+ The luminosity increases by a factor of $$625$$. The massive increase in surface area easily overpowers the decrease in temperature.", "source": "Qwen 3 ②", "_id": "qwen_2_10"}, {"question": "A pulley redirects a rope with tension T on both sides. Explain intuitively why the force on the pulley coupling is 2T and not T.", "answer": "- Step 1: The rope is in equilibrium as a whole — it's not accelerating anywhere. So the *external* agent that holds the pulley in place must balance every force the rope exerts on it.\n- Step 2: The rope presses down on the pulley on the side attached to the load, with force T (the rope's tension pulling the pulley toward the load). The rope also presses down on the pulley on the side going to the motor, with force T (the rope's tension pulling the pulley toward the motor).\n- Step 3: The two forces point in different directions (one side of the pulley vs the other), but both pull *away* from the pulley centre. The coupling must hold the pulley *up* against both pulls. The total downward pull is T + T = 2T, so the coupling exerts 2T upward.\n+ Visual: imagine the pulley as a person holding a rope that has two people hanging off it, one on each side, each pulling down with force T. The person holding the rope feels 2T downward.\n+ ESAT trap: writing \"coupling feels T\" treats the rope as if it only pulls on one side. A redirected rope always pulls on both sides, so the coupling always feels 2T.", "source": "MiniMax ②", "_id": "minimax_2_37"}, {"question": "In a circuit, two points are connected only by an ideal wire (no resistor, no component). What is the potential difference between them, and why can't it be nonzero?", "answer": "- Step 1: An ideal wire has zero resistance. By V = IR, if R = 0 then V across the wire is 0, regardless of the current through it.\n- Step 2: Physically, if there *were* a potential difference between two wire-connected points, the free electrons in the metal would feel an enormous force and would rush around the circuit almost instantly to neutralise the imbalance. This happens on a timescale much shorter than anything else in the circuit.\n- Step 3: Therefore, in any DC analysis, points connected only by ideal wire are at the *same* potential.\n+ ESAT consequence: a voltmeter placed across a plain wire reads 0 V. The whole length of the wire is one equipotential.\n+ Contrast: a resistor in the circuit *can* sustain a potential difference, because it does work on the charge flowing through it (energy per unit charge is \"spent\" across the resistor). Wire cannot spend energy, so it cannot host a voltage drop.", "source": "MiniMax ②", "_id": "minimax_2_22"}, {"question": "In a parallel circuit, adding more branches *across* the same supply doesn't change the voltage across each existing branch, but it does increase the total current drawn from the battery. Explain this asymmetry intuitively. (2 steps)", "answer": "- Step 1: Each parallel branch is \"indifferent\" to the others — it's connected directly to the battery terminals by wire, so it always sees the *full* supply voltage. Adding a new branch doesn't disturb this.\n- Step 2: But the *battery* has to supply current to *every* branch. Each new branch draws its own $$I = V/R$$ from the battery, and the total current is the sum (Kirchhoff 1). So the battery's load — and the rate at which it drains — grows with each new branch.\n\nThe analogy: think of the battery as a tap with several hoses attached. Opening a new hose doesn't change the *pressure* (voltage) in the existing ones, but the *total water flow* (current) the tap must provide goes up.", "source": "MiniMax ①", "_id": "minimax_1_35"}, {"question": "Misconception probe: A student argues that if cosmic expansion stretches the wavelength of light, the light must also slow down to compensate, so the frequency stays the same. Why is this fundamentally wrong?", "answer": "Electromagnetic radiation in vacuum **always** travels at $$c$$, regardless of wavelength or frequency. This is a foundational result of physics — the speed of light in vacuum is invariant. In the equation $$c = f\\lambda$$, $$c$$ is the fixed constant, not $$f$$. When expansion stretches $$\\lambda$$, $$c$$ does not change; instead, $$f$$ must decrease to keep the product $$f\\lambda$$ equal to $$c$$. The student's error is treating $$f$$ as the constant and $$c$$ as the variable, which reverses the causal logic. The frequency drops precisely *because* the speed cannot.", "source": "GLM 5.1 ③", "_id": "glm_3_2"}, {"question": "Both ends of a bar are heated by the same amount, say 15 K. What happens to the conduction rate, and why? (Use C ∝ A·ΔT/L.)", "answer": "- Step 1: ΔT = T₁ − T₂ is the *difference* between the two ends, not the absolute temperature of either.\n- Step 2: Raising both T₁ and T₂ by the same amount leaves the difference unchanged: (T₁ + 15) − (T₂ + 15) = T₁ − T₂.\n- Step 3: Since ΔT is unchanged and A and L are unchanged, C is unchanged.\n+ Key insight: the conduction rate is driven by the temperature gradient, not the absolute temperature. Heating both ends equally is like adding the same number to the top and bottom of a fraction — the value of the fraction doesn't move.\n+ ESAT trap: the distractor options often involve \"raise T₁\" or \"raise T₂\" alone, which *would* change C. The correct answer is \"raise both by the same amount,\" which leaves C the same.", "source": "MiniMax ②", "_id": "minimax_2_13"}, {"question": "A nucleus needs to reduce A by 4 while leaving Z unchanged. What combination of alpha and beta-minus emissions achieves this? Why does this \"1 alpha + 2 beta\" pattern show up so often in ESAT nuclear questions?", "answer": "- Step 1: An alpha emission alone changes (ΔA, ΔZ) = (−4, −2). The proton number drops by 2, which is too far.\n- Step 2: To restore Z, we need beta-minus emissions, each of which gives ΔZ = +1 (ΔA = 0).\n- Step 3: Two betas give ΔZ = +2 in total. Net change from 1 alpha + 2 beta: ΔA = −4 + 0 + 0 = −4, ΔZ = −2 + 1 + 1 = 0. Exactly what we want.\n+ Why this is the canonical ESAT pattern: \"reduce A by 4 but keep Z the same\" appears in nuclear equations over and over, and the answer is *always* \"1 alpha + 2 beta-minus\" (or any reordering thereof, since the order doesn't change the net ΔA and ΔZ).\n+ Misconception trap: a common wrong answer is \"3 betas,\" but three betas would give ΔZ = +3, making Z *increase* by 3 and ΔA still 0, so neither A is reduced nor Z is preserved. You must emit real mass (an alpha) to drop A.", "source": "MiniMax ②", "_id": "minimax_2_7"}, {"question": "When a question asks for \"minimum tension\" or \"maximum power,\" why should you treat these words as hints about the physics, not just as arbitrary conditions? (2 steps)", "answer": "- Step 1: \"Minimum\" or \"maximum\" tells you that the answer depends on a variable quantity, and you should set that variable to its most extreme value. For maximum power in a fixed resistor, the variable is the other resistance — set it to minimum. For minimum tension in a pulley, the variable is the acceleration — set it to the given value (not higher).\n- Step 2: Without the \"minimum\" or \"maximum\" constraint, the problem would be underdetermined (infinite possible answers). The constraint makes it solvable by forcing you to consider the boundary case. ESAT questions use these words deliberately — they are signals telling you which quantity to extremise and which formula to apply.\n\nRead \"minimum\" as \"set all other quantities to their least favourable values\" and \"maximum\" as \"set all other quantities to their most favourable values.\"", "source": "GLM 5.1 ②", "_id": "glm_2_34"}, {"question": "In the same 12 V parallel circuit, a switch is closed that shorts out one of the 30 Ω resistors in branch B. What happens to the total current, and why?", "answer": "- Step 1: Before the switch is closed, branch B has 60 Ω total, so I_B = 0.2 A and the battery supplies 0.6 A.\n- Step 2: When the switch closes, it puts a zero-resistance wire across the lower 30 Ω resistor in branch B. Since both ends of that resistor are now connected by ideal wire, both ends are at the same potential, so V across that resistor = 0 and I through it = 0.\n- Step 3: All the current in branch B now flows through the short. Branch B is effectively a single 30 Ω resistor across 12 V, so I_B' = 12/30 = 0.4 A. Branch A is unchanged at 0.4 A.\n- Step 4: New total I_total' = 0.4 + 0.4 = 0.8 A. The current rose from 0.6 A to 0.8 A.\n+ Why it rises: a short removes a resistance from the circuit, lowering the equivalent resistance of branch B, which raises the current in that branch (and hence the total). The supply voltage is unchanged, but it's now driving current through a smaller total resistance.\n+ ESAT technique: when a switch shorts a resistor, the resistor is \"removed\" from the circuit (no current through it, no voltage across it). Recompute the circuit as if that resistor weren't there.", "source": "MiniMax ②", "_id": "minimax_2_24"}, {"question": "Two students discuss a circuit. One says: \"I just dropped the whole battery voltage across the 5 Ω resistor and got 4.8 A through it.\" The other says the current is 3 A. Who is right, and what is the conceptual mistake in the wrong answer? (2 steps)", "answer": "- Step 1: The 3 A answer is correct. The current is the same through every component in a **series** loop, so it must be computed using the *total* resistance: $$I = V_\\text{total} / R_\\text{total}$$.\n- Step 2: The mistake is treating the 5 Ω resistor as if it had the full 24 V across it *alone*. In a series circuit, the supply voltage is split between all the resistors, so each one only \"sees\" a fraction of the total.\n\nThe deeper point: Ohm's law $$V = IR$$ always uses the voltage *across that specific component*, not the supply voltage. If you use the supply voltage, you must use the *total* resistance.", "source": "MiniMax ①", "_id": "minimax_1_24"}, {"question": "For each of the following mechanics graphs, state the equation, the shape, and what the gradient represents: (a) GPE vs height, (b) work vs distance, (c) velocity vs time, (d) KE vs velocity.", "answer": "+ (a) GPE vs height: E_p = mgh. Linear, passes through origin (if h = 0 ⇒ E_p = 0). Gradient = mg.\n+ (b) Work vs distance: W = Fd. Linear. Gradient = the applied force F.\n+ (c) Velocity vs time: v = u + at. Linear, y-intercept = u, gradient = acceleration a.\n+ (d) KE vs velocity: E_k = ½mv². This is a **parabola** in v (quadratic), not a straight line. Gradient is not constant — it grows with v.\n+ Big idea: every \"y = (constant) × x\" graph is linear with the constant as the gradient. The moment the relationship is y ∝ x², the graph curves.\n+ ESAT trap: don't pick \"KE vs velocity is linear\" — it's the classic wrong answer in graph-matching questions.", "source": "MiniMax ②", "_id": "minimax_2_15"}, {"question": "The ESAT frequently tests electricity, nuclear physics, and efficiency questions (based on tutor observation). What foundational level are most of the electricity equations, and why does this make them tricky?", "answer": "Most electricity equations tested (Ohm's law $$V = IR$$, power $$P = IV = I^2R = V^2/R$$, potential divider formula, Kirchhoff's laws) are **GCSE/AS-level fundamentals**. They are not advanced A2 content. The trickiness comes from the **way they are asked**: the ESAT combines simple equations in novel, multi-step configurations (parallel branches with switches, series circuits with variable resistors, maximum-power constraints) under severe time pressure. The equations themselves are easy; the *application* is hard because you must quickly identify which form to use, which quantity is fixed, and how the circuit topology affects current and voltage distribution. Mastery means making the selection of method automatic.", "source": "GLM 5.1 ③", "_id": "glm_3_43"}, {"question": "State the three equivalent forms of electrical power dissipation and explain when to use each.", "answer": "+ P = IV — use this when you know current and voltage directly.\n+ P = I²R — use this when you know the current and the resistance (and not the voltage across R).\n+ P = V²/R — use this when you know the voltage and the resistance (and not the current through R).\n- Step 1: All three follow from P = IV and V = IR. Substituting V = IR into P = IV gives P = I × (IR) = I²R. Substituting I = V/R into P = IV gives P = (V/R) × V = V²/R.\n- Step 2: They are not three different physics laws; they are three algebraic rearrangements of the same two laws. Pick the form that uses the quantities you already have.\n+ ESAT technique: when the question gives a fixed resistor and a variable supply, you can't change R, so maximise current → use P = I²R and minimise the rest of the circuit's resistance. When the supply voltage is fixed and you can change R, use P = V²/R.", "source": "MiniMax ②", "_id": "minimax_2_19"}, {"question": "Why does the ESAT frequently test electricity more than other topics, and what does this mean for your preparation strategy? (2 steps)", "answer": "- Step 1: Based on tutor experience with past papers (NSAA/ESAT), electricity questions appear disproportionately often. They test multiple concepts simultaneously (Ohm's law, Kirchhoff's laws, power, potential dividers, parallel circuits) and can be made challenging with switches, variable resistors, and maximum/minimum conditions.\n- Step 2: Preparation strategy: prioritise electricity practice. Master the three power forms, Kirchhoff's laws, potential dividers, and parallel circuit analysis. Many ESAT electricity questions use GCSE-level equations but in unfamiliar combinations. Speed and accuracy come from making the methods automatic — identify the circuit type, choose the right formula, and compute quickly.\n\nThe ESAT rewards speed under pressure. Electricity is the most time-intensive topic, so making these methods automatic frees up time for other questions.", "source": "GLM 5.1 ②", "_id": "glm_2_56"}, {"question": "Both ends of a conducting bar are heated by exactly $$15\\,\\text{K}$$. What happens to the conduction rate, and what does this reveal about which temperature property actually drives heat flow? (2 steps)", "answer": "- Step 1: The conduction rate remains unchanged because the temperature difference $$\\Delta T = T_{1} - T_{2}$$ is unchanged; adding the same amount to both ends preserves the gap.\n- Step 2: This reveals that conduction depends on the relative difference between temperatures, not on their absolute values.", "source": "Kimi K2.6 ②", "_id": "kimi_2_8"}, {"question": "In a radioactive decay chain, a parent nucleus emits a combination of alpha ($$\\alpha$$) and beta-minus ($$\\beta^-$$) particles to become a daughter nucleus with a mass number decreased by 4 ($$\\Delta A = -4$$) but an unchanged proton number ($$\\Delta Z = 0$$). Deduce the exact number of $$\\alpha$$ and $$\\beta^-$$ particles emitted, walking through the conservation laws. (3 steps)", "answer": "- Step 1: Analyze the mass number ($$A$$). An alpha particle is a helium nucleus ($$^4_2\\text{He}$$), which reduces $$A$$ by 4. A beta-minus particle is an electron ($$^0_{-1}\\text{e}$$), which leaves $$A$$ unchanged. To achieve a net $$\\Delta A = -4$$, exactly **1 alpha particle** must be emitted.\n- Step 2: Analyze the proton number ($$Z$$) after the alpha decay. The emission of 1 alpha particle reduces the proton number by 2 ($$\\Delta Z = -2$$). The daughter nucleus is now at $$Z - 2$$.\n- Step 3: Restore the proton number. To get back to the original proton number ($$\\Delta Z = 0$$ overall), we need to increase $$Z$$ by +2. Since each beta-minus decay converts a neutron into a proton (increasing $$Z$$ by +1), we must emit exactly **2 beta-minus particles**. \n+ Conclusion: The decay chain consists of 1 alpha and 2 beta-minus particles.", "source": "Qwen 3 ②", "_id": "qwen_2_2"}, {"question": "If the mass in a pulley system is lowered (accelerating downward) instead of lifted, does the tension increase or decrease compared to the weight? What happens to the coupling force? (3 steps)", "answer": "- Step 1: When accelerating downward, the net force must be downward. Taking upward as positive: $$T - mg = ma$$, where a is negative (downward acceleration). So $$T = m(g + a)$$ with a < 0, meaning T < mg.\n- Step 2: For example, if a = −2 m/s² and g = 10 m/s²: $$T = m(10 - 2) = 8m$$. The tension is less than the weight because gravity is doing most of the pulling — the rope doesn't need to provide as much upward force.\n- Step 3: The coupling force is still 2T, but since T is smaller, the coupling force is smaller too. If the object were in free fall (a = −g), T = 0 and the coupling force would also be 0 — the rope would go slack.\n\nEdge case: if the object accelerates downward at exactly g, the tension drops to zero. The coupling force is always 2T, so it also drops to zero.", "source": "GLM 5.1 ②", "_id": "glm_2_30"}, {"question": "A radioactive nucleus undergoes decay to produce a daughter nucleus with a mass number 4 less, but the exact same proton number. What combination of alpha and beta-minus decays could achieve this? (3 steps)", "answer": "- Step 1: An alpha decay reduces the mass number by 4 and the proton number by 2 ($$\\Delta A = -4, \\Delta Z = -2$$). This matches the mass number requirement but leaves the proton number too low.\n- Step 2: A beta-minus decay leaves the mass number unchanged but increases the proton number by 1 ($$\\Delta A = 0, \\Delta Z = +1$$).\n- Step 3: To restore the proton number while keeping the mass number reduced by 4, we need two beta-minus decays ($$\\Delta Z = +2$$). Thus, 1 alpha decay followed by 2 beta-minus decays yields $$\\Delta A = -4$$ and $$\\Delta Z = 0$$.", "source": "GLM 5.1 ①", "_id": "glm_1_5"}, {"question": "In the formula $$C \\propto A \\cdot \\Delta T / L$$, what happens to the conduction rate if the bar is perfectly insulated on its sides and you double the length while keeping everything else constant? What physical reasoning explains this? (2 steps)", "answer": "- Step 1: Since $$C \\propto 1/L$$, doubling the length halves the conduction rate: C → C/2. The heat must travel twice as far through the bar, encountering twice the thermal resistance.\n- Step 2: The insulation on the sides means all heat must travel along the bar (no heat escapes sideways). A longer bar means each unit of heat energy must be passed between more atomic layers to get from the hot end to the cold end. Each layer adds resistance, so twice the length means twice the resistance and half the rate.\n\nThe insulation condition simplifies the problem: without it, some heat would escape through the sides, and the calculation would be much more complex. ESAT questions typically assume insulated bars for this reason.", "source": "GLM 5.1 ②", "_id": "glm_2_58"}, {"question": "For a spherical star, A = 4πr², so the Stefan-Boltzmann law gives L ∝ r²T⁴. If a star's radius is multiplied by k_r and its temperature by k_T, by what factor does its luminosity change? (3 steps)", "answer": "- Step 1: The new radius is r' = k_r · r and the new temperature is T' = k_T · T.\n- Step 2: New luminosity L' ∝ (r')² × (T')⁴ = (k_r · r)² × (k_T · T)⁴ = k_r² · r² · k_T⁴ · T⁴ = (k_r² · k_T⁴) × (r²T⁴).\n- Step 3: So L'/L = k_r² · k_T⁴. Luminosity scales as the *square* of the radius factor and the *fourth power* of the temperature factor.\n+ Quick intuition: temperature dominates. Doubling T (k_T = 2) alone multiplies L by 2⁴ = 16, even if r is unchanged. Doubling r alone only multiplies L by 4.\n+ This is why a small, very hot star can outshine a giant, cool one.", "source": "MiniMax ②", "_id": "minimax_2_28"}, {"question": "In one complete oscillation cycle, a wave particle starts at the top (amplitude $$A$$ above equilibrium), drops to equilibrium, continues to the bottom ($$A$$ below equilibrium), and returns to the top. How many amplitude-lengths of distance does the particle trace in one full cycle?", "answer": "The particle traces **4 amplitudes** of distance per cycle: $$4A$$.\n+ Top to equilibrium: distance $$A$$ (1 amplitude down)\n+ Equilibrium to bottom: distance $$A$$ (1 amplitude down)\n+ Bottom to equilibrium: distance $$A$$ (1 amplitude up)\n+ Equilibrium to top: distance $$A$$ (1 amplitude up)\nTotal: $$A + A + A + A = 4A$$. The particle goes down 2A and up 2A, but the total *path length* (distance travelled, not displacement) is 4A. Displacement after one full cycle is zero (it returns to where it started), but distance travelled is 4A.", "source": "GLM 5.1 ③", "_id": "glm_3_27"}, {"question": "The rate of thermal conduction C through a bar is given by C ∝ A·ΔT/L. Explain qualitatively *why* C is proportional to cross-sectional area A.", "answer": "- Step 1: Heat conduction is the transfer of thermal energy through a material. Energy carriers (electrons in metals, lattice vibrations / phonons in insulators) carry heat across the cross-section.\n- Step 2: Doubling the cross-sectional area A means you have twice as many \"lanes\" through which heat can flow per unit time, like doubling the number of lanes on a motorway.\n- Step 3: With twice as many carriers crossing per second, the rate of energy flow doubles. Direct proportionality to A is the natural consequence.\n+ Visual: imagine a pipe with water flowing through. Doubling the cross-section roughly doubles the flow rate (at the same pressure difference). The same logic applies to heat.", "source": "MiniMax ②", "_id": "minimax_2_9"}, {"question": "Misconception probe: A student says \"The CMBR is the afterglow of the Big Bang, so the Big Bang is still happening somewhere.\" Identify and correct the misconception.", "answer": "- The misconception: the Big Bang is not an *ongoing explosion* happening at some location. The Big Bang is the name for the *expansion of the universe itself* from a hot, dense early state, roughly 13.8 billion years ago.\n- Step 1: The CMBR is the light that *decoupled* from matter about 380,000 years after the Big Bang, when the universe became transparent. That light has been travelling through space ever since.\n- Step 2: We see it today not because the Big Bang is still happening, but because the light has only just reached us. The \"source\" of the CMBR is everywhere — it surrounds us in all directions, because the early universe was everywhere.\n- Step 3: There is no \"centre\" of the Big Bang in space. The expansion is the stretching of space itself, with no special origin point.\n+ The key intuition: the Big Bang happened *everywhere* — not at one place, but to the universe as a whole. The CMBR is the relic of the moment the universe first became transparent, observed now from a vantage point inside that very early light.\n+ This is the most common conceptual confusion about cosmology; getting it right sets the foundation for the rest of the topic.", "source": "MiniMax ②", "_id": "minimax_2_51"}, {"question": "What is the potential-divider equation for V₁ across R₁ in series with R₂, and *why* does the voltage split in proportion to the resistances?", "answer": "- Step 1: In a series circuit the same current I flows through both resistors. The total voltage V must be the sum: V = V₁ + V₂ = I(R₁ + R₂).\n- Step 2: Solve for I: I = V/(R₁ + R₂). Then V₁ = I × R₁ = R₁ × V/(R₁ + R₂), so V₁ = [R₁/(R₁ + R₂)] × V. Same form for V₂ with R₂ in the numerator.\n- Step 3: Bigger resistance gets a bigger share of the voltage. The ratio V₁/V₂ = R₁/R₂ — voltage splits in the same ratio as the resistance.\n+ Intuition: a bigger resistance \"absorbs\" more voltage per unit current, just as a stiffer spring absorbs more force per unit extension. The supply's voltage is the budget, and the resistors spend it in proportion to their R.\n+ ESAT use: this lets you find the voltage across one resistor in a series pair without first computing the current — useful when the question gives you the supply voltage and the two resistances.", "source": "MiniMax ②", "_id": "minimax_2_21"}, {"question": "In a transverse wave, a single particle oscillates about its equilibrium position. Explain why the total distance traveled by this particle during one complete cycle is exactly four times the amplitude ($$4A$$), rather than just $$2A$$ or $$1A$$. (2 steps)", "answer": "- Step 1: The amplitude $$A$$ is the maximum displacement from the equilibrium (rest) position. If a particle starts at the equilibrium and completes one full cycle, it must travel to the maximum positive peak (distance = $$A$$), then all the way down to the maximum negative trough (distance = $$2A$$), and finally back up to the equilibrium position (distance = $$A$$).\n- Step 2: Summing these distinct legs of the journey: $$A$$ (up) + $$A$$ (down to rest) + $$A$$ (down to trough) + $$A$$ (up to rest) = $$4A$$. \n+ *Note:* Even if the particle starts at a peak or trough, the total path length covered in one full oscillation remains exactly $$4A$$ because it must traverse the full vertical span twice.\n\n*Takeaway: Wave particles do not travel with the wave; they just oscillate locally, covering $$4A$$ per cycle.*", "source": "Qwen 3 ④", "_id": "qwen_4_17"}, {"question": "The rate of thermal conduction C is given by C ∝ A·ΔT/L. Explain qualitatively *why* C is proportional to the temperature difference ΔT = T₁ − T₂, rather than to T₁ or T₂ separately.", "answer": "- Step 1: Heat flows only because one end is hotter than the other. If both ends are at the same temperature, the carriers on each side have the same average energy, and there is no *net* flow — random thermal motion in both directions cancels out.\n- Step 2: The bigger the temperature difference, the bigger the imbalance in average carrier energy between the two ends, and the steeper the energy gradient driving the flow.\n- Step 3: Therefore C depends on the *difference* ΔT = T₁ − T₂, not on T₁ or T₂ individually. Doubling both T₁ and T₂ leaves ΔT unchanged, so C is unchanged.\n+ Edge case: ΔT = 0 ⇒ C = 0. The proportionality must collapse at zero difference, which is why a linear-in-ΔT law (rather than a quadratic or exponential one) is the natural local form near equilibrium.\n+ Common misconception: \"raising the temperature of the bar will increase conduction.\" Not necessarily — only raising the *difference* does. This is exactly the kind of trick the ESAT loves to set.", "source": "MiniMax ②", "_id": "minimax_2_11"}, {"question": "In a thermal conduction problem, the bar is described as \"insulated along its sides.\" Why does this phrase matter for whether the formula $$C \\propto A\\Delta T / L$$ is even valid?", "answer": "- Step 1: The formula assumes that *all* the heat entering one end of the bar either travels through the bar or stays in the bar — none of it leaks out through the sides into the surroundings.\n- Step 2: \"Insulated along the sides\" guarantees exactly that: heat cannot escape sideways, so the only pathway is along the length $$L$$ from hot end to cold end.\n- Step 3: Without that insulation, some heat would be lost radially, and the actual conduction rate along the bar would be *less* than the formula predicts. The formula only works when the assumption of purely longitudinal flow holds.\n\nIt's a bit like saying the river only flows between the two banks — insulation keeps the heat \"in the channel.\"", "source": "MiniMax ①", "_id": "minimax_1_7"}, {"question": "You want to maximise the power dissipated in a fixed resistor R that is in series with a variable resistor. Which form of the power equation should you use, and why? What do you set the variable resistor to? (3 steps)", "answer": "- Step 1: Power has three forms: $$P = IV$$, $$P = I^2R$$, and $$P = V^2/R$$. Since R is fixed (it's the resistor we're maximising power in), we should use the form where R appears and the other variable is something we can control.\n- Step 2: Use $$P = I^2R$$. Since R is fixed, maximising P means maximising I. The current depends on the total resistance in the circuit: $$I = V/R_{total}$$. To maximise I, we must minimise $$R_{total}$$.\n- Step 3: $$R_{total} = R + R_{variable}$$. Since R is fixed, the minimum total resistance occurs when the variable resistor is set to its minimum value. So set the variable resistor to its minimum and use $$P = I^2R$$ with the maximised current.\n\nKey principle: choose the power form that isolates the fixed quantity (here R), then maximise the remaining variable (here I) by minimising all other resistances.", "source": "GLM 5.1 ②", "_id": "glm_2_14"}, {"question": "The rate of thermal conduction C is given by C ∝ A·ΔT/L. Explain qualitatively *why* C is inversely proportional to length L.", "answer": "- Step 1: Heat is deposited at the hot end and removed at the cold end. The energy has to \"leak\" all the way through the bar.\n- Step 2: The longer the bar, the more material the heat has to traverse, and the more opportunities there are for the heat carriers to lose energy along the way (collisions, scattering).\n- Step 3: For a uniform material, doubling L doubles the thermal \"resistance\" — the same way doubling the length of an electrical resistor doubles its resistance to current. Therefore C is inversely proportional to L.\n+ Intuition: a thin foil conducts heat away fast; a thick wall insulates well. The trade-off is exactly captured by 1/L.", "source": "MiniMax ②", "_id": "minimax_2_10"}, {"question": "A 24 V supply drives current through a variable resistor (minimum value 3 Ω) in series with a fixed 5 Ω resistor. How do you maximise the power dissipated in the 5 Ω resistor, and why?", "answer": "- Step 1: The 5 Ω resistor is fixed — its R can't change. To maximise P in this resistor, maximise the current through it.\n- Step 2: Use P = I²R. With R fixed, P scales with I², so bigger I ⇒ bigger P.\n- Step 3: For a series circuit, I = V_total / R_total. To maximise I at fixed V_total = 24 V, minimise R_total. So set the variable resistor to its minimum value, 3 Ω.\n- Step 4: R_total = 3 + 5 = 8 Ω, so I = 24/8 = 3 A, and P = I²R = 3² × 5 = 45 W.\n+ Alternative check: P = V²/R for the 5 Ω resistor. Voltage across it = (5/8) × 24 = 15 V (potential divider). P = 15²/5 = 225/5 = 45 W. Same answer.\n+ ESAT trap: a common wrong answer is to put the full 24 V across the 5 Ω (I = 24/5 = 4.8 A). That ignores the voltage drop across the other resistor and the need to divide by the *total* series resistance.", "source": "MiniMax ②", "_id": "minimax_2_20"}, {"question": "In ESAT mechanics questions, when the problem specifies a \"minimum\" or \"maximum\" value (e.g., \"minimum tension,\" \"maximum power\"), what strategic hint does this give you?", "answer": "The \"minimum\" or \"maximum\" is not just describing the answer — it is a **hint about what makes the problem solvable**. If the question asks for \"minimum tension,\" it means the tension would otherwise be unbounded (you could accelerate the mass infinitely fast, requiring infinite tension), so the minimum gives you the specific condition where you *can* calculate a definite answer (often the case where the system is just barely working, or where a variable is at its extreme value). Similarly, \"maximum power\" tells you to push a variable resistor to its minimum, because that's the extreme that maximises current. Read min/max as the exam telling you: \"set the variable to its extreme — that's the solvable case.\"", "source": "GLM 5.1 ③", "_id": "glm_3_36"}, {"question": "Edge case: Why is the minimum tension in a pulley problem the value that matches the requested kinematics? What would happen if the rope tension were larger than that minimum?", "answer": "- Step 1: Newton's second law is a one-to-one map: given F_res, the acceleration is determined by a = F_res/m. Conversely, given the acceleration, F_res is determined.\n- Step 2: F_res = T − mg. So given a, T is uniquely determined: T = m(g + a).\n- Step 3: If the rope tension were *larger* than this T, then F_res would be larger than ma, and the mass would accelerate *faster* upward — not at the requested 0.8 m/s². The mass would still rise, but the question's answer would be ill-defined.\n+ Why \"minimum\" is the magic word: the question says \"minimum tension\" because that's the *unique* value that produces the *specified* acceleration. Any larger tension is also physically possible but would correspond to a different (larger) acceleration. The keyword \"minimum\" pins the kinematics to a single value of T.\n+ ESAT pattern: whenever you see \"minimum\" or \"maximum\" in a mechanics question, treat it as a hint that the kinematics determine the answer uniquely only at that extremum.", "source": "MiniMax ②", "_id": "minimax_2_48"}, {"question": "Misconception probe: A student says \"In a potential divider, the current through R₁ is V/R₁, where V is the supply voltage.\" Identify the misconception and the correct procedure.", "answer": "- The misconception: treating each resistor in the series chain as if it had the *full* supply voltage across it. In a series circuit, the supply voltage is *shared* across the resistors, not given in full to each one.\n- Step 1: The current through R₁ is the same as the current through R₂ (series), so it must be calculated using the *total* resistance.\n- Step 2: I = V_total / R_total = V / (R₁ + R₂).\n- Step 3: To find the voltage across R₁, use the potential divider: V₁ = [R₁/(R₁ + R₂)] × V. Or use I × R₁ with the correct I.\n+ Concrete example: 24 V supply, 3 Ω in series with 5 Ω. The wrong answer is I = 24/3 = 8 A (or 24/5 = 4.8 A). The right answer is I = 24/(3+5) = 24/8 = 3 A, with V₅ = 3 × 5 = 15 V.\n+ Why this is so common: students want to \"use\" the supply voltage immediately, before doing the series analysis. The discipline is: series first, then the supply voltage drops across the total.", "source": "MiniMax ②", "_id": "minimax_2_38"}, {"question": "A fixed resistor of $$R = 5\\,\\Omega$$ is in series with a **variable** resistor whose value can be anywhere from $$3\\,\\Omega$$ to some maximum. The supply is a fixed 24 V. What setting of the variable resistor gives maximum power dissipated in the $$5\\,\\Omega$$ resistor, and why? (3 steps)", "answer": "- Step 1: The power in the **fixed** $$5\\,\\Omega$$ resistor is $$P = I^2 R$$ with $$R$$ fixed. So $$P$$ is largest when the **current $$I$$ is largest**.\n- Step 2: Current is largest when **total resistance is smallest** ($$I = V/R_\\text{total}$$ with $$V$$ fixed). Total resistance is $$5\\,\\Omega + R_\\text{var}$$, so make $$R_\\text{var}$$ as small as possible: **$$3\\,\\Omega$$**.\n- Step 3: Then $$R_\\text{total} = 8\\,\\Omega$$, $$I = 24/8 = 3\\,\\text{A}$$, and $$P = 3^2 \\times 5 = 45\\,\\text{W}$$.\n\n**Trap to avoid:** don't \"drop the whole 24 V across the 5 Ω\" and use $$I = 24/5 = 4.8\\,\\text{A}$$ — that ignores the variable resistor in series. The current must travel through *both* resistors, so divide by the *total* resistance.", "source": "MiniMax ①", "_id": "minimax_1_11"}, {"question": "ESAT \"maximum\"/\"minimum\" cues: a question says \"find the *minimum* tension in the rope.\" The tutor in the lesson says \"minimum\" is often a hint that the question would otherwise be unsolvable. Why would the *minimum* matter specifically, and what does it tell you about the *direction* of motion or acceleration?", "answer": "- Step 1: Tension is bounded below by what is needed to support the load and produce the stated acceleration. If acceleration is upward, you need at least $$T = m(g+a)$$ to provide the upward net force.\n- Step 2: A *larger* tension would also produce upward acceleration, but the question is presumably specifying the *smallest* tension consistent with the stated motion. The \"minimum\" tells you the rope is *just barely* doing its job — no slack, no extra pull.\n- Step 3: If the rope were to *drop* the load (acceleration downward or zero), the tension could be lower, and the question would be ambiguous. \"Minimum\" pins down the scenario: the rope is *just* holding/lifting at the stated acceleration, and any less tension would let the load fall.\n\nIn short: \"minimum/maximum\" in mechanics usually fixes the *boundary case* of a constraint — it's the only value at which the given scenario is consistent.", "source": "MiniMax ①", "_id": "minimax_1_34"}, {"question": "A nucleus undergoes decay that reduces its mass number by 4 but leaves its proton number unchanged. What combination of alpha and beta-minus decays produces this result? Walk through the arithmetic. (3 steps)", "answer": "- Step 1: One alpha emission changes the nucleus by $$\\Delta A = -4$$ and $$\\Delta Z = -2$$. This gets the mass number reduction we want (−4), but it also lowers the proton number by 2, which we don't want.\n- Step 2: Each beta-minus emission changes the nucleus by $$\\Delta A = 0$$ and $$\\Delta Z = +1$$. To cancel the $$-2$$ shift in $$Z$$ from the alpha, we need exactly **two** beta-minus emissions: $$2 \\times (+1) = +2$$, restoring $$Z$$ to its original value.\n- Step 3: The total effect of **1 alpha + 2 beta-minus** is: $$\\Delta A = -4 + 0 + 0 = -4$$ and $$\\Delta Z = -2 + 1 + 1 = 0$$. Mass number drops by 4, proton number unchanged. This \"1α + 2β\" pattern is a classic ESAT recurrence.\n\nTakeaway: Alpha reduces both $$A$$ and $$Z$$; beta-minus only increases $$Z$$. Two betas exactly undo the alpha's proton-number change.", "source": "GLM 5.1 ③", "_id": "glm_3_7"}, {"question": "On a work–distance graph ($$W$$ vs $$d$$), what does the gradient represent, and how can you verify this from the equation? What about the gradient of a GPE–height graph? (2 steps)", "answer": "- Step 1: For a work–distance graph, the equation is $$W = Fd$$ (for a constant force in the direction of motion). This is of the form $$y = mx$$ where y = W, x = d, and the gradient m = F. So the gradient of a W vs d graph is the force. For example, a gradient of 5 N/distance-unit means the force is 5 N.\n- Step 2: For a GPE–height graph, the equation is $$E_p = mgh$$. This is also linear: $$y = (mg) \\cdot h$$, so the gradient is mg (the weight). If m = 2 kg and g = 10 m/s², the gradient would be 20 N. A steeper gradient means a heavier object or stronger gravitational field.\n\nBoth are linear relationships, so both have co
