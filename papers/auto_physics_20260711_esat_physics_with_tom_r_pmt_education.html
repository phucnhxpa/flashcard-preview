cay chain results in a daughter nucleus that has a mass number ($$A$$) reduced by 4, but its proton number ($$Z$$) remains completely unchanged compared to the parent. Walk through the logical deduction of which particles must have been emitted. (3 steps)", "answer": "- Step 1: To reduce the mass number $$A$$ by 4, the nucleus must emit exactly one alpha particle, because alpha is the only standard decay particle with mass ($$\\Delta A = -4$$). Beta and gamma have $$\\Delta A = 0$$.\n- Step 2: However, emitting one alpha particle also reduces the proton number by 2 ($$\\Delta Z = -2$$). To leave the final proton number unchanged, we must add 2 back to $$Z$$.\n- Step 3: Each beta-minus emission increases $$Z$$ by 1 ($$\\Delta Z = +1$$). Therefore, we need exactly two beta-minus emissions to cancel out the $$-2$$ from the alpha. The chain is: 1 alpha + 2 beta-minus particles.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Why does gamma ($$\\gamma$$) emission frequently accompany alpha or beta decay, and what effect does it have on the balancing of $$A$$ and $$Z$$ in a nuclear equation? (2 steps)", "answer": "- Step 1: After an alpha or beta decay, the daughter nucleus is often left in an excited, high-energy quantum state. To reach a stable ground state, it releases this excess energy by emitting a gamma ray (a high-energy photon).\n- Step 2: Because a gamma ray is pure electromagnetic energy ($$^0_0\\gamma$$) with no mass or charge, it has $$\\Delta A = 0$$ and $$\\Delta Z = 0$$. Therefore, it does not affect the balancing of nucleon or proton numbers in a nuclear equation.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "What are the three physical parameters that dictate the rate of thermal conduction ($$C$$) through a solid insulated bar, and how does each proportionally affect the rate? (2 steps)", "answer": "- Step 1: The rate of thermal conduction is governed by the relationship $$C \\propto \\frac{A \\cdot \\Delta T}{L}$$. The three parameters are cross-sectional area ($$A$$), temperature difference between the ends ($$\\Delta T$$), and the length of the bar ($$L$$).\n- Step 2: Conceptually, a larger area ($$A$$) provides more \"pathways\" for heat to flow (directly proportional). A larger temperature difference ($$\\Delta T$$) provides a stronger \"driving force\" for heat transfer (directly proportional). A longer bar ($$L$$) means heat has to travel further, increasing resistance to flow (inversely proportional).", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "If you double the cross-sectional area of a copper bar, what specific change must you make to its length to maintain the exact same rate of thermal conduction, assuming the temperature difference remains constant? (2 steps)", "answer": "- Step 1: The rate of conduction is proportional to the ratio of area to length: $$C \\propto \\frac{A}{L}$$.\n- Step 2: If the new area is $$2A$$, the new ratio is $$\\frac{2A}{L_{new}}$$. To keep this ratio equal to the original $$\\frac{A}{L}$$, you must also double the length ($$L_{new} = 2L$$). This keeps the $$\\frac{A}{L}$$ fraction unchanged.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "Misconception probe: If you increase the absolute temperature of *both* ends of an insulated metal bar by the exact same amount (e.g., adding 50 K to both the hot and cold ends), how does the rate of thermal conduction change, and why? (2 steps)", "answer": "- Step 1: The rate of thermal conduction does not change; it remains exactly the same.\n- Step 2: The driving force for thermal conduction is the temperature *difference* ($$\\Delta T = T_{hot} - T_{cold}$$), not the absolute temperatures. If you add 50 K to both ends, the new difference is $$(T_{hot} + 50) - (T_{cold} + 50) = T_{hot} - T_{cold}$$. Since $$\\Delta T$$ is unchanged, the rate of conduction is unchanged.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": true}, {"question": "When plotting Kinetic Energy ($$E_k$$) against velocity ($$v$$), what is the mathematical shape of the graph, and why is it fundamentally different from a Work vs. Distance graph? (2 steps)", "answer": "- Step 1: The equation for kinetic energy is $$E_k = \\frac{1}{2}mv^2$$. Because velocity is squared, the relationship is quadratic, meaning the graph of $$E_k$$ vs $$v$$ is a parabola (a curve starting at the origin and getting steeper).\n- Step 2: In contrast, Work done is $$W = Fd$$. Assuming a constant force, this is a linear relationship ($$y = mx$$), so a Work vs. Distance graph is a straight line. The fundamental difference is that kinetic energy scales with the *square* of the kinematic variable, while work scales *linearly* with distance.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": true}, {"question": "How can you determine the net force acting on an object purely from a Work-Distance graph, and what physical assumption must be true for the graph to pass through the origin? (2 steps)", "answer": "- Step 1: The equation for work is $$W = F \\times d$$. On a graph with Work on the y-axis and Distance on the x-axis, the gradient (slope) is $$\\frac{\\Delta W}{\\Delta d}$$, which is exactly equal to the constant net force $$F$$.\n- Step 2: For the graph to pass through the origin ($$0,0$$), the physical assumption is that zero work is done when the object has moved zero distance. This implies the force is applied starting from a reference point of zero displacement, and there is no initial \"offset\" of work or energy in the system being measured.", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "What is the gradient of a Gravitational Potential Energy ($$E_p$$) vs. Height ($$h$$) graph, and does the object's velocity or acceleration affect this gradient? (2 steps)", "answer": "- Step 1: The equation for GPE is $$E_p = mgh$$. On a graph with $$E_p$$ on the y-axis and $$h$$ on the x-axis, the gradient is $$\\frac{\\Delta E_p}{\\Delta h} = mg$$ (the weight of the object).\n- Step 2: The object's velocity or acceleration does *not* affect this gradient. GPE depends purely on the object's mass, the gravitational field strength, and its vertical position. Whether the object is stationary, moving at constant velocity, or accelerating, the energy stored per unit height remains exactly $$mg$$.", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "In a series circuit with a fixed resistor ($$R_{fixed}$$) and a variable resistor ($$R_{var}$$), which mathematical form of the power equation is most conceptually useful to find the *maximum* power dissipated by the fixed resistor, and why? (3 steps)", "answer": "- Step 1: The most useful form is $$P = I^2 R_{fixed}$$.\n- Step 2: Because $$R_{fixed}$$ is a constant, maximizing power strictly requires maximizing the current ($$I$$) flowing through it.\n- Step 3: To maximize current in a series circuit ($$I = \\frac{V_{supply}}{R_{fixed} + R_{var}}$$), you must minimize the total resistance. Therefore, you simply set the variable resistor to its minimum possible value. (Using $$P = \\frac{V^2}{R}$$ is dangerous here because the voltage across the fixed resistor changes as you adjust the variable resistor).", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "Why do all points connected by an ideal wire in a DC circuit sit at the exact same electric potential, and what would physically happen if they didn't? (2 steps)", "answer": "- Step 1: An ideal wire has zero resistance. According to Ohm's law ($$V = IR$$), if $$R = 0$$, the potential difference ($$V$$) across any segment of the wire must be zero, meaning the potential is identical at all points along it.\n- Step 2: Conceptually, if there were a potential difference between two points connected by a wire, it would create an electric field. Because electrons in a conductor are highly mobile, they would redistribute themselves almost instantaneously to cancel out this field, erasing the potential difference.", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "Misconception probe: In a parallel circuit connected to a fixed voltage supply, if you close a switch that shorts out (bypasses) one of the resistors in Branch A, how does this affect the current flowing through a completely separate Branch B, and why? (2 steps)", "answer": "- Step 1: The current in Branch B remains completely unchanged.\n- Step 2: In a parallel circuit, every branch is connected directly across the same two nodes (the same potential difference). Because the power supply maintains a fixed voltage, and the resistance of Branch B hasn't changed, Ohm's law ($$I_B = \\frac{V}{R_B}$$) dictates that the current in Branch B must stay exactly the same. The short circuit only increases the current in Branch A and the total current drawn from the battery.", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": true}, {"question": "Walk through the potential divider rule: If a 12V supply is connected across two series resistors ($$R_1 = 30\\Omega$$ and $$R_2 = 60\\Omega$$), how is the voltage distributed, and conceptually why does the larger resistor take the larger share? (3 steps)", "answer": "- Step 1: First, find the total resistance: $$R_{total} = 30 + 60 = 90\\Omega$$. The current flowing through the series loop is $$I = \\frac{V}{R_{total}} = \\frac{12}{90} = \\frac{2}{15} \\text{ A}$$.\n- Step 2: Calculate the voltage across each resistor using $$V = IR$$. For $$R_1$$: $$V_1 = (\\frac{2}{15}) \\times 30 = 4\\text{V}$$. For $$R_2$$: $$V_2 = (\\frac{2}{15}) \\times 60 = 8\\text{V}$$. (Alternatively, use the ratio: $$R_2$$ is twice $$R_1$$, so it gets twice the voltage: 8V vs 4V).\n- Step 3: Conceptually, the same current must push through both resistors. The larger resistor ($$60\\Omega$$) offers twice the \"friction\" (resistance) to the flow of electrons. Therefore, the charges must expend twice as much energy (voltage drop) to get through the larger resistor compared to the smaller one.", "source": "Qwen 3 ①", "_id": "qwen_1_15", "judge_pick": false}, {"question": "State Kirchhoff's First and Second laws, and explain which fundamental conservation principle each law represents in physics. (2 steps)", "answer": "- Step 1: Kirchhoff's First Law states that the sum of currents entering a junction equals the sum of currents leaving it ($$\\Sigma I_{in} = \\Sigma I_{out}$$). This represents the **Conservation of Charge**, because charge cannot be created, destroyed, or pile up at a junction.\n- Step 2: Kirchhoff's Second Law states that the sum of the electromotive forces (EMFs) equals the sum of the potential differences ($$IR$$ drops) around any closed loop ($$\\Sigma \\text{EMF} = \\Sigma IR$$). This represents the **Conservation of Energy**, because a unit of charge traveling in a complete loop must gain exactly as much energy from the battery as it dissipates through the components.", "source": "Qwen 3 ①", "_id": "qwen_1_16", "judge_pick": false}, {"question": "When applying Kirchhoff's Second Law to a closed loop, explain conceptually why the sum of the EMFs must equal the sum of the potential differences, using the definition of voltage as energy per unit charge. (2 steps)", "answer": "- Step 1: EMF is defined as the electrical energy *supplied* to each unit of charge by the power source (Joules per Coulomb). Potential difference (p.d.) is the energy *transferred* (dissipated or stored) by each unit of charge as it passes through a component.\n- Step 2: When a specific packet of charge completes one full loop and returns to its starting point, it must have spent all the energy it was given. It cannot retain extra energy (otherwise energy would be created out of nowhere each loop), nor can it have a deficit (otherwise energy would vanish). Thus, energy supplied (EMF) must exactly equal energy spent (p.d.).", "source": "Qwen 3 ①", "_id": "qwen_1_17", "judge_pick": false}, {"question": "According to the Stefan-Boltzmann law, how does a star's total luminosity ($$L$$) scale mathematically with its radius ($$r$$) and its absolute surface temperature ($$T$$)? (2 steps)", "answer": "- Step 1: The Stefan-Boltzmann law states that the power radiated per unit area is proportional to $$T^4$$. The total surface area of a spherical star is $$4\\pi r^2$$.\n- Step 2: Combining these, luminosity is $$L = \\sigma (4\\pi r^2) T^4$$. Therefore, luminosity scales proportionally to the square of the radius and the fourth power of the temperature: $$L \\propto r^2 T^4$$.", "source": "Qwen 3 ①", "_id": "qwen_1_18", "judge_pick": false}, {"question": "If a star's radius increases by a factor of 100, but its surface temperature is halved, by what overall factor does its luminosity change? Walk through the mental scaling math. (3 steps)", "answer": "- Step 1: Identify the scaling factors for each variable. The radius scaling factor is $$k_r = 100$$. The temperature scaling factor is $$k_T = \\frac{1}{2}$$.\n- Step 2: Apply the luminosity proportionality $$L \\propto r^2 T^4$$. The overall luminosity scaling factor is $$(k_r)^2 \\times (k_T)^4$$.\n- Step 3: Calculate the final factor: $$(100)^2 \\times (\\frac{1}{2})^4 = 10,000 \\times \\frac{1}{16}$$. Mentally, $$\\frac{10,000}{16} = \\frac{2,500}{4} = 625$$. The luminosity increases by a factor of 625.", "source": "Qwen 3 ①", "_id": "qwen_1_19", "judge_pick": false}, {"question": "In a transverse wave, how far does a single particle travel during one complete oscillation cycle in terms of the wave's amplitude ($$A$$), and why is this distance fundamentally different from the wavelength ($$\\lambda$$)? (2 steps)", "answer": "- Step 1: During one full cycle, a particle moves from equilibrium to the crest ($$A$$), down to the trough ($$2A$$), and back to equilibrium ($$A$$). Total distance traveled by the particle is $$4A$$.\n- Step 2: This is fundamentally different from wavelength ($$\\lambda$$) because wavelength is the horizontal distance the *wave shape* travels in one cycle. The particle only oscillates vertically (transverse) and does not travel horizontally with the wave; it just transfers energy to the next particle.", "source": "Qwen 3 ①", "_id": "qwen_1_20", "judge_pick": false}, {"question": "If a transverse wave has an amplitude of 5 cm and a frequency of 2 Hz, what is the total vertical distance traveled by a single particle in 3 seconds? (3 steps)", "answer": "- Step 1: Calculate the distance traveled in one single cycle. Since distance per cycle is $$4A$$, we have $$4 \\times 5\\text{ cm} = 20\\text{ cm}$$.\n- Step 2: Calculate the total number of cycles in 3 seconds. Frequency is 2 Hz (2 cycles per second), so in 3 seconds there are $$2 \\times 3 = 6$$ cycles.\n- Step 3: Multiply the distance per cycle by the total number of cycles: $$20\\text{ cm/cycle} \\times 6\\text{ cycles} = 120\\text{ cm}$$ (or 1.2 meters).", "source": "Qwen 3 ①", "_id": "qwen_1_21", "judge_pick": false}, {"question": "Misconception probe: When a motor lifts a mass $$m$$ upwards with an acceleration $$a$$, why is the tension ($$T$$) in the lifting rope not simply equal to the weight of the mass ($$mg$$)? (2 steps)", "answer": "- Step 1: If the tension were exactly equal to the weight ($$T = mg$$), the net resultant force on the mass would be zero ($$T - mg = 0$$). According to Newton's First Law, the mass would either remain stationary or move at a constant velocity.\n- Step 2: To accelerate the mass upwards, there must be a net upward resultant force ($$F_{res} = ma$$). Therefore, the upward tension must overcome gravity *and* provide the extra force for acceleration: $$T - mg = ma \\implies T = m(g + a)$$. The tension must be strictly greater than the weight.", "source": "Qwen 3 ①", "_id": "qwen_1_22", "judge_pick": false}, {"question": "Walk through the derivation of the force exerted on the coupling/axle of a simple, ideal pulley that redirects a rope lifting a mass. Conceptually, why is the force on the coupling equal to $$2T$$? (3 steps)", "answer": "- Step 1: The rope passes over the pulley. On one side, the motor pulls the rope down with tension $$T$$. On the other side, the rope pulls down on the pulley with the tension $$T$$ required to lift the mass.\n- Step 2: Assuming an ideal, frictionless pulley, the tension is uniform throughout the continuous rope. Therefore, the pulley experiences a downward pull of $$T$$ from the motor side, and a downward pull of $$T$$ from the mass side.\n- Step 3: To keep the pulley stationary (in equilibrium), the coupling or axle holding the pulley to the ceiling must exert an upward force equal to the sum of these two downward pulls: $$F_{coupling} = T + T = 2T$$. The pulley acts as a vector redirector, but the axle must support the physical load of both rope segments.", "source": "Qwen 3 ①", "_id": "qwen_1_23", "judge_pick": false}, {"question": "If an ESAT mechanics question asks for the \"minimum\" tension required to lift a mass via a pulley, what physical scenario does this \"minimum\" imply about the acceleration, and why do examiners use the word \"minimum\"? (2 steps)", "answer": "- Step 1: The \"minimum\" tension implies the scenario where the mass is lifted at a constant velocity (or is just on the verge of moving), meaning acceleration $$a = 0$$. In this case, $$T_{min} = m(g + 0) = mg$$. Any acceleration $$a > 0$$ would require a higher tension ($$T = m(g+a)$$).\n- Step 2: Examiners use the word \"minimum\" to make the question mathematically solvable. If they just said \"lifting a mass\", the acceleration could be anything, making the tension impossible to calculate without more data. \"Minimum\" locks the acceleration to zero, testing if you understand the boundary condition between static/constant velocity and accelerated motion.", "source": "Qwen 3 ①", "_id": "qwen_1_24", "judge_pick": true}], "count": 25}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Conceptually, explain why the Cosmic Microwave Background Radiation (CMBR) is observed in the microwave region today, despite originating as high-energy gamma radiation in the early universe, and state what fundamental property of light remains unchanged during this process. (2 steps)", "answer": "- Step 1: The universe has been expanding since the Big Bang. This expansion physically stretches the fabric of space itself, which in turn stretches the wavelength ($$\\lambda$$) of the photons traveling through it. The original high-energy gamma rays (short $$\\lambda$$, high frequency $$f$$) are stretched into the microwave region (long $$\\lambda$$, low $$f$$).\n- Step 2: The fundamental property that remains unchanged is the speed of light ($$c$$) in a vacuum. According to the wave equation $$c = f\\lambda$$, because $$c$$ is constant, an increase in wavelength ($$\\lambda$$) mathematically forces a proportional decrease in frequency ($$f$$). The photons lose energy ($$E = hf$$) due to this frequency drop, not because they slow down.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "A student argues that because the CMBR photons have lost energy (shifting from gamma to microwave), they must have slowed down over billions of years of travel. Refute this using the fundamental wave equation and the nature of electromagnetic waves. (2 steps)", "answer": "- Step 1: Electromagnetic waves, including gamma rays and microwaves, always travel at the exact same constant speed ($$c \\approx 3 \\times 10^8 \\text{ m/s}$$) in a vacuum, regardless of their energy, frequency, or wavelength. They do not slow down over time or distance.\n- Step 2: The energy of a photon is determined by its frequency, given by Planck's equation $$E = hf$$. As cosmological expansion stretches the wavelength ($$\\lambda$$), the wave equation $$c = f\\lambda$$ dictates that the frequency ($$f$$) must decrease. Therefore, the photon loses energy because its frequency drops, entirely independent of its speed, which remains strictly $$c$$.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": true}, {"question": "In a radioactive decay chain, a parent nucleus emits a combination of alpha ($$\\alpha$$) and beta-minus ($$\\beta^-$$) particles to become a daughter nucleus with a mass number decreased by 4 ($$\\Delta A = -4$$) but an unchanged proton number ($$\\Delta Z = 0$$). Deduce the exact number of $$\\alpha$$ and $$\\beta^-$$ particles emitted, walking through the conservation laws. (3 steps)", "answer": "- Step 1: Analyze the mass number ($$A$$). An alpha particle is a helium nucleus ($$^4_2\\text{He}$$), which reduces $$A$$ by 4. A beta-minus particle is an electron ($$^0_{-1}\\text{e}$$), which leaves $$A$$ unchanged. To achieve a net $$\\Delta A = -4$$, exactly **1 alpha particle** must be emitted.\n- Step 2: Analyze the proton number ($$Z$$) after the alpha decay. The emission of 1 alpha particle reduces the proton number by 2 ($$\\Delta Z = -2$$). The daughter nucleus is now at $$Z - 2$$.\n- Step 3: Restore the proton number. To get back to the original proton number ($$\\Delta Z = 0$$ overall), we need to increase $$Z$$ by +2. Since each beta-minus decay converts a neutron into a proton (increasing $$Z$$ by +1), we must emit exactly **2 beta-minus particles**. \n+ Conclusion: The decay chain consists of 1 alpha and 2 beta-minus particles.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": true}, {"question": "The rate of thermal conduction $$C$$ through a solid bar is given by $$C \\propto \\frac{A \\cdot \\Delta T}{L}$$. Provide a physical, intuitive explanation for why $$C$$ is inversely proportional to the length $$L$$ and directly proportional to the cross-sectional area $$A$$. (2 steps)", "answer": "- Step 1: Proportionality to Area ($$A$$). Think of the cross-sectional area as the number of \"parallel lanes\" available for heat carriers (phonons or free electrons) to flow through. If you double the area, you double the number of lanes, allowing twice as much heat to flow per second. Thus, $$C \\propto A$$.\n- Step 2: Inverse proportionality to Length ($$L$$). Think of length as the distance the heat must travel through a resistive medium. A longer bar means the heat carriers undergo more collisions and scattering events along the path. This spreads the temperature drop over a greater distance, reducing the temperature gradient ($$\\frac{\\Delta T}{L}$$) and thereby slowing the net flow rate. Thus, $$C \\propto \\frac{1}{L}$$.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "A copper bar has a hot end at $$300\\text{ K}$$ and a cold end at $$200\\text{ K}$$. If the environmental temperature is raised such that both ends of the bar are heated equally by $$50\\text{ K}$$ (new temperatures $$350\\text{ K}$$ and $$250\\text{ K}$$), what happens to the rate of thermal conduction through the bar, and why? (2 steps)", "answer": "- Step 1: Identify the driving factor. The formula for thermal conduction rate is $$C \\propto \\frac{A \\cdot \\Delta T}{L}$$. The flow of heat depends strictly on the temperature *difference* ($$\\Delta T = T_{hot} - T_{cold}$$), not the absolute temperatures of the ends.\n- Step 2: Evaluate the change. Initially, $$\\Delta T = 300 - 200 = 100\\text{ K}$$. After heating both ends equally, $$\\Delta T = 350 - 250 = 100\\text{ K}$$. Since the area $$A$$, length $$L$$, and temperature difference $$\\Delta T$$ remain completely unchanged, the rate of thermal conduction $$C$$ remains exactly the same.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "When plotting Kinetic Energy ($$E_k$$) on the y-axis against velocity ($$v$$) on the x-axis for a constant mass, the resulting graph is a parabola rather than a straight line. Explain the mathematical and physical reason for this shape, and contrast it with the graph of Work Done vs Distance. (2 steps)", "answer": "- Step 1: Mathematical and physical reason for KE vs velocity. The formula for kinetic energy is $$E_k = \\frac{1}{2}mv^2$$. Because velocity $$v$$ is squared, the relationship is quadratic ($$y \\propto x^2$$). Geometrically, this produces a parabola that curves upwards, getting steeper as velocity increases. Physically, this means doubling your speed requires *four times* the energy, not twice.\n- Step 2: Contrast with Work vs Distance. Work done is defined as $$W = F \\cdot d$$. Here, the relationship between $$W$$ (y-axis) and $$d$$ (x-axis) is strictly linear ($$y = mx$$). The graph is a straight line passing through the origin, and its constant gradient represents the magnitude of the constant force $$F$$.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": true}, {"question": "In circuit analysis, we treat ideal connecting wires as having the exact same electrical potential at all points along the wire. Explain the microscopic physical mechanism that enforces this \"same wire, same potential\" rule almost instantaneously. (2 steps)", "answer": "- Step 1: The theoretical consequence of a voltage drop. If there were a potential difference (voltage drop) between two points on an ideal wire (which has zero resistance), Ohm's law ($$I = \\frac{V}{R}$$) implies that an infinite current would flow. \n- Step 2: The microscopic mechanism. Physically, metals are packed with highly mobile free electrons. Even a minuscule potential difference creates an electric field that causes these electrons to redistribute themselves almost instantaneously. They accumulate where the potential is lower and deplete where it is higher. This redistribution creates an internal electric field that perfectly cancels the external difference, resulting in zero net potential difference across the wire. Therefore, any points connected *only* by ideal wires sit at the exact same potential.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "You have a fixed $$5\\,\\Omega$$ resistor in series with a variable resistor (minimum $$3\\,\\Omega$$) connected to a $$24\\text{ V}$$ battery. To find the *maximum* power dissipated by the fixed $$5\\,\\Omega$$ resistor, a student uses $$P = \\frac{V^2}{R}$$ and plugs in $$V = 24\\text{ V}$$ and $$R = 5\\,\\Omega$$. Identify the flaw in this reasoning and explain the correct conceptual approach to maximize power in the fixed resistor. (3 steps)", "answer": "- Step 1: Identify the flaw. The student incorrectly assumed the entire $$24\\text{ V}$$ of the battery drops across the $$5\\,\\Omega$$ resistor. In a series circuit, voltage is shared (potential divider), so the $$5\\,\\Omega$$ resistor only gets a fraction of the total $$24\\text{ V}$$.\n- Step 2: Conceptual approach. Since the resistance $$R$$ is fixed at $$5\\,\\Omega$$, the power formula $$P = I^2R$$ shows that to maximize $$P$$, we must maximize the current $$I$$ flowing through the circuit. \n- Step 3: Execution. To maximize current ($$I = \\frac{V_{total}}{R_{total}}$$), we must minimize the total resistance. Therefore, we set the variable resistor to its minimum value ($$3\\,\\Omega$$). \n+ Total $$R = 5 + 3 = 8\\,\\Omega$$.\n+ Current $$I = \\frac{24}{8} = 3\\text{ A}$$.\n+ Max Power $$P = 3^2 \\times 5 = 45\\text{ W}$$.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "A $$12\\text{ V}$$ battery powers two parallel branches. Branch A has a single $$30\\,\\Omega$$ resistor. Branch B has two $$30\\,\\Omega$$ resistors in series. If a switch is closed that \"shorts out\" (bypasses) one of the resistors in Branch B, explain conceptually why the total current drawn from the battery increases, without just calculating the numbers. (2 steps)", "answer": "- Step 1: Independence of parallel branches. In a parallel circuit, each branch operates independently across the same fixed supply voltage ($$12\\text{ V}$$). The current in Branch A remains completely unaffected by any changes in Branch B because the voltage across it remains $$12\\text{ V}$$.\n- Step 2: Effect of shorting. Shorting out a resistor in Branch B removes its resistance, lowering the total resistance of Branch B. Since the voltage across Branch B remains fixed at $$12\\text{ V}$$, Ohm's law ($$I = \\frac{V}{R}$$) dictates that the current through Branch B must increase. Because total current is the sum of the branch currents ($$I_{total} = I_A + I_B$$), and $$I_B$$ increased while $$I_A$$ stayed the same, the total current drawn from the battery must increase.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": true}, {"question": "Kirchhoff's Second Law states that the sum of EMFs equals the sum of potential differences ($$\\Sigma \\text{EMF} = \\Sigma IR$$) around any closed loop. Explain the fundamental physics principle this law represents, and what it implies about a single unit of charge completing a full loop. (2 steps)", "answer": "- Step 1: Fundamental principle. Kirchhoff's Second Law is a direct mathematical consequence of the **conservation of energy**. EMF represents electrical energy *supplied* per unit charge by the power source, while potential difference ($$IR$$) represents electrical energy *dissipated* or *transferred* per unit charge across components.\n- Step 2: Implication for a single charge. It implies that when a single unit of charge (1 Coulomb) travels completely around a closed loop and returns to its exact starting point, it must have spent exactly all the energy it gained from the power supply. It cannot return with leftover energy, nor can it have spent more than it was given, because energy is strictly conserved and the electric field is a conservative field.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "The luminosity of a star scales according to $$L \\propto r^2 T^4$$. If a star's radius is multiplied by $$100$$ and its surface temperature is halved, determine the factor by which its luminosity changes using mental math and order-of-magnitude reasoning, explaining the competing effects. (3 steps)", "answer": "- Step 1: Radius effect. The radius increases by a factor of $$100$$ ($$10^2$$). Since $$L \\propto r^2$$, the luminosity scales by $$(10^2)^2 = 10^4$$ (or $$10,000$$). This massively increases the star's surface area and thus its luminosity.\n- Step 2: Temperature effect. The temperature is halved (multiplied by $$\\frac{1}{2}$$). Since $$L \\propto T^4$$, the luminosity scales by $$(\\frac{1}{2})^4 = \\frac{1}{16}$$. This decreases the energy emitted per unit area.\n- Step 3: Combined effect. Multiply the scaling factors together: $$10,000 \\times \\frac{1}{16}$$. \n+ Mental math: $$\\frac{10,000}{16} = \\frac{5,000}{8} = \\frac{2,500}{4} = 625$$. \n+ The luminosity increases by a factor of $$625$$. The massive increase in surface area easily overpowers the decrease in temperature.", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": true}, {"question": "In a transverse wave, a single particle oscillates about its equilibrium position with amplitude $$A$$. Derive why the total distance travelled by this particle in exactly one full cycle is $$4A$$, and clarify the misconception that the particle travels with the wave. (3 steps)", "answer": "- Step 1: Path breakdown. Starting from equilibrium ($$0$$), the particle moves up to the positive peak (distance $$A$$), then falls back through equilibrium down to the negative trough (distance $$2A$$), and finally rises back to equilibrium (distance $$A$$). Total distance = $$A + 2A + A = 4A$$.\n- Step 2: Misconception clarification. The *wave shape* (energy) propagates horizontally through the medium, but the *particle itself* only moves vertically. It does not travel horizontally with the wave; it just oscillates in place. \n- Step 3: Practical link. If the wave has frequency $$f$$ (cycles per second), the particle's average speed over time is $$4A \\times f$$, even though the wave's horizontal propagation speed is $$v = f\\lambda$$. These are two completely different velocities describing different physical phenomena.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}, {"question": "A motor lifts a $$5\\text{ kg}$$ mass vertically upwards with an acceleration of $$0.8\\text{ m/s}^2$$. Explain conceptually why the tension $$T$$ in the rope must be strictly greater than the weight of the mass ($$mg$$), and calculate the exact tension using $$g = 10\\text{ m/s}^2$$. (3 steps)", "answer": "- Step 1: Conceptual reason. Newton's Second Law states that the *resultant* (net) force equals $$ma$$. If the tension $$T$$ exactly equalled the weight $$mg$$, the forces would balance, the resultant force would be zero, and the mass would move at a constant velocity (or remain stationary). To accelerate upwards, the upward pull ($$T$$) must strictly beat the downward pull ($$mg$$).\n- Step 2: Equation setup. Taking upwards as positive, the resultant force is $$F_{res} = T - mg$$. Setting this equal to $$ma$$ gives $$T - mg = ma$$.\n- Step 3: Calculation. Rearranging for tension: $$T = m(g + a)$$. \n+ Plugging in values: $$T = 5(10 + 0.8) = 5(10.8) = 54\\text{ N}$$. \n+ Notice $$54\\text{ N} > 50\\text{ N}$$ (the weight), confirming conceptually that tension must be greater than weight to achieve upward acceleration.", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": false}, {"question": "In a simple pulley system where a rope goes over a pulley to lift a mass, the tension in the rope is $$T$$. Explain why the physical coupling or axle holding the pulley to the ceiling must withstand a downward force of $$2T$$ (assuming the rope segments on both sides of the pulley are vertical), rather than just $$T$$. (2 steps)", "answer": "- Step 1: Visualizing the forces on the pulley. The rope wraps around the pulley's wheel. The heavy mass pulls down on one side of the rope with tension $$T$$, and the motor (or person) pulls down on the other side of the rope with tension $$T$$. \n- Step 2: Vector addition. Both sides of the rope exert a downward force of $$T$$ directly onto the pulley's wheel. To keep the pulley stationary in the ceiling (in equilibrium), the ceiling coupling must pull *up* on the pulley with a force equal to the sum of the downward forces. Therefore, the total force on the coupling is $$T + T = 2T$$.", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "A nucleus undergoes alpha decay. Explain how the conservation of momentum dictates the kinetic energy distribution between the emitted alpha particle and the recoiling daughter nucleus, and why the alpha particle carries away the vast majority of the kinetic energy despite both experiencing the same magnitude of force. (3 steps)", "answer": "- Step 1: Momentum conservation. Initially, the parent nucleus is at rest ($$p=0$$). After decay, to conserve momentum, the alpha particle and daughter nucleus must move in opposite directions with equal and opposite momenta ($$p_\\alpha = p_{daughter}$$).\n- Step 2: Kinetic energy relation. Kinetic energy can be written in terms of momentum as $$E_k = \\frac{p^2}{2m}$$. Since both particles have the exact same momentum magnitude $$p$$, the kinetic energy is inversely proportional to the mass ($$E_k \\propto \\frac{1}{m}$$).\n- Step 3: Conclusion. The alpha particle has a much smaller mass than the heavy daughter nucleus. Therefore, to satisfy both momentum and energy conservation, the lighter alpha particle must have a much larger kinetic energy. It gets \"kicked\" away at a much higher velocity.", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": false}, {"question": "The rate of thermal conduction $$C = \\frac{k A \\Delta T}{L}$$ is often compared to electrical current $$I = \\frac{V}{R}$$. Map the thermal variables to their electrical equivalents, and use this analogy to explain why adding thermal insulation (like a thick winter coat) reduces heat loss. (3 steps)", "answer": "- Step 1: Variable mapping. Temperature difference ($$\\Delta T$$) maps to Voltage/Potential Difference ($$V$$), which is the \"driving force\". Rate of heat flow ($$C$$) maps to Electrical Current ($$I$$), which is the \"flow rate\".\n- Step 2: Resistance mapping. The term $$\\frac{L}{kA}$$ maps to Electrical Resistance ($$R$$). Length $$L$$ increases resistance, while Area $$A$$ and thermal conductivity $$k$$ decrease it.\n- Step 3: Insulation explanation. A thick winter coat increases the length $$L$$ (thickness) and uses materials with very low thermal conductivity $$k$$. In the electrical analogy, this massively increases the \"thermal resistance\" $$R$$. For a fixed \"voltage\" (body heat vs cold air), a higher resistance results in a lower \"current\" (slower rate of heat loss).", "source": "Qwen 3 ②", "_id": "qwen_2_15", "judge_pick": false}, {"question": "You are given a graph of Velocity ($$y$$-axis) against Time ($$x$$-axis) for a $$20\\text{ kg}$$ object, which is a straight line passing through the origin and the point $$(2\\text{ s}, 10\\text{ m/s})$$. Without just stating the formula, explain what the gradient of this graph physically represents, and use it to find the resultant force acting on the object. (2 steps)", "answer": "- Step 1: Physical meaning of gradient. The gradient of any graph is $$\\frac{\\Delta y}{\\Delta x}$$. For a velocity-time graph, this is $$\\frac{\\Delta v}{\\Delta t}$$, which is the exact definition of acceleration ($$a$$). \n+ Calculating the gradient: $$\\frac{10 - 0}{2 - 0} = 5\\text{ m/s}^2$$.\n- Step 2: Finding force. Newton's Second Law links acceleration to force via $$F = ma$$. Using the mass ($$20\\text{ kg}$$) and the acceleration derived from the gradient ($$5\\text{ m/s}^2$$), the resultant force is $$20 \\times 5 = 100\\text{ N}$$.", "source": "Qwen 3 ②", "_id": "qwen_2_16", "judge_pick": false}, {"question": "In a potential divider circuit with a $$24\\text{ V}$$ supply, a $$3\\,\\Omega$$ resistor, and a $$5\\,\\Omega$$ resistor in series, a student calculates the current as $$I = \\frac{24}{5} = 4.8\\text{ A}$$. Explain the fundamental circuit error the student made, and provide the correct conceptual framework for finding the voltage across the $$5\\,\\Omega$$ resistor. (3 steps)", "answer": "- Step 1: The error. The student assumed the entire $$24\\text{ V}$$ supply was dropped across the $$5\\,\\Omega$$ resistor alone. This violates Kirchhoff's Second Law, as the $$3\\,\\Omega$$ resistor must also \"spend\" some of the voltage.\n- Step 2: Correct current. The battery \"sees\" the total series resistance. $$R_{total} = 3 + 5 = 8\\,\\Omega$$. The actual current flowing through the entire loop is $$I = \\frac{V_{total}}{R_{total}} = \\frac{24}{8} = 3\\text{ A}$$.\n- Step 3: Correct voltage. The voltage across the $$5\\,\\Omega$$ resistor is the current multiplied by its specific resistance: $$V_5 = I \\times R_5 = 3 \\times 5 = 15\\text{ V}$$. \n+ Alternatively, using the potential divider ratio: it gets $$\\frac{5}{8}$$ of the total $$24\\text{ V}$$, which is $$\\frac{5}{8} \\times 24 = 15\\text{ V}$$.", "source": "Qwen 3 ②", "_id": "qwen_2_17", "judge_pick": true}, {"question": "A transverse wave has an amplitude of $$4\\text{ cm}$$ and a frequency of $$2\\text{ Hz}$$. Differentiate between the wave's propagation speed and the particle's average oscillation speed, and calculate the total distance a single particle travels in $$10\\text{ seconds}$$. (3 steps)", "answer": "- Step 1: Conceptual distinction. The wave's propagation speed ($$v = f\\lambda$$) is how fast the *energy/shape* moves horizontally through the medium. The particle's speed is how fast the *medium itself* moves vertically. They are entirely independent; a particle can oscillate rapidly even if the wave moves slowly.\n- Step 2: Distance per cycle. In one full oscillation, a particle travels $$4 \\times \\text{Amplitude}$$. Here, $$4 \\times 4\\text{ cm} = 16\\text{ cm}$$ per cycle.\n- Step 3: Total distance. Frequency is $$2\\text{ Hz}$$, meaning $$2$$ cycles per second. In $$10\\text{ seconds}$$, there are $$2 \\times 10 = 20$$ cycles. \n+ Total distance = $$20 \\text{ cycles} \\times 16\\text{ cm/cycle} = 320\\text{ cm}$$ (or $$3.2\\text{ m}$$).", "source": "Qwen 3 ②", "_id": "qwen_2_18", "judge_pick": false}, {"question": "In ESAT mechanics problems, questions often specify finding the \"minimum\" tension or \"maximum\" power. Explain the conceptual reason why examiners use these bounding words, and how you should use them as a structural hint to set up your equations. (2 steps)", "answer": "- Step 1: The conceptual reason. Many physical systems have variables that can theoretically range to infinity (e.g., a motor could accelerate a mass infinitely fast, requiring infinite tension). To make the question mathematically solvable with the given information, the examiner must lock the system to a specific boundary condition (the minimum or maximum possible value).\n- Step 2: Using it as a hint. When you see \"maximum power in a fixed resistor\", it hints that you must *minimize* all other competing resistances to maximize current. When you see \"minimum tension to lift a mass\", it hints that you should use the exact acceleration given without adding arbitrary extra force. Treat \"min/max\" as the key that unlocks the exact equality you need to write down.", "source": "Qwen 3 ②", "_id": "qwen_2_19", "judge_pick": false}], "count": 20}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "The Cosmic Microwave Background Radiation (CMBR) is famously described as \"direct evidence of the Big Bang.\" Walk through *why* it is direct evidence, going from the early universe to what telescopes detect today. (3 steps)", "answer": "- Step 1: In the very early universe, the temperature was so extreme that matter was in the form of a hot plasma, and the dominant radiation emitted was short-wavelength, high-energy **gamma** radiation.\n- Step 2: The universe has been expanding ever since. Expansion stretches the wavelength of any light travelling through it (cosmological redshift). So the original gamma photons have had their wavelengths pulled into the much longer **microwave** region of the spectrum — this is the CMBR.\n- Step 3: The CMBR is a *fingerprint* of the early universe still washing over us. Its existence (and the fact that it started as gamma, not as microwave) is hard to explain without a hot, dense early state — the Big Bang.\n\nThe \"direct evidence\" claim comes from the fact that no other model naturally predicts a uniform, all-sky relic of stretched gamma rays.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "Using the wave equation $$c = f\\lambda$$ and the fact that the speed of light $$c$$ is constant, explain in one short chain of reasoning why the expansion of the universe *lowers* the frequency of the CMBR.", "answer": "- Step 1: The expansion of space stretches the wavelength of any light travelling through it, so $$\\lambda$$ (the wavelength of the relic radiation) **increases** over time.\n- Step 2: For light, $$c = f\\lambda$$ with $$c$$ fixed. Rearranging, $$f = c/\\lambda$$.\n- Step 3: If $$c$$ is constant and $$\\lambda$$ increases, then the ratio $$c/\\lambda$$ must **decrease** — so $$f$$ falls. Frequency drops as the wave is redshifted toward longer wavelengths.\n\nThis is why the same radiation that was once gamma is now microwave.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": true}, {"question": "Why is the name \"redshift\" used for cosmological redshift, even though the radiation in question is now in the microwave region rather than the red part of the visible spectrum?", "answer": "- Step 1: \"Redshift\" was originally coined in astronomy for the Doppler effect: a receding source shifts its spectral lines toward the **red** (longer-wavelength) end of the visible spectrum.\n- Step 2: Cosmological redshift uses the *same* logic — wavelength is **increasing** — but it is caused by the stretching of space itself, not by motion through space.\n- Step 3: The name stuck because the underlying fact is identical in both cases: $$\\lambda$$ grows and $$f$$ falls. The \"red\" in redshift is a historical label for \"wavelength getting longer,\" not a literal colour claim.\n\nSo the term is about the *direction* of the shift, not the actual colour region the light ends up in.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": true}, {"question": "Give the symbol, mass (nucleon) number $$A$$, and proton (atomic) number $$Z$$ for **(a)** an alpha particle and **(b)** a beta-minus particle. What is the proton number convention used here, and why is it negative for beta?", "answer": "- Step 1: An **alpha particle** is a helium-4 nucleus, written $$^{4}_{2}\\text{He}$$. It is two protons plus two neutrons, so $$A = 4$$ and $$Z = 2$$.\n- Step 2: A **beta-minus particle** is a fast electron, written $$^{0}_{-1}e$$. An electron has negligible mass compared to a nucleon (so $$A = 0$$) but carries one unit of **negative** charge (so $$Z = -1$$).\n- Step 3: The convention is that the *top* number counts nucleons (mass), and the *bottom* number counts the net charge in units of the proton's charge. A neutron contributes $$0$$ to $$Z$$; an electron, having the opposite charge to a proton, contributes $$-1$$.\n\nThe negative $$Z$$ for beta is just bookkeeping: it lets you balance charges on both sides of a nuclear equation with simple integer arithmetic.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "In a nuclear decay, an alpha emission changes $$(A, Z)$$ by $$(\\Delta A, \\Delta Z) = (-4, -2)$$, and a beta-minus emission changes it by $$(0, +1)$$. A parent nucleus decays to a daughter with $$\\Delta A = -4$$ and $$\\Delta Z = 0$$. What combination of particles must have been emitted, and why? (3 steps)", "answer": "- Step 1: To get $$\\Delta A = -4$$, you need exactly **one alpha** — no other particle reduces the mass number. One beta-minus has $$\\Delta A = 0$$, so adding betas cannot help with this.\n- Step 2: After one alpha, the proton number has dropped by 2 ($$\\Delta Z = -2$$). You need to bring it back up to 0 net change, which requires two beta-minus emissions, each contributing $$\\Delta Z = +1$$.\n- Step 3: So the combination is **1 alpha + 2 beta-minus**, giving a net change of $$(-4, -2+2) = (-4, 0)$$ — exactly what the daughter requires.\n\nA common trap is to assume 3 betas (each $$\\Delta Z = +1$$) can fix the proton number — but 3 betas do not change $$A$$ at all, so the mass number would be unchanged, not reduced by 4.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "The rate of thermal conduction through a uniform bar is given by $$C \\propto \\dfrac{A \\cdot \\Delta T}{L}$$. Explain in plain language what each of the three variables $$A$$, $$\\Delta T$$, and $$L$$ represents, and what kind of proportionality each has with $$C$$. (3 steps)", "answer": "- Step 1: $$A$$ is the **cross-sectional area** of the bar (the \"thickness\" of the heat pathway). A fatter bar conducts more easily, so $$C \\propto A$$ — **directly proportional**.\n- Step 2: $$L$$ is the **length** of the bar along the direction of heat flow. Heat has to \"travel\" further in a longer bar, so conduction is harder, giving $$C \\propto 1/L$$ — **inversely proportional**.\n- Step 3: $$\\Delta T = T_1 - T_2$$ is the **temperature difference** between the hot and cold ends. If both ends are at the same temperature ($$\\Delta T = 0$$), there is no net flow of heat at all, so $$C \\propto \\Delta T$$ — **directly proportional**.\n\nThe proportionality to $$\\Delta T$$ is the conceptual one to dwell on: heat conduction is driven by a temperature *difference*, not by an absolute temperature.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "A bar's rate of thermal conduction is initially $$C_0 \\propto A_0 \\Delta T_0 / L_0$$. You double the cross-sectional area ($$A \\to 2A_0$$) but want the conduction rate to stay *exactly* the same. What must you also do to $$L$$ and/or $$\\Delta T$$? Explain using the formula.", "answer": "- Step 1: The new rate is $$C \\propto (2A_0) \\cdot \\Delta T / L$$. For $$C = C_0 \\propto A_0 \\Delta T_0 / L_0$$ to still hold, the ratio $$A/L$$ (or the whole numerator) must stay equal to its original value.\n- Step 2: The cleanest fix is to **double the length** ($$L \\to 2L_0$$). Then $$\\dfrac{2A_0}{2L_0} = \\dfrac{A_0}{L_0}$$ and the rate is unchanged.\n- Step 3: Alternatively, halving $$\\Delta T$$ would also work — but only if the question allows it. In ESAT-style problems, the usual trap-tested scenario is the \"$$A$$ and $$L$$\" doubling trick, where doubling only one of them without the other changes the rate.\n\nThe key principle: $$C$$ depends on the *combination* $$A\\Delta T / L$$, not on any single variable in isolation.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": true}, {"question": "In a thermal conduction problem, the bar is described as \"insulated along its sides.\" Why does this phrase matter for whether the formula $$C \\propto A\\Delta T / L$$ is even valid?", "answer": "- Step 1: The formula assumes that *all* the heat entering one end of the bar either travels through the bar or stays in the bar — none of it leaks out through the sides into the surroundings.\n- Step 2: \"Insulated along the sides\" guarantees exactly that: heat cannot escape sideways, so the only pathway is along the length $$L$$ from hot end to cold end.\n- Step 3: Without that insulation, some heat would be lost radially, and the actual conduction rate along the bar would be *less* than the formula predicts. The formula only works when the assumption of purely longitudinal flow holds.\n\nIt's a bit like saying the river only flows between the two banks — insulation keeps the heat \"in the channel.\"", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": true}, {"question": "Four mechanics graphs are listed: (i) GPE vs height, (ii) work done vs distance, (iii) velocity vs time, (iv) kinetic energy vs velocity. Three of these are linear through the origin; one is a **parabola**. Which one is the parabola, and *why*? (2 steps)", "answer": "- Step 1: Kinetic energy is given by $$E_k = \\tfrac{1}{2} m v^2$$. The variable on the x-axis ($$v$$) appears **squared**, so $$E_k$$ versus $$v$$ is a quadratic curve — a parabola opening upward.\n- Step 2: The other three (GPE = $$mgh$$, work = $$Fd$$, $$v = u + at$$ from rest) all have the y-quantity proportional to the x-quantity raised only to the first power, so they are straight lines through the origin.\n\nA common trap is to assume \"more speed, more energy\" implies linear. It doesn't — the relationship is genuinely quadratic, and a straight-line KE-vs-v graph is *always* wrong.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": true}, {"question": "For a work–distance graph (work done $$W$$ on the y-axis, distance $$d$$ on the x-axis), the gradient equals the force. Walk through *why* the gradient is the force, using the equation $$W = Fd$$. (2 steps)", "answer": "- Step 1: From $$W = Fd$$, if the force is constant, the graph of $$W$$ against $$d$$ is a straight line through the origin with $$W = F \\cdot d$$. This is of the form $$y = (\\text{slope}) \\cdot x$$.\n- Step 2: So the **gradient** = $$\\Delta W / \\Delta d = Fd/d = F$$. The gradient is literally the constant force applied.\n\nThe same logic works for GPE-vs-height (gradient = $$mg$$, the weight) and velocity-vs-time (gradient = $$a$$, the acceleration). Gradient always = \"y-quantity per unit x-quantity,\" so pick the right pairing.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "Electrical power can be written in three equivalent forms: $$P = IV = I^2 R = V^2 / R$$. In a problem where the resistor $$R$$ is fixed but the supply voltage $$V$$ is allowed to vary, which form of the power equation is most *useful* for finding the power, and why?", "answer": "- Step 1: You want a form that uses the **known/fixed** quantities and the variable that is changing.\n- Step 2: Since $$R$$ is fixed and $$V$$ is the variable you are sweeping, $$P = V^2 / R$$ is the natural form — it tells you directly that $$P$$ scales with $$V^2$$.\n- Step 3: Using $$P = I^2 R$$ here would force you to first compute $$I = V/R$$ from Ohm's law, then square it, then multiply by $$R$$ — same answer, more steps, more places to slip up.\n\nThe golden rule: **pick the power form that lets the fixed quantity cancel out or sit passively.**", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": true}, {"question": "A fixed resistor of $$R = 5\\,\\Omega$$ is in series with a **variable** resistor whose value can be anywhere from $$3\\,\\Omega$$ to some maximum. The supply is a fixed 24 V. What setting of the variable resistor gives maximum power dissipated in the $$5\\,\\Omega$$ resistor, and why? (3 steps)", "answer": "- Step 1: The power in the **fixed** $$5\\,\\Omega$$ resistor is $$P = I^2 R$$ with $$R$$ fixed. So $$P$$ is largest when the **current $$I$$ is largest**.\n- Step 2: Current is largest when **total resistance is smallest** ($$I = V/R_\\text{total}$$ with $$V$$ fixed). Total resistance is $$5\\,\\Omega + R_\\text{var}$$, so make $$R_\\text{var}$$ as small as possible: **$$3\\,\\Omega$$**.\n- Step 3: Then $$R_\\text{total} = 8\\,\\Omega$$, $$I = 24/8 = 3\\,\\text{A}$$, and $$P = 3^2 \\times 5 = 45\\,\\text{W}$$.\n\n**Trap to avoid:** don't \"drop the whole 24 V across the 5 Ω\" and use $$I = 24/5 = 4.8\\,\\text{A}$$ — that ignores the variable resistor in series. The current must travel through *both* resistors, so divide by the *total* resistance.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": true}, {"question": "Two points in a circuit are connected **only by ideal wire** (no resistor, no component, no source between them). What can you say for certain about the electric potential at those two points, and *why* does the wire enforce that? (2 steps)", "answer": "- Step 1: The two points are at the **same potential**. Any potential difference across a length of ideal wire would create an electric field along the wire, which would push charge along it almost instantaneously.\n- Step 2: That charge motion continues until the field is zero — i.e., until the potential difference is gone. Equilibrium is reached on an extremely short timescale, after which the wire acts as an equipotential.\n\nThis is why a voltmeter placed across a plain piece of wire reads **0 V**, but a voltmeter across a resistor reads the voltage drop. The wire cannot *spend* any energy, so it cannot sustain a potential difference.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": true}, {"question": "In a potential divider with two resistors $$R_1$$ and $$R_2$$ in series across a supply $$V$$, the voltage across $$R_1$$ is given by $$V_1 = \\dfrac{R_1}{R_1 + R_2} \\cdot V$$. Why does the larger resistor get the larger share of the voltage? (2 steps)", "answer": "- Step 1: The same current $$I$$ flows through both resistors (it's a series loop). The voltage drop across each is $$V_i = IR_i$$.\n- Step 2: So the voltages are in the *same ratio* as the resistances: $$V_1 : V_2 = IR_1 : IR_2 = R_1 : R_2$$. The bigger resistor \"spends\" more of the supply's volts, because the current has to \"push\" through more resistance there.\n\nA common intuition check: in the limit $$R_2 \\to 0$$, all of $$V$$ drops across $$R_1$$ ($$V_1 \\to V$$). In the limit $$R_2 \\to \\infty$$, the second resistor is essentially a break, no current flows, and the full supply appears across the open circuit — none across $$R_1$$.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": true}, {"question": "State **Kirchhoff's first law** and **Kirchhoff's second law** in words, and give the physical *reason* each one is true. (3 steps)", "answer": "- Step 1: **First law (current):** the sum of currents flowing **into** a junction equals the sum flowing **out**. *Reason:* electric charge is conserved — current is just charge per unit time in motion, and charge cannot pile up at a point.\n- Step 2: **Second law (voltage):** the sum of EMFs around any closed loop equals the sum of the $$IR$$ voltage drops around that loop. *Reason:* the EMF is the energy per unit charge *given* to charges by the source; going once around a loop, a charge returns to its starting potential, so all that energy must have been *spent* (deposited as $$IR$$ drops).\n- Step 3: Both laws are bookkeeping identities — they follow from **conservation of charge** and **conservation of energy** applied to circuits. They hold for *any* network, no matter how tangled.\n\nThis is why they are so useful: they always apply, even in complicated circuits where intuition fails.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": true}, {"question": "In a circuit, a battery provides 12 V to a parallel combination of two branches. Branch A is a single 30 Ω resistor; branch B is two 30 Ω resistors in series. What is the current in each branch *before* a switch (placed to short out one of the resistors in branch B) is closed? (3 steps)", "answer": "- Step 1: Both branches sit directly across the 12 V supply (parallel = full supply voltage on each branch). So branch A has 12 V across its single 30 Ω, giving $$I_A = 12/30 = 0.4\\,\\text{A}$$.\n- Step 2: Branch B has two 30 Ω resistors in series, total 60 Ω. The 12 V splits equally (6 V across each, by symmetry), so the current is $$I_B = 12/60 = 0.2\\,\\text{A}$$ (or equivalently $$6/30 = 0.2$$).\n- Step 3: Total current from the battery is the sum: $$I_\\text{total} = 0.4 + 0.2 = 0.6\\,\\text{A}$$.\n\nThe key insight: each parallel branch is \"indifferent\" to the other — each one sees the full 12 V because it's connected directly to the battery terminals by wire.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": true}, {"question": "In the same circuit, the switch in branch B is now closed, shorting out the lower 30 Ω resistor in that branch. Why does the total current from the battery **increase**, and by how much? (2 steps)", "answer": "- Step 1: Closing the switch puts a piece of **wire** directly across that 30 Ω resistor. Since the wire holds both ends at the same potential, there is now **0 V** across the shorted resistor — all 12 V drops across the remaining 30 Ω in branch B.\n- Step 2: So branch B is now effectively a single 30 Ω across 12 V, giving $$I_B' = 12/30 = 0.4\\,\\text{A}$$. New total = $$0.4 + 0.4 = 0.8\\,\\text{A}$$. The current has risen from 0.6 A to 0.8 A, an **increase of 0.2 A**.\n\nThe intuition: shorting a resistor in a series chain lowers that branch's resistance, so the branch draws more current at the same supply voltage, and the battery has to supply more.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": true}, {"question": "The Stefan–Boltzmann law says a star's luminosity is $$L = \\sigma A T^4$$, where $$A$$ is the star's surface area. Using $$A = 4\\pi r^2$$, write $$L$$ in terms of radius $$r$$ and surface temperature $$T$$ only (ignoring constants). What is the scaling with $$r$$ and with $$T$$? (2 steps)", "answer": "- Step 1: Substituting $$A = 4\\pi r^2$$ gives $$L = 4\\pi \\sigma r^2 T^4$$. The constants $$4\\pi\\sigma$$ don't change, so the *scaling* is $$L \\propto r^2 T^4$$.\n- Step 2: So if you multiply the radius by a factor $$k_r$$, $$L$$ scales by $$k_r^2$$; if you multiply the temperature by a factor $$k_T$$, $$L$$ scales by $$k_T^4$$.\n\nThe temperature dependence is enormously stronger than the radius dependence — that's why even a modest temperature change dwarfs a large radius change.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "A star's radius becomes 100 times larger, but its surface temperature becomes **half** of what it was. By what factor does the luminosity change, and which effect dominates? (2 steps)", "answer": "- Step 1: Radius factor: $$k_r = 100 \\Rightarrow k_r^2 = 100^2 = 10{,}000$$. Temperature factor: $$k_T = 1/2 \\Rightarrow k_T^4 = (1/2)^4 = 1/16$$.\n- Step 2: Luminosity factor = $$10{,}000 \\times \\dfrac{1}{16} = 625$$. So the star is **625 times more luminous**, despite being cooler. The radius increase wins because it goes as the *square*, while the temperature only *halves* (and is raised to the 4th).\n\nThis is a useful sanity check: cooling by a factor of 2 costs you a factor of 16, but growing by a factor of 100 buys you a factor of 10,000.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": true}, {"question": "In a transverse wave, an individual particle does *not* travel with the wave — it just oscillates about its rest position. In one complete cycle, what total *path length* does the particle travel, in terms of the amplitude $$A$$? (2 steps)", "answer": "- Step 1: One full cycle, the particle goes: rest → top (one amplitude) → rest (another amplitude) → bottom (another amplitude) → back to rest (another amplitude). That's $$4A$$.\n- Step 2: The particle traces this out, then *returns* to its starting point, while the wave shape itself has moved on by one wavelength. The particle is the \"dancer\"; the wave is the \"dance pattern\" moving down the line.\n\nA common misconception is to confuse the particle's *path length* ($$4A$$) with the wave's *wavelength* ($$\\lambda$$). They are unrelated quantities, measured in different directions.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "A wave has amplitude $$A = 3\\,\\text{cm}$$ and frequency $$f = 5\\,\\text{Hz}$$. How far does a single particle of the medium travel in one minute? Show the chain of reasoning. (3 steps)", "answer": "- Step 1: One cycle = $$4A = 12\\,\\text{cm}$$ of path (rest → top → rest → bottom → rest).\n- Step 2: Frequency 5 Hz = 5 complete cycles per second, so in 60 s there are $$5 \\times 60 = 300$$ cycles.\n- Step 3: Total path = $$300 \\times 12 = 3600\\,\\text{cm} = 36\\,\\text{m}$$.\n\nNotice the particle's *displacement* is still 0 — it ends up back where it started. The 36 m is the *total distance travelled*, not a displacement.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "A mass is being lifted vertically by a rope at constant upward acceleration $$a$$. The mass is $$m$$ and gravitational field strength is $$g$$. Using Newton's second law, derive the tension $$T$$ in the rope. (3 steps)", "answer": "- Step 1: Identify the forces on the mass: tension $$T$$ upward, weight $$mg$$ downward. The **resultant** force is $$T - mg$$ (taking upward as positive).\n- Step 2: Newton's second law says $$F_\\text{res} = ma$$. So $$T - mg = ma$$.\n- Step 3: Rearranging: $$T = mg + ma = m(g + a)$$.\n\n**Trap to avoid:** writing $$T = mg$$. That would be true only if the mass were in *equilibrium* ($$a = 0$$). If the mass is accelerating upward, the tension must be **larger** than the weight to provide the net upward force.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "The rope from the previous question runs over a pulley, with a motor pulling on the other end. The pulley coupling (the axle) supports the rope on both sides. What is the **force on the coupling**, and why is it not just $$T$$? (2 steps)", "answer": "- Step 1: The rope has tension $$T$$ on the load side *and* tension $$T$$ on the motor side (the rope is continuous, and the pulley is frictionless, so the tension is the same on both sides).\n- Step 2: The coupling must support **both** tensions. So the total downward force on the coupling is $$2T$$.\n\n**Intuition:** imagine a single rope going over a hook with two people pulling each end with force $$T$$ — the hook feels $$2T$$. A pulley is the same idea, just redirecting the rope's direction.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": true}, {"question": "A common error on pulley-lift problems is to say the tension equals the weight ($$T = mg$$) because \"the mass is being supported.\" Why is this wrong when the mass is *accelerating* upward? (2 steps)", "answer": "- Step 1: If $$T = mg$$ exactly, the net (resultant) force on the mass is zero — the tensions up and down balance.\n- Step 2: Zero net force means zero acceleration (Newton's first law). But we are told the mass is accelerating upward at $$a$$ — that requires a **net upward** force, which means $$T > mg$$.\n\nThe correct value is $$T = m(g+a)$$, which is strictly greater than $$mg$$ whenever $$a > 0$$. The mistake comes from confusing *equilibrium* (no acceleration) with *steady motion with acceleration* — only the former allows $$T = mg$$.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": true}, {"question": "Two students discuss a circuit. One says: \"I just dropped the whole battery voltage across the 5 Ω resistor and got 4.8 A through it.\" The other says the current is 3 A. Who is right, and what is the conceptual mistake in the wrong answer? (2 steps)", "answer": "- Step 1: The 3 A answer is correct. The current is the same through every component in a **series** loop, so it must be computed using the *total* resistance: $$I = V_\\text{total} / R_\\text{total}$$.\n- Step 2: The mistake is treating the 5 Ω resistor as if it had the full 24 V across it *alone*. In a series circuit, the supply voltage is split between all the resistors, so each one only \"sees\" a fraction of the total.\n\nThe deeper point: Ohm's law $$V = IR$$ always uses the voltage *across that specific component*, not the supply voltage. If you use the supply voltage, you must use the *total* resistance.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": true}, {"question": "Why does it make sense that the same current flows through *every* component in a series circuit? (2 steps)", "answer": "- Step 1: The components are connected end-to-end in a single loop — there is no junction where charge can \"branch off\" or \"leak in.\"\n- Step 2: By Kirchhoff's first law, at any junction the current in equals the current out. In a series loop, the wire between components acts as a \"junction\" with no branching — so the current entering one component must equal the current leaving it, and that current is the same as in the next component, and so on all the way around.\n\nThis is also why *adding* a resistor in series always *reduces* the current: more resistance in the loop, same supply voltage, so the only current consistent with conservation of charge is smaller.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": true}, {"question": "The CMBR is detected today as microwave radiation. Without any instruments, just from the fact that the universe is expanding and that $$c = f\\lambda$$, could you predict that the *original* early-universe radiation must have been at higher frequency than microwave? Walk through the chain. (2 steps)", "answer": "- Step 1: Expansion means wavelengths in the universe get *stretched* over time. So whatever the original wavelength was, it has been getting *longer* ever since.\n- Step 2: From $$f = c/\\lambda$$, a longer wavelength means a *lower* frequency today than in the past. So the radiation we see as microwave *now* must have been at higher frequency *then*. To get a much higher frequency, you go all the way up to **gamma** rays (very short $$\\lambda$$, very high $$f$$).\n\nThis is the reverse logic of WE1 in the lesson: don't start with \"gamma\" — start with \"wavelength has been stretched\" and use $$c = f\\lambda$$ to conclude frequency has dropped.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": true}, {"question": "A graph of GPE vs height for a 2 kg mass near Earth's surface is plotted. What is the gradient of the line, in SI units, and *why* is the gradient numerically equal to the weight? (2 steps)", "answer": "- Step 1: The equation is $$E_p = mgh$$. For a fixed mass, $$E_p$$ vs $$h$$ is a straight line through the origin with gradient = $$mg$$.\n- Step 2: With $$m = 2\\,\\text{kg}$$ and $$g = 9.81\\,\\text{m/s}^2$$ (or 10 N/kg), the gradient is $$mg \\approx 19.6\\,\\text{N}$$ (or 20 N). Numerically, the gradient equals the weight because the weight *is* $$mg$$ — and \"GPE per unit height\" is exactly the weight (J per m = N).\n\nThis is the same reason a velocity–time graph has gradient = acceleration: gradient = (y-quantity per unit x-quantity) = the constant of proportionality in the underlying equation.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": true}, {"question": "Kirchhoff's first law (current) and second law (voltage) are usually taught as two separate rules, but they actually have a deep conceptual link. What do they have in common, and what conservation principle underlies each? (2 steps)", "answer": "- Step 1: **Kirchhoff's first law** is a statement of **conservation of charge**. Current is just charge in motion; charge cannot appear or disappear at a junction, so what flows in must flow out.\n- Step 2: **Kirchhoff's second law** is a statement of **conservation of energy**. Going around a closed loop, a charge returns to its starting potential, so the energy it gained from EMFs along the way must equal the energy it lost as $$IR$$ drops.\n\nBoth are bookkeeping: they say that two fundamental conserved quantities (charge, energy) cannot be created or destroyed in a circuit. That's why these two laws are universally true, in any circuit, however complex.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": true}, {"question": "You are told only that a star's surface temperature has dropped to half its original value, but its radius has stayed the same. Roughly, by what factor has its luminosity changed, and *why* is the temperature change so decisive? (2 steps)", "answer": "- Step 1: From $$L \\propto r^2 T^4$$ with $$r$$ unchanged, $$L$$ scales as $$T^4$$. Halving $$T$$ means $$L$$ becomes $$(1/2)^4 = 1/16$$ of its original value.\n- Step 2: Temperature is raised to the *fourth* power, so even small fractional changes in $$T$$ produce huge fractional changes in $$L$$. A star that's 10% cooler emits about $$(0.9)^4 \\approx 0.66$$, i.e., 34% less light — a substantial dimming from a barely perceptible cooling.\n\nThe fourth power is why stellar temperatures are so tightly coupled to brightness: this is the physics behind the Hertzsprung–Russell diagram's luminosity axis.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "A graph of work done against distance is drawn for a constant force of 5 N applied to a 20 kg object. The line passes through (0 m, 0 J) and (2 m, 10 J). What two pieces of information does this graph give you at a glance, and which is more useful for identifying the force? (2 steps)", "answer": "- Step 1: The graph encodes both the **work done** at each distance (read off the y-axis) and the **force** (read off the gradient: $$\\Delta W / \\Delta d = 10/2 = 5\\,\\text{N}$$).\n- Step 2: For identifying the force, the **gradient** is the more direct read — that's literally $$\\Delta W / \\Delta d = F$$ from $$W = Fd$$. The y-value at a single point depends on both $$F$$ and $$d$$, so it cannot tell you the force alone.\n\nThe general lesson: in a linear graph, the *gradient* carries the constant of proportionality, and the *y-intercept* carries the offset. A graph through the origin with no offset has all its information in the gradient.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "A wave has amplitude 4 cm and frequency 2 Hz. Roughly how long does it take the wave to shift by one full wavelength along its direction of travel? (1 step)", "answer": "- Step 1: The wave moves one wavelength $$\\lambda$$ in one period $$T = 1/f$$. With $$f = 2\\,\\text{Hz}$$, $$T = 1/2 = 0.5\\,\\text{s}$$.\n\nNote: this is about the *wave shape* moving, not the particles. Each particle just oscillates 4A = 16 cm in that 0.5 s, but it ends up exactly where it started.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "Why does the formula $$C \\propto A \\Delta T / L$$ for thermal conduction have a **temperature *difference*** in it, rather than an absolute temperature? What's the conceptual point?", "answer": "- Step 1: Heat flows from hot to cold because of a temperature *gradient* — energy moves down a thermal \"hill.\"\n- Step 2: If both ends of the bar are at the **same** temperature ($$\\Delta T = 0$$), there is no \"hill\" to slide down — no driving force for net heat flow. Even if both ends are at 1000 K, with no difference, no net heat travels along the bar.\n- Step 3: So the relevant quantity is the *imbalance* between the two ends, not how hot the bar is in some absolute sense. This is the same reason electrical current depends on a *voltage difference*, not the absolute voltage at a point.\n\nThe deeper analogy: both heat and charge flow down a \"potential difference\" (thermal or electrical). No difference, no flow.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": true}, {"question": "In a series circuit, the supply voltage is 24 V and the resistors are 3 Ω (variable, set to minimum) and 5 Ω (fixed). Without doing arithmetic, *qualitatively* — does most of the 24 V drop across the 3 Ω or the 5 Ω, and why?", "answer": "- Step 1: Both resistors carry the same current (series). The voltage drop across each is $$V_i = I R_i$$.\n- Step 2: So the larger resistor drops the larger share of the voltage. The 5 Ω is bigger, so the 5 Ω drops **more** of the 24 V than the 3 Ω does.\n- Step 3: Quantitatively, the splits are in the ratio 3 : 5, so the 3 Ω gets 9 V and the 5 Ω gets 15 V. The 5 Ω gets the bigger share because it \"resists\" the current more.\n\nThis is a potential-divider situation: voltages in a series chain split in proportion to the resistances.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": true}, {"question": "ESAT \"maximum\"/\"minimum\" cues: a question says \"find the *minimum* tension in the rope.\" The tutor in the lesson says \"minimum\" is often a hint that the question would otherwise be unsolvable. Why would the *minimum* matter specifically, and what does it tell you about the *direction* of motion or acceleration?", "answer": "- Step 1: Tension is bounded below by what is needed to support the load and produce the stated acceleration. If acceleration is upward, you need at least $$T = m(g+a)$$ to provide the upward net force.\n- Step 2: A *larger* tension would also produce upward acceleration, but the question is presumably specifying the *smallest* tension consistent with the stated motion. The \"minimum\" tells you the rope is *just barely* doing its job — no slack, no extra pull.\n- Step 3: If the rope were to *drop* the load (acceleration downward or zero), the tension could be lower, and the question would be ambiguous. \"Minimum\" pins down the scenario: the rope is *just* holding/lifting at the stated acceleration, and any less tension would let the load fall.\n\nIn short: \"minimum/maximum\" in mechanics usually fixes the *boundary case* of a constraint — it's the only value at which the given scenario is consistent.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": true}, {"question": "In a parallel circuit, adding more branches *across* the same supply doesn't change the voltage across each existing branch, but it does increase the total current drawn from the battery. Explain this asymmetry intuitively. (2 steps)", "answer": "- Step 1: Each parallel branch is \"indifferent\" to the others — it's connected directly to the battery terminals by wire, so it always sees the *full* supply voltage. Adding a new branch doesn't disturb this.\n- Step 2: But the *battery* has to supply current to *every* branch. Each new branch draws its own $$I = V/R$$ from the battery, and the total current is the sum (Kirchhoff 1). So the battery's load — and the rate at which it drains — grows with each new branch.\n\nThe analogy: think of the battery as a tap with several hoses attached. Opening a new hose doesn't change the *pressure* (voltage) in the existing ones, but the *total water flow* (current) the tap must provide goes up.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": true}, {"question": "A student writes the alpha particle as $$^{4}_{2}\\alpha$$ and the beta particle as $$^{0}_{-1}\\beta$$. A marker says these are technically correct but the \"standard\" form uses helium and electron symbols. What is the *information* the student is encoding, and does it match the standard? (2 steps)", "answer": "- Step 1: The student is encoding the **nucleon number** (top) and **proton number** (bottom) of each particle. For alpha: $$A=4, Z=2$$. For beta-minus: $$A=0, Z=-1$$.\n- Step 2: These match the standard. The \"standard\" simply *replaces* the Greek letter with the actual chemical symbol: $$^{4}_{2}\\text{He}$$ for alpha (since an alpha particle *is* a helium-4 nucleus) and $$^{0}_{-1}e$$ for beta (since it *is* an electron). The numbers are identical.\n\nThe numbers are what matter for balancing nuclear equations. The symbol is just a label.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "A potential divider has $$R_1 = 1\\,\\text{k}\\Omega$$ and $$R_2 = 3\\,\\text{k}\\Omega$$ across a 12 V supply. The output is taken across $$R_1$$. *Qualitatively*, is the output voltage closer to 12 V or to 0 V, and why? (2 steps)", "answer": "- Step 1: The voltage splits in the ratio of the resistances: $$V_1 : V_2 = 1 : 3$$. So $$V_1 = 12 \\times 1/4 = 3\\,\\text{V}$$ and $$V_2 = 9\\,\\text{V}$$.\n- Step 2: Output across the *smaller* resistor gives the *smaller* share of the voltage. So 3 V is **closer to 0 V** than to 12 V.\n\nA potential divider can be used as a sensor (e.g., a thermistor in one of the resistors): as the resistances change, the output voltage changes. The choice of which resistor is \"small\" determines whether the output is biased toward 0 V or toward the full supply.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "In a circuit with one battery, two resistors in series, and an ammeter, where should the ammeter be placed, and what assumption do we make about it? (2 steps)", "answer": "- Step 1: The ammeter goes **in series** with the resistor whose current you want to measure — usually in the main loop, since the current is the same everywhere in a series circuit.\n- Step 2: We assume the ammeter is **ideal**, meaning it has zero resistance. That way it doesn't add any extra resistance to the circuit, doesn't drop any voltage, and doesn't disturb the current it's measuring.\n\nThe dual assumption: a voltmeter is ideal with **infinite** resistance, so it doesn't draw any current when placed in parallel across a component.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "Two stars have the same surface temperature, but star B has twice the radius of star A. How do their luminosities compare? Walk through using $$L \\propto r^2 T^4$$ and explain why this makes sense physically. (2 steps)", "answer": "- Step 1: With $$T$$ the same, $$L \\propto r^2$$. Doubling $$r$$ gives $$L_B / L_A = (2)^2 = 4$$. So star B is **4 times more luminous**.\n- Step 2: Physically, every square metre of the star's surface emits the same amount of energy (since $$T$$ is the same). Star B has **4 times the surface area** (area scales as $$r^2$$), so it emits 4 times the total energy.\n\nThis is the geometric origin of the $$r^2$$ in the luminosity formula: bigger sphere → more surface → more total radiated power, even if every bit of surface is identical.", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}], "count": 40}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question":
