orrect — and remembering $\\sigma \\ne 100$.", "source": "GLM 5.1 ③", "_id": "glm_3_45", "judge_pick": false}, {"question": "A simple exercise: Events $A$ and $B$ are independent with $P(A) = 0.4$ and $P(B) = 0.5$. What is $P(A \\cup B)$? (2 steps)", "answer": "- Step 1: Since $A$ and $B$ are independent, $P(A \\cap B) = P(A) \\cdot P(B) = 0.4 \\times 0.5 = 0.2$.\n- Step 2: Apply the addition rule: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B) = 0.4 + 0.5 - 0.2 = 0.7$$", "source": "GLM 5.1 ③", "_id": "glm_3_46", "judge_pick": false}, {"question": "A simple exercise: If $\\operatorname{Var}(X) = 4$, find $\\operatorname{Var}(3X + 10)$. (1 step)", "answer": "- Step 1: $$\\operatorname{Var}(3X + 10) = 3^2 \\operatorname{Var}(X) = 9 \\times 4 = 36$$ The additive constant 10 vanishes; the multiplier 3 is squared.", "source": "GLM 5.1 ③", "_id": "glm_3_47", "judge_pick": false}, {"question": "A simple exercise: A CDF has $F(3) = 0.6$ and $F(2) = 0.35$. Find $P(X = 3)$. (1 step)", "answer": "- Step 1: $$P(X = 3) = F(3) - F(2) = 0.6 - 0.35 = 0.25$$ The PMF at any point is the \"jump\" in the CDF at that point.", "source": "GLM 5.1 ③", "_id": "glm_3_48", "judge_pick": false}, {"question": "A simple exercise: For a symmetric Normal interval $P(|Z| < z) = 0.7$, what value of $\\Phi(z)$ do you look up? (1 step)", "answer": "- Step 1: $$\\Phi(z) = \\frac{1 + 0.7}{2} = 0.85$$ Then find $z = \\Phi^{-1}(0.85)$ from the table. The formula is always $\\Phi(z) = (1 + c)/2$ where $c$ is the central probability.", "source": "GLM 5.1 ③", "_id": "glm_3_49", "judge_pick": false}, {"question": "When solving simultaneous equations for Normal distribution parameters (as in Q8b), what is the general strategy, and why must you reject one root? (2 steps)", "answer": "- Step 1: The strategy: (1) Standardise the given probability to obtain one equation relating $\\mu$ and $\\sigma$ (typically of the form $\\mu = k\\sigma$ for some constant $k$). (2) Use any algebraic relation given in the question as the second equation. (3) Substitute and solve — usually arriving at a quadratic in $\\sigma$.\n- Step 2: The quadratic will typically factorise as $\\sigma(\\sigma - c) = 0$, giving roots $\\sigma = 0$ and $\\sigma = c$. Reject $\\sigma = 0$ because a standard deviation of zero means the distribution is a single point — no spread at all — which contradicts the premise of a Normal distribution. State the rejection explicitly.", "source": "GLM 5.1 ③", "_id": "glm_3_50", "judge_pick": false}, {"question": "For a discrete data set with $n = 11$ values, the quartile positions are at $\\frac{n+1}{4} = 3$ and $\\frac{3(n+1)}{4} = 9$. What would change if $n = 10$ instead? (2 steps)", "answer": "- Step 1: For $n = 10$: $Q_1$ position $= \\frac{11}{4} = 2.75$, which is non-integer. You would interpolate: $Q_1 = x_2 + 0.75(x_3 - x_2)$, i.e., three-quarters of the way from the 2nd to the 3rd value.\n- Step 2: Similarly, $Q_3$ position $= \\frac{33}{4} = 8.25$: $Q_3 = x_8 + 0.25(x_9 - x_8)$, one-quarter of the way from the 8th to the 9th value. The key rule: integer position → read directly; non-integer position → linear interpolation between adjacent values.", "source": "GLM 5.1 ③", "_id": "glm_3_51", "judge_pick": true}, {"question": "What is the exam strategy for the first 10 minutes of an S1 paper, and what single habit fixes the most common mark-losing error? (2 steps)", "answer": "- Step 1: Scan the paper for \"given that\" triggers. Questions like Q3(d), Q5(b), and Q6 all hinge on conditional probability. Mark them with a star; pre-write $P(A \\mid B) = P(A \\cap B)/P(B)$ in the margin next to each.\n- Step 2: The single highest-impact habit: **write the conditional formula on the page before computing.** This one act — physically writing the denominator — prevents the #1 error of returning $P(A \\cap B)$ when $P(A \\mid B)$ is asked. It likely saves 4–6 marks per paper.", "source": "GLM 5.1 ③", "_id": "glm_3_52", "judge_pick": false}, {"question": "Why should you cross-check $P(R)$ by two different methods (complement vs. direct tree sum), and what does a mismatch tell you? (2 steps)", "answer": "- Step 1: Method 1 (complement): $P(R) = 1 - P(L) = 1 - 0.11 = 0.89$. Method 2 (direct sum from tree): $P(R) = P(\\text{Y12} \\cap R) + P(\\text{Y13} \\cap R) = \\frac{7}{20} + \\frac{27}{50} = \\frac{35 + 54}{100} = \\frac{89}{100}$. Both give 0.89 ✓.\n- Step 2: A mismatch means an arithmetic error exists *somewhere* in your tree probabilities. Without cross-checking, you'd carry that error silently into every downstream calculation — conditional probabilities, joint probabilities, everything. The two-route check is your early-warning system.", "source": "GLM 5.1 ③", "_id": "glm_3_53", "judge_pick": false}, {"question": "What is the time budget for a 75-mark, 90-minute S1 paper, and what specific time-saving tip helps with Normal distribution questions? (2 steps)", "answer": "- Step 1: The budget is approximately 1.2 minutes per mark. Rough allocation: Q1 ≈ 10 min, Q2 ≈ 14 min, Q3 ≈ 10 min, Q4 ≈ 14 min, Q5 ≈ 10 min, Q6 ≈ 11 min, Q7 ≈ 12 min, Q8 ≈ 11 min. Total ≈ 92 min — tight.\n- Step 2: Memorising four key $\\Phi$ values ($\\Phi(1) = 0.8413$, $\\Phi(1.5) = 0.9332$, $\\Phi(1.645) = 0.95$, $\\Phi(1.96) = 0.975$) saves ~30 seconds per Normal lookup. Across 2–3 Normal sub-parts, that's ~90 seconds reclaimed — enough to finish the paper.", "source": "GLM 5.1 ③", "_id": "glm_3_54", "judge_pick": true}, {"question": "In a regression question, how should you interpret the gradient in context, and what is the most common vague answer that loses the mark? (2 steps)", "answer": "- Step 1: A correct interpretation names both variables, states the direction of change, and includes units. Example: \"For each additional mark in the French test, the predicted Spanish mark increases by 1.04 marks.\"\n- Step 2: The most common vague answer: \"As one increases, the other increases\" or \"the gradient is 1.04.\" These lose the mark because they omit the contextual variables and the units. The examiner wants to see that you understand what the number *means*, not just what it *is*.", "source": "GLM 5.1 ③", "_id": "glm_3_55", "judge_pick": false}, {"question": "What is the difference between interpolation and extrapolation in the context of regression, and how should you justify which is more reliable? (2 steps)", "answer": "- Step 1: **Interpolation** means predicting within the range of the observed data. **Extrapolation** means predicting outside that range. Interpolation is reliable because the fitted model is supported by data in that region. Extrapolation is unreliable because the linear relationship may not hold beyond the observed range.\n- Step 2: To justify, you must *state the data range explicitly* and use the words \"interpolation\" and \"extrapolation.\" Example: \"Since 55 lies in the range $24 \\le f \\le 68$, this is interpolation and is reliable. Since 18 lies outside this range, this is extrapolation and is unreliable as the linear relationship is not guaranteed to hold.\"", "source": "GLM 5.1 ③", "_id": "glm_3_56", "judge_pick": false}, {"question": "Why must you keep fractions (not decimals) during variance computations for a discrete random variable? Illustrate with the cancellation in Q7(d). (2 steps)", "answer": "- Step 1: $\\operatorname{Var}(X) = \\frac{165}{169}$ and $\\operatorname{Var}(13X - 6) = 169 \\times \\frac{165}{169}$. The 169 cancels *exactly*, yielding the clean integer 165.\n- Step 2: If you had computed $\\operatorname{Var}(X) \\approx 0.97633$ (a decimal), then $169 \\times 0.97633 = 164.99977$, which *almost* gives 165 but introduces rounding uncertainty. On an exam, if your answer looks messy (not a clean number when it should be), that's a signal to recheck. Fractions preserve exactness; decimals introduce noise.", "source": "GLM 5.1 ③", "_id": "glm_3_57", "judge_pick": false}, {"question": "What does it mean for the PMCC $r$ to be 0.849, and how does this relate to the coding invariance result? (2 steps)", "answer": "- Step 1: $r = 0.849$ indicates a **strong positive linear correlation** between minimum and maximum monthly temperatures in Kolkata. Values near $+1$ mean strong positive association; near $0$ mean weak; near $-1$ mean strong negative.\n- Step 2: When you convert both variables from °F to °C via $c = \\frac{5}{9}(f - 32)$ (a positive linear coding with $b = d = 5/9 > 0$), the correlation is **unchanged**: $r_{uv} = r_{xy} = 0.849$. The scatter cloud is rescaled and shifted but its shape and tightness are identical. PMCC is a shape measure, not a scale measure.", "source": "GLM 5.1 ③", "_id": "glm_3_58", "judge_pick": false}, {"question": "A student writes $P(A \\cap B) = P(B \\mid A) \\cdot P(B)$. What is the error, and what is the correct formula? (2 steps)", "answer": "- Step 1: The correct formula is $$P(A \\cap B) = P(B \\mid A) \\cdot P(A)$$ The conditioning event $A$ (after the vertical bar) is the one you multiply by, not $B$.\n- Step 2: The error is inverting which probability goes in the multiplier. $P(B \\mid A)$ means \"probability of $B$ given $A$,\" so the \"given\" event is $A$, and you multiply by $P(A)$ to recover the joint. Think of it as: conditional probability × probability of the condition = joint probability.", "source": "GLM 5.1 ③", "_id": "glm_3_59", "judge_pick": true}], "count": 60}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "How to calculate frequency from a histogram when given frequency density and class width? (3 steps)", "answer": "- Step 1: Recall the formula: **frequency = frequency density × class width**.\n- Step 2: For each class, multiply the given frequency density by the class width.  \n  Example: For class $15 \\le h < 17$ with frequency density 32 and width 2:  \n  $32 \\times 2 = 64$.\n- Step 3: Verify total frequency matches the stated total (408 plants).  \n  Example: $32 + 152 + 120 + 64 + 40 = 408$.\n\n[Optional: Frequency density measures frequency per unit width, so area of bar = frequency.]", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why does the standard deviation of °F temperatures remain unchanged when converted to °C via $c = \\frac{5}{9}(f - 32)$, but the mean changes?", "answer": "- Step 1: **Additive constants (-32)** shift the mean but do not affect spread (standard deviation).  \n  Example: If all temperatures drop by 32, the mean also drops by 32, but distances from the mean stay the same.\n- Step 2: **Multiplicative constants ($\\frac{5}{9}$)** scale both mean and standard deviation.  \n  Example: $8.5716 \\times \\frac{5}{9} = 4.762$ for standard deviation.\n- Step 3: The formula for standard deviation involves differences from the mean (which are scaled by $\\frac{5}{9}$), but not the additive shift.\n\n[Optional: Variance scales by $(\\frac{5}{9})^2$.]", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "Why is $P(\\text{Y12} \\mid R)$ not equal to $P(\\text{Y12} \\cap R)$ in a probability tree? (3 steps)", "answer": "- Step 1: The phrase \"given that\" requires the **conditional probability formula** $P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$.  \n- Step 2: $P(\\text{Y12} \\cap R) = p \\times \\frac{7}{8}$ is the joint probability, but the conditional probability divides by $P(R)$.  \n  Example: $\\frac{7/20}{89/100} = \\frac{35}{89}$.\n- Step 3: The denominator $P(R)$ accounts for all paths leading to R, not just the Y12 path.  \n  Example: $P(R) = \\frac{7}{20} + \\frac{27}{50} = \\frac{89}{100}$.\n\n[Optional: Forgetting to divide by $P(B)$ is a common misconception.]", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "How to determine if a data point is an outlier using quartiles and the interquartile range (IQR)? (3 steps)", "answer": "- Step 1: Sort the data and compute $Q_1$ (25th percentile) and $Q_3$ (75th percentile).  \n  Example: Spanish marks $Q_1 = 28$, $Q_3 = 48$.\n- Step 2: Calculate $IQR = Q_3 - Q_1 = 20$.  \n- Step 3: Apply outlier fences:  \n  Lower fence = $Q_1 - 1.5 \\times IQR = 28 - 30 = -2$.  \n  Upper fence = $Q_3 + 1.5 \\times IQR = 48 + 30 = 78$.  \n  Any value outside $[-2, 78]$ is an outlier (e.g., 90).\n\n[Optional: Outliers are extreme values relative to the spread of the data.]", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "Why is the probability of qualifying on the second throw calculated using conditional probability in a discus competition?", "answer": "- Step 1: The phrase \"given that the athlete qualified\" requires dividing by $P(\\text{qualifies})$.  \n  Example: $P(\\text{2nd throw } > 44 \\mid \\text{qualifies}) = \\frac{P(F_1 \\cap X_2 > 44)}{P(\\text{qualifies})}$.\n- Step 2: Compute numerator: $P(F_1) \\times P(X_2 > 44) = 0.3821 \\times 0.1587$.  \n- Step 3: Compute denominator using complement: $1 - P(\\text{all 3 throws fail}) = 1 - 0.3821^3$.  \n  Example: $\\frac{0.0606}{0.9442} = 0.0642$.\n\n[Optional: Conditional probability adjusts for restricted sample space.]", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "How to test if two events $A$ and $B$ are statistically independent using probabilities? (3 steps)", "answer": "- Step 1: Compute $P(A \\cap B)$ using $P(B \\mid A) \\times P(A)$.  \n  Example: $P(A \\cap B) = 0.3 \\times 0.5 = 0.15$.\n- Step 2: Compute $P(A) \\times P(B)$.  \n  Example: $0.5 \\times 0.3 = 0.15$.\n- Step 3: Compare values:  \n  If equal → independent (✓); if not → dependent.  \n  Example: $0.15 = 0.15$ → independent.\n\n[Optional: Independence means the occurrence of one does not affect the probability of the other.]", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "Why is the variance of $13X - 6$ equal to $169 \\times \\text{Var}(X)$? (3 steps)", "answer": "- Step 1: **Additive constants (-6)** do not affect variance.  \n  Example: $\\text{Var}(X - 6) = \\text{Var}(X)$.\n- Step 2: **Multiplicative constants (13)** scale variance by the square.  \n  Example: $\\text{Var}(13X) = 13^2 \\times \\text{Var}(X)$.\n- Step 3: Combine both effects:  \n  $\\text{Var}(13X - 6) = 169 \\times \\text{Var}(X)$.  \n  Example: $169 \\times \\frac{165}{169} = 165$.\n\n[Optional: Variance measures spread, so scaling affects it quadratically.]", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "How to find the value of $k$ in a symmetric normal distribution interval $P(\\mu - 2k < X < \\mu + 2k) = 0.6$? (4 steps)", "answer": "- Step 1: Recognize symmetry: $P(|X - \\mu| < 2k) = 0.6$.  \n- Step 2: Convert to standard normal: $P(|Z| < \\frac{2k}{\\sigma}) = 0.6$.  \n  Given $\\sigma = 6$: $P(|Z| < \\frac{k}{3}) = 0.6$.\n- Step 3: Use symmetry: $2\\Phi(\\frac{k}{3}) - 1 = 0.6$ → $\\Phi(\\frac{k}{3}) = 0.8$.  \n- Step 4: Look up inverse normal: $\\frac{k}{3} = 0.8416$ → $k = 2.52$.\n\n[Optional: Symmetric intervals simplify to one-tail probabilities.]", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "Why is the median of grouped data calculated using interpolation? (2 steps)", "answer": "- Step 1: The median lies in the class where the cumulative frequency reaches $n/2$.  \n  Example: $n = 408$, median class is $13 \\le h < 15$ (since $184 < 204 \\le 304$).\n- Step 2: Interpolate:  \n  $\\text{Median} = L + \\frac{(n/2 - F_<)}{f_{\\text{class}}} \\times w$.  \n  Example: $13 + \\frac{20}{120} \\times 2 = 13.33$ cm.\n\n[Optional: Interpolation assumes uniform distribution within the median class.]", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "How does the product-moment correlation coefficient (PMCC) remain unchanged under linear coding?", "answer": "- Step 1: PMCC measures linear association, unaffected by changes in units or shifts.  \n  Example: Converting °F to °C via $c = \\frac{5}{9}(f - 32)$.\n- Step 2: Scaling (multiplying by $\\frac{5}{9}$) affects numerator and denominator equally in $r = \\frac{S_{xy}}{\\sqrt{S_{xx}S_{yy}}}$.  \n  Example: $S_{uv} = \\frac{5}{9} \\times \\frac{5}{9} S_{xy}$, $S_{uu} = (\\frac{5}{9})^2 S_{xx}$, $S_{vv} = (\\frac{5}{9})^2 S_{yy}$.\n- Step 3: Ratios remain the same: $r_{uv} = \\frac{S_{uv}}{\\sqrt{S_{uu}S_{vv}}} = \\frac{S_{xy}}{\\sqrt{S_{xx}S_{yy}}} = r_{xy}$.\n\n[Optional: PMCC invariance holds only for positive linear transformations.]", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "Why is the mode of a discrete distribution the value with the highest probability?", "answer": "- Step 1: Mode is the most frequently occurring value in a distribution.  \n- Step 2: For a discrete random variable, this corresponds to the highest probability in the PMF.  \n  Example: $P(X=4) = \\frac{13}{26} > P(X=1,2,3)$.\n- Step 3: Compare all probabilities to identify the maximum.  \n  Example: $\\frac{13}{26} > \\frac{6}{26} > \\frac{5}{26} > \\frac{2}{26}$.\n\n[Optional: Mode is a measure of central tendency for categorical or discrete data.]", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "How to calculate the probability that two randomly selected plants both fall in a specific range when their boundaries cut through classes?", "answer": "- Step 1: Assume uniform distribution within each class.  \n  Example: For $[8,14)$, split contributions from three classes.\n- Step 2: Calculate frequencies:  \n  - $[5,9)$: $\\frac{9-8}{4} \\times 32 = 8$.  \n  - $[9,13)$: 152.  \n  - $[13,15)$: $\\frac{14-13}{2} \\times 120 = 60$.  \n  Total = $8 + 152 + 60 = 220$.\n- Step 3: Use hypergeometric probability for without replacement:  \n  $P(\\text{both}) = \\frac{220}{408} \\times \\frac{219}{407} \\approx 0.290$.\n\n[Optional: Splitting class boundaries proportionally preserves area.]", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "Why is extrapolation less reliable than interpolation in regression analysis?", "answer": "- Step 1: Interpolation estimates within the observed data range ($24 \\le f \\le 68$), where the linear relationship is validated.  \n- Step 2: Extrapolation extends beyond the range, assuming the linear trend continues, which may not hold.  \n  Example: Estimating $s$ at $f = 18$ (outside range) vs $f = 55$ (inside range).\n- Step 3: Uncertainty increases with distance from the data cloud.  \n  Example: The relationship between French and Spanish marks might change for very low or high scores.\n\n[Optional: Interpolation has lower prediction error than extrapolation.]", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": true}, {"question": "How to determine the skew of a distribution using the mean and median?", "answer": "- Step 1: Compare mean and median.  \n  Example: Mean = 13.2, Median = 13.3.\n- Step 2: If mean < median → negative skew.  \n  Example: $13.2 < 13.3$ ⇒ negative skew.\n- Step 3: Skew direction indicates tail elongation:  \n  Negative skew = left tail longer; positive skew = right tail longer.\n\n[Optional: Skewness reflects asymmetry in the distribution.]", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "Why is the probability of qualifying on the second throw not simply $P(F_1) \\times P(X_2 > 44)$?", "answer": "- Step 1: The phrase \"given that the athlete qualified\" requires conditional probability.  \n  Example: $P(F_1 \\cap X_2 > 44 \\mid \\text{qualifies}) = \\frac{P(F_1 \\cap X_2 > 44)}{P(\\text{qualifies})}$.\n- Step 2: The joint probability $P(F_1 \\cap X_2 > 44) = 0.3821 \\times 0.1587$ is only the numerator.\n- Step 3: Denominator $P(\\text{qualifies}) = 1 - P(\\text{all 3 throws fail}) = 0.9442$ adjusts for restricted sample space.\n\n[Optional: Conditional probability normalizes the event to the given condition.]", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}, {"question": "How to derive the variance of a linear transformation $aX + b$?", "answer": "- Step 1: Additive constants ($b$) do not affect variance.  \n  Example: $\\text{Var}(X + 5) = \\text{Var}(X)$.\n- Step 2: Multiplicative constants ($a$) scale variance by $a^2$.  \n  Example: $\\text{Var}(3X) = 9 \\times \\text{Var}(X)$.\n- Step 3: Combine both: $\\text{Var}(aX + b) = a^2 \\times \\text{Var}(X)$.  \n  Example: $\\text{Var}(13X - 6) = 169 \\times \\text{Var}(X)$.\n\n[Optional: Variance measures squared deviations, hence $a^2$.]", "source": "Qwen 3 ①", "_id": "qwen_1_15", "judge_pick": false}, {"question": "How to find the mode of a discrete distribution from its CDF?", "answer": "- Step 1: Convert CDF to PMF using $P(X=x) = F(x) - F(x-1)$.  \n  Example: $P(X=4) = F(4) - F(3) = \\frac{26}{26} - \\frac{13}{26} = \\frac{13}{26}$.\n- Step 2: Identify the $x$ with the highest $P(X=x)$.  \n  Example: $\\frac{13}{26} > \\frac{6}{26}, \\frac{5}{26}, \\frac{2}{26}$.\n- Step 3: The mode is the value corresponding to the maximum probability.  \n  Example: Mode = 4.\n\n[Optional: The mode is the most probable outcome.]", "source": "Qwen 3 ①", "_id": "qwen_1_16", "judge_pick": false}, {"question": "Why is the outlier fence calculation $Q_3 + 1.5 \\times IQR$?", "answer": "- Step 1: IQR measures the spread of the middle 50% of data.  \n  Example: $IQR = Q_3 - Q_1 = 20$.\n- Step 2: The factor 1.5 expands the fence to capture extreme values.  \n  Example: $1.5 \\times 20 = 30$.\n- Step 3: Add to $Q_3$ to define upper boundary:  \n  Example: $48 + 30 = 78$. Any value above 78 is an outlier.\n\n[Optional: The 1.5 multiplier is a heuristic for moderate outliers.]", "source": "Qwen 3 ①", "_id": "qwen_1_17", "judge_pick": false}, {"question": "How to interpret the gradient of a regression line in context?", "answer": "- Step 1: The gradient represents the change in $s$ per unit change in $f$.  \n  Example: For each additional French mark, predicted Spanish mark increases by 1.04.\n- Step 2: Use units and context in the interpretation.  \n  Example: \"1.04 marks increase in Spanish per additional French mark.\"\n- Step 3: Avoid vague terms like \"relationship\" or \"association.\"  \n  Example: Explicitly state direction and magnitude.\n\n[Optional: Interpretation should link mathematical value to real-world meaning.]", "source": "Qwen 3 ①", "_id": "qwen_1_18", "judge_pick": false}, {"question": "Why is the mode of a discrete CDF the value with the largest jump in $F(x)$?", "answer": "- Step 1: $P(X=x) = F(x) - F(x-1)$ measures the jump at $x$.  \n  Example: $P(X=4) = \\frac{26}{26} - \\frac{13}{26} = \\frac{13}{26}$.\n- Step 2: The largest jump corresponds to the highest probability.  \n  Example: $\\frac{13}{26} > \\frac{6}{26}, \\frac{5}{26}, \\frac{2}{26}$.\n- Step 3: The mode is the $x$ where the CDF has the steepest rise.  \n  Example: Mode = 4.\n\n[Optional: CDF jumps are PMF values.]", "source": "Qwen 3 ①", "_id": "qwen_1_19", "judge_pick": false}], "count": 20}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Why is frequency density used in histograms instead of raw frequency? Explain how to calculate frequency density and how to find the median using interpolation.", "answer": "- Step 1: Frequency density accounts for varying class widths. Formula:  \n  $$ \\text{Frequency density} = \\frac{\\text{Frequency}}{\\text{Class width}} $$  \n- Step 2: To find the median by interpolation:  \n  1. Determine the median position $ n/2 $.  \n  2. Identify the class containing the median.  \n  3. Use the formula:  \n     $$ \\text{Median} = L + \\frac{(n/2 - F_<)}{f_{\\text{class}}} \\times w $$  \n  where $ L $ = lower class boundary, $ F_< $ = cumulative frequency before the class, $ f_{\\text{class}} $ = frequency of the class, $ w $ = class width.  \n\n+ Example: For Q1(b), median position = 408/2 = 204. Lies in class 13–15 cm.  \n$$ \\text{Median} = 13 + \\frac{204 - 184}{120} \\times 2 = 13.3\\ \\text{cm} $$  \n\n**Takeaway:** Histogram area = frequency ⇒ density adjusts for width. Median interpolation assumes uniform distribution within the class.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "What happens to the mean and standard deviation when you apply a linear transformation $ y = a + bx $ to a dataset? Why is the product-moment correlation coefficient (PMCC) invariant under such transformations?", "answer": "- Step 1: Mean and standard deviation transform as:  \n  $$ \\bar{y} = a + b\\bar{x},\\quad \\sigma_y = |b|\\sigma_x $$  \n  Additive constants shift the mean but not spread; multiplicative constants scale both.  \n- Step 2: PMCC invariance:  \n  + If $ b > 0 $ and $ d > 0 $, then $ r_{u,v} = r_{x,y} $.  \n  + Linear scaling preserves linear relationships' strength/direction.  \n  + Example: Converting Fahrenheit to Celsius (Q2) leaves $ r $ unchanged at 0.849.  \n\n**Takeaway:** Scaling affects variance (squared multiplier), but PMCC depends only on the correlation structure, not units.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "A student wrote $ P(\\text{Y12} \\mid R) = p \\times \\frac{7}{8} $. Why is this incorrect? Derive the correct formula and explain the role of the denominator in conditional probability.", "answer": "- Step 1: The expression $ p \\times \\frac{7}{8} $ is the joint probability $ P(\\text{Y12} \\cap R) $, not the conditional.  \n- Step 2: Conditional probability formula:  \n  $$ P(\\text{Y12} \\mid R) = \\frac{P(\\text{Y12} \\cap R)}{P(R)} $$  \n  The denominator $ P(R) $ normalizes the probability space to only right-handed students.  \n- Step 3: For Q3(d), compute:  \n  $$ P(R) = 1 - P(L) = 0.89,\\quad P(\\text{Y12} \\mid R) = \\frac{7/20}{89/100} = \\frac{35}{89} \\approx 0.393 $$  \n\n**Takeaway:** The conditioning event (R) defines the new sample space ⇒ denominator adjusts the base of comparison.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "How do you determine if a value is an outlier using the interquartile range (IQR)? Calculate the upper fence for a dataset with $ Q_1 = 28 $ and $ Q_3 = 48 $, and explain why 90 is an outlier.", "answer": "- Step 1: Outlier fences:  \n  $$ \\text{Upper fence} = Q_3 + 1.5 \\times \\text{IQR} = 48 + 1.5 \\times (48 - 28) = 78 $$  \n- Step 2: Since 90 > 78, it lies beyond the upper fence ⇒ outlier.  \n- Step 3: IQR = middle 50% of data ⇒ values outside 1.5×IQR from quartiles are extreme compared to the bulk of data.  \n\n**Takeaway:** The 1.5×IQR rule balances sensitivity to extreme values with robustness against minor fluctuations.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "An athlete’s discus throws follow $ N(40, 4^2) $. They qualify if they throw >38.8 m in 3 attempts. Given they qualified, why is the probability of qualifying on the second throw $ P(F_1 \\cap X_2 > 44)/P(\\text{qualifies}) $ and not just $ P(F_1 \\cap X_2 > 44) $?", "answer": "- Step 1: The event \"qualifies\" includes all sequences with at least one success (3 possible paths).  \n- Step 2: Conditional probability requires restricting the sample space to qualifying outcomes:  \n  $$ P(\\text{2nd throw} > 44 \\mid \\text{qualifies}) = \\frac{P(F_1 \\cap X_2 > 44)}{P(\\text{qualifies})} $$  \n- Step 3: Compute $ P(\\text{qualifies}) = 1 - P(\\text{all fails}) = 1 - 0.3821^3 = 0.9442 $.  \n- Step 4: Final probability:  \n  $$ \\frac{0.3821 \\times 0.1587}{0.9442} = 0.0642 $$  \n\n**Takeaway:** Joint probability counts only one specific path, but conditional probability adjusts for all qualifying paths.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "Given $ P(A \\cup B) = 0.65 $ and $ P(B \\mid A) = 0.3 $, derive the equation $ 14x + 20y = 13 $. How does mutual exclusivity between B and C simplify $ P(B \\cup C) $?", "answer": "- Step 1: Use $ P(B \\mid A) = \\frac{P(A \\cap B)}{P(A)} \\Rightarrow P(A \\cap B) = 0.3x $.  \n- Step 2: Apply addition rule:  \n  $$ 0.65 = x + y - 0.3x \\Rightarrow 0.65 = 0.7x + y \\Rightarrow 14x + 20y = 13 $$  \n- Step 3: If B and C are mutually exclusive, $ P(B \\cup C) = P(B) + P(C) $ because $ P(B \\cap C) = 0 $.  \n\n**Takeaway:** Conditional probability links intersections to simpler probabilities; mutual exclusivity simplifies unions.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "How do you derive the probability distribution from a cumulative distribution function (CDF)? Calculate $ \\operatorname{Var}(13X - 6) $ given $ \\operatorname{Var}(X) = \\frac{165}{169} $.", "answer": "- Step 1: For each $ x $, $ P(X = x) = F(x) - F(x-1) $. Example (Q7(b)):  \n  $$ P(X=2) = F(2) - F(1) = \\frac{7}{26} - \\frac{2}{26} = \\frac{5}{26} $$  \n- Step 2: Variance transformation:  \n  $$ \\operatorname{Var}(13X - 6) = 13^2 \\cdot \\operatorname{Var}(X) = 169 \\cdot \\frac{165}{169} = 165 $$  \n\n**Takeaway:** CDF differences give PMF; variance ignores additive constants and squares multipliers.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "For $ X \\sim N(\\mu, 36) $, solve $ P(\\mu - 2k < X < \\mu + 2k) = 0.6 $ for $ k $. Why does $ \\Phi(0.8416) = 0.8 $ appear in the solution?", "answer": "- Step 1: Standardize:  \n  $$ P\\left( -\\frac{2k}{6} < Z < \\frac{2k}{6} \\right) = 0.6 \\Rightarrow 2\\Phi\\left( \\frac{k}{3} \\right) - 1 = 0.6 $$  \n- Step 2: Solve $ \\Phi\\left( \\frac{k}{3} \\right) = 0.8 \\Rightarrow \\frac{k}{3} = 0.8416 \\Rightarrow k = 2.52 $.  \n- Step 3: $ \\Phi(0.8416) = 0.8 $ because the total area between $ -0.8416 $ and $ 0.8416 $ is 60%, leaving 20% in each tail.  \n\n**Takeaway:** Symmetric normal intervals relate to one-tail probabilities via $ \\Phi(z) = (1 + \\text{confidence})/2 $.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "Compare interpolation and extrapolation using Q4(d)(ii) where a French score of 18 is outside the observed range. Why is extrapolation unreliable?", "answer": "- Step 1: Interpolation estimates within the data range (e.g., 55 in Q4(d)(i)), while extrapolation (e.g., 18 in Q4(d)(ii)) extends beyond it.  \n- Step 2: The regression line is derived from observed data (24 ≤ f ≤ 68). Relationships outside this range may not be linear.  \n- Step 3: Example: A French score of 18 might correspond to very low Spanish scores, which the linear model may not capture (e.g., ceiling/floor effects).  \n\n**Takeaway:** Extrapolation assumes the linear trend continues indefinitely, which is unverified.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "Why does the mode of $ X $ occur at $ x = 4 $ in Q7, even though $ F(4) = 1 $? How does the mode relate to the PMF?", "answer": "- Step 1: The mode is the $ x $ with the highest $ P(X = x) $. From Q7(b):  \n  $$ P(X=4) = \\frac{13}{26} = 0.5,\\quad \\text{highest among all } x $$  \n- Step 2: $ F(4) = 1 $ only indicates all probability is ≤4; it does not affect the mode’s location.  \n- Step 3: The CDF’s value at a point doesn’t directly determine mode; the PMF’s peak does.  \n\n**Takeaway:** The mode is about the maximum probability mass, not cumulative probability.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}], "count": 10}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "For grouped data, the median is estimated using interpolation. Given a sample of n = 408 observations, with cumulative frequencies 32, 184, 304 in the first three classes respectively, and the median class being \"13 ≤ h < 15\" with frequency 120 and width 2, calculate the median height using linear interpolation. (3 steps)", "answer": "- Step 1: Find the median position: n/2 = 408/2 = 204. Identify the median class by finding where the 204th observation falls (it falls in 13 ≤ h < 15 since 184 < 204 ≤ 304).\n- Step 2: Apply the median interpolation formula: L + [(n/2 - F<) / f] × w, where L = lower boundary = 13, F< = cumulative frequency before = 184, f = frequency in class = 120, w = class width = 2.\n- Step 3: Median = 13 + [(204 - 184) / 120] × 2 = 13 + (20/120) × 2 = 13 + 1/3 ≈ 13.3 cm.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "A teacher states that data are \"negatively skewed\" based on comparing the mean and median. If mean = 13.2 cm and median ≈ 13.3 cm, explain why this describes negative skew and what the general rule is. (2 steps)", "answer": "- Step 1: Compare mean to median. Since mean (13.2) < median (13.3), the tail extends toward lower values — this is negative (left) skew.\n- Step 2: The general rule: mean > median → positive (right) skew; mean < median → negative (left) skew; mean ≈ median → symmetric.\n\n[Mean is pulled toward the tail; median is the middle value]", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "In Q1(d), we needed the probability that a randomly chosen plant has height between 8 cm and 14 cm. The class \"5 ≤ h < 9\" has frequency 32 with width 4, and class \"13 ≤ h < 15\" has frequency 120 with width 2. Explain why we cannot simply use the full frequencies for these classes, and how we handle the boundaries at 8 cm and 14 cm. (3 steps)", "answer": "- Step 1: The interval [8, 14) cuts through two classes: \"5 ≤ h < 9\" and \"13 ≤ h < 15\". We need only the portions within [8, 14).\n- Step 2: For \"5 ≤ h < 9\", only the portion from 8 to 9 is relevant: (9-8)/4 = 1/4 of the class width, so contribution = (1/4) × 32 = 8.\n- Step 3: For \"13 ≤ h < 15\", only the portion from 13 to 14 is relevant: (14-13)/2 = 1/2 of the class width, so contribution = (1/2) × 120 = 60. The middle class \"9 ≤ h < 13\" (frequency 152) is fully included.\n\n[Assume uniform distribution within each class when splitting]", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "When selecting 2 plants WITHOUT replacement from 408 total, with 220 plants in the target range [8, 14), what is the probability that both selected plants fall in this range? Explain why we don't square the fraction. (2 steps)", "answer": "- Step 1: For without replacement, the denominator changes after the first selection. The probability is: (220/408) × (219/407).\n- Step 2: We don't square because the events are not independent — after selecting one plant, there are only 407 plants remaining, and if the first was in the range, only 219 remain in that range. With replacement would be (220/408)².\n\n[First pick: favorable/408; Second pick: (favorable-1)/(total-1)]", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "Given ∑x = 862, ∑x² = 62802, and n = 12, calculate Sxx and hence find the standard deviation of the 12 values. Show the intermediate steps. (3 steps)", "answer": "- Step 1: Calculate Sxx = ∑x² - (∑x)²/n = 62802 - (862)²/12 = 62802 - 743044/12 = 62802 - 61920.333 = 881.667.\n- Step 2: For population standard deviation (used in S1): σ = √(Sxx/n) = √(881.667/12) = √73.4722 = 8.5716.\n- Step 3: Round to 3 s.f.: 8.57 °F.\n\n[Note: S1 uses population σ (divide by n), not sample s (divide by n-1)]", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "Explain why, when converting temperatures from °F to °C using c = (5/9)(f - 32), the standard deviation scales by 5/9 but the mean does NOT simply subtract 32 and multiply by 5/9. (2 steps)", "answer": "- Step 1: The formula c = (5/9)(f - 32) = (5/9)f - (5/9)(32) is a linear transformation u = a + bx with a = -160/9 and b = 5/9.\n- Step 2: For the mean: μ_c = a + bμ_f = -(5/9)(32) + (5/9)μ_f = (5/9)(μ_f - 32). For the standard deviation: σ_c = |b|σ_f = (5/9)σ_f. The additive constant -32 affects the mean but NOT the standard deviation; the multiplicative constant 5/9 scales both.\n\n[Additive shift affects location (mean) but not spread (σ); multiplicative scales both]", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "The product moment correlation coefficient r is invariant under linear coding. If we transform x → u = (5/9)(x - 32) and y → v = (5/9)(y - 32), what is r_uv and why? (2 steps)", "answer": "- Step 1: r is invariant under linear transformations of the form u = a + bx, v = c + dy where b, d > 0 (positive scaling).\n- Step 2: Here b = d = 5/9 > 0, so r_uv = r_xy. The additive constants (-32) and the common multiplicative constant (5/9) both cancel out in the correlation formula since r = S_uv / √(S_uu S_vv).\n\n[Proof: S_uu = b²S_xx, S_vv = d²S_yy, S_uv = bdS_xy, so r_uv = bdS_xy/(|b||d|√(S_xx S_yy)) = S_xy/√(S_xx S_yy) = r_xy]", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "In a probability tree with Year 12 (probability p) and Year 13 (probability 1-p), where P(L|Year12) = 1/8 and P(L|Year13) = 1/10, and given that P(L) = 0.11, set up and solve the equation to find p. (3 steps)", "answer": "- Step 1: Using the law of total probability: P(L) = p × (1/8) + (1-p) × (1/10) = 0.11.\n- Step 2: Multiply by 80 (LCM of 8 and 10): 10p + 8(1-p) = 8.8 → 10p + 8 - 8p = 8.8 → 2p + 8 = 8.8.\n- Step 3: 2p = 0.8 → p = 0.4 = 2/5.\n\n[Key: Write P(L) as weighted sum of conditional probabilities]", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "What is the critical error in writing P(Year 12 | Right-handed) = p × (7/8)? This was Phuc's mistake in Q3(d). Explain what this expression actually represents. (2 steps)", "answer": "- Step 1: p × (7/8) = P(Year 12) × P(R|Year 12) = P(Year 12 ∩ Right-handed) — this is the JOINT probability.\n- Step 2: The question asks for CONDITIONAL probability P(Year 12 | Right-handed), which requires dividing by P(Right-handed): P(A|B) = P(A ∩ B) / P(B). The \"given that\" trigger demands this division.\n\n[The phrase \"given that\" always signals: write P(A|B) = P(A∩B)/P(B)]", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "Calculate P(Year 12 | R) given p = 2/5, P(L|Year 12) = 1/8, P(L|Year 13) = 1/10. Show both the numerator and denominator calculations. (4 steps)", "answer": "- Step 1: First find P(Year 12 ∩ R) = p × P(R|Year 12) = (2/5) × (7/8) = 14/40 = 7/20.\n- Step 2: Find P(R) using the complement: P(R) = 1 - P(L) = 1 - 0.11 = 0.89 = 89/100. (Or directly: p×(7/8) + (1-p)×(9/10) = 7/20 + 27/50 = 89/100.)\n- Step 3: Apply conditional formula: P(Year 12 | R) = P(Year 12 ∩ R) / P(R) = (7/20) / (89/100).\n- Step 4: = (7/20) × (100/89) = 700/1780 = 35/89 ≈ 0.393.\n\n[Always verify P(R) by two methods: complement and direct sum]", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "For n = 11 data points, the Spanish marks are sorted: 16, 24, 28, 32, 36, 38, 44, 48, 48, 68, 90. Using the outlier definition Q3 + 1.5×IQR, show that 90 is an outlier. (3 steps)", "answer": "- Step 1: Find Q1 at position (n+1)/4 = 12/4 = 3: Q1 = 28. Find Q3 at position 3(n+1)/4 = 36/4 = 9: Q3 = 48.\n- Step 2: Calculate IQR = Q3 - Q1 = 48 - 28 = 20. Upper fence = Q3 + 1.5×IQR = 48 + 1.5×20 = 48 + 30 = 78.\n- Step 3: Since 90 > 78, 90 exceeds the upper fence, so it is an outlier.\n\n[For integer quartile positions (n=11), no interpolation needed]", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "In least squares regression with summary statistics S_ff = 1667.6, S_fs = 1735.6, ∑f = 422, ∑s = 382, n = 10, find the regression line equation s = a + bf. Show all steps. (4 steps)", "answer": "- Step 1: Calculate means: f̄ = 422/10 = 42.2, s̄ = 382/10 = 38.2.\n- Step 2: Calculate gradient b = S_fs / S_ff = 1735.6 / 1667.6 = 1.0408 ≈ 1.04 (3 s.f.).\n- Step 3: Calculate intercept a = s̄ - b × f̄ = 38.2 - 1.0408 × 42.2 = 38.2 - 43.921 = -5.721 ≈ -5.72.\n- Step 4: Write equation: s = -5.72 + 1.04f.\n\n[Watch sign: b×f̄ > s̄ gives negative intercept]", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "Explain why the estimate for Spanish mark when French = 55 is more reliable than when French = 18, given the French data range is 24 to 68. (2 steps)", "answer": "- Step 1: 55 lies within the observed range [24, 68], so this is INTERPOLATION — predicting within the range of collected data.\n- Step 2: 18 lies outside this range, so this is EXTRAPOLATION — predicting beyond the data. The linear relationship may not hold outside the observed range, making extrapolation unreliable.\n\n[Key phrase: \"interpolation is reliable, extrapolation is unreliable\"]", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "For a Normal distribution X ~ N(40, 4²), calculate P(X < 38.8) using standardisation, showing the z-value and table lookup. (3 steps)", "answer": "- Step 1: Standardise: z = (x - μ) / σ = (38.8 - 40) / 4 = -1.2 / 4 = -0.30.\n- Step 2: From Normal tables, Φ(0.30) = 0.6179. Since z is negative, P(Z < -0.30) = 1 - Φ(0.30) = 1 - 0.6179 = 0.3821.\n- Step 3: Therefore P(X < 38.8) = 0.3821.\n\n[Always show the z-value and reference the table]", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": true}, {"question": "An athlete has 3 independent attempts to throw > 38.8m, where P(success) = 0.6179. Find P(qualifies), i.e., at least one success in 3 attempts. Then find P(qualified on 2nd throw with distance > 44m | qualifies), given P(X > 44) = 0.1587. (4 steps)", "answer": "- Step 1: P(fail) = 0.3821. P(qualifies) = 1 - P(all fail) = 1 - (0.3821)³ = 1 - 0.0558 = 0.9442.\n- Step 2: Event \"qualified on 2nd throw with >44m\" means: fail on throw 1 AND succeed (>44m) on throw 2. Since X > 44 implies X > 38.8, this is a success.\n- Step 3: P(joint) = P(fail on 1st) × P(>44 on 2nd) = 0.3821 × 0.1587 = 0.06064.\n- Step 4: Conditional: P(event | qualifies) = 0.06064 / 0.9442 = 0.0642 (3 s.f.).\n\n[The joint is a subset of \"qualifies\", so divide by P(qualifies)]", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "Given P(A) = x, P(B) = y, P(A ∪ B) = 0.65, and P(B|A) = 0.3, show that 14x + 20y = 13. (3 steps)", "answer": "- Step 1: From P(B|A) = P(A ∩ B) / P(A) = 0.3, we get P(A ∩ B) = 0.3 × P(A) = 0.3x.\n- Step 2: Use addition rule: P(A ∪ B) = P(A) + P(B) - P(A ∩ B). So 0.65 = x + y - 0.3x = 0.7x + y.\n- Step 3: Multiply by 20 to clear decimals: 13 = 14x + 20y.\n\n[Watch direction: P(B|A) = P(A∩B)/P(A), so P(A∩B) = P(B|A) × P(A) = 0.3x, NOT 0.3y]", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "Events B and C are mutually exclusive with P(B ∪ C) = 0.85 and P(C) = ½x + y. Given P(B) = y, find a second equation in x and y. Then solve with 14x + 20y = 13 to find x and y. (4 steps)", "answer": "- Step 1: Mutually exclusive means P(B ∩ C) = 0. So P(B ∪ C) = P(B) + P(C) = y + (½x + y) = ½x + 2y = 0.85.\n- Step 2: Multiply by 2: x + 4y = 1.7. Multiply by 5: 5x + 20y = 8.5.\n- Step 3: Solve simultaneously with 14x + 20y = 13. Subtract: 9x = 4.5 → x = 0.5.\n- Step 4: Substitute: 0.5 + 4y = 1.7 → 4y = 1.2 → y = 0.3.\n\n[Mutually exclusive: intersection = 0, so union = sum of probabilities]", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "For x = P(A) = 0.5 and y = P(B) = 0.3, test whether A and B are independent, given P(B|A) = 0.3. Show the calculation. (3 steps)", "answer": "- Step 1: First find P(A ∩ B) = P(B|A) × P(A) = 0.3 × 0.5 = 0.15.\n- Step 2: Calculate P(A) × P(B) = 0.5 × 0.3 = 0.15.\n- Step 3: Since P(A ∩ B) = P(A) × P(B), the events are independent.\n\n[Independence test: compare intersection product with product of marginals]", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "A discrete random variable X has CDF: F(1) = 1/13, F(2) = (2k-1)/26, F(3) = (3k+1)/26, F(4) = (k+4)/8. Given that F(4) = 1, find k. (2 steps)", "answer": "- Step 1: For any CDF, F(x_max) = 1 (the cumulative probability reaches certainty at the largest value).\n- Step 2: (k+4)/8 = 1 → k + 4 = 8 → k = 4.\n\n[Always verify: largest CDF value equals 1]", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "With k = 4, the CDF values are: F(1) = 2/26, F(2) = 7/26, F(3) = 13/26, F(4) = 1 = 26/26. Find the probability distribution P(X = x) for x = 1, 2, 3, 4. (3 steps)", "answer": "- Step 1: For discrete RVs, P(X = x) = F(x) - F(x-1), where F(0) = 0.\n- Step 2: Calculate each: P(X=1) = 2/26 - 0 = 2/26; P(X=2) = 7/26 - 2/26 = 5/26; P(X=3) = 13/26 - 7/26 = 6/26; P(X=4) = 26/26 - 13/26 = 13/26.\n- Step 3: Verify: (2+5+6+13)/26 = 26/26 = 1 ✓\n\n[Check probabilities sum to 1 before proceeding]", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "Find the mode of the distribution with P(X=1)=2/26, P(X=2)=5/26, P(X=3)=6/26, P(X=4)=13/26. (1 step)", "answer": "The mode is the value with highest probability: P(X=4) = 13/26 is the largest, so mode = 4.\n\n[Mode = value(s) with maximum probability mass]", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "For the distribution with P(X=1)=2/26, P(X=2)=5/26, P(X=3)=6/26, P(X=4)=13/26, calculate Var(13X - 6). Show all steps. (5 steps)", "answer": "- Step 1: First find E(X): = (1×2 + 2×5 + 3×6 + 4×13)/26 = (2+10+18+52)/26 = 82/26 = 41/13.\n- Step 2: Find E(X²): = (1×2 + 4×5 + 9×6 + 16×13)/26 = (2+20+54+208)/26 = 284/26 = 142/13.\n- Step 3: Var(X) = E(X²) - [E(X)]² = 142/13 - (41/13)² = 142/13 - 1681/169 = (142×13 - 1681)/169 = (1846-1681)/169 = 165/169.\n- Step 4: Apply transformation: Var(aX + b) = a² Var(X). So Var(13X - 6) = 13² × Var(X).\n- Step 5: = 169 × (165/169) = 165.\n\n[The constant -6 disappears; the multiplier 13 is squared]", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "For X ~ N(μ, 36), find k such that P(μ - 2k < X < μ + 2k) = 0.6. (4 steps)", "answer": "- Step 1: Standardise: P(μ - 2k < X < μ + 2k) = P(-2k/6 < Z < 2k/6) = 0.6.\n- Step 2: For symmetric interval: P(|Z| < z) = 2Φ(z) - 1 = 0.6, so Φ(z) = 0.8.\n- Step 3: From inverse normal tables, Φ⁻¹(0.8) = 0.8416. So 2k/6 = 0.8416.\n- Step 4: 2k = 6 × 0.8416 = 5.0496 → k = 2.52 (3 s.f.).\n\n[Key conversion: two-tail p → one-tail Φ = (1+p)/2]", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "Given Y ~ N(μ, σ) with 2μ = 3σ² and P(Y > 1.5μ) = 0.0668, find μ and σ. (5 steps)", "answer": "- Step 1: Standardise: P(Y > 1.5μ) = P(Z > (1.5μ - μ)/σ) = P(Z > μ/(2σ)) = 0.0668.\n- Step 2: So Φ(μ/(2σ)) = 1 - 0.0668 = 0.9332. From tables, Φ(1.5) = 0.9332, so μ/(2σ) = 1.5.\n- Step 3: Therefore μ = 3σ. This is equation (i).\n- Step 4: Substitute into 2μ = 3σ²: 2(3σ) = 3σ² → 6σ = 3σ² → 3σ² - 6σ = 0 → 3σ(σ - 2) = 0.\n- Step 5: σ = 0 (reject, σ > 0) or σ = 2. So σ = 2, μ = 3 × 2 = 6.\n\n[Always reject non-physical solutions: σ must be positive]", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "A student calculates the regression line and gets s = 1.04f - 5.72. They interpret the gradient as \"for each additional French mark, Spanish mark increases by 1.04.\" Why is this incomplete and what should be added? (1 step)", "answer": "The interpretation should include units and context: \"For each additional mark scored in the French test, the predicted Spanish mark increases by approximately 1.04 marks.\"\n\n[Include \"marks\" twice and reference both variables]", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "In the probability tree for Q3, the branches from Year 12 show P(L) = 1/8. What is the probability on the complementary branch (right-handed)? Explain why. (1 step)", "answer": "P(R | Year 12) = 1 - P(L | Year 12) = 1 - 1/8 = 7/8. Probabilities on each set of branches must sum to 1 (the sample space is exhausted).\n\n[Complement: P(A') = 1 - P(A)]", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "A student forgetfully calculates Var(13X - 6) as 13 × Var(X) - 6. Explain why this is wrong and what the correct formula is. (2 steps)", "answer": "- Step 1: The correct transformation formula is Var(aX + b) = a² Var(X). The additive constant b drops out entirely (it affects mean but not variance).\n- Step 2: The multiplier a is squared, not used as-is. So Var(13X - 6) = 13² × Var(X) = 169 × Var(X), not 13 × Var(X) - 6.\n\n[Variance measures spread, not location — constants don't matter]", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "Why can we not simply look up Φ⁻¹(0.6) in the Normal table to solve Q8(a)? What is the correct conversion? (2 steps)", "answer": "- Step 1: The table gives Φ(z) = P(Z ≤ z). For a two-sided symmetric interval P(|Z| < z) = 0.6, this is NOT Φ⁻¹(0.6).\n- Step 2: The conversion: P(|Z| < z) = 2Φ(z) - 1 = 0.6 → Φ(z) = 0.8. So we need Φ⁻¹(0.8), not Φ⁻¹(0.6).\n\n[Two-tail probability p → one-tail Φ = (1+p)/2]", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "In Q5(b), a student computes P(qualified on 2nd throw with >44m) as P(fail on 1st) × P(>44 on 2nd) = 0.3821 × 0.1587 = 0.0606. Why is this NOT the final answer, and what is missing? (2 steps)", "answer": "- Step 1: This calculation gives the JOINT probability P(fail on 1st AND >44 on 2nd), not the conditional probability.\n- Step 2: The question asks for P(qualified on 2nd with >44m | qualified). We must divide by P(qualified) = 0.9442. So answer = 0.0606/0.9442 ≈ 0.0642.\n\n[Always identify whether the question asks for joint or conditional]", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "Explain why, when testing for an outlier using the fence method Q3 + 1.5×IQR, we only check if 90 > Q3 + 1.5×IQR and don't also check if 90 < Q1 - 1.5×IQR in Q4(a). (1 step)", "answer": "Since 90 is the maximum value (largest observation), it can only be an upper outlier. We only check the relevant direction: if it exceeds the upper fence. The lower fence check is unnecessary because 90 cannot be below the lower fence.\n\n[Check both directions only for mid-range values]", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "In Q2(d), a student states r_uv = 0.849 but doesn't give a reason. Why might they lose a mark, and what is the precise reason? (2 steps)", "answer": "- Step 1: The question asks to \"state, giving a reason\" — 2 marks total, 1 for the value and 1 for the explanation.\n- Step 2: The reason: PMCC is invariant under linear transformations with positive scaling. Since u = (5/9)(x - 32) and v = (5/9)(y - 32) both have positive multipliers (5/9 > 0), the correlation is unchanged: r_uv = r_xy.\n\n[Always give the reason when asked — formula tests understanding, not just computation]", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "When calculating the probability in Q1(d), we assumed uniform distribution within each class. Explain why this assumption is reasonable for histogram-based probability estimates. (1 step)", "answer": "Histograms show only frequency density (height) and class width — we have no information about the distribution within each class. The most natural assumption is uniform (flat) distribution within each bar, which is standard practice for estimating probabilities from grouped data.\n\n[We only know the area (frequency), not the shape within the class]", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "In Q7(a), we set (k+4)/8 = 1 to find k. But the CDF table shows F(3) = (3k+1)/26. With k = 4, this gives 13/26 = 0.5. Explain why this is valid — doesn't the CDF need to increase at each step? (2 steps)", "answer": "- Step 1: Yes, a valid CDF must be non-decreasing. With k = 4: F(1) = 2/26 ≈ 0.077, F(2) = 7/26 ≈ 0.269, F(3) = 13/26 = 0.5, F(4) = 26/26 = 1.\n- Step 2: Each value increases: 0.077 < 0.269 < 0.5 < 1, so the CDF is valid. The probabilities P(X=1), P(X=2), etc. are all positive.\n\n[Verify F(x) is monotonically increasing]", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "In Q6(b)(ii), we solved the simultaneous equations and got x = 0.5, y = 0.3. Verify these satisfy both original equations: 14x + 20y = 13 and x + 4y = 1.7. (2 steps)", "answer": "- Step 1: Check 14(0.5) + 20(0.3) = 7 + 6 = 13 ✓\n- Step 2: Check 0.5 + 4(0.3) = 0.5 + 1.2 = 1.7 ✓\n\n[Always verify solutions satisfy original equations]", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "Why is the probability of qualifying on the 2nd throw in Q5(b) defined as P(fail on 1st AND >44 on 2nd), rather than P(fail on 1st) × P(>44 on 2nd | fail on 1st)? (2 steps)", "answer": "- Step 1: The throws are independent (stated in the question), so P(>44 on 2nd | fail on 1st) = P(>44 on 2nd).\n- Step 2: Therefore P(fail on 1st AND >44 on 2nd) = P(fail on 1st) × P(>44 on 2nd). This is simpler to compute directly since independence removes the conditional complexity.\n\n[When independence is given, joint = product of marginals]", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "In the regression calculation Q4(b), we ignored the point (30, 90). Explain why this is valid and why we must explicitly exclude it from calculations. (1 step)", "answer": "The question states \"Ignoring the point (30, 90), Greg calculated...\" This means we use only the remaining 10 data points for the regression. The outlier has been identified and removed as per the instruction — we must respect this when calculating.\n\n[Follow the question's explicit instructions about what data to use]", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "When finding quartiles for n = 11 in Q4(a), we used positions 3 and 9. Explain why no interpolation was needed between adjacent data points. (2 steps)", "answer": "- Step 1: The quartile position formulas give: Q1 at (n+1)/4 = 12/4 = 3 (integer), Q3 at 3(n+1)/4 = 36/4 = 9 (integer).\n- Step 2: When the position is an integer, we simply take that data point directly — no interpolation between positions 2 and 3 or 8 and 9 is needed.\n\n[Integer position → use that value; non-integer → interpolate]", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "In Q3(b), we found p = 0.4. Verify that with this value, P(L) = 0.11 exactly. (2 steps)", "answer": "- Step 1: P(L) = p × (1/8) + (1-p) × (1/10) = (0.4 × 0.125) + (0.6 × 0.1) = 0.05 + 0.06 = 0.11.\n- Step 2: This matches the given P(L) = 0.11, confirming p = 0.4 is correct.\n\n[Always verify your solution satisfies the original condition]", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "A student gets Var(13X - 6) = 165 in Q7(d). If they had forgotten to square the 13 and used Var(13X - 6) = 13 × Var(X), what would their answer have been? (1 step)", "answer": "- Step 1: Var(X) = 165/169.\n- Step 2: 13 × (165/169) = 2145/169 ≈ 12.69.\n\n[Wrong — must square the coefficient]", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "In Q8(b), we got σ = 2 and μ = 6. If we had kept the σ = 0 solution, why would this be rejected? (1 step)", "answer": "Standard deviation σ must be positive (σ > 0) for a Normal distribution — it measures spread and cannot be zero or negative. A degenerate distribution with σ = 0 would be a point mass at μ, not a Normal distribution.\n\n[Physical interpretation: σ represents variability, must be positive]", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}, {"question": "Explain why the probability calculation in Q1(d) uses multiplication rather addition: (220/408) × (219/407) rather than adding probabilities. (1 step)", "answer": "We're selecting two distinct plants — the first AND second both need to be in the range. \"Both\" implies the intersection of two events, which requires multiplication (for independent or without-replacement cases). Addition would be for \"either/or\" (union) scenarios.\n\n[Both = intersection (×); either = union (+)]", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "In Q2(c), we calculated mean in °C as (5/9)(71.833 - 32) = 22.13. If we had incorrectly subtracted 32 AFTER multiplying by 5/9, what would the error be? (1 step)", "answer": "- Step 1: Wrong: (5/9)(71.833) - 32 = 39.91 - 32 = 7.91 °C (way off!)\n- Step 2: Correct: (5/9)(71.833 - 32) = (5/9)(39.833) = 22.13 °C.\n\n[The order matters: subtract 32 FIRST, then multiply by 5/9]", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": false}, {"question": "A student says \"the gradient of 1.04 means Spanish marks are always 1.04 times French marks.\" Why is this statement incorrect? (1 step)", "answer": "The regression line gives the predicted average Spanish mark for a given French mark, not an exact multiplier relationship. It estimates the expected value, not a deterministic conversion. Also, the intercept is not zero, so it's not proportional.\n\n[Regression predicts the mean of Y given X, not exact values]", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "In Q6(c), we found A and B are independent. If P(A ∩ B) had been different from P(A)P(B), state the correct conclusion and the formula used to test. (1 step)", "answer": "If P(A ∩ B) ≠ P(A) × P(B), then A and B are NOT independent (they are dependent). The test is always: compute both sides numerically and compare.\n\n[Independence requires exact equality of the products]", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": false}, {"question": "Why do we multiply by 20 in Q6(a) to get 14x + 20y = 13, when the equation was 0.7x + y = 0.65? (1 step)", "answer": "Multiplying by 20 clears the decimals (0.7 → 14, 0.65 → 13) and produces integer coefficients, which matches the required \"show that\" form. It's good practice to simplify to integers.\n\n[Clear decimals by multiplying by appropriate factor]", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": false}, {"question": "In Q4(e), we stated the estimate at French = 55 is more reliable because it's interpolation, while French = 18 is extrapolation. What specific data range supports this? (1 step)", "answer": "The French marks in the data range from 24 to 68 (excluding the outlier). 55 is within [24, 68] → interpolation. 18 is outside → extrapolation.\n\n[Quote the actual data range to justify]", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": false}, {"question": "In Q1(a), we found frequencies: 32, 152, 120, 64, 40. Verify they sum to 408. (1 step)", "answer": "32 + 152 + 120 + 64 + 40 = (32 + 152) + (120 + 64) + 40 = 184 + 184 + 40 = 408 ✓\n\n[Always sum frequencies to check against total n]", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": false}, {"question": "A student calculates the median in Q1(b) as simply the middle value of the ordered data. Why is this incorrect for grouped data, and what method must be used? (1 step)", "answer": "With grouped data (from a histogram), we don't have individual values — we only know frequencies in classes. We must use linear interpolation within the median class: L + [(n/2 - F<)/f] × w.\n\n[Grouped data → interpolation formula; raw data → simple middle position]", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": false}], "count": 48}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "A grouped data set has n = 408 observations. Using interpolation to find the median, you determine that the median lies in the class 13 ≤ h < 15 with cumulative frequency before this class F< = 184 and frequency in the class f = 120, class width w = 2. Calculate the estimated median height. (3 steps)", "answer": "- Step 1: Find the median position: n/2 = 408/2 = 204. The 204th observation lies in the class where cumulative frequency first exceeds 204.\n- Step 2: Apply the median interpolation formula: L + ((n/2 - F<) / f) × w, where L is the lower class boundary.\n- Step 3: Median = 13 + ((204 - 184) / 120) × 2 = 13 + (20/120) × 2 = 13 + 1/3 ≈ 13.3 cm.\n\nThis formula linearly interpolates within the median class assuming uniform distribution of observations within the class interval.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "For a data set, the mean is 13.2 cm and the estimated median is 13.3 cm. Describe the skewness of this distribution and explain your reasoning using the relationship between mean and median. (1 step)", "answer": "The data are negatively skewed (left-skewed). The reason is that the mean (13.2) is less than the median (13.3). In negatively skewed distributions, the long tail extends to the left (lower values), pulling the mean below the median. Conversely, if mean > median, the distribution is positively skewed.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "In a histogram, you need to find the probability that a randomly selected plant has height between 8 cm and 14 cm. The class [5, 9) has frequency 32 (width 4), class [9, 13) has frequency 152 (width 4), and class [13, 15) has frequency 120 (width 2). How many plants fall in the interval [8, 14)? (4 steps)", "answer": "- Step 1: For class [5, 9): only the portion from 8 to 9 contributes. Width used = 9 - 8 = 1. Proportion = 1/4 of the class. Frequency = (1/4) × 32 = 8.\n- Step 2: For class [9, 13): this entire class lies within [8, 14), so frequency = 152.\n- Step 3: For class [13, 15): only the portion from 13 to 14 contributes. Width used = 14 - 13 = 1. Proportion = 1/2 of the class. Frequency = (1/2) × 120 = 60.\n- Step 4: Total in [8, 14) = 8 + 152 + 60 = 220.\n\nThis assumes uniform distribution within each class, which is the standard assumption for histogram-based probability estimates.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": true}, {"question": "Two plants are selected without replacement from 408 plants, of which 220 have heights between 8 cm and 14 cm. Write down the expression for the probability that both selected plants fall in this height range, and explain why you cannot simply square the probability. (2 steps)", "answer": "- Step 1: The probability is (220/408) × (219/407). After selecting the first plant, there are now 219 plants in the target range out of 407 remaining plants (since we did not replace the first plant).\n- Step 2: You cannot square the probability because sampling without replacement changes the denominator and numerator for the second draw. The draws are not independent events — the outcome of the first draw affects the probability of the second.\n\nThis is the hypergeometric situation versus the binomial (with replacement) situation.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "Given ∑x = 862 and n = 12, calculate the mean of the 12 values of average minimum monthly temperature. (1 step)", "answer": "The mean is calculated as ∑x/n = 862/12 = 71.833... ≈ 71.8°F. This is the arithmetic average of all 12 monthly temperature readings.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "Calculate Sxx given ∑x = 862, ∑x² = 62802, and n = 12. Show your working and explain what Sxx represents. (3 steps)", "answer": "- Step 1: The formula is Sxx = ∑x² - (∑x)²/n.\n- Step 2: Sxx = 62802 - (862)²/12 = 62802 - 743044/12 = 62802 - 61920.333... = 881.667.\n- Step 3: Sxx represents the sum of squared deviations from the mean, or equivalently n times the population variance (before dividing by n).\n\nThis is also written as Σ(x - x̄)² and is always non-negative.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "From the Sxx value of 881.667 and n = 12, calculate the population standard deviation of the 12 values. Show that the answer is 8.57 to 3 significant figures. (2 steps)", "answer": "- Step 1: Population variance = Sxx/n = 881.667/12 = 73.4722.\n- Step 2: Population standard deviation = √(73.4722) = 8.5716 ≈ 8.57 (3 s.f.).\n\nNote: S1 uses population standard deviation (divide by n), not sample standard deviation (divide by n-1).", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "Calculate the product moment correlation coefficient r given Sxy = 512.67, Sxx = 881.667, and Syy = 413.67. (2 steps)", "answer": "- Step 1: The formula is r = Sxy / √(Sxx × Syy).\n- Step 2: r = 512.67 / √(881.667 × 413.67) = 512.67 / √364752.5 = 512.67 / 603.948 = 0.8489 ≈ 0.849.\n\nThis strong positive correlation indicates that higher minimum temperatures are associated with higher maximum temperatures.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": true}, {"question": "The temperature conversion formula is c = (5/9)(f - 32). Given the mean temperature in °F is 71.833°F with standard deviation 8.57°F, calculate the mean and standard deviation in °C. Explain why the standard deviation does not require subtracting 32. (3 steps)", "answer": "- Step 1: For mean: c̄ = (5/9)(71.833 - 32) = (5/9)(39.833) = 22.13 ≈ 22.1°C.\n- Step 2: For standard deviation: the additive constant -32 is a location shift that does not affect spread. Only the multiplicative factor 5/9 scales the spread: σc = (5/9) × 8.57 = 4.76°C.\n- Step 3: The additive shift -32 applies to every value equally, so distances between values (and hence spread) remain unchanged. The multiplier 5/9 shrinks all distances by that factor.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "State the property of the product moment correlation coefficient under linear coding, and explain why r between the Celsius temperatures u and v equals r between the Fahrenheit temperatures x and y. (2 steps)", "answer": "- Step 1: The PMCC is invariant under linear transformations of the form u = a + bx and v = c + dy, provided b > 0 and d > 0 (positive scaling).\n- Step 2: Since the transformation from °F to °C involves u = (5/9)x - 160/9 (i.e., b = 5/9 > 0) and similarly for v, the correlation coefficient remains unchanged: r(u,v) = r(x,y) = 0.849.\n\nThe correlation measures the strength of linear relationship, which is preserved under scaling and shifting.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "In a probability tree with Year 12 (probability p) and Year 13 (probability 1-p), where Year 12 students are left-handed with probability 1/8 and right-handed with probability 7/8, and Year 13 students are left-handed with probability 1/10 and right-handed with probability 9/10, write down the expression for the overall probability of being left-handed in terms of p. (2 steps)", "answer": "- Step 1: From the tree diagram, the total probability of left-handed is the sum of probabilities along all paths leading to left-handed.\n- Step 2: P(L) = P(Y12 ∩ L) + P(Y13 ∩ L) = p × (1/8) + (1-p) × (1/10).\n\nThis is an example of the law of total probability applied to the partition {Y12, Y13}.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "Given that P(L) = 0.11 (overall probability of being left-handed), and P(L) = p/8 + (1-p)/10, find the value of p. (4 steps)", "answer": "- Step 1: Write the equation: p/8 + (1-p)/10 = 0.11.\n- Step 2: Multiply through by the common denominator 40: 5p + 4(1-p) = 4.4.\n- Step 3: Simplify: 5p + 4 - 4p = 4.4 → p + 4 = 4.4 → p = 0.4.\n- Step 4: So p = 0.4 = 2/5. This means 40% of students are in Year 12.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "With p = 2/5 found from the previous question, find P(Year 12 and left-handed). (1 step)", "answer": "P(Y12 ∩ L) = p × (1/8) = (2/5) × (1/8) = 2/40 = 1/20 = 0.05.\n\nThis is the joint probability of being in Year 12 AND left-handed, obtained by multiplying the branch probabilities.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "A student is known to be right-handed. Find the probability that the student is in Year 12, i.e., find P(Year 12 | Right-handed). This is the critical conditional probability question. (4 steps)", "answer": "- Step 1: The conditional probability formula is P(A|B) = P(A ∩ B) / P(B). Here, P(Y12|R) = P(Y12 ∩ R) / P(R).\n- Step 2: Find numerator: P(Y12 ∩ R) = p × (7/8) = (2/5) × (7/8) = 14/40 = 7/20.\n- Step 3: Find denominator: P(R) = 1 - P(L) = 1 - 0.11 = 0.89. Alternatively, P(R) = p × (7/8) + (1-p) × (9/10) = 7/20 + 27/50 = 89/100 = 0.89.\n- Step 4: Divide: P(Y12|R) = (7/20) / (89/100) = (7/20) × (100/89) = 700/1780 = 35/89 ≈ 0.393.\n\nThis is NOT the same as P(Y12 ∩ R) = 7/20. The conditioning \"given that\" requires division by P(R).", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "Explain why P(Year 12 | Right-handed) ≠ P(Year 12 and Right-handed). What is the key phrase in the question that tells you to use conditional probability? (2 steps)", "answer": "- Step 1: P(Y12 ∩ R) is the joint probability — the probability of both events happening together. P(Y12|R) is the conditional probability — the probability of Year 12 GIVEN that we know the student is right-handed.\n- Step 2: The trigger phrase is \"Given that a student is right-handed...\" This conditions on the information that the student is right-handed, requiring the denominator P(R) in the formula.\n\nThis is the most common error: giving the joint probability when conditional is required.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "For the Spanish marks data set: 16, 24, 28, 32, 36, 38, 44, 48, 48, 68, 90 (n = 11), calculate Q1, Q3, and the upper outlier fence. Show that 90 is an outlier. (4 steps)", "answer": "- Step 1: For n = 11, Q1 position = (n+1)/4 = 12/4 = 3, so Q1 = 28 (3rd value). Q3 position = 3(n+1)/4 = 36/4 = 9, so Q3 = 48 (9th value).\n- Step 2: Calculate IQR = Q3 - Q1 = 48 - 28 = 20.\n- Step 3: Upper fence = Q3 + 1.5 × IQR = 48 + 1.5 × 20 = 48 + 30 = 78.\n- Step 4: Since 90 > 78, the value 90 lies outside the fence and is therefore an outlier.\n\nWhen positions are integers, you use the data value directly without interpolation.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "Using the summary statistics (excluding the outlier): ∑f = 422, ∑s = 382, Sff = 1677.6, Sfs = 1735.6, with n = 10, find the equation of the regression line s on f. Show that the gradient b ≈ 1.04 and intercept a ≈ -5.72. (4 steps)", "answer": "- Step 1: Calculate means: f̄ = 422/10 = 42.2, s̄ = 382/10 = 38.2.\n- Step 2: Calculate gradient: b = Sfs/Sff = 1735.6/1677.6 = 1.0408 ≈ 1.04.\n- Step 3: Calculate intercept: a = s̄ - b × f̄ = 38.2 - 1.0408 × 42.2 = 38.2 - 43.921 = -5.721 ≈ -5.72.\n- Step 4: Write the equation: s = -5.72 + 1.04f.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "Give an interpretation of the gradient b = 1.04 in the context of the French and Spanish marks regression line s = -5.72 + 1.04f. (1 step)", "answer": "For each additional mark scored in the French test, the predicted Spanish mark increases by approximately 1.04 marks. The gradient represents the expected change in the dependent variable (Spanish marks) per unit change in the independent variable (French marks).", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "Using the regression equation s = -5.72 + 1.04f, estimate the Spanish mark for a student who scored (i) 55 and (ii) 18 in French. (2 steps)", "answer": "- Step 1: For f = 55: s = -5.72 + 1.04 × 55 = -5.72 + 57.2 = 51.48 ≈ 51.5 marks.\n- Step 2: For f = 18: s = -5.72 + 1.04 × 18 = -5.72 + 18.72 = 13.0 marks.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "Explain which estimate (f = 55 or f = 18) is more reliable, and state why. The French marks data range from 24 to 68. (2 steps)", "answer": "- Step 1: The estimate for f = 55 is more reliable because 55 lies within the observed range of French marks (24 ≤ f ≤ 68). This is interpolation — estimating within the range of collected data.\n- Step 2: The estimate for f = 18 is unreliable because 18 lies outside the data range (extrapolation). The linear relationship cannot be guaranteed to hold beyond the observed data, and the regression model may not be valid there.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "A discus throw distance X ~ N(40, 4²). Using standardisation, find P(X < 38.8). Show that this equals 0.3821. (2 steps)", "answer": "- Step 1: Standardise: z = (38.8 - 40) / 4 = -1.2/4 = -0.30.\n- Step 2: P(X < 38.8) = P(Z < -0.30) = 1 - Φ(0.30) = 1 - 0.6179 = 0.3821.\n\nThe negative z-value indicates 38.8 is below the mean of 40.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "An athlete has 3 independent attempts to throw more than 38.8m to qualify. Let F = \"throw fails (X < 38.8)\" with P(F) = 0.3821. Find the probability that they qualify (at least one throw exceeds 38.8m). (2 steps)", "answer": "- Step 1: Using the complement: P(qualify) = 1 - P(all 3 fail) = 1 - P(F)³.\n- Step 2: P(qualify) = 1 - (0.3821)³ = 1 - 0.0558 = 0.9442.\n\nThis is more efficient than summing the probabilities of qualifying on throw 1, 2, or 3 separately.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "Find P(X > 44) where X ~ N(40, 4²). (1 step)", "answer": "- Step 1: Standardise: z = (44 - 40)/4 = 1.00. P(X > 44) = 1 - Φ(1.00) = 1 - 0.8413 = 0.1587.\n\nThis is a relatively unlikely throw, about 15.87% of throws.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "The athlete qualified (at least one throw > 38.8m). Find the probability that they qualified on their second throw with a distance > 44m. This requires conditional probability. (5 steps)", "answer": "- Step 1: Define events: F₁ = first throw fails, S₂ = second throw > 44m. The joint probability P(F₁ ∩ S₂) = P(F₁) × P(X₂ > 44) = 0.3821 × 0.1587 = 0.06064.\n- Step 2: P(qualify) was found in Q23 as 0.9442.\n- Step 3: The conditional probability formula: P(F₁ ∩ S₂ | qualifies) = P(F₁ ∩ S₂) / P(qualifies).\n- Step 4: Calculate: 0.06064 / 0.9442 = 0.06423.\n- Step 5: Final answer: 0.0642 (3 s.f.).\n\nThis is NOT simply 0.3821 × 0.1587 — that would be the joint, not the conditional. The denominator P(qualifies) is essential.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "Given P(A) = x, P(B) = y, P(A ∪ B) = 0.65, and P(B|A) = 0.3, show that 14x + 20y = 13. (3 steps)", "answer": "- Step 1: From P(B|A) = P(A ∩ B)/P(A) = 0.3, we get P(A ∩ B) = 0.3x.\n- Step 2: Using the addition rule: P(A ∪ B) = P(A) + P(B) - P(A ∩ B), so 0.65 = x + y - 0.3x = 0.7x + y.\n- Step 3: Multiply by 20: 13 = 14x + 20y. ✓", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "Events B and C are mutually exclusive with P(B ∪ C) = 0.85 and P(C) = (1/2)x + y. Find a second equation in x and y. (2 steps)", "answer": "- Step 1: Since B and C are mutually exclusive, P(B ∩ C) = 0.\n- Step 2: P(B ∪ C) = P(B) + P(C) - P(B ∩ C) = y + (x/2 + y) = x/2 + 2y = 0.85. Multiply by 2: x + 4y = 1.7, or 5x + 20y = 8.5.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "Solve the simultaneous equations: 14x + 20y = 13 and 5x + 20y = 8.5 to find x and y. (2 steps)", "answer": "- Step 1: Subtract the second from the first: (14x - 5x) + (20y - 20y) = 13 - 8.5 → 9x = 4.5 → x = 0.5.\n- Step 2: Substitute into x + 4y = 1.7: 0.5 + 4y = 1.7 → 4y = 1.2 → y = 0.3.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "With x = P(A) = 0.5 and y = P(B) = 0.3, determine whether events A and B are statistically independent. Show your working. (3 steps)", "answer": "- Step 1: Calculate P(A) × P(B) = 0.5 × 0.3 = 0.15.\n- Step 2: Calculate P(A ∩ B) = P(B|A) × P(A) = 0.3 × 0.5 = 0.15.\n- Step 3: Since P(A ∩ B) = P(A) × P(B), the events are statistically independent.\n\nThe key is computing BOTH quantities numerically and comparing them.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "The CDF of a discrete random variable X is given with unknown k: F(1) = 1/13, F(2) = (2k-1)/26, F(3) = (3k+1)/26, F(4) = (k+4)/8. Find k. (1 step)", "answer": "- Step 1: For any CDF, F(x_max) = 1. Here x_max = 4, so (k+4)/8 = 1. Solving: k + 4 = 8 → k = 4.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "With k = 4, find the probability distribution of X from its CDF: F(1) = 2/26, F(2) = 7/26, F(3) = 13/26, F(4) = 1. (3 steps)", "answer": "- Step 1: P(X = 1) = F(1) - F(0) = 2/26 - 0 = 2/26.\n- Step 2: P(X = 2) = F(2) - F(1) = 7/26 - 2/26 = 5/26. P(X = 3) = 13/26 - 7/26 = 6/26.\n- Step 3: P(X = 4) = 1 - 13/26 = 13/26. Verify sum = (2+5+6+13)/26 = 26/26 = 1. ✓", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "From the probability distribution, write down the mode of X. (1 step)", "answer": "The mode is the value with the highest probability. P(X = 4) = 13/26 is the largest probability, so the mode = 4.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "Calculate Var(X) for the discrete distribution: P(X=1) = 2/26, P(X=2) = 5/26, P(X=3) = 6/26, P(X=4) = 13/26. Then find Var(13X - 6). (5 steps)", "answer": "- Step 1: Calculate E(X) = (1×2 + 2×5 + 3×6 + 4×13)/26 = 82/26 = 41/13.\n- Step 2: Calculate E(X²) = (1×2 + 4×5 + 9×6 + 16×13)/26 = 284/26 = 142/13.\n- Step 3: Var(X) = E(X²) - [E(X)]² = 142/13 - (41/13)² = 142/13 - 1681/169 = (1846 - 1681)/169 = 165/169.\n- Step 4: For the transformation: Var(aX + b) = a² × Var(X).\n- Step 5: Var(13X - 6) = 13² × (165/169) = 169 × (165/169) = 165.\n\nThe constant -6 disappears entirely (does not affect variance); the multiplier 13 is squared.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "For X ~ N(μ, 36), find k such that P(μ - 2k < X < μ + 2k) = 0.6. (4 steps)", "answer": "- Step 1: Since variance = 36, σ = 6. Standardise: P(-2k/6 < Z < 2k/6) = 0.6.\n- Step 2: By symmetry: P(|Z| < z) = 2Φ(z) - 1 = 0.6, so Φ(z) = 0.8.\n- Step 3: From inverse normal tables, Φ⁻¹(0.8) = 0.8416, so 2k/6 = 0.8416.\n- Step 4: Solve: 2k = 6 × 0.8416 = 5.0496, so k = 2.52 (3 s.f.).", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "Y ~ N(μ, σ). Given P(Y > 1.5μ) = 0.0668 and 2μ = 3σ², find μ and σ. (5 steps)", "answer": "- Step 1: Standardise: P(Y > 1.5μ) = P(Z > (1.5μ - μ)/σ) = P(Z > μ/(2σ)) = 0.0668.\n- Step 2: So Φ(μ/(2σ)) = 1 - 0.0668 = 0.9332. From tables, Φ(1.5) = 0.9332, so μ/(2σ) = 1.5 → μ = 3σ. (Equation 1)\n- Step 3: Given 2μ = 3σ². Substitute μ = 3σ: 2(3σ) = 3σ² → 6σ = 3σ².\n- Step 4: Rearrange: 3σ² - 6σ = 0 → 3σ(σ - 2) = 0.\n- Step 5: Since σ > 0, σ = 2. Then μ = 3σ = 6.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "What is the key difference between population standard deviation (used in S1) and sample standard deviation? When do you divide by n versus n-1? (2 steps)", "answer": "- Step 1: Population standard deviation divides by n: σ = √(Sxx/n). Sample standard deviation divides by n-1: s = √(Sxx/(n-1)).\n- Step 2: In S1, summary statistics (like Sxx, Syy, Sxy) are defined using n in the denominator, and σ refers to population standard deviation. The formula booklet uses population formulas throughout.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "A student calculates the standard deviation after converting temperatures from Fahrenheit to Celsius using σ_c = (5/9)σ_f - 32. Explain why this is wrong and write the correct formula. (2 steps)", "answer": "- Step 1: This is wrong because the additive constant -32 does not affect the spread — it shifts all values equally.\n- Step 2: The correct formula is σ_c = |5/9| × σ_f. The absolute value ensures the standard deviation is positive regardless of the sign of the multiplier. The additive constant disappears entirely.\n\nThis is a common misconception about how linear transformations affect measures of spread.", "source": "MiniMax ②", "_id": "minimax_2_35", "
