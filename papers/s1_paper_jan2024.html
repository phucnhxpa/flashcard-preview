eeds.\"\n- Step 3: $$P(\\text{numerator}) = P(F_1) \\times P(X_2 > 44) = 0.3821 \\times 0.1587 = 0.0606$$. These multiply because the throws are independent.\n\nThe key insight is that \"$$X > 44$$\" already guarantees qualification — you don't need to separately multiply by $$P(X > 38.8)$$. The event \"$$X > 44$$\" is contained within \"$$X > 38.8$$.\"", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": true}, {"question": "You have $$P(\\text{qualified on 2nd throw with } X > 44) = 0.0606$$ and $$P(\\text{qualifies}) = 0.9442$$. Complete the conditional probability calculation. Why might someone mistakenly return 0.0606 as the answer? (2 steps)", "answer": "- Step 1: Apply the conditional formula: $$P(\\text{2nd throw} > 44 \\mid \\text{qualifies}) = \\frac{0.0606}{0.9442} = 0.0642$$. The conditioning shrinks the sample space to only those who qualified, so the probability increases from 0.0606 to 0.0642.\n- Step 2: The mistake of returning 0.0606 is the same error as in Q3(d) — computing the joint probability but forgetting to divide by $$P(\\text{qualifies})$$. The \"given that\" trigger was missed. This is the #1 weakness: whenever \"given that\" appears, you must divide by the probability of the conditioning event.\n\nThe conditional probability is always ≥ the joint probability (dividing by something ≤ 1). If your conditional answer is smaller than the joint, you've made an error.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "Given $$P(A) = x$$, $$P(B) = y$$, and $$P(B \\mid A) = 0.3$$, how do you find $$P(A \\cap B)$$? What is the common directional error? (2 steps)", "answer": "- Step 1: By the conditional probability formula, $$P(B \\mid A) = \\frac{P(A \\cap B)}{P(A)}$$, so $$P(A \\cap B) = P(B \\mid A) \\times P(A) = 0.3x$$. The conditioning event is $$A$$ (after the bar), so $$P(A)$$ is the denominator you multiply through by.\n- Step 2: The common error is writing $$P(A \\cap B) = 0.3y$$ — using $$P(B)$$ instead of $$P(A)$$. This confuses the conditioning direction: $$P(B \\mid A)$$ means \"$$B$$ given $$A$$,\" so $$A$$ is the condition and goes in the denominator. $$P(A \\mid B)$$ would use $$P(B)$$ as the denominator, but that's a different quantity.\n\nAlways read the bar carefully: $$P(\\text{left} \\mid \\text{right})$$. The right side is the condition. The denominator is always the probability of the condition.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "Using the addition rule $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$ with $$P(A) = x$$, $$P(B) = y$$, $$P(A \\cap B) = 0.3x$$, and $$P(A \\cup B) = 0.65$$, show that $$14x + 20y = 13$$. (3 steps)", "answer": "- Step 1: Substitute into the addition rule: $$0.65 = x + y - 0.3x = 0.7x + y$$.\n- Step 2: To eliminate decimals, multiply both sides by 20: $$20 \\times 0.65 = 20(0.7x + y)$$, giving $$13 = 14x + 20y$$.\n- Step 3: This is the required equation. The multiplication by 20 was chosen because $$0.65 \\times 20 = 13$$ (integer) and $$0.7 \\times 20 = 14$$ (integer). The question specifies this exact form, so clearing decimals is necessary.\n\n\"Show that\" questions require you to reach the exact stated form. If your equation is algebraically equivalent but looks different (e.g., $$0.7x + y = 0.65$$), you haven't fully completed the \"show that.\"", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "Events $$B$$ and $$C$$ are mutually exclusive with $$P(B \\cup C) = 0.85$$ and $$P(C) = \\frac{1}{2}x + y$$. Derive a second equation in $$x$$ and $$y$$. (3 steps)", "answer": "- Step 1: Mutually exclusive means $$P(B \\cap C) = 0$$ — the events cannot both occur. This simplifies the addition rule: $$P(B \\cup C) = P(B) + P(C)$$.\n- Step 2: Substitute: $$0.85 = y + \\frac{1}{2}x + y = \\frac{1}{2}x + 2y$$.\n- Step 3: Multiply by 2 to clear the fraction: $$1.7 = x + 4y$$, or equivalently $$x + 4y = 1.7$$. To align with the first equation's coefficients, multiply by 5: $$5x + 20y = 8.5$$.\n\nThe mutually exclusive condition is what makes this work — without it, you'd need $$P(B \\cap C)$$ as an additional unknown. Always check: \"mutually exclusive\" = intersection is zero.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "Solve the simultaneous equations $$14x + 20y = 13$$ and $$5x + 20y = 8.5$$. Why is subtraction the cleanest method? (3 steps)", "answer": "- Step 1: Both equations have the same $$20y$$ term. Subtracting the second from the first eliminates $$y$$: $$(14x + 20y) - (5x + 20y) = 13 - 8.5$$, giving $$9x = 4.5$$.\n- Step 2: Solve: $$x = 4.5/9 = 0.5$$. Subtraction was cleanest because the $$y$$-coefficients were already equal — no scaling needed.\n- Step 3: Substitute into $$x + 4y = 1.7$$: $$0.5 + 4y = 1.7$$, so $$4y = 1.2$$, giving $$y = 0.3$$.\n\nAlways choose the elimination method that requires least scaling — here, the $$20y$$ terms aligned perfectly. Verify: $$14(0.5) + 20(0.3) = 7 + 6 = 13$$ ✓", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "With $$x = 0.5$$ and $$y = 0.3$$, test whether events $$A$$ and $$B$$ are independent. What is the test, and what is a common confusion with mutually exclusive events? (3 steps)", "answer": "- Step 1: The independence test is: $$P(A \\cap B) = P(A) \\cdot P(B)$$. Compute both sides. $$P(A) \\cdot P(B) = 0.5 \\times 0.3 = 0.15$$. $$P(A \\cap B) = 0.3x = 0.3 \\times 0.5 = 0.15$$.\n- Step 2: Since $$P(A \\cap B) = P(A) \\cdot P(B) = 0.15$$, the events ARE statistically independent.\n- Step 3: The common confusion is with mutually exclusive events, where $$P(A \\cap B) = 0$$. Independence means the occurrence of one doesn't affect the probability of the other (intersection = product); mutual exclusivity means they can't both occur (intersection = 0). In fact, two events with positive probabilities CANNOT be both independent and mutually exclusive — if $$P(A) > 0$$ and $$P(B) > 0$$ and they're mutually exclusive, then $$P(A \\cap B) = 0 \\ne P(A)P(B)$$.\n\nFor the independence test, always compute BOTH $$P(A)P(B)$$ and $$P(A \\cap B)$$ numerically, then compare. Don't just assert equality.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": false}, {"question": "A discrete CDF $$F(x)$$ is given for $$x = 1, 2, 3, 4$$. What two properties of the CDF allow you to (i) find the constant $$k$$ and (ii) recover the PDF? (2 steps)", "answer": "- Step 1: Property (i): $$F(x_{\\max}) = 1$$. The CDF at the largest value must equal 1, because the probability of $$X$$ being at most its maximum value is certain. Setting $$F(4) = \\frac{k+4}{8} = 1$$ gives $$k = 4$$.\n- Step 2: Property (ii): $$P(X = x) = F(x) - F(x-1)$$. Each individual probability is the jump in the CDF from the previous value. The CDF is a step function that increases by $$P(X = x)$$ at each value of $$x$$.\n\nThese two properties are the complete toolkit for CDF-to-PDF conversion. Always verify that the recovered probabilities sum to 1 — this catches arithmetic errors in the subtraction.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": false}, {"question": "With $$k = 4$$, the CDF values are $$F(1) = \\frac{2}{26}$$, $$F(2) = \\frac{7}{26}$$, $$F(3) = \\frac{13}{26}$$, $$F(4) = \\frac{26}{26}$$. Compute the PDF and verify it sums to 1. (3 steps)", "answer": "- Step 1: $$P(X=1) = F(1) - F(0) = \\frac{2}{26} - 0 = \\frac{2}{26}$$ (assuming $$F(0) = 0$$ since 0 is below the support of $$X$$).\n- Step 2: $$P(X=2) = F(2) - F(1) = \\frac{7}{26} - \\frac{2}{26} = \\frac{5}{26}$$; $$P(X=3) = F(3) - F(2) = \\frac{13}{26} - \\frac{7}{26} = \\frac{6}{26}$$; $$P(X=4) = F(4) - F(3) = \\frac{26}{26} - \\frac{13}{26} = \\frac{13}{26}$$.\n- Step 3: Verify: $$\\frac{2+5+6+13}{26} = \\frac{26}{26} = 1$$ ✓. The mode is $$x = 4$$ (highest probability $$\\frac{13}{26}$$).\n\nAlways convert all CDF values to a common denominator before subtracting — this prevents fraction arithmetic errors. The verification step is crucial and takes 10 seconds.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "For a discrete RV with $$P(X=1) = \\frac{2}{26}$$, $$P(X=2) = \\frac{5}{26}$$, $$P(X=3) = \\frac{6}{26}$$, $$P(X=4) = \\frac{13}{26}$$, compute $$E(X)$$ and explain the formula. (2 steps)", "answer": "- Step 1: $$E(X) = \\sum x \\cdot P(X=x) = \\frac{1 \\cdot 2 + 2 \\cdot 5 + 3 \\cdot 6 + 4 \\cdot 13}{26} = \\frac{2 + 10 + 18 + 52}{26} = \\frac{82}{26} = \\frac{41}{13}$$.\n- Step 2: Each value of $$x$$ is weighted by its probability. The result is the \"long-run average\" — if you sampled from this distribution many times, the sample mean would approach $$\\frac{41}{13} \\approx 3.15$$.\n\nKeep the result as a fraction ($$\\frac{41}{13}$$) rather than converting to a decimal. Fractions preserve exact values and make subsequent calculations (especially variance) cleaner.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": false}, {"question": "Continuing from the previous RV, compute $$E(X^2)$$ and then $$\\text{Var}(X)$$. Why keep fractions throughout? (3 steps)", "answer": "- Step 1: $$E(X^2) = \\sum x^2 \\cdot P(X=x) = \\frac{1 \\cdot 2 + 4 \\cdot 5 + 9 \\cdot 6 + 16 \\cdot 13}{26} = \\frac{2 + 20 + 54 + 208}{26} = \\frac{284}{26} = \\frac{142}{13}$$.\n- Step 2: $$\\text{Var}(X) = E(X^2) - (E(X))^2 = \\frac{142}{13} - \\left(\\frac{41}{13}\\right)^2 = \\frac{142 \\times 13}{169} - \\frac{1681}{169} = \\frac{1846 - 1681}{169} = \\frac{165}{169}$$.\n- Step 3: Keeping fractions allows the 169 to cancel cleanly in the next step (when computing $$\\text{Var}(13X - 6)$$). Converting to decimals early (e.g., $$E(X) = 3.1538...$$) introduces rounding errors that compound through the variance calculation.\n\nThe formula $$\\text{Var}(X) = E(X^2) - (E(X))^2$$ is preferred over $$E[(X-\\mu)^2]$$ for computation because it requires only two sums rather than computing deviations for each value.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": false}, {"question": "Given $$\\text{Var}(X) = \\frac{165}{169}$$, compute $$\\text{Var}(13X - 6)$$. What happens to the $$-6$$ and why? What happens to the 13? (3 steps)", "answer": "- Step 1: The transformation rule is $$\\text{Var}(aX + b) = a^2 \\text{Var}(X)$$. The additive constant $$b = -6$$ vanishes because variance measures spread around the mean, and shifting all values by a constant doesn't change their spread.\n- Step 2: The multiplicative constant $$a = 13$$ is squared: $$\\text{Var}(13X - 6) = 13^2 \\times \\text{Var}(X) = 169 \\times \\frac{165}{169} = 165$$.\n- Step 3: The 169 cancels perfectly because we kept $$\\text{Var}(X)$$ as $$\\frac{165}{169}$$. The final answer is the clean integer 165. If you get a messy decimal, you've made an arithmetic error — go back and check.\n\nCommon errors: (a) $$\\text{Var}(13X - 6) = 13\\text{Var}(X) - 6$$ — wrong on both counts (forgot to square 13, and included the constant). (b) $$\\text{Var}(13X - 6) = 13\\text{Var}(X)$$ — forgot to square the multiplier. The constant ALWAYS disappears from variance; the multiplier is ALWAYS squared.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": false}, {"question": "$$X \\sim N(\\mu, 36)$$ and $$P(\\mu - 2k < X < \\mu + 2k) = 0.6$$. How do you convert this symmetric-interval probability into a form you can look up in the standard normal table? (3 steps)", "answer": "- Step 1: Standardise: $$P\\left(\\frac{-2k}{6} < Z < \\frac{2k}{6}\\right) = 0.6$$, where $$\\sigma = \\sqrt{36} = 6$$. Note: variance 36 means $$\\sigma = 6$$, not 36.\n- Step 2: By symmetry of the standard normal, $$P(-a < Z < a) = 2\\Phi(a) - 1$$. So $$2\\Phi\\left(\\frac{2k}{6}\\right) - 1 = 0.6$$, giving $$\\Phi\\left(\\frac{2k}{6}\\right) = 0.8$$.\n- Step 3: From inverse normal tables, $$\\Phi^{-1}(0.8) = 0.8416$$. So $$\\frac{2k}{6} = 0.8416$$, giving $$2k = 5.0496$$ and $$k = 2.52$$.\n\nThe critical step is converting the two-tail probability (0.6 in the middle) to a one-tail probability (0.8 in the upper tail). The formula is: if $$P(|Z| < z) = c$$, then $$\\Phi(z) = \\frac{1+c}{2}$$. A common error is looking up $$\\Phi^{-1}(0.6)$$ directly — that gives 0.2533, which is wrong.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": true}, {"question": "Why is it wrong to look up $$\\Phi^{-1}(0.6)$$ when finding the value of $$k$$ in $$P(\\mu - 2k < X < \\mu + 2k) = 0.6$$? (2 steps)", "answer": "- Step 1: $$\\Phi^{-1}(0.6) = 0.2533$$ gives the z-value such that $$P(Z < 0.2533) = 0.6$$, i.e., 60% of the area is to the LEFT of that point. But the question says 60% is in the CENTER (symmetric about the mean), which means 20% is in each tail and 80% is to the left of the upper boundary.\n- Step 2: The correct lookup is $$\\Phi^{-1}(0.8) = 0.8416$$, because the upper boundary of the central 60% has 80% of the distribution below it (40% in the left half + 40% in the central-right portion). Using 0.6 instead of 0.8 would give a much smaller $$k$$.\n\nThe mental model: \"central 60%\" = \"40% in each tail\" = \"80% below the upper bound.\" Always draw the bell curve and shade the regions before looking up values.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": false}, {"question": "$$Y \\sim N(\\mu, \\sigma^2)$$ with $$2\\mu = 3\\sigma^2$$ and $$P(Y > \\frac{3}{2}\\mu) = 0.0668$$. How do you get one equation relating $$\\mu$$ and $$\\sigma$$ from the probability condition? (3 steps)", "answer": "- Step 1: Standardise the inequality: $$P\\left(Z > \\frac{(3/2)\\mu - \\mu}{\\sigma}\\right) = P\\left(Z > \\frac{\\mu}{2\\sigma}\\right) = 0.0668$$.\n- Step 2: Convert to a $$\\Phi$$ value: $$\\Phi\\left(\\frac{\\mu}{2\\sigma}\\right) = 1 - 0.0668 = 0.9332$$.\n- Step 3: From tables, $$\\Phi(1.5) = 0.9332$$ exactly. So $$\\frac{\\mu}{2\\sigma} = 1.5$$, giving $$\\mu = 3\\sigma$$. This is equation (i).\n\nThe value $$\\Phi(1.5) = 0.9332$$ is worth memorising — it appears frequently in S1 exams. Recognising it saves the time of scanning the table.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": true}, {"question": "You have $$\\mu = 3\\sigma$$ (from standardisation) and $$2\\mu = 3\\sigma^2$$ (given). Solve simultaneously and explain why one root is rejected. (3 steps)", "answer": "- Step 1: Substitute $$\\mu = 3\\sigma$$ into $$2\\mu = 3\\sigma^2$$: $$2(3\\sigma) = 3\\sigma^2$$, giving $$6\\sigma = 3\\sigma^2$$.\n- Step 2: Rearrange: $$3\\sigma^2 - 6\\sigma = 0$$, factorise: $$3\\sigma(\\sigma - 2) = 0$$, so $$\\sigma = 0$$ or $$\\sigma = 2$$.\n- Step 3: Reject $$\\sigma = 0$$ because a standard deviation must be positive (zero s.d. would mean all values are identical, contradicting the Normal distribution assumption). Therefore $$\\sigma = 2$$ and $$\\mu = 3 \\times 2 = 6$$.\n\nAlways reject non-physical roots with a brief justification: \"$$\\sigma > 0$$, so $$\\sigma = 2$$.\" Other common rejections in S1: negative probabilities, $$|r| > 1$$, and negative frequencies.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": true}, {"question": "What is the relationship between $$\\text{Var}(aX + b) = a^2\\text{Var}(X)$$ and the coding rule $$\\sigma_u = |b|\\sigma_x$$ for $$u = a + bx$$? Are these the same principle? (2 steps)", "answer": "- Step 1: Yes, they are the same principle expressed differently. In the coding rule, if $$u = a + bx$$, then $$\\text{Var}(u) = b^2 \\text{Var}(x)$$, and taking the square root gives $$\\sigma_u = |b|\\sigma_x$$. The additive constant $$a$$ drops out because it shifts the mean without changing spread.\n- Step 2: In Q2(c), the coding $$c = \\frac{5}{9}(f - 32)$$ has $$a = -\\frac{160}{9}$$ and $$b = \\frac{5}{9}$$. The $$-32$$ shift (part of $$a$$) doesn't affect s.d., and the multiplier $$\\frac{5}{9}$$ scales s.d. by $$\\frac{5}{9}$$. In Q7(d), the $$-6$$ in $$13X - 6$$ is the additive constant that vanishes from variance, while the 13 is squared.\n\nBoth questions test the same insight: additive shifts relocate data without changing spread; multiplicative scaling stretches or compresses spread. Variance squares the multiplier; standard deviation takes its absolute value.", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": true}, {"question": "In Q5(b), the event \"throw 2 exceeds 44 m\" is a subset of \"throw 2 succeeds (exceeds 38.8 m).\" What would go wrong if you treated these as separate events and multiplied their probabilities? (2 steps)", "answer": "- Step 1: If you treated \"$$X_2 > 38.8$$\" and \"$$X_2 > 44$$\" as independent events and multiplied, you'd compute $$P(X_2 > 38.8) \\times P(X_2 > 44) = 0.6179 \\times 0.1587 = 0.0981$$, which is wrong.\n- Step 2: These events are NOT independent — they refer to the SAME throw. In fact, $$P(X_2 > 44 \\mid X_2 > 38.8) = \\frac{P(X_2 > 44)}{P(X_2 > 38.8)} = \\frac{0.1587}{0.6179} = 0.2568$$, which is not equal to $$P(X_2 > 44) = 0.1587$$. The correct approach: since $$X > 44 \\Rightarrow X > 38.8$$, the event \"throw 2 exceeds 44\" already implies \"throw 2 qualifies.\" You only need $$P(F_1) \\times P(X_2 > 44)$$.\n\nDouble-counting occurs when you decompose an event into overlapping pieces and multiply their probabilities as if they were independent. Always check: are the events referring to the same random variable? If so, they're dependent.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": true}, {"question": "For the regression line $$s = a + bf$$, explain why the line always passes through the point $$(\\bar{f}, \\bar{s})$$. (2 steps)", "answer": "- Step 1: The intercept formula is $$a = \\bar{s} - b\\bar{f}$$. Substituting this into the regression equation: $$s = (\\bar{s} - b\\bar{f}) + bf$$.\n- Step 2: When $$f = \\bar{f}$$: $$s = \\bar{s} - b\\bar{f} + b\\bar{f} = \\bar{s}$$. So the point $$(\\bar{f}, \\bar{s})$$ always lies on the regression line. This is a built-in property of least-squares regression.\n\nThis property is useful for checking your regression line: plug in $$f = \\bar{f}$$ and verify you get $$s = \\bar{s}$$. If not, you've made a calculation error in $$a$$ or $$b$$.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": true}, {"question": "What is the difference between the population standard deviation formula $$\\sigma = \\sqrt{S_{xx}/n}$$ and the sample standard deviation $$s = \\sqrt{S_{xx}/(n-1)}$$? Which does Edexcel S1 use? (2 steps)", "answer": "- Step 1: The population formula divides by $$n$$; the sample formula divides by $$n-1$$ (Bessel's correction, which provides an unbiased estimator of the population variance). For the same data, $$s > \\sigma$$ because dividing by a smaller number gives a larger result.\n- Step 2: Edexcel S1 uses the **population** formula $$\\sigma = \\sqrt{S_{xx}/n}$$ throughout. When the formula booklet gives $$\\sigma_x = \\sqrt{S_{xx}/n}$$, that's the one to use. Using $$n-1$$ by habit (from other exam boards or A-level maths) will give slightly wrong answers.\n\nThe distinction matters most for small $$n$$. For $$n = 12$$, the ratio is $$\\sqrt{12/11} \\approx 1.045$$ — about 4.5% difference. For large $$n$$, the two formulas converge.", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": true}, {"question": "A question says \"ignoring the outlier, Greg calculated $$\\sum f = 422$$.\" If you accidentally included the outlier in your regression calculation, how would the results differ? (2 steps)", "answer": "- Step 1: Including the outlier $$(30, 90)$$ would change $$\\sum f$$, $$\\sum s$$, $$S_{ff}$$, and $$S_{fs}$$. The outlier has an unusually high Spanish mark (90) for a moderate French mark (30), so it would pull the regression line toward itself, likely flattening the slope and raising the intercept.\n- Step 2: The PMCC would also change — the outlier is far from the general trend, so $$r$$ would decrease (become less positive), reflecting weaker linear correlation. This is exactly why Greg removed it: the outlier distorts the model.\n\nOutliers have disproportionate influence on regression because least squares penalises large residuals quadratically. A single outlier can dramatically shift the line — this is why identifying and handling outliers (as in Q4(a)) is a prerequisite step before fitting a model.", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": false}, {"question": "When a question says \"estimate the probability that both plants have heights between 8 cm and 14 cm,\" the word \"estimate\" signals what assumption? What would you need to know to calculate the exact probability? (2 steps)", "answer": "- Step 1: \"Estimate\" signals the uniform-within-class assumption — that heights are evenly distributed within each class interval. This lets you split partial classes proportionally (e.g., $$\\frac{1}{4}$$ of the $$[5,9)$$ class falls in $$[8,9)$$).\n- Step 2: To calculate the exact probability, you would need the individual heights of all 408 plants (the raw data). With only grouped data (a frequency table), you can't know exactly how many plants fall in $$[8,14)$$ — the uniform assumption is the best you can do.\n\nThe uniform assumption is a modelling choice, not a mathematical truth. In reality, values within a class might cluster near the boundaries or the centre — the histogram can't tell you this.", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": true}, {"question": "What are the memorisable Normal table values that save the most exam time, and why are they worth knowing? (2 steps)", "answer": "- Step 1: The key values are: $$\\Phi(1.00) = 0.8413$$, $$\\Phi(1.50) = 0.9332$$, $$\\Phi(1.645) = 0.95$$, $$\\Phi(1.96) = 0.975$$, $$\\Phi(2.33) \\approx 0.99$$. These correspond to common significance levels and exam question designs.\n- Step 2: Knowing these saves ~30 seconds per Normal question (no need to scan the table). On a paper with 2–3 Normal sub-parts, that's ~90 seconds total — enough time to check an answer. In Q8(b), recognising $$\\Phi(1.5) = 0.9332$$ immediately gives $$\\mu = 3\\sigma$$ without table lookup.\n\nThese values also appear in hypothesis testing (A2) and confidence intervals. Building familiarity now pays dividends later.", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": false}, {"question": "You're told $$P(A \\mid B) = 0.3$$ and asked to find $$P(A \\cap B)$$. A student writes $$P(A \\cap B) = 0.3 \\times P(B)$$. Another student writes $$P(A \\cap B) = 0.3 \\times P(A)$$. Which is correct, and why? (2 steps)", "answer": "- Step 1: The second student is correct. $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$, so rearranging: $$P(A \\cap B) = P(A \\mid B) \\times P(B) = 0.3 \\times P(B)$$. Wait — that's the first student! Let me re-read.\n- Step 2: Actually, the first student wrote $$P(A \\cap B) = 0.3 \\times P(B)$$. Since $$P(A \\mid B) = P(A \\cap B)/P(B) = 0.3$$, multiplying both sides by $$P(B)$$ gives $$P(A \\cap B) = 0.3 \\times P(B)$$. So the first student is correct. The second student's formula $$0.3 \\times P(A)$$ would correspond to $$P(B \\mid A) = 0.3$$, which is a different conditioning direction.\n\nThe confusion in Q6 was specifically this: $$P(B \\mid A) = 0.3$$ means $$P(A \\cap B) = 0.3 \\times P(A) = 0.3x$$, NOT $$0.3 \\times P(B) = 0.3y$$. The conditioning event (after the bar) goes in the denominator.", "source": "GLM 5.1 ②", "_id": "glm_2_50", "judge_pick": false}, {"question": "Can two events with positive probabilities be both independent AND mutually exclusive? Prove your answer. (2 steps)", "answer": "- Step 1: If $$A$$ and $$B$$ are mutually exclusive, then $$P(A \\cap B) = 0$$. If they are also independent, then $$P(A \\cap B) = P(A) \\cdot P(B)$$.\n- Step 2: Setting these equal: $$P(A) \\cdot P(B) = 0$$. Since both $$P(A) > 0$$ and $$P(B) > 0$$, their product is positive, contradicting the requirement that it equals 0. Therefore, two events with positive probabilities CANNOT be both independent and mutually exclusive.\n\nThis is a fundamental distinction: independence means one event provides NO information about the other (they can co-occur); mutual exclusivity means one event's occurrence GUARANTEES the other didn't occur (strong dependence). They represent opposite extremes of the relationship between events.", "source": "GLM 5.1 ②", "_id": "glm_2_51", "judge_pick": false}, {"question": "A simple exercise: If $$P(A) = 0.4$$, $$P(B) = 0.5$$, and $$P(A \\cap B) = 0.1$$, are $$A$$ and $$B$$ independent? Show the test. (2 steps)", "answer": "- Step 1: Compute $$P(A) \\cdot P(B) = 0.4 \\times 0.5 = 0.2$$.\n- Step 2: Compare with $$P(A \\cap B) = 0.1$$. Since $$0.1 \\ne 0.2$$, the events are NOT independent. The fact that $$A$$ occurred makes $$B$$ less likely ($$P(B \\mid A) = 0.1/0.4 = 0.25 < 0.5 = P(B)$$), so knowing $$A$$ happened gives information about $$B$$.\n\nIf $$P(A \\cap B) < P(A)P(B)$$, the events are negatively associated (one makes the other less likely). If $$P(A \\cap B) > P(A)P(B)$$, they're positively associated.", "source": "GLM 5.1 ②", "_id": "glm_2_52", "judge_pick": false}, {"question": "A simple exercise: A discrete RV has $$P(X=0) = 0.3$$, $$P(X=1) = 0.5$$, $$P(X=2) = 0.2$$. Find $$E(X)$$, $$E(X^2)$$, and $$\\text{Var}(X)$$. Then compute $$\\text{Var}(4X + 3)$$. (3 steps)", "answer": "- Step 1: $$E(X) = 0(0.3) + 1(0.5) + 2(0.2) = 0 + 0.5 + 0.4 = 0.9$$. $$E(X^2) = 0(0.3) + 1(0.5) + 4(0.2) = 0 + 0.5 + 0.8 = 1.3$$.\n- Step 2: $$\\text{Var}(X) = E(X^2) - (E(X))^2 = 1.3 - 0.81 = 0.49$$.\n- Step 3: $$\\text{Var}(4X + 3) = 4^2 \\times \\text{Var}(X) = 16 \\times 0.49 = 7.84$$. The $$+3$$ vanishes; the 4 is squared.\n\nNotice: $$\\text{Var}(X) = 0.49 = 0.7^2$$, so $$\\sigma_X = 0.7$$. After the transformation, $$\\sigma_{4X+3} = 4 \\times 0.7 = 2.8$$, and $$2.8^2 = 7.84$$ ✓", "source": "GLM 5.1 ②", "_id": "glm_2_53", "judge_pick": false}, {"question": "A simple exercise: $$Z \\sim N(0,1)$$. Find $$P(-0.5 < Z < 1.5)$$ using the table values $$\\Phi(0.5) = 0.6915$$ and $$\\Phi(1.5) = 0.9332$$. (2 steps)", "answer": "- Step 1: $$P(-0.5 < Z < 1.5) = P(Z < 1.5) - P(Z < -0.5) = \\Phi(1.5) - [1 - \\Phi(0.5)] = 0.9332 - (1 - 0.6915) = 0.9332 - 0.3085$$.\n- Step 2: $$= 0.6247$$. The key step is converting $$P(Z < -0.5)$$ using symmetry: $$P(Z < -a) = 1 - \\Phi(a)$$.\n\nFor any interval $$P(a < Z < b)$$ where $$a < 0 < b$$, split into $$P(Z < b) - P(Z < a)$$ and handle the negative bound via symmetry.", "source": "GLM 5.1 ②", "_id": "glm_2_54", "judge_pick": false}, {"question": "A simple exercise: Data coded via $$u = 3x - 10$$. If $$\\bar{x} = 5$$ and $$\\sigma_x = 2$$, find $$\\bar{u}$$ and $$\\sigma_u$$. (2 steps)", "answer": "- Step 1: $$\\bar{u} = 3\\bar{x} - 10 = 3(5) - 10 = 15 - 10 = 5$$. The mean transforms with both the multiplier and the additive constant.\n- Step 2: $$\\sigma_u = |3| \\times \\sigma_x = 3 \\times 2 = 6$$. The additive constant ($$-10$$) does not affect the standard deviation; only the absolute value of the multiplier matters.\n\nQuick check: $$\\text{Var}(u) = 3^2 \\times \\text{Var}(x) = 9 \\times 4 = 36$$, and $$\\sigma_u = \\sqrt{36} = 6$$ ✓", "source": "GLM 5.1 ②", "_id": "glm_2_55", "judge_pick": true}, {"question": "A simple exercise: Three independent attempts, each with success probability 0.7. Find $$P(\\text{at least one success})$$ and $$P(\\text{exactly one success})$$. (2 steps)", "answer": "- Step 1: $$P(\\text{at least one}) = 1 - P(\\text{all fail}) = 1 - 0.3^3 = 1 - 0.027 = 0.973$$. The complement method is always cleanest for \"at least one.\"\n- Step 2: $$P(\\text{exactly one}) = P(SFF) + P(FSF) + P(FFS) = 3 \\times (0.7 \\times 0.3^2) = 3 \\times 0.063 = 0.189$$. Each arrangement has one success and two failures; there are 3 such arrangements.\n\n\"At least one\" ≠ \"exactly one.\" The complement method gives \"at least one\" (which includes 1, 2, or 3 successes). For \"exactly one,\" you must enumerate the specific sequences.", "source": "GLM 5.1 ②", "_id": "glm_2_56", "judge_pick": true}, {"question": "What exam strategy should you apply in the first 10 minutes of an S1 paper, and why? (2 steps)", "answer": "- Step 1: Scan the entire paper for \"given that\" triggers. These signal conditional probability questions (like Q3(d) and Q5(b)), which are the most error-prone. Mark them with a star.\n- Step 2: Pre-write $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$ in the margin next to each such question. This single habit — writing the formula before computing — prevents the #1 error: returning the joint probability instead of the conditional.\n\nThis strategy specifically targets the weakness identified in this paper: confusing $$P(A \\cap B)$$ with $$P(A \\mid B)$$. The formula, once written, makes it visually obvious that a denominator is needed.", "source": "GLM 5.1 ②", "_id": "glm_2_57", "judge_pick": false}, {"question": "For \"show that\" questions, what is the minimum working expected, and what happens if you just write the final answer? (2 steps)", "answer": "- Step 1: A \"show that\" question typically requires at least 3 algebraic lines: setup (writing the formula or equation), simplification (substituting and rearranging), and the final result (matching the required form). For example, Q2(a)(ii) needs: $$S_{xx} = \\sum x^2 - (\\sum x)^2/n = ...$$, then $$\\sigma = \\sqrt{S_{xx}/n} = ...$$, then rounding to 8.57.\n- Step 2: Writing just the final answer (e.g., \"8.57\") typically earns 1 of 3 marks. Method marks dominate in \"show that\" questions — the examiner needs to see HOW you got there, not just THAT you got there. Always quote one intermediate decimal before rounding.\n\nThis applies to Q2(a)(ii), Q4(b), Q6(a), Q7(a) — four \"show that\" sub-parts on this paper alone, worth a total of 10 marks.", "source": "GLM 5.1 ②", "_id": "glm_2_58", "judge_pick": false}, {"question": "Why should you keep fractions (rather than converting to decimals) throughout variance computations, and at what point is it safe to round? (2 steps)", "answer": "- Step 1: Fractions preserve exact values. In Q7(d), $$\\text{Var}(X) = \\frac{165}{169}$$ and $$\\text{Var}(13X - 6) = 169 \\times \\frac{165}{169} = 165$$. The 169 cancels perfectly. If you'd written $$\\text{Var}(X) = 0.97633...$$, the multiplication would give $$169 \\times 0.97633 = 164.96$$, which doesn't round cleanly to 165.\n- Step 2: It's safe to round only at the final answer. Intermediate steps should use exact fractions or at least 5+ decimal places. The exam tolerates a small rounding tolerance on final answers, but accumulated rounding errors from premature decimal conversion can push you outside that tolerance.\n\nThe rule of thumb: keep one more decimal place than the required precision until the final step. For a 3 s.f. answer, keep at least 4 s.f. throughout.", "source": "GLM 5.1 ②", "_id": "glm_2_59", "judge_pick": false}, {"question": "When a regression interpretation question asks for the meaning of the gradient, what three components must your answer include for full marks? (2 steps)", "answer": "- Step 1: The three components are: (i) the contextual variables (not just \"x\" and \"y\" but the actual quantities like \"French mark\" and \"Spanish mark\"), (ii) the word \"predicted\" or \"estimated\" (acknowledging the model nature of regression), and (iii) the units of measurement.\n- Step 2: Example of a full-mark answer: \"For each additional mark scored in the French test, the predicted Spanish mark increases by approximately 1.04 marks.\" Example of a zero-mark answer: \"The gradient is 1.04\" — no context, no units, no acknowledgement of prediction.\n\nThe gradient has units of (units of $$s$$) / (units of $$f$$) = \"Spanish marks per French mark.\" Including units makes your answer precise and contextual.", "source": "GLM 5.1 ②", "_id": "glm_2_60", "judge_pick": true}, {"question": "For the \"more reliable estimate\" question (Q4(e)), what must you state beyond just saying \"interpolation\"? (2 steps)", "answer": "- Step 1: You must state the data range explicitly: the French marks range from 24 to 68. Then identify which estimate falls within this range (interpolation) and which falls outside (extrapolation).\n- Step 2: A full-mark answer: \"The estimate for $$f = 55$$ is more reliable because 55 lies within the observed data range $$24 \\le f \\le 68$$, so it is interpolation. The estimate for $$f = 18$$ is extrapolation (outside the range 24–68) and the linear relationship is not guaranteed to hold outside the sampled data.\"\n\nJust saying \"interpolation is more reliable\" without quoting the range loses a mark. The examiner wants to see that you've identified the specific boundary values.", "source": "GLM 5.1 ②", "_id": "glm_2_61", "judge_pick": false}, {"question": "What is the time budget for a 75-mark, 90-minute S1 paper, and what's a practical strategy for saving time? (2 steps)", "answer": "- Step 1: At 90 min / 75 marks ≈ 1.2 minutes per mark. Rough allocation: Q1 (8 marks) ≈ 10 min, Q2 (12 marks) ≈ 14 min, Q3 (8 marks) ≈ 10 min, Q4 (12 marks) ≈ 14 min, Q5 (7 marks) ≈ 9 min, Q6 (9 marks) ≈ 11 min, Q7 (10 marks) ≈ 12 min, Q8 (9 marks) ≈ 11 min. Total ≈ 91 min — slightly over, so time pressure is real.\n- Step 2: Save ~3 minutes by memorising key formulas ($$S_{xx}$$, $$r$$, conditional probability) and key Normal table values ($$\\Phi(1) = 0.8413$$, $$\\Phi(1.5) = 0.9332$$) rather than flipping to the formula booklet. Each lookup costs ~30 seconds; with 6–8 lookups per paper, that's 3–4 minutes saved.\n\nThe time pressure means you can't afford to re-derive formulas or scan tables slowly. Automatic recall of the most common values is a competitive advantage.", "source": "GLM 5.1 ②", "_id": "glm_2_62", "judge_pick": false}, {"question": "In Q5(b), why is the throw-3 consideration irrelevant once you know the athlete qualified on throw 2? (2 steps)", "answer": "- Step 1: The question states \"Once they qualify, they do not use any of their remaining attempts.\" If the athlete qualified on throw 2, throw 3 never happens. The sequence is: throw 1 fails, throw 2 succeeds (with $$X > 44$$) — end of story.\n- Step 2: The event \"qualified on the 2nd throw with $$X > 44$$\" is fully specified by throws 1 and 2. Throw 3 only matters for other qualification scenarios (e.g., throw 1 fails, throw 2 fails, throw 3 succeeds), which are separate events in the sample space.\n\nDon't over-complicate: the question asks about one specific path to qualification. Other paths exist but are irrelevant to the conditional probability being computed.", "source": "GLM 5.1 ②", "_id": "glm_2_63", "judge_pick": false}, {"question": "A student computes $$P(\\text{Y12} \\mid R) = \\frac{7/20}{89/100}$$ and gets $$\\frac{700}{1780}$$. How should this be simplified, and what's a quick way to check the answer is reasonable? (2 steps)", "answer": "- Step 1: Divide numerator and denominator by the GCD. $$\\frac{700}{1780}$$: both divisible by 20, giving $$\\frac{35}{89}$$. Since 89 is prime and 35 = 5 × 7, no further simplification is possible. As a decimal: $$35/89 \\approx 0.393$$.\n- Step 2: Reasonableness check: $$P(\\text{Y12}) = 0.4$$ and $$P(\\text{Y12} \\mid R) = 0.393$$. These are close, which makes sense — being right-handed is very common (89% of students), so conditioning on it doesn't dramatically change the Year 12 probability. If you'd gotten 0.05 or 0.95, something would be wrong.\n\nA conditional probability should typically be in the same order of magnitude as the unconditional probability, unless the conditioning event is very rare or strongly correlated with the target event.", "source": "GLM 5.1 ②", "_id": "glm_2_64", "judge_pick": false}, {"question": "What is the difference between the outlier fence rule $$Q_3 + 1.5 \\times \\text{IQR}$$ and the concept of \"unusual\" in a Normal distribution? Why can't you use a Normal-based rule for the Spanish marks in Q4? (2 steps)", "answer": "- Step 1: The fence rule is a non-parametric method — it uses the data's own quartiles and doesn't assume any distribution. The Normal \"unusual\" rule (e.g., beyond 2 standard deviations from the mean) assumes the data follow a Normal distribution.\n- Step 2: The Spanish marks (16, 24, 28, ..., 90) are clearly not Normally distributed — they're discrete, have a large outlier, and may be skewed. Using $$\\mu \\pm 2\\sigma$$ would be inappropriate. The fence rule works for any distribution because it's based on the actual data's spread (IQR).\n\nIn S1, always use the fence rule for outlier detection unless the question explicitly states the data are Normally distributed. The fence rule is robust to non-Normality.", "source": "GLM 5.1 ②", "_id": "glm_2_65", "judge_pick": true}, {"question": "A simple exercise: A histogram has a class $$[10, 20)$$ with frequency density 3. What is the frequency, and how many observations lie between 15 and 20? (2 steps)", "answer": "- Step 1: Frequency = fd × width = $$3 \\times 10 = 30$$. The full class has 30 observations.\n- Step 2: Between 15 and 20 is half the class width ($$\\frac{5}{10} = \\frac{1}{2}$$), so by the uniform assumption: $$\\frac{1}{2} \\times 30 = 15$$ observations.\n\nThe uniform-within-class assumption means the count is proportional to the portion of the class width. If the range covers $$\\frac{w_{\\text{partial}}}{w_{\\text{full}}}$$ of the class, the frequency contribution is that fraction times the class frequency.", "source": "GLM 5.1 ②", "_id": "glm_2_66", "judge_pick": false}, {"question": "In Q8(a), the interval is $$P(\\mu - 2k < X < \\mu + 2k) = 0.6$$ and the answer involves $$2k$$, not $$k$$. Why is it crucial to keep track of the factor of 2 throughout the calculation? (2 steps)", "answer": "- Step 1: When standardising, the z-value is $$\\frac{2k}{\\sigma} = \\frac{2k}{6}$$, not $$\\frac{k}{6}$$. The interval is symmetric about $$\\mu$$ with half-width $$2k$$, so the distance from the mean to either boundary is $$2k$$.\n- Step 2: After finding $$\\frac{2k}{6} = 0.8416$$, you get $$2k = 5.0496$$, then divide by 2: $$k = 2.52$$. A common error is to write $$\\frac{k}{6} = 0.8416$$, giving $$k = 5.05$$ — exactly double the correct answer.\n\nAlways identify the exact expression inside the standardisation before looking up tables. Write \"$$Z = \\frac{(\\mu + 2k) - \\mu}{\\sigma} = \\frac{2k}{6}$$\" explicitly to avoid this trap.", "source": "GLM 5.1 ②", "_id": "glm_2_67", "judge_pick": false}, {"question": "What is the general formula for converting a symmetric central probability $$P(|Z| < z) = c$$ into a one-tail lookup, and why does it work? (2 steps)", "answer": "- Step 1: $$\\Phi(z) = \\frac{1 + c}{2}$$. For example, if $$c = 0.6$$, then $$\\Phi(z) = 0.8$$.\n- Step 2: The central probability $$c$$ is the area between $$-z$$ and $$z$$. By symmetry, this equals $$2\\Phi(z) - 1$$ (the area below $$z$$, minus the area below $$-z$$, which equals the area above $$z$$). Rearranging: $$2\\Phi(z) - 1 = c \\Rightarrow \\Phi(z) = \\frac{1+c}{2}$$.\n\nVisual intuition: if 60% is in the centre, then 20% is in each tail. The area below the upper boundary is 80% (centre + left tail = 60% + 20%).", "source": "GLM 5.1 ②", "_id": "glm_2_68", "judge_pick": true}, {"question": "In Q6, the independence test confirms $$A$$ and $$B$$ are independent. But the problem also gives $$P(B \\mid A) = 0.3$$, which seems to suggest $$A$$ affects $$B$$. Resolve this apparent contradiction. (2 steps)", "answer": "- Step 1: $$P(B \\mid A) = 0.3$$ and $$P(B) = y = 0.3$$. Since $$P(B \\mid A) = P(B)$$, knowing that $$A$$ occurred doesn't change the probability of $$B$$ — this IS the definition of independence.\n- Step 2: The apparent contradiction arises from seeing \"0.3\" and thinking it's a \"low\" probability that implies influence. But independence means $$P(B \\mid A) = P(B)$$, regardless of whether that value is 0.3 or 0.9. The numerical value is irrelevant — what matters is whether the conditional equals the unconditional.\n\nIndependence is about equality of probabilities, not about the magnitude. $$P(B \\mid A) = 0.3$$ and $$P(B) = 0.3$$ means independence; $$P(B \\mid A) = 0.3$$ and $$P(B) = 0.5$$ means dependence.", "source": "GLM 5.1 ②", "_id": "glm_2_69", "judge_pick": false}, {"question": "A simple exercise: $$P(A) = 0.6$$, $$P(B \\mid A) = 0.4$$, $$P(A \\cup B) = 0.7$$. Find $$P(B)$$ using the addition rule. (3 steps)", "answer": "- Step 1: Find $$P(A \\cap B) = P(B \\mid A) \\times P(A) = 0.4 \\times 0.6 = 0.24$$.\n- Step 2: Apply the addition rule: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$, so $$0.7 = 0.6 + P(B) - 0.24$$.\n- Step 3: Solve: $$P(B) = 0.7 - 0.6 + 0.24 = 0.34$$.\n\nThis is the same pattern as Q6(a): use the conditional to find the intersection, then use the addition rule to find the unknown probability.", "source": "GLM 5.1 ②", "_id": "glm_2_70", "judge_pick": false}, {"question": "Why does the PMCC remain unchanged under positive linear coding but change sign under negative linear coding on one variable? Give an intuitive explanation. (2 steps)", "answer": "- Step 1: Positive linear coding ($$u = a + bx$$ with $$b > 0$$) preserves the ordering of the data — the highest $$x$$ still maps to the highest $$u$$, the lowest to the lowest. The scatter diagram is simply rescaled, so the linear trend (positive or negative) looks identical. Hence $$r$$ is unchanged.\n- Step 2: Negative linear coding on one variable (e.g., $$u = -x$$) reverses the ordering — the highest $$x$$ maps to the lowest $$u$$. The scatter diagram flips, and a previously positive correlation becomes negative (or vice versa). The magnitude $$|r|$$ stays the same, but the sign reverses.\n\nIf both variables are negatively coded, the two flips cancel out and $$r$$ is unchanged. This is why Q2(d) specifies $$b = d = 5/9 > 0$$ — both multipliers are positive, so $$r$$ is completely invariant.", "source": "GLM 5.1 ②", "_id": "glm_2_71", "judge_pick": true}], "count": 72}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "On a histogram, the area of each bar equals the frequency of that class. Given that, what is the formula for frequency density, and why does the $y$-axis show frequency density rather than frequency? (2 steps)", "answer": "- Step 1: The formula is $$\\text{Frequency Density} = \\frac{\\text{Frequency}}{\\text{Class Width}}$$. This rearranges from the area principle: if area = frequency, and the bar is a rectangle with width = class width and height = frequency density, then $$\\text{Width} \\times \\text{Height} = \\text{Frequency}$$, giving height = frequency / width.\n- Step 2: The $y$-axis must show frequency density (not raw frequency) because classes have different widths. If the $y$-axis showed frequency, a wide class with few values would get an unfairly tall bar. Frequency density normalises by width so that the *visual area* correctly represents how many data points sit in each class.\n\nThink of it like population density: a large country with few people should look sparse, not crowded.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": true}, {"question": "A histogram shows frequency density $= 8$ for the class $5 \\le h < 9$ and frequency density $= 60$ for the class $13 \\le h < 15$. How do you recover the frequency for each class, and what is the key sanity check? (2 steps)", "answer": "- Step 1: Multiply frequency density by class width. For $5 \\le h < 9$: width $= 4$, so frequency $= 8 \\times 4 = 32$. For $13 \\le h < 15$: width $= 2$, so frequency $= 60 \\times 2 = 120$.\n- Step 2: The sanity check is that all recovered frequencies must sum to the stated total $n$ (here 408). If they don't, you've misread a bar height or miscalculated a width.\n\nThe histogram encodes frequency in *area*, so recovering it means multiplying height (fd) by width — every single time.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "For grouped data with cumulative frequencies $32, 184, 304, 368, 408$ and $n = 408$, how do you identify the median class and apply linear interpolation? State the formula and the logic behind each term. (3 steps)", "answer": "- Step 1: The median position is $n/2 = 204$. Scan cumulative frequencies: the 204th value lies in the class where the cumulative frequency first reaches or exceeds 204. Here $184 < 204 \\le 304$, so the median class is $13 \\le h < 15$.\n- Step 2: The interpolation formula is $$\\text{Median} = L + \\frac{(n/2) - F_{<}}{f_{\\text{class}}} \\times w$$ where $L$ is the lower class boundary, $F_{<}$ is the cumulative frequency below this class, $f_{\\text{class}}$ is the frequency of this class, and $w$ is the class width.\n- Step 3: Substituting: $$13 + \\frac{204 - 184}{120} \\times 2 = 13 + \\frac{20}{120} \\times 2 = 13 + \\frac{1}{3} \\approx 13.3$$ The fraction $\\frac{204-184}{120}$ tells you how far through the class the median sits (here $1/6$ of the way), and you scale that proportion by the class width $w = 2$.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "The mean of a dataset is 13.2 and the median is 13.3. Is the skew positive or negative, and why? What physical intuition explains this? (2 steps)", "answer": "- Step 1: Since mean $<$ median, the data are **negatively skewed**. The rule is: mean $>$ median $\\Rightarrow$ positive skew; mean $<$ median $\\Rightarrow$ negative skew.\n- Step 2: Intuition: the mean is pulled toward extreme values. In negative skew, a left tail of unusually low values drags the mean down below the median. Think of income data in reverse — a few extremely low outliers pull the average down, while the median (the middle person's value) stays higher.\n\nThe median is robust to outliers; the mean is not. That's why comparing them reveals skew direction.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": true}, {"question": "A histogram covers the class $[9, 13)$ with frequency 152. You need the estimated count of plants with heights in $[8, 14)$ — boundaries that cut *through* two classes. What assumption do you make, and how do you compute the contribution from a partially-included class? (2 steps)", "answer": "- Step 1: You assume **uniform distribution within each class** — i.e., the data are spread evenly across the class interval. This is the fundamental assumption that lets you split a class proportionally.\n- Step 2: For a partial class, the contribution is $$\\frac{\\text{width included}}{\\text{total class width}} \\times \\text{class frequency}$$. For example, from class $[5, 9)$ with frequency 32, the portion $[8, 9)$ has width 1 out of total width 4, so contribution $= \\frac{1}{4} \\times 32 = 8$. From class $[13, 15)$ with frequency 120, the portion $[13, 14)$ has width 1 out of total width 2, so contribution $= \\frac{1}{2} \\times 120 = 60$.\n\nNever treat partial-class boundaries as whole-class questions — that's the most common histogram trap.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": true}, {"question": "Two plants are selected at random without replacement from 408 plants, of which 220 fall in a target height range. Why can you not write the probability as $(220/408)^2$, and what is the correct expression? (2 steps)", "answer": "- Step 1: The expression $(220/408)^2$ assumes **with replacement** — the same probability on both draws. But \"without replacement\" means the population shrinks by one and the favourable count shrinks by one after the first pick.\n- Step 2: The correct product is $$\\frac{220}{408} \\times \\frac{219}{407}$$ The numerator drops from 220 to 219 (one favourable plant removed) and the denominator drops from 408 to 407 (one plant total removed). This gives approximately 0.290.\n\nThe key signal: \"chosen at random\" with no mention of replacement in a finite-population context means without replacement.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": true}, {"question": "Given $\\sum x = 862$ and $n = 12$, what is the mean $\\bar{x}$, and why is the formula $\\bar{x} = \\frac{\\sum x}{n}$ (not $\\frac{\\sum x^2}{n}$)? (2 steps)", "answer": "- Step 1: $$\\bar{x} = \\frac{\\sum x}{n} = \\frac{862}{12} = 71.8\\overline{3} \\approx 71.8$$\n- Step 2: The mean is the *arithmetic average of the values*, so you sum the values ($\\sum x$) and divide by the count ($n$). The quantity $\\frac{\\sum x^2}{n}$ is the *mean of the squares*, which is used in computing variance but is **not** the mean of the data. Confusing these two sums is a classic error.\n\n$\\sum x$ for the mean; $\\sum x^2$ for the variance — keep them distinct.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "To show that a standard deviation equals 8.57, you must first compute $S_{xx}$. What is the formula for $S_{xx}$, and why does it appear in the standard deviation calculation? (3 steps)", "answer": "- Step 1: $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$ This is the *corrected sum of squares*. With $\\sum x = 862$, $\\sum x^2 = 62802$, $n = 12$: $$S_{xx} = 62802 - \\frac{862^2}{12} = 62802 - 61920.333 = 881.667$$\n- Step 2: The population standard deviation is $$\\sigma_x = \\sqrt{\\frac{S_{xx}}{n}}$$ because $S_{xx}/n$ is the mean squared deviation from $\\bar{x}$ (i.e., the variance). Taking the square root gives the standard deviation.\n- Step 3: $$\\sigma_x = \\sqrt{\\frac{881.667}{12}} = \\sqrt{73.472} = 8.5716\\ldots \\approx 8.57$$ Note: S1 uses the **population** formula (divide by $n$), not the sample formula (divide by $n-1$).", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": true}, {"question": "What is the formula for the product moment correlation coefficient $r$, and what does each component capture conceptually? (2 steps)", "answer": "- Step 1: $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} \\cdot S_{yy}}}$$ where $S_{xy} = \\sum xy - \\frac{(\\sum x)(\\sum y)}{n}$, and $S_{xx}$, $S_{yy}$ are the corrected sums of squares for $x$ and $y$ respectively.\n- Step 2: $S_{xy}$ measures how $x$ and $y$ *co-vary* — large positive values mean they increase together. The denominator normalises by the individual spreads of $x$ and $y$, ensuring $r$ always falls in $[-1, 1]$. Without this normalisation, you'd just have a scale-dependent covariance.\n\nThink of $r$ as \"covariance, but rescaled to be universally interpretable.\"", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "A coding formula transforms °F to °C via $c = \\frac{5}{9}(f - 32)$. When you apply this to the *mean* $\\bar{x}$ in °F, why do you apply the full formula (both the $-32$ shift and $\\times 5/9$ scaling)? (2 steps)", "answer": "- Step 1: The mean is a measure of *location* (central position). Any linear transformation $u = a + bx$ shifts the centre: $$\\bar{u} = a + b\\bar{x}$$ Both the additive and multiplicative constants affect where the centre lands.\n- Step 2: Converting 71.8 °F: $$\\bar{c} = \\frac{5}{9}(71.833 - 32) = \\frac{5}{9} \\times 39.833 = 22.1\\ \\text{°C}$$ The $-32$ translates the Fahrenheit zero-point; the $5/9$ rescales the degree size. Both matter for the mean.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "The same coding $c = \\frac{5}{9}(f - 32)$ is applied to find the standard deviation in °C. Why does the $-32$ disappear, and only the multiplier $\\frac{5}{9}$ matter? (2 steps)", "answer": "- Step 1: Standard deviation measures *spread* (dispersion). Adding or subtracting a constant shifts every data point by the same amount — the distances between values don't change, so spread is unaffected.\n- Step 2: Only the multiplicative scaling changes spread: $$\\sigma_c = \\left|\\frac{5}{9}\\right| \\sigma_f = \\frac{5}{9} \\times 8.57 = 4.76\\ \\text{°C}$$ The $-32$ is like converting everyone's height from \"inches above sea level\" to \"inches above floor level\" — the *differences* between people's heights remain identical.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": true}, {"question": "If $u = a + bx$ and $v = c + dy$ with $b, d > 0$, why is $r_{uv} = r_{xy}$? What would happen if one multiplier were negative? (2 steps)", "answer": "- Step 1: PMCC measures the *direction and strength of linear association*. Positive linear coding (adding constants, multiplying by positive scalars) stretches or shifts the data but does not flip the scatter cloud. The correlation — the tightness and direction of the linear pattern — is unchanged.\n- Step 2: If exactly one of $b$ or $d$ is negative, the scatter cloud flips along one axis, reversing the direction of association. Then $$r_{uv} = -r_{xy}$$ If both are negative, two flips cancel: $r_{uv} = r_{xy}$.\n\nThe rule: $r_{uv} = \\text{sign}(b \\cdot d) \\cdot r_{xy}$. In the exam, always state the value AND the reason.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": true}, {"question": "A probability tree has a first branch with probability $p$ and a second branch (given the first) with probability $\\frac{1}{8}$. What goes on the complementary second branch, and what is the key rule for completing any tree diagram? (2 steps)", "answer": "- Step 1: The complementary probability is $1 - \\frac{1}{8} = \\frac{7}{8}$. At every split in a tree, the branch probabilities must sum to 1.\n- Step 2: The general rule: for any node, the probabilities of all branches emanating from that node sum to 1. This is because the branches from a node partition the outcomes *given* the event leading to that node.\n\nIf your branch probabilities don't sum to 1 at every node, you've made an error — stop and fix it.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "A tree diagram gives: Year 12 (prob $p$), then L with prob $\\frac{1}{8}$; Year 13 (prob $1-p$), then L with prob $\\frac{1}{10}$. If $P(L) = 0.11$, how do you form the equation and solve for $p$? (3 steps)", "answer": "- Step 1: Use the law of total probability. The event $L$ can happen via two mutually exclusive paths: $$P(L) = P(\\text{Y12}) \\cdot P(L \\mid \\text{Y12}) + P(\\text{Y13}) \\cdot P(L \\mid \\text{Y13})$$\n- Step 2: Substitute: $$p \\cdot \\frac{1}{8} + (1-p) \\cdot \\frac{1}{10} = 0.11$$ Clear fractions by multiplying through by 80: $$10p + 8(1-p) = 8.8$$ $$10p + 8 - 8p = 8.8$$ $$2p = 0.8$$\n- Step 3: $$p = 0.4 = \\frac{2}{5}$$\n\nThe tree gives you a natural partition of the event $L$ into disjoint cases — sum the path products.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": true}, {"question": "What is the single most dangerous confusion in conditional probability, and how do you guard against it on an exam? (3 steps)", "answer": "- Step 1: The critical error is **returning $P(A \\cap B)$ when the question asks for $P(A \\mid B)$**. These differ by the factor $1/P(B)$ in the denominator. The joint probability is always smaller (or equal) to the conditional probability.\n- Step 2: The guard: the moment you read \"given that $B$,\" immediately write the formula on the page: $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$ This forces you to compute both the numerator (the joint) and the denominator (the probability of the conditioning event).\n- Step 3: Cross-check the denominator by two routes if possible — e.g., complement ($P(R) = 1 - P(L)$) and direct sum down the tree ($P(R) = P(\\text{Y12} \\cap R) + P(\\text{Y13} \\cap R)$). If they disagree, you've caught an arithmetic slip.\n\nThis one habit — writing the formula first — is the single highest-impact exam strategy on this paper.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": true}, {"question": "In a probability tree, $P(\\text{Y12} \\cap R) = \\frac{7}{20}$ and $P(R) = \\frac{89}{100}$. Compute $P(\\text{Y12} \\mid R)$ and explain why the answer is *larger* than $\\frac{7}{20}$. (2 steps)", "answer": "- Step 1: $$P(\\text{Y12} \\mid R) = \\frac{P(\\text{Y12} \\cap R)}{P(R)} = \\frac{7/20}{89/100} = \\frac{7}{20} \\times \\frac{100}{89} = \\frac{35}{89} \\approx 0.393$$\n- Step 2: The conditional probability is larger than the joint ($\\frac{35}{89} > \\frac{7}{20}$) because conditioning on $R$ *restricts the sample space* to only the right-handed students. Among this smaller group, Year 12 students make up a larger proportion than they do in the whole population. Dividing by $P(R) < 1$ inflates the value.\n\nConditioning always narrows the universe — that's why the conditional can exceed the joint.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "For $n = 11$ data values sorted in order, where do $Q_1$ and $Q_3$ sit, and why is no interpolation needed? (2 steps)", "answer": "- Step 1: The quartile positions are $$Q_1: \\frac{n+1}{4} = \\frac{12}{4} = 3, \\qquad Q_3: \\frac{3(n+1)}{4} = \\frac{36}{4} = 9$$ Both are integers, so $Q_1$ is the 3rd value and $Q_3$ is the 9th value — no interpolation between adjacent data points is required.\n- Step 2: Interpolation is only needed when the position is non-integer (e.g., $n = 10$ gives position 2.75 for $Q_1$, requiring a weighted average of the 2nd and 3rd values).\n\nInteger position → direct read. Non-integer position → interpolate.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "The sorted data are $16, 24, 28, 32, 36, 38, 44, 48, 48, 68, 90$ with $Q_1 = 28$, $Q_3 = 48$. Show that 90 is an outlier using the fence rule. (2 steps)", "answer": "- Step 1: Compute the IQR and upper fence: $$\\text{IQR} = Q_3 - Q_1 = 48 - 28 = 20$$ $$\\text{Upper fence} = Q_3 + 1.5 \\times \\text{IQR} = 48 + 1.5 \\times 20 = 48 + 30 = 78$$\n- Step 2: Since $90 > 78$, the value 90 exceeds the upper fence and is therefore classified as an outlier. A symmetric check for the lower fence gives $28 - 30 = -2$, so no low-end outliers exist here.\n\nThe fence rule is a 1.5 IQR boundary on each side — values beyond are flagged.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "In the regression line $s = a + bf$, what do the formulas for $b$ and $a$ look like, and why is $a$ computed as $\\bar{s} - b\\bar{f}$ rather than from some separate formula? (2 steps)", "answer": "- Step 1: $$b = \\frac{S_{fs}}{S_{ff}}, \\qquad a = \\bar{s} - b\\bar{f}$$ The slope $b$ captures how much $s$ changes per unit of $f$. The intercept $a$ ensures the line passes through the point of means $(\\bar{f}, \\bar{s})$.\n- Step 2: The least squares regression line *always* passes through $(\\bar{x}, \\bar{y})$. This geometric fact means that once you have $b$, the intercept is forced: $a = \\bar{y} - b\\bar{x}$. There's no independent formula for $a$ — it's derived from this constraint.\n\nThis is also why the sign of $a$ can be negative: if $b\\bar{x} > \\bar{y}$, then $a < 0$.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "A regression line of Spanish marks ($s$) on French marks ($f$) has gradient 1.04. Write a contextually correct interpretation of this gradient. What two elements must your answer include for the mark? (2 steps)", "answer": "- Step 1: \"For each additional mark scored in the French test, the predicted Spanish mark increases by approximately 1.04 marks.\"\n- Step 2: The two required elements are:\n+ **Units** — \"marks\" (not just \"1.04\")\n+ **Context** — mention both \"French\" and \"Spanish\" by name (not just \"$x$ and $y$\")\n\nA vague answer like \"the gradient is 1.04\" or \"as one increases, the other increases\" loses the mark. Be specific and contextual.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "A regression line was fitted to data with French marks in the range $24 \\le f \\le 68$. You estimate Spanish marks for $f = 55$ and $f = 18$. Which estimate is more reliable and what keywords must you use? (2 steps)", "answer": "- Step 1: The estimate at $f = 55$ is more reliable because 55 lies **within** the observed data range $[24, 68]$ — this is **interpolation**. The estimate at $f = 18$ lies **outside** the range — this is **extrapolation**, and the linear model may not hold there.\n- Step 2: To earn full marks, you must:\n+ Use the words **interpolation** and **extrapolation** explicitly\n+ State the data range $24 \\le f \\le 68$ as evidence\n+ Explain that extrapolation is unreliable because the linear relationship is not guaranteed outside the observed range", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "To standardise a Normal variable $X \\sim N(\\mu, \\sigma^2)$, what transformation do you apply and why? What does the resulting $Z$-score tell you conceptually? (2 steps)", "answer": "- Step 1: $$Z = \\frac{X - \\mu}{\\sigma} \\sim N(0, 1)$$ You subtract the mean (centring) and divide by the standard deviation (rescaling). This maps any Normal distribution to the *standard* Normal.\n- Step 2: The $Z$-score tells you how many standard deviations $X$ is from the mean. A $Z$-score of $-0.3$ means the value is 0.3 standard deviations *below* the mean. This makes values from different Normal distributions comparable.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": true}, {"question": "An athlete's throw distance is $X \\sim N(40, 16)$. Show that $P(X < 38.8) = 0.3821$. What two steps must you show for full marks? (3 steps)", "answer": "- Step 1: Identify $\\mu = 40$, $\\sigma = 4$ (since variance $= 16$, s.d. $= \\sqrt{16} = 4$, not 16).\n- Step 2: Standardise: $$z = \\frac{38.8 - 40}{4} = \\frac{-1.2}{4} = -0.30$$\n- Step 3: Use the symmetry of the standard Normal: $$P(Z < -0.30) = 1 - \\Phi(0.30) = 1 - 0.6179 = 0.3821$$ For full marks, you must show both the $z$-value calculation *and* the table lookup — not just the final probability.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "An athlete has 3 independent attempts to throw $> 38.8$ m. Once they succeed, they stop. What is $P(\\text{qualifies})$, and why is the complement method preferred over direct enumeration? (2 steps)", "answer": "- Step 1: $$P(\\text{qualifies}) = 1 - P(\\text{all 3 fail}) = 1 - P(F)^3 = 1 - 0.3821^3 = 1 - 0.0558 = 0.9442$$\n- Step 2: The direct method requires summing three disjoint cases: succeed on throw 1, succeed on throw 2, succeed on throw 3. Each has a different product of preceding failures. The complement method is one line and avoids three separate calculations with different failure chains.\n\nAlways check: \"at least one success in $n$ independent trials\" → complement of \"all fail.\"", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": true}, {"question": "An athlete qualifies (at least one throw $> 38.8$ m in 3 attempts). Find $P(\\text{qualified on 2nd throw with } X_2 > 44 \\mid \\text{qualifies})$. Why is this a conditional probability, and what is the critical nesting observation? (3 steps)", "answer": "- Step 1: This is conditional because the question says \"given that they qualified\" — you're restricting the sample space to only those outcomes where qualification occurs. The formula is $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$\n- Step 2: The critical nesting observation: $X > 44$ implies $X > 38.8$. So \"throw 2 exceeds 44\" is *already* a qualifying event. The joint event \"throw 1 fails AND throw 2 exceeds 44\" is automatically a subset of \"qualifies.\" No double-counting needed.\n- Step 3: $$P(F_1 \\cap [X_2 > 44]) = 0.3821 \\times 0.1587 = 0.06064$$ $$P(\\text{2nd throw} > 44 \\mid \\text{qualifies}) = \\frac{0.06064}{0.9442} = 0.0642$$ The common mistake is returning $0.06064$ (the joint) without dividing by $P(\\text{qualifies})$.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": true}, {"question": "In a probability problem, $P(B \\mid A) = 0.3$ and $P(A) = x$. What is $P(A \\cap B)$, and what is the most common directional error? (2 steps)", "answer": "- Step 1: From the conditional formula, $$P(A \\cap B) = P(B \\mid A) \\times P(A) = 0.3x$$ The conditioning event $A$ is in the denominator of the conditional, so you multiply through by $P(A)$.\n- Step 2: The common error is writing $P(A \\cap B) = 0.3 \\times P(B) = 0.3y$, which would correspond to $P(A \\mid B) = 0.3$. Always check: the event *after* the vertical bar is the one you multiply by.\n\n$P(B \\mid A)$ means \"probability of $B$ in the universe where $A$ has happened\" — so $A$ is the given, $A$ is the multiplier.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "Given $P(A) = x$, $P(B) = y$, $P(A \\cup B) = 0.65$, and $P(A \\cap B) = 0.3x$, derive the equation $14x + 20y = 13$. What algebra step converts decimals to integers? (3 steps)", "answer": "- Step 1: Apply the addition rule: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$ $$0.65 = x + y - 0.3x = 0.7x + y$$\n- Step 2: Clear the decimal by multiplying by 20: $$20(0.7x + y) = 20 \\times 0.65$$ $$14x + 20y = 13$$\n- Step 3: Multiplying by 20 was chosen because $0.7 \\times 20 = 14$ (integer) and $0.65 \\times 20 = 13$ (integer). This \"clearing decimals\" step is standard for \"show that\" questions where the target equation has integer coefficients.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "Events $B$ and $C$ are mutually exclusive with $P(B \\cup C) = 0.85$ and $P(C) = \\frac{1}{2}x + y$. Derive a second equation in $x$ and $y$. What property of mutual exclusivity do you use? (2 steps)", "answer": "- Step 1: Mutually exclusive means $P(B \\cap C) = 0$, so the addition rule simplifies to $$P(B \\cup C) = P(B) + P(C) = y + \\left(\\frac{1}{2}x + y\\right) = \\frac{1}{2}x + 2y$$\n- Step 2: Set equal to the given value: $$\\frac{1}{2}x + 2y = 0.85 \\quad \\Longleftrightarrow \\quad x + 4y = 1.7$$\n\nThe key insight: mutually exclusive → intersection is zero → union is a simple sum. No overlap to subtract.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "Given $14x + 20y = 13$ and $5x + 20y = 8.5$, find $x$ and $y$ by subtraction. Why is subtraction cleaner than substitution here? (2 steps)", "answer": "- Step 1: Subtract the second equation from the first: $$(14x + 20y) - (5x + 20y) = 13 - 8.5$$ $$9x = 4.5 \\Rightarrow x = 0.5$$ Substitute back: $0.5 + 4y = 1.7 \\Rightarrow 4y = 1.2 \\Rightarrow y = 0.3$.\n- Step 2: Subtraction is cleaner because both equations share the term $20y$. Eliminating $y$ in one step avoids the fractions and sign errors that substitution would introduce. When equations share a common term, always subtract (or add) to eliminate it directly.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "To test whether events $A$ and $B$ are independent, you compare two quantities. What are they, and what common mistake do students make by confusing independence with mutual exclusivity? (2 steps)", "answer": "- Step 1: Compute both $P(A) \\cdot P(B)$ and $P(A \\cap B)$. If they are equal, $A$ and $B$ are independent. Here: $P(A)P(B) = 0.5 \\times 0.3 = 0.15$ and $P(A \\cap B) = 0.3 \\times 0.5 = 0.15$. They match, so $A$ and $B$ **are independent**.\n- Step 2: The common confusion: students think \"independent means they have nothing to do with each other, so $P(A \\cap B) = 0$.\" That's mutual exclusivity, not independence! Independent events can absolutely co-occur — they just don't affect each other's probabilities. Mutually exclusive events are the *most dependent* — if one happens, the other *cannot*.\n\nIndependence: $P(A \\cap B) = P(A)P(B)$. Mutual exclusivity: $P(A \\cap B) = 0$. These are opposite extremes.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": true}, {"question": "The CDF of a discrete random variable $X$ takes the value $F(4) = \\frac{k+4}{8}$ at the maximum value of $x$. How do you find $k$, and what CDF property are you using? (2 steps)", "answer": "- Step 1: The CDF at the largest value of the variable must equal 1: $$F(x_{\\max}) = 1$$ This is because $F(x) = P(X \\le x)$, and at the maximum value, all probability has been accumulated.\n- Step 2: $$\\frac{k+4}{8} = 1 \\Rightarrow k + 4 = 8 \\Rightarrow k = 4$$\n\nIf $F(x_{\\max}) \\ne 1$, you've either misread the table or there's a gap in the distribution.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": true}, {"question": "Given a CDF table, how do you extract the probability mass function (PMF)? What is the formula, and what is the essential verification step? (2 steps)", "answer": "- Step 1: $$P(X = x) = F(x) - F(x-1)$$ You subtract the CDF value at the previous point from the CDF value at the current point. This gives the probability \"jump\" at each value.\n- Step 2: The verification step is that the PMF must sum to 1: $$\\sum P(X = x) = 1$$ For example: $\\frac{2+5+6+13}{26} = \\frac{26}{26} = 1$ ✓. If this fails, you've made an arithmetic error in the CDF differences.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": false}, {"question": "A discrete RV has probabilities $P(X=1) = \\frac{2}{26}$, $P(X=2) = \\frac{5}{26}$, $P(X=3) = \\frac{6}{26}$, $P(X=4) = \\frac{13}{26}$. What is the mode, and how does it differ from the mean? (2 steps)", "answer": "- Step 1: The **mode** is the value of $x$ with the highest probability. Here, $\\frac{13}{26}$ at $x = 4$ is the largest, so **mode = 4**.\n- Step 2: The mode is a *position of peak probability*, not a weighted average. The mean ($E(X) = \\frac{41}{13} \\approx 3.15$) balances the distribution, while the mode simply identifies the single most likely outcome. They need not coincide — especially when the distribution is skewed.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "What is the variance transformation formula for $\\operatorname{Var}(aX + b)$, and why does the additive constant $b$ vanish while the multiplier $a$ gets squared? (3 steps)", "answer": "- Step 1: $$\\operatorname{Var}(aX + b) = a^2 \\operatorname{Var}(X)$$\n- Step 2: The additive constant $b$ vanishes because variance measures *spread* — shifting all values by the same amount doesn't change their distances from each other. Just like adding 32 to every Fahrenheit temperature doesn't change how spread out the temperatures are.\n- Step 3: The multiplier $a$ gets *squared* because variance is in *squared units*. If you double the scale, the standard deviation doubles, but the variance (which is $\\sigma^2$) quadruples. For example, $\\operatorname{Var}(13X - 6) = 169 \\operatorname{Var}(X)$, and the $-6$ contributes nothing.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": true}, {"question": "Compute $\\operatorname{Var}(13X - 6)$ given $\\operatorname{Var}(X) = \\frac{165}{169}$. Why does the 169 cancel, and what happens if you convert to decimals too early? (3 steps)", "answer": "- Step 1: $$\\operatorname{Var}(13X - 6) = 13^2 \\operatorname{Var}(X) = 169 \\times \\frac{165}{169} = 165$$\n- Step 2: The 169 cancels because it appears as both the multiplier ($13^2$) and the denominator of $\\operatorname{Var}(X)$. This cancellation is exact and clean — *only* if you keep fractions.\n- Step 3: If you convert $\\frac{165}{169} \\approx 0.97633$ to a decimal first, then $169 \\times 0.97633 = 164.999...$, which rounds to 165 but introduces rounding error risk. On a calculator-free check, you'd miss the clean integer answer. **Keep fractions until the very end.**\n\nThe final answer is exactly 165 — a clean integer. If your answer is messy, recheck.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": true}, {"question": "For $X \\sim N(\\mu, 36)$, you are told $P(\\mu - 2k < X < \\mu + 2k) = 0.6$. How do you convert this symmetric two-tail probability into a single $\\Phi$ lookup? (3 steps)", "answer": "- Step 1: Standardise. Since the interval is symmetric about $\\mu$: $$P(\\mu - 2k < X < \\mu + 2k) = P\\!\\left(-\\frac{2k}{6} < Z < \\frac{2k}{6}\\right) = 0.6$$ (Note: $\\sigma = \\sqrt{36} = 6$, not 36.)\n- Step 2: Use the symmetry identity: $$P(-a < Z < a) = 2\\Phi(a) - 1$$ So $2\\Phi\\!\\left(\\frac{2k}{6}\\right) - 1 = 0.6$, giving $\\Phi\\!\\left(\\frac{2k}{6}\\right) = 0.8$.\n- Step 3: Look up the inverse: $\\Phi^{-1}(0.8) = 0.8416$. So $\\frac{2k}{6} = 0.8416$, hence $2k = 5.0496$ and $k = 2.52$.\n\nThe classic mistake: looking up $\\Phi^{-1}(0.6) = 0.2533$ directly. You must convert two-tail to one-tail first: $\\Phi = (1 + 0.6)/2 = 0.8$.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": true}, {"question": "What is the general formula for converting a symmetric two-tail probability $P(|Z| < z) = c$ into a one-tail lookup? (2 steps)", "answer": "- Step 1: $$P(|Z| < z) = c \\quad \\Longrightarrow \\quad \\Phi(z) = \\frac{1 + c}{2}$$\n- Step 2: Intuition: the central region of probability $c$ is split evenly by symmetry. Half of $c$ sits on each side of zero. So the area to the left of $z$ is $\\frac{c}{2}$ (the left half of the central region) plus $0.5$ (the entire left tail below zero). Total: $\\frac{c}{2} + 0.5 = \\frac{1+c}{2}$.\n\nMemorise: two-tail $c$ → one-tail $\\Phi = \\frac{1+c}{2}$.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": true}, {"question": "For $Y \\sim N(\\mu, \\sigma^2)$ with $P(Y > \\frac{3}{2}\\mu) = 0.0668$ and $2\\mu = 3\\sigma^2$, find $\\mu$ and $\\sigma$. What two equations do you form, and which root do you reject? (3 steps)", "answer": "- Step 1: Standardise the probability condition: $$P\\!\\left(Z > \\frac{(3/2)\\mu - \\mu}{\\sigma}\\right) = P\\!\\left(Z > \\frac{\\mu}{2\\sigma}\\right) = 0.0668$$ So $\\Phi\\!\\left(\\frac{\\mu}{2\\sigma}\\right) = 0.9332$. From tables, $\\Phi(1.5) = 0.9332$ exactly. Therefore $\\frac{\\mu}{2\\sigma} = 1.5$, giving $\\mu = 3\\sigma$ — your **first equation**.\n- Step 2: The **second equation** is given: $2\\mu = 3\\sigma^2$. Substitute $\\mu = 3\\sigma$: $$2(3\\sigma) = 3\\sigma^2 \\Rightarrow 6\\sigma = 3\\sigma^2 \\Rightarrow 3\\sigma(\\sigma - 2) = 0$$\n- Step 3: Roots: $\\sigma = 0$ or $\\sigma = 2$. Reject $\\sigma = 0$ (standard deviation must be positive). So $\\sigma = 2$ and $\\mu = 3 \\times 2 = 6$.\n\nAlways reject non-physical roots with a written reason: \"$\\sigma > 0$, so $\\sigma = 2$.\"", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": true}, {"question": "Which four $\\Phi$ values are worth memorising to save time on Normal distribution questions? (1 step)", "answer": "- Step 1: The most frequently tested exact values are:\n+ $\\Phi(1.00) = 0.8413$\n+ $\\Phi(1.50) = 0.9332$\n+ $\\Phi(1.645) = 0.95$\n+ $\\Phi(1.96) = 0.975$\n\nThese four cover the vast majority of S1 exam questions. Recognising them instantly saves ~30 seconds per lookup across a paper with 2–3 Normal sub-parts — roughly 90 seconds total, which is the difference between finishing and not finishing.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": false}, {"question": "A regression line is $s = -5.72 + 1.04f$. The intercept $a$ is negative. Does a negative intercept always mean something went wrong? What does it actually represent? (2 steps)", "answer": "- Step 1: No, a negative intercept does not necessarily indicate an error. The intercept $a = \\bar{s} - b\\bar{f}$ is simply the predicted value of $s$ when $f = 0$. If the line's slope is steep enough that $b\\bar{f} > \\bar{s}$, then $a$ will be negative.\n- Step 2: In context, $f = 0$ is far outside the data range ($24 \\le f \\le 68$), so the intercept has no meaningful real-world interpretation. It's a mathematical consequence of fitting a line through the data cloud. The meaningful quantity is the gradient, which tells you the rate of change *within* the observed range.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": true}, {"question": "What is the difference between $P(A \\cap B)$ and $P(A \\mid B)$, both conceptually and numerically? (2 steps)", "answer": "- Step 1: **Conceptually**: $P(A \\cap B)$ is the proportion of *all* outcomes where both $A$ and $B$ occur. $P(A \\mid B)$ is the proportion of outcomes where $A$ occurs *among those where $B$ has already occurred*. The second restricts the universe to $B$-outcomes only.\n- Step 2: **Numerically**: $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$ Since $P(B) \\le 1$, we have $P(A \\mid B) \\ge P(A \\cap B)$. The conditional probability is always at least as large as the joint — they're equal only when $P(B) = 1$ (i.e., $B$ always happens).\n\nThe denominator $P(B)$ is the scaling factor. Forget it, and you report the joint instead of the conditional — Phuc's exact error on Q3(d).", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": true}, {"question": "A question says \"estimate the probability that both of their heights are between 8 cm and 14 cm.\" The histogram classes are $[5,9)$, $[9,13)$, $[13,15)$. Why must you split at the class boundaries 9 and 13, and not just read off whole classes? (2 steps)", "answer": "- Step 1: The requested range $[8, 14)$ does not align with the class boundaries. It starts at 8 (inside the first class) and ends at 14 (inside the third class). The classes $[5,9)$ and $[13,15)$ are only *partially* included.\n- Step 2: Under the uniform-within-class assumption, you must compute the fraction of each partially-included class that falls in the range: $$\\text{From } [5,9): \\frac{9-8}{9-5} \\times 32 = \\frac{1}{4} \\times 32 = 8$$ $$\\text{From } [13,15): \\frac{14-13}{15-13} \\times 120 = \\frac{1}{2} \\times 120 = 60$$ The middle class $[9,13)$ is fully included (152). Total = 220.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": true}, {"question": "In Q5(b), the event \"throw 2 exceeds 44 m\" is a subset of \"throw 2 succeeds (exceeds 38.8 m).\" Why does this nesting matter for the calculation? (2 steps)", "answer": "- Step 1: Since $X > 44$ implies $X > 38.8$, the event \"throw 2 $> 44$\" automatically satisfies the qualification condition. You do NOT multiply by $P(X_2 > 38.8)$ separately — that would be double-counting.\n- Step 2: The joint probability is simply $P(F_1) \\times P(X_2 > 44) = 0.3821 \\times 0.1587$. The probability $P(X_2 > 38.8) = 0.6179$ is already \"contained within\" the event $X_2 > 44$ and does not appear as an extra factor.\n\nNesting means one event absorbs the other — don't multiply both.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": false}, {"question": "In a \"show that\" question worth 3 marks, what is the minimum working you should show, and why? (2 steps)", "answer": "- Step 1: Show at least 3 lines of algebra: (1) the starting formula or substitution, (2) the intermediate simplification, and (3) the final answer. For example, in showing $\\sigma = 8.57$: write $S_{xx} = ...$, then $\\sigma = \\sqrt{S_{xx}/n} = ...$, then round to 8.57.\n- Step 2: Method marks dominate in \"show that\" questions. The final answer alone (already given in the question) typically earns only 1 of 3 marks. The examiner needs to see *how* you got there. Also, quote one extra decimal place before rounding (e.g., $8.5716 \\to 8.57$) to justify the 3 s.f. claim.", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": true}, {"question": "Why is the population standard deviation formula ($\\div n$) used in S1 rather than the sample formula ($\\div (n-1)$)? What's the conceptual difference? (2 steps)", "answer": "- Step 1: In S1, when you have data for the *entire* group of interest (e.g., all 12 months of Kolkata temperature data), the data *is* the population. You divide by $n$ because you're computing the true spread of that complete set.\n- Step 2: The sample formula (dividing by $n-1$, called Bessel's correction) is used when your data is a *sample* from a larger population and you want an unbiased estimator of the population variance. S1 does not require this distinction — always use $\\sigma = \\sqrt{S_{xx}/n}$ unless explicitly told otherwise.\n\nUsing $n-1$ when $n$ is expected loses marks.", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": false}, {"question": "A simple exercise: If $X \\sim N(50, 100)$, find $P(X < 44)$ by standardising. What is the $z$-value? (No need to look up the final probability.) (2 steps)", "answer": "- Step 1: Identify $\\mu = 50$, $\\sigma = \\sqrt{100} = 10$.\n- Step 2: $$z = \\frac{44 - 50}{10} = \\frac{-6}{10} = -0.6$$ You would then look up $\\Phi(0.6)$ and compute $1 - \\Phi(0.6)$, but the key step is getting the $z$-value c
