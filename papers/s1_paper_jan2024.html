robability, you've put the wrong event in the denominator.", "source": "GLM 5.1 ①", "_id": "glm_1_50"}, {"question": "For a discrete random variable, what is the relationship between the cumulative distribution function $$F(x)$$ and the probability mass function $$P(X = x)$$? (2 steps)", "answer": "- Step 1: $$F(x) = P(X \\le x) = \\sum_{x_i \\le x} P(X = x_i)$$ — the running total of probabilities up to and including $$x$$.\n- Step 2: To recover the pmf: $$P(X = x_i) = F(x_i) - F(x_{i-1})$$, the *increment* in the CDF. This is the discrete analogue of differentiating the CDF for continuous variables.\n\nThe CDF must satisfy $$F(x_{\\max}) = 1$$ (all probability accumulated) — this is often used to solve for unknown constants.", "source": "Opus 4.7 ②", "_id": "opus_2_39"}, {"question": "For three independent attempts with success probability $s$ per attempt, what is the probability of *qualifying* (at least one success), and why is the complement approach simpler than summing cases? (3 steps)", "answer": "- Step 1: \"At least one success in $n$\" is the complement of \"all failures\". Direct sum requires three mutually exclusive cases (succeed on 1st / on 2nd / on 3rd), each a small product.\n- Step 2: Complement: $$P(\\text{at least one success}) = 1 - P(\\text{all fail}) = 1 - (1-s)^n.$$\n- Step 3: One subtraction, one power — much cleaner. For $s = 0.6179$, $P(\\text{qualify}) = 1 - 0.3821^3 = 1 - 0.0558 = 0.9442$.\n\nTakeaway: \"at least one\" → complement of \"none\".", "source": "Opus 4.7 ①", "_id": "opus_1_27"}, {"question": "A regression line is $s = -5.72 + 1.04f$. The intercept $a$ is negative. Does a negative intercept always mean something went wrong? What does it actually represent? (2 steps)", "answer": "- Step 1: No, a negative intercept does not necessarily indicate an error. The intercept $a = \\bar{s} - b\\bar{f}$ is simply the predicted value of $s$ when $f = 0$. If the line's slope is steep enough that $b\\bar{f} > \\bar{s}$, then $a$ will be negative.\n- Step 2: In context, $f = 0$ is far outside the data range ($24 \\le f \\le 68$), so the intercept has no meaningful real-world interpretation. It's a mathematical consequence of fitting a line through the data cloud. The meaningful quantity is the gradient, which tells you the rate of change *within* the observed range.", "source": "GLM 5.1 ③", "_id": "glm_3_39"}, {"question": "Given a discrete CDF, why is the probability $$P(X = x)$$ obtained from the **jump** $$F(x) - F(x-1)$$, and what does this represent graphically? (3 steps)", "answer": "- Step 1: $$F(x)$$ is the total probability accumulated up to $$x$$. The quantity $$F(x-1)$$ is the total probability accumulated just before $$x$$. Their difference isolates the exact mass placed **at** the point $$x$$.\n- Step 2: Graphically, a discrete CDF is a right-continuous step function. At each support point, the function jumps upward by exactly the height $$P(X=x)$$. Between support points, the function is flat because no probability mass is assigned there.\n+ In Q7, $$F(2) - F(1) = \\frac{7}{26} - \\frac{2}{26} = \\frac{5}{26}$$ is the size of the step at $$x=2$$.\n- Step 3: Summing all jumps must yield $$1$$, providing a vital arithmetic check before calculating expectations.", "source": "Kimi K2.6 ②", "_id": "kimi_2_30"}, {"question": "The question asks: \"Given that the athlete qualified for the final, find the probability that they qualified on the second throw with a distance of more than 44 m.\" Identify the conditioning event and the joint event in the numerator. (3 steps)", "answer": "- Step 1: The conditioning event (denominator) is \"qualifies\" — the athlete makes it to the final by any route. $$P(\\text{qualifies}) = 0.9442$$.\n- Step 2: The joint event (numerator) is \"qualified on the 2nd throw with $$X > 44$$.\" This means: throw 1 fails ($$X_1 < 38.8$$) AND throw 2 exceeds 44 m ($$X_2 > 44$$). Note that $$X > 44$$ automatically implies $$X > 38.8$$, so \"throw 2 exceeds 44\" is a subset of \"throw 2 succeeds.\"\n- Step 3: $$P(\\text{numerator}) = P(F_1) \\times P(X_2 > 44) = 0.3821 \\times 0.1587 = 0.0606$$. These multiply because the throws are independent.\n\nThe key insight is that \"$$X > 44$$\" already guarantees qualification — you don't need to separately multiply by $$P(X > 38.8)$$. The event \"$$X > 44$$\" is contained within \"$$X > 38.8$$.\"", "source": "GLM 5.1 ②", "_id": "glm_2_27"}, {"question": "What is the conceptual difference between interpolation and extrapolation in regression, and why is one reliable while the other isn't? (3 steps)", "answer": "- Step 1: **Interpolation** predicts $y$ for an $x$ value *inside* the observed range of $x$. **Extrapolation** predicts for $x$ *outside* that range.\n- Step 2: The regression line is fitted using data only inside the range, so the linear pattern is *empirically* supported there. Outside, we have no evidence the linear relationship continues — it may bend, plateau, or reverse.\n- Step 3: So interpolated estimates inherit the reliability of the fit; extrapolated ones are speculative assumptions that nature continues being linear. For full marks, name the technique (interpolation/extrapolation) AND quote the data range.\n\nTakeaway: regression doesn't extrapolate — *you* extrapolate, at your own risk.", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "$$X \\sim N(\\mu, 36)$$ and $$P(\\mu - 2k < X < \\mu + 2k) = 0.6$$. How do you convert this symmetric-interval probability into a form you can look up in the standard normal table? (3 steps)", "answer": "- Step 1: Standardise: $$P\\left(\\frac{-2k}{6} < Z < \\frac{2k}{6}\\right) = 0.6$$, where $$\\sigma = \\sqrt{36} = 6$$. Note: variance 36 means $$\\sigma = 6$$, not 36.\n- Step 2: By symmetry of the standard normal, $$P(-a < Z < a) = 2\\Phi(a) - 1$$. So $$2\\Phi\\left(\\frac{2k}{6}\\right) - 1 = 0.6$$, giving $$\\Phi\\left(\\frac{2k}{6}\\right) = 0.8$$.\n- Step 3: From inverse normal tables, $$\\Phi^{-1}(0.8) = 0.8416$$. So $$\\frac{2k}{6} = 0.8416$$, giving $$2k = 5.0496$$ and $$k = 2.52$$.\n\nThe critical step is converting the two-tail probability (0.6 in the middle) to a one-tail probability (0.8 in the upper tail). The formula is: if $$P(|Z| < z) = c$$, then $$\\Phi(z) = \\frac{1+c}{2}$$. A common error is looking up $$\\Phi^{-1}(0.6)$$ directly — that gives 0.2533, which is wrong.", "source": "GLM 5.1 ②", "_id": "glm_2_39"}, {"question": "In Q8(a), the variance was given as $$36$$. What is the first thing you must do before standardising, and what common mistake does this prevent? (1 step)", "answer": "You must take the square root to obtain the standard deviation $$\\sigma = 6$$. A common mistake is to use $$\\sigma = 36$$ directly in the standardisation formula $$Z = (X-\\mu)/\\sigma$$, which would under-standardise by a factor of $$6$$ and produce completely wrong tail probabilities.", "source": "Kimi K2.6 ②", "_id": "kimi_2_54"}, {"question": "In a histogram, how do you recover the frequency of any class from what is drawn, and why does this work?", "answer": "- Step 1: The defining property of a histogram is that **area of bar = frequency**. The vertical axis is not frequency itself but **frequency density**, defined as $$\\text{fd} = \\frac{\\text{frequency}}{\\text{class width}}.$$\n- Step 2: Rearranging: $$\\text{frequency} = \\text{fd} \\times \\text{class width}.$$ So for each bar, read fd off the vertical axis, multiply by the horizontal width.\n- Step 3: This convention exists because classes can have **unequal widths**. If we plotted raw frequency on the y-axis, wider classes would look artificially \"taller\" even if data were uniformly spread. Frequency density normalises this so visual area faithfully represents count.\n\nTakeaway: fd is \"frequency per unit of class width\" — area not height carries the meaning.", "source": "Opus 4.7 ①", "_id": "opus_1_0"}, {"question": "A data set has mean 13.2 cm and median ≈ 13.3 cm. What is the skew, and how do you justify the answer for full marks?", "answer": "- Step 1: Compare mean and median. Here mean (13.2) < median (13.3).\n- Step 2: The rule: mean < median ⇒ **negatively skewed**; mean > median ⇒ positively skewed; equal ⇒ symmetric.\n- Step 3: For exam credit, state BOTH the direction AND the comparison: *\"Negative skew, because mean < median.\"* Just naming the skew without the numerical comparison loses the reason mark.\n\nIntuition: the mean is dragged toward the long tail; if the tail is on the *low* side, the mean is pulled down below the median.", "source": "Opus 4.7 ①", "_id": "opus_1_4"}, {"question": "If $$\\operatorname{Var}(X) = 3$$, calculate $$\\operatorname{Var}(5X + 2)$$ and $$\\operatorname{Var}(-4X + 7)$$ mentally, explaining the role of the sign in the multiplicative constant. (1 step)", "answer": "$$\\operatorname{Var}(5X + 2) = 25 \\times 3 = 75$$, and $$\\operatorname{Var}(-4X + 7) = (-4)^2 \\times 3 = 16 \\times 3 = 48$$. The sign of the multiplicative constant does not affect variance because squaring eliminates the negative; variance depends only on the magnitude of the scaling, not its direction.", "source": "Kimi K2.6 ①", "_id": "kimi_1_33"}, {"question": "A student computes $$\\operatorname{Var}(13X - 6) = 13 \\operatorname{Var}(X) - 6$$. Identify both errors in this calculation. (2 steps)", "answer": "- Step 1: First error: the multiplier should be **squared**. It should be $$13^2 = 169$$, not 13. Variance scales by the square of the multiplier because it involves squared deviations.\n- Step 2: Second error: the constant $$-6$$ should **not appear at all**. Adding a constant does not change the spread of the distribution, so it drops out of the variance formula entirely.\n\n+ The correct formula is $$\\operatorname{Var}(aX + b) = a^2 \\operatorname{Var}(X)$$. Neither the sign of $$b$$ nor its magnitude matters for variance.", "source": "GLM 5.1 ①", "_id": "glm_1_36"}, {"question": "To estimate the median from grouped data, you use the formula $$L + \\frac{(n/2) - F_{<}}{f_{\\text{class}}} \\times w$$. Explain what each of the four quantities $$L$$, $$F_{<}$$, $$f_{\\text{class}}$$, and $$w$$ represents, and why you need cumulative frequency to identify the median class. (3 steps)", "answer": "- Step 1: $$L$$ = the **lower boundary** of the median class (the class containing the $$(n/2)$$th value). $$w$$ = the **class width** of that class. These describe the \"container\" the median sits in.\n- Step 2: $$F_{<}$$ = the **cumulative frequency of all classes below** the median class. It tells you how many values come before this class starts. $$f_{\\text{class}}$$ = the **frequency within the median class itself**. Together, they tell you how far into the class the median sits.\n- Step 3: You need cumulative frequency because the median position $$n/2$$ might fall in any class — you can't tell from individual class frequencies alone. You accumulate until you cross $$n/2$$: the class where the cumulative frequency first reaches or exceeds $$n/2$$ is the median class. The fraction $$\\frac{(n/2) - F_{<}}{f_{\\text{class}}}$$ is the proportion of the way through that class the median lies.\n\nThe formula linearly interpolates within the median class, assuming values are uniformly distributed across its width.", "source": "GLM 5.1 ①", "_id": "glm_1_3"}, {"question": "For the regression line $$s = a + bf$$, explain why the line always passes through the point $$(\\bar{f}, \\bar{s})$$. (2 steps)", "answer": "- Step 1: The intercept formula is $$a = \\bar{s} - b\\bar{f}$$. Substituting this into the regression equation: $$s = (\\bar{s} - b\\bar{f}) + bf$$.\n- Step 2: When $$f = \\bar{f}$$: $$s = \\bar{s} - b\\bar{f} + b\\bar{f} = \\bar{s}$$. So the point $$(\\bar{f}, \\bar{s})$$ always lies on the regression line. This is a built-in property of least-squares regression.\n\nThis property is useful for checking your regression line: plug in $$f = \\bar{f}$$ and verify you get $$s = \\bar{s}$$. If not, you've made a calculation error in $$a$$ or $$b$$.", "source": "GLM 5.1 ②", "_id": "glm_2_45"}, {"question": "Why is the product moment correlation coefficient $$r$$ invariant under positive linear coding of both variables? Give a conceptual reason rather than just stating the rule. (3 steps)", "answer": "- Step 1: Linear coding with positive slopes preserves the relative ordering of data points and the angles between lines of best fit. It acts as a change of units (like converting inches to centimetres) rather than a change of relationship.\n- Step 2: Mathematically, $$r$$ is defined using standardised scores: the covariance divided by the product of standard deviations. When both variables are coded as $$u = a + bx$$ and $$v = c + dy$$ with $$b, d > 0$$, the constants $$a$$ and $$c$$ vanish in centred deviations, while $$b$$ and $$d$$ cancel in the ratio.\n- Step 3: Because $$r$$ measures the strength of linear association on a standardised scale from $$-1$$ to $$1$$, a mere rescaling of axes cannot alter the tightness of the cloud of points around a line. Only a sign reversal ($$b < 0$$ or $$d < 0$$) would flip the sign of $$r$$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_11"}, {"question": "The mode of a discrete random variable is defined as the value with the highest probability. If the PDF yields probabilities $$\\frac{2}{26}, \\frac{5}{26}, \\frac{6}{26}, \\frac{13}{26}$$, why is the mode $$4$$ even though $$4$$ is the largest value in the support? (1 step)", "answer": "The mode is determined solely by the **relative frequency** or probability mass, not by the magnitude of the value. Since $$P(X=4) = \\frac{13}{26}$$ dominates all other probabilities, $$4$$ is the most likely outcome and hence the mode. It is coincidental here that the modal value is also the maximum support point.", "source": "Kimi K2.6 ②", "_id": "kimi_2_31"}, {"question": "Two plants are chosen at random from 408 plants, of which 220 fall in a target range. Why is the probability that both are in the range NOT $$(220/408)^2$$, and what is it instead? (3 steps)", "answer": "- Step 1: \"Chosen at random\" from a finite population, without further qualification, means **without replacement** — the same plant can't be picked twice.\n- Step 2: After the first plant is taken, the population shrinks. If the first was in-range, then 219 of the remaining 407 are in-range.\n- Step 3: So $$P(\\text{both in range}) = \\frac{220}{408} \\times \\frac{219}{407}.$$ Using $(220/408)^2$ would assume *with* replacement, slightly over-counting because it lets the same plant be drawn twice.\n\nTakeaway: read \"two are chosen\" as a no-replacement signal unless told otherwise.", "source": "Opus 4.7 ①", "_id": "opus_1_7"}, {"question": "For the plant-height data, the median was estimated at roughly $$13.3$$ cm and the mean was given as $$13.2$$ cm. What does the comparison mean $$<$$ median tell you about the shape of the distribution, and why? (2 steps)", "answer": "- Step 1: When the mean is pulled below the median, it indicates that the left tail of the distribution is longer or heavier than the right tail. Lower values are disproportionately influencing the average.\n- Step 2: Therefore the data are **negatively skewed**. The examiner requires both the direction (negative) and the numerical justification (mean $$<$$ median) for the mark.", "source": "Kimi K2.6 ②", "_id": "kimi_2_3"}, {"question": "A regression line is fitted to French marks ranging from $$24$$ to $$68$$. Explain why estimating a Spanish mark for a French score of $$55$$ is more reliable than for a score of $$18$$, using the precise statistical terminology. (2 steps)", "answer": "- Step 1: A French score of $$55$$ lies inside the observed data range $$[24, 68]$$, so the estimate is an interpolation. We are predicting within the cloud of observed data, where the linear relationship is supported by evidence.\n- Step 2: A French score of $$18$$ lies outside the observed range, so the estimate is an extrapolation. The linear relationship is not guaranteed to hold beyond the range of the data, making the prediction potentially unreliable. The mark scheme requires both the terms \"interpolation\" and \"extrapolation\" and explicit reference to the data range.", "source": "Kimi K2.6 ①", "_id": "kimi_1_22"}, {"question": "The revision notes flag a \"show that\" requirement for $$S_{xx}$$ and the standard deviation in Q2(a)(ii). Conceptually, why does examiners' mark schemes require intermediate values like $$S_{xx}$$ or an unrounded decimal before the final $$3$$ s.f. answer? (2 steps)", "answer": "- Step 1: \"Show that\" and calculation questions award **method marks** for correct intermediate steps. Simply writing the final rounded number gives no evidence that you used the correct formula rather than guessing.\n- Step 2: Writing $$S_{xx} = 881.667$$, then $$\\sigma = \\sqrt{881.667/12} = 8.5716\\ldots$$, and finally $$8.57$$ proves you understand the definitional formula $$\\sigma = \\sqrt{S_{xx}/n}$$ and protects against rounding errors carried forward.", "source": "Kimi K2.6 ②", "_id": "kimi_2_6"}, {"question": "What is the *trigger phrase* in a question that demands the conditional probability formula, and what formula must you immediately write down?", "answer": "- Step 1: The trigger is **\"given that\"** (or synonyms like \"if … is …\", \"for those who …\", \"among the …\").\n- Step 2: As soon as that phrase appears, write $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$ in the margin.\n- Step 3: The conditioning event (the one after \"given that\") always goes in the **denominator**.\n\nTakeaway: this single habit fixes the single most common S1 mistake — confusing joint with conditional probability.", "source": "Opus 4.7 ①", "_id": "opus_1_16"}, {"question": "You encounter the phrase \"given that\" in an exam question. What single action should you take immediately before doing any calculation? (2 steps)", "answer": "- Step 1: **Write the conditional probability formula on the page**: $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$. Identify which event is $$A$$ (what you're finding the probability of) and which is $$B$$ (the condition, the event after \"given that\").\n- Step 2: This forces you to compute both the numerator (a joint probability) and the denominator (the probability of the conditioning event) separately. It prevents the most common error: writing just the numerator as the answer.\n\n+ This habit would have saved 2 marks on Q3(d) and 2–3 marks on Q5(b) in the January 2024 paper. It is the single highest-impact exam strategy for S1.", "source": "GLM 5.1 ①", "_id": "glm_1_43"}, {"question": "A random variable $$Y \\sim N(\\mu, \\sigma^2)$$ satisfies $$P(Y > \\frac{3}{2}\\mu) = 0.0668$$ and $$2\\mu = 3\\sigma^2$$. Describe the strategy for finding $$\\mu$$ and $$\\sigma$$ — how many equations do you need, and where does each come from? (3 steps)", "answer": "- Step 1: You need **two equations** in two unknowns ($$\\mu$$ and $$\\sigma$$). One comes from the probability condition, the other from the algebraic relation $$2\\mu = 3\\sigma^2$$.\n- Step 2: From the probability condition: standardise $$P(Y > \\frac{3}{2}\\mu) = 0.0668$$ to get $$P(Z > \\frac{\\mu/2}{\\sigma}) = 0.0668$$, hence $$\\Phi(\\frac{\\mu}{2\\sigma}) = 0.9332$$, giving $$\\frac{\\mu}{2\\sigma} = 1.5$$, i.e., $$\\mu = 3\\sigma$$. This is equation 1.\n- Step 3: Substitute $$\\mu = 3\\sigma$$ into $$2\\mu = 3\\sigma^2$$: $$6\\sigma = 3\\sigma^2$$, giving $$3\\sigma(\\sigma - 2) = 0$$. Since $$\\sigma > 0$$, we get $$\\sigma = 2$$ and then $$\\mu = 6$$.\n\n+ The key insight: the probability condition, after standardisation, gives a **linear** relation between $$\\mu$$ and $$\\sigma$$ (namely $$\\mu = 3\\sigma$$). The algebraic condition gives a **quadratic** relation. Substituting the linear into the quadratic yields a simple equation.", "source": "GLM 5.1 ①", "_id": "glm_1_40"}, {"question": "In a histogram, what does the area of each bar represent, and why must frequency density rather than frequency be plotted on the vertical axis when class widths vary? (3 steps)", "answer": "- Step 1: The area of each bar represents the frequency of observations in that class. This is because we want the visual size of the bar to be proportional to the count of data it contains.\n- Step 2: When class widths are unequal, plotting raw frequency on the vertical axis would make wider bars appear disproportionately large even if they contain the same number of observations, distorting the visual distribution.\n- Step 3: By plotting frequency density ($$fd = \\text{frequency} / \\text{class width}$$) on the vertical axis, the area ($$fd \\times \\text{width}$$) correctly equals the frequency, preserving the visual proportionality regardless of class width.", "source": "Kimi K2.6 ①", "_id": "kimi_1_0"}, {"question": "The product moment correlation coefficient is given by $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} \\cdot S_{yy}}}$$. Explain what $$r$$ measures and why it is divided by $$\\sqrt{S_{xx} \\cdot S_{yy}}$$ rather than just $$S_{xy}$$ alone. (2 steps)", "answer": "- Step 1: $$r$$ measures the **strength and direction of linear association** between two variables. It ranges from $$-1$$ (perfect negative linear) to $$+1$$ (perfect positive linear), with 0 meaning no linear correlation.\n- Step 2: $$S_{xy}$$ alone depends on the scales of $$x$$ and $$y$$ — if you measured temperature in millidegrees instead of degrees, $$S_{xy}$$ would increase by a factor of 1000, even though the relationship hasn't changed. Dividing by $$\\sqrt{S_{xx} \\cdot S_{yy}}$$ **normalises** $$S_{xy}$$, removing the effect of scale so that $$r$$ is always between $$-1$$ and $$+1$$ regardless of units.\n\n+ Think of it as \"covariance divided by the product of standard deviations\" — standardising both variables to unit-free z-scores before measuring their agreement.", "source": "GLM 5.1 ①", "_id": "glm_1_9"}, {"question": "An athlete has 3 independent attempts to throw $> 38.8$ m. Once they succeed, they stop. What is $P(\\text{qualifies})$, and why is the complement method preferred over direct enumeration? (2 steps)", "answer": "- Step 1: $$P(\\text{qualifies}) = 1 - P(\\text{all 3 fail}) = 1 - P(F)^3 = 1 - 0.3821^3 = 1 - 0.0558 = 0.9442$$\n- Step 2: The direct method requires summing three disjoint cases: succeed on throw 1, succeed on throw 2, succeed on throw 3. Each has a different product of preceding failures. The complement method is one line and avoids three separate calculations with different failure chains.\n\nAlways check: \"at least one success in $n$ independent trials\" → complement of \"all fail.\"", "source": "GLM 5.1 ③", "_id": "glm_3_23"}, {"question": "On a histogram of grouped data, the y-axis shows frequency density rather than frequency. Why can't we just plot frequency directly on the y-axis, and what does the area of each bar represent? (2 steps)", "answer": "- Step 1: If we plotted frequency directly, bars for wide classes would look the same height as bars for narrow classes with the same frequency — visually misleading because the wide class spreads its count over a larger range. Frequency density $$= \\frac{\\text{frequency}}{\\text{class width}}$$ corrects for this: it measures how \"packed\" the data are per unit of the x-axis.\n- Step 2: The **area** of each bar (height × width = frequency density × class width) equals the **frequency** of that class. This is the fundamental histogram property: area ∝ count, not height ∝ count.\n\nThink of it like population density: a tall narrow bar and a short wide bar can have the same area (same number of people), but the density tells you how crowded each region is.", "source": "GLM 5.1 ①", "_id": "glm_1_0"}, {"question": "For a symmetric Normal interval like $P(\\mu - c < X < \\mu + c) = 0.6$, how do you convert this into a one-tail probability for the table lookup? (3 steps)", "answer": "- Step 1: Standardise: $$P\\!\\left(-\\frac{c}{\\sigma} < Z < \\frac{c}{\\sigma}\\right) = 0.6.$$ This is a symmetric interval around 0.\n- Step 2: By symmetry of $N(0,1)$, $$P(-z^* < Z < z^*) = 2\\Phi(z^*) - 1.$$ Setting equal to 0.6: $\\Phi(z^*) = 0.8$.\n- Step 3: Look up $\\Phi^{-1}(0.8) \\approx 0.8416$ in the inverse-normal table. Generalises to $$\\Phi(z^*) = \\frac{1 + c}{2}$$ where $c$ is the two-tail probability.\n\nTakeaway: convert two-tail probability $c$ into one-tail $\\Phi$-value $(1+c)/2$ before looking up.", "source": "Opus 4.7 ①", "_id": "opus_1_40"}, {"question": "When coding from °F to °C via $$c = \\frac{5}{9}(f - 32)$$, how does the standard deviation change, and what happens to the $$-32$$? (3 steps)", "answer": "- Step 1: Standard deviation measures spread (how far values are from the mean). Adding or subtracting a constant shifts all values equally, so deviations from the mean are unchanged. The $$-32$$ does NOT affect the standard deviation.\n- Step 2: Multiplying by $$5/9$$ scales all deviations from the mean by $$5/9$$, so the standard deviation scales by $$|5/9|$$: $$\\sigma_c = \\frac{5}{9} \\sigma_f = \\frac{5}{9} \\times 8.5716 = 4.76$$ °C.\n- Step 3: General rule: if $$u = a + bx$$, then $$\\sigma_u = |b| \\sigma_x$$. The additive constant $$a$$ drops out; only the multiplicative factor $$b$$ matters (and its absolute value, since spread can't be negative).\n\nThis is the same principle as $$\\text{Var}(aX + b) = a^2 \\text{Var}(X)$$ — the constant vanishes and the multiplier is squared (for variance) or taken as absolute value (for s.d.).", "source": "GLM 5.1 ②", "_id": "glm_2_12"}, {"question": "In a histogram, you need to find the probability that a randomly selected plant has height between 8 cm and 14 cm. The class [5, 9) has frequency 32 (width 4), class [9, 13) has frequency 152 (width 4), and class [13, 15) has frequency 120 (width 2). How many plants fall in the interval [8, 14)? (4 steps)", "answer": "- Step 1: For class [5, 9): only the portion from 8 to 9 contributes. Width used = 9 - 8 = 1. Proportion = 1/4 of the class. Frequency = (1/4) × 32 = 8.\n- Step 2: For class [9, 13): this entire class lies within [8, 14), so frequency = 152.\n- Step 3: For class [13, 15): only the portion from 13 to 14 contributes. Width used = 14 - 13 = 1. Proportion = 1/2 of the class. Frequency = (1/2) × 120 = 60.\n- Step 4: Total in [8, 14) = 8 + 152 + 60 = 220.\n\nThis assumes uniform distribution within each class, which is the standard assumption for histogram-based probability estimates.", "source": "MiniMax ②", "_id": "minimax_2_2"}, {"question": "The same coding $c = \\frac{5}{9}(f - 32)$ is applied to find the standard deviation in °C. Why does the $-32$ disappear, and only the multiplier $\\frac{5}{9}$ matter? (2 steps)", "answer": "- Step 1: Standard deviation measures *spread* (dispersion). Adding or subtracting a constant shifts every data point by the same amount — the distances between values don't change, so spread is unaffected.\n- Step 2: Only the multiplicative scaling changes spread: $$\\sigma_c = \\left|\\frac{5}{9}\\right| \\sigma_f = \\frac{5}{9} \\times 8.57 = 4.76\\ \\text{°C}$$ The $-32$ is like converting everyone's height from \"inches above sea level\" to \"inches above floor level\" — the *differences* between people's heights remain identical.", "source": "GLM 5.1 ③", "_id": "glm_3_10"}, {"question": "The Spanish marks (sorted) are 16, 24, 28, 32, 36, 38, 44, 48, 48, 68, 90. With $$Q_1 = 28$$ and $$Q_3 = 48$$, how do you test whether 90 is an outlier using the fence rule? (3 steps)", "answer": "- Step 1: Compute the IQR: $$Q_3 - Q_1 = 48 - 28 = 20$$. This is the spread of the middle 50% of the data.\n- Step 2: Compute the upper fence: $$Q_3 + 1.5 \\times \\text{IQR} = 48 + 1.5 \\times 20 = 48 + 30 = 78$$. Also the lower fence: $$Q_1 - 1.5 \\times \\text{IQR} = 28 - 30 = -2$$.\n- Step 3: Since 90 > 78, the value 90 exceeds the upper fence and is classified as an outlier. (No values fall below the lower fence of −2, so there are no low outliers.)\n\nThe fence rule is: any value above $$Q_3 + 1.5 \\times \\text{IQR}$$ or below $$Q_1 - 1.5 \\times \\text{IQR}$$ is an outlier. This is the standard box-plot outlier criterion.", "source": "GLM 5.1 ②", "_id": "glm_2_21"}, {"question": "What does it mean for events $A$ and $B$ to be **independent**, and what test do you use to verify it numerically? (3 steps)", "answer": "- Step 1: $A$ and $B$ are independent if knowing whether $B$ occurred tells you nothing about whether $A$ will: $P(A|B) = P(A)$ and equivalently $P(B|A) = P(B)$.\n- Step 2: Plugging this into the conditional definition gives the test: $$P(A \\cap B) = P(A) \\cdot P(B).$$\n- Step 3: Compute both sides numerically and compare. Equal ⇒ independent. Unequal ⇒ dependent. State the conclusion in words.\n\nTakeaway: independence is a multiplicative relationship between the intersection and the marginals.", "source": "Opus 4.7 ①", "_id": "opus_1_32"}, {"question": "What is the computational formula for $$S_{xx}$$ used in S1, and why does it measure the spread of a dataset around its mean? (3 steps)", "answer": "- Step 1: The formula is $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$. This is algebraically equivalent to $$\\sum (x - \\bar{x})^2$$, the sum of squared deviations from the mean.\n- Step 2: The term $$\\frac{(\\sum x)^2}{n}$$ acts as a correction factor that removes the contribution of the mean. If all data were identical, $$\\sum x^2$$ would equal this correction factor and $$S_{xx}$$ would be zero, indicating no spread.\n- Step 3: Because it is based on squared deviations, $$S_{xx}$$ grows whenever data points lie farther from the mean, making it a natural measure of dispersion. In S1, the population standard deviation is $$\\sqrt{S_{xx}/n}$$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_7"}, {"question": "Temperatures $x$ in °F are converted to $u$ in °C via $u = \\tfrac{5}{9}(x - 32)$. How does $\\bar{u}$ relate to $\\bar{x}$, and how does $\\sigma_u$ relate to $\\sigma_x$? (3 steps)", "answer": "- Step 1: This is a **linear coding** $u = a + bx$ with $a = -\\tfrac{5}{9} \\cdot 32 = -\\tfrac{160}{9}$ and $b = \\tfrac{5}{9}$.\n- Step 2: The mean transforms identically: $\\bar{u} = a + b\\bar{x}$. So apply both the shift AND the scale to the mean.\n- Step 3: The standard deviation only feels the multiplicative part: $\\sigma_u = |b|\\sigma_x = \\tfrac{5}{9}\\sigma_x$. The shift $-32$ doesn't change the spread — every value moves by the same amount, so distances between values are preserved.\n\nTakeaway: **shifts don't change spread; scales do.**", "source": "Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "For a discrete random variable, what relationship connects the cumulative distribution function $F(x)$ and the probability mass function $P(X=x)$? (3 steps)", "answer": "- Step 1: $F(x) = P(X \\le x)$ — the running sum of probabilities up to and including $x$.\n- Step 2: To extract individual probabilities, take the **first difference**: $$P(X = x) = F(x) - F(x-1)$$ for consecutive integer-valued $x$ (or, more generally, $F$ at the value minus $F$ at the previous attained value).\n- Step 3: Two boundary conditions: $F$ at the smallest value equals $P(X = \\text{min})$; $F$ at the largest value equals 1 (probabilities sum to 1).\n\nIntuition: $F$ is a staircase; the height of each step is the probability mass at that point.", "source": "Opus 4.7 ①", "_id": "opus_1_35"}, {"question": "For a Normal random variable $X \\sim N(\\mu, \\sigma^2)$, how do you standardise $X$, and why is standardisation useful? (3 steps)", "answer": "- Step 1: $$Z = \\frac{X - \\mu}{\\sigma}$$ converts $X$ to a standard normal $Z \\sim N(0,1)$. Subtracting $\\mu$ recentres at 0; dividing by $\\sigma$ rescales spread to 1.\n- Step 2: Standardisation is useful because there's only one set of tables (the $\\Phi$ table for $N(0,1)$). Every Normal probability question reduces to looking up a $z$-value in this single table.\n- Step 3: The transformation is **linear**, so it preserves inequality directions: $X < c$ iff $Z < (c-\\mu)/\\sigma$. So you can directly translate probability statements about $X$ into ones about $Z$.", "source": "Opus 4.7 ①", "_id": "opus_1_26"}, {"question": "For a Normal distribution X ~ N(40, 4²), calculate P(X < 38.8) using standardisation, showing the z-value and table lookup. (3 steps)", "answer": "- Step 1: Standardise: z = (x - μ) / σ = (38.8 - 40) / 4 = -1.2 / 4 = -0.30.\n- Step 2: From Normal tables, Φ(0.30) = 0.6179. Since z is negative, P(Z < -0.30) = 1 - Φ(0.30) = 1 - 0.6179 = 0.3821.\n- Step 3: Therefore P(X < 38.8) = 0.3821.\n\n[Always show the z-value and reference the table]", "source": "MiniMax ①", "_id": "minimax_1_13"}, {"question": "You compute $$E(X) = \\frac{82}{26}$$ and $$E(X^2) = \\frac{284}{26}$$ for a discrete RV. To find $$\\operatorname{Var}(X)$$, a student writes $$\\operatorname{Var}(X) = \\frac{284}{26} - \\left(\\frac{82}{26}\\right)^2$$. Show the algebra that leads to a clean fraction. (3 steps)", "answer": "- Step 1: Simplify: $$E(X) = \\frac{82}{26} = \\frac{41}{13}$$ and $$E(X^2) = \\frac{284}{26} = \\frac{142}{13}$$.\n- Step 2: $$\\operatorname{Var}(X) = \\frac{142}{13} - \\left(\\frac{41}{13}\\right)^2 = \\frac{142}{13} - \\frac{1681}{169}$$. Get a common denominator of 169: $$\\frac{142 \\times 13}{169} - \\frac{1681}{169} = \\frac{1846 - 1681}{169} = \\frac{165}{169}$$.\n- Step 3: Then $$\\operatorname{Var}(13X - 6) = 169 \\times \\frac{165}{169} = 165$$. The 169 cancels perfectly because $$169 = 13^2$$, which is the denominator of $$\\operatorname{Var}(X)$$.\n\n+ This beautiful cancellation only works if you keep fractions. Converting to decimals early gives $$\\operatorname{Var}(X) \\approx 0.9763$$ and $$169 \\times 0.9763 \\approx 164.99$$, which is messier and less obviously correct.", "source": "GLM 5.1 ①", "_id": "glm_1_58"}, {"question": "Why does an additive constant leave standard deviation unchanged but multiplicative scaling does not? (3 steps)", "answer": "- Step 1: Standard deviation measures *distances* between data values and the mean. Adding a constant $a$ moves every $x_i$ by $a$ and also moves $\\bar{x}$ by $a$ — the difference $x_i - \\bar{x}$ is unchanged.\n- Step 2: Multiplying every $x_i$ by $b$ stretches all distances by factor $|b|$. The deviation $x_i - \\bar{x}$ becomes $b(x_i - \\bar{x})$.\n- Step 3: Since variance is the average squared deviation, multiplication by $b$ scales variance by $b^2$ and s.d. by $|b|$. Addition leaves both untouched.\n\nTakeaway: spread cares about *relative* positions, not absolute location.", "source": "Opus 4.7 ①", "_id": "opus_1_11"}, {"question": "A histogram has a class $$[5, 9)$$ with frequency 32. You need to count how many observations fall in the subrange $$[8, 9)$$. What assumption do you make, and how do you calculate the count? (2 steps)", "answer": "- Step 1: You assume values are **uniformly distributed within the class** — every sub-interval of the same width contains the same number of observations. This is the standard assumption for grouped data interpolation.\n- Step 2: The subrange $$[8, 9)$$ has width 1 out of the full class width 4. So the proportion of the class it contains is $$\\frac{1}{4}$$, and the count is $$\\frac{1}{4} \\times 32 = 8$$.\n\n+ General formula: count in subrange $$= \\frac{\\text{subrange width}}{\\text{class width}} \\times \\text{class frequency}$$.\n\nThis is exactly what Q1(d) requires when the boundaries 8 cm and 14 cm cut through the middle of existing classes.", "source": "GLM 5.1 ①", "_id": "glm_1_5"}, {"question": "Conceptually compute $$\\operatorname{Var}(13X - 6)$$ for a discrete RV $$X$$ with $$\\operatorname{Var}(X) = 165/169$$. (2 steps)", "answer": "- Step 1: Apply $$\\operatorname{Var}(aX + b) = a^2 \\operatorname{Var}(X)$$: the $$-6$$ vanishes, the $$13$$ squares to $$169$$.\n- Step 2: $$\\operatorname{Var}(13X - 6) = 169 \\times \\frac{165}{169} = 165$$.\n\nThe clean cancellation is a signal that you've kept fractions correctly. If your answer comes out as a messy decimal, suspect an arithmetic error upstream.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "When solving for unknown parameters $$\\mu$$ and $$\\sigma$$ of a normal distribution given two probability conditions, what is the standard strategy for producing two equations? (3 steps)", "answer": "- Step 1: Standardise each probability statement using $$Z = \\frac{X - \\mu}{\\sigma}$$ to convert it into a statement about standard normal probabilities, such as $$P(Z < z_1) = p_1$$ and $$P(Z < z_2) = p_2$$.\n- Step 2: Use the standard normal table or inverse normal function to convert these probabilities into numerical $$z$$-scores, yielding equations like $$\\frac{x_1 - \\mu}{\\sigma} = z_1$$ and $$\\frac{x_2 - \\mu}{\\sigma} = z_2$$.\n- Step 3: Rearrange these to form two simultaneous equations in $$\\mu$$ and $$\\sigma$$ (or in $$\\mu$$ and $$\\sigma^2$$), then solve by substitution or elimination. Always reject any solution with $$\\sigma \\le 0$$ because standard deviation must be positive.", "source": "Kimi K2.6 ①", "_id": "kimi_1_34"}, {"question": "A student sees $$P(Y > \\frac{3}{2}\\mu) = 0.0668$$ and recognises that $$0.0668 = 1 - 0.9332 = 1 - \\Phi(1.5)$$. They then write $$\\frac{3\\mu/2 - \\mu}{\\sigma} = 1.5$$. Simplify the left side and solve for the relationship between $$\\mu$$ and $$\\sigma$$. (3 steps)", "answer": "- Step 1: The numerator is $$\\frac{3}{2}\\mu - \\mu = \\frac{\\mu}{2}$$. So the standardised expression is $$\\frac{\\mu/2}{\\sigma} = \\frac{\\mu}{2\\sigma}$$.\n- Step 2: Setting $$\\frac{\\mu}{2\\sigma} = 1.5$$ and solving: $$\\mu = 1.5 \\times 2\\sigma = 3\\sigma$$. This is the linear relation between $$\\mu$$ and $$\\sigma$$.\n- Step 3: Combined with $$2\\mu = 3\\sigma^2$$: substitute $$\\mu = 3\\sigma$$ to get $$2(3\\sigma) = 3\\sigma^2$$, i.e., $$6\\sigma = 3\\sigma^2$$, giving $$\\sigma = 2$$ (rejecting $$\\sigma = 0$$) and $$\\mu = 6$$.\n\n+ The recognition that $$0.0668 = 1 - \\Phi(1.5)$$ is where memorising $$\\Phi(1.5) = 0.9332$$ pays off. Without it, you'd need to look up the inverse normal value.", "source": "GLM 5.1 ①", "_id": "glm_1_56"}, {"question": "In the discus problem, the event is \"qualified on the 2nd throw with a distance more than 44 m\". Why is this NOT the same as \"the 2nd throw exceeds 44 m\"? (3 steps)", "answer": "- Step 1: \"Qualified on the 2nd throw\" requires the **1st throw to have failed** (otherwise the athlete would have stopped at throw 1).\n- Step 2: It also requires the 2nd throw to **succeed** — and \"more than 44 m\" automatically satisfies the qualifying threshold of \"more than 38.8 m\" (since 44 > 38.8). So the success condition collapses to just \"$X_2 > 44$\".\n- Step 3: Therefore the event is $$F_1 \\cap (X_2 > 44),$$ a *joint* event whose probability is $P(F_1) \\cdot P(X_2 > 44)$ by independence. Don't double-count \"$X_2 > 38.8$ AND $X_2 > 44$\" — the stronger condition absorbs the weaker.\n\nTakeaway: re-state the event in maths before computing probability — English can mask structure.", "source": "Opus 4.7 ①", "_id": "opus_1_28"}, {"question": "You have $$\\mu = 3\\sigma$$ (from standardisation) and $$2\\mu = 3\\sigma^2$$ (given). Solve simultaneously and explain why one root is rejected. (3 steps)", "answer": "- Step 1: Substitute $$\\mu = 3\\sigma$$ into $$2\\mu = 3\\sigma^2$$: $$2(3\\sigma) = 3\\sigma^2$$, giving $$6\\sigma = 3\\sigma^2$$.\n- Step 2: Rearrange: $$3\\sigma^2 - 6\\sigma = 0$$, factorise: $$3\\sigma(\\sigma - 2) = 0$$, so $$\\sigma = 0$$ or $$\\sigma = 2$$.\n- Step 3: Reject $$\\sigma = 0$$ because a standard deviation must be positive (zero s.d. would mean all values are identical, contradicting the Normal distribution assumption). Therefore $$\\sigma = 2$$ and $$\\mu = 3 \\times 2 = 6$$.\n\nAlways reject non-physical roots with a brief justification: \"$$\\sigma > 0$$, so $$\\sigma = 2$$.\" Other common rejections in S1: negative probabilities, $$|r| > 1$$, and negative frequencies.", "source": "GLM 5.1 ②", "_id": "glm_2_42"}, {"question": "In a \"show that\" question worth 3 marks, what is the minimum working you should show, and why? (2 steps)", "answer": "- Step 1: Show at least 3 lines of algebra: (1) the starting formula or substitution, (2) the intermediate simplification, and (3) the final answer. For example, in showing $\\sigma = 8.57$: write $S_{xx} = ...$, then $\\sigma = \\sqrt{S_{xx}/n} = ...$, then round to 8.57.\n- Step 2: Method marks dominate in \"show that\" questions. The final answer alone (already given in the question) typically earns only 1 of 3 marks. The examiner needs to see *how* you got there. Also, quote one extra decimal place before rounding (e.g., $8.5716 \\to 8.57$) to justify the 3 s.f. claim.", "source": "GLM 5.1 ③", "_id": "glm_3_43"}, {"question": "When interpreting a regression slope of, say, 1.04 for \"Spanish mark $s$ regressed on French mark $f$\", what must the verbal interpretation contain to score the mark?", "answer": "- Step 1: A **unit change** in the predictor: \"for each additional mark in French...\"\n- Step 2: The **direction and magnitude** of the response: \"...the predicted Spanish mark increases by approximately 1.04 marks.\"\n- Step 3: Use **context-specific units and variables** (\"French mark\", \"Spanish mark\", \"mark\") — not generic \"x increases y by 1.04\".\n\nA bare \"the gradient is 1.04\" gets zero — you must translate into the context.", "source": "Opus 4.7 ①", "_id": "opus_1_24"}, {"question": "Why might the regression intercept $a$ be *negative* even when the data values are all positive? (3 steps)", "answer": "- Step 1: $a = \\bar{s} - b\\bar{f}$. The sign depends on whether $b\\bar{f}$ exceeds $\\bar{s}$.\n- Step 2: If $b > 1$ and $\\bar{f}, \\bar{s}$ are of similar magnitude, then $b\\bar{f}$ can easily overshoot $\\bar{s}$, making $a < 0$.\n- Step 3: A negative intercept just means the *extrapolated* prediction at $f = 0$ would be below zero — but that's outside the data range, so it has no real-world meaning. Within the observed range the line still gives sensible positive predictions.\n\nTakeaway: the intercept is a mathematical anchor for the line, not a meaningful prediction unless $f = 0$ is inside the data range.", "source": "Opus 4.7 ①", "_id": "opus_1_23"}, {"question": "A simple exercise: Three independent attempts, each with success probability 0.7. Find $$P(\\text{at least one success})$$ and $$P(\\text{exactly one success})$$. (2 steps)", "answer": "- Step 1: $$P(\\text{at least one}) = 1 - P(\\text{all fail}) = 1 - 0.3^3 = 1 - 0.027 = 0.973$$. The complement method is always cleanest for \"at least one.\"\n- Step 2: $$P(\\text{exactly one}) = P(SFF) + P(FSF) + P(FFS) = 3 \\times (0.7 \\times 0.3^2) = 3 \\times 0.063 = 0.189$$. Each arrangement has one success and two failures; there are 3 such arrangements.\n\n\"At least one\" ≠ \"exactly one.\" The complement method gives \"at least one\" (which includes 1, 2, or 3 successes). For \"exactly one,\" you must enumerate the specific sequences.", "source": "GLM 5.1 ②", "_id": "glm_2_56"}, {"question": "What is the difference between the outlier fence rule $$Q_3 + 1.5 \\times \\text{IQR}$$ and the concept of \"unusual\" in a Normal distribution? Why can't you use a Normal-based rule for the Spanish marks in Q4? (2 steps)", "answer": "- Step 1: The fence rule is a non-parametric method — it uses the data's own quartiles and doesn't assume any distribution. The Normal \"unusual\" rule (e.g., beyond 2 standard deviations from the mean) assumes the data follow a Normal distribution.\n- Step 2: The Spanish marks (16, 24, 28, ..., 90) are clearly not Normally distributed — they're discrete, have a large outlier, and may be skewed. Using $$\\mu \\pm 2\\sigma$$ would be inappropriate. The fence rule works for any distribution because it's based on the actual data's spread (IQR).\n\nIn S1, always use the fence rule for outlier detection unless the question explicitly states the data are Normally distributed. The fence rule is robust to non-Normality.", "source": "GLM 5.1 ②", "_id": "glm_2_65"}, {"question": "Why must we always *explicitly* reject the root $$\\sigma = 0$$ (or any non-positive root) when solving for a standard deviation?", "answer": "A standard deviation is defined as a square root of variance, so $$\\sigma \\ge 0$$ by construction. $$\\sigma = 0$$ corresponds to a degenerate distribution (a point mass — no randomness), which contradicts the problem setup of a non-trivial normal. The marker expects an explicit one-line rejection: \"$$\\sigma > 0$$, so $$\\sigma = 2$$.\" This shows mathematical hygiene: you understand which roots are physical solutions vs algebraic artefacts.", "source": "Opus 4.7 ②", "_id": "opus_2_50"}, {"question": "Given $$P(B \\mid A) = 0.3$$ and $$P(A) = x$$, explain why $$P(A \\cap B) = 0.3x$$ rather than $$0.3y$$ or $$0.3$$. (2 steps)", "answer": "- Step 1: The definition of conditional probability is $$P(B \\mid A) = \\dfrac{P(A \\cap B)}{P(A)}$$. Rearranging multiplies the conditional probability by the **conditioning** event's probability, which is $$P(A) = x$$.\n- Step 2: Using $$y = P(B)$$ would confuse the direction of conditioning; $$P(B \\mid A)$$ restricts to the subset $$A$$, so its \"base\" probability is $$P(A)$$, not $$P(B)$$. Omitting $$x$$ entirely ignores the scaling effect of the subset size.", "source": "Kimi K2.6 ②", "_id": "kimi_2_24"}, {"question": "$$Y \\sim N(\\mu, \\sigma^2)$$, with $$2\\mu = 3\\sigma^2$$ and $$P(Y > \\tfrac{3}{2}\\mu) = 0.0668$$. Outline the simultaneous-equation strategy to find $$\\mu$$ and $$\\sigma$$. (3 steps)", "answer": "- Step 1: Standardise the probability: $$P\\left(Z > \\frac{(3/2)\\mu - \\mu}{\\sigma}\\right) = P(Z > \\mu/(2\\sigma)) = 0.0668$$, so $$\\Phi(\\mu/(2\\sigma)) = 0.9332$$. Lookup: $$\\mu/(2\\sigma) = 1.5$$, i.e. $$\\mu = 3\\sigma$$.\n- Step 2: Substitute into $$2\\mu = 3\\sigma^2$$: $$2(3\\sigma) = 3\\sigma^2 \\Rightarrow 3\\sigma^2 - 6\\sigma = 0 \\Rightarrow 3\\sigma(\\sigma - 2) = 0$$.\n- Step 3: Reject $$\\sigma = 0$$ (s.d. must be positive). So $$\\sigma = 2$$ and $$\\mu = 6$$.\n\nThe structure: standardisation gives one equation; the algebraic constraint gives the second; substitute, solve quadratic, reject non-physical root.", "source": "Opus 4.7 ②", "_id": "opus_2_49"}, {"question": "Why is the law of total probability — $$P(L) = P(L|Y12)P(Y12) + P(L|Y13)P(Y13)$$ — the natural way to extract unknowns from a tree diagram?", "answer": "A tree partitions the sample space into mutually exclusive paths (Y12-and-L, Y12-and-R, Y13-and-L, Y13-and-R). The probability of any non-leaf event (like \"left-handed\") is the sum of leaf probabilities along compatible paths. This is the law of total probability in tree form. Crucially, it expresses a single unknown ($$p$$) as the sum of products along each Y-branch reaching $$L$$, giving a linear equation that's straightforward to solve.", "source": "Opus 4.7 ②", "_id": "opus_2_55"}, {"question": "What is the variance transformation formula for $\\operatorname{Var}(aX + b)$, and why does the additive constant $b$ vanish while the multiplier $a$ gets squared? (3 steps)", "answer": "- Step 1: $$\\operatorname{Var}(aX + b) = a^2 \\operatorname{Var}(X)$$\n- Step 2: The additive constant $b$ vanishes because variance measures *spread* — shifting all values by the same amount doesn't change their distances from each other. Just like adding 32 to every Fahrenheit temperature doesn't change how spread out the temperatures are.\n- Step 3: The multiplier $a$ gets *squared* because variance is in *squared units*. If you double the scale, the standard deviation doubles, but the variance (which is $\\sigma^2$) quadruples. For example, $\\operatorname{Var}(13X - 6) = 169 \\operatorname{Var}(X)$, and the $-6$ contributes nothing.", "source": "GLM 5.1 ③", "_id": "glm_3_33"}, {"question": "Why is extrapolation less reliable than interpolation in regression analysis?", "answer": "- Step 1: Interpolation estimates within the observed data range ($24 \\le f \\le 68$), where the linear relationship is validated.  \n- Step 2: Extrapolation extends beyond the range, assuming the linear trend continues, which may not hold.  \n  Example: Estimating $s$ at $f = 18$ (outside range) vs $f = 55$ (inside range).\n- Step 3: Uncertainty increases with distance from the data cloud.  \n  Example: The relationship between French and Spanish marks might change for very low or high scores.\n\n[Optional: Interpolation has lower prediction error than extrapolation.]", "source": "Qwen 3 ①", "_id": "qwen_1_12"}, {"question": "Why does the mean get \"dragged\" toward the tail of a skewed distribution, while the median does not? (3 steps)", "answer": "- Step 1: The mean is a sum-weighted statistic — every value contributes proportionally to its size. Extreme values far out in a tail have outsized influence.\n- Step 2: The median is purely a *positional* statistic — only the rank of values matters, not their magnitudes. An outlier 1000 units away from the centre counts the same as one just past the median.\n- Step 3: So a long lower tail (negative skew) pulls the mean below the median; a long upper tail pulls the mean above. The median stays anchored at the middle of the count.", "source": "Opus 4.7 ①", "_id": "opus_1_5"}, {"question": "For $n = 11$ ordered values, where are $Q_1$ and $Q_3$ located, and why is no interpolation needed in this case?", "answer": "- Step 1: $Q_1$ position is $(n+1)/4 = 12/4 = 3$; $Q_3$ position is $3(n+1)/4 = 9$. Both are integers.\n- Step 2: An integer position means the quartile is exactly the value at that rank in the ordered list — no interpolation between two adjacent values needed.\n- Step 3: When positions are non-integer (e.g. $n=10$ gives $Q_1$ at position 2.75), you interpolate between the values at ranks 2 and 3. So $n = 11$ is a \"clean\" case.", "source": "Opus 4.7 ①", "_id": "opus_1_21"}, {"question": "An athlete qualifies (at least one throw $> 38.8$ m in 3 attempts). Find $P(\\text{qualified on 2nd throw with } X_2 > 44 \\mid \\text{qualifies})$. Why is this a conditional probability, and what is the critical nesting observation? (3 steps)", "answer": "- Step 1: This is conditional because the question says \"given that they qualified\" — you're restricting the sample space to only those outcomes where qualification occurs. The formula is $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$\n- Step 2: The critical nesting observation: $X > 44$ implies $X > 38.8$. So \"throw 2 exceeds 44\" is *already* a qualifying event. The joint event \"throw 1 fails AND throw 2 exceeds 44\" is automatically a subset of \"qualifies.\" No double-counting needed.\n- Step 3: $$P(F_1 \\cap [X_2 > 44]) = 0.3821 \\times 0.1587 = 0.06064$$ $$P(\\text{2nd throw} > 44 \\mid \\text{qualifies}) = \\frac{0.06064}{0.9442} = 0.0642$$ The common mistake is returning $0.06064$ (the joint) without dividing by $P(\\text{qualifies})$.", "source": "GLM 5.1 ③", "_id": "glm_3_24"}, {"question": "For a symmetric interval around the mean of a normal variable, $$P(\\mu - 2k < X < \\mu + 2k) = 0.6$$, what is the standard manipulation to find $$k$$? (3 steps)", "answer": "- Step 1: Standardise: $$P\\left(-\\frac{2k}{\\sigma} < Z < \\frac{2k}{\\sigma}\\right) = 0.6$$.\n- Step 2: By symmetry, $$P(|Z| < z) = 2\\Phi(z) - 1$$, so $$2\\Phi(2k/\\sigma) - 1 = 0.6$$, giving $$\\Phi(2k/\\sigma) = 0.8$$.\n- Step 3: Inverse-lookup: $$\\Phi^{-1}(0.8) \\approx 0.8416$$, so $$2k/\\sigma = 0.8416$$ and solve for $$k$$.\n\nThe two-tail-to-one-tail conversion $$\\Phi(z) = (1 + c)/2$$ where $$c$$ is the central probability is the critical move.", "source": "Opus 4.7 ②", "_id": "opus_2_46"}, {"question": "Which of these are key $$\\Phi$$ values worth memorising for S1, and why does memorising them save time? $$\\Phi(0.5)$$, $$\\Phi(1.0)$$, $$\\Phi(1.5)$$, $$\\Phi(1.645)$$, $$\\Phi(1.96)$$, $$\\Phi(2.0)$$. (2 steps)", "answer": "- Step 1: The most frequently used values are: $$\\Phi(1.0) = 0.8413$$, $$\\Phi(1.5) = 0.9332$$, $$\\Phi(1.645) = 0.95$$, $$\\Phi(1.96) = 0.975$$. Also useful: $$\\Phi(0.84) \\approx 0.80$$ and $$\\Phi(1.28) \\approx 0.90$$.\n- Step 2: Memorising these saves ~30 seconds per Normal question because you skip the table lookup. With 2–3 Normal sub-parts per paper, that's ~90 seconds total — significant when the time budget is tight (~1.2 min/mark).\n\n+ In Q8(b), recognising that $$0.9332 = \\Phi(1.5)$$ immediately gives you $$z = 1.5$$ without searching the table. In Q5, knowing $$\\Phi(1.0) = 0.8413$$ is used in the standardisation.", "source": "GLM 5.1 ①", "_id": "glm_1_46"}, {"question": "What is the time budget for a 75-mark, 90-minute S1 paper, and what specific time-saving tip helps with Normal distribution questions? (2 steps)", "answer": "- Step 1: The budget is approximately 1.2 minutes per mark. Rough allocation: Q1 ≈ 10 min, Q2 ≈ 14 min, Q3 ≈ 10 min, Q4 ≈ 14 min, Q5 ≈ 10 min, Q6 ≈ 11 min, Q7 ≈ 12 min, Q8 ≈ 11 min. Total ≈ 92 min — tight.\n- Step 2: Memorising four key $\\Phi$ values ($\\Phi(1) = 0.8413$, $\\Phi(1.5) = 0.9332$, $\\Phi(1.645) = 0.95$, $\\Phi(1.96) = 0.975$) saves ~30 seconds per Normal lookup. Across 2–3 Normal sub-parts, that's ~90 seconds reclaimed — enough to finish the paper.", "source": "GLM 5.1 ③", "_id": "glm_3_54"}, {"question": "When data $x, y$ are both transformed by positive linear coding to $u, v$, why does the correlation coefficient $r$ stay the same? (3 steps)", "answer": "- Step 1: Write $u = a + bx$ and $v = c + dy$. Then $u - \\bar{u} = b(x - \\bar{x})$ and $v - \\bar{v} = d(y - \\bar{y})$ — shifts cancel because they affect both the value and the mean.\n- Step 2: So $S_{uv} = bd \\cdot S_{xy}$, $S_{uu} = b^2 S_{xx}$, $S_{vv} = d^2 S_{yy}$.\n- Step 3: $$r_{uv} = \\frac{bd \\cdot S_{xy}}{\\sqrt{b^2 d^2 S_{xx} S_{yy}}} = \\frac{bd}{|bd|} \\cdot r_{xy}.$$ If $b, d > 0$, the factor is $+1$ and $r$ is unchanged. If one is negative, the sign of $r$ flips.\n\nTakeaway: correlation is a **shape** property — translations and positive scalings preserve shape; negative scalings reflect it.", "source": "Opus 4.7 ①", "_id": "opus_1_12"}, {"question": "Why must \"given that they qualified\" appear as a **denominator** in the discus Q5(b) calculation, and what is the full structure of the answer? (3 steps)", "answer": "- Step 1: \"Given that they qualified\" is the conditioning event $Q$. By the conditional formula, $$P(\\text{2nd throw} > 44 | Q) = \\frac{P(\\text{event} \\cap Q)}{P(Q)}.$$\n- Step 2: The event \"qualified on 2nd throw with > 44m\" is a subset of \"qualified\" (it implies qualification), so the intersection just equals the event itself: $$P(F_1 \\cap [X_2 > 44]) = 0.3821 \\times 0.1587.$$\n- Step 3: Divide by $P(Q) = 1 - 0.3821^3$. Without dividing, you'd be reporting the joint probability — about 6% — not the conditional roughly 6.4%.\n\nTakeaway: conditioning narrows the sample space; the division re-normalises probability over the smaller universe.", "source": "Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "Conceptually, why does the product moment correlation coefficient $r = S_{xy}/\\sqrt{S_{xx} S_{yy}}$ always lie between $-1$ and $+1$? (3 steps)", "answer": "- Step 1: $S_{xy} = \\sum(x-\\bar{x})(y-\\bar{y})$ measures whether $x$ and $y$ tend to move *together* (positive products dominate) or *oppositely* (negative products dominate).\n- Step 2: The denominator $\\sqrt{S_{xx} S_{yy}}$ is the geometric mean of the two spreads — it normalises by how big the deviations *could* be.\n- Step 3: By the Cauchy-Schwarz inequality, $$|S_{xy}| \\le \\sqrt{S_{xx} S_{yy}},$$ so $|r| \\le 1$. Equality holds only when $y$ is an exact linear function of $x$.\n\nTakeaway: $r$ is a \"scaled\" covariance — same direction but bounded by ±1 to be unit-free and comparable.", "source": "Opus 4.7 ①", "_id": "opus_1_9"}, {"question": "A student scores $$f = 55$$ on the French test, and another scores $$f = 18$$. The data range for French is $$24 \\le f \\le 68$$. Which regression estimate is more reliable, and what terminology must you use? (3 steps)", "answer": "- Step 1: $$f = 55$$ lies within the observed data range $$[24, 68]$$, so the estimate is **interpolation** — predicting within the range of observed data.\n- Step 2: $$f = 18$$ lies outside the observed data range (below 24), so the estimate is **extrapolation** — predicting beyond the range of observed data.\n- Step 3: The interpolation estimate ($$f = 55$$) is more reliable because the linear relationship has been verified within the data range but is not guaranteed to hold outside it. You must use the words \"interpolation\" and \"extrapolation\" and state the data range explicitly.\n\nExtrapolation is risky because the relationship might be nonlinear outside the observed range. For $$f = 18$$, the model predicts $$s = -5.72 + 1.04 \\times 18 = 13.0$$ — a negative Spanish mark isn't possible, which already shows the model breaks down for low French scores.", "source": "GLM 5.1 ②", "_id": "glm_2_24"}, {"question": "Why does the variance formula $$\\operatorname{Var}(X) = E(X^2) - (E(X))^2$$ contain a minus sign, and what does this quantity represent conceptually? (3 steps)", "answer": "- Step 1: $$E(X^2)$$ is the mean of the squares, which is always non-negative and generally larger than the squared mean because squaring amplifies larger deviations.\n- Step 2: Subtracting $$(E(X))^2$$ removes the \"location\" contribution, isolating the average squared **deviation** from the centre. This is the definitional essence of variance: expected squared distance from the mean.\n+ The result must be non-negative; if you ever obtain a negative value, you have made an arithmetic error (this serves as a useful check).\n- Step 3: Conceptually, variance quantifies the \"moment of inertia\" of the probability distribution about its mean—the heavier the tails or the more dispersed the mass, the larger the variance.", "source": "Kimi K2.6 ②", "_id": "kimi_2_53"}, {"question": "To standardise a Normal variable $X \\sim N(\\mu, \\sigma^2)$, what transformation do you apply and why? What does the resulting $Z$-score tell you conceptually? (2 steps)", "answer": "- Step 1: $$Z = \\frac{X - \\mu}{\\sigma} \\sim N(0, 1)$$ You subtract the mean (centring) and divide by the standard deviation (rescaling). This maps any Normal distribution to the *standard* Normal.\n- Step 2: The $Z$-score tells you how many standard deviations $X$ is from the mean. A $Z$-score of $-0.3$ means the value is 0.3 standard deviations *below* the mean. This makes values from different Normal distributions comparable.", "source": "GLM 5.1 ③", "_id": "glm_3_21"}, {"question": "Given $$P(A) = x$$, $$P(B) = y$$, and $$P(B \\mid A) = 0.3$$, write down an expression for $$P(A \\cap B)$$. Why is it $$0.3x$$ and not $$0.3y$$? (3 steps)", "answer": "- Step 1: The conditional probability formula rearranged gives $$P(A \\cap B) = P(B \\mid A) \\times P(A)$$. Substituting: $$P(A \\cap B) = 0.3 \\times x = 0.3x$$.\n- Step 2: It is $$0.3x$$ (not $$0.3y$$) because the conditioning event is $$A$$. The notation $$P(B \\mid A)$$ means \"probability of $$B$$ **given** $$A$$\", so you multiply by $$P(A)$$ — the probability of the event that is **given**.\n- Step 3: If the condition were $$P(A \\mid B) = 0.3$$ instead, then $$P(A \\cap B) = 0.3 \\times P(B) = 0.3y$$. The direction of conditioning determines which probability goes in the multiplier.\n\n+ Common error: writing $$P(A \\cap B) = 0.3y$$ because the 0.3 is \"about $$B$$\". But the formula is $$P(B \\mid A) \\cdot P(A)$$ — you always multiply by the probability of the event after the vertical bar.", "source": "GLM 5.1 ①", "_id": "glm_1_27"}, {"question": "The cumulative distribution function $$F(x)$$ of a discrete random variable $$X$$ takes values $$F(1), F(2), F(3), F(4)$$. What must be true about $$F(4)$$, and why? (2 steps)", "answer": "- Step 1: $$F(4) = 1$$. The CDF at the maximum value of $$X$$ must equal 1, because $$F(x) = P(X \\le x)$$, and at the largest possible value, all probability has been accumulated.\n- Step 2: This property is used to find unknown constants in the CDF. For example, if $$F(4) = \\frac{k+4}{8}$$, then setting $$\\frac{k+4}{8} = 1$$ gives $$k + 4 = 8$$, so $$k = 4$$.\n\n+ More generally, for any discrete RV, $$F(x_{\\max}) = 1$$ and $$F(x_{\\min-1}) = 0$$ (or equivalently, the CDF starts at 0 and ends at 1).", "source": "GLM 5.1 ①", "_id": "glm_1_32"}, {"question": "A student computes $$P(\\text{Y12} \\cap R) = \\frac{7}{20}$$ and writes this as the final answer for $$P(\\text{Y12} \\mid R)$$. What is the conceptual error, and what is the correct answer? (3 steps)", "answer": "- Step 1: The error is confusing the **joint** probability $$P(\\text{Y12} \\cap R)$$ with the **conditional** probability $$P(\\text{Y12} \\mid R)$$. The joint is \"both events happen simultaneously\"; the conditional is \"Y12 happens, restricted to the sub-population where R has already happened.\"\n- Step 2: To convert joint to conditional, divide by $$P(R)$$: $$P(\\text{Y12} \\mid R) = \\frac{P(\\text{Y12} \\cap R)}{P(R)} = \\frac{7/20}{89/100} = \\frac{7}{20} \\times \\frac{100}{89} = \\frac{700}{1780}$$.\n- Step 3: Simplify: $$\\frac{700}{1780} = \\frac{35}{89} \\approx 0.393$$. Note that $$\\frac{7}{20} = 0.35$$, which is different from 0.393 — the conditional probability is larger because we're restricting to the sub-population of right-handed students, where Year 12 students are a bigger proportion.\n\nThink of it this way: $$P(\\text{Y12} \\cap R)$$ is a fraction of ALL students; $$P(\\text{Y12} \\mid R)$$ is a fraction of RIGHT-HANDED students only. The denominator shrinks, so the fraction can change.", "source": "GLM 5.1 ②", "_id": "glm_2_19"}, {"question": "Explain conceptually why $$\\operatorname{Var}(aX + b) = a^2 \\operatorname{Var}(X)$$, with no dependence on $$b$$. Use the idea of spread around the mean. (3 steps)", "answer": "- Step 1: Variance measures average squared deviation from the mean: $$\\operatorname{Var}(X) = E[(X - \\mu)^2]$$. Adding a constant $$b$$ shifts both the variable and its mean by $$b$$, so the deviations $$(X+b) - (\\mu+b) = X - \\mu$$ remain identical.\n- Step 2: Multiplying by $$a$$ scales every deviation by $$a$$. The squared deviations therefore scale by $$a^2$$, because $$(aX - a\\mu)^2 = a^2(X-\\mu)^2$$.\n+ For example, doubling every data point doubles its spread, but the squared spread quadruples.\n- Step 3: Taking expectations preserves the $$a^2$$ factor, giving $$\\operatorname{Var}(aX+b) = a^2\\operatorname{Var}(X)$$. The additive constant $$b$$ vanishes because it does not affect distances between observations.", "source": "Kimi K2.6 ②", "_id": "kimi_2_32"}, {"question": "On a histogram, the area of each bar equals the frequency of that class. Given that, what is the formula for frequency density, and why does the $y$-axis show frequency density rather than frequency? (2 steps)", "answer": "- Step 1: The formula is $$\\text{Frequency Density} = \\frac{\\text{Frequency}}{\\text{Class Width}}$$. This rearranges from the area principle: if area = frequency, and the bar is a rectangle with width = class width and height = frequency density, then $$\\text{Width} \\times \\text{Height} = \\text{Frequency}$$, giving height = frequency / width.\n- Step 2: The $y$-axis must show frequency density (not raw frequency) because classes have different widths. If the $y$-axis showed frequency, a wide class with few values would get an unfairly tall bar. Frequency density normalises by width so that the *visual area* correctly represents how many data points sit in each class.\n\nThink of it like population density: a large country with few people should look sparse, not crowded.", "source": "GLM 5.1 ③", "_id": "glm_3_0"}, {"question": "In Q5(b), the event \"throw 2 exceeds 44 m\" is a subset of \"throw 2 succeeds (exceeds 38.8 m).\" What would go wrong if you treated these as separate events and multiplied their probabilities? (2 steps)", "answer": "- Step 1: If you treated \"$$X_2 > 38.8$$\" and \"$$X_2 > 44$$\" as independent events and multiplied, you'd compute $$P(X_2 > 38.8) \\times P(X_2 > 44) = 0.6179 \\times 0.1587 = 0.0981$$, which is wrong.\n- Step 2: These events are NOT independent — they refer to the SAME throw. In fact, $$P(X_2 > 44 \\mid X_2 > 38.8) = \\frac{P(X_2 > 44)}{P(X_2 > 38.8)} = \\frac{0.1587}{0.6179} = 0.2568$$, which is not equal to $$P(X_2 > 44) = 0.1587$$. The correct approach: since $$X > 44 \\Rightarrow X > 38.8$$, the event \"throw 2 exceeds 44\" already implies \"throw 2 qualifies.\" You only need $$P(F_1) \\times P(X_2 > 44)$$.\n\nDouble-counting occurs when you decompose an event into overlapping pieces and multiply their probabilities as if they were independent. Always check: are the events referring to the same random variable? If so, they're dependent.", "source": "GLM 5.1 ②", "_id": "glm_2_44"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "On a histogram of grouped data, the y-axis shows frequency density rather than frequency. Why can't we just plot frequency directly on the y-axis, and what does the area of each bar represent? (2 steps)", "answer": "- Step 1: If we plotted frequency directly, bars for wide classes would look the same height as bars for narrow classes with the same frequency — visually misleading because the wide class spreads its count over a larger range. Frequency density $$= \\frac{\\text{frequency}}{\\text{class width}}$$ corrects for this: it measures how \"packed\" the data are per unit of the x-axis.\n- Step 2: The **area** of each bar (height × width = frequency density × class width) equals the **frequency** of that class. This is the fundamental histogram property: area ∝ count, not height ∝ count.\n\nThink of it like population density: a tall narrow bar and a short wide bar can have the same area (same number of people), but the density tells you how crowded each region is.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": true}, {"question": "A histogram bar covers the class $$17 \\le h < 25$$ and has a frequency density of 5. What is the frequency for this class, and what would happen to the frequency if the class width doubled but the frequency density stayed the same? (2 steps)", "answer": "- Step 1: Frequency $$= \\text{fd} \\times \\text{class width} = 5 \\times (25 - 17) = 5 \\times 8 = 40$$. The area of the bar is 40, which equals the frequency.\n- Step 2: If the class width doubled to 16 but fd remained 5, the frequency would become $$5 \\times 16 = 80$$ — double the original. This makes sense: the same density spread over twice the range contains twice as many observations.\n\nKey insight: on a histogram, you read off frequency density from the y-axis, but you must multiply by class width to recover the actual frequency. Never read frequency directly from the height unless all class widths are equal.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "After computing frequencies for all classes in a histogram question, what single arithmetic check should you always perform before proceeding, and why? (1 step)", "answer": "- Step 1: Sum all the frequencies and verify they equal the stated total $$n$$. For example, if the problem says there are 408 plants, check that $$32 + 152 + 120 + 64 + 40 = 408$$. If the sum is off, you've made an error in at least one frequency-density-to-frequency conversion, and every subsequent answer (median, probability) will be wrong.\n\nThis is a zero-cost sanity check that takes 10 seconds and can save an entire question.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "To estimate the median from grouped data, you use the formula $$L + \\frac{(n/2) - F_{<}}{f_{\\text{class}}} \\times w$$. Explain what each of the four quantities $$L$$, $$F_{<}$$, $$f_{\\text{class}}$$, and $$w$$ represents, and why you need cumulative frequency to identify the median class. (3 steps)", "answer": "- Step 1: $$L$$ = the **lower boundary** of the median class (the class containing the $$(n/2)$$th value). $$w$$ = the **class width** of that class. These describe the \"container\" the median sits in.\n- Step 2: $$F_{<}$$ = the **cumulative frequency of all classes below** the median class. It tells you how many values come before this class starts. $$f_{\\text{class}}$$ = the **frequency within the median class itself**. Together, they tell you how far into the class the median sits.\n- Step 3: You need cumulative frequency because the median position $$n/2$$ might fall in any class — you can't tell from individual class frequencies alone. You accumulate until you cross $$n/2$$: the class where the cumulative frequency first reaches or exceeds $$n/2$$ is the median class. The fraction $$\\frac{(n/2) - F_{<}}{f_{\\text{class}}}$$ is the proportion of the way through that class the median lies.\n\nThe formula linearly interpolates within the median class, assuming values are uniformly distributed across its width.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": true}, {"question": "For a dataset, the mean is 13.2 and the median is approximately 13.3. Is the data positively skewed, negatively skewed, or symmetric? Explain the reasoning. (2 steps)", "answer": "- Step 1: Compare mean and median: mean $$= 13.2 < 13.3 \\approx$$ median. Since the mean is less than the median, the data are **negatively skewed** (left-skewed).\n- Step 2: The intuition: in a negatively skewed distribution, a few unusually low values pull the mean down away from the median, but they don't affect the median as much (the median is resistant to outliers). So mean $$<$$ median signals a left tail.\n\n+ Positive skew: mean $$>$$ median (right tail pulls mean up).\n+ Symmetric: mean $$\\approx$$ median.\n\nExam requirement: you must state **both** the direction of skew **and** the comparison (e.g., \"negatively skewed because mean < median\"). Just writing \"negative\" without the reason loses the mark.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "A histogram has a class $$[5, 9)$$ with frequency 32. You need to count how many observations fall in the subrange $$[8, 9)$$. What assumption do you make, and how do you calculate the count? (2 steps)", "answer": "- Step 1: You assume values are **uniformly distributed within the class** — every sub-interval of the same width contains the same number of observations. This is the standard assumption for grouped data interpolation.\n- Step 2: The subrange $$[8, 9)$$ has width 1 out of the full class width 4. So the proportion of the class it contains is $$\\frac{1}{4}$$, and the count is $$\\frac{1}{4} \\times 32 = 8$$.\n\n+ General formula: count in subrange $$= \\frac{\\text{subrange width}}{\\text{class width}} \\times \\text{class frequency}$$.\n\nThis is exactly what Q1(d) requires when the boundaries 8 cm and 14 cm cut through the middle of existing classes.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": true}, {"question": "Two plants are selected at random without replacement from 408 plants. If 220 of them fall in a certain height range, what is the probability that both selected plants fall in that range? Why does the denominator change on the second pick? (3 steps)", "answer": "- Step 1: First pick: $$P(\\text{first in range}) = \\frac{220}{408}$$. There are 220 favourable plants out of 408 total.\n- Step 2: Second pick: since the first plant was not replaced, there are now 219 favourable plants remaining out of 407 total. So $$P(\\text{second in range} \\mid \\text{first in range}) = \\frac{219}{407}$$.\n- Step 3: By the multiplication rule, $$P(\\text{both in range}) = \\frac{220}{408} \\times \\frac{219}{407}$$.\n\n+ Common error: writing $$\\left(\\frac{220}{408}\\right)^2$$, which assumes replacement. The problem says \"chosen at random\" from a finite population without replacement, so the denominator must drop.\n\nThe key signal: \"without replacement\" means the composition of the population changes after each draw.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "The summary statistics for 12 temperature values in °F are $$\\sum x = 862$$ and $$\\sum x^2 = 62{,}802$$. Write down the formula for $$S_{xx}$$ and explain why you can't compute the standard deviation from $$\\sum x$$ alone. (2 steps)", "answer": "- Step 1: $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$. You need both $$\\sum x^2$$ (the sum of squares) and $$(\\sum x)^2$$ (the square of the sum) to compute it.\n- Step 2: You can't get the standard deviation from $$\\sum x$$ alone because $$\\sum x$$ only tells you the total (and hence the mean), but says nothing about how spread out the values are. Two datasets with the same mean can have wildly different spreads. You need $$\\sum x^2$$ to measure variability: $$\\sigma = \\sqrt{S_{xx}/n}$$.\n\n+ Intuition: $$\\sum x^2$$ captures both the location and the spread; subtracting $$(\\sum x)^2/n$$ \"centers\" it, leaving only the spread component.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": true}, {"question": "The formula for the population standard deviation used in S1 is $$\\sigma_x = \\sqrt{S_{xx}/n}$$, which uses denominator $$n$$. What would change if you used denominator $$n-1$$ instead, and which one does Edexcel S1 require? (2 steps)", "answer": "- Step 1: Using denominator $$n-1$$ gives the **sample** standard deviation $$s$$, which is an unbiased estimator of the population standard deviation. Using denominator $$n$$ gives the **population** standard deviation $$\\sigma$$, which is slightly smaller (dividing by a larger number).\n- Step 2: Edexcel S1 uses the **population** formula with denominator $$n$$ throughout. If you use $$n-1$$, your answer will be slightly too large and will not match the mark scheme.\n\n+ Quick check: for $$n = 12$$, $$S_{xx} = 881.667$$: $$\\sigma = \\sqrt{881.667/12} = 8.57$$, but $$s = \\sqrt{881.667/11} = 8.95$$. These are noticeably different — the wrong denominator costs marks.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "The product moment correlation coefficient is given by $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} \\cdot S_{yy}}}$$. Explain what $$r$$ measures and why it is divided by $$\\sqrt{S_{xx} \\cdot S_{yy}}$$ rather than just $$S_{xy}$$ alone. (2 steps)", "answer": "- Step 1: $$r$$ measures the **strength and direction of linear association** between two variables. It ranges from $$-1$$ (perfect negative linear) to $$+1$$ (perfect positive linear), with 0 meaning no linear correlation.\n- Step 2: $$S_{xy}$$ alone depends on the scales of $$x$$ and $$y$$ — if you measured temperature in millidegrees instead of degrees, $$S_{xy}$$ would increase by a factor of 1000, even though the relationship hasn't changed. Dividing by $$\\sqrt{S_{xx} \\cdot S_{yy}}$$ **normalises** $$S_{xy}$$, removing the effect of scale so that $$r$$ is always between $$-1$$ and $$+1$$ regardless of units.\n\n+ Think of it as \"covariance divided by the product of standard deviations\" — standardising both variables to unit-free z-scores before measuring their agreement.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": true}, {"question": "Temperatures are converted from °F to °C using $$c = \\frac{5}{9}(f - 32)$$. If the mean in °F is $$\\bar{f}$$, what is the mean in °C? Walk through why the formula applies to the mean. (2 steps)", "answer": "- Step 1: The coding rule states: if $$u = a + bx$$, then $$\\bar{u} = a + b\\bar{x}$$. Here, $$c = -\\frac{5}{9} \\times 32 + \\frac{5}{9} f$$, so $$a = -\\frac{160}{9}$$ and $$b = \\frac{5}{9}$$.\n- Step 2: Therefore $$\\bar{c} = \\frac{5}{9}(\\bar{f} - 32) = \\frac{5}{9}\\bar{f} - \\frac{160}{9}$$. The mean transforms by the same linear rule as each individual value because the mean is a linear operator: averaging commutes with addition and multiplication.\n\n+ Numerically: if $$\\bar{f} = 71.833$$, then $$\\bar{c} = \\frac{5}{9}(71.833 - 32) = \\frac{5}{9} \\times 39.833 \\approx 22.1$$ °C.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "Temperatures are converted from °F to °C using $$c = \\frac{5}{9}(f - 32)$$. The standard deviation in °F is 8.57. What is the standard deviation in °C, and why does the \"−32\" disappear? (3 steps)", "answer": "- Step 1: The coding rule for standard deviation: if $$u = a + bx$$, then $$\\sigma_u = |b| \\sigma_x$$. The additive constant $$a$$ does **not** appear.\n- Step 2: Why? Adding a constant $$a$$ to every value shifts the entire distribution left or right but does not change how spread out the values are. Standard deviation measures spread, not location, so shifting doesn't affect it. Only the multiplicative factor $$b$$ stretches or compresses the distribution, scaling the spread by $$|b|$$.\n- Step 3: Here $$b = \\frac{5}{9}$$, so $$\\sigma_c = \\frac{5}{9} \\times 8.57 \\approx 4.76$$ °C. The $$-32$$ is an additive shift and is ignored for spread.\n\n+ Common error: applying $$-32$$ to the s.d., e.g., $$\\sigma_c = \\frac{5}{9}(8.57 - 32)$$. This is wrong — you'd get a negative number, which is impossible for a standard deviation.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "If the PMCC between temperatures in °F is $$r_{x,y} = 0.849$$, what is the PMCC between the same temperatures converted to °C? Explain why. (2 steps)", "answer": "- Step 1: The PMCC between the converted variables is also $$r_{u,v} = 0.849$$. It is **invariant** under linear coding $$u = a + bx$$, $$v = c + dy$$ provided both multipliers $$b$$ and $$d$$ are positive.\n- Step 2: The reason: PMCC measures the strength of **linear** association. A linear transformation of either variable doesn't change whether the points lie on a straight line — it just rescales and shifts the axes. The correlation structure is preserved. However, if one multiplier were negative, the sign of $$r$$ would flip (the relationship would reverse direction but keep the same strength).\n\n+ Exam requirement: state **both** the value (0.849) **and** the reason (\"PMCC is invariant under positive linear coding\"). Omitting the reason loses 1 of 2 marks.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "On a probability tree, the first split is Year 12 (probability $$p$$) vs Year 13 (probability $$1-p$$). The second split from Year 12 is Left-handed ($$\\frac{1}{8}$$) vs Right-handed. What is the probability on the Right-handed branch, and why? (2 steps)", "answer": "- Step 1: The probability on the Right-handed branch from Year 12 is $$1 - \\frac{1}{8} = \\frac{7}{8}$$. Similarly, from Year 13 with Left-handed probability $$\\frac{1}{10}$$, the Right-handed branch gets $$1 - \\frac{1}{10} = \\frac{9}{10}$$.\n- Step 2: At every split in a probability tree, the branches are **mutually exclusive and exhaustive** — they partition the probability space. So the probabilities on all branches from a single node must sum to 1. If one branch has probability $$q$$, the other has $$1 - q$$.\n\nThis is the most basic tree-diagram rule, and getting it wrong cascades through every subsequent calculation.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "A probability tree has two stages: Year 12/13 (probabilities $$p$$ and $$1-p$$), then Left/Right-handed. Given that $$P(L) = 0.11$$, with $$P(L \\mid \\text{Y12}) = \\frac{1}{8}$$ and $$P(L \\mid \\text{Y13}) = \\frac{1}{10}$$, explain how to set up an equation for $$p$$. (3 steps)", "answer": "- Step 1: By the law of total probability, the overall probability of being left-handed is the weighted sum of the conditional probabilities: $$P(L) = P(\\text{Y12}) \\cdot P(L \\mid \\text{Y12}) + P(\\text{Y13}) \\cdot P(L \\mid \\text{Y13})$$.\n- Step 2: Substitute the known values: $$0.11 = p \\cdot \\frac{1}{8}
