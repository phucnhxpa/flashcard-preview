$$\\bar{u} = a + b\\bar{x}$$ (both constant and multiplier affect the mean)\n+ $$\\sigma_u = |b| \\cdot \\sigma_x$$ (only the multiplier affects s.d.)\n+ $$\\text{Var}(u) = b^2 \\cdot \\text{Var}(x)$$ (multiplier squared; additive constant vanishes)\n\nThe mnemonic: \"Additive shifts move the centre but don't stretch the spread; multiplicative scaling stretches the spread (and squares for variance).\"", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": true}, {"question": "When asked to state the PMCC after linear coding on both variables (e.g., $$u = \\frac{5}{9}(x-32)$$, $$v = \\frac{5}{9}(y-32)$$), what two things must your answer contain? (2 steps)", "answer": "- Step 1: State the **value**: $$r_{u,v} = r_{x,y} = 0.849$$. The PMCC is invariant under linear coding (it doesn't change).\n- Step 2: State the **reason**: \"PMCC is invariant under linear coding\" or \"linear transformation does not affect the correlation.\" Without the reason, you lose 1 of 2 marks.\n\nThe PMCC measures the *strength and direction of linear relationship*, which is unchanged by rescaling and shifting — just as the slope of a line doesn't change if you change the units on both axes.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "Under what condition does the PMCC change sign after linear coding? Give a concrete example. (2 steps)", "answer": "- Step 1: The PMCC changes sign if exactly one of the two coding multipliers is negative. If $$u = a + bx$$ and $$v = c + dy$$, then $$r_{u,v} = \\text{sign}(b \\cdot d) \\cdot r_{x,y}$$.\n- Step 2: Example: if $$u = -2x$$ and $$v = 3y$$, then $$b = -2$$, $$d = 3$$, so $$b \\cdot d < 0$$, giving $$r_{u,v} = -r_{x,y}$$. The correlation reverses direction because one variable is reflected.\n\nIn Q2(d), both multipliers were $$5/9 > 0$$, so $$r$$ kept its sign. Always check the signs of both multipliers.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": true}, {"question": "When completing a probability tree diagram, what must be true about the branches at each split, and how do you find missing branch probabilities? (2 steps)", "answer": "- Step 1: At each split, the probabilities on all branches must **sum to 1**. This is the Law of Total Probability for that node.\n- Step 2: If one branch probability is given (e.g., $$P(L \\mid \\text{Y12}) = \\frac{1}{8}$$), the complementary branch is $$P(R \\mid \\text{Y12}) = 1 - \\frac{1}{8} = \\frac{7}{8}$$.\n\nIn Q3(a): the missing branches were $$1 - \\frac{1}{8} = \\frac{7}{8}$$ and $$1 - \\frac{1}{10} = \\frac{9}{10}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "When a question says \"The probability that a student is left-handed is 0.11\", how do you translate this into an equation from the tree diagram? (2 steps)", "answer": "- Step 1: Recognise this as $$P(L)$$, the **total** (marginal) probability of being left-handed — it includes both Year 12 and Year 13 students.\n- Step 2: Use the tree's Law of Total Probability: $$P(L) = P(\\text{Y12}) \\cdot P(L \\mid \\text{Y12}) + P(\\text{Y13}) \\cdot P(L \\mid \\text{Y13}) = p \\cdot \\frac{1}{8} + (1-p) \\cdot \\frac{1}{10} = 0.11$$.\n\nThis gives you an equation in $$p$$ that you can solve.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "When solving a probability equation with fractions like $$p \\cdot \\frac{1}{8} + (1-p) \\cdot \\frac{1}{10} = 0.11$$, what algebraic trick clears the fractions efficiently? (3 steps)", "answer": "- Step 1: Identify the denominators (8 and 10) and find their least common multiple: $$\\text{lcm}(8, 10) = 40$$. But since the RHS is 0.11 (a decimal), multiply by 80 (which is $$\\text{lcm}(8,10) \\times 2$$) to also clear the decimal: $$0.11 \\times 80 = 8.8$$.\n- Step 2: Multiply every term by 80: $$80 \\cdot \\frac{p}{8} + 80 \\cdot \\frac{(1-p)}{10} = 0.11 \\times 80$$, giving $$10p + 8(1-p) = 8.8$$.\n- Step 3: Expand and solve: $$10p + 8 - 8p = 8.8$$, so $$2p = 0.8$$, giving $$p = 0.4$$.\n\nMultiplying through by a common denominator is faster and less error-prone than working with fractions throughout.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "(S1 Jan 2024 Q3d — CRITICAL) What is the trigger phrase in a question that should make you immediately write down the conditional probability formula? What formula do you write? (2 steps)", "answer": "- Step 1: The trigger phrase is **\"Given that …\"** (or equivalently \"if …\", \"assuming …\"). Whenever you see this, the question is asking for a *conditional* probability, not a joint probability.\n- Step 2: Immediately write on the page: $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$. The conditioning event $$B$$ (the thing after \"given that\") always goes in the **denominator**.\n\nThis was Phuc's single biggest error on the paper: writing $$P(\\text{Y12} \\mid R) = p \\times \\frac{7}{8}$$ (which is $$P(\\text{Y12} \\cap R)$$, the numerator only) instead of dividing by $$P(R)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "What is the critical difference between $$P(A \\cap B)$$ and $$P(A \\mid B)$$? Explain why confusing them gives a numerically different answer. (3 steps)", "answer": "- Step 1: $$P(A \\cap B)$$ is the **joint** probability — the chance that both $$A$$ and $$B$$ happen simultaneously. It's a proportion of the *entire* sample space.\n- Step 2: $$P(A \\mid B)$$ is the **conditional** probability — the chance that $$A$$ happens *restricted to the world where $$B$$ has already happened*. It's a proportion of $$P(B)$$ only.\n- Step 3: Since $$P(A \\cap B) = P(A \\mid B) \\times P(B)$$ and $$P(B) < 1$$ (usually), we have $$P(A \\mid B) > P(A \\cap B)$$. The conditional probability is always larger (or equal) because you're dividing by a number less than 1.\n\nIn Q3(d): $$P(\\text{Y12} \\cap R) = \\frac{7}{20} = 0.35$$ but $$P(\\text{Y12} \\mid R) = \\frac{35}{89} \\approx 0.393$$. The conditional is larger because we're restricting to right-handed students only.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": true}, {"question": "When computing $$P(B)$$ for the denominator of a conditional probability from a tree diagram, what two routes can you use, and why should you compute both? (3 steps)", "answer": "- Step 1: **Route 1 (complement):** $$P(R) = 1 - P(L)$$. If the total probability of the complementary event is known (e.g., $$P(L) = 0.11$$), this is instant: $$P(R) = 1 - 0.11 = 0.89$$.\n- Step 2: **Route 2 (direct from tree):** Sum all branches leading to $$R$$: $$P(R) = P(\\text{Y12}) \\cdot P(R \\mid \\text{Y12}) + P(\\text{Y13}) \\cdot P(R \\mid \\text{Y13})$$.\n- Step 3: Both routes must give the same answer. If they don't match, you've made an arithmetic error somewhere. Cross-checking catches slips before they cost marks.\n\nIn Q3(d): both routes gave $$P(R) = 89/100$$, confirming the arithmetic was correct.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "In a conditional probability answer, should you leave it as a fraction or a decimal? What precision is expected? (2 steps)", "answer": "- Step 1: Either form is acceptable, but a fraction (e.g., $$\\frac{35}{89}$$) is exact and preferred when the numbers are manageable. A decimal (0.393) must be given to **3 significant figures**.\n- Step 2: If giving a decimal, compute from the exact fraction — don't round intermediate values. $$\\frac{35}{89} = 0.39325\\ldots \\approx 0.393$$ (3 s.f.).\n\nEdexcel convention: probabilities to 3 s.f. unless the question specifies otherwise or the exact fraction is simple.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "When a question says \"Given that a student is right-handed, find the probability that the student is in Year 12\", what goes in the numerator and what goes in the denominator of the conditional probability formula? (2 steps)", "answer": "- Step 1: The event *after* \"given that\" goes in the **denominator**. Here, \"given that … right-handed\" means $$P(R)$$ is the denominator.\n- Step 2: The event being asked about *and* the conditioning event form the **intersection** in the numerator. Here, \"in Year 12 AND right-handed\" gives $$P(\\text{Y12} \\cap R)$$ as the numerator.\n\n$$P(\\text{Y12} \\mid R) = \\frac{P(\\text{Y12} \\cap R)}{P(R)}$$. The most common error is putting the wrong event in the denominator or omitting it entirely.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "For discrete data with $$n$$ values, what are the quartile position formulas? What do you do if the position is an integer vs. a non-integer? (2 steps + sub-items)", "answer": "- Step 1: The positions are $$Q_1$$ at $$\\frac{n+1}{4}$$, median at $$\\frac{n+1}{2}$$, $$Q_3$$ at $$\\frac{3(n+1)}{4}$$.\n- Step 2: How to handle the position depends on whether it's integer or not:\n+ **Integer position** (e.g., position 3 for $$n=11$$): take the data value at that position directly.\n+ **Non-integer position** (e.g., position 3.5): interpolate between the values at positions 3 and 4 (take their average if exactly halfway, or use linear interpolation generally).\n\nIn Q4(a) with $$n = 11$$: $$Q_1$$ position = 3 (integer → $$Q_1 = 28$$), $$Q_3$$ position = 9 (integer → $$Q_3 = 48$$). No interpolation needed.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "State the outlier fence formulas. What comparison do you make to determine if a value is an outlier? (2 steps)", "answer": "- Step 1: Compute the **upper fence** = $$Q_3 + 1.5(Q_3 - Q_1)$$ and the **lower fence** = $$Q_1 - 1.5(Q_3 - Q_1)$$. Note that $$Q_3 - Q_1 = \\text{IQR}$$.\n- Step 2: A value is an outlier if it is **greater than** the upper fence **or less than** the lower fence. You must show the fence calculation and the comparison explicitly.\n\nIn Q4(a): upper fence = $$48 + 1.5 \\times 20 = 78$$. Since $$90 > 78$$, the value 90 is an outlier.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "When a question says \"Ignoring the point (30, 90), Greg calculated $$\\sum f = 422$$, $$\\sum s = 382$$, …\", what must you do differently in your regression calculation? (2 steps)", "answer": "- Step 1: Use **only** the summary statistics provided — they already exclude the outlier. Do NOT add the outlier's values back into the sums.\n- Step 2: The sample size is now $$n = 10$$ (not 11), because one student was removed. All means and calculations use $$n = 10$$.\n\nThe pitfall: instinctively using $$n = 11$$ because the original table has 11 students, or trying to recompute the sums including student B.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "State the formulas for the regression line $$y = a + bx$$ in terms of $$S_{xy}$$, $$S_{xx}$$, $$\\bar{x}$$, and $$\\bar{y}$$. Which do you compute first — $$a$$ or $$b$$? (2 steps)", "answer": "- Step 1: Compute the slope first: $$b = \\frac{S_{xy}}{S_{xx}}$$. This uses only the summary statistics directly.\n- Step 2: Then compute the intercept: $$a = \\bar{y} - b\\bar{x}$$. The intercept *depends on* $$b$$, so you must find $$b$$ first.\n\nIn Q4(b): $$b = 1735.6 / 1667.6 = 1.041$$, then $$a = 38.2 - 1.041 \\times 42.2 = -5.72$$.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": false}, {"question": "When computing the regression intercept $$a = \\bar{y} - b\\bar{x}$$, what determines the sign of $$a$$? When is it negative? (2 steps)", "answer": "- Step 1: The sign of $$a$$ depends on whether $$b\\bar{x}$$ is larger or smaller than $$\\bar{y}$$. If $$b\\bar{x} > \\bar{y}$$, then $$a < 0$$ (negative intercept).\n- Step 2: This happens when the regression line, extended back to $$x = 0$$, falls below zero. It's common when all data points have large positive $$x$$-values and the slope is positive.\n\nIn Q4(b): $$b\\bar{x} = 1.041 \\times 42.2 = 43.9 > \\bar{s} = 38.2$$, so $$a = 38.2 - 43.9 = -5.72$$. The negative intercept is not an error — it just means the line crosses the $$y$$-axis below zero.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": false}, {"question": "When asked to \"give an interpretation of the gradient of the regression line\", what three elements must your answer include? (1 step + sub-items)", "answer": "The interpretation must include:\n+ **Context**: reference the actual variables (e.g., \"French mark\" and \"Spanish mark\"), not just \"$$x$$\" and \"$$y$$\".\n+ **Direction**: \"increases by\" (positive gradient) or \"decreases by\" (negative gradient).\n+ **Units**: state the units of the response variable (e.g., \"marks\").\n\nIn Q4(c): \"For each additional mark scored in the French test, the predicted Spanish mark increases by approximately 1.04 marks.\" Saying just \"the gradient is 1.04\" gets 0 marks — it's a number, not an interpretation.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": true}, {"question": "What is the difference between interpolation and extrapolation in the context of regression? Which is more reliable and why? (3 steps)", "answer": "- Step 1: **Interpolation** means using the regression line to estimate within the range of observed $$x$$-values. **Extrapolation** means estimating outside that range.\n- Step 2: Interpolation is more reliable because the linear relationship has been observed to hold within the data range. Extrapolation is unreliable because we have no evidence the relationship continues linearly beyond the data.\n- Step 3: To determine which applies, check whether the $$x$$-value you're estimating at falls within the observed range. State the range explicitly.\n\nIn Q4(e): the data range is $$24 \\leq f \\leq 68$$. Estimating at $$f = 55$$ is interpolation (within range); estimating at $$f = 18$$ is extrapolation (below minimum). So the $$f = 55$$ estimate is more reliable.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "In a \"which estimate is more reliable\" question, what must you explicitly state in your answer to get full marks? (2 steps)", "answer": "- Step 1: State the **data range** of the explanatory variable (e.g., \"$$24 \\leq f \\leq 68$$\"). Then classify each estimate as **interpolation** (within range) or **extrapolation** (outside range).\n- Step 2: Use the actual words \"interpolation\" and \"extrapolation\" — examiners look for these specific terms. Then conclude which is more reliable.\n\nVague answers like \"more reliable because the data are linear\" or \"closer to the mean\" lose marks. The key concept is interpolation vs extrapolation, not linearity or proximity.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": false}, {"question": "When standardising a Normal variable $$X \\sim N(\\mu, \\sigma^2)$$, what is the formula for the $$z$$-value, and what distribution does $$Z$$ follow? (1 step + sub-item)", "answer": "$$Z = \\frac{X - \\mu}{\\sigma}$$, and $$Z \\sim N(0, 1)$$.\n\n+ The numerator $$X - \\mu$$ centres the distribution at 0. The denominator $$\\sigma$$ scales it to have unit variance. After standardisation, you can use the standard Normal table ($$\\Phi$$ table) to find probabilities.\n\nIn Q5(a): $$z = \\frac{38.8 - 40}{4} = \\frac{-1.2}{4} = -0.30$$.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": false}, {"question": "When a \"show that\" question asks you to show a Normal probability (e.g., \"show that $$P(X < 38.8) = 0.3821$$\"), what two things must you show? (2 steps)", "answer": "- Step 1: Show the **$$z$$-value** from standardisation (e.g., $$z = -0.30$$). This demonstrates you know how to standardise.\n- Step 2: Show the **table lookup** step: $$P(Z < -0.30) = 1 - \\Phi(0.30) = 1 - 0.6179 = 0.3821$$. Writing only the final 0.3821 without showing how you got it from the table loses method marks.\n\nThe examiner needs to see both your standardisation and your use of the $$\\Phi$$ table.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": false}, {"question": "What is the formula for \"at least one success in $$n$$ independent trials\", and why is the complement method preferred over direct calculation? (3 steps)", "answer": "- Step 1: $$P(\\text{at least one success}) = 1 - P(\\text{all fail}) = 1 - (P(\\text{fail}))^n$$.\n- Step 2: The direct method would require summing $$n$$ cases: $$P(\\text{1st success}) + P(\\text{1st fail, 2nd success}) + \\ldots$$ — this gets increasingly complex for larger $$n$$.\n- Step 3: The complement method is a single calculation. For $$n = 3$$ throws with $$P(\\text{fail}) = 0.3821$$: $$P(\\text{qualifies}) = 1 - 0.3821^3 = 1 - 0.0558 = 0.9442$$. Clean and fast.\n\nIn Q5(b), this gives the denominator $$P(\\text{qualifies}) = 0.9442$$ for the conditional probability.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": false}, {"question": "In Q5(b), the event is \"qualified on the second throw with a distance of more than 44 m\". Why is $$X_2 > 44$$ automatically a qualifying throw, and how does this simplify the problem? (2 steps)", "answer": "- Step 1: The qualifying threshold is 38.8 m. Since $$44 > 38.8$$, any throw exceeding 44 m also exceeds 38.8 m. So $$X_2 > 44 \\Rightarrow X_2 > 38.8$$ — the events are nested.\n- Step 2: This means you do NOT need to multiply by $$P(X_2 > 38.8)$$ separately. \"Throw 2 succeeds AND throw 2 exceeds 44\" is just \"throw 2 exceeds 44\" — they're not two independent conditions to multiply.\n\nThe pitfall: treating \"throw 2 succeeds\" and \"throw 2 > 44\" as separate events and multiplying their probabilities — this double-counts because they overlap.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": true}, {"question": "In a multi-attempt problem where qualification stops the sequence (e.g., \"once they qualify, they don't use remaining attempts\"), why are throw-3 outcomes irrelevant when the athlete qualifies on throw 2? (2 steps)", "answer": "- Step 1: The problem states the athlete stops after qualifying. If they qualify on throw 2, throw 3 never happens — it's not part of the scenario.\n- Step 2: When computing the event \"qualified on throw 2 with $$X_2 > 44$$\", you only need: throw 1 fails AND throw 2 > 44. Throw 3 doesn't enter the calculation at all.\n\nThis simplifies the numerator to $$P(F_1) \\times P(X_2 > 44) = 0.3821 \\times 0.1587$$.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": false}, {"question": "(S1 Jan 2024 Q5b — same DNA as Q3d) When a Normal distribution question says \"Given that they qualified for the final, find the probability that …\", what formula must you write down before any calculation? (2 steps)", "answer": "- Step 1: \"Given that\" triggers the conditional probability formula. Write: $$P(\\text{event} \\mid \\text{qualified}) = \\frac{P(\\text{event} \\cap \\text{qualified})}{P(\\text{qualified})}$$.\n- Step 2: Compute the numerator (joint probability of the specific event happening AND qualifying) and the denominator (total probability of qualifying) separately, then divide.\n\nThis is the *exact same structural error* as Q3(d). The joint probability alone (0.0606) is not the answer — you must divide by $$P(\\text{qualified}) = 0.9442$$ to get 0.0642.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": false}, {"question": "A quick exercise: An archer has a 70% chance of hitting the target on each shot. She has 3 independent shots and needs at least one hit to pass. Given that she passed, what's the probability she passed on the very first shot? (conceptual walkthrough, no heavy arithmetic) (3 steps)", "answer": "- Step 1: Define events. $$P(\\text{hit}) = 0.7$$, $$P(\\text{miss}) = 0.3$$. \"Passed on first shot\" means hit on shot 1 (the remaining shots are irrelevant since she already passed).\n- Step 2: $$P(\\text{passed on 1st}) = P(\\text{hit}_1) = 0.7$$. $$P(\\text{passed}) = 1 - 0.3^3 = 1 - 0.027 = 0.973$$.\n- Step 3: $$P(\\text{passed on 1st} \\mid \\text{passed}) = \\frac{0.7}{0.973} \\approx 0.720$$. The conditional probability is slightly less than 0.7 because some people who missed the first shot still passed on shots 2 or 3.\n\nThis mirrors Q5(b): the denominator \"inflates\" the sample space to include all who passed, not just first-shot hitters.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": true}, {"question": "When given $$P(B \\mid A) = 0.3$$ and $$P(A) = x$$, how do you find $$P(A \\cap B)$$? What is the common directional error? (2 steps)", "answer": "- Step 1: Rearrange the conditional formula: $$P(B \\mid A) = \\frac{P(A \\cap B)}{P(A)}$$, so $$P(A \\cap B) = P(B \\mid A) \\times P(A) = 0.3x$$.\n- Step 2: The common error is writing $$P(A \\cap B) = 0.3 \\times P(B) = 0.3y$$. This would be correct only if the given condition were $$P(A \\mid B) = 0.3$$, i.e., the conditioning direction were reversed.\n\nThe conditioning event (the one after the vertical bar) is the denominator. \"$$B$$ given $$A$$\" means $$A$$ is the condition → $$P(A)$$ is the denominator.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": false}, {"question": "State the addition rule for $$P(A \\cup B)$$ in terms of $$P(A)$$, $$P(B)$$, and $$P(A \\cap B)$$. Why is the intersection subtracted? (2 steps)", "answer": "- Step 1: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$.\n- Step 2: Adding $$P(A)$$ and $$P(B)$$ double-counts the overlap $$P(A \\cap B)$$ — those outcomes are in both $$A$$ and $$B$$. Subtracting once corrects for this double-counting.\n\nIn Q6(a): $$0.65 = x + y - 0.3x$$, which simplifies to $$0.65 = 0.7x + y$$.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": true}, {"question": "When a question says \"events $$B$$ and $$C$$ are mutually exclusive\", what does this imply about $$P(B \\cap C)$$, and how does it simplify the union formula? (2 steps)", "answer": "- Step 1: Mutually exclusive means $$B$$ and $$C$$ cannot both occur, so $$P(B \\cap C) = 0$$.\n- Step 2: The addition rule simplifies to $$P(B \\cup C) = P(B) + P(C)$$. No subtraction needed because there's no overlap.\n\nIn Q6(b)(i): $$P(B \\cup C) = P(B) + P(C) = y + (\\frac{1}{2}x + y) = \\frac{1}{2}x + 2y = 0.85$$.", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": false}, {"question": "What is the test for statistical independence of events $$A$$ and $$B$$? What must you compute and compare? (2 steps)", "answer": "- Step 1: Compute both $$P(A) \\cdot P(B)$$ and $$P(A \\cap B)$$ numerically.\n- Step 2: If $$P(A \\cap B) = P(A) \\cdot P(B)$$, then $$A$$ and $$B$$ are independent. If they're not equal, they're not independent.\n\nIn Q6(c): $$P(A) \\cdot P(B) = 0.5 \\times 0.3 = 0.15$$ and $$P(A \\cap B) = 0.3 \\times 0.5 = 0.15$$. They're equal, so $$A$$ and $$B$$ are independent. You must compute *both* sides — don't just assert independence.", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": false}, {"question": "What is the difference between \"mutually exclusive\" and \"statistically independent\"? Can events be both simultaneously? (3 steps)", "answer": "- Step 1: **Mutually exclusive** means $$P(A \\cap B) = 0$$ — the events cannot co-occur. **Independent** means $$P(A \\cap B) = P(A) \\cdot P(B)$$ — the probability of co-occurrence equals the product of individual probabilities.\n- Step 2: If two events with positive probability are mutually exclusive, then $$P(A \\cap B) = 0 \\neq P(A) \\cdot P(B)$$ (since both $$P(A) > 0$$ and $$P(B) > 0$$), so they are **not** independent. Mutually exclusive events with positive probability are always *dependent*.\n- Step 3: The only way events can be both mutually exclusive and independent is if at least one has probability zero (a trivial/degenerate case).\n\nIntuition: if knowing $$A$$ happened tells you $$B$$ definitely didn't happen (mutually exclusive), then $$A$$ clearly gives information about $$B$$ — so they're not independent.", "source": "GLM 5.1 ③", "_id": "glm_3_45", "judge_pick": true}, {"question": "When a \"show that\" question requires you to derive an equation like $$14x + 20y = 13$$ from $$0.65 = 0.7x + y$$, what algebraic step is needed? (2 steps)", "answer": "- Step 1: Start from the equation with decimals: $$0.65 = 0.7x + y$$.\n- Step 2: Multiply through by a factor that clears decimals and matches the target form. Multiplying by 20: $$13 = 14x + 20y$$. This matches the required $$14x + 20y = 13$$.\n\nThe key insight: look at the target equation's coefficients (14 and 20) and work backwards to find what multiplier converts $$0.7x$$ to $$14x$$ (multiply by 20).", "source": "GLM 5.1 ③", "_id": "glm_3_46", "judge_pick": false}, {"question": "When solving two simultaneous equations like $$14x + 20y = 13$$ and $$5x + 20y = 8.5$$, what's the most efficient method? (2 steps)", "answer": "- Step 1: Since both equations have the same $$20y$$ term, **subtract** the second from the first: $$(14x + 20y) - (5x + 20y) = 13 - 8.5$$, giving $$9x = 4.5$$, so $$x = 0.5$$.\n- Step 2: Substitute back into either equation to find $$y$$: $$0.5 + 4y = 1.7$$, so $$4y = 1.2$$, giving $$y = 0.3$$.\n\nElimination is cleaner than substitution here because the $$20y$$ terms cancel immediately. Always look for matching coefficients.", "source": "GLM 5.1 ③", "_id": "glm_3_47", "judge_pick": false}, {"question": "When testing for independence, what is a common mistake in choosing which quantities to compare? (2 steps)", "answer": "- Step 1: The correct comparison is $$P(A \\cap B)$$ vs. $$P(A) \\cdot P(B)$$. Both involve the **intersection**.\n- Step 2: A common mistake is comparing $$P(A \\cup B)$$ with $$P(A) \\cdot P(B)$$ instead. The union is irrelevant to independence — independence is purely about whether the intersection equals the product.\n\nIndependence asks: \"Does the joint probability equal what you'd expect if the events didn't influence each other?\" The union doesn't enter this question.", "source": "GLM 5.1 ③", "_id": "glm_3_48", "judge_pick": false}, {"question": "What is the fundamental property of a CDF that lets you find unknown constants? For a discrete RV, what must $$F(x_{\\max})$$ equal? (2 steps)", "answer": "- Step 1: The CDF gives $$P(X \\leq x)$$. At the maximum value of $$X$$, the probability of being at or below that value must be 1 (certainty).\n- Step 2: Therefore, $$F(x_{\\max}) = 1$$. Setting the CDF expression at the largest $$x$$-value equal to 1 gives an equation you can solve for any unknown constant.\n\nIn Q7(a): $$F(4) = \\frac{k+4}{8} = 1 \\Rightarrow k + 4 = 8 \\Rightarrow k = 4$$.", "source": "GLM 5.1 ③", "_id": "glm_3_49", "judge_pick": false}, {"question": "How do you extract the probability distribution (PDF) from a discrete CDF? What formula do you use? (2 steps)", "answer": "- Step 1: $$P(X = x) = F(x) - F(x-1)$$. The probability of landing exactly on $$x$$ is the increase in cumulative probability from the previous value.\n- Step 2: For the first value ($$x = 1$$), $$P(X = 1) = F(1) - F(0) = F(1) - 0 = F(1)$$, since $$F(0) = 0$$ for a RV starting at 1.\n\nIn Q7(b): $$P(X = 2) = F(2) - F(1) = \\frac{7}{26} - \\frac{2}{26} = \\frac{5}{26}$$. Convert all CDF values to a common denominator first to make subtraction easy.", "source": "GLM 5.1 ③", "_id": "glm_3_50", "judge_pick": false}, {"question": "After computing the probability distribution from a CDF, what single check should you perform before proceeding? Why? (2 steps)", "answer": "- Step 1: Verify that $$\\sum P(X = x) = 1$$. Add up all your individual probabilities.\n- Step 2: If they don't sum to 1, you've made an arithmetic error in the CDF-to-PDF conversion (likely a subtraction slip or a common-denominator error). Catching this early prevents cascading errors in $$E(X)$$, $$\\text{Var}(X)$$, etc.\n\nIn Q7(b): $$\\frac{2 + 5 + 6 + 13}{26} = \\frac{26}{26} = 1$$ ✓. The large numerator (13/26) for $$x = 4$$ is a useful sanity check — it's half the total probability.", "source": "GLM 5.1 ③", "_id": "glm_3_51", "judge_pick": false}, {"question": "How do you find the mode of a discrete random variable from its probability distribution? (2 steps)", "answer": "- Step 1: The mode is the value of $$x$$ with the **largest probability** $$P(X = x)$$.\n- Step 2: Scan the probability table and identify the maximum. If two values share the same largest probability, the distribution is bimodal (state both).\n\nIn Q7(c): the probabilities are $$\\frac{2}{26}, \\frac{5}{26}, \\frac{6}{26}, \\frac{13}{26}$$. The largest is $$\\frac{13}{26}$$ at $$x = 4$$, so mode = 4. Note: the mode is the *value of* $$x$$, not the probability itself.", "source": "GLM 5.1 ③", "_id": "glm_3_52", "judge_pick": false}, {"question": "State the formula for $$\\text{Var}(aX + b)$$. Explain why the additive constant disappears and the multiplicative constant is squared. (3 steps)", "answer": "- Step 1: $$\\text{Var}(aX + b) = a^2 \\text{Var}(X)$$. The constant $$b$$ vanishes; the multiplier $$a$$ is squared.\n- Step 2: **Why $$b$$ vanishes:** Variance measures spread — how far values are from the mean. Adding a constant shifts all values (and the mean) by the same amount, so distances from the mean don't change.\n- Step 3: **Why $$a$$ is squared:** Scaling by $$a$$ multiplies all deviations from the mean by $$a$$. Variance is the *mean of squared deviations*, so the $$a$$ gets squared: $$E[(a(X-\\mu))^2] = a^2 E[(X-\\mu)^2] = a^2 \\text{Var}(X)$$.\n\nIn Q7(d): $$\\text{Var}(13X - 6) = 169 \\cdot \\text{Var}(X) = 169 \\times \\frac{165}{169} = 165$$. The $$-6$$ doesn't appear; the 13 is squared.", "source": "GLM 5.1 ③", "_id": "glm_3_53", "judge_pick": false}, {"question": "What are three common errors when computing $$\\text{Var}(aX + b)$$? (3 sub-items)", "answer": "+ **Error 1:** Writing $$\\text{Var}(aX + b) = a \\text{Var}(X) + b$$ — wrong on both counts. The multiplier should be squared, and the additive constant should vanish.\n+ **Error 2:** Writing $$\\text{Var}(aX + b) = a \\text{Var}(X)$$ — forgot to square the multiplier.\n+ **Error 3:** Writing $$\\text{Var}(aX + b) = a^2 \\text{Var}(X) + b$$ — correctly squared the multiplier but forgot that the additive constant vanishes.\n\nThe correct answer is always $$a^2 \\text{Var}(X)$$. No exceptions, no additions.", "source": "GLM 5.1 ③", "_id": "glm_3_54", "judge_pick": false}, {"question": "When computing $$\\text{Var}(X) = E(X^2) - (E(X))^2$$ for a discrete RV with fractional probabilities, why should you keep everything as fractions until the very end? (3 steps)", "answer": "- Step 1: Converting to decimals early introduces rounding errors that accumulate through squaring and subtraction. Even small rounding can make a noticeable difference.\n- Step 2: Working with fractions allows clean cancellation. In Q7(d): $$\\text{Var}(X) = \\frac{142}{13} - \\frac{1681}{169} = \\frac{1846 - 1681}{169} = \\frac{165}{169}$$. Then $$169 \\times \\frac{165}{169} = 165$$ — the 169 cancels perfectly.\n- Step 3: If you'd used decimals, $$E(X) \\approx 3.154$$, $$E(X^2) \\approx 10.923$$, giving $$\\text{Var}(X) \\approx 0.976$$, and $$169 \\times 0.976 = 164.9$$ — close but not exactly 165, and you'd lose the \"nice answer\" signal that confirms correctness.\n\nWhen the final answer is a clean integer like 165, it's a strong signal your arithmetic is right. Messy decimals usually mean an error.", "source": "GLM 5.1 ③", "_id": "glm_3_55", "judge_pick": true}, {"question": "A quick exercise: If $$\\text{Var}(X) = 4$$, what is $$\\text{Var}(3X + 10)$$? (mental math)", "answer": "$$\\text{Var}(3X + 10) = 3^2 \\cdot \\text{Var}(X) = 9 \\times 4 = 36$$.\n\nThe $$+10$$ vanishes (additive constant doesn't affect spread), and the 3 is squared (scaling deviations by 3 squares the variance). Compare: $$\\text{sd}(3X + 10) = 3 \\times 2 = 6$$, and $$6^2 = 36$$ ✓.", "source": "GLM 5.1 ③", "_id": "glm_3_56", "judge_pick": true}, {"question": "For a symmetric Normal interval $$P(\\mu - 2k < X < \\mu + 2k) = 0.6$$, how do you convert this to a single $$\\Phi$$ lookup? Walk through the logic. (3 steps)", "answer": "- Step 1: Standardise: $$P\\left(-\\frac{2k}{\\sigma} < Z < \\frac{2k}{\\sigma}\\right) = 0.6$$. Let $$z^* = \\frac{2k}{\\sigma}$$.\n- Step 2: By symmetry of the standard Normal, $$P(-z^* < Z < z^*) = 2\\Phi(z^*) - 1$$. Set this equal to 0.6: $$2\\Phi(z^*) - 1 = 0.6$$.\n- Step 3: Solve for $$\\Phi(z^*)$$: $$\\Phi(z^*) = \\frac{1 + 0.6}{2} = 0.8$$. Now look up $$\\Phi^{-1}(0.8) = 0.8416$$.\n\nThe general rule: $$P(|Z| < z^*) = c \\Rightarrow \\Phi(z^*) = \\frac{1 + c}{2}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_57", "judge_pick": true}, {"question": "What is a common error when converting a symmetric interval probability to a $$\\Phi$$ lookup? What would go wrong? (2 steps)", "answer": "- Step 1: The error is looking up $$\\Phi^{-1}(0.6) = 0.2533$$ directly, without converting to the one-tail form.\n- Step 2: This would give $$2k/\\sigma = 0.2533$$ instead of the correct 0.8416 — off by a factor of about 3.3. The value 0.6 is the *central* probability, not the upper-tail probability. You must convert: $$\\Phi(z^*) = (1 + 0.6)/2 = 0.8$$, then look up.\n\nThe trap: seeing \"0.6\" and reflexively looking up $$\\Phi^{-1}(0.6)$$. Always convert two-tail to one-tail first.", "source": "GLM 5.1 ③", "_id": "glm_3_58", "judge_pick": false}, {"question": "In Q8(a), the interval is $$P(\\mu - 2k < X < \\mu + 2k)$$ with $$\\sigma = 6$$. What is the standardised expression inside the $$Z$$, and what common mistake arises from the \"$$2k$$\" notation? (2 steps)", "answer": "- Step 1: The standardised expression is $$\\frac{2k}{\\sigma} = \\frac{2k}{6}$$, NOT $$\\frac{k}{6}$$. The interval half-width is $$2k$$, so the $$z$$-value is $$2k/\\sigma$$.\n- Step 2: The common mistake is treating the half-width as $$k$$ instead of $$2k$$, leading to $$z = k/6$$ and an answer that's half the correct value. Always identify what the interval half-width actually is before standardising.\n\nIn Q8(a): $$2k/6 = 0.8416 \\Rightarrow 2k = 5.0496 \\Rightarrow k = 2.52$$.", "source": "GLM 5.1 ③", "_id": "glm_3_59", "judge_pick": false}, {"question": "When a Normal question gives you $$P(Y > \\frac{3}{2}\\mu) = 0.0668$$ and asks you to find parameters, what is the first algebraic step after standardising? (3 steps)", "answer": "- Step 1: Standardise: $$P\\left(Z > \\frac{(3/2)\\mu - \\mu}{\\sigma}\\right) = P\\left(Z > \\frac{\\mu}{2\\sigma}\\right) = 0.0668$$.\n- Step 2: Convert to a $$\\Phi$$ lookup: $$\\Phi\\left(\\frac{\\mu}{2\\sigma}\\right) = 1 - 0.0668 = 0.9332$$.\n- Step 3: Look up: $$\\Phi(1.5) = 0.9332$$, so $$\\frac{\\mu}{2\\sigma} = 1.5$$, giving $$\\mu = 3\\sigma$$. This is your first equation linking $$\\mu$$ and $$\\sigma$$.\n\nThe key insight: standardisation converts a probability statement into an algebraic equation relating the parameters.", "source": "GLM 5.1 ③", "_id": "glm_3_60", "judge_pick": false}, {"question": "What memorable $$\\Phi$$ value should you associate with $$z = 1.5$$? Why is it useful to memorise? (2 steps)", "answer": "- Step 1: $$\\Phi(1.5) = 0.9332$$. This means $$P(Z < 1.5) = 0.9332$$, or equivalently $$P(Z > 1.5) = 0.0668$$.\n- Step 2: Memorising key values ($$\\Phi(1) = 0.8413$$, $$\\Phi(1.5) = 0.9332$$, $$\\Phi(1.96) = 0.975$$) saves ~30 seconds per Normal question by skipping the table lookup. Over a paper with 2–3 Normal sub-parts, this saves ~90 seconds.\n\nIn Q8(b), recognising 0.9332 = $$\\Phi(1.5)$$ immediately gives $$\\mu/(2\\sigma) = 1.5$$ without needing to search the table.", "source": "GLM 5.1 ③", "_id": "glm_3_61", "judge_pick": false}, {"question": "When solving simultaneous equations for Normal distribution parameters (e.g., $$\\mu = 3\\sigma$$ and $$2\\mu = 3\\sigma^2$$), what substitution leads to a quadratic, and how do you handle the roots? (3 steps)", "answer": "- Step 1: Substitute $$\\mu = 3\\sigma$$ into $$2\\mu = 3\\sigma^2$$: $$2(3\\sigma) = 3\\sigma^2$$, giving $$6\\sigma = 3\\sigma^2$$.\n- Step 2: Rearrange: $$3\\sigma^2 - 6\\sigma = 0$$, factorise: $$3\\sigma(\\sigma - 2) = 0$$, giving $$\\sigma = 0$$ or $$\\sigma = 2$$.\n- Step 3: **Reject** $$\\sigma = 0$$ because a standard deviation must be positive ($$\\sigma > 0$$). So $$\\sigma = 2$$ and $$\\mu = 3 \\times 2 = 6$$.\n\nAlways state the rejection explicitly: \"$$\\sigma > 0$$, so $$\\sigma = 2$$\". This earns the method mark for recognising the physical constraint.", "source": "GLM 5.1 ③", "_id": "glm_3_62", "judge_pick": true}, {"question": "When a quadratic equation yields a root of $$\\sigma = 0$$, why must you reject it? What other non-physical roots might arise in S1? (2 steps + sub-items)", "answer": "- Step 1: $$\\sigma = 0$$ means zero spread — all values would be identical, which contradicts having a distribution. It's a mathematical artefact of the factorisation, not a valid solution.\n- Step 2: Other non-physical results to reject in S1:\n+ Negative $$\\sigma$$ (standard deviation must be positive)\n+ Probabilities outside [0, 1]\n+ $$|r| > 1$$ for PMCC\n+ Negative frequencies\n\nAlways check that your answer makes physical/probabilistic sense.", "source": "GLM 5.1 ③", "_id": "glm_3_63", "judge_pick": true}, {"question": "When a question gives variance but you need standard deviation for standardisation (or vice versa), what is the relationship? What's the common oversight? (2 steps)", "answer": "- Step 1: $$\\sigma = \\sqrt{\\text{Var}(X)}$$ and $$\\text{Var}(X) = \\sigma^2$$. They are NOT the same thing.\n- Step 2: The common oversight is using the variance value directly as $$\\sigma$$ in the standardisation formula. In Q8(a): variance = 36, so $$\\sigma = 6$$, NOT 36. Using 36 would give $$z = 2k/36$$ instead of $$2k/6$$ — off by a factor of 6.\n\nAlways check: does the question give you $$\\sigma$$ or $$\\sigma^2$$? The standardisation formula requires $$\\sigma$$.", "source": "GLM 5.1 ③", "_id": "glm_3_64", "judge_pick": false}, {"question": "What is the exam strategy for the first 10 minutes of an S1 paper? What specifically should you scan for? (2 steps)", "answer": "- Step 1: Read through all questions and scan for the trigger phrase **\"given that\"** — this signals conditional probability, the most error-prone topic. Mark these questions with a star.\n- Step 2: Pre-write $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$ in the margin next to each starred question. This single habit (writing the formula before computing) fixes the most common error: returning $$P(A \\cap B)$$ instead of $$P(A \\mid B)$$.\n\nOn this paper, Q3(d), Q5(b), and Q6(a) all required conditional probability. Pre-writing the formula would have saved 4–6 marks.", "source": "GLM 5.1 ③", "_id": "glm_3_65", "judge_pick": false}, {"question": "For \"show that\" questions in S1, what is the minimum working expected? Why can't you just write the final answer? (2 steps)", "answer": "- Step 1: Show at least **3 algebraic lines**: setup → simplify → answer. The examiner awards method marks for the process, not just the result.\n- Step 2: The final answer is given in the question (e.g., \"show that $$\\sigma = 8.57$$\"), so it's worth zero marks by itself. The marks are all in the working: showing $$S_{xx}$$, then $$\\sigma = \\sqrt{S_{xx}/n}$$, then the numerical evaluation.\n\nOn this paper, Q2(a)(ii), Q4(b), Q6(a), and Q7(a) were all \"show that\" — roughly half the marks required demonstrated method.", "source": "GLM 5.1 ③", "_id": "glm_3_66", "judge_pick": false}, {"question": "What is the coding recitation rule you should state to yourself before applying any linear transformation? (2 steps)", "answer": "- Step 1: Recite: **\"Additive constant drops; multiplier applies — and squares for variance.\"**\n- Step 2: This single sentence covers both Q2(c) (the $$-32$$ doesn't affect $$\\sigma$$, but $$\\times 5/9$$ does) and Q7(d) (the $$-6$$ vanishes from $$\\text{Var}(13X-6)$$, and 13 gets squared).\n\nWithout this rule, it's easy to panic: \"Did I forget to subtract 32 from the s.d.?\" or \"Should the $$-6$$ appear in the variance?\" The rule gives certainty.", "source": "GLM 5.1 ③", "_id": "glm_3_67", "judge_pick": true}, {"question": "When computing independence, why must you calculate BOTH $$P(A) \\cdot P(B)$$ AND $$P(A \\cap B)$$ numerically before comparing? (2 steps)", "answer": "- Step 1: You need to verify whether $$P(A \\cap B) = P(A) \\cdot P(B)$$ holds as a numerical equality. Both sides must be computed to compare them.\n- Step 2: Simply asserting \"they are independent\" without showing both calculations loses both marks. The examiner needs to see the numerical evidence: $$P(A) \\cdot P(B) = 0.5 \\times 0.3 = 0.15$$ and $$P(A \\cap B) = 0.15$$, therefore independent.\n\nIn Q6(c), both sides equalled 0.15, confirming independence. If only one side were shown, the comparison couldn't be verified.", "source": "GLM 5.1 ③", "_id": "glm_3_68", "judge_pick": false}, {"question": "For a regression interpretation question (1 mark), what is the full template answer that guarantees the mark? (1 step + sub-items)", "answer": "\"For each additional [unit of $$x$$-variable] in [context], the predicted [$$y$$-variable] [increases/decreases] by approximately [gradient value] [units of $$y$$].\"\n\nThe three essential elements:\n+ **Context**: name the variables (French mark, Spanish mark), not \"$$x$$\" and \"$$y$$\"\n+ **Direction**: \"increases\" or \"decreases\" (not just \"changes by\")\n+ **Units**: state the unit of measurement (marks, metres, etc.)\n\nSaying \"the gradient is 1.04\" or \"for every 1 in $$x$$, $$y$$ goes up by 1.04\" gets 0 marks — no context, no units.", "source": "GLM 5.1 ③", "_id": "glm_3_69", "judge_pick": false}, {"question": "When a question asks which of two regression estimates is \"more reliable\", what two keywords must appear in your answer? (2 steps)", "answer": "- Step 1: Use the words **\"interpolation\"** (for the reliable estimate) and **\"extrapolation\"** (for the unreliable one). These are the specific terms examiners look for.\n- Step 2: Support this by stating the **observed data range** (e.g., \"$$24 \\leq f \\leq 68$$\") and showing which estimate falls within vs. outside this range.\n\nVague answers like \"more reliable because it's closer to the mean\" or \"the relationship is more linear there\" don't score. The concept being tested is specifically interpolation vs. extrapolation.", "source": "GLM 5.1 ③", "_id": "glm_3_70", "judge_pick": true}, {"question": "What is the time budget for an S1 paper (75 marks in 90 minutes), and what's the rough allocation per question? (2 steps)", "answer": "- Step 1: The rate is approximately **1.2 minutes per mark**. An 8-mark question gets ~10 minutes; a 12-mark question gets ~14 minutes.\n- Step 2: Approximate allocations: Q1 ≈ 10 min, Q2 ≈ 14 min, Q3 ≈ 10 min, Q4 ≈ 14 min, Q5 ≈ 10 min, Q6 ≈ 11 min, Q7 ≈ 12 min, Q8 ≈ 11 min. Total ≈ 92 min — slightly over, so you need to work efficiently.\n\nSaving ~3 minutes by memorising formulas (instead of looking them up) and key $$\\Phi$$ values can make the difference between finishing and running out of time.", "source": "GLM 5.1 ③", "_id": "glm_3_71", "judge_pick": true}, {"question": "Why should you keep fractions until the very end of variance computations, and what signal tells you your answer is correct? (2 steps)", "answer": "- Step 1: Keeping fractions avoids rounding errors that compound through squaring and subtraction. Decimal approximations of $$E(X)$$ and $$E(X^2)$$ lose precision that makes $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$ inaccurate.\n- Step 2: When the final answer is a **clean integer or simple fraction** (like 165 in Q7(d)), it's a strong signal your arithmetic is correct. A messy decimal (like 164.87) usually indicates an error somewhere.\n\nIn Q7(d): $$169 \\times \\frac{165}{169} = 165$$ — the 169s cancel perfectly, giving an integer. If you'd used decimals, you'd get ~164.9 and know something's wrong.", "source": "GLM 5.1 ③", "_id": "glm_3_72", "judge_pick": false}, {"question": "A quick conceptual exercise: If $$X \\sim N(50, 25)$$ and you compute $$P(X > 55)$$, what is the $$z$$-value? (mental math)", "answer": "$$z = \\frac{55 - 50}{\\sqrt{25}} = \\frac{5}{5} = 1.0$$.\n\nNote: the variance is 25, so $$\\sigma = 5$$ (not 25). This is the most common slip — using variance instead of s.d. in the denominator. Then $$P(Z > 1) = 1 - 0.8413 = 0.1587$$.", "source": "GLM 5.1 ③", "_id": "glm_3_73", "judge_pick": false}, {"question": "When the histogram mean (13.2) is less than the median (13.3), why does this indicate negative skew? Build the intuition. (3 steps)", "answer": "- Step 1: The mean is sensitive to extreme values — it's pulled toward the long tail. The median is resistant — it stays near the centre of the bulk of the data.\n- Step 2: If the mean is *less* than the median, the mean has been pulled *downward*, meaning the long tail is on the *lower* (left) side of the distribution.\n- Step 3: A long tail on the left is the definition of **negative skew** (also called left-skewed). The bulk of the data is on the right, with a few small values dragging the mean down.\n\nVisual: imagine a mostly right-leaning histogram with a thin tail stretching left. The median sits in the tall right portion, while the mean gets tugged left into the tail.", "source": "GLM 5.1 ③", "_id": "glm_3_74", "judge_pick": true}, {"question": "What is the general formula for converting a central probability $$P(|Z| < z^*) = c$$ into a $$\\Phi$$ lookup? Derive it from symmetry. (3 steps)", "answer": "- Step 1: $$P(|Z| < z^*) = P(-z^* < Z < z^*)$$. By the symmetry and total-probability property of the standard Normal, this equals $$\\Phi(z^*) - \\Phi(-z^*)$$.\n- Step 2: By symmetry, $$\\Phi(-z^*) = 1 - \\Phi(z^*)$$. So $$P(-z^* < Z < z^*) = \\Phi(z^*) - (1 - \\Phi(z^*)) = 2\\Phi(z^*) - 1$$.\n- Step 3: Setting this equal to $$c$$: $$2\\Phi(z^*) - 1 = c$$, so $$\\Phi(z^*) = \\frac{1 + c}{2}$$.\n\nMemorise: **symmetric interval probability $$c$$ → upper-tail probability $$(1+c)/2$$**.", "source": "GLM 5.1 ③", "_id": "glm_3_75", "judge_pick": true}, {"question": "When you compute $$P(R)$$ by the complement route and by the direct tree route, and they disagree, what should you do? (2 steps)", "answer": "- Step 1: **Do not proceed** with either value. A mismatch means there's an arithmetic error somewhere — in the tree branches, the complement calculation, or both.\n- Step 2: Recheck each branch probability (do they sum to 1 at each split?), recheck the complement arithmetic, and recheck the substitution of $$p$$. Fix the error before continuing, because an incorrect $$P(R)$$ makes the entire conditional probability wrong.\n\nIn Q3(d), both routes gave $$P(R) = 89/100$$, confirming consistency. This cross-check is a 30-second investment that can save multiple marks.", "source": "GLM 5.1 ③", "_id": "glm_3_76", "judge_pick": false}, {"question": "In Q5(b), the numerator of the conditional probability is $$P(F_1 \\cap [X_2 > 44])$$. Why can you write this as $$P(F_1) \\times P(X_2 > 44)$$ without any further adjustment? (2 steps)", "answer": "- Step 1: The question explicitly states that \"throws are independent\". For independent events, the joint probability equals the product of individual probabilities.\n- Step 2: $$P(F_1 \\cap [X_2 > 44]) = P(F_1) \\times P(X_2 > 44) = 0.3821 \\times 0.1587$$. No conditional adjustment needed because the outcome of throw 1 doesn't affect throw 2.\n\nIf the throws were *not* independent, you'd need $$P(X_2 > 44 \\mid F_1)$$ instead of just $$P(X_2 > 44)$$. Always check whether independence is stated.", "source": "GLM 5.1 ③", "_id": "glm_3_77", "judge_pick": false}, {"question": "What is the key difference between how you handle the \"given that\" condition in Q3(d) vs. Q5(b)? How does the denominator differ in nature? (2 steps)", "answer": "- Step 1: In Q3(d), the denominator $$P(R)$$ comes from a probability tree with known branch probabilities — it's a direct calculation from the tree or the complement.\n- Step 2: In Q5(b), the denominator $$P(\\text{qualifies})$$ comes from a Normal distribution with an \"at least one in 3 trials\" structure — it requires the complement-of-all-fail approach: $$1 - P(F)^3$$.\n\nThe *formula* is the same ($$P(A \\mid B) = P(A \\cap B)/P(B)$$), but the *source* of the denominator differs. In both cases, the trigger \"given that\" forces you to compute it.", "source": "GLM 5.1 ③", "_id": "glm_3_78", "judge_pick": true}, {"question": "When computing $$E(X)$$ and $$E(X^2)$$ for a discrete RV, what is the formula for each? Why do you need both? (2 steps)", "answer": "- Step 1: $$E(X) = \\sum x \\cdot P(X = x)$$ and $$E(X^2) = \\sum x^2 \\cdot P(X = x)$$. Each is a weighted average — of $$x$$-values and of $$x^2$$-values respectively, weighted by probabilities.\n- Step 2: You need both because $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$. Neither one alone gives you the variance. $$E(X)$$ tells you the centre; $$E(X^2)$$ (combined with $$E(X)$$) tells you the spread.\n\nIn Q7(d): $$E(X) = \\frac{82}{26} = \\frac{41}{13}$$ and $$E(X^2) = \\frac{284}{26} = \\frac{142}{13}$$. Then $$\\text{Var}(X) = \\frac{142}{13} - \\frac{1681}{169} = \\frac{165}{169}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_79", "judge_pick": false}, {"question": "When converting CDF values with different denominators (like $$\\frac{1}{13}$$, $$\\frac{2k-1}{26}$$, $$\\frac{3k+1}{26}$$, $$\\frac{k+4}{8}$$) to a common denominator for differencing, what's the efficient approach after finding $$k$$? (2 steps)", "answer": "- Step 1: After finding $$k = 4$$, substitute into each CDF value: $$F(1) = \\frac{1}{13}$$, $$F(2) = \\frac{7}{26}$$, $$F(3) = \\frac{13}{26}$$, $$F(4) = 1$$.\n- Step 2: Convert all to the same denominator (26 is convenient here): $$F(1) = \\frac{2}{26}$$, $$F(2) = \\frac{7}{26}$$, $$F(3) = \\frac{13}{26}$$, $$F(4) = \\frac{26}{26}$$. Now differences are straightforward: $$P(X=2) = \\frac{7-2}{26} = \\frac{5}{26}$$.\n\nWorking with different denominators (13, 26, 8) directly is error-prone. Converting to a common denominator first makes the subtraction trivial.", "source": "GLM 5.1 ③", "_id": "glm_3_80", "judge_pick": false}, {"question": "In Q8(b), after finding $$\\mu = 3\\sigma$$ from standardisation and $$2\\mu = 3\\sigma^2$$ from the given condition, why do you substitute the linear relation into the quadratic one (not the other way around)? (2 steps)", "answer": "- Step 1: Substituting $$\\mu = 3\\sigma$$ into $$2\\mu = 3\\sigma^2$$ gives $$6\\sigma = 3\\sigma^2$$, a quadratic in $$\\sigma$$ alone — one variable, easy to solve.\n- Step 2: Substituting $$\\sigma = \\mu/3$$ into $$2\\mu = 3\\sigma^2$$ would give $$2\\mu = 3(\\mu/3)^2 = \\mu^2/3$$, i.e., $$\\mu^2 - 6\\mu = 0$$. This also works but is in $$\\mu$$ rather than $$\\sigma$$. Either direction works; the key is to get a single-variable equation.\n\nBoth approaches yield the same solution. Choose whichever feels more natural, but always check that both $$\\mu$$ and $$\\sigma$$ satisfy the original conditions.", "source": "GLM 5.1 ③", "_id": "glm_3_81", "judge_pick": true}, {"question": "A quick exercise: If $$P(A) = 0.4$$, $$P(B \\mid A) = 0.5$$, and $$P(A \\cup B) = 0.5$$, find $$P(B)$$. (conceptual walkthrough) (3 steps)", "answer": "- Step 1: From $$P(B \\mid A) = 0.5$$: $$P(A \\cap B) = P(B \\mid A) \\times P(A) = 0.5 \\times 0.4 = 0.2$$.\n- Step 2: From the addition rule: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$, so $$0.5 = 0.4 + P(B) - 0.2$$.\n- Step 3: Solve: $$P(B) = 0.5 - 0.4 + 0.2 = 0.3$$.\n\nThis mirrors Q6(a)'s structure: use the conditional to find the intersection, then use the addition rule to find the unknown probability.", "source": "GLM 5.1 ③", "_id": "glm_3_82", "judge_pick": true}, {"question": "When a question gives you $$P(B \\mid A)$$ and asks about $$P(A \\cap B)$$, what's the key formula, and what's the common directional error? (2 steps)", "answer": "- Step 1: $$P(A \\cap B) = P(B \\mid A) \\times P(A)$$. The conditioning event's probability is the multiplier.\n- Step 2: The common error is multiplying by $$P(B)$$ instead of $$P(A)$$: writing $$P(A \\cap B) = 0.3 \\times P(B) = 0.3y$$ instead of $$0.3 \\times P(A) = 0.3x$$. This reverses the conditioning direction.\n\nIn Q6(a): \"$$P(B \\mid A) = 0.3$$\" means $$B$$ is conditioned on $$A$$, so $$P(A)$$ is the multiplier. The event *after* the bar goes in the denominator, and the event *before* the bar is what you multiply.", "source": "GLM 5.1 ③", "_id": "glm_3_83", "judge_pick": true}, {"question": "What is the complete list of key $$\\Phi$$ values worth memorising for S1, and roughly how much time do they save across a paper? (1 step + sub-items)", "answer": "Memorise these standard Normal values:\n\n+ $$\\Phi(0.84) \\approx 0.80$$ — useful for 80th percentile\n+ $$\\Phi(1.00) = 0.8413$$ — the most common lookup\n+ $$\\Phi(1.28) \\approx 0.90$$ — 90th percentile\n+ $$\\Phi(1.50) = 0.9332$$ — used in Q8(b)\n+ $$\\Phi(1.645) = 0.95$$ — 95th percentile\n+ $$\\Phi(1.96) = 0.975$$ — 97.5th percentile (common in confidence intervals)\n+ $$\\Phi(2.33) \\approx 0.99$$ — 99th percentile\n\nAcross a paper with 2–3 Normal sub-parts, this saves roughly **90 seconds** by skipping table lookups — significant when the time budget is tight (~1.2 min/mark).", "source": "GLM 5.1 ③", "_id": "glm_3_84", "judge_pick": false}, {"question": "When a question involves selecting two items and asks for the probability that \"both\" satisfy some condition, but the condition involves partial classes from a histogram, what is the complete procedure? (4 steps)", "answer": "- Step 1: Identify which histogram classes are fully inside the condition range, and which are partially covered (the boundary cuts through a class).\n- Step 2: For fully-covered classes, use the entire class frequency. For partially-covered classes, apply the uniform-within-class assumption: contributing frequency = (overlap width / class width) × class frequency.\n- Step 3: Sum all contributing frequencies to get the total count satisfying the condition (call it $$k$$).\n- Step 4: Compute $$P(\\text{both}) = \\frac{k}{n} \\times \\frac{k-1}{n-1}$$ (without replacement), giving the answer to 3 s.f.\n\nIn Q1(d): contributing frequencies were 8 + 152 + 60 = 220, so $$P = \\frac{220}{408} \\times \\frac{219}{407} \\approx 0.290$$.", "source": "GLM 5.1 ③", "_id": "glm_3_85", "judge_pick": false}, {"question": "What does it mean for the PMCC to be \"invariant under linear coding\", and what is the underlying intuition? (3 steps)", "answer": "- Step 1: If you apply linear transformations to both variables ($$u = a + bx$$, $$v = c + dy$$ with $$b, d > 0$$), the PMCC between $$u$$ and $$v$$ equals the PMCC between $$x$$ and $$y$$: $$r_{uv} = r_{xy}$$.\n- Step 2: Intuition: correlation measures the *strength and direction of the linear relationship*. Shifting (adding constants) moves the cloud of points without changing its shape. Scaling (multiplying by constants) stretches or compresses the axes but doesn't change how tightly the points cluster around a line.\n- Step 3: The only exception is sign: if exactly one of $$b, d$$ is negative, the relationship is reflected and $$r$$ changes sign. If both are negative, the double reflection restores the original sign.\n\nConverting °F to °C is just a rescaling — it doesn't change how correlated the variables are, any more than measuring distance in miles vs. kilometres changes whether two cities are close together.", "source": "GLM 5.1 ③", "_id": "glm_3_86", "judge_pick": true}, {"question": "Why does the regression line of $$s$$ on $$f$$ (not $$f$$ on $$s$$) have slope $$b = S_{fs}/S_{ff}$$? What would be different for the regression of $$f$$ on $$s$$? (2 steps)", "answer": "- Step 1: The regression of $$y$$ on $$x$$ minimises the sum of squared *vertical* residuals (errors in $$y$$). Its slope is always $$b = S_{xy}/S_{xx}$$ — the covariance of $$x$$ and $$y$$ divided by the variance of $$x$$.\n- Step 2: The regression of $$x$$ on $$y$$ would minimise *horizontal* residuals (errors in $$x$$) and have slope $$S_{xy}/S_{yy}$$. These are different lines unless $$r = 1$$ (perfect correlation).\n\nIn Q4(b): the regression of $$s$$ on $$f$$ has $$b = S_{fs}/S_{ff} = 1735.6/1667.6$$. If the question asked for $$f$$ on $$s$$, the slope would be $$S_{fs}/S_{ss}$$ — a different value.", "source": "GLM 5.1 ③", "_id": "glm_3_87", "judge_pick": true}, {"question": "When a \"show that\" question asks you to show an equation like $$14x + 20y = 13$$, and your working produces $$0.7x + y = 0.65$$, what must you do to bridge the gap? (2 steps)", "answer": "- Step 1: Recognise that the target equation has integer coefficients, while your equation has decimals. You need to clear the decimals by multiplying through.\n- Step 2: Multiply $$0.7x + y = 0.65$$ by 20: $$14x + 20y = 13$$. Verify this matches the target. The multiplier 20 was chosen because it's the smallest integer that clears all decimals (0.7 × 20 = 14, 1 × 20 = 20, 0.65 × 20 = 13).\n\nAlways check: does your final equation match the one in the question *exactly*? If not, you've made an algebraic error.", "source": "GLM 5.1 ③", "_id": "glm_3_88", "judge_pick": false}, {"question": "What is the full list of \"non-physical\" results you should explicitly reject in S1, and what is the general principle? (1 step + sub-items)", "answer": "The general principle: **any result that violates the axioms of probability or the definition of a parameter must be rejected with a stated reason.**\n\n+ $$\\sigma \\leq 0$$ — standard deviation must be strictly positive\n+ Probabilities outside [0, 1] — impossible by definition\n+ $$|r| > 1$$ — PMCC is bounded by −1 and 1\n+ Negative frequencies — counts cannot be negative\n+ $$P(A \\cap B) > \\min(P(A), P(B))$$ — intersection can't exceed either individual probability\n\nAlways write a one-line rejection: \"$$\\sigma > 0$$, so reject $$\\sigma = 0$$\" or similar. This earns the method mark.", "source": "GLM 5.1 ③", "_id": "glm_3_89", "judge_pick": true}], "count": 90}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "When a probability question involves boundaries that cut through histogram classes (e.g., \"between 8 cm and 14 cm\"), what is the first step to estimate the count? (3 steps)", "answer": "- Step 1: Identify which classes the boundaries split (e.g., [5,9) and [13,15) in Q1(d)).\n- Step 2: Calculate the proportion of each split class within the target range using class width (e.g., (9-8)/4 for the lower split).\n+ Example: For [5,9), proportion = (9-8)/4 = 1/4; for [13,15), proportion = (14-13)/2 = 1/2.\n- Step 3: Multiply proportions by class frequencies, sum all contributions (including full classes), then compute the probability without replacement.\n\n**Takeaway:** Always split class frequencies proportionally when boundaries cut through a class.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": true}, {"question": "What happens to the standard deviation when applying a linear coding $ u = a + bx $? Why? (2 steps)", "answer": "- Step 1: Additive constants (a) do **not** affect spread (standard deviation remains unchanged).\n- Step 2: Multiplicative constants (b) scale the standard deviation by |b|.  \n+ Example: For $ \\sigma_x = 8.57 $, coding $ c = \\frac{5}{9}(f - 32) $ scales s.d. by $ \\frac{5}{9} $, giving $ \\sigma_c = 4.76 $.\n\n**Takeaway:** Only the multiplier (not the shift) affects standard deviation.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "What is the first formula you must write down when a question says \"given that B\"? Why?", "answer": "- Step 1: Write $ P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)} $ immediately.  \n+ The phrase \"given that B\" forces the denominator to be $ P(B) $, not $ P(A) $.\n+ Example: In Q3(d), \"given that a student is right-handed\" requires dividing $ P(\\text{Y12} \\cap R) $ by $ P(R) $, not $ P(\\text{Y12}) $.\n\n**Takeaway:** The conditioning event (B) always goes in the denominator.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "When a regression question asks which estimate is more reliable (interpolation vs extrapolation), what must you explicitly state?", "answer": "- Step 1: Quote the data range of the independent variable (e.g., $ 24 \\le f \\le 68 $ in Q4(e)).\n- Step 2: Compare the estimate's value to this range:\n  + Interpolation (inside range): Reliable.\n  + Extrapolation (outside range): Unreliable.\n+ Example: Estimating $ f = 55 $ (interpolation) is reliable; $ f = 18 $ (extrapolation) is not.\n\n**Takeaway:** Always state the data range and use the terms \"interpolation\" and \"extrapolation\".", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "How do you handle a conditional probability over multiple attempts (e.g., \"qualified on 2nd throw\")? (3 steps)", "answer": "- Step 1: Compute $ P(\\text{success}) = 1 - P(\\text{fail}) $ (e.g., $ P(S) = 0.6179 $ in Q5(b)).\n- Step 2: Find the joint probability of the sequence (e.g., $ P(F_1 \\cap X_2 > 44) = 0.3821 \\times 0.1587 $).\n- Step 3: Divide by $ P(\\text{qualifies}) = 1 - P(\\text{all 3 fails}) $ to get the conditional probability.\n\n**Takeaway:** The favorable event must be a subset of the condition (denominator).", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "How do you test if events A and B are independent?", "answer": "- Step 1: Calculate $ P(A) \\cdot P(B) $ and $ P(A \\cap B) $.\n- Step 2: Compare the two values:\n  + If equal → independent.\n  + If not equal → not independent.\n+ Example: In Q6(c), both were 0.15 → independent.\n\n**Takeaway:** Independence requires $ P(A \\cap B) = P(A) \\cdot P(B) $.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "What is the formula for $ \\operatorname{Var}(aX + b) $? Why does the additive constant vanish?", "answer": "- Step 1: Variance is unaffected by additive shifts (b) because spread remains the same.\n- Step 2: Variance scales by $ a^2 $ (not a) due to squaring in the definition.\n+ Example: $ \\operatorname{Var}(13X - 6) = 13^2 \\operatorname{Var}(X) = 169 \\times \\frac{165}{169} = 165 $.\n\n**Takeaway:** Only the multiplier (squared) affects variance; additive constants disappear.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "How do you solve a symmetric normal distribution interval like $ P(\\mu - 2k < X < \\mu + 2k) = 0.6 $? (3 steps)", "answer": "- Step 1: Convert to standard normal: $ P(-2k/\\sigma < Z < 2k/\\sigma) = 0.6 $.\n- Step 2: Use symmetry: $ 2\\Phi(2k/\\sigma) - 1 = 0.6 \\Rightarrow \\Phi(2k/\\sigma) = 0.8 $.\n- Step 3: Look up $ z^* $ such that $ \\Phi(z^*) = 0.8 $ (e.g., $ z^* = 0.8416 $), then solve for k.\n\n**Takeaway:** Symmetric probabilities convert to one-tail via $ \\Phi(z) = (1 + P)/2 $.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}], "count": 8}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "S1 Jan 2024 Q1(d) — What's the strategy for estimating probability when the range [8,14) cuts through multiple histogram classes? (3 steps)", "answer": "- Step 1: Identify which classes are partially included (here: [5,9) and [13,15)).\n- Step 2: Calculate proportional frequencies:\n  + For [5,9): (9-8)/4 × 32 = 8 plants\n  + For [13,15): (14-13)/2 × 120 = 60 plants\n- Step 3: Sum all valid frequencies (8+152+60) and compute without-replacement probability: (220/408) × (219/407)\n\nKey intuition: Boundaries splitting classes require weighted contributions based on class width.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "S1 Jan 2024 Q1(c) — Why does mean < median imply negative skew?", "answer": "When mean < median, the long tail extends to lower values. The mean is pulled toward extreme low values that also drag it below the median. This creates a concentration of higher values, making the data negatively skewed.\n\nContrast: Mean > median ⇒ positive skew (tail to higher values).", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "S1 Jan 2024 Q2(c) — How does coding °F→°C affect standard deviation but not PMCC?", "answer": "Standard deviation:\n- Additive constant (-32) doesn't change spread\n- Multiplicative scaling (×5/9) reduces s.d. proportionally\n\nPMCC:\n- Invariant under linear coding with positive multipliers\n- Direction of relationship preserved despite scaling\n\nExample: σ_new = (5/9) × original σ, but r remains 0.849.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "S1 Jan 2024 Q3(d) — What's the trigger phrase that forces conditional probability here?", "answer": "\"Given that a student is right-handed\". This requires:\n$$P(\\text{Y12} \\mid R) = \\frac{P(\\text{Y12} \\cap R)}{P(R)}$$\n\nCritical mistake: Writing P(Y12 ∩ R) = 7/20 (joint probability) instead of dividing by P(R) = 89/100. The phrase \"given that\" always introduces the denominator.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "S1 Jan 2024 Q4(a) — What's the outlier formula and how does it apply to this data?", "answer": "Outlier fences:\n- Lower fence: $Q_1 - 1.5 \\times \\text{IQR}$\n- Upper fence: $Q_3 + 1.5 \\times \\text{IQR}$\n\nFor Spanish marks:\n- $Q_1 = 28$, $Q_3 = 48$, $\\text{IQR} = 20$\n- Upper fence = $48 + 1.5 \\times 20 = 78$\n- Since 90 > 78, it's an outlier.\n\nNote: For small n=11, quartiles are exact values (no interpolation needed).", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "S1 Jan 2024 Q5(b) — How to handle \"given that they qualified\" in a multi-attempt problem?", "answer": "Use conditional probability:\n1. Compute favorable case: P(fail 1st, succeed 2nd with >44m) = 0.3821 × 0.1587 = 0.0606\n2. Compute total qualifying probability: 1 - P(all 3 fails) = 1 - 0.3821³ = 0.9442\n3. Divide: 0.0606 / 0.9442 = 0.0642\n\nKey trick: Recognize that qualifying on 2nd attempt is a subset of all qualifying events.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "S1 Jan 2024 Q6(a) — How to derive 14x + 20y = 13 from P(B | A) = 0.3?", "answer": "- Step 1: Use definition: P(B | A) = P(A ∩ B)/P(A) ⇒ P(A ∩ B) = 0.3x\n- Step 2: Apply addition rule: P(A ∪ B) = x + y - 0.3x = 0.65\n- Step 3: Simplify: 0.7x + y = 0.65 ⇒ 14x + 20y = 13 (×20 both sides)\n\nCommon pitfall: Inverting the conditioning direction (using P(A | B) instead of P(B | A)).", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "S1 Jan 2024 Q7(d) — What's the trick for calculating Var(13X - 6)?", "answer": "- Step 1: Remember: Var(aX + b) = a² Var(X)\n- Step 2: Compute Var(X) from probabilities:\n  + E(X) = 82/26 = 41/13\n  + E(X²) = 284/26 = 142/13\n  + Var(X) = 142/13 - (41/13)² = 165/169\n- Step 3: Apply scaling: Var(13X - 6) = 13² × 165/169 = 165\n\nKey rule: Additive constants disappear; multipliers are squared.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "S1 Jan 2024 Q8(a) — How to convert a symmetric normal interval into a one-tail probability?", "answer": "- Step 1: Start with P(μ - 2k < X < μ + 2k) = 0.6\n- Step 2: Standardize: P(-2k/6 < Z < 2k/6) = 0.6\n- Step 3: Use symmetry: 2Φ(2k/6) - 1 = 0.6 ⇒ Φ(2k/6) = 0.8\n- Step 4: Find z*: Φ⁻¹(0.8) = 0.8416 ⇒ 2k/6 = 0.8416 ⇒ k = 2.52\n\nImportant: Convert two-tail probability (0.6) to one-tail (0.8) before table lookup.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "S1 Jan 2024 Q2(b) — Why does PMCC remain 0.849 after converting °F→°C?", "answer": "PMCC is invariant under linear coding u = a + bx, v = c + dy when b, d > 0. The correlation measures linear relationship strength, which is unaffected by:\n- Units of measurement\n- Additive shifts (like -32)\n- Positive scaling (like ×5/9)\n\nNegative multipliers would flip the sign of r. Here both scales maintain positive direction.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "S1 Jan 2024 Q4(d)(ii) — Why is estimating Spanish marks for f=18 less reliable?", "answer": "f=18 is an extrapolation (outside observed range 24 ≤ f ≤ 68). This is unreliable because:\n1. Linear relationship may not hold outside data range\n2. No evidence supports continuation of trend\n3. Extrapolation risks over/underestimation\n\nInterpolation at f=55 (within range) is more reliable: 51.5 marks.", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "S1 Jan 2024 Q6(c) — How to determine independence between A and B?", "answer": "- Step 1: Compute P(A ∩ B) from conditional: P(B | A)P(A) = 0.3x = 0.15\n- Step 2: Compute P(A)P(B) = 0.5 × 0.3 = 0.15\n- Step 3: Compare: Since P(A ∩ B) = P(A)P(B), A and B are independent\n\nKey mistake: Comparing P(A ∩ B) with P(A ∪ B) instead of the product.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}, {"question": "S1 Jan 2024 Q7(b) — How to derive PMF from CDF?", "answer": "- Step 1: Complete CDF values by substituting k=4\n- Step 2: Calculate P(X=x) = F(x) - F(x-1):\n  + P(1) = 2/26\n  + P(2) = 7/26 - 2/26 = 5/26\n  + P(3) = 13/26 - 7/26 = 6/26\n  + P(4) = 1 - 13/26 = 13/26\n- Step 3: Verify sum = 1: 2+5+6+13 = 26 ✓\n\nImportant: Use F(x-1) from previous value, not cumulative up to x-1.", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": false}, {"question": "S1 Jan 2024 Q8(b) — What's the trick for solving equations with μ and σ?", "answer": "- Step 1: Standardize: P(Y > 3/2μ) = 0.0668 ⇒ μ/2σ = 1.5 (from Φ(1.5) = 0.9332)\n- Step 2: Solve μ = 3σ\n- Step 3: Substitute into 2μ = 3σ²: 6σ = 3σ² ⇒ σ = 2\n- Step 4: Find μ = 3 × 2 = 6\n\nKey check: Reject σ = 0 since standard deviation must be positive.", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "S1 Jan 2024 Q1(a) — Why use frequency density for histograms?", "answer": "Histogram area = frequency. Since class widths vary:\n$$\\text{frequency} = \\text{frequency density} \\times \\text{class width}$$\n\nExample:\n- For 15 ≤ h < 17 (width 2): freq = 32 × 2 = 64\n- For 17 ≤ h < 25 (width 8): freq = 5 × 8 = 40\n\nCheck total: 32+152+120+64+40 = 408 ✓", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": false}, {"question": "S1 Jan 2024 Q5(a) — Why standardize to z = -0.30?", "answer": "Use Z = (X - μ)/σ:\n- X = 38.8, μ = 40, σ = 4\n- z = (38.8 - 40)/4 = -0.30\n\nThis gives P(Z < -0.30) = 1 - Φ(0.30) = 0.3821. The negative z-value indicates below-average performance.", "source": "Qwen 3 ②", "_id": "qwen_2_15", "judge_pick": false}], "count": 16}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "When given a histogram with some bars missing, how do you find the missing frequencies? (Q1a)", "answer": "- Step 1: Read the frequency density from the vertical axis for each missing bar\n- Step 2: Multiply fd by the class width to get frequency\n- Step 3: Example: For 15 ≤ h < 17, fd = 32, width = 2, so freq = 32 × 2 = 64\n\n**Takeaway:** Frequency = fd × class width — this is the inverse of reading from a histogram.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "What is the formula for estimating the median from grouped data using interpolation? (Q1b)", "answer": "- Step 1: Find median position = n/2 (where n is total frequency)\n- Step 2: Find the class containing this position using cumulative frequency\n- Step 3: Apply: Median = L + [(n/2 - F<) / f_class] × w\n  + L = lower class boundary\n  + F< = cumulative frequency before this class\n  + f_class = frequency in the median class\n  + w = class width\n\n**Takeaway:** The median class is identified by cumulative frequency, not raw frequency.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "How do you determine the direction of skew from the mean and median? (Q1c)", "answer": "- Step 1: Compare mean to median numerically\n- Step 2: If mean < median → negative (left) skew (long tail on lower side)\n- Step 3: If mean > median → positive (right) skew (long tail on higher side)\n- Step 4: In this question: mean = 13.2, median ≈ 13.3, so mean < median → negative skew\n\n**Takeaway:** You must state BOTH the direction AND the numerical comparison (mean vs median) for the mark.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "When calculating probability for a range that cuts through class boundaries (e.g., 8 cm to 14 cm), what assumption must you make and how do you apply it? (Q1d)", "answer": "- Step 1: Assume uniform distribution within each class\n- Step 2: For partial classes at the boundaries, calculate the proportion of the class included\n- Step 3: Example: For 5 ≤ h < 9 with width 4, the portion from 8 to 9 is (9-8)/4 = 1/4 of the class\n- Step 4: Multiply this fraction by the class frequency\n\n**Takeaway:** Class boundaries rarely align with probability boundaries — always split proportionally by class width.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": true}, {"question": "What is the probability formula when selecting two items WITHOUT replacement from a population? (Q1d)", "answer": "- Step 1: First pick: probability = favorable/total = n/N\n- Step 2: Second pick: probability = (n-1)/(N-1) — denominator decreases\n- Step 3: Multiply: P(both) = (n/N) × ((n-1)/(N-1))\n- Step 4: Common error: using (n/N)² — this is WITH replacement\n\n**Takeaway:** \"Without replacement\" means the denominator drops by 1 on the second draw.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "What is the formula for Sxx, and how does it differ from the sample formula? (Q2a)", "answer": "- Step 1: Sxx = Σx² - (Σx)²/n (population formula, denominator n)\n- Step 2: This is the formula used throughout S1 — NOT the sample version with (n-1)\n- Step 3: Example: Sxx = 62802 - (862)²/12 = 62802 - 61920.333 = 881.667\n\n**Takeaway:** S1 consistently uses population standard deviation (divide by n), not sample (divide by n-1).", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "How do you calculate the standard deviation from Sxx? (Q2a)", "answer": "- Step 1: σ = √(Sxx/n)\n- Step 2: From Sxx = 881.667, σ = √(881.667/12) = √73.4722 = 8.5716 ≈ 8.57\n- Step 3: Keep one extra figure (8.5716) before rounding to 3 s.f.\n\n**Takeaway:** Quote one extra decimal place before rounding to justify the final 3 s.f. answer.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "What is the formula for the Product Moment Correlation Coefficient (PMCC)? (Q2b)", "answer": "- Step 1: r = Sxy / √(Sxx × Syy)\n- Step 2: This measures linear association between two variables\n- Step 3: Value ranges from -1 to +1; closer to ±1 means stronger linear relationship\n- Step 4: In this question: r = 512.67 / √(881.667 × 413.67) = 512.67/603.948 = 0.849\n\n**Takeaway:** The square root in the denominator makes this trickier than it looks — compute carefully.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "Under linear coding, how do the mean and standard deviation transform? (Q2c)", "answer": "- Step 1: For u = a + bx (linear coding):\n  + Mean transforms: ū = a + bx̄\n  + SD transforms: σ_u = |b| × σ_x\n- Step 2: The additive constant a does NOT affect the SD\n- Step 3: The multiplier b DOES affect the SD (scales it)\n- Step 4: Example: u = (5/9)(x - 32), so σ_u = (5/9) × 8.57 = 4.76 °C\n\n**Takeaway:** Additive shifts leave spread alone; multiplicative scaling changes it.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "Is the PMCC invariant under linear coding? Explain why or why not. (Q2d)", "answer": "- Step 1: Yes, r is invariant under positive linear coding on BOTH variables\n- Step 2: For u = a + bx and v = c + dy with b > 0 and d > 0: r_u,v = r_x,y\n- Step 3: The reason: coding multiplies both Sxx and Syy by b² and d², and Sxy by bd — the ratio remains unchanged\n- Step 4: Here: u = (5/9)(x-32), v = (5/9)(y-32), both multipliers 5/9 > 0, so r = 0.849\n\n**Takeaway:** You must state BOTH the value AND the invariance rule for full marks.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "When completing a probability tree diagram, what must be true at each branch point? (Q3a)", "answer": "- Step 1: Probabilities on branches from the same parent must sum to 1\n- Step 2: Example: If P(L|Year12) = 1/8, then P(R|Year12) = 1 - 1/8 = 7/8\n- Step 3: Similarly: P(L|Year13) = 1/10 → P(R|Year13) = 9/10\n\n**Takeaway:** Always complete the complement branch when given one branch probability.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "How do you find an unknown probability p in a probability tree given overall information? (Q3b)", "answer": "- Step 1: Write the total probability formula combining all paths to the target event\n- Step 2: Example: P(L) = p × (1/8) + (1-p) × (1/10) = 0.11\n- Step 3: Solve the equation: Multiply by LCD (80): 10p + 8(1-p) = 8.8 → 2p = 0.8 → p = 0.4\n- Step 4: Verify: p = 2/5 = 0.4\n\n**Takeaway:** Form one equation from the tree, then solve for p.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "What is the trigger phrase that forces you to use the conditional probability formula P(A|B)? (Q3d)", "answer": "- Step 1: The trigger phrase is \"given that\" or \"conditioned on\"\n- Step 2: Examples: \"Given that a student is right-handed...\", \"Given that they qualified...\"\n- Step 3: When you see this, IMMEDIATELY write: P(A|B) = P(A ∩ B) / P(B)\n- Step 4: The conditioning event B ALWAYS goes in the denominator\n\n**Takeaway:** Never compute P(A ∩ B) when the question asks for P(A|B) — this is the #1 error on this paper.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "What is the correct formula for conditional probability P(Year12 | Right-handed)? (Q3d)", "answer": "- Step 1: P(Year12 | R) = P(Year12 ∩ R) / P(R)\n- Step 2: Numerator: P(Y12 ∩ R) = p × (7/8) = (2/5) × (7/8) = 7/20\n- Step 3: Denominator: P(R) = 1 - P(L) = 1 - 0.11 = 0.89 = 89/100\n- Step 4: Result: (7/20) / (89/100) = 7/20 × 100/89 = 700/1780 = 35/89 ≈ 0.393\n\n**Takeaway:** P(Y12|R) ≠ P(Y12 ∩ R) — the denominator P(R) is essential.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "How do you verify your calculation of P(R) in a probability tree? (Q3d)", "answer": "- Step 1: Route 1 (complement): P(R) = 1 - P(L) = 1 - 0.11 = 0.89\n- Step 2: Route 2 (direct from tree): P(R) = p × (7/8) + (1-p) × (9/10)\n- Step 3: Both must give the same answer — if they don't, there's an arithmetic error\n- Step 4: This cross-check catches mistakes before submission\n\n**Takeaway:** Always verify tree probabilities by two routes — complement vs direct sum.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "What is the formula for detecting outliers using quartiles, and how do you find quartile positions for n = 11? (Q4a)", "answer": "- Step 1: Upper fence = Q3 + 1.5(Q3 - Q1); Lower fence = Q1 - 1.5(Q3 - Q1)\n- Step 2: For n = 11: Q1 position = (n+1)/4 = 12/4 = 3 (integer → use value directly)\n- Step 3: Q3 position = 3(n+1)/4 = 36/4 = 9 (integer → use value directly)\n- Step 4: Example: Sorted Spanish marks → Q1 = 28 (3rd value), Q3 = 48 (9th value)\n\n**Takeaway:** When position is an integer, use that data point directly — no interpolation needed.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "How do you calculate the regression line s on f from summary statistics? (Q4b)", "answer": "- Step 1: Find means: f̄ = Σf/n = 422/10 = 42.2; s̄ = Σs/n = 382/10 = 38.2\n- Step 2: Calculate gradient: b = Sfs/Sff = 1735.6/1667.6 = 1.0408 ≈ 1.04\n- Step 3: Calculate intercept: a = s̄ - b × f̄ = 38.2 - 1.0408 × 42.2 = -5.721 ≈ -5.72\n- Step 4: Write: s = -5.72 + 1.04f\n\n**Takeaway:** Show all four steps (two means, b, a) for the \"show that\" method marks.", "source": "MiniMax ①", "_id": "minima
