x_1_16", "judge_pick": false}, {"question": "How do you interpret the gradient of a regression line in context? (Q4c)", "answer": "- Step 1: The gradient is the predicted change in y per unit increase in x\n- Step 2: For s = -5.72 + 1.04f, gradient = 1.04\n- Step 3: Contextual interpretation: For each additional mark in the French test, the predicted Spanish mark increases by approximately 1.04 marks\n- Step 4: Must include units and context words (\"marks\", \"French\", \"Spanish\")\n\n**Takeaway:** Never just say \"the gradient is 1.04\" — you need the contextual interpretation.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "What is the difference between interpolation and extrapolation, and which is more reliable? (Q4e)", "answer": "- Step 1: Interpolation: predicting within the observed data range (24 ≤ f ≤ 68)\n- Step 2: Extrapolation: predicting outside the observed data range (f = 18 is outside)\n- Step 3: Extrapolation is LESS reliable because the linear relationship may not hold beyond the data\n- Step 4: For f = 55 (within range): reliable; for f = 18 (outside): unreliable\n\n**Takeaway:** Always quote the data range and use the words \"interpolation\" / \"extrapolation\" explicitly.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "How do you standardize a Normal variable, and what is the formula? (Q5a)", "answer": "- Step 1: Z = (X - μ) / σ, where Z ~ N(0,1)\n- Step 2: Example: X = 38.8, μ = 40, σ = 4 → Z = (38.8 - 40)/4 = -1.2/4 = -0.30\n- Step 3: Then use the Normal table: P(X < 38.8) = P(Z < -0.30) = 1 - Φ(0.30)\n- Step 4: = 1 - 0.6179 = 0.3821\n\n**Takeaway:** Always show the z-value calculation AND the table lookup for method marks.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "How do you calculate \"at least one success in n independent trials\"? (Q5b)", "answer": "- Step 1: Use the complement: P(at least one success) = 1 - P(all fail)ⁿ\n- Step 2: Example: P(qualifies in 3 throws) = 1 - P(all fail)³\n- Step 3: P(fail) = P(X < 38.8) = 0.3821\n- Step 4: P(qualifies) = 1 - (0.3821)³ = 1 - 0.0558 = 0.9442\n\n**Takeaway:** The complement method is much cleaner than summing the three cases (first success, second success, third success).", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "In Q5b, what does \"qualified on their second throw\" mean, and how do you calculate this probability? (Q5b)", "answer": "- Step 1: \"Qualified on second throw\" means: throw 1 FAILS AND throw 2 SUCCEEDS (with >44m)\n- Step 2: The event is: F₁ ∩ (X₂ > 44)\n- Step 3: Since throws are independent: P = P(F₁) × P(X₂ > 44)\n- Step 4: = 0.3821 × 0.1587 = 0.06064\n\n**Takeaway:** \"On the second throw\" means the first fails and the second succeeds — not \"second throw succeeds.\"", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "How do you calculate P(second throw >44 | qualified)? (Q5b)", "answer": "- Step 1: This is a CONDITIONAL probability: P(A|B) = P(A ∩ B) / P(B)\n- Step 2: A = \"qualified on 2nd throw with >44\" = F₁ ∩ (X₂ > 44), probability = 0.06064\n- Step 3: B = \"qualified\" (at least one success in 3 throws), probability = 0.9442\n- Step 4: P = 0.06064 / 0.9442 = 0.0642 (3 s.f.)\n\n**Takeaway:** The joint probability 0.0606 is NOT the answer — you need the conditional.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "How do you find P(A ∩ B) from P(B|A)? (Q6a)", "answer": "- Step 1: The formula is: P(A ∩ B) = P(B|A) × P(A)\n- Step 2: Note: P(B|A) has A in the denominator, so multiply by P(A)\n- Step 3: Common error: using P(B|A) × P(B) — this is WRONG\n- Step 4: Example: P(B|A) = 0.3, P(A) = x → P(A ∩ B) = 0.3x\n\n**Takeaway:** The conditioning event goes in the denominator when reading the formula, but in the numerator when computing the intersection.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "How do you derive the equation 14x + 20y = 13 from the given probabilities? (Q6a)", "answer": "- Step 1: Given: P(B|A) = 0.3 → P(A ∩ B) = 0.3x\n- Step 2: Addition rule: P(A ∪ B) = P(A) + P(B) - P(A ∩ B)\n- Step 3: 0.65 = x + y - 0.3x = 0.7x + y\n- Step 4: Multiply by 20: 13 = 14x + 20y ✓\n\n**Takeaway:** Clear decimals by multiplying through to get integer coefficients.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "What does \"mutually exclusive\" mean in probability, and how does it affect calculations? (Q6b)", "answer": "- Step 1: Mutually exclusive (disjoint): P(A ∩ B) = 0\n- Step 2: Therefore: P(A ∪ B) = P(A) + P(B) (no overlap to subtract)\n- Step 3: Here: P(B ∪ C) = P(B) + P(C) = y + (½x + y) = ½x + 2y\n- Step 4: Set equal to 0.85: ½x + 2y = 0.85 → x + 4y = 1.7\n\n**Takeaway:** Mutually exclusive means zero intersection — don't subtract anything.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "How do you test whether two events A and B are statistically independent? (Q6c)", "answer": "- Step 1: Events are independent if P(A ∩ B) = P(A) × P(B)\n- Step 2: Compute both sides numerically:\n  + P(A) × P(B) = 0.5 × 0.3 = 0.15\n  + P(A ∩ B) = 0.3x = 0.3 × 0.5 = 0.15\n- Step 3: Since they're equal, A and B are independent\n- Step 4: Don't confuse with mutually exclusive — that's when P(A ∩ B) = 0\n\n**Takeaway:** Compute BOTH sides numerically and compare — don't just assert independence.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "How do you find the constant k in a CDF given the largest value? (Q7a)", "answer": "- Step 1: For any CDF, F(x_max) = 1 (the cumulative probability reaches 1)\n- Step 2: Here x_max = 4, and F(4) = (k+4)/8\n- Step 3: Set equal to 1: (k+4)/8 = 1 → k + 4 = 8 → k = 4\n- Step 4: This is the \"show that\" step before proceeding\n\n**Takeaway:** The CDF must equal 1 at the largest possible value.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "How do you find the probability distribution P(X = x) from a CDF? (Q7b)", "answer": "- Step 1: P(X = x) = F(x) - F(x-1), where F(x-1) is the previous cumulative value\n- Step 2: For x = 1, use F(0) = 0: P(X=1) = F(1) - F(0) = 1/13 - 0 = 2/26\n- Step 3: For x = 2: P(X=2) = (2k-1)/26 - 1/13 = (2k-1)/26 - 2/26\n- Step 4: Verify: sum of all probabilities must equal 1\n\n**Takeaway:** Always verify the probabilities sum to 1 before proceeding.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "How do you find the mode of a discrete random variable? (Q7c)", "answer": "- Step 1: The mode is the value with the highest probability\n- Step 2: From the distribution: P(X=1)=2/26, P(X=2)=5/26, P(X=3)=6/26, P(X=4)=13/26\n- Step 3: The largest probability is 13/26 at x = 4\n- Step 4: Therefore, mode = 4\n\n**Takeaway:** Mode = the most likely outcome — just pick the highest probability.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "What is the formula for Var(aX + b), and what happens to the constants a and b? (Q7d)", "answer": "- Step 1: Var(aX + b) = a² × Var(X)\n- Step 2: The additive constant b disappears entirely (doesn't affect spread)\n- Step 3: The multiplicative constant a is squared (not just used as-is)\n- Step 4: Common errors: using a × Var(X) (forgot to square) or subtracting b (forgot it vanishes)\n\n**Takeaway:** The additive constant drops out; the multiplier is squared.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "How do you calculate Var(X) for a discrete random variable? (Q7d)", "answer": "- Step 1: First find E(X) = Σ[x × P(X=x)]\n- Step 2: Then find E(X²) = Σ[x² × P(X=x)]\n- Step 3: Then Var(X) = E(X²) - [E(X)]²\n- Step 4: Keep as fractions until the end: E(X) = 41/13, E(X²) = 142/13, Var(X) = 165/169\n\n**Takeaway:** Keep fractions throughout — decimal conversion loses precision and messes up cancellation.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "How do you find k when given P(μ - 2k < X < μ + 2k) = 0.6 for Normal X? (Q8a)", "answer": "- Step 1: This is a symmetric interval about μ\n- Step 2: Convert to Z: P(-2k/σ < Z < 2k/σ) = 0.6, with σ = 6\n- Step 3: By symmetry: 2Φ(2k/6) - 1 = 0.6 → Φ(2k/6) = 0.8\n- Step 4: From inverse Normal table: Φ⁻¹(0.8) = 0.8416 → 2k/6 = 0.8416 → k = 2.52\n\n**Takeaway:** Convert two-tail probability to one-tail: Φ(z) = (1 + 0.6)/2 = 0.8", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "How do you solve the system: 2μ = 3σ² and P(Y > 1.5μ) = 0.0668? (Q8b)", "answer": "- Step 1: Standardize: P(Y > 1.5μ) = P(Z > (1.5μ - μ)/σ) = P(Z > μ/(2σ)) = 0.0668\n- Step 2: So Φ(μ/(2σ)) = 1 - 0.0668 = 0.9332\n- Step 3: From table: Φ(1.5) = 0.9332 → μ/(2σ) = 1.5 → μ = 3σ\n- Step 4: Substitute into 2μ = 3σ²: 2(3σ) = 3σ² → 6σ = 3σ² → σ(σ - 2) = 0\n- Step 5: σ > 0, so σ = 2; then μ = 3 × 2 = 6\n\n**Takeaway:** Reject non-physical roots (σ = 0) explicitly.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "What is the conversion between two-tail probability and one-tail Φ value? (Q8a)", "answer": "- Step 1: For symmetric interval P(|Z| < z) = c\n- Step 2: The conversion is: Φ(z) = (1 + c)/2\n- Step 3: Example: c = 0.6 → Φ(z) = (1 + 0.6)/2 = 0.8\n- Step 4: Example: c = 0.95 → Φ(z) = (1 + 0.95)/2 = 0.975\n\n**Takeaway:** Memorize this conversion — it saves looking up the wrong table value.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}], "count": 35}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "What is the first step when reading frequencies from a histogram, and how do you find the missing frequency for a class with given frequency density? (2 steps)", "answer": "- Step 1: Recall that in a histogram, **area of bar = frequency**, and frequency density (fd) = frequency ÷ class width.\n- Step 2: For a missing frequency, rearrange: frequency = fd × class width. For example, if fd = 32 and class width = 2 (for $15 \\le h < 17$), then frequency = 32 × 2 = 64.\n\n**Key insight:** Never use the height directly—always multiply by the class width to get frequency.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "What is the formula for estimating the median from grouped data, and how do you identify the median class? (2 steps)", "answer": "- Step 1: Median position = n/2. Find the class containing this position using cumulative frequency—it's the first class where cumulative ≥ n/2.\n- Step 2: Median = L + [(n/2 - F<sub><</sub>) / f<sub>class</sub>] × w, where L = lower class boundary, F<sub><</sub> = cumulative frequency before this class, f<sub>class</sub> = frequency in this class, w = class width.\n\n**Example:** With n = 204 in class $13 \\le h < 15$, L = 13, F<sub><</sub> = 184, f = 120, w = 2: median = 13 + (20/120) × 2 = 13.33", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "How do you determine the direction of skew from the mean and median, and what does each direction tell you about the data distribution? (2 steps)", "answer": "- Step 1: Compare mean and median: if mean < median → negative skew; if mean > median → positive skew.\n- Step 2: Negative skew means the long tail is on the lower (left) side—more extreme low values pull the mean down. Positive skew means the tail is on the higher (right) side.\n\n**Why it works:** The mean is pulled toward extreme values more than the median, so the relative positions reveal the tail direction.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "When calculating probability for a range that cuts through class intervals, what assumption must you make, and how do you handle the partial classes? (2 steps)", "answer": "- Step 1: Assume uniform distribution within each class—this is the standard assumption for grouped data problems.\n- Step 2: For partial classes, calculate the proportion of the class width included, then multiply by the full class frequency. For [8,14) with class [5,9): proportion = (9-8)/4 = 1/4, so frequency = 1/4 × 32 = 8.\n\n**Critical point:** Both boundaries (8 and 14) cut classes—you must split both, not treat one as a whole class.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "What is the correct formula for selecting two items without replacement from n items, and why can't you use (n₁/n)²? (1 step)", "answer": "For first pick: probability = n₁/n where n₁ is favorable outcomes. For second pick (without replacement): probability = (n₁-1)/(n-1). The product is: (n₁/n) × ((n₁-1)/(n-1)).\n\n**Why not squared:** (n₁/n)² assumes replacement—the second draw has the same denominator n, not n-1.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "What is the formula for Sₓₓ, and why must you compute it before finding the standard deviation? (2 steps)", "answer": "- Step 1: Sₓₓ = Σx² - (Σx)²/n. This is the corrected sum of squares using the population formula.\n- Step 2: Standard deviation σ = √(Sₓₓ/n). You need Sₓₓ first because σ² = Sₓₓ/n, so σ = √(Sₓₓ/n).\n\n**Common trap:** Using sample formula (n-1) instead of population formula (n)—S1 uses population formula throughout.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "When applying a linear transformation u = a + bx to data, how do the mean and standard deviation change? What is the intuition? (2 steps)", "answer": "- Step 1: Mean transforms exactly: ū = a + b x̄. Standard deviation scales: σᵤ = |b| σₓ. Variance scales: σᵤ² = b² σₓ².\n- Step 2: The additive constant a shifts all data but doesn't change spread. The multiplicative constant b stretches/shrinks the spread—since variance is average squared deviation, it gets multiplied by b².\n\n**Example:** u = (5/9)(x - 32): mean becomes (5/9)(x̄ - 32), but σᵤ = (5/9)σₓ—the -32 disappears from the spread.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "What does it mean that the product moment correlation coefficient r is \"invariant under linear coding,\" and what are the conditions? (2 steps)", "answer": "- Step 1: If you apply u = a + bx and v = c + dy to data (with b > 0 and d > 0), then r<sub>u,v</sub> = r<sub>x,y</sub>.\n- Step 2: The correlation measures strength of linear relationship—it doesn't change when you add constants (shift) or multiply by positive constants (scale). The positivity condition matters: if b or d were negative, r would flip sign.\n\n**Why it matters:** Temperature in °F vs °C has the same correlation as the original data.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "When a probability tree gives you one branch probability, how do you find its complement branch? What must sum to 1? (1 step)", "answer": "For any node, the branches must sum to 1. If Year 12 has probability p, then Year 13 has probability 1-p. If left-handed at Year 12 is 1/8, then right-handed is 1 - 1/8 = 7/8.\n\n**Key point:** Always write both branches explicitly—one as given, one as the complement.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "When given the total probability of an outcome across multiple branches (like P(L) = 0.11), what equation do you form and how do you solve it? (2 steps)", "answer": "- Step 1: Write P(L) = (Year 12 probability × P(L|Year 12)) + (Year 13 probability × P(L|Year 13)). This is the law of total probability applied to the tree.\n- Step 2: Substitute: 0.11 = p × (1/8) + (1-p) × (1/10). Multiply by 40 (LCM of 8 and 10) to clear denominators: 0.11 × 40 = 5p + 4(1-p) = 4.4 = 4 + p, so p = 0.4.\n\n**Verification:** Always check p is between 0 and 1.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "What is the trigger phrase that demands the conditional probability formula P(A|B) = P(A∩B)/P(B), and what is the most common mistake? (2 steps)", "answer": "- Step 1: The trigger phrase is \"given that\" or \"knowing that\"—these words mean the conditioning event is in the denominator. Example: \"Given that a student is right-handed, find probability they're in Year 12.\"\n- Step 2: The common mistake is giving P(A ∩ B) as the answer instead of P(A|B). Phuc wrote p × 7/8 = 7/20 for P(Y12|R)—that's the joint, not conditional. You MUST divide by P(B).\n\n**Why it matters:** P(Y12|R) ≠ P(Y12 ∩ R)—the conditional is a proportion of the \"given\" event's probability space.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "When computing P(A|B), how can you find P(B) by two different methods to check your arithmetic? (2 steps)", "answer": "- Step 1: Method 1 (complement): P(B) = 1 - P(B'). This works if you know P(B').\n- Step 2: Method 2 (direct from tree): Sum all branches that lead to B. For P(R): p × (7/8) + (1-p) × (9/10). These MUST give the same answer—if they don't, there's an arithmetic error.\n\n**Verification tip:** Always cross-check using both methods in exam—the mark scheme often expects this.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "What are the quartile positions for n = 11, and what do you do when the position is an integer versus a non-integer? (2 steps)", "answer": "- Step 1: For n = 11: Q₁ position = (n+1)/4 = 12/4 = 3; Q₃ position = 3(n+1)/4 = 36/4 = 9. Both are integers.\n- Step 2: When position is integer, take that data value directly. When non-integer (e.g., position 3.5), interpolate: average the 3rd and 4th values.\n\n**Key insight:** S1 uses (n+1)/4, not n/4—this is crucial for correct quartile values.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "What is the outlier detection rule, and how do you apply it to identify if 90 is an outlier for Spanish marks? (3 steps)", "answer": "- Step 1: Calculate IQR = Q₃ - Q₁. For Spanish marks with n = 11: Q₁ = 28 (position 3), Q₃ = 48 (position 9), so IQR = 20.\n- Step 2: Upper fence = Q₃ + 1.5 × IQR = 48 + 1.5 × 20 = 48 + 30 = 78. Lower fence = Q₁ - 1.5 × IQR.\n- Step 3: Since 90 > 78, 90 is above the upper fence → it's an outlier.\n\n**Remember:** The rule applies to each variable independently—checking if one coordinate is an outlier in its own distribution.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "What are the formulas for the regression line coefficients b (gradient) and a (intercept), and what is the correct order of calculation? (3 steps)", "answer": "- Step 1: First find means: x̄ = Σx/n, ȳ = Σy/n.\n- Step 2: Calculate gradient b = S<sub>xy</sub>/S<sub>xx</sub>. Always do this before a—you need b first.\n- Step 3: Calculate intercept a = ȳ - b x̄. Watch the sign: if b x̄ > ȳ, then a is negative.\n\n**Common error:** Computing a = b x̄ - ȳ (wrong order) or using S<sub>yy</sub> instead of S<sub>xx</sub> in the denominator.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "What makes a regression estimate \"reliable\" versus \"unreliable,\" and what vocabulary must you use in the answer? (2 steps)", "answer": "- Step 1: Interpolation = estimating within the observed range of x values. Extrapolation = estimating outside this range.\n- Step 2: Interpolation is more reliable because we know the linear relationship holds within the data. Extrapolation assumes the relationship continues beyond observed data—this is not guaranteed. Always quote the data range: for French marks 24 ≤ f ≤ 68, f = 55 is interpolation but f = 18 is extrapolation.\n\n**Exam tip:** Use the words \"interpolation\" and \"extrapolation\" explicitly—examiners look for these terms.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "What is the standardisation formula, and how do you use it to find P(X < 38.8) when X ~ N(40, 4²)? (2 steps)", "answer": "- Step 1: Standardise: Z = (X - μ)/σ. For X ~ N(40, 16): Z = (38.8 - 40)/4 = -1.2/4 = -0.30.\n- Step 2: P(X < 38.8) = P(Z < -0.30) = 1 - Φ(0.30). From tables, Φ(0.30) ≈ 0.6179, so P = 1 - 0.6179 = 0.3821.\n\n**Key point:** Always convert to Z first, then use the standard normal table. Remember Φ(-z) = 1 - Φ(z).", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "When an athlete has 3 independent attempts to qualify (success probability p), what is P(qualifies), and why use the complement? (2 steps)", "answer": "- Step 1: P(qualifies) = 1 - P(all 3 fail) = 1 - (1-p)³.\n- Step 2: It's easier to compute \"all fail\" (one case) than to sum the cases of \"exactly 1 success\" + \"exactly 2 successes\" + \"exactly 3 successes\" (three cases). With p = 0.6179: 1 - 0.3821³ = 1 - 0.0558 = 0.9442.\n\n**Why it works:** Simpler calculation with fewer terms—the complement avoids casework.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "For \"qualified on second throw with >44m given they qualified,\" what is the event structure and what is the conditional formula? (3 steps)", "answer": "- Step 1: Event A = \"qualified on 2nd throw with >44m\" = throw 1 fails AND throw 2 > 44m. This equals P(F₁) × P(X₂ > 44) = 0.3821 × 0.1587 = 0.06064.\n- Step 2: Event B = \"qualified\" = at least one success in 3 throws = 0.9442.\n- Step 3: P(A|B) = P(A ∩ B)/P(B). Since A ⊂ B (qualifying on 2nd implies qualifying), P(A ∩ B) = P(A). So P = 0.06064/0.9442 = 0.0642.\n\n**Critical:** The joint probability (0.0606) is NOT the answer—you MUST divide by P(qualifies).", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "Given P(B|A) = 0.3 and P(A) = x, how do you find P(A ∩ B)? What is the common mistake? (1 step)", "answer": "P(A ∩ B) = P(B|A) × P(A) = 0.3 × x.\n\n**Common mistake:** Writing P(A ∩ B) = 0.3 × y (using P(B) instead of P(A)). The conditioning event A is in the denominator of P(B|A), so it multiplies P(A), not P(B).", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "How do you derive the equation 14x + 20y = 13 from P(A) = x, P(B) = y, P(A ∪ B) = 0.65, and P(B|A) = 0.3? (3 steps)", "answer": "- Step 1: From P(B|A) = 0.3: P(A ∩ B) = 0.3 × P(A) = 0.3x.\n- Step 2: From addition rule: P(A ∪ B) = P(A) + P(B) - P(A ∩ B). Substitute: 0.65 = x + y - 0.3x = 0.7x + y.\n- Step 3: Multiply by 20 to clear decimals: 13 = 14x + 20y. This matches the \"show that\" form.\n\n**Why multiply by 20:** The fractions 0.7 and 0.65 become integers—20 is LCM of denominators 10 and 20.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "What does \"mutually exclusive\" mean in probability, and how does it simplify the addition formula? (1 step)", "answer": "Mutually exclusive (disjoint) events have P(A ∩ B) = 0. Therefore P(A ∪ B) = P(A) + P(B). There's no intersection term to subtract.\n\n**Contrast with independent:** Independence concerns intersection = product of probabilities; mutually exclusive concerns intersection = 0.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "How do you test whether events A and B are statistically independent? What must you compute and compare? (2 steps)", "answer": "- Step 1: Compute P(A) × P(B) numerically. With x = 0.5, y = 0.3: P(A) × P(B) = 0.5 × 0.3 = 0.15.\n- Step 2: Compute P(A ∩ B) numerically. From P(B|A) = 0.3: P(A ∩ B) = 0.3 × 0.5 = 0.15. Since they are equal, A and B are independent.\n\n**Common error:** Testing P(A ∪ B) = P(A) + P(B)—that's the mutually exclusive test, not independence.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "For a discrete random variable, how do you find P(X = x) from the cumulative distribution function F(x)? (2 steps)", "answer": "- Step 1: For discrete data: P(X = x) = F(x) - F(x-1), where F(x-1) is the CDF at the previous value.\n- Step 2: Always verify that ΣP(X = x) = 1. For example: P(X=1) = F(1) - F(0) = 2/26 - 0 = 2/26; P(X=2) = F(2) - F(1) = 7/26 - 2/26 = 5/26; etc. Sum = (2+5+6+13)/26 = 26/26 = 1.\n\n**Key point:** F(0) = 0 for discrete distributions starting at x = 1.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "What is the formula for Var(aX + b), and what happens to the constants a and b? (1 step)", "answer": "Var(aX + b) = a² × Var(X). The additive constant b disappears entirely—it doesn't appear in the variance. The multiplicative constant a gets squared.\n\n**Why b disappears:** Variance measures spread around the mean. Adding b shifts the mean but doesn't change the spread. Multiplying by a scales the spread by a.\n\n**Example:** Var(13X - 6) = 13² × Var(X) = 169 × Var(X). The \"-6\" is irrelevant.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "What are the steps to calculate Var(X) for a discrete random variable, and why keep fractions until the end? (3 steps)", "answer": "- Step 1: Calculate E(X) = Σx × P(X=x). Keep as fraction: (1×2 + 2×5 + 3×6 + 4×13)/26 = 82/26 = 41/13.\n- Step 2: Calculate E(X²) = Σx² × P(X=x) = (1×2 + 4×5 + 9×6 + 16×13)/26 = 284/26 = 142/13.\n- Step 3: Var(X) = E(X²) - [E(X)]² = 142/13 - (41/13)² = (142×13 - 1681)/169 = 165/169. Keeping fractions allows clean cancellation—converting to decimals too early loses precision.\n\n**Final answer:** Var(13X - 6) = 169 × (165/169) = 165—an integer!", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "Given P(μ - 2k < X < μ + 2k) = 0.6 with σ = 6, how do you find k? What is the conversion to Φ? (3 steps)", "answer": "- Step 1: Standardise: P(-2k/6 < Z < 2k/6) = 0.6. This is a symmetric interval about 0.\n- Step 2: For symmetric intervals: P(|Z| < z) = 2Φ(z) - 1. So 2Φ(z) - 1 = 0.6 → Φ(z) = 0.8.\n- Step 3: From inverse normal tables, Φ⁻¹(0.8) = 0.8416. So 2k/6 = 0.8416 → k = 2.52.\n\n**Key insight:** You MUST convert the two-tail probability 0.6 to one-tail Φ = 0.8 before looking up. Using Φ⁻¹(0.6) = 0.2533 would be wrong.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": true}, {"question": "Given P(Y > 1.5μ) = 0.0668 and Φ(1.5) = 0.9332, how do you find the equation relating μ and σ? (2 steps)", "answer": "- Step 1: Standardise: P(Y > 1.5μ) = P(Z > (1.5μ - μ)/σ) = P(Z > μ/(2σ)) = 0.0668.\n- Step 2: So Φ(μ/(2σ)) = 1 - 0.0668 = 0.9332. Since Φ(1.5) = 0.9332, we have μ/(2σ) = 1.5 → μ = 3σ.\n\n**Memorise:** Φ(1.5) = 0.9332 is a key table value that appears frequently.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "Given μ = 3σ and 2μ = 3σ², how do you solve for σ? What roots must you reject? (2 steps)", "answer": "- Step 1: Substitute μ = 3σ into 2μ = 3σ²: 2(3σ) = 3σ² → 6σ = 3σ² → 3σ² - 6σ = 0 → 3σ(σ - 2) = 0.\n- Step 2: Solutions: σ = 0 or σ = 2. Reject σ = 0 because standard deviation must be positive. So σ = 2, μ = 3(2) = 6.\n\n**Why reject zero:** σ = 0 would mean no variance—a degenerate distribution, not a normal distribution.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}], "count": 29}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "S1 Jan 2024 Q1(a) — when a histogram gives you frequency densities and class widths, what's the first equation you write down, and why does it work?", "answer": "Frequency density is defined as $$\\text{fd} = \\frac{\\text{frequency}}{\\text{class width}}$$, so frequency = fd × width. This works because in a histogram the **area** of each bar (not the height) represents frequency — heights alone would be misleading for unequal-width classes.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "What's the quick sanity check you must do immediately after filling in a frequency table from a histogram?", "answer": "Sum all frequencies and verify they equal the stated total $$n$$ (here 408). Mismatch means you've misread a frequency density off the histogram. This takes 5 seconds and catches a common careless error before it cascades into the next sub-part.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "What's the formula for the median of grouped data by linear interpolation, and what does each symbol mean?", "answer": "$$\\text{Median} = L + \\frac{(n/2) - F_<}{f_{\\text{class}}} \\times w$$ where:\n- $$L$$ = lower bound of the median class\n- $$n/2$$ = the median position (S1 uses $$n/2$$ for grouped data, NOT $$(n+1)/2$$)\n- $$F_<$$ = cumulative frequency BEFORE the median class\n- $$f_{\\text{class}}$$ = frequency of the median class\n- $$w$$ = width of the median class\n\nThe fraction $$(n/2 - F_<)/f_{\\text{class}}$$ is the proportion through the median class assuming uniform distribution within it.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "S1 grouped-data median: should you use position $$n/2$$ or $$(n+1)/2$$? Why? (2 steps)", "answer": "- Step 1: For **grouped/continuous** data use $$n/2$$ directly — this is the Edexcel S1 convention because you're locating a position on a continuous cumulative frequency curve, not picking a discrete value.\n- Step 2: For **discrete/raw** data (like Q4's outlier quartiles), use $$(n+1)/4$$, $$(n+1)/2$$, $$3(n+1)/4$$ because you're selecting actual data points from a sorted list.\n\nMixing these up is a classic error — same paper, different formula based on data type.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "How do you identify the median CLASS from a cumulative frequency table?", "answer": "Compute $$n/2$$, then find the first class whose **cumulative** frequency equals or exceeds $$n/2$$. Use cumulative — NOT raw — frequencies. The median class is the one containing the $$n/2$$-th value, which means the running total crosses $$n/2$$ inside it.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "If mean = 13.2 and median ≈ 13.3, what's the skew direction, and what's the one-line reason you must give?", "answer": "**Negatively skewed** because **mean < median**. The intuition: a long lower tail drags the mean below the median (the mean is sensitive to extreme values; the median is not). For a positive mark you must explicitly state the numerical comparison — saying just \"negative skew\" loses the reason mark.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "What's the relationship between mean, median, and skew direction?", "answer": "- Mean > median → **positive** skew (long upper tail pulls mean up)\n- Mean < median → **negative** skew (long lower tail pulls mean down)\n- Mean ≈ median → roughly symmetric\n\nThe mean is dragged by extreme values; the median resists. So the mean sits on the same side as the long tail.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "S1 Jan 2024 Q1(d) — the question asks for probability between 8 cm and 14 cm, but neither boundary lies at a class edge. What's the trick? (3 steps)", "answer": "- Step 1: Recognise that 8 and 14 **cut through** existing classes ($$[5,9)$$ and $$[13,15)$$). You CANNOT just count whole-class frequencies.\n- Step 2: Assume **uniform distribution within each class**, so the count in a partial class equals (proportion of class width covered) × (class frequency).\n+ From $$[5,9)$$: covering $$[8,9)$$ means $$\\frac{9-8}{4} \\times 32 = 8$$\n+ Whole class $$[9,13)$$: $$152$$\n+ From $$[13,15)$$: covering $$[13,14)$$ means $$\\frac{14-13}{2} \\times 120 = 60$$\n- Step 3: Add → 220 plants in $$[8,14)$$, giving probability $$220/408$$ per draw.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "\"Two plants are chosen at random\" — what's the trigger phrase that tells you to use without-replacement probability, and what's the formula?", "answer": "\"Chosen at random\" without the word \"with replacement\" defaults to **without replacement**. The formula for both being in event $$E$$ is $$\\frac{k}{n} \\times \\frac{k-1}{n-1}$$ where $$k$$ is the favourable count and $$n$$ is the total. The denominator drops by 1 because one plant has already been removed.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "Why is $$(220/408)^2$$ the WRONG calculation for \"probability both plants are between 8 and 14 cm\"?", "answer": "Squaring assumes **with replacement** (independent draws from the same population). The question implicitly samples without replacement — once you pick one plant, the pool shrinks to 407 with 219 favourable. The correct expression is $$\\frac{220}{408} \\times \\frac{219}{407}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "What's the formula for $$S_{xx}$$ from raw summary statistics, and why does this form appear in S1?", "answer": "$$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$. This is the \"computational\" form of $$\\sum(x - \\bar{x})^2$$ — algebraically identical but uses raw sums directly so you don't have to compute each $$(x_i - \\bar{x})$$. S1 always gives you $$\\sum x$$ and $$\\sum x^2$$, so this form is the working tool.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "What's the S1 formula for population standard deviation from $$S_{xx}$$? Does S1 use $$n$$ or $$n-1$$ in the denominator?", "answer": "$$\\sigma_x = \\sqrt{\\frac{S_{xx}}{n}}$$ — Edexcel S1 uses **population** s.d. (denominator $$n$$), NOT the sample formula (denominator $$n-1$$). Using $$n-1$$ is a common silent error that loses marks even when the working looks fine.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "S1 Jan 2024 Q2(a)(ii) — for a \"show that the standard deviation is 8.57\" question, how many intermediate lines must you show?", "answer": "At least three: (1) compute $$S_{xx}$$ with substituted numbers, (2) divide by $$n$$, (3) take the square root and state to one extra figure (e.g., 8.5716) before rounding to 8.57. \"Show that\" questions are graded on the algebraic chain — just writing $$\\sigma = 8.57$$ loses 2 of 3 marks.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "What's the formula for the product moment correlation coefficient $$r$$?", "answer": "$$r = \\frac{S_{xy}}{\\sqrt{S_{xx} \\cdot S_{yy}}}$$. It's a dimensionless number between $$-1$$ and $$+1$$ measuring linear association strength. The denominator normalises by the spreads in both variables so $$r$$ is unitless and scale-invariant.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "Under what coding transformation is the PMCC invariant, and why?", "answer": "PMCC is invariant under any **positive linear coding** $$u = a + bx$$, $$v = c + dy$$ with $$b, d > 0$$. Why: adding constants $$a, c$$ shifts the means but not the deviations; multiplying by $$b, d$$ scales both numerator $$S_{xy}$$ and denominator $$\\sqrt{S_{xx}S_{yy}}$$ by the same factor $$bd$$, which cancels. If either $$b$$ or $$d$$ is negative, $$r$$ keeps magnitude but flips sign.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "For coding $$u = a + bx$$, what happens to the mean and what happens to the standard deviation?", "answer": "- Mean: $$\\bar{u} = a + b\\bar{x}$$ (both shifts and scaling apply)\n- Standard deviation: $$\\sigma_u = |b|\\sigma_x$$ (ONLY the multiplier applies; the additive constant $$a$$ has NO effect on spread)\n\nThe intuition: shifting every data point left or right by $$a$$ moves the whole distribution but doesn't change how spread out it is. Multiplying by $$b$$ stretches the distribution by factor $$|b|$$.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "Convert mean and s.d. of $$x$$ (°F) to °C using $$c = \\frac{5}{9}(f - 32)$$. Why does the $$-32$$ disappear from the s.d. calculation? (2 steps)", "answer": "- Step 1: Mean: apply the full transformation → $$\\bar{c} = \\frac{5}{9}(\\bar{x} - 32)$$.\n- Step 2: S.d.: the $$-32$$ is an additive shift, which doesn't change spread; only the multiplier $$\\frac{5}{9}$$ matters → $$\\sigma_c = \\frac{5}{9}\\sigma_x$$.\n\nIntuition: subtracting 32 from every temperature just relabels the axis — every pair of points is still the same distance apart.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "For \"state the PMCC between coded variables, giving a reason\" — what TWO things must your answer contain?", "answer": "(1) The numerical value of $$r$$ (same as the uncoded $$r$$), AND (2) the **rule** (\"PMCC is invariant under positive linear coding\" or \"because both coding multipliers are positive\"). Stating just the number loses the reason mark. The examiner wants evidence you know WHY $$r$$ is unchanged, not just that it is.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": true}, {"question": "S1 Jan 2024 Q3(d) — what's the **trigger phrase** that forces you to use the conditional probability formula?", "answer": "**\"Given that …\"** Any sentence beginning with \"given that $$B$$\" (or \"if $$B$$ has occurred\", or \"for someone who is $$B$$\") demands you write $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$. Phuc's mark-losing error on this exact question was treating the joint $$P(A \\cap B)$$ as the final answer, forgetting to divide by $$P(B)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "What's the first formula you write on the page when you see \"given that $$B$$ occurred, find the probability of $$A$$\" — BEFORE substituting any numbers?", "answer": "$$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$\n\nWriting this down first locks in the structure: you NEED a numerator (intersection) and a denominator ($$P(B)$$). It prevents the most common error — returning the intersection as the final answer.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "Why is $$p \\times \\frac{7}{8}$$ the wrong answer to \"given that the student is right-handed, find the probability they are in Year 12\"?", "answer": "$$p \\times \\frac{7}{8}$$ traces a path down the tree: Year 12 AND right-handed. That's the **joint** probability $$P(\\text{Y12} \\cap R)$$, not the conditional $$P(\\text{Y12} \\mid R)$$. The conditional must be divided by $$P(R)$$ (the probability of the conditioning event), which restricts the sample space to right-handers only.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": true}, {"question": "When computing $$P(R)$$ for a conditional probability denominator, what's the best practice to catch arithmetic slips?", "answer": "Compute $$P(R)$$ by **two independent routes** and verify they match:\n- Route 1 (complement): $$P(R) = 1 - P(L)$$\n- Route 2 (direct sum down the tree): $$P(\\text{Y12}) \\cdot P(R \\mid \\text{Y12}) + P(\\text{Y13}) \\cdot P(R \\mid \\text{Y13})$$\n\nIf they disagree, there's an arithmetic error you can catch BEFORE locking in the wrong answer.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "S1 Jan 2024 Q3(b) — how do you set up the equation for $$p$$ from \"the probability that a student is left-handed is 0.11\"? (2 steps)", "answer": "- Step 1: Recognise that \"probability of L\" means the total probability summed down both branches: $$P(L) = P(\\text{Y12}) \\cdot P(L \\mid \\text{Y12}) + P(\\text{Y13}) \\cdot P(L \\mid \\text{Y13})$$.\n- Step 2: Substitute the tree values: $$p \\cdot \\frac{1}{8} + (1-p) \\cdot \\frac{1}{10} = 0.11$$, then solve linearly for $$p$$.\n\nClearing denominators (multiply by 80 here) avoids fraction arithmetic errors.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "What's a common mistake when writing the conditional probability formula — which direction goes in the denominator?", "answer": "The **conditioning event** (the one after \"given\") goes in the denominator. So \"$$P(A \\mid B)$$\" means \"given $$B$$\" → denominator is $$P(B)$$. A common error is flipping it: writing $$P(A \\mid B) = P(A \\cap B)/P(A)$$. Mnemonic: the event you're \"given\" reduces your sample space, so its probability scales the calculation.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "S1 Jan 2024 Q4(a) — for $$n = 11$$ discrete data values, where are quartile positions located and do they require interpolation? (2 steps)", "answer": "- Step 1: For raw discrete data, $$Q_1$$ position = $$(n+1)/4 = 3$$ and $$Q_3$$ position = $$3(n+1)/4 = 9$$ — both **integers**.\n- Step 2: Integer positions → use the actual data values at those positions directly. No interpolation needed. So $$Q_1 = 28$$ (3rd value), $$Q_3 = 48$$ (9th value).\n\nIf the position were non-integer (e.g., $$n = 10$$ gives position 2.75), you'd interpolate between adjacent values.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "What's the outlier rule using the IQR, and what's the intuition?", "answer": "An outlier is any value above $$Q_3 + 1.5 \\cdot \\text{IQR}$$ or below $$Q_1 - 1.5 \\cdot \\text{IQR}$$, where $$\\text{IQR} = Q_3 - Q_1$$. The intuition: the middle 50% of the data spans the IQR; reaching more than 1.5 IQRs beyond either quartile is statistically unusual under most reasonable distributions, flagging the value as suspicious.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": false}, {"question": "For a regression line $$y = a + bx$$ with summary statistics, what are the formulas for slope $$b$$ and intercept $$a$$? (2 steps)", "answer": "- Step 1: Slope first: $$b = \\frac{S_{xy}}{S_{xx}}$$ — measures change in $$y$$ per unit change in $$x$$.\n- Step 2: Intercept: $$a = \\bar{y} - b\\bar{x}$$ — ensures the regression line passes through the point $$(\\bar{x}, \\bar{y})$$.\n\nAlways compute $$b$$ first; $$a$$ depends on it.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "How do you interpret the gradient $$b$$ of a regression line for a \"1-mark interpretation\" question?", "answer": "Use **units and context**, not generic words. For $$s = -5.72 + 1.04f$$ on French/Spanish marks: \"For each additional mark in the French test, the predicted Spanish mark increases by approximately 1.04 marks.\" Saying just \"the gradient is 1.04\" or \"as French increases, Spanish increases\" loses the mark — you must tie the rate to specific named variables.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "What's the difference between interpolation and extrapolation in regression, and which is reliable?", "answer": "- **Interpolation**: predicting at an $$x$$-value **inside** the observed data range — reliable, because the linear model was fitted on similar data.\n- **Extrapolation**: predicting at an $$x$$-value **outside** the observed range — unreliable, because there's no evidence the linear relationship continues outside the sampled region.\n\nFor a \"more reliable\" exam answer: quote the data range explicitly and use the words \"interpolation\" / \"extrapolation\".", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": true}, {"question": "Why might the slope $$a$$ of a regression line be negative even when the slope $$b$$ is positive?", "answer": "$$a = \\bar{y} - b\\bar{x}$$, so $$a < 0$$ whenever $$b\\bar{x} > \\bar{y}$$ — i.e., when the line, projected back to $$x = 0$$, would have to dip below zero to maintain the slope. This is common when neither variable can realistically be zero (like exam marks) and the $$x$$-values are far from zero. A negative intercept isn't an error.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "What's the formula for the standard normal probability $$P(X < a)$$ when $$X \\sim N(\\mu, \\sigma^2)$$?", "answer": "Standardise: $$Z = \\frac{X - \\mu}{\\sigma} \\sim N(0,1)$$, so $$P(X < a) = P\\!\\left(Z < \\frac{a - \\mu}{\\sigma}\\right) = \\Phi\\!\\left(\\frac{a - \\mu}{\\sigma}\\right)$$. The $$z$$-score measures how many standard deviations $$a$$ is from $$\\mu$$, and $$\\Phi$$ is the standard normal CDF you look up in tables.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "Variance is 36 — what is the standard deviation, and why is this an easy slip?", "answer": "$$\\sigma = \\sqrt{36} = 6$$, NOT 36. The slip happens because both are spread parameters; under exam pressure students sometimes use variance directly in the $$z$$-score denominator $$(x - \\mu)/\\sigma$$, which destroys the calculation. Always check: did the question say variance or s.d.?", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "S1 Jan 2024 Q5(b) — what's the structural trap when computing \"probability of qualifying on the 2nd throw with distance > 44, given that they qualified\"? (3 steps)", "answer": "- Step 1: \"Given that they qualified\" → conditional formula required. Write $$P(A \\mid Q) = P(A \\cap Q)/P(Q)$$ first.\n- Step 2: The favourable event \"qualified on 2nd throw with >44\" is automatically a subset of \"qualified\", because $$X > 44 \\Rightarrow X > 38.8$$ (the qualifying threshold). So $$P(A \\cap Q) = P(\\text{throw 1 fails}) \\cdot P(\\text{throw 2} > 44)$$, NOT a separate intersection.\n- Step 3: Denominator $$P(Q) = 1 - P(\\text{all 3 fail})$$ — use the complement for \"at least one succeeds\".\n\nThe trap is reporting the joint $$P(F_1) \\cdot P(X_2 > 44)$$ without dividing by $$P(Q)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "Why is \"throw 2 > 44\" already a subset of \"throw 2 qualifies\" (qualifies = throw > 38.8)?", "answer": "If $$X > 44$$, then automatically $$X > 38.8$$ since $$44 > 38.8$$. So a throw exceeding 44 m automatically clears the qualifying threshold. Treating \"throw 2 succeeds\" and \"throw 2 > 44\" as two separate conditions to multiply would be **double-counting** the same event.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "What's the formula for \"at least one success in $$n$$ independent trials\"?", "answer": "$$P(\\text{at least one success}) = 1 - P(\\text{fail})^n$$. The intuition: it's far simpler to compute the complement (all fail, a single product) and subtract from 1 than to sum the probabilities of \"exactly 1\", \"exactly 2\", … successes. Requires independence — stated in the question.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": true}, {"question": "Why is computing $$P(\\text{qualifies}) = 1 - 0.3821^3$$ preferable to summing cases?", "answer": "Summing cases requires breaking \"qualifies\" into three disjoint events: succeeds on throw 1, fails-then-succeeds on throw 2, fails-fails-succeeds on throw 3. That's three terms with increasing combinatorial complexity. The complement $$1 - P(\\text{fail})^3$$ is a single product — cleaner, faster, less error-prone.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "What's the formula for $$P(A \\cap B)$$ when you know $$P(B \\mid A)$$?", "answer": "$$P(A \\cap B) = P(B \\mid A) \\cdot P(A)$$. Rearranged from the conditional formula. Useful when the question gives you a conditional probability (\"given $$A$$, the probability of $$B$$ is …\") and asks for the joint or a quantity involving the joint.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "S1 Jan 2024 Q6(a) — given $$P(B \\mid A) = 0.3$$ and $$P(A) = x$$, what is $$P(A \\cap B)$$? Watch the direction.", "answer": "$$P(A \\cap B) = P(B \\mid A) \\cdot P(A) = 0.3 \\cdot x = 0.3x$$, NOT $$0.3y$$. The conditioning is on $$A$$, so $$P(A)$$ (which is $$x$$) multiplies the conditional. A common error is to multiply by the wrong probability — always rewrite the conditional formula explicitly before substituting.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": false}, {"question": "What's the addition rule for $$P(A \\cup B)$$, and what does it become for mutually exclusive events? (2 steps)", "answer": "- Step 1: General: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$. The subtraction corrects for double-counting the overlap region.\n- Step 2: Mutually exclusive: by definition $$P(A \\cap B) = 0$$ (they can't both occur), so $$P(A \\cup B) = P(A) + P(B)$$.\n\nThe \"$$-P(A \\cap B)$$\" term is the visual overlap of two circles in a Venn diagram.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "Independence vs mutually exclusive — what's the test for each, and how are they different?", "answer": "- **Independence**: $$P(A \\cap B) = P(A) \\cdot P(B)$$. Means knowing $$A$$ tells you nothing about $$B$$. Concerns the intersection product.\n- **Mutually exclusive**: $$P(A \\cap B) = 0$$. Means $$A$$ and $$B$$ cannot both happen. Concerns the intersection being zero.\n\nThese are almost opposites: mutually exclusive events with positive probabilities are NEVER independent (knowing one happened guarantees the other didn't, which is maximal dependence).", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": true}, {"question": "How do you test whether two events are independent, given the probabilities $$P(A)$$, $$P(B)$$, $$P(A \\cap B)$$? (2 steps)", "answer": "- Step 1: Compute both $$P(A) \\cdot P(B)$$ and $$P(A \\cap B)$$ numerically — show each value explicitly.\n- Step 2: State whether they are equal. If equal → independent. If unequal → not independent.\n\nExaminer wants both numbers AND a conclusion sentence. Don't just assert \"they are independent\" without showing the comparison.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "S1 Jan 2024 Q6(b) — the question states $$B$$ and $$C$$ are mutually exclusive. How does this give you a second equation in $$x$$ and $$y$$?", "answer": "Mutually exclusive means $$P(B \\cap C) = 0$$, so $$P(B \\cup C) = P(B) + P(C)$$. Substituting the given expressions: $$0.85 = y + (\\tfrac{1}{2}x + y) = \\tfrac{1}{2}x + 2y$$, which becomes $$x + 4y = 1.7$$. The mutually exclusive condition is the key — without it you'd need $$P(B \\cap C)$$, which isn't given.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "What's the formula for $$P(X = x)$$ from a discrete cumulative distribution function $$F(x)$$?", "answer": "$$P(X = x) = F(x) - F(x-1)$$ — each probability is the \"jump\" in the CDF at that point. The CDF accumulates probability as $$x$$ increases, so the difference between consecutive CDF values gives the probability at each point.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "What value does the CDF $$F(x)$$ of a discrete random variable take at its **largest** $$x$$? Why?", "answer": "$$F(x_{\\max}) = 1$$, because the CDF is the cumulative probability up to and including $$x$$, and by the time you reach the largest value, you've accumulated ALL the probability (total mass = 1). This is the standard trick to solve for an unknown parameter $$k$$ in the CDF — set the last entry equal to 1.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": true}, {"question": "S1 Jan 2024 Q7(a) — how do you find $$k$$ from a parameter-dependent CDF table?", "answer": "Set the largest CDF value equal to 1. Given $$F(4) = \\frac{k+4}{8}$$, you set $$\\frac{k+4}{8} = 1 \\Rightarrow k = 4$$. This works because $$F$$ must reach 1 at the largest $$x$$-value — non-negotiable axiom of a CDF.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": false}, {"question": "How do you check that a probability distribution you've computed is valid?", "answer": "Sum all $$P(X = x)$$ and confirm they equal 1. For Q7: $$\\frac{2 + 5 + 6 + 13}{26} = \\frac{26}{26} = 1$$ ✓. This catches arithmetic errors in computing $$F(x) - F(x-1)$$ across fractions with different denominators. A 5-second check that saves many marks.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": false}, {"question": "What's the mode of a discrete random variable, and how do you read it off the probability distribution?", "answer": "The mode is the value of $$x$$ with the **highest probability**. Read it directly off the table — no calculation needed. For Q7, $$P(X=4) = 13/26$$ is the largest, so mode = 4.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": false}, {"question": "What's the formula for variance of a discrete random variable, and which form is computational?", "answer": "$$\\operatorname{Var}(X) = E(X^2) - (E(X))^2$$ — the computational form. The conceptual form $$E[(X-\\mu)^2]$$ is algebraically identical but harder to compute. You first need $$E(X) = \\sum x P(X=x)$$ and $$E(X^2) = \\sum x^2 P(X=x)$$, then subtract the square of the mean from the mean of the square.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": false}, {"question": "What's the rule for $$\\operatorname{Var}(aX + b)$$? Why does the $$b$$ disappear? (2 steps)", "answer": "- Step 1: $$\\operatorname{Var}(aX + b) = a^2 \\operatorname{Var}(X)$$.\n- Step 2: The $$+b$$ shifts every value by the same constant, leaving spread unchanged. The multiplier $$a$$ stretches deviations by factor $$a$$, which squares to $$a^2$$ when measuring squared deviations (variance is in squared units).\n\nSame principle as coding s.d.: additive shifts don't affect spread; multiplicative factors do, and they SQUARE for variance.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": false}, {"question": "S1 Jan 2024 Q7(d) — what's the common wrong answer for $$\\operatorname{Var}(13X - 6)$$, and what's the right one?", "answer": "- Wrong: $$13 \\cdot \\operatorname{Var}(X) - 6$$ (treating it like a mean) or $$13 \\cdot \\operatorname{Var}(X)$$ (forgetting to square the multiplier).\n- Right: $$13^2 \\cdot \\operatorname{Var}(X) = 169 \\cdot \\operatorname{Var}(X)$$. The $$-6$$ vanishes (additive constant), and the 13 squares to 169.\n\nIf $$\\operatorname{Var}(X) = 165/169$$, then the 169 cancels cleanly to give 165 — an integer answer is a strong signal you've done it correctly.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": false}, {"question": "Why should you keep $$E(X)$$ and $$E(X^2)$$ as fractions (not decimals) when computing variance for $$\\operatorname{Var}(13X - 6)$$?", "answer": "Decimals introduce rounding errors that prevent the final cancellation. The factor $$13^2 = 169$$ in $$\\operatorname{Var}(13X - 6)$$ often cancels with a 169 in the denominator of $$\\operatorname{Var}(X)$$ — visible only if you've kept things as fractions. Converting early gives a messy decimal that obscures the clean integer answer.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": false}, {"question": "What's $$E(aX + b)$$ for constants $$a, b$$?", "answer": "$$E(aX + b) = aE(X) + b$$. Unlike variance, the additive constant DOES carry through to the expected value, because expectation is linear. Both scaling AND shifting affect the mean; only scaling affects variance/s.d.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": false}, {"question": "S1 Jan 2024 Q8(a) — for a symmetric interval $$P(\\mu - 2k < X < \\mu + 2k) = 0.6$$, what's the trick to convert to a one-tail probability? (2 steps)", "answer": "- Step 1: By symmetry, $$P(|Z| < z) = 2\\Phi(z) - 1$$. So if $$P(|Z| < z) = c$$, then $$\\Phi(z) = (1+c)/2$$.\n- Step 2: Substituting $$c = 0.6$$: $$\\Phi(z) = 1.6/2 = 0.8$$. NOW look up $$\\Phi^{-1}(0.8) = 0.8416$$ in the inverse normal table.\n\nThe trap is looking up $$\\Phi^{-1}(0.6)$$ directly — that's wrong because 0.6 is the symmetric two-tail probability, not a one-tail value.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": false}, {"question": "What's the algebraic identity $$P(|Z| < z) = ?$$ in terms of $$\\Phi$$?", "answer": "$$P(|Z| < z) = P(-z < Z < z) = \\Phi(z) - \\Phi(-z) = \\Phi(z) - (1 - \\Phi(z)) = 2\\Phi(z) - 1$$. The middle step uses the symmetry of the standard normal: $$\\Phi(-z) = 1 - \\Phi(z)$$. Memorise this — it's the bridge between two-tail and one-tail probabilities.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": false}, {"question": "S1 Jan 2024 Q8(b) — given a relation $$2\\mu = 3\\sigma^2$$ and a probability condition, what's the strategy for finding both $$\\mu$$ and $$\\sigma$$? (3 steps)", "answer": "- Step 1: Standardise the probability condition to get one equation in $$\\mu$$ and $$\\sigma$$. E.g., $$P(Y > \\tfrac{3}{2}\\mu) = 0.0668$$ gives $$\\Phi(\\mu/2\\sigma) = 0.9332$$, so $$\\mu/2\\sigma = 1.5$$ → $$\\mu = 3\\sigma$$.\n- Step 2: Substitute into the algebraic relation $$2\\mu = 3\\sigma^2$$ to get a single equation in $$\\sigma$$: $$6\\sigma = 3\\sigma^2 \\Rightarrow \\sigma(\\sigma - 2) = 0$$.\n- Step 3: Reject non-physical root ($$\\sigma = 0$$ isn't a valid s.d.), keep $$\\sigma = 2$$, back-substitute for $$\\mu = 6$$.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": false}, {"question": "When solving for $$\\sigma$$ and you get a quadratic with roots $$\\sigma = 0$$ and $$\\sigma = 2$$, which do you keep, and what must you write?", "answer": "Keep $$\\sigma = 2$$ and reject $$\\sigma = 0$$ **explicitly** with a one-line justification: \"$$\\sigma > 0$$ (s.d. must be positive), so $$\\sigma = 2$$.\" Just dropping the root without comment can cost a method mark — examiners want evidence you understand which root is physically meaningful.", "source": "Opus 4.7 ①", "_id": "opus_1_55", "judge_pick": false}, {"question": "What's $$\\Phi(1.5)$$ and why should you memorise it?", "answer": "$$\\Phi(1.5) = 0.9332$$ — an \"exact\" tabled value that appears frequently in S1 problems. Memorising the most common $$\\Phi$$ values ($$\\Phi(1) = 0.8413$$, $$\\Phi(1.5) = 0.9332$$, $$\\Phi(1.96) = 0.975$$, $$\\Phi(1.645) = 0.95$$) saves ~30 seconds per Normal sub-part by skipping the table lookup.", "source": "Opus 4.7 ①", "_id": "opus_1_56", "judge_pick": false}, {"question": "What's a fast way to recognise when $$\\Phi(\\text{something}) = 0.9332$$ in a problem?", "answer": "Memorise: $$\\Phi(1.5) = 0.9332$$. So whenever you see 0.9332 as a target (or its complement 0.0668), the $$z$$-score is 1.5. Other memorable: $$\\Phi(1) = 0.8413$$, $$\\Phi(0.84) \\approx 0.80$$, $$\\Phi(1.28) \\approx 0.90$$, $$\\Phi(1.645) = 0.95$$.", "source": "Opus 4.7 ①", "_id": "opus_1_57", "judge_pick": false}, {"question": "For a \"show that the equation is $$14x + 20y = 13$$\" question, what's the strategy?", "answer": "Work in fractions or in the natural form first (here: $$0.65 = 0.7x + y$$), then **multiply through to clear decimals** to match the target form. Multiplying by 20: $$13 = 14x + 20y$$. Always work toward the form the question demands — examiner expects to see the same coefficients they wrote.", "source": "Opus 4.7 ①", "_id": "opus_1_58", "judge_pick": false}, {"question": "In the simultaneous equation pair $$14x + 20y = 13$$ and $$x + 4y = 1.7$$, what's a clean elimination strategy? (3 steps)", "answer": "- Step 1: Multiply the second equation by 5 to align the $$y$$-coefficient: $$5x + 20y = 8.5$$.\n- Step 2: Subtract from the first equation: $$(14x - 5x) + (20y - 20y) = 13 - 8.5 \\Rightarrow 9x = 4.5 \\Rightarrow x = 0.5$$.\n- Step 3: Back-substitute into either equation to find $$y = 0.3$$.\n\nChoosing the multiplier to match the $$y$$-coefficient eliminates $$y$$ in one subtraction step.", "source": "Opus 4.7 ①", "_id": "opus_1_59", "judge_pick": false}, {"question": "Why is it dangerous to give a final answer like \"around 0.06\" for a conditional probability question?", "answer": "Two reasons: (1) the joint probability $$P(F_1 \\cap [X_2 > 44]) = 0.0606$$ looks very similar to the correct conditional $$0.0642$$, so just reporting \"0.06\" might match the wrong target; (2) most S1 questions demand 3 s.f. — under-precise answers lose accuracy marks. Always compute to one extra figure, then round at the final step.", "source": "Opus 4.7 ①", "_id": "opus_1_60", "judge_pick": false}, {"question": "What's the difference between the position formulas for quartiles in S1: $$(n+1)/4$$ vs $$n/4$$? When do you use each?", "answer": "- $$(n+1)/4$$: for **discrete/raw data** (a list of $$n$$ values). The \"+1\" accounts for the position being on the list of data, not on a continuous scale.\n- $$n/4$$: for **grouped/continuous data** (frequency tables, histograms). You're interpolating on a cumulative frequency curve, which is treated as continuous.\n\nMixing these costs marks and can shift the median class on a borderline case.", "source": "Opus 4.7 ①", "_id": "opus_1_61", "judge_pick": true}, {"question": "S1 Jan 2024 paper — what is the SINGLE highest-leverage habit that would unlock the most marks per paper?", "answer": "**Whenever \"given that\" appears, immediately write $$P(A \\mid B) = P(A \\cap B)/P(B)$$ on the page BEFORE substituting any numbers.** This locks in the structure (need both numerator AND denominator) and prevents the most common S1 error: reporting the joint as the final answer. On this paper alone, that habit unlocks 2 marks on Q3(d) and 3 marks on Q5(b).", "source": "Opus 4.7 ①", "_id": "opus_1_62", "judge_pick": false}, {"question": "For a \"show that\" question, what's the minimum number of algebraic lines you must show, and why?", "answer": "At least three: (1) the setup with substituted symbols, (2) one intermediate simplification step, (3) the final result. \"Show that\" awards method marks for the algebraic chain — writing just the final number typically gets 1 of 3 marks. Quote one extra decimal place before the final rounding (e.g., 8.5716 → 8.57) to justify the precision.", "source": "Opus 4.7 ①", "_id": "opus_1_63", "judge_pick": false}, {"question": "When a histogram question asks for probability between two values, what mental check tells you whether to use whole-class frequencies or proportional splitting?", "answer": "Check whether the boundaries align with class edges. If \"between 9 and 13 cm\" matches a class boundary exactly, use the whole-class frequency. If \"between 8 and 14 cm\" cuts through classes ($$[5,9)$$ and $$[13,15)$$), you must split by class width assuming **uniform distribution within each class**.", "source": "Opus 4.7 ①", "_id": "opus_1_64", "judge_pick": true}, {"question": "What's the proportional-splitting formula when a query range cuts through a class?", "answer": "$$\\text{count in partial range} = \\frac{\\text{width of partial range}}{\\text{width of full class}} \\times \\text{class frequency}$$. Example: for class $$[5,9)$$ with frequency 32 and query range $$[8,9)$$, count = $$\\frac{9-8}{9-5} \\times 32 = \\frac{1}{4} \\times 32 = 8$$.\n\nBuilt on uniform-within-class assumption.", "source": "Opus 4.7 ①", "_id": "opus_1_65", "judge_pick": false}, {"question": "Why doesn't \"median by interpolation\" use the $$(n+1)/2$$ formula, even though \"quartile of raw data\" does?", "answer": "Median by interpolation applies to **grouped/continuous** data, where you treat cumulative frequency as a continuous function of $$x$$. The position $$n/2$$ corresponds to the $$x$$-value where the CDF equals 0.5. Adding 1 (which is a discrete-data correction for picking from a list) is conceptually wrong here. Mixing the formulas is a common silent error.", "source": "Opus 4.7 ①", "_id": "opus_1_66", "judge_pick": true}, {"question": "What's the structural difference between \"qualifies for the final\" (Q5(b)) and a simple two-event conditional like Q3(d)?", "answer": "Q3(d) is a **single-shot** scenario: one student selected, two events (Y12, R) at once. Q5(b) is **multi-stage**: three sequential throws with a stopping rule (qualifies → stops). You must define each attempt explicitly, use independence across throws to multiply joint probabilities, and use the complement for \"at least one in 3\". Same conditional formula, more complex sub-event computation.", "source": "Opus 4.7 ①", "_id": "opus_1_67", "judge_pick": true}, {"question": "Why is the \"at-least-one\" complement trick crucial for the qualifying-probability denominator?", "answer": "Computing $$P(\\text{qualifies})$$ directly requires summing three disjoint cases: succeed on throw 1; fail-then-succeed on throw 2; fail-fail-succeed on throw 3. That's $$0.6179 + 0.3821 \\cdot 0.6179 + 0.3821^2 \\cdot 0.6179$$. The complement $$1 - 0.3821^3$$ is a single product — faster and less error-prone. Both give the same answer; the complement is just better engineering.", "source": "Opus 4.7 ①", "_id": "opus_1_68", "judge_pick": true}, {"question": "For PMCC invariance under coding, what happens to $$r$$ if ONE of the multipliers is negative?", "answer": "$$r$$ flips sign but keeps magnitude. E.g., if $$u = 3x$$ (positive multiplier) and $$v = -2y$$ (negative multiplier), then $$r_{u,v} = -r_{x,y}$$. PMCC is invariant in MAGNITUDE under all linear coding; the SIGN is preserved only when both multipliers have the same sign (i.e., the product $$bd > 0$$).", "source": "Opus 4.7 ①", "_id": "opus_1_69", "judge_pick": true}, {"question": "\"$$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$\" — what's the right tool to compare against to test independence, and what's the wrong one?", "answer": "- **Right**: Independence test uses $$P(A \\cap B)$$ (the INTERSECTION). Check if $$P(A \\cap B) = P(A) \\cdot P(B)$$.\n- **Wrong**: Comparing $$P(A \\cup B)$$ to $$P(A) + P(B)$$ is the test for **mutually exclusive**, not independence.\n\nConfusing union with intersection is a common conceptual mix-up — they're different operations and signal different properties.", "source": "Opus 4.7 ①", "_id": "opus_1_70", "judge_pick": false}, {"question": "S1 Jan 2024 Q4(e) — for \"which estimate is more reliable\" what's the exam-mark-scheme phrasing you must use?", "answer": "State explicitly: (1) the data range (e.g., $$24 \\le f \\le 68$$), (2) which estimate is **interpolation** (inside range — reliable) vs **extrapolation** (outside range — unreliable), and (3) name the values that fall inside vs outside. Vague phrasing like \"55 is closer to the data\" loses the reason mark.", "source": "Opus 4.7 ①", "_id": "opus_1_71", "judge_pick": false}, {"question": "Why is $$P(R) = 1 - P(L)$$ a valid shortcut on the probability tree for Q3(d)?", "answer": "Every student is either left-handed OR right-handed (the two outcomes partition the sample space, and they're mutually exclusive). So $$P(L) + P(R) = 1$$, giving $$P(R) = 1 - P(L) = 1 - 0.11 = 0.89$$. This complement route avoids the longer direct sum down the tree — but you should still verify both routes match to catch arithmetic slips.", "source": "Opus 4.7 ①", "_id": "opus_1_72", "judge_pick": true}, {"question": "What's the relationship between variance and standard deviation, and why is this distinction critical in Normal distribution problems?", "answer": "$$\\text{variance} = \\sigma^2$$, so $$\\sigma = \\sqrt{\\text{variance}}$$. Critical because the $$z$$-score formula $$z = (x - \\mu)/\\sigma$$ uses **s.d. in the denominator**, NOT variance. If the question says \"variance = 36\", you MUST take $$\\sigma = 6$$, not use 36. Many students lose marks by skipping this conversion under pressure.", "source": "Opus 4.7 ①", "_id": "opus_1_73", "judge_pick": false}], "count": 74}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "S1 Jan 2024 Q1(a) — what's the trigger that tells you to use frequency density rather than reading frequency directly off a histogram?", "answer": "The y-axis of a histogram is **frequency density** ($$\\text{fd} = \\text{frequency}/\\text{class width}$$), not frequency. The frequency you want is the **area** of the bar: $$\\text{freq} = \\text{fd} \\times \\text{class width}$$.\n\nThe motivation: histograms with unequal class widths would visually distort the data if you plotted raw frequency, because a wider class would look bigger even if it contained fewer data per unit. Frequency density normalises this so that area (not height) represents frequency.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "S1 Jan 2024 Q1(a) — after computing all frequencies from a histogram, what sanity check should you immediately perform before moving on?", "answer": "Sum all class frequencies and check they equal the stated total $$n$$ (here, 408). If they don't add up, you've misread a frequency density bar — go back and re-check. This 5-second check catches reading errors before they propagate into median, mean, and probability calculations downstream.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "S1 Jan 2024 Q1(b) — when computing a median by interpolation for grouped data with $$n = 408$$, what position do you use and why is it different from discrete data? (2 steps)", "answer": "- Step 1: Use $$n/2 = 204$$ directly, NOT $$(n+1)/2$$. For **grouped (continuous) data**, we treat the data as continuous so the median position is just $$n/2$$.\n- Step 2: Contrast with **discrete** ungrouped data (like Q4's quartiles), where positions use $$(n+1)/4$$, $$(n+1)/2$$, $$3(n+1)/4$$. The $$+1$$ accounts for picking actual values from a list.\n\nThe trigger: histogram/grouped frequency table → $$n/2$$. Raw list of $$n$$ values → $$(n+1)/2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": true}, {"question": "S1 Jan 2024 Q1(b) — what's the median-by-interpolation formula and what does each symbol mean?", "answer": "$$\\text{Median} = L + \\dfrac{(n/2) - F_<}{f_{\\text{class}}} \\times w$$ where:\n- $$L$$ = lower boundary of the median class\n- $$F_<$$ = cumulative frequency BEFORE the median class\n- $$f_{\\text{class}}$$ = frequency OF the median class\n- $$w$$ = class width\n\nThe motivation: you've located the median class via cumulative frequency, and now you assume the data are uniformly distributed within that class to \"interpolate\" how far along the class the median sits. The fraction $$\\dfrac{(n/2)-F_<}{f_{\\text{class}}}$$ is the proportional distance into the class.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "S1 Jan 2024 Q1(c) — what's the rule for determining skew direction from mean and median, and how do you justify it for the mark?", "answer": "- Step 1: Compare mean and median numerically. Here, mean = 13.2 < median ≈ 13.3.\n- Step 2: Rule: **mean < median ⇒ negative skew**; **mean > median ⇒ positive skew**. (Mean is pulled toward the long tail.)\n- Step 3: For the mark, you MUST state both the direction AND the numerical comparison: \"Negatively skewed because mean (13.2) < median (13.3).\" Just stating \"negative skew\" loses the reason mark.\n\nThe intuition: the mean is sensitive to extreme values, so the tail \"drags\" the mean toward itself. A long lower tail pulls the mean below the median → negative skew.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "S1 Jan 2024 Q1(d) — what's the conceptual trap when the question asks for the probability that a plant's height is \"between 8 cm and 14 cm\"? (3 steps)", "answer": "- Step 1: Recognise that 8 and 14 do NOT coincide with class boundaries — they cut THROUGH existing classes ($$[5,9)$$ and $$[13,15)$$). You cannot just sum whole-class frequencies.\n- Step 2: Assume data are uniformly distributed within each class. For a class that's partially included, take a proportional fraction: $$\\dfrac{\\text{included width}}{\\text{class width}} \\times \\text{class frequency}$$.\n- Step 3: For $$[8,14)$$: take $$\\tfrac{1}{4}$$ of class $$[5,9)$$, ALL of $$[9,13)$$, then $$\\tfrac{1}{2}$$ of $$[13,15)$$.\n\nThe pitfall: students see \"between 8 and 14\" and grab whatever whole classes overlap, getting badly wrong counts.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "S1 Jan 2024 Q1(d) — once you know the count in $$[8,14)$$ is 220 out of 408, what's the formula for \"both plants in this range\" and what's the common error?", "answer": "- Step 1: Without replacement: $$P = \\dfrac{220}{408} \\times \\dfrac{219}{407}$$. The denominator drops by 1 on the second pick because one plant has been removed.\n- Step 2: Common error: writing $$\\left(\\dfrac{220}{408}\\right)^2$$ (with-replacement formula). The phrase \"two plants chosen at random\" from a finite population implies without replacement.\n- Step 3: The trigger: \"chosen\" from a finite, fixed population → without replacement unless stated otherwise.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "S1 Jan 2024 Q2(a)(ii) — for a \"show that the standard deviation is 8.57\", what's the minimum chain of working required for full method marks?", "answer": "- Step 1: Compute $$S_{xx} = \\sum x^2 - \\dfrac{(\\sum x)^2}{n}$$ explicitly with numbers substituted in.\n- Step 2: Then $$\\sigma_x = \\sqrt{S_{xx}/n}$$ shown explicitly.\n- Step 3: Quote one extra figure (e.g. 8.5716) BEFORE rounding to justify the 3 s.f. answer 8.57.\n\nThe pitfall: just writing \"$$\\sigma = 8.57$$\" with no intermediate scores you 1 of 3 marks. \"Show that\" questions are gated by visible working, not the final answer.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "What's the difference between $$\\sigma_x = \\sqrt{S_{xx}/n}$$ and $$s_x = \\sqrt{S_{xx}/(n-1)}$$, and which does Edexcel S1 use?", "answer": "Edexcel S1 uses the **population** formula $$\\sigma_x = \\sqrt{S_{xx}/n}$$ (divisor $$n$$). The $$n-1$$ version is the **sample** s.d. (Bessel's correction), used elsewhere in statistics but NOT in this syllabus.\n\nThe intuition: $$n-1$$ corrects for the bias when using a sample to estimate a population parameter, but S1 treats the given data as the population itself. Pitfall: using your calculator's \"$$s$$\" button instead of \"$$\\sigma$$\" — they differ.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "S1 Jan 2024 Q2(c) — under the coding $$c = \\tfrac{5}{9}(f - 32)$$, how do you transform the mean and the standard deviation, and what's the conceptual reason they behave differently? (3 steps)", "answer": "- Step 1: Mean: apply the whole formula. $$\\bar{c} = \\tfrac{5}{9}(\\bar{f} - 32)$$.\n- Step 2: S.d.: ONLY the multiplier scales it. $$\\sigma_c = \\tfrac{5}{9}\\sigma_f$$. The $$-32$$ does NOT appear.\n- Step 3: Reason: a standard deviation measures **spread** around the mean. Shifting every value by the same amount (the $$-32$$) leaves the spread unchanged — every point moves identically, so distances between them are preserved. Only stretching/scaling (the $$\\times 5/9$$) changes spread.\n\nThe general rule: $$u = a + bx \\Rightarrow \\bar{u} = a + b\\bar{x},\\ \\sigma_u = |b|\\sigma_x$$.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": true}, {"question": "S1 Jan 2024 Q2(d) — what's the rule about how PMCC behaves under linear coding, and what mark-scheme phrasing must you use to get both marks?", "answer": "- Step 1: Rule: **PMCC is invariant under positive linear coding** $$u = a + bx$$, $$v = c + dy$$ when $$b, d > 0$$. So $$r_{u,v} = r_{x,y}$$ exactly — quote the same numerical value.\n- Step 2: For the second mark, state BOTH the value AND the reason: \"$$r_{u,v} = 0.849$$ because PMCC is unchanged under (positive) linear coding.\"\n- Step 3: Sign caveat: if either $$b$$ or $$d$$ were negative, $$r$$ would flip sign. Here both are $$5/9 > 0$$, so sign is preserved.\n\nIntuition: PMCC measures the strength of the linear relationship, which doesn't depend on the units of measurement.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": true}, {"question": "Why does adding a constant to every data value not change the standard deviation, but multiplying does?", "answer": "S.d. measures **distance from the mean**. If you add 5 to every value, the mean also shifts up by 5, so the gap between each point and the mean is unchanged. The \"spread\" is invariant under translation.\n\nBut if you multiply every value by 2, the mean also doubles AND the distance of every point from the mean doubles too — the spread literally stretches. So $$\\sigma$$ scales by $$|b|$$ and variance by $$b^2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "S1 Jan 2024 Q3(d) — what's the trigger phrase in the question, and what formula MUST appear on your page before you compute anything? (3 steps)", "answer": "- Step 1: Trigger phrase: \"**given that** a student is right-handed\". Whenever you see \"given that $$B$$\", the question is asking for $$P(A \\mid B)$$.\n- Step 2: Immediately write $$P(A \\mid B) = \\dfrac{P(A \\cap B)}{P(B)}$$ on the page BEFORE substituting numbers. This is the load-bearing habit.\n- Step 3: The conditioning event ($$B$$, here \"right-handed\") goes in the DENOMINATOR — never invert.\n\nThe most common mark-loss error: writing $$P(\\text{Y12}) \\times P(R \\mid \\text{Y12}) = p \\times \\tfrac{7}{8}$$ as the final answer. That's the joint probability $$P(\\text{Y12} \\cap R)$$, NOT the conditional $$P(\\text{Y12} \\mid R)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "S1 Jan 2024 Q3(d) — what are the two routes to compute $$P(R)$$ for the denominator, and why should you compute both?", "answer": "- Step 1: **Route 1 (complement)**: $$P(R) = 1 - P(L) = 1 - 0.11 = 0.89$$.\n- Step 2: **Route 2 (direct from tree)**: sum the two paths leading to R: $$P(R) = p \\cdot \\tfrac{7}{8} + (1-p) \\cdot \\tfrac{9}{10}$$.\n- Step 3: Compute both as a cross-check — if they disagree, you've made an arithmetic slip somewhere in the tree (probably in part (a) or (b)). Catching the error here is far cheaper than continuing with a wrong number.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "What's the fundamental difference between a joint probability $$P(A \\cap B)$$ and a conditional probability $$P(A \\mid B)$$?", "answer": "- Step 1: $$P(A \\cap B)$$ asks: out of the whole sample space, what fraction has BOTH $$A$$ and $$B$$ happening?\n- Step 2: $$P(A \\mid B)$$ asks: I've already restricted to the world where $$B$$ happened; within THAT restricted world, what fraction also has $$A$$?\n- Step 3: Mathematically, $$P(A \\mid B)$$ \"renormalises\" by dividing by $$P(B)$$, because the new sample space has shrunk to just the $$B$$ outcomes. So $$P(A \\mid B) = \\dfrac{P(A \\cap B)}{P(B)} \\ge P(A \\cap B)$$ in general.\n\nTrigger: \"given that\" or \"if we know that\" → conditional.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "S1 Jan 2024 Q3(b) — what algebraic trick clears the messy fractions when solving $$p \\cdot \\tfrac{1}{8} + (1-p) \\cdot \\tfrac{1}{10} = 0.11$$?", "answer": "- Step 1: Multiply BOTH sides by the LCM of the denominators (here, 80).\n- Step 2: This gives $$10p + 8(1-p) = 0.11 \\times 80 = 8.8$$, which is decimal-light and linear.\n- Step 3: Then expand: $$2p + 8 = 8.8 \\Rightarrow p = 0.4$$.\n\nMotivation: keeping fractions in their original form is error-prone. Clearing denominators upfront converts a fractional equation into a clean linear one.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "S1 Jan 2024 Q4(a) — for $$n = 11$$ data points, what are the quartile positions and what's the special feature here? (2 steps)", "answer": "- Step 1: For **discrete (ungrouped) data**, use positions $$\\dfrac{n+1}{4}$$ and $$\\dfrac{3(n+1)}{4}$$.\n- Step 2: With $$n = 11$$: positions are $$3$$ and $$9$$ — both **integers**, so no interpolation is needed; you just read off the 3rd and 9th values from the sorted list.\n\nThe contrast: if positions came out non-integer (e.g. $$n = 10 \\Rightarrow$$ positions 2.75, 8.25), you'd interpolate between adjacent values. The integer case is a \"freebie\" — make sure to recognise it.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "What's the outlier-fence rule and how do you decide if a value is an outlier? (3 steps)", "answer": "
