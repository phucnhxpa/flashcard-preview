Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "Given a discrete RV $$X$$ with pmf $$P(X=1) = 2/26$$, $$P(X=2) = 5/26$$, $$P(X=3) = 6/26$$, $$P(X=4) = 13/26$$, what is the mode?", "answer": "The mode is the value with the highest probability. Here $$P(X = 4) = 13/26$$ is largest, so the mode is 4. Unlike for continuous data, the discrete mode is unambiguous when one probability dominates — just pick the $$x$$ with maximum $$P(X=x)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": false}, {"question": "State the variance formula $$\\operatorname{Var}(X) = E(X^2) - (E(X))^2$$ and explain why this identity holds. (2 steps)", "answer": "- Step 1: By definition, $$\\operatorname{Var}(X) = E[(X - \\mu)^2]$$. Expanding: $$E[X^2 - 2\\mu X + \\mu^2] = E(X^2) - 2\\mu E(X) + \\mu^2$$.\n- Step 2: Since $$E(X) = \\mu$$, the middle term becomes $$-2\\mu^2$$ and combining: $$E(X^2) - 2\\mu^2 + \\mu^2 = E(X^2) - \\mu^2 = E(X^2) - (E(X))^2$$.\n\nThis computational form requires only $$E(X)$$ and $$E(X^2)$$, both single-pass sums.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": false}, {"question": "State the rule for $$\\operatorname{Var}(aX + b)$$ and explain why the additive constant disappears. (2 steps)", "answer": "- Step 1: $$\\operatorname{Var}(aX + b) = a^2 \\operatorname{Var}(X)$$.\n- Step 2: Adding a constant $$b$$ shifts every outcome of $$X$$ by the same amount — distances between outcomes (and from the mean) are unchanged. Variance measures spread, which is translation-invariant. The multiplier $$a$$ stretches every deviation by $$|a|$$, so squared deviations stretch by $$a^2$$.\n\nThe minus sign in $$13X - 6$$ is irrelevant; only the coefficient of $$X$$ matters (and only its square).", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": false}, {"question": "Conceptually compute $$\\operatorname{Var}(13X - 6)$$ for a discrete RV $$X$$ with $$\\operatorname{Var}(X) = 165/169$$. (2 steps)", "answer": "- Step 1: Apply $$\\operatorname{Var}(aX + b) = a^2 \\operatorname{Var}(X)$$: the $$-6$$ vanishes, the $$13$$ squares to $$169$$.\n- Step 2: $$\\operatorname{Var}(13X - 6) = 169 \\times \\frac{165}{169} = 165$$.\n\nThe clean cancellation is a signal that you've kept fractions correctly. If your answer comes out as a messy decimal, suspect an arithmetic error upstream.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": true}, {"question": "Why is it advisable to keep $$E(X)$$ and $$E(X^2)$$ as fractions with a common denominator until the very end of a variance calculation?", "answer": "Discrete RVs in S1 often have pmf's with rational probabilities (like $$\\frac{k}{26}$$). Keeping fractions means $$\\operatorname{Var}(X)$$ ends up as a clean fraction whose denominator cancels with the variance-scaling factor (e.g., $$169$$). Converting to decimals early introduces rounding errors and obscures the structural cancellation. The integer or clean fractional final answer is a sanity-check signal.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": false}, {"question": "For a symmetric interval around the mean of a normal variable, $$P(\\mu - 2k < X < \\mu + 2k) = 0.6$$, what is the standard manipulation to find $$k$$? (3 steps)", "answer": "- Step 1: Standardise: $$P\\left(-\\frac{2k}{\\sigma} < Z < \\frac{2k}{\\sigma}\\right) = 0.6$$.\n- Step 2: By symmetry, $$P(|Z| < z) = 2\\Phi(z) - 1$$, so $$2\\Phi(2k/\\sigma) - 1 = 0.6$$, giving $$\\Phi(2k/\\sigma) = 0.8$$.\n- Step 3: Inverse-lookup: $$\\Phi^{-1}(0.8) \\approx 0.8416$$, so $$2k/\\sigma = 0.8416$$ and solve for $$k$$.\n\nThe two-tail-to-one-tail conversion $$\\Phi(z) = (1 + c)/2$$ where $$c$$ is the central probability is the critical move.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": true}, {"question": "Why is \"$$\\Phi^{-1}(0.6) = 0.2533$$\" a *wrong* lookup for the problem $$P(|Z| < z) = 0.6$$, and what's the correct conversion?", "answer": "$$P(|Z| < z) = 0.6$$ is the *central* (two-tail) probability, while $$\\Phi(z) = P(Z < z)$$ is a *cumulative* (one-tail) value. The two-tail probability of 0.6 leaves 0.4 in the two outer tails, with 0.2 in each. So $$\\Phi(z) = 0.6 + 0.2 = 0.8$$, giving $$z \\approx 0.8416$$. Direct inverse-lookup of 0.6 corresponds to $$P(Z < z) = 0.6$$, which is a totally different geometry — confusing these is a classic exam trap.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": false}, {"question": "Memorise these common Normal table values and explain why $$\\Phi(1.96)$$ is so widely cited.", "answer": "Key values:\n- $$\\Phi(0.84) \\approx 0.80$$\n- $$\\Phi(1.00) \\approx 0.8413$$\n- $$\\Phi(1.28) \\approx 0.90$$\n- $$\\Phi(1.50) = 0.9332$$\n- $$\\Phi(1.645) = 0.95$$\n- $$\\Phi(1.96) = 0.975$$\n- $$\\Phi(2.33) \\approx 0.99$$\n\n$$\\Phi(1.96)$$ is the 97.5th percentile, so $$P(|Z| < 1.96) = 0.95$$ — the basis for the 95% confidence interval. It's the most-used Normal value in all of statistics.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": true}, {"question": "$$Y \\sim N(\\mu, \\sigma^2)$$, with $$2\\mu = 3\\sigma^2$$ and $$P(Y > \\tfrac{3}{2}\\mu) = 0.0668$$. Outline the simultaneous-equation strategy to find $$\\mu$$ and $$\\sigma$$. (3 steps)", "answer": "- Step 1: Standardise the probability: $$P\\left(Z > \\frac{(3/2)\\mu - \\mu}{\\sigma}\\right) = P(Z > \\mu/(2\\sigma)) = 0.0668$$, so $$\\Phi(\\mu/(2\\sigma)) = 0.9332$$. Lookup: $$\\mu/(2\\sigma) = 1.5$$, i.e. $$\\mu = 3\\sigma$$.\n- Step 2: Substitute into $$2\\mu = 3\\sigma^2$$: $$2(3\\sigma) = 3\\sigma^2 \\Rightarrow 3\\sigma^2 - 6\\sigma = 0 \\Rightarrow 3\\sigma(\\sigma - 2) = 0$$.\n- Step 3: Reject $$\\sigma = 0$$ (s.d. must be positive). So $$\\sigma = 2$$ and $$\\mu = 6$$.\n\nThe structure: standardisation gives one equation; the algebraic constraint gives the second; substitute, solve quadratic, reject non-physical root.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": true}, {"question": "Why must we always *explicitly* reject the root $$\\sigma = 0$$ (or any non-positive root) when solving for a standard deviation?", "answer": "A standard deviation is defined as a square root of variance, so $$\\sigma \\ge 0$$ by construction. $$\\sigma = 0$$ corresponds to a degenerate distribution (a point mass — no randomness), which contradicts the problem setup of a non-trivial normal. The marker expects an explicit one-line rejection: \"$$\\sigma > 0$$, so $$\\sigma = 2$$.\" This shows mathematical hygiene: you understand which roots are physical solutions vs algebraic artefacts.", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": true}, {"question": "Distinguish variance from standard deviation, and explain a common exam pitfall when a problem states \"variance = 36\". (2 steps)", "answer": "- Step 1: Variance $$\\sigma^2$$ is the squared spread; standard deviation $$\\sigma = \\sqrt{\\sigma^2}$$ is in the same units as the data.\n- Step 2: If the problem says \"variance 36\", then $$\\sigma = \\sqrt{36} = 6$$, not 36. The standardisation $$Z = (X - \\mu)/\\sigma$$ uses $$\\sigma$$, not $$\\sigma^2$$. A common pitfall is to plug 36 directly into the denominator, which makes the $$z$$-score 6× too small.", "source": "Opus 4.7 ②", "_id": "opus_2_51", "judge_pick": false}, {"question": "For \"show that\" questions worth 3 marks, what level of working detail is expected, and why?", "answer": "At minimum three algebraic lines: a setup line showing the formula or substitution, a simplification line, and a final-answer line with one extra significant figure carried before rounding. Method marks (M-marks) dominate \"show that\" questions — the marker awards them for visible reasoning, not just for the final number. If you write only the final answer, you typically get 1 of 3 (the \"ans\" mark) and miss the two method marks. Always include the un-rounded intermediate (e.g. 8.5716) before stating the requested 3 s.f. value.", "source": "Opus 4.7 ②", "_id": "opus_2_52", "judge_pick": false}, {"question": "When solving a simultaneous-equation problem from probability constraints, why is clearing fractions/decimals as the first algebraic step a good habit?", "answer": "Decimals and fractions invite arithmetic slips when multiplying or substituting. Multiplying both sides of the equation by the LCM of all denominators (e.g. by 20 in $$0.7x + y = 0.65$$ → $$14x + 20y = 13$$) yields integer coefficients, which align cleanly when eliminating variables and let you spot the answer by inspection more quickly. It also matches the expected \"show that\" form when the question states the integer equation.", "source": "Opus 4.7 ②", "_id": "opus_2_53", "judge_pick": false}, {"question": "Explain the conceptual link between Q1 (histogram) part (d) and Q4 (regression) — both involve a \"splitting\" or \"ranging\" idea. (2 steps)", "answer": "- Step 1: Q1(d) requires splitting class frequencies proportionally when the question's range cuts through a class boundary — an in-range fraction within bounded data.\n- Step 2: Q4(e) requires identifying whether a prediction lies *within* the observed data range (interpolation/reliable) or *outside* (extrapolation/unreliable). Both questions hinge on understanding where boundaries lie relative to data; the difference is that Q1 splits a frequency, while Q4 evaluates reliability.\n\nThe common thread: \"range awareness\" — always check whether you're inside or outside the observed/given range.", "source": "Opus 4.7 ②", "_id": "opus_2_54", "judge_pick": false}, {"question": "Why is the law of total probability — $$P(L) = P(L|Y12)P(Y12) + P(L|Y13)P(Y13)$$ — the natural way to extract unknowns from a tree diagram?", "answer": "A tree partitions the sample space into mutually exclusive paths (Y12-and-L, Y12-and-R, Y13-and-L, Y13-and-R). The probability of any non-leaf event (like \"left-handed\") is the sum of leaf probabilities along compatible paths. This is the law of total probability in tree form. Crucially, it expresses a single unknown ($$p$$) as the sum of products along each Y-branch reaching $$L$$, giving a linear equation that's straightforward to solve.", "source": "Opus 4.7 ②", "_id": "opus_2_55", "judge_pick": true}, {"question": "Explain why the formula $$P(A \\cap B) = P(B|A) \\cdot P(A)$$ is the \"multiplication rule along a tree\" and how the conditioning direction must match the tree structure. (2 steps)", "answer": "- Step 1: Along a tree, you first traverse to the parent node (probability $$P(A)$$), then take a child branch *given that* you reached $$A$$ (probability $$P(B|A)$$). Multiplying these gives the joint $$P(A \\cap B)$$.\n- Step 2: The conditioning direction matters: $$P(B|A) \\ne P(A|B)$$ in general. The tree's branch conditional must match the formula's conditional — if you swap them, you compute $$P(A|B) \\cdot P(B)$$, which still equals $$P(A \\cap B)$$, but you'd be reading off the wrong branch labels.\n\nIn Q6(a), $$P(B|A) = 0.3$$ means we multiply by $$P(A) = x$$, giving $$P(A \\cap B) = 0.3x$$ — not $$0.3y$$.", "source": "Opus 4.7 ②", "_id": "opus_2_56", "judge_pick": false}, {"question": "What is the relationship between \"two normal events nest\" (e.g. $$X > 44 \\implies X > 38.8$$) and the probability of their intersection? (2 steps)", "answer": "- Step 1: If event $$E_1 \\subseteq E_2$$ (every outcome in $$E_1$$ is also in $$E_2$$), then $$E_1 \\cap E_2 = E_1$$, so $$P(E_1 \\cap E_2) = P(E_1)$$.\n- Step 2: For a normal variable, $$\\{X > 44\\} \\subseteq \\{X > 38.8\\}$$ because clearing 44 m is stricter than clearing 38.8 m. So the joint event \"throw clears 38.8 AND throw > 44\" simplifies to just \"throw > 44\" — there's nothing extra to multiply.\n\nMultiplying $$P(X > 38.8) \\times P(X > 44)$$ would treat them as independent, which they are not — they're nested for the *same throw*.", "source": "Opus 4.7 ②", "_id": "opus_2_57", "judge_pick": true}, {"question": "Compare the conditional probability structures of Q3(d) and Q5(b) — what makes them the same problem conceptually? (2 steps)", "answer": "- Step 1: Both have the trigger phrase \"given that …\", forcing the formula $$P(A|B) = P(A \\cap B)/P(B)$$. The numerator is a joint probability (along a tree or along a sequence of independent trials); the denominator is the conditioning event's probability (often best found by complement).\n- Step 2: Both temptations involve writing the *numerator only* and stopping there. In Q3(d) it's $$\\frac{7}{20}$$; in Q5(b) it's $$\\approx 0.0606$$. Both miss the division by $$P(\\text{condition})$$.\n\nThe fix is the same habit: write the conditional formula *before* computing.", "source": "Opus 4.7 ②", "_id": "opus_2_58", "judge_pick": false}, {"question": "State a quick conceptual recipe for any S1 \"given that … find probability …\" question. (3 steps)", "answer": "- Step 1: Identify event $$A$$ (the thing you want) and event $$B$$ (the condition). Write $$P(A|B) = \\frac{P(A \\cap B)}{P(B)}$$ on the page.\n- Step 2: Compute $$P(A \\cap B)$$ as a joint probability — either along a tree, by independence-multiplication, or via $$P(B|A)P(A)$$.\n- Step 3: Compute $$P(B)$$ either directly (sum across paths/cases) or by complement, and cross-check via the other route if possible. Then divide.\n\nThis recipe applies uniformly across tree problems, normal-distribution problems, Venn/set problems — the structure is invariant.", "source": "Opus 4.7 ②", "_id": "opus_2_59", "judge_pick": false}], "count": 60}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 15745, "out_tokens": 26645, "reasoning_chars": 14100, "cost_eur": 0.101, "elapsed_s": 499, "content_chars": 74042}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 15745, "out_tokens": 23453, "reasoning_chars": 3294, "cost_eur": 0.0907, "elapsed_s": 359, "content_chars": 71464}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5. const SK='s1_paper_jan2024';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),3500);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
