<script>
const DATA={"selected": [{"question": "S1 Jan 2024 Q5(b) — Describe the conceptual layout of the three-throw scenario as a tree, and explain why the branch for throw 3 is irrelevant when computing the denominator $$P(\\text{qualifies})$$ from the perspective of someone who already knows the athlete qualified. (2 steps)", "answer": "- Step 1: The tree has three levels: throw 1 (fail/succeed), throw 2 (only reached if throw 1 failed), and throw 3 (only reached if throws 1 and 2 both failed). The denominator $$P(\\text{qualifies})$$ is the total probability of all paths except the all-fail path.\n- Step 2: When conditioning on \"qualifies\", you restrict to the subset of paths that entered the final. Paths involving throw 3 still contribute to the denominator, but the event \"qualified on 2nd throw with $$>44$$\" only lives on the specific path $$F_1 \\cap (X_2 > 44)$$. The all-fail path is excluded from the denominator by the complement calculation.", "source": "Kimi K2.6 ②", "_id": "kimi_2_40"}, {"question": "What's the \"at least one in $$n$$ independent trials\" complement strategy, and when does it apply?", "answer": "- Step 1: When events are **independent** and you want $$P(\\text{at least one success})$$ in $$n$$ trials, use $$1 - P(\\text{all fail}) = 1 - P(\\text{fail})^n$$.\n- Step 2: This is exponentially faster than summing $$P(\\text{exactly 1}) + P(\\text{exactly 2}) + \\ldots + P(\\text{exactly } n)$$.\n- Step 3: Only applies when trials are independent (stated explicitly in Q5: \"throws are independent\").\n\nIf trials were dependent (e.g., sampling without replacement), this complement still works but $$P(\\text{all fail})$$ would be a product of changing conditional probabilities, not a simple power.", "source": "Opus 4.7 ②", "_id": "opus_2_48"}, {"question": "What is the general formula for converting a central probability $$P(|Z| < z^*) = c$$ into a $$\\Phi$$ lookup? Derive it from symmetry. (3 steps)", "answer": "- Step 1: $$P(|Z| < z^*) = P(-z^* < Z < z^*)$$. By the symmetry and total-probability property of the standard Normal, this equals $$\\Phi(z^*) - \\Phi(-z^*)$$.\n- Step 2: By symmetry, $$\\Phi(-z^*) = 1 - \\Phi(z^*)$$. So $$P(-z^* < Z < z^*) = \\Phi(z^*) - (1 - \\Phi(z^*)) = 2\\Phi(z^*) - 1$$.\n- Step 3: Setting this equal to $$c$$: $$2\\Phi(z^*) - 1 = c$$, so $$\\Phi(z^*) = \\frac{1 + c}{2}$$.\n\nMemorise: **symmetric interval probability $$c$$ → upper-tail probability $$(1+c)/2$$**.", "source": "GLM 5.1 ③", "_id": "glm_3_75"}, {"question": "S1 Jan 2024 Q2(d) — what's the rule about how PMCC behaves under linear coding, and what mark-scheme phrasing must you use to get both marks?", "answer": "- Step 1: Rule: **PMCC is invariant under positive linear coding** $$u = a + bx$$, $$v = c + dy$$ when $$b, d > 0$$. So $$r_{u,v} = r_{x,y}$$ exactly — quote the same numerical value.\n- Step 2: For the second mark, state BOTH the value AND the reason: \"$$r_{u,v} = 0.849$$ because PMCC is unchanged under (positive) linear coding.\"\n- Step 3: Sign caveat: if either $$b$$ or $$d$$ were negative, $$r$$ would flip sign. Here both are $$5/9 > 0$$, so sign is preserved.\n\nIntuition: PMCC measures the strength of the linear relationship, which doesn't depend on the units of measurement.", "source": "Opus 4.7 ②", "_id": "opus_2_10"}, {"question": "When reading a histogram to fill in a frequency table, what is the key relationship between the bar's area, the frequency density, and the frequency? (2 steps)", "answer": "- Step 1: The **frequency density** (fd) is the height of the bar, calculated as $$\\text{fd} = \\frac{\\text{frequency}}{\\text{class width}}$$. The bar's area equals frequency density × class width.\n- Step 2: Rearranging gives $$\\text{frequency} = \\text{fd} \\times \\text{class width}$$. So if you can read the fd from the histogram's y-axis and know the class width, you recover the frequency directly.\n\nThe histogram is a visual representation where *area = frequency*, not height.", "source": "GLM 5.1 ③", "_id": "glm_3_0"}, {"question": "When a question asks which of two regression estimates is \"more reliable\", what two keywords must appear in your answer? (2 steps)", "answer": "- Step 1: Use the words **\"interpolation\"** (for the reliable estimate) and **\"extrapolation\"** (for the unreliable one). These are the specific terms examiners look for.\n- Step 2: Support this by stating the **observed data range** (e.g., \"$$24 \\leq f \\leq 68$$\") and showing which estimate falls within vs. outside this range.\n\nVague answers like \"more reliable because it's closer to the mean\" or \"the relationship is more linear there\" don't score. The concept being tested is specifically interpolation vs. extrapolation.", "source": "GLM 5.1 ③", "_id": "glm_3_70"}, {"question": "State the median-by-interpolation formula for grouped data, identifying what each symbol represents. (1 step + sub-items)", "answer": "$$\\text{Median} = L + \\frac{(n/2) - F_{<}}{f_{\\text{class}}} \\times w$$\n\n+ $$L$$ = lower bound of the median class\n+ $$n/2$$ = median position\n+ $$F_{<}$$ = cumulative frequency of all classes *below* the median class\n+ $$f_{\\text{class}}$$ = frequency of the median class itself\n+ $$w$$ = width of the median class\n\nThe formula assumes values are uniformly distributed within the class, so you interpolate linearly from $$L$$ to $$L + w$$.", "source": "GLM 5.1 ③", "_id": "glm_3_4"}, {"question": "What's the structural difference between \"two routes for $$P(R)$$ give the same answer\" (Q3) and \"$$P(A)P(B) = P(A \\cap B)$$\" (Q6)?", "answer": "- Step 1: Q3 cross-check: two different ways to compute the SAME probability $$P(R)$$ — a sanity check that your arithmetic is consistent.\n- Step 2: Q6 independence test: checking whether two DIFFERENT quantities ($$P(A) \\cdot P(B)$$ and $$P(A \\cap B)$$) happen to be equal — testing a structural property of the events.\n- Step 3: Both involve \"compute and compare\", but the meaning is different: one tests your arithmetic, the other tests a property of the events themselves.", "source": "Opus 4.7 ②", "_id": "opus_2_43"}, {"question": "S1 Jan 2024 Q8(b) — When finding Normal parameters $$\\mu$$ and $$\\sigma$$ from two conditions, what is the systematic approach?", "answer": "- Step 1: **Standardise** the probability statement to get one equation relating $$\\mu$$ and $$\\sigma$$. For $$P(Y > \\frac{3}{2}\\mu) = 0.0668$$: standardise to get $$\\frac{\\mu}{2\\sigma} = 1.5$$, hence $$\\mu = 3\\sigma$$.\n- Step 2: **Use the algebraic relation** given in the question as the second equation. Here: $$2\\mu = 3\\sigma^2$$.\n- Step 3: **Substitute** one into the other to eliminate one variable. From (1): $$\\mu = 3\\sigma$$, so $$2(3\\sigma) = 3\\sigma^2 \\implies 6\\sigma = 3\\sigma^2$$.\n- Step 4: **Solve** the resulting equation and **reject non-physical roots**. $$3\\sigma(\\sigma - 2) = 0 \\implies \\sigma = 0$$ (rejected: s.d. must be positive) or $$\\sigma = 2$$.\n- Step 5: **Substitute back** to find both values: $$\\mu = 3 \\times 2 = 6$$.", "source": "GLM 5.1 ②", "_id": "glm_2_38"}, {"question": "Given P(μ - 2k < X < μ + 2k) = 0.6 with σ = 6, how do you find k? What is the conversion to Φ? (3 steps)", "answer": "- Step 1: Standardise: P(-2k/6 < Z < 2k/6) = 0.6. This is a symmetric interval about 0.\n- Step 2: For symmetric intervals: P(|Z| < z) = 2Φ(z) - 1. So 2Φ(z) - 1 = 0.6 → Φ(z) = 0.8.\n- Step 3: From inverse normal tables, Φ⁻¹(0.8) = 0.8416. So 2k/6 = 0.8416 → k = 2.52.\n\n**Key insight:** You MUST convert the two-tail probability 0.6 to one-tail Φ = 0.8 before looking up. Using Φ⁻¹(0.6) = 0.2533 would be wrong.", "source": "MiniMax ②", "_id": "minimax_2_26"}, {"question": "What is the correct transformation rule for standard deviation under linear coding $c = \\frac{5}{9}(f - 32)$? (2 steps)", "answer": "- Step 1: **Additive constants** ($-32$) do **not** affect standard deviation.\n- Step 2: **Multiplicative constants** ($\\times \\frac{5}{9}$) scale the standard deviation: $\\sigma_c = \\frac{5}{9}\\sigma_f$.", "source": "Qwen 3 ③", "_id": "qwen_3_5"}, {"question": "S1 Jan 2024 General Strategy — Before applying any coding or linear transformation to means, standard deviations, or variances, what mental checklist should you recite to avoid mixing additive and multiplicative effects? (2 steps)", "answer": "- Step 1: \"Additive constants shift location (mean) but leave spread (s.d., variance) unchanged. Multiplicative constants scale everything: means and s.d. scale by the factor, variances scale by the factor squared.\"\n- Step 2: Reciting this explicitly before writing prevents the common panic of wondering whether to subtract $$32$$ from the standard deviation or whether to square the multiplier in a variance question.", "source": "Kimi K2.6 ①", "_id": "kimi_1_61"}, {"question": "When evaluating \"between $$a$$ and $$b$$\" for grouped data using the uniform-within-class assumption, what's the general formula for a partial class?", "answer": "$$\\text{Partial frequency} = \\dfrac{\\text{included width}}{\\text{class width}} \\times \\text{class frequency}$$.\n\nFor class $$[L, U)$$ partially included by interval $$[a, b]$$:\n- If $$a$$ is inside the class: included width = $$U - a$$ (rightward portion).\n- If $$b$$ is inside the class: included width = $$b - L$$ (leftward portion).\n- Then take that fraction of the class's total frequency.\n\nAssumption: data are uniformly spread within each class. This is the standard assumption for grouped data; without it, you couldn't interpolate at all.", "source": "Opus 4.7 ②", "_id": "opus_2_45"}, {"question": "What value does the CDF $$F(x)$$ of a discrete random variable take at its **largest** $$x$$? Why?", "answer": "$$F(x_{\\max}) = 1$$, because the CDF is the cumulative probability up to and including $$x$$, and by the time you reach the largest value, you've accumulated ALL the probability (total mass = 1). This is the standard trick to solve for an unknown parameter $$k$$ in the CDF — set the last entry equal to 1.", "source": "Opus 4.7 ①", "_id": "opus_1_43"}, {"question": "When calculating probability for a range that cuts through class boundaries (e.g., 8 cm to 14 cm), what assumption must you make and how do you apply it? (Q1d)", "answer": "- Step 1: Assume uniform distribution within each class\n- Step 2: For partial classes at the boundaries, calculate the proportion of the class included\n- Step 3: Example: For 5 ≤ h < 9 with width 4, the portion from 8 to 9 is (9-8)/4 = 1/4 of the class\n- Step 4: Multiply this fraction by the class frequency\n\n**Takeaway:** Class boundaries rarely align with probability boundaries — always split proportionally by class width.", "source": "MiniMax ①", "_id": "minimax_1_3"}, {"question": "S1 Jan 2024 Q2(c) — under the coding $$c = \\tfrac{5}{9}(f - 32)$$, how do you transform the mean and the standard deviation, and what's the conceptual reason they behave differently? (3 steps)", "answer": "- Step 1: Mean: apply the whole formula. $$\\bar{c} = \\tfrac{5}{9}(\\bar{f} - 32)$$.\n- Step 2: S.d.: ONLY the multiplier scales it. $$\\sigma_c = \\tfrac{5}{9}\\sigma_f$$. The $$-32$$ does NOT appear.\n- Step 3: Reason: a standard deviation measures **spread** around the mean. Shifting every value by the same amount (the $$-32$$) leaves the spread unchanged — every point moves identically, so distances between them are preserved. Only stretching/scaling (the $$\\times 5/9$$) changes spread.\n\nThe general rule: $$u = a + bx \\Rightarrow \\bar{u} = a + b\\bar{x},\\ \\sigma_u = |b|\\sigma_x$$.", "source": "Opus 4.7 ②", "_id": "opus_2_9"}, {"question": "Why is the \"at-least-one\" complement trick crucial for the qualifying-probability denominator?", "answer": "Computing $$P(\\text{qualifies})$$ directly requires summing three disjoint cases: succeed on throw 1; fail-then-succeed on throw 2; fail-fail-succeed on throw 3. That's $$0.6179 + 0.3821 \\cdot 0.6179 + 0.3821^2 \\cdot 0.6179$$. The complement $$1 - 0.3821^3$$ is a single product — faster and less error-prone. Both give the same answer; the complement is just better engineering.", "source": "Opus 4.7 ①", "_id": "opus_1_68"}, {"question": "S1 Jan 2024 Q7(d) — During the variance calculation for a discrete RV derived from fractional CDF values, why is it strategically better to keep $$E(X)$$ and $$E(X^2)$$ as exact fractions rather than converting to decimals? (2 steps)", "answer": "- Step 1: Exact fractions preserve the common denominator structure. In this paper, the denominator of $$\\operatorname{Var}(X)$$ is $$169$$, which is exactly $$13^2$$.\n- Step 2: When you multiply by $$a^2 = 169$$ in the final transformation, the denominator cancels perfectly, yielding a clean integer answer. Decimals would introduce rounding errors and obscure the cancellation.", "source": "Kimi K2.6 ①", "_id": "kimi_1_46"}, {"question": "When a quadratic equation yields a root of $$\\sigma = 0$$, why must you reject it? What other non-physical roots might arise in S1? (2 steps + sub-items)", "answer": "- Step 1: $$\\sigma = 0$$ means zero spread — all values would be identical, which contradicts having a distribution. It's a mathematical artefact of the factorisation, not a valid solution.\n- Step 2: Other non-physical results to reject in S1:\n+ Negative $$\\sigma$$ (standard deviation must be positive)\n+ Probabilities outside [0, 1]\n+ $$|r| > 1$$ for PMCC\n+ Negative frequencies\n\nAlways check that your answer makes physical/probabilistic sense.", "source": "GLM 5.1 ③", "_id": "glm_3_63"}, {"question": "What's the difference between interpolation and extrapolation in regression, and which is reliable?", "answer": "- **Interpolation**: predicting at an $$x$$-value **inside** the observed data range — reliable, because the linear model was fitted on similar data.\n- **Extrapolation**: predicting at an $$x$$-value **outside** the observed range — unreliable, because there's no evidence the linear relationship continues outside the sampled region.\n\nFor a \"more reliable\" exam answer: quote the data range explicitly and use the words \"interpolation\" / \"extrapolation\".", "source": "Opus 4.7 ①", "_id": "opus_1_28"}, {"question": "S1 Jan 2024 Q2(d) — If variables $$x$$ and $$y$$ are linearly coded to $$u$$ and $$v$$ (e.g., converting °F to °C), what happens to the product moment correlation coefficient (PMCC), and under what condition? (2 steps)", "answer": "- Step 1: The PMCC remains **unchanged** ($$r_{u,v} = r_{x,y}$$).\n- Step 2: This holds true as long as the linear coding on both variables uses **positive** multipliers. If one multiplier is negative, the sign of $$r$$ flips.\n+ Linear coding (adding/subtracting, multiplying/dividing) changes the scale and origin but does not change the strength or direction of the linear relationship between the variables, provided the scaling doesn't reverse the direction (negative multiplier).\n\nPMCC is invariant to positive linear transformations because correlation measures the *pattern* of scatter, not the units or origin.", "source": "GLM 5.1 ①", "_id": "glm_1_8"}, {"question": "S1 Jan 2024 — When a question asks you to \"state, giving a reason,\" how many marks is this typically worth, and what does each mark require?", "answer": "Typically **2 marks**: 1 for the statement (value or conclusion) and 1 for the reason.\n\nExamples from this paper:\n+ Q2(d): State $$r_{uv} = 0.849$$ (1 mark) + reason \"PMCC invariant under positive linear coding\" (1 mark).\n+ Q4(e): State which estimate is more reliable (1 mark) + reason involving interpolation/extrapolation with data range (1 mark).\n\nWriting only the statement or only the reason gets 1 of 2 marks. Always provide both.", "source": "GLM 5.1 ②", "_id": "glm_2_56"}, {"question": "S1 Jan 2024 Q1(d) — Once you recognize that the boundaries $$8$$ and $$14$$ split two classes, what assumption allows you to estimate the number of plants in each split portion, and how is the proportion determined? (2 steps)", "answer": "- Step 1: Assume the data are uniformly distributed within each class — meaning the plant heights are spread evenly between the lower and upper boundaries.\n- Step 2: The proportion of the class to include is the ratio of the desired sub-interval width to the full class width. For example, from $$[5,9)$$ you need $$[8,9)$$, which is $$1$$ cm out of a $$4$$ cm class, so you take $$\\frac{1}{4}$$ of that class frequency.", "source": "Kimi K2.6 ②", "_id": "kimi_2_7"}, {"question": "S1 Jan 2024 Q5(b) — what's the conditional formula structure once you've identified the events?", "answer": "$$P(\\text{2nd throw }>44 \\mid \\text{qualifies}) = \\dfrac{P(F_1 \\cap \\{X_2 > 44\\})}{P(\\text{qualifies})}$$.\n\nKey points:\n- Numerator: the favourable event is automatically a SUBSET of \"qualifies\" (throw 2 succeeding implies qualification), so $$P(\\text{event} \\cap \\text{qualifies}) = P(\\text{event})$$.\n- Denominator: the total qualification probability across all 3 attempts.\n- The result is small (~0.064) because qualifying-specifically-on-throw-2 with a big distance is rare among all the ways to qualify.", "source": "Opus 4.7 ②", "_id": "opus_2_24"}, {"question": "When a question gives you $$P(B \\mid A)$$ and asks about $$P(A \\cap B)$$, what's the key formula, and what's the common directional error? (2 steps)", "answer": "- Step 1: $$P(A \\cap B) = P(B \\mid A) \\times P(A)$$. The conditioning event's probability is the multiplier.\n- Step 2: The common error is multiplying by $$P(B)$$ instead of $$P(A)$$: writing $$P(A \\cap B) = 0.3 \\times P(B) = 0.3y$$ instead of $$0.3 \\times P(A) = 0.3x$$. This reverses the conditioning direction.\n\nIn Q6(a): \"$$P(B \\mid A) = 0.3$$\" means $$B$$ is conditioned on $$A$$, so $$P(A)$$ is the multiplier. The event *after* the bar goes in the denominator, and the event *before* the bar is what you multiply.", "source": "GLM 5.1 ③", "_id": "glm_3_83"}, {"question": "A simple exercise: In a class of 10 students, 4 wear glasses. Two are picked at random without replacement. What is the probability both wear glasses? (mental math)", "answer": "$$P = \\frac{4}{10} \\times \\frac{3}{9} = \\frac{12}{90} = \\frac{2}{15}$$\n\nKey insight: the second fraction drops both the numerator (one glasses-wearer already taken) and the denominator (one student already taken). If it were *with* replacement, you'd get $$(4/10)^2 = 4/25$$, which is larger — replacement always gives a higher probability for \"both\" events.", "source": "GLM 5.1 ③", "_id": "glm_3_8"}, {"question": "S1 Jan 2024 Q1(d) — When estimating the count of plants in the range [8, 14) from grouped data, what assumption are you making, and when might it be unreliable?", "answer": "You assume **uniform distribution within each class** — that values are evenly spread across the class interval. This lets you split a class's frequency proportionally by the overlap width.\n\nThis assumption is most unreliable when: (1) the class is wide and the true distribution is concentrated at one end, or (2) the class boundaries don't align with natural breaks in the data. The estimate is a **linear interpolation** — it's the best you can do with grouped data, but it's an approximation, not an exact count.\n\nThe question says \"estimate the probability\" — acknowledging that the uniform-within-class assumption makes this an approximation.", "source": "GLM 5.1 ②", "_id": "glm_2_60"}, {"question": "A quick exercise: An archer has a 70% chance of hitting the target on each shot. She has 3 independent shots and needs at least one hit to pass. Given that she passed, what's the probability she passed on the very first shot? (conceptual walkthrough, no heavy arithmetic) (3 steps)", "answer": "- Step 1: Define events. $$P(\\text{hit}) = 0.7$$, $$P(\\text{miss}) = 0.3$$. \"Passed on first shot\" means hit on shot 1 (the remaining shots are irrelevant since she already passed).\n- Step 2: $$P(\\text{passed on 1st}) = P(\\text{hit}_1) = 0.7$$. $$P(\\text{passed}) = 1 - 0.3^3 = 1 - 0.027 = 0.973$$.\n- Step 3: $$P(\\text{passed on 1st} \\mid \\text{passed}) = \\frac{0.7}{0.973} \\approx 0.720$$. The conditional probability is slightly less than 0.7 because some people who missed the first shot still passed on shots 2 or 3.\n\nThis mirrors Q5(b): the denominator \"inflates\" the sample space to include all who passed, not just first-shot hitters.", "source": "GLM 5.1 ③", "_id": "glm_3_40"}, {"question": "When solving simultaneous equations for Normal distribution parameters (e.g., $$\\mu = 3\\sigma$$ and $$2\\mu = 3\\sigma^2$$), what substitution leads to a quadratic, and how do you handle the roots? (3 steps)", "answer": "- Step 1: Substitute $$\\mu = 3\\sigma$$ into $$2\\mu = 3\\sigma^2$$: $$2(3\\sigma) = 3\\sigma^2$$, giving $$6\\sigma = 3\\sigma^2$$.\n- Step 2: Rearrange: $$3\\sigma^2 - 6\\sigma = 0$$, factorise: $$3\\sigma(\\sigma - 2) = 0$$, giving $$\\sigma = 0$$ or $$\\sigma = 2$$.\n- Step 3: **Reject** $$\\sigma = 0$$ because a standard deviation must be positive ($$\\sigma > 0$$). So $$\\sigma = 2$$ and $$\\mu = 3 \\times 2 = 6$$.\n\nAlways state the rejection explicitly: \"$$\\sigma > 0$$, so $$\\sigma = 2$$\". This earns the method mark for recognising the physical constraint.", "source": "GLM 5.1 ③", "_id": "glm_3_62"}, {"question": "What's the connection between Q1(d)'s histogram-probability calculation and Q4(a)'s outlier test, and why mention them together?", "answer": "Both use the concept of **boundary calculation on continuous data**:\n- Q1(d): finds a count in $$[8, 14)$$ by splitting partial classes — uses uniform-within-class.\n- Q4(a): finds the outlier fence $$Q_3 + 1.5 \\times \\text{IQR}$$ — uses position-based quartiles.\n\nBoth require careful arithmetic with class/position boundaries. The general theme: don't conflate discrete and continuous treatments. For Q1, classes are continuous (grouped). For Q4 (raw list of 11 marks), data are discrete.", "source": "Opus 4.7 ②", "_id": "opus_2_46"}, {"question": "S1 Jan 2024 Q2/Q7 — What is the unified principle behind why additive constants don't affect spread measures, and how does it manifest in both coding and variance questions?", "answer": "Any measure of spread (s.d., variance, IQR, range) depends on **deviations from a centre** — distances between values. Adding a constant $$a$$ shifts every value by the same amount, so every deviation $$(x_i + a) - (\\bar{x} + a) = x_i - \\bar{x}$$ is unchanged. The constant cancels.\n\nIn coding (Q2c): $$\\sigma_{a+bx} = |b|\\sigma_x$$ — the $$a$$ doesn't appear.\nIn variance (Q7d): $$\\operatorname{Var}(aX + b) = a^2\\operatorname{Var}(X)$$ — the $$b$$ doesn't appear.\n\nOnly **multiplicative** changes alter spread: they stretch ($$|b| > 1$$) or compress ($$|b| < 1$$) all deviations by factor $$|b|$$, which squares to $$b^2$$ in variance.", "source": "GLM 5.1 ②", "_id": "glm_2_44"}, {"question": "When a linear coding formula like $$c = \\frac{5}{9}(f - 32)$$ is applied, how does the **standard deviation** transform — and what is the key insight about the additive constant? (3 steps)", "answer": "- Step 1: Standard deviation measures *spread* (dispersion). Adding or subtracting a constant shifts all values equally — it does not change how far apart they are from each other.\n- Step 2: Therefore, the additive constant ($$-32$$) has **no effect** on the standard deviation. Only the multiplicative constant matters.\n- Step 3: $$\\sigma_c = |b| \\cdot \\sigma_f = \\frac{5}{9} \\times 8.5716 = 4.76$$ °C. The absolute value ensures s.d. is always positive regardless of the sign of $$b$$.\n\nThe pitfall: applying $$-32$$ to the s.d. as well as the mean. The shift changes location, not spread.", "source": "GLM 5.1 ③", "_id": "glm_3_14"}, {"question": "When computing $$\\text{Var}(X) = E(X^2) - (E(X))^2$$ for a discrete RV with fractional probabilities, why should you keep everything as fractions until the very end? (3 steps)", "answer": "- Step 1: Converting to decimals early introduces rounding errors that accumulate through squaring and subtraction. Even small rounding can make a noticeable difference.\n- Step 2: Working with fractions allows clean cancellation. In Q7(d): $$\\text{Var}(X) = \\frac{142}{13} - \\frac{1681}{169} = \\frac{1846 - 1681}{169} = \\frac{165}{169}$$. Then $$169 \\times \\frac{165}{169} = 165$$ — the 169 cancels perfectly.\n- Step 3: If you'd used decimals, $$E(X) \\approx 3.154$$, $$E(X^2) \\approx 10.923$$, giving $$\\text{Var}(X) \\approx 0.976$$, and $$169 \\times 0.976 = 164.9$$ — close but not exactly 165, and you'd lose the \"nice answer\" signal that confirms correctness.\n\nWhen the final answer is a clean integer like 165, it's a strong signal your arithmetic is right. Messy decimals usually mean an error.", "source": "GLM 5.1 ③", "_id": "glm_3_55"}, {"question": "S1 Jan 2024 Q1(d) — When selecting two plants at random from a finite population without replacement, what is the structural difference between the correct probability product and the with-replacement mistake? (2 steps)", "answer": "- Step 1: The correct product is $$\\frac{n}{N} \\times \\frac{n-1}{N-1}$$, where $$N$$ is the total population and $$n$$ is the number of favourable items. The denominator decreases on the second pick because one item has been removed.\n- Step 2: The common error is squaring the first fraction: $$\\left(\\frac{n}{N}\\right)^2$$. This wrongly assumes the population is restored between picks, violating the \"without replacement\" condition and slightly overestimating the probability.", "source": "Kimi K2.6 ①", "_id": "kimi_1_6"}, {"question": "Why do regression questions in S1 almost always ask for \"$$y$$ on $$x$$\" specifically, and which variable's data range matters for interpolation/extrapolation?", "answer": "\"$$s$$ on $$f$$\" or \"$$y$$ on $$x$$\" means we're modelling the response $$s$$ (or $$y$$) as a function of the predictor $$f$$ (or $$x$$). The regression line minimises vertical distances (residuals in $$y$$), so it gives a different line than \"$$x$$ on $$y$$\".\n\nFor interpolation/extrapolation: only the **predictor's** data range matters (here, $$f$$). When you're asked to estimate $$s$$ from a new $$f$$-value, check if that $$f$$ falls inside the observed $$f$$-range $$[24, 68]$$. The $$s$$-range is irrelevant for this judgment.", "source": "Opus 4.7 ②", "_id": "opus_2_49"}, {"question": "What's the difference between the position formulas for quartiles in S1: $$(n+1)/4$$ vs $$n/4$$? When do you use each?", "answer": "- $$(n+1)/4$$: for **discrete/raw data** (a list of $$n$$ values). The \"+1\" accounts for the position being on the list of data, not on a continuous scale.\n- $$n/4$$: for **grouped/continuous data** (frequency tables, histograms). You're interpolating on a cumulative frequency curve, which is treated as continuous.\n\nMixing these costs marks and can shift the median class on a borderline case.", "source": "Opus 4.7 ①", "_id": "opus_1_61"}, {"question": "S1 Jan 2024 Q4(d)(e) — What is the fundamental distinction between interpolation and extrapolation in regression, and why does extrapolation become unreliable even when the within-sample fit is excellent? (2 steps)", "answer": "- Step 1: Interpolation means predicting $$s$$ for an $$f$$-value that lies inside the observed data range of $$f$$; extrapolation means predicting for an $$f$$-value outside that range.\n- Step 2: Extrapolation is unreliable because the linear relationship is only evidenced within the sampled interval. Outside that range, the underlying process may curve, flatten, or behave entirely differently, and the regression model has no data to constrain its prediction.", "source": "Kimi K2.6 ②", "_id": "kimi_2_32"}, {"question": "What is the key difference between how you handle the \"given that\" condition in Q3(d) vs. Q5(b)? How does the denominator differ in nature? (2 steps)", "answer": "- Step 1: In Q3(d), the denominator $$P(R)$$ comes from a probability tree with known branch probabilities — it's a direct calculation from the tree or the complement.\n- Step 2: In Q5(b), the denominator $$P(\\text{qualifies})$$ comes from a Normal distribution with an \"at least one in 3 trials\" structure — it requires the complement-of-all-fail approach: $$1 - P(F)^3$$.\n\nThe *formula* is the same ($$P(A \\mid B) = P(A \\cap B)/P(B)$$), but the *source* of the denominator differs. In both cases, the trigger \"given that\" forces you to compute it.", "source": "GLM 5.1 ③", "_id": "glm_3_78"}, {"question": "Why does the regression line of $$s$$ on $$f$$ (not $$f$$ on $$s$$) have slope $$b = S_{fs}/S_{ff}$$? What would be different for the regression of $$f$$ on $$s$$? (2 steps)", "answer": "- Step 1: The regression of $$y$$ on $$x$$ minimises the sum of squared *vertical* residuals (errors in $$y$$). Its slope is always $$b = S_{xy}/S_{xx}$$ — the covariance of $$x$$ and $$y$$ divided by the variance of $$x$$.\n- Step 2: The regression of $$x$$ on $$y$$ would minimise *horizontal* residuals (errors in $$x$$) and have slope $$S_{xy}/S_{yy}$$. These are different lines unless $$r = 1$$ (perfect correlation).\n\nIn Q4(b): the regression of $$s$$ on $$f$$ has $$b = S_{fs}/S_{ff} = 1735.6/1667.6$$. If the question asked for $$f$$ on $$s$$, the slope would be $$S_{fs}/S_{ss}$$ — a different value.", "source": "GLM 5.1 ③", "_id": "glm_3_87"}, {"question": "S1 Jan 2024 Q1(d) — When a probability question involves selecting items \"without replacement\" from a large population, when can you approximate it as \"with replacement,\" and when must you use the exact formula?", "answer": "If the sample size is less than ~5% of the population, the without-replacement probability is close enough to the with-replacement probability that the difference is within rounding error. This is because removing one item barely changes the proportions.\n\nHowever, in S1 exam questions, the population is typically small (e.g., 408 plants) and the question explicitly says \"without replacement\" — so you must use the exact formula $$\\frac{a}{n} \\times \\frac{a-1}{n-1}$$. Only use the approximation $$\\left(\\frac{a}{n}\\right)^2$$ if the question says \"with replacement\" or implies a very large (often infinite) population.", "source": "GLM 5.1 ②", "_id": "glm_2_47"}, {"question": "S1 Jan 2024 Q5(b) — Why would it be logically wrong to multiply by both $$P(\\text{throw 2 succeeds})$$ and $$P(X_2 > 44)$$ as if they were independent conditions?", "answer": "They are not independent conditions; they are nested events. A throw exceeding $$44$$ m automatically exceeds $$38.8$$ m, so \"$$X_2 > 44$$\" is a subset of \"throw 2 succeeds\". Multiplying them as if they were separate conditions would double-count the same successful outcome and violate the basic axioms of probability.", "source": "Kimi K2.6 ②", "_id": "kimi_2_39"}, {"question": "S1 Jan 2024 Q5(b) — What is the numerical consequence of forgetting to divide by $$P(\\text{qualifies})$$ in part (b), and what kind of probability do you obtain instead of the required conditional probability? (2 steps)", "answer": "- Step 1: Forgetting the denominator yields the joint probability $$P(F_1 \\cap [X_2 > 44]) \\approx 0.0606$$, which is the probability of the specific path \"fail first, then exceed 44\".\n- Step 2: The required conditional probability is larger (roughly $$0.0642$$) because the denominator $$P(\\text{qualifies}) \\approx 0.944$$ rescales the result relative to the smaller restricted sample space of athletes who actually qualified.", "source": "Kimi K2.6 ②", "_id": "kimi_2_38"}, {"question": "In Q5(b), the event is \"qualified on the second throw with a distance of more than 44 m\". Why is $$X_2 > 44$$ automatically a qualifying throw, and how does this simplify the problem? (2 steps)", "answer": "- Step 1: The qualifying threshold is 38.8 m. Since $$44 > 38.8$$, any throw exceeding 44 m also exceeds 38.8 m. So $$X_2 > 44 \\Rightarrow X_2 > 38.8$$ — the events are nested.\n- Step 2: This means you do NOT need to multiply by $$P(X_2 > 38.8)$$ separately. \"Throw 2 succeeds AND throw 2 exceeds 44\" is just \"throw 2 exceeds 44\" — they're not two independent conditions to multiply.\n\nThe pitfall: treating \"throw 2 succeeds\" and \"throw 2 > 44\" as separate events and multiplying their probabilities — this double-counts because they overlap.", "source": "GLM 5.1 ③", "_id": "glm_3_37"}, {"question": "What's the relationship between $$\\operatorname{Var}(X)$$, $$E(X)$$, and $$E(X^2)$$, and why is it useful?", "answer": "$$\\operatorname{Var}(X) = E(X^2) - (E(X))^2$$.\n\nThis is the \"computational formula\" for variance — it's much easier than the definitional $$E[(X - \\mu)^2]$$ because you only need two expectations: $$E(X)$$ and $$E(X^2)$$, computed by summing $$\\sum x \\cdot P(X=x)$$ and $$\\sum x^2 \\cdot P(X=x)$$.\n\nIntuition: variance = \"mean of the squares minus square of the mean\". Order matters — these are NOT equal in general.", "source": "Opus 4.7 ②", "_id": "opus_2_34"}, {"question": "When a probability question involves boundaries that cut through histogram classes (e.g., \"between 8 cm and 14 cm\"), what is the first step to estimate the count? (3 steps)", "answer": "- Step 1: Identify which classes the boundaries split (e.g., [5,9) and [13,15) in Q1(d)).\n- Step 2: Calculate the proportion of each split class within the target range using class width (e.g., (9-8)/4 for the lower split).\n+ Example: For [5,9), proportion = (9-8)/4 = 1/4; for [13,15), proportion = (14-13)/2 = 1/2.\n- Step 3: Multiply proportions by class frequencies, sum all contributions (including full classes), then compute the probability without replacement.\n\n**Takeaway:** Always split class frequencies proportionally when boundaries cut through a class.", "source": "Qwen 3 ①", "_id": "qwen_1_0"}, {"question": "For \"state the PMCC between coded variables, giving a reason\" — what TWO things must your answer contain?", "answer": "(1) The numerical value of $$r$$ (same as the uncoded $$r$$), AND (2) the **rule** (\"PMCC is invariant under positive linear coding\" or \"because both coding multipliers are positive\"). Stating just the number loses the reason mark. The examiner wants evidence you know WHY $$r$$ is unchanged, not just that it is.", "source": "Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "S1 Jan 2024 Q1(b) — when computing a median by interpolation for grouped data with $$n = 408$$, what position do you use and why is it different from discrete data? (2 steps)", "answer": "- Step 1: Use $$n/2 = 204$$ directly, NOT $$(n+1)/2$$. For **grouped (continuous) data**, we treat the data as continuous so the median position is just $$n/2$$.\n- Step 2: Contrast with **discrete** ungrouped data (like Q4's quartiles), where positions use $$(n+1)/4$$, $$(n+1)/2$$, $$3(n+1)/4$$. The $$+1$$ accounts for picking actual values from a list.\n\nThe trigger: histogram/grouped frequency table → $$n/2$$. Raw list of $$n$$ values → $$(n+1)/2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_2"}, {"question": "S1 Jan 2024 Q8(a) — What is the general conversion formula from a symmetric central probability $$P(|Z| < z) = c$$ to the cumulative value you look up?", "answer": "$$\\Phi(z) = \\frac{1 + c}{2}$$.\n\nIntuition: the central region of probability $$c$$ is split equally by symmetry, with $$c/2$$ on each side of the mean. The remaining $$1 - c$$ is split equally in the two tails. So the total area to the left of $$z$$ is: the left tail $$(1-c)/2$$ plus the entire central region $$c$$, which equals $$\\frac{1-c}{2} + c = \\frac{1+c}{2}$$.\n\nMemorise this as: \"to go from central to cumulative, average with 1.\"", "source": "GLM 5.1 ②", "_id": "glm_2_36"}, {"question": "What's the formula for \"at least one success in $$n$$ independent trials\"?", "answer": "$$P(\\text{at least one success}) = 1 - P(\\text{fail})^n$$. The intuition: it's far simpler to compute the complement (all fail, a single product) and subtract from 1 than to sum the probabilities of \"exactly 1\", \"exactly 2\", … successes. Requires independence — stated in the question.", "source": "Opus 4.7 ①", "_id": "opus_1_34"}, {"question": "S1 Jan 2024 Q7(d) — What is the variance scaling rule for $$\\operatorname{Var}(aX + b)$$, and why does the additive constant disappear while the multiplicative constant gets squared?", "answer": "$$\\operatorname{Var}(aX + b) = a^2 \\operatorname{Var}(X)$$.\n\nThe additive constant $$b$$ disappears because variance measures **spread from the mean**. Shifting all values by $$b$$ shifts the mean by $$b$$ too, so each deviation $$(aX_i + b) - (a\\bar{X} + b) = a(X_i - \\bar{X})$$ — the $$b$$ cancels.\n\nThe multiplicative constant gets **squared** because variance is in **squared units**. If you double all values, the deviations double, but the squared deviations quadruple. So $$a$$ becomes $$a^2$$.\n\nCommon errors: $$\\operatorname{Var}(aX + b) = a\\operatorname{Var}(X) + b$$ (wrong on both counts) or $$\\operatorname{Var}(aX + b) = a\\operatorname{Var}(X)$$ (forgot to square).", "source": "GLM 5.1 ②", "_id": "glm_2_33"}, {"question": "S1 Jan 2024 Q6(c) — Why can't mutually exclusive events (with positive probability) be independent? What's the intuition?", "answer": "If A and B are mutually exclusive, then knowing A occurred tells you B definitely did NOT occur (since they can't co-occur). So $$P(B \\mid A) = 0$$, but $$P(B) > 0$$. Since $$P(B \\mid A) \\ne P(B)$$, knowledge of A changes the probability of B — they are **dependent**.\n\nIndependence means knowing A tells you **nothing** about B ($$P(B \\mid A) = P(B)$$). Mutually exclusive means knowing A tells you **everything** about B (it's impossible). These are opposite extremes.\n\nThe only exception: if $$P(A) = 0$$ or $$P(B) = 0$$, then $$P(A \\cap B) = 0 = P(A)P(B)$$, and they're both mutually exclusive and independent — but this is a degenerate case.", "source": "GLM 5.1 ②", "_id": "glm_2_30"}, {"question": "S1 Jan 2024 Q8(a) — When a Normal question gives a symmetric probability $$P(\\mu - 2k < X < \\mu + 2k) = 0.6$$, what algebraic conversion must you perform before using standard normal tables? (3 steps)", "answer": "- Step 1: Standardise to get $$P\\left(-\\frac{2k}{\\sigma} < Z < \\frac{2k}{\\sigma}\\right) = 0.6$$.\n- Step 2: Use the symmetry identity $$P(|Z| < z) = 2\\Phi(z) - 1$$. Set $$2\\Phi(z) - 1 = 0.6$$.\n- Step 3: Solve for the cumulative probability: $$\\Phi(z) = \\frac{1 + 0.6}{2} = 0.8$$. Only now do you look up the $$z$$-value corresponding to $$\\Phi = 0.8$$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_48"}, {"question": "For a symmetric Normal interval $$P(\\mu - 2k < X < \\mu + 2k) = 0.6$$, how do you convert this to a single $$\\Phi$$ lookup? Walk through the logic. (3 steps)", "answer": "- Step 1: Standardise: $$P\\left(-\\frac{2k}{\\sigma} < Z < \\frac{2k}{\\sigma}\\right) = 0.6$$. Let $$z^* = \\frac{2k}{\\sigma}$$.\n- Step 2: By symmetry of the standard Normal, $$P(-z^* < Z < z^*) = 2\\Phi(z^*) - 1$$. Set this equal to 0.6: $$2\\Phi(z^*) - 1 = 0.6$$.\n- Step 3: Solve for $$\\Phi(z^*)$$: $$\\Phi(z^*) = \\frac{1 + 0.6}{2} = 0.8$$. Now look up $$\\Phi^{-1}(0.8) = 0.8416$$.\n\nThe general rule: $$P(|Z| < z^*) = c \\Rightarrow \\Phi(z^*) = \\frac{1 + c}{2}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_57"}, {"question": "What does it mean for the PMCC to be \"invariant under linear coding\", and what is the underlying intuition? (3 steps)", "answer": "- Step 1: If you apply linear transformations to both variables ($$u = a + bx$$, $$v = c + dy$$ with $$b, d > 0$$), the PMCC between $$u$$ and $$v$$ equals the PMCC between $$x$$ and $$y$$: $$r_{uv} = r_{xy}$$.\n- Step 2: Intuition: correlation measures the *strength and direction of the linear relationship*. Shifting (adding constants) moves the cloud of points without changing its shape. Scaling (multiplying by constants) stretches or compresses the axes but doesn't change how tightly the points cluster around a line.\n- Step 3: The only exception is sign: if exactly one of $$b, d$$ is negative, the relationship is reflected and $$r$$ changes sign. If both are negative, the double reflection restores the original sign.\n\nConverting °F to °C is just a rescaling — it doesn't change how correlated the variables are, any more than measuring distance in miles vs. kilometres changes whether two cities are close together.", "source": "GLM 5.1 ③", "_id": "glm_3_86"}, {"question": "What's the symmetric-interval shortcut for $$P(|Z| < z) = c$$, and how do you derive it?", "answer": "Shortcut: $$\\Phi(z) = \\dfrac{1 + c}{2}$$.\n\nDerivation: By symmetry of the standard normal around 0:\n- $$P(|Z| < z) = P(-z < Z < z) = \\Phi(z) - \\Phi(-z) = \\Phi(z) - (1 - \\Phi(z)) = 2\\Phi(z) - 1$$.\n- Setting this equal to $$c$$: $$2\\Phi(z) - 1 = c \\Rightarrow \\Phi(z) = \\dfrac{1+c}{2}$$.\n\nExamples:\n- $$c = 0.6 \\Rightarrow \\Phi(z) = 0.8$$ (Q8(a)).\n- $$c = 0.95 \\Rightarrow \\Phi(z) = 0.975 \\Rightarrow z = 1.96$$ (the 95% interval).", "source": "Opus 4.7 ②", "_id": "opus_2_47"}, {"question": "What's the structural difference between \"qualifies for the final\" (Q5(b)) and a simple two-event conditional like Q3(d)?", "answer": "Q3(d) is a **single-shot** scenario: one student selected, two events (Y12, R) at once. Q5(b) is **multi-stage**: three sequential throws with a stopping rule (qualifies → stops). You must define each attempt explicitly, use independence across throws to multiply joint probabilities, and use the complement for \"at least one in 3\". Same conditional formula, more complex sub-event computation.", "source": "Opus 4.7 ①", "_id": "opus_1_67"}, {"question": "S1 Jan 2024 — What is the \"coding rule\" you should recite to yourself before attempting any linear transformation question, and what does each part mean?", "answer": "\"Additive constant drops; multiplier applies (and squares for variance).\"\n\n+ \"Additive constant drops\": adding $$a$$ to every value shifts the mean by $$a$$ but does NOT change s.d. or variance. The constant cancels in every deviation from the mean.\n+ \"Multiplier applies\": multiplying by $$b$$ scales the mean by $$b$$ and the s.d. by $$|b|$$.\n+ \"And squares for variance\": variance scales by $$b^2$$, not $$b$$, because variance is in squared units.\n\nThis single sentence covers Q2(c) (mean and s.d. in °C), Q2(d) (PMCC invariance — both multipliers positive), and Q7(d) ($$\\operatorname{Var}(13X-6) = 169\\operatorname{Var}(X)$$).", "source": "GLM 5.1 ②", "_id": "glm_2_55"}, {"question": "Why doesn't \"median by interpolation\" use the $$(n+1)/2$$ formula, even though \"quartile of raw data\" does?", "answer": "Median by interpolation applies to **grouped/continuous** data, where you treat cumulative frequency as a continuous function of $$x$$. The position $$n/2$$ corresponds to the $$x$$-value where the CDF equals 0.5. Adding 1 (which is a discrete-data correction for picking from a list) is conceptually wrong here. Mixing the formulas is a common silent error.", "source": "Opus 4.7 ①", "_id": "opus_1_66"}, {"question": "S1 Jan 2024 Q5(b) — Why is the event \"throw 2 exceeds 44 m\" automatically a subset of \"throw 2 succeeds\" (exceeds 38.8 m), and how does this prevent double-counting?", "answer": "Since 44 > 38.8, any throw exceeding 44 m **automatically** exceeds 38.8 m. So $$P(X > 44)$$ is already contained within $$P(X > 38.8)$$ — you don't multiply these two probabilities together.\n\nThe joint event \"throw 1 fails AND throw 2 exceeds 44\" is simply $$P(F_1) \\times P(X_2 > 44) = 0.3821 \\times 0.1587$$. There's no additional factor for \"throw 2 also exceeds 38.8\" because exceeding 44 already guarantees that.\n\nTreating \"succeeds\" and \"exceeds 44\" as two separate conditions to multiply would be double-counting the same event.", "source": "GLM 5.1 ②", "_id": "glm_2_25"}, {"question": "S1 Jan 2024 Q4(a) — What is the outlier fence rule, and why is it based on the IQR rather than the standard deviation?", "answer": "A value is an outlier if it exceeds $$Q_3 + 1.5 \\times \\text{IQR}$$ (upper fence) or falls below $$Q_1 - 1.5 \\times \\text{IQR}$$ (lower fence), where $$\\text{IQR} = Q_3 - Q_1$$.\n\nThe IQR is used because it's **robust** — resistant to the very outliers it's trying to detect. The standard deviation is itself inflated by outliers, creating a circular dependency: extreme values push up $$\\sigma$$, which widens the \"acceptable\" range, potentially hiding the outliers. The IQR, based only on the middle 50% of data, doesn't suffer this problem.", "source": "GLM 5.1 ②", "_id": "glm_2_18"}, {"question": "S1 Jan 2024 Q3(d) — In a probability question containing the phrase \"Given that a student is right-handed,\" what is the very first line you must write on the page before any numbers are substituted, and why does this habit prevent the most common error on this question? (2 steps)", "answer": "- Step 1: Write the defining formula for conditional probability: $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$ where $$A$$ is the event of interest (e.g., Year 12) and $$B$$ is the conditioning event (right-handed).\n- Step 2: This habit forces you to recognise that the denominator must be $$P(R)$$, not $$1$$. Without it, students routinely report the joint probability $$P(\\text{Y12} \\cap R)$$ — the numerator alone — as the final answer, which is the exact error made in this question.", "source": "Kimi K2.6 ②", "_id": "kimi_2_20"}, {"question": "S1 Jan 2024 Q8(a) — When the interval is $$\\mu - 2k < X < \\mu + 2k$$ and you standardise, what goes inside the $$Z$$ — is it $$k/\\sigma$$ or $$2k/\\sigma$$, and why is this a common mistake?", "answer": "It's $$\\frac{2k}{\\sigma}$$, **not** $$\\frac{k}{\\sigma}$$.\n\nStandardising the upper boundary: $$Z = \\frac{(\\mu + 2k) - \\mu}{\\sigma} = \\frac{2k}{\\sigma}$$.\n\nThe mistake occurs when students see \"2k\" in the interval and mentally separate it into \"2\" and \"k,\" then use only $$k$$ in the standardisation. The entire expression $$2k$$ is the distance from the mean — both the 2 and the k must go into the z-value.\n\nHere: $$\\frac{2k}{6} = 0.8416 \\implies 2k = 5.0496 \\implies k = 2.52$$.", "source": "GLM 5.1 ②", "_id": "glm_2_37"}, {"question": "Under what condition does the PMCC change sign after linear coding? Give a concrete example. (2 steps)", "answer": "- Step 1: The PMCC changes sign if exactly one of the two coding multipliers is negative. If $$u = a + bx$$ and $$v = c + dy$$, then $$r_{u,v} = \\text{sign}(b \\cdot d) \\cdot r_{x,y}$$.\n- Step 2: Example: if $$u = -2x$$ and $$v = 3y$$, then $$b = -2$$, $$d = 3$$, so $$b \\cdot d < 0$$, giving $$r_{u,v} = -r_{x,y}$$. The correlation reverses direction because one variable is reflected.\n\nIn Q2(d), both multipliers were $$5/9 > 0$$, so $$r$$ kept its sign. Always check the signs of both multipliers.", "source": "GLM 5.1 ③", "_id": "glm_3_17"}, {"question": "S1 Jan 2024 Q8(a) — The question states the variance is $$36$$. What is the standard procedural error students make when substituting into the standardisation formula, and what is the correct substitution? (2 steps)", "answer": "- Step 1: Students sometimes substitute the variance $$36$$ directly for $$\\sigma$$ instead of taking the square root.\n- Step 2: The correct substitution is $$\\sigma = \\sqrt{36} = 6$$, because the standardisation formula $$Z = (X-\\mu)/\\sigma$$ explicitly requires the standard deviation, which is the square root of the variance.", "source": "Kimi K2.6 ②", "_id": "kimi_2_59"}, {"question": "What's the difference between \"mutually exclusive\" and \"independent\" events, and why are they often confused?", "answer": "- Step 1: **Mutually exclusive**: $$P(A \\cap B) = 0$$. The events CANNOT both happen.\n- Step 2: **Independent**: $$P(A \\cap B) = P(A) \\cdot P(B)$$. Knowing $$A$$ tells you nothing about $$B$$.\n- Step 3: These are nearly OPPOSITE concepts. If two events with non-zero probability are mutually exclusive, then they CANNOT be independent (knowing $$A$$ happened tells you $$B$$ definitely didn't).\n\nMental separation: ME concerns intersection = **zero**; independence concerns intersection = **product**.", "source": "Opus 4.7 ②", "_id": "opus_2_28"}, {"question": "S1 Jan 2024 Q3(d) — When you see \"find the probability that a student is in Year 12 given that they are right-handed\", what formula must you write down immediately, and where does the denominator come from? (2 steps)", "answer": "- Step 1: Write down $$P(\\text{Y12} \\mid R) = \\frac{P(\\text{Y12} \\cap R)}{P(R)}$$\n- Step 2: The numerator is the probability of being in Year 12 AND right-handed. The denominator $$P(R)$$ is the total probability of being right-handed, which can be found by summing the \"right-handed\" branches on the tree or by using the complement $$1 - P(L)$$.\n+ Always compute the denominator carefully; it is the total probability of the conditioning event.\n\nThe conditioning event (after \"given that\") always becomes the denominator. Never just stop at the numerator.", "source": "GLM 5.1 ①", "_id": "glm_1_10"}, {"question": "In Q8(b), after finding $$\\mu = 3\\sigma$$ from standardisation and $$2\\mu = 3\\sigma^2$$ from the given condition, why do you substitute the linear relation into the quadratic one (not the other way around)? (2 steps)", "answer": "- Step 1: Substituting $$\\mu = 3\\sigma$$ into $$2\\mu = 3\\sigma^2$$ gives $$6\\sigma = 3\\sigma^2$$, a quadratic in $$\\sigma$$ alone — one variable, easy to solve.\n- Step 2: Substituting $$\\sigma = \\mu/3$$ into $$2\\mu = 3\\sigma^2$$ would give $$2\\mu = 3(\\mu/3)^2 = \\mu^2/3$$, i.e., $$\\mu^2 - 6\\mu = 0$$. This also works but is in $$\\mu$$ rather than $$\\sigma$$. Either direction works; the key is to get a single-variable equation.\n\nBoth approaches yield the same solution. Choose whichever feels more natural, but always check that both $$\\mu$$ and $$\\sigma$$ satisfy the original conditions.", "source": "GLM 5.1 ③", "_id": "glm_3_81"}, {"question": "For PMCC invariance under coding, what happens to $$r$$ if ONE of the multipliers is negative?", "answer": "$$r$$ flips sign but keeps magnitude. E.g., if $$u = 3x$$ (positive multiplier) and $$v = -2y$$ (negative multiplier), then $$r_{u,v} = -r_{x,y}$$. PMCC is invariant in MAGNITUDE under all linear coding; the SIGN is preserved only when both multipliers have the same sign (i.e., the product $$bd > 0$$).", "source": "Opus 4.7 ①", "_id": "opus_1_69"}, {"question": "S1 Jan 2024 Exam Strategy — Before applying any coding transformation to a mean, standard deviation, or variance, what mental recitation fixes the additive-vs-multiplicative confusion?", "answer": "Recite: \"Additive constants shift location only — they change the mean but leave spread untouched. Multiplicative constants scale everything — they scale the mean and the standard deviation linearly, and the variance quadratically.\" Speaking this explicitly before writing prevents the panic-induced error of applying $$-32$$ to a standard deviation.", "source": "Kimi K2.6 ②", "_id": "kimi_2_67"}, {"question": "S1 Jan 2024 Q7(d) — Why should you keep values as fractions throughout a variance calculation, and what signals that you've made an arithmetic error?", "answer": "Keeping fractions preserves exact cancellation. In Q7(d), $$\\operatorname{Var}(X) = \\frac{165}{169}$$, and then $$\\operatorname{Var}(13X - 6) = 169 \\times \\frac{165}{169} = 165$$ — the 169 cancels cleanly, giving an integer answer.\n\nConverting to decimals early (e.g., $$\\frac{165}{169} \\approx 0.9763$$) loses precision and makes the final multiplication $$169 \\times 0.9763 = 165.0...$$ require rounding, potentially masking the clean cancellation.\n\n**Signal of error:** if the final answer is a messy decimal (like 164.87 or 165.13) instead of a clean integer, you've likely made an arithmetic slip somewhere — go back and recheck.", "source": "GLM 5.1 ②", "_id": "glm_2_34"}, {"question": "S1 Jan 2024 Q3(d) — What is the critical difference between $$P(A \\cap B)$$ and $$P(A \\mid B)$$, and why does confusing them cost marks?", "answer": "$$P(A \\cap B)$$ = probability that **both** A and B happen (a subset of the whole sample space). $$P(A \\mid B)$$ = probability that A happens **restricted to the world where B already holds** (a subset of B's probability mass).\n\nThey are related by $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$. Since $$P(B) < 1$$ (unless B is certain), $$P(A \\mid B) > P(A \\cap B)$$. Dropping the denominator gives a number that is too small.\n\nIn Q3(d), Phuc wrote $$P(\\text{Y12} \\cap R) = \\frac{7}{20} = 0.35$$, but the correct answer was $$P(\\text{Y12} \\mid R) = \\frac{35}{89} \\approx 0.393$$. The joint is always ≤ the conditional.", "source": "GLM 5.1 ②", "_id": "glm_2_13"}, {"question": "When asked to \"give an interpretation of the gradient of the regression line\", what three elements must your answer include? (1 step + sub-items)", "answer": "The interpretation must include:\n+ **Context**: reference the actual variables (e.g., \"French mark\" and \"Spanish mark\"), not just \"$$x$$\" and \"$$y$$\".\n+ **Direction**: \"increases by\" (positive gradient) or \"decreases by\" (negative gradient).\n+ **Units**: state the units of the response variable (e.g., \"marks\").\n\nIn Q4(c): \"For each additional mark scored in the French test, the predicted Spanish mark increases by approximately 1.04 marks.\" Saying just \"the gradient is 1.04\" gets 0 marks — it's a number, not an interpretation.", "source": "GLM 5.1 ③", "_id": "glm_3_31"}, {"question": "S1 Jan 2024 Q8(b) — When solving for $$\\sigma$$ in a Normal distribution problem, you derive the quadratic $$3\\sigma^2 - 6\\sigma = 0$$, giving roots $$\\sigma = 0$$ and $$\\sigma = 2$$. Why must you reject $$\\sigma = 0$$? (2 steps)", "answer": "- Step 1: The standard deviation $$\\sigma$$ is a measure of spread. If $$\\sigma = 0$$, it means every data point is identical (no spread), which contradicts the premise of a Normal distribution (which models continuous variation).\n- Step 2: In any valid probability distribution, $$\\sigma$$ must be strictly positive ($$\\sigma > 0$$).\n+ Always state the rejection explicitly: \"$$\\sigma > 0$$, so $$\\sigma = 0$$ is rejected\".\n\nAlways check mathematical roots against physical/statistical constraints (probabilities between 0 and 1, $$\\sigma > 0$$).", "source": "GLM 5.1 ①", "_id": "glm_1_29"}, {"question": "S1 Jan 2024 — What is the recommended procedure for computing the denominator $$P(B)$$ in a conditional probability question, and how does it serve as both a calculation and a verification step?", "answer": "Compute $$P(B)$$ by **two independent routes**:\n\n+ Route 1 (complement): $$P(B) = 1 - P(B')$$. Fast and elegant if $$P(B')$$ is known.\n+ Route 2 (direct from tree/Venn): $$P(B) = P(B \\cap A_1) + P(B \\cap A_2) + \\cdots$$. More laborious but uses different arithmetic.\n\nIf both routes agree, you have high confidence in $$P(B)$$. If they disagree, you've caught an error before it propagates into the conditional probability answer.\n\nThis is especially valuable in exam conditions where a single arithmetic slip (e.g., adding fractions with wrong denominators) can cost multiple marks.", "source": "GLM 5.1 ②", "_id": "glm_2_52"}, {"question": "S1 Jan 2024 Q5(b) — To find the probability of qualifying in at most three independent attempts, where each attempt is a success/failure trial, why is the complement method preferred over summing individual cases, and what is the formula? (2 steps)", "answer": "- Step 1: The direct method requires summing the probabilities of qualifying on the 1st, 2nd, or 3rd attempt, which involves three separate calculations. The complement method requires only one.\n- Step 2: Use $$P(\\text{qualifies}) = 1 - P(\\text{fails all three}) = 1 - [P(\\text{fail})]^3$$. This is valid because the attempts are independent, so the joint probability of three failures is the cube of the single-failure probability.", "source": "Kimi K2.6 ①", "_id": "kimi_1_29"}, {"question": "S1 Jan 2024 Q5(b) — When computing $$P(\\text{qualifies in at most 3 attempts})$$ for independent trials, what is the most efficient approach, and why?", "answer": "Use the **complement method**: $$P(\\text{qualifies}) = 1 - P(\\text{all 3 fail}) = 1 - P(F)^3$$.\n\nThis is more efficient than summing the three qualifying scenarios (qualifies on throw 1 + qualifies on throw 2 + qualifies on throw 3) because:\n+ The complement is a single term.\n+ The three qualifying scenarios are mutually exclusive but require computing each separately.\n+ The complement avoids potential double-counting errors.\n\nSince each throw is independent with $$P(F) = 0.3821$$: $$P(\\text{qualifies}) = 1 - 0.3821^3 = 1 - 0.0558 = 0.9442$$.", "source": "GLM 5.1 ②", "_id": "glm_2_24"}, {"question": "Why is $$P(R) = 1 - P(L)$$ a valid shortcut on the probability tree for Q3(d)?", "answer": "Every student is either left-handed OR right-handed (the two outcomes partition the sample space, and they're mutually exclusive). So $$P(L) + P(R) = 1$$, giving $$P(R) = 1 - P(L) = 1 - 0.11 = 0.89$$. This complement route avoids the longer direct sum down the tree — but you should still verify both routes match to catch arithmetic slips.", "source": "Opus 4.7 ①", "_id": "opus_1_72"}, {"question": "S1 Jan 2024 Q1(b) — When estimating the median from grouped data, what is the crucial first step before applying the interpolation formula, and what common mistake must you avoid? (2 steps)", "answer": "- Step 1: Calculate the median position, which is $$n/2$$ (where $$n$$ is the total frequency), and then use **cumulative frequency** to locate which class contains this position.\n- Step 2: The common mistake to avoid is using the raw frequency of individual classes to find the median; you must accumulate the frequencies to find where the $$n/2$$-th value falls.\n+ For example, with $$n=408$$, the median position is 204. You check cumulative frequencies until you find the class where the cumulative frequency first exceeds 204.\n\nThe median class is defined by the cumulative frequency crossing the $$n/2$$ threshold, not by which individual class has the highest frequency.", "source": "GLM 5.1 ①", "_id": "glm_1_1"}, {"question": "A quick exercise: If $$P(A) = 0.4$$, $$P(B \\mid A) = 0.5$$, and $$P(A \\cup B) = 0.5$$, find $$P(B)$$. (conceptual walkthrough) (3 steps)", "answer": "- Step 1: From $$P(B \\mid A) = 0.5$$: $$P(A \\cap B) = P(B \\mid A) \\times P(A) = 0.5 \\times 0.4 = 0.2$$.\n- Step 2: From the addition rule: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$, so $$0.5 = 0.4 + P(B) - 0.2$$.\n- Step 3: Solve: $$P(B) = 0.5 - 0.4 + 0.2 = 0.3$$.\n\nThis mirrors Q6(a)'s structure: use the conditional to find the intersection, then use the addition rule to find the unknown probability.", "source": "GLM 5.1 ③", "_id": "glm_3_82"}, {"question": "S1 Jan 2024 Q6(b)(i) — When two events are \"mutually exclusive,\" what does that mean probabilistically, and how does it simplify the union formula?", "answer": "Mutually exclusive means $$P(A \\cap B) = 0$$ — the events cannot occur simultaneously.\n\nThis simplifies the addition rule from $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$ to $$P(A \\cup B) = P(A) + P(B)$$. The intersection term vanishes.\n\n**Do NOT** use the full formula with the intersection and then forget to set it to zero — that gives a wrong equation. And do NOT confuse \"mutually exclusive\" with \"independent\" — they are completely different concepts (independent events can co-occur; mutually exclusive events cannot).", "source": "GLM 5.1 ②", "_id": "glm_2_28"}, {"question": "S1 Jan 2024 Q8(a) — What is the relationship between variance and standard deviation, and what's the common pitfall when a question gives you one but you need the other?", "answer": "$$\\sigma = \\sqrt{\\text{Var}}$$ and $$\\text{Var} = \\sigma^2$$.\n\nThe pitfall: when a question states \"variance 36,\" students sometimes plug 36 directly into the standardisation formula as if it were $$\\sigma$$. But $$\\sigma = \\sqrt{36} = 6$$. Always check: does the question give variance or standard deviation? If variance, take the square root before standardising.\n\nSimilarly, if you compute $$\\sigma^2$$ and need to report s.d., don't forget the square root.", "source": "GLM 5.1 ②", "_id": "glm_2_51"}, {"question": "State the addition rule for $$P(A \\cup B)$$ in terms of $$P(A)$$, $$P(B)$$, and $$P(A \\cap B)$$. Why is the intersection subtracted? (2 steps)", "answer": "- Step 1: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$.\n- Step 2: Adding $$P(A)$$ and $$P(B)$$ double-counts the overlap $$P(A \\cap B)$$ — those outcomes are in both $$A$$ and $$B$$. Subtracting once corrects for this double-counting.\n\nIn Q6(a): $$0.65 = x + y - 0.3x$$, which simplifies to $$0.65 = 0.7x + y$$.", "source": "GLM 5.1 ③", "_id": "glm_3_42"}, {"question": "Independence vs mutually exclusive — what's the test for each, and how are they different?", "answer": "- **Independence**: $$P(A \\cap B) = P(A) \\cdot P(B)$$. Means knowing $$A$$ tells you nothing about $$B$$. Concerns the intersection product.\n- **Mutually exclusive**: $$P(A \\cap B) = 0$$. Means $$A$$ and $$B$$ cannot both happen. Concerns the intersection being zero.\n\nThese are almost opposites: mutually exclusive events with positive probabilities are NEVER independent (knowing one happened guarantees the other didn't, which is maximal dependence).", "source": "Opus 4.7 ①", "_id": "opus_1_39"}, {"question": "What is the difference between \"mutually exclusive\" and \"statistically independent\"? Can events be both simultaneously? (3 steps)", "answer": "- Step 1: **Mutually exclusive** means $$P(A \\cap B) = 0$$ — the events cannot co-occur. **Independent** means $$P(A \\cap B) = P(A) \\cdot P(B)$$ — the probability of co-occurrence equals the product of individual probabilities.\n- Step 2: If two events with positive probability are mutually exclusive, then $$P(A \\cap B) = 0 \\neq P(A) \\cdot P(B)$$ (since both $$P(A) > 0$$ and $$P(B) > 0$$), so they are **not** independent. Mutually exclusive events with positive probability are always *dependent*.\n- Step 3: The only way events can be both mutually exclusive and independent is if at least one has probability zero (a trivial/degenerate case).\n\nIntuition: if knowing $$A$$ happened tells you $$B$$ definitely didn't happen (mutually exclusive), then $$A$$ clearly gives information about $$B$$ — so they're not independent.", "source": "GLM 5.1 ③", "_id": "glm_3_45"}, {"question": "S1 Jan 2024 Q4(e) — When estimating values using a regression line, how do you determine which estimate is more reliable, and what keywords must you use in your answer? (2 steps)", "answer": "- Step 1: Check if the $$x$$-value used for the estimate falls **within** the observed range of the data (interpolation) or **outside** it (extrapolation).\n- Step 2: Interpolation is reliable because the linear relationship is observed in that range. Extrapolation is unreliable because the relationship may not hold outside the observed range.\n+ You must explicitly state the data range (e.g., \"$$24 \\le f \\le 68$$\") and use the words \"interpolation\" and \"extrapolation\".\n\nInterpolation (inside) = reliable; Extrapolation (outside) = unreliable. Always quote the data range to justify your answer.", "source": "GLM 5.1 ①", "_id": "glm_1_16"}, {"question": "When the histogram mean (13.2) is less than the median (13.3), why does this indicate negative skew? Build the intuition. (3 steps)", "answer": "- Step 1: The mean is sensitive to extreme values — it's pulled toward the long tail. The median is resistant — it stays near the centre of the bulk of the data.\n- Step 2: If the mean is *less* than the median, the mean has been pulled *downward*, meaning the long tail is on the *lower* (left) side of the distribution.\n- Step 3: A long tail on the left is the definition of **negative skew** (also called left-skewed). The bulk of the data is on the right, with a few small values dragging the mean down.\n\nVisual: imagine a mostly right-leaning histogram with a thin tail stretching left. The median sits in the tall right portion, while the mean gets tugged left into the tail.", "source": "GLM 5.1 ③", "_id": "glm_3_74"}, {"question": "S1 Jan 2024 Q7(d) — What are the two most common incorrect ways students mishandle the constants when computing $$\\operatorname{Var}(13X - 6)$$, and what do they confuse variance with? (2 steps)", "answer": "- Step 1: The first error is $$\\operatorname{Var}(13X - 6) = 13\\operatorname{Var}(X) - 6$$, which confuses the variance rule with the expectation rule $$E(aX+b) = aE(X)+b$$.\n+ The second error is $$\\operatorname{Var}(13X - 6) = 13\\operatorname{Var}(X)$$, which forgets that variance is based on squared deviations.\n- Step 2: Both mistakes stem from treating variance as a linear operator rather than a quadratic one; the correct rule is $$\\operatorname{Var}(aX+b) = a^2\\operatorname{Var}(X)$$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_55"}, {"question": "S1 Jan 2024 Q7(d) — When computing $$\\operatorname{Var}(13X - 6)$$, what are the three most common wrong answers, and what error does each represent?", "answer": "+ $$13\\operatorname{Var}(X) - 6$$: Applied the transformation linearly (as if variance were a linear function). Wrong on both terms — variance is quadratic in the multiplier and invariant to the additive constant.\n+ $$13\\operatorname{Var}(X)$$: Remembered to drop the additive constant but forgot to square the multiplier.\n+ $$13^2\\operatorname{Var}(X) - 6$$: Remembered to square the multiplier but kept the additive constant.\n\nThe only correct form: $$\\operatorname{Var}(aX + b) = a^2\\operatorname{Var}(X)$$. Here, $$a = 13$$, $$b = -6$$, so $$169 \\times \\frac{165}{169} = 165$$.", "source": "GLM 5.1 ②", "_id": "glm_2_57"}, {"question": "What is the general coding rule for linear transformations $$u = a + bx$$, covering mean, standard deviation, and variance? (1 step + sub-items)", "answer": "+ $$\\bar{u} = a + b\\bar{x}$$ (both constant and multiplier affect the mean)\n+ $$\\sigma_u = |b| \\cdot \\sigma_x$$ (only the multiplier affects s.d.)\n+ $$\\text{Var}(u) = b^2 \\cdot \\text{Var}(x)$$ (multiplier squared; additive constant vanishes)\n\nThe mnemonic: \"Additive shifts move the centre but don't stretch the spread; multiplicative scaling stretches the spread (and squares for variance).\"", "source": "GLM 5.1 ③", "_id": "glm_3_15"}, {"question": "What is the full list of \"non-physical\" results you should explicitly reject in S1, and what is the general principle? (1 step + sub-items)", "answer": "The general principle: **any result that violates the axioms of probability or the definition of a parameter must be rejected with a stated reason.**\n\n+ $$\\sigma \\leq 0$$ — standard deviation must be strictly positive\n+ Probabilities outside [0, 1] — impossible by definition\n+ $$|r| > 1$$ — PMCC is bounded by −1 and 1\n+ Negative frequencies — counts cannot be negative\n+ $$P(A \\cap B) > \\min(P(A), P(B))$$ — intersection can't exceed either individual probability\n\nAlways write a one-line rejection: \"$$\\sigma > 0$$, so reject $$\\sigma = 0$$\" or similar. This earns the method mark.", "source": "GLM 5.1 ③", "_id": "glm_3_89"}, {"question": "S1 Jan 2024 — What is the key distinction between the independence test and the mutually exclusive test, and why is confusing them so dangerous?", "answer": "Independence test: $$P(A \\cap B) = P(A) \\times P(B)$$ — the intersection equals the **product** of marginals.\nMutually exclusive test: $$P(A \\cap B) = 0$$ — the intersection is **zero**.\n\nConfusing them is dangerous because they give opposite conclusions for events with positive probability:\n+ If A and B are mutually exclusive and both have $$P > 0$$, then $$P(A \\cap B) = 0 \\ne P(A)P(B)$$, so they are **dependent**.\n+ If A and B are independent with $$P > 0$$, then $$P(A \\cap B) > 0$$, so they are **not** mutually exclusive.\n\nThe only events that are both independent and mutually exclusive have $$P(A) = 0$$ or $$P(B) = 0$$ — degenerate cases.", "source": "GLM 5.1 ②", "_id": "glm_2_53"}, {"question": "S1 Jan 2024 Q3(d) — In the conditional probability formula, why does the conditioning event act as the \"new total\" or restricted sample space, and what would happen conceptually if you omitted it? (2 steps)", "answer": "- Step 1: The conditioning event $$B$$ represents the subset of the original sample space that is known to have occurred. All probability mass outside $$B$$ is discarded, so the remaining mass inside $$B$$ must be renormalised to total $$1$$.\n- Step 2: If you omitted $$P(B)$$ from the denominator, you would be reporting the joint probability $$P(A \\cap B)$$ relative to the entire original sample space. This understates the proportion because it ignores that the universe of possibilities has shrunk.", "source": "Kimi K2.6 ①", "_id": "kimi_1_17"}, {"question": "S1 Jan 2024 Q2(c) — When a linear coding $$c = \\frac{5}{9}(f - 32)$$ is applied, why does only the multiplicative factor ($$\\frac{5}{9}$$) affect the standard deviation, and why is it $$|b|$$ rather than $$b$$?", "answer": "The multiplier $$b$$ stretches or compresses all deviations from the mean by factor $$|b|$$. If $$b$$ is negative (e.g., $$u = 10 - 2x$$), the distribution is reflected and stretched, but spread is about magnitude of distances, not direction — hence $$\\sigma_u = |b|\\sigma_x$$.\n\nThe factor $$\\frac{5}{9}$$ is positive here, so $$\\sigma_c = \\frac{5}{9}\\sigma_f$$. If the coding had been $$c = 32 - \\frac{5}{9}f$$ (negative $$b$$), the s.d. would still be $$\\frac{5}{9}\\sigma_f$$, not $$-\\frac{5}{9}\\sigma_f$$.", "source": "GLM 5.1 ②", "_id": "glm_2_10"}, {"question": "A quick exercise: If $$\\text{Var}(X) = 4$$, what is $$\\text{Var}(3X + 10)$$? (mental math)", "answer": "$$\\text{Var}(3X + 10) = 3^2 \\cdot \\text{Var}(X) = 9 \\times 4 = 36$$.\n\nThe $$+10$$ vanishes (additive constant doesn't affect spread), and the 3 is squared (scaling deviations by 3 squares the variance). Compare: $$\\text{sd}(3X + 10) = 3 \\times 2 = 6$$, and $$6^2 = 36$$ ✓.", "source": "GLM 5.1 ③", "_id": "glm_3_56"}, {"question": "When a histogram question asks for probability between two values, what mental check tells you whether to use whole-class frequencies or proportional splitting?", "answer": "Check whether the boundaries align with class edges. If \"between 9 and 13 cm\" matches a class boundary exactly, use the whole-class frequency. If \"between 8 and 14 cm\" cuts through classes ($$[5,9)$$ and $$[13,15)$$), you must split by class width assuming **uniform distribution within each class**.", "source": "Opus 4.7 ①", "_id": "opus_1_64"}, {"question": "Why is $$p \\times \\frac{7}{8}$$ the wrong answer to \"given that the student is right-handed, find the probability they are in Year 12\"?", "answer": "$$p \\times \\frac{7}{8}$$ traces a path down the tree: Year 12 AND right-handed. That's the **joint** probability $$P(\\text{Y12} \\cap R)$$, not the conditional $$P(\\text{Y12} \\mid R)$$. The conditional must be divided by $$P(R)$$ (the probability of the conditioning event), which restricts the sample space to right-handers only.", "source": "Opus 4.7 ①", "_id": "opus_1_20"}, {"question": "S1 Jan 2024 Q5(b) — When drawing a probability tree for multi-stage independent trials (e.g., 3 throws), what should you label on each branch, and how does this help avoid the joint-vs-conditional confusion?", "answer": "Label each branch with the **outcome** (success/fail) and its **probability**. For a 3-throw problem:\n+ Throw 1: S (0.6179) / F (0.3821)\n+ Throw 2 (from each Throw 1 outcome): S / F\n+ Throw 3 (from each Throw 2 outcome): S / F\n\nThe tree makes the joint probability of any path explicit: **multiply along the path**. The conditional probability \"given qualified\" then requires **dividing by the total probability of all qualifying paths** (i.e., all paths with at least one S).\n\nDrawing the tree forces you to see which paths are in the numerator (the specific qualifying path) and which go in the denominator (all qualifying paths), preventing the error of returning just the numerator.", "source": "GLM 5.1 ②", "_id": "glm_2_50"}, {"question": "What's the contextual interpretation of a regression gradient, and what specific words must appear for the mark?", "answer": "For \"$$s$$ on $$f$$\" with gradient 1.04: \"For each additional mark scored in the **French** test, the predicted **Spanish** mark increases by approximately **1.04 marks**.\"\n\nRequired elements:\n- **Units** (marks, °C, cm — whatever the variables are in).\n- **Contextual variable names** (French/Spanish, not \"$$x$$/$$y$$\").\n- **The phrase \"for each additional\" or equivalent.**\n- **\"Predicted\" or \"estimated\"** — acknowledging the regression line is an estimate, not a deterministic law.\n\nJust \"the gradient is 1.04\" loses the mark.", "source": "Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "What is the coding recitation rule you should state to yourself before applying any linear transformation? (2 steps)", "answer": "- Step 1: Recite: **\"Additive constant drops; multiplier applies — and squares for variance.\"**\n- Step 2: This single sentence covers both Q2(c) (the $$-32$$ doesn't affect $$\\sigma$$, but $$\\times 5/9$$ does) and Q7(d) (the $$-6$$ vanishes from $$\\text{Var}(13X-6)$$, and 13 gets squared).\n\nWithout this rule, it's easy to panic: \"Did I forget to subtract 32 from the s.d.?\" or \"Should the $$-6$$ appear in the variance?\" The rule gives certainty.", "source": "GLM 5.1 ③", "_id": "glm_3_67"}, {"question": "What is the time budget for an S1 paper (75 marks in 90 minutes), and what's the rough allocation per question? (2 steps)", "answer": "- Step 1: The rate is approximately **1.2 minutes per mark**. An 8-mark question gets ~10 minutes; a 12-mark question gets ~14 minutes.\n- Step 2: Approximate allocations: Q1 ≈ 10 min, Q2 ≈ 14 min, Q3 ≈ 10 min, Q4 ≈ 14 min, Q5 ≈ 10 min, Q6 ≈ 11 min, Q7 ≈ 12 min, Q8 ≈ 11 min. Total ≈ 92 min — slightly over, so you need to work efficiently.\n\nSaving ~3 minutes by memorising formulas (instead of looking them up) and key $$\\Phi$$ values can make the difference between finishing and running out of time.", "source": "GLM 5.1 ③", "_id": "glm_3_71"}, {"question": "S1 Jan 2024 Q7(d) — When calculating $$\\operatorname{Var}(13X - 6)$$ where $$E(X)$$ and $$E(X^2)$$ are fractions, why is it crucial to keep values as fractions until the very end? (2 steps)", "answer": "- Step 1: The variance formula is $$\\operatorname{Var}(X) = E(X^2) - (E(X))^2$$. This involves subtracting two numbers that are often very close in value.\n- Step 2: Converting to decimals early introduces rounding errors that compound during subtraction, leading to an inaccurate final variance.\n+ Furthermore, in this specific problem, $$\\operatorname{Var}(X)$$ has a denominator of 169, which perfectly cancels with the $$13^2 = 169$$ from the variance scaling rule, yielding a clean integer answer (165).\n\nKeep fractions throughout variance calculations to preserve precision and allow for clean cancellations.", "source": "GLM 5.1 ①", "_id": "glm_1_27"}, {"question": "S1 Jan 2024 — What is the overall pattern of this paper, and what single conceptual fix would raise a score the most?", "answer": "The paper tests conditional probability three times (Q3d, Q5b, Q6a), Normal distribution twice (Q5, Q8), and coding/transformations twice (Q2, Q7). Half the marks are gated by \"show that\" working.\n\nThe single highest-impact fix: **always write the conditional probability formula $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$ when you see \"given that.\"** Phuc's error on Q3(d) — returning $$P(A \\cap B)$$ instead of $$P(A \\mid B)$$ — cost 2 marks and the same mistake pattern resurfaces in Q5(b). Fixing this one habit unlocks 4–6 marks per S1 paper, potentially raising a high-B to a comfortable A.", "source": "GLM 5.1 ②", "_id": "glm_2_59"}, {"question": "What is the critical difference between $$P(A \\cap B)$$ and $$P(A \\mid B)$$? Explain why confusing them gives a numerically different answer. (3 steps)", "answer": "- Step 1: $$P(A \\cap B)$$ is the **joint** probability — the chance that both $$A$$ and $$B$$ happen simultaneously. It's a proportion of the *entire* sample space.\n- Step 2: $$P(A \\mid B)$$ is the **conditional** probability — the chance that $$A$$ happens *restricted to the world where $$B$$ has already happened*. It's a proportion of $$P(B)$$ only.\n- Step 3: Since $$P(A \\cap B) = P(A \\mid B) \\times P(B)$$ and $$P(B) < 1$$ (usually), we have $$P(A \\mid B) > P(A \\cap B)$$. The conditional probability is always larger (or equal) because you're dividing by a number less than 1.\n\nIn Q3(d): $$P(\\text{Y12} \\cap R) = \\frac{7}{20} = 0.35$$ but $$P(\\text{Y12} \\mid R) = \\frac{35}{89} \\approx 0.393$$. The conditional is larger because we're restricting to right-handed students only.", "source": "GLM 5.1 ③", "_id": "glm_3_22"}, {"question": "S1 Jan 2024 Q1(a) — after filling in a frequency table from a histogram, what's the one-line sanity check you should perform before moving on, and what type of error does it catch? (3 steps)", "answer": "- Step 1: Sum every frequency you've written in the table and compare to the stated total $$n$$ (here 408). If they don't match, stop and re-read the histogram.\n- Step 2: This catches the most common histogram-reading error — misreading a frequency density off the y-axis, or multiplying by the wrong class width. Both produce a wrong frequency that propagates into every subsequent part (median, skew, probability).\n- Step 3: The check costs maybe 5 seconds but insures every downstream calculation. Without it, a single misread bar silently corrupts parts (b), (c) AND (d).\n\nTakeaway
