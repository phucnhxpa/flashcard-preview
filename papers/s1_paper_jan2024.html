<script>
const DATA={"selected": [{"question": "What is the difference between $P(A \\cap B)$ and $P(A \\mid B)$, both conceptually and numerically? (2 steps)", "answer": "- Step 1: **Conceptually**: $P(A \\cap B)$ is the proportion of *all* outcomes where both $A$ and $B$ occur. $P(A \\mid B)$ is the proportion of outcomes where $A$ occurs *among those where $B$ has already occurred*. The second restricts the universe to $B$-outcomes only.\n- Step 2: **Numerically**: $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$ Since $P(B) \\le 1$, we have $P(A \\mid B) \\ge P(A \\cap B)$. The conditional probability is always at least as large as the joint — they're equal only when $P(B) = 1$ (i.e., $B$ always happens).\n\nThe denominator $P(B)$ is the scaling factor. Forget it, and you report the joint instead of the conditional — Phuc's exact error on Q3(d).", "source": "GLM 5.1 ③", "_id": "glm_3_40"}, {"question": "Whenever a question contains the phrase \"given that\", what is the first formula you should write down, and what is the most common error students make when translating this phrase into mathematics? (2 steps)", "answer": "- Step 1: Immediately write $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$, where $$B$$ is the conditioning event stated after \"given that\". This forces the correct mathematical structure before any numbers are substituted.\n- Step 2: The most common error is reporting the joint probability $$P(A \\cap B)$$ as the final answer, omitting the denominator $$P(B)$$. The phrase \"given that $$B$$\" restricts the sample space to only those outcomes where $$B$$ occurs, so the total probability of $$B$$ must divide the joint probability to renormalise.", "source": "Kimi K2.6 ①", "_id": "kimi_1_15"}, {"question": "An athlete has 3 independent attempts to throw a discus more than 38.8 m to qualify. Once they qualify, they stop. What is $$P(\\text{qualifies})$$, and why is the complement method cleaner than summing cases? (3 steps)", "answer": "- Step 1: Define $$P(\\text{fail on one throw}) = P(X < 38.8) = 0.3821$$ and $$P(\\text{succeed on one throw}) = 0.6179$$.\n- Step 2: The complement of \"qualifies\" is \"fails all 3 throws.\" Since throws are independent: $$P(\\text{all 3 fail}) = 0.3821^3 = 0.0558$$.\n- Step 3: $$P(\\text{qualifies}) = 1 - 0.0558 = 0.9442$$. This is cleaner than summing three cases (succeed on throw 1, or fail-then-succeed on throw 2, or fail-fail-succeed on throw 3) because the complement is a single product.\n\nThe \"at least one success in $$n$$ independent trials\" formula is $$1 - P(\\text{fail})^n$$. It works because \"at least one success\" is the complement of \"all fail,\" and independence lets you multiply the failure probabilities.", "source": "GLM 5.1 ②", "_id": "glm_2_26"}, {"question": "Given French marks ranging $$24 \\le f \\le 68$$, classify predictions at $$f=55$$ and $$f=18$$, and state which is more reliable. (2 steps)", "answer": "- Step 1: $$f=55$$ lies inside $$[24,68]$$ → interpolation; $$f=18$$ lies outside (below 24) → extrapolation.\n- Step 2: The prediction at $$f=55$$ is more reliable because the linear model has been validated on observations near 55. At $$f=18$$ we have no data supporting the linear assumption — the predicted Spanish mark could be far off.", "source": "Opus 4.7 ②", "_id": "opus_2_24"}, {"question": "Contrast \"mutually exclusive\" with \"independent\" — why can two events with non-zero probabilities never be both?", "answer": "Mutually exclusive means $$P(A \\cap B) = 0$$. Independent means $$P(A \\cap B) = P(A)P(B)$$. If both held simultaneously, we'd need $$P(A)P(B) = 0$$, forcing at least one of $$P(A), P(B)$$ to be zero. So for events with $$P(A), P(B) > 0$$, mutually exclusive and independent are *opposites*: mutually exclusive means maximum interference (one happening rules out the other), while independence means no interference at all.", "source": "Opus 4.7 ②", "_id": "opus_2_35"}, {"question": "For the regression line $$s = a + bf$$, you compute $$b = 1.04$$ and $$\\bar{f} = 42.2$$, $$\\bar{s} = 38.2$$. Calculate the intercept $$a$$ and explain why it's negative. (2 steps)", "answer": "- Step 1: $$a = \\bar{s} - b\\bar{f} = 38.2 - 1.04 \\times 42.2 = 38.2 - 43.888 = -5.688 \\approx -5.72$$ (3 s.f.).\n- Step 2: The intercept is negative because $$b\\bar{f} > \\bar{s}$$: the slope times the mean of $$f$$ (1.04 × 42.2 ≈ 43.9) exceeds the mean of $$s$$ (38.2). Geometrically, the regression line passes through $$(\\bar{f}, \\bar{s}) = (42.2, 38.2)$$ with a positive slope, so extending it leftward to $$f = 0$$ takes it below zero.\n\n+ A negative intercept is not an error — it just means the line, if extended to $$f = 0$$, would predict a negative Spanish mark. Since $$f = 0$$ is outside the data range, this is extrapolation and not a concern.", "source": "GLM 5.1 ①", "_id": "glm_1_59"}, {"question": "A tree diagram gives: Year 12 (prob $p$), then L with prob $\\frac{1}{8}$; Year 13 (prob $1-p$), then L with prob $\\frac{1}{10}$. If $P(L) = 0.11$, how do you form the equation and solve for $p$? (3 steps)", "answer": "- Step 1: Use the law of total probability. The event $L$ can happen via two mutually exclusive paths: $$P(L) = P(\\text{Y12}) \\cdot P(L \\mid \\text{Y12}) + P(\\text{Y13}) \\cdot P(L \\mid \\text{Y13})$$\n- Step 2: Substitute: $$p \\cdot \\frac{1}{8} + (1-p) \\cdot \\frac{1}{10} = 0.11$$ Clear fractions by multiplying through by 80: $$10p + 8(1-p) = 8.8$$ $$10p + 8 - 8p = 8.8$$ $$2p = 0.8$$\n- Step 3: $$p = 0.4 = \\frac{2}{5}$$\n\nThe tree gives you a natural partition of the event $L$ into disjoint cases — sum the path products.", "source": "GLM 5.1 ③", "_id": "glm_3_13"}, {"question": "A target answer is 8.57 to 3 s.f. Why should you quote an intermediate value like 8.5716 before rounding? (2 steps)", "answer": "- Step 1: It demonstrates that the rounding was performed from a more precise value — examiners want evidence that the rounding direction was justified (8.5716 rounds *up* to 8.57 because the next digit is 1; not from 8.567 which would round differently).\n- Step 2: Quoting one extra significant figure also guards against transcription errors: if the candidate's working really gives 8.572 (truncated), an examiner can see it.", "source": "Opus 4.7 ①", "_id": "opus_1_46"}, {"question": "Compute $\\operatorname{Var}(13X - 6)$ given $\\operatorname{Var}(X) = \\frac{165}{169}$. Why does the 169 cancel, and what happens if you convert to decimals too early? (3 steps)", "answer": "- Step 1: $$\\operatorname{Var}(13X - 6) = 13^2 \\operatorname{Var}(X) = 169 \\times \\frac{165}{169} = 165$$\n- Step 2: The 169 cancels because it appears as both the multiplier ($13^2$) and the denominator of $\\operatorname{Var}(X)$. This cancellation is exact and clean — *only* if you keep fractions.\n- Step 3: If you convert $\\frac{165}{169} \\approx 0.97633$ to a decimal first, then $169 \\times 0.97633 = 164.999...$, which rounds to 165 but introduces rounding error risk. On a calculator-free check, you'd miss the clean integer answer. **Keep fractions until the very end.**\n\nThe final answer is exactly 165 — a clean integer. If your answer is messy, recheck.", "source": "GLM 5.1 ③", "_id": "glm_3_34"}, {"question": "Why does S1 use the population standard deviation formula (denominator $$n$$) rather than the sample formula (denominator $$n-1$$)?", "answer": "S1 treats the given data as the *entire population* of interest, not a sample drawn to estimate a wider population's spread. The $$n-1$$ correction (Bessel's correction) is needed only when estimating an unknown population s.d. from a sample — and the unbiased correction belongs to inferential statistics, beyond the S1 syllabus. Using $$n$$ is consistent with treating the data as fully observed.", "source": "Opus 4.7 ②", "_id": "opus_2_15"}, {"question": "If $u = a + bx$ and $v = c + dy$ with $b, d > 0$, why is $r_{uv} = r_{xy}$? What would happen if one multiplier were negative? (2 steps)", "answer": "- Step 1: PMCC measures the *direction and strength of linear association*. Positive linear coding (adding constants, multiplying by positive scalars) stretches or shifts the data but does not flip the scatter cloud. The correlation — the tightness and direction of the linear pattern — is unchanged.\n- Step 2: If exactly one of $b$ or $d$ is negative, the scatter cloud flips along one axis, reversing the direction of association. Then $$r_{uv} = -r_{xy}$$ If both are negative, two flips cancel: $r_{uv} = r_{xy}$.\n\nThe rule: $r_{uv} = \\text{sign}(b \\cdot d) \\cdot r_{xy}$. In the exam, always state the value AND the reason.", "source": "GLM 5.1 ③", "_id": "glm_3_11"}, {"question": "Memorise these common Normal table values and explain why $$\\Phi(1.96)$$ is so widely cited.", "answer": "Key values:\n- $$\\Phi(0.84) \\approx 0.80$$\n- $$\\Phi(1.00) \\approx 0.8413$$\n- $$\\Phi(1.28) \\approx 0.90$$\n- $$\\Phi(1.50) = 0.9332$$\n- $$\\Phi(1.645) = 0.95$$\n- $$\\Phi(1.96) = 0.975$$\n- $$\\Phi(2.33) \\approx 0.99$$\n\n$$\\Phi(1.96)$$ is the 97.5th percentile, so $$P(|Z| < 1.96) = 0.95$$ — the basis for the 95% confidence interval. It's the most-used Normal value in all of statistics.", "source": "Opus 4.7 ②", "_id": "opus_2_48"}, {"question": "State the least-squares regression formulas for the line $$y = a + bx$$, and explain conceptually what each minimises. (2 steps)", "answer": "- Step 1: $$b = \\frac{S_{xy}}{S_{xx}}$$ and $$a = \\bar{y} - b\\bar{x}$$.\n- Step 2: These minimise the sum of squared *vertical* residuals $$\\sum (y_i - \\hat{y}_i)^2$$ — i.e., we are predicting $$y$$ from $$x$$, so errors are measured along the $$y$$-direction. The formula for $$a$$ guarantees the line passes through the centroid $$(\\bar{x}, \\bar{y})$$.\n\nThe regression of $$y$$ on $$x$$ is *different* from the regression of $$x$$ on $$y$$ — the asymmetry comes from which residual is being squared.", "source": "Opus 4.7 ②", "_id": "opus_2_21"}, {"question": "A student computes $P(\\text{Y12} \\cap R) = p \\cdot \\tfrac{7}{8}$ and writes this as the answer to \"Given that a student is right-handed, find the probability they are in Year 12.\" Why is this wrong, and what is the correct structure of the answer? (3 steps)", "answer": "- Step 1: The expression $p \\cdot \\tfrac{7}{8}$ is the **joint probability** that a randomly chosen student is *both* in Y12 *and* right-handed — it's a path-product down the tree.\n- Step 2: The question asks for a **conditional probability**: given right-handed, what's the chance of Y12? The conditioning restricts the sample space to right-handed students, so we need to divide by $P(R)$.\n- Step 3: Correct: $$P(\\text{Y12} | R) = \\frac{P(\\text{Y12} \\cap R)}{P(R)} = \\frac{p \\cdot 7/8}{1 - P(L)}.$$ The denominator effectively re-normalises the probability over the smaller universe of right-handers.\n\nTakeaway: joint vs conditional is a sample-space distinction; conditioning re-scales by the size of the conditioning event.", "source": "Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "What is the general formula for converting a symmetric central probability $$P(|Z| < z) = c$$ into a one-tail lookup, and why does it work? (2 steps)", "answer": "- Step 1: $$\\Phi(z) = \\frac{1 + c}{2}$$. For example, if $$c = 0.6$$, then $$\\Phi(z) = 0.8$$.\n- Step 2: The central probability $$c$$ is the area between $$-z$$ and $$z$$. By symmetry, this equals $$2\\Phi(z) - 1$$ (the area below $$z$$, minus the area below $$-z$$, which equals the area above $$z$$). Rearranging: $$2\\Phi(z) - 1 = c \\Rightarrow \\Phi(z) = \\frac{1+c}{2}$$.\n\nVisual intuition: if 60% is in the centre, then 20% is in each tail. The area below the upper boundary is 80% (centre + left tail = 60% + 20%).", "source": "GLM 5.1 ②", "_id": "glm_2_68"}, {"question": "In a histogram, why is the **area** of each bar proportional to frequency, rather than the height? (3 steps)", "answer": "- Step 1: Histograms are designed to display grouped data where different classes may have different widths. If we used raw frequency on the vertical axis, a wider class would visually exaggerate its importance even with the same density of data.\n- Step 2: The remedy is to plot **frequency density** on the vertical axis, defined as $$ \\text{frequency density} = \\frac{\\text{frequency}}{\\text{class width}} $$. Rearranging gives $$ \\text{frequency} = \\text{frequency density} \\times \\text{class width} $$, which is exactly the area of the bar.\n+ For example, a class of width $$4$$ with frequency $$32$$ has density $$8$$; a neighbouring class of width $$2$$ with the same density would have frequency $$16$$, correctly represented by half the area.\n- Step 3: Therefore, comparing bar heights alone is meaningless when class widths vary; only area faithfully represents the count of observations within each interval.\n\n*Takeaway: Always check class widths before reading frequencies from a histogram.*", "source": "Kimi K2.6 ②", "_id": "kimi_2_0"}, {"question": "The mean of a dataset is 13.2 and the median is 13.3. Is the skew positive or negative, and why? What physical intuition explains this? (2 steps)", "answer": "- Step 1: Since mean $<$ median, the data are **negatively skewed**. The rule is: mean $>$ median $\\Rightarrow$ positive skew; mean $<$ median $\\Rightarrow$ negative skew.\n- Step 2: Intuition: the mean is pulled toward extreme values. In negative skew, a left tail of unusually low values drags the mean down below the median. Think of income data in reverse — a few extremely low outliers pull the average down, while the median (the middle person's value) stays higher.\n\nThe median is robust to outliers; the mean is not. That's why comparing them reveals skew direction.", "source": "GLM 5.1 ③", "_id": "glm_3_3"}, {"question": "For a discrete data set with $n = 11$ values, the quartile positions are at $\\frac{n+1}{4} = 3$ and $\\frac{3(n+1)}{4} = 9$. What would change if $n = 10$ instead? (2 steps)", "answer": "- Step 1: For $n = 10$: $Q_1$ position $= \\frac{11}{4} = 2.75$, which is non-integer. You would interpolate: $Q_1 = x_2 + 0.75(x_3 - x_2)$, i.e., three-quarters of the way from the 2nd to the 3rd value.\n- Step 2: Similarly, $Q_3$ position $= \\frac{33}{4} = 8.25$: $Q_3 = x_8 + 0.25(x_9 - x_8)$, one-quarter of the way from the 8th to the 9th value. The key rule: integer position → read directly; non-integer position → linear interpolation between adjacent values.", "source": "GLM 5.1 ③", "_id": "glm_3_51"}, {"question": "Two plants are selected at random without replacement from 408 plants, of which 220 fall in a target height range. Why can you not write the probability as $(220/408)^2$, and what is the correct expression? (2 steps)", "answer": "- Step 1: The expression $(220/408)^2$ assumes **with replacement** — the same probability on both draws. But \"without replacement\" means the population shrinks by one and the favourable count shrinks by one after the first pick.\n- Step 2: The correct product is $$\\frac{220}{408} \\times \\frac{219}{407}$$ The numerator drops from 220 to 219 (one favourable plant removed) and the denominator drops from 408 to 407 (one plant total removed). This gives approximately 0.290.\n\nThe key signal: \"chosen at random\" with no mention of replacement in a finite-population context means without replacement.", "source": "GLM 5.1 ③", "_id": "glm_3_5"}, {"question": "In Q3(b), solving $$p \\cdot \\frac{1}{8} + (1-p) \\cdot \\frac{1}{10} = 0.11$$ required multiplying through by $$80$$. Why is clearing fractions a recommended algebraic strategy in probability equations, especially under exam pressure? (2 steps)", "answer": "- Step 1: Fractions with different denominators invite arithmetic errors during distribution and sign handling. Multiplying by the least common denominator ($$80$$ in this case) converts the equation into integer coefficients, which are faster and safer to manipulate.\n- Step 2: In this problem, clearing fractions immediately revealed $$10p + 8(1-p) = 8.8$$, collapsing to a simple linear equation. Keeping decimals or fractions throughout risks a misplaced decimal point that would corrupt all downstream calculations.", "source": "Kimi K2.6 ②", "_id": "kimi_2_59"}, {"question": "State the conditional probability formula and explain why the conditioning event sits in the denominator. (2 steps)", "answer": "- Step 1: $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$.\n- Step 2: Conditioning on $$B$$ means restricting attention to the sub-universe where $$B$$ has occurred. The denominator $$P(B)$$ renormalises probabilities so they sum to 1 within this restricted universe. The numerator $$P(A \\cap B)$$ is the portion of $$B$$'s \"world\" that *also* contains $$A$$. So $$P(A|B)$$ asks: of all $$B$$-outcomes, what fraction are also $$A$$-outcomes?\n\nThis is the single most exam-load-bearing formula in S1 conditional questions.", "source": "Opus 4.7 ②", "_id": "opus_2_16"}, {"question": "What is the difference between *independent* events and *mutually exclusive* events? Can they coexist? (3 steps)", "answer": "- Step 1: **Mutually exclusive**: $P(A \\cap B) = 0$ — both cannot happen together.\n- Step 2: **Independent**: $P(A \\cap B) = P(A) \\cdot P(B)$ — knowing one doesn't change the chance of the other.\n- Step 3: They can coexist only in the degenerate case where one (or both) events have probability zero. Otherwise, if $A$ and $B$ are both possible *and* mutually exclusive, then knowing $A$ happened tells you $B$ didn't — strongly dependent.\n\nTakeaway: ME and independence are typically *opposite* situations, not the same. The test for one is not the test for the other.", "source": "Opus 4.7 ①", "_id": "opus_1_33"}, {"question": "How do you use the law of total probability to set up an equation for an unknown probability $$p$$ from a tree diagram when you know the overall probability of a final outcome? (3 steps)", "answer": "- Step 1: Identify all distinct paths through the tree that lead to the specified final outcome. For each path, multiply the probabilities along its branches to obtain the joint probability of that path.\n- Step 2: Sum these joint probabilities across all paths leading to the outcome. This sum equals the total probability of that outcome by the law of total probability.\n- Step 3: Set this sum equal to the given overall probability, producing an equation in the unknown $$p$$. Solving this equation yields the value of $$p$$ that makes the tree consistent with the observed total probability.", "source": "Kimi K2.6 ①", "_id": "kimi_1_14"}, {"question": "Temperatures are coded from Fahrenheit $$x$$ to Celsius $$u$$ via $$u = \\frac{5}{9}(x - 32)$$. Conceptually, why does subtracting $$32$$ affect the mean but leave the standard deviation unchanged? (3 steps)", "answer": "- Step 1: The mean is a measure of **location** or central position. Shifting every data point left by $$32$$ shifts the centre of gravity by exactly $$32$$, so $$\\bar{u} = \\frac{5}{9}(\\bar{x} - 32)$$.\n- Step 2: Standard deviation measures **spread** about the centre. If every point moves by the same constant, the distances between points do not change, so the spread is invariant under pure shifts.\n+ Imagine three points at $$30, 32, 34$$; shift to $$-2, 0, 2$$. The gaps remain $$2$$ apart.\n- Step 3: Only the multiplicative factor $$\\frac{5}{9}$$ rescales the spread, giving $$\\sigma_u = \\frac{5}{9}\\sigma_x$$. The additive constant $$-32$$ disappears from the variance entirely.", "source": "Kimi K2.6 ②", "_id": "kimi_2_7"}, {"question": "The CDF of a discrete random variable $X$ takes the value $F(4) = \\frac{k+4}{8}$ at the maximum value of $x$. How do you find $k$, and what CDF property are you using? (2 steps)", "answer": "- Step 1: The CDF at the largest value of the variable must equal 1: $$F(x_{\\max}) = 1$$ This is because $F(x) = P(X \\le x)$, and at the maximum value, all probability has been accumulated.\n- Step 2: $$\\frac{k+4}{8} = 1 \\Rightarrow k + 4 = 8 \\Rightarrow k = 4$$\n\nIf $F(x_{\\max}) \\ne 1$, you've either misread the table or there's a gap in the distribution.", "source": "GLM 5.1 ③", "_id": "glm_3_30"}, {"question": "For $$X \\sim N(40, 4^2)$$, conceptually find $$P(X < 38.8)$$. (3 steps)", "answer": "- Step 1: Standardise: $$z = \\frac{38.8 - 40}{4} = -0.30$$. The value is 0.3 s.d. below the mean.\n- Step 2: $$P(Z < -0.30)$$. By symmetry of $$Z$$, $$P(Z < -0.30) = 1 - \\Phi(0.30)$$.\n- Step 3: Look up $$\\Phi(0.30) \\approx 0.6179$$, so $$P(X < 38.8) \\approx 0.3821$$.\n\nFor negative $$z$$, always convert via symmetry: $$\\Phi(-z) = 1 - \\Phi(z)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_27"}, {"question": "For the least-squares regression line $s = a + bf$, what are the formulas for $b$ and $a$, and what is the geometric meaning of $a = \\bar{s} - b\\bar{f}$? (3 steps)", "answer": "- Step 1: $$b = \\frac{S_{fs}}{S_{ff}}$$ — the gradient minimises the sum of squared vertical deviations.\n- Step 2: $$a = \\bar{s} - b\\bar{f}$$ — derived by demanding the line pass through the centroid $(\\bar{f}, \\bar{s})$.\n- Step 3: Geometrically: the regression line always passes through the mean point of the data. The intercept is whatever value of $a$ makes that happen given the slope. So $a$ is not really a free parameter — it's determined by the requirement that residuals sum to zero.\n\nTakeaway: regression \"pivots\" around the centroid; slope encodes the strength and direction of co-variation.", "source": "Opus 4.7 ①", "_id": "opus_1_22"}, {"question": "The median lies in the class $$13 \\le h < 15$$, which has frequency 120 and a lower bound of 13. The cumulative frequency before this class is 184, and $$n/2 = 204$$. State the median interpolation formula and explain what each term represents physically. (3 steps)", "answer": "- Step 1: The formula is $$\\text{Median} = L + \\frac{(n/2) - F_{<}}{f_{\\text{class}}} \\times w$$, where $$L$$ is the lower class boundary, $$F_{<}$$ is the cumulative frequency below this class, $$f_{\\text{class}}$$ is the frequency of the median class, and $$w$$ is the class width.\n- Step 2: Substitute: $$L = 13$$, $$F_{<} = 184$$, $$f_{\\text{class}} = 120$$, $$w = 2$$. The fraction $$\\frac{204 - 184}{120} = \\frac{20}{120} = \\frac{1}{6}$$ tells you how far through the class the median value lies (one-sixth of the way).\n- Step 3: $$\\text{Median} = 13 + \\frac{1}{6} \\times 2 = 13 + \\frac{1}{3} \\approx 13.33$$. The assumption is that values are uniformly distributed within the class — so one-sixth of the values correspond to one-sixth of the class width.\n\nThis uniform-within-class assumption is the same one used when splitting partial classes in probability questions.", "source": "GLM 5.1 ②", "_id": "glm_2_4"}, {"question": "What is the general formula for converting a symmetric two-tail probability $P(|Z| < z) = c$ into a one-tail lookup? (2 steps)", "answer": "- Step 1: $$P(|Z| < z) = c \\quad \\Longrightarrow \\quad \\Phi(z) = \\frac{1 + c}{2}$$\n- Step 2: Intuition: the central region of probability $c$ is split evenly by symmetry. Half of $c$ sits on each side of zero. So the area to the left of $z$ is $\\frac{c}{2}$ (the left half of the central region) plus $0.5$ (the entire left tail below zero). Total: $\\frac{c}{2} + 0.5 = \\frac{1+c}{2}$.\n\nMemorise: two-tail $c$ → one-tail $\\Phi = \\frac{1+c}{2}$.", "source": "GLM 5.1 ③", "_id": "glm_3_36"}, {"question": "When a question says \"estimate the probability that both plants have heights between 8 cm and 14 cm,\" the word \"estimate\" signals what assumption? What would you need to know to calculate the exact probability? (2 steps)", "answer": "- Step 1: \"Estimate\" signals the uniform-within-class assumption — that heights are evenly distributed within each class interval. This lets you split partial classes proportionally (e.g., $$\\frac{1}{4}$$ of the $$[5,9)$$ class falls in $$[8,9)$$).\n- Step 2: To calculate the exact probability, you would need the individual heights of all 408 plants (the raw data). With only grouped data (a frequency table), you can't know exactly how many plants fall in $$[8,14)$$ — the uniform assumption is the best you can do.\n\nThe uniform assumption is a modelling choice, not a mathematical truth. In reality, values within a class might cluster near the boundaries or the centre — the histogram can't tell you this.", "source": "GLM 5.1 ②", "_id": "glm_2_48"}, {"question": "State the standardisation formula for a normal variable and explain its purpose. (2 steps)", "answer": "- Step 1: If $$X \\sim N(\\mu, \\sigma^2)$$, then $$Z = \\frac{X - \\mu}{\\sigma} \\sim N(0, 1)$$.\n- Step 2: This transforms any normal variable into the *standard* normal $$Z$$, whose probabilities are tabulated. Subtracting $$\\mu$$ centres the distribution on 0; dividing by $$\\sigma$$ rescales to unit spread. We then read $$\\Phi(z) = P(Z < z)$$ from tables.", "source": "Opus 4.7 ②", "_id": "opus_2_26"}, {"question": "In a histogram, how do you convert a bar's visual height into the frequency count it represents, and why does this work?", "answer": "- Step 1: The vertical axis of a histogram is frequency density (fd), defined as $$\\text{fd} = \\frac{\\text{frequency}}{\\text{class width}}$$, so the *area* of each bar (height × width) equals the frequency.\n- Step 2: To extract a frequency, read the fd off the axis and multiply by the class width: $$\\text{frequency} = \\text{fd} \\times w$$.\n- Step 3: This works because histograms are designed so that equal areas represent equal counts — this is what makes them valid for unequal class widths, unlike bar charts.\n\nThe area-equals-frequency principle is what distinguishes a histogram from a bar chart.", "source": "Opus 4.7 ②", "_id": "opus_2_0"}, {"question": "In Q4(d), one student scored $$f = 55$$ and another $$f = 18$$. Why is the estimate for $$f = 55$$ considered interpolation and therefore more reliable, while $$f = 18$$ is extrapolation and suspect? (3 steps)", "answer": "- Step 1: The observed French marks in the cleaned dataset range from $$24$$ to $$68$$. The value $$55$$ lies **inside** this interval, so the regression line is being used to predict within the span of data actually collected.\n- Step 2: The value $$18$$ lies **below** the minimum observed $$f$$. We have no empirical evidence that the linear relationship between French and Spanish marks continues to hold outside the measured range; the true curve could bend or flatten.\n+ For instance, a very low French mark might not linearly predict an even lower Spanish mark if there is a floor effect or a change in student behaviour at that extreme.\n- Step 3: Hence $$55$$ is interpolation (trustworthy) and $$18$$ is extrapolation (unreliable). The examiner requires both the terminology and explicit reference to the data range.", "source": "Kimi K2.6 ②", "_id": "kimi_2_21"}, {"question": "What is the difference between the population standard deviation formula $$\\sigma = \\sqrt{S_{xx}/n}$$ and the sample standard deviation $$s = \\sqrt{S_{xx}/(n-1)}$$? Which does Edexcel S1 use? (2 steps)", "answer": "- Step 1: The population formula divides by $$n$$; the sample formula divides by $$n-1$$ (Bessel's correction, which provides an unbiased estimator of the population variance). For the same data, $$s > \\sigma$$ because dividing by a smaller number gives a larger result.\n- Step 2: Edexcel S1 uses the **population** formula $$\\sigma = \\sqrt{S_{xx}/n}$$ throughout. When the formula booklet gives $$\\sigma_x = \\sqrt{S_{xx}/n}$$, that's the one to use. Using $$n-1$$ by habit (from other exam boards or A-level maths) will give slightly wrong answers.\n\nThe distinction matters most for small $$n$$. For $$n = 12$$, the ratio is $$\\sqrt{12/11} \\approx 1.045$$ — about 4.5% difference. For large $$n$$, the two formulas converge.", "source": "GLM 5.1 ②", "_id": "glm_2_46"}, {"question": "Contrast the definitions of \"mutually exclusive\" and \"statistically independent\" for two events. Why is it impossible for two events with non-zero probability to be both mutually exclusive and independent? (3 steps)", "answer": "- Step 1: Mutually exclusive means the events cannot occur together: $$P(A \\cap B) = 0$$. Independence means the occurrence of one does not affect the probability of the other: $$P(A \\cap B) = P(A)P(B)$$.\n- Step 2: If both held simultaneously for events with $$P(A) > 0$$ and $$P(B) > 0$$, we would have $$0 = P(A)P(B) > 0$$, which is a contradiction.\n- Step 3: Therefore, mutually exclusive events with positive probability are always dependent: knowing that one occurred guarantees the other did not, which is the strongest possible form of dependence, not independence.", "source": "Kimi K2.6 ①", "_id": "kimi_1_28"}, {"question": "When a regression interpretation question asks for the meaning of the gradient, what three components must your answer include for full marks? (2 steps)", "answer": "- Step 1: The three components are: (i) the contextual variables (not just \"x\" and \"y\" but the actual quantities like \"French mark\" and \"Spanish mark\"), (ii) the word \"predicted\" or \"estimated\" (acknowledging the model nature of regression), and (iii) the units of measurement.\n- Step 2: Example of a full-mark answer: \"For each additional mark scored in the French test, the predicted Spanish mark increases by approximately 1.04 marks.\" Example of a zero-mark answer: \"The gradient is 1.04\" — no context, no units, no acknowledgement of prediction.\n\nThe gradient has units of (units of $$s$$) / (units of $$f$$) = \"Spanish marks per French mark.\" Including units makes your answer precise and contextual.", "source": "GLM 5.1 ②", "_id": "glm_2_60"}, {"question": "A grouped frequency table has classes of widths 4, 4, 2, 2, 8. Without doing the full calculation, why might the bar for the width-2 class appear taller than the bar for a width-8 class even if both contain similar numbers of plants?", "answer": "- Step 1: The y-axis is frequency density = frequency / width. A narrow class concentrates its frequency into a small interval, inflating fd.\n- Step 2: A width-2 class with 120 plants has fd = 60. A width-8 class with 40 plants has fd = 5.\n- Step 3: So the taller bar can hold *fewer* plants overall — what matters for \"how many\" is area, not height. Visually misleading at a glance; always multiply fd × width to recover the count.", "source": "Opus 4.7 ①", "_id": "opus_1_1"}, {"question": "When using linear interpolation to estimate the median of grouped data, what does the term $$\\dfrac{(n/2) - F_{<}}{f_{\\text{class}}}$$ represent conceptually? (3 steps)", "answer": "- Step 1: The median position is $$n/2$$. The quantity $$F_{<}$$ is the cumulative frequency of all classes **before** the median class, so $$(n/2) - F_{<}$$ counts how many observations into the median class we must go.\n- Step 2: Dividing by $$f_{\\text{class}}$$ (the total frequency inside the median class) converts that count into a **proportion** of the way across the class. A value of $$0$$ means the median is at the lower boundary; $$1$$ means it is at the upper boundary.\n+ In the January 2024 paper, $$(204 - 184)/120 = 20/120 = 1/6$$ of the way across the $$[13,15)$$ class, giving a small upward adjustment from $$13$$.\n- Step 3: Multiplying by the class width $$w$$ converts this proportion into actual units of the variable, yielding the final interpolated estimate.", "source": "Kimi K2.6 ②", "_id": "kimi_2_2"}, {"question": "The temperatures in a dataset are coded from Fahrenheit to Celsius using $$c = \\frac{5}{9}(f - 32)$$. Explain conceptually why subtracting $$32$$ changes the mean but leaves the standard deviation unchanged. (2 steps)", "answer": "- Step 1: Subtracting $$32$$ shifts every data point left by $$32$$ units on the number line. This moves the centre (mean) by exactly $$32$$, but it does not change the distances between data points, so the spread remains identical.\n- Step 2: Standard deviation depends only on distances between values and their mean. Since a uniform shift preserves all relative distances, the standard deviation is invariant under additive coding. Only the multiplicative factor $$\\frac{5}{9}$$ scales the standard deviation.", "source": "Kimi K2.6 ①", "_id": "kimi_1_9"}, {"question": "For discrete data with $$n=11$$, the lower-quartile position is exactly $$3$$ and the upper-quartile position is $$9$$. What is the general formula for quartile positions, and how do you handle a non-integer result such as $$2.75$$? (2 steps)", "answer": "- Step 1: The general position formulas are $$Q_1$$ at $$\\frac{n+1}{4}$$, median at $$\\frac{n+1}{2}$$, and $$Q_3$$ at $$\\frac{3(n+1)}{4}$$. For $$n=11$$, these evaluate to $$3, 6, 9$$ respectively.\n- Step 2: If the formula yields a non-integer like $$2.75$$, you interpolate between the 2nd and 3rd ordered values: take the lower value plus $$0.75$$ of the gap to the next value. This treats the ordered data as evenly spaced between ranks.", "source": "Kimi K2.6 ②", "_id": "kimi_2_46"}, {"question": "For $X \\sim N(\\mu, 36)$, you are told $P(\\mu - 2k < X < \\mu + 2k) = 0.6$. How do you convert this symmetric two-tail probability into a single $\\Phi$ lookup? (3 steps)", "answer": "- Step 1: Standardise. Since the interval is symmetric about $\\mu$: $$P(\\mu - 2k < X < \\mu + 2k) = P\\!\\left(-\\frac{2k}{6} < Z < \\frac{2k}{6}\\right) = 0.6$$ (Note: $\\sigma = \\sqrt{36} = 6$, not 36.)\n- Step 2: Use the symmetry identity: $$P(-a < Z < a) = 2\\Phi(a) - 1$$ So $2\\Phi\\!\\left(\\frac{2k}{6}\\right) - 1 = 0.6$, giving $\\Phi\\!\\left(\\frac{2k}{6}\\right) = 0.8$.\n- Step 3: Look up the inverse: $\\Phi^{-1}(0.8) = 0.8416$. So $\\frac{2k}{6} = 0.8416$, hence $2k = 5.0496$ and $k = 2.52$.\n\nThe classic mistake: looking up $\\Phi^{-1}(0.6) = 0.2533$ directly. You must convert two-tail to one-tail first: $\\Phi = (1 + 0.6)/2 = 0.8$.", "source": "GLM 5.1 ③", "_id": "glm_3_35"}, {"question": "For $Y \\sim N(\\mu, \\sigma^2)$ with $P(Y > \\frac{3}{2}\\mu) = 0.0668$ and $2\\mu = 3\\sigma^2$, find $\\mu$ and $\\sigma$. What two equations do you form, and which root do you reject? (3 steps)", "answer": "- Step 1: Standardise the probability condition: $$P\\!\\left(Z > \\frac{(3/2)\\mu - \\mu}{\\sigma}\\right) = P\\!\\left(Z > \\frac{\\mu}{2\\sigma}\\right) = 0.0668$$ So $\\Phi\\!\\left(\\frac{\\mu}{2\\sigma}\\right) = 0.9332$. From tables, $\\Phi(1.5) = 0.9332$ exactly. Therefore $\\frac{\\mu}{2\\sigma} = 1.5$, giving $\\mu = 3\\sigma$ — your **first equation**.\n- Step 2: The **second equation** is given: $2\\mu = 3\\sigma^2$. Substitute $\\mu = 3\\sigma$: $$2(3\\sigma) = 3\\sigma^2 \\Rightarrow 6\\sigma = 3\\sigma^2 \\Rightarrow 3\\sigma(\\sigma - 2) = 0$$\n- Step 3: Roots: $\\sigma = 0$ or $\\sigma = 2$. Reject $\\sigma = 0$ (standard deviation must be positive). So $\\sigma = 2$ and $\\mu = 3 \\times 2 = 6$.\n\nAlways reject non-physical roots with a written reason: \"$\\sigma > 0$, so $\\sigma = 2$.\"", "source": "GLM 5.1 ③", "_id": "glm_3_37"}, {"question": "The Product Moment Correlation Coefficient $$r$$ between $$x$$ and $$y$$ was found to be $$0.849$$. After coding both variables linearly with the same positive multiplier, why is $$r$$ unchanged? (3 steps)", "answer": "- Step 1: PMCC is defined as $$r = \\frac{S_{xy}}{\\sqrt{S_{xx}S_{yy}}}$$. Under linear coding $$u = a + bx$$ and $$v = c + dy$$ with $$b,d > 0$$, each corrected sum of squares and products picks up factors: $$S_{uu} = b^2 S_{xx}$$, $$S_{vv} = d^2 S_{yy}$$, and $$S_{uv} = bd\\,S_{xy}$$.\n- Step 2: Substituting into the formula for the new $$r$$ gives $$ \\frac{bd\\,S_{xy}}{\\sqrt{b^2 S_{xx}\\,d^2 S_{yy}}} = \\frac{bd\\,S_{xy}}{|b||d|\\sqrt{S_{xx}S_{yy}}} $$. Because $$b$$ and $$d$$ are positive, $$|b||d| = bd$$, and the factors cancel completely.\n+ If either multiplier were negative, $$r$$ would change sign (but not magnitude) because the absolute values in the denominator would flip the sign relative to the numerator.\n- Step 3: Intuitively, coding is just a change of units (like inches to centimetres). The strength and direction of linear association between the variables do not depend on the units chosen.", "source": "Kimi K2.6 ②", "_id": "kimi_2_8"}, {"question": "Why is it algebraically valid to substitute $$\\mu = 3\\sigma$$ into $$2\\mu = 3\\sigma^2$$, and what type of equation results? What extraneous solution must be discarded? (3 steps)", "answer": "- Step 1: The standardisation gave a linear relation $$\\mu = 3\\sigma$$. The problem statement provided a second relation $$2\\mu = 3\\sigma^2$$. Substituting replaces $$\\mu$$ in the second equation, yielding $$2(3\\sigma) = 3\\sigma^2$$.\n- Step 2: Simplifying gives $$6\\sigma = 3\\sigma^2$$, or $$3\\sigma^2 - 6\\sigma = 0$$, which is a quadratic equation in $$\\sigma$$. Factoring produces $$\\sigma( \\sigma - 2 ) = 0$$ after dividing by $$3$$.\n- Step 3: The roots are $$\\sigma = 0$$ and $$\\sigma = 2$$. Because standard deviation must be strictly positive for a genuine normal distribution, $$\\sigma = 0$$ is extraneous and rejected, leaving $$\\sigma = 2$$ and hence $$\\mu = 6$$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_36"}, {"question": "A question asks you to \"describe the skew\" of a dataset. You write \"negative\" and get 0 out of 1 mark. Why? (2 steps)", "answer": "- Step 1: The mark scheme requires you to state **both** the direction of skew **and** the numerical evidence supporting it. Just writing \"negative\" is a bare assertion with no justification.\n- Step 2: The correct answer is: \"Negatively skewed, because mean (13.2) < median (13.3).\" The comparison of mean and median is the evidence; the direction is the conclusion. Both are required.\n\n+ This is a recurring pattern in S1: 1-mark \"give a reason\" questions require a complete statement (conclusion + evidence), not just one or the other.", "source": "GLM 5.1 ①", "_id": "glm_1_60"}, {"question": "A symmetric normal interval satisfies $$P(\\mu - 2k < X < \\mu + 2k) = 0.6$$. Why must you convert this two-tail probability to $$\\Phi\\!\\left(\\frac{2k}{\\sigma}\\right) = 0.8$$ before using standard normal tables? (3 steps)", "answer": "- Step 1: Standard normal tables usually give the **left-tail** cumulative probability $$\\Phi(z) = P(Z \\le z)$$. The given probability $$0.6$$ is a central area symmetric about the mean, not a single tail.\n- Step 2: By symmetry, the total tail area is $$1 - 0.6 = 0.4$$, so each outer tail contains $$0.2$$. The cumulative probability up to the upper bound is therefore $$0.6 + 0.2 = 0.8$$ (or equivalently $$1 - 0.2$$).\n+ Algebraically: $$P(|Z| < z) = 2\\Phi(z) - 1 = 0.6$$, so $$\\Phi(z) = \\frac{1 + 0.6}{2} = 0.8$$.\n- Step 3: Only after this conversion can you look up the $$z$$-value corresponding to cumulative probability $$0.8$$ (approximately $$0.8416$$). Reading $$\\Phi^{-1}(0.6)$$ directly would give the wrong $$z$$ entirely.", "source": "Kimi K2.6 ②", "_id": "kimi_2_34"}, {"question": "Why might mean and median be very close in some data sets but differ noticeably in others? Give the conceptual reason and an example. (3 steps)", "answer": "- Step 1: Mean and median coincide when the distribution is **symmetric around its centre** — every value above the centre has a mirror below, so they cancel in the mean.\n- Step 2: In skewed distributions, the tail pulls the mean but not the median. Heavier tail ⇒ bigger gap between mean and median.\n- Step 3: Example: income distributions are right-skewed (a few very high earners), so the mean income is much higher than the median. Symmetric distributions like ideal Normal have mean = median.", "source": "Opus 4.7 ①", "_id": "opus_1_53"}, {"question": "Under the linear coding $$u = a + bx$$, how do the mean and standard deviation of $$x$$ transform, and why do additive constants leave the spread unchanged? (2 steps)", "answer": "- Step 1: Mean transforms fully: $$\\bar{u} = a + b\\bar{x}$$. The shift $$a$$ and the stretch $$b$$ both feed through.\n- Step 2: Standard deviation transforms only by the multiplicative factor: $$\\sigma_u = |b|\\sigma_x$$. The shift $$a$$ moves *every* data point by the same amount — distances between points are preserved, so spread is unchanged. Only the stretch factor $$|b|$$ rescales distances.\n\nVariance picks up $$b^2$$: $$\\operatorname{Var}(u) = b^2 \\operatorname{Var}(x)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_12"}, {"question": "A histogram shows two classes: one with width $$6$$ and frequency density $$10$$, another with width $$3$$ and frequency density $$20$$. Without heavy calculation, determine which class contains more observations and justify. (2 steps)", "answer": "- Step 1: Compute the area (frequency) of each bar mentally. First class: $$6 \\times 10 = 60$$. Second class: $$3 \\times 20 = 60$$.\n- Step 2: The two classes contain exactly the same number of observations. This illustrates that a taller bar does not imply more data if the class width is smaller.", "source": "Kimi K2.6 ②", "_id": "kimi_2_1"}, {"question": "To show that a standard deviation equals 8.57, you must first compute $S_{xx}$. What is the formula for $S_{xx}$, and why does it appear in the standard deviation calculation? (3 steps)", "answer": "- Step 1: $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$ This is the *corrected sum of squares*. With $\\sum x = 862$, $\\sum x^2 = 62802$, $n = 12$: $$S_{xx} = 62802 - \\frac{862^2}{12} = 62802 - 61920.333 = 881.667$$\n- Step 2: The population standard deviation is $$\\sigma_x = \\sqrt{\\frac{S_{xx}}{n}}$$ because $S_{xx}/n$ is the mean squared deviation from $\\bar{x}$ (i.e., the variance). Taking the square root gives the standard deviation.\n- Step 3: $$\\sigma_x = \\sqrt{\\frac{881.667}{12}} = \\sqrt{73.472} = 8.5716\\ldots \\approx 8.57$$ Note: S1 uses the **population** formula (divide by $n$), not the sample formula (divide by $n-1$).", "source": "GLM 5.1 ③", "_id": "glm_3_7"}, {"question": "Why do you cross-check the marginal probability $P(R)$ on a tree by complement (1 - P(L)) and by direct summation, even when both routes ought to give the same answer? (2 steps)", "answer": "- Step 1: A mismatch flags an arithmetic slip — either in the L-branch sum (forgot to multiply by year-group probability) or in the assumption that complementary events were properly identified.\n- Step 2: Catching the error before submitting is essentially a free correction; the cost is one minute, the reward can be 2+ marks. Under exam pressure, redundant verification beats clever shortcuts.", "source": "Opus 4.7 ①", "_id": "opus_1_52"}, {"question": "The outlier rule defines an outlier as a value above $$Q_3 + 1.5 \\times \\text{IQR}$$ or below $$Q_1 - 1.5 \\times \\text{IQR}$$. If $$Q_1 = 28$$ and $$Q_3 = 48$$, calculate the upper fence and determine whether the value 90 is an outlier. (2 steps)", "answer": "- Step 1: $$\\text{IQR} = Q_3 - Q_1 = 48 - 28 = 20$$. Upper fence $$= Q_3 + 1.5 \\times \\text{IQR} = 48 + 1.5 \\times 20 = 48 + 30 = 78$$.\n- Step 2: Since $$90 > 78$$, the value 90 lies above the upper fence and is classified as an **outlier**.\n\n+ The lower fence would be $$Q_1 - 1.5 \\times \\text{IQR} = 28 - 30 = -2$$. Any value below $$-2$$ would be a lower outlier.\n\nThe 1.5 multiplier is conventional (Tukey's rule). It corresponds roughly to about ±2.7 standard deviations in a normal distribution.", "source": "GLM 5.1 ①", "_id": "glm_1_19"}, {"question": "A student writes $P(A \\cap B) = P(B \\mid A) \\cdot P(B)$. What is the error, and what is the correct formula? (2 steps)", "answer": "- Step 1: The correct formula is $$P(A \\cap B) = P(B \\mid A) \\cdot P(A)$$ The conditioning event $A$ (after the vertical bar) is the one you multiply by, not $B$.\n- Step 2: The error is inverting which probability goes in the multiplier. $P(B \\mid A)$ means \"probability of $B$ given $A$,\" so the \"given\" event is $A$, and you multiply by $P(A)$ to recover the joint. Think of it as: conditional probability × probability of the condition = joint probability.", "source": "GLM 5.1 ③", "_id": "glm_3_59"}, {"question": "What is the relationship between $$\\text{Var}(aX + b) = a^2\\text{Var}(X)$$ and the coding rule $$\\sigma_u = |b|\\sigma_x$$ for $$u = a + bx$$? Are these the same principle? (2 steps)", "answer": "- Step 1: Yes, they are the same principle expressed differently. In the coding rule, if $$u = a + bx$$, then $$\\text{Var}(u) = b^2 \\text{Var}(x)$$, and taking the square root gives $$\\sigma_u = |b|\\sigma_x$$. The additive constant $$a$$ drops out because it shifts the mean without changing spread.\n- Step 2: In Q2(c), the coding $$c = \\frac{5}{9}(f - 32)$$ has $$a = -\\frac{160}{9}$$ and $$b = \\frac{5}{9}$$. The $$-32$$ shift (part of $$a$$) doesn't affect s.d., and the multiplier $$\\frac{5}{9}$$ scales s.d. by $$\\frac{5}{9}$$. In Q7(d), the $$-6$$ in $$13X - 6$$ is the additive constant that vanishes from variance, while the 13 is squared.\n\nBoth questions test the same insight: additive shifts relocate data without changing spread; multiplicative scaling stretches or compresses spread. Variance squares the multiplier; standard deviation takes its absolute value.", "source": "GLM 5.1 ②", "_id": "glm_2_43"}, {"question": "A random variable $$X \\sim N(40, 4^2)$$ represents discus throw distances in metres. To find $$P(X < 38.8)$$, you standardise to get a $$z$$-value. Write down the standardisation formula and explain what it does geometrically. (2 steps)", "answer": "- Step 1: The standardisation formula is $$Z = \\frac{X - \\mu}{\\sigma} = \\frac{38.8 - 40}{4} = \\frac{-1.2}{4} = -0.30$$. This converts the raw value 38.8 into a z-score of $$-0.30$$.\n- Step 2: Geometrically, standardisation shifts the distribution so its mean becomes 0 (by subtracting $$\\mu$$) and rescales it so its standard deviation becomes 1 (by dividing by $$\\sigma$$). The result is the standard normal $$N(0,1)$$, for which we have tables of $$\\Phi(z) = P(Z < z)$$.\n\n+ Then $$P(X < 38.8) = P(Z < -0.30) = 1 - \\Phi(0.30) = 1 - 0.6179 = 0.3821$$, using the symmetry property $$P(Z < -a) = 1 - \\Phi(a)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_23"}, {"question": "A simple exercise: Data coded via $$u = 3x - 10$$. If $$\\bar{x} = 5$$ and $$\\sigma_x = 2$$, find $$\\bar{u}$$ and $$\\sigma_u$$. (2 steps)", "answer": "- Step 1: $$\\bar{u} = 3\\bar{x} - 10 = 3(5) - 10 = 15 - 10 = 5$$. The mean transforms with both the multiplier and the additive constant.\n- Step 2: $$\\sigma_u = |3| \\times \\sigma_x = 3 \\times 2 = 6$$. The additive constant ($$-10$$) does not affect the standard deviation; only the absolute value of the multiplier matters.\n\nQuick check: $$\\text{Var}(u) = 3^2 \\times \\text{Var}(x) = 9 \\times 4 = 36$$, and $$\\sigma_u = \\sqrt{36} = 6$$ ✓", "source": "GLM 5.1 ②", "_id": "glm_2_55"}, {"question": "A \"show that\" question requires you to demonstrate that an equation takes a specific form. What is the minimum expected working structure to secure full method marks, using Q2(a)(ii) or Q6(a) as exemplars? (1 step)", "answer": "You must present at least three clear lines: first, quote the general formula or definition being used; second, substitute the given values and perform an intermediate simplification, keeping at least one extra significant figure; third, state the final result and confirm it matches the target. For example, show $$S_{xx}$$ explicitly before taking the square root for standard deviation, or show the decimal expansion before clearing fractions to reach the required integer-coefficient form.", "source": "Kimi K2.6 ①", "_id": "kimi_1_44"}, {"question": "A question says \"estimate the probability that both of their heights are between 8 cm and 14 cm.\" The histogram classes are $[5,9)$, $[9,13)$, $[13,15)$. Why must you split at the class boundaries 9 and 13, and not just read off whole classes? (2 steps)", "answer": "- Step 1: The requested range $[8, 14)$ does not align with the class boundaries. It starts at 8 (inside the first class) and ends at 14 (inside the third class). The classes $[5,9)$ and $[13,15)$ are only *partially* included.\n- Step 2: Under the uniform-within-class assumption, you must compute the fraction of each partially-included class that falls in the range: $$\\text{From } [5,9): \\frac{9-8}{9-5} \\times 32 = \\frac{1}{4} \\times 32 = 8$$ $$\\text{From } [13,15): \\frac{14-13}{15-13} \\times 120 = \\frac{1}{2} \\times 120 = 60$$ The middle class $[9,13)$ is fully included (152). Total = 220.", "source": "GLM 5.1 ③", "_id": "glm_3_41"}, {"question": "The general formula for converting a symmetric central probability to a one-tail probability is $$\\Phi(z) = \\frac{1+c}{2}$$ where $$c = P(|Z| < z)$$. Derive this from the symmetry property of the normal distribution. (3 steps)", "answer": "- Step 1: The symmetric probability $$P(|Z| < z) = P(-z < Z < z)$$ can be split as $$P(Z < z) - P(Z < -z) = \\Phi(z) - \\Phi(-z)$$.\n- Step 2: By symmetry, $$\\Phi(-z) = 1 - \\Phi(z)$$, so $$P(|Z| < z) = \\Phi(z) - (1 - \\Phi(z)) = 2\\Phi(z) - 1$$.\n- Step 3: Setting $$c = 2\\Phi(z) - 1$$ and solving for $$\\Phi(z)$$: $$\\Phi(z) = \\frac{c+1}{2}$$. This is the conversion formula.\n\n+ Quick mental check: if $$c = 0.6$$, then $$\\Phi(z) = 0.8$$. If $$c = 0.95$$, then $$\\Phi(z) = 0.975$$, giving $$z = 1.96$$. The formula always converts a central probability to the corresponding right-tail cumulative.", "source": "GLM 5.1 ①", "_id": "glm_1_39"}, {"question": "When using a sample mean and sum of squares to fit a regression line, why might the *intercept* $$a$$ end up negative even when both $$x$$ and $$y$$ values are positive?", "answer": "The intercept is $$a = \\bar{y} - b\\bar{x}$$. If $$b\\bar{x} > \\bar{y}$$, then $$a < 0$$. Geometrically, this means the regression line, when extended back to $$x = 0$$, drops below the $$y$$-axis — even though no actual data point has $$x = 0$$. The intercept is an *extrapolation*; its sign reflects the geometry of where the fitted line crosses the $$y$$-axis, not the sign of the data. This is exactly why predicting at $$x = 0$$ from a line fitted on positive $$x$$ values is suspect.", "source": "Opus 4.7 ②", "_id": "opus_2_25"}, {"question": "A \"show that\" question gives the target answer (e.g. \"show that $\\sigma = 8.57$\"). Why is it dangerous to write only the final number, even though it's correct? (3 steps)", "answer": "- Step 1: \"Show that\" questions almost always carry method marks (e.g. 2 of 3 marks), with the final answer worth only 1.\n- Step 2: Writing just the answer gets 1 of 3 — you've shown that you *know* the answer but not that you *derived* it.\n- Step 3: Always write at least 3 lines: the formula being used, the substitution, the intermediate value (one extra decimal place to justify rounding), and the rounded answer. This earns all method marks regardless of small arithmetic slips.\n\nTakeaway: \"show that\" rewards traceability, not just correctness.", "source": "Opus 4.7 ①", "_id": "opus_1_45"}, {"question": "In Q5(b), the final answer requires $$P(\\text{2nd throw} > 44 \\mid \\text{qualifies})$$. A student computes the joint probability $$P(F_1 \\cap [X_2 > 44]) \\approx 0.0606$$ and writes this as the answer. What step is missing, and why is this the same conceptual error as in Q3(d)? (2 steps)", "answer": "- Step 1: The missing step is dividing by $$P(\\text{qualifies})$$. The \"given that they qualified\" condition requires the conditional probability formula: $$P(\\text{2nd throw} > 44 \\mid \\text{qualifies}) = \\frac{P(F_1 \\cap [X_2 > 44])}{P(\\text{qualifies})} = \\frac{0.0606}{0.9442} \\approx 0.0642$$.\n- Step 2: This is the same error as Q3(d): computing the **joint** probability $$P(A \\cap B)$$ when the question asks for the **conditional** probability $$P(A \\mid B)$$. Both questions use the trigger phrase \"given that\", and both require dividing by $$P(B)$$. The only difference is the context (Normal distribution vs tree diagram).\n\n+ The fix is identical: when you see \"given that\", write $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$ on the page before computing.", "source": "GLM 5.1 ①", "_id": "glm_1_26"}, {"question": "Why does the PMCC remain unchanged under positive linear coding but change sign under negative linear coding on one variable? Give an intuitive explanation. (2 steps)", "answer": "- Step 1: Positive linear coding ($$u = a + bx$$ with $$b > 0$$) preserves the ordering of the data — the highest $$x$$ still maps to the highest $$u$$, the lowest to the lowest. The scatter diagram is simply rescaled, so the linear trend (positive or negative) looks identical. Hence $$r$$ is unchanged.\n- Step 2: Negative linear coding on one variable (e.g., $$u = -x$$) reverses the ordering — the highest $$x$$ maps to the lowest $$u$$. The scatter diagram flips, and a previously positive correlation becomes negative (or vice versa). The magnitude $$|r|$$ stays the same, but the sign reverses.\n\nIf both variables are negatively coded, the two flips cancel out and $$r$$ is unchanged. This is why Q2(d) specifies $$b = d = 5/9 > 0$$ — both multipliers are positive, so $$r$$ is completely invariant.", "source": "GLM 5.1 ②", "_id": "glm_2_71"}, {"question": "What is the single most dangerous confusion in conditional probability, and how do you guard against it on an exam? (3 steps)", "answer": "- Step 1: The critical error is **returning $P(A \\cap B)$ when the question asks for $P(A \\mid B)$**. These differ by the factor $1/P(B)$ in the denominator. The joint probability is always smaller (or equal) to the conditional probability.\n- Step 2: The guard: the moment you read \"given that $B$,\" immediately write the formula on the page: $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$ This forces you to compute both the numerator (the joint) and the denominator (the probability of the conditioning event).\n- Step 3: Cross-check the denominator by two routes if possible — e.g., complement ($P(R) = 1 - P(L)$) and direct sum down the tree ($P(R) = P(\\text{Y12} \\cap R) + P(\\text{Y13} \\cap R)$). If they disagree, you've caught an arithmetic slip.\n\nThis one habit — writing the formula first — is the single highest-impact exam strategy on this paper.", "source": "GLM 5.1 ③", "_id": "glm_3_14"}, {"question": "There are 220 plants with heights in $$[8,14)$$ out of 408 total. Two plants are chosen at random without replacement. Why is the probability NOT $$(220/408)^2$$, and what is the correct expression? (2 steps)", "answer": "- Step 1: $$(220/408)^2$$ assumes **with** replacement — the same probability on both picks. But \"without replacement\" means the second pick is from the remaining 407 plants, of which 219 still fall in $$[8,14)$$ (one was already removed).\n- Step 2: The correct probability is $$\\frac{220}{408} \\times \\frac{219}{407}$$. The denominator drops by 1 on the second fraction, and the numerator drops by 1 because one plant in the desired range was already selected.\n\nThe phrase \"chosen at random\" in S1 typically means without replacement unless explicitly stated otherwise. The denominator always decreases on subsequent picks.", "source": "GLM 5.1 ②", "_id": "glm_2_7"}, {"question": "A grouped data set has $n$ values. To locate the median by linear interpolation, what formula do you use, and what does each piece mean? (3 steps)", "answer": "- Step 1: The formula is $$\\text{Median} = L + \\frac{(n/2) - F_<}{f_{\\text{class}}} \\times w$$ where $$L$$ is the lower bound of the median class, $$F_<$$ is the cumulative frequency *before* the median class, $$f_{\\text{class}}$$ is the frequency *of* the median class, and $$w$$ is the class width.\n- Step 2: The fraction $$\\frac{(n/2)-F_<}{f_{\\text{class}}}$$ tells you *how far through* the median class you need to walk to reach the median value, assuming the data are spread uniformly inside that class.\n- Step 3: Multiplying by $w$ converts that proportion into an actual distance along the x-axis; adding it to $L$ shifts you up to the correct position.\n\nTakeaway: it's a \"start at the bottom of the median class, walk a fraction of the class width\" recipe — the uniform-within-class assumption is what makes it valid.", "source": "Opus 4.7 ①", "_id": "opus_1_2"}, {"question": "Simple exercise: A histogram class $$[10, 20)$$ has frequency density 3. What is the frequency, and how many observations fall in the subrange $$[10, 15)$$? (2 steps)", "answer": "- Step 1: Frequency $$= \\text{fd} \\times \\text{width} = 3 \\times (20 - 10) = 3 \\times 10 = 30$$.\n- Step 2: The subrange $$[10, 15)$$ covers half the class width, so it contains $$\\frac{5}{10} \\times 30 = 15$$ observations (assuming uniform distribution within the class).\n\nThis is the fundamental histogram calculation: area = frequency, and proportional splitting for subranges.", "source": "GLM 5.1 ①", "_id": "glm_1_62"}, {"question": "The conditional probability formula is $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$. Explain intuitively why the conditioning event $$B$$ goes in the denominator. (2 steps)", "answer": "- Step 1: \"Given that $$B$$\" means we are restricting our attention to the sub-population where $$B$$ has occurred. Within this sub-population, the total probability must renormalise to 1. Dividing by $$P(B)$$ achieves this renormalisation — it scales up the probabilities so they sum to 1 within the $$B$$-world.\n- Step 2: Think of it as: out of all outcomes where $$B$$ happens (probability $$P(B)$$), what fraction also have $$A$$ happening? That fraction is $$\\frac{P(A \\cap B)}{P(B)}$$. The denominator shrinks the \"universe\" from all outcomes to just the $$B$$-outcomes.\n\n+ Analogy: if 20% of students are Y12-and-right-handed, and 89% are right-handed total, then among right-handers the fraction who are Y12 is $$\\frac{0.20}{0.89} \\approx 0.393$$ — you're zooming into the 89% and rescaling.", "source": "GLM 5.1 ①", "_id": "glm_1_17"}, {"question": "Given a discrete CDF table, how do you recover the probability mass function $$P(X = x)$$, and why does this involve subtracting consecutive cumulative probabilities? (2 steps)", "answer": "- Step 1: Use $$P(X = x) = F(x) - F(x-1)$$, where $$F(x-1)$$ is the cumulative probability of all values strictly less than $$x$$. This isolates the probability mass located exactly at $$x$$.\n- Step 2: Because $$F(x)$$ accumulates all probability up to and including $$x$$, subtracting the accumulation up to the previous value leaves only the increment added at $$x$$ itself. This is analogous to finding the height of a single step in a staircase by subtracting adjacent step heights.", "source": "Kimi K2.6 ①", "_id": "kimi_1_31"}, {"question": "What's the IQR-based rule for flagging an outlier, and why is multiplying the IQR by 1.5 the conventional choice? (3 steps)", "answer": "- Step 1: An outlier is a value above $Q_3 + 1.5 \\cdot \\text{IQR}$ or below $Q_1 - 1.5 \\cdot \\text{IQR}$, where IQR $= Q_3 - Q_1$.\n- Step 2: The IQR is the middle 50% spread — robust to extreme values. Multiplying by 1.5 sets fences at 2.7 standard deviations either side for normally distributed data, capturing roughly the central 99.3%.\n- Step 3: So the 1.5 multiplier is a sensible convention: it flags values that would be genuinely rare under normal conditions, without being so strict it labels half the data as outliers.", "source": "Opus 4.7 ①", "_id": "opus_1_20"}, {"question": "What's the rule for $\\text{Var}(aX + b)$, and why does the constant $b$ disappear while $a$ becomes $a^2$? (3 steps)", "answer": "- Step 1: Adding a constant $b$ shifts every value (and the mean) by $b$, preserving deviations $X - \\mu$. So variance — average squared deviation — is unchanged by $b$.\n- Step 2: Multiplying by $a$ scales deviations by $a$. Squaring them scales by $a^2$. So variance picks up a factor of $a^2$.\n- Step 3: Combining: $\\text{Var}(aX + b) = a^2 \\text{Var}(X)$. For example, $\\text{Var}(13X - 6) = 169 \\text{Var}(X)$ — the $-6$ vanishes.\n\nTakeaway: variance is **translation-invariant** and **quadratic-homogeneous**.", "source": "Opus 4.7 ①", "_id": "opus_1_38"}, {"question": "A question asks for the probability that a randomly chosen plant has height \"between 8 cm and 14 cm,\" but the class boundaries are $$[5,9)$$, $$[9,13)$$, $$[13,15)$$. Why can't you simply read off whole-class frequencies, and what assumption allows you to proceed? (3 steps)", "answer": "- Step 1: The boundaries 8 and 14 cut through the middle of classes $$[5,9)$$ and $$[13,15)$$. Neither 8 nor 14 is a class boundary, so no single class exactly covers the range $$[8,14)$$.\n- Step 2: The uniform-within-class assumption says values are evenly spread within each class. So in class $$[5,9)$$ with frequency 32, the proportion between 8 and 9 is $$\\frac{9-8}{9-5} = \\frac{1}{4}$$, contributing $$\\frac{1}{4} \\times 32 = 8$$ plants.\n- Step 3: Similarly, from $$[13,15)$$ with frequency 120, the proportion between 13 and 14 is $$\\frac{14-13}{15-13} = \\frac{1}{2}$$, contributing $$\\frac{1}{2} \\times 120 = 60$$ plants. The full class $$[9,13)$$ contributes all 152 plants. Total in $$[8,14)$$: $$8 + 152 + 60 = 220$$.\n\nThe key insight: each partial-class contribution is proportional to the fraction of the class width that falls within the target range.", "source": "GLM 5.1 ②", "_id": "glm_2_6"}, {"question": "To test whether events $A$ and $B$ are independent, you compare two quantities. What are they, and what common mistake do students make by confusing independence with mutual exclusivity? (2 steps)", "answer": "- Step 1: Compute both $P(A) \\cdot P(B)$ and $P(A \\cap B)$. If they are equal, $A$ and $B$ are independent. Here: $P(A)P(B) = 0.5 \\times 0.3 = 0.15$ and $P(A \\cap B) = 0.3 \\times 0.5 = 0.15$. They match, so $A$ and $B$ **are independent**.\n- Step 2: The common confusion: students think \"independent means they have nothing to do with each other, so $P(A \\cap B) = 0$.\" That's mutual exclusivity, not independence! Independent events can absolutely co-occur — they just don't affect each other's probabilities. Mutually exclusive events are the *most dependent* — if one happens, the other *cannot*.\n\nIndependence: $P(A \\cap B) = P(A)P(B)$. Mutual exclusivity: $P(A \\cap B) = 0$. These are opposite extremes.", "source": "GLM 5.1 ③", "_id": "glm_3_29"}, {"question": "To verify the denominator $P(R)$ on a probability tree, what two routes can you use, and why is computing it both ways a good habit? (3 steps)", "answer": "- Step 1: Route 1 (complement): $$P(R) = 1 - P(L)$$ if $L$ and $R$ are complementary.\n- Step 2: Route 2 (direct total): sum the path-products for every route ending in $R$: $$P(R) = P(\\text{Y12}) P(R|\\text{Y12}) + P(\\text{Y13}) P(R|\\text{Y13}).$$\n- Step 3: They *must* agree. Computing both is a cheap arithmetic check; a mismatch flags an algebra slip before you submit. Useful especially under exam pressure when a single fraction error can derail the conditional answer.", "source": "Opus 4.7 ①", "_id": "opus_1_18"}, {"question": "Can two events be both mutually exclusive and statistically independent (with non-zero probabilities)? Explain with a numerical or logical argument. (2 steps)", "answer": "- Step 1: Mutual exclusivity means $$P(A \\cap B) = 0$$. Independence requires $$P(A \\cap B) = P(A) \\cdot P(B)$$. If both hold, then $$P(A) \\cdot P(B) = 0$$.\n- Step 2: Therefore at least one of the probabilities must be zero. For non-zero-probability events, the two properties are **mutually contradictory**: mutually exclusive events are deeply dependent because knowing one occurred guarantees the other did not.", "source": "Kimi K2.6 ②", "_id": "kimi_2_28"}, {"question": "The least squares regression line of $$s$$ on $$f$$ has slope $$b = S_{fs}/S_{ff}$$ and intercept $$a = \\bar{s} - b\\bar{f}$$. Why is the intercept calculated as $$\\bar{s} - b\\bar{f}$$ rather than read directly from the data? (2 steps)", "answer": "- Step 1: The least squares regression line must pass through the **point of means** $$(\\bar{f}, \\bar{s})$$. This is a mathematical property of the least squares criterion — the line that minimises the sum of squared residuals always goes through the centroid of the data.\n- Step 2: Since the line is $$s = a + bf$$, substituting the point of means gives $$\\bar{s} = a + b\\bar{f}$$, which rearranges to $$a = \\bar{s} - b\\bar{f}$$. This guarantees the line passes through $$(\\bar{f}, \\bar{s})$$.\n\n+ Practical implication: if you compute $$a$$ and $$b$$ separately and then check $$a + b\\bar{f}$$, it should equal $$\\bar{s}$$. If it doesn't, you've made an arithmetic error.", "source": "GLM 5.1 ①", "_id": "glm_1_20"}, {"question": "When solving $$3\\sigma(\\sigma - 2) = 0$$, you get $$\\sigma = 0$$ or $$\\sigma = 2$$. Why must you reject $$\\sigma = 0$$, and what should you write on the exam paper? (2 steps)", "answer": "- Step 1: $$\\sigma = 0$$ means the standard deviation is zero, which implies the random variable is a constant (no variability at all). This contradicts the premise that $$Y$$ is normally distributed — a normal distribution with $$\\sigma = 0$$ is degenerate and not a valid probability distribution.\n- Step 2: On the exam, write: \"$$\\sigma > 0$$, so $$\\sigma = 0$$ is rejected, giving $$\\sigma = 2$$.\" This one-line justification shows the examiner you understand that standard deviations must be positive.\n\n+ Similar rejections apply to: negative probabilities, $$|r| > 1$$, and negative variances. Always check that your solutions are physically meaningful.", "source": "GLM 5.1 ①", "_id": "glm_1_41"}, {"question": "What is the relationship between \"two normal events nest\" (e.g. $$X > 44 \\implies X > 38.8$$) and the probability of their intersection? (2 steps)", "answer": "- Step 1: If event $$E_1 \\subseteq E_2$$ (every outcome in $$E_1$$ is also in $$E_2$$), then $$E_1 \\cap E_2 = E_1$$, so $$P(E_1 \\cap E_2) = P(E_1)$$.\n- Step 2: For a normal variable, $$\\{X > 44\\} \\subseteq \\{X > 38.8\\}$$ because clearing 44 m is stricter than clearing 38.8 m. So the joint event \"throw clears 38.8 AND throw > 44\" simplifies to just \"throw > 44\" — there's nothing extra to multiply.\n\nMultiplying $$P(X > 38.8) \\times P(X > 44)$$ would treat them as independent, which they are not — they're nested for the *same throw*.", "source": "Opus 4.7 ②", "_id": "opus_2_57"}, {"question": "$$Y \\sim N(\\mu, \\sigma^2)$$ with $$2\\mu = 3\\sigma^2$$ and $$P(Y > \\frac{3}{2}\\mu) = 0.0668$$. How do you get one equation relating $$\\mu$$ and $$\\sigma$$ from the probability condition? (3 steps)", "answer": "- Step 1: Standardise the inequality: $$P\\left(Z > \\frac{(3/2)\\mu - \\mu}{\\sigma}\\right) = P\\left(Z > \\frac{\\mu}{2\\sigma}\\right) = 0.0668$$.\n- Step 2: Convert to a $$\\Phi$$ value: $$\\Phi\\left(\\frac{\\mu}{2\\sigma}\\right) = 1 - 0.0668 = 0.9332$$.\n- Step 3: From tables, $$\\Phi(1.5) = 0.9332$$ exactly. So $$\\frac{\\mu}{2\\sigma} = 1.5$$, giving $$\\mu = 3\\sigma$$. This is equation (i).\n\nThe value $$\\Phi(1.5) = 0.9332$$ is worth memorising — it appears frequently in S1 exams. Recognising it saves the time of scanning the table.", "source": "GLM 5.1 ②", "_id": "glm_2_41"}, {"question": "A bag contains $$N$$ objects, $$M$$ of which are \"successes\". Two objects are drawn **without replacement**. Conceptually, why must the second probability in the product have denominator $$N-1$$, and what common error does this prevent? (2 steps)", "answer": "- Step 1: After removing one object, the population shrinks by one regardless of whether the first draw was a success or failure. The sample space for the second draw is smaller, so the denominator must be $$N-1$$, not $$N$$.\n- Step 2: Using $$(M/N)^2$$ implicitly assumes replacement (independence). The without-replacement product $$ \\frac{M}{N} \\times \\frac{M-1}{N-1} $$ reflects the depleted pool and the fact that the numerator also drops if the first draw was a success.", "source": "Kimi K2.6 ②", "_id": "kimi_2_5"}, {"question": "Calculate the product moment correlation coefficient r given Sxy = 512.67, Sxx = 881.667, and Syy = 413.67. (2 steps)", "answer": "- Step 1: The formula is r = Sxy / √(Sxx × Syy).\n- Step 2: r = 512.67 / √(881.667 × 413.67) = 512.67 / √364752.5 = 512.67 / 603.948 = 0.8489 ≈ 0.849.\n\nThis strong positive correlation indicates that higher minimum temperatures are associated with higher maximum temperatures.", "source": "MiniMax ②", "_id": "minimax_2_7"}, {"question": "A histogram covers the class $[9, 13)$ with frequency 152. You need the estimated count of plants with heights in $[8, 14)$ — boundaries that cut *through* two classes. What assumption do you make, and how do you compute the contribution from a partially-included class? (2 steps)", "answer": "- Step 1: You assume **uniform distribution within each class** — i.e., the data are spread evenly across the class interval. This is the fundamental assumption that lets you split a class proportionally.\n- Step 2: For a partial class, the contribution is $$\\frac{\\text{width included}}{\\text{total class width}} \\times \\text{class frequency}$$. For example, from class $[5, 9)$ with frequency 32, the portion $[8, 9)$ has width 1 out of total width 4, so contribution $= \\frac{1}{4} \\times 32 = 8$. From class $[13, 15)$ with frequency 120, the portion $[13, 14)$ has width 1 out of total width 2, so contribution $= \\frac{1}{2} \\times 120 = 60$.\n\nNever treat partial-class boundaries as whole-class questions — that's the most common histogram trap.", "source": "GLM 5.1 ③", "_id": "glm_3_4"}, {"question": "For $E(aX + b)$, what is the rule, and why does the constant survive here but not in variance? (2 steps)", "answer": "- Step 1: $E(aX + b) = aE(X) + b$. Expectation is **linear**, so it passes through sums and scales, and a constant has expectation equal to itself.\n- Step 2: The contrast with variance: variance squares deviations *from the mean*, so any shift cancels out. Expectation just averages values directly, so any shift survives.\n\nTakeaway: linearity preserves both terms; squaring (variance) kills the additive shift.", "source": "Opus 4.7 ①", "_id": "opus_1_39"}, {"question": "In probability questions involving \"at least one success\" in n independent trials, why is it often easier to use the complement? (1 step)", "answer": "It's easier because P(at least one success) = 1 - P(all fail). This avoids having to calculate P(exactly 1 success) + P(exactly 2 successes) + ... + P(exactly n successes), which would require summing many terms. The complement calculation requires only one multiplication.", "source": "MiniMax ②", "_id": "minimax_2_47"}, {"question": "Explain conceptually why $$\\operatorname{Var}(aX + b) = a^2 \\operatorname{Var}(X)$$. In particular, why does the additive constant $$b$$ disappear, and why is the multiplicative constant $$a$$ squared? (3 steps)", "answer": "- Step 1: Variance measures the expected squared deviation from the mean: $$\\operatorname{Var}(X) = E[(X - \\mu)^2]$$. Adding $$b$$ shifts both the data and the mean by $$b$$, so the deviations $$(X + b) - (\\mu + b) = X - \\mu$$ are unchanged. Therefore $$b$$ vanishes from the variance.\n- Step 2: Multiplying by $$a$$ scales every deviation by $$a$$: $$(aX + b) - (a\\mu + b) = a(X - \\mu)$$. When we square this deviation to compute variance, we get $$a^2(X - \\mu)^2$$.\n- Step 3: Taking expectations, the factor $$a^2$$ pulls out of the expectation, giving $$\\operatorname{Var}(aX + b) = a^2 E[(X - \\mu)^2] = a^2 \\operatorname{Var}(X)$$. The spread is scaled by the absolute factor $$|a|$$, but variance, being a squared measure, scales by $$a^2$$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_32"}, {"question": "From a probability tree, $$P(L) = p \\cdot \\frac{1}{8} + (1-p) \\cdot \\frac{1}{10} = 0.11$$. Explain why the total probability of being left-handed is a sum of two terms, not just one. (2 steps)", "answer": "- Step 1: A student can be left-handed via two mutually exclusive routes: (i) they are in Year 12 AND left-handed, or (ii) they are in Year 13 AND left-handed. By the addition rule for mutually exclusive events: $$P(L) = P(\\text{Y12} \\cap L) + P(\\text{Y13} \\cap L)$$.\n- Step 2: Each joint probability factors by the multiplication rule along the tree: $$P(\\text{Y12} \\cap L) = P(\\text{Y12}) \\times P(L \\mid \\text{Y12}) = p \\times \\frac{1}{8}$$, and $$P(\\text{Y13} \\cap L) = P(\\text{Y13}) \\times P(L \\mid \\text{Y13}) = (1-p) \\times \\frac{1}{10}$$.\n\nThe tree diagram is just a visual representation of the law of total probability. Every end-branch probability is a product, and you sum the relevant end-branches to get the total probability of an event.", "source": "GLM 5.1 ②", "_id": "glm_2_15"}, {"question": "The summary statistics for 12 temperature values in °F are $$\\sum x = 862$$ and $$\\sum x^2 = 62{,}802$$. Write down the formula for $$S_{xx}$$ and explain why you can't compute the standard deviation from $$\\sum x$$ alone. (2 steps)", "answer": "- Step 1: $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$. You need both $$\\sum x^2$$ (the sum of squares) and $$(\\sum x)^2$$ (the square of the sum) to compute it.\n- Step 2: You can't get the standard deviation from $$\\sum x$$ alone because $$\\sum x$$ only tells you the total (and hence the mean), but says nothing about how spread out the values are. Two datasets with the same mean can have wildly different spreads. You need $$\\sum x^2$$ to measure variability: $$\\sigma = \\sqrt{S_{xx}/n}$$.\n\n+ Intuition: $$\\sum x^2$$ captures both the location and the spread; subtracting $$(\\sum x)^2/n$$ \"centers\" it, leaving only the spread component.", "source": "GLM 5.1 ①", "_id": "glm_1_7"}, {"question": "State the outlier rule using quartiles, and explain why it uses 1.5 × IQR rather than some other multiplier.", "answer": "A value $$x$$ is an outlier if $$x > Q_3 + 1.5(Q_3 - Q_1)$$ or $$x < Q_1 - 1.5(Q_3 - Q_1)$$. The middle 50% of data span the IQR; extending 1.5 IQRs beyond captures roughly 99% of a normally distributed dataset, so points outside this fence are unusually far from the central bulk. The 1.5 factor is a convention (due to Tukey) chosen to be lenient enough not to flag too many normal points, but strict enough to highlight genuine extremes.", "source": "Opus 4.7 ②", "_id": "opus_2_7"}, {"question": "The regression line of $$s$$ on $$f$$ has gradient $$b = S_{fs} / S_{ff}$$. Interpret this ratio conceptually: what does the numerator measure, what does the denominator measure, and why does their quotient give the optimal slope? (3 steps)", "answer": "- Step 1: $$S_{ff} = \\sum (f_i - \\bar{f})^2$$ measures the total **variation** in the explanatory variable French marks. It quantifies how spread out the $$f$$-values are.\n- Step 2: $$S_{fs} = \\sum (f_i - \\bar{f})(s_i - \\bar{s})$$ measures the **co-variation**: the extent to which French and Spanish marks deviate from their respective means together. Positive $$S_{fs}$$ means higher French tends to accompany higher Spanish.\n- Step 3: Dividing co-variation by the variation in $$f$$ standardises the relationship, yielding the average change in $$s$$ per unit change in $$f$$. This ratio is precisely the slope that minimises the sum of squared residuals in the least-squares sense.", "source": "Kimi K2.6 ②", "_id": "kimi_2_19"}, {"question": "Why does $S_{xx} = \\sum x^2 - \\dfrac{(\\sum x)^2}{n}$ measure spread, and how does it relate to standard deviation? (3 steps)", "answer": "- Step 1: Expand the textbook definition: $$S_{xx} = \\sum (x - \\bar{x})^2.$$ Algebraic manipulation gives the computational form $$\\sum x^2 - (\\sum x)^2/n,$$ which avoids recomputing $\\bar{x}$ for each term.\n- Step 2: $S_{xx}$ is the **total squared deviation** from the mean — bigger when data are spread further from $\\bar{x}$.\n- Step 3: Population standard deviation is $$\\sigma = \\sqrt{S_{xx}/n}$$ — the *root mean squared deviation*. So $S_{xx}$ is the \"raw spread fuel\" that you divide by $n$ and root to get s.d.\n\nTakeaway: $S_{xx}$ is a halfway quantity; it carries the spread information but needs normalisation to be interpretable.", "source": "Opus 4.7 ①", "_id": "opus_1_8"}, {"question": "Can two events be both mutually exclusive AND statistically independent? Explain with a numerical argument. (3 steps)", "answer": "- Step 1: If $$A$$ and $$B$$ are mutually exclusive with $$P(A) > 0$$ and $$P(B) > 0$$, then $$P(A \\cap B) = 0$$.\n- Step 2: If they were also independent, then $$P(A \\cap B) = P(A) \\cdot P(B) > 0$$ (since both probabilities are positive). This contradicts Step 1.\n- Step 3: Therefore, two events with positive probabilities **cannot** be both mutually exclusive and independent. Mutual exclusivity means they \"avoid\" each other; independence means they \"ignore\" each other. These are opposite behaviours.\n\n+ The only exception: if one event has probability 0, then both conditions hold trivially ($$P(A \\cap B) = 0 = P(A) \\cdot P(B)$$). But this is a degenerate case.", "source": "GLM 5.1 ①", "_id": "glm_1_31"}, {"question": "A student is asked to compute $$P(A \\mid B)$$ and writes $$P(B \\mid A) = P(A \\cap B)/P(A)$$. They've inverted the formula. What is the correct formula, and how can you remember which event goes in the denominator? (2 steps)", "answer": "- Step 1: The correct formula is $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$. The **conditioning event** (the one after the vertical bar, i.e., $$B$$) goes in the denominator.\n- Step 2: Memory aid: \"given that $$B$$\" means you're restricting to the world where $$B$$ has happened. The denominator $$P(B)$$ is the \"size\" of that world. You're computing what fraction of the $$B$$-world also has $$A$$, which is $$P(A \\cap B)/P(B)$$.\n\n+ Quick check: $$P(A \\mid B)$$ should always be $$\\ge P(A \\cap B)$$ because you're dividing by a number $$\\le 1$$. If your answer is smaller than the joint p
