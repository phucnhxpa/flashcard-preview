: Sum-to-$$n$$ is the cheapest insurance policy in histogram questions — never skip it.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_0"}, {"question": "If the coding were $$u = a - \\frac{5}{9}x$$ instead of $$u = a + \\frac{5}{9}x$$, how would $$\\sigma_u$$ change versus how would $$r_{u,v}$$ change, and why are they affected differently? (3 steps)", "answer": "- Step 1: The standard deviation uses the **absolute value** of the multiplier: $$\\sigma_u = |b|\\sigma_x = |-\\frac{5}{9}|\\sigma_x = \\frac{5}{9}\\sigma_x$$. The s.d. is always positive regardless of the sign of $$b$$.\n- Step 2: The correlation coefficient is sensitive to the **direction** of the linear relationship. A negative $$b$$ reverses the ordering of the $$x$$-values, so if $$x$$ and $$y$$ were positively correlated, $$u$$ and $$v$$ become negatively correlated: $$r_{u,v} = -r_{x,y}$$.\n- Step 3: The difference arises because s.d. measures **magnitude of spread** (always non-negative, so signs are absorbed by the absolute value), while $$r$$ measures **direction and strength** of association (sign matters).", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_11"}, {"question": "Within the 90-minute S1 paper, what one habit saves about 3 minutes, and which formulas must be memorised to enable it? (3 steps)", "answer": "- Step 1: The habit: do NOT flip to the formula booklet for memorised formulas. Each lookup costs 20–30 seconds (find the page, scan, copy correctly, return to question). Across ~6 lookups on a typical paper, that's ~3 minutes.\n- Step 2: Formulas to memorise: $$S_{xx} = \\sum x^2 - (\\sum x)^2/n$$, $$S_{xy} = \\sum xy - (\\sum x)(\\sum y)/n$$, $$\\sigma_x = \\sqrt{S_{xx}/n}$$, $$r = S_{xy}/\\sqrt{S_{xx}S_{yy}}$$, $$b = S_{xy}/S_{xx}$$, $$a = \\bar{y} - b\\bar{x}$$, $$\\operatorname{Var}(X) = E(X^2) - (E(X))^2$$, $$\\operatorname{Var}(aX+b) = a^2 \\operatorname{Var}(X)$$, conditional probability $$P(A \\mid B) = P(A \\cap B)/P(B)$$.\n- Step 3: The time budget on S1 is 1.2 min/mark — tight. Saving 3 minutes is the difference between finishing the last question carefully and rushing it. Memorisation is the highest-leverage prep activity for the paper.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_24"}, {"question": "What is the universal opening move on any discrete-CDF question with an unknown constant, and why does it usually solve for the constant in one line? (2 steps)", "answer": "- Step 1: Set $$F(x_{\\max}) = 1$$ and solve. For any valid CDF, the cumulative probability at the maximum value must equal 1 — this is the definition of a CDF. In Q7(a): $$F(4) = \\frac{k+4}{8} = 1$$, so $$k = 4$$.\n- Step 2: This works in one line because the CDF is designed so that $$F(x_{\\max})$$ is the one expression that involves the unknown constant AND must equal 1. No other value of $$F(x)$$ is constrained to a known number, so no other equation can determine $$k$$ alone. The maximum value is your only guaranteed equation.\n\nThis is a non-negotiable first step. Skip it and you'll be trying to use $$F(x)$$ values at interior points, which require $$k$$ to be known first before you can set up any other equation.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_18"}, {"question": "What is the general formula for converting a symmetric-interval probability $$P(|Z| < z^*) = c$$ into a one-tail cumulative probability for table lookup? (2 steps)", "answer": "- Step 1: By symmetry, $$P(|Z| < z^*) = P(-z^* < Z < z^*) = \\Phi(z^*) - \\Phi(-z^*) = \\Phi(z^*) - (1 - \\Phi(z^*)) = 2\\Phi(z^*) - 1$$.\n- Step 2: Set $$2\\Phi(z^*) - 1 = c$$ and solve: $$\\Phi(z^*) = \\frac{1 + c}{2}$$. This is the one-tail cumulative probability you look up in the table or on your calculator.\n\n+ For $$c = 0.6$$: $$\\Phi(z^*) = 0.8$$, so $$z^* = 0.8416$$.\n+ For $$c = 0.95$$: $$\\Phi(z^*) = 0.975$$, so $$z^* = 1.96$$.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_29"}, {"question": "For mutually exclusive events $$B$$ and $$C$$, what is the simplified addition rule, and what common mistake do students make when they forget the mutually exclusive condition? (2 steps)", "answer": "- Step 1: If $$B$$ and $$C$$ are mutually exclusive, then $$P(B \\cap C) = 0$$, so $$P(B \\cup C) = P(B) + P(C)$$. The intersection term drops out entirely.\n- Step 2: The common mistake is writing $$P(B \\cup C) = P(B) + P(C) - P(B \\cap C)$$ and then struggling to compute $$P(B \\cap C)$$ from some other formula, when it's simply zero by definition of mutual exclusivity. This wastes time and introduces an unnecessary calculation that could be wrong.\n\n+ In Q6(b)(i): $$P(B \\cup C) = y + (\\frac{1}{2}x + y) = \\frac{1}{2}x + 2y$$. No intersection term needed.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_43"}, {"question": "S1 Jan 2024 Q4(c) — Beyond units and contextual variable names, what one softening word distinguishes a correct regression-gradient interpretation from one that overstates causation? (2 steps)", "answer": "- Step 1: The word is “predicted” or “estimated”.\n- Step 2: Saying “For each additional mark in French, the predicted Spanish mark increases by 1.04 marks” acknowledges the model’s uncertainty, whereas omitting it suggests a deterministic causal rule, which the mark scheme penalises.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_23"}, {"question": "After finding the median position $$n/2$$ in grouped data, what specific comparison using cumulative frequency identifies the median class, and what is the inequality direction? (2 steps)", "answer": "- Step 1: Compute cumulative frequencies sequentially: $$CF_1, CF_2, CF_3, \\ldots$$\n- Step 2: The median class is the first class whose cumulative frequency is **strictly greater than** $$n/2$$. Formally, find the class where $$CF_{k-1} < n/2 \\leq CF_k$$ (equivalently, $$CF_k > n/2$$ for the first time).\n\n+ Example: $$n/2 = 204$$. Cumulative frequencies are 32, 184, 304, … Since $$184 < 204$$ but $$304 > 204$$, the median lies in the class whose CF is 304.\n\nThe common mistake is using raw frequency instead of cumulative frequency — a class with the largest individual frequency is NOT necessarily the median class.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_2"}, {"question": "S1 Jan 2024 Q8(b) — what single $$\\Phi$$ value should you memorise from the S1 table to immediately recognise the right-hand-side $$0.9332$$, and why is this faster than the inverse table?", "answer": "Memorise $$\\Phi(1.5) = 0.9332$$ exactly. On Q8(b), once you've standardised to get $$\\Phi(\\mu/2\\sigma) = 1 - 0.0668 = 0.9332$$, instant recognition gives $$\\mu/2\\sigma = 1.5$$ — no table lookup needed. Why faster: the inverse table requires (i) finding the column for $$0.9332$$, (ii) reading off the $$z$$-value, (iii) verifying — typically 20–30 seconds. Recognition is instantaneous. The four \"must-memorise\" $$\\Phi$$ values for S1 are $$\\Phi(1.0) = 0.8413$$, $$\\Phi(1.5) = 0.9332$$, $$\\Phi(1.645) = 0.95$$, $$\\Phi(1.96) = 0.975$$. These cover most exam scenarios. Across a paper with 2–3 Normal sub-parts, memorisation saves ~90 seconds — enough to read one extra question carefully.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_22"}, {"question": "S1 Jan 2024 Q8(a) — Why is looking up $$\\Phi^{-1}(0.6)$$ on the inverse-normal table immediately a fatal error? (2 steps)", "answer": "- Step 1: The value $$0.6$$ is a **two-tail** probability: $$P(\\mu - 2k < X < \\mu + 2k) = 0.6$$. The inverse table gives the $$z$$ corresponding to a **one-tail** cumulative probability.\n- Step 2: $$\\Phi^{-1}(0.6) \\approx 0.2533$$ is the wrong $$z$$. You must first convert the two-tail area to a one-tail area using symmetry: $$\\Phi(z) = \\frac{1 + 0.6}{2} = 0.8$$. Only then do you look up $$\\Phi^{-1}(0.8) \\approx 0.8416$$.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_42"}, {"question": "S1 Jan 2024 Q5(a) — on a 2-mark \"show that $$P(X < 38.8) = 0.3821$$\", what TWO intermediate quantities must explicitly appear on your script? (2 steps)", "answer": "- Step 1: Quantity 1 — the standardised $$z$$-value: $$z = (38.8 - 40)/4 = -0.30$$.\n- Step 2: Quantity 2 — the explicit table lookup with symmetry: $$P(Z < -0.30) = 1 - \\Phi(0.30) = 1 - 0.6179$$.\n- Then state $$= 0.3821$$. Without both lines, the examiner cannot tell whether you correctly applied symmetry or just copied the answer — losing 1 of 2 marks.\n\nTakeaway: For \"show that\" Normal tail probabilities, always display $$z$$, then the symmetry-adjusted lookup, then the final value.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_13"}, {"question": "S1 Jan 2024 Q7(d) — If your computed $$\\text{Var}(13X - 6)$$ comes out as a non-integer decimal like 164.7, what does this tell you, and where should you check first? (2 steps)", "answer": "- Step 1: It tells you you've made an arithmetic error. Because $$\\text{Var}(13X - 6) = 169 \\cdot \\text{Var}(X)$$, and for discrete CDFs derived from integer fractions, $$\\text{Var}(X)$$ almost always has a denominator that is a factor of 169 (like 169 itself).\n- Step 2: Check first if you converted fractions to decimals too early. Early decimal conversion destroys the clean cancellation of the $$169$$ denominator. Re-do using exact fractions.\n\nTakeaway: A messy decimal in a variance scaling question is a red flag; keep fractions to allow cancellations.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_26"}, {"question": "When deriving a PDF from a CDF with mixed denominators (e.g. $$1/13, 7/26, 13/26, \\ldots$$), what one-line preparation step prevents the most common arithmetic slip? (2 steps)", "answer": "- Step 1: Convert ALL $$F(x)$$ values to a common denominator FIRST. Here multiply $$1/13 \\to 2/26$$ and $$1 \\to 26/26$$, so every value is over 26.\n- Step 2: Now $$P(X=x) = F(x) - F(x-1)$$ is a clean integer subtraction in the numerator — no risk of sign errors or LCD slips. Without this prep, students often write things like $$7/26 - 1/13 = 6/13$$ instead of $$5/26$$.\n\nTakeaway: Common denominator BEFORE differencing — turns a fraction-arithmetic problem into integer subtraction.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_19"}, {"question": "S1 Jan 2024 Q3(d) — Why is computing $$P(R)$$ by both complement ($$1 - P(L)$$) and direct-tree-sum a deliberate strategy, and what specific bug does a disagreement reveal? (2 steps)", "answer": "- Step 1: The two routes use **independent** arithmetic paths. The complement route uses the given total $$P(L) = 0.11$$, while the direct route sums the right-hand branches of the tree using the value of $$p$$ you found in part (b).\n- Step 2: If the two values disagree, you have an arithmetic slip somewhere in the tree — most likely a wrong branch probability (e.g., writing $$\\frac{1}{10}$$ instead of $$\\frac{9}{10}$$ for a right-hand branch) or a mistake in solving for $$p$$. Catching this before you divide saves both marks in the conditional probability.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_16"}, {"question": "In a \"show that\" question for regression (e.g., \"show that $$s = -5.72 + 1.04f$$\"), what is the minimum number of distinct calculation lines the examiner expects to see, and what are they? (2 steps)", "answer": "- Step 1: The examiner expects at least **four** lines: (1) $$\\bar{f}$$ and $$\\bar{s}$$, (2) $$b = S_{fs}/S_{ff}$$, (3) $$a = \\bar{s} - b\\bar{f}$$, (4) the final equation. Each line is a method mark opportunity.\n- Step 2: Writing only the final equation \"$$s = -5.72 + 1.04f$$\" without showing how you got $$b$$ and $$a$$ typically scores 0 or 1 out of 3. The \"show that\" instruction demands that you demonstrate the derivation, not just state the result.\n\n+ Correct structure: $$\\bar{f} = 42.2$$, $$\\bar{s} = 38.2$$, $$b = 1735.6/1667.6 = 1.0408$$, $$a = 38.2 - 1.0408 \\times 42.2 = -5.721$$, therefore $$s = -5.72 + 1.04f$$ ✓", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_39"}, {"question": "S1 Jan 2024 Q5(b) — why is throw 3 logically irrelevant to the favourable event, and what intermediate product would betray a wrong inclusion of it? (3 steps)", "answer": "- Step 1: The favourable event is \"qualifies on THROW 2 with $$>44$$\". Once the athlete qualifies on throw 2, the competition rule says they stop — they never take throw 3.\n- Step 2: Therefore the joint probability is just $$P(F_1) \\times P(X_2 > 44) = 0.3821 \\times 0.1587$$. No throw-3 factor.\n- Step 3: If your numerator contains a $$P(X_3)$$ term (e.g. you multiplied by $$0.6179$$ or $$0.3821$$ for throw 3), you've over-conditioned. The fix: re-read the question — \"they do not use any of their remaining attempts\" once they qualify.\n\nTakeaway: Read the stopping rule carefully — once an event satisfies the goal, downstream trials simply don't happen.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_14"}, {"question": "S1 Jan 2024 Q2(d) — If one variable were coded with $$b = -\\frac{5}{9}$$ and the other with $$d = +\\frac{5}{9}$$, what would happen to the sign of the PMCC, and why? (2 steps)", "answer": "- Step 1: The sign of $$r$$ would **flip** from positive to negative (or vice versa), because the product $$b \\cdot d$$ is now negative.\n- Step 2: The PMCC measures the direction of linear association. Reflecting one axis (negative multiplier) turns a positive slant into a negative slant. The magnitude $$|r|$$ stays the same, but the sign changes to match the new orientation of the scatter.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_13"}, {"question": "If you have written P(B|A) = P(A ∩ B)/P(B), what is wrong with this formula, and what is the correct denominator? (M10)", "answer": "- Step 1: The conditioning event A must be in the DENOMINATOR\n- Step 2: Your formula has B in denominator — this is backwards\n- Step 3: Correct formula: P(B|A) = P(A ∩ B) / P(A)\n\nThe trigger phrase \"Given that A\" means \"conditioned on A\" — A goes in the denominator. In Q3(d), \"given that R\" means P(Y12|R) = P(Y12 ∩ R)/P(R), not divided by P(Y12).", "source": "GAP-MiniMax ①", "_id": "minimax_1_8"}, {"question": "S1 Jan 2024 Q3(d) — why is computing $$P(R)$$ by BOTH the complement route AND the direct-tree-sum route a deliberate strategy, and what specific bug does any disagreement reveal? (3 steps)", "answer": "- Step 1: Route 1 (complement): $$P(R) = 1 - P(L) = 1 - 0.11 = 0.89$$. Route 2 (direct sum down the tree): $$P(R) = p \\cdot \\tfrac{7}{8} + (1-p) \\cdot \\tfrac{9}{10}$$, which after substituting $$p = 0.4$$ also gives $$0.89$$.\n- Step 2: The two routes use COMPLETELY DIFFERENT arithmetic paths — one uses your earlier $$P(L)$$, the other uses the branch probabilities directly. If you made an arithmetic slip in (b) computing $$p$$, Route 2 will reveal it; if you made a slip multiplying out the branches in (d), Route 1 will reveal it.\n- Step 3: Disagreement specifically reveals: (i) a wrong value of $$p$$ propagating forward, OR (ii) a branch-multiplication error (forgetting complement $$\\tfrac{7}{8}$$ or $$\\tfrac{9}{10}$$), OR (iii) a fraction-addition arithmetic slip. The agreement gives you confidence to proceed with the conditional formula.\n\nTakeaway: in tree-diagram conditional questions, always compute the denominator by two routes — it's a free error-detector.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_8"}, {"question": "What conceptual thread links Q1(d)'s \"between 8 and 14\" histogram calculation to Q4(a)'s outlier-fence calculation, and how can naming this pattern help you on a future paper? (2 steps)", "answer": "- Step 1: Both questions require the same two-step pattern: (1) identify a numerical boundary or fence, then (2) scale proportionally within a class or range. In Q1(d), the boundaries 8 and 14 cut through histogram classes, so you scale frequency by the fraction of class width included. In Q4(a), the fence $$Q_3 + 1.5 \\times \\text{IQR}$$ is a boundary, and you compare the data point to it.\n- Step 2: Name this pattern **\"fence-and-scale\"** — whenever a question asks \"how many observations fall between A and B\" or \"is this point beyond the fence,\" you: (a) compute the fence/boundary value, (b) determine what fraction of the relevant class/interval it covers, (c) scale accordingly. Recognising the pattern saves you from treating each question as a novel problem.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_34"}, {"question": "If the coding multiplier $$b = -5/9$$ (instead of $$+5/9$$), how would $$\\sigma_u$$ change versus how would $$r_{u,v}$$ change, and why are they affected differently? (3 steps)", "answer": "- Step 1: The standard deviation uses the **absolute value** of the multiplier: $$\\sigma_u = |b| \\cdot \\sigma_x = \\frac{5}{9}\\sigma_x$$. Whether $$b$$ is $$+5/9$$ or $$-5/9$$, the s.d. is the same positive number — spread cannot be negative.\n- Step 2: The PMCC **does** change sign: $$r_{u,v} = -r_{x,y}$$ (if only one of $$b, d$$ is negative). A negative multiplier reverses the direction of the relationship — higher $$x$$ maps to lower $$u$$ — so positive correlation becomes negative.\n- Step 3: They're affected differently because s.d. measures **magnitude of spread** (always non-negative, so absolute value), while PMCC measures **direction and strength of linear relationship** (sign matters, so the sign of the multiplier matters).\n\nThe critical formula distinction: $$\\sigma_u = |b|\\sigma_x$$ (absolute value) versus $$r_{u,v} = \\text{sign}(b \\cdot d) \\cdot r_{x,y}$$ (sign preserved from both multipliers). Don't conflate the two.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_25"}, {"question": "S1 Jan 2024 Q2(d) — before declaring $$r_{u,v} = r_{x,y}$$, what one-line sign check must you write down, and what's the case it protects against? (3 steps)", "answer": "- Step 1: Check that BOTH coding multipliers are positive. In Q2(d), $$u = \\tfrac{5}{9}(x-32)$$ and $$v = \\tfrac{5}{9}(y-32)$$ — multipliers $$b = d = 5/9 > 0$$. Write this on the page: \"Both $$b, d > 0$$, so $$r$$ unchanged.\"\n- Step 2: The case it protects against — if EITHER multiplier were negative (say $$u = -2x$$), the linear relationship's direction would FLIP, and $$r_{u,v} = -r_{x,y}$$. If BOTH multipliers were negative, the two flips cancel and $$r$$ is unchanged again.\n- Step 3: The general rule: $$r_{u,v} = \\text{sgn}(bd) \\cdot r_{x,y}$$. Writing the positivity check is the 1-mark \"reason\" — examiners want the rule stated, not just the value asserted.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_6"}, {"question": "Before applying $$Q_1 = \\frac{n+1}{4}$$ position to a raw data list like $$\\{16, 90, 24, 28, \\ldots\\}$$, what one-step preparation must you do, and what error pattern does skipping it produce? (2 steps)", "answer": "- Step 1: **Sort the data in ascending order first.** The quartile position formula assumes the data are ordered; it finds the value at a specific rank position. Unsorted data gives a meaningless \"quartile.\"\n- Step 2: Skipping the sort produces quartiles that are just random data values at the wrong positions. For example, with unsorted data $$\\{16, 90, 24, 28, \\ldots\\}$$, the 3rd value is 24 — but after sorting to $$\\{16, 24, 28, 32, \\ldots\\}$$, the 3rd value is 28. The $$Q_1$$ would be wrong, and the outlier fence calculation would cascade into error.\n\n+ Note: the summary statistics $$\\sum x$$ and $$\\sum x^2$$ given in the question are order-independent (they're sums), so they give no clue about the sorted order — you must sort manually.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_38"}, {"question": "On a \"two chosen at random without replacement\" probability question, what specific wrong product gives the with-replacement answer, and conceptually why must the denominator drop on the second pick? (3 steps)", "answer": "- Step 1: The wrong product is $$\\frac{220}{408} \\times \\frac{220}{408}$$ — this treats the second pick as if the first plant were replaced, keeping the denominator at 408. The correct product is $$\\frac{220}{408} \\times \\frac{219}{407}$$.\n- Step 2: The denominator drops because \"without replacement\" means the first plant is **removed from the population**. After picking one favourable plant, there are now 219 favourable plants left out of 407 total — both numerator and denominator decrease by 1.\n- Step 3: The numerical difference matters: $$(220/408)^2 \\approx 0.2907$$ versus $$(220/408)(219/407) \\approx 0.2901$$. The with-replacement answer is slightly too high because it overcounts the scenario where the same plant is \"picked twice\" — an impossibility without replacement.\n\nThe trigger: any question saying \"two chosen at random\" without explicitly stating \"with replacement\" defaults to without replacement in S1. Always reduce the denominator on the second factor.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_27"}, {"question": "When deriving a PDF from a CDF with mixed denominators (e.g., $$\\frac{1}{13}$$, $$\\frac{7}{26}$$, $$\\frac{13}{26}$$), what one-line preparation step prevents the most common arithmetic slip? (2 steps)", "answer": "- Step 1: Convert ALL $$F(x)$$ values to a common denominator (here 26) BEFORE computing any differences: $$F(1) = \\frac{2}{26}$$, $$F(2) = \\frac{7}{26}$$, $$F(3) = \\frac{13}{26}$$, $$F(4) = \\frac{26}{26}$$.\n- Step 2: Now each probability $$P(X = x) = F(x) - F(x-1)$$ is a simple subtraction of fractions with the same denominator: $$\\frac{7}{26} - \\frac{2}{26} = \\frac{5}{26}$$, etc. Without this step, you'd be computing $$\\frac{7}{26} - \\frac{1}{13}$$, which requires a cross-multiplication that invites sign errors and wrong denominators.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_26"}, {"question": "When solving simultaneous equations $$\\{14x + 20y = 13,\\ x + 4y = 1.7\\}$$, what scaling makes the $$y$$-term cancel in a single subtraction, and why subtract rather than add? (2 steps)", "answer": "- Step 1: The first equation has $$20y$$; the second has $$4y$$. Scale the second equation by 5 to get $$5x + 20y = 8.5$$. Now both equations share the term $$20y$$, so subtracting eliminates $$y$$: $$(14x + 20y) - (5x + 20y) = 13 - 8.5$$, giving $$9x = 4.5$$.\n- Step 2: You subtract rather than add because the $$y$$-coefficients have the **same sign** (both $$+20y$$). Addition would give $$40y$$, not cancellation. The rule: same sign → subtract; opposite sign → add.\n\nThe insight: always align the coefficient you want to eliminate, then choose the operation that makes the aligned terms cancel. Same sign = subtract.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_16"}, {"question": "In Edexcel S1, what denominator do you use when calculating standard deviation, and what calculator setting silently produces the wrong answer? (2 steps)", "answer": "- Step 1: S1 uses the **population** standard deviation formula $$\\sigma = \\sqrt{\\frac{S_{xx}}{n}}$$, with denominator $$n$$. This is NOT the sample standard deviation $$s = \\sqrt{\\frac{S_{xx}}{n-1}}$$.\n- Step 2: Most scientific calculators default to the **sample** s.d. (denominator $$n-1$$) when you use their stats mode. If you read the calculator output without checking which mode it's in, you'll get a slightly larger value and lose the accuracy mark. Always verify your calculator is set to $$\\sigma$$ (population), not $$s$$ (sample).\n\nThe numerical difference is small (e.g., 8.57 vs 8.61) but enough to miss a \"show that\" target.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_3"}, {"question": "What scanning ritual should you perform in the first 10 minutes of any S1 paper, and what specific habit pre-empts the #1 source of lost marks? (3 steps)", "answer": "- Step 1: Scan ALL questions for the trigger phrase \"given that\" and mark them with a star.\n- Step 2: For each starred question, pre-write the conditional formula $$P(A|B) = \\frac{P(A \\cap B)}{P(B)}$$ in the margin.\n- Step 3: This pre-empts the most common S1 error: writing the joint probability $$P(A \\cap B) as the final answer when a conditional $$P(A|B)$$ was asked. Writing the formula first forces you to compute the denominator.\n\nTakeaway: Find \"given that\" → write the formula → then compute.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_29"}, {"question": "What scanning ritual should you perform in the first 10 minutes of any S1 paper, and what specific habit pre-empts the #1 source of lost marks? (2 steps)", "answer": "- Step 1: Scan ALL questions for the trigger phrase **\"given that\"** and mark each occurrence with a star in the margin. On this paper, Q3(d), Q5(b), and Q8 all involve conditioning.\n- Step 2: Next to each star, **pre-write the conditional formula** $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$ in the margin. This habit pre-empts the #1 error: writing only the numerator $$P(A \\cap B)$$ as the answer (Phuc's exact mistake on Q3(d), costing 2 marks). Having the formula already on the page forces you to compute the denominator before finalising.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_31"}, {"question": "What single $$\\Phi$$ value should you memorise from the S1 table to immediately recognise the right-hand-side 0.9332 in inverse-Normal questions, and why is this faster than using the inverse table? (2 steps)", "answer": "- Step 1: Memorise $$\\Phi(1.5) = 0.9332$$. This is one of the cleanest exact values in the Normal table, and it appears frequently in exam questions (including Q8(b) of this paper).\n- Step 2: When you see \"find $$z$$ such that $$\\Phi(z) = 0.9332$$\", you can immediately write $$z = 1.5$$ without flipping to the inverse-normal percentage-points table. This saves roughly 30 seconds and eliminates the risk of reading the wrong row or column in the inverse table.\n\nThe broader strategy: memorise a handful of landmark values ($$\\Phi(1) = 0.8413$$, $$\\Phi(1.5) = 0.9332$$, $$\\Phi(1.645) = 0.95$$, $$\\Phi(1.96) = 0.975$$). Examiners often design questions around these, so recognition beats lookup.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_22"}, {"question": "S1 Jan 2024 Q5(b) — why would multiplying $$P(X_2 > 38.8) \\times P(X_2 > 44)$$ be a double-counting error, and what set-relationship between these two events explains it? (3 steps)", "answer": "- Step 1: Both probabilities describe the SAME throw — throw 2 — not separate events. They aren't independent trials; they're two conditions on a single random outcome.\n- Step 2: Set relationship: $$\\{X_2 > 44\\} \\subset \\{X_2 > 38.8\\}$$. Any throw exceeding 44 automatically exceeds 38.8. So \"throw 2 qualifies AND throw 2 exceeds 44\" is just \"throw 2 exceeds 44\".\n- Step 3: The probability for the favourable event is therefore just $$P(X_2 > 44) = 0.1587$$, not a product. Multiplying gives $$0.6179 \\times 0.1587 \\approx 0.098$$ — wrong, because you've effectively squared part of the same event's probability.\n\nTakeaway: When two conditions describe the SAME random variable, take the intersection (i.e. the stricter condition), not a product.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_28"}, {"question": "What conceptual thread links Q1(d)'s \"between 8 cm and 14 cm\" histogram calculation to Q4(a)'s outlier-fence calculation, and how does naming this pattern help on a future paper? (2 steps)", "answer": "- Step 1: Both questions share the same DNA: **identify a numerical boundary, then scale proportionally within a class/interval**. In Q1(d), the boundaries 8 and 14 cut through existing classes, so you scale the class frequency by the fraction of the class width that lies inside the boundary. In Q4(a), the outlier fence at 78 doesn't align with any data point — you compute it from the IQR formula and compare.\n- Step 2: Naming this the **\"fence-and-proportion\" pattern** helps because when you see any question involving boundaries that don't align with class edges or data values, you immediately know: (1) compute the boundary value, (2) determine which class/interval it falls in, (3) scale proportionally. One mental label, two question types handled.\n\nThe deeper insight: S1 loves questions where the answer isn't a whole class or a whole data point — it's a partial class or a derived threshold. Recognising \"fence-and-proportion\" means you'll never be surprised by the setup.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_26"}, {"question": "S1 Jan 2024 Q2(c) — when converting an s.d. from $$F$$ to $$C$$ via $$c = \\tfrac{5}{9}(f-32)$$, what specific arithmetic error must you avoid, and why does the $$-32$$ vanish? (3 steps)", "answer": "- Step 1: The error is subtracting 32 from the s.d., e.g., writing $$\\sigma_c = \\tfrac{5}{9}(8.5716 - 32)$$. This gives a negative number, which immediately should signal \"wrong\" since s.d. is always non-negative.\n- Step 2: The $$-32$$ is an ADDITIVE constant. For any linear coding $$u = a + bx$$, the constant $$a$$ shifts every data value by the same amount — including the mean — but leaves SPREAD unchanged. Subtracting 32 from every value moves the whole distribution left but doesn't change how spread out it is.\n- Step 3: Only the multiplier $$b = 5/9$$ scales the spread, so $$\\sigma_c = \\tfrac{5}{9}\\sigma_x = \\tfrac{5}{9} \\times 8.5716 \\approx 4.76$$. The clean rule: \"additive constants drop; multipliers act.\"", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_5"}, {"question": "When asked to \"show that $$14x + 20y = 13$$\" from the equation $$0.65 = 0.7x + y$$, how do you pick the multiplier (20) rather than guessing, and what target-coefficient comparison drives that choice? (2 steps)", "answer": "- Step 1: Compare the coefficients in your current equation with the target. Your equation has $$0.7x$$; the target has $$14x$$. Ask: what do I multiply $$0.7$$ by to get $$14$$? Answer: $$14 / 0.7 = 20$$. That's your multiplier.\n- Step 2: Verify the other coefficients align: $$20 \\times y = 20y$$ ✓ (matches target), and $$20 \\times 0.65 = 13$$ ✓ (matches target). The multiplier was chosen to hit the **most constrained coefficient** (the $$x$$-term), and the others fell into place automatically.\n\nThe general tactic: find the coefficient in your equation that requires the least ambiguous multiplier to match the target. Here, $$0.7 \\to 14$$ uniquely demands ×20. Don't guess — reverse-engineer from the target.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_15"}, {"question": "In a multi-attempt qualifying scenario (Q5(b)), why must throw 3 not appear anywhere in the numerator of the conditional probability, and what intermediate product would betray this error? (2 steps)", "answer": "- Step 1: The favourable event is \"qualified on throw 2 with distance > 44 m\". This means throw 1 failed AND throw 2 exceeded 44 m. Once throw 2 succeeds, the athlete **stops** — throw 3 is never taken. Including a $$P(\\text{throw 3})$$ factor would describe a scenario where the athlete continues after qualifying, which contradicts the problem statement.\n- Step 2: The error would be betrayed by a numerator like $$P(F_1) \\times P(S_2) \\times P(S_3)$$ or $$P(F_1) \\times P(X_2 > 44) \\times 0.6179$$ — any three-factor product where the third factor is a throw-3 probability. The correct numerator has exactly two factors: $$P(F_1) \\times P(X_2 > 44)$$.\n\nThe \"once qualified, stops\" rule is the trimming heuristic: after the qualifying throw, the probability tree branch terminates. No further factors.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_14"}, {"question": "Why does the sample s.d. (denominator $$n-1$$) give a larger value than the population s.d. (denominator $$n$$), and when does the difference matter most? (2 steps)", "answer": "- Step 1: Dividing by a smaller number ($$n-1$$ instead of $$n$$) produces a larger quotient, so $$s > \\sigma$$ always. The sample formula \"inflates\" the estimate to compensate for using the sample mean rather than the true population mean (Bessel's correction).\n- Step 2: The difference matters most when $$n$$ is small. For $$n = 12$$, the ratio is $$\\sqrt{12/11} \\approx 1.045$$, a 4.5% error — enough to change the 3 s.f. answer. For $$n = 1000$$, the ratio is $$\\sqrt{1000/999} \\approx 1.0005$$, negligible.\n\nIn S1, always use $$n$$ unless the question explicitly says \"sample standard deviation.\"", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_6"}, {"question": "Within the 90-minute S1 paper, what one habit saves approximately 3 minutes, and which formulas must you memorise to enable it? (2 steps)", "answer": "- Step 1: The habit is **not flipping to the formula booklet** for formulas you've memorised. Each lookup costs 20–30 seconds (find the booklet, find the page, locate the formula, copy it), and with 6–8 formula-dependent questions on a typical paper, that's 2–4 minutes of pure overhead.\n- Step 2: The formulas to memorise are the ones you use most frequently: $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$, $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} S_{yy}}}$$, $$\\operatorname{Var}(aX + b) = a^2 \\operatorname{Var}(X)$$, $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$, and the regression slope $$b = \\frac{S_{xy}}{S_{xx}}$$. These five cover the majority of lookups.\n\nThree minutes may not sound like much, but on a paper where the time budget is ~1.2 min/mark, 3 minutes = 2.5 marks of breathing room for checking work.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_24"}, {"question": "In a \"show that the standard deviation is 8.57\" question, what intermediate decimal must be written on the script before rounding, and why does the examiner need to see it? (2 steps)", "answer": "- Step 1: You must write the unrounded value $$\\sigma = 8.5716\\ldots$$ (at least one extra figure beyond the required 3 s.f.) before stating \"8.57 to 3 s.f.\"\n- Step 2: The examiner needs to see that 8.57 is a genuine rounding of your calculated value, not a copied answer. Without the intermediate decimal, the mark scheme typically awards only M1 (method) but withholds the A1 (accuracy) — you haven't \"shown\" the result, you've merely stated it.\n\n+ Write: $$\\sigma = \\sqrt{73.4722} = 8.5716\\ldots \\approx 8.57$$ (3 s.f.) ✓\n+ Don't write: $$\\sigma = 8.57$$ ✗ (where did this come from?)", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_7"}, {"question": "Why would multiplying $$P(X_2 > 38.8)$$ by $$P(X_2 > 44)$$ be a double-counting error, and what set-relationship between these two events explains it? (2 steps)", "answer": "- Step 1: The event $$X_2 > 44$$ is a **subset** of the event $$X_2 > 38.8$$. Every throw exceeding 44 m automatically exceeds 38.8 m. So $$P(X_2 > 44 \\text{ and } X_2 > 38.8) = P(X_2 > 44)$$, not $$P(X_2 > 44) \\times P(X_2 > 38.8)$$.\n- Step 2: Multiplying them treats them as independent events, but they're the SAME throw — the two conditions are nested, not independent. The correct probability for \"throw 2 qualifies AND exceeds 44 m\" is simply $$P(X_2 > 44) = 0.1587$$, because exceeding 44 already implies qualification. You'd be double-counting the same outcome.\n\n+ Think of it as: \"What's the probability it rains AND it pours?\" — if it pours, it's already raining. You don't multiply $$P(\\text{rain}) \\times P(\\text{pours})$$.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_37"}, {"question": "Why does $$\\operatorname{Var}(13X - 6)$$ necessarily simplify to an integer in this question, even though $$\\operatorname{Var}(X)$$ is a fraction?", "answer": "Because $$\\operatorname{Var}(13X - 6) = 169 \\operatorname{Var}(X)$$ and $$\\operatorname{Var}(X)$$ was constructed with denominator $$169$$; the scaling factor exactly matches the denominator, so the product is an integer by design of the exam question.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_39"}, {"question": "S1 Jan 2024 Q8(a) — What conversion must precede the inverse-normal lookup when you are given a symmetric two-tail probability of 0.6? (2 steps)", "answer": "- Step 1: Use the symmetry identity $$P(|Z| < z) = 2\\Phi(z) - 1$$. Rearranging gives $$\\Phi(z) = \\frac{1 + P(|Z| < z)}{2}$$.\n- Step 2: Substitute $$0.6$$ to obtain $$\\Phi(z) = 0.8$$. Now consult the inverse-normal table for cumulative probability $$0.8$$, not for $$0.6$$. Skipping this conversion is the most common reason students obtain $$k \\approx 0.76$$ instead of the correct $$k \\approx 2.52$$.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_43"}, {"question": "S1 Jan 2024 Q3(d) — why is it a deliberate strategy to compute $$P(R)$$ by TWO independent routes (complement and direct tree sum), and what bug does a disagreement reveal? (3 steps)", "answer": "- Step 1: Route 1 (complement): $$P(R) = 1 - P(L)$$, using the already-given $$P(L) = 0.11$$.\n- Step 2: Route 2 (direct tree): $$P(R) = p \\cdot \\frac{7}{8} + (1-p) \\cdot \\frac{9}{10}$$, summing both \"R\" branches.\n- Step 3: If the two values disagree, the bug is either (i) your value of $$p$$ from part (b) is wrong, or (ii) you've misread a branch probability. Both routes should give $$\\frac{89}{100} = 0.89$$. The check costs 20 seconds and bulletproofs the denominator of the conditional formula.\n\nTakeaway: Whenever you can compute a quantity by two independent methods, do it — disagreement catches errors that single-route checking misses.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_8"}, {"question": "S1 Jan 2024 Q8(b) — How does memorising $$\\Phi(1.5) = 0.9332$$ save approximately 30 seconds compared to using the inverse-normal table? (1 step)", "answer": "It removes the need to flip pages, search the inverse table for $$0.9332$$, and read across to find $$z$$. Instead, you recognise the value instantly and write $$z = 1.5$$ directly. On a paper with two or three Normal sub-parts, this recognition habit saves roughly 60–90 seconds overall.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_45"}, {"question": "Beyond units and contextual variable names, what one softening word distinguishes a correct regression-gradient interpretation from one that overstates causation? (2 steps)", "answer": "- Step 1: The word is **\"predicted\"** or **\"estimated\"** (Edexcel accepts either). The correct interpretation: \"For each additional mark in the French test, the **predicted** Spanish mark increases by 1.04 marks.\"\n- Step 2: Without this word, the statement \"the Spanish mark increases by 1.04 marks\" implies a deterministic causal relationship — as if French marks *cause* Spanish marks to rise. The regression line is a model of association; it estimates the average trend, not a guaranteed outcome for any individual.\n\n+ Acceptable: \"predicted,\" \"estimated,\" \"expected\" — all acknowledge model uncertainty.\n+ Unacceptable: \"increases by\" (implies certainty), \"causes an increase of\" (implies causation).", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_19"}, {"question": "S1 Jan 2024 Q5(a) — on a 2-mark \"show that $$P(X < 38.8) = 0.3821$$\" Normal-tail question, what TWO intermediate quantities must explicitly appear on your script for full credit? (3 steps)", "answer": "- Step 1: Quantity 1 — the standardised $$z$$-value with its full computation: $$z = \\dfrac{38.8 - 40}{4} = -0.30$$. This earns the standardisation method mark.\n- Step 2: Quantity 2 — the table lookup line: $$P(Z < -0.30) = 1 - \\Phi(0.30) = 1 - 0.6179$$. This earns the symmetry/table-use method mark.\n- Step 3: Only after both lines appear can you state the final answer $$= 0.3821$$. Skipping either intermediate means the examiner cannot verify that you applied standardisation correctly OR used the symmetry $$P(Z < -z) = 1 - \\Phi(z)$$ correctly. \"Show that\" questions reward the path, not the destination.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "If your computed $$\\text{Var}(13X - 6)$$ comes out as a non-integer decimal like 164.7, what does this tell you, and where should you check first? (2 steps)", "answer": "- Step 1: A non-integer decimal result is a strong signal of an arithmetic error. The expected answer is the integer 165, because $$\\text{Var}(13X - 6) = 169 \\times \\text{Var}(X) = 169 \\times \\frac{165}{169} = 165$$ — the 169 cancels exactly.\n- Step 2: Check first whether you converted fractions to decimals too early. If you computed $$E(X) \\approx 3.154$$ and $$E(X^2) \\approx 10.923$$ as decimals, then $$\\text{Var}(X) \\approx 10.923 - 9.948 = 0.975$$, and $$169 \\times 0.975 = 164.775$$ — close to 165 but not exact. Keeping fractions throughout preserves the clean cancellation.\n\n+ Rule: in variance calculations with discrete RVs, NEVER convert to decimals until the final step.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_27"}, {"question": "S1 Jan 2024 Q7(d) — if your computed $$\\operatorname{Var}(13X - 6)$$ comes out as a non-integer decimal like 164.7, what does this tell you and where should you check first? (3 steps)", "answer": "- Step 1: A non-integer answer is a RED FLAG. The expected clean cancellation: $$\\operatorname{Var}(X) = \\tfrac{165}{169}$$, and $$\\operatorname{Var}(13X-6) = 13^2 \\cdot \\tfrac{165}{169} = \\tfrac{169 \\cdot 165}{169} = 165$$ — the 169s cancel exactly to give an integer.\n- Step 2: A messy decimal means you converted $$E(X)$$ or $$E(X^2)$$ to a decimal too early, breaking the exact cancellation. Check first: did you compute $$E(X) = 41/13$$ as a fraction, or as $$3.1538\\ldots$$? If decimal, recompute as fraction.\n- Step 3: The general lesson: in coded-variance questions, KEEP FRACTIONS until the last step. The multiplier $$a^2 = 169$$ in $$\\operatorname{Var}(aX+b) = a^2 \\operatorname{Var}(X)$$ often cancels against a denominator of 169 in $$\\operatorname{Var}(X)$$, producing a clean integer. Decimal early = exact cancellation lost = messy non-integer answer.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_20"}, {"question": "S1 Jan 2024 Q7(d) — If your computed $$\\operatorname{Var}(13X - 6)$$ comes out as a non-integer decimal like $$164.7$$, what does this tell you, and where should you check first? (2 steps)", "answer": "- Step 1: It tells you that you have made an **arithmetic slip** in either $$E(X)$$, $$E(X^2)$$, or $$\\operatorname{Var}(X)$$, because the final answer is designed to be an integer (here 165).\n- Step 2: Check the variance of $$X$$ first. In the correct working, $$\\operatorname{Var}(X) = \\frac{165}{169}$$. When you multiply by $$13^2 = 169$$, the denominator cancels exactly. If the cancellation fails, re-examine your fraction arithmetic before converting to decimals.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_40"}, {"question": "In Q1(d), both boundaries 8 and 14 cut through the middle of existing histogram classes. What principle allows you to split the frequency proportionally, and what assumption does it require? (2 steps)", "answer": "- Step 1: The **uniform-within-class assumption** states that within any histogram class, values are distributed uniformly (evenly). This means the frequency is proportional to the width: if you take half the class width, you get half the frequency.\n- Step 2: This assumption is necessary because the histogram only tells us the total frequency per class, not how individual values are distributed within it. Without uniformity, the 8 cm boundary (1 cm into a 4 cm class) might correspond to more or less than $$\\frac{1}{4}$$ of the class frequency — but we have no information to do better, so uniformity is the standard assumption.\n\n+ From $$[5, 9)$$: the portion $$[8, 9)$$ is $$\\frac{1}{4}$$ of the class width, so $$\\frac{1}{4} \\times 32 = 8$$ plants.\n+ From $$[13, 15)$$: the portion $$[13, 14)$$ is $$\\frac{1}{2}$$ of the class width, so $$\\frac{1}{2} \\times 120 = 60$$ plants.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_48"}, {"question": "Beyond units and contextual variable names, what one softening word distinguishes a correct regression-gradient interpretation from one that overstates the model's claim? (2 steps)", "answer": "- Step 1: The word is **\"predicted\"** (or \"estimated\" / \"expected\"). The correct interpretation is: \"For each additional mark in the French test, the **predicted** Spanish mark increases by approximately 1.04 marks.\"\n- Step 2: Without \"predicted\", the statement implies a deterministic or causal relationship: \"the Spanish mark increases by 1.04 marks\" — as if it's guaranteed. Regression describes the **average trend** in the data, not a law. The model acknowledges scatter around the line, and \"predicted\" signals this uncertainty.\n\nMark scheme reality: on a 1-mark interpretation question, omitting \"predicted/estimated\" sometimes still earns the mark, but including it is the safe, precise answer — and on 2-mark versions, the softening word is often explicitly required.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_12"}, {"question": "S1 Jan 2024 Q8(a) — why is looking up $$\\Phi^{-1}(0.6) = 0.2533$$ on the inverse table immediately a fatal error, and what conversion must precede the lookup? (3 steps)", "answer": "- Step 1: The given probability $$0.6$$ is a TWO-TAILED probability — $$P(\\mu - 2k < X < \\mu + 2k) = 0.6$$ means the probability is split symmetrically around $$\\mu$$, NOT a one-tail cumulative probability.\n- Step 2: The inverse-normal table assumes ONE-TAIL probabilities (i.e., $$\\Phi(z) = P(Z < z)$$). Feeding it $$0.6$$ directly returns the $$z$$ such that $$P(Z < z) = 0.6$$, which is a completely different quantity from what you need.\n- Step 3: The correct conversion: $$P(|Z| < z) = c \\Rightarrow \\Phi(z) = (1+c)/2$$. Here $$c = 0.6$$, so $$\\Phi(z) = 0.8$$ and the correct lookup is $$\\Phi^{-1}(0.8) = 0.8416$$. The general rule for symmetric intervals: ADD 1, DIVIDE BY 2 before consulting the inverse table.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_21"}, {"question": "S1 Jan 2024 Q1(d) — what specific wrong product gives the with-replacement answer, and what's the numerical difference vs the correct without-replacement product? (3 steps)", "answer": "- Step 1: The wrong (with-replacement) product is $$\\left(\\dfrac{220}{408}\\right)^2 = 0.291\\,\\ldots$$ — using the same denominator $$408$$ twice.\n- Step 2: The correct (without-replacement) product is $$\\dfrac{220}{408} \\times \\dfrac{219}{407} = 0.2901\\,\\ldots$$ — second denominator drops to $$n-1 = 407$$, and numerator drops to $$219$$ because one favourable plant has been removed.\n- Step 3: The numerical difference is small (~$$0.0009$$, rounds to the same 3 s.f.), but the METHOD mark depends on showing the $$219/407$$ factor. The trigger: \"two plants are chosen\" — physical plants cannot be re-picked, so without-replacement is implicit. The general rule: any \"chosen at random\" from a physical finite population is without-replacement unless explicitly stated otherwise.\n\nTakeaway: even when numerical answers agree to 3 s.f., the method mark requires the correct factor structure.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_27"}, {"question": "S1 Jan 2024 Q6(a) — What specific comparison between the target form and the raw equation tells you to multiply by 20 instead of 10 or 100? (2 steps)", "answer": "- Step 1: The raw equation has $$0.7x$$ and the target wants $$14x$$. The ratio is $$14 / 0.7 = 20$$. Multiplying by 10 would give $$7x$$, which does not match the required $$14x$$; multiplying by 100 would overshoot and leave unnecessary decimals.\n- Step 2: The multiplier must align the $$x$$-coefficient exactly. Once $$20$$ is chosen, check the $$y$$-term: $$20 \\times y = 20y$$, which matches the target. This confirms 20 is the intended multiplier.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_31"}, {"question": "S1 Jan 2024 Q5(b) — What set-relationship between $$\\{X_2 > 38.8\\}$$ and $$\\{X_2 > 44\\}$$ explains why they cannot be treated as separate events to multiply? (2 steps)", "answer": "- Step 1: The event $$\\{X_2 > 44\\}$$ is a **subset** of $$\\{X_2 > 38.8\\}$$. This means every outcome in the first set is already inside the second set.\n- Step 2: Because one event is contained within the other, their intersection is just the smaller event. Treating them as separate factors to multiply ignores this containment and invents a joint structure that does not exist. The probability of \"qualifying on throw 2 with distance $$>44$$\" is a single-path event, not a product of two distinct conditions.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_57"}, {"question": "How do you remember which event goes in the denominator of the conditional probability formula $$P(A|B)$$? (2 steps)", "answer": "- Step 1: Read the bar $$|$$ as \"given\". So $$P(A|B)$$ means \"probability of A given B\".\n- Step 2: The \"given\" event B is the reduced sample space you are restricting to. Therefore, the probability of being in this restricted space, $$P(B)$$, must scale the intersection, so it goes in the denominator: $$\\frac{P(A \\cap B)}{P(B)}$$.\n\nTakeaway: \"Given\" = denominator.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_15"}, {"question": "S1 Jan 2024 Q2(c) cross-link — Why does the coding rule $$\\sigma_u = |b| \\sigma_x$$ use an absolute value while the sign of $$r$$ depends on the signs of both multipliers? (2 steps)", "answer": "- Step 1: Standard deviation measures distance, which is unsigned. Reflecting the axis with a negative multiplier does not change how far points are from the mean, so we take the absolute value to enforce positivity.\n- Step 2: Correlation measures whether the two variables move together or oppositely. If one axis is reflected (negative multiplier) and the other is not, an upward slant becomes a downward slant, so the sign of $$r$$ must change. The product $$b \\cdot d$$ captures this joint orientation.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_51"}, {"question": "When computing $$P(A \\cap B)$$ from $$P(B \\mid A)$$ and $$P(A)$$, what is the common direction error, and how do you avoid it? (2 steps)", "answer": "- Step 1: The error is writing $$P(A \\cap B) = P(B \\mid A) \\times P(B)$$ instead of $$P(A \\cap B) = P(B \\mid A) \\times P(A)$$. The conditioning event — the one after the bar — is the one you multiply by.\n- Step 2: To avoid it, read \"$$P(B \\mid A)$$\" as \"probability of B given A\" and recall the formula $$P(B \\mid A) = P(A \\cap B)/P(A)$$. Rearranging: $$P(A \\cap B) = P(B \\mid A) \\times P(A)$$. The denominator of the conditional formula becomes the multiplier when you rearrange.\n\n+ In Q6(a): $$P(B \\mid A) = 0.3$$, $$P(A) = x$$, so $$P(A \\cap B) = 0.3x$$ — NOT $$0.3y$$.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_42"}, {"question": "Before computing the regression intercept $$a = \\bar{y} - b\\bar{x}$$, what quick mental comparison predicts whether $$a$$ will be positive or negative, and when does it come out negative? (2 steps)", "answer": "- Step 1: Compare the product $$b\\bar{x}$$ with $$\\bar{y}$$. If $$b\\bar{x} > \\bar{y}$$, then $$a = \\bar{y} - b\\bar{x}$$ is negative. If $$b\\bar{x} < \\bar{y}$$, then $$a$$ is positive.\n- Step 2: In Q4(b), $$b = 1.04$$ and $$\\bar{f} = 42.2$$, so $$b\\bar{f} = 1.04 \\times 42.2 \\approx 43.9$$. Since $$43.9 > 38.2 = \\bar{s}$$, the intercept is $$a = 38.2 - 43.9 = -5.7$$, which is negative. Students often expect intercepts to be positive and write $$+5.72$$ — the sign check catches this.\n\nThe intuition: if the regression line at the mean of $$x$$ already sits above the mean of $$y$$ (because the slope is steep), the line must dip below zero on the left to pass through $$(\\bar{x}, \\bar{y})$$.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_11"}, {"question": "If the coding multiplier were $$b = -5/9$$ instead of $$+5/9$$, how would $$\\sigma_u$$ change vs how would $$r_{u,v}$$ change, and why are they affected differently? (3 steps)", "answer": "- Step 1: For $$\\sigma_u$$: the rule is $$\\sigma_u = |b|\\sigma_x$$. With $$b = -5/9$$, $$|b| = 5/9$$ — same magnitude. So $$\\sigma_u$$ is UNCHANGED. Standard deviation is always positive and measures spread, regardless of sign of the scaling.\n- Step 2: For $$r_{u,v}$$: a NEGATIVE multiplier flips the sign of one variable's deviations, reversing the linear relationship's direction. So $$r_{u,v}$$ has the opposite sign from $$r_{x,y}$$.\n- Step 3: The asymmetry: s.d. uses $$|b|$$ (absolute value, spread is unsigned), but correlation uses the actual sign of $$b$$ (direction of relationship matters).\n\nTakeaway: Negative coding multiplier → s.d. preserved (use $$|b|$$), correlation sign-flipped (use $$b$$). They diverge because spread is direction-less, correlation isn't.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "What scanning ritual should you perform in the first 10 minutes of any S1 paper, and what specific habit pre-empts the #1 source of lost marks? (3 steps)", "answer": "- Step 1: In the first 10 minutes, SCAN every question for the trigger phrase \"**given that**\" (or equivalent: \"if a … is …\", \"knowing that\"). Mark each occurrence with a star $$\\star$$ in the margin.\n- Step 2: Beside every starred question, immediately write the conditional formula $$P(A \\mid B) = \\dfrac{P(A \\cap B)}{P(B)}$$ in the margin — BEFORE attempting any other question. This prevents the \"I forgot the question was conditional\" error mid-calculation.\n- Step 3: The #1 source of lost marks in S1 is confusing $$P(A \\cap B)$$ with $$P(A \\mid B)$$ — students compute the numerator correctly but report it as the final answer, missing the denominator entirely. Pre-writing the formula creates a visual cue that the denominator must appear.\n\nTakeaway: 60 seconds spent scanning saves ~4–6 marks per paper on conditional-probability traps.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_23"}, {"question": "Why is computing $$P(R)$$ by both the complement route and the direct-tree-sum route a deliberate verification strategy, and what specific bug does a disagreement reveal? (2 steps)", "answer": "- Step 1: The complement route gives $$P(R) = 1 - P(L) = 1 - 0.11 = 0.89$$. The direct route sums the right-hand branches: $$P(R) = p \\cdot \\frac{7}{8} + (1-p) \\cdot \\frac{9}{10}$$. Both must produce the same number.\n- Step 2: A disagreement reveals an **arithmetic slip** in one of the two routes — most commonly a fraction addition error in the direct sum (e.g., adding $$\\frac{7}{20} + \\frac{27}{50}$$ incorrectly). The complement route is simpler, so it's more likely correct; the direct route is error-prone but serves as a cross-check.\n\nThis is a high-value habit because a wrong $$P(R)$$ propagates into every conditional probability that uses it as a denominator.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_8"}, {"question": "In any tree-diagram conditional-probability question, at what stage should you perform this two-route verification?", "answer": "Immediately after finding the unknown probability (for example, $$p$$) and before substituting into the conditional formula $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$; catching an error here prevents cascading it into the numerator and denominator.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_16"}, {"question": "Before declaring that $$r_{u,v} = r_{x,y}$$ under linear coding, what one-line sign check must you write, and what happens if a coding multiplier is negative? (2 steps)", "answer": "- Step 1: Confirm that **both** multipliers $$b$$ and $$d$$ (from $$u = a + bx$$, $$v = c + dy$$) are **positive**. Write: \"$$b = 5/9 > 0$$ and $$d = 5/9 > 0$$, so $$r$$ is unchanged.\" This one line covers the condition the mark scheme demands.\n- Step 2: If either multiplier is negative, the PMCC **changes sign** but keeps its magnitude: $$r_{u,v} = -r_{x,y}$$ when exactly one of $$b, d$$ is negative. A negative multiplier reverses the direction of the relationship (higher $$x$$ maps to lower $$u$$), flipping the correlation.\n\nCommon misapp: stating \"$$r$$ is always unchanged by linear coding\" without the sign qualifier — this loses the reason mark.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_6"}, {"question": "When solving Q8(b), you get the quadratic $$3\\sigma^2 - 6\\sigma = 0$$ with roots $$\\sigma = 0$$ and $$\\sigma = 2$$. Why must you reject $$\\sigma = 0$$, and what language should you use on the script? (2 steps)", "answer": "- Step 1: A standard deviation of zero means every data point is identical — no variation at all. This contradicts the premise of the question (a Normal distribution, which requires $$\\sigma > 0$$). So $$\\sigma = 0$$ is mathematically valid as a root of the equation but physically meaningless.\n- Step 2: On the script, write: \"$$\\sigma = 0$$ (rejected, since $$\\sigma > 0$$) or $$\\sigma = 2$$.\" This one-line rejection shows the examiner you've considered both roots and made a reasoned choice. Without it, you risk losing a mark for appearing to guess.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_46"}, {"question": "If your computed $$\\operatorname{Var}(13X - 6)$$ comes out as a non-integer decimal like 164.7, what does this signal, and where should you check first? (2 steps)", "answer": "- Step 1: It signals an **arithmetic error**. The correct answer is the integer 165, because $$\\operatorname{Var}(13X - 6) = 169 \\times \\operatorname{Var}(X) = 169 \\times \\frac{165}{169} = 165$$. The 169 cancels exactly when you keep fractions.\n- Step 2: Check first whether you **converted fractions to decimals too early**. If you computed $$E(X) \\approx 3.154$$ and $$E(X^2) \\approx 10.923$$ as decimals, the subtraction $$E(X^2) - [E(X)]^2$$ accumulates rounding error, and the clean $$169$$ cancellation is destroyed. The fix: keep everything as fractions with denominator 13 or 169 until the final step.\n\nThe answer-shape heuristic: when the question involves $$\\operatorname{Var}(aX + b)$$ with integer $$a$$, the $$a^2$$ factor often cancels a denominator in $$\\operatorname{Var}(X)$$. A messy decimal answer is a red flag that you lost the cancellation.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_20"}, {"question": "S1 Jan 2024 Q2(c) cross-link — If the coding multiplier were $$b = -\\frac{5}{9}$$ instead of $$+\\frac{5}{9}$$, how would $$\\sigma_u$$ change versus how would $$r_{u,v}$$ change, and why are they affected differently? (3 steps)", "answer": "- Step 1: The standard deviation would be **unchanged in magnitude**: $$\\sigma_u = |b|\\sigma_x = \\frac{5}{9}\\sigma_x$$. The absolute value strips the sign, so a negative multiplier does not reverse spread.\n- Step 2: The PMCC would **flip sign** if exactly one multiplier were negative (here $$b = -5/9$$ and $$d = +5/9$$), because the sign of $$r$$ depends on the product $$b \\cdot d$$.\n- Step 3: They are affected differently because spread is a magnitude (always non-negative, so only $$|b|$$ matters), whereas correlation measures directional alignment (so the sign of the scaling matters).", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_50"}, {"question": "S1 Jan 2024 Q2(c) cross-link — If $$b = -\\frac{5}{9}$$ (instead of $$+\\frac{5}{9}$$), how would $$\\sigma_u$$ change versus how would $$r_{u,v}$$ change, and why are they affected differently? (3 steps)", "answer": "- Step 1: Standard deviation uses the absolute value: $$\\sigma_u = |b|\\sigma_x = \\frac{5}{9}\\sigma_x$$; it stays positive and unchanged in magnitude because spread is unaffected by reflection.\n- Step 2: Product-moment correlation uses the product of signs: $$r_{u,v} = \\operatorname{sgn}(b)\\operatorname{sgn}(d) \\, r_{x,y}$$; with $$b < 0$$ and $$d > 0$$, the correlation flips sign.\n- Step 3: They differ because s.d. measures dispersion (unsigned), while $$r$$ measures directional linear association (signed), so a reflection on one axis reverses the slope direction and hence the correlation.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_46"}, {"question": "In Q8(a), why is looking up $$\\Phi^{-1}(0.6)$$ on the inverse table immediately a fatal error, and what conversion must precede the lookup? (3 steps)", "answer": "- Step 1: The value 0.6 is a **two-tail** (symmetric-interval) probability: $$P(\\mu - 2k < X < \\mu + 2k) = 0.6$$ means the central 60% of the distribution. The inverse table gives z-values for **one-tail** (cumulative) probabilities.\n- Step 2: Convert the two-tail probability to a one-tail cumulative probability: $$\\Phi(z^*) = \\frac{1 + 0.6}{2} = 0.8$$. Now look up $$\\Phi^{-1}(0.8) = 0.8416$$.\n- Step 3: If you skip this conversion and look up $$\\Phi^{-1}(0.6) = 0.2533$$, you'd set $$2k/6 = 0.2533$$ and get $$k \\approx 0.76$$ instead of the correct $$k \\approx 2.52$$ — a catastrophically wrong answer.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_28"}, {"question": "If your final computed $$\\operatorname{Var}(13X - 6)$$ comes out as a messy decimal like 164.7, what does this tell you and where do you check first? (3 steps)", "answer": "- Step 1: The answer SHOULD be the integer 165. The variance formula contains $$169 \\times \\frac{165}{169}$$, which cancels exactly to 165. A messy decimal signals you converted fractions to decimals too early.\n- Step 2: Check first: did you keep $$E(X) = 41/13$$ and $$E(X^2) = 142/13$$ as fractions? If you converted to e.g. $$E(X) = 3.154$$ early, the squaring introduces rounding error that propagates.\n- Step 3: Redo with fractions: $$\\operatorname{Var}(X) = \\frac{142}{13} - \\left(\\frac{41}{13}\\right)^2 = \\frac{1846 - 1681}{169} = \\frac{165}{169}$$, then $$13^2 \\times \\frac{165}{169} = 165$$.\n\nTakeaway: When you spot an integer-looking question (the multiplier is designed to cancel the denominator), keep fractions until the LAST step.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_20"}, {"question": "S1 Jan 2024 Q5(b) — why would multiplying $$P(X_2 > 38.8)$$ by $$P(X_2 > 44)$$ be a double-counting error, and what set-relationship between these two events explains it? (3 steps)", "answer": "- Step 1: Both probabilities describe the SAME throw — throw number 2. They are not two separate events to combine.\n- Step 2: Set-relationship: the event $$\\{X_2 > 44\\}$$ is a SUBSET of $$\\{X_2 > 38.8\\}$$. Any throw that exceeds 44 m automatically exceeds 38.8 m, so \"throw 2 succeeds AND throw 2 $$> 44$$\" is just \"throw 2 $$> 44$$\" — the success condition is automatically implied.\n- Step 3: Multiplying $$0.6179 \\times 0.1587 = 0.098$$ would effectively be squaring a single probability that conditions on the subset event — you'd be computing $$P(\\text{throw 2 } > 44)$$ TWICE. The correct factor is just $$P(X_2 > 44) = 0.1587$$, used once, multiplied by the throw-1-fails probability $$0.3821$$.\n\nThe general rule: if event $$A \\subseteq B$$, then $$P(A \\cap B) = P(A)$$, not $$P(A) \\cdot P(B)$$.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_28"}, {"question": "S1 Jan 2024 Q8(a) — Why is looking up $$\\Phi^{-1}(0.6)$$ on the inverse table immediately a fatal error for a symmetric interval $$P(\\mu - 2k < X < \\mu + 2k) = 0.6$$, and what conversion must precede the lookup? (3 steps)", "answer": "- Step 1: The probability 0.6 is the *total* two-tail area inside the symmetric interval, not the area to the left of the upper bound.\n- Step 2: By symmetry, the area from $$-\\infty$$ to the upper bound $$\\frac{2k}{6}$$ is the lower tail (0.2) plus the central area (0.6), which equals 0.8.\n- Step 3: You must convert the two-tail probability to a one-tail cumulative probability: $$\\Phi(z) = 0.5 + 0.6/2 = 0.8$$, and *then* look up $$\\Phi^{-1}(0.8) = 0.8416$$.\n\nTakeaway: Symmetric interval probability $$c$$ requires looking up $$\\Phi^{-1}(\\frac{1+c}{2})$$.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_27"}, {"question": "If the coding applied to $$y$$ were $$v = c + dy$$ with $$d = -\\frac{5}{9}$$ while $$u = a + bx$$ with $$b = \\frac{5}{9}$$, how would $$r_{u,v}$$ relate to $$r_{x,y}$$?", "answer": "The product $$bd = -\\frac{25}{81} < 0$$, so $$r_{u,v} = -r_{x,y}$$; the correlation magnitude stays the same but the sign reverses because one variable was reflected.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_12"}, {"question": "Before applying $$Q_1 = (n+1)/4$$ position to a list of Spanish marks like $$\\{16, 90, 24, 28, \\ldots\\}$$, what one-step preparation is essential, and what error pattern does skipping it produce? (3 steps)", "answer": "- Step 1: SORT the data into ascending order first. The marks $$\\{16, 90, 24, 28, 32, 36, 38, 44, 48, 48, 68\\}$$ become $$\\{16, 24, 28, 32, 36, 38, 44, 48, 48, 68, 90\\}$$.\n- Step 2: Quartile position formulas give you a RANK in the sorted list. If you read off position 3 from the unsorted list, you'd get $$24$$ — coincidentally correct here, but if you read position 9 from the unsorted list you'd get $$48$$ (or worse). The formula assumes sorted data.\n- Step 3: Crucially, the summary statistics $$\\sum x$$ and $$\\sum x^2$$ given in the question are ORDER-INDEPENDENT, so they don't help. You must sort the raw data manually.\n\nTakeaway: \"Find $$Q_1, Q_3$$\" → sort first, always. The position formula is meaningless on unsorted data.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "S1 Jan 2024 Q8(a) — when asked for $$k$$ with $$P(\\mu - 2k < X < \\mu + 2k) = 0.6$$, why is looking up $$\\Phi^{-1}(0.6)$$ directly a fatal error, and what conversion must precede the lookup? (3 steps)", "answer": "- Step 1: The 0.6 is a TWO-TAIL (symmetric interval) probability — the area under the curve BETWEEN $$-z^*$$ and $$+z^*$$. The inverse-normal table expects a ONE-TAIL probability (area to the left of $$z$$).\n- Step 2: Convert using symmetry: $$P(|Z| < z^*) = 2\\Phi(z^*) - 1 = 0.6 \\Rightarrow \\Phi(z^*) = 0.8$$.\n- Step 3: NOW look up $$\\Phi^{-1}(0.8) = 0.8416$$. Looking up $$\\Phi^{-1}(0.6) = 0.2533$$ uses the wrong tail meaning entirely — yields a $$k$$ that's way too small.\n\nTakeaway: General rule — $$P(|Z| < z^*) = c \\Rightarrow \\Phi(z^*) = (1+c)/2$$. Always convert two-tail to one-tail before the table.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_21"}, {"question": "What conceptual thread links S1 Jan 2024 Q1(d)'s \"between 8 and 14\" calculation to Q4(a)'s outlier-fence calculation, and how does naming this pattern help on a future paper?", "answer": "Both questions follow the pattern: **identify a numerical fence/boundary, then scale proportionally**. Q1(d) places the fences at $$h=8$$ and $$h=14$$, which cut through existing histogram classes, requiring proportional splits: $$\\tfrac{9-8}{4} \\times 32 = 8$$ plants from class $$[5,9)$$, etc. Q4(a) computes the outlier fence $$Q_3 + 1.5(Q_3 - Q_1) = 78$$ and compares each data point against it. Both are \"fence-and-fraction\" calculations dressed differently. Naming the pattern as \"Fence and Scale\" helps future papers because you'll recognise *any* problem that gives a numerical boundary and asks \"how much lies within/outside\" — whether it's a histogram interval, a Normal-tail probability, or an outlier test. The mental routine becomes: (1) locate the fence, (2) decide whether to include/exclude/scale, (3) compute.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_26"}, {"question": "What is the \"show that\" chain principle that connects Q2(a)(ii), Q4(b), Q6(a), and Q7(a) on this paper, and what minimum structure must every \"show that\" answer follow? (2 steps)", "answer": "- Step 1: Every \"show that\" question requires you to demonstrate a logical chain from given information to the stated result, with each algebraic step visible. The examiner awards method marks for the steps, not just the final answer.\n- Step 2: The minimum structure is: (1) write the relevant formula, (2) substitute the given values, (3) simplify to at least one intermediate result, (4) arrive at the target value. For numerical \"show that\"s, always show at least one more decimal place than the target before rounding.\n\n+ Q2(a)(ii): $$S_{xx} = 881.667 \\to \\sigma = \\sqrt{881.667/12} = 8.5716 \\to 8.57$$ (3 s.f.)\n+ Q6(a): $$0.65 = 0.7x + y \\to 13 = 14x + 20y$$ (multiply by 20)", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_49"}, {"question": "S1 Jan 2024 Q1/Q4 cross-link — What conceptual thread links Q1(d)'s 'between 8 and 14' histogram calculation to Q4(a)'s outlier-fence calculation, and how can naming this pattern help you? (2 steps)", "answer": "- Step 1: Both require identifying a numerical boundary (8 and 14, or $$Q_3 + 1.5 \\times IQR$$), then scaling a quantity proportionally to how much of a class/interval falls within that boundary.\n- Step 2: Naming this the \"proportional fence-splitting\" pattern helps you recognize that whenever a boundary cuts through a block of data (a histogram class or an IQR range), you must calculate the fraction of that block included, rather than treating it as all-or-nothing.\n\nTakeaway: Boundaries that slice through uniform blocks require proportional splitting.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_32"}, {"question": "If the coding multiplier $$b = -5/9$$ (instead of $$+5/9$$), how would $$\\sigma_u$$ change versus how would $$r_{u,v}$$ change, and why are they affected differently? (3 steps)", "answer": "- Step 1: $$\\sigma_u = |b| \\sigma_x$$. The ABSOLUTE VALUE means $$\\sigma_u = \\tfrac{5}{9}\\sigma_x$$ regardless of whether $$b = +5/9$$ or $$-5/9$$. Standard deviation is always non-negative — sign doesn't apply.\n- Step 2: $$r_{u,v} = \\text{sgn}(bd) \\cdot r_{x,y}$$. The SIGN of the product $$bd$$ matters. If $$b = -5/9$$ and $$d = +5/9$$, then $$bd < 0$$ and $$r_{u,v} = -r_{x,y}$$ — correlation FLIPS sign.\n- Step 3: The asymmetry comes from interpretation: s.d. measures spread (a magnitude — no direction), while $$r$$ measures the DIRECTION of linear association. Multiplying $$x$$ by a negative number reflects the data across the mean — spread unchanged, but the slope of the linear relationship flips.\n\nTakeaway: the absolute value in $$\\sigma_u = |b|\\sigma_x$$ is doing real work — don't ignore it.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_25"}, {"question": "What is the difference between interpolation and extrapolation in the context of regression, and what specific language does the Edexcel mark scheme reward for identifying which is more reliable? (2 steps)", "answer": "- Step 1: **Interpolation** is estimating within the range of the observed data; **extrapolation** is estimating outside that range. Interpolation is more reliable because the linear model was fitted to data within that range and may not hold beyond it.\n- Step 2: The mark scheme rewards: (1) using the words \"interpolation\" and/or \"extrapolation\" explicitly, (2) stating the data range (e.g., \"$$24 \\leq f \\leq 68$$\"), and (3) identifying which estimate is which. Vague answers like \"more reliable because the data are linear\" score 0.\n\n+ Full-mark answer: \"The estimate for $$f = 55$$ is more reliable because 55 lies within the data range $$24 \\leq f \\leq 68$$ (interpolation). The estimate for $$f = 18$$ is extrapolation and less reliable.\"", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_47"}, {"question": "What is the most reliable way to remember which event goes in the denominator of the conditional probability formula? (2 steps)", "answer": "- Step 1: Read $$P(B \\mid A)$$ aloud as \"probability of B **given** A.\" The event immediately after \"given\" — A — is the one you already know, so it defines the restricted universe. That universe becomes the denominator.\n- Step 2: Think of it as: \"Out of all the times A happened (denominator = $$P(A)$$), how many times did B also happen (numerator = $$P(A \\cap B)$$)?\" The denominator must be the larger set (A) containing the smaller set (A and B together).", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_15"}, {"question": "What does it mean for the final answer of $$\\text{Var}(13X - 6)$$ to be the integer 165, and how does keeping fractions (not decimals) guarantee this clean cancellation? (3 steps)", "answer": "- Step 1: Compute $$\\text{Var}(X) = E(X^2) - (E(X))^2 = \\frac{142}{13} - \\left(\\frac{41}{13}\\right)^2 = \\frac{142 \\times 13 - 1681}{169} = \\frac{165}{169}$$.\n- Step 2: Apply the variance scaling rule: $$\\text{Var}(13X - 6) = 13^2 \\times \\text{Var}(X) = 169 \\times \\frac{165}{169}$$.\n- Step 3: The 169 cancels exactly, leaving $$\\text{Var}(13X - 6) = 165$$. This cancellation only works because $$13^2 = 169$$ matches the denominator of $$\\text{Var}(X)$$. Converting to decimals early (e.g., $$\\text{Var}(X) \\approx 0.976$$) gives $$169 \\times 0.976 = 164.9$$ — close but wrong, and a red flag that precision was lost.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_44"}, {"question": "What conceptual thread links Q1(d)'s \"between 8 and 14\" calculation to Q4(a)'s outlier-fence calculation, and how does naming this pattern help on a future paper? (3 steps)", "answer": "- Step 1: Both questions identify a NUMERICAL BOUNDARY/FENCE within or near the data, then act proportionally relative to it. Q1(d): boundaries 8 and 14 split classes, so we scale frequency proportionally by class width. Q4(a): fences $$Q_1 - 1.5\\,\\text{IQR}$$ and $$Q_3 + 1.5\\,\\text{IQR}$$ define an outlier zone, with the question asking whether a value lies beyond them.\n- Step 2: Pattern name: \"boundary-and-proportion\" — identify the fence, then either count proportional area (histograms) or test relative position (outliers).\n- Step 3: Naming the pattern lets you recognise it instantly on new papers. If you see \"between value $$a$$ and value $$b$$\" or \"is this an outlier\" or \"what proportion is below threshold $$k$$\" — same DNA, same setup.\n\nTakeaway: Two superficially different question types share one mental model — boundary identification + proportional reasoning.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_26"}, {"question": "When a total-probability equation has mixed fractions like $$\\frac{p}{8} + \\frac{1-p}{10} = 0.11$$, what is the cleanest first algebraic move, and why is it superior to working with decimals? (2 steps)", "answer": "- Step 1: Multiply both sides by the **LCM of the denominators** (here 80, since LCM(8,10) = 80). This instantly clears all fractions: $$10p + 8(1-p) = 8.8$$, giving a simple linear equation.\n- Step 2: This is superior to decimal conversion because decimal arithmetic on values like $$p/8$$ produces repeating decimals (0.125$$p$$) that accumulate rounding error. Integer arithmetic after LCM clearing is exact, fast, and avoids the slip of mis-entering a decimal.\n\nThe LCM trick is the universal opener for any tree-diagram equation with fractional branch probabilities — identify the denominators, find the LCM, multiply through.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_7"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "S1 Jan 2024 Q1(a) — When reading a histogram to find a missing frequency, what is the fundamental relationship you must use, and why? (2 steps)", "answer": "- Step 1: The fundamental relationship is that the **area of each bar** represents the frequency, not the height.\n- Step 2: This means Frequency Density (height) = Frequency / Class Width.\n+ To find a missing frequency, read the frequency density from the histogram, identify the class width, and multiply them: Frequency = Frequency Density × Class Width.\n+ For example, if a bar spans $$15 \\le h < 17$$ (width 2) and has a frequency density of 32, the frequency is $$32 \\times 2 = 64$$.\n\nHistograms represent frequency by area, so height alone is meaningless without knowing the width.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "S1 Jan 2024 Q1(b) — When estimating the median from grouped data, what is the crucial first step before applying the interpolation formula, and what common mistake must you avoid? (2 steps)", "answer": "- Step 1: Calculate the median position, which is $$n/2$$ (where $$n$$ is the total frequency), and then use **cumulative frequency** to locate which class contains this position.\n- Step 2: The common mistake to avoid is using the raw frequency of individual classes to find the median; you must accumulate the frequencies to find where the $$n/2$$-th value falls.\n+ For example, with $$n=408$$, the median position is 204. You check cumulative frequencies until you find the class where the cumulative frequency first exceeds 204.\n\nThe median class is defined by the cumulative frequency crossing the $$n/2$$ threshold, not by which individual class has the highest frequency.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": true}, {"question": "S1 Jan 2024 Q1(b) — What is the formula for linear interpolation to find the median in grouped data, and what does each term represent? (3 steps)", "answer": "- Step 1: The formula is $$\\text{Median} = L + \\frac{(n/2) - F_{<}}{f_{\\text{class}}} \\times w$$\n- Step 2: $$L$$ is the lower class boundary of the median class. $$n/2$$ is the median position. $$F_{<}$$ is the cumulative frequency of all classes *before* the median class.\n- Step 3: $$f_{\\text{class}}$$ is the frequency of the median class itself, and $$w$$ is the class width. The fraction $$\\frac{(n/2) - F_{<}}{f_{\\text{class}}}$$ represents how far through the median class the median value lies (from 0 to 1).\n\nInterpolation assumes a uniform distribution of values within the median class, so we measure how far into the class the median falls and scale it by the class width.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "S1 Jan 2024 Q1(c) — If the mean of a dataset is 13.2 and the median is 13.3, what is the direction of skew, and why? (2 steps)", "answer": "- Step 1: The data are **negatively skewed**.\n- Step 2: The intuition is that the mean is pulled in the direction of the tail. If the mean is less than the median, the tail must be on the left (lower values pulling the mean down).\n+ Positive skew: mean > median (tail on the right).\n+ Negative skew: mean < median (tail on the left).\n+ Symmetric: mean ≈ median.\n\nThe mean is dragged toward the tail; compare it to the median to determine the skew direction.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "S1 Jan 2024 Q1(d) — When a probability question asks for values \"between 8 cm and 14 cm\" but the histogram classes are $$[5,9)$$, $$[9,13)$$, and $$[13,15)$$, what assumption and calculation method must you use? (3 steps)", "answer": "- Step 1: You must assume a **uniform distribution within each class** (values are evenly spread).\n- Step 2: For classes that are partially included, calculate the fraction of the class width that falls within the target range.\n- Step 3: Multiply this fraction by the total frequency of that class to get the contributing frequency.\n+ For the class $$[5,9)$$ with frequency 32, the range $$[8,9)$$ covers $$\\frac{9-8}{9-5} = \\frac{1}{4}$$ of the class. Contributing frequency = $$\\frac{1}{4} \\times 32 = 8$$.\n+ For the class $$[13,15)$$ with frequency 120, the range $$[13,14)$$ covers $$\\frac{14-13}{15-13} = \\frac{1}{2}$$ of the class. Contributing frequency = $$\\frac{1}{2} \\times 120 = 60$$.\n\nDo not count the whole class frequency if the boundary cuts through it; scale the frequency by the proportion of the width included.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "S1 Jan 2024 Q1(d) — When selecting two items \"at random\" from a finite population without replacement, how does the denominator change on the second pick, and why? (2 steps)", "answer": "- Step 1: The denominator on the first pick is the total population $$n$$. On the second pick, the denominator drops to $$n-1$$.\n- Step 2: This happens because the first item is removed from the population, reducing the total number of available items by one.\n+ A common pitfall is writing $$(220/408)^2$$, which assumes *with replacement* (independent events).\n+ The correct calculation is $$\\frac{220}{408} \\times \\frac{219}{407}$$.\n\n\"Without replacement\" means the events are dependent; the denominator must decrease to reflect the shrinking population.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "S1 Jan 2024 Q2(a)(ii) — In Edexcel S1, when calculating standard deviation from summary statistics like $$S_{xx}$$, which formula is used, and how does it differ from the sample standard deviation? (2 steps)", "answer": "- Step 1: Edexcel S1 uses the **population** standard deviation formula: $$\\sigma_x = \\sqrt{\\frac{S_{xx}}{n}}$$\n- Step 2: This differs from the sample standard deviation $$s$$, which divides by $$n-1$$
