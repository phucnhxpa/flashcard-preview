 + (1-p) \\cdot \\frac{1}{10}$$.\n- Step 3: Solve by clearing denominators. Multiply through by 80 (the LCM of 8 and 10): $$0.11 \\times 80 = 10p + 8(1-p)$$, giving $$8.8 = 10p + 8 - 8p = 2p + 8$$, so $$2p = 0.8$$ and $$p = 0.4$$.\n\nThis is the standard \"use the tree to write a total-probability equation\" technique. The key insight is that the tree's end-points for \"Left-handed\" come from two paths, and both contribute to $$P(L)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "A student computes $$P(\\text{Y12} \\cap R) = \\frac{7}{20}$$ and writes this as their final answer to a question asking \"Given that a student is right-handed, find the probability that the student is in Year 12.\" What is wrong with this answer? (3 steps)", "answer": "- Step 1: The question asks for the **conditional** probability $$P(\\text{Y12} \\mid R)$$, not the **joint** probability $$P(\\text{Y12} \\cap R)$$. The student has computed the wrong quantity.\n- Step 2: The trigger phrase \"Given that … is right-handed\" means the conditioning event is $$R$$, and the correct formula is $$P(\\text{Y12} \\mid R) = \\frac{P(\\text{Y12} \\cap R)}{P(R)}$$. The denominator $$P(R)$$ is missing from the student's answer.\n- Step 3: Since $$P(R) < 1$$, dividing by it makes the conditional probability **larger** than the joint probability. The correct answer is $$\\frac{7/20}{89/100} = \\frac{35}{89} \\approx 0.393$$, which is larger than $$\\frac{7}{20} = 0.35$$.\n\n+ This was Phuc's exact error on Q3(d). The fix: whenever you see \"given that\", immediately write $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$ on the page before computing anything.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "When computing $$P(R)$$ for the denominator of a conditional probability, you can use two routes: (1) the complement $$1 - P(L)$$, and (2) direct calculation from the tree $$P(\\text{Y12} \\cap R) + P(\\text{Y13} \\cap R)$$. Why should you compute both? (2 steps)", "answer": "- Step 1: Computing by two independent routes provides a **cross-check**. If both routes give the same answer (e.g., both yield $$\\frac{89}{100}$$), you can be confident the arithmetic is correct. If they disagree, you've caught an error before it propagates into the conditional probability.\n- Step 2: The complement route is often faster (just $$1 - P(L) = 1 - 0.11 = 0.89$$), while the direct route requires more arithmetic (summing two products of fractions). Using the fast route as a check against the slower route is efficient error detection.\n\n+ On Q3(d), both routes give $$P(R) = \\frac{89}{100}$$. If they didn't match, you'd know to recheck your tree-diagram probabilities or your fraction arithmetic.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "The conditional probability formula is $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$. Explain intuitively why the conditioning event $$B$$ goes in the denominator. (2 steps)", "answer": "- Step 1: \"Given that $$B$$\" means we are restricting our attention to the sub-population where $$B$$ has occurred. Within this sub-population, the total probability must renormalise to 1. Dividing by $$P(B)$$ achieves this renormalisation — it scales up the probabilities so they sum to 1 within the $$B$$-world.\n- Step 2: Think of it as: out of all outcomes where $$B$$ happens (probability $$P(B)$$), what fraction also have $$A$$ happening? That fraction is $$\\frac{P(A \\cap B)}{P(B)}$$. The denominator shrinks the \"universe\" from all outcomes to just the $$B$$-outcomes.\n\n+ Analogy: if 20% of students are Y12-and-right-handed, and 89% are right-handed total, then among right-handers the fraction who are Y12 is $$\\frac{0.20}{0.89} \\approx 0.393$$ — you're zooming into the 89% and rescaling.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": true}, {"question": "For a dataset with $$n = 11$$ values, the quartile positions are given by $$\\frac{n+1}{4}$$ and $$\\frac{3(n+1)}{4}$$. Calculate these positions for $$n = 11$$ and explain what it means that they are integers. (2 steps)", "answer": "- Step 1: $$Q_1$$ position $$= \\frac{11+1}{4} = 3$$ and $$Q_3$$ position $$= \\frac{3 \\times 12}{4} = 9$$. Both are integers.\n- Step 2: When the quartile position is an integer, you take the **exact data value** at that position (the 3rd value for $$Q_1$$, the 9th value for $$Q_3$$). No interpolation between adjacent values is needed. If the position were, say, 3.5, you'd average the 3rd and 4th values.\n\n+ For $$n = 11$$ sorted data: the 3rd value is $$Q_1$$ and the 9th value is $$Q_3$$. This is one of the \"nice\" sample sizes where quartiles land exactly on data points.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "The outlier rule defines an outlier as a value above $$Q_3 + 1.5 \\times \\text{IQR}$$ or below $$Q_1 - 1.5 \\times \\text{IQR}$$. If $$Q_1 = 28$$ and $$Q_3 = 48$$, calculate the upper fence and determine whether the value 90 is an outlier. (2 steps)", "answer": "- Step 1: $$\\text{IQR} = Q_3 - Q_1 = 48 - 28 = 20$$. Upper fence $$= Q_3 + 1.5 \\times \\text{IQR} = 48 + 1.5 \\times 20 = 48 + 30 = 78$$.\n- Step 2: Since $$90 > 78$$, the value 90 lies above the upper fence and is classified as an **outlier**.\n\n+ The lower fence would be $$Q_1 - 1.5 \\times \\text{IQR} = 28 - 30 = -2$$. Any value below $$-2$$ would be a lower outlier.\n\nThe 1.5 multiplier is conventional (Tukey's rule). It corresponds roughly to about ±2.7 standard deviations in a normal distribution.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": true}, {"question": "The least squares regression line of $$s$$ on $$f$$ has slope $$b = S_{fs}/S_{ff}$$ and intercept $$a = \\bar{s} - b\\bar{f}$$. Why is the intercept calculated as $$\\bar{s} - b\\bar{f}$$ rather than read directly from the data? (2 steps)", "answer": "- Step 1: The least squares regression line must pass through the **point of means** $$(\\bar{f}, \\bar{s})$$. This is a mathematical property of the least squares criterion — the line that minimises the sum of squared residuals always goes through the centroid of the data.\n- Step 2: Since the line is $$s = a + bf$$, substituting the point of means gives $$\\bar{s} = a + b\\bar{f}$$, which rearranges to $$a = \\bar{s} - b\\bar{f}$$. This guarantees the line passes through $$(\\bar{f}, \\bar{s})$$.\n\n+ Practical implication: if you compute $$a$$ and $$b$$ separately and then check $$a + b\\bar{f}$$, it should equal $$\\bar{s}$$. If it doesn't, you've made an arithmetic error.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": true}, {"question": "A regression line is $$s = -5.72 + 1.04f$$, where $$f$$ is a French test mark and $$s$$ is a Spanish test mark. Give a contextual interpretation of the gradient 1.04. What would an interpretation like \"the gradient is 1.04\" lose marks for? (2 steps)", "answer": "- Step 1: The gradient means: **for each additional mark scored in the French test, the predicted Spanish mark increases by approximately 1.04 marks**. You must include the units (\"marks\") and the contextual variables (\"French\" and \"Spanish\").\n- Step 2: Writing just \"the gradient is 1.04\" loses marks because it doesn't demonstrate understanding of what the number means in context. The examiner wants to see that you can translate a statistical quantity into a real-world statement.\n\n+ Also avoid: \"as French increases, Spanish increases\" — this is correct but vague. The gradient quantifies **how much** (1.04 marks per mark), and that precision is what the mark scheme rewards.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "The French marks in a dataset range from 24 to 68. A student uses the regression line to predict a Spanish mark for $$f = 55$$ and another for $$f = 18$$. Which prediction is more reliable, and what single word should appear in your explanation? (3 steps)", "answer": "- Step 1: The prediction for $$f = 55$$ is more reliable because 55 lies **within** the observed data range of 24 to 68. This is called **interpolation**.\n- Step 2: The prediction for $$f = 18$$ is unreliable because 18 lies **outside** the observed data range (below 24). This is called **extrapolation**. The linear relationship established within the data range is not guaranteed to hold outside it.\n- Step 3: The required word is **\"interpolation\"** (or \"extrapolation\"). You must also state the data range ($$24 \\le f \\le 68$$) explicitly to justify which is which.\n\n+ Saying \"reliable because the data are linear\" is too vague — the examiner wants the interpolation/extrapolation distinction with the range quoted.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "A random variable $$X \\sim N(40, 4^2)$$ represents discus throw distances in metres. To find $$P(X < 38.8)$$, you standardise to get a $$z$$-value. Write down the standardisation formula and explain what it does geometrically. (2 steps)", "answer": "- Step 1: The standardisation formula is $$Z = \\frac{X - \\mu}{\\sigma} = \\frac{38.8 - 40}{4} = \\frac{-1.2}{4} = -0.30$$. This converts the raw value 38.8 into a z-score of $$-0.30$$.\n- Step 2: Geometrically, standardisation shifts the distribution so its mean becomes 0 (by subtracting $$\\mu$$) and rescales it so its standard deviation becomes 1 (by dividing by $$\\sigma$$). The result is the standard normal $$N(0,1)$$, for which we have tables of $$\\Phi(z) = P(Z < z)$$.\n\n+ Then $$P(X < 38.8) = P(Z < -0.30) = 1 - \\Phi(0.30) = 1 - 0.6179 = 0.3821$$, using the symmetry property $$P(Z < -a) = 1 - \\Phi(a)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": true}, {"question": "An athlete has 3 independent attempts to throw a discus more than 38.8 m to qualify. Once they qualify, they stop. If $$P(\\text{fail on one throw}) = 0.3821$$, what is $$P(\\text{qualifies})$$? Explain why the complement method is cleaner than listing all qualifying scenarios. (3 steps)", "answer": "- Step 1: The athlete fails to qualify only if **all 3 throws fail**. Since throws are independent, $$P(\\text{all 3 fail}) = P(\\text{fail})^3 = 0.3821^3 \\approx 0.0558$$.\n- Step 2: By the complement rule, $$P(\\text{qualifies}) = 1 - P(\\text{all 3 fail}) = 1 - 0.0558 = 0.9442$$.\n- Step 3: The alternative — listing all qualifying scenarios (succeed on throw 1, or fail-then-succeed on throw 2, or fail-fail-succeed on throw 3) — requires computing and summing three separate products. The complement method is cleaner because there's only one scenario for \"doesn't qualify\" (all three fail) versus three scenarios for \"does qualify\".\n\n+ General rule: for \"at least one success in $$n$$ independent trials\", always use $$1 - P(\\text{fail})^n$$.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "An athlete qualifies on their 2nd throw with a distance more than 44 m. Given that $$P(X < 38.8) = 0.3821$$ and $$P(X > 44) = 0.1587$$, express the event \"qualified on 2nd throw with distance > 44 m\" as a product of probabilities, assuming independent throws. (2 steps)", "answer": "- Step 1: \"Qualified on 2nd throw with > 44 m\" means: throw 1 fails ($$X_1 < 38.8$$) AND throw 2 exceeds 44 m ($$X_2 > 44$$). These are independent events across throws.\n- Step 2: $$P(\\text{throw 1 fails} \\cap \\text{throw 2} > 44) = P(\\text{fail}) \\times P(X > 44) = 0.3821 \\times 0.1587 \\approx 0.0606$$.\n\n+ Key insight: $$X > 44$$ automatically implies $$X > 38.8$$ (since 44 > 38.8). So \"throw 2 exceeds 44\" is a subset of \"throw 2 qualifies\". You don't multiply by $$P(X > 38.8)$$ separately — that would be double-counting.\n\n+ Common error: treating \"throw 2 succeeds\" and \"throw 2 > 44\" as two separate conditions to multiply. They're not independent conditions on the same throw — one implies the other.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "In Q5(b), the final answer requires $$P(\\text{2nd throw} > 44 \\mid \\text{qualifies})$$. A student computes the joint probability $$P(F_1 \\cap [X_2 > 44]) \\approx 0.0606$$ and writes this as the answer. What step is missing, and why is this the same conceptual error as in Q3(d)? (2 steps)", "answer": "- Step 1: The missing step is dividing by $$P(\\text{qualifies})$$. The \"given that they qualified\" condition requires the conditional probability formula: $$P(\\text{2nd throw} > 44 \\mid \\text{qualifies}) = \\frac{P(F_1 \\cap [X_2 > 44])}{P(\\text{qualifies})} = \\frac{0.0606}{0.9442} \\approx 0.0642$$.\n- Step 2: This is the same error as Q3(d): computing the **joint** probability $$P(A \\cap B)$$ when the question asks for the **conditional** probability $$P(A \\mid B)$$. Both questions use the trigger phrase \"given that\", and both require dividing by $$P(B)$$. The only difference is the context (Normal distribution vs tree diagram).\n\n+ The fix is identical: when you see \"given that\", write $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$ on the page before computing.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": true}, {"question": "Given $$P(A) = x$$, $$P(B) = y$$, and $$P(B \\mid A) = 0.3$$, write down an expression for $$P(A \\cap B)$$. Why is it $$0.3x$$ and not $$0.3y$$? (3 steps)", "answer": "- Step 1: The conditional probability formula rearranged gives $$P(A \\cap B) = P(B \\mid A) \\times P(A)$$. Substituting: $$P(A \\cap B) = 0.3 \\times x = 0.3x$$.\n- Step 2: It is $$0.3x$$ (not $$0.3y$$) because the conditioning event is $$A$$. The notation $$P(B \\mid A)$$ means \"probability of $$B$$ **given** $$A$$\", so you multiply by $$P(A)$$ — the probability of the event that is **given**.\n- Step 3: If the condition were $$P(A \\mid B) = 0.3$$ instead, then $$P(A \\cap B) = 0.3 \\times P(B) = 0.3y$$. The direction of conditioning determines which probability goes in the multiplier.\n\n+ Common error: writing $$P(A \\cap B) = 0.3y$$ because the 0.3 is \"about $$B$$\". But the formula is $$P(B \\mid A) \\cdot P(A)$$ — you always multiply by the probability of the event after the vertical bar.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": true}, {"question": "Given $$P(A) = x$$, $$P(B) = y$$, and $$P(A \\cup B) = 0.65$$, with $$P(A \\cap B) = 0.3x$$, use the addition rule to derive an equation in $$x$$ and $$y$$. (3 steps)", "answer": "- Step 1: The addition rule states $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$.\n- Step 2: Substitute: $$0.65 = x + y - 0.3x = 0.7x + y$$.\n- Step 3: To match the required form $$14x + 20y = 13$$, multiply through by 20: $$13 = 14x + 20y$$.\n\n+ The multiplication by 20 clears the decimals: $$0.7 \\times 20 = 14$$, $$1 \\times 20 = 20$$, $$0.65 \\times 20 = 13$$. This is a standard exam technique for \"show that\" questions — the required form often has integer coefficients.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "Events $$B$$ and $$C$$ are mutually exclusive. What does this mean for $$P(B \\cap C)$$, and how does it simplify the addition rule $$P(B \\cup C) = P(B) + P(C) - P(B \\cap C)$$? (2 steps)", "answer": "- Step 1: Mutually exclusive means $$B$$ and $$C$$ **cannot both occur**, so $$P(B \\cap C) = 0$$. There is no overlap between the events.\n- Step 2: The addition rule simplifies to $$P(B \\cup C) = P(B) + P(C)$$. You just add the probabilities — no need to subtract any intersection term because it's zero.\n\n+ Contrast with independent events: independence does NOT imply $$P(A \\cap B) = 0$$. In fact, if $$P(A) > 0$$ and $$P(B) > 0$$ and they're independent, then $$P(A \\cap B) = P(A) \\cdot P(B) > 0$$. Mutually exclusive and independent are very different concepts (except in the trivial case where one event has probability 0).", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "To test whether events $$A$$ and $$B$$ are statistically independent, you compare two quantities. What are they, and what must be true for independence? (2 steps)", "answer": "- Step 1: Compute both $$P(A) \\cdot P(B)$$ and $$P(A \\cap B)$$ separately. These are the two quantities to compare.\n- Step 2: If $$P(A \\cap B) = P(A) \\cdot P(B)$$, then $$A$$ and $$B$$ are **independent**. If they are not equal, the events are **not independent** (there is some dependence between them).\n\n+ In Q6(c): $$P(A) \\cdot P(B) = 0.5 \\times 0.3 = 0.15$$ and $$P(A \\cap B) = 0.3 \\times 0.5 = 0.15$$. Since they're equal, $$A$$ and $$B$$ are independent.\n\n+ Common error: comparing $$P(A \\cup B)$$ instead of $$P(A \\cap B)$$. The independence condition is about the intersection, not the union.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "Can two events be both mutually exclusive AND statistically independent? Explain with a numerical argument. (3 steps)", "answer": "- Step 1: If $$A$$ and $$B$$ are mutually exclusive with $$P(A) > 0$$ and $$P(B) > 0$$, then $$P(A \\cap B) = 0$$.\n- Step 2: If they were also independent, then $$P(A \\cap B) = P(A) \\cdot P(B) > 0$$ (since both probabilities are positive). This contradicts Step 1.\n- Step 3: Therefore, two events with positive probabilities **cannot** be both mutually exclusive and independent. Mutual exclusivity means they \"avoid\" each other; independence means they \"ignore\" each other. These are opposite behaviours.\n\n+ The only exception: if one event has probability 0, then both conditions hold trivially ($$P(A \\cap B) = 0 = P(A) \\cdot P(B)$$). But this is a degenerate case.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": true}, {"question": "The cumulative distribution function $$F(x)$$ of a discrete random variable $$X$$ takes values $$F(1), F(2), F(3), F(4)$$. What must be true about $$F(4)$$, and why? (2 steps)", "answer": "- Step 1: $$F(4) = 1$$. The CDF at the maximum value of $$X$$ must equal 1, because $$F(x) = P(X \\le x)$$, and at the largest possible value, all probability has been accumulated.\n- Step 2: This property is used to find unknown constants in the CDF. For example, if $$F(4) = \\frac{k+4}{8}$$, then setting $$\\frac{k+4}{8} = 1$$ gives $$k + 4 = 8$$, so $$k = 4$$.\n\n+ More generally, for any discrete RV, $$F(x_{\\max}) = 1$$ and $$F(x_{\\min-1}) = 0$$ (or equivalently, the CDF starts at 0 and ends at 1).", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": true}, {"question": "Given a CDF with values $$F(1) = \\frac{2}{26}$$, $$F(2) = \\frac{7}{26}$$, $$F(3) = \\frac{13}{26}$$, $$F(4) = \\frac{26}{26}$$, explain how to extract the probability $$P(X = 3)$$ and verify that all probabilities sum to 1. (3 steps)", "answer": "- Step 1: For a discrete RV, $$P(X = x) = F(x) - F(x-1)$$. This is because $$F(x) = P(X \\le x)$$ accumulates probability up to and including $$x$$, while $$F(x-1)$$ accumulates everything before $$x$$. The difference is exactly the probability at $$x$$.\n- Step 2: $$P(X = 3) = F(3) - F(2) = \\frac{13}{26} - \\frac{7}{26} = \\frac{6}{26}$$. Similarly: $$P(X=1) = \\frac{2}{26}$$, $$P(X=2) = \\frac{5}{26}$$, $$P(X=4) = \\frac{13}{26}$$.\n- Step 3: Check: $$\\frac{2+5+6+13}{26} = \\frac{26}{26} = 1$$. The probabilities sum to 1, confirming the CDF is valid and the extraction is correct.\n\n+ This verification step catches arithmetic errors — if the sum isn't 1, you've made a mistake in the CDF-to-PDF conversion.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": false}, {"question": "The probability distribution of $$X$$ is $$P(X=1) = \\frac{2}{26}$$, $$P(X=2) = \\frac{5}{26}$$, $$P(X=3) = \\frac{6}{26}$$, $$P(X=4) = \\frac{13}{26}$$. What is the mode, and how is it identified? (2 steps)", "answer": "- Step 1: The mode is the value of $$x$$ with the **largest probability**. Comparing: $$\\frac{2}{26} < \\frac{5}{26} < \\frac{6}{26} < \\frac{13}{26}$$.\n- Step 2: The largest probability is $$\\frac{13}{26}$$ at $$x = 4$$, so the **mode is 4**.\n\n+ For a discrete RV, the mode is simply the most probable value. Unlike continuous distributions (where you look for peaks in the density), here you just read off the largest probability in the table.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": false}, {"question": "State the formula $$\\operatorname{Var}(aX + b)$$ in terms of $$\\operatorname{Var}(X)$$, $$a$$, and $$b$$. Then explain why the constant $$b$$ disappears and why $$a$$ is squared. (3 steps)", "answer": "- Step 1: $$\\operatorname{Var}(aX + b) = a^2 \\operatorname{Var}(X)$$. The constant $$b$$ does not appear, and the multiplier $$a$$ is squared.\n- Step 2: Why $$b$$ disappears: variance measures **spread** (how far values are from the mean). Adding a constant $$b$$ shifts every value by the same amount, including the mean. The deviations from the mean $$(aX + b) - (a\\mu + b) = a(X - \\mu)$$ don't change — the $$b$$ cancels out. Shifting doesn't change spread.\n- Step 3: Why $$a$$ is squared: multiplying by $$a$$ scales all deviations from the mean by $$a$$. Variance is the average of squared deviations, so the scaling factor gets squared: $$\\operatorname{Var}(aX) = E[(aX - a\\mu)^2] = E[a^2(X-\\mu)^2] = a^2 E[(X-\\mu)^2] = a^2 \\operatorname{Var}(X)$$.\n\n+ For Q7(d): $$\\operatorname{Var}(13X - 6) = 13^2 \\operatorname{Var}(X) = 169 \\times \\frac{165}{169} = 165$$. The $$-6$$ vanishes and the 169 cancels beautifully.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "A student computes $$\\operatorname{Var}(13X - 6) = 13 \\operatorname{Var}(X) - 6$$. Identify both errors in this calculation. (2 steps)", "answer": "- Step 1: First error: the multiplier should be **squared**. It should be $$13^2 = 169$$, not 13. Variance scales by the square of the multiplier because it involves squared deviations.\n- Step 2: Second error: the constant $$-6$$ should **not appear at all**. Adding a constant does not change the spread of the distribution, so it drops out of the variance formula entirely.\n\n+ The correct formula is $$\\operatorname{Var}(aX + b) = a^2 \\operatorname{Var}(X)$$. Neither the sign of $$b$$ nor its magnitude matters for variance.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": true}, {"question": "When computing $$\\operatorname{Var}(X) = E(X^2) - (E(X))^2$$ for a discrete RV with fractional probabilities, why is it better to keep everything as fractions rather than converting to decimals? (2 steps)", "answer": "- Step 1: Keeping fractions preserves **exact values** throughout the calculation. Decimals introduce rounding errors at each step, which accumulate and can change the final answer, especially when you're subtracting two similar large numbers.\n- Step 2: In Q7(d), computing with fractions gives $$\\operatorname{Var}(X) = \\frac{165}{169}$$ and then $$\\operatorname{Var}(13X-6) = 169 \\times \\frac{165}{169} = 165$$ — the 169s cancel cleanly to give an integer. If you'd used decimals ($$\\operatorname{Var}(X) \\approx 0.9763$$), you'd get $$169 \\times 0.9763 \\approx 164.99$$, which you might round to 165 but might also mistrust.\n\n+ Rule of thumb: if the answer is a nice number (integer or simple fraction), working in fractions will get you there cleanly; working in decimals will get you close but may require suspicious rounding.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": false}, {"question": "For a normal distribution, the probability of a symmetric interval is $$P(\\mu - 2k < X < \\mu + 2k) = 0.6$$. Explain how to convert this two-tail probability into a form suitable for looking up in the standard normal table. (3 steps)", "answer": "- Step 1: By symmetry of the normal distribution, $$P(\\mu - 2k < X < \\mu + 2k) = P(-z < Z < z)$$ where $$z = 2k/\\sigma$$. This symmetric probability equals the central area under the standard normal curve.\n- Step 2: By symmetry, $$P(-z < Z < z) = 2\\Phi(z) - 1$$. The area from $$-z$$ to $$z$$ is twice the area from 0 to $$z$$, minus the overlap at the centre. Setting this equal to 0.6: $$2\\Phi(z) - 1 = 0.6$$, so $$\\Phi(z) = 0.8$$.\n- Step 3: Now look up the inverse: $$\\Phi^{-1}(0.8) = 0.8416$$. This gives $$z = 0.8416$$, from which you can solve for $$k$$.\n\n+ Common error: looking up $$\\Phi^{-1}(0.6) = 0.2533$$ directly. This would be correct if the probability were one-tailed (0.6 to the left), but the interval is symmetric (0.6 in the centre), so you must convert to $$\\Phi(z) = (1+0.6)/2 = 0.8$$ first.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": false}, {"question": "The general formula for converting a symmetric central probability to a one-tail probability is $$\\Phi(z) = \\frac{1+c}{2}$$ where $$c = P(|Z| < z)$$. Derive this from the symmetry property of the normal distribution. (3 steps)", "answer": "- Step 1: The symmetric probability $$P(|Z| < z) = P(-z < Z < z)$$ can be split as $$P(Z < z) - P(Z < -z) = \\Phi(z) - \\Phi(-z)$$.\n- Step 2: By symmetry, $$\\Phi(-z) = 1 - \\Phi(z)$$, so $$P(|Z| < z) = \\Phi(z) - (1 - \\Phi(z)) = 2\\Phi(z) - 1$$.\n- Step 3: Setting $$c = 2\\Phi(z) - 1$$ and solving for $$\\Phi(z)$$: $$\\Phi(z) = \\frac{c+1}{2}$$. This is the conversion formula.\n\n+ Quick mental check: if $$c = 0.6$$, then $$\\Phi(z) = 0.8$$. If $$c = 0.95$$, then $$\\Phi(z) = 0.975$$, giving $$z = 1.96$$. The formula always converts a central probability to the corresponding right-tail cumulative.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": true}, {"question": "A random variable $$Y \\sim N(\\mu, \\sigma^2)$$ satisfies $$P(Y > \\frac{3}{2}\\mu) = 0.0668$$ and $$2\\mu = 3\\sigma^2$$. Describe the strategy for finding $$\\mu$$ and $$\\sigma$$ — how many equations do you need, and where does each come from? (3 steps)", "answer": "- Step 1: You need **two equations** in two unknowns ($$\\mu$$ and $$\\sigma$$). One comes from the probability condition, the other from the algebraic relation $$2\\mu = 3\\sigma^2$$.\n- Step 2: From the probability condition: standardise $$P(Y > \\frac{3}{2}\\mu) = 0.0668$$ to get $$P(Z > \\frac{\\mu/2}{\\sigma}) = 0.0668$$, hence $$\\Phi(\\frac{\\mu}{2\\sigma}) = 0.9332$$, giving $$\\frac{\\mu}{2\\sigma} = 1.5$$, i.e., $$\\mu = 3\\sigma$$. This is equation 1.\n- Step 3: Substitute $$\\mu = 3\\sigma$$ into $$2\\mu = 3\\sigma^2$$: $$6\\sigma = 3\\sigma^2$$, giving $$3\\sigma(\\sigma - 2) = 0$$. Since $$\\sigma > 0$$, we get $$\\sigma = 2$$ and then $$\\mu = 6$$.\n\n+ The key insight: the probability condition, after standardisation, gives a **linear** relation between $$\\mu$$ and $$\\sigma$$ (namely $$\\mu = 3\\sigma$$). The algebraic condition gives a **quadratic** relation. Substituting the linear into the quadratic yields a simple equation.", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": true}, {"question": "When solving $$3\\sigma(\\sigma - 2) = 0$$, you get $$\\sigma = 0$$ or $$\\sigma = 2$$. Why must you reject $$\\sigma = 0$$, and what should you write on the exam paper? (2 steps)", "answer": "- Step 1: $$\\sigma = 0$$ means the standard deviation is zero, which implies the random variable is a constant (no variability at all). This contradicts the premise that $$Y$$ is normally distributed — a normal distribution with $$\\sigma = 0$$ is degenerate and not a valid probability distribution.\n- Step 2: On the exam, write: \"$$\\sigma > 0$$, so $$\\sigma = 0$$ is rejected, giving $$\\sigma = 2$$.\" This one-line justification shows the examiner you understand that standard deviations must be positive.\n\n+ Similar rejections apply to: negative probabilities, $$|r| > 1$$, and negative variances. Always check that your solutions are physically meaningful.", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": true}, {"question": "A question states that the variance of $$X$$ is 36. What is the standard deviation, and what common mistake do students make when substituting into the standardisation formula? (2 steps)", "answer": "- Step 1: The standard deviation is $$\\sigma = \\sqrt{36} = 6$$. Variance and standard deviation are different quantities: variance is in squared units, standard deviation is in the original units.\n- Step 2: The common mistake is substituting 36 directly into the standardisation formula $$Z = (X - \\mu)/\\sigma$$, using $$\\sigma = 36$$ instead of $$\\sigma = 6$$. This would give a z-value that's 6 times too small.\n\n+ Always check: if the question gives \"variance\" (or $$\\sigma^2$$), take the square root before standardising. If it gives \"standard deviation\" (or $$\\sigma$$), use it directly.", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": false}, {"question": "You encounter the phrase \"given that\" in an exam question. What single action should you take immediately before doing any calculation? (2 steps)", "answer": "- Step 1: **Write the conditional probability formula on the page**: $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$. Identify which event is $$A$$ (what you're finding the probability of) and which is $$B$$ (the condition, the event after \"given that\").\n- Step 2: This forces you to compute both the numerator (a joint probability) and the denominator (the probability of the conditioning event) separately. It prevents the most common error: writing just the numerator as the answer.\n\n+ This habit would have saved 2 marks on Q3(d) and 2–3 marks on Q5(b) in the January 2024 paper. It is the single highest-impact exam strategy for S1.", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": true}, {"question": "A \"show that\" question asks you to show that the standard deviation is 8.57. You compute $$\\sigma = 8.5716\\ldots$$ and write \"$$\\sigma = 8.57$$\". Why might this lose marks, and what should you write instead? (2 steps)", "answer": "- Step 1: Writing just the final rounded value doesn't demonstrate the method. The examiner needs to see the intermediate steps: $$S_{xx}$$ calculation, then $$\\sigma = \\sqrt{S_{xx}/n}$$, then the unrounded value 8.5716, then the rounding to 8.57.\n- Step 2: The correct approach: show at least 3 lines — (1) $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n} = 881.667$$, (2) $$\\sigma = \\sqrt{881.667/12} = 8.5716\\ldots$$, (3) $$\\sigma = 8.57$$ (3 s.f.). The unrounded intermediate value (8.5716) justifies the 3 s.f. rounding.\n\n+ Rule: for \"show that\" questions, method marks dominate. The final answer alone usually gets 1 of 3 marks. Always quote one more decimal place than required before rounding.", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": false}, {"question": "When computing probabilities from a tree diagram, you find $$P(R)$$ by direct calculation (summing two paths) and by complement ($$1 - P(L)$$). The two answers disagree by 0.01. What should you do? (2 steps)", "answer": "- Step 1: **Recheck your arithmetic on both routes.** A discrepancy means at least one route has an error. The most likely culprits are: fraction addition errors on the direct route, or a wrong value of $$P(L)$$ on the complement route.\n- Step 2: Fix the error before proceeding. Any conditional probability $$P(A \\mid B) = P(A \\cap B)/P(B)$$ that uses the wrong $$P(B)$$ will be incorrect, and the error will propagate through the rest of the question.\n\n+ This cross-checking habit is like a free error-detection system. It takes an extra 30 seconds but can save an entire multi-part question.", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": false}, {"question": "Which of these are key $$\\Phi$$ values worth memorising for S1, and why does memorising them save time? $$\\Phi(0.5)$$, $$\\Phi(1.0)$$, $$\\Phi(1.5)$$, $$\\Phi(1.645)$$, $$\\Phi(1.96)$$, $$\\Phi(2.0)$$. (2 steps)", "answer": "- Step 1: The most frequently used values are: $$\\Phi(1.0) = 0.8413$$, $$\\Phi(1.5) = 0.9332$$, $$\\Phi(1.645) = 0.95$$, $$\\Phi(1.96) = 0.975$$. Also useful: $$\\Phi(0.84) \\approx 0.80$$ and $$\\Phi(1.28) \\approx 0.90$$.\n- Step 2: Memorising these saves ~30 seconds per Normal question because you skip the table lookup. With 2–3 Normal sub-parts per paper, that's ~90 seconds total — significant when the time budget is tight (~1.2 min/mark).\n\n+ In Q8(b), recognising that $$0.9332 = \\Phi(1.5)$$ immediately gives you $$z = 1.5$$ without searching the table. In Q5, knowing $$\\Phi(1.0) = 0.8413$$ is used in the standardisation.", "source": "GLM 5.1 ①", "_id": "glm_1_46", "judge_pick": true}, {"question": "In a regression question, you're told to ignore an outlier when computing the regression line. A student includes the outlier anyway. What goes wrong with the regression coefficients? (2 steps)", "answer": "- Step 1: Including the outlier changes $$\\bar{x}$$, $$\\bar{y}$$, $$S_{xx}$$, and $$S_{xy}$$, all of which feed into the slope $$b = S_{xy}/S_{xx}$$ and intercept $$a = \\bar{y} - b\\bar{x}$$. The outlier pulls the regression line toward itself, distorting the fit for the remaining data.\n- Step 2: In Q4, the outlier $$(30, 90)$$ has an unusually high Spanish mark for a low French mark. Including it would reduce the slope (making the line flatter) and increase the intercept, producing a line that doesn't represent the main cluster of 10 students.\n\n+ The question explicitly says \"ignoring the point $$(30, 90)$$\", so you must use $$n = 10$$ and the given summary statistics. Using $$n = 11$$ would give wrong values for $$\\bar{f}$$, $$\\bar{s}$$, and the regression coefficients.", "source": "GLM 5.1 ①", "_id": "glm_1_47", "judge_pick": false}, {"question": "The regression line $$s = -5.72 + 1.04f$$ has a negative intercept. Does this mean a student who scores 0 on the French test is predicted to get a negative Spanish mark? Is this a problem? (2 steps)", "answer": "- Step 1: Technically, plugging in $$f = 0$$ gives $$s = -5.72$$, which is indeed negative and meaningless as a test mark. However, this is not a problem because $$f = 0$$ is far outside the data range ($$24 \\le f \\le 68$$).\n- Step 2: The regression line is only valid within (or near) the observed data range. Extrapolating to $$f = 0$$ is meaningless — the linear model is not guaranteed to hold there, and the negative intercept is just an artefact of extending the line beyond the data.\n\n+ The intercept is the value of the line at $$f = 0$$, but it doesn't need to be physically meaningful. What matters is that the line fits the data within the observed range.", "source": "GLM 5.1 ①", "_id": "glm_1_48", "judge_pick": false}, {"question": "In Q5(b), the event \"throw 2 exceeds 44 m\" is a subset of \"throw 2 succeeds (exceeds 38.8 m)\". Explain why this means you should NOT multiply $$P(X_2 > 38.8) \\times P(X_2 > 44)$$ when computing the probability that throw 2 qualifies with distance > 44. (2 steps)", "answer": "- Step 1: Since 44 > 38.8, any throw exceeding 44 m automatically exceeds 38.8 m. So $$P(X > 44)$$ already implies qualification — you don't need to additionally multiply by $$P(X > 38.8)$$.\n- Step 2: Multiplying $$P(X_2 > 38.8) \\times P(X_2 > 44)$$ would be treating them as independent events on the same throw, but they're not independent — they're **nested** (one implies the other). The correct probability for \"throw 2 qualifies AND exceeds 44 m\" is simply $$P(X_2 > 44) = 0.1587$$.\n\n+ The only multiplication is across **different throws** (throw 1 fails, throw 2 > 44), which are independent. Within a single throw, you don't multiply nested conditions.", "source": "GLM 5.1 ①", "_id": "glm_1_49", "judge_pick": false}, {"question": "A student is asked to compute $$P(A \\mid B)$$ and writes $$P(B \\mid A) = P(A \\cap B)/P(A)$$. They've inverted the formula. What is the correct formula, and how can you remember which event goes in the denominator? (2 steps)", "answer": "- Step 1: The correct formula is $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$. The **conditioning event** (the one after the vertical bar, i.e., $$B$$) goes in the denominator.\n- Step 2: Memory aid: \"given that $$B$$\" means you're restricting to the world where $$B$$ has happened. The denominator $$P(B)$$ is the \"size\" of that world. You're computing what fraction of the $$B$$-world also has $$A$$, which is $$P(A \\cap B)/P(B)$$.\n\n+ Quick check: $$P(A \\mid B)$$ should always be $$\\ge P(A \\cap B)$$ because you're dividing by a number $$\\le 1$$. If your answer is smaller than the joint probability, you've put the wrong event in the denominator.", "source": "GLM 5.1 ①", "_id": "glm_1_50", "judge_pick": true}, {"question": "In Q6, the second equation comes from $$P(B \\cup C) = 0.85$$ with $$B$$ and $$C$$ mutually exclusive and $$P(C) = \\frac{1}{2}x + y$$. Write down the equation and explain the role of mutual exclusivity. (2 steps)", "answer": "- Step 1: Since $$B$$ and $$C$$ are mutually exclusive, $$P(B \\cap C) = 0$$, so $$P(B \\cup C) = P(B) + P(C) = y + (\\frac{1}{2}x + y) = \\frac{1}{2}x + 2y$$.\n- Step 2: Setting this equal to 0.85: $$\\frac{1}{2}x + 2y = 0.85$$, or equivalently $$x + 4y = 1.7$$. This is the second equation in $$x$$ and $$y$$, which you solve simultaneously with the first equation $$14x + 20y = 13$$.\n\n+ Without mutual exclusivity, you'd need $$P(B \\cup C) = P(B) + P(C) - P(B \\cap C)$$, and you'd need to know or compute $$P(B \\cap C)$$. Mutual exclusivity simplifies this by making the intersection zero.", "source": "GLM 5.1 ①", "_id": "glm_1_51", "judge_pick": false}, {"question": "Solve the simultaneous equations $$14x + 20y = 13$$ and $$5x + 20y = 8.5$$ by elimination. What makes elimination cleaner than substitution here? (3 steps)", "answer": "- Step 1: Both equations have the same $$20y$$ term. Subtract the second from the first: $$(14x - 5x) + (20y - 20y) = 13 - 8.5$$, giving $$9x = 4.5$$, so $$x = 0.5$$.\n- Step 2: Substitute into the simpler equation $$x + 4y = 1.7$$: $$0.5 + 4y = 1.7$$, so $$4y = 1.2$$, giving $$y = 0.3$$.\n- Step 3: Elimination is cleaner here because the $$20y$$ terms cancel immediately — no fractions are introduced. Substitution would require expressing $$y$$ in terms of $$x$$ from one equation and substituting into the other, which is more error-prone with decimals.\n\n+ Always check: $$14(0.5) + 20(0.3) = 7 + 6 = 13$$ ✓ and $$5(0.5) + 20(0.3) = 2.5 + 6 = 8.5$$ ✓.", "source": "GLM 5.1 ①", "_id": "glm_1_52", "judge_pick": false}, {"question": "In Q6(c), you test whether $$A$$ and $$B$$ are independent. You find $$P(A) \\cdot P(B) = 0.15$$ and $$P(A \\cap B) = 0.15$$. Is it enough to just say \"yes, they're independent\"? (2 steps)", "answer": "- Step 1: Not quite — you should show the **computation of both quantities explicitly** before stating the conclusion. Write: $$P(A) \\cdot P(B) = 0.5 \\times 0.3 = 0.15$$ and $$P(A \\cap B) = 0.3 \\times 0.5 = 0.15$$.\n- Step 2: Then state: \"Since $$P(A \\cap B) = P(A) \\cdot P(B) = 0.15$$, events $$A$$ and $$B$$ are statistically independent.\" The conclusion must be in words and reference the equality.\n\n+ If the two quantities were not equal, you'd write: \"Since $$P(A \\cap B) \\ne P(A) \\cdot P(B)$$, events $$A$$ and $$B$$ are not independent.\" Always show both sides numerically.", "source": "GLM 5.1 ①", "_id": "glm_1_53", "judge_pick": false}, {"question": "A histogram has classes $$[5,9)$$, $$[9,13)$$, $$[13,15)$$, $$[15,17)$$, $$[17,25)$$ with frequencies 32, 152, 120, 64, 40. Estimate how many observations fall in the range $$[8, 14)$$. Walk through which classes contribute and how. (3 steps)", "answer": "- Step 1: The range $$[8, 14)$$ overlaps with parts of three classes: $$[5,9)$$ (only the subrange $$[8,9)$$), all of $$[9,13)$$, and $$[13,15)$$ (only the subrange $$[13,14)$$).\n- Step 2: Using uniform distribution within each class:\n  + From $$[5,9)$$: $$\\frac{9-8}{9-5} \\times 32 = \\frac{1}{4} \\times 32 = 8$$\n  + From $$[9,13)$$: all 152 observations (the entire class is within the range)\n  + From $$[13,15)$$: $$\\frac{14-13}{15-13} \\times 120 = \\frac{1}{2} \\times 120 = 60$$\n- Step 3: Total in $$[8, 14)$$: $$8 + 152 + 60 = 220$$.\n\n+ The key insight: both boundaries (8 and 14) cut through the middle of classes. You must split proportionally — you can't just use whole-class frequencies.", "source": "GLM 5.1 ①", "_id": "glm_1_54", "judge_pick": false}, {"question": "The coding rule for variance is $$\\operatorname{Var}(aX + b) = a^2 \\operatorname{Var}(X)$$. How does this connect to the coding rule for standard deviation $$\\sigma_{aX+b} = |a| \\sigma_X$$? (2 steps)", "answer": "- Step 1: Since variance is the square of the standard deviation ($$\\operatorname{Var} = \\sigma^2$$), the variance rule follows from the s.d. rule by squaring: if $$\\sigma_{aX+b} = |a| \\sigma_X$$, then $$\\operatorname{Var}(aX+b) = (|a| \\sigma_X)^2 = a^2 \\operatorname{Var}(X)$$.\n- Step 2: Both rules encode the same principle: additive shifts don't affect spread, and multiplicative scaling affects spread proportionally (linearly for s.d., quadratically for variance). The variance rule is just the s.d. rule squared.\n\n+ In Q2(c), the s.d. rule gives $$\\sigma_c = \\frac{5}{9} \\sigma_f$$. In Q7(d), the variance rule gives $$\\operatorname{Var}(13X-6) = 169 \\operatorname{Var}(X)$$. Same principle, different measure of spread.", "source": "GLM 5.1 ①", "_id": "glm_1_55", "judge_pick": false}, {"question": "A student sees $$P(Y > \\frac{3}{2}\\mu) = 0.0668$$ and recognises that $$0.0668 = 1 - 0.9332 = 1 - \\Phi(1.5)$$. They then write $$\\frac{3\\mu/2 - \\mu}{\\sigma} = 1.5$$. Simplify the left side and solve for the relationship between $$\\mu$$ and $$\\sigma$$. (3 steps)", "answer": "- Step 1: The numerator is $$\\frac{3}{2}\\mu - \\mu = \\frac{\\mu}{2}$$. So the standardised expression is $$\\frac{\\mu/2}{\\sigma} = \\frac{\\mu}{2\\sigma}$$.\n- Step 2: Setting $$\\frac{\\mu}{2\\sigma} = 1.5$$ and solving: $$\\mu = 1.5 \\times 2\\sigma = 3\\sigma$$. This is the linear relation between $$\\mu$$ and $$\\sigma$$.\n- Step 3: Combined with $$2\\mu = 3\\sigma^2$$: substitute $$\\mu = 3\\sigma$$ to get $$2(3\\sigma) = 3\\sigma^2$$, i.e., $$6\\sigma = 3\\sigma^2$$, giving $$\\sigma = 2$$ (rejecting $$\\sigma = 0$$) and $$\\mu = 6$$.\n\n+ The recognition that $$0.0668 = 1 - \\Phi(1.5)$$ is where memorising $$\\Phi(1.5) = 0.9332$$ pays off. Without it, you'd need to look up the inverse normal value.", "source": "GLM 5.1 ①", "_id": "glm_1_56", "judge_pick": true}, {"question": "In a \"without replacement\" probability question, a student writes $$P(\\text{both in range}) = \\left(\\frac{220}{408}\\right)^2$$. What assumption does this make, and why is it wrong? (2 steps)", "answer": "- Step 1: This formula assumes **with replacement** — that the probability is the same on both draws. Squaring a single probability only works if the two events are independent and identically distributed.\n- Step 2: \"Without replacement\" means the first draw changes the composition of the population. After drawing one favourable item, there are 219 favourable items left out of 407 total, not 220 out of 408. The correct calculation is $$\\frac{220}{408} \\times \\frac{219}{407}$$.\n\n+ Quick check: $$\\left(\\frac{220}{408}\\right)^2 \\approx 0.2907$$ vs $$\\frac{220}{408} \\times \\frac{219}{407} \\approx 0.2901$$. The difference is small here because the population is large (408), but for smaller populations the error would be significant, and the mark scheme requires the correct method.", "source": "GLM 5.1 ①", "_id": "glm_1_57", "judge_pick": false}, {"question": "You compute $$E(X) = \\frac{82}{26}$$ and $$E(X^2) = \\frac{284}{26}$$ for a discrete RV. To find $$\\operatorname{Var}(X)$$, a student writes $$\\operatorname{Var}(X) = \\frac{284}{26} - \\left(\\frac{82}{26}\\right)^2$$. Show the algebra that leads to a clean fraction. (3 steps)", "answer": "- Step 1: Simplify: $$E(X) = \\frac{82}{26} = \\frac{41}{13}$$ and $$E(X^2) = \\frac{284}{26} = \\frac{142}{13}$$.\n- Step 2: $$\\operatorname{Var}(X) = \\frac{142}{13} - \\left(\\frac{41}{13}\\right)^2 = \\frac{142}{13} - \\frac{1681}{169}$$. Get a common denominator of 169: $$\\frac{142 \\times 13}{169} - \\frac{1681}{169} = \\frac{1846 - 1681}{169} = \\frac{165}{169}$$.\n- Step 3: Then $$\\operatorname{Var}(13X - 6) = 169 \\times \\frac{165}{169} = 165$$. The 169 cancels perfectly because $$169 = 13^2$$, which is the denominator of $$\\operatorname{Var}(X)$$.\n\n+ This beautiful cancellation only works if you keep fractions. Converting to decimals early gives $$\\operatorname{Var}(X) \\approx 0.9763$$ and $$169 \\times 0.9763 \\approx 164.99$$, which is messier and less obviously correct.", "source": "GLM 5.1 ①", "_id": "glm_1_58", "judge_pick": true}, {"question": "For the regression line $$s = a + bf$$, you compute $$b = 1.04$$ and $$\\bar{f} = 42.2$$, $$\\bar{s} = 38.2$$. Calculate the intercept $$a$$ and explain why it's negative. (2 steps)", "answer": "- Step 1: $$a = \\bar{s} - b\\bar{f} = 38.2 - 1.04 \\times 42.2 = 38.2 - 43.888 = -5.688 \\approx -5.72$$ (3 s.f.).\n- Step 2: The intercept is negative because $$b\\bar{f} > \\bar{s}$$: the slope times the mean of $$f$$ (1.04 × 42.2 ≈ 43.9) exceeds the mean of $$s$$ (38.2). Geometrically, the regression line passes through $$(\\bar{f}, \\bar{s}) = (42.2, 38.2)$$ with a positive slope, so extending it leftward to $$f = 0$$ takes it below zero.\n\n+ A negative intercept is not an error — it just means the line, if extended to $$f = 0$$, would predict a negative Spanish mark. Since $$f = 0$$ is outside the data range, this is extrapolation and not a concern.", "source": "GLM 5.1 ①", "_id": "glm_1_59", "judge_pick": true}, {"question": "A question asks you to \"describe the skew\" of a dataset. You write \"negative\" and get 0 out of 1 mark. Why? (2 steps)", "answer": "- Step 1: The mark scheme requires you to state **both** the direction of skew **and** the numerical evidence supporting it. Just writing \"negative\" is a bare assertion with no justification.\n- Step 2: The correct answer is: \"Negatively skewed, because mean (13.2) < median (13.3).\" The comparison of mean and median is the evidence; the direction is the conclusion. Both are required.\n\n+ This is a recurring pattern in S1: 1-mark \"give a reason\" questions require a complete statement (conclusion + evidence), not just one or the other.", "source": "GLM 5.1 ①", "_id": "glm_1_60", "judge_pick": true}, {"question": "A student computes $$P(\\text{2nd throw} > 44 \\mid \\text{qualifies})$$ and includes throw 3 in their calculation, reasoning that the athlete has 3 attempts. Why is throw 3 irrelevant to this specific question? (2 steps)", "answer": "- Step 1: The question asks for the probability that the athlete qualified **on their second throw** with a distance > 44 m. This means throw 1 failed AND throw 2 exceeded 44 m. The sequence stops at throw 2 because the athlete has already qualified.\n- Step 2: Throw 3 is never reached in this scenario. The condition \"qualified on the second throw\" explicitly means throws 1 and 2 determined the outcome. Including throw 3 would be calculating a different event (e.g., \"qualified by throw 2 or throw 3\"), which is not what was asked.\n\n+ The phrase \"once they qualify, they do not use any remaining attempts\" confirms that the process stops at the first successful throw. For \"qualified on throw 2\", only throws 1 and 2 matter.", "source": "GLM 5.1 ①", "_id": "glm_1_61", "judge_pick": false}, {"question": "Simple exercise: A histogram class $$[10, 20)$$ has frequency density 3. What is the frequency, and how many observations fall in the subrange $$[10, 15)$$? (2 steps)", "answer": "- Step 1: Frequency $$= \\text{fd} \\times \\text{width} = 3 \\times (20 - 10) = 3 \\times 10 = 30$$.\n- Step 2: The subrange $$[10, 15)$$ covers half the class width, so it contains $$\\frac{5}{10} \\times 30 = 15$$ observations (assuming uniform distribution within the class).\n\nThis is the fundamental histogram calculation: area = frequency, and proportional splitting for subranges.", "source": "GLM 5.1 ①", "_id": "glm_1_62", "judge_pick": true}, {"question": "Simple exercise: If $$X \\sim N(50, 10^2)$$, find the z-value for $$x = 65$$ and state whether this is an unusually high or low value. (2 steps)", "answer": "- Step 1: $$z = \\frac{65 - 50}{10} = \\frac{15}{10} = 1.5$$. The value 65 is 1.5 standard deviations above the mean.\n- Step 2: Since $$z = 1.5 > 0$$, this is an **unusually high** value (though not extreme — only about 6.7% of values exceed it, since $$P(Z > 1.5) = 1 - 0.9332 = 0.0668$$).\n\nThe z-score tells you both the direction (positive = above mean, negative = below) and the extremity (larger $$|z|$$ = more unusual).", "source": "GLM 5.1 ①", "_id": "glm_1_63", "judge_pick": false}, {"question": "Simple exercise: If $$\\operatorname{Var}(X) = 4$$, find $$\\operatorname{Var}(3X + 7)$$. Walk through the rule. (2 steps)", "answer": "- Step 1: Apply the variance scaling rule: $$\\operatorname{Var}(aX + b) = a^2 \\operatorname{Var}(X)$$. Here $$a = 3$$ and $$b = 7$$.\n- Step 2: $$\\operatorname{Var}(3X + 7) = 3^2 \\times \\operatorname{Var}(X) = 9 \\times 4 = 36$$. The $$+7$$ disappears (additive constants don't affect spread) and the 3 is squared (because variance involves squared deviations).\n\nQuick sanity check: the standard deviation of $$3X + 7$$ is $$3 \\times 2 = 6$$, and $$6^2 = 36$$. Consistent.", "source": "GLM 5.1 ①", "_id": "glm_1_64", "judge_pick": false}, {"question": "Simple exercise: Events $$A$$ and $$B$$ satisfy $$P(A) = 0.4$$, $$P(B) = 0.5$$, and $$P(A \\cap B) = 0.2$$. Are $$A$$ and $$B$$ independent? Show the test. (2 steps)", "answer": "- Step 1: Compute $$P(A) \\cdot P(B) = 0.4 \\times 0.5 = 0.20$$.\n- Step 2: Compare with $$P(A \\cap B) = 0.2$$. Since $$0.20 = 0.20$$, we have $$P(A \\cap B) = P(A) \\cdot P(B)$$, so $$A$$ and $$B$$ **are independent**.\n\nNote: they are independent despite having non-trivial overlap. Independence does not mean \"no overlap\" — it means the overlap is exactly what you'd expect if the events didn't influence each other.", "source": "GLM 5.1 ①", "_id": "glm_1_65", "judge_pick": false}, {"question": "Simple exercise: For a sorted dataset of 7 values, find the positions of $$Q_1$$ and $$Q_3$$. (2 steps)", "answer": "- Step 1: $$Q_1$$ position $$= \\frac{n+1}{4} = \\frac{8}{4} = 2$$. So $$Q_1$$ is the 2nd value in the sorted list.\n- Step 2: $$Q_3$$ position $$= \\frac{3(n+1)}{4} = \\frac{24}{4} = 6$$. So $$Q_3$$ is the 6th value in the sorted list.\n\nFor $$n = 7$$, both positions are integers — no interpolation needed. If $$n$$ were 8, the positions would be 2.25 and 6.75, requiring interpolation between adjacent values.", "source": "GLM 5.1 ①", "_id": "glm_1_66", "judge_pick": false}, {"question": "Simple exercise: Data in °F has mean 98.6 and s.d. 2.0. Convert to °C using $$c = \\frac{5}{9}(f - 32)$$. Find the mean and s.d. in °C. (2 steps)", "answer": "- Step 1: Mean in °C: $$\\bar{c} = \\frac{5}{9}(98.6 - 32) = \\frac{5}{9} \\times 66.6 = 37.0$$ °C. The additive shift ($$-32$$) and multiplicative scaling ($$\\times 5/9$$) both apply to the mean.\n- Step 2: S.d. in °C: $$\\sigma_c = \\frac{5}{9} \\times 2.0 = 1.11$$ °C. Only the multiplicative factor applies — the $$-32$$ is an additive shift and does not change the spread.\n\nThe mean shifts and scales; the s.d. only scales. This is the coding rule in action.", "source": "GLM 5.1 ①", "_id": "glm_1_67", "judge_pick": false}, {"question": "Simple exercise: $$P(|Z| < z) = 0.5$$. Find $$\\Phi(z)$$ and then find $$z$$. (2 steps)", "answer": "- Step 1: Convert using $$\\Phi(z) = \\frac{1 + c}{2} = \\frac{1 + 0.5}{2} = 0.75$$.\n- Step 2: From the standard normal table, $$\\Phi^{-1}(0.75) \\approx 0.6745$$. So $$z \\approx 0.675$$.\n\nThis means the central 50% of a normal distribution lies within approximately 0.675 standard deviations of the mean — this is the basis of the interquartile range for a normal distribution ($$\\text{IQR} \\approx 1.35\\sigma$$).", "source": "GLM 5.1 ①", "_id": "glm_1_68", "judge_pick": false}, {"question": "A student is asked to interpret a PMCC of $$r = 0.849$$ and writes \"there is strong correlation.\" What two things are missing from this answer for full marks? (2 steps)", "answer": "- Step 1: The direction is missing — it should be \"strong **positive** correlation\" since $$r > 0$$. A value of $$-0.849$$ would indicate strong **negative** correlation, which is a very different relationship.\n- Step 2: The context is missing — it should reference the variables. For example: \"there is strong positive correlation between the average minimum and maximum monthly temperatures.\" Without context, the answer could apply to any dataset.\n\n+ Also: $$r = 0.849$$ is \"strong\" but not \"very strong\" — values above 0.9 are typically described as very strong. The classification is somewhat subjective, but the direction and context are not.", "source": "GLM 5.1 ①", "_id": "glm_1_69", "judge_pick": false}], "count": 70}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "On a histogram, the y-axis is labelled \"frequency density\". What is the relationship between frequency density, frequency, and class width? What visual property of a bar represents the frequency? (2 steps)", "answer": "- Step 1: Frequency density (fd) is defined as $$\\text{fd} = \\frac{\\text{frequency}}{\\text{class width}}$$. Rearranging gives $$\\text{frequency} = \\text{fd} \\times \\text{class width}$$.\n- Step 2: Since a histogram bar has height = frequency density and width = class width, the **area** of the bar (height × width = fd × width) equals the frequency. This is the fundamental histogram principle: area ∝ frequency.\n\nThis is why classes with different widths can still be visually compared — a tall narrow bar and a short wide bar can represent the same frequency.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "A histogram shows frequency density = 32 for the class $$15 \\le h < 17$$ and frequency density = 5 for the class $$17 \\le h < 25$$. How do you recover the frequency for each class? (2 steps)", "answer": "- Step 1: Identify the class width for each. For $$15 \\le h < 17$$: width = $$17 - 15 = 2$$. For $$17 \\le h < 25$$: width = $$25 - 17 = 8$$.\n- Step 2: Multiply frequency density by class width. $$15 \\le h < 17$$: freq = $$32 \\times 2 = 64$$. $$17 \\le h < 25$$: freq = $$5 \\times 8 = 40$$.\n\nThe class $$17 \\le h < 25$$ has a lower bar height but a wider base — its area (40) is still meaningful. Never read frequency directly from the y-axis unless all class widths are equal.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "You have a grouped frequency table with 5 classes whose frequencies are 32, 152, 120, 64, and 40. Why should you always compute the total, and what does a mismatch indicate? (2 steps)", "answer": "- Step 1: Sum the frequencies: $$32 + 152 + 120 + 64 + 40 = 408$$. Compare this to the stated total ($$n = 408$$).\n- Step 2: A mismatch means at least one frequency was read incorrectly from the histogram — likely a frequency density was mistaken for a frequency, or a class width was miscalculated. This sanity check catches the most common histogram error before you propagate wrong values through median, skew, and probability calculations.\n\nAlways do this check immediately after filling in the table — it costs 10 seconds and can save an entire question.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "To estimate the median from grouped data with $$n = 408$$, you first need the median position and the cumulative frequencies. If the cumulative frequencies are 32, 184, 304, 368, 408, which class contains the median, and why? (2 steps)", "answer": "- Step 1: The median position is at $$n/2 = 408/2 = 204$$. This means the 204th value (when data are ordered) is the median.\n- Step 2: Scan the cumulative frequencies for where 204 falls. The second class reaches 184 (too small), and the third class reaches 304 (contains 204). Since $$184 < 204 \\le 304$$, the median lies in the class $$13 \\le h < 15$$.\n\nDon't use raw frequency (120) to decide — always use cumulative frequency. The raw frequency tells you how many values are in the class, not where the median position falls.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "The median lies in the class $$13 \\le h < 15$$, which has frequency 120 and a lower bound of 13. The cumulative frequency before this class is 184, and $$n/2 = 204$$. State the median interpolation formula and explain what each term represents physically. (3 steps)", "answer": "- Step 1: The formula is $$\\text{Median} = L + \\frac{(n/2) - F_{<}}{f_{\\text{class}}} \\times w$$, where $$L$$ is the lower class boundary, $$F_{<}$$ is the cumulative frequency below this class, $$f_{\\text{class}}$$ is the frequency of the median class, and $$w$$ is the class width.\n- Step 2: Substitute: $$L = 13$$, $$F_{<} = 184$$, $$f_{\\text{class}} = 120$$, $$w = 2$$. The fraction $$\\frac{204 - 184}{120} = \\frac{20}{120} = \\frac{1}{6}$$ tells you how far through the class the median value lies (one-sixth of the way).\n- Step 3: $$\\text{Median} = 13 + \\frac{1}{6} \\times 2 = 13 + \\frac{1}{3} \\approx 13.33$$. The assumption is that values are uniformly distributed within the class — so one-sixth of the values correspond to one-sixth of the class width.\n\nThis uniform-within-class assumption is the same one used when splitting partial classes in probability questions.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": true}, {"question": "The mean of a dataset is 13.2 and the median is approximately 13.3. What does this tell you about the skew, and why? What would the opposite case look like? (2 steps)", "answer": "- Step 1: Since mean (13.2) < median (13.3), the distribution is **negatively skewed** (left-skewed). The mean is pulled toward the tail — a few unusually low values drag the mean down below the median.\n- Step 2: In the opposite case (mean > median), the distribution would be positively skewed (right-skewed) — a few unusually high values pull the mean up. If mean ≈ median, the distribution is roughly symmetric.\n\nThe exam requires you to state BOTH the direction AND the comparison. Writing \"negative skew\" alone loses the reason mark — you must write \"mean < median, therefore negative skew.\"", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "A question asks for the probability that a randomly chosen plant has height \"between 8 cm and 14 cm,\" but the class boundaries are $$[5,9)$$, $$[9,13)$$, $$[13,15)$$. Why can't you simply read off whole-class frequencies, and what assumption allows you to proceed? (3 steps)", "answer": "- Step 1: The boundaries 8 and 14 cut through the middle of classes $$[5,9)$$ and $$[13,15)$$. Neither 8 nor 14 is a class boundary, so no single class exactly covers the range $$[8,14)$$.\n- Step 2: The uniform-within-class assumption says values are evenly spread within each class. So in class $$[5,9)$$ with frequency 32, the proportion between 8 and 9 is $$\\frac{9-8}{9-5} = \\frac{1}{4}$$, contributing $$\\frac{1}{4} \\times 32 = 8$$ plants.\n- Step 3: Similarly, from $$[13,15)$$ with frequency 120, the proportion between 13 and 14 is $$\\frac{14-13}{15-13} = \\frac{1}{2}$$, contributing $$\\frac{1}{2} \\times 120 = 60$$ plants. The full class $$[9,13)$$ contributes all 152 plants. Total in $$[8,14)$$: $$8 + 152 + 60 = 220$$.\n\nThe key insight: each partial-class contribution is proportional to the fraction of the class width that falls within the target range.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": true}, {"question": "There are 220 plants with heights in $$[8,14)$$ out of 408 total. Two plants are chosen at random without replacement. Why is the probability NOT $$(220/408)^2$$, and what is the correct expression? (2 steps)", "answer": "- Step 1: $$(220/408)^2$$ assumes **with** replacement — the same probability on both picks. But \"without replacement\" means the second pick is from the remaining 407 plants, of which 219 still fall in $$[8,14)$$ (one was already removed).\n- Step 2: The correct probability is $$\\frac{220}{408} \\times \\frac{219}{407}$$. The denominator drops by 1 on the second fraction, and the numerator drops by 1 because one plant in the desired range was already selected.\n\nThe phrase \"chosen at random\" in S1 typically means without replacement unless explicitly stated otherwise. The denominator always decreases on subsequent picks.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": true}, {"question": "Given $$\\sum x = 862$$ and $$n = 12$$, how do you calculate the mean, and what is the formula for $$S_{xx}$$ that you need before finding the standard deviation? (2 steps)", "answer": "- Step 1: The mean is $$\\bar{x} = \\frac{\\sum x}{n} = \\frac{862}{12} = 71.8\\overline{3}$$. This is the arithmetic average of all 12 values.\n- Step 2: $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$. This measures the total squared deviation from the mean (up to a factor of $$n$$). You need $$\\sum x^2$$ as a given value to compute it — here $$\\sum x^2 = 62802$$, so $$S_{xx} = 62802 - \\frac{862^2}{12} = 881.667$$.\n\nNote: $$S_{xx}$$ is NOT the variance. The population variance is $$\\sigma^2 = S_{xx}/n$$, and the standard deviation is $$\\sigma = \\sqrt{S_{xx}/n}$$. S1 uses the population formula (denominator $$n$$), not the sample formula (denominator $$n-1$$).", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "You've computed $$S_{xx} = 881.667$$ and $$n = 12$$. How do you get the population standard deviation, and why should you keep an extra decimal place before rounding? (2 steps)", "answer": "- Step 1: $$\\sigma_x = \\sqrt{S_{xx}/n} = \\sqrt{881.667/12} = \\sqrt{73.4722} = 8.5716\\ldots$$ This is the population standard deviation (Edexcel S1 convention: denominator is $$n$$, not $$n-1$$).\n- Step 2: Before rounding to 3 s.f. (8.57), keep at least one extra decimal place (8.5716). This prevents rounding errors from accumulating when you use $$\\sigma_x$$ in later parts — e.g., coding in Q2(c) requires multiplying 8.5716 by $$5/9$$, and using 8.57 would give a slightly wrong final answer.\n\nFor \"show that\" questions, the examiner expects to see the unrounded intermediate value written down to justify the rounded result.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "Given $$S_{xy} = 512.67$$, $$S_{xx} = 881.667$$, and $$S_{yy} = 413.67$$, what does the PMCC $$r$$ measure, and how is it calculated? (2 steps)", "answer": "- Step 1: The product moment correlation coefficient (PMCC) $$r$$ measures the strength and direction of **linear** correlation between two variables. It ranges from $$-1$$ (perfect negative linear) to $$+1$$ (perfect positive linear), with 0 meaning no linear relationship.\n- Step 2: $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} \\cdot S_{yy}}} = \\frac{512.67}{\\sqrt{881.667 \\times 413.67}} = \\frac{512.67}{603.948} = 0.849$$. The positive value confirms positive correlation; the magnitude (close to 1) indicates strong linear association.\n\nThe denominator $$\\sqrt{S_{xx} S_{yy}}$$ normalises $$r$$ so it always falls in $$[-1, 1]$$. Without this normalisation, $$S_{xy}$$ alone would depend on the units and scale of the data.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "Temperatures are coded from °F to °C using $$c = \\frac{5}{9}(f - 32)$$. How does this transformation affect the mean, and why? (2 steps)", "answer": "- Step 1: Apply the formula directly to the mean: $$\\bar{c} = \\frac{5}{9}(\\bar{f} - 32)$$. The mean transforms the same way as individual values because the mean is a linear function of the data. Here: $$\\bar{c} = \\frac{5}{9}(71.83 - 32) = \\frac{5}{9} \\times 39.83 = 22.1$$ °C.\n- Step 2: The key insight is that both the multiplicative part ($$5/9$$) and the additive part ($$-32$$) affect the mean. Subtracting 32 shifts every value down by 32, so the mean shifts down by 32. Multiplying by $$5/9$$ scales every deviation, so the mean scales too.\n\nGeneral rule: if $$u = a + bx$$, then $$\\bar{u} = a + b\\bar{x}$$. Both constants matter for the mean.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "When coding from °F to °C via $$c = \\frac{5}{9}(f - 32)$$, how does the standard deviation change, and what happens to the $$-32$$? (3 steps)", "answer": "- Step 1: Standard deviation measures spread (how far values are from the mean). Adding or subtracting a constant shifts all values equally, so deviations from the mean are unchanged. The $$-32$$ does NOT affect the standard deviation.\n- Step 2: Multiplying by $$5/9$$ scales all deviations from the mean by $$5/9$$, so the standard deviation scales by $$|5/9|$$: $$\\sigma_c = \\frac{5}{9} \\sigma_f = \\frac{5}{9} \\times 8.5716 = 4.76$$ °C.\n- Step 3: General rule: if $$u = a + bx$$, then $$\\sigma_u = |b| \\sigma_x$$. The additive constant $$a$$ drops out; only the multiplicative factor $$b$$ matters (and its absolute value, since spread can't be negative).\n\nThis is the same principle as $$\\text{Var}(aX + b) = a^2 \\text{Var}(X)$$ — the constant vanishes and the multiplier is squared (for variance) or taken as absolute value (for s.d.).", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": true}, {"question": "If $$u = \\frac{5}{9}(x - 32)$$ and $$v = \\frac{5}{9}(y - 32)$$, what is the PMCC between $$u$$ and $$v$$, and why? (2 steps)", "answer": "- Step 1: The PMCC between $$u$$ and $$v$$ is the same as between $$x$$ and $$y$$: $$r_{uv} = r_{xy} = 0.849$$. PMCC is invariant under linear coding when both multipliers are positive.\n- Step 2: The reason is that linear coding preserves the direction and relative strength of linear relationships. Since both variables are multiplied by $$5/9 > 0$$, the pattern of points on the scatter diagram is simply rescaled — no stretching, flipping, or distortion of the linear trend. If either multiplier were negative, $$r$$ would change sign but keep its magnitude.\n\nThe exam requires BOTH the value AND the reason. Writing \"$$r_{uv} = 0.849$$\" without explaining \"PMCC is invariant under positive linear coding\" loses a mark.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "On a probability tree, the first split is \"Year 12\" (probability $$p$$) vs \"Year 13\" (probability $$1-p$$), and the second split is \"Left-handed\" vs \"Right-handed.\" If $$P(L \\mid \\text{Y12}) = \\frac{1}{8}$$, what is $$P(R \\mid \\text{Y12})$$, and what principle guarantees this? (2 steps)", "answer": "- Step 1: $$P(R \\mid \\text{Y12}) = 1 - \\frac{1}{8} = \\frac{7}{8}$$. At each split on the tree, the branches are mutually exclusive and exhaustive, so they must sum to 1.\n- Step 2: This is the complement rule: $$P(R \\mid \\text{Y12}) = 1 - P(L \\mid \\text{Y12})$$. On the tree diagram, every \"node\" (branching point) has probabilities that sum to 1. If you see one branch is $$\\frac{1}{8}$$, the other must be $$\\frac{7}{8}$$.\n\nAlways complete ALL branches before using the tree. Missing a complement branch means you can't write down the full probability equations.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "From a probability tree, $$P(L) = p \\cdot \\frac{1}{8} + (1-p) \\cdot \\frac{1}{10} = 0.11$$. Explain why the total probability of being left-handed is a sum of two terms, not just one. (2 steps)", "answer": "- Step 1: A student can be left-handed via two mutually exclusive routes: (i) they are in Year 12 AND left-handed, or (ii) they are in Year 13 AND left-handed. By the addition rule for mutually exclusive events: $$P(L) = P(\\text{Y12} \\cap L) + P(\\text{Y13} \\cap L)$$.\n- Step 2: Each joint probability factors by the multiplication rule along the tree: $$P(\\text{Y12} \\cap L) = P(\\text{Y12}) \\times P(L \\mid \\text{Y12}) = p \\times \\frac{1}{8}$$, and $$P(\\text{Y13} \\cap L) = P(\\text{Y13}) \\times P(L \\mid \\text{Y13}) = (1-p) \\times \\frac{1}{10}$$.\n\nThe tree diagram is just a visual representation of the law of total probability. Every end-branch probability is a product, and you sum the relevant end-branches to get the total probability of an event.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": true}, {"question": "You need to solve $$p \\cdot \\frac{1}{8} + (1-p) \\cdot \\frac{1}{10} = 0.11$$ for $$p$$. What's a clean algebraic approach that avoids decimal errors? (3 steps)", "answer": "- Step 1: Multiply both sides by the LCM of denominators (8, 10), which is 80: $$80 \\times \\left[\\frac{p}{8} + \\frac{1-p}{10}\\right] = 80 \\times 0.11$$.\n- Step 2: Simplify: $$10p + 8(1-p) = 8.8$$, which gives $$10p + 8 - 8p = 8.8$$, so $$2p + 8 = 8.8$$.\n- Step 3: Solve: $$2p = 0.8$$, so $$p = 0.4 = \\frac{2}{5}$$.\n\nClearing fractions early is the safest exam strategy — it eliminates the risk of arithmetic errors from adding fractions with different denominators. Always verify: $$P(L) = 0.4 \\times \\frac{1}{8} + 0.6 \\times \\frac{1}{10} = 0.05 + 0.06 = 0.11$$ ✓", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "A question asks: \"Given that a student is right-handed, find the probability that the student is in Year 12.\" The trigger phrase \"given that\" signals what type of probability, and what formula must you write immediately? (2 steps)", "answer": "- Step 1: \"Given that\" signals **conditional probability**. The event after \"given that\" (right-handed) is the **conditioning event** and goes in the denominator.\n- Step 2: Write the formula immediately: $$P(\\text{Y12} \\mid R) = \\frac{P(\\text{Y12} \\cap R)}{P(R)}$$. The numerator is the joint probability (Y12 AND right-handed), and the denominator is the total probability of being right-handed.\n\nThe single most common error in S1 is returning $$P(\\text{Y12} \\cap R)$$ as the answer when $$P(\\text{Y12} \\mid R)$$ was asked. Writing the formula first forces you to see that a denominator is needed.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "You need $$P(R)$$ as the denominator for a conditional probability. Describe two independent routes to compute it, and why should you compute both? (3 steps)", "answer": "- Step 1: Route 1 (complement): $$P(R) = 1 - P(L) = 1 - 0.11 = 0.89$$. Since every student is either left-handed or right-handed, the complement gives the answer directly.\n- Step 2: Route 2 (direct from tree): $$P(R) = P(\\text{Y12} \\cap R) + P(\\text{Y13} \\cap R) = p \\cdot \\frac{7}{8} + (1-p) \\cdot \\frac{9}{10} = \\frac{2}{5} \\cdot \\frac{7}{8} + \\frac{3}{5} \\cdot \\frac{9}{10} = \\frac{7}{20} + \\frac{27}{50} = \\frac{35}{100} + \\frac{54}{100} = \\frac{89}{100} = 0.89$$.\n- Step 3: Both routes give 0.89 ✓. Computing both is a cross-check: if they disagree, you've made an arithmetic error somewhere. This takes 30 seconds and can save 2 marks.\n\nThe complement route is faster, but the direct route verifies your tree calculations. Use both on \"given that\" questions.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "A student computes $$P(\\text{Y12} \\cap R) = \\frac{7}{20}$$ and writes this as the final answer for $$P(\\text{Y12} \\mid R)$$. What is the conceptual error, and what is the correct answer? (3 steps)", "answer": "- Step 1: The error is confusing the **joint** probability $$P(\\text{Y12} \\cap R)$$ with the **conditional** probability $$P(\\text{Y12} \\mid R)$$. The joint is \"both events happen simultaneously\"; the conditional is \"Y12 happens, restricted to the sub-population where R has already happened.\"\n- Step 2: To convert joint to conditional, divide by $$P(R)$$: $$P(\\text{Y12} \\mid R) = \\frac{P(\\text{Y12} \\cap R)}{P(R)} = \\frac{7/20}{89/100} = \\frac{7}{20} \\times \\frac{100}{89} = \\frac{700}{1780}$$.\n- Step 3: Simplify: $$\\frac{700}{1780} = \\frac{35}{89} \\approx 0.393$$. Note that $$\\frac{7}{20} = 0.35$$, which is different from 0.393 — the conditional probability is larger because we're restricting to the sub-population of right-handed students, where Year 12 students are a bigger proportion.\n\nThink of it this way: $$P(\\text{Y12} \\cap R)$$ is a fraction of ALL students; $$P(\\text{Y12} \\mid R)$$ is a fraction of RIGHT-HANDED students only. The denominator shrinks, so the fraction can change.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": true}, {"question": "For a dataset of $$n = 11$$ ordered values, the quartile positions are at $$\\frac{n+1}{4}$$ and $$\\frac{3(n+1)}{4}$$. What are these positions, and do you need to interpolate? (2 steps)", "answer": "- Step 1: $$Q_1$$ position = $$\\frac{11+1}{4} = 3$$ and $$Q_3$$ position = $$\\frac{3(11+1)}{4} = 9$$. Both are integers.\n- Step 2: Since the positions are integers, no interpolation is needed. $$Q_1$$ is the 3rd value and $$Q_3$$ is the 9th value in the ordered list. If the position had been non-integer (e.g., 3.5 for $$n = 7$$), you would interpolate between the 3rd and 4th values.\n\nAlways check whether the position is integer or not before deciding your method. This is a common source of lost marks — applying interpolation when it's not needed, or failing to interpolate when it is.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "The Spanish marks (sorted) are 16, 24, 28, 32, 36, 38, 44, 48, 48, 68, 90. With $$Q_1 = 28$$ and $$Q_3 = 48$$, how do you test whether 90 is an outlier using the fence rule? (3 steps)", "answer": "- Step 1: Compute the IQR: $$Q_3 - Q_1 = 48 - 28 = 20$$. This is the spread of the middle 50% of the data.\n- Step 2: Compute the upper fence: $$Q_3 + 1.5 \\times \\text{IQR} = 48 + 1.5 \\times 20 = 48 + 30 = 78$$. Also the lower fence: $$Q_1 - 1.5 \\times \\text{IQR} = 28 - 30 = -2$$.\n- Step 3: Since 90 > 78, the value 90 exceeds the upper fence and is classified as an outlier. (No values fall below the lower fence of −2, so there are no low outliers.)\n\nThe fence rule is: any value above $$Q_3 + 1.5 \\times \\text{IQR}$$ or below $$Q_1 - 1.5 \\times \\text{IQR}$$ is an outlier. This is the standard box-plot outlier criterion.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": true}, {"question": "For the regression line $$s = a + bf$$, you have $$n = 10$$, $$\\sum f = 422$$, $$\\sum s = 382$$, $$S_{ff} = 1667.6$$, $$S_{fs} = 1735.6$$. How do you find the slope $$b$$ and intercept $$a$$, and why is the intercept negative here? (3 steps)", "answer": "- Step 1: $$b = \\frac{S_{fs}}{S_{ff}} = \\frac{1735.6}{1667.6} = 1.0408\\ldots \\approx 1.04$$. The slope measures how much $$s$$ changes per unit increase in $$f$$.\n- Step 2: $$a = \\bar{s} - b\\bar{f} = 38.2 - 1.0408 \\times 42.2 = 38.2 - 43.921 = -5.72$$. The intercept is where the regression line meets the $$s$$-axis (when $$f = 0$$).\n- Step 3: The intercept is negative because $$b\\bar{f} = 43.92 > \\bar{s} = 38.2$$. The line passes through the point $$(\\bar{f}, \\bar{s}) = (42.2, 38.2)$$ and has a positive slope, so extrapolating backwards to $$f = 0$$ takes you below zero on the $$s$$-axis.\n\nDon't panic at a negative intercept — it's mathematically valid. It just means the linear model predicts a negative Spanish mark for very low French marks, which is unrealistic but algebraically correct.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "The regression line is $$s = -5.72 + 1.04f$$. How should you interpret the gradient in context, and what must you include for the full mark? (2 steps)", "answer": "- Step 1: The gradient 1.04 means: for each additional mark scored in the French test, the predicted Spanish mark increases by approximately 1.04 marks.\n- Step 2: For the full mark, you must include: (i) the contextual variables (\"French test\" and \"Spanish mark\"), (ii) the word \"predicted\" or \"estimated\" (since this is a regression line, not a deterministic relationship), and (iii) the units (\"marks\"). Writing \"gradient is 1.04\" alone gets 0 marks.\n\nThe regression line is a model — it predicts, it doesn't guarantee. Always use language like \"predicted increase\" or \"estimated change.\"", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "A student scores $$f = 55$$ on the French test, and another scores $$f = 18$$. The data range for French is $$24 \\le f \\le 68$$. Which regression estimate is more reliable, and what terminology must you use? (3 steps)", "answer": "- Step 1: $$f = 55$$ lies within the observed data range $$[24, 68]$$, so the estimate is **interpolation** — predicting within the range of observed data.\n- Step 2: $$f = 18$$ lies outside the observed data range (below 24), so the estimate is **extrapolation** — predicting beyond the range of observed data.\n- Step 3: The interpolation estimate ($$f = 55$$) is more reliable because the linear relationship has been verified within the data range but is not guaranteed to hold outside it. You must use the words \"interpolation\" and \"extrapolation\" and state the data range explicitly.\n\nExtrapolation is risky because the relationship might be nonlinear outside the observed range. For $$f = 18$$, the model predicts $$s = -5.72 + 1.04 \\times 18 = 13.0$$ — a negative Spanish mark isn't possible, which already shows the model breaks down for low French scores.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": true}, {"question": "A discus throw distance $$X$$ follows $$N(40, 16)$$ (mean 40, variance 16). You need $$P(X < 38.8)$$. Walk through the standardisation process. (3 steps)", "answer": "- Step 1: Identify the parameters: $$\\mu = 40$$, $$\\sigma = \\sqrt{16} = 4$$. Note: the second parameter of the Normal is the variance, not the standard deviation.\n- Step 2: Standardise: $$z = \\frac{38.8 - \\mu}{\\sigma} = \\frac{38.8 - 40}{4} = \\frac{-1.2}{4} = -0.30$$.\n- Step 3: $$P(X < 38.8) = P(Z < -0.30) = 1 - \\Phi(0.30) = 1 - 0.6179 = 0.3821$$. By symmetry of the standard normal, $$P(Z < -a) = 1 - \\Phi(a)$$.\n\nAlways show the z-value AND the table lookup in a \"show that\" question — the examiner needs to see both steps, not just the final probability.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "An athlete has 3 independent attempts to throw a discus more than 38.8 m to qualify. Once they qualify, they stop. What is $$P(\\text{qualifies})$$, and why is the complement method cleaner than summing cases? (3 steps)", "answer": "- Step 1: Define $$P(\\text{fail on one throw}) = P(X < 38.8) = 0.3821$$ and $$P(\\text{succeed on one throw}) = 0.6179$$.\n- Step 2: The complement of \"qualifies\" is \"fails all 3 throws.\" Since throws are independent: $$P(\\text{all 3 fail}) = 0.3821^3 = 0.0558$$.\n- Step 3: $$P(\\text{qualifies}) = 1 - 0.0558 = 0.9442$$. This is cleaner than summing three cases (succeed on throw 1, or fail-then-succeed on throw 2, or fail-fail-succeed on throw 3) because the complement is a single product.\n\nThe \"at least one success in $$n$$ independent trials\" formula is $$1 - P(\\text{fail})^n$$. It works because \"at least one success\" is the complement of \"all fail,\" and independence lets you multiply the failure probabilities.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": true}, {"question": "The question asks: \"Given that the athlete qualified for the final, find the probability that they qualified on the second throw with a distance of more than 44 m.\" Identify the conditioning event and the joint event in the numerator. (3 steps)", "answer": "- Step 1: The conditioning event (denominator) is \"qualifies\" — the athlete makes it to the final by any route. $$P(\\text{qualifies}) = 0.9442$$.\n- Step 2: The joint event (numerator) is \"qualified on the 2nd throw with $$X > 44$$.\" This means: throw 1 fails ($$X_1 < 38.8$$) AND throw 2 exceeds 44 m ($$X_2 > 44$$). Note that $$X > 44$$ automatically implies $$X > 38.8$$, so \"throw 2 exceeds 44\" is a subset of \"throw 2 succ
