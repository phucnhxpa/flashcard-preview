judge_pick": false}, {"question": "In a probability tree, the probabilities on each branch from a node must sum to 1. Explain why this is essential and what would be wrong if it didn't. (1 step)", "answer": "The probabilities on branches from a single node represent the complete set of mutually exclusive outcomes for that event. They must sum to 1 because one of these outcomes must occur. If they didn't sum to 1, either some probability is missing (wasted) or there are outcomes not accounted for, violating the law of total probability.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "Explain why P(A|B) ≠ P(B|A) in general. Provide a numerical example where they differ substantially. (2 steps)", "answer": "- Step 1: P(A|B) is the probability of A given that B has occurred. P(B|A) is the probability of B given that A has occurred. The denominators are different.\n- Example: Let A = \"has flu\" (rare, say P(A) = 0.01), B = \"has fever\" (common, P(B) = 0.3). Suppose P(B|A) = 0.9 (90% of flu victims have fever). Then P(A|B) = P(A∩B)/P(B) = (0.9 × 0.01)/0.3 = 0.03, very different from P(B|A) = 0.9.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "In regression analysis, what does a negative intercept (like -5.72) mean in practical terms? Can a regression line have a negative intercept but still give sensible predictions? (2 steps)", "answer": "- Step 1: A negative intercept means that when the independent variable is zero, the predicted value of the dependent variable would be negative. In this context, it suggests that if someone scored 0 in French, their predicted Spanish mark would be -5.72.\n- Step 2: However, this doesn't invalidate the model as long as predictions within the data range are sensible. The regression line is an extrapolation of the linear relationship; negative intercept simply means the fitted line crosses the y-axis below zero. The model is still valid for interpolation within the observed range.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}, {"question": "Why is it important to check whether a point is an outlier BEFORE fitting a regression line? What happens to the regression line if you include an outlier? (2 steps)", "answer": "- Step 1: Outliers can disproportionately influence the regression line, pulling it toward themselves and distorting the relationship for the rest of the data.\n- Step 2: In this question, the point (30, 90) is an outlier in the Spanish marks. Including it would give a very different regression line. The question explicitly says to ignore this point, which gives a more representative model of the relationship between French and Spanish performance for typical students.", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "When calculating the probability of selecting 2 plants both in a certain height range, why do we use (220/408) × (219/407) rather than the hypergeometric formula? (2 steps)", "answer": "- Step 1: This IS essentially the hypergeometric situation, but expressed as sequential draws without replacement.\n- Step 2: The expression (220/408) × (219/407) explicitly shows the changing denominator after the first draw. This is mathematically equivalent to the hypergeometric formula: [C(220,2) × C(188,0)] / C(408,2), but the sequential approach is often more intuitive for \"two random selections.\"", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": false}, {"question": "In the discrete random variable question, if you had made an arithmetic error computing one of the probabilities P(X = x), how could you quickly check if your answer is correct? (1 step)", "answer": "Check if all probabilities sum to 1. If ∑P(X = x) ≠ 1, there is definitely an error in at least one probability calculation. This is an essential sanity check before proceeding to find expectation or variance.", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "In question Q8(b), after solving 3σ(σ - 2) = 0, why must we reject σ = 0? (1 step)", "answer": "A standard deviation of zero would mean there is no variation in the data — all values are identical. This is impossible for a normal distribution that has a non-degenerate probability distribution. Additionally, σ must be positive by definition. Therefore, σ = 0 is not a valid solution and must be rejected.", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": false}, {"question": "For the correlation coefficient r, what is the range of possible values and what does each extreme value represent? (1 step)", "answer": "-1 ≤ r ≤ 1. r = 1 indicates perfect positive linear relationship; r = -1 indicates perfect negative linear relationship; r = 0 indicates no linear correlation. Values cannot exceed these bounds, as they represent the limits of linear association.", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}, {"question": "When a question asks you to \"show that\" a result is true (like showing k = 2.52), what constitutes proper showing-it working? (1 step)", "answer": "You must show the intermediate algebraic steps, not just state the final answer. This typically involves at least 3 lines of working: writing the relevant formula, substituting values and simplifying, and arriving at the stated result. Simply writing the final number without showing how you derived it earns at most 1 mark out of the 3-4 available.", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": false}, {"question": "In the context of the S1 exam, explain what is meant by \"interpolation\" versus \"extrapolation\" when using a regression model for prediction. (2 steps)", "answer": "- Step 1: Interpolation means predicting for a value of the independent variable that lies within the observed data range. Extrapolation means predicting for a value outside this range.\n- Step 2: Interpolation is generally more reliable because the linear relationship is known to hold within the data range. Extrapolation is unreliable because the relationship may not continue beyond the observed data — the linear model may break down.", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": false}, {"question": "A student remembers that Var(aX + b) = a²Var(X) + b. Explain why this is wrong and write the correct formula. (2 steps)", "answer": "- Step 1: The student has confused variance with expectation. For expectation: E(aX + b) = aE(X) + b (the constant b is added).\n- Step 2: For variance: Var(aX + b) = a²Var(X). The constant b disappears entirely because variance measures spread, not location. The multiplier a is squared because variance scales with the square of the multiplier.", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": false}, {"question": "In probability questions involving \"at least one success\" in n independent trials, why is it often easier to use the complement? (1 step)", "answer": "It's easier because P(at least one success) = 1 - P(all fail). This avoids having to calculate P(exactly 1 success) + P(exactly 2 successes) + ... + P(exactly n successes), which would require summing many terms. The complement calculation requires only one multiplication.", "source": "MiniMax ②", "_id": "minimax_2_47", "judge_pick": true}, {"question": "Why can't you use the regression line to predict reliably for any French mark, even within the data range? What assumption must hold? (1 step)", "answer": "The regression line predicts reliably only if the relationship between the variables is linear. Even within the data range, if the true relationship is curved (non-linear), the linear regression would give misleading predictions. The reliability of prediction assumes the linear model is appropriate throughout the data range.", "source": "MiniMax ②", "_id": "minimax_2_48", "judge_pick": false}], "count": 49}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "In a histogram, how do you recover the frequency of any class from what is drawn, and why does this work?", "answer": "- Step 1: The defining property of a histogram is that **area of bar = frequency**. The vertical axis is not frequency itself but **frequency density**, defined as $$\\text{fd} = \\frac{\\text{frequency}}{\\text{class width}}.$$\n- Step 2: Rearranging: $$\\text{frequency} = \\text{fd} \\times \\text{class width}.$$ So for each bar, read fd off the vertical axis, multiply by the horizontal width.\n- Step 3: This convention exists because classes can have **unequal widths**. If we plotted raw frequency on the y-axis, wider classes would look artificially \"taller\" even if data were uniformly spread. Frequency density normalises this so visual area faithfully represents count.\n\nTakeaway: fd is \"frequency per unit of class width\" — area not height carries the meaning.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": true}, {"question": "A grouped frequency table has classes of widths 4, 4, 2, 2, 8. Without doing the full calculation, why might the bar for the width-2 class appear taller than the bar for a width-8 class even if both contain similar numbers of plants?", "answer": "- Step 1: The y-axis is frequency density = frequency / width. A narrow class concentrates its frequency into a small interval, inflating fd.\n- Step 2: A width-2 class with 120 plants has fd = 60. A width-8 class with 40 plants has fd = 5.\n- Step 3: So the taller bar can hold *fewer* plants overall — what matters for \"how many\" is area, not height. Visually misleading at a glance; always multiply fd × width to recover the count.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": true}, {"question": "A grouped data set has $n$ values. To locate the median by linear interpolation, what formula do you use, and what does each piece mean? (3 steps)", "answer": "- Step 1: The formula is $$\\text{Median} = L + \\frac{(n/2) - F_<}{f_{\\text{class}}} \\times w$$ where $$L$$ is the lower bound of the median class, $$F_<$$ is the cumulative frequency *before* the median class, $$f_{\\text{class}}$$ is the frequency *of* the median class, and $$w$$ is the class width.\n- Step 2: The fraction $$\\frac{(n/2)-F_<}{f_{\\text{class}}}$$ tells you *how far through* the median class you need to walk to reach the median value, assuming the data are spread uniformly inside that class.\n- Step 3: Multiplying by $w$ converts that proportion into an actual distance along the x-axis; adding it to $L$ shifts you up to the correct position.\n\nTakeaway: it's a \"start at the bottom of the median class, walk a fraction of the class width\" recipe — the uniform-within-class assumption is what makes it valid.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": true}, {"question": "Why is the median class identified using cumulative frequency rather than raw frequency, and how do you spot it? (2 steps)", "answer": "- Step 1: The median is the value at position $n/2$ (or $(n+1)/2$ for an ordered list of $n$ data points; for grouped S1 we use $n/2$). To know which class contains that position, you need to count how many values have accumulated by the end of each class — that's cumulative frequency.\n- Step 2: The median class is the *first* class where the cumulative frequency reaches or exceeds $n/2$. Raw frequency tells you the size of each class but not the running total, which is what locates the median position.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "A data set has mean 13.2 cm and median ≈ 13.3 cm. What is the skew, and how do you justify the answer for full marks?", "answer": "- Step 1: Compare mean and median. Here mean (13.2) < median (13.3).\n- Step 2: The rule: mean < median ⇒ **negatively skewed**; mean > median ⇒ positively skewed; equal ⇒ symmetric.\n- Step 3: For exam credit, state BOTH the direction AND the comparison: *\"Negative skew, because mean < median.\"* Just naming the skew without the numerical comparison loses the reason mark.\n\nIntuition: the mean is dragged toward the long tail; if the tail is on the *low* side, the mean is pulled down below the median.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": true}, {"question": "Why does the mean get \"dragged\" toward the tail of a skewed distribution, while the median does not? (3 steps)", "answer": "- Step 1: The mean is a sum-weighted statistic — every value contributes proportionally to its size. Extreme values far out in a tail have outsized influence.\n- Step 2: The median is purely a *positional* statistic — only the rank of values matters, not their magnitudes. An outlier 1000 units away from the centre counts the same as one just past the median.\n- Step 3: So a long lower tail (negative skew) pulls the mean below the median; a long upper tail pulls the mean above. The median stays anchored at the middle of the count.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": true}, {"question": "A histogram has classes $[5,9), [9,13), [13,15), [15,17), [17,25)$. You're asked the probability that a plant's height lies in $[8, 14)$. Why can you not just sum whole-class frequencies? (3 steps)", "answer": "- Step 1: The boundaries 8 and 14 do not coincide with class boundaries. 8 sits inside $[5,9)$ and 14 sits inside $[13,15)$, so both endpoints cut through classes.\n- Step 2: To estimate the count in $[8,14)$, you assume data are **uniformly distributed within each class** (the same assumption underpinning median interpolation). Then the portion of a class contributing to $[8,14)$ is proportional to the overlap width.\n- Step 3: + From $[5,9)$: overlap is $[8,9)$, width 1 of 4 ⇒ take $\\tfrac{1}{4}$ of its frequency. + All of $[9,13)$ is inside. + From $[13,15)$: overlap is $[13,14)$, width 1 of 2 ⇒ take $\\tfrac{1}{2}$ of its frequency. Sum these.\n\nTakeaway: when probability-bounds cut classes, split the class proportionally by width.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "Two plants are chosen at random from 408 plants, of which 220 fall in a target range. Why is the probability that both are in the range NOT $$(220/408)^2$$, and what is it instead? (3 steps)", "answer": "- Step 1: \"Chosen at random\" from a finite population, without further qualification, means **without replacement** — the same plant can't be picked twice.\n- Step 2: After the first plant is taken, the population shrinks. If the first was in-range, then 219 of the remaining 407 are in-range.\n- Step 3: So $$P(\\text{both in range}) = \\frac{220}{408} \\times \\frac{219}{407}.$$ Using $(220/408)^2$ would assume *with* replacement, slightly over-counting because it lets the same plant be drawn twice.\n\nTakeaway: read \"two are chosen\" as a no-replacement signal unless told otherwise.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": true}, {"question": "Why does $S_{xx} = \\sum x^2 - \\dfrac{(\\sum x)^2}{n}$ measure spread, and how does it relate to standard deviation? (3 steps)", "answer": "- Step 1: Expand the textbook definition: $$S_{xx} = \\sum (x - \\bar{x})^2.$$ Algebraic manipulation gives the computational form $$\\sum x^2 - (\\sum x)^2/n,$$ which avoids recomputing $\\bar{x}$ for each term.\n- Step 2: $S_{xx}$ is the **total squared deviation** from the mean — bigger when data are spread further from $\\bar{x}$.\n- Step 3: Population standard deviation is $$\\sigma = \\sqrt{S_{xx}/n}$$ — the *root mean squared deviation*. So $S_{xx}$ is the \"raw spread fuel\" that you divide by $n$ and root to get s.d.\n\nTakeaway: $S_{xx}$ is a halfway quantity; it carries the spread information but needs normalisation to be interpretable.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": true}, {"question": "Conceptually, why does the product moment correlation coefficient $r = S_{xy}/\\sqrt{S_{xx} S_{yy}}$ always lie between $-1$ and $+1$? (3 steps)", "answer": "- Step 1: $S_{xy} = \\sum(x-\\bar{x})(y-\\bar{y})$ measures whether $x$ and $y$ tend to move *together* (positive products dominate) or *oppositely* (negative products dominate).\n- Step 2: The denominator $\\sqrt{S_{xx} S_{yy}}$ is the geometric mean of the two spreads — it normalises by how big the deviations *could* be.\n- Step 3: By the Cauchy-Schwarz inequality, $$|S_{xy}| \\le \\sqrt{S_{xx} S_{yy}},$$ so $|r| \\le 1$. Equality holds only when $y$ is an exact linear function of $x$.\n\nTakeaway: $r$ is a \"scaled\" covariance — same direction but bounded by ±1 to be unit-free and comparable.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": true}, {"question": "Temperatures $x$ in °F are converted to $u$ in °C via $u = \\tfrac{5}{9}(x - 32)$. How does $\\bar{u}$ relate to $\\bar{x}$, and how does $\\sigma_u$ relate to $\\sigma_x$? (3 steps)", "answer": "- Step 1: This is a **linear coding** $u = a + bx$ with $a = -\\tfrac{5}{9} \\cdot 32 = -\\tfrac{160}{9}$ and $b = \\tfrac{5}{9}$.\n- Step 2: The mean transforms identically: $\\bar{u} = a + b\\bar{x}$. So apply both the shift AND the scale to the mean.\n- Step 3: The standard deviation only feels the multiplicative part: $\\sigma_u = |b|\\sigma_x = \\tfrac{5}{9}\\sigma_x$. The shift $-32$ doesn't change the spread — every value moves by the same amount, so distances between values are preserved.\n\nTakeaway: **shifts don't change spread; scales do.**", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": true}, {"question": "Why does an additive constant leave standard deviation unchanged but multiplicative scaling does not? (3 steps)", "answer": "- Step 1: Standard deviation measures *distances* between data values and the mean. Adding a constant $a$ moves every $x_i$ by $a$ and also moves $\\bar{x}$ by $a$ — the difference $x_i - \\bar{x}$ is unchanged.\n- Step 2: Multiplying every $x_i$ by $b$ stretches all distances by factor $|b|$. The deviation $x_i - \\bar{x}$ becomes $b(x_i - \\bar{x})$.\n- Step 3: Since variance is the average squared deviation, multiplication by $b$ scales variance by $b^2$ and s.d. by $|b|$. Addition leaves both untouched.\n\nTakeaway: spread cares about *relative* positions, not absolute location.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": true}, {"question": "When data $x, y$ are both transformed by positive linear coding to $u, v$, why does the correlation coefficient $r$ stay the same? (3 steps)", "answer": "- Step 1: Write $u = a + bx$ and $v = c + dy$. Then $u - \\bar{u} = b(x - \\bar{x})$ and $v - \\bar{v} = d(y - \\bar{y})$ — shifts cancel because they affect both the value and the mean.\n- Step 2: So $S_{uv} = bd \\cdot S_{xy}$, $S_{uu} = b^2 S_{xx}$, $S_{vv} = d^2 S_{yy}$.\n- Step 3: $$r_{uv} = \\frac{bd \\cdot S_{xy}}{\\sqrt{b^2 d^2 S_{xx} S_{yy}}} = \\frac{bd}{|bd|} \\cdot r_{xy}.$$ If $b, d > 0$, the factor is $+1$ and $r$ is unchanged. If one is negative, the sign of $r$ flips.\n\nTakeaway: correlation is a **shape** property — translations and positive scalings preserve shape; negative scalings reflect it.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": true}, {"question": "For full marks on \"state the correlation between $u$ and $v$ given $u, v$ are linear codings of $x, y$\", what two things must your answer include?", "answer": "- Step 1: The numerical value — equal to $r_{xy}$ (or its negative if either multiplier is negative).\n- Step 2: The reason — PMCC is invariant under linear coding with positive multipliers on both variables.\n\nStating just the number loses the reason mark; stating just the rule without the value loses the value mark.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "On a probability tree with branches \"Year 12\" / \"Year 13\" and then \"Left-handed\" / \"Right-handed\", what is the rule for the missing branch probabilities at any split point?", "answer": "At any branching node, the probabilities on the outgoing branches must sum to 1 — they are mutually exclusive and exhaustive outcomes *conditional* on having reached that node. So given $P(L | \\text{Y12}) = \\tfrac{1}{8}$, the complementary branch is $P(R | \\text{Y12}) = 1 - \\tfrac{1}{8} = \\tfrac{7}{8}$. This is just $P(A') = 1 - P(A)$ applied to a conditional probability.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "A student is in Year 12 with probability $p$ and Year 13 with probability $1-p$. $P(L | \\text{Y12}) = 1/8$, $P(L | \\text{Y13}) = 1/10$, and overall $P(L) = 0.11$. Set up the equation in $p$. (3 steps)", "answer": "- Step 1: Use the **law of total probability**: split the event $L$ by the year groups it can occur in.\n- Step 2: $$P(L) = P(\\text{Y12})P(L|\\text{Y12}) + P(\\text{Y13})P(L|\\text{Y13}) = p \\cdot \\tfrac{1}{8} + (1-p) \\cdot \\tfrac{1}{10}.$$\n- Step 3: Set equal to 0.11: $$\\tfrac{p}{8} + \\tfrac{1-p}{10} = 0.11.$$ Clear denominators (multiply by 80) to get $10p + 8(1-p) = 8.8 \\Rightarrow 2p + 8 = 8.8 \\Rightarrow p = 0.4$.\n\nTakeaway: any \"marginal\" probability on the rightmost leaves equals a sum of products down each path.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "What is the *trigger phrase* in a question that demands the conditional probability formula, and what formula must you immediately write down?", "answer": "- Step 1: The trigger is **\"given that\"** (or synonyms like \"if … is …\", \"for those who …\", \"among the …\").\n- Step 2: As soon as that phrase appears, write $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$ in the margin.\n- Step 3: The conditioning event (the one after \"given that\") always goes in the **denominator**.\n\nTakeaway: this single habit fixes the single most common S1 mistake — confusing joint with conditional probability.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": true}, {"question": "A student computes $P(\\text{Y12} \\cap R) = p \\cdot \\tfrac{7}{8}$ and writes this as the answer to \"Given that a student is right-handed, find the probability they are in Year 12.\" Why is this wrong, and what is the correct structure of the answer? (3 steps)", "answer": "- Step 1: The expression $p \\cdot \\tfrac{7}{8}$ is the **joint probability** that a randomly chosen student is *both* in Y12 *and* right-handed — it's a path-product down the tree.\n- Step 2: The question asks for a **conditional probability**: given right-handed, what's the chance of Y12? The conditioning restricts the sample space to right-handed students, so we need to divide by $P(R)$.\n- Step 3: Correct: $$P(\\text{Y12} | R) = \\frac{P(\\text{Y12} \\cap R)}{P(R)} = \\frac{p \\cdot 7/8}{1 - P(L)}.$$ The denominator effectively re-normalises the probability over the smaller universe of right-handers.\n\nTakeaway: joint vs conditional is a sample-space distinction; conditioning re-scales by the size of the conditioning event.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": true}, {"question": "To verify the denominator $P(R)$ on a probability tree, what two routes can you use, and why is computing it both ways a good habit? (3 steps)", "answer": "- Step 1: Route 1 (complement): $$P(R) = 1 - P(L)$$ if $L$ and $R$ are complementary.\n- Step 2: Route 2 (direct total): sum the path-products for every route ending in $R$: $$P(R) = P(\\text{Y12}) P(R|\\text{Y12}) + P(\\text{Y13}) P(R|\\text{Y13}).$$\n- Step 3: They *must* agree. Computing both is a cheap arithmetic check; a mismatch flags an algebra slip before you submit. Useful especially under exam pressure when a single fraction error can derail the conditional answer.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": true}, {"question": "What is the difference between the formulas $P(A | B) = P(A \\cap B)/P(B)$ and $P(B | A) = P(A \\cap B)/P(A)$? Why is it easy to invert them by mistake? (2 steps)", "answer": "- Step 1: The *numerator* (the intersection) is symmetric: $P(A \\cap B) = P(B \\cap A)$. So both formulas share the same top.\n- Step 2: The *denominator* is what changes — it must be the probability of the *conditioning* event (the one after \"given\"). Mixing them inverts the question, e.g. computing \"probability of being right-handed given Y12\" when the question asked the reverse.\n\nTrick: read the formula as \"P(thing | condition) = joint / P(condition)\" — condition always downstairs.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "What's the IQR-based rule for flagging an outlier, and why is multiplying the IQR by 1.5 the conventional choice? (3 steps)", "answer": "- Step 1: An outlier is a value above $Q_3 + 1.5 \\cdot \\text{IQR}$ or below $Q_1 - 1.5 \\cdot \\text{IQR}$, where IQR $= Q_3 - Q_1$.\n- Step 2: The IQR is the middle 50% spread — robust to extreme values. Multiplying by 1.5 sets fences at 2.7 standard deviations either side for normally distributed data, capturing roughly the central 99.3%.\n- Step 3: So the 1.5 multiplier is a sensible convention: it flags values that would be genuinely rare under normal conditions, without being so strict it labels half the data as outliers.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": true}, {"question": "For $n = 11$ ordered values, where are $Q_1$ and $Q_3$ located, and why is no interpolation needed in this case?", "answer": "- Step 1: $Q_1$ position is $(n+1)/4 = 12/4 = 3$; $Q_3$ position is $3(n+1)/4 = 9$. Both are integers.\n- Step 2: An integer position means the quartile is exactly the value at that rank in the ordered list — no interpolation between two adjacent values needed.\n- Step 3: When positions are non-integer (e.g. $n=10$ gives $Q_1$ at position 2.75), you interpolate between the values at ranks 2 and 3. So $n = 11$ is a \"clean\" case.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": true}, {"question": "For the least-squares regression line $s = a + bf$, what are the formulas for $b$ and $a$, and what is the geometric meaning of $a = \\bar{s} - b\\bar{f}$? (3 steps)", "answer": "- Step 1: $$b = \\frac{S_{fs}}{S_{ff}}$$ — the gradient minimises the sum of squared vertical deviations.\n- Step 2: $$a = \\bar{s} - b\\bar{f}$$ — derived by demanding the line pass through the centroid $(\\bar{f}, \\bar{s})$.\n- Step 3: Geometrically: the regression line always passes through the mean point of the data. The intercept is whatever value of $a$ makes that happen given the slope. So $a$ is not really a free parameter — it's determined by the requirement that residuals sum to zero.\n\nTakeaway: regression \"pivots\" around the centroid; slope encodes the strength and direction of co-variation.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": true}, {"question": "Why might the regression intercept $a$ be *negative* even when the data values are all positive? (3 steps)", "answer": "- Step 1: $a = \\bar{s} - b\\bar{f}$. The sign depends on whether $b\\bar{f}$ exceeds $\\bar{s}$.\n- Step 2: If $b > 1$ and $\\bar{f}, \\bar{s}$ are of similar magnitude, then $b\\bar{f}$ can easily overshoot $\\bar{s}$, making $a < 0$.\n- Step 3: A negative intercept just means the *extrapolated* prediction at $f = 0$ would be below zero — but that's outside the data range, so it has no real-world meaning. Within the observed range the line still gives sensible positive predictions.\n\nTakeaway: the intercept is a mathematical anchor for the line, not a meaningful prediction unless $f = 0$ is inside the data range.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": true}, {"question": "When interpreting a regression slope of, say, 1.04 for \"Spanish mark $s$ regressed on French mark $f$\", what must the verbal interpretation contain to score the mark?", "answer": "- Step 1: A **unit change** in the predictor: \"for each additional mark in French...\"\n- Step 2: The **direction and magnitude** of the response: \"...the predicted Spanish mark increases by approximately 1.04 marks.\"\n- Step 3: Use **context-specific units and variables** (\"French mark\", \"Spanish mark\", \"mark\") — not generic \"x increases y by 1.04\".\n\nA bare \"the gradient is 1.04\" gets zero — you must translate into the context.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": true}, {"question": "What is the conceptual difference between interpolation and extrapolation in regression, and why is one reliable while the other isn't? (3 steps)", "answer": "- Step 1: **Interpolation** predicts $y$ for an $x$ value *inside* the observed range of $x$. **Extrapolation** predicts for $x$ *outside* that range.\n- Step 2: The regression line is fitted using data only inside the range, so the linear pattern is *empirically* supported there. Outside, we have no evidence the linear relationship continues — it may bend, plateau, or reverse.\n- Step 3: So interpolated estimates inherit the reliability of the fit; extrapolated ones are speculative assumptions that nature continues being linear. For full marks, name the technique (interpolation/extrapolation) AND quote the data range.\n\nTakeaway: regression doesn't extrapolate — *you* extrapolate, at your own risk.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "For a Normal random variable $X \\sim N(\\mu, \\sigma^2)$, how do you standardise $X$, and why is standardisation useful? (3 steps)", "answer": "- Step 1: $$Z = \\frac{X - \\mu}{\\sigma}$$ converts $X$ to a standard normal $Z \\sim N(0,1)$. Subtracting $\\mu$ recentres at 0; dividing by $\\sigma$ rescales spread to 1.\n- Step 2: Standardisation is useful because there's only one set of tables (the $\\Phi$ table for $N(0,1)$). Every Normal probability question reduces to looking up a $z$-value in this single table.\n- Step 3: The transformation is **linear**, so it preserves inequality directions: $X < c$ iff $Z < (c-\\mu)/\\sigma$. So you can directly translate probability statements about $X$ into ones about $Z$.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": true}, {"question": "For three independent attempts with success probability $s$ per attempt, what is the probability of *qualifying* (at least one success), and why is the complement approach simpler than summing cases? (3 steps)", "answer": "- Step 1: \"At least one success in $n$\" is the complement of \"all failures\". Direct sum requires three mutually exclusive cases (succeed on 1st / on 2nd / on 3rd), each a small product.\n- Step 2: Complement: $$P(\\text{at least one success}) = 1 - P(\\text{all fail}) = 1 - (1-s)^n.$$\n- Step 3: One subtraction, one power — much cleaner. For $s = 0.6179$, $P(\\text{qualify}) = 1 - 0.3821^3 = 1 - 0.0558 = 0.9442$.\n\nTakeaway: \"at least one\" → complement of \"none\".", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": true}, {"question": "In the discus problem, the event is \"qualified on the 2nd throw with a distance more than 44 m\". Why is this NOT the same as \"the 2nd throw exceeds 44 m\"? (3 steps)", "answer": "- Step 1: \"Qualified on the 2nd throw\" requires the **1st throw to have failed** (otherwise the athlete would have stopped at throw 1).\n- Step 2: It also requires the 2nd throw to **succeed** — and \"more than 44 m\" automatically satisfies the qualifying threshold of \"more than 38.8 m\" (since 44 > 38.8). So the success condition collapses to just \"$X_2 > 44$\".\n- Step 3: Therefore the event is $$F_1 \\cap (X_2 > 44),$$ a *joint* event whose probability is $P(F_1) \\cdot P(X_2 > 44)$ by independence. Don't double-count \"$X_2 > 38.8$ AND $X_2 > 44$\" — the stronger condition absorbs the weaker.\n\nTakeaway: re-state the event in maths before computing probability — English can mask structure.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": true}, {"question": "Why must \"given that they qualified\" appear as a **denominator** in the discus Q5(b) calculation, and what is the full structure of the answer? (3 steps)", "answer": "- Step 1: \"Given that they qualified\" is the conditioning event $Q$. By the conditional formula, $$P(\\text{2nd throw} > 44 | Q) = \\frac{P(\\text{event} \\cap Q)}{P(Q)}.$$\n- Step 2: The event \"qualified on 2nd throw with > 44m\" is a subset of \"qualified\" (it implies qualification), so the intersection just equals the event itself: $$P(F_1 \\cap [X_2 > 44]) = 0.3821 \\times 0.1587.$$\n- Step 3: Divide by $P(Q) = 1 - 0.3821^3$. Without dividing, you'd be reporting the joint probability — about 6% — not the conditional roughly 6.4%.\n\nTakeaway: conditioning narrows the sample space; the division re-normalises probability over the smaller universe.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": true}, {"question": "For two events $A$ and $B$, what is the addition rule, and why is the intersection subtracted? (3 steps)", "answer": "- Step 1: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B).$$\n- Step 2: Adding $P(A)$ and $P(B)$ counts events in the *overlap* $A \\cap B$ twice — once as part of $A$, once as part of $B$.\n- Step 3: Subtracting $P(A \\cap B)$ removes the double count, leaving each outcome counted exactly once.\n\nVisual: Venn diagram with two overlapping circles — the lens-shaped overlap is the part you'd otherwise double-count.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "What does $P(B \\mid A) = 0.3$ tell you about $P(A \\cap B)$, and what's the typical mistake students make in writing it down? (3 steps)", "answer": "- Step 1: By definition, $P(B|A) = P(A \\cap B)/P(A)$. Rearranging: $$P(A \\cap B) = P(B|A) \\cdot P(A) = 0.3 \\cdot P(A).$$\n- Step 2: So the intersection is $0.3x$ if $P(A) = x$, NOT $0.3y$.\n- Step 3: The classic error is to multiply by the wrong marginal — $0.3 \\cdot P(B)$ — because the letter $B$ appears in $P(B|A)$. But the conditioning event is $A$, so the denominator (and the multiplier in rearrangement) is $P(A)$.\n\nMnemonic: \"multiply by the conditioning event\" — whichever side of the bar.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "What does it mean for events $A$ and $B$ to be **independent**, and what test do you use to verify it numerically? (3 steps)", "answer": "- Step 1: $A$ and $B$ are independent if knowing whether $B$ occurred tells you nothing about whether $A$ will: $P(A|B) = P(A)$ and equivalently $P(B|A) = P(B)$.\n- Step 2: Plugging this into the conditional definition gives the test: $$P(A \\cap B) = P(A) \\cdot P(B).$$\n- Step 3: Compute both sides numerically and compare. Equal ⇒ independent. Unequal ⇒ dependent. State the conclusion in words.\n\nTakeaway: independence is a multiplicative relationship between the intersection and the marginals.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": true}, {"question": "What is the difference between *independent* events and *mutually exclusive* events? Can they coexist? (3 steps)", "answer": "- Step 1: **Mutually exclusive**: $P(A \\cap B) = 0$ — both cannot happen together.\n- Step 2: **Independent**: $P(A \\cap B) = P(A) \\cdot P(B)$ — knowing one doesn't change the chance of the other.\n- Step 3: They can coexist only in the degenerate case where one (or both) events have probability zero. Otherwise, if $A$ and $B$ are both possible *and* mutually exclusive, then knowing $A$ happened tells you $B$ didn't — strongly dependent.\n\nTakeaway: ME and independence are typically *opposite* situations, not the same. The test for one is not the test for the other.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": true}, {"question": "Events $B$ and $C$ are mutually exclusive. How does this simplify $P(B \\cup C)$, and why? (2 steps)", "answer": "- Step 1: General rule: $P(B \\cup C) = P(B) + P(C) - P(B \\cap C)$.\n- Step 2: Mutually exclusive ⇒ $P(B \\cap C) = 0$, so $$P(B \\cup C) = P(B) + P(C).$$ No double-counting because the events can't overlap — Venn circles touch but don't overlap.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "For a discrete random variable, what relationship connects the cumulative distribution function $F(x)$ and the probability mass function $P(X=x)$? (3 steps)", "answer": "- Step 1: $F(x) = P(X \\le x)$ — the running sum of probabilities up to and including $x$.\n- Step 2: To extract individual probabilities, take the **first difference**: $$P(X = x) = F(x) - F(x-1)$$ for consecutive integer-valued $x$ (or, more generally, $F$ at the value minus $F$ at the previous attained value).\n- Step 3: Two boundary conditions: $F$ at the smallest value equals $P(X = \\text{min})$; $F$ at the largest value equals 1 (probabilities sum to 1).\n\nIntuition: $F$ is a staircase; the height of each step is the probability mass at that point.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": true}, {"question": "You're given a discrete CDF $F(x)$ at $x = 1, 2, 3, 4$ in terms of an unknown $k$. What property pins down $k$, and why? (2 steps)", "answer": "- Step 1: The CDF must reach 1 at the largest value: $F(4) = 1$.\n- Step 2: Set the expression for $F(4)$ equal to 1 and solve. E.g. $\\tfrac{k+4}{8} = 1 \\Rightarrow k = 4$. This works because the CDF is a probability that accumulates to certainty by the maximum possible value of $X$.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "For a discrete random variable $X$, how do you compute the variance from a probability table, and why is $E(X^2) - (E(X))^2$ equivalent to the average squared deviation? (3 steps)", "answer": "- Step 1: Direct definition: $\\text{Var}(X) = E[(X - \\mu)^2] = \\sum (x-\\mu)^2 P(X=x)$.\n- Step 2: Expand: $E[(X-\\mu)^2] = E[X^2] - 2\\mu E[X] + \\mu^2 = E[X^2] - 2\\mu^2 + \\mu^2 = E[X^2] - \\mu^2$.\n- Step 3: So $\\text{Var}(X) = E(X^2) - (E(X))^2$. Practically easier because you compute $\\sum x^2 P(X=x)$ and $\\sum x P(X=x)$ once, without referring back to $\\mu$ in every term.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": false}, {"question": "What's the rule for $\\text{Var}(aX + b)$, and why does the constant $b$ disappear while $a$ becomes $a^2$? (3 steps)", "answer": "- Step 1: Adding a constant $b$ shifts every value (and the mean) by $b$, preserving deviations $X - \\mu$. So variance — average squared deviation — is unchanged by $b$.\n- Step 2: Multiplying by $a$ scales deviations by $a$. Squaring them scales by $a^2$. So variance picks up a factor of $a^2$.\n- Step 3: Combining: $\\text{Var}(aX + b) = a^2 \\text{Var}(X)$. For example, $\\text{Var}(13X - 6) = 169 \\text{Var}(X)$ — the $-6$ vanishes.\n\nTakeaway: variance is **translation-invariant** and **quadratic-homogeneous**.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": true}, {"question": "For $E(aX + b)$, what is the rule, and why does the constant survive here but not in variance? (2 steps)", "answer": "- Step 1: $E(aX + b) = aE(X) + b$. Expectation is **linear**, so it passes through sums and scales, and a constant has expectation equal to itself.\n- Step 2: The contrast with variance: variance squares deviations *from the mean*, so any shift cancels out. Expectation just averages values directly, so any shift survives.\n\nTakeaway: linearity preserves both terms; squaring (variance) kills the additive shift.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": true}, {"question": "For a symmetric Normal interval like $P(\\mu - c < X < \\mu + c) = 0.6$, how do you convert this into a one-tail probability for the table lookup? (3 steps)", "answer": "- Step 1: Standardise: $$P\\!\\left(-\\frac{c}{\\sigma} < Z < \\frac{c}{\\sigma}\\right) = 0.6.$$ This is a symmetric interval around 0.\n- Step 2: By symmetry of $N(0,1)$, $$P(-z^* < Z < z^*) = 2\\Phi(z^*) - 1.$$ Setting equal to 0.6: $\\Phi(z^*) = 0.8$.\n- Step 3: Look up $\\Phi^{-1}(0.8) \\approx 0.8416$ in the inverse-normal table. Generalises to $$\\Phi(z^*) = \\frac{1 + c}{2}$$ where $c$ is the two-tail probability.\n\nTakeaway: convert two-tail probability $c$ into one-tail $\\Phi$-value $(1+c)/2$ before looking up.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": true}, {"question": "Why does variance equal 36 imply $\\sigma = 6$ rather than $\\sigma = 36$, and what's the easy mistake?", "answer": "- Step 1: Variance is $\\sigma^2$ by definition. So $\\sigma^2 = 36 \\Rightarrow \\sigma = \\sqrt{36} = 6$.\n- Step 2: The mistake is conflating variance and standard deviation — using 36 directly as a denominator in standardisation. A factor of $\\sqrt{36} = 6$ would be missing, throwing the $z$-value off by a factor of 6.\n\nSanity check: variance has units of \"thing-squared\" while s.d. has units of \"thing\". Always root before standardising.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "Given $\\mu = 3\\sigma$ from standardisation and $2\\mu = 3\\sigma^2$ as a problem constraint, find $\\mu$ and $\\sigma$ conceptually. (3 steps)", "answer": "- Step 1: Substitute $\\mu = 3\\sigma$ into the algebraic relation: $2(3\\sigma) = 3\\sigma^2 \\Rightarrow 6\\sigma = 3\\sigma^2 \\Rightarrow 3\\sigma(\\sigma - 2) = 0$.\n- Step 2: Solutions: $\\sigma = 0$ or $\\sigma = 2$. Reject $\\sigma = 0$ because a standard deviation must be positive (otherwise the distribution is a single point, not a Normal).\n- Step 3: $\\sigma = 2$, then $\\mu = 3 \\cdot 2 = 6$. Always state the rejection explicitly for the mark: \"$\\sigma > 0$, so $\\sigma = 2$\".\n\nTakeaway: when two equations yield a quadratic, expect multiple roots and reject non-physical ones explicitly.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "For a problem requiring two equations in $(x, y)$ from probability statements, what's the strategic order — solve algebraically first, or set both equations up first? (2 steps)", "answer": "- Step 1: Set up **both** equations first, in their cleanest forms (clear decimals if needed). This avoids re-doing work if you make a mistake in one.\n- Step 2: Then align coefficients (e.g. multiply one equation by a constant so a variable's coefficients match), subtract to eliminate, solve, back-substitute. Linear systems are most efficient when you've fully laid them out before pushing algebra.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "What's the difference between an \"interpretation\" mark and a \"calculation\" mark in S1, and why does interpretation often catch students out? (3 steps)", "answer": "- Step 1: Calculation marks reward executing a formula correctly. Interpretation marks reward translating a number into a contextual statement.\n- Step 2: Interpretation answers must contain (a) the context-specific variable name, (b) the units, (c) a per-unit-change statement for gradients or \"lies in/out of the data range\" for reliability.\n- Step 3: Students lose interpretation marks by giving generic statements (\"x increases\", \"the answer is 1.04 marks\") that don't use the specific variables. Treat interpretation marks as their own checklist.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": false}, {"question": "A \"show that\" question gives the target answer (e.g. \"show that $\\sigma = 8.57$\"). Why is it dangerous to write only the final number, even though it's correct? (3 steps)", "answer": "- Step 1: \"Show that\" questions almost always carry method marks (e.g. 2 of 3 marks), with the final answer worth only 1.\n- Step 2: Writing just the answer gets 1 of 3 — you've shown that you *know* the answer but not that you *derived* it.\n- Step 3: Always write at least 3 lines: the formula being used, the substitution, the intermediate value (one extra decimal place to justify rounding), and the rounded answer. This earns all method marks regardless of small arithmetic slips.\n\nTakeaway: \"show that\" rewards traceability, not just correctness.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": true}, {"question": "A target answer is 8.57 to 3 s.f. Why should you quote an intermediate value like 8.5716 before rounding? (2 steps)", "answer": "- Step 1: It demonstrates that the rounding was performed from a more precise value — examiners want evidence that the rounding direction was justified (8.5716 rounds *up* to 8.57 because the next digit is 1; not from 8.567 which would round differently).\n- Step 2: Quoting one extra significant figure also guards against transcription errors: if the candidate's working really gives 8.572 (truncated), an examiner can see it.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": true}, {"question": "In S1, when computing standard deviation, why is the formula $\\sigma = \\sqrt{S_{xx}/n}$ used rather than the sample version $\\sqrt{S_{xx}/(n-1)}$? (2 steps)", "answer": "- Step 1: S1 treats the given data as the entire **population** of interest (not a sample from a larger group), so it uses the population formula with denominator $n$.\n- Step 2: The sample s.d. with $n - 1$ (Bessel's correction) is used in inferential statistics when estimating a population's spread from a sample. S1 does not require this; always use $n$.\n\nSanity: a calculator's \"$\\sigma_n$\" or \"Pop SD\" button corresponds to the S1 formula.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": false}, {"question": "Quickly: in $u = 0.5(x - 32)$, by what factor does the s.d. scale, and what happens to the mean if $\\bar{x} = 60$? (2 steps)", "answer": "- Step 1: The multiplier on $x$ is 0.5, so $\\sigma_u = 0.5 \\sigma_x$. The shift $-32$ doesn't affect s.d.\n- Step 2: The mean transforms fully: $\\bar{u} = 0.5(60 - 32) = 0.5 \\cdot 28 = 14$.\n\nMemory: shifts only touch the mean; multipliers touch both (and square for variance).", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": false}, {"question": "A discrete random variable $X$ has $\\text{Var}(X) = 4$. Mentally compute $\\text{Var}(5X + 7)$ and $\\text{Var}(-2X + 10)$. (2 steps)", "answer": "- Step 1: $\\text{Var}(5X + 7) = 5^2 \\cdot 4 = 100$. The $+7$ is irrelevant.\n- Step 2: $\\text{Var}(-2X + 10) = (-2)^2 \\cdot 4 = 16$. The negative sign of the multiplier disappears under squaring; the $+10$ is irrelevant.\n\nVariance is always non-negative — squared multipliers ensure this.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": false}, {"question": "A four-valued discrete random variable has probabilities $\\tfrac{2}{26}, \\tfrac{5}{26}, \\tfrac{6}{26}, \\tfrac{13}{26}$ at $x = 1, 2, 3, 4$. Why is the mode 4, and how would you describe the shape of this distribution?", "answer": "- Step 1: The mode is the value with the **largest probability**. Here $\\tfrac{13}{26}$ at $x = 4$ is biggest.\n- Step 2: The probabilities increase monotonically from $x = 1$ to $x = 4$, so the distribution is *right-heavy* — most weight at the top end.\n- Step 3: This implies the mean would be closer to 4 than to 1, and skew would be **negative** (long tail on the left, mean dragged below mode).", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": false}, {"question": "In any probability question with conditional phrasing, what is the single most important habit to develop before computing? (2 steps)", "answer": "- Step 1: As soon as you see \"given that $B$\", write $$P(A | B) = \\frac{P(A \\cap B)}{P(B)}$$ on the page — even before reading the rest of the question.\n- Step 2: This forces you to identify both the numerator (joint, the intersection) and the denominator (the conditioning event) explicitly, eliminating the most common S1 error: returning a joint probability where a conditional was demanded.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": false}, {"question": "Why do you cross-check the marginal probability $P(R)$ on a tree by complement (1 - P(L)) and by direct summation, even when both routes ought to give the same answer? (2 steps)", "answer": "- Step 1: A mismatch flags an arithmetic slip — either in the L-branch sum (forgot to multiply by year-group probability) or in the assumption that complementary events were properly identified.\n- Step 2: Catching the error before submitting is essentially a free correction; the cost is one minute, the reward can be 2+ marks. Under exam pressure, redundant verification beats clever shortcuts.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": true}, {"question": "Why might mean and median be very close in some data sets but differ noticeably in others? Give the conceptual reason and an example. (3 steps)", "answer": "- Step 1: Mean and median coincide when the distribution is **symmetric around its centre** — every value above the centre has a mirror below, so they cancel in the mean.\n- Step 2: In skewed distributions, the tail pulls the mean but not the median. Heavier tail ⇒ bigger gap between mean and median.\n- Step 3: Example: income distributions are right-skewed (a few very high earners), so the mean income is much higher than the median. Symmetric distributions like ideal Normal have mean = median.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": true}, {"question": "Quick exercise: a histogram has a bar with frequency density 8 over class $[5, 9)$. What is the frequency of that class? (1 step)", "answer": "- Step 1: $$\\text{frequency} = \\text{fd} \\times \\text{width} = 8 \\times 4 = 32.$$ Class width is $9 - 5 = 4$.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": false}, {"question": "A class $[9, 13)$ has 152 plants. You want the count between 10 and 13 assuming uniform distribution within the class. How many plants? (2 steps)", "answer": "- Step 1: Overlap width: $13 - 10 = 3$. Total class width: $13 - 9 = 4$. Proportion: $\\tfrac{3}{4}$.\n- Step 2: Count: $\\tfrac{3}{4} \\times 152 = 114$ plants.", "source": "Opus 4.7 ①", "_id": "opus_1_55", "judge_pick": false}, {"question": "Why is it important to convert the two-tail probability before consulting the standard normal table, and not just look up 0.6 directly?", "answer": "- Step 1: The standard table $\\Phi(z) = P(Z \\le z)$ is a *cumulative* (one-tail-left) table. Looking up 0.6 directly returns the $z$ for which $P(Z \\le z) = 0.6$, which is roughly 0.25 — not what was asked.\n- Step 2: For a symmetric two-tail probability $c$, you need $\\Phi(z) = (1+c)/2$, the probability below the upper bound including the left tail. Skipping this conversion is a classic table-reading error.", "source": "Opus 4.7 ①", "_id": "opus_1_56", "judge_pick": false}, {"question": "What's the conceptual difference between \"$z = 1.5$ gives a probability of 0.9332\" and \"the 93.32nd percentile of $N(0,1)$ is 1.5\"? (2 steps)", "answer": "- Step 1: Both statements are the same fact, read in opposite directions. The first uses the $\\Phi$ table forward ($z \\to$ probability); the second uses the inverse table ($\\text{probability} \\to z$).\n- Step 2: In S1 problems: \"find $P(X < c)$\" uses the forward direction; \"find $c$ such that $P(X < c) = p$\" uses the inverse direction. Knowing the same fact both ways saves table-flipping time.", "source": "Opus 4.7 ①", "_id": "opus_1_57", "judge_pick": false}, {"question": "Conceptual exercise: $X \\sim N(10, 4)$ (mean 10, variance 4). Without a table, roughly how much probability lies in $[6, 14]$?", "answer": "- Step 1: $\\sigma = 2$, so $[6, 14]$ corresponds to $\\mu \\pm 2\\sigma$.\n- Step 2: For a Normal distribution, the \"empirical rule\" gives $P(\\mu - 2\\sigma < X < \\mu + 2\\sigma) \\approx 0.95$.\n\nThe 68-95-99.7 rule (1σ ~68%, 2σ ~95%, 3σ ~99.7%) is a useful mental sanity check for any Normal answer.", "source": "Opus 4.7 ①", "_id": "opus_1_58", "judge_pick": false}, {"question": "What does it mean intuitively if a regression of $y$ on $x$ has $r = 0.85$? How does this relate to $r^2$? (3 steps)", "answer": "- Step 1: $r = 0.85$ indicates a **strong positive linear relationship** — as $x$ increases, $y$ tends to increase, and points cluster tightly around an upward-sloping line.\n- Step 2: $r^2 = 0.72$, the **coefficient of determination**, gives the fraction of the variance in $y$ \"explained\" by the linear regression on $x$.\n- Step 3: So roughly 72% of the variability in $y$ is accounted for by knowing $x$; the remaining 28% is residual (other factors, noise). $r$ near 1 means the line explains most of the data's variability.", "source": "Opus 4.7 ①", "_id": "opus_1_59", "judge_pick": false}], "count": 60}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "In a histogram, how do you convert a bar's visual height into the frequency count it represents, and why does this work?", "answer": "- Step 1: The vertical axis of a histogram is frequency density (fd), defined as $$\\text{fd} = \\frac{\\text{frequency}}{\\text{class width}}$$, so the *area* of each bar (height × width) equals the frequency.\n- Step 2: To extract a frequency, read the fd off the axis and multiply by the class width: $$\\text{frequency} = \\text{fd} \\times w$$.\n- Step 3: This works because histograms are designed so that equal areas represent equal counts — this is what makes them valid for unequal class widths, unlike bar charts.\n\nThe area-equals-frequency principle is what distinguishes a histogram from a bar chart.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": true}, {"question": "A class $$13 \\le h < 15$$ has frequency density 60. What is its frequency, and what does the value 60 mean physically? (2 steps)", "answer": "- Step 1: Class width is $$15 - 13 = 2$$, so frequency $$= 60 \\times 2 = 120$$.\n- Step 2: The fd of 60 means \"60 plants per 1 cm of height\" — it is a *density*, like mass per unit volume. Multiplying by the width (cm) gives the actual count (plants).", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "For grouped data with total frequency $$n$$, how do you locate the median using interpolation, and what assumption underlies this method? (3 steps)", "answer": "- Step 1: Find the position $$n/2$$, then use cumulative frequencies to identify the *median class* — the class where the running total first reaches or exceeds $$n/2$$.\n- Step 2: Apply $$\\text{Median} = L + \\frac{(n/2) - F_{<}}{f_{\\text{class}}} \\times w$$, where $$L$$ is the lower bound of the median class, $$F_{<}$$ is the cumulative frequency *below* the class, $$f_{\\text{class}}$$ is the class frequency, and $$w$$ is its width.\n- Step 3: The underlying assumption is that data are *uniformly distributed within each class*, so we can linearly interpolate the position of the median across the class.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "How do you compare mean and median to determine the direction of skew, and what is the intuition? (2 steps)", "answer": "- Step 1: If **mean < median**, the data are **negatively skewed** (long tail to the left); if **mean > median**, **positively skewed** (long tail to the right); if equal, symmetric.\n- Step 2: Intuition — the mean is pulled toward extreme values, while the median is robust. A long left tail drags the mean below the median; a long right tail drags it above. The mean \"chases the tail\".", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "A histogram has classes $$[5,9), [9,13), [13,15), \\ldots$$ with frequencies 32, 152, 120. To estimate the probability a plant has height between 8 cm and 14 cm, what is the conceptual difficulty, and how is it resolved? (3 steps)", "answer": "- Step 1: The boundaries 8 and 14 cut *through the middle* of existing classes — 8 is inside $$[5,9)$$ and 14 is inside $$[13,15)$$. You cannot just sum whole-class frequencies.\n- Step 2: Assume uniform distribution within each class. Take the fraction of each affected class that lies in the desired range:\n+ From $$[5,9)$$: the part $$[8,9)$$ has width 1 out of 4 → $$\\frac{1}{4} \\times 32 = 8$$.\n+ All of $$[9,13)$$: 152.\n+ From $$[13,15)$$: the part $$[13,14)$$ has width 1 out of 2 → $$\\frac{1}{2} \\times 120 = 60$$.\n- Step 3: Sum to estimate the count in $$[8,14)$$: $$8 + 152 + 60 = 220$$. Then divide by $$n$$ for the probability.\n\nThe trap is treating the question as \"sum whole classes\" — it's a proportional-split problem.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "Two plants are chosen at random *without replacement* from 408 plants, of which 220 satisfy a condition. How do you compute the probability that both satisfy the condition, and why does this differ from the with-replacement case? (2 steps)", "answer": "- Step 1: Without replacement: $$P(\\text{both}) = \\frac{220}{408} \\times \\frac{219}{407}$$. After the first success, both the favourable count and the total drop by 1.\n- Step 2: With replacement would give $$\\left(\\frac{220}{408}\\right)^2$$, which is slightly larger because the second draw isn't \"depleted\". The difference matters when the sample size is small relative to the population.\n\nThe trigger word \"two plants chosen\" with no replacement signal should default to without-replacement unless explicitly stated.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "For a discrete dataset of size $$n$$, how do you find the positions of $$Q_1$$ and $$Q_3$$, and what do you do if the position is non-integer? (2 steps)", "answer": "- Step 1: $$Q_1$$ position is $$(n+1)/4$$; $$Q_3$$ position is $$3(n+1)/4$$ (median at $$(n+1)/2$$).\n- Step 2: If integer, take that value from the sorted data; if non-integer (e.g. position 3.25), interpolate linearly between the surrounding two values. For $$n = 11$$, both positions are integer (3 and 9), making the calculation clean.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "State the outlier rule using quartiles, and explain why it uses 1.5 × IQR rather than some other multiplier.", "answer": "A value $$x$$ is an outlier if $$x > Q_3 + 1.5(Q_3 - Q_1)$$ or $$x < Q_1 - 1.5(Q_3 - Q_1)$$. The middle 50% of data span the IQR; extending 1.5 IQRs beyond captures roughly 99% of a normally distributed dataset, so points outside this fence are unusually far from the central bulk. The 1.5 factor is a convention (due to Tukey) chosen to be lenient enough not to flag too many normal points, but strict enough to highlight genuine extremes.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": true}, {"question": "Spanish marks sorted are $$16, 24, 28, 32, 36, 38, 44, 48, 48, 68, 90$$ ($$n=11$$). Walk through whether 90 is an outlier. (3 steps)", "answer": "- Step 1: With $$n=11$$, $$Q_1$$ is at position $$\\frac{12}{4}=3$$, so $$Q_1=28$$; $$Q_3$$ at position $$\\frac{36}{4}=9$$, so $$Q_3=48$$.\n- Step 2: Upper fence: $$Q_3 + 1.5(Q_3 - Q_1) = 48 + 1.5 \\times 20 = 78$$.\n- Step 3: Since $$90 > 78$$, the value lies above the fence, so 90 *is* an outlier.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "What is the formula for $$S_{xx}$$ as a computational shortcut from raw sums, and why is this form preferred?", "answer": "$$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$. This is algebraically equivalent to $$\\sum (x_i - \\bar{x})^2$$ but avoids subtracting the mean from each value — you only need the totals $$\\sum x$$ and $$\\sum x^2$$. It is faster, less error-prone, and the form in which summary statistics are typically presented in exams.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "Given $$\\sum x = 862$$, $$\\sum x^2 = 62802$$, $$n=12$$, conceptually outline how you'd find the standard deviation of $$x$$. (3 steps)", "answer": "- Step 1: Compute $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$ — this is the \"sum of squared deviations\".\n- Step 2: Divide by $$n$$ (population formula, used in S1) to get the variance: $$\\sigma_x^2 = S_{xx}/n$$.\n- Step 3: Take the square root: $$\\sigma_x = \\sqrt{S_{xx}/n}$$. Quote one extra decimal before rounding so the requested 3 s.f. is justified.\n\nS1 uses population s.d. (denominator $$n$$), *not* sample s.d. (denominator $$n-1$$).", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "State the formula for the product moment correlation coefficient (PMCC) in terms of $$S_{xx}, S_{yy}, S_{xy}$$, and explain what makes its value range $$[-1, 1]$$.", "answer": "$$r = \\frac{S_{xy}}{\\sqrt{S_{xx} S_{yy}}}$$. The denominator is essentially the product of the spreads of $$x$$ and $$y$$, while $$S_{xy}$$ measures their co-variation. By the Cauchy–Schwarz inequality, $$|S_{xy}| \\le \\sqrt{S_{xx} S_{yy}}$$ with equality iff the points are exactly collinear, forcing $$|r| \\le 1$$.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "Under the linear coding $$u = a + bx$$, how do the mean and standard deviation of $$x$$ transform, and why do additive constants leave the spread unchanged? (2 steps)", "answer": "- Step 1: Mean transforms fully: $$\\bar{u} = a + b\\bar{x}$$. The shift $$a$$ and the stretch $$b$$ both feed through.\n- Step 2: Standard deviation transforms only by the multiplicative factor: $$\\sigma_u = |b|\\sigma_x$$. The shift $$a$$ moves *every* data point by the same amount — distances between points are preserved, so spread is unchanged. Only the stretch factor $$|b|$$ rescales distances.\n\nVariance picks up $$b^2$$: $$\\operatorname{Var}(u) = b^2 \\operatorname{Var}(x)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": true}, {"question": "The mean Fahrenheit minimum is 71.8°F with s.d. 8.57°F. Using $$c = \\frac{5}{9}(f - 32)$$, find the mean and s.d. in °C conceptually. (2 steps)", "answer": "- Step 1: Mean: apply the formula directly: $$\\bar{c} = \\frac{5}{9}(71.8 - 32) \\approx 22.1$$°C. Both shift and scale act on the mean.\n- Step 2: S.d.: only the multiplicative factor $$\\frac{5}{9}$$ acts; the $$-32$$ is a shift and drops out: $$\\sigma_c = \\frac{5}{9} \\times 8.57 \\approx 4.76$$°C.\n\nThe common pitfall is mistakenly subtracting 32 from the s.d. as well — that would compress the spread artificially.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "If $$u = a + bx$$ and $$v = c + dy$$ with $$b, d > 0$$, what happens to the PMCC between $$u$$ and $$v$$ compared to that between $$x$$ and $$y$$, and why? (2 steps)", "answer": "- Step 1: The PMCC is *unchanged*: $$r_{u,v} = r_{x,y}$$. Linear coding shifts and rescales points, but does not alter the *pattern* of co-variation.\n- Step 2: The shifts $$a, c$$ cancel in deviations $$(x - \\bar{x})$$; the positive scalings $$b, d$$ multiply numerator and denominator equally and cancel in the ratio. If either scaling were negative, the sign of $$r$$ would flip.\n\nThe full mark for \"state the PMCC and give a reason\" requires both the numerical value *and* the invariance argument.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "Why does S1 use the population standard deviation formula (denominator $$n$$) rather than the sample formula (denominator $$n-1$$)?", "answer": "S1 treats the given data as the *entire population* of interest, not a sample drawn to estimate a wider population's spread. The $$n-1$$ correction (Bessel's correction) is needed only when estimating an unknown population s.d. from a sample — and the unbiased correction belongs to inferential statistics, beyond the S1 syllabus. Using $$n$$ is consistent with treating the data as fully observed.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": true}, {"question": "State the conditional probability formula and explain why the conditioning event sits in the denominator. (2 steps)", "answer": "- Step 1: $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$.\n- Step 2: Conditioning on $$B$$ means restricting attention to the sub-universe where $$B$$ has occurred. The denominator $$P(B)$$ renormalises probabilities so they sum to 1 within this restricted universe. The numerator $$P(A \\cap B)$$ is the portion of $$B$$'s \"world\" that *also* contains $$A$$. So $$P(A|B)$$ asks: of all $$B$$-outcomes, what fraction are also $$A$$-outcomes?\n\nThis is the single most exam-load-bearing formula in S1 conditional questions.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": true}, {"question": "What is the common trap that distinguishes $$P(A \\cap B)$$ from $$P(A \\mid B)$$, and what English phrase signals which one is being asked? (2 steps)", "answer": "- Step 1: $$P(A \\cap B)$$ is the probability that *both* $$A$$ and $$B$$ occur from the full sample space. $$P(A \\mid B)$$ is the probability of $$A$$ *assuming* $$B$$ has occurred — restricted sample space.\n- Step 2: The phrase \"**given that** $$B$$\" forces conditional probability — you must divide by $$P(B)$$. Without that phrase, \"the probability that $$A$$ and $$B$$\" gives the joint $$P(A \\cap B)$$.\n\nTrigger habit: when you see \"given that\", write the formula $$P(A|B) = P(A \\cap B)/P(B)$$ on the page *before* computing anything.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "On a tree with Year 12 probability $$p$$ and Year 13 probability $$1-p$$, with $$P(L|Y12)=\\frac{1}{8}$$ and $$P(L|Y13)=\\frac{1}{10}$$, conceptually how do you find $$p$$ given $$P(L) = 0.11$$? (2 steps)", "answer": "- Step 1: Use the law of total probability: $$P(L) = P(L|Y12)P(Y12) + P(L|Y13)P(Y13) = \\frac{1}{8}p + \\frac{1}{10}(1-p)$$.\n- Step 2: Set equal to 0.11 and solve a linear equation for $$p$$. Multiplying through by the common denominator (here 80) clears fractions and gives a clean integer equation.\n\nThis is the standard \"total probability across a tree\" reasoning — sum the products along each path that ends in $$L$$.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "To compute $$P(Y12 \\mid R)$$ on a tree where $$p = 0.4$$, $$P(R|Y12) = 7/8$$, $$P(R|Y13) = 9/10$$, walk through the full conditional reasoning. (3 steps)", "answer": "- Step 1: Numerator (joint): $$P(Y12 \\cap R) = p \\times P(R|Y12) = \\frac{2}{5} \\times \\frac{7}{8} = \\frac{7}{20}$$. This is the *along-the-tree* product.\n- Step 2: Denominator: $$P(R) = 1 - P(L) = 1 - 0.11 = 0.89$$. Cross-check with direct sum: $$\\frac{2}{5}\\cdot\\frac{7}{8} + \\frac{3}{5}\\cdot\\frac{9}{10} = \\frac{35}{100} + \\frac{54}{100} = 0.89$$ ✓.\n- Step 3: Divide: $$P(Y12|R) = \\frac{7/20}{0.89} = \\frac{35}{89} \\approx 0.393$$.\n\nCritical: $$\\frac{7}{20}$$ alone is $$P(Y12 \\cap R)$$, *not* the conditional answer. Forgetting the denominator is the #1 exam error here.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "Why is it good practice to compute $$P(B)$$ (the denominator of a conditional probability) by *two* routes — complement and direct sum?", "answer": "It is an arithmetic safety check. The complement route ($$P(R) = 1 - P(L)$$) and the direct route (sum of all $$R$$-branch products along the tree) must agree. If they don't, you've made an arithmetic slip somewhere — most commonly in the branch multiplications. Catching this *before* dividing prevents propagating an error into the final answer.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "State the least-squares regression formulas for the line $$y = a + bx$$, and explain conceptually what each minimises. (2 steps)", "answer": "- Step 1: $$b = \\frac{S_{xy}}{S_{xx}}$$ and $$a = \\bar{y} - b\\bar{x}$$.\n- Step 2: These minimise the sum of squared *vertical* residuals $$\\sum (y_i - \\hat{y}_i)^2$$ — i.e., we are predicting $$y$$ from $$x$$, so errors are measured along the $$y$$-direction. The formula for $$a$$ guarantees the line passes through the centroid $$(\\bar{x}, \\bar{y})$$.\n\nThe regression of $$y$$ on $$x$$ is *different* from the regression of $$x$$ on $$y$$ — the asymmetry comes from which residual is being squared.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": true}, {"question": "Given the regression line $$s = -5.72 + 1.04f$$ for marks in Spanish on French, how do you give the proper exam interpretation of the gradient?", "answer": "\"For each additional mark scored in the French test, the predicted Spanish mark increases by approximately 1.04 marks.\" The interpretation requires three components: (i) the *unit change* in $$x$$ (\"each additional French mark\"), (ii) the *contextual variable name* (not just \"$$y$$\" but \"Spanish mark\"), and (iii) the word \"predicted\" or \"estimated\" — because the regression line is a model, not an exact relationship. Saying \"the gradient is 1.04\" alone earns 0 marks.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "What is the distinction between interpolation and extrapolation in regression, and why is one more reliable than the other? (3 steps)", "answer": "- Step 1: *Interpolation* = using the regression line to predict $$y$$ for an $$x$$ value *inside* the range of the observed data.\n- Step 2: *Extrapolation* = predicting $$y$$ for an $$x$$ *outside* that range.\n- Step 3: Interpolation is reliable because we have evidence the linear relationship holds in that region. Extrapolation is unreliable because the linear pattern may not continue — the underlying relationship could curve, flatten, or break entirely outside the sampled region.\n\nThe exam phrasing must include \"interpolation\" vs \"extrapolation\" plus the explicit data range.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "Given French marks ranging $$24 \\le f \\le 68$$, classify predictions at $$f=55$$ and $$f=18$$, and state which is more reliable. (2 steps)", "answer": "- Step 1: $$f=55$$ lies inside $$[24,68]$$ → interpolation; $$f=18$$ lies outside (below 24) → extrapolation.\n- Step 2: The prediction at $$f=55$$ is more reliable because the linear model has been validated on observations near 55. At $$f=18$$ we have no data supporting the linear assumption — the predicted Spanish mark could be far off.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "When using a sample mean and sum of squares to fit a regression line, why might the *intercept* $$a$$ end up negative even when both $$x$$ and $$y$$ values are positive?", "answer": "The intercept is $$a = \\bar{y} - b\\bar{x}$$. If $$b\\bar{x} > \\bar{y}$$, then $$a < 0$$. Geometrically, this means the regression line, when extended back to $$x = 0$$, drops below the $$y$$-axis — even though no actual data point has $$x = 0$$. The intercept is an *extrapolation*; its sign reflects the geometry of where the fitted line crosses the $$y$$-axis, not the sign of the data. This is exactly why predicting at $$x = 0$$ from a line fitted on positive $$x$$ values is suspect.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": true}, {"question": "State the standardisation formula for a normal variable and explain its purpose. (2 steps)", "answer": "- Step 1: If $$X \\sim N(\\mu, \\sigma^2)$$, then $$Z = \\frac{X - \\mu}{\\sigma} \\sim N(0, 1)$$.\n- Step 2: This transforms any normal variable into the *standard* normal $$Z$$, whose probabilities are tabulated. Subtracting $$\\mu$$ centres the distribution on 0; dividing by $$\\sigma$$ rescales to unit spread. We then read $$\\Phi(z) = P(Z < z)$$ from tables.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": true}, {"question": "For $$X \\sim N(40, 4^2)$$, conceptually find $$P(X < 38.8)$$. (3 steps)", "answer": "- Step 1: Standardise: $$z = \\frac{38.8 - 40}{4} = -0.30$$. The value is 0.3 s.d. below the mean.\n- Step 2: $$P(Z < -0.30)$$. By symmetry of $$Z$$, $$P(Z < -0.30) = 1 - \\Phi(0.30)$$.\n- Step 3: Look up $$\\Phi(0.30) \\approx 0.6179$$, so $$P(X < 38.8) \\approx 0.3821$$.\n\nFor negative $$z$$, always convert via symmetry: $$\\Phi(-z) = 1 - \\Phi(z)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": true}, {"question": "What is the \"at least one success in $$n$$ independent trials\" formula, and why is the complement approach preferred over direct summation? (2 steps)", "answer": "- Step 1: $$P(\\text{at least one success}) = 1 - P(\\text{all fail}) = 1 - q^n$$, where $$q$$ is the per-trial failure probability.\n- Step 2: Direct summation would require adding $$P(\\text{exactly 1}) + P(\\text{exactly 2}) + \\ldots + P(\\text{exactly }n)$$ — many terms, each itself a sum over positions. The complement collapses this to a single product $$q^n$$, much faster and less error-prone.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "An athlete has 3 independent throw attempts; each succeeds (clears 38.8 m) with probability 0.6179. Find $$P(\\text{qualifies}) = P(\\text{at least one succeeds})$$ conceptually.", "answer": "$$P(\\text{qualifies}) = 1 - P(\\text{all 3 fail}) = 1 - (0.3821)^3 \\approx 1 - 0.0558 \\approx 0.944$$. The complement is essential here because the qualifying event spans three mutually-exclusive sub-cases (success on throw 1, success on throw 2 only, success on throw 3 only), each a different product. The complement collapses all three into a single calculation.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "Conceptually compute $$P(\\text{qualified on 2nd throw with distance} > 44 \\mid \\text{qualified})$$ given $$P(\\text{fail}) = 0.3821$$, $$P(X > 44) = 0.1587$$, $$P(\\text{qualifies}) = 0.944$$. (3 steps)", "answer": "- Step 1: Numerator = joint probability of \"throw 1 fails AND throw 2 exceeds 44 m\". Since a throw $$> 44$$ automatically clears 38.8 m, success on throw 2 is automatic. By independence: $$P(F_1) \\times P(X_2 > 44) = 0.3821 \\times 0.1587 \\approx 0.0606$$.\n- Step 2: Denominator = $$P(\\text{qualifies}) = 0.944$$.\n- Step 3: Divide: $$\\approx \\frac{0.0606}{0.944} \\approx 0.0642$$.\n\nThe favourable event (throw 1 fails, throw 2 > 44) is a subset of \"qualifies\", so the intersection equals the favourable event itself — no extra work needed there.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "In the discus question, why don't we need to consider throw 3 at all when computing \"qualified on the 2nd throw\"?", "answer": "The problem states the athlete stops as soon as they qualify. \"Qualified on the 2nd throw\" means *exactly* the event \"throw 1 failed AND throw 2 succeeded\" — throw 3 is never used. Including any throw-3 probability would conflate \"qualified on 2nd\" with \"qualified on 2nd or later\", which is a different event. The stopping rule keeps the event clean.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "Why is the event \"throw 2 exceeds 44 m\" *already* a success on throw 2, and what would be the error of treating these as two separate conditions to multiply?", "answer": "A throw exceeding 44 m automatically clears 38.8 m (the qualifying threshold), so $$X > 44 \\implies X > 38.8$$. The event $$\\{X_2 > 44\\}$$ is a *subset* of $$\\{X_2 > 38.8\\}$$. Multiplying $$P(X_2 > 38.8) \\times P(X_2 > 44)$$ would be wrong: it double-counts the constraint, treating one event as if it were two independent conditions when in fact they nest.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "State the addition rule for two events and the special case for mutually exclusive events. (2 steps)", "answer": "- Step 1: General: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$. The intersection is subtracted to avoid double-counting outcomes in both.\n- Step 2: If $$A$$ and $$B$$ are mutually exclusive (cannot both happen), $$P(A \\cap B) = 0$$, so $$P(A \\cup B) = P(A) + P(B)$$. No double-counting issue arises.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "What is the formal condition for two events $$A$$ and $$B$$ to be statistically independent, and why is it stated in terms of $$\\cap$$ rather than $$\\cup$$? (2 steps)", "answer": "- Step 1: $$A$$ and $$B$$ are independent iff $$P(A \\cap B) = P(A) \\cdot P(B)$$.\n- Step 2: Independence is about *non-interference*: knowing $$B$$ has occurred doesn't change the probability of $$A$$. The intersection captures their joint occurrence, and the product condition says the joint probability \"factorises\" exactly as if the events lived in separate, unrelated worlds. The union is the wrong object — its formula always involves $$P(A \\cap B)$$ subtracted off, regardless of independence.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "Contrast \"mutually exclusive\" with \"independent\" — why can two events with non-zero probabilities never be both?", "answer": "Mutually exclusive means $$P(A \\cap B) = 0$$. Independent means $$P(A \\cap B) = P(A)P(B)$$. If both held simultaneously, we'd need $$P(A)P(B) = 0$$, forcing at least one of $$P(A), P(B)$$ to be zero. So for events with $$P(A), P(B) > 0$$, mutually exclusive and independent are *opposites*: mutually exclusive means maximum interference (one happening rules out the other), while independence means no interference at all.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": true}, {"question": "Given $$P(A) = x$$, $$P(B) = y$$, $$P(A \\cup B) = 0.65$$, $$P(B|A) = 0.3$$, conceptually derive a linear equation in $$x$$ and $$y$$. (3 steps)", "answer": "- Step 1: From $$P(B|A) = P(A \\cap B)/P(A) = 0.3$$, multiply through: $$P(A \\cap B) = 0.3 P(A) = 0.3x$$.\n- Step 2: Apply the addition rule: $$0.65 = x + y - 0.3x = 0.7x + y$$.\n- Step 3: Clear decimals (multiply by 20): $$13 = 14x + 20y$$.\n\nNote the conditioning direction: $$P(B|A)$$ means \"A in the denominator\", so $$P(A \\cap B) = 0.3 \\times x$$ (not $$0.3y$$).", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "Given $$B$$ and $$C$$ are mutually exclusive with $$P(B \\cup C) = 0.85$$ and $$P(C) = \\tfrac{1}{2}x + y$$, derive a linear equation in $$x$$ and $$y$$. (2 steps)", "answer": "- Step 1: Mutually exclusive ⇒ $$P(B \\cup C) = P(B) + P(C) = y + (\\tfrac{1}{2}x + y) = \\tfrac{1}{2}x + 2y$$.\n- Step 2: Set equal to 0.85: $$\\tfrac{1}{2}x + 2y = 0.85$$, or equivalently $$x + 4y = 1.7$$.\n\nThe key step is recognising that mutually exclusive collapses the union formula by killing the intersection term.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "After solving simultaneous equations and finding $$x = 0.5$$, $$y = 0.3$$, with $$P(A \\cap B) = 0.3x = 0.15$$, are $$A$$ and $$B$$ independent? Conceptually justify. (3 steps)", "answer": "- Step 1: Compute $$P(A) \\cdot P(B) = 0.5 \\times 0.3 = 0.15$$.\n- Step 2: Compute $$P(A \\cap B) = 0.3x = 0.15$$ (from the given $$P(B|A) = 0.3$$ relation).\n- Step 3: Since $$P(A \\cap B) = P(A)P(B)$$, the events satisfy the independence condition — they *are* statistically independent.\n\nThe exam requires both values shown numerically *and* the conclusion stated in words.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "For a discrete random variable, what is the relationship between the cumulative distribution function $$F(x)$$ and the probability mass function $$P(X = x)$$? (2 steps)", "answer": "- Step 1: $$F(x) = P(X \\le x) = \\sum_{x_i \\le x} P(X = x_i)$$ — the running total of probabilities up to and including $$x$$.\n- Step 2: To recover the pmf: $$P(X = x_i) = F(x_i) - F(x_{i-1})$$, the *increment* in the CDF. This is the discrete analogue of differentiating the CDF for continuous variables.\n\nThe CDF must satisfy $$F(x_{\\max}) = 1$$ (all probability accumulated) — this is often used to solve for unknown constants.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": true}, {"question": "A CDF for a discrete RV is given as $$F(4) = (k+4)/8$$ with $$F(4)$$ being the final value. How do you find $$k$$?", "answer": "Since $$F$$ is a valid CDF and $$x = 4$$ is the maximum value, $$F(4) = 1$$. So $$\\frac{k+4}{8} = 1 \\Rightarrow k = 4$$. This is the most common technique for finding constants in discrete CDFs — exploit that the total probability equals 1 at the top end.", "source": "
