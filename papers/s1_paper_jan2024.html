.\n+ $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$ is always calculated the same way, but the final division by $$n$$ (not $$n-1$$) is critical for S1.\n\nUnless explicitly told otherwise or using a calculator's sample mode (which often defaults to $$n-1$$), S1 questions require dividing by $$n$$ for variance and standard deviation.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "S1 Jan 2024 Q2(c) — When applying a linear coding formula like $$c = \\frac{5}{9}(f - 32)$$ to a dataset, how is the standard deviation affected by the additive part ($$-32$$) and the multiplicative part ($$\\times \\frac{5}{9}$$)? (2 steps)", "answer": "- Step 1: The additive constant ($$-32$$) has **no effect** on the standard deviation. Adding or subtracting a constant shifts all data points equally, preserving the spread.\n- Step 2: The multiplicative constant ($$\\frac{5}{9}$$) **scales** the standard deviation. The new standard deviation is $$|\\frac{5}{9}| \\times \\sigma_f$$.\n+ For variance, the multiplicative constant is squared: $$\\operatorname{Var}(c) = (\\frac{5}{9})^2 \\operatorname{Var}(f)$$.\n\nAdditive shifts change location (mean) but not spread (s.d./variance); multiplicative scales change both location and spread.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "S1 Jan 2024 Q2(d) — If variables $$x$$ and $$y$$ are linearly coded to $$u$$ and $$v$$ (e.g., converting °F to °C), what happens to the product moment correlation coefficient (PMCC), and under what condition? (2 steps)", "answer": "- Step 1: The PMCC remains **unchanged** ($$r_{u,v} = r_{x,y}$$).\n- Step 2: This holds true as long as the linear coding on both variables uses **positive** multipliers. If one multiplier is negative, the sign of $$r$$ flips.\n+ Linear coding (adding/subtracting, multiplying/dividing) changes the scale and origin but does not change the strength or direction of the linear relationship between the variables, provided the scaling doesn't reverse the direction (negative multiplier).\n\nPMCC is invariant to positive linear transformations because correlation measures the *pattern* of scatter, not the units or origin.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": true}, {"question": "S1 Jan 2024 Q3(d) — What is the critical trigger phrase in a probability question that forces you to use the conditional probability formula, and what is the most common mistake when encountering it? (2 steps)", "answer": "- Step 1: The trigger phrase is **\"given that\"** (or sometimes \"if\").\n- Step 2: The most common mistake is calculating and reporting the **joint probability** $$P(A \\cap B)$$ instead of the **conditional probability** $$P(A \\mid B)$$.\n+ When you see \"given that\", you must immediately write down the formula $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$ before doing any calculations.\n\n\"Given that\" means you are restricting your universe to a subset; you must divide by the probability of that subset.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "S1 Jan 2024 Q3(d) — When you see \"find the probability that a student is in Year 12 given that they are right-handed\", what formula must you write down immediately, and where does the denominator come from? (2 steps)", "answer": "- Step 1: Write down $$P(\\text{Y12} \\mid R) = \\frac{P(\\text{Y12} \\cap R)}{P(R)}$$\n- Step 2: The numerator is the probability of being in Year 12 AND right-handed. The denominator $$P(R)$$ is the total probability of being right-handed, which can be found by summing the \"right-handed\" branches on the tree or by using the complement $$1 - P(L)$$.\n+ Always compute the denominator carefully; it is the total probability of the conditioning event.\n\nThe conditioning event (after \"given that\") always becomes the denominator. Never just stop at the numerator.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": true}, {"question": "S1 Jan 2024 Q3(d) — When calculating $$P(R)$$ for the denominator of a conditional probability from a tree diagram, what two methods can you use to cross-check your arithmetic? (2 steps)", "answer": "- Step 1: **Route 1 (Direct):** Sum the probabilities of all branches ending in $$R$$. For example, $$P(\\text{Y12} \\cap R) + P(\\text{Y13} \\cap R)$$.\n- Step 2: **Route 2 (Complement):** Calculate $$1 - P(L)$$, where $$P(L)$$ is the total probability of the opposite outcome.\n+ If both routes yield the same value (e.g., $$89/100$$), you can be confident in your denominator. If they disagree, you've made an arithmetic slip on the tree.\n\nAlways verify the denominator of a conditional probability using two independent methods; a wrong denominator ruins the entire answer.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "S1 Jan 2024 Q4(a) — To test whether a value is an outlier, what are the upper and lower fence formulas, and what must you calculate first? (2 steps)", "answer": "- Step 1: You must first calculate the **Interquartile Range (IQR) = $$Q_3 - Q_1$$**.\n- Step 2: The fences are:\n+ Upper fence: $$Q_3 + 1.5 \\times \\text{IQR}$$\n+ Lower fence: $$Q_1 - 1.5 \\times \\text{IQR}$$\n+ A value is an outlier if it is strictly greater than the upper fence or strictly less than the lower fence.\n\nOutlier detection requires finding the quartiles first, then extending 1.5 IQRs from each end to create the \"fences\".", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "S1 Jan 2024 Q4(a) — For a discrete dataset of $$n=11$$ ordered values, what are the positions of $$Q_1$$ and $$Q_3$$, and do you need to interpolate? (2 steps)", "answer": "- Step 1: The positions are $$\\frac{n+1}{4}$$ for $$Q_1$$ and $$\\frac{3(n+1)}{4}$$ for $$Q_3$$.\n- Step 2: For $$n=11$$, $$Q_1$$ is at position $$\\frac{12}{4} = 3$$ and $$Q_3$$ is at position $$\\frac{36}{4} = 9$$. Since these are integers, **no interpolation is needed**; you simply take the 3rd and 9th values directly.\n+ If the position were a decimal (e.g., 3.5), you would interpolate between the 3rd and 4th values.\n\nAlways check if the quartile position formula yields an integer; if it does, grab that exact data point.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "S1 Jan 2024 Q4(b) — When asked to \"show that\" the regression line is $$s = a + bf$$, what sequence of calculations must you show to secure all method marks? (3 steps)", "answer": "- Step 1: Calculate the means $$\\bar{f} = \\frac{\\sum f}{n}$$ and $$\\bar{s} = \\frac{\\sum s}{n}$$.\n- Step 2: Calculate the gradient $$b = \\frac{S_{fs}}{S_{ff}}$$.\n- Step 3: Calculate the intercept $$a = \\bar{s} - b\\bar{f}$$.\n+ A common pitfall is calculating $$a = b\\bar{f} - \\bar{s}$$, which gives the wrong sign. Since $$b\\bar{f}$$ is often larger than $$\\bar{s}$$, $$a$$ can be negative, so be careful with signs.\n\n\"Show that\" requires explicit intermediate steps: means, then gradient, then intercept. Do not skip to the final equation.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "S1 Jan 2024 Q4(c) — When asked to interpret the gradient of a regression line (e.g., $$b = 1.04$$ for $$s$$ on $$f$$), what two elements must your answer include to get the mark? (2 steps)", "answer": "- Step 1: Your answer must include the **context** (what the variables represent) and the **units**.\n- Step 2: A correct interpretation: \"For each additional mark scored in the French test, the predicted Spanish mark increases by 1.04 marks.\"\n+ An incorrect interpretation: \"The gradient is 1.04\" or \"As $$f$$ increases by 1, $$s$$ increases by 1.04\" (too abstract, missing context/units).\n\nAlways interpret regression gradients in the context of the problem, using the variable names and units provided.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "S1 Jan 2024 Q4(e) — When estimating values using a regression line, how do you determine which estimate is more reliable, and what keywords must you use in your answer? (2 steps)", "answer": "- Step 1: Check if the $$x$$-value used for the estimate falls **within** the observed range of the data (interpolation) or **outside** it (extrapolation).\n- Step 2: Interpolation is reliable because the linear relationship is observed in that range. Extrapolation is unreliable because the relationship may not hold outside the observed range.\n+ You must explicitly state the data range (e.g., \"$$24 \\le f \\le 68$$\") and use the words \"interpolation\" and \"extrapolation\".\n\nInterpolation (inside) = reliable; Extrapolation (outside) = unreliable. Always quote the data range to justify your answer.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": true}, {"question": "S1 Jan 2024 Q5(a) — To find a probability for a normally distributed variable $$X \\sim N(\\mu, \\sigma^2)$$, what is the first algebraic step, and why? (2 steps)", "answer": "- Step 1: Apply the **standardisation formula**: $$z = \\frac{x - \\mu}{\\sigma}$$\n- Step 2: This converts the specific normal distribution $$X$$ into the standard normal distribution $$Z \\sim N(0,1)$$, allowing you to look up probabilities in the standard Normal table.\n+ For example, to find $$P(X < 38.8)$$ with $$\\mu=40, \\sigma=4$$, calculate $$z = \\frac{38.8 - 40}{4} = -0.30$$, then look up $$\\Phi(-0.30)$$.\n\nStandardisation translates any Normal problem into a $$Z$$-score problem that can be solved with the provided table.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "S1 Jan 2024 Q5(b) — When an athlete has 3 independent attempts to achieve at least one success, what is the most efficient way to calculate $$P(\\text{at least one success})$$? (2 steps)", "answer": "- Step 1: Use the **complement method**: $$P(\\text{at least one success}) = 1 - P(\\text{all attempts fail})$$.\n- Step 2: Since the attempts are independent, $$P(\\text{all fail}) = P(\\text{fail})^3$$.\n+ Trying to calculate it directly as $$P(S_1) + P(F_1 \\cap S_2) + P(F_1 \\cap F_2 \\cap S_3)$$ is much slower and prone to arithmetic errors.\n\n\"At least one\" is a massive trigger for the complement rule: $$1 - P(\\text{none})$$.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "S1 Jan 2024 Q5(b) — In a multi-stage Normal problem, if asked \"find the probability that the athlete qualified on the second throw with >44m, given that they qualified\", what is the correct conditional formula setup? (2 steps)", "answer": "- Step 1: Identify the events: $$A$$ = \"qualified on 2nd throw with >44m\" (which means Throw 1 failed AND Throw 2 > 44m), and $$B$$ = \"qualified\" (at least one throw > 38.8m).\n- Step 2: Write the conditional formula: $$P(A \\mid B) = \\frac{P(\\text{Throw 1 fails} \\cap \\text{Throw 2} > 44)}{P(\\text{qualifies})}$$\n+ The numerator is $$P(F_1) \\times P(X_2 > 44)$$ due to independence. The denominator is $$1 - P(F)^3$$.\n\nThe \"given that they qualified\" phrase forces a denominator. The numerator must be the specific path described (Fail then >44).", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "S1 Jan 2024 Q5(b) — When calculating the probability of \"Throw 2 exceeds 44m\", why don't you need to separately account for \"Throw 2 exceeds 38.8m\" in the numerator? (2 steps)", "answer": "- Step 1: Because exceeding 44m is a **subset** of exceeding 38.8m. If $$X > 44$$, it is automatically true that $$X > 38.8$$.\n- Step 2: Therefore, the event \"Throw 1 fails AND Throw 2 > 44\" is identical to \"Throw 1 fails AND Throw 2 > 44 AND Throw 2 > 38.8\". There is no double-counting or extra condition to multiply.\n+ A common pitfall is trying to multiply $$P(X > 44)$$ by $$P(X > 38.8)$$ as if they were independent conditions on the same throw, which is incorrect.\n\nRecognise subset logic: if $$A \\subset B$$, then $$P(A \\cap B) = P(A)$$. Don't over-multiply.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "S1 Jan 2024 Q6(a) — Given $$P(B \\mid A) = 0.3$$ and $$P(A) = x$$, what is the expression for $$P(A \\cap B)$$, and what is the common directional mistake? (2 steps)", "answer": "- Step 1: The formula is $$P(B \\mid A) = \\frac{P(A \\cap B)}{P(A)}$$. Rearranging gives $$P(A \\cap B) = P(B \\mid A) \\times P(A) = 0.3x$$.\n- Step 2: The common mistake is confusing the conditioning direction and writing $$P(A \\cap B) = P(B \\mid A) \\times P(B) = 0.3y$$. The denominator of the conditional is always the event that is \"given\".\n+ The event after the \"|\" is the condition, so it becomes the multiplier when rearranging.\n\n$$P(B \\mid A)$$ means $$A$$ is the condition, so multiply by $$P(A)$$, not $$P(B)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "S1 Jan 2024 Q6(b) — If events $$B$$ and $$C$$ are mutually exclusive, what does this imply about their probabilities, and how does it simplify the addition rule? (2 steps)", "answer": "- Step 1: Mutually exclusive means $$B$$ and $$C$$ cannot happen at the same time, so $$P(B \\cap C) = 0$$.\n- Step 2: This simplifies the addition rule: $$P(B \\cup C) = P(B) + P(C) - P(B \\cap C)$$ becomes simply $$P(B \\cup C) = P(B) + P(C)$$.\n+ Do not use $$P(B \\cup C) = P(B) + P(C)$$ unless you have explicitly stated that $$P(B \\cap C) = 0$$.\n\nMutually exclusive = empty intersection = $$P(B \\cap C) = 0$$ = just add the probabilities.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "S1 Jan 2024 Q6(c) — To determine if events $$A$$ and $$B$$ are statistically independent, what specific calculation must you perform, and what is the conclusion condition? (2 steps)", "answer": "- Step 1: Calculate **both** $$P(A) \\cdot P(B)$$ and $$P(A \\cap B)$$ numerically.\n- Step 2: If $$P(A \\cap B) = P(A) \\cdot P(B)$$, they are independent. If not, they are not independent.\n+ A common pitfall is confusing independence with mutually exclusive. Mutually exclusive events ($$P(A \\cap B) = 0$$) are almost never independent (unless one has probability 0).\n+ Another pitfall is comparing $$P(A \\cup B)$$ instead of $$P(A \\cap B)$$.\n\nIndependence is about intersection equaling the product. You must compute both sides numerically and compare.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "S1 Jan 2024 Q7(a) — For a discrete random variable $$X$$ with a Cumulative Distribution Function $$F(x)$$, what must be true at the maximum value of $$x$$, and how is this used to find constants? (2 steps)", "answer": "- Step 1: The CDF represents $$P(X \\le x)$$, so at the maximum value $$x_{\\max}$$, the probability must be 1. Therefore, $$F(x_{\\max}) = 1$$.\n- Step 2: You use this to set up an equation. For example, if $$F(4) = \\frac{k+4}{8}$$, set $$\\frac{k+4}{8} = 1$$ to solve for $$k$$.\n+ This is the most reliable way to find unknown constants in a CDF table.\n\nThe last entry in a CDF table must always equal 1. Use this as your anchor equation.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "S1 Jan 2024 Q7(b) — How do you extract the Probability Distribution Function (PDF), $$P(X=x)$$, from a Cumulative Distribution Function (CDF), $$F(x)$$? (2 steps)", "answer": "- Step 1: The CDF accumulates probabilities, so the probability of landing on a specific value is the difference between consecutive CDF values.\n- Step 2: The formula is $$P(X = x) = F(x) - F(x-1)$$\n+ For example, if $$F(3) = 13/26$$ and $$F(2) = 7/26$$, then $$P(X=3) = 13/26 - 7/26 = 6/26$$.\n+ Always check that $$\\sum P(X=x) = 1$$ after conversion to catch arithmetic slips.\n\nPDF is the \"step up\" in the CDF. Subtract the previous CDF value from the current one.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "S1 Jan 2024 Q7(d) — When calculating $$\\operatorname{Var}(13X - 6)$$, what happens to the multiplicative constant (13) and the additive constant (-6)? (2 steps)", "answer": "- Step 1: The additive constant (-6) **disappears**. Variance measures spread, and adding/subtracting a constant shifts the data without changing its spread.\n- Step 2: The multiplicative constant (13) is **squared**. $$\\operatorname{Var}(aX + b) = a^2 \\operatorname{Var}(X)$$\n+ So $$\\operatorname{Var}(13X - 6) = 13^2 \\operatorname{Var}(X) = 169 \\operatorname{Var}(X)$$.\n+ Common pitfalls: forgetting to square the 13, or incorrectly subtracting 6 (e.g., $$13 \\operatorname{Var}(X) - 6$$).\n\nAdditive constants vanish, multiplicative constants square when transforming variance.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "S1 Jan 2024 Q7(d) — When calculating $$\\operatorname{Var}(13X - 6)$$ where $$E(X)$$ and $$E(X^2)$$ are fractions, why is it crucial to keep values as fractions until the very end? (2 steps)", "answer": "- Step 1: The variance formula is $$\\operatorname{Var}(X) = E(X^2) - (E(X))^2$$. This involves subtracting two numbers that are often very close in value.\n- Step 2: Converting to decimals early introduces rounding errors that compound during subtraction, leading to an inaccurate final variance.\n+ Furthermore, in this specific problem, $$\\operatorname{Var}(X)$$ has a denominator of 169, which perfectly cancels with the $$13^2 = 169$$ from the variance scaling rule, yielding a clean integer answer (165).\n\nKeep fractions throughout variance calculations to preserve precision and allow for clean cancellations.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": true}, {"question": "S1 Jan 2024 Q8(a) — Given a symmetric interval $$P(\\mu - 2k < X < \\mu + 2k) = 0.6$$, how do you convert this into a form suitable for the inverse Normal table lookup? (2 steps)", "answer": "- Step 1: By symmetry, the probability in each tail is $$\\frac{1 - 0.6}{2} = 0.2$$. The probability below $$\\mu + 2k$$ is $$0.5 + 0.3 = 0.8$$.\n- Step 2: Therefore, the two-tail probability $$c$$ converts to a one-tail lookup via $$\\Phi(z) = \\frac{1 + c}{2}$$\n+ So $$\\Phi(z) = \\frac{1 + 0.6}{2} = 0.8$$. You then look up the $$z$$-value corresponding to $$\\Phi(z) = 0.8$$.\n+ A common pitfall is looking up $$\\Phi^{-1}(0.6)$$ directly, which is wrong.\n\nFor symmetric intervals $$P(|Z| < z) = c$$, convert to $$\\Phi(z) = (1+c)/2$$ before using the table.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "S1 Jan 2024 Q8(b) — When solving for $$\\sigma$$ in a Normal distribution problem, you derive the quadratic $$3\\sigma^2 - 6\\sigma = 0$$, giving roots $$\\sigma = 0$$ and $$\\sigma = 2$$. Why must you reject $$\\sigma = 0$$? (2 steps)", "answer": "- Step 1: The standard deviation $$\\sigma$$ is a measure of spread. If $$\\sigma = 0$$, it means every data point is identical (no spread), which contradicts the premise of a Normal distribution (which models continuous variation).\n- Step 2: In any valid probability distribution, $$\\sigma$$ must be strictly positive ($$\\sigma > 0$$).\n+ Always state the rejection explicitly: \"$$\\sigma > 0$$, so $$\\sigma = 0$$ is rejected\".\n\nAlways check mathematical roots against physical/statistical constraints (probabilities between 0 and 1, $$\\sigma > 0$$).", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": true}], "count": 30}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "S1 Jan 2024 Q1(a) — When reading a histogram to find missing frequencies, what is the fundamental relationship between frequency density, class width, and frequency, and why does it work? (2 steps)", "answer": "- Step 1: Frequency density $$= \\dfrac{\\text{frequency}}{\\text{class width}}$$. This works because a histogram is designed so that the **area** of each bar (height × width = fd × width) equals the frequency. This is why bars for wider classes appear shorter — the area, not the height, encodes the count.\n- Step 2: To recover a missing frequency from the histogram, read the frequency density (the bar's height) and multiply by the class width: $$\\text{freq} = \\text{fd} \\times \\text{width}$$. For example, if fd = 32 and width = 2, then freq = 64.\n\nThe area-equals-frequency principle is what distinguishes a histogram from a bar chart.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "S1 Jan 2024 Q1(a) — After computing all frequencies from a histogram, what single arithmetic check should you perform before moving on, and why?", "answer": "Sum all the frequencies and verify they equal the stated total $$n$$ (here 408). This catches errors in reading frequency densities or multiplying by wrong class widths. If the sum is off by even 1, at least one bar was misread — go back before proceeding to parts (b)–(d), which all depend on correct frequencies.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "S1 Jan 2024 Q1(b) — For grouped/continuous data, what position do you use for the median, and why is this different from the discrete-data quartile position $$(n+1)/4$$?", "answer": "For grouped (continuous) data, the median position is $$n/2$$. The discrete formula $$(n+1)/4$$ applies to individual data points ranked in order, where the $$+1$$ accounts for the gap between positions. In grouped data, we're interpolating within a class interval — the data are treated as continuously spread, so the $$+1$$ correction is inappropriate. Using $$(n+1)/2$$ for grouped data would give a subtly wrong interpolation point.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "S1 Jan 2024 Q1(b) — Once you've located the median class using cumulative frequency, what is the interpolation formula, and what does each term represent? (3 steps)", "answer": "- Step 1: $$\\text{Median} = L + \\dfrac{(n/2) - F_{<}}{f_{\\text{class}}} \\times w$$, where:\n  + $$L$$ = lower boundary of the median class\n  + $$n/2$$ = the median position\n  + $$F_{<}$$ = cumulative frequency of all classes **below** the median class\n  + $$f_{\\text{class}}$$ = frequency of the median class itself\n  + $$w$$ = width of the median class\n- Step 2: The fraction $$\\dfrac{(n/2) - F_{<}}{f_{\\text{class}}}$$ tells you **how far through** the median class the median falls (between 0 and 1). It's the proportion of the class you need to traverse.\n- Step 3: Multiplying by $$w$$ converts that proportion into an actual distance in the original units (cm, kg, etc.), then adding $$L$$ shifts back to the true scale.\n\nThis is a linear interpolation — it assumes data are uniformly distributed within the class.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "S1 Jan 2024 Q1(c) — When comparing mean and median to determine skew, what is the rule, and what is the intuition behind it?", "answer": "Mean $$<$$ median → **negative** skew. Mean $$>$$ median → **positive** skew.\n\nIntuition: the mean is pulled toward the long tail because it weights every value by magnitude. If there's a long left tail (a few very small values), the mean gets dragged downward below the median. If there's a long right tail (a few very large values), the mean gets dragged upward above the median. The median, being a positional measure, resists this pulling.\n\n**Exam requirement:** you must state BOTH the direction (\"negatively skewed\") AND the numerical comparison (\"mean < median\") — one without the other loses the mark.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "S1 Jan 2024 Q1(d) — When a probability question specifies boundaries like \"between 8 cm and 14 cm\" that fall **inside** class intervals rather than on class boundaries, what must you do, and why?", "answer": "You must **split the frequency** of each partially-covered class proportionally by the overlap width within that class. This is because the histogram model assumes uniform distribution within each class interval — so if only half the class width is covered, only half the frequency contributes.\n\nFor example, for class $$[5,9)$$ with frequency 32, the range $$[8,9)$$ covers $$\\frac{9-8}{9-5} = \\frac{1}{4}$$ of the class width, so contributes $$\\frac{1}{4} \\times 32 = 8$$ plants. The boundary \"8\" cuts through the middle of this class — it is NOT a class boundary, so you cannot use the whole class frequency.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "S1 Jan 2024 Q1(d) — When selecting two items \"at random\" from a finite population, how do you know whether to treat it as with or without replacement, and what changes in the calculation?", "answer": "Unless the question explicitly says \"with replacement\" or the population is so large that the difference is negligible, physical selection of items from a finite group is **without replacement** — the first item is removed before the second draw.\n\nThe calculation changes in the denominator: $$P(\\text{both}) = \\frac{a}{n} \\times \\frac{a-1}{n-1}$$, NOT $$\\left(\\frac{a}{n}\\right)^2$$. The second denominator drops to $$n-1$$ because one item has already been taken. Writing $$\\left(\\frac{a}{n}\\right)^2$$ would be the **with-replacement** formula — a common pitfall.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "S1 Jan 2024 Q2(a)(ii) — When a question asks you to \"show that\" the standard deviation is a specific value, what is the minimum working you must present, and why?", "answer": "You must show at least three lines: (1) the formula for $$S_{xx}$$ with numbers substituted, (2) the computed value of $$S_{xx}$$, then (3) $$\\sigma_x = \\sqrt{S_{xx}/n}$$ with the unrounded intermediate result (e.g., 8.5716...) before rounding to 8.57.\n\nMethod marks dominate \"show that\" questions — the final answer alone typically earns only 1 of 3 marks. Quoting one extra decimal figure (8.5716 → 8.57) proves you actually computed it rather than copied the given answer.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "S1 Jan 2024 Q2(a)(ii) — In Edexcel S1, which standard deviation formula is used — population ($$n$$) or sample ($$n-1$$) — and how do you remember?", "answer": "Edexcel S1 uses the **population** standard deviation throughout: $$\\sigma_x = \\sqrt{\\frac{S_{xx}}{n}}$$, where $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$.\n\nThe sample version (denominator $$n-1$$) belongs to S2/S3. If you accidentally use $$n-1$$, your s.d. will be slightly too large. The formula booklet lists the population form under S1 — always check which specification you're in.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "S1 Jan 2024 Q2(c) — When a linear coding $$c = \\frac{5}{9}(f - 32)$$ is applied, why does the additive constant ($$-32$$) affect the mean but NOT the standard deviation?", "answer": "Adding or subtracting a constant shifts every data point by the same amount — this translates the entire distribution without changing its spread. The distances between values remain identical, so variance and s.d. are unchanged. Only the centre (mean) moves.\n\nMathematically: if $$u = a + bx$$, then $$\\bar{u} = a + b\\bar{x}$$ (the $$a$$ shifts the average), but $$\\sigma_u = |b|\\sigma_x$$ (the $$a$$ disappears because $$(a + bx_i) - (a + b\\bar{x}) = b(x_i - \\bar{x})$$ — the $$a$$ cancels in every deviation).", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "S1 Jan 2024 Q2(c) — When a linear coding $$c = \\frac{5}{9}(f - 32)$$ is applied, why does only the multiplicative factor ($$\\frac{5}{9}$$) affect the standard deviation, and why is it $$|b|$$ rather than $$b$$?", "answer": "The multiplier $$b$$ stretches or compresses all deviations from the mean by factor $$|b|$$. If $$b$$ is negative (e.g., $$u = 10 - 2x$$), the distribution is reflected and stretched, but spread is about magnitude of distances, not direction — hence $$\\sigma_u = |b|\\sigma_x$$.\n\nThe factor $$\\frac{5}{9}$$ is positive here, so $$\\sigma_c = \\frac{5}{9}\\sigma_f$$. If the coding had been $$c = 32 - \\frac{5}{9}f$$ (negative $$b$$), the s.d. would still be $$\\frac{5}{9}\\sigma_f$$, not $$-\\frac{5}{9}\\sigma_f$$.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": true}, {"question": "S1 Jan 2024 Q2(d) — When both variables undergo positive linear coding, what happens to the PMCC, and what must you state to get full marks?", "answer": "The PMCC is **invariant** under linear coding $$u = a + bx$$, $$v = c + dy$$ when $$b$$ and $$d$$ have the **same sign**. Here $$b = d = \\frac{5}{9} > 0$$, so $$r_{uv} = r_{xy} = 0.849$$.\n\nFor full marks (2 marks), you must state BOTH: (1) the numerical value (0.849), AND (2) the reason (\"PMCC is unchanged under positive linear coding\" or \"invariant under linear coding with positive multipliers\"). Stating only the value loses 1 mark.\n\nIf $$b$$ and $$d$$ had opposite signs, the magnitude would stay the same but the sign of $$r$$ would flip.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "S1 Jan 2024 Q3(d) — What is the single most important trigger phrase in S1 that should make you immediately write down a conditional probability formula, and what is that formula?", "answer": "The trigger phrase is **\"given that\"** (or equivalently \"if\", \"assuming that\", or the vertical bar $$\\mid$$ in notation).\n\nThe moment you see it, write on the page: $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$\n\nThe conditioning event $$B$$ always goes in the denominator. The most common error (Phuc's exact mistake) is writing just $$P(A \\cap B)$$ as the answer — that's the **joint** probability, not the conditional. The denominator $$P(B)$$ is what converts \"both happen\" into \"A happens given B has happened.\"", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "S1 Jan 2024 Q3(d) — What is the critical difference between $$P(A \\cap B)$$ and $$P(A \\mid B)$$, and why does confusing them cost marks?", "answer": "$$P(A \\cap B)$$ = probability that **both** A and B happen (a subset of the whole sample space). $$P(A \\mid B)$$ = probability that A happens **restricted to the world where B already holds** (a subset of B's probability mass).\n\nThey are related by $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$. Since $$P(B) < 1$$ (unless B is certain), $$P(A \\mid B) > P(A \\cap B)$$. Dropping the denominator gives a number that is too small.\n\nIn Q3(d), Phuc wrote $$P(\\text{Y12} \\cap R) = \\frac{7}{20} = 0.35$$, but the correct answer was $$P(\\text{Y12} \\mid R) = \\frac{35}{89} \\approx 0.393$$. The joint is always ≤ the conditional.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": true}, {"question": "S1 Jan 2024 Q3(d) — After computing $$P(B)$$ for a conditional probability denominator, what cross-check should you perform, and why?", "answer": "Compute $$P(B)$$ by **two independent routes** and verify they match:\n+ **Route 1 (complement):** $$P(B) = 1 - P(B')$$ — using the complement of the known probability.\n+ **Route 2 (direct from tree):** $$P(B) = P(B \\cap A_1) + P(B \\cap A_2) + \\cdots$$ — summing all branches leading to B.\n\nIf both routes give the same value, your arithmetic is verified. If they disagree, you've made a slip somewhere — catch it before it propagates into the final conditional probability answer.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "S1 Jan 2024 Q3(b) — When setting up an equation from a probability tree to solve for an unknown $$p$$, what is the strategy, and how do you clear decimals efficiently?", "answer": "Multiply along each complete path from root to leaf to get each joint probability in terms of $$p$$. Then sum the paths that lead to the stated event (e.g., left-handed) and set equal to the given probability.\n\nTo clear decimals: multiply both sides by the **common denominator** of all fractions. For example, if the equation has denominators 8 and 10, the LCD is 40 (or 80 if you also want to clear 0.11). This eliminates fractions and gives a clean linear equation in $$p$$.\n\nDon't try to solve with decimals still present — rounding errors accumulate and you may get $$p$$ wrong at the 2nd decimal.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "S1 Jan 2024 Q3(a) — On a probability tree, how do you fill in the missing branch probabilities, and what must always be true at each fork?", "answer": "At each fork (split point), the probabilities of all branches must **sum to 1**. If one branch is given (e.g., $$\\frac{1}{8}$$ for left-handed), the complementary branch is $$1 - \\frac{1}{8} = \\frac{7}{8}$$ (for right-handed).\n\nThis is the complement rule applied locally: $$P(\\text{not } E) = 1 - P(E)$$. Every node on the tree must satisfy this — it's your primary way to fill in missing values and a quick check that the tree is correctly drawn.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "S1 Jan 2024 Q4(a) — For discrete data with $$n$$ values, what is the quartile position formula, and when do you need to interpolate versus take a single value?", "answer": "$$Q_1$$ at position $$\\frac{n+1}{4}$$, median at $$\\frac{n+1}{2}$$, $$Q_3$$ at $$\\frac{3(n+1)}{4}$$.\n\nIf the position is an **integer**, use that data value directly — no interpolation needed. For $$n = 11$$: $$Q_1$$ at position 3 (the 3rd value), $$Q_3$$ at position 9 (the 9th value).\n\nIf the position is **non-integer** (e.g., position 3.5 for $$n = 13$$), interpolate between the 3rd and 4th values: take the average or use the fractional part proportionally.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "S1 Jan 2024 Q4(a) — What is the outlier fence rule, and why is it based on the IQR rather than the standard deviation?", "answer": "A value is an outlier if it exceeds $$Q_3 + 1.5 \\times \\text{IQR}$$ (upper fence) or falls below $$Q_1 - 1.5 \\times \\text{IQR}$$ (lower fence), where $$\\text{IQR} = Q_3 - Q_1$$.\n\nThe IQR is used because it's **robust** — resistant to the very outliers it's trying to detect. The standard deviation is itself inflated by outliers, creating a circular dependency: extreme values push up $$\\sigma$$, which widens the \"acceptable\" range, potentially hiding the outliers. The IQR, based only on the middle 50% of data, doesn't suffer this problem.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": true}, {"question": "S1 Jan 2024 Q4(b) — When calculating the regression line $$s = a + bf$$, what are the formulas for slope and intercept, and what is a common sign error to watch for?", "answer": "Slope: $$b = \\frac{S_{fs}}{S_{ff}}$$. Intercept: $$a = \\bar{s} - b\\bar{f}$$.\n\nThe sign error occurs when $$b\\bar{f} > \\bar{s}$$: the intercept $$a$$ becomes **negative**. Students sometimes write $$a = b\\bar{f} - \\bar{s}$$ (wrong order) which gives a positive intercept when it should be negative. Always compute $$\\bar{s} - b\\bar{f}$$ in that exact order, then check the sign of the result.\n\nIn this question: $$a = 38.2 - 1.0408 \\times 42.2 = 38.2 - 43.921 = -5.72$$.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "S1 Jan 2024 Q4(c) — When interpreting a regression gradient in context, what three elements must your answer include for the mark?", "answer": "(1) The **direction** of change (\"increases\" or \"decreases\"), (2) the **units** of both variables (\"marks\"), and (3) the **contextual referent** (\"French test\" and \"Spanish test\").\n\nFull answer: \"For each additional mark scored in the French test, the predicted Spanish mark increases by approximately 1.04 marks.\"\n\nSaying just \"the gradient is 1.04\" or \"y increases by 1.04\" — without units or context — loses the mark.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "S1 Jan 2024 Q4(e) — What is the difference between interpolation and extrapolation in regression, and how should you justify which estimate is more reliable?", "answer": "**Interpolation** = predicting within the range of observed data. **Extrapolation** = predicting outside that range.\n\nInterpolation is more reliable because the linear relationship has been empirically verified within the data range. Extrapolation assumes the linear trend continues beyond observed values — this assumption may fail (the relationship could curve, flatten, or reverse).\n\nTo justify: state the data range explicitly (e.g., \"$$24 \\le f \\le 68$$\"), identify which prediction falls inside (interpolation) and which outside (extrapolation), and use those exact words. Saying \"more reliable because the data are linear\" is too vague — the issue is whether you're inside or outside the observed range.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "S1 Jan 2024 Q5(a) — When standardising a Normal variable, what is the formula, and what must you show for a \"show that\" question?", "answer": "$$Z = \\frac{X - \\mu}{\\sigma}$$. Substitute the values, compute the $$z$$-value, then look up $$\\Phi(z)$$ in the table.\n\nFor a \"show that,\" you must show: (1) the substitution into the standardisation formula, (2) the computed $$z$$-value (e.g., $$z = -0.30$$), and (3) the table lookup with the calculation (e.g., $$P(Z < -0.30) = 1 - \\Phi(0.30) = 1 - 0.6179 = 0.3821$$). Skipping the $$z$$-value and just writing 0.3821 loses method marks.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "S1 Jan 2024 Q5(b) — When a problem says \"given that they qualified\" and asks for a probability, what formula must you write down before doing any calculation?", "answer": "$$P(\\text{event} \\mid \\text{qualified}) = \\frac{P(\\text{event} \\cap \\text{qualified})}{P(\\text{qualified})}$$\n\nThis is the same conditional probability structure as Q3(d). The \"given that they qualified\" is the conditioning event — it goes in the denominator. The numerator is the joint probability of both the event AND qualifying. Writing only the joint probability (the numerator) as your final answer is the #1 error on this question type.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "S1 Jan 2024 Q5(b) — When computing $$P(\\text{qualifies in at most 3 attempts})$$ for independent trials, what is the most efficient approach, and why?", "answer": "Use the **complement method**: $$P(\\text{qualifies}) = 1 - P(\\text{all 3 fail}) = 1 - P(F)^3$$.\n\nThis is more efficient than summing the three qualifying scenarios (qualifies on throw 1 + qualifies on throw 2 + qualifies on throw 3) because:\n+ The complement is a single term.\n+ The three qualifying scenarios are mutually exclusive but require computing each separately.\n+ The complement avoids potential double-counting errors.\n\nSince each throw is independent with $$P(F) = 0.3821$$: $$P(\\text{qualifies}) = 1 - 0.3821^3 = 1 - 0.0558 = 0.9442$$.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": true}, {"question": "S1 Jan 2024 Q5(b) — Why is the event \"throw 2 exceeds 44 m\" automatically a subset of \"throw 2 succeeds\" (exceeds 38.8 m), and how does this prevent double-counting?", "answer": "Since 44 > 38.8, any throw exceeding 44 m **automatically** exceeds 38.8 m. So $$P(X > 44)$$ is already contained within $$P(X > 38.8)$$ — you don't multiply these two probabilities together.\n\nThe joint event \"throw 1 fails AND throw 2 exceeds 44\" is simply $$P(F_1) \\times P(X_2 > 44) = 0.3821 \\times 0.1587$$. There's no additional factor for \"throw 2 also exceeds 38.8\" because exceeding 44 already guarantees that.\n\nTreating \"succeeds\" and \"exceeds 44\" as two separate conditions to multiply would be double-counting the same event.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": true}, {"question": "S1 Jan 2024 Q5(b) — Why are throw 3 considerations irrelevant when the athlete qualifies on throw 2?", "answer": "The question states \"Once they qualify, they do not use any of their remaining attempts.\" If the athlete qualifies on throw 2, throw 3 never happens. The event \"qualified on 2nd throw with distance > 44 m\" requires only: throw 1 fails AND throw 2 exceeds 44 m. Throw 3's outcome is undefined (it doesn't occur) and shouldn't enter the calculation.\n\nThis is also why the favourable event $$F_1 \\cap (X_2 > 44)$$ is already a subset of \"qualifies\" — any outcome where throw 1 fails and throw 2 exceeds 44 guarantees qualification, regardless of what throw 3 would have been.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "S1 Jan 2024 Q6(a) — When given $$P(B \\mid A) = 0.3$$ and $$P(A) = x$$, what is the correct way to find $$P(A \\cap B)$$, and what is the common wrong version?", "answer": "Correct: $$P(A \\cap B) = P(B \\mid A) \\times P(A) = 0.3x$$. The conditioning event $$A$$ is in the denominator of the conditional, so you multiply through by $$P(A)$$ to isolate the intersection.\n\nCommon wrong version: $$P(A \\cap B) = 0.3y$$ — this uses $$P(B)$$ instead of $$P(A)$$. The mistake is confusing which event is the conditioning one. $$P(B \\mid A)$$ means \"probability of B **given** A\" — A is the condition, so A goes in the denominator. If it were $$P(A \\mid B) = 0.3$$, then $$P(A \\cap B) = 0.3 \\times P(B) = 0.3y$$.\n\nAlways read the subscript after the vertical bar: that's the conditioning event.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "S1 Jan 2024 Q6(b)(i) — When two events are \"mutually exclusive,\" what does that mean probabilistically, and how does it simplify the union formula?", "answer": "Mutually exclusive means $$P(A \\cap B) = 0$$ — the events cannot occur simultaneously.\n\nThis simplifies the addition rule from $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$ to $$P(A \\cup B) = P(A) + P(B)$$. The intersection term vanishes.\n\n**Do NOT** use the full formula with the intersection and then forget to set it to zero — that gives a wrong equation. And do NOT confuse \"mutually exclusive\" with \"independent\" — they are completely different concepts (independent events can co-occur; mutually exclusive events cannot).", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": true}, {"question": "S1 Jan 2024 Q6(c) — What is the test for statistical independence, and what must you compute and compare?", "answer": "Events A and B are independent if and only if $$P(A \\cap B) = P(A) \\times P(B)$$.\n\nTo test: compute **both sides numerically** and compare. If they're equal, the events are independent. If not, they're not.\n\nIn this question: $$P(A) \\times P(B) = 0.5 \\times 0.3 = 0.15$$, and $$P(A \\cap B) = 0.3 \\times 0.5 = 0.15$$. They match, so A and B **are** independent.\n\nCommon errors: (1) computing only one side and asserting, (2) comparing $$P(A \\cup B)$$ instead of $$P(A \\cap B)$$, (3) confusing with the mutually exclusive test ($$P(A \\cap B) = 0$$).", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "S1 Jan 2024 Q6(c) — Why can't mutually exclusive events (with positive probability) be independent? What's the intuition?", "answer": "If A and B are mutually exclusive, then knowing A occurred tells you B definitely did NOT occur (since they can't co-occur). So $$P(B \\mid A) = 0$$, but $$P(B) > 0$$. Since $$P(B \\mid A) \\ne P(B)$$, knowledge of A changes the probability of B — they are **dependent**.\n\nIndependence means knowing A tells you **nothing** about B ($$P(B \\mid A) = P(B)$$). Mutually exclusive means knowing A tells you **everything** about B (it's impossible). These are opposite extremes.\n\nThe only exception: if $$P(A) = 0$$ or $$P(B) = 0$$, then $$P(A \\cap B) = 0 = P(A)P(B)$$, and they're both mutually exclusive and independent — but this is a degenerate case.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": true}, {"question": "S1 Jan 2024 Q7(a) — What property of a cumulative distribution function do you exploit to find an unknown constant, and why?", "answer": "For any CDF, $$F(x_{\\max}) = 1$$ — the probability of being at or below the largest possible value is certainty. This is because the CDF accumulates all probability mass up to that point.\n\nSet $$F(x_{\\max}) = 1$$ and solve for the unknown constant. Here, $$F(4) = \\frac{k+4}{8} = 1$$ gives $$k = 4$$.\n\nThis works because the CDF must reach exactly 1 at the maximum value — if it were less, some probability would be \"missing\"; if more, the distribution would be invalid.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "S1 Jan 2024 Q7(b) — How do you extract the probability mass function (PMF) from a discrete CDF, and what sanity check should you perform?", "answer": "For a discrete RV: $$P(X = x) = F(x) - F(x-1)$$. Each PMF value is the **difference** between consecutive CDF values — the CDF jumps by exactly the probability at each point.\n\nAfter computing all values, verify $$\\sum P(X = x) = 1$$. This catches arithmetic errors in the CDF subtraction (especially with different denominators). If the sum isn't 1, recheck each difference before proceeding — all subsequent calculations (mean, variance) depend on correct probabilities.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "S1 Jan 2024 Q7(d) — What is the variance scaling rule for $$\\operatorname{Var}(aX + b)$$, and why does the additive constant disappear while the multiplicative constant gets squared?", "answer": "$$\\operatorname{Var}(aX + b) = a^2 \\operatorname{Var}(X)$$.\n\nThe additive constant $$b$$ disappears because variance measures **spread from the mean**. Shifting all values by $$b$$ shifts the mean by $$b$$ too, so each deviation $$(aX_i + b) - (a\\bar{X} + b) = a(X_i - \\bar{X})$$ — the $$b$$ cancels.\n\nThe multiplicative constant gets **squared** because variance is in **squared units**. If you double all values, the deviations double, but the squared deviations quadruple. So $$a$$ becomes $$a^2$$.\n\nCommon errors: $$\\operatorname{Var}(aX + b) = a\\operatorname{Var}(X) + b$$ (wrong on both counts) or $$\\operatorname{Var}(aX + b) = a\\operatorname{Var}(X)$$ (forgot to square).", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": true}, {"question": "S1 Jan 2024 Q7(d) — Why should you keep values as fractions throughout a variance calculation, and what signals that you've made an arithmetic error?", "answer": "Keeping fractions preserves exact cancellation. In Q7(d), $$\\operatorname{Var}(X) = \\frac{165}{169}$$, and then $$\\operatorname{Var}(13X - 6) = 169 \\times \\frac{165}{169} = 165$$ — the 169 cancels cleanly, giving an integer answer.\n\nConverting to decimals early (e.g., $$\\frac{165}{169} \\approx 0.9763$$) loses precision and makes the final multiplication $$169 \\times 0.9763 = 165.0...$$ require rounding, potentially masking the clean cancellation.\n\n**Signal of error:** if the final answer is a messy decimal (like 164.87 or 165.13) instead of a clean integer, you've likely made an arithmetic slip somewhere — go back and recheck.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": true}, {"question": "S1 Jan 2024 Q8(a) — When a Normal probability is given as $$P(\\mu - 2k < X < \\mu + 2k) = 0.6$$, how do you convert this symmetric two-tail probability into a form you can look up in the $$\\Phi$$ table?", "answer": "By symmetry of the Normal distribution: $$P(-z < Z < z) = 2\\Phi(z) - 1$$. Set this equal to the given probability and solve:\n\n$$2\\Phi(z) - 1 = 0.6 \\implies \\Phi(z) = \\frac{1 + 0.6}{2} = 0.8$$\n\nNow look up $$\\Phi^{-1}(0.8) = 0.8416$$.\n\n**Critical pitfall:** do NOT look up $$\\Phi^{-1}(0.6) = 0.2533$$ directly. The 0.6 is a **two-tail** probability (the central area), not a one-tail cumulative probability. The formula booklet's $$\\Phi$$ table gives **cumulative** probabilities from $$-\\infty$$, so you must convert first.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "S1 Jan 2024 Q8(a) — What is the general conversion formula from a symmetric central probability $$P(|Z| < z) = c$$ to the cumulative value you look up?", "answer": "$$\\Phi(z) = \\frac{1 + c}{2}$$.\n\nIntuition: the central region of probability $$c$$ is split equally by symmetry, with $$c/2$$ on each side of the mean. The remaining $$1 - c$$ is split equally in the two tails. So the total area to the left of $$z$$ is: the left tail $$(1-c)/2$$ plus the entire central region $$c$$, which equals $$\\frac{1-c}{2} + c = \\frac{1+c}{2}$$.\n\nMemorise this as: \"to go from central to cumulative, average with 1.\"", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": true}, {"question": "S1 Jan 2024 Q8(a) — When the interval is $$\\mu - 2k < X < \\mu + 2k$$ and you standardise, what goes inside the $$Z$$ — is it $$k/\\sigma$$ or $$2k/\\sigma$$, and why is this a common mistake?", "answer": "It's $$\\frac{2k}{\\sigma}$$, **not** $$\\frac{k}{\\sigma}$$.\n\nStandardising the upper boundary: $$Z = \\frac{(\\mu + 2k) - \\mu}{\\sigma} = \\frac{2k}{\\sigma}$$.\n\nThe mistake occurs when students see \"2k\" in the interval and mentally separate it into \"2\" and \"k,\" then use only $$k$$ in the standardisation. The entire expression $$2k$$ is the distance from the mean — both the 2 and the k must go into the z-value.\n\nHere: $$\\frac{2k}{6} = 0.8416 \\implies 2k = 5.0496 \\implies k = 2.52$$.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": true}, {"question": "S1 Jan 2024 Q8(b) — When finding Normal parameters $$\\mu$$ and $$\\sigma$$ from two conditions, what is the systematic approach?", "answer": "- Step 1: **Standardise** the probability statement to get one equation relating $$\\mu$$ and $$\\sigma$$. For $$P(Y > \\frac{3}{2}\\mu) = 0.0668$$: standardise to get $$\\frac{\\mu}{2\\sigma} = 1.5$$, hence $$\\mu = 3\\sigma$$.\n- Step 2: **Use the algebraic relation** given in the question as the second equation. Here: $$2\\mu = 3\\sigma^2$$.\n- Step 3: **Substitute** one into the other to eliminate one variable. From (1): $$\\mu = 3\\sigma$$, so $$2(3\\sigma) = 3\\sigma^2 \\implies 6\\sigma = 3\\sigma^2$$.\n- Step 4: **Solve** the resulting equation and **reject non-physical roots**. $$3\\sigma(\\sigma - 2) = 0 \\implies \\sigma = 0$$ (rejected: s.d. must be positive) or $$\\sigma = 2$$.\n- Step 5: **Substitute back** to find both values: $$\\mu = 3 \\times 2 = 6$$.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": true}, {"question": "S1 Jan 2024 Q8(b) — When solving for $$\\sigma$$ and getting roots like $$\\sigma = 0$$ and $$\\sigma = 2$$, what must you state explicitly, and why?", "answer": "State: \"$$\\sigma > 0$$, so $$\\sigma = 2$$\" (or equivalently, \"$$\\sigma = 0$$ is rejected since standard deviation must be positive\").\n\nThis shows the examiner you haven't just ignored a root but have consciously rejected it on physical grounds. A standard deviation of 0 would mean all values are identical — no variability — which contradicts the premise of a Normal distribution with non-zero spread.\n\nSimilarly, reject any negative probabilities, correlations with $$|r| > 1$$, or negative variances. Always give a one-line reason for rejection.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": false}, {"question": "S1 Jan 2024 Q8(b) — How do you handle the standardisation when the probability statement has $$Y > \\frac{3}{2}\\mu$$ (the threshold is a fraction of the mean)?", "answer": "Substitute directly into the standardisation formula:\n\n$$P\\left(Y > \\frac{3}{2}\\mu\\right) = P\\left(Z > \\frac{\\frac{3}{2}\\mu - \\mu}{\\sigma}\\right) = P\\left(Z > \\frac{\\mu/2}{\\sigma}\\right) = P\\left(Z > \\frac{\\mu}{2\\sigma}\\right)$$\n\nThe threshold $$\\frac{3}{2}\\mu$$ simplifies because $$\\frac{3}{2}\\mu - \\mu = \\frac{\\mu}{2}$$. This gives a clean expression $$\\frac{\\mu}{2\\sigma}$$ that relates the two unknowns without introducing messy fractions.\n\nThen use $$P(Z > z) = 0.0668 \\implies \\Phi(z) = 1 - 0.0668 = 0.9332 \\implies z = 1.5$$.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": false}, {"question": "S1 Jan 2024 — What is the exam strategy for the first 10 minutes of the paper, and why?", "answer": "Scan the entire paper for **\"given that\"** triggers. Mark each with a star in the margin and **pre-write** $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$ next to each one.\n\nThis habit directly addresses the highest-severity weakness (confusing joint with conditional probability). On this paper, Q3(d), Q5(b), and Q6 all hinge on conditional probability. Pre-writing the formula costs 15 seconds per question but prevents the 2-mark error of returning $$P(A \\cap B)$$ when $$P(A \\mid B)$$ is asked.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": false}, {"question": "S1 Jan 2024 — For every \"show that\" question, what is the minimum presentation standard, and what happens if you only write the final answer?", "answer": "Write at least **3 algebraic lines**: (1) the formula with values substituted, (2) one intermediate simplified result, (3) the final answer matching the given value.\n\nIf you write only the final answer (e.g., \"8.57\" or \"0.3821\"), you typically earn only **1 of 3 method marks**. The examiner needs to see your working to award partial credit — even if your final number is correct, they can't verify you didn't just copy it.\n\nAlso: quote one extra decimal figure before rounding (e.g., 8.5716 → 8.57) to prove you computed it.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": false}, {"question": "S1 Jan 2024 — What are the key Normal table values worth memorising to save time, and roughly how much time does this save?", "answer": "$$\\Phi(1.00) = 0.8413$$, $$\\Phi(1.50) = 0.9332$$, $$\\Phi(1.645) = 0.95$$, $$\\Phi(1.96) = 0.975$$, $$\\Phi(0.84) \\approx 0.80$$, $$\\Phi(1.28) \\approx 0.90$$, $$\\Phi(2.33) \\approx 0.99$$.\n\nThese appear in roughly 60–70% of Normal questions. Memorising them saves ~30 seconds per lookup. On a paper with 2–3 Normal sub-parts, that's ~90 seconds total — significant when the time budget is only 90 minutes for 75 marks (1.2 min/mark).", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": false}, {"question": "S1 Jan 2024 Q2/Q7 — What is the unified principle behind why additive constants don't affect spread measures, and how does it manifest in both coding and variance questions?", "answer": "Any measure of spread (s.d., variance, IQR, range) depends on **deviations from a centre** — distances between values. Adding a constant $$a$$ shifts every value by the same amount, so every deviation $$(x_i + a) - (\\bar{x} + a) = x_i - \\bar{x}$$ is unchanged. The constant cancels.\n\nIn coding (Q2c): $$\\sigma_{a+bx} = |b|\\sigma_x$$ — the $$a$$ doesn't appear.\nIn variance (Q7d): $$\\operatorname{Var}(aX + b) = a^2\\operatorname{Var}(X)$$ — the $$b$$ doesn't appear.\n\nOnly **multiplicative** changes alter spread: they stretch ($$|b| > 1$$) or compress ($$|b| < 1$$) all deviations by factor $$|b|$$, which squares to $$b^2$$ in variance.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": true}, {"question": "S1 Jan 2024 Q6(a) — When clearing decimals from an equation like $$0.65 = 0.7x + y$$ to match a required form like $$14x + 20y = 13$$, what's the systematic approach?", "answer": "- Step 1: Identify the target form's coefficients (14 and 20 on the left, 13 on the right).\n- Step 2: Find what multiplier converts your equation's decimals to integers. Here, multiplying by 20: $$20 \\times 0.65 = 13$$, $$20 \\times 0.7 = 14$$, $$20 \\times 1 = 20$$. This gives $$13 = 14x + 20y$$, which rearranges to the required form.\n- Step 3: If the coefficients don't immediately match, look for the LCD of all decimal denominators. Since 0.7 = 7/10 and 0.65 = 65/100 = 13/20, the LCD is 20.\n\nDon't guess the multiplier — work backwards from the target form to find it.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": false}, {"question": "S1 Jan 2024 — What is the time budget for this paper, and what's the practical implication for pacing?", "answer": "75 marks in 90 minutes ≈ **1.2 minutes per mark**. Roughly: Q1 ≈ 10 min, Q2 ≈ 14 min, Q3 ≈ 10 min, Q4 ≈ 14 min, Q5 ≈ 10 min, Q6 ≈ 11 min, Q7 ≈ 12 min, Q8 ≈ 11 min.\n\nIf you've spent more than 2.4 minutes on a 2-mark sub-part without progress, flag it and move on — you can return later. The tight budget means saving ~3 minutes by memorising formulas (instead of flipping to the formula booklet) is genuinely worthwhile.", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": false}, {"question": "S1 Jan 2024 Q1(d) — When a probability question involves selecting items \"without replacement\" from a large population, when can you approximate it as \"with replacement,\" and when must you use the exact formula?", "answer": "If the sample size is less than ~5% of the population, the without-replacement probability is close enough to the with-replacement probability that the difference is within rounding error. This is because removing one item barely changes the proportions.\n\nHowever, in S1 exam questions, the population is typically small (e.g., 408 plants) and the question explicitly says \"without replacement\" — so you must use the exact formula $$\\frac{a}{n} \\times \\frac{a-1}{n-1}$$. Only use the approximation $$\\left(\\frac{a}{n}\\right)^2$$ if the question says \"with replacement\" or implies a very large (often infinite) population.", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": true}, {"question": "S1 Jan 2024 Q4(b) — When the question says \"ignoring the point (30, 90),\" what must you remember about the summary statistics provided, and what's the pitfall?", "answer": "The summary statistics given ($$\\sum f = 422$$, $$\\sum s = 382$$, etc.) are **already computed without the outlier point**. You use them directly — do NOT subtract the outlier values again.\n\nThe pitfall is either: (1) including the outlier in your calculation by adding it back to the sums, or (2) trying to recompute the sums from the original data table and accidentally including student B. The question has done the removal for you — just use the provided numbers as-is.", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": false}, {"question": "S1 Jan 2024 — When answering a \"describe the skew\" question worth 1 mark, what two components must your answer contain?", "answer": "(1) The **direction** of skew: \"negatively skewed\" or \"positive skew.\"\n(2) The **numerical reason**: \"mean < median\" or \"mean > median.\"\n\nSaying only \"negatively skewed\" without justification, or only \"mean < median\" without stating the skew direction, loses the mark. The examiner requires you to connect the comparison to the conclusion.", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": false}, {"question": "S1 Jan 2024 Q5(b) — When drawing a probability tree for multi-stage independent trials (e.g., 3 throws), what should you label on each branch, and how does this help avoid the joint-vs-conditional confusion?", "answer": "Label each branch with the **outcome** (success/fail) and its **probability**. For a 3-throw problem:\n+ Throw 1: S (0.6179) / F (0.3821)\n+ Throw 2 (from each Throw 1 outcome): S / F\n+ Throw 3 (from each Throw 2 outcome): S / F\n\nThe tree makes the joint probability of any path explicit: **multiply along the path**. The conditional probability \"given qualified\" then requires **dividing by the total probability of all qualifying paths** (i.e., all paths with at least one S).\n\nDrawing the tree forces you to see which paths are in the numerator (the specific qualifying path) and which go in the denominator (all qualifying paths), preventing the error of returning just the numerator.", "source": "GLM 5.1 ②", "_id": "glm_2_50", "judge_pick": true}, {"question": "S1 Jan 2024 Q8(a) — What is the relationship between variance and standard deviation, and what's the common pitfall when a question gives you one but you need the other?", "answer": "$$\\sigma = \\sqrt{\\text{Var}}$$ and $$\\text{Var} = \\sigma^2$$.\n\nThe pitfall: when a question states \"variance 36,\" students sometimes plug 36 directly into the standardisation formula as if it were $$\\sigma$$. But $$\\sigma = \\sqrt{36} = 6$$. Always check: does the question give variance or standard deviation? If variance, take the square root before standardising.\n\nSimilarly, if you compute $$\\sigma^2$$ and need to report s.d., don't forget the square root.", "source": "GLM 5.1 ②", "_id": "glm_2_51", "judge_pick": true}, {"question": "S1 Jan 2024 — What is the recommended procedure for computing the denominator $$P(B)$$ in a conditional probability question, and how does it serve as both a calculation and a verification step?", "answer": "Compute $$P(B)$$ by **two independent routes**:\n\n+ Route 1 (complement): $$P(B) = 1 - P(B')$$. Fast and elegant if $$P(B')$$ is known.\n+ Route 2 (direct from tree/Venn): $$P(B) = P(B \\cap A_1) + P(B \\cap A_2) + \\cdots$$. More laborious but uses different arithmetic.\n\nIf both routes agree, you have high confidence in $$P(B)$$. If they disagree, you've caught an error before it propagates into the conditional probability answer.\n\nThis is especially valuable in exam conditions where a single arithmetic slip (e.g., adding fractions with wrong denominators) can cost multiple marks.", "source": "GLM 5.1 ②", "_id": "glm_2_52", "judge_pick": true}, {"question": "S1 Jan 2024 — What is the key distinction between the independence test and the mutually exclusive test, and why is confusing them so dangerous?", "answer": "Independence test: $$P(A \\cap B) = P(A) \\times P(B)$$ — the intersection equals the **product** of marginals.\nMutually exclusive test: $$P(A \\cap B) = 0$$ — the intersection is **zero**.\n\nConfusing them is dangerous because they give opposite conclusions for events with positive probability:\n+ If A and B are mutually exclusive and both have $$P > 0$$, then $$P(A \\cap B) = 0 \\ne P(A)P(B)$$, so they are **dependent**.\n+ If A and B are independent with $$P > 0$$, then $$P(A \\cap B) > 0$$, so they are **not** mutually exclusive.\n\nThe only events that are both independent and mutually exclusive have $$P(A) = 0$$ or $$P(B) = 0$$ — degenerate cases.", "source": "GLM 5.1 ②", "_id": "glm_2_53", "judge_pick": true}, {"question": "S1 Jan 2024 Q6 — When solving two simultaneous equations in $$x$$ and $$y$$ derived from probability conditions, what's the cleanest elimination approach?", "answer": "- Step 1: Write both equations in the form $$Ax + By = C$$.\n- Step 2: Align the coefficients of one variable by multiplying each equation by an appropriate constant.\n- Step 3: **Subtract** the equations to eliminate that variable (subtracting is less error-prone than adding for most S1 setups).\n- Step 4: Solve for the remaining variable, then **substitute back** into one of the original equations for the other.\n\nHere: $$14x + 20y = 13$$ and $$5x + 20y = 8.5$$. The $$y$$-coefficients already match, so subtracting gives $$9x = 4.5 \\implies x = 0.5$$ directly.", "source": "GLM 5.1 ②", "_id": "glm_2_54", "judge_pick": false}, {"question": "S1 Jan 2024 — What is the \"coding rule\" you should recite to yourself before attempting any linear transformation question, and what does each part mean?", "answer": "\"Additive constant drops; multiplier applies (and squares for variance).\"\n\n+ \"Additive constant drops\": adding $$a$$ to every value shifts the mean by $$a$$ but does NOT change s.d. or variance. The constant cancels in every deviation from the mean.\n+ \"Multiplier applies\": multiplying by $$b$$ scales the mean by $$b$$ and the s.d. by $$|b|$$.\n+ \"And squares for variance\": variance scales by $$b^2$$, not $$b$$, because variance is in squared units.\n\nThis single sentence covers Q2(c) (mean and s.d. in °C), Q2(d) (PMCC invariance — both multipliers positive), and Q7(d) ($$\\operatorname{Var}(13X-6) = 169\\operatorname{Var}(X)$$).", "source": "GLM 5.1 ②", "_id": "glm_2_55", "judge_pick": true}, {"question": "S1 Jan 2024 — When a question asks you to \"state, giving a reason,\" how many marks is this typically worth, and what does each mark require?", "answer": "Typically **2 marks**: 1 for the statement (value or conclusion) and 1 for the reason.\n\nExamples from this paper:\n+ Q2(d): State $$r_{uv} = 0.849$$ (1 mark) + reason \"PMCC invariant under positive linear coding\" (1 mark).\n+ Q4(e): State which estimate is more reliable (1 mark) + reason involving interpolation/extrapolation with data range (1 mark).\n\nWriting only the statement or only the reason gets 1 of 2 marks. Always provide both.", "source": "GLM 5.1 ②", "_id": "glm_2_56", "judge_pick": true}, {"question": "S1 Jan 2024 Q7(d) — When computing $$\\operatorname{Var}(13X - 6)$$, what are the three most common wrong answers, and what error does each represent?", "answer": "+ $$13\\operatorname{Var}(X) - 6$$: Applied the transformation linearly (as if variance were a linear function). Wrong on both terms — variance is quadratic in the multiplier and invariant to the additive constant.\n+ $$13\\operatorname{Var}(X)$$: Remembered to drop the additive constant but forgot to square the multiplier.\n+ $$13^2\\operatorname{Var}(X) - 6$$: Remembered to square the multiplier but kept the additive constant.\n\nThe only correct form: $$\\operatorname{Var}(aX + b) = a^2\\operatorname{Var}(X)$$. Here, $$a = 13$$, $$b = -6$$, so $$169 \\times \\frac{165}{169} = 165$$.", "source": "GLM 5.1 ②", "_id": "glm_2_57", "judge_pick": true}, {"question": "S1 Jan 2024 Q5(b) — How do you recognise that the event \"qualified on 2nd throw with distance > 44 m\" is a single path on the tree, and what is that path?", "answer": "\"Qualified on 2nd throw\" means: throw 1 failed (otherwise they'd have qualified on throw 1) AND throw 2 succeeded. \"With distance > 44 m\" further specifies the type of success on throw 2.\n\nSince $$X > 44$$ implies $$X > 38.8$$ (success), the path is simply: **Throw 1: Fail → Throw 2: $$X > 44$$**. The probability is $$P(F_1) \\times P(X_2 > 44) = 0.3821 \\times 0.1587$$.\n\nDon't over-complicate by adding a third factor for \"throw 2 succeeds\" — that's already implied by $$X > 44$$.", "source": "GLM 5.1 ②", "_id": "glm_2_58", "judge_pick": false}, {"question": "S1 Jan 2024 — What is the overall pattern of this paper, and what single conceptual fix would raise a score the most?", "answer": "The paper tests conditional probability three times (Q3d, Q5b, Q6a), Normal distribution twice (Q5, Q8), and coding/transformations twice (Q2, Q7). Half the marks are gated by \"show that\" working.\n\nThe single highest-impact fix: **always write the conditional probability formula $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$ when you see \"given that.\"** Phuc's error on Q3(d) — returning $$P(A \\cap B)$$ instead of $$P(A \\mid B)$$ — cost 2 marks and the same mistake pattern resurfaces in Q5(b). Fixing this one habit unlocks 4–6 marks per S1 paper, potentially raising a high-B to a comfortable A.", "source": "GLM 5.1 ②", "_id": "glm_2_59", "judge_pick": true}, {"question": "S1 Jan 2024 Q1(d) — When estimating the count of plants in the range [8, 14) from grouped data, what assumption are you making, and when might it be unreliable?", "answer": "You assume **uniform distribution within each class** — that values are evenly spread across the class interval. This lets you split a class's frequency proportionally by the overlap width.\n\nThis assumption is most unreliable when: (1) the class is wide and the true distribution is concentrated at one end, or (2) the class boundaries don't align with natural breaks in the data. The estimate is a **linear interpolation** — it's the best you can do with grouped data, but it's an approximation, not an exact count.\n\nThe question says \"estimate the probability\" — acknowledging that the uniform-within-class assumption makes this an approximation.", "source": "GLM 5.1 ②", "_id": "glm_2_60", "judge_pick": true}, {"question": "S1 Jan 2024 Q8(b) — After finding $$\\sigma = 2$$, why must you also compute and state $$\\mu$$, even though the question gives a relation between them?", "answer": "The question asks for **\"the value of $$\\mu$$ and the value of $$\\sigma$$\"** — both must be explicitly stated. Even though $$\\mu = 3\\sigma$$ was derived during the working, the examiner needs to see the final numerical value $$\\mu = 6$$ as a separate stated answer.\n\nFailing to substitute back and report $$\\mu$$ means you've only answered half the question. Always read the question carefully: \"find the value of $$\\mu$$ **and** the value of $$\\sigma$$\" requires two boxed answers.", "source": "GLM 5.1 ②", "_id": "glm_2_61", "judge_pick": false}], "count": 62}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "When reading a histogram to fill in a frequency table, what is the key relationship between the bar's area, the frequency density, and the frequency? (2 steps)", "answer": "- Step 1: The **frequency density** (fd) is the height of the bar, calculated as $$\\text{fd} = \\frac{\\text{frequency}}{\\text{class width}}$$. The bar's area equals frequency density × class width.\n- Step 2: Rearranging gives $$\\text{frequency} = \\text{fd} \\times \\text{class width}$$. So if you can read the fd from the histogram's y-axis and know the class width, you recover the frequency directly.\n\nThe histogram is a visual representation where *area = frequency*, not height.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": true}, {"question": "After computing all missing frequencies from a histogram, what single arithmetic check should you always perform, and why? (2 steps)", "answer": "- Step 1: Sum all frequencies (given and calculated) and verify they equal the stated total $$n$$.\n- Step 2: If they don't match, one of your fd-to-frequency conversions is wrong — likely a class-width miscount or a misread histogram height.\n\nIn Q1(a), the check was $$32 + 152 + 120 + 64 + 40 = 408$$ ✓. This takes 10 seconds and catches the most common histogram error.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "For grouped/continuous data, what is the median position — and why is it $$n/2$$ rather than $$(n+1)/2$$? (2 steps)", "answer": "- Step 1: For grouped data (histograms, frequency tables with class intervals), the median position is at $$\\frac{n}{2}$$. This is because the data are treated as *continuous* within classes, so there's no \"middle value\" to pin — just the point where cumulative frequency crosses 50%.\n- Step 2: The formula $$(n+1)/2$$ is for *discrete* data where you identify an actual data value at a specific position. Grouped data uses $$n/2$$ because you're interpolating within a class, not picking a ranked item.\n\nEdexcel convention: grouped → $$n/2$$; discrete list → $$(n+1)/2$$.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "When finding the median by interpolation in grouped data, how do you identify which class contains the median? (2 steps)", "answer": "- Step 1: Compute cumulative frequencies for each class. The median position is $$n/2$$.\n- Step 2: Find the class where the cumulative frequency first reaches or exceeds $$n/2$$. That is, if $$F_{<} < n/2 \\leq F_{\\leq}$$, the median lies in that class.\n\nIn Q1(b): cumulative frequencies were 32, 184, 304, 368, 408. Since $$184 < 204 \\leq 304$$, the median class is $$13 \\leq h < 15$$.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "State the median-by-interpolation formula for grouped data, identifying what each symbol represents. (1 step + sub-items)", "answer": "$$\\text{Median} = L + \\frac{(n/2) - F_{<}}{f_{\\text{class}}} \\times w$$\n\n+ $$L$$ = lower bound of the median class\n+ $$n/2$$ = median position\n+ $$F_{<}$$ = cumulative frequency of all classes *below* the median class\n+ $$f_{\\text{class}}$$ = frequency of the median class itself\n+ $$w$$ = width of the median class\n\nThe formula assumes values are uniformly distributed within the class, so you interpolate linearly from $$L$$ to $$L + w$$.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": true}, {"question": "How do you determine the direction of skew from the mean and median? What must you state in your exam answer to get the mark? (2 steps)", "answer": "- Step 1: Compare mean and median. If mean > median → positive skew. If mean < median → negative skew. If equal → symmetric.\n- Step 2: You must state **both** the direction **and** the numerical comparison. Writing \"negatively skewed\" alone loses the reason mark. You must write something like \"negatively skewed, since mean (13.2) < median (13.3)\".\n\nIn Q1(c): mean = 13.2 < median ≈ 13.3, so negatively skewed. The negative skew means the long tail is on the lower (left) side, pulling the mean down.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "When a probability question says \"between 8 cm and 14 cm\" but your histogram classes are [5,9), [9,13), [13,15), what's the critical insight about how to count the contributing frequency? (3 steps)", "answer": "- Step 1: Recognise that both boundaries (8 and 14) cut *through the middle* of existing classes — they do not align with class boundaries. So you cannot simply use whole-class frequencies.\n- Step 2: Apply the **uniform-within-class assumption**: within any class, values are evenly spread. So the proportion of a class that falls in your sub-range equals (sub-range width) / (class width).\n- Step 3: For each partially-covered class, compute: $$\\text{contributing frequency} = \\frac{\\text{width of overlap}}{\\text{class width}} \\times \\text{class frequency}$$. Fully-covered classes contribute their entire frequency.\n\nExample: from class [5,9) with frequency 32, the overlap with [8,14) is [8,9) → width 1 out of 4 → contributing frequency = (1/4) × 32 = 8.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "When two items are selected \"at random\" from a group and the question doesn't say \"with replacement\", what probability model do you use, and how does the denominator change? (2 steps)", "answer": "- Step 1: Without explicit mention of replacement, assume **without replacement**. The first pick uses denominator $$n$$; the second pick uses denominator $$n - 1$$.\n- Step 2: $$P(\\text{both satisfy condition}) = \\frac{k}{n} \\times \\frac{k-1}{n-1}$$, where $$k$$ is the count satisfying the condition.\n\nIn Q1(d): $$P = \\frac{220}{408} \\times \\frac{219}{407}$$. The common pitfall is writing $$(220/408)^2$$, which assumes replacement.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "A simple exercise: In a class of 10 students, 4 wear glasses. Two are picked at random without replacement. What is the probability both wear glasses? (mental math)", "answer": "$$P = \\frac{4}{10} \\times \\frac{3}{9} = \\frac{12}{90} = \\frac{2}{15}$$\n\nKey insight: the second fraction drops both the numerator (one glasses-wearer already taken) and the denominator (one student already taken). If it were *with* replacement, you'd get $$(4/10)^2 = 4/25$$, which is larger — replacement always gives a higher probability for \"both\" events.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": true}, {"question": "What is the formula for $$S_{xx}$$ that you should memorise (not rely on the formula booklet for), and why does memorising it save exam time? (2 steps)", "answer": "- Step 1: $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$. You need $$\\sum x^2$$ and $$\\sum x$$ from the question, plus $$n$$.\n- Step 2: Memorising this saves ~30 seconds per use because you don't need to flip to the formula booklet. In Q2(a)(ii), you needed $$S_{xx}$$ to compute the standard deviation — looking it up breaks your working flow.\n\nSimilarly, $$S_{xy} = \\sum xy - \\frac{(\\sum x)(\\sum y)}{n}$$ and the PMCC formula should be memorised.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "In Edexcel S1, the standard deviation formula uses denominator $$n$$ (population), not $$n-1$$ (sample). What is the full formula, and what happens if you use the wrong denominator? (2 steps)", "answer": "- Step 1: $$\\sigma_x = \\sqrt{\\frac{S_{xx}}{n}}$$. This is the population standard deviation used throughout S1.\n- Step 2: If you use $$n-1$$ instead, your s.d. will be slightly too large. For Q2(a)(ii) with $$n = 12$$ and $$S_{xx} = 881.667$$: correct is $$\\sqrt{881.667/12} = 8.57$$, but $$\\sqrt{881.667/11} = 8.95$$ — visibly different and would lose marks.\n\nS1 always uses the population formula unless the question explicitly says \"sample standard deviation\".", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "When a \"show that\" question asks you to show a value correct to 3 significant figures (e.g., \"show that the standard deviation is 8.57\"), what intermediate step must you show? (2 steps)", "answer": "- Step 1: Calculate the unrounded value first and quote it to at least one extra figure (e.g., 8.5716).\n- Step 2: Then round to the required precision (8.57 to 3 s.f.) and confirm it matches. Without the intermediate value, the examiner cannot verify your rounding, and you typically lose method marks.\n\nIn Q2(a)(ii): $$\\sqrt{73.4722} = 8.5716\\ldots \\approx 8.57$$ (3 s.f.). The \"8.5716\" is the crucial intermediate.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "State the PMCC formula in terms of $$S_{xy}$$, $$S_{xx}$$, and $$S_{yy}$$. What is the range of possible values for $$r$$? (1 step + sub-item)", "answer": "$$r = \\frac{S_{xy}}{\\sqrt{S_{xx} \\cdot S_{yy}}}$$\n\n+ The value of $$r$$ always satisfies $$-1 \\leq r \\leq 1$$. If your calculation gives $$|r| > 1$$, you've made an arithmetic error.\n\nIn Q2(b): $$r = \\frac{512.67}{\\sqrt{881.667 \\times 413.67}} = 0.849$$. This is a strong positive correlation.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "When a linear coding formula like $$c = \\frac{5}{9}(f - 32)$$ is applied, how does the **mean** transform? Walk through the reasoning. (2 steps)", "answer": "- Step 1: The coding is $$c = \\frac{5}{9}f - \\frac{5}{9} \\times 32 = \\frac{5}{9}f - \\frac{160}{9}$$. This is of the form $$u = a + bf$$ with $$a = -160/9$$ and $$b = 5/9$$.\n- Step 2: The mean transforms the same way: $$\\bar{c} = a + b\\bar{f} = \\frac{5}{9}(\\bar{f} - 32)$$. Both the additive shift and the multiplicative scaling affect the mean, because the mean measures *location* and both operations shift location.\n\nIn Q2(c): $$\\bar{c} = \\frac{5}{9}(71.833 - 32) = \\frac{5}{9} \\times 39.833 = 22.1$$ °C.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "When a linear coding formula like $$c = \\frac{5}{9}(f - 32)$$ is applied, how does the **standard deviation** transform — and what is the key insight about the additive constant? (3 steps)", "answer": "- Step 1: Standard deviation measures *spread* (dispersion). Adding or subtracting a constant shifts all values equally — it does not change how far apart they are from each other.\n- Step 2: Therefore, the additive constant ($$-32$$) has **no effect** on the standard deviation. Only the multiplicative constant matters.\n- Step 3: $$\\sigma_c = |b| \\cdot \\sigma_f = \\frac{5}{9} \\times 8.5716 = 4.76$$ °C. The absolute value ensures s.d. is always positive regardless of the sign of $$b$$.\n\nThe pitfall: applying $$-32$$ to the s.d. as well as the mean. The shift changes location, not spread.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": true}, {"question": "What is the general coding rule for linear transformations $$u = a + bx$$, covering mean, standard deviation, and variance? (1 step + sub-items)", "answer": "+
