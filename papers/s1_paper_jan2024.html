- Step 1: Compute IQR = $$Q_3 - Q_1$$.\n- Step 2: Upper fence: $$Q_3 + 1.5 \\times \\text{IQR}$$. Lower fence: $$Q_1 - 1.5 \\times \\text{IQR}$$.\n- Step 3: Any value strictly above the upper fence OR strictly below the lower fence is an outlier. Show the comparison explicitly: \"90 > 78, so 90 is an outlier.\"\n\nIntuition: $$1.5 \\times \\text{IQR}$$ is a standard \"reasonable spread\" buffer beyond the middle 50% of data. Values further out are unusually extreme relative to the bulk.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "S1 Jan 2024 Q4(b) — what are the formulas for the regression slope and intercept, and in what order do you compute them?", "answer": "- Step 1: Compute means first: $$\\bar{x} = \\dfrac{\\sum x}{n}$$, $$\\bar{y} = \\dfrac{\\sum y}{n}$$.\n- Step 2: Slope: $$b = \\dfrac{S_{xy}}{S_{xx}}$$.\n- Step 3: Intercept: $$a = \\bar{y} - b\\bar{x}$$ — this requires the slope, so must come AFTER it.\n\nMemory aid: the regression line passes through $$(\\bar{x}, \\bar{y})$$, so once you have the slope and a point, you can find the intercept. The order is forced: means → slope → intercept.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "What's the contextual interpretation of a regression gradient, and what specific words must appear for the mark?", "answer": "For \"$$s$$ on $$f$$\" with gradient 1.04: \"For each additional mark scored in the **French** test, the predicted **Spanish** mark increases by approximately **1.04 marks**.\"\n\nRequired elements:\n- **Units** (marks, °C, cm — whatever the variables are in).\n- **Contextual variable names** (French/Spanish, not \"$$x$$/$$y$$\").\n- **The phrase \"for each additional\" or equivalent.**\n- **\"Predicted\" or \"estimated\"** — acknowledging the regression line is an estimate, not a deterministic law.\n\nJust \"the gradient is 1.04\" loses the mark.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": true}, {"question": "S1 Jan 2024 Q4(e) — what's the rule for deciding which regression estimate is more reliable, and what keywords must appear? (3 steps)", "answer": "- Step 1: Identify the **data range** of the predictor variable. Here, $$24 \\le f \\le 68$$.\n- Step 2: Check whether each new $$f$$-value falls INSIDE or OUTSIDE this range. $$f = 55$$ is inside → **interpolation** (reliable). $$f = 18$$ is outside → **extrapolation** (unreliable).\n- Step 3: Conclusion: the estimate for $$f = 55$$ is more reliable because it's interpolation. Use BOTH keywords: \"interpolation\" and \"extrapolation\". Quote the data range explicitly.\n\nMotivation: the linear relationship is only verified over the sampled range; outside, the underlying relationship could bend, plateau, or break down entirely.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "S1 Jan 2024 Q5(a) — how do you compute $$P(X < 38.8)$$ where $$X \\sim N(40, 4^2)$$ and what's the standardisation step? (2 steps)", "answer": "- Step 1: Standardise: $$z = \\dfrac{X - \\mu}{\\sigma} = \\dfrac{38.8 - 40}{4} = -0.30$$.\n- Step 2: $$P(Z < -0.30) = 1 - \\Phi(0.30) = 1 - 0.6179 = 0.3821$$ by symmetry of the standard normal around 0.\n\nThe reason for symmetry: the standard normal is symmetric about zero, so $$P(Z < -a) = P(Z > a) = 1 - \\Phi(a)$$. Always convert negative $$z$$ to positive $$z$$ before consulting tables.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "S1 Jan 2024 Q5(b) — how do you parse \"qualified for the final on their second throw with a distance of more than 44 m\" into events? (3 steps)", "answer": "- Step 1: \"Qualified on their **second** throw\" means: throw 1 failed (did NOT qualify) AND throw 2 succeeded in qualifying. So the event is $$F_1 \\cap S_2$$ where success means $$>38.8$$.\n- Step 2: \"with a distance of more than 44 m\" further specifies that throw 2 was $$> 44$$. Since $$X > 44 \\Rightarrow X > 38.8$$ automatically, the event simplifies to $$F_1 \\cap \\{X_2 > 44\\}$$.\n- Step 3: Don't double-count: $$X_2 > 44$$ already implies success on throw 2 — don't multiply $$P(S_2) \\times P(X_2 > 44)$$.\n\nThis is the typical English-parsing trap on multi-stage Normal problems.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "S1 Jan 2024 Q5(b) — what's the trick for computing $$P(\\text{qualifies in 3 attempts})$$ cleanly?", "answer": "- Step 1: Direct method requires summing three mutually exclusive cases (qualify on 1, on 2, on 3) — error-prone.\n- Step 2: Use the **complement**: $$P(\\text{qualifies}) = 1 - P(\\text{all three fail}) = 1 - P(F)^3$$. Since throws are independent.\n- Step 3: Here: $$1 - 0.3821^3 \\approx 0.9442$$. Much faster and less error-prone than the three-case sum.\n\nGeneral rule: \"at least one success in $$n$$ independent trials\" → use $$1 - P(\\text{fail})^n$$.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "S1 Jan 2024 Q5(b) — what's the conditional formula structure once you've identified the events?", "answer": "$$P(\\text{2nd throw }>44 \\mid \\text{qualifies}) = \\dfrac{P(F_1 \\cap \\{X_2 > 44\\})}{P(\\text{qualifies})}$$.\n\nKey points:\n- Numerator: the favourable event is automatically a SUBSET of \"qualifies\" (throw 2 succeeding implies qualification), so $$P(\\text{event} \\cap \\text{qualifies}) = P(\\text{event})$$.\n- Denominator: the total qualification probability across all 3 attempts.\n- The result is small (~0.064) because qualifying-specifically-on-throw-2 with a big distance is rare among all the ways to qualify.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "S1 Jan 2024 Q6(a) — given $$P(B \\mid A) = 0.3$$, how do you extract $$P(A \\cap B)$$? (2 steps)", "answer": "- Step 1: Rearrange the conditional formula: $$P(B \\mid A) = \\dfrac{P(A \\cap B)}{P(A)} \\Rightarrow P(A \\cap B) = P(B \\mid A) \\cdot P(A)$$.\n- Step 2: Here: $$P(A \\cap B) = 0.3 \\times x = 0.3x$$.\n\nPitfall: writing $$P(A \\cap B) = 0.3y$$ (multiplying by $$P(B)$$). The conditioning event in $$P(B \\mid A)$$ is $$A$$, so you multiply by $$P(A) = x$$. The conditioning event is always the one in the denominator → that's what you multiply by.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "What's the addition rule for $$P(A \\cup B)$$, and why is the intersection subtracted?", "answer": "$$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$.\n\nThe reason: if you just add $$P(A) + P(B)$$, you've counted the overlap $$A \\cap B$$ twice — once in $$P(A)$$ and once in $$P(B)$$. Subtracting $$P(A \\cap B)$$ corrects for this double-counting.\n\nFor **mutually exclusive** events, $$P(A \\cap B) = 0$$, so the formula collapses to $$P(A \\cup B) = P(A) + P(B)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "S1 Jan 2024 Q6(b)(i) — what's the trigger that lets you simplify $$P(B \\cup C)$$, and what does it tell you?", "answer": "- Step 1: Trigger phrase: \"$$B$$ and $$C$$ are **mutually exclusive**\".\n- Step 2: This means $$P(B \\cap C) = 0$$ — the events cannot both occur.\n- Step 3: So the addition rule simplifies: $$P(B \\cup C) = P(B) + P(C)$$. Here: $$y + (\\tfrac{1}{2}x + y) = \\tfrac{1}{2}x + 2y$$.\n\nPitfall: applying the full addition rule $$P(B) + P(C) - P(B \\cap C)$$ and forgetting the intersection term is zero — wastes time, but doesn't lose marks.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "What's the difference between \"mutually exclusive\" and \"independent\" events, and why are they often confused?", "answer": "- Step 1: **Mutually exclusive**: $$P(A \\cap B) = 0$$. The events CANNOT both happen.\n- Step 2: **Independent**: $$P(A \\cap B) = P(A) \\cdot P(B)$$. Knowing $$A$$ tells you nothing about $$B$$.\n- Step 3: These are nearly OPPOSITE concepts. If two events with non-zero probability are mutually exclusive, then they CANNOT be independent (knowing $$A$$ happened tells you $$B$$ definitely didn't).\n\nMental separation: ME concerns intersection = **zero**; independence concerns intersection = **product**.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": true}, {"question": "S1 Jan 2024 Q6(c) — to test if $$A$$ and $$B$$ are independent, what exactly do you compare and how do you phrase the conclusion?", "answer": "- Step 1: Compute $$P(A) \\cdot P(B)$$ numerically. Here: $$0.5 \\times 0.3 = 0.15$$.\n- Step 2: Compute $$P(A \\cap B)$$ numerically. Here: $$0.3x = 0.15$$.\n- Step 3: Compare. Since $$P(A \\cap B) = P(A) \\cdot P(B)$$, conclude: \"$$A$$ and $$B$$ are statistically independent.\"\n\nPitfall: comparing $$P(A \\cup B)$$ to anything — that's irrelevant. Independence is about intersection.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "S1 Jan 2024 Q7(a) — for a discrete CDF table, how do you find an unknown constant $$k$$?", "answer": "Use the property $$F(x_{\\max}) = 1$$ — the cumulative distribution must reach 1 at the largest value. Here, $$F(4) = \\dfrac{k+4}{8} = 1 \\Rightarrow k = 4$$.\n\nMotivation: a CDF $$F(x) = P(X \\le x)$$ must eventually account for ALL probability mass, so it must equal 1 at the maximum value. This single property usually fixes any unknown parameter in the CDF.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "How do you recover the probability distribution (PDF) from a discrete CDF? (3 steps)", "answer": "- Step 1: $$P(X = x) = F(x) - F(x-1)$$ — the probability at $$x$$ is the jump in the CDF at that point.\n- Step 2: For the smallest value $$x_1$$, $$P(X = x_1) = F(x_1)$$ (since $$F(x_0) = 0$$).\n- Step 3: ALWAYS check that the resulting probabilities sum to 1. This catches arithmetic errors in the subtractions.\n\nIntuition: the CDF accumulates probability as $$x$$ increases; the size of each \"step up\" at a value $$x$$ is the probability mass at $$x$$.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "S1 Jan 2024 Q7(c) — what's the definition of the mode for a discrete random variable, and how do you read it off?", "answer": "The mode is the value $$x$$ with the **largest probability** $$P(X = x)$$. Just scan the probability distribution table and pick the $$x$$ with the biggest probability. Here, $$P(X = 4) = \\tfrac{13}{26}$$ is largest, so mode = 4.\n\nDistinction: the mode is the most likely value, NOT the mean and NOT the median. For a uniform distribution, every value is a mode (no unique mode).", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "S1 Jan 2024 Q7(d) — what's the variance scaling rule $$\\operatorname{Var}(aX + b) = ?$$ and why does the $$b$$ disappear?", "answer": "- Step 1: Rule: $$\\operatorname{Var}(aX + b) = a^2 \\operatorname{Var}(X)$$.\n- Step 2: The additive constant $$b$$ disappears because adding $$b$$ to every value shifts the distribution but doesn't change spread (same logic as s.d. under coding).\n- Step 3: The multiplier becomes $$a^2$$ (not $$|a|$$) because variance is squared spread — every distance from the mean gets multiplied by $$|a|$$, and squaring gives $$a^2$$.\n\nFor Q7(d): $$\\operatorname{Var}(13X - 6) = 13^2 \\operatorname{Var}(X) = 169 \\operatorname{Var}(X)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "What's the relationship between $$\\operatorname{Var}(X)$$, $$E(X)$$, and $$E(X^2)$$, and why is it useful?", "answer": "$$\\operatorname{Var}(X) = E(X^2) - (E(X))^2$$.\n\nThis is the \"computational formula\" for variance — it's much easier than the definitional $$E[(X - \\mu)^2]$$ because you only need two expectations: $$E(X)$$ and $$E(X^2)$$, computed by summing $$\\sum x \\cdot P(X=x)$$ and $$\\sum x^2 \\cdot P(X=x)$$.\n\nIntuition: variance = \"mean of the squares minus square of the mean\". Order matters — these are NOT equal in general.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": true}, {"question": "S1 Jan 2024 Q7(d) — what's the arithmetic trick for keeping the variance calculation clean when probabilities have a common denominator?", "answer": "- Step 1: Keep $$E(X)$$ and $$E(X^2)$$ as fractions with denominators 13 (after the 26 cancels with the count weights).\n- Step 2: Then $$(E(X))^2$$ has denominator $$13^2 = 169$$, and $$E(X^2)$$ goes onto denominator 169 by multiplying top and bottom.\n- Step 3: When you finally compute $$\\operatorname{Var}(13X - 6) = 169 \\times \\operatorname{Var}(X)$$, the 169 in the denominator cancels with the multiplier, leaving an integer 165.\n\nPitfall: converting fractions to decimals too early loses precision and you'll get a messy answer like 164.97 instead of clean 165.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "S1 Jan 2024 Q8(a) — for a symmetric interval $$P(\\mu - 2k < X < \\mu + 2k) = 0.6$$, what's the standardisation strategy? (3 steps)", "answer": "- Step 1: Standardise: $$P(-2k/\\sigma < Z < 2k/\\sigma) = 0.6$$. The interval becomes symmetric in $$Z$$.\n- Step 2: Symmetric interval rule: $$P(|Z| < z^*) = 2\\Phi(z^*) - 1 = 0.6 \\Rightarrow \\Phi(z^*) = 0.8$$. Convert the two-tail probability to a one-tail before lookup.\n- Step 3: Inverse normal: $$\\Phi^{-1}(0.8) = 0.8416$$, so $$2k/\\sigma = 0.8416$$, then solve for $$k$$.\n\nKey formula to memorise: $$P(|Z| < z) = c \\Rightarrow \\Phi(z) = \\dfrac{1+c}{2}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "What's the very common error when working with $$X \\sim N(\\mu, 36)$$ in a Normal-distribution question?", "answer": "Confusing variance and standard deviation. The notation $$N(\\mu, \\sigma^2)$$ uses **variance** as the second parameter, so $$N(\\mu, 36)$$ means $$\\sigma^2 = 36$$, giving $$\\sigma = 6$$ (not 36).\n\nWhen standardising: $$Z = \\dfrac{X - \\mu}{\\sigma} = \\dfrac{X - \\mu}{6}$$, NOT $$\\dfrac{X-\\mu}{36}$$.\n\nSanity check: $$\\sigma$$ must be in the same units as $$X$$ and $$\\mu$$. If your $$z$$-values come out absurdly small (like 0.03), you've probably used variance instead of s.d.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "S1 Jan 2024 Q8(b) — what's the strategy when you have two unknowns ($$\\mu, \\sigma$$) and a Normal probability condition plus an algebraic relation? (3 steps)", "answer": "- Step 1: Standardise the Normal probability condition to get one equation linking $$\\mu$$ and $$\\sigma$$. Here: $$P(Y > \\tfrac{3}{2}\\mu) = 0.0668 \\Rightarrow \\dfrac{\\mu}{2\\sigma} = 1.5 \\Rightarrow \\mu = 3\\sigma$$.\n- Step 2: Use the given algebraic relation as the second equation. Here: $$2\\mu = 3\\sigma^2$$.\n- Step 3: Substitute to get a quadratic in $$\\sigma$$ alone, solve, and reject non-positive roots.\n\nThe general pattern: one equation from probability/standardisation, one from given algebra, substitute and solve.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "Why must you reject the root $$\\sigma = 0$$ explicitly in Q8(b), and what other \"non-physical\" roots commonly need rejection?", "answer": "$$\\sigma = 0$$ means zero spread — the distribution would be a single point, which violates the assumption that $$Y$$ is a non-degenerate Normal variable. Standard deviations must be strictly positive.\n\nOther non-physical roots to reject in S1:\n- Negative probabilities (must be in [0,1])\n- $$|r| > 1$$ for PMCC (must be in [-1, 1])\n- Negative s.d.\n- Probability $$> 1$$\n\nState the rejection explicitly: \"$$\\sigma > 0$$, so $$\\sigma = 2$$.\" Examiners want the reasoning visible.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": false}, {"question": "What's the memorable Normal table value $$\\Phi(1.5)$$ and where might it appear?", "answer": "$$\\Phi(1.5) = 0.9332$$. Memorising this saves time when a question gives a probability of $$0.0668$$ (= $$1 - 0.9332$$, hint that $$z = 1.5$$) or $$0.9332$$ directly.\n\nOther key values worth memorising:\n- $$\\Phi(0.84) \\approx 0.80$$\n- $$\\Phi(1.00) = 0.8413$$\n- $$\\Phi(1.28) \\approx 0.90$$\n- $$\\Phi(1.645) = 0.95$$\n- $$\\Phi(1.96) = 0.975$$\n- $$\\Phi(2.33) \\approx 0.99$$\n\nThese appear frequently as targets in inverse-normal questions.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "When a question gives you $$P(Y > \\text{something}) = 0.0668$$, what immediate move should you make? (2 steps)", "answer": "- Step 1: Convert to a \"less than\" probability: $$P(Y < \\text{something}) = 1 - 0.0668 = 0.9332$$. Standard tables give $$\\Phi$$ (less-than) probabilities.\n- Step 2: Recognise $$0.9332 = \\Phi(1.5)$$, so the $$z$$-value is 1.5. Set up $$\\dfrac{\\text{value} - \\mu}{\\sigma} = 1.5$$ and solve.\n\nMotivation: tables give left-tail probabilities, so any right-tail or two-tail must be converted first.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": false}, {"question": "Across the whole paper, what's the single trigger phrase to watch for that has the biggest mark-payoff if recognised?", "answer": "\"**Given that** ...\" — appears in Q3(d), Q5(b), and implicitly in Q6.\n\nThe moment this phrase appears:\n1. Write $$P(A \\mid B) = \\dfrac{P(A \\cap B)}{P(B)}$$ on the page.\n2. Identify what's $$A$$ (what's being asked) and what's $$B$$ (what's been given).\n3. Make sure the GIVEN event is in the DENOMINATOR.\n\nFixing this habit alone is worth ~4–6 marks per S1 paper — the difference between a high B and a comfortable A.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": false}, {"question": "What's the structural difference between \"two routes for $$P(R)$$ give the same answer\" (Q3) and \"$$P(A)P(B) = P(A \\cap B)$$\" (Q6)?", "answer": "- Step 1: Q3 cross-check: two different ways to compute the SAME probability $$P(R)$$ — a sanity check that your arithmetic is consistent.\n- Step 2: Q6 independence test: checking whether two DIFFERENT quantities ($$P(A) \\cdot P(B)$$ and $$P(A \\cap B)$$) happen to be equal — testing a structural property of the events.\n- Step 3: Both involve \"compute and compare\", but the meaning is different: one tests your arithmetic, the other tests a property of the events themselves.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": true}, {"question": "Why is \"show that\"-phrasing in Edexcel S1 a hint to write at least 3 algebraic lines?", "answer": "\"Show that\" tells you the final answer — the marks are for the METHOD, not the result. Examiners want to see:\n1. The starting formula (substituted, not just symbolic).\n2. At least one intermediate simplification.\n3. The final answer matching the given target.\n\nJust writing \"= 8.57\" with no intermediate steps scores ~1 of 3 marks. The mark scheme rewards visible algebraic chains. Also quote one extra significant figure before rounding (e.g., $$8.5716 \\to 8.57$$) to justify the rounding.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": false}, {"question": "When evaluating \"between $$a$$ and $$b$$\" for grouped data using the uniform-within-class assumption, what's the general formula for a partial class?", "answer": "$$\\text{Partial frequency} = \\dfrac{\\text{included width}}{\\text{class width}} \\times \\text{class frequency}$$.\n\nFor class $$[L, U)$$ partially included by interval $$[a, b]$$:\n- If $$a$$ is inside the class: included width = $$U - a$$ (rightward portion).\n- If $$b$$ is inside the class: included width = $$b - L$$ (leftward portion).\n- Then take that fraction of the class's total frequency.\n\nAssumption: data are uniformly spread within each class. This is the standard assumption for grouped data; without it, you couldn't interpolate at all.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": true}, {"question": "What's the connection between Q1(d)'s histogram-probability calculation and Q4(a)'s outlier test, and why mention them together?", "answer": "Both use the concept const SK='s1_paper_jan2024';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
