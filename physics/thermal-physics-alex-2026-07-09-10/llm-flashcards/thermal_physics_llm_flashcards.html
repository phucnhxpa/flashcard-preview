oth level off as they approach room temperature, rather than cooling all the way to \"absolute zero.\" Why? (2 steps)", "answer": "- Step 1: As the cans cool, the *temperature difference* between the can and its surroundings shrinks, so the rate of net energy loss (by radiation) falls. The cooling slows.\n- Step 2: Thermal equilibrium is reached when the can's *emission* rate equals its *absorption* rate of IR from the surroundings. At that point the net loss is zero, the temperature is constant, and it is room temperature (or whatever the surroundings are at). It does not continue to 0 K because the surroundings are emitting IR back at the can.\n\nTakeaway: thermal equilibrium = emission rate = absorption rate, at the *surroundings'* temperature, not 0 K. The environment is a heat source too.", "source": "MiniMax M3 ②", "_id": "minimax_2_97", "judge_pick": true}, {"question": "Why is the *slope* of a cooling curve proportional to the *rate* of energy loss, not the rate of energy *gain*? (2 steps)", "answer": "- Step 1: The slope $$dT/dt$$ measures how fast the temperature (and therefore the internal energy) is changing. A negative slope means the can is *losing* energy at a rate proportional to the magnitude of the slope.\n- Step 2: The can is also *gaining* energy by absorbing IR from the surroundings, but the net rate of change is (loss − gain). The cooling curve shows the *net* rate, which is dominated by loss while the can is much hotter than the surroundings.\n\nTakeaway: cooling curve slope = *net* energy change rate. Hotter than surroundings → net loss → negative slope.", "source": "MiniMax M3 ②", "_id": "minimax_2_98", "judge_pick": false}, {"question": "Give the one-sentence reason a machine in space cannot be \"cooled by cold\" but only by radiation. (2 steps)", "answer": "- Step 1: In vacuum there is no medium, so conduction and convection are impossible — they need particles. Cold is not a thing that can flow into the machine; cold is just the *absence* of thermal energy in the surroundings.\n- Step 2: The only mechanism that can carry energy across a vacuum is electromagnetic radiation (infrared). So a machine in space loses heat *only* by radiating — it must be a good emitter, and it must not be absorbing more from the Sun than it can emit.\n\nTakeaway: cold doesn't flow. Vacuum → radiation only. To cool in space, you must emit (black, large) and avoid absorbing (shiny, reflective).", "source": "MiniMax M3 ②", "_id": "minimax_2_99", "judge_pick": false}], "count": 100}, "opus_1": {"label": "Opus 4.8 ①", "cards": [{"question": "In physics, the words \"thermal energy\" and \"heating\" describe two fundamentally different things. Distinguish them precisely.", "answer": "- Step 1: Thermal energy (or internal energy) is a **store** — a quantity a body possesses, measured in joules. It is the sum of the random kinetic energies of a body's particles plus the potential energies of the bonds between them.\n- Step 2: Heating is a **transfer pathway** — the *process* of energy moving from a hotter body to a cooler one, because of a temperature difference. It is not something a body \"contains.\"\n- Step 3: The classic exam error is saying a body \"contains heat.\" A body contains internal energy; heating is what happens when that energy flows across a temperature gap.\n\nTakeaway: thermal energy = the thing you have; heating = the moving of it.", "source": "Opus 4.8 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "Why is the idea of \"heat\" as a substance stored inside a body a misconception, and what did a body actually store instead?", "answer": "- Step 1: Historically (Lavoisier's caloric theory) heat was imagined as a weightless fluid flowing between bodies — but experiments (Rumford boring cannons, Joule's paddle wheel) showed work can create \"heat\" without any fluid being transferred.\n- Step 2: What a body actually stores is **internal energy** = kinetic energy of vibrating/moving particles + potential energy in stretched/compressed inter-atomic bonds.\n- Step 3: So \"heat\" is not a noun you store; it is better replaced by \"thermal energy\" (the store) and \"heating\" (the transfer). Calling it a substance leads to wrong reasoning about where energy \"goes.\"", "source": "Opus 4.8 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "List the energy stores and, separately, the energy transfer pathways. Why must these two lists never be mixed?", "answer": "- Step 1: Energy STORES (where energy sits): kinetic, gravitational potential, elastic (strain), chemical, thermal, nuclear, (electro)magnetic.\n- Step 2: Energy TRANSFER pathways (how it moves): heating, electrically, by radiation/waves (light, sound), mechanically (force × distance).\n- Step 3: They must stay separate because the exam rewards precise process description. \"Thermal\" is a store; \"heating\" is a pathway. Mixing them (e.g. listing \"heating\" as a store) shows you don't understand the store-vs-transfer distinction.", "source": "Opus 4.8 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "In which direction does energy always flow between two bodies at different temperatures, and what state ends the flow?", "answer": "- Step 1: Energy always flows from the **higher temperature to the lower temperature** — hot → cold — never spontaneously the other way.\n- Step 2: The flow continues until both bodies reach the **same temperature**.\n- Step 3: That end state is **thermal equilibrium**: net energy transfer stops and temperatures stay constant. This one-directional flow is the anchor for cooling curves and the greenhouse argument.", "source": "Opus 4.8 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "Define thermal equilibrium in terms of energy rates, not just \"same temperature.\"", "answer": "- Step 1: A body constantly emits infrared and absorbs infrared from its surroundings.\n- Step 2: Thermal equilibrium is when the **rate of energy emitted equals the rate of energy absorbed**.\n- Step 3: Because in equals out, the internal energy — and therefore the temperature — stays **constant**. Defining it by rates is more powerful: it explains why a body at equilibrium is still busily radiating, just balanced.", "source": "Opus 4.8 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "Temperature is often loosely said to be \"how hot something is.\" What does temperature actually measure at the particle level?", "answer": "- Step 1: At the microscopic level, particles have random kinetic energy from their motion (vibration in solids, faster movement in gases).\n- Step 2: Temperature is a measure of the **mean (average) random kinetic energy** of these particles — not the total energy, and not the potential part.\n- Step 3: This is why a large cool object can hold more total internal energy than a small hot one, yet be at a lower temperature: temperature tracks *average* KE per particle, not the sum.", "source": "Opus 4.8 ①", "_id": "opus_1_5", "judge_pick": true}, {"question": "A student writes \"pressure = mass ÷ volume.\" Correct this and explain what quantity they actually described.", "answer": "- Step 1: Pressure is defined as **force per unit area**: $$p = \\frac{F}{A}$$ with unit $$\\text{Pa} = \\text{N/m}^2$$.\n- Step 2: \"Mass ÷ volume\" is **density**, $$\\rho = \\frac{m}{V}$$ — a completely different quantity (kg/m³).\n- Step 3: Keep them surgically apart: pressure is about how hard a force presses on an area; density is about how much mass is packed into a volume. Confusing them wrecks convection reasoning (which is about density) and gas-pressure reasoning (which is about force on walls).", "source": "Opus 4.8 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "A sealed rigid container of gas is heated. Give the ordered particle-level reasoning chain for what happens to its pressure. (4 steps)", "answer": "- Step 1: Heating gives the gas particles more energy, so they move **faster**.\n- Step 2: Faster particles collide with the walls **more frequently**.\n- Step 3: Each collision also delivers a **larger force**; total force on the walls rises.\n- Step 4: Since $$p = F/A$$ and area is fixed, the pressure **increases**. The volume cannot change, so the gas does *not* expand — it is pressure that rises.\n\nTakeaway: fixed volume ⇒ talk about pressure, never expansion.", "source": "Opus 4.8 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "When a fixed-volume gas is heated, why is it wrong to say the gas \"expands,\" and what is the correct phrase for particles hitting walls?", "answer": "- Step 1: \"Expands\" implies the volume increases — but the container is rigid and sealed, so volume is fixed by definition.\n- Step 2: With volume locked, the extra energy shows up as **higher pressure**, not larger size.\n- Step 3: The correct phrase for the mechanism is \"**more frequent collisions with the walls**\" (plus harder collisions) — not \"more friction into the boxes.\" Friction is the wrong concept entirely.", "source": "Opus 4.8 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "In the Herschel prism experiment, what setup revealed infrared, and what precisely defines the infrared region?", "answer": "- Step 1: White light is passed through a prism, splitting it into the visible spectrum.\n- Step 2: Thermometers placed in each colour band show a temperature rise; the one placed **just beyond the red end** (where no colour is visible) shows the **biggest** rise.\n- Step 3: That invisible, strongly-warming region is **infrared radiation** — light we cannot see but which transfers energy to objects. Crucially, infrared is *specifically* just beyond red, not \"anything invisible\" (other EM bands also exist).", "source": "Opus 4.8 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "A student claims \"all invisible light is infrared.\" Why is this wrong?", "answer": "- Step 1: Infrared is one specific band of the electromagnetic spectrum, lying just beyond the red end of visible light (longer wavelength than red).\n- Step 2: There are many other invisible EM regions — ultraviolet, X-rays, gamma rays, microwaves, radio waves — all invisible but not infrared.\n- Step 3: So \"invisible\" is a much broader category. Infrared is defined by its position (just past red), not merely by being unseen.", "source": "Opus 4.8 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "Which objects emit infrared, how does this depend on temperature, and under what single condition would emission stop?", "answer": "- Step 1: **All** objects emit and absorb infrared, **all the time** — there is no object that \"doesn't emit.\"\n- Step 2: The **hotter** an object, the **more** infrared it emits (emission rises with temperature).\n- Step 3: The only case where an object would emit *no* infrared is at **0 K (absolute zero)**, where particle motion is at its theoretical minimum. Since 0 K is unreachable, essentially everything emits.", "source": "Opus 4.8 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "For a body that is cooling down, how does its emission rate compare with its absorption rate? What about a body warming up?", "answer": "- Step 1: A **cooling** body emits infrared **faster than** it absorbs — net energy leaves it, so temperature falls.\n- Step 2: A **warming** body absorbs infrared **faster than** it emits — but note it still emits some; it never stops emitting.\n- Step 3: When the two rates become equal, the body has reached thermal equilibrium and its temperature stays constant. So \"cooling/heating\" is really about the *imbalance* between emission and absorption, not one being switched off.", "source": "Opus 4.8 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "Rank black/matt vs white/shiny surfaces as emitters, absorbers, and reflectors of infrared, and explain why the emitter and absorber rankings match.", "answer": "- Step 1: **Black, matt (dull, rough)** surfaces are the **best emitters** and the **best absorbers**; they are poor reflectors.\n- Step 2: **White/shiny (mirror-like)** surfaces are the **worst emitters and absorbers**, but the **best reflectors**.\n- Step 3: Good emitters are good absorbers — these \"go together\" because a surface that couples strongly with infrared does so in both directions. Reflection is the *opposite* of absorption, so the best reflector must be the worst absorber (and worst emitter).\n\nTakeaway: emit and absorb track together; reflect is the opposite of absorb.", "source": "Opus 4.8 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "Keep three verbs surgically separate for surfaces: emit, absorb, reflect. State exactly what each means.", "answer": "- Step 1: **Emit** = give off (radiate) infrared from the surface itself.\n- Step 2: **Absorb** = take in incoming infrared that lands on the surface.\n- Step 3: **Reflect** = bounce back incoming radiation without absorbing it. Critically, \"best reflector\" and \"best absorber\" are *opposites* and never describe the same surface — a shiny surface reflects a lot precisely because it absorbs (and emits) little.", "source": "Opus 4.8 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "Two identical cans, one matt black and one shiny silver, hold water at the same high temperature. On a thermal camera the black one appears \"hotter.\" A student says the shiny reflector should \"give off more.\" Explain the resolution. (3 steps)", "answer": "- Step 1: Reflection requires an **incoming external source** of radiation for the shiny surface to bounce back. Here there is no strong external source — the heat comes from the hot water **inside**.\n- Step 2: Because the source is internal, what matters is **emission** (how well each surface radiates its own heat outward), not reflection.\n- Step 3: Black/matt is the best emitter, so it radiates more infrared and shows up \"hotter\" on the camera. The shiny can, being a poor emitter, radiates less. So emission (black) wins, not reflection (silver).", "source": "Opus 4.8 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "In a black-vs-silver cooling-curve experiment, both cans start at the same temperature (~80 °C). How does the graph reveal which surface emits more infrared, and why is it wrong to expect the strong emitter to get hotter? (3 steps)", "answer": "- Step 1: Record temperature every 30 s and plot temperature against time for both cans.\n- Step 2: The **black can's curve falls more steeply** — it loses energy faster, so it cools quicker. That faster rate of cooling is the evidence that black emits more infrared.\n- Step 3: It is wrong to think the strong emitter gets *hotter*, because **giving off energy makes a body cool down**. You read emission from the *rate of cooling*, never from a claim the emitter's temperature rises. Both curves eventually level off at room temperature (equilibrium).", "source": "Opus 4.8 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "Walk through the greenhouse/global-warming mechanism as it should be stated exam-tight, including the crucial wavelength change. (5 steps)", "answer": "- Step 1: The Sun emits mostly **short-wavelength** radiation (much of it visible/near-infrared), which passes through the atmosphere and reaches Earth.\n- Step 2: Earth **absorbs** this radiation and warms up.\n- Step 3: The warmed Earth **re-emits** radiation, but at a **longer wavelength (lower frequency)** infrared — this is the crux of the whole argument.\n- Step 4: Greenhouse gases (CO₂, water vapour, methane) let the Sun's incoming short-wavelength radiation through but **absorb and re-radiate** much of the outgoing longer-wavelength infrared, slowing energy escape.\n- Step 5: For millions of years absorption balanced emission (equilibrium). Extra CO₂ traps more outgoing infrared, so Earth settles at a **higher equilibrium temperature**.\n\nTakeaway: say \"different (longer) wavelength,\" not \"the atmosphere knocks radiation out.\"", "source": "Opus 4.8 ①", "_id": "opus_1_17", "judge_pick": true}, {"question": "A student calls infrared \"a weak type of nuclear radiation.\" Correct this and explain the true origin of infrared. (3 steps)", "answer": "- Step 1: The word \"radiation\" broadly just means something is *given off* — it does not automatically mean nuclear.\n- Step 2: **Nuclear radiation** is specifically alpha, beta and gamma emitted **from the nucleus** of an atom.\n- Step 3: Infrared (and visible light) is **electromagnetic radiation**, emitted when an **orbital electron drops to a lower energy level** and releases a photon. It has nothing to do with the nucleus, so calling it \"weak nuclear radiation\" is doubly wrong.", "source": "Opus 4.8 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "Define conduction and give the ordered particle-level mechanism by which it transfers energy through a solid. (3 steps)", "answer": "- Step 1: All particles in a solid are constantly **vibrating** about fixed positions.\n- Step 2: Particles in the **hotter** region vibrate **more** (greater amplitude/energy).\n- Step 3: They **pass these vibrations to neighbouring particles**, which pass them on again, so energy travels toward the cooler end — while the particles themselves stay roughly in place. Analogy: people linking arms; one shakes, the next shakes, and so on down the line.", "source": "Opus 4.8 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "Why do metals conduct heat far better than non-metals, and what carries the energy?", "answer": "- Step 1: In all solids, vibration-passing between fixed particles conducts some energy, but this is relatively slow.\n- Step 2: Metals contain **free (delocalised) electrons** not tied to any single atom.\n- Step 3: These electrons are knocked by the vibrating atoms, move **rapidly through the lattice**, and collide with atoms further along, transferring energy **much faster** than vibration-passing alone. That extra, fast pathway is why metals dominate as thermal conductors.", "source": "Opus 4.8 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "Thermal and electrical conduction in metals are related but distinct. Explain the difference and what links them. (3 steps)", "answer": "- Step 1: In **electrical** conduction, the free electrons drift in an **organised direction** under an electric field / potential difference — a net directed current.\n- Step 2: In **thermal** conduction, energy spreads via **lattice vibrations plus less-directed electron motion** from hot toward cold — there is no net charge flow required.\n- Step 3: The link: the same **free electrons** that make a metal a good electrical conductor also make it a good thermal conductor, which is why good electrical conductors (copper, silver) are also good thermal conductors.", "source": "Opus 4.8 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "Two blocks of different material sit in the same room, both at 21 °C. Ice on block 2 melts in ~12 s; ice on block 1 barely melts. A student says \"block 2 must be hot.\" Correct this. (3 steps)", "answer": "- Step 1: Both blocks are at the **same temperature** (21 °C), so neither is \"hotter\" than the other — the temperature explanation is ruled out immediately.\n- Step 2: The difference is **thermal conductivity**. Block 2 is the **better conductor**: it transfers energy from the room to the ice by contact much faster.\n- Step 3: So block 2 melts the ice quickly not because it holds more energy, but because it *moves* energy into the ice faster. Same temperature ⇒ compare conduction rate, not \"hotness.\"", "source": "Opus 4.8 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "In the metal-rod-and-wax demo (wax pieces stuck along a rod heated at one end), in what order do the pieces fall, and why?", "answer": "- Step 1: Energy enters at the heated end and travels along the rod by conduction — vibration-passing plus free-electron transfer in the metal.\n- Step 2: The wax nearest the heated end reaches its melting point first, so that piece falls first.\n- Step 3: Successive pieces fall **outward in sequence** as the energy travels progressively further along the rod. The order of falling directly maps the direction and progress of conduction along the rod.", "source": "Opus 4.8 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "Define convection and state the essential difference from conduction.", "answer": "- Step 1: Convection is heat transfer in **fluids (liquids or gases)** in which the **heated fluid itself physically moves**, carrying its energy with it.\n- Step 2: The key contrast: in conduction the particles pass on vibrations but stay roughly in place; in convection **whole regions of fluid bodily relocate**.\n- Step 3: This is why convection only happens in fluids — solids can't flow, so their particles can't carry energy across the material by moving in bulk.", "source": "Opus 4.8 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "Give the ordered particle chain for why heated fluid rises in convection. (5 steps)", "answer": "- Step 1: The heated part of the fluid: particles **gain energy**.\n- Step 2: They **move faster**.\n- Step 3: They **spread apart** (the same mass now occupies more volume).\n- Step 4: That region becomes **less dense**.\n- Step 5: Being less dense than the surrounding fluid, it **rises**. Cooler fluid (particles slower, closer, denser) **sinks** to replace it — creating a circulating convection current.\n\nTakeaway: gain energy → faster → spread out → less dense → rise.", "source": "Opus 4.8 ①", "_id": "opus_1_25", "judge_pick": false}, {"question": "When a fluid is heated, why does its density fall? A student thinks the particles \"get bigger.\" Correct this using the nightclub analogy.", "answer": "- Step 1: Heating does **not** make particles bigger — individual particles keep the same size.\n- Step 2: They **move faster and spread out**, so the **same mass now occupies a larger volume**. Since density = mass/volume, the density **falls**.\n- Step 3: Analogy: on a dance floor, an energetic song makes people move more and spread out, lowering the crowd density even though no one grew larger. The lower-density warm fluid then rises above the denser cool fluid.", "source": "Opus 4.8 ①", "_id": "opus_1_26", "judge_pick": true}, {"question": "Explain the daytime sea breeze as a convection current. (4 steps)", "answer": "- Step 1: The Sun heats the **land** by infrared; land warms faster than the sea.\n- Step 2: The warm land heats the **air above it** (by conduction from ground to air).\n- Step 3: That warm air becomes less dense and **rises**.\n- Step 4: Cooler, denser air over the **sea moves in** to replace the risen air — this inflow is the **sea breeze**, a large convection current driven by the land–sea temperature difference.", "source": "Opus 4.8 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "A student says that in the dyed-water convection loop, the water \"boils/becomes gas\" and might \"drop.\" Give both corrections.", "answer": "- Step 1: Correction 1 — the water is **not heated enough to change state**; it stays liquid throughout. The dye simply makes the circulating current *visible*; no gas forms.\n- Step 2: Correction 2 — the **heated** fluid **rises** (becomes less dense), it does not drop. It is the cooler, denser fluid on the other side that sinks.\n- Step 3: More generally, a gas can become denser and **sink while staying a gas** — cooling fluid does *not* need to turn into a liquid to sink. State change is not required for sinking.", "source": "Opus 4.8 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "A draught under a door — is it conduction, convection or radiation? A student answers \"conduction.\" Correct and explain the tell-tale sign.", "answer": "- Step 1: A draught is **convection**. Whole volumes of air physically move and replace one another (warm air out, cold air in).\n- Step 2: It is not conduction because conduction is vibration-passing between fixed particles, with no bulk flow — but here air is visibly *flowing*.\n- Step 3: The give-away: whenever you see **moving/replacing air (a fluid in bulk motion)**, that is convection. \"Air flowing\" ⇒ convection.", "source": "Opus 4.8 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "What single unifying idea underlies most household insulation, and how does it defeat two different transfer mechanisms at once?", "answer": "- Step 1: The unifying idea is **trapped air**.\n- Step 2: Air has **few particles**, so it conducts poorly ⇒ reduces **conduction**.\n- Step 3: When the air is trapped in **small pockets** it **cannot circulate** ⇒ reduces **convection**. So trapped air has a *dual* role. A vacuum is even better against conduction (no particles at all), and shiny/foil surfaces additionally defeat radiation by reflecting infrared.", "source": "Opus 4.8 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "For each of these house features, name the mechanism(s) reduced and why: double glazing, cavity-wall insulation, loft insulation, draught excluder, foil behind a radiator. (5 steps)", "answer": "- Step 1: **Double (or triple) glazing** — reduces **conduction**: an air (or argon) gap between panes is a poor conductor.\n- Step 2: **Cavity-wall insulation** (fibres between two brick layers) — reduces **conduction and convection**: fibres trap air and stop warm air flowing through the cavity.\n- Step 3: **Loft/roof insulation** (thick fibre roll) — reduces **conduction and convection**: trapped air conducts poorly and pockets stop air circulating.\n- Step 4: **Draught excluder** — reduces **convection**: blocks whole volumes of hot/cold air flowing under doors.\n- Step 5: **Foil/silver layer behind a radiator** — reduces **radiation**: reflects infrared back into the room (and is a poor emitter).\n\nTakeaway: separate the three mechanisms and match each feature to what it suppresses.", "source": "Opus 4.8 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "Why is a vacuum the *best* insulator, and why would \"very strong chemical bonds\" be the wrong answer for the best insulator? (3 steps)", "answer": "- Step 1: A vacuum contains **no particles at all**, so there is nothing to pass vibrations (no conduction) and no fluid to circulate (no convection). Both particle-based mechanisms are impossible.\n- Step 2: The \"strong bonds\" idea is backwards: **strong bonds transmit vibrations well**, making a *good conductor*, not a good insulator.\n- Step 3: Good insulation comes from **weaker bonds and, above all, fewer or no particles** (trapped air, or ideally vacuum). So fewer particles insulate; strong bonds do the opposite.", "source": "Opus 4.8 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "Define specific heat capacity in words and give its symbol and unit. Why is it defined \"per kilogram, per kelvin\"?", "answer": "- Step 1: Specific heat capacity (symbol $$c$$) is the **energy needed to raise the temperature of 1 kg of a substance by 1 K** (equivalently 1 °C). Unit: $$\\text{J/(kg\\,K)}$$.\n- Step 2: It is defined *per kilogram* so it is an intrinsic property of the *material*, independent of how much you have — the \"specific\" means per unit mass.\n- Step 3: It is defined *per kelvin* so it is independent of how big a temperature change you make. Together these let you compare materials fairly: water (4200) vs copper (~390) tells you water resists temperature change far more per kilogram.", "source": "Opus 4.8 ①", "_id": "opus_1_33", "judge_pick": true}, {"question": "State the equation relating energy, mass, specific heat capacity and temperature change, and derive the unit of $$c$$ from it.", "answer": "- Step 1: The equation is $$\\Delta E = mc\\,\\Delta\\theta$$, where $$\\Delta E$$ is energy (J), $$m$$ is mass (kg), $$c$$ is specific heat capacity, and $$\\Delta\\theta$$ is temperature change (K or °C).\n- Step 2: Rearrange for $$c$$: $$c = \\dfrac{\\Delta E}{m\\,\\Delta\\theta}$$.\n- Step 3: The units follow directly: joules divided by (kg × K) gives $$\\text{J/(kg\\,K)}$$. Deriving the unit from the equation is safer than memorising it.", "source": "Opus 4.8 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "Why can $$\\Delta\\theta$$ in $$\\Delta E = mc\\,\\Delta\\theta$$ be quoted in either kelvin or Celsius without conversion?", "answer": "- Step 1: Kelvin and Celsius have the **same size of degree** — a change of 1 K is exactly a change of 1 °C.\n- Step 2: The equation uses a temperature **change** ($$\\Delta\\theta$$), not an absolute temperature. A rise from 20 °C to 30 °C (10 °C) is the same as 293 K to 303 K (10 K).\n- Step 3: So the *interval* is identical in both scales, and no +273 correction is needed. (You only add/subtract 273 when converting an *absolute* temperature, never a difference.)", "source": "Opus 4.8 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "Water has $$c = 4200\\ \\text{J/(kg\\,K)}$$, unusually high. What practical consequences follow, and why does this high value arise?", "answer": "- Step 1: A high $$c$$ means water needs a lot of energy to change its temperature — it heats up slowly and cools down slowly.\n- Step 2: Consequence: water is excellent for radiators (stays hot a long time) and for heating homes; oceans moderate climate; it's used as a coolant. Metals like copper (~390) have low $$c$$, heating and cooling fast — good for cookware and heat sinks.\n- Step 3: The high value comes from water's molecular structure — strong hydrogen bonding stores a lot of energy without a large rise in molecular kinetic energy (temperature).", "source": "Opus 4.8 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "Estimate (mentally) the energy needed to raise 0.5 kg of copper (c ≈ 3850 J/(kg K) in this problem) by 3 K, and state the reasoning without a long calculation.", "answer": "- Step 1: Use $$\\Delta E = mc\\,\\Delta\\theta$$; the answer is mass × specific heat × temperature rise.\n- Step 2: Conceptually: 0.5 kg is half a kilogram, so you halve the per-kg energy; the 3 K rise triples the per-degree energy.\n- Step 3: So $$\\Delta E = 0.5 \\times 3850 \\times 3 \\approx 5.8\\ \\text{kJ}$$. The key insight is that energy scales *linearly* with all three factors — double any one and the energy doubles.\n\nTakeaway: read the target symbol (energy $$E$$, not temperature $$\\theta$$) and copy $$c$$ exactly — dropping a zero (385 vs 3850) changes the answer tenfold.", "source": "Opus 4.8 ①", "_id": "opus_1_37", "judge_pick": false}, {"question": "Describe the aluminium-block method for measuring $$c$$, stating the energy-balance principle it relies on. (3 steps)", "answer": "- Step 1: The principle is: **electrical energy supplied by the heater = increase in internal energy of the block**, i.e. $$IV\\Delta t = mc(\\theta_f - \\theta_i)$$.\n- Step 2: Method: weigh the block for $$m$$; insert a heater and thermometer (a little oil in the holes for good thermal contact); record starting temperature $$\\theta_i$$; switch on and record current $$I$$, voltage $$V$$, and time $$\\Delta t$$.\n- Step 3: After heating, record the **highest steady temperature** $$\\theta_f$$, then compute $$c = \\dfrac{IV\\Delta t}{m(\\theta_f - \\theta_i)}$$.", "source": "Opus 4.8 ①", "_id": "opus_1_38", "judge_pick": true}, {"question": "In the aluminium-block practical, the measured $$c$$ comes out *too large*. List the sources of error and explain the common cause. (4 steps)", "answer": "- Step 1: **Energy absorbed by the heater itself** (the main error) — some supplied energy heats the heater, not the block.\n- Step 2: **Energy lost to the surroundings** despite the lagging.\n- Step 3: **Energy taken by the lagging and thermometer** (small).\n- Step 4: **Inaccuracy of the thermometer/meters** (worsened when $$\\Delta\\theta$$ is small). The common cause for the first three: the block receives *less* energy than you counted, so in $$c = \\Delta E/(m\\Delta\\theta)$$ the numerator is over-counted ⇒ $$c$$ is too large.\n\nTakeaway: whenever counted energy exceeds energy actually reaching the block, the calculated $$c$$ inflates.", "source": "Opus 4.8 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "In a cooling-and-heating graph (Activity 10.2), why does the block's temperature keep rising for ~2 minutes *after* the heater is switched off?", "answer": "- Step 1: The heater sits in one hole and the thermometer in another, with the block between.\n- Step 2: When the heater is switched off, energy already delivered to the heater and near it is still **conducting through the block** to reach the thermometer — this takes a finite time even in aluminium (a good conductor).\n- Step 3: So the thermometer keeps registering a rise until all that \"in-transit\" energy has spread through, after which surroundings losses dominate and the temperature finally falls.", "source": "Opus 4.8 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "Why does using the initial gradient $$d\\theta/dt$$ of the heating curve give a better value for $$c$$ than using the overall temperature change? (3 steps)", "answer": "- Step 1: Early in heating, the block is barely above room temperature (< ~2 K), so the **rate of energy loss to surroundings is negligible**.\n- Step 2: At that point you can equate rate of electrical energy in to rate of energy gained by the block: $$IV = mc\\,\\dfrac{d\\theta}{dt}$$.\n- Step 3: Because surroundings losses are stripped out, the resulting $$c$$ is much closer to the accepted value than the crude $$IV\\Delta t/(m\\Delta\\theta)$$ method, which is inflated by losses over the whole run.", "source": "Opus 4.8 ①", "_id": "opus_1_41", "judge_pick": true}, {"question": "Why is an expanded polystyrene cup preferred over a glass beaker when measuring the specific heat capacity of a liquid?", "answer": "- Step 1: A glass beaker has significant mass and its own specific heat capacity, so it absorbs a non-negligible chunk of the supplied energy — you'd have to account for it.\n- Step 2: Expanded polystyrene has **very little mass**, so it absorbs almost no energy itself.\n- Step 3: It is also a **very good insulator**, minimising energy transfer from the liquid to the surroundings. Both effects make the energy balance much cleaner: nearly all supplied energy goes into the liquid.", "source": "Opus 4.8 ①", "_id": "opus_1_42", "judge_pick": true}, {"question": "Define specific latent heat, and distinguish latent heat of fusion from vaporisation with the state changes each governs.", "answer": "- Step 1: Specific latent heat (symbol $$L$$) is the **energy needed to change the state of 1 kg of a substance with no change in temperature**. Unit: $$\\text{J/kg}$$.\n- Step 2: **Fusion** ($$L_f$$): solid ↔ liquid (melting / freezing).\n- Step 3: **Vaporisation** ($$L_v$$): liquid ↔ gas (boiling / condensing). The equation is $$\\Delta E = L\\,\\Delta m$$. Crucially, \"no change in temperature\" must be stated in any definition.", "source": "Opus 4.8 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "During a change of state, why does the temperature stay constant even though energy is still being supplied? (3 steps)", "answer": "- Step 1: Temperature tracks the **kinetic** energy of the particles.\n- Step 2: During a state change, the supplied energy goes entirely into **potential energy** — breaking or loosening the inter-molecular bonds — not into kinetic energy.\n- Step 3: With no rise in particle kinetic energy, there is **no rise in temperature** until the state change is complete. This \"hidden\" energy input with no temperature change is exactly why it is called *latent* (hidden) heat.", "source": "Opus 4.8 ①", "_id": "opus_1_44", "judge_pick": false}, {"question": "For water, $$L_v \\approx 2.26\\times10^6$$ J/kg while $$L_f \\approx 3.34\\times10^5$$ J/kg — roughly seven times larger. Explain the physical reason. (3 steps)", "answer": "- Step 1: **Melting** (fusion) only needs to loosen the bonds enough that molecules can **slide past one another** — they stay close together as a liquid.\n- Step 2: **Boiling** (vaporisation) must **completely separate** the molecules until there are essentially no forces of attraction between them (gas).\n- Step 3: Pulling molecules fully apart requires far more work against intermolecular forces than merely letting them slide, so $$L_v \\gg L_f$$ — about seven times more for water.", "source": "Opus 4.8 ①", "_id": "opus_1_45", "judge_pick": false}, {"question": "On a temperature-vs-energy heating curve for a substance heated from solid to gas, describe the shape and state which equation governs each part. (3 steps)", "answer": "- Step 1: **Sloped sections** (solid warming, liquid warming, gas warming) — temperature rises within a single state — are governed by $$\\Delta E = mc\\,\\Delta\\theta$$.\n- Step 2: **Flat plateaus** (melting, then boiling) — temperature constant while state changes — are governed by $$\\Delta E = L\\,\\Delta m$$.\n- Step 3: The **boiling plateau is much longer** than the melting plateau because $$L_v \\gg L_f$$: far more energy is needed to vaporise than to melt, so at constant power the plateau lasts far longer.", "source": "Opus 4.8 ①", "_id": "opus_1_46", "judge_pick": false}, {"question": "In Core Practical 13B, the specific latent heat of vaporisation is found from a mass-vs-time graph without ever measuring a temperature. How, and why is this an advantage? (3 steps)", "answer": "- Step 1: A heater of known power $$P$$ boils water on a balance; the balance reading (mass) is recorded over time. From $$\\Delta E = L\\Delta m$$, dividing by time gives $$P = L\\,\\dfrac{dm}{dt}$$, so $$L = \\dfrac{P}{|dm/dt|}$$ = power ÷ (gradient of mass–time graph).\n- Step 2: The gradient of the linear part gives the boil-off rate in kg/s; power divided by that gives $$L$$.\n- Step 3: Advantage: laboratory thermometers have poor resolution (~1 °C) and are often inaccurate, so **avoiding a temperature measurement removes a large source of uncertainty**.", "source": "Opus 4.8 ①", "_id": "opus_1_47", "judge_pick": false}, {"question": "In the ice/latent-heat mixing experiment (13A), why is ice added until the water is as far *below* room temperature as it was *above* room temperature when ice was first added?", "answer": "- Step 1: While the mixture is above room temperature, it *loses* energy to the surroundings; while below room temperature, it *gains* energy from the surroundings.\n- Step 2: If the below-room and above-room intervals are made symmetric (equal size), the energy gained from the surroundings roughly **cancels** the energy lost to them.\n- Step 3: This makes the assumption \"no net heat exchange with surroundings\" much more valid, giving a more accurate value for $$L$$.", "source": "Opus 4.8 ①", "_id": "opus_1_48", "judge_pick": true}, {"question": "In the ice latent-heat method, why does not fully drying the ice make the measured $$L$$ come out *too small*?", "answer": "- Step 1: The method assumes the added mass $$\\Delta m$$ is *all ice* that must be melted (requiring $$L\\,\\Delta m$$ of energy).\n- Step 2: If the ice is wet, some of that added mass is already **liquid water at ~0 °C**, which needs no latent heat to melt.\n- Step 3: So the warm water actually only has to supply latent heat for the *true* ice mass, but you divide by the *larger* (ice + water) mass. Since $$L = \\Delta E/\\Delta m$$ with an inflated $$\\Delta m$$, the calculated $$L$$ comes out **too small**.", "source": "Opus 4.8 ①", "_id": "opus_1_49", "judge_pick": true}, {"question": "Define internal energy of a body (general) and internal energy of an *ideal* gas, and explain why they differ.", "answer": "- Step 1: General internal energy = the **sum of the random kinetic energies of the particles** (vibration/motion) **plus the potential energies** stored in the bonds between them.\n- Step 2: For an **ideal gas**, we assume intermolecular forces are negligible except during (brief) collisions, so there is essentially **no potential energy** — internal energy is **entirely random kinetic energy**.\n- Step 3: This is why, for an ideal gas, temperature (a measure of mean KE) is a direct measure of the total internal energy — there's no bond-potential term to complicate it.", "source": "Opus 4.8 ①", "_id": "opus_1_50", "judge_pick": false}, {"question": "Define absolute zero (0 K), and state what happens to particle motion there. Why can't a temperature be lower?", "answer": "- Step 1: Absolute zero is the **lowest theoretically possible temperature**, defined as **0 K**, equal to about −273 °C (precisely −273.15 °C).\n- Step 2: At 0 K, the particles have their **minimum possible kinetic energy** — in the simple model, no random motion at all.\n- Step 3: Since temperature reflects kinetic energy and you cannot remove energy below the minimum, you cannot go lower. (Quantum mechanics adds a tiny irremovable \"zero-point energy,\" but the classical picture is minimum KE.) A Kelvin temperature can therefore never be negative.", "source": "Opus 4.8 ①", "_id": "opus_1_51", "judge_pick": false}, {"question": "How do you convert between Celsius and Kelvin, and why is +273 used, not multiplication?", "answer": "- Step 1: $$T/\\text{K} = \\theta/°\\text{C} + 273$$, and $$\\theta/°\\text{C} = T/\\text{K} - 273$$ (more precisely 273.15).\n- Step 2: You **add or subtract**, never multiply, because the two scales have **degrees of equal size** — they differ only by where zero is placed (Kelvin's zero is absolute zero; Celsius's zero is ice point).\n- Step 3: So a Kelvin temperature is always 273 greater than the corresponding Celsius temperature. Multiplying would be wrong because the scales are *offset*, not *scaled*, relative to each other.", "source": "Opus 4.8 ①", "_id": "opus_1_52", "judge_pick": false}, {"question": "A student says \"36 °C in Hong Kong is twice as hot as 18 °C in London.\" A physicist says it's \"only about 6% hotter.\" Who is right and why?", "answer": "- Step 1: \"Twice as hot\" would require comparing on an **absolute (Kelvin) scale**, where zero means zero thermal energy.\n- Step 2: Convert: 18 °C = 291 K, 36 °C = 309 K. The ratio is $$309/291 \\approx 1.06$$.\n- Step 3: So the Hong Kong temperature is only about **6% higher on the absolute scale**, not double. The physicist is right; the student's error is treating Celsius (an offset scale) as if it were absolute.", "source": "Opus 4.8 ①", "_id": "opus_1_53", "judge_pick": false}, {"question": "How can a body's internal energy be increased by \"working\" rather than \"heating,\" and what distinguishes the two processes? (3 steps)", "answer": "- Step 1: **Heating** transfers energy because of a **temperature difference** — it is a *random* interchange of energy between particles (hot to cold).\n- Step 2: **Working** transfers energy irrespective of any temperature difference: mechanically ($$\\Delta E = F\\Delta x$$, e.g. rubbing hands, screwing into wood) or electrically ($$\\Delta E = IV\\Delta t$$, e.g. current through a resistor).\n- Step 3: Working is an **ordered** process — the force and energy transfer act in a defined direction — whereas heating is random. Both raise internal energy, but by different routes.", "source": "Opus 4.8 ①", "_id": "opus_1_54", "judge_pick": true}, {"question": "State Boyle's law with its conditions, and give the equation used in calculations. Why must the conditions be stated?", "answer": "- Step 1: **Boyle's law**: the pressure of a **fixed mass of gas** is **inversely proportional to its volume**, provided the **temperature is constant**: $$p \\propto 1/V$$, or $$pV = \\text{constant}$$.\n- Step 2: For calculations: $$p_1 V_1 = p_2 V_2$$.\n- Step 3: The conditions (fixed mass, constant temperature) must be stated because if mass or temperature changes, the simple inverse relationship no longer holds — the full ideal gas equation would be needed instead.", "source": "Opus 4.8 ①", "_id": "opus_1_55", "judge_pick": true}, {"question": "State the pressure law (constant volume) for a gas and give the particle-level reason pressure rises with temperature. (3 steps)", "answer": "- Step 1: **Pressure law**: at constant volume, $$p \\propto T$$ (T in kelvin), i.e. $$\\dfrac{p_1}{T_1} = \\dfrac{p_2}{T_2}$$.\n- Step 2: Heating raises the particles' kinetic energy so they move **faster**, colliding with the walls **more frequently and harder**.\n- Step 3: Greater total force on a fixed wall area means (via $$p = F/A$$) a **higher pressure**. The proportionality to *absolute* temperature is why extrapolating a $$p$$-vs-temperature graph to zero pressure gives −273 °C = absolute zero.", "source": "Opus 4.8 ①", "_id": "opus_1_56", "judge_pick": false}, {"question": "A student heats gas from 27 °C to 54 °C at constant volume, expecting the pressure to double, but it rises only ~9%. Explain the mistake. (3 steps)", "answer": "- Step 1: Pressure is proportional to **absolute (Kelvin) temperature**, not Celsius.\n- Step 2: 27 °C = 300 K and 54 °C = 327 K, so the ratio is $$327/300 = 1.09$$ — only a 9% rise, not a doubling.\n- Step 3: The student wrongly doubled the *Celsius* number (27 → 54). To actually double the pressure you'd need to double the *Kelvin* temperature (300 K → 600 K = 327 °C). Always use kelvin in gas laws.", "source": "Opus 4.8 ①", "_id": "opus_1_57", "judge_pick": true}, {"question": "State the ideal gas equation $$pV = NkT$$, identify every symbol with units, and note the value of $$k$$.", "answer": "- Step 1: $$pV = NkT$$ where $$p$$ = pressure (Pa), $$V$$ = volume (m³), $$N$$ = number of molecules, $$T$$ = absolute temperature (K).\n- Step 2: $$k$$ is the **Boltzmann constant**, $$k = 1.38 \\times 10^{-23}$$ J/K.\n- Step 3: $$k$$ arises from $$k = R/N_A$$ (molar gas constant ÷ Avogadro number). It links **microscopic** quantities (molecular energy) to **macroscopic** ones (temperature), which is why its unit is J/K. All quantities must be in SI units and $$T$$ in kelvin.", "source": "Opus 4.8 ①", "_id": "opus_1_58", "judge_pick": false}, {"question": "Why is the Boltzmann constant such a tiny number (~10⁻²³ J/K)? What does it physically represent?", "answer": "- Step 1: $$k$$ connects the energy scale of a **single molecule** to a temperature change.\n- Step 2: The kinetic energy gained by one molecule per unit rise in temperature is extremely small (a single molecule is a minuscule system).\n- Step 3: So $$k$$'s tiny value reflects that it takes an enormous number of molecules (~$$10^{23}$$ per mole) for these tiny per-molecule energies to add up to everyday energy amounts. It is essentially the \"energy per molecule per kelvin\" conversion factor.", "source": "Opus 4.8 ①", "_id": "opus_1_59", "judge_pick": true}, {"question": "List the key assumptions of the kinetic theory model for an ideal gas. (5 steps)", "answer": "- Step 1: A gas consists of a **very large number of molecules** in **continuous, rapid, random motion** (evidenced by Brownian motion).\n- Step 2: Collisions (molecule–molecule and molecule–wall) are **perfectly elastic** — no kinetic energy lost (else the gas would slow and cool, contradicting continuous Brownian motion).\n- Step 3: The **volume of the molecules themselves is negligible** compared to the container (gases compress easily).\n- Step 4: **Intermolecular forces are negligible** except during collision (molecules are far apart relative to their size).\n- Step 5: The **duration of collisions is negligible** compared with time between collisions. These let us treat internal energy as purely kinetic.", "source": "Opus 4.8 ①", "_id": "opus_1_60", "judge_pick": false}, {"question": "How does Brownian motion provide evidence for the kinetic theory of matter?", "answer": "- Step 1: Robert Brown observed that tiny pollen grains suspended in water move in small, random, jerky paths under a microscope.\n- Step 2: This is explained by **unequal bombardment** of each visible grain by the much smaller, invisible **water molecules**, which must therefore themselves be in continuous random motion.\n- Step 3: So the visible random dance of the grains is indirect evidence that the fluid particles are constantly, randomly moving — the core claim of kinetic theory. Einstein later analysed it quantitatively to estimate Avogadro's number.", "source": "Opus 4.8 ①", "_id": "opus_1_61", "judge_pick": true}, {"question": "Sketch the logic of deriving $$pV = \\frac{1}{3}Nm\\langle c^2\\rangle$$ from a single molecule bouncing in a cube. Give the key physics steps, not the full algebra. (5 steps)", "answer": "- Step 1: A molecule (mass $$m$$, x-component speed $$u$$) hits a wall **elastically**, reversing momentum: change = $$-2mu$$ (Newton's laws, elastic assumption).\n- Step 2: It crosses the box (side $$l$$) and returns, making $$\\tfrac{1}{2}(u/l)$$ collisions per second with a given wall.\n- Step 3: Force on wall = (collisions per second) × (momentum change) $$= mu^2/l$$ (force = rate of change of momentum, Newton's 2nd; wall force equal/opposite, Newton's 3rd).\n- Step 4: Pressure = force/area = $$mu^2/l^3 = mu^2/V$$; summing over $$N$$ molecules and using $$\\langle u^2\\rangle$$: $$pV = Nm\\langle u^2\\rangle$$.\n- Step 5: By isotropy $$\\langle u^2\\rangle = \\tfrac{1}{3}\\langle c^2\\rangle$$, giving $$pV = \\tfrac{1}{3}Nm\\langle c^2\\rangle$$.\n\nTakeaway: remember the chain — elastic collision → momentum change → force = rate of change of momentum → pressure = force/area.", "source": "Opus 4.8 ①", "_id": "opus_1_62", "judge_pick": false}, {"question": "Combine the kinetic-theory result with the ideal gas equation to show mean molecular kinetic energy is proportional to absolute temperature. (3 steps)", "answer": "- Step 1: Kinetic theory gives $$pV = \\tfrac{1}{3}Nm\\langle c^2\\rangle$$; the ideal gas equation gives $$pV = NkT$$.\n- Step 2: Equate the two: $$\\tfrac{1}{3}Nm\\langle c^2\\rangle = NkT$$, so $$\\tfrac{1}{3}m\\langle c^2\\rangle = kT$$.\n- Step 3: Multiply both sides by $$\\tfrac{3}{2}$$: $$\\tfrac{1}{2}m\\langle c^2\\rangle = \\tfrac{3}{2}kT$$. Since $$\\tfrac{1}{2}m\\langle c^2\\rangle$$ is the mean random KE per molecule and $$k$$ is constant, mean KE $$\\propto T$$ — and would be zero at $$T = 0$$ K, reinforcing why absolute zero is the floor.\n\nTakeaway: \"Average KE is three-halves kT.\"", "source": "Opus 4.8 ①", "_id": "opus_1_63", "judge_pick": false}, {"question": "Distinguish \"mean square speed,\" \"root-mean-square speed,\" and \"average velocity\" of gas molecules. Why is average velocity zero?", "answer": "- Step 1: **Mean square speed** $$\\langle c^2\\rangle$$ = average of the *squares* of all molecular speeds (square each, add, divide by number).\n- Step 2: **Root-mean-square (rms) speed** $$\\sqrt{\\langle c^2\\rangle}$$ = square root of the mean square speed; it's close to (but not equal to) the average speed and is the physically meaningful \"typical\" speed.\n- Step 3: **Average velocity** is **zero** for a stationary gas, because velocity is a vector: molecules move in all directions equally, so the vector sum cancels. Speed (a magnitude) has no cancellation, which is why we use rms speed instead.", "source": "Opus 4.8 ①", "_id": "opus_1_64", "judge_pick": true}, {"question": "The rms speed of air molecules (~480 m/s) is faster than the speed of sound in air (~340 m/s). Why is this physically reasonable? (3 steps)", "answer": "- Step 1: Sound is carried through air by molecular collisions passing the disturbance along.\n- Step 2: Sound can travel no faster than the molecules that carry it move, so the speed of sound should be somewhat *less* than the typical molecular speed.\n- Step 3: 340 m/s is about 25% below the rms speed of ~480 m/s — consistent and reasonable. This agreement helps justify the kinetic-theory assumptions (molecules in rapid random motion). A lighter gas like helium has higher molecular speed, hence faster sound and the \"Donald Duck\" voice.", "source": "Opus 4.8 ①", "_id": "opus_1_65", "judge_pick": true}, {"question": "Why does a hot machine in the vacuum of space *not* get cooled automatically by \"cold space,\" and by which single mechanism can it lose heat? (3 steps)", "answer": "- Step 1: A vacuum contains **no particles**, so there is **no conduction** (nothing to pass vibrations to) and **no convection** (no fluid to circulate and carry heat away).\n- Step 2: With both particle-based pathways eliminated, the **only** remaining route is **radiation** — the machine can lose heat solely by emitting infrared.\n- Step 3: So \"cold space\" cannot draw heat out by contact or airflow; the machine must actively **radiate** its heat away, or it will overheat. Cold space is a poor coolant for anything that generates heat.", "source": "Opus 4.8 ①", "_id": "opus_1_66", "judge_pick": false}, {"question": "Design a cooling solution for a heat-generating machine in space, and explain each design choice. (3 steps)", "answer": "- Step 1: **Conduct the internal heat to a large, matte-black radiator.** Matte black is the best emitter, and large area maximises radiated power — this dumps the internal heat as infrared into space (the only available route).\n- Step 2: **Add a reflective (silver) layer facing the Sun.** This reflects incoming solar radiation so it is not absorbed, reducing the heat load the radiator must handle.\n- Step 3: **Size the radiator to handle the sum** of internally generated heat *plus* any absorbed solar input. If solar input is ~1000 W/m² and internal generation ~500 (illustrative units), the emitter must radiate both. This is exactly why spacecraft carry reflective outer layers plus dedicated radiator panels.", "source": "Opus 4.8 ①", "_id": "opus_1_67", "judge_pick": false}, {"question": "Contrast why an object on Earth cools easily but the same object in space does not, using the three transfer mechanisms.", "answer": "- Step 1: On Earth, a hot object cools by all three routes: **conduction** to touching surfaces, **convection** as surrounding air heats, rises and is replaced, and **radiation** of infrared.\n- Step 2: In space (vacuum), there is no medium, so **conduction and convection are both eliminated** — two of the three cooling routes vanish.\n- Step 3: Only **radiation** remains, and radiative cooling alone is often slow, so a machine that cooled fine on Earth (with air convection and liquid cooling) can overheat in space unless given a large radiating surface.", "source": "Opus 4.8 ①", "_id": "opus_1_68", "judge_pick": true}, {"question": "In the Sahara-to-Paris heatwave model, explain why the air becomes so hot — is it \"radiation or convection\"? (4 steps)", "answer": "- Step 1: The Sun's **infrared (radiation)** heats the Sahara ground.\n- Step 2: Air just above the hot sand is heated by **conduction** from the ground (passing vibrations from solid to air particles).\n- Step 3: That hot air becomes less dense, rises, and is transported toward Paris by large-scale **convection**.\n- Step 4: Locally in Paris, **infrared** heats the streets and Eiffel Tower, and those hot solids reheat nearby air by **conduction**. So the answer is a **combination of all three mechanisms**, not one — do not force a single mechanism when a real scenario combines them.", "source": "Opus 4.8 ①", "_id": "opus_1_69", "judge_pick": false}, {"question": "Why is the \"either/or\" thinking (e.g. \"it's convection, not radiation\") a common trap in real thermal scenarios?", "answer": "- Step 1: Textbook demos usually isolate one mechanism, training students to pick a single answer.\n- Step 2: But real situations (heatwaves, houses, cooking, spacecraft) almost always involve **several mechanisms acting together and in sequence** — e.g. radiation heats a surface, conduction passes it to air, convection carries it away.\n- Step 3: The exam-safe approach is to **identify each mechanism at each stage** rather than forcing one. Saying \"a combination of all three\" (with the sequence) is often the correct and higher-marking answer.", "source": "Opus 4.8 ①", "_id": "opus_1_70", "judge_pick": false}, {"question": "Why does a fibre insulation product with small air pockets stop *convection*, not just conduction?", "answer": "- Step 1: Air is already a poor conductor because it has few particles — that handles the conduction part.\n- Step 2: But loose open air could still *circulate* (warm air rising, cool sinking), carrying heat by convection.\n- Step 3: The fibres divide the air into **small trapped pockets** that **immobilise** it — the air can no longer flow in bulk, so convection is suppressed too. This dual action (few particles + no circulation) is why trapped-air insulators are so effective.", "source": "Opus 4.8 ①", "_id": "opus_1_71", "judge_pick": false}, {"question": "Why is a dented table-tennis ball popped out by dunking it in hot water, in terms of the gas inside? (3 steps)", "answer": "- Step 1: The ball contains a fixed mass of air at roughly constant volume.\n- Step 2: Hot water heats the air inside; by the pressure law ($$p \\propto T$$), the air molecules move faster, hit the ball's inner surface harder and more often, so the **internal pressure rises**.\n- Step 3: The raised internal pressure pushes outward on the dented (inward) region, popping it back out. It's a direct application of fixed-volume gas heating.", "source": "Opus 4.8 ①", "_id": "opus_1_72", "judge_pick": false}, {"question": "In a thermogram of soup heating in a metal pan, the plastic spoon handle stays \"cold-coloured\" while the pan looks hot. Explain what the colours reveal. (3 steps)", "answer": "- Step 1: A thermogram detects emitted long-wavelength infrared and maps surface temperature to colour.\n- Step 2: The **metal pan** conducts heat well (free electrons + vibrations), so it warms across its surface — shown as a hot colour.\n- Step 3: The **plastic handle** is a poor conductor, so heat barely travels along it — it stays cool, shown as a cold colour. The image directly visualises the difference in thermal conductivity between metal and plastic.", "source": "Opus 4.8 ①", "_id": "opus_1_73", "judge_pick": false}, {"question": "Why do aluminium brake discs (c ≈ 910) work well as a lighter alternative to iron-alloy discs (c ≈ 480) without getting hotter?", "answer": "- Step 1: Braking converts the car's ordered kinetic energy into disordered internal (thermal) energy of the discs; the temperature rise is $$\\Delta\\theta = \\Delta E/(mc)$$.\n- Step 2: Aluminium's specific heat capacity is almost **twice** that of the iron alloy, so for the same energy it needs roughly half the temperature rise per kilogram.\n- Step 3: This means aluminium discs of **half the mass** can absorb the same braking energy without getting any hotter than iron discs — saving weight (better performance) while keeping temperatures safe. Drilled holes further help by ventilating heat to the air.", "source": "Opus 4.8 ①", "_id": "opus_1_74", "judge_pick": false}, {"question": "Why does the water at the bottom of a waterfall have a (very slightly) higher temperature than at the top, and roughly how big is the effect for a tall fall?", "answer": "- Step 1: As water falls a height $$h$$, its gravitational potential energy $$mgh$$ converts to kinetic energy, then on impact to **internal energy** (random molecular motion) — a temperature rise.\n- Step 2: Energy conservation per kilogram: $$mgh = mc\\,\\Delta\\theta$$, so $$\\Delta\\theta = gh/c$$.\n- Step 3: For a big fall (say ~270 m): $$\\Delta\\theta \\approx (10 \\times 270)/4200 \\approx 0.6$$ K — a tiny fraction of a degree. The effect is real but minuscule, and spray/mixing make it hard to measure, which is why Joule found it \"too much broken into spray.\"", "source": "Opus 4.8 ①", "_id": "opus_1_75", "judge_pick": true}, {"question": "A \"1 kg of substance heated by 1 K, no state change\" scenario versus a \"change of state at constant temperature\" scenario — which formula and concept applies to each?", "answer": "- Step 1: \"1 kg ... by 1 K, **no state change**\" ⇒ **specific heat capacity**, $$\\Delta E = mc\\,\\Delta\\theta$$ — energy raises temperature within one state.\n- Step 2: \"**Change of state, constant temperature**\" ⇒ **specific latent heat**, $$\\Delta E = L\\,\\Delta m$$ — energy changes phase with no temperature change.\n- Step 3: The trigger words are decisive: *temperature change within a state* → $$c$$; *state change with constant temperature* → $$L$$. Confusing them is a classic error, especially on heating-curve questions where both appear.", "source": "Opus 4.8 ①", "_id": "opus_1_76", "judge_pick": false}, {"question": "Which process is being tested? Match each clue to conduction, convection, or radiation: (a) \"collisions of particles through a solid,\" (b) \"across empty space / surface colour,\" (c) \"a fluid rises/sinks / a draught.\"", "answer": "- Step 1: (a) \"**Passing vibrations / collisions of particles / through a solid**\" ⇒ **conduction**.\n- Step 2: (b) \"**Electromagnetic waves / infrared / across empty space / surface colour matters**\" ⇒ **radiation** (the only one that needs no medium).\n- Step 3: (c) \"**A fluid rises/sinks / whole volumes of air move / a draught**\" ⇒ **convection** (bulk fluid flow). Learning these trigger phrases lets you pick the right mechanism (and the right keywords) quickly in worded questions.", "source": "Opus 4.8 ①", "_id": "opus_1_77", "judge_pick": false}, {"question": "Why must you always state the *keywords in the right causal order* in worded thermal questions, and give an example of doing it wrong vs right for conduction.", "answer": "- Step 1: Examiners award marks for an accurate *process description*, so the causal chain must be logically ordered, not a jumble of correct-sounding words.\n- Step 2: **Wrong (unordered):** \"metals have free electrons and vibrations and heat moves.\" This lacks cause-and-effect.\n- Step 3: **Right (ordered):** \"Particles in the hotter region vibrate more → they pass vibrations to neighbours → free electrons are knocked and move through the lattice → they collide with atoms further along → energy travels from hot to cold.\" Same facts, but the ordered chain earns the marks.", "source": "Opus 4.8 ①", "_id": "opus_1_78", "judge_pick": true}, {"question": "Estimate mentally: an avocado of mass ~0.2 kg needs ~1300 J to cool by 2 K. Roughly what is its specific heat capacity, and what does the value tell you? (3 steps)", "answer": "- Step 1: Use $$c = \\dfrac{\\Delta E}{m\\,\\Delta\\theta}$$, so $$c = \\dfrac{1300}{0.2 \\times 2} = \\dfrac{1300}{0.4} \\approx 3200$$ J/(kg K) (the precise printed value ~3009).\n- Step 2: The value is high — between fat/oil (~2000) and water (4200) — consistent with an avocado being mostly water and fat.\n- Step 3: Lesson from the source: **re-key the division** — a neatly circled board answer (e.g. \"2500\") can still be arithmetically wrong; always recompute $$1300 \\div 0.4$$ yourself rather than trusting a written figure.", "source": "Opus 4.8 ①", "_id": "opus_1_79", "judge_pick": false}, {"question": "Given a substance with a known $$c$$ that gains a certain energy, how do you find its temperature change, and why do you divide?", "answer": "- Step 1: Start from $$\\Delta E = mc\\,\\Delta\\theta$$ and rearrange for the unknown: $$\\Delta\\theta = \\dfrac{\\Delta E}{mc}$$.\n- Step 2: You **divide** because more mass or higher specific heat capacity means the *same* energy produces a *smaller* temperature rise — mass and $$c$$ oppose the temperature change.\n- Step 3: Conceptually: e.g. 3000 J into ~0.2 kg with $$c \\approx 3000$$ gives $$\\Delta\\theta \\approx 3000/(0.2\\times3000) = 3000/600 = 5$$ K — a modest rise, because the product $$mc$$ (~600 J/K) is the \"energy needed per kelvin.\"", "source": "Opus 4.8 ①", "_id": "opus_1_80", "judge_pick": false}, {"question": "Why does the measured specific latent heat of vaporisation in Core Practical 13B typically come out *larger* than the accepted value?", "answer": "- Step 1: The calculation assumes all the heater's energy goes into vaporising water: $$L = P/(dm/dt)$$.\n- Step 2: In reality some supplied energy is **lost to the surroundings** (heating the beaker, the air, radiating away) rather than boiling water off.\n- Step 3: So the mass boiled off ($$dm/dt$$) is *smaller* than it would be if all energy vaporised water. Dividing power by a too-small boil-off rate gives an **inflated $$L$$**. (Lagging the beaker reduces this.)", "source": "Opus 4.8 ①", "_id": "opus_1_81", "judge_pick": false}, {"question": "When ice at −18 °C is left to warm and eventually reach room temperature, describe the sequence of energy changes and where temperature does/doesn't change. (4 steps)", "answer": "- Step 1: **−18 °C to 0 °C (solid warming):** energy raises molecular kinetic energy; temperature rises ($$\\Delta E = mc_{ice}\\Delta\\theta$$).\n- Step 2: **At 0 °C (melting):** energy goes entirely into potential energy, breaking solid bonds; temperature stays constant ($$\\Delta E = L_f\\,\\Delta m$$).\n- Step 3: **0 °C to room temp (liquid warming):** kinetic energy rises again; temperature rises ($$\\Delta E = mc_{water}\\Delta\\theta$$).\n- Step 4: **At room temperature:** the water reaches thermal equilibrium with the room and stays there. The plateau at 0 °C is the only stage where energy in produces no temperature change.", "source": "Opus 4.8 ①", "_id": "opus_1_82", "judge_pick": true}, {"question": "A freezer must cool air from 20 °C to −18 °C. Conceptually, how do you find the energy to remove from the air, and what data do you need?", "answer": "- Step 1: You need the **mass of the air**, which comes from density × volume ($$m = \\rho V$$), and the air's specific heat capacity.\n- Step 2: The temperature change is the full drop, $$\\Delta\\theta = 20 - (-18) = 38$$ K (the sign of the endpoints doesn't matter — it's the magnitude of the change).\n- Step 3: Then energy removed $$= mc\\,\\Delta\\theta$$. Conceptually the point is: air is low-density, so even a large volume has small mass, and its $$c$$ (~1000 J/(kg K)) is modest, so surprisingly little energy is needed to cool the *air* (most freezer work goes into the contents).", "source": "Opus 4.8 ①", "_id": "opus_1_83", "judge_pick": false}, {"question": "In the copper-block SHC question, the working copied \"385\" instead of \"3850\" and started labelling the unknown as a temperature symbol though the question asked for energy. Why do these two slips matter? (3 steps)", "answer": "- Step 1: **Dropping a zero (3850 → 385)** scales the answer by a factor of 10 — the energy would come out ten times too small. Always copy given values exactly.\n- Step 2: **Writing the wrong target symbol** (θ instead of E) shows you've lost track of what's being asked — the question wanted energy transferred, not a temperature.\n- Step 3: Both are avoidable \"layout\" errors. Alex's mantra \"three, two, one, layout\" stresses that a clear layout (correct symbols, correct values) is the most important part of a calculation, because a small copying slip silently produces a confidently-wrong answer.", "source": "Opus 4.8 ①", "_id": "opus_1_84", "judge_pick": false}], "count": 85}, "opus_2": {"label": "Opus 4.8 ②", "cards": [{"question": "In energy terminology, \"thermal\" and \"heating\" belong to two different lists. Which list does each belong to, and why does mixing them up cost exam marks?", "answer": "- Step 1: Recall there are two separate lists — energy **stores** (where energy sits) and energy **transfer pathways** (how energy moves). These are conceptually distinct categories.\n- Step 2: \"Thermal\" is a **store** — energy actually residing in the random motion and bonds of particles, measurable in joules.\n- Step 3: \"Heating\" is a **transfer pathway** — the *process* of moving thermal energy from a hotter to a cooler body.\n\nThe examiner rewards precise process language: a body never \"contains heat,\" it contains thermal (internal) energy; heating is what moves it.", "source": "Opus 4.8 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "Name the seven energy stores and the four transfer pathways used in this chapter.", "answer": "- Step 1: The **stores** (where energy sits): kinetic (KE), gravitational potential (GPE), elastic (strain), chemical, thermal, nuclear, and (electro)magnetic.\n- Step 2: The **transfer pathways** (how energy moves): heating, electrically, radiation (waves — light, sound), mechanically (force × distance).\n- Step 3: The key discipline is never to let a pathway (e.g. heating, radiation) slip into your store list, or vice versa.\n\nAlex admitted nobody reliably recalls the full store list — the point is to keep the *categories* clean.", "source": "Opus 4.8 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "A student defines pressure as \"mass divided by volume.\" What is wrong, and what is the correct definition with units?", "answer": "- Step 1: \"Mass ÷ volume\" is the definition of **density** ($$\\rho = m/V$$), not pressure — this is the exact slip Phuc made.\n- Step 2: Pressure is **force per unit area**: $$p = \\dfrac{F}{A}$$.\n- Step 3: Its unit is the pascal, $$\\text{Pa} = \\text{N/m}^2$$ — one pascal is a force of 1 N acting at right angles over $$1\\,\\text{m}^2$$.\n\nKeep $$p = F/A$$ and $$\\rho = m/V$$ surgically separated — they share no physical meaning.", "source": "Opus 4.8 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "A sealed rigid container of gas is heated. Explain, in the correct causal order, what happens to its pressure. (4 steps)", "answer": "- Step 1: Heating gives the gas particles more kinetic energy, so they move **faster**.\n- Step 2: Faster particles make **more frequent** collisions with the container walls.\n- Step 3: Each collision exerts a **larger force**, so the total force on the walls increases.\n- Step 4: Since $$p = F/A$$ and the area is fixed, the **pressure rises**. The volume cannot change, so the gas cannot expand.\n\nTrigger phrase to avoid: never say the gas \"expands\" when volume is fixed — it is *pressure* that increases.", "source": "Opus 4.8 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "Why is it wrong to say a fixed-volume gas \"expands\" when heated, and what is the correct phrasing for what particles do at the walls?", "answer": "- Step 1: \"Expands\" implies the volume increases — but in a fixed-volume (rigid) container the volume is constant by definition, so expansion is impossible.\n- Step 2: The correct description is \"more **frequent** collisions with the walls\" — Phuc wrongly said \"more friction into the boxes,\" which is not the physics.\n- Step 3: The consequence of fixed volume is that all the extra particle energy shows up as increased **pressure**, not increased size.\n\nIf volume is fixed, always talk about pressure; if pressure is fixed, talk about volume.", "source": "Opus 4.8 ②", "_id": "opus_2_4", "judge_pick": true}, {"question": "In which single direction does thermal energy always flow between two bodies, and what state ends the flow?", "answer": "- Step 1: Energy always flows from the **higher-temperature** body to the **lower-temperature** body — never spontaneously the other way.\n- Step 2: This continues until both bodies reach the **same temperature**.\n- Step 3: That end state is called **thermal equilibrium**, at which the temperature is constant.\n\nThis one-directional flow anchors the greenhouse-effect and cooling-curve arguments later in the chapter.", "source": "Opus 4.8 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "In the Herschel prism experiment, where is the thermometer placed that shows the biggest temperature rise, and what does this reveal? (3 steps)", "answer": "- Step 1: White light passed through a prism splits into the visible spectrum, and thermometers are placed in each colour band.\n- Step 2: The thermometer placed **just beyond the red** end — where no colour is visible — shows the largest temperature rise.\n- Step 3: This reveals **infrared radiation**: invisible light, positioned specifically beyond red, that transfers energy to (warms) objects.\n\nCorrection to remember: infrared is *specifically* beyond red, not \"anything invisible\" — other invisible EM bands exist.", "source": "Opus 4.8 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "Under what single, unique condition would an object emit no infrared radiation at all?", "answer": "- Step 1: All objects emit and absorb infrared **all the time**; hotter objects emit more.\n- Step 2: Emission is driven by particle motion, so it only ceases when particle motion reaches its minimum.\n- Step 3: That happens only at **absolute zero (0 K)**. Since 0 K is effectively unreachable, essentially everything in the universe emits infrared.", "source": "Opus 4.8 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "Compare a cooling object and a heating object in terms of their emission and absorption rates of infrared.", "answer": "- Step 1: A **cooling** object emits infrared at a *greater* rate than it absorbs — net energy leaves it, so its temperature falls.\n- Step 2: A **heating** object absorbs at a *greater* rate than it emits — but it still emits *some* infrared (emission never stops above 0 K).\n- Step 3: At **thermal equilibrium**, emission rate exactly equals absorption rate, and the temperature stays constant.\n\nThe key insight: everything both emits and absorbs simultaneously; the *net* direction depends on which rate is larger.", "source": "Opus 4.8 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "Which surface is the best emitter/absorber of infrared, and which is the best reflector? State the pairing rule that connects them.", "answer": "- Step 1: **Black, matt (dull, rough)** surfaces are the best emitters *and* the best absorbers.\n- Step 2: **White/light, shiny (mirror-like)** surfaces are the worst emitters and absorbers, but the best reflectors.\n- Step 3: The pairing rule: good emitters are good absorbers (they \"go together\"), and reflection is the *opposite* of absorption — so the best reflector is the worst absorber/emitter.", "source": "Opus 4.8 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "Distinguish the three verbs *emit*, *absorb* and *reflect* for infrared, and explain why \"best reflector\" and \"best absorber\" can never be the same surface.", "answer": "- Step 1: **Emit** = give off radiation (from the object's own thermal energy); **absorb** = take in incoming radiation; **reflect** = bounce incoming radiation straight back.\n- Step 2: Absorption and reflection are competing fates for the *same* incoming radiation — energy either goes in (absorbed) or bounces off (reflected).\n- Step 3: Therefore a surface that reflects nearly everything absorbs almost nothing, and vice versa — \"best reflector\" and \"best absorber\" are opposites, never the same surface.", "source": "Opus 4.8 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "Two identical cans hold hot water at the same temperature — one matt black, one shiny silver. On an infrared camera the black can looks \"hotter.\" Why does black win here, and why is reflection irrelevant?", "answer": "- Step 1: Both cans are at the *same* temperature, so neither is physically hotter — the camera detects emitted infrared, and the black can *emits* more.\n- Step 2: Reflection requires an **external incoming source** of radiation to bounce back. Here the energy source is the hot water *inside* the can.\n- Step 3: Since the relevant process is **emission** (energy leaving from inside), and black is the best emitter, black wins. Phuc's guess that the shiny reflector \"gives more\" fails because there is nothing external to reflect.", "source": "Opus 4.8 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "Explain the greenhouse-warming mechanism in the correct exam sequence, being precise about wavelengths. (5 steps)", "answer": "- Step 1: The Sun emits mostly **short-wavelength** radiation (much of it visible/near-infrared), which passes through the atmosphere and reaches Earth.\n- Step 2: Earth **absorbs** this radiation and warms.\n- Step 3: The warmed Earth **re-emits** radiation at a **longer wavelength** (lower frequency) infrared.\n- Step 4: Greenhouse gases (CO₂, water vapour, methane) let the incoming short-wavelength radiation through but **absorb and re-radiate** the outgoing longer-wavelength infrared, reducing the escape rate.\n- Step 5: For millions of years absorption balanced emission (equilibrium); added CO₂ traps more outgoing radiation, so Earth settles at a **higher equilibrium temperature**.\n\nExam phrasing: say \"re-emitted at a different (longer) wavelength,\" not \"the atmosphere knocks the radiation out.\"", "source": "Opus 4.8 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "A student calls infrared \"a weak type of nuclear radiation.\" Correct this fully, explaining the actual origin of infrared.", "answer": "- Step 1: This is wrong (Phuc's slip). The word \"radiation\" broadly just means energy is *given off* — it does not by itself mean nuclear.\n- Step 2: **Nuclear radiation** is specifically alpha, beta and gamma, emitted from the atomic **nucleus**.\n- Step 3: **Infrared** (and visible light) is **electromagnetic radiation**, emitted when an orbital **electron drops to a lower energy level** and releases a photon — nothing to do with the nucleus.\n\nAlways specify the *type* of radiation, since the word alone is ambiguous.", "source": "Opus 4.8 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "In the black-vs-silver cooling-curve experiment, how do you read off which can emits more infrared — and what is the classic mistake?", "answer": "- Step 1: Both cans start with water at the same temperature (~80 °C); the temperature is recorded every 30 s and plotted against time.\n- Step 2: The **black can's curve falls faster** (steeper) — it loses energy more quickly because it is the better emitter.\n- Step 3: The classic mistake (Phuc's) is to predict that the strong emitter gets *hotter*. Wrong: **giving off energy cools an object**. Read emission from the *rate of cooling*, never from a claim that the emitter's temperature rises.\n\nBoth curves eventually level off toward room temperature at thermal equilibrium.", "source": "Opus 4.8 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "Describe conduction in a solid in particle terms, using the correct causal chain. (3 steps)", "answer": "- Step 1: All particles in a solid **vibrate all the time** about fixed positions.\n- Step 2: Particles in the **hotter** part vibrate **more** vigorously.\n- Step 3: They **pass these vibrations on** to neighbouring particles, which pass them along again, so energy travels toward the cooler end — without the particles themselves moving along.\n\nAlex's analogy: people linking arms; one shakes, the next shakes, and so on down the line.", "source": "Opus 4.8 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "Why are metals the best thermal conductors? Describe the extra mechanism they have.", "answer": "- Step 1: In all solids, conduction happens by passing vibrations atom-to-atom, but this is relatively slow.\n- Step 2: Metals additionally contain **free (delocalised) electrons** — mobile charge carriers not tied to any one atom.\n- Step 3: These free electrons are knocked by the vibrating atoms, **move rapidly through the lattice**, and collide with atoms further along, transferring energy **much faster** than vibration-passing alone.\n\nThe same free electrons that make metals good electrical conductors also make them good thermal conductors.", "source": "Opus 4.8 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "How does thermal conduction differ from electrical conduction in a metal, give
