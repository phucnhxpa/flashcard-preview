n both use free electrons?", "answer": "- Step 1: In **electrical** conduction, the free electrons **drift in an organised direction** under an applied electric field/potential difference.\n- Step 2: In **thermal** conduction, energy spreads via **lattice vibrations plus less-directed electron motion** from hot toward cold — driven by a temperature difference, not a field.\n- Step 3: They are distinct processes but related: the *same* free electrons underlie both, which is why good electrical conductors tend to be good thermal conductors.", "source": "Opus 4.8 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "Two blocks of different material sit in the same 21 °C room. Ice on block 2 melts in ~12 s; ice on block 1 barely melts. Explain, and identify the misconception this exposes.", "answer": "- Step 1: Both blocks are in the same room and are at the **same temperature (21 °C)** — so it is *not* that one block is \"hot\" (Phuc's first answer).\n- Step 2: The difference is **thermal conductivity**: block 2 transfers energy to the ice by contact **much faster**, so its ice melts quickly.\n- Step 3: The lesson: when two objects are at the same temperature, any difference in heating rate is due to conductivity, never a temperature difference.", "source": "Opus 4.8 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "In the metal-rod-and-wax demonstration, in what order do the wax-attached pieces fall off, and why?", "answer": "- Step 1: One end of the rod is heated, giving those particles the most vibrational energy.\n- Step 2: Energy travels along the rod by conduction — vibrations passed atom-to-atom plus free-electron transfer.\n- Step 3: The piece **nearest the heated end falls first**, then each successive piece outward falls as the energy front reaches it — directly visualising the progress of conduction along the rod.", "source": "Opus 4.8 ②", "_id": "opus_2_19", "judge_pick": true}, {"question": "Rank a vacuum, a gas, and a solid with strong bonds as insulators against conduction, and correct the misconception about \"strong bonds.\"", "answer": "- Step 1: A **vacuum is the best insulator** for conduction — there are **no particles at all**, so nothing can pass vibrations.\n- Step 2: A **gas/air** is a good insulator — it has **few, widely spaced particles**, so vibrations are passed poorly.\n- Step 3: Misconception (Phuc's): \"very strong chemical bonds make the best insulator.\" Wrong — **strong bonds transmit vibrations well**, aiding conduction. It is *weaker bonds and fewer/no particles* that reduce conduction.", "source": "Opus 4.8 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "Give the ordered particle chain explaining why a heated region of fluid rises. (5 steps)", "answer": "- Step 1: Particles in the heated region **gain energy**.\n- Step 2: They **move faster**.\n- Step 3: They **spread apart** (they do *not* get bigger — they just occupy more space).\n- Step 4: The same mass now fills more volume, so the region becomes **less dense**.\n- Step 5: Being less dense than its surroundings, that region **rises**; cooler, denser fluid sinks to replace it — forming a **convection current**.\n\nAlex warned this chain \"needs several repetitions\" — rehearse the order until automatic.", "source": "Opus 4.8 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "In convection, when a fluid is heated do the particles get bigger? Explain using Alex's density analogy.", "answer": "- Step 1: No — heating does **not** make particles bigger. They gain kinetic energy and move faster, spreading further apart.\n- Step 2: The **same mass** then occupies **more volume**, so the **density falls** (density = mass/volume).\n- Step 3: Alex's nightclub analogy: an energetic song makes people move more and spread out across the dance floor, lowering the *crowd density* — even though the number of people (mass) is unchanged.\n\nIt is the *drop in density*, not any size change, that makes hot fluid rise.", "source": "Opus 4.8 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "Explain the daytime sea breeze as a convection current. (3 steps)", "answer": "- Step 1: The Sun's infrared heats the **land**, which warms faster than the sea and heats the air above it.\n- Step 2: That warmed air becomes **less dense and rises**.\n- Step 3: **Cooler air over the sea moves in to replace it** — that horizontal inflow is the sea breeze, a convection current.", "source": "Opus 4.8 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "Two convection corrections were made to Phuc: (i) about cooling air, (ii) about the dyed-water loop. State both.", "answer": "- Step 1: Correction (i): cooling air does **not** have to turn into a liquid to sink. A gas can simply become **denser and sink while remaining a gas** — no change of state is needed.\n- Step 2: Correction (ii): in the dyed-water loop, the water is **not heated enough to change state** — it stays liquid throughout.\n- Step 3: The dye's role is purely to **make the circulating convection current visible**, not to indicate any boiling or phase change.", "source": "Opus 4.8 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "What single unifying idea explains why loft insulation, cavity-wall insulation and curtains all work — and what two heat-transfer mechanisms does it defeat?", "answer": "- Step 1: The unifying idea is **trapped air**.\n- Step 2: Air has **few particles**, so it is a poor conductor — this reduces **conduction**.\n- Step 3: When trapped in **small immobilised pockets**, the air **cannot circulate**, which reduces **convection**.\n\nA vacuum is even better against conduction (no particles at all), and shiny/foil surfaces additionally defeat radiation by reflecting infrared.", "source": "Opus 4.8 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "A draught under a door — is it conduction, convection or radiation? Justify, and identify the give-away clue.", "answer": "- Step 1: A draught is **convection** (Phuc first wrongly said conduction).\n- Step 2: The give-away clue is that **whole volumes of hot and cold air physically move and replace one another** — that bulk fluid movement is the definition of convection.\n- Step 3: Conduction would involve passing vibrations through a *static* material; here the air is *flowing*, so it cannot be conduction.\n\nTrigger phrase: \"moving/replacing air\" ⇒ convection.", "source": "Opus 4.8 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "For double glazing, cavity-wall insulation, and a foil layer behind a radiator, state which heat-transfer mechanism each mainly reduces and why.", "answer": "- Step 1: **Double glazing** reduces **conduction** — a layer of air (or argon) trapped between two panes is a poor conductor.\n- Step 2: **Cavity-wall insulation** (fibres filling the gap between brick layers) reduces **conduction and convection** — the fibres trap air (poor conductor) and stop warm air flowing through the cavity.\n- Step 3: **Foil behind a radiator** reduces **radiation** — its shiny surface reflects infrared back into the room and, being a poor emitter, radiates little itself.", "source": "Opus 4.8 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "In a heatwave, why does the outdoor air get so hot — is it radiation *or* convection? Explain the Sahara-to-Paris model. (4 steps)", "answer": "- Step 1: It is a **combination of all three** mechanisms — do not force a single one (Phuc's either/or slip).\n- Step 2: The Sun's **infrared** heats the Sahara ground (radiation).\n- Step 3: The air just above the hot sand is heated by **conduction** from the ground (passing vibrations at the surface).\n- Step 4: That hot air becomes less dense, rises, and is transported toward Paris by large-scale **convection**; locally, infrared heats streets and the Eiffel Tower, which reheat nearby air by conduction again.\n\nReal scenarios often combine mechanisms — resist picking just one.", "source": "Opus 4.8 ②", "_id": "opus_2_28", "judge_pick": true}, {"question": "Define specific heat capacity word-perfectly, and derive its unit from the defining equation.", "answer": "- Step 1: **Definition:** the energy needed to raise the temperature of **1 kg** of a substance by **1 K** (equivalently 1 °C). Symbol $$c$$.\n- Step 2: The equation is $$\\Delta E = mc\\,\\Delta\\theta$$, so rearranging, $$c = \\dfrac{\\Delta E}{m\\,\\Delta\\theta}$$.\n- Step 3: Reading off units: energy (J) ÷ (mass in kg × temperature change in K) gives $$\\text{J/(kg K)}$$, written $$\\text{J kg}^{-1}\\text{K}^{-1}$$.\n\nBecause a 1 K interval equals a 1 °C interval, $$\\Delta\\theta$$ may be quoted in either.", "source": "Opus 4.8 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "Why can $$\\Delta\\theta$$ in $$\\Delta E = mc\\,\\Delta\\theta$$ be given in either kelvin or Celsius, but absolute temperatures in gas laws cannot?", "answer": "- Step 1: A **change** of 1 K is exactly the same size as a change of 1 °C — the two scales have identically-sized divisions, differing only by an offset of 273.\n- Step 2: Since $$\\Delta\\theta$$ is a *difference*, the offset cancels — so specific-heat calculations work with either unit without adding/subtracting 273.\n- Step 3: Gas laws (e.g. $$p/T = \\text{const}$$, $$pV = NkT$$) use *absolute* temperature $$T$$, not a difference — so the offset does **not** cancel, and you must convert to kelvin first.\n\nRule of thumb: differences → either unit; absolute values in gas/kinetic equations → always kelvin.", "source": "Opus 4.8 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "Water's specific heat capacity (~4200 J/(kg K)) is unusually high. What two practical consequences does this have?", "answer": "- Step 1: A high $$c$$ means a large amount of energy is needed to change water's temperature by even 1 K.\n- Step 2: Consequence 1 — water is **slow to heat up and slow to cool down**, so it stores a lot of thermal energy and releases it gradually.\n- Step 3: Consequence 2 — this makes water **ideal for radiators/central heating**, since the water stays hot for a long time and delivers energy steadily to a room.\n\nFor comparison, copper (~390 J/(kg K)) heats up over ten times faster for the same energy per kg.", "source": "Opus 4.8 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "In the aluminium-block practical, what quantity is equated to the increase in the block's internal energy, and what is the working equation for $$c$$?", "answer": "- Step 1: The **electrical energy supplied by the heater** is equated to the increase in the block's internal energy.\n- Step 2: Electrical energy is $$IV\\Delta t$$, so $$IV\\Delta t = mc(\\theta_f - \\theta_i)$$.\n- Step 3: Rearranging for the specific heat capacity: $$c = \\dfrac{IV\\Delta t}{m(\\theta_f - \\theta_i)}$$, where you measure current $$I$$, voltage $$V$$, heating time $$\\Delta t$$, mass $$m$$, and the initial and final temperatures.", "source": "Opus 4.8 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "In the aluminium-block practical, why does the measured value of $$c$$ come out *too large*? Name the main error and the general reason. (3 steps)", "answer": "- Step 1: The **main error** is that some energy is **absorbed by the heater itself** — not all the electrical energy counted actually reaches the block.\n- Step 2: Additional losses: energy is transferred to the **surroundings** despite lagging, and small amounts go to the **lagging and thermometer**.\n- Step 3: All three mean the block receives **less energy** than the $$IV\\Delta t$$ you recorded. Since $$c = \\Delta E/(m\\Delta\\theta)$$ uses that overstated $$\\Delta E$$ for a given measured $$\\Delta\\theta$$, the calculated $$c$$ comes out **too large**.", "source": "Opus 4.8 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "Why does using an expanded polystyrene cup (instead of a glass beaker) improve a liquid's specific-heat-capacity experiment? Give two reasons.", "answer": "- Step 1: Reason 1 — the cup has **very little mass**, so it **absorbs very little energy itself**, meaning almost all the supplied energy heats the liquid rather than the container.\n- Step 2: Reason 2 — polystyrene is an **excellent insulator** (trapped air), so it **minimises energy transfer from the liquid to the surroundings**.\n- Step 3: Together these two effects remove the two biggest error sources (container heat capacity + heat loss), giving a value much closer to the accepted one.", "source": "Opus 4.8 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "In the cooling/heating investigation of the aluminium block, why does the temperature keep *rising* for about 2 minutes *after* the heater is switched off?", "answer": "- Step 1: The heater is embedded in the block, and energy takes a finite time to conduct from the heater, through the block, to the thermometer.\n- Step 2: When the power is switched off, energy already stored in the heater and inner block is **still in transit** toward the thermometer.\n- Step 3: So the thermometer reading **continues to climb** until all that residual energy has spread through — only then does the block's genuine cooling (energy loss to surroundings) become visible as the temperature starts to fall.", "source": "Opus 4.8 ②", "_id": "opus_2_35", "judge_pick": true}, {"question": "Define specific latent heat, state its unit, and name its two types with their state changes.", "answer": "- Step 1: **Definition:** the energy needed to change the state of **1 kg** of a substance with **no change in temperature**. Symbol $$L$$, unit $$\\text{J/kg}$$.\n- Step 2: **Latent heat of fusion** ($$L_f$$): solid ↔ liquid (melting/freezing).\n- Step 3: **Latent heat of vaporisation** ($$L_v$$): liquid ↔ gas (boiling/condensing).\n\nExam tip: always include \"with no change in temperature\" in the definition — omitting it loses the mark.", "source": "Opus 4.8 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "During a change of state, energy is being supplied yet the temperature stays constant. Where does the energy go, and why is this energy called \"latent\"?", "answer": "- Step 1: During a change of state the supplied energy goes entirely into **potential energy** — breaking or loosening the inter-molecular bonds.\n- Step 2: It does **not** increase the **kinetic energy** of the particles, and since temperature measures mean random kinetic energy, the temperature stays constant.\n- Step 3: It is called **\"latent\" (meaning \"hidden\")** because energy is transferred with no visible temperature rise, so its effect is not immediately apparent.", "source": "Opus 4.8 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "For water, $$L_v \\approx 2.26 \\times 10^6\\,\\text{J/kg}$$ but $$L_f \\approx 3.34 \\times 10^5\\,\\text{J/kg}$$ — vaporisation needs about seven times more energy. Explain the molecular reason.", "answer": "- Step 1: **Melting** only needs to loosen the bonds enough for molecules to **slide past one another** — they stay close together in the liquid.\n- Step 2: **Boiling** must **completely separate** the molecules until there are essentially **no attractive forces** left between them (in the gas).\n- Step 3: Full separation requires far more work against the inter-molecular forces than mere loosening, so $$L_v \\gg L_f$$ — roughly seven times more energy per kilogram for water.", "source": "Opus 4.8 ②", "_id": "opus_2_38", "judge_pick": true}, {"question": "Sketch the heating curve (temperature vs energy supplied) for ice heated to steam. Which equation governs the sloped parts, which governs the flat parts, and why is the boiling plateau longer? (3 steps)", "answer": "- Step 1: **Sloped sections** (solid warming, liquid warming, gas warming) — temperature rises within one state — are governed by $$\\Delta E = mc\\,\\Delta\\theta$$.\n- Step 2: **Flat plateaus** (melting, then boiling) — state changing at constant temperature — are governed by $$\\Delta E = L\\,\\Delta m$$.\n- Step 3: The **boiling plateau is much longer** than the melting plateau because $$L_v \\gg L_f$$, so far more energy (and thus horizontal length) is needed to vaporise than to melt the same mass.", "source": "Opus 4.8 ②", "_id": "opus_2_39", "judge_pick": false}, {"question": "Explain the three distinct phases seen in a *cooling* curve (e.g. stearic acid cooling from a liquid) in terms of molecular energy.", "answer": "- Step 1: **First phase (falling slope):** the liquid loses kinetic energy, molecules slow, temperature drops — governed by $$mc\\Delta\\theta$$.\n- Step 2: **Second phase (flat plateau):** at the freezing/melting point, molecules form bonds (release potential energy) at constant temperature — the flat part gives the **melting point**.\n- Step 3: **Third phase (falling slope again):** the newly formed solid continues losing kinetic energy, so the temperature falls once more toward room temperature.\n\nThe plateau's temperature reads off the melting point directly.", "source": "Opus 4.8 ②", "_id": "opus_2_40", "judge_pick": true}, {"question": "In Core Practical 13B (latent heat of vaporisation via a heater on a balance), the result comes out slightly *too large*. Why — and what is remarkable about this method?", "answer": "- Step 1: The method finds $$L = \\dfrac{\\text{power of heater}}{\\text{gradient of mass-vs-time graph}}$$, since $$\\dfrac{\\text{d}E}{\\text{d}t} = -L\\dfrac{\\text{d}m}{\\text{d}t}$$.\n- Step 2: The value is **too large** because some heater energy is **lost to the surroundings** rather than all going into boiling water off — so the mass boiled off per unit energy is underestimated.\n- Step 3: What's remarkable: this method needs **no thermometer** — a huge advantage, since ordinary lab thermometers have poor resolution (~1 °C) and are a large uncertainty source.", "source": "Opus 4.8 ②", "_id": "opus_2_41", "judge_pick": false}, {"question": "In the ice-melting latent-heat practical (Core Practical 13A / SME funnel method), why is a *control* funnel with no heater used alongside the heated one?", "answer": "- Step 1: Ice at 0 °C is already melting slowly just from the surrounding room, so *some* water drips out even without a heater.\n- Step 2: The **control funnel (no heater)** measures exactly this background melting from the surroundings over the same time.\n- Step 3: Subtracting the control mass ($$\\Delta m = m_A - m_B$$) isolates the mass melted **specifically by the heater's energy**, so $$L = \\dfrac{\\Delta E}{\\Delta m}$$ uses only the heater-driven melting — removing a systematic error.", "source": "Opus 4.8 ②", "_id": "opus_2_42", "judge_pick": true}, {"question": "Why does incompletely drying the ice make the measured latent heat of fusion come out *too small* in the mixture (calorimetry) method?", "answer": "- Step 1: The calculation assumes the added mass is all **ice at 0 °C**, so all of it requires latent heat to melt.\n- Step 2: If the ice is wet, some of the \"ice\" mass is actually **water already at 0 °C**, which needs **no** latent heat.\n- Step 3: You then credit that extra water-mass with latent-heat absorption it never used, so for the same real energy you divide by too large a $$\\Delta m$$ — giving a value of $$L$$ that is **too small**.", "source": "Opus 4.8 ②", "_id": "opus_2_43", "judge_pick": false}, {"question": "Define internal energy, and state which part of it temperature measures.", "answer": "- Step 1: **Internal energy** is the **sum of the random kinetic energies** of a body's particles (their vibration/motion) **and the potential energies** stored in the bonds between them.\n- Step 2: The potential part arises because inter-atomic bonds act like springs, continuously stretched and compressed as atoms vibrate.\n- Step 3: **Temperature** is a measure of the **mean random kinetic** part only — not the potential part. This is why during a change of state (energy → potential) temperature stays constant.\n\nThe misconception to avoid: a body does not \"contain heat\"; it contains internal energy.", "source": "Opus 4.8 ②", "_id": "opus_2_44", "judge_pick": false}, {"question": "For an *ideal* gas, why is its internal energy considered to be entirely kinetic?", "answer": "- Step 1: In an ideal gas we assume inter-molecular forces are negligible **except during collisions**.\n- Step 2: We also assume the **duration of collisions is negligible** compared with the time between them.\n- Step 3: So the molecules spend almost all their time far apart with negligible potential energy — meaning the internal energy is essentially **all random kinetic energy**. This is why, for an ideal gas, temperature is a direct measure of total internal energy.", "source": "Opus 4.8 ②", "_id": "opus_2_45", "judge_pick": false}, {"question": "Distinguish \"heating\" from \"working\" as ways to increase a body's internal energy. What makes one ordered and the other disordered?", "answer": "- Step 1: **Heating** transfers energy because of a **temperature difference** (via conduction, convection, radiation). It is a **random/disordered** process — energy flows in no single defined direction at the molecular level.\n- Step 2: **Working** transfers energy by a **force acting through a distance** (mechanical, $$\\Delta E = F\\Delta x$$, or electrical, $$\\Delta E = IV\\Delta t$$), **independent of any temperature difference**.\n- Step 3: Working is **ordered** — the force, and hence the energy transfer, is in a **defined direction**. Example: rubbing hands together (mechanical work) heats them with no temperature difference driving it.", "source": "Opus 4.8 ②", "_id": "opus_2_46", "judge_pick": false}, {"question": "Define absolute zero (0 K) both in temperature terms and in terms of the kinetic theory.", "answer": "- Step 1: **Absolute zero** is the **lowest temperature theoretically possible**, defined as **0 K**, equal to about **−273 °C** (−273.15 °C precisely).\n- Step 2: In **kinetic-theory** terms, it is the temperature at which particles have their **minimum possible kinetic energy** — in a simplified model, zero random motion.\n- Step 3: You cannot reach it in practice (quantum mechanics requires a residual \"zero-point energy\"), and you can never have a temperature below it — so kelvin values are never negative.", "source": "Opus 4.8 ②", "_id": "opus_2_47", "judge_pick": false}, {"question": "A student says \"It's 36 °C in Hong Kong and 18 °C in London, so it's twice as hot in Hong Kong.\" A physicist says \"only about 6% hotter.\" Who is right and why?", "answer": "- Step 1: \"Twice as hot\" is a claim about a *ratio* of temperatures, and temperature ratios only make physical sense on the **absolute (kelvin) scale**, where 0 truly means zero thermal energy.\n- Step 2: Converting: London = 18 + 273 = 291 K; Hong Kong = 36 + 273 = 309 K.\n- Step 3: The ratio is $$309/291 \\approx 1.06$$ — about **6% hotter**. The Celsius ratio (36/18 = 2) is meaningless because 0 °C is not zero thermal energy. The **physicist is right**.", "source": "Opus 4.8 ②", "_id": "opus_2_48", "judge_pick": false}, {"question": "State the pressure law for a fixed mass of gas at constant volume, and give the kinetic-theory reason behind it. (3 steps)", "answer": "- Step 1: **Pressure law:** at constant volume, $$p \\propto T$$ (with $$T$$ in kelvin), i.e. $$\\dfrac{p_1}{T_1} = \\dfrac{p_2}{T_2}$$.\n- Step 2: Kinetic reason: heating raises particle kinetic energy, so they move **faster** and hit the walls **more frequently and harder**.\n- Step 3: Greater force on a **fixed** wall area means higher pressure — so pressure rises in direct proportion to absolute temperature.\n\nCaution: a student heating gas from 27 °C to 54 °C expecting *double* pressure is wrong — in kelvin that's 300 K → 327 K, only a ~9% rise.", "source": "Opus 4.8 ②", "_id": "opus_2_49", "judge_pick": false}, {"question": "A dented ping-pong ball pops back out when placed in hot water. Explain the physics using a gas law. (3 steps)", "answer": "- Step 1: The dented ball contains a **fixed mass** of air at **roughly constant volume**; hot water heats this air.\n- Step 2: By the pressure law ($$p \\propto T$$ in kelvin), heating raises the internal air **pressure** — the faster molecules strike the ball's inner surface more often and harder.\n- Step 3: The increased internal pressure pushes outward on the dented region, and the raised force pops the dent back out into its original round shape.", "source": "Opus 4.8 ②", "_id": "opus_2_50", "judge_pick": true}, {"question": "State Boyle's law with its conditions, and write the calculation form. Why must the conditions be stated?", "answer": "- Step 1: **Boyle's law:** the pressure of a **fixed mass** of gas is **inversely proportional to its volume**, provided the **temperature is constant**: $$p \\propto 1/V$$, or $$pV = \\text{constant}$$.\n- Step 2: Calculation form: $$p_1V_1 = p_2V_2$$ (units of $$p$$ and $$V$$ just need to match on both sides).\n- Step 3: The conditions matter because if mass or temperature changed, $$pV$$ would no longer be constant — a curve of $$p$$ vs $$V$$ at one temperature is called an **isothermal**.", "source": "Opus 4.8 ②", "_id": "opus_2_51", "judge_pick": false}, {"question": "A diver releases a small air bubble at depth; it grows as it rises. Give the *two* independent reasons, each linked to a gas relationship. (2 steps)", "answer": "- Step 1: **Reason 1 (pressure):** as the bubble rises, the water depth $$h$$ decreases, so the surrounding pressure $$p = p_A + \\rho g h$$ falls. Since $$V \\propto 1/p$$ (Boyle), lower pressure means **larger volume**.\n- Step 2: **Reason 2 (temperature):** surface water is usually **warmer** than the depths; since $$V \\propto T$$ (Charles) at constant pressure, higher temperature also **expands** the gas.\n\nBoth effects act in the same direction, so the bubble grows on the way up.", "source": "Opus 4.8 ②", "_id": "opus_2_52", "judge_pick": false}, {"question": "Write the ideal gas equation in the \"number of molecules\" form, define every symbol, and give the value of Boltzmann's constant.", "answer": "- Step 1: The equation is $$pV = NkT$$.\n- Step 2: Symbols: $$p$$ = pressure (Pa), $$V$$ = volume (m³), $$N$$ = **number of molecules** (not moles), $$T$$ = absolute temperature (K).\n- Step 3: $$k$$ is the **Boltzmann constant** $$= 1.38 \\times 10^{-23}\\,\\text{J/K}$$, defined as $$k = R/N_A$$ (molar gas constant ÷ Avogadro's number).\n\nBoltzmann's constant links microscopic behaviour (molecular kinetic energy) to macroscopic temperature — hence its tiny value and units of J/K.", "source": "Opus 4.8 ②", "_id": "opus_2_53", "judge_pick": false}, {"question": "State the equation linking mean molecular kinetic energy to absolute temperature, and its central physical meaning.", "answer": "- Step 1: The equation is $$\\tfrac{1}{2}m\\langle c^2\\rangle = \\tfrac{3}{2}kT$$, where $$\\tfrac{1}{2}m\\langle c^2\\rangle$$ is the **average random kinetic energy** of one molecule.\n- Step 2: Central meaning: since $$k$$ is constant, the **average random kinetic energy of gas molecules is directly proportional to the absolute temperature** ($$E_k \\propto T$$).\n- Step 3: It follows that at $$T = 0$$ K the average random kinetic energy would be **zero** — reinforcing absolute zero as the lowest temperature (in this simple non-quantum model).\n\nMemory rhyme: \"Average KE is three-halves kT.\"", "source": "Opus 4.8 ②", "_id": "opus_2_54", "judge_pick": true}, {"question": "Outline the key logical steps in deriving $$pV = \\tfrac{1}{3}Nm\\langle c^2\\rangle$$ from kinetic theory — the *physics*, not the algebra. (4 steps)", "answer": "- Step 1: A molecule makes an **elastic collision** with a wall (kinetic-theory assumption), so its momentum reverses; the change in momentum is $$-2mu$$.\n- Step 2: **Force = rate of change of momentum** (Newton's 2nd law): with $$\\tfrac{1}{2}(u/l)$$ collisions per second per wall, the force on the molecule is $$mu^2/l$$.\n- Step 3: By **Newton's 3rd law**, the molecule pushes back on the wall equally; dividing this force by wall area ($$l^2$$) gives the pressure contribution.\n- Step 4: Summing over $$N$$ molecules and using $$\\langle u^2\\rangle = \\tfrac{1}{3}\\langle c^2\\rangle$$ (random motion is equal in all three directions) yields $$pV = \\tfrac{1}{3}Nm\\langle c^2\\rangle$$.\n\nRemember the physics chain first; the maths follows.", "source": "Opus 4.8 ②", "_id": "opus_2_55", "judge_pick": false}, {"question": "Distinguish \"mean square speed\" $$\\langle c^2\\rangle$$ from \"the mean speed squared,\" and why is $$\\langle c^2\\rangle$$ slightly larger?", "answer": "- Step 1: **Mean square speed** = square each molecule's speed, then average: $$\\langle c^2\\rangle = \\dfrac{c_1^2 + c_2^2 + \\dots}{N}$$.\n- Step 2: **Mean speed squared** = average the speeds first, then square that single number.\n- Step 3: For a spread of speeds these differ — squaring emphasises the faster molecules more, so $$\\langle c^2\\rangle$$ is **slightly larger** than (mean speed)². Example: speeds 310–350 give $$\\langle c^2\\rangle = 109{,}100$$ vs (mean 330)² = 108,900.\n\nThe **root-mean-square speed** $$\\sqrt{\\langle c^2\\rangle}$$ is roughly the average speed and is ~25% above the speed of sound in the same gas.", "source": "Opus 4.8 ②", "_id": "opus_2_56", "judge_pick": false}, {"question": "What is Brownian motion, and what does it provide evidence for?", "answer": "- Step 1: **Brownian motion** is the continuous, small, random, jerky movement of tiny grains (e.g. pollen) suspended in a fluid, seen under a microscope.\n- Step 2: It is caused by **unequal bombardment** of the visible grains by invisible, fast-moving fluid molecules.\n- Step 3: It provides strong evidence that matter is made of **particles in continuous random motion** — the foundation of kinetic theory. (Einstein's mathematical analysis even yielded a value for Avogadro's number matching chemistry.)", "source": "Opus 4.8 ②", "_id": "opus_2_57", "judge_pick": false}, {"question": "Why does a machine that runs hot in the vacuum of space NOT get cooled automatically by \"cold\" space? (3 steps)", "answer": "- Step 1: In a vacuum there are **no particles**.\n- Step 2: No particles means **no conduction** (nothing to pass vibrations to) and **no convection** (no fluid to circulate and carry heat away).\n- Step 3: The only remaining route is **radiation** — the machine can lose heat *solely* by emitting infrared. Space being \"cold\" doesn't help; without a heat-carrying medium, the machine must radiate its own heat away.", "source": "Opus 4.8 ②", "_id": "opus_2_58", "judge_pick": false}, {"question": "Design a cooling solution for a hot machine in space, justifying each feature by the mechanism it exploits. (3 steps)", "answer": "- Step 1: Since only radiation works, **conduct the internal heat to a large, matte-black radiator** — matte black is the best *emitter*, and large area maximises the emitting surface, so it radiates infrared efficiently to space.\n- Step 2: Add a **reflective (silver) layer facing the Sun** — a good reflector bounces incoming solar radiation away so it is not absorbed, reducing the heat load.\n- Step 3: Size the radiator so it can emit **both** the internally generated heat **and** any absorbed solar input (illustratively, ~500 units internal + ~1000 W/m² solar) — the emitter must handle their *sum*.\n\nThis is why real spacecraft carry reflective outer layers plus dedicated radiator panels.", "source": "Opus 4.8 ②", "_id": "opus_2_59", "judge_pick": false}, {"question": "A copper block ($$c = 3850\\,\\text{J/(kg K)}$$), mass 0.5 kg, is heated by 3 K. Set up (conceptually) how much energy it gains — no full arithmetic needed.", "answer": "- Step 1: Use $$\\Delta E = mc\\,\\Delta\\theta$$ — this is a \"no state change, temperature rising\" situation, so specific heat capacity applies.\n- Step 2: Substitute conceptually: energy = mass × specific heat × temperature change = $$0.5 \\times 3850 \\times 3$$.\n- Step 3: Since $$0.5 \\times 3 = 1.5$$ and $$1.5 \\times 3850 \\approx 5800\\,\\text{J}$$, the block gains roughly **5.8 kJ** (exactly 5775 J).\n\nWatch for the board slip: the SHC was mis-copied as \"385\" (a dropped zero) — always copy given values exactly.", "source": "Opus 4.8 ②", "_id": "opus_2_60", "judge_pick": false}, {"question": "An avocado (0.215 kg) releases 1294 J to cool by 2 K. Conceptually find its specific heat capacity, and explain why the \"circled 2500\" answer was wrong.", "answer": "- Step 1: Rearrange $$\\Delta E = mc\\,\\Delta\\theta$$ to $$c = \\dfrac{\\Delta E}{m\\,\\Delta\\theta}$$.\n- Step 2: Substitute: $$c = \\dfrac{1294}{0.215 \\times 2} = \\dfrac{1294}{0.43}$$, which is roughly $$1294/0.43 \\approx 3000\\,\\text{J/(kg K)}$$.\n- Step 3: The board circled **2500**, but that does not follow — recomputing gives ~**3009 J/(kg K)**. The 2500 came from a separate, mis-stated \"make-up number\" aside.\n\nLesson: always **re-key the division** — a neatly circled answer can still be arithmetically wrong.", "source": "Opus 4.8 ②", "_id": "opus_2_61", "judge_pick": false}, {"question": "An avocado (0.215 kg, $$c \\approx 3009\\,\\text{J/(kg K)}$$) gains 3000 J. Conceptually find its temperature change, and why does fixing $$c$$ first matter?", "answer": "- Step 1: Rearrange $$\\Delta E = mc\\,\\Delta\\theta$$ to $$\\Delta\\theta = \\dfrac{\\Delta E}{mc}$$.\n- Step 2: Substitute: $$\\Delta\\theta = \\dfrac{3000}{0.215 \\times 3009} \\approx \\dfrac{3000}{647}$$, roughly $$\\approx 4.6\\,\\text{K}$$.\n- Step 3: Using the wrong circled $$c = 2500$$ would give $$\\Delta\\theta = 3000/(0.215 \\times 2500) \\approx 5.6\\,\\text{K}$$ — noticeably different. So an error in $$c$$ propagates into every subsequent answer; fix it first.", "source": "Opus 4.8 ②", "_id": "opus_2_62", "judge_pick": false}, {"question": "A saucepan of water is heated on a hob to boiling. Why must you account for *both* the water *and* the pan in the energy calculation?", "answer": "- Step 1: Both the water and the aluminium pan start at room temperature and must be raised to the same final temperature (100 °C) — both undergo the same $$\\Delta\\theta$$.\n- Step 2: Each stores energy according to its own mass and specific heat: total $$\\Delta E = m_{\\text{pan}}c_{\\text{pan}}\\Delta\\theta + m_{\\text{water}}c_{\\text{water}}\\Delta\\theta$$.\n- Step 3: Ignoring the pan underestimates the energy needed — though because water's $$c$$ is so high, the water term dominates (the pan contributes only a small fraction).", "source": "Opus 4.8 ②", "_id": "opus_2_63", "judge_pick": false}, {"question": "Why do drilled holes in high-performance car brake discs, and using aluminium instead of iron, both help prevent overheating?", "answer": "- Step 1: Braking converts the car's ordered kinetic energy into random internal energy of the discs, raising their temperature ($$\\Delta\\theta = \\Delta E/(mc)$$).\n- Step 2: **Drilled holes** let air pass through the discs, greatly increasing convection/ventilation so the discs dissipate energy to the air faster, preventing overheating.\n- Step 3: **Aluminium** has roughly *twice* the specific heat capacity of iron alloy, so for the same energy input its temperature rise is about *half* — an aluminium disc of even half the mass need not get hotter than an iron one, saving weight while staying cool.", "source": "Opus 4.8 ②", "_id": "opus_2_64", "judge_pick": false}, {"question": "Why does a squash ball bounce better after being warmed up by repeated hard hits against the wall?", "answer": "- Step 1: Repeatedly hitting the ball does **mechanical work** on the rubber (via hysteresis losses in each compression cycle), transferring energy to the internal energy of both the rubber and the trapped air.\n- Step 2: The trapped air is at roughly constant volume, so by the pressure law ($$p \\propto T$$) its **pressure rises** as temperature increases.\n- Step 3: Higher internal pressure makes the ball stiffer and more elastic on impact, so it returns more energy to the bounce — a warm ball rebounds higher than a cold one.", "source": "Opus 4.8 ②", "_id": "opus_2_65", "judge_pick": false}, {"question": "A freezer must cool the air inside it. Why is comparatively little energy needed to cool the *air*, and what quantities determine the answer?", "answer": "- Step 1: The energy removed is $$\\Delta E = mc\\,\\Delta\\theta$$, where $$m = \\rho V$$ (air density × internal volume).\n- Step 2: Air is very **low density** (~1.3 kg/m³), so even a sizeable freezer volume holds only a small **mass** of air.\n- Step 3: With a modest mass, a moderate $$c$$ (~1000 J/(kg K)), and a temperature drop of a few tens of kelvin, the total energy is small — the *bulk* of freezer work actually goes into cooling and freezing the *contents*, not the air.", "source": "Opus 4.8 ②", "_id": "opus_2_66", "judge_pick": false}, {"question": "A storage heater is warmed overnight and releases heat during the day. As it cools, how does the *power* it emits change, and why?", "answer": "- Step 1: The rate of heat loss to the surroundings depends on the **temperature difference** between the heater and the room.\n- Step 2: When the heater is hottest (just after charging), that difference is largest, so it emits at the **highest power** early on.\n- Step 3: As it cools, the temperature gap shrinks, so the emitted **power steadily decreases** — the heater gives out most of its energy quickly at first, then more gently as it approaches room temperature.", "source": "Opus 4.8 ②", "_id": "opus_2_67", "judge_pick": false}, {"question": "Why is a taller water column at a given depth *not* what determines fluid pressure — and what is the correct dependence?", "answer": "- Step 1: The pressure due to a liquid column depends on the **depth**, the **liquid density**, and gravity: $$p = \\rho g \\Delta h$$ — not on the container's shape or total water volume.\n- Step 2: At a point of depth $$\\Delta h$$, the pressure comes from the weight of liquid directly above per unit area, which reduces to $$\\rho g \\Delta h$$ regardless of width.\n- Step 3: The **total** pressure at that point is $$p = p_A + \\rho g \\Delta h$$ — you must add **atmospheric pressure** $$p_A$$, and in a stationary fluid the pressure acts **equally in all directions**.", "source": "Opus 4.8 ②", "_id": "opus_2_68", "judge_pick": true}, {"question": "Why do most real gases (like air) behave like an ideal gas under normal laboratory conditions, but not near their critical temperature?", "answer": "- Step 1: The ideal-gas model assumes negligible molecular volume and negligible inter-molecular forces except during brief collisions.\n- Step 2: These hold when the gas is **not too compressed** and is **well above its critical temperature**, so molecules stay far apart and forces stay small.\n- Step 3: Air's main components have very low critical temperatures (oxygen −118 °C, nitrogen −147 °C), so at room conditions air is far above them and behaves ideally. Near/below the critical temperature, forces dominate and gases liquefy — the model breaks down.", "source": "Opus 4.8 ②", "_id": "opus_2_69", "judge_pick": false}, {"question": "A student expects doubling the Celsius temperature (27 °C → 54 °C) to double a fixed-volume gas's pressure, but it only rises ~9%. Explain the mistake.", "answer": "- Step 1: The pressure law is $$p \\propto T$$ with $$T$$ in **kelvin**, not Celsius — you must use absolute temperature.\n- Step 2: Converting: 27 °C = 300 K and 54 °C = 327 K, a ratio of only $$327/300 = 1.09$$.\n- Step 3: So the pressure rises by about **9%**, not 100%. To actually *double* the pressure you'd need to double the absolute temperature: 300 K → 600 K, i.e. 327 °C.\n\nThe error is treating a Celsius ratio as an absolute-temperature ratio.", "source": "Opus 4.8 ②", "_id": "opus_2_70", "judge_pick": false}, {"question": "State the *combined* gas law for a fixed mass of gas and explain what physical fact makes it valid.", "answer": "- Step 1: The combined law is $$\\dfrac{p_1V_1}{T_1} = \\dfrac{p_2V_2}{T_2}$$, with $$T$$ in kelvin.\n- Step 2: It comes from rearranging $$pV = NkT$$ to $$\\dfrac{pV}{T} = Nk = \\text{constant}$$.\n- Step 3: For a **fixed mass** of gas, $$N$$ (number of molecules) is constant and $$k$$ is a universal constant, so $$pV/T$$ stays fixed — allowing you to relate any initial and final states. It combines Boyle's ($$T$$ fixed), the pressure law ($$V$$ fixed) and Charles's ($$p$$ fixed) into one relation.", "source": "Opus 4.8 ②", "_id": "opus_2_71", "judge_pick": false}, {"question": "In the constant-volume pressure–temperature experiment, when the graph of $$p$$ vs $$\\theta$$ (°C) is extrapolated to zero pressure, what temperature is found and what does it confirm?", "answer": "- Step 1: Extrapolating the straight line back to **zero pressure** gives a temperature of about **−273 °C**.\n- Step 2: This is because, for an ideal gas, pressure arises from molecular motion — zero pressure implies molecules have stopped, i.e. minimum kinetic energy.\n- Step 3: This point is **absolute zero (0 K)**, confirming it as the lowest theoretically possible temperature. (Real gases liquefy before this, so it is an extrapolation, not a measurement.)", "source": "Opus 4.8 ②", "_id": "opus_2_72", "judge_pick": false}, {"question": "Why does a car tyre's air pressure rise after a long drive, and which gas law explains it? (3 steps)", "answer": "- Step 1: The tyre volume is essentially fixed, so the air inside obeys the pressure law $$p \\propto T$$ (kelvin).\n- Step 2: As the car drives, the rubber flexes each rotation (hysteresis), transferring energy to the rubber's internal energy, warming it; this heat conducts to the air inside.\n- Step 3: The warmer air molecules strike the tyre walls faster and more often, so the **pressure increases** in proportion to the rise in absolute temperature — which is why cold-tyre pressures are measured before driving.", "source": "Opus 4.8 ②", "_id": "opus_2_73", "judge_pick": true}, {"question": "State the four \"process trigger\" phrases and which heat-transfer mechanism each signals.", "answer": "- Step 1: \"Passing vibrations / collisions of particles / through a solid\" ⇒ **conduction**.\n- Step 2: \"Electromagnetic waves / infrared / across empty space / surface colour\" ⇒ **radiation**.\n- Step 3: \"A fluid rises/sinks / whole volumes of air move / a draught\" ⇒ **convection**.\n\nBonus SHC/latent triggers: \"1 kg by 1 K, no state change\" ⇒ specific heat capacity; \"change of state, constant temperature\" ⇒ latent heat.", "source": "Opus 4.8 ②", "_id": "opus_2_74", "judge_pick": false}, {"question": "Radiation is the only heat-transfer mechanism that differs fundamentally from conduction and convection in one respect. What is it, and why?", "answer": "- Step 1: Conduction needs particles (a solid lattice) and convection needs a fluid (particles that can flow) — both require a **material medium**.\n- Step 2: **Radiation needs no medium** — it travels as electromagnetic (infrared) waves, so it works even across a **vacuum**.\n- Step 3: This is why the Sun's energy reaches Earth across ~150 million km of empty space (radiation), while conduction and convection are impossible there.", "source": "Opus 4.8 ②", "_id": "opus_2_75", "judge_pick": false}, {"question": "Why is a vacuum flask (Thermos) so effective, and which mechanism does each design feature target?", "answer": "- Step 1: The **vacuum gap** between the double walls removes particles — killing both **conduction** (nothing to pass vibrations) and **convection** (no fluid to circulate).\n- Step 2: The **silvered/shiny inner surfaces** are poor emitters and good reflectors, reducing heat loss by **radiation** (infrared reflected back in).\n- Step 3: Combining these attacks all three mechanisms at once — which is why the vacuum flask approaches the ideal insulator described in the space-cooling context.", "source": "Opus 4.8 ②", "_id": "opus_2_76", "judge_pick": false}, {"question": "Why is \"trapped air\" described as having *two* insulating roles, and what would a single large air gap fail to do?", "answer": "- Step 1: Role 1 — air has **few particles**, so it conducts poorly (reduces **conduction**). This works whether the air is trapped or not.\n- Step 2: Role 2 — when air is held in **small, immobilised pockets**, it **cannot circulate**, so it cannot carry heat by bulk flow (reduces **convection**).\n- Step 3: A **single large** air gap would still be a poor conductor, but the air inside could set up a **convection current**, carrying heat across the gap. Splitting it into tiny pockets (fibres, foam) prevents that circulation — hence insulation uses many small pockets, not one big space.", "source": "Opus 4.8 ②", "_id": "opus_2_77", "judge_pick": false}], "count": 78}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 69442, "out_tokens": 14359, "reasoning_chars": 33371, "cost_eur": 0.1018, "elapsed_s": 302, "content_chars": 23393}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 68005, "out_tokens": 16411, "reasoning_chars": 1561, "cost_eur": 0.1063, "elapsed_s": 376, "content_chars": 62530}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 69442, "out_tokens": 15091, "reasoning_chars": 12372, "cost_eur": 0.1039, "elapsed_s": 356, "content_chars": 46764}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m3", "display": "MiniMax M3", "temperature": 0.7, "in_tokens": 65060, "out_tokens": 34127, "reasoning_chars": 45248, "cost_eur": 0.0556, "elapsed_s": 381, "content_chars": 96250}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m3", "display": "MiniMax M3 const SK='thermal_physics_alex_20260709_10';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function eI(s){return eH(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>').replace(/`([^`]+)`/g,'<code>$1</code>')}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eI(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eI(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eI(tr.slice(2))}</div>`;continue}
    h+=`<div>${eI(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    const cardClass=(im||cur==='judge')?'':'ds';
    h+=`<div class="cd ${cardClass}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eI(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch&&cur!=='judge');
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
