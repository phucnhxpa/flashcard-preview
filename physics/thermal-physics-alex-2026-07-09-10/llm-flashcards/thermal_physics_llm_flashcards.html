 ↔ gas.\n- Step 2: The energy is called \"latent\" (hidden) because during a state change, energy is being transferred *but the temperature does not change* — the effect is not immediately visible on a thermometer. The energy goes into *potential energy* (breaking or loosening intermolecular bonds), not kinetic energy, so the average particle speed (and therefore temperature) stays constant. The energy is \"hidden\" in the bond changes rather than showing up as a temperature rise.", "source": "GLM 5.1 ③", "_id": "glm_3_25"}, {"question": "When using $$\\frac{p_1}{T_1} = \\frac{p_2}{T_2}$$ for a car tyre, why must you use the *total* pressure (gauge + atmospheric) and not just the gauge pressure? (2 steps)", "answer": "- Step 1: The gas laws relate the **absolute** pressure of the gas — the total force per area exerted by the molecules on the walls. Gauge pressure is the pressure *above* atmospheric, not the total.\n- Step 2: If you use only gauge pressure, you ignore the ~101 kPa of atmospheric pressure already acting, which gives a significantly wrong ratio. Always add atmospheric pressure to gauge pressure to get the total absolute pressure before applying gas laws.", "source": "GLM 5.1 ②", "_id": "glm_2_42"}, {"question": "Why does evaporation cool a liquid (e.g., why sweat cools your skin)? Use particle terms. (3 steps)", "answer": "- Step 1: In a liquid at a given temperature, the particles have a distribution of speeds. Some near the surface are moving fast enough to escape the intermolecular bonds and become a gas.\n- Step 2: The particles that escape are the higher-energy ones. When they leave, the average KE of the particles remaining in the liquid is reduced.\n- Step 3: A lower average KE means a lower temperature. So the liquid cools as the higher-energy particles leave. This is why sweating cools the skin — the sweat evaporates and the higher-energy water molecules leave, cooling the remaining sweat and the skin beneath.\n\nThe same principle explains why you feel cold coming out of a swimming pool on a windy day — the wind accelerates evaporation, and the loss of high-energy water molecules cools you.", "source": "MiniMax M3 ①", "_id": "minimax_1_65"}, {"question": "The rms speed of air molecules (~480 m/s) is faster than the speed of sound in air (~340 m/s). Why is this physically reasonable? (3 steps)", "answer": "- Step 1: Sound is carried through air by molecular collisions passing the disturbance along.\n- Step 2: Sound can travel no faster than the molecules that carry it move, so the speed of sound should be somewhat *less* than the typical molecular speed.\n- Step 3: 340 m/s is about 25% below the rms speed of ~480 m/s — consistent and reasonable. This agreement helps justify the kinetic-theory assumptions (molecules in rapid random motion). A lighter gas like helium has higher molecular speed, hence faster sound and the \"Donald Duck\" voice.", "source": "Opus 4.8 ①", "_id": "opus_1_65"}, {"question": "In the ice/latent-heat mixing experiment (13A), why is ice added until the water is as far *below* room temperature as it was *above* room temperature when ice was first added?", "answer": "- Step 1: While the mixture is above room temperature, it *loses* energy to the surroundings; while below room temperature, it *gains* energy from the surroundings.\n- Step 2: If the below-room and above-room intervals are made symmetric (equal size), the energy gained from the surroundings roughly **cancels** the energy lost to them.\n- Step 3: This makes the assumption \"no net heat exchange with surroundings\" much more valid, giving a more accurate value for $$L$$.", "source": "Opus 4.8 ①", "_id": "opus_1_48"}, {"question": "Why does the kinetic-theory derivation of pressure use \"rate of change of momentum\" rather than just \"force\"? (2 steps)", "answer": "- Step 1: A single molecule hits the wall in a discrete event — it bounces off, reversing one component of its momentum. To get the average force on the wall, you need the rate at which momentum is being transferred, which is (momentum change per collision) × (collisions per second).\n- Step 2: This is the definition of average force: $$F = \\Delta p / \\Delta t$$ (Newton's second law in momentum form). For continuous processes you use the derivative $$F = dp/dt$$, but for discrete collisions the rate-of-change formulation gives the same answer.\n\nThis is the deep reason kinetic theory is in fact just Newton's laws applied to a huge number of tiny particles.", "source": "MiniMax M3 ①", "_id": "minimax_1_100"}, {"question": "Two identical cans — one matt black, one shiny silver — are filled with water at $$80\\,^{\\circ}\\text{C}$$ and left to cool. A student predicts the black can will reach a *higher* temperature than the silver can. Why is this wrong, and how should you read \"better emission\" from a graph? (3 steps)", "answer": "- Step 1: The student's prediction is backwards. Emitting more infrared means *losing* energy faster, which makes the object *cool down* faster — not get hotter. Giving off energy reduces the internal energy store, so the temperature falls.\n- Step 2: On a temperature–time cooling curve, the black can's line falls *more steeply* than the silver can's line because it loses energy at a greater rate. Both curves eventually level off at room temperature (thermal equilibrium), but the black can arrives there sooner.\n+ The steeper the cooling curve, the greater the emission rate.\n+ Never read \"better emitter\" as \"higher temperature\" — read it as \"faster temperature drop.\"\n- Step 3: The correct interpretation: the black can is the better emitter, proven by its *faster rate of cooling*, not by any claim that it reaches a higher temperature. The misconception is treating \"gives off more\" as \"gets hotter\" — in fact, \"gives off more\" means \"cools faster.\"", "source": "GLM 5.1 ③", "_id": "glm_3_7"}, {"question": "A student watching a convection demo says: \"The cooled air must turn into liquid to sink, just like the heated water might boil and become gas.\" Correct both parts of this statement. (2 steps)", "answer": "- Step 1: Cooling air does *not* have to liquefy to sink. A gas can simply become *denser* (particles move less, come closer together) while remaining a gas. As temperature falls, the same mass occupies less volume, density increases, and the denser gas sinks — no state change required.\n- Step 2: In the dyed-water loop demo, the water is not heated enough to change state at all. It stays liquid throughout. The dye simply reveals the circulating current: heated water rises (less dense), cooled water sinks (more dense), both still liquid. State change is *not* part of normal convection — it is an entirely separate process (latent heat).", "source": "GLM 5.1 ③", "_id": "glm_3_16"}, {"question": "The cooling curves of two identical cans (one black, one silvered) both level off as they approach room temperature, rather than cooling all the way to \"absolute zero.\" Why? (2 steps)", "answer": "- Step 1: As the cans cool, the *temperature difference* between the can and its surroundings shrinks, so the rate of net energy loss (by radiation) falls. The cooling slows.\n- Step 2: Thermal equilibrium is reached when the can's *emission* rate equals its *absorption* rate of IR from the surroundings. At that point the net loss is zero, the temperature is constant, and it is room temperature (or whatever the surroundings are at). It does not continue to 0 K because the surroundings are emitting IR back at the can.\n\nTakeaway: thermal equilibrium = emission rate = absorption rate, at the *surroundings'* temperature, not 0 K. The environment is a heat source too.", "source": "MiniMax M3 ②", "_id": "minimax_2_97"}, {"question": "Why does the addition of CO₂ to the atmosphere shift the Earth's equilibrium temperature *upwards*? (2 steps)", "answer": "- Step 1: CO₂ absorbs and re-radiates the *outgoing* long-wavelength infrared emitted by the Earth's surface, reducing the rate at which energy escapes to space.\n- Step 2: With more energy \"trapped\" in the atmosphere-surface system, the Earth-sun system must reach a new thermal equilibrium. To emit infrared at the same total rate, the surface temperature must rise so that its own emission rate matches the *reduced* net loss. Net result: higher equilibrium surface temperature.\n\nTakeaway: more CO₂ → less IR escapes → Earth must be hotter to emit at the same total rate. Equilibrium shifts up.", "source": "MiniMax M3 ②", "_id": "minimax_2_73"}, {"question": "A 2 kW electric kettle contains 1.0 kg of water at 20 °C. Estimate roughly how long it takes to reach boiling (100 °C). Then estimate how long it takes to boil away 0.5 kg of water. Which takes longer, and by roughly what factor? (Conceptual, no precise calculation.) (3 steps)", "answer": "- Step 1: Energy to heat water from 20 °C to 100 °C: $$\\Delta E = mc\\Delta\\theta = 1.0 \\times 4200 \\times 80 = 336000$$ J. At 2000 W, time ≈ 336000/2000 ≈ 168 s ≈ 2.8 minutes.\n- Step 2: Energy to boil away 0.5 kg: $$\\Delta E = mL_v = 0.5 \\times 2.26 \\times 10^6 = 1.13 \\times 10^6$$ J. Time ≈ 1.13 × 10⁶/2000 ≈ 565 s ≈ 9.4 minutes.\n- Step 3: Boiling away the water takes roughly **3–4 times longer** than heating it to boiling point, because $$L_v$$ (2.26 MJ/kg) is very large. This is why the boiling plateau on a heating curve is much longer than the heating slope — vaporisation requires far more energy per kilogram than raising temperature.", "source": "GLM 5.1 ②", "_id": "glm_2_56"}, {"question": "State the pressure law for a fixed mass of gas at constant volume. Why must the temperature be in *kelvin* for this law to work? What goes wrong if you use Celsius? (3 steps)", "answer": "- Step 1: The pressure law: $$p \\propto T$$ for a fixed mass of gas at constant volume, or equivalently $$\\frac{p_1}{T_1} = \\frac{p_2}{T_2}$$, where $$T$$ is in **kelvin**.\n- Step 2: The law requires kelvin because it is derived from the kinetic theory relation $$\\frac{1}{2}m\\langle c^2\\rangle = \\frac{3}{2}kT$$, where $$T = 0\\,\\text{K}$$ corresponds to zero molecular KE and zero pressure. The proportionality $$p \\propto T$$ passes through the origin ($$p = 0$$ at $$T = 0\\,\\text{K}$$), making it a true direct proportion.\n- Step 3: If you use Celsius, $$p$$ is *not* proportional to $$\\theta$$. At $$\\theta = 0\\,^{\\circ}\\text{C}$$ ($$= 273\\,\\text{K}$$), the pressure is not zero — the gas still has significant molecular KE. A graph of $$p$$ vs $$\\theta$$ would be a straight line that does *not* pass through the origin, so the simple ratio $$p_1/\\theta_1 = p_2/\\theta_2$$ would give wrong answers. Only the kelvin scale gives the true direct proportionality.", "source": "GLM 5.1 ③", "_id": "glm_3_35"}, {"question": "Two objects are at the same temperature and in thermal contact. Is energy still being transferred between them? Explain what \"thermal equilibrium\" really means at the particle level. (3 steps)", "answer": "- Step 1: Microscopic energy exchanges continue: particles collide and electromagnetic radiation can still be emitted and absorbed in both directions.\n- Step 2: **Thermal equilibrium** means there is no net thermal-energy transfer between the systems; objects in thermal contact have the same temperature, so their macroscopic internal energies and temperatures remain steady.\n- Step 3: Equality of emission and absorption is the **radiative-balance special case**. For contact transfer, the forward and reverse microscopic exchanges balance on average. Equilibrium is therefore dynamic, not a frozen standstill.\n\nDefinition to memorise: thermal equilibrium is the state of no net thermal-energy transfer between systems (equal temperature when in thermal contact).", "source": "GLM 5.1 ③", "_id": "glm_3_2"}, {"question": "A balloon is filled with helium at room temperature and sealed. The balloon is taken outside on a cold day. What happens to the balloon? (2 steps)", "answer": "- Step 1: As the temperature drops, the average KE of the helium molecules drops (since $$\\tfrac{1}{2}m\\langle c^2\\rangle = \\tfrac{3}{2}kT$$), so the rms speed drops.\n- Step 2: At constant number of molecules in a flexible balloon, the pressure inside is approximately constant (matches outside atmospheric pressure). By $$pV = NkT$$ with $$p$$ and $$N$$ fixed, $$V \\propto T$$, so the volume decreases and the balloon shrinks.\n\nThis is why balloons look deflated on cold mornings and full on warm days — Charles's law in action.", "source": "MiniMax M3 ①", "_id": "minimax_1_106"}, {"question": "Sketch the temperature–time cooling curve for a hot black object placed in a 20 °C room. Label the key features. (3 steps)", "answer": "- Step 1: The curve starts at the high initial temperature and falls steeply at first, when the temperature difference between the object and the room is largest and the net rate of energy loss is greatest.\n- Step 2: The curve gradually flattens as the object cools, because the temperature difference shrinks and so the net emission rate decreases.\n- Step 3: The curve levels off at 20 °C (room temperature), where thermal equilibrium is reached — emission rate equals absorption rate and there is no further net change in internal energy.\n\nA \"steeper cooling\" means a higher emission rate, which corresponds to a better emitter (e.g., black). A shiny surface would give a less steep curve.", "source": "MiniMax M3 ①", "_id": "minimax_1_43"}, {"question": "A student says \"Conduction happens mainly in metals because the bonds are stronger.\" Why is the truth almost the *opposite* in a sense? (2 steps)", "answer": "- Step 1: Conduction is energy transfer via *vibrations and free electrons*. Strong bonds *couple* the lattice tightly, which transmits vibrations well — so strong bonds actually *help* conduction, not hinder it.\n- Step 2: The truth is that metals conduct best because of their **free (delocalised) electrons**, not because of their bonds. Non-metals (e.g., wood) have similar or stronger bonds but no free electrons, so they conduct poorly. Free electrons are the dominant factor in metals.\n\nTakeaway: it's the *electrons*, not the bonds, that make metals special. Non-metals can have strong bonds and still insulate.", "source": "MiniMax M3 ②", "_id": "minimax_2_87"}, {"question": "Phuc asked, \"Is the hot machine in space cooled automatically by 'cold' space?\" Walk through the *elimination* argument that shows why the answer is \"no.\" (3 steps)", "answer": "- Step 1: List the three mechanisms and check each in vacuum: **conduction** requires particles to pass on vibrations — *none* in vacuum, so impossible. **Convection** requires bulk movement of a fluid — *no* fluid in vacuum, so impossible. Only **radiation** survives.\n- Step 2: Radiation is *not* the same as \"cold.\" Cold space does not actively remove heat by contact; it merely provides a low-background *destination* for emitted infrared. The machine emits; the photons fly away; the machine's internal energy drops.\n- Step 3: So \"cold space\" doesn't cool a machine automatically — it merely *allows* the machine to cool itself by radiation, provided the machine is a good emitter and is not being heated by the Sun. Without those conditions, the machine would overheat.\n\nTakeaway: cold ≠ active coolant. Vacuum just removes conduction and convection from the menu; radiation still requires a good emitter and an absence of incoming solar heating.", "source": "MiniMax M3 ②", "_id": "minimax_2_52"}, {"question": "In the Sahara-to-Paris heatwave story, Alex gave illustrative temperatures: 60 °C leaves the Sahara, cools through 50, 40, and arrives in Paris at 30 °C; local heating then adds about 10 °C to give 40 °C at street level. What is the physics *point* of these numbers — are they measurements? (2 steps)", "answer": "- Step 1: The 60 → 50 → 40 → 30 °C sequence and the added 10 °C were illustrative teaching numbers, not measurements. Do not quote them as meteorological data.\n- Step 2: Memorise the mechanism scale instead: solar radiation heats surfaces; nearby air gains energy through molecular-collision conduction; buoyant vertical motion is local **convection**; continental horizontal transport is **advection by wind**; local surfaces and air exchange energy again.\n\nTakeaway: the numbers are a visualisation aid. In an exam, use the corrected causal chain and distinguish convection from advection.", "source": "MiniMax M3 ②", "_id": "minimax_2_48"}, {"question": "Why is the Boltzmann constant such a tiny number (~10⁻²³ J/K)? What does it physically represent?", "answer": "- Step 1: $$k$$ connects the energy scale of a **single molecule** to a temperature change.\n- Step 2: The kinetic energy gained by one molecule per unit rise in temperature is extremely small (a single molecule is a minuscule system).\n- Step 3: So $$k$$'s tiny value reflects that it takes an enormous number of molecules (~$$10^{23}$$ per mole) for these tiny per-molecule energies to add up to everyday energy amounts. It is essentially the \"energy per molecule per kelvin\" conversion factor.", "source": "Opus 4.8 ①", "_id": "opus_1_59"}, {"question": "A 0.2 kg block of ice at 0 °C needs to be melted completely. Using $$L_f = 3.34 \\times 10^5$$ J/kg, estimate the energy required. Then compare: if the same energy were used to heat 0.2 kg of water from 0 °C, by how many degrees would the water temperature rise? (Conceptual — order of magnitude only.) (2 steps)", "answer": "- Step 1: Energy to melt: $$\\Delta E = mL_f = 0.2 \\times 3.34 \\times 10^5 \\approx 6.7 \\times 10^4$$ J (about 67 kJ).\n- Step 2: If this energy heated 0.2 kg of water instead: $$\\Delta\\theta = \\frac{\\Delta E}{mc} = \\frac{67000}{0.2 \\times 4200} = \\frac{67000}{840} \\approx 80$$ K. So the energy needed just to *melt* 0.2 kg of ice (with no temperature change!) could heat the same mass of water by about 80 °C. This shows how large latent heat is relative to sensible heat.", "source": "GLM 5.1 ②", "_id": "glm_2_64"}, {"question": "A thermometer has a heat capacity of 15 J/K. In an SHC experiment, it is placed in 120 g of oil. Why does the thermometer affect the result, and in which direction? (2 steps)", "answer": "- Step 1: The thermometer absorbs some of the electrical energy supplied — energy that does not go into heating the oil. This means the oil receives less energy than $$IV\\Delta t$$ counts.\n- Step 2: Since $$c_{\\text{oil}} = \\frac{IV\\Delta t - \\text{energy to thermometer}}{m_{\\text{oil}} \\Delta\\theta}$$, ignoring the thermometer's energy makes the numerator too large, so the calculated SHC is **too large**. The 15 J/K × Δθ energy taken by the thermometer should be subtracted.", "source": "GLM 5.1 ②", "_id": "glm_2_58"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "A student writes: \"The hot soup contains a lot of heat.\" Correct this statement using the distinction between energy stores and transfer pathways. (2 steps)", "answer": "- Step 1: Identify the misconception. \"Heat\" is not a substance that can be contained. What a body contains is *internal energy* (a store), which is the sum of the random kinetic and potential energies of its particles.\n- Step 2: Clarify the terminology. \"Heating\" is the *transfer pathway* — the process by which energy moves from a higher-temperature body to a lower-temperature body. The soup has a high *thermal energy store*, but \"heat\" should only be used to describe the *transfer* of that energy, e.g., \"heating is occurring from the soup to the spoon.\"", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "In the Herschel prism experiment, a thermometer placed just beyond the red end of the visible spectrum registered the highest temperature rise. What does this demonstrate about the nature of infrared, and why is it significant? (2 steps)", "answer": "- Step 1: The demonstration shows that there is invisible electromagnetic radiation just beyond red light that carries energy and can warm objects. This is infrared radiation — it transfers energy to the thermometer despite being unseen.\n- Step 2: The significance is that infrared is not \"anything invisible\" or \"weak nuclear radiation.\" It is a specific band of the electromagnetic spectrum, produced by electron energy-level drops, and its defining property is energy transfer to matter (warming), which distinguishes it from other invisible EM bands like UV or X-rays that have different interactions.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "Under what single condition would an object stop emitting infrared radiation, and what does this imply about the relationship between particle motion and temperature? (2 steps)", "answer": "- Step 1: An object would stop emitting infrared only at absolute zero ($$0 \\text{ K}$$). At this theoretical temperature, the random kinetic energy of the particles is at its minimum (zero in the classical model), so there is no energy to radiate.\n- Step 2: This implies that as long as particles have random kinetic motion (i.e., the temperature is above $$0 \\text{ K}$$), they emit infrared. Emission is continuous for all everyday objects; hotter objects emit more because their particles have higher average kinetic energy, leading to more energetic and frequent photon releases.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "A shiny silver can and a matt black can are filled with hot water at the same starting temperature. A student claims the silver can will cool faster because it \"reflects more.\" Why is this reasoning flawed, and which can actually cools faster? (3 steps)", "answer": "- Step 1: Identify the source of the energy. The energy being lost comes from the *hot water inside* the can, not from external radiation hitting the can. Reflection requires an *incoming* external source to bounce back.\n- Step 2: Relate surface property to the mechanism. To lose internal energy via radiation, the can must *emit* infrared outward. Black/matt surfaces are the best *emitters*; shiny/silver surfaces are the worst emitters (and best reflectors).\n- Step 3: Conclusion. The black can emits infrared more effectively to the surroundings, so it loses energy faster and cools quicker. The silver can, being a poor emitter, retains its internal energy longer.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "When reading a cooling-curve graph (temperature vs. time) for two objects, how do you determine which object is the stronger infrared emitter? (2 steps)", "answer": "- Step 1: Look at the *gradient* (steepness) of the temperature drop, not the final temperature value. A stronger emitter loses thermal energy to the surroundings at a faster rate.\n- Step 2: A faster rate of energy loss causes the temperature to drop more steeply on the graph. Therefore, the curve with the steeper downward gradient corresponds to the better emitter. Never assume the stronger emitter \"gets hotter\" — emitting energy *cools* an object.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "A student says: \"Infrared is a weak type of nuclear radiation because it's called 'radiation'.\" Correct this by specifying what infrared actually is and how it is produced. (2 steps)", "answer": "- Step 1: Clarify the broad term. \"Radiation\" simply means something is given off or radiated. Nuclear radiation refers specifically to alpha, beta, or gamma particles emitted from the *nucleus* during radioactive decay.\n- Step 2: Define infrared's origin. Infrared is *electromagnetic radiation*, specifically photons emitted when an orbital electron drops to a lower energy level. It has nothing to do with the nucleus; it is a quantum transition in the electron shell, analogous to visible light but at a longer wavelength.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "Describe the particle-level mechanism by which thermal energy is conducted through a non-metal solid, from a hot end to a cold end. (2 steps)", "answer": "- Step 1: In a solid, particles vibrate about fixed positions. At the hotter end, particles vibrate with greater amplitude and kinetic energy.\n- Step 2: These more energetic vibrations are passed on to neighbouring particles through the inter-atomic bonds (like springs or people linking arms). The neighbours then pass the increased vibration to their neighbours, propagating the energy along the material toward the cooler end without the particles themselves moving along.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "Why do metals conduct thermal energy significantly faster than non-metals, and how does this relate to their electrical conductivity? (3 steps)", "answer": "- Step 1: Metals contain *free (delocalised) electrons* that are not bound to individual atoms. These electrons can move rapidly throughout the metallic lattice.\n- Step 2: When the metal is heated, the vibrating atoms knock these free electrons, giving them kinetic energy. The electrons then travel quickly through the lattice and collide with atoms further away, transferring energy much faster than the atom-to-atom vibration passing of non-metals.\n- Step 3: The same free electrons also carry electric charge under a potential difference, which is why good thermal conductors (like copper) are also good electrical conductors. The mechanisms are related but distinct: thermal conduction involves random kinetic motion from hot to cold, while electrical conduction involves a directed drift under an electric field.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "A student claims that \"strong chemical bonds make the best thermal insulators.\" Why is this backwards, and what actually makes a material a good insulator against conduction? (2 steps)", "answer": "- Step 1: Strong bonds efficiently *transmit* vibrations from one atom to the next, which is the mechanism of conduction. Think of stiff springs: a shake travels through them quickly. Therefore, strong bonds make a good *conductor*, not an insulator.\n- Step 2: Good insulators against conduction have *weaker* bonds (which damp vibrations) or, more importantly, *fewer particles*. Gases are good insulators because their particles are widely spaced (few collisions). A vacuum is the ultimate insulator because it has *no particles* to pass on vibrations at all.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "State the ordered, causal chain of particle behaviour that explains why a heated fluid rises and forms a convection current. (4 steps)", "answer": "- Step 1: The fluid near the heat source gains energy, so its particles move faster.\n- Step 2: The faster-moving particles spread apart, increasing the volume occupied by that mass of fluid.\n- Step 3: The same mass in a larger volume means the region becomes *less dense* than the surrounding cooler fluid.\n- Step 4: The less dense, heated fluid rises, and cooler, denser fluid sinks to replace it, creating a continuous circulating flow (a convection current).", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "A student watching a convection demo says: \"The sinking cool air must be turning into a liquid because it's becoming denser.\" Why is this wrong? (2 steps)", "answer": "- Step 1: Density change does not require a change of state. A gas can become denser simply by its particles moving slower and occupying a smaller volume for the same mass, while remaining entirely a gas.\n- Step 2: In a typical convection current (like air in a room or water in a pot), the temperature changes are far too small to cause condensation or freezing. The fluid stays in the same phase; only its density and bulk movement change.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "Explain the daytime \"sea breeze\" as a convection current, identifying the roles of infrared radiation, conduction, and convection. (3 steps)", "answer": "- Step 1: The Sun's infrared radiation heats the land faster than the sea (land has a lower specific heat capacity). This is the initial energy input.\n- Step 2: The hot land heats the air above it by *conduction* (contact). That air becomes less dense and *rises* via convection.\n- Step 3: Cooler, denser air over the relatively colder sea *sinks* and flows inland to replace the rising air. This onshore flow is the sea breeze — a large-scale convection current driven by differential heating.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "Trapped air is a common insulation feature (e.g., in cavity walls or loft rolls). Explain how trapped air reduces *both* conduction and convection. (2 steps)", "answer": "- Step 1: Reduction of conduction: Air is a gas with very few, widely spaced particles. Fewer particles means fewer collisions to pass on vibrations, making air a poor conductor. Trapping it prevents it from moving away, keeping this low-conductivity layer in place.\n- Step 2: Reduction of convection: If air were free to flow, heated air would rise and carry energy away (convection). By trapping air in small, immobilised pockets (e.g., within fibres), the air cannot circulate. No bulk movement means no convection current can form.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "A student labels a draught (cold air blowing under a door) as \"conduction.\" Correct this by explaining what a draught actually is and why it is a different mechanism. (2 steps)", "answer": "- Step 1: A draught is the physical movement of whole volumes of cold air replacing warm air. This is the bulk movement of a fluid carrying its thermal energy with it.\n- Step 2: This bulk movement is the definition of *convection*. Conduction is the passing of vibrations between stationary particles. In a draught, the particles themselves are relocating, which is convection, not conduction.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "Why is a vacuum the ultimate insulator against conduction and convection, but NOT against radiation? (2 steps)", "answer": "- Step 1: Conduction requires particles to pass on vibrations; convection requires a fluid to circulate. A vacuum contains no particles at all, so neither mechanism can operate. This makes it the perfect barrier to those two pathways.\n- Step 2: Radiation (infrared) is an electromagnetic wave that requires no medium to travel. It crosses a vacuum just as light from the Sun crosses space. Therefore, a vacuum does *not* stop radiative heat transfer; to block radiation, you need a reflective surface (e.g., silver foil) to bounce the infrared back.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "Define specific heat capacity in a way that explicitly explains the meaning of \"specific\" and the unit $$\\text{J/(kg K)}$$. (3 steps)", "answer": "- Step 1: The core definition: it is the energy needed to raise the temperature of a substance by $$1 \\text{ K}$$ (or $$1^{\\circ}\\text{C}$$).\n- Step 2: The word \"specific\" in physics always means \"per unit mass,\" specifically \"per kilogram.\" So SHC is the energy per kilogram per degree.\n- Step 3: The unit derivation: Energy ($$\\text{J}$$) divided by mass ($$\\text{kg}$$) and temperature change ($$\\text{K}$$) gives $$\\text{J/(kg K)}$$. This unit tells you exactly how many joules you must supply to 1 kg of the material to heat it by 1 K.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "Water has a specific heat capacity of roughly $$4200 \\text{ J/(kg K)}$$, while metals like copper are around $$400 \\text{ J/(kg K)}$$. Explain qualitatively why water is used in central heating radiators and why it takes a long time for a large lake to change temperature. (2 steps)", "answer": "- Step 1: A high SHC means a substance can absorb a large amount of energy for a small temperature rise. Water absorbs a lot of thermal energy from the boiler without turning into steam, making it an excellent energy transport fluid in radiators.\n- Step 2: Conversely, releasing that large stored energy also results in only a small temperature drop. A lake (huge mass of high-SHC water) can absorb or release vast amounts of energy from the Sun or atmosphere with very slow temperature changes, stabilizing the local climate.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "In the core practical measuring the SHC of an aluminium block ($$c = \\frac{IV\\Delta t}{m\\Delta\\theta}$$), the calculated value of $$c$$ almost always comes out *too large*. Explain the two main reasons for this systematic error. (2 steps)", "answer": "- Step 1: The formula assumes all electrical energy ($$IV\\Delta t$$) goes into the block ($$mc\\Delta\\theta$$). However, some energy is absorbed by the heater itself, and some is lost to the surroundings (air, lagging). This means the *actual* energy heating the block is less than $$IV\\Delta t$$.\n- Step 2: Since $$c = \\frac{\\text{Energy counted}}{m\\Delta\\theta}$$, and the \"Energy counted\" ($$IV\\Delta t$$) is an overestimate of the energy that actually reached the block, the calculated $$c$$ is an overestimate (too large). A small $$\\Delta\\theta$$ also worsens percentage errors.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "Define specific latent heat, and explain why the word \"latent\" (hidden) is used to describe it. (2 steps)", "answer": "- Step 1: Specific latent heat is the energy needed to change the state of 1 kg of a substance *with no change in temperature*. \"Specific\" again means per kilogram.\n- Step 2: The energy is \"hidden\" because adding it does not register on a thermometer. The temperature stays constant during melting or boiling. The energy goes into breaking or loosening intermolecular bonds (increasing potential energy), not into making particles move faster (kinetic energy), so the temperature — which measures average kinetic energy — doesn't rise.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "For water, the specific latent heat of vaporisation ($$L_v \\approx 2.26 \\times 10^6 \\text{ J/kg}$$) is roughly seven times larger than the specific latent heat of fusion ($$L_f \\approx 3.34 \\times 10^5 \\text{ J/kg}$$). Explain the physical reason for this large difference. (2 steps)", "answer": "- Step 1: Fusion (melting) only requires enough energy to loosen the intermolecular bonds so molecules can slide past each other. The molecules remain close together and intermolecular forces are still significant.\n- Step 2: Vaporisation (boiling) requires enough energy to completely separate the molecules so they can move freely in a gas, overcoming all remaining intermolecular forces of attraction. Fully ripping molecules apart from one another requires far more energy than just letting them slide, hence $$L_v \\gg L_f$$.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "On a heating curve (temperature vs. energy supplied), how do you distinguish the sections governed by $$\\Delta E = mc\\Delta\\theta$$ from those governed by $$\\Delta E = L\\Delta m$$, and what does the relative length of the flat plateaus tell you? (3 steps)", "answer": "- Step 1: The sloped sections (where temperature is rising) are governed by $$\\Delta E = mc\\Delta\\theta$$. Here, energy increases kinetic energy, and the substance is in a single state (solid, liquid, or gas).\n- Step 2: The flat horizontal plateaus (where temperature is constant) are governed by $$\\Delta E = L\\Delta m$$. Here, energy increases potential energy to break bonds, and the state is changing (melting or boiling).\n- Step 3: The boiling plateau is much longer than the melting plateau because $$L_v \\gg L_f$$. It takes far more energy to fully separate molecules into a gas than to just loosen them into a liquid, so the horizontal stretch for boiling extends further on the energy axis.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "Explain, in the correct causal order, why heating a fixed-volume sealed container of gas increases the pressure inside it. (4 steps)", "answer": "- Step 1: Heating the gas transfers energy to the particles, increasing their average kinetic energy, so they move faster.\n- Step 2: Faster particles travel the distance to the walls more quickly, resulting in *more frequent* collisions with the container walls.\n- Step 3: Each collision also involves a larger change in momentum (because the particle is faster), exerting a *larger force* per collision.\n- Step 4: Pressure is force per area ($$p = F/A$$). With more frequent, harder collisions, the total force on the fixed wall area increases, so the pressure rises. (The volume cannot change, so the gas cannot expand to relieve this pressure).", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "A student claims: \"When a sealed gas cylinder is heated, the gas expands, which is why the pressure goes up.\" Identify the two errors in this statement. (2 steps)", "answer": "- Step 1: Error 1: In a *fixed-volume* (sealed rigid) container, the gas cannot expand. Expansion is what happens if the container is flexible. Here, the volume is constant.\n- Step 2: Error 2: The causal link is wrong. Pressure rises not because of expansion, but because faster particles exert more force on the fixed wall area ($$p = F/A$$). If the gas *could* expand, the pressure might stay constant or change differently; in this fixed-volume scenario, increased particle kinetic energy directly translates to increased pressure.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "A student guesses that pressure is calculated as \"mass ÷ volume.\" What is the correct definition of pressure, and what physical quantity does \"mass ÷ volume\" actually define? (2 steps)", "answer": "- Step 1: \"Mass ÷ volume\" ($$m/V$$) defines *density* ($$\\rho$$), which tells you how tightly packed the matter is.\n- Step 2: Pressure is defined as *force per unit area* ($$p = F/A$$). It tells you how much force is acting on a given surface area (like gas particles hitting a wall). Confusing the two is a common error; density is about mass distribution, pressure is about force distribution.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "From the ideal gas equation and kinetic theory, derive the relationship that shows the average kinetic energy of a gas molecule is proportional to absolute temperature: $$\\frac{1}{2}m\\langle c^2 \\rangle = \\frac{3}{2}kT$$. (3 steps)", "answer": "- Step 1: Start with two expressions for the macroscopic quantity $$pV$$. From the ideal gas equation: $$pV = NkT$$. From kinetic theory (deriving pressure from particle collisions): $$pV = \\frac{1}{3}Nm\\langle c^2 \\rangle$$.\n- Step 2: Equate the right-hand sides: $$NkT = \\frac{1}{3}Nm\\langle c^2 \\rangle$$. Cancel the number of molecules $$N$$ from both sides, leaving $$kT = \\frac{1}{3}m\\langle c^2 \\rangle$$.\n- Step 3: Multiply both sides by $$\\frac{3}{2}$$ to form the kinetic energy term $$\\frac{1}{2}m\\langle c^2 \\rangle$$ on the right: $$\\frac{3}{2}kT = \\frac{1}{2}m\\langle c^2 \\rangle$$. This proves the average random kinetic energy of a single molecule is directly proportional to absolute temperature $$T$$.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "A hot machine is operating in the vacuum of space. A student assumes the machine will automatically cool down because \"space is cold.\" Why is this assumption wrong, and what is the only way the machine can reject heat? (2 steps)", "answer": "- Step 1: \"Cold\" in space means there is no medium to absorb energy. Conduction and convection require particles (a solid or a fluid) to carry energy away. A vacuum has no particles, so the machine cannot lose heat by conduction or convection to its environment.\n- Step 2: The only mechanism available is *radiation* (emitting infrared electromagnetic waves). The machine must be designed to radiate efficiently — using a large, matte-black radiator panel (good emitter, large area) — and must reflect incoming solar radiation with a shiny/silver layer to prevent overheating.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "The Sahara-to-Paris heatwave scenario involves all three heat transfer mechanisms. Map out the energy pathway from the Sun to the hot air arriving in Paris, naming each mechanism used. (4 steps)", "answer": "- Step 1: The Sun's energy travels across space to the Sahara by *radiation* (infrared and visible light crossing the vacuum).\n- Step 2: The hot ground heats the air immediately above it by *conduction* (vibrations passed from sand molecules to air molecules by contact).\n- Step 3: That heated air becomes less dense, rises, and is carried across the continent by large-scale *convection* (bulk fluid movement of the atmosphere).\n- Step 4: Locally in Paris, infrared radiation from the Sun heats streets and buildings, which then reheat the nearby air by conduction. It is a combined system, not just one mechanism.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "Match each house insulation feature to the primary heat transfer mechanism it reduces: (1) Double glazing, (2) Foil behind radiator, (3) Draught excluder, (4) Cavity-wall insulation. (4 steps)", "answer": "- Step 1: Double glazing reduces *conduction*. The trapped air (or argon) gap between the panes is a poor conductor with few particles.\n- Step 2: Foil behind a radiator reduces *radiation*. The shiny surface reflects infrared back into the room rather than letting it pass through the wall.\n- Step 3: Draught excluder reduces *convection*. It blocks the bulk flow of warm air escaping under the door and cold air replacing it.\n- Step 4: Cavity-wall insulation reduces *both conduction and convection*. The fibres trap air (poor conductor) and break up the cavity into small pockets so air cannot circulate (no convection current).", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "A $$0.5 \\text{ kg}$$ block of a material with $$c = 4000 \\text{ J/(kg K)}$$ is heated by $$2 \\text{ K}$. Without a calculator, estimate the energy transferred, and explain what the number means physically. (2 steps)", "answer": "- Step 1: Use $$\\Delta E = mc\\Delta\\theta = 0.5 \\times 4000 \\times 2$$. Half of 4000 is 2000, times 2 is 4000. So $$\\Delta E = 4000 \\text{ J}$$.\n- Step 2: Physically, this means you must supply 4000 joules of energy to make half a kilogram of this substance 2 degrees warmer. If you had 1 kg, it would take 4000 J just for 1 K (which is the definition of $$c$$).", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "It takes roughly $$330 \\text{ kJ}$$ to melt 1 kg of ice and $$2260 \\text{ kJ}$$ to boil 1 kg of water. If you have 0.1 kg of ice at $$0^{\\circ}\\text{C}$$, roughly how much energy is needed just to melt it (no temperature change)? (2 steps)", "answer": "- Step 1: The latent heat of fusion is per kilogram. For 0.1 kg (one-tenth of a kilogram), you need one-tenth of the energy per kg.\n- Step 2: $$0.1 \\times 330 \\text{ kJ} = 33 \\text{ kJ}$$ (or $$33,000 \\text{ J}$$). This energy goes entirely into breaking bonds to change state; the temperature stays at $$0^{\\circ}\\text{C}$$ until all 0.1 kg is liquid.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "A sealed gas container is at $$300 \\text{ K}$$ and pressure $$p$$. If the temperature is doubled to $$600 \\text{ K}$$, what happens to the pressure, assuming constant volume? Explain using both the Pressure Law and kinetic theory. (2 steps)", "answer": "- Step 1: Macroscopic law: The Pressure Law states $$p \\propto T$$ for a fixed mass at constant volume. If $$T$$ doubles (from 300 K to 600 K), $$p$$ also doubles to $$2p$$.\n- Step 2: Microscopic kinetic theory: Doubling $$T$$ doubles the average kinetic energy of the particles ($$\\frac{1}{2}m\\langle c^", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}], "count": 31}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "In physics, we distinguish between energy \"stores\" and energy \"transfer pathways.\" If a hot cup of coffee sits on a table and gradually cools, the coffee's thermal energy is one of these two categories — which one, and why is the distinction important for exam answers? (3 steps)", "answer": "- Step 1: Thermal energy is an energy **store** — it is energy that \"sits inside\" the coffee, measurable in joules. It is not a transfer pathway.\n- Step 2: The transfer pathway involved in the cooling is **heating** — the *process* by which thermal energy moves from the hotter coffee to the cooler room (by conduction through the cup, convection of air, and radiation).\n- Step 3: The distinction matters because the examiner penalises mixing the lists. \"Thermal\" belongs on the store list; \"heating\" belongs on the transfer-pathway list. Saying \"heat is stored in the coffee\" is technically wrong — the coffee stores *internal/thermal energy*, and *heating* is the transfer of that energy.\n\nThe seven stores to recall: kinetic, gravitational potential, elastic, chemical, thermal, nuclear, (electro)magnetic. The four transfer pathways: heating, electrically, radiation (waves), mechanically.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "A sealed rigid steel container holds nitrogen gas. It is placed in a furnace and heated from 20 °C to 80 °C. Explain, in the correct causal order, what happens to the gas pressure inside. (4 steps)", "answer": "- Step 1: Heating transfers energy to the gas molecules, increasing their kinetic energy — they move faster.\n- Step 2: Faster molecules collide with the walls more frequently, and each collision exerts a larger force on the wall (greater momentum change per collision).\n- Step 3: The total force on the fixed wall area therefore increases. Since $$p = \\frac{F}{A}$$ and the area $$A$$ is fixed (rigid container), the pressure $$p$$ rises.\n- Step 4: The volume cannot change (rigid container), so the gas cannot expand. The only observable effect is the pressure increase. Never say the gas \"expands\" when the volume is fixed.\n\nCommon mistake: saying \"more friction into the boxes.\" The correct phrase is \"more frequent collisions with the walls.\" Also, pressure is force per area ($$p = F/A$$), not mass per volume (that is density, $$\\rho = m/V$$).", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "What is infrared radiation, and how was it originally discovered? What single condition would cause an object to emit *no* infrared at all? (3 steps)", "answer": "- Step 1: Infrared radiation is electromagnetic radiation just beyond the red end of the visible spectrum — light we cannot see but which transfers energy to objects (it warms them). It is not \"anything invisible\"; other invisible EM bands (UV, X-rays, microwaves) are distinct.\n- Step 2: It was discovered by Herschel: white light through a prism splits into colours; thermometers placed in each colour and one just beyond the red showed the one beyond red heated the most, revealing an invisible warming radiation.\n- Step 3: The only condition under which an object would emit no infrared is at **absolute zero** (0 K), where particle motion is at its minimum. Since 0 K is practically unreachable, essentially everything emits infrared all the time.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "A matt-black can and a shiny-silver can are each filled with boiling water at the same temperature and left to cool on a bench. Which can cools faster, and what specific property of the surface explains this? What is the common misconception about the shiny can? (3 steps)", "answer": "- Step 1: The matt-black can cools faster because black/matt surfaces are the **best emitters** of infrared radiation — they give off energy more rapidly.\n- Step 2: The shiny-silver surface is the **best reflector** but the **worst emitter and worst absorber**. Good emitter ⇔ good absorber; good reflector ⇔ poor absorber ⇔ poor emitter. These are opposites and never the same surface.\n- Step 3: The common misconception is thinking the shiny can \"gives off more\" because it reflects well. But reflection requires an *external* source of incoming radiation. Here, the source of energy is the hot water *inside* the can, so what matters is emission — and black wins. Also, do not say the stronger emitter \"gets hotter\" — emitting energy *cools* an object. Read emission rate from the steepness of the cooling curve, not from a rising temperature.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "On a temperature–time graph, two cans of hot water are cooling: one black, one silver. How do you determine which emits more infrared, and what does the graph look like? (2 steps)", "answer": "- Step 1: The can that emits more infrared loses energy faster, so its cooling curve **falls more steeply**. The black can's curve drops faster; the silver can's curve drops more slowly. Both curves level off toward room temperature (thermal equilibrium).\n- Step 2: Never infer emission from the can \"getting hotter.\" A strong emitter *cools* faster — giving off energy reduces temperature. The vertical axis shows temperature *falling*, and the steeper the fall, the greater the emission rate.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "A student says \"infrared is a weak type of nuclear radiation.\" Correct this statement and explain the fundamental difference in origin between infrared and nuclear radiation. (3 steps)", "answer": "- Step 1: Infrared is **electromagnetic radiation**, not nuclear radiation. \"Radiation\" broadly just means \"something given off\" — the type must always be specified.\n- Step 2: Infrared is emitted when an orbital electron drops to a lower energy level and releases a photon. Its origin is in electron energy-level transitions.\n- Step 3: Nuclear radiation (alpha, beta, gamma) originates from the **nucleus** — alpha is a helium nucleus, beta is an electron/neutrino from nuclear decay, and gamma is a high-energy photon from the nucleus. Completely different origin and mechanism.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "Describe the five-step chain that explains how the Sun heats the Earth and how added CO₂ causes global warming. Why must you say the Earth re-emits at a *different* wavelength? (5 steps)", "answer": "- Step 1: The Sun emits radiation (much of it short-wavelength visible and near-infrared), which travels through space and reaches Earth.\n- Step 2: Earth absorbs this radiation and warms up.\n- Step 3: Earth re-emits radiation, but at a **longer wavelength** (lower frequency) because Earth is much cooler than the Sun. This re-emitted radiation is primarily in the infrared band.\n- Step 4: Greenhouse gases (CO₂, water vapour, methane) in the atmosphere are relatively transparent to the Sun's incoming short-wavelength radiation but absorb and re-radiate much of the outgoing long-wavelength infrared, trapping energy that would otherwise escape.\n- Step 5: For millions of years, absorption and emission balanced (thermal equilibrium). Added CO₂ traps more outgoing infrared, reducing the rate at which energy escapes. The Earth settles at a **higher equilibrium temperature** — this is global warming.\n\nThe phrase \"different (longer) wavelength\" is the crux: it explains why the atmosphere behaves asymmetrically — transparent one way, opaque the other.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "Explain conduction in a solid at the particle level. Why does the same process work for all solids, but metals conduct heat much faster — what extra mechanism do metals have? (3 steps)", "answer": "- Step 1: In all solids, particles vibrate about fixed positions. Particles in the hotter region vibrate more vigorously and pass these vibrations to neighbouring particles, which pass them on again — energy travels toward the cooler end without the particles themselves moving along. Think of people linking arms: one shakes, the next shakes, and so on down the line.\n- Step 2: In metals, there is an additional mechanism: **free (delocalised) electrons**. These electrons are knocked by the vibrating atoms, move rapidly through the lattice, and collide with atoms further along, transferring energy much faster than vibration-passing alone.\n- Step 3: This is why metals are the best thermal conductors. The same free electrons also make metals good *electrical* conductors, but the two processes are distinct: in electrical conduction, electrons drift in an organised direction under a potential difference; in thermal conduction, energy spreads via lattice vibrations plus less-directed electron motion from hot toward cold.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "Two metal blocks sit in the same room at 21 °C. A cube of ice is placed on each. The ice on Block A melts in about 12 seconds; the ice on Block B barely melts. A student concludes \"Block A must be hotter.\" Why is this wrong, and what is the correct explanation? (3 steps)", "answer": "- Step 1: Both blocks are at the same temperature (21 °C). The difference cannot be that one is \"hotter\" — they are at the same temperature.\n- Step 2: The difference is **thermal conductivity**. Block A is a much better conductor: it transfers energy to the ice by contact far more rapidly, even though both are at the same temperature.\n- Step 3: Conduction rate depends on the material's conductivity, not just its temperature. A good conductor at room temperature can melt ice quickly because energy flows through it rapidly to the ice surface. A poor conductor (insulator) at the same temperature transfers energy slowly.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "What makes a material a good *insulator* against conduction? Rank vacuum, gas/air, and solids, and explain why strong chemical bonds do *not* make the best insulator. (3 steps)", "answer": "- Step 1: Conduction requires particles to pass on vibrations. Fewer particles ⇒ fewer collisions ⇒ less conduction. A vacuum has no particles at all, so it is the **best insulator** against conduction. Gas/air has few, widely spaced particles, making it a **good insulator**. Most solids have many closely packed particles and conduct relatively well.\n- Step 2: Strong chemical bonds actually *transmit* vibrations efficiently — think of stiff springs passing a shake quickly. Weaker bonds absorb vibrations more, reducing conduction.\n- Step 3: The misconception \"strong bonds make the best insulator\" is wrong. What insulates best is **fewer or no particles** (vacuum > gas > solid) and, within solids, weaker/less-rigid bonding. The key variable is particle density and bond rigidity, not bond strength per se.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": true}, {"question": "State the complete particle chain for convection in a heated fluid, in the correct order. What happens to particle *size* when a fluid is heated — do the particles themselves get bigger? (4 steps)", "answer": "- Step 1: Particles in the heated region gain energy → move faster → spread apart (same mass occupies more volume) → that region becomes **less dense** → it **rises**.\n- Step 2: Cooler fluid: particles move less → come closer together → region becomes **more dense** → it **sinks** to replace the risen fluid.\n- Step 3: The circulating flow of rising warm fluid and sinking cool fluid is a **convection current**.\n- Step 4: The particles themselves do **not** get bigger. They spread out — same mass, larger volume, lower density. Think of a dance floor: an energetic song makes people move more and spread out, lowering crowd density, but each person is the same size.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "During the day at the beach, a breeze blows from the sea toward the land (a \"sea breeze\"). Explain this as a convection current — what heats what, and what rises and sinks? (3 steps)", "answer": "- Step 1: The Sun's infrared radiation heats the **land** faster than the sea (land has a lower specific heat capacity). The land then heats the air above it by conduction.\n- Step 2: The heated air above the land becomes less dense and **rises**. Cooler, denser air over the sea **sinks** and moves horizontally inland to replace the risen air.\n- Step 3: This horizontal flow of cooler air from sea to land is the sea breeze — a convection current driven by differential heating.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "A student watching a dyed-water convection loop says \"the heated water must be turning into gas, that's why it rises.\" Another says \"the cooling water must become liquid to sink.\" Correct both statements. (2 steps)", "answer": "- Step 1: Heated water does **not** need to change state to rise. A liquid (or gas) can become less dense and rise while remaining in the same state — the particles simply spread apart. The water in the demo is not heated enough to boil.\n- Step 2: Cooling air (or water) does **not** need to condense into liquid to sink. A gas can simply become denser (particles move less, come closer) and sink while still a gas. State change is not required for sinking in convection.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "A draught (a current of air flowing under a door) is an example of which heat-transfer mechanism — conduction, convection, or radiation? Why? (2 steps)", "answer": "- Step 1: A draught is **convection**. Whole volumes of hot and cold air physically move and replace one another — that is the definition of convection (bulk fluid movement carrying energy).\n- Step 2: The common mistake is to call it conduction. The giveaway is that the air is *flowing and being replaced* — conduction involves passing vibrations between stationary particles, not bulk movement of fluid.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "Loft insulation, cavity-wall insulation, double glazing, draught excluders, and foil behind radiators each reduce one or more heat-transfer mechanisms. For each, state which mechanism(s) it reduces and the physical reason why. (5 steps)", "answer": "- Step 1: **Loft insulation** (thick fibre roll) — reduces conduction and convection. Trapped air conducts poorly (few particles); small pockets immobilise the air so it cannot circulate (no convection).\n- Step 2: **Cavity-wall insulation** (glass fibres between inner and outer brick) — reduces conduction and convection. Fibres trap air in the cavity; stops warm air flowing through the cavity.\n- Step 3: **Double/triple glazing** — reduces conduction. The air (or argon) gap between panes is a poor conductor.\n- Step 4: **Draught excluders** — reduce convection. They block whole volumes of hot/cold air flowing under doors or through gaps.\n- Step 5: **Foil/silver reflective layer behind a radiator** — reduces radiation. It reflects infrared back into the room; it is a poor emitter and poor absorber (shiny surface).", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "Why does trapped air reduce *both* conduction and convection, while a vacuum reduces conduction and convection *completely*? What does a vacuum *not* reduce? (3 steps)", "answer": "- Step 1: Trapped air has few particles, so there are fewer collisions to pass vibrations → reduced conduction. When trapped in small pockets, the air cannot circulate → no convection current can form.\n- Step 2: A vacuum has **no particles at all**, so there is nothing to pass vibrations (no conduction) and no fluid to circulate (no convection). This is why a vacuum is the ideal insulator against both mechanisms.\n- Step 3: A vacuum does **not** reduce radiation. Infrared radiation requires no medium — it travels through a vacuum (which is how the Sun heats Earth). So in a vacuum, the only remaining heat-transfer mechanism is radiation.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "Define specific heat capacity, give its unit, and explain why the unit can be written with either K or °C. (3 steps)", "answer": "- Step 1: Specific heat capacity is the energy needed to raise the temperature of **1 kg** of a substance by **1 K** (equivalently 1 °C). The word \"specific\" means *per kilogram* — never per area or per volume.\n- Step 2: The unit is $$\\text{J/(kg K)}$$ or equivalently $$\\text{J/(kg °C)}$$.\n- Step 3: A temperature *change* of 1 K equals a temperature *change* of 1 °C — the intervals are identical. So $$\\Delta\\theta$$ may be quoted in either unit. Only when stating an *absolute* temperature (e.g., \"the gas is at 300 K\") must you use kelvin; for a *difference*, both work.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "Write the equation $$\\Delta E = mc\\Delta\\theta$$ and identify every symbol, its quantity, and its SI unit. Then explain why water's unusually high SHC makes it good for radiators. (3 steps)", "answer": "- Step 1: $$\\Delta E = mc\\Delta\\theta$$ where $$\\Delta E$$ = energy transferred (J), $$m$$ = mass (kg), $$c$$ = specific heat capacity (J/(kg K)), $$\\Delta\\theta$$ = temperature change (K or °C).\n- Step 2: Water has $$c = 4200 \\text{ J/(kg K)}$$, which is unusually high compared to metals (e.g., copper ≈ 390 J/(kg K), aluminium ≈ 910 J/(kg K)).\n- Step 3: A high SHC means water absorbs a *lot* of energy for each degree of temperature rise, and releases it slowly. This is why water is ideal for radiators: it stays hot for a long time, releasing energy gradually to heat a room. It also means oceans moderate climate — they heat up and cool down slowly.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "In the aluminium-block experiment to measure specific heat capacity, the equation used is $$c = \\frac{IV\\Delta t}{m(\\theta_f - \\theta_i)}$$. List the main sources of error and, for each, state whether the measured $$c$$ comes out too large or too small, and why. (4 steps)", "answer": "- Step 1: **Energy absorbed by the heater itself** (main error). Not all supplied energy heats the block, so the block gets less energy than $$IV\\Delta t$$ counts. Since $$c = \\frac{\\Delta E}{m\\Delta\\theta}$$ and the numerator is over-counted, $$c$$ comes out **too large**.\n- Step 2: **Energy lost to the surroundings** despite lagging. Again, less energy reaches the block than is counted, so $$c$$ is **too large**.\n- Step 3: **Energy taken by the lagging and thermometer**. They absorb some energy that is not accounted for separately, so the block gets less than counted → $$c$$ **too large**.\n- Step 4: **Thermometer/meter inaccuracies**, especially when $$\\Delta\\theta$$ is small. If $$\\Delta\\theta$$ is measured too small, $$c$$ comes out too large; if measured too large, $$c$$ comes out too small. All three previous errors consistently push $$c$$ upward, so the measured value is almost always **too large**.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": true}, {"question": "A 0.5 kg copper block has a specific heat capacity of 3850 J/(kg K). It is heated by 3 K. How much energy is transferred to the block? Walk through the layout. (2 steps)", "answer": "- Step 1: Write the equation and identify values: $$\\Delta E = mc\\Delta\\theta$$, where $$m = 0.5$$ kg, $$c = 3850$$ J/(kg K), $$\\Delta\\theta = 3$$ K.\n- Step 2: Substitute and calculate: $$\\Delta E = 0.5 \\times 3850 \\times 3 = 5775$$ J.\n\nLayout tip: always write the equation first, substitute next, then compute. Copy values exactly from the question — dropping a zero (e.g., writing 385 instead of 3850) is a common board slip.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "An avocado of mass 0.215 kg requires 1294 J to cool by 2 K. Find its specific heat capacity. Then find the temperature change if it instead gains 3000 J. (4 steps)", "answer": "- Step 1: Rearrange $$\\Delta E = mc\\Delta\\theta$$ for $$c$$: $$c = \\frac{\\Delta E}{m\\Delta\\theta} = \\frac{1294}{0.215 \\times 2} = \\frac{1294}{0.43} = 3009 \\text{ J/(kg K)}$$.\n- Step 2: Note: the board circled \"2500\" but $$1294 \\div 0.43 = 3009$$, not 2500. Always re-key the division — a circled answer can still be wrong.\n- Step 3: Now use $$c = 3009$$ J/(kg K) and rearrange for $$\\Delta\\theta$$: $$\\Delta\\theta = \\frac{\\Delta E}{mc} = \\frac{3000}{0.215 \\times 3009} = \\frac{3000}{646.9} \\approx 4.6$$ K.\n- Step 4: If you had used the incorrect board value of 2500, you would get $$\\Delta\\theta = \\frac{3000}{0.215 \\times 2500} = 5.58$$ K — significantly different. This is why you must verify arithmetic.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": true}, {"question": "Define specific latent heat. Why is temperature constant during a change of state — where does the energy go? (3 steps)", "answer": "- Step 1: Specific latent heat is the energy needed to change the state of **1 kg** of a substance with **no change in temperature**. \"Specific\" = per kilogram. Fusion = solid↔liquid; vaporisation = liquid↔gas.\n- Step 2: During a change of state, energy goes into **potential energy** — breaking or loosening intermolecular bonds — not into kinetic energy. Since temperature depends on average kinetic energy, the temperature stays constant.\n- Step 3: This is why it is called \"latent\" (hidden) heat: energy is being transferred without any observable temperature change, so the cause of the energy change is not immediately apparent.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "For water, $$L_f = 3.34 \\times 10^5$$ J/kg and $$L_v = 2.26 \\times 10^6$$ J/kg. Why is vaporisation roughly seven times more energy than fusion? (2 steps)", "answer": "- Step 1: **Fusion** (melting) only needs to loosen the bonds enough so molecules can slide past one another — the molecules stay relatively close together.\n- Step 2: **Vaporisation** (boiling) must completely separate the molecules until there are no longer significant forces of attraction between them. Fully breaking bonds requires far more energy than merely loosening them, so $$L_v \\gg L_f$$.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "Sketch the heating curve for ice heated to steam. Which equation governs the sloped sections, and which governs the flat plateaus? Why is the boiling plateau much longer than the melting plateau? (3 steps)", "answer": "- Step 1: The sloped sections (solid warming, liquid warming, gas warming) obey $$\\Delta E = mc\\Delta\\theta$$ — temperature rises because energy goes into kinetic energy.\n- Step 2: The flat plateaus (melting at 0 °C, boiling at 100 °C) obey $$\\Delta E = L\\Delta m$$ — temperature is constant because energy goes into potential energy (breaking bonds).\n- Step 3: The boiling plateau is much **longer** than the melting plateau because $$L_v \\gg L_f$$ ($$2.26 \\times 10^6$$ vs $$3.34 \\times 10^5$$ J/kg for water). Far more energy must be supplied per kilogram to vaporise than to melt, so the plateau extends over a much larger energy input.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "Write the equation $$\\Delta E = L\\Delta m$$ and identify every symbol and unit. What does \"$$\\Delta m$$\" represent? (2 steps)", "answer": "- Step 1: $$\\Delta E = L\\Delta m$$ where $$\\Delta E$$ = energy transferred to change the state (J), $$L$$ = specific latent heat (J/kg), $$\\Delta m$$ = mass of substance changing state (kg).\n- Step 2: $$\\Delta m$$ is specifically the mass that undergoes the state change, not the total mass of the substance. If 0.3 kg of water boils, then $$\\Delta m = 0.3$$ kg, and the energy is $$\\Delta E = L_v \\times 0.3$$.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": true}, {"question": "A hot machine is placed in the vacuum of space. A student says \"cold space will automatically cool it.\" Explain why this is wrong, and design a practical cooling solution. (4 steps)", "answer": "- Step 1: In a vacuum there are **no particles**, so there is nothing to pass vibrations to (no conduction) and no fluid to circulate (no convection). The machine cannot cool by either mechanism.\n- Step 2: The only heat-transfer mechanism available is **radiation** (infrared). The machine can only lose heat by emitting infrared into space. Space does not \"absorb\" heat by contact — it is a vacuum.\n- Step 3: To cool the machine, conduct the internal heat to a large, **matt-black radiator** panel (best emitter, large surface area) that radiates infrared to space.\n- Step 4: Add a **reflective/silver layer** facing the Sun to reflect incoming solar radiation (so it is not absorbed). The radiator must be large enough to emit both the internally generated heat and any absorbed solar input. This is exactly how spacecraft are designed — reflective outer layers plus dedicated radiator panels.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "A student says \"specific\" means \"per unit area\" or \"per unit volume.\" Correct this. What does \"specific\" always mean in physics? (2 steps)", "answer": "- Step 1: \"Specific\" in physics always means **per kilogram** (per unit mass). Specific heat capacity = energy per kg per K. Specific latent heat = energy per kg.\n- Step 2: Never confuse \"specific\" (per kg) with \"per area\" or \"per volume.\" If you see the word \"specific,\" immediately think: divide by mass in kg.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "Define \"thermal equilibrium\" in terms of energy rates. What happens to the temperature of a body that is emitting more infrared than it absorbs? What about a body absorbing more than it emits? (3 steps)", "answer": "- Step 1: Thermal equilibrium is the state reached when a body radiates energy at the **same rate** as it absorbs it, so its temperature is constant.\n- Step 2: A body emitting more than it absorbs is **cooling** — net energy loss, temperature falls.\n- Step 3: A body absorbing more than it emits is **heating** — net energy gain, temperature rises. Note: a heating object still *emits* some infrared; it just absorbs more than it emits.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "A student says \"all invisible light is infrared.\" Why is this wrong? Name at least two other invisible bands of the EM spectrum. (2 steps)", "answer": "- Step 1: Infrared is specifically the band **just beyond red** in the EM spectrum. It is one specific region, not a catch-all for \"anything unseen.\"\n- Step 2: Other invisible EM bands include ultraviolet (UV), X-rays, gamma rays, microwaves, and radio waves. All are invisible to the human eye but are distinct from infrared in wavelength, frequency, and origin.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "Pressure is defined as force per unit area. A student confuses pressure with density. State both formulas and explain the conceptual difference. (2 steps)", "answer": "- Step 1: Pressure: $$p = \\frac{F}{A}$$ (force per area, unit Pa = N/m²). Density: $$\\rho = \\frac{m}{V}$$ (mass per volume, unit kg/m³).\n- Step 2: Pressure describes how concentrated a *force* is over a surface (e.g., a stiletto heel exerts high pressure because the force of body weight acts on a tiny area). Density describes how much *mass* is packed into a volume (e.g., lead is denser than aluminium). They are completely different quantities with different units.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "The pressure law states that for a fixed mass of gas at constant volume, $$\\frac{p_1}{T_1} = \\frac{p_2}{T_2}$$. Why must temperature be in kelvin for this equation? What goes wrong if you use °C? (3 steps)", "answer": "- Step 1: The pressure law is $$p \\propto T$$, meaning pressure is directly proportional to *absolute* temperature. This proportionality only holds on the kelvin scale, where 0 K corresponds to zero pressure (theoretical).\n- Step 2: If you use °C, a gas at 0 °C still has significant pressure, so $$p$$ is not proportional to $$\\theta$$. A gas at 100 °C does not have $$\\frac{373}{273} \\approx 1.37$$ times the pressure of a gas at 0 °C if you wrongly use the Celsius values directly.\n- Step 3: Always convert: $$T/\\text{K} = \\theta/\\text{°C} + 273$$. For *changes* in temperature, $$\\Delta T = \\Delta\\theta$$ (the interval is the same), but for *ratios* in gas laws, you must use kelvin.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "State the ideal gas equation $$pV = NkT$$ and identify each symbol, its meaning, and SI unit. What is the Boltzmann constant $$k$$, and what is its value? (2 steps)", "answer": "- Step 1: $$pV = NkT$$ where $$p$$ = pressure (Pa), $$V$$ = volume (m³), $$N$$ = number of molecules (dimensionless), $$k$$ = Boltzmann constant ($$1.38 \\times 10^{-23}$$ J/K), $$T$$ = absolute temperature (K).\n- Step 2: The Boltzmann constant $$k = \\frac{R}{N_A}$$ (molar gas constant divided by Avogadro's number). It bridges the microscopic (per-molecule) and macroscopic (per-mole) scales. Its small value reflects that each molecule gains only a tiny amount of kinetic energy per kelvin.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "State Boyle's law and the conditions under which it holds. If a gas at 100 kPa occupies 4.0 m³, what pressure does it exert if compressed to 2.0 m³ at the same temperature? (3 steps)", "answer": "- Step 1: Boyle's law: for a **fixed mass** of gas at **constant temperature**, pressure is inversely proportional to volume: $$p \\propto \\frac{1}{V}$$, or $$p_1 V_1 = p_2 V_2$$.\n- Step 2: Conditions: fixed mass, constant temperature. If either changes, Boyle's law does not apply.\n- Step 3: $$p_2 = \\frac{p_1 V_1}{V_2} = \\frac{100 \\times 4.0}{2.0} = 200$$ kPa. Halving the volume doubles the pressure.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "The mean molecular kinetic energy of an ideal gas is given by $$\\frac{1}{2}m\\langle c^2 \\rangle = \\frac{3}{2}kT$$. Explain what each symbol means and what this equation tells us about the relationship between temperature and molecular speed. (3 steps)", "answer": "- Step 1: $$\\frac{1}{2}m\\langle c^2 \\rangle$$ is the average random kinetic energy of one molecule (m = mass of one molecule, $$\\langle c^2 \\rangle$$ = mean square speed). $$k$$ = Boltzmann constant, $$T$$ = absolute temperature in K.\n- Step 2: This tells us that the average kinetic energy of gas molecules is **proportional to absolute temperature**: $$E_k \\propto T$$. Double the kelvin temperature → double the average KE.\n- Step 3: At 0 K, the average KE would be zero (particles at minimum motion). Also, since $$E_k \\propto T$$ and $$E_k \\propto \\langle c^2 \\rangle$$, the root-mean-square speed scales as $$c_{\\text{rms}} \\propto \\sqrt{T}$$. Heating a gas makes molecules faster, but only as the square root of the temperature ratio.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": false}, {"question": "A gas molecule has mass $$5.3 \\times 10^{-26}$$ kg. At room temperature (≈ 300 K), roughly what is its average kinetic energy? No calculator needed — estimate the order of magnitude. (2 steps)", "answer": "- Step 1: Use $$\\frac{1}{2}m\\langle c^2 \\rangle = \\frac{3}{2}kT$$. Plug in $$k \\approx 1.4 \\times 10^{-23}$$ J/K and $$T \\approx 300$$ K.\n- Step 2: $$\\frac{3}{2} \\times 1.4 \\times 10^{-23} \\times 300 \\approx \\frac{3}{2} \\times 4.2 \\times 10^{-21} \\approx 6.3 \\times 10^{-21}$$ J. So the average KE per molecule is roughly $$6 \\times 10^{-21}$$ J — an incredibly small number per molecule, but enormous in total because there are ~$$10^{25}$$ molecules in a mole.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": true}, {"question": "The Sahara-to-Paris heatwave involves all three heat-transfer mechanisms. For each mechanism, give one step in the process: how does infrared from the Sun eventually make Paris feel hot? (3 steps)", "answer": "- Step 1: **Radiation**: The Sun emits infrared radiation which travels through the vacuum of space and heats the Sahara ground.\n- Step 2: **Conduction**: The hot ground conducts energy to the air just above it (particle vibrations pass from ground to air molecules in contact).\n- Step 3: **Convection**: The heated air becomes less dense, rises, and is transported toward Paris by large-scale convection currents. Locally, infrared also heats streets and buildings, which then reheat the nearby air by conduction. It is a combination of *all three* mechanisms — never force a single mechanism when a real scenario combines them.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "Why does an expanded polystyrene cup work well for measuring the SHC of a liquid? Give two distinct advantages. (2 steps)", "answer": "- Step 1: It has very little mass, so it absorbs very little energy itself — minimising the correction needed for the container's heat capacity.\n- Step 2: It is a very good insulator, so it minimises energy transfer from the liquid to the surroundings, reducing the main experimental error (energy loss).", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": false}, {"question": "In the aluminium-block SHC experiment, why is a small amount of oil placed in the holes before inserting the heater and thermometer? (1 step)", "answer": "- Step 1: The oil fills air gaps between the heater/thermometer and the aluminium, ensuring **good thermal contact**. Air is a poor conductor, so without oil, energy would transfer inefficiently from heater to block and from block to thermometer, giving inaccurate temperature readings and energy transfer.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": true}, {"question": "After switching off the heater in the aluminium-block experiment, the temperature continues to rise for a short time before falling. Explain why. (2 steps)", "answer": "- Step 1: It takes finite time for energy to conduct from the heater, through the block, to the thermometer. The thermometer lags behind the actual block temperature.\n- Step 2: Even after the heater is off, residual energy still in the heater and nearby aluminium continues to spread outward, so the thermometer reading briefly rises before the block begins to cool.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": false}, {"question": "Define \"internal energy\" and distinguish it from \"temperature.\" Can two objects have the same temperature but different internal energies? (3 steps)", "answer": "- Step 1: Internal energy is the sum of the random **kinetic** energies (vibration/motion) and **potential** energies (intermolecular bonds) of all the particles in a body.\n- Step 2: Temperature is a measure of the **average random kinetic energy** per particle — it does not account for potential energy or the total number of particles.\n- Step 3: Yes — a swimming pool and a cup of tea can both be at 80 °C (same average KE per molecule), but the pool has far more internal energy
