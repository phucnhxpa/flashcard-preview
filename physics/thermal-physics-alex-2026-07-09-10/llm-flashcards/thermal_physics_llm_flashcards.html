art: **emit = give off**; **absorb = take in**; **reflect = bounce back incoming radiation**. Confusing \"emit\" with \"reflect\" is the classic error — they are not synonyms. The exam expects you to pick the right verb for the right situation (e.g., \"the shiny foil reflects the infrared back into the room\" is correct; \"the shiny foil emits more\" is not).\n\nTakeaway: black = best at *both* emission and absorption; shiny = best at reflection and therefore worst at the other two. Three verbs, three distinct meanings.", "source": "MiniMax M3 ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "Walk through the five-step greenhouse argument as taught on the board, and identify the one physics tightening needed to make it exam-watertight. (3 steps)", "answer": "- Step 1: **The Sun emits mostly short-wavelength radiation** (visible and near-infrared) which travels through space and reaches Earth. Earth's surface absorbs it and warms up.\n- Step 2: **Earth re-emits radiation at a longer wavelength** (longer-wavelength infrared) than what it absorbed, because it is much cooler than the Sun's surface. This outgoing infrared is what the atmosphere interacts with.\n- Step 3: **Greenhouse gases (CO₂, water vapour, methane) absorb and re-radiate this outgoing long-wavelength infrared**, reducing the rate at which energy escapes to space. The Earth-sun system then settles at a *higher* equilibrium temperature. The exam-watertight tightening is to say \"longer wavelength\" explicitly — the crux is the wavelength change, not vague \"trapping.\"\n\nTakeaway: in → short wavelength absorbed by ground. Out → long-wavelength IR absorbed by CO₂. Say \"longer wavelength\" — never just \"the radiation is trapped.\"", "source": "MiniMax M3 ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "Give the ordered particle chain by which conduction works in a solid, and state what extra mechanism makes metals the best conductors. (3 steps)", "answer": "- Step 1: All particles in a solid vibrate about fixed positions all the time. In the hotter region they vibrate with greater amplitude (more energy).\n- Step 2: They bump into and pass these vibrations on to *neighbouring* particles, which in turn pass them on to theirs, and so on down to the cooler end. Energy travels through the solid, but the particles themselves do not move position.\n- Step 3: In **metals**, the lattice also contains **free (delocalised) electrons**. These electrons are knocked by vibrating atoms, travel rapidly through the lattice, and collide with atoms further along, transferring energy *much faster* than vibration-passing alone. The same free electrons also make metals good electrical conductors.\n\nTakeaway: all solids → vibration passing. Metals add → free electrons zooming through the lattice. The two mechanisms together explain why metals dominate both thermal and electrical conduction.", "source": "MiniMax M3 ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "A thermal conductor and a thermal insulator are both at 21 °C in the same room. Identical ice cubes are placed on each. The ice on the conductor melts in about 12 seconds; the ice on the insulator barely melts. Phuc's first answer was \"the conductor must be hotter.\" Why is this wrong, and what is the correct explanation? (3 steps)", "answer": "- Step 1: Both blocks are at the same temperature (21 °C). Temperature is not the difference — the *rate* of energy transfer at that temperature is.\n- Step 2: A good conductor transfers vibrational energy (and free-electron energy, if metal) from the block to the ice much faster than the insulator does. The block supplies energy to the ice by contact, so the ice melts quickly even though the block itself isn't hotter.\n- Step 3: The insulator has weaker coupling between particles and/or fewer particles (e.g., trapped air, foam) and so delivers energy to the ice at a much lower rate. The temperature is the same; the conductivity is the difference.\n\nTakeaway: same temperature, different *rates*. Conduction experiments test conductivity, not temperature.", "source": "MiniMax M3 ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "What makes \"strong chemical bonds\" the wrong answer when asked \"what makes the best insulator\"? (2 steps)", "answer": "- Step 1: Strong bonds *transmit* vibrations well — they couple neighbouring particles tightly, which is exactly what you do *not* want in an insulator. Strong bonds help conduction, not hinder it.\n- Step 2: The best insulator has the *opposite*: **fewer particles** (so there are fewer to vibrate and pass energy on) and **immobilised** ones (so convection cannot occur). That is why trapped air and a vacuum are the best insulators.\n\nTakeaway: bonding is a coupling. Strong coupling = good conductor. Loose coupling / few particles = good insulator.", "source": "MiniMax M3 ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "Give the full ordered particle chain for why heated air rises in convection. (2 steps)", "answer": "- Step 1: Heated region of fluid — particles gain energy → move faster → spread apart (more space between them) → that region becomes *less dense* → it *rises* (buoyancy).\n- Step 2: The displaced cooler fluid has particles moving less, packed closer, so it is *more dense* and *sinks* to replace the risen fluid. The resulting circulation is a *convection current*. Cooling air doesn't need to condense to sink — a gas can simply become denser and descend while remaining a gas.\n\nTakeaway: gain energy → faster → spread → less dense → rise. The reverse for sinking. This is the chain examiners want, in this order.", "source": "MiniMax M3 ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "A draught of cold air flows under a door into a warm room. Phuc answered \"this is conduction.\" What is the right answer, and how can you tell from the description? (2 steps)", "answer": "- Step 1: A draught is the bulk movement of a fluid (air) replacing another volume of fluid. Whole volumes of warm and cold air are flowing past one another. That is the textbook definition of **convection**, not conduction.\n- Step 2: The diagnostic clue is \"moving/replacing air\" — if you see air itself flowing, it is convection. Conduction would require the air to stay still and pass energy by particle collision, which is a much slower process than bulk flow.\n\nTakeaway: moving fluid → convection. Stationary solid or thin trapped gas → conduction.", "source": "MiniMax M3 ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "Explain the daytime sea breeze as a complete convection argument. (3 steps)", "answer": "- Step 1: The Sun's infrared heats both the land and the sea, but the land warms *much faster* than the water (lower specific heat capacity and shallower thermal mass).\n- Step 2: The air just above the hot land is itself heated by conduction from the ground; its particles move faster, spread out, become less dense, and *rise* as a thermal.\n- Step 3: Cooler, denser air over the sea flows in along the surface to replace the risen air — that is the *sea breeze*, a textbook convection current. The circulation closes high in the atmosphere where the rising air spreads and sinks again.\n\nTakeaway: land heats faster → air above land rises → cool sea air flows in at the surface = sea breeze. Convection chains in real life look like this.", "source": "MiniMax M3 ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "List the major features of house insulation and identify which of the three heat-transfer mechanisms each one suppresses. (3 steps)", "answer": "- Step 1: **Loft insulation / cavity-wall insulation / double or triple glazing** all trap air in small pockets. The trapped air has very few particles (poor conduction) *and* the pockets are too small for the air to circulate (no convection). These features suppress **conduction** and **convection**.\n- Step 2: **Curtains and blinds** trap a layer of still air next to the window, again suppressing **conduction** (and any minor **convection**).\n- Step 3: **Draught excluders** block the bulk flow of air under doors, suppressing **convection**. **Silver / foil reflective layers** (e.g., behind a radiator) reflect infrared back into the room, suppressing **radiation**.\n\nTakeaway: trapped air defeats conduction + convection; shiny foil defeats radiation. Two families, two targets.", "source": "MiniMax M3 ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "Why does trapped air defeat *both* conduction and convection at the same time, even though it is one material? (2 steps)", "answer": "- Step 1: Air is a poor *conductor* because it has very few particles per unit volume — there are simply not many particles to vibrate and pass energy on. The thicker and more divided the air pockets, the less conduction occurs.\n- Step 2: When the air is *trapped* in small pockets (between fibres, between glass panes, in foam cells), it cannot form a continuous bulk flow. So the circulation needed for *convection* is physically blocked — there is no path for a whole parcel of air to rise and be replaced.\n\nTakeaway: one material, two jobs. Few particles = bad at conduction. Immobilised pockets = bad at convection.", "source": "MiniMax M3 ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "Define specific heat capacity, write the equation, and explain the meaning of each symbol and its unit. (3 steps)", "answer": "- Step 1: **Definition**: the energy needed to raise the temperature of 1 kg of a substance by 1 K (equivalently 1 °C, since the interval is identical on both scales).\n- Step 2: **Equation**: $$\\Delta E = m c \\Delta \\theta$$ where $$\\Delta E = m c \\Delta T$$ is the same form with the temperature in kelvin.\n- Step 3: **Symbols and units**: $$\\Delta E$$ in J (energy transferred), $$m$$ in kg (mass — convert grams!), $$c$$ in $$\\text{J kg}^{-1}\\text{ K}^{-1}$$ (specific heat capacity; always given in the exam), $$\\Delta \\theta$$ in K or °C (the temperature *change*, not an absolute value). Because a 1 K interval = 1 °C interval, $$\\Delta \\theta$$ can be in either unit.\n\nTakeaway: per kg, per K, measured in J. Memorise the unit; the value of c is always supplied in the exam.", "source": "MiniMax M3 ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "In the aluminium-block experiment, the measured c always comes out *too large*. Name the main sources of error and explain why each pushes c upward rather than downward. (3 steps)", "answer": "- Step 1: The calculation uses $$c = \\frac{IV\\Delta t}{m \\Delta \\theta}$$. The numerator is *all* the electrical energy supplied; the denominator is the temperature rise of the block.\n- Step 2: The block gets *less* energy than the numerator counts because (i) some is absorbed by the heater itself (the dominant error), (ii) some leaks to the surroundings despite the lagging, and (iii) a little is taken by the lagging and the thermometer. The actual temperature rise $$\\Delta \\theta$$ therefore corresponds to less energy than $$IV\\Delta t$$.\n- Step 3: With the denominator too small for the numerator, the ratio $$c = \\frac{IV\\Delta t}{m \\Delta \\theta}$$ comes out *too large*. Meter/thermometer inaccuracy can go either way but is small. The systematic direction is \"too large\" because the energy losses all steal from the block.\n\nTakeaway: the value of c is too large because the block gets less energy than you counted. Three energy-stealers; one direction.", "source": "MiniMax M3 ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "A 0.5 kg copper block with c = 3850 J/(kg K) is heated by 3 K. Which equation do you start from, what does it give, and what is the only common slip to avoid? (2 steps)", "answer": "- Step 1: Start from $$\\Delta E = mc\\Delta \\theta$$ and substitute base units: $$\\Delta E = 0.5 \\times 3850 \\times 3 = 5775 \\text{ J}$$.\n- Step 2: The only common slip is dropping a zero in c (writing 385 instead of 3850) — copy the value exactly from the question, and write the *target* symbol (ΔE), not a temperature (θ). Use a clean layout: equation → rearrangement → substitution → answer.\n\nTakeaway: layout first, then substitute, then re-key the arithmetic. Check the SHC value for missing digits.", "source": "MiniMax M3 ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "An avocado of mass 0.215 kg needs 1294 J of energy to cool by 2 K. Find its specific heat capacity. Why did the board's circled answer of 2500 J/(kg K) come out wrong? (3 steps)", "answer": "- Step 1: Rearrange $$\\Delta E = mc\\Delta \\theta$$ to $$c = \\frac{\\Delta E}{m \\Delta \\theta}$$.\n- Step 2: Substitute: $$c = \\frac{1294}{0.215 \\times 2} = \\frac{1294}{0.43} = 3009 \\text{ J/(kg K)}$$.\n- Step 3: The board's \"2500\" is wrong because it came from a *separate* spoken aside (\"1300 ÷ 0.5\") that was mis-stated (1300 ÷ 0.5 is actually 2600) and then incorrectly reattached to the printed question. Using the printed numbers gives 3009. Always re-key the division — a neatly circled answer can still be arithmetically wrong.\n\nTakeaway: trust the printed values, not a spoken aside. 1294 ÷ 0.43 = 3009, not 2500.", "source": "MiniMax M3 ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "Using c = 3009 J/(kg K) for the avocado, find the temperature change when 3000 J is added to a 0.215 kg avocado. (2 steps)", "answer": "- Step 1: Rearrange $$\\Delta E = mc\\Delta \\theta$$ to $$\\Delta \\theta = \\frac{\\Delta E}{mc}$$.\n- Step 2: Substitute: $$\\Delta \\theta = \\frac{3000}{0.215 \\times 3009} = \\frac{3000}{646.9} \\approx 4.6 \\text{ K}$$. (If you mistakenly used the wrong c = 2500, you would get 5.58 K — another reason to fix Q3 first.)\n\nTakeaway: chain values across parts of the same question. A wrong c propagates; a right c gives a clean ~4.6 K.", "source": "MiniMax M3 ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "Define specific latent heat and explain, in terms of particle energy, why temperature is constant during a change of state. (3 steps)", "answer": "- Step 1: **Definition**: the energy required to change the state of 1 kg of a substance with *no* change in temperature. Symbol L, unit J/kg. **Fusion** = solid ↔ liquid; **vaporisation** = liquid ↔ gas.\n- Step 2: During a change of state, the supplied energy goes into the *potential* energy of the molecules — into breaking or loosening the inter-molecular bonds — *not* into their kinetic energy.\n- Step 3: Because temperature is a measure of the *mean random kinetic energy* of the molecules, and the kinetic energy is not changing on a state-change plateau, the temperature stays constant while energy is being absorbed. The energy is \"hidden\" — that is the literal meaning of *latent*.\n\nTakeaway: latent heat is \"hidden\" because it goes into potential energy, not kinetic. Temperature is a kinetic-energy measure, so the temperature reading does not change.", "source": "MiniMax M3 ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "Sketch and label the heating curve for water from ice to steam, and identify which equation governs each part. (3 steps)", "answer": "- Step 1: Three sloped sections (solid ice warming, liquid water warming, steam warming) and two flat plateaus (melting, boiling). Time/energy on x-axis; temperature on y-axis.\n- Step 2: The sloped sections obey $$\\Delta E = mc\\Delta \\theta$$ — temperature rising within a single state. The flat plateaus obey $$\\Delta E = L\\Delta m$$ — state changing at constant temperature.\n- Step 3: The boiling plateau is *much longer* than the melting plateau because $$L_v = 2.26 \\times 10^6 \\text{ J/kg} \\gg L_f = 3.34 \\times 10^5 \\text{ J/kg}$$. Vaporisation needs roughly seven times more energy than fusion because boiling must fully separate the molecules, while melting only lets them slide past each other.\n\nTakeaway: slopes = c (kinetic energy changing). Plateaus = L (potential energy changing, breaking bonds). Length of plateau scales with L.", "source": "MiniMax M3 ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "A fixed mass of gas in a rigid sealed container is heated. State the pressure law and explain it in particle terms. (3 steps)", "answer": "- Step 1: **Pressure law** (constant V): $$\\frac{p_1}{T_1} = \\frac{p_2}{T_2}$$ with T in **kelvin**, not Celsius. p is proportional to T.\n- Step 2: Particle picture: heating increases the mean random kinetic energy of the molecules. They move faster, so they hit the walls *more frequently* and *harder* (greater momentum change per collision).\n- Step 3: Both effects raise the total force on the wall; with area fixed, $$p = F/A$$ rises. The volume cannot change (rigid container), so the pressure must rise. Always convert Celsius to kelvin before applying the law.\n\nTakeaway: $$p \\propto T$$ at fixed V, T in K. Mechanism is faster → more frequent, harder collisions → bigger force → bigger p.", "source": "MiniMax M3 ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "Why is \"absolute zero\" the *theoretical* limit of temperature, and what physical quantity is supposed to vanish at that point? (2 steps)", "answer": "- Step 1: Absolute zero (0 K, ≈ −273 °C) is the temperature at which, in the idealised classical model, the mean random kinetic energy of the molecules would be zero — the particles would have the minimum possible motion.\n- Step 2: Because kinetic energy cannot be negative, no temperature lower than 0 K is possible. In practice, quantum mechanics forbids ever removing the last bit of energy (zero-point energy), so 0 K is *theoretical* — extremely close, but never actually reached. So 0 K is the lower limit by definition, but unreachable in reality.\n\nTakeaway: 0 K is \"no random kinetic energy\" in the idealised model. It's a limit, not a destination.", "source": "MiniMax M3 ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "State the ideal gas equation and the kinetic-theory link to temperature, and explain what each symbol means. (3 steps)", "answer": "- Step 1: **Ideal gas equation**: $$pV = NkT$$ where p is pressure (Pa), V is volume (m³), N is the *number of molecules*, k is the Boltzmann constant ($$1.38 \\times 10^{-23} \\text{ J/K}$$), and T is the absolute temperature (K).\n- Step 2: **Kinetic-theory link**: $$\\frac{1}{2} m \\langle c^2 \\rangle = \\frac{3}{2} kT$$ where m is the mass of one molecule, $$\\langle c^2 \\rangle$$ is the **mean square speed** of the molecules (average of the squares of their speeds), and the left-hand side is the **average random kinetic energy** of one molecule.\n- Step 3: Because k is a constant, the mean molecular kinetic energy is **directly proportional** to absolute temperature. At 0 K this energy would (classically) be zero.\n\nTakeaway: $$\\frac{1}{2}m\\langle c^2\\rangle = \\frac{3}{2}kT$$ is the \"average KE = three-halves kT\" equation. The \"rms\" speed is the square root of the mean of the squares of the speeds.", "source": "MiniMax M3 ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "A computer that uses liquid cooling on Earth is moved into the vacuum of space. Does \"cold space\" cool it automatically? Design a cooling solution using first principles. (4 steps)", "answer": "- Step 1: No. In vacuum there are essentially *no particles*. So there can be no conduction (nothing to pass vibrations to) and no convection (no fluid to circulate). The only remaining pathway is **radiation** — infrared emission to space.\n- Step 2: So the machine can only lose heat by *radiating* infrared. If it generates heat internally, it will *not* be cooled by \"cold\" space — it will heat up until its own radiation output equals its internal heat generation (thermal equilibrium).\n- Step 3: The engineering solution is to conduct the internal heat to a large, **matte-black** **radiator** panel — black is the best emitter, and a large area gives a high emission rate — so it can shed internal heat to deep space.\n- Step 4: To avoid *gaining* heat from the Sun, add a **shiny/reflective silver layer** on the Sun-facing side. Silver is the best reflector of infrared; it bounces the incoming solar radiation back rather than absorbing it. The radiator must be large enough to emit *both* the internal heat and any absorbed solar input.\n\nTakeaway: vacuum = radiation only. Cool by emitting (large black panel) and by not absorbing (silver reflector). Cold space doesn't \"suck\" heat — only photons carry energy across a vacuum.", "source": "MiniMax M3 ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "A textbook heating curve shows three sloped sections and two flat plateaus. State the equations that govern the sloped sections and the plateaus, and explain physically why the vaporisation plateau is much longer than the melting plateau. (3 steps)", "answer": "- Step 1: Sloped sections (single state, temperature changing) → $$\\Delta E = mc\\Delta \\theta$$.\n- Step 2: Flat plateaus (state change, temperature constant) → $$\\Delta E = L\\Delta m$$, with L = $$L_f$$ at melting and L = $$L_v$$ at vaporisation.\n- Step 3: The vaporisation plateau is much longer because $$L_v \\gg L_f$$ (≈ 2.26 MJ/kg vs ≈ 0.334 MJ/kg for water — about seven times more). Boiling must fully separate the molecules so there are *no* inter-molecular forces left, while melting only lets molecules slide past each other — so vaporisation needs much more energy per kilogram.\n\nTakeaway: c governs slopes; L governs plateaus. Boiling = break *all* bonds; melting = loosen *some*. That's why $$L_v$$ is ~7× larger.", "source": "MiniMax M3 ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "\"All objects emit and absorb infrared all the time.\" Under what single condition would an object emit no infrared, and why is this case effectively unreachable in practice? (2 steps)", "answer": "- Step 1: The only condition under which an object would emit no infrared is at **0 K (absolute zero)** — the temperature at which, in the classical model, the molecules have no random kinetic energy to convert into emitted photons.\n- Step 2: In practice, 0 K is unreachable: quantum mechanics forbids removing the last bit of zero-point energy. So essentially *every* object, no matter how cold, emits some infrared. This is why thermal cameras can \"see\" cold objects (though they look dim).\n\nTakeaway: \"always emits\" is the practical rule. The 0 K exception is theoretical only.", "source": "MiniMax M3 ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "Compare and contrast thermal (infrared) conduction and electrical conduction in metals. What is the link between a good thermal conductor and a good electrical conductor? (3 steps)", "answer": "- Step 1: Both use the *same* free (delocalised) electrons. In **electrical** conduction, a potential difference makes the free electrons *drift* in an organised direction through the metal.\n- Step 2: In **thermal** conduction, the lattice vibrations and the random motion of the free electrons together carry kinetic energy from the hot region to the cold region. The electron motion in thermal conduction is largely *random*, not directed.\n- Step 3: The link: a metal with many free electrons conducts *both* heat and electricity well — that's why copper is used in heating elements, saucepans, and wiring alike. Good electrical conductors are almost always good thermal conductors for the same reason.\n\nTakeaway: shared mechanism (free electrons), different driver (voltage vs temperature difference). \"Good conductor\" usually means both.", "source": "MiniMax M3 ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "Sketch the cooling curves of a black and a shiny can of water starting at the same temperature. How would you identify which is the better emitter from the graph alone? (2 steps)", "answer": "- Step 1: Both curves start at the same temperature and decay asymptotically toward room temperature. The black can's curve has a *steeper* initial negative slope and falls faster.\n- Step 2: A steeper negative slope means the can is losing thermal energy faster — by definition, a better emitter of infrared. So the curve with the bigger magnitude of slope (the black one) is the better emitter. The curves level off as both cans approach thermal equilibrium with the room.\n\nTakeaway: slope of cooling curve = emission rate. Steeper down = more energy out per second = better emitter.", "source": "MiniMax M3 ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "When Alex asked \"which mechanism transfers heat from a hot machine in cold space?\" Phuc tried to find a single answer. What is wrong with forcing a single mechanism in a real scenario like the Sahara-to-Paris heatwave? (2 steps)", "answer": "- Step 1: The real scenario uses *all three* mechanisms in sequence, not one. The hot Sahara ground heats the air just above it by **conduction** (particle vibrations). The warmed air rises and is carried toward Paris by **convection** (bulk fluid flow). Locally, the Sun's **infrared radiation** heats the streets and the Eiffel Tower, which then reheat the air by conduction.\n- Step 2: Forcing an \"either/or\" answer misses the point — most real heat-transfer situations are a chain of mechanisms, each handling a different step. The exam-style discipline is: name the mechanism at *each* step of the chain, not just one for the whole story.\n\nTakeaway: real scenes combine all three. Trace the chain, mechanism by mechanism, step by step.", "source": "MiniMax M3 ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "The textbook says \"the temperature of a body can be defined in terms of the kinetic energy of its vibrating atoms.\" How does this connect temperature to absolute zero? (2 steps)", "answer": "- Step 1: Temperature is a measure of the *mean random kinetic energy* of the particles. As you cool a body, the average kinetic energy decreases, approaching a lower limit.\n- Step 2: That lower limit, where the mean random kinetic energy is at its minimum, is **0 K** (absolute zero). The kelvin scale is set so that this minimum is zero, making temperature directly proportional to mean kinetic energy: $$E_k \\propto T$$.\n\nTakeaway: temperature ↔ mean kinetic energy. Set the floor at 0 K and the scale becomes proportional.", "source": "MiniMax M3 ②", "_id": "minimax_2_38", "judge_pick": false}, {"question": "For the SHC practical with a 1.00 kg aluminium block, a 3-minute heating at 1.65 A and 9.59 V, with $$\\theta_i = 25.5 \\text{ °C}$$ and $$\\theta_f = 37.0 \\text{ °C}$$, give the equation and the result for c. Why is this value still likely to be too large? (2 steps)", "answer": "- Step 1: Use $$c = \\frac{IV\\Delta t}{m(\\theta_f - \\theta_i)}$$. Convert 3 min to 180 s: $$IV\\Delta t = 1.65 \\times 9.59 \\times 180 \\approx 2847 \\text{ J}$$. Then $$c = \\frac{2847}{1.00 \\times 11.5} \\approx 990 \\text{ J/(kg K)}$$.\n- Step 2: The value is likely *too large* because of the same three energy losses as in the standard practical: the heater itself absorbs energy (main), some is lost to the surroundings despite the lagging, and a little is taken by the thermometer. The block receives less energy than $$IV\\Delta t$$ records, so the calculated c is overestimated.\n\nTakeaway: ~990 J/(kg K) for aluminium is too high; the accepted value is ~900 J/(kg K) once the heater's own heat capacity is subtracted.", "source": "MiniMax M3 ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "Why is 1 K identical to 1 °C for *temperature intervals* even though the two scales have different zero points? (2 steps)", "answer": "- Step 1: The kelvin and Celsius scales are *offset* by 273.15 (0 °C = 273.15 K), but the *size* of one degree is defined to be the same on both.\n- Step 2: So an *interval* (a difference of two readings) is numerically identical in K and °C. A rise from 20 °C to 30 °C is $$\\Delta \\theta = 10 \\text{ °C} = 10 \\text{ K}$$. That is why $$\\Delta \\theta$$ in $$\\Delta E = mc\\Delta \\theta$$ can be quoted in either unit — the *size* of the change is the same.\n\nTakeaway: different zeros, same-sized degree. Intervals are interchangeable; absolute values are not.", "source": "MiniMax M3 ②", "_id": "minimax_2_40", "judge_pick": false}, {"question": "A black surface is the best emitter and absorber; a shiny surface is the best reflector. A student asks, \"Then how can a shiny foil behind a radiator *help* heating — if it reflects, doesn't it send heat back to the wall?\" Explain the trick. (2 steps)", "answer": "- Step 1: The foil's role is to reflect the radiator's *own* infrared back into the room, not to send it into the wall. The shiny surface bounces the radiation away from the wall and back toward the people, where it can be absorbed (people are good absorbers) and warm them.\n- Step 2: The foil is also a *poor* emitter, so it does not lose significant heat by radiating itself into the wall. The net effect is more infrared into the room, less into the wall. Reflection here is *useful* precisely because the shiny surface is also a poor emitter.\n\nTakeaway: best reflector = worst emitter. The foil's \"bad\" emitting side is what makes its \"good\" reflecting side actually save energy.", "source": "MiniMax M3 ②", "_id": "minimax_2_41", "judge_pick": true}, {"question": "A machine in deep space must shed both internal heat (e.g. 500 W) and the solar radiation it absorbs (e.g. 1000 W/m² on its panels). Sketch in words the engineering solution Alex and Phuc converged on. (3 steps)", "answer": "- Step 1: First, *minimise absorption*: cover the Sun-facing side with a **shiny/silver reflective layer** so the 1000 W/m² is bounced back to space instead of heating the machine.\n- Step 2: Then, *maximise emission*: pipe the internal heat (500 W) out to a large **matte-black radiator panel** (good emitter, large area). It sheds heat by infrared to the cold of space.\n- Step 3: Size the radiator so its total emitted power equals the sum of internal heat plus any residual absorbed solar input. Equilibrium temperature then settles where emission rate = total input rate. This is the same logic as the cooling curve, but with a designed-in steady state.\n\nTakeaway: reflect what you don't want, emit what you do. Black panel = out, silver layer = away.", "source": "MiniMax M3 ②", "_id": "minimax_2_42", "judge_pick": false}, {"question": "In the free-electron picture, why does a metal conduct heat \"much faster\" than a non-metal, and why does adding the same surface finish to a metal and to a wooden block make a much bigger difference in emission for the metal? (2 steps)", "answer": "- Step 1: Free electrons travel through the metal lattice at very high speed, carrying kinetic energy from a hot region to a cold region in a tiny fraction of the time it would take lattice vibrations alone (as in a non-metal). That is why metals conduct heat so well — the electron \"shuttle\" is much faster than vibration passing.\n- Step 2: Emission rate depends on *surface* properties, not on free electrons. A polished wooden block and a polished metal block are both poor emitters compared to their rough/matt versions. The \"big difference\" between the metal and the wood is conduction, not emission — the metal delivers its internal heat to the surface much faster, so the surface has more energy to radiate and cools more visibly.\n\nTakeaway: free electrons = fast conduction (and that's why metals dominate). Emission is about surface finish; it is independent of what is inside.", "source": "MiniMax M3 ②", "_id": "minimax_2_43", "judge_pick": false}, {"question": "\"Heat\" and \"temperature\" are two words used loosely in everyday English. State the precise physics meaning of each. (2 steps)", "answer": "- Step 1: **Temperature** is a measure of the *mean random kinetic energy* of the particles of a body. It is a property of one body. Its SI unit is the kelvin (K).\n- Step 2: **Heat** is not a property of a body — it is the *process* of energy transfer because of a temperature difference. The more correct term is **heating** (a process) for the transfer, and **internal/thermal energy** (a property, in joules) for what a body *has*. Energy always flows from a higher temperature to a lower one.\n\nTakeaway: temperature is a state (a measure of kinetic energy); heat is a process (energy moving because of a temperature difference).", "source": "MiniMax M3 ②", "_id": "minimax_2_44", "judge_pick": false}, {"question": "A solid is heated. Why does the temperature keep rising while the *kinetic* energy of the molecules rises, but the temperature stops rising during melting even though the molecules are still absorbing energy? (2 steps)", "answer": "- Step 1: In the sloped section, absorbed energy goes into the *kinetic* energy of the vibrating/rotating/translating molecules. Since temperature is a measure of mean kinetic energy, the temperature reading rises.\n- Step 2: At the melting plateau, the absorbed energy goes into the *potential* energy of the inter-molecular bonds — energy is needed to break/loosen the lattice so molecules can flow past one another. The mean *kinetic* energy does not change, so the temperature reading is constant. The energy is \"latent\" because it is hidden in the bonds, not in the temperature.\n\nTakeaway: kinetic energy changes → temperature changes. Potential energy changes (during state change) → temperature stays the same.", "source": "MiniMax M3 ②", "_id": "minimax_2_45", "judge_pick": false}, {"question": "A student writes: \"The pressure of a gas increased because the gas was heated, so the molecules moved faster and exerted a bigger force on the walls.\" State the *additional* piece of information the marking scheme would want to see for full marks. (2 steps)", "answer": "- Step 1: The scheme wants the *mechanism* spelled out, not just the outcome. Two missing points: (a) the *frequency* of collisions also increases (faster molecules hit the walls more often, not just harder), and (b) the area of the walls is constant, so a bigger total force means a bigger pressure by $$p = F/A$$.\n- Step 2: So the complete chain is: heating → faster molecules → *more frequent* *and* harder collisions → greater total force on the wall → greater pressure (since area is fixed). \"Bigger force\" alone leaves out the *frequency* piece, which is a separate marking point.\n\nTakeaway: in collision chains, \"faster\" implies both *more frequent* and *harder*. Say both.", "source": "MiniMax M3 ②", "_id": "minimax_2_46", "judge_pick": true}, {"question": "Why does the textbook say \"the process of heating is a flow of energy\" rather than \"a flow of heat\"? (2 steps)", "answer": "- Step 1: \"Heat\" sounds like a substance, but it is not. Bodies do not contain \"heat\" — they contain *internal energy*. The correct view: energy is what moves; heating is the process by which it moves.\n- Step 2: This is the post-Rumford/Joule view. Rumford showed (boring cannon barrels) that work can produce \"heat\" indefinitely, so it cannot be a conserved substance. The modern physics language is: heating = energy transfer driven by a temperature difference, regardless of mechanism (conduction, convection, radiation).\n\nTakeaway: heat is a verb (a process of energy flow), not a noun (a substance). The substance is internal energy.", "source": "MiniMax M3 ②", "_id": "minimax_2_47", "judge_pick": false}, {"question": "In the Sahara-to-Paris heatwave story, Alex gave illustrative temperatures: 60 °C leaves the Sahara, cools through 50, 40, and arrives in Paris at 30 °C; local heating then adds about 10 °C to give 40 °C at street level. What is the physics *point* of these numbers — are they measurements? (2 steps)", "answer": "- Step 1: They are *not* measurements and must not be cited as data. They are illustrative numbers that help Phuc visualise the sequence of mechanisms (conduction at the ground, convection aloft, infrared and conduction locally) and the order of magnitude of the temperatures involved.\n- Step 2: The point of the exercise is the *mechanism chain*, not the arithmetic. In an exam you would not quote these numbers; you would say \"hot air rises (convection), is transported, and is reheated locally by infrared and conduction.\" The temperatures are a teaching prop.\n\nTakeaway: don't memorise illustrative numbers; memorise the chain of mechanisms. In the exam, the chain is what scores.", "source": "MiniMax M3 ②", "_id": "minimax_2_48", "judge_pick": true}, {"question": "Why is it physically true that the average speed of air molecules (~480 m/s) is larger than the speed of sound in air (~340 m/s), and is this a useful sanity check? (2 steps)", "answer": "- Step 1: Sound is a *collective* disturbance carried by the air — a pressure wave that propagates by molecules colliding with their neighbours. The disturbance moves slower than the individual molecules do, because each molecule has to pass the disturbance on by collision rather than travel the whole distance.\n- Step 2: This is a useful sanity check on the kinetic-theory model: the predicted r.m.s. speed (~480 m/s) is the right *order of magnitude* above the measured speed of sound (~340 m/s) — about 25% to 40% higher — which matches the expectation from kinetic theory. The closeness of the two numbers is itself evidence that the kinetic-theory assumptions are reasonable.\n\nTakeaway: the rms molecular speed should be similar to, and slightly larger than, the speed of sound. The textbook uses this as a reality check on the kinetic-theory derivation.", "source": "MiniMax M3 ②", "_id": "minimax_2_49", "judge_pick": false}, {"question": "Why is it useful to use an expanded polystyrene cup rather than a glass beaker when measuring the specific heat capacity of a liquid in the lab? (2 steps)", "answer": "- Step 1: The cup has very little *mass* and a very *low* thermal conductivity. So the cup itself absorbs very little energy from the heater, and very little energy leaks out to the surroundings.\n- Step 2: This minimises the two main systematic errors in the SHC practical: the \"energy taken by the container\" and the \"energy lost to the surroundings.\" The measured c is closer to the true value (though still slightly too high for the same residual reasons).\n\nTakeaway: low mass + low conductivity = small systematic error. Polystyrene cups are the standard container for liquid SHC work.", "source": "MiniMax M3 ②", "_id": "minimax_2_50", "judge_pick": false}, {"question": "Alex described a heatwave scenario where the air \"leaves the Sahara at 60 °C and arrives in Paris at 30 °C.\" Why does the temperature drop during transport, and what mechanism is doing the cooling? (2 steps)", "answer": "- Step 1: As the air parcel rises and moves north, it expands into regions of lower pressure (higher altitude has lower atmospheric pressure). Doing work against the surroundings as it expands uses up internal energy.\n- Step 2: That expansion cooling is essentially the *adiabatic* cooling of a rising parcel of gas — its internal energy decreases because work is done on the surroundings, so its temperature falls. The textbook simplification is just \"cools in transit\"; the precise mechanism is work done on expansion, plus mixing with cooler ambient air.\n\nTakeaway: a rising/expanding gas cools because it does work on the surroundings. The parcel's temperature is set by its own internal energy, not by the surface it left.", "source": "MiniMax M3 ②", "_id": "minimax_2_51", "judge_pick": false}, {"question": "Phuc asked, \"Is the hot machine in space cooled automatically by 'cold' space?\" Walk through the *elimination* argument that shows why the answer is \"no.\" (3 steps)", "answer": "- Step 1: List the three mechanisms and check each in vacuum: **conduction** requires particles to pass on vibrations — *none* in vacuum, so impossible. **Convection** requires bulk movement of a fluid — *no* fluid in vacuum, so impossible. Only **radiation** survives.\n- Step 2: Radiation is *not* the same as \"cold.\" Cold space does not actively remove heat by contact; it merely provides a low-background *destination* for emitted infrared. The machine emits; the photons fly away; the machine's internal energy drops.\n- Step 3: So \"cold space\" doesn't cool a machine automatically — it merely *allows* the machine to cool itself by radiation, provided the machine is a good emitter and is not being heated by the Sun. Without those conditions, the machine would overheat.\n\nTakeaway: cold ≠ active coolant. Vacuum just removes conduction and convection from the menu; radiation still requires a good emitter and an absence of incoming solar heating.", "source": "MiniMax M3 ②", "_id": "minimax_2_52", "judge_pick": true}, {"question": "Why are the specific heat capacities of copper (~390), aluminium (~910), and water (4200) J/(kg K) so different, and why does that matter in practice? (2 steps)", "answer": "- Step 1: c depends on how the energy is shared between the kinetic and many internal (rotational, vibrational) modes of the substance. Water has a high c because energy goes into many modes (rotations, hydrogen-bond network) in addition to translation; metals have low c because their free electrons absorb and re-distribute energy efficiently.\n- Step 2: Practical consequences: water's high c makes it excellent for radiators and as a coolant (it stores a lot of energy per degree rise), and slow to heat up and cool down. Metals' low c means they heat up and cool down quickly — useful in saucepans, kettles, heat sinks.\n\nTakeaway: high c = slow to change temperature (water). Low c = quick to change temperature (metals). Pick by application.", "source": "MiniMax M3 ②", "_id": "minimax_2_53", "judge_pick": false}, {"question": "In the heating-curve sketch, why is the steam section drawn with a *gentler* slope than the liquid-water section, even though the same equation $$\\Delta E = mc\\Delta \\theta$$ applies? (2 steps)", "answer": "- Step 1: At constant power input, the same energy per second is delivered to both the liquid and the gas. The slope of temperature vs energy (or time) is $$\\frac{1}{mc}$$ — inversely proportional to c.\n- Step 2: Steam has a *lower* specific heat capacity than liquid water, so the same energy input raises its temperature by more per unit mass. Wait — actually, water (liquid) c = 4200 J/(kg K), steam c ≈ 2000 J/(kg K), so the steam slope is *steeper* on a per-kg basis. The full heating-curve picture combines c, density, and the latent-heat plateaus; the visual \"longer plateau for vaporisation\" is the dominant feature.\n\nTakeaway: c governs the slope of each sloped section. The longer plateau for vaporisation reflects $$L_v \\gg L_f$$, not c.", "source": "MiniMax M3 ②", "_id": "minimax_2_54", "judge_pick": false}, {"question": "A gas molecule of mass m in a cubic box of side l rebounds elastically from one wall with speed component u. Show that the pressure on the wall is $$p = \\frac{m u^2}{l^3}$$ for that single component. (3 steps)", "answer": "- Step 1: Change of momentum per wall collision = $$2mu$$ (it rebounds elastically, so velocity reverses). Time to cross the box and hit the opposite wall = $$l/u$$, so the number of wall hits per second = $$u/l$$. Only half those hits are on the *same* wall, so collisions on one wall per second = $$\\frac{1}{2} \\cdot u/l$$.\n- Step 2: Force = rate of change of momentum = (collisions/s) × (Δp/collision) = $$\\frac{u}{2l} \\cdot 2mu = \\frac{mu^2}{l}$$. (Newton's second law applied to the molecule; the wall receives the equal and opposite reaction force.)\n- Step 3: Pressure = force/area = $$\\frac{mu^2/l}{l^2} = \\frac{mu^2}{l^3} = \\frac{mu^2}{V}$$, where $$V = l^3$$ is the volume. For N molecules averaged over three components, the standard result is $$pV = \\frac{1}{3}Nm\\langle c^2\\rangle$$.\n\nTakeaway: the derivation chains elastic collision → momentum change → rate of momentum change = force → divide by area = pressure. The \"tricky bit\" is the factor of 1/3 from the three independent components.", "source": "MiniMax M3 ②", "_id": "minimax_2_55", "judge_pick": true}, {"question": "In the SHC experiment, the calculation always gives a c that is *too large*. The textbook mentions four sources of error. Which is the *dominant* one and why? (2 steps)", "answer": "- Step 1: The dominant error is **energy absorbed by the heater itself**. The heater coil, its insulation, and its lead-throughs all have thermal mass and absorb energy that does not go into the block.\n- Step 2: Because the energy counted as \"$$IV\\Delta t$$\" includes the heater's share, the block gets less than that, so $$c = \\frac{IV\\Delta t}{m\\Delta \\theta}$$ overestimates. A common fix is to add the heater's mass to the block's mass (assuming a similar c).\n\nTakeaway: heater's own heat capacity is the biggest single error. Add the heater's mass to the block if its material is similar.", "source": "MiniMax M3 ②", "_id": "minimax_2_56", "judge_pick": false}, {"question": "Why does the textbook distinguish \"the order in which you give your keywords\" as a key exam skill for thermal questions? (2 steps)", "answer": "- Step 1: Each mechanism has a *causal* order. Conduction requires you to say: hot region → particles vibrate more → pass on vibrations → neighbouring particles vibrate more → energy travels to cold end. Skipping a step breaks the chain and loses marks.\n- Step 2: Convection requires: heating → particles move faster → spread out → less dense → rise. Radiation requires: hot object → emits infrared → travels through space (no medium) → absorbed by cooler object → warms it. The \"keywords\" are not a list — they are a *sequence* of cause and effect.\n\nTakeaway: thermal answers are graded on causal chains, not keyword salads. Get the order right; the marks follow.", "source": "MiniMax M3 ②", "_id": "minimax_2_57", "judge_pick": false}, {"question": "A student says \"the temperature of a gas increased, so the average kinetic energy of the molecules increased.\" True or false, and why? (2 steps)", "answer": "- Step 1: True. Temperature (in kelvin) is a direct measure of the mean random kinetic energy of the molecules. By definition, $$E_k \\propto T$$.\n- Step 2: Therefore a temperature increase *means* the average kinetic energy has increased. The two statements are the same fact, expressed two different ways.\n\nTakeaway: for an ideal gas, \"temperature rises\" and \"average kinetic energy rises\" are literally the same thing.", "source": "MiniMax M3 ②", "_id": "minimax_2_58", "judge_pick": false}, {"question": "Why does the avoider of thermal contact — for instance, a vacuum flask — work for *all three* mechanisms at once, not just one? (2 steps)", "answer": "- Step 1: The vacuum *gap* removes conduction and convection at the same stroke — no particles to vibrate, no fluid to circulate. A silvered surface on either side of the gap reflects infrared back, removing radiation.\n- Step 2: So a vacuum flask combines: (i) vacuum (no conduction, no convection) + (ii) silvering (poor emission, good reflection of infrared) to attack all three mechanisms simultaneously. That is why a vacuum flask outperforms a simple insulated cup.\n\nTakeaway: the most powerful insulation attacks all three mechanisms at once. Vacuum + silver is the textbook combination.", "source": "MiniMax M3 ②", "_id": "minimax_2_59", "judge_pick": false}, {"question": "\"Hot air rises\" is a useful everyday phrase. In a physics answer, what should replace it, and what is the common error? (2 steps)", "answer": "- Step 1: Replace with the ordered chain: \"the air particles gain kinetic energy, move faster, spread out, become *less dense*, and so *rise* under buoyancy.\" The cause is the *density* change, not the heat.\n- Step 2: Common error: claiming the cooling air \"must condense to liquid\" to sink. A gas does not need to change state to become denser — it just needs its particles to slow down and pack closer. Sinking air stays a gas.\n\nTakeaway: chain, don't claim. Density, not heat, is the agent. Cooling gas does not need to change state.", "source": "MiniMax M3 ②", "_id": "minimax_2_60", "judge_pick": true}, {"question": "Why does the same value of specific heat capacity apply whether you express Δθ in K or in °C? (2 steps)", "answer": "- Step 1: The kelvin and Celsius scales are defined to have the *same* size of degree. A 1 K interval = a 1 °C interval.\n- Step 2: The SHC equation $$\\Delta E = mc\\Delta \\theta$$ depends on the *size* of the temperature change, not on the absolute value on either scale. So 5 K and 5 °C represent the same physical interval, and c can be quoted in either J/(kg K) or J/(kg °C) — the units are interchangeable.\n\nTakeaway: interval size is the same on both scales. The unit label is just a name; the physics is identical.", "source": "MiniMax M3 ②", "_id": "minimax_2_61", "judge_pick": false}, {"question": "A gas in a fixed volume is heated. Using the kinetic-theory link, explain in one sentence why $$p \\propto T$$ in kelvin. (2 steps)", "answer": "- Step 1: From the kinetic theory, the average molecular kinetic energy is $$\\frac{1}{2}m\\langle c^2\\rangle = \\frac{3}{2}kT$$, so the mean square speed (and thus the typical wall-collision momentum and frequency) grows with T.\n- Step 2: Combining with the collision-derived $$pV = \\frac{1}{3}Nm\\langle c^2\\rangle$$, with V and N fixed, gives $$p = \\frac{Nm\\langle c^2\\rangle}{3V} \\propto \\langle c^2\\rangle \\propto T$$. So $$p \\propto T$$ (in kelvin) at constant V.\n\nTakeaway: T → mean KE → mean square speed → collision rate and force → p. Pressure tracks absolute temperature, not Celsius temperature.", "source": "MiniMax M3 ②", "_id": "minimax_2_62", "judge_pick": true}, {"question": "A blackbody (perfect emitter) and a shiny mirror (perfect reflector) are both heated to 1000 K. Which one would an infrared camera \"see\" as brighter, and why? (2 steps)", "answer": "- Step 1: An IR camera measures emitted infrared intensity at the camera's wavelength band. The blackbody is a perfect emitter; the mirror is a near-perfect *reflector* of *incoming* IR, but it is also a poor *emitter* of its own.\n- Step 2: At 1000 K, both objects emit *some* thermal IR by virtue of their temperature, but the blackbody's emission is much greater at every wavelength. The camera sees the blackbody as the brighter source.\n\nTakeaway: reflection is not emission. At equal temperature, a blackbody always out-emits a shiny surface. The camera sees emission, not reflection.", "source": "MiniMax M3 ②", "_id": "minimax_2_63", "judge_pick": false}, {"question": "A student claims \"the Sun warms the Earth because the Earth absorbs infrared.\" Identify the two errors in one of those words. (2 steps)", "answer": "- Step 1: The Sun's emission is not \"infrared\" — it is mostly *visible* light and near-UV, with some near-IR. The peak wavelength is set by the Sun's surface temperature (~5800 K). The Earth absorbs this short-wavelength radiation.\n- Step 2: It is the *Earth* that re-emits the energy as infrared, because the Earth is much cooler (~288 K) and so its peak emission is in the long-wavelength IR. The greenhouse gases trap *this* re-emitted Earth-IR, not the Sun's light.\n\nTakeaway: short-wavelength in (Sun), long-wavelength out (Earth). Say \"the Earth absorbs radiation from the Sun and re-emits infrared\" — never \"absorbs infrared\" in this context.", "source": "MiniMax M3 ②", "_id": "minimax_2_64", "judge_pick": false}, {"question": "A room is heated by a radiator. State the chain of mechanisms by which energy from the hot water inside reaches a person standing in the room. (3 steps)", "answer": "- Step 1: Hot water inside the radiator heats the metal surface by **conduction** (vibrations and free electrons in the metal). The metal surface gets hot.\n- Step 2: The hot metal surface emits **infrared radiation** into the room. This is the main mechanism by which the *air* is not heated directly — the radiation hits the walls, the floor, the person, and warms them.\n- Step 3: The warmed surfaces then transfer some energy to the *air* by **conduction** at the surface, and the air moves by **convection** (rising along the radiator, circulating around the room). The person feels warmed by all three.\n\nTakeaway: real rooms use all three mechanisms. The radiator's *radiation* heats the *solids*; the air is warmed mainly by conduction from those hot solids and then by convection around the room.", "source": "MiniMax M3 ②", "_id": "minimax_2_65", "judge_pick": false}, {"question": "\"The average kinetic energy of a gas molecule is $$\\frac{3}{2}kT$$.\" State three limits of this equation. (3 steps)", "answer": "- Step 1: It applies only to an **ideal gas** — one with negligible intermolecular forces except during perfectly elastic collisions, and a molecular volume much smaller than the container. Real gases deviate at high pressure and low temperature.\n- Step 2: It applies to **translational kinetic energy only** (motion of the centre of mass). For molecules with internal structure (rotations, vibrations), the *total* kinetic energy per molecule is higher — only the translational share is $$\\frac{3}{2}kT$$.\n- Step 3: It is a **classical** result. At very low temperatures (near 0 K), quantum effects (zero-point energy, quantised rotations) take over and the simple proportionality breaks down.\n\nTakeaway: $$\\frac{3}{2}kT$$ is the *translational* share of a *classical* *ideal* gas's kinetic energy. Outside those limits, the simple formula does not hold.", "source": "MiniMax M3 ②", "_id": "minimax_2_66", "judge_pick": true}, {"question": "Give the *order-of-magnitude* sense of the rms speed of air molecules at room temperature. Why is it useful to know this even without doing the calculation? (2 steps)", "answer": "- Step 1: At ~290 K, the rms speed of air molecules is roughly ~500 m/s. It is set by $$\\sqrt{3kT/m}$$ for an \"air molecule\" of mass ~29 u. This is *faster* than the speed of sound in air (~340 m/s) by a sensible factor.\n- Step 2: Knowing the *order of magnitude* (hundreds of m/s) lets you sanity-check kinetic-theory results without a calculator, and tells you the molecules are fast enough to cross a small room thousands of times per second — useful for understanding why gases mix quickly and why pressure equilibrates rapidly.\n\nTakeaway: ~500 m/s is the right ballpark for air at room temperature. Faster than sound, fast enough to equilibrate pressure instantly in everyday containers.", "source": "MiniMax M3 ②", "_id": "minimax_2_67", "judge_pick": false}, {"question": "\"Latent\" means \"hidden.\" Why is the *latent* heat of fusion called that? (2 steps)", "answer": "- Step 1: During melting, the substance is *absorbing* energy, but its *temperature is not changing*. To a thermometer, nothing is happening — the energy is \"hidden\" from the temperature reading.\n- Step 2: The energy is going into the *potential* energy of the inter-molecular bonds, not into the kinetic energy that temperature measures. So the energy transfer is \"latent\" — present but not visible on a thermometer.\n\nTakeaway: latent = hidden in the bonds. Thermometer says no change; bonds are being broken.", "source": "MiniMax M3 ②", "_id": "minimax_2_68", "judge_pick": false}, {"question": "A solid, liquid, and gas all contain the same mass of the same substance at the same temperature. Which has the highest *internal* energy, and why? (2 steps)", "answer": "- Step 1: **The gas** has the highest internal energy. The internal energy is the sum of the random kinetic and inter-molecular potential energies of the molecules.\n- Step 2: Going from solid → liquid → gas, the inter-molecular potential energy *increases* (bonds are progressively broken or loosened), and the molecular kinetic energies are similar at the same temperature. So total internal energy is greatest in the gas and least in the solid.\n\nTakeaway: same temperature, same mass, but gas has the most internal energy because of the larger potential energy term.", "source": "MiniMax M3 ②", "_id": "minimax_2_69", "judge_pick": true}, {"question": "In a fixed-volume container of gas, the pressure is observed to *fall* when the temperature is lowered. Explain in two sentences using the particle model. (2 steps)", "answer": "- Step 1: Lower temperature → molecules move more slowly (lower mean random kinetic energy). They collide with the walls less often and with less momentum change per collision.\n- Step 2: Total force on the wall decreases; with area fixed, $$p = F/A$$ decreases. So pressure falls as temperature falls. The proportionality is $$p \\propto T$$ in kelvin.\n\nTakeaway: cooler gas → slower molecules → fewer and softer collisions → lower p.", "source": "MiniMax M3 ②", "_id": "minimax_2_70", "judge_pick": false}, {"question": "Why does a thermos flask (vacuum flask) keep cold drinks cold *and* hot drinks hot? (2 steps)", "answer": "- Step 1: It blocks all three heat-transfer mechanisms (conduction, convection, radiation), so heat cannot easily flow either *into* a cold drink or *out of* a hot drink.\n- Step 2: For a cold drink, the goal is to keep *heat* (energy) from flowing in; for a hot drink, the goal is to keep *heat* from flowing out. The same insulation works in both directions because heat always flows from hot to cold. The vacuum + silvering cuts the flow in both directions.\n\nTakeaway: insulation is bidirectional. The flask stops heat flowing either way.", "source": "MiniMax M3 ②", "_id": "minimax_2_71", "judge_pick": false}, {"question": "A cooling experiment is set up where the same hot water is placed in two identical cans, one black and one silvered. Both are sealed except for a small temperature probe. After 5 minutes, the black can is *cooler*. What is the safe conclusion, and what is the wrong one? (2 steps)", "answer": "- Step 1: **Safe conclusion**: the black surface is a better emitter of infrared, so it lost energy to its surroundings by radiation faster than the silvered can. The black can cooled more.\n- Step 2: **Wrong conclusion**: \"the black can got hotter\" (it didn't — it cooled more), or \"the black can reflected more\" (no, it is a poor reflector). The verb must be *emit* in this experiment, not reflect, because there is no external radiation source for the silvered can to reflect.\n\nTakeaway: read emission from cooling rate, never from \"the emitter got hotter.\" Verb is emit, not reflect.", "source": "MiniMax M3 ②", "_id": "minimax_2_72", "judge_pick": false}, {"question": "Why does the addition of CO₂ to the atmosphere shift the Earth's equilibrium temperature *upwards*? (2 steps)", "answer": "- Step 1: CO₂ absorbs and re-radiates the *outgoing* long-wavelength infrared emitted by the Earth's surface, reducing the rate at which energy escapes to space.\n- Step 2: With more energy \"trapped\" in the atmosphere-surface system, the Earth-sun system must reach a new thermal equilibrium. To emit infrared at the same total rate, the surface temperature must rise so that its own emission rate matches the *reduced* net loss. Net result: higher equilibrium surface temperature.\n\nTakeaway: more CO₂ → less IR escapes → Earth must be hotter to emit at the same total rate. Equilibrium shifts up.", "source": "MiniMax M3 ②", "_id": "minimax_2_73", "judge_pick": true}, {"question": "Why is the rms speed of helium molecules (~1100 m/s at room temperature) much higher than that of air molecules (~500 m/s), and what everyday observation confirms this? (2 steps)", "answer": "- Step 1: From $$\\sqrt{\\langle c^2\\rangle} = \\sqrt{3kT/m}$$, the rms speed is inversely proportional to the square root of the molecular mass. Helium (4 u) is much lighter than air (~29 u), so its molecules move faster at the same temperature.\n- Step 2: The speed of sound in helium (~1000 m/s) is correspondingly much higher than in air (~340 m/s), and a person who has breathed in helium from a balloon sounds like \"Donald Duck\" because their vocal cords vibrate at the same frequency but the resonances in the helium-filled vocal tract propagate much faster, raising the formant frequencies.\n\nTakeaway: light molecules move faster, so the speed of sound is higher in light gases. The Donald Duck voice is the audible confirmation.", "source": "MiniMax M3 ②", "_id": "minimax_2_74", "judge_pick": true}, {"question": "A gas is heated at constant volume. State the equation that relates the new pressure to the old, and the rule for the temperature. (2 steps)", "answer": "- Step 1: Use the pressure law in the form $$\\frac{p_1}{T_1} = \\frac{p_2}{T_2}$$ — this is the *only* correct equation to use for a constant-volume gas problem.\n- Step 2: Both temperatures must be in **kelvin**. Convert with $$T/\\text{K} = \\theta/°\\text{C} + 273$$. Never plug Celsius into the pressure law.\n\nTakeaway: $$p/T = $$ constant, with T in kelvin. Convert before substituting.", "source": "MiniMax M3 ②", "_id": "minimax_2_75", "judge_pick": false}, {"question": "A steel-cored overhead power cable sags more in summer than in winter. Use the kinetic-theory picture of an ideal gas to suggest an *analogy* (not the actual mechanism for the cable). (2 steps)", "answer": "- Step 1: Analogy: heating a gas at fixed volume makes its pressure rise; in a fixed amount of *solid* (the cable), heating makes the lattice expand a little because the atoms vibrate with larger amplitude. The \"container\" is the cable's fixed mass, but the *length* is free to change.\n- Step 2: So in the gas analogy, $$p \\propto T$$ at fixed V; in the cable, the *length* increases with T at fixed *mass*. The same kinetic-theory picture (more thermal motion → larger dimensions) explains both, with the constrained variable (V for gas, length for cable) being the one that gives.\n\nTakeaway: kinetic theory is general — it says \"hotter things expand\" whether the thing is a gas at fixed V (so p rises) or a solid at fixed mass (so length rises).", "source": "MiniMax M3 ②", "_id": "minimax_2_76", "judge_pick": false}, {"question": "State the units of the specific heat capacity *in terms of base units*, and explain how you get them from the defining equation. (2 steps)", "answer": "- Step 1: Rearrange the defining equation to $$c = \\frac{\\Delta E}{m \\Delta \\theta}$$, so the units of c are (units of energy) / (units of mass × units of temperature).\n- Step 2: Base units: energy in J = kg m² s⁻², mass in kg, temperature in K. So $$c$$ has units of $$\\frac{\\text{kg m}^2 \\text{s}^{-2}}{\\text{kg K}} = \\text{m}^2 \\text{s}^{-2} \\text{K}^{-1}$$ — equivalently written as $$\\text{J kg}^{-1} \\text{K}^{-1}$$.\n\nTakeaway: derive c's units from $$\\frac{J}{kg \\cdot K}$$, not from memory. Same trick works for any derived quantity.", "source": "MiniMax M3 ②", "_id": "minimax_2_77", "judge_pick": true}, {"question": "A pan on a hob contains oil that is heated from 20 °C to 180 °C. The textbook example notes that the energy required to heat the pan *and* the oil is greater than the energy required to heat the oil alone. Why? (2 steps)", "answer": "- Step 1: The pan has its own mass and its own (much lower) specific heat capacity, but it must also be raised from room temperature to 180 °C. Its energy demand is $$\\Delta E_\\text{pan} = m_\\text{pan} c_\\text{pan} \\Delta \\theta$$.\n- Step 2: Total energy = energy to heat oil + energy to heat pan + energy lost to surroundings. The textbook's example adds the two $$\\Delta E = mc\\Delta\\theta$$ terms (one for aluminium, one for water) before accounting for losses.\n\nTakeaway: total energy to heat a system is the sum over each component. Use $$\\Delta E = mc\\Delta\\theta$$ for each, then add.", "source": "MiniMax M3 ②", "_id": "minimax_2_78", "judge_pick": false}, {"question": "Why are the *sloped* sections of a heating curve linear (constant slope) when energy is supplied at a constant rate? (2 steps)", "answer": "- Step 1: In a sloped section, the same equation $$\\Delta E = mc\\Delta\\theta$$ applies, with m and c constant. So $$\\Delta\\theta = \\frac{\\Delta E}{mc}$$ — temperature rise is *directly proportional* to the energy input.\n- Step 2: If energy is supplied at a constant rate (constant power), then energy is proportional to time, so temperature is proportional to time. That gives a *linear* (straight-line) section on a temperature-vs-time graph. The slope's magnitude depends on the *c* of the substance.\n\nTakeaway: constant power → constant $$\\Delta E/\\Delta t$$ → linear T vs t. Slope is set by c.", "source": "MiniMax M3 ②", "_id": "minimax_2_79", "judge_pick": false}, {"question": "A tray of water at room temperature is put into a freezer. Outline, in particle terms, the energy changes during (a) the cooling of liquid water, (b) the freezing at 0 °C, and (c) the cooling of the resulting ice. (3 steps)", "answer": "- Step 1: **(a) Cooling liquid water**: water molecules lose kinetic energy to the freezer; their mean random kinetic energy falls, and the temperature reading falls correspondingly. Both kinetic energy and (slightly) potential energy decrease as the molecules slow.\n- Step 2: **(b) Freezing at 0 °C**: temperature is constant. The energy leaving the water goes into the *potential* energy of the inter-molecular bonds — molecules lock into the ice lattice. The kinetic energy does not change; only the bond energy does.\n- Step 3: **(c) Cooling ice**: the ice's molecules now have a fixed lattice but continue to vibrate. They lose kinetic energy to the freezer, the mean vibration amplitude falls, and the temperature reading falls. (Note: the specific heat capacity of ice is *lower* than that of liquid water, so the ice cools at a different rate per joule.)\n\nTakeaway: in any sloped section, kinetic energy changes (so does temperature). On any plateau, only potential energy changes (so temperature does not).", "source": "MiniMax M3 ②", "_id": "minimax_2_80", "judge_pick": false}, {"question": "A liquid is evaporating from an open beaker at room temperature. Where does the energy for vaporisation come from, and what happens to the temperature of the remaining liquid? (2 steps)", "answer": "- Step 1: The fastest molecules at the surface escape into the air as vapour. The latent heat required is drawn from the *internal* energy of the remaining liquid — i.e., from the kinetic energy of the molecules left behind.\n- Step 2: As the faster (more energetic) molecules leave, the *average* kinetic energy of the remaining molecules falls, so the temperature of the liquid drops below room temperature. This is *evaporative cooling*.\n\nTakeaway: evaporation cools the liquid. Energy to vaporise comes from the liquid's own internal energy.", "source": "MiniMax M3 ②", "_id": "minimax_2_81", "judge_pick": false}, {"question": "A solid is heated. On a graph of temperature against time, the graph has flat sections (plateaus). What is happening on a plateaus, in particle terms? (2 steps)", "answer": "- Step 1: On a plateau, energy is still being supplied, but the *temperature is constant*. The supplied energy is going into the *potential* energy of the inter-molecular bonds (e.g., breaking the rigid lattice to allow flow, or fully separating molecules into a gas).\n- Step 2: The mean *kinetic* energy of the molecules is not changing on a plateau, so the temperature reading is constant. The energy is \"latent\" because it does not show up on a thermometer.\n\nTakeaway: plateau = state change. Energy in, temperature unchanged, energy goes into bond potential.", "source": "MiniMax M3 ②", "_id": "minimax_2_82", "judge_pick": false}, {"question": "When you blow on hot soup, the soup cools faster. Is the dominant cooling mechanism convection, conduction, or radiation? (2 steps)", "answer": "- Step 1: The dominant mechanism is *convection*. You are replacing the hot, humid air just above the soup with cooler, drier room air. The soup loses heat to the *new* air by conduction at the surface, but the rate-limiting step is the *bulk flow* of cool air over the surface.\n- Step 2: Conduction alone (into still air) is much slower, and radiation from a not-very-hot soup is small. So the blowing increases the convection rate by sweeping away the warm boundary layer.\n\nTakeaway: blowing on something cools it by *convection* — replacing the warm boundary layer with cool air. It is not conduction (the air isn't still) and not radiation (the soup is too cool to radiate much).", "source": "MiniMax M3 ②", "_id": "minimax_2_83", "judge_pick": false}, {"question": "A 0.5 kg block of a material with specific heat capacity 1000 J/(kg K) is supplied with 5000 J of energy. Find the temperature change. State the only common slip to avoid. (2 steps)", "answer": "- Step 1: Use $$\\Delta\\theta = \\frac{\\Delta E}{mc} = \\frac{5000}{0.5 \\times 1000} = \\frac{5000}{500} = 10 \\text{ K}$$.\n- Step 2: The only common slip is forgetting to convert grams to kg. If the question said \"500 g\" and you used 500 in kg, the answer would be off by a factor of 1000. Always check the mass unit before substituting.\n\nTakeaway: mass must be in kg in SHC calculations. Convert grams.", "source": "MiniMax M3 ②", "_id": "minimax_2_84", "judge_pick": false}, {"question": "A gas cylinder of volume 8.3 × 10³ cm³ contains gas at 15 °C and 4.5 × 10⁷ Pa. Estimate the *order of magnitude* of the number of molecules. Why is the exact number not crucial? (2 steps)", "answer": "- Step 1: Use $$N = \\frac{pV}{kT}$$ with V = 8.3 × 10⁻³ m³, T ≈ 288 K, k = 1.38 × 10⁻²³ J/K, p = 4.5 × 10⁷ Pa. This gives N of order 10²⁵ — astronomical. The textbook exact value is 9.4 × 10²⁵.\n- Step 2: For a rough *order-of-magnitude* check, the power-of-ten matters, not the exact value. The result is so large (10²⁵) that the second significant figure is irrelevant for \"is this a sensible number of molecules in a cylinder\" purposes.\n\nTakeaway: numbers of gas molecules are always around 10²⁰ to 10²⁸ in everyday containers. Order-of-magnitude is enough for sanity-checking.", "source": "MiniMax M3 ②", "_id": "minimax_2_85", "judge_pick": false}, {"question": "\"Adding a 273 to °C gives K\" is a *conversion* for *absolute* temperatures, not for *intervals*. State the rule for each. (2 steps)", "answer": "- Step 1: **Absolute values**: $$T/\\text{K} = \\theta/°\\text{C} + 273.15$$ (or 273 for rough work). A temperature of 0 °C *is* 273 K.\n- Step 2: **Intervals**: 1 K = 1 °C, so $$\\Delta T = \\Delta\\theta$$. You do *not* add 273 to a temperature *change*. This is why $$\\Delta\\theta$$ in $$\\Delta E = mc\\Delta\\theta$$ can be in either unit.\n\nTakeaway: add 273 for absolute values; do nothing for intervals. Mixing these up is the most common single error with the kelvin scale.", "source": "MiniMax M3 ②", "_id": "minimax_2_86", "judge_pick": true}, {"question": "A student says \"Conduction happens mainly in metals because the bonds are stronger.\" Why is the truth almost the *opposite* in a sense? (2 steps)", "answer": "- Step 1: Conduction is energy transfer via *vibrations and free electrons*. Strong bonds *couple* the lattice tightly, which transmits vibrations well — so strong bonds actually *help* conduction, not hinder it.\n- Step 2: The truth is that metals conduct best because of their **free (delocalised) electrons**, not because of their bonds. Non-metals (e.g., wood) have similar or stronger bonds but no free electrons, so they conduct poorly. Free electrons are the dominant factor in metals.\n\nTakeaway: it's the *electrons*, not the bonds, that make metals special. Non-metals can have strong bonds and still insulate.", "source": "MiniMax M3 ②", "_id": "minimax_2_87", "judge_pick": true}, {"question": "At constant temperature, the volume of a gas is halved. State what happens to the pressure, by how much, and the equation that gives it. (2 steps)", "answer": "- Step 1: **Boyle's law**: for a fixed mass of gas at constant temperature, $$pV = \\text{constant}$$, so $$p_1 V_1 = p_2 V_2$$.\n- Step 2: If V is halved ($$V_2 = V_1/2$$), then $$p_2 = p_1 V_1 / V_2 = 2 p_1$$ — the pressure *doubles*. (Caveat: this is for an ideal gas; real gases deviate at high p or low T.)\n\nTakeaway: $$pV =$$ constant at constant T. Halve V → double p. Always state the conditions.", "source": "MiniMax M3 ②", "_id": "minimax_2_88", "judge_pick": false}, {"question": "The Earth receives about 1000 W/m² from the Sun at the top of the atmosphere. In thermal equilibrium, the Earth must emit 1000 W/m² on average. How does the *temperature* of the emitter relate to the *wavelength* of the emitted radiation, and what does that mean for the Earth? (2 steps)", "answer": "- Step 1: The hotter an object, the shorter the *peak wavelength* at which it emits most strongly (Wien's law: $$\\lambda_\\text{max} \\propto 1/T$$). The Sun's surface (~5800 K) emits mostly at visible wavelengths; the Earth's surface (~288 K) emits mostly at long-wavelength infrared.\n- Step 2: So Earth re-emits at a *longer* wavelength than it absorbs — short-wavelength visible in, long-wavelength IR out. That is the physical basis of the greenhouse effect: the atmosphere is largely transparent to the incoming visible but partially opaque to the outgoing IR.\n\nTakeaway: hot → short $$\\lambda_\\text{max}$$. The Earth re-emits at a longer $$\\lambda$$ than it absorbs, and that is the wavelength gap the greenhouse gases exploit.", "source": "MiniMax M3 ②", "_id": "minimax_2_89", "judge_pick": false}, {"question": "\"Conduction, convection, radiation — pick one.\" Why is the textbook advice to \"say the right keywords in the right order\" rather than just naming one? (2 steps)", "answer": "- Step 1: Each mechanism has a *causal chain* of keywords in a specific order. Conduction: hot → vibrations → pass on to neighbours → cold end. Convection: heating → spread out → less dense → rise. Radiation: emit → infrared → travels through vacuum → absorbed.\n- Step 2: Marks are awarded for each keyword in the chain and for the order. Naming the mechanism alone (e.g., \"conduction\") without the chain is worth little; the chain is the answer.\n\nTakeaway: thermal answers are graded on the chain, not the label. The chain *is* the answer.", "source": "MiniMax M3 ②", "_id": "minimax_2_90", "judge_pick": false}, {"question": "Why is a \"good conductor\" not the same as a \"good radiator\" in everyday English, and how do you tell them apart in physics? (2 steps)", "answer": "- Step 1: In physics, **conductor** refers to *conduction* (transfer of energy through matter by particle vibration and/or free electrons). **Radiator** (emitter) refers to *radiation* (transfer of energy by electromagnetic waves).\n- Step 2: A shiny metal can be a good conductor of heat and a poor radiator at the same time. A rough black surface is a good radiator and may be a poor conductor. The two are independent properties; a surface is *not* required to be good at both.\n\nTakeaway: conductor = good at conduction. Emitter = good at radiation. The two are independent properties of a material/surface.", "source": "MiniMax M3 ②", "_id": "minimax_2_91", "judge_pick": true}, {"question": "A metal spoon and a wooden spoon are both at 20 °C. You hold each. The metal feels \"colder.\" Why, in particle terms? (2 steps)", "answer": "- Step 1: Both are at the same temperature, so neither is \"really\" colder than the other. But the metal is a far better *thermal conductor* — its free electrons and tightly coupled lattice transfer energy from your hand into the spoon much faster.\n- Step 2: So your hand loses internal energy quickly when touching the metal — your skin's nerve endings register \"cold.\" With the wood, the energy flow is much slower, so the hand does not cool as fast and the wood does not feel as cold.\n\nTakeaway: \"feels cold\" is about *rate* of energy loss, not temperature. Better conductor → faster heat flow out of your hand → colder feel.", "source": "MiniMax M3 ②", "_id": "minimax_2_92", "judge_pick": true}, {"question": "\"Insulation\" is a single word but four different mechanisms in disguise. Identify the four and link each to one design feature. (4 steps)", "answer": "- Step 1: **Conduction** — the transfer of energy by particle vibrations and (in metals) free electrons. Suppressed by **fewer particles** or **immobilised** ones — e.g., **trapped air** in loft rolls, or a **vacuum** in a thermos.\n- Step 2: **Convection** — the bulk flow of a heated fluid. Suppressed by preventing bulk flow — e.g., **small air pockets** that cannot circulate, or a **draught excluder** under a door.\n- Step 3: **Radiation (infrared)** — energy transfer by EM waves, independent of any medium. Suppressed by **shiny, reflective surfaces** — e.g., **silver foil** behind a radiator or a **silvered** vacuum flask.\n- Step 4: **Heat leakage by mass transport** (e.g., warm air physically escaping a room) is also blocked by **draught-proofing** — same convection suppression in practice.\n\nTakeaway: insulation = attack conduction, convection, *and* radiation. Each feature targets one or more of these.", "source": "MiniMax M3 ②", "_id": "minimax_2_93", "judge_pick": false}, {"question": "Two metal blocks of identical mass, one copper (c ≈ 390) and one aluminium (c ≈ 910), are each given the same energy input from identical heaters. Which reaches a higher temperature, and by roughly what factor? (2 steps)", "answer": "- Step 1: Same energy input → same $$\\Delta E$$. From $$\\Delta\\theta = \\frac{\\Delta E}{mc}$$, the block with the *smaller* c heats up by *more*. Copper has the smaller c, so it reaches the higher temperature.\n- Step 2: Ratio of temperature rises: $$\\frac{\\Delta\\theta_\\text{Cu}}{\\Delta\\theta_\\text{Al}} = \\frac{c_\\text{Al}}{c_\\text{Cu}} = \\frac{910}{390} \\approx 2.3$$. So copper's temperature rises by roughly 2.3× aluminium's for the same energy input.\n\nTakeaway: low c = quick to heat. Copper (low c) heats ~2.3× faster than aluminium (higher c) for the same mass and energy.", "source": "MiniMax M3 ②", "_id": "minimax_2_94", "judge_pick": false}, {"question": "Why does the same equation $$\\Delta E = mc\\Delta \\theta$$ apply whether we measure Δθ in kelvin or in Celsius? (2 steps)", "answer": "- Step 1: The size of one kelvin is *defined* to be the same as the size of one Celsius degree. So a 1 K rise and a 1 °C rise represent the same *change* in temperature.\n- Step 2: Because $$\\Delta E$$ depends on the *change* in temperature, not on the absolute value on either scale, the value of $$\\Delta\\theta$$ is numerically the same in either unit, and c can be quoted in either J/(kg K) or J/(kg °C). The unit label is a name; the physics is identical.\n\nTakeaway: intervals are interchangeable. The equation cares about *change*, not about zero.", "source": "MiniMax M3 ②", "_id": "minimax_2_95", "judge_pick": false}, {"question": "\"The atmosphere traps heat.\" Reframe this in precise physics language. (2 steps)", "answer": "- Step 1: Replace \"traps heat\" with \"absorbs and re-radiates the long-wavelength infrared emitted by the Earth's surface, reducing the net rate at which energy leaves the Earth-atmosphere system.\"\n- Step 2: Add the qualifier: this applies to greenhouse gases specifically (CO₂, water vapour, methane), and only to the *outgoing* long-wavelength IR — the incoming short-wavelength visible from the Sun passes through largely unabsorbed.\n\nTakeaway: \"traps\" is shorthand for \"absorbs and re-radiates the outgoing IR.\" Always specify *which* radiation and *which* gases.", "source": "MiniMax M3 ②", "_id": "minimax_2_96", "judge_pick": true}, {"question": "The cooling curves of two identical cans (one black, one silvered) b
