<script>
const DATA={"selected": [{"question": "A student writes: \"Infrared can travel through a vacuum because it is a wave, while conduction needs particles.\" Correct any imprecisions and tighten the explanation.", "answer": "- Tighten the wave statement: infrared is an electromagnetic wave, which is a self-propagating oscillation of electric and magnetic fields. EM waves do not need a medium because the fields regenerate each other as they travel — they are not mechanical disturbances of a medium.\n- Tighten the conduction statement: conduction requires matter because it is the passing of vibrational energy from one particle to the next through contact. With no particles, there is nothing to vibrate or pass energy to.\n- Note that convection also requires a medium — but for a different reason: it is bulk flow of a fluid. A vacuum has no fluid, so no bulk flow can occur.\n\nThe three-mechanism summary: only radiation does not require a medium.", "source": "MiniMax M3 ①", "_id": "minimax_1_61"}, {"question": "Explain the three distinct phases seen in a *cooling* curve (e.g. stearic acid cooling from a liquid) in terms of molecular energy.", "answer": "- Step 1: **First phase (falling slope):** the liquid loses kinetic energy, molecules slow, temperature drops — governed by $$mc\\Delta\\theta$$.\n- Step 2: **Second phase (flat plateau):** at the freezing/melting point, molecules form bonds (release potential energy) at constant temperature — the flat part gives the **melting point**.\n- Step 3: **Third phase (falling slope again):** the newly formed solid continues losing kinetic energy, so the temperature falls once more toward room temperature.\n\nThe plateau's temperature reads off the melting point directly.", "source": "Opus 4.8 ②", "_id": "opus_2_40"}, {"question": "In the Herschel prism experiment, thermometers were placed in each colour of the visible spectrum and one just beyond the red. Why does the thermometer beyond the red show the biggest temperature rise, and what does this establish? (3 steps)", "answer": "- Step 1: The prism spreads the Sun's white light into a spectrum. A thermometer placed just beyond the red still receives invisible electromagnetic radiation that transfers energy to it.\n- Step 2: This band is **infrared**: electromagnetic radiation with wavelength longer than visible red. Ordinary thermal infrared from warm matter is a broad spectrum produced by thermally excited charge motion, including molecular rotation/vibration and lattice vibrations — not generally by one orbital electron dropping between discrete levels.\n- Step 3: Herschel's result established that the solar spectrum continues invisibly beyond red and that this radiation carries energy. Combined with thermal-emission observations, it supports the modern picture of infrared as part of the electromagnetic spectrum.\n\nTakeaway: infrared is invisible electromagnetic radiation beyond red; it is not a separate \"heat substance\" and not nuclear radiation.", "source": "MiniMax M3 ②", "_id": "minimax_2_7"}, {"question": "In the kinetic theory derivation, we go from considering one molecule in one direction to the final result $$pV = \\frac{1}{3}Nm\\langle c^2 \\rangle$$. What is the key mathematical step that introduces the factor of $$\\frac{1}{3}$$? (2 steps)", "answer": "- Step 1: For one molecule with velocity components $$u, v, w$$ in three perpendicular directions, we have $$c^2 = u^2 + v^2 + w^2$$. For a large number of randomly moving molecules, $$\\langle u^2 \\rangle = \\langle v^2 \\rangle = \\langle w^2 \\rangle$$ (no preferred direction).\n- Step 2: Therefore $$\\langle c^2 \\rangle = 3\\langle u^2 \\rangle$$, so $$\\langle u^2 \\rangle = \\frac{1}{3}\\langle c^2 \\rangle$$. The $$\\frac{1}{3}$$ comes from the three-dimensional nature of space — each direction carries one-third of the mean square speed.", "source": "GLM 5.1 ②", "_id": "glm_2_44"}, {"question": "How does Brownian motion provide evidence for the kinetic theory of matter?", "answer": "- Step 1: Robert Brown observed that tiny pollen grains suspended in water move in small, random, jerky paths under a microscope.\n- Step 2: This is explained by **unequal bombardment** of each visible grain by the much smaller, invisible **water molecules**, which must therefore themselves be in continuous random motion.\n- Step 3: So the visible random dance of the grains is indirect evidence that the fluid particles are constantly, randomly moving — the core claim of kinetic theory. Einstein later analysed it quantitatively to estimate Avogadro's number.", "source": "Opus 4.8 ①", "_id": "opus_1_61"}, {"question": "A draught excluder is placed at the bottom of a door. A student says it reduces heat loss by *conduction*. Why is this wrong, and what mechanism does a draught actually involve? (2 steps)", "answer": "- Step 1: A draught is the *bulk movement of air* — whole volumes of warm air flow out under the door and cold air flows in to replace them. This is **convection** (fluid circulation), not conduction (particle vibrations passing through a stationary material).\n- Step 2: A draught excluder blocks the *physical pathway* for air to flow, preventing the convective exchange of warm and cold air volumes. It does not primarily reduce conduction (though trapping a layer of air does also slow conduction, the dominant mechanism being blocked is convection). The giveaway: if *air is moving and being replaced*, it is convection.", "source": "GLM 5.1 ③", "_id": "glm_3_17"}, {"question": "In the cooling/heating investigation of the aluminium block, why does the temperature keep *rising* for about 2 minutes *after* the heater is switched off?", "answer": "- Step 1: The heater is embedded in the block, and energy takes a finite time to conduct from the heater, through the block, to the thermometer.\n- Step 2: When the power is switched off, energy already stored in the heater and inner block is **still in transit** toward the thermometer.\n- Step 3: So the thermometer reading **continues to climb** until all that residual energy has spread through — only then does the block's genuine cooling (energy loss to surroundings) become visible as the temperature starts to fall.", "source": "Opus 4.8 ②", "_id": "opus_2_35"}, {"question": "\"Hot air rises\" is a useful everyday phrase. In a physics answer, what should replace it, and what is the common error? (2 steps)", "answer": "- Step 1: Replace with the ordered chain: \"the air particles gain kinetic energy, move faster, spread out, become *less dense*, and so *rise* under buoyancy.\" The cause is the *density* change, not the heat.\n- Step 2: Common error: claiming the cooling air \"must condense to liquid\" to sink. A gas does not need to change state to become denser — it just needs its particles to slow down and pack closer. Sinking air stays a gas.\n\nTakeaway: chain, don't claim. Density, not heat, is the agent. Cooling gas does not need to change state.", "source": "MiniMax M3 ②", "_id": "minimax_2_60"}, {"question": "At what temperature would the rms speed of oxygen molecules be the same as the rms speed of helium molecules at 300 K? (2 steps)", "answer": "- Step 1: From $$c_\\text{rms} = \\sqrt{3kT/m}$$, equal $$c_\\text{rms}$$ requires $$T/m$$ to be equal. So $$T_\\text{O_2} / m_\\text{O_2} = T_\\text{He} / m_\\text{He}$$.\n- Step 2: $$T_\\text{O_2} = T_\\text{He} \\times (m_\\text{O_2}/m_\\text{He}) = 300 \\times (32/4) = 2400 \\text{ K}$$. (Using rough integer masses: O₂ is 32 u, He is 4 u, ratio 8; so 300 × 8 = 2400 K.)\n\nThis is a useful intuition check: heavy molecules need much higher temperatures to reach the same speed as light ones.", "source": "MiniMax M3 ①", "_id": "minimax_1_75"}, {"question": "Why is the rms speed of helium molecules (~1100 m/s at room temperature) much higher than that of air molecules (~500 m/s), and what everyday observation confirms this? (2 steps)", "answer": "- Step 1: From $$\\sqrt{\\langle c^2\\rangle} = \\sqrt{3kT/m}$$, the rms speed is inversely proportional to the square root of the molecular mass. Helium (4 u) is much lighter than air (~29 u), so its molecules move faster at the same temperature.\n- Step 2: The speed of sound in helium (~1000 m/s) is correspondingly much higher than in air (~340 m/s), and a person who has breathed in helium from a balloon sounds like \"Donald Duck\" because their vocal cords vibrate at the same frequency but the resonances in the helium-filled vocal tract propagate much faster, raising the formant frequencies.\n\nTakeaway: light molecules move faster, so the speed of sound is higher in light gases. The Donald Duck voice is the audible confirmation.", "source": "MiniMax M3 ②", "_id": "minimax_2_74"}, {"question": "A black surface is the best emitter and absorber; a shiny surface is the best reflector. A student asks, \"Then how can a shiny foil behind a radiator *help* heating — if it reflects, doesn't it send heat back to the wall?\" Explain the trick. (2 steps)", "answer": "- Step 1: The foil's role is to reflect the radiator's *own* infrared back into the room, not to send it into the wall. The shiny surface bounces the radiation away from the wall and back toward the people, where it can be absorbed (people are good absorbers) and warm them.\n- Step 2: The foil is also a *poor* emitter, so it does not lose significant heat by radiating itself into the wall. The net effect is more infrared into the room, less into the wall. Reflection here is *useful* precisely because the shiny surface is also a poor emitter.\n\nTakeaway: best reflector = worst emitter. The foil's \"bad\" emitting side is what makes its \"good\" reflecting side actually save energy.", "source": "MiniMax M3 ②", "_id": "minimax_2_41"}, {"question": "Sketch or describe the temperature-energy graph for a substance heated from a solid below its melting point to a gas above its boiling point. Identify which equations govern the sloped sections versus the flat plateaus, and explain why the boiling plateau is much longer than the melting plateau. (4 steps)", "answer": "- Step 1: Describe the graph shape. The graph consists of three upward-sloping diagonal lines (solid warming, liquid warming, gas warming) separated by two horizontal flat plateaus (melting and boiling).\n- Step 2: Identify the sloped sections. The diagonal sections represent a single phase where temperature rises. These are governed by the specific heat capacity equation: $$\\Delta E = mc\\Delta\\theta$$.\n- Step 3: Identify the flat plateaus. The horizontal sections represent changes of state where temperature is constant. These are governed by the specific latent heat equation: $$\\Delta E = L\\Delta m$$.\n- Step 4: Explain the plateau lengths. The length of the plateau represents the total energy required ($$\\Delta E$$). Because the specific latent heat of vaporisation is much greater than the specific latent heat of fusion ($$L_v \\gg L_f$$), the boiling plateau requires significantly more energy and is therefore drawn much longer on the energy axis than the melting plateau.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_15"}, {"question": "State the equation linking mean molecular kinetic energy to absolute temperature, and its central physical meaning.", "answer": "- Step 1: The equation is $$\\tfrac{1}{2}m\\langle c^2\\rangle = \\tfrac{3}{2}kT$$, where $$\\tfrac{1}{2}m\\langle c^2\\rangle$$ is the **average random kinetic energy** of one molecule.\n- Step 2: Central meaning: since $$k$$ is constant, the **average random kinetic energy of gas molecules is directly proportional to the absolute temperature** ($$E_k \\propto T$$).\n- Step 3: It follows that at $$T = 0$$ K the average random kinetic energy would be **zero** — reinforcing absolute zero as the lowest temperature (in this simple non-quantum model).\n\nMemory rhyme: \"Average KE is three-halves kT.\"", "source": "Opus 4.8 ②", "_id": "opus_2_54"}, {"question": "Loft insulation traps air in small pockets. Explain the *two* distinct ways this reduces heat transfer — one related to conduction and one to convection. Why must the pockets be *small*? (3 steps)", "answer": "- Step 1: **Conduction reduction**: Air has very few, widely spaced particles compared to a solid, so it is a poor conductor. Trapping air inside the insulation means energy must cross a medium (air) that conducts poorly — fewer particles to pass vibrations through.\n- Step 2: **Convection reduction**: If the air were free to circulate in a large cavity, convection currents would develop (warm air rises, cold sinks, energy carried by bulk flow). But when air is trapped in *small pockets* between fibres, it is *immobilised* — it cannot circulate, so convection is suppressed.\n+ Small pockets are essential: a large air gap would allow convection currents to form inside it, defeating the insulation. Small pockets physically prevent the circulation.\n- Step 3: The dual mechanism is the key exam point: trapped air reduces *both* conduction (fewer particles) *and* convection (immobilised pockets). A vacuum goes even further — zero particles eliminates conduction entirely and convection entirely, leaving only radiation to deal with.", "source": "GLM 5.1 ③", "_id": "glm_3_18"}, {"question": "State Boyle's law with its conditions, and give the equation used in calculations. Why must the conditions be stated?", "answer": "- Step 1: **Boyle's law**: the pressure of a **fixed mass of gas** is **inversely proportional to its volume**, provided the **temperature is constant**: $$p \\propto 1/V$$, or $$pV = \\text{constant}$$.\n- Step 2: For calculations: $$p_1 V_1 = p_2 V_2$$.\n- Step 3: The conditions (fixed mass, constant temperature) must be stated because if mass or temperature changes, the simple inverse relationship no longer holds — the full ideal gas equation would be needed instead.", "source": "Opus 4.8 ①", "_id": "opus_1_55"}, {"question": "For an ideal gas, sketch and label: (a) a p–V isothermal curve, (b) a p–T graph at constant V, (c) a V–T graph at constant p. What does each line or curve show?", "answer": "- (a) p–V isothermal: a rectangular hyperbola $$pV = \\text{const}$$, with p rising as V falls. Higher-T isotherms lie further from the origin.\n- (b) p–T at constant V: a straight line through the origin, $$p \\propto T$$. The slope depends on V and N.\n- (c) V–T at constant p: a straight line through the origin, $$V \\propto T$$ (Charles's law). The slope depends on p and N.\n- The \"through the origin\" behaviour in (b) and (c) is the visual signature of absolute zero being the natural zero of the temperature scale.\n\nIf a line crosses the temperature axis at a non-zero value when extrapolated, you are using °C instead of K.", "source": "MiniMax M3 ①", "_id": "minimax_1_77"}, {"question": "In the aluminium-block SHC experiment, why is a small amount of oil placed in the holes before inserting the heater and thermometer? (1 step)", "answer": "- Step 1: The oil fills air gaps between the heater/thermometer and the aluminium, ensuring **good thermal contact**. Air is a poor conductor, so without oil, energy would transfer inefficiently from heater to block and from block to thermometer, giving inaccurate temperature readings and energy transfer.", "source": "GLM 5.1 ②", "_id": "glm_2_37"}, {"question": "During the day, a sea breeze blows from the sea toward the land. Explain this as a convection current, identifying which mechanism first heats the land and what drives the circulation. (2 steps)", "answer": "- Step 1: The Sun's infrared radiation heats the *land* more effectively than the sea (land has a lower specific heat capacity and absorbs radiation faster). The heated land then warms the air above it by *conduction* (contact between the hot ground and the air).\n- Step 2: That warmed air becomes less dense and *rises*. Cooler, denser air over the sea *sinks* and flows inland to replace the risen air — this inflow is the sea breeze. The full cycle: infrared → land → conduction to air → convection (less-dense air rises, denser air moves in) → sea breeze. It is a *combination* of radiation, conduction, and convection, not just one mechanism.", "source": "GLM 5.1 ③", "_id": "glm_3_15"}, {"question": "A gas in a fixed volume is heated. Using the kinetic-theory link, explain in one sentence why $$p \\propto T$$ in kelvin. (2 steps)", "answer": "- Step 1: From the kinetic theory, the average molecular kinetic energy is $$\\frac{1}{2}m\\langle c^2\\rangle = \\frac{3}{2}kT$$, so the mean square speed (and thus the typical wall-collision momentum and frequency) grows with T.\n- Step 2: Combining with the collision-derived $$pV = \\frac{1}{3}Nm\\langle c^2\\rangle$$, with V and N fixed, gives $$p = \\frac{Nm\\langle c^2\\rangle}{3V} \\propto \\langle c^2\\rangle \\propto T$$. So $$p \\propto T$$ (in kelvin) at constant V.\n\nTakeaway: T → mean KE → mean square speed → collision rate and force → p. Pressure tracks absolute temperature, not Celsius temperature.", "source": "MiniMax M3 ②", "_id": "minimax_2_62"}, {"question": "Why is an expanded polystyrene cup preferred over a glass beaker when measuring the specific heat capacity of a liquid?", "answer": "- Step 1: A glass beaker has significant mass and its own specific heat capacity, so it absorbs a non-negligible chunk of the supplied energy — you'd have to account for it.\n- Step 2: Expanded polystyrene has **very little mass**, so it absorbs almost no energy itself.\n- Step 3: It is also a **very good insulator**, minimising energy transfer from the liquid to the surroundings. Both effects make the energy balance much cleaner: nearly all supplied energy goes into the liquid.", "source": "Opus 4.8 ①", "_id": "opus_1_42"}, {"question": "An avocado of mass 0.215 kg requires 1294 J to cool by 2 K. Find its specific heat capacity. Then find the temperature change if it instead gains 3000 J. (4 steps)", "answer": "- Step 1: Rearrange $$\\Delta E=mc\\Delta\\theta$$: $$c=\\frac{1294}{0.215\\times2}=3009.302325\\ldots\\ \\mathrm{J\\,kg^{-1}\\,K^{-1}}.$$\n- Step 2: Under the classroom convention that the printed $$2\\ \\mathrm K$$ is an exact/simple value, report $$c=3.01\\times10^3\\ \\mathrm{J\\,kg^{-1}\\,K^{-1}}$$ (3 s.f., limited by 0.215 kg). A strict measured-data reading of \"2 K\" would justify only 1 s.f.; state the convention rather than mislabelling the digits.\n- Step 3: Treat the printed $$3000\\ \\mathrm J$$ as an exact/classroom (or 4-s.f.) supplied value; if it were instead interpreted strictly as 1 s.f., the final reported change would be $$5\\ \\mathrm K$$. Carry the **unrounded** Q3 value into Q4: $$\\Delta\\theta=\\frac{3000}{0.215\\times3009.302325\\ldots}=4.636785\\ldots\\ \\mathrm K=4.64\\ \\mathrm K\\ (3\\ \\mathrm{s.f.}).$$\n- Step 4: The board circled $$2500\\ \\mathrm{J\\,kg^{-1}\\,K^{-1}}$$, but it does not follow from the printed values; the screenshot author is unidentified and Alex also spoke an approximate 2500, so treat it as an unattributed board/tutor arithmetic error — **not** a Phuc-specific mistake. Using 2500 would incorrectly give 5.58 K.", "source": "GLM 5.1 ②", "_id": "glm_2_20"}, {"question": "Define specific heat capacity in words and give its symbol and unit. Why is it defined \"per kilogram, per kelvin\"?", "answer": "- Step 1: Specific heat capacity (symbol $$c$$) is the **energy needed to raise the temperature of 1 kg of a substance by 1 K** (equivalently 1 °C). Unit: $$\\text{J/(kg\\,K)}$$.\n- Step 2: It is defined *per kilogram* so it is an intrinsic property of the *material*, independent of how much you have — the \"specific\" means per unit mass.\n- Step 3: It is defined *per kelvin* so it is independent of how big a temperature change you make. Together these let you compare materials fairly: water (4200) vs copper (~390) tells you water resists temperature change far more per kilogram.", "source": "Opus 4.8 ①", "_id": "opus_1_33"}, {"question": "The equation $$p = \\frac{1}{3}\\rho\\langle c^2 \\rangle$$ links pressure, density, and mean square speed. If you compress a gas at constant temperature (reducing volume), what happens to its density and why does pressure increase — is it because molecules speed up? (3 steps)", "answer": "- Step 1: At constant temperature, the average molecular speed (and hence $$\\langle c^2 \\rangle$$) stays the same — the kinetic energy depends only on temperature.\n- Step 2: Compressing the gas reduces its volume, so the same mass occupies less space: density $$\\rho = \\frac{m}{V}$$ **increases**.\n- Step 3: Since $$p = \\frac{1}{3}\\rho\\langle c^2 \\rangle$$ and $$\\langle c^2 \\rangle$$ is constant while $$\\rho$$ increases, the pressure increases. The pressure rise is due to **more molecules per unit volume** making more frequent wall collisions, not because individual molecules are faster.", "source": "GLM 5.1 ②", "_id": "glm_2_57"}, {"question": "Why must you always state the *keywords in the right causal order* in worded thermal questions, and give an example of doing it wrong vs right for conduction.", "answer": "- Step 1: Examiners award marks for an accurate *process description*, so the causal chain must be logically ordered, not a jumble of correct-sounding words.\n- Step 2: **Wrong (unordered):** \"metals have free electrons and vibrations and heat moves.\" This lacks cause-and-effect.\n- Step 3: **Right (ordered):** \"Particles in the hotter region vibrate more → they pass vibrations to neighbours → free electrons are knocked and move through the lattice → they collide with atoms further along → energy travels from hot to cold.\" Same facts, but the ordered chain earns the marks.", "source": "Opus 4.8 ①", "_id": "opus_1_78"}, {"question": "A gas is compressed isothermally (constant T). Does the average speed of the molecules change? Use $$\\tfrac{1}{2}m\\langle c^2\\rangle = \\tfrac{3}{2}kT$$ in your answer.", "answer": "- The equation ties the mean molecular KE to T directly. At constant T, the mean KE is constant.\n- Since $$m$$ is constant, $$\\langle c^2\\rangle$$ is constant, so the rms speed is constant.\n- Compression at constant T does not speed up or slow down the molecules. What changes is the *number density* (molecules per m³) — more molecules are packed into the same volume, so collisions with the wall are more frequent, and the pressure rises.\n\nThis is the particle-level reason for Boyle's law: same speeds, more molecules per unit volume → more wall hits → more pressure.", "source": "MiniMax M3 ①", "_id": "minimax_1_101"}, {"question": "A student claims \"all invisible light is infrared.\" Why is this too broad, and what is the correct narrower definition? (2 steps)", "answer": "- Step 1: The EM spectrum has *several* invisible regions — ultraviolet, X-rays, gamma rays (shorter than visible) and infrared, microwaves, radio waves (longer than visible). \"Invisible\" just means \"outside the visible band.\"\n- Step 2: The correct narrow definition of infrared is: the band of electromagnetic radiation *just beyond the red* end of the visible spectrum, with wavelengths longer than visible red. It is one specific region, not a synonym for \"unseen.\"\n\nTakeaway: Herschel discovered one specific invisible region. The lesson is to name the position in the spectrum, not to use \"invisible\" as a catch-all.", "source": "MiniMax M3 ②", "_id": "minimax_2_8"}, {"question": "For each house insulation feature, name the primary heat-transfer mechanism it reduces: (a) double glazing, (b) cavity-wall insulation, (c) foil behind a radiator, (d) draught excluder, (e) thick curtains. (2 steps)", "answer": "- Step 1: The mappings:\n+ (a) Double glazing → reduces **conduction** (the air or argon gap between panes is a poor conductor)\n+ (b) Cavity-wall insulation → reduces **convection and conduction** (fibres trap air, stopping warm air flowing through the cavity and providing a poor-conductor fill)\n+ (c) Foil behind radiator → reduces **radiation** (reflects infrared back into the room; foil is a poor emitter and good reflector)\n+ (d) Draught excluder → reduces **convection** (blocks whole volumes of air flowing under doors)\n+ (e) Thick curtains → reduces **conduction and some convection** (trap a layer of still air against the window, like a cavity wall)\n- Step 2: The exam strategy: when you see a design feature, ask \"which of the three mechanisms does it target?\" If it involves *trapping air* → conduction + convection. If it involves *reflective surfaces* → radiation. If it involves *blocking air flow* → convection. Never just say \"it insulates\" — name the specific mechanism.", "source": "GLM 5.1 ③", "_id": "glm_3_19"}, {"question": "For water, $$L_v \\approx 2.26 \\times 10^6\\,\\text{J/kg}$$ but $$L_f \\approx 3.34 \\times 10^5\\,\\text{J/kg}$$ — vaporisation needs about seven times more energy. Explain the molecular reason.", "answer": "- Step 1: **Melting** only needs to loosen the bonds enough for molecules to **slide past one another** — they stay close together in the liquid.\n- Step 2: **Boiling** must **completely separate** the molecules until there are essentially **no attractive forces** left between them (in the gas).\n- Step 3: Full separation requires far more work against the inter-molecular forces than mere loosening, so $$L_v \\gg L_f$$ — roughly seven times more energy per kilogram for water.", "source": "Opus 4.8 ②", "_id": "opus_2_38"}, {"question": "Conduction, convection, and radiation are the three heat transfer mechanisms. For each, give (a) the medium required, (b) what carries the energy, and (c) a one-sentence example.", "answer": "- Conduction: requires a medium (mainly solids); particles pass on vibrations to neighbours, with free electrons helping in metals; example — heat travelling along a metal spoon in a hot drink.\n- Convection: requires a fluid (liquid or gas); bulk flow of the heated fluid carries its internal energy with it; example — warm air rising off a radiator.\n- Radiation: requires no medium; electromagnetic waves (mainly IR) carry energy through vacuum or matter; example — the Sun warming the Earth through 150 million km of space.\n\nA simple memory trick: conduction needs *contact*, convection needs a *current*, radiation can *reach* across a vacuum.", "source": "MiniMax M3 ①", "_id": "minimax_1_55"}, {"question": "Under what single condition would an object emit zero infrared radiation? Why is this condition essentially unreachable in practice? (2 steps)", "answer": "- Step 1: An object would emit no infrared only at **0 K (absolute zero)**, where its particles have their minimum possible kinetic energy and no energy is available to be radiated.\n- Step 2: Absolute zero is a theoretical limit that has never been achieved. Even the coldest known natural region (the Boomerang Nebula) is about 1 K, and the cosmic microwave background is 2.7 K. Quantum mechanics also imposes a minimum \"zero-point energy\" that prevents particles from being completely stationary. So in practice, *every* object emits infrared all the time — hotter objects simply emit more.", "source": "GLM 5.1 ③", "_id": "glm_3_4"}, {"question": "When using Boyle's law ($$p_1 V_1 = p_2 V_2$$), the units of pressure and volume do not need to be SI — they just need to be consistent on both sides. Why does this work, and what is the caveat? (2 steps)", "answer": "- Step 1: Boyle's law is a proportionality: $$pV = \\text{constant}$$. As long as you use the *same* units for $$p_1$$ and $$p_2$$, and the *same* units for $$V_1$$ and $$V_2$$, the constant cancels correctly. You can use kPa and cm³ on both sides.\n- Step 2: The caveat: this only works for simple proportional relationships. For $$pV = NkT$$, you **must** use SI units (Pa, m³, K) because the constant $$k$$ is defined in SI. Mixing units in the ideal gas equation will give wrong answers.", "source": "GLM 5.1 ②", "_id": "glm_2_69"}, {"question": "Why does the water at the bottom of a waterfall have a (very slightly) higher temperature than at the top, and roughly how big is the effect for a tall fall?", "answer": "- Step 1: As water falls a height $$h$$, its gravitational potential energy $$mgh$$ converts to kinetic energy, then on impact to **internal energy** (random molecular motion) — a temperature rise.\n- Step 2: Energy conservation per kilogram: $$mgh = mc\\,\\Delta\\theta$$, so $$\\Delta\\theta = gh/c$$.\n- Step 3: For a big fall (say ~270 m): $$\\Delta\\theta \\approx (10 \\times 270)/4200 \\approx 0.6$$ K — a tiny fraction of a degree. The effect is real but minuscule, and spray/mixing make it hard to measure, which is why Joule found it \"too much broken into spray.\"", "source": "Opus 4.8 ①", "_id": "opus_1_75"}, {"question": "A cup of coffee is cooling on a desk. Is it still *absorbing* infrared from the room, or only emitting? What determines whether an object's temperature rises, falls, or stays constant? (3 steps)", "answer": "- Step 1: The cooling coffee is *both* emitting and absorbing infrared simultaneously. All objects do both all the time. The coffee emits because it is warmer than its surroundings; it absorbs because the room radiates infrared back toward it.\n- Step 2: What determines the temperature trend is the *balance* between the two rates:\n+ If emission rate > absorption rate → net energy loss → temperature falls (cooling object)\n+ If absorption rate > emission rate → net energy gain → temperature rises (heating object)\n+ If emission rate = absorption rate → net zero → temperature constant (thermal equilibrium)\n- Step 3: The coffee cools because its emission rate exceeds its absorption rate. As it approaches room temperature, the two rates converge until they equalise — then equilibrium is reached and cooling stops. Never say a cooling object \"only emits\" or a heating object \"only absorbs.\"", "source": "GLM 5.1 ③", "_id": "glm_3_5"}, {"question": "Why does a car tyre's air pressure rise after a long drive, and which gas law explains it? (3 steps)", "answer": "- Step 1: The tyre volume is essentially fixed, so the air inside obeys the pressure law $$p \\propto T$$ (kelvin).\n- Step 2: As the car drives, the rubber flexes each rotation (hysteresis), transferring energy to the rubber's internal energy, warming it; this heat conducts to the air inside.\n- Step 3: The warmer air molecules strike the tyre walls faster and more often, so the **pressure increases** in proportion to the rise in absolute temperature — which is why cold-tyre pressures are measured before driving.", "source": "Opus 4.8 ②", "_id": "opus_2_73"}, {"question": "A student says: \"At thermal equilibrium, the object has stopped emitting IR, so its temperature is constant.\" Identify and correct the two errors. (2 steps)", "answer": "- Error 1: \"Stopped emitting.\" An object in thermal equilibrium has not stopped emitting IR. It is still emitting at the same rate as it absorbs. The net transfer is zero, but emission is non-zero.\n- Error 2: \"Therefore temperature is constant.\" The correct cause is that the internal energy is not changing, so the mean particle KE is not changing, so temperature is constant. The constancy of temperature is a consequence of the rate balance, not a consequence of emission having stopped.\n\nThink of it as a balance sheet: inflow = outflow, so the account balance (internal energy, and hence temperature) is steady.", "source": "MiniMax M3 ①", "_id": "minimax_1_37"}, {"question": "State the units of the specific heat capacity *in terms of base units*, and explain how you get them from the defining equation. (2 steps)", "answer": "- Step 1: Rearrange the defining equation to $$c = \\frac{\\Delta E}{m \\Delta \\theta}$$, so the units of c are (units of energy) / (units of mass × units of temperature).\n- Step 2: Base units: energy in J = kg m² s⁻², mass in kg, temperature in K. So $$c$$ has units of $$\\frac{\\text{kg m}^2 \\text{s}^{-2}}{\\text{kg K}} = \\text{m}^2 \\text{s}^{-2} \\text{K}^{-1}$$ — equivalently written as $$\\text{J kg}^{-1} \\text{K}^{-1}$$.\n\nTakeaway: derive c's units from $$\\frac{J}{kg \\cdot K}$$, not from memory. Same trick works for any derived quantity.", "source": "MiniMax M3 ②", "_id": "minimax_2_77"}, {"question": "\"The atmosphere traps heat.\" Reframe this in precise physics language. (2 steps)", "answer": "- Step 1: Replace \"traps heat\" with \"absorbs and re-radiates the long-wavelength infrared emitted by the Earth's surface, reducing the net rate at which energy leaves the Earth-atmosphere system.\"\n- Step 2: Add the qualifier: this applies to greenhouse gases specifically (CO₂, water vapour, methane), and only to the *outgoing* long-wavelength IR — the incoming short-wavelength visible from the Sun passes through largely unabsorbed.\n\nTakeaway: \"traps\" is shorthand for \"absorbs and re-radiates the outgoing IR.\" Always specify *which* radiation and *which* gases.", "source": "MiniMax M3 ②", "_id": "minimax_2_96"}, {"question": "Why is a pressure cooker able to cook food faster than an open pan? (2 steps)", "answer": "- Step 1: A pressure cooker is sealed, so as the water inside boils, the pressure above the water rises above atmospheric. The boiling point of water rises with pressure, so the water can reach temperatures above 100 °C (typically 110–120 °C) before boiling.\n- Step 2: At higher temperature, the rate of energy transfer into the food is higher (because the temperature difference between water and food is larger), and the chemical reactions in cooking proceed faster at higher temperature. So the food cooks in less time.\n\nThis is a direct application of the relation between pressure, temperature and the phase change of water.", "source": "MiniMax M3 ①", "_id": "minimax_1_107"}, {"question": "In a heatwave, why does the outdoor air get so hot — is it radiation *or* convection? Explain the Sahara-to-Paris model. (4 steps)", "answer": "- Step 1: Several processes can act together; do not force a radiation-versus-convection either/or answer.\n- Step 2: Incoming **solar radiation** (predominantly visible and near-infrared at the ground, with other wavelengths present) warms the surface.\n- Step 3: The ground transfers energy to adjacent air by **gas conduction through molecular collisions and random molecular motion** — not by a solid-lattice vibration chain.\n- Step 4: Warmer, less-dense air can rise locally by **convection**. Its long-distance horizontal transport toward Paris is **advection by wind**. Local surfaces can then be heated by sunlight and transfer energy to nearby air.\n\nTakeaway: name each mechanism and scale correctly: radiation to the surface, molecular-collision conduction to adjacent air, local convection, and large-scale advection.", "source": "Opus 4.8 ②", "_id": "opus_2_28"}, {"question": "In the ice latent-heat method, why does not fully drying the ice make the measured $$L$$ come out *too small*?", "answer": "- Step 1: The method assumes the added mass $$\\Delta m$$ is *all ice* that must be melted (requiring $$L\\,\\Delta m$$ of energy).\n- Step 2: If the ice is wet, some of that added mass is already **liquid water at ~0 °C**, which needs no latent heat to melt.\n- Step 3: So the warm water actually only has to supply latent heat for the *true* ice mass, but you divide by the *larger* (ice + water) mass. Since $$L = \\Delta E/\\Delta m$$ with an inflated $$\\Delta m$$, the calculated $$L$$ comes out **too small**.", "source": "Opus 4.8 ①", "_id": "opus_1_49"}, {"question": "Describe the aluminium-block method for measuring $$c$$, stating the energy-balance principle it relies on. (3 steps)", "answer": "- Step 1: The principle is: **electrical energy supplied by the heater = increase in internal energy of the block**, i.e. $$IV\\Delta t = mc(\\theta_f - \\theta_i)$$.\n- Step 2: Method: weigh the block for $$m$$; insert a heater and thermometer (a little oil in the holes for good thermal contact); record starting temperature $$\\theta_i$$; switch on and record current $$I$$, voltage $$V$$, and time $$\\Delta t$$.\n- Step 3: After heating, record the **highest steady temperature** $$\\theta_f$$, then compute $$c = \\dfrac{IV\\Delta t}{m(\\theta_f - \\theta_i)}$$.", "source": "Opus 4.8 ①", "_id": "opus_1_38"}, {"question": "Why is it wrong to say a fixed-volume gas \"expands\" when heated, and what is the correct phrasing for what particles do at the walls?", "answer": "- Step 1: \"Expands\" implies the volume increases — but in a fixed-volume (rigid) container the volume is constant by definition, so expansion is impossible.\n- Step 2: The correct description is \"more **frequent** collisions with the walls\" — Phuc wrongly said \"more friction into the boxes,\" which is not the physics.\n- Step 3: The consequence of fixed volume is that all the extra particle energy shows up as increased **pressure**, not increased size.\n\nIf volume is fixed, always talk about pressure; if pressure is fixed, talk about volume.", "source": "Opus 4.8 ②", "_id": "opus_2_4"}, {"question": "In the metal-rod-and-wax demonstration, in what order do the wax-attached pieces fall off, and why?", "answer": "- Step 1: One end of the rod is heated, giving those particles the most vibrational energy.\n- Step 2: Energy travels along the rod by conduction — vibrations passed atom-to-atom plus free-electron transfer.\n- Step 3: The piece **nearest the heated end falls first**, then each successive piece outward falls as the energy front reaches it — directly visualising the progress of conduction along the rod.", "source": "Opus 4.8 ②", "_id": "opus_2_19"}, {"question": "A student says: \"Specific heat capacity is the energy needed to heat 1 kg of a substance by 1 °C, but only when the substance is a solid.\" Why is the qualifier \"only when the substance is a solid\" wrong?", "answer": "- Specific heat capacity applies to any state of matter, provided the substance is not changing state. So a liquid also has an SHC (water: 4200 J/(kg·K)), and a gas also has an SHC.\n- The qualifier \"only when solid\" probably comes from a confusion with specific latent heat, which is what governs energy transfers during a state change. During a state change, temperature does not change, so SHC is irrelevant — you use $$\\Delta E = L\\Delta m$$ instead.\n- SHC and latent heat are the two tools. SHC for a temperature change in a single state; latent heat for a state change at constant temperature.", "source": "MiniMax M3 ①", "_id": "minimax_1_63"}, {"question": "A student heats gas from 27 °C to 54 °C at constant volume, expecting the pressure to double, but it rises only ~9%. Explain the mistake. (3 steps)", "answer": "- Step 1: Pressure is proportional to **absolute (Kelvin) temperature**, not Celsius.\n- Step 2: 27 °C = 300 K and 54 °C = 327 K, so the ratio is $$327/300 = 1.09$$ — only a 9% rise, not a doubling.\n- Step 3: The student wrongly doubled the *Celsius* number (27 → 54). To actually double the pressure you'd need to double the *Kelvin* temperature (300 K → 600 K = 327 °C). Always use kelvin in gas laws.", "source": "Opus 4.8 ①", "_id": "opus_1_57"}, {"question": "List four key assumptions of the kinetic theory of an ideal gas, and for each, briefly state the experimental evidence or reasoning that supports it. (2 steps)", "answer": "- Step 1: The four assumptions:\n+ **Large number of molecules in continuous, rapid, random motion** — supported by Brownian motion (tiny particles jitter visibly due to unequal bombardment by invisible molecules).\n+ **Collisions are perfectly elastic** (no KE lost) — if not, molecules would gradually slow and the gas would cool spontaneously, which is not observed; Brownian motion continues indefinitely.\n+ **Volume of molecules is negligible compared to the container** — gases can be compressed by large factors, implying molecules occupy a tiny fraction of the total volume.\n+ **Intermolecular forces are negligible except during collisions** — on average, molecules are very far apart relative to their size, so attractive/repulsive forces become extremely small between collisions.\n- Step 2: These assumptions are *idealisations* — real gases deviate at high pressure (molecular volume becomes significant) and low temperature (intermolecular forces cause condensation). But under normal laboratory conditions (moderate pressure, well above critical temperature), real gases like air behave nearly ideally, so the model is an excellent approximation.", "source": "GLM 5.1 ③", "_id": "glm_3_40"}, {"question": "Contrast the microscopic mechanisms of thermal conduction in a non-metallic solid versus a metallic solid. Explain why the presence of free electrons makes metals significantly better thermal conductors. (3 steps)", "answer": "- Step 1: In non-metallic solids, atoms are fixed in a lattice. When heated, they vibrate more vigorously. These vibrations are passed to neighboring atoms via intermolecular bonds (like springs connecting masses). This is a relatively slow, localized process.\n- Step 2: In metallic solids, the lattice also vibrates, but metals contain a \"sea\" of delocalised (free) electrons that are not bound to any specific atom.\n- Step 3: When the metal is heated, these free electrons gain kinetic energy and move rapidly through the lattice. They collide with atoms further away, transferring thermal energy much faster and over greater distances than lattice vibrations alone. This dual mechanism makes metals exceptional thermal conductors.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_5"}, {"question": "What is the difference between \"energy\" and \"heat\" in the modern physics view? Why is \"heat as a substance\" a misconception?", "answer": "- \"Energy\" is a property of a system (a store of the ability to do work) measured in joules.\n- \"Heat\" is not a separate thing stored in a body. The proper noun is \"thermal energy\" or \"internal energy.\" The verb-form is \"heating\" — the process of transferring energy due to a temperature difference.\n- The \"caloric\" theory (Lavoisier, 18th century) treated heat as a weightless fluid flowing from hot to cold. Rumford's cannon-boring experiments showed that mechanical work can produce heat, refuting the substance view. By the mid-19th century, Joule's work established the mechanical equivalent of heat and the conservation of energy.\n\nSo a body never \"contains heat\" — it contains internal energy, and that energy can be transferred by heating (among other routes).", "source": "MiniMax M3 ①", "_id": "minimax_1_51"}, {"question": "A student calculates the rms speed of oxygen molecules at 24 °C. They forget to convert to kelvin and use 24 K instead. Will their answer be too high or too low, and by roughly what factor? (2 steps)", "answer": "- Step 1: Since $$c_{\\text{rms}} \\propto \\sqrt{T}$$, using a smaller $$T$$ gives a smaller rms speed. 24 K is much smaller than 297 K (the correct value).\n- Step 2: The ratio is $$\\sqrt{\\frac{24}{297}} \\approx \\sqrt{0.081} \\approx 0.28$$. The calculated speed would be roughly 28% of the correct value — far too low. Always convert to kelvin before using gas-law or kinetic-theory equations.", "source": "GLM 5.1 ②", "_id": "glm_2_46"}, {"question": "Derive (walk through) the equation $$\\frac{1}{2}m\\langle c^2\\rangle = \\frac{3}{2}kT$$ by combining two fundamental gas equations. What does this equation tell us about the relationship between molecular KE and absolute temperature? (3 steps)", "answer": "- Step 1: Start with the kinetic-theory-derived equation $$pV = \\frac{1}{3}Nm\\langle c^2\\rangle$$, which comes from modelling molecular collisions with container walls using Newton's laws (momentum change per collision, rate of collisions, force = rate of momentum change, pressure = force/area).\n- Step 2: Also recall the experimentally-derived ideal gas equation $$pV = NkT$$. Since both left-hand sides equal $$pV$$, set the right-hand sides equal: $$\\frac{1}{3}Nm\\langle c^2\\rangle = NkT$$.\n+ $$N$$ cancels on both sides (it is the same gas sample): $$\\frac{1}{3}m\\langle c^2\\rangle = kT$$.\n- Step 3: Multiply both sides by $$\\frac{3}{2}$$: $$\\frac{1}{2}m\\langle c^2\\rangle = \\frac{3}{2}kT$$. This tells us the **average random kinetic energy of a gas molecule is directly proportional to the absolute temperature**. Double the kelvin temperature → double the mean KE. At $$T = 0\\,\\text{K}$$, mean KE = 0 (absolute zero = zero molecular kinetic energy, in the simple model).", "source": "GLM 5.1 ③", "_id": "glm_3_38"}, {"question": "In the pressure-vs-temperature experiment for a fixed volume of gas, the graph of $$p$$ vs $$T$$ (in kelvin) is a straight line through the origin. If the same data were plotted as $$p$$ vs $$\\theta$$ (in °C), what would the graph look like, and where would it cross the temperature axis? (2 steps)", "answer": "- Step 1: The $$p$$-vs-$$\\theta$$ graph is still a straight line (same data, just shifted axis), but it crosses the temperature axis at $$-273$$ °C (absolute zero), not at the origin.\n- Step 2: This is because $$p = 0$$ when $$T = 0$$ K, which corresponds to $$\\theta = -273$$ °C. The straight line through the origin in the kelvin plot confirms $$p \\propto T$$; the same line in Celsius is offset by 273 units.", "source": "GLM 5.1 ②", "_id": "glm_2_41"}, {"question": "A metal spoon and a wooden spoon are both at 20 °C. You hold each. The metal feels \"colder.\" Why, in particle terms? (2 steps)", "answer": "- Step 1: Both are at the same temperature, so neither is \"really\" colder than the other. But the metal is a far better *thermal conductor* — its free electrons and tightly coupled lattice transfer energy from your hand into the spoon much faster.\n- Step 2: So your hand loses internal energy quickly when touching the metal — your skin's nerve endings register \"cold.\" With the wood, the energy flow is much slower, so the hand does not cool as fast and the wood does not feel as cold.\n\nTakeaway: \"feels cold\" is about *rate* of energy loss, not temperature. Better conductor → faster heat flow out of your hand → colder feel.", "source": "MiniMax M3 ②", "_id": "minimax_2_92"}, {"question": "A heater element in a kettle heats water. In particle terms, what is happening to (a) the electrons in the element, (b) the metal ions in the element, (c) the water molecules in contact? (3 steps)", "answer": "- Step 1: Electrons in the element drift under the applied p.d., colliding with the metal ions and transferring energy. The electrons gain KE from the field and lose it in collisions.\n- Step 2: The metal ions vibrate more vigorously (their KE rises, so the element's temperature rises). The element becomes hot.\n- Step 3: The hot metal ions at the surface transfer vibrational energy to water molecules in contact by conduction (passing vibrations to the liquid). The water's mean KE rises, so its temperature rises.\n\nThree transfer steps: electrical energy → electron KE → lattice ion KE → water molecule KE. Each step is mediated by collisions and vibration passing.", "source": "MiniMax M3 ①", "_id": "minimax_1_90"}, {"question": "A 1 kg block of iron (c ≈ 450 J/(kg·K)) and a 1 kg block of water (c = 4200 J/(kg·K)) start at 20 °C. Each receives 21 kJ of energy. Which ends up hotter, and why? (2 steps)", "answer": "- Step 1: Use $$\\Delta\\theta = \\dfrac{\\Delta E}{mc}$$. For iron: $$\\Delta\\theta = 21000 / (1 \\times 450) \\approx 47 \\text{ K}$$. For water: $$\\Delta\\theta = 21000 / (1 \\times 4200) = 5 \\text{ K}$$.\n- Step 2: The iron ends up much hotter because it has a much lower specific heat capacity — it takes less energy per kg per K to raise its temperature. Water \"stores\" the same energy with only a small temperature rise.\n\nThis is why iron pans heat up quickly on a stove, and why water (with high c) is slow to heat but good for storing energy once warm (e.g., in a hot-water tank or central-heating radiator).", "source": "MiniMax M3 ①", "_id": "minimax_1_71"}, {"question": "Two blocks, one made of metal and one of plastic, have been sitting in the same room for hours. An ice cube is placed on each. The ice on the metal melts much faster. A student concludes the metal block must be \"hotter\" than the plastic block. Correct this misconception using the concepts of temperature, thermal energy transfer rate, and thermal conductivity. (3 steps)", "answer": "- Step 1: Address the temperature misconception. Because both blocks have been in the same room for hours, they are both in thermal equilibrium with the room. Therefore, they are at the exact same temperature (e.g., $$21 ^\\circ\\text{C}$$). The metal is not \"hotter.\"\n- Step 2: Define thermal conductivity. This is a material property that dictates the *rate* at which thermal energy is transferred through a substance via conduction. Metal has a vastly higher thermal conductivity than plastic.\n- Step 3: Explain the melting rate. The ice melts because thermal energy flows from the $$21 ^\\circ\\text{C}$$ block to the $$0 ^\\circ\\text{C}$$ ice. The metal block transfers this energy at a much higher rate due to its free electrons, delivering the required latent heat of fusion to the ice much faster than the plastic block, despite both starting at the same temperature.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_6"}, {"question": "How can a body's internal energy be increased by \"working\" rather than \"heating,\" and what distinguishes the two processes? (3 steps)", "answer": "- Step 1: **Heating** transfers energy because of a **temperature difference** — it is a *random* interchange of energy between particles (hot to cold).\n- Step 2: **Working** transfers energy irrespective of any temperature difference: mechanically ($$\\Delta E = F\\Delta x$$, e.g. rubbing hands, screwing into wood) or electrically ($$\\Delta E = IV\\Delta t$$, e.g. current through a resistor).\n- Step 3: Working is an **ordered** process — the force and energy transfer act in a defined direction — whereas heating is random. Both raise internal energy, but by different routes.", "source": "Opus 4.8 ①", "_id": "opus_1_54"}, {"question": "A student writes: \"The pressure of a gas increased because the gas was heated, so the molecules moved faster and exerted a bigger force on the walls.\" State the *additional* piece of information the marking scheme would want to see for full marks. (2 steps)", "answer": "- Step 1: The scheme wants the *mechanism* spelled out, not just the outcome. Two missing points: (a) the *frequency* of collisions also increases (faster molecules hit the walls more often, not just harder), and (b) the area of the walls is constant, so a bigger total force means a bigger pressure by $$p = F/A$$.\n- Step 2: So the complete chain is: heating → faster molecules → *more frequent* *and* harder collisions → greater total force on the wall → greater pressure (since area is fixed). \"Bigger force\" alone leaves out the *frequency* piece, which is a separate marking point.\n\nTakeaway: in collision chains, \"faster\" implies both *more frequent* and *harder*. Say both.", "source": "MiniMax M3 ②", "_id": "minimax_2_46"}, {"question": "A block of iron (c = 450 J/(kg·K)) at 200 °C is dropped into a well-insulated calorimeter containing 0.5 kg of water (c = 4200 J/(kg·K)) at 20 °C. The final temperature is 30 °C. Estimate the mass of the iron block. (3 steps)", "answer": "- Step 1: Energy balance — energy lost by iron = energy gained by water (assuming no loss to surroundings). $$m_\\text{Fe} c_\\text{Fe} \\Delta\\theta_\\text{Fe} = m_w c_w \\Delta\\theta_w$$.\n- Step 2: $$\\Delta\\theta_\\text{Fe} = 200 - 30 = 170 \\text{ K}$$; $$\\Delta\\theta_w = 30 - 20 = 10 \\text{ K}$$. So $$m_\\text{Fe} \\times 450 \\times 170 = 0.5 \\times 4200 \\times 10$$.\n- Step 3: $$m_\\text{Fe} \\times 76500 = 21000$$, so $$m_\\text{Fe} = 21000 / 76500 \\approx 0.27 \\text{ kg}$$. (The iron's much lower c is partially offset by the larger temperature change, giving a moderate iron mass.)\n\nThe shape of the calculation is \"what goes in = what comes out,\" but the masses are different because the specific heat capacities are very different.", "source": "MiniMax M3 ①", "_id": "minimax_1_99"}, {"question": "Contrast why an object on Earth cools easily but the same object in space does not, using the three transfer mechanisms.", "answer": "- Step 1: On Earth, a hot object cools by all three routes: **conduction** to touching surfaces, **convection** as surrounding air heats, rises and is replaced, and **radiation** of infrared.\n- Step 2: In space (vacuum), there is no medium, so **conduction and convection are both eliminated** — two of the three cooling routes vanish.\n- Step 3: Only **radiation** remains, and radiative cooling alone is often slow, so a machine that cooled fine on Earth (with air convection and liquid cooling) can overheat in space unless given a large radiating surface.", "source": "Opus 4.8 ①", "_id": "opus_1_68"}, {"question": "A gas molecule of mass m in a cubic box of side l rebounds elastically from one wall with speed component u. Show that the pressure on the wall is $$p = \\frac{m u^2}{l^3}$$ for that single component. (3 steps)", "answer": "- Step 1: Change of momentum per wall collision = $$2mu$$ (it rebounds elastically, so velocity reverses). Time to cross the box and hit the opposite wall = $$l/u$$, so the number of wall hits per second = $$u/l$$. Only half those hits are on the *same* wall, so collisions on one wall per second = $$\\frac{1}{2} \\cdot u/l$$.\n- Step 2: Force = rate of change of momentum = (collisions/s) × (Δp/collision) = $$\\frac{u}{2l} \\cdot 2mu = \\frac{mu^2}{l}$$. (Newton's second law applied to the molecule; the wall receives the equal and opposite reaction force.)\n- Step 3: Pressure = force/area = $$\\frac{mu^2/l}{l^2} = \\frac{mu^2}{l^3} = \\frac{mu^2}{V}$$, where $$V = l^3$$ is the volume. For N molecules averaged over three components, the standard result is $$pV = \\frac{1}{3}Nm\\langle c^2\\rangle$$.\n\nTakeaway: the derivation chains elastic collision → momentum change → rate of momentum change = force → divide by area = pressure. The \"tricky bit\" is the factor of 1/3 from the three independent components.", "source": "MiniMax M3 ②", "_id": "minimax_2_55"}, {"question": "Why is a \"good conductor\" not the same as a \"good radiator\" in everyday English, and how do you tell them apart in physics? (2 steps)", "answer": "- Step 1: In physics, **conductor** refers to *conduction* (transfer of energy through matter by particle vibration and/or free electrons). **Radiator** (emitter) refers to *radiation* (transfer of energy by electromagnetic waves).\n- Step 2: A shiny metal can be a good conductor of heat and a poor radiator at the same time. A rough black surface is a good radiator and may be a poor conductor. The two are independent properties; a surface is *not* required to be good at both.\n\nTakeaway: conductor = good at conduction. Emitter = good at radiation. The two are independent properties of a material/surface.", "source": "MiniMax M3 ②", "_id": "minimax_2_91"}, {"question": "A student doing the SHC practical records the initial temperature, switches on the heater, and immediately records the final temperature after 3 minutes. They notice the temperature continues to rise after switching off. Should they use the maximum temperature reached or the temperature at switch-off? Explain. (2 steps)", "answer": "- Step 1: They should use the **highest steady temperature** reached after switching off, because the thermometer lags behind the block's actual temperature.\n- Step 2: At the moment of switch-off, the block is hotter than the thermometer reads (energy is still conducting from heater to block to thermometer). The highest steady temperature is a better estimate of the block's true final temperature. Using the switch-off temperature would underestimate $$\\Delta\\theta$$, making the calculated $$c$$ too large.", "source": "GLM 5.1 ②", "_id": "glm_2_62"}, {"question": "Why is it wrong to call infrared \"a weak type of nuclear radiation\"? (3 steps)", "answer": "- Step 1: \"Radiation\" only means energy propagating away; it does not imply a nuclear source. Infrared is **electromagnetic radiation** made of photons.\n- Step 2: Ordinary thermal infrared from warm matter is produced by thermally excited charge motion, including molecular rotation/vibration and lattice vibrations, forming a broad spectrum. It is not generally an orbital-electron line transition.\n- Step 3: Alpha and beta are particle emissions from nuclear processes; gamma is electromagnetic radiation emitted in a nuclear transition. Infrared does not come from the nucleus, so calling it \"weak nuclear radiation\" is wrong.\n\nTakeaway: classify both the radiation and its source. Infrared is electromagnetic and non-nuclear in this thermal context.", "source": "MiniMax M3 ②", "_id": "minimax_2_9"}, {"question": "Why is the kelvin called an \"absolute\" temperature scale, and why is the Celsius scale not absolute? What is the mathematical relationship between them? (2 steps)", "answer": "- Step 1: The kelvin scale is absolute because its zero (0 K) corresponds to zero average molecular kinetic energy — it has a true physical meaning. The Celsius scale's zero (0 °C = 273.15 K) is arbitrarily set at the freezing point of water and has no fundamental physical significance.\n- Step 2: The conversion is $$T/\\text{K} = \\theta/\\text{°C} + 273.15$$. For temperature *differences*, $$\\Delta T = \\Delta\\theta$$ (1 K = 1 °C interval), so both units work interchangeably in $$\\Delta E = mc\\Delta\\theta$$.", "source": "GLM 5.1 ②", "_id": "glm_2_67"}, {"question": "Write the equation $$\\Delta E = L\\Delta m$$ and identify every symbol and unit. What does \"$$\\Delta m$$\" represent? (2 steps)", "answer": "- Step 1: $$\\Delta E = L\\Delta m$$ where $$\\Delta E$$ = energy transferred to change the state (J), $$L$$ = specific latent heat (J/kg), $$\\Delta m$$ = mass of substance changing state (kg).\n- Step 2: $$\\Delta m$$ is specifically the mass that undergoes the state change, not the total mass of the substance. If 0.3 kg of water boils, then $$\\Delta m = 0.3$$ kg, and the energy is $$\\Delta E = L_v \\times 0.3$$.", "source": "GLM 5.1 ②", "_id": "glm_2_24"}, {"question": "A dented ping-pong ball pops back out when placed in hot water. Explain the physics using a gas law. (3 steps)", "answer": "- Step 1: The dented ball contains a **fixed mass** of air at **roughly constant volume**; hot water heats this air.\n- Step 2: By the pressure law ($$p \\propto T$$ in kelvin), heating raises the internal air **pressure** — the faster molecules strike the ball's inner surface more often and harder.\n- Step 3: The increased internal pressure pushes outward on the dented region, and the raised force pops the dent back out into its original round shape.", "source": "Opus 4.8 ②", "_id": "opus_2_50"}, {"question": "In the aluminium-block experiment to measure specific heat capacity, the equation used is $$c = \\frac{IV\\Delta t}{m(\\theta_f - \\theta_i)}$$. List the main sources of error and, for each, state whether the measured $$c$$ comes out too large or too small, and why. (4 steps)", "answer": "- Step 1: **Energy absorbed by the heater itself** (main error). Not all supplied energy heats the block, so the block gets less energy than $$IV\\Delta t$$ counts. Since $$c = \\frac{\\Delta E}{m\\Delta\\theta}$$ and the numerator is over-counted, $$c$$ comes out **too large**.\n- Step 2: **Energy lost to the surroundings** despite lagging. Again, less energy reaches the block than is counted, so $$c$$ is **too large**.\n- Step 3: **Energy taken by the lagging and thermometer**. They absorb some energy that is not accounted for separately, so the block gets less than counted → $$c$$ **too large**.\n- Step 4: **Thermometer/meter inaccuracies**, especially when $$\\Delta\\theta$$ is small. If $$\\Delta\\theta$$ is measured too small, $$c$$ comes out too large; if measured too large, $$c$$ comes out too small. All three previous errors consistently push $$c$$ upward, so the measured value is almost always **too large**.", "source": "GLM 5.1 ②", "_id": "glm_2_18"}, {"question": "Two different gases at the same temperature are mixed in a container. Compare the average KE of the two types of molecule. Compare their rms speeds.", "answer": "- Average KE is the same: $$\\tfrac{1}{2}m\\langle c^2\\rangle = \\tfrac{3}{2}kT$$ depends only on T, not on the type of molecule.\n- So heavy molecules (larger m) have lower rms speed, and light molecules (smaller m) have higher rms speed, in inverse proportion to $$\\sqrt{m}$$.\n- After mixing, both types come to the same temperature (the same mean KE per molecule) by collisions between them. Heavier molecules move more slowly, lighter ones more quickly, but both have the same mean KE.\n\nThis is the basis for thermal equilibrium between different gases: the equilibrium condition is equal mean KE per molecule, not equal speeds.", "source": "MiniMax M3 ①", "_id": "minimax_1_102"}, {"question": "When ice at −18 °C is left to warm and eventually reach room temperature, describe the sequence of energy changes and where temperature does/doesn't change. (4 steps)", "answer": "- Step 1: **−18 °C to 0 °C (solid warming):** energy raises molecular kinetic energy; temperature rises ($$\\Delta E = mc_{ice}\\Delta\\theta$$).\n- Step 2: **At 0 °C (melting):** energy goes entirely into potential energy, breaking solid bonds; temperature stays constant ($$\\Delta E = L_f\\,\\Delta m$$).\n- Step 3: **0 °C to room temp (liquid warming):** kinetic energy rises again; temperature rises ($$\\Delta E = mc_{water}\\Delta\\theta$$).\n- Step 4: **At room temperature:** the water reaches thermal equilibrium with the room and stays there. The plateau at 0 °C is the only stage where energy in produces no temperature change.", "source": "Opus 4.8 ①", "_id": "opus_1_82"}, {"question": "\"The average kinetic energy of a gas molecule is $$\\frac{3}{2}kT$$.\" State three limits of this equation. (3 steps)", "answer": "- Step 1: It applies only to an **ideal gas** — one with negligible intermolecular forces except during perfectly elastic collisions, and a molecular volume much smaller than the container. Real gases deviate at high pressure and low temperature.\n- Step 2: It applies to **translational kinetic energy only** (motion of the centre of mass). For molecules with internal structure (rotations, vibrations), the *total* kinetic energy per molecule is higher — only the translational share is $$\\frac{3}{2}kT$$.\n- Step 3: It is a **classical** result. At very low temperatures (near 0 K), quantum effects (zero-point energy, quantised rotations) take over and the simple proportionality breaks down.\n\nTakeaway: $$\\frac{3}{2}kT$$ is the *translational* share of a *classical* *ideal* gas's kinetic energy. Outside those limits, the simple formula does not hold.", "source": "MiniMax M3 ②", "_id": "minimax_2_66"}, {"question": "Walk through the greenhouse/global-warming mechanism as it should be stated exam-tight, including the crucial wavelength change. (5 steps)", "answer": "- Step 1: The Sun emits mostly **short-wavelength** radiation (much of it visible/near-infrared), which passes through the atmosphere and reaches Earth.\n- Step 2: Earth **absorbs** this radiation and warms up.\n- Step 3: The warmed Earth **re-emits** radiation, but at a **longer wavelength (lower frequency)** infrared — this is the crux of the whole argument.\n- Step 4: Greenhouse gases (CO₂, water vapour, methane) let the Sun's incoming short-wavelength radiation through but **absorb and re-radiate** much of the outgoing longer-wavelength infrared, slowing energy escape.\n- Step 5: For millions of years absorption balanced emission (equilibrium). Extra CO₂ traps more outgoing infrared, so Earth settles at a **higher equilibrium temperature**.\n\nTakeaway: say \"different (longer) wavelength,\" not \"the atmosphere knocks radiation out.\"", "source": "Opus 4.8 ①", "_id": "opus_1_17"}, {"question": "Explain convection in a fluid, giving the full ordered particle chain. Why must the fluid itself *move* — what makes convection fundamentally different from conduction? (3 steps)", "answer": "- Step 1: The convection chain, in exam order: (1) Particles in the heated region gain energy → (2) they move faster → (3) they spread apart → (4) the region becomes *less dense* → (5) the less-dense fluid *rises*. Meanwhile, cooler fluid elsewhere is more dense and *sinks* to replace the risen fluid. The circulating flow is a **convection current**.\n+ Heating does not make particles *bigger* — it makes them spread out, so the same mass occupies more volume and density falls. (Alex's nightclub analogy: an energetic song makes people spread out on the dance floor, lowering crowd density.)\n- Step 2: Convection is fundamentally different from conduction because in convection the *fluid itself physically moves*, carrying its internal energy with it. In conduction, only vibrational energy travels — the particles stay put.\n- Step 3: Convection only works in **fluids** (liquids and gases) because only fluids can flow and circulate. Solids cannot convect because their particles are locked in place and cannot undergo bulk movement.", "source": "GLM 5.1 ③", "_id": "glm_3_14"}, {"question": "Why does using the initial gradient $$d\\theta/dt$$ of the heating curve give a better value for $$c$$ than using the overall temperature change? (3 steps)", "answer": "- Step 1: Early in heating, the block is barely above room temperature (< ~2 K), so the **rate of energy loss to surroundings is negligible**.\n- Step 2: At that point you can equate rate of electrical energy in to rate of energy gained by the block: $$IV = mc\\,\\dfrac{d\\theta}{dt}$$.\n- Step 3: Because surroundings losses are stripped out, the resulting $$c$$ is much closer to the accepted value than the crude $$IV\\Delta t/(m\\Delta\\theta)$$ method, which is inflated by losses over the whole run.", "source": "Opus 4.8 ①", "_id": "opus_1_41"}, {"question": "When a fluid is heated, why does its density fall? A student thinks the particles \"get bigger.\" Correct this using the nightclub analogy.", "answer": "- Step 1: Heating does **not** make particles bigger — individual particles keep the same size.\n- Step 2: They **move faster and spread out**, so the **same mass now occupies a larger volume**. Since density = mass/volume, the density **falls**.\n- Step 3: Analogy: on a dance floor, an energetic song makes people move more and spread out, lowering the crowd density even though no one grew larger. The lower-density warm fluid then rises above the denser cool fluid.", "source": "Opus 4.8 ①", "_id": "opus_1_26"}, {"question": "An ideal gas has internal energy that is entirely kinetic. A real gas during condensation has internal energy that includes significant potential energy. Explain why, and connect this to latent heat. (3 steps)", "answer": "- Step 1: In an ideal gas, intermolecular forces are assumed negligible — molecules only interact during brief elastic collisions. So there is no potential energy stored in bonds; internal energy is all kinetic.\n- Step 2: In a real gas (and in liquids/solids), molecules have intermolecular forces between them. These forces store potential energy — like springs being stretched and compressed.\n- Step 3: During condensation (gas → liquid), molecules come closer together and bonds form. Potential energy decreases (energy is *released*). This released energy is the **latent heat of vaporisation** — the energy that had to be supplied to break those bonds during vaporisation. That is why latent heat is associated with changes in potential energy, not kinetic energy.", "source": "GLM 5.1 ②", "_id": "glm_2_53"}, {"question": "A gas molecule has mass $$5.3 \\times 10^{-26}$$ kg. At room temperature (≈ 300 K), roughly what is its average kinetic energy? No calculator needed — estimate the order of magnitude. (2 steps)", "answer": "- Step 1: Use $$\\frac{1}{2}m\\langle c^2 \\rangle = \\frac{3}{2}kT$$. Plug in $$k \\approx 1.4 \\times 10^{-23}$$ J/K and $$T \\approx 300$$ K.\n- Step 2: $$\\frac{3}{2} \\times 1.4 \\times 10^{-23} \\times 300 \\approx \\frac{3}{2} \\times 4.2 \\times 10^{-21} \\approx 6.3 \\times 10^{-21}$$ J. So the average KE per molecule is roughly $$6 \\times 10^{-21}$$ J — an incredibly small number per molecule, but enormous in total because one mole contains exactly $$N_A=6.02214076\\times10^{23}$$ molecules (order $$10^{24}$$).", "source": "GLM 5.1 ②", "_id": "glm_2_34"}, {"question": "What makes a material a good *insulator* against conduction? Rank vacuum, gas/air, and solids, and explain why strong chemical bonds do *not* make the best insulator. (3 steps)", "answer": "- Step 1: A vacuum has no particles, so material conduction cannot occur. A gas usually conducts poorly because particles are sparse and transfer energy only through random motion and collisions.\n- Step 2: Solids vary widely. In metals, mobile delocalised electrons can transport energy rapidly; in other solids, lattice vibrations carry energy. Conductivity depends on structure, carrier mean free path, scattering, density and defects.\n- Step 3: **Do not use \"weaker bonds = better insulator\" as a universal rule.** Alex used a simplified bond-chain explanation in the lesson, but bond strength alone does not let you rank real solids. For insulation questions, rely on evidenced mechanisms such as trapped gas, a vacuum, suppressed circulation, reflective low-emissivity layers, and known material conductivity.\n\nTakeaway: vacuum/gas reasoning is robust; solid conductivity cannot be inferred from bond strength alone.", "source": "GLM 5.1 ②", "_id": "glm_2_9"}, {"question": "Distinguish \"mean square speed,\" \"root-mean-square speed,\" and \"average velocity\" of gas molecules. Why is average velocity zero?", "answer": "- Step 1: **Mean square speed** $$\\langle c^2\\rangle$$ = average of the *squares* of all molecular speeds (square each, add, divide by number).\n- Step 2: **Root-mean-square (rms) speed** $$\\sqrt{\\langle c^2\\rangle}$$ = square root of the mean square speed; it's close to (but not equal to) the average speed and is the physically meaningful \"typical\" speed.\n- Step 3: **Average velocity** is **zero** for a stationary gas, because velocity is a vector: molecules move in all directions equally, so the vector sum cancels. Speed (a magnitude) has no cancellation, which is why we use rms speed instead.", "source": "Opus 4.8 ①", "_id": "opus_1_64"}, {"question": "A sealed container of gas is heated from 300 K to 600 K at constant volume. By what factor does the pressure change? By what factor does the rms speed change? (2 steps)", "answer": "- Step 1: Pressure law: $$p \\propto T$$. Doubling $$T$$ from 300 K to 600 K **doubles** the pressure (factor of 2).\n- Step 2: Rms speed: $$c_{\\text{rms}} \\propto \\sqrt{T}$$. $$\\sqrt{\\frac{600}{300}} = \\sqrt{2} \\approx 1.41$$. The rms speed increases by a factor of **√2 ≈ 1.41**, not by a factor of 2. Pressure depends on both speed and collision frequency; speed only increases as the square root of temperature.", "source": "GLM 5.1 ②", "_id": "glm_2_60"}, {"question": "\"A solid can be heated by conduction but not by convection.\" Explain why, in terms of particle motion.", "answer": "- Convection requires the heated material to physically flow — particles have to move from one region to another, carrying their internal energy with them.\n- In a solid, particles are held in fixed positions by strong interatomic bonds. They can vibrate, but they cannot flow from one place to another.\n- A liquid can flow (so convection occurs) and a gas can flow (so convection occurs). The bulk-flow requirement is the defining feature of convection.\n\nThis is why a heating element in a solid metal block transfers heat by conduction, but the same element under a pan of water transfers heat by conduction *and* convection (the heated water rises, cooler water sinks).", "source": "MiniMax M3 ①", "_id": "minimax_1_66"}, {"question": "A solid, liquid, and gas all contain the same mass of the same substance at the same temperature. Which has the highest *internal* energy, and why? (2 steps)", "answer": "- Step 1: **The gas** has the highest internal energy. The internal energy is the sum of the random kinetic and inter-molecular potential energies of the molecules.\n- Step 2: Going from solid → liquid → gas, the inter-molecular potential energy *increases* (bonds are progressively broken or loosened), and the molecular kinetic energies are similar at the same temperature. So total internal energy is greatest in the gas and least in the solid.\n\nTakeaway: same temperature, same mass, but gas has the most internal energy because of the larger potential energy term.", "source": "MiniMax M3 ②", "_id": "minimax_2_69"}, {"question": "In the ice-melting latent-heat practical (Core Practical 13A / SME funnel method), why is a *control* funnel with no heater used alongside the heated one?", "answer": "- Step 1: Ice at 0 °C is already melting slowly just from the surrounding room, so *some* water drips out even without a heater.\n- Step 2: The **control funnel (no heater)** measures exactly this background melting from the surroundings over the same time.\n- Step 3: Subtracting the control mass ($$\\Delta m = m_A - m_B$$) isolates the mass melted **specifically by the heater's energy**, so $$L = \\dfrac{\\Delta E}{\\Delta m}$$ uses only the heater-driven melting — removing a systematic error.", "source": "Opus 4.8 ②", "_id": "opus_2_42"}, {"question": "Why is a taller water column at a given depth *not* what determines fluid pressure — and what is the correct dependence?", "answer": "- Step 1: The pressure due to a liquid column depends on the **depth**, the **liquid density**, and gravity: $$p = \\rho g \\Delta h$$ — not on the container's shape or total water volume.\n- Step 2: At a point of depth $$\\Delta h$$, the pressure comes from the weight of liquid directly above per unit area, which reduces to $$\\rho g \\Delta h$$ regardless of width.\n- Step 3: The **total** pressure at that point is $$p = p_A + \\rho g \\Delta h$$ — you must add **atmospheric pressure** $$p_A$$, and in a stationary fluid the pressure acts **equally in all directions**.", "source": "Opus 4.8 ②", "_id": "opus_2_68"}, {"question": "Temperature is often loosely said to be \"how hot something is.\" What does temperature actually measure at the particle level?", "answer": "- Step 1: At the microscopic level, particles have random kinetic energy from their motion (vibration in solids, faster movement in gases).\n- Step 2: Temperature is a measure of the **mean (average) random kinetic energy** of these particles — not the total energy, and not the potential part.\n- Step 3: This is why a large cool object can hold more total internal energy than a small hot one, yet be at a lower temperature: temperature tracks *average* KE per particle, not the sum.", "source": "Opus 4.8 ①", "_id": "opus_1_5"}, {"question": "\"Adding a 273 to °C gives K\" is a *conversion* for *absolute* temperatures, not for *intervals*. State the rule for each. (2 steps)", "answer": "- Step 1: **Absolute values**: $$T/\\text{K} = \\theta/°\\text{C} + 273.15$$ (or 273 for rough work). A temperature of 0 °C *is* 273 K.\n- Step 2: **Intervals**: 1 K = 1 °C, so $$\\Delta T = \\Delta\\theta$$. You do *not* add 273 to a temperature *change*. This is why $$\\Delta\\theta$$ in $$\\Delta E = mc\\Delta\\theta$$ can be in either unit.\n\nTakeaway: add 273 for absolute values; do nothing for intervals. Mixing these up is the most common single error with the kelvin scale.", "source": "MiniMax M3 ②", "_id": "minimax_2_86"}, {"question": "Distinguish \"energy\" as a store from \"power\" as a rate. Why is this distinction important for the SHC experiment? (2 steps)", "answer": "- Energy is a quantity (J); power is the rate at which energy is transferred (J/s = W). They are different physical quantities with different units.\n- In the SHC experiment, $$IV\\Delta t$$ is the energy supplied (J), and $$IV$$ is the power (W). The calculation uses the energy, not the power, because the SHC equation relates energy to temperature change.\n- A common student slip: substituting the power $$IV$$ directly into $$mc\\Delta\\theta$$ (without multiplying by $$\\Delta t$$). Always check that the units come out as joules before substituting.", "source": "MiniMax M3 ①", "_id": "minimax_1_62"}, {"question": "Define \"internal energy\" and distinguish it from \"temperature.\" Can two objects have the same temperature but different internal energies? (3 steps)", "answer": "- Step 1: Internal energy is the sum of the random **kinetic** energies (vibration/motion) and **potential** energies (intermolecular bonds) of all the particles in a body.\n- Step 2: Temperature is a measure of the **average random kinetic energy** per particle — it does not account for potential energy or the total number of particles.\n- Step 3: Yes — a swimming pool and a cup of tea can both be at 80 °C (same average KE per molecule), but the pool has far more internal energy because it has far more molecules. Temperature = average KE; internal energy = total KE + total PE.", "source": "GLM 5.1 ②", "_id": "glm_2_39"}, {"question": "Define specific latent heat, emphasising the condition that must always be stated. Why is the energy called \"latent\" (hidden)? (2 steps)", "answer": "- Step 1: The word-perfect definition: specific latent heat is the energy needed to change the state of 1 kg of a substance with **no change in temperature**. The \"no change in temperature\" clause is essential — without it, the definition is incomplete and loses marks.\n+ \"Specific\" = per kilogram (same rule as SHC).\n+ Fusion = solid ↔ liquid; vaporisation = liquid
