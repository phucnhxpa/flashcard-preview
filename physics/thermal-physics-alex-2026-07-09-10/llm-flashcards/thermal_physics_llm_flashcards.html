: false}, {"question": "Explain the greenhouse effect in terms of electromagnetic wavelengths, specifically addressing why incoming solar radiation passes through the atmosphere while outgoing terrestrial radiation is trapped. (4 steps)", "answer": "- Step 1: Characterize incoming solar radiation. The Sun is extremely hot and emits mostly short-wavelength radiation (visible light and near-infrared), which passes easily through the Earth's atmosphere and is absorbed by the surface.\n- Step 2: Characterize the Earth's re-emission. The Earth, being much cooler than the Sun, re-emits this absorbed energy as longer-wavelength (lower frequency) infrared radiation.\n- Step 3: Explain the atmospheric trapping. Greenhouse gases (like $$\\text{CO}_2$$, water vapour, and methane) are transparent to the short-wavelength incoming radiation but absorb and re-radiate the longer-wavelength outgoing infrared radiation.\n- Step 4: Conclude the thermal effect. This trapping reduces the rate at which energy escapes into space. To restore thermal equilibrium (where rate of energy in = rate of energy out), the Earth's surface must settle at a higher average temperature.\n+ *Misconception probe:* Infrared is electromagnetic radiation, not nuclear radiation ($$\\alpha, \\beta, \\gamma$$). Nuclear radiation originates from the nucleus, whereas infrared originates from orbital electron transitions or molecular vibrations.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "Contrast the microscopic mechanisms of thermal conduction in a non-metallic solid versus a metal, and explain why metals are vastly superior thermal conductors. (3 steps)", "answer": "- Step 1: Explain conduction in non-metals. Thermal energy is transferred purely by **lattice vibrations**. Particles in the hotter region vibrate more vigorously and pass these vibrations to neighbouring particles through intermolecular bonds.\n- Step 2: Explain conduction in metals. Metals possess **free (delocalised) electrons** in addition to the vibrating lattice. When heated, these free electrons gain kinetic energy, move rapidly through the metal lattice, and collide with atoms further away, transferring energy much faster than vibrations alone.\n- Step 3: Conclude the comparison. Because the free-electron mechanism is significantly faster and more efficient than the vibration-passing mechanism, metals are vastly superior thermal (and electrical) conductors compared to non-metals.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Two blocks of different materials sit in a $$21^\\circ\\text{C}$$ room. Identical ice cubes are placed on each. The ice on Block A melts in 12 seconds, while the ice on Block B barely melts. A student concludes Block A must be \"hotter\". Refute this conclusion using the concept of thermal conductivity. (3 steps)", "answer": "- Step 1: Establish the thermal baseline. Both blocks have been sitting in the same room and are therefore in thermal equilibrium with the room; they are both at exactly $$21^\\circ\\text{C}$$. Neither block is \"hotter\" than the other.\n- Step 2: Apply the concept of thermal conductivity. The difference in melting time is due to the rate of energy transfer. Block A is a **good thermal conductor** (likely a metal), meaning it transfers its internal energy to the ice rapidly via conduction.\n- Step 3: Explain Block B. Block B is a **thermal insulator** (likely a plastic or wood), meaning it transfers energy to the ice very slowly. The ice melts based on the *rate of energy transfer*, not the initial temperature of the blocks.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "Provide the exact causal chain, from particle-level energy gain to macroscopic fluid movement, that explains why a heated fluid rises. Include a common misconception about particle size. (5 steps)", "answer": "- Step 1: Particles in the heated region of the fluid gain thermal energy, which increases their random kinetic energy.\n- Step 2: Because they move faster, the particles collide more forcefully and spread further apart from one another.\n- Step 3: This increased separation means the same mass of fluid now occupies a larger volume, causing the macroscopic **density** of that specific region to decrease ($$\\rho = \\frac{m}{V}$$).\n- Step 4: The less dense, heated fluid experiences an upward buoyant force and rises, while the cooler, denser surrounding fluid sinks to replace it, creating a **convection current**.\n- Step 5: Address the misconception. The particles themselves *do not get bigger* (expand); rather, the *spacing* between the particles increases. Think of a dance floor: when the music gets energetic, people move more and spread out, lowering the crowd density without the people themselves growing in size.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "Why is a cold draught flowing under a door classified as convection rather than conduction, despite both involving the transfer of thermal energy? (2 steps)", "answer": "- Step 1: Define the mechanism of a draught. A draught involves the bulk, macroscopic movement of entire volumes of air (a fluid) flowing from one region to another and replacing the air that was previously there.\n- Step 2: Contrast with conduction. Conduction is the transfer of energy through particle vibrations *without* the bulk movement of the material itself. Because the air mass is physically moving and circulating, the process is strictly **convection**.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "Explain how loft insulation (thick fibre rolls) simultaneously reduces both conduction and convection, making reference to the particle model of gases. (3 steps)", "answer": "- Step 1: Explain the reduction of conduction. Gases like air have very few, widely spaced particles compared to solids, making them poor conductors. The fibre rolls **trap air**, utilizing this poor conductivity to slow down the transfer of vibrations.\n- Step 2: Explain the reduction of convection. For convection to occur, a fluid must be able to circulate in bulk. The fibres create **small, immobilised pockets** of air, physically preventing the air from circulating and forming convection currents.\n- Step 3: Conclude the dual action. By trapping air in small pockets, the insulation defeats conduction (via the sparse particles of the gas) and defeats convection (via the physical barrier of the fibres preventing bulk flow).", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "A hot computer server is placed in the vacuum of space. Explain why the \"coldness\" of space does not automatically cool the server, and design a passive thermal management system using surface properties to reject the generated heat. (4 steps)", "answer": "- Step 1: Eliminate particle-based transfer. In a vacuum, there are no particles. Therefore, **conduction** (which requires particle collisions) and **convection** (which requires bulk fluid movement) are entirely impossible.\n- Step 2: Identify the only remaining pathway. The server can only lose thermal energy via **radiation** (emitting infrared electromagnetic waves). Space itself does not \"absorb\" heat like a cold fluid; it is simply empty.\n- Step 3: Design the emitter. To maximize radiative cooling, the server's heat must be conducted internally to a large radiator panel coated in **matte black** paint, as this is the best emitter of infrared radiation.\n- Step 4: Design the shield. To prevent the server from absorbing incoming solar radiation, the side facing the Sun must be covered in a **shiny silver/reflective** layer, which is the best reflector and worst absorber of radiation.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "Conceptually, what does a high specific heat capacity imply about a material's molecular structure and its macroscopic thermal behavior, and why is water specifically chosen for central heating radiators? (3 steps)", "answer": "- Step 1: Define the microscopic implication. A high specific heat capacity means the material requires a massive amount of energy to increase the average kinetic energy of its molecules. This is often due to complex intermolecular bonds (like hydrogen bonding in water) that absorb energy as potential energy before increasing kinetic energy (temperature).\n- Step 2: Define the macroscopic behavior. Materials with high specific heat capacity heat up very slowly and, crucially, **cool down very slowly**, acting as excellent thermal energy reservoirs.\n- Step 3: Apply to water in radiators. Water has an unusually high specific heat capacity ($$c \\approx 4200 \\text{ J/(kg K)}$$). This allows it to absorb a vast amount of thermal energy at the boiler and carry it through the house, releasing it slowly over a long period as it flows through the radiators.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "In the electrical method for measuring the specific heat capacity of an aluminium block ($$c = \\frac{IV\\Delta t}{m\\Delta\\theta}$$), explain why the calculated value of $$c$$ is almost always larger than the true accepted value. (3 steps)", "answer": "- Step 1: Identify the assumption in the formula. The equation assumes that *all* electrical energy supplied ($$E = IV\\Delta t$$) goes entirely into raising the internal energy of the aluminium block ($$E = mc\\Delta\\theta$$).\n- Step 2: Identify the real-world energy losses. In practice, some energy is absorbed by the heater itself, some is transferred to the surrounding air despite lagging, and some is absorbed by the thermometer and insulation.\n- Step 3: Evaluate the mathematical consequence. Because the block actually receives *less* energy than the $$IV\\Delta t$$ calculation suggests, the actual temperature rise ($$\\Delta\\theta$$) is smaller than it would be in a perfect system. Since $$c$$ is inversely proportional to $$\\Delta\\theta$$ in the rearranged formula ($$c = \\frac{IV\\Delta t}{m\\Delta\\theta}$$), a smaller denominator results in a **calculated $$c$$ that is artificially too large**.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "When calculating the temperature change of an object given its mass, specific heat capacity, and energy transferred, what is the recommended algebraic layout to minimize errors, and why is the unit of temperature change interchangeable between Kelvin and Celsius? (3 steps)", "answer": "- Step 1: State the recommended layout. Always write the base equation first ($$\\Delta E = mc\\Delta\\theta$$), algebraically rearrange it for the target variable *before* substituting any numbers (e.g., $$\\Delta\\theta = \\frac{\\Delta E}{mc}$$), and only then plug in the values with their units. This prevents \"triangle formula\" errors and ensures dimensional consistency.\n- Step 2: Address the unit interchangeability. The specific heat capacity formula relies on a *change* in temperature ($$\\Delta\\theta$$), not an absolute temperature.\n- Step 3: Explain the scale equivalence. The Kelvin and Celsius scales have the exact same increment size. A temperature rise of $$1\\text{ K}$$ is physically identical to a temperature rise of $$1^\\circ\\text{C}$$. Therefore, $$\\Delta\\theta$$ in Kelvin is numerically equal to $$\\Delta\\theta$$ in Celsius, and no $$+273$$ or $$-273$$ conversion is needed for temperature *intervals*.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_14", "judge_pick": false}, {"question": "Explain, in terms of molecular kinetic and potential energy, why the temperature of a substance remains strictly constant during a change of state (e.g., melting or boiling) even though energy is continuously supplied. (3 steps)", "answer": "- Step 1: Define temperature microscopically. Temperature is strictly a measure of the **average random kinetic energy** of the particles in a substance.\n- Step 2: Explain the energy destination during a state change. When a substance reaches its melting or boiling point, the continuously supplied thermal energy is no longer used to increase particle speed (kinetic energy). Instead, it is used to do work against intermolecular forces, increasing the **potential energy** of the particles by breaking or loosening their bonds.\n- Step 3: Conclude the temperature effect. Because the average kinetic energy of the particles does not increase during this bond-breaking process, the macroscopic **temperature remains constant** until the entire substance has changed state.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_15", "judge_pick": false}, {"question": "On a temperature-energy heating curve for water, the plateau for boiling is significantly longer (wider) than the plateau for melting. Explain this difference in terms of intermolecular forces and the specific latent heats involved. (3 steps)", "answer": "- Step 1: Compare the physical processes. Melting (fusion) only requires enough energy to loosen the rigid intermolecular bonds so that molecules can slide past one another, while still remaining close together.\n- Step 2: Contrast with boiling. Boiling (vaporisation) requires enough energy to **completely separate** the molecules, breaking all remaining intermolecular forces so they can move freely as a gas.\n- Step 3: Relate to the graph. Because completely separating molecules requires vastly more work than just loosening them, the specific latent heat of vaporisation ($$L_v$$) is much greater than the specific latent heat of fusion ($$L_f$$). Since $$\\Delta E = L\\Delta m$$, boiling requires much more energy input, resulting in a significantly longer plateau on the heating curve.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_16", "judge_pick": false}, {"question": "A sealed, rigid container of gas is heated. Provide the step-by-step microscopic reasoning chain that explains the resulting macroscopic change in pressure, and identify two common student misconceptions in this scenario. (5 steps)", "answer": "- Step 1: Heating the gas transfers thermal energy to the particles, increasing their average random kinetic energy, which means they move **faster**.\n- Step 2: Because the particles are moving faster, they collide with the walls of the container **more frequently**.\n- Step 3: Furthermore, each individual collision involves a greater change in momentum, meaning each collision exerts a **harder (larger) force** on the wall.\n- Step 4: The total macroscopic force ($$F$$) on the walls increases. Since pressure is defined as force per unit area ($$p = \\frac{F}{A}$$) and the area ($$A$$) of the rigid container is fixed, the **pressure increases**.\n- Step 5: Address misconceptions.\n  + *Misconception 1:* \"The gas expands.\" *Correction:* The volume is fixed by the rigid container; it is the *pressure* that rises, not the volume.\n  + *Misconception 2:* \"There is more friction against the walls.\" *Correction:* Pressure is caused by discrete, elastic *collisions* and momentum transfer, not continuous fluid friction.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_17", "judge_pick": false}, {"question": "Define absolute zero in classical kinetic theory, and explain the quantum mechanical edge case (zero-point energy) that prevents particles from being completely motionless even at $$0\\text{ K}$$. (3 steps)", "answer": "- Step 1: Define classical absolute zero. In classical kinetic theory, absolute zero ($$0\\text{ K}$$ or $$-273.15^\\circ\\text{C}$$) is the theoretical lowest possible temperature, defined as the point where particles have **zero kinetic energy** and all random motion ceases.\n- Step 2: Introduce the quantum edge case. According to the Heisenberg Uncertainty Principle ($$\\Delta p \\Delta x \\ge h$$), it is impossible to know both the exact position and exact momentum of a particle simultaneously.\n- Step 3: Explain zero-point energy. If a particle were completely motionless at absolute zero, its momentum would be exactly zero (no uncertainty) and its position would be fixed (no uncertainty), violating quantum mechanics. Therefore, particles must retain a minimum, irreducible amount of kinetic energy called **zero-point energy**, meaning they never truly stop moving.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_18", "judge_pick": false}, {"question": "What is the physical significance of the Boltzmann constant ($$k$$) in the ideal gas equation ($$pV = NkT$$), and how does it bridge the microscopic and macroscopic worlds? (3 steps)", "answer": "- Step 1: Define the constant's origin. The Boltzmann constant is defined as the molar gas constant divided by Avogadro's number ($$k = \\frac{R}{N_A}$$). It represents the gas constant *per individual molecule* rather than per mole.\n- Step 2: Explain the macroscopic side. The left side of the equation ($$pV$$) deals with macroscopic, measurable bulk properties of the gas (pressure and volume).\n- Step 3: Explain the microscopic bridge. The right side ($$NkT$$) deals with the microscopic scale ($$N$$, the exact number of molecules). The constant $$k$$ acts as the conversion factor that links the microscopic average kinetic energy of individual particles to the macroscopic thermodynamic temperature ($$T$$) of the bulk gas.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_19", "judge_pick": false}, {"question": "Conceptually walk through the derivation that links the macroscopic ideal gas law ($$pV = NkT$$) to the microscopic average kinetic energy of a single gas molecule ($$\\frac{1}{2}m\\langle c^2 \\rangle = \\frac{3}{2}kT$$). (4 steps)", "answer": "- Step 1: Start with the kinetic theory pressure equation. By modeling gas molecules colliding elastically with container walls and applying Newton's laws, we derive the macroscopic pressure in terms of microscopic properties: $$pV = \\frac{1}{3}Nm\\langle c^2 \\rangle$$, where $$\\langle c^2 \\rangle$$ is the mean square speed.\n- Step 2: Equate the two expressions for $$pV$$. Since both the kinetic theory model and the empirical ideal gas law describe the same physical system, we can set them equal: $$\\frac{1}{3}Nm\\langle c^2 \\rangle = NkT$$.\n- Step 3: Simplify the equation. The number of molecules ($$N$$) cancels out from both sides. Multiplying both sides by 3 yields: $$m\\langle c^2 \\rangle = 3kT$$.\n- Step 4: Introduce kinetic energy. To match the classical mechanics formula for kinetic energy ($$E_k = \\frac{1}{2}mv^2$$), multiply both sides by $$\\frac{1}{2}$$ to get the final result: $$\\frac{1}{2}m\\langle c^2 \\rangle = \\frac{3}{2}kT$$. This proves that the average translational kinetic energy of a gas molecule is directly proportional to its absolute temperature.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_20", "judge_pick": false}, {"question": "In the experiment to measure the specific latent heat of fusion of ice using an immersion heater and a control funnel, why is a control setup (without the heater) necessary, and what systematic error occurs if the ice is not completely dry? (3 steps)", "answer": "- Step 1: Explain the control setup. Ice melts naturally at room temperature due to thermal energy transferred from the surroundings. The control funnel (without the heater) measures the mass of ice melted *only* by the surroundings.\n- Step 2: Explain the calculation correction. By subtracting the mass of water in the control beaker from the mass of water in the heater beaker ($$\\Delta m = m_{\\text{heater}} - m_{\\text{control}}$$), you isolate the exact mass of ice melted *solely* by the electrical energy supplied.\n- Step 3: Address the systematic error of wet ice. If the ice is not dried before being placed in the funnel, the extra liquid water on its surface will drip into the beaker. This makes the measured mass of melted ice ($$\\Delta m$$) artificially larger. Since $$L = \\frac{\\Delta E}{\\Delta m}$$, a larger denominator results in a calculated specific latent heat that is **too small**.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_21", "judge_pick": false}], "count": 22}, "qwen_2": {"label": "Qwen 3.7 Max ②", "cards": [{"question": "In thermodynamics, explain the fundamental distinction between \"thermal energy\" and \"heating\", and describe how this distinction dictates the direction of energy flow between two bodies in contact. (3 steps)", "answer": "- Step 1: Define thermal energy as an energy *store*. It is the total internal energy contained within a body due to the random kinetic and potential energies of its constituent particles, measured in joules ($$J$$). A body *contains* thermal energy, but it does not \"contain heat.\"\n- Step 2: Define heating as an energy *transfer pathway*. It is the process by which energy moves from a region of higher temperature to a region of lower temperature. Heating is an action, not a substance.\n- Step 3: Dictate the direction of flow. Because heating is driven by a temperature gradient, energy will always flow spontaneously from the hotter body (higher average molecular kinetic energy) to the cooler body until both reach the same temperature, a state known as thermal equilibrium.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "A hot cup of coffee is left in a cool room. Describe the concept of thermal equilibrium in terms of infrared emission and absorption rates, and explain what happens to the coffee's temperature once this state is reached. (3 steps)", "answer": "- Step 1: Initially, the hot coffee emits infrared radiation at a much higher rate than it absorbs it from the cooler room, resulting in a net loss of thermal energy and a dropping temperature.\n- Step 2: As the coffee cools, its emission rate decreases, while its absorption rate from the room remains relatively constant (assuming the room's temperature is stable). \n- Step 3: Thermal equilibrium is reached when the rate of infrared emission exactly equals the rate of infrared absorption. At this point, the net energy transfer is zero, and the coffee's temperature remains strictly constant, matching the room's temperature.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "A student claims that a shiny silver surface is the \"best emitter\" of infrared radiation because it reflects light so well. Correct this misconception by clearly distinguishing between emission, absorption, and reflection, and identify the actual best emitter/absorber surface. (4 steps)", "answer": "- Step 1: Define the terms surgically. *Emission* is giving off radiation from within the object; *absorption* is taking in incoming radiation; *reflection* is bouncing back incoming radiation without absorbing it.\n- Step 2: Address the misconception. Reflection and absorption are exact opposites. A shiny surface is an excellent reflector, meaning it bounces away incoming energy, which inherently makes it a terrible absorber.\n- Step 3: Connect absorption to emission. By Kirchhoff's law of thermal radiation (though not strictly named at A-level, the principle holds), good absorbers are inherently good emitters. Because a shiny surface is a poor absorber, it must also be a poor emitter.\n- Step 4: Identify the true best surfaces. A matte black surface is the best absorber (it traps incoming radiation) and consequently the best emitter (it radiates its internal thermal energy most effectively).", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "Two identical cans, one painted matte black and one shiny silver, are filled with boiling water and left to cool in the same room. Describe the temperature-time graphs for both, and explain how the graphs prove which surface is the better emitter. (3 steps)", "answer": "- Step 1: Visualize the graphs. Both curves start at the same high initial temperature ($$\\approx 100 ^\\circ\\text{C}$$) and decay exponentially toward room temperature. \n- Step 2: Compare the gradients. The curve for the matte black can falls much more steeply (has a more negative gradient) at any given temperature compared to the shiny silver can.\n- Step 3: Link gradient to emission. The rate of temperature drop ($$\\frac{d\\theta}{dt}$$) is directly proportional to the rate of energy loss. Because the black can loses energy faster (steeper gradient), it proves that the matte black surface is emitting infrared radiation at a higher rate than the shiny surface.\n+ *Misconception probe:* The black can does *not* get hotter than the silver can; emitting energy causes cooling, so the better emitter drops in temperature faster.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Explain the greenhouse effect by detailing the journey of electromagnetic radiation from the Sun to the Earth and back to space. Specifically, address why atmospheric gases like $$CO_2$$ trap the outgoing radiation but not the incoming radiation. (4 steps)", "answer": "- Step 1: The Sun, being extremely hot, emits high-frequency, short-wavelength electromagnetic radiation (primarily visible light and near-infrared). This short-wavelength radiation passes largely unabsorbed through the Earth's atmosphere.\n- Step 2: The Earth's surface absorbs this incoming radiation, warms up, and re-emits energy. Because the Earth is much cooler than the Sun, it emits lower-frequency, longer-wavelength infrared radiation.\n- Step 3: Greenhouse gases like $$CO_2$$ and water vapour have molecular bonds that resonate with and absorb these specific longer-wavelength infrared frequencies. \n- Step 4: The atmosphere absorbs the outgoing long-wavelength radiation and re-radiates it in all directions, including back toward the surface. This slows the rate of energy escape, forcing the Earth to settle at a higher thermal equilibrium temperature to balance the incoming solar energy.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "Contrast the microscopic mechanisms of thermal conduction in a non-metallic solid versus a metallic solid. Explain why the presence of free electrons makes metals significantly better thermal conductors. (3 steps)", "answer": "- Step 1: In non-metallic solids, atoms are fixed in a lattice. When heated, they vibrate more vigorously. These vibrations are passed to neighboring atoms via intermolecular bonds (like springs connecting masses). This is a relatively slow, localized process.\n- Step 2: In metallic solids, the lattice also vibrates, but metals contain a \"sea\" of delocalised (free) electrons that are not bound to any specific atom.\n- Step 3: When the metal is heated, these free electrons gain kinetic energy and move rapidly through the lattice. They collide with atoms further away, transferring thermal energy much faster and over greater distances than lattice vibrations alone. This dual mechanism makes metals exceptional thermal conductors.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_5", "judge_pick": true}, {"question": "Two blocks, one made of metal and one of plastic, have been sitting in the same room for hours. An ice cube is placed on each. The ice on the metal melts much faster. A student concludes the metal block must be \"hotter\" than the plastic block. Correct this misconception using the concepts of temperature, thermal energy transfer rate, and thermal conductivity. (3 steps)", "answer": "- Step 1: Address the temperature misconception. Because both blocks have been in the same room for hours, they are both in thermal equilibrium with the room. Therefore, they are at the exact same temperature (e.g., $$21 ^\\circ\\text{C}$$). The metal is not \"hotter.\"\n- Step 2: Define thermal conductivity. This is a material property that dictates the *rate* at which thermal energy is transferred through a substance via conduction. Metal has a vastly higher thermal conductivity than plastic.\n- Step 3: Explain the melting rate. The ice melts because thermal energy flows from the $$21 ^\\circ\\text{C}$$ block to the $$0 ^\\circ\\text{C}$$ ice. The metal block transfers this energy at a much higher rate due to its free electrons, delivering the required latent heat of fusion to the ice much faster than the plastic block, despite both starting at the same temperature.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_6", "judge_pick": true}, {"question": "Provide the step-by-step microscopic particle chain that explains why a fluid rises when heated from below. Explicitly link particle motion to macroscopic density changes, avoiding the misconception that the particles themselves expand. (5 steps)", "answer": "- Step 1: Particles in the heated region gain thermal energy, which increases their kinetic energy, causing them to move/vibrate faster.\n- Step 2: This increased motion causes the particles to collide more forcefully and push further apart from one another, increasing the volume of that specific region of the fluid.\n- Step 3: Because the mass of the fluid in that region remains the same but its volume increases, the macroscopic density ($$\\rho = \\frac{m}{V}$$) of the heated region decreases.\n+ *Misconception probe:* The individual particles do *not* expand in size; the space *between* them increases.\n- Step 4: The less dense, heated fluid experiences an upward buoyant force from the surrounding cooler, denser fluid, causing it to rise.\n- Step 5: Cooler, denser fluid moves in to replace the risen fluid, creating a continuous circulation known as a convection current.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "Explain why trapping air in small pockets (like in loft insulation or double glazing) is a highly effective method of thermal insulation. Detail how this specific physical arrangement simultaneously defeats two different heat transfer mechanisms. (3 steps)", "answer": "- Step 1: Defeating conduction. Air is a gas with widely spaced particles, meaning it has very few particles per unit volume to pass on lattice vibrations. Therefore, air itself is a very poor thermal conductor.\n- Step 2: Defeating convection. If air is in a large open space, it can form convection currents (hot air rising, cold air sinking), which rapidly transfers heat. By trapping the air in *small, immobilised pockets* (within fibers or between glass panes), the bulk flow of the fluid is physically prevented.\n- Step 3: Synthesis. By minimizing conduction (via the sparse particles of air) and eliminating convection (via the small pocket size), the trapped air acts as a highly effective thermal barrier.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "A high-power computer server is placed in the vacuum of space. Explain why the \"coldness\" of space does not automatically cool the server, and design a passive thermal management system using surface properties to reject the generated heat while minimizing solar heating. (4 steps)", "answer": "- Step 1: Explain the vacuum limitation. Heat transfer requires a medium for conduction (particle collisions) and convection (fluid bulk flow). In the vacuum of space, there are no particles, so both conduction and convection are strictly zero. The server cannot \"dump\" heat into the cold vacuum.\n- Step 2: Identify the only cooling pathway. The server can only lose thermal energy via infrared radiation (electromagnetic waves), which does not require a medium.\n- Step 3: Design the heat rejection system. Route the internal heat via conduction to large external radiator panels. Paint these panels matte black to maximize their emissivity, allowing them to radiate infrared energy into space as efficiently as possible.\n- Step 4: Design the solar shielding. Cover the sun-facing sides of the server with highly reflective, shiny silver foil. This ensures that incoming short-wavelength solar radiation is reflected rather than absorbed, minimizing the thermal energy input the radiators must handle.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "Define specific heat capacity and use the concept of molecular degrees of freedom or intermolecular bonds to intuitively explain why water has a much higher specific heat capacity ($$ \\approx 4200 \\text{ J/(kg K)} $$) compared to a metal like copper ($$ \\approx 390 \\text{ J/(kg K)} $$). (3 steps)", "answer": "- Step 1: Define specific heat capacity ($$c$$). It is the amount of energy required to raise the temperature of $$1 \\text{ kg}$$ of a substance by $$1 \\text{ K}$$ (or $$1 ^\\circ\\text{C}$$).\n- Step 2: Analyze copper. In a solid metal, added thermal energy primarily increases the vibrational kinetic energy of the atoms in the lattice. Almost all the supplied energy goes directly into raising the temperature.\n- Step 3: Analyze water. Water molecules are held together by strong hydrogen bonds. When energy is added to water, a significant portion of it goes into doing work to stretch and distort these intermolecular bonds (increasing potential energy) and exciting rotational/vibrational modes of the complex $$H_2O$$ molecule, rather than just increasing translational kinetic energy. Therefore, it takes much more total energy to achieve the same $$1 \\text{ K}$$ rise in average translational kinetic energy (temperature).", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "In the electrical method for measuring the specific heat capacity of an aluminium block, the calculated value is almost always higher than the accepted true value. Identify the primary physical reason for this systematic error and explain mathematically why it causes the calculated $$c$$ to be too large. (3 steps)", "answer": "- Step 1: Identify the primary error. The electrical heater itself absorbs some of the generated thermal energy, and some energy is lost to the surrounding air and the insulation lagging, rather than all of it entering the aluminium block.\n- Step 2: Analyze the mathematical impact. The calculation assumes all electrical energy supplied ($$E = IV\\Delta t$$) goes into the block, so we use $$c = \\frac{E}{m\\Delta\\theta}$$. Because of the losses, the actual energy absorbed by the block is less than $$E$$, meaning the actual temperature rise ($$\\Delta\\theta$$) is smaller than it would be in a perfect system.\n- Step 3: Conclude the effect on $$c$$. In the formula $$c = \\frac{E}{m\\Delta\\theta}$$, the measured $$\\Delta\\theta$$ is in the denominator. A smaller measured $$\\Delta\\theta$$ results in a mathematically larger calculated value for $$c$$, making it higher than the true specific heat capacity.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_11", "judge_pick": false}, {"question": "If it takes $$2000 \\text{ J}$$ to raise the temperature of a $$2 \\text{ kg}$$ block of an unknown material by $$5 \\text{ K}$$, what is its specific heat capacity? If you double the mass to $$4 \\text{ kg}$$ and want the same $$5 \\text{ K}$$ temperature rise, how much energy is required? (3 steps)", "answer": "- Step 1: Calculate the specific heat capacity using $$c = \\frac{\\Delta E}{m \\Delta \\theta}$$. Substituting the values: $$c = \\frac{2000}{2 \\times 5} = \\frac{2000}{10} = 200 \\text{ J/(kg K)}$$.\n- Step 2: Analyze the proportional relationship. The equation $$\\Delta E = mc\\Delta\\theta$$ shows that energy is directly proportional to mass when $$c$$ and $$\\Delta\\theta$$ are held constant.\n- Step 3: Calculate the new energy requirement. If the mass is doubled from $$2 \\text{ kg}$$ to $$4 \\text{ kg}$$, the energy required must also exactly double. Therefore, the new energy required is $$2 \\times 2000 \\text{ J} = 4000 \\text{ J}$$.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_12", "judge_pick": false}, {"question": "Define specific latent heat and explain, in terms of molecular kinetic and potential energy, why the temperature of a substance remains strictly constant during a change of state (e.g., melting or boiling) even though energy is continuously being supplied. (3 steps)", "answer": "- Step 1: Define specific latent heat ($$L$$). It is the energy required to change the state of $$1 \\text{ kg}$$ of a substance without any change in temperature.\n- Step 2: Explain the energy distribution. During a change of state, the supplied thermal energy does not increase the random kinetic energy of the molecules. Instead, it does work against the intermolecular forces, increasing the *potential energy* of the system as bonds are loosened (melting) or completely broken (boiling).\n- Step 3: Link to temperature. Because temperature is strictly a measure of the *average random kinetic energy* of the particles, and the kinetic energy is not increasing during the phase change, the macroscopic temperature remains perfectly constant until the entire substance has changed state.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "For any given substance, the specific latent heat of vaporisation ($$L_v$$) is always significantly larger than the specific latent heat of fusion ($$L_f$$). Explain this inequality by comparing the microscopic work done against intermolecular forces during melting versus boiling. (3 steps)", "answer": "- Step 1: Analyze fusion (melting). During melting, energy is supplied to loosen the rigid intermolecular bonds just enough so that molecules can slide past one another. The molecules remain relatively close together, and the intermolecular forces are still significant.\n- Step 2: Analyze vaporisation (boiling). During boiling, energy must be supplied to completely separate the molecules until they are infinitely far apart relative to their size, reducing the intermolecular forces to effectively zero.\n- Step 3: Compare the work done. Completely breaking the bonds and pushing the molecules far apart against atmospheric pressure requires vastly more work (energy) than merely loosening the bonds to allow flow. Therefore, $$L_v \\gg L_f$$.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_14", "judge_pick": false}, {"question": "Sketch or describe the temperature-energy graph for a substance heated from a solid below its melting point to a gas above its boiling point. Identify which equations govern the sloped sections versus the flat plateaus, and explain why the boiling plateau is much longer than the melting plateau. (4 steps)", "answer": "- Step 1: Describe the graph shape. The graph consists of three upward-sloping diagonal lines (solid warming, liquid warming, gas warming) separated by two horizontal flat plateaus (melting and boiling).\n- Step 2: Identify the sloped sections. The diagonal sections represent a single phase where temperature rises. These are governed by the specific heat capacity equation: $$\\Delta E = mc\\Delta\\theta$$.\n- Step 3: Identify the flat plateaus. The horizontal sections represent changes of state where temperature is constant. These are governed by the specific latent heat equation: $$\\Delta E = L\\Delta m$$.\n- Step 4: Explain the plateau lengths. The length of the plateau represents the total energy required ($$\\Delta E$$). Because the specific latent heat of vaporisation is much greater than the specific latent heat of fusion ($$L_v \\gg L_f$$), the boiling plateau requires significantly more energy and is therefore drawn much longer on the energy axis than the melting plateau.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_15", "judge_pick": true}, {"question": "A sealed, rigid container of gas is heated. Walk through the microscopic kinetic theory chain to explain why the macroscopic pressure increases. Explicitly connect particle speed to collision frequency, collision force, and the definition of pressure. (5 steps)", "answer": "- Step 1: Heating the gas transfers thermal energy to the particles, increasing their average random kinetic energy, which means they move at higher speeds.\n- Step 2: Because the particles are moving faster, they travel across the container more quickly, resulting in more frequent collisions with the container walls per second.\n- Step 3: Furthermore, because they are moving faster, each individual collision involves a greater change in momentum ($$\\Delta p$$), meaning each collision exerts a harder (larger) force on the wall.\n- Step 4: The combination of more frequent collisions and harder collisions results in a significantly greater total force ($$F$$) exerted on the walls.\n- Step 5: Pressure is defined as force per unit area ($$p = \\frac{F}{A}$$). Since the total force increases and the area of the rigid container remains constant, the macroscopic pressure must increase.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_16", "judge_pick": false}, {"question": "State Boyle's Law and explain the physical mechanism behind it. If the volume of a fixed mass of gas at constant temperature is halved, what happens to the pressure and why, in terms of particle collisions with the container walls? (3 steps)", "answer": "- Step 1: State Boyle's Law. For a fixed mass of gas at a constant temperature, the pressure is inversely proportional to its volume ($$p \\propto \\frac{1}{V}$$, or $$p_1V_1 = p_2V_2$$).\n- Step 2: Explain the mechanism of halving the volume. If the volume is halved, the same number of particles are now confined to half the space. The average distance a particle must travel before hitting a wall is halved.\n- Step 3: Connect to pressure. Because the distance is halved, the particles hit the walls twice as often (collision frequency doubles). Since the temperature is constant, their speed and the force per collision remain the same. Doubling the collision frequency doubles the total force on the walls, thereby exactly doubling the pressure.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_17", "judge_pick": false}, {"question": "Define absolute zero in terms of molecular kinetic energy. Explain why the Kelvin scale is considered an \"absolute\" thermodynamic scale and why a temperature change of $$1 \\text{ K}$$ is exactly equivalent to a temperature change of $$1 ^\\circ\\text{C}$$. (3 steps)", "answer": "- Step 1: Define absolute zero ($$0 \\text{ K}$$). It is the lowest theoretically possible temperature, the point at which the particles of a substance have their minimum possible internal energy (in classical kinetic theory, their random translational kinetic energy is exactly zero).\n- Step 2: Explain the \"absolute\" nature. The Kelvin scale starts at this absolute physical limit ($$0 \\text{ K}$$), meaning there are no negative temperatures. It is directly proportional to the average kinetic energy of the particles ($$E_k \\propto T$$), unlike the Celsius scale which is based on the arbitrary freezing point of water.\n- Step 3: Explain the equivalence of intervals. The Kelvin scale was deliberately designed so that the size of one unit ($$1 \\text{ K}$$) is exactly equal to the size of one degree Celsius ($$1 ^\\circ\\text{C}$$). Therefore, while the absolute values differ by $$273.15$$, any *change* in temperature ($$\\Delta T$$) is numerically identical in both scales ($$\\Delta T = \\Delta \\theta$$).", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_18", "judge_pick": false}, {"question": "The ideal gas equation is given by $$pV = NkT$$. Explain the physical meaning of the Boltzmann constant $$k$$ in this context, and describe how this equation synthesizes the macroscopic properties of a gas with its microscopic particle count. (3 steps)", "answer": "- Step 1: Define the Boltzmann constant ($$k$$). It is the gas constant per individual molecule ($$k = \\frac{R}{N_A}$$), with a value of $$1.38 \\times 10^{-23} \\text{ J/K}$$. It acts as the bridge between the microscopic energy of a single particle and the macroscopic temperature of the bulk gas.\n- Step 2: Synthesize the left side ($$pV$$). The product of macroscopic pressure and volume represents the macroscopic state of the gas container and the total work/energy capacity of the gas bulk.\n- Step 3: Synthesize the right side ($$NkT$$). This represents the microscopic reality: the total number of individual molecules ($$N$$) multiplied by the thermal energy scale per molecule ($$kT$$). The equation proves that the macroscopic $$pV$$ product is directly proportional to the total number of microscopic particles and their absolute temperature.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_19", "judge_pick": false}, {"question": "Starting from the kinetic theory pressure equation $$pV = \\frac{1}{3}Nm\\langle c^2 \\rangle$$ and the ideal gas equation $$pV = NkT$$, derive the expression for the average translational kinetic energy of a gas molecule. Explain the profound physical significance of this result regarding temperature. (4 steps)", "answer": "- Step 1: Equate the two expressions for $$pV$$. Since both equal $$pV$$, we can write: $$\\frac{1}{3}Nm\\langle c^2 \\rangle = NkT$$.\n- Step 2: Simplify the equation. Cancel the number of molecules ($$N$$) from both sides to get: $$\\frac{1}{3}m\\langle c^2 \\rangle = kT$$.\n- Step 3: Introduce the kinetic energy formula. The kinetic energy of a single particle is $$E_k = \\frac{1}{2}mv^2$$. To make the left side look like kinetic energy, multiply both sides of the equation by $$\\frac{3}{2}$$: $$\\frac{1}{2}m\\langle c^2 \\rangle = \\frac{3}{2}kT$$.\n- Step 4: State the physical significance. The left side ($$\\frac{1}{2}m\\langle c^2 \\rangle$$) is the average translational kinetic energy of a single gas molecule. The equation proves that the average kinetic energy of gas molecules is *directly proportional* to the absolute thermodynamic temperature ($$E_k \\propto T$$). Temperature is literally a macroscopic measure of microscopic kinetic energy.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_20", "judge_pick": false}, {"question": "Distinguish between the \"mean square speed\" $$\\langle c^2 \\rangle$$ and the \"root-mean-square speed\" $$c_{rms}$$ of gas molecules. Explain why we use the mean square speed in kinetic theory derivations rather than the simple average velocity. (3 steps)", "answer": "- Step 1: Define mean square speed ($$\\langle c^2 \\rangle$$). It is calculated by squaring the speed of every individual molecule, and then finding the mathematical average (mean) of all those squared values.\n- Step 2: Define root-mean-square speed ($$c_{rms}$$). It is simply the square root of the mean square speed ($$c_{rms} = \\sqrt{\\langle c^2 \\rangle}$$). It provides a value with the correct units of speed ($$\\text{m/s}$$) and is roughly comparable to the average speed.\n- Step 3: Explain the derivation necessity. In kinetic theory, the force exerted on a wall depends on the change in momentum ($$mv$$) and the collision frequency (which also depends on $$v$$). Multiplying these together means the force is proportional to $$v \\times v = v^2$$. Therefore, the total pressure depends on the average of the *squares* of the speeds ($$\\langle c^2 \\rangle$$), not the square of the average speed. (Also, the simple average *velocity* is zero because particles move randomly in all directions, canceling out vectorially).", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_21", "judge_pick": false}, {"question": "A fixed mass of ideal gas is at a pressure of $$100 \\text{ kPa}$$ and a temperature of $$300 \\text{ K}$$. If the gas is heated at constant volume until its pressure doubles to $$200 \\text{ kPa}$$, what is its new temperature in Kelvin? If the temperature is then kept constant and the volume is tripled, what is the final pressure? (3 steps)", "answer": "- Step 1: Solve the constant volume heating (Pressure Law). Pressure is directly proportional to absolute temperature ($$p \\propto T$$). If the pressure doubles from $$100 \\text{ kPa}$$ to $$200 \\text{ kPa}$$, the absolute temperature must also exactly double. The new temperature is $$2 \\times 300 \\text{ K} = 600 \\text{ K}$$.\n- Step 2: Set up the constant temperature expansion (Boyle's Law). The gas is now at $$200 \\text{ kPa}$$ and $$600 \\text{ K}$$. Pressure is inversely proportional to volume ($$p \\propto \\frac{1}{V}$$).\n- Step 3: Calculate the final pressure. If the volume is tripleed ($$V \\rightarrow 3V$$), the pressure must be divided by three. The final pressure is $$\\frac{200 \\text{ kPa}}{3} \\approx 66.7 \\text{ kPa}$$.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_22", "judge_pick": false}, {"question": "In the experiment to determine the specific latent heat of fusion of ice, a control funnel containing crushed ice (but no heater) is set up alongside the experimental funnel. Explain the purpose of this control and how it improves the accuracy of the calculated latent heat. (3 steps)", "answer": "- Step 1: Identify the hidden energy source. Even without a heater, the ice in the funnel will melt slightly because it absorbs thermal energy from the warmer surrounding room air.\n- Step 2: Explain the control's purpose. The control funnel measures exactly how much ice melts purely due to background room heating over the duration of the experiment.\n- Step 3: Improve accuracy. By subtracting the mass of water collected in the control funnel from the mass of water collected in the experimental funnel, you isolate the exact mass of ice that melted *only* due to the electrical heater. This prevents the calculated latent heat from being artificially skewed by unmeasured environmental energy transfer.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_23", "judge_pick": false}, {"question": "Contrast the internal energy of an ideal gas with that of a real gas. Explain why the internal energy of an ideal gas is considered to be entirely kinetic, referencing the specific assumptions of the kinetic theory model. (3 steps)", "answer": "- Step 1: Define real gas internal energy. A real gas has internal energy consisting of both the random kinetic energy of its molecules (due to motion) and the potential energy (due to intermolecular attractive/repulsive forces between the molecules).\n- Step 2: State the ideal gas assumption. The kinetic theory model for an ideal gas explicitly assumes that intermolecular forces are completely negligible, except during the infinitesimally short duration of a collision.\n- Step 3: Conclude the ideal gas internal energy. Because there are assumed to be no intermolecular forces, there is no potential energy associated with molecular separation. Therefore, the internal energy of an ideal gas is strictly and entirely the sum of the random kinetic energies of its molecules, making it directly proportional to the absolute temperature.", "source": "Qwen 3.7 Max ②", "_id": "qwen_2_24", "judge_pick": false}], "count": 25}, "minimax_1": {"label": "MiniMax M3 ①", "cards": [{"question": "In the Edexcel IAL thermal energy chapter, what is the precise distinction between a \"thermal energy store\" and \"heating\" as an energy transfer pathway? (3 steps)", "answer": "- Step 1: A \"store\" is somewhere energy sits and can be measured in joules. Thermal energy is one such store — it is the internal energy of a body's particles (random KE + bond PE).\n- Step 2: A \"transfer pathway\" describes how energy moves between stores. Heating is the transfer of thermal energy from a higher-temperature body to a lower-temperature body.\n- Step 3: They are different categories entirely. A kettle contains thermal energy in its store; the process by which that energy leaves the kettle into the room is \"heating by conduction/convection/radiation.\"\n\nNever say a body \"contains heat.\" Heat is not a store. The board circled \"thermal\" and \"heating\" as separate things linked by a line for exactly this reason.", "source": "MiniMax M3 ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "List the seven main energy stores used in the Edexcel IAL specification, and the four main energy transfer pathways, in their correct categories.", "answer": "- Stores (where energy sits): kinetic (KE), gravitational potential (GPE), elastic (strain), chemical, thermal, nuclear, (electro)magnetic.\n- Transfer pathways (how energy moves): heating, electrically, radiation (waves — light, sound…), mechanically (force × distance).\n- The classic error is mixing the two lists. A body has a thermal store; it can transfer that energy by the heating pathway (and also by the other three, but those don't use \"heating\" as the noun).\n\nThe exam will sometimes ask \"which transfer pathway?\" and the answer is a verb-phrase, not a noun.", "source": "MiniMax M3 ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "Define \"thermal equilibrium\" precisely in two parts: the rate condition and the temperature condition.", "answer": "- Rate condition: the body radiates (emits) energy at exactly the same rate as it absorbs it.\n- Temperature condition: because energy in = energy out, the internal energy is not changing, so the average KE of the particles is constant, so the temperature is constant.\n- Equilibrium does NOT mean emission has stopped. A body at equilibrium still emits IR; it just absorbs equally. Net transfer = 0, temperature holds.", "source": "MiniMax M3 ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "What is the formula for pressure, what is its SI unit, and how would you correct someone who says \"pressure = mass ÷ volume\"?", "answer": "- Pressure $$p = \\dfrac{F}{A}$$ — force per unit area.\n- SI unit: pascal (Pa) = $$\\text{N/m}^2$$.\n- \"Mass ÷ volume\" is density $$\\rho = m/V$$, an entirely different quantity. Pressure is about how a force is spread over an area; density is about how mass is packed into a volume. Conflating them is one of the most common AS-level slips.\n\nA heavy person on a narrow heel can have a much higher contact pressure than a light person on a wide sole, even though densities are similar.", "source": "MiniMax M3 ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "A sealed rigid container of gas is heated from 20 °C to 80 °C. Walk through, in particle terms, what happens to the pressure and why. (4 steps)", "answer": "- Step 1: Heating transfers energy to the gas particles, raising their average kinetic energy — they move faster.\n- Step 2: Faster particles make more frequent collisions with the walls of the container.\n- Step 3: Each collision also exerts a larger force on the wall (the change in momentum per collision is greater).\n- Step 4: Total wall force rises. Since $$p = F/A$$ and A is fixed (rigid container), pressure rises. Volume cannot change, so the gas cannot expand — pressure is the only thing that can change.\n\nAvoid saying the gas \"expands\" (it's fixed volume) or that there is \"more friction into the boxes\" (the right phrase is \"more frequent collisions with the walls\").", "source": "MiniMax M3 ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "In the Herschel experiment, what exactly did Herschel do, and what did he conclude?", "answer": "- Step 1: He passed white light through a prism, splitting it into the visible colours.\n- Step 2: He placed thermometers in each colour band, and one thermometer just beyond the red end of the visible spectrum (where no colour is visible).\n- Step 3: The thermometer beyond red showed the largest temperature rise.\n- Step 4: Conclusion: there is invisible radiation beyond red that carries heat. This is infrared radiation.\n\nInfrared is specifically just beyond the red end of the visible spectrum. It is not \"anything invisible\" — ultraviolet, X-rays, microwaves and radio waves are also invisible but are not infrared.", "source": "MiniMax M3 ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "State the three key facts about infrared emission and absorption that the examiner always wants.", "answer": "- Fact 1: All objects emit and absorb infrared radiation all the time.\n- Fact 2: The hotter an object is, the more infrared it emits.\n- Fact 3: The only case in which an object would emit no infrared is at 0 K (absolute zero), where particle motion is minimal. Since 0 K is unattainable, everything emits some IR.\n\nA common misconception is \"cold objects don't emit IR.\" They do — just less than warm ones.", "source": "MiniMax M3 ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "Compare the emission-vs-absorption balance for (a) a cooling object, (b) a heating object, and (c) an object in thermal equilibrium. (3 steps)", "answer": "- Step 1: A cooling object emits more IR per second than it absorbs, so its internal energy is falling and its temperature is dropping.\n- Step 2: A heating object absorbs more IR per second than it emits, so internal energy rises and temperature rises.\n- Step 3: At thermal equilibrium, the rate of emission equals the rate of absorption, internal energy is constant, and the temperature is constant. (The object still emits — emission has not stopped — it just equals absorption.)", "source": "MiniMax M3 ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "Compare black/matt surfaces and white/shiny surfaces for emission, absorption, and reflection of infrared. Which \"goes together\" and which are opposites?", "answer": "- Black/matt: best emitter, best absorber, poor reflector.\n- White/shiny: worst emitter, worst absorber, best reflector.\n- Good emitters are good absorbers — these two \"go together\" because both processes depend on how well a surface interacts with IR.\n- Best reflector is the opposite of best absorber. So a shiny surface, being the best reflector, is automatically the worst emitter and the worst absorber.\n\nKeep the three verbs separate: **emit** = give off; **absorb** = take in; **reflect** = bounce back incoming radiation.", "source": "MiniMax M3 ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "Two identical cans, one matt black and one shiny silver, are filled with water at the same high temperature and left to cool. (a) Which cools faster? (b) How would the temperature-time graphs show it? (2 steps)", "answer": "- Step 1: The matt black can cools faster. Black is the best emitter of IR, so it loses energy as IR more quickly than the shiny can.\n- Step 2: On a temperature-time graph, the black can's cooling curve falls more steeply; the silver can's curve falls more slowly. Both curves level off toward room temperature, where they reach thermal equilibrium (emission rate = absorption rate).\n\nA student error is \"the strong emitter gets hotter.\" No — giving off energy cools an object. Infer emission from the rate of cooling, never from a claim the emitter heats up.", "source": "MiniMax M3 ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "A student argues that a shiny silver can of hot water should \"give off more heat\" because shiny surfaces are \"best reflectors\" and good at something. Where is the conflation?", "answer": "- The conflation is between reflection and emission. Reflection requires an external source of incoming radiation to bounce back; the can is not the source in that case.\n- In this experiment, the source of energy is the hot water inside the can. The relevant property is emission, not reflection. A shiny surface is a poor emitter, so the silver can actually gives off less IR.\n- The two statements \"best reflector\" and \"best emitter\" are opposites for the same surface, not the same thing.\n\nIf the experiment instead had a hot lamp shining on the cans, the shiny can would reflect more of the lamp's radiation. Different setup, different verdict.", "source": "MiniMax M3 ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "A student writes: \"Infrared is a type of nuclear radiation, but a weak one.\" Correct this and explain the correct origin of infrared.", "answer": "- Infrared is electromagnetic radiation, not nuclear radiation. It is emitted when an orbital electron drops to a lower energy level in an atom and releases a photon.\n- Nuclear radiation specifically means alpha, beta or gamma radiation, emitted from the nucleus of an atom.\n- \"Radiation\" by itself just means \"something is given off\" or \"energy is carried away.\" Always specify which kind: electromagnetic vs nuclear.\n- Calling IR \"weak\" is also wrong — IR is just one band of the EM spectrum; it isn't intrinsically weak, just invisible to our eyes.", "source": "MiniMax M3 ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "In a sealed room, two objects at the same temperature are sitting side by side. One is shiny silver, the other is matt black. The room is dark. Will the black object \"look brighter\" on an IR camera? Why or why not? (2 steps)", "answer": "- Step 1: Yes, the matt black object appears brighter on the IR camera. An IR camera detects emitted IR, and at the same temperature the black surface emits more IR than the shiny one.\n- Step 2: This is exactly the demo from lesson 1 — both objects are at the same temperature (so both have the same mean particle KE), but their surface properties differ. Black surfaces are the best emitters, so they radiate more IR for a given temperature.\n\nEven in a \"dark\" room with no external IR source, both objects still emit IR — emission does not require an external source, absorption does.", "source": "MiniMax M3 ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "Describe, in particle terms, how conduction transfers heat through a solid. (3 steps)", "answer": "- Step 1: All particles in a solid vibrate about fixed positions all the time. At the hot end, particles vibrate faster because they have more KE.\n- Step 2: These faster-vibrating particles push on their neighbours, transferring some of their vibrational energy to them. The neighbours then vibrate more and pass it on.\n- Step 3: Energy travels through the solid as a wave of increasing vibration, while the particles themselves stay roughly in place. No particle physically moves from one end to the other.\n\nAnalogy: people linking arms; one shakes, the next shakes, and so on down the line.", "source": "MiniMax M3 ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "Why are metals much better thermal conductors than non-metals, in particle terms? (3 steps)", "answer": "- Step 1: All solids conduct by passing vibrations between neighbouring particles, but this is slow because each particle only nudges its immediate neighbour.\n- Step 2: Metals also contain free (delocalised) electrons — electrons that are not bound to a particular atom and can move freely through the metal lattice.\n- Step 3: At the hot end, vibrating atoms knock these free electrons, which fly through the lattice and collide with atoms further along, dumping their KE into the lattice. Energy is carried rapidly across the whole metal, much faster than vibration passing alone.\n\nThis is why copper, aluminium, silver and gold are excellent thermal conductors, while wood, plastic, rubber and glass are not.", "source": "MiniMax M3 ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "Why are good electrical conductors also good thermal conductors? Use the free-electron picture in your answer.", "answer": "- Both electrical and thermal conduction in a metal depend on the same free (delocalised) electrons.\n- In electrical conduction, an applied p.d. gives the electrons a net drift in one direction, producing a current.\n- In thermal conduction, random motion of electrons plus lattice vibrations carries energy from hot regions to cold regions.\n- Because the same free electrons do both jobs, a metal that conducts electricity well (high electron mobility) also conducts heat well. This is why the rankings for thermal and electrical conductivity of metals are similar.", "source": "MiniMax M3 ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "Define convection precisely. Why does convection occur only in fluids?", "answer": "- Convection is heat transfer in fluids (liquids or gases) by the bulk movement of the heated fluid itself, carrying its internal energy with it.\n- It can only occur in fluids because fluids can flow. In a solid, particles are locked in fixed positions by strong bonds and cannot physically move from one place to another, so the bulk-flow mechanism is impossible.\n- Conduction (vibrations passed between fixed particles) can occur in solids, but convection cannot. Conduction can also occur in fluids, but is usually dominated by convection in liquids and gases.", "source": "MiniMax M3 ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "Give, in order, the particle-level causal chain that explains why a region of heated fluid rises. (5 steps)", "answer": "- Step 1: Particles in the heated region gain thermal energy.\n- Step 2: Their average kinetic energy rises, so they move faster.\n- Step 3: Faster-moving particles spread further apart from each other.\n- Step 4: The same mass now occupies a larger volume, so the density of that region falls.\n- Step 5: The lower-density (warmer) region is pushed upward by the cooler, denser fluid around it. Cooler fluid sinks to replace it — this circulating flow is a convection current.", "source": "MiniMax M3 ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "A student says: \"When air is heated, the particles get bigger, that's why the air rises.\" Correct the misconception in particle terms.", "answer": "- The particles themselves do not get bigger. Individual atoms do not expand.\n- What changes is the separation between particles. With more KE, particles move faster and on average occupy more space per particle. The spacing grows.\n- The mass per unit volume (density) of the region falls, even though each particle's mass is unchanged. The less-dense region is buoyant relative to the surrounding cooler, denser air and rises.\n\nAlex's analogy: a dance floor with an energetic song — people move more and spread out, so the crowd density in that area falls. The people did not grow.", "source": "MiniMax M3 ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "Explain, in particle terms, the formation of a daytime sea breeze. (4 steps)", "answer": "- Step 1: The Sun's radiation heats the land faster than the sea, because land has a lower specific heat capacity and shallower depth.\n- Step 2: The land surface heats the air immediately above it by conduction (vibrations passed from the warm ground to the air particles).\n- Step 3: That hot air becomes less dense and rises.\n- Step 4: Cooler air over the sea flows in to replace it. The bulk flow of air from sea to land is the sea breeze — a convection current set up by the temperature difference.\n\nAt night the temperature differences reverse (sea is now warmer than land), so the breeze reverses direction — a land breeze.", "source": "MiniMax M3 ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "Why is a vacuum the best possible insulator against conduction and convection?", "answer": "- Conduction requires particles in contact to pass vibrations to. A vacuum has no particles, so there is nothing to pass vibrations to.\n- Convection requires a fluid to flow. A vacuum has no fluid, so no bulk flow is possible.\n- Therefore both conduction and convection are completely eliminated in a perfect vacuum. Only radiation can still transfer energy through a vacuum.\n\nThis is why a vacuum flask is so good at keeping drinks hot or cold: it kills two of the three mechanisms entirely.", "source": "MiniMax M3 ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "Loft insulation is a thick layer of fibre. Explain how it reduces both conduction and convection. (3 steps)", "answer": "- Step 1: The fibres trap air in many small pockets. Air is a gas, so it has very few particles per unit volume compared with a solid, and is therefore a poor conductor.\n- Step 2: The pockets are small, so the air inside cannot form a large-scale convection current. Each pocket is immobilised by the surrounding fibres, and bulk flow cannot be set up.\n- Step 3: Both conduction and convection are suppressed in the same material. The remaining heat transfer is by radiation, but that can also be reduced by reflective foils added to high-performance insulation boards.\n\nTrapped air is the central idea: fewer particles reduces conduction; immobilised pockets reduce convection.", "source": "MiniMax M3 ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "Cavity-wall insulation, double glazing, draught excluders, and foil behind a radiator each reduce heat loss from a house. Match each to the mechanism it mainly suppresses. (4 steps)", "answer": "- Step 1: Cavity-wall insulation (fibre filling the gap between inner and outer brick) → reduces conduction and convection. Fibres trap air in pockets, which conducts poorly and cannot circulate.\n- Step 2: Double (or triple) glazing → mainly reduces conduction. The air or argon gap between the panes is a poor conductor, so heat moving through the window has to pass through a layer of gas.\n- Step 3: Draught excluder → reduces convection. It physically blocks whole volumes of warm air from flowing out (or cold air flowing in) under a door.\n- Step 4: Foil behind a radiator → reduces radiation. Shiny foil is a poor absorber and emitter of IR but a good reflector, so it sends IR back into the room rather than letting it be absorbed by the wall.\n\nAlways say which mechanism each design feature suppresses — vague answers lose marks.", "source": "MiniMax M3 ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "A student argues a draught under a door is \"conduction\" because air is touching the floor. Correct this and explain why the answer is convection.", "answer": "- Conduction is energy transfer by particle-to-particle contact or vibration passing, with no bulk movement of the material.\n- A draught is bulk flow: whole volumes of warm air move out from under the door, and whole volumes of cold air move in to replace them.\n- The give-away is \"moving/replacing air.\" If the air is flowing as a body, it is convection. The air does not need to change state to flow — it just needs to be a fluid.", "source": "MiniMax M3 ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "Define specific heat capacity. Include the SI unit, and explain why \"specific\" matters in the name. (3 steps)", "answer": "- Step 1: Definition — specific heat capacity is the energy required to raise the temperature of 1 kg of a substance by 1 K (equivalently 1 °C).\n- Step 2: Symbol $$c$$, SI unit $$\\text{J}/(\\text{kg}\\cdot\\text{K})$$. (Also acceptable: $$\\text{J}/(\\text{kg}\\cdot°\\text{C})$$, because a 1 K interval equals a 1 °C interval.)\n- Step 3: \"Specific\" means per unit mass. It tells you the c value is independent of how much of the substance you have. Doubling the mass doubles the energy needed for the same $$\\Delta\\theta$$, but c itself does not change.\n\nFor water $$c = 4200 \\text{ J}/(\\text{kg}\\cdot\\text{K})$$ — unusually high, which is why water stores a lot of energy per kg per K (radiators stay warm, the sea is slow to cool).", "source": "MiniMax M3 ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "State the SHC equation, identify every symbol and unit, and show that the units of c are consistent. (3 steps)", "answer": "- Step 1: $$\\Delta E = mc\\Delta\\theta$$.\n- Step 2: $$\\Delta E$$ = energy transferred (J); $$m$$ = mass (kg); $$c$$ = specific heat capacity $$\\text{J}/(\\text{kg}\\cdot\\text{K})$$; $$\\Delta\\theta$$ = temperature change (K or °C, an interval).\n- Step 3: Rearranging, $$c = \\dfrac{\\Delta E}{m \\Delta\\theta}$$, so units are $$\\dfrac{\\text{J}}{\\text{kg}\\cdot\\text{K}} = \\text{J}/(\\text{kg}\\cdot\\text{K})$$. Consistent with the definition.\n\nA common slip: leaving mass in grams. Always convert to kg before substituting. A 1 K interval and a 1 °C interval are the same size, so $$\\Delta\\theta$$ can be in either.", "source": "MiniMax M3 ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "Describe the SHC experiment using an aluminium block and an electrical heater. Write the working equation and name the main source of error. (3 steps)", "answer": "- Step 1: Set-up — weigh the aluminium block, insert an electric heater and a thermometer (with a drop of oil for thermal contact), record initial temperature $$\\theta_i$$, switch on, record $$I$$, $$V$$ and time $$\\Delta t$$, then record the highest steady temperature $$\\theta_f$$.\n- Step 2: Energy balance — electrical energy supplied equals the increase in internal energy of the block: $$IV\\Delta t = mc(\\theta_f - \\theta_i)$$, so $$c = \\dfrac{IV\\Delta t}{m(\\theta_f - \\theta_i)}$$.\n- Step 3: The main source of error is energy absorbed by the heater itself (it warms up too), plus losses to the surroundings and small losses to the lagging and thermometer. All mean the block gets less energy than $$IV\\Delta t$$, so the calculated c is too large.\n\nOther systematic errors include a thermometer that reads low (would make c too small) and meters that are inaccurate (could go either way).", "source": "MiniMax M3 ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "A 0.5 kg copper block (c = 3850 J/(kg·K)) is heated by 3 K. How much energy is transferred? Show the substitution.", "answer": "- Step 1: Equation $$\\Delta E = mc\\Delta\\theta$$.\n- Step 2: Substitute $$\\Delta E = 0.5 \\times 3850 \\times 3 = 5775$$ J.\n- Step 3: Note the units — kg × (J/(kg·K)) × K = J. The kg and K cancel cleanly.\n\nLayout first, then substitute, then sanity-check the unit. Most SHC calculation errors are unit slips (e.g., mass in grams) or transcription slips (e.g., copying 3850 as 385). The board on 10 July actually did drop a zero on the SHC.", "source": "MiniMax M3 ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "Define specific latent heat. Distinguish specific latent heat of fusion from specific latent heat of vaporisation, and state the value of each for water.", "answer": "- Specific latent heat $$L$$ is the energy required to change the state of 1 kg of a substance with no change in temperature. Unit J/kg.\n- Specific latent heat of fusion $$L_f$$: solid ↔ liquid (melting or freezing).\n- Specific latent heat of vaporisation $$L_v$$: liquid ↔ gas (boiling or condensing).\n- For water: $$L_f = 3.34 \\times 10^5 \\text{ J/kg}$$, $$L_v = 2.26 \\times 10^6 \\text{ J/kg}$$. The same values apply in both directions of the change (melting ice absorbs $$L_f$$ per kg; freezing water releases $$L_f$$ per kg).\n\nThe much larger $$L_v$$ reflects the work needed to fully separate molecules in boiling versus merely loosen them in melting.", "source": "MiniMax M3 ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "Why is the temperature constant during a change of state, even though energy is still being supplied?", "answer": "- During a state change, the supplied energy does not go into the kinetic energy of the particles — it goes into potential energy, used to break or loosen the bonds holding the particles in their current arrangement.\n- Temperature is a measure of the mean random kinetic energy of the particles, not their potential energy. Since KE is not changing, temperature is not changing.\n- Once all the bonds are broken/loosened enough for the new state, further energy input again raises the KE and the temperature starts climbing again.\n\nThis is why a boiling kettle stays at 100 °C until all the water has boiled off, and a tray of ice stays at 0 °C until it has all melted.", "source": "MiniMax M3 ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "Sketch the temperature-vs-energy heating curve for a substance going from solid to gas. Identify which equation governs each segment, and explain the relative lengths of the plateaus.", "answer": "- Sloped sections (solid warming, liquid warming, gas warming): temperature rises, single state, governed by $$\\Delta E = mc\\Delta\\theta$$.\n- Flat plateaus (state change): temperature constant, governed by $$\\Delta E = L\\Delta m$$. The melting plateau uses $$L_f$$, the boiling plateau uses $$L_v$$.\n- The boiling plateau is much longer (in energy) than the melting plateau, because $$L_v \\approx 7 \\times L_f$$ for water. Vaporisation needs to fully separate the molecules, while melting only lets them slide past each other.\n\nA clean way to remember: sloped = mc∆θ; flat = L∆m. Always label each plateau with the type of latent heat and the corresponding L.", "source": "MiniMax M3 ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "State the ideal gas equation. Identify every symbol and its unit. (3 steps)", "answer": "- Step 1: $$pV = NkT$$, where $$p$$ is pressure (Pa), $$V$$ is volume (m³), $$N$$ is the number of molecules, $$T$$ is absolute temperature (K).\n- Step 2: $$k = 1.38 \\times 10^{-23} \\text{ J/K}$$ is the Boltzmann constant — given in exams, no need to memorise, but know its units.\n- Step 3: For one mole, $$pV = nRT$$ with the universal gas constant $$R = 8.31 \\text{ J}/(\\text{K}\\cdot\\text{mol})$$, related to $$k$$ by $$R = kN_A$$ where $$N_A = 6.02 \\times 10^{23}$$ is Avogadro's number.\n\nT must be in K, never °C, in this equation. pV has the same units as energy: $$\\text{Pa}\\cdot\\text{m}^3 = \\text{N/m}^2 \\cdot \\text{m}^3 = \\text{N}\\cdot\\text{m} = \\text{J}$$.", "source": "MiniMax M3 ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "State the pressure law for a fixed mass of gas at constant volume. Why must T be in kelvin? (2 steps)", "answer": "- Step 1: $$p \\propto T$$ at constant $$V$$, equivalently $$\\dfrac{p_1}{T_1} = \\dfrac{p_2}{T_2}$$.\n- Step 2: T must be in kelvin because the proportionality only works on the absolute scale. If you used °C, a doubling of pressure (compared to a gas cooled toward zero pressure) would predict some negative temperature, which is impossible. The line $$p$$ vs $$T(K)$$ extrapolates back to $$p = 0$$ at $$T = 0$$ K, which is the definition of absolute zero.\n\nA classic slip: \"doubling °C\" instead of \"doubling K\" — these are very different. 27 °C to 54 °C is 300 K to 327 K, a 9% rise, not 100%.", "source": "MiniMax M3 ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "From kinetic theory, derive that the mean kinetic energy of gas molecules is proportional to absolute temperature. (3 steps)", "answer": "- Step 1: From kinetic theory (Newton's laws + ideal-gas assumptions), the pressure of a gas is $$pV = \\dfrac{1}{3}Nm\\langle c^2\\rangle$$, where $$m$$ is the mass of one molecule, $$\\langle c^2\\rangle$$ is the mean square speed, $$N$$ is the number of molecules.\n- Step 2: From the experimental ideal gas law, $$pV = NkT$$.\n- Step 3: Equate the two expressions for $$pV$$: $$\\dfrac{1}{3}Nm\\langle c^2\\rangle = NkT$$, so $$\\dfrac{1}{2}m\\langle c^2\\rangle = \\dfrac{3}{2}kT$$. The mean molecular KE is proportional to T, with the constant of proportionality $$\\dfrac{3}{2}k$$.\n\nThis is a derivation you should be able to reproduce in an exam, not just quote. Memorise the key steps (elastic collision, change in momentum, rate of change of momentum gives force, force per unit area gives pressure).", "source": "MiniMax M3 ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "What is absolute zero? State it in K and in °C, and explain what happens to (a) particle motion, (b) thermal emission, (c) pressure at fixed V, and (d) volume at fixed p, all at 0 K. (2 steps)", "answer": "- Step 1: Absolute zero is the lowest theoretical temperature, where particles have their minimum possible average kinetic energy. $$0 \\text{ K} = -273.15 \\text{ °C}$$ (often rounded to $$-273 \\text{ °C}$$).\n- Step 2: At 0 K, in the classical kinetic theory model: (a) particles have minimum (zero) KE — no random motion; (b) no thermal emission of IR; (c) pressure = 0 (since $$p \\propto T$$); (d) volume = 0 at constant
