because it has far more molecules. Temperature = average KE; internal energy = total KE + total PE.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": true}, {"question": "A student says \"a body contains heat.\" Rephrase this correctly and explain why the original statement is a misconception. (2 steps)", "answer": "- Step 1: A body contains **internal energy** (the sum of its particles' kinetic and potential energies). It does not \"contain heat.\"\n- Step 2: \"Heat\" or \"heating\" is the *process* of transferring energy from a hotter to a cooler body (by conduction, convection, or radiation). It is a transfer pathway, not a store. Confusing the two is the classic exam error that loses marks.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": false}, {"question": "In the pressure-vs-temperature experiment for a fixed volume of gas, the graph of $$p$$ vs $$T$$ (in kelvin) is a straight line through the origin. If the same data were plotted as $$p$$ vs $$\\theta$$ (in °C), what would the graph look like, and where would it cross the temperature axis? (2 steps)", "answer": "- Step 1: The $$p$$-vs-$$\\theta$$ graph is still a straight line (same data, just shifted axis), but it crosses the temperature axis at $$-273$$ °C (absolute zero), not at the origin.\n- Step 2: This is because $$p = 0$$ when $$T = 0$$ K, which corresponds to $$\\theta = -273$$ °C. The straight line through the origin in the kelvin plot confirms $$p \\propto T$$; the same line in Celsius is offset by 273 units.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": true}, {"question": "When using $$\\frac{p_1}{T_1} = \\frac{p_2}{T_2}$$ for a car tyre, why must you use the *total* pressure (gauge + atmospheric) and not just the gauge pressure? (2 steps)", "answer": "- Step 1: The gas laws relate the **absolute** pressure of the gas — the total force per area exerted by the molecules on the walls. Gauge pressure is the pressure *above* atmospheric, not the total.\n- Step 2: If you use only gauge pressure, you ignore the ~101 kPa of atmospheric pressure already acting, which gives a significantly wrong ratio. Always add atmospheric pressure to gauge pressure to get the total absolute pressure before applying gas laws.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": true}, {"question": "The kinetic theory derivation of gas pressure uses several assumptions. List four key assumptions and explain why each is necessary. (4 steps)", "answer": "- Step 1: **A gas consists of a very large number of molecules in continuous, rapid, random motion** — this is the basis for statistical averages (mean square speed) and for Brownian motion evidence.\n- Step 2: **Collisions are perfectly elastic** — if kinetic energy were lost in collisions, molecules would gradually slow down and the gas would cool spontaneously, which does not happen. Energy is conserved.\n- Step 3: **The volume of molecules is negligible compared to the container** — this lets us treat the gas as point particles and use $$V$$ as the container volume, not correcting for molecular volume.\n- Step 4: **Intermolecular forces are negligible except during collisions** — this means molecules move in straight lines between collisions (no acceleration from forces), simplifying the derivation. Without this, the pressure calculation would need to account for intermolecular attractions.", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": false}, {"question": "In the kinetic theory derivation, we go from considering one molecule in one direction to the final result $$pV = \\frac{1}{3}Nm\\langle c^2 \\rangle$$. What is the key mathematical step that introduces the factor of $$\\frac{1}{3}$$? (2 steps)", "answer": "- Step 1: For one molecule with velocity components $$u, v, w$$ in three perpendicular directions, we have $$c^2 = u^2 + v^2 + w^2$$. For a large number of randomly moving molecules, $$\\langle u^2 \\rangle = \\langle v^2 \\rangle = \\langle w^2 \\rangle$$ (no preferred direction).\n- Step 2: Therefore $$\\langle c^2 \\rangle = 3\\langle u^2 \\rangle$$, so $$\\langle u^2 \\rangle = \\frac{1}{3}\\langle c^2 \\rangle$$. The $$\\frac{1}{3}$$ comes from the three-dimensional nature of space — each direction carries one-third of the mean square speed.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": true}, {"question": "Explain what \"root-mean-square speed\" means. If five molecules have speeds 310, 320, 330, 340, 350 m/s, is the mean square speed equal to (mean speed)²? (3 steps)", "answer": "- Step 1: Mean square speed: square each speed, sum them, divide by the number of molecules. Then take the square root to get the rms speed: $$c_{\\text{rms}} = \\sqrt{\\langle c^2 \\rangle}$$.\n- Step 2: For the given speeds: $$\\langle c^2 \\rangle = \\frac{310^2 + 320^2 + 330^2 + 340^2 + 350^2}{5} = \\frac{545500}{5} = 109100$$. So $$c_{\\text{rms}} = \\sqrt{109100} \\approx 330.3$$ m/s.\n- Step 3: The mean speed is $$\\frac{310+320+330+340+350}{5} = 330$$ m/s, and $$(330)^2 = 108900 \\neq 109100$$. So mean square speed is **not** equal to (mean speed)² — they are close but not identical. The rms speed is always ≥ the mean speed.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": false}, {"question": "A student calculates the rms speed of oxygen molecules at 24 °C. They forget to convert to kelvin and use 24 K instead. Will their answer be too high or too low, and by roughly what factor? (2 steps)", "answer": "- Step 1: Since $$c_{\\text{rms}} \\propto \\sqrt{T}$$, using a smaller $$T$$ gives a smaller rms speed. 24 K is much smaller than 297 K (the correct value).\n- Step 2: The ratio is $$\\sqrt{\\frac{24}{297}} \\approx \\sqrt{0.081} \\approx 0.28$$. The calculated speed would be roughly 28% of the correct value — far too low. Always convert to kelvin before using gas-law or kinetic-theory equations.", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": true}, {"question": "A spacecraft has a matte-black radiator panel of area $$2$$ m² facing deep space and a silver-reflective layer of area $$1$$ m² facing the Sun. The spacecraft generates 500 W internally and receives about 1000 W/m² of solar radiation on the Sun-facing side. Explain whether the radiator is large enough to maintain thermal equilibrium, qualitatively. (3 steps)", "answer": "- Step 1: The Sun-facing silver layer reflects most incoming solar radiation. If it reflects, say, ~95%, then only ~50 W (5% of 1000 W) is absorbed through that 1 m² face. Total energy input ≈ 500 (internal) + 50 (absorbed solar) = 550 W.\n- Step 2: The matte-black radiator (good emitter) must radiate 550 W to space. Its emission rate depends on its area and temperature (Stefan–Boltzmann law, though not required in detail here).\n- Step 3: If the radiator area is large enough and its temperature is high enough, it can emit 550 W and equilibrium is reached. If not, the spacecraft heats up until the radiator temperature rises enough to emit the required power. The key design principle: make the radiator large and matte-black (best emitter), and the Sun-facing surface reflective (worst absorber).", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": false}, {"question": "Why can you not use convection to cool a machine in space even if \"two air masses at different temperatures\" were somehow present? (2 steps)", "answer": "- Step 1: Convection requires a **fluid** (liquid or gas) that can circulate — rise when less dense and sink when more dense. In a vacuum, there is no fluid at all.\n- Step 2: Even if you imagined two pockets of gas at different temperatures, they would need to be contained. In the vacuum of space, any gas would rapidly disperse. There is no atmosphere to sustain convection currents. The only heat-loss mechanism in space is radiation.", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": false}, {"question": "A student measures the SHC of aluminium and gets 1050 J/(kg K), but the accepted value is 910 J/(kg K). Is their value too high or too low? Which experimental error most likely caused this? (2 steps)", "answer": "- Step 1: Their value (1050) is **too high** compared to the accepted value (910).\n- Step 2: The most likely cause is energy loss to the surroundings or energy absorbed by the heater/thermometer. These mean the block receives *less* energy than $$IV\\Delta t$$ counts, so the numerator in $$c = \\frac{IV\\Delta t}{m\\Delta\\theta}$$ is over-counted, pushing $$c$$ upward. This is the most common and largest error in the SHC practical.", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": false}, {"question": "In the latent heat of fusion experiment using ice and warm water in a polystyrene cup, why is it important to add ice until the final water temperature is *below* room temperature by roughly the same amount it was *above* room temperature at the start? (2 steps)", "answer": "- Step 1: This compensates for energy exchange with the room. While the water is above room temperature, it loses energy to the room; while it is below, it gains energy from the room.\n- Step 2: If the temperature excursion above and below room temperature is roughly equal, the net energy exchanged with the room is approximately zero, improving the accuracy of the latent heat calculation by cancelling out the main systematic error.", "source": "GLM 5.1 ②", "_id": "glm_2_50", "judge_pick": false}, {"question": "Why must the ice be dried before adding it to the warm water in the latent heat of fusion experiment? What happens to the result if wet ice is used? (2 steps)", "answer": "- Step 1: Wet ice has liquid water on its surface that has already melted. This water adds to the mass measured as \"melted ice\" ($$\\Delta m$$) but did not require latent heat to melt.\n- Step 2: The calculated $$\\Delta m$$ is too large (includes the surface water), so $$L = \\frac{\\Delta E}{\\Delta m}$$ comes out **too small**. Always dry the ice with a paper towel before adding it.", "source": "GLM 5.1 ②", "_id": "glm_2_51", "judge_pick": false}, {"question": "In the continuous heating method for SHC (recording temperature every 30 seconds during heating and cooling), how can you use the cooling part of the graph to improve accuracy? (2 steps)", "answer": "- Step 1: The rate of cooling at any temperature tells you the rate of energy loss to the surroundings at that temperature. The hotter the block, the faster it cools.\n- Step 2: By determining the gradient of the temperature–time graph at the start of heating (when the block is near room temperature), energy loss to surroundings is negligible, and you can assume all electrical energy goes into the block: $$IV = mc\\frac{d\\theta}{dt}$$. This gives a more accurate value of $$c$$ than using the full temperature range where losses are significant.", "source": "GLM 5.1 ②", "_id": "glm_2_52", "judge_pick": false}, {"question": "An ideal gas has internal energy that is entirely kinetic. A real gas during condensation has internal energy that includes significant potential energy. Explain why, and connect this to latent heat. (3 steps)", "answer": "- Step 1: In an ideal gas, intermolecular forces are assumed negligible — molecules only interact during brief elastic collisions. So there is no potential energy stored in bonds; internal energy is all kinetic.\n- Step 2: In a real gas (and in liquids/solids), molecules have intermolecular forces between them. These forces store potential energy — like springs being stretched and compressed.\n- Step 3: During condensation (gas → liquid), molecules come closer together and bonds form. Potential energy decreases (energy is *released*). This released energy is the **latent heat of vaporisation** — the energy that had to be supplied to break those bonds during vaporisation. That is why latent heat is associated with changes in potential energy, not kinetic energy.", "source": "GLM 5.1 ②", "_id": "glm_2_53", "judge_pick": true}, {"question": "A student sees that the temperature in Hong Kong is 36 °C and in London is 18 °C. They say \"Hong Kong is twice as hot.\" A physicist says \"it's only about 6% hotter.\" Explain who is correct and why. (3 steps)", "answer": "- Step 1: Temperature in °C is not a ratio scale — 36 °C is not \"twice\" 18 °C because the zero point is arbitrary. You must convert to kelvin.\n- Step 2: Hong Kong: $$36 + 273 = 309$$ K. London: $$18 + 273 = 291$$ K. The ratio is $$\\frac{309}{291} \\approx 1.06$$, so Hong Kong is about 6% hotter on the absolute scale.\n- Step 3: The physicist is correct. Only on the kelvin scale (where zero means zero kinetic energy) can you meaningfully take ratios of temperature. On the Celsius scale, the zero point does not correspond to zero energy.", "source": "GLM 5.1 ②", "_id": "glm_2_54", "judge_pick": false}, {"question": "What is absolute zero? Is it physically achievable? What happens to molecular motion there (classically vs. quantum mechanically)? (3 steps)", "answer": "- Step 1: Absolute zero is 0 K (−273.15 °C) — the lowest theoretically possible temperature, at which particles have their minimum kinetic energy.\n- Step 2: It is **not physically achievable**. Scientists have reached temperatures extremely close (picokelvin range), but the third law of thermodynamics states you can never quite reach 0 K.\n- Step 3: Classically, molecules would have zero kinetic energy at 0 K (no motion). Quantum mechanically, a minimum \"zero-point energy\" remains due to the Heisenberg uncertainty principle — you cannot simultaneously know position and momentum exactly, so some motion persists even at 0 K.", "source": "GLM 5.1 ②", "_id": "glm_2_55", "judge_pick": false}, {"question": "A 2 kW electric kettle contains 1.0 kg of water at 20 °C. Estimate roughly how long it takes to reach boiling (100 °C). Then estimate how long it takes to boil away 0.5 kg of water. Which takes longer, and by roughly what factor? (Conceptual, no precise calculation.) (3 steps)", "answer": "- Step 1: Energy to heat water from 20 °C to 100 °C: $$\\Delta E = mc\\Delta\\theta = 1.0 \\times 4200 \\times 80 = 336000$$ J. At 2000 W, time ≈ 336000/2000 ≈ 168 s ≈ 2.8 minutes.\n- Step 2: Energy to boil away 0.5 kg: $$\\Delta E = mL_v = 0.5 \\times 2.26 \\times 10^6 = 1.13 \\times 10^6$$ J. Time ≈ 1.13 × 10⁶/2000 ≈ 565 s ≈ 9.4 minutes.\n- Step 3: Boiling away the water takes roughly **3–4 times longer** than heating it to boiling point, because $$L_v$$ (2.26 MJ/kg) is very large. This is why the boiling plateau on a heating curve is much longer than the heating slope — vaporisation requires far more energy per kilogram than raising temperature.", "source": "GLM 5.1 ②", "_id": "glm_2_56", "judge_pick": true}, {"question": "The equation $$p = \\frac{1}{3}\\rho\\langle c^2 \\rangle$$ links pressure, density, and mean square speed. If you compress a gas at constant temperature (reducing volume), what happens to its density and why does pressure increase — is it because molecules speed up? (3 steps)", "answer": "- Step 1: At constant temperature, the average molecular speed (and hence $$\\langle c^2 \\rangle$$) stays the same — the kinetic energy depends only on temperature.\n- Step 2: Compressing the gas reduces its volume, so the same mass occupies less space: density $$\\rho = \\frac{m}{V}$$ **increases**.\n- Step 3: Since $$p = \\frac{1}{3}\\rho\\langle c^2 \\rangle$$ and $$\\langle c^2 \\rangle$$ is constant while $$\\rho$$ increases, the pressure increases. The pressure rise is due to **more molecules per unit volume** making more frequent wall collisions, not because individual molecules are faster.", "source": "GLM 5.1 ②", "_id": "glm_2_57", "judge_pick": true}, {"question": "A thermometer has a heat capacity of 15 J/K. In an SHC experiment, it is placed in 120 g of oil. Why does the thermometer affect the result, and in which direction? (2 steps)", "answer": "- Step 1: The thermometer absorbs some of the electrical energy supplied — energy that does not go into heating the oil. This means the oil receives less energy than $$IV\\Delta t$$ counts.\n- Step 2: Since $$c_{\\text{oil}} = \\frac{IV\\Delta t - \\text{energy to thermometer}}{m_{\\text{oil}} \\Delta\\theta}$$, ignoring the thermometer's energy makes the numerator too large, so the calculated SHC is **too large**. The 15 J/K × Δθ energy taken by the thermometer should be subtracted.", "source": "GLM 5.1 ②", "_id": "glm_2_58", "judge_pick": true}, {"question": "Summarise the three \"trigger phrases\" that tell you which heat-transfer mechanism an exam question is testing: what phrase triggers conduction, what triggers radiation, and what triggers convection? (1 step)", "answer": "- Step 1: \"Passing vibrations / collisions of particles / through a solid\" → **conduction**. \"Electromagnetic waves / infrared / across empty space / surface colour\" → **radiation**. \"A fluid rises/sinks / whole volumes of air move / a draught\" → **convection**. Always match the trigger to the mechanism before writing your answer.", "source": "GLM 5.1 ②", "_id": "glm_2_59", "judge_pick": false}, {"question": "A sealed container of gas is heated from 300 K to 600 K at constant volume. By what factor does the pressure change? By what factor does the rms speed change? (2 steps)", "answer": "- Step 1: Pressure law: $$p \\propto T$$. Doubling $$T$$ from 300 K to 600 K **doubles** the pressure (factor of 2).\n- Step 2: Rms speed: $$c_{\\text{rms}} \\propto \\sqrt{T}$$. $$\\sqrt{\\frac{600}{300}} = \\sqrt{2} \\approx 1.41$$. The rms speed increases by a factor of **√2 ≈ 1.41**, not by a factor of 2. Pressure depends on both speed and collision frequency; speed only increases as the square root of temperature.", "source": "GLM 5.1 ②", "_id": "glm_2_60", "judge_pick": true}, {"question": "When a substance is cooling (e.g., stearic acid solidifying), its cooling curve shows a flat plateau. Explain what is happening at the molecular level during this plateau and why the temperature stays constant. (2 steps)", "answer": "- Step 1: During the plateau, the substance is **changing state** (e.g., liquid → solid). Bonds are forming between molecules, releasing potential energy.\n- Step 2: The released potential energy compensates for the energy being lost to the surroundings, so the average kinetic energy (and therefore temperature) stays constant. The flat plateau represents latent heat being released at constant temperature — the reverse of the heating curve.", "source": "GLM 5.1 ②", "_id": "glm_2_61", "judge_pick": false}, {"question": "A student doing the SHC practical records the initial temperature, switches on the heater, and immediately records the final temperature after 3 minutes. They notice the temperature continues to rise after switching off. Should they use the maximum temperature reached or the temperature at switch-off? Explain. (2 steps)", "answer": "- Step 1: They should use the **highest steady temperature** reached after switching off, because the thermometer lags behind the block's actual temperature.\n- Step 2: At the moment of switch-off, the block is hotter than the thermometer reads (energy is still conducting from heater to block to thermometer). The highest steady temperature is a better estimate of the block's true final temperature. Using the switch-off temperature would underestimate $$\\Delta\\theta$$, making the calculated $$c$$ too large.", "source": "GLM 5.1 ②", "_id": "glm_2_62", "judge_pick": true}, {"question": "A student is asked \"What is the specific latent heat of fusion of ice?\" and answers \"330 kJ.\" Identify and correct two errors in this answer. (2 steps)", "answer": "- Step 1: The value is approximately $$330 \\times 10^3 = 330{,}000$$ J/kg, not 330 kJ. The unit must be J/kg (or kJ/kg), not kJ alone — latent heat is energy *per kilogram*.\n- Step 2: The definition must include \"with no change in temperature.\" Stating just a number and unit without the condition is incomplete. The full definition: the energy per kilogram to change a solid into a liquid without change in temperature.", "source": "GLM 5.1 ②", "_id": "glm_2_63", "judge_pick": false}, {"question": "A 0.2 kg block of ice at 0 °C needs to be melted completely. Using $$L_f = 3.34 \\times 10^5$$ J/kg, estimate the energy required. Then compare: if the same energy were used to heat 0.2 kg of water from 0 °C, by how many degrees would the water temperature rise? (Conceptual — order of magnitude only.) (2 steps)", "answer": "- Step 1: Energy to melt: $$\\Delta E = mL_f = 0.2 \\times 3.34 \\times 10^5 \\approx 6.7 \\times 10^4$$ J (about 67 kJ).\n- Step 2: If this energy heated 0.2 kg of water instead: $$\\Delta\\theta = \\frac{\\Delta E}{mc} = \\frac{67000}{0.2 \\times 4200} = \\frac{67000}{840} \\approx 80$$ K. So the energy needed just to *melt* 0.2 kg of ice (with no temperature change!) could heat the same mass of water by about 80 °C. This shows how large latent heat is relative to sensible heat.", "source": "GLM 5.1 ②", "_id": "glm_2_64", "judge_pick": true}, {"question": "Explain why a vacuum flask (Thermos) has: (a) a vacuum between its double walls, (b) silvered inner surfaces, and (c) a stopper/cap. Match each feature to the mechanism it suppresses. (3 steps)", "answer": "- Step 1: **Vacuum between double walls** — suppresses conduction and convection. No particles means no vibrations can pass (no conduction) and no fluid can circulate (no convection).\n- Step 2: **Silvered inner surfaces** — suppresses radiation. Shiny/silver surfaces are poor emitters and poor absorbers but good reflectors. Infrared bouncing between the silvered walls is reflected back rather than being absorbed or emitted.\n- Step 3: **Stopper/cap** — suppresses convection. It prevents hot air/liquid from rising and escaping out the top, and cold air from entering. Without the stopper, convection currents would carry energy away rapidly.", "source": "GLM 5.1 ②", "_id": "glm_2_65", "judge_pick": false}, {"question": "In the Herschel experiment, a thermometer placed beyond the red part of the spectrum shows a higher temperature than thermometers in the visible colours. Why doesn't the thermometer in the violet region (higher energy per photon) show the highest temperature? (2 steps)", "answer": "- Step 1: The Sun's spectrum peaks in the visible/near-infrared range — there is far **more infrared radiation** (in terms of total energy flux) than violet. The thermometer measures total energy absorbed, not energy per photon.\n- Step 2: Even though violet photons individually carry more energy, there are many more infrared photons arriving per second. The total power deposited by infrared beyond red exceeds that deposited by violet, so the temperature rise is greatest in the infrared region.", "source": "GLM 5.1 ②", "_id": "glm_2_66", "judge_pick": false}, {"question": "Why is the kelvin called an \"absolute\" temperature scale, and why is the Celsius scale not absolute? What is the mathematical relationship between them? (2 steps)", "answer": "- Step 1: The kelvin scale is absolute because its zero (0 K) corresponds to zero average molecular kinetic energy — it has a true physical meaning. The Celsius scale's zero (0 °C = 273.15 K) is arbitrarily set at the freezing point of water and has no fundamental physical significance.\n- Step 2: The conversion is $$T/\\text{K} = \\theta/\\text{°C} + 273.15$$. For temperature *differences*, $$\\Delta T = \\Delta\\theta$$ (1 K = 1 °C interval), so both units work interchangeably in $$\\Delta E = mc\\Delta\\theta$$.", "source": "GLM 5.1 ②", "_id": "glm_2_67", "judge_pick": true}, {"question": "A student uses $$pV = NkT$$ to find the number of molecules in a gas cylinder. They use volume in cm³, pressure in kPa, and temperature in °C. Will their answer be correct? If not, what must they convert? (3 steps)", "answer": "- Step 1: The answer will be **wrong** unless converted. $$pV = NkT$$ requires SI units throughout.\n- Step 2: Pressure must be in Pa (1 kPa = 1000 Pa), volume in m³ (1 cm³ = 10⁻⁶ m³), and temperature in K ($$T = \\theta + 273$$).\n- Step 3: Common conversion: if $$V = 8.3 \\times 10^3$$ cm³, then $$V = 8.3 \\times 10^3 \\times 10^{-6} = 8.3 \\times 10^{-3}$$ m³. If $$T = 15$$ °C, then $$T = 288$$ K. Always convert *before* substituting.", "source": "GLM 5.1 ②", "_id": "glm_2_68", "judge_pick": false}, {"question": "When using Boyle's law ($$p_1 V_1 = p_2 V_2$$), the units of pressure and volume do not need to be SI — they just need to be consistent on both sides. Why does this work, and what is the caveat? (2 steps)", "answer": "- Step 1: Boyle's law is a proportionality: $$pV = \\text{constant}$$. As long as you use the *same* units for $$p_1$$ and $$p_2$$, and the *same* units for $$V_1$$ and $$V_2$$, the constant cancels correctly. You can use kPa and cm³ on both sides.\n- Step 2: The caveat: this only works for simple proportional relationships. For $$pV = NkT$$, you **must** use SI units (Pa, m³, K) because the constant $$k$$ is defined in SI. Mixing units in the ideal gas equation will give wrong answers.", "source": "GLM 5.1 ②", "_id": "glm_2_69", "judge_pick": true}], "count": 70}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "A student writes: \"Thermal energy is transferred when two bodies are at different temperatures.\" A second student writes: \"Heating is a store of energy that a hot body contains.\" Which student has made a category error, and what is the correct distinction? (2 steps)", "answer": "- Step 1: The second student has made the category error. \"Heating\" is not a store — it is a *transfer pathway*. A body does not \"contain heat\"; it contains *internal energy* (a store measured in joules). Heating is the *process* of transferring that energy from a hotter body to a cooler one because of a temperature difference.\n+ Thermal energy / internal energy → a **store** (like a bucket holding water)\n+ Heating → a **transfer** (like water flowing from one bucket to another)\n- Step 2: The first student's statement is essentially correct — energy *is* transferred when there is a temperature difference — but the precise wording should be: \"Thermal energy is *transferred by heating* from a higher temperature to a lower temperature.\" The key exam distinction: thermal (store) vs heating (transfer). Never use \"heat\" for both.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "List the seven energy stores and the four transfer pathways. Which store and which pathway does this entire chapter focus on? (2 steps)", "answer": "- Step 1: The seven energy **stores** are: kinetic, gravitational potential, elastic (strain), chemical, thermal, nuclear, and (electro)magnetic. The four **transfer pathways** are: heating, electrically, radiation (waves — light, sound, etc.), and mechanically (force × distance).\n+ The exam traps you by mixing the two lists — keep them surgically separate.\n- Step 2: This chapter focuses on the **thermal** store (the energy sitting inside a body's particles) and the **heating** transfer pathway (the movement of that energy from hot to cold via conduction, convection, or infrared radiation).", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "Two objects are at the same temperature and in thermal contact. Is energy still being transferred between them? Explain what \"thermal equilibrium\" really means at the particle level. (3 steps)", "answer": "- Step 1: Yes, energy is still being exchanged — particles on both sides are still colliding and transferring kinetic energy back and forth. The transfer does not stop.\n- Step 2: Thermal equilibrium means the *rate* of energy transfer in one direction equals the *rate* in the other direction. Net transfer is zero, so the temperature stays constant.\n+ For infrared: emission rate = absorption rate at equilibrium.\n+ For particle collisions: average energy exchanged per collision from A→B equals that from B→A.\n- Step 3: The definition to memorise: thermal equilibrium is the state reached when a body radiates energy at the same rate as it absorbs it, so its temperature is constant. The deeper point: equilibrium is a *dynamic* balance, not a static standstill.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": true}, {"question": "In the Herschel experiment, white light is split by a prism and thermometers are placed in each colour band and one just beyond red. Which thermometer shows the biggest temperature rise, and what does this reveal about infrared? (2 steps)", "answer": "- Step 1: The thermometer placed *just beyond the red* band (where no visible colour exists) shows the biggest temperature rise. This region is where infrared radiation is concentrated — invisible electromagnetic radiation that transfers energy to objects and warms them.\n+ Infrared is specifically the EM band just beyond red, not \"anything invisible\" — ultraviolet and X-rays are also invisible but are different bands with different effects.\n- Step 2: The experiment reveals that there exists electromagnetic radiation we cannot see but which carries energy and causes heating. This is infrared radiation — it needs no medium (travels through vacuum) and is how the Sun's energy reaches Earth across empty space.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "Under what single condition would an object emit zero infrared radiation? Why is this condition essentially unreachable in practice? (2 steps)", "answer": "- Step 1: An object would emit no infrared only at **0 K (absolute zero)**, where its particles have their minimum possible kinetic energy and no energy is available to be radiated.\n- Step 2: Absolute zero is a theoretical limit that has never been achieved. Even the coldest known natural region (the Boomerang Nebula) is about 1 K, and the cosmic microwave background is 2.7 K. Quantum mechanics also imposes a minimum \"zero-point energy\" that prevents particles from being completely stationary. So in practice, *every* object emits infrared all the time — hotter objects simply emit more.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": true}, {"question": "A cup of coffee is cooling on a desk. Is it still *absorbing* infrared from the room, or only emitting? What determines whether an object's temperature rises, falls, or stays constant? (3 steps)", "answer": "- Step 1: The cooling coffee is *both* emitting and absorbing infrared simultaneously. All objects do both all the time. The coffee emits because it is warmer than its surroundings; it absorbs because the room radiates infrared back toward it.\n- Step 2: What determines the temperature trend is the *balance* between the two rates:\n+ If emission rate > absorption rate → net energy loss → temperature falls (cooling object)\n+ If absorption rate > emission rate → net energy gain → temperature rises (heating object)\n+ If emission rate = absorption rate → net zero → temperature constant (thermal equilibrium)\n- Step 3: The coffee cools because its emission rate exceeds its absorption rate. As it approaches room temperature, the two rates converge until they equalise — then equilibrium is reached and cooling stops. Never say a cooling object \"only emits\" or a heating object \"only absorbs.\"", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": true}, {"question": "A student claims: \"A shiny mirror surface is the best at giving off infrared because it reflects so well.\" Identify the confusion and explain which surface truly emits the most, and why. (3 steps)", "answer": "- Step 1: The student has confused **emission** (giving off radiation from inside the object) with **reflection** (bouncing back incoming external radiation). These are opposite processes: a good reflector bounces radiation away; a good emitter radiates energy *from the object itself* outward.\n- Step 2: A **black/matt** (dull, rough) surface is the best emitter and the best absorber of infrared. A **white/shiny** (mirror-like) surface is the best reflector and therefore the *worst* emitter and absorber.\n+ Good emitters and good absorbers always \"go together\" — they are the same surface type.\n+ Reflection is the *opposite* of absorption: what you don't absorb, you reflect.\n- Step 3: In the black-vs-silver can experiment, the hot water *inside* the cans is the source — there is no external radiation to reflect. What matters is how well each surface *emits* its own internal energy as infrared. Black wins because it is the best emitter. The shiny can reflects well, but reflection needs an *external* source — here the source is internal, so emission dominates.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "Two identical cans — one matt black, one shiny silver — are filled with water at $$80\\,^{\\circ}\\text{C}$$ and left to cool. A student predicts the black can will reach a *higher* temperature than the silver can. Why is this wrong, and how should you read \"better emission\" from a graph? (3 steps)", "answer": "- Step 1: The student's prediction is backwards. Emitting more infrared means *losing* energy faster, which makes the object *cool down* faster — not get hotter. Giving off energy reduces the internal energy store, so the temperature falls.\n- Step 2: On a temperature–time cooling curve, the black can's line falls *more steeply* than the silver can's line because it loses energy at a greater rate. Both curves eventually level off at room temperature (thermal equilibrium), but the black can arrives there sooner.\n+ The steeper the cooling curve, the greater the emission rate.\n+ Never read \"better emitter\" as \"higher temperature\" — read it as \"faster temperature drop.\"\n- Step 3: The correct interpretation: the black can is the better emitter, proven by its *faster rate of cooling*, not by any claim that it reaches a higher temperature. The misconception is treating \"gives off more\" as \"gets hotter\" — in fact, \"gives off more\" means \"cools faster.\"", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": true}, {"question": "A student calls infrared \"a weak type of nuclear radiation.\" Correct this precisely: what is infrared, and what is nuclear radiation? Why does the broad word \"radiation\" cause this confusion? (2 steps)", "answer": "- Step 1: Infrared is **electromagnetic radiation** — it is emitted when an orbital electron drops to a lower energy level and releases a photon. It travels as a wave, needs no medium, and is the band of EM spectrum just beyond visible red. Nuclear radiation (alpha, beta, gamma) is emitted *from the nucleus* during radioactive decay — alpha and beta are particles, gamma is high-energy EM from nuclear transitions.\n+ \"Radiation\" broadly just means \"something is given off\" — it is a generic word, not a specific type.\n- Step 2: The confusion arises because \"radiation\" is an umbrella term. Infrared, visible light, radio waves, X-rays are all *electromagnetic radiation* (from electron energy changes). Alpha, beta, gamma are *nuclear radiation* (from the nucleus). The exam expects you to specify which type — never just say \"radiation\" without qualifying it.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "Describe the five-step chain that explains how the Sun's infrared radiation causes Earth's average temperature to rise when atmospheric $$\\text{CO}_2$$ increases. What is the key physics reason the trapping works? (3 steps)", "answer": "- Step 1: The chain: (1) The Sun emits short-wavelength radiation (visible and near-infrared) → (2) Earth absorbs it and warms → (3) Earth re-emits radiation at a *longer wavelength* (lower-frequency infrared) because it is cooler than the Sun → (4) Greenhouse gases ($$\\text{CO}_2$$, water vapour, methane) let the Sun's short-wavelength radiation *through* but absorb and re-radiate much of the Earth's *longer-wavelength* outgoing infrared → (5) More $$\\text{CO}_2$$ traps more outgoing radiation, reducing the rate at which energy escapes, so Earth settles at a higher equilibrium temperature.\n- Step 2: The key physics: the *asymmetry* between incoming and outgoing wavelengths. The Sun's high temperature produces short-wavelength EM that passes through the atmosphere relatively unimpeded. Earth's lower temperature produces long-wavelength infrared that greenhouse gases absorb and re-radiate — some back toward Earth, slowing the net energy loss.\n+ For millions of years, emission and absorption balanced (equilibrium). Added $$\\text{CO}_2$$ shifts the balance: more outgoing radiation is intercepted, so the equilibrium temperature must rise until emission rate once again matches absorption rate.\n- Step 3: The exam-worthy phrasing: say \"Earth re-emits at a different (longer) wavelength\" — this wavelength shift is the crux. Do not say \"the atmosphere knocks the radiation out\" or \"infrared is nuclear radiation.\"", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "Explain conduction through a solid in particle terms, giving the full causal chain. Why can energy travel through a solid while the particles themselves stay in place? (3 steps)", "answer": "- Step 1: In any solid, all particles vibrate about fixed positions all the time. When one end is heated, the particles there vibrate *more* (greater amplitude and frequency) because they have gained kinetic energy.\n- Step 2: These more-vigorous vibrations are passed to neighbouring particles through the inter-atomic bonds (which act like springs connecting the particles). Each neighbour then vibrates more and passes the increased vibration onward — energy propagates toward the cooler end.\n+ Alex's analogy: people linking arms in a line; one person shakes, the next shakes, and so on down the line — the people don't walk along, but the *shake* travels.\n- Step 3: The particles themselves do not move along the solid — they stay near their fixed lattice positions and merely vibrate more. It is the *vibrational energy* that travels, not the particles. This is why conduction works best in solids: the particles are close together and well-connected by bonds, so vibrations pass efficiently from one to the next.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "Metals conduct heat far better than non-metals. What additional mechanism beyond lattice vibrations makes this possible? Describe the role of free electrons step by step. (3 steps)", "answer": "- Step 1: Metals contain **free (delocalised) electrons** that are not bound to any particular atom. These electrons can move rapidly through the metal lattice.\n- Step 2: When the hot end of a metal is heated, vibrating atoms knock the free electrons. The electrons gain kinetic energy and move quickly through the lattice toward the cooler end, where they collide with atoms and transfer energy to them.\n+ This electron-mediated transfer is much faster than the atom-to-atom vibration passing that occurs in all solids.\n+ Picture: vibrations pass atom-to-atom (slow, all solids) *plus* free electrons sprint through carrying energy (fast, metals only).\n- Step 3: The free electrons act as an *express delivery system* for thermal energy. This is why metals like copper and aluminium are excellent thermal conductors — and also excellent electrical conductors, since the same free electrons carry electric charge under a potential difference.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "Two metal blocks sit in the same room at $$21\\,^{\\circ}\\text{C}$$. Identical ice cubes are placed on each. The ice on block A melts far faster than the ice on block B. A student says \"block A must be hotter.\" Why is this reasoning wrong? (2 steps)", "answer": "- Step 1: Both blocks are at the *same* temperature ($$21\\,^{\\circ}\\text{C}$$) — they have been sitting in the same room long enough to reach thermal equilibrium with it. The difference is not temperature but **thermal conductivity**: block A transfers energy to the ice by conduction *much faster* than block B.\n- Step 2: A good conductor delivers energy rapidly through the material to the contact surface with the ice, so the ice receives energy quickly and melts fast. A poor conductor (insulator) delivers energy slowly, so the ice melts slowly. Same starting temperature, different *rate of energy delivery* — that is the conductivity effect.\n+ The misconception: \"ice melts because the block is hot.\" Correction: ice melts because energy is *transferred* to it, and the rate of transfer depends on conductivity, not on the block being \"hotter\" than its neighbour at the same temperature.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "What is the best insulator against conduction, and what is the next best? A student suggests \"very strong chemical bonds\" make the best insulator. Why is this exactly backwards? (3 steps)", "answer": "- Step 1: The best insulator against conduction is a **vacuum** — it has no particles at all, so there is nothing to pass vibrations from one side to the other. The next best is a **gas (air)** — it has very few, widely spaced particles, so vibrations pass slowly and inefficiently.\n- Step 2: The student's suggestion is backwards because *strong bonds transmit vibrations efficiently*. Think of the linked-arms analogy: if everyone grips tightly (strong bonds), a shake passes quickly down the line. Weak bonds or large gaps between people (fewer/weaker connections) slow the shake's travel.\n+ Strong metallic bonds → good conductor (vibrations pass easily)\n+ Weak or sparse connections → poor conductor (insulator)\n- Step 3: The correct logic: fewer particles (gas) or no particles (vacuum) reduce conduction because there are fewer \"links in the chain\" to pass vibrations. Strong bonds *help* conduction, not hinder it. Insulation works by *breaking* or *lengthening* the chain, not by making it stronger.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "Explain convection in a fluid, giving the full ordered particle chain. Why must the fluid itself *move* — what makes convection fundamentally different from conduction? (3 steps)", "answer": "- Step 1: The convection chain, in exam order: (1) Particles in the heated region gain energy → (2) they move faster → (3) they spread apart → (4) the region becomes *less dense* → (5) the less-dense fluid *rises*. Meanwhile, cooler fluid elsewhere is more dense and *sinks* to replace the risen fluid. The circulating flow is a **convection current**.\n+ Heating does not make particles *bigger* — it makes them spread out, so the same mass occupies more volume and density falls. (Alex's nightclub analogy: an energetic song makes people spread out on the dance floor, lowering crowd density.)\n- Step 2: Convection is fundamentally different from conduction because in convection the *fluid itself physically moves*, carrying its internal energy with it. In conduction, only vibrational energy travels — the particles stay put.\n- Step 3: Convection only works in **fluids** (liquids and gases) because only fluids can flow and circulate. Solids cannot convect because their particles are locked in place and cannot undergo bulk movement.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": true}, {"question": "During the day, a sea breeze blows from the sea toward the land. Explain this as a convection current, identifying which mechanism first heats the land and what drives the circulation. (2 steps)", "answer": "- Step 1: The Sun's infrared radiation heats the *land* more effectively than the sea (land has a lower specific heat capacity and absorbs radiation faster). The heated land then warms the air above it by *conduction* (contact between the hot ground and the air).\n- Step 2: That warmed air becomes less dense and *rises*. Cooler, denser air over the sea *sinks* and flows inland to replace the risen air — this inflow is the sea breeze. The full cycle: infrared → land → conduction to air → convection (less-dense air rises, denser air moves in) → sea breeze. It is a *combination* of radiation, conduction, and convection, not just one mechanism.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": true}, {"question": "A student watching a convection demo says: \"The cooled air must turn into liquid to sink, just like the heated water might boil and become gas.\" Correct both parts of this statement. (2 steps)", "answer": "- Step 1: Cooling air does *not* have to liquefy to sink. A gas can simply become *denser* (particles move less, come closer together) while remaining a gas. As temperature falls, the same mass occupies less volume, density increases, and the denser gas sinks — no state change required.\n- Step 2: In the dyed-water loop demo, the water is not heated enough to change state at all. It stays liquid throughout. The dye simply reveals the circulating current: heated water rises (less dense), cooled water sinks (more dense), both still liquid. State change is *not* part of normal convection — it is an entirely separate process (latent heat).", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": true}, {"question": "A draught excluder is placed at the bottom of a door. A student says it reduces heat loss by *conduction*. Why is this wrong, and what mechanism does a draught actually involve? (2 steps)", "answer": "- Step 1: A draught is the *bulk movement of air* — whole volumes of warm air flow out under the door and cold air flows in to replace them. This is **convection** (fluid circulation), not conduction (particle vibrations passing through a stationary material).\n- Step 2: A draught excluder blocks the *physical pathway* for air to flow, preventing the convective exchange of warm and cold air volumes. It does not primarily reduce conduction (though trapping a layer of air does also slow conduction, the dominant mechanism being blocked is convection). The giveaway: if *air is moving and being replaced*, it is convection.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": true}, {"question": "Loft insulation traps air in small pockets. Explain the *two* distinct ways this reduces heat transfer — one related to conduction and one to convection. Why must the pockets be *small*? (3 steps)", "answer": "- Step 1: **Conduction reduction**: Air has very few, widely spaced particles compared to a solid, so it is a poor conductor. Trapping air inside the insulation means energy must cross a medium (air) that conducts poorly — fewer particles to pass vibrations through.\n- Step 2: **Convection reduction**: If the air were free to circulate in a large cavity, convection currents would develop (warm air rises, cold sinks, energy carried by bulk flow). But when air is trapped in *small pockets* between fibres, it is *immobilised* — it cannot circulate, so convection is suppressed.\n+ Small pockets are essential: a large air gap would allow convection currents to form inside it, defeating the insulation. Small pockets physically prevent the circulation.\n- Step 3: The dual mechanism is the key exam point: trapped air reduces *both* conduction (fewer particles) *and* convection (immobilised pockets). A vacuum goes even further — zero particles eliminates conduction entirely and convection entirely, leaving only radiation to deal with.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": true}, {"question": "For each house insulation feature, name the primary heat-transfer mechanism it reduces: (a) double glazing, (b) cavity-wall insulation, (c) foil behind a radiator, (d) draught excluder, (e) thick curtains. (2 steps)", "answer": "- Step 1: The mappings:\n+ (a) Double glazing → reduces **conduction** (the air or argon gap between panes is a poor conductor)\n+ (b) Cavity-wall insulation → reduces **convection and conduction** (fibres trap air, stopping warm air flowing through the cavity and providing a poor-conductor fill)\n+ (c) Foil behind radiator → reduces **radiation** (reflects infrared back into the room; foil is a poor emitter and good reflector)\n+ (d) Draught excluder → reduces **convection** (blocks whole volumes of air flowing under doors)\n+ (e) Thick curtains → reduces **conduction and some convection** (trap a layer of still air against the window, like a cavity wall)\n- Step 2: The exam strategy: when you see a design feature, ask \"which of the three mechanisms does it target?\" If it involves *trapping air* → conduction + convection. If it involves *reflective surfaces* → radiation. If it involves *blocking air flow* → convection. Never just say \"it insulates\" — name the specific mechanism.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": true}, {"question": "Define specific heat capacity in a way that would score full marks, and derive its unit from the formula $$\\Delta E = mc\\Delta\\theta$$. Why can $$\\Delta\\theta$$ be in either kelvin or Celsius? (3 steps)", "answer": "- Step 1: The word-perfect definition: specific heat capacity is the energy needed to raise the temperature of 1 kg of a substance by 1 K (equivalently $$1\\,^{\\circ}\\text{C}$$).\n+ \"Specific\" means *per kilogram* — not per area, not per volume, always per unit mass.\n- Step 2: Rearrange $$\\Delta E = mc\\Delta\\theta$$ for $$c$$: $$c = \\frac{\\Delta E}{m\\Delta\\theta}$$, so units = $$\\frac{\\text{J}}{\\text{kg} \\times \\text{K}}$$ = $$\\text{J/(kg K)}$$ or equivalently $$\\text{J/(kg}\\,^{\\circ}\\text{C)}$$.\n- Step 3: $$\\Delta\\theta$$ (a temperature *change*, not an absolute temperature) can be in K or $$^{\\circ}\\text{C}$$ because a change of 1 K is exactly equal to a change of $$1\\,^{\\circ}\\text{C}$$ — the interval size is the same on both scales. Only *absolute* temperatures (like $$T$$ in gas laws) must be in kelvin; temperature *differences* are numerically identical in both units.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "Water has a specific heat capacity of $$4200\\,\\text{J/(kg K)}$$, much higher than most metals (e.g. aluminium $$\\sim 900$$). Give two practical consequences of this high value — one why water is *good* for heating systems, and one why it is *slow* to change temperature. (2 steps)", "answer": "- Step 1: Water is *good* for central heating radiators because each kilogram of water stores a large amount of thermal energy for a modest temperature rise. Hot water flowing through radiators delivers a lot of energy to the room before it cools significantly — it acts as an effective energy transport medium.\n- Step 2: Water is *slow* to heat up and slow to cool down because each degree of temperature change requires a large energy input (or release). This is why oceans moderate climate (slow to warm in summer, slow to cool in winter) and why cooking a large pot of water takes time. The high $$c$$ means water is thermally *stable* — it resists temperature changes.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "In the SHC practical, an aluminium block is heated electrically and $$c$$ is calculated from $$c = \\frac{IV\\Delta t}{m(\\theta_f - \\theta_i)}$$. The measured $$c$$ almost always comes out *too large*. List the error sources and explain why each pushes the result upward. (3 steps)", "answer": "- Step 1: The formula assumes all electrical energy goes into raising the block's temperature. In reality, some energy is diverted elsewhere, so the block receives *less* energy than $$IV\\Delta t$$ counts. Since $$c = \\frac{\\text{energy counted}}{m\\Delta\\theta}$$ and the denominator ($$m\\Delta\\theta$$) is measured correctly, but the numerator is *overestimated*, $$c$$ comes out too large.\n- Step 2: The specific error sources:\n+ **Heater absorbs energy** (main error) — the heater itself warms up; some of $$IV\\Delta t$$ heats the heater, not the block.\n+ **Energy lost to surroundings** — despite lagging, some energy escapes by conduction/convection/radiation from the block.\n+ **Lagging and thermometer absorb energy** — a little energy goes into the insulation material and the thermometer's own thermal mass.\n- Step 3: All three errors mean the block gets *less* energy than the electrical measurement claims, so the numerator in $$c = \\frac{\\Delta E}{m\\Delta\\theta}$$ is too large relative to what actually reached the block. Additionally, if $$\\Delta\\theta$$ is small, thermometer inaccuracy can worsen the result — a too-small $$\\Delta\\theta$$ would make $$c$$ even larger (dividing by a smaller number).", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "A student measures the SHC of aluminium and gets $$990\\,\\text{J/(kg K)}$$, higher than the accepted $$\\sim 910$$. She then takes the *gradient* of the temperature–time graph at the very start of heating (where the line is nearly linear and the block is barely above room temperature). Why does this gradient method give a better value? (2 steps)", "answer": "- Step 1: At the very start of heating, the block's temperature is only slightly above room temperature, so the rate of energy loss to the surroundings is *negligible* (very small temperature difference → very small driving force for loss). We can therefore reasonably assume: rate of electrical energy in = rate of energy gained by the block.\n- Step 2: Using $$IV = mc\\frac{d\\theta}{dt}$$ with the early gradient $$\\frac{d\\theta}{dt}$$ eliminates most of the surroundings-loss error, giving a $$c$$ closer to the true value ($$\\sim 950$$ instead of $$990$$). The remaining discrepancy comes from the heater and thermometer still absorbing some energy — but the *dominant* error (surroundings loss) is effectively removed.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "A $$0.5\\,\\text{kg}$$ copper block with $$c = 385\\,\\text{J/(kg K)}$$ is heated by $$3\\,\\text{K}$$. Without doing the full multiplication, estimate the order of magnitude of the energy transferred and explain your reasoning. (2 steps)", "answer": "- Step 1: The formula is $$\\Delta E = mc\\Delta\\theta$$. The mass is roughly half a kilogram, $$c$$ is roughly 400, and $$\\Delta\\theta$$ is 3. So the energy is approximately $$0.5 \\times 400 \\times 3 = 600\\,\\text{J}$$ — order of magnitude: hundreds of joules.\n+ The exact value is $$0.5 \\times 385 \\times 3 = 577.5\\,\\text{J}$$, confirming the estimate.\n- Step 2: The conceptual takeaway: for a modest mass (under 1 kg) and a modest temperature rise (a few K), the energy involved is typically in the hundreds to thousands of joules range for metals (low $$c$$), but would be much larger for water (high $$c$$): the same mass and temperature rise for water would need $$0.5 \\times 4200 \\times 3 \\approx 6300\\,\\text{J}$$ — about ten times more, illustrating why water is thermally \"heavy.\"", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "Define specific latent heat, emphasising the condition that must always be stated. Why is the energy called \"latent\" (hidden)? (2 steps)", "answer": "- Step 1: The word-perfect definition: specific latent heat is the energy needed to change the state of 1 kg of a substance with **no change in temperature**. The \"no change in temperature\" clause is essential — without it, the definition is incomplete and loses marks.\n+ \"Specific\" = per kilogram (same rule as SHC).\n+ Fusion = solid ↔ liquid; vaporisation = liquid ↔ gas.\n- Step 2: The energy is called \"latent\" (hidden) because during a state change, energy is being transferred *but the temperature does not change* — the effect is not immediately visible on a thermometer. The energy goes into *potential energy* (breaking or loosening intermolecular bonds), not kinetic energy, so the average particle speed (and therefore temperature) stays constant. The energy is \"hidden\" in the bond changes rather than showing up as a temperature rise.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": true}, {"question": "For water, $$L_f \\approx 3.34 \\times 10^5\\,\\text{J/kg}$$ and $$L_v \\approx 2.26 \\times 10^6\\,\\text{J/kg}$$ — vaporisation needs roughly seven times more energy than fusion. Explain *why* this ratio is so large, in terms of what the energy is actually doing to the molecules. (3 steps)", "answer": "- Step 1: During **fusion** (melting), the energy partially overcomes the intermolecular bonds so that molecules can *slide past one another* — they go from a rigid lattice (fixed positions) to a fluid where they can move around but are still quite close together. The bonds are *loosened*, not fully broken.\n- Step 2: During **vaporisation** (boiling), the energy must *fully separate* the molecules so that they escape entirely from each other's influence and move independently as a gas. This requires overcoming *all* the remaining attractive forces between molecules and giving each molecule enough kinetic energy to break free permanently.\n+ Melting: \"let them slide\" → moderate energy\n+ Boiling: \"let them fly apart completely\" → much more energy\n- Step 3: The ratio ($$L_v \\gg L_f$$) reflects the fact that fully separating molecules (breaking all bonds) requires far more work than merely loosening them enough to flow. This is true for all substances, not just water — vaporisation always demands significantly more energy per kilogram than fusion.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "On a heating curve (temperature vs energy supplied) for ice being heated to steam, identify which equation governs each section. Why is the boiling plateau *much longer* than the melting plateau? (3 steps)", "answer": "- Step 1: The three *sloped* sections (solid warming, liquid warming, gas warming) are governed by $$\\Delta E = mc\\Delta\\theta$$ — temperature is rising because energy goes into kinetic energy (particles move faster).\n- Step 2: The two *flat* plateaus are governed by $$\\Delta E = L\\Delta m$$ — temperature is constant because energy goes into potential energy (breaking bonds), not kinetic energy. The melting plateau occurs at the fusion temperature; the boiling plateau at the vaporisation temperature.\n- Step 3: The boiling plateau is *much longer* than the melting plateau because $$L_v \\gg L_f$$ — it takes roughly seven times more energy per kilogram to vaporise water than to melt ice, so the horizontal section on the graph extends much further for boiling. This visual difference on the heating curve directly reflects the underlying physics: full molecular separation demands far more energy than partial loosening.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "A student says \"specific latent heat is the energy per unit *area* needed to change state.\" What does \"specific\" actually mean in both SHC and SLH, and why is \"per area\" wrong? (2 steps)", "answer": "- Step 1: In both SHC and SLH, \"specific\" means **per kilogram** (per unit mass). SHC: energy per kg per K. SLH: energy per kg (for a state change). It never means per area, per volume, or per mole in the A-level context.\n- Step 2: \"Per area\" would give a different quantity with different units ($$\\text{J/m}^2$$), which is not what either formula uses. The formulas $$\\Delta E = mc\\Delta\\theta$$ and $$\\Delta E = L\\Delta m$$ both have mass ($$m$$ or $$\\Delta m$$) in kg as the scaling variable. The exam rule: \"specific\" = \"per kg,\" always.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "A $$0.2\\,\\text{kg}$$ block of ice at $$0\\,^{\\circ}\\text{C}$$ needs to be melted completely (still at $$0\\,^{\\circ}\\text{C}$$). Given $$L_f \\approx 3.3 \\times 10^5\\,\\text{J/kg}$$, estimate the energy required and explain why the temperature does not rise during this process. (2 steps)", "answer": "- Step 1: Using $$\\Delta E = L\\Delta m$$: $$\\Delta E \\approx 3.3 \\times 10^5 \\times 0.2 = 66\\,000\\,\\text{J}$$, i.e. roughly 66 kJ. Order of magnitude: tens of thousands of joules for a small mass.\n- Step 2: The temperature does not rise because all the supplied energy goes into *potential energy* — overcoming the intermolecular bonds that hold the ice in its rigid lattice. No energy goes into kinetic energy (making particles move faster), so the average kinetic energy and therefore the temperature remain constant at $$0\\,^{\\circ}\\text{C}$$ until every molecule has been freed from the lattice structure.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": false}, {"question": "Define internal energy. What two components make it up, and which component does temperature measure? For an ideal gas, why is the potential energy component zero? (3 steps)", "answer": "- Step 1: Internal energy is the sum of the **random kinetic energy** and the **potential energy** of all the particles in a body. The kinetic part comes from particle motion/vibration; the potential part comes from the energy stored in intermolecular bonds (stretched and compressed like springs).\n- Step 2: Temperature is a measure of the *mean random kinetic energy* of the particles. Higher temperature → faster average particle motion → greater kinetic component. The potential component does not directly affect temperature.\n- Step 3: For an **ideal gas**, the assumptions include negligible intermolecular forces (except during collisions) and negligible molecular volume. With no forces between molecules (except fleeting repulsion during collisions), there is no stored potential energy in bonds — the internal energy of an ideal gas is *entirely kinetic*. This means temperature directly measures the total internal energy for an ideal gas, which is why $$\\frac{1}{2}m\\langle c^2\\rangle = \\frac{3}{2}kT$$ links KE to temperature so cleanly.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": false}, {"question": "Absolute zero is $$0\\,\\text{K}$$ (or $$-273\\,^{\\circ}\\text{C}$$). In terms of particle energy, what does absolute zero represent? Why can it never actually be reached? (2 steps)", "answer": "- Step 1: Absolute zero is the lowest theoretical temperature, at which particles have their **minimum possible kinetic energy** — in the simple model, they would have zero random motion and zero average kinetic energy. The mean KE equation $$\\frac{1}{2}m\\langle c^2\\rangle = \\frac{3}{2}kT$$ gives KE = 0 when $$T = 0\\,\\text{K}$$.\n- Step 2: Absolute zero cannot be reached because quantum mechanics requires a minimum \"zero-point energy\" — particles cannot be completely stationary. Also, practically, removing the last bits of energy requires infinite effort (each step removes less energy than the previous one). The coldest achieved in labs is about $$10^{-9}\\,\\text{K}$$, and even deep space is $$\\sim 2.7\\,\\text{K}$$ — never truly zero.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": false}, {"question": "Convert: (a) $$25\\,^{\\circ}\\text{C}$$ to kelvin, (b) $$300\\,\\text{K}$$ to Celsius. A student in London ($$18\\,^{\\circ}\\text{C}$$) says Hong Kong ($$$36\\,^{\\circ}\\text{C}$$) is \"twice as hot.\" Is this correct? (3 steps)", "answer": "- Step 1: (a) $$T = 25 + 273 = 298\\,\\text{K}$$. (b) $$\\theta = 300 - 273 = 27\\,^{\\circ}\\text{C}$$. The rule: add 273 to go from Celsius to kelvin; subtract 273 to go from kelvin to Celsius.\n- Step 2: The student is wrong. \"Twice as hot\" would mean twice the *absolute* temperature: London at $$18\\,^{\\circ}\\text{C} = 291\\,\\text{K}$$, Hong Kong at $$36\\,^{\\circ}\\text{C} = 309\\,\\text{K}$$. The ratio is $$309/291 \\approx 1.06$$ — only about 6% hotter in absolute terms.\n- Step 3: Celsius temperatures cannot be compared with ratios because the zero point is arbitrary (it is not true zero energy). Only *kelvin* temperatures reflect actual particle energy, so only kelvin ratios are physically meaningful. $$0\\,^{\\circ}\\text{C}$$ is not \"zero heat\" — it is $$273\\,\\text{K}$$ of particle energy.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "A sealed rigid container of gas is heated from $$20\\,^{\\circ}\\text{C}$$ to $$80\\,^{\\circ}\\text{C}$. Explain, in the correct particle-chain order, what happens to the pressure. Why must you say \"pressure rises\" and not \"the gas expands\"? (3 steps)", "answer": "- Step 1: The correct chain: (1) Heating gives the gas particles more energy → (2) they move faster → (3) faster particles make more frequent collisions with the walls → (4) each collision exerts a larger force → (5) total force on the wall increases → (6) since $$p = F/A$$ and area $$A$$ is fixed, pressure rises ($$p \\uparrow$$).\n- Step 2: You must say \"pressure rises\" because the volume is *fixed* — the container is rigid and the gas *cannot expand*. In a fixed-volume scenario, the only response to heating is a pressure increase. Saying \"the gas expands\" contradicts the given constraint.\n+ Phuc's recorded slip: saying the gas \"expands\" — corrected because volume is fixed.\n- Step 3: The pressure law formalises this: $$p/T = \\text{constant}$$ for a fixed mass at constant volume. As $$T$$ increases (in kelvin), $$p$$ must increase proportionally. The particle chain provides the *mechanism*; the pressure law provides the *quantitative* relationship.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": false}, {"question": "A student defines pressure as \"mass divided by volume.\" What is the correct definition, and what quantity does \"mass/volume\" actually represent? Why is confusing these two particularly dangerous in gas-law questions? (2 steps)", "answer": "- Step 1: Pressure is **force per unit area**: $$p = F/A$$, unit Pa = $$\\text{N/m}^2$$. \"Mass divided by volume\" ($$m/V$$) is **density** ($$\\rho$$), unit $$\\text{kg/m}^3$$. These are entirely different quantities with different units and different physical meanings.\n- Step 2: Confusing them is dangerous in gas questions because the kinetic theory equation $$p = \\frac{1}{3}\\rho\\langle c^2\\rangle$$ involves *both* pressure and density. If you substitute density values into a pressure formula (or vice versa), the calculation will be completely wrong. Keep $$p = F/A$$ (pressure) and $$\\rho = m/V$$ (density) strictly separate in your mind.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": false}, {"question": "State the pressure law for a fixed mass of gas at constant volume. Why must the temperature be in *kelvin* for this law to work? What goes wrong if you use Celsius? (3 steps)", "answer": "- Step 1: The pressure law: $$p \\propto T$$ for a fixed mass of gas at constant volume, or equivalently $$\\frac{p_1}{T_1} = \\frac{p_2}{T_2}$$, where $$T$$ is in **kelvin**.\n- Step 2: The law requires kelvin because it is derived from the kinetic theory relation $$\\frac{1}{2}m\\langle c^2\\rangle = \\frac{3}{2}kT$$, where $$T = 0\\,\\text{K}$$ corresponds to zero molecular KE and zero pressure. The proportionality $$p \\propto T$$ passes through the origin ($$p = 0$$ at $$T = 0\\,\\text{K}$$), making it a true direct proportion.\n- Step 3: If you use Celsius, $$p$$ is *not* proportional to $$\\theta$$. At $$\\theta = 0\\,^{\\circ}\\text{C}$$ ($$= 273\\,\\text{K}$$), the pressure is not zero — the gas still has significant molecular KE. A graph of $$p$$ vs $$\\theta$$ would be a straight line that does *not* pass through the origin, so the simple ratio $$p_1/\\theta_1 = p_2/\\theta_2$$ would give wrong answers. Only the kelvin scale gives the true direct proportionality.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": true}, {"question": "Write the ideal gas equation $$pV = NkT$$ and identify every symbol and its SI unit. What is the Boltzmann constant $$k$$, and how is it related to the molar gas constant $$R$$ and Avogadro's number $$N_A$$? (2 steps)", "answer": "- Step 1: $$pV = NkT$$ where:\n+ $$p$$ = pressure in Pa ($$\\text{N/m}^2$$)\n+ $$V$$ = volume in $$\\text{m}^3$$\n+ $$N$$ = number of molecules (count, no unit)\n+ $$k$$ = Boltzmann constant = $$1.38 \\times 10^{-23}\\,\\text{J/K}$$\n+ $$T$$ = absolute temperature in K (always kelvin, never Celsius)\n- Step 2: The Boltzmann constant is defined as $$k = R/N_A$$, where $$R = 8.31\\,\\text{J/(K mol)}$$ is the molar gas constant and $$N_A = 6.02 \\times 10^{23}\\,\\text{mol}^{-1}$$ is Avogadro's number. Substituting $$R = kN_A$$ and $$nN_A = N$$ into $$pV = nRT$$ gives $$pV = NkT$$. The constant $$k$$ bridges the microscopic (per-molecule) and macroscopic (per-mole) descriptions: it is the gas constant *per molecule* rather than *per mole*.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": false}, {"question": "State Boyle's law with its two necessary conditions. A diver at 20 m depth (pressure $$\\approx 3$$ atmospheres) releases a bubble of volume $$2\\,\\text{cm}^3$$. Without detailed calculation, estimate what happens to the bubble's volume as it rises to the surface (1 atmosphere). (2 steps)", "answer": "- Step 1: Boyle's law: the pressure of a fixed mass of gas is inversely proportional to its volume, provided the **temperature is kept constant** and the **mass is fixed**. Mathematically: $$pV = \\text{constant}$$, or $$p_1 V_1 = p_2 V_2$$.\n+ Both conditions must be stated — missing either loses marks.\n- Step 2: At depth, pressure is about 3 atmospheres; at the surface, about 1 atmosphere. Since $$pV = \\text{constant}$$, tripling the volume when pressure drops by a factor of 3: $$V_2 \\approx 3 \\times 2 = 6\\,\\text{cm}^3$$. The bubble roughly triples in volume as it rises — this is why deep-sea divers must exhale continuously while ascending: the expanding air could rupture lungs.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": false}, {"question": "Derive (walk through) the equation $$\\frac{1}{2}m\\langle c^2\\rangle = \\frac{3}{2}kT$$ by combining two fundamental gas equations. What does this equation tell us about the relationship between molecular KE and absolute temperature? (3 steps)", "answer": "- Step 1: Start with the kinetic-theory-derived equation $$pV = \\frac{1}{3}Nm\\langle c^2\\rangle$$, which comes from modelling molecular collisions with container walls using Newton's laws (momentum change per collision, rate of collisions, force = rate of momentum change, pressure = force/area).\n- Step 2: Also recall the experimentally-derived ideal gas equation $$pV = NkT$$. Since both left-hand sides equal $$pV$$, set the right-hand sides equal: $$\\frac{1}{3}Nm\\langle c^2\\rangle = NkT$$.\n+ $$N$$ cancels on both sides (it is the same gas sample): $$\\frac{1}{3}m\\langle c^2\\rangle = kT$$.\n- Step 3: Multiply both sides by $$\\frac{3}{2}$$: $$\\frac{1}{2}m\\langle c^2\\rangle = \\frac{3}{2}kT$$. This tells us the **average random kinetic energy of a gas molecule is directly proportional to the absolute temperature**. Double the kelvin temperature → double the mean KE. At $$T = 0\\,\\text{K}$$, mean KE = 0 (absolute zero = zero molecular kinetic energy, in the simple model).", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": true}, {"question": "What is \"root-mean-square speed\" ($$c_{\\text{rms}}$$)? Why do we use $$\\langle c^2\\rangle$$ (mean square speed) rather than simply averaging the speeds themselves? (2 steps)", "answer": "- Step 1: The root-mean-square speed is $$c_{\\text{rms}} = \\sqrt{\\langle c^2\\rangle}$$, where $$\\langle c^2\\rangle$$ is the *mean of the squares* of all molecular speeds (square each speed, sum them, divide by the number of molecules), and then take the square root of that average.\n+ Example: speeds 310, 320, 330, 340, 350 → mean square = 109,100 → $$c_{\\text{rms}} \\approx 330\\,\\text{m/s}$$, which is close to but not identical to the simple mean speed (330).\n- Step 2: We use mean square speed rather than simple average speed because the kinetic energy equation involves $$c^2$$ (KE = $$\\frac{1}{2}mc^2$$), and the pressure derivation works with $$c^2$$ not $$c$$. The average of $$c^2$$ is the quantity that links to energy and pressure; the average of $$c$$ does not have the same physical meaning. Also, the average *velocity* of molecules in a stationary gas is zero (random directions cancel), but the average of $$c^2$$ (speeds squared, always positive) is non-zero — which is what we need.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": false}, {"question": "List four key assumptions of the kinetic theory of an ideal gas, and for each, briefly state the experimental evidence or reasoning that supports it. (2 steps)", "answer": "- Step 1: The four assumptions:\n+ **Large number of molecules in continuous, rapid, random motion** — supported by Brownian motion (tiny particles jitter visibly due to unequal bombardment by invisible molecules).\n+ **Collisions are perfectly elastic** (no KE lost) — if not, molecules would gradually slow and the gas would cool spontaneously, which is not observed; Brownian motion continues indefinitely.\n+ **Volume of molecules is negligible compared to the container** — gases can be compressed by large factors, implying molecules occupy a tiny fraction of the total volume.\n+ **Intermolecular forces are negligible except during collisions** — on average, molecules are very far apart relative to their size, so attractive/repulsive forces become extremely small between collisions.\n- Step 2: These assumptions are *idealisations* — real gases deviate at high pressure (molecular volume becomes significant) and low temperature (intermolecular forces cause condensation). But under normal laboratory conditions (moderate pressure, well above critical temperature), real gases like air behave nearly ideally, so the model is an excellent approximation.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": true}, {"question": "A hot machine is operating in the vacuum of space. A student assumes \"cold space will automatically cool it.\" Explain why this is wrong, and design a cooling solution using only the physics of the three transfer mechanisms. (3 steps)", "answer": "- Step 1: In a vacuum there are no particles — no atoms to pass vibrations to (no conduction) and no fluid to circulate (no convection). The only available heat-transfer mechanism is **radiation** (infrared emission). Space does not \"suck heat out\" — it simply lacks the pathways for conduction and convection.\n- Step 2: The machine *can* lose heat, but only by emitting infrared radiation. Whether it cools depends on whether its radiative emission rate exceeds the rate at which it absorbs incoming radiation (e.g. from the Sun) and generates heat internally. If internal heat generation + absorbed solar input exceed emission, the machine *heats up*, not cools down.\n- Step 3: The engineering solution: conduct internal heat to a **large, matte-black radiator panel** (large area = more emission; matte black = best emitter) that radiates infrared to space. Add a **reflective/silver layer** on the Sun-facing side to reflect incoming solar radiation (minimise absorption). The radiator must be sized so its", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": false}], "count": 42}, "qwen_1": {"label": "Qwen 3.7 Max ①", "cards": [{"question": "In thermodynamics, explain the fundamental distinction between \"thermal energy\" and \"heating\", and identify the common misconception associated with the word \"heat\". (3 steps)", "answer": "- Step 1: Define thermal energy as a **store**. It is the total internal energy of a body, comprising the sum of the random kinetic and potential energies of its particles, and is measured in joules ($$\\text{J}$$).\n- Step 2: Define heating as a **transfer pathway**. It is the *process* of energy moving from a region of higher temperature to a region of lower temperature via conduction, convection, or radiation.\n- Step 3: Address the misconception. The common error is treating \"heat\" as a physical substance contained within a body (the outdated caloric theory). A body does not \"contain heat\"; it contains internal (thermal) energy, and \"heating\" is merely the transfer of that energy.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Define thermal equilibrium in terms of microscopic energy transfers, and explain what happens to an object's macroscopic temperature when this state is reached. (2 steps)", "answer": "- Step 1: Define the microscopic balance. Thermal equilibrium is reached when an object is radiating (emitting) energy at the exact same rate as it is absorbing energy from its surroundings.\n- Step 2: Explain the macroscopic result. Because the net energy transfer is zero, the object's internal energy remains constant, which means its macroscopic **temperature remains constant**.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "How did the Herschel prism experiment fundamentally change our understanding of the electromagnetic spectrum, and what specific physical effect did it detect beyond the visible red light? (2 steps)", "answer": "- Step 1: Describe the experimental setup and observation. Herschel passed white light through a prism and placed thermometers in the separated colours. He placed one thermometer just beyond the visible red band (where no light could be seen) and observed that it recorded the highest temperature rise.\n- Step 2: State the conclusion. This proved the existence of **infrared radiation**—an invisible form of electromagnetic radiation that carries thermal energy, demonstrating that the visible spectrum is only a small part of a broader electromagnetic continuum.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "A student claims that a shiny silver can filled with hot water will \"give off\" more thermal energy than a matte black can because shiny surfaces are the \"best reflectors\". Critically evaluate this claim by distinguishing between emission, absorption, and reflection. (3 steps)", "answer": "- Step 1: Clarify the definitions. **Emission** is giving off internally generated radiation; **absorption** is taking in incoming radiation; **reflection** is bouncing back incoming radiation without absorbing it.\n- Step 2: Evaluate the student's claim. The student confuses reflection with emission. Because the hot water is the internal source, the relevant process is *emission*, not reflection. A shiny surface is the best reflector, which inherently makes it the *worst* absorber and *worst* emitter.\n- Step 3: Conclude the correct physics. The matte black can is the best emitter (and best absorber). Therefore, the black can will \"give off\" (emit) significantly more infrared radiation than the shiny silver can, making the student's claim incorrect.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "When comparing the cooling curves of a matte black object and a shiny silver object initially at the same high temperature, how do you deduce which is the better emitter, and what is the misconception regarding the \"strong emitter's\" final temperature? (3 steps)", "answer": "- Step 1: Analyze the cooling curves. The object that is the better emitter will lose thermal energy at a faster rate. On a temperature-time graph, this is represented by the curve that **falls more steeply** (cools faster).\n- Step 2: Identify the better emitter. The matte black object's curve will fall faster than the shiny silver object's curve, proving that black/matte surfaces are better emitters of infrared radiation.\n- Step 3: Address the misconception. A common error is predicting that a \"strong emitter\" will get hotter. In reality, emitting energy *removes* internal energy from the object, causing it to cool down. You read emission capability from the *rate of cooling*, never from a claim that the emitter reaches a higher temperature.", "source": "Qwen 3.7 Max ①", "_id": "qwen_1_4", "judge_pick"
