 p (since $$V \\propto T$$). \n\nReal gases condense to liquids well before 0 K, and quantum mechanics insists on a residual \"zero-point energy,\" but 0 K is the theoretical lower limit.", "source": "MiniMax M3 ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "A computer that uses liquid cooling on Earth is placed in the vacuum of space. Does \"cold space\" cool it automatically? Explain in terms of the three mechanisms. (3 steps)", "answer": "- Step 1: In a vacuum there are no particles, so there is nothing to pass vibrations to → no conduction. There is no fluid to circulate → no convection.\n- Step 2: So the only way the machine can lose heat is by radiation (emitting IR).\n- Step 3: \"Cold space\" does not cool it automatically. The machine only cools if it emits more IR than it absorbs from the Sun. If the machine is in sunlight with no thermal management, it can overheat despite being surrounded by \"cold\" vacuum.\n\nThis is the central insight for spacecraft thermal design — conduction and convection are not available, so radiation is everything.", "source": "MiniMax M3 ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "How is cooling designed for a spacecraft in vacuum? Name two design features and explain why each helps. (2 steps)", "answer": "- Step 1: Use a large, matte-black radiator panel. Black surfaces are the best emitters of IR, and a large area means a high total emission rate. Internal heat is conducted to this panel, which then radiates the energy away as IR.\n- Step 2: Add a reflective (silver) layer on the Sun-facing side. Shiny surfaces are good IR reflectors and poor absorbers, so they bounce incoming solar radiation back into space rather than letting it heat the spacecraft.\n\nThe radiator must be large enough to emit both the internally generated heat and any solar input that does sneak through. Real spacecraft also use multilayer insulation (\"MLI\") to minimise radiation in unwanted directions.", "source": "MiniMax M3 ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "A student says: \"At thermal equilibrium, the object has stopped emitting IR, so its temperature is constant.\" Identify and correct the two errors. (2 steps)", "answer": "- Error 1: \"Stopped emitting.\" An object in thermal equilibrium has not stopped emitting IR. It is still emitting at the same rate as it absorbs. The net transfer is zero, but emission is non-zero.\n- Error 2: \"Therefore temperature is constant.\" The correct cause is that the internal energy is not changing, so the mean particle KE is not changing, so temperature is constant. The constancy of temperature is a consequence of the rate balance, not a consequence of emission having stopped.\n\nThink of it as a balance sheet: inflow = outflow, so the account balance (internal energy, and hence temperature) is steady.", "source": "MiniMax M3 ①", "_id": "minimax_1_37", "judge_pick": true}, {"question": "Two objects, one at 50 °C and one at 20 °C, sit in a room. The hotter one cools; the cooler one warms. In particle terms, what is happening in each case? (3 steps)", "answer": "- Step 1: The 50 °C object has particles with higher average KE than its surroundings. By the kinetic-theory link, it emits more IR than it absorbs, so its internal energy and temperature fall.\n- Step 2: The 20 °C object has particles with lower average KE than the 50 °C one. Net IR transfer is from the hotter object to it, so it absorbs more than it emits, and its internal energy and temperature rise.\n- Step 3: Both continue until their temperatures equalise (thermal equilibrium), at which point both emit and absorb at the same rate and there is no net energy transfer.\n\nThe net flow of energy is always from higher-temperature to lower-temperature bodies — never the reverse.", "source": "MiniMax M3 ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "A black kettle at 90 °C and a silver kettle at 90 °C are filled with water and left in a 20 °C room. Which cools to 20 °C first? (2 steps)", "answer": "- Step 1: The black kettle cools faster, because black surfaces are better emitters of IR and lose energy to the room more quickly.\n- Step 2: Both end at 20 °C (room temperature), because at thermal equilibrium each emits and absorbs at the same rate, and the room is the only significant IR source/sink. The silver kettle just takes longer to get there.\n\nNote: both kettles reach the same final temperature, not different ones. The property that differs is the *rate* of energy transfer, not the equilibrium state.", "source": "MiniMax M3 ①", "_id": "minimax_1_39", "judge_pick": false}, {"question": "Two blocks of different materials sit in the same 21 °C room. Identical pieces of ice are placed on each. The ice on block A melts much faster than the ice on block B. A student says: \"Block A must be hot.\" Correct them in particle terms. (2 steps)", "answer": "- Step 1: Both blocks are at the same temperature (21 °C), so the temperature is not what differs. The student's intuition that \"hot melts ice faster\" is being misapplied.\n- Step 2: The difference is thermal conductivity. Block A is a better conductor, so it transfers energy to the ice by contact much faster than block B. The ice on A gains energy faster, reaches 0 °C faster, and melts faster.\n\nThe lesson demo showed that the temperature of a block does not predict its conductivity — that is a separate material property.", "source": "MiniMax M3 ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "Why are free electrons described as \"delocalised\"? Where do they come from in a metal?", "answer": "- \"Delocalised\" means \"not tied to one atom.\" In a metal's outer electron shells, the electrons are not bound to individual atoms; they are shared across the whole metallic lattice and can move freely through it.\n- In a metallic bond, the outer electrons of all the metal atoms form a \"sea\" of electrons that flows between the positively charged ion cores. This is also why metals conduct electricity — the same electrons respond to an applied p.d. by drifting through the lattice.\n- The ion cores stay put (vibrating in their fixed positions); only the electrons move.\n\nThis is the same reason metals are good thermal and electrical conductors: the free electrons do both jobs.", "source": "MiniMax M3 ①", "_id": "minimax_1_41", "judge_pick": false}, {"question": "In a vacuum flask, name the three features and the heat-transfer mechanism each one suppresses.", "answer": "- Vacuum gap between the double walls: suppresses conduction (no particles to pass vibrations) and convection (no fluid to circulate).\n- Silvered (shiny) surfaces on the walls: suppress radiation by reflecting IR. Shiny surfaces are poor emitters and poor absorbers.\n- Plastic or foam stopper at the opening: suppresses convection by blocking the bulk flow of air into or out of the flask, and reduces conduction along the neck.\n\nAll three mechanisms are addressed, which is why a good thermos can keep a drink hot for many hours. The same engineering logic (kill all three mechanisms) is used for spacecraft thermal control.", "source": "MiniMax M3 ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "Sketch the temperature–time cooling curve for a hot black object placed in a 20 °C room. Label the key features. (3 steps)", "answer": "- Step 1: The curve starts at the high initial temperature and falls steeply at first, when the temperature difference between the object and the room is largest and the net rate of energy loss is greatest.\n- Step 2: The curve gradually flattens as the object cools, because the temperature difference shrinks and so the net emission rate decreases.\n- Step 3: The curve levels off at 20 °C (room temperature), where thermal equilibrium is reached — emission rate equals absorption rate and there is no further net change in internal energy.\n\nA \"steeper cooling\" means a higher emission rate, which corresponds to a better emitter (e.g., black). A shiny surface would give a less steep curve.", "source": "MiniMax M3 ①", "_id": "minimax_1_43", "judge_pick": true}, {"question": "A student asks: \"If infrared is radiation, can I warm my hands by an infrared lamp through a glass window? Through a brick wall?\" Walk through both cases.", "answer": "- Through glass: yes, mostly. Glass is transparent to much of the IR emitted by a typical lamp (especially short-IR/near-IR), so the IR passes through and warms your hands. This is the principle of an IR sauna or a heat lamp.\n- Through brick: no, not effectively. Brick absorbs IR strongly — IR does not pass through. The brick heats up and re-emits at its own (longer-wavelength) IR, which is mostly re-absorbed by the brick again before reaching your hands.\n\nDifferent materials are transparent or opaque to different bands of IR. The greenhouse effect relies on the atmosphere being transparent to short-wavelength incoming sunlight but opaque to long-wavelength outgoing Earth IR.", "source": "MiniMax M3 ①", "_id": "minimax_1_44", "judge_pick": false}, {"question": "Briefly describe the greenhouse effect in three steps, and identify the most common student misconception about it.", "answer": "- Step 1: The Sun's radiation (mostly short-wavelength visible and near-IR) passes through the atmosphere and is absorbed by the ground, which warms.\n- Step 2: The warm ground re-emits radiation at longer-wavelength IR, because the ground is cooler than the Sun.\n- Step 3: Greenhouse gases (CO₂, water vapour, methane) are transparent to the incoming short wavelengths but absorb much of the outgoing long-wavelength IR, re-radiating some of it back toward Earth. This slows the rate at which the Earth loses energy, so the equilibrium temperature rises.\n- Common misconception: that the atmosphere \"traps heat like a blanket\" or \"knocks the radiation out.\" The correct language is \"absorbs and re-radiates,\" with the crucial point being the different (longer) wavelength of the re-emitted radiation.", "source": "MiniMax M3 ①", "_id": "minimax_1_45", "judge_pick": false}, {"question": "In kinetic theory, an \"ideal gas\" satisfies certain assumptions. List at least four.", "answer": "- The gas contains a very large number of molecules in continuous, rapid, random motion.\n- The volume occupied by the molecules themselves is negligible compared with the volume of the container.\n- Collisions between molecules and between molecules and the walls are perfectly elastic (no KE lost).\n- Intermolecular forces are negligible except during a collision.\n- The duration of collisions is negligible compared with the time between collisions.\n\nThese are why we can treat the gas as point-like, frictionless particles that bounce elastically and ignore their mutual forces most of the time.", "source": "MiniMax M3 ①", "_id": "minimax_1_46", "judge_pick": false}, {"question": "What is the meaning of \"mean square speed\" $$\\langle c^2\\rangle$$? Why is it used instead of the simple average speed in kinetic-theory formulas? (2 steps)", "answer": "- Step 1: $$\\langle c^2\\rangle$$ is the average of the squares of the speeds. For each molecule, you square its speed, then take the average over all N molecules. The rms speed is $$c_\\text{rms} = \\sqrt{\\langle c^2\\rangle}$$.\n- Step 2: The kinetic theory formulas (pressure derivation, KE) involve $$c^2$$ naturally, because KE = $$\\tfrac{1}{2}mc^2$$ and momentum change is proportional to velocity. Working with $$\\langle c^2\\rangle$$ is algebraically cleaner than working with average speed, and the algebra leads directly to the result $$\\tfrac{1}{2}m\\langle c^2\\rangle = \\tfrac{3}{2}kT$$.\n\nA subtle point: $$\\langle c^2\\rangle \\neq \\langle c\\rangle^2$$ — the mean of squares is not the square of the mean. A calculation with speeds 310, 320, 330, 340, 350 m/s gives $$\\langle c^2\\rangle = 109{,}100$$ but $$\\langle c\\rangle^2 = 108{,}900$$.", "source": "MiniMax M3 ①", "_id": "minimax_1_47", "judge_pick": false}, {"question": "Use the equation $$\\tfrac{1}{2}m\\langle c^2\\rangle = \\tfrac{3}{2}kT$$ to predict whether helium molecules move faster or slower than air molecules at the same temperature. (2 steps)", "answer": "- Step 1: At the same T, $$\\tfrac{1}{2}m\\langle c^2\\rangle = \\tfrac{3}{2}kT$$ gives the same mean KE for both gases. So heavier molecules (more m) must have smaller $$\\langle c^2\\rangle$$ to keep the product constant.\n- Step 2: A helium molecule is much lighter than an air molecule (helium mass $$6.7 \\times 10^{-27}$$ kg vs. air $$\\sim 4.8 \\times 10^{-26}$$ kg, roughly 7× lighter). So at the same temperature, helium molecules move significantly faster than air molecules.\n\nThis is why the speed of sound is higher in helium (~1000 m/s) than in air (~340 m/s), and why inhaling helium gives a high-pitched \"Donald Duck\" voice.", "source": "MiniMax M3 ①", "_id": "minimax_1_48", "judge_pick": false}, {"question": "What is the rms speed proportional to, given the equation $$\\tfrac{1}{2}m\\langle c^2\\rangle = \\tfrac{3}{2}kT$$? If T doubles, by what factor does c_rms change?", "answer": "- Rearranging: $$c_\\text{rms} = \\sqrt{\\dfrac{3kT}{m}}$$.\n- So $$c_\\text{rms} \\propto \\sqrt{T/m}$$. Higher T → faster; higher m → slower.\n- If T doubles, $$c_\\text{rms}$$ increases by a factor of $$\\sqrt{2} \\approx 1.41$$, not 2. (The common mistake is to expect speed to double when KE doubles — but KE is proportional to $$c^2$$, not $$c$$.)", "source": "MiniMax M3 ①", "_id": "minimax_1_49", "judge_pick": false}, {"question": "A gas is heated at constant volume from 27 °C to 54 °C. A student expects the pressure to double. Why is the student's prediction wrong, and what is the actual change? (2 steps)", "answer": "- Step 1: The student forgot to convert to kelvin. The pressure law $$p \\propto T$$ only works with T in K. 27 °C = 300 K, 54 °C = 327 K.\n- Step 2: The pressure ratio is $$p_2/p_1 = T_2/T_1 = 327/300 = 1.09$$, so the pressure rises by about 9%, not 100%. (Doubling the pressure from 300 K would require heating to 600 K = 327 °C.)\n\nA \"9% rise\" is a very common exam-style number, and the trap is always the missing conversion to kelvin.", "source": "MiniMax M3 ①", "_id": "minimax_1_50", "judge_pick": false}, {"question": "What is the difference between \"energy\" and \"heat\" in the modern physics view? Why is \"heat as a substance\" a misconception?", "answer": "- \"Energy\" is a property of a system (a store of the ability to do work) measured in joules.\n- \"Heat\" is not a separate thing stored in a body. The proper noun is \"thermal energy\" or \"internal energy.\" The verb-form is \"heating\" — the process of transferring energy due to a temperature difference.\n- The \"caloric\" theory (Lavoisier, 18th century) treated heat as a weightless fluid flowing from hot to cold. Rumford's cannon-boring experiments showed that mechanical work can produce heat, refuting the substance view. By the mid-19th century, Joule's work established the mechanical equivalent of heat and the conservation of energy.\n\nSo a body never \"contains heat\" — it contains internal energy, and that energy can be transferred by heating (among other routes).", "source": "MiniMax M3 ①", "_id": "minimax_1_51", "judge_pick": true}, {"question": "\"Internal energy\" is the official IAL term for the thermal store. Define it precisely. (2 steps)", "answer": "- Step 1: Internal energy is the sum of the random kinetic energy of a body's particles and the potential energy stored in the bonds between them.\n- Step 2: Temperature is a measure of the mean random kinetic energy of the particles, not of the internal energy as a whole. So a substance can have high internal energy at low temperature if the bond potential energy is high (e.g., during a state change) and vice versa.\n\nA useful image: vibrating atoms in a lattice have both PE (in the \"springs\" of the inter-atomic bonds) and KE (in their vibrations). Both contribute to internal energy; only the KE part is measured by temperature.", "source": "MiniMax M3 ①", "_id": "minimax_1_52", "judge_pick": false}, {"question": "In the SHC practical, why is the measured value of c almost always too large? List the contributing reasons. (3 steps)", "answer": "- Step 1: The main reason is energy absorbed by the heater itself. The heater warms up alongside the block, but its energy is counted in $$IV\\Delta t$$. The block gets less than the full $$IV\\Delta t$$, so the calculated c (which assumes the block got all of it) is too large.\n- Step 2: Energy is also lost to the surroundings, despite the lagging. This is energy that heated the air around the block rather than the block itself, so again the block got less than $$IV\\Delta t$$.\n- Step 3: Smaller sources: energy absorbed by the lagging, the thermometer, and any heat used to warm the oil in the thermometer hole. All of these make the block's share smaller, so c is too large.\n\nCounter-errors (thermometer reading low, meter inaccuracy) could go either way, but the dominant effect is \"block gets less than the counted energy,\" so c is biased high.", "source": "MiniMax M3 ①", "_id": "minimax_1_53", "judge_pick": false}, {"question": "A 0.215 kg avocado needs 1294 J to cool by 2 K. Find its specific heat capacity, then find the temperature change if it instead gains 3000 J. (3 steps)", "answer": "- Step 1: Rearrange $$\\Delta E = mc\\Delta\\theta$$ to $$c = \\dfrac{\\Delta E}{m\\Delta\\theta} = \\dfrac{1294}{0.215 \\times 2} = \\dfrac{1294}{0.43} \\approx 3009 \\text{ J/(kg·K)}$$.\n- Step 2: Re-use this c and rearrange for $$\\Delta\\theta = \\dfrac{\\Delta E}{mc} = \\dfrac{3000}{0.215 \\times 3009} = \\dfrac{3000}{647} \\approx 4.6 \\text{ K}$$.\n- Step 3: The 10 July board actually circled \"2500 J/(kg·K)\" — that figure is wrong for the printed numbers. Always re-key the division; a circled answer can still be arithmetically incorrect.\n\nA neat trick: if a friend shows you a circled answer, plug the numbers back in and check.", "source": "MiniMax M3 ①", "_id": "minimax_1_54", "judge_pick": false}, {"question": "Conduction, convection, and radiation are the three heat transfer mechanisms. For each, give (a) the medium required, (b) what carries the energy, and (c) a one-sentence example.", "answer": "- Conduction: requires a medium (mainly solids); particles pass on vibrations to neighbours, with free electrons helping in metals; example — heat travelling along a metal spoon in a hot drink.\n- Convection: requires a fluid (liquid or gas); bulk flow of the heated fluid carries its internal energy with it; example — warm air rising off a radiator.\n- Radiation: requires no medium; electromagnetic waves (mainly IR) carry energy through vacuum or matter; example — the Sun warming the Earth through 150 million km of space.\n\nA simple memory trick: conduction needs *contact*, convection needs a *current*, radiation can *reach* across a vacuum.", "source": "MiniMax M3 ①", "_id": "minimax_1_55", "judge_pick": true}, {"question": "\"Conduction, convection, and radiation — the heating process triggers.\" In a worded exam answer, why does the order of phrases matter?", "answer": "- The examiner wants the right keywords in the right causal order. The same words in the wrong order often score zero.\n- Correct order for conduction: \"particles vibrate more → pass vibrations to neighbours → energy travels through the solid.\"\n- Correct order for convection: \"particles gain energy → move faster → spread out → region less dense → rises; cooler fluid sinks to replace → convection current.\"\n- Correct order for radiation: \"infrared (EM) waves emitted by a hot object → travel through space (or a medium) → absorbed by another object → that object's internal energy increases.\"\n\nA memorized but unordered set of keywords tends to fail the \"explain\" questions. Practice the chains until they come out in the right order automatically.", "source": "MiniMax M3 ①", "_id": "minimax_1_56", "judge_pick": false}, {"question": "A black surface and a silver surface are at the same temperature. An IR camera pointed at them shows the black one as much \"brighter.\" Why, if both are the same temperature? (2 steps)", "answer": "- Step 1: The IR camera detects emitted IR, not reflected IR. The brightness in the image is proportional to the emission rate.\n- Step 2: At the same temperature, both surfaces have the same mean particle KE, but the black surface is a much better emitter of IR. So the black surface emits more IR photons per second, even though the silver surface is just as hot.\n\nA common student error: \"the black one is hotter.\" It is not. They are at the same temperature; the black one just radiates more of its energy away as IR.", "source": "MiniMax M3 ①", "_id": "minimax_1_57", "judge_pick": false}, {"question": "A wood-burning stove is shiny black on the outside but matte black on the inside firebox. Comment on the design logic.", "answer": "- The matte black inside is the best absorber of IR from the flames, so it absorbs as much radiant heat as possible and conducts it through the metal to warm the room.\n- The shiny black outside is a worse emitter than matte black, so it loses less heat to the room as IR. The shiny surface reflects some IR back into the room instead of emitting it away.\n- This is the same logic as a radiator in a UK home: a black radiator behind a shiny reflective foil panel. The black absorbs from the water inside, the foil reflects IR back into the room.\n\nIn short: matte black where you want absorption; shiny where you want to suppress emission and boost reflection.", "source": "MiniMax M3 ①", "_id": "minimax_1_58", "judge_pick": false}, {"question": "A balloon filled with hot air rises. A helium balloon rises. Both effects are due to a density difference, but the mechanisms differ. Explain. (2 steps)", "answer": "- Step 1: The hot-air balloon works by convection logic. Heating the air inside makes the air particles move faster and spread out. The mass of air inside is the same, but it occupies a larger volume, so its average density is less than the surrounding cooler air. Buoyancy pushes the balloon up.\n- Step 2: The helium balloon works by the same buoyancy principle, but the density difference is achieved by composition. Helium atoms are much lighter than the N₂/O₂ mixture of air, so the average mass per particle inside the balloon is smaller, and the density of helium at the same pressure and temperature is less than that of air.\n\nBoth rise because the average density inside is less than the average density outside. The way that density difference is achieved is what differs.", "source": "MiniMax M3 ①", "_id": "minimax_1_59", "judge_pick": false}, {"question": "A student asks: \"If hotter objects emit more IR, why does a very hot fire feel 'hot' from across the room, while a warm body feels nothing?\" Answer in terms of intensity and surface area. (2 steps)", "answer": "- Step 1: The intensity of IR emission rises steeply with temperature — the Stefan–Boltzmann law says emitted power per unit area scales as $$T^4$$ in kelvin. A small rise in T produces a much larger rise in emission per m².\n- Step 2: For a small warm object (e.g., a person), the surface area is also small, so total emitted power is low. A large hot fire has both a higher temperature (×4 in T → ×256 in emission per m²) and a much larger emitting area. So the total IR power reaching you is many orders of magnitude greater.\n\nThe same logic explains why a small black object at 100 °C is more dangerous than a large silver one at 50 °C, even though the silver one is bigger.", "source": "MiniMax M3 ①", "_id": "minimax_1_60", "judge_pick": false}, {"question": "A student writes: \"Infrared can travel through a vacuum because it is a wave, while conduction needs particles.\" Correct any imprecisions and tighten the explanation.", "answer": "- Tighten the wave statement: infrared is an electromagnetic wave, which is a self-propagating oscillation of electric and magnetic fields. EM waves do not need a medium because the fields regenerate each other as they travel — they are not mechanical disturbances of a medium.\n- Tighten the conduction statement: conduction requires matter because it is the passing of vibrational energy from one particle to the next through contact. With no particles, there is nothing to vibrate or pass energy to.\n- Note that convection also requires a medium — but for a different reason: it is bulk flow of a fluid. A vacuum has no fluid, so no bulk flow can occur.\n\nThe three-mechanism summary: only radiation does not require a medium.", "source": "MiniMax M3 ①", "_id": "minimax_1_61", "judge_pick": true}, {"question": "Distinguish \"energy\" as a store from \"power\" as a rate. Why is this distinction important for the SHC experiment? (2 steps)", "answer": "- Energy is a quantity (J); power is the rate at which energy is transferred (J/s = W). They are different physical quantities with different units.\n- In the SHC experiment, $$IV\\Delta t$$ is the energy supplied (J), and $$IV$$ is the power (W). The calculation uses the energy, not the power, because the SHC equation relates energy to temperature change.\n- A common student slip: substituting the power $$IV$$ directly into $$mc\\Delta\\theta$$ (without multiplying by $$\\Delta t$$). Always check that the units come out as joules before substituting.", "source": "MiniMax M3 ①", "_id": "minimax_1_62", "judge_pick": true}, {"question": "A student says: \"Specific heat capacity is the energy needed to heat 1 kg of a substance by 1 °C, but only when the substance is a solid.\" Why is the qualifier \"only when the substance is a solid\" wrong?", "answer": "- Specific heat capacity applies to any state of matter, provided the substance is not changing state. So a liquid also has an SHC (water: 4200 J/(kg·K)), and a gas also has an SHC.\n- The qualifier \"only when solid\" probably comes from a confusion with specific latent heat, which is what governs energy transfers during a state change. During a state change, temperature does not change, so SHC is irrelevant — you use $$\\Delta E = L\\Delta m$$ instead.\n- SHC and latent heat are the two tools. SHC for a temperature change in a single state; latent heat for a state change at constant temperature.", "source": "MiniMax M3 ①", "_id": "minimax_1_63", "judge_pick": true}, {"question": "Why does the heating curve of water have a longer boiling plateau than a melting plateau, even though less water typically boils off in a given experiment?", "answer": "- The lengths on a temperature-vs-energy graph are proportional to the energy required, not to the mass changed. The boiling plateau has length $$L_v \\cdot m$$ in energy, the melting plateau has length $$L_f \\cdot m$$ in energy.\n- For water, $$L_v \\approx 7 L_f$$ (2.26 × 10⁶ J/kg vs 3.34 × 10⁵ J/kg), so per kg, the boiling plateau takes about 7× as much energy as the melting plateau.\n- In an actual experiment, you may boil off only a small fraction of a kg, so the time on the plateau is short. But the per-kg energy cost is much higher. The plateau length is always in the ratio $$L_v : L_f$$ per kg.", "source": "MiniMax M3 ①", "_id": "minimax_1_64", "judge_pick": false}, {"question": "Why does evaporation cool a liquid (e.g., why sweat cools your skin)? Use particle terms. (3 steps)", "answer": "- Step 1: In a liquid at a given temperature, the particles have a distribution of speeds. Some near the surface are moving fast enough to escape the intermolecular bonds and become a gas.\n- Step 2: The particles that escape are the higher-energy ones. When they leave, the average KE of the particles remaining in the liquid is reduced.\n- Step 3: A lower average KE means a lower temperature. So the liquid cools as the higher-energy particles leave. This is why sweating cools the skin — the sweat evaporates and the higher-energy water molecules leave, cooling the remaining sweat and the skin beneath.\n\nThe same principle explains why you feel cold coming out of a swimming pool on a windy day — the wind accelerates evaporation, and the loss of high-energy water molecules cools you.", "source": "MiniMax M3 ①", "_id": "minimax_1_65", "judge_pick": true}, {"question": "\"A solid can be heated by conduction but not by convection.\" Explain why, in terms of particle motion.", "answer": "- Convection requires the heated material to physically flow — particles have to move from one region to another, carrying their internal energy with them.\n- In a solid, particles are held in fixed positions by strong interatomic bonds. They can vibrate, but they cannot flow from one place to another.\n- A liquid can flow (so convection occurs) and a gas can flow (so convection occurs). The bulk-flow requirement is the defining feature of convection.\n\nThis is why a heating element in a solid metal block transfers heat by conduction, but the same element under a pan of water transfers heat by conduction *and* convection (the heated water rises, cooler water sinks).", "source": "MiniMax M3 ①", "_id": "minimax_1_66", "judge_pick": true}, {"question": "A student argues: \"Conduction must involve particles touching, so a gas should conduct heat better than a vacuum, but a liquid should conduct better than a gas because the particles are closer.\" Is this intuition right? (2 steps)", "answer": "- Step 1: The intuition is broadly correct. More particles per unit volume means more opportunities to pass vibrations from one particle to the next, and closer particles interact more strongly. So a denser medium conducts better than a less dense one.\n- Step 2: But in practice, gases and liquids also allow convection, which usually dominates over conduction. So a \"still\" gas conducts poorly (e.g., still air is a good insulator), while a moving gas convects efficiently. The student is right that conduction in a gas is worse than in a liquid or solid; but in a real-world gas, convection usually wins, which is why trapped air is such a good insulator — it is poor at both conduction (few particles) and convection (immobilised pockets).", "source": "MiniMax M3 ①", "_id": "minimax_1_67", "judge_pick": false}, {"question": "On a calm, clear night, the ground temperature drops sharply. On a cloudy night, it stays warmer. Explain in terms of the three mechanisms. (2 steps)", "answer": "- Step 1: The ground loses heat by emitting IR upward. On a clear night, this IR escapes through the atmosphere to space, and the ground cools rapidly.\n- Step 2: On a cloudy night, water vapour and droplets in the clouds absorb the outgoing IR and re-radiate much of it back toward the ground. The ground then absorbs as well as emits, so the net loss is small and the temperature stays higher.\n\nThis is the same mechanism as the greenhouse effect, just on a much shorter timescale. It is why \"clear nights bring frost\" is a gardener's rule.", "source": "MiniMax M3 ①", "_id": "minimax_1_68", "judge_pick": false}, {"question": "Why is a hot piece of metal more dangerous to touch than hot water at the same temperature, even though water has a higher specific heat capacity? (3 steps)", "answer": "- Step 1: At the same temperature, the metal and water are emitting IR at the same rate per unit area (the same temperature means the same mean particle KE, so the same emission rate at the surface).\n- Step 2: But the metal also conducts heat into your skin much faster than water does, because of its free electrons. So your skin gains energy much faster from the metal.\n- Step 3: Water's higher SHC is irrelevant here — that only matters for how much energy is needed to change the water's temperature, not for how fast it can transfer heat at a given temperature.\n\nThis is why steam burns are so dangerous — the steam condenses on the skin, releasing $$L_v$$ of energy directly into the tissue in addition to the IR and contact heating.", "source": "MiniMax M3 ①", "_id": "minimax_1_69", "judge_pick": false}, {"question": "A student says: \"All radiation is the same — it's just energy given off.\" Identify the error and give the missing precision. (2 steps)", "answer": "- Step 1: The word \"radiation\" alone is ambiguous. The student's statement is technically true but too vague for physics.\n- Step 2: There are two very different categories: (i) electromagnetic radiation (photons), which includes radio, microwave, IR, visible, UV, X-ray and gamma; (ii) particle radiation from atomic nuclei, which includes alpha, beta and (nuclear) gamma. They have very different properties, sources and dangers.\n- Always specify the type. \"IR\" or \"γ\" is far more useful than just \"radiation.\"", "source": "MiniMax M3 ①", "_id": "minimax_1_70", "judge_pick": false}, {"question": "A 1 kg block of iron (c ≈ 450 J/(kg·K)) and a 1 kg block of water (c = 4200 J/(kg·K)) start at 20 °C. Each receives 21 kJ of energy. Which ends up hotter, and why? (2 steps)", "answer": "- Step 1: Use $$\\Delta\\theta = \\dfrac{\\Delta E}{mc}$$. For iron: $$\\Delta\\theta = 21000 / (1 \\times 450) \\approx 47 \\text{ K}$$. For water: $$\\Delta\\theta = 21000 / (1 \\times 4200) = 5 \\text{ K}$$.\n- Step 2: The iron ends up much hotter because it has a much lower specific heat capacity — it takes less energy per kg per K to raise its temperature. Water \"stores\" the same energy with only a small temperature rise.\n\nThis is why iron pans heat up quickly on a stove, and why water (with high c) is slow to heat but good for storing energy once warm (e.g., in a hot-water tank or central-heating radiator).", "source": "MiniMax M3 ①", "_id": "minimax_1_71", "judge_pick": true}, {"question": "In a pressure-vs-Telsius graph for a fixed mass of gas at constant V, extrapolating the line back to p = 0 gives approximately −273 °C. Why is this extrapolation meaningful, and what does it represent? (2 steps)", "answer": "- Step 1: The pressure of a gas is proportional to its absolute (Kelvin) temperature: $$p \\propto T_K$$. If $$p$$ falls linearly with Celsius temperature $$\\theta$$, then p = 0 corresponds to a particular $$\\theta$$ — the temperature at which, in the idealised model, particles have no KE and exert no pressure.\n- Step 2: This temperature is absolute zero, $$\\theta = -273.15 \\text{ °C}$$ or $$T = 0 \\text{ K}$$. It is the lowest possible temperature in the idealised classical model.\n\nReal gases condense well before this, but the ideal-gas extrapolation is what gives the absolute scale its physical meaning. The Kelvin scale is defined so that 0 K is the temperature at which p would extrapolate to zero.", "source": "MiniMax M3 ①", "_id": "minimax_1_72", "judge_pick": false}, {"question": "The kinetic-theory equation $$\\tfrac{1}{2}m\\langle c^2\\rangle = \\tfrac{3}{2}kT$$ is sometimes written as $$\\tfrac{3}{2}kT$$ for the average KE per molecule. Where does the $$\\tfrac{3}{2}$$ come from? (2 steps)", "answer": "- Step 1: It comes from the geometry of 3D space. A molecule in a gas has three independent directions of motion (x, y, z). By symmetry, the average of $$c_x^2$$, $$c_y^2$$ and $$c_z^2$$ is the same, and they sum to $$c^2$$. So $$\\langle c^2\\rangle = \\langle c_x^2\\rangle + \\langle c_y^2\\rangle + \\langle c_z^2\\rangle = 3 \\langle c_x^2\\rangle$$, giving $$\\langle c_x^2\\rangle = \\tfrac{1}{3}\\langle c^2\\rangle$$.\n- Step 2: Equating $$pV = \\tfrac{1}{3}Nm\\langle c^2\\rangle$$ with $$pV = NkT$$ gives $$\\tfrac{1}{2}m\\langle c^2\\rangle = \\tfrac{3}{2}kT$$. Each of the three directions contributes $$\\tfrac{1}{2}kT$$ to the mean KE per molecule, and the total is $$\\tfrac{3}{2}kT$$.\n\nThis is also why monatomic gases have a molar heat capacity at constant volume of $$\\tfrac{3}{2}R$$ — there are three translational degrees of freedom.", "source": "MiniMax M3 ①", "_id": "minimax_1_73", "judge_pick": false}, {"question": "\"Brownian motion is direct evidence for kinetic theory.\" Why? What does it show?", "answer": "- Brownian motion is the random, jittery motion of small particles (e.g., pollen grains) suspended in a fluid, visible under a microscope.\n- The motion is caused by unequal, random bombardment of the visible particle by invisible fluid molecules. So the fluid molecules must be in continuous, rapid, random motion — exactly the assumption of kinetic theory.\n- Einstein's mathematical analysis of Brownian motion yielded a value for Avogadro's number that agreed with chemical measurements, providing strong quantitative confirmation of the kinetic picture.\n\nSo Brownian motion is a direct, observable consequence of the kinetic-theory assumption that molecules are in constant random motion.", "source": "MiniMax M3 ①", "_id": "minimax_1_74", "judge_pick": false}, {"question": "At what temperature would the rms speed of oxygen molecules be the same as the rms speed of helium molecules at 300 K? (2 steps)", "answer": "- Step 1: From $$c_\\text{rms} = \\sqrt{3kT/m}$$, equal $$c_\\text{rms}$$ requires $$T/m$$ to be equal. So $$T_\\text{O_2} / m_\\text{O_2} = T_\\text{He} / m_\\text{He}$$.\n- Step 2: $$T_\\text{O_2} = T_\\text{He} \\times (m_\\text{O_2}/m_\\text{He}) = 300 \\times (32/4) = 2400 \\text{ K}$$. (Using rough integer masses: O₂ is 32 u, He is 4 u, ratio 8; so 300 × 8 = 2400 K.)\n\nThis is a useful intuition check: heavy molecules need much higher temperatures to reach the same speed as light ones.", "source": "MiniMax M3 ①", "_id": "minimax_1_75", "judge_pick": true}, {"question": "\"A real gas behaves like an ideal gas at low pressure and high temperature.\" Why? (2 steps)", "answer": "- Step 1: At low pressure, the gas is稀薄, so molecules are far apart. The volume of the molecules themselves is negligible compared with the container volume, and intermolecular forces are negligible because the molecules rarely interact. Both of these match the ideal-gas assumptions.\n- Step 2: At high temperature, the molecules move fast, so any small intermolecular attractions are easily overcome, and elastic-collision behaviour dominates. The molecules also avoid the close-range interactions where repulsive forces become significant.\n\nA gas that is dense (high pressure) or cold (molecules slow enough to feel attractions) starts to deviate — that is when it condenses to a liquid.", "source": "MiniMax M3 ①", "_id": "minimax_1_76", "judge_pick": false}, {"question": "For an ideal gas, sketch and label: (a) a p–V isothermal curve, (b) a p–T graph at constant V, (c) a V–T graph at constant p. What does each line or curve show?", "answer": "- (a) p–V isothermal: a rectangular hyperbola $$pV = \\text{const}$$, with p rising as V falls. Higher-T isotherms lie further from the origin.\n- (b) p–T at constant V: a straight line through the origin, $$p \\propto T$$. The slope depends on V and N.\n- (c) V–T at constant p: a straight line through the origin, $$V \\propto T$$ (Charles's law). The slope depends on p and N.\n- The \"through the origin\" behaviour in (b) and (c) is the visual signature of absolute zero being the natural zero of the temperature scale.\n\nIf a line crosses the temperature axis at a non-zero value when extrapolated, you are using °C instead of K.", "source": "MiniMax M3 ①", "_id": "minimax_1_77", "judge_pick": true}, {"question": "A sealed aerosol can is heated in a fire. The can is rigid, so volume is constant. Sketch the pressure vs T (K) graph from room T to the can's bursting point. Label the key features. (3 steps)", "answer": "- Step 1: The graph is a straight line through the origin (when extended): pressure is proportional to absolute temperature.\n- Step 2: Initially, at room T (~293 K), the pressure is around 5–8 atm (typical aerosol can).\n- Step 3: As T rises, p rises linearly. The can bursts when p exceeds the structural limit. The horizontal \"burst line\" is well above the straight p–T line, and the burst happens where the two intersect.\n\nThis is why aerosol cans warn \"do not expose to fire\" — heating a rigid container at constant V gives a linear rise in p, with no relief mechanism.", "source": "MiniMax M3 ①", "_id": "minimax_1_78", "judge_pick": false}, {"question": "A student asks: \"If I compress a gas in a syringe slowly and feel it get warm, where is the energy coming from?\" Explain. (2 steps)", "answer": "- Step 1: You are doing work on the gas. By Newton's laws, the force you apply on the plunger does work $$W = F\\Delta x$$ as you push it in. This work is transferred to the gas.\n- Step 2: The work increases the internal energy of the gas (in an adiabatic or near-adiabatic compression). For an ideal gas, this internal-energy increase shows up as a rise in temperature (since mean KE ∝ T). So the syringe and gas get warm.\n\nThis is the microscopic face of \"doing work on a body increases its internal energy\" — the same principle as rubbing your hands together. The compression does not \"squeeze heat out\"; it does mechanical work that becomes internal energy.", "source": "MiniMax M3 ①", "_id": "minimax_1_79", "judge_pick": false}, {"question": "\"Doing work on a body increases its internal energy.\" Give two non-thermal examples and one example involving heating. (3 steps)", "answer": "- Step 1: Rubbing your hands together — mechanical work (force × distance) against friction is converted to internal energy of your skin, raising its temperature.\n- Step 2: Pumping a bicycle tyre with a hand pump — compressing the gas does work on it; the pump barrel gets hot from the increased internal energy of the gas.\n- Step 3: Heating example: a kettle element transfers energy electrically; this energy is added to the internal energy of the water, raising its temperature (and eventually causing vaporisation).\n\nThe unifying idea is conservation of energy: work done on a body = increase in its internal energy, plus any energy transferred out (e.g., as heat to surroundings).", "source": "MiniMax M3 ①", "_id": "minimax_1_80", "judge_pick": false}, {"question": "The Sahara-to-Paris heatwave model: identify where each of the three mechanisms (conduction, convection, radiation) operates. (3 steps)", "answer": "- Step 1: Radiation: the Sun's IR (and visible) travels through space and through the atmosphere to heat the Sahara ground. This is the initial energy input.\n- Step 2: Conduction: the hot sand transfers energy to the air particles in contact with it by vibration passing. The air immediately above the ground warms up.\n- Step 3: Convection: the heated air becomes less dense and rises; large-scale convection currents carry that warm air northward. When the air arrives over Paris, the warm ground and buildings there transfer energy to local air by conduction, and the cycle continues.\n\nA common student error is forcing a single mechanism when a real scenario combines all three. Do not say \"this is just radiation\" or \"this is just convection\" — name each mechanism in turn.", "source": "MiniMax M3 ①", "_id": "minimax_1_81", "judge_pick": false}, {"question": "Why is a draught excluder made of fabric, not metal? Relate the answer to the three mechanisms.", "answer": "- A metal draught excluder would itself be a good thermal conductor, so it would conduct heat from the warm side to the cold side. That defeats part of the purpose.\n- Fabric is a good insulator — it traps air (poor conduction) and is not rigid enough to support large convection currents.\n- Fabric is also not a particularly good emitter or absorber of IR, so radiative losses are small.\n- So fabric: suppresses conduction (trapped air, poor material), convection (block of bulk flow), and does not significantly increase radiation.\n\nIf the excluder were metal, you would replace one heat-loss problem (convection at the door) with another (conduction through the excluder itself).", "source": "MiniMax M3 ①", "_id": "minimax_1_82", "judge_pick": false}, {"question": "A black-painted metal fence gets hotter in the Sun than a white-painted one. Why? Use surface properties, not numbers. (2 steps)", "answer": "- Step 1: Both fences absorb the Sun's IR and visible light, but black paint is a much better absorber than white paint, which reflects most of the incident radiation.\n- Step 2: The black fence absorbs more solar energy per m², so its temperature rises higher than the white fence's. The white fence reflects most of the energy and absorbs much less.\n\nThe same logic explains white-painted houses in hot countries and white clothing for desert wear — reflect, don't absorb.", "source": "MiniMax M3 ①", "_id": "minimax_1_83", "judge_pick": false}, {"question": "Does an object have to be \"hot\" to emit IR? What is the lowest temperature at which an object emits IR? (2 steps)", "answer": "- Step 1: No. Every object with a temperature above absolute zero emits IR. The colder the object, the less IR it emits, but it still emits.\n- Step 2: The only temperature at which an object emits no IR is 0 K, where particles have (in the classical model) zero KE and therefore no random motion to produce EM radiation. Since 0 K is unattainable, every real object emits some IR.\n\nThis is why thermal cameras can see people in the dark — the human body at 37 °C emits a lot of IR, even though there is no visible light around.", "source": "MiniMax M3 ①", "_id": "minimax_1_84", "judge_pick": false}, {"question": "\"Black is the best emitter, so a black kettle cools faster than a silver one.\" True, but give a careful statement: what does \"best\" mean quantitatively? (2 steps)", "answer": "- Step 1: \"Best\" means the highest rate of energy emitted per m² of surface per K of temperature above the surroundings, for a given temperature. The Stefan–Boltzmann law gives the rate per m² as $$\\sigma T^4$$ for a perfect black body; real black surfaces are close to this.\n- Step 2: A silver surface emits far less per m² at the same temperature (it has a much lower emissivity, often ~0.05). So per m², a black surface emits maybe 20× more IR than a silver one. Over the same time, the black kettle loses much more energy to IR.\n\nSo \"best\" is a quantitative statement about emission rate per unit area at a given temperature, not a vague \"good at emitting\" claim.", "source": "MiniMax M3 ①", "_id": "minimax_1_85", "judge_pick": false}, {"question": "In kinetic theory, why is the *average* velocity of the gas molecules in a room zero, but the *mean square speed* is not zero? (2 steps)", "answer": "- Step 1: The molecules are moving in all directions randomly. For every molecule moving east at speed $$v$$, on average there is another moving west at the same speed. When you add all the velocity vectors, they cancel: the average velocity is zero.\n- Step 2: But the *speed* (the magnitude of the velocity, a scalar) is always positive. When you square it, the sign is lost, so the average of the squared speeds is not zero. That is the mean square speed, and it is related to the temperature via $$\\tfrac{1}{2}m\\langle c^2\\rangle = \\tfrac{3}{2}kT$$.\n\nThis is a subtle but important point: a gas at rest in a container still has very high molecular speeds (hundreds of m/s) — the room is \"still\" only at the macroscopic level.", "source": "MiniMax M3 ①", "_id": "minimax_1_86", "judge_pick": false}, {"question": "\"Heat\" is a confusing word because it is used in different ways. List three different uses of \"heat\" and the precise modern alternative for each.", "answer": "- \"Heat\" as a noun meaning a substance in a body: obsolete. Modern alternative — \"internal energy\" or \"thermal energy.\"\n- \"Heat\" as a noun meaning energy transferred: better — \"thermal energy transferred\" or simply \"energy transferred by heating.\"\n- \"Heat\" as a verb: acceptable. \"To heat a body\" means to transfer energy to it by a temperature-difference process (conduction, convection, or radiation). The verb \"to heat\" is still standard.\n\nA safer exam habit: write \"thermal energy\" for the store, \"heating\" or \"energy transferred\" for the process, and never use \"heat\" as a noun referring to a store.", "source": "MiniMax M3 ①", "_id": "minimax_1_87", "judge_pick": false}, {"question": "A black cup of coffee stays warmer than a white cup of coffee. Is this true? Explain. (2 steps)", "answer": "- Step 1: No, the opposite is true. A black cup is a better emitter of IR than a white cup. So the black cup radiates more energy to the surroundings and cools faster.\n- Step 2: A white or shiny cup, being a poor emitter, radiates less IR and keeps the coffee hotter for longer. This is why good thermos flasks and high-end coffee carafes have shiny, reflective inner surfaces — to minimise IR emission losses.\n\nCommon-sense intuition (\"black absorbs more, so it must keep more in\") is wrong here — being a good absorber does not mean being a good retainer. The relevant property for keeping heat *in* is being a poor emitter.", "source": "MiniMax M3 ①", "_id": "minimax_1_88", "judge_pick": false}, {"question": "A polished silver teapot keeps tea hotter than a black teapot. Why, in terms of emission, absorption, and reflection? (2 steps)", "answer": "- Step 1: The polished silver surface is a poor emitter and a poor absorber of IR, but a good reflector. Once the tea is hot, the silver surface emits very little IR, so the tea loses heat to the surroundings slowly.\n- Step 2: The black teapot, in contrast, is a good emitter. At the same tea temperature, the black teapot radiates more IR per second, so the tea cools faster. Both teapots end at room temperature; the silver one just takes longer to get there.\n\nThis is exactly the principle behind the \"shiny inner surface\" of a thermos flask or high-end coffee carafe.", "source": "MiniMax M3 ①", "_id": "minimax_1_89", "judge_pick": false}, {"question": "A heater element in a kettle heats water. In particle terms, what is happening to (a) the electrons in the element, (b) the metal ions in the element, (c) the water molecules in contact? (3 steps)", "answer": "- Step 1: Electrons in the element drift under the applied p.d., colliding with the metal ions and transferring energy. The electrons gain KE from the field and lose it in collisions.\n- Step 2: The metal ions vibrate more vigorously (their KE rises, so the element's temperature rises). The element becomes hot.\n- Step 3: The hot metal ions at the surface transfer vibrational energy to water molecules in contact by conduction (passing vibrations to the liquid). The water's mean KE rises, so its temperature rises.\n\nThree transfer steps: electrical energy → electron KE → lattice ion KE → water molecule KE. Each step is mediated by collisions and vibration passing.", "source": "MiniMax M3 ①", "_id": "minimax_1_90", "judge_pick": true}, {"question": "Two identical cups hold 200 g of water at 20 °C. One is wrapped in a black cloth, the other in a shiny foil. Both are placed in a 30 °C room. Which warms to 30 °C first? (2 steps)", "answer": "- Step 1: The cup with the black cloth warms faster, because black is a good absorber of IR. It absorbs IR from the warm room air and surroundings more quickly than the foil-wrapped cup.\n- Step 2: The foil-wrapped cup is a poor absorber of IR (it reflects most of the incoming radiation), so it absorbs energy from the surroundings more slowly. It warms more slowly.\n\nThe same logic explains why black solar-collector panels are used in solar water heating — the black surface maximises absorption of solar radiation.", "source": "MiniMax M3 ①", "_id": "minimax_1_91", "judge_pick": false}, {"question": "A pan of water boils on a stove. The bubbles form at the bottom. Explain, in particle terms, what is happening in the water. (3 steps)", "answer": "- Step 1: Heat from the stove element is conducted through the metal pan to the water in contact with the bottom. The water particles there gain KE.\n- Step 2: As the water heats to 100 °C, the water at the bottom forms bubbles of water vapour (gas). The temperature is constant during this state change — the energy is going into separating the molecules, not raising the temperature.\n- Step 3: The bubbles, being less dense than the surrounding liquid water, rise (convection). They reach the surface and burst, releasing steam.\n\nSo boiling involves: conduction (heat to the bottom water) + latent heat (state change at 100 °C) + convection (rising bubbles).", "source": "MiniMax M3 ①", "_id": "minimax_1_92", "judge_pick": false}, {"question": "A house loses heat through the roof, walls, windows, and floor. For each, name the dominant mechanism and one design feature that reduces it.", "answer": "- Roof: conduction through the tiles, plus radiation from the surface. Design feature — thick loft insulation (trapped air) to cut conduction.\n- Walls: conduction through the bricks, plus air movement in the cavity. Design feature — cavity-wall insulation (fibre filling the cavity) to trap air.\n- Windows: conduction through the glass, plus radiation across any gap. Design feature — double glazing (air gap) and low-emissivity coatings.\n- Floor: conduction through the floorboards/concrete, plus draughts. Design feature — draught excluders and floor insulation.\n\nEach design feature is targeting a specific mechanism — never say \"insulation\" without saying what mechanism it reduces.", "source": "MiniMax M3 ①", "_id": "minimax_1_93", "judge_pick": false}, {"question": "A student argues: \"Specific means specific to the situation, so SHC depends on how much I have.\" Correct this misconception.", "answer": "- \"Specific\" in physics means \"per unit mass.\" It always refers to a property that is independent of the amount of substance — it is an intensive property.\n- The specific heat capacity of water is 4200 J/(kg·K) whether you have 1 g or 1000 tonnes of water. It is a property of the substance itself, not of the situation.\n- Doubling the mass doubles the energy needed for the same $$\\Delta\\theta$$, but c itself does not change. The word \"specific\" is doing the same job as in \"specific gravity\" or \"specific volume\" — it is a normalised quantity per kg.", "source": "MiniMax M3 ①", "_id": "minimax_1_94", "judge_pick": false}, {"question": "\"The Sun warms the Earth, but space is cold, so there must be a contradiction.\" Resolve the apparent paradox.", "answer": "- There is no contradiction. Space is a vacuum, so it has no temperature in the usual sense — you cannot assign a temperature to \"space\" itself.\n- The Earth is heated by absorbing the Sun's radiation. The Earth is \"cold\" in space in the sense that it loses heat by emitting IR to its surroundings, but it is \"warm\" because the rate of solar absorption exceeds the rate of IR emission.\n- A body in space reaches an equilibrium temperature when its IR emission rate equals its absorbed solar rate. For Earth, this works out to about 255 K (without atmosphere); with greenhouse effect, about 288 K.\n- \"Cold space\" does not \"suck heat out\" — heat is lost only by radiation, not by conduction or convection (which are unavailable in vacuum).", "source": "MiniMax M3 ①", "_id": "minimax_1_95", "judge_pick": false}, {"question": "A snowman made of pure white snow melts slower than a black-painted snowman of the same size. Why? (2 steps)", "answer": "- Step 1: The white snow is a poor absorber of solar IR/visible, so most of the Sun's energy is reflected. Less energy absorbed = slower warming.\n- Step 2: The black-painted snowman is a good absorber, so it absorbs most of the incident solar energy. Its surface temperature rises faster, melting it more quickly.\n\nThis is the same logic as the black-vs-white car on a sunny day, and is the principle behind dressing in white in summer and dark in winter.", "source": "MiniMax M3 ①", "_id": "minimax_1_96", "judge_pick": false}, {"question": "Why is boiling water an effective way to sterilise equipment, in terms of particle behaviour? (2 steps)", "answer": "- Step 1: At 100 °C, water molecules have a much higher average KE than at room temperature. Any micro-organisms in the water are immersed in a high-KE environment and are heated throughout.\n- Step 2: The high temperature denatures the proteins and disrupts the cell structures of bacteria and viruses, killing them. The effect is uniform because the water (and steam) reaches 100 °C throughout.\n\nBoiling is a thermal disinfection method — the killing mechanism is the high temperature, not the water itself.", "source": "MiniMax M3 ①", "_id": "minimax_1_97", "judge_pick": false}, {"question": "Why do objects feel \"cold\" to the touch even when the room is warm? (2 steps)", "answer": "- Step 1: The object is colder than your hand, so net energy flows from your hand to the object. The object gains internal energy; your hand loses internal energy.\n- Step 2: The loss of internal energy from your skin lowers the temperature of the nerve endings, which your brain interprets as \"cold.\" A metal object feels colder than a wooden one at the same temperature because metal conducts heat away from your skin faster.\n\nThis is the everyday experience of \"cold\" — it is not absolute temperature, but the rate of energy transfer from your body.", "source": "MiniMax M3 ①", "_id": "minimax_1_98", "judge_pick": false}, {"question": "A block of iron (c = 450 J/(kg·K)) at 200 °C is dropped into a well-insulated calorimeter containing 0.5 kg of water (c = 4200 J/(kg·K)) at 20 °C. The final temperature is 30 °C. Estimate the mass of the iron block. (3 steps)", "answer": "- Step 1: Energy balance — energy lost by iron = energy gained by water (assuming no loss to surroundings). $$m_\\text{Fe} c_\\text{Fe} \\Delta\\theta_\\text{Fe} = m_w c_w \\Delta\\theta_w$$.\n- Step 2: $$\\Delta\\theta_\\text{Fe} = 200 - 30 = 170 \\text{ K}$$; $$\\Delta\\theta_w = 30 - 20 = 10 \\text{ K}$$. So $$m_\\text{Fe} \\times 450 \\times 170 = 0.5 \\times 4200 \\times 10$$.\n- Step 3: $$m_\\text{Fe} \\times 76500 = 21000$$, so $$m_\\text{Fe} = 21000 / 76500 \\approx 0.27 \\text{ kg}$$. (The iron's much lower c is partially offset by the larger temperature change, giving a moderate iron mass.)\n\nThe shape of the calculation is \"what goes in = what comes out,\" but the masses are different because the specific heat capacities are very different.", "source": "MiniMax M3 ①", "_id": "minimax_1_99", "judge_pick": true}, {"question": "Why does the kinetic-theory derivation of pressure use \"rate of change of momentum\" rather than just \"force\"? (2 steps)", "answer": "- Step 1: A single molecule hits the wall in a discrete event — it bounces off, reversing one component of its momentum. To get the average force on the wall, you need the rate at which momentum is being transferred, which is (momentum change per collision) × (collisions per second).\n- Step 2: This is the definition of average force: $$F = \\Delta p / \\Delta t$$ (Newton's second law in momentum form). For continuous processes you use the derivative $$F = dp/dt$$, but for discrete collisions the rate-of-change formulation gives the same answer.\n\nThis is the deep reason kinetic theory is in fact just Newton's laws applied to a huge number of tiny particles.", "source": "MiniMax M3 ①", "_id": "minimax_1_100", "judge_pick": true}, {"question": "A gas is compressed isothermally (constant T). Does the average speed of the molecules change? Use $$\\tfrac{1}{2}m\\langle c^2\\rangle = \\tfrac{3}{2}kT$$ in your answer.", "answer": "- The equation ties the mean molecular KE to T directly. At constant T, the mean KE is constant.\n- Since $$m$$ is constant, $$\\langle c^2\\rangle$$ is constant, so the rms speed is constant.\n- Compression at constant T does not speed up or slow down the molecules. What changes is the *number density* (molecules per m³) — more molecules are packed into the same volume, so collisions with the wall are more frequent, and the pressure rises.\n\nThis is the particle-level reason for Boyle's law: same speeds, more molecules per unit volume → more wall hits → more pressure.", "source": "MiniMax M3 ①", "_id": "minimax_1_101", "judge_pick": true}, {"question": "Two different gases at the same temperature are mixed in a container. Compare the average KE of the two types of molecule. Compare their rms speeds.", "answer": "- Average KE is the same: $$\\tfrac{1}{2}m\\langle c^2\\rangle = \\tfrac{3}{2}kT$$ depends only on T, not on the type of molecule.\n- So heavy molecules (larger m) have lower rms speed, and light molecules (smaller m) have higher rms speed, in inverse proportion to $$\\sqrt{m}$$.\n- After mixing, both types come to the same temperature (the same mean KE per molecule) by collisions between them. Heavier molecules move more slowly, lighter ones more quickly, but both have the same mean KE.\n\nThis is the basis for thermal equilibrium between different gases: the equilibrium condition is equal mean KE per molecule, not equal speeds.", "source": "MiniMax M3 ①", "_id": "minimax_1_102", "judge_pick": true}, {"question": "The Avogadro constant $$N_A = 6.02 \\times 10^{23}$$ per mole. Why is this number so huge? (1 step)", "answer": "- Atoms and molecules are extremely small (a typical atom is ~$$10^{-10}$$ m across), and a mole is defined as the number of atoms in 12 g of carbon-12.\n- Even a tiny mass of a substance contains an astronomically large number of particles. 18 g of water (1 mole) contains $$6.02 \\times 10^{23}$$ molecules, each weighing $$\\sim 3 \\times 10^{-26}$$ kg.\n- This is why gas constant R (per mole) is much larger than k (per molecule): $$R = k N_A \\approx 8.31$$ J/(K·mol).\n\nThe huge number is the bridge between the microscopic world (single molecules, kinetic theory) and the macroscopic world (grams, joules, kelvin).", "source": "MiniMax M3 ①", "_id": "minimax_1_103", "judge_pick": false}, {"question": "A spacecraft in orbit is in direct sunlight. It absorbs solar energy at 1000 W/m² (solar constant) and generates 500 W/m² of internal heat (illustrative figures). It is in deep shadow on the other side. Estimate the minimum area of a matte-black radiator needed to reject all this heat, given that black-body emission at 300 K is ~$$5.7 \\times 10^{-8} \\times 300^4 \\approx 460$$ W/m². (3 steps)", "answer": "- Step 1: The radiator must emit at least 1000 + 500 = 1500 W/m² to balance the absorbed solar plus internal heat, if it is on the shadow side.\n- Step 2: At ~300 K, black-body emission is ~460 W/m². So a 1 m² black panel emits 460 W.\n- Step 3: Required area = 1500 / 460 ≈ 3.3 m². So a 3–4 m² black radiator is needed, plus a reflective coating on the Sun side to reduce absorbed solar to a manageable level.\n\nThe point is that spacecraft thermal design is a balance of area, surface properties, and orientation — you need enough radiator area to dump the sum of internal and absorbed heat.", "source": "MiniMax M3 ①", "_id": "minimax_1_104", "judge_pick": false}, {"question": "In kinetic theory, why do we consider the *mean square* speed rather than the *mean* speed? (2 steps)", "answer": "- Step 1: The quantities that enter kinetic-theory formulas involve $$c^2$$, not $$c$$. Pressure depends on the change in momentum per collision, which involves velocity directly, and the change in KE involves velocity squared. So the natural quantity is $$\\langle c^2\\rangle$$.\n- Step 2: A practical bonus: for a Maxwell–Boltzmann distribution, $$\\sqrt{\\langle c^2\\rangle}$$ is the rms speed, and $$\\langle c \\rangle = \\sqrt{8kT/(\\pi m)}$$. The two are close but not equal; the rms speed is the cleaner algebraic object to use.\n\nSo kinetic theory is built around $$\\langle c^2\\rangle$$ because that is the quantity that falls out of Newton's laws applied to a gas of colliding particles.", "source": "MiniMax M3 ①", "_id": "minimax_1_105", "judge_pick": false}, {"question": "A balloon is filled with helium at room temperature and sealed. The balloon is taken outside on a cold day. What happens to the balloon? (2 steps)", "answer": "- Step 1: As the temperature drops, the average KE of the helium molecules drops (since $$\\tfrac{1}{2}m\\langle c^2\\rangle = \\tfrac{3}{2}kT$$), so the rms speed drops.\n- Step 2: At constant number of molecules in a flexible balloon, the pressure inside is approximately constant (matches outside atmospheric pressure). By $$pV = NkT$$ with $$p$$ and $$N$$ fixed, $$V \\propto T$$, so the volume decreases and the balloon shrinks.\n\nThis is why balloons look deflated on cold mornings and full on warm days — Charles's law in action.", "source": "MiniMax M3 ①", "_id": "minimax_1_106", "judge_pick": true}, {"question": "Why is a pressure cooker able to cook food faster than an open pan? (2 steps)", "answer": "- Step 1: A pressure cooker is sealed, so as the water inside boils, the pressure above the water rises above atmospheric. The boiling point of water rises with pressure, so the water can reach temperatures above 100 °C (typically 110–120 °C) before boiling.\n- Step 2: At higher temperature, the rate of energy transfer into the food is higher (because the temperature difference between water and food is larger), and the chemical reactions in cooking proceed faster at higher temperature. So the food cooks in less time.\n\nThis is a direct application of the relation between pressure, temperature and the phase change of water.", "source": "MiniMax M3 ①", "_id": "minimax_1_107", "judge_pick": true}, {"question": "A typical classroom at 20 °C and standard atmospheric pressure contains about $$10^{27}$$ air molecules. Estimate the total internal energy of the air. (2 steps)", "answer": "- Step 1: Mean KE per molecule = $$\\tfrac{3}{2}kT = 1.5 \\times 1.38 \\times 10^{-23} \\times 293 \\approx 6.1 \\times 10^{-21}$$ J.\n- Step 2: Total KE ≈ $$6.1 \\times 10^{-21} \\times 10^{27} = 6.1 \\times 10^6 \\text{ J} \\approx 6 \\text{ MJ}$$.\n\nThis is the total random KE of the air in the room — a huge number, but it is \"useless\" in the sense that you cannot extract it as work without a temperature difference. This is a quantitative illustration of how much thermal energy is locked up in the air around us.", "source": "MiniMax M3 ①", "_id": "minimax_1_108", "judge_pick": false}, {"question": "\"A body at 30 °C feels cool, a body at 50 °C feels warm, a body at 100 °C feels hot.\" Connect this to the rate of energy transfer and the kinetic-theory model. (2 steps)", "answer": "- Step 1: Whether a body feels hot or cool depends on the rate of net energy transfer between your skin and the body. Your skin is at ~33 °C.\n- Step 2: For a body at 30 °C (below skin), the body absorbs IR from your skin faster than it emits to you — net energy leaves you → you feel cool. For a body at 50 °C, the body emits more IR to you than it absorbs — net energy enters you → you feel warm. For a body at 100 °C, the rate is so high it is painful.\n\nThe kinetic-theory link: at higher T, the molecules are vibrating much more vigorously, so they emit IR at a much higher rate (∝ T⁴ in the Stefan–Boltzmann model).", "source": "MiniMax M3 ①", "_id": "minimax_1_109", "judge_pick": false}], "count": 110}, "minimax_2": {"label": "MiniMax M3 ②", "cards": [{"question": "A board shows the words \"thermal\" and \"heating\" circled separately and joined by a line. Why does Alex insist on this visual separation? (3 steps)", "answer": "- Step 1: Recognize that \"thermal\" refers to a store of energy (something a body *has*, measured in joules), while \"heating\" refers to a transfer pathway (the *movement* of that energy from hot to cold).\n- Step 2: See why this matters for exams — students routinely lose marks by treating \"heat\" as a substance contained in a body. The correct view: a body has internal energy; heating is the process of transferring it because of a temperature difference.\n- Step 3: Apply the distinction: you would never say \"the body has lots of heating\"; you would say \"the body has lots of thermal/internal energy\" and \"energy was transferred to it by heating.\" Circling them separately forces the right vocabulary.\n\nTakeaway: stores are *what energy sits in*; pathways are *how it moves*. Never collapse them into one word.", "source": "MiniMax M3 ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "Alex's energy stores list included KE, GPE, elastic, chemical, thermal, nuclear, and (electro)magnetic. Why might Phuc's list (KE, potential, elastic, chemical) be marked incomplete even if it contains four correct stores? (2 steps)", "answer": "- Step 1: A complete list must cover the standard IAL stores. Phuc's list missed the thermal store (the topic of the whole chapter), plus nuclear and electromagnetic — so three were missing.\n- Step 2: The deeper issue is the *naming* — Phuc said \"potential\" where the standard term is \"gravitational potential (GPE).\" Examiners expect the precise word; \"potential\" alone is ambiguous because elastic energy is also a form of potential energy stored in bonds. So even the stores Phuc listed were imprecisely named.\n\nTakeaway: completeness *and* precise vocabulary both earn marks.", "source": "MiniMax M3 ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "A student says \"heat flows from the hot cup to the cold room.\" Why is this phrasing dangerous in a physics answer, even though it sounds correct? (3 steps)", "answer": "- Step 1: The word \"heat\" is being used as if it were a substance that flows — this is the old \"caloric\" misconception, which the textbook explicitly says was refuted by Rumford and Joule. Energy is what is transferred, not \"heat.\"\n- Step 2: The correct phrasing is: \"energy is transferred *by heating* from the hot cup to the cold room\" (or \"by conduction / convection / radiation\"). Heating is a *process*, not a substance.\n- Step 3: \"Internal energy\" is what a body *has*; \"heating\" is what happens to it. The cup's internal energy is decreasing; energy is leaving the cup and entering the room. The cup never contained \"heat\" in the first place.\n\nTakeaway: heat is a verb (a process), not a noun (a substance). The noun is \"internal energy\" or \"thermal energy.\"", "source": "MiniMax M3 ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "Phuc first wrote \"p = m / V\" for the pressure of a gas. Alex corrected it to p = F / A. What mental model is Alex preventing Phuc from confusing? (2 steps)", "answer": "- Step 1: Phuc had merged two distinct concepts: **pressure** (force per unit area, p = F/A, in pascals) and **density** (mass per unit volume, ρ = m/V, in kg/m³). Both involve \"something\" divided by \"something,\" which is the trap.\n- Step 2: The fix is to attach the right *physical meaning* to each: pressure describes how concentrated a force is on a surface; density describes how tightly matter is packed in a space. They are unrelated quantities that happen to share a \"per\" structure. Memorise the units (Pa vs kg/m³) to keep them apart.\n\nTakeaway: a ratio with \"per\" in the middle is not automatically a definition — attach the right physical meaning and the right unit.", "source": "MiniMax M3 ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "A sealed rigid container of gas is heated from 20 °C to 80 °C. Walk through the four-step particle chain that explains why the pressure rises, naming the equation that ties the chain together. (4 steps)", "answer": "- Step 1: Heating delivers energy to the gas particles, so they move faster on average (their mean random kinetic energy increases — this is what temperature measures).\n- Step 2: Faster particles cross the container more often and hit the walls more *frequently* per second.\n- Step 3: Each collision is also harder (larger change in momentum per hit), so each collision exerts a larger *force* on the wall.\n- Step 4: Total wall force is larger over the same wall area, so by $$p = \\frac{F}{A}$$ with A constant, the pressure rises. The volume cannot change (rigid container), so the gas cannot expand — the pressure *must* go up.\n\nTakeaway: the chain is *kinetic energy → collision frequency → force → pressure*. Memorise the order; every step is a marking point.", "source": "MiniMax M3 ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "Why is it wrong to say \"the gas expands\" when a fixed-volume gas is heated, and what should the answer say instead? (2 steps)", "answer": "- Step 1: \"Expands\" implies the volume changes. The container is rigid, so the volume is *fixed* by construction — the gas has nowhere to expand into.\n- Step 2: The correct statement is that the *pressure* rises (via the faster/more-frequent/harder-collision chain). Always name the variable that actually changes, never the one that is held constant.\n\nTakeaway: when a question says \"fixed volume,\" the answer talks about pressure. The reverse is also true — \"fixed pressure\" → answer about volume.", "source": "MiniMax M3 ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "Phuc's first attempt at the fixed-volume chain said \"more friction into the boxes.\" Why is this the wrong vocabulary for an exam answer? (2 steps)", "answer": "- Step 1: \"Friction\" describes tangential rubbing between surfaces — it dissipates ordered kinetic energy into heat. Gas molecules bouncing off a wall are not rubbing; they are undergoing elastic collisions in which kinetic energy is conserved.\n- Step 2: The correct phrasing is \"more *frequent* collisions with the walls,\" with each collision exerting a larger *force*. The standard marking-scheme words are \"collide\" and \"momentum change,\" not \"friction.\"\n\nTakeaway: collision language (elastic, momentum, frequency) is the model; friction language is not.", "source": "MiniMax M3 ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "In the Herschel prism experiment, thermometers were placed in each colour of the visible spectrum and one just beyond the red. Why does the thermometer beyond the red show the biggest temperature rise, and what does this establish? (3 steps)", "answer": "- Step 1: The prism splits white light into a spectrum. Beyond the red end of the visible spectrum there is *invisible* radiation that still carries energy and warms the thermometer bulb on contact.\n- Step 2: This invisible, warming radiation is **infrared** — the same physical phenomenon as visible light, just at a longer wavelength than red. It is not a unique kind of \"heat stuff\"; it is electromagnetic radiation, emitted when an orbital electron drops to a lower energy level and releases a photon.\n- Step 3: The experiment establishes that *thermal radiation* is a continuous band of EM waves (not just visible light) and that *all warm objects emit it* — even ones that aren't glowing visibly.\n\nTakeaway: infrared is \"light we can't see but that warms us.\" It is not a separate phenomenon from visible light, just a longer-wavelength band of the same EM spectrum.", "source": "MiniMax M3 ②", "_id": "minimax_2_7", "judge_pick": true}, {"question": "A student claims \"all invisible light is infrared.\" Why is this too broad, and what is the correct narrower definition? (2 steps)", "answer": "- Step 1: The EM spectrum has *several* invisible regions — ultraviolet, X-rays, gamma rays (shorter than visible) and infrared, microwaves, radio waves (longer than visible). \"Invisible\" just means \"outside the visible band.\"\n- Step 2: The correct narrow definition of infrared is: the band of electromagnetic radiation *just beyond the red* end of the visible spectrum, with wavelengths longer than visible red. It is one specific region, not a synonym for \"unseen.\"\n\nTakeaway: Herschel discovered one specific invisible region. The lesson is to name the position in the spectrum, not to use \"invisible\" as a catch-all.", "source": "MiniMax M3 ②", "_id": "minimax_2_8", "judge_pick": true}, {"question": "Why is it wrong to call infrared \"a weak type of nuclear radiation\"? (3 steps)", "answer": "- Step 1: The word \"radiation\" alone just means \"energy is being given off\" — it does not specify the type. There are at least two very different families: **electromagnetic** (light, infrared, ultraviolet, X-rays, gamma) and **nuclear** (alpha, beta, gamma from a nucleus).\n- Step 2: Infrared is *electromagnetic* radiation: it is emitted when an orbital electron drops to a lower energy level and releases a photon. It has nothing to do with the nucleus.\n- Step 3: Nuclear radiation is specifically alpha particles, beta particles, or gamma rays emitted from the *nucleus* of an atom (gamma from the nucleus is the overlap; context distinguishes it from EM gamma). So \"nuclear radiation\" refers only to emissions from a decaying nucleus, never to infrared.\n\nTakeaway: name the source. Photon of infrared → electron energy drop. Alpha/beta/gamma → nucleus. Mixing them up loses marks.", "source": "MiniMax M3 ②", "_id": "minimax_2_9", "judge_pick": true}, {"question": "A black/matt can and a white/shiny can are both filled with water at the same hot temperature and left to cool. The black can cools faster. What does this tell you about emission, and why is the shiny can not the better emitter just because it reflects more? (4 steps)", "answer": "- Step 1: Both cans start at the same temperature with the same volume of water. The only variable is the surface finish. The black/matt can cools faster → it is losing energy faster by infrared.\n- Step 2: This means black/matt is the *better emitter* of infrared. Emission rate is read from cooling rate, not from how hot the surface gets.\n- Step 3: Reflection is the wrong test here. Reflection needs an *external* incoming radiation to bounce back. Inside the can there is no external source — the source is the hot water itself, which is internal to the system.\n- Step 4: So for emission, the surface colour/finish matters: rough black surfaces emit (and absorb) more efficiently than smooth shiny ones, which is why the black can cools faster.\n\nTakeaway: best emitter and best absorber go together; best reflector is the *opposite* (worst emitter/absorber). Don't confuse the role of reflection in this experiment — there's no incoming radiation to reflect.", "source": "MiniMax M3 ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "Phuc predicted that the black can in the cooling experiment would \"get hotter\" because it was the stronger emitter. What is the right way to read the rate of emission from a temperature–time graph? (3 steps)", "answer": "- Step 1: Emission is energy *leaving* a body. Losing energy means the body's internal energy decreases, so its temperature falls.\n- Step 2: A strong emitter therefore cools *faster* — the temperature–time curve has a steeper negative slope. The black can's curve drops more steeply than the shiny can's.\n- Step 3: A strong emitter never gets hotter from emitting. A higher temperature would only make it emit *even more*, cooling it faster still. Read emission rate from the slope of the cooling curve, not from a claim the surface gets hotter.\n\nTakeaway: steeper negative slope on a cooling curve → better emitter. Energy out → temperature down.", "source": "MiniMax M3 ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "State the \"best emitter/absorber\" and \"best reflector\" rule for surfaces, and explain why the three verbs (emit, absorb, reflect) must be kept surgically separate in an exam answer. (3 steps)", "answer": "- Step 1: **Black / matt (dull, rough) surfaces** are the best emitters *and* the best absorbers of infrared. Good emitters and good absorbers \"go together\" — they are the same physical property viewed from two directions.\n- Step 2: **White / light / shiny (mirror) surfaces** are the best reflectors, and *therefore* the worst emitters and worst absorbers. Reflection is the opposite of absorption, so the best reflector must be the worst absorber.\n- Step 3: Keep the verbs ap
