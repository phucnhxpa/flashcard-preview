urce": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}, {"question": "Why can’t you calculate stress from a copper wire’s extension alone? (2 steps)", "answer": "- Step 1: Stress σ = F/A, requiring force and area. Extension ΔL gives strain (ε = ΔL/L), not σ.  \n- Step 2: To find σ, need F (via weight/mass) and A (via diameter measurement).", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": false}, {"question": "Calculate the density of a hockey ball (radius 36 mm, mass 160 g). What unit conversions are critical? (3 steps)", "answer": "- Step 1: Convert radius 36 mm → 0.036 m (10⁻³ factor) and cube it: (0.036)³ = 4.67×10⁻⁵ m³.  \n- Step 2: Convert mass 160 g → 0.160 kg (10⁻³ factor).  \n- Step 3: Density ρ = m/V = 0.160 kg / (4.67×10⁻⁵ m³) ≈ 3428 kg/m³ ≈ 3.4 g/cm³.  \nMisconception: Forgetting to cube the mm→m conversion for volume.", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "What is the purpose of a Vernier caliper’s sliding scale? (2 steps)", "answer": "- Step 1: The main scale reads length before the Vernier zero mark.  \n- Step 2: The sliding Vernier scale aligns a division with the main scale, adding precision (e.g., 0.05 mm resolution).", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": false}, {"question": "Why does a rubber band’s stress-strain graph form a hysteresis loop during loading/unloading? (3 steps)", "answer": "- Step 1: During loading, long polymer chains untangle (low stiffness).  \n- Step 2: During unloading, chains re-coil slowly, following a lower curve (energy loss to internal heating).  \n- Step 3: The loop area represents energy dissipated per volume (e.g., car tire heating after a journey).", "source": "Qwen 3 ②", "_id": "qwen_2_15", "judge_pick": false}, {"question": "Define **Young modulus** and explain why it’s measured in pascals (Pa). (2 steps)", "answer": "- Step 1: E = stress/strain = (N/m²)/(unitless) = N/m² = Pa.  \n- Step 2: It quantifies stiffness per unit area under tension/compression (material resistance to elastic deformation).", "source": "Qwen 3 ②", "_id": "qwen_2_16", "judge_pick": false}, {"question": "What is the dominant uncertainty when measuring a small volume with a measuring cylinder? (2 steps)", "answer": "- Step 1: Meniscus reading (e.g., bottom of concave water curve) introduces ±0.5 mL error for 1 mL divisions.  \n- Step 2: Parallax error occurs if viewed from an angle; always read at eye level.", "source": "Qwen 3 ②", "_id": "qwen_2_17", "judge_pick": false}, {"question": "Why is strain dimensionless? Give a real-world example. (2 steps)", "answer": "- Step 1: Strain ε = ΔL/L₀ = (meters)/(meters) → units cancel.  \n- Step 2: A 10 m steel cable stretching 0.01 m has ε = 0.001 (0.1%).", "source": "Qwen 3 ②", "_id": "qwen_2_18", "judge_pick": false}, {"question": "How does the density of air in a balloon relate to its pressure? (3 steps)", "answer": "- Step 1: Air density ρ = mass/volume.  \n- Step 2: Higher pressure (P ∝ ρ) compresses air into same volume, increasing ρ.  \n- Step 3: Temperature affects ρ minimally compared to pressure (balloon inflation pressure > atmospheric).", "source": "Qwen 3 ②", "_id": "qwen_2_19", "judge_pick": false}, {"question": "What causes systematic error in a micrometer reading? (2 steps)", "answer": "- Step 1: **Zero error** occurs when closed jaws read ≠ 0.00 mm (positive or negative).  \n- Step 2: If uncorrected, all measurements will be offset by the zero error value (e.g., +0.02 mm shifts readings upward).", "source": "Qwen 3 ②", "_id": "qwen_2_20", "judge_pick": false}, {"question": "Explain why a 0.01 mm error in radius calculation leads to a 0.03 mm error in volume for a sphere. (2 steps)", "answer": "- Step 1: Volume V = (4/3)πr³ → V ∝ r³.  \n- Step 2: A 1% radius error causes ~3% volume error (derivative dV/V = 3×dr/r via power rule).", "source": "Qwen 3 ②", "_id": "qwen_2_21", "judge_pick": true}, {"question": "How does the stiffness of a spring change when its length is halved? (3 steps)", "answer": "- Step 1: Spring constant k ∝ 1/length (longer springs are softer).  \n- Step 2: Halving length doubles k (k ∝ 1/L).  \n- Step 3: Similar to resistors in series: shorter wires have lower resistance; shorter springs have higher stiffness.", "source": "Qwen 3 ②", "_id": "qwen_2_22", "judge_pick": false}, {"question": "What is the difference between elastic and plastic deformation? (2 steps)", "answer": "- Step 1: **Elastic** → atoms return to original positions when force is removed (Hooke’s Law region).  \n- Step 2: **Plastic** → atoms slip past each other, causing permanent deformation (beyond elastic limit).", "source": "Qwen 3 ②", "_id": "qwen_2_23", "judge_pick": false}, {"question": "Why is the elastic strain energy in a spring equal to the area under the F-x graph? (2 steps)", "answer": "- Step 1: Work done W = ∫F dx. For linear F = kx, W = ½F_max x_max = ½kx².  \n- Step 2: For nonlinear graphs (rubber band), count squares under the curve to estimate energy.", "source": "Qwen 3 ②", "_id": "qwen_2_24", "judge_pick": false}, {"question": "Describe the limit of proportionality and why it matters. (2 steps)", "answer": "- Step 1: The point where F-x graph ceases to be a straight line (nonlinear deformation begins).  \n- Step 2: Beyond this, stress-strain behavior becomes nonlinear; Young modulus no longer applies.", "source": "Qwen 3 ②", "_id": "qwen_2_25", "judge_pick": false}, {"question": "Why is the Young modulus of steel (200 GPa) much higher than rubber (0.01–0.1 GPa)? (2 steps)", "answer": "- Step 1: Steel’s strong metallic bonds resist stretching (high E).  \n- Step 2: Rubber’s polymer chains untangle easily (low E), making it flexible.", "source": "Qwen 3 ②", "_id": "qwen_2_26", "judge_pick": false}, {"question": "How does pressure affect the density of a gas like air? (2 steps)", "answer": "- Step 1: Density ρ = m/V. For fixed mass, Boyle’s Law: P₀V₀ = P₁V₁ → V₁ = V₀(P₀/P₁).  \n- Step 2: Increased pressure (P₁ > P₀) reduces V₁, increasing ρ = m/V.", "source": "Qwen 3 ②", "_id": "qwen_2_27", "judge_pick": false}, {"question": "Why is a micrometer preferred over a ruler for measuring wire diameter? (2 steps)", "answer": "- Step 1: Micrometer resolution (0.01 mm) is 100× more precise than a ruler (1 mm).  \n- Step 2: Area A = πr² depends on r². A 0.01 mm error in r causes ~0.02 mm error in diameter → ~0.02/(2×r) ≈ 0.01/r fraction error in ε.", "source": "Qwen 3 ②", "_id": "qwen_2_28", "judge_pick": false}, {"question": "How does the arrangement of springs in a car suspension affect ride comfort? (3 steps)", "answer": "- Step 1: Springs in parallel (e.g., coilover shocks) increase effective k, giving a stiffer ride.  \n- Step 2: Series arrangements (e.g., leaf springs) lower k, allowing more compression for bumps.  \n- Step 3: Engineers balance k and damping to avoid resonance with road vibrations.", "source": "Qwen 3 ②", "_id": "qwen_2_29", "judge_pick": false}, {"question": "What is the key step to measure the density of an irregular object? (1 step)", "answer": "Use water displacement: mass / (final volume - initial volume). Ensure object is fully submerged, no bubbles.", "source": "Qwen 3 ②", "_id": "qwen_2_30", "judge_pick": false}, {"question": "Why is the gradient of a stress-strain graph the Young modulus? (3 steps)", "answer": "- Step 1: E = stress/strain = σ/ε.  \n- Step 2: σ = F/A, ε = ΔL/L. Rearranged: σ = Eε → linear relation.  \n- Step 3: Gradient of σ-ε graph = E (slope = σ/ε).", "source": "Qwen 3 ②", "_id": "qwen_2_31", "judge_pick": false}, {"question": "How can you reduce uncertainty in a force-extension experiment? (2 steps)", "answer": "- Step 1: Repeat measurements and average (reduces random errors in reading).  \n- Step 2: Plot F vs. x and use gradient (avoids outlier sensitivity).", "source": "Qwen 3 ②", "_id": "qwen_2_32", "judge_pick": false}, {"question": "Why is the elastic strain energy in a spring ½FΔx, not FΔx? (2 steps)", "answer": "- Step 1: Force increases from 0 to F. Average force = ½F.  \n- Step 2: Energy = average force × displacement = ½FΔx.", "source": "Qwen 3 ②", "_id": "qwen_2_33", "judge_pick": false}, {"question": "What is the effect of a positive zero error on a Vernier caliper measurement? (2 steps)", "answer": "- Step 1: If Vernier zero mark is to the right of main scale, the reading is too high.  \n- Step 2: Correct actual reading: observed - zero error (e.g., observed 20.30 mm with +0.10 mm zero error → 20.20 mm).", "source": "Qwen 3 ②", "_id": "qwen_2_34", "judge_pick": false}], "count": 35}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "A Vernier caliper shows the main scale reading just past 42 mm, and the 8th division on the Vernier scale aligns perfectly with a main scale line. What is the reading? (2 steps)", "answer": "- Step 1: Read the main scale. The zero mark of the Vernier has passed 42 mm but not reached 43 mm, so the main scale reading is 42 mm.\n- Step 2: Add the Vernier scale. 8th division × 0.05 mm = 0.40 mm. Total = 42 + 0.40 = 42.40 mm.\n\nThe trick is remembering that you look for ANY aligning line on the Vernier scale, not a specific one.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "A sphere has radius 36 mm and mass 160 g. Calculate its density in kg/m³. (4 steps)", "answer": "- Step 1: Convert to SI units. r = 36 mm = 0.036 m, m = 160 g = 0.160 kg.\n- Step 2: Calculate volume. V = (4/3)πr³ = (4/3)π(0.036)³ = 1.954 × 10⁻⁴ m³.\n- Step 3: Apply density formula. ρ = m/V = 0.160 / (1.954 × 10⁻⁴).\n- Step 4: Calculate. ρ = 819 kg/m³.\n\nThe conversion trap: 36 mm → 0.036 m (not 0.36 m!). When you cube the conversion factor, errors magnify.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "Why does 1 g/cm³ equal 1000 kg/m³, and not 1 kg/m³?", "answer": "- Step 1: Write the conversion. 1 g = 10⁻³ kg, and 1 cm³ = (10⁻² m)³ = 10⁻⁶ m³.\n- Step 2: Calculate the density conversion. 1 g/cm³ = (10⁻³ kg) / (10⁻⁶ m³) = 10³ kg/m³.\n- Step 3: Explain intuitively. A cubic centimetre is tiny (a sugar cube), so 1 gram per tiny cube is actually a lot of mass per cubic metre—so it becomes 1000 kg/m³.\n\nThis is a common trap: students see \"g to kg\" (divide by 1000) and \"cm³ to m³\" (divide by 10⁶) and incorrectly think it equals 1.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "Describe how to measure the density of an irregular solid object using a Eureka can. What are two ways to improve accuracy? (3 steps)", "answer": "- Step 1: Method. (1) Measure mass of the dry object. (2) Fill Eureka can until water just overflows. (3) Place empty measuring cylinder under spout. (4) Gently lower object into can using string. (5) Collect displaced water and record its volume.\n- Step 2: Accuracy improvements. (a) Read the measuring cylinder at eye level to avoid parallax error. (b) Gently lower the object to prevent splashing—splashed water means less collected, underestimating volume.\n+ Additional improvements: repeat experiment and average; ensure object is dry before weighing.\n\nThe key misconception: some students think you measure the object's volume directly in the cylinder—you don't; you collect what flows out.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "A wire has diameter 2.3 mm. A student calculates area as A = πd² = π(2.3 × 10⁻³)². What is wrong with this calculation? (2 steps)", "answer": "- Step 1: Identify the error. The formula A = πd² gives the area of a square with side d, not the area of a circle.\n- Step 2: Give the correct formula. For a circle, A = π(d/2)² = πd²/4. Using d = 2.3 mm: A = π(2.3 × 10⁻³)²/4 = 4.15 × 10⁻⁶ m² (not 16.6 × 10⁻⁶ m²).\n\nThis error makes area 4× too large, which would make stress 4× too small and extension 4× too small in Young modulus calculations.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "State Hooke's Law. Why is it only valid up to a certain point? (2 steps)", "answer": "- Step 1: The law. For many materials, the extension produced is directly proportional to the applied force, provided the elastic limit is not exceeded: F = kx.\n- Step 2: The limitation. Beyond the limit of proportionality, the force-extension relationship becomes non-linear—the material no longer obeys F ∝ x. Beyond the elastic limit, plastic deformation occurs and the material will not return to its original length when the force is removed.\n\nCommon misconception: Students think Hooke's law means \"the spring always returns\"—that's only true if you stay within the elastic limit.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "Two identical springs, each with spring constant 240 N/m, are connected in series. What is the effective spring constant? Why is it less than 240 N/m? (3 steps)", "answer": "- Step 1: Apply series formula. For two identical springs: 1/k_effective = 1/k + 1/k = 2/k, so k_effective = k/2 = 120 N/m.\n- Step 2: Physical reasoning. In series, the same force passes through both springs. Each spring extends by x = F/k. Total extension = 2(F/k), so effective k = F/(total extension) = k/2.\n- Step 3: Intuition. Series springs are easier to stretch (like walking a longer distance for the same force), so the effective stiffness decreases.\n\nAnalogy: Series is like resistors in parallel—the total resistance decreases.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "Two identical springs, each with spring constant 240 N/m, are connected in parallel. What is the effective spring constant? Why is it greater than 240 N/m? (3 steps)", "answer": "- Step 1: Apply parallel formula. k_effective = k₁ + k₂ = 240 + 240 = 480 N/m.\n- Step 2: Physical reasoning. In parallel, the force is shared between the two springs. Each spring carries F/2 and extends by (F/2)/k = F/(2k). Since both extend by the same amount, total force = 2 × (F/2) = F, giving effective k = 2k.\n- Step 3: Intuition. Parallel springs are harder to stretch (two springs sharing the load), so the effective stiffness increases.\n\nAnalogy: Parallel is like resistors in series—the total resistance increases.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "A force-extension graph for a spring is curved from the origin. What does this tell you about the spring? (2 steps)", "answer": "- Step 1: Interpret the graph. A curved graph from the origin means the extension is NOT directly proportional to force from the start—the relationship is non-linear.\n- Step 2: What this implies. This spring does NOT obey Hooke's Law at any point. The spring constant is not constant; it changes with extension. Some polymers (like rubber) and certain metal springs exhibit this behavior.\n\nMisconception: Students assume all springs are linear. Real materials (especially polymers) often have non-linear force-extension curves.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "Define tensile stress and state its unit. Why is stress different from pressure even though they have the same units? (2 steps)", "answer": "- Step 1: Definition and unit. Stress (σ) = Force / Cross-sectional area. Unit: Pascal (Pa) = N/m².\n- Step 2: Conceptual difference. Pressure acts on surfaces from outside (like fluid pushing on walls). Stress is internal—the material's internal resistance to deformation. Both are force/area, but context differs: pressure is external force distribution; stress is internal force intensity within a material.\n\nThis is a common confusion point because the units are identical but the physics is different.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "Define tensile strain. Why does strain have no units? (2 steps)", "answer": "- Step 1: Definition. Strain (ε) = extension / original length = ΔL / L.\n- Step 2: Why dimensionless. It's a ratio of two lengths (meters/meters), so the units cancel. Strain tells you the fractional change in length—a 0.02 strain means the material stretched to 102% of its original length.\n\nCritical exam point: Never write strain as a percentage in Edexcel answers (e.g., write 0.02, not 2%). The percentage form loses marks.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "What is the Young modulus? Explain what a high Young modulus value means physically. (2 steps)", "answer": "- Step 1: Definition. Young modulus (E) = stress / strain. It measures a material's stiffness—how much stress is needed to produce a given strain.\n- Step 2: Physical meaning. A high E (like steel at 200 GPa) means the material is stiff—it resists deformation. A low E (like rubber at 0.01-0.1 GPa) means the material is flexible and deforms easily under stress.\n\nSteel (E ≈ 200 GPa) is 2000× stiffer than rubber. This is why steel is used in construction and rubber in cushions.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "A steel cable has cross-sectional area 4.15 × 10⁻⁶ m² and original length 28 m. A force of 3200 N extends it by 0.103 m. Calculate the Young modulus of the steel. (4 steps)", "answer": "- Step 1: Use E = FL/(AΔL). All values: F = 3200 N, L = 28 m, A = 4.15 × 10⁻⁶ m², ΔL = 0.103 m.\n- Step 2: Substitute into formula: E = (3200 × 28) / (4.15 × 10⁻⁶ × 0.103).\n- Step 3: Calculate numerator: 3200 × 28 = 89,600.\n- Step 4: Calculate denominator: 4.15 × 10⁻⁶ × 0.103 = 4.27 × 10⁻⁷. Then E = 89,600 / (4.27 × 10⁻⁷) = 2.1 × 10¹¹ Pa.\n\nThis is typical for steel (around 200 GPa), confirming the answer is reasonable.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "On a force-extension graph obeying Hooke's Law, what does the gradient represent? What does the area under the graph represent? (2 steps)", "answer": "- Step 1: Gradient = spring constant (k). The gradient ΔF/Δx has units N/m—it tells you how stiff the spring is.\n- Step 2: Area under graph = elastic strain energy (work done). For a linear graph, this is a triangle: Area = ½ × base × height = ½Fx = ½kx². This is the energy stored in the spring when stretched.\n\nThis connects to the formula E_e = ½Fx = ½kx²—make sure you know both forms.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "Explain the difference between the \"limit of proportionality\" and the \"elastic limit\" on a force-extension graph. (2 steps)", "answer": "- Step 1: Limit of proportionality. This is the point where the graph stops being a straight line (F ∝ x ends). Beyond this point, Hooke's Law no longer applies—the relationship is no longer linear.\n- Step 2: Elastic limit. This is the point where plastic deformation begins. Beyond this point, even if you remove the force, the material will NOT return to its original length—it is permanently stretched.\n\nKey point: The elastic limit occurs at or after the limit of proportionality. They are NOT the same point—the graph can be non-linear but still elastic (recoverable).", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "A wire is stretched beyond its elastic limit and then the force is removed. Describe what happens when the wire is stretched again. (2 steps)", "answer": "- Step 1: After plastic deformation, the wire has been permanently stretched. Its length has increased.\n- Step 2: When re-stretched, the wire behaves elastically again—it regains its \"springiness.\" The force-extension graph will be a straight line from the new origin, with the same gradient as before (same stiffness), because the material's elastic properties are recovered after plastic deformation.\n\nThis is why mild steel can be pressed into car body panels: it yields plastically, then regains elasticity in the new shape.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "Describe the function of the \"control wire\" in Searle's apparatus for measuring Young's modulus. Why is it necessary? (2 steps)", "answer": "- Step 1: The control wire is an identical wire alongside the test wire that undergoes the same temperature changes and support movements, but has no extra load added.\n- Step 2: It compensates for systematic errors. Any expansion/contraction of the apparatus due to temperature changes, or any movement of the support, affects both wires equally. The difference in extension between the wires gives only the extension due to the applied load, eliminating these errors.\n\nWithout the control wire, temperature changes would make your measurements inaccurate even if you measured carefully.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "What safety precautions are essential when performing a Young's modulus experiment with a wire? (2 steps)", "answer": "- Step 1: Eye protection. Wear safety glasses because the wire may snap unexpectedly and fly toward your eyes.\n- Step 2: Falling weights. Place a sand tray beneath the weights. If the wire breaks, the weights will fall into the sand rather than onto your feet.\n\nA common student oversight: forgetting about the danger from falling masses, not just the snapping wire.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "Brass is an alloy: 70% copper by volume, 30% zinc by volume. Copper density = 8.9 × 10³ kg/m³, zinc density = 7.1 × 10³ kg/m³. Calculate the density of brass (total volume = 0.80 × 10⁻³ m³). (4 steps)", "answer": "- Step 1: Find component volumes. V_copper = 0.70 × 0.80 × 10⁻³ = 0.56 × 10⁻³ m³. V_zinc = 0.30 × 0.80 × 10⁻³ = 0.24 × 10⁻³ m³.\n- Step 2: Calculate masses. m_copper = ρV = 8.9 × 10³ × 0.56 × 10⁻³ = 4.98 kg. m_zinc = 7.1 × 10³ × 0.24 × 10⁻³ = 1.70 kg.\n- Step 3: Total mass. m_total = 4.98 + 1.70 = 6.68 kg.\n- Step 4: Calculate density. ρ_brass = m_total / V_total = 6.68 / (0.80 × 10⁻³) = 8350 kg/m³.\n\nKey insight: You CANNOT just average the densities (8.9 and 7.1 would give 8.0)—you must account for the volume fractions properly.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "A balloon is filled with air at higher pressure than atmospheric. The calculated density inside is 1.5 kg/m³, while standard air density is 1.2 kg/m³. Explain why they differ. (2 steps)", "answer": "- Step 1: The balloon air is denser because it's at higher pressure.\n- Step 2: Higher pressure means more air molecules are packed into the same volume. Since density = mass/volume, more mass per volume = higher density. Temperature could also play a role (cooler air is denser), but pressure is the main factor in an inflated balloon.\n\nThis is why balloons feel \"full\"—there's actually more air inside than in the same volume at atmospheric pressure.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "A student says \"stress and pressure are the same thing because they both have units of Pascals.\" How would you correct this misconception? (2 steps)", "answer": "- Step 1: They share units but different physical meaning. Pressure is force per unit area exerted BY a fluid ON a surface (external). Stress is force per unit area exerted WITHIN a material (internal resistance to deformation).\n- Step 2: Context matters. Pressure acts on boundaries (water pushing on dam walls). Stress acts within a solid (steel cable internal forces when lifting).\n\nThink: Pressure pushes on surfaces; stress pushes on internal structure.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "In the core practical to determine Young's modulus, why is it better to plot a stress-strain graph rather than just using one set of readings? (2 steps)", "answer": "- Step 1: Using one set of readings is less accurate because any single measurement has random errors.\n- Step 2: A graph plots multiple data points. The gradient (which gives E) averages across all readings, reducing the effect of random errors. Also, the graph shows if you're in the linear region—if your points curve, you're beyond the proportional limit.\n\nThis is why \"plot a graph\" appears in almost every core practical—it's not just busywork, it's better physics.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "A rubber band has natural length 8.4 cm. When stretched, its strain is 2.45. What is its new length? (2 steps)", "answer": "- Step 1: Strain = extension/original length = ΔL/L. So ΔL = strain × L = 2.45 × 8.4 cm = 20.58 cm.\n- Step 2: New length = original + extension = 8.4 + 20.58 = 28.98 cm ≈ 29.0 cm.\n\nA strain of 2.45 means the rubber stretched to nearly 3.5× its original length—that's why rubber bands can extend so much!", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "A copper wire is 1.52 m long and stretches by 3.2 mm under tension. A student tries to calculate stress but gets stuck. What information is missing? (2 steps)", "answer": "- Step 1: The student can calculate strain: ε = 3.2 mm / 1.52 m = 0.0032 / 1.52 = 0.0021.\n- Step 2: To find stress, you need E = σ/ε, so σ = E × ε. This requires either Young's modulus of copper (≈ 120 GPa) OR the force and cross-sectional area. Without force and area (or E), stress cannot be determined.\n\nThis tests whether students understand the relationships between stress, strain, and Young's modulus—you need TWO of the three to find the third.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "Why is the cross-sectional area formula A = π(d/2)² safer to use than A = πd²/4? (1 step)", "answer": "Both are mathematically identical, but using (d/2)² first reminds you to halve the diameter before squaring. Using d²/4 directly is fine IF you remember the division—if you forget and write πd², your area is 4× too big.\n\nWrite it as A = π × (d/2)² to build the safety check into your notation.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "In exam answers, students often lose marks by not showing enough working. What minimum steps should a density calculation show? (2 steps)", "answer": "- Step 1: List given values with units. Write \"Volume = ... m³\", \"Mass = ... kg\".\n- Step 2: Show the formula, substitution, and answer with units. Don't skip from \"ρ = m/V\" straight to the answer.\n\nEdexcel marks for: listing knowns (1), stating formula (1), substitution (1), final answer with units (1). Skipping steps loses method marks even if final answer is right.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "A student measures one sheet of paper with a ruler and calculates density. Why is this a bad experimental design? How could they improve it? (2 steps)", "answer": "- Step 1: Problem. A sheet of paper has tiny dimensions—measuring with a ruler (resolution ≈ 1 mm) gives huge percentage uncertainty. The mass balance might read 0.00 g.\n- Step 2: Improvement. Measure 10 or 20 sheets together, then divide the total extension and mass by the number of sheets. This reduces percentage uncertainty dramatically (same absolute uncertainty, larger measured value).\n\nThis is the key experimental principle: make the measured value larger to reduce percentage uncertainty.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "A steel rail is pre-strained (pre-stretched) when laid in cold weather. Why don't engineers use the highest summer temperature to determine how much to pre-strain? (2 steps)", "answer": "- Step 1: If rails are unstressed at the highest temperature, when winter comes and temperature drops, they would contract but be fixed in place—creating enormous tensile stress.\n- Step 2: This stress could cause the rails to snap or fracture. The pre-strain is calculated so that at the highest expected temperature, the rail is just approaching unstressed, and at lowest temperature, it's not stressed beyond its elastic limit.\n\nEngineers balance: too much pre-strain = snap in cold weather; too little = buckle in hot weather.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "Two springs with constants 100 N/m and 300 N/m are connected in series. What is the effective constant? (2 steps)", "answer": "- Step 1: Use 1/k = 1/100 + 1/300 = (3 + 1)/300 = 4/300.\n- Step 2: k_effective = 300/4 = 75 N/m.\n\nNotice the result (75 N/m) is less than BOTH individual springs—that's always true for series combinations.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}], "count": 29}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "A Vernier caliper shows a main scale reading of 24 mm before the Vernier zero, and the 7th division on the Vernier scale aligns exactly with a main scale division. What is the reading if the Vernier has 20 divisions? (2 steps)", "answer": "- Step 1: Main scale reading = 24 mm (the last visible full mm before the Vernier zero)\n- Step 2: Vernier reading = 7 × 0.05 mm = 0.35 mm. Total = 24.35 mm\n\n[The key is finding the SINGLE division on the Vernier scale that aligns with a main scale line — not multiple lines]", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "State the definition of density in words, and write its formula with all symbol definitions. (2 steps)", "answer": "- Step 1: Density is the mass per unit volume of a substance — how much mass is packed into a given space\n- Step 2: Formula: $$\\rho = \\frac{m}{V}$$ where $$\\rho$$ = density (kg m⁻³), m = mass (kg), V = volume (m³)\n\n[Remember: density is an intrinsic property — it doesn't depend on how much material you have]", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "A sphere has radius 36 mm and mass 160 g. Calculate its density in kg m⁻³. (4 steps)", "answer": "- Step 1: Convert to SI units: r = 36 mm = 0.036 m, m = 160 g = 0.160 kg\n- Step 2: Calculate volume: $$V = \\frac{4}{3}\\pi r^3 = \\frac{4}{3}\\pi(0.036)^3 = 1.95 \\times 10^{-4} \\, \\text{m}^3$$\n- Step 3: Apply density formula: $$\\rho = \\frac{m}{V} = \\frac{0.160}{1.95 \\times 10^{-4}}$$\n- Step 4: Answer = 820 kg m⁻³ (2 s.f.)\n\n[Watch out: 1 cm³ = 10⁻⁶ m³, not 10⁻³ — this cubed power is a common trap]", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "Explain why 1 g cm⁻³ equals 1000 kg m⁻³. (2 steps)", "answer": "- Step 1: Convert each unit: 1 g = 10⁻³ kg, and 1 cm = 10⁻² m, so 1 cm³ = (10⁻²)³ = 10⁻⁶ m³\n- Step 2: Therefore: $$1 \\, \\text{g cm}^{-3} = \\frac{10^{-3} \\, \\text{kg}}{10^{-6} \\, \\text{m}^3} = 10^3 \\, \\text{kg m}^{-3}$$\n\n[The conversion factor is 1000, not 1 — densities in kg m⁻³ look much larger than g cm⁻³]", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "Describe the displacement method (Eureka can) for measuring the density of an irregular solid. List the apparatus and outline the procedure. (3 steps)", "answer": "- Step 1: Apparatus: Eureka can, measuring cylinder, string, mass balance, water\n- Step 2: Procedure: (1) Measure mass of dry object. (2) Fill Eureka can to spout, let overflow settle. (3) Place measuring cylinder under spout. (4) Submerge object gently using string. (5) Collect displaced water and measure its volume\n- Step 3: Density = mass / volume of displaced water\n\n[Volume of displaced water = volume of object by Archimedes' principle]", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "Why is it more accurate to measure many sheets of paper at once rather than a single sheet when determining thickness with a micrometer? (2 steps)", "answer": "- Step 1: The micrometer has resolution 0.01 mm — measuring one sheet (~0.1 mm) introduces high percentage uncertainty. The instrumental uncertainty is a larger fraction of the measurement\n- Step 2: Measuring N sheets and dividing by N reduces percentage uncertainty by a factor of roughly √N (random) and gives better resolution relative to the total thickness measured\n\n[This is the \"enlargement principle\" — make the measured value larger to reduce percentage uncertainty]", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "What is the difference between accuracy and precision in experimental measurement? (2 steps)", "answer": "- Step 1: Accuracy = how close a measurement is to the true value. Precision = how close repeated measurements are to each other\n- Step 2: You can have high precision (repeatable results) but low accuracy (systematic error), like arrows grouping tightly but off-center on a target\n\n[Think: precise = reproducible, accurate = correct]", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "State Hooke's Law in words and write its equation, defining all symbols. (2 steps)", "answer": "- Step 1: For a material within the elastic limit, the extension produced is directly proportional to the applied force\n- Step 2: $$F = kx$$ where F = force (N), k = spring constant/stiffness (N m⁻¹), x = extension (m)\n\n[The key word is \"proportional\" — this means F ∝ x, giving F = kx]", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "On a force-extension graph, what does the gradient represent, and what does the area under the graph represent? (2 steps)", "answer": "- Step 1: Gradient = ΔF/Δx = spring constant k (N m⁻¹). A steeper gradient means a stiffer spring\n- Step 2: Area under the graph = work done = elastic strain energy stored (J). For a straight-line region, this is ½Fx = ½kx²\n\n[This is crucial: gradient gives k, area gives energy]", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "Two identical springs (spring constant k) are connected in series. What is the effective spring constant? Explain why. (2 steps)", "answer": "- Step 1: Effective k = k/2 (or more precisely, 1/k_effective = 1/k + 1/k, giving k_effective = k/2)\n- Step 2: In series, the same force passes through each spring, and extensions add: x_total = x₁ + x₂. Since x = F/k, the total extension doubles for the same force, making the system half as stiff\n\n[Think: series = easier to stretch = smaller effective k]", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "Two identical springs (spring constant k) are connected in parallel. What is the effective spring constant? Explain why. (2 steps)", "answer": "- Step 1: Effective k = 2k\n- Step 2: In parallel, the force is shared between springs: F_total = F₁ + F₂. With the same extension x on each, F_total = kx + kx = 2kx, so the effective k doubles\n\n[Think: parallel = stiffer, harder to stretch = larger effective k]", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "A student connects two springs in series and applies a force. They calculate the effective k as k₁ + k₂. What is the error in their reasoning? (2 steps)", "answer": "- Step 1: This is the formula for parallel springs, not series. The student has confused the two arrangements\n- Step 2: For series: 1/k_effective = 1/k₁ + 1/k₂ (k decreases). For parallel: k_effective = k₁ + k₂ (k increases)\n\n[Use the resistor analogy: series springs behave like parallel resistors; parallel springs behave like series resistors]", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "Define tensile stress and state its unit. Write the formula, defining all symbols. (2 steps)", "answer": "- Step 1: Tensile stress is the force per unit cross-sectional area within a material\n- Step 2: $$\\sigma = \\frac{F}{A}$$ where σ = stress (Pa or N m⁻²), F = force (N), A = cross-sectional area (m²). Unit: pascal (Pa)\n\n[Stress and pressure have the same units (Pa) but stress describes internal forces in a solid, pressure describes force on fluids]", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "Define tensile strain. Why does it have no unit? Write the formula. (2 steps)", "answer": "- Step 1: Tensile strain is the ratio of extension to original length — it's a measure of deformation relative to the original size\n- Step 2: $$\\varepsilon = \\frac{\\Delta L}{L_0}$$ where ε = strain (dimensionless), ΔL = extension (m), L₀ = original length (m). No unit because it's a ratio of two lengths\n\n[Never express strain as a percentage in Edexcel answers — use the decimal form]", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "Define the Young modulus. Write two equivalent formulas and state its unit. (2 steps)", "answer": "- Step 1: Young modulus is the ratio of tensile stress to tensile strain — a measure of material stiffness\n- Step 2: $$E = \\frac{\\sigma}{\\varepsilon} = \\frac{F/A}{\\Delta L/L_0} = \\frac{FL_0}{A \\Delta L}$$ Unit: pascal (Pa), typically given in GPa (10⁹ Pa)\n\n[Unlike spring constant k, Young modulus is a material property independent of dimensions]", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "The cross-sectional area of a wire is calculated as πd², where d is the diameter. Why is this wrong, and what is the correct formula? (2 steps)", "answer": "- Step 1: This gives an area 4 times too large — πd² calculates the area of a square of side d, not a circle\n- Step 2: Correct formula: $$A = \\pi r^2 = \\pi\\left(\\frac{d}{2}\\right)^2 = \\frac{\\pi d^2}{4}$$\n\n[This is one of the most common errors in Young modulus calculations]", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "A steel cable has diameter 2.3 mm and length 28 m. A force of 3200 N is applied. Calculate the extension. Young modulus for steel = 2.1 × 10¹¹ Pa. (4 steps)", "answer": "- Step 1: Calculate area: d = 2.3 mm = 2.3 × 10⁻³ m, A = π(d/2)² = 4.15 × 10⁻⁶ m²\n- Step 2: Rearrange Young modulus formula: $$\\Delta L = \\frac{FL}{AE}$$\n- Step 3: Substitute: $$\\Delta L = \\frac{3200 \\times 28}{(4.15 \\times 10^{-6}) \\times (2.1 \\times 10^{11})}$$\n- Step 4: Answer ≈ 0.10 m = 10 cm\n\n[The extension is surprisingly large because steel is very stiff but the cable is long and thin]", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "On a force-extension graph, distinguish between: (a) limit of proportionality, (b) elastic limit, (c) yield point. (3 steps)", "answer": "- Step 1: Limit of proportionality — the point beyond which extension is no longer proportional to force (graph stops being straight)\n- Step 2: Elastic limit — the point beyond which permanent (plastic) deformation occurs (won't return to original length)\n- Step 3: Yield point — point where material suddenly stretches with little increase in load (plastic deformation begins)\n\n[These points are close but not identical: limit of proportionality ≤ elastic limit ≤ yield point]", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "What is elastic strain energy? Write two formulas for calculating it, and state when each is used. (2 steps)", "answer": "- Step 1: Elastic strain energy is the work done in stretching/compressing a material — energy stored elastically\n- Step 2: (1) $$E = \\frac{1}{2}Fx = \\frac{1}{2}kx^2$$ — use when Hooke's Law applies (straight-line region). (2) Area under force-extension graph — use for any shape\n\n[Units: joules (J)]", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "Explain why rubber behaves differently from metals in terms of its force-extension graph shape. (2 steps)", "answer": "- Step 1: Rubber is a polymer with long tangled chains. Initially, small forces untangle these chains easily (large extension for small force), then chains straighten and bonds resist further stretching (graph steepens)\n- Step 2: Metals have crystalline structures where bonds stretch uniformly, giving linear behavior up to the limit of proportionality\n\n[This is why rubber's force-extension graph is curved from the start, unlike metals]", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "What is the difference between elastic deformation and plastic deformation? (2 steps)", "answer": "- Step 1: Elastic deformation — material returns to original shape and size when force is removed (atoms return to equilibrium positions)\n- Step 2: Plastic deformation — permanent change in shape; material does not recover (atomic bonds break and reform in new positions)\n\n[Think: elastic = reversible, plastic = permanent]", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "A wire obeys Hooke's Law. When a force of 50 N is applied, it extends by 2.0 mm. Calculate the elastic strain energy stored. (2 steps)", "answer": "- Step 1: Since Hooke's Law applies, use $$E = \\frac{1}{2}Fx$$\n- Step 2: $$E = \\frac{1}{2} \\times 50 \\times 0.002 = 0.05 \\, \\text{J}$$\n\n[Alternatively: area of triangle = ½ × base × height = ½ × 50 N × 0.002 m]", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "Why does a steel spring have a much larger Young modulus than a rubber band? (2 steps)", "answer": "- Step 1: Young modulus measures resistance to deformation — steel has strong metallic bonds that resist stretching significantly\n- Step 2: Rubber has weak intermolecular forces between polymer chains that uncoil easily, giving much lower resistance to deformation (E ~ 0.01-0.1 GPa vs steel ~200 GPa)\n\n[Higher E = stiffer material]", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "In a Young's modulus experiment using Searle's apparatus, why is a control wire used alongside the test wire? (2 steps)", "answer": "- Step 1: The control wire compensates for any thermal expansion/contraction of the apparatus and any slight yielding of the support frame\n- Step 2: By using identical wires and applying the same temperature changes to both, only the genuine extension of the test wire due to added masses is measured\n\n[Any systematic error from the setup affects both wires equally and cancels out]", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "A 12 N weight is hung on a spring of natural length 5.0 cm with spring constant 8500 N m⁻¹. Calculate: (a) the extension, (b) the new length. (3 steps)", "answer": "- Step 1: Use F = kx, rearrange: x = F/k = 12/8500 = 1.41 × 10⁻³ m = 0.141 cm\n- Step 2: New length = original length + extension = 5.0 cm + 0.141 cm = 5.141 cm\n- Step 3: Answer: (a) 0.14 cm (b) 5.14 cm\n\n[Key point: original length is NOT the same as extension — they're different quantities]", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "Two identical springs (k = 240 N m⁻¹, natural length 210 mm) are connected in series and a 8.0 N weight is attached. What is the length of each spring? (3 steps)", "answer": "- Step 1: In series, the force through each spring is the same (8.0 N). Each spring extends by x = F/k = 8.0/240 = 0.0333 m = 33.3 mm\n- Step 2: Each spring length = natural length + extension = 210 mm + 33.3 mm = 243 mm\n- Step 3: Note: This asks for each spring's length, not total length\n\n[Common trap: using the effective k for the combination to calculate extension, then adding to ONE spring only — that gives total extension, not individual spring length]", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "What safety precautions are essential when performing a spring extension experiment in the lab? (2 steps)", "answer": "- Step 1: (1) Wear safety glasses — springs can snap and cause eye injuries. (2) Place a sand tray or mat below weights in case they fall\n- Step 2: (3) Don't stand directly under suspended masses. (4) Don't exceed the elastic limit — the spring could permanently deform or break\n\n[These are practical marks — name the specific hazard and the specific precaution]", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "Explain what is meant by \"pre-straining\" railway tracks. Why is it done? (2 steps)", "answer": "- Step 1: Pre-straining (pre-stressing) means stretching rails while fixing them in cold weather so they are under tension when installed\n- Step 2: When temperature rises, the rail expands but is already in tension, so it doesn't buckle. When temperature falls, it contracts but was already stretched, reducing risk of snapping\n\n[The engineer balances to avoid both buckling (high T) and snapping (low T)]", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "A wire stretches by 3.2 mm from an original length of 1.52 m. Without any other information, can you calculate the stress? Explain. (2 steps)", "answer": "- Step 1: No — stress requires force and cross-sectional area (σ = F/A). We can only calculate strain: ε = ΔL/L = 0.0032/1.52 = 2.1 × 10⁻³\n- Step 2: To find stress, we need either: (a) force and area, or (b) Young modulus and strain (σ = Eε)\n\n[This tests whether you understand what information each formula needs]", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "What is the distinction between a scalar quantity and a vector quantity? Give two examples of each relevant to this topic. (2 steps)", "answer": "- Step 1: Scalar has magnitude only; vector has both magnitude and direction\n- Step 2: Scalars in this topic: density, mass, volume, extension, strain, energy. Vectors: force, velocity, acceleration\n\n[Common mistake: confusing extension (scalar, just size) with displacement (vector, includes direction)]", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "What is zero error on a micrometer? How do you correct for it? (2 steps)", "answer": "- Step 1: Zero error exists when the jaws are closed but the micrometer doesn't read zero. Positive zero error: reads above zero. Negative (or zero error with opposite sign): reads below zero\n- Step 2: If zero error is +0.02 mm, actual reading = observed − 0.02 mm. If zero error is −0.02 mm (or +0.02 with opposite convention), actual = observed + 0.02 mm\n\n[Always check for zero error before taking measurements]", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "Why does a balloon filled with air have a different density from the air in the room? (2 steps)", "answer": "- Step 1: The balloon is inflated to a pressure higher than atmospheric (to keep it inflated), so more air molecules are packed into the same volume\n- Step 2: Since density = mass/volume, and the balloon's air has more mass per volume, its density is higher than ambient air (~1.2 kg m⁻³)\n\n[Pressure affects gas density directly — higher pressure = higher density]", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "A copper wire and a steel wire of the same dimensions support the same load. Which will stretch more? Explain using Young's modulus. (2 steps)", "answer": "- Step 1: Copper will stretch more (for same dimensions and force)\n- Step 2: From E = FL/(AΔL), rearranging gives ΔL = FL/(AE). Since steel has higher E (~200 GPa vs ~120 GPa for copper), the extension ΔL is smaller for the same F, L, A\n\n[Higher Young modulus = stiffer = less extension for same load]", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "Explain how you would determine the Young modulus from a stress-strain graph. (2 steps)", "answer": "- Step 1: Find the linear (proportional) region of the graph where Hooke's Law applies\n- Step 2: The Young modulus E equals the gradient (slope) of that linear region: E = Δσ/Δε\n\n[Only use the straight-line portion — the gradient changes after the limit of proportionality]", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "A brass pin has cross-sectional area 0.30 cm². Brass has tensile strength 190 MPa. What is the maximum force it can withstand without breaking? (3 steps)", "answer": "- Step 1: Convert: A = 0.30 cm² = 0.30 × 10⁻⁴ m² = 3.0 × 10⁻⁵ m². Tensile strength = 190 MPa = 190 × 10⁶ Pa\n- Step 2: Use F = σ × A (rearranged from stress formula)\n- Step 3: F = 190 × 10⁶ × 3.0 × 10⁻⁵ = 5700 N = 5.7 kN\n\n[Tensile strength (or breaking stress) is the maximum stress before fracture]", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "What is the order of magnitude of Young modulus for (a) steel, (b) rubber, (c) bone? (2 steps)", "answer": "- Step 1: Steel: ~10¹¹ Pa (200 GPa). Rubber: ~10⁸ to 10⁹ Pa (0.01-0.1 GPa or 10-100 GPa in some sources)\n- Step 2: Bone: ~10¹⁰ Pa (around 20 GPa)\n\n[Use this for sanity checks: if you calculate E and get 10⁶ Pa for steel, something's wrong]", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "When measuring the density of a liquid using a measuring cylinder and balance, why do we subtract the mass of the empty cylinder? (2 steps)", "answer": "- Step 1: We need the mass of the liquid only, not the cylinder plus liquid\n- Step 2: Method: (1) mass of empty cylinder (m₁), (2) mass of cylinder + liquid (m₂), (3) mass of liquid = m₂ − m₁. Then density = (m₂ − m₁)/V\n\n[This is the \"difference method\" — measure before and after]", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "A cube has side 2.0 cm and mass 63 g. Calculate its density in kg m⁻³. (3 steps)", "answer": "- Step 1: Convert: side = 2.0 cm = 0.020 m, mass = 63 g = 0.063 kg\n- Step 2: Volume = (0.020)³ = 8.0 × 10⁻⁶ m³\n- Step 3: Density = 0.063 / (8.0 × 10⁻⁶) = 7,875 kg m⁻³ ≈ 7.9 × 10³ kg m⁻³\n\n[This is close to iron/steel density — is the cube made of iron?]", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "Explain the difference between systematic error and random error, giving an example of each in measurement contexts. (2 steps)", "answer": "- Step 1: Systematic error: consistent error in same direction (e.g., micrometer with zero error, using wrong calibration, parallax error). Affects accuracy\n- Step 2: Random error: unpredictable variations (e.g., slight differences in reading each time, fluctuating conditions). Affects precision but averages out with repeats\n\n[Systematic: fix the instrument. Random: take more readings and average]", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}], "count": 39}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "Why is the equation $$\\rho=m/V$$ called a *material* property rather than just a property of one specific object?", "answer": "- Step 1: For any given substance under fixed conditions (temperature, pressure, phase), packing the molecules together gives a fixed mass per unit volume.\n- Step 2: If you double the volume of pure water, you also double the mass — the ratio $$m/V$$ stays the same.\n- Step 3: So density is intensive (independent of size of sample), and depends only on what the material *is*, not how much of it you have. This is why we can quote single values like \"water = 1000 kg/m³\" without specifying how much water.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": true}, {"question": "Why does $$1\\,\\mathrm{g\\,cm^{-3}}$$ equal $$1000\\,\\mathrm{kg\\,m^{-3}}$$ and not $$10\\,\\mathrm{kg\\,m^{-3}}$$? (3 steps)", "answer": "- Step 1: Convert mass: $$1\\,\\mathrm{g}=10^{-3}\\,\\mathrm{kg}$$ — that's a factor of $$10^{-3}$$.\n- Step 2: Convert volume: $$1\\,\\mathrm{cm^3}=(10^{-2}\\,\\mathrm{m})^3=10^{-6}\\,\\mathrm{m^3}$$ — the exponent applies to *each* length, so the volume factor is cubed.\n- Step 3: Therefore $$1\\,\\mathrm{g\\,cm^{-3}}=\\frac{10^{-3}}{10^{-6}}\\,\\mathrm{kg\\,m^{-3}}=10^{3}\\,\\mathrm{kg\\,m^{-3}}$$. The trap is forgetting to cube the length conversion: people often just write $$10^{-2}$$ in the denominator and get the wrong factor.\n\nThe volume conversion is *much* bigger than the mass conversion, which is why kg/m³ densities are large numbers like 1000.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "If you're given the *diameter* of a wire and need the cross-sectional area, why is using $$\\pi d^2$$ a serious error, and by what factor does it skew the answer?", "answer": "- Step 1: The correct area of a circle is $$A=\\pi r^2$$ where $$r=d/2$$.\n- Step 2: Substituting: $$A=\\pi(d/2)^2=\\pi d^2/4$$.\n- Step 3: Using $$\\pi d^2$$ gives an area $$4\\times$$ too large. Consequences cascade:\n+ Stress $$\\sigma=F/A$$ comes out $$4\\times$$ too small.\n+ Extension $$\\Delta L=FL/(AE)$$ comes out $$4\\times$$ too small.\n+ Required Young modulus comes out $$4\\times$$ too small.\n\nThe mantra: *halve first, then square*.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": true}, {"question": "State Hooke's law precisely, and explain why the wording \"force is proportional to extension\" is better than \"displacement is proportional to a constant\".", "answer": "- Step 1: Hooke's law: the force applied to a spring is directly proportional to its extension, *provided the elastic limit is not exceeded*. Mathematically $$F=kx$$.\n- Step 2: Saying \"displacement is proportional to a constant\" is meaningless — a constant doesn't vary, so nothing can be proportional to it. The proportionality is between two *variables*: F and x.\n- Step 3: The constant $$k$$ (spring constant) is the *constant of proportionality*, not the thing being proportional to. It tells you how stiff the spring is — force needed per unit extension, units $$\\mathrm{N\\,m^{-1}}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "What is the conceptual difference between the *limit of proportionality* and the *elastic limit*?", "answer": "- Step 1: The limit of proportionality is the point on a force–extension graph where the line stops being straight — beyond it, $$F$$ is no longer proportional to $$x$$ (Hooke's law breaks down).\n- Step 2: The elastic limit is the point beyond which the material no longer returns to its original shape when unloaded — permanent (plastic) deformation begins.\n- Step 3: Between them lies a narrow region where deformation is still *elastic* (recoverable) but *not proportional* (the curve bends but the material still snaps back). So: limit of proportionality ≤ elastic limit. They are not synonyms.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": true}, {"question": "Two identical springs each with constant $$k$$ are joined in series and a single weight is hung from the bottom. Why does the same force pass through *each* spring, and how does this make the chain \"softer\"? (3 steps)", "answer": "- Step 1: In a vertical series chain, the bottom spring supports the weight, and the top spring supports the bottom spring (plus the weight). Since the springs themselves are taken as massless, the tension is uniform — every cross-section feels the same force $$F$$.\n- Step 2: Each spring therefore extends by $$x=F/k$$ individually. The total chain extension is the sum: $$x_{total}=2F/k$$.\n- Step 3: Effective stiffness: $$k_{eff}=F/x_{total}=k/2$$. The chain is \"softer\" (less stiff) because the same force produces double the extension — analogous to resistors in parallel where current finds two paths and resistance drops.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": true}, {"question": "Two identical springs of constant $$k$$ are joined in parallel supporting a single weight via a rigid bar. Why does the effective stiffness *double*?", "answer": "- Step 1: Both springs are constrained to extend by the same amount $$x$$ (the rigid bar moves down by $$x$$, dragging both equally).\n- Step 2: Each spring then exerts an upward force $$kx$$ on the bar, and they share the load: total upward force $$F=2kx$$.\n- Step 3: Effective stiffness $$k_{eff}=F/x=2k$$. Each spring carries only half the applied weight, so for a given force the system extends only half as much — stiffer overall. Analogous to resistors in series.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": true}, {"question": "Why is Young modulus a more useful material descriptor than the spring constant $$k$$ for comparing, say, two steel cables of different sizes?", "answer": "- Step 1: The spring constant $$k=F/x$$ depends on the geometry of the object: a thicker or shorter cable has a higher $$k$$ even if made of the same steel.\n- Step 2: Young modulus normalises out the geometry: $$E=\\frac{F/A}{\\Delta L/L}=\\frac{FL}{A\\Delta L}$$. The cross-sectional area and original length are divided out.\n- Step 3: Two cables made of identical steel will have *the same* $$E$$ (≈ 200 GPa) regardless of their thickness or length. So $$E$$ is a property of the *material*; $$k$$ is a property of the *object*. This is why textbooks tabulate $$E$$ for materials, not $$k$$.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": true}, {"question": "Stress and pressure both have units of pascals. What's the conceptual difference, and why don't we just call them the same thing?", "answer": "- Step 1: Pressure is force per unit area applied externally by a fluid, acting perpendicular to a surface and in all directions equally (isotropic).\n- Step 2: Tensile/compressive stress is the *internal* force per unit area within a solid that resists deformation; it has a definite direction (along the axis of pulling/pushing) and can be tensile (pulling apart) or compressive (pushing together).\n- Step 3: They share units because both are force/area, but the *physical situation* differs: pressure is what a fluid exerts on a wall; stress is what particles inside a stretched solid exert on each other to resist further stretching.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": true}, {"question": "Why is strain dimensionless, and what's the consequence for the units of Young modulus?", "answer": "- Step 1: Strain is $$\\varepsilon=\\Delta L/L$$ — a ratio of two lengths. The metres cancel, leaving a pure number.\n- Step 2: Young modulus $$E=\\sigma/\\varepsilon$$. Since strain is dimensionless, $$E$$ inherits the units of stress.\n- Step 3: So $$E$$ has units of Pa (or N/m²), just like stress. Typical values are huge (steel ≈ $$2\\times10^{11}\\,\\mathrm{Pa}$$) because strains are typically very small (e.g. $$10^{-3}$$ at modest loads), so dividing a modest stress by a tiny strain gives a giant number.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": true}, {"question": "Why does the area under a force–extension graph give the elastic strain energy stored in a spring? (3 steps)", "answer": "- Step 1: Work done by a variable force is $$W=\\int F\\,dx$$ — geometrically, the area under the F–x curve.\n- Step 2: As you stretch the spring, the force *increases* from 0 to $$F$$, so the *average* force during stretching is $$F/2$$ (for a linear Hooke region). Work done = average force × distance = $$\\frac12 Fx$$.\n- Step 3: This work is stored in the spring as elastic potential energy (no friction, no plastic flow). For a Hooke-law spring, $$E=\\frac12 Fx=\\frac12 kx^2$$.\n\nIf the graph is non-linear (e.g. rubber), $$\\frac12 Fx$$ overestimates; you must actually count the area under the curve.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": true}, {"question": "A spring obeys Hooke's law. If you double the extension, by what factor does the stored elastic energy increase?", "answer": "- Step 1: $$E=\\frac12 kx^2$$ — the energy depends on the *square* of the extension.\n- Step 2: Doubling $$x$$ gives $$E_{new}=\\frac12 k(2x)^2=4\\cdot\\frac12 kx^2$$.\n- Step 3: Energy increases by a factor of 4. This is because force *and* distance both double, so work (force × distance) goes up by 4. This is a classic source of intuition errors: people guess \"double\" but the square wins.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": true}, {"question": "Why does adding a small initial mass to the test wire in Searle's apparatus matter before starting Young modulus measurements?", "answer": "- Step 1: A new wire has small kinks, bends, and slack from manufacture and handling.\n- Step 2: Without an initial load, the first added weights waste their extension just straightening the wire rather than truly stretching it. This contaminates the F–x relationship.\n- Step 3: A small pre-load (e.g. a 100 g hanger) removes the kinks, sets a sensible \"zero\" for the vernier scale, and ensures all subsequent extension readings reflect actual elastic stretching. Skipping this step introduces a systematic underestimate of $$E$$.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": true}, {"question": "What is the role of the *control wire* in Searle's apparatus, and what specific error does it eliminate?", "answer": "- Step 1: Two identical wires are hung from the same rigid support: the test wire (with load) and the control wire (with a small fixed reference mass).\n- Step 2: If the support yields slightly, or if temperature changes cause both wires to expand/contract, *both* wires move by the same amount.\n- Step 3: The vernier scale measures the *difference* between the two wires, so any common-mode motion (sag, thermal expansion) cancels. Only the genuine extension of the test wire due to applied load is recorded. Without the control wire, thermal expansion alone could swamp a small elastic extension.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "Why measure the diameter of a wire at *several points and orientations* before computing the cross-sectional area?", "answer": "- Step 1: Wires are not perfectly uniform — manufacturing leaves slight variations in thickness along the length, and the cross-section may be slightly elliptical rather than circular.\n- Step 2: One reading at one orientation could be unrepresentative; if it's high, $$A$$ is overestimated and $$E$$ is underestimated (and vice versa).\n- Step 3: Multiple readings at different positions and angles, then averaging, gives a best estimate of the typical diameter. Since $$A\\propto d^2$$, any error in $$d$$ is *doubled* in $$A$$, making careful averaging especially important.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": true}, {"question": "Why use a micrometer (resolution 0.01 mm) for the wire diameter but a meter rule for the wire length in a Young modulus experiment? (3 steps)", "answer": "- Step 1: Percentage uncertainty = (absolute uncertainty / measurement) × 100%. To keep this small, the absolute uncertainty must be small *relative to* the measured value.\n- Step 2: A wire diameter is ~0.5 mm. A 1 mm ruler resolution gives ~200% uncertainty — useless. A 0.01 mm micrometer gives ~2% — acceptable.\n- Step 3: The wire length is ~2 m. A 1 mm ruler resolution gives ~0.05% — already excellent. Using a micrometer here would be physically impossible and unnecessary. *Match instrument resolution to the scale of the quantity*, prioritising the measurement that contributes most to overall uncertainty.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "In a force–extension experiment using a stretched copper wire, why is it advisable to use a long wire (e.g. 2–3 m) rather than a short one?", "answer": "- Step 1: For a given force, extension scales with original length: $$\\Delta L=FL/(AE)$$.\n- Step 2: A longer wire produces a larger absolute extension for the same load, which means the extension reading has lower percentage uncertainty (the millimetre-scale ruling on the rule is the same, but the measurement is bigger).\n- Step 3: A short wire gives extensions of a fraction of a millimetre — within the noise of the measuring instrument. Long wire → bigger signal → better precision.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": true}, {"question": "Why do scientists specify *temperature and pressure* when quoting the density of a gas, but not usually for a solid or liquid?", "answer": "- Step 1: Gases are highly compressible: raising the pressure squeezes molecules closer, increasing mass per unit volume. Heating expands them, decreasing density.\n- Step 2: Solids and liquids barely change volume with temperature or pressure — their molecules are already in contact, so density is essentially constant under lab conditions.\n- Step 3: For a gas, quoting \"density = 1.2 kg/m³\" is meaningless without conditions; this is why a balloon's air can be denser than free atmospheric air (it's compressed inside).", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": true}, {"question": "A spherical balloon of radius 20 cm contains 50 g of air. You calculate the density as roughly $$1.5\\,\\mathrm{kg\\,m^{-3}}$$, but standard air density is $$1.2\\,\\mathrm{kg\\,m^{-3}}$$. What physical reason explains the difference?", "answer": "- Step 1: The balloon's rubber skin is under tension, pulling inward. To resist this and stay inflated, the gas inside must push outward at a pressure greater than atmospheric pressure.\n- Step 2: Higher pressure means more molecules packed into the same volume (gas density is proportional to pressure at fixed temperature, by the ideal gas law).\n- Step 3: So the air inside is at slightly elevated pressure, giving slightly higher density than free atmospheric air. Temperature could also matter but is usually a smaller effect here than the pressure difference from the elastic balloon.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "A 1 L bottle of whiskey weighs 0.915 kg of liquid. Without a calculator, roughly what's the density in $$\\mathrm{kg\\,m^{-3}}$$, and how does it compare to water?", "answer": "- Step 1: 1 L = $$10^{-3}\\,\\mathrm{m^3}$$. So density = $$0.915\\,\\mathrm{kg}/10^{-3}\\,\\mathrm{m^3}=915\\,\\mathrm{kg\\,m^{-3}}$$.\n- Step 2: Water is 1000 kg/m³. Whiskey is slightly less dense (~92% of water).\n- Step 3: This makes physical sense: whiskey is mostly water plus ethanol (~790 kg/m³, less dense). A mix that's roughly 40% ethanol and 60% water lands somewhere between, closer to water — about 915 kg/m³ checks out. Sanity-check via end values.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "Why does a mixture's density usually *not* equal the simple arithmetic mean of its components' densities, but a *volume-weighted* average?", "answer": "- Step 1: Density is mass per volume. The total mass is the sum of component masses; the total volume is the sum of component volumes (assuming no shrinkage/expansion on mixing).\n- Step 2: $$\\rho_{mix}=\\frac{m_1+m_2}{V_1+V_2}=\\frac{\\rho_1 V_1+\\rho_2 V_2}{V_1+V_2}$$ — this is a volume-weighted average.\n- Step 3: An arithmetic mean of $$\\rho_1$$ and $$\\rho_2$$ would only be correct if equal *volumes* were mixed. In a brass alloy that is 70% copper and 30% zinc *by volume*, the answer is closer to copper than a simple average suggests — exactly because more of the volume is copper.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": true}, {"question": "Why does a method involving displacement in a Eureka can work for measuring the volume of irregular solids?", "answer": "- Step 1: By Archimedes' principle, a fully submerged object displaces a volume of water exactly equal to its own volume.\n- Step 2: The Eureka can is pre-filled to the spout level, so any extra water added (by the object) overflows into a measuring cylinder.\n- Step 3: Reading the volume of overflow directly gives the object's volume, no matter how irregular its shape. This sidesteps the impossibility of using geometric formulas for an irregular object.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": true}, {"question": "A spring constant is sometimes called the \"force per unit extension\". Why is this phrasing more precise than \"the stiffness of the spring\"?", "answer": "- Step 1: \"Stiffness\" is intuitive but vague — it doesn't tell you the units or the operational definition.\n- Step 2: \"Force per unit extension\" makes both the dependence ($$k=F/x$$) and the units ($$\\mathrm{N\\,m^{-1}}$$) explicit: how many newtons are required to extend the spring by one metre.\n- Step 3: This phrasing is also what examiners want for definition marks. The conceptual content matches the formula directly: a stiffer spring needs more force per metre of extension.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "When does $$E=\\frac12 kx^2$$ stop being valid for elastic energy stored, and what should you use instead? (3 steps)", "answer": "- Step 1: $$\\frac12 kx^2$$ is the area of a triangle under a straight (Hooke's law) F–x line. It assumes force is exactly proportional to extension throughout the stretching.\n- Step 2: Once you go beyond the limit of proportionality, the graph curves — the relationship is no longer linear, so the \"triangle\" formula overestimates or underestimates.\n- Step 3: Use the actual *area under the curve* on the F–x graph. For complex shapes, count grid squares or split into approximate triangles/trapeziums. This is also why $$\\frac12 kx^2$$ never applies to rubber, which has a strongly curved F–x behaviour from the start.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": true}, {"question": "Why does pre-straining steel rails before laying them in cold weather prevent damage later?", "answer": "- Step 1: Steel expands when heated and contracts when cooled. If rails are laid relaxed in cold weather, summer heat would make them expand and buckle (compressive stress, sideways deformation).\n- Step 2: Pre-straining means stretching the rails first (putting them under tension), then fixing them in place. As temperature rises, the rails *try* to expand — instead they just relieve the tension.\n- Step 3: If summer heat is hot enough to relieve all the tension, the rails are merely unstressed (no buckling). The engineer picks a pre-strain matched to the expected temperature rise, so the rails sit somewhere between modest tension (cool weather) and zero stress (hottest expected day), never reaching damaging compression.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": true}, {"question": "Why doesn't the engineer just use the *highest observed temperature* to set the pre-strain (so the rail is stress-free at the hottest day)?", "answer": "- Step 1: If the rail is unstressed at the hottest day, then on a cool day it contracts. Since it's fixed at both ends, contraction means tensile stress — and the colder it gets, the higher the tension.\n- Step 2: At the coldest expected temperature, tensile stress could exceed the breaking stress, snapping the rail.\n- Step 3: The engineer balances two failure modes: buckling from compression (too little pre-strain) versus snapping from tension (too much pre-strain). The pre-strain is chosen to keep stress within safe limits across the *full temperature range*, not optimised for the hot extreme alone.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "On a stress–strain graph, what physical quantity does the *area under the curve* represent, and why?", "answer": "- Step 1: Stress = force/area, strain = extension/length. So stress × strain = (F × ΔL)/(A × L) = work done/volume.\n- Step 2: The area under a stress–strain curve has units Pa × (dimensionless) = Pa = J/m³ — energy per unit volume.\n- Step 3: Physically, this is the *elastic strain energy per unit volume* stored in the material at that strain. It's a measure of *toughness*: a tough material (like copper) has a large area under the curve before fracture; a brittle material (like glass) has a small one.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": true}, {"question": "Why is a brittle material like glass *strong* (high breaking stress) yet not *tough* (low energy absorbed before fracture)?", "answer": "- Step 1: Strength refers to the *maximum stress* the material can withstand — the y-axis value at fracture on a stress–strain graph.\n- Step 2: Toughness refers to the *area under the curve* up to fracture — the energy absorbed per unit volume before breaking.\n- Step 3: Glass has a high breaking stress (tall on the y-axis) but almost no plastic region (the curve goes nearly straight up and then snaps — narrow on the x-axis). So the area (toughness) is tiny. A small impact concentrates energy at a flaw and shatters it, even though the stress at fracture is high. Copper is opposite: lower breaking stress but huge plastic region → much tougher.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": true}, {"question": "A copper wire and a steel wire have identical diameters and lengths. The same load is hung from each. Which extends more, and what determines the ratio of extensions?", "answer": "- Step 1: From $$\\Delta L=FL/(AE)$$, when $$F$$, $$L$$, and $$A$$ are identical, extension is inversely proportional to Young modulus.\n- Step 2: Steel has $$E\\approx 200\\,\\mathrm{GPa}$$; copper has $$E\\approx 120\\,\\mathrm{GPa}$$. So copper has lower E → copper extends more.\n- Step 3: Ratio of extensions: $$\\Delta L_{Cu}/\\Delta L_{steel}=E_{steel}/E_{Cu}\\approx 200/120\\approx 1.7$$. Copper extends about 70% more than steel under the same load. This is a direct test of the geometry-free meaning of $$E$$ as a material property.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": true}, {"question": "A force of 160 N stretches a copper wire by 2.7 cm. Without doing the full arithmetic, roughly what's the stiffness in $$\\mathrm{N\\,m^{-1}}$$, and what order of magnitude should you expect for a stiff wire?", "answer": "- Step 1: $$k=F/x=160/0.027\\approx 160/0.03\\approx 5300\\,\\mathrm{N\\,m^{-1}}$$.\n- Step 2: For a stiff metal wire, $$k$$ in the thousands of $$\\mathrm{N\\,m^{-1}}$$ is reasonable — a soft lab spring is typically tens to hundreds, while a piano wire would be much higher.\n- Step 3: Sanity check: 160 N is roughly a 16 kg load, and the wire stretches only ~3 cm — that's a stiff wire. Order $$10^3\\,\\mathrm{N\\,m^{-1}}$$ fits.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "A plank supported at both ends sags 4 mm when a 55 kg child stands in the middle. Why must you convert mass to weight first before using $$k=F/x$$?", "answer": "- Step 1: Hooke's law links *force* (not mass) to extension. Force on the plank from the child equals the child's weight, not mass.\n- Step 2: Weight $$F=mg=55\\times 9.81\\approx 540\\,\\mathrm{N}$$.\n- Step 3: Then $$k=F/x=540/0.004\\approx 1.4\\times 10^5\\,\\mathrm{N\\,m^{-1}}$$. Skipping the $$g$$ factor and using $$k=55/0.004$$ would give a number ~10× too small — a common slip when the question mentions mass rather than weight.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": true}, {"question": "Why does a rubber band's force–extension graph have a peculiar shape: very easy to stretch at first, then suddenly stiff near the end?", "answer": "- Step 1: Rubber is a polymer — long, tangled molecular chains.\n- Step 2: For small forces, the molecules simply *untangle* — small force, big extension, because no strong bonds are being stretched.\n- Step 3: Once all the chains are aligned and fully extended, further stretching means stretching the *covalent bonds within the chains* — much stronger. Small extra extension requires huge extra force, so the graph turns sharply upward. This explains why rubber can stretch to several times its original length but then suddenly becomes very stiff just before breaking.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": true}, {"question": "Two identical springs of constant $$k=240\\,\\mathrm{N\\,m^{-1}}$$ and natural length 210 mm are joined in series and a 8 N weight is hung. Why does each individual spring extend by $$F/k$$ rather than by $$F/(2k)$$?", "answer": "- Step 1: In a series chain, the same force passes through every section — each spring individually feels the full 8 N pulling on it.\n- Step 2: Each spring's extension is therefore $$x=F/k=8/240\\approx 0.033\\,\\mathrm{m}$$, giving each spring a length of $$0.21+0.033=0.243\\,\\mathrm{m}$$.\n- Step 3: The *effective* spring constant of the pair is $$k/2=120\\,\\mathrm{N\\,m^{-1}}$$, but this gives the *total chain extension* ($$F/(k_{eff})=0.067\\,\\mathrm{m}$$), not each spring's individual length. Asking \"how long is each spring?\" vs. \"how long is the chain?\" requires different reasoning — and the question wording determines which is required.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": true}, {"question": "Why do we plot a *force–extension* graph (not a force–length graph) when analysing Hooke's law? (3 steps)", "answer": "- Step 1: Hooke's law is $$F=kx$$ where $$x$$ is the *extension from natural length*, not the total length.\n- Step 2: If you plot F against total length, the line doesn't pass through the origin — it crosses the length axis at the natural length, adding a constant offset and obscuring the proportional relationship.\n- Step 3: Subtracting the natural length to get extension shifts the graph so it passes through the origin, making the gradient ($$k$$) easy to identify and Hooke's law visually obvious. Always: extension = current length − natural (zero-force) length.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": true}, {"question": "A bridge cable of diameter 50 mm carries a tensile force of 4 kN. Roughly what's the order of magnitude of stress, and is this small or large for steel?", "answer": "- Step 1: Area: $$A=\\pi(0.025)^2\\approx \\pi\\times 6\\times 10^{-4}\\approx 2\\times 10^{-3}\\,\\mathrm{m^2}$$.\n- Step 2: Stress: $$\\sigma=F/A=4000/(2\\times 10^{-3})=2\\times 10^6\\,\\mathrm{Pa}=2\\,\\mathrm{MPa}$$.\n- Step 3: Steel's breaking stress is ~500 MPa. This stress is only ~0.4% of that — well within safe limits. Cables are deliberately oversized; engineers leave huge safety factors.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "A copper wire stretches by 3.2 mm out of an original 1.52 m. What strain is this, and could you find the stress without more information?", "answer": "- Step 1: Strain: $$\\varepsilon=\\Delta L/L=0.0032/1.52\\approx 2.1\\times 10^{-3}$$ — a small, dimensionless ratio.\n- Step 2: Stress = force/area. The problem gives neither force nor cross-sectional area, so stress can't be calculated directly.\n- Step 3: Alternative: if Young modulus were known, $$\\sigma=E\\varepsilon$$ would work. But $$E$$ isn't given either. The correct answer to the question \"calculate stress\" is: *can't be done with this data*. Recognising missing information is a real exam skill — don't force a formula.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "A 200 kg piano hangs from a single mild-steel wire (breaking stress 500 MPa). Why is the *minimum* diameter found from area, and what does \"minimum\" mean here? (3 steps)", "answer": "- Step 1: At the breaking stress, the wire is on the verge of snapping. To support the load *safely*, the actual stress must not exceed the breaking stress: $$\\sigma_{actual}\\le \\sigma_{break}$$.\n- Step 2: $$\\sigma_{actual}=F/A$$, so $$A\\ge F/\\sigma_{break}$$. Force from piano: $$F=mg\\approx 2000\\,\\mathrm{N}$$. So $$A\\ge 2000/(500\\times 10^6)=4\\times 10^{-6}\\,\\mathrm{m^2}$$.\n- Step 3: Minimum area gives minimum diameter via $$d=2\\sqrt{A/\\pi}\\approx 2\\,\\mathrm{mm}$$. \"Minimum\" because anything thinner snaps; anything thicker is safe (but heavier and costlier). Real engineering uses safety factors much larger than just the minimum.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "Why do you take repeated readings of a single measurement in a physics experiment, and what type of error does this address?", "answer": "- Step 1: Random errors arise
