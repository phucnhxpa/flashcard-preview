at first and then bends over. How do you find the elastic strain energy stored at extension $$x_0$$? (2 steps)", "answer": "- Step 1: Energy stored = work done = area under the graph from $$0$$ to $$x_0$$. Do *not* use $$\\tfrac{1}{2}Fx_0$$, which is only valid when the line is straight through the origin.\n- Step 2: For a curve, either:\n+ Approximate by trapezia (split the area into strips and add).\n+ Count squares under the curve and multiply by the energy per square ($$\\Delta F \\times \\Delta x$$ for each grid square).\n+ If the function is known analytically, integrate $$\\int_0^{x_0} F(x)\\, dx$$.\n\nThe \"$$\\tfrac{1}{2}Fx$$\" formula is a special-case shortcut for Hooke-region springs only.", "source": "Opus 4.7 ②", "_id": "opus_2_39"}, {"question": "Young's modulus combines stress and strain. Conceptually, what does $$E$$ tell you that the spring constant $$k$$ does *not*? (3 steps)", "answer": "- Step 1: Spring constant $$k$$ depends on the *object's geometry* — its length, its cross-section, its material. A long thin wire of steel and a short thick rod of steel have very different $$k$$ values.\n- Step 2: Young's modulus $$E = \\sigma/\\varepsilon$$ factors out the geometry: stress already divides force by area, and strain already divides extension by length. So $$E$$ depends only on the *material*.\n- Step 3: $$E$$ is a fundamental material property (like density). Steel always has $$E \\approx 2\\times10^{11}\\,\\mathrm{Pa}$$ regardless of shape; that lets engineers compare materials cleanly.\n\n$$k$$ is a sample-specific stiffness; $$E$$ is a material-specific stiffness.", "source": "Opus 4.7 ②", "_id": "opus_2_25"}, {"question": "Steel has $$E \\approx 2\\times 10^{11}\\,\\mathrm{Pa}$$; rubber has $$E \\sim 10^{7}$$–$$10^{8}\\,\\mathrm{Pa}$$. By what rough factor is steel stiffer than rubber, and what does that mean for similarly-sized samples under the same load?", "answer": "- Step 1: Ratio $$E_{\\text{steel}}/E_{\\text{rubber}} \\sim 10^{11}/10^{7} = 10^{4}$$ — steel is about ten thousand times stiffer.\n- Step 2: For samples of the same dimensions and the same load: $$\\Delta L \\propto 1/E$$. So a rubber rod stretches 10,000 times as much as a steel rod under the same force.\n- Step 3: Equivalently, to produce the *same* extension, you'd need 10,000 times more force on the steel — which is why steel is used for structural beams and rubber is used for shock-absorbers.\n\nThe four orders of magnitude in $$E$$ are what makes the two materials engineered for completely different roles.", "source": "Opus 4.7 ②", "_id": "opus_2_42"}, {"question": "A graph of F vs extension passes through the origin if Hooke's law holds. If the intercept is not at zero, what physical situation might explain it?", "answer": "- Step 1: A positive y-intercept (extension at F = 0) might mean a measurement offset — for example, the ruler's zero wasn't aligned with the spring's natural length.\n- Step 2: A negative y-intercept could indicate the spring was pre-tensioned at \"zero force\" (e.g. the spring was being held compressed first) or that a small initial load was applied before measurements started.\n- Step 3: Either way, the slope ($$k$$) is still correct; only the offset is contaminated. This is why graphs are robust to systematic offset errors — you should always extract physical constants from gradients, not single substitutions.", "source": "Opus 4.7 ①", "_id": "opus_1_39"}, {"question": "Searle's apparatus uses two wires (a \"control\" wire and a \"test\" wire). What's the role of the control wire? (3 steps)", "answer": "- Step 1: Both wires hang from the same support, in the same room, so they experience identical temperature changes and any sagging of the support.\n- Step 2: The extension measured (via the vernier scale and spirit level) is the *difference* in length between the test wire and the control wire. Common-mode effects — temperature-driven expansion of either wire, or the support flexing — cancel out.\n- Step 3: What remains is only the extra extension caused by the load on the test wire. So the control wire isolates the effect of the load from environmental noise.\n\nThis is a classic \"differential measurement\" technique — measure two similar things and subtract.", "source": "Opus 4.7 ②", "_id": "opus_2_45"}, {"question": "Why doesn't the engineer just use the *highest observed temperature* to set the pre-strain (so the rail is stress-free at the hottest day)?", "answer": "- Step 1: If the rail is unstressed at the hottest day, then on a cool day it contracts. Since it's fixed at both ends, contraction means tensile stress — and the colder it gets, the higher the tension.\n- Step 2: At the coldest expected temperature, tensile stress could exceed the breaking stress, snapping the rail.\n- Step 3: The engineer balances two failure modes: buckling from compression (too little pre-strain) versus snapping from tension (too much pre-strain). The pre-strain is chosen to keep stress within safe limits across the *full temperature range*, not optimised for the hot extreme alone.", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "Two materials have the same Young modulus but very different breaking stresses. What does this mean physically?", "answer": "- Step 1: Young modulus only describes behaviour in the *elastic* region — the initial slope of stress–strain.\n- Step 2: Two materials can start out equally stiff but diverge dramatically later: one might yield and stretch plastically before breaking, while the other snaps abruptly at a much lower stress.\n- Step 3: So $$E$$ tells you \"how hard to stretch a tiny bit\" but not \"when does it break\". Designers care about both: $$E$$ controls deflection under normal loads; breaking stress controls failure under extreme loads. Steel and aluminium have similar $$E$$/density ratios but very different breaking stresses and ductilities.", "source": "Opus 4.7 ①", "_id": "opus_1_46"}, {"question": "Why does the spring constant of a single spring tell you nothing definite about the spring constants of two of them in any combination, unless you know whether they're series or parallel?", "answer": "- Step 1: For two identical springs of constant $$k$$ in series, the effective stiffness is $$k/2$$ — half as stiff.\n- Step 2: For the same two in parallel, the effective stiffness is $$2k$$ — twice as stiff.\n- Step 3: That's a factor-of-4 difference between the two configurations, both made of the same components. Without specifying the arrangement, you can't predict the system's behaviour. This mirrors electrical circuits exactly: identical resistors give different totals in series vs parallel.", "source": "Opus 4.7 ①", "_id": "opus_1_40"}, {"question": "Why do scientists specify *temperature and pressure* when quoting the density of a gas, but not usually for a solid or liquid?", "answer": "- Step 1: Gases are highly compressible: raising the pressure squeezes molecules closer, increasing mass per unit volume. Heating expands them, decreasing density.\n- Step 2: Solids and liquids barely change volume with temperature or pressure — their molecules are already in contact, so density is essentially constant under lab conditions.\n- Step 3: For a gas, quoting \"density = 1.2 kg/m³\" is meaningless without conditions; this is why a balloon's air can be denser than free atmospheric air (it's compressed inside).", "source": "Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "Why is stress *not* the same physical thing as pressure, even though both have units of pascals?", "answer": "- Step 1: Both are defined as force per unit area, so they share units. But pressure is associated with fluids pushing on a surface from outside — it's isotropic (acts equally in all directions) and is a *contact* force quantity.\n- Step 2: Stress refers to the *internal* state of a solid — how much force per area is being transmitted through a cross-section of the material itself. Stress can be tensile (pulling apart), compressive (pushing together), or shear (sliding along), and is generally a tensor (direction-dependent).\n- Step 3: A pressurised gas exerts pressure on a container wall; the container wall material has internal stresses arising from that pressure. They're related but distinct concepts: one describes the agent (fluid), one describes the response (solid).\n\nSame units, different physical role.", "source": "Opus 4.7 ②", "_id": "opus_2_22"}, {"question": "The elastic strain energy stored in a spring obeying Hooke's law can be written as either $$\\frac{1}{2}Fx$$ or $$\\frac{1}{2}kx^2$$. Show that these are equivalent, and explain why the factor of $$\\frac{1}{2}$$ appears. (3 steps)", "answer": "- Step 1: The factor of $$\\frac{1}{2}$$ appears because the force increases from 0 to $$F$$ as the spring extends. The average force during this process is $$F/2$$, not $$F$$. Work done = average force × distance = $$(F/2) \\times x = \\frac{1}{2}Fx$$.\n- Step 2: Substitute $$F = kx$$ into $$\\frac{1}{2}Fx$$: $$\\frac{1}{2}(kx)(x) = \\frac{1}{2}kx^2$$.\n- Step 3: Geometrically, this is the area of a triangle on the force-extension graph (base = $$x$$, height = $$F$$, area = $$\\frac{1}{2} \\times \\text{base} \\times \\text{height}$$). The triangle exists because the relationship is linear and starts from the origin.\n\nThe $$\\frac{1}{2}$$ comes from the linear ramp-up of force. If force were constant (like a weight simply placed on a spring), the energy would be $$Fx$$, not $$\\frac{1}{2}Fx$$.", "source": "GLM 5.1 ②", "_id": "glm_2_36"}, {"question": "A student is asked to calculate the stress in a copper wire given only that it is 1.52 m long and stretches by 3.2 mm. Can the stress be calculated? If not, what information is missing? (2 steps)", "answer": "- Step 1: Stress requires $$\\sigma = F/A$$. The given data (original length and extension) only allow calculation of strain: $$\\varepsilon = \\Delta L / L = 0.0032/1.52 \\approx 0.0021$$. This is strain, not stress.\n- Step 2: To calculate stress, you would also need either (a) the force and the cross-sectional area, or (b) the Young modulus of copper (since $$\\sigma = E\\varepsilon$$). Without one of these, stress cannot be determined.\n\nThis was a trick question from the video. The key skill is recognising when information is insufficient, rather than forcing a formula.", "source": "GLM 5.1 ③", "_id": "glm_3_19"}, {"question": "A student is asked what safety precaution to take when doing a spring experiment. They answer \"wear gloves.\" What is the more important precaution they are missing, and why? (2 steps)", "answer": "- Step 1: The primary hazard in a spring experiment is the spring detaching and flying off, or the masses falling. Gloves do not protect against either of these.\n- Step 2: The most important precaution is **wearing safety glasses** (goggles), because a flying spring or wire could cause serious eye injury. A secondary precaution is ensuring masses cannot fall on feet (use a sand tray or keep feet clear).\n\nThink about the specific hazard, not just general lab safety. For spring/wire experiments, eye protection is paramount.", "source": "GLM 5.1 ③", "_id": "glm_3_45"}, {"question": "A spherical balloon of radius $$20\\,\\mathrm{cm}$$ contains $$50\\,\\mathrm{g}$$ of air. Walk through the conceptual steps to find its density without doing a full numerical computation. (4 steps)", "answer": "- Step 1: Identify the geometry — sphere — so volume formula triggered is $$V = \\frac{4}{3}\\pi r^3$$. The radius is given directly (not diameter), so no halving needed.\n- Step 2: Convert to SI: $$r = 0.20\\,\\mathrm{m}$$, $$m = 0.050\\,\\mathrm{kg}$$. The danger is cubing centimetres without realising; converting first avoids it.\n- Step 3: Apply $$\\rho = m/V$$. Order of magnitude: $$r^3 \\sim 10^{-2}$$, so $$V \\sim 10^{-2}\\,\\mathrm{m^3}$$. Then $$\\rho \\sim 0.05/0.03 \\sim 1.5\\,\\mathrm{kg\\,m^{-3}}$$.\n- Step 4: Compare with standard air ($$\\sim 1.2\\,\\mathrm{kg\\,m^{-3}}$$). It's slightly higher — physically reasonable because air inside a balloon is at higher pressure than atmospheric.\n\nThe whole calculation can be done in your head once you've isolated the conceptual move \"sphere → volume formula → density\".", "source": "Opus 4.7 ②", "_id": "opus_2_3"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "When converting a volume from $$\\text{cm}^3$$ to $$\\text{m}^3$$, a student simply multiplies by $$10^{-2}$$. Explain why this is wrong and state the correct conversion factor. (2 steps)", "answer": "- Step 1: A volume is derived from a length cubed. The conversion for length is $$1 \\text{ cm} = 10^{-2} \\text{ m}$$. When calculating volume, this conversion factor must be applied to all three spatial dimensions, so it must be cubed.\n- Step 2: The correct conversion is $$1 \\text{ cm}^3 = (10^{-2} \\text{ m})^3 = 10^{-6} \\text{ m}^3$$. Multiplying by $$10^{-2}$$ only converts one dimension, resulting in a volume that is 10,000 times too small.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "Define density and explain why a value in $$\\text{kg m}^{-3}$$ is 1000 times larger than the same material's density in $$\\text{g cm}^{-3}$$. (2 steps)", "answer": "- Step 1: Density ($$\\rho$$) is defined as mass per unit volume ($$\\rho = m/V$$).\n- Step 2: Converting from $$\\text{g cm}^{-3}$$ to $$\\text{kg m}^{-3}$$ involves changing the mass unit from grams to kilograms (dividing by $$10^3$$) and the volume unit from $$\\text{cm}^3$$ to $$\\text{m}^3$$ (dividing by $$10^{-6}$$, which is multiplying by $$10^6$$). The net effect is multiplying by $$10^6 / 10^3 = 10^3$$. Therefore, water has a density of $$1 \\text{ g cm}^{-3}$$ or $$1000 \\text{ kg m}^{-3}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "Describe the experimental method to measure the density of a regular solid (like a cube), naming the appropriate instruments for dimensions and mass, and stating one key step to reduce random error. (3 steps)", "answer": "- Step 1: Measure the dimensions (length, width, height) using a Vernier caliper or micrometer screw gauge (depending on size), and measure the mass using a digital mass balance.\n+ For a cube, use a caliper; for a small sphere or thin wire, use a micrometer.\n- Step 2: Calculate the volume using the appropriate geometric formula (e.g., $$V = l \\times w \\times h$$), ensuring all dimensions are converted to meters before calculation.\n- Step 3: To reduce the impact of random errors, take multiple readings for each dimension at different points on the object and calculate the average before calculating volume.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "How do you measure the volume of an irregular solid like a stone? Name the apparatus and the physical principle it relies on. (2 steps)", "answer": "- Step 1: Use a Eureka can (displacement can) filled with water and a measuring cylinder. Submerge the object and collect the displaced water in the cylinder.\n- Step 2: This relies on Archimedes' principle: the volume of water displaced by a fully submerged object is exactly equal to the volume of the object itself.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "To find the density of a liquid, why can't you just pour it into a measuring cylinder, read the volume, and then pour it onto a balance to measure mass? (2 steps)", "answer": "- Step 1: When you pour the liquid out of the measuring cylinder and onto the balance, a small film of liquid remains on the inside of the cylinder. This means the mass measured on the balance will be slightly less than the total mass of the liquid that occupied the volume.\n- Step 2: The correct method is to measure the mass of the *empty* cylinder, then add the liquid and measure the mass of the *full* cylinder, subtracting the two to find the true mass of the liquid corresponding to that volume.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "An alloy consists of 70% copper by volume and 30% zinc by volume. Explain why you *cannot* find the alloy's density by simply averaging the densities of copper and zinc, and outline how you *should* calculate it. (3 steps)", "answer": "- Step 1: Averaging densities is only valid if the mixture is exactly 50% by volume of each, or if you are averaging masses per unit volume in a very specific way. A simple average ignores the different physical volumes each mass occupies.\n- Step 2: Calculate the individual volumes of copper and zinc (e.g., $$V_{Cu} = 0.70 \\times V_{total}$$), then use their individual densities to find their individual masses ($$m = \\rho \\times V$$).\n- Step 3: Sum the masses to find the total mass, then divide the total mass by the total volume to find the alloy's density ($$\\rho_{alloy} = m_{total} / V_{total}$$).", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "When reading a micrometer screw gauge, what is the significance of the half-millimeter marks on the sleeve (main scale), and what common mistake do students make regarding them? (2 steps)", "answer": "- Step 1: The half-millimeter marks indicate that the spindle has moved an additional $$0.50 \\text{ mm}$$ past the last full millimeter mark. You must check if this mark is visible after the edge of the thimble.\n- Step 2: The common mistake is to ignore this mark and read only the full millimeter. For example, if the thimble edge is past $$7.5 \\text{ mm}$$, reading it as $$7 \\text{ mm}$$ plus the thimble value results in a reading that is $$0.5 \\text{ mm}$$ too small.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "A micrometer reads $$+0.02 \\text{ mm}$$ when the jaws are fully closed. If a student measures a wire and reads $$2.34 \\text{ mm}$$, what is the true diameter? Is this a random or systematic error? (2 steps)", "answer": "- Step 1: The true diameter is the observed reading minus the zero error: $$2.34 \\text{ mm} - 0.02 \\text{ mm} = 2.32 \\text{ mm}$$.\n- Step 2: This is a systematic error because it affects all measurements in the same direction (always making them $$0.02 \\text{ mm}$$ too large). It is not random because it is consistent and predictable.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "How do you determine the fractional part of a reading on a Vernier caliper? (2 steps)", "answer": "- Step 1: Look at the Vernier scale (the sliding scale) and find the single line that aligns perfectly with *any* line on the main scale. It does not have to be a specific line, just the one that best matches.\n- Step 2: Multiply that division number by the resolution of the Vernier scale (e.g., if the 6th line aligns and the resolution is $$0.05 \\text{ mm}$$, the fractional part is $$6 \\times 0.05 = 0.30 \\text{ mm}$$).", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "Using the analogy of arrows on a target, explain the difference between accuracy and precision. Which is affected by random errors, and which by systematic errors? (2 steps)", "answer": "- Step 1: Accuracy is hitting the bullseye (closeness to the true value); precision is having all arrows clustered tightly together (repeatability), even if they are far from the bullseye.\n- Step 2: Precision is reduced by random errors (scatter), while accuracy is reduced by systematic errors (a consistent offset, like a misaligned sight, pushing all arrows to one side).", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "A student measures the thickness of a single sheet of paper as $$0.10 \\text{ mm}$$ using a ruler with a resolution of $$1 \\text{ mm}$$. Explain why this is a bad method and how they should improve it to reduce the percentage uncertainty. (2 steps)", "answer": "- Step 1: The resolution of the ruler ($$1 \\text{ mm}$$) is larger than the quantity being measured ($$0.10 \\text{ mm}$$), leading to a massive percentage uncertainty (the reading could be anywhere from $$0$$ to $$1 \\text{ mm}$$).\n- Step 2: The student should measure the thickness of a stack of 50 or 100 sheets, then divide the total thickness by the number of sheets. This makes the measured value much larger, reducing the percentage uncertainty of the measurement.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "State Hooke's Law. A student defines it as \"the force required per unit area.\" Why is this definition wrong, and what concept is the student actually describing? (2 steps)", "answer": "- Step 1: Hooke's Law states that the extension of a spring is directly proportional to the applied force, provided the elastic limit is not exceeded ($$F = kx$$). It relates force to extension, not area.\n- Step 2: The student's definition of \"force per unit area\" describes **stress** ($$\\sigma = F/A$$), which is a different concept entirely. Confusing Hooke's Law with stress is a common misconception.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "What does the spring constant $$k$$ represent physically? If spring A has $$k = 200 \\text{ N m}^{-1}$$ and spring B has $$k = 50 \\text{ N m}^{-1}$$, which is stiffer? (2 steps)", "answer": "- Step 1: The spring constant represents the force required to produce a unit extension (stiffness). It is the gradient of the linear region on a force-extension graph.\n- Step 2: Spring A is stiffer. A higher $$k$$ means more force is needed to stretch the spring by one meter. Spring B extends much more easily for the same force.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "Distinguish between elastic deformation and plastic deformation. If a material is stretched beyond its elastic limit but not to its breaking point, what happens when the force is removed? (2 steps)", "answer": "- Step 1: Elastic deformation means the material returns to its original shape when the force is removed. Plastic deformation means the material suffers permanent, irreversible deformation.\n- Step 2: If stretched beyond the elastic limit, the material undergoes plastic deformation. When the force is removed, it will shorten, but it will *not* return to its original length; it will be permanently extended.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "On a force-extension graph, the line starts to curve slightly but the material still returns to its original length when unloaded. Is this point the limit of proportionality or the elastic limit? Explain the difference. (2 steps)", "answer": "- Step 1: The point where the line starts to curve is the **limit of proportionality**. Up to this point, force is directly proportional to extension (straight line). Beyond it, the material still behaves elastically (returns to original length) but the relationship is non-linear.\n- Step 2: The **elastic limit** occurs slightly later on the graph. This is the point beyond which the material no longer returns to its original length when the force is removed. Between the two points, deformation is elastic but non-proportional.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "Two identical springs, each with stiffness $$k$$, are connected end-to-end (in series). A force $$F$$ is applied. Compare the total extension to a single spring, and state the effective stiffness $$k_{eff}$$. (2 steps)", "answer": "- Step 1: The same force $$F$$ passes through both springs, so each extends by the same amount $$x = F/k$$. The total extension is $$x + x = 2x$$, which is double the extension of a single spring.\n- Step 2: Since the system extends twice as much for the same force, it is half as stiff. The effective stiffness is $$k_{eff} = k/2$$. This is analogous to resistors in parallel: $$1/k_{eff} = 1/k + 1/k$$.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "Two identical springs, each with stiffness $$k$$, are connected side-by-side (in parallel) supporting a mass. Compare the extension to a single spring, and state the effective stiffness $$k_{eff}$$. (2 steps)", "answer": "- Step 1: The load is shared equally between the two springs. Each spring only supports half the force, so each extends by only half as much as a single spring would under the full load. The overall extension is halved.\n- Step 2: Because the system extends half as much for the same force, it is twice as stiff. The effective stiffness is $$k_{eff} = 2k$$. This is analogous to resistors in series: $$k_{eff} = k + k$$.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "Derive the formula for elastic strain energy stored in a spring obeying Hooke's law, starting from the definition of work done and the force-extension graph. (3 steps)", "answer": "- Step 1: Work done is defined as $$W = F \\times \\text{distance}$$. For a spring, the force increases linearly from $$0$$ to $$F$$ as the extension increases from $$0$$ to $$x$$.\n- Step 2: The average force applied is $$(0 + F)/2 = F/2$$. Therefore, the work done (which is stored as elastic strain energy) is $$E = F_{avg} \\times x = \\frac{1}{2} F x$$. This is the area of the triangle under the force-extension graph.\n- Step 3: Since Hooke's Law gives $$F = kx$$, we can substitute $$F$$ out to get $$E = \\frac{1}{2} (kx) x = \\frac{1}{2} k x^2$$.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "If a material does *not* obey Hooke's law, why can't you use $$E = \\frac{1}{2} k x^2$$ to find the strain energy? How should you find it instead? (2 steps)", "answer": "- Step 1: The formula $$E = \\frac{1}{2} k x^2$$ relies on the assumption that the force-extension graph is a perfect straight line (a triangle), so the average force is exactly half the maximum. For a non-linear material, the average force is *not* half the maximum.\n- Step 2: You must find the area under the force-extension curve directly. This can be done by counting squares on the graph paper or by estimating the area using geometric shapes (trapezoids, etc.).", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": true}, {"question": "Define tensile stress. A common mistake is calculating the cross-sectional area of a wire using $$A = \\pi d^2$$. Explain why this is wrong and state the correct formula. What is the effect on the calculated stress? (3 steps)", "answer": "- Step 1: Tensile stress is the force applied per unit cross-sectional area ($$\\sigma = F/A$$).\n- Step 2: The formula $$A = \\pi d^2$$ is wrong because it uses the diameter instead of the radius. The correct formula is $$A = \\pi r^2 = \\pi (d/2)^2 = \\pi d^2 / 4$$.\n- Step 3: Using $$\\pi d^2$$ gives an area that is 4 times too large. Since stress is inversely proportional to area, this mistake makes the calculated stress 4 times too small.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "Define tensile strain. Explain why strain has no units, and state why expressing strain as a percentage (e.g., $$0.25\\%$$) can be risky in Edexcel mark schemes. (2 steps)", "answer": "- Step 1: Tensile strain is the ratio of extension to original length ($$\\varepsilon = \\Delta L / L$$). It has no units because it is a ratio of two lengths (meters cancel out).\n- Step 2: Expressing strain as a percentage (multiplying by 100) is technically correct but risky because if a calculation requires you to use strain in a formula like $$E = \\sigma / \\varepsilon$$, you must use the decimal form (e.g., $$0.0025$$), not the percentage number ($$0.25$$). Mark schemes often expect the decimal form.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "Define Young's Modulus. Explain the difference between spring constant $$k$$ and Young's Modulus $$E$$—why is $$k$$ a property of an *object* while $$E$$ is a property of a *material*? (2 steps)", "answer": "- Step 1: Young's Modulus is defined as tensile stress divided by tensile strain ($$E = \\sigma / \\varepsilon$$). It measures the stiffness of a material.\n- Step 2: The spring constant $$k$$ depends on the dimensions of the object (a longer or thicker wire has a different $$k$$). Young's Modulus normalizes for dimensions by using stress (force/area) and strain (extension/length). Therefore, $$E$$ is a constant for the *material* itself (e.g., all steel has $$E \\approx 200 \\text{ GPa}$$), regardless of the shape or size of the sample.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "Rearrange the Young's Modulus formula to solve for extension $$\\Delta L$$. A steel cable of length $$L$$ and diameter $$d$$ supports a load $$F$$. If the diameter is halved, what happens to the extension, assuming $$E$$ remains constant? (3 steps)", "answer": "- Step 1: Start with $$E = FL / (A \\Delta L)$$. Rearrange to make $$\\Delta L$$ the subject: $$\\Delta L = FL / (AE)$$.\n- Step 2: The cross-sectional area is $$A = \\pi d^2 / 4$$. Substitute this into the extension formula: $$\\Delta L = 4FL / (\\pi d^2 E)$$.\n- Step 3: The extension is inversely proportional to $$d^2$$. If the diameter is halved, the area is reduced by a factor of 4. Therefore, the extension increases by a factor of 4.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "On a stress-strain graph for a metal, what physical quantity is represented by:\n(a) the gradient of the linear region?\n(b) the area under the graph up to the breaking point? (2 steps)", "answer": "- Step 1: (a) The gradient of the linear region is the Young's Modulus ($$E$$), because the y-axis is stress and the x-axis is strain, and $$E = \\sigma / \\varepsilon$$.\n- Step 2: (b) The area under the graph represents the **energy density** (energy per unit volume) absorbed by the material up to that point. This is a measure of the material's toughness.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "On a stress-strain graph, the Ultimate Tensile Strength (UTS) occurs *before* the breaking point. Explain why the stress appears to decrease between the UTS and the fracture point. (2 steps)", "answer": "- Step 1: After the UTS, the material begins to \"neck\"—a small region of the wire becomes significantly thinner than the rest.\n- Step 2: Stress is force divided by area. Although the force might still be increasing slightly, the cross-sectional area at the neck decreases much faster. Because the area drops so rapidly, the calculated stress (based on the *original* cross-sectional area in a standard graph) appears to decrease, leading to the curve dropping before the fracture point.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": true}, {"question": "When a rubber band is stretched and then unloaded, the unloading curve lies below the loading curve on a force-extension graph. What is this phenomenon called, and what does the area between the two curves represent? (2 steps)", "answer": "- Step 1: This phenomenon is called **hysteresis**. The loading and unloading paths are different.\n- Step 2: The area between the two curves represents the energy per unit volume transferred to internal energy (heat) during the load-unload cycle. Not all mechanical work put in is returned as mechanical work; some is lost as heat.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "In the Searle's Apparatus experiment to determine Young's Modulus, why is a *control* wire used alongside the test wire? (2 steps)", "answer": "- Step 1: The control wire compensates for changes in length due to temperature fluctuations and any yielding (bending) of the support beam.\n- Step 2: By attaching a spirit level between the test wire and the control wire, any extension of the support or thermal expansion affects both wires equally. The only relative movement measured is the extension of the test wire due to the added load, ensuring a much more accurate measurement.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "A cube has sides of $$2 \\text{ cm}$$ and a mass of $$16 \\text{ g}$$. What is its density in $$\\text{kg m}^{-3}$$? (3 steps)", "answer": "- Step 1: Calculate the volume in $$\\text{cm}^3$$: $$V = 2 \\times 2 \\times 2 = 8 \\text{ cm}^3$$.\n- Step 2: Convert volume to $$\\text{m}^3$$: $$8 \\text{ cm}^3 = 8 \\times 10^{-6} \\text{ m}^3$$. Convert mass to kg: $$16 \\text{ g} = 0.016 \\text{ kg}$$.\n- Step 3: Calculate density: $$\\rho = m/V = 0.016 / (8 \\times 10^{-6}) = 2000 \\text{ kg m}^{-3}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "A spring extends by $$4 \\text{ cm}$$ under a $$2 \\text{ N}$$ load. What is the spring constant $$k$$ in $$\\text{N m}^{-1}$$? (2 steps)", "answer": "- Step 1: Convert extension to meters: $$4 \\text{ cm} = 0.04 \\text{ m}$$.\n- Step 2: Use Hooke's Law: $$k = F/x = 2 / 0.04 = 50 \\text{ N m}^{-1}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "A wire of length $$2 \\text{ m}$$ stretches by $$1 \\text{ mm}$$ under a load. What is the strain? (2 steps)", "answer": "- Step 1: Convert extension to meters: $$1 \\text{ mm} = 0.001 \\text{ m}$$.\n- Step 2: Calculate strain: $$\\varepsilon = \\Delta L / L = 0.001 / 2 = 0.0005$$. (Do not express as a percentage).", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "If you mix equal masses of two liquids with densities $$\\rho_1$$ and $$\\rho_2$$, is the final density simply their average $$(\\rho_1 + \\rho_2)/2$$? Explain why or why not. (2 steps)", "answer": "- Step 1: No, the final density is not the simple average. Density is mass divided by volume. When you mix equal masses, the total mass is $$2m$$, but the total volume is $$m/\\rho_1 + m/\\rho_2$$.\n- Step 2: The final density is $$\\rho_{mix} = 2m / (m/\\rho_1 + m/\\rho_2) = 2 / (1/\\rho_1 + 1/\\rho_2)$$. This is the harmonic mean, not the arithmetic mean, and it will always be lower than the simple average unless the densities are identical.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": true}, {"question": "Two springs in series support a $$10 \\text{ N}$$ weight. Does each spring bear $$5 \\text{ N}$$ of the force, or $$10 \\text{ N}$$? Explain using the concept of tension. (2 steps)", "answer": "- Step 1: Each spring bears the full $$10 \\text{ N}$$ force.\n- Step 2: In a series arrangement, the tension throughout the entire system must be equal to the load at the bottom. The top spring pulls the bottom spring with $$10 \\text{ N}$$, and the bottom spring pulls the weight with $$10 \\text{ N}$$. If they only held $$5 \\text{ N}$$, the system would not be in equilibrium.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": false}, {"question": "When measuring the diameter of a wire to calculate cross-sectional area for a Young's Modulus experiment, why must you take measurements at several different points and orientations along the wire? (2 steps)", "answer": "- Step 1: The wire may not be perfectly circular (it could be slightly elliptical) and its thickness may vary slightly along its length.\n- Step 2: Taking multiple readings at different points and orientations and then calculating the mean diameter reduces the impact of these random variations and gives a more representative value for the cross-sectional area, which is crucial because area is squared in the formula.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "Steel rails are often \"pre-strained\" (stretched) before being fixed in place. Explain the physical reason for this, relating it to thermal expansion in hot weather. (2 steps)", "answer": "- Step 1: In hot weather, the rails expand. If they were laid unstretched and fixed tightly, this expansion would cause compressive stress, which could make the rails buckle and deform.\n- Step 2: By pre-straining the rails (stretching them while cold), they are under tension. When they heat up and expand, the expansion simply relieves some of this tension rather than causing compression, preventing buckling.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": false}, {"question": "Starting from the elastic strain energy $$E = \\frac{1}{2} F \\Delta L$$, derive the expression for energy density (energy per unit volume) for a material obeying Hooke's law, showing that it equals $$\\frac{1}{2} \\sigma \\varepsilon$$. (3 steps)", "answer": "- Step 1: Energy density is energy per unit volume. Volume is $$V = A \\times L$$, so divide the energy equation by volume: $$\\text{Energy Density} = \\frac{1}{2} \\frac{F \\Delta L}{A L}$$.\n- Step 2: Rearrange the terms to group force/area and extension/length: $$\\text{Energy Density} = \\frac{1}{2} \\left( \\frac{F}{A} \\right) \\left( \\frac{\\Delta L}{L} \\right)$$.\n- Step 3: Recognize that $$F/A$$ is stress ($$\\sigma$$) and $$\\Delta L / L$$ is strain ($$\\varepsilon$$). Therefore, Energy Density = $$\\frac{1}{2} \\sigma \\varepsilon$$.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": true}], "count": 35}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "On a micrometer screw gauge, the sleeve (main scale) shows marks every 1 mm and half-marks every 0.5 mm. The thimble has 50 divisions. If the last full millimetre visible on the sleeve is 7, and the 0.5 mm mark after it is NOT visible, and the thimble reads 23, what is the total reading and why must you check the 0.5 mm mark at all? (3 steps)", "answer": "- Step 1: Read the main scale. The last full millimetre visible is 7 mm. The 0.5 mm mark after it is NOT visible, so the main scale contribution is exactly $$7.00\\,\\text{mm}$$ — you do not add 0.5 mm.\n- Step 2: Read the thimble scale. 23 divisions × resolution of $$0.01\\,\\text{mm}$$ per division = $$0.23\\,\\text{mm}$$.\n- Step 3: Sum them. Total = $$7.00 + 0.23 = 7.23\\,\\text{mm}$$. The 0.5 mm mark is the single most common trap: if you miss that it is visible, you under-read by 0.5 mm; if you imagine it when it is hidden, you over-read by 0.5 mm. Always check whether the thimble edge has passed the half-millimetre line.\n\nThe 0.5 mm check is where most micrometer errors live.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "A Vernier caliper has a main scale in millimetres and a Vernier scale with 20 divisions. What is the resolution of this instrument, and how do you identify which Vernier division to use for the decimal part of the reading? (2 steps)", "answer": "- Step 1: The resolution is $$1\\,\\text{mm} \\div 20 = 0.05\\,\\text{mm}$$. Each Vernier division represents 0.05 mm.\n- Step 2: Scan the Vernier scale for the single line that aligns perfectly with *any* line on the main scale. It does not need to be a particular numbered line — it can be *any* aligning pair. Multiply the division number by 0.05 mm to get the decimal contribution.\n\nThe key verb: \"aligns perfectly\" — not \"closest to\", not \"looks like\".", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "When a micrometer's jaws are fully closed, the thimble reads 0.03 mm instead of zero. Classify this zero error as positive or negative, state the correction rule, and give the actual reading when the observed reading is 5.47 mm. (3 steps)", "answer": "- Step 1: When closed, the instrument reads 0.03 mm instead of 0. This means it reads *above* zero, so it is a **positive zero error** of $$+0.03\\,\\text{mm}$$.\n- Step 2: The correction rule is: Actual Reading = Observed Reading − Zero Error.\n- Step 3: Actual = $$5.47 - 0.03 = 5.44\\,\\text{mm}$$.\n\nPositive zero error → subtract; negative zero error → add. The mnemonic: the correction always pushes the reading back toward what it *should* have been.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": true}, {"question": "When a Vernier caliper's jaws are fully closed, the Vernier zero mark sits to the *left* of the main scale zero. Is this a positive or negative zero error, and how do you correct for it? (2 steps)", "answer": "- Step 1: The Vernier zero is to the *left* of the main scale zero, meaning the instrument reads *below* zero when it should read zero. This is a **negative zero error**.\n- Step 2: To correct, you *add* the magnitude of the zero error. If the error is $$-0.05\\,\\text{mm}$$, the actual reading = observed reading $$- (-0.05)$$ = observed reading $$+ 0.05\\,\\text{mm}$$.\n\nLeft of zero → negative error → add the magnitude. Right of zero → positive error → subtract the magnitude.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "A question states: \"A bottle contains 1 litre of liquid. The mass of the liquid is 0.915 kg.\" What is the key unit conversion needed before calculating density, and why is it dangerous to simply write $$V = 1$$? (2 steps)", "answer": "- Step 1: The SI unit of volume for density calculations is $$\\text{m}^3$$, not litres. Using the given conversion $$1000\\,\\text{L} = 1\\,\\text{m}^3$$, we get $$V = 1\\,\\text{L} = 1 \\times 10^{-3}\\,\\text{m}^3$$.\n- Step 2: If you substitute $$V = 1$$ (without units) into $$\\rho = m/V$$, you get $$\\rho = 0.915 / 1 = 0.915\\,\\text{kg}\\,\\text{m}^{-3}$$, which is off by a factor of 1000. The correct density is $$0.915 / (1 \\times 10^{-3}) = 915\\,\\text{kg}\\,\\text{m}^{-3}$$.\n\nLitres look deceptively close to \"1\" — always convert to $$\\text{m}^3$$ before substituting.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "Explain why $$1\\,\\text{g}\\,\\text{cm}^{-3} = 1000\\,\\text{kg}\\,\\text{m}^{-3}$$. Walk through the conversion of both the mass unit and the volume unit separately. (3 steps)", "answer": "- Step 1: Convert the mass: $$1\\,\\text{g} = 1 \\times 10^{-3}\\,\\text{kg}$$.\n- Step 2: Convert the volume: $$1\\,\\text{cm}^3 = (10^{-2}\\,\\text{m})^3 = 10^{-6}\\,\\text{m}^3$$. The exponent applies to the *whole length conversion* — this is the most common error: students write $$10^{-2}\\,\\text{m}^3$$ instead of $$10^{-6}\\,\\text{m}^3$$.\n- Step 3: Combine: $$1\\,\\text{g}\\,\\text{cm}^{-3} = \\frac{1 \\times 10^{-3}\\,\\text{kg}}{10^{-6}\\,\\text{m}^3} = \\frac{10^{-3}}{10^{-6}}\\,\\text{kg}\\,\\text{m}^{-3} = 10^{3}\\,\\text{kg}\\,\\text{m}^{-3} = 1000\\,\\text{kg}\\,\\text{m}^{-3}$$.\n\nThe cubic conversion is where the factor of 1000 comes from. If you forget to cube the $$10^{-2}$$, you lose three orders of magnitude.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "A spherical balloon has radius 20 cm and contains 50 g of air. What two unit conversions must be done before substituting into $$\\rho = m/V$$, and what is the intermediate volume formula that makes this a two-step problem? (2 steps)", "answer": "- Step 1: Convert both inputs to SI: $$r = 20\\,\\text{cm} = 0.20\\,\\text{m}$$ and $$m = 50\\,\\text{g} = 0.050\\,\\text{kg}$$. If you forget either, your answer is off by a factor of 100 or 1000.\n- Step 2: The volume is not given directly — it must be calculated from the sphere formula $$V = \\frac{4}{3}\\pi r^3$$. This is the \"intermediate quantity\" step. After finding $$V$$, you substitute into $$\\rho = m/V$$.\n\nDensity questions for spheres are almost always two-step: first find $$V$$, then find $$\\rho$$. The trigger phrase is \"spherical\" → sphere volume.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "A balloon's calculated air density is 1.49 kg m⁻³, but the textbook value for air at standard conditions is about 1.2 kg m⁻³. Give a physical reason for this difference, and explain why temperature alone is not the best answer. (2 steps)", "answer": "- Step 1: A balloon is inflated *above* atmospheric pressure. Higher pressure means more air molecules are forced into the same volume, increasing the density. This is the primary reason.\n- Step 2: Temperature *could* play a role (cooler air is denser), but for a typical inflated balloon the pressure increase is the dominant factor. If you only mention temperature, you miss the fact that the balloon membrane is actively compressing the air inside.\n\nThe exam-acceptable answer is \"the air is at a pressure higher than atmospheric pressure.\" Temperature is a secondary effect.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "Brass is 70% copper by volume and 30% zinc by volume. A rod of brass has total volume $$0.80 \\times 10^{-3}\\,\\text{m}^3$$. Explain why you cannot simply average the two densities ($$\\rho_{\\text{Cu}}$$ and $$\\rho_{\\text{Zn}}$$) to get the density of brass, and describe the correct two-step method. (3 steps)", "answer": "- Step 1: Averaging densities directly assumes equal volumes, but here copper occupies 70% of the volume and zinc only 30%. A straight average would give them equal weight, which is wrong.\n- Step 2: The correct method is: (a) find the volume of each component ($$V_{\\text{Cu}} = 0.70 \\times V_{\\text{total}}$$, $$V_{\\text{Zn}} = 0.30 \\times V_{\\text{total}}$$); (b) find the mass of each ($$m = \\rho V$$ for each); (c) sum the masses to get $$m_{\\text{total}}$$.\n- Step 3: Then $$\\rho_{\\text{brass}} = m_{\\text{total}} / V_{\\text{total}}$$. This is a *weighted* average by volume, not a simple average.\n\nOnly average densities blindly if the problem explicitly states equal volumes — otherwise, always go through mass.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "When measuring the density of an irregular solid using a Eureka can, why is it important to (a) measure the mass *before* submerging the object, and (b) wait until no more water drips from the spout before reading the volume? (2 steps)", "answer": "- Step 1: Measure mass first because after submersion the object is wet, and the adhering water adds extra mass, making the measured mass too high and the calculated density too high.\n- Step 2: Wait for all dripping to stop because the volume of displaced water collected in the measuring cylinder must equal the volume of the object. If you read too early, you underestimate the volume, and the calculated density is too high.\n\nBoth errors push density in the same (wrong) direction — a dangerous combination.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "When measuring the density of a liquid, why do you measure the mass of an empty measuring cylinder first and then the mass of the cylinder with liquid, rather than just pouring liquid onto a balance directly? (2 steps)", "answer": "- Step 1: The liquid must be held in a container, and the container has its own mass. You need the mass of the liquid alone: $$m_{\\text{liquid}} = m_{\\text{full}} - m_{\\text{empty}}$$.\n- Step 2: If you ignore the container mass, you overestimate the liquid mass, giving a density that is too high. The subtraction method isolates the liquid's mass precisely.\n\nThis is a classic \"systematic error if skipped\" scenario.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "For a wire of circular cross-section, a question gives diameter $$d = 2.3\\,\\text{mm}$$. Two students calculate area: Student A writes $$A = \\pi d^2$$ and Student B writes $$A = \\pi (d/2)^2$$. Which is correct, and by what factor does Student A's answer differ? (2 steps)", "answer": "- Step 1: Student B is correct. The cross-sectional area of a circle uses the radius: $$A = \\pi r^2 = \\pi (d/2)^2 = \\frac{\\pi d^2}{4}$$.\n- Step 2: Student A's formula gives $$\\pi d^2$$, which is 4 times too large (missing the factor of $$1/4$$ from halving before squaring). This means any stress calculated using Student A's area would be 4 times too small, and any extension would be 4 times too small.\n\nThe \"halve first, then square\" rule is the most dangerous trap in Young modulus questions.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "State Hooke's law precisely, including the condition under which it applies. Why is it wrong to say \"the extension is proportional to a constant\"? (2 steps)", "answer": "- Step 1: Hooke's law states: the *force* applied to a spring is directly proportional to its *extension*, provided the elastic limit is not exceeded. In symbols: $$F = kx$$, where $$k$$ is the spring constant.\n- Step 2: Saying \"extension is proportional to a constant\" is meaningless — a constant has nothing to be proportional *to*. The correct statement is that force and extension are proportional *to each other*, with $$k$$ as the constant of proportionality. This was Phuc's exact misconception in the video.\n\nProportionality is a relationship between two *variables*, not between a variable and a constant.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "A spring has natural length 300 mm. When a 5.0 N weight is hung on it, the stretched length becomes 385 mm. Explain the difference between \"length\" and \"extension\", and calculate the spring constant. (3 steps)", "answer": "- Step 1: Extension is the *change* in length, not the total length. $$\\Delta x = 385 - 300 = 85\\,\\text{mm} = 85 \\times 10^{-3}\\,\\text{m} = 0.085\\,\\text{m}$$.\n- Step 2: Using Hooke's law: $$k = F / \\Delta x = 5.0 / 0.085 \\approx 59\\,\\text{N}\\,\\text{m}^{-1}$$.\n- Step 3: A common mistake is to use the total length (385 mm) instead of the extension (85 mm) in the formula. This would give a much smaller $$k$$ and is physically wrong — Hooke's law relates force to the *change* from the natural length.\n\nExtension = stretched length − natural length. Never substitute total length into $$F = kx$$.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "Two identical springs, each with spring constant $$k$$, are connected end-to-end (in series) and a force $$F$$ is applied to the combination. Explain why the effective spring constant is $$k/2$$, using the physical reasoning about how force and extension distribute. (3 steps)", "answer": "- Step 1: In a series arrangement, the same force $$F$$ passes through *each* spring (there is no branching — the force is transmitted through the chain).\n- Step 2: Each spring extends by $$x = F/k$$. The total extension of the combination is $$x_{\\text{total}} = x_1 + x_2 = F/k + F/k = 2F/k$$.\n- Step 3: The effective spring constant satisfies $$F = k_{\\text{eff}} \\times x_{\\text{total}}$$, so $$k_{\\text{eff}} = F / x_{\\text{total}} = F / (2F/k) = k/2$$. More springs in series means more total extension for the same force → less stiff.\n\nSeries = same force, extensions add → effective stiffness decreases. This is analogous to resistors in *parallel*.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "Two identical springs, each with spring constant $$k$$, are connected side-by-side (in parallel) and a force $$F$$ is applied. Explain why the effective spring constant is $$2k$$, using the physical reasoning about force sharing. (3 steps)", "answer": "- Step 1: In a parallel arrangement, the total force $$F$$ is *shared* between the two springs. If they are identical, each carries $$F/2$$.\n- Step 2: Each spring extends by $$x = (F/2)/k = F/(2k)$$. Both springs extend by the same amount (they must — they are connected to the same bar).\n- Step 3: The effective spring constant satisfies $$F = k_{\\text{eff}} \\times x$$, so $$k_{\\text{eff}} = F/x = F / (F/2k) = 2k$$. More springs in parallel means each carries less force → less individual extension → stiffer overall.\n\nParallel = same extension, forces add → effective stiffness increases. This is analogous to resistors in *series*.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "A student has two identical springs with $$k = 240\\,\\text{N}\\,\\text{m}^{-1}$$ and natural length 210 mm. They are joined in series and a force of 8.0 N is applied. What is the length of *each individual spring*, and why is it wrong to add the total chain extension to just one spring? (3 steps)", "answer": "- Step 1: In series, each spring carries the full 8.0 N. The extension of each spring is $$x = F/k = 8.0/240 = 0.0333\\,\\text{m}$$.\n- Step 2: The length of each individual spring = natural length + its own extension = $$0.210 + 0.0333 = 0.243\\,\\text{m}$$.\n- Step 3: A common mistake is to use the effective series stiffness ($$k_{\\text{eff}} = 120\\,\\text{N}\\,\\text{m}^{-1}$$) to find the *total* extension ($$8.0/120 = 0.0667\\,\\text{m}$$) and then add this total to one spring's natural length. This gives $$0.210 + 0.0667 = 0.277\\,\\text{m}$$, which is wrong — it represents the total chain length, not the length of one spring.\n\nRead the question carefully: \"length of each spring\" ≠ \"total chain length.\"", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": true}, {"question": "On a force-extension graph for a spring, what does the gradient of the straight-line region represent, and what does the area under the straight-line region represent? Why can you NOT use $$\\frac{1}{2}kx^2$$ for the area if the graph has curved beyond the limit of proportionality? (3 steps)", "answer": "- Step 1: The gradient $$\\Delta F / \\Delta x$$ equals the spring constant $$k$$ (steeper = stiffer).\n- Step 2: The area under the force-extension graph equals the work done on the spring = elastic strain energy stored. For the straight-line region, this is a triangle: $$E = \\frac{1}{2}Fx = \\frac{1}{2}kx^2$$.\n- Step 3: The formula $$\\frac{1}{2}kx^2$$ is derived from $$F = kx$$ (a linear relationship). Beyond the limit of proportionality, $$F$$ is no longer equal to $$kx$$, so the formula breaks down. Instead, you must estimate the area under the *curve* (e.g., by counting squares).\n\n$$\\frac{1}{2}kx^2$$ is valid only in the Hooke's law region. Outside it, use area-under-graph methods.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "A force-extension graph for a spring shows data: at 0 N the extension is 0 cm, and at 7.0 N the extension is 1.7 cm. The graph is straight up to about 5.0 N then curves slightly. How do you calculate the spring constant, and what must you be careful about with units? (2 steps)", "answer": "- Step 1: Use the gradient of the *straight-line* portion only. If using the full range as an approximation: $$k = \\Delta F / \\Delta x = 7.0\\,\\text{N} / 1.7\\,\\text{cm}$$. But the extension must be in metres for SI units.\n- Step 2: Convert: $$1.7\\,\\text{cm} = 0.017\\,\\text{m}$$, so $$k = 7.0 / 0.017 \\approx 412\\,\\text{N}\\,\\text{m}^{-1}$$. If you forget to convert, you get $$4.1\\,\\text{N}\\,\\text{cm}^{-1}$$, which is not the standard SI unit and will lose marks.\n\nAlways check: is your gradient giving you $$\\text{N}\\,\\text{m}^{-1}$$ or $$\\text{N}\\,\\text{cm}^{-1}$$? Convert the extension to metres first.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "Define tensile stress and tensile strain. Explain why stress has the same units as pressure but is a different concept, and why strain has no units at all. (3 steps)", "answer": "- Step 1: Tensile stress $$\\sigma = F/A$$ — the force per unit cross-sectional area within a material. Units: pascal ($$\\text{Pa} = \\text{N}\\,\\text{m}^{-2}$$).\n- Step 2: Stress and pressure share the same formula and units, but pressure typically describes a fluid acting on a surface, while stress describes internal forces within a solid that resist deformation. Stress can also have shear components that pressure does not.\n- Step 3: Tensile strain $$\\varepsilon = \\Delta L / L$$ — the ratio of extension to original length. Since both numerator and denominator are lengths, the units cancel, making strain dimensionless. It is a pure ratio.\n\nSame units ≠ same concept. Stress is internal; pressure is external (usually fluid).", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "Young's modulus is defined as $$E = \\sigma / \\varepsilon$$. Derive the expanded form $$E = FL / (A\\Delta L)$$ from the definitions of stress and strain, and explain why $$E$$ is a property of the *material* while $$k$$ is a property of the *object*. (3 steps)", "answer": "- Step 1: Substitute the definitions: $$E = \\frac{F/A}{\\Delta L / L}$$.\n- Step 2: Simplify the compound fraction: $$E = \\frac{F}{A} \\times \\frac{L}{\\Delta L} = \\frac{FL}{A\\Delta L}$$.\n- Step 3: The spring constant $$k = F/\\Delta L$$ depends on the object's dimensions (a longer wire extends more for the same force; a thicker wire extends less). Young's modulus divides out these dimensional effects by including $$L$$ and $$A$$, so it depends only on the material itself. Two wires of different sizes but the same material have the same $$E$$ but different $$k$$.\n\n$$k$$ describes a specific object; $$E$$ describes a class of material.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": true}, {"question": "A crane has a steel cable of diameter 30 mm, original length 25 m, and Young modulus $$200 \\times 10^9\\,\\text{Pa}$$. It lifts a load of 20 kN. Without doing the full calculation, explain the sequence of steps and identify the most dangerous unit trap. (3 steps)", "answer": "- Step 1: Rearrange $$E = FL/(A\\Delta L)$$ to make $$\\Delta L$$ the subject: $$\\Delta L = FL/(AE)$$. Identify $$F = 20\\,000\\,\\text{N}$$, $$L = 25\\,\\text{m}$$, $$E = 200 \\times 10^9\\,\\text{Pa}$$.\n- Step 2: Calculate area from diameter: $$d = 30\\,\\text{mm} = 0.030\\,\\text{m}$$, so $$r = 0.015\\,\\text{m}$$, and $$A = \\pi r^2$$. The dangerous trap is using $$\\pi d^2$$ instead of $$\\pi(d/2)^2$$ — this gives an area 4 times too large.\n- Step 3: Substitute all values in SI units and solve. The extension will be very small (a few mm) because steel is extremely stiff ($$E \\sim 10^{11}\\,\\text{Pa}$$).\n\nThe diameter-to-area conversion is the #1 trap in every Young modulus question.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "A question gives: original length = 1.52 m, extension = 3.2 mm. It asks you to calculate the stress. Is this possible? Explain why not, and state what additional information is needed. (2 steps)", "answer": "- Step 1: You can calculate *strain*: $$\\varepsilon = \\Delta L / L = 0.0032 / 1.52 \\approx 0.0021$$. But stress requires $$\\sigma = F/A$$, and neither force nor cross-sectional area is given.\n- Step 2: Alternatively, stress could be found from $$\\sigma = E\\varepsilon$$, but Young's modulus is also not given. The question is missing necessary data. The lesson: before starting a calculation, check that you have (or can derive) every variable in the formula.\n\nThis was a trap question in the video — Phuc tried to calculate stress but couldn't. Recognising insufficient data is an exam skill.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "A rubber band has original length 8.4 cm and is stretched until its strain is 2.45. Calculate the new length. Why might a strain value greater than 1 seem surprising at first, and why is it physically possible for rubber? (3 steps)", "answer": "- Step 1: Extension = strain × original length = $$2.45 \\times 8.4\\,\\text{cm} = 20.58\\,\\text{cm}$$.\n- Step 2: New length = original + extension = $$8.4 + 20.58 = 29.0\\,\\text{cm}$$.\n- Step 3: A strain greater than 1 means the extension exceeds the original length — the object has more than doubled in length. This seems surprising for metals (which typically strain by less than 1% elastically), but rubber is a polymer with tangled long-chain molecules that can uncoil to several times their original length before the chains themselves are stretched.\n\nRubber can have strains of 3–7; metals typically fail at strains below 0.5.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "On a stress-strain graph for a metal, identify the following points/regions: (a) the gradient of the initial straight line, (b) the limit of proportionality, (c) the elastic limit, (d) the yield point, and (e) the ultimate tensile strength (UTS). Which two points are commonly confused, and what is the subtle difference? (3 steps)", "answer": "- Step 1: (a) The gradient of the straight-line region equals the Young modulus $$E$$. (b) The limit of proportionality is where the graph stops being a straight line — Hooke's law no longer applies. (c) The elastic limit is the maximum stress after which the material will not fully return to its original length. (d) The yield point is where the material starts to deform plastically with little or no increase in stress. (e) UTS is the maximum stress on the graph before fracture.\n- Step 2: The limit of proportionality and the elastic limit are commonly confused. They are close but not identical. Between them, the material still behaves elastically (returns to original shape) but the relationship is no longer linear — the graph curves.\n- Step 3: The order on the strain axis is: limit of proportionality ≤ elastic limit < yield point < UTS < fracture.\n\nLimit of proportionality = end of linearity; elastic limit = end of recoverability. Between them: elastic but non-linear.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "Explain the difference between elastic deformation and plastic deformation. What happens at the molecular level in each case? (2 steps)", "answer": "- Step 1: In **elastic deformation**, the atoms are displaced from their equilibrium positions but the bonds are only stretched/compressed, not broken. When the force is removed, the interatomic forces pull the atoms back to their original positions — the material recovers its shape completely.\n- Step 2: In **plastic deformation**, the applied stress is large enough that layers of atoms slide past each other. Bonds are broken and reformed in new positions. When the force is removed, there are no restoring forces to return the atoms to their original arrangement — the deformation is permanent.\n\nElastic = bonds stretched (reversible). Plastic = bonds broken and reformed (irreversible).", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": true}, {"question": "A steel rail is pre-strained to a strain of $$3.0 \\times 10^{-4}$$ when laid at 8°C. The thermal strain per kelvin rise is $$2.5 \\times 10^{-5}\\,\\text{K}^{-1}$$. At what temperature does the rail become unstressed, and why? (2 steps)", "answer": "- Step 1: The rail becomes unstressed when the thermal expansion exactly cancels the pre-strain. Temperature rise needed: $$\\Delta T = \\text{pre-strain} / (\\text{strain per K}) = (3.0 \\times 10^{-4}) / (2.5 \\times 10^{-5}) = 12\\,\\text{K}$$.\n- Step 2: Temperature = $$8°C + 12°C = 20°C$$. Below this temperature, the rail is in tension (it wants to contract but is held fixed). Above this temperature, it is in compression (it wants to expand but is held fixed).\n\nPre-straining is a real engineering technique — it prevents buckling in hot weather by ensuring the rail always has some tension at lower temperatures.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "An engineer decides not to use the highest observed temperature to determine the pre-strain for steel rails. Explain why using the highest temperature would be dangerous. (2 steps)", "answer": "- Step 1: If the rail is pre-strained to be unstressed at the highest temperature, then at any lower temperature the rail would be under very large tensile stress (it wants to contract but cannot).\n- Step 2: In extremely cold weather, this tensile stress could exceed the breaking stress of the steel, causing the rail to snap. The engineer must choose a pre-strain that balances the risk of buckling (compression in hot weather) against the risk of snapping (tension in cold weather).\n\nThe optimal pre-strain is a compromise — it prevents both buckling and snapping across the full temperature range.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "A brass pin has cross-sectional area $$0.30\\,\\text{cm}^2$$ and tensile strength (maximum stress before breaking) of $$190\\,\\text{MPa}$$. Calculate the maximum force it can withstand. What is the key unit conversion? (2 steps)", "answer": "- Step 1: Convert area: $$0.30\\,\\text{cm}^2 = 0.30 \\times 10^{-4}\\,\\text{m}^2 = 3.0 \\times 10^{-5}\\,\\text{m}^2$$. Note: you must convert $$\\text{cm}^2$$ to $$\\text{m}^2$$, not just cm to m. The factor is $$10^{-4}$$, not $$10^{-2}$$.\n- Step 2: $$F = \\sigma \\times A = (190 \\times 10^6\\,\\text{Pa}) \\times (0.30 \\times 10^{-4}\\,\\text{m}^2) = 5700\\,\\text{N} = 5.7\\,\\text{kN}$$.\n\nArea conversions are squared: $$1\\,\\text{cm}^2 = 10^{-4}\\,\\text{m}^2$$. This is a different trap from length conversions.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "You need a steel wire to support a 200 kg piano. Steel has breaking stress $$500\\,\\text{MPa}$$. Outline the logic to find the minimum wire diameter, without doing the full arithmetic. (3 steps)", "answer": "- Step 1: Convert mass to force: $$F = mg = 200 \\times 9.81 \\approx 1962\\,\\text{N}$$.\n- Step 2: Find the minimum area: $$A = F / \\sigma = 1962 / (500 \\times 10^6) \\approx 3.9 \\times 10^{-6}\\,\\text{m}^2$$.\n- Step 3: Convert area to diameter: $$A = \\pi(d/2)^2$$, so $$d = 2\\sqrt{A/\\pi}$$. The diameter will be on the order of 2 mm (very thin — which is why real piano suspension cables are much thicker for safety margin).\n\nThe sequence is: mass → force → area → diameter. Never skip the force step (mass ≠ force).", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "A bolt of length 5.0 cm and cross-sectional area $$0.25\\,\\text{cm}^2$$ must extend by no more than 0.02 mm when supporting a 90.0 kg mass. You need to find the minimum Young modulus. Why must you convert all quantities to SI before substituting into $$E = FL/(A\\Delta L)$$? (2 steps)", "answer": "- Step 1: The formula $$E = FL/(A\\Delta L)$$ requires consistent SI units: $$F$$ in newtons, $$L$$ in metres, $$A$$ in $$\\text{m}^2$$, and $$\\Delta L$$ in metres. Mixing units (e.g., $$L$$ in cm, $$\\Delta L$$ in mm) gives an answer that is off by powers of ten.\n- Step 2: Conversions needed: $$L = 0.050\\,\\text{m}$$, $$A = 0.25 \\times 10^{-4}\\,\\text{m}^2$$, $$\\Delta L = 0.02 \\times 10^{-3}\\,\\text{m}$$, $$F = 90.0 \\times 9.81 = 882.9\\,\\text{N}$$. Only after all conversions do you substitute.\n\nEvery quantity in this question is given in non-SI units — that is deliberate. Convert first, substitute second.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "In the Hooke's law spring experiment, the main safety precaution is wearing safety glasses, not gloves. Explain the specific hazard that makes goggles necessary, and name one other safety precaution. (2 steps)", "answer": "- Step 1: The primary hazard is the spring (or masses) detaching and flying upward into the experimenter's eyes. A spring under tension stores elastic strain energy, and if it slips off the support, that energy is released suddenly and the spring becomes a projectile. Safety glasses protect against this specific hazard.\n- Step 2: A second precaution is to avoid standing directly beneath the masses (in case they fall), or to place a sand tray / foam pad beneath the masses to cushion any fall.\n\nGloves protect hands but do nothing for the most dangerous hazard — eye injury from a snapping spring.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "In Searle's apparatus for determining Young's modulus, there are *two* wires: a test wire and a control wire. What is the specific purpose of the control wire, and what errors does it eliminate? (2 steps)", "answer": "- Step 1: The control wire compensates for any yielding (bending or stretching) of the support beam and for thermal expansion/contraction of the wires due to temperature changes during the experiment.\n- Step 2: Without the control wire, if the support beam sags slightly or the wire expands due to heating, the measured extension would include these effects, introducing a systematic error. The control wire experiences the same environmental conditions, so measuring the *difference* between the two wires' positions isolates the extension due solely to the applied load.\n\nThe control wire turns a potential systematic error into a differential measurement that cancels it out.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "When measuring the diameter of a wire for a Young's modulus experiment, you should take multiple readings at different points along the wire and in different orientations. Explain why both of these practices are necessary. (2 steps)", "answer": "- Step 1: Different points along the wire: the wire may not have a perfectly uniform cross-section — some sections may be slightly thicker or thinner due to manufacturing. Averaging over several points gives a more representative mean diameter.\n- Step 2: Different orientations (rotating the wire): the wire's cross-section may not be perfectly circular — it could be slightly elliptical. Measuring in different orientations and averaging captures this and reduces the systematic error from assuming a perfect circle.\n\nBoth practices reduce random variation and catch non-uniformity that a single measurement would miss.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": true}, {"question": "A student measures one sheet of paper with a ruler and gets a thickness of 0.10 mm. They then measure 100 sheets and get 10.2 mm, giving 0.102 mm per sheet. Explain why the second method gives lower percentage uncertainty. (2 steps)", "answer": "- Step 1: The absolute uncertainty of the ruler is approximately $$\\pm 0.5\\,\\text{mm}$$ (half the smallest division). For one sheet: percentage uncertainty = $$0.5/0.10 \\times 100\\% = 500\\%$$ — essentially useless.\n- Step 2: For 100 sheets: percentage uncertainty = $$0.5/10.2 \\times 100\\% \\approx 5\\%$$. The per-sheet uncertainty is then approximately $$5\\%$$ as well (since dividing by 100 doesn't change the percentage). By measuring a larger total, the same absolute uncertainty becomes a much smaller fraction.\n\nThis technique — measuring multiple items and dividing — is called \"scaling up\" and is a standard method for reducing percentage uncertainty.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": false}, {"question": "On a force-extension graph for a rubber band being loaded and then unloaded, the loading curve lies above the unloading curve, forming a loop. What does the area enclosed by this hysteresis loop represent, and why does the rubber become warm when repeatedly stretched? (2 steps)", "answer": "- Step 1: The area between the loading and unloading curves (the hysteresis loop) represents the energy per unit volume transferred to internal energy (heat) during each load-unload cycle. The work done *on* the rubber during loading exceeds the work done *by* the rubber during unloading.\n- Step 2: The \"missing\" energy — the difference — is dissipated as heat in the rubber's molecular structure as the polymer chains slide past each other and experience internal friction. This is why rubber bands become warm when stretched and relaxed repeatedly.\n\nThe hysteresis loop is a visual representation of energy dissipation. Larger loop = more energy lost as heat per cycle.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": true}, {"question": "The elastic strain energy stored in a spring obeying Hooke's law can be written as either $$\\frac{1}{2}Fx$$ or $$\\frac{1}{2}kx^2$$. Show that these are equivalent, and explain why the factor of $$\\frac{1}{2}$$ appears. (3 steps)", "answer": "- Step 1: The factor of $$\\frac{1}{2}$$ appears because the force increases from 0 to $$F$$ as the spring extends. The average force during this process is $$F/2$$, not $$F$$. Work done = average force × distance = $$(F/2) \\times x = \\frac{1}{2}Fx$$.\n- Step 2: Substitute $$F = kx$$ into $$\\frac{1}{2}Fx$$: $$\\frac{1}{2}(kx)(x) = \\frac{1}{2}kx^2$$.\n- Step 3: Geometrically, this is the area of a triangle on the force-extension graph (base = $$x$$, height = $$F$$, area = $$\\frac{1}{2} \\times \\text{base} \\times \\text{height}$$). The triangle exists because the relationship is linear and starts from the origin.\n\nThe $$\\frac{1}{2}$$ comes from the linear ramp-up of force. If force were constant (like a weight simply placed on a spring), the energy would be $$Fx$$, not $$\\frac{1}{2}Fx$$.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": true}, {"question": "A pre-strained steel rail has cross-sectional area $$7.5 \\times 10^{-3}\\,\\text{m}^2$$, Young modulus $$2.0 \\times 10^{11}\\,\\text{Pa}$$, and pre-strain $$3.0 \\times 10^{-4}$$. Calculate the tensile force required, then the elastic strain energy stored in a 45 m rail. (3 steps)", "answer": "- Step 1: Force: $$F = EA\\varepsilon = (2.0 \\times 10^{11})(7.5 \\times 10^{-3})(3.0 \\times 10^{-4}) = 45\\,000\\,\\text{N} = 45\\,\\text{kN}$$.\n- Step 2: Extension: $$\\Delta L = \\varepsilon \\times L = (3.0 \\times 10^{-4})(45) = 0.0135\\,\\text{m}$$.\n- Step 3: Elastic strain energy: $$E = \\frac{1}{2}F\\Delta L = \\frac{1}{2}(45\\,000)(0.0135) \\approx 304\\,\\text{J}$$. Note: you must use the *extension*, not the original length, in the energy formula.\n\nThe chain is: strain → force (using $$E$$ and $$A$$) → extension (using strain and $$L$$) → energy (using force and extension).", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": false}, {"question": "A student is asked to describe how to measure the density of a regular solid (e.g., a metal cube). They write: \"Measure the sides with a ruler and weigh it on a balance.\" What three improvements would an examiner expect to see for full marks at A-level? (3 steps)", "answer": "- Step 1: Specify the instrument with its resolution and range — e.g., \"Vernier caliper (resolution ±0.05 mm, range 0–150 mm)\" rather than just \"a ruler.\"\n- Step 2: Take multiple readings for each dimension at different positions and calculate the average, to reduce the effect of random errors and non-uniformity.\n- Step 3: Mention checking for zero error on the measuring instrument, and converting all measurements to SI units before calculating volume and density.\n\nA-level practical answers need: specific instruments with resolution, repeats/averages, and error awareness.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": false}, {"question": "When measuring the density of an irregular object using a Eureka can, two potential errors are: (a) air bubbles sticking to the object when submerged, and (b) water adhering to the spout instead of flowing into the measuring cylinder. For each, state whether the measured density would be too high or too low, and why. (2 steps)", "answer": "- Step 1: Air bubbles on the object displace extra water, so the measured volume is *larger* than the true volume. Since $$\\rho = m/V$$, a larger $$V$$ gives a *smaller* density — the measured density is too low.\n- Step 2: Water adhering to the spout means less water reaches the measuring cylinder, so the measured volume is *smaller* than the true volume. A smaller $$V$$ gives a *larger* density — the measured density is too high.\n\nAir bubbles → volume too large → density too low. Water loss → volume too small → density too high. They push in opposite directions.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": true}, {"question": "The specification uses the symbol $$\\Delta F = k\\Delta x$$ rather than $$F = kx$$. Explain why the $$\\Delta$$ notation is used, and what would go wrong if you confused total length with extension. (2 steps)", "answer": "- Step 1: The $$\\Delta$$ symbols emphasise that it is the *change* in force and the *change* in extension that are proportional. This is important because the spring might already be under some initial tension — the formula still applies to *additional* force and *additional* extension.\n- Step 2: If you confuse total length $$L$$ with extension $$\\Delta x$$ and write $$F = kL$$, you are saying the force depends on how long the spring is, not on how much it has stretched. A spring at its natural length with no force on it would give $$F = k \\times L_{\\text{natural}} \\neq 0$$, which is clearly wrong.\n\n$$\\Delta$$ means \"change in.\" Extension is always measured from the natural (unstretched) length.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": true}, {"question": "A horizontal plank is supported at each end. A 55 kg child stands on the centre and the centre moves down 4.0 mm. What must you do first before using $$k = F/x$$, and why is this a common oversight? (2 steps)", "answer": "- Step 1: Convert the mass to a force using $$F = mg = 55 \\times 9.81 \\approx 540\\,\\text{N}$$. The question gives *mass*, not force. Hooke's law requires *force*.\n- Step 2: This is a common oversight because in everyday language we say \"a 55 kg weight,\" blurring the distinction between mass and force. In physics, mass (kg) and force/weight (N) are different quantities. Using 55 directly as the force would give a spring constant that is ~10 times too small.\n\nMass → force: always multiply by $$g = 9.81\\,\\text{N}\\,\\text{kg}^{-1}$$. This applies whenever a question gives mass and asks about forces, stress, or extension.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": false}, {"question": "Explain why plotting a graph to determine Young's modulus (or spring constant) is more accurate than using a single pair of force-extension readings. (2 steps)", "answer": "- Step 1: A single reading is subject to random errors in both force and extension measurements. The gradient of a best-fit line through multiple points effectively averages out these random errors — individual outliers have limited influence.\n- Step 2: A graph also reveals systematic errors (e.g., a non-zero intercept suggests a zero error or an initial extension) and shows whether the material obeys Hooke's law across the range (the line should be straight and pass through the origin).\n\nA graph gives you: (1) averaging of random errors, (2) detection of systematic errors, and (3) verification of the linear model.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": true}, {"question": "The density of water is $$1000\\,\\text{kg}\\,\\text{m}^{-3}$$ and the density of mercury is $$13\\,600\\,\\text{kg}\\,\\text{m}^{-3}$$. Without calculation, rank these in order of density: air, ethanol, water, iron, mercury. Which is closest to $$1\\,\\text{kg}\\,\\text{m}^{-3}$$? (2 steps)", "answer": "- Step 1: Order from least to most dense: air (≈ 1.2 $$\\text{kg}\\,\\text{m}^{-3}$$) < ethanol (≈ 790 $$\\text{kg}\\,\\text{m}^{-3}$$) < water (1000 $$\\text{kg}\\,\\text{m}^{-3}$$) < iron (≈ 7800 $$\\text{kg}\\,\\text{m}^{-3}$$) < mercury (13 600 $$\\text{kg}\\,\\text{m}^{-3}$$).\n- Step 2: Air is closest to $$1\\,\\text{kg}\\,\\text{m}^{-3}$$. This is a useful sanity check: if you calculate the density of a gas and get something close to 1000, you've probably forgotten to convert units.\n\nSanity-check rule: gases ≈ 1, liquids ≈ 1000, metals ≈ 8000–20 000 $$\\text{kg}\\,\\text{m}^{-3}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": false}, {"question": "A 12 N weight hangs on a spring of natural length 5.0 cm and spring constant $$8500\\,\\text{N}\\,\\text{m}^{-1}$$. Calculate (a) the extension and (b) the new total length. Why must you add the extension to the natural length, rather than replacing it? (3 steps)", "answer": "- Step 1: Extension: $$\\Delta x = F/k = 12/8500 \\approx 1.41 \\times 10^{-3
