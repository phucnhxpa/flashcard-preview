 from unpredictable fluctuations: vibrations, slightly different reaction times, instrument noise. They scatter readings symmetrically around the true value.\n- Step 2: Taking many readings and averaging causes the random fluctuations to partially cancel — the mean approaches the true value as $$\\sqrt{N}$$ (statistical noise drops with more samples).\n- Step 3: *Systematic* errors (e.g. miscalibrated instrument, zero error) are *not* reduced by averaging — they shift every reading the same way. Those require a different fix: calibration, zero correction, or improved method.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "What's the role of plotting a graph in reducing the effect of measurement errors during a Young modulus or Hooke's law experiment?", "answer": "- Step 1: A single F/x pair has whatever uncertainty its individual readings carry. The graph plots many such points.\n- Step 2: A best-fit straight line through scattered points effectively *averages* all the data — random scatter above and below the line cancels.\n- Step 3: A systematic error (e.g. wrong zero) shifts all points by the same amount, but the *gradient* (which gives $$k$$ or $$E$$) is unaffected — only the intercept shifts. So the graph both reduces random error (via averaging) and reveals systematic error (via a non-zero intercept where one is expected).", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": true}, {"question": "A graph of F vs extension passes through the origin if Hooke's law holds. If the intercept is not at zero, what physical situation might explain it?", "answer": "- Step 1: A positive y-intercept (extension at F = 0) might mean a measurement offset — for example, the ruler's zero wasn't aligned with the spring's natural length.\n- Step 2: A negative y-intercept could indicate the spring was pre-tensioned at \"zero force\" (e.g. the spring was being held compressed first) or that a small initial load was applied before measurements started.\n- Step 3: Either way, the slope ($$k$$) is still correct; only the offset is contaminated. This is why graphs are robust to systematic offset errors — you should always extract physical constants from gradients, not single substitutions.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": true}, {"question": "Why does the spring constant of a single spring tell you nothing definite about the spring constants of two of them in any combination, unless you know whether they're series or parallel?", "answer": "- Step 1: For two identical springs of constant $$k$$ in series, the effective stiffness is $$k/2$$ — half as stiff.\n- Step 2: For the same two in parallel, the effective stiffness is $$2k$$ — twice as stiff.\n- Step 3: That's a factor-of-4 difference between the two configurations, both made of the same components. Without specifying the arrangement, you can't predict the system's behaviour. This mirrors electrical circuits exactly: identical resistors give different totals in series vs parallel.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": true}, {"question": "A bolt 5 cm long and area 0.25 cm² supports a 90 kg actor and must extend by no more than 0.02 mm. Why does the minimum Young modulus come out at ~88 GPa, and roughly what material would satisfy this? (3 steps)", "answer": "- Step 1: From $$E=FL/(A\\Delta L)$$:\n+ $$F=mg\\approx 900\\,\\mathrm{N}$$\n+ $$L=0.05\\,\\mathrm{m}$$\n+ $$A=0.25\\times 10^{-4}\\,\\mathrm{m^2}$$\n+ $$\\Delta L=0.02\\times 10^{-3}\\,\\mathrm{m}$$\nThe numerator is FL ~ 45; denominator is AΔL ~ $$5\\times 10^{-10}$$. Ratio ≈ $$9\\times 10^{10}\\,\\mathrm{Pa}=90\\,\\mathrm{GPa}$$.\n- Step 2: \"Minimum\" because if $$E$$ were any lower, the same load would cause more extension than the allowed 0.02 mm.\n- Step 3: 88 GPa lies between aluminium (~70 GPa) and copper (~120 GPa) — brass or a strong aluminium alloy would work; mild steel (~200 GPa) would be safely overkill.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "Why do we say upthrust = weight of fluid *displaced* (not weight of fluid *above* or *around* the object)?", "answer": "- Step 1: Upthrust is the net upward force from fluid pressure differences. Pressure increases with depth: $$p=h\\rho g$$.\n- Step 2: The bottom face of a submerged object is deeper than its top, so the bottom experiences higher pressure → larger upward force than the downward force on the top.\n- Step 3: Doing the geometry for any shape, the net upward force equals the weight of fluid that *would* occupy the object's volume — i.e., the displaced fluid. Archimedes' principle is a direct consequence of pressure varying with depth.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": true}, {"question": "Why is checking for *zero error* on a digital instrument just as important as on an analogue one, even though digital displays \"look more reliable\"?", "answer": "- Step 1: A digital display has high *resolution* (small smallest-readable change), but resolution and accuracy are not the same thing.\n- Step 2: Internal calibration can drift due to wear, manufacturing tolerances, temperature, or battery voltage. A digital balance might read 0.02 g with nothing on it — this systematic offset contaminates every measurement.\n- Step 3: Checking zero (no load, no contact) and either correcting in software or subtracting from every reading is essential. The polished appearance of digital instruments tricks people into assuming they're inherently accurate; they aren't.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": true}, {"question": "Why is measuring 10 sheets of paper and dividing by 10 better than measuring 1 sheet?", "answer": "- Step 1: A single sheet is, say, 0.1 mm thick. A ruler with 1 mm resolution gives ~1000% percentage uncertainty — useless.\n- Step 2: A stack of 10 sheets is ~1 mm thick. Same ruler now gives ~100% — still poor but already much better. A micrometer (0.01 mm) on 10 sheets gives ~1%.\n- Step 3: Dividing by 10 at the end reduces the *measured* value while preserving the *absolute* uncertainty of the instrument. The percentage uncertainty in the final per-sheet thickness equals the percentage uncertainty in the stack measurement, which has been driven down by making the measurement larger. *Trick: enlarge the quantity to shrink the percentage uncertainty*.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": true}, {"question": "Why is the area under a *stress–strain* curve called the \"elastic strain energy per unit volume\", and why is this preferable to the area under a force–extension curve when comparing materials? (3 steps)", "answer": "- Step 1: Force–extension area gives total energy (in joules) — but this depends on the *sample size*. A long, thick steel bar stores more energy than a short, thin one, even though both are made of identical steel.\n- Step 2: Dividing energy by sample volume gives energy density (J/m³). Mathematically, stress × strain = (F/A)(ΔL/L) = (F × ΔL)/(A × L) = work/volume.\n- Step 3: So area under stress–strain curve is a *material property*: it depends only on what the material is, not how much you have. This lets you fairly compare toughness across different sample sizes and shapes.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": true}, {"question": "Two materials have the same Young modulus but very different breaking stresses. What does this mean physically?", "answer": "- Step 1: Young modulus only describes behaviour in the *elastic* region — the initial slope of stress–strain.\n- Step 2: Two materials can start out equally stiff but diverge dramatically later: one might yield and stretch plastically before breaking, while the other snaps abruptly at a much lower stress.\n- Step 3: So $$E$$ tells you \"how hard to stretch a tiny bit\" but not \"when does it break\". Designers care about both: $$E$$ controls deflection under normal loads; breaking stress controls failure under extreme loads. Steel and aluminium have similar $$E$$/density ratios but very different breaking stresses and ductilities.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": true}, {"question": "Why must you wear safety goggles in a Hooke's law experiment, even with a \"soft\" lab spring?", "answer": "- Step 1: As loads increase, the spring stores increasing amounts of elastic potential energy ($$\\frac12 kx^2$$).\n- Step 2: If the spring exceeds its elastic limit and snaps, or if a weight slips, that energy releases suddenly as kinetic energy — turning the spring or weight into a projectile.\n- Step 3: Eyes are particularly vulnerable to small fast-moving objects. Goggles protect against snap-back of broken springs and pieces of wire. (A secondary safety measure: a sand tray under weights to cushion any falls.)", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": false}, {"question": "Why does a hot-air balloon rise when first inflated, and what changes when it reaches a stable altitude? (3 steps)", "answer": "- Step 1: Heating the air inside the balloon reduces its density (same mass, larger volume). The cooler, denser surrounding air provides an upthrust equal to the weight of displaced surrounding air.\n- Step 2: When upthrust > total weight (balloon fabric + hot air + payload), there's a net upward force → the balloon accelerates upward.\n- Step 3: As the balloon rises, surrounding air gets less dense (lower atmospheric pressure), reducing upthrust. The balloon reaches a *floating equilibrium* when upthrust just equals total weight. From there, it neither rises nor sinks (until further heating or cooling shifts the balance).", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": true}, {"question": "Why is \"stress\" sometimes called the \"inverse\" of pressure by students, and what's wrong with this thinking?", "answer": "- Step 1: This phrasing presumably comes from imagining pressure as \"pushing in\" on a solid and stress as \"pushing out\". But mathematically and dimensionally, they are the same quantity — force per unit area — with the same units (Pa).\n- Step 2: Tensile stress is a *pulling-apart* internal force per area in a stretched solid; compressive stress is a *pushing-together* internal force per area in a squeezed solid. Pressure (in fluids) is essentially compressive stress that acts in all directions.\n- Step 3: So stress is more general (it includes tensile, compressive, and shear varieties with directional information), but it is *not* the inverse of pressure — both are force/area. The corrected mental model: \"Stress is like pressure, but applied internally to solids with a definite direction\".", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": true}, {"question": "A 12 N weight hangs from a spring with $$k=8500\\,\\mathrm{N\\,m^{-1}}$$ and natural length 5 cm. Roughly how much does it extend, and why does the new total length differ only slightly from the natural length?", "answer": "- Step 1: Extension: $$x=F/k=12/8500\\approx 1.4\\times 10^{-3}\\,\\mathrm{m}=1.4\\,\\mathrm{mm}$$.\n- Step 2: New length: $$5.0+0.14=5.14\\,\\mathrm{cm}$$ — only 3% longer.\n- Step 3: The spring is very stiff ($$k$$ in the thousands), so a modest force (12 N is about a 1.2 kg load) barely moves it. Compare to a soft lab spring with $$k\\approx 50\\,\\mathrm{N\\,m^{-1}}$$: the same 12 N would extend it by 24 cm! Stiffness is everything — for stiff springs, extensions are tiny compared to natural length.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": false}, {"question": "Why does a digital micrometer read 0.01 mm, while a Vernier caliper typically reads 0.05 mm? What design feature gives each its resolution? (3 steps)", "answer": "- Step 1: A micrometer uses a fine-pitch screw thread (typically 0.5 mm per turn). The thimble around it has 50 divisions, so each division = 0.5/50 = 0.01 mm.\n- Step 2: A Vernier caliper uses an auxiliary scale that's slightly mismatched with the main scale. A 20-division Vernier scale spans 19 main-scale millimetres, so each Vernier division differs from a main-scale millimetre by 1/20 = 0.05 mm. The \"match\" between Vernier and main lines pinpoints the fractional reading.\n- Step 3: Micrometers achieve finer resolution because amplifying small motions through mechanical gearing (the thread) is more precise than visual interpolation between scale marks. Both are far better than a 1 mm ruler.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": true}, {"question": "What's the difference between *accuracy* and *precision*, and why can a measurement be precise but inaccurate?", "answer": "- Step 1: Accuracy is closeness to the *true value*. A measurement is accurate if it's near what it ought to be.\n- Step 2: Precision is repeatability — how closely repeated measurements *agree with each other*, regardless of whether they're correct.\n- Step 3: An archer who consistently hits the same wrong spot is precise but inaccurate (a systematic error). One who scatters hits widely around the bull is accurate on average but imprecise (random error). A good experiment aims for both: low scatter (precision) *and* the right value (accuracy). Improving averaging fixes precision; calibration fixes accuracy.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": true}, {"question": "A mild steel rail must be analysed for stress and strain. If you only have the rail's length, breadth, height, and load, but not its Young modulus, can you calculate stress? Can you calculate strain?", "answer": "- Step 1: Stress is force per cross-sectional area: $$\\sigma=F/A$$. You have force (the load × g) and area (from breadth × height). So stress is calculable.\n- Step 2: Strain is extension per length: $$\\varepsilon=\\Delta L/L$$. You have $$L$$ but not $$\\Delta L$$ unless it's also given.\n- Step 3: Without $$\\Delta L$$ or $$E$$ (to compute $$\\varepsilon=\\sigma/E$$), strain isn't calculable. The crucial lesson: identify which formulas need which inputs *before* trying to plug numbers. Many \"impossible\" problems become possible when you spot what additional measurement is needed.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": true}, {"question": "Why is the gradient of a stress–strain graph numerically equal to the Young modulus, while the gradient of a force–extension graph equals the spring constant $$k$$ (not $$E$$)? (3 steps)", "answer": "- Step 1: On a stress–strain graph, x-axis is $$\\varepsilon=\\Delta L/L$$ and y-axis is $$\\sigma=F/A$$. Slope = $$\\sigma/\\varepsilon=E$$ directly — the Young modulus.\n- Step 2: On a force–extension graph, x-axis is $$\\Delta L$$ and y-axis is $$F$$. Slope = $$F/\\Delta L=k$$ — the spring constant of this particular object.\n- Step 3: The two are related: $$k=EA/L$$. So $$k$$ depends on geometry (length and area), while $$E$$ doesn't. Two wires of the same steel but different sizes have different $$k$$'s but the same $$E$$. This is why physicists prefer stress–strain plots for material characterisation: the slope is universal for the material.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": true}, {"question": "Why does the *first reading* on a force–extension experiment, with zero load, sometimes show a small extension (not zero), and what does this tell you?", "answer": "- Step 1: A new spring or wire has small kinks, twists, or slack from manufacturing and handling. These take some force to straighten before genuine elastic stretching begins.\n- Step 2: Without an initial small load, the first measurement points lie below the \"true\" linear extrapolation — they bend in toward smaller extensions for small forces.\n- Step 3: A small \"pre-tension\" mass straightens these out before measurements start. Either approach is acceptable, but you should be aware that the initial bending of the F–x graph at low loads is a measurement artefact, not real spring behaviour. Always set the zero with a small reference load on.", "source": "Opus 4.7 ①", "_id": "opus_1_55", "judge_pick": false}, {"question": "Why is air density (~$$1\\,\\mathrm{kg\\,m^{-3}}$$) so much smaller than water density (~$$1000\\,\\mathrm{kg\\,m^{-3}}$$), even though both are made of small molecules of similar mass?", "answer": "- Step 1: In liquids, molecules are packed shoulder-to-shoulder, in continuous contact — molecular spacing is roughly the molecule size itself.\n- Step 2: In gases at atmospheric pressure, molecules are typically ~10 molecular diameters apart in each dimension — so a 1000-fold smaller density (since spacing cubed gives volume).\n- Step 3: Both have similar molecular *masses*, but the *volume* taken up per molecule is vastly different. Compressing a gas brings the molecules closer; once they touch, it becomes a liquid. The mass per unit volume ratio reflects how much empty space sits between molecules.", "source": "Opus 4.7 ①", "_id": "opus_1_56", "judge_pick": true}, {"question": "A copper wire has area 0.30 cm² and brass has tensile strength 190 MPa. Why is the maximum *force* the wire can withstand simply $$\\sigma \\times A$$, and what assumption are you making? (3 steps)", "answer": "- Step 1: Tensile strength = maximum stress before breaking. At the failure point, $$\\sigma_{max}=F_{max}/A$$.\n- Step 2: Rearranging: $$F_{max}=\\sigma_{max}\\times A=190\\times 10^6\\,\\mathrm{Pa}\\times 0.30\\times 10^{-4}\\,\\mathrm{m^2}\\approx 5700\\,\\mathrm{N}\\approx 5.7\\,\\mathrm{kN}$$.\n- Step 3: The assumption: the area $$A$$ refers to the *cross-sectional area in the direction of pulling*. For a wire, this is the round cross-section; for a beam under tension, the rectangular face. Mistakenly using the total surface area (e.g. for a square rod) gives nonsense. *Tensile* stress is force per cross-section, not per surface.", "source": "Opus 4.7 ①", "_id": "opus_1_57", "judge_pick": true}, {"question": "Estimate the mass of air in a 5 m × 4 m × 2.5 m room, using rough mental arithmetic. Why is this a good sanity-check exercise?", "answer": "- Step 1: Volume ≈ 50 m³. Air density ≈ 1.2 kg/m³.\n- Step 2: Mass ≈ 50 × 1.2 = 60 kg.\n- Step 3: That's about the mass of one person! This surprises most people — air seems weightless, but in any sizeable enclosed space it's actually substantial. The exercise builds intuition: density values can be plugged into volume-mass conversions and immediately tested against everyday intuition (does the answer make sense?). Order-of-magnitude estimates are a powerful tool for catching arithmetic errors.", "source": "Opus 4.7 ①", "_id": "opus_1_58", "judge_pick": true}, {"question": "Why does the maximum extension of a rubber band depend not on stiffness but on the *length of the polymer chains*?", "answer": "- Step 1: At low extension, the polymer chains in rubber are tangled. Small forces untangle them without stretching the strong C-C bonds.\n- Step 2: As extension increases, more chains align until fully extended. The total extension at this stage depends on how long the chains *are* — longer chains can extend further before becoming fully aligned.\n- Step 3: Once all chains are aligned, further stretching means breaking covalent bonds (stretching them strongly). The \"maximum extension\" of rubber thus reflects how much *slack* exists in the molecular structure, not how stiff each bond is. This is fundamentally different from a metal, where extension comes from stretching atomic bonds throughout.", "source": "Opus 4.7 ①", "_id": "opus_1_59", "judge_pick": true}, {"question": "Why is using ten readings of force–extension and plotting a graph generally better than computing $$k$$ from a single force–extension pair?", "answer": "- Step 1: A single pair has individual reading uncertainties from each of $$F$$ and $$x$$. Computing $$k=F/x$$ propagates both uncertainties into the result.\n- Step 2: With ten pairs plotted on a graph, the line of best fit averages out random scatter, and the gradient is a *consensus* value of $$k$$ — much more robust than any single pair.\n- Step 3: Additionally, the graph reveals patterns: is the line straight (Hooke's law)? Does it pass through the origin (no zero error)? Where does it deviate (limit of proportionality)? These diagnostic insights are invisible from a single calculation.", "source": "Opus 4.7 ①", "_id": "opus_1_60", "judge_pick": true}, {"question": "Identify which formula is needed: a question asks for *stress* given diameter, force, original length, and Young modulus. Is the Young modulus a red herring, and why?", "answer": "- Step 1: Stress = F/A. Force is given. Area: from diameter, $$A=\\pi(d/2)^2$$.\n- Step 2: That's enough. Stress is directly $$F/(\\pi d^2/4)$$. Original length and Young modulus don't enter.\n- Step 3: Young modulus would be needed only if the question asked for *strain* or *extension*. Sometimes exam questions deliberately give extra information to test whether you can pick the relevant subset. Always identify what's asked, then trace the minimal formula path — don't try to use every given number.", "source": "Opus 4.7 ①", "_id": "opus_1_61", "judge_pick": true}], "count": 62}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "Why is density expressed as mass *per unit volume* rather than just \"how heavy something is\", and what does the \"per unit\" structure let you compare?", "answer": "- Step 1: Mass alone tells you total quantity of matter, but two objects of vastly different size can have the same mass — a kilogram of feathers and a kilogram of lead. So mass alone cannot capture how tightly packed the matter is.\n- Step 2: Dividing by volume gives an *intensive* property: it no longer depends on how big a chunk you took. A small drop of mercury and a bathtub of mercury both have $$\\rho \\approx 13600\\,\\mathrm{kg\\,m^{-3}}$$.\n- Step 3: This lets you compare *materials*, not samples — so density becomes a fingerprint of substance identity (under fixed T, P), which is why it's useful for flotation, identification, and material selection.\n\nThe \"per unit\" structure converts a sample-specific quantity into a material-specific one.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": true}, {"question": "When converting a density from $$\\mathrm{g\\,cm^{-3}}$$ to $$\\mathrm{kg\\,m^{-3}}$$, why does the conversion factor turn out to be $$\\times 1000$$ and not $$\\times 10$$ or $$\\times 100$$? (3 steps)", "answer": "- Step 1: The mass part: $$1\\,\\mathrm{g} = 10^{-3}\\,\\mathrm{kg}$$, contributing a factor of $$10^{-3}$$.\n- Step 2: The volume part: $$1\\,\\mathrm{cm^3} = (10^{-2}\\,\\mathrm{m})^3 = 10^{-6}\\,\\mathrm{m^3}$$. The cube applies to the *whole* metre-conversion, not just to the number. Dividing by $$10^{-6}$$ contributes a factor of $$10^{6}$$.\n- Step 3: Combine: $$\\rho_{\\mathrm{kg/m^3}} = \\rho_{\\mathrm{g/cm^3}} \\times \\frac{10^{-3}}{10^{-6}} = \\rho_{\\mathrm{g/cm^3}} \\times 10^{3}$$.\n\nThe cube on the length conversion is what makes the factor \"large\" — forgetting to cube is the classic trap.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "Water has density $$1000\\,\\mathrm{kg\\,m^{-3}}$$ and air has density about $$1.2\\,\\mathrm{kg\\,m^{-3}}$$. Without a calculator, roughly how many times denser is water than air, and what does that tell you intuitively?", "answer": "- Step 1: Ratio is $$1000/1.2 \\approx 830$$ — water is nearly a thousand times denser.\n- Step 2: This means a cubic metre of water has the same mass as about 800 cubic metres of air. Equivalently, the air in a small room ($$\\sim 50\\,\\mathrm{m^3}$$) weighs about the same as $$\\sim 60\\,\\mathrm{kg}$$ — about one person.\n- Step 3: This is why upthrust in air is usually negligible for solids, but upthrust in water can support boats, fish and divers.\n\nThe factor of $$\\sim 10^3$$ between liquids and gases governs why fluids behave so differently.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": true}, {"question": "A spherical balloon of radius $$20\\,\\mathrm{cm}$$ contains $$50\\,\\mathrm{g}$$ of air. Walk through the conceptual steps to find its density without doing a full numerical computation. (4 steps)", "answer": "- Step 1: Identify the geometry — sphere — so volume formula triggered is $$V = \\frac{4}{3}\\pi r^3$$. The radius is given directly (not diameter), so no halving needed.\n- Step 2: Convert to SI: $$r = 0.20\\,\\mathrm{m}$$, $$m = 0.050\\,\\mathrm{kg}$$. The danger is cubing centimetres without realising; converting first avoids it.\n- Step 3: Apply $$\\rho = m/V$$. Order of magnitude: $$r^3 \\sim 10^{-2}$$, so $$V \\sim 10^{-2}\\,\\mathrm{m^3}$$. Then $$\\rho \\sim 0.05/0.03 \\sim 1.5\\,\\mathrm{kg\\,m^{-3}}$$.\n- Step 4: Compare with standard air ($$\\sim 1.2\\,\\mathrm{kg\\,m^{-3}}$$). It's slightly higher — physically reasonable because air inside a balloon is at higher pressure than atmospheric.\n\nThe whole calculation can be done in your head once you've isolated the conceptual move \"sphere → volume formula → density\".", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": true}, {"question": "Why does a balloon contain air slightly *denser* than atmospheric air, even at the same temperature?", "answer": "- Step 1: A balloon's elastic skin pushes inward, so the gas inside must push outward with extra pressure to balance it. Therefore $$P_{\\text{inside}} > P_{\\text{atm}}$$.\n- Step 2: From the ideal gas behaviour ($$PV = nRT$$), at fixed $$T$$ and $$V$$, more pressure means more moles of gas packed into the same volume.\n- Step 3: More molecules of (roughly) the same average mass per molecule, in the same volume, means greater density.\n\nThe balloon skin is the mechanism: it stores elastic energy and forces a pressure differential, which forces a density differential.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": true}, {"question": "For an irregular object like a stone, why does Archimedes' displacement method give you the *volume* of the stone directly, and what are the dominant sources of error in this method?", "answer": "- Step 1: An incompressible solid pushes water out of the way. The water that's displaced must occupy a volume equal to the part of the object below the water line — and for a fully submerged object, that equals the object's full volume.\n- Step 2: So if you collect or measure the displaced water in a graduated cylinder, you read off the volume of the stone without ever needing geometry.\n- Step 3: Dominant errors:\n+ Water adhering to the string or stone — lost from the measurement, underestimating volume.\n+ Trapped air bubbles on the stone — *added* volume, overestimating.\n+ Splashing — water lost, underestimating.\n+ Meniscus reading on the cylinder — parallax.\n\nThe technique trades geometry for displacement, but the trade-off is many small handling errors that compound.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": true}, {"question": "Why is it better to weigh ten sheets of paper and divide by ten, rather than weighing one sheet directly, when you want the mass of a single sheet?", "answer": "- Step 1: The balance has a fixed absolute resolution (e.g. $$\\pm 0.01\\,\\mathrm{g}$$). For a single sheet of $$\\sim 0.05\\,\\mathrm{g}$$, that's a 20% uncertainty.\n- Step 2: For ten sheets, the mass is $$\\sim 0.5\\,\\mathrm{g}$$, and the absolute uncertainty is still $$\\pm 0.01\\,\\mathrm{g}$$ — now only 2% of the reading.\n- Step 3: Dividing by ten gives the average per sheet, with the same 2% percentage uncertainty inherited. So you've reduced percentage uncertainty by a factor of ten without buying a better instrument.\n\nThe trick is: make the measured quantity *bigger* so the fixed instrumental uncertainty becomes a smaller fraction.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "Distinguish *resolution*, *accuracy*, *precision*, and *range* of a measuring instrument — and explain why high precision does not imply high accuracy.", "answer": "- Step 1: Resolution = smallest detectable change (e.g. $$0.01\\,\\mathrm{mm}$$ on a micrometer). Range = max − min the instrument can read.\n- Step 2: Accuracy = closeness of measurement to the true value. Precision = closeness of repeated measurements to *each other*.\n- Step 3: A faulty-calibrated instrument (e.g. micrometer with a zero error of $$+0.05\\,\\mathrm{mm}$$) can give very consistent readings that are all systematically wrong. That is high precision, low accuracy.\n+ Random errors hurt precision.\n+ Systematic errors hurt accuracy.\n\nThe archer analogy: tight grouping in the wrong place = precise but inaccurate.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": true}, {"question": "When using a micrometer, what does the *main (sleeve) scale* contribute versus the *thimble scale*, and what's the most common reading mistake? (3 steps)", "answer": "- Step 1: Main scale runs in $$1\\,\\mathrm{mm}$$ steps along the sleeve, with extra half-millimetre marks ($$0.5\\,\\mathrm{mm}$$) typically offset above or below the centre line. It contributes the whole + half-mm part.\n- Step 2: The thimble scale runs $$0$$–$$50$$ (or $$0$$–$$100$$), each division = $$0.01\\,\\mathrm{mm}$$. You read the division aligned with the centre horizontal line on the sleeve.\n- Step 3: Add the two contributions. The common mistake is missing the $$0.5\\,\\mathrm{mm}$$ tick on the main scale — reading $$10.0$$ when it should be $$10.5$$, giving an error of half a millimetre, which is *fifty times* the instrument's resolution.\n\nThe hierarchy is: main scale = coarse mm + optional 0.5 mm, then thimble = fine 0.01 mm.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "A micrometer has a zero error: when fully closed, it reads $$+0.03\\,\\mathrm{mm}$$. You then measure an object and the micrometer reads $$5.42\\,\\mathrm{mm}$$. What is the true measurement, and why?", "answer": "- Step 1: Zero error is a *systematic* offset: the instrument always reads $$0.03\\,\\mathrm{mm}$$ too high.\n- Step 2: To correct, subtract the zero error from every reading: true value = observed − zero error.\n- Step 3: True measurement = $$5.42 - 0.03 = 5.39\\,\\mathrm{mm}$$. A negative zero error would mean adding instead.\n\nThe rule: positive zero error → subtract; negative zero error → add (which is the same as subtracting a negative number).", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "On a Vernier caliper with a 20-division Vernier scale of resolution $$0.05\\,\\mathrm{mm}$$, how do you decide which Vernier division to read?", "answer": "- Step 1: The Vernier zero mark gives you the coarse reading: read the *last whole mm* on the main scale to the left of (or at) the Vernier zero.\n- Step 2: For the fine part, scan along the Vernier scale and find the *single* line that aligns best with *any* main-scale tick. There will be only one near-perfect match because the Vernier pitch differs slightly from the main-scale pitch (that's how Vernier scales work).\n- Step 3: Multiply that division number by the resolution ($$0.05\\,\\mathrm{mm}$$ here), and add to the main reading.\n\nThe clever idea: the Vernier exploits the fact that two slightly-different rulers will only align at one place, magnifying the fractional reading.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "A bottle of whiskey contains $$1\\,\\mathrm{L}$$ of liquid weighing $$0.915\\,\\mathrm{kg}$$. What's the density in SI units, and why is this a sanity-checkable answer? (3 steps)", "answer": "- Step 1: Convert volume: $$1\\,\\mathrm{L} = 10^{-3}\\,\\mathrm{m^3}$$. Mass is already in kg.\n- Step 2: $$\\rho = m/V = 0.915 / 10^{-3} = 915\\,\\mathrm{kg\\,m^{-3}}$$.\n- Step 3: Sanity check: pure water is $$1000\\,\\mathrm{kg\\,m^{-3}}$$; whiskey is mostly water with ethanol ($$\\rho \\approx 790\\,\\mathrm{kg\\,m^{-3}}$$) mixed in. Density between $$790$$ and $$1000$$, closer to water, is exactly what we'd expect.\n\nWhen a numerical density comes out between known reference values that make physical sense, that's the best confirmation you didn't miscount powers of ten.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "Brass is 70% copper and 30% zinc *by volume*. Without doing the arithmetic, explain why the brass density must lie between the copper and zinc densities, and closer to which one.", "answer": "- Step 1: For a mixture combined by volume, total mass = $$\\rho_{Cu}V_{Cu} + \\rho_{Zn}V_{Zn}$$, and total volume = $$V_{Cu} + V_{Zn}$$.\n- Step 2: The mixture density $$\\rho_{\\text{brass}} = (\\rho_{Cu}V_{Cu} + \\rho_{Zn}V_{Zn})/V_{\\text{total}}$$ is a *volume-weighted average* of the component densities.\n- Step 3: Any weighted average lies between the two extremes, with the result pulled toward whichever component has the larger weight. Since copper takes the larger volume share (70%), $$\\rho_{\\text{brass}}$$ lies closer to $$\\rho_{Cu}$$.\n\nThe conceptual point: by-volume mixing → volume-weighted density; by-mass mixing would give a different formula and weighting.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": true}, {"question": "Why can't you just average the densities of copper and zinc, weighted by percentage, to get brass density when the percentages are by *mass* rather than by volume?", "answer": "- Step 1: Density is mass-per-volume. If 70% of the mass is copper, that doesn't mean 70% of the volume is copper — because copper is denser, the same mass occupies less volume than the same mass of zinc.\n- Step 2: To find total volume from a mass-fraction split, you compute $$V = m_{Cu}/\\rho_{Cu} + m_{Zn}/\\rho_{Zn}$$, then $$\\rho = m_{\\text{total}}/V$$.\n- Step 3: That's a harmonic-style average, not arithmetic. So the rule is: by-volume mix → arithmetic mean weighted by volume fraction. By-mass mix → harmonic mean weighted by mass fraction.\n\nThe structure of the average depends on which quantity (mass or volume) you are partitioning.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": true}, {"question": "State Hooke's law in words and as a formula, being careful about the variable that's \"proportional\".", "answer": "Hooke's law states that, *up to the limit of proportionality*, the force applied to a spring (or elastic body) is directly proportional to its extension from natural length: $$F = kx$$. Here $$x$$ is the *extension* — the change in length from the unstretched state — not the total length itself. The constant $$k$$ (spring constant, units $$\\mathrm{N\\,m^{-1}}$$) measures the stiffness: how much force per unit extension. Writing $$F = kL$$ with $$L$$ as total length is a common slip and physically wrong because at $$F=0$$ the natural length is not zero. The law applies symmetrically to compression as well as extension within the elastic region.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "A force–extension graph for a spring is a straight line through the origin up to point P, then curves. What are the physical meanings of (i) the gradient, (ii) point P, and (iii) the area under the line? (3 steps)", "answer": "- Step 1: Gradient $$= \\Delta F/\\Delta x = k$$, the spring constant — slope tells you stiffness directly because $$F = kx$$ is the equation of a line through the origin with slope $$k$$.\n- Step 2: Point P is the limit of proportionality: beyond it, $$F$$ and $$x$$ stop being directly proportional. P may lie just inside the elastic limit (beyond which deformation becomes permanent), and the two are often very close but not identical.\n- Step 3: Area under graph = work done stretching the spring = elastic strain energy stored. For the linear region it's a triangle, so $$E_{el} = \\tfrac{1}{2}Fx = \\tfrac{1}{2}kx^2$$. For non-linear regions, use the actual area (count squares or estimate trapezia).\n\nThree different graph features give three different physical quantities — keep them separate.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "Distinguish *limit of proportionality*, *elastic limit*, and *yield point* on a force–extension curve.", "answer": "- Step 1: Limit of proportionality: the largest extension for which $$F \\propto x$$. Past this, the graph stops being a straight line — but the material may still spring back when unloaded.\n- Step 2: Elastic limit: the largest extension after which the material *still* returns to its original length when unloaded. Just beyond this, permanent deformation begins.\n- Step 3: Yield point: the load at which the material begins to deform plastically with little or no increase in force — the curve becomes nearly horizontal (or \"jerky\" for mild steel). Always: limit of proportionality ≤ elastic limit ≤ yield point.\n\nThe three landmarks describe progressively more severe departures from ideal elastic behaviour.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": true}, {"question": "A $$5.0\\,\\mathrm{N}$$ weight stretches a spring from $$300\\,\\mathrm{mm}$$ to $$385\\,\\mathrm{mm}$$. Walk through the conceptual route to its spring constant. (3 steps)", "answer": "- Step 1: Identify *extension*, not total length: $$x = 385 - 300 = 85\\,\\mathrm{mm} = 0.085\\,\\mathrm{m}$$. Confusing total length with extension would give an answer ten-fold off.\n- Step 2: Apply $$F = kx$$, rearranged as $$k = F/x$$.\n- Step 3: $$k = 5.0/0.085 \\approx 59\\,\\mathrm{N\\,m^{-1}}$$. Sanity: a soft lab spring with $$k$$ in the tens of $$\\mathrm{N\\,m^{-1}}$$ — reasonable.\n\nThe whole exercise hinges on extracting \"extension\" from the wording.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "Two identical springs of constant $$k$$ are joined end-to-end (in series) and a weight is hung from the bottom. Why is the combined spring constant $$k/2$$, not $$2k$$? (3 steps)", "answer": "- Step 1: The same force $$F$$ passes through both springs (each spring must support the entire load). Each spring extends by $$x_1 = F/k$$.\n- Step 2: Total extension = $$x_1 + x_2 = 2F/k$$. So the effective spring constant is $$k_{\\text{eff}} = F/(2F/k) = k/2$$.\n- Step 3: Physical picture: in series the springs each contribute their full extension, so the combination extends twice as much for the same force — it's *less* stiff.\n\nSeries springs are like resistors in parallel: more units in line → easier to deform overall.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": true}, {"question": "Two identical springs of constant $$k$$ are joined side-by-side (in parallel) supporting the same weight. Why does the combined stiffness become $$2k$$? (3 steps)", "answer": "- Step 1: Each spring extends by the same amount $$x$$ (their ends are tied together). The total applied force is shared: $$F = F_1 + F_2 = kx + kx = 2kx$$.\n- Step 2: Effective stiffness: $$k_{\\text{eff}} = F/x = 2k$$.\n- Step 3: Physical picture: in parallel, both springs resist the same extension simultaneously, doubling the resistance to deformation.\n\nParallel springs are like resistors in series: more units acting together → stiffer.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "Why is the spring-series-parallel rule \"backwards\" from the resistor-series-parallel rule? (2 steps)", "answer": "- Step 1: The mathematical match is by *role*, not by geometry. For resistors, voltage $$V = IR$$ relates \"potential drop\" to current. For springs, force $$F = kx$$ relates force to extension. The quantity that is *shared* in series is current (for resistors) and force (for springs); the quantity that *sums* is voltage drop (resistors) and extension (springs).\n- Step 2: So springs in geometric series behave mathematically like resistors in geometric parallel — both involve adding compliances (reciprocals of stiffness/conductance).\n\nThe mapping is: stiffness ↔ conductance ($$1/R$$), compliance ↔ resistance. Spring series geometry = resistor parallel geometry in mathematical form.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": true}, {"question": "Two identical springs each with $$k = 240\\,\\mathrm{N\\,m^{-1}}$$ and natural length $$210\\,\\mathrm{mm}$$ are joined vertically in series. An $$8\\,\\mathrm{N}$$ weight is hung. Without exact arithmetic, what is the length of *each individual spring* in the chain? (3 steps)", "answer": "- Step 1: Crucial subtlety — in series, the same $$8\\,\\mathrm{N}$$ acts through *each* spring (the upper spring must support both the lower spring and the weight; the lower spring has only the weight, but since the lower spring's force is the weight, the upper spring transmits exactly that same force to its anchor). So each spring carries $$F = 8\\,\\mathrm{N}$$.\n- Step 2: Each spring's extension is $$x = F/k = 8/240 \\approx 0.033\\,\\mathrm{m} = 33\\,\\mathrm{mm}$$. Use the *individual* spring constant, NOT $$k_{\\text{eff}} = k/2$$, when asking about *one* spring's extension.\n- Step 3: New length of each spring = $$210 + 33 = 243\\,\\mathrm{mm}$$. Total chain length = $$2 \\times 243 = 486\\,\\mathrm{mm}$$.\n\nThe trap: don't apply effective stiffness when asked about individual components.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "Why is stress *not* the same physical thing as pressure, even though both have units of pascals?", "answer": "- Step 1: Both are defined as force per unit area, so they share units. But pressure is associated with fluids pushing on a surface from outside — it's isotropic (acts equally in all directions) and is a *contact* force quantity.\n- Step 2: Stress refers to the *internal* state of a solid — how much force per area is being transmitted through a cross-section of the material itself. Stress can be tensile (pulling apart), compressive (pushing together), or shear (sliding along), and is generally a tensor (direction-dependent).\n- Step 3: A pressurised gas exerts pressure on a container wall; the container wall material has internal stresses arising from that pressure. They're related but distinct concepts: one describes the agent (fluid), one describes the response (solid).\n\nSame units, different physical role.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": true}, {"question": "Why is strain dimensionless, and why is it specifically a *ratio of lengths*?", "answer": "- Step 1: Strain $$\\varepsilon = \\Delta L/L$$ divides one length by another — metres divided by metres — so the units cancel.\n- Step 2: It's a ratio (rather than an absolute length) because we want a measure of deformation that doesn't depend on the size of the sample. A 1 mm extension on a 1 m rod (strain $$10^{-3}$$) is a much larger deformation per unit length than a 1 mm extension on a 1 km cable (strain $$10^{-6}$$).\n- Step 3: Defining strain as a fraction lets us compare materials independent of geometry — exactly the same role density plays for mass-volume ratio.\n\nThe ratio form makes strain an *intensive* deformation measure, scaling-free.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": true}, {"question": "Why should strain values be quoted as decimals (e.g. $$3.0\\times 10^{-4}$$) and not percentages in Edexcel mark schemes?", "answer": "- Step 1: Strain entering formulas like $$E = \\sigma/\\varepsilon$$ or $$\\sigma = E\\varepsilon$$ must be the dimensionless ratio. If you substitute \"$$0.03\\%$$\" as $$0.03$$, you're off by a factor of $$100$$.\n- Step 2: Examiners want the decimal form to avoid that exact confusion. Writing $$\\varepsilon = 3.0 \\times 10^{-4}$$ is unambiguous; writing \"0.03%\" introduces a hidden conversion step.\n- Step 3: Convention: keep strain as a decimal in calculations and in final answers; only convert to a percentage if the question explicitly asks.\n\nThe rule is operational: percentages multiply by an invisible factor of $$1/100$$, which causes silent errors.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "Young's modulus combines stress and strain. Conceptually, what does $$E$$ tell you that the spring constant $$k$$ does *not*? (3 steps)", "answer": "- Step 1: Spring constant $$k$$ depends on the *object's geometry* — its length, its cross-section, its material. A long thin wire of steel and a short thick rod of steel have very different $$k$$ values.\n- Step 2: Young's modulus $$E = \\sigma/\\varepsilon$$ factors out the geometry: stress already divides force by area, and strain already divides extension by length. So $$E$$ depends only on the *material*.\n- Step 3: $$E$$ is a fundamental material property (like density). Steel always has $$E \\approx 2\\times10^{11}\\,\\mathrm{Pa}$$ regardless of shape; that lets engineers compare materials cleanly.\n\n$$k$$ is a sample-specific stiffness; $$E$$ is a material-specific stiffness.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": true}, {"question": "Derive the relation $$\\Delta L = FL/(AE)$$ from the definitions of stress, strain, and Young's modulus. (3 steps)", "answer": "- Step 1: Start from $$E = \\sigma/\\varepsilon$$ and the two component definitions: $$\\sigma = F/A$$, $$\\varepsilon = \\Delta L/L$$.\n- Step 2: Substitute: $$E = (F/A)/(\\Delta L/L) = FL/(A\\Delta L)$$.\n- Step 3: Rearrange for $$\\Delta L$$: $$\\Delta L = FL/(AE)$$.\n\nConceptual reading: a wire extends more when the force is bigger, when it's longer to start with, and when its area or Young's modulus is smaller. All four dependencies appear naturally from the algebra.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "A steel cable of diameter $$2.3\\,\\mathrm{mm}$$ and length $$28\\,\\mathrm{m}$$ supports a $$3200\\,\\mathrm{N}$$ load. Steel has $$E = 2.1\\times 10^{11}\\,\\mathrm{Pa}$$. Walk conceptually through the calculation of extension without doing full arithmetic. (4 steps)", "answer": "- Step 1: Trigger: load + length + diameter + $$E$$ → Young's modulus extension formula $$\\Delta L = FL/(AE)$$.\n- Step 2: Compute area from *radius*, not diameter: $$A = \\pi(d/2)^2 = \\pi(1.15\\times 10^{-3})^2 \\sim 4\\times 10^{-6}\\,\\mathrm{m^2}$$.\n+ Common trap: using $$\\pi d^2$$ instead, giving area 4 times too big and extension 4 times too small.\n- Step 3: Order of magnitude: numerator $$FL \\sim 3200 \\times 28 \\sim 10^5$$; denominator $$AE \\sim 4\\times 10^{-6} \\times 2\\times 10^{11} \\sim 10^6$$.\n- Step 4: $$\\Delta L \\sim 10^5/10^6 = 10^{-1}\\,\\mathrm{m} \\sim 10\\,\\mathrm{cm}$$. Physically plausible: a 28 m steel cable under tonnes of effective load extending by a few cm.\n\nThe conceptual chain is: identify formula → halve diameter → power-of-ten arithmetic → sanity-check.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "Why is using $$\\pi d^2$$ instead of $$\\pi (d/2)^2$$ for the cross-sectional area of a wire such a damaging error?", "answer": "- Step 1: $$\\pi d^2 = \\pi(2r)^2 = 4\\pi r^2$$, so it's *four times* the correct area.\n- Step 2: In stress: $$\\sigma = F/A$$. If $$A$$ is four times too big, stress comes out four times too small.\n- Step 3: In Young's modulus extension: $$\\Delta L = FL/(AE)$$. If $$A$$ is four times too big, $$\\Delta L$$ is four times too small.\n\nThe geometric factor of 4 is the kind of silent error that doesn't show up as a magnitude/units check — the number looks reasonable but is wrong. The fix is automatic: always say aloud \"halve the diameter first, then square\" when given a diameter.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": true}, {"question": "On a stress–strain graph for mild steel, what physical events do these features correspond to: linear region, yield point, \"necking\", fracture? (4 steps)", "answer": "- Step 1: Linear region — bonds between atoms behave like springs. Atoms move slightly from equilibrium positions; everything is reversible. Slope = $$E$$.\n- Step 2: Yield point — sudden drop or plateau in the curve. Layers of atoms begin to slip past each other along dislocations. No further force needed to keep extending.\n- Step 3: Strain hardening / further extension — dislocations multiply and get tangled, making further plastic flow harder, so stress rises again toward the UTS (ultimate tensile stress).\n- Step 4: After UTS — local cross-section narrows (\"necks\"), so true stress in that thin region rises rapidly until the wire fractures.\n\nEach kink on the curve maps onto a specific microscopic event in the atomic lattice.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": true}, {"question": "Why is the area under a *stress–strain* graph \"energy per unit volume\" rather than total energy? (2 steps)", "answer": "- Step 1: Area under a force–extension graph is energy: $$\\int F \\, dx$$ has units $$\\mathrm{N\\cdot m = J}$$. Dividing by the volume of the sample gives energy per unit volume.\n- Step 2: Stress is $$F/A$$ (force per unit area) and strain is $$\\Delta L/L$$ (extension per unit length). Their product $$\\sigma\\varepsilon = F\\Delta L/(AL) = F\\Delta L/V$$ has units of $$\\mathrm{J\\,m^{-3}}$$. So the area under a stress–strain plot, $$\\int \\sigma\\, d\\varepsilon$$, is automatically a *volumetric* energy density.\n\nThis is convenient because it makes toughness ($$\\int \\sigma\\, d\\varepsilon$$ up to fracture) a material property, not a sample property.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": true}, {"question": "Why is elastic strain energy $$\\tfrac{1}{2}Fx$$ rather than $$Fx$$ for a Hooke's-law spring? (3 steps)", "answer": "- Step 1: Work done by a *constant* force is $$W = Fx$$. But during stretching, the spring force isn't constant — it starts at zero (when the spring is unstretched) and grows linearly to $$F$$.\n- Step 2: The *average* force during the stretch is $$(0 + F)/2 = F/2$$. So work done = average force × distance = $$\\tfrac{1}{2}Fx$$.\n- Step 3: Equivalently, the area under the linear $$F$$-vs-$$x$$ graph from $$0$$ to $$x$$ is a triangle with base $$x$$ and height $$F$$, area $$\\tfrac{1}{2}Fx$$.\n\nThe factor of one-half always reflects \"linearly varying from zero\", whether for springs, kinetic energy ($$\\tfrac{1}{2}mv^2$$), or capacitor energy ($$\\tfrac{1}{2}CV^2$$).", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": true}, {"question": "A rail track is pre-strained by $$3.0\\times 10^{-4}$$ with $$E = 2.0\\times 10^{11}\\,\\mathrm{Pa}$$ and cross-section $$7.5\\times 10^{-3}\\,\\mathrm{m^2}$$. Conceptually, why is the required tensile force given by $$F = EA\\varepsilon$$, and what's the rough magnitude? (3 steps)", "answer": "- Step 1: From definitions: $$E = \\sigma/\\varepsilon$$ and $$\\sigma = F/A$$. Solving for $$F$$: $$F = \\sigma A = E\\varepsilon A$$.\n- Step 2: The chain: pre-strain tells you the strain, multiplying by $$E$$ gives stress, multiplying by area gives force.\n- Step 3: Order of magnitude: $$F \\sim (2\\times 10^{11})(7.5\\times 10^{-3})(3\\times 10^{-4}) \\sim 10^{11-3-4+0.5} \\sim 10^{4.5}$$, so a few tens of kN. The actual value is $$\\approx 45\\,\\mathrm{kN}$$ — sensible for a rail under engineering pre-tension.\n\nThe formula $$F = EA\\varepsilon$$ is just $$F = kx$$ rewritten with material/geometry factored out into $$E$$ and $$A$$.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "Why does an engineer pre-strain rails in cold weather rather than at the highest expected ambient temperature?", "answer": "- Step 1: Rails are fixed at both ends; they can't freely expand or contract. So temperature changes turn into stress changes.\n- Step 2: If laid at maximum expected temperature with zero strain, then cooling causes the rails to contract, but since they can't shorten freely, they're pulled into tensile stress. In extreme cold this tension could exceed the breaking stress, snapping the rails — catastrophic.\n- Step 3: If pre-strained (pre-tensioned) at a moderate or low temperature, the rail starts under tension. When it warms, thermal expansion *relaxes* that tension before any compression can build up. The pre-strain is engineered so the rail is approximately stress-free near a typical operating temperature, never reaching dangerous tension or buckling compression at the extremes.\n\nPre-strain is a way of \"centering\" the stress range across the temperature window the rail will experience.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "What's the difference between *strength*, *stiffness*, and *toughness* as material properties?", "answer": "- Step 1: Strength = maximum stress before fracture (or UTS). High-strength materials can carry large loads per unit area.\n- Step 2: Stiffness = resistance to deformation under stress, quantified by Young's modulus. A stiff material has small strain for a given stress.\n- Step 3: Toughness = total energy absorbed per unit volume before fracture (area under stress–strain curve). A tough material can absorb impacts; a brittle one cannot.\n+ Diamond: stiff and hard but brittle (low toughness).\n+ Rubber: low stiffness but very tough — absorbs huge energy through large strains.\n+ Mild steel: stiff, strong, AND tough — why it's an excellent structural material.\n\nThe three are independent — a material can be strong but not tough (high-carbon steel), or tough but not strong (rubber).", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": true}, {"question": "Why does a brittle material like glass have a stress–strain curve with virtually no plastic region, while ductile mild steel has a long flat plastic region? (3 steps)", "answer": "- Step 1: At the atomic level, plastic deformation in metals occurs by dislocations gliding through the crystal lattice — defects that allow whole rows of atoms to slip without simultaneously breaking all bonds in a plane.\n- Step 2: In glass (amorphous, non-crystalline), there are no orderly slip planes, so dislocations can't propagate. Once a microscopic crack starts, stress concentrates at the tip and the crack runs through the material immediately.\n- Step 3: In mild steel, dislocations multiply and slide, allowing large plastic strains. The material extends, sometimes by $$20$$–$$30\\%$$, before the cross-section narrows enough to fail.\n\nThe presence or absence of dislocation slip systems is what separates ductile from brittle behaviour.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": true}, {"question": "When you remove the load from a copper wire in the plastic region and then reload it, the wire behaves elastically again — almost the same stiffness as before, just from a new \"natural length\". Why?", "answer": "- Step 1: Plastic deformation has rearranged the atoms — dislocations have moved and the lattice is now in a new equilibrium configuration. Strain hardening has often made the wire stiffer than before in the new range.\n- Step 2: Unloading from the plastic region leaves the wire at a new permanent length, but the bonds between atoms still behave elastically for small further deformations.\n- Step 3: So reloading retraces a linear path with approximately the same Young's modulus, but starting from the new length — the unloading line is parallel to the original elastic line.\n\nThis is exactly why metal panels can be pressed into permanent shapes and yet still behave elastically afterward — engineers exploit this in sheet metal forming.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "Why is the displacement method for irregular objects more error-prone than direct measurement for regular ones?", "answer": "- Step 1: For a regular cube, you can take ten readings of each side and average — instrumental uncertainty is well-defined and propagates predictably.\n- Step 2: For displacement, the volume reading depends on collecting *all* displaced water without loss (splashing, adhesion) and *without* gain (trapped air bubbles, partial submersion). These are uncontrolled and not easily quantified.\n- Step 3: Plus the measuring cylinder typically has lower resolution (~1 mL) than a Vernier caliper or micrometer (~0.05 mm in length), so the volume reading is the dominant uncertainty.\n\nThe displacement method trades geometric precision for handling-dependent errors.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "Estimate the mass of air in a typical classroom (5 m × 4 m × 2.5 m) using $$\\rho_{\\text{air}} \\approx 1.2\\,\\mathrm{kg\\,m^{-3}}$$. (3 steps)", "answer": "- Step 1: Volume = $$5 \\times 4 \\times 2.5 = 50\\,\\mathrm{m^3}$$.\n- Step 2: Mass = $$\\rho V = 1.2 \\times 50 = 60\\,\\mathrm{kg}$$.\n- Step 3: Sanity: 60 kg is roughly the mass of an adult. So the air in a small room weighs about as much as a person — surprising but true, and a useful intuition check whenever you do air problems.\n\nThis is also why we don't normally feel air's weight — it's exerted as pressure all around us, not as a localised force.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "A force–extension graph for a non-linear spring rises sharply at first and then bends over. How do you find the elastic strain energy stored at extension $$x_0$$? (2 steps)", "answer": "- Step 1: Energy stored = work done = area under the graph from $$0$$ to $$x_0$$. Do *not* use $$\\tfrac{1}{2}Fx_0$$, which is only valid when the line is straight through the origin.\n- Step 2: For a curve, either:\n+ Approximate by trapezia (split the area into strips and add).\n+ Count squares under the curve and multiply by the energy per square ($$\\Delta F \\times \\Delta x$$ for each grid square).\n+ If the function is known analytically, integrate $$\\int_0^{x_0} F(x)\\, dx$$.\n\nThe \"$$\\tfrac{1}{2}Fx$$\" formula is a special-case shortcut for Hooke-region springs only.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": true}, {"question": "A copper wire of length $$1.52\\,\\mathrm{m}$$ stretches by $$3.2\\,\\mathrm{mm}$$ under tension. Why is it *impossible* to find the stress from this information alone?", "answer": "- Step 1: With these numbers, you can compute strain: $$\\varepsilon = 0.0032/1.52 \\approx 2.1\\times 10^{-3}$$.\n- Step 2: But stress is $$\\sigma = F/A$$ — you need either the applied force *and* the cross-sectional area, or the Young modulus (so you could use $$\\sigma = E\\varepsilon$$).\n- Step 3: The wire's dimensions and extension alone give strain, but the relationship between strain and stress depends on the *material* (via $$E$$) and on the actual *load* — neither of which is provided.\n\nThe exam-skill point: identify what you can and can't compute, and explicitly state what's missing rather than forcing a formula.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": true}, {"question": "Two springs and one mass — what changes if I switch from a series arrangement to a parallel arrangement (same total mass hanging)? (3 steps)", "answer": "- Step 1: Effective stiffness changes by a factor of 4: series gives $$k/2$$, parallel gives $$2k$$.\n- Step 2: The extension of the *system* therefore changes by a factor of 4: parallel extends $$\\tfrac{1}{4}$$ as much as series for the same load.\n- Step 3: Stored elastic energy also changes: in series, more extension at the same force → 4× the energy stored compared to parallel; in parallel, half the extension but distributed across both springs.\n+ Series: floppier system, more compliant suspension (used in soft suspension).\n+ Parallel: stiffer system, less sag (used to bear heavy loads).\n\nSame components, very different mechanical character.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": false}, {"question": "Steel has $$E \\approx 2\\times 10^{11}\\,\\mathrm{Pa}$$; rubber has $$E \\sim 10^{7}$$–$$10^{8}\\,\\mathrm{Pa}$$. By what rough factor is steel stiffer than rubber, and what does that mean for similarly-sized samples under the same load?", "answer": "- Step 1: Ratio $$E_{\\text{steel}}/E_{\\text{rubber}} \\sim 10^{11}/10^{7} = 10^{4}$$ — steel is about ten thousand times stiffer.\n- Step 2: For samples of the same dimensions and the same load: $$\\Delta L \\propto 1/E$$. So a rubber rod stretches 10,000 times as much as a steel rod under the same force.\n- Step 3: Equivalently, to produce the *same* extension, you'd need 10,000 times more force on the steel — which is why steel is used for structural beams and rubber is used for shock-absorbers.\n\nThe four orders of magnitude in $$E$$ are what makes the two materials engineered for completely different roles.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": true}, {"question": "Why must you wear safety glasses when stretching wires or springs in a lab?", "answer": "- Step 1: Wires under tension can store substantial elastic energy ($$\\tfrac{1}{2}F\\Delta L$$). For a thin wire stretched to several Newtons of tension and millimetres of extension, that's joules of stored energy.\n- Step 2: When the wire snaps, the stored energy is released suddenly, propelling the broken ends at high speed.\n- Step 3: The path of the snap is unpredictable; even a thin wire can lacerate or, more dangerously, penetrate the eye. Safety glasses are non-negotiable. A sand tray under any hanging masses protects feet from falling weights — a separate but parallel concern.\n\nEnergy stored = energy that will be released somewhere when something fails.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": true}, {"question": "Why is taking a graphical gradient generally more accurate than computing $$k$$ from a single force-extension pair? (3 steps)", "answer": "- Step 1: A single pair of readings contains both random measurement errors and any zero-error offset baked into the apparatus.\n- Step 2: A line of best fit through many points averages out random errors statistically. The gradient depends on differences, not absolute values, so a constant zero-error offset cancels out.\n- Step 3: Moreover, the gradient method visibly reveals systematic deviations: a non-zero $$y$$-intercept signals zero error or systematic offset; curvature signals departure from Hooke's law. Single-point arithmetic hides both.\n\nGraphs are diagnostic instruments, not just answer-getters.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": true}, {"question": "Searle's apparatus uses two wires (a \"control\" wire and a \"test\" wire). What's the role of the control wire? (3 steps)", "answer": "- Step 1: Both wires hang from the same support, in the same room, so they experience identical temperature changes and any sagging of the support.\n- Step 2: The extension measured (via the vernier scale and spirit level) is the *difference* in length between the test wire and the control wire. Common-mode effects — temperature-driven expansion of either wire, or the support flexing — cancel out.\n- Step 3: What remains is only the extra extension caused by the load on the test wire. So the control wire isolates the effect of the load from environmental noise.\n\nThis is a classic \"differential measurement\" technique — measure two similar things and subtract.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": true}, {"question": "Why does plotting *stress* against *strain* produce a graph that's the same for any sample of a given material, while plotting force against extension does not? (2 steps)", "answer": "- Step 1: Force-extension is dimensional: $$F = kx$$ where $$k = EA/L$$ depends on the sample's area and length. Two samples of different size give two different straight lines, even from the same material.\n- Step 2: Stress and strain pre-normalise by area and length: $$\\sigma = F/A$$, $$\\varepsilon = \\Delta L/L$$. So $$\\sigma = E\\varepsilon$$, and the slope is $$E$$ — a material constant. All samples of the same material lie on the same line.\n\nThis is why engineers tabulate $$E$$ for materials, not $$k$$ for objects.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": true}, {"question": "A piano weighing $$200\\,\\mathrm{kg}$$ must be suspended by a single steel wire with breaking stress $$500\\,\\mathrm{MPa}$$. Conceptually, how do you find the minimum diameter, and what does the answer depend on? (4 steps)", "answer": "- Step 1: Force on wire = weight = $$mg \\approx 200 \\times 10 = 2000\\,\\mathrm{N}$$.\n- Step 2: The wire must not exceed breaking stress: $$\\sigma_{\\max} = F/A_{\\min}$$, so $$A_{\\min} = F/\\sigma_{\\max}$$.\n- Step 3: $$A_{\\min} \\sim 2000/(5\\times 10^8) = 4\\times 10^{-6}\\,\\mathrm{m^2}$$.\n- Step 4: Convert area to diameter: $$A = \\pi(d/2)^2 \\Rightarrow d = 2\\sqrt{A/\\pi} \\sim 2\\sqrt{1.3\\times 10^{-6}} \\sim 2.2\\,\\mathrm{mm}$$.\n\nAnswer depends only on load, material strength, and the geometry of a circular cross-section. Notice: $$d$$ scales as $$\\sqrt{F}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": false}, {"question": "Why does halving a wire's diameter (at fixed length and load) increase its extension by a factor of 4? (2 steps)", "answer": "- Step 1: Cross-section $$A = \\pi(d/2)^2$$ scales with $$d^2$$. Halving $$d$$ quarters $$A$$.\n- Step 2: Extension $$\\Delta L = FL/(AE)$$ scales as $$1/A$$. Quartering area means quadrupling extension.\n\nSo area-related parameters always scale geometrically with $$d^2$$. If the question says \"diameter doubled\", expect a factor of 4 reduction in extension and stress, holding everything else fixed.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": true}, {"question": "A rubber band stretches very easily at first, then becomes very stiff before breaking. What's happening at the molecular level? (3 steps)", "answer": "- Step 1: Natural rubber is a polymer — long tangled chains of carbon atoms held together by weak bonds between chains and stronger covalent bonds along the chain.\n- Step 2: Initial stretching mostly *uncoils* and aligns the chains — easy, because it doesn't stretch covalent bonds, just rearranges them. So small force produces large extension.\n- Step 3: Once chains are fully extended, further stretching requires stretching the actual covalent bonds along the backbone. These are stiff, so the rubber becomes very resistant — the curve bends upward sharply before breaking.\n\nThis is why rubber's force-extension curve is non-linear from the start — there's no Hooke region.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": true}, {"question": "Why does a rubber band's loading curve not coincide with its unloading curve (hysteresis)?", "answer": "- Step 1: Stretching reorients polymer chains, but reorienting requires overcoming internal friction between chains — work done against this friction is dissipated as heat, not stored elastically.\n- Step 2: On unloading, the chains slowly relax back, but they take a different path through configuration space, releasing less energy than was put in.\n- Step 3: The enclosed area between the loading and unloading curves equals the energy per unit volume dissipated as heat over one cycle.\n\nIf you rapidly stretch and release a rubber band several times then touch it to your lip, you'll feel it warm — that's the hysteresis loop in action.", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": true}, {"question": "Two identical springs of constant $$k = 100\\,\\mathrm{N\\,m^{-1}}$$ are joined: one student joins them in series, another in parallel. Both hang the same $$10\\,\\mathrm{N}$$ weight. Compare the total extensions without doing arithmetic. (3 steps)", "answer": "- Step 1: Series: $$k_{\\text{eff}} = k/2 = 50\\,\\mathrm{N\\,m^{-1}}$$. Parallel: $$k_{\\text{eff}} = 2k = 200\\,\\mathrm{N\\,m^{-1}}$$.\n- Step 2: Series extension: $$x_s = F/k_{\\text{eff}} = 10/50 = 0.20\\,\\mathrm{m}$$. Parallel: $$x_p = 10/200 = 0.05\\,\\mathrm{m}$$.\n- Step 3: Ratio: $$x_s/x_p = 4$$. Same components, same load, but series stretches 4 times as much.\n\nSwitching arrangement changes effective stiffness by a factor of 4, which propagates directly to extension.", "source": "Opus 4.7 ②", "_id": "opus_2_51", "judge_pick": false}, {"question": "Why is a vector diagram or unit conversion *always* worth doing on paper, even for \"easy\" problems?", "answer": "- Step 1: The most common source of physics-exam errors isn't conceptual misunderstanding — it's silent slips: missed factor of 1000, wrong radius/diameter, forgetting to convert $$\\mathrm{cm^3}$$ to $$\\mathrm{m^3}$$.\n- Step 2: Writing conversions in standard form ($$10^{-3}, 10^{-6}$$, etc.) keeps them visible and lets you spot inconsistencies.\n- Step 3: Examiners award method marks for correct working steps, not just the final number — so writing out conversions and substitutions protects partial credit even when arithmetic goes wrong.\n\nThe cost is seconds; the benefit is both accuracy and marks.", "source": "Opus 4.7 ②", "_id": "opus_2_52", "judge_pick": false}, {"question": "What's the difference in the *underlying microscopic picture* between elastic deformation in a metal and elastic deformation in a polymer like rubber?", "answer": "- Step 1: In a metal, elastic deformation stretches inter-atomic bonds — atoms move slightly off their equilibrium lattice positions. The restoring force comes from electron-cloud repulsion and attraction between charged ions. This is why $$E$$ is high and the relationship is linear.\n- Step 2: In rubber, elastic deformation is mostly *configurational* — long polymer chains uncoil and rearrange. The \"restoring force\" comes from entropy, not from bond-stretching: a tangled state is more probable than a stretched state, so when released the chains spontaneously return to a coiled mess.\n- Step 3: That's why metals have linear elasticity with high $$E$$, and rubbers have nonlinear, low-$$E$$, but enormous-strain elasticity.\n\nBond elasticity vs entropic elasticity — completely different physics, b const SK='physics_complete_video_flashcards';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
