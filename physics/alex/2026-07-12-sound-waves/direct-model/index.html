<script>
const DATA={"selected":[{"question":"What type of wave is sound, and how do its oscillations relate to energy transfer?","answer":"Sound is a **longitudinal wave**. The oscillations (vibrations of particles) are **parallel** to the direction of energy transfer. A vibrating source (e.g., a loudspeaker cone) creates regions of higher and lower pressure that travel through the medium to a receiver, transferring energy but not matter.","tags":["waves","sound","longitudinal"],"source":"GLM 5.2 ①","_id":"glm_1","judge_pick":true},{"question":"What does sound require in order to travel, and what is this called?","answer":"Sound needs a substance or **medium** (e.g., air) to travel through. It cannot travel through a vacuum because it needs particles to pass the vibrational energy from the source to the receiver.","tags":["waves","sound","medium"],"source":"GLM 5.2 ①","_id":"glm_2","judge_pick":true},{"question":"In a sound wave, what are compressions and rarefactions?","answer":"**Compressions** are regions where particles are pushed **closer together** (higher pressure). **Rarefactions** are regions where particles are **spread apart** (lower pressure). These alternate along the direction of travel in a longitudinal wave.","tags":["waves","sound","compressions","rarefactions"],"source":"GLM 5.2 ①","_id":"glm_3","judge_pick":true},{"question":"What type of wave is a sound wave, and how is it produced and detected?","answer":"Sound is a longitudinal wave. It is produced by something vibrating (e.g. a speaker cone moving in and out), creating pressure vibrations that are passed through the air to the ear. The air itself does not travel from the speaker to the ear; the vibrations transfer energy without transferring matter.","tags":["sound","longitudinal wave","energy transfer"],"source":"Kimi K3 ①","_id":"kimi_1","judge_pick":true},{"question":"What does sound need in order to travel, and what is the correct term for it?","answer":"Sound needs a substance made of particles (e.g. air) so that the vibrations/energy can be passed on. This substance is called a medium.","tags":["sound","medium"],"source":"Kimi K3 ①","_id":"kimi_2","judge_pick":true},{"question":"In a sound wave, what are compressions and rarefactions?","answer":"Compressions are the regions where particles are pushed together; rarefactions are the regions where particles are spread apart. A longitudinal wave such as sound is made of alternating compressions and rarefactions travelling along.","tags":["compressions","rarefactions","sound"],"source":"Kimi K3 ①","_id":"kimi_3","judge_pick":true},{"question":"What is the definition of a wave?","answer":"Vibrations/oscillations that transfer energy from place to place without transferring matter.","tags":["waves","definition"],"source":"MiniMax M3 ②","_id":"minimax2_1","judge_pick":true},{"question":"What is a transverse wave?","answer":"Oscillations are perpendicular to the direction of energy transfer. Examples: light/EM waves, ripples, rope.","tags":["waves","transverse"],"source":"MiniMax M3 ②","_id":"minimax2_2","judge_pick":true},{"question":"What is a longitudinal wave?","answer":"Oscillations are parallel to the direction of energy transfer. Example: sound.","tags":["waves","longitudinal"],"source":"MiniMax M3 ②","_id":"minimax2_3","judge_pick":true},{"question":"What type of wave is sound, and how do the particle oscillations relate to the direction of energy transfer?","answer":"Sound is a **longitudinal wave**. The particle oscillations are **parallel** to the direction of energy transfer, creating regions of compressions and rarefactions as the wave travels through a medium.","tags":["sound","longitudinal-wave","wave-types"],"source":"Qwen 3.7 Max ①","_id":"qwen_1","judge_pick":true},{"question":"What is meant by a 'medium' in the context of sound waves, and why is it required?","answer":"A **medium** is a substance (solid, liquid, or gas) containing particles through which sound can travel. Sound requires a medium because it transfers energy via particle vibrations — without particles, there is nothing to vibrate and pass the energy along.","tags":["sound","medium","wave-properties"],"source":"Qwen 3.7 Max ①","_id":"qwen_2","judge_pick":true},{"question":"Define 'compression' and 'rarefaction' in a longitudinal sound wave.","answer":"**Compression**: a region where particles are pushed close together (high pressure). $$\\text{Rarefaction}$$: a region where particles are spread apart (low pressure). These alternate as a longitudinal wave travels through a medium.","tags":["longitudinal-wave","compressions","rarefactions"],"source":"Qwen 3.7 Max ①","_id":"qwen_3","judge_pick":true}],"models":{"glm":{"label":"GLM 5.2 ①","cards":[{"question":"What type of wave is sound, and how do its oscillations relate to energy transfer?","answer":"Sound is a **longitudinal wave**. The oscillations (vibrations of particles) are **parallel** to the direction of energy transfer. A vibrating source (e.g., a loudspeaker cone) creates regions of higher and lower pressure that travel through the medium to a receiver, transferring energy but not matter.","tags":["waves","sound","longitudinal"],"source":"GLM 5.2 ①","_id":"glm_1"},{"question":"What does sound require in order to travel, and what is this called?","answer":"Sound needs a substance or **medium** (e.g., air) to travel through. It cannot travel through a vacuum because it needs particles to pass the vibrational energy from the source to the receiver.","tags":["waves","sound","medium"],"source":"GLM 5.2 ①","_id":"glm_2"},{"question":"In a sound wave, what are compressions and rarefactions?","answer":"**Compressions** are regions where particles are pushed **closer together** (higher pressure). **Rarefactions** are regions where particles are **spread apart** (lower pressure). These alternate along the direction of travel in a longitudinal wave.","tags":["waves","sound","compressions","rarefactions"],"source":"GLM 5.2 ①","_id":"glm_3"},{"question":"Define transverse and longitudinal waves, and give an example of each.","answer":"**Transverse wave:** oscillations are **perpendicular** to the direction of energy transfer. Examples: light/EM waves, ripples, rope waves.\\n**Longitudinal wave:** oscillations are **parallel** to the direction of energy transfer. Example: sound.","tags":["waves","transverse","longitudinal"],"source":"GLM 5.2 ①","_id":"glm_4"},{"question":"Define amplitude and state its unit.","answer":"**Amplitude (A)** is the maximum displacement from the equilibrium (middle) position. On a displacement–distance graph it is measured from the centre line to a peak (or trough). Unit: **metres (m)**. For sound, increasing amplitude increases volume.","tags":["waves","amplitude"],"source":"GLM 5.2 ①","_id":"glm_5"},{"question":"Define wavelength and state its unit.","answer":"**Wavelength (λ)** is the distance of one complete wave, e.g. from one peak to the next consecutive peak (or any two corresponding points). Unit: **metres (m)**.","tags":["waves","wavelength"],"source":"GLM 5.2 ①","_id":"glm_6"},{"question":"Define frequency and time period, give their units, and state the formula linking them.","answer":"**Frequency (f):** the number of waves that pass a point each second. Unit: **Hertz (Hz)**.\\n**Time period (T):** the time taken for one complete wave to pass a point. Unit: **seconds (s)**.\\nFormula: $$f = \\frac{1}{T}$$","tags":["waves","frequency","time-period"],"source":"GLM 5.2 ①","_id":"glm_7"},{"question":"State the wave speed equation and the units for each quantity.","answer":"$$v = f \\lambda$$ where:\\n- $$v$$ = wave speed in **m s⁻¹** (metres per second)\\n- $$f$$ = frequency in **Hz** (or **s⁻¹**)\\n- $$\\lambda$$ = wavelength in **m**\\nThis can be derived from $$\\text{speed} = \\frac{\\text{distance}}{\\text{time}}$$ by checking units: $$\\text{m} \\times \\text{s}^{-1} = \\text{m s}^{-1}$$.","tags":["waves","wave-speed","equation"],"source":"GLM 5.2 ①","_id":"glm_8"},{"question":"A wave has a time period of 0.6 s. Set up the calculation to find its frequency.","answer":"Using $$f = \\frac{1}{T}$$ with $$T = 0.6 \\text{ s}$$:\\n$$f = \\frac{1}{0.6}$$\\nCompleting the arithmetic: $$f = 1.67 \\text{ Hz}$$ (to 2 d.p.).","tags":["waves","frequency","calculation"],"source":"GLM 5.2 ①","_id":"glm_9"},{"question":"A microwave has wavelength 0.15 m and travels through space at $$3.00 \\times 10^8 \\text{ m s}^{-1}$$. Find its frequency.","answer":"1. Write the formula: $$v = f \\lambda$$\\n2. Rearrange: $$f = \\frac{v}{\\lambda}$$\\n3. Substitute: $$f = \\frac{3.00 \\times 10^8}{0.15}$$\\n4. Calculate: $$f = 2.0 \\times 10^9 \\text{ Hz}$$","tags":["waves","wave-speed","calculation","microwave"],"source":"GLM 5.2 ①","_id":"glm_10"},{"question":"A graph shows a sine wave. How would you sketch a new wave with the same amplitude but double the wavelength?","answer":"Draw a new sine wave with the **same vertical height** of peaks and troughs (same amplitude) but **stretched out twice as far horizontally**. One full cycle of the new wave occupies the same horizontal space as **two full cycles** of the original wave.","tags":["waves","graph","wavelength","amplitude"],"source":"GLM 5.2 ①","_id":"glm_11"},{"question":"Three methods for measuring the speed of sound are: (1) data logger with two microphones, (2) long-distance visual timing, (3) echo timing. Which is most accurate and why?","answer":"The **data logger / microphone** method is most accurate because it eliminates **human reaction time** error. Methods 2 and 3 rely on a person manually starting and stopping a stopwatch, so reaction time is the main source of uncertainty.","tags":["waves","sound","speed","methods","reaction-time"],"source":"GLM 5.2 ①","_id":"glm_12"}]},"kimi":{"label":"Kimi K3 ①","cards":[{"question":"What type of wave is a sound wave, and how is it produced and detected?","answer":"Sound is a longitudinal wave. It is produced by something vibrating (e.g. a speaker cone moving in and out), creating pressure vibrations that are passed through the air to the ear. The air itself does not travel from the speaker to the ear; the vibrations transfer energy without transferring matter.","tags":["sound","longitudinal wave","energy transfer"],"source":"Kimi K3 ①","_id":"kimi_1"},{"question":"What does sound need in order to travel, and what is the correct term for it?","answer":"Sound needs a substance made of particles (e.g. air) so that the vibrations/energy can be passed on. This substance is called a medium.","tags":["sound","medium"],"source":"Kimi K3 ①","_id":"kimi_2"},{"question":"In a sound wave, what are compressions and rarefactions?","answer":"Compressions are the regions where particles are pushed together; rarefactions are the regions where particles are spread apart. A longitudinal wave such as sound is made of alternating compressions and rarefactions travelling along.","tags":["compressions","rarefactions","sound"],"source":"Kimi K3 ①","_id":"kimi_3"},{"question":"State the defining difference between transverse and longitudinal waves, with the examples given for each.","answer":"Transverse wave: oscillations are perpendicular to the energy/wave direction (examples: light/EM waves, ripples, a rope). Longitudinal wave: oscillations are parallel to the energy/wave direction (example: sound). Both are oscillations/vibrations that transfer energy without transferring matter.","tags":["transverse","longitudinal","wave types"],"source":"Kimi K3 ①","_id":"kimi_4"},{"question":"Define amplitude and wavelength, and state the unit of wavelength.","answer":"Amplitude (A): the maximum displacement from the equilibrium (middle) position, i.e. from zero to the maximum. Wavelength (λ): the distance of one complete wave, e.g. between two consecutive peaks or any two consecutive corresponding points; unit: metres (m).","tags":["amplitude","wavelength","definitions"],"source":"Kimi K3 ①","_id":"kimi_5"},{"question":"Define frequency and time period, including the unit of each.","answer":"Frequency (f): the number of waves that pass a point each second; unit: hertz (Hz), meaning 'per second'. Time period (T): the time taken for one complete wave to pass a point; unit: seconds (s).","tags":["frequency","time period","definitions"],"source":"Kimi K3 ①","_id":"kimi_6"},{"question":"Write the formula linking frequency and time period, and explain it in words.","answer":"$$f = 1/T$$ — frequency (how many waves per second) is the reciprocal of the time period (the time for one complete wave). The two quantities are 'one over each other'.","tags":["frequency","time period","formula"],"source":"Kimi K3 ①","_id":"kimi_7"},{"question":"State the wave speed equation and show, using units, why it is consistent with speed = distance / time.","answer":"$$v = fλ$$ (wave speed = frequency × wavelength). Units check: wavelength λ is in metres (m) and frequency f is 'per second' ($$s^{-1}$$), so $$m × s^{-1} = m s^{-1}$$, which is exactly the unit of speed from distance ÷ time. For this to hold, λ must be in metres and f in hertz.","tags":["wave speed","formula","units"],"source":"Kimi K3 ①","_id":"kimi_8"},{"question":"A wave has a time period of 0.6 seconds. Determine the frequency. (The tutor's setup was $$T = 0.6 s$$ and $$f = 1/0.6$$; complete the calculation.)","answer":"Using $$f = 1/T$$: $$f = 1/0.6 ≈ 1.67 Hz$$ (about 1.7 Hz). Note: this final arithmetic is a completion of the tutor's setup — the tutor wrote $$T = 0.6 s$$ and $$f = 1/0.6$$ but left the numerical answer unfinished.","tags":["worked example","frequency","calculation"],"source":"Kimi K3 ①","_id":"kimi_9"},{"question":"A microwave of wavelength 0.15 m travels through space at 300,000,000 m/s. Calculate its frequency.","answer":"Follow the calculation steps: 1. Write the formula: $$v = fλ$$. 2. Rearrange: $$f = v/λ$$. 3. Substitute: $$f = 3.00 × 10^{8} / 0.15$$. 4. Calculate with units: $$f = 2.0 × 10^{9} Hz$$.","tags":["calculation","wave speed","microwave"],"source":"Kimi K3 ①","_id":"kimi_10"},{"question":"Given a graph of a sine wave, how do you sketch a second wave with the same amplitude but double the wavelength?","answer":"Draw a new sine wave whose peaks and troughs reach the same vertical levels as the original (same amplitude) but stretched out horizontally so each cycle is twice as long: one full cycle of the new wave occupies the same horizontal space as two full cycles of the original.","tags":["graphs","sketching","amplitude","wavelength"],"source":"Kimi K3 ①","_id":"kimi_11"},{"question":"Describe the three methods for measuring the speed of sound discussed in the lesson, state which one the student chose, and give the tutor's reason it is best.","answer":"1. Data logger: two microphones a fixed distance apart, connected to a computer, record the time difference for sound to travel between them; then speed = distance ÷ time. 2. Long-distance visual: start a stopwatch on seeing a simultaneous visual signal (e.g. a distant clap or explosion) and stop it on hearing the sound. 3. Echo: time the echo returning from a wall at a known distance (remember to double the distance for the round trip). The student chose method 1 (data logger) because 'it's more accurate' since it uses a computer; the tutor confirmed this, circling 'REACTION TIMES' as the key source of uncertainty in the human-timed methods 2 and 3.","tags":["speed of sound","methods","accuracy","reaction time"],"source":"Kimi K3 ①","_id":"kimi_12"}]},"minimax1":{"label":"MiniMax M3 ①","cards":[]},"minimax2":{"label":"MiniMax M3 ②","cards":[{"question":"What is the definition of a wave?","answer":"Vibrations/oscillations that transfer energy from place to place without transferring matter.","tags":["waves","definition"],"source":"MiniMax M3 ②","_id":"minimax2_1"},{"question":"What is a transverse wave?","answer":"Oscillations are perpendicular to the direction of energy transfer. Examples: light/EM waves, ripples, rope.","tags":["waves","transverse"],"source":"MiniMax M3 ②","_id":"minimax2_2"},{"question":"What is a longitudinal wave?","answer":"Oscillations are parallel to the direction of energy transfer. Example: sound.","tags":["waves","longitudinal"],"source":"MiniMax M3 ②","_id":"minimax2_3"},{"question":"Define wavelength (λ).","answer":"The distance of one complete wave (e.g., from peak to peak). Unit: meters (m).","tags":["waves","wavelength"],"source":"MiniMax M3 ②","_id":"minimax2_4"},{"question":"Define amplitude (A).","answer":"The maximum displacement from the equilibrium (middle) position.","tags":["waves","amplitude"],"source":"MiniMax M3 ②","_id":"minimax2_5"},{"question":"Define frequency (f) and state its unit.","answer":"The number of waves that pass a point each second. Unit: Hertz (Hz).","tags":["waves","frequency"],"source":"MiniMax M3 ②","_id":"minimax2_6"},{"question":"Define time period (T) and state its unit.","answer":"The time taken for one complete wave to pass a point. Unit: seconds (s).","tags":["waves","time-period"],"source":"MiniMax M3 ②","_id":"minimax2_7"},{"question":"What is the frequency-time period formula?","answer":"f = 1 / T","tags":["waves","formula"],"source":"MiniMax M3 ②","_id":"minimax2_8"},{"question":"What is the wave speed formula?","answer":"Wave Speed (v) = Frequency (f) × Wavelength (λ), or v = fλ","tags":["waves","formula"],"source":"MiniMax M3 ②","_id":"minimax2_9"},{"question":"How is the wave speed equation derived from speed = distance/time?","answer":"Using units: wavelength (m) × frequency (per second, s⁻¹) = m s⁻¹, which matches the unit of speed.","tags":["waves","derivation"],"source":"MiniMax M3 ②","_id":"minimax2_10"},{"question":"Worked example: A microwave has wavelength 0.15 m and travels at 300,000,000 m/s. Find the frequency.","answer":"v = fλ → f = v/λ = 300,000,000 / 0.15 = 2.0 × 10⁹ Hz","tags":["waves","calculation"],"source":"MiniMax M3 ②","_id":"minimax2_11"},{"question":"Which method for measuring the speed of sound is most accurate, and why?","answer":"The data logger method (two microphones connected to a computer) is most accurate because it eliminates human reaction time error, which is the main source of uncertainty in manual methods (long-distance visual and echo).","tags":["waves","sound","methods"],"source":"MiniMax M3 ②","_id":"minimax2_12"}]},"qwen":{"label":"Qwen 3.7 Max ①","cards":[{"question":"What type of wave is sound, and how do the particle oscillations relate to the direction of energy transfer?","answer":"Sound is a **longitudinal wave**. The particle oscillations are **parallel** to the direction of energy transfer, creating regions of compressions and rarefactions as the wave travels through a medium.","tags":["sound","longitudinal-wave","wave-types"],"source":"Qwen 3.7 Max ①","_id":"qwen_1"},{"question":"What is meant by a 'medium' in the context of sound waves, and why is it required?","answer":"A **medium** is a substance (solid, liquid, or gas) containing particles through which sound can travel. Sound requires a medium because it transfers energy via particle vibrations — without particles, there is nothing to vibrate and pass the energy along.","tags":["sound","medium","wave-properties"],"source":"Qwen 3.7 Max ①","_id":"qwen_2"},{"question":"Define 'compression' and 'rarefaction' in a longitudinal sound wave.","answer":"**Compression**: a region where particles are pushed close together (high pressure). $$\\text{Rarefaction}$$: a region where particles are spread apart (low pressure). These alternate as a longitudinal wave travels through a medium.","tags":["longitudinal-wave","compressions","rarefactions"],"source":"Qwen 3.7 Max ①","_id":"qwen_3"},{"question":"State the key difference between transverse and longitudinal waves, and give one example of each.","answer":"**Transverse wave**: oscillations are **perpendicular** to the direction of energy transfer (e.g., light/EM waves, ripples, rope waves). $$\\text{Longitudinal wave}$$: oscillations are **parallel** to the direction of energy transfer (e.g., sound).","tags":["transverse-wave","longitudinal-wave","wave-types"],"source":"Qwen 3.7 Max ①","_id":"qwen_4"},{"question":"Define amplitude, wavelength, frequency, and time period for a wave, including their SI units.","answer":"**Amplitude (A)**: maximum displacement from the equilibrium position (m). $$\\text{Wavelength }(\\lambda)$$: distance of one complete wave cycle, e.g., peak to peak (m). $$\\text{Frequency }(f)$$: number of waves passing a point per second (Hz). $$\\text{Time period }(T)$$: time taken for one complete wave to pass a point (s).","tags":["wave-properties","amplitude","wavelength","frequency","time-period"],"source":"Qwen 3.7 Max ①","_id":"qwen_5"},{"question":"State the equation linking frequency and time period, and explain the relationship.","answer":"$$f = \\frac{1}{T}$$ where $$f$$ is frequency in Hz and $$T$$ is time period in seconds. Frequency and time period are reciprocals: a higher frequency means a shorter time period, and vice versa.","tags":["wave-equations","frequency","time-period"],"source":"Qwen 3.7 Max ①","_id":"qwen_6"},{"question":"State the wave speed equation, including the units for each quantity.","answer":"$$v = f \\lambda$$ where $$v$$ is wave speed in $$\\text{m s}^{-1}$$, $$f$$ is frequency in $$\\text{Hz}$$ (or $$\\text{s}^{-1}$$), and $$\\lambda$$ is wavelength in $$\\text{m}$$. This can be derived from $$\\text{speed} = \\frac{\\text{distance}}{\\text{time}}$$ by noting that one wavelength passes in one time period.","tags":["wave-equations","wave-speed","units"],"source":"Qwen 3.7 Max ①","_id":"qwen_7"},{"question":"A wave has a time period of $$T = 0.6 \\text{ s}$$. Set up and complete the calculation to find its frequency. (Completion of tutor setup.)","answer":"Using $$f = \\frac{1}{T}$$: $$f = \\frac{1}{0.6}$$ $$f \\approx 1.67 \\text{ Hz}$$ The tutor set up $$T = 0.6 \\text{ s}$$ and $$f = \\frac{1}{0.6}$$; the arithmetic is completed here.","tags":["wave-equations","frequency","time-period","worked-example"],"source":"Qwen 3.7 Max ①","_id":"qwen_8"},{"question":"A microwave has a wavelength of $$0.15 \\text{ m}$$ and travels through space at $$3.00 \\times 10^8 \\text{ m/s}$$. Show how to calculate its frequency.","answer":"Rearrange $$v = f\\lambda$$ to $$f = \\frac{v}{\\lambda}$$. Substitute: $$f = \\frac{3.00 \\times 10^8}{0.15}$$ $$f = 2.0 \\times 10^9 \\text{ Hz}$$","tags":["wave-equations","wave-speed","microwave","calculation"],"source":"Qwen 3.7 Max ①","_id":"qwen_9"},{"question":"On a displacement–distance graph showing a sine wave, how would you sketch a second wave with the same amplitude but double the wavelength?","answer":"Draw a new sine wave with the **same vertical peak and trough heights** (same amplitude) but stretched horizontally so that **one full cycle occupies twice the horizontal distance** of the original. Equivalently, one cycle of the new wave spans the same horizontal space as two cycles of the original.","tags":["wave-graphs","amplitude","wavelength","sketching"],"source":"Qwen 3.7 Max ①","_id":"qwen_10"},{"question":"Describe three methods for measuring the speed of sound and state which is most accurate and why.","answer":"1. **Data logger with two microphones** at a fixed distance, recording the time difference electronically. 2. **Long-distance visual**: observe a simultaneous visual signal (e.g., explosion) and time the sound's arrival with a stopwatch. 3. **Echo**: make a sound and time the echo's return from a wall at a known distance. Method 1 is most accurate because it **eliminates human reaction time error**, which is the main source of inaccuracy in methods 2 and 3.","tags":["speed-of-sound","experimental-methods","accuracy","reaction-time"],"source":"Qwen 3.7 Max ①","_id":"qwen_11"},{"question":"In the speed-of-sound experiment discussion, which method did the student choose and what reason did the tutor give for the inaccuracy of the other two methods?","answer":"The student chose **Method 1 (data logger/microphones)** because it is more accurate. The tutor confirmed this and explained that Methods 2 (long-distance visual) and 3 (echo) are less accurate due to **human reaction times** — the delay between seeing/hearing an event and pressing the stopwatch introduces significant uncertainty.","tags":["speed-of-sound","experimental-methods","reaction-time","student-choice"],"source":"Qwen 3.7 Max ①","_id":"qwen_12"}]}},"meta":{"glm":{"model":"z-ai/glm-5.2","provider":"OpenRouter","temperature":0.2,"in_tokens":9819,"out_tokens":1594,"reasoning_chars":0,"content_chars":4575,"cost_eur":0.0207602,"elapsed_s":31.119},"kimi":{"model":"moonshotai/kimi-k3","provider":"OpenRouter","temperature":0.2,"in_tokens":9698,"out_tokens":4269,"reasoning_chars":0,"content_chars":5197,"cost_eur":5e-05,"elapsed_s":102.319},"minimax1":{"model":"minimax/minimax-m3","provider":"OpenRouter","temperature":0.2,"in_tokens":9663,"out_tokens":5000,"reasoning_chars":0,"content_chars":0,"cost_eur":0.00887154,"elapsed_s":42.206},"minimax2":{"model":"minimax/minimax-m3","provider":"OpenRouter","temperature":0.1,"in_tokens":9522,"out_tokens":553,"reasoning_chars":0,"content_chars":2172,"cost_eur":0.0035202,"elapsed_s":5.745},"qwen":{"model":"qwen/qwen3.7-max","provider":"OpenRouter","temperature":0.2,"in_tokens":10019,"out_tokens":6154,"reasoning_chars":0,"content_chars":5526,"cost_eur":0.042009475,"elapsed_s":113.314}}};
const SK='alex_sound_waves_jul12_direct_selection_v1';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try the optional backend first; if unavailable, fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('./__notion_unavailable__',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
