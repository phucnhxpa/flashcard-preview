<script>
const DATA={"selected":[{"question":"List the seven bands of the electromagnetic spectrum in order of increasing frequency.","answer":"Radio waves, microwaves, infrared radiation, visible light, ultraviolet, X-rays, gamma rays.","source":"GLM 5.2 ①","_id":"glm_1_1","tags":["EM Spectrum","Waves"],"judge_pick":true},{"question":"What are the uses and dangers of X-rays mentioned in the lesson?","answer":"Uses: imaging bones and industrial X-rays of machinery. Dangers: ionizing, can cause cells to mutate and lead to cancer.","source":"GLM 5.2 ①","_id":"glm_1_5","tags":["EM Spectrum","Uses","Dangers"],"judge_pick":true},{"question":"Define the terms luminous, transparent, opaque, and translucent.","answer":"Luminous: objects that emit their own light (e.g., sun, lightbulbs). Transparent: light goes through them (transmitted). Opaque: opposite of transparent, does not let light through, reflects most and absorbs some. Translucent: halfway between transparent and opaque, lets some light through (e.g., a cloudy bathroom window).","source":"GLM 5.2 ①","_id":"glm_1_9","tags":["Light","Definitions"],"judge_pick":true},{"question":"As frequency increases across the electromagnetic spectrum, what happens to wavelength?","answer":"Wavelength decreases. Frequency and wavelength are inversely related.","source":"Qwen 3.7 Max ①","_id":"qwen_1_2","tags":["electromagnetic-spectrum","frequency","wavelength"],"judge_pick":true},{"question":"State the uses and dangers of gamma rays as described in the lesson.","answer":"Uses: Treating cancer; sterilising surgical equipment (killing bacteria). Dangers: Ionising — can cause cell mutations and cancer.","source":"Qwen 3.7 Max ①","_id":"qwen_1_6","tags":["electromagnetic-spectrum","gamma-rays","uses","dangers"],"judge_pick":true},{"question":"What is the normal, and what is the law of reflection?","answer":"The normal is an imaginary line at $$90°$$ to the surface at the point where the ray hits. The law of reflection states that the angle of incidence equals the angle of reflection, both measured from the normal.","source":"Qwen 3.7 Max ①","_id":"qwen_1_10","tags":["reflection","normal","law-of-reflection"],"judge_pick":true},{"question":"Are electromagnetic waves transverse or longitudinal?","answer":"Transverse. (Sound is longitudinal.)","source":"MiniMax M3 ②","_id":"minimax_2_3","tags":["EM spectrum","waves"],"judge_pick":true},{"question":"Why can humans only see visible light (according to the evolution explanation given)?","answer":"Life began in water. Visible light is the part of the EM spectrum least absorbed by water, so early eyes evolved to detect it. Other frequencies are absorbed by water.","source":"MiniMax M3 ②","_id":"minimax_2_7","tags":["EM spectrum","biology link"],"judge_pick":true},{"question":"What is the normal, and what is the law of reflection?","answer":"Normal: an imaginary line drawn at 90° to the reflecting surface. Law of reflection: angle of incidence = angle of reflection (both measured from the normal).","source":"MiniMax M3 ②","_id":"minimax_2_11","tags":["reflection","laws"],"judge_pick":true},{"question":"Why is ultraviolet dangerous, as described?","answer":"Its frequency and energy are high enough to remove electrons from atoms, which makes it dangerous to us.","source":"Kimi K3 ②","_id":"kimi_2_4","tags":["ultraviolet","dangers"],"judge_pick":true},{"question":"What is the difference between a wavefront and a ray?","answer":"A wavefront joins the same point on every wave (e.g. the peak). A ray is a line with an arrow showing the direction the wave/energy travels. Rays are always perpendicular to wavefronts ($$90^\circ$$).","source":"Kimi K3 ②","_id":"kimi_2_8","tags":["rays","wavefronts"],"judge_pick":true},{"question":"How are curved mirrors used in funny mirrors, satellite dishes and reflecting telescopes?","answer":"Funny mirrors: a curved (non-flat) surface reflects light at odd angles, distorting the image. Satellite dish: parabola shape reflects everything to a single point. Reflecting telescope: a curved (concave) mirror gathers a large area of light and focuses it into a smaller area; the flat (plane) mirror then points the image into the eye.","source":"Kimi K3 ②","_id":"kimi_2_12","tags":["curved mirrors","telescope","satellite dish"],"judge_pick":true}],"models":{"glm_1":{"label":"GLM 5.2 ①","cards":[{"question":"List the seven bands of the electromagnetic spectrum in order of increasing frequency.","answer":"Radio waves, microwaves, infrared radiation, visible light, ultraviolet, X-rays, gamma rays.","source":"GLM 5.2 ①","_id":"glm_1_1","tags":["EM Spectrum","Waves"]},{"question":"How does the wavelength of electromagnetic waves change as frequency increases?","answer":"As frequency increases, wavelength decreases. For example, radio waves have the longest wavelength and lowest frequency, while gamma rays have the shortest wavelength and highest frequency.","source":"GLM 5.2 ①","_id":"glm_1_2","tags":["EM Spectrum","Waves"]},{"question":"What type of wave are electromagnetic waves?","answer":"Transverse waves.","source":"GLM 5.2 ①","_id":"glm_1_3","tags":["EM Spectrum","Waves"]},{"question":"Why is ultraviolet radiation dangerous to humans?","answer":"It has a high enough frequency and high enough energy that it can remove electrons from atoms, which makes it dangerous to us.","source":"GLM 5.2 ①","_id":"glm_1_4","tags":["EM Spectrum","Dangers"]},{"question":"What are the uses and dangers of X-rays mentioned in the lesson?","answer":"Uses: imaging bones and industrial X-rays of machinery. Dangers: ionizing, can cause cells to mutate and lead to cancer.","source":"GLM 5.2 ①","_id":"glm_1_5","tags":["EM Spectrum","Uses","Dangers"]},{"question":"What are the uses and dangers of gamma rays mentioned in the lesson?","answer":"Uses: treating cancer and sterilizing equipment (killing bacteria on surgical tools). Dangers: ionizing, can cause cancer from cell mutations.","source":"GLM 5.2 ①","_id":"glm_1_6","tags":["EM Spectrum","Uses","Dangers"]},{"question":"According to the lesson's evolutionary explanation, why can humans only see visible light and not other parts of the electromagnetic spectrum?","answer":"Life started as creatures in the water. Visible light is the least absorbed by water, whereas other frequencies tend to get absorbed. Evolution happened based around the light that was most available underwater, so our eyes developed to detect visible light.","source":"GLM 5.2 ①","_id":"glm_1_7","tags":["EM Spectrum","Evolution"]},{"question":"What is the relationship between rays and wavefronts, and what do they represent?","answer":"A wavefront is the same point on every wave (e.g., the peak). A ray shows the direction that the energy is travelling. Rays are always perpendicular to wavefronts, at an angle of $$90^\circ$$.","source":"GLM 5.2 ①","_id":"glm_1_8","tags":["Waves","Wavefronts","Rays"]},{"question":"Define the terms luminous, transparent, opaque, and translucent.","answer":"Luminous: objects that emit their own light (e.g., sun, lightbulbs). Transparent: light goes through them (transmitted). Opaque: opposite of transparent, does not let light through, reflects most and absorbs some. Translucent: halfway between transparent and opaque, lets some light through (e.g., a cloudy bathroom window).","source":"GLM 5.2 ①","_id":"glm_1_9","tags":["Light","Definitions"]},{"question":"What is the 'normal' in a reflection diagram, and what is the law of reflection?","answer":"The normal is an imaginary line at $$90^\circ$$ to the surface, from which all angles are measured. The law of reflection states that the angle of incidence is equal to the angle of reflection.","source":"GLM 5.2 ①","_id":"glm_1_10","tags":["Light","Reflection"]},{"question":"What is the difference between specular and diffuse reflection?","answer":"Specular reflection occurs on a completely smooth surface, producing a regular reflected pattern. Diffuse reflection occurs on a rough surface, where light rays hit at slightly different angles and are scattered in different directions.","source":"GLM 5.2 ①","_id":"glm_1_11","tags":["Light","Reflection"]},{"question":"How do curved mirrors, satellite dishes, and reflecting telescopes use reflection?","answer":"Curved (bent) mirrors reflect light at different angles to make images look weird. Satellite dishes use a parabola shape to reflect everything to a single point. Reflecting telescopes use a curved (concave) mirror to gather a larger area of light and focus it into a smaller area, and a flat (plane) mirror to point the image into the observer's eye.","source":"GLM 5.2 ①","_id":"glm_1_12","tags":["Light","Reflection","Applications"]}]},"qwen_1":{"label":"Qwen 3.7 Max ①","cards":[{"question":"List the seven bands of the electromagnetic spectrum in order of increasing frequency.","answer":"Radio waves, microwaves, infrared radiation, visible light, ultraviolet, X-rays, gamma rays.","source":"Qwen 3.7 Max ①","_id":"qwen_1_1","tags":["electromagnetic-spectrum","order"]},{"question":"As frequency increases across the electromagnetic spectrum, what happens to wavelength?","answer":"Wavelength decreases. Frequency and wavelength are inversely related.","source":"Qwen 3.7 Max ①","_id":"qwen_1_2","tags":["electromagnetic-spectrum","frequency","wavelength"]},{"question":"What type of wave are all electromagnetic waves, and what does this mean about their oscillations?","answer":"Electromagnetic waves are transverse waves, meaning their oscillations are perpendicular to the direction of energy transfer.","source":"Qwen 3.7 Max ①","_id":"qwen_1_3","tags":["electromagnetic-waves","transverse"]},{"question":"State the uses and dangers of ultraviolet radiation as described in the lesson.","answer":"Uses: Not explicitly detailed in this section. Dangers: High enough frequency and energy to remove electrons from atoms (ionising), making it dangerous to humans.","source":"Qwen 3.7 Max ①","_id":"qwen_1_4","tags":["electromagnetic-spectrum","ultraviolet","uses","dangers"]},{"question":"State the uses and dangers of X-rays as described in the lesson.","answer":"Uses: Imaging bones; industrial X-ray imaging of machinery. Dangers: Ionising — can cause cell mutations and cancer.","source":"Qwen 3.7 Max ①","_id":"qwen_1_5","tags":["electromagnetic-spectrum","x-rays","uses","dangers"]},{"question":"State the uses and dangers of gamma rays as described in the lesson.","answer":"Uses: Treating cancer; sterilising surgical equipment (killing bacteria). Dangers: Ionising — can cause cell mutations and cancer.","source":"Qwen 3.7 Max ①","_id":"qwen_1_6","tags":["electromagnetic-spectrum","gamma-rays","uses","dangers"]},{"question":"Using the water-absorption explanation, why did humans evolve to see only visible light and not other parts of the electromagnetic spectrum?","answer":"Life started in water. Visible light is the part of the electromagnetic spectrum least absorbed by water, so it was the most available light underwater. Evolution favoured eyes that detected this most available light, while other frequencies were absorbed by water.","source":"Qwen 3.7 Max ①","_id":"qwen_1_7","tags":["electromagnetic-spectrum","visible-light","evolution","water-absorption"]},{"question":"What is the difference between a ray and a wavefront, and what is the angle between them?","answer":"A wavefront is a line connecting the same point on every wave (e.g. the peak). A ray shows the direction the wavefronts (and energy) are travelling. Rays are always perpendicular ($$90°$$) to wavefronts.","source":"Qwen 3.7 Max ①","_id":"qwen_1_8","tags":["waves","rays","wavefronts"]},{"question":"Define luminous, transparent, opaque, and translucent objects, giving an example where stated.","answer":"Luminous: objects that emit their own light (e.g. sun, lightbulbs, candles, fire). Transparent: light is transmitted through them (e.g. clear glass). Opaque: does not let light through; reflects most and absorbs some (e.g. a pink T-shirt absorbs all colours except pink, which is reflected). Translucent: lets some light through but not clearly (e.g. a cloudy bathroom window).","source":"Qwen 3.7 Max ①","_id":"qwen_1_9","tags":["light","luminous","transparent","opaque","translucent"]},{"question":"What is the normal, and what is the law of reflection?","answer":"The normal is an imaginary line at $$90°$$ to the surface at the point where the ray hits. The law of reflection states that the angle of incidence equals the angle of reflection, both measured from the normal.","source":"Qwen 3.7 Max ①","_id":"qwen_1_10","tags":["reflection","normal","law-of-reflection"]},{"question":"What is the difference between specular and diffuse reflection?","answer":"Specular reflection occurs on a smooth surface, producing a regular reflected pattern (e.g. a mirror forming a clear image). Diffuse reflection occurs on a rough surface, where light hits at many slightly different angles and scatters in different directions, so no clear image is formed.","source":"Qwen 3.7 Max ①","_id":"qwen_1_11","tags":["reflection","specular","diffuse"]},{"question":"Explain the role of the curved mirror and the plane mirror in a reflecting telescope, and why satellite dishes have a parabolic shape.","answer":"In a reflecting telescope, the large curved (concave) mirror gathers light from a large area and focuses it into a smaller area. The flat (plane) mirror then directs the focused image into the observer's eye. Satellite dishes are parabolic in shape so that they reflect all incoming signals to a single focal point.","source":"Qwen 3.7 Max ①","_id":"qwen_1_12","tags":["reflection","curved-mirrors","satellite-dish","telescope","parabola"]}]},"minimax_2":{"label":"MiniMax M3 ②","cards":[{"question":"List the 7 bands of the electromagnetic spectrum in order of increasing frequency.","answer":"Radio waves → Microwaves → Infrared → Visible light → Ultraviolet → X-rays → Gamma rays.","source":"MiniMax M3 ②","_id":"minimax_2_1","tags":["EM spectrum","waves"]},{"question":"As frequency increases along the EM spectrum, what happens to wavelength?","answer":"Wavelength decreases. The orders are reversed: ascending frequency = descending wavelength.","source":"MiniMax M3 ②","_id":"minimax_2_2","tags":["EM spectrum","waves"]},{"question":"Are electromagnetic waves transverse or longitudinal?","answer":"Transverse. (Sound is longitudinal.)","source":"MiniMax M3 ②","_id":"minimax_2_3","tags":["EM spectrum","waves"]},{"question":"Why is ultraviolet radiation dangerous to humans?","answer":"It has high enough frequency/energy to remove electrons from atoms — it is ionising.","source":"MiniMax M3 ②","_id":"minimax_2_4","tags":["EM spectrum","dangers"]},{"question":"State one use and the danger of X-rays.","answer":"Uses: imaging bones; industrial X-ray of machinery. Danger: ionising — can mutate cells and cause cancer.","source":"MiniMax M3 ②","_id":"minimax_2_5","tags":["EM spectrum","X-rays"]},{"question":"State two uses and the danger of gamma rays.","answer":"Uses: treat cancer; sterilise hospital equipment (kill bacteria on surgical tools). Danger: ionising — can cause cancer via cell mutations.","source":"MiniMax M3 ②","_id":"minimax_2_6","tags":["EM spectrum","gamma"]},{"question":"Why can humans only see visible light (according to the evolution explanation given)?","answer":"Life began in water. Visible light is the part of the EM spectrum least absorbed by water, so early eyes evolved to detect it. Other frequencies are absorbed by water.","source":"MiniMax M3 ②","_id":"minimax_2_7","tags":["EM spectrum","biology link"]},{"question":"Distinguish between a ray and a wavefront.","answer":"A wavefront joins the same point on every wave (e.g. a crest). A ray shows the direction the wave is travelling. Rays are always perpendicular (90°) to wavefronts.","source":"MiniMax M3 ②","_id":"minimax_2_8","tags":["waves","diagrams"]},{"question":"Define luminous, transparent and opaque.","answer":"Luminous: gives off its own light (e.g. Sun, bulb, candle). Transparent: light passes through, mostly transmitted. Opaque: light does not pass through — most reflected, some absorbed.","source":"MiniMax M3 ②","_id":"minimax_2_9","tags":["light","definitions"]},{"question":"What does translucent mean?","answer":"Halfway between transparent and opaque — lets some light through but scatters it (e.g. a cloudy bathroom window).","source":"MiniMax M3 ②","_id":"minimax_2_10","tags":["light","definitions"]},{"question":"What is the normal, and what is the law of reflection?","answer":"Normal: an imaginary line drawn at 90° to the reflecting surface. Law of reflection: angle of incidence = angle of reflection (both measured from the normal).","source":"MiniMax M3 ②","_id":"minimax_2_11","tags":["reflection","laws"]},{"question":"Compare specular and diffuse reflection, and give one example of a curved-mirror use.","answer":"Specular: smooth surface → regular reflection (clear image). Diffuse: rough surface → light scattered in many directions. Curved-mirror uses: distorting 'funny' mirrors; satellite dishes (parabolic — reflect all signals to one point); reflecting telescopes (curved mirror gathers light to a focus, flat mirror directs it into the eye).","source":"MiniMax M3 ②","_id":"minimax_2_12","tags":["reflection","applications"]}]},"kimi_2":{"label":"Kimi K3 ②","cards":[{"question":"List the seven bands of the electromagnetic spectrum in order of increasing frequency.","answer":"Radio waves → microwaves → infrared → visible light → ultraviolet → X-rays → gamma rays.","source":"Kimi K3 ②","_id":"kimi_2_1","tags":["EM spectrum","order"]},{"question":"How does wavelength change as frequency increases across the EM spectrum?","answer":"Wavelength decreases as frequency increases: radio waves have the longest wavelength / lowest frequency; gamma rays have the shortest wavelength / highest frequency.","source":"Kimi K3 ②","_id":"kimi_2_2","tags":["EM spectrum","frequency","wavelength"]},{"question":"Are electromagnetic waves transverse or longitudinal? What about sound?","answer":"EM waves are transverse; sound is longitudinal.","source":"Kimi K3 ②","_id":"kimi_2_3","tags":["waves","transverse"]},{"question":"Why is ultraviolet dangerous, as described?","answer":"Its frequency and energy are high enough to remove electrons from atoms, which makes it dangerous to us.","source":"Kimi K3 ②","_id":"kimi_2_4","tags":["ultraviolet","dangers"]},{"question":"Give the spoken uses and dangers of X-rays.","answer":"Uses: imaging bones and industrial imaging of machinery. Dangers: ionising — can mutate cells and cause cancer.","source":"Kimi K3 ②","_id":"kimi_2_5","tags":["X-rays","uses","dangers"]},{"question":"Give the spoken uses and dangers of gamma rays.","answer":"Uses: treating cancer and sterilising equipment (killing bacteria on surgical tools). Dangers: ionising — causes cancer from mutations.","source":"Kimi K3 ②","_id":"kimi_2_6","tags":["gamma rays","uses","dangers"]},{"question":"Using the water-absorption graph, explain why humans evolved to see only visible light.","answer":"Life started in water, so eyes evolved around the light most available underwater. Visible light is least absorbed by water while other frequencies are absorbed, so we see visible light and nothing else.","source":"Kimi K3 ②","_id":"kimi_2_7","tags":["visible light","evolution","absorption"]},{"question":"What is the difference between a wavefront and a ray?","answer":"A wavefront joins the same point on every wave (e.g. the peak). A ray is a line with an arrow showing the direction the wave/energy travels. Rays are always perpendicular to wavefronts ($$90^\circ$$).","source":"Kimi K3 ②","_id":"kimi_2_8","tags":["rays","wavefronts"]},{"question":"Define luminous, transparent, opaque and translucent.","answer":"Luminous: gives off its own light (sun, lightbulb, candle, fire). Transparent: light is transmitted through (a little reflected). Opaque: lets no light through — reflects most and absorbs some (we see the reflected colour). Translucent: halfway between — lets some light through, like a cloudy bathroom window.","source":"Kimi K3 ②","_id":"kimi_2_9","tags":["light","materials"]},{"question":"What is the normal, and what is the law of reflection?","answer":"The normal is an imaginary line at $$90^\circ$$ to the surface; angles are always measured from it. Law of reflection: angle of incidence = angle of reflection, $$\theta_i = \theta_r$$ (true for a plane/flat mirror).","source":"Kimi K3 ②","_id":"kimi_2_10","tags":["reflection","normal"]},{"question":"Compare specular and diffuse reflection.","answer":"Specular: smooth surface gives a regular reflected pattern, so a clear image is seen. Diffuse: rough surface — each ray meets a differently angled normal, so light is scattered in different directions.","source":"Kimi K3 ②","_id":"kimi_2_11","tags":["reflection","specular","diffuse"]},{"question":"How are curved mirrors used in funny mirrors, satellite dishes and reflecting telescopes?","answer":"Funny mirrors: a curved (non-flat) surface reflects light at odd angles, distorting the image. Satellite dish: parabola shape reflects everything to a single point. Reflecting telescope: a curved (concave) mirror gathers a large area of light and focuses it into a smaller area; the flat (plane) mirror then points the image into the eye.","source":"Kimi K3 ②","_id":"kimi_2_12","tags":["curved mirrors","telescope","satellite dish"]}]}},"meta":{"glm_1":{"model":"z-ai/glm-5.2","provider":"OpenRouter","temperature":0.2,"in_tokens":5388,"out_tokens":2454,"reasoning_chars":7312,"content_chars":3844,"cost_eur":null,"elapsed_s":28.842734,"finish_reason":"stop","attempt":1},"qwen_1":{"model":"qwen/qwen3.7-max","provider":"OpenRouter","temperature":0.2,"in_tokens":5396,"out_tokens":4270,"reasoning_chars":13822,"content_chars":4399,"cost_eur":null,"elapsed_s":79.928582,"finish_reason":"stop","attempt":1},"minimax_2":{"model":"minimax/minimax-m3","provider":"OpenRouter","temperature":0.1,"in_tokens":5357,"out_tokens":4283,"reasoning_chars":15542,"content_chars":3005,"cost_eur":null,"elapsed_s":36.915976,"finish_reason":"stop","attempt":2},"kimi_2":{"model":"moonshotai/kimi-k3","provider":"OpenRouter","temperature":0.1,"in_tokens":5349,"out_tokens":1981,"reasoning_chars":5108,"content_chars":3601,"cost_eur":null,"elapsed_s":52.228474,"finish_reason":"stop","attempt":2}}};
const SK='alex_em_spectrum_jul16_direct_selection_v1';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  return _ntbCopy();
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
