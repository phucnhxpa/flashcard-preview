of its conditions. For polynomials, continuity is guaranteed, so we can apply the theorem directly. If $f$ were not continuous (e.g., a rational function with a vertical asymptote in the interval), the theorem would not apply, and we could not guarantee a root exists just from the sign change.", "source": "MiniMax ②", "_id": "minimax_2_53", "judge_pick": false}, {"question": "For the composite function $g(f(a)) = 5$ where $g(x) = 3 + 2\\ln x$ and $f(x) = \\frac{2x}{3x-5}$, explain why we substitute $f(a)$ into $g$ (i.e., apply $f$ first). (1 step)", "answer": "- The notation $g(f(a))$ means \"apply $f$ to $a$, then apply $g$ to the result.\" This is the definition of composite function evaluation: work from the innermost function outward.\n\nSo:\n1. First find $f(a) = \\frac{2a}{3a-5}$\n2. Then evaluate $g(f(a)) = 3 + 2\\ln\\left(\\frac{2a}{3a-5}\\right)$\n\nThis is different from $f(g(a))$, which would give a different result. The order matters: $g \\circ f$ means $f$ then $g$.", "source": "MiniMax ②", "_id": "minimax_2_54", "judge_pick": false}, {"question": "In the transformation $y = |f(x)|$, explain what happens to points below the $x$-axis. (1 step)", "answer": "- The transformation $y = |f(x)|$ takes any point with $y < 0$ and reflects it above the $x$-axis. Specifically:\n- If $f(x) \\geq 0$, then $|f(x)| = f(x)$ — the point stays where it is.\n- If $f(x) < 0$, then $|f(x)| = -f(x)$ — the $y$-coordinate is multiplied by $-1$, reflecting it through the $x$-axis.\n\nVisually, any part of the graph below the $x$-axis is \"folded up\" to be above it. The result is always non-negative.", "source": "MiniMax ②", "_id": "minimax_2_55", "judge_pick": false}, {"question": "When simplifying $\\int_4^8 g(x) \\, dx$ where $g(x) = \\frac{2x^2 - 5x + 8}{x-2}$, why do we combine $6\\ln 6 - 6\\ln 2$ into $6\\ln 3$ rather than leaving them separate? (1 step)", "answer": "- Using the logarithm law $\\ln A - \\ln B = \\ln(A/B)$:\n$$6\\ln 6 - 6\\ln 2 = 6(\\ln 6 - \\ln 2) = 6\\ln\\left(\\frac{6}{2}\\right) = 6\\ln 3$$\n\nThis simplifies the answer to the form $\\alpha + \\beta \\ln 3$ as required by the question. The constant $\\beta$ can then be read off directly as 6. If we left it as $6\\ln 6 - 6\\ln 2$, we wouldn't be able to identify $\\beta$ cleanly.", "source": "MiniMax ②", "_id": "minimax_2_56", "judge_pick": false}, {"question": "In the question with $y = a - |2x - b|$, if the two graphs intersect at $x = 5$ and $x = -3$, why must we check which branch of each modulus applies at each intersection point? (1 step)", "answer": "- The modulus function $|2x - b|$ behaves differently on different sides of its vertex at $x = b/2$:\n- For $x > b/2$: $|2x - b| = 2x - b$ (right descending branch)\n- For $x < b/2$: $|2x - b| = -(2x - b) = b - 2x$ (left ascending branch)\n\nSimilarly for $|x + 1|$:\n- For $x > -1$: $|x + 1| = x + 1$\n- For $x < -1$: $|x + 1| = -(x + 1) = -x - 1$\n\nAt $x = 5$, we might be on different branches than at $x = -3$. Using the wrong branch gives the wrong equation. The graph shows you which branch to use at each intersection point.", "source": "MiniMax ②", "_id": "minimax_2_57", "judge_pick": true}, {"question": "What is the key conceptual insight for solving questions involving products like $2e^{3\\sin x}\\cos x$ where one factor can never be zero? (1 step)", "answer": "- The insight is: **\"If a product equals zero and one factor can never be zero, the other factor must be zero.\"**\n\nIn $f'(x) = 2e^{3\\sin x}(3\\cos^2 x - \\sin x) = 0$:\n- $2$ is a constant, never zero\n- $e^{3\\sin x} > 0$ always (exponential is always positive)\n\nTherefore, we can immediately simplify to $3\\cos^2 x - \\sin x = 0$ without worrying about the exponential factor. This is a powerful problem-solving principle in many A-Level questions.", "source": "MiniMax ②", "_id": "minimax_2_58", "judge_pick": false}], "count": 59}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "When sketching $$y = 2|x-5| + 10$$ from scratch using a chain of transformations starting from $$y = x$$, what is the order of operations and where does the vertex end up at each stage? (5 steps)", "answer": "- Step 1: Start with $$y = x$$ — straight line through origin, vertex/anchor at $$(0,0)$$.\n- Step 2: Apply modulus to get $$y = |x|$$ — reflect the part below the $$x$$-axis above it, forming a V-shape with vertex at $$(0,0)$$.\n- Step 3: Replace $$x$$ with $$x-5$$ to get $$y = |x-5|$$ — horizontal shift right by 5 (because inside-the-function changes act in the opposite direction). Vertex now at $$(5,0)$$.\n- Step 4: Multiply outside by 2 to get $$y = 2|x-5|$$ — vertical stretch factor 2. The vertex stays at $$x=5$$ but $$y$$-coordinate stretches; since min was 0, $$2 \\cdot 0 = 0$$, so vertex stays $$(5,0)$$.\n- Step 5: Add 10 outside to get $$y = 2|x-5| + 10$$ — vertical shift up by 10. Vertex moves to $$(5, 10)$$.\n\nThe takeaway: inside changes act on $$x$$ in reverse; outside changes act on $$y$$ directly; modulus cannot produce $$y < 0$$, so the minimum stays at the bottom of the V.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "What is the **fast shortcut** for finding the vertex of any modulus graph of the form $$y = a|bx - c| + d$$, and why does it work?", "answer": "Set the inside of the modulus to zero: $$bx - c = 0 \\Rightarrow x = c/b$$, then substitute back to get $$y = d$$. So vertex is $$(c/b, d)$$. The reason: $$|bx-c| \\geq 0$$ with equality only when $$bx-c=0$$. Multiplying by $$a>0$$ preserves where the minimum occurs (since $$a \\cdot 0 = 0$$), and adding $$d$$ shifts the minimum value up to $$d$$. So the minimum point of the V is exactly where the inside is zero.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "Why must any solution obtained from a particular case of a modulus inequality be checked against that case's region of validity? (3 steps)", "answer": "- Step 1: When you split $$|f(x)| > g(x)$$ into Case 1 ($$f(x) \\geq 0$$, so $$|f| = f$$) and Case 2 ($$f(x) < 0$$, so $$|f| = -f$$), each piece of algebra is only valid on its piece of the real line.\n- Step 2: A candidate $$x$$ found from Case 1's algebra may actually lie in Case 2's region — there it solves a *different* equation than the one you wrote down, so it's spurious.\n- Step 3: The valid solution set from Case 1 is the algebraic answer **intersected with** the case region. Same for Case 2. Then take the union of the two filtered sets.\n\nSkipping this filter is the most common modulus-inequality error.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "Solve $$2|x-5| + 10 > 6x$$ by case-splitting. Show how each case's region eliminates spurious roots. (4 steps)", "answer": "- Step 1: Split on the sign of $$x-5$$.\n+ Case 1: $$x \\geq 5$$ → $$|x-5| = x-5$$.\n+ Case 2: $$x < 5$$ → $$|x-5| = -(x-5) = 5-x$$.\n- Step 2: Case 1 algebra: $$2(x-5) + 10 > 6x \\Rightarrow 2x > 6x \\Rightarrow 0 > 4x \\Rightarrow x < 0$$. But the case requires $$x \\geq 5$$. The intersection $$\\{x \\geq 5\\} \\cap \\{x<0\\}$$ is empty. **No solution from Case 1.**\n- Step 3: Case 2 algebra: $$2(5-x) + 10 > 6x \\Rightarrow 20 - 2x > 6x \\Rightarrow 20 > 8x \\Rightarrow x < 5/2$$. Intersect with $$x < 5$$: gives $$x < 5/2$$.\n- Step 4: Combine cases: solution set is $$x < 5/2$$.\n\nThe lesson: if you forget to intersect with $$x \\geq 5$$, you'd wrongly include $$x < 0$$ as part of the answer.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "A point $$P$$ on $$y = f(x)$$ is mapped under $$y = 3f(x-2)$$. In what order are the inside and outside transformations applied to $$P$$, and what is the image of $$P=(5,10)$$? (3 steps)", "answer": "- Step 1: Identify the two transformations: inside $$x \\to x-2$$ is a horizontal shift right by 2 (acts on $$x$$-coordinate); outside multiplication by 3 is a vertical stretch (acts on $$y$$-coordinate).\n- Step 2: Inside and outside changes act on independent coordinates, so order doesn't matter for image of a single point. Apply each to its own coordinate: $$x \\to x+2$$, $$y \\to 3y$$.\n- Step 3: $$P=(5,10) \\to (5+2, 3 \\cdot 10) = (7, 30)$$.\n\nMemory hook: inside changes do the *opposite* of what they look like ($$x-2$$ shifts *right* not left), outside changes do *what they look like* (multiply $$y$$ by 3).", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": true}, {"question": "Under $$y = f(2x)$$, what happens to a point on the graph of $$y=f(x)$$, and what is the image of $$(-4, -3)$$? (2 steps)", "answer": "- Step 1: $$y = f(2x)$$ is a horizontal stretch with scale factor $$1/2$$ (the \"inside-2\" makes the graph **half** as wide horizontally). Each $$x$$-coordinate is halved; $$y$$ unchanged.\n- Step 2: $$(-4, -3) \\to (-4/2, -3) = (-2, -3)$$.\n\nCommon pitfall: thinking \"multiply $$x$$ by 2\" — but the inside transformation is the opposite of what it looks like. To keep $$f$$ at the same input, $$x$$ must shrink by 2.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "Under $$y = \\tfrac{1}{2}|f(x)|$$, what is the image of $$(-4,-3)$$, and in what order are the modulus and the scaling applied? (3 steps)", "answer": "- Step 1: First apply the modulus inside: any negative $$y$$ flips above the $$x$$-axis, so $$y = -3$$ becomes $$y = 3$$. The $$x$$-coordinate is unchanged: point is now $$(-4, 3)$$.\n- Step 2: Then apply the outside factor of $$1/2$$: vertical scale by $$1/2$$, so $$y = 3$$ becomes $$y = 3/2$$.\n- Step 3: Final image: $$(-4, 3/2)$$.\n\nOrder matters here because $$\\tfrac{1}{2}|f|$$ means modulus first, then halve. If you halved first you'd get $$|y| = |-3/2| = 3/2$$ — same answer because $$|cx| = |c||x|$$. But conceptually, always read inside-out.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "For the graph of $$y = a - |2x - b|$$ with $$a > b > 0$$, derive (i) the maximum point, (ii) the $$y$$-intercept, (iii) the $$x$$-intercepts. (3 steps)", "answer": "- Step 1: **Maximum point** — the modulus is non-negative, so $$y$$ is maximised when $$|2x-b|=0$$, i.e. $$x = b/2$$, giving $$y = a$$. Max at $$\\left(\\tfrac{b}{2}, a\\right)$$.\n- Step 2: **$$y$$-intercept** — set $$x=0$$: $$y = a - |0 - b| = a - b$$. Since $$a > b$$, this is positive. Point $$(0, a-b)$$.\n- Step 3: **$$x$$-intercepts** — set $$y = 0$$: $$|2x-b| = a$$, so $$2x - b = \\pm a$$.\n+ $$2x - b = a \\Rightarrow x = (a+b)/2$$\n+ $$2x - b = -a \\Rightarrow x = (b-a)/2$$ (negative, since $$a > b$$).\n\nThe graph is an inverted V with vertex above the $$x$$-axis, two $$x$$-intercepts straddling the vertex.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "When two modulus graphs $$y = |x+1|$$ and $$y = a - |2x-b|$$ intersect at given $$x$$-values, why must you sketch both graphs to decide which \"branches\" to equate, and what does the choice depend on? (3 steps)", "answer": "- Step 1: Each modulus has two linear branches: $$|x+1| = x+1$$ when $$x \\geq -1$$, and $$=-(x+1)$$ when $$x < -1$$. Similarly for the other modulus.\n- Step 2: At any intersection point, you must use the branch that's actually active there. Sketching reveals which side of each vertex the point lies on. This determines whether the modulus opens up positively or negatively in the algebra.\n- Step 3: At $$x = 5$$ (right of both vertices): both moduli are on their positive linear branch. At $$x = -3$$ (left of both vertices): both are on their negative branch. Different combinations of branches → different equations → wrong answer if branches mis-assigned.\n\nThe slogan: \"look at the graph to determine cases.\"", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "Two graphs $$y=|x+1|$$ and $$y=a-|2x-b|$$ intersect at $$x=-3$$ and $$x=5$$. Set up the two equations and solve for $$a, b$$. (4 steps)", "answer": "- Step 1: At $$x=5$$: $$|x+1| = 6$$ (positive branch). The vertex of the second graph is at $$x = b/2 > 0$$, and $$x=5$$ is right of it (descending branch), so $$|2x-b| = 2x - b$$. Equation: $$x+1 = a - (2x-b)$$ at $$x=5$$: $$6 = a - (10-b) \\Rightarrow a + b = 16$$.\n- Step 2: At $$x=-3$$: on negative branch of $$|x+1|$$ ($$x < -1$$), so $$|x+1| = -(x+1)$$. Also $$x=-3$$ is left of $$x=b/2$$ (since $$b>0$$), on the ascending left branch of the inverted V, so $$|2x-b| = -(2x-b) = b-2x$$. Equation: $$-(x+1) = a - (b-2x)$$ at $$x=-3$$: $$2 = a - b + 2(-3) \\Rightarrow a - b = 8$$.\n- Step 3: Solve simultaneously: adding gives $$2a = 24 \\Rightarrow a = 12$$; subtracting gives $$2b = 8 \\Rightarrow b = 4$$.\n- Step 4: Verify $$a > b > 0$$: $$12 > 4 > 0$$ ✓.\n\nThe pattern: graph-then-algebra, never algebra-blind.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "What is the decision rule for choosing between **polynomial division** and **partial fractions** when faced with a rational function?", "answer": "Compare the degrees of numerator and denominator. If $$\\deg(\\text{num}) \\geq \\deg(\\text{den})$$, you must do polynomial long division first — this gives a polynomial quotient plus a proper remainder fraction, which can then go to partial fractions. If $$\\deg(\\text{num}) < \\deg(\\text{den})$$, you can go straight to partial fractions. The reason is partial fractions only works on **proper** fractions; an improper fraction must first be reduced to proper form before further manipulation.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "Write $$g(x) = \\dfrac{2x^2 - 5x + 8}{x-2}$$ in the form $$Ax + B + \\dfrac{C}{x-2}$$ using polynomial long division. (4 steps)", "answer": "- Step 1: Check degrees: numerator deg 2, denominator deg 1, so $$\\deg(\\text{num}) > \\deg(\\text{den})$$ — divide.\n- Step 2: First step of division: $$2x^2 \\div x = 2x$$. Multiply $$(x-2) \\cdot 2x = 2x^2 - 4x$$. Subtract: $$(2x^2 - 5x + 8) - (2x^2 - 4x) = -x + 8$$.\n- Step 3: Next step: $$-x \\div x = -1$$. Multiply $$(x-2)(-1) = -x + 2$$. Subtract: $$(-x+8) - (-x+2) = 6$$. Remainder is 6, division stops.\n- Step 4: Result: $$2x^2 - 5x + 8 = (x-2)(2x-1) + 6$$, so $$g(x) = 2x - 1 + \\dfrac{6}{x-2}$$. Thus $$A=2, B=-1, C=6$$.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "Why is the result $$\\int \\dfrac{1}{ax+b}\\, dx = \\dfrac{1}{a}\\ln|ax+b| + C$$, and why does the $$\\dfrac{1}{a}$$ factor appear? (3 steps)", "answer": "- Step 1: Recall the basic result $$\\int \\dfrac{1}{u}\\, du = \\ln|u| + C$$. We want to use this with $$u = ax+b$$.\n- Step 2: Then $$du = a\\, dx$$, so $$dx = \\dfrac{1}{a}du$$. Substitute: $$\\int \\dfrac{1}{ax+b}dx = \\int \\dfrac{1}{u} \\cdot \\dfrac{1}{a}\\, du = \\dfrac{1}{a}\\ln|u| + C$$.\n- Step 3: Re-substituting: $$= \\dfrac{1}{a}\\ln|ax+b| + C$$. The $$1/a$$ factor compensates for the chain rule: differentiating $$\\ln|ax+b|$$ gives $$\\dfrac{a}{ax+b}$$, so the antiderivative of $$\\dfrac{1}{ax+b}$$ must include $$1/a$$ to cancel the $$a$$.\n\nCommon error: forgetting the $$1/a$$ entirely. If $$a=1$$ it doesn't bite, but for $$\\int \\dfrac{1}{3x+1}dx$$, the answer is $$\\dfrac{1}{3}\\ln|3x+1| + C$$, not $$\\ln|3x+1| + C$$.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": true}, {"question": "Evaluate $$\\int_4^8 \\left(2x - 1 + \\dfrac{6}{x-2}\\right) dx$$ and combine the result into the form $$\\alpha + \\beta \\ln 3$$. (4 steps)", "answer": "- Step 1: Antiderivative term-by-term: $$\\int 2x\\, dx = x^2$$, $$\\int (-1)\\, dx = -x$$, $$\\int \\dfrac{6}{x-2}\\, dx = 6\\ln|x-2|$$ (here $$a=1$$). Total: $$x^2 - x + 6\\ln|x-2|$$.\n- Step 2: Evaluate at upper limit $$x=8$$: $$64 - 8 + 6\\ln 6 = 56 + 6\\ln 6$$.\n- Step 3: Evaluate at lower limit $$x=4$$: $$16 - 4 + 6\\ln 2 = 12 + 6\\ln 2$$.\n- Step 4: Subtract: $$(56 + 6\\ln 6) - (12 + 6\\ln 2) = 44 + 6\\ln 6 - 6\\ln 2 = 44 + 6\\ln(6/2) = 44 + 6\\ln 3$$. So $$\\alpha = 44, \\beta = 6$$.\n\nThe takeaway: always combine $$\\ln A - \\ln B$$ into $$\\ln(A/B)$$ before reading off the final form — examiners want a single $$\\ln$$.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "When simplifying a sum of algebraic fractions like $$\\dfrac{2x^2 - 32}{3x^2+7x-20} + \\dfrac{8}{3x-5}$$, why is **factoring first** strategically critical, rather than rushing to a common denominator?", "answer": "Step 1: Always look for shared factors before combining. Here $$2x^2 - 32 = 2(x-4)(x+4)$$ and $$3x^2 + 7x - 20 = (3x-5)(x+4)$$. The first fraction simplifies via cancelling $$(x+4)$$ to $$\\dfrac{2(x-4)}{3x-5}$$. Step 2: Now both fractions share the same denominator $$3x-5$$, and adding is trivial: $$\\dfrac{2(x-4)+8}{3x-5} = \\dfrac{2x}{3x-5}$$. Step 3: If you'd cross-multiplied without factoring, you'd get a quartic numerator over a cubic denominator that needs cleaning up — an algebraic mess. The principle: the question is *designed* to factor cleanly; factor first, simplify, then combine.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": true}, {"question": "Show that $$f(x) = \\dfrac{2x}{3x-5}$$ is a decreasing function for $$x > 2$$ using calculus. Why is showing $$f'(x) < 0$$ at one point not enough? (3 steps)", "answer": "- Step 1: Apply the quotient rule with $$u = 2x$$ ($$u' = 2$$) and $$v = 3x-5$$ ($$v' = 3$$): $$f'(x) = \\dfrac{2(3x-5) - 2x(3)}{(3x-5)^2} = \\dfrac{6x - 10 - 6x}{(3x-5)^2} = \\dfrac{-10}{(3x-5)^2}$$.\n- Step 2: For all $$x > 2$$: $$(3x-5)^2 > 0$$ (squared, never zero on this domain since $$3 \\cdot 2 - 5 = 1 \\neq 0$$). The numerator $$-10$$ is fixed and negative. So $$f'(x) < 0$$ **for all** $$x > 2$$.\n- Step 3: Why not just plug in one $$x$$? \"Decreasing\" is a global property of the function on its domain — at one point $$f'$$ might be negative while elsewhere it could be zero or positive (giving a local turning point). The rigorous proof must show the sign holds **everywhere** on the stated domain.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "When converting $$y = kx^n$$ into a straight-line form, what variables do you plot on the axes, and what are the gradient and intercept of the resulting line? (3 steps)", "answer": "- Step 1: Take logarithm of both sides (any base, but typically $$\\log_{10}$$): $$\\log y = \\log(kx^n) = \\log k + n\\log x$$.\n- Step 2: Identify variables: let $$Y = \\log y$$ and $$X = \\log x$$. The equation becomes $$Y = nX + \\log k$$.\n- Step 3: This is a straight line. Plot $$\\log y$$ on the vertical axis vs $$\\log x$$ on the horizontal axis. Gradient is $$n$$ (the power); $$Y$$-intercept is $$\\log k$$ (so $$k = $$ base$$^{\\text{intercept}}$$).\n\nThe big idea: power laws become linear in log-log axes; exponential laws become linear in semi-log axes (only $$y$$ logged).", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "When converting $$y = ka^x$$ (exponential model) into a straight-line form, what's different from the power-law case, and what are the gradient and intercept?", "answer": "Step 1: Take log: $$\\log y = \\log k + x\\log a$$. Step 2: Plot $$Y = \\log y$$ on vertical, but $$X = x$$ (NOT logged) on horizontal — that's the difference: only one axis is logged. Step 3: This gives $$Y = (\\log a) x + \\log k$$. Gradient is $$\\log a$$ (so $$a = $$ base$$^{\\text{gradient}}$$), $$Y$$-intercept is $$\\log k$$. Use the same base of log on both sides; the unknowns come out by exponentiating with that same base.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "Sketch the line $$\\log_{10} y = -3\\log_{10} x + 6$$ derived from $$y = 10^6 x^{-3}$$ ($$x>0$$), showing intercepts. (3 steps)", "answer": "- Step 1: This is a linear equation $$Y = -3X + 6$$ in the variables $$X = \\log_{10}x$$, $$Y = \\log_{10}y$$. Gradient is $$-3$$ (steep, negative), $$Y$$-intercept is 6.\n- Step 2: $$Y$$-intercept (when $$X=0$$, i.e. $$x=1$$): $$Y = 6$$, so point $$(0, 6)$$ in log-log axes.\n- Step 3: $$X$$-intercept (when $$Y=0$$, i.e. $$y=1$$): $$0 = -3X + 6 \\Rightarrow X = 2$$, so point $$(2, 0)$$ in log-log axes.\n\nThe graph is a straight line in log-log space from $$(0,6)$$ down to $$(2,0)$$, defined only for $$x > 0$$.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "Convert the linear log relationship $$\\log_3 N = 2t + 4$$ into the form $$N = ab^t$$. What's the trick to identify $$a$$ and $$b$$? (3 steps)", "answer": "- Step 1: Exponentiate both sides with base 3 (the same base as the log): $$N = 3^{2t+4}$$.\n- Step 2: Split the exponent using $$3^{A+B} = 3^A \\cdot 3^B$$: $$N = 3^4 \\cdot 3^{2t} = 81 \\cdot 3^{2t}$$.\n- Step 3: To match the form $$ab^t$$, rewrite $$3^{2t} = (3^2)^t = 9^t$$. So $$N = 81 \\cdot 9^t$$, giving $$a = 81, b = 9$$.\n\nKey insight: to match $$b^t$$ exactly (with $$t$$ alone in the exponent), you must collect all the \"$$t$$\"s into a single base: $$3^{2t} \\to 9^t$$. Always use the base of the log to exponentiate.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "Convert $$\\log_{10} D = 1.04 + 0.38T$$ into the form $$D = ab^T$$ to 4 s.f. (3 steps)", "answer": "- Step 1: Raise 10 to both sides: $$D = 10^{1.04 + 0.38T} = 10^{1.04} \\cdot 10^{0.38T}$$.\n- Step 2: Compute $$a = 10^{1.04} \\approx 10.96$$ (4 s.f.). This is the value at $$T=0$$.\n- Step 3: For $$b$$, write $$10^{0.38T} = (10^{0.38})^T$$, so $$b = 10^{0.38} \\approx 2.399$$ (4 s.f.). Result: $$D \\approx 10.96 \\cdot 2.399^T$$.\n\nWhen given a problem in this form, it is faster to keep the log form for solving for $$T$$ later (e.g., $$\\log_{10}D = 1.04 + 0.38T$$ avoids messy exponents).", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "Given $$\\log_{10}D = 1.04 + 0.38T$$, find the value of $$T$$ when $$D = 45000$$ (to 3 s.f.). What's the strategic shortcut? (3 steps)", "answer": "- Step 1: Don't go via the $$ab^T$$ form (more arithmetic). Stay in log form: $$\\log_{10}(45000) = 1.04 + 0.38T$$.\n- Step 2: Compute $$\\log_{10}(45000) = \\log_{10}(4.5 \\times 10^4) = 4 + \\log_{10}(4.5) \\approx 4 + 0.6532 = 4.6532$$.\n- Step 3: Rearrange: $$T = (4.6532 - 1.04)/0.38 \\approx 3.6132/0.38 \\approx 9.51$$ (3 s.f.).\n\nThe lesson: when an equation is given in log form, often the *cleanest* way to solve for the exponent is to stay in log form, not to translate to $$ab^T$$ first.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "State the four standard log laws used to manipulate logarithmic expressions, and give a one-line explanation of why each works.", "answer": "Step 1: $$\\log(ab) = \\log a + \\log b$$ — multiplying inside corresponds to adding outside, because $$b^x \\cdot b^y = b^{x+y}$$. Step 2: $$\\log(a/b) = \\log a - \\log b$$ — division becomes subtraction by the same exponent law. Step 3: $$\\log(a^n) = n\\log a$$ — repeated multiplication ($$a^n$$) maps to repeated addition ($$n\\log a$$). Step 4: $$b^{\\log_b x} = x$$ — exponentiating undoes logarithm of the same base; they are inverse operations. Together these let you turn products/quotients/powers into sums/differences/multiples on the log side.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "Why is taking the logarithm a routine step whenever the unknown appears in the exponent of an equation like $$1.05^T = 2$$? (3 steps)", "answer": "- Step 1: When $$T$$ is in the exponent, ordinary algebraic manipulation can't \"extract\" it — you can't divide both sides to free $$T$$.\n- Step 2: Logs are designed to bring exponents down: $$\\log(1.05^T) = T \\log(1.05)$$, by the third log law.\n- Step 3: The equation becomes linear in $$T$$: $$T\\log 1.05 = \\log 2 \\Rightarrow T = \\log 2 / \\log 1.05$$. Now ordinary division solves it. Any base of log works; the ratio is the same.\n\nThis pattern is universal for \"$$T$$ in exponent\" problems.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "State the three forms of the double-angle identity for $$\\cos 2A$$. Why does having three forms matter when simplifying expressions?", "answer": "Step 1: The three forms are: $$\\cos 2A = \\cos^2 A - \\sin^2 A$$, $$\\cos 2A = 2\\cos^2 A - 1$$, $$\\cos 2A = 1 - 2\\sin^2 A$$. Each is obtained from the others using $$\\sin^2 + \\cos^2 = 1$$. Step 2: Each form is useful in different contexts. If your expression contains $$\\cos^2 A$$ alone, use $$\\cos 2A = 2\\cos^2 A - 1$$ (rearranged: $$\\cos^2 A = \\tfrac{1}{2}(1 + \\cos 2A)$$) to bring in $$\\cos 2A$$. If it contains $$\\sin^2 A$$ alone, use the third form. If it has both, the first form may help. Step 3: The strategic question is always: \"what does my target expression contain?\" Then pick the form that introduces those terms.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "State the key rearrangements of the double-angle identities used for **substitution** (when you want to convert $$\\sin^2 A$$, $$\\cos^2 A$$, or $$\\sin A \\cos A$$ into double-angle form).", "answer": "Step 1: $$\\cos^2 A = \\tfrac{1}{2}(1 + \\cos 2A)$$ — derived from $$\\cos 2A = 2\\cos^2 A - 1$$. Step 2: $$\\sin^2 A = \\tfrac{1}{2}(1 - \\cos 2A)$$ — derived from $$\\cos 2A = 1 - 2\\sin^2 A$$. Step 3: $$\\sin A \\cos A = \\tfrac{1}{2}\\sin 2A$$ — derived from $$\\sin 2A = 2\\sin A \\cos A$$. These three are the workhorses for any \"convert to double-angle form\" question; memorise them as a set.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "Convert $$f(x) = 8\\sin x\\cos x + 4\\cos^2 x - 3$$ into the form $$a\\sin 2x + b\\cos 2x + c$$. Why is $$\\cos^2 x \\to \\tfrac{1}{2}(1+\\cos 2x)$$ the right substitution here, not $$\\cos 2x = \\cos^2 x - \\sin^2 x$$? (4 steps)", "answer": "- Step 1: For $$8\\sin x\\cos x$$: use $$\\sin 2x = 2\\sin x\\cos x$$, so $$8\\sin x\\cos x = 4 \\cdot 2\\sin x\\cos x = 4\\sin 2x$$.\n- Step 2: For $$4\\cos^2 x$$: target form needs $$\\cos 2x$$. Use $$\\cos^2 x = \\tfrac{1}{2}(1+\\cos 2x)$$ → $$4\\cos^2 x = 2 + 2\\cos 2x$$. Why this form? Because it directly produces $$\\cos 2x$$ plus a constant, fitting the target with one term per double angle. The form $$\\cos 2x = \\cos^2 x - \\sin^2 x$$ wouldn't help — it expresses $$\\cos 2x$$ in terms of $$\\cos^2 x, \\sin^2 x$$, which is the wrong direction.\n- Step 3: Combine: $$f(x) = 4\\sin 2x + 2 + 2\\cos 2x - 3 = 4\\sin 2x + 2\\cos 2x - 1$$.\n- Step 4: Read off $$a = 4, b = 2, c = -1$$.\n\nThe strategic principle: *act with respect to the target form*. Choose the identity that introduces what the answer needs.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": true}, {"question": "State the four variants of the $$R$$-formula for converting $$a\\sin x + b\\cos x$$ (and three similar combinations) into a single trig term. (4 steps)", "answer": "- Step 1: $$a\\sin x + b\\cos x = R\\sin(x + \\alpha)$$, with $$R\\cos\\alpha = a, R\\sin\\alpha = b$$.\n- Step 2: $$a\\sin x - b\\cos x = R\\sin(x - \\alpha)$$, with $$R\\cos\\alpha = a, R\\sin\\alpha = b$$.\n- Step 3: $$a\\cos x + b\\sin x = R\\cos(x - \\alpha)$$, with $$R\\cos\\alpha = a, R\\sin\\alpha = b$$.\n- Step 4: $$a\\cos x - b\\sin x = R\\cos(x + \\alpha)$$, with $$R\\cos\\alpha = a, R\\sin\\alpha = b$$. In every case: $$R = \\sqrt{a^2 + b^2}$$ and $$\\tan\\alpha = b/a$$ with $$0 < \\alpha < \\pi/2$$.\n\nMemory hook: + with sin → +α; − with sin → −α; for cos, signs flip (+ → −α, − → +α).", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "Derive the formulas $$R = \\sqrt{a^2+b^2}$$ and $$\\tan\\alpha = b/a$$ used in writing $$a\\sin x + b\\cos x = R\\sin(x+\\alpha)$$. (4 steps)", "answer": "- Step 1: Expand the target: $$R\\sin(x+\\alpha) = R\\sin x\\cos\\alpha + R\\cos x\\sin\\alpha$$.\n- Step 2: Compare coefficients with $$a\\sin x + b\\cos x$$: coefficient of $$\\sin x$$ → $$R\\cos\\alpha = a$$; coefficient of $$\\cos x$$ → $$R\\sin\\alpha = b$$.\n- Step 3: Square both equations and add: $$R^2\\cos^2\\alpha + R^2\\sin^2\\alpha = a^2 + b^2 \\Rightarrow R^2 = a^2 + b^2 \\Rightarrow R = \\sqrt{a^2 + b^2}$$ (taking positive root since $$R>0$$).\n- Step 4: Divide them: $$\\dfrac{R\\sin\\alpha}{R\\cos\\alpha} = \\dfrac{b}{a} \\Rightarrow \\tan\\alpha = b/a$$.\n\nThis derivation is the *mechanism* — re-derive it in any exam if you've forgotten the formula.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "Write $$4\\sin 2x + 2\\cos 2x$$ in the form $$R\\sin(2x + \\alpha)$$ with $$R>0$$, $$0<\\alpha<\\pi/2$$. (3 steps)", "answer": "- Step 1: Match coefficients: $$R\\cos\\alpha = 4, R\\sin\\alpha = 2$$.\n- Step 2: $$R = \\sqrt{4^2 + 2^2} = \\sqrt{20} = 2\\sqrt 5$$.\n- Step 3: $$\\tan\\alpha = 2/4 = 1/2 \\Rightarrow \\alpha \\approx 0.464$$ rad. Result: $$4\\sin 2x + 2\\cos 2x = 2\\sqrt 5 \\sin(2x + 0.464)$$.\n\nThe clean compact form makes max/min/zero analysis trivial — that's the point of $$R$$-form.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "Why is the maximum of $$R\\sin(\\text{anything}) + c$$ always equal to $$R + c$$, and at what argument does it occur?", "answer": "Step 1: The function $$\\sin(\\theta)$$ takes every value in $$[-1, 1]$$ as $$\\theta$$ varies, with maximum 1 at $$\\theta = \\pi/2 + 2n\\pi$$. Step 2: So $$R\\sin(\\theta)$$ has maximum $$R \\cdot 1 = R$$ at the same $$\\theta$$ values; adding $$c$$ shifts everything up: max of $$R\\sin\\theta + c$$ is $$R + c$$. Step 3: This converts a complicated trig expression's max problem into trivial inspection — if you know $$R$$ and $$c$$, you immediately know the max. Similarly the minimum is $$-R + c$$, attained when $$\\theta = -\\pi/2$$ (or $$3\\pi/2$$).", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "For $$f(x) = R\\sin(2x + \\alpha) + c$$, find the second-smallest positive $$x$$ at which $$f$$ attains its maximum. Why isn't the first solution always the answer? (4 steps)", "answer": "- Step 1: Maximum occurs when $$\\sin(2x+\\alpha) = 1$$, i.e. $$2x+\\alpha = \\pi/2 + 2n\\pi$$ for integer $$n$$.\n- Step 2: Solve for $$x$$: $$x = \\dfrac{\\pi/2 - \\alpha + 2n\\pi}{2}$$, giving an arithmetic progression of solutions with common difference $$\\pi$$ (since $$2x$$ scales the period from $$2\\pi$$ to $$\\pi$$).\n- Step 3: The smallest positive $$x$$ corresponds to $$n=0$$: $$x_1 = (\\pi/2 - \\alpha)/2$$. The next is $$n=1$$: $$x_2 = x_1 + \\pi$$.\n- Step 4: With $$\\alpha \\approx 0.464$$: $$x_1 \\approx 0.553$$ and $$x_2 \\approx 3.70$$. So the *second*-smallest positive $$x$$ is approximately 3.70.\n\nThe pitfall: assuming \"max\" only happens once; sin has infinitely many maxima, repeated periodically. List enumerated $$n$$ values to find the right one.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": true}, {"question": "State the compound-angle (addition) formulas for $$\\sin(A\\pm B)$$, $$\\cos(A\\pm B)$$, and $$\\tan(A\\pm B)$$.", "answer": "Step 1: $$\\sin(A \\pm B) = \\sin A \\cos B \\pm \\cos A \\sin B$$ — sin opens up symmetrically with $$\\pm$$. Step 2: $$\\cos(A \\pm B) = \\cos A \\cos B \\mp \\sin A \\sin B$$ — cos opens up with **opposite** sign in the second term (mnemonic: \"cos has the change\"). Step 3: $$\\tan(A \\pm B) = \\dfrac{\\tan A \\pm \\tan B}{1 \\mp \\tan A \\tan B}$$ — top and bottom signs are opposite. These are the foundation of $$R$$-formula and many trig manipulations.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "For the equation $$\\sqrt{2}\\sin(x + 45°) = \\cos(x - 60°)$$, what is the \"match-structure → substitute\" trick to solve $$\\sqrt{2}\\sin(2\\theta) = \\cos(2\\theta - 105°)$$? (4 steps)", "answer": "- Step 1: Notice the second equation has the same shape as the first: $$\\sqrt{2}\\sin(\\text{something}) = \\cos(\\text{something else})$$. Match the inputs: we want $$x + 45° = 2\\theta$$ and $$x - 60° = 2\\theta - 105°$$.\n- Step 2: From the first match: $$x = 2\\theta - 45°$$. Substitute into the second: $$x - 60° = (2\\theta - 45°) - 60° = 2\\theta - 105°$$ ✓ — both matches are consistent.\n- Step 3: So whatever value of $$\\tan x$$ solves the first equation, that *same* relation holds for $$x = 2\\theta - 45°$$. Given part (a) shows $$\\tan x = -2-\\sqrt 3$$: $$\\tan(2\\theta - 45°) = -2-\\sqrt 3$$.\n- Step 4: $$\\tan 105° = -\\tan 75° = -(2+\\sqrt 3)$$ matches, so $$2\\theta - 45° = 105° + 180°n$$, giving $$\\theta = 75°, 165°$$ (in $$0 \\leq \\theta < 180°$$).\n\nThe strategic move: don't re-prove from scratch; map the new equation onto the known result by substitution.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "Why does $$(\\cos\\theta + \\sin\\theta)(\\cos\\theta - \\sin\\theta)$$ simplify to $$\\cos 2\\theta$$, and how is this useful in trig identity proofs?", "answer": "Step 1: Recognise this as a difference of squares: $$(A+B)(A-B) = A^2 - B^2$$ with $$A = \\cos\\theta, B = \\sin\\theta$$. Step 2: So the product equals $$\\cos^2\\theta - \\sin^2\\theta$$, which is exactly the standard double-angle identity $$\\cos 2\\theta$$. Step 3: This is a key recognition pattern: any time you see $$(\\cos x \\pm \\sin x)$$ paired with $$(\\cos x \\mp \\sin x)$$, you can collapse them to $$\\cos 2x$$ and dodge a multi-step simplification. Useful for proving identities where a $$2\\theta$$ appears on the other side.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "Why does $$\\sec 2\\theta \\cdot \\cos 2\\theta = 1$$ — and how is this used to simplify $$(2 + \\sec 2\\theta)\\cos 2\\theta$$?", "answer": "Step 1: By definition $$\\sec x = 1/\\cos x$$, so $$\\sec 2\\theta = 1/\\cos 2\\theta$$. Multiplying: $$\\sec 2\\theta \\cdot \\cos 2\\theta = (1/\\cos 2\\theta) \\cdot \\cos 2\\theta = 1$$. Step 2: When you see $$(2 + \\sec 2\\theta) \\cdot \\cos 2\\theta$$, expand: $$2\\cos 2\\theta + \\sec 2\\theta \\cdot \\cos 2\\theta = 2\\cos 2\\theta + 1$$. Step 3: This converts a product involving $$\\sec$$ into a clean linear form in $$\\cos 2\\theta$$ — a typical trick for trig identity proofs.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": true}, {"question": "Show that $$\\dfrac{3\\sin\\theta\\cos\\theta}{\\cos\\theta + \\sin\\theta} = (2 + \\sec 2\\theta)(\\cos\\theta - \\sin\\theta)$$ can be written as $$3\\sin 2\\theta - 4\\cos 2\\theta = 2$$. (5 steps)", "answer": "- Step 1: Multiply both sides by $$(\\cos\\theta + \\sin\\theta)$$: $$3\\sin\\theta\\cos\\theta = (2 + \\sec 2\\theta)(\\cos\\theta - \\sin\\theta)(\\cos\\theta + \\sin\\theta)$$.\n- Step 2: The product $$(\\cos\\theta - \\sin\\theta)(\\cos\\theta + \\sin\\theta) = \\cos^2\\theta - \\sin^2\\theta = \\cos 2\\theta$$ (difference of squares + double-angle).\n- Step 3: RHS becomes $$(2 + \\sec 2\\theta)\\cos 2\\theta = 2\\cos 2\\theta + \\sec 2\\theta \\cdot \\cos 2\\theta = 2\\cos 2\\theta + 1$$.\n- Step 4: LHS: $$3\\sin\\theta\\cos\\theta = 3 \\cdot \\tfrac{1}{2}\\sin 2\\theta = \\tfrac{3}{2}\\sin 2\\theta$$. So $$\\tfrac{3}{2}\\sin 2\\theta = 2\\cos 2\\theta + 1$$.\n- Step 5: Multiply through by 2: $$3\\sin 2\\theta = 4\\cos 2\\theta + 2$$, then rearrange: $$3\\sin 2\\theta - 4\\cos 2\\theta = 2$$. ✓", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "Solve $$3\\sin 2x - 4\\cos 2x = 2$$ for $$\\pi \\leq x \\leq 3\\pi/2$$ using the $$R$$-formula. (5 steps)", "answer": "- Step 1: Convert LHS to $$R\\sin(2x - \\alpha)$$ with $$R\\cos\\alpha = 3$$, $$R\\sin\\alpha = 4$$. So $$R = \\sqrt{9+16} = 5$$, $$\\tan\\alpha = 4/3 \\Rightarrow \\alpha \\approx 0.9273$$ rad.\n- Step 2: Equation: $$5\\sin(2x - 0.9273) = 2 \\Rightarrow \\sin(2x - 0.9273) = 0.4$$.\n- Step 3: Let $$\\phi = 2x - 0.9273$$. As $$x$$ ranges over $$[\\pi, 3\\pi/2]$$, $$\\phi$$ ranges over $$[2\\pi - 0.9273, 3\\pi - 0.9273] \\approx [5.356, 8.497]$$.\n- Step 4: Solve $$\\sin\\phi = 0.4$$. Principal: $$\\phi_0 = \\arcsin(0.4) \\approx 0.4115$$. General solutions: $$\\phi = 0.4115 + 2n\\pi$$ or $$\\phi = (\\pi - 0.4115) + 2n\\pi$$. Within $$[5.356, 8.497]$$: only $$\\phi = 0.4115 + 2\\pi \\approx 6.695$$ works.\n- Step 5: $$2x = 6.695 + 0.9273 = 7.622 \\Rightarrow x \\approx 3.81$$ (3 s.f.). Check: $$3.81 \\in [3.142, 4.712]$$ ✓.\n\nThe lesson: transforming the variable's range is essential to find all valid solutions.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "State the **sign-change theorem** (Intermediate Value Theorem) used to locate roots, and the two conditions you must verify to apply it.", "answer": "Step 1: Statement: if $$f$$ is **continuous** on the closed interval $$[a, b]$$ and the values $$f(a)$$ and $$f(b)$$ have **opposite signs** (i.e. $$f(a) \\cdot f(b) < 0$$), then there exists at least one $$c \\in (a, b)$$ with $$f(c) = 0$$. Step 2: First condition: continuity. Polynomials, $$\\sin$$, $$\\cos$$, $$e^x$$, $$\\ln x$$ (on its domain) are continuous; rational functions are continuous wherever the denominator is nonzero. Step 3: Second condition: opposite signs. Compute $$f(a)$$ and $$f(b)$$ and verify one is positive, the other negative. Without both conditions stated, you don't have a complete proof — the examiner typically requires you to mention continuity explicitly.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": true}, {"question": "Show that $$f(x) = x^4 - 5x^2 + 4x - 7 = 0$$ has a root in $$[2, 3]$$ using the sign-change method. Why pick the endpoints 2 and 3 rather than some weird decimals? (4 steps)", "answer": "- Step 1: Compute $$f(2) = 16 - 20 + 8 - 7 = -3$$ — negative.\n- Step 2: Compute $$f(3) = 81 - 45 + 12 - 7 = 41$$ — positive.\n- Step 3: Note $$f$$ is a polynomial → continuous on all reals, in particular on $$[2,3]$$. Since $$f(2) < 0 < f(3)$$, by IVT there exists $$\\alpha \\in (2, 3)$$ with $$f(\\alpha) = 0$$.\n- Step 4: Why integers? The problem hands you the interval $$[2,3]$$; use those endpoints directly. Picking weird decimals like 2.1 or 2.9 wastes time — the question already specifies the bracket.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "Rearrange $$x^4 - 5x^2 + 4x - 7 = 0$$ into the form $$x = \\sqrt[3]{\\dfrac{5x^2 - 4x + 7}{x}}$$, using the \"act with respect to the answer\" strategy. (3 steps)", "answer": "- Step 1: Look at the target form: cube root containing $$x^2$$/$$x$$. Cube-rooting an $$x^3$$ gives $$x$$, so the inside of the cube root must be $$x^3$$. So my immediate goal is to isolate $$x^3$$.\n- Step 2: From $$x^4 = 5x^2 - 4x + 7$$ (moving non-$$x^4$$ terms to the right), divide both sides by $$x$$ (valid since the root lies in $$[2,3]$$, so $$x \\neq 0$$): $$x^3 = \\dfrac{5x^2 - 4x + 7}{x}$$.\n- Step 3: Take the cube root of both sides: $$x = \\sqrt[3]{\\dfrac{5x^2 - 4x + 7}{x}}$$. Done.\n\nThe strategic principle: read the target form first, decide what manipulation gets you there, then execute.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "When using the iteration $$x_{n+1} = g(x_n)$$ on a calculator, what is the **ANS button technique**, and why is it crucial? (3 steps)", "answer": "- Step 1: Type the starting value (e.g., $$x_1 = 2$$) and press =. The calculator now stores 2 in the ANS memory.\n- Step 2: Type the iteration formula using ANS as the variable, e.g. $$\\sqrt[3]{(5 \\cdot \\text{ANS}^2 - 4 \\cdot \\text{ANS} + 7)/\\text{ANS}}$$. Press =. The calculator returns $$x_2$$, and stores it as the new ANS.\n- Step 3: Press = again. It re-evaluates the formula with the new ANS, giving $$x_3$$. Continue pressing = until consecutive values agree to the required d.p.\n\nWhy crucial? Manual re-entry of decimals introduces rounding errors and stops convergence at the wrong digit. ANS preserves full calculator precision.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "When using an iteration $$x_{n+1} = g(x_n)$$, when do you stop and report the root to the required d.p.?", "answer": "Step 1: Compute terms until two **consecutive** values agree to (at least) the required number of decimal places. Step 2: For example, if asked to 4 d.p., keep iterating until $$x_n$$ and $$x_{n+1}$$ both round to the same 4-d.p. value. Step 3: At that point report $$\\alpha \\approx x_n$$ to that d.p. The agreement of consecutive values is a *practical* convergence criterion — not a proof, but sufficient for exam answers.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "What is the convergence criterion for the iteration $$x_{n+1} = g(x_n)$$ at a fixed point $$\\alpha$$, and what is the geometric intuition?", "answer": "Step 1: The iteration converges to $$\\alpha$$ (for starting points sufficiently close) if and only if $$|g'(\\alpha)| < 1$$. Step 2: Geometric intuition: near $$\\alpha$$, $$g$$ is approximately linear with slope $$g'(\\alpha)$$. If the slope's magnitude is less than 1, errors get *contracted* with each iteration, so $$|x_n - \\alpha|$$ shrinks. If $$|g'(\\alpha)| > 1$$, errors get *amplified* and the iteration diverges, even from very close starting points. Step 3: At $$|g'(\\alpha)| = 1$$ behaviour is borderline. So the same equation $$f(x)=0$$ might have one rearrangement that converges and another that doesn't.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": true}, {"question": "For the function $$T = 10 + Ae^{-Bt}$$ describing the cooling of an object, find $$A$$ if at $$t=0$$ the temperature is $$18°C$$. (3 steps)", "answer": "- Step 1: Substitute $$t = 0$$: $$T(0) = 10 + Ae^0$$.\n- Step 2: Recall $$e^0 = 1$$ (NOT 0 — common mistake): $$T(0) = 10 + A$$.\n- Step 3: Equate to 18: $$10 + A = 18 \\Rightarrow A = 8$$.\n\nThe $$A$$ here measures the *initial excess* above the asymptotic temperature 10°C.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": false}, {"question": "For the cooling model $$T = 10 + 8e^{-Bt}$$, find $$B$$ if $$T = 16$$ at $$t = 45$$. Why use $$\\ln(4/3)$$ rather than $$\\ln(3/4)$$ to avoid sign errors? (3 steps)", "answer": "- Step 1: Substitute: $$16 = 10 + 8e^{-45B} \\Rightarrow 8e^{-45B} = 6 \\Rightarrow e^{-45B} = 3/4$$.\n- Step 2: Take ln: $$-45B = \\ln(3/4)$$, so $$B = -\\ln(3/4)/45 = \\ln(4/3)/45$$ (using $$-\\ln(3/4) = \\ln(4/3)$$ via the reciprocal log law).\n- Step 3: Numerically: $$\\ln(4/3) \\approx 0.2877$$, so $$B \\approx 0.2877/45 \\approx 0.00639$$ (3 s.f.).\n\nWhy $$\\ln(4/3)$$? It's positive, while $$\\ln(3/4)$$ is negative. Writing $$B = \\ln(4/3)/45$$ shows directly that $$B > 0$$ — important because $$B$$ should be positive for *decay*. If you wrote $$B = \\ln(3/4)/45$$ without the minus sign, you'd get a negative answer and worry whether you've made a mistake.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": false}, {"question": "For $$T = 10 + Ae^{-Bt}$$, find an expression for the rate of change $$dT/dt$$, and explain why the rate is **always negative**.", "answer": "Step 1: Differentiate using chain rule: $$\\dfrac{dT}{dt} = A \\cdot (-B) e^{-Bt} = -ABe^{-Bt}$$. Step 2: For decay parameters $$A > 0$$, $$B > 0$$, and the exponential $$e^{-Bt} > 0$$ for all real $$t$$. The product $$-ABe^{-Bt} < 0$$ always. Step 3: This makes physical sense: the object is cooling toward the room temperature 10°C, so $$T$$ is decreasing — derivative is negative. The magnitude $$|dT/dt|$$ decreases over time as $$e^{-Bt}$$ shrinks, meaning cooling slows as the object approaches room temperature.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": false}, {"question": "Why can the temperature in the model $$T = 10 + Ae^{-Bt}$$ (with $$A > 0$$, $$B > 0$$) never fall below $$10°C$$ — let alone reach $$5°C$$? (3 steps)", "answer": "- Step 1: $$Ae^{-Bt} > 0$$ for all real $$t$$ (positive coefficient times positive exponential is positive). So $$T - 10 = Ae^{-Bt} > 0$$ always, i.e. $$T > 10$$ always.\n- Step 2: As $$t \\to \\infty$$: $$e^{-Bt} \\to 0$$, so $$T \\to 10$$ from above. The line $$T = 10$$ is a horizontal **asymptote**, approached but never reached.\n- Step 3: So $$T$$ stays strictly above 10°C and asymptotes to 10°C. Reaching $$T = 5$$ would require $$T < 10$$, which is impossible. The model embodies \"Newton's law of cooling\": object cools down to surroundings, never below.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": false}, {"question": "A growth model is $$u_n = 2000 \\times 1.03^n$$ where $$n=0$$ corresponds to the initial measurement. What is the population after **6 years**, and what's the off-by-one trap?", "answer": "Step 1: If $$n=0$$ is the start (population 2000), then 6 years later we want $$n = 6$$. Population: $$u_6 = 2000 \\times 1.03^6$$. Step 2: Numerically $$1.03^6 \\approx 1.1941$$, so $$u_6 \\approx 2390$$ (3 s.f.). Step 3: The off-by-one trap: writing $$u_6 = 2000 \\times 1.03^5$$. This happens because students count \"1, 2, 3, 4, 5, 6 = 6 steps\" but think of it as power 5 (mistaking subscript and exponent). Always anchor: at $$t=0$$, exponent is 0; one year later, exponent is 1; ... ; six years later, exponent is 6.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": true}, {"question": "Two consecutive readings give $$ab^4 = 3690$$ and $$ab^7 = 3470$$. Find $$a$$ and $$b$$, and identify the trap when rearranging for $$a$$. (4 steps)", "answer": "- Step 1: Divide the second by the first to eliminate $$a$$: $$\\dfrac{ab^7}{ab^4} = \\dfrac{3470}{3690} \\Rightarrow b^3 = 3470/3690 \\approx 0.9404$$.\n- Step 2: Cube-root: $$b \\approx 0.98$$ (this is < 1, so the model is decay, not growth).\n- Step 3: Now substitute back into $$ab^4 = 3690$$ to find $$a$$. Critical: divide by $$b^4$$, NOT $$b^3$$ (which is what gave $$b^3$$ above): $$a = 3690 / 0.98^4 \\approx 3690 / 0.9224 \\approx 4000$$.\n- Step 4: The off-by-one trap: writing $$a = 3690/0.98^3$$. Read the exponent in the original equation carefully — it's $$b^4$$, not $$b^3$$.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": false}, {"question": "When does $$2000 \\times 1.03^T = 4000 \\times 0.98^T$$? Show the strategic move with logs. (3 steps)", "answer": "- Step 1: Divide both sides to gather $$T$$-terms: $$\\dfrac{1.03^T}{0.98^T} = \\dfrac{4000}{2000} = 2 \\Rightarrow (1.03/0.98)^T = 2$$.\n- Step 2: $$T$$ is in the exponent — take ln: $$T \\ln(1.03/0.98) = \\ln 2 \\Rightarrow T = \\dfrac{\\ln 2}{\\ln(1.03/0.98)}$$.\n- Step 3: Numerically $$1.03/0.98 \\approx 1.05102$$, $$\\ln(1.05102) \\approx 0.04979$$, $$\\ln 2 \\approx 0.6931$$, so $$T \\approx 13.9$$ years.\n\nThe principle: when you have *two* exponentials in the same equation, divide first to combine them into one exponential, then take ln.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": false}, {"question": "What is the **product rule** for differentiation, and how does it apply to $$f(x) = 2e^{3\\sin x}\\cos x$$? (3 steps)", "answer": "- Step 1: Product rule: $$(uv)' = u'v + uv'$$. Set $$u = 2e^{3\\sin x}$$ and $$v = \\cos x$$.\n- Step 2: $$u' = 2 \\cdot e^{3\\sin x} \\cdot (3\\cos x) = 6\\cos x \\, e^{3\\sin x}$$ (chain rule on the exponential), and $$v' = -\\sin x$$.\n- Step 3: Substitute: $$f'(x) = 6\\cos x \\, e^{3\\sin x} \\cdot \\cos x + 2e^{3\\sin x}\\cdot(-\\sin x) = 2e^{3\\sin x}(3\\cos^2 x - \\sin x)$$ — after factoring out the common $$2e^{3\\sin x}$$.\n\nThe factoring step at the end is critical for finding turning points cleanly.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": true}, {"question": "If a product $$f(x)g(x) = 0$$ and $$g(x)$$ can never be zero on the domain, what conclusion follows about $$f(x)$$ — and how is this used for $$f'(x) = 2e^{3\\sin x}(3\\cos^2 x - \\sin x) = 0$$? (3 steps)", "answer": "- Step 1: For a product to be zero, *at least one* factor must be zero. If one factor is *never* zero on the domain, then the *other* factor must be zero wherever the product equals zero.\n- Step 2: For $$2e^{3\\sin x}(3\\cos^2 x - \\sin x) = 0$$: the factor $$2e^{3\\sin x}$$ is always positive (exponential never reaches zero). So the equation reduces to $$3\\cos^2 x - \\sin x = 0$$.\n- Step 3: This logic is universal whenever an exponential, a positive constant, or a square (like $$(3x-5)^2$$ on a restricted domain) appears as a factor. Always factor first, then identify which factor *can* be zero.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": true}, {"question": "Show that the turning points of $$f(x) = 2e^{3\\sin x}\\cos x$$ satisfy a quadratic in $$\\sin x$$ of the form $$3\\sin^2 x + \\sin x - 3 = 0$$. (3 steps)", "answer": "- Step 1: Differentiate: $$f'(x) = 2e^{3\\sin x}(3\\cos^2 x - \\sin x)$$ (product rule + chain rule).\n- Step 2: Set $$f'(x) = 0$$. Since $$2e^{3\\sin x} > 0$$, the bracket vanishes: $$3\\cos^2 x - \\sin x = 0$$.\n- Step 3: Use $$\\cos^2 x = 1 - \\sin^2 x$$: $$3(1 - \\sin^2 x) - \\sin x = 0 \\Rightarrow 3 - 3\\sin^2 x - \\sin x = 0$$. Multiply by $$-1$$ and rearrange: $$3\\sin^2 x + \\sin x - 3 = 0$$. So $$a=3, b=1, c=-3$$.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": false}, {"question": "When solving $$3\\sin^2 x + \\sin x - 3 = 0$$ for $$0 \\leq x \\leq 2\\pi$$, why must one of the two roots be rejected, and how do you decide between the two valid $$x$$-values for a particular turning point $$Q$$? (4 steps)", "answer": "- Step 1: Quadratic formula: $$\\sin x = \\dfrac{-1 \\pm \\sqrt{1 + 36}}{6} = \\dfrac{-1 \\pm \\sqrt{37}}{6}$$.\n- Step 2: Compute: $$\\sqrt{37} \\approx 6.083$$. Two values: $$\\sin x \\approx 0.847$$ or $$\\sin x \\approx -1.181$$. **Reject $$-1.181$$** because $$|\\sin x| \\leq 1$$ — no real $$x$$ gives $$\\sin x = -1.181$$.\n- Step 3: For $$\\sin x \\approx 0.847$$, two solutions in $$[0, 2\\pi]$$: $$x \\approx 1.012$$ (1st quadrant) and $$x \\approx \\pi - 1.012 \\approx 2.130$$ (2nd quadrant).\n- Step 4: To pick the one corresponding to a turning point below the $$x$$-axis (i.e., $$f(x) < 0$$): substitute back and check the sign of $$f$$. Since $$f(x) = 2e^{3\\sin x}\\cos x$$, and $$\\cos x < 0$$ in the 2nd quadrant, $$f(x) < 0$$ at $$x \\approx 2.130$$. So $$Q$$'s $$x$$-coordinate is $$\\approx 2.130$$.\n\nThe principle: when multiple critical points exist, substitute back into the original $$f$$ to determine *which* turning point matches a given description.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": true}, {"question": "For $$f(x) = 2e^{3\\sin x}\\cos x$$ on $$[0, 2\\pi]$$, where does the curve cross the $$x$$-axis, and how do you find this without solving a complicated equation? (3 steps)", "answer": "- Step 1: $$f(x) = 0$$ requires $$2e^{3\\sin x}\\cos x = 0$$. The factor $$2e^{3\\sin x} > 0$$ always (exponential is positive), so the product is zero iff $$\\cos x = 0$$.\n- Step 2: $$\\cos x = 0$$ in $$[0, 2\\pi]$$ at $$x = \\pi/2$$ and $$x = 3\\pi/2$$.\n- Step 3: From the figure context the marked point $$R$$ is at $$x = \\pi/2$$, giving $$R = (\\pi/2, 0)$$.\n\nThe trick: factoring out the exponential reduces a horrible-looking equation to a simple trigonometric one.", "source": "Opus 4.7 ①", "_id": "opus_1_55", "judge_pick": false}, {"question": "For the curve $$y = \\dfrac{16}{9(3x-k)} + x - \\dfrac{k}{3}$$, find $$\\dfrac{dy}{dx}$$ in terms of $$k$$. (3 steps)", "answer": "- Step 1: Rewrite the first term as $$\\dfrac{16}{9}(3x-k)^{-1}$$ to apply the chain rule cleanly.\n- Step 2: Differentiate: $$\\dfrac{d}{dx}\\left[\\dfrac{16}{9}(3x-k)^{-1}\\right] = \\dfrac{16}{9} \\cdot (-1)(3x-k)^{-2} \\cdot 3 = -\\dfrac{16}{3(3x-k)^2}$$. Note the chain rule contributes the factor 3 from differentiating $$3x-k$$.\n- Step 3: Other terms: $$\\dfrac{d}{dx}(x) = 1$$, $$\\dfrac{d}{dx}(-k/3) = 0$$ ($$k$$ is a constant). Total: $$\\dfrac{dy}{dx} = 1 - \\dfrac{16}{3(3x-k)^2}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_56", "judge_pick": false}, {"question": "Evaluate $$\\int_1^3 \\dfrac{16}{9(3x-7/3)} dx$$ and express as $$\\lambda \\ln 10$$. Show the strategic moves. (4 steps)", "answer": "- Step 1: Pull out the constant: $$\\dfrac{16}{9}\\int_1^3 \\dfrac{1}{3x-7/3}\\, dx$$.\n- Step 2: Use $$\\int \\dfrac{1}{ax+b}dx = \\dfrac{1}{a}\\ln|ax+b| + C$$ with $$a = 3$$: $$\\dfrac{16}{9} \\cdot \\dfrac{1}{3}\\Big[\\ln|3x - 7/3|\\Big]_1^3 = \\dfrac{16}{27}\\Big[\\ln|9-7/3| - \\ln|3-7/3|\\Big]$$.\n- Step 3: Compute fractions: $$9 - 7/3 = 27/3 - 7/3 = 20/3$$; $$3 - 7/3 = 9/3 - 7/3 = 2/3$$. So expression is $$\\dfrac{16}{27}\\ln\\left(\\dfrac{20/3}{2/3}\\right) = \\dfrac{16}{27}\\ln 10$$.\n- Step 4: So $$\\lambda = 16/27$$.\n\nThe pitfalls trapped here: forgetting the $$1/a = 1/3$$ factor (would give $$\\lambda = 16/9$$, wrong), and not combining the logs into a single $$\\ln 10$$ before reading off $$\\lambda$$.", "source": "Opus 4.7 ①", "_id": "opus_1_57", "judge_pick": false}, {"question": "What does $$\\int \\dfrac{f'(x)}{f(x)} dx$$ equal, and why?", "answer": "Step 1: The result is $$\\ln|f(x)| + C$$. Step 2: Why: differentiate $$\\ln|f(x)|$$ using the chain rule — $$\\dfrac{d}{dx}\\ln|f(x)| = \\dfrac{f'(x)}{f(x)}$$. So the integral is the antiderivative inverse of this. Step 3: The recognition pattern: whenever the numerator is the *exact* derivative of the denominator, the integral is $$\\ln$$ of (modulus of) the denominator. This is a special case of u-substitution with $$u = f(x)$$. Useful for many integrands like $$\\dfrac{2x}{x^2+1}$$ or $$\\dfrac{\\cos x}{\\sin x} = \\cot x$$.", "source": "Opus 4.7 ①", "_id": "opus_1_58", "judge_pick": false}, {"question": "What is the **composite function** $$gf(a)$$, and what's a common confusion with the order? (2 steps)", "answer": "- Step 1: $$gf(a) = g(f(a))$$ — read inside-out: apply $$f$$ first to $$a$$, then apply $$g$$ to the result. Even though \"$$g$$\" is written first, $$f$$ acts first.\n- Step 2: Confusion: students sometimes evaluate $$g$$ first then $$f$$. Mnemonic: the function nearest to the input acts first. Or: parse $$gf(a)$$ as $$g[f(a)]$$ — the bracket on $$f$$ wraps the input.", "source": "Opus 4.7 ①", "_id": "opus_1_59", "judge_pick": true}, {"question": "Find $$g^{-1}(x)$$ for $$g(x) = 3 + 2\\ln x$$, $$x \\geq 1$$, and state the domain of $$g^{-1}$$. (4 steps)", "answer": "- Step 1: Set $$y = g(x) = 3 + 2\\ln x$$.\n- Step 2: Solve for $$x$$ in terms of $$y$$: $$2\\ln x = y - 3 \\Rightarrow \\ln x = (y-3)/2 \\Rightarrow x = e^{(y-3)/2}$$.\n- Step 3: Swap labels (since the inverse takes input from the original output): $$g^{-1}(x) = e^{(x-3)/2}$$.\n- Step 4: Domain of $$g^{-1}$$ = range of $$g$$. Since $$g(1) = 3$$ and $$g$$ is increasing on $$[1, \\infty)$$, range of $$g$$ is $$[3, \\infty)$$. So $$g^{-1}$$ has domain $$x \\geq 3$$.", "source": "Opus 4.7 ①", "_id": "opus_1_60", "judge_pick": false}, {"question": "Solve $$gf(a) = 5$$ where $$f(a) = \\dfrac{2a}{3a-5}$$ and $$g(x) = 3 + 2\\ln x$$. (4 steps)", "answer": "- Step 1: $$gf(a) = g(f(a)) = 3 + 2\\ln\\left(\\dfrac{2a}{3a-5}\\right) = 5$$.\n- Step 2: $$2\\ln\\left(\\dfrac{2a}{3a-5}\\right) = 2 \\Rightarrow \\ln\\left(\\dfrac{2a}{3a-5}\\right) = 1$$.\n- Step 3: Exponentiate: $$\\dfrac{2a}{3a-5} = e^1 = e$$.\n- Step 4: Cross-multiply: $$2a = e(3a-5) = 3ea - 5e \\Rightarrow 2a - 3ea = -5e \\Rightarrow a(2 - 3e) = -5e \\Rightarrow a = \\dfrac{-5e}{2-3e} = \\dfrac{5e}{3e-2}$$.\n\nThe trick at the end: multiply top and bottom by $$-1$$ to make the denominator positive (clean form).", "source": "Opus 4.7 ①", "_id": "opus_1_61", "judge_pick": true}, {"question": "What is the range of the composite $$fg(x)$$, and how is it found? (3 steps)", "answer": "- Step 1: Range of $$fg$$ = range of $$f$$ when $$f$$ acts on the *range* of $$g$$, NOT on $$g$$'s entire codomain. So first find the range of $$g$$ (call it $$S$$).\n- Step 2: Then evaluate $$f$$ over $$S$$: i.e. $$\\{f(s) : s \\in S\\}$$.\n- Step 3: Concretely, for $$f(x) = 2 + 5\\ln x$$ and $$g(x) = (6x-2)/(2x+1)$$: range of $$g \\in (0, 3)$$. So $$f$$ is restricted to $$(0,3)$$. Since $$f$$ is increasing in $$x$$, $$f((0,3)) = (\\lim_{x \\to 0^+}f, f(3)) = (-\\infty, 2+5\\ln 3)$$.\n\nThe principle: think of compositions as pipes — the output of $$g$$ is the input of $$f$$.", "source": "Opus 4.7 ①", "_id": "opus_1_62", "judge_pick": false}, {"question": "State the **quotient rule** for differentiation and apply it to $$h(x) = \\dfrac{2x+1}{x-3}$$.", "answer": "Step 1: Quotient rule: $$\\left(\\dfrac{u}{v}\\right)' = \\dfrac{u'v - uv'}{v^2}$$. Step 2: For $$h(x)$$: $$u = 2x+1$$, $$u' = 2$$; $$v = x-3$$, $$v' = 1$$. Step 3: $$h'(x) = \\dfrac{2(x-3) - (2x+1)(1)}{(x-3)^2} = \\dfrac{2x-6-2x-1}{(x-3)^2} = \\dfrac{-7}{(x-3)^2}$$. Always sign-check: numerator $$-7$$ is constant negative, denominator squared, so $$h' < 0$$ everywhere except $$x = 3$$ — so $$h$$ is decreasing on each side of its discontinuity at $$x=3$$.", "source": "Opus 4.7 ①", "_id": "opus_1_63", "judge_pick": false}, {"question": "What is the **chain rule** for differentiation, and how is it applied to $$y = e^{3\\sin x}$$?", "answer": "Step 1: Chain rule: if $$y = f(u(x))$$, then $$\\dfrac{dy}{dx} = \\dfrac{dy}{du} \\cdot \\dfrac{du}{dx} = f'(u) \\cdot u'(x)$$. Step 2: For $$y = e^{3\\sin x}$$: outer is $$e^u$$ with derivative $$e^u$$; inner is $$u = 3\\sin x$$ with derivative $$u' = 3\\cos x$$. Step 3: $$\\dfrac{dy}{dx} = e^{3\\sin x} \\cdot 3\\cos x = 3\\cos x\\, e^{3\\sin x}$$. The chain rule is the universal \"differentiate from outside in, multiply by inside derivative.\"", "source": "Opus 4.7 ①", "_id": "opus_1_64", "judge_pick": true}, {"question": "State the standard derivatives needed in P3: $$\\dfrac{d}{dx}\\sin(kx)$$, $$\\dfrac{d}{dx}\\cos(kx)$$, $$\\dfrac{d}{dx}e^{kx}$$, $$\\dfrac{d}{dx}\\ln x$$.", "answer": "Step 1: $$\\dfrac{d}{dx}\\sin(kx) = k\\cos(kx)$$ — the chain rule on the inner $$kx$$ contributes the factor $$k$$. Step 2: $$\\dfrac{d}{dx}\\cos(kx) = -k\\sin(kx)$$ — derivative of cos is $$-\\sin$$, times the inner derivative $$k$$. Step 3: $$\\dfrac{d}{dx}e^{kx} = ke^{kx}$$ — exponential is its own derivative; chain rule contributes $$k$$. $$\\dfrac{d}{dx}\\ln x = 1/x$$ — fundamental log derivative. Forgetting the inner factor $$k$$ is a top-3 differentiation error.", "source": "Opus 4.7 ①", "_id": "opus_1_65", "judge_pick": false}, {"question": "State the standard integrals needed in P3: $$\\int x^n dx$$, $$\\int e^x dx$$, $$\\int (1/x)dx$$, $$\\int \\cos x dx$$, $$\\int \\sin x dx$$, $$\\int \\sec^2 x dx$$.", "answer": "Step 1: $$\\int x^n dx = \\dfrac{x^{n+1}}{n+1} + C$$ for $$n \\neq -1$$ (the $$n = -1$$ case is the next item). Step 2: $$\\int e^x dx = e^x + C$$ (exponential is its own integral). $$\\int (1/x)dx = \\ln|x| + C$$ (handles both positive and negative $$x$$). Step 3: $$\\int \\cos x\\, dx = \\sin x + C$$; $$\\int \\sin x\\, dx = -\\cos x + C$$ (note the sign flip); $$\\int \\sec^2 x\\, dx = \\tan x + C$$. Together these cover most P3 integrals; combine with substitution / parts as needed.", "source": "Opus 4.7 ①", "_id": "opus_1_66", "judge_pick": false}, {"question": "State the reciprocal trig identities and the two derived Pythagorean identities involving $$\\sec, \\csc, \\cot$$.", "answer": "Step 1: Reciprocal definitions: $$\\sec x = 1/\\cos x$$, $$\\csc x = 1/\\sin x$$, $$\\cot x = \\cos x / \\sin x$$. (Note: cot is \"cos over sin,\" which is the reciprocal of tan.) Step 2: Divide $$\\sin^2 x + \\cos^2 x = 1$$ by $$\\cos^2 x$$: $$\\tan^2 x + 1 = \\sec^2 x$$, i.e. $$1 + \\tan^2 x = \\sec^2 x$$. Step 3: Divide the same Pythagoras by $$\\sin^2 x$$: $$1 + \\cot^2 x = \\csc^2 x$$. These three identities are essential for trig simplification and for substitution in trig integrals.", "source": "Opus 4.7 ①", "_id": "opus_1_67", "judge_pick": false}, {"question": "Why does $$y = a\\sin x + b\\cos x + c$$ have its maximum value at $$R + c$$ where $$R = \\sqrt{a^2+b^2}$$? Geometric/intuitive reason.", "answer": "Step 1: Think of $$(a, b)$$ as a vector in the plane with magnitude $$R = \\sqrt{a^2+b^2}$$. The expression $$a\\sin x + b\\cos x$$ is the dot product of $$(a, b)$$ with $$(\\sin x, \\cos x)$$, where $$(\\sin x, \\cos x)$$ is a unit vector. Step 2: A dot product of a fixed vector with a unit vector is bounded by the magnitude of the fixed vector: $$|a\\sin x + b\\cos x| \\leq R$$, with equality when $$(\\sin x, \\cos x)$$ aligns with $$(a, b)$$. Step 3: So max of $$a\\sin x + b\\cos x$$ is $$+R$$ (alignment), min is $$-R$$ (anti-alignment). Adding $$c$$: max is $$R+c$$, min is $$-R+c$$. The $$R$$-formula is just expressing this geometric fact algebraically.", "source": "Opus 4.7 ①", "_id": "opus_1_68", "judge_pick": false}, {"question": "Numerical exercise: For $$3\\sin x + 4\\cos x$$, find $$R$$ and $$\\alpha$$ to convert to the form $$R\\sin(x + \\alpha)$$ (with $$\\alpha$$ in radians, 3 d.p.). (3 steps)", "answer": "- Step 1: Match $$R\\cos\\alpha = 3$$, $$R\\sin\\alpha = 4$$.\n- Step 2: $$R = \\sqrt{3^2 + 4^2} = \\sqrt{25} = 5$$.\n- Step 3: $$\\tan\\alpha = 4/3 \\Rightarrow \\alpha \\approx 0.927$$ rad. So $$3\\sin x + 4\\cos x = 5\\sin(x + 0.927)$$.\n\nThis 3-4-5 triangle is a useful \"easy case\" to memorise — recognising it saves time.", "source": "Opus 4.7 ①", "_id": "opus_1_69", "judge_pick": false}, {"question": "Numerical exercise: Find $$\\int \\dfrac{1}{2x+5} dx$$. State the common error.", "answer": "Step 1: Apply $$\\int \\dfrac{1}{ax+b}dx = \\dfrac{1}{a}\\ln|ax+b| + C$$ with $$a = 2, b = 5$$. Step 2: Result: $$\\dfrac{1}{2}\\ln|2x+5| + C$$. Step 3: Common error: writing $$\\ln|2x+5| + C$$ (missing the $$1/2$$). Memory tag: every linear-in-x denominator integral inherits a $$1/a$$ prefactor from the chain rule when integrating in reverse.", "source": "Opus 4.7 ①", "_id": "opus_1_70", "judge_pick": false}, {"question": "Numerical exercise: Use the sign-change theorem to show $$f(x) = x^3 - 5$$ has a root in $$[1, 2]$$. (3 steps)", "answer": "- Step 1: $$f(1) = 1 - 5 = -4 < 0$$.\n- Step 2: $$f(2) = 8 - 5 = 3 > 0$$.\n- Step 3: $$f$$ is a polynomial, hence continuous on $$[1,2]$$. By IVT (sign-change), there's a root in $$(1, 2)$$.\n\nThe root is in fact $$\\sqrt[3]{5} \\approx 1.71$$, but that's not what's being asked; sign-change just confirms *existence* in the bracket.", "source": "Opus 4.7 ①", "_id": "opus_1_71", "judge_pick": true}, {"question": "Numerical exercise: A line in log-log axes passes through $$(0, 4)$$ with gradient $$-2$$. Find the relation $$y = kx^n$$. (3 steps)", "answer": "- Step 1: Line equation: $$\\log y = -2\\log x + 4$$ (gradient $$-2$$, $$y$$-intercept 4 in log axes).\n- Step 2: Match the template $$\\log y = n\\log x + \\log k$$: $$n = -2$$, $$\\log k = 4 \\Rightarrow k = 10^4 = 10000$$.\n- Step 3: So $$y = 10000\\,x^{-2}$$, or equivalently $$y = 10000/x^2$$.", "source": "Opus 4.7 ①", "_id": "opus_1_72", "judge_pick": false}, {"question": "Numerical exercise: Sketch (or describe) the graph of $$y = 3|x-1| - 2$$, identifying the vertex and the two $$x$$-intercepts. (3 steps)", "answer": "- Step 1: Vertex (shortcut): set inside zero, $$x - 1 = 0 \\Rightarrow x = 1$$. Then $$y = 3 \\cdot 0 - 2 = -2$$. Vertex $$(1, -2)$$ — note this is *below* the $$x$$-axis.\n- Step 2: $$x$$-intercepts: $$3|x-1| - 2 = 0 \\Rightarrow |x-1| = 2/3 \\Rightarrow x - 1 = \\pm 2/3 \\Rightarrow x = 5/3$$ or $$x = 1/3$$.\n- Step 3: Shape: V-shape opening upward (positive coefficient outside modulus). Steeper than basic $$|x|$$ by factor 3.", "source": "Opus 4.7 ①", "_id": "opus_1_73", "judge_pick": false}, {"question": "Conceptual: Why does the formula $$|f(x)| = -f(x)$$ when $$f(x) < 0$$ produce a *positive* output, and why isn't it written as $$|f(x)| = -|f(x)|$$ (which would be wrong)?", "answer": "Step 1: When $$f(x)$$ is negative, $$-f(x)$$ flips the sign to positive — outputting the absolute value. For example, $$f = -3$$, $$-f = +3$$; that's the modulus value. Step 2: Writing $$-|f(x)|$$ would always be non-positive (modulus is non-negative, with a minus sign in front), so it can never equal a positive modulus value. The minus sign attaches to $$f(x)$$, not to the modulus output. Step 3: This is why case-splitting works: the modulus *is* a piecewise function that picks between $$f$$ and $$-f$$ depending on the sign of $$f$$.", "source": "Opus 4.7 ①", "_id": "opus_1_74", "judge_pick": true}, {"question": "Conceptual: When is a horizontal asymptote attained vs only approached, in models like $$T = C + Ae^{-Bt}$$?", "answer": "Step 1: $$T = C$$ is approached as $$t \\to \\infty$$ but never reached (assuming $$A \\neq 0$$ and the exponential never vanishes). Step 2: An exponential decay $$Ae^{-Bt}$$ shrinks toward zero for all finite $$t$$, but $$e^{-Bt} > 0$$ always — never *equals* zero. So $$T - C = Ae^{-Bt}$$ is strictly positive (or strictly negative if $$A < 0$$). Step 3: This is what \"asymptote\" means — a value approached arbitrarily closely but not attained. In contrast, polynomial functions can attain their asymptotes (e.g., $$y = 1/x$$ never reaches its horizontal asymptote $$y=0$$, but a graph like $$y = x \\sin(1/x)$$ might cross it). Asymptotes are about *limiting* behaviour, not exclusion zones.", "source": "Opus 4.7 ①", "_id": "opus_1_75", "judge_pick": true}, {"question": "Misconception probe: A student writes $$\\int \\dfrac{1}{3x+1}dx = \\ln|3x+1| + C$$. What's wrong, and what's the correct answer?", "answer": "Step 1: The student forgot the $$1/a = 1/3$$ factor. Step 2: Correct answer: $$\\dfrac{1}{3}\\ln|3x+1| + C$$. Step 3: To verify, differentiate the student's wrong answer: $$\\dfrac{d}{dx}\\ln|3x+1| = \\dfrac{3}{3x+1}$$, not $$\\dfrac{1}{3x+1}$$. So the student's antiderivative is off by a factor of 3. To get exactly $$1/(3x+1)$$, divide by 3 — hence the $$1/3$$ factor.", "source": "Opus 4.7 ①", "_id": "opus_1_76", "judge_pick": true}, {"question": "Misconception probe: A student writes $$\\cos^2 x = 1 - \\sin 2x$$. What's wrong?", "answer": "Step 1: This confuses two different identities. $$\\sin^2 x + \\cos^2 x = 1$$ gives $$\\cos^2 x = 1 - \\sin^2 x$$ (with sin squared, not double-angle sin). Step 2: There's no identity that gives $$\\cos^2 x = 1 - \\sin 2x$$ — the right-hand side mixes $$\\sin 2x$$ (double angle) with $$\\cos^2 x$$ (square), which aren't directly related. Step 3: The correct double-angle rearrangement is $$\\cos^2 x = \\tfrac{1}{2}(1 + \\cos 2x)$$. Memory check: the *cos*-squared identity should produce a *cos* double-angle, not a *sin* double-angle.", "source": "Opus 4.7 ①", "_id": "opus_1_77", "judge_pick": true}, {"question": "Misconception probe: When solving $$|f(x)| = g(x)$$, why do you NOT square both sides as a default?", "answer": "Step 1: Squaring gives $$f(x)^2 = g(x)^2$$, which can introduce *spurious* solutions where $$g(x) < 0$$ (since the original equation requires $$g(x) \\geq 0$$ — the LHS modulus is non-negative). Step 2: Also, squaring algebraically expands degree, which can complicate solving more than the original. Step 3: Better approach: case-split on the sign of $$f(x)$$ (or restrict to $$g(x) \\geq 0$$ and check). Squaring is a valid *transformation* but adds the burden of filtering spurious roots — case-splitting is cleaner.", "source": "Opus 4.7 ①", "_id": "opus_1_78", "judge_pick": true}, {"question": "Conceptual synthesis: For an exam question that asks you to \"solve $$f(x) = 0$$\" and then asks to find a root using iteration, why do you need both the **sign change theorem** and the **rearrangement to $$x = g(x)$$** as separate steps?", "answer": "Step 1: Sign change *proves existence* of a root in a bracket — without it, you don't know there's anything to find. The IVT gives a *theoretical* guarantee. Step 2: Rearrangement to $$x = g(x)$$ converts the equation into a *fixed-point* form usable by iteration: $$x_{n+1} = g(x_n)$$. The numerical method needs an iterable form. Step 3: So the two steps complement: sign change tells you *where* to look (bracket); iteration tells you *what value* the root takes (numerical estimate). Either alone is incomplete: sign-change without iteration gives only existence, not value; iteration without sign-change risks converging to the wrong fixed point or diverging.", "source": "Opus 4.7 ①", "_id": "opus_1_79", "judge_pick": true}, {"question": "Conceptual synthesis: Why might a question deliberately ask you to first \"show $$f(x) = a\\sin 2x + b\\cos 2x + c$$\" and then \"express in form $$R\\sin(2x+\\alpha) + c$$\"? What does each form give you that the other doesn't?", "answer": "Step 1: The expanded form $$a\\sin 2x + b\\cos 2x + c$$ is what you typically *derive* from double-angle simplifications — closer to the original problem statement. It's the \"raw\" form. Step 2: The compact $$R\\sin(2x+\\alpha) + c$$ form is *useful for analysis*: max/min are read off as $$\\pm R + c$$; zeros and turning points are at predictable arguments; equations involving the function are solvable as $$\\sin(2x+\\alpha) = $$ const. Step 3: The two-stage question lets the examiner test (a) double-angle manipulation, then (b) $$R$$-formula conversion. The compact form unlocks the *applications* (max/min, equation-solving) that the expanded form makes intractable.", "source": "Opus 4.7 ①", "_id": "opus_1_80", "judge_pick": false}, {"question": "Conceptual synthesis: Why does the problem $$x^4 - 5x^2 + 4x - 7 = 0$$ have a *cube-root* iteration formula $$x = \\sqrt[3]{(5x^2 - 4x + 7)/x}$$, and not, say, a square-root one?", "answer": "Step 1: The original is a *quartic* equation. To rearrange to $$x = g(x)$$, you must isolate $$x$$ on one side — but $$x^4$$ on the LHS suggests writing $$x^k = $$ something and taking the $$k$$-th root. Step 2: Choosing $$x^4 = $$ something and 4th-rooting would work but might not converge (depends on $$|g'|$$). The choice $$x^3 = (5x^2 - 4x + 7)/x$$ (after dividing by $$x$$) is engineered for convergence: the cube root tames the variable enough that $$|g'(\\alpha)| < 1$$ near the root. Step 3: Different rearrangements of the same equation give different convergence properties. The exam-given form is chosen to converge from the given starting value.", "source": "Opus 4.7 ①", "_id": "opus_1_81", "judge_pick": true}, {"question": "Misconception probe: A student computes $$\\int_4^8 \\dfrac{6}{x-2}dx$$ and writes the answer as $$6(\\ln 6 - \\ln 2) = 6\\ln 4$$. What's the algebra error?", "answer": "Step 1: $$6\\ln 6 - 6\\ln 2 = 6(\\ln 6 - \\ln 2) = 6\\ln(6/2) = 6\\ln 3$$, not $$6\\ln 4$$. Step 2: The error: the student probably did $$\\ln 6 - \\ln 2 = \\ln(6 - 2) = \\ln 4$$ — confusing $$\\ln A - \\ln B = \\ln(A/B)$$ with $$\\ln A - \\ln B = \\ln(A-B)$$ (which is FALSE). Step 3: Subtraction of logs corresponds to *division* of arguments, not subtraction. Memory hook: log laws turn arithmetic operations into log-of-quotient operations; never subtract inside the log.", "source": "Opus 4.7 ①", "_id": "opus_1_82", "judge_pick": true}, {"question": "Conceptual: For $$y = a - |2x - b|$$ with $$a > b > 0$$, why is the $$y$$-intercept *always positive*?", "answer": "Step 1: $$y$$-intercept is at $$x = 0$$: $$y = a - |0 - b| = a - |-b| = a - b$$ (since $$|-b| = b$$ for $$b > 0$$). Step 2: Given $$a > b$$, the value $$a - b > 0$$, so the $$y$$-intercept is strictly positive. Step 3: Geometrically: the graph is an inverted V with peak at $$(b/2, a)$$ above the $$x$$-axis, and the line decreases (in absolute value of slope) on each side. At $$x = 0$$ (left of the peak since $$b > 0$$), the line is still above the $$x$$-axis, hence positive $$y$$-intercept.", "source": "Opus 4.7 ①", "_id": "opus_1_83", "judge_pick": true}, {"question": "Conceptual: Explain the order of operations in $$y = \\tfrac{1}{2}|f(x)|$$ vs $$y = |\\tfrac{1}{2}f(x)|$$ — are they the same graph?", "answer": "Step 1: $$y = \\tfrac{1}{2}|f(x)|$$: take modulus first (lifts negative parts above), then halve vertically. Step 2: $$y = |\\tfrac{1}{2}f(x)|$$: halve first, then take modulus of the half. Step 3: They're the same! Because $$|\\tfrac{1}{2}f| = \\tfrac{1}{2}|f|$$ — modulus distributes over multiplication by a positive constant. So the two operations *commute* when the constant is positive. (They wouldn't commute if the constant were negative, since modulus would absorb the sign change.)", "source": "Opus 4.7 ①", "_id": "opus_1_84", "judge_pick": false}, {"question": "Misconception probe: A student claims the maximum of $$f(x) = R\\sin(2x + \\alpha) - 1$$ is $$R$$. What's wrong?", "answer": "Step 1: The student forgot to add the constant. $$R\\sin(\\text{anything})$$ has max $$R$$, but the function here is shifted down by 1: $$\\max[R\\sin(2x+\\alpha) - 1] = R - 1$$. Step 2: General rule: $$\\max[R\\sin(\\cdots) + c] = R + c$$. The constant adds (or subtracts) directly to the max. Step 3: Don't drop the $$+c$$ in the boilerplate \"max = R+c\" — it's the only part that depends on the vertical shift.", "source": "Opus 4.7 ①", "_id": "opus_1_85", "judge_pick": true}, {"question": "Conceptual: For an equation like $$\\sin\\phi = 0.4$$ where $$\\phi$$ ranges over a transformed interval (after $$x \\to \\phi = 2x - \\alpha$$), why must you transform the range and then enumerate solutions, rather than solving for $$x$$ directly?", "answer": "Step 1: The substitution $$\\phi = 2x - \\alpha$$ scales and shifts. As $$x$$ ranges over $$[a, b]$$, $$\\phi$$ ranges over $$[2a-\\alpha, 2b-\\alpha]$$ — a different interval, often longer (factor-2 stretch when coefficient is 2). Step 2: $$\\sin\\phi = c$$ has multiple solutions per $$2\\pi$$ period. Within the *transformed* range, you may have several. If you tried to solve in $$x$$ directly, you'd need to track each solution branch separately — error-prone. Step 3: Always: transform range first, find all $$\\phi$$ in that range, then back-substitute to get $$x$$ values. The substitution converts a difficult problem (variable inside trig) to an easier one (standalone trig).", "source": "Opus 4.7 ①", "_id": "opus_1_86", "judge_pick": false}, {"question": "Conceptual: In $$|f(x)|$$, what graphical operation is being performed on the graph of $$y = f(x)$$, and how does it differ from $$f(|x|)$$?", "answer": "Step 1: $$y = |f(x)|$$ takes the graph of $$f$$ and reflects any part below the $$x$$-axis upward (into positive $$y$$-territory). The right-half / left-half symmetry is preserved; only the lower-half flips. Step 2: $$y = f(|x|)$$ takes the right half of the graph (for $$x \\geq 0$$) and mirrors it onto the left half (replacing whatever was at $$x < 0$$ originally). The result is symmetric about the $$y$$-axis. Step 3: Different operations entirely: $$|f|$$ acts on the output (reflects in $$x$$-axis); $$f(|x|)$$ acts on the input (reflects in $$y$$-axis, only the right side is kept). Sketch a single example like $$f(x) = x$$: $$|f| = |x|$$ (V-shape) vs $$f(|x|) = |x|$$ (also V-shape — coincidence here). For $$f(x) = x - 1$$: $$|f| = |x-1|$$ (V at $$x=1$$) vs $$f(|x|) = |x| - 1$$ (V at $$x=0$$, shifted down 1).", "source": "Opus 4.7 ①", "_id": "opus_1_87", "judge_pick": true}, {"question": "Conceptual: A student thinks the inverse of $$g(x) = 3 + 2\\ln x$$ is found by replacing $$\\ln$$ with $$e$$ to get $$g^{-1}(x) = 3 + 2e^x$$. What's wrong?", "answer": "Step 1: The inverse isn't found by \"replacing $$\\ln$$ with $$e$$\" — it's found by *swapping* the input and output and solving. Step 2: From $$y = 3 + 2\\ln x$$: solve for $$x$$. Subtract 3: $$y - 3 = 2\\ln x$$. Divide: $$\\ln x = (y-3)/2$$. Exponentiate: $$x = e^{(y-3)/2}$$. Now swap: $$g^{-1}(x) = e^{(x-3)/2}$$. Step 3: The student's \"$$3 + 2e^x$$\" applies $$\\ln$$/$$e$$ replacement *without* unwinding the operations. The inverse undoes operations in reverse order: original applied $$\\ln$$, then multiplied by 2, then added 3 — inverse subtracts 3, divides by 2, then applies $$e$$.", "source": "Opus 4.7 ①", "_id": "opus_1_88", "judge_pick": true}, {"question": "Synthesis exercise: An exam question asks (a) prove $$f(x) = 2x/(3x-5)$$ is decreasing for $$x>2$$, (b) find $$g^{-1}$$ where $$g(x) = 3 + 2\\ln x$$, (c) solve $$gf(a) = 5$$. Why do parts (a) and (b) facilitate part (c) — what's the strategic build? (3 steps)", "answer": "- Step 1: Part (a) confirms $$f$$ has a one-to-one structure on its domain (decreasing functions are injective). This guarantees that $$gf(a) = 5$$ has a *unique* solution.\n- Step 2: Part (b) gives $$g^{-1}$$, but more importantly forces you to know what \"applying $$g$$\" does — it sets up the recipe for inverting $$g$$ in part (c). When solving $$gf(a) = 5$$, you essentially compute $$f(a) = g^{-1}(5)$$ (since $$g$$ is invertible) and then solve for $$a$$.\n- Step 3: Part (c) thus uses both the *structural* fact (one-to-one from (a)) and the *computational* fact (how to undo $$g$$, from (b)). The build mirrors how a working mathematician would attack this: first establish injectivity, then construct the inverse, then chain backwards from the target.", "source": "Opus 4.7 ①", "_id": "opus_1_89", "judge_pick": true}, {"question": "Synthesis exercise: A trig problem asks (a) show identity reduces to $$3\\sin 2\\theta - 4\\cos 2\\theta = 2$$, (b) hence solve. Why does part (a) make part (b) tractable, and how does $$R$$-formula bridge them? (3 steps)", "answer": "- Step 1: Part (a) reduces a complicated identity (with secant, products, sums) to a *clean two-term linear combination* $$3\\sin 2\\theta - 4\\cos 2\\theta = 2$$. This is the standard form $$a\\sin\\phi - b\\cos\\phi = c$$.\n- Step 2: $$R$$-formula converts this into $$R\\sin(\\phi - \\alpha) = c$$, a single trig equation. Without $$R$$-formula, two trig terms with different \"phases\" can't be solved simultaneously by inverse trig — you can't isolate $$\\theta$$.\n- Step 3: After conversion: $$5\\sin(2\\theta - \\alpha) = 2 \\Rightarrow \\sin(2\\theta - \\alpha) = 0.4$$, now solvable by $$\\arcsin$$ + period considerations. The whole multi-part problem hinges on (a) producing a form (b) can apply $$R$$-formula to.", "source": "Opus 4.7 ①", "_id": "opus_1_90", "judge_pick": false}, {"question": "Misconception probe: A student tries to integrate $$\\int \\dfrac{16}{9(3x-7/3)}dx$$ by writing it as $$\\dfrac{16}{9}\\ln|3x-7/3| + C$$. What's wrong?", "answer": "Step 1: Missing the $$1/a = 1/3$$ factor from $$\\int \\dfrac{1}{ax+b}dx = \\dfrac{1}{a}\\ln|ax+b|$$. Step 2: Correct: $$\\dfrac{16}{9} \\cdot \\dfrac{1}{3}\\ln|3x-7/3| + C = \\dfrac{16}{27}\\ln|3x-7/3| + C$$. Step 3: Verify by differentiation: $$\\dfrac{d}{dx}\\left[\\dfrac{16}{27}\\ln|3x-7/3|\\right] = \\dfrac{16}{27} \\cdot \\dfrac{3}{3x-7/3} = \\dfrac{16}{9(3x-7/3)}$$ ✓. The student's wrong answer would differentiate to $$3\\times$$ the integrand. The $$1/a$$ factor is the *single most-forgotten* item in P3 integration.", "source": "Opus 4.7 ①", "_id": "opus_1_91", "judge_pick": false}, {"question": "Conceptual: When can the **substitution method** for definite integrals reduce computation, vs when does direct antidifferentiation suffice?", "answer": "Step 1: Direct antidifferentiation suffices when the integrand matches a standard form (e.g., $$1/(ax+b)$$, $$\\sin(kx)$$, etc.) — just apply the rule. Step 2: Substitution helps when the integrand contains $$f(g(x))g'(x)$$ pattern — substituting $$u = g(x)$$ transforms it to $$f(u)du$$. For instance, $$\\int 2x \\cdot e^{x^2} dx$$ becomes $$\\int e^u du$$ with $$u = x^2$$. Step 3: For simple linear-in-$$x$$ denominators like $$\\int \\dfrac{1}{ax+b}dx$$, the result $$\\dfrac{1}{a}\\ln|ax+b|$$ is *derivable from* substitution but is faster as a memorised template. So at exam speed, recognise patterns first; substitute only when no template applies.", "source": "Opus 4.7 ①", "_id": "opus_1_92", "judge_pick": true}, {"question": "Numerical exercise: Use the iteration $$x_{n+1} = \\sqrt{x_n + 1}$$ starting from $$x_1 = 1.5$$ to find $$x_3$$ (3 d.p.). What does the limit equal?", "answer": "Step 1: $$x_2 = \\sqrt{1.5 + 1} = \\sqrt{2.5} \\approx 1.581$$. Step 2: $$x_3 = \\sqrt{1.581 + 1} = \\sqrt{2.581} \\approx 1.607$$. Step 3: The limit $$\\alpha$$ satisfies $$\\alpha = \\sqrt{\\alpha + 1} \\Rightarrow \\alpha^2 = \\alpha
