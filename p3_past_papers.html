opus_2_51", "judge_pick": false}, {"question": "Given $$16 = 10 + 8e^{-45B}$$, describe the solve for $$B$$. Why is writing the result as $$\\ln(4/3)/45$$ preferred over $$-\\ln(3/4)/45$$?", "answer": "- Step 1: Isolate the exponential: $$8e^{-45B} = 6 \\Rightarrow e^{-45B} = 6/8 = 3/4$$.\n- Step 2: Take natural log: $$-45B = \\ln(3/4)$$.\n- Step 3: Solve: $$B = -\\tfrac{\\ln(3/4)}{45} = \\tfrac{\\ln(4/3)}{45}$$ (using $$-\\ln(a/b) = \\ln(b/a)$$).\n\nWhy prefer $$\\ln(4/3)/45$$: keeps the answer **positive** explicitly. Physically $$B > 0$$ for exponential decay, so writing it as a positive expression avoids sign confusion and aligns with intuition that the decay rate is positive.\n\nIf you write $$-\\ln(3/4)/45$$, you must remember $$\\ln(3/4) < 0$$, so the double negative gives positive $$B$$ — easy to miscarry the sign.", "source": "Opus 4.7 ②", "_id": "opus_2_52", "judge_pick": false}, {"question": "For a cooling model $$T = 10 + 8e^{-Bt}$$ with $$B > 0$$, what is $$dT/dt$$, and what does its sign mean physically?", "answer": "- Step 1: Differentiate: the constant 10 vanishes; chain rule on $$8e^{-Bt}$$ gives $$\\tfrac{dT}{dt} = 8 \\cdot e^{-Bt} \\cdot (-B) = -8Be^{-Bt}$$.\n- Step 2: Sign: $$B > 0$$, and $$e^{-Bt} > 0$$ for all $$t$$, so $$-8Be^{-Bt} < 0$$.\n- Step 3: Physical meaning: $$dT/dt < 0$$ means temperature is **falling** over time — consistent with cooling toward room temperature.\n\nMagnitude interpretation: $$|dT/dt|$$ is large at small $$t$$ (just after heat source off) and approaches 0 as $$t \\to \\infty$$ (cooling slows as $$T$$ approaches the asymptote).", "source": "Opus 4.7 ②", "_id": "opus_2_53", "judge_pick": false}, {"question": "For the model $$T = 10 + 8e^{-Bt}$$ with $$B > 0$$, rigorously explain why $$T$$ can never fall to $$5°C$$, no matter how large $$t$$ becomes. (3 steps)", "answer": "- Step 1: The exponential factor $$e^{-Bt}$$ is **strictly positive** for all real $$t$$ (no matter how large). It approaches 0 as $$t \\to \\infty$$ but never equals 0.\n- Step 2: Therefore $$8e^{-Bt} > 0$$ always, which means $$T = 10 + 8e^{-Bt} > 10$$ for all finite $$t$$.\n- Step 3: Since $$T > 10$$ always, $$T$$ can never equal $$5$$ (which would require $$T < 10$$). The asymptote $$T = 10$$ is an unbreachable floor from above.\n\nKey concept: **horizontal asymptote** at $$T = C$$ in models $$T = C + Ae^{-Bt}$$ (with $$A > 0$$) — the function approaches $$C$$ but never crosses it from above.", "source": "Opus 4.7 ②", "_id": "opus_2_54", "judge_pick": false}, {"question": "For a decay model $$T = C + Ae^{-Bt}$$ with $$A, B > 0$$, identify the horizontal asymptote and describe how $$T$$ approaches it.", "answer": "- Step 1: As $$t \\to \\infty$$: $$Bt \\to \\infty$$, so $$-Bt \\to -\\infty$$, hence $$e^{-Bt} \\to 0$$.\n- Step 2: Therefore $$T \\to C + A \\cdot 0 = C$$. The horizontal asymptote is $$T = C$$.\n- Step 3: Since $$Ae^{-Bt} > 0$$ always (given $$A > 0$$), $$T > C$$ for all finite $$t$$ — approach is from above.\n\nPhysical: $$C$$ represents the ambient (e.g., room) temperature; $$A$$ is the initial excess over ambient; $$B$$ is the cooling rate.\n\nNote: if $$A < 0$$, approach is from below (heating up), but the asymptote is still $$C$$.", "source": "Opus 4.7 ②", "_id": "opus_2_55", "judge_pick": true}, {"question": "For the population model $$u_n = 2000 \\times 1.03^n$$ where there are 2000 people \"at the start\" ($$t = 0$$), how many are present 6 years later? What power of 1.03 applies, and what's the common error?", "answer": "- Step 1: Establish the convention: $$n = 0$$ corresponds to \"the start\", so $$u_0 = 2000 \\times 1.03^0 = 2000$$ ✓. Six years later means $$n = 6$$.\n- Step 2: Compute: $$u_6 = 2000 \\times 1.03^6 \\approx 2000 \\times 1.194 \\approx 2390$$ (3 s.f.).\n- Step 3: Common error: using $$1.03^5$$, based on \"five jumps between six data points\" reasoning. This is off-by-one — if $$t = 0$$ is a data point, \"6 years later\" means **six jumps**, not five.\n\nRule: if $$u_0$$ is the starting value, then \"$$n$$ years later\" uses $$u_n = u_0 \\cdot r^n$$, with power equal to the number of years.", "source": "Opus 4.7 ②", "_id": "opus_2_56", "judge_pick": false}, {"question": "Given $$ab^4 = 3690$$ and $$ab^7 = 3470$$, describe the two-step process to find $$b$$ and then $$a$$. What's the common off-by-one error?", "answer": "- Step 1: Divide the two equations: $$\\tfrac{ab^7}{ab^4} = b^{7-4} = b^3 = \\tfrac{3470}{3690}$$. Take cube root: $$b \\approx 0.98$$.\n- Step 2: Substitute back into either original. Using $$ab^4 = 3690$$: $$a = \\tfrac{3690}{b^4} = \\tfrac{3690}{0.98^4} \\approx \\tfrac{3690}{0.9224} \\approx 4000$$.\n- Step 3: Common error: substituting as if it were $$ab^3 = 3690$$ (wrong power). Students read the subscript 4 in $$ab^4$$ and accidentally divide by $$b^3$$ instead.\n\nRule: when isolating $$a$$, divide by the **actual** power shown in the equation, not the power you just computed via division.", "source": "Opus 4.7 ②", "_id": "opus_2_57", "judge_pick": false}, {"question": "Two populations evolve as $$P_1(T) = 2000 \\times 1.03^T$$ and $$P_2(T) = 4000 \\times 0.98^T$$. Conceptually solve for $$T$$ when they become equal. (4 steps)", "answer": "- Step 1: Set equal: $$2000 \\times 1.03^T = 4000 \\times 0.98^T$$.\n- Step 2: Rearrange — divide both sides by $$2000 \\times 0.98^T$$: $$\\tfrac{1.03^T}{0.98^T} = 2$$, i.e., $$\\left(\\tfrac{1.03}{0.98}\\right)^T = 2$$.\n- Step 3: Take natural logarithm (unknown is in exponent): $$T \\ln(1.03/0.98) = \\ln 2$$.\n- Step 4: Solve: $$T = \\tfrac{\\ln 2}{\\ln(1.03/0.98)}$$. Numerically $$\\approx 0.693 / 0.0498 \\approx 13.9$$ years.\n\nInsight: combining two exponentials into a single ratio is the key manoeuvre — turns \"two unknowns in exponent\" into \"one\".", "source": "Opus 4.7 ②", "_id": "opus_2_58", "judge_pick": false}, {"question": "Differentiate $$y = \\tfrac{16}{9(3x - k)}$$ with respect to $$x$$, treating $$k$$ as a constant. Describe the chain rule structure. (3 steps)", "answer": "- Step 1: Rewrite as negative power: $$y = \\tfrac{16}{9}(3x - k)^{-1}$$. The $$\\tfrac{16}{9}$$ is a constant multiplier.\n- Step 2: Chain rule: differentiate the \"outer\" power $$u^{-1}$$ to get $$-u^{-2}$$, then multiply by \"inner\" derivative $$\\tfrac{d}{dx}(3x - k) = 3$$.\n- Step 3: Assemble: $$\\tfrac{dy}{dx} = \\tfrac{16}{9} \\cdot (-1)(3x - k)^{-2} \\cdot 3 = -\\tfrac{16 \\cdot 3}{9(3x-k)^2} = -\\tfrac{16}{3(3x-k)^2}$$.\n\nSanity: negative power becomes more negative by 1 (i.e., $$-2$$); the coefficient picks up both the $$-1$$ from differentiating the power AND the $$3$$ from the inner derivative.", "source": "Opus 4.7 ②", "_id": "opus_2_59", "judge_pick": true}, {"question": "Compute $$\\int \\tfrac{16}{9(3x - 7/3)} dx$$ conceptually. What template applies and what's the biggest computational trap?", "answer": "- Step 1: Factor out constants: $$\\int \\tfrac{16}{9(3x - 7/3)} dx = \\tfrac{16}{9} \\int \\tfrac{1}{3x - 7/3} dx$$.\n- Step 2: Apply template $$\\int \\tfrac{1}{ax + b} dx = \\tfrac{1}{a}\\ln|ax + b| + C$$. Here $$a = 3$$, so factor is $$\\tfrac{1}{3}$$: $$\\tfrac{16}{9} \\cdot \\tfrac{1}{3}\\ln|3x - 7/3| = \\tfrac{16}{27}\\ln|3x - 7/3| + C$$.\n- Step 3: Biggest trap: **forgetting the $$1/a = 1/3$$ factor**. Without it, the answer would be $$\\tfrac{16}{9}\\ln|3x - 7/3|$$ — off by a factor of 3.\n\nTriple-check: coefficient of $$x$$ in denominator — the $$1/a$$ correction comes from that.", "source": "Opus 4.7 ②", "_id": "opus_2_60", "judge_pick": false}, {"question": "After integrating, you obtain $$\\tfrac{16}{27}\\left(\\ln|20/3| - \\ln|2/3|\\right)$$. Why must you simplify this before finishing the answer? (2 steps)", "answer": "- Step 1: The target form (e.g., \"$$\\lambda \\ln 10$$\") expects a single logarithm with an integer or simple argument — not a difference of two logs.\n- Step 2: Apply log laws: $$\\ln|20/3| - \\ln|2/3| = \\ln\\left(\\tfrac{20/3}{2/3}\\right) = \\ln\\left(\\tfrac{20}{3} \\cdot \\tfrac{3}{2}\\right) = \\ln 10$$. Hence answer is $$\\tfrac{16}{27}\\ln 10$$, giving $$\\lambda = \\tfrac{16}{27}$$.\n\nWithout combining, you cannot read off $$\\lambda$$ because the form doesn't match. The $$3$$'s cancel beautifully — the question is engineered so logs consolidate cleanly.", "source": "Opus 4.7 ②", "_id": "opus_2_61", "judge_pick": false}, {"question": "Conceptually walk through the graph-building process for $$y = a - |2x - b|$$ (with $$a > b > 0$$), starting from $$y = 2x$$, identifying vertex and overall shape. (5 steps)", "answer": "- Step 1: $$y = 2x$$: straight line through origin with slope 2.\n- Step 2: $$y = |2x|$$: V-shape with vertex at origin; reflects negative-$$y$$ portion above axis.\n- Step 3: $$y = |2x - b|$$: shift the V-shape right by $$b/2$$ (since setting $$2x - b = 0$$ gives $$x = b/2$$). Vertex at $$(b/2, 0)$$.\n- Step 4: $$y = -|2x - b|$$: reflect in the $$x$$-axis — flips to an **inverted V** (∧ shape), vertex still at $$(b/2, 0)$$.\n- Step 5: $$y = a - |2x - b|$$: shift up by $$a$$ — inverted V with vertex at $$(b/2, a)$$, opening downward.\n\nShape summary: an inverted V (\"∧\") — increasing to vertex, then decreasing. Max at $$(b/2, a)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_62", "judge_pick": false}, {"question": "For $$y = a - |2x - b|$$ with $$a, b > 0$$: identify the coordinates of the maximum, and explain why it's a maximum (not minimum).", "answer": "- Step 1: The modulus $$|2x - b|$$ has minimum value 0, attained at $$2x - b = 0 \\Rightarrow x = b/2$$.\n- Step 2: So $$a - |2x - b|$$ is **largest** when $$|2x - b|$$ is smallest (because we're subtracting). Max occurs at $$x = b/2$$ with value $$y = a - 0 = a$$.\n- Step 3: Max point: $$(b/2, a)$$. Why max not min: the \"$$-|\\cdots|$$\" structure means adding 0 gives the largest $$y$$; any nonzero modulus value makes $$y$$ smaller.\n\nContrast with $$a + |2x - b|$$: that would be a minimum, because adding a non-negative modulus makes $$y$$ bigger.", "source": "Opus 4.7 ②", "_id": "opus_2_63", "judge_pick": false}, {"question": "Why does the vertex of $$y = a - |2x - b|$$ sit at $$x = b/2$$, not $$x = b$$? (2 steps)", "answer": "- Step 1: The vertex is where the inside of the modulus is zero: $$2x - b = 0$$. This is **one equation in one unknown**.\n- Step 2: Solving for $$x$$: $$2x = b \\Rightarrow x = b/2$$. The factor of 2 on $$x$$ means you must divide $$b$$ by 2 when isolating.\n\nCommon error: \"just use $$x = b$$\" — students read $$|2x - b|$$ and pick off the $$b$$, forgetting to undo the coefficient of $$x$$.\n\nSanity: at $$x = b/2$$: $$|2 \\cdot (b/2) - b| = |b - b| = 0$$ ✓; at $$x = b$$: $$|2b - b| = |b| = b \\neq 0$$.", "source": "Opus 4.7 ②", "_id": "opus_2_64", "judge_pick": false}, {"question": "Find the $$y$$-intercept of $$y = a - |2x - b|$$ with $$a > b > 0$$. Confirm its sign and explain.", "answer": "- Step 1: $$y$$-intercept at $$x = 0$$: $$y = a - |2(0) - b| = a - |-b| = a - b$$ (since $$b > 0$$, $$|-b| = b$$).\n- Step 2: Sign: $$a - b > 0$$ because $$a > b$$ is given.\n- Step 3: So the $$y$$-intercept is $$(0, a - b)$$ — positive, above the origin.\n\nGeometric picture: the curve intersects the $$y$$-axis at some positive height, climbs to its max at $$(b/2, a)$$, then descends crossing $$x$$-axis at $$(a+b)/2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_65", "judge_pick": false}, {"question": "To find the $$x$$-intercepts of $$y = a - |2x - b|$$, explain the two-branch approach and why there are typically two solutions. (3 steps)", "answer": "- Step 1: Set $$y = 0$$: $$a - |2x - b| = 0 \\Rightarrow |2x - b| = a$$. So $$2x - b = \\pm a$$.\n- Step 2: Two branches:\n+ Branch A: $$2x - b = a \\Rightarrow x = (a+b)/2$$\n+ Branch B: $$2x - b = -a \\Rightarrow x = (b - a)/2$$\n- Step 3: Given $$a > b > 0$$: Branch A gives positive $$x$$; Branch B gives **negative** $$x$$ (since $$b - a < 0$$).\n\nGeometric picture: the inverted V has two arms, each crossing the $$x$$-axis once (symmetric about the vertex $$x = b/2$$). Intercepts at $$((b-a)/2, 0)$$ and $$((b+a)/2, 0)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_66", "judge_pick": true}, {"question": "When equating $$y = |x + 1|$$ and $$y = a - |2x - b|$$ at a specific $$x$$-value, how do you decide which branch (positive or negative) of each modulus to use?", "answer": "- Step 1: Examine the sign of each expression inside the modulus at the given $$x$$:\n+ For $$|x + 1|$$: if $$x > -1$$, use $$x + 1$$ (positive branch); if $$x < -1$$, use $$-(x+1)$$.\n+ For $$|2x - b|$$: if $$x > b/2$$, use $$2x - b$$; if $$x < b/2$$, use $$-(2x - b) = b - 2x$$.\n- Step 2: At intersection points, apply both substitutions based on which side of the \"corner\" each $$x$$ sits.\n- Step 3: Visual check: sketch both graphs; at each intersection, identify which line segment is being crossed.\n\nMr Fuat: \"Use the graph to determine the cases.\" Algebra alone picks all four combinations (++, +−, −+, −−), but only the geometrically-correct one represents the real intersection.", "source": "Opus 4.7 ②", "_id": "opus_2_67", "judge_pick": false}, {"question": "After case-selection gives the system $$a + b = 16$$ and $$a - b = 8$$, solve conceptually and verify the constraint $$a > b > 0$$. (2 steps)", "answer": "- Step 1: **Add** the two equations: $$(a + b) + (a - b) = 16 + 8 \\Rightarrow 2a = 24 \\Rightarrow a = 12$$.\n- Step 2: **Subtract**: $$(a + b) - (a - b) = 16 - 8 \\Rightarrow 2b = 8 \\Rightarrow b = 4$$.\n\nVerify: $$a = 12$$, $$b = 4$$. Check $$a > b > 0$$: $$12 > 4 > 0$$ ✓.\n\nMeta: linear simultaneous equations in this form (sum and difference) solve by add/subtract in two lines — faster than substitution.", "source": "Opus 4.7 ②", "_id": "opus_2_68", "judge_pick": false}, {"question": "To prove $$\\tfrac{3\\sin\\theta\\cos\\theta}{\\cos\\theta + \\sin\\theta} = (2 + \\sec 2\\theta)(\\cos\\theta - \\sin\\theta)$$ reduces to $$3\\sin 2\\theta - 4\\cos 2\\theta = 2$$, what structural hints in the target equation tell you which identities to use?", "answer": "- Step 1: The target contains $$\\sin 2\\theta$$ and $$\\cos 2\\theta$$ — all double angles. Hint: transform every single-angle expression into double-angle form.\n- Step 2: Spot the patterns:\n+ $$\\sin\\theta\\cos\\theta \\to \\tfrac{1}{2}\\sin 2\\theta$$ (double-angle for sine).\n+ $$(\\cos\\theta + \\sin\\theta)(\\cos\\theta - \\sin\\theta) \\to \\cos^2\\theta - \\sin^2\\theta = \\cos 2\\theta$$ (difference of squares → double-angle for cosine).\n+ $$\\sec 2\\theta \\cdot \\cos 2\\theta = 1$$ (reciprocal identity cancellation).\n- Step 3: Strategy: multiply both sides by $$(\\cos\\theta + \\sin\\theta)$$ to pair it with $$(\\cos\\theta - \\sin\\theta)$$, triggering the difference-of-squares collapse.\n\nPrinciple: \"act with respect to the answer\" — let the target form dictate which identities you reach for.", "source": "Opus 4.7 ②", "_id": "opus_2_69", "judge_pick": false}, {"question": "Explain why $$(2 + \\sec 2\\theta)\\cos 2\\theta = 2\\cos 2\\theta + 1$$. Why is this cancellation convenient in trig proofs?", "answer": "- Step 1: Distribute: $$(2 + \\sec 2\\theta)\\cos 2\\theta = 2\\cos 2\\theta + \\sec 2\\theta \\cdot \\cos 2\\theta$$.\n- Step 2: Apply $$\\sec 2\\theta = \\tfrac{1}{\\cos 2\\theta}$$: the product $$\\sec 2\\theta \\cdot \\cos 2\\theta = \\tfrac{\\cos 2\\theta}{\\cos 2\\theta} = 1$$.\n- Step 3: So the expression simplifies to $$2\\cos 2\\theta + 1$$.\n\nConvenience: the $$\\sec$$ and $$\\cos$$ are reciprocals at the same angle, so multiplying them eliminates a term entirely — converts a messy product into a simple linear expression.\n\nMnemonic: $$\\sec x \\cos x = 1$$ always; same for $$\\csc x \\sin x = 1$$ and $$\\cot x \\tan x = 1$$.", "source": "Opus 4.7 ②", "_id": "opus_2_70", "judge_pick": false}, {"question": "Write $$3\\sin 2x - 4\\cos 2x$$ in the form $$R\\sin(2x - \\alpha)$$ with $$R > 0$$ and $$0 < \\alpha < \\pi/2$$. Describe the systematic approach. (3 steps)", "answer": "- Step 1: Match coefficients. $$R\\sin(2x - \\alpha) = R\\sin 2x \\cos\\alpha - R\\cos 2x \\sin\\alpha$$. Compare: $$R\\cos\\alpha = 3$$, $$R\\sin\\alpha = 4$$.\n- Step 2: Square and add to find $$R$$: $$R^2(\\cos^2\\alpha + \\sin^2\\alpha) = 9 + 16 = 25 \\Rightarrow R = 5$$.\n- Step 3: Divide to find $$\\alpha$$: $$\\tan\\alpha = \\tfrac{R\\sin\\alpha}{R\\cos\\alpha} = \\tfrac{4}{3}$$, so $$\\alpha = \\arctan(4/3) \\approx 0.9273$$ rad.\n\nResult: $$3\\sin 2x - 4\\cos 2x = 5\\sin(2x - 0.9273)$$.\n\nCheck: both required signs and angle ranges — $$R > 0$$, $$\\alpha$$ in first quadrant ✓.", "source": "Opus 4.7 ②", "_id": "opus_2_71", "judge_pick": false}, {"question": "To solve $$5\\sin(2x - 0.9273) = 2$$ for $$\\pi \\leq x \\leq 3\\pi/2$$, describe the range-transformation and solution-finding strategy. (4 steps)", "answer": "- Step 1: Simplify: $$\\sin(2x - 0.9273) = 0.4$$. Let $$\\phi = 2x - 0.9273$$ for clarity.\n- Step 2: Transform the range: if $$\\pi \\leq x \\leq 3\\pi/2$$, then $$2\\pi - 0.9273 \\leq \\phi \\leq 3\\pi - 0.9273$$, approximately $$[5.356, 8.497]$$.\n- Step 3: Base solution: $$\\phi_0 = \\arcsin(0.4) \\approx 0.4115$$. General solutions: $$\\phi = 2n\\pi + 0.4115$$ or $$\\phi = (2n+1)\\pi - 0.4115$$.\n- Step 4: Filter for $$\\phi \\in [5.356, 8.497]$$: only $$\\phi = 2\\pi + 0.4115 \\approx 6.695$$ works. Solve: $$2x - 0.9273 = 6.695 \\Rightarrow x \\approx 3.81$$.\n\nKey moves: transform the range, enumerate general solutions, filter to target range.", "source": "Opus 4.7 ②", "_id": "opus_2_72", "judge_pick": true}, {"question": "When working with expressions like $$\\arcsin(0.4)$$ in a problem with range specified in radians (e.g., $$[\\pi, 3\\pi/2]$$), why is calculator mode critical, and what's the common mistake?", "answer": "- Step 1: Calculator has two trig modes: **Degrees** (DEG) and **Radians** (RAD). Each gives different numerical outputs for the same input.\n- Step 2: If the range is given with $$\\pi$$, the problem is in radians. Calculator must be in RAD mode, else $$\\arcsin(0.4) \\approx 23.58°$$ (degrees) instead of $$0.4115$$ rad.\n- Step 3: Common error: default mode is often DEG; a student forgetting to switch gets wildly wrong decimal answers, then cannot match against a radian range.\n\nPractical: before starting any radian-based trig problem, check mode. Mr Fuat: \"Angle units... and then radians.\"", "source": "Opus 4.7 ②", "_id": "opus_2_73", "judge_pick": false}, {"question": "State the compound angle formulae for $$\\sin(A \\pm B)$$, $$\\cos(A \\pm B)$$, and $$\\tan(A \\pm B)$$. What's the notable sign alternation in cosine versus sine?", "answer": "- **Sine**: $$\\sin(A \\pm B) = \\sin A \\cos B \\pm \\cos A \\sin B$$ (signs inside and out match).\n- **Cosine**: $$\\cos(A \\pm B) = \\cos A \\cos B \\mp \\sin A \\sin B$$ (signs **flip**!).\n- **Tangent**: $$\\tan(A \\pm B) = \\tfrac{\\tan A \\pm \\tan B}{1 \\mp \\tan A \\tan B}$$ (inside sign on top, flipped sign on bottom).\n\nKey sign lesson: for **cosine**, $$\\cos(A+B) = \\cos A\\cos B - \\sin A\\sin B$$ uses **minus**; $$\\cos(A-B)$$ uses **plus**. This is the opposite of what many students naïvely guess.\n\nMnemonic: \"Cosine cross-terms carry the opposite sign.\"", "source": "Opus 4.7 ②", "_id": "opus_2_74", "judge_pick": true}, {"question": "Given the result $$\\sqrt{2}\\sin(x + 45°) = \\cos(x - 60°) \\Rightarrow \\tan x = -2 - \\sqrt{3}$$, the next question asks you to solve $$\\sqrt{2}\\sin(2\\theta) = \\cos(2\\theta - 105°)$$. What substitution matches the two structures?", "answer": "- Step 1: Compare the two equations:\n+ Original: $$\\sqrt{2}\\sin(x + 45°) = \\cos(x - 60°)$$.\n+ Target: $$\\sqrt{2}\\sin(2\\theta) = \\cos(2\\theta - 105°)$$.\n- Step 2: Match the sine arguments: want $$x + 45° = 2\\theta$$, so $$x = 2\\theta - 45°$$.\n- Step 3: Check cosine arguments match: $$x - 60° = (2\\theta - 45°) - 60° = 2\\theta - 105°$$ ✓.\n- Step 4: So wherever the original says $$x$$, substitute $$2\\theta - 45°$$. Then $$\\tan(2\\theta - 45°) = -2 - \\sqrt{3}$$.\n\nSince $$-2 - \\sqrt{3} = \\tan 105°$$, we get $$2\\theta - 45° = 105° + 180°n$$, giving $$\\theta = 75°, 165°$$ in $$[0, 180°)$$.\n\nStrategy: recognise the pattern, not just the numbers — the structure of the two equations is identical up to renaming.", "source": "Opus 4.7 ②", "_id": "opus_2_75", "judge_pick": false}, {"question": "Prove $$\\sqrt{2}\\sin(x + 45°) = \\cos(x - 60°)$$ implies $$\\tan x = -2 - \\sqrt{3}$$ by expanding both sides via compound angle. (4 steps)", "answer": "- Step 1: Expand LHS using $$\\sin(A+B) = \\sin A\\cos B + \\cos A\\sin B$$: $$\\sqrt{2}\\sin(x + 45°) = \\sqrt{2}(\\sin x\\cos 45° + \\cos x\\sin 45°) = \\sqrt{2}(\\sin x \\cdot \\tfrac{\\sqrt{2}}{2} + \\cos x \\cdot \\tfrac{\\sqrt{2}}{2}) = \\sin x + \\cos x$$.\n- Step 2: Expand RHS using $$\\cos(A-B) = \\cos A\\cos B + \\sin A\\sin B$$: $$\\cos(x - 60°) = \\cos x \\cos 60° + \\sin x \\sin 60° = \\tfrac{1}{2}\\cos x + \\tfrac{\\sqrt{3}}{2}\\sin x$$.\n- Step 3: Equate: $$\\sin x + \\cos x = \\tfrac{1}{2}\\cos x + \\tfrac{\\sqrt{3}}{2}\\sin x$$. Rearrange: $$\\sin x - \\tfrac{\\sqrt{3}}{2}\\sin x = \\tfrac{1}{2}\\cos x - \\cos x$$, i.e., $$\\sin x(1 - \\tfrac{\\sqrt{3}}{2}) = \\cos x(-\\tfrac{1}{2})$$.\n- Step 4: Divide both sides by $$\\cos x (1 - \\tfrac{\\sqrt{3}}{2})$$: $$\\tan x = \\tfrac{-1/2}{1 - \\sqrt{3}/2} = \\tfrac{-1}{2 - \\sqrt{3}} = \\tfrac{-(2+\\sqrt{3})}{(2-\\sqrt{3})(2+\\sqrt{3})} = \\tfrac{-(2+\\sqrt{3})}{4 - 3} = -2 - \\sqrt{3}$$.\n\nTechnique: rationalise the denominator by multiplying top and bottom by the conjugate.", "source": "Opus 4.7 ②", "_id": "opus_2_76", "judge_pick": false}, {"question": "State the three reciprocal trig functions ($$\\sec, \\csc, \\cot$$) in terms of $$\\sin, \\cos, \\tan$$, and the two Pythagoras-derived identities involving them.", "answer": "**Reciprocal definitions**:\n- $$\\sec x = \\tfrac{1}{\\cos x}$$\n- $$\\csc x = \\tfrac{1}{\\sin x}$$\n- $$\\cot x = \\tfrac{\\cos x}{\\sin x} = \\tfrac{1}{\\tan x}$$\n\n**Pythagoras-derived identities** (from $$\\sin^2 x + \\cos^2 x = 1$$ divided by $$\\cos^2 x$$ or $$\\sin^2 x$$):\n- Divide by $$\\cos^2 x$$: $$\\tan^2 x + 1 = \\sec^2 x$$, so $$1 + \\tan^2 x = \\sec^2 x$$.\n- Divide by $$\\sin^2 x$$: $$1 + \\cot^2 x = \\csc^2 x$$.\n\nUse: convert between $$\\tan$$ and $$\\sec$$ (or $$\\cot$$ and $$\\csc$$) in integration and equation solving.", "source": "Opus 4.7 ②", "_id": "opus_2_77", "judge_pick": false}, {"question": "For the transformation $$y = f(2x)$$, what is the horizontal scale factor (and why), and what is the image of $$(-4, -3)$$ on $$y = f(x)$$?", "answer": "- Step 1: Horizontal scale factor = $$1/2$$ (not 2!). The \"$$2$$\" inside compresses the graph horizontally.\n- Step 2: Why: to get the same $$y$$-value as $$f$$ originally had at some point $$a$$, the new function needs $$2x = a$$, i.e., $$x = a/2$$. So every $$x$$-coordinate is halved.\n- Step 3: For $$(-4, -3)$$: new $$x = -4/2 = -2$$; $$y$$ unchanged. Image: $$(-2, -3)$$.\n\nMr Fuat: \"Scale factor is actually a half, that's why we divide by 2 for the $$x$$.\" Common confusion: thinking \"2x\" means \"twice as wide\" — it's the opposite.\n\nRule: inside-the-function transformations are \"opposite\" of what they look like.", "source": "Opus 4.7 ②", "_id": "opus_2_78", "judge_pick": true}, {"question": "For $$y = \\tfrac{1}{2}|f(x)|$$, explain the two-step transformation applied to a point $$(x_0, y_0)$$ on $$y = f(x)$$.", "answer": "- Step 1: First apply the modulus: $$y_0 \\to |y_0|$$. If $$y_0 \\geq 0$$, unchanged. If $$y_0 < 0$$, reflected to $$-y_0 > 0$$.\n- Step 2: Then apply the $$\\tfrac{1}{2}$$ scale factor: $$|y_0| \\to \\tfrac{1}{2}|y_0|$$. Halves the magnitude.\n- Step 3: $$x$$-coordinate is unchanged by either operation.\n\nExample: $$(-4, -3) \\to (-4, |-3|) = (-4, 3) \\to (-4, 1.5)$$.\n\nGeometric meaning: $$|f(x)|$$ reflects any below-axis portions above the $$x$$-axis; $$\\tfrac{1}{2}$$ compresses everything vertically to half-height.", "source": "Opus 4.7 ②", "_id": "opus_2_79", "judge_pick": false}, {"question": "Find the image of $$(-4, -3)$$ on $$y = f(x)$$ under $$y = 3f(x - 1)$$. Show the shift and stretch separately. (2 steps)", "answer": "- Step 1: Inside-the-function shift: $$x \\to x + 1$$ (to compensate for $$x - 1$$), so $$-4 \\to -4 + 1 = -3$$. Vertical stretch: $$y \\to 3y$$, so $$-3 \\to 3 \\cdot (-3) = -9$$.\n- Step 2: Image: $$(-3, -9)$$.\n\nRule check: for $$y = af(x - h)$$, point $$(x_0, y_0) \\to (x_0 + h, ay_0)$$. Here $$h = 1$$, $$a = 3$$.\n\nNote: shift and stretch commute here (inside vs outside the function); order doesn't affect the outcome.", "source": "Opus 4.7 ②", "_id": "opus_2_80", "judge_pick": false}, {"question": "When asked to \"prove $$g(x)$$ is increasing\" on a domain, what is the full chain of argument required? (4 steps)", "answer": "- Step 1: **Compute $$g'(x)$$** by applying the appropriate differentiation rule (quotient, product, chain, etc.).\n- Step 2: **Simplify $$g'(x)$$** into a form where the sign is transparent — typically (constant numerator)/(positive denominator).\n- Step 3: **Argue the sign** structurally: \"numerator is positive because [reason]; denominator is $$(\\cdots)^2 > 0$$; hence $$g'(x) > 0$$.\"\n- Step 4: **State the conclusion** explicitly: \"for all $$x$$ in the domain, $$g'(x) > 0$$; therefore $$g$$ is (strictly) increasing.\"\n\nKey requirement: the argument must hold for **all** $$x$$ in the domain — not just one test value. Also state the domain explicitly (e.g., \"for $$x > 2$$\" if that's given).", "source": "Opus 4.7 ②", "_id": "opus_2_81", "judge_pick": false}, {"question": "In the quotient rule, why is the numerator $$u'v - uv'$$ (this specific order) rather than $$uv' - u'v$$?", "answer": "- Step 1: The quotient rule is derived from the product rule applied to $$u \\cdot v^{-1}$$:\n$$\\tfrac{d}{dx}(u \\cdot v^{-1}) = u' v^{-1} + u \\cdot (-v^{-2}) v' = \\tfrac{u'}{v} - \\tfrac{uv'}{v^2}$$.\n- Step 2: Combine over a common denominator: $$\\tfrac{u'v - uv'}{v^2}$$. The $$u'v$$ term comes from differentiating $$u$$ first; $$uv'$$ from differentiating $$v$$.\n- Step 3: Flipping the order ($$uv' - u'v$$) produces the **negative** of the correct derivative, which would reverse sign conclusions (e.g., \"increasing\" vs \"decreasing\").\n\nMnemonic: \"Low dee-High minus High dee-Low, over Low squared.\" (\"Low\" = denominator, \"High\" = numerator.)", "source": "Opus 4.7 ②", "_id": "opus_2_82", "judge_pick": true}, {"question": "Why does $$\\tfrac{d}{dx}[e^{3\\sin x}] = 3\\cos x \\cdot e^{3\\sin x}$$? Explain via the chain rule.", "answer": "- Step 1: Chain rule: $$\\tfrac{d}{dx}[e^{u(x)}] = e^{u(x)} \\cdot u'(x)$$. The \"outer\" derivative of the exponential is itself; \"inner\" derivative multiplies.\n- Step 2: Here $$u(x) = 3\\sin x$$, so $$u'(x) = 3\\cos x$$.\n- Step 3: Assemble: $$\\tfrac{d}{dx}[e^{3\\sin x}] = e^{3\\sin x} \\cdot 3\\cos x = 3\\cos x \\cdot e^{3\\sin x}$$.\n\nGeneral rule: $$\\tfrac{d}{dx}[e^{f(x)}] = f'(x) \\cdot e^{f(x)}$$. The exponential \"survives\"; the inner derivative is the new multiplier.", "source": "Opus 4.7 ②", "_id": "opus_2_83", "judge_pick": false}, {"question": "Factorise $$2x^2 - 32$$ and explain why recognising the difference-of-squares pattern matters.", "answer": "- Step 1: Factor out 2: $$2x^2 - 32 = 2(x^2 - 16)$$.\n- Step 2: Spot difference of squares: $$x^2 - 16 = x^2 - 4^2 = (x - 4)(x + 4)$$.\n- Step 3: Full factorisation: $$2(x - 4)(x + 4)$$.\n\nWhy matters: in expressions like $$\\tfrac{2x^2 - 32}{3x^2 + 7x - 20}$$, you need both numerator and denominator factored to spot cancellable factors. Without factoring, $$(x + 4)$$ in both is invisible.\n\nIdentity: $$a^2 - b^2 = (a-b)(a+b)$$ — arises whenever two square terms are subtracted.", "source": "Opus 4.7 ②", "_id": "opus_2_84", "judge_pick": true}, {"question": "Factor $$3x^2 + 7x - 20$$ using the AC method (or systematic trinomial approach). (4 steps)", "answer": "- Step 1: Identify $$a = 3$$, $$b = 7$$, $$c = -20$$. Compute $$ac = 3 \\cdot (-20) = -60$$.\n- Step 2: Find two numbers multiplying to $$-60$$ and adding to $$7$$: options are $$12$$ and $$-5$$ (since $$12 \\cdot -5 = -60$$ and $$12 + (-5) = 7$$).\n- Step 3: Split the middle: $$3x^2 + 12x - 5x - 20 = 3x(x + 4) - 5(x + 4)$$.\n- Step 4: Factor by grouping: $$(3x - 5)(x + 4)$$.\n\nCheck: $$(3x - 5)(x + 4) = 3x^2 + 12x - 5x - 20 = 3x^2 + 7x - 20$$ ✓.", "source": "Opus 4.7 ②", "_id": "opus_2_85", "judge_pick": false}, {"question": "In simplifying $$\\tfrac{2(x-4)(x+4)}{(3x-5)(x+4)}$$, why is cancelling $$(x+4)$$ valid, and under what domain constraint should you verify?", "answer": "- Step 1: Cancellation of a factor requires that factor to be **nonzero** in the domain of interest.\n- Step 2: $$(x + 4) = 0$$ would require $$x = -4$$. The question specifies $$x > 2$$, so $$x = -4$$ is excluded. Hence $$(x + 4) \\neq 0$$ throughout the domain.\n- Step 3: Cancellation is valid: $$\\tfrac{2(x-4)(x+4)}{(3x-5)(x+4)} = \\tfrac{2(x-4)}{3x-5}$$ for $$x > 2$$.\n\nSubtlety: without the domain constraint, $$x = -4$$ would be a \"removable discontinuity\" — the simplified function is defined there, but the original isn't.", "source": "Opus 4.7 ②", "_id": "opus_2_86", "judge_pick": true}, {"question": "To find $$g^{-1}(x)$$ where $$g(x) = 3 + 2\\ln x$$, describe the \"set, solve, swap\" procedure.", "answer": "- Step 1: **Set** $$y = g(x)$$: $$y = 3 + 2\\ln x$$.\n- Step 2: **Solve** for $$x$$ in terms of $$y$$:\n+ Subtract 3: $$y - 3 = 2\\ln x$$\n+ Divide by 2: $$\\ln x = (y-3)/2$$\n+ Exponentiate: $$x = e^{(y-3)/2}$$\n- Step 3: **Swap** labels: $$g^{-1}(x) = e^{(x-3)/2}$$.\n\nWhy swap: by convention, we write functions with $$x$$ as input. The inverse takes what was output (previously $$y$$) and returns what was input (previously $$x$$) — relabelling makes this the standard form.", "source": "Opus 4.7 ②", "_id": "opus_2_87", "judge_pick": false}, {"question": "State and explain the relationship between the domain and range of a function and its inverse.", "answer": "- **Domain of $$g^{-1}$$ = Range of $$g$$** (inverse's input = original's output).\n- **Range of $$g^{-1}$$ = Domain of $$g$$** (inverse's output = original's input).\n\nIntuition:\n- Step 1: $$g$$ takes domain $$\\to$$ range. $$g^{-1}$$ undoes this: range $$\\to$$ domain.\n- Step 2: So $$g^{-1}$$ can only accept what $$g$$ actually outputs (the range of $$g$$) — otherwise the original had no corresponding input to recover.\n\nExample: $$g(x) = 3 + 2\\ln x$$ with domain $$x \\geq 1$$ has $$g(1) = 3$$ and $$g \\to \\infty$$. Range of $$g = [3, \\infty)$$. So domain of $$g^{-1} = [3, \\infty)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_88", "judge_pick": false}, {"question": "What is the principle: \"when the unknown is in the exponent, the first move is ___\"? Illustrate using $$\\tfrac{2a}{3a - 5} = e$$ being solved for $$a$$ as a contrast.", "answer": "Principle: \"take logarithms\".\n\nBut note: in $$\\tfrac{2a}{3a - 5} = e$$, the unknown $$a$$ is **not** in an exponent — it's in a rational expression, with $$e$$ as a constant on the right. Here, logs are unnecessary; just cross-multiply:\n\n- Step 1: $$2a = e(3a - 5) = 3ea - 5e$$.\n- Step 2: Collect $$a$$-terms: $$2a - 3ea = -5e \\Rightarrow a(2 - 3e) = -5e$$.\n- Step 3: Solve: $$a = \\tfrac{-5e}{2 - 3e} = \\tfrac{5e}{3e - 2}$$.\n\nContrast: for $$e^a = 5$$, the unknown is in the exponent, so take log: $$a = \\ln 5$$. The principle applies only when the unknown sits as an exponent.", "source": "Opus 4.7 ②", "_id": "opus_2_89", "judge_pick": true}, {"question": "The state the sign change theorem (IVT applied to root-finding) formally, including its hypotheses.", "answer": "**Theorem (Sign Change / IVT)**: If $$f$$ is a real-valued function satisfying:\n- **Hypothesis 1**: $$f$$ is **continuous** on the closed interval $$[a, b]$$.\n- **Hypothesis 2**: $$f(a) \\cdot f(b) < 0$$ (i.e., $$f$$ has opposite signs at the endpoints).\n\nthen there **exists** $$c \\in (a, b)$$ such that $$f(c) = 0$$.\n\nIntuition: a continuous function can't jump from negative to positive without crossing zero somewhere in between.\n\nNote: the theorem guarantees **existence**, not uniqueness — there could be multiple roots, but at least one exists. It also doesn't locate the root exactly; only narrows it to the interval.", "source": "Opus 4.7 ②", "_id": "opus_2_90", "judge_pick": false}, {"question": "Why must $$f$$ be continuous on $$[a, b]$$ for the sign change theorem to apply? Give an intuition for what could go wrong with a discontinuous function.", "answer": "- Step 1: Continuity ensures the function can't \"skip\" values. A continuous function taking both positive and negative values must pass through every intermediate value, including zero.\n- Step 2: Counterexample if discontinuous: consider $$f(x) = 1/x$$ on $$[-1, 1]$$. $$f(-1) = -1 < 0$$, $$f(1) = 1 > 0$$, opposite signs. Yet there's no root! The function jumps from $$-\\infty$$ to $$+\\infty$$ at $$x = 0$$, skipping zero.\n- Step 3: For polynomials, continuity is automatic (polynomials are continuous everywhere). But for rational or piecewise functions, you must verify continuity on the specific interval.\n\nKey lesson: state continuity explicitly in your write-up — it's a marked ingredient, not a free assumption.", "source": "Opus 4.7 ②", "_id": "opus_2_91", "judge_pick": true}, {"question": "Iteration $$x_{n+1} = g(x_n)$$ doesn't always converge. Provide intuition for why the condition $$|g'(\\alpha)| < 1$$ is required at the fixed point.", "answer": "- Step 1: Near the root $$\\alpha$$, write $$x_n = \\alpha + \\epsilon_n$$ (small error $$\\epsilon_n$$).\n- Step 2: Apply $$g$$: $$x_{n+1} = g(\\alpha + \\epsilon_n) \\approx g(\\alpha) + g'(\\alpha) \\epsilon_n = \\alpha + g'(\\alpha) \\epsilon_n$$ (Taylor approximation; and since $$\\alpha$$ is a fixed point, $$g(\\alpha) = \\alpha$$).\n- Step 3: So $$\\epsilon_{n+1} \\approx g'(\\alpha) \\epsilon_n$$. Errors shrink iff $$|g'(\\alpha)| < 1$$ (contraction); errors grow iff $$|g'(\\alpha)| > 1$$ (divergence).\n\nIntuition: each step multiplies the error by $$g'(\\alpha)$$. For convergence, this multiplier must shrink errors.\n\nPractical: if an iteration diverges, try a different rearrangement of $$f(x) = 0$$ into $$x = g(x)$$; different $$g$$'s have different derivatives.", "source": "Opus 4.7 ②", "_id": "opus_2_92", "judge_pick": true}, {"question": "When dividing $$2x^2 - 5x + 8$$ by $$x - 2$$, you get quotient $$2x - 1$$ and remainder $$6$$. What does the remainder represent algebraically?", "answer": "- Step 1: Polynomial division yields the identity: $$\\underbrace{2x^2 - 5x + 8}_{\\text{dividend}} = \\underbrace{(x-2)}_{\\text{divisor}} \\cdot \\underbrace{(2x-1)}_{\\text{quotient}} + \\underbrace{6}_{\\text{remainder}}$$.\n- Step 2: Dividing through by $$x - 2$$: $$\\tfrac{2x^2 - 5x + 8}{x - 2} = 2x - 1 + \\tfrac{6}{x - 2}$$.\n- Step 3: The remainder $$6$$ becomes the numerator of a \"proper fraction\" (constant over linear) that can't be simplified further by division. It's what's \"left over\" after extracting the polynomial part.\n\nBonus: by the Remainder Theorem, the remainder when dividing by $$(x - c)$$ equals $$f(c)$$. Check: $$2(2)^2 - 5(2) + 8 = 8 - 10 + 8 = 6$$ ✓.", "source": "Opus 4.7 ②", "_id": "opus_2_93", "judge_pick": true}, {"question": "For the composite function $$gf(x) = g(f(x))$$, in what order are $$f$$ and $$g$$ applied, and what's a common confusion?", "answer": "- Step 1: Composition applies the **inner function first**, then the outer. In $$gf(x) = g(f(x))$$, $$f$$ acts on $$x$$ first, producing $$f(x)$$; then $$g$$ acts on $$f(x)$$, producing $$g(f(x))$$.\n- Step 2: Common confusion: reading \"$$gf$$\" left-to-right makes students apply $$g$$ first. The letters read left-to-right, but the evaluation is right-to-left!\n- Step 3: Notation check: $$gf(x) \\neq fg(x)$$ in general. For example, $$f(x) = x + 1$$, $$g(x) = x^2$$: $$gf(x) = (x+1)^2$$, $$fg(x) = x^2 + 1$$ — different.\n\nSafe rule: always rewrite as $$g(f(x))$$ with parentheses to make the order explicit.", "source": "Opus 4.7 ②", "_id": "opus_2_94", "judge_pick": false}, {"question": "Explain why $$e^0 = 1$$ (not 0), using both the exponential power rule and an alternative reasoning.", "answer": "**Power rule argument**:\n- Step 1: For any nonzero base $$a$$: $$a^0 = 1$$ by convention (and proven by $$a^{m}/a^{m} = a^{m-m} = a^0$$, where the left side equals 1).\n- Step 2: Apply to $$e$$: $$e^0 = 1$$.\n\n**Alternative: continuity of $$e^x$$**:\n- Step 1: $$e^x$$ is continuous. Consider values $$e^{-0.01} \\approx 0.99$$ and $$e^{0.01} \\approx 1.01$$.\n- Step 2: As $$x \\to 0$$, $$e^x \\to 1$$; continuity forces $$e^0 = 1$$.\n\nCommon confusion: students mix up $$e^0 = 1$$ and $$\\ln 1 = 0$$. These are inverses: $$e^0 = 1$$ (exponential at zero) vs $$\\ln 1 = 0$$ (log at one).", "source": "Opus 4.7 ②", "_id": "opus_2_95", "judge_pick": true}, {"question": "Contrast the integrals $$\\int \\tfrac{1}{x + b}dx$$ and $$\\int \\tfrac{1}{ax + b}dx$$. Why is the $$1/a$$ factor only visible in the second?", "answer": "- Step 1: $$\\int \\tfrac{1}{x + b}dx = \\ln|x + b| + C$$. Here $$a = 1$$, so the $$1/a = 1/1 = 1$$ factor is invisible — gives correct answer whether you include it or not.\n- Step 2: $$\\int \\tfrac{1}{ax + b}dx = \\tfrac{1}{a}\\ln|ax + b| + C$$. Here the $$1/a$$ is non-trivial — forgetting it gives an answer off by a factor of $$a$$.\n- Step 3: Derivation check: differentiate $$\\ln|ax + b|$$ via chain rule: $$\\tfrac{d}{dx}[\\ln|ax+b|] = \\tfrac{a}{ax+b}$$. So $$\\tfrac{1}{a}\\ln|ax+b|$$ has derivative $$\\tfrac{1}{ax+b}$$ ✓.\n\nEdge case danger: students who always deal with $$1/(x+b)$$ forget the rule. When $$a \\neq 1$$ appears on the exam, the \"forgot $$1/a$$\" error bites.", "source": "Opus 4.7 ②", "_id": "opus_2_96", "judge_pick": true}, {"question": "What is the range of $$y = 2|x - 5| + 10$$ over all real $$x$$, and why?", "answer": "- Step 1: $$|x - 5| \\geq 0$$ always (modulus is non-negative), with minimum 0 at $$x = 5$$.\n- Step 2: So $$2|x - 5| \\geq 0$$, minimum 0.\n- Step 3: Therefore $$2|x - 5| + 10 \\geq 10$$, with minimum 10 at $$x = 5$$. As $$|x - 5| \\to \\infty$$, $$y \\to \\infty$$.\n- Step 4: Range: $$[10, \\infty)$$ — closed at 10 (minimum attained), unbounded above.\n\nGeometric picture: V-shape opening upward with vertex at $$(5, 10)$$ — the lowest point is the vertex.", "source": "Opus 4.7 ②", "_id": "opus_2_97", "judge_pick": false}, {"question": "When solving $$|f(x)| > g(x)$$, why is validating each case's solution against its validity region critical? Give a concrete failure example.", "answer": "- Step 1: Case splitting assumes a specific sign for $$f(x)$$. A \"solution\" that violates this assumption is spurious — it solves the *algebraic manipulation*, not the *original* inequality.\n- Step 2: Concrete example: $$|x - 5| > 6x$$, Case 1 ($$x \\geq 5$$). Suppose algebra yields $$x < 0$$. If you don't check, you report \"$$x < 0$$\" as a solution. But $$x = -1$$ violates $$x \\geq 5$$; it wasn't actually in Case 1. The correct conclusion: \"Case 1 contributes no solutions.\"\n- Step 3: Without validation, you report nonsense solutions and lose marks or arrive at incorrect final answer sets.\n\nRule: always intersect each case's algebraic solution with the case's defining condition.", "source": "Opus 4.7 ②", "_id": "opus_2_98", "judge_pick": false}, {"question": "For a \"show that\" or \"prove\" question, why is it insufficient to substitute a single numerical value and show equality?", "answer": "- Step 1: A \"show\" question demands the relationship holds **for all valid inputs** (or within the stated domain), not just at one value.\n- Step 2: A single numerical check can confirm consistency, but it doesn't **prove** the general identity. Two different expressions might coincidentally agree at one point.\n- Step 3: Example: $$\\sin^2 x = 1 - \\cos^2 x$$ should be proved by algebraic manipulation (from Pythagoras), not by checking at $$x = 0$$.\n\nProper proof: algebraic manipulation from LHS to RHS (or both to a common form), using identities and logical steps. Each line should be justified by an identity or algebraic rule.\n\nMarkers look for: clear structure, named identities, logical flow — not just a verification table.", "source": "Opus 4.7 ②", "_id": "opus_2_99", "judge_pick": true}, {"question": "Physically interpret: $$\\log_{10} D = 1.04 + 0.38 T$$ where $$D$$ is donations received ($$£$$) and $$T$$ is months since launch. What do the numbers 1.04 and 0.38 represent?", "answer": "- Step 1: Convert to exponential form: $$D = 10^{1.04} \\cdot (10^{0.38})^T \\approx 10.96 \\cdot 2.399^T$$.\n- Step 2: Interpret parameters:\n+ $$10^{1.04} \\approx 10.96$$: the **initial donation** at $$T = 0$$ (launch day), roughly £11.\n+ $$10^{0.38} \\approx 2.4$$: the **monthly multiplicative growth factor**. Each month, donations are multiplied by 2.4.\n- Step 3: Physical meaning: explosive growth — donations more than double every month. After 12 months, donations $$\\approx 10.96 \\cdot 2.4^{12} \\approx 4 \\times 10^5$$.\n\nInsight: log-linear graphs are straight lines precisely when the underlying process is **exponential**. The slope tells you the growth rate per unit time.", "source": "Opus 4.7 ②", "_id": "opus_2_100", "judge_pick": true}, {"question": "Why does \"R-formula\" have four variants ($$R\\sin(x+\\alpha)$$, $$R\\sin(x-\\alpha)$$, $$R\\cos(x-\\alpha)$$, $$R\\cos(x+\\alpha)$$) rather than just one?", "answer": "- Step 1: The four conversions handle the four sign/function combinations: $$a\\sin \\pm b\\cos$$ and $$a\\cos \\pm b\\sin$$. Each pairs the \"positive\" coefficient term with a specific form.\n- Step 2: Convention: $$R > 0$$ and $$0 < \\alpha < \\pi/2$$. These constraints force a specific sign in the $$\\pm\\alpha$$ placement to correctly reproduce the expansion.\n- Step 3: While you could use just $$R\\sin(x+\\alpha)$$ (choosing $$\\alpha$$ possibly in other quadrants), staying with $$\\alpha \\in (0, \\pi/2)$$ is cleaner — just pick the variant matching the signs.\n\nMeta: all four variants are equivalent (linked by identities like $$\\cos x = \\sin(x + \\pi/2)$$), but using the matching form avoids awkward angles.\n\nPractical pick: leading function (sin or cos with coefficient $$a$$) determines the form; sign between terms determines the $$\\alpha$$ sign.", "source": "Opus 4.7 ②", "_id": "opus_2_101", "judge_pick": true}, {"question": "Explain why the exponential function $$e^{-Bt}$$ cannot equal zero for any finite $$t$$, despite approaching 0 as $$t \\to \\infty$$.", "answer": "- Step 1: For any real $$t$$ (finite), $$-Bt$$ is a finite real number.\n- Step 2: $$e^{\\cdot}$$ takes finite inputs to **strictly positive** outputs: $$e^x > 0$$ for all real $$x$$. This follows from the power series $$e^x = 1 + x + x^2/2 + \\cdots$$ or from $$e^x = \\lim_{n\\to\\infty}(1 + x/n)^n$$ being a product of positive terms for large $$n$$.\n- Step 3: \"$$e^{-Bt} \\to 0$$ as $$t \\to \\infty$$\" is a **limit**, not an attained value. The function gets arbitrarily close to 0 but never reaches it.\n\nAsymptote concept: the line $$y = 0$$ is a horizontal asymptote of $$y = e^{-Bt}$$ (for $$B > 0$$), approached but never touched.", "source": "Opus 4.7 ②", "_id": "opus_2_102", "judge_pick": false}, {"question": "For the graph $$y = a - |2x - b|$$ where $$a > b > 0$$, summarise all key features: vertex, $$y$$-intercept, $$x$$-intercepts, and overall shape. (4 steps)", "answer": "- Step 1: **Vertex**: at $$x = b/2$$ (where inside of modulus is zero); $$y = a$$. Vertex = $$(b/2, a)$$. This is a **maximum**.\n- Step 2: **$$y$$-intercept** (at $$x = 0$$): $$y = a - b > 0$$ (since $$a > b$$). Point: $$(0, a - b)$$.\n- Step 3: **$$x$$-intercepts** (at $$y = 0$$): $$|2x - b| = a \\Rightarrow 2x - b = \\pm a \\Rightarrow x = (b+a)/2$$ or $$x = (b-a)/2$$. Two intercepts, symmetric about the vertex.\n- Step 4: **Overall shape**: inverted V (∧ shape). Rises from lower-left, peaks at vertex, descends to lower-right. Symmetric about vertical line $$x = b/2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_103", "judge_pick": false}, {"question": "You want to integrate an expression and get the form $$\\lambda \\ln 10$$. After substitution, you get $$\\tfrac{16}{27}[\\ln|x - c|]_1^3$$ evaluated. Describe conceptually how to get the specific target $$\\ln 10$$.", "answer": "- Step 1: Evaluate: $$[\\ln|x - c|]_1^3 = \\ln|3 - c| - \\ln|1 - c|$$.\n- Step 2: Use quotient rule of logs: $$= \\ln\\left(\\left|\\tfrac{3 - c}{1 - c}\\right|\\right)$$ — combining the difference of logs into a single log.\n- Step 3: The value of $$c$$ is chosen so that $$\\left|\\tfrac{3 - c}{1 - c}\\right| = 10$$ — e.g., $$c = 7/3$$ gives $$\\tfrac{20/3}{2/3} = 10$$. Then the integral evaluates to $$\\tfrac{16}{27} \\ln 10$$, so $$\\lambda = \\tfrac{16}{27}$$.\n\nMeta: the exam-setter engineered $$c$$ to produce a clean $$\\ln 10$$. Always combine logs before reading off constants.", "source": "Opus 4.7 ②", "_id": "opus_2_104", "judge_pick": true}, {"question": "What does \"horizontal stretch scale factor $$1/a$$\" physically mean for the graph of $$y = f(ax)$$?", "answer": "- Step 1: For $$y = f(ax)$$, each $$x$$-coordinate on the original graph $$y = f(x)$$ is divided by $$a$$ (multiplied by $$1/a$$) in the new graph.\n- Step 2: Visually: if $$a > 1$$, graph is **compressed** horizontally (squeezed toward $$y$$-axis). If $$0 < a < 1$$, graph is **stretched** horizontally (spread out).\n- Step 3: Algebraic check: the new graph at new $$x$$-coord $$x_0/a$$ takes value $$f(a \\cdot x_0/a) = f(x_0)$$ — same as original at $$x_0$$. So the point $$(x_0, f(x_0))$$ on old graph corresponds to $$(x_0/a, f(x_0))$$ on new.\n\nMnemonic: \"inside-the-function\" transformations are **counterintuitive** — opposite direction and reciprocal scale of what's written.", "source": "Opus 4.7 ②", "_id": "opus_2_105", "judge_pick": true}, {"question": "\"Act with respect to the answer\" is a problem-solving principle Mr Fuat emphasises. What does it mean in practice, and when do you use it?", "answer": "- Step 1: \"Act with respect to the answer\" means: **look at the target form** before deciding which manipulations to apply to the starting expression.\n- Step 2: Concrete uses:\n+ Iteration rearrangement: target form $$x = \\sqrt[3]{\\text{stuff}/x}$$ tells you to raise to power 3 and divide by $$x$$.\n+ Trig proof: target contains $$\\sin 2\\theta, \\cos 2\\theta$$ tells you to use double-angle identities.\n+ Polynomial division: target is $$Ax + B + C/(x-2)$$ tells you to divide until degree drops.\n- Step 3: Rather than mechanically applying techniques, scan the target and pick the identities/operations that move you toward it.\n\nPrinciple: the target form is a *signpost* for the solution path, not just a destination.", "source": "Opus 4.7 ②", "_id": "opus_2_106", "judge_pick": false}, {"question": "Why do exam-style questions often ask you to \"prove\" an identity before \"hence solve\" an equation? What role does the first part play in the second?", "answer": "- Step 1: The \"prove\" part establishes a **simplified form** of the expression (e.g., $$3\\sin 2\\theta - 4\\cos 2\\theta = 2$$).\n- Step 2: The \"hence\" signals: use the proved identity as a starting point. The complicated LHS of the original equation equals the simpler RHS of the proof, so you can solve the simpler equation instead.\n- Step 3: Without the proof, you'd face an enormous transcendental equation with multiple functions; with the proof, you reduce to solving a single sinusoidal equation (via R-formula).\n\nMeta-strategy: if stuck on the \"hence solve\", look back at the \"prove\" part — it's the simplified form you should be working with.", "source": "Opus 4.7 ②", "_id": "opus_2_107", "judge_pick": true}, {"question": "For integration tasks involving $$\\int \\tfrac{f'(x)}{f(x)} dx$$, what's the general template and why does it work?", "answer": "- Step 1: Template: $$\\int \\tfrac{f'(x)}{f(x)} dx = \\ln|f(x)| + C$$.\n- Step 2: Justification: by chain rule, $$\\tfrac{d}{dx}[\\ln|f(x)|] = \\tfrac{f'(x)}{f(x)}$$ (for $$f(x) \\neq 0$$). So $$\\ln|f|$$ is an antiderivative of $$f'/f$$.\n- Step 3: Recognition pattern: look for a fraction where the numerator is the derivative of the denominator (up to a constant multiple).\n- Step 4: Special case: $$\\int \\tfrac{1}{ax + b} dx = \\tfrac{1}{a}\\int \\tfrac{a}{ax+b}dx = \\tfrac{1}{a}\\ln|ax+b| + C$$. Here $$f = ax + b$$, $$f' = a$$; to match the template we must manufacture the $$a$$ in the numerator, hence the $$1/a$$ factor.\n\nGeneral: always check if the integrand fits $$f'/f$$ form before using more complex techniques.", "source": "Opus 4.7 ②", "_id": "opus_2_108", "judge_pick": false}, {"question": "In an equation like $$f'(x) = 2e^{g(x)} \\cdot h(x)$$, to find turning points you set $$f'(x) = 0$$. Why does the structural approach (factor + dismiss positive factor) typically work better than naïve algebraic expansion?", "answer": "- Step 1: Expanding gives a messy transcendental equation mixing polynomial, exponential, and trig terms — no general solution method.\n- Step 2: Factored form reveals: $$f'(x) = 2e^{g(x)} \\cdot h(x)$$. Since $$e^{g(x)} > 0$$ (always positive), setting $$f'(x) = 0$$ is equivalent to setting $$h(x) = 0$$.\n- Step 3: The reduced equation $$h(x) = 0$$ is typically polynomial or trigonometric — solvable by standard techniques.\n\nGeneral strategy for derivatives of products with exponentials:\n+ Compute derivative via product rule\n+ **Factor out** any exponential term (and common polynomial factors)\n+ Dismiss the always-positive exponential\n+ Solve the remaining factor = 0\n\nThis \"dismiss exponential\" trick converts hard equations to easy ones.", "source": "Opus 4.7 ②", "_id": "opus_2_109", "judge_pick": false}, {"question": "For a general geometric sequence $$u_n = ar^n$$ (with $$u_0 = a$$ at $$n = 0$$), given $$u_p = P$$ and $$u_q = Q$$ at two times $$p < q$$, find $$r$$ and $$a$$. (3 steps)", "answer": "- Step 1: Take ratio: $$\\tfrac{u_q}{u_p} = \\tfrac{ar^q}{ar^p} = r^{q-p} = \\tfrac{Q}{P}$$.\n- Step 2: Solve for $$r$$: $$r = \\left(\\tfrac{Q}{P}\\right)^{1/(q-p)}$$.\n- Step 3: Substitute back into either original. E.g., from $$u_p = ar^p = P$$: $$a = \\tfrac{P}{r^p}$$.\n\nCritical watch: use the **correct exponent** when dividing — the subscript indicates the actual power, not one less. If $$u_p = ar^p$$, divide by $$r^p$$, not $$r^{p-1}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_110", "judge_pick": false}, {"question": "In the model $$y = 10^{1.04} \\cdot 10^{0.38 T}$$, why must you rewrite $$10^{0.38 T}$$ as $$(10^{0.38})^T$$ to match the form $$y = a \\cdot b^T$$? (2 steps)", "answer": "- Step 1: The target form $$a \\cdot b^T$$ has $$T$$ appearing as a simple exponent on $$b$$. But $$10^{0.38 T}$$ has $$T$$ inside the exponent multiplied by 0.38 — doesn't directly match.\n- Step 2: Apply power rule $$(x^m)^n = x^{mn}$$: $$10^{0.38 T} = 10^{0.38 \\cdot T} = (10^{0.38})^T$$. Now $$T$$ is the outer exponent on $$(10^{0.38}) = b$$. So $$y = 10^{1.04} \\cdot (10^{0.38})^T$$ with $$a = 10^{1.04} \\approx 10.96$$ and $$b = 10^{0.38} \\approx 2.399$$.\n\nPrinciple: the $$ab^T$$ form requires $$T$$ as \"just\" the exponent — repackage accordingly.", "source": "Opus 4.7 ②", "_id": "opus_2_111", "judge_pick": false}, {"question": "For the \"second smallest positive solution\" type question, why can't you just take the first solution and add $$\\pi$$ (or some other period)?", "answer": "- Step 1: The period of $$\\sin(kx + \\alpha)$$ or $$\\cos(kx + \\alpha)$$ is $$2\\pi/k$$, not always $$\\pi$$. For $$k = 2$$ (common), the period is $$\\pi$$.\n- Step 2: However, \"smallest positive solutions where $$\\sin(\\cdots) = 1$$\" repeat every $$\\pi$$ in $$x$$ (for $$k=2$$), because sine hits 1 only once per $$2\\pi$$ in its argument.\n- Step 3: The second smallest positive solution is **not** automatically \"first + period\". You must enumerate general solutions $$\\{2x + \\alpha = \\pi/2 + 2n\\pi : n = 0, 1, 2, \\ldots\\}$$ and compute each $$x$$, then sort ascending.\n\nPitfall: sine hits 1 at $$\\pi/2$$, but hits $$0.4$$ at *two* locations per period (first and second quadrants). Don't conflate \"max\" with \"generic value\".", "source": "Opus 4.7 ②", "_id": "opus_2_112", "judge_pick": false}, {"question": "When a calculator iteration is started at $$x_1 = 2$$ for a convergent formula, and you observe $$x_3 = 2.1459$$, $$x_4 = 2.1474$$, $$x_5 = 2.1471$$, $$x_6 = 2.1472$$, $$x_7 = 2.1472$$ — what's the correct answer to 4 d.p. and why?", "answer": "- Step 1: Observe: values are alternating slightly, not strictly monotone. This is normal for iterations with $$g'(\\alpha) < 0$$ — they oscillate while converging.\n- Step 2: To confirm convergence to 4 d.p., need consecutive values to agree at 4 d.p.: $$x_6 = 2.1472$$, $$x_7 = 2.1472$$ — they agree.\n- Step 3: Report $$\\alpha = 2.1472$$ to 4 d.p.\n\nCommon mistake: stopping at $$x_4 = 2.1474$$ and reporting that — but $$x_5 = 2.1471$$ disagrees at 4 d.p., so convergence wasn't yet confirmed. Always see stable agreement.", "source": "Opus 4.7 ②", "_id": "opus_2_113", "judge_pick": false}, {"question": "When finding the range of a composite function $$fg$$, why is it usually easier to first find the range of $$g$$ rather than attempting to compute $$fg$$ directly?", "answer": "- Step 1: Computing $$fg(x) = f(g(x))$$ explicitly often produces a complicated expression whose range is hard to read off.\n- Step 2: Instead: find range of $$g$$ (call it $$R_g$$). Then $$fg$$ is $$f$$ evaluated on $$R_g$$ — the range of $$fg$$ is the **image of $$R_g$$ under $$f$$**.\n- Step 3: If $$f$$ is monotonic on $$R_g$$, then range of $$fg$$ is simply $$f$$ at the endpoints of $$R_g$$. If not monotonic, consider turning points within $$R_g$$.\n\nWhy simpler: decomposes the problem into two smaller steps, each of which uses single-function analysis (monotonicity, turning points, limits).", "source": "Opus 4.7 ②", "_id": "opus_2_114", "judge_pick": true}, {"question": "Contrast the two iteration rearrangements: $$x = \\sqrt[3]{\\tfrac{5x^2 - 4x + 7}{x}}$$ versus (hypothetically) $$x = 5x^2 - 4x + 7 - x^4$$. Why would the first converge while the second diverge?", "answer": "- Step 1: Convergence requires $$|g'(\\alpha)| < 1$$ at the fixed point.\n- Step 2: For $$g_1(x) = \\sqrt[3]{\\tfrac{5x^2 - 4x + 7}{x}}$$: near $$\\alpha \\approx 2.15$$, $$g_1$$ is relatively flat (cube root compresses), so $$|g_1'(\\alpha)|$$ is small — convergence likely.\n- Step 3: For $$g_2(x) = 5x^2 - 4x + 7 - x^4$$ (a direct rearrangement): this is a high-degree polynomial whose derivative is large in magnitude, so $$|g_2'(\\alpha)|$$ is likely $$> 1$$ — divergence.\n\nLesson: not every rearrangement is usable for iteration. The \"good\" rearrangement typically isolates $$x$$ via an operation that reduces sensitivity (cube roots, logs, etc.). Mechanical algebra isn't enough — the choice of $$g$$ matters for convergence.", "source": "Opus 4.7 ②", "_id": "opus_2_115", "judge_pick": true}, {"question": "For a function $$g(x) = 3 + 2\\ln x$$, what is the natural domain (before any additional restriction), and what is the range on this natural domain?", "answer": "- Step 1: **Natural domain**: $$\\ln x$$ is defined for $$x > 0$$. So natural domain of $$g$$ is $$(0, \\infty)$$.\n- Step 2: **Range**: as $$x \\to 0^+$$, $$\\ln x \\to -\\infty$$, so $$g \\to -\\infty$$. As $$x \\to \\infty$$, $$\\ln x \\to \\infty$$, so $$g \\to \\infty$$. $$g$$ is continuous and strictly increasing (derivative $$2/x > 0$$). Range: $$(-\\infty, \\infty)$$.\n- Step 3: If restricted (e.g., $$x \\geq 1$$): then $$g(1) = 3$$ is minimum, and range becomes $$[3, \\infty)$$.\n\nInsight: domain restrictions propagate to range restrictions via the monotonicity of the function.", "source": "Opus 4.7 ②", "_id": "opus_2_116", "judge_pick": false}, {"question": "State the general rule for integrating a constant multiple $$\\int k f(x) dx$$, and explain why you can \"factor out\" constants but not $$x$$-dependent terms.", "answer": "- Step 1: Rule: $$\\int k f(x) dx = k \\int f(x) dx$$ (for constant $$k$$).\n- Step 2: Why works: integration is a linear operator. The derivative of $$k F(x)$$ is $$k F'(x) = k f(x)$$, so $$k F$$ is an antiderivative of $$k f$$.\n- Step 3: Why not for $$x$$-dependent terms: $$\\int x f(x) dx \\neq x \\int f(x) dx$$ in general. Because $$\\tfrac{d}{dx}[x F(x)] = F(x) + x F'(x) \\neq x f(x)$$ (extra $$F(x)$$ term).\n\nPractical: for $$\\int \\tfrac{16}{9(3x - k)} dx$$, factor out $$\\tfrac{16}{9}$$ first, then apply the standard template. Never factor out the $$(3x - k)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_117", "judge_pick": true}, {"question": "In the \"R-formula solve\" pipeline, what is the transformation of the range of $$x$$ into the range of $$\\phi = k(x) - \\alpha$$, and why does this matter?", "answer": "- Step 1: Given original range $$a \\leq x \\leq b$$ and substitution $$\\phi = cx - d$$, compute $$\\phi$$-range: $$ca - d \\leq \\phi \\leq cb - d$$.\n- Step 2: Matters because: we solve $$\\sin\\phi = k$$ for $$\\phi$$ in the transformed range, then back-substitute to get $$x$$. Using the wrong range (e.g., $$[0, 2\\pi]$$ when it should be $$[5.356, 8.497]$$) gives wrong solutions or missing solutions.\n- Step 3: Example: $$x \\in [\\pi, 3\\pi/2]$$, $$\\phi = 2x - 0.9273 \\in [2\\pi - 0.9273, 3\\pi - 0.9273] = [5.356, 8.497]$$. Only $$\\phi$$-values in this range yield valid $$x$$ in the original range.\n\nAlways **transform ranges explicitly** alongside the variable substitution.", "source": "Opus 4.7 ②", "_id": "opus_2_118", "judge_pick": false}, {"question": "State $$\\int \\sin x \\, dx$$, $$\\int \\cos x \\, dx$$, and $$\\int \\sec^2 x \\, dx$$. Why does $$\\int \\sin x \\, dx$$ have a negative sign but $$\\int \\cos x \\, dx$$ doesn't?", "answer": "- $$\\int \\sin x \\, dx = -\\cos x + C$$\n- $$\\int \\cos x \\, dx = \\sin x + C$$\n- $$\\int \\sec^2 x \\, dx = \\tan x + C$$\n\nReason for the signs:\n- Step 1: Recall derivatives: $$\\tfrac{d}{dx}[\\sin x] = \\cos x$$ and $$\\tfrac{d}{dx}[\\cos x] = -\\sin x$$.\n- Step 2: Integrals reverse this. So an antiderivative of $$\\cos x$$ is $$\\sin x$$ (no sign). An antiderivative of $$\\sin x$$ needs to be something whose derivative is $$\\sin x$$ — that's $$-\\cos x$$ (since $$\\tfrac{d}{dx}[-\\cos x] = -(-\\sin x) = \\sin x$$).\n\nMemory aid: the minus sign in $$\\int \\sin = -\\cos$$ is there because differentiating $$\\cos$$ produces a minus sign that needs to be cancelled.", "source": "Opus 4.7 ②", "_id": "opus_2_119", "judge_pick": false}, {"question": "Describe the \"graph-reading\" strategy for choosing which branch (positive or negative modulus) applies at each intersection in a two-modulus equation.", "answer": "- Step 1: Draw both modulus graphs on the same axes. Mark each intersection.\n- Step 2: At each intersection, identify:\n+ For each modulus, which side of its vertex the intersection sits (left or right).\n+ This determines whether inside-of-modulus is positive or negative there.\n- Step 3: Replace each $$|f(x)|$$ with the appropriate signed version: $$f(x)$$ if positive side, $$-f(x)$$ if negative side. Now equate and solve.\n\nExample from Q8 paper 3: at $$x = 5$$, both $$|x+1|$$ and $$|2x - b|$$ are on their **positive branches** (right of their vertices). So equate $$x + 1 = a - (2x - b)$$.\n\nWithout the graph: you'd have to try all four combinations ($$++, +-, -+, --$$) and check. The graph narrows to the single correct combination.", "source": "Opus 4.7 ②", "_id": "opus_2_120", "judge_pick": true}, {"question": "What does the \"chain rule\" mean geometrically or intuitively, beyond the formula $$\\tfrac{dy}{dx} = \\tfrac{dy}{du} \\cdot \\tfrac{du}{dx}$$?", "answer": "- Step 1: Geometric: if $$y$$ depends on $$u$$ and $$u$$ depends on $$x$$, then small changes propagate: $$\\Delta y \\approx \\tfrac{dy}{du} \\Delta u$$ and $$\\Delta u \\approx \\tfrac{du}{dx} \\Delta x$$.\n- Step 2: Chain: $$\\Delta y \\approx \\tfrac{dy}{du} \\cdot \\tfrac{du}{dx} \\Delta x$$. So the rate of change of $$y$$ w.r.t. $$x$$ is the **product** of individual rates.\n- Step 3: Intuitive: composition of sensitivities. If $$u$$ doubles when $$x$$ changes by 1, and $$y$$ triples when $$u$$ changes by 1, then $$y$$ sextuples ($$2 \\times 3$$) when $$x$$ changes by 1.\n\nApplication: for $$e^{3\\sin x}$$: outer derivative is $$e^{3\\sin x}$$; inner derivative is $$3\\cos x$$. Product: $$3\\cos x \\cdot e^{3\\sin x}$$. The $$3$$ is the \"exchange rate\" between $$u$$ and $$x$$; $$\\cos x$$ is how $$\\sin x$$ responds to $$x$$.", "source": "Opus 4.7 ②", "_id": "opus_2_121", "judge_pick": true}, {"question": "Why is it \"safer\" (mathematically equivalent but easier to avoid errors) to write $$B = \\ln(4/3)/45$$ rather than $$B = -\\ln(3/4)/45$$?", "answer": "- Step 1: Both are algebraically identical: $$-\\ln(3/4) = \\ln((3/4)^{-1}) = \\ln(4/3)$$ by the power/inverse log law.\n- Step 2: However, $$\\ln(4/3)$$ is manifestly **positive** (since $$4/3 > 1$$ means $$\\ln > 0$$), matching physical expectation of $$B > 0$$.\n- Step 3: $$-\\ln(3/4)$$ involves a double negative: $$\\ln(3/4)$$ is negative (since $$3/4 < 1$$), and the leading minus flips it. Students often forget the double negative and report $$B$$ as negative.\n\nRule: if you know the quantity should be positive, write it in a manifestly positive form to avoid sign errors.", "source": "Opus 4.7 ②", "_id": "opus_2_122", "judge_pick": true}, {"question": "When asked \"solve $$|f(x)| > g(x)$$ algebraically\" versus \"graphically\", what's the difference in approach?", "answer": "- **Algebraically**: split into cases based on sign of $$f(x)$$. Solve each case and intersect with validity region. Collect all valid solutions.\n- **Graphically**: plot $$y = |f(x)|$$ and $$y = g(x)$$ on same axes. Find intersection points. The inequality holds where $$|f(x)|$$ graph lies **above** $$g(x)$$ graph.\n\nComparison:\n- Step 1: Algebraic is rigorous, produces exact answer, but requires careful case management.\n- Step 2: Graphical is intuitive, reveals solution regions visually, but limited precision (may need algebra to find exact endpoints).\n- Step 3: Best practice: use both — sketch the graph for insight, then confirm algebraically.\n\nWhen exam says \"algebraically\": do the case-split approach explicitly, even if you can see the graphical answer.", "source": "Opus 4.7 ②", "_id": "opus_2_123", "judge_pick": false}, {"question": "In a model like $$T = 10 + 8e^{-Bt}$$, what are the physical meanings of the parameters 10, 8, and $$B$$?", "answer": "- **10** (constant): the **asymptotic** value — the temperature $$T$$ approaches as $$t \\to \\infty$$. Physically, the ambient (room) temperature toward which the object cools.\n- **8** (coefficient of exponential): the **initial excess** above ambient — $$T(0) - 10 = 8$$. So initial temperature $$T(0) = 18$$ is 8 degrees above room temperature.\n- **B** (decay rate): the **speed of cooling** — larger $$B$$ means faster approach to ambient. Units: per unit time (e.g., per minute).\n\nThe model reflects **Newton's law of cooling**: rate of cooling proportional to current temperature excess. Solving this ODE gives the exponential form.", "source": "Opus 4.7 ②", "_id": "opus_2_124", "judge_pick": true}, {"question": "What's the single biggest insight from Mr Fuat's \"act with respect to the answer\" principle, and how does it differ from typical algebra approaches?", "answer": "- Step 1: Typical approach: apply standard manipulations from the starting form, hoping to land on the target. This is \"forward\" solving — often produces detours.\n- Step 2: \"Act with respect to the answer\" approach: examine the target form first. Identify its structure (what functions appear, what operations are needed). Then reverse-engineer the manipulations.\n- Step 3: Practical benefit: you immediately know which identities to use (double-angle, factoring, etc.), rather than guessing. Reduces wasted work on unnecessary manipulations.\n\nExample: target has $$\\cos 2\\theta$$, and you see $$(\\cos\\theta + \\sin\\theta)(\\cos\\theta - \\sin\\theta)$$ in your expression. Instead of expanding, multiply the product — instantly collapses to $$\\cos 2\\theta$$.\n\nMeta-principle: in guided \"show that\" questions, the target is a roadmap, not an afterthought.", "source": "Opus 4.7 ②", "_id": "opus_2_125", "judge_pick": false}, {"question": "Quick mental example: if $$f(x) = x^2$$ and $$g(x) = x + 3$$, compute $$gf(2)$$ vs $$fg(2)$$ to illustrate non-commutativity of composition.", "answer": "- Step 1: $$gf(2) = g(f(2)) = g(4) = 4 + 3 = 7$$. (Apply $$f$$ first: $$2 \\to 4$$; then $$g$$: $$4 \\to 7$$.)\n- Step 2: $$fg(2) = f(g(2)) = f(5) = 25$$. (Apply $$g$$ first: $$2 \\to 5$$; then $$f$$: $$5 \\to 25$$.)\n- Step 3: $$gf(2) = 7$$, $$fg(2) = 25$$ — very different. This confirms composition is non-commutative.\n\nTakeaway: always check which function gets applied first by reading \"inside-out\" in $$g(f(x))$$.", "source": "Opus 4.7 ②", "_id": "opus_2_126", "judge_pick": false}, {"question": "State the derivative of $$\\ln x$$ and explain briefly why.", "answer": "$$\\tfrac{d}{dx}[\\ln x] = \\tfrac{1}{x}$$ for $$x > 0$$.\n\nWhy:\n- Step 1: Let $$y = \\ln x$$, so $$e^y = x$$. Differentiate implicitly w.r.t. $$x$$: $$e^y \\tfrac{dy}{dx} = 1$$.\n- Step 2: So $$\\tfrac{dy}{dx} = \\tfrac{1}{e^y} = \\tfrac{1}{x}$$.\n- Step 3: For $$\\ln|x|$$ (defined for $$x \\neq 0$$): chain rule gives $$\\tfrac{d}{dx}[\\ln|x|] = \\tfrac{1}{x}$$ still (the modulus handles the sign).\n\nGeneral chain rule application: $$\\tfrac{d}{dx}[\\ln|f(x)|] = \\tfrac{f'(x)}{f(x)}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_127", "judge_pick": false}, {"question": "A student wants to solve $$e^{-45B} = 3/4$$. They take $$\\log_{10}$$ instead of $$\\ln$$. Does this work?", "answer": "Yes, but it's inefficient.\n\n- Step 1: $$\\log_{10}(e^{-45B}) = \\log_{10}(3/4)$$.\n- Step 2: Apply power rule: $$-45B \\cdot \\log_{10}(e) = \\log_{10}(3/4)$$.\n- Step 3: Solve: $$B = \\tfrac{\\log_{10}(3/4)}{-45 \\log_{10}(e)} = \\tfrac{\\log_{10}(4/3)}{45 \\log_{10}(e)}$$.\n\nComparison with $$\\ln$$: using $$\\ln$$ directly, since $$\\ln(e) = 1$$, gives $$-45B = \\ln(3/4)$$, so $$B = \\ln(4/3)/45$$ — cleaner.\n\nRule: match the log base to the exponential base (use $$\\ln$$ for $$e^{\\cdot}$$, use $$\\log_{10}$$ for $$10^{\\cdot}$$). Anything else works but requires dragging extra factors.", "source": "Opus 4.7 ②", "_id": "opus_2_128", "judge_pick": true}, {"question": "Why is the \"polynomial long division\" algorithm essentially a polynomial version of the Euclidean division for integers?", "answer": "- Step 1: Integer division: given dividend $$N$$ and divisor $$D$$, find quotient $$Q$$ and remainder $$R$$ with $$N = QD + R$$ and $$0 \\leq R < |D|$$.\n- Step 2: Polynomial division: given polynomials $$P(x)$$ and $$D(x)$$, find $$Q(x)$$ and $$R(x)$$ with $$P(x) = Q(x) D(x) + R(x)$$ and $$\\deg(R) < \\deg(D)$$.\n- Step 3: The \"remainder is smaller than divisor\" rule:\n+ Integers: $$R < D$$ (size).\n+ Polynomials: $$\\deg(R) < \\deg(D)$$ (degree).\n\nSame skeleton: subtract multiples of the divisor until what remains is \"smaller\" than the divisor in the appropriate sense.", "source": "Opus 4.7 ②", "_id": "opus_2_129", "judge_pick": true}], "count": 130}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 20787, "out_tokens": 31418, "reasoning_chars": 17826, "cost_eur": 0.1212, "elapsed_s": 609, "content_chars": 74356}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 20787, "out_tokens": 25350, "reasoning_chars": 3054, "cost_eur": 0.1017, "elapsed_s": 444, "content_char ": 2, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.75, "in_tokens": 21287, "out_tokens": 4420, "reasoning_chars": 3571, "cost_eur": 0.0088, "elapsed_s": 74, "content_chars": 11317}, "qwen_3": {"run": 3, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.8, "in_tokens": 21287, "out_tokens": 4337, "reasoning_chars": 4154, "cost_eur": 0.0087, "elapsed_s": 72, "content_chars": 9424}, "qwen_4": {"run": 4, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.85, "in_tokens": 21287, "out_tokens": 4740, "reasoning_chars": 4203, "cost_eur": 0.0091, "elapsed_s": 78, "content_chars": 11500}}};
const SK='p3_pp';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),3500);
  fetch('/api/notion',{method:'POST',signal:ctrl.signal,headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
