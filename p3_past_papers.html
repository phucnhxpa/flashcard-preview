n- Step 2: The fix: at $$t = 0$$, power is 0 (starting value). At $$t = 1$$, power is 1 (one year of growth). At $$t = n$$, power is $$n$$. The power always equals the number of years elapsed from $$t = 0$$. Read the subscript carefully and remember: if the starting point is $$t = 0$$, then $$n$$ years later is power $$n$$.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "Given two data points from a geometric sequence $$ab^4 = 3690$$ and $$ab^7 = 3470$$, how do you find $$a$$ and $$b$$? What subscript mistake is common? (3 steps)", "answer": "- Step 1: Divide the two equations to eliminate $$a$$: $$\\frac{ab^7}{ab^4} = b^3 = \\frac{3470}{3690}$$, so $$b = \\left(\\frac{3470}{3690}\\right)^{1/3} \\approx 0.98$$. The key is that the exponents subtract: $$7 - 4 = 3$$, so it's $$b^3$$, not $$b^4$$.\n- Step 2: Substitute back to find $$a$$: from $$ab^4 = 3690$$, we get $$a = \\frac{3690}{b^4} = \\frac{3690}{0.98^4} \\approx 4000$$. The common mistake is dividing by $$b^3$$ instead of $$b^4$$ — confusing the exponent from the division step with the exponent in the original equation.\n- Step 3: Always go back to the original equation. If you're using $$ab^4 = 3690$$, then you divide by $$b^4$$. If you're using $$ab^7 = 3470$$, then you divide by $$b^7$$. Don't mix up which equation you're substituting into.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "To find when two exponential populations are equal — say $$2000 \\times 1.03^T = 4000 \\times 0.98^T$$ — what is the general strategy? (3 steps)", "answer": "- Step 1: Divide both sides to isolate the term with $$T$$ in the exponent: $$\\frac{1.03^T}{0.98^T} = \\frac{4000}{2000}$$, which gives $$\\left(\\frac{1.03}{0.98}\\right)^T = 2$$.\n- Step 2: Take logarithms of both sides (any base): $$T \\ln\\left(\\frac{1.03}{0.98}\\right) = \\ln 2$$, so $$T = \\frac{\\ln 2}{\\ln(1.03/0.98)}$$.\n- Step 3: General principle: whenever the unknown is in the exponent, take logs. This converts the exponential equation into a linear one in $$T$$. The formula $$a^T = k \\Rightarrow T = \\frac{\\log k}{\\log a}$$ works for any log base.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "What is the Sign Change Theorem (Intermediate Value Theorem), and what two things must you show to use it? (2 steps)", "answer": "- Step 1: The theorem states: if $$f$$ is continuous on $$[a, b]$$ and $$f(a)$$ and $$f(b)$$ have opposite signs (i.e., $$f(a) \\cdot f(b) < 0$$), then there exists at least one $$c \\in (a, b)$$ such that $$f(c) = 0$$. Intuitively, a continuous curve that goes from negative to positive (or vice versa) must cross zero.\n- Step 2: You must show **both**: (1) that $$f$$ is continuous on the interval (e.g., \"since $$f$$ is a polynomial, it is continuous\"), AND (2) that the sign changes (compute $$f(a)$$ and $$f(b)$$, state their signs, and note the product is negative). Omitting the continuity statement costs marks.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "When rearranging $$f(x) = 0$$ into an iteration formula $$x = g(x)$$, what does \"act with respect to the answer\" mean? Walk through the example $$x^4 - 5x^2 + 4x - 7 = 0$$ to $$x = \\sqrt[3]{\\frac{5x^2 - 4x + 7}{x}}$$. (3 steps)", "answer": "- Step 1: Look at the target form. It has a cube root and division by $$x$$, which means the highest power inside must be $$x^3$$ (since cube-rooting $$x^3$$ gives $$x$$). So you need to get $$x^3$$ on one side.\n- Step 2: From $$x^4 - 5x^2 + 4x - 7 = 0$$, move terms: $$x^4 = 5x^2 - 4x + 7$$. Then divide both sides by $$x$$ (valid since the root $$\\alpha \\neq 0$$): $$x^3 = \\frac{5x^2 - 4x + 7}{x}$$.\n- Step 3: Take the cube root: $$x = \\sqrt[3]{\\frac{5x^2 - 4x + 7}{x}}$$. \"Act with respect to the answer\" means: look at what the target form requires and work backwards to figure out what algebraic steps will produce it.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "When using a calculator for iteration $$x_{n+1} = g(x_n)$$, what is the ANS button technique and why is it superior to manual entry? (2 steps)", "answer": "- Step 1: Type the starting value (e.g., 2) and press $$=$$. This stores it as ANS. Then type the iteration formula using ANS wherever $$x_n$$ appears: e.g., $$\\sqrt[3]{(5 \\times \\text{ANS}^2 - 4 \\times \\text{ANS} + 7) / \\text{ANS}}$$. Each press of $$=$$ computes the next iterate automatically.\n- Step 2: This is superior because: (a) it avoids rounding errors from re-typing truncated values, (b) it's much faster, (c) the calculator stores ANS to full precision. Manual re-entry introduces rounding at each step, which accumulates and can give a wrong final answer. Stop pressing $$=$$ when consecutive values agree to the required number of decimal places.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "For the exponential decay model $$T = 10 + Ae^{-Bt}$$ where the initial temperature is 18°C, how do you find $$A$$, and what is a common mistake? (2 steps)", "answer": "- Step 1: At $$t = 0$$: $$T = 10 + Ae^0 = 10 + A = 18$$. Since $$e^0 = 1$$ (not 0!), we get $$A = 18 - 10 = 8$$. The common mistake is thinking $$e^0 = 0$$, which would incorrectly give $$A = 8$$ from $$10 + 0 = 18$$ — wait, that's actually impossible. The real mistake is writing $$A = 18$$ by forgetting the +10, or thinking $$e^0 = 0$$ and getting $$10 = 18$$.\n- Step 2: Always remember: any non-zero number raised to the power 0 equals 1. So $$e^0 = 1$$, meaning the exponential term starts at its full value $$A$$ and decays toward 0 as $$t \\to \\infty$$. The horizontal asymptote of $$T = C + Ae^{-Bt}$$ is $$T = C$$ (the ambient/room temperature).", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "In the decay model $$T = 10 + 8e^{-Bt}$$, given $$T = 16$$ at $$t = 45$$, how do you find $$B$$, and what sign error is common? (3 steps)", "answer": "- Step 1: Substitute: $$16 = 10 + 8e^{-45B}$$, so $$8e^{-45B} = 6$$, giving $$e^{-45B} = 3/4$$.\n- Step 2: Take ln: $$-45B = \\ln(3/4)$$. Since $$3/4 < 1$$, $$\\ln(3/4)$$ is negative, so $$-45B$$ is negative, making $$B$$ positive — which makes physical sense (decay constant should be positive).\n- Step 3: The common sign error: writing $$B = \\frac{\\ln(3/4)}{45}$$ without the negative sign, which gives a negative $$B$$. To avoid this, rewrite as $$B = \\frac{\\ln(4/3)}{45}$$ — using the reciprocal inside the log flips the sign and keeps everything positive. $$\\ln(4/3) > 0$$ since $$4/3 > 1$$.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "Why can the temperature in the model $$T = 10 + 8e^{-Bt}$$ never fall to 5°C? Give the conceptual argument. (2 steps)", "answer": "- Step 1: As $$t \\to \\infty$$, $$e^{-Bt} \\to 0$$, so $$T \\to 10 + 0 = 10$$°C. The horizontal asymptote is 10°C. Furthermore, since $$e^{-Bt} > 0$$ for all finite $$t$$ (the exponential function is always positive), we have $$8e^{-Bt} > 0$$, so $$T = 10 + 8e^{-Bt} > 10$$ for all finite $$t$$.\n- Step 2: Since $$T > 10$$ always and approaches 10 only in the limit, $$T$$ can never reach 5°C. The key principle: if a product equals zero and one factor cannot be zero, the other factor must account for it. Here, $$T - 10 = 8e^{-Bt} > 0$$ always, so $$T - 10$$ can never be zero or negative.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": true}, {"question": "When differentiating $$f(x) = 2e^{3\\sin x}\\cos x$$, you use the product rule. After setting $$f'(x) = 0$$, what key logical step saves you from a much harder equation? (3 steps)", "answer": "- Step 1: Product rule: $$u = 2e^{3\\sin x}$$, $$v = \\cos x$$. Then $$u' = 6\\cos x \\cdot e^{3\\sin x}$$ and $$v' = -\\sin x$$. So $$f'(x) = 6\\cos x \\cdot e^{3\\sin x} \\cdot \\cos x + 2e^{3\\sin x} \\cdot (-\\sin x) = 2e^{3\\sin x}(3\\cos^2 x - \\sin x)$$.\n- Step 2: Set $$f'(x) = 0$$: $$2e^{3\\sin x}(3\\cos^2 x - \\sin x) = 0$$. Now, the key logical step: since $$2e^{3\\sin x} > 0$$ always (the exponential function is never zero), this factor cannot be zero. Therefore, the other factor must be zero: $$3\\cos^2 x - \\sin x = 0$$.\n- Step 3: Without this insight, you'd be stuck trying to solve an equation involving both an exponential and trig terms. By factoring out the always-positive exponential, you reduce to a purely trig equation. The principle: \"If a product equals zero and one factor can't be zero, the other factor must be zero.\"", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "After deriving $$3\\cos^2 x - \\sin x = 0$$ for turning points of $$f(x) = 2e^{3\\sin x}\\cos x$$, how do you convert this to a quadratic in $$\\sin x$$? (2 steps)", "answer": "- Step 1: Replace $$\\cos^2 x$$ with $$1 - \\sin^2 x$$ (Pythagorean identity): $$3(1 - \\sin^2 x) - \\sin x = 0$$, which gives $$3 - 3\\sin^2 x - \\sin x = 0$$.\n- Step 2: Rearrange to standard quadratic form: $$3\\sin^2 x + \\sin x - 3 = 0$$. This is a quadratic in $$\\sin x$$ with $$a = 3, b = 1, c = -3$$. Now you can use the quadratic formula to solve for $$\\sin x$$.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "When solving the quadratic $$3\\sin^2 x + \\sin x - 3 = 0$$, you get two values for $$\\sin x$$. Why must you reject one of them? (2 steps)", "answer": "- Step 1: The quadratic formula gives $$\\sin x = \\frac{-1 \\pm \\sqrt{1 + 36}}{6} = \\frac{-1 \\pm \\sqrt{37}}{6}$$. The two values are approximately $$0.847$$ and $$-1.181$$.\n- Step 2: Since $$-1 \\leq \\sin x \\leq 1$$ for all real $$x$$, the value $$\\sin x \\approx -1.181$$ is impossible — no real angle has a sine less than $$-1$$. Reject it. Only $$\\sin x \\approx 0.847$$ is valid. Always check that your solved trig values lie in $$[-1, 1]$$.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": false}, {"question": "After finding two valid $$x$$-values for the turning points of $$f(x) = 2e^{3\\sin x}\\cos x$$, how do you determine which is $$Q$$ (the one below the $$x$$-axis)? (2 steps)", "answer": "- Step 1: The two solutions are $$x \\approx 1.012$$ (1st quadrant, where $$\\cos x > 0$$) and $$x \\approx 2.130$$ (2nd quadrant, where $$\\cos x < 0$$).\n- Step 2: Since $$f(x) = 2e^{3\\sin x}\\cos x$$ and $$2e^{3\\sin x} > 0$$ always, the sign of $$f(x)$$ is determined by $$\\cos x$$. At $$x \\approx 1.012$$, $$\\cos x > 0$$ so $$f(x) > 0$$ (above $$x$$-axis, this is $$P$$). At $$x \\approx 2.130$$, $$\\cos x < 0$$ so $$f(x) < 0$$ (below $$x$$-axis, this is $$Q$$). Alternatively, substitute each $$x$$ back into $$f(x)$$ and check the sign of the output.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": true}, {"question": "When simplifying an algebraic fraction like $$f(x) = \\frac{2x^2 - 32}{3x^2 + 7x - 20} + \\frac{8}{3x - 5}$$, what should you do BEFORE trying to find a common denominator, and why? (3 steps)", "answer": "- Step 1: Factorise each numerator and denominator first. $$2x^2 - 32 = 2(x-4)(x+4)$$ and $$3x^2 + 7x - 20 = (3x-5)(x+4)$$.\n- Step 2: Cancel any common factors. The $$(x+4)$$ factor appears in both the numerator and denominator of the first fraction: $$\\frac{2(x-4)\\cancel{(x+4)}}{(3x-5)\\cancel{(x+4)}} = \\frac{2(x-4)}{3x-5}$$. This is valid since the domain restriction $$x > 2$$ ensures $$x + 4 \\neq 0$$.\n- Step 3: Now add: $$\\frac{2(x-4)}{3x-5} + \\frac{8}{3x-5} = \\frac{2(x-4) + 8}{3x-5} = \\frac{2x}{3x-5}$$. If you had tried to add without factoring, you'd get a massive expansion with no cancellation — a mess. Mr. Fuat: \"Just simplify and refactor as much as possible.\"", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "To prove that $$f(x) = \\frac{2x}{3x-5}$$ is a decreasing function for $$x > 2$$, what must you show, and what is insufficient? (3 steps)", "answer": "- Step 1: Differentiate using the quotient rule: $$f'(x) = \\frac{2(3x-5) - 2x \\cdot 3}{(3x-5)^2} = \\frac{6x - 10 - 6x}{(3x-5)^2} = \\frac{-10}{(3x-5)^2}$$.\n- Step 2: Show $$f'(x) < 0$$ for ALL $$x > 2$$. The numerator is $$-10 < 0$$ always. The denominator $$(3x-5)^2 > 0$$ for all $$x \\neq 5/3$$, and since $$x > 2 > 5/3$$, the denominator is positive. Therefore $$f'(x) < 0$$ for all $$x > 2$$.\n- Step 3: What is insufficient: plugging in one or two values of $$x$$ and noting $$f'(x) < 0$$ at those points. A \"prove\" question requires showing the derivative is negative for the entire domain, not just at sample points. You need a general algebraic argument.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": false}, {"question": "To find the inverse of $$g(x) = 3 + 2\\ln x$$ for $$x \\geq 1$$, what are the steps, and what is the domain of $$g^{-1}$$? (3 steps)", "answer": "- Step 1: Set $$y = 3 + 2\\ln x$$. Solve for $$x$$: $$2\\ln x = y - 3$$, so $$\\ln x = \\frac{y-3}{2}$$, giving $$x = e^{(y-3)/2}$$.\n- Step 2: Swap $$x$$ and $$y$$: $$g^{-1}(x) = e^{(x-3)/2}$$. The domain of $$g^{-1}$$ equals the range of $$g$$.\n- Step 3: Find the range of $$g$$: since $$g$$ is increasing on $$[1, \\infty)$$, the minimum is $$g(1) = 3 + 2\\ln 1 = 3$$, and there is no upper bound. So range of $$g = [3, \\infty)$$, and domain of $$g^{-1} = [3, \\infty)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": false}, {"question": "To solve $$gf(a) = 5$$ where $$g(x) = 3 + 2\\ln x$$ and $$f(x) = \\frac{2x}{3x-5}$$, walk through the order of operations. (3 steps)", "answer": "- Step 1: $$gf(a) = g(f(a))$$ — apply $$f$$ first. So $$f(a) = \\frac{2a}{3a-5}$$, and then $$g\\left(\\frac{2a}{3a-5}\\right) = 3 + 2\\ln\\left(\\frac{2a}{3a-5}\\right)$$.\n- Step 2: Set equal to 5: $$3 + 2\\ln\\left(\\frac{2a}{3a-5}\\right) = 5$$, so $$2\\ln\\left(\\frac{2a}{3a-5}\\right) = 2$$, giving $$\\ln\\left(\\frac{2a}{3a-5}\\right) = 1$$.\n- Step 3: Exponentiate: $$\\frac{2a}{3a-5} = e$$. Cross-multiply: $$2a = e(3a - 5) = 3ea - 5e$$, so $$2a - 3ea = -5e$$, giving $$a(2 - 3e) = -5e$$, and $$a = \\frac{5e}{3e - 2}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": false}, {"question": "For $$y = a - |2x - b|$$ with $$a > b > 0$$, where is the maximum point, and what is the shortcut for finding its $$x$$-coordinate? (2 steps)", "answer": "- Step 1: The maximum occurs where the modulus is minimised, i.e., where $$|2x - b| = 0$$. Set the expression inside the modulus to zero: $$2x - b = 0 \\Rightarrow x = b/2$$. At this point, $$y = a - 0 = a$$. So the maximum is at $$\\left(\\frac{b}{2}, a\\right)$$.\n- Step 2: Shortcut: the $$x$$-coordinate of the vertex of $$|bx - c|$$ is always where the inside equals zero, i.e., $$x = c/b$$. The maximum value of $$a - |stuff|$$ is always $$a$$ (when the modulus part is zero). The graph is an inverted V-shape with its peak at the vertex.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": false}, {"question": "For $$y = a - |2x - b|$$ with $$a > b > 0$$, find the $$y$$-intercept and the two $$x$$-intercepts. (3 steps)", "answer": "- Step 1: $$y$$-intercept (set $$x = 0$$): $$y = a - |{-b}| = a - b$$. Since $$a > b$$, this is positive. Point: $$(0, a - b)$$.\n- Step 2: $$x$$-intercepts (set $$y = 0$$): $$|2x - b| = a$$, so $$2x - b = a$$ or $$2x - b = -a$$. First gives $$x = \\frac{a+b}{2}$$; second gives $$x = \\frac{b-a}{2}$$.\n- Step 3: Since $$a > b > 0$$, the first intercept $$\\frac{a+b}{2}$$ is positive, and the second $$\\frac{b-a}{2}$$ is negative. The graph crosses the $$x$$-axis at these two points, forming the base of the inverted V.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": false}, {"question": "When two modulus graphs intersect (e.g., $$y = |x+1|$$ and $$y = a - |2x-b|$$ at $$x = -3$$ and $$x = 5$$), how do you determine which case/branch to use at each intersection? (3 steps)", "answer": "- Step 1: Sketch both graphs and mark the intersection points. At each intersection, determine which branch of each modulus function is active by checking the sign of the expression inside the modulus.\n- Step 2: At $$x = 5$$: for $$|x+1|$$, since $$5 > -1$$, we're on the positive branch: $$|x+1| = x + 1 = 6$$. For $$|2x - b|$$, since $$5$$ is to the right of the vertex at $$b/2$$ (which is small since $$b < a$$), we're on the right descending branch: $$|2x-b| = 2x - b$$. This is the positive-positive case.\n- Step 3: At $$x = -3$$: for $$|x+1|$$, since $$-3 < -1$$, we're on the negative branch: $$|x+1| = -(x+1) = 2$$. For $$|2x-b|$$, since $$-3$$ is to the left of the vertex, we're on the ascending (left) branch: $$|2x-b| = -(2x-b) = b - 2x$$. This is the negative-left case. Always read branches off the graph, not by guessing.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": true}, {"question": "After determining the correct branches at each intersection point of two modulus graphs, you get a system of two equations. How do you solve for the parameters? (2 steps)", "answer": "- Step 1: At $$x = 5$$ (positive-positive): $$x + 1 = a - (2x - b)$$, so $$6 = a - 10 + b$$, giving $$a + b = 16$$. At $$x = -3$$ (negative-left): $$-(x+1) = a - (b - 2x)$$, so $$2 = a - b - 6$$, giving $$a - b = 8$$.\n- Step 2: Solve the simultaneous equations: adding gives $$2a = 24 \\Rightarrow a = 12$$; subtracting gives $$2b = 8 \\Rightarrow b = 4$$. Always verify: $$a > b > 0$$? Yes, $$12 > 4 > 0$$. ✓", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": false}, {"question": "In the identity proof $$\\frac{3\\sin\\theta\\cos\\theta}{\\cos\\theta + \\sin\\theta} = (2 + \\sec 2\\theta)(\\cos\\theta - \\sin\\theta)$$ leading to $$3\\sin 2\\theta - 4\\cos 2\\theta = 2$$, what does \"act with respect to the answer\" mean here? (3 steps)", "answer": "- Step 1: The target form contains only $$2\\theta$$ terms. So look at each piece and convert to double-angle. Multiply both sides by $$(\\cos\\theta + \\sin\\theta)$$: $$3\\sin\\theta\\cos\\theta = (2 + \\sec 2\\theta)(\\cos\\theta - \\sin\\theta)(\\cos\\theta + \\sin\\theta)$$.\n- Step 2: The product $$(\\cos\\theta - \\sin\\theta)(\\cos\\theta + \\sin\\theta) = \\cos^2\\theta - \\sin^2\\theta = \\cos 2\\theta$$ (difference of squares → double angle). Also $$\\sec 2\\theta \\cdot \\cos 2\\theta = 1$$. So the RHS becomes $$2\\cos 2\\theta + 1$$.\n- Step 3: The LHS: $$3\\sin\\theta\\cos\\theta = \\frac{3}{2}\\sin 2\\theta$$ (using $$\\sin\\theta\\cos\\theta = \\frac{1}{2}\\sin 2\\theta$$). Equate: $$\\frac{3}{2}\\sin 2\\theta = 2\\cos 2\\theta + 1$$, multiply by 2: $$3\\sin 2\\theta - 4\\cos 2\\theta = 2$$. Each step was guided by \"what does the target form need?\"", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": false}, {"question": "In the identity proof from Q44, why is the factor $$\\frac{1}{2}$$ in $$\\sin\\theta\\cos\\theta = \\frac{1}{2}\\sin 2\\theta$$ so critical, and what goes wrong if you forget it? (2 steps)", "answer": "- Step 1: The double-angle identity is $$\\sin 2A = 2\\sin A\\cos A$$, which rearranges to $$\\sin A\\cos A = \\frac{1}{2}\\sin 2A$$. If you forget the $$\\frac{1}{2}$$ and write $$3\\sin\\theta\\cos\\theta = 3\\sin 2\\theta$$, you'll get $$3\\sin 2\\theta = 2\\cos 2\\theta + 1$$ after equating, which is wrong.\n- Step 2: The correct equation is $$\\frac{3}{2}\\sin 2\\theta = 2\\cos 2\\theta + 1$$, which after multiplying by 2 gives $$3\\sin 2\\theta - 4\\cos 2\\theta = 2$$. Forgetting the $$\\frac{1}{2}$$ changes the coefficients and the entire R-formula computation downstream. The $$\\frac{1}{2}$$ is one of the most commonly dropped factors in exams.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": true}, {"question": "When solving $$3\\sin 2x - 4\\cos 2x = 2$$ using the R-formula, why must you choose the form $$R\\sin(2x - \\alpha)$$ instead of $$R\\sin(2x + \\alpha)$$? (2 steps)", "answer": "- Step 1: The LHS is $$3\\sin 2x - 4\\cos 2x$$. Comparing with the R-formula templates: $$a\\sin x - b\\cos x = R\\sin(x - \\alpha)$$ where $$R\\cos\\alpha = a$$ and $$R\\sin\\alpha = b$$. The minus sign in front of the $$\\cos$$ term dictates the minus sign inside the R-formula.\n- Step 2: Expanding $$R\\sin(2x - \\alpha) = R\\sin 2x\\cos\\alpha - R\\cos 2x\\sin\\alpha$$. Matching: $$R\\cos\\alpha = 3$$ and $$R\\sin\\alpha = 4$$. So $$R = 5$$ and $$\\tan\\alpha = 4/3$$. The equation becomes $$5\\sin(2x - \\alpha) = 2$$, i.e., $$\\sin(2x - \\alpha) = 0.4$$. If you used $$R\\sin(2x + \\alpha)$$, the expansion would give $$+R\\cos 2x\\sin\\alpha$$ which doesn't match the $$-4\\cos 2x$$.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": false}, {"question": "After converting $$3\\sin 2x - 4\\cos 2x = 2$$ to $$5\\sin(2x - \\alpha) = 0.4$$, you need to solve for $$x$$ in the range $$\\pi \\leq x \\leq 3\\pi/2$$. How do you transform the range for the new variable $$\\phi = 2x - \\alpha$$? (2 steps)", "answer": "- Step 1: Since $$\\phi = 2x - \\alpha$$ and $$\\pi \\leq x \\leq 3\\pi/2$$, multiply the $$x$$-range by 2: $$2\\pi \\leq 2x \\leq 3\\pi$$. Then subtract $$\\alpha$$: $$2\\pi - \\alpha \\leq \\phi \\leq 3\\pi - \\alpha$$. With $$\\alpha \\approx 0.927$$, this gives approximately $$5.36 \\leq \\phi \\leq 8.50$$.\n- Step 2: Now solve $$\\sin\\phi = 0.4$$ within this range. The principal value is $$\\phi_0 \\approx 0.412$$. General solutions: $$\\phi = 2n\\pi + 0.412$$ or $$\\phi = (2n+1)\\pi - 0.412$$. Checking which fall in $$[5.36, 8.50]$$: only $$\\phi \\approx 0.412 + 2\\pi \\approx 6.69$$ works. Then $$x = (\\phi + \\alpha)/2 \\approx 3.81$$.", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": false}, {"question": "Why is it crucial to check your calculator is in radians mode when solving trig equations in P3? (1 step)", "answer": "P3 trig equations always use radian ranges (e.g., $$\\pi \\leq x \\leq 3\\pi/2$$). If your calculator is in degrees, $$\\arcsin(0.4)$$ returns approximately 23.6° instead of 0.412 rad — completely wrong values that won't match the given range. Mr. Fuat explicitly flagged this: \"Angle units and then radians.\" Make it a ritual to check the mode before every trig calculation.", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": true}, {"question": "When computing $$\\int_1^3 \\frac{16}{9(3x - 7/3)}dx$$, walk through the application of $$\\int \\frac{1}{ax+b}dx = \\frac{1}{a}\\ln|ax+b|$$ and the fraction arithmetic. (3 steps)", "answer": "- Step 1: Factor out constants: $$\\frac{16}{9}\\int_1^3 \\frac{1}{3x - 7/3}dx$$. Apply the formula with $$a = 3$$: $$\\int \\frac{1}{3x - 7/3}dx = \\frac{1}{3}\\ln|3x - 7/3|$$. The $$\\frac{1}{3}$$ comes from dividing by the coefficient of $$x$$.\n- Step 2: Evaluate at limits: $$\\frac{16}{9} \\cdot \\frac{1}{3}\\left[\\ln|3x - 7/3|\\right]_1^3 = \\frac{16}{27}\\left[\\ln|9 - 7/3| - \\ln|3 - 7/3|\\right]$$. Fraction arithmetic: $$9 - 7/3 = 27/3 - 7/3 = 20/3$$, and $$3 - 7/3 = 9/3 - 7/3 = 2/3$$.\n- Step 3: Combine logs: $$\\frac{16}{27}\\ln\\frac{20/3}{2/3} = \\frac{16}{27}\\ln 10$$. So $$\\lambda = \\frac{16}{27}$$. The fraction arithmetic simplifies beautifully because the /3's cancel. Always combine logs before reading off the coefficient.", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": false}, {"question": "What is the difference of two squares factorisation, and why does it appear in trig identity proofs? (2 steps)", "answer": "- Step 1: $$a^2 - b^2 = (a-b)(a+b)$$. In trig, this appears as $$\\cos^2\\theta - \\sin^2\\theta = (\\cos\\theta - \\sin\\theta)(\\cos\\theta + \\sin\\theta) = \\cos 2\\theta$$. Whenever you see $$(\\cos\\theta + \\sin\\theta)(\\cos\\theta - \\sin\\theta)$$, immediately recognise it as $$\\cos 2\\theta$$.\n- Step 2: This pattern is the bridge between single-angle expressions and double-angle expressions. In the identity proof, multiplying both sides by $$(\\cos\\theta + \\sin\\theta)$$ created the product $$(\\cos\\theta - \\sin\\theta)(\\cos\\theta + \\sin\\theta)$$ on the RHS, which collapsed to $$\\cos 2\\theta$$ — exactly what the target form needed.", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": false}, {"question": "What is $$\\sec 2\\theta \\cdot \\cos 2\\theta$$, and why is this simplification important in identity proofs? (1 step)", "answer": "Since $$\\sec 2\\theta = \\frac{1}{\\cos 2\\theta}$$, the product $$\\sec 2\\theta \\cdot \\cos 2\\theta = \\frac{1}{\\cos 2\\theta} \\cdot \\cos 2\\theta = 1$$. This is a crucial simplification in identity proofs because it eliminates the $$\\sec$$ term entirely. In the proof, $$(2 + \\sec 2\\theta)\\cos 2\\theta = 2\\cos 2\\theta + \\sec 2\\theta \\cdot \\cos 2\\theta = 2\\cos 2\\theta + 1$$. Without recognising this, you'd be stuck with a $$\\sec$$ term that doesn't match the target form.", "source": "GLM 5.1 ②", "_id": "glm_2_50", "judge_pick": false}, {"question": "When solving a compound-angle equation like $$\\sqrt{2}\\sin(x + 45°) = \\cos(x - 60°)$$, what approach do you use to reach $$\\tan x = \\text{something}$$? (3 steps)", "answer": "- Step 1: Expand both sides using addition formulas. $$\\sqrt{2}[\\sin x\\cos 45° + \\cos x\\sin 45°] = \\cos x\\cos 60° + \\sin x\\sin 60°$$. Since $$\\cos 45° = \\sin 45° = \\frac{1}{\\sqrt{2}}$$ and $$\\cos 60° = \\frac{1}{2}, \\sin 60° = \\frac{\\sqrt{3}}{2}$$.\n- Step 2: Simplify: LHS = $$\\sqrt{2} \\cdot \\frac{1}{\\sqrt{2}}(\\sin x + \\cos x) = \\sin x + \\cos x$$. RHS = $$\\frac{1}{2}\\cos x + \\frac{\\sqrt{3}}{2}\\sin x$$. So $$\\sin x + \\cos x = \\frac{1}{2}\\cos x + \\frac{\\sqrt{3}}{2}\\sin x$$.\n- Step 3: Collect terms: $$\\sin x - \\frac{\\sqrt{3}}{2}\\sin x = \\frac{1}{2}\\cos x - \\cos x$$, giving $$\\sin x(1 - \\frac{\\sqrt{3}}{2}) = \\cos x(\\frac{1}{2} - 1) = -\\frac{1}{2}\\cos x$$. Divide by $$\\cos x$$: $$\\tan x = \\frac{-1/2}{1 - \\sqrt{3}/2} = \\frac{-1}{2 - \\sqrt{3}} = -(2 + \\sqrt{3})$$.", "source": "GLM 5.1 ②", "_id": "glm_2_51", "judge_pick": false}, {"question": "In the compound-angle problem, part (b) asks to solve $$\\sqrt{2}\\sin(2\\theta) = \\cos(2\\theta - 105°)$$ using the result from part (a). What substitution connects the two parts? (2 steps)", "answer": "- Step 1: Compare the structure. Part (a) gave $$\\sqrt{2}\\sin(x + 45°) = \\cos(x - 60°)$$ leading to $$\\tan x = -2 - \\sqrt{3}$$. Part (b) has $$\\sqrt{2}\\sin(2\\theta) = \\cos(2\\theta - 105°)$$. Match the structures: let $$x + 45° = 2\\theta$$, so $$x = 2\\theta - 45°$$.\n- Step 2: Then $$x - 60° = 2\\theta - 45° - 60° = 2\\theta - 105°$$. This matches perfectly. So the result from (a) applies: $$\\tan(2\\theta - 45°) = -2 - \\sqrt{3} = \\tan 105°$$. Solve: $$2\\theta - 45° = 105° + 180°n$$, giving $$\\theta = 75°, 165°$$ in $$[0°, 180°)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_52", "judge_pick": false}, {"question": "For the transformation $$y = \\frac{1}{2}|f(x)|$$ applied to a point $$(-4, -3)$$, what happens step by step? (2 steps)", "answer": "- Step 1: The modulus reflects the negative part above the $$x$$-axis: $$|f(x)|$$ changes $$y = -3$$ to $$y = 3$$. The point becomes $$(-4, 3)$$.\n- Step 2: The $$\\frac{1}{2}$$ is a vertical stretch (compression) by factor $$1/2$$: $$y$$-coordinate halves from 3 to $$3/2 = 1.5$$. The $$x$$-coordinate is unchanged. Final image: $$(-4, 1.5)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_53", "judge_pick": false}, {"question": "What is the range of the composite function $$fg$$, and what is the correct order to find it? (3 steps)", "answer": "- Step 1: The range of $$fg$$ depends on what values $$g$$ feeds into $$f$$. First, find the range of $$g$$ over its domain.\n- Step 2: Use the range of $$g$$ as the domain of $$f$$. For example, if $$g(x) = \\frac{6x-2}{2x+1}$$ with domain $$x \\geq 1$$, then as $$x \\to \\infty$$, $$g(x) \\to 3$$, and $$g(1) = 4/3$$. Since $$g$$ is increasing, the range of $$g$$ is $$[4/3, 3)$$ — but wait, actually $$g(1) = 4/3$$ and the limit is 3, so range is $$[4/3, 3)$$ or more precisely $$(0, 3)$$ depending on the full domain.\n- Step 3: Then find $$f$$ applied to this range. If $$f(x) = 2 + 5\\ln x$$ and the range of $$g$$ is $$(0, 3)$$, then the range of $$fg$$ is $$(2 + 5\\ln 0^+, 2 + 5\\ln 3) = (-\\infty, 2 + 5\\ln 3)$$. Always: range of $$g$$ first → use as domain of $$f$$ → compute range of $$f$$ on that domain.", "source": "GLM 5.1 ②", "_id": "glm_2_54", "judge_pick": false}, {"question": "When differentiating $$(3x - k)^{-1}$$ with respect to $$x$$, what rule do you use and what is the result? (2 steps)", "answer": "- Step 1: Use the chain rule. Let $$u = 3x - k$$, so $$\\frac{d}{dx}(u^{-1}) = -u^{-2} \\cdot \\frac{du}{dx} = -(3x-k)^{-2} \\cdot 3 = -3(3x-k)^{-2}$$.\n- Step 2: The chain rule contributes the factor of 3 (from differentiating the inside function). This is the same reason the $$1/a$$ factor appears in integration — differentiation and integration are inverse processes. If differentiation multiplies by 3, integration must divide by 3.", "source": "GLM 5.1 ②", "_id": "glm_2_55", "judge_pick": false}, {"question": "A simple exercise: If $$y = |x - 3| + 5$$, what is the vertex, and is the graph a V-shape pointing up or down? (1 step)", "answer": "The vertex is at $$(3, 5)$$ — found by setting $$x - 3 = 0$$. The graph is a V-shape pointing up because the coefficient of the modulus is positive (implicitly $$+1$$). The minimum value is 5, occurring at $$x = 3$$.", "source": "GLM 5.1 ②", "_id": "glm_2_56", "judge_pick": false}, {"question": "A simple exercise: If $$y = 4 - |x + 2|$$, what is the maximum point, and what type of shape is the graph? (1 step)", "answer": "The maximum is at $$(-2, 4)$$ — found by setting $$x + 2 = 0$$ and noting the maximum value equals the constant 4 (since the modulus part is 0 at the vertex). The graph is an inverted V (Λ-shape) pointing down, because the modulus has a negative coefficient. The maximum value is 4.", "source": "GLM 5.1 ②", "_id": "glm_2_57", "judge_pick": false}, {"question": "A simple exercise: Convert $$y = 100x^2$$ to a straight-line form by taking $$\\log_{10}$$ of both sides. State what to plot on each axis, the gradient, and the intercept. (2 steps)", "answer": "- Step 1: $$\\log_{10} y = \\log_{10}(100x^2) = \\log_{10} 100 + \\log_{10}(x^2) = 2 + 2\\log_{10} x$$. So $$Y = 2X + 2$$ where $$Y = \\log_{10} y$$ and $$X = \\log_{10} x$$.\n- Step 2: Plot $$\\log_{10} y$$ on the vertical axis and $$\\log_{10} x$$ on the horizontal axis. Gradient = 2 (this is the power of $$x$$ in the original model). $$Y$$-intercept = 2 (this is $$\\log_{10} k$$ where $$k = 100$$).", "source": "GLM 5.1 ②", "_id": "glm_2_58", "judge_pick": false}, {"question": "A simple exercise: If $$\\log_2 N = 3t + 1$$, write $$N$$ in the form $$ab^t$$. (2 steps)", "answer": "- Step 1: Raise 2 to both sides: $$N = 2^{3t+1} = 2^1 \\cdot 2^{3t} = 2 \\cdot (2^3)^t = 2 \\cdot 8^t$$.\n- Step 2: So $$a = 2, b = 8$$. The key step was splitting $$2^{3t}$$ into $$(2^3)^t = 8^t$$ to match the $$ab^t$$ form.", "source": "GLM 5.1 ②", "_id": "glm_2_59", "judge_pick": false}, {"question": "A simple exercise: Compute $$\\int \\frac{1}{2x+5}dx$$. Where is the trap? (2 steps)", "answer": "- Step 1: Apply $$\\int \\frac{1}{ax+b}dx = \\frac{1}{a}\\ln|ax+b| + C$$ with $$a = 2, b = 5$$. The integral is $$\\frac{1}{2}\\ln|2x + 5| + C$$.\n- Step 2: The trap is forgetting the $$\\frac{1}{a} = \\frac{1}{2}$$ factor. If you just wrote $$\\ln|2x+5|$$, differentiating would give $$\\frac{2}{2x+5}$$, not $$\\frac{1}{2x+5}$$. The $$\\frac{1}{2}$$ is needed to cancel the 2 from the chain rule.", "source": "GLM 5.1 ②", "_id": "glm_2_60", "judge_pick": false}, {"question": "A simple exercise: Write $$5\\sin x - 12\\cos x$$ in the form $$R\\sin(x - \\alpha)$$, stating $$R$$ and $$\\tan\\alpha$$. (2 steps)", "answer": "- Step 1: Since the $$\\cos$$ term is subtracted, use the form $$R\\sin(x - \\alpha)$$: expand to $$R\\sin x\\cos\\alpha - R\\cos x\\sin\\alpha$$. Match: $$R\\cos\\alpha = 5$$ and $$R\\sin\\alpha = 12$$.\n- Step 2: $$R = \\sqrt{5^2 + 12^2} = \\sqrt{25 + 144} = \\sqrt{169} = 13$$. $$\\tan\\alpha = 12/5$$. So $$5\\sin x - 12\\cos x = 13\\sin(x - \\alpha)$$ where $$\\tan\\alpha = 12/5$$. The maximum value of this expression is 13.", "source": "GLM 5.1 ②", "_id": "glm_2_61", "judge_pick": false}, {"question": "A simple exercise: If $$3\\sin 2x + 4\\cos 2x = R\\sin(2x + \\alpha)$$, what is the maximum value of $$3\\sin 2x + 4\\cos 2x + 7$$? (2 steps)", "answer": "- Step 1: $$R = \\sqrt{3^2 + 4^2} = 5$$. So the expression is $$5\\sin(2x + \\alpha) + 7$$. The maximum of $$\\sin$$ is 1, so the maximum of $$5\\sin(2x + \\alpha)$$ is 5.\n- Step 2: Maximum of the whole expression = $$5 + 7 = 12$$. Minimum = $$-5 + 7 = 2$$. The \"+7\" shifts the entire range up by 7.", "source": "GLM 5.1 ②", "_id": "glm_2_62", "judge_pick": false}, {"question": "A simple exercise: If a population follows $$P = 500 \\times 1.02^n$$ where $$n$$ is the number of years after 2020, what is the population in 2026? (1 step)", "answer": "From 2020 to 2026 is 6 years, so $$n = 6$$. The population is $$P = 500 \\times 1.02^6$$. The key: since the starting point is $$n = 0$$ at 2020, the number of years elapsed equals the power. Do NOT use power 5.", "source": "GLM 5.1 ②", "_id": "glm_2_63", "judge_pick": false}, {"question": "When solving $$|f(x)| > g(x)$$, a student gets $$x < 0$$ in Case 1 (where $$x \\geq 5$$) and declares \"no solution for this case.\" Is this correct reasoning? Why? (2 steps)", "answer": "- Step 1: Yes, this is correct. Case 1 requires $$x \\geq 5$$ (this is the condition for the modulus to equal $$(x-5)$$ rather than $$(5-x)$$). The algebra gave $$x < 0$$. These two conditions are contradictory — there is no number that is simultaneously ≥ 5 and < 0.\n- Step 2: This is exactly why you must check each solution against its case region. The algebra is not wrong; it's that the solution doesn't belong to the region where that case is valid. In Case 2 ($$x < 5$$), the solution $$x < 5/2$$ does satisfy $$x < 5$$, so it's valid.", "source": "GLM 5.1 ②", "_id": "glm_2_64", "judge_pick": false}, {"question": "Why does $$|2x - b|$$ have its vertex at $$x = b/2$$ rather than $$x = b$$? (2 steps)", "answer": "- Step 1: The vertex of a modulus function occurs where the expression inside equals zero. For $$|2x - b|$$, set $$2x - b = 0$$, giving $$x = b/2$$. The factor of 2 in front of $$x$$ means the zero occurs at $$b/2$$, not $$b$$.\n- Step 2: Common mistake: treating $$|2x - b|$$ the same as $$|x - b|$$ and placing the vertex at $$x = b$$. The coefficient of $$x$$ matters. For $$|ax - c|$$, the vertex is always at $$x = c/a$$. This is the same principle as finding the root of a linear function.", "source": "GLM 5.1 ②", "_id": "glm_2_65", "judge_pick": false}, {"question": "What is the addition formula for $$\\sin(A \\pm B)$$, and what is the most common sign error? (2 steps)", "answer": "- Step 1: $$\\sin(A + B) = \\sin A\\cos B + \\cos A\\sin B$$ and $$\\sin(A - B) = \\sin A\\cos B - \\cos A\\sin B$$. The sign in the middle matches the sign in the argument.\n- Step 2: The common error is mixing up the sign rule with the cosine formula. For $$\\cos(A \\pm B) = \\cos A\\cos B \\mp \\sin A\\sin B$$, the sign is **opposite** to the argument sign (cosine addition has a minus between the terms). For sine, the sign **matches**. Mnemonic: \"sine keeps the sign, cosine flips the sign.\"", "source": "GLM 5.1 ②", "_id": "glm_2_66", "judge_pick": true}, {"question": "What are the reciprocal trig identities and the two Pythagorean identities involving sec and cosec? (1 step)", "answer": "$$\\sec x = \\frac{1}{\\cos x}$$, $$\\cosec x = \\frac{1}{\\sin x}$$, $$\\cot x = \\frac{\\cos x}{\\sin x}$$. The Pythagorean identities are: $$1 + \\tan^2 x = \\sec^2 x$$ and $$1 + \\cot^2 x = \\cosec^2 x$$. These are derived by dividing $$\\sin^2 x + \\cos^2 x = 1$$ by $$\\cos^2 x$$ or $$\\sin^2 x$$ respectively.", "source": "GLM 5.1 ②", "_id": "glm_2_67", "judge_pick": true}, {"question": "When the exam says \"hence solve,\" what does the word \"hence\" require you to do? (2 steps)", "answer": "- Step 1: \"Hence\" means you MUST use the result from the previous part. You cannot solve the problem from scratch using a different method — even if your alternative method is correct, you'll lose marks for not following the \"hence\" instruction.\n- Step 2: For example, after proving $$\\tan(2\\theta - 45°) = -2 - \\sqrt{3}$$ in part (a), part (b) says \"hence solve...\" — you must use the fact that $$\\tan(2\\theta - 45°) = \\tan 105°$$ to find $$\\theta$$. Starting fresh with the original equation would be wrong approach even if it could theoretically work.", "source": "GLM 5.1 ②", "_id": "glm_2_68", "judge_pick": false}, {"question": "What is the general strategy for finding where $$f(x) = 0$$ when $$f(x)$$ contains a product of an exponential and a trig function? (2 steps)", "answer": "- Step 1: Set the product equal to zero. Since the exponential factor (e.g., $$2e^{3\\sin x}$$) is always positive and can never be zero, it cannot contribute to making the product zero.\n- Step 2: Therefore, the other factor must be zero. For $$2e^{3\\sin x}\\cos x = 0$$, since $$2e^{3\\sin x} > 0$$ always, we need $$\\cos x = 0$$. This gives $$x = \\pi/2, 3\\pi/2$$, etc. The key principle: \"If a product equals zero and one factor can't be zero, the other factor must be zero.\"", "source": "GLM 5.1 ②", "_id": "glm_2_69", "judge_pick": false}, {"question": "When the rate of change $$dT/dt$$ of a cooling model is negative, what does this mean physically, and how do you interpret the magnitude? (2 steps)", "answer": "- Step 1: A negative $$dT/dt$$ means the temperature is decreasing — the object is cooling down. For $$T = 10 + 8e^{-Bt}$$, we get $$dT/dt = -8Be^{-Bt}$$, which is always negative (since $$B > 0$$ and $$e^{-Bt} > 0$$), confirming continuous cooling.\n- Step 2: The magnitude $$|dT/dt| = 8Be^{-Bt}$$ tells you the rate of cooling in °C per minute. At $$t = 0$$, the rate is $$8B$$ (fastest cooling). As $$t$$ increases, $$e^{-Bt}$$ decreases, so the cooling slows down — the temperature approaches the asymptote ever more gradually. This is Newton's Law of Cooling.", "source": "GLM 5.1 ②", "_id": "glm_2_70", "judge_pick": false}, {"question": "A simple exercise: If $$T = 20 + 5e^{-0.1t}$$, what is the initial temperature, and what temperature does the object approach as $$t \\to \\infty$$? (1 step)", "answer": "At $$t = 0$$: $$T = 20 + 5e^0 = 20 + 5 = 25$$°C. As $$t \\to \\infty$$: $$e^{-0.1t} \\to 0$$, so $$T \\to 20$$°C. The ambient temperature (asymptote) is 20°C, and the initial temperature is 25°C. The constant $$A = 5$$ represents the initial difference from ambient: $$T_0 - C = 25 - 20 = 5$$.", "source": "GLM 5.1 ②", "_id": "glm_2_71", "judge_pick": false}, {"question": "In the quotient rule $$\\left(\\frac{u}{v}\\right)' = \\frac{u'v - uv'}{v^2}$$, what is the most common sign error, and how can you remember the correct order? (2 steps)", "answer": "- Step 1: The common error is writing $$u'v - uv'$$ as $$uv' - u'v$$ (swapping the terms, flipping the sign). This gives the wrong sign for the entire derivative.\n- Step 2: Memory aid: the derivative of the numerator ($$u'$$) comes first, multiplied by the denominator ($$v$$). Then minus the numerator ($$u$$) times the derivative of the denominator ($$v'$$). Think \"derivative of top times bottom, minus top times derivative of bottom.\" Or use the mnemonic \"low d-high minus high d-low, over low squared.\"", "source": "GLM 5.1 ②", "_id": "glm_2_72", "judge_pick": true}, {"question": "When proving a function is increasing or decreasing, why is testing one or two values of $$x$$ insufficient? What must you do instead? (2 steps)", "answer": "- Step 1: Testing specific values only proves the derivative is positive/negative at those points — it doesn't guarantee it holds for ALL $$x$$ in the domain. There could be regions where the derivative changes sign that you happened to miss.\n- Step 2: Instead, differentiate and simplify the expression for $$f'(x)$$, then argue algebraically that it is always positive (or always negative) over the entire domain. For example, $$f'(x) = \\frac{-10}{(3x-5)^2}$$: the numerator is always negative, the denominator is always positive (for $$x > 5/3$$), so $$f'(x) < 0$$ for all valid $$x$$. This is a complete proof.", "source": "GLM 5.1 ②", "_id": "glm_2_73", "judge_pick": false}, {"question": "What is the relationship between the domain of $$g^{-1}$$ and the range of $$g$$, and why? (2 steps)", "answer": "- Step 1: The domain of $$g^{-1}$$ equals the range of $$g$$. This is because $$g^{-1}$$ takes the outputs of $$g$$ and returns the inputs. If $$g$$ can produce values in the range $$[a, b]$$, then $$g^{-1}$$ must accept exactly those values as its domain.\n- Step 2: Conversely, the range of $$g^{-1}$$ equals the domain of $$g$$. The inverse function reverses the mapping: what was output becomes input and vice versa. So when finding $$g^{-1}$$, always state its domain by first finding the range of $$g$$.", "source": "GLM 5.1 ②", "_id": "glm_2_74", "judge_pick": false}, {"question": "When integrating $$\\frac{6}{x-2}$$, a student writes the answer as $$6\\ln(x-2)$$. What is missing, and why does it matter? (2 steps)", "answer": "- Step 1: The absolute value signs are missing: it should be $$6\\ln|x-2|$$. The integral of $$1/x$$ is $$\\ln|x|$$, not $$\\ln x$$, because the logarithm is only defined for positive arguments and the expression $$(x-2)$$ could be negative.\n- Step 2: In the specific case of definite integration from 4 to 8, $$x - 2 > 0$$ throughout, so the absolute value doesn't change the numerical answer. However, for indefinite integrals or integrals where the expression changes sign, omitting the absolute value is mathematically incorrect and can lose marks.", "source": "GLM 5.1 ②", "_id": "glm_2_75", "judge_pick": false}, {"question": "What is the convergence condition for an iteration $$x_{n+1} = g(x_n)$$, and what happens if it's violated? (2 steps)", "answer": "- Step 1: The iteration converges to a root $$\\alpha$$ if $$|g'(\\alpha)| < 1$$ — the magnitude of the derivative of the iteration function at the root must be less than 1. This means each step brings you closer to the root rather than farther away.\n- Step 2: If $$|g'(\\alpha)| > 1$$, the iteration diverges — each step takes you farther from the root. If $$|g'(\\alpha)| = 1$$, the behavior is borderline. Different rearrangements of the same equation can give different iteration functions, some convergent and some divergent. Always use the rearrangement the exam provides.", "source": "GLM 5.1 ②", "_id": "glm_2_76", "judge_pick": false}, {"question": "When combining $$6\\ln 6 - 6\\ln 2$$ in a definite integral, why should you always combine before reading off the final coefficient, rather than computing each log separately? (2 steps)", "answer": "- Step 1: Using the log law $$\\ln A - \\ln B = \\ln(A/B)$$: $$6\\ln 6 - 6\\ln 2 = 6(\\ln 6 - \\ln 2) = 6\\ln(6/2) = 6\\ln 3$$. This gives the exact form the question asks for ($$\\alpha + \\beta\\ln 3$$).\n- Step 2: If you compute $$\\ln 6 \\approx 1.7918$$ and $$\\ln 2 \\approx 0.6931$$ separately, you get $$6(1.7918) - 6(0.6931) = 6(1.0986) = 6.592$$. But this is a decimal approximation, not the exact form. The question requires the exact coefficient $$\\beta = 6$$ multiplied by $$\\ln 3$$. Combining logs preserves exactness; computing decimals loses it.", "source": "GLM 5.1 ②", "_id": "glm_2_77", "judge_pick": false}, {"question": "A simple conceptual exercise: If $$y = 7 - |3x - 6|$$, state the coordinates of the maximum point and the two $$x$$-intercepts. (2 steps)", "answer": "- Step 1: Maximum: set $$3x - 6 = 0 \\Rightarrow x = 2$$. At this point, $$y = 7 - 0 = 7$$. Maximum at $$(2, 7)$$.\n- Step 2: $$x$$-intercepts: set $$y = 0$$, so $$|3x - 6| = 7$$. Either $$3x - 6 = 7 \\Rightarrow x = 13/3$$, or $$3x - 6 = -7 \\Rightarrow x = -1/3$$. Intercepts at $$(-1/3, 0)$$ and $$(13/3, 0)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_78", "judge_pick": false}, {"question": "What is the key exam technique Mr. Fuat calls \"act with respect to the answer,\" and in which two question types does it appear? (2 steps)", "answer": "- Step 1: \"Act with respect to the answer\" means looking at the target form you're trying to reach, and working backwards to figure out what algebraic steps will produce it. Instead of blindly expanding and hoping, you reverse-engineer the path.\n- Step 2: It appears in: (a) Iteration rearrangements — if the target form has a cube root, you need $$x^3$$ on one side before cube-rooting. (b) Trig identity proofs — if the target has $$\\sin 2\\theta$$ and $$\\cos 2\\theta$$, you choose the double-angle identities that produce those terms (not ones that introduce unwanted terms like $$\\sin^2\\theta$$).", "source": "GLM 5.1 ②", "_id": "glm_2_79", "judge_pick": false}, {"question": "Why is the R-formula described as writing an expression in \"compact form,\" and what would happen without it when solving mixed-trig equations? (2 steps)", "answer": "- Step 1: The R-formula compresses $$a\\sin x + b\\cos x$$ into a single trig function $$R\\sin(x \\pm \\alpha)$$. This is \"compact\" because instead of two oscillating functions with different amplitudes, you have one oscillating function with a phase shift — much simpler to analyse.\n- Step 2: Without it, an equation like $$3\\sin 2x - 4\\cos 2x = 2$$ has two unknowns ($$\\sin 2x$$ and $$\\cos 2x$$) and only one equation. You can't isolate either variable because they're linked by $$\\sin^2 + \\cos^2 = 1$$, but substituting that creates a quartic. The R-formula bypasses all of this by converting to $$5\\sin(2x - \\alpha) = 2$$, which is directly solvable with inverse sine.", "source": "GLM 5.1 ②", "_id": "glm_2_80", "judge_pick": false}, {"question": "When finding $$x$$-intercepts of $$y = a - |2x - b|$$, a student writes $$2x - b = a$$ and $$2x - b = -a$$. Is this correct? Explain the logic. (2 steps)", "answer": "- Step 1: Yes, this is correct. Setting $$y = 0$$: $$a - |2x - b| = 0$$, so $$|2x - b| = a$$. By definition of modulus, if $$|X| = a$$ (where $$a > 0$$), then $$X = a$$ or $$X = -a$$. So $$2x - b = a$$ or $$2x - b = -a$$.\n- Step 2: Solving: $$x = \\frac{a+b}{2}$$ or $$x = \\frac{b-a}{2}$$. Since $$a > b > 0$$, the first is positive and the second is negative. The logic is the standard modulus-solving approach: strip the modulus by considering both positive and negative cases.", "source": "GLM 5.1 ②", "_id": "glm_2_81", "judge_pick": false}, {"question": "A simple exercise: If $$\\log_{10} y = 0.5\\log_{10} x + 3$$, what type of model is this (power or exponential), and what are the original constants? (2 steps)", "answer": "- Step 1: Since the equation relates $$\\log y$$ to $$\\log x$$ (not $$x$$ directly), this is a power model: $$y = kx^n$$.\n- Step 2: Comparing with $$\\log y = n\\log x + \\log k$$: gradient = 0.5, so $$n = 0.5$$. Intercept = 3, so $$\\log_{10} k = 3$$, giving $$k = 10^3 = 1000$$. The model is $$y = 1000x^{0.5} = 1000\\sqrt{x}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_82", "judge_pick": false}, {"question": "A simple exercise: If $$\\log_{10} y = 0.3x + 2$$, what type of model is this, and what are the original constants? (2 steps)", "answer": "- Step 1: Since the equation relates $$\\log y$$ to $$x$$ (not $$\\log x$$), this is an exponential model: $$y = ka^x$$.\n- Step 2: Comparing with $$\\log y = (\\log a)x + \\log k$$: gradient = $$\\log a = 0.3$$, so $$a = 10^{0.3} \\approx 2.00$$. Intercept = $$\\log k = 2$$, so $$k = 10^2 = 100$$. The model is $$y = 100 \\times 10^{0.3x}$$ or equivalently $$y = 100 \\times (10^{0.3})^x \\approx 100 \\times 2^x$$.", "source": "GLM 5.1 ②", "_id": "glm_2_83", "judge_pick": false}], "count": 84}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "What problem does the R-formula solve, and why is it essential for certain trigonometric equations? (2 steps)", "answer": "- Step 1: An equation like $$3\\sin 2x - 4\\cos 2x = 2$$ cannot be solved directly because $$\\sin$$ and $$\\cos$$ are entangled — you cannot isolate $$x$$. The R-formula rewrites $$a\\sin x + b\\cos x$$ as a single sinusoid $$R\\sin(x \\pm \\alpha)$$, collapsing two terms into one.\n- Step 2: Once in the form $$R\\sin(2x - \\alpha) = 2$$, you divide by $$R$$ and take $$\\arcsin$$, which is a standard solve. Without this \"compact form,\" the equation is algebraically intractable — there is no other way to extract $$x$$.\n\nThis is why Mr Fuat says: \"You must write in compact form.\"", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "Given $$a\\sin x + b\\cos x = R\\sin(x + \\alpha)$$, derive expressions for $$R$$ and $$\\tan\\alpha$$ by expanding the right side and comparing coefficients. (3 steps)", "answer": "- Step 1: Expand using the addition formula: $$R\\sin(x+\\alpha) = R\\sin x\\cos\\alpha + R\\cos x\\sin\\alpha$$.\n- Step 2: Compare coefficients of $$\\sin x$$ and $$\\cos x$$:\n+ Coefficient of $$\\sin x$$: $$R\\cos\\alpha = a$$\n+ Coefficient of $$\\cos x$$: $$R\\sin\\alpha = b$$\n- Step 3: Square and add: $$R^2\\cos^2\\alpha + R^2\\sin^2\\alpha = a^2 + b^2$$, so $$R^2 = a^2 + b^2 \\Rightarrow R = \\sqrt{a^2+b^2}$$. Divide: $$\\frac{R\\sin\\alpha}{R\\cos\\alpha} = \\frac{b}{a} \\Rightarrow \\tan\\alpha = \\frac{b}{a}$$.\n\nThe key insight: $$R$$ comes from Pythagoras, $$\\alpha$$ comes from a ratio.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "What are the four R-formula variants, and how does the sign in front of $$b\\cos x$$ determine whether you use $$+\\alpha$$ or $$-\\alpha$$? (2 steps)", "answer": "- Step 1: The sign between the $$\\sin$$ and $$\\cos$$ terms in the target form mirrors the sign between them in the original:\n+ $$a\\sin x + b\\cos x = R\\sin(x+\\alpha)$$ — both positive → $$+\\alpha$$\n+ $$a\\sin x - b\\cos x = R\\sin(x-\\alpha)$$ — minus → $$-\\alpha$$\n+ $$a\\cos x + b\\sin x = R\\cos(x-\\alpha)$$ — both positive → $$-\\alpha$$\n+ $$a\\cos x - b\\sin x = R\\cos(x+\\alpha)$$ — minus → $$+\\alpha$$\n- Step 2: In all four cases, $$R = \\sqrt{a^2+b^2}$$ and $$\\tan\\alpha = \\frac{b}{a}$$ with $$0 < \\alpha < \\frac{\\pi}{2}$$. The $$b$$ is always the absolute value of the coefficient of the *other* trig function (the one that isn't leading).\n\nMnemonic: \"Plus in the original → plus in the argument (for sin-leading); minus → minus.\" For cos-leading it flips.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "If $$f(x) = R\\sin(2x + \\alpha) + c$$, what are the maximum and minimum values of $$f$$, and at what values of the argument do they occur? (2 steps)", "answer": "- Step 1: Since $$-1 \\leq \\sin(\\text{anything}) \\leq 1$$, the sinusoid $$R\\sin(2x+\\alpha)$$ ranges from $$-R$$ to $$+R$$.\n+ Maximum: $$R + c$$, when $$\\sin(2x+\\alpha) = 1$$, i.e. $$2x + \\alpha = \\frac{\\pi}{2} + 2n\\pi$$\n+ Minimum: $$-R + c$$, when $$\\sin(2x+\\alpha) = -1$$, i.e. $$2x + \\alpha = \\frac{3\\pi}{2} + 2n\\pi$$\n- Step 2: To find specific $$x$$-values, solve $$2x = \\frac{\\pi}{2} - \\alpha + 2n\\pi$$ for the max. The constant $$c$$ shifts the entire range up or down but does not affect where the max/min occur.\n\nThe max is NOT just $$R$$ — it's $$R + c$$. The vertical shift matters.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "A function $$f(x) = 2\\sqrt{5}\\sin(2x + 0.464) - 1$$ has maximum value $$2\\sqrt{5} - 1$$. Find the *second smallest positive* $$x$$ at which this maximum occurs. What principle do you use? (3 steps)", "answer": "- Step 1: The max occurs when $$\\sin(2x + 0.464) = 1$$, so $$2x + 0.464 = \\frac{\\pi}{2} + 2n\\pi$$ for $$n = 0, 1, 2, \\ldots$$\n- Step 2: Solve for $$x$$: $$x = \\frac{\\pi/2 - 0.464 + 2n\\pi}{2}$$.\n+ $$n=0$$: smallest positive $$x$$\n+ $$n=1$$: **second smallest** positive $$x$$ — this is the one asked for\n- Step 3: The key principle is that sine hits 1 not just once, but periodically every $$2\\pi$$ in its argument. Each increment of $$n$$ by 1 gives the next occurrence.\n\nPitfall: Stopping at $$n=0$$ and missing the \"second smallest\" the question asks for.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "You see $$8\\sin x\\cos x$$ in an expression and need to rewrite it using a double-angle identity. What do you do, and what is the common mistake? (2 steps)", "answer": "- Step 1: Recognise that $$2\\sin x\\cos x = \\sin 2x$$, so $$8\\sin x\\cos x = 4 \\cdot (2\\sin x\\cos x) = 4\\sin 2x$$.\n- Step 2: The common mistake is not seeing the factor of 2 embedded in the identity. You must mentally extract \"2 sin x cos x\" as a unit, then multiply the remaining factor (here 4) outside.\n\nThe identity is $$\\sin 2A = 2\\sin A\\cos A$$, so always look for a *pair* $$\\sin A\\cos A$$ with a coefficient that is a multiple of 2.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "When you see $$\\cos^2 x$$ in an expression and need to introduce $$\\cos 2x$$, which of the three forms of the double-angle identity should you use, and why? (2 steps)", "answer": "- Step 1: The three forms of $$\\cos 2A$$ are:\n+ $$\\cos 2A = \\cos^2 A - \\sin^2 A$$\n+ $$\\cos 2A = 2\\cos^2 A - 1$$\n+ $$\\cos 2A = 1 - 2\\sin^2 A$$\n- Step 2: If you have $$\\cos^2 x$$ and want $$\\cos 2x$$, rearrange the second form: $$\\cos^2 x = \\frac{1}{2}(1 + \\cos 2x)$$. This is the one that works because it expresses $$\\cos^2 x$$ directly in terms of $$\\cos 2x$$. The first form ($$\\cos^2 A - \\sin^2 A$$) introduces both $$\\cos^2$$ and $$\\sin^2$$, which doesn't help when you only have $$\\cos^2 x$$.\n\nPhuc's mistake: trying $$\\cos 2x = \\cos^2 x - \\sin^2 x$$, which doesn't eliminate $$\\sin^2 x$$.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "What is the double-angle identity pattern behind $$(\\cos\\theta + \\sin\\theta)(\\cos\\theta - \\sin\\theta)$$, and why is it useful? (2 steps)", "answer": "- Step 1: This is a difference of squares: $$(\\cos\\theta + \\sin\\theta)(\\cos\\theta - \\sin\\theta) = \\cos^2\\theta - \\sin^2\\theta = \\cos 2\\theta$$.\n- Step 2: This pattern is powerful because it converts a product of two linear-in-trig factors into a single double-angle term. Whenever you see $$(\\cos\\theta \\pm \\sin\\theta)$$ paired with $$(\\cos\\theta \\mp \\sin\\theta)$$, immediately recognise it as $$\\cos 2\\theta$$.\n\nThis was the key move in Q9 Part (a): multiplying both sides by $$(\\cos\\theta + \\sin\\theta)$$ created this difference-of-squares on the RHS.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": true}, {"question": "What does \"act with respect to the answer\" mean as an exam strategy, and how did it apply to the trig identity proof where the target was $$3\\sin 2\\theta - 4\\cos 2\\theta = 2$$? (2 steps)", "answer": "- Step 1: \"Act with respect to the answer\" means: look at the target form first, identify what structures it contains (here, everything is in terms of $$2\\theta$$), then choose manipulations that move toward that form rather than expanding in unhelpful directions.\n- Step 2: In this proof, the target has $$\\sin 2\\theta$$ and $$\\cos 2\\theta$$, so:\n+ Convert $$\\sin\\theta\\cos\\theta \\to \\frac{1}{2}\\sin 2\\theta$$ (double-angle)\n+ Convert $$(\\cos\\theta - \\sin\\theta)(\\cos\\theta + \\sin\\theta) \\to \\cos 2\\theta$$ (difference of squares)\n+ Use $$\\sec 2\\theta \\cdot \\cos 2\\theta = 1$$ to simplify\nEach step was chosen because it produces $$2\\theta$$ terms, matching the target.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "Why is the factor of $$\\frac{1}{2}$$ in $$\\sin A\\cos A = \\frac{1}{2}\\sin 2A$$ so commonly forgotten, and what goes wrong if you omit it? (2 steps)", "answer": "- Step 1: The identity $$\\sin 2A = 2\\sin A\\cos A$$ is the primary form. Rearranging gives $$\\sin A\\cos A = \\frac{1}{2}\\sin 2A$$. The $$\\frac{1}{2}$$ is easy to miss because you're focused on the \"nice\" double-angle part.\n- Step 2: If you write $$3\\sin\\theta\\cos\\theta = 3\\sin 2\\theta$$ (missing the half), your entire proof collapses — you'll get $$3\\sin 2\\theta$$ instead of $$\\frac{3}{2}\\sin 2\\theta$$, and the final equation won't match the target. Always verify: does my substitution preserve the coefficient?", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "Given a power model $$y = kx^n$$, walk through the steps to linearise it for a log-log plot. What becomes the gradient and what becomes the intercept? (3 steps)", "answer": "- Step 1: Take $$\\log$$ of both sides: $$\\log y = \\log(kx^n) = \\log k + \\log(x^n) = \\log k + n\\log x$$.\n- Step 2: This is the equation of a straight line: $$Y = nX + \\log k$$, where $$Y = \\log y$$ and $$X = \\log x$$.\n- Step 3: On a plot of $$\\log y$$ vs $$\\log x$$:\n+ Gradient $$= n$$ (the power)\n+ $$Y$$-intercept $$= \\log k$$ (the coefficient)\n\nThe power model becomes linear when you plot both axes on log scales.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "Given an exponential model $$y = ka^x$$, walk through the steps to linearise it. What is plotted on each axis, and what are the gradient and intercept? (3 steps)", "answer": "- Step 1: Take $$\\log$$ of both sides: $$\\log y = \\log(ka^x) = \\log k + x\\log a$$.\n- Step 2: This gives $$Y = (\\log a) \\cdot x + \\log k$$, where $$Y = \\log y$$ but the horizontal axis is just $$x$$ (not $$\\log x$$).\n- Step 3: On a plot of $$\\log y$$ vs $$x$$:\n+ Gradient $$= \\log a$$ (the log of the base)\n+ $$Y$$-intercept $$= \\log k$$\n\nKey difference from the power model: only the $$y$$-axis is logged, not the $$x$$-axis.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "Given the straight-line relation $$\\log_3 N = 2t + 4$$, recover the model in the form $$N = ab^t$$. Why must you use base 3 when exponentiating? (3 steps)", "answer": "- Step 1: Raise 3 to both sides (because the logarithm is base 3 — the inverse operation must use the same base): $$3^{\\log_3 N} = 3^{2t+4}$$, giving $$N = 3^{2t+4}$$.\n- Step 2: Split the exponent: $$N = 3^4 \\cdot 3^{2t} = 81 \\cdot (3^2)^t = 81 \\cdot 9^t$$.\n- Step 3: Match to $$N = ab^t$$: $$a = 81$$, $$b = 9$$.\n\nPitfall: Using base 10 instead of base 3, or forgetting to split $$3^{2t} = (3^2)^t = 9^t$$ to match the $$b^t$$ form.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "Given $$\\log_{10} D = 1.04 + 0.38T$$, convert to the form $$D = ab^T$$. What is the key algebraic move to extract $$b$$? (3 steps)", "answer": "- Step 1: Raise 10 to both sides: $$D = 10^{1.04 + 0.38T} = 10^{1.04} \\cdot 10^{0.38T}$$.\n- Step 2: The crucial move: $$10^{0.38T} = (10^{0.38})^T$$. The exponent $$0.38T$$ is a product, and $$(a^c)^T = a^{cT}$$, so you can rewrite it as a constant raised to the power $$T$$.\n- Step 3: So $$D = 10^{1.04} \\cdot (10^{0.38})^T$$, giving $$a = 10^{1.04} \\approx 10.96$$ and $$b = 10^{0.38} \\approx 2.399$$.\n\nWithout splitting $$10^{0.38T}$$ into $$(10^{0.38})^T$$, you cannot identify $$b$$.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "To find $$T$$ when $$D = 45000$$ in the model $$\\log_{10} D = 1.04 + 0.38T$$, should you use the log form or the exponential form? Why? (2 steps)", "answer": "- Step 1: Use the **log form** — it's faster and avoids rounding errors. Substitute directly: $$\\log_{10}(45000) = 1.04 + 0.38T$$, then solve: $$T = \\frac{\\log_{10}(45000) - 1.04}{0.38}$$.\n- Step 2: If you used the exponential form $$D = 10.96 \\times 2.399^T$$, you'd need to take logs anyway to extract $$T$$, and you'd be using already-rounded values of $$a$$ and $$b$$, introducing unnecessary error.\n\nPrinciple: when the unknown is in the exponent, take logs. But if the equation is already in log form, just substitute and solve linearly.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": true}, {"question": "What is the decision rule for whether to use polynomial division or partial fractions on an algebraic fraction, and why? (2 steps)", "answer": "- Step 1: Compare the degree of the numerator and the degree of the denominator:\n+ If $$\\deg(\\text{num}) \\geq \\deg(\\text{den})$$: do **polynomial division first**, then partial fractions on the remainder (if needed).\n+ If $$\\deg(\\text{num}) < \\deg(\\text{den})$$: do **partial fractions directly**.\n- Step 2: The reason: partial fractions require the numerator to be of lower degree than the denominator. If the numerator is too \"tall,\" the partial fraction decomposition doesn't work cleanly — you must first divide to produce a proper fraction plus a polynomial.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "After polynomial division gives $$g(x) = 2x - 1 + \\frac{6}{x-2}$$, you integrate from 4 to 8. Walk through the key steps, emphasising the log combination. (3 steps)", "answer": "- Step 1: Integrate term by term: $$\\int(2x-1)\\,dx = x^2 - x$$ and $$\\int\\frac{6}{x-2}\\,dx = 6\\ln|x-2|$$.\n- Step 2: Evaluate at the bounds: $$(64 - 8 + 6\\ln 6) - (16 - 4 + 6\\ln 2) = 44 + 6\\ln 6 - 6\\ln 2$$.\n- Step 3: Combine the logs using $$\\ln A - \\ln B = \\ln\\frac{A}{B}$$: $$6\\ln 6 - 6\\ln 2 = 6\\ln\\frac{6}{2} = 6\\ln 3$$. Final answer: $$44 + 6\\ln 3$$.\n\nAlways combine logs before reading off the coefficient — the question expects $$\\beta\\ln 3$$, not separate log terms.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": true}, {"question": "State the integral $$\\int\\frac{1}{ax+b}\\,dx$$ and explain why the $$\\frac{1}{a}$$ factor appears. What happens if you forget it? (3 steps)", "answer": "- Step 1: $$\\int\\frac{1}{ax+b}\\,dx = \\frac{1}{a}\\ln|ax+b| + C$$.\n- Step 2: The $$\\frac{1}{a}$$ comes from the chain rule in reverse. Differentiate $$\\ln|ax+b|$$: you get $$\\frac{a}{ax+b}$$, which is $$a$$ times too large. So you must divide by $$a$$ to compensate.\n- Step 3: If you forget the $$\\frac{1}{a}$$, your answer is off by a factor of $$a$$. In a \"show that\" question where the answer must be $$\\lambda\\ln 10$$, forgetting $$\\frac{1}{a}$$ gives the wrong $$\\lambda$$. This was Phuc's #1 integration mistake.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "Evaluate $$\\int_1^3 \\\\frac{16}{9(3x - 7/3)}\\,dx$$ conceptually — walk through the structure without doing heavy arithmetic. (3 steps)", "answer": "- Step 1: Identify $$a = 3$$ in the template $$\\int\\frac{1}{ax+b}\\,dx = \\frac{1}{a}\\ln|ax+b|$$. Pull out the constant $$\\frac{16}{9}$$: $$ I = \\frac{16}{9} \\cdot \\frac{1}{3}[\\ln|3x - 7/3|]_1^3$$.\n- Step 2: Evaluate the bounds: at $$x=3$$, $$3x - 7/3 = 20/3$$; at $$x=1$$, $$3 - 7/3 = 2/3$$. So the log becomes $$\\ln\\frac{20/3}{2/3} = \\ln 10$$.\n- Step 3: The fractions cancel beautifully: $$\\frac{16}{9} \\cdot \\frac{1}{3}cdot \\ln 10 = \\frac{16}{27}\\ln 10$$. So $$\\lambda = \\frac{16}{27}$$ The $$\\frac{1}{a} = \\frac{1}{3}$$ is essential — withoutthe answer would be $$\\frac{16}{9}\\ln 10$$ (wrong) without it.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": true}], "count": 19}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "(3 steps) Why does the vertex of y = 2|x-5| + 10 occur at (5,10)? How do horizontal and vertical transformations affect the graph?", "answer": "- Step 1: Start with y = |x|. The vertex is at (0,0).  \n- Step 2: Apply horizontal shift right 5: y = |x-5| moves vertex to (5,0).  \n- Step 3: Apply vertical stretch ×2 (vertex remains at (5,0)), then shift up 10: vertex becomes (5,10). The modulus vertex occurs where the inside expression equals zero: x-5=0 ⇒ x=5.  \n+ Horizontal transformations affect x-coordinates opposite to intuition (right by 5).  \n+ Vertical transformations affect y-values directly (stretch then shift).", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "(3 steps) Why does ∫(2x²-5x+8)/(x-2) dx from 4 to 8 require polynomial division first?", "answer": "- Step 1: Check degree of numerator (2) ≥ denominator (1) ⇒ polynomial division required.  \n- Step 2: Perform division: (2x²-5x+8) ÷ (x-2) = 2x-1 + 6/(x-2).  \n- Step 3: Integrate term-by-term: ∫(2x-1) dx + ∫6/(x-2) dx = [x² - x + 6ln|x-2|] from 4 to 8.  \n+ Final answer combines logarithmic terms using ln A - ln B = ln(A/B).  \n+ ∫1/(ax+b) dx = (1/a)ln|ax+b| + C is crucial for the last term.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "(3 steps) How do you convert log₁₀y = -3log₁₀x + 6 to a power model y = axᵇ?", "answer": "- Step 1: Recognize this is a log-log linearization.  \n- Step 2: Exponentiate both sides: 10^(log₁₀y) = 10^(6 - 3log₁₀x).  \n- Step 3: Simplify using exponent rules: y = 10⁶ × (10^log₁₀x)^-3 ⇒ y = 10⁶x⁻³.  \n+ Gradient on log-log graph corresponds to exponent (-3).  \n+ Y-intercept (6) becomes coefficient's log: 10⁶.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Why does f(x) = 8sinxcosx + 4cos²x -3 become f(x) = 4sin2x + 2cos2x -1?", "answer": "- Step 1: Use double-angle identity 2sinxcosx = sin2x ⇒ 8sinxcosx = 4sin2x.  \n- Step 2: Use identity cos2x = 2cos²x -1 ⇒ 2cos²x = cos2x +1.  \n- Step 3: Substitute: 4cos²x -3 = 2(cos2x +1) -3 = 2cos2x -1.  \n+ Combine all terms: 4sin2x + 2cos2x -1.  \n+ Why this works: Both identities reduce 2nd-degree terms to first-angle functions.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "(3 steps) How does 4sin2x + 2cos2x = Rsin(2x+α) lead to R = 2√5 and α ≈ 0.464 rad?", "answer": "- Step 1: Expand RHS: Rsin2xcosα + Rcos2xsinα.  \n- Step 2: Match coefficients: Rcosα = 4, Rsinα = 2 ⇒ tanα = 2/4 = 0.5 ⇒ α ≈ 0.464 rad.  \n- Step 3: Find R: R² = 4² + 2² = 20 ⇒ R = √20 = 2√5.  \n+ R represents the amplitude of the combined sine wave.  \n+ α is the phase shift from the original function.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Why does the iteration xₙ₊₁ = ∛[(5xₙ²-4xₙ+7)/xₙ] converge to α ≈ 2.1472?", "answer": "- Step 1: Rearranged from x⁴ = 5x²-4x+7 divided by x ⇒ x³ = (5x²-4x+7)/x.  \n- Step 2: Use ANS button for accurate iterations: x₁=2 ⇒ x₂=∛[(5·4-8+7)/2] ≈ 2.1544.  \n- Step 3: Continue until stabilization: x₃ ≈ 2.1459, x₄ ≈ 2.1474... converges to 2.1472.  \n+ Convergence requires |g’(α)| < 1.  \n+ Manual entry introduces rounding errors.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": true}, {"question": "How does ∫₁³ 16/[9(3x-7/3)] dx = (16/27)ln10?", "answer": "- Step 1: Factor constants: (16/9)∫1/(3x-7/3) dx.  \n- Step 2: Use ∫1/(ax+b) dx = (1/a)ln|ax+b| ⇒ (16/9)(1/3)[ln|3x-7/3|]₁³.  \n- Step 3: Calculate bounds: (16/27)[ln(20/3) - ln(2/3)] = (16/27)ln(10).  \n+ Critical to apply 1/a factor (1/3 here).  \n+ Combine logs before final simplification.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Why does y = a - |2x-b| have x-intercepts at x = (a+b)/2 and x = (b-a)/2?", "answer": "- Step 1: Set y=0 ⇒ |2x-b| = a.  \n- Step 2: Solve 2x-b = ±a ⇒ x = (b+a)/2 and x = (b-a)/2.  \n- Step 3: Verify both solutions exist since a > b ⇒ (b-a)/2 is negative.  \n+ The graph is an inverted V-shape with vertex at (b/2, a).  \n+ Positive intercept is at (a+b)/2 since a > 0.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "(3 steps) How do you solve 3sin2θ - 4cos2θ = 2 using R-formula?", "answer": "- Step 1: Express as Rsin(2θ-α) = 2 where R = √(3²+4²) = 5 and α = arctan(4/3).  \n- Step 2: Solve sin(2θ-α) = 2/5 ⇒ 2θ-α = arcsin(0.4) or π - arcsin(0.4).  \n- Step 3: Find θ in required range by adjusting for α and periodicity.  \n+ Why this works: Converts unsolvable combination into single sine function.  \n+ Critical to consider all solution branches within the interval.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "Why does tan(2θ-45°) = tan105° give θ = 75° and 165°?", "answer": "- Step 1: General solution for tanA = tanB: A = B + 180°n.  \n- Step 2: 2θ-45° = 105° + 180°n ⇒ 2θ = 150° + 180°n ⇒ θ = 75° + 90°n.  \n- Step 3: For 0 ≤ θ < 180°, n=0 ⇒ 75°, n=1 ⇒ 165°.  \n+ Why tan repeats every 180°: Periodicity of tangent function.  \n+ Check all solutions within domain.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": true}, {"question": "How do you solve 3e^(2t) = 45000?", "answer": "- Step 1: Divide by 3 ⇒ e^(2t) = 15000.  \n- Step 2: Take ln both sides ⇒ 2t = ln15000.  \n- Step 3: Solve t = (ln15000)/2 ≈ 4.91.  \n+ Key principle: ln(a^b) = b·lna.  \n+ Exponential models always require logarithms to solve for exponents.", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "Why does e^(-Bt) in T = 10 + 8e^(-Bt) prevent T from reaching 5°C?", "answer": "- Step 1: As t→∞, e^(-Bt)→0 ⇒ T→10°C asymptote.  \n- Step 2: Since e^(-Bt) > 0 always ⇒ T(t) = 10 + positive number > 10.  \n- Step 3: Therefore T(t) can never be ≤10°C.  \n+ This models Newton's Law of Cooling.  \n+ The ambient temperature (10°C) is the lower bound.", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "How does f(x) = 2e^(3sinx)cosx have derivative f’(x) = 2e^(3sinx)(3cos²x - sinx)?", "answer": "- Step 1: Apply product rule: u=2e^(3sinx), v=cosx.  \n- Step 2: u’=6cosxe^(3sinx), v’=-sinx.  \n- Step 3: Combine: f’(x) = 6cos²xe^(3sinx) - 2e^(3sinx)sinx = 2e^(3sinx)(3cos²x - sinx).  \n+ Factor out e^(3sinx) which is always positive.  \n+ Critical for finding turning points.", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "Why does ∫(2x)/(3x-5) dx require substitution?", "answer": "- Step 1: Recognize form ∫(ax)/(bx+c) dx requires simplification.  \n- Step 2: Use polynomial division: 2x/(3x-5) = 2/3 + (10/3)/(3x-5).  \n- Step 3: Integrate term-by-term: (2/3)x + (10/9)ln|3x-5| + C.  \n+ Why divide? ∫[a/(bx+c)] dx requires 1/b factor.  \n+ This is a special case of ∫(ax+b)/(cx+d) dx.", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "(3 steps) How do you find inverse of g(x) = 3 + 2lnx?", "answer": "- Step 1: Let y = 3 + 2lnx ⇒ y-3 = 2lnx.  \n- Step 2: Divide by 2: (y-3)/2 = lnx.  \n- Step 3: Exponentiate: x = e^[(y-3)/2] ⇒ swap x and y: g⁻¹(x) = e^[(x-3)/2].  \n+ Domain of g⁻¹: range of g (which is [3,∞)).  \n+ Inverse functions reverse operations in opposite order.", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}, {"question": "Why does |x+1| = a - |2x-b| at x=-3 and x=5 lead to a=12, b=4?", "answer": "- Step 1: At x=5, both functions on positive branches ⇒ 6 = a - (10-b) ⇒ a+b=16.  \n- Step 2: At x=-3, left branch for |x+1| and ascending branch for |2x-b| ⇒ 2 = a - (b+6) ⇒ a-b=8.  \n- Step 3: Solve system: a+b=16 and a-b=8 ⇒ a=12, b=4.  \n+ Critical to check correct modulus branch at each intersection point.  \n+ Graphical verification ensures correct sign selection.", "source": "Qwen 3 ①", "_id": "qwen_1_15", "judge_pick": false}, {"question": "How does 3sinθcosθ simplify to (3/2)sin2θ?", "answer": "- Step 1: Recognize double-angle identity sin2θ = 2sinθcosθ.  \n- Step 2: Solve for sinθcosθ = (1/2)sin2θ.  \n- Step 3: Multiply by 3 ⇒ 3sinθcosθ = (3/2)sin2θ.  \n+ This identity is crucial in simplifying trigonometric expressions.  \n+ Common mistake: Forgetting the 1/2 factor.", "source": "Qwen 3 ①", "_id": "qwen_1_16", "judge_pick": false}, {"question": "Why does ∫1/(ax+b) dx = (1/a)ln|ax+b| + C?", "answer": "- Step 1: Let u = ax + b ⇒ du = a dx ⇒ dx = du/a.  \n- Step 2: Substitute: ∫1/u × du/a = (1/a)∫1/u du.  \n- Step 3: Integrate: (1/a)ln|u| + C = (1/a)ln|ax+b| + C.  \n+ This accounts for the chain rule in differentiation.  \n+ Forgotten factor leads to incorrect integrals like Q7 and Q2.", "source": "Qwen 3 ①", "_id": "qwen_1_17", "judge_pick": false}], "count": 18}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Why is the R-formula useful in solving equations like $ a \\sin x + b \\cos x = c $, and how does it work conceptually? (4 steps)", "answer": "- Step 1: **Combine terms** into a single trigonometric function. The R-formula rewrites $ a \\sin x + b \\cos x $ as $ R \\sin(x + \\alpha) $, where $ R = \\sqrt{a^2 + b^2} $ and $ \\alpha = \\tan^{-1}(b/a) $. This simplifies solving for $ x $ because a single sine function has a known range and periodicity.  \n- Step 2: **Geometric intuition**. Imagine a right triangle with legs $ a $ and $ b $. The hypotenuse $ R $ represents the amplitude, and $ \\alpha $ is the angle between $ a $ and $ R $. This triangle visualizes the phase shift in the sine wave.  \n- Step 3: **Solve the equation**. After substitution, $ R \\sin(x + \\alpha) = c $ becomes solvable via inverse sine: $ x + \\alpha = \\sin^{-1}(c/R) + 2\\pi n $ or $ \\pi - \\sin^{-1}(c/R) + 2\\pi n $.  \n- Step 4: **Check feasibility**. Since $ |c| \\leq R $ for real solutions, the R-formula also reveals when the equation has no solution (e.g., $ |c| > R $).  \n\n**Misconception Probe**: Why not solve $ a \\sin x + b \\cos x = c $ algebraically without R-formula?  \n+ Answer: The presence of both $ \\sin x $ and $ \\cos x $ complicates direct manipulation. The R-formula unifies them, leveraging trigonometric identities to simplify the problem.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "How do you determine the number of real solutions to $ a \\sin x + b \\cos x = c $ using the R-formula? (3 steps)", "answer": "- Step 1: Compute $ R = \\sqrt{a^2 + b^2} $.  \n- Step 2: Analyze $ |c| \\leq R $. If $ |c| > R $, there are **no real solutions** because the amplitude of the sine wave cannot exceed $ R $.  \n- Step 3: If $ |c| \\leq R $, the equation has **infinitely many solutions** due to the periodicity of sine. The number of solutions in a specific interval depends on the interval’s length.  \n\n**Edge Case**: What if $ c = R $?  \n+ Answer: There’s **one solution per period** at the maximum of the sine wave (e.g., $ x + \\alpha = \\pi/2 + 2\\pi n $).", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": true}, {"question": "Why does the integral $ \\int \\frac{1}{ax + b} dx $ require the factor $ \\frac{1}{a} $ in its result $ \\frac{1}{a} \\ln|ax + b| + C $? (3 steps)", "answer": "- Step 1: **Substitution**. Let $ u = ax + b $, so $ du = a dx $ → $ dx = \\frac{du}{a} $.  \n- Step 2: Substitute into the integral: $ \\int \\frac{1}{u} \\cdot \\frac{du}{a} = \\frac{1}{a} \\int \\frac{1}{u} du $.  \n- Step 3: Integrate: $ \\frac{1}{a} \\ln|u| + C = \\frac{1}{a} \\ln|ax + b| + C $. The $ \\frac{1}{a} $ factor arises from the chain rule “undoing” the derivative of $ ax + b $.  \n\n**Contrast**: What if the integral were $ \\int \\frac{1}{x} dx $?  \n+ Answer: No factor needed because $ a = 1 $, so $ \\int \\frac{1}{x} dx = \\ln|x| + C $.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "How do you systematically solve a modulus inequality like $ |2x - 5| > 6x $? (4 steps)", "answer": "- Step 1: **Identify critical point** by solving $ 2x - 5 = 0 $: $ x = \\frac{5}{2} $. This divides the number line into regions where $ 2x - 5 $ is non-negative or negative.  \n- Step 2: **Case 1 (x ≥ 5/2)**: Remove modulus as $ 2x - 5 > 6x $. Solve: $ -5 > 4x $ → $ x < 0 $. However, this contradicts $ x ≥ 5/2 $, so **no solution** in this case.  \n- Step 3: **Case 2 (x < 5/2)**: Remove modulus as $ -(2x - 5) > 6x $. Solve: $ 5 - 2x > 6x $ → $ 5 > 8x $ → $ x < \\frac{5}{8} $. This interval overlaps with $ x < 5/2 $, so valid solutions are $ x < \\frac{5}{8} $.  \n- Step 4: **Combine results**: Solution is $ x < \\frac{5}{8} $. Always validate against the original inequality to avoid extraneous solutions.  \n\n**Pitfall Alert**: Why must you check overlap between solution and case region?  \n+ Answer: Because the case definition (e.g., $ x < 5/2 $) restricts the domain. A solution derived within a case must lie within that domain.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": true}, {"question": "Why is the substitution $ u = \\sin x $ or $ u = \\cos x $ often ineffective for integrals like $ \\int e^{3 \\sin x} \\cos x \\, dx $? (2 steps)", "answer": "- Step 1: **Derivative mismatch**. Let $ u = \\sin x $, so $ du = \\cos x dx $. Substitution gives $ \\int e^{3u} du $, which is straightforward. Wait—this actually **does work**!  \n- Step 2: **Context clarification**. The user’s confusion may stem from more complex integrals (e.g., $ \\int e^{3 \\sin x} dx $ without $ \\cos x $), where substitution fails. For $ \\int e^{3 \\sin x} \\cos x dx $, substitution works because $ \\cos x dx $ is the exact derivative of $ \\sin x $.  \n\n**Edge Case**: What if the integral were $ \\int e^{3 \\sin x} dx $?  \n+ Answer: No elementary antiderivative exists. Techniques like series expansion or numerical methods would be required.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "How does the R-formula connect to the double-angle identity $ \\cos 2A = \\cos^2 A - \\sin^2 A $? (3 steps)", "answer": "- Step 1: **R-formula derivation**. Starting with $ a \\sin x + b \\cos x $, assume it equals $ R \\sin(x + \\alpha) $. Expand the right-hand side: $ R \\sin x \\cos \\alpha + R \\cos x \\sin \\alpha $.  \n- Step 2: **Match coefficients**: $ a = R \\cos \\alpha $, $ b = R \\sin \\alpha $. This resembles the double-angle identity structure, where combinations of sine and cosine terms are expressed as a single function.  \n- Step 3: **Generalization**: The double-angle identity is a special case of harmonic addition, where $ \\cos 2A $ combines $ \\cos^2 A $ and $ \\sin^2 A $. Both rely on expressing multiple trigonometric terms as a single term.  \n\n**Contrast**: What distinguishes the R-formula from double-angle identities?  \n+ Answer: The R-formula combines sine and cosine terms with coefficients, while double-angle identities break down functions of $ 2A $ into single-angle terms.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": true}, {"question": "Why does the iteration $ x_{n+1} = \\sqrt[3]{\\frac{5x_n^2 - 4x_n + 7}{x_n}} $ converge to a root of $ x^4 - 5x^2 + 4x - 7 = 0 $? (3 steps)", "answer": "- Step 1: **Fixed-point concept**. The iteration rearranges the original equation into $ x = g(x) $, where $ g(x) = \\sqrt[3]{\\frac{5x^2 - 4x + 7}{x}} $. A fixed point $ x = g(x) $ corresponds to a root of the original equation.  \n- Step 2: **Convergence condition**. If $ |g'(x)| < 1 $ near the root, the iteration converges because small errors diminish iteratively.  \n- Step 3: **Practical verification**. Starting with $ x_1 = 2 $, repeated substitution stabilizes at $ x \\approx 2.1472 $, confirming convergence. This aligns with the Intermediate Value Theorem’s guarantee of a root in [2,3].  \n\n**Edge Case**: What happens if $ x_1 = 0 $?  \n+ Answer: The iteration fails because $ x_n = 0 $ causes division by zero in $ g(x) $. Domain restrictions must be respected.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": true}, {"question": "How do you linearize the logarithmic model $ \\log_{10} D = 1.04 + 0.38T $ to find $ D = ab^T $? (3 steps)", "answer": "- Step 1: **Exponentiate both sides**: Raise 10 to the power of both sides: $ D = 10^{1.04 + 0.38T} $.  \n- Step 2: **Use exponent rules**: Split the exponent: $ D = 10^{1.04} \\cdot (10^{0.38})^T $.  \n- Step 3: **Identify constants**: $ a = 10^{1.04} \\approx 10.96 $, $ b = 10^{0.38} \\approx 2.399 $. Thus, $ D = 10.96 \\cdot 2.399^T $.  \n\n**Misconception Probe**: Why not use $ \\ln $ instead of $ \\log_{10} $?  \n+ Answer: The base of the logarithm must match the base of the exponential model. Since the original equation uses $ \\log_{10} $, exponentiation with 10 is required.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "Why does the modulus function $ y = a - |2x - b| $ have a maximum at $ x = \\frac{b}{2} $? (2 steps)", "answer": "- Step 1: **Vertex of absolute value**: The expression $ |2x - b| $ equals zero when $ 2x - b = 0 $, i.e., $ x = \\frac{b}{2} $. This is the poi
