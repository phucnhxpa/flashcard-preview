+ 1 \\Rightarrow \\alpha^2 - \\alpha - 1 = 0$$. By the quadratic formula, $$\\alpha = (1 + \\sqrt{5})/2 \\approx 1.618$$ — the golden ratio. The iteration converges *to* the golden ratio.", "source": "Opus 4.7 ①", "_id": "opus_1_93", "judge_pick": false}, {"question": "Conceptual: Why might it matter whether you write $$T = \\dfrac{\\ln 2}{\\ln 1.05}$$ or $$T = \\dfrac{\\log 2}{\\log 1.05}$$ in solving $$1.05^T = 2$$? Are they the same?", "answer": "Step 1: They're numerically *identical*. Both ratios evaluate to the same value (since the change-of-base formula preserves ratios: $$\\log_b a = \\dfrac{\\ln a}{\\ln b}$$, so $$\\log a / \\log b = \\ln a / \\ln b$$ for any common base). Step 2: So choice of base doesn't matter for the final number. The *base of log on LHS and RHS must match*, but you're free to pick whichever you prefer. Step 3: Practically: use $$\\ln$$ when the equation involves $$e$$; use $$\\log_{10}$$ when given a problem in base 10 (calculator default). Either gives the same answer.", "source": "Opus 4.7 ①", "_id": "opus_1_94", "judge_pick": true}, {"question": "Conceptual: For $$f(x) = (3x-5)^2$$ in the denominator of a derivative, why is $$(3x-5)^2 > 0$$ required for \"decreasing\" to follow from $$f'<0$$? (3 steps)", "answer": "- Step 1: A function is *decreasing* on a domain if $$f' < 0$$ for all $$x$$ in the domain. The numerator's sign alone doesn't tell you the sign of the fraction — you need the denominator's sign too.\n- Step 2: $$(3x-5)^2$$ is a square, hence $$\\geq 0$$. It equals 0 only at $$x = 5/3$$. For our domain $$x > 2$$, $$5/3 < 2$$ so $$3x-5 > 1 > 0$$, hence $$(3x-5)^2 > 0$$ strictly.\n- Step 3: With numerator $$-10 < 0$$ (constant) and denominator $$> 0$$, the fraction is negative throughout: $$f'(x) < 0$$ for all $$x > 2$$. Thus $$f$$ is decreasing on $$(2, \\infty)$$. The argument is *quantified over the whole domain*, not just one $$x$$.", "source": "Opus 4.7 ①", "_id": "opus_1_95", "judge_pick": true}, {"question": "Synthesis: How does the \"act with respect to the answer\" strategy save time in algebra/trig problems? Give two concrete instances. (3 steps)", "answer": "- Step 1: Strategy: read the *target form* of the answer first, then plan the manipulation that will reach it. Don't blindly expand or simplify.\n- Step 2: Example A: rearranging $$x^4 - 5x^2 + 4x - 7 = 0$$ to $$x = \\sqrt[3]{\\cdots}$$. The cube root tells you to isolate $$x^3$$. So divide both sides by $$x$$ to get $$x^3 = (5x^2 - 4x + 7)/x$$, then cube-root.\n- Step 3: Example B: showing $$\\dfrac{3\\sin\\theta\\cos\\theta}{\\cos\\theta + \\sin\\theta} = (2 + \\sec 2\\theta)(\\cos\\theta - \\sin\\theta)$$ becomes $$3\\sin 2\\theta - 4\\cos 2\\theta = 2$$. The target uses $$2\\theta$$ everywhere → identify identities that produce $$2\\theta$$: $$\\sin\\theta\\cos\\theta \\to \\tfrac{1}{2}\\sin 2\\theta$$ and $$(\\cos\\theta+\\sin\\theta)(\\cos\\theta-\\sin\\theta) = \\cos 2\\theta$$. Apply both, simplify.\n\nThe principle: target-driven planning beats forward-brute-force.", "source": "Opus 4.7 ①", "_id": "opus_1_96", "judge_pick": false}, {"question": "Numerical exercise: Differentiate $$y = e^{2x}\\cos x$$ using the product rule, in factored form.", "answer": "Step 1: Set $$u = e^{2x}$$, $$v = \\cos x$$. Then $$u' = 2e^{2x}$$ (chain rule), $$v' = -\\sin x$$. Step 2: Product rule: $$y' = 2e^{2x}\\cos x + e^{2x}(-\\sin x) = e^{2x}(2\\cos x - \\sin x)$$. Step 3: Factored form pulls the common $$e^{2x}$$ outside, useful for finding turning points (set inner bracket to zero, since $$e^{2x} > 0$$).", "source": "Opus 4.7 ①", "_id": "opus_1_97", "judge_pick": true}, {"question": "Numerical exercise: Find the vertex and image after transformation: a graph $$y = f(x)$$ has a maximum at $$(2, 5)$$. Find the new maximum location for $$y = -2f(x+1) + 3$$. (4 steps)", "answer": "- Step 1: Inside change: $$x \\to x+1$$ shifts left by 1. So $$x = 2$$ becomes $$x = 2 - 1 = 1$$.\n- Step 2: Outside multiplication by $$-2$$: vertical stretch factor 2 *and* reflection in $$x$$-axis. So $$y = 5$$ becomes $$y = -2 \\cdot 5 = -10$$.\n- Step 3: Outside add 3: vertical shift up 3. So $$y = -10$$ becomes $$y = -7$$.\n- Step 4: The point $$(2, 5)$$ goes to $$(1, -7)$$. Note: a maximum becomes a *minimum* under the reflection (slope sign flips).", "source": "Opus 4.7 ①", "_id": "opus_1_98", "judge_pick": false}, {"question": "Conceptual: Why is \"act with respect to the answer\" a particularly important habit on **show that** questions, where the answer is given to you?", "answer": "Step 1: On a \"show that\" question, you know exactly where you must end up. The whole problem becomes about finding a *path* from the start to the given target. Step 2: Without target-awareness, you might apply identities that simplify but don't move toward the target — wasted effort. With target-awareness, every step is purposeful: \"this identity introduces $$\\cos 2\\theta$$ which appears in the target.\" Step 3: Mark schemes typically award full marks for any valid path; partial marks for partial progress. So if you stall, you can sometimes \"work backwards from the target\" to meet your forward progress in the middle. Always inspect the target *before* starting.", "source": "Opus 4.7 ①", "_id": "opus_1_99", "judge_pick": true}, {"question": "Misconception probe: A student writes $$e^0 = 0$$ when computing $$T(0) = 10 + Ae^{-B \\cdot 0}$$. What's the correct value of $$e^0$$, and why?", "answer": "Step 1: $$e^0 = 1$$, **not** 0. Step 2: This follows from the law $$a^0 = 1$$ for any nonzero base $$a$$ — exponential of zero is always 1. Geometrically, $$e^0$$ is the value of the exponential function $$y = e^x$$ at $$x = 0$$, which is the $$y$$-intercept of the graph (passing through $$(0, 1)$$). Step 3: So $$T(0) = 10 + A \\cdot 1 = 10 + A$$. Confusing $$e^0 = 0$$ would give $$T(0) = 10$$, missing the $$A$$ term entirely — a major error.", "source": "Opus 4.7 ①", "_id": "opus_1_100", "judge_pick": true}, {"question": "Conceptual: What's the difference between an iterative formula that **converges** quickly vs slowly to a root, and how does $$|g'(\\alpha)|$$ control this?", "answer": "Step 1: Near the root $$\\alpha$$, $$g(x) \\approx g(\\alpha) + g'(\\alpha)(x - \\alpha) = \\alpha + g'(\\alpha)(x - \\alpha)$$. The iteration error satisfies $$x_{n+1} - \\alpha \\approx g'(\\alpha)(x_n - \\alpha)$$. Step 2: Each iteration multiplies the error by $$g'(\\alpha)$$. If $$|g'(\\alpha)| = 0.1$$, error shrinks by 10× per step (fast). If $$|g'(\\alpha)| = 0.9$$, error shrinks by only 1.1× per step (slow). If $$|g'(\\alpha)| > 1$$, error grows — diverges. Step 3: So the smaller $$|g'(\\alpha)|$$ (closer to zero), the faster convergence. Newton-Raphson achieves $$g'(\\alpha) = 0$$ at the root, giving *quadratic* convergence — much faster than fixed-point iteration with general $$g$$.", "source": "Opus 4.7 ①", "_id": "opus_1_101", "judge_pick": false}, {"question": "Synthesis: A \"two-modulus\" equation like $$|x+1| = a - |2x-b|$$ at intersections requires picking branches. What systematic procedure ensures you pick the correct branch combination at each intersection? (3 steps)", "answer": "- Step 1: Identify the *vertices* of each modulus: $$|x+1|$$ has vertex at $$x = -1$$; $$|2x-b|$$ has vertex at $$x = b/2$$.\n- Step 2: At the given intersection $$x_0$$: determine which side of each vertex it's on. To the right of vertex → positive linear branch (modulus = original argument). To the left → negative branch (modulus = $$-$$argument).\n- Step 3: Substitute the appropriate linear expression for each modulus, not the modulus itself. For $$y = a - |2x-b|$$, also note: since $$|2x-b|$$ is *subtracted*, the inverted V opens downward. So at $$x_0$$ to the right of $$x = b/2$$: descending right branch. To the left: ascending left branch.\n\nSketching beats algebraic guesswork.", "source": "Opus 4.7 ①", "_id": "opus_1_102", "judge_pick": false}, {"question": "Numerical exercise: Convert $$\\log y = 0.5\\log x + 2$$ (in log base 10) to $$y = kx^n$$ form.", "answer": "Step 1: Match template $$\\log y = n\\log x + \\log k$$: $$n = 0.5$$, $$\\log_{10} k = 2 \\Rightarrow k = 10^2 = 100$$. Step 2: So $$y = 100 \\cdot x^{0.5} = 100\\sqrt x$$. Step 3: This is a power model with non-integer exponent. The square-root behaviour means $$y$$ grows slowly with $$x$$ — typical for square-law diminishing returns.", "source": "Opus 4.7 ①", "_id": "opus_1_103", "judge_pick": false}, {"question": "Conceptual: For a model $$y = ka^x$$ vs $$y = kx^n$$, how do their growth rates differ for large $$x$$, and how is this reflected in the log-log vs semi-log plots?", "answer": "Step 1: $$y = ka^x$$ (exponential, $$a > 1$$): grows *faster* than any polynomial as $$x \\to \\infty$$. The semi-log plot ($$\\log y$$ vs $$x$$) is linear with slope $$\\log a$$. Step 2: $$y = kx^n$$ (power, $$n > 0$$): grows polynomially. The log-log plot ($$\\log y$$ vs $$\\log x$$) is linear with slope $$n$$. Step 3: To distinguish data: try both plots — if the semi-log plot is linear, exponential model fits. If the log-log plot is linear, power model fits. The *shape* of the linearised plot diagnoses the underlying functional form.", "source": "Opus 4.7 ①", "_id": "opus_1_104", "judge_pick": false}, {"question": "Conceptual: Why is the $$R$$-formula essentially a *change of basis* for the function space spanned by $$\\{\\sin x, \\cos x\\}$$?", "answer": "Step 1: Any linear combination $$a\\sin x + b\\cos x$$ can be re-expressed as $$R\\sin(x+\\alpha)$$ using the addition formula. This is a coordinate change in the 2D function space spanned by $$\\sin, \\cos$$. Step 2: The new \"basis\" is a single shifted sine wave; the \"coordinate\" is $$R$$ (amplitude) and the \"phase\" is $$\\alpha$$. Geometrically, $$(a, b)$$ as a vector in the plane has polar coordinates $$(R, \\alpha)$$. Step 3: This change of basis reveals the function as a single sinusoid in disguise — making max/min/zero questions trivial. The cost is a phase shift; the benefit is structural simplicity. This is why $$R$$-form is the *normal form* for sums of sin and cos.", "source": "Opus 4.7 ①", "_id": "opus_1_105", "judge_pick": true}, {"question": "Misconception probe: A student writes $$\\sin(A+B) = \\sin A + \\sin B$$. Why is this wrong, and what's the correct identity?", "answer": "Step 1: $$\\sin$$ is **not** linear: $$\\sin(A+B) \\neq \\sin A + \\sin B$$ in general. Step 2: Correct: $$\\sin(A+B) = \\sin A \\cos B + \\cos A \\sin B$$. Step 3: Quick check: $$A = B = \\pi/4$$. LHS: $$\\sin(\\pi/2) = 1$$. Student's RHS: $$\\sin(\\pi/4) + \\sin(\\pi/4) = \\sqrt 2 \\approx 1.41$$. Not equal — counterexample. The correct RHS: $$\\sin(\\pi/4)\\cos(\\pi/4) + \\cos(\\pi/4)\\sin(\\pi/4) = (\\sqrt 2/2)^2 + (\\sqrt 2/2)^2 = 1$$ ✓. Sin is *only* additive inside $$\\sin$$ if there's a special structure (e.g., $$\\sin n\\pi = 0$$ for integer $$n$$).", "source": "Opus 4.7 ①", "_id": "opus_1_106", "judge_pick": true}, {"question": "Numerical exercise: Solve $$|x - 4| = 2x + 1$$ algebraically.", "answer": "Step 1: Case 1 ($$x \\geq 4$$): $$x - 4 = 2x + 1 \\Rightarrow x = -5$$. But $$-5 \\not\\geq 4$$, so reject. Step 2: Case 2 ($$x < 4$$): $$-(x-4) = 2x+1 \\Rightarrow 4-x = 2x+1 \\Rightarrow 3 = 3x \\Rightarrow x = 1$$. Check: $$1 < 4$$ ✓ and $$2(1)+1 = 3 \\geq 0$$ (RHS must be non-negative for an equation with a modulus on LHS). Step 3: Solution: $$x = 1$$. Verify: $$|1-4| = 3 = 2(1)+1$$ ✓.", "source": "Opus 4.7 ①", "_id": "opus_1_107", "judge_pick": false}, {"question": "Conceptual: Why do \"increasing\" and \"decreasing\" properties require checking $$f' > 0$$ (or $$<0$$) on the **entire domain**, not just at one or two test points?", "answer": "Step 1: Increasing on a domain means $$x_1 < x_2$$ implies $$f(x_1) < f(x_2)$$ for *all* such pairs in the domain. This is a global statement. Step 2: The connection to $$f'$$: by the Mean Value Theorem, if $$f' > 0$$ everywhere on $$(a,b)$$, then $$f$$ is strictly increasing on $$[a,b]$$. The \"everywhere\" is essential — if $$f'$$ is positive at some points and zero or negative at others, $$f$$ could plateau or reverse. Step 3: At one test point, $$f'$$ might be positive but elsewhere zero (giving a horizontal tangent and inflection). So a single-point check is insufficient. Always argue: numerator/denominator sign analysis covering the *entire domain*.", "source": "Opus 4.7 ①", "_id": "opus_1_108", "judge_pick": true}, {"question": "Synthesis: A modelling question asks \"find $$T$$ when $$D = 350000$$, will the charity reach this in 12 months?\" Why is the strategic move to compute $$D$$ at $$T = 12$$ directly, rather than solving $$D = 350000$$ for $$T$$?", "answer": "Step 1: The question is \"yes/no, will charity hit £350,000 by month 12?\" — not \"find when $$D = 350000$$.\" Step 2: Solving $$D = 350000$$ for $$T$$ would give a specific $$T$$ value; you'd then compare to 12. But computing $$D(12)$$ directly answers the binary question in one step. Step 3: $$\\log_{10}D = 1.04 + 0.38 \\times 12 = 5.60$$, so $$D \\approx 10^{5.60} \\approx 398107$$. Since $$398107 > 350000$$, yes, the aim is achieved before month 12. The savings: one log-evaluation vs solving an equation + comparing.", "source": "Opus 4.7 ①", "_id": "opus_1_109", "judge_pick": true}, {"question": "Numerical exercise: Find the maximum value of $$f(x) = 2\\sin x + 2\\cos x + 5$$ in compact form. (3 steps)", "answer": "- Step 1: Convert to $$R\\sin(x+\\alpha) + 5$$ with $$R = \\sqrt{2^2 + 2^2} = \\sqrt{8} = 2\\sqrt 2$$. (And $$\\tan\\alpha = 1$$ so $$\\alpha = \\pi/4$$, but only $$R$$ matters for the max.)\n- Step 2: Max of $$R\\sin(\\cdots) = R$$, so max of $$R\\sin(\\cdots) + 5 = R + 5$$.\n- Step 3: Max $$f = 2\\sqrt 2 + 5 \\approx 7.83$$.\n\nThe point: the constant $$+5$$ adds directly to the max; you don't need $$\\alpha$$ to find the *value* of the max.", "source": "Opus 4.7 ①", "_id": "opus_1_110", "judge_pick": false}, {"question": "Misconception probe: A student computes $$\\dfrac{6}{8} = \\dfrac{3}{4}$$ and writes $$e^{-45B} = 3/4 \\Rightarrow B = \\ln(3/4)/(-45) \\Rightarrow B = -\\ln(3/4)/45 \\Rightarrow B = -0.0064$$. What's the (subtle) error?", "answer": "Step 1: The signs check out at first glance: $$-\\ln(3/4) = -(-0.2877) = +0.2877$$, so $$B = 0.2877/45 = +0.00639$$. Step 2: But the student wrote $$B = -0.0064$$ — they treated $$\\ln(3/4)$$ as positive, when it's actually *negative* (since $$3/4 < 1$$). $$\\ln$$ of a number less than 1 is negative. Step 3: Correct sign-tracking: $$\\ln(3/4) \\approx -0.2877$$, so $$B = (-(-0.2877))/45 = +0.00639$$. Cleaner approach: write $$-\\ln(3/4) = \\ln(4/3) \\approx +0.2877$$ from the start, so $$B = \\ln(4/3)/45 > 0$$. This avoids cycling negatives.", "source": "Opus 4.7 ①", "_id": "opus_1_111", "judge_pick": true}, {"question": "Synthesis: For an iteration question that gives a starting value $$x_1$$ and asks for $$x_2$$ then $$\\alpha$$ to 4 d.p., why is it strategic to use the calculator's ANS button continuously rather than recompute from scratch?", "answer": "Step 1: Each iteration step depends on the *full-precision* output of the previous step. Manual re-entry truncates to displayed digits, introducing rounding error. Step 2: ANS preserves the calculator's internal precision (typically 10-12 significant digits), so iterations follow the true sequence. Truncation can cause apparent non-convergence or convergence to a slightly wrong value. Step 3: Practical procedure: Type $$x_1$$, press =. Then type the formula with ANS as the variable; press = repeatedly. Watch the display until two consecutive values agree to required d.p. — that's your answer. Total time: 30 seconds vs 5 minutes for manual.", "source": "Opus 4.7 ①", "_id": "opus_1_112", "judge_pick": false}, {"question": "Conceptual: For the function $$f(x) = 2e^{3\\sin x}\\cos x$$, why does *factoring out the exponential* cleanly reveal the turning-point equation, but *expanding* the exponential not?", "answer": "Step 1: After product-rule differentiation: $$f'(x) = 6\\cos^2 x \\, e^{3\\sin x} - 2\\sin x \\, e^{3\\sin x} = 2e^{3\\sin x}(3\\cos^2 x - \\sin x)$$. Step 2: Setting $$f'(x) = 0$$ on the *factored* form: since $$2e^{3\\sin x}$$ is never zero, the bracket $$3\\cos^2 x - \\sin x = 0$$ — a clean trig equation. Step 3: If you didn't factor, you'd have $$6\\cos^2 x \\, e^{3\\sin x} = 2\\sin x \\, e^{3\\sin x}$$, which still requires dividing both sides by $$e^{3\\sin x}$$ to get the same answer. Factoring up front saves a step and makes the structure visible: \"exponential is positive → ignore it; solve the bracket.\"", "source": "Opus 4.7 ①", "_id": "opus_1_113", "judge_pick": false}, {"question": "Conceptual: Why is the rule \"if a product is zero and one factor is never zero, the other factor is zero\" the **single most important logical move** for finding turning points or roots in problems involving exponentials?", "answer": "Step 1: Many P3 problems involve products where one factor (typically an exponential) is provably nonzero. Without this rule, you'd attempt to \"set both factors to zero,\" but only one *can* be. Step 2: Examples: $$2e^{3\\sin x}\\cos x = 0$$ → $$\\cos x = 0$$ (since $$e^{3\\sin x} > 0$$). $$f'(x) = 2e^{3\\sin x}(3\\cos^2 x - \\sin x) = 0$$ → bracket = 0 (same reason). Step 3: This rule reduces a hairy algebraic mess to a tractable equation. The pattern is: identify provably-nonzero factor → divide out → solve the remaining (often trig or polynomial) equation. Universally applicable.", "source": "Opus 4.7 ①", "_id": "opus_1_114", "judge_pick": true}, {"question": "Numerical exercise: Sketch the graph of $$y = -|x+2| + 3$$, identifying vertex and intercepts. (3 steps)", "answer": "- Step 1: Vertex (shortcut): inside zero, $$x + 2 = 0 \\Rightarrow x = -2$$. Then $$y = -0 + 3 = 3$$. Vertex $$(-2, 3)$$.\n- Step 2: $$y$$-intercept ($$x = 0$$): $$y = -|2| + 3 = -2 + 3 = 1$$. So $$(0, 1)$$.\n- Step 3: $$x$$-intercepts ($$y = 0$$): $$|x+2| = 3 \\Rightarrow x + 2 = \\pm 3 \\Rightarrow x = 1$$ or $$x = -5$$. So $$(1, 0)$$ and $$(-5, 0)$$. Shape: inverted V (since coefficient is $$-1$$), vertex above the $$x$$-axis at $$(-2,3)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_115", "judge_pick": true}, {"question": "Conceptual: For a curve $$y = a - |2x-b|$$, the *vertex* is at $$(b/2, a)$$. Why is the $$x$$-coordinate $$b/2$$ and not $$b$$? (3 steps)", "answer": "- Step 1: The argument of the modulus is $$2x - b$$, which equals zero when $$2x = b$$, i.e. $$x = b/2$$.\n- Step 2: The factor of 2 inside the modulus *compresses* the V horizontally — the vertex sits at the $$x$$ that makes the inside zero, which is $$b/2$$, not $$b$$.\n- Step 3: General rule: for $$|cx - d|$$, vertex $$x$$-coordinate is $$d/c$$. The $$1/c$$ factor reflects the horizontal compression. Forgetting the factor of 2 (writing vertex at $$x = b$$) is a common slip.", "source": "Opus 4.7 ①", "_id": "opus_1_116", "judge_pick": false}, {"question": "Synthesis: What is the **complete checklist** of a \"use $$R$$-formula to solve\" question? (5 steps)", "answer": "- Step 1: Identify the form: $$a\\sin\\phi \\pm b\\cos\\phi$$ on one side; constant on the other.\n- Step 2: Choose the right $$R$$-formula variant based on signs and which trig comes first (sin or cos). Match $$R\\cos\\alpha = $$ coefficient of sin (or cos), $$R\\sin\\alpha = $$ coefficient of the other.\n- Step 3: Compute $$R = \\sqrt{a^2+b^2}$$ and $$\\alpha$$ from $$\\tan\\alpha = b/a$$ (or appropriate ratio).\n- Step 4: Substitute: equation becomes $$R\\sin(\\phi + \\alpha) = c$$, solve for $$\\phi + \\alpha = \\arcsin(c/R) + $$ multiples of period.\n- Step 5: Substitute back to find $$\\phi$$, then $$x$$. Filter solutions to the given range. Always check by plugging the final $$x$$ into the original equation.\n\nThis pipeline is mechanical once memorised; the bottleneck is consistently knowing the four variants.", "source": "Opus 4.7 ①", "_id": "opus_1_117", "judge_pick": true}, {"question": "Misconception probe: A student integrates $$\\int 2x e^{x^2} dx$$ and writes $$\\dfrac{2x e^{x^2}}{2x} = e^{x^2}$$. What's the issue, and what's the right approach?", "answer": "Step 1: The student is \"dividing by the derivative of the inside\" — a misapplication of substitution. Integration is *not* division. Step 2: Correct approach: substitute $$u = x^2 \\Rightarrow du = 2x\\, dx$$. Then $$\\int 2x e^{x^2}dx = \\int e^u du = e^u + C = e^{x^2} + C$$. The result happens to be $$e^{x^2}$$, but the *justification* is substitution, not division. Step 3: The student got the right answer for the wrong reason — dangerous because it won't generalise. For $$\\int x e^{x^2}dx$$ (no factor of 2), the answer is $$\\tfrac{1}{2}e^{x^2} + C$$, and the student's \"method\" would falsely give $$e^{x^2}/(2x)$$ — gibberish.", "source": "Opus 4.7 ①", "_id": "opus_1_118", "judge_pick": true}, {"question": "Conceptual: When is the derivative $$f'(x) = 0$$ NOT a turning point, and how should one verify? (3 steps)", "answer": "- Step 1: $$f'(x) = 0$$ identifies *stationary points*, which include local maxima, local minima, and **points of inflection** (e.g., $$f(x) = x^3$$ has $$f'(0)=0$$ but is increasing through 0 — no turning point).\n- Step 2: To verify it's a turning point: check the sign of $$f'$$ on either side (sign change = turning point) or use the second derivative test ($$f''(x_0) > 0$$ → minimum; $$<0$$ → maximum; $$=0$$ → inconclusive).\n- Step 3: For inflection: $$f'(x_0) = 0$$ but no sign change in $$f'$$ — graph keeps increasing (or decreasing) through the point with momentary horizontal tangent. So always check beyond just $$f' = 0$$ for \"turning point\" claims.", "source": "Opus 4.7 ①", "_id": "opus_1_119", "judge_pick": true}, {"question": "Conceptual: Why is the natural log $$\\ln$$ specifically the inverse of $$e^x$$, and how does this make $$\\ln$$ the natural choice for solving exponential equations of the form $$e^{stuff} = c$$?", "answer": "Step 1: $$\\ln$$ is defined as $$\\log_e$$, the logarithm with base $$e$$. By the definition of inverse functions, $$\\ln(e^x) = x$$ and $$e^{\\ln x} = x$$ for $$x > 0$$. Step 2: For an equation $$e^{stuff} = c$$, taking $$\\ln$$ of both sides directly extracts the exponent: $$\\ln(e^{stuff}) = \\ln c \\Rightarrow stuff = \\ln c$$. No conversion factor needed (unlike $$\\log_{10}$$, which would give $$stuff \\cdot \\log_{10}e = \\log_{10}c$$). Step 3: So $$\\ln$$ is the \"matching key\" for $$e$$. For base-10 exponentials, $$\\log_{10}$$ is the matching key. Use the log of the same base as the exponential to avoid extra conversion factors.", "source": "Opus 4.7 ①", "_id": "opus_1_120", "judge_pick": true}, {"question": "Conceptual: How does the second-derivative test relate to the geometry of the graph at a turning point?", "answer": "Step 1: At a stationary point $$x_0$$ where $$f'(x_0) = 0$$, the tangent is horizontal. The second derivative $$f''(x_0)$$ measures *curvature* at that point. Step 2: $$f''(x_0) > 0$$: the graph curves upward (concave up, \"smiling\"), so the stationary point is a local minimum — the graph is at the bottom of a \"cup.\" Step 3: $$f''(x_0) < 0$$: the graph curves downward (concave down, \"frowning\"), so the stationary point is a local maximum — the graph is at the top of a \"hill.\" If $$f''(x_0) = 0$$: inconclusive — could be inflection or higher-order min/max; need other tests (sign change of $$f'$$).", "source": "Opus 4.7 ①", "_id": "opus_1_121", "judge_pick": true}, {"question": "Synthesis: For a P3 exam question on integration with a parameter (like $$\\int \\dfrac{16}{9(3x-k)}dx$$), what general procedure ensures you handle the parameter correctly throughout? (4 steps)", "answer": "- Step 1: Pull the constant $$16/9$$ outside the integral first: $$\\int \\dfrac{16}{9(3x-k)}dx = \\dfrac{16}{9}\\int \\dfrac{1}{3x-k}dx$$.\n- Step 2: Apply $$\\int \\dfrac{1}{ax+b}dx = \\dfrac{1}{a}\\ln|ax+b|$$. Here $$a = 3, b = -k$$. Result: $$\\dfrac{1}{3}\\ln|3x-k|$$. Don't forget the $$1/3$$.\n- Step 3: Combine constants: $$\\dfrac{16}{9} \\cdot \\dfrac{1}{3}\\ln|3x-k| = \\dfrac{16}{27}\\ln|3x-k|$$.\n- Step 4: For definite integrals, evaluate at the limits, then combine logs into a single $$\\ln$$ before reporting the coefficient.\n\nThe parameter $$k$$ is just a constant — treat it like a number throughout.", "source": "Opus 4.7 ①", "_id": "opus_1_122", "judge_pick": false}, {"question": "Synthesis: Suppose a question gives you $$f(x) = $$ a complicated expression, asks (a) to show $$f(x)$$ simplifies to a nice form, (b) to differentiate, (c) to integrate over a range. What's the strategic order? Why? (3 steps)", "answer": "- Step 1: **Always** do part (a) first. The simplified form is what (b) and (c) will use; differentiating or integrating the unsimplified form is a nightmare. Even if the question doesn't insist on order, do it.\n- Step 2: Use the simplified form for (b): differentiate, factor for turning-point analysis. Cleaner expressions = fewer errors.\n- Step 3: Use the simplified form for (c): integrate using standard templates. The simplification often makes the integral match a known form (e.g., reduces to $$1/(ax+b)$$ template).\n\nThe principle: simplification *enables* downstream steps — never skip or postpone it.", "source": "Opus 4.7 ①", "_id": "opus_1_123", "judge_pick": true}, {"question": "Conceptual: Why does the *period* of $$\\sin(2x + \\alpha)$$ differ from that of $$\\sin(x + \\alpha)$$, and how does this affect counting solutions?", "answer": "Step 1: $$\\sin(\\theta)$$ has period $$2\\pi$$ in $$\\theta$$. For $$\\sin(2x + \\alpha)$$, treat $$\\theta = 2x + \\alpha$$; then $$\\sin(\\theta)$$ repeats every $$2\\pi$$ in $$\\theta$$, but in $$x$$ it repeats every $$\\pi$$ (since $$2x$$ doubles the rate). Step 2: So $$\\sin(2x+\\alpha)$$ has period $$\\pi$$ in $$x$$. In an interval of length $$2\\pi$$, you get *two* full cycles, hence twice as many solutions to $$\\sin(2x+\\alpha) = c$$. Step 3: Always identify the period in the *target variable* ($$x$$) — not the dummy ($$\\theta$$). This is critical when finding \"all solutions in [0, 2π]\" type questions.", "source": "Opus 4.7 ①", "_id": "opus_1_124", "judge_pick": true}, {"question": "Misconception probe: A student writes $$\\sin\\theta\\cos\\theta = \\sin 2\\theta$$. What's the missing factor, and why?", "answer": "Step 1: Correct identity: $$\\sin 2\\theta = 2\\sin\\theta\\cos\\theta$$, so $$\\sin\\theta\\cos\\theta = \\tfrac{1}{2}\\sin 2\\theta$$ (divide both sides by 2). Step 2: The student forgot the $$1/2$$. This factor matters: e.g., $$8\\sin x\\cos x = 4 \\cdot 2\\sin x\\cos x = 4\\sin 2x$$, not $$8\\sin 2x$$. Step 3: Mnemonic: \"the double-angle formula has a 2 multiplying the product of sin and cos.\" So when going *from* product *to* double-angle, you divide by 2. Forgetting this halves your final answer.", "source": "Opus 4.7 ①", "_id": "opus_1_125", "judge_pick": false}, {"question": "Conceptual: Why must students always include \"f is continuous on [a,b]\" in a sign-change argument, even when working with polynomial functions?", "answer": "Step 1: The IVT (sign-change) requires *continuity* as a precondition. Without continuity, the theorem doesn't apply — for example, $$f(x) = 1/x$$ has $$f(-1) = -1, f(1) = 1$$ (sign change) but no root in $$[-1,1]$$ because of the discontinuity at $$x = 0$$. Step 2: Polynomials are continuous everywhere, so the condition is *trivially satisfied* — but mark schemes still want it stated. Step 3: This is an exam technicality: explicit mention of continuity earns the mark for stating the theorem's hypotheses correctly. \"f is a polynomial, hence continuous on $$[a,b]$$\" is the standard phrasing.", "source": "Opus 4.7 ①", "_id": "opus_1_126", "judge_pick": false}, {"question": "Synthesis: When asked to \"find $$T$$ such that $$D = 350000$$\" in a model $$\\log_{10}D = mT + c$$, why might it be wrong to first compute $$D = a\\cdot b^T$$ and then $$T = \\log(350000/a)/\\log b$$?", "answer": "Step 1: Algebraically equivalent — both should give the same answer. But computationally: each conversion from log to exp form loses precision via rounding. Step 2: Direct in log form: $$\\log_{10}(350000) = mT + c$$, solve $$T = (\\log_{10}(350000) - c)/m$$. One log evaluation, one division. Two operations. Step 3: Via exp form: convert $$c \\to a$$ (via $$10^c$$), $$m \\to b$$ (via $$10^m$$), then $$T = \\log(350000/a)/\\log b$$. Three operations, more rounding. Cleaner answer if you stay in log form when given log form.", "source": "Opus 4.7 ①", "_id": "opus_1_127", "judge_pick": false}, {"question": "Conceptual: Why do exam questions often want $$\\alpha$$ in the $$R$$-formula stated to 3 s.f. or in radians, even when degrees might seem more natural?", "answer": "Step 1: For derivative/integral applications, *radians* are the natural angular unit — derivatives of trig functions ($$d/d\\theta\\sin\\theta = \\cos\\theta$$) require $$\\theta$$ in radians for the formula to hold. Step 2: $$\\alpha$$ is typically irrational (like $$\\arctan(1/2) \\approx 0.464$$ rad), so 3 s.f. or 4 s.f. is the practical reporting precision. Step 3: Calculator setting: for trig in $$R$$-formula problems, *always* set the calculator to radians. A common error is solving in degrees mode, getting a \"wrong\" $$\\alpha$$ that's actually correct in degrees (e.g., $$26.57°$$) but incompatible with radian-based downstream steps.", "source": "Opus 4.7 ①", "_id": "opus_1_128", "judge_pick": false}, {"question": "Synthesis: How do you decide between (a) splitting $$|f(x)|$$ into cases, vs (b) squaring both sides of a modulus equation?", "answer": "Step 1: Case-splitting works for both equations and inequalities. It produces *piecewise* solutions, each valid on a region — straightforward to filter. Step 2: Squaring works only for *equations* (not inequalities, where squaring reverses inequalities involving negative values). It introduces extraneous roots when $$g(x) < 0$$, requiring final filtering by checking signs. Step 3: Default to case-splitting for clarity. Use squaring as a backup when case-splitting yields awkward algebra (e.g., when a polynomial equation results that's hard to factor in cases). Always *verify* solutions in the original equation, regardless of method.", "source": "Opus 4.7 ①", "_id": "opus_1_129", "judge_pick": true}, {"question": "Numerical exercise: For $$y = f(x)$$ with $$P = (3, -2)$$, what is the image of $$P$$ under $$y = -f(x) + 4$$? (3 steps)", "answer": "- Step 1: The transformation has two outside changes: multiplication by $$-1$$ (reflection in $$x$$-axis) and addition of 4 (vertical shift up).\n- Step 2: Reflection: $$y = -2 \\to y = +2$$. So intermediate point $$(3, 2)$$.\n- Step 3: Shift up 4: $$y = 2 \\to y = 6$$. Final image: $$(3, 6)$$. Note: $$x$$ is unchanged because both transformations act outside (on $$y$$).", "source": "Opus 4.7 ①", "_id": "opus_1_130", "judge_pick": false}, {"question": "Conceptual: Why is \"sketch by step-by-step transformation\" generally more reliable than \"compute key points and connect\" for graphs of $$y = a|bx+c|+d$$?", "answer": "Step 1: Step-by-step transformation builds intuition for the *whole shape* — vertex, slope, asymptotic behaviour — by tracking each operation's effect. Step 2: Computing 2-3 points and connecting can miss subtleties (e.g., the modulus's V-shape is non-smooth at the vertex; only multiple points around the vertex would reveal this). Step 3: For a final answer, compute the vertex via the shortcut (set inside zero), then use the \"stretch factor + sign of outer multiplier\" to determine slope and orientation. Combining the two — vertex + transformation context — gives both correctness and speed.", "source": "Opus 4.7 ①", "_id": "opus_1_131", "judge_pick": true}, {"question": "Conceptual recap: Why is \"logarithm and exponential are inverses\" the unifying principle for *every* P3 problem involving exponentials, decay/growth models, and log graphs?", "answer": "Step 1: Every model with an unknown in the exponent (e.g., $$ab^T = c$$, $$Ae^{-Bt} = D$$) requires extracting the exponent — and only the inverse function of the exponential can do that. Step 2: For base-$$e$$ exponentials, the inverse is $$\\ln$$. For base-$$a$$ exponentials, the inverse is $$\\log_a$$. Step 3: The whole \"linearise via log → solve linear equation → exponentiate to recover model\" pipeline is built on this inverse relationship. Master log-exp inverses, and all the P3 modelling chapters become applications of one principle.", "source": "Opus 4.7 ①", "_id": "opus_1_132", "judge_pick": true}, {"question": "Misconception probe: A student writes $$\\log_{10}(45000) = \\log 4.5 + 4$$. Is this correct?", "answer": "Step 1: Yes, this is correct — the student has cleverly applied scientific notation to simplify. Step 2: Reasoning: $$45000 = 4.5 \\times 10^4$$, so $$\\log_{10}(45000) = \\log_{10}(4.5) + \\log_{10}(10^4) = \\log_{10}(4.5) + 4$$ (using product rule and $$\\log_{10}(10^n) = n$$). Step 3: With $$\\log_{10}(4.5) \\approx 0.6532$$, total is $$\\approx 4.6532$$. This is faster than typing 45000 into a log button without understanding. The student is using a valuable technique: split logs of large numbers via scientific notation.", "source": "Opus 4.7 ①", "_id": "opus_1_133", "judge_pick": true}, {"question": "Conceptual: When are the factors $$1/a$$ in the integral formula $$\\int \\dfrac{1}{ax+b}dx = \\dfrac{1}{a}\\ln|ax+b| + C$$ irrelevant in practice (don't need to worry about them)?", "answer": "Step 1: When $$a = 1$$ (i.e., the denominator is $$x + b$$, with no coefficient on $$x$$). Then $$1/a = 1$$ and you can omit it. Step 2: Example: $$\\int \\dfrac{1}{x-2}dx = \\ln|x-2| + C$$ — no need to write $$\\dfrac{1}{1}\\ln|x-2|$$. Step 3: Pitfall: if you've internalised \"always include $$1/a$$\" but apply it carelessly to $$\\int 1/(2x+5)dx$$, you correctly get $$\\dfrac{1}{2}\\ln|2x+5|$$. But if you've internalised \"skip $$1/a$$ when small,\" you might mistakenly omit it for $$a = 2, 3, \\ldots$$ — the bigger error. So always *check* $$a$$ and apply mechanically.", "source": "Opus 4.7 ①", "_id": "opus_1_134", "judge_pick": true}, {"question": "Synthesis: Why does the population question with $$u_n = 2000 \\times 1.03^n$$ trip students up with off-by-one errors, while the temperature question with $$T = 10 + 8e^{-Bt}$$ rarely does?", "answer": "Step 1: In the temperature model, $$t$$ is *continuous* (time in minutes), so \"at $$t = 45$$\" is unambiguous: substitute $$t = 45$$ directly. No indexing confusion. Step 2: In the population model, $$n$$ is *discrete* (year number). Conventions differ: does $$n = 0$$ mean year 1 (initial measurement) or year 0 (a placeholder)? \"After 6 years\" might mean $$n = 6$$ or $$n = 5$$ depending on the convention. Step 3: To avoid the off-by-one: always anchor with $$n = 0 \\Rightarrow u_0 = $$ given initial value (e.g., 2000). Then $$n$$ years later is $$u_n = 2000 \\times 1.03^n$$, with the exponent matching the index. After 6 years from $$n=0$$: $$u_6 = 2000 \\times 1.03^6$$.", "source": "Opus 4.7 ①", "_id": "opus_1_135", "judge_pick": true}, {"question": "Conceptual: Why is the \"act with respect to the answer\" principle especially powerful for exam questions involving algebraic manipulation, identities, or rearrangements?", "answer": "Step 1: Exam questions typically have a *unique* path to the target form (the question wouldn't be asked otherwise). Working forward without the target risks unnecessarily detours. Step 2: Working backward (or with target awareness): identify *what manipulation* will introduce the structures present in the target. E.g., target has $$\\cos 2\\theta$$ → identify identities producing $$\\cos 2\\theta$$. Step 3: This dramatically narrows the search: instead of \"what can I do?\" (many options), the question becomes \"what *must* I do to reach this specific form?\" (often few options). Time saved, errors reduced. Adopt this as default mode for \"show that\" questions.", "source": "Opus 4.7 ①", "_id": "opus_1_136", "judge_pick": false}, {"question": "Strategic recap: List the **top 5 errors** to watch out for in P3 exam questions, based on revision evidence. (5 items)", "answer": "- Step 1: **Forgetting the $$1/a$$ factor** in $$\\int \\dfrac{1}{ax+b}dx = \\dfrac{1}{a}\\ln|ax+b|$$. Slip is silent — the answer just looks *almost* right.\n- Step 2: **Off-by-one** in geometric/exponential growth: confusing whether the $$n$$-th term has exponent $$n-1$$, $$n$$, or $$n+1$$. Always anchor with $$n = 0$$.\n- Step 3: **Skipping case-region check** in modulus inequalities: getting an algebraic answer that doesn't lie in its case's valid region.\n- Step 4: **Forgetting double-angle rearrangements** like $$\\cos^2 A = \\tfrac{1}{2}(1+\\cos 2A)$$ — needed to convert squared terms into double-angle form.\n- Step 5: **Forgetting to combine logs** $$6\\ln 6 - 6\\ln 2 \\to 6\\ln 3$$ before reading off coefficients.\n\nA quick mental \"did I forget X?\" check at the end of each problem catches most of these.", "source": "Opus 4.7 ①", "_id": "opus_1_137", "judge_pick": false}], "count": 138}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "For a modulus function of the form $$y = a|bx - c| + d$$, what is the fast conceptual shortcut for locating the vertex without doing step-by-step transformations? (3 steps)", "answer": "- Step 1: Recognise that $$|bx - c|$$ attains its minimum value of $$0$$ exactly when the expression inside equals zero. Everything outside the modulus just scales or shifts the $$y$$-value.\n- Step 2: Set $$bx - c = 0$$ and solve to get the $$x$$-coordinate: $$x = c/b$$.\n- Step 3: Substitute this $$x$$ back in: since $$|0| = 0$$, we get $$y = a \\cdot 0 + d = d$$. Vertex is $$(c/b,\\,d)$$.\n\nTakeaway: the inside determines where the vertex sits horizontally; the outside scales/shifts its vertical position.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": true}, {"question": "Why does multiplying $$|x - 5|$$ by 2 to obtain $$2|x - 5|$$ leave the $$x$$-coordinate of the vertex unchanged, even though vertical stretches normally \"do something\"?", "answer": "The vertex of $$|x - 5|$$ sits at $$(5, 0)$$. A vertical stretch scales $$y$$ by the factor, so $$y = 0$$ stays $$y = 0$$ (since $$2 \\times 0 = 0$$). The $$x$$-coordinate is completely untouched by a pure vertical stretch — it only affects $$y$$-values. After stretching, vertex remains $$(5, 0)$$. Only *after* we add $$+10$$ does the vertex shift vertically up to $$(5, 10)$$.\n\nKey insight: vertical stretches cannot change $$x$$-coordinates of anything, only $$y$$-coordinates.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": true}, {"question": "For the transformation $$y = 3f(x - 2)$$ applied to a point on $$y = f(x)$$, does the order of the \"shift right 2\" and the \"vertical stretch by 3\" matter? Explain why or why not. (2 steps)", "answer": "- Step 1: The \"inside\" transformation $$x - 2$$ acts only on $$x$$, while the \"outside\" multiplier 3 acts only on $$y$$. They live on independent coordinates.\n- Step 2: Since one affects $$x$$ only and the other affects $$y$$ only, their effects commute. For a point $$(a, b)$$: shifting right then stretching gives $$(a+2, 3b)$$; stretching then shifting gives $$(a+2, 3b)$$ — same answer.\n\nTakeaway: inside-vs-outside transformations commute because they modify different axes.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "Point $$P = (5, 10)$$ lies on the curve $$y = f(x)$$. Find the image of $$P$$ under $$y = 3f(x - 2)$$. (2 steps)", "answer": "- Step 1: The \"inside\" $$x - 2$$ corresponds to a shift *right* by 2 (opposite sign of what's written), so $$x_P = 5 \\to 5 + 2 = 7$$.\n- Step 2: The outside \"3\" is a vertical stretch by factor 3, so $$y_P = 10 \\to 3 \\times 10 = 30$$. Image is $$(7, 30)$$.\n\nShortcut rule: $$y = af(x + h) + k$$ sends $$(x, y) \\to (x - h, ay + k)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "To solve a modulus inequality like $$2|x-5| + 10 > 6x$$ algebraically, what is the case-split setup and why is the \"validity region\" check absolutely critical?", "answer": "- Step 1: Split by sign of inside. Case 1 assumes $$x - 5 \\geq 0$$ (so $$|x-5| = x-5$$); Case 2 assumes $$x - 5 < 0$$ (so $$|x-5| = -(x-5) = 5-x$$).\n- Step 2: Solve the resulting inequality in each case *as if* the assumption held.\n- Step 3: **Intersect** the solution with the case's validity region. A solution found in Case 1 is only valid if it satisfies $$x \\geq 5$$; a solution found in Case 2 is only valid if $$x < 5$$.\n\nWhy critical: the sign assumption is a hypothesis, not a fact. A \"solution\" $$x = -2$$ derived under the assumption $$x \\geq 5$$ is nonsense — it contradicts the assumption.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": true}, {"question": "In solving $$2|x-5| + 10 > 6x$$ for the case $$x \\geq 5$$ (so $$|x-5| = x-5$$), what does the algebra yield and why does this case produce no valid solutions? (3 steps)", "answer": "- Step 1: Substitute: $$2(x-5) + 10 > 6x \\;\\Rightarrow\\; 2x - 10 + 10 > 6x \\;\\Rightarrow\\; 2x > 6x$$.\n- Step 2: Rearrange: $$0 > 4x$$, i.e. $$x < 0$$.\n- Step 3: Intersect with validity $$x \\geq 5$$: we need $$x \\geq 5$$ **AND** $$x < 0$$, which is impossible. So Case 1 contributes no solutions.\n\nTakeaway: an empty intersection is a perfectly fine outcome — it just means all solutions come from the other case.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "In solving $$2|x-5| + 10 > 6x$$ for the case $$x < 5$$ (so $$|x-5| = 5 - x$$), derive the solution and explain how to finalise it. (3 steps)", "answer": "- Step 1: Substitute: $$2(5 - x) + 10 > 6x \\;\\Rightarrow\\; 20 - 2x > 6x$$.\n- Step 2: Rearrange: $$20 > 8x \\;\\Rightarrow\\; x < 5/2$$.\n- Step 3: Intersect with validity $$x < 5$$: $$x < 5/2$$ **AND** $$x < 5$$ gives simply $$x < 5/2$$. Combined with empty Case 1, final answer: $$x < 5/2$$.\n\nInsight: whichever case's constraint is tighter wins the intersection.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "Given a rational expression like $$\\frac{2x^2 - 5x + 8}{x - 2}$$, what's the decision rule for choosing between polynomial long division and partial fractions?", "answer": "Compare the degrees of numerator and denominator.\n\n- If $$\\deg(\\text{num}) \\geq \\deg(\\text{den})$$: use **polynomial division first**. This peels off a polynomial quotient plus a *proper* remainder fraction, which can then (if needed) be further decomposed into partial fractions.\n- If $$\\deg(\\text{num}) < \\deg(\\text{den})$$: go **straight to partial fractions** — the fraction is already proper.\n\nFor $$\\frac{2x^2 - 5x + 8}{x - 2}$$: num has degree 2, den has degree 1, so $$2 \\geq 1$$ → polynomial division required.\n\nWhy: partial fractions assume a proper fraction. Applying them to an improper fraction will either fail or produce nonsense.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "Walk through the polynomial long division of $$(2x^2 - 5x + 8) \\div (x - 2)$$ and identify the meaning of the quotient and remainder in the target form $$Ax + B + \\tfrac{C}{x-2}$$. (4 steps)", "answer": "- Step 1: Divide leading terms: $$\\tfrac{2x^2}{x} = 2x$$. This is the first term of the quotient.\n- Step 2: Multiply back: $$2x \\cdot (x - 2) = 2x^2 - 4x$$. Subtract from dividend: $$(2x^2 - 5x + 8) - (2x^2 - 4x) = -x + 8$$.\n- Step 3: Divide new leading term: $$\\tfrac{-x}{x} = -1$$. Multiply back: $$-1 \\cdot (x-2) = -x + 2$$. Subtract: $$(-x + 8) - (-x + 2) = 6$$ (remainder).\n- Step 4: Result: quotient $$2x - 1$$, remainder $$6$$. Hence $$g(x) = 2x - 1 + \\tfrac{6}{x-2}$$, giving $$A = 2, B = -1, C = 6$$.\n\nThe quotient $$Ax + B$$ is the polynomial part; $$C$$ is the remainder over the divisor.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "State $$\\int \\frac{1}{ax + b}\\,dx$$ and explain conceptually why the $$\\frac{1}{a}$$ prefactor appears (derive it via substitution). (3 steps)", "answer": "- Step 1: Result: $$\\int \\frac{1}{ax + b}\\,dx = \\frac{1}{a}\\ln|ax + b| + C$$.\n- Step 2: Derivation via substitution. Let $$u = ax + b$$, so $$du = a\\,dx$$, giving $$dx = \\tfrac{1}{a}\\,du$$.\n- Step 3: Rewrite: $$\\int \\frac{1}{u} \\cdot \\frac{1}{a}\\,du = \\frac{1}{a}\\ln|u| + C = \\frac{1}{a}\\ln|ax+b| + C$$.\n\nThe $$1/a$$ is the \"correction factor\" for the chain rule — differentiating $$\\ln|ax+b|$$ yields $$\\tfrac{a}{ax+b}$$, so we must divide by $$a$$ to cancel.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "Contrast $$\\int \\frac{6}{x - 2}\\,dx$$ and $$\\int \\frac{6}{3x - 7}\\,dx$$. Why does the \"forgotten $$1/a$$\" error not bite in the first but does in the second?", "answer": "- Step 1: For $$\\int \\frac{6}{x-2} dx$$: here $$a = 1$$ (coefficient of $$x$$). The prefactor $$1/a = 1/1 = 1$$, so the \"error\" of forgetting it makes no numerical difference — you still get $$6\\ln|x - 2| + C$$.\n- Step 2: For $$\\int \\frac{6}{3x-7} dx$$: $$a = 3$$, so $$1/a = 1/3$$. Forgetting gives $$6\\ln|3x-7|$$; correct answer is $$\\tfrac{6}{3}\\ln|3x-7| = 2\\ln|3x-7|$$ — a factor-3 error.\n- Step 3: Danger: students who \"got away with it\" on the easy case develop the bad habit, then lose marks when $$a \\neq 1$$.\n\nTakeaway: always check the coefficient of $$x$$ in the denominator before integrating $$1/(\\text{linear})$$.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": true}, {"question": "After computing a definite integral, you obtain $$56 + 6\\ln 6 - 12 - 6\\ln 2$$. Why must you simplify the logs before reading off coefficients $$\\alpha, \\beta$$ in the form $$\\alpha + \\beta \\ln 3$$? (2 steps)", "answer": "- Step 1: The target form contains only one logarithm: $$\\beta \\ln 3$$. You must combine $$6\\ln 6 - 6\\ln 2$$ into a single log before pattern-matching.\n- Step 2: Use log laws: $$6\\ln 6 - 6\\ln 2 = 6(\\ln 6 - \\ln 2) = 6\\ln(6/2) = 6\\ln 3$$. Combined with the constants: $$56 - 12 + 6\\ln 3 = 44 + 6\\ln 3$$, so $$\\alpha = 44$$, $$\\beta = 6$$.\n\nWithout combining, you cannot identify $$\\beta$$ uniquely — the form is ambiguous.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "State the three essential log laws (product, quotient, power) and the \"cancellation\" identity $$b^{\\log_b x}$$.", "answer": "- **Product**: $$\\log(ab) = \\log a + \\log b$$. (The log of a product breaks into a sum.)\n- **Quotient**: $$\\log(a/b) = \\log a - \\log b$$. (Division becomes subtraction.)\n- **Power**: $$\\log(a^n) = n \\log a$$. (Exponents come down as coefficients.)\n- **Cancellation**: $$b^{\\log_b x} = x$$. (Exponential and logarithm with same base are inverse functions.)\n\nAll hold for any base, provided arguments are positive. Intuition: logs convert multiplicative operations into additive ones.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "A student writes $$\\log_{10}(10^6) = 60$$. What is the correct answer and what confusion drives the error?", "answer": "Correct answer: $$\\log_{10}(10^6) = 6$$. The student has confused two ideas:\n\n- Confusion 1: They may be thinking $$\\log_{10}(10) = 10$$ (wrong — it's 1), and then computing $$6 \\times 10 = 60$$.\n- Confusion 2: Alternatively, they know the power law $$\\log(10^6) = 6\\log(10)$$ but then mis-substitute $$\\log_{10}(10) = 10$$.\n\nThe key fact: $$\\log_b(b) = 1$$ for any base $$b$$, because $$b^1 = b$$. Hence $$\\log_{10}(10) = 1$$ and $$\\log_{10}(10^6) = 6 \\times 1 = 6$$.\n\nMnemonic: \"log base $$b$$ of $$b$$ is one\" — asking \"$$b$$ to the what is $$b$$?\" answer is $$1$$.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": true}, {"question": "Given a power model $$y = 10^6 x^{-3}$$ (with $$x > 0$$), explain how to convert it into a straight-line form and identify the gradient and intercept of the $$\\log_{10} y$$ vs $$\\log_{10} x$$ plot. (3 steps)", "answer": "- Step 1: Take $$\\log_{10}$$ of both sides: $$\\log_{10} y = \\log_{10}(10^6) + \\log_{10}(x^{-3}) = 6 + (-3)\\log_{10} x$$.\n- Step 2: Rewrite: $$\\log_{10} y = -3 \\log_{10} x + 6$$. With $$Y = \\log_{10} y$$, $$X = \\log_{10} x$$, this is $$Y = -3X + 6$$ — a straight line.\n- Step 3: Read off: gradient $$= -3$$; $$Y$$-intercept $$= 6$$; $$X$$-intercept where $$0 = -3X + 6$$, giving $$X = 2$$.\n\nKey template for power models: $$y = kx^n \\;\\Rightarrow\\; \\log y = n \\log x + \\log k$$, plotted log vs log with gradient $$n$$.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "For an exponential model $$y = k a^x$$, what linear relationship emerges from taking logs, and on which axes do you plot?", "answer": "- Step 1: Take log of both sides: $$\\log y = \\log k + \\log(a^x) = \\log k + x \\log a$$.\n- Step 2: Rearranged: $$\\log y = (\\log a) \\cdot x + \\log k$$. Linear in $$x$$ (not $$\\log x$$).\n- Step 3: Plot $$\\log y$$ (vertical) vs $$x$$ (horizontal). Gradient $$= \\log a$$; $$y$$-intercept $$= \\log k$$.\n\nKey contrast with power models:\n+ Power ($$y = kx^n$$): plot $$\\log y$$ vs $$\\log x$$ (log-log axes)\n+ Exponential ($$y = ka^x$$): plot $$\\log y$$ vs $$x$$ (semi-log axes)\n\nThe choice of axes depends on *where* the variable appears (base vs exponent).", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": true}, {"question": "You're given a straight-line relationship $$\\log_3 N = 2t + 4$$. Derive $$N$$ in the form $$N = a \\cdot b^t$$ with numerical $$a$$ and $$b$$. (3 steps)", "answer": "- Step 1: Raise 3 to both sides (since the log is base 3, the inverse is $$3^{\\cdot}$$): $$N = 3^{2t + 4}$$.\n- Step 2: Split the exponent using laws: $$N = 3^4 \\cdot 3^{2t} = 81 \\cdot 3^{2t}$$.\n- Step 3: Rewrite $$3^{2t} = (3^2)^t = 9^t$$ to match the $$b^t$$ pattern. Final: $$N = 81 \\cdot 9^t$$, so $$a = 81$$, $$b = 9$$.\n\nRule: to go from \"log line\" back to \"equation\", raise the base to both sides, then split additive exponents into multiplied powers, and repackage into $$ab^t$$ form.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "Why does $$3^{2t}$$ equal $$9^t$$ rather than $$6^t$$? Why is this repackaging step necessary when matching the form $$ab^t$$?", "answer": "- Step 1: By the power rule $$(x^m)^n = x^{mn}$$, we have $$3^{2t} = (3^2)^t = 9^t$$. The $$2$$ is an *exponent on* 3, not a multiplier of 3.\n- Step 2: Common error: multiplying base by exponent gives $$3 \\cdot 2 = 6$$, so students write $$6^t$$. This is wrong because $$3^2 = 9 \\neq 6$$.\n- Step 3: Why repackage: the target $$ab^t$$ demands $$t$$ appear as a *simple* exponent on $$b$$. Leaving it as $$3^{2t}$$ doesn't match.\n\nMental check: at $$t = 1$$, $$3^{2 \\cdot 1} = 9$$ and $$9^1 = 9$$ ✓; $$6^1 = 6$$ ✗.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "State the governing principle: \"when the unknown is in the exponent, the first move is always ___.\" Apply to $$2000 \\times 1.03^T = 4000 \\times 0.98^T$$ conceptually. (3 steps)", "answer": "- Step 1: Principle: when the unknown is in the exponent, **take logarithms** (any consistent base, commonly ln). This brings the unknown down by the power law.\n- Step 2: Rearrange first: divide by $$2000 \\cdot 0.98^T$$ to isolate the $$T$$-dependent ratio: $$\\left(\\tfrac{1.03}{0.98}\\right)^T = 2$$.\n- Step 3: Take ln: $$T \\ln(1.03/0.98) = \\ln 2$$, so $$T = \\tfrac{\\ln 2}{\\ln(1.03/0.98)}$$ — conceptually, this is the only systematic way to untangle $$T$$.\n\nInsight: exponents are \"locked in\" until you apply log; algebra alone cannot free them.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "Given $$\\log_{10} D = 1.04 + 0.38T$$ and wanting to find $$T$$ at $$D = 45{,}000$$, is it faster to first convert to $$D = a \\cdot b^T$$ form, or work directly in the log form? Why?", "answer": "- Step 1: Working directly in log form is faster. Apply $$\\log_{10}$$ to $$D = 45000$$: the equation becomes $$\\log_{10}(45000) = 1.04 + 0.38T$$.\n- Step 2: Rearrange: $$T = \\frac{\\log_{10}(45000) - 1.04}{0.38}$$, a single-line computation.\n- Step 3: The alternative ($$D = 10.96 \\cdot 2.399^T$$) then requires solving $$45000 = 10.96 \\cdot 2.399^T$$, which still demands taking logs — essentially duplicate work plus rounding errors from the intermediate 4-s.f. values.\n\nMeta-lesson: stay in the form the question gives you unless converting makes life easier downstream.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "For $$\\log_{10} D = 1.04 + 0.38T$$, describe how to check whether $$D$$ exceeds $$£350{,}000$$ within $$T = 12$$ months, without heavy computation. (3 steps)", "answer": "- Step 1: Compute the RHS at $$T = 12$$: $$1.04 + 0.38 \\times 12 = 1.04 + 4.56 = 5.60$$. So $$\\log_{10} D = 5.60$$.\n- Step 2: Interpret: $$D = 10^{5.60}$$. Note $$10^5 = 100{,}000$$ and $$10^6 = 1{,}000{,}000$$, so $$D$$ lies between these — closer to $$10^6$$ since exponent is past the halfway $$5.5$$.\n- Step 3: More precisely: $$10^{5.6} \\approx 10^{0.6} \\times 10^5 \\approx 4 \\times 10^5 = 400{,}000$$. Since $$400{,}000 > 350{,}000$$, the charity exceeds its target. Yes ✓.\n\nOrder-of-magnitude check is faster than exact computation for \"can it\" questions.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "State the double-angle identity for $$\\sin 2A$$ and explain how $$8\\sin x \\cos x$$ is instantly rewritten as $$4\\sin 2x$$.", "answer": "Identity: $$\\sin 2A = 2\\sin A \\cos A$$.\n\n- Step 1: Recognise $$8\\sin x \\cos x = 4 \\cdot (2 \\sin x \\cos x)$$ — factor out enough to expose the $$2\\sin x \\cos x$$ pattern.\n- Step 2: Apply: $$2\\sin x \\cos x = \\sin 2x$$, so $$8\\sin x \\cos x = 4\\sin 2x$$.\n\nDerivation hint: comes from the compound angle $$\\sin(A + A) = \\sin A\\cos A + \\cos A \\sin A = 2\\sin A \\cos A$$.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "Write out the three equivalent forms of $$\\cos 2A$$ and briefly note when each is most useful.", "answer": "- Form 1: $$\\cos 2A = \\cos^2 A - \\sin^2 A$$. Useful when you want to factor products like $$(\\cos\\theta + \\sin\\theta)(\\cos\\theta - \\sin\\theta)$$.\n- Form 2: $$\\cos 2A = 2\\cos^2 A - 1$$. Useful when the expression contains only $$\\cos^2 A$$ and no $$\\sin^2 A$$.\n- Form 3: $$\\cos 2A = 1 - 2\\sin^2 A$$. Useful when the expression contains only $$\\sin^2 A$$.\n\nWhy three forms exist: applying $$\\sin^2 + \\cos^2 = 1$$ to Form 1 gives Forms 2 and 3. Choose the form that introduces the functions already present.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "State the rearranged identities for $$\\cos^2 A$$ and $$\\sin^2 A$$ in terms of $$\\cos 2A$$. Why are these rearrangements the ones you reach for in integration and linearisation problems?", "answer": "- $$\\cos^2 A = \\tfrac{1}{2}(1 + \\cos 2A)$$\n- $$\\sin^2 A = \\tfrac{1}{2}(1 - \\cos 2A)$$\n\nReason for usefulness:\n+ In **integration**: $$\\cos^2 A$$ has no elementary antiderivative as a product, but $$\\tfrac{1}{2}(1 + \\cos 2A)$$ is trivial to integrate term-by-term.\n+ In **linearisation** (converting into $$R\\sin(x+\\alpha)$$ form): you need expressions involving $$\\sin 2x$$ and $$\\cos 2x$$ (linear in these), not squares.\n\nDerivation: rearrange $$\\cos 2A = 2\\cos^2 A - 1$$ for $$\\cos^2 A$$, similarly for the other.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": true}, {"question": "When simplifying $$4\\cos^2 x - 3$$ to introduce $$\\cos 2x$$, the identity $$\\cos^2 x = \\tfrac{1}{2}(1 + \\cos 2x)$$ works cleanly while $$\\cos 2x = \\cos^2 x - \\sin^2 x$$ doesn't. Why?", "answer": "- Step 1: The goal is to *replace* $$\\cos^2 x$$ with something containing $$\\cos 2x$$ — eliminating the squared term.\n- Step 2: Identity 1 ($$\\cos^2 x = \\tfrac{1}{2}(1 + \\cos 2x)$$) directly substitutes: $$4 \\cdot \\tfrac{1}{2}(1 + \\cos 2x) - 3 = 2 + 2\\cos 2x - 3 = 2\\cos 2x - 1$$. Clean.\n- Step 3: Identity 2 ($$\\cos 2x = \\cos^2 x - \\sin^2 x$$) gives an expression for $$\\cos 2x$$ in terms of squared quantities — but we wanted to *eliminate* the squares, not compute $$\\cos 2x$$ from them. Going this direction introduces more $$\\sin^2 x$$ terms rather than simplifying.\n\nPrinciple: the identity you want is the one that expresses \"what you have\" in terms of \"what you want\".", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "Recognise and prove: why does $$(\\cos\\theta + \\sin\\theta)(\\cos\\theta - \\sin\\theta) = \\cos 2\\theta$$? Why is spotting this pattern useful in exam trig proofs?", "answer": "- Step 1: Apply difference of squares: $$(a+b)(a-b) = a^2 - b^2$$ with $$a = \\cos\\theta$$, $$b = \\sin\\theta$$, giving $$\\cos^2\\theta - \\sin^2\\theta$$.\n- Step 2: Recognise this is exactly one form of $$\\cos 2\\theta$$ (Form 1 above). So the product collapses to $$\\cos 2\\theta$$.\n- Step 3: Usefulness: in proofs involving $$\\cos\\theta \\pm \\sin\\theta$$ factors (common in P3), multiplying them together instantly kills the linear sines/cosines and yields a double angle. This is the \"act with respect to the answer\" move.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "Why does $$\\sin\\theta \\cos\\theta = \\tfrac{1}{2}\\sin 2\\theta$$ (not $$\\sin 2\\theta$$)? What's the common error in forgetting the factor?", "answer": "- Step 1: From $$\\sin 2\\theta = 2\\sin\\theta\\cos\\theta$$, divide both sides by 2: $$\\sin\\theta \\cos\\theta = \\tfrac{1}{2}\\sin 2\\theta$$.\n- Step 2: Common error: students write $$\\sin\\theta\\cos\\theta = \\sin 2\\theta$$, dropping the $$1/2$$. This doubles the magnitude.\n- Step 3: Quick sanity check at $$\\theta = \\pi/4$$: $$\\sin(\\pi/4)\\cos(\\pi/4) = (\\tfrac{\\sqrt2}{2})^2 = \\tfrac{1}{2}$$, and $$\\tfrac{1}{2}\\sin(\\pi/2) = \\tfrac{1}{2} \\cdot 1 = \\tfrac{1}{2}$$ ✓. The \"no-half\" version would give $$\\sin(\\pi/2) = 1 \\neq \\tfrac12$$ ✗.\n\nMemory aid: the \"$$2$$\" in $$\\sin 2A = 2\\sin A\\cos A$$ must go somewhere when you rearrange.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "State all four R-formula conversions (the $$a\\sin \\pm b\\cos$$ and $$a\\cos \\pm b\\sin$$ variants), including how $$R$$ and $$\\alpha$$ are computed in each.", "answer": "All four produce $$R = \\sqrt{a^2 + b^2}$$ and $$\\tan\\alpha = b/a$$ with $$0 < \\alpha < \\pi/2$$.\n\n- $$a\\sin x + b\\cos x = R\\sin(x + \\alpha)$$\n- $$a\\sin x - b\\cos x = R\\sin(x - \\alpha)$$\n- $$a\\cos x + b\\sin x = R\\cos(x - \\alpha)$$\n- $$a\\cos x - b\\sin x = R\\cos(x + \\alpha)$$\n\nPattern: match the *leading* trig function (whichever has coefficient $$a$$ as the conventional positive) and pair the sign of the second term with the sign inside $$(x \\pm \\alpha)$$:\n+ If $$+$$ between the terms and leading is sine → $$+\\alpha$$; leading is cosine → $$-\\alpha$$.\n+ If $$-$$ between the terms, flip the $$\\alpha$$ sign.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "Derive why $$a\\sin x + b\\cos x = R\\sin(x + \\alpha)$$ leads to $$R = \\sqrt{a^2 + b^2}$$ and $$\\tan\\alpha = b/a$$. (4 steps)", "answer": "- Step 1: Expand the target: $$R\\sin(x + \\alpha) = R(\\sin x\\cos\\alpha + \\cos x \\sin\\alpha) = (R\\cos\\alpha)\\sin x + (R\\sin\\alpha)\\cos x$$.\n- Step 2: Match coefficients with $$a\\sin x + b\\cos x$$: $$R\\cos\\alpha = a$$ and $$R\\sin\\alpha = b$$.\n- Step 3: Square and add: $$R^2\\cos^2\\alpha + R^2\\sin^2\\alpha = a^2 + b^2$$, so $$R^2 = a^2 + b^2$$ (using Pythagoras), giving $$R = \\sqrt{a^2 + b^2}$$.\n- Step 4: Divide: $$\\tfrac{R\\sin\\alpha}{R\\cos\\alpha} = \\tan\\alpha = b/a$$.\n\nTakeaway: the derivation is just the compound-angle formula in reverse, matching coefficients on sine and cosine.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "What's the PRACTICAL reason we rewrite $$a\\sin x + b\\cos x$$ as $$R\\sin(x + \\alpha)$$? Why is solving equations hard before this conversion?", "answer": "- Step 1: An expression like $$3\\sin 2x - 4\\cos 2x = 2$$ mixes two different trig functions. There's no identity that directly inverts \"$$3\\sin 2x - 4\\cos 2x$$\" to recover $$x$$.\n- Step 2: After R-conversion: $$5\\sin(2x - \\alpha) = 2 \\Rightarrow \\sin(2x - \\alpha) = 0.4$$. Now it's a single trig function — we can apply $$\\arcsin$$ and find solutions systematically.\n- Step 3: Mr Fuat's point: \"if we cannot write this in compact form, there is no way that we will be able to find $$\\theta$$.\" The R-formula is the *only* systematic route to solving such mixed equations.\n\nAlso, the R-form instantly reveals max/min values: $$\\max = R + c$$, $$\\min = -R + c$$.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": true}, {"question": "For the function $$f(x) = R\\sin(x + \\alpha) + c$$, state the maximum and minimum values, and identify the $$x + \\alpha$$ values where each occurs.", "answer": "Since $$-1 \\leq \\sin(\\text{anything}) \\leq 1$$:\n\n- **Maximum**: $$f_{\\max} = R \\cdot 1 + c = R + c$$, occurring when $$\\sin(x + \\alpha) = 1$$, i.e., $$x + \\alpha = \\tfrac{\\pi}{2} + 2n\\pi$$ for integer $$n$$.\n- **Minimum**: $$f_{\\min} = R \\cdot (-1) + c = -R + c$$, occurring when $$\\sin(x + \\alpha) = -1$$, i.e., $$x + \\alpha = -\\tfrac{\\pi}{2} + 2n\\pi$$ (equivalently $$\\tfrac{3\\pi}{2} + 2n\\pi$$).\n\nKey insight: since $$R > 0$$, the range of $$f$$ is exactly $$[c - R, c + R]$$, a shift-and-stretch of $$[-1, 1]$$.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "The function $$f(x) = 2\\sqrt{5}\\sin(2x + 0.464) - 1$$ achieves its maximum where $$\\sin(2x + 0.464) = 1$$. Conceptually describe finding the second smallest positive $$x$$ achieving the max. (3 steps)", "answer": "- Step 1: Condition: $$2x + 0.464 = \\tfrac{\\pi}{2} + 2n\\pi$$ for integer $$n \\geq 0$$ (since we want positive $$x$$).\n- Step 2: Solve for $$x$$: $$x = \\tfrac{\\pi/2 - 0.464 + 2n\\pi}{2}$$. Enumerate:\n+ $$n = 0$$: $$x_1 = \\tfrac{\\pi/2 - 0.464}{2} \\approx 0.553$$ (first smallest positive)\n+ $$n = 1$$: $$x_2 = \\tfrac{\\pi/2 - 0.464 + 2\\pi}{2} \\approx 3.70$$ (second smallest positive)\n- Step 3: Answer: second smallest positive $$x \\approx 3.70$$.\n\nConceptual point: sine hits 1 periodically at intervals of $$2\\pi$$ in its argument; thus successive solutions differ by $$\\pi$$ in $$x$$ (due to the \"$$2$$\" in $$2x$$).", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "To show $$f(x) = x^4 - 5x^2 + 4x - 7 = 0$$ has a root in $$[2, 3]$$, what three things must you state or verify? (3 steps)", "answer": "- Step 1: **Compute endpoints**: $$f(2) = 16 - 20 + 8 - 7 = -3$$ (negative) and $$f(3) = 81 - 45 + 12 - 7 = 41$$ (positive).\n- Step 2: **State continuity**: $$f$$ is a polynomial, hence continuous on $$\\mathbb{R}$$ (and in particular on $$[2, 3]$$).\n- Step 3: **Invoke IVT / sign change theorem**: since $$f$$ is continuous and $$f(2) \\cdot f(3) < 0$$, there exists $$\\alpha \\in (2, 3)$$ with $$f(\\alpha) = 0$$. QED.\n\nMissing any one (continuity mention, both endpoint signs, or the \"therefore\" step) loses marks — it's three ingredients, not just the arithmetic.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "For a sign-change argument over interval $$[a, b]$$, why is it preferable to use simple integers like $$[2, 3]$$ rather than decimals like $$[2.1, 2.5]$$?", "answer": "- Step 1: Arithmetic cleanness: plugging integers into a polynomial gives integer outputs — no rounding errors and easy to verify.\n- Step 2: Marker efficiency: examiners expect you to use the interval the question gives you. Inventing decimals slows you down and introduces chances for arithmetic mistakes.\n- Step 3: Principle from Mr Fuat: \"Take 2 and 3\" — use the endpoints the problem states, don't overthink.\n\nEdge case: if the question asks you to show a root in a non-integer interval, you must use those endpoints; don't substitute nearby integers.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "Given $$x^4 - 5x^2 + 4x - 7 = 0$$ and a target iteration formula $$x = \\sqrt[3]{\\tfrac{5x^2 - 4x + 7}{x}}$$, describe the \"act with respect to the answer\" rearrangement strategy. (4 steps)", "answer": "- Step 1: Inspect the target: it has a cube root, and the inside is \"stuff/x\". So after cubing and multiplying, you'd have $$x^3 \\cdot x = 5x^2 - 4x + 7$$, i.e., $$x^4 = 5x^2 - 4x + 7$$.\n- Step 2: Starting from the original equation: $$x^4 - 5x^2 + 4x - 7 = 0 \\Rightarrow x^4 = 5x^2 - 4x + 7$$. This already matches.\n- Step 3: Divide both sides by $$x$$ (valid for $$\\alpha \\neq 0$$): $$x^3 = \\tfrac{5x^2 - 4x + 7}{x}$$.\n- Step 4: Cube-root both sides: $$x = \\sqrt[3]{\\tfrac{5x^2 - 4x + 7}{x}}$$. Matches target ✓.\n\nStrategy: look at where the highest power sits in the target; arrange the original to match that power, then apply the inverse operation (cube root here).", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "When performing iteration $$x_{n+1} = g(x_n)$$ on a calculator, why is the ANS button method preferred over typing the previous answer manually?", "answer": "- Step 1: Accuracy: the ANS button stores the full calculator precision (often 10+ significant figures). Manual re-entry requires you to round and re-type, introducing tiny errors that accumulate over many iterations.\n- Step 2: Speed: ANS allows you to type the formula once and hit $$=$$ repeatedly. Manual re-typing is tedious and error-prone in exam conditions.\n- Step 3: Consistency: ANS guarantees you're iterating on the exact stored value, not a truncated version. Mr Fuat: \"The results shouldn't change after four decimal places\" — this is only guaranteed with full precision.\n\nPractical: type the starting value, press $$=$$, then type the formula using \"ANS\" in place of $$x_n$$, press $$=$$ repeatedly.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "When performing iterative numerical root-finding, what operational criterion tells you to stop and report convergence to a given decimal-place accuracy?", "answer": "Rule: **stop when successive values agree to the required number of decimal places**.\n\n- Step 1: Compute $$x_n, x_{n+1}, x_{n+2}, \\ldots$$ using the iteration.\n- Step 2: Compare $$x_{n+1}$$ and $$x_n$$ rounded to the required d.p. If identical, check one more (e.g., $$x_{n+2}$$) to confirm stability.\n- Step 3: Report that rounded value as $$\\alpha$$.\n\nExample: if 4 d.p. is required and $$x_5 = 2.1471$$, $$x_6 = 2.1472$$, $$x_7 = 2.1472$$ — you can report $$\\alpha = 2.1472$$ (4 d.p.). The agreement across multiple iterations is key.\n\nToo early = wrong answer; too late = wasted time.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "What mathematical condition on $$g(x)$$ determines whether the iteration $$x_{n+1} = g(x_n)$$ will converge to a root $$\\alpha$$ of $$x = g(x)$$?", "answer": "Convergence condition: $$|g'(\\alpha)| < 1$$ near the root.\n\n- Step 1: Intuition: the iteration moves from $$x_n$$ to $$g(x_n)$$. If the slope of $$g$$ at $$\\alpha$$ is less than 1 in magnitude, errors shrink at each step (contraction), so the sequence converges.\n- Step 2: If $$|g'(\\alpha)| > 1$$, errors amplify at each step — sequence diverges.\n- Step 3: Edge case $$|g'(\\alpha)| = 1$$: indeterminate, may neither converge nor diverge cleanly.\n\nPractical: different rearrangements $$x = g(x)$$ of the same equation $$f(x) = 0$$ can have very different convergence behaviour. If one fails, try another.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "To differentiate $$f(x) = 2e^{3\\sin x}\\cos x$$, describe the structure of the derivative using the product rule and chain rule.", "answer": "- Step 1: Identify product: $$u = 2e^{3\\sin x}$$ and $$v = \\cos x$$.\n- Step 2: Find $$u'$$ via chain rule: outer is $$2e^{\\cdot}$$, inner is $$3\\sin x$$. So $$u' = 2e^{3\\sin x} \\cdot 3\\cos x = 6\\cos x \\cdot e^{3\\sin x}$$.\n- Step 3: $$v' = -\\sin x$$ directly.\n- Step 4: Apply product rule: $$f'(x) = u'v + uv' = 6\\cos x \\cdot e^{3\\sin x} \\cdot \\cos x + 2e^{3\\sin x}(-\\sin x) = 2e^{3\\sin x}(3\\cos^2 x - \\sin x)$$.\n\nKey move: factor out $$2e^{3\\sin x}$$ at the end — this is always a positive factor and simplifies finding roots of $$f'$$.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "The derivative of $$f(x) = 2e^{3\\sin x}\\cos x$$ factors as $$f'(x) = 2e^{3\\sin x}(3\\cos^2 x - \\sin x)$$. To solve $$f'(x) = 0$$, why can you immediately dismiss one factor?", "answer": "- Step 1: Key property: the exponential function is **strictly positive** for all real inputs, i.e., $$e^{3\\sin x} > 0$$ always. Hence $$2e^{3\\sin x} > 0$$.\n- Step 2: For a product to equal zero, at least one factor must be zero. Since $$2e^{3\\sin x}$$ can never be zero, the other factor must satisfy: $$3\\cos^2 x - \\sin x = 0$$.\n- Step 3: This reduces a transcendental equation to a solvable trig equation.\n\nPhuc's key lesson: \"If one factor can't be zero, the other must be zero.\" This \"dismiss the positive factor\" trick is enormously useful with exponentials, always-positive quadratic denominators, etc.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": true}, {"question": "Starting from $$3\\cos^2 x - \\sin x = 0$$, show how to rewrite as a quadratic in $$\\sin x$$ using Pythagoras. (3 steps)", "answer": "- Step 1: Apply Pythagoras: $$\\cos^2 x = 1 - \\sin^2 x$$. Substitute: $$3(1 - \\sin^2 x) - \\sin x = 0$$.\n- Step 2: Expand: $$3 - 3\\sin^2 x - \\sin x = 0$$.\n- Step 3: Rearrange to standard form (coefficient of $$\\sin^2 x$$ positive): $$3\\sin^2 x + \\sin x - 3 = 0$$. This is a quadratic in $$\\sin x$$ with $$a = 3$$, $$b = 1$$, $$c = -3$$.\n\nNow solvable by the quadratic formula: $$\\sin x = \\tfrac{-1 \\pm \\sqrt{1 + 36}}{6} = \\tfrac{-1 \\pm \\sqrt{37}}{6}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "A quadratic in $$\\sin x$$ gives two candidate values: $$\\sin x \\approx 0.847$$ and $$\\sin x \\approx -1.181$$. Explain why one must be rejected.", "answer": "- Step 1: Recall the fundamental bound: $$-1 \\leq \\sin x \\leq 1$$ for all real $$x$$.\n- Step 2: $$\\sin x \\approx -1.181$$ violates this bound — no real $$x$$ exists producing this sine value.\n- Step 3: Reject this candidate. Only $$\\sin x \\approx 0.847$$ is admissible, which gives $$x \\approx \\arcsin(0.847) \\approx 1.012$$ and its reflection $$x = \\pi - 1.012 \\approx 2.130$$.\n\nAlways sanity-check solutions against the domain/range of the functions involved.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": false}, {"question": "A function has turning points at $$x_1 \\approx 1.012$$ and $$x_2 \\approx 2.130$$. You're told turning point $$Q$$ lies below the $$x$$-axis. How do you determine which $$x$$-value corresponds to $$Q$$?", "answer": "- Step 1: Substitute each $$x$$ back into the **original** function (not the derivative) to find the corresponding $$y$$-value.\n- Step 2: Compare signs. For $$f(x) = 2e^{3\\sin x}\\cos x$$:\n+ $$x_1 \\approx 1.012$$: in the first quadrant, so $$\\cos x > 0 \\Rightarrow f(x_1) > 0$$ (above axis).\n+ $$x_2 \\approx 2.130$$: in the second quadrant, so $$\\cos x < 0 \\Rightarrow f(x_2) < 0$$ (below axis).\n- Step 3: Since $$Q$$ is below the axis, $$x_Q \\approx 2.130$$.\n\nQuick tip: for functions of form $$(\\text{positive}) \\cdot \\cos x$$, the sign of $$f$$ follows the sign of $$\\cos x$$ — use quadrants to identify.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": false}, {"question": "State the logical principle: \"If a product $$A \\cdot B = 0$$ and $$A$$ can never be zero, then ___.\" Give a calculus example where this applies.", "answer": "Principle: if $$A \\cdot B = 0$$ and $$A$$ is never zero (i.e., $$A \\neq 0$$ for all inputs in the domain), then $$B = 0$$ is the **only** way for the product to vanish.\n\nCalculus example: $$f'(x) = 2e^{3\\sin x}(3\\cos^2 x - \\sin x)$$.\n- Step 1: Here $$A = 2e^{3\\sin x}$$ is always positive (exponentials never vanish).\n- Step 2: So $$f'(x) = 0 \\Leftrightarrow 3\\cos^2 x - \\sin x = 0$$ — the bracket must be zero.\n\nOther examples:\n+ $$x(x^2 + 1) = 0 \\Rightarrow x = 0$$ (since $$x^2 + 1 > 0$$ always).\n+ $$(1 + e^{-kt})(\\text{stuff}) = 0 \\Rightarrow \\text{stuff} = 0$$ (since $$1 + e^{-kt} > 0$$).\n\nThis trick converts hard equations into simpler ones by eliminating \"dead\" factors.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": true}, {"question": "For $$fg(x)$$ with $$f(x) = 2 + 5\\ln x$$ and $$g(x) = \\tfrac{6x - 2}{2x + 1}$$ (domain $$x > 0$$), describe the procedure to find the range of $$fg$$. (4 steps)", "answer": "- Step 1: Find the **range of $$g$$** first. For $$x > 0$$: at $$x = 0^+$$, $$g \\to -2/1 = -2$$... (but note the original domain constraint); more carefully, $$g$$ is increasing (see Q46), so its range is between $$g$$ evaluated at the domain endpoints. The range of $$g$$ turns out to be $$(0, 3)$$ on the specified domain.\n- Step 2: Use this range as the **input domain for $$f$$**. So $$f$$ is evaluated on $$(0, 3)$$.\n- Step 3: $$f$$ is $$2 + 5\\ln x$$: as $$x \\to 0^+$$, $$\\ln x \\to -\\infty$$ so $$f \\to -\\infty$$; at $$x = 3$$, $$f = 2 + 5\\ln 3$$.\n- Step 4: So the range of $$fg$$ is $$(-\\infty, 2 + 5\\ln 3)$$ — open on both ends if neither endpoint is attained.\n\nMeta-rule: range of composite = apply outer function to range of inner function.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": false}, {"question": "For $$g(x) = \\tfrac{6x - 2}{2x + 1}$$, use calculus to prove $$g$$ is increasing on its domain. What feature of the derivative guarantees the result? (3 steps)", "answer": "- Step 1: Apply quotient rule with $$u = 6x - 2$$, $$v = 2x + 1$$: $$g'(x) = \\tfrac{u'v - uv'}{v^2} = \\tfrac{6(2x+1) - (6x-2)(2)}{(2x+1)^2}$$.\n- Step 2: Simplify numerator: $$6(2x+1) - 2(6x-2) = 12x + 6 - 12x + 4 = 10$$.\n- Step 3: So $$g'(x) = \\tfrac{10}{(2x+1)^2}$$. The numerator is $$+10 > 0$$, the denominator $$(2x+1)^2 > 0$$ whenever $$2x + 1 \\neq 0$$. Hence $$g'(x) > 0$$ for all $$x$$ in the domain, proving $$g$$ is strictly increasing.\n\nKey feature: the squared denominator guarantees positivity (except at the excluded point), so sign is dictated entirely by the (constant, positive) numerator.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": false}, {"question": "State the quotient rule for differentiating $$\\tfrac{u}{v}$$, and explain the *order* of terms in the numerator (why $$u'v - uv'$$ and not the other way).", "answer": "Quotient rule: $$\\left(\\tfrac{u}{v}\\right)' = \\tfrac{u'v - uv'}{v^2}$$.\n\n- Step 1: The numerator has $$u'v$$ **first** and $$uv'$$ **second**, with a minus sign in between.\n- Step 2: Order matters because subtraction is not commutative: $$u'v - uv' \\neq uv' - u'v$$ (they're negatives of each other).\n- Step 3: Mnemonic: \"Hi-dee-low minus Low-dee-hi over Low-squared\" — differentiate the top first, keep the bottom; then keep the top, differentiate the bottom; subtract; divide by bottom squared.\n\nFlipping the order gives the **negative** of the correct answer, which changes the sign of $$g'$$ and potentially reverses \"increasing\" vs \"decreasing\" conclusions.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": false}, {"question": "Why is it insufficient to \"prove $$f$$ is decreasing\" by plugging in a single $$x$$-value and showing $$f'$$ is negative there?", "answer": "- Step 1: \"Decreasing\" is a **global** property over an interval — it requires $$f'(x) < 0$$ for ALL $$x$$ in the domain, not just at one point.\n- Step 2: A function can locally have negative slope at one point but positive slope elsewhere (e.g., a function with a local min that ascends afterward). One data point doesn't establish the global behaviour.\n- Step 3: Proper proof must either (a) show $$f'(x)$$ has a universally negative sign via its algebraic structure (e.g., $$-10/\\text{square}$$ is negative because numerator is negative and square is positive), or (b) reason about monotonicity via algebraic manipulation.\n\nRule: **structural** argument over the entire domain, not point-evaluation.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": false}, {"question": "Why is it a bad strategy to combine $$\\tfrac{2x^2 - 32}{3x^2 + 7x - 20} + \\tfrac{8}{3x - 5}$$ by finding a common denominator before simplifying each piece?", "answer": "- Step 1: Combining via common denominator creates an enormous expression (degree 4 numerator, degree 3 denominator) with little visible simplification.\n- Step 2: Instead, factorise each term first: $$2x^2 - 32 = 2(x-4)(x+4)$$ and $$3x^2 + 7x - 20 = (3x-5)(x+4)$$. The $$(x+4)$$ factors *cancel*: $$\\tfrac{2(x-4)(x+4)}{(3x-5)(x+4)} = \\tfrac{2(x-4)}{3x-5}$$.\n- Step 3: Now both fractions already share denominator $$3x - 5$$ — trivially combine: $$\\tfrac{2(x-4) + 8}{3x - 5} = \\tfrac{2x}{3x-5}$$.\n\nMr Fuat: \"Just try to simplify and refactor as much as possible — the question is set up so things cancel.\" Starting with brute force creates \"a big mess\" that you then have to unpick.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": false}, {"question": "Outline the general procedure for finding the inverse of $$g(x) = 3 + 2\\ln x$$, and state the domain of $$g^{-1}$$. (4 steps)", "answer": "- Step 1: Write $$y = g(x)$$: $$y = 3 + 2\\ln x$$.\n- Step 2: Solve for $$x$$ in terms of $$y$$: $$y - 3 = 2\\ln x \\Rightarrow \\ln x = \\tfrac{y-3}{2} \\Rightarrow x = e^{(y-3)/2}$$.\n- Step 3: Swap labels $$x \\leftrightarrow y$$: $$g^{-1}(x) = e^{(x-3)/2}$$.\n- Step 4: Domain of $$g^{-1}$$ = **range of $$g$$**. Since $$g$$ has domain $$x \\geq 1$$, $$g(1) = 3$$ is the minimum; $$g \\to \\infty$$ as $$x \\to \\infty$$. So range of $$g = [3, \\infty)$$, and hence domain of $$g^{-1} = [3, \\infty)$$.\n\nKey principle: \"domain of inverse = range of original\" and vice versa.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": false}, {"question": "Solve conceptually: $$gf(a) = 5$$ where $$f(a) = \\tfrac{2a}{3a - 5}$$ and $$g(x) = 3 + 2\\ln x$$. (4 steps)", "answer": "- Step 1: Unwrap the composition. $$gf(a) = g(f(a)) = 3 + 2\\ln(f(a)) = 3 + 2\\ln\\left(\\tfrac{2a}{3a-5}\\right)$$.\n- Step 2: Set equal to 5: $$3 + 2\\ln\\left(\\tfrac{2a}{3a-5}\\right) = 5 \\Rightarrow \\ln\\left(\\tfrac{2a}{3a-5}\\right) = 1$$.\n- Step 3: Exponentiate: $$\\tfrac{2a}{3a-5} = e^1 = e$$.\n- Step 4: Solve: $$2a = e(3a - 5) = 3ea - 5e \\Rightarrow 2a - 3ea = -5e \\Rightarrow a(2 - 3e) = -5e \\Rightarrow a = \\tfrac{-5e}{2 - 3e} = \\tfrac{5e}{3e - 2}$$.\n\nComposite mechanics: \"apply $$f$$ first, then apply $$g$$\" — unwrap from the outside in.", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": false}, {"question": "In the model $$T = 10 + Ae^{-Bt}$$ with initial temperature $$T(0) = 18$$, find $$A$$. What key property of $$e^0$$ catches many students?", "answer": "- Step 1: Substitute $$t = 0$$: $$T(0) = 10 + A \\cdot e^{0}$$.\n- Step 2: Critical property: **$$e^0 = 1$$** (not 0!). This comes from the power rule $$a^0 = 1$$ for any nonzero base.\n- Step 3: So $$18 = 10 + A \\cdot 1 = 10 + A$$, giving $$A = 8$$.\n\nCommon error: writing $$e^0 = 0$$ by confusion with $$\\ln 1 = 0$$ (which *is* zero). These are inverse operations: exponential at zero is 1; log at 1 is 0.\n\nSanity: $$e^0 = e^{x - x} = e^x / e^x = 1$$.", "source": "Opus 4.7 ②", "_id": "
