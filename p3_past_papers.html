<script>
const DATA={"selected": [{"question": "Why is the result $$\\int \\dfrac{1}{ax+b}\\, dx = \\dfrac{1}{a}\\ln|ax+b| + C$$, and why does the $$\\dfrac{1}{a}$$ factor appear? (3 steps)", "answer": "- Step 1: Recall the basic result $$\\int \\dfrac{1}{u}\\, du = \\ln|u| + C$$. We want to use this with $$u = ax+b$$.\n- Step 2: Then $$du = a\\, dx$$, so $$dx = \\dfrac{1}{a}du$$. Substitute: $$\\int \\dfrac{1}{ax+b}dx = \\int \\dfrac{1}{u} \\cdot \\dfrac{1}{a}\\, du = \\dfrac{1}{a}\\ln|u| + C$$.\n- Step 3: Re-substituting: $$= \\dfrac{1}{a}\\ln|ax+b| + C$$. The $$1/a$$ factor compensates for the chain rule: differentiating $$\\ln|ax+b|$$ gives $$\\dfrac{a}{ax+b}$$, so the antiderivative of $$\\dfrac{1}{ax+b}$$ must include $$1/a$$ to cancel the $$a$$.\n\nCommon error: forgetting the $$1/a$$ entirely. If $$a=1$$ it doesn't bite, but for $$\\int \\dfrac{1}{3x+1}dx$$, the answer is $$\\dfrac{1}{3}\\ln|3x+1| + C$$, not $$\\ln|3x+1| + C$$.", "source": "Opus 4.7 ①", "_id": "opus_1_12"}, {"question": "You want to integrate an expression and get the form $$\\lambda \\ln 10$$. After substitution, you get $$\\tfrac{16}{27}[\\ln|x - c|]_1^3$$ evaluated. Describe conceptually how to get the specific target $$\\ln 10$$.", "answer": "- Step 1: Evaluate: $$[\\ln|x - c|]_1^3 = \\ln|3 - c| - \\ln|1 - c|$$.\n- Step 2: Use quotient rule of logs: $$= \\ln\\left(\\left|\\tfrac{3 - c}{1 - c}\\right|\\right)$$ — combining the difference of logs into a single log.\n- Step 3: The value of $$c$$ is chosen so that $$\\left|\\tfrac{3 - c}{1 - c}\\right| = 10$$ — e.g., $$c = 7/3$$ gives $$\\tfrac{20/3}{2/3} = 10$$. Then the integral evaluates to $$\\tfrac{16}{27} \\ln 10$$, so $$\\lambda = \\tfrac{16}{27}$$.\n\nMeta: the exam-setter engineered $$c$$ to produce a clean $$\\ln 10$$. Always combine logs before reading off constants.", "source": "Opus 4.7 ②", "_id": "opus_2_104"}, {"question": "Why is integrating the result of polynomial division, such as $$g(x) = 2x-1 + \\frac{6}{x-2}$$, straightforward term-by-term, and why does the remainder constant $$C$$ become the coefficient of the logarithm? (2 steps)", "answer": "- Step 1: Integration is linear, so $$\\int(2x-1)\\,dx + \\int\\frac{6}{x-2}\\,dx$$ splits cleanly. The polynomial integrates to standard power terms: $$x^{2} - x$$.\n- Step 2: The remainder term is $$6 \\cdot \\frac{1}{x-2}$$. The constant $$6$$ factors out, and the integral of $$\\frac{1}{x-2}$$ is $$\\ln|x-2|$$ (with $$a=1$$). Thus the remainder constant becomes the coefficient $$\\beta$$ in the final $$\\beta\\ln(\\cdot)$$ term. This is why polynomial division is so powerful for integration: it isolates the logarithmic contribution cleanly.", "source": "Kimi K2.6 ①", "_id": "kimi_1_35"}, {"question": "For the transformation $$y = f(2x)$$, what is the horizontal scale factor (and why), and what is the image of $$(-4, -3)$$ on $$y = f(x)$$?", "answer": "- Step 1: Horizontal scale factor = $$1/2$$ (not 2!). The \"$$2$$\" inside compresses the graph horizontally.\n- Step 2: Why: to get the same $$y$$-value as $$f$$ originally had at some point $$a$$, the new function needs $$2x = a$$, i.e., $$x = a/2$$. So every $$x$$-coordinate is halved.\n- Step 3: For $$(-4, -3)$$: new $$x = -4/2 = -2$$; $$y$$ unchanged. Image: $$(-2, -3)$$.\n\nMr Fuat: \"Scale factor is actually a half, that's why we divide by 2 for the $$x$$.\" Common confusion: thinking \"2x\" means \"twice as wide\" — it's the opposite.\n\nRule: inside-the-function transformations are \"opposite\" of what they look like.", "source": "Opus 4.7 ②", "_id": "opus_2_78"}, {"question": "State the **sign-change theorem** (Intermediate Value Theorem) used to locate roots, and the two conditions you must verify to apply it.", "answer": "Step 1: Statement: if $$f$$ is **continuous** on the closed interval $$[a, b]$$ and the values $$f(a)$$ and $$f(b)$$ have **opposite signs** (i.e. $$f(a) \\cdot f(b) < 0$$), then there exists at least one $$c \\in (a, b)$$ with $$f(c) = 0$$. Step 2: First condition: continuity. Polynomials, $$\\sin$$, $$\\cos$$, $$e^x$$, $$\\ln x$$ (on its domain) are continuous; rational functions are continuous wherever the denominator is nonzero. Step 3: Second condition: opposite signs. Compute $$f(a)$$ and $$f(b)$$ and verify one is positive, the other negative. Without both conditions stated, you don't have a complete proof — the examiner typically requires you to mention continuity explicitly.", "source": "Opus 4.7 ①", "_id": "opus_1_38"}, {"question": "In simplifying $$\\tfrac{2(x-4)(x+4)}{(3x-5)(x+4)}$$, why is cancelling $$(x+4)$$ valid, and under what domain constraint should you verify?", "answer": "- Step 1: Cancellation of a factor requires that factor to be **nonzero** in the domain of interest.\n- Step 2: $$(x + 4) = 0$$ would require $$x = -4$$. The question specifies $$x > 2$$, so $$x = -4$$ is excluded. Hence $$(x + 4) \\neq 0$$ throughout the domain.\n- Step 3: Cancellation is valid: $$\\tfrac{2(x-4)(x+4)}{(3x-5)(x+4)} = \\tfrac{2(x-4)}{3x-5}$$ for $$x > 2$$.\n\nSubtlety: without the domain constraint, $$x = -4$$ would be a \"removable discontinuity\" — the simplified function is defined there, but the original isn't.", "source": "Opus 4.7 ②", "_id": "opus_2_86"}, {"question": "Why can the temperature in the model $$T = 10 + 8e^{-Bt}$$ never fall to 5°C? Give the conceptual argument. (2 steps)", "answer": "- Step 1: As $$t \\to \\infty$$, $$e^{-Bt} \\to 0$$, so $$T \\to 10 + 0 = 10$$°C. The horizontal asymptote is 10°C. Furthermore, since $$e^{-Bt} > 0$$ for all finite $$t$$ (the exponential function is always positive), we have $$8e^{-Bt} > 0$$, so $$T = 10 + 8e^{-Bt} > 10$$ for all finite $$t$$.\n- Step 2: Since $$T > 10$$ always and approaches 10 only in the limit, $$T$$ can never reach 5°C. The key principle: if a product equals zero and one factor cannot be zero, the other factor must account for it. Here, $$T - 10 = 8e^{-Bt} > 0$$ always, so $$T - 10$$ can never be zero or negative.", "source": "GLM 5.1 ②", "_id": "glm_2_30"}, {"question": "How do you systematically solve a modulus inequality like $ |2x - 5| > 6x $? (4 steps)", "answer": "- Step 1: **Identify critical point** by solving $ 2x - 5 = 0 $: $ x = \\frac{5}{2} $. This divides the number line into regions where $ 2x - 5 $ is non-negative or negative.  \n- Step 2: **Case 1 (x ≥ 5/2)**: Remove modulus as $ 2x - 5 > 6x $. Solve: $ -5 > 4x $ → $ x < 0 $. However, this contradicts $ x ≥ 5/2 $, so **no solution** in this case.  \n- Step 3: **Case 2 (x < 5/2)**: Remove modulus as $ -(2x - 5) > 6x $. Solve: $ 5 - 2x > 6x $ → $ 5 > 8x $ → $ x < \\frac{5}{8} $. This interval overlaps with $ x < 5/2 $, so valid solutions are $ x < \\frac{5}{8} $.  \n- Step 4: **Combine results**: Solution is $ x < \\frac{5}{8} $. Always validate against the original inequality to avoid extraneous solutions.  \n\n**Pitfall Alert**: Why must you check overlap between solution and case region?  \n+ Answer: Because the case definition (e.g., $ x < 5/2 $) restricts the domain. A solution derived within a case must lie within that domain.", "source": "Qwen 3 ②", "_id": "qwen_2_3"}, {"question": "State the logical principle: \"If a product $$A \\cdot B = 0$$ and $$A$$ can never be zero, then ___.\" Give a calculus example where this applies.", "answer": "Principle: if $$A \\cdot B = 0$$ and $$A$$ is never zero (i.e., $$A \\neq 0$$ for all inputs in the domain), then $$B = 0$$ is the **only** way for the product to vanish.\n\nCalculus example: $$f'(x) = 2e^{3\\sin x}(3\\cos^2 x - \\sin x)$$.\n- Step 1: Here $$A = 2e^{3\\sin x}$$ is always positive (exponentials never vanish).\n- Step 2: So $$f'(x) = 0 \\Leftrightarrow 3\\cos^2 x - \\sin x = 0$$ — the bracket must be zero.\n\nOther examples:\n+ $$x(x^2 + 1) = 0 \\Rightarrow x = 0$$ (since $$x^2 + 1 > 0$$ always).\n+ $$(1 + e^{-kt})(\\text{stuff}) = 0 \\Rightarrow \\text{stuff} = 0$$ (since $$1 + e^{-kt} > 0$$).\n\nThis trick converts hard equations into simpler ones by eliminating \"dead\" factors.", "source": "Opus 4.7 ②", "_id": "opus_2_43"}, {"question": "Given $$\\log_{10} D = 1.04 + 0.38T$$, how do you convert to the form $$D = ab^T$$, and what is the key algebraic step? (3 steps)", "answer": "- Step 1: Raise 10 to both sides (same base as the logarithm): $$D = 10^{1.04 + 0.38T}$$.\n- Step 2: Split using index laws: $$D = 10^{1.04} \\cdot 10^{0.38T}$$. The key algebraic step is rewriting $$10^{0.38T} = (10^{0.38})^T$$, which isolates the $$T$$ in the exponent as a simple multiplier.\n- Step 3: Read off $$a = 10^{1.04} \\approx 10.96$$ and $$b = 10^{0.38} \\approx 2.399$$. Hence $$D \\approx 10.96 \\times 2.399^T$$. Without splitting the exponent, you can't identify $$b$$.", "source": "GLM 5.1 ①", "_id": "glm_1_16"}, {"question": "A student wants to solve $$e^{-45B} = 3/4$$. They take $$\\log_{10}$$ instead of $$\\ln$$. Does this work?", "answer": "Yes, but it's inefficient.\n\n- Step 1: $$\\log_{10}(e^{-45B}) = \\log_{10}(3/4)$$.\n- Step 2: Apply power rule: $$-45B \\cdot \\log_{10}(e) = \\log_{10}(3/4)$$.\n- Step 3: Solve: $$B = \\tfrac{\\log_{10}(3/4)}{-45 \\log_{10}(e)} = \\tfrac{\\log_{10}(4/3)}{45 \\log_{10}(e)}$$.\n\nComparison with $$\\ln$$: using $$\\ln$$ directly, since $$\\ln(e) = 1$$, gives $$-45B = \\ln(3/4)$$, so $$B = \\ln(4/3)/45$$ — cleaner.\n\nRule: match the log base to the exponential base (use $$\\ln$$ for $$e^{\\cdot}$$, use $$\\log_{10}$$ for $$10^{\\cdot}$$). Anything else works but requires dragging extra factors.", "source": "Opus 4.7 ②", "_id": "opus_2_128"}, {"question": "Convert $$f(x) = 8\\sin x\\cos x + 4\\cos^2 x - 3$$ into the form $$a\\sin 2x + b\\cos 2x + c$$. Why is $$\\cos^2 x \\to \\tfrac{1}{2}(1+\\cos 2x)$$ the right substitution here, not $$\\cos 2x = \\cos^2 x - \\sin^2 x$$? (4 steps)", "answer": "- Step 1: For $$8\\sin x\\cos x$$: use $$\\sin 2x = 2\\sin x\\cos x$$, so $$8\\sin x\\cos x = 4 \\cdot 2\\sin x\\cos x = 4\\sin 2x$$.\n- Step 2: For $$4\\cos^2 x$$: target form needs $$\\cos 2x$$. Use $$\\cos^2 x = \\tfrac{1}{2}(1+\\cos 2x)$$ → $$4\\cos^2 x = 2 + 2\\cos 2x$$. Why this form? Because it directly produces $$\\cos 2x$$ plus a constant, fitting the target with one term per double angle. The form $$\\cos 2x = \\cos^2 x - \\sin^2 x$$ wouldn't help — it expresses $$\\cos 2x$$ in terms of $$\\cos^2 x, \\sin^2 x$$, which is the wrong direction.\n- Step 3: Combine: $$f(x) = 4\\sin 2x + 2 + 2\\cos 2x - 3 = 4\\sin 2x + 2\\cos 2x - 1$$.\n- Step 4: Read off $$a = 4, b = 2, c = -1$$.\n\nThe strategic principle: *act with respect to the target form*. Choose the identity that introduces what the answer needs.", "source": "Opus 4.7 ①", "_id": "opus_1_26"}, {"question": "When converting $$3\\sin 2x - 4\\cos 2x$$ to R-formula, why do you use $$R\\sin(2x - \\alpha)$$ instead of $$R\\sin(2x + \\alpha)$$? (2 steps)", "answer": "- Step 1: The sign pattern determines the form. Here the $$\\cos$$ term has a negative coefficient ($$-4$$), so we use the variant $$a\\sin x - b\\cos x = R\\sin(x - \\alpha)$$ with $$a = 3, b = 4$$.\n- Step 2: Expanding $$R\\sin(2x - \\alpha) = R\\sin 2x\\cos\\alpha - R\\cos 2x\\sin\\alpha$$. Matching: $$R\\cos\\alpha = 3$$ (positive, matches $$+3\\sin 2x$$) and $$R\\sin\\alpha = 4$$ (the minus sign in the expansion gives $$-R\\sin\\alpha\\cos 2x = -4\\cos 2x$$, so $$R\\sin\\alpha = 4$$). If we used $$R\\sin(2x + \\alpha)$$, the expansion would give $$+R\\sin\\alpha\\cos 2x$$, which would need to equal $$-4\\cos 2x$$, requiring $$R\\sin\\alpha = -4$$ — inconsistent with $$\\alpha$$ in the first quadrant.", "source": "GLM 5.1 ①", "_id": "glm_1_28"}, {"question": "Misconception probe: A student computes $$\\int_4^8 \\dfrac{6}{x-2}dx$$ and writes the answer as $$6(\\ln 6 - \\ln 2) = 6\\ln 4$$. What's the algebra error?", "answer": "Step 1: $$6\\ln 6 - 6\\ln 2 = 6(\\ln 6 - \\ln 2) = 6\\ln(6/2) = 6\\ln 3$$, not $$6\\ln 4$$. Step 2: The error: the student probably did $$\\ln 6 - \\ln 2 = \\ln(6 - 2) = \\ln 4$$ — confusing $$\\ln A - \\ln B = \\ln(A/B)$$ with $$\\ln A - \\ln B = \\ln(A-B)$$ (which is FALSE). Step 3: Subtraction of logs corresponds to *division* of arguments, not subtraction. Memory hook: log laws turn arithmetic operations into log-of-quotient operations; never subtract inside the log.", "source": "Opus 4.7 ①", "_id": "opus_1_82"}, {"question": "In the question with $y = a - |2x - b|$, if the two graphs intersect at $x = 5$ and $x = -3$, why must we check which branch of each modulus applies at each intersection point? (1 step)", "answer": "- The modulus function $|2x - b|$ behaves differently on different sides of its vertex at $x = b/2$:\n- For $x > b/2$: $|2x - b| = 2x - b$ (right descending branch)\n- For $x < b/2$: $|2x - b| = -(2x - b) = b - 2x$ (left ascending branch)\n\nSimilarly for $|x + 1|$:\n- For $x > -1$: $|x + 1| = x + 1$\n- For $x < -1$: $|x + 1| = -(x + 1) = -x - 1$\n\nAt $x = 5$, we might be on different branches than at $x = -3$. Using the wrong branch gives the wrong equation. The graph shows you which branch to use at each intersection point.", "source": "MiniMax ②", "_id": "minimax_2_57"}, {"question": "What is the systematic procedure for finding the inverse of $$g(x)=3+2\\ln x$$, and why should you isolate the original variable before swapping $$x$$ and $$y$$? (3 steps)", "answer": "- Step 1: Write $$y=3+2\\ln x$$. Solve for $$x$$ by undoing operations in reverse order: subtract 3 to get $$y-3=2\\ln x$$; divide by 2 to get $$\\frac{y-3}{2}=\\ln x$$; exponentiate to get $$x=e^{(y-3)/2}$$.\n- Step 2: Now swap $$x$$ and $$y$$ to express the inverse as a function of $$x$$: $$g^{-1}(x)=e^{(x-3)/2}$$.\n- Step 3: Swapping before isolating creates a circular equation that is harder to read. The conceptual order is: first peel away the layers of the original function to expose the input variable; only then relabel to match standard inverse notation. This mirrors the definition: the inverse maps outputs back to inputs.", "source": "Kimi K2.6 ②", "_id": "kimi_2_20"}, {"question": "A point $$P$$ has coordinates $$(5, 10)$$ on the graph of $$y = f(x)$$. Find the image of $$P$$ under the transformation $$y = 3f(x - 2)$$, and explain the order of operations. (3 steps)", "answer": "- Step 1: The transformation $$y = 3f(x - 2)$$ has two parts. The inside part $$(x - 2)$$ is a horizontal translation: shift right by 2. The outside part $$3 \\times$$ is a vertical stretch by factor 3.\n- Step 2: Apply the horizontal shift first: $$x \\to x + 2$$, so $$5 \\to 7$$. Then apply the vertical stretch: $$y \\to 3y$$, so $$10 \\to 30$$.\n- Step 3: The image is $$(7, 30)$$. Key rule: inside transformations affect $$x$$ (horizontal, opposite direction — $$x - 2$$ means shift right, not left). Outside transformations affect $$y$$ (vertical, same direction — $$3f$$ means stretch up by 3).", "source": "GLM 5.1 ①", "_id": "glm_1_5"}, {"question": "What is the double-angle identity pattern behind $$(\\cos\\theta + \\sin\\theta)(\\cos\\theta - \\sin\\theta)$$, and why is it useful? (2 steps)", "answer": "- Step 1: This is a difference of squares: $$(\\cos\\theta + \\sin\\theta)(\\cos\\theta - \\sin\\theta) = \\cos^2\\theta - \\sin^2\\theta = \\cos 2\\theta$$.\n- Step 2: This pattern is powerful because it converts a product of two linear-in-trig factors into a single double-angle term. Whenever you see $$(\\cos\\theta \\pm \\sin\\theta)$$ paired with $$(\\cos\\theta \\mp \\sin\\theta)$$, immediately recognise it as $$\\cos 2\\theta$$.\n\nThis was the key move in Q9 Part (a): multiplying both sides by $$(\\cos\\theta + \\sin\\theta)$$ created this difference-of-squares on the RHS.", "source": "GLM 5.1 ③", "_id": "glm_3_7"}, {"question": "From the turning point equation $3\\sin^2 x + \\sin x - 3 = 0$, find the valid $\\sin x$ value, and hence find the $x$-coordinate of the turning point $Q$ (below the $x$-axis) to 3 d.p. (3 steps)", "answer": "- Step 1: Solve the quadratic:\n$$\\sin x = \\frac{-1 \\pm \\sqrt{1 + 36}}{6} = \\frac{-1 \\pm \\sqrt{37}}{6}$$\n\nTwo solutions: $\\sin x \\approx \\frac{-1 + 6.083}{6} \\approx 0.847$ and $\\sin x \\approx \\frac{-1 - 6.083}{6} \\approx -1.181$.\n\n- Step 2: Reject $\\sin x \\approx -1.181$ because $|\\sin x| \\leq 1$.\n\nSo $\\sin x \\approx 0.847$, giving $x \\approx \\arcsin(0.847) \\approx 1.012$ rad or $x \\approx \\pi - 1.012 \\approx 2.130$ rad.\n\n- Step 3: Determine which is $Q$ (below the $x$-axis). Substitute into $f(x) = 2e^{3\\sin x}\\cos x$:\n- At $x \\approx 1.012$: $\\cos x > 0$ → $f(x) > 0$ → this is $P$ (above $x$-axis).\n- At $x \\approx 2.130$: $\\cos x < 0$ → $f(x) < 0$ → this is $Q$ (below $x$-axis).\n\nSo $x_Q \\approx \\mathbf{2.130}$ (3 d.p.).", "source": "MiniMax ②", "_id": "minimax_2_18"}, {"question": "An exponential model has the form $$y = ka^x$$. How do you convert this into a straight-line relationship, and what is the key difference from the power model? (3 steps)", "answer": "- Step 1: Take logarithms of both sides: $$\\log y = \\log(ka^x) = \\log k + \\log(a^x) = \\log k + x\\log a$$.\n- Step 2: This gives $$Y = mX + c$$ where $$Y = \\log y$$, $$X = x$$ (just $$x$$, NOT $$\\log x$$), $$m = \\log a$$, and $$c = \\log k$$.\n- Step 3: The key difference from the power model: for the exponential model, you plot $$\\log y$$ against $$x$$ (the variable itself). For the power model, you plot $$\\log y$$ against $$\\log x$$. Confusing these two is a major pitfall — the horizontal axis differs.\n\nTemplate: $$y = ka^x \\Rightarrow \\log y = (\\log a) \\cdot x + \\log k$$.", "source": "GLM 5.1 ①", "_id": "glm_1_13"}, {"question": "For $$f(x) = R\\sin(2x+\\alpha) + c$$, what are the maximum and minimum values, and why is the spacing between successive maxima equal to $$\\pi$$ rather than $$2\\pi$$? (3 steps)", "answer": "- Step 1: Since $$-1 \\leq \\sin(\\theta) \\leq 1$$, the maximum is $$R(1) + c = R+c$$ when $$2x+\\alpha = \\frac{\\pi}{2} + 2n\\pi$$, and the minimum is $$-R+c$$ when $$2x+\\alpha = \\frac{3\\pi}{2} + 2n\\pi$$.\n- Step 2: The coefficient $$2$$ inside the sine halves the period. A full cycle completes when $$2x$$ changes by $$2\\pi$$, which means $$x$$ changes by $$\\pi$$.\n- Step 3: Consequently, consecutive maxima are spaced $$\\pi$$ units apart in $$x$$. The general solution for maxima is $$x = \\frac{\\pi}{4} - \\frac{\\alpha}{2} + n\\pi$$, so the second smallest positive maximum occurs at $$n=1$$, adding $$\\pi$$ to the first. Treating the spacing as $$2\\pi$$ is a common error caused by ignoring the inner coefficient.", "source": "Kimi K2.6 ①", "_id": "kimi_1_13"}, {"question": "Solve $3\\sin 2x - 4\\cos 2x = 2$ for $\\pi \\leq x \\leq \\frac{3\\pi}{2}$, giving the answer to 3 s.f. (4 steps)", "answer": "- Step 1: Convert to R-form: $3\\sin 2x - 4\\cos 2x = R\\sin(2x - \\alpha)$ where:\n$$R = \\sqrt{3^2 + (-4)^2} = \\sqrt{9 + 16} = 5$$\n$$\\tan \\alpha = \\frac{4}{3} \\Rightarrow \\alpha \\approx 0.9273 \\text{ rad}$$\n\nSo: $5\\sin(2x - 0.9273) = 2 \\Rightarrow \\sin(2x - 0.9273) = 0.4$\n\n- Step 2: Let $\\phi = 2x - 0.9273$. For $\\pi \\leq x \\leq 3\\pi/2$:\n$$\\phi \\in [\\pi - 0.9273, 3\\pi/2 - 0.9273] = [2.214, 4.356]$$Wait — more precisely:\n$$x = \\pi \\Rightarrow \\phi = 2\\pi - 0.9273 \\approx 5.356$$\n$$x = 3\\pi/2 \\Rightarrow \\phi = 3\\pi - 0.9273 \\approx 8.497$$\n\n- Step 3: Solve $\\sin \\phi = 0.4$. The principal solution is $\\phi_0 = \\arcsin(0.4) \\approx 0.4115$.\nGeneral solutions: $\\phi = 0.4115 + 2n\\pi$ or $\\phi = \\pi - 0.4115 + 2n\\pi$.\n\n- Step 4: Find which solutions lie in $[5.356, 8.497]$:\n- $n = 0$: $\\phi = 0.4115$ (too small), $\\phi = 2.730$ (too small)\n- $n = 1$: $\\phi = 0.4115 + 2\\pi \\approx 6.695$ ✓; $\\phi = 2.730 + 2\\pi \\approx 9.013$ (too big)\n\nSo $\\phi \\approx 6.695$:\n$$2x - 0.9273 = 6.695 \\Rightarrow 2x = 7.622 \\Rightarrow x \\approx 3.81 \\text{ rad}$$\n\nCheck: $\\pi \\approx 3.142$, $3\\pi/2 \\approx 4.712$, so $3.81$ is in the range. Answer: $x \\approx \\mathbf{3.81}$ (3 s.f.).", "source": "MiniMax ②", "_id": "minimax_2_24"}, {"question": "Synthesis: What is the **complete checklist** of a \"use $$R$$-formula to solve\" question? (5 steps)", "answer": "- Step 1: Identify the form: $$a\\sin\\phi \\pm b\\cos\\phi$$ on one side; constant on the other.\n- Step 2: Choose the right $$R$$-formula variant based on signs and which trig comes first (sin or cos). Match $$R\\cos\\alpha = $$ coefficient of sin (or cos), $$R\\sin\\alpha = $$ coefficient of the other.\n- Step 3: Compute $$R = \\sqrt{a^2+b^2}$$ and $$\\alpha$$ from $$\\tan\\alpha = b/a$$ (or appropriate ratio).\n- Step 4: Substitute: equation becomes $$R\\sin(\\phi + \\alpha) = c$$, solve for $$\\phi + \\alpha = \\arcsin(c/R) + $$ multiples of period.\n- Step 5: Substitute back to find $$\\phi$$, then $$x$$. Filter solutions to the given range. Always check by plugging the final $$x$$ into the original equation.\n\nThis pipeline is mechanical once memorised; the bottleneck is consistently knowing the four variants.", "source": "Opus 4.7 ①", "_id": "opus_1_117"}, {"question": "Given $$f(x) = R\\sin(2x + \\alpha) + c$$, what are the maximum and minimum values of $$f(x)$$, and at what values of $$x$$ do they occur? (2 steps)", "answer": "- Step 1: Since $$-1 \\leq \\sin(\\text{anything}) \\leq 1$$, the maximum of $$R\\sin(2x + \\alpha)$$ is $$R$$ (when $$\\sin = 1$$) and the minimum is $$-R$$ (when $$\\sin = -1$$). So $$\\max f = R + c$$ and $$\\min f = -R + c$$.\n- Step 2: The maximum occurs when $$2x + \\alpha = \\frac{\\pi}{2} + 2n\\pi$$ (i.e., the sine hits 1), giving $$x = \\frac{\\pi/2 - \\alpha + 2n\\pi}{2}$$. For the second smallest positive $$x$$, use $$n = 1$$: $$x = \\frac{5\\pi/2 - \\alpha}{2}$$. The minimum occurs when $$2x + \\alpha = \\frac{3\\pi}{2} + 2n\\pi$$.", "source": "GLM 5.1 ②", "_id": "glm_2_20"}, {"question": "When the exam asks you to \"show that\" $$f(x)$$ can be written in a specific form, what strategy should you adopt, and what is insufficient? (2 steps)", "answer": "- Step 1: \"Act with respect to the answer\" — look at the target form and manipulate the given expression towards it. Use identities, algebra, and substitutions that introduce the structures seen in the target (e.g., double angles, specific factorisations).\n- Step 2: What is insufficient: substituting a single numerical value and showing both sides give the same answer. A \"show that\" requires algebraic proof for all values, not verification at one point. Mr. Fuat: \"Prove questions need algebraic argument, not single-value substitution.\"", "source": "GLM 5.1 ①", "_id": "glm_1_74"}, {"question": "In solving $$\\sqrt{2}\\sin(2\\theta) = \\cos(2\\theta - 105^{\\circ})$$, why does the substitution $$x = 2\\theta - 45^{\\circ}$$ transform it into a previously solved equation? (2 steps)", "answer": "- Step 1: The target structure matches a known identity type $$\\sqrt{2}\\sin(x+45^{\\circ}) = \\cos(x-60^{\\circ})$$. Setting $$x+45^{\\circ} = 2\\theta$$ makes the left side identical to $$\\sqrt{2}\\sin(2\\theta)$$.\n- Step 2: Then $$x = 2\\theta - 45^{\\circ}$$, so the right side's argument becomes $$x - 60^{\\circ} = (2\\theta - 45^{\\circ}) - 60^{\\circ} = 2\\theta - 105^{\\circ}$$, which exactly matches the given equation. Thus the new problem is structurally identical to the old one with $$x = 2\\theta - 45^{\\circ}$$, allowing reuse of the earlier result $$\\tan(2\\theta - 45^{\\circ}) = -2-\\sqrt{3}$$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_15"}, {"question": "Solve $$gf(a) = 5$$ where $$f(a) = \\dfrac{2a}{3a-5}$$ and $$g(x) = 3 + 2\\ln x$$. (4 steps)", "answer": "- Step 1: $$gf(a) = g(f(a)) = 3 + 2\\ln\\left(\\dfrac{2a}{3a-5}\\right) = 5$$.\n- Step 2: $$2\\ln\\left(\\dfrac{2a}{3a-5}\\right) = 2 \\Rightarrow \\ln\\left(\\dfrac{2a}{3a-5}\\right) = 1$$.\n- Step 3: Exponentiate: $$\\dfrac{2a}{3a-5} = e^1 = e$$.\n- Step 4: Cross-multiply: $$2a = e(3a-5) = 3ea - 5e \\Rightarrow 2a - 3ea = -5e \\Rightarrow a(2 - 3e) = -5e \\Rightarrow a = \\dfrac{-5e}{2-3e} = \\dfrac{5e}{3e-2}$$.\n\nThe trick at the end: multiply top and bottom by $$-1$$ to make the denominator positive (clean form).", "source": "Opus 4.7 ①", "_id": "opus_1_61"}, {"question": "Why does the iteration $ x_{n+1} = \\sqrt[3]{\\frac{5x_n^2 - 4x_n + 7}{x_n}} $ converge to a root of $ x^4 - 5x^2 + 4x - 7 = 0 $? (3 steps)", "answer": "- Step 1: **Fixed-point concept**. The iteration rearranges the original equation into $ x = g(x) $, where $ g(x) = \\sqrt[3]{\\frac{5x^2 - 4x + 7}{x}} $. A fixed point $ x = g(x) $ corresponds to a root of the original equation.  \n- Step 2: **Convergence condition**. If $ |g'(x)| < 1 $ near the root, the iteration converges because small errors diminish iteratively.  \n- Step 3: **Practical verification**. Starting with $ x_1 = 2 $, repeated substitution stabilizes at $ x \\approx 2.1472 $, confirming convergence. This aligns with the Intermediate Value Theorem’s guarantee of a root in [2,3].  \n\n**Edge Case**: What happens if $ x_1 = 0 $?  \n+ Answer: The iteration fails because $ x_n = 0 $ causes division by zero in $ g(x) $. Domain restrictions must be respected.", "source": "Qwen 3 ②", "_id": "qwen_2_6"}, {"question": "After polynomial division gives $$g(x) = 2x - 1 + \\frac{6}{x-2}$$, you integrate from 4 to 8. Walk through the key steps, emphasising the log combination. (3 steps)", "answer": "- Step 1: Integrate term by term: $$\\int(2x-1)\\,dx = x^2 - x$$ and $$\\int\\frac{6}{x-2}\\,dx = 6\\ln|x-2|$$.\n- Step 2: Evaluate at the bounds: $$(64 - 8 + 6\\ln 6) - (16 - 4 + 6\\ln 2) = 44 + 6\\ln 6 - 6\\ln 2$$.\n- Step 3: Combine the logs using $$\\ln A - \\ln B = \\ln\\frac{A}{B}$$: $$6\\ln 6 - 6\\ln 2 = 6\\ln\\frac{6}{2} = 6\\ln 3$$. Final answer: $$44 + 6\\ln 3$$.\n\nAlways combine logs before reading off the coefficient — the question expects $$\\beta\\ln 3$$, not separate log terms.", "source": "GLM 5.1 ③", "_id": "glm_3_16"}, {"question": "Prove that $f(x) = \\frac{2x}{3x-5}$ is decreasing for $x > 2$ using calculus. What must you show? (2 steps)", "answer": "- Step 1: Differentiate using quotient rule: $f'(x) = \\frac{2(3x-5) - 2x \\cdot 3}{(3x-5)^2} = \\frac{6x - 10 - 6x}{(3x-5)^2} = \\frac{-10}{(3x-5)^2}$.\n- Step 2: For $x > 2$, we have $3x - 5 > 0$, so $(3x-5)^2 > 0$ always. The numerator is $-10 < 0$. Therefore $f'(x) < 0$ for all $x > 2$.\n\n**Takeaway:** To prove decreasing: show $f'(x) < 0$ for ALL x in the domain (not just at one point!).", "source": "MiniMax ①", "_id": "minimax_1_28"}, {"question": "Given a straight-line relationship $$\\log_3 N = 2t + 4$$, how do you convert back to the form $$N = ab^t$$? What base do you use when exponentiating? (3 steps)", "answer": "- Step 1: Raise the base of the logarithm to both sides. Since the log is base 3, raise 3 to both sides: $$3^{\\log_3 N} = 3^{2t+4}$$. By the inverse property $$b^{\\log_b x} = x$$, the left side simplifies to $$N$$.\n- Step 2: Split the right side using index laws: $$N = 3^{2t+4} = 3^4 \\cdot 3^{2t} = 81 \\cdot (3^2)^t = 81 \\cdot 9^t$$.\n- Step 3: Read off $$a = 81$$ and $$b = 9$$. The crucial step is splitting $$3^{2t} = (3^2)^t = 9^t$$ to match the $$b^t$$ form. Also, you MUST use the same base as the logarithm (base 3 here) — using base 10 would be wrong.\n\nPitfalls: (1) not splitting $$3^{2t}$$ into $$(3^2)^t = 9^t$$; (2) using the wrong base when exponentiating.", "source": "GLM 5.1 ①", "_id": "glm_1_14"}, {"question": "Why is it insufficient to show $$f'(x) > 0$$ at a single point to prove $$f$$ is increasing on an interval, and what constitutes a rigorous proof? (2 steps)", "answer": "- Step 1: A positive derivative at one point only guarantees local increase there; the function could decrease elsewhere on the interval. A single point cannot govern behavior across an entire domain.\n- Step 2: A rigorous proof computes $$f'(x)$$, simplifies it algebraically, and demonstrates that the expression is positive (or negative) for *every* $$x$$ in the domain. For example, showing $$f'(x) = \\frac{10}{(2x+1)^{2}}$$ and noting the denominator is always positive while the numerator is positive proves $$f'(x) > 0$$ everywhere, establishing that $$f$$ is strictly increasing on the entire interval.", "source": "Kimi K2.6 ①", "_id": "kimi_1_25"}, {"question": "When simplifying $\\frac{2x^2 - 5x + 8}{x - 2}$ using polynomial division, the result is $2x - 1 + \\frac{6}{x-2}$. How do you verify that $C = 6$ is correct? (1 step)", "answer": "- Multiply both sides by the divisor $(x-2)$:\n$$(2x - 1)(x-2) + 6 = 2x^2 - 4x - x + 2 + 6 = 2x^2 - 5x + 8$$\n\nThis matches the original numerator exactly, confirming that the remainder $C = 6$ is correct. The general check is: $(\\text{quotient}) \\times (\\text{divisor}) + \\text{remainder} = \\text{numerator}$.", "source": "MiniMax ②", "_id": "minimax_2_31"}, {"question": "For an exponential model $$y = k a^x$$, what linear relationship emerges from taking logs, and on which axes do you plot?", "answer": "- Step 1: Take log of both sides: $$\\log y = \\log k + \\log(a^x) = \\log k + x \\log a$$.\n- Step 2: Rearranged: $$\\log y = (\\log a) \\cdot x + \\log k$$. Linear in $$x$$ (not $$\\log x$$).\n- Step 3: Plot $$\\log y$$ (vertical) vs $$x$$ (horizontal). Gradient $$= \\log a$$; $$y$$-intercept $$= \\log k$$.\n\nKey contrast with power models:\n+ Power ($$y = kx^n$$): plot $$\\log y$$ vs $$\\log x$$ (log-log axes)\n+ Exponential ($$y = ka^x$$): plot $$\\log y$$ vs $$x$$ (semi-log axes)\n\nThe choice of axes depends on *where* the variable appears (base vs exponent).", "source": "Opus 4.7 ②", "_id": "opus_2_15"}, {"question": "Given a power law $$y = kx^n$$, how do you convert this to a straight-line equation when plotting $$\\log y$$ against $$\\log x$$? What physical meaning do the gradient and intercept carry? (2 steps)", "answer": "- Step 1: Take logarithms of both sides: $$\\log y = \\log(kx^n) = \\log k + n\\log x$$. This is of the form $$Y = mX + c$$ with $$Y=\\log y$$ and $$X=\\log x$$.\n- Step 2: The gradient $$m$$ equals the power $$n$$, and the vertical intercept $$c$$ equals $$\\log k$$. Therefore $$k = 10^c$$ (or base$$^c$$). A straight line on a log-log plot is the signature of a power-law relationship.", "source": "Kimi K2.6 ②", "_id": "kimi_2_4"}, {"question": "Conceptual: When can the **substitution method** for definite integrals reduce computation, vs when does direct antidifferentiation suffice?", "answer": "Step 1: Direct antidifferentiation suffices when the integrand matches a standard form (e.g., $$1/(ax+b)$$, $$\\sin(kx)$$, etc.) — just apply the rule. Step 2: Substitution helps when the integrand contains $$f(g(x))g'(x)$$ pattern — substituting $$u = g(x)$$ transforms it to $$f(u)du$$. For instance, $$\\int 2x \\cdot e^{x^2} dx$$ becomes $$\\int e^u du$$ with $$u = x^2$$. Step 3: For simple linear-in-$$x$$ denominators like $$\\int \\dfrac{1}{ax+b}dx$$, the result $$\\dfrac{1}{a}\\ln|ax+b|$$ is *derivable from* substitution but is faster as a memorised template. So at exam speed, recognise patterns first; substitute only when no template applies.", "source": "Opus 4.7 ①", "_id": "opus_1_92"}, {"question": "Synthesis: A modelling question asks \"find $$T$$ when $$D = 350000$$, will the charity reach this in 12 months?\" Why is the strategic move to compute $$D$$ at $$T = 12$$ directly, rather than solving $$D = 350000$$ for $$T$$?", "answer": "Step 1: The question is \"yes/no, will charity hit £350,000 by month 12?\" — not \"find when $$D = 350000$$.\" Step 2: Solving $$D = 350000$$ for $$T$$ would give a specific $$T$$ value; you'd then compare to 12. But computing $$D(12)$$ directly answers the binary question in one step. Step 3: $$\\log_{10}D = 1.04 + 0.38 \\times 12 = 5.60$$, so $$D \\approx 10^{5.60} \\approx 398107$$. Since $$398107 > 350000$$, yes, the aim is achieved before month 12. The savings: one log-evaluation vs solving an equation + comparing.", "source": "Opus 4.7 ①", "_id": "opus_1_109"}, {"question": "In an equation where the unknown appears in the exponent, such as $$2000 \\times 1.03^{T} = 4000 \\times 0.98^{T}$$, why is taking logarithms the universal unlocking move, and which logarithm property enables the solution? (2 steps)", "answer": "- Step 1: Divide to isolate the exponential ratio: $$\\left(\\frac{1.03}{0.98}\\right)^{T} = 2$$. The unknown $$T$$ is trapped in the exponent.\n- Step 2: Taking logarithms converts the exponent into a multiplier via $$\\ln(a^{T}) = T\\ln a$$. This gives $$T\\ln\\left(\\frac{1.03}{0.98}\\right) = \\ln 2$$, so $$T = \\frac{\\ln 2}{\\ln(1.03/0.98)}$$. Without this property, $$T$$ remains locked in the exponent with no algebraic way to descend.", "source": "Kimi K2.6 ①", "_id": "kimi_1_9"}, {"question": "When finding the inverse of $$g(x) = 3+2\\ln x$$, why is the domain of $$g^{-1}$$ equal to the range of $$g$$, and how is that range determined? (2 steps)", "answer": "- Step 1: By definition, the inverse swaps inputs and outputs. Therefore every output produced by $$g$$ becomes an allowable input for $$g^{-1}$$. The range of $$g$$ over its domain $$x \\geq 1$$ must be found.\n- Step 2: Since $$g$$ is increasing, its minimum is $$g(1) = 3$$, and as $$x \\to \\infty$$, $$g(x) \\to \\infty$$. Hence the range is $$[3, \\infty)$$, which becomes the domain of $$g^{-1}(x) = e^{(x-3)/2}$$. This ensures the inverse only receives values that the original function actually attains.", "source": "Kimi K2.6 ①", "_id": "kimi_1_37"}, {"question": "What is the **chain rule** for differentiation, and how is it applied to $$y = e^{3\\sin x}$$?", "answer": "Step 1: Chain rule: if $$y = f(u(x))$$, then $$\\dfrac{dy}{dx} = \\dfrac{dy}{du} \\cdot \\dfrac{du}{dx} = f'(u) \\cdot u'(x)$$. Step 2: For $$y = e^{3\\sin x}$$: outer is $$e^u$$ with derivative $$e^u$$; inner is $$u = 3\\sin x$$ with derivative $$u' = 3\\cos x$$. Step 3: $$\\dfrac{dy}{dx} = e^{3\\sin x} \\cdot 3\\cos x = 3\\cos x\\, e^{3\\sin x}$$. The chain rule is the universal \"differentiate from outside in, multiply by inside derivative.\"", "source": "Opus 4.7 ①", "_id": "opus_1_64"}, {"question": "For $f(x) = 2e^{3\\sin x} \\cos x$, find the x-intercept in the interval $[0, 2\\pi]$. Explain your reasoning. (2 steps)", "answer": "- Step 1: Set $f(x) = 0$: $2e^{3\\sin x} \\cos x = 0$.\n- Step 2: Since $2e^{3\\sin x} > 0$ for all x (exponential is always positive), we must have $\\cos x = 0$.\n- In $[0, 2\\pi]$, $\\cos x = 0$ gives $x = \\frac{\\pi}{2}$ and $x = \\frac{3\\pi}{2}$. The intercept shown in the diagram is $R = (\\frac{\\pi}{2}, 0)$.\n\n**Takeaway:** When a product equals zero and one factor can NEVER be zero (like $e^{\\text{stuff}}$), the OTHER factor must be zero.", "source": "MiniMax ①", "_id": "minimax_1_17"}, {"question": "Conceptual: In $$|f(x)|$$, what graphical operation is being performed on the graph of $$y = f(x)$$, and how does it differ from $$f(|x|)$$?", "answer": "Step 1: $$y = |f(x)|$$ takes the graph of $$f$$ and reflects any part below the $$x$$-axis upward (into positive $$y$$-territory). The right-half / left-half symmetry is preserved; only the lower-half flips. Step 2: $$y = f(|x|)$$ takes the right half of the graph (for $$x \\geq 0$$) and mirrors it onto the left half (replacing whatever was at $$x < 0$$ originally). The result is symmetric about the $$y$$-axis. Step 3: Different operations entirely: $$|f|$$ acts on the output (reflects in $$x$$-axis); $$f(|x|)$$ acts on the input (reflects in $$y$$-axis, only the right side is kept). Sketch a single example like $$f(x) = x$$: $$|f| = |x|$$ (V-shape) vs $$f(|x|) = |x|$$ (also V-shape — coincidence here). For $$f(x) = x - 1$$: $$|f| = |x-1|$$ (V at $$x=1$$) vs $$f(|x|) = |x| - 1$$ (V at $$x=0$$, shifted down 1).", "source": "Opus 4.7 ①", "_id": "opus_1_87"}, {"question": "Misconception probe: A student writes $$\\cos^2 x = 1 - \\sin 2x$$. What's wrong?", "answer": "Step 1: This confuses two different identities. $$\\sin^2 x + \\cos^2 x = 1$$ gives $$\\cos^2 x = 1 - \\sin^2 x$$ (with sin squared, not double-angle sin). Step 2: There's no identity that gives $$\\cos^2 x = 1 - \\sin 2x$$ — the right-hand side mixes $$\\sin 2x$$ (double angle) with $$\\cos^2 x$$ (square), which aren't directly related. Step 3: The correct double-angle rearrangement is $$\\cos^2 x = \\tfrac{1}{2}(1 + \\cos 2x)$$. Memory check: the *cos*-squared identity should produce a *cos* double-angle, not a *sin* double-angle.", "source": "Opus 4.7 ①", "_id": "opus_1_77"}, {"question": "Why does $$|2x - b|$$ have its vertex at $$x = b/2$$ rather than $$x = b$$? What is the general principle? (2 steps)", "answer": "- Step 1: The vertex of any modulus function $$|f(x)|$$ occurs where $$f(x) = 0$$, because that's where the output reaches its minimum value of 0. For $$|2x - b|$$, set $$2x - b = 0 \\Rightarrow x = b/2$$.\n- Step 2: The general principle: for $$|mx - c|$$, the vertex is at $$x = c/m$$, NOT $$x = c$$. The coefficient $$m$$ scales the horizontal position. This is the same reason $$y = f(2x)$$ is a horizontal stretch with scale factor $$1/2$$, not 2. The factor inside affects the $$x$$-coordinate inversely.\n\nCommon pitfall: writing the vertex as $$x = b$$ instead of $$x = b/2$$ when the coefficient of $$x$$ inside the modulus is not 1.", "source": "GLM 5.1 ①", "_id": "glm_1_8"}, {"question": "Why is it crucial to check your calculator is in radians mode when solving trig equations in P3? (1 step)", "answer": "P3 trig equations always use radian ranges (e.g., $$\\pi \\leq x \\leq 3\\pi/2$$). If your calculator is in degrees, $$\\arcsin(0.4)$$ returns approximately 23.6° instead of 0.412 rad — completely wrong values that won't match the given range. Mr. Fuat explicitly flagged this: \"Angle units and then radians.\" Make it a ritual to check the mode before every trig calculation.", "source": "GLM 5.1 ②", "_id": "glm_2_47"}, {"question": "For a rational function $$\\frac{P(x)}{Q(x)}$$, what is the decision rule for choosing between polynomial long division and partial fractions, and what mathematical requirement drives this rule? (2 steps)", "answer": "- Step 1: Compare degrees. If $$\\deg(P) \\geq \\deg(Q)$$, perform polynomial long division first to obtain a polynomial plus a proper remainder fraction. If $$\\deg(P) < \\deg(Q)$$, proceed directly to partial fractions.\n- Step 2: Partial fractions requires a *proper* rational function where the numerator degree is strictly less than the denominator degree. An improper fraction ($$\\deg(P) \\geq \\deg(Q)$$) cannot be decomposed directly into simple partial fractions; the polynomial part must be extracted first so that the remaining fraction is proper and can be split into simpler denominators.", "source": "Kimi K2.6 ①", "_id": "kimi_1_4"}, {"question": "Why does \"R-formula\" have four variants ($$R\\sin(x+\\alpha)$$, $$R\\sin(x-\\alpha)$$, $$R\\cos(x-\\alpha)$$, $$R\\cos(x+\\alpha)$$) rather than just one?", "answer": "- Step 1: The four conversions handle the four sign/function combinations: $$a\\sin \\pm b\\cos$$ and $$a\\cos \\pm b\\sin$$. Each pairs the \"positive\" coefficient term with a specific form.\n- Step 2: Convention: $$R > 0$$ and $$0 < \\alpha < \\pi/2$$. These constraints force a specific sign in the $$\\pm\\alpha$$ placement to correctly reproduce the expansion.\n- Step 3: While you could use just $$R\\sin(x+\\alpha)$$ (choosing $$\\alpha$$ possibly in other quadrants), staying with $$\\alpha \\in (0, \\pi/2)$$ is cleaner — just pick the variant matching the signs.\n\nMeta: all four variants are equivalent (linked by identities like $$\\cos x = \\sin(x + \\pi/2)$$), but using the matching form avoids awkward angles.\n\nPractical pick: leading function (sin or cos with coefficient $$a$$) determines the form; sign between terms determines the $$\\alpha$$ sign.", "source": "Opus 4.7 ②", "_id": "opus_2_101"}, {"question": "What is the derivative $$\\frac{d}{dt}(Ae^{-Bt})$$, and what does its sign tell you about the model? (2 steps)", "answer": "- Step 1: Using the chain rule: $$\\frac{d}{dt}(Ae^{-Bt}) = A \\cdot (-B) \\cdot e^{-Bt} = -ABe^{-Bt}$$. The negative sign comes from the derivative of $$-Bt$$.\n- Step 2: Since $$A > 0$$, $$B > 0$$, and $$e^{-Bt} > 0$$, the derivative is always negative: $$-ABe^{-Bt} < 0$$. This confirms the function is always decreasing — temperature is always falling in a cooling model. The rate of decrease slows over time because $$e^{-Bt}$$ gets smaller.", "source": "GLM 5.1 ①", "_id": "glm_1_36"}, {"question": "Conceptual: For $$y = a - |2x - b|$$ with $$a > b > 0$$, why is the $$y$$-intercept *always positive*?", "answer": "Step 1: $$y$$-intercept is at $$x = 0$$: $$y = a - |0 - b| = a - |-b| = a - b$$ (since $$|-b| = b$$ for $$b > 0$$). Step 2: Given $$a > b$$, the value $$a - b > 0$$, so the $$y$$-intercept is strictly positive. Step 3: Geometrically: the graph is an inverted V with peak at $$(b/2, a)$$ above the $$x$$-axis, and the line decreases (in absolute value of slope) on each side. At $$x = 0$$ (left of the peak since $$b > 0$$), the line is still above the $$x$$-axis, hence positive $$y$$-intercept.", "source": "Opus 4.7 ①", "_id": "opus_1_83"}, {"question": "Solve $$3\\sin 2x - 4\\cos 2x = 2$$ for $$\\pi \\leq x \\leq 3\\pi/2$$ using the $$R$$-formula. (5 steps)", "answer": "- Step 1: Convert LHS to $$R\\sin(2x - \\alpha)$$ with $$R\\cos\\alpha = 3$$, $$R\\sin\\alpha = 4$$. So $$R = \\sqrt{9+16} = 5$$, $$\\tan\\alpha = 4/3 \\Rightarrow \\alpha \\approx 0.9273$$ rad.\n- Step 2: Equation: $$5\\sin(2x - 0.9273) = 2 \\Rightarrow \\sin(2x - 0.9273) = 0.4$$.\n- Step 3: Let $$\\phi = 2x - 0.9273$$. As $$x$$ ranges over $$[\\pi, 3\\pi/2]$$, $$\\phi$$ ranges over $$[2\\pi - 0.9273, 3\\pi - 0.9273] \\approx [5.356, 8.497]$$.\n- Step 4: Solve $$\\sin\\phi = 0.4$$. Principal: $$\\phi_0 = \\arcsin(0.4) \\approx 0.4115$$. General solutions: $$\\phi = 0.4115 + 2n\\pi$$ or $$\\phi = (\\pi - 0.4115) + 2n\\pi$$. Within $$[5.356, 8.497]$$: only $$\\phi = 0.4115 + 2\\pi \\approx 6.695$$ works.\n- Step 5: $$2x = 6.695 + 0.9273 = 7.622 \\Rightarrow x \\approx 3.81$$ (3 s.f.). Check: $$3.81 \\in [3.142, 4.712]$$ ✓.\n\nThe lesson: transforming the variable's range is essential to find all valid solutions.", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "What does \"horizontal stretch scale factor $$1/a$$\" physically mean for the graph of $$y = f(ax)$$?", "answer": "- Step 1: For $$y = f(ax)$$, each $$x$$-coordinate on the original graph $$y = f(x)$$ is divided by $$a$$ (multiplied by $$1/a$$) in the new graph.\n- Step 2: Visually: if $$a > 1$$, graph is **compressed** horizontally (squeezed toward $$y$$-axis). If $$0 < a < 1$$, graph is **stretched** horizontally (spread out).\n- Step 3: Algebraic check: the new graph at new $$x$$-coord $$x_0/a$$ takes value $$f(a \\cdot x_0/a) = f(x_0)$$ — same as original at $$x_0$$. So the point $$(x_0, f(x_0))$$ on old graph corresponds to $$(x_0/a, f(x_0))$$ on new.\n\nMnemonic: \"inside-the-function\" transformations are **counterintuitive** — opposite direction and reciprocal scale of what's written.", "source": "Opus 4.7 ②", "_id": "opus_2_105"}, {"question": "Why does multiplying $$|x - 5|$$ by 2 to obtain $$2|x - 5|$$ leave the $$x$$-coordinate of the vertex unchanged, even though vertical stretches normally \"do something\"?", "answer": "The vertex of $$|x - 5|$$ sits at $$(5, 0)$$. A vertical stretch scales $$y$$ by the factor, so $$y = 0$$ stays $$y = 0$$ (since $$2 \\times 0 = 0$$). The $$x$$-coordinate is completely untouched by a pure vertical stretch — it only affects $$y$$-values. After stretching, vertex remains $$(5, 0)$$. Only *after* we add $$+10$$ does the vertex shift vertically up to $$(5, 10)$$.\n\nKey insight: vertical stretches cannot change $$x$$-coordinates of anything, only $$y$$-coordinates.", "source": "Opus 4.7 ②", "_id": "opus_2_1"}, {"question": "When simplifying a sum of algebraic fractions like $$\\dfrac{2x^2 - 32}{3x^2+7x-20} + \\dfrac{8}{3x-5}$$, why is **factoring first** strategically critical, rather than rushing to a common denominator?", "answer": "Step 1: Always look for shared factors before combining. Here $$2x^2 - 32 = 2(x-4)(x+4)$$ and $$3x^2 + 7x - 20 = (3x-5)(x+4)$$. The first fraction simplifies via cancelling $$(x+4)$$ to $$\\dfrac{2(x-4)}{3x-5}$$. Step 2: Now both fractions share the same denominator $$3x-5$$, and adding is trivial: $$\\dfrac{2(x-4)+8}{3x-5} = \\dfrac{2x}{3x-5}$$. Step 3: If you'd cross-multiplied without factoring, you'd get a quartic numerator over a cubic denominator that needs cleaning up — an algebraic mess. The principle: the question is *designed* to factor cleanly; factor first, simplify, then combine.", "source": "Opus 4.7 ①", "_id": "opus_1_14"}, {"question": "In the model $$T = 10 + Ae^{-Bt}$$, given an initial temperature and one later measurement, outline the conceptual sequence to extract $$A$$ and $$B$$, and explain why taking the natural logarithm is unavoidable when solving for $$B$$. (3 steps)", "answer": "- Step 1: At $$t=0$$, $$e^0=1$$, so $$T(0)=10+A$$. Thus $$A = T(0)-10$$ by direct subtraction.\n- Step 2: Substitute the second data point $$(t_1,T_1)$$: $$T_1 = 10 + Ae^{-Bt_1}$$. Rearrange to isolate the exponential: $$e^{-Bt_1} = \\frac{T_1-10}{A}$$.\n- Step 3: The unknown $$B$$ is trapped in the exponent. The only operation that extracts an exponent is the logarithm. Taking $$\\ln$$ of both sides gives $$-Bt_1 = \\ln\\left(\\frac{T_1-10}{A}\\right)$$, so $$B = -\\frac{1}{t_1}\\ln\\left(\\frac{T_1-10}{A}\\right)$$. No algebraic rearrangement can bring $$B$$ down from the exponent without this step.", "source": "Kimi K2.6 ②", "_id": "kimi_2_16"}, {"question": "A point $$P$$ on $$y = f(x)$$ is mapped under $$y = 3f(x-2)$$. In what order are the inside and outside transformations applied to $$P$$, and what is the image of $$P=(5,10)$$? (3 steps)", "answer": "- Step 1: Identify the two transformations: inside $$x \\to x-2$$ is a horizontal shift right by 2 (acts on $$x$$-coordinate); outside multiplication by 3 is a vertical stretch (acts on $$y$$-coordinate).\n- Step 2: Inside and outside changes act on independent coordinates, so order doesn't matter for image of a single point. Apply each to its own coordinate: $$x \\to x+2$$, $$y \\to 3y$$.\n- Step 3: $$P=(5,10) \\to (5+2, 3 \\cdot 10) = (7, 30)$$.\n\nMemory hook: inside changes do the *opposite* of what they look like ($$x-2$$ shifts *right* not left), outside changes do *what they look like* (multiply $$y$$ by 3).", "source": "Opus 4.7 ①", "_id": "opus_1_4"}, {"question": "Why do exam-style questions often ask you to \"prove\" an identity before \"hence solve\" an equation? What role does the first part play in the second?", "answer": "- Step 1: The \"prove\" part establishes a **simplified form** of the expression (e.g., $$3\\sin 2\\theta - 4\\cos 2\\theta = 2$$).\n- Step 2: The \"hence\" signals: use the proved identity as a starting point. The complicated LHS of the original equation equals the simpler RHS of the proof, so you can solve the simpler equation instead.\n- Step 3: Without the proof, you'd face an enormous transcendental equation with multiple functions; with the proof, you reduce to solving a single sinusoidal equation (via R-formula).\n\nMeta-strategy: if stuck on the \"hence solve\", look back at the \"prove\" part — it's the simplified form you should be working with.", "source": "Opus 4.7 ②", "_id": "opus_2_107"}, {"question": "When solving a modulus inequality such as $$|f(x)| > g(x)$$ by splitting into cases, why must every candidate solution be checked against the case region it came from? What happens conceptually if you skip this validation? (2 steps)", "answer": "- Step 1: Each case assumes a specific sign for the expression inside the modulus. The algebra you perform is only valid under that assumption. If a solution falls outside the assumed region, the sign assumption is violated, meaning the equation you solved no longer represents the original modulus on that interval.\n- Step 2: Skipping validation introduces extraneous solutions or discards valid ones. For example, solving under the assumption $$x \\geq 5$$ might yield $$x<0$$, which is impossible under the assumption. Keeping it would contradict the very definition of the modulus branch used.", "source": "Kimi K2.6 ②", "_id": "kimi_2_0"}, {"question": "Numerical exercise: Use the sign-change theorem to show $$f(x) = x^3 - 5$$ has a root in $$[1, 2]$$. (3 steps)", "answer": "- Step 1: $$f(1) = 1 - 5 = -4 < 0$$.\n- Step 2: $$f(2) = 8 - 5 = 3 > 0$$.\n- Step 3: $$f$$ is a polynomial, hence continuous on $$[1,2]$$. By IVT (sign-change), there's a root in $$(1, 2)$$.\n\nThe root is in fact $$\\sqrt[3]{5} \\approx 1.71$$, but that's not what's being asked; sign-change just confirms *existence* in the bracket.", "source": "Opus 4.7 ①", "_id": "opus_1_71"}, {"question": "If a product $$f(x)g(x) = 0$$ and $$g(x)$$ can never be zero on the domain, what conclusion follows about $$f(x)$$ — and how is this used for $$f'(x) = 2e^{3\\sin x}(3\\cos^2 x - \\sin x) = 0$$? (3 steps)", "answer": "- Step 1: For a product to be zero, *at least one* factor must be zero. If one factor is *never* zero on the domain, then the *other* factor must be zero wherever the product equals zero.\n- Step 2: For $$2e^{3\\sin x}(3\\cos^2 x - \\sin x) = 0$$: the factor $$2e^{3\\sin x}$$ is always positive (exponential never reaches zero). So the equation reduces to $$3\\cos^2 x - \\sin x = 0$$.\n- Step 3: This logic is universal whenever an exponential, a positive constant, or a square (like $$(3x-5)^2$$ on a restricted domain) appears as a factor. Always factor first, then identify which factor *can* be zero.", "source": "Opus 4.7 ①", "_id": "opus_1_52"}, {"question": "Differentiate $$y = \\tfrac{16}{9(3x - k)}$$ with respect to $$x$$, treating $$k$$ as a constant. Describe the chain rule structure. (3 steps)", "answer": "- Step 1: Rewrite as negative power: $$y = \\tfrac{16}{9}(3x - k)^{-1}$$. The $$\\tfrac{16}{9}$$ is a constant multiplier.\n- Step 2: Chain rule: differentiate the \"outer\" power $$u^{-1}$$ to get $$-u^{-2}$$, then multiply by \"inner\" derivative $$\\tfrac{d}{dx}(3x - k) = 3$$.\n- Step 3: Assemble: $$\\tfrac{dy}{dx} = \\tfrac{16}{9} \\cdot (-1)(3x - k)^{-2} \\cdot 3 = -\\tfrac{16 \\cdot 3}{9(3x-k)^2} = -\\tfrac{16}{3(3x-k)^2}$$.\n\nSanity: negative power becomes more negative by 1 (i.e., $$-2$$); the coefficient picks up both the $$-1$$ from differentiating the power AND the $$3$$ from the inner derivative.", "source": "Opus 4.7 ②", "_id": "opus_2_59"}, {"question": "Why can't you solve an equation like $$3\\sin 2x - 4\\cos 2x = 2$$ by just dividing both sides by $$\\cos 2x$$ and using $$\\tan$$? (2 steps)", "answer": "- Step 1: Dividing by $$\\cos 2x$$ gives $$3\\tan 2x - 4 = \\frac{2}{\\cos 2x} = 2\\sec 2x$$. You've replaced one problem (two trig functions) with another (a $$\\tan$$ and a $$\\sec$$), which is no simpler.\n- Step 2: More fundamentally, dividing by $$\\cos 2x$$ assumes $$\\cos 2x \\neq 0$$, which could discard valid solutions. The R-formula avoids this by combining both terms into a single sine function, which can be solved cleanly with inverse sine and the general solution.", "source": "GLM 5.1 ①", "_id": "glm_1_64"}, {"question": "How do you determine the number of real solutions to $ a \\sin x + b \\cos x = c $ using the R-formula? (3 steps)", "answer": "- Step 1: Compute $ R = \\sqrt{a^2 + b^2} $.  \n- Step 2: Analyze $ |c| \\leq R $. If $ |c| > R $, there are **no real solutions** because the amplitude of the sine wave cannot exceed $ R $.  \n- Step 3: If $ |c| \\leq R $, the equation has **infinitely many solutions** due to the periodicity of sine. The number of solutions in a specific interval depends on the interval’s length.  \n\n**Edge Case**: What if $ c = R $?  \n+ Answer: There’s **one solution per period** at the maximum of the sine wave (e.g., $ x + \\alpha = \\pi/2 + 2\\pi n $).", "source": "Qwen 3 ②", "_id": "qwen_2_1"}, {"question": "What does \"act with respect to the answer\" mean in the context of trig identity proofs, and how did it apply to the Jan 2024 Q9? (2 steps)", "answer": "- Step 1: The phrase means: look at what the target form contains, and choose your algebraic moves to create those structures. If the answer involves $$2\\theta$$ everywhere, then use identities that produce $$2\\theta$$ (double-angle identities, difference of squares giving $$\\cos 2\\theta$$, etc.) rather than identities that keep you in single-angle form.\n- Step 2: In Jan 2024 Q9, the target was $$3\\sin 2\\theta - 4\\cos 2\\theta = 2$$. Everything is in $$2\\theta$$, so: use $$\\sin\\theta\\cos\\theta = \\frac{1}{2}\\sin 2\\theta$$ (not $$\\sin 2\\theta = 2\\sin\\theta\\cos\\theta$$), use $$(\\cos\\theta - \\sin\\theta)(\\cos\\theta + \\sin\\theta) = \\cos 2\\theta$$ (difference of squares), and use $$\\sec 2\\theta \\cdot \\cos 2\\theta = 1$$. Each move produces a $$2\\theta$$ term.", "source": "GLM 5.1 ①", "_id": "glm_1_78"}, {"question": "When two populations are modelled as $$P_1 = 2000 \\times 1.03^T$$ and $$P_2 = 4000 \\times 0.98^T$$, describe the strategy to find when they are equal. (3 steps)", "answer": "- Step 1: Set them equal: $$2000 \\times 1.03^T = 4000 \\times 0.98^T$$. Divide both sides by 2000: $$1.03^T = 2 \\times 0.98^T$$.\n- Step 2: Divide by $$0.98^T$$: $$\\left(\\frac{1.03}{0.98}\\right)^T = 2$$. This collects all the $$T$$-dependent terms on one side.\n- Step 3: Take logs: $$T\\ln\\left(\\frac{1.03}{0.98}\\right) = \\ln 2$$, so $$T = \\frac{\\ln 2}{\\ln(1.03/0.98)} \\approx 13.9$$ years. The insight: different bases can be combined into a single base ratio, then the unknown exponent is isolated by taking logs.", "source": "GLM 5.1 ①", "_id": "glm_1_40"}, {"question": "Why does the iteration xₙ₊₁ = ∛[(5xₙ²-4xₙ+7)/xₙ] converge to α ≈ 2.1472?", "answer": "- Step 1: Rearranged from x⁴ = 5x²-4x+7 divided by x ⇒ x³ = (5x²-4x+7)/x.  \n- Step 2: Use ANS button for accurate iterations: x₁=2 ⇒ x₂=∛[(5·4-8+7)/2] ≈ 2.1544.  \n- Step 3: Continue until stabilization: x₃ ≈ 2.1459, x₄ ≈ 2.1474... converges to 2.1472.  \n+ Convergence requires |g’(α)| < 1.  \n+ Manual entry introduces rounding errors.", "source": "Qwen 3 ①", "_id": "qwen_1_5"}, {"question": "Describe the \"graph-reading\" strategy for choosing which branch (positive or negative modulus) applies at each intersection in a two-modulus equation.", "answer": "- Step 1: Draw both modulus graphs on the same axes. Mark each intersection.\n- Step 2: At each intersection, identify:\n+ For each modulus, which side of its vertex the intersection sits (left or right).\n+ This determines whether inside-of-modulus is positive or negative there.\n- Step 3: Replace each $$|f(x)|$$ with the appropriate signed version: $$f(x)$$ if positive side, $$-f(x)$$ if negative side. Now equate and solve.\n\nExample from Q8 paper 3: at $$x = 5$$, both $$|x+1|$$ and $$|2x - b|$$ are on their **positive branches** (right of their vertices). So equate $$x + 1 = a - (2x - b)$$.\n\nWithout the graph: you'd have to try all four combinations ($$++, +-, -+, --$$) and check. The graph narrows to the single correct combination.", "source": "Opus 4.7 ②", "_id": "opus_2_120"}, {"question": "Misconception probe: A student writes $$\\int \\dfrac{1}{3x+1}dx = \\ln|3x+1| + C$$. What's wrong, and what's the correct answer?", "answer": "Step 1: The student forgot the $$1/a = 1/3$$ factor. Step 2: Correct answer: $$\\dfrac{1}{3}\\ln|3x+1| + C$$. Step 3: To verify, differentiate the student's wrong answer: $$\\dfrac{d}{dx}\\ln|3x+1| = \\dfrac{3}{3x+1}$$, not $$\\dfrac{1}{3x+1}$$. So the student's antiderivative is off by a factor of 3. To get exactly $$1/(3x+1)$$, divide by 3 — hence the $$1/3$$ factor.", "source": "Opus 4.7 ①", "_id": "opus_1_76"}, {"question": "State the reciprocal trig identities and the Pythagorean identities involving $$\\sec$$, $$\\cosec$$, and $$\\cot$$. (2 steps)", "answer": "- Step 1: $$\\sec x = \\frac{1}{\\cos x}$$, $$\\cosec x = \\frac{1}{\\sin x}$$, $$\\cot x = \\frac{\\cos x}{\\sin x}$$. These are the definitions of the reciprocal trig functions.\n- Step 2: $$1 + \\tan^2 x = \\sec^2 x$$ and $$1 + \\cot^2 x = \\cosec^2 x$$. These are derived by dividing the Pythagorean identity $$\\sin^2 x + \\cos^2 x = 1$$ by $$\\cos^2 x$$ or $$\\sin^2 x$$ respectively.", "source": "GLM 5.1 ①", "_id": "glm_1_58"}, {"question": "What is $$\\log_{10}(10)$$, and what is a common mistake? (2 steps)", "answer": "- Step 1: $$\\log_{10}(10) = 1$$, because $$10^1 = 10$$. The logarithm asks \"to what power must I raise the base to get this number?\" and the answer is 1.\n- Step 2: The common mistake is writing $$\\log_{10}(10) = 10$$, confusing the argument with the result. This error propagates through the entire linearisation problem. Similarly, $$\\log_{10}(10^6) = 6$$, not $$10^6$$ — the log \"brings down\" the exponent.", "source": "GLM 5.1 ①", "_id": "glm_1_15"}, {"question": "Explain why $$e^0 = 1$$ (not 0), using both the exponential power rule and an alternative reasoning.", "answer": "**Power rule argument**:\n- Step 1: For any nonzero base $$a$$: $$a^0 = 1$$ by convention (and proven by $$a^{m}/a^{m} = a^{m-m} = a^0$$, where the left side equals 1).\n- Step 2: Apply to $$e$$: $$e^0 = 1$$.\n\n**Alternative: continuity of $$e^x$$**:\n- Step 1: $$e^x$$ is continuous. Consider values $$e^{-0.01} \\approx 0.99$$ and $$e^{0.01} \\approx 1.01$$.\n- Step 2: As $$x \\to 0$$, $$e^x \\to 1$$; continuity forces $$e^0 = 1$$.\n\nCommon confusion: students mix up $$e^0 = 1$$ and $$\\ln 1 = 0$$. These are inverses: $$e^0 = 1$$ (exponential at zero) vs $$\\ln 1 = 0$$ (log at one).", "source": "Opus 4.7 ②", "_id": "opus_2_95"}, {"question": "Conceptual: Why does the formula $$|f(x)| = -f(x)$$ when $$f(x) < 0$$ produce a *positive* output, and why isn't it written as $$|f(x)| = -|f(x)|$$ (which would be wrong)?", "answer": "Step 1: When $$f(x)$$ is negative, $$-f(x)$$ flips the sign to positive — outputting the absolute value. For example, $$f = -3$$, $$-f = +3$$; that's the modulus value. Step 2: Writing $$-|f(x)|$$ would always be non-positive (modulus is non-negative, with a minus sign in front), so it can never equal a positive modulus value. The minus sign attaches to $$f(x)$$, not to the modulus output. Step 3: This is why case-splitting works: the modulus *is* a piecewise function that picks between $$f$$ and $$-f$$ depending on the sign of $$f$$.", "source": "Opus 4.7 ①", "_id": "opus_1_74"}, {"question": "What's the PRACTICAL reason we rewrite $$a\\sin x + b\\cos x$$ as $$R\\sin(x + \\alpha)$$? Why is solving equations hard before this conversion?", "answer": "- Step 1: An expression like $$3\\sin 2x - 4\\cos 2x = 2$$ mixes two different trig functions. There's no identity that directly inverts \"$$3\\sin 2x - 4\\cos 2x$$\" to recover $$x$$.\n- Step 2: After R-conversion: $$5\\sin(2x - \\alpha) = 2 \\Rightarrow \\sin(2x - \\alpha) = 0.4$$. Now it's a single trig function — we can apply $$\\arcsin$$ and find solutions systematically.\n- Step 3: Mr Fuat's point: \"if we cannot write this in compact form, there is no way that we will be able to find $$\\theta$$.\" The R-formula is the *only* systematic route to solving such mixed equations.\n\nAlso, the R-form instantly reveals max/min values: $$\\max = R + c$$, $$\\min = -R + c$$.", "source": "Opus 4.7 ②", "_id": "opus_2_29"}, {"question": "What is the derivative of $$\\sin(kx)$$, $$\\cos(kx)$$, $$e^{kx}$$, and $$\\ln x$$? (2 steps)", "answer": "- Step 1: $$\\frac{d}{dx}\\sin(kx) = k\\cos(kx)$$ and $$\\frac{d}{dx}\\cos(kx) = -k\\sin(kx)$$. The chain rule gives the factor of $$k$$, and the derivative of $$\\cos$$ introduces a negative sign.\n- Step 2: $$\\frac{d}{dx}e^{kx} = ke^{kx}$$ (chain rule gives the factor of $$k$$) and $$\\frac{d}{dx}\\ln x = \\frac{1}{x}$$. These are the four standard derivatives used throughout P3.", "source": "GLM 5.1 ①", "_id": "glm_1_56"}, {"question": "How is the rate of change $$\\frac{dT}{dt}$$ found for $$T = 10 + Ae^{-Bt}$$, and why is the sign always negative for positive $$A$$ and $$B$$? (2 steps)", "answer": "- Step 1: Differentiating term by term gives $$\\frac{d}{dt}(10) = 0$$ and, by the chain rule, $$\\frac{d}{dt}(Ae^{-Bt}) = A \\cdot e^{-Bt} \\cdot (-B) = -ABe^{-Bt}$$.\n- Step 2: Since $$A>0$$, $$B>0$$, and $$e^{-Bt}>0$$ for all $$t$$, the product $$-ABe^{-Bt}$$ is strictly negative. Physically, this confirms the temperature is always decreasing, with the rate of cooling fastest at $$t=0$$ and asymptotically slowing to zero as the object reaches ambient temperature.", "source": "Kimi K2.6 ①", "_id": "kimi_1_17"}, {"question": "What is the convergence criterion for the iteration $$x_{n+1} = g(x_n)$$ at a fixed point $$\\alpha$$, and what is the geometric intuition?", "answer": "Step 1: The iteration converges to $$\\alpha$$ (for starting points sufficiently close) if and only if $$|g'(\\alpha)| < 1$$. Step 2: Geometric intuition: near $$\\alpha$$, $$g$$ is approximately linear with slope $$g'(\\alpha)$$. If the slope's magnitude is less than 1, errors get *contracted* with each iteration, so $$|x_n - \\alpha|$$ shrinks. If $$|g'(\\alpha)| > 1$$, errors get *amplified* and the iteration diverges, even from very close starting points. Step 3: At $$|g'(\\alpha)| = 1$$ behaviour is borderline. So the same equation $$f(x)=0$$ might have one rearrangement that converges and another that doesn't.", "source": "Opus 4.7 ①", "_id": "opus_1_43"}, {"question": "When solving $$3\\sin^2 x + \\sin x - 3 = 0$$ for $$0 \\leq x \\leq 2\\pi$$, why must one of the two roots be rejected, and how do you decide between the two valid $$x$$-values for a particular turning point $$Q$$? (4 steps)", "answer": "- Step 1: Quadratic formula: $$\\sin x = \\dfrac{-1 \\pm \\sqrt{1 + 36}}{6} = \\dfrac{-1 \\pm \\sqrt{37}}{6}$$.\n- Step 2: Compute: $$\\sqrt{37} \\approx 6.083$$. Two values: $$\\sin x \\approx 0.847$$ or $$\\sin x \\approx -1.181$$. **Reject $$-1.181$$** because $$|\\sin x| \\leq 1$$ — no real $$x$$ gives $$\\sin x = -1.181$$.\n- Step 3: For $$\\sin x \\approx 0.847$$, two solutions in $$[0, 2\\pi]$$: $$x \\approx 1.012$$ (1st quadrant) and $$x \\approx \\pi - 1.012 \\approx 2.130$$ (2nd quadrant).\n- Step 4: To pick the one corresponding to a turning point below the $$x$$-axis (i.e., $$f(x) < 0$$): substitute back and check the sign of $$f$$. Since $$f(x) = 2e^{3\\sin x}\\cos x$$, and $$\\cos x < 0$$ in the 2nd quadrant, $$f(x) < 0$$ at $$x \\approx 2.130$$. So $$Q$$'s $$x$$-coordinate is $$\\approx 2.130$$.\n\nThe principle: when multiple critical points exist, substitute back into the original $$f$$ to determine *which* turning point matches a given description.", "source": "Opus 4.7 ①", "_id": "opus_1_54"}, {"question": "Given $u_4 = a b^4 = 3690$ and $u_7 = a b^7 = 3470$, find $a$ and $b$. Explain why $b^4$, not $b^3$, appears in the calculation. (3 steps)", "answer": "- Step 1: Divide the two equations to eliminate $a$:\n$$\\frac{u_7}{u_4} = \\frac{a b^7}{a b^4} = b^3 = \\frac{3470}{3690}$$\n\n- Step 2: Solve for $b$:\n$$b^3 = \\frac{3470}{3690} \\approx 0.94 \\Rightarrow b \\approx 0.98$$\n\n- Step 3: Use $u_4 = a b^4 = 3690$ to find $a$:\n$$a = \\frac{3690}{b^4} = \\frac{3690}{0.98^4} = \\frac{3690}{0.9224} \\approx \\mathbf{4000}$$\n\n*Why $b^4$?* Because $u_4$ means $n = 4$, so the term is $a \\cdot b^4$, not $a \\cdot b^3$. Always match the subscript to the power.", "source": "MiniMax ②", "_id": "minimax_2_13"}, {"question": "What is the $$\\tan 2A$$ identity? (2 steps)", "answer": "- Step 1: $$\\tan 2A = \\frac{2\\tan A}{1 - \\tan^2 A}$$. This is derived by dividing the $$\\sin 2A$$ identity by the $$\\cos 2A$$ identity: $$\\frac{\\sin 2A}{\\cos 2A} = \\frac{2\\sin A\\cos A}{\\cos^2 A - \\sin^2 A}$$, then dividing top and bottom by $$\\cos^2 A$$.\n- Step 2: This identity is less commonly needed in P3 than the $$\\sin 2A$$ and $$\\cos 2A$$ identities, but it's in the formula book and can appear in questions where you need to express $$\\tan 2A$$ in terms of $$\\tan A$$.", "source": "GLM 5.1 ①", "_id": "glm_1_62"}, {"question": "To find the $$x$$-intercepts of $$y = a - |2x - b|$$, explain the two-branch approach and why there are typically two solutions. (3 steps)", "answer": "- Step 1: Set $$y = 0$$: $$a - |2x - b| = 0 \\Rightarrow |2x - b| = a$$. So $$2x - b = \\pm a$$.\n- Step 2: Two branches:\n+ Branch A: $$2x - b = a \\Rightarrow x = (a+b)/2$$\n+ Branch B: $$2x - b = -a \\Rightarrow x = (b - a)/2$$\n- Step 3: Given $$a > b > 0$$: Branch A gives positive $$x$$; Branch B gives **negative** $$x$$ (since $$b - a < 0$$).\n\nGeometric picture: the inverted V has two arms, each crossing the $$x$$-axis once (symmetric about the vertex $$x = b/2$$). Intercepts at $$((b-a)/2, 0)$$ and $$((b+a)/2, 0)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_66"}, {"question": "When using the sign-change method to justify a root in $$[a,b]$$, what two properties must be explicitly stated, and why is each indispensable? What is a classic failure case if one property is missing? (3 steps)", "answer": "- Step 1: State (i) $$f$$ is continuous on the closed interval $$[a,b]$$, and (ii) $$f(a)$$ and $$f(b)$$ have opposite signs ($$f(a)f(b)<0$$).\n- Step 2: Continuity is essential because the Intermediate Value Theorem applies only to continuous functions. A discontinuous function can jump over the axis without ever attaining zero. Opposite signs guarantee the graph is on opposite sides of the axis at the endpoints.\n- Step 3: Classic failure: $$f(x)=1/x$$ on $$[-1,1]$$. Here $$f(-1)=-1$$ and $$f(1)=1$$, so the sign changes, but there is no root. The function is not continuous at $$x=0$$, violating condition (i). Another subtle case: an even number of roots in the interval can leave the sign unchanged at the endpoints, so sign change alone is sufficient but not necessary.", "source": "Kimi K2.6 ②", "_id": "kimi_2_13"}, {"question": "Derive the R-formula for $$a\\sin x + b\\cos x$$ by showing it equals $$R\\sin(x + \\alpha)$$. What are $$R$$ and $$\\alpha$$? (4 steps)", "answer": "- Step 1: Start with the target form: $$R\\sin(x + \\alpha) = R\\sin x \\cos\\alpha + R\\cos x \\sin\\alpha$$, using the compound angle expansion.\n- Step 2: Match coefficients with $$a\\sin x + b\\cos x$$: $$R\\cos\\alpha = a$$ and $$R\\sin\\alpha = b$$.\n- Step 3: Square and add: $$R^2\\cos^2\\alpha + R^2\\sin^2\\alpha = a^2 + b^2 \\Rightarrow R^2 = a^2 + b^2 \\Rightarrow R = \\sqrt{a^2 + b^2}$$ (taking the positive root since $$R > 0$$).\n- Step 4: Divide: $$\\frac{R\\sin\\alpha}{R\\cos\\alpha} = \\frac{b}{a} \\Rightarrow \\tan\\alpha = \\frac{b}{a}$$. Since $$0 < \\alpha < \\pi/2$$ when $$a, b > 0$$, $$\\alpha = \\arctan(b/a)$$.\n\nThe geometric intuition: $$R$$ is the magnitude of the vector $$(a, b)$$, and $$\\alpha$$ is the angle it makes with the positive $$x$$-axis.", "source": "GLM 5.1 ①", "_id": "glm_1_23"}, {"question": "Numerical exercise: Differentiate $$y = e^{2x}\\cos x$$ using the product rule, in factored form.", "answer": "Step 1: Set $$u = e^{2x}$$, $$v = \\cos x$$. Then $$u' = 2e^{2x}$$ (chain rule), $$v' = -\\sin x$$. Step 2: Product rule: $$y' = 2e^{2x}\\cos x + e^{2x}(-\\sin x) = e^{2x}(2\\cos x - \\sin x)$$. Step 3: Factored form pulls the common $$e^{2x}$$ outside, useful for finding turning points (set inner bracket to zero, since $$e^{2x} > 0$$).", "source": "Opus 4.7 ①", "_id": "opus_1_97"}, {"question": "What is the most common error when converting $$\\log_{10}y = 6 - 3\\log_{10}x$$ back to exponential form, and why is the correct result $$y = 10^{6}x^{-3}$$? (2 steps)", "answer": "- Step 1: A common error is \"dropping\" the logs term by term, yielding $$y = 6 - 3x$$. This is wrong because a logarithm is an exponent operation, not a multiplicative coefficient; it cannot be removed by subtraction.\n- Step 2: Correctly, exponentiate base 10 over the entire right-hand side: $$10^{\\log_{10}y} = 10^{6 - 3\\log_{10}x}$$. The left side becomes $$y$$. The right side becomes $$10^{6} \\cdot 10^{-3\\log_{10}x} = 10^{6} \\cdot (10^{\\log_{10}x})^{-3} = 10^{6}x^{-3}$$. The exponent laws turn the linear log equation into a power law.", "source": "Kimi K2.6 ①", "_id": "kimi_1_45"}, {"question": "A student says \"for $y = f(ax)$, the horizontal stretch scale factor is a.\" Explain why this is wrong and what the correct scale factor is. (1 step)", "answer": "- This is incorrect. For $y = f(ax)$, the horizontal stretch scale factor is $\\frac{1}{a}$, NOT $a$.\n- Reason: If $f(x)$ has a point at $(x, y)$, then $f(ax)$ requires $ax = x_{old}$, so $x_{new} = \\frac{x_{old}}{a}$. This compresses toward the y-axis by factor $a$, which is equivalent to a stretch by factor $\\frac{1}{a}$.\n\n**Takeaway:** The scale factor is the reciprocal of the coefficient. $y = f(ax)$ → horizontal scale $\\frac{1}{a}$; $y = af(x)$ → vertical scale $a$.", "source": "MiniMax ①", "_id": "minimax_1_46"}, {"question": "After finding two valid $$x$$-values for the turning points of $$f(x) = 2e^{3\\sin x}\\cos x$$, how do you determine which is $$Q$$ (the one below the $$x$$-axis)? (2 steps)", "answer": "- Step 1: The two solutions are $$x \\approx 1.012$$ (1st quadrant, where $$\\cos x > 0$$) and $$x \\approx 2.130$$ (2nd quadrant, where $$\\cos x < 0$$).\n- Step 2: Since $$f(x) = 2e^{3\\sin x}\\cos x$$ and $$2e^{3\\sin x} > 0$$ always, the sign of $$f(x)$$ is determined by $$\\cos x$$. At $$x \\approx 1.012$$, $$\\cos x > 0$$ so $$f(x) > 0$$ (above $$x$$-axis, this is $$P$$). At $$x \\approx 2.130$$, $$\\cos x < 0$$ so $$f(x) < 0$$ (below $$x$$-axis, this is $$Q$$). Alternatively, substitute each $$x$$ back into $$f(x)$$ and check the sign of the output.", "source": "GLM 5.1 ②", "_id": "glm_2_34"}, {"question": "Explain why $$\\log(ab)=\\log a+\\log b$$ and $$\\log(a^n)=n\\log a$$ using the definition of a logarithm as an exponent. How do these laws enable linearisation of multiplicative models? (2 steps)", "answer": "- Step 1: Let $$p=\\log_B a$$ and $$q=\\log_B b$$, so $$a=B^p$$ and $$b=B^q$$. Then $$ab=B^pB^q=B^{p+q}$$, which means $$\\log_B(ab)=p+q=\\log_B a+\\log_B b$$. Similarly $$a^n=(B^p)^n=B^{pn}$$, so $$\\log_B(a^n)=pn=n\\log_B a$$.\n- Step 2: These laws convert multiplication into addition and exponentiation into multiplication. A power law $$y=kx^n$$ becomes $$\\log y = \\log k + n\\log x$$, turning multiplicative relationships into linear ones that graph as straight lines on log-log axes.", "source": "Kimi K2.6 ②", "_id": "kimi_2_27"}, {"question": "Conceptual: When is a horizontal asymptote attained vs only approached, in models like $$T = C + Ae^{-Bt}$$?", "answer": "Step 1: $$T = C$$ is approached as $$t \\to \\infty$$ but never reached (assuming $$A \\neq 0$$ and the exponential never vanishes). Step 2: An exponential decay $$Ae^{-Bt}$$ shrinks toward zero for all finite $$t$$, but $$e^{-Bt} > 0$$ always — never *equals* zero. So $$T - C = Ae^{-Bt}$$ is strictly positive (or strictly negative if $$A < 0$$). Step 3: This is what \"asymptote\" means — a value approached arbitrarily closely but not attained. In contrast, polynomial functions can attain their asymptotes (e.g., $$y = 1/x$$ never reaches its horizontal asymptote $$y=0$$, but a graph like $$y = x \\sin(1/x)$$ might cross it). Asymptotes are about *limiting* behaviour, not exclusion zones.", "source": "Opus 4.7 ①", "_id": "opus_1_75"}, {"question": "To rearrange $$x^{4} - 5x^{2} + 4x - 7 = 0$$ into the iteration form $$x = \\sqrt[3]{\\frac{5x^{2}-4x+7}{x}}$$, what does \"act with respect to the answer\" mean, and how does it guide the algebra? (3 steps)", "answer": "- Step 1: Inspect the target form. It contains a cube root, so the expression under the root must be a perfect cube in $$x$$; specifically, we need $$x^{3} = (\\text{something})$$ before taking the cube root.\n- Step 2: Start from $$x^{4} - 5x^{2} + 4x - 7 = 0$$ and isolate the highest power: $$x^{4} = 5x^{2} - 4x + 7$$.\n- Step 3: To obtain $$x^{3}$$, divide both sides by $$x$$ (justified since the root $$\\alpha \\neq 0$$): $$x^{3} = \\frac{5x^{2}-4x+7}{x}$$. Then take the cube root. The target form dictated that we needed $$x^{3}$$, which prevented useless moves like dividing by $$x^{2}$$ or expanding differently.", "source": "Kimi K2.6 ①", "_id": "kimi_1_20"}, {"question": "Evaluate $$\\int_1^3 \\\\frac{16}{9(3x - 7/3)}\\,dx$$ conceptually — walk through the structure without doing heavy arithmetic. (3 steps)", "answer": "- Step 1: Identify $$a = 3$$ in the template $$\\int\\frac{1}{ax+b}\\,dx = \\frac{1}{a}\\ln|ax+b|$$. Pull out the constant $$\\frac{16}{9}$$: $$ I = \\frac{16}{9} \\cdot \\frac{1}{3}[\\ln|3x - 7/3|]_1^3$$.\n- Step 2: Evaluate the bounds: at $$x=3$$, $$3x - 7/3 = 20/3$$; at $$x=1$$, $$3 - 7/3 = 2/3$$. So the log becomes $$\\ln\\frac{20/3}{2/3} = \\ln 10$$.\n- Step 3: The fractions cancel beautifully: $$\\frac{16}{9} \\cdot \\frac{1}{3}cdot \\ln 10 = \\frac{16}{27}\\ln 10$$. So $$\\lambda = \\frac{16}{27}$$ The $$\\frac{1}{a} = \\frac{1}{3}$$ is essential — withoutthe answer would be $$\\frac{16}{9}\\ln 10$$ (wrong) without it.", "source": "GLM 5.1 ③", "_id": "glm_3_18"}, {"question": "When evaluating a definite integral that yields something like $$[\\ln|3x - 7/3|]_1^3$$, what is a clean way to handle the fraction arithmetic? (2 steps)", "answer": "- Step 1: Write everything over a common denominator. At $$x = 3$$: $$3(3) - 7/3 = 9 - 7/3 = 27/3 - 7/3 = 20/3$$. At $$x = 1$$: $$3(1) - 7/3 = 3 - 7/3 = 9/3 - 7/3 = 2/3$$.\n- Step 2: When you form the ratio inside the log: $$\\frac{20/3}{2/3} = \\frac{20}{3} \\times \\frac{3}{2} = \\frac{20}{2} = 10$$. The thirds cancel cleanly. The pitfall is trying to compute $$\\ln(20/3) - \\ln(2/3)$$ separately without combining — this invites decimal rounding errors.", "source": "GLM 5.1 ①", "_id": "glm_1_77"}, {"question": "Physically interpret: $$\\log_{10} D = 1.04 + 0.38 T$$ where $$D$$ is donations received ($$£$$) and $$T$$ is months since launch. What do the numbers 1.04 and 0.38 represent?", "answer": "- Step 1: Convert to exponential form: $$D = 10^{1.04} \\cdot (10^{0.38})^T \\approx 10.96 \\cdot 2.399^T$$.\n- Step 2: Interpret parameters:\n+ $$10^{1.04} \\approx 10.96$$: the **initial donation** at $$T = 0$$ (launch day), roughly £11.\n+ $$10^{0.38} \\approx 2.4$$: the **monthly multiplicative growth factor**. Each month, donations are multiplied by 2.4.\n- Step 3: Physical meaning: explosive growth — donations more than double every month. After 12 months, donations $$\\approx 10.96 \\cdot 2.4^{12} \\approx 4 \\times 10^5$$.\n\nInsight: log-linear graphs are straight lines precisely when the underlying process is **exponential**. The slope tells you the growth rate per unit time.", "source": "Opus 4.7 ②", "_id": "opus_2_100"}, {"question": "What is the **composite function** $$gf(a)$$, and what's a common confusion with the order? (2 steps)", "answer": "- Step 1: $$gf(a) = g(f(a))$$ — read inside-out: apply $$f$$ first to $$a$$, then apply $$g$$ to the result. Even though \"$$g$$\" is written first, $$f$$ acts first.\n- Step 2: Confusion: students sometimes evaluate $$g$$ first then $$f$$. Mnemonic: the function nearest to the input acts first. Or: parse $$gf(a)$$ as $$g[f(a)]$$ — the bracket on $$f$$ wraps the input.", "source": "Opus 4.7 ①", "_id": "opus_1_59"}, {"question": "Iteration $$x_{n+1} = g(x_n)$$ doesn't always converge. Provide intuition for why the condition $$|g'(\\alpha)| < 1$$ is required at the fixed point.", "answer": "- Step 1: Near the root $$\\alpha$$, write $$x_n = \\alpha + \\epsilon_n$$ (small error $$\\epsilon_n$$).\n- Step 2: Apply $$g$$: $$x_{n+1} = g(\\alpha + \\epsilon_n) \\approx g(\\alpha) + g'(\\alpha) \\epsilon_n = \\alpha + g'(\\alpha) \\epsilon_n$$ (Taylor approximation; and since $$\\alpha$$ is a fixed point, $$g(\\alpha) = \\alpha$$).\n- Step 3: So $$\\epsilon_{n+1} \\approx g'(\\alpha) \\epsilon_n$$. Errors shrink iff $$|g'(\\alpha)| < 1$$ (contraction); errors grow iff $$|g'(\\alpha)| > 1$$ (divergence).\n\nIntuition: each step multiplies the error by $$g'(\\alpha)$$. For convergence, this multiplier must shrink errors.\n\nPractical: if an iteration diverges, try a different rearrangement of $$f(x) = 0$$ into $$x = g(x)$$; different $$g$$'s have different derivatives.", "source": "Opus 4.7 ②", "_id": "opus_2_92"}, {"question": "Why does $$\\sec 2\\theta \\cdot \\cos 2\\theta = 1$$ — and how is this used to simplify $$(2 + \\sec 2\\theta)\\cos 2\\theta$$?", "answer": "Step 1: By definition $$\\sec x = 1/\\cos x$$, so $$\\sec 2\\theta = 1/\\cos 2\\theta$$. Multiplying: $$\\sec 2\\theta \\cdot \\cos 2\\theta = (1/\\cos 2\\theta) \\cdot \\cos 2\\theta = 1$$. Step 2: When you see $$(2 + \\sec 2\\theta) \\cdot \\cos 2\\theta$$, expand: $$2\\cos 2\\theta + \\sec 2\\theta \\cdot \\cos 2\\theta = 2\\cos 2\\theta + 1$$. Step 3: This converts a product involving $$\\sec$$ into a clean linear form in $$\\cos 2\\theta$$ — a typical trick for trig identity proofs.", "source": "Opus 4.7 ①", "_id": "opus_1_35"}, {"question": "In the identity proof from Q44, why is the factor $$\\frac{1}{2}$$ in $$\\sin\\theta\\cos\\theta = \\frac{1}{2}\\sin 2\\theta$$ so critical, and what goes wrong if you forget it? (2 steps)", "answer": "- Step 1: The double-angle identity is $$\\sin 2A = 2\\sin A\\cos A$$, which rearranges to $$\\sin A\\cos A = \\frac{1}{2}\\sin 2A$$. If you forget the $$\\frac{1}{2}$$ and write $$3\\sin\\theta\\cos\\theta = 3\\sin 2\\theta$$, you'll get $$3\\sin 2\\theta = 2\\cos 2\\theta + 1$$ after equating, which is wrong.\n- Step 2: The correct equation is $$\\frac{3}{2}\\sin 2\\theta = 2\\cos 2\\theta + 1$$, which after multiplying by 2 gives $$3\\sin 2\\theta - 4\\cos 2\\theta = 2$$. Forgetting the $$\\frac{1}{2}$$ changes the coefficients and the entire R-formula computation downstream. The $$\\frac{1}{2}$$ is one of the most commonly dropped factors in exams.", "source": "GLM 5.1 ②", "_id": "glm_2_44"}, {"question": "For a decay model $$T = C + Ae^{-Bt}$$ with $$A, B > 0$$, identify the horizontal asymptote and describe how $$T$$ approaches it.", "answer": "- Ste
