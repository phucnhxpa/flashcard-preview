Compare the degree of the numerator to the degree of the denominator. If $$\\deg(\\text{numerator}) \\geq \\deg(\\text{denominator})$$, the fraction is \"top-heavy\" (or equal), and you must perform polynomial division first. This produces a polynomial part plus a proper fraction remainder.\n- Step 2: If $$\\deg(\\text{numerator}) < \\deg(\\text{denominator})$$, the fraction is already proper, so go straight to partial fractions. After polynomial division, the remainder fraction will satisfy this condition, and then you can apply partial fractions to it.\n\nExample: $$\\frac{2x^2 - 5x + 8}{x - 2}$$ has $$\\deg(\\text{num}) = 2 \\geq \\deg(\\text{den}) = 1$$, so polynomial division first, yielding $$2x - 1 + \\frac{6}{x-2}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "When integrating $$\\int \\frac{1}{ax + b} \\, dx$$, what is the result and why is the $$\\frac{1}{a}$$ factor necessary? (3 steps)", "answer": "- Step 1: The result is $$\\frac{1}{a} \\ln|ax + b| + C$$. The $$\\frac{1}{a}$$ factor comes from the chain rule in reverse. When you differentiate $$\\ln|ax + b|$$, you get $$\\frac{1}{ax+b} \\cdot a = \\frac{a}{ax+b}$$, which is $$a$$ times too large.\n- Step 2: To compensate, you must divide by $$a$$. So $$\\frac{d}{dx}\\left[\\frac{1}{a}\\ln|ax+b|\\right] = \\frac{1}{a} \\cdot \\frac{a}{ax+b} = \\frac{1}{ax+b}$$. This confirms the integral is correct.\n- Step 3: When $$a = 1$$, the factor is just 1 and doesn't change anything, which is why it's easy to forget in that case. But when $$a \\neq 1$$ (e.g., $$a = 3$$), omitting it gives a wrong answer. This is Phuc's #1 integration mistake.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "After evaluating a definite integral that produces terms like $$6\\ln 6 - 6\\ln 2$$, what should you do before reading off the final coefficients, and why? (2 steps)", "answer": "- Step 1: Combine the log terms using the log division law: $$\\ln A - \\ln B = \\ln\\frac{A}{B}$$. So $$6\\ln 6 - 6\\ln 2 = 6(\\ln 6 - \\ln 2) = 6\\ln\\frac{6}{2} = 6\\ln 3$$.\n- Step 2: The reason is that exam questions typically ask for the answer in the form $$\\alpha + \\beta \\ln(\\text{simple number})$$. If you don't combine, you might read off $$\\beta = 6$$ with an ambiguous log argument, or worse, try to compute the decimal and lose the exact form. Always combine before reading off $$\\alpha$$ and $$\\beta$$.\n\nPitfall: not combining $$6\\ln 6 - 6\\ln 2$$ into $$6\\ln 3$$.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "A power model has the form $$y = kx^n$$. How do you convert this into a straight-line relationship, and what are the gradient and intercept? (3 steps)", "answer": "- Step 1: Take logarithms of both sides (any base, but typically base 10 for graphing): $$\\log y = \\log(kx^n) = \\log k + \\log(x^n) = \\log k + n\\log x$$.\n- Step 2: This is the equation of a straight line: $$Y = mX + c$$, where $$Y = \\log y$$, $$X = \\log x$$, $$m = n$$ (the power), and $$c = \\log k$$ (the log of the coefficient).\n- Step 3: Plotting $$\\log y$$ against $$\\log x$$ gives a straight line with gradient $$n$$ and $$Y$$-intercept $$\\log k$$. To recover $$k$$, raise the base to the intercept power: $$k = 10^{\\text{intercept}}$$ (if using base 10).\n\nTemplate: $$y = kx^n \\Rightarrow \\log y = n\\log x + \\log k$$.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "An exponential model has the form $$y = ka^x$$. How do you convert this into a straight-line relationship, and what is the key difference from the power model? (3 steps)", "answer": "- Step 1: Take logarithms of both sides: $$\\log y = \\log(ka^x) = \\log k + \\log(a^x) = \\log k + x\\log a$$.\n- Step 2: This gives $$Y = mX + c$$ where $$Y = \\log y$$, $$X = x$$ (just $$x$$, NOT $$\\log x$$), $$m = \\log a$$, and $$c = \\log k$$.\n- Step 3: The key difference from the power model: for the exponential model, you plot $$\\log y$$ against $$x$$ (the variable itself). For the power model, you plot $$\\log y$$ against $$\\log x$$. Confusing these two is a major pitfall — the horizontal axis differs.\n\nTemplate: $$y = ka^x \\Rightarrow \\log y = (\\log a) \\cdot x + \\log k$$.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": true}, {"question": "Given a straight-line relationship $$\\log_3 N = 2t + 4$$, how do you convert back to the form $$N = ab^t$$? What base do you use when exponentiating? (3 steps)", "answer": "- Step 1: Raise the base of the logarithm to both sides. Since the log is base 3, raise 3 to both sides: $$3^{\\log_3 N} = 3^{2t+4}$$. By the inverse property $$b^{\\log_b x} = x$$, the left side simplifies to $$N$$.\n- Step 2: Split the right side using index laws: $$N = 3^{2t+4} = 3^4 \\cdot 3^{2t} = 81 \\cdot (3^2)^t = 81 \\cdot 9^t$$.\n- Step 3: Read off $$a = 81$$ and $$b = 9$$. The crucial step is splitting $$3^{2t} = (3^2)^t = 9^t$$ to match the $$b^t$$ form. Also, you MUST use the same base as the logarithm (base 3 here) — using base 10 would be wrong.\n\nPitfalls: (1) not splitting $$3^{2t}$$ into $$(3^2)^t = 9^t$$; (2) using the wrong base when exponentiating.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": true}, {"question": "What is $$\\log_{10}(10)$$, and what is a common mistake? (2 steps)", "answer": "- Step 1: $$\\log_{10}(10) = 1$$, because $$10^1 = 10$$. The logarithm asks \"to what power must I raise the base to get this number?\" and the answer is 1.\n- Step 2: The common mistake is writing $$\\log_{10}(10) = 10$$, confusing the argument with the result. This error propagates through the entire linearisation problem. Similarly, $$\\log_{10}(10^6) = 6$$, not $$10^6$$ — the log \"brings down\" the exponent.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": true}, {"question": "Given $$\\log_{10} D = 1.04 + 0.38T$$, how do you convert to the form $$D = ab^T$$, and what is the key algebraic step? (3 steps)", "answer": "- Step 1: Raise 10 to both sides (same base as the logarithm): $$D = 10^{1.04 + 0.38T}$$.\n- Step 2: Split using index laws: $$D = 10^{1.04} \\cdot 10^{0.38T}$$. The key algebraic step is rewriting $$10^{0.38T} = (10^{0.38})^T$$, which isolates the $$T$$ in the exponent as a simple multiplier.\n- Step 3: Read off $$a = 10^{1.04} \\approx 10.96$$ and $$b = 10^{0.38} \\approx 2.399$$. Hence $$D \\approx 10.96 \\times 2.399^T$$. Without splitting the exponent, you can't identify $$b$$.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": true}, {"question": "When you need to find $$T$$ in an equation like $$\\log_{10} D = mT + c$$ for a given $$D$$, which form should you use — the log form or the exponential form — and why? (2 steps)", "answer": "- Step 1: Use the log form directly — it's faster and avoids unnecessary computation. Simply substitute the given $$D$$: $$\\log_{10}(D) = mT + c$$, then solve: $$T = \\frac{\\log_{10}(D) - c}{m}$$.\n- Step 2: If you used the exponential form $$D = ab^T$$ instead, you'd need to take logs anyway to isolate $$T$$: $$T = \\frac{\\log(D/a)}{\\log b}$$. This requires computing $$a$$ and $$b$$ first (introducing rounding errors) and then taking logs. The log form skips all that.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "State all three equivalent forms of the $$\\cos 2A$$ double-angle identity, and explain when to use each one. (3 steps)", "answer": "- Step 1: $$\\cos 2A = \\cos^2 A - \\sin^2 A$$. Use this when you see a difference of squares involving $$\\cos$$ and $$\\sin$$, or when you need to expand $$\\cos 2A$$ in terms of both $$\\cos^2$$ and $$\\sin^2$$.\n- Step 2: $$\\cos 2A = 2\\cos^2 A - 1$$. Use this (or its rearrangement $$\\cos^2 A = \\frac{1}{2}(1 + \\cos 2A)$$) when you see $$\\cos^2 A$$ in the expression and need to introduce $$\\cos 2A$$. This was the correct choice in the exam question with $$4\\cos^2 x$$.\n- Step 3: $$\\cos 2A = 1 - 2\\sin^2 A$$. Use this (or $$\\sin^2 A = \\frac{1}{2}(1 - \\cos 2A)$$) when you see $$\\sin^2 A$$ and need to introduce $$\\cos 2A$$.\n\nCritical pitfall from the exam: using $$\\cos 2A = \\cos^2 A - \\sin^2 A$$ doesn't help when you have $$\\cos^2 A$$ alone — you need $$\\cos^2 A = \\frac{1}{2}(1 + \\cos 2A)$$ instead.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": true}, {"question": "How do you recognise that $$8\\sin x \\cos x$$ is related to a double-angle identity, and what is the conversion? (2 steps)", "answer": "- Step 1: Spot the pattern $$\\sin x \\cos x$$. The identity $$\\sin 2A = 2\\sin A \\cos A$$ means $$\\sin A \\cos A = \\frac{1}{2}\\sin 2A$$. So $$\\sin x \\cos x = \\frac{1}{2}\\sin 2x$$.\n- Step 2: Therefore $$8\\sin x \\cos x = 8 \\cdot \\frac{1}{2}\\sin 2x = 4\\sin 2x$$. The key is to see the product $$\\sin \\times \\cos$$ and immediately think \"double angle.\" The coefficient 8 becomes 4 after the factor of $$\\frac{1}{2}$$ from the identity.\n\nPitfall: not seeing $$8\\sin x \\cos x$$ as $$4 \\cdot (2\\sin x \\cos x) = 4\\sin 2x$$.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "What is the product $$(\\cos\\theta + \\sin\\theta)(\\cos\\theta - \\sin\\theta)$$, and why is this pattern important in trig identity proofs? (2 steps)", "answer": "- Step 1: This is a difference of two squares: $$(\\cos\\theta + \\sin\\theta)(\\cos\\theta - \\sin\\theta) = \\cos^2\\theta - \\sin^2\\theta = \\cos 2\\theta$$ by the double-angle identity.\n- Step 2: This pattern is crucial because it's the bridge between single-angle expressions and double-angle expressions. When a question asks you to show something in terms of $$2\\theta$$, and you see $$(\\cos\\theta \\pm \\sin\\theta)$$ factors, multiplying them out gives $$\\cos 2\\theta$$ directly. This appeared in the Jan 2024 Q9 identity proof.\n\nPitfall: not recognising the difference-of-squares structure when it involves trig functions.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "What is the relationship $$\\sin\\theta\\cos\\theta = \\,?$$ in terms of a double angle, and what factor is commonly forgotten? (2 steps)", "answer": "- Step 1: From $$\\sin 2\\theta = 2\\sin\\theta\\cos\\theta$$, we get $$\\sin\\theta\\cos\\theta = \\frac{1}{2}\\sin 2\\theta$$.\n- Step 2: The factor of $$\\frac{1}{2}$$ is vital and commonly forgotten. If you have $$3\\sin\\theta\\cos\\theta$$ and write it as $$3\\sin 2\\theta$$ (missing the $$\\frac{1}{2}$$), your entire subsequent algebra will be wrong. The correct conversion is $$3\\sin\\theta\\cos\\theta = \\frac{3}{2}\\sin 2\\theta$$.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "What is $$\\sec 2\\theta \\cdot \\cos 2\\theta$$, and why does this simplify nicely in identity proofs? (2 steps)", "answer": "- Step 1: Since $$\\sec 2\\theta = \\frac{1}{\\cos 2\\theta}$$, we have $$\\sec 2\\theta \\cdot \\cos 2\\theta = \\frac{1}{\\cos 2\\theta} \\cdot \\cos 2\\theta = 1$$ (provided $$\\cos 2\\theta \\neq 0$$).\n- Step 2: This cancellation is powerful in identity proofs. For example, $$(2 + \\sec 2\\theta)\\cos 2\\theta = 2\\cos 2\\theta + \\sec 2\\theta \\cdot \\cos 2\\theta = 2\\cos 2\\theta + 1$$. The $$\\sec$$ and $$\\cos$$ \"cancel,\" leaving a clean expression.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "Derive the R-formula for $$a\\sin x + b\\cos x$$ by showing it equals $$R\\sin(x + \\alpha)$$. What are $$R$$ and $$\\alpha$$? (4 steps)", "answer": "- Step 1: Start with the target form: $$R\\sin(x + \\alpha) = R\\sin x \\cos\\alpha + R\\cos x \\sin\\alpha$$, using the compound angle expansion.\n- Step 2: Match coefficients with $$a\\sin x + b\\cos x$$: $$R\\cos\\alpha = a$$ and $$R\\sin\\alpha = b$$.\n- Step 3: Square and add: $$R^2\\cos^2\\alpha + R^2\\sin^2\\alpha = a^2 + b^2 \\Rightarrow R^2 = a^2 + b^2 \\Rightarrow R = \\sqrt{a^2 + b^2}$$ (taking the positive root since $$R > 0$$).\n- Step 4: Divide: $$\\frac{R\\sin\\alpha}{R\\cos\\alpha} = \\frac{b}{a} \\Rightarrow \\tan\\alpha = \\frac{b}{a}$$. Since $$0 < \\alpha < \\pi/2$$ when $$a, b > 0$$, $$\\alpha = \\arctan(b/a)$$.\n\nThe geometric intuition: $$R$$ is the magnitude of the vector $$(a, b)$$, and $$\\alpha$$ is the angle it makes with the positive $$x$$-axis.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": true}, {"question": "State all four R-formula variants, including the sign pattern in the angle. (4 steps)", "answer": "- Step 1: $$a\\sin x + b\\cos x = R\\sin(x + \\alpha)$$ — both coefficients positive, so the angle is added. $$R = \\sqrt{a^2+b^2}$$, $$\\tan\\alpha = b/a$$.\n- Step 2: $$a\\sin x - b\\cos x = R\\sin(x - \\alpha)$$ — the $$\\cos$$ coefficient is negative, so the angle is subtracted. $$R = \\sqrt{a^2+b^2}$$, $$\\tan\\alpha = b/a$$.\n- Step 3: $$a\\cos x + b\\sin x = R\\cos(x - \\alpha)$$ — starts with $$\\cos$$, so use $$\\cos$$ form; the angle is subtracted. $$R = \\sqrt{a^2+b^2}$$, $$\\tan\\alpha = b/a$$.\n- Step 4: $$a\\cos x - b\\sin x = R\\cos(x + \\alpha)$$ — the $$\\sin$$ coefficient is negative, so the angle is added. $$R = \\sqrt{a^2+b^2}$$, $$\\tan\\alpha = b/a$$.\n\nMnemonic: the sign between the terms tells you the sign inside the bracket (same sign → same sign; opposite → opposite), but the base function ($$\\sin$$ or $$\\cos$$) determines whether it's $$+$$ or $$-$$ in the standard form.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "Given $$f(x) = R\\sin(2x + \\alpha) + c$$, what are the maximum and minimum values of $$f(x)$$, and at what values of the argument do they occur? (2 steps)", "answer": "- Step 1: The sine function ranges from $$-1$$ to $$+1$$. So the maximum of $$R\\sin(2x + \\alpha) + c$$ is $$R \\cdot 1 + c = R + c$$, occurring when $$\\sin(2x + \\alpha) = 1$$, i.e., when $$2x + \\alpha = \\frac{\\pi}{2} + 2n\\pi$$ for integer $$n$$.\n- Step 2: The minimum is $$R \\cdot (-1) + c = -R + c$$, occurring when $$\\sin(2x + \\alpha) = -1$$, i.e., when $$2x + \\alpha = -\\frac{\\pi}{2} + 2n\\pi$$ (equivalently $$\\frac{3\\pi}{2} + 2n\\pi$$).\n\nThe key insight: regardless of what's inside the sine, its output is always between $$-1$$ and $$1$$. The $$R$$ scales the amplitude and $$c$$ shifts the midline.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "To find the second smallest positive $$x$$ where $$R\\sin(2x + \\alpha) + c$$ achieves its maximum, what periodic property of sine do you use? (3 steps)", "answer": "- Step 1: The maximum occurs when $$\\sin(2x + \\alpha) = 1$$, i.e., $$2x + \\alpha = \\frac{\\pi}{2} + 2n\\pi$$ for $$n = 0, 1, 2, \\ldots$$\n- Step 2: Solve for $$x$$: $$x = \\frac{\\pi/2 - \\alpha + 2n\\pi}{2}$$. For $$n = 0$$, this gives the smallest positive $$x_1 = \\frac{\\pi/2 - \\alpha}{2}$$. For $$n = 1$$, the second smallest $$x_2 = \\frac{\\pi/2 - \\alpha + 2\\pi}{2} = \\frac{5\\pi/2 - \\alpha}{2}$$.\n- Step 3: The period of $$\\sin(2x + \\alpha)$$ is $$\\pi$$ (since the coefficient of $$x$$ is 2, the period is $$2\\pi/2 = \\pi$$). So successive maxima are spaced $$\\pi$$ apart. The second maximum is at $$x_1 + \\pi$$.\n\nPitfall: missing the second smallest $$x$$ — sine hits 1 at $$\\pi/2$$, $$\\pi/2 + 2\\pi$$, $$\\pi/2 + 4\\pi$$, etc. (period $$2\\pi$$ in the argument, which translates to period $$\\pi$$ in $$x$$ when the argument is $$2x$$).", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "Why is the R-formula necessary for solving equations like $$3\\sin 2x - 4\\cos 2x = 2$$? What happens if you don't use it? (2 steps)", "answer": "- Step 1: Without the R-formula, you have two different trig functions with the same angle but different coefficients. There's no algebraic way to solve $$3\\sin 2x - 4\\cos 2x = 2$$ directly — you can't isolate $$x$$ because $$\\sin$$ and $$\\cos$$ are intertwined.\n- Step 2: The R-formula compresses the two terms into a single sine (or cosine) function: $$5\\sin(2x - \\alpha) = 2$$, which can be solved using inverse sine and the general solution for $$\\sin \\theta = k$$. As Mr. Fuat said: \"If we cannot write this in compact form, there is no way we will be able to find the $$\\theta$$ value.\"", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "When converting $$3\\sin 2x - 4\\cos 2x$$ to R-formula, why do you use $$R\\sin(2x - \\alpha)$$ instead of $$R\\sin(2x + \\alpha)$$? (2 steps)", "answer": "- Step 1: The sign pattern determines the form. Here the $$\\cos$$ term has a negative coefficient ($$-4$$), so we use the variant $$a\\sin x - b\\cos x = R\\sin(x - \\alpha)$$ with $$a = 3, b = 4$$.\n- Step 2: Expanding $$R\\sin(2x - \\alpha) = R\\sin 2x\\cos\\alpha - R\\cos 2x\\sin\\alpha$$. Matching: $$R\\cos\\alpha = 3$$ (positive, matches $$+3\\sin 2x$$) and $$R\\sin\\alpha = 4$$ (the minus sign in the expansion gives $$-R\\sin\\alpha\\cos 2x = -4\\cos 2x$$, so $$R\\sin\\alpha = 4$$). If we used $$R\\sin(2x + \\alpha)$$, the expansion would give $$+R\\sin\\alpha\\cos 2x$$, which would need to equal $$-4\\cos 2x$$, requiring $$R\\sin\\alpha = -4$$ — inconsistent with $$\\alpha$$ in the first quadrant.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": true}, {"question": "State the Sign Change Theorem (Intermediate Value Theorem) for proving a root exists in an interval, and what two conditions must you verify. (2 steps)", "answer": "- Step 1: If $$f$$ is continuous on $$[a, b]$$ and $$f(a) \\cdot f(b) < 0$$ (i.e., $$f(a)$$ and $$f(b)$$ have opposite signs), then there exists $$c \\in (a, b)$$ such that $$f(c) = 0$$.\n- Step 2: The two conditions you must explicitly verify are: (1) $$f$$ is continuous on $$[a, b]$$ — for polynomials this is automatic, but you should still state it; (2) $$f(a)$$ and $$f(b)$$ have opposite signs — compute both values and show one is positive and one is negative.\n\nPitfall: forgetting to state that $$f$$ is continuous. Mr. Fuat: \"Use the interval endpoints directly; don't pick weird decimals.\"", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "When rearranging $$f(x) = 0$$ into the iterative form $$x = g(x)$$, what strategy should guide your algebra, and how does the target form help? (3 steps)", "answer": "- Step 1: \"Act with respect to the answer\" — look at the target form $$x = g(x)$$ that the question gives you, and work towards it. The target tells you what the highest power of $$x$$ should be inside $$g(x)$$.\n- Step 2: For example, if the target is $$x = \\sqrt[3]{\\frac{5x^2 - 4x + 7}{x}}$$, the cube root reduces the power by 3, so the inside must have highest power $$x^3$$. Starting from $$x^4 = 5x^2 - 4x + 7$$, divide by $$x$$ to get $$x^3 = \\frac{5x^2 - 4x + 7}{x}$$, then take the cube root.\n- Step 3: The division by $$x$$ is valid because the root $$\\alpha \\neq 0$$ (you can verify $$f(0) = -7 \\neq 0$$). Always check you're not dividing by zero at the root.\n\nMr. Fuat: \"The highest power we are going to get is $$x^3$$, because when we take the cube root. In order to get $$x^3$$, we need to divide each term by $$x$$.\"", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "Describe the ANS-button technique for iteration on a calculator, and explain why manual re-entry is a pitfall. (3 steps)", "answer": "- Step 1: Type the starting value $$x_1$$ and press $$=$$. This stores the value as \"ANS\" in the calculator's memory.\n- Step 2: Type the iteration formula using ANS in place of $$x_n$$. For example, type $$\\sqrt[3]{(5 \\cdot \\text{ANS}^2 - 4 \\cdot \\text{ANS} + 7)/\\text{ANS}}$$. Press $$=$$ to get $$x_2$$, which now becomes the new ANS.\n- Step 3: Press $$=$$ repeatedly. Each press computes the next iterate automatically. Stop when consecutive values agree to the required number of decimal places. Manual re-entry introduces rounding errors at each step, which accumulate and can give a wrong final answer.\n\nMr. Fuat: \"The value, after four decimal places, when we use this iteration, results shouldn't change. We must get the same results.\"", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": false}, {"question": "What is the convergence criterion for the iteration $$x_{n+1} = g(x_n)$$, and what happens if it's not satisfied? (2 steps)", "answer": "- Step 1: The iteration converges to the root $$\\alpha$$ if $$|g'(\\alpha)| < 1$$, where $$g'$$ is the derivative of $$g$$ evaluated at the root. Geometrically, this means the curve $$y = g(x)$$ is less steep than the line $$y = x$$ near the fixed point, so the cobweb/staircase spirals inward.\n- Step 2: If $$|g'(\\alpha)| > 1$$, the iteration diverges — each iterate moves further from the root. If $$|g'(\\alpha)| = 1$$, convergence is borderline. Different rearrangements of the same equation can give different $$g(x)$$ functions, some convergent and some not.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "In an exponential decay model $$T = C + Ae^{-Bt}$$, what is the horizontal asymptote and why? What can you say about $$T$$ relative to $$C$$ for all finite $$t$$? (3 steps)", "answer": "- Step 1: As $$t \\to \\infty$$, $$e^{-Bt} \\to 0$$ (since $$B > 0$$), so $$T \\to C + A \\cdot 0 = C$$. The horizontal asymptote is $$T = C$$, which represents the ambient/room temperature in a cooling model.\n- Step 2: Since $$e^{-Bt} > 0$$ for all finite $$t$$ (the exponential function is always positive), and $$A > 0$$ (in the standard setup), we have $$Ae^{-Bt} > 0$$ for all finite $$t$$.\n- Step 3: Therefore $$T = C + Ae^{-Bt} > C$$ for all finite $$t$$. The temperature can never drop to $$C$$, only approach it from above. This is why $$T$$ cannot fall below the asymptote value — it's a physical and mathematical impossibility within this model.\n\nMr. Fuat: \"The exponential $$e^{-Bt}$$ is always positive, so $$T - 10 = Ae^{-Bt} > 0$$ always.\"", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": false}, {"question": "What is $$e^0$$, and why is confusing it a critical error in exponential model questions? (2 steps)", "answer": "- Step 1: $$e^0 = 1$$, NOT 0. Any non-zero number raised to the power 0 equals 1. This is a fundamental index law.\n- Step 2: In a model like $$T = 10 + Ae^{-Bt}$$, at $$t = 0$$ we get $$T = 10 + A \\cdot e^0 = 10 + A \\cdot 1 = 10 + A$$. If you mistakenly use $$e^0 = 0$$, you'd get $$T = 10$$, which would make it impossible to find $$A$$. This error at step 1 cascades through the entire problem.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": false}, {"question": "When solving $$e^{-45B} = \\frac{3}{4}$$ for $$B$$, why should you write $$B = \\frac{\\ln(4/3)}{45}$$ instead of $$B = \\frac{\\ln(3/4)}{45}$$? (2 steps)", "answer": "- Step 1: Taking natural logs: $$-45B = \\ln(3/4)$$. So $$B = -\\frac{\\ln(3/4)}{45}$$. Since $$3/4 < 1$$, $$\\ln(3/4) < 0$$, and the double negative makes $$B > 0$$.\n- Step 2: To avoid sign errors, rewrite using the log division law: $$-\\ln(3/4) = \\ln(4/3)$$, giving $$B = \\frac{\\ln(4/3)}{45}$$. Since $$4/3 > 1$$, $$\\ln(4/3) > 0$$, and $$B$$ is clearly positive as expected. Writing $$B = \\frac{\\ln(3/4)}{45}$$ without the negative sign is a common pitfall that gives a negative $$B$$.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "What is the derivative $$\\frac{d}{dt}(Ae^{-Bt})$$, and what does its sign tell you about the model? (2 steps)", "answer": "- Step 1: Using the chain rule: $$\\frac{d}{dt}(Ae^{-Bt}) = A \\cdot (-B) \\cdot e^{-Bt} = -ABe^{-Bt}$$. The negative sign comes from the derivative of $$-Bt$$.\n- Step 2: Since $$A > 0$$, $$B > 0$$, and $$e^{-Bt} > 0$$, the derivative is always negative: $$-ABe^{-Bt} < 0$$. This confirms the function is always decreasing — temperature is always falling in a cooling model. The rate of decrease slows over time because $$e^{-Bt}$$ gets smaller.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": true}, {"question": "In a geometric sequence where $$u_n = ar^n$$ with $$u_0 = a$$ at $$t = 0$$, what is the value after 6 years, and what is the common off-by-one error? (2 steps)", "answer": "- Step 1: After 6 years, $$n = 6$$ (not 5), so $$u_6 = a \\cdot r^6$$. If $$a = 2000$$ and $$r = 1.03$$, then $$u_6 = 2000 \\times 1.03^6$$.\n- Step 2: The off-by-one error: thinking \"6 years later\" means the power is 5, because you count from year 1. But if $$t = 0$$ is the first measurement, then 6 years later is $$t = 6$$, and the power is 6. The key: read the subscript carefully. If the formula is $$u_n = ar^n$$ and the initial value is at $$n = 0$$, then $$n$$ years later uses power $$n$$.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": false}, {"question": "Given two equations $$ab^4 = 3690$$ and $$ab^7 = 3470$$, how do you find $$a$$ and $$b$$? What is the common error when solving for $$a$$? (3 steps)", "answer": "- Step 1: Divide the two equations to eliminate $$a$$: $$\\frac{ab^7}{ab^4} = b^3 = \\frac{3470}{3690}$$, so $$b = \\left(\\frac{3470}{3690}\\right)^{1/3} \\approx 0.98$$.\n- Step 2: Substitute back into $$ab^4 = 3690$$ to get $$a = \\frac{3690}{b^4} = \\frac{3690}{0.98^4} \\approx 4000$$. The common error is dividing by $$b^3$$ instead of $$b^4$$ — you must use the same power of $$b$$ that appears in the equation you're substituting into.\n- Step 3: Always read the subscript/exponent carefully. The equation says $$ab^4$$, so divide by $$b^4$$, not $$b^3$$. This is the second off-by-one error pattern: misreading which power of $$b$$ is in the equation.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": false}, {"question": "To solve an equation where the unknown is in the exponent, like $$a^T = k$$, what technique must you always use? Derive the formula for $$T$$. (3 steps)", "answer": "- Step 1: Take logarithms of both sides (any base, but natural log is standard): $$\\ln(a^T) = \\ln k$$.\n- Step 2: Use the power log law $$\\ln(a^T) = T\\ln a$$ to bring the exponent down: $$T\\ln a = \\ln k$$.\n- Step 3: Solve: $$T = \\frac{\\ln k}{\\ln a}$$. This works for any base: $$T = \\frac{\\log k}{\\log a}$$. The key principle: when the unknown is in the exponent, ALWAYS take logs. There is no other way to isolate $$T$$.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": false}, {"question": "When two populations are modelled as $$P_1 = 2000 \\times 1.03^T$$ and $$P_2 = 4000 \\times 0.98^T$$, describe the strategy to find when they are equal. (3 steps)", "answer": "- Step 1: Set them equal: $$2000 \\times 1.03^T = 4000 \\times 0.98^T$$. Divide both sides by 2000: $$1.03^T = 2 \\times 0.98^T$$.\n- Step 2: Divide by $$0.98^T$$: $$\\left(\\frac{1.03}{0.98}\\right)^T = 2$$. This collects all the $$T$$-dependent terms on one side.\n- Step 3: Take logs: $$T\\ln\\left(\\frac{1.03}{0.98}\\right) = \\ln 2$$, so $$T = \\frac{\\ln 2}{\\ln(1.03/0.98)} \\approx 13.9$$ years. The insight: different bases can be combined into a single base ratio, then the unknown exponent is isolated by taking logs.", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": true}, {"question": "When simplifying an algebraic fraction like $$\\frac{2x^2 - 32}{3x^2 + 7x - 20} + \\frac{8}{3x - 5}$$, what should you do BEFORE finding a common denominator, and why? (3 steps)", "answer": "- Step 1: Factorise each numerator and denominator first. $$2x^2 - 32 = 2(x-4)(x+4)$$ (difference of squares), and $$3x^2 + 7x - 20 = (3x-5)(x+4)$$.\n- Step 2: Cancel any common factors. The $$(x+4)$$ appears in both the numerator and denominator of the first fraction, so it cancels (valid since $$x > 2$$ means $$x + 4 \\neq 0$$). This gives $$\\frac{2(x-4)}{3x-5} + \\frac{8}{3x-5}$$.\n- Step 3: Now both fractions have the same denominator, so combine: $$\\frac{2(x-4) + 8}{3x-5} = \\frac{2x}{3x-5}$$. Mr. Fuat: \"If you want to do the same denominator without simplifying first, it will be a big mess.\" Always factorise and cancel first.", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": false}, {"question": "How do you prove a function is decreasing using calculus? What must you show, and what is insufficient? (3 steps)", "answer": "- Step 1: Differentiate the function using the appropriate rule (quotient rule for fractions, product rule for products, etc.). Simplify the derivative fully.\n- Step 2: Show that $$f'(x) < 0$$ for ALL $$x$$ in the domain. For example, $$f'(x) = \\frac{-10}{(3x-5)^2}$$: the denominator $$(3x-5)^2 > 0$$ always, and the numerator $$-10 < 0$$ always, so $$f'(x) < 0$$ for all valid $$x$$.\n- Step 3: What is INSUFFICIENT: plugging in one value of $$x$$ and noting that $$f'(x) < 0$$ at that point. You must prove it for ALL $$x$$ in the domain. A single counterexample could exist elsewhere. The proof must be general — typically by showing the numerator and denominator have fixed signs.", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": false}, {"question": "Describe the process for finding the inverse function $$g^{-1}$$ given $$g(x) = 3 + 2\\ln x$$. (3 steps)", "answer": "- Step 1: Set $$y = g(x) = 3 + 2\\ln x$$. Solve for $$x$$: $$2\\ln x = y - 3$$, then $$\\ln x = \\frac{y-3}{2}$$, then $$x = e^{(y-3)/2}$$.\n- Step 2: Swap $$x$$ and $$y$$ to get the inverse: $$g^{-1}(x) = e^{(x-3)/2}$$. The swap is necessary because the inverse function reverses the roles of input and output.\n- Step 3: The domain of $$g^{-1}$$ equals the range of $$g$$. Since $$g(x) = 3 + 2\\ln x$$ with domain $$x \\geq 1$$: $$g(1) = 3$$, and as $$x \\to \\infty$$, $$g(x) \\to \\infty$$. So the range of $$g$$ is $$[3, \\infty)$$, and this is the domain of $$g^{-1}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": false}, {"question": "To solve $$gf(a) = 5$$ where $$g(x) = 3 + 2\\ln x$$ and $$f(x) = \\frac{2x}{3x-5}$$, explain the order of operations and the key algebraic steps. (3 steps)", "answer": "- Step 1: $$gf(a)$$ means $$g(f(a))$$ — apply $$f$$ first, then $$g$$. So compute $$f(a) = \\frac{2a}{3a-5}$$, then substitute into $$g$$: $$g\\left(\\frac{2a}{3a-5}\\right) = 3 + 2\\ln\\left(\\frac{2a}{3a-5}\\right)$$.\n- Step 2: Set equal to 5: $$3 + 2\\ln\\left(\\frac{2a}{3a-5}\\right) = 5 \\Rightarrow \\ln\\left(\\frac{2a}{3a-5}\\right) = 1 \\Rightarrow \\frac{2a}{3a-5} = e$$.\n- Step 3: Solve the linear equation: $$2a = e(3a - 5) = 3ea - 5e \\Rightarrow 2a - 3ea = -5e \\Rightarrow a(2 - 3e) = -5e \\Rightarrow a = \\frac{5e}{3e - 2}$$. The key: collect all $$a$$ terms on one side and factorise.", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": false}, {"question": "When finding the range of a composite function $$fg$$, what must you determine first, and why? (3 steps)", "answer": "- Step 1: Find the range of the inner function $$g$$ first. The output of $$g$$ becomes the input of $$f$$, so you need to know what values $$f$$ will receive.\n- Step 2: Use the range of $$g$$ as the domain of $$f$$. For example, if $$g(x) = \\frac{6x-2}{2x+1}$$ has range $$(0, 3)$$, then evaluate $$f$$ only on $$(0, 3)$$.\n- Step 3: The range of $$fg$$ is the set of all $$f(y)$$ where $$y$$ is in the range of $$g$$. If $$f(y) = 2 + 5\\ln y$$ on $$(0, 3)$$: as $$y \\to 0^+$$, $$f(y) \\to -\\infty$$; at $$y = 3$$, $$f(3) = 2 + 5\\ln 3$$. So the range of $$fg$$ is $$(-\\infty, 2 + 5\\ln 3)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": false}, {"question": "When differentiating a product like $$f(x) = 2e^{3\\sin x}\\cos x$$, what rule do you use and what is the key logical step when setting $$f'(x) = 0$$? (3 steps)", "answer": "- Step 1: Use the product rule with $$u = 2e^{3\\sin x}$$ and $$v = \\cos x$$. Then $$u' = 6\\cos x \\cdot e^{3\\sin x}$$ (chain rule) and $$v' = -\\sin x$$. So $$f'(x) = 6\\cos x \\cdot e^{3\\sin x} \\cdot \\cos x + 2e^{3\\sin x} \\cdot (-\\sin x) = 2e^{3\\sin x}(3\\cos^2 x - \\sin x)$$.\n- Step 2: Set $$f'(x) = 0$$: $$2e^{3\\sin x}(3\\cos^2 x - \\sin x) = 0$$. The key logical step: since $$e^{3\\sin x} > 0$$ always (exponentials are never zero), and $$2 > 0$$, the first factor can NEVER be zero. Therefore the second factor must be zero: $$3\\cos^2 x - \\sin x = 0$$.\n- Step 3: This principle — \"if a product equals zero and one factor can't be zero, the other must be zero\" — is the crucial insight. It eliminates the exponential entirely and reduces the problem to a trig equation.", "source": "GLM 5.1 ①", "_id": "glm_1_46", "judge_pick": false}, {"question": "After obtaining $$3\\cos^2 x - \\sin x = 0$$ from a turning-point problem, how do you convert this into a quadratic in $$\\sin x$$? (2 steps)", "answer": "- Step 1: Use the Pythagorean identity $$\\cos^2 x = 1 - \\sin^2 x$$ to replace $$\\cos^2 x$$: $$3(1 - \\sin^2 x) - \\sin x = 0 \\Rightarrow 3 - 3\\sin^2 x - \\sin x = 0$$.\n- Step 2: Rearrange to standard quadratic form: $$3\\sin^2 x + \\sin x - 3 = 0$$. Now solve using the quadratic formula: $$\\sin x = \\frac{-1 \\pm \\sqrt{1 + 36}}{6} = \\frac{-1 \\pm \\sqrt{37}}{6}$$. Reject any solution where $$|\\sin x| > 1$$ (outside the range of sine).", "source": "GLM 5.1 ①", "_id": "glm_1_47", "judge_pick": false}, {"question": "When a quadratic in $$\\sin x$$ gives two valid solutions (both in $$[-1, 1]$$), how do you determine which corresponds to a specific turning point (e.g., the one below the $$x$$-axis)? (2 steps)", "answer": "- Step 1: Find the $$x$$-values from each $$\\sin x$$ solution (there may be multiple $$x$$-values in the given range for each). Then substitute each $$x$$-value back into the ORIGINAL function $$f(x)$$ to find the corresponding $$y$$-value.\n- Step 2: The turning point below the $$x$$-axis is the one with $$y < 0$$. For example, if $$x \\approx 1.012$$ gives $$f(x) > 0$$ (first quadrant, $$\\cos x > 0$$) and $$x \\approx 2.130$$ gives $$f(x) < 0$$ (second quadrant, $$\\cos x < 0$$), then $$Q$$ (below axis) is at $$x \\approx 2.130$$. Mr. Fuat: \"Substitute each $$x$$ value into the original equation and find the corresponding $$y$$ value.\"", "source": "GLM 5.1 ①", "_id": "glm_1_48", "judge_pick": false}, {"question": "When finding where $$f(x) = 2e^{3\\sin x}\\cos x = 0$$, why must $$\\cos x = 0$$, and what does this tell you about the $$x$$-intercept? (2 steps)", "answer": "- Step 1: For the product to be zero, at least one factor must be zero. But $$2e^{3\\sin x} > 0$$ for all $$x$$ (the exponential is always positive). Therefore $$\\cos x = 0$$ is the only possibility.\n- Step 2: $$\\cos x = 0$$ at $$x = \\pi/2$$ and $$x = 3\\pi/2$$ in $$[0, 2\\pi]$$. The $$x$$-intercept $$R$$ is at one of these points. This is the same \"non-zero factor\" principle as in the turning-point problem — the exponential can never be zero, so it's always the other factor that matters.", "source": "GLM 5.1 ①", "_id": "glm_1_49", "judge_pick": false}, {"question": "Differentiate $$y = \\frac{16}{9}(3x - k)^{-1} + x - \\frac{k}{3}$$ with respect to $$x$$. What rule do you use for the first term? (3 steps)", "answer": "- Step 1: The first term $$\\frac{16}{9}(3x - k)^{-1}$$ requires the chain rule. The outer function is $$(\\text{stuff})^{-1}$$ and the inner function is $$3x - k$$.\n- Step 2: Differentiate: $$\\frac{16}{9} \\cdot (-1)(3x - k)^{-2} \\cdot 3 = \\frac{16}{9} \\cdot \\frac{-3}{(3x-k)^2} = \\frac{-16}{3(3x-k)^2}$$.\n- Step 3: The remaining terms differentiate to $$1$$ and $$0$$ respectively (since $$k/3$$ is constant). So $$\\frac{dy}{dx} = 1 - \\frac{16}{3(3x-k)^2}$$. The chain rule gives the factor of 3 from differentiating the inner function $$3x - k$$.", "source": "GLM 5.1 ①", "_id": "glm_1_50", "judge_pick": false}, {"question": "When evaluating $$\\int_1^3 \\frac{16}{9(3x - k)} \\, dx$$ with $$k = 7/3$$, what is the step-by-step approach, and where is the $$1/a$$ factor applied? (4 steps)", "answer": "- Step 1: Rewrite as $$\\frac{16}{9}\\int_1^3 \\frac{1}{3x - 7/3} \\, dx$$. Identify $$a = 3$$ and $$b = -7/3$$ in the template $$\\int \\frac{1}{ax+b}\\,dx = \\frac{1}{a}\\ln|ax+b| + C$$.\n- Step 2: Apply the formula: $$\\frac{16}{9} \\cdot \\frac{1}{3}\\left[\\ln|3x - 7/3|\\right]_1^3 = \\frac{16}{27}\\left[\\ln|3x - 7/3|\\right]_1^3$$. The $$\\frac{1}{a} = \\frac{1}{3}$$ factor is crucial — forgetting it is the #1 mistake.\n- Step 3: Evaluate at the bounds. At $$x = 3$$: $$3(3) - 7/3 = 9 - 7/3 = 27/3 - 7/3 = 20/3$$. At $$x = 1$$: $$3(1) - 7/3 = 3 - 7/3 = 9/3 - 7/3 = 2/3$$.\n- Step 4: Combine using log division law: $$\\frac{16}{27}\\left[\\ln\\frac{20/3}{2/3}\\right] = \\frac{16}{27}\\ln 10$$. So $$\\lambda = \\frac{16}{27}$$. The fraction arithmetic is cleaner if you write everything over 3.", "source": "GLM 5.1 ①", "_id": "glm_1_51", "judge_pick": false}, {"question": "In the two-modulus problem with $$y = a - |2x - b|$$ and $$y = |x + 1|$$ intersecting at $$x = -3$$ and $$x = 5$$, explain how to determine which branch of each modulus to use at each intersection. (3 steps)", "answer": "- Step 1: Identify the vertex of each V-shape. $$y = |x+1|$$ has vertex at $$x = -1$$. $$y = a - |2x-b|$$ has vertex at $$x = b/2$$ (which is positive since $$b > 0$$).\n- Step 2: At $$x = 5$$: this is right of both vertices (since $$5 > -1$$ and $$5 > b/2$$ for reasonable $$b$$). So $$|x+1|$$ is on its positive branch ($$x+1$$), and $$|2x-b|$$ is on its descending/right branch ($$2x-b$$). This gives the \"positive-positive\" equation.\n- Step 3: At $$x = -3$$: this is left of both vertices (since $$-3 < -1$$ and $$-3 < b/2$$). So $$|x+1|$$ is on its negative branch ($$-(x+1)$$), and $$|2x-b|$$ is on its ascending/left branch ($$-(2x-b) = b-2x$$). This gives the \"negative-left\" equation.\n\nMr. Fuat: \"When we look at the graph, when the positive of the first one and the second one is also positive, that's why we pick positive-positive.\"", "source": "GLM 5.1 ①", "_id": "glm_1_52", "judge_pick": false}, {"question": "In the identity proof showing $$\\frac{3\\sin\\theta\\cos\\theta}{\\cos\\theta + \\sin\\theta} = (2 + \\sec 2\\theta)(\\cos\\theta - \\sin\\theta)$$ reduces to $$3\\sin 2\\theta - 4\\cos 2\\theta = 2$$, what is the first strategic move and why? (3 steps)", "answer": "- Step 1: \"Act with respect to the answer\" — the target form has everything in terms of $$2\\theta$$, so clear the fraction first. Multiply both sides by $$(\\cos\\theta + \\sin\\theta)$$: $$3\\sin\\theta\\cos\\theta = (2 + \\sec 2\\theta)(\\cos\\theta - \\sin\\theta)(\\cos\\theta + \\sin\\theta)$$.\n- Step 2: Recognise the difference of squares on the RHS: $$(\\cos\\theta - \\sin\\theta)(\\cos\\theta + \\sin\\theta) = \\cos^2\\theta - \\sin^2\\theta = \\cos 2\\theta$$. This is the key bridge from single-angle to double-angle.\n- Step 3: Now the RHS becomes $$(2 + \\sec 2\\theta)\\cos 2\\theta = 2\\cos 2\\theta + \\sec 2\\theta \\cdot \\cos 2\\theta = 2\\cos 2\\theta + 1$$. The LHS: $$3\\sin\\theta\\cos\\theta = \\frac{3}{2}\\sin 2\\theta$$. Multiply through by 2: $$3\\sin 2\\theta = 4\\cos 2\\theta + 2$$, giving $$3\\sin 2\\theta - 4\\cos 2\\theta = 2$$.", "source": "GLM 5.1 ①", "_id": "glm_1_53", "judge_pick": false}, {"question": "When solving $$5\\sin(2x - 0.9273) = 2$$ for $$\\pi \\leq x \\leq \\frac{3\\pi}{2}$$, how do you transform the range and find all valid solutions? (4 steps)", "answer": "- Step 1: Let $$\\phi = 2x - 0.9273$$. Transform the range: when $$x = \\pi$$, $$\\phi = 2\\pi - 0.9273 \\approx 5.356$$; when $$x = 3\\pi/2$$, $$\\phi = 3\\pi - 0.9273 \\approx 8.497$$. So $$\\phi \\in [5.356, 8.497]$$.\n- Step 2: Solve $$\\sin\\phi = 0.4$$: the principal value is $$\\phi_0 = \\arcsin(0.4) \\approx 0.4115$$. General solutions: $$\\phi = 2n\\pi + 0.4115$$ or $$\\phi = (2n+1)\\pi - 0.4115$$.\n- Step 3: Check which values fall in $$[5.356, 8.497]$$. For $$n = 1$$ in the first family: $$\\phi \\approx 6.283 + 0.4115 = 6.695$$ — this is in range. For $$n = 0$$ in the second family: $$\\phi \\approx \\pi - 0.4115 = 2.730$$ — too small. For $$n = 1$$: $$\\phi \\approx 3\\pi - 0.4115 = 9.004$$ — too large.\n- Step 4: Only $$\\phi \\approx 6.695$$ works. Back-substitute: $$2x - 0.9273 = 6.695 \\Rightarrow 2x = 7.622 \\Rightarrow x \\approx 3.81$$ (3 s.f.). Check: $$3.81 \\in [\\pi, 3\\pi/2]$$ ✓. Pitfall: calculator must be in RADIANS.", "source": "GLM 5.1 ①", "_id": "glm_1_54", "judge_pick": false}, {"question": "What are all six standard graph transformations and their effects? Complete the table: $$y = f(x+a)$$, $$y = f(x) + a$$, $$y = f(ax)$$, $$y = af(x)$$, $$y = |f(x)|$$, $$y = f(|x|)$$. (2 steps)", "answer": "- Step 1: Inside transformations (affect $$x$$, opposite direction): $$y = f(x+a)$$ translates left by $$a$$; $$y = f(ax)$$ is a horizontal stretch with scale factor $$1/a$$.\n- Step 2: Outside transformations (affect $$y$$, same direction): $$y = f(x) + a$$ translates up by $$a$$; $$y = af(x)$$ is a vertical stretch with scale factor $$a$$. Modulus transformations: $$y = |f(x)|$$ reflects any part of the graph below the $$x$$-axis above it (keeping the above-axis parts unchanged); $$y = f(|x|)$$ keeps the right half ($$x \\geq 0$$) and reflects it in the $$y$$-axis to create a symmetric graph.", "source": "GLM 5.1 ①", "_id": "glm_1_55", "judge_pick": false}, {"question": "What is the derivative of $$\\sin(kx)$$, $$\\cos(kx)$$, $$e^{kx}$$, and $$\\ln x$$? (2 steps)", "answer": "- Step 1: $$\\frac{d}{dx}\\sin(kx) = k\\cos(kx)$$ and $$\\frac{d}{dx}\\cos(kx) = -k\\sin(kx)$$. The chain rule gives the factor of $$k$$, and the derivative of $$\\cos$$ introduces a negative sign.\n- Step 2: $$\\frac{d}{dx}e^{kx} = ke^{kx}$$ (chain rule gives the factor of $$k$$) and $$\\frac{d}{dx}\\ln x = \\frac{1}{x}$$. These are the four standard derivatives used throughout P3.", "source": "GLM 5.1 ①", "_id": "glm_1_56", "judge_pick": true}, {"question": "State the chain rule, product rule, and quotient rule formulas. (2 steps)", "answer": "- Step 1: Chain rule: $$\\frac{dy}{dx} = \\frac{dy}{du} \\cdot \\frac{du}{dx}$$. Use when one function is composed inside another. Product rule: $$(uv)' = u'v + uv'$$. Use when two functions are multiplied.\n- Step 2: Quotient rule: $$\\left(\\frac{u}{v}\\right)' = \\frac{u'v - uv'}{v^2}$$. Use when two functions are divided. Note the minus sign in the numerator and the denominator is squared. A common error is swapping $$u'v$$ and $$uv'$$ or forgetting the square.", "source": "GLM 5.1 ①", "_id": "glm_1_57", "judge_pick": false}, {"question": "State the reciprocal trig identities and the Pythagorean identities involving $$\\sec$$, $$\\cosec$$, and $$\\cot$$. (2 steps)", "answer": "- Step 1: $$\\sec x = \\frac{1}{\\cos x}$$, $$\\cosec x = \\frac{1}{\\sin x}$$, $$\\cot x = \\frac{\\cos x}{\\sin x}$$. These are the definitions of the reciprocal trig functions.\n- Step 2: $$1 + \\tan^2 x = \\sec^2 x$$ and $$1 + \\cot^2 x = \\cosec^2 x$$. These are derived by dividing the Pythagorean identity $$\\sin^2 x + \\cos^2 x = 1$$ by $$\\cos^2 x$$ or $$\\sin^2 x$$ respectively.", "source": "GLM 5.1 ①", "_id": "glm_1_58", "judge_pick": true}, {"question": "State the compound angle (addition) formulae for $$\\sin(A \\pm B)$$, $$\\cos(A \\pm B)$$, and $$\\tan(A \\pm B)$$. (2 steps)", "answer": "- Step 1: $$\\sin(A \\pm B) = \\sin A\\cos B \\pm \\cos A\\sin B$$ and $$\\cos(A \\pm B) = \\cos A\\cos B \\mp \\sin A\\sin B$$. Note: for $$\\cos$$, the sign between terms is OPPOSITE to the sign in the argument (the \"$$\\mp$$\" flips).\n- Step 2: $$\\tan(A \\pm B) = \\frac{\\tan A \\pm \\tan B}{1 \\mp \\tan A\\tan B}$$. Again, the sign in the denominator is opposite to the sign in the numerator. These are the foundation for deriving the R-formula and double-angle identities.", "source": "GLM 5.1 ①", "_id": "glm_1_59", "judge_pick": false}, {"question": "State all four logarithm laws that are essential for P3. (2 steps)", "answer": "- Step 1: Multiplication: $$\\log(ab) = \\log a + \\log b$$. Division: $$\\log\\frac{a}{b} = \\log a - \\log b$$. Power: $$\\log(a^n) = n\\log a$$.\n- Step 2: Inverse: $$b^{\\log_b x} = x$$. This last law is what allows you to \"undo\" a logarithm by raising the base to both sides. It's the key step in converting from a log-linear equation back to an exponential model.", "source": "GLM 5.1 ①", "_id": "glm_1_60", "judge_pick": false}, {"question": "When solving $$\\sqrt{2}\\sin(x + 45°) = \\cos(x - 60°)$$ to find $$\\tan x$$, what compound angle expansion do you use, and what is the strategic substitution trick for part (b)? (3 steps)", "answer": "- Step 1: Expand both sides using compound angle formulae. LHS: $$\\sqrt{2}[\\sin x\\cos 45° + \\cos x\\sin 45°] = \\sqrt{2}[\\sin x \\cdot \\frac{1}{\\sqrt{2}} + \\cos x \\cdot \\frac{1}{\\sqrt{2}}] = \\sin x + \\cos x$$. RHS: $$\\cos x\\cos 60° + \\sin x\\sin 60° = \\frac{1}{2}\\cos x + \\frac{\\sqrt{3}}{2}\\sin x$$.\n- Step 2: Set equal and rearrange: $$\\sin x + \\cos x = \\frac{1}{2}\\cos x + \\frac{\\sqrt{3}}{2}\\sin x \\Rightarrow \\sin x(1 - \\frac{\\sqrt{3}}{2}) = \\cos x(\\frac{1}{2} - 1) \\Rightarrow \\tan x = \\frac{-1/2}{1 - \\sqrt{3}/2}$$. Simplifying gives $$\\tan x = -2 - \\sqrt{3}$$.\n- Step 3: For part (b), the trick is a substitution: let $$x + 45° = 2\\theta$$, so $$x = 2\\theta - 45°$$ and $$x - 60° = 2\\theta - 105°$$. This matches the structure of the original equation perfectly, giving $$\\tan(2\\theta - 45°) = -2 - \\sqrt{3} = \\tan 105°$$, leading to $$\\theta = 75°, 165°$$.", "source": "GLM 5.1 ①", "_id": "glm_1_61", "judge_pick": true}, {"question": "What is the $$\\tan 2A$$ identity? (2 steps)", "answer": "- Step 1: $$\\tan 2A = \\frac{2\\tan A}{1 - \\tan^2 A}$$. This is derived by dividing the $$\\sin 2A$$ identity by the $$\\cos 2A$$ identity: $$\\frac{\\sin 2A}{\\cos 2A} = \\frac{2\\sin A\\cos A}{\\cos^2 A - \\sin^2 A}$$, then dividing top and bottom by $$\\cos^2 A$$.\n- Step 2: This identity is less commonly needed in P3 than the $$\\sin 2A$$ and $$\\cos 2A$$ identities, but it's in the formula book and can appear in questions where you need to express $$\\tan 2A$$ in terms of $$\\tan A$$.", "source": "GLM 5.1 ①", "_id": "glm_1_62", "judge_pick": true}, {"question": "A modulus inequality gives \"Case 1: need $$x \\geq 5$$ AND $$x < 0$$.\" What does this mean geometrically, and what should you write in the exam? (2 steps)", "answer": "- Step 1: This is an empty set — no real number satisfies both conditions simultaneously. Geometrically, it means the line $$y = g(x)$$ doesn't intersect the right arm of the V-shaped modulus graph in this region.\n- Step 2: In the exam, write \"No solution from Case 1\" or \"The conditions $$x \\geq 5$$ and $$x < 0$$ are incompatible, so no values from this case.\" Don't just silently skip it — show the examiner you checked and found nothing.", "source": "GLM 5.1 ①", "_id": "glm_1_63", "judge_pick": false}, {"question": "Why can't you solve an equation like $$3\\sin 2x - 4\\cos 2x = 2$$ by just dividing both sides by $$\\cos 2x$$ and using $$\\tan$$? (2 steps)", "answer": "- Step 1: Dividing by $$\\cos 2x$$ gives $$3\\tan 2x - 4 = \\frac{2}{\\cos 2x} = 2\\sec 2x$$. You've replaced one problem (two trig functions) with another (a $$\\tan$$ and a $$\\sec$$), which is no simpler.\n- Step 2: More fundamentally, dividing by $$\\cos 2x$$ assumes $$\\cos 2x \\neq 0$$, which could discard valid solutions. The R-formula avoids this by combining both terms into a single sine function, which can be solved cleanly with inverse sine and the general solution.", "source": "GLM 5.1 ①", "_id": "glm_1_64", "judge_pick": true}, {"question": "What is the general solution for $$\\sin\\theta = k$$ where $$-1 < k < 1$$? (2 steps)", "answer": "- Step 1: The principal solution is $$\\theta_0 = \\arcsin(k)$$, which lies in $$[-\\pi/2, \\pi/2]$$. The second solution in one period is $$\\theta_1 = \\pi - \\theta_0$$ (sine is symmetric about $$\\pi/2$$).\n- Step 2: The general solution is $$\\theta = 2n\\pi + \\theta_0$$ or $$\\theta = (2n+1)\\pi - \\theta_0$$ for any integer $$n$$. To find solutions in a specific range, substitute different values of $$n$$ and check which fall within the range.", "source": "GLM 5.1 ①", "_id": "glm_1_65", "judge_pick": false}, {"question": "Quick exercise: Find the vertex of $$y = 3|x - 4| + 7$$. (1 step)", "answer": "- Step 1: Set the inside of the modulus to zero: $$x - 4 = 0 \\Rightarrow x = 4$$. Substitute: $$y = 3|0| + 7 = 7$$. Vertex is $$(4, 7)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_66", "judge_pick": false}, {"question": "Quick exercise: What is $$\\int \\frac{1}{2x+1}\\,dx$$? (2 steps)", "answer": "- Step 1: Apply the template $$\\int \\frac{1}{ax+b}\\,dx = \\frac{1}{a}\\ln|ax+b| + C$$ with $$a = 2, b = 1$$.\n- Step 2: Result: $$\\frac{1}{2}\\ln|2x+1| + C$$. The $$\\frac{1}{a} = \\frac{1}{2}$$ factor is essential — without it, differentiating your answer would give $$\\frac{2}{2x+1}$$ instead of $$\\frac{1}{2x+1}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_67", "judge_pick": false}, {"question": "Quick exercise: If $$\\log y = 2\\log x + 3$$ (base 10), what type of model is this and what are the parameters? (2 steps)", "answer": "- Step 1: This is a power model (log $$y$$ vs log $$x$$). Rearrange: $$\\log y = 2\\log x + 3 = \\log(x^2) + \\log(10^3) = \\log(1000x^2)$$.\n- Step 2: So $$y = 1000x^2$$, which is $$y = kx^n$$ with $$k = 10^3 = 1000$$ and $$n = 2$$. The gradient 2 is the power, and the intercept 3 gives $$k = 10^3$$.", "source": "GLM 5.1 ①", "_id": "glm_1_68", "judge_pick": false}, {"question": "Quick exercise: What is $$R$$ for the expression $$3\\sin x + 4\\cos x$$? (2 steps)", "answer": "- Step 1: $$R = \\sqrt{a^2 + b^2} = \\sqrt{3^2 + 4^2} = \\sqrt{9 + 16} = \\sqrt{25} = 5$$.\n- Step 2: And $$\\tan\\alpha = b/a = 4/3 \\Rightarrow \\alpha \\approx 0.9273$$ rad. So $$3\\sin x + 4\\cos x = 5\\sin(x + 0.9273)$$. This is the classic 3-4-5 right triangle, making $$R = 5$$ particularly clean.", "source": "GLM 5.1 ①", "_id": "glm_1_69", "judge_pick": false}, {"question": "Quick exercise: If $$u_0 = 100$$ and the growth rate is 5% per year, what is $$u_3$$? (2 steps)", "answer": "- Step 1: The model is $$u_n = 100 \\times 1.05^n$$ where $$n$$ is the number of years after $$t = 0$$.\n- Step 2: After 3 years: $$u_3 = 100 \\times 1.05^3 = 100 \\times 1.157625 = 115.7625 \\approx 115.76$$. Note: the power is 3 (not 2), because $$t = 0$$ is the starting measurement and 3 years later means $$n = 3$$.", "source": "GLM 5.1 ①", "_id": "glm_1_70", "judge_pick": false}, {"question": "Quick exercise: What is $$e^0$$? (1 step)", "answer": "- Step 1: $$e^0 = 1$$. Any non-zero number raised to the power 0 equals 1. This is NOT zero — confusing these is a critical error in exponential model questions where you evaluate at $$t = 0$$.", "source": "GLM 5.1 ①", "_id": "glm_1_71", "judge_pick": false}, {"question": "Conceptual exercise: In the model $$T = 15 + 7e^{-0.1t}$$, can $$T$$ ever equal 15? Can it equal 20? Explain. (2 steps)", "answer": "- Step 1: $$T = 15$$ would require $$7e^{-0.1t} = 0$$, but $$e^{-0.1t} > 0$$ for all finite $$t$$. So $$T$$ can never equal 15 — it can only approach 15 as $$t \\to \\infty$$. The asymptote is a boundary that is never reached.\n- Step 2: $$T = 20$$ requires $$7e^{-0.1t} = 5$$, so $$e^{-0.1t} = 5/7$$, giving $$t = -10\\ln(5/7) = 10\\ln(7/5) \\approx 3.37$$. This is achievable because $$5/7 < 1$$, so $$\\ln(5/7) < 0$$ and $$t > 0$$. Any value strictly greater than 15 is reachable.", "source": "GLM 5.1 ①", "_id": "glm_1_72", "judge_pick": false}, {"question": "Why is it important to state that a function is \"continuous\" when using the sign change theorem, and what type of function is always continuous? (2 steps)", "answer": "- Step 1: The sign change theorem (IVT) requires continuity because a discontinuous function could jump from negative to positive without crossing zero. For example, $$f(x) = \\frac{1}{x}$$ has $$f(-1) = -1 < 0$$ and $$f(1) = 1 > 0$$, but there's no root — the function has an asymptote at $$x = 0$$ instead.\n- Step 2: All polynomials are continuous everywhere, so for polynomial equations you can simply state \"since $$f$$ is a polynomial, it is continuous\" and then show the sign change. For rational functions or piecewise functions, you must be more careful.", "source": "GLM 5.1 ①", "_id": "glm_1_73", "judge_pick": false}, {"question": "When the exam asks you to \"show that\" $$f(x)$$ can be written in a specific form, what strategy should you adopt, and what is insufficient? (2 steps)", "answer": "- Step 1: \"Act with respect to the answer\" — look at the target form and manipulate the given expression towards it. Use identities, algebra, and substitutions that introduce the structures seen in the target (e.g., double angles, specific factorisations).\n- Step 2: What is insufficient: substituting a single numerical value and showing both sides give the same answer. A \"show that\" requires algebraic proof for all values, not verification at one point. Mr. Fuat: \"Prove questions need algebraic argument, not single-value substitution.\"", "source": "GLM 5.1 ①", "_id": "glm_1_74", "judge_pick": true}, {"question": "In a log-linear model $$\\log_{10} D = 1.04 + 0.38T$$, a charity wants to know if $$D$$ will exceed £350,000 within 12 months. Describe the efficient approach. (3 steps)", "answer": "- Step 1: Use the log form directly (no need to convert to exponential form). Substitute $$T = 12$$: $$\\log_{10} D = 1.04 + 0.38 \\times 12 = 1.04 + 4.56 = 5.60$$.\n- Step 2: Find $$D = 10^{5.60} \\approx 398,107$$.\n- Step 3: Compare: $$398,107 > 350,000$$, so yes, the charity will achieve its aim. State the conclusion clearly with the comparison. Using the log form avoids computing $$a$$ and $$b$$ separately, reducing rounding error.", "source": "GLM 5.1 ①", "_id": "glm_1_75", "judge_pick": false}, {"question": "What is the key difference between how you plot a power model $$y = kx^n$$ versus an exponential model $$y = ka^x$$ on a log scale? (2 steps)", "answer": "- Step 1: For a power model $$y = kx^n$$: take log of BOTH variables. Plot $$\\log y$$ on the vertical axis and $$\\log x$$ on the horizontal axis. The result is a straight line with gradient $$n$$ and intercept $$\\log k$$.\n- Step 2: For an exponential model $$y = ka^x$$: take log of $$y$$ ONLY. Plot $$\\log y$$ on the vertical axis and $$x$$ (NOT $$\\log x$$) on the horizontal axis. The result is a straight line with gradient $$\\log a$$ and intercept $$\\log k$$. Confusing these two — particularly whether the horizontal axis is $$\\log x$$ or just $$x$$ — is a major pitfall.", "source": "GLM 5.1 ①", "_id": "glm_1_76", "judge_pick": true}, {"question": "When evaluating a definite integral that yields something like $$[\\ln|3x - 7/3|]_1^3$$, what is a clean way to handle the fraction arithmetic? (2 steps)", "answer": "- Step 1: Write everything over a common denominator. At $$x = 3$$: $$3(3) - 7/3 = 9 - 7/3 = 27/3 - 7/3 = 20/3$$. At $$x = 1$$: $$3(1) - 7/3 = 3 - 7/3 = 9/3 - 7/3 = 2/3$$.\n- Step 2: When you form the ratio inside the log: $$\\frac{20/3}{2/3} = \\frac{20}{3} \\times \\frac{3}{2} = \\frac{20}{2} = 10$$. The thirds cancel cleanly. The pitfall is trying to compute $$\\ln(20/3) - \\ln(2/3)$$ separately without combining — this invites decimal rounding errors.", "source": "GLM 5.1 ①", "_id": "glm_1_77", "judge_pick": true}, {"question": "What does \"act with respect to the answer\" mean in the context of trig identity proofs, and how did it apply to the Jan 2024 Q9? (2 steps)", "answer": "- Step 1: The phrase means: look at what the target form contains, and choose your algebraic moves to create those structures. If the answer involves $$2\\theta$$ everywhere, then use identities that produce $$2\\theta$$ (double-angle identities, difference of squares giving $$\\cos 2\\theta$$, etc.) rather than identities that keep you in single-angle form.\n- Step 2: In Jan 2024 Q9, the target was $$3\\sin 2\\theta - 4\\cos 2\\theta = 2$$. Everything is in $$2\\theta$$, so: use $$\\sin\\theta\\cos\\theta = \\frac{1}{2}\\sin 2\\theta$$ (not $$\\sin 2\\theta = 2\\sin\\theta\\cos\\theta$$), use $$(\\cos\\theta - \\sin\\theta)(\\cos\\theta + \\sin\\theta) = \\cos 2\\theta$$ (difference of squares), and use $$\\sec 2\\theta \\cdot \\cos 2\\theta = 1$$. Each move produces a $$2\\theta$$ term.", "source": "GLM 5.1 ①", "_id": "glm_1_78", "judge_pick": true}, {"question": "When using R-formula to solve a trig equation in a specific range, what is the most common calculator error, and how do you transform the range correctly? (3 steps)", "answer": "- Step 1: The most common calculator error is having your calculator in DEGREES mode when the range is given in radians (or vice versa). Always check the mode before computing. Mr. Fuat: \"Angle units and then radians.\"\n- Step 2: After writing $$R\\sin(2x - \\alpha) = k$$, let $$\\phi = 2x - \\alpha$$ to simplify. Then transform the range: if $$\\pi \\leq x \\leq 3\\pi/2$$, then $$2\\pi - \\alpha \\leq \\phi \\leq 3\\pi - \\alpha$$.\n- Step 3: Find all $$\\phi$$ in the transformed range satisfying $$\\sin\\phi = k/R$$, then back-substitute to get $$x$$. The range transformation is essential — solving in the original $$x$$-range without the substitution leads to missed or extra solutions.", "source": "GLM 5.1 ①", "_id": "glm_1_79", "judge_pick": false}, {"question": "When sketching $$y = a - |2x - b|$$ (an inverted V), what are the key features to mark on the graph? (2 steps)", "answer": "- Step 1: Mark the maximum point at $$(b/2, a)$$ — this is where the inside of the modulus is zero. Mark the $$y$$-intercept at $$(0, a - b)$$ (since $$|2(0) - b| = b$$, and $$a > b > 0$$ ensures this is positive). Mark the $$x$$-intercepts at $$\\left(\\frac{a+b}{2}, 0\\right)$$ and $$\\left(\\frac{b-a}{2}, 0\\right)$$.\n- Step 2: The graph is an inverted V (Λ shape) opening downward. The left arm has gradient $$+2$$ (ascending) and the right arm has gradient $$-2$$ (descending). The slope magnitude is 2 because of the coefficient of $$x$$ inside the modulus.", "source": "GLM 5.1 ①", "_id": "glm_1_80", "judge_pick": false}, {"question": "Why must you factorise an algebraic fraction BEFORE combining terms, and what happens if you don't? (2 steps)", "answer": "- Step 1: Factorising reveals common factors that can be cancelled, dramatically simplifying the expression. For example, $$\\frac{2(x-4)(x+4)}{(3x-5)(x+4)}$$ allows cancellation of $$(x+4)$$, giving $$\\frac{2(x-4)}{3x-5}$$.\n- Step 2: If you skip factorising and go straight to a common denominator, you multiply two already-complicated fractions, creating a \"big mess\" (Mr. Fuat's words). The numerator becomes a degree-4 polynomial, and you'd need to factorise it afterward anyway. Factorising first is always faster and less error-prone.", "source": "GLM 5.1 ①", "_id": "glm_1_81", "judge_pick": false}, {"question": "What is the integral $$\\int \\frac{f'(x)}{f(x)}\\,dx$$, and how does this generalise the $$\\frac{1}{ax+b}$$ template? (2 steps)", "answer": "- Step 1: $$\\int \\frac{f'(x)}{f(x)}\\,dx = \\ln|f(x)| + C$$. This is because if you let $$u = f(x)$$, then $$du = f'(x)\\,dx$$, and the integral becomes $$\\int \\frac{1}{u}\\,du = \\ln|u| + C$$.\n- Step 2: The $$\\frac{1}{ax+b}$$ template is a special case where $$f(x) = ax + b$$ and $$f'(x) = a$$. So $$\\int \\frac{a}{ax+b}\\,dx = \\ln|ax+b| + C$$, which rearranges to $$\\int \\frac{1}{ax+b}\\,dx = \\frac{1}{a}\\ln|ax+b| + C$$. The $$1/a$$ factor appears because the numerator is 1, not $$a$$.", "source": "GLM 5.1 ①", "_id": "glm_1_82", "judge_pick": false}, {"question": "Conceptual exercise: If $$f'(x) = \\frac{-10}{(3x-5)^2}$$ for all $$x > 2$$, is $$f$$ increasing or decreasing? What would be insufficient evidence? (2 steps)", "answer": "- Step 1: $$f$$ is decreasing because $$f'(x) < 0$$ for all $$x > 2$$. The denominator $$(3x-5)^2 > 0$$ (a square is always positive, and $$3x - 5 \\neq 0$$ for $$x > 2$$), and the numerator $$-10 < 0$$. Negative divided by positive is negative.\n- Step 2: Insufficient evidence: computing $$f'(3) = \\frac{-10}{16} < 0$$ and concluding $$f$$ is decreasing. This only proves it at one point. You must show $$f'(x) < 0$$ for ALL $$x$$ in the domain by arguing about the signs of numerator and denominator generally.", "source": "GLM 5.1 ①", "_id": "glm_1_83", "judge_pick": false}, {"question": "What is the range of $$g(x) = 3 + 2\\ln x$$ for $$x \\geq 1$$, and how does this become the domain of $$g^{-1}$$? (2 steps)", "answer": "- Step 1: At $$x = 1$$: $$g(1) = 3 + 2\\ln 1 = 3 + 0 = 3$$. As $$x \\to \\infty$$: $$\\ln x \\to \\infty$$, so $$g(x) \\to \\infty$$. Since $$g$$ is increasing (derivative $$g'(x) = 2/x > 0$$), the range is $$[3, \\infty)$$.\n- Step 2: The domain of $$g^{-1}$$ equals the range of $$g$$, so $$g^{-1}(x) = e^{(x-3)/2}$$ has domain $$[3, \\infty)$$. This connection is fundamental — the inverse function only accepts values that the original function could produce.", "source": "GLM 5.1 ①", "_id": "glm_1_84", "judge_pick": false}], "count": 85}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "When finding the vertex of a modulus function like $$y = a|bx - c| + d$$, what is the shortcut method, and why does it work? (2 steps)", "answer": "- Step 1: The vertex occurs where the expression inside the modulus equals zero. Set $$bx - c = 0$$, giving $$x = c/b$$. This is because the modulus function $$|bx - c|$$ reaches its minimum value of 0 at this point — the V-shape \"bottom\" is exactly where the input to the modulus crosses zero.\n- Step 2: Substitute this $$x$$-value into the full expression. Since $$|bx - c| = 0$$ at the vertex, $$y = a \\cdot 0 + d = d$$. So the vertex is at $$\\left(\\frac{c}{b}, d\\right)$$. For $$y = 2|x - 5| + 10$$: vertex at $$(5, 10)$$.\n\nThe shortcut works because the modulus output is always ≥ 0, and the only point where it equals 0 is where its input equals 0.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "How do you build the graph of $$y = 2|x - 5| + 10$$ step-by-step from $$y = x$$? What happens to the vertex at each stage? (5 steps)", "answer": "- Step 1: Start with $$y = x$$ — a straight line through the origin with gradient 1. Vertex concept doesn't apply yet.\n- Step 2: $$y = |x|$$ — reflect the negative ($$y < 0$$) part above the $$x$$-axis. This creates a V-shape with vertex at $$(0, 0)$$.\n- Step 3: $$y = |x - 5|$$ — shift right by 5 (inside transformation, opposite direction). Vertex moves to $$(5, 0)$$.\n- Step 4: $$y = 2|x - 5|$$ — vertical stretch by factor 2 (outside transformation, same direction). The $$x$$-coordinate of the vertex is unchanged; the $$y$$-values double. But since the minimum $$y$$ was 0, doubling still gives 0. Vertex stays at $$(5, 0)$$.\n- Step 5: $$y = 2|x - 5| + 10$$ — shift up by 10. Vertex moves to $$(5, 10)$$.\n\nKey insight: the vertical stretch in Step 4 doesn't move the vertex's $$x$$-coordinate, and since the minimum was 0, it doesn't move the $$y$$-coordinate either. Only the +10 shift raises the vertex.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "When solving a modulus inequality like $$2|x - 5| + 10 > 6x$$, why must you split into cases, and what is the critical mistake to avoid after solving each case? (3 steps)", "answer": "- Step 1: The modulus $$|x - 5|$$ behaves differently depending on the sign of $$(x - 5)$$. When $$x \\geq 5$$, we have $$|x - 5| = x - 5$$. When $$x < 5$$, we have $$|x - 5| = -(x - 5) = 5 - x$$. Without splitting, you'd be using the wrong expression for the modulus in at least one region.\n- Step 2: Solve each case separately. Case 1 ($$x \\geq 5$$): $$2(x-5) + 10 > 6x$$ gives $$x < 0$$. Case 2 ($$x < 5$$): $$2(5-x) + 10 > 6x$$ gives $$x < 5/2$$.\n- Step 3: **The critical mistake is forgetting to check each solution against its case region.** Case 1 requires $$x \\geq 5$$ AND $$x < 0$$ — impossible, so no solution. Case 2 requires $$x < 5$$ AND $$x < 5/2$$ — this gives $$x < 5/2$$. If you skip this validation, you might accept $$x < 0$$ from Case 1, which is wrong because it doesn't satisfy $$x \\geq 5$$.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "Given a point $$P$$ on $$y = f(x)$$, how do you find its image under $$y = 3f(x - 2)$$? What is the order of operations? (2 steps)", "answer": "- Step 1: Read the transformation from the inside out. The $$(x - 2)$$ inside the function is a horizontal shift — translate right by 2. The 3 outside is a vertical stretch by factor 3. Apply the inside transformation first: if $$P = (5, 10)$$, after shifting right 2 it becomes $$(7, 10)$$.\n- Step 2: Then apply the outside transformation: stretch vertically by 3. The $$y$$-coordinate triples: $$(7, 3 \\times 10) = (7, 30)$$. So the image of $$(5, 10)$$ under $$y = 3f(x-2)$$ is $$(7, 30)$$.\n\nKey rule: inside transformations affect $$x$$ (horizontal, opposite direction), outside transformations affect $$y$$ (vertical, same direction).", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "For the transformation $$y = f(2x)$$ applied to a point $$(-4, -3)$$, why does the $$x$$-coordinate halve rather than double? (2 steps)", "answer": "- Step 1: The transformation $$y = f(2x)$$ is a horizontal stretch with scale factor $$1/2$$, not 2. This is because you're replacing $$x$$ with $$2x$$ *inside* the function — the function reaches the same values twice as fast, so the graph is compressed horizontally.\n- Step 2: The new $$x$$-coordinate is $$-4 \\div 2 = -2$$. The $$y$$-coordinate stays the same: $$-3$$. So the image is $$(-2, -3)$$. The \"opposite direction\" rule for inside transformations: multiplying $$x$$ by 2 inside the function compresses (scale factor $$1/2$$), dividing would stretch.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "When should you use polynomial division versus partial fractions for an algebraic fraction? (2 steps)", "answer": "- Step 1: Compare the degree of the numerator and the degree of the denominator. If $$\\deg(\\text{num}) \\geq \\deg(\\text{den})$$, you must do polynomial division first. This produces a polynomial part plus a proper fraction (remainder over denominator). Then do partial fractions on the remainder fraction if needed.\n- Step 2: If $$\\deg(\\text{num}) < \\deg(\\text{den})$$, the fraction is already proper — go straight to partial fractions. For example, $$\\frac{2x^2 - 5x + 8}{x - 2}$$ has $$\\deg(\\text{num}) = 2 \\geq \\deg(\\text{den}) = 1$$, so polynomial division is required first.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "After dividing $$\\frac{2x^2 - 5x + 8}{x - 2}$$ by polynomial long division, you get $$g(x) = 2x - 1 + \\frac{6}{x-2}$$. When integrating this from 4 to 8, how do you arrive at the form $$\\alpha + \\beta \\ln 3$$? (3 steps)", "answer": "- Step 1: Integrate term by term: $$\\int_4^8 \\left(2x - 1 + \\frac{6}{x-2}\\right)dx = \\left[x^2 - x + 6\\ln|x-2|\\right]_4^8$$. The $$\\frac{6}{x-2}$$ integrates to $$6\\ln|x-2|$$ because $$\\int \\frac{1}{x-2}dx = \\ln|x-2|$$ (here the coefficient of $$x$$ is 1, so no $$1/a$$ factor needed).\n- Step 2: Substitute limits: $$(64 - 8 + 6\\ln 6) - (16 - 4 + 6\\ln 2) = 56 + 6\\ln 6 - 12 - 6\\ln 2 = 44 + 6\\ln 6 - 6\\ln 2$$.\n- Step 3: Combine the log terms using $$\\ln A - \\ln B = \\ln(A/B)$$: $$6\\ln 6 - 6\\ln 2 = 6\\ln\\frac{6}{2} = 6\\ln 3$$. So the answer is $$44 + 6\\ln 3$$, giving $$\\alpha = 44, \\beta = 6$$.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "Why is the $$1/a$$ factor in $$\\int \\frac{1}{ax+b}dx = \\frac{1}{a}\\ln|ax+b| + C$$ so easy to forget, and how can you always catch yourself? (2 steps)", "answer": "- Step 1: The factor arises from the chain rule in reverse. When you differentiate $$\\ln|ax + b|$$, you get $$\\frac{a}{ax+b}$$ (the derivative of the inside, $$a$$, appears in the numerator). So to get back to $$\\frac{1}{ax+b}$$, you must divide by $$a$$. It's easy to forget because when $$a = 1$$ (as in $$\\frac{1}{x-2}$$), the factor is invisible and you don't notice it's missing.\n- Step 2: Self-check: always ask \"what would I get if I differentiated my answer?\" If your answer is $$\\ln|3x - 7/3|$$, differentiating gives $$\\frac{3}{3x - 7/3}$$, not $$\\frac{1}{3x - 7/3}$$. You need the $$\\frac{1}{3}$$ in front to cancel that extra 3. Make this verification a habit.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "A power model $$y = kx^n$$ can be converted to a straight line by taking logarithms. What is the resulting linear equation, and what do the gradient and intercept represent? (2 steps)", "answer": "- Step 1: Take $$\\log_{10}$$ of both sides: $$\\log y = \\log(kx^n) = \\log k + \\log(x^n) = \\log k + n\\log x$$. This is the equation of a straight line: $$Y = nX + \\log k$$, where $$Y = \\log y$$ and $$X = \\log x$$.\n- Step 2: The gradient of the line is $$n$$ (the power in the original model), and the $$Y$$-intercept is $$\\log k$$ (the log of the constant). For $$y = 10^6 x^{-3}$$: $$\\log y = 6 - 3\\log x$$, so gradient = $$-3$$, $$Y$$-intercept = 6 (at $$X = 0$$), and $$X$$-intercept = 2 (at $$Y = 0$$).", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "An exponential model $$y = ka^x$$ can also be linearised. What is the straight-line form, and how does it differ from the power model case? (2 steps)", "answer": "- Step 1: Take $$\\log$$ of both sides: $$\\log y = \\log(k a^x) = \\log k + x\\log a$$. This gives $$Y = (\\log a) \\cdot x + \\log k$$, where $$Y = \\log y$$ but the horizontal axis is just $$x$$ (not $$\\log x$$).\n- Step 2: The key difference from the power model: for a power model you plot $$\\log y$$ vs $$\\log x$$; for an exponential model you plot $$\\log y$$ vs $$x$$. The gradient is $$\\log a$$ (not $$a$$ itself), and the intercept is $$\\log k$$.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "Given the straight-line relationship $$\\log_3 N = 2t + 4$$, how do you convert back to the form $$N = ab^t$$? What is a common pitfall? (3 steps)", "answer": "- Step 1: Raise 3 to both sides (the inverse operation of $$\\log_3$$): $$N = 3^{2t+4}$$. You must use base 3 because that's the base of the logarithm — using base 10 or $$e$$ would be wrong.\n- Step 2: Split the exponent using $$a^{m+n} = a^m \\cdot a^n$$: $$N = 3^4 \\cdot 3^{2t} = 81 \\cdot 3^{2t}$$.\n- Step 3: Rewrite $$3^{2t}$$ as $$(3^2)^t = 9^t$$ to match the $$ab^t$$ form. So $$N = 81 \\cdot 9^t$$, giving $$a = 81, b = 9$$. Common pitfall: forgetting to split $$3^{2t}$$ into $$(3^2)^t = 9^t$$ and leaving it as $$3^{2t}$$, which doesn't match the required form.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "When converting $$\\log_{10} D = 1.04 + 0.38T$$ to the form $$D = ab^T$$, why must you split $$10^{0.38T}$$ into $$(10^{0.38})^T$$? (2 steps)", "answer": "- Step 1: Raising 10 to both sides: $$D = 10^{1.04 + 0.38T} = 10^{1.04} \\cdot 10^{0.38T}$$. The first factor $$10^{1.04} \\approx 10.96$$ is a constant — this is your $$a$$. But $$10^{0.38T}$$ is not yet in the form $$b^T$$ because the $$T$$ is inside the exponent alongside 0.38.\n- Step 2: Use the power-of-a-power rule: $$10^{0.38T} = (10^{0.38})^T \\approx 2.399^T$$. Now it clearly matches $$b^T$$ with $$b \\approx 2.399$$. So $$D \\approx 10.96 \\times 2.399^T$$. Without this split, you can't identify $$b$$.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "To find $$T$$ when $$D = 45000$$ in the model $$\\log_{10} D = 1.04 + 0.38T$$, is it better to use the log form or the exponential form? Why? (2 steps)", "answer": "- Step 1: Use the log form — it's faster and avoids unnecessary computation. Substitute $$D = 45000$$ directly: $$\\log_{10}(45000) = 1.04 + 0.38T$$, then $$T = \\frac{\\log_{10}(45000) - 1.04}{0.38}$$.\n- Step 2: If you used the exponential form $$D = 10.96 \\times 2.399^T$$, you'd need to divide by 10.96 first, then take logs — introducing rounding errors from the approximate values of $$a$$ and $$b$$. The log form uses exact coefficients, so it's more accurate. General principle: when the unknown is in the exponent, take logs.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "What is the value of $$\\log_{10}(10)$$, and why is this a common trap in log-graph questions? (1 step)", "answer": "$$\\log_{10}(10) = 1$$, not 10. The logarithm asks \"to what power must 10 be raised to get 10?\" — the answer is 1. Students often confuse the argument (10) with the output (1), especially when the argument is a \"nice\" number like 10 or 100. Similarly, $$\\log_{10}(100) = 2$$, $$\\log_{10}(1000) = 3$$.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "What are the three forms of the $$\\cos 2A$$ double-angle identity, and when should you use each one? (3 steps)", "answer": "- Step 1: $$\\cos 2A = \\cos^2 A - \\sin^2 A$$ — use this when you have a difference of squares involving $$\\cos A$$ and $$\\sin A$$, e.g. $$(\\cos A + \\sin A)(\\cos A - \\sin A)$$.\n- Step 2: $$\\cos 2A = 2\\cos^2 A - 1$$ — use this when you need to replace $$\\cos^2 A$$ with something involving $$\\cos 2A$$. Rearranged: $$\\cos^2 A = \\frac{1}{2}(1 + \\cos 2A)$$. This is the form to use when the expression contains $$\\cos^2 x$$ and the target form contains $$\\cos 2x$$.\n- Step 3: $$\\cos 2A = 1 - 2\\sin^2 A$$ — use this when you need to replace $$\\sin^2 A$$. Rearranged: $$\\sin^2 A = \\frac{1}{2}(1 - \\cos 2A)$$. Choose the form based on what's in the original expression and what you're trying to produce.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "When you see $$8\\sin x\\cos x$$ in an expression, how should you recognise and convert it? What about $$4\\cos^2 x$$? (2 steps)", "answer": "- Step 1: Spot that $$2\\sin x\\cos x = \\sin 2x$$, so $$8\\sin x\\cos x = 4 \\times 2\\sin x\\cos x = 4\\sin 2x$$. The pattern is: look for the factor of 2 hiding inside a larger coefficient. Factor out to reveal the $$2\\sin x\\cos x$$ template.\n- Step 2: For $$4\\cos^2 x$$, use $$\\cos^2 x = \\frac{1}{2}(1 + \\cos 2x)$$, so $$4\\cos^2 x = 4 \\times \\frac{1}{2}(1 + \\cos 2x) = 2 + 2\\cos 2x$$. Do NOT use $$\\cos 2x = \\cos^2 x - \\sin^2 x$$ here — that introduces $$\\sin^2 x$$ which doesn't help when the target form needs $$\\cos 2x$$ and no $$\\sin^2 x$$.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "Convert $$f(x) = 8\\sin x\\cos x + 4\\cos^2 x - 3$$ into the form $$a\\sin 2x + b\\cos 2x + c$$. Walk through the substitution logic. (3 steps)", "answer": "- Step 1: Replace $$8\\sin x\\cos x$$ using $$2\\sin x\\cos x = \\sin 2x$$: $$8\\sin x\\cos x = 4 \\cdot (2\\sin x\\cos x) = 4\\sin 2x$$.\n- Step 2: Replace $$4\\cos^2 x$$ using $$\\cos^2 x = \\frac{1}{2}(1 + \\cos 2x)$$: $$4\\cos^2 x = 4 \\cdot \\frac{1}{2}(1 + \\cos 2x) = 2 + 2\\cos 2x$$.\n- Step 3: Combine: $$f(x) = 4\\sin 2x + 2 + 2\\cos 2x - 3 = 4\\sin 2x + 2\\cos 2x - 1$$. So $$a = 4, b = 2, c = -1$$.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "What is the R-formula, and why is it essential for solving equations like $$4\\sin 2x + 2\\cos 2x - 1 = 0$$? (3 steps)", "answer": "- Step 1: The R-formula converts $$a\\sin\\theta + b\\cos\\theta$$ into a single sine or cosine: $$a\\sin\\theta + b\\cos\\theta = R\\sin(\\theta + \\alpha)$$ where $$R = \\sqrt{a^2 + b^2}$$ and $$\\tan\\alpha = b/a$$. This collapses two trig terms into one.\n- Step 2: Without the R-formula, the equation $$4\\sin 2x + 2\\cos 2x = 1$$ has two different trig functions and cannot be solved directly. After converting: $$2\\sqrt{5}\\sin(2x + \\alpha) = 1$$, which gives $$\\sin(2x + \\alpha) = \\frac{1}{2\\sqrt{5}}$$ — a standard inverse sine problem.\n- Step 3: The R-formula is the bridge between \"unsolvable\" mixed-trig equations and \"solvable\" single-trig equations. That's why Mr. Fuat says: \"If we cannot write this in compact form, there is no way we will be able to find the $$\\theta$$ value.\"", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "For $$a\\sin x + b\\cos x = R\\sin(x + \\alpha)$$, derive the values of $$R$$ and $$\\alpha$$ by expanding the right side and matching coefficients. (3 steps)", "answer": "- Step 1: Expand: $$R\\sin(x + \\alpha) = R\\sin x\\cos\\alpha + R\\cos x\\sin\\alpha$$.\n- Step 2: Match coefficients with $$a\\sin x + b\\cos x$$: the coefficient of $$\\sin x$$ gives $$R\\cos\\alpha = a$$, and the coefficient of $$\\cos x$$ gives $$R\\sin\\alpha = b$$.\n- Step 3: Square and add: $$R^2\\cos^2\\alpha + R^2\\sin^2\\alpha = a^2 + b^2$$, so $$R^2 = a^2 + b^2$$, giving $$R = \\sqrt{a^2 + b^2}$$. Divide: $$\\frac{R\\sin\\alpha}{R\\cos\\alpha} = \\frac{b}{a}$$, so $$\\tan\\alpha = \\frac{b}{a}$$. Always take $$\\alpha$$ in the range $$0 < \\alpha < \\pi/2$$ when $$a, b > 0$$.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "What are the four R-formula variants, and how do you choose which one to use? (2 steps)", "answer": "- Step 1: The four variants are: (1) $$a\\sin x + b\\cos x = R\\sin(x + \\alpha)$$, (2) $$a\\sin x - b\\cos x = R\\sin(x - \\alpha)$$, (3) $$a\\cos x + b\\sin x = R\\cos(x - \\alpha)$$, (4) $$a\\cos x - b\\sin x = R\\cos(x + \\alpha)$$. In all cases, $$R = \\sqrt{a^2 + b^2}$$ and $$\\tan\\alpha = b/a$$.\n- Step 2: Choose based on what's in front of you. If the expression has $$\\sin$$ first and both terms are added, use variant 1. If the $$\\cos$$ term is subtracted, use variant 2. The exam usually specifies which form to use, or you pick the most natural one. The key: $$R$$ and $$\\alpha$$ are the same regardless of variant — only the sign and sin/cos arrangement differ.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "Given $$f(x) = R\\sin(2x + \\alpha) + c$$, what are the maximum and minimum values of $$f(x)$$, and at what values of $$x$$ do they occur? (2 steps)", "answer": "- Step 1: Since $$-1 \\leq \\sin(\\text{anything}) \\leq 1$$, the maximum of $$R\\sin(2x + \\alpha)$$ is $$R$$ (when $$\\sin = 1$$) and the minimum is $$-R$$ (when $$\\sin = -1$$). So $$\\max f = R + c$$ and $$\\min f = -R + c$$.\n- Step 2: The maximum occurs when $$2x + \\alpha = \\frac{\\pi}{2} + 2n\\pi$$ (i.e., the sine hits 1), giving $$x = \\frac{\\pi/2 - \\alpha + 2n\\pi}{2}$$. For the second smallest positive $$x$$, use $$n = 1$$: $$x = \\frac{5\\pi/2 - \\alpha}{2}$$. The minimum occurs when $$2x + \\alpha = \\frac{3\\pi}{2} + 2n\\pi$$.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": true}, {"question": "When finding the \"second smallest positive $$x$$\" where a function reaches its maximum, what pattern of $$x$$-values are you enumerating, and why do students often miss it? (2 steps)", "answer": "- Step 1: The maximum of $$R\\sin(2x + \\alpha) + c$$ occurs at $$2x + \\alpha = \\frac{\\pi}{2} + 2n\\pi$$ for $$n = 0, 1, 2, \\ldots$$ This gives a sequence of $$x$$-values: $$x_1 = \\frac{\\pi/2 - \\alpha}{2}$$ (smallest positive), $$x_2 = \\frac{5\\pi/2 - \\alpha}{2}$$ (second smallest), $$x_3 = \\frac{9\\pi/2 - \\alpha}{2}$$, etc. The gap between consecutive values is $$\\pi$$ (since the period of $$\\sin(2x)$$ is $$\\pi$$).\n- Step 2: Students often miss the second solution because they forget that sine hits 1 repeatedly — not just at $$\\pi/2$$, but also at $$\\pi/2 + 2\\pi$$, $$\\pi/2 + 4\\pi$$, etc. Each of these gives a different $$x$$-value. Always write out the general solution and enumerate.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "In a geometric/exponential model where $$t = 0$$ is the starting measurement, what is the common off-by-one error, and how do you avoid it? (2 steps)", "answer": "- Step 1: If the population at $$t = 0$$ is 2000 and grows at 3% per year, the model is $$u_n = 2000 \\times 1.03^n$$. After 6 years (i.e., at $$t = 6$$), the population is $$u_6 = 2000 \\times 1.03^6$$. The error is using power 5 instead of 6 — thinking \"6 years later means 5 steps of growth.\"\
