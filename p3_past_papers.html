p 1: As $$t \\to \\infty$$: $$Bt \\to \\infty$$, so $$-Bt \\to -\\infty$$, hence $$e^{-Bt} \\to 0$$.\n- Step 2: Therefore $$T \\to C + A \\cdot 0 = C$$. The horizontal asymptote is $$T = C$$.\n- Step 3: Since $$Ae^{-Bt} > 0$$ always (given $$A > 0$$), $$T > C$$ for all finite $$t$$ — approach is from above.\n\nPhysical: $$C$$ represents the ambient (e.g., room) temperature; $$A$$ is the initial excess over ambient; $$B$$ is the cooling rate.\n\nNote: if $$A < 0$$, approach is from below (heating up), but the asymptote is still $$C$$.", "source": "Opus 4.7 ②", "_id": "opus_2_55"}, {"question": "Starting from $$a\\sin x + b\\cos x$$, derive the harmonic form $$R\\sin(x+\\alpha)$$. Then state the four standard R-formula variants and how $$\\alpha$$ is determined in each. (4 steps)", "answer": "- Step 1: Expand $$R\\sin(x+\\alpha) = R\\sin x\\cos\\alpha + R\\cos x\\sin\\alpha$$. Matching coefficients with $$a\\sin x + b\\cos x$$ yields $$R\\cos\\alpha = a$$ and $$R\\sin\\alpha = b$$.\n- Step 2: Square and add: $$R^2(\\cos^2\\alpha+\\sin^2\\alpha)=a^2+b^2$$, so $$R=\\sqrt{a^2+b^2}$$ with $$R>0$$. Divide the equations: $$\\tan\\alpha = \\frac{b}{a}$$.\n- Step 3: The quadrant of $$\\alpha$$ follows from the signs of $$a$$ and $$b$$. For the standard convention $$0<\\alpha<\\pi/2$$, both $$a$$ and $$b$$ are taken positive.\n- Step 4: Variants:\n+ $$a\\sin x - b\\cos x = R\\sin(x-\\alpha)$$\n+ $$a\\cos x + b\\sin x = R\\cos(x-\\alpha)$$\n+ $$a\\cos x - b\\sin x = R\\cos(x+\\alpha)$$\nIn all cases $$R=\\sqrt{a^2+b^2}$$ and $$\\tan\\alpha=\\frac{b}{a}$$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_8"}, {"question": "What does the \"chain rule\" mean geometrically or intuitively, beyond the formula $$\\tfrac{dy}{dx} = \\tfrac{dy}{du} \\cdot \\tfrac{du}{dx}$$?", "answer": "- Step 1: Geometric: if $$y$$ depends on $$u$$ and $$u$$ depends on $$x$$, then small changes propagate: $$\\Delta y \\approx \\tfrac{dy}{du} \\Delta u$$ and $$\\Delta u \\approx \\tfrac{du}{dx} \\Delta x$$.\n- Step 2: Chain: $$\\Delta y \\approx \\tfrac{dy}{du} \\cdot \\tfrac{du}{dx} \\Delta x$$. So the rate of change of $$y$$ w.r.t. $$x$$ is the **product** of individual rates.\n- Step 3: Intuitive: composition of sensitivities. If $$u$$ doubles when $$x$$ changes by 1, and $$y$$ triples when $$u$$ changes by 1, then $$y$$ sextuples ($$2 \\times 3$$) when $$x$$ changes by 1.\n\nApplication: for $$e^{3\\sin x}$$: outer derivative is $$e^{3\\sin x}$$; inner derivative is $$3\\cos x$$. Product: $$3\\cos x \\cdot e^{3\\sin x}$$. The $$3$$ is the \"exchange rate\" between $$u$$ and $$x$$; $$\\cos x$$ is how $$\\sin x$$ responds to $$x$$.", "source": "Opus 4.7 ②", "_id": "opus_2_121"}, {"question": "Misconception probe: A student integrates $$\\int 2x e^{x^2} dx$$ and writes $$\\dfrac{2x e^{x^2}}{2x} = e^{x^2}$$. What's the issue, and what's the right approach?", "answer": "Step 1: The student is \"dividing by the derivative of the inside\" — a misapplication of substitution. Integration is *not* division. Step 2: Correct approach: substitute $$u = x^2 \\Rightarrow du = 2x\\, dx$$. Then $$\\int 2x e^{x^2}dx = \\int e^u du = e^u + C = e^{x^2} + C$$. The result happens to be $$e^{x^2}$$, but the *justification* is substitution, not division. Step 3: The student got the right answer for the wrong reason — dangerous because it won't generalise. For $$\\int x e^{x^2}dx$$ (no factor of 2), the answer is $$\\tfrac{1}{2}e^{x^2} + C$$, and the student's \"method\" would falsely give $$e^{x^2}/(2x)$$ — gibberish.", "source": "Opus 4.7 ①", "_id": "opus_1_118"}, {"question": "Misconception probe: A student writes $$e^0 = 0$$ when computing $$T(0) = 10 + Ae^{-B \\cdot 0}$$. What's the correct value of $$e^0$$, and why?", "answer": "Step 1: $$e^0 = 1$$, **not** 0. Step 2: This follows from the law $$a^0 = 1$$ for any nonzero base $$a$$ — exponential of zero is always 1. Geometrically, $$e^0$$ is the value of the exponential function $$y = e^x$$ at $$x = 0$$, which is the $$y$$-intercept of the graph (passing through $$(0, 1)$$). Step 3: So $$T(0) = 10 + A \\cdot 1 = 10 + A$$. Confusing $$e^0 = 0$$ would give $$T(0) = 10$$, missing the $$A$$ term entirely — a major error.", "source": "Opus 4.7 ①", "_id": "opus_1_100"}, {"question": "Why is the \"polynomial long division\" algorithm essentially a polynomial version of the Euclidean division for integers?", "answer": "- Step 1: Integer division: given dividend $$N$$ and divisor $$D$$, find quotient $$Q$$ and remainder $$R$$ with $$N = QD + R$$ and $$0 \\leq R < |D|$$.\n- Step 2: Polynomial division: given polynomials $$P(x)$$ and $$D(x)$$, find $$Q(x)$$ and $$R(x)$$ with $$P(x) = Q(x) D(x) + R(x)$$ and $$\\deg(R) < \\deg(D)$$.\n- Step 3: The \"remainder is smaller than divisor\" rule:\n+ Integers: $$R < D$$ (size).\n+ Polynomials: $$\\deg(R) < \\deg(D)$$ (degree).\n\nSame skeleton: subtract multiples of the divisor until what remains is \"smaller\" than the divisor in the appropriate sense.", "source": "Opus 4.7 ②", "_id": "opus_2_129"}, {"question": "A student writes $$\\log_{10}(10^6) = 60$$. What is the correct answer and what confusion drives the error?", "answer": "Correct answer: $$\\log_{10}(10^6) = 6$$. The student has confused two ideas:\n\n- Confusion 1: They may be thinking $$\\log_{10}(10) = 10$$ (wrong — it's 1), and then computing $$6 \\times 10 = 60$$.\n- Confusion 2: Alternatively, they know the power law $$\\log(10^6) = 6\\log(10)$$ but then mis-substitute $$\\log_{10}(10) = 10$$.\n\nThe key fact: $$\\log_b(b) = 1$$ for any base $$b$$, because $$b^1 = b$$. Hence $$\\log_{10}(10) = 1$$ and $$\\log_{10}(10^6) = 6 \\times 1 = 6$$.\n\nMnemonic: \"log base $$b$$ of $$b$$ is one\" — asking \"$$b$$ to the what is $$b$$?\" answer is $$1$$.", "source": "Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "In proving $$\\frac{3\\sin\\theta\\cos\\theta}{\\cos\\theta+\\sin\\theta} = (2+\\sec 2\\theta)(\\cos\\theta-\\sin\\theta)$$, why does multiplying both sides by $$(\\cos\\theta+\\sin\\theta)$$ connect to the target form involving $$2\\theta$$? (3 steps)", "answer": "- Step 1: Multiplying eliminates the denominator on the left and creates the product $$(\\cos\\theta+\\sin\\theta)(\\cos\\theta-\\sin\\theta)$$ on the right.\n- Step 2: That product is a difference of squares: $$\\cos^{2}\\theta - \\sin^{2}\\theta$$, which equals $$\\cos 2\\theta$$ by the double-angle identity.\n- Step 3: The left side becomes $$3\\sin\\theta\\cos\\theta = \\frac{3}{2}\\sin 2\\theta$$. The right side becomes $$(2+\\sec 2\\theta)\\cos 2\\theta = 2\\cos 2\\theta + 1$$. Rearranging yields the required $$3\\sin 2\\theta - 4\\cos 2\\theta = 2$$, showing how clearing the denominator and spotting the double-angle pattern collapses the identity into the target form.", "source": "Kimi K2.6 ①", "_id": "kimi_1_29"}, {"question": "Conceptual synthesis: For an exam question that asks you to \"solve $$f(x) = 0$$\" and then asks to find a root using iteration, why do you need both the **sign change theorem** and the **rearrangement to $$x = g(x)$$** as separate steps?", "answer": "Step 1: Sign change *proves existence* of a root in a bracket — without it, you don't know there's anything to find. The IVT gives a *theoretical* guarantee. Step 2: Rearrangement to $$x = g(x)$$ converts the equation into a *fixed-point* form usable by iteration: $$x_{n+1} = g(x_n)$$. The numerical method needs an iterable form. Step 3: So the two steps complement: sign change tells you *where* to look (bracket); iteration tells you *what value* the root takes (numerical estimate). Either alone is incomplete: sign-change without iteration gives only existence, not value; iteration without sign-change risks converging to the wrong fixed point or diverging.", "source": "Opus 4.7 ①", "_id": "opus_1_79"}, {"question": "To solve $$5\\sin(2x - 0.9273) = 2$$ for $$\\pi \\leq x \\leq 3\\pi/2$$, describe the range-transformation and solution-finding strategy. (4 steps)", "answer": "- Step 1: Simplify: $$\\sin(2x - 0.9273) = 0.4$$. Let $$\\phi = 2x - 0.9273$$ for clarity.\n- Step 2: Transform the range: if $$\\pi \\leq x \\leq 3\\pi/2$$, then $$2\\pi - 0.9273 \\leq \\phi \\leq 3\\pi - 0.9273$$, approximately $$[5.356, 8.497]$$.\n- Step 3: Base solution: $$\\phi_0 = \\arcsin(0.4) \\approx 0.4115$$. General solutions: $$\\phi = 2n\\pi + 0.4115$$ or $$\\phi = (2n+1)\\pi - 0.4115$$.\n- Step 4: Filter for $$\\phi \\in [5.356, 8.497]$$: only $$\\phi = 2\\pi + 0.4115 \\approx 6.695$$ works. Solve: $$2x - 0.9273 = 6.695 \\Rightarrow x \\approx 3.81$$.\n\nKey moves: transform the range, enumerate general solutions, filter to target range.", "source": "Opus 4.7 ②", "_id": "opus_2_72"}, {"question": "What is the difference between solving $\\log_{10} D = 1.04 + 0.38T$ for $D$ versus solving for $T$ when $D = 45000$? (2 steps)", "answer": "- Step 1: To find $D$ in the form $ab^T$ (the \"line → equation\" direction):\n  - Raise 10 to both sides: $D = 10^{1.04 + 0.38T} = 10^{1.04} \\cdot (10^{0.38})^T$\n  - This is the \"model building\" direction.\n\n- Step 2: To find $T$ when $D = 45000$ (the \"equation → unknown in exponent\" direction):\n  - Substitute $D = 45000$: $\\log_{10} 45000 = 1.04 + 0.38T$\n  - Then $T = \\frac{\\log_{10} 45000 - 1.04}{0.38}$\n  - This is the \"solve for the exponent\" direction — always take logs when the unknown is in the exponent.", "source": "MiniMax ②", "_id": "minimax_2_44"}, {"question": "Contrast the integrals $$\\int \\tfrac{1}{x + b}dx$$ and $$\\int \\tfrac{1}{ax + b}dx$$. Why is the $$1/a$$ factor only visible in the second?", "answer": "- Step 1: $$\\int \\tfrac{1}{x + b}dx = \\ln|x + b| + C$$. Here $$a = 1$$, so the $$1/a = 1/1 = 1$$ factor is invisible — gives correct answer whether you include it or not.\n- Step 2: $$\\int \\tfrac{1}{ax + b}dx = \\tfrac{1}{a}\\ln|ax + b| + C$$. Here the $$1/a$$ is non-trivial — forgetting it gives an answer off by a factor of $$a$$.\n- Step 3: Derivation check: differentiate $$\\ln|ax + b|$$ via chain rule: $$\\tfrac{d}{dx}[\\ln|ax+b|] = \\tfrac{a}{ax+b}$$. So $$\\tfrac{1}{a}\\ln|ax+b|$$ has derivative $$\\tfrac{1}{ax+b}$$ ✓.\n\nEdge case danger: students who always deal with $$1/(x+b)$$ forget the rule. When $$a \\neq 1$$ appears on the exam, the \"forgot $$1/a$$\" error bites.", "source": "Opus 4.7 ②", "_id": "opus_2_96"}, {"question": "Misconception probe: When solving $$|f(x)| = g(x)$$, why do you NOT square both sides as a default?", "answer": "Step 1: Squaring gives $$f(x)^2 = g(x)^2$$, which can introduce *spurious* solutions where $$g(x) < 0$$ (since the original equation requires $$g(x) \\geq 0$$ — the LHS modulus is non-negative). Step 2: Also, squaring algebraically expands degree, which can complicate solving more than the original. Step 3: Better approach: case-split on the sign of $$f(x)$$ (or restrict to $$g(x) \\geq 0$$ and check). Squaring is a valid *transformation* but adds the burden of filtering spurious roots — case-splitting is cleaner.", "source": "Opus 4.7 ①", "_id": "opus_1_78"}, {"question": "Conceptual: Why might it matter whether you write $$T = \\dfrac{\\ln 2}{\\ln 1.05}$$ or $$T = \\dfrac{\\log 2}{\\log 1.05}$$ in solving $$1.05^T = 2$$? Are they the same?", "answer": "Step 1: They're numerically *identical*. Both ratios evaluate to the same value (since the change-of-base formula preserves ratios: $$\\log_b a = \\dfrac{\\ln a}{\\ln b}$$, so $$\\log a / \\log b = \\ln a / \\ln b$$ for any common base). Step 2: So choice of base doesn't matter for the final number. The *base of log on LHS and RHS must match*, but you're free to pick whichever you prefer. Step 3: Practically: use $$\\ln$$ when the equation involves $$e$$; use $$\\log_{10}$$ when given a problem in base 10 (calculator default). Either gives the same answer.", "source": "Opus 4.7 ①", "_id": "opus_1_94"}, {"question": "Misconception probe: A student computes $$\\dfrac{6}{8} = \\dfrac{3}{4}$$ and writes $$e^{-45B} = 3/4 \\Rightarrow B = \\ln(3/4)/(-45) \\Rightarrow B = -\\ln(3/4)/45 \\Rightarrow B = -0.0064$$. What's the (subtle) error?", "answer": "Step 1: The signs check out at first glance: $$-\\ln(3/4) = -(-0.2877) = +0.2877$$, so $$B = 0.2877/45 = +0.00639$$. Step 2: But the student wrote $$B = -0.0064$$ — they treated $$\\ln(3/4)$$ as positive, when it's actually *negative* (since $$3/4 < 1$$). $$\\ln$$ of a number less than 1 is negative. Step 3: Correct sign-tracking: $$\\ln(3/4) \\approx -0.2877$$, so $$B = (-(-0.2877))/45 = +0.00639$$. Cleaner approach: write $$-\\ln(3/4) = \\ln(4/3) \\approx +0.2877$$ from the start, so $$B = \\ln(4/3)/45 > 0$$. This avoids cycling negatives.", "source": "Opus 4.7 ①", "_id": "opus_1_111"}, {"question": "What are the reciprocal trig identities and the two Pythagorean identities involving sec and cosec? (1 step)", "answer": "$$\\sec x = \\frac{1}{\\cos x}$$, $$\\cosec x = \\frac{1}{\\sin x}$$, $$\\cot x = \\frac{\\cos x}{\\sin x}$$. The Pythagorean identities are: $$1 + \\tan^2 x = \\sec^2 x$$ and $$1 + \\cot^2 x = \\cosec^2 x$$. These are derived by dividing $$\\sin^2 x + \\cos^2 x = 1$$ by $$\\cos^2 x$$ or $$\\sin^2 x$$ respectively.", "source": "GLM 5.1 ②", "_id": "glm_2_67"}, {"question": "Synthesis: How do you decide between (a) splitting $$|f(x)|$$ into cases, vs (b) squaring both sides of a modulus equation?", "answer": "Step 1: Case-splitting works for both equations and inequalities. It produces *piecewise* solutions, each valid on a region — straightforward to filter. Step 2: Squaring works only for *equations* (not inequalities, where squaring reverses inequalities involving negative values). It introduces extraneous roots when $$g(x) < 0$$, requiring final filtering by checking signs. Step 3: Default to case-splitting for clarity. Use squaring as a backup when case-splitting yields awkward algebra (e.g., when a polynomial equation results that's hard to factor in cases). Always *verify* solutions in the original equation, regardless of method.", "source": "Opus 4.7 ①", "_id": "opus_1_129"}, {"question": "A rational function has numerator degree equal to denominator degree. Outline the complete conceptual pipeline from the initial integral to the final simplified answer, identifying each technique and why it is applied in sequence. (4 steps)", "answer": "- Step 1: **Polynomial Long Division**. Because the fraction is improper ($$\\deg(\\text{num})\\geq\\deg(\\text{den})$$), divide to extract a polynomial plus a proper remainder. Example: $$\\frac{2x^2-5x+8}{x-2}=2x-1+\\frac{6}{x-2}$$.\n- Step 2: **Term-by-term Integration**. Split the integral into the polynomial part and the proper fraction. The polynomial integrates via the power rule to standard polynomial terms.\n- Step 3: **Logarithmic Integration**. The remainder is of the form $$\\frac{C}{ax+b}$$. Its integral is $$\\frac{C}{a}\\ln|ax+b|$$. It is critical to include the $$1/a$$ factor when $$a\\neq 1$$.\n- Step 4: **Log Combination and Evaluation**. For definite integrals, substitute limits. Use $$\\ln A-\\ln B=\\ln(A/B)$$ to collapse multiple logarithms into a single $$\\ln$$ of a ratio before identifying final constants.", "source": "Kimi K2.6 ②", "_id": "kimi_2_33"}, {"question": "Why does tan(2θ-45°) = tan105° give θ = 75° and 165°?", "answer": "- Step 1: General solution for tanA = tanB: A = B + 180°n.  \n- Step 2: 2θ-45° = 105° + 180°n ⇒ 2θ = 150° + 180°n ⇒ θ = 75° + 90°n.  \n- Step 3: For 0 ≤ θ < 180°, n=0 ⇒ 75°, n=1 ⇒ 165°.  \n+ Why tan repeats every 180°: Periodicity of tangent function.  \n+ Check all solutions within domain.", "source": "Qwen 3 ①", "_id": "qwen_1_9"}, {"question": "Conceptual: Why is the natural log $$\\ln$$ specifically the inverse of $$e^x$$, and how does this make $$\\ln$$ the natural choice for solving exponential equations of the form $$e^{stuff} = c$$?", "answer": "Step 1: $$\\ln$$ is defined as $$\\log_e$$, the logarithm with base $$e$$. By the definition of inverse functions, $$\\ln(e^x) = x$$ and $$e^{\\ln x} = x$$ for $$x > 0$$. Step 2: For an equation $$e^{stuff} = c$$, taking $$\\ln$$ of both sides directly extracts the exponent: $$\\ln(e^{stuff}) = \\ln c \\Rightarrow stuff = \\ln c$$. No conversion factor needed (unlike $$\\log_{10}$$, which would give $$stuff \\cdot \\log_{10}e = \\log_{10}c$$). Step 3: So $$\\ln$$ is the \"matching key\" for $$e$$. For base-10 exponentials, $$\\log_{10}$$ is the matching key. Use the log of the same base as the exponential to avoid extra conversion factors.", "source": "Opus 4.7 ①", "_id": "opus_1_120"}, {"question": "Conceptual: Why does the *period* of $$\\sin(2x + \\alpha)$$ differ from that of $$\\sin(x + \\alpha)$$, and how does this affect counting solutions?", "answer": "Step 1: $$\\sin(\\theta)$$ has period $$2\\pi$$ in $$\\theta$$. For $$\\sin(2x + \\alpha)$$, treat $$\\theta = 2x + \\alpha$$; then $$\\sin(\\theta)$$ repeats every $$2\\pi$$ in $$\\theta$$, but in $$x$$ it repeats every $$\\pi$$ (since $$2x$$ doubles the rate). Step 2: So $$\\sin(2x+\\alpha)$$ has period $$\\pi$$ in $$x$$. In an interval of length $$2\\pi$$, you get *two* full cycles, hence twice as many solutions to $$\\sin(2x+\\alpha) = c$$. Step 3: Always identify the period in the *target variable* ($$x$$) — not the dummy ($$\\theta$$). This is critical when finding \"all solutions in [0, 2π]\" type questions.", "source": "Opus 4.7 ①", "_id": "opus_1_124"}, {"question": "Conceptual: Why is the rule \"if a product is zero and one factor is never zero, the other factor is zero\" the **single most important logical move** for finding turning points or roots in problems involving exponentials?", "answer": "Step 1: Many P3 problems involve products where one factor (typically an exponential) is provably nonzero. Without this rule, you'd attempt to \"set both factors to zero,\" but only one *can* be. Step 2: Examples: $$2e^{3\\sin x}\\cos x = 0$$ → $$\\cos x = 0$$ (since $$e^{3\\sin x} > 0$$). $$f'(x) = 2e^{3\\sin x}(3\\cos^2 x - \\sin x) = 0$$ → bracket = 0 (same reason). Step 3: This rule reduces a hairy algebraic mess to a tractable equation. The pattern is: identify provably-nonzero factor → divide out → solve the remaining (often trig or polynomial) equation. Universally applicable.", "source": "Opus 4.7 ①", "_id": "opus_1_114"}, {"question": "When finding the range of a composite function $$fg(x)$$, why must you first find the range of the inner function $$g$$, and then treat that range as the effective domain for the outer function $$f$$? (3 steps)", "answer": "- Step 1: The composite $$fg(x)$$ means $$f(g(x))$$. The outputs generated by $$g$$ are fed directly as inputs into $$f$$. Therefore the set of values actually reaching $$f$$ is precisely the range of $$g$$, not the original domain of $$f$$.\n- Step 2: For example, if $$g$$ has range $$(0,3)$$, then $$f$$ only \"sees\" inputs from $$(0,3)$$. You must analyze $$f$$ restricted to this interval.\n- Step 3: If $$f$$ is increasing, its extreme values on $$(0,3)$$ occur at the endpoints. As the input to $$f$$ approaches $$0^+$$, $$f(u)$$ may tend to $$-\\infty$$; at $$u=3$$ it attains a finite value. Hence the range of the composite is $$(-\\infty, f(3))$$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_19"}, {"question": "The derivative of $$f(x) = 2e^{3\\sin x}\\cos x$$ factors as $$f'(x) = 2e^{3\\sin x}(3\\cos^2 x - \\sin x)$$. To solve $$f'(x) = 0$$, why can you immediately dismiss one factor?", "answer": "- Step 1: Key property: the exponential function is **strictly positive** for all real inputs, i.e., $$e^{3\\sin x} > 0$$ always. Hence $$2e^{3\\sin x} > 0$$.\n- Step 2: For a product to equal zero, at least one factor must be zero. Since $$2e^{3\\sin x}$$ can never be zero, the other factor must satisfy: $$3\\cos^2 x - \\sin x = 0$$.\n- Step 3: This reduces a transcendental equation to a solvable trig equation.\n\nPhuc's key lesson: \"If one factor can't be zero, the other must be zero.\" This \"dismiss the positive factor\" trick is enormously useful with exponentials, always-positive quadratic denominators, etc.", "source": "Opus 4.7 ②", "_id": "opus_2_39"}, {"question": "How does the R-formula connect to the double-angle identity $ \\cos 2A = \\cos^2 A - \\sin^2 A $? (3 steps)", "answer": "- Step 1: **R-formula derivation**. Starting with $ a \\sin x + b \\cos x $, assume it equals $ R \\sin(x + \\alpha) $. Expand the right-hand side: $ R \\sin x \\cos \\alpha + R \\cos x \\sin \\alpha $.  \n- Step 2: **Match coefficients**: $ a = R \\cos \\alpha $, $ b = R \\sin \\alpha $. This resembles the double-angle identity structure, where combinations of sine and cosine terms are expressed as a single function.  \n- Step 3: **Generalization**: The double-angle identity is a special case of harmonic addition, where $ \\cos 2A $ combines $ \\cos^2 A $ and $ \\sin^2 A $. Both rely on expressing multiple trigonometric terms as a single term.  \n\n**Contrast**: What distinguishes the R-formula from double-angle identities?  \n+ Answer: The R-formula combines sine and cosine terms with coefficients, while double-angle identities break down functions of $ 2A $ into single-angle terms.", "source": "Qwen 3 ②", "_id": "qwen_2_5"}, {"question": "Numerical exercise: Sketch the graph of $$y = -|x+2| + 3$$, identifying vertex and intercepts. (3 steps)", "answer": "- Step 1: Vertex (shortcut): inside zero, $$x + 2 = 0 \\Rightarrow x = -2$$. Then $$y = -0 + 3 = 3$$. Vertex $$(-2, 3)$$.\n- Step 2: $$y$$-intercept ($$x = 0$$): $$y = -|2| + 3 = -2 + 3 = 1$$. So $$(0, 1)$$.\n- Step 3: $$x$$-intercepts ($$y = 0$$): $$|x+2| = 3 \\Rightarrow x + 2 = \\pm 3 \\Rightarrow x = 1$$ or $$x = -5$$. So $$(1, 0)$$ and $$(-5, 0)$$. Shape: inverted V (since coefficient is $$-1$$), vertex above the $$x$$-axis at $$(-2,3)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_115"}, {"question": "To find $$T$$ when $$D = 45000$$ in the model $$\\log_{10} D = 1.04 + 0.38T$$, should you use the log form or the exponential form? Why? (2 steps)", "answer": "- Step 1: Use the **log form** — it's faster and avoids rounding errors. Substitute directly: $$\\log_{10}(45000) = 1.04 + 0.38T$$, then solve: $$T = \\frac{\\log_{10}(45000) - 1.04}{0.38}$$.\n- Step 2: If you used the exponential form $$D = 10.96 \\times 2.399^T$$, you'd need to take logs anyway to extract $$T$$, and you'd be using already-rounded values of $$a$$ and $$b$$, introducing unnecessary error.\n\nPrinciple: when the unknown is in the exponent, take logs. But if the equation is already in log form, just substitute and solve linearly.", "source": "GLM 5.1 ③", "_id": "glm_3_14"}, {"question": "In the quotient rule $$\\left(\\frac{u}{v}\\right)' = \\frac{u'v - uv'}{v^2}$$, what is the most common sign error, and how can you remember the correct order? (2 steps)", "answer": "- Step 1: The common error is writing $$u'v - uv'$$ as $$uv' - u'v$$ (swapping the terms, flipping the sign). This gives the wrong sign for the entire derivative.\n- Step 2: Memory aid: the derivative of the numerator ($$u'$$) comes first, multiplied by the denominator ($$v$$). Then minus the numerator ($$u$$) times the derivative of the denominator ($$v'$$). Think \"derivative of top times bottom, minus top times derivative of bottom.\" Or use the mnemonic \"low d-high minus high d-low, over low squared.\"", "source": "GLM 5.1 ②", "_id": "glm_2_72"}, {"question": "A growth model is $$u_n = 2000 \\times 1.03^n$$ where $$n=0$$ corresponds to the initial measurement. What is the population after **6 years**, and what's the off-by-one trap?", "answer": "Step 1: If $$n=0$$ is the start (population 2000), then 6 years later we want $$n = 6$$. Population: $$u_6 = 2000 \\times 1.03^6$$. Step 2: Numerically $$1.03^6 \\approx 1.1941$$, so $$u_6 \\approx 2390$$ (3 s.f.). Step 3: The off-by-one trap: writing $$u_6 = 2000 \\times 1.03^5$$. This happens because students count \"1, 2, 3, 4, 5, 6 = 6 steps\" but think of it as power 5 (mistaking subscript and exponent). Always anchor: at $$t=0$$, exponent is 0; one year later, exponent is 1; ... ; six years later, exponent is 6.", "source": "Opus 4.7 ①", "_id": "opus_1_48"}, {"question": "State all three equivalent forms of the $$\\cos 2A$$ double-angle identity, and explain when to use each one. (3 steps)", "answer": "- Step 1: $$\\cos 2A = \\cos^2 A - \\sin^2 A$$. Use this when you see a difference of squares involving $$\\cos$$ and $$\\sin$$, or when you need to expand $$\\cos 2A$$ in terms of both $$\\cos^2$$ and $$\\sin^2$$.\n- Step 2: $$\\cos 2A = 2\\cos^2 A - 1$$. Use this (or its rearrangement $$\\cos^2 A = \\frac{1}{2}(1 + \\cos 2A)$$) when you see $$\\cos^2 A$$ in the expression and need to introduce $$\\cos 2A$$. This was the correct choice in the exam question with $$4\\cos^2 x$$.\n- Step 3: $$\\cos 2A = 1 - 2\\sin^2 A$$. Use this (or $$\\sin^2 A = \\frac{1}{2}(1 - \\cos 2A)$$) when you see $$\\sin^2 A$$ and need to introduce $$\\cos 2A$$.\n\nCritical pitfall from the exam: using $$\\cos 2A = \\cos^2 A - \\sin^2 A$$ doesn't help when you have $$\\cos^2 A$$ alone — you need $$\\cos^2 A = \\frac{1}{2}(1 + \\cos 2A)$$ instead.", "source": "GLM 5.1 ①", "_id": "glm_1_18"}, {"question": "What is the key difference between how you plot a power model $$y = kx^n$$ versus an exponential model $$y = ka^x$$ on a log scale? (2 steps)", "answer": "- Step 1: For a power model $$y = kx^n$$: take log of BOTH variables. Plot $$\\log y$$ on the vertical axis and $$\\log x$$ on the horizontal axis. The result is a straight line with gradient $$n$$ and intercept $$\\log k$$.\n- Step 2: For an exponential model $$y = ka^x$$: take log of $$y$$ ONLY. Plot $$\\log y$$ on the vertical axis and $$x$$ (NOT $$\\log x$$) on the horizontal axis. The result is a straight line with gradient $$\\log a$$ and intercept $$\\log k$$. Confusing these two — particularly whether the horizontal axis is $$\\log x$$ or just $$x$$ — is a major pitfall.", "source": "GLM 5.1 ①", "_id": "glm_1_76"}, {"question": "After performing polynomial division on $g(x) = \\frac{2x^2 - 5x + 8}{x-2}$, you obtain $g(x) = 2x - 1 + \\frac{6}{x-2}$. Evaluate $\\int_4^8 g(x) \\, dx$. (4 steps)", "answer": "- Step 1: Integrate term by term:\n$$\\int (2x - 1) \\, dx = x^2 - x$$\n$$\\int \\frac{6}{x-2} \\, dx = 6 \\ln|x-2|$$\n(Remember: $\\int \\frac{1}{ax+b} \\, dx = \\frac{1}{a} \\ln|ax+b|$; here $a=1$, so just $\\ln|x-2|$.)\n\n- Step 2: Apply the limits:\n$$[x^2 - x + 6\\ln|x-2|]_4^8$$\n\n- Step 3: Evaluate at bounds:\nAt $x=8$: $64 - 8 + 6\\ln 6 = 56 + 6\\ln 6$\nAt $x=4$: $16 - 4 + 6\\ln 2 = 12 + 6\\ln 2$\n\n- Step 4: Subtract and simplify using $\\ln A - \\ln B = \\ln(A/B)$:\n$$(56 + 6\\ln 6) - (12 + 6\\ln 2) = 44 + 6\\ln\\left(\\frac{6}{2}\\right) = 44 + 6\\ln 3$$\n\nSo $\\int_4^8 g(x) \\, dx = 44 + 6\\ln 3$, giving $\\alpha = 44$, $\\beta = 6$.", "source": "MiniMax ②", "_id": "minimax_2_3"}, {"question": "Conceptual: A student thinks the inverse of $$g(x) = 3 + 2\\ln x$$ is found by replacing $$\\ln$$ with $$e$$ to get $$g^{-1}(x) = 3 + 2e^x$$. What's wrong?", "answer": "Step 1: The inverse isn't found by \"replacing $$\\ln$$ with $$e$$\" — it's found by *swapping* the input and output and solving. Step 2: From $$y = 3 + 2\\ln x$$: solve for $$x$$. Subtract 3: $$y - 3 = 2\\ln x$$. Divide: $$\\ln x = (y-3)/2$$. Exponentiate: $$x = e^{(y-3)/2}$$. Now swap: $$g^{-1}(x) = e^{(x-3)/2}$$. Step 3: The student's \"$$3 + 2e^x$$\" applies $$\\ln$$/$$e$$ replacement *without* unwinding the operations. The inverse undoes operations in reverse order: original applied $$\\ln$$, then multiplied by 2, then added 3 — inverse subtracts 3, divides by 2, then applies $$e$$.", "source": "Opus 4.7 ①", "_id": "opus_1_88"}, {"question": "Conceptual synthesis: Why does the problem $$x^4 - 5x^2 + 4x - 7 = 0$$ have a *cube-root* iteration formula $$x = \\sqrt[3]{(5x^2 - 4x + 7)/x}$$, and not, say, a square-root one?", "answer": "Step 1: The original is a *quartic* equation. To rearrange to $$x = g(x)$$, you must isolate $$x$$ on one side — but $$x^4$$ on the LHS suggests writing $$x^k = $$ something and taking the $$k$$-th root. Step 2: Choosing $$x^4 = $$ something and 4th-rooting would work but might not converge (depends on $$|g'|$$). The choice $$x^3 = (5x^2 - 4x + 7)/x$$ (after dividing by $$x$$) is engineered for convergence: the cube root tames the variable enough that $$|g'(\\alpha)| < 1$$ near the root. Step 3: Different rearrangements of the same equation give different convergence properties. The exam-given form is chosen to converge from the given starting value.", "source": "Opus 4.7 ①", "_id": "opus_1_81"}, {"question": "State the compound angle formulae for $$\\sin(A \\pm B)$$, $$\\cos(A \\pm B)$$, and $$\\tan(A \\pm B)$$. What's the notable sign alternation in cosine versus sine?", "answer": "- **Sine**: $$\\sin(A \\pm B) = \\sin A \\cos B \\pm \\cos A \\sin B$$ (signs inside and out match).\n- **Cosine**: $$\\cos(A \\pm B) = \\cos A \\cos B \\mp \\sin A \\sin B$$ (signs **flip**!).\n- **Tangent**: $$\\tan(A \\pm B) = \\tfrac{\\tan A \\pm \\tan B}{1 \\mp \\tan A \\tan B}$$ (inside sign on top, flipped sign on bottom).\n\nKey sign lesson: for **cosine**, $$\\cos(A+B) = \\cos A\\cos B - \\sin A\\sin B$$ uses **minus**; $$\\cos(A-B)$$ uses **plus**. This is the opposite of what many students naïvely guess.\n\nMnemonic: \"Cosine cross-terms carry the opposite sign.\"", "source": "Opus 4.7 ②", "_id": "opus_2_74"}, {"question": "For a modulus function of the form $$y = a|bx - c| + d$$, what is the fast conceptual shortcut for locating the vertex without doing step-by-step transformations? (3 steps)", "answer": "- Step 1: Recognise that $$|bx - c|$$ attains its minimum value of $$0$$ exactly when the expression inside equals zero. Everything outside the modulus just scales or shifts the $$y$$-value.\n- Step 2: Set $$bx - c = 0$$ and solve to get the $$x$$-coordinate: $$x = c/b$$.\n- Step 3: Substitute this $$x$$ back in: since $$|0| = 0$$, we get $$y = a \\cdot 0 + d = d$$. Vertex is $$(c/b,\\,d)$$.\n\nTakeaway: the inside determines where the vertex sits horizontally; the outside scales/shifts its vertical position.", "source": "Opus 4.7 ②", "_id": "opus_2_0"}, {"question": "State the key rearrangements of the double-angle identities used for **substitution** (when you want to convert $$\\sin^2 A$$, $$\\cos^2 A$$, or $$\\sin A \\cos A$$ into double-angle form).", "answer": "Step 1: $$\\cos^2 A = \\tfrac{1}{2}(1 + \\cos 2A)$$ — derived from $$\\cos 2A = 2\\cos^2 A - 1$$. Step 2: $$\\sin^2 A = \\tfrac{1}{2}(1 - \\cos 2A)$$ — derived from $$\\cos 2A = 1 - 2\\sin^2 A$$. Step 3: $$\\sin A \\cos A = \\tfrac{1}{2}\\sin 2A$$ — derived from $$\\sin 2A = 2\\sin A \\cos A$$. These three are the workhorses for any \"convert to double-angle form\" question; memorise them as a set.", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "Conceptual: When are the factors $$1/a$$ in the integral formula $$\\int \\dfrac{1}{ax+b}dx = \\dfrac{1}{a}\\ln|ax+b| + C$$ irrelevant in practice (don't need to worry about them)?", "answer": "Step 1: When $$a = 1$$ (i.e., the denominator is $$x + b$$, with no coefficient on $$x$$). Then $$1/a = 1$$ and you can omit it. Step 2: Example: $$\\int \\dfrac{1}{x-2}dx = \\ln|x-2| + C$$ — no need to write $$\\dfrac{1}{1}\\ln|x-2|$$. Step 3: Pitfall: if you've internalised \"always include $$1/a$$\" but apply it carelessly to $$\\int 1/(2x+5)dx$$, you correctly get $$\\dfrac{1}{2}\\ln|2x+5|$$. But if you've internalised \"skip $$1/a$$ when small,\" you might mistakenly omit it for $$a = 2, 3, \\ldots$$ — the bigger error. So always *check* $$a$$ and apply mechanically.", "source": "Opus 4.7 ①", "_id": "opus_1_134"}, {"question": "When two modulus graphs intersect (e.g., $$y = |x+1|$$ and $$y = a - |2x-b|$$ at $$x = -3$$ and $$x = 5$$), how do you determine which case/branch to use at each intersection? (3 steps)", "answer": "- Step 1: Sketch both graphs and mark the intersection points. At each intersection, determine which branch of each modulus function is active by checking the sign of the expression inside the modulus.\n- Step 2: At $$x = 5$$: for $$|x+1|$$, since $$5 > -1$$, we're on the positive branch: $$|x+1| = x + 1 = 6$$. For $$|2x - b|$$, since $$5$$ is to the right of the vertex at $$b/2$$ (which is small since $$b < a$$), we're on the right descending branch: $$|2x-b| = 2x - b$$. This is the positive-positive case.\n- Step 3: At $$x = -3$$: for $$|x+1|$$, since $$-3 < -1$$, we're on the negative branch: $$|x+1| = -(x+1) = 2$$. For $$|2x-b|$$, since $$-3$$ is to the left of the vertex, we're on the ascending (left) branch: $$|2x-b| = -(2x-b) = b - 2x$$. This is the negative-left case. Always read branches off the graph, not by guessing.", "source": "GLM 5.1 ②", "_id": "glm_2_41"}, {"question": "Convert $4\\sin 2x + 2\\cos 2x - 1$ into R-form: $R\\sin(2x + \\alpha) + c$ with $R > 0$, $0 < \\alpha < \\frac{\\pi}{2}$. Find $R$ and $\\alpha$ to 3 s.f. (3 steps)", "answer": "- Step 1: Set up the matching equation:\n$$R\\sin(2x + \\alpha) = R\\sin 2x \\cos \\alpha + R\\cos 2x \\sin \\alpha$$\n\nCompare coefficients with $4\\sin 2x + 2\\cos 2x$:\n$$R\\cos \\alpha = 4, \\quad R\\sin \\alpha = 2$$\n\n- Step 2: Find $R$:\n$$R^2 = 4^2 + 2^2 = 16 + 4 = 20 \\Rightarrow R = \\sqrt{20} = 2\\sqrt{5} \\approx 4.472$$\n\n- Step 3: Find $\\alpha$:\n$$\\tan \\alpha = \\frac{2}{4} = \\frac{1}{2} \\Rightarrow \\alpha = \\arctan(0.5) \\approx 0.464 \\text{ rad}$$\n\nSo $f(x) = 2\\sqrt{5} \\sin(2x + 0.464) - 1$.", "source": "MiniMax ②", "_id": "minimax_2_7"}, {"question": "When solving $$\\sqrt{2}\\sin(x + 45°) = \\cos(x - 60°)$$ to find $$\\tan x$$, what compound angle expansion do you use, and what is the strategic substitution trick for part (b)? (3 steps)", "answer": "- Step 1: Expand both sides using compound angle formulae. LHS: $$\\sqrt{2}[\\sin x\\cos 45° + \\cos x\\sin 45°] = \\sqrt{2}[\\sin x \\cdot \\frac{1}{\\sqrt{2}} + \\cos x \\cdot \\frac{1}{\\sqrt{2}}] = \\sin x + \\cos x$$. RHS: $$\\cos x\\cos 60° + \\sin x\\sin 60° = \\frac{1}{2}\\cos x + \\frac{\\sqrt{3}}{2}\\sin x$$.\n- Step 2: Set equal and rearrange: $$\\sin x + \\cos x = \\frac{1}{2}\\cos x + \\frac{\\sqrt{3}}{2}\\sin x \\Rightarrow \\sin x(1 - \\frac{\\sqrt{3}}{2}) = \\cos x(\\frac{1}{2} - 1) \\Rightarrow \\tan x = \\frac{-1/2}{1 - \\sqrt{3}/2}$$. Simplifying gives $$\\tan x = -2 - \\sqrt{3}$$.\n- Step 3: For part (b), the trick is a substitution: let $$x + 45° = 2\\theta$$, so $$x = 2\\theta - 45°$$ and $$x - 60° = 2\\theta - 105°$$. This matches the structure of the original equation perfectly, giving $$\\tan(2\\theta - 45°) = -2 - \\sqrt{3} = \\tan 105°$$, leading to $$\\theta = 75°, 165°$$.", "source": "GLM 5.1 ①", "_id": "glm_1_61"}, {"question": "Conceptual: Why is \"sketch by step-by-step transformation\" generally more reliable than \"compute key points and connect\" for graphs of $$y = a|bx+c|+d$$?", "answer": "Step 1: Step-by-step transformation builds intuition for the *whole shape* — vertex, slope, asymptotic behaviour — by tracking each operation's effect. Step 2: Computing 2-3 points and connecting can miss subtleties (e.g., the modulus's V-shape is non-smooth at the vertex; only multiple points around the vertex would reveal this). Step 3: For a final answer, compute the vertex via the shortcut (set inside zero), then use the \"stretch factor + sign of outer multiplier\" to determine slope and orientation. Combining the two — vertex + transformation context — gives both correctness and speed.", "source": "Opus 4.7 ①", "_id": "opus_1_131"}, {"question": "Misconception probe: A student writes $$\\sin(A+B) = \\sin A + \\sin B$$. Why is this wrong, and what's the correct identity?", "answer": "Step 1: $$\\sin$$ is **not** linear: $$\\sin(A+B) \\neq \\sin A + \\sin B$$ in general. Step 2: Correct: $$\\sin(A+B) = \\sin A \\cos B + \\cos A \\sin B$$. Step 3: Quick check: $$A = B = \\pi/4$$. LHS: $$\\sin(\\pi/2) = 1$$. Student's RHS: $$\\sin(\\pi/4) + \\sin(\\pi/4) = \\sqrt 2 \\approx 1.41$$. Not equal — counterexample. The correct RHS: $$\\sin(\\pi/4)\\cos(\\pi/4) + \\cos(\\pi/4)\\sin(\\pi/4) = (\\sqrt 2/2)^2 + (\\sqrt 2/2)^2 = 1$$ ✓. Sin is *only* additive inside $$\\sin$$ if there's a special structure (e.g., $$\\sin n\\pi = 0$$ for integer $$n$$).", "source": "Opus 4.7 ①", "_id": "opus_1_106"}, {"question": "Conceptual recap: Why is \"logarithm and exponential are inverses\" the unifying principle for *every* P3 problem involving exponentials, decay/growth models, and log graphs?", "answer": "Step 1: Every model with an unknown in the exponent (e.g., $$ab^T = c$$, $$Ae^{-Bt} = D$$) requires extracting the exponent — and only the inverse function of the exponential can do that. Step 2: For base-$$e$$ exponentials, the inverse is $$\\ln$$. For base-$$a$$ exponentials, the inverse is $$\\log_a$$. Step 3: The whole \"linearise via log → solve linear equation → exponentiate to recover model\" pipeline is built on this inverse relationship. Master log-exp inverses, and all the P3 modelling chapters become applications of one principle.", "source": "Opus 4.7 ①", "_id": "opus_1_132"}, {"question": "Given $$y = |x+1|$$ and $$y = a - |2x-b|$$ intersect at $$x=-3$$ and $$x=5$$, how do the branch signs at these points generate two simultaneous equations for $$a$$ and $$b$$? (3 steps)", "answer": "- Step 1: At $$x=5$$ (right of both breakpoints $$-1$$ and $$b/2$$), both inner expressions are positive: $$|x+1| = x+1$$ and $$|2x-b| = 2x-b$$. Equating gives $$x+1 = a-(2x-b)$$, which simplifies to $$a+b = 16$$.\n- Step 2: At $$x=-3$$ (left of both breakpoints), both inner expressions are negative: $$|x+1| = -(x+1)$$ and $$|2x-b| = -(2x-b) = b-2x$$. Equating gives $$-(x+1) = a-(b-2x)$$, which at $$x=-3$$ simplifies to $$a-b = 8$$.\n- Step 3: Solving $$a+b=16$$ and $$a-b=8$$ simultaneously yields $$a=12$$ and $$b=4$$. Reading branch signs directly from the graph at the specific intersection coordinates eliminates ambiguity and fixes the correct case pairing.", "source": "Kimi K2.6 ①", "_id": "kimi_1_33"}, {"question": "What is the addition formula for $$\\sin(A \\pm B)$$, and what is the most common sign error? (2 steps)", "answer": "- Step 1: $$\\sin(A + B) = \\sin A\\cos B + \\cos A\\sin B$$ and $$\\sin(A - B) = \\sin A\\cos B - \\cos A\\sin B$$. The sign in the middle matches the sign in the argument.\n- Step 2: The common error is mixing up the sign rule with the cosine formula. For $$\\cos(A \\pm B) = \\cos A\\cos B \\mp \\sin A\\sin B$$, the sign is **opposite** to the argument sign (cosine addition has a minus between the terms). For sine, the sign **matches**. Mnemonic: \"sine keeps the sign, cosine flips the sign.\"", "source": "GLM 5.1 ②", "_id": "glm_2_66"}, {"question": "Synthesis: Suppose a question gives you $$f(x) = $$ a complicated expression, asks (a) to show $$f(x)$$ simplifies to a nice form, (b) to differentiate, (c) to integrate over a range. What's the strategic order? Why? (3 steps)", "answer": "- Step 1: **Always** do part (a) first. The simplified form is what (b) and (c) will use; differentiating or integrating the unsimplified form is a nightmare. Even if the question doesn't insist on order, do it.\n- Step 2: Use the simplified form for (b): differentiate, factor for turning-point analysis. Cleaner expressions = fewer errors.\n- Step 3: Use the simplified form for (c): integrate using standard templates. The simplification often makes the integral match a known form (e.g., reduces to $$1/(ax+b)$$ template).\n\nThe principle: simplification *enables* downstream steps — never skip or postpone it.", "source": "Opus 4.7 ①", "_id": "opus_1_123"}, {"question": "For $$f(x) = R\\sin(2x + \\alpha) + c$$, find the second-smallest positive $$x$$ at which $$f$$ attains its maximum. Why isn't the first solution always the answer? (4 steps)", "answer": "- Step 1: Maximum occurs when $$\\sin(2x+\\alpha) = 1$$, i.e. $$2x+\\alpha = \\pi/2 + 2n\\pi$$ for integer $$n$$.\n- Step 2: Solve for $$x$$: $$x = \\dfrac{\\pi/2 - \\alpha + 2n\\pi}{2}$$, giving an arithmetic progression of solutions with common difference $$\\pi$$ (since $$2x$$ scales the period from $$2\\pi$$ to $$\\pi$$).\n- Step 3: The smallest positive $$x$$ corresponds to $$n=0$$: $$x_1 = (\\pi/2 - \\alpha)/2$$. The next is $$n=1$$: $$x_2 = x_1 + \\pi$$.\n- Step 4: With $$\\alpha \\approx 0.464$$: $$x_1 \\approx 0.553$$ and $$x_2 \\approx 3.70$$. So the *second*-smallest positive $$x$$ is approximately 3.70.\n\nThe pitfall: assuming \"max\" only happens once; sin has infinitely many maxima, repeated periodically. List enumerated $$n$$ values to find the right one.", "source": "Opus 4.7 ①", "_id": "opus_1_31"}, {"question": "In a model like $$T = 10 + 8e^{-Bt}$$, what are the physical meanings of the parameters 10, 8, and $$B$$?", "answer": "- **10** (constant): the **asymptotic** value — the temperature $$T$$ approaches as $$t \\to \\infty$$. Physically, the ambient (room) temperature toward which the object cools.\n- **8** (coefficient of exponential): the **initial excess** above ambient — $$T(0) - 10 = 8$$. So initial temperature $$T(0) = 18$$ is 8 degrees above room temperature.\n- **B** (decay rate): the **speed of cooling** — larger $$B$$ means faster approach to ambient. Units: per unit time (e.g., per minute).\n\nThe model reflects **Newton's law of cooling**: rate of cooling proportional to current temperature excess. Solving this ODE gives the exponential form.", "source": "Opus 4.7 ②", "_id": "opus_2_124"}, {"question": "A hot object cools according to $$T=C+Ae^{-Bt}$$. Explain conceptually, using both the differential equation and the solution curve, why the rate of cooling is fastest initially and slows over time. (3 steps)", "answer": "- Step 1: The differential equation form of Newton's law states $$\\frac{dT}{dt}=-B(T-C)$$. The rate is proportional to the temperature excess $$(T-C)$$. Initially this excess is large, so the magnitude of the rate is large.\n- Step 2: As time passes, $$T$$ approaches $$C$$, shrinking the excess. Consequently $$\\frac{dT}{dt}$$ becomes smaller in magnitude; the cooling self-dampens because its own driving force diminishes.\n- Step 3: In the explicit solution $$T=C+Ae^{-Bt}$$, the graph begins with a steep negative slope at $$t=0$$ and gradually flattens toward the horizontal asymptote $$T=C$$. The derivative $$\\frac{dT}{dt}=-ABe^{-Bt}$$ is itself an exponential decay, confirming the rate is maximal at $$t=0$$ and asymptotically approaches zero.", "source": "Kimi K2.6 ②", "_id": "kimi_2_35"}, {"question": "Misconception probe: A student claims the maximum of $$f(x) = R\\sin(2x + \\alpha) - 1$$ is $$R$$. What's wrong?", "answer": "Step 1: The student forgot to add the constant. $$R\\sin(\\text{anything})$$ has max $$R$$, but the function here is shifted down by 1: $$\\max[R\\sin(2x+\\alpha) - 1] = R - 1$$. Step 2: General rule: $$\\max[R\\sin(\\cdots) + c] = R + c$$. The constant adds (or subtracts) directly to the max. Step 3: Don't drop the $$+c$$ in the boilerplate \"max = R+c\" — it's the only part that depends on the vertical shift.", "source": "Opus 4.7 ①", "_id": "opus_1_85"}, {"question": "State the rearranged identities for $$\\cos^2 A$$ and $$\\sin^2 A$$ in terms of $$\\cos 2A$$. Why are these rearrangements the ones you reach for in integration and linearisation problems?", "answer": "- $$\\cos^2 A = \\tfrac{1}{2}(1 + \\cos 2A)$$\n- $$\\sin^2 A = \\tfrac{1}{2}(1 - \\cos 2A)$$\n\nReason for usefulness:\n+ In **integration**: $$\\cos^2 A$$ has no elementary antiderivative as a product, but $$\\tfrac{1}{2}(1 + \\cos 2A)$$ is trivial to integrate term-by-term.\n+ In **linearisation** (converting into $$R\\sin(x+\\alpha)$$ form): you need expressions involving $$\\sin 2x$$ and $$\\cos 2x$$ (linear in these), not squares.\n\nDerivation: rearrange $$\\cos 2A = 2\\cos^2 A - 1$$ for $$\\cos^2 A$$, similarly for the other.", "source": "Opus 4.7 ②", "_id": "opus_2_23"}, {"question": "Misconception probe: A student writes $$\\log_{10}(45000) = \\log 4.5 + 4$$. Is this correct?", "answer": "Step 1: Yes, this is correct — the student has cleverly applied scientific notation to simplify. Step 2: Reasoning: $$45000 = 4.5 \\times 10^4$$, so $$\\log_{10}(45000) = \\log_{10}(4.5) + \\log_{10}(10^4) = \\log_{10}(4.5) + 4$$ (using product rule and $$\\log_{10}(10^n) = n$$). Step 3: With $$\\log_{10}(4.5) \\approx 0.6532$$, total is $$\\approx 4.6532$$. This is faster than typing 45000 into a log button without understanding. The student is using a valuable technique: split logs of large numbers via scientific notation.", "source": "Opus 4.7 ①", "_id": "opus_1_133"}, {"question": "To solve a modulus inequality like $$2|x-5| + 10 > 6x$$ algebraically, what is the case-split setup and why is the \"validity region\" check absolutely critical?", "answer": "- Step 1: Split by sign of inside. Case 1 assumes $$x - 5 \\geq 0$$ (so $$|x-5| = x-5$$); Case 2 assumes $$x - 5 < 0$$ (so $$|x-5| = -(x-5) = 5-x$$).\n- Step 2: Solve the resulting inequality in each case *as if* the assumption held.\n- Step 3: **Intersect** the solution with the case's validity region. A solution found in Case 1 is only valid if it satisfies $$x \\geq 5$$; a solution found in Case 2 is only valid if $$x < 5$$.\n\nWhy critical: the sign assumption is a hypothesis, not a fact. A \"solution\" $$x = -2$$ derived under the assumption $$x \\geq 5$$ is nonsense — it contradicts the assumption.", "source": "Opus 4.7 ②", "_id": "opus_2_4"}, {"question": "Contrast $$\\int \\frac{6}{x - 2}\\,dx$$ and $$\\int \\frac{6}{3x - 7}\\,dx$$. Why does the \"forgotten $$1/a$$\" error not bite in the first but does in the second?", "answer": "- Step 1: For $$\\int \\frac{6}{x-2} dx$$: here $$a = 1$$ (coefficient of $$x$$). The prefactor $$1/a = 1/1 = 1$$, so the \"error\" of forgetting it makes no numerical difference — you still get $$6\\ln|x - 2| + C$$.\n- Step 2: For $$\\int \\frac{6}{3x-7} dx$$: $$a = 3$$, so $$1/a = 1/3$$. Forgetting gives $$6\\ln|3x-7|$$; correct answer is $$\\tfrac{6}{3}\\ln|3x-7| = 2\\ln|3x-7|$$ — a factor-3 error.\n- Step 3: Danger: students who \"got away with it\" on the easy case develop the bad habit, then lose marks when $$a \\neq 1$$.\n\nTakeaway: always check the coefficient of $$x$$ in the denominator before integrating $$1/(\\text{linear})$$.", "source": "Opus 4.7 ②", "_id": "opus_2_10"}, {"question": "Conceptual: Why is \"act with respect to the answer\" a particularly important habit on **show that** questions, where the answer is given to you?", "answer": "Step 1: On a \"show that\" question, you know exactly where you must end up. The whole problem becomes about finding a *path* from the start to the given target. Step 2: Without target-awareness, you might apply identities that simplify but don't move toward the target — wasted effort. With target-awareness, every step is purposeful: \"this identity introduces $$\\cos 2\\theta$$ which appears in the target.\" Step 3: Mark schemes typically award full marks for any valid path; partial marks for partial progress. So if you stall, you can sometimes \"work backwards from the target\" to meet your forward progress in the middle. Always inspect the target *before* starting.", "source": "Opus 4.7 ①", "_id": "opus_1_99"}, {"question": "For a modulus function $$y = a|x - h| + k$$, what is the exact coordinate of the vertex, and why does setting the expression inside the modulus equal to zero identify this point? (2 steps)", "answer": "- Step 1: The vertex occurs where the inner expression is zero: $$x - h = 0 \\Rightarrow x = h$$. At this $$x$$, the modulus term $$|x-h|$$ attains its absolute minimum value of $$0$$, because modulus outputs only non-negative values.\n- Step 2: Substituting $$x = h$$ gives $$y = a(0) + k = k$$. Therefore the vertex is $$(h, k)$$. This shortcut works because the minimum possible output of $$|x-h|$$ is $$0$$; any vertical stretch by $$a$$ and shift by $$k$$ then moves that minimum to $$(h, k)$$, making it the global minimum if $$a>0$$ or global maximum if $$a<0$$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_0"}, {"question": "Conceptual: Why do \"increasing\" and \"decreasing\" properties require checking $$f' > 0$$ (or $$<0$$) on the **entire domain**, not just at one or two test points?", "answer": "Step 1: Increasing on a domain means $$x_1 < x_2$$ implies $$f(x_1) < f(x_2)$$ for *all* such pairs in the domain. This is a global statement. Step 2: The connection to $$f'$$: by the Mean Value Theorem, if $$f' > 0$$ everywhere on $$(a,b)$$, then $$f$$ is strictly increasing on $$[a,b]$$. The \"everywhere\" is essential — if $$f'$$ is positive at some points and zero or negative at others, $$f$$ could plateau or reverse. Step 3: At one test point, $$f'$$ might be positive but elsewhere zero (giving a horizontal tangent and inflection). So a single-point check is insufficient. Always argue: numerator/denominator sign analysis covering the *entire domain*.", "source": "Opus 4.7 ①", "_id": "opus_1_108"}, {"question": "Synthesis: Why does the population question with $$u_n = 2000 \\times 1.03^n$$ trip students up with off-by-one errors, while the temperature question with $$T = 10 + 8e^{-Bt}$$ rarely does?", "answer": "Step 1: In the temperature model, $$t$$ is *continuous* (time in minutes), so \"at $$t = 45$$\" is unambiguous: substitute $$t = 45$$ directly. No indexing confusion. Step 2: In the population model, $$n$$ is *discrete* (year number). Conventions differ: does $$n = 0$$ mean year 1 (initial measurement) or year 0 (a placeholder)? \"After 6 years\" might mean $$n = 6$$ or $$n = 5$$ depending on the convention. Step 3: To avoid the off-by-one: always anchor with $$n = 0 \\Rightarrow u_0 = $$ given initial value (e.g., 2000). Then $$n$$ years later is $$u_n = 2000 \\times 1.03^n$$, with the exponent matching the index. After 6 years from $$n=0$$: $$u_6 = 2000 \\times 1.03^6$$.", "source": "Opus 4.7 ①", "_id": "opus_1_135"}, {"question": "When finding the range of a composite function $$fg$$, why is it usually easier to first find the range of $$g$$ rather than attempting to compute $$fg$$ directly?", "answer": "- Step 1: Computing $$fg(x) = f(g(x))$$ explicitly often produces a complicated expression whose range is hard to read off.\n- Step 2: Instead: find range of $$g$$ (call it $$R_g$$). Then $$fg$$ is $$f$$ evaluated on $$R_g$$ — the range of $$fg$$ is the **image of $$R_g$$ under $$f$$**.\n- Step 3: If $$f$$ is monotonic on $$R_g$$, then range of $$fg$$ is simply $$f$$ at the endpoints of $$R_g$$. If not monotonic, consider turning points within $$R_g$$.\n\nWhy simpler: decomposes the problem into two smaller steps, each of which uses single-function analysis (monotonicity, turning points, limits).", "source": "Opus 4.7 ②", "_id": "opus_2_114"}, {"question": "To solve $$2|x-5| + 10 > 6x$$ algebraically, why must the problem be split into two cases, and what crucial validation step prevents extraneous solutions? (3 steps)", "answer": "- Step 1: The definition of modulus depends on the sign of the inner expression. Case 1 ($$x \\geq 5$$): $$|x-5| = x-5$$. Case 2 ($$x < 5$$): $$|x-5| = -(x-5) = 5-x$$. The algebraic form changes at the critical value $$x=5$$.\n- Step 2: Solve each linear inequality separately. For $$x \\geq 5$$: $$2(x-5)+10 > 6x \\Rightarrow 2x > 6x \\Rightarrow x < 0$$. For $$x < 5$$: $$2(5-x)+10 > 6x \\Rightarrow 20 > 8x \\Rightarrow x < 5/2$$.\n- Step 3: Each candidate solution must be intersected with its case assumption. Case 1 demands $$x \\geq 5$$ and $$x < 0$$ simultaneously, which is impossible (no solution). Case 2 demands $$x < 5$$ and $$x < 5/2$$, giving the final answer $$x < 5/2$$. Without this intersection check, one might incorrectly retain the impossible $$x < 0$$ from Case 1.", "source": "Kimi K2.6 ①", "_id": "kimi_1_2"}, {"question": "Conceptual: When is the derivative $$f'(x) = 0$$ NOT a turning point, and how should one verify? (3 steps)", "answer": "- Step 1: $$f'(x) = 0$$ identifies *stationary points*, which include local maxima, local minima, and **points of inflection** (e.g., $$f(x) = x^3$$ has $$f'(0)=0$$ but is increasing through 0 — no turning point).\n- Step 2: To verify it's a turning point: check the sign of $$f'$$ on either side (sign change = turning point) or use the second derivative test ($$f''(x_0) > 0$$ → minimum; $$<0$$ → maximum; $$=0$$ → inconclusive).\n- Step 3: For inflection: $$f'(x_0) = 0$$ but no sign change in $$f'$$ — graph keeps increasing (or decreasing) through the point with momentary horizontal tangent. So always check beyond just $$f' = 0$$ for \"turning point\" claims.", "source": "Opus 4.7 ①", "_id": "opus_1_119"}, {"question": "Conceptual: Why is the $$R$$-formula essentially a *change of basis* for the function space spanned by $$\\{\\sin x, \\cos x\\}$$?", "answer": "Step 1: Any linear combination $$a\\sin x + b\\cos x$$ can be re-expressed as $$R\\sin(x+\\alpha)$$ using the addition formula. This is a coordinate change in the 2D function space spanned by $$\\sin, \\cos$$. Step 2: The new \"basis\" is a single shifted sine wave; the \"coordinate\" is $$R$$ (amplitude) and the \"phase\" is $$\\alpha$$. Geometrically, $$(a, b)$$ as a vector in the plane has polar coordinates $$(R, \\alpha)$$. Step 3: This change of basis reveals the function as a single sinusoid in disguise — making max/min/zero questions trivial. The cost is a phase shift; the benefit is structural simplicity. This is why $$R$$-form is the *normal form* for sums of sin and cos.", "source": "Opus 4.7 ①", "_id": "opus_1_105"}, {"question": "Contrast the two iteration rearrangements: $$x = \\sqrt[3]{\\tfrac{5x^2 - 4x + 7}{x}}$$ versus (hypothetically) $$x = 5x^2 - 4x + 7 - x^4$$. Why would the first converge while the second diverge?", "answer": "- Step 1: Convergence requires $$|g'(\\alpha)| < 1$$ at the fixed point.\n- Step 2: For $$g_1(x) = \\sqrt[3]{\\tfrac{5x^2 - 4x + 7}{x}}$$: near $$\\alpha \\approx 2.15$$, $$g_1$$ is relatively flat (cube root compresses), so $$|g_1'(\\alpha)|$$ is small — convergence likely.\n- Step 3: For $$g_2(x) = 5x^2 - 4x + 7 - x^4$$ (a direct rearrangement): this is a high-degree polynomial whose derivative is large in magnitude, so $$|g_2'(\\alpha)|$$ is likely $$> 1$$ — divergence.\n\nLesson: not every rearrangement is usable for iteration. The \"good\" rearrangement typically isolates $$x$$ via an operation that reduces sensitivity (cube roots, logs, etc.). Mechanical algebra isn't enough — the choice of $$g$$ matters for convergence.", "source": "Opus 4.7 ②", "_id": "opus_2_115"}, {"question": "Why must $$f$$ be continuous on $$[a, b]$$ for the sign change theorem to apply? Give an intuition for what could go wrong with a discontinuous function.", "answer": "- Step 1: Continuity ensures the function can't \"skip\" values. A continuous function taking both positive and negative values must pass through every intermediate value, including zero.\n- Step 2: Counterexample if discontinuous: consider $$f(x) = 1/x$$ on $$[-1, 1]$$. $$f(-1) = -1 < 0$$, $$f(1) = 1 > 0$$, opposite signs. Yet there's no root! The function jumps from $$-\\infty$$ to $$+\\infty$$ at $$x = 0$$, skipping zero.\n- Step 3: For polynomials, continuity is automatic (polynomials are continuous everywhere). But for rational or piecewise functions, you must verify continuity on the specific interval.\n\nKey lesson: state continuity explicitly in your write-up — it's a marked ingredient, not a free assumption.", "source": "Opus 4.7 ②", "_id": "opus_2_91"}, {"question": "In the quotient rule, why is the numerator $$u'v - uv'$$ (this specific order) rather than $$uv' - u'v$$?", "answer": "- Step 1: The quotient rule is derived from the product rule applied to $$u \\cdot v^{-1}$$:\n$$\\tfrac{d}{dx}(u \\cdot v^{-1}) = u' v^{-1} + u \\cdot (-v^{-2}) v' = \\tfrac{u'}{v} - \\tfrac{uv'}{v^2}$$.\n- Step 2: Combine over a common denominator: $$\\tfrac{u'v - uv'}{v^2}$$. The $$u'v$$ term comes from differentiating $$u$$ first; $$uv'$$ from differentiating $$v$$.\n- Step 3: Flipping the order ($$uv' - u'v$$) produces the **negative** of the correct derivative, which would reverse sign conclusions (e.g., \"increasing\" vs \"decreasing\").\n\nMnemonic: \"Low dee-High minus High dee-Low, over Low squared.\" (\"Low\" = denominator, \"High\" = numerator.)", "source": "Opus 4.7 ②", "_id": "opus_2_82"}, {"question": "Why must both continuity and a sign change be stated to guarantee a root in $$[2,3]$$, and what counterexample shows continuity is essential? (2 steps)", "answer": "- Step 1: The Intermediate Value Theorem requires continuity because a discontinuous function can jump over the axis. For example, $$f(x) = \\frac{1}{x}$$ on $$[-1,1]$$ has $$f(-1)=-1$$ and $$f(1)=1$$ (opposite signs) but no zero in between due to the discontinuity at $$x=0$$.\n- Step 2: Even with continuity, if $$f(2)$$ and $$f(3)$$ share the same sign, the function might not cross zero. Both conditions are necessary: continuity ensures the graph is unbroken, and opposite signs force it to cross the $$x$$-axis somewhere between them.", "source": "Kimi K2.6 ①", "_id": "kimi_1_21"}, {"question": "What is the **product rule** for differentiation, and how does it apply to $$f(x) = 2e^{3\\sin x}\\cos x$$? (3 steps)", "answer": "- Step 1: Product rule: $$(uv)' = u'v + uv'$$. Set $$u = 2e^{3\\sin x}$$ and $$v = \\cos x$$.\n- Step 2: $$u' = 2 \\cdot e^{3\\sin x} \\cdot (3\\cos x) = 6\\cos x \\, e^{3\\sin x}$$ (chain rule on the exponential), and $$v' = -\\sin x$$.\n- Step 3: Substitute: $$f'(x) = 6\\cos x \\, e^{3\\sin x} \\cdot \\cos x + 2e^{3\\sin x}\\cdot(-\\sin x) = 2e^{3\\sin x}(3\\cos^2 x - \\sin x)$$ — after factoring out the common $$2e^{3\\sin x}$$.\n\nThe factoring step at the end is critical for finding turning points cleanly.", "source": "Opus 4.7 ①", "_id": "opus_1_51"}, {"question": "When simplifying $$4\\cos^2 x - 3$$ to introduce $$\\cos 2x$$, the identity $$\\cos^2 x = \\tfrac{1}{2}(1 + \\cos 2x)$$ works cleanly while $$\\cos 2x = \\cos^2 x - \\sin^2 x$$ doesn't. Why?", "answer": "- Step 1: The goal is to *replace* $$\\cos^2 x$$ with something containing $$\\cos 2x$$ — eliminating the squared term.\n- Step 2: Identity 1 ($$\\cos^2 x = \\tfrac{1}{2}(1 + \\cos 2x)$$) directly substitutes: $$4 \\cdot \\tfrac{1}{2}(1 + \\cos 2x) - 3 = 2 + 2\\cos 2x - 3 = 2\\cos 2x - 1$$. Clean.\n- Step 3: Identity 2 ($$\\cos 2x = \\cos^2 x - \\sin^2 x$$) gives an expression for $$\\cos 2x$$ in terms of squared quantities — but we wanted to *eliminate* the squares, not compute $$\\cos 2x$$ from them. Going this direction introduces more $$\\sin^2 x$$ terms rather than simplifying.\n\nPrinciple: the identity you want is the one that expresses \"what you have\" in terms of \"what you want\".", "source": "Opus 4.7 ②", "_id": "opus_2_24"}, {"question": "Conceptual: For $$f(x) = (3x-5)^2$$ in the denominator of a derivative, why is $$(3x-5)^2 > 0$$ required for \"decreasing\" to follow from $$f'<0$$? (3 steps)", "answer": "- Step 1: A function is *decreasing* on a domain if $$f' < 0$$ for all $$x$$ in the domain. The numerator's sign alone doesn't tell you the sign of the fraction — you need the denominator's sign too.\n- Step 2: $$(3x-5)^2$$ is a square, hence $$\\geq 0$$. It equals 0 only at $$x = 5/3$$. For our domain $$x > 2$$, $$5/3 < 2$$ so $$3x-5 > 1 > 0$$, hence $$(3x-5)^2 > 0$$ strictly.\n- Step 3: With numerator $$-10 < 0$$ (constant) and denominator $$> 0$$, the fraction is negative throughout: $$f'(x) < 0$$ for all $$x > 2$$. Thus $$f$$ is decreasing on $$(2, \\infty)$$. The argument is *quantified over the whole domain*, not just one $$x$$.", "source": "Opus 4.7 ①", "_id": "opus_1_95"}, {"question": "State the general rule for integrating a constant multiple $$\\int k f(x) dx$$, and explain why you can \"factor out\" constants but not $$x$$-dependent terms.", "answer": "- Step 1: Rule: $$\\int k f(x) dx = k \\int f(x) dx$$ (for constant $$k$$).\n- Step 2: Why works: integration is a linear operator. The derivative of $$k F(x)$$ is $$k F'(x) = k f(x)$$, so $$k F$$ is an antiderivative of $$k f$$.\n- Step 3: Why not for $$x$$-dependent terms: $$\\int x f(x) dx \\neq x \\int f(x) dx$$ in general. Because $$\\tfrac{d}{dx}[x F(x)] = F(x) + x F'(x) \\neq x f(x)$$ (extra $$F(x)$$ term).\n\nPractical: for $$\\int \\tfrac{16}{9(3x - k)} dx$$, factor out $$\\tfrac{16}{9}$$ first, then apply the standard template. Never factor out the $$(3x - k)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_117"}, {"question": "When solving $x^3 = \\frac{5x^2 - 4x + 7}{x}$ to get an iteration formula, why do we divide by x? What would happen if we didn't? (2 steps)", "answer": "- Step 1: We want the iteration to produce $x$ on the left after taking the cube root. Currently we have $x^4$ on the left. To reduce the power, divide by $x$.\n- Step 2: Dividing by $x$ gives $x^3 = \\frac{5x^2 - 4x + 7}{x}$. Taking cube root: $x = \\sqrt[3]{\\frac{5x^2 - 4x + 7}{x}}$. This is the desired $x = g(x)$ form.\n- If we didn't divide, we'd have $x = \\sqrt[4]{5x^2 - 4x + 7}$, which is a different (and less useful) iteration.\n\n**Takeaway:** Look at the target form. If it has $\\sqrt[3]{\\dots}$, you need $x^3$ inside after rearrangement.", "source": "MiniMax ①", "_id": "minimax_1_37"}, {"question": "For a \"show that\" or \"prove\" question, why is it insufficient to substitute a single numerical value and show equality?", "answer": "- Step 1: A \"show\" question demands the relationship holds **for all valid inputs** (or within the stated domain), not just at one value.\n- Step 2: A single numerical check can confirm consistency, but it doesn't **prove** the general identity. Two different expressions might coincidentally agree at one point.\n- Step 3: Example: $$\\sin^2 x = 1 - \\cos^2 x$$ should be proved by algebraic manipulation (from Pythagoras), not by checking at $$x = 0$$.\n\nProper proof: algebraic manipulation from LHS to RHS (or both to a common form), using identities and logical steps. Each line should be justified by an identity or algebraic rule.\n\nMarkers look for: clear structure, named identities, logical flow — not just a verification table.", "source": "Opus 4.7 ②", "_id": "opus_2_99"}, {"question": "What is the principle: \"when the unknown is in the exponent, the first move is ___\"? Illustrate using $$\\tfrac{2a}{3a - 5} = e$$ being solved for $$a$$ as a contrast.", "answer": "Principle: \"take logarithms\".\n\nBut note: in $$\\tfrac{2a}{3a - 5} = e$$, the unknown $$a$$ is **not** in an exponent — it's in a rational expression, with $$e$$ as a constant on the right. Here, logs are unnecessary; just cross-multiply:\n\n- Step 1: $$2a = e(3a - 5) = 3ea - 5e$$.\n- Step 2: Collect $$a$$-terms: $$2a - 3ea = -5e \\Rightarrow a(2 - 3e) = -5e$$.\n- Step 3: Solve: $$a = \\tfrac{-5e}{2 - 3e} = \\tfrac{5e}{3e - 2}$$.\n\nContrast: for $$e^a = 5$$, the unknown is in the exponent, so take log: $$a = \\ln 5$$. The principle applies only when the unknown sits as an exponent.", "source": "Opus 4.7 ②", "_id": "opus_2_89"}, {"question": "Conceptual: How does the second-derivative test relate to the geometry of the graph at a turning point?", "answer": "Step 1: At a stationary point $$x_0$$ where $$f'(x_0) = 0$$, the tangent is horizontal. The second derivative $$f''(x_0)$$ measures *curvature* at that point. Step 2: $$f''(x_0) > 0$$: the graph curves upward (concave up, \"smiling\"), so the stationary point is a local minimum — the graph is at the bottom of a \"cup.\" Step 3: $$f''(x_0) < 0$$: the graph curves downward (concave down, \"frowning\"), so the stationary point is a local maximum — the graph is at the top of a \"hill.\" If $$f''(x_0) = 0$$: inconclusive — could be inflection or higher-order min/max; need other tests (sign change of $$f'$$).", "source": "Opus 4.7 ①", "_id": "opus_1_121"}, {"question": "Why should the ANS button be used for fixed-point iteration, and what error does manual retyping introduce? (2 steps)", "answer": "- Step 1: The ANS button stores the calculator's full-precision previous value. Typing the recurrence as $$\\sqrt[3]{(5\\text{ANS}^{2}-4\\text{ANS}+7)/\\text{ANS}}$$ and pressing equals repeatedly propagates the exact prior iterate.\n- Step 2: Manually rounding and retyping between iterations injects rounding errors that compound. Even slight discrepancies in early steps can prevent the sequence from stabilizing to the required decimal places, causing apparent divergence or incorrect convergence.", "source": "Kimi K2.6 ①", "_id": "kimi_1_22"}, {"question": "Factorise $$2x^2 - 32$$ and explain why recognising the difference-of-squares pattern matters.", "answer": "- Step 1: Factor out 2: $$2x^2 - 32 = 2(x^2 - 16)$$.\n- Step 2: Spot difference of squares: $$x^2 - 16 = x^2 - 4^2 = (x - 4)(x + 4)$$.\n- Step 3: Full factorisation: $$2(x - 4)(x + 4)$$.\n\nWhy matters: in expressions like $$\\tfrac{2x^2 - 32}{3x^2 + 7x - 20}$$, you need both numerator and denominator factored to spot cancellable factors. Without factoring, $$(x + 4)$$ in both is invisible.\n\nIdentity: $$a^2 - b^2 = (a-b)(a+b)$$ — arises whenever two square terms are subtracted.", "source": "Opus 4.7 ②", "_id": "opus_2_84"}, {"question": "Why is it generally dangerous to solve $$|x-c|>d$$ by squaring both sides to obtain $$(x-c)^2>d^2$$? What information is lost, and what extraneous solutions can appear? (2 steps)", "answer": "- Step 1: Squaring removes sign information. The inequality $$|x-c|>d$$ distinguishes direction (left or right of $$c$$), whereas $$(x-c)^2>d^2$$ is symmetric and treats both sides identically. If $$d$$ varies with $$x$$ (e.g., $$d=6x$$), squaring becomes even more hazardous because the RHS may be negative, and squaring inequalities involving negative terms is not an equivalence transformation.\n- Step 2: Extraneous solutions arise because squaring enlarges the solution set. For example, if $$x=-10$$, then $$|x-5|=15$$ and $$6x=-60$$; the inequality $$15>-60$$ is true, but squaring would compare $$225>3600$$, which is false. Case-splitting respects the piecewise definition and avoids this corruption.", "source": "Kimi K2.6 ②", "_id": "kimi_2_31"}, {"question": "Why is it \"safer\" (mathematically equivalent but easier to avoid errors) to write $$B = \\ln(4/3)/45$$ rather than $$B = -\\ln(3/4)/45$$?", "answer": "- Step 1: Both are algebraically identical: $$-\\ln(3/4) = \\ln((3/4)^{-1}) = \\ln(4/3)$$ by the power/inverse log law.\n- Step 2: However, $$\\ln(4/3)$$ is manifestly **positive** (since $$4/3 > 1$$ means $$\\ln > 0$$), matching physical expectation of $$B > 0$$.\n- Step 3: $$-\\ln(3/4)$$ involves a double negative: $$\\ln(3/4)$$ is negative (since $$3/4 < 1$$), and the leading minus flips it. Students often forget the double negative and report $$B$$ as negative.\n\nRule: if you know the quantity should be positive, write it in a manifestly positive form to avoid sign errors.", "source": "Opus 4.7 ②", "_id": "opus_2_122"}, {"question": "When dividing $$2x^2 - 5x + 8$$ by $$x - 2$$, you get quotient $$2x - 1$$ and remainder $$6$$. What does the remainder represent algebraically?", "answer": "- Step 1: Polynomial division yields the identity: $$\\underbrace{2x^2 - 5x + 8}_{\\text{dividend}} = \\underbrace{(x-2)}_{\\text{divisor}} \\cdot \\underbrace{(2x-1)}_{\\text{quotient}} + \\underbrace{6}_{\\text{remainder}}$$.\n- Step 2: Dividing through by $$x - 2$$: $$\\tfrac{2x^2 - 5x + 8}{x - 2} = 2x - 1 + \\tfrac{6}{x - 2}$$.\n- Step 3: The remainder $$6$$ becomes the numerator of a \"proper fraction\" (constant over linear) that can't be simplified further by division. It's what's \"left over\" after extracting the polynomial part.\n\nBonus: by the Remainder Theorem, the remainder when dividing by $$(x - c)$$ equals $$f(c)$$. Check: $$2(2)^2 - 5(2) + 8 = 8 - 10 + 8 = 6$$ ✓.", "source": "Opus 4.7 ②", "_id": "opus_2_93"}, {"question": "When performing iterative numerical root-finding, what operational criterion tells you to stop and report convergence to a given decimal-place accuracy?", "answer": "Rule: **stop when successive values agree to the required number of decimal places**.\n\n- Step 1: Compute $$x_n, x_{n+1}, x_{n+2}, \\ldots$$ using the iteration.\n- Step 2: Compare $$x_{n+1}$$ and $$x_n$$ rounded to the required d.p. If identical, check one more (e.g., $$x_{n+2}$$) to confirm stability.\n- Step 3: Report that rounded value as $$\\alpha$$.\n\nExample: if 4 d.p. is required and $$x_5 = 2.1471$$, $$x_6 = 2.1472$$, $$x_7 = 2.1472$$ — you can report $$\\alpha = 2.1472$$ (4 d.p.). The agreement across multiple iterations is key.\n\nToo early = wrong answer; too late = wasted time.", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "Synthesis exercise: An exam question asks (a) prove $$f(x) = 2x/(3x-5)$$ is decreasing for $$x>2$$, (b) find $$g^{-1}$$ where $$g(x) = 3 + 2\\ln x$$, (c) solve $$gf(a) = 5$$. Why do parts (a) and (b) facilitate part (c) — what's the strategic build? (3 steps)", "answer": "- Step 1: Part (a) confirms $$f$$ has a one-to-one structure on its domain (decreasing functions are injective). This guarantees that $$gf(a) = 5$$ has a *unique* solution.\n- Step 2: Part (b) gives $$g^{-1}$$, but more importantly forces you to know what \"applying $$g$$\" does — it sets up the recipe for inverting $$g$$ in part (c). When solving $$gf(a) = 5$$, you essentially compute $$f(a) = g^{-1}(5)$$ (since $$g$$ is invertible) and then solve for $$a$$.\n- Step 3: Part (c) thus uses both the *structural* fact (one-to-one from (a)) and the *computational* fact (how to undo $$g$$, from (b)). The build mirrors how a working mathematician would attack this: first establish injectivity, then construct the inverse, then chain backwards from the target.", "source": "Opus 4.7 ①", "_id": "opus_1_89"}, {"question": "Given $$T = 10 + 8e^{-Bt}$$ and $$T=16$$ at $$t=45$$, explain the logical flow from substitution to isolation of $$B$$. (3 steps)", "answer": "- Step 1: Substitute the known values: $$16 = 10 + 8e^{-45B}$$. Subtract the ambient temperature: $$6 = 8e^{-45B}$$. Divide by 8: $$\\frac{3}{4} = e^{-45B}$$.\n- Step 2: Take natural logarithms to unlock the exponent: $$\\ln(3/4) = -45B$$. This can be rewritten using $$-\\ln(4/3)$$ to keep the numerator positive if desired.\n- Step 3: Divide by $$-45$$: $$B = \\frac{\\ln(4/3)}{45}$$. The logarithm appears because it is the inverse of the exponential; $$B$$ emerges as a ratio of logs because it is a rate parameter governing how quickly the excess decays to three-quarters of its previous value.", "source": "Kimi K2.6 ①", "_id": "kimi_1_43"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "Given a modulus function like $$y = a|x - h| + k$$, what is the shortcut to find the coordinates of the vertex, and why does it work? (2 steps)", "answer": "- Step 1: Set the expression inside the modulus to zero. This gives $$x - h = 0 \\Rightarrow x = h$$. The reason: the modulus function $$|x - h|$$ achieves its minimum value of 0 exactly when its argument is zero. This is the \"bottom of the V.\"\n- Step 2: Substitute this $$x$$-value into the full expression. Since $$|x - h| = 0$$ at the vertex, $$y = a \\cdot 0 + k = k$$. So the vertex is $$(h, k)$$. The key insight is that the minimum of any $$| \\text{stuff} |$$ is always 0, so the vertical shifts and stretches only modify the $$y$$-coordinate, never the $$x$$-coordinate of the vertex.\n\nThe shortcut bypasses the entire step-by-step transformation table — just set inside = 0, substitute.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "Starting from $$y = x$$, describe the step-by-step transformation sequence that produces $$y = 2|x - 5| + 10$$, and state the vertex at each stage. (5 steps)", "answer": "- Step 1: Start with $$y = x$$, a line through the origin with slope 1. Vertex concept doesn't apply yet; the \"corner\" is at $$(0, 0)$$.\n- Step 2: $$y = |x|$$ — reflect the negative-$$y$$ portion above the $$x$$-axis. This creates a V-shape with vertex at $$(0, 0)$$.\n- Step 3: $$y = |x - 5|$$ — translate right by 5. The inside transformation $$x \\to x - 5$$ shifts the graph horizontally in the opposite direction. Vertex moves to $$(5, 0)$$.\n- Step 4: $$y = 2|x - 5|$$ — vertical stretch by factor 2. This multiplies all $$y$$-values by 2, but since the minimum $$y$$ was 0, it stays 0. Vertex remains at $$(5, 0)$$.\n- Step 5: $$y = 2|x - 5| + 10$$ — translate up by 10. Vertex moves to $$(5, 10)$$.\n\nCritical observation from Mr. Fuat: \"Multiplying by 2 only changes the $$y$$-value, not the $$x$$. Because the minimum is 0, times 2 is still 0, so +10 makes min = 10.\"", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "When reading a function like $$y = 2|x - 5| + 10$$ left-to-right, what is the correct order to apply the transformations, and what is a common pitfall? (2 steps)", "answer": "- Step 1: Apply the stretch first on $$|x - 5|$$, then the +10 shift. The function is built as: start with $$|x|$$, shift right 5 to get $$|x-5|$$, stretch vertically by 2 to get $$2|x-5|$$, then shift up 10. The stretch acts on the modulus output (which has minimum 0), so it scales the V but doesn't move the vertex horizontally.\n- Step 2: The common pitfall is applying the +10 before the ×2, which would incorrectly give a different result. Order matters for vertical operations when they interact: $$2(|x-5| + 10) = 2|x-5| + 20$$ is NOT the same as $$2|x-5| + 10$$. Always apply transformations in the order they act on the base function: inner transformations first (horizontal), then outer (vertical: stretches then shifts).", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "To solve a modulus inequality like $$2|x - 5| + 10 > 6x$$ algebraically, you must split into cases. What are the two cases, and what critical check must you perform after solving each? (3 steps)", "answer": "- Step 1: Case 1 — when the expression inside the modulus is non-negative. Here $$x - 5 \\geq 0$$, i.e., $$x \\geq 5$$, so $$|x-5| = x - 5$$. Substitute and solve: $$2(x-5) + 10 > 6x \\Rightarrow x < 0$$.\n- Step 2: Case 2 — when the expression inside the modulus is negative. Here $$x - 5 < 0$$, i.e., $$x < 5$$, so $$|x-5| = -(x-5) = 5 - x$$. Substitute and solve: $$2(5-x) + 10 > 6x \\Rightarrow x < \\frac{5}{2}$$.\n- Step 3: The critical check — validate each solution against its declared case region. For Case 1, you need $$x \\geq 5$$ AND $$x < 0$$: impossible, so no solution from this case. For Case 2, you need $$x < 5$$ AND $$x < \\frac{5}{2}$$: the intersection is $$x < \\frac{5}{2}$$. Without this validation, you might incorrectly include Case 1's solution.\n\nThe #1 pitfall: forgetting to check each solution against its valid region.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "Why does the case $$x \\geq 5$$ AND $$x < 0$$ yield no solution in a modulus inequality? What does this tell us about the graph? (2 steps)", "answer": "- Step 1: The two conditions are mutually exclusive — no real number can be both ≥ 5 and < 0 simultaneously. This means the line $$y = 6x$$ never crosses the right arm of the V-shaped modulus graph (where $$x \\geq 5$$).\n- Step 2: Geometrically, at $$x \\geq 5$$ the modulus function $$y = 2|x-5| + 10$$ is already quite large (minimum 10 at $$x=5$$, increasing from there), while the condition $$x < 0$$ from solving the inequality tells us the algebraic solution doesn't overlap with this region. The intersection only happens on the left arm of the V, where $$x < 5$$.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "A point $$P$$ has coordinates $$(5, 10)$$ on the graph of $$y = f(x)$$. Find the image of $$P$$ under the transformation $$y = 3f(x - 2)$$, and explain the order of operations. (3 steps)", "answer": "- Step 1: The transformation $$y = 3f(x - 2)$$ has two parts. The inside part $$(x - 2)$$ is a horizontal translation: shift right by 2. The outside part $$3 \\times$$ is a vertical stretch by factor 3.\n- Step 2: Apply the horizontal shift first: $$x \\to x + 2$$, so $$5 \\to 7$$. Then apply the vertical stretch: $$y \\to 3y$$, so $$10 \\to 30$$.\n- Step 3: The image is $$(7, 30)$$. Key rule: inside transformations affect $$x$$ (horizontal, opposite direction — $$x - 2$$ means shift right, not left). Outside transformations affect $$y$$ (vertical, same direction — $$3f$$ means stretch up by 3).", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": true}, {"question": "For the function $$y = a - |bx - c|$$ with $$a, b > 0$$, explain step-by-step how the graph is built and state the coordinates of the maximum point, the $$y$$-intercept, and the $$x$$-intercepts. (5 steps)", "answer": "- Step 1: Start with $$y = bx$$, a straight line through the origin with slope $$b$$.\n- Step 2: $$y = |bx|$$ — reflect the negative portion above the $$x$$-axis. V-shape with vertex at origin.\n- Step 3: $$y = |bx - c|$$ — shift right by $$c/b$$ (set inside to zero: $$bx - c = 0 \\Rightarrow x = c/b$$). Vertex at $$(c/b, 0)$$.\n- Step 4: $$y = -|bx - c|$$ — reflect in the $$x$$-axis. This creates an inverted V with maximum at $$(c/b, 0)$$ and arms pointing downward.\n- Step 5: $$y = a - |bx - c|$$ — shift up by $$a$$. Maximum point at $$(c/b, a)$$. The $$y$$-intercept (set $$x = 0$$): $$y = a - |-c| = a - c$$. The $$x$$-intercepts (set $$y = 0$$): $$|bx - c| = a \\Rightarrow bx - c = \\pm a \\Rightarrow x = \\frac{c \\pm a}{b}$$, giving $$x = \\frac{c+a}{b}$$ and $$x = \\frac{c-a}{b}$$.\n\nShortcut from Mr. Fuat: \"The $$x$$-coordinate of the vertex is where the line inside the modulus cuts the $$x$$-axis.\"", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "When solving a two-modulus equation where graphs of $$y = |x+1|$$ and $$y = a - |2x - b|$$ intersect at given $$x$$-values, what principle must you follow to set up the correct equations? (3 steps)", "answer": "- Step 1: Draw both graphs and mark the intersection points. This is essential — you cannot determine the correct algebraic cases without the visual.\n- Step 2: At each intersection point, determine which branch of each V-shape applies. For $$y = |x+1|$$: if $$x > -1$$, the positive branch gives $$y = x + 1$$; if $$x < -1$$, the negative branch gives $$y = -(x+1)$$. For $$y = a - |2x - b|$$: if $$x > b/2$$, the descending (right) branch has $$|2x-b| = 2x - b$$; if $$x < b/2$$, the ascending (left) branch has $$|2x-b| = b - 2x$$.\n- Step 3: Equate the appropriate branch expressions. For example, at $$x = 5$$ (right of both vertices): use positive branch of $$|x+1|$$ and descending branch of $$|2x-b|$$, giving the \"positive-positive\" case $$(x+1) = a - (2x - b)$$. At $$x = -3$$ (left of both vertices): use negative branch of $$|x+1|$$ and ascending branch, giving $$-(x+1) = a - (b - 2x)$$.\n\nMr. Fuat's rule: \"Always use the graph to determine cases.\" The #1 pitfall is picking cases without checking the graph.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "Why does $$|2x - b|$$ have its vertex at $$x = b/2$$ rather than $$x = b$$? What is the general principle? (2 steps)", "answer": "- Step 1: The vertex of any modulus function $$|f(x)|$$ occurs where $$f(x) = 0$$, because that's where the output reaches its minimum value of 0. For $$|2x - b|$$, set $$2x - b = 0 \\Rightarrow x = b/2$$.\n- Step 2: The general principle: for $$|mx - c|$$, the vertex is at $$x = c/m$$, NOT $$x = c$$. The coefficient $$m$$ scales the horizontal position. This is the same reason $$y = f(2x)$$ is a horizontal stretch with scale factor $$1/2$$, not 2. The factor inside affects the $$x$$-coordinate inversely.\n\nCommon pitfall: writing the vertex as $$x = b$$ instead of $$x = b/2$$ when the coefficient of $$x$$ inside the modulus is not 1.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": true}, {"question": "What is the decision rule for when to use polynomial division versus partial fractions on an algebraic fraction? (2 steps)", "answer": "- Step 1:
