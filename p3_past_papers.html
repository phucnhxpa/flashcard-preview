nt where the V-shape of the modulus function turns.  \n- Step 2: **Effect of inversion and shift**: The negative sign inverts the V-shape, making it point downward, and the $ +a $ shifts the vertex upward to $ y = a $. Thus, the maximum value is $ a $ at $ x = \\frac{b}{2} $.  \n\n**Contrast**: How would the graph differ for $ y = |2x - b| $?  \n+ Answer: It would be a V-shape with vertex at $ x = \\frac{b}{2} $, opening upward with minimum value 0.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "How does the double-angle identity $ \\sin 2A = 2 \\sin A \\cos A $ help simplify $ \\frac{3 \\sin \\theta \\cos \\theta}{\\cos \\theta + \\sin \\theta} $? (3 steps)", "answer": "- Step 1: **Recognize pattern**: The numerator $ 3 \\sin \\theta \\cos \\theta $ matches $ \\frac{3}{2} \\sin 2\\theta $ via the identity $ \\sin 2A = 2 \\sin A \\cos A $.  \n- Step 2: **Rewrite expression**: Substitute numerator: $ \\frac{\\frac{3}{2} \\sin 2\\theta}{\\cos \\theta + \\sin \\theta} $.  \n- Step 3: **Multiply by conjugate**: Multiply numerator and denominator by $ \\cos \\theta - \\sin \\theta $ to utilize the identity $ (\\cos \\theta + \\sin \\theta)(\\cos \\theta - \\sin \\theta) = \\cos 2\\theta $. This simplifies the denominator to $ \\cos 2\\theta $, transforming the expression into $ \\frac{\\frac{3}{2} \\sin 2\\theta}{\\cos 2\\theta} $, which simplifies to $ \\frac{3}{2} \\tan 2\\theta $ under certain conditions.  \n\n**Edge Case**: What if $ \\cos \\theta + \\sin \\theta = 0 $?  \n+ Answer: The original expression is undefined, so $ \\theta $ values where $ \\cos \\theta + \\sin \\theta = 0 $ must be excluded (i.e., $ \\theta = \\frac{3\\pi}{4} + n\\pi $).", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}], "count": 10}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "For the function $y = 2|x-5| + 10$, what is the coordinate of the vertex P, and how do you find it quickly? (2 steps)", "answer": "- Step 1: Set the expression inside the modulus equal to zero: $x - 5 = 0$, giving $x = 5$.\n- Step 2: Substitute $x = 5$ into the function: $y = 2|5-5| + 10 = 2(0) + 10 = 10$. So the vertex is at $P = (5, 10)$.\n\n**Takeaway:** The vertex of $y = a|x - h| + k$ is always at $(h, k)$ because the minimum value of $|x - h|$ is 0.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "When solving the inequality $2|x-5| + 10 > 6x$, why must you check each solution against its valid region, and what happens if you don't? (2 steps)", "answer": "- Step 1: Split into two cases based on the sign of $(x-5)$:\n  - Case 1 ($x \\geq 5$): $2(x-5) + 10 > 6x$ gives $x < 0$, but this contradicts $x \\geq 5$, so no solution.\n  - Case 2 ($x < 5$): $2(5-x) + 10 > 6x$ gives $x < 2.5$.\n- Step 2: Check each solution against its case condition. For Case 2, we need $x < 5$ AND $x < 2.5$, so only $x < 2.5$ works.\n\n**Takeaway:** If you don't check, you might accept solutions that don't actually satisfy the original inequality because they came from the wrong case.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "For a transformation $y = 3f(x-2)$, describe how the point P (the vertex of the original function) is transformed, and explain why. (2 steps)", "answer": "- Step 1: The notation $f(x-2)$ means \"inside\" the function, which causes a horizontal shift. Since it's $(x-2)$, we shift RIGHT by 2 units (opposite sign rule).\n- Step 2: The multiplier 3 outside the function causes a vertical stretch by factor 3. So if P = (5, 10), then P' = (5+2, 3×10) = (7, 30).\n\n**Takeaway:** $y = f(x + a)$ shifts left by a; $y = f(x - a)$ shifts right by a. $y = af(x)$ stretches vertically by factor a.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "When should you use polynomial division versus partial fractions when simplifying algebraic fractions? (1 step)", "answer": "- Use polynomial division when $\\deg(\\text{numerator}) \\geq \\deg(\\text{denominator})$. The result will be a polynomial plus a remainder fraction.\n- Use partial fractions directly when $\\deg(\\text{numerator}) < \\deg(\\text{denominator})$.\n\n**Takeaway:** Always check the degree of the numerator first—this determines your method.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "For $g(x) = \\frac{2x^2 - 5x + 8}{x - 2}$, perform polynomial division to write it in the form $Ax + B + \\frac{C}{x-2}$. What are the values of A, B, and C? (3 steps)", "answer": "- Step 1: Divide $2x^2 - 5x + 8$ by $(x - 2)$. First term: $2x^2 \\div x = 2x$. Multiply back: $2x(x-2) = 2x^2 - 4x$. Subtract: $(-5x + 4x) = -x$.\n- Step 2: Next term: $-x \\div x = -1$. Multiply back: $-1(x-2) = -x + 2$. Subtract: $8 - 2 = 6$ (remainder).\n- Step 3: So $g(x) = 2x - 1 + \\frac{6}{x-2}$. Thus A = 2, B = -1, C = 6.\n\n**Takeaway:** The remainder becomes the constant in the fraction term.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "Evaluate $\\int_4^8 \\left(2x - 1 + \\frac{6}{x-2}\\right) dx$. What is the key formula you must remember for the $\\frac{6}{x-2}$ term? (2 steps)", "answer": "- Step 1: Integrate each term: $\\int (2x - 1) dx = x^2 - x$, and $\\int \\frac{6}{x-2} dx = 6 \\ln|x-2|$.\n- Step 2: The crucial formula is $\\int \\frac{1}{ax+b} dx = \\frac{1}{a} \\ln|ax+b| + C$. Here $a = 1$, so it's simply $6 \\ln|x-2|$.\n\n**Takeaway:** NEVER forget the $\\frac{1}{a}$ factor when integrating $\\frac{1}{ax+b}$. This is the #1 mistake to avoid.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "How do you convert the equation $y = 10^6 x^{-3}$ into a straight line form for plotting on a log-log graph? What are the gradient and intercepts? (3 steps)", "answer": "- Step 1: Take $\\log_{10}$ of both sides: $\\log_{10} y = \\log_{10}(10^6) + \\log_{10}(x^{-3}) = 6 - 3\\log_{10} x$.\n- Step 2: Let $Y = \\log_{10} y$ and $X = \\log_{10} x$, giving $Y = -3X + 6$. This is a straight line.\n- Step 3: Gradient = -3. Y-intercept (at X = 0): Y = 6, so point (0, 6). X-intercept (at Y = 0): 0 = -3X + 6, so X = 2, giving point (2, 0).\n\n**Takeaway:** For power models $y = kx^n$, plotting $\\log y$ vs $\\log x$ gives gradient n and intercept $\\log k$.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "Given $\\log_3 N = 2t + 4$, write N in the form $ab^t$. What are the values of a and b? (2 steps)", "answer": "- Step 1: Raise 3 to both sides (inverse of log): $N = 3^{2t+4} = 3^4 \\cdot 3^{2t}$.\n- Step 2: Rewrite: $3^4 = 81$, and $3^{2t} = (3^2)^t = 9^t$. So $N = 81 \\cdot 9^t$, giving a = 81, b = 9.\n\n**Takeaway:** Always split $3^{2t}$ into $(3^2)^t$ to match the $ab^t$ form. The exponent becomes the base raised to t.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "Why is it incorrect to say $\\log_{10}(10) = 10$? What is the correct value? (1 step)", "answer": "- The logarithm $\\log_{10}(10)$ asks: \"10 to what power gives 10?\" The answer is 1, since $10^1 = 10$. So $\\log_{10}(10) = 1$, not 10.\n\n**Takeaway:** $\\log_b(b) = 1$ for any base b, because $b^1 = b$. This is a common misconception to avoid.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "For $f(x) = 8\\sin x \\cos x + 4\\cos^2 x - 3$, convert to the form $a\\sin 2x + b\\cos 2x + c$ using double-angle identities. What are a, b, c? (3 steps)", "answer": "- Step 1: Use $2\\sin x \\cos x = \\sin 2x$, so $8\\sin x \\cos x = 4\\sin 2x$.\n- Step 2: Use $\\cos^2 x = \\frac{1}{2}(1 + \\cos 2x)$, so $4\\cos^2 x = 4 \\cdot \\frac{1}{2}(1 + \\cos 2x) = 2 + 2\\cos 2x$.\n- Step 3: Combine: $f(x) = 4\\sin 2x + 2 + 2\\cos 2x - 3 = 4\\sin 2x + 2\\cos 2x - 1$. So a = 4, b = 2, c = -1.\n\n**Takeaway:** Always look for $\\sin x \\cos x$ (becomes $\\frac{1}{2}\\sin 2x$) and $\\cos^2 x$ (becomes $\\frac{1}{2}(1 + \\cos 2x)$) patterns.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "Convert $4\\sin 2x + 2\\cos 2x - 1$ into R-form: $R\\sin(2x + \\alpha) + c$ where R > 0 and $0 < \\alpha < \\frac{\\pi}{2}$. Find R and $\\alpha$. (3 steps)", "answer": "- Step 1: Write $R\\sin(2x + \\alpha) = R\\sin 2x \\cos \\alpha + R\\cos 2x \\sin \\alpha$. Compare coefficients: $R\\cos\\alpha = 4$ and $R\\sin\\alpha = 2$.\n- Step 2: Square and add: $R^2 = 4^2 + 2^2 = 16 + 4 = 20$, so $R = \\sqrt{20} = 2\\sqrt{5}$.\n- Step 3: Divide: $\\tan\\alpha = \\frac{R\\sin\\alpha}{R\\cos\\alpha} = \\frac{2}{4} = \\frac{1}{2}$, so $\\alpha = \\arctan(0.5) \\approx 0.464$ rad (3 s.f.).\n\n**Takeaway:** $R = \\sqrt{a^2 + b^2}$ and $\\tan\\alpha = b/a$ for $a\\sin x + b\\cos x$.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "For $f(x) = R\\sin(2x + \\alpha) + c$, what is the maximum value and at what x does it occur? (2 steps)", "answer": "- Step 1: The maximum value of $\\sin(\\text{anything})$ is 1, so $\\max f(x) = R(1) + c = R + c$.\n- Step 2: Maximum occurs when $\\sin(2x + \\alpha) = 1$, i.e., $2x + \\alpha = \\frac{\\pi}{2} + 2n\\pi$ for $n = 0, 1, 2, ...$\n\n**Takeaway:** The maximum is always $R + c$, minimum is $-R + c$.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "A population model is given by $u_n = 2000 \\times 1.03^n$. What is the population after 6 years? Why is it NOT $1.03^5$? (2 steps)", "answer": "- Step 1: At $t = 0$ (the start), $n = 0$, so $u_0 = 2000$. After 6 years, $n = 6$, so $u_6 = 2000 \\times 1.03^6 \\approx 2390$.\n- Step 2: It's $1.03^6$ because \"after 6 years\" means 6 time periods have passed. The off-by-one error: if $t = 0$ is the first measurement, then \"after n years\" means power n, not n-1.\n\n**Takeaway:** Always match the subscript to the time elapsed. Read carefully: \"at t = 0\" vs \"after n years.\"", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "For the iteration formula $x_{n+1} = \\sqrt[3]{\\frac{5x_n^2 - 4x_n + 7}{x_n}}$, starting with $x_1 = 2$, how do you calculate $x_2$ using the ANS button on your calculator? (2 steps)", "answer": "- Step 1: Store 2 in your calculator and press =. This becomes ANS.\n- Step 2: Type: $\\sqrt[3]{(5 \\text{ANS}^2 - 4\\text{ANS} + 7) / \\text{ANS}}$ and press =. This gives $x_2 \\approx 2.1544$ (4 d.p.).\n\n**Takeaway:** NEVER retype the previous value—use ANS to avoid rounding errors that accumulate with each iteration.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "Using the Intermediate Value Theorem (Sign Change Theorem), show that $f(x) = x^4 - 5x^2 + 4x - 7 = 0$ has a root in the interval [2, 3]. What condition must you check? (2 steps)", "answer": "- Step 1: Evaluate at endpoints: $f(2) = 16 - 20 + 8 - 7 = -3 < 0$ and $f(3) = 81 - 45 + 12 - 7 = 41 > 0$.\n- Step 2: Since $f(x)$ is a polynomial, it's continuous on [2, 3]. Also, $f(2) \\cdot f(3) = (-3)(41) < 0$. By IVT, there exists $\\alpha \\in (2, 3)$ such that $f(\\alpha) = 0$.\n\n**Takeaway:** You must show BOTH continuity (automatic for polynomials) AND $f(a) \\cdot f(b) < 0$ (opposite signs).", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "For the exponential decay model $T = 10 + Ae^{-Bt}$, at $t = 0$, $T = 18^\\circ$C. At $t = 45$ minutes, $T = 16^\\circ$C. Find A and B. (3 steps)", "answer": "- Step 1: At $t = 0$: $18 = 10 + A \\cdot e^0 = 10 + A$, so $A = 8$. (Remember $e^0 = 1$, not 0!)\n- Step 2: At $t = 45$: $16 = 10 + 8e^{-45B}$, so $8e^{-45B} = 6$, giving $e^{-45B} = \\frac{3}{4}$.\n- Step 3: Take ln: $-45B = \\ln(\\frac{3}{4}) = -\\ln(\\frac{4}{3})$, so $B = \\frac{\\ln(4/3)}{45} \\approx 0.00639$ (3 s.f.).\n\n**Takeaway:** When the unknown is in the exponent, ALWAYS take natural logs (ln). Watch the sign: $\\ln(3/4)$ is negative.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "Why can the temperature $T = 10 + 8e^{-Bt}$ never fall to $5^\\circ$C, no matter how much time passes? (1 step)", "answer": "- As $t \\to \\infty$, $e^{-Bt} \\to 0$ (since B > 0). Therefore $T \\to 10 + 8(0) = 10^\\circ$C.\n- The exponential term is always positive ($e^{\\text{anything}} > 0$), so $T > 10$ for all finite t. The temperature approaches 10 from above but never reaches it.\n\n**Takeaway:** In $T = C + Ae^{-Bt}$, the horizontal asymptote is $T = C$ (the ambient/room temperature).", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "For $f(x) = 2e^{3\\sin x} \\cos x$, find the x-intercept in the interval $[0, 2\\pi]$. Explain your reasoning. (2 steps)", "answer": "- Step 1: Set $f(x) = 0$: $2e^{3\\sin x} \\cos x = 0$.\n- Step 2: Since $2e^{3\\sin x} > 0$ for all x (exponential is always positive), we must have $\\cos x = 0$.\n- In $[0, 2\\pi]$, $\\cos x = 0$ gives $x = \\frac{\\pi}{2}$ and $x = \\frac{3\\pi}{2}$. The intercept shown in the diagram is $R = (\\frac{\\pi}{2}, 0)$.\n\n**Takeaway:** When a product equals zero and one factor can NEVER be zero (like $e^{\\text{stuff}}$), the OTHER factor must be zero.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": true}, {"question": "Find the turning points of $f(x) = 2e^{3\\sin x} \\cos x$ by solving $f'(x) = 0$. Show the result leads to $3\\sin^2 x + \\sin x - 3 = 0$. (3 steps)", "answer": "- Step 1: Use product rule: let $u = 2e^{3\\sin x}$, $v = \\cos x$. Then $u' = 6\\cos x \\cdot e^{3\\sin x}$, $v' = -\\sin x$.\n- Step 2: $f'(x) = u'v + uv' = 6\\cos x e^{3\\sin x} \\cos x + 2e^{3\\sin x}(-\\sin x) = 2e^{3\\sin x}(3\\cos^2 x - \\sin x)$.\n- Step 3: Set $f'(x) = 0$. Since $2e^{3\\sin x} > 0$, we need $3\\cos^2 x - \\sin x = 0$. Using $\\cos^2 x = 1 - \\sin^2 x$: $3(1 - \\sin^2 x) - \\sin x = 0$, giving $3\\sin^2 x + \\sin x - 3 = 0$.\n\n**Takeaway:** ALWAYS factor out the positive exponential term first—it can never be zero!", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "Solve $3\\sin^2 x + \\sin x - 3 = 0$ to find the x-coordinates of the turning points. Which one corresponds to point Q (below the x-axis)? (3 steps)", "answer": "- Step 1: Treat as quadratic in $\\sin x$: $\\sin x = \\frac{-1 \\pm \\sqrt{1 + 36}}{6} = \\frac{-1 \\pm \\sqrt{37}}{6}$.\n- Step 2: Calculate: $\\frac{-1 + \\sqrt{37}}{6} \\approx \\frac{-1 + 6.083}{6} \\approx 0.847$ (valid, since $-1 \\leq \\sin x \\leq 1$). The other solution $\\approx -1.181$ is invalid.\n- Step 3: $\\sin x \\approx 0.847$ gives $x \\approx 1.012$ (1st quadrant, cos > 0, f > 0 → P) or $x \\approx \\pi - 1.012 \\approx 2.130$ (2nd quadrant, cos < 0, f < 0 → Q). So $x_Q \\approx 2.130$ (3 d.p.).\n\n**Takeaway:** After solving, substitute back into f(x) to determine which turning point is above vs below the x-axis.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "Differentiate $y = \\frac{16}{9(3x - k)} + x - \\frac{k}{3}$ with respect to x. What is $\\frac{dy}{dx}$ in terms of k? (2 steps)", "answer": "- Step 1: Rewrite as $y = \\frac{16}{9}(3x - k)^{-1} + x - \\frac{k}{3}$.\n- Step 2: Use chain rule: $\\frac{dy}{dx} = \\frac{16}{9} \\cdot (-1)(3x - k)^{-2} \\cdot 3 + 1 = 1 - \\frac{16}{3(3x - k)^2}$.\n\n**Takeaway:** When differentiating $(ax + b)^{-1}$, multiply by the inner derivative (a), giving $-a(ax + b)^{-2}$.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "Evaluate $\\int_1^3 \\frac{16}{9(3x - k)} dx$ where $k = \\frac{7}{3}$. Show the result is $\\lambda \\ln 10$ and find $\\lambda$. (3 steps)", "answer": "- Step 1: Apply $\\int \\frac{1}{ax+b} dx = \\frac{1}{a} \\ln|ax+b| + C$. Here $a = 3$, so:\n  $\\int \\frac{16}{9(3x - 7/3)} dx = \\frac{16}{9} \\cdot \\frac{1}{3} \\ln|3x - 7/3| = \\frac{16}{27} \\ln|3x - 7/3|$.\n- Step 2: Evaluate from 1 to 3:\n  $\\frac{16}{27}[\\ln|3(3) - 7/3| - \\ln|3(1) - 7/3|] = \\frac{16}{27}[\\ln(9 - 7/3) - \\ln(3 - 7/3)]$.\n- Step 3: Write over denominator 3: $9 = 27/3$, so $27/3 - 7/3 = 20/3$. Similarly $3 = 9/3$, so $9/3 - 7/3 = 2/3$.\n  $= \\frac{16}{27} \\ln\\left(\\frac{20/3}{2/3}\\right) = \\frac{16}{27} \\ln(10)$. So $\\lambda = \\frac{16}{27}$.\n\n**Takeaway:** Always write fractions with common denominators when integrating. DON'T forget the $\\frac{1}{a}$ factor!", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "For the function $y = a - |2x - b|$ where $a > b > 0$, find: (i) the maximum point, (ii) the y-intercept, (iii) the x-intercepts. (3 steps)", "answer": "- Step 1: Maximum point: the vertex of $|2x - b|$ is at $2x - b = 0$, so $x = b/2$. At this point, $|2x - b| = 0$, so $y = a$. Max = $(b/2, a)$.\n- Step 2: y-intercept at x = 0: $y = a - |-b| = a - b$. So point $(0, a - b)$ (positive since $a > b$).\n- Step 3: x-intercepts at y = 0: $|2x - b| = a$, so $2x - b = \\pm a$.\n  - $2x - b = a \\Rightarrow x = (a+b)/2$\n  - $2x - b = -a \\Rightarrow x = (b-a)/2$ (negative since $a > b$)\n\n**Takeaway:** The vertex of $|bx - c|$ is at $x = c/b$ (NOT c). Remember the factor of b!", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "Two graphs $y = |x + 1|$ and $y = a - |2x - b|$ intersect at x = -3 and x = 5. How do you determine which case (branch) to use for each intersection? (2 steps)", "answer": "- Step 1: At x = 5: since $5 > -1$, on $|x + 1|$ we're on the right branch ($x+1 \\geq 0$). Also $5 > b/2$, so on the inverted V we're on the descending (right) branch where $|2x - b| = 2x - b$.\n- Step 2: At x = -3: since $-3 < -1$, on $|x + 1|$ we're on the left branch ($x+1 < 0$), so $|x + 1| = -(x+1)$. Also $-3 < b/2$, so on the inverted V we're on the ascending (left) branch where $|2x - b| = -(2x - b) = b - 2x$.\n\n**Takeaway:** ALWAYS look at the graph to decide which case applies at each intersection point. The sign depends on the x-value relative to the vertices.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "Prove the identity $\\frac{3\\sin\\theta\\cos\\theta}{\\cos\\theta + \\sin\\theta} = (2 + \\sec 2\\theta)(\\cos\\theta - \\sin\\theta)$ leads to $3\\sin 2\\theta - 4\\cos 2\\theta = 2$. Show the key steps. (3 steps)", "answer": "- Step 1: Multiply both sides by $(\\cos\\theta + \\sin\\theta)$:\n  $3\\sin\\theta\\cos\\theta = (2 + \\sec 2\\theta)(\\cos\\theta - \\sin\\theta)(\\cos\\theta + \\sin\\theta)$.\n- Step 2: Note $(\\cos\\theta - \\sin\\theta)(\\cos\\theta + \\sin\\theta) = \\cos^2\\theta - \\sin^2\\theta = \\cos 2\\theta$ (difference of squares!).\n  So RHS = $(2 + \\sec 2\\theta)\\cos 2\\theta = 2\\cos 2\\theta + \\sec 2\\theta \\cdot \\cos 2\\theta = 2\\cos 2\\theta + 1$.\n- Step 3: LHS: $3\\sin\\theta\\cos\\theta = \\frac{3}{2}\\sin 2\\theta$. So $\\frac{3}{2}\\sin 2\\theta = 2\\cos 2\\theta + 1$. Multiply by 2: $3\\sin 2\\theta = 4\\cos 2\\theta + 2$, giving $3\\sin 2\\theta - 4\\cos 2\\theta = 2$.\n\n**Takeaway:** The key trick is $(\\cos\\theta + \\sin\\theta)(\\cos\\theta - \\sin\\theta) = \\cos 2\\theta$. Also, $\\sec 2\\theta \\cdot \\cos 2\\theta = 1$.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "Solve $3\\sin 2x - 4\\cos 2x = 2$ for $\\pi \\leq x \\leq \\frac{3\\pi}{2}$ using R-formula. What is the solution to 3 s.f.? (4 steps)", "answer": "- Step 1: Convert to R-form: $3\\sin 2x - 4\\cos 2x = R\\sin(2x - \\alpha)$ where $R\\cos\\alpha = 3$, $R\\sin\\alpha = 4$.\n  $R = \\sqrt{3^2 + 4^2} = 5$, $\\tan\\alpha = 4/3$, so $\\alpha \\approx 0.9273$ rad.\n- Step 2: Equation becomes $5\\sin(2x - 0.9273) = 2$, so $\\sin(2x - 0.9273) = 0.4$.\n- Step 3: Let $\\phi = 2x - 0.9273$. For $\\pi \\leq x \\leq 3\\pi/2$, $\\phi \\in [2\\pi - 0.9273, 3\\pi - 0.9273] \\approx [5.356, 8.497]$.\n- Step 4: $\\sin\\phi = 0.4$ gives $\\phi_0 = \\arcsin(0.4) \\approx 0.4115$. In this range, only $\\phi = 0.4115 + 2\\pi \\approx 6.695$ works.\n  $2x = 6.695 + 0.9273 = 7.622$, so $x \\approx 3.81$ (3 s.f.).\n\n**Takeaway:** After R-form conversion, find the general solutions for $\\phi$, then transform back to x, checking the range.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "Why must you use R-formula when solving equations like $3\\sin 2x - 4\\cos 2x = 2$? Why can't you solve it directly? (1 step)", "answer": "- The equation combines $\\sin 2x$ and $\\cos 2x$ with different coefficients. There's no simple angle whose sine or cosine equals this combination. R-form converts it into a single sine (or cosine) function, making it solvable using inverse trig functions.\n\n**Takeaway:** \"You must write in compact form\"—R-form is essential for solving mixed sine-cosine equations.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "Find the inverse function $g^{-1}(x)$ for $g(x) = 3 + 2\\ln x$, where $x \\geq 1$. What is the domain of $g^{-1}$? (2 steps)", "answer": "- Step 1: Let $y = 3 + 2\\ln x$. Solve for x: $y - 3 = 2\\ln x$, so $\\ln x = \\frac{y-3}{2}$, giving $x = e^{(y-3)/2}$.\n- Step 2: Swap x and y: $g^{-1}(x) = e^{(x-3)/2}$. The domain of $g^{-1}$ equals the range of $g$. Since $g(1) = 3$ and $\\ln x$ increases, $g(x) \\geq 3$. So domain is $[3, \\infty)$.\n\n**Takeaway:** To find inverse: set y = f(x), solve for x, then swap x ↔ y. The domain of $f^{-1}$ is the range of $f$.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "Prove that $f(x) = \\frac{2x}{3x-5}$ is decreasing for $x > 2$ using calculus. What must you show? (2 steps)", "answer": "- Step 1: Differentiate using quotient rule: $f'(x) = \\frac{2(3x-5) - 2x \\cdot 3}{(3x-5)^2} = \\frac{6x - 10 - 6x}{(3x-5)^2} = \\frac{-10}{(3x-5)^2}$.\n- Step 2: For $x > 2$, we have $3x - 5 > 0$, so $(3x-5)^2 > 0$ always. The numerator is $-10 < 0$. Therefore $f'(x) < 0$ for all $x > 2$.\n\n**Takeaway:** To prove decreasing: show $f'(x) < 0$ for ALL x in the domain (not just at one point!).", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": true}, {"question": "For $g(f(a)) = 5$ where $g(x) = 3 + 2\\ln x$ and $f(x) = \\frac{2x}{3x-5}$, find the exact value of a. (3 steps)", "answer": "- Step 1: $g(f(a)) = 3 + 2\\ln\\left(\\frac{2a}{3a-5}\\right) = 5$.\n- Step 2: So $2\\ln\\left(\\frac{2a}{3a-5}\\right) = 2$, giving $\\ln\\left(\\frac{2a}{3a-5}\\right) = 1$.\n- Step 3: Exponentiate: $\\frac{2a}{3a-5} = e$. So $2a = 3ea - 5e$, giving $a(2 - 3e) = -5e$, so $a = \\frac{5e}{3e-2}$.\n\n**Takeaway:** Remember $g(f(a))$ means apply f first, then g (inside-out). Solve by working from the outside in.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "What is the difference between $\\int \\frac{1}{x} dx$ and $\\int \\frac{1}{ax+b} dx$? Write both results. (1 step)", "answer": "- $\\int \\frac{1}{x} dx = \\ln|x| + C$ (a = 1 case)\n- $\\int \\frac{1}{ax+b} dx = \\frac{1}{a} \\ln|ax+b| + C$\n\nThe key difference is the $\\frac{1}{a}$ factor in the second case. This is the most common integration error in P3.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "When simplifying $f(x) = \\frac{2x^2 - 32}{3x^2 + 7x - 20} + \\frac{8}{3x-5}$, what is the first step and why? (2 steps)", "answer": "- Step 1: Factorise both the numerator and denominator:\n  $2x^2 - 32 = 2(x-4)(x+4)$\n  $3x^2 + 7x - 20 = (3x-5)(x+4)$\n- Step 2: Then $\\frac{2(x-4)(x+4)}{(3x-5)(x+4)} = \\frac{2(x-4)}{3x-5}$ (cancelling the $(x+4)$ factor, valid since $x > 2$ means $x \\neq -4$).\n\n**Takeaway:** ALWAYS factorise first before trying to combine fractions. Trying to find a common denominator without factoring creates a mess.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "A student evaluates $\\int \\frac{1}{3x+2} dx$ and writes $\\ln|3x+2| + C$. What is wrong and what is the correct answer? (1 step)", "answer": "- The student forgot the $\\frac{1}{a}$ factor. Since $a = 3$, the correct answer is $\\frac{1}{3}\\ln|3x+2| + C$.\n- Alternatively, let $u = 3x + 2$, then $du = 3dx$, so $dx = \\frac{1}{3}du$, giving $\\int \\frac{1}{u} \\cdot \\frac{1}{3} du = \\frac{1}{3}\\ln|u| + C$.\n\n**Takeaway:** The derivative of $\\ln(3x+2)$ is $\\frac{3}{3x+2} = \\frac{1}{x + 2/3}$, not $\\frac{1}{3x+2}$!", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "In the sign change method for finding roots, why is it not sufficient to just evaluate $f(2) = -3$ and $f(3) = 41$ and conclude there's a root? What else must you state? (1 step)", "answer": "- You must state that $f(x)$ is continuous on the interval [2, 3]. For polynomials, this is always true (they're continuous everywhere). For other functions, you may need to justify continuity.\n- Then by the Intermediate Value Theorem, since $f(2) < 0$ and $f(3) > 0$ (opposite signs), there exists a root between 2 and 3.\n\n**Takeaway:** The theorem requires continuity + opposite signs. Don't skip stating continuity!", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "For the iteration $x_{n+1} = g(x_n)$, what determines whether the iteration will converge to the root? (1 step)", "answer": "- The iteration converges if $|g'(\\alpha)| < 1$ at the root $\\alpha$, and diverges if $|g'(\\alpha)| > 1$.\n- If $|g'(\\alpha)| = 1$, the behavior is uncertain (may oscillate).\n\n**Takeaway:** When rearranging $f(x) = 0$ to $x = g(x)$, check $|g'(\\alpha)| < 1$ for convergence.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "In the two-modulus problem, a student solves $|x+1| = a - |2x-b|$ at x = 5 and gets $5 + 1 = a - (10 - b)$, giving $a + b = 16$. Is this correct? What case did they use? (1 step)", "answer": "- Yes, this is correct for the positive-positive case. At x = 5: since $5 > -1$, we use $|x+1| = x + 1 = 6$. Also, since $5 > b/2$, we're on the right branch of the inverted V, so $|2x - b| = 2x - b = 10 - b$.\n- So $6 = a - (10 - b) \\Rightarrow a + b = 16$.\n\n**Takeaway:** Always check the graph to determine which case applies at each intersection point.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "A student tries to solve $\\sin x = 0.5$ in the range $0 \\leq x \\leq 2\\pi$ and writes only $x = \\frac{\\pi}{6}$. Why is this incomplete? (1 step)", "answer": "- $\\sin x = 0.5$ has TWO solutions in $0 \\leq x \\leq 2\\pi$: $x = \\frac{\\pi}{6}$ (1st quadrant) and $x = \\frac{5\\pi}{6}$ (2nd quadrant).\n- The general solution is $x = n\\pi + (-1)^n \\cdot \\frac{\\pi}{6}$, or equivalently $x = \\frac{\\pi}{6} + 2n\\pi$ or $x = \\frac{5\\pi}{6} + 2n\\pi$.\n\n**Takeaway:** Always find ALL solutions in the given range. Sine is positive in QI and QII.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "When solving $x^3 = \\frac{5x^2 - 4x + 7}{x}$ to get an iteration formula, why do we divide by x? What would happen if we didn't? (2 steps)", "answer": "- Step 1: We want the iteration to produce $x$ on the left after taking the cube root. Currently we have $x^4$ on the left. To reduce the power, divide by $x$.\n- Step 2: Dividing by $x$ gives $x^3 = \\frac{5x^2 - 4x + 7}{x}$. Taking cube root: $x = \\sqrt[3]{\\frac{5x^2 - 4x + 7}{x}}$. This is the desired $x = g(x)$ form.\n- If we didn't divide, we'd have $x = \\sqrt[4]{5x^2 - 4x + 7}$, which is a different (and less useful) iteration.\n\n**Takeaway:** Look at the target form. If it has $\\sqrt[3]{\\dots}$, you need $x^3$ inside after rearrangement.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": true}, {"question": "For $y = a - |2x - b|$, if $a = 12$ and $b = 4$, what are the exact coordinates of the vertex, y-intercept, and x-intercepts? (3 steps)", "answer": "- Step 1: Vertex: at $2x - b = 0$, so $x = b/2 = 4/2 = 2$. At vertex, $y = a = 12$. So vertex = $(2, 12)$.\n- Step 2: y-intercept at x = 0: $y = 12 - |-4| = 12 - 4 = 8$. So $(0, 8)$.\n- Step 3: x-intercepts at y = 0: $|2x - 4| = 12$, so $2x - 4 = \\pm 12$.\n  - $2x - 4 = 12 \\Rightarrow 2x = 16 \\Rightarrow x = 8$\n  - $2x - 4 = -12 \\Rightarrow 2x = -8 \\Rightarrow x = -4$\n  So intercepts at $(8, 0)$ and $(-4, 0)$.\n\n**Takeaway:** With specific values, you can find exact coordinates. Remember the vertex is at $x = b/2$, not b!", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "A student makes the following error: $\\int \\frac{16}{9(3x - 7/3)} dx = \\frac{16}{9} \\ln|3x - 7/3|$. What is the mistake and what is the correct answer? (2 steps)", "answer": "- Step 1: The student forgot the $\\frac{1}{a}$ factor. Here $a = 3$ (coefficient of x), so we must divide by 3.\n- Step 2: Correct answer: $\\int \\frac{16}{9(3x - 7/3)} dx = \\frac{16}{9} \\cdot \\frac{1}{3} \\ln|3x - 7/3| = \\frac{16}{27} \\ln|3x - 7/3| + C$.\n\n**Takeaway:** The 16/9 is a constant multiplier, but the 1/3 comes from the integration formula for 1/(ax+b).", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}, {"question": "Explain why $\\tan x = -2 - \\sqrt{3}$ has a solution at $x = 105^\\circ$. How would you find other solutions in $0^\\circ \\leq x < 180^\\circ$? (2 steps)", "answer": "- Step 1: $\\tan 105^\\circ = \\tan(180^\\circ - 75^\\circ) = -\\tan 75^\\circ$. Since $\\tan 75^\\circ = 2 + \\sqrt{3}$, we have $\\tan 105^\\circ = -(2 + \\sqrt{3}) = -2 - \\sqrt{3}$.\n- Step 2: Tangent is negative in QII and QIV. In $0^\\circ \\leq x < 180^\\circ$, we have solutions where $\\tan x = -2 - \\sqrt{3}$: $x = 105^\\circ$ (QII) and $x = 180^\\circ + 105^\\circ = 285^\\circ$, but $285^\\circ > 180^\\circ$, so only $105^\\circ$ in this range. However, using the period of $\\tan$ (180°), we also get $x = 105^\\circ - 180^\\circ = -75^\\circ$ (not in range). Actually, another solution comes from $\\tan x = \\tan(105^\\circ)$, so $x = 105^\\circ + 180^\\circ = 285^\\circ$ (out of range). Wait—the other solution in range is found by: if $\\tan x = \\tan 105^\\circ$, then $x = 105^\\circ + n \\cdot 180^\\circ$. For $0 \\leq x < 180$: $105^\\circ$ works, $105^\\circ - 180^\\circ = -75^\\circ$ doesn't. But also consider the reference angle: if $\\tan \\theta = 2 + \\sqrt{3}$, then $\\theta = 75^\\circ$, so $\\tan(180^\\circ - 75^\\circ) = -\\tan 75^\\circ = -2 - \\sqrt{3}$. So solutions are $x = 105^\\circ$ and... also at $105^\\circ - 180^\\circ = -75^\\circ$ (not valid). Wait—in range $0$ to $180$, there's only $x = 105^\\circ$ for positive values... Actually, let's reconsider: $\\tan x = \\tan 105^\\circ$ means $x = 105^\\circ + n \\cdot 180^\\circ$. For $0 \\leq x < 180$, we have $105^\\circ$ (when $n = 0$). When $n = -1$, we get $-75^\\circ$ which is outside. So only ONE solution in this range? But recall $\\tan$ is negative in QII ($90^\\circ$ to $180^\\circ$), so there should be exactly one solution in $0$ to $180$ where $\\tan x = -2 - \\sqrt{3}$, which is $105^\\circ$.\n\n**Takeaway:** In $0$ to $180$ degrees, $\\tan x$ is positive in QI ($0$ to $90^\\circ$) and negative in QII ($90^\\circ$ to $180^\\circ$). For a negative tangent value, there's exactly ONE solution in this range.", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "Why is it incorrect to solve $\\int_1^3 \\frac{1}{x} dx$ by writing $\\ln|3| - \\ln|1| = \\ln 3$ and then incorrectly simplifying to $\\ln(3/1) = \\ln 3$? Is this correct? (1 step)", "answer": "- Actually, this IS correct! $\\ln|3| - \\ln|1| = \\ln(3/1) = \\ln 3$ is perfectly valid because $\\ln|1| = \\ln 1 = 0$.\n- The more general principle $\\ln A - \\ln B = \\ln(A/B)$ is correct. However, a common error is NOT combining the logs when asked to find $\\lambda$ in $\\lambda \\ln 10$ form—you must combine first!\n\n**Takeaway:** $\\ln A - \\ln B = \\ln(A/B)$ is always true. Use it to combine logs before reading off coefficients.", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": false}, {"question": "A student writes $y = \\frac{1}{2}|f(x)|$ transforms the point $(-4, -3)$ to $(-4, 1.5)$. Explain this transformation step by step. (2 steps)", "answer": "- Step 1: First, take the absolute value of the y-coordinate: $-3 \\rightarrow 3$ (reflects any part below the x-axis above it).\n- Step 2: Then multiply by 1/2: $3 \\rightarrow 3 \\times \\frac{1}{2} = 1.5$ (vertical compression by factor 1/2).\n- So the final point is $(-4, 1.5)$.\n\n**Takeaway:** When there's a modulus outside $f(x)$ (like $|f(x)|$), it only affects the y-values. When it's $f(|x|)$, it only affects x-values.", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "For the compound angle equation $\\sqrt{2}\\sin(x+45^\\circ) = \\cos(x-60^\\circ)$, show that this leads to $\\tan x = -2 - \\sqrt{3}$. What is the key insight? (3 steps)", "answer": "- Step 1: Use the compound angle formula: $\\cos(x - 60^\\circ) = \\cos x \\cos 60^\\circ + \\sin x \\sin 60^\\circ = \\frac{1}{2}\\cos x + \\frac{\\sqrt{3}}{2}\\sin x$.\n- Step 2: Also $\\sqrt{2}\\sin(x+45^\\circ) = \\sqrt{2}(\\sin x \\cos 45^\\circ + \\cos x \\sin 45^\\circ) = \\sqrt{2}(\\frac{\\sqrt{2}}{2}\\sin x + \\frac{\\sqrt{2}}{2}\\cos x) = \\sin x + \\cos x$.\n- Step 3: Equating: $\\sin x + \\cos x = \\frac{1}{2}\\cos x + \\frac{\\sqrt{3}}{2}\\sin x$. Rearranging: $\\sin x - \\frac{\\sqrt{3}}{2}\\sin x = \\frac{1}{2}\\cos x - \\cos x$, giving $(1 - \\frac{\\sqrt{3}}{2})\\sin x = -\\frac{1}{2}\\cos x$. So $\\tan x = \\frac{-\\frac{1}{2}}{1 - \\frac{\\sqrt{3}}{2}} = \\frac{-1}{2 - \\sqrt{3}} = \\frac{-1}{2 - \\sqrt{3}} \\cdot \\frac{2 + \\sqrt{3}}{2 + \\sqrt{3}} = \\frac{-(2 + \\sqrt{3})}{4 - 3} = -2 - \\sqrt{3}$.\n\n**Takeaway:** The trick is converting both sides to $\\sin x$ and $\\cos x$ terms, then dividing by $\\cos x$ to get $\\tan x$.", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": false}, {"question": "Given the solution to part (a) is $\\tan x = -2 - \\sqrt{3}$, how do you solve $\\sqrt{2}\\sin(2\\theta) = \\cos(2\\theta - 105^\\circ)$ for $0 \\leq \\theta < 180^\\circ$? (2 steps)", "answer": "- Step 1: Let $x + 45^\\circ = 2\\theta$, so $x = 2\\theta - 45^\\circ$. Then $x - 60^\\circ = 2\\theta - 105^\\circ$.\n- Step 2: The equation becomes identical to part (a): $\\sqrt{2}\\sin(x+45^\\circ) = \\cos(x-60^\\circ)$. We know this gives $\\tan x = -2 - \\sqrt{3} = \\tan 105^\\circ$.\n  So $x = 105^\\circ + n \\cdot 180^\\circ$. Substituting back: $2\\theta - 45^\\circ = 105^\\circ + 180^\\circ n$.\n  For $n = 0$: $2\\theta = 150^\\circ \\Rightarrow \\theta = 75^\\circ$.\n  For $n = 1$: $2\\theta = 330^\\circ \\Rightarrow \\theta = 165^\\circ$.\n  Both are in $0 \\leq \\theta < 180^\\circ$.\n\n**Takeaway:** The key insight is recognizing the substitution $x + 45^\\circ = 2\\theta$ makes the equations identical.", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": false}, {"question": "When finding the range of the composite function $f \\circ g$ where $g(x) = \\frac{6x-2}{2x+1}$ and $f(x) = 2 + 5\\ln x$, what is the first step? (2 steps)", "answer": "- Step 1: Find the range of $g(x)$ FIRST. This is a rational function. Since it's a linear fractional function, find any asymptotes and turning points.\n- Step 2: For $g(x) = \\frac{6x-2}{2x+1}$, the horizontal asymptote is $y = \\frac{6}{2} = 3$ (as $x \\to \\infty$). The vertical asymptote is at $x = -\\frac{1}{2}$. For $x > -\\frac{1}{2}$ (the domain), $g(x)$ ranges from $3$ (approached from below) down to... actually, let's check: as $x \\to -\\frac{1}{2}^+$, denominator $\\to 0^+$, so $g(x) \\to -\\infty$. So the range is $(-\\infty, 3)$.\n\nWait—the notes say the range is $(0, 3)$. Let me recalculate: Actually, for $x > -\\frac{1}{2}$ (which is the domain for the composite to work with $\\ln x$), we need $g(x) > 0$ for $\\ln(g(x))$ to be defined. Find where $g(x) = 0$: $6x - 2 = 0 \\Rightarrow x = \\frac{1}{3}$. For $x > \\frac{1}{3}$, $g(x) > 0$. As $x \\to \\frac{1}{3}^+$, $g(x) \\to 0^+$. As $x \\to \\infty$, $g(x) \\to 3^-$. So the range of $g$ (for $x > \\frac{1}{3}$) is $(0, 3)$.\n\n- Step 3: Then the range of $f \\circ g$ is $f(\\text{range of }g) = f((0, 3)) = (2 + 5\\ln 0^+, 2 + 5\\ln 3) = (-\\infty, 2 + 5\\ln 3)$.\n\n**Takeaway:** For composite functions, ALWAYS find the range of the inner function first, then apply the outer function to that range.", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": false}, {"question": "A student says \"for $y = f(ax)$, the horizontal stretch scale factor is a.\" Explain why this is wrong and what the correct scale factor is. (1 step)", "answer": "- This is incorrect. For $y = f(ax)$, the horizontal stretch scale factor is $\\frac{1}{a}$, NOT $a$.\n- Reason: If $f(x)$ has a point at $(x, y)$, then $f(ax)$ requires $ax = x_{old}$, so $x_{new} = \\frac{x_{old}}{a}$. This compresses toward the y-axis by factor $a$, which is equivalent to a stretch by factor $\\frac{1}{a}$.\n\n**Takeaway:** The scale factor is the reciprocal of the coefficient. $y = f(ax)$ → horizontal scale $\\frac{1}{a}$; $y = af(x)$ → vertical scale $a$.", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": true}, {"question": "When asked to prove a function is increasing using calculus, what is wrong with the following approach: \"At x = 3, f'(3) = 2 > 0, so f is increasing\"? (1 step)", "answer": "- This is incorrect! Proving a function is increasing/decreasing requires showing $f'(x) > 0$ (or $< 0$) for ALL x in the domain, not just at one point.\n- The correct approach: differentiate, simplify the expression, then show it's positive (or negative) for all x in the domain using inequalities or sign analysis.\n\n**Takeaway:** \"Prove increasing\" means \"show $f'(x) > 0$ for ALL x in the domain\"—one point is never sufficient.", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": false}, {"question": "In the population model $u_n = a \\cdot b^n$, if $u_4 = 3690$ and $u_7 = 3470$, a student writes $a b^4 = 3690$ and $a b^7 = 3470$. Another student divides to get $b^3 = \\frac{3470}{3690}$ and then writes $a = \\frac{3690}{b^3}$. Is this correct? What error might occur? (2 steps)", "answer": "- Step 1: This is correct. Dividing: $\\frac{u_7}{u_4} = \\frac{a b^7}{a b^4} = b^3 = \\frac{3470}{3690}$, giving $b \\approx 0.98$. Then $a = \\frac{3690}{b^4} = \\frac{3690}{0.98^4} \\approx 4000$.\n- Step 2: The potential error: writing $a = \\frac{3690}{b^3}$ instead of $b^4$. Always check the subscript in the original equation—if it's $a b^4 = 3690$, divide by $b^4$, not $b^3$!\n\n**Takeaway:** The power in the denominator must match the subscript. $u_4$ means power 4, $u_7$ means power 7.", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": false}, {"question": "For $f(x) = 2e^{3\\sin x} \\cos x$, a student sets $f'(x) = 0$ and tries to solve $6\\cos^2 x e^{3\\sin x} - 2\\sin x e^{3\\sin x} = 0$ directly. Why is this difficult and what should they do first? (1 step)", "answer": "- They should factor out the $2e^{3\\sin x}$ term FIRST. Since $e^{3\\sin x} > 0$ always (exponential is always positive), it can never be zero and can be factored out:\n  $f'(x) = 2e^{3\\sin x}(3\\cos^2 x - \\sin x) = 0$\n- Now set $3\\cos^2 x - \\sin x = 0$ (much simpler!). Trying to solve the unfactored version leads to a messy equation.\n\n**Takeaway:** ALWAYS factor out $e^{\\text{anything}}$ first when differentiating products involving exponentials—it can NEVER be zero!", "source": "MiniMax ①", "_id": "minimax_1_49", "judge_pick": false}], "count": 50}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "Solve the inequality $2|x-5| + 10 > 6x$ algebraically using case-split. What are the two cases and their valid regions? (3 steps)", "answer": "- Step 1: Identify the boundary point where the expression inside the modulus changes sign: $x - 5 = 0$, so $x = 5$.\n- Step 2: Case 1 — when $x \\geq 5$ (so $|x-5| = x-5$):\n  $2(x-5) + 10 > 6x \\Rightarrow 2x > 6x \\Rightarrow x < 0$. Combined with $x \\geq 5$: **no solution**.\n- Step 3: Case 2 — when $x < 5$ (so $|x-5| = 5-x$):\n  $2(5-x) + 10 > 6x \\Rightarrow 20 - 2x > 6x \\Rightarrow x < \\frac{5}{2}$. Combined with $x < 5$: **$x < \\frac{5}{2}$**.\n\n*Always check each solution lies in its declared case region.*", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "For a transformation $y = 3f(x-2)$, how do you transform the point $P(5, 10)$? Explain the order of operations. (2 steps)", "answer": "- Step 1: The transformation $f(x-2)$ means \"replace $x$ with $x-2$\", which shifts the graph **right by 2** (inside → horizontal, opposite direction). So $x$: $5 \\rightarrow 5+2 = 7$.\n- Step 2: The coefficient 3 outside ($3f(\\dots)$) multiplies the output, causing a **vertical stretch by factor 3**. So $y$: $10 \\rightarrow 3 \\times 10 = 30$.\n\nThe image of $P$ is $(7, 30)$.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "What is the rule for deciding between polynomial division and partial fractions when simplifying $\\frac{2x^2 - 5x + 8}{x-2}$? (1 step)", "answer": "- Compare the degree of the numerator ($\\deg = 2$) with the degree of the denominator ($\\deg = 1$):\n  - If $\\deg(\\text{num}) \\geq \\deg(\\text{den})$ → **polynomial division first**, then partial fractions on the remainder.\n  - If $\\deg(\\text{num}) < \\deg(\\text{den})$ → **partial fractions directly**.\n\nSince $2 \\geq 1$, we must use polynomial division here.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "After performing polynomial division on $g(x) = \\frac{2x^2 - 5x + 8}{x-2}$, you obtain $g(x) = 2x - 1 + \\frac{6}{x-2}$. Evaluate $\\int_4^8 g(x) \\, dx$. (4 steps)", "answer": "- Step 1: Integrate term by term:\n$$\\int (2x - 1) \\, dx = x^2 - x$$\n$$\\int \\frac{6}{x-2} \\, dx = 6 \\ln|x-2|$$\n(Remember: $\\int \\frac{1}{ax+b} \\, dx = \\frac{1}{a} \\ln|ax+b|$; here $a=1$, so just $\\ln|x-2|$.)\n\n- Step 2: Apply the limits:\n$$[x^2 - x + 6\\ln|x-2|]_4^8$$\n\n- Step 3: Evaluate at bounds:\nAt $x=8$: $64 - 8 + 6\\ln 6 = 56 + 6\\ln 6$\nAt $x=4$: $16 - 4 + 6\\ln 2 = 12 + 6\\ln 2$\n\n- Step 4: Subtract and simplify using $\\ln A - \\ln B = \\ln(A/B)$:\n$$(56 + 6\\ln 6) - (12 + 6\\ln 2) = 44 + 6\\ln\\left(\\frac{6}{2}\\right) = 44 + 6\\ln 3$$\n\nSo $\\int_4^8 g(x) \\, dx = 44 + 6\\ln 3$, giving $\\alpha = 44$, $\\beta = 6$.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": true}, {"question": "Write $y = 10^6 x^{-3}$ in the form for a log-log graph, and state the gradient and intercepts. (2 steps)", "answer": "- Step 1: Take $\\log_{10}$ of both sides:\n$$\\log_{10} y = \\log_{10}(10^6) + \\log_{10}(x^{-3}) = 6 - 3\\log_{10} x$$\n\nThis is of the form $Y = mX + c$ where $Y = \\log_{10} y$, $X = \\log_{10} x$, $m = -3$, $c = 6$.\n\n- Step 2: Read off features:\n  - Gradient $= -3$\n  - $Y$-intercept (at $X=0$): $Y = 6$ → point $(0, 6)$\n  - $X$-intercept (at $Y=0$): $0 = -3X + 6 \\Rightarrow X = 2$ → point $(2, 0)$", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "Given $\\log_3 N = 2t + 4$, express $N$ in the form $N = ab^t$. What are $a$ and $b$? (2 steps)", "answer": "- Step 1: Raise base 3 to both sides (inverse operation):\n$$N = 3^{2t+4} = 3^4 \\cdot 3^{2t}$$\n\n- Step 2: Rewrite $3^{2t}$ as $(3^2)^t = 9^t$:\n$$N = 81 \\cdot 9^t$$\n\nSo $a = 81$, $b = 9$.\n\n*Key insight:* Split $3^{2t}$ as $(3^2)^t$ to match the $ab^t$ form.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "For the function $f(x) = 8\\sin x \\cos x + 4\\cos^2 x - 3$, write in the form $f(x) = a\\sin 2x + b\\cos 2x + c$. What are $a, b, c$? (3 steps)", "answer": "- Step 1: Use double-angle identities:\n$$8\\sin x \\cos x = 4 \\cdot (2\\sin x \\cos x) = 4\\sin 2x$$\n$$4\\cos^2 x = 4 \\cdot \\frac{1}{2}(1 + \\cos 2x) = 2 + 2\\cos 2x$$\n\n- Step 2: Substitute:\n$$f(x) = 4\\sin 2x + 2 + 2\\cos 2x - 3 = 4\\sin 2x + 2\\cos 2x - 1$$\n\n- Step 3: Read off coefficients:\n$$a = 4, \\quad b = 2, \\quad c = -1$$\n\n*Which $\\cos 2x$ identity to use?* When you see $\\cos^2 x$, use $\\cos^2 x = \\frac{1}{2}(1 + \\cos 2x)$ to introduce $\\cos 2x$.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "Convert $4\\sin 2x + 2\\cos 2x - 1$ into R-form: $R\\sin(2x + \\alpha) + c$ with $R > 0$, $0 < \\alpha < \\frac{\\pi}{2}$. Find $R$ and $\\alpha$ to 3 s.f. (3 steps)", "answer": "- Step 1: Set up the matching equation:\n$$R\\sin(2x + \\alpha) = R\\sin 2x \\cos \\alpha + R\\cos 2x \\sin \\alpha$$\n\nCompare coefficients with $4\\sin 2x + 2\\cos 2x$:\n$$R\\cos \\alpha = 4, \\quad R\\sin \\alpha = 2$$\n\n- Step 2: Find $R$:\n$$R^2 = 4^2 + 2^2 = 16 + 4 = 20 \\Rightarrow R = \\sqrt{20} = 2\\sqrt{5} \\approx 4.472$$\n\n- Step 3: Find $\\alpha$:\n$$\\tan \\alpha = \\frac{2}{4} = \\frac{1}{2} \\Rightarrow \\alpha = \\arctan(0.5) \\approx 0.464 \\text{ rad}$$\n\nSo $f(x) = 2\\sqrt{5} \\sin(2x + 0.464) - 1$.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": true}, {"question": "For $f(x) = R\\sin(2x + \\alpha) + c$, what is the maximum value and at what $x$ does it occur? (2 steps)", "answer": "- Step 1: Since $\\sin(\\text{anything}) \\leq 1$ always, the maximum value is:\n$$\\max f(x) = R \\cdot 1 + c = R + c$$\n\n- Step 2: Maximum occurs when $\\sin(2x + \\alpha) = 1$, i.e.:\n$$2x + \\alpha = \\frac{\\pi}{2} + 2n\\pi, \\quad n \\in \\{0, 1, 2, \\dots\\}$$\n\nSo $x = \\frac{\\pi/2 - \\alpha}{2} + n\\pi$.\n\nSimilarly, minimum $= -R + c$ when $\\sin(2x + \\alpha) = -1$.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "The equation $\\sqrt{2}\\sin(x+45^\\circ) = \\cos(x-60^\\circ)$ can be shown to give $\\tan x = -2 - \\sqrt{3}$. How do you then solve $\\sqrt{2}\\sin(2\\theta) = \\cos(2\\theta - 105^\\circ)$ for $0 \\leq \\theta < 180^\\circ$? (3 steps)", "answer": "- Step 1: Let $x + 45^\\circ = 2\\theta$, so $x = 2\\theta - 45^\\circ$. Then:\n$$x - 60^\\circ = (2\\theta - 45^\\circ) - 60^\\circ = 2\\theta - 105^\\circ$$\n\nThis matches the given form perfectly.\n\n- Step 2: From the first equation, $\\tan x = -2 - \\sqrt{3} = \\tan 105^\\circ$. So:\n$$\\tan(2\\theta - 45^\\circ) = \\tan 105^\\circ$$\n\n- Step 3: General solution: $2\\theta - 45^\\circ = 105^\\circ + 180^\\circ n$:\n$$2\\theta = 150^\\circ + 180^\\circ n \\Rightarrow \\theta = 75^\\circ + 90^\\circ n$$\n\nFor $0 \\leq \\theta < 180^\\circ$: when $n = 0$, $\\theta = 75^\\circ$; when $n = 1$, $\\theta = 165^\\circ$. Both are valid.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "Let $f(x) = x^4 - 5x^2 + 4x - 7$. Show there is a root in the interval [2, 3] using the sign change theorem. (2 steps)", "answer": "- Step 1: Evaluate $f(x)$ at the interval endpoints:\n$$f(2) = 2^4 - 5(2)^2 + 4(2) - 7 = 16 - 20 + 8 - 7 = -3 < 0$$\n$$f(3) = 3^4 - 5(3)^2 + 4(3) - 7 = 81 - 45 + 12 - 7 = 41 > 0$$\n\n- Step 2: Since $f(x)$ is a polynomial, it is continuous on $[2, 3]$. Also, $f(2) \\cdot f(3) < 0$ (negative × positive). By the Intermediate Value Theorem, there exists at least one $\\alpha \\in (2, 3)$ such that $f(\\alpha) = 0$.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "The equation $x^4 - 5x^2 + 4x - 7 = 0$ is rearranged to $x = \\sqrt[3]{\\frac{5x^2 - 4x + 7}{x}}$. Starting with $x_1 = 2$, find $x_2$ to 4 decimal places using iteration. (2 steps)", "answer": "- Step 1: Use the ANS button on your calculator:\n  - Enter 2, press = (this stores $x_1 = 2$ as ANS)\n  - Type: $\\sqrt[3]{(5 \\times \\text{ANS}^2 - 4 \\times \\text{ANS} + 7) / \\text{ANS}}$\n  - Press = repeatedly\n\n- Step 2: The values converge:\n$$x_1 = 2.0000$$\n$$x_2 = 2.1544 \\text{ (4 d.p.)}$$\n$$x_3 = 2.1459$$\n$$x_4 = 2.1474$$\n$$x_5 = 2.1471$$\n$$x_6 = 2.1472$$\n$$x_7 = 2.1472$$\n\nSo $x_2 \\approx 2.1544$ (4 d.p.), and the root $\\alpha \\approx 2.1472$ (4 d.p.).\n\n*Why use ANS?* Re-typing numbers introduces rounding errors. ANS preserves the full calculator precision.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "A population model is given by $u_n = 2000 \\times 1.03^n$ where $n$ represents years after $t = 0$. What is $u_6$? Explain the common off-by-one error. (2 steps)", "answer": "- Step 1: At $t = 0$, we have $u_0 = 2000$. After 6 years (i.e., $t = 6$), we need the term with power 6:\n$$u_6 = 2000 \\times 1.03^6 \\approx 2000 \\times 1.19405 \\approx \\mathbf{2390} \\text{ (3 s.f.)}$$\n\n- Step 2: *The common mistake:* Using $1.03^5$ instead of $1.03^6$. This happens when students confuse \"after 6 years\" with \"the 6th term.\" If $n = 0$ at the start, then after $n$ years, the power is $n$, not $n-1$.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "Given $u_4 = a b^4 = 3690$ and $u_7 = a b^7 = 3470$, find $a$ and $b$. Explain why $b^4$, not $b^3$, appears in the calculation. (3 steps)", "answer": "- Step 1: Divide the two equations to eliminate $a$:\n$$\\frac{u_7}{u_4} = \\frac{a b^7}{a b^4} = b^3 = \\frac{3470}{3690}$$\n\n- Step 2: Solve for $b$:\n$$b^3 = \\frac{3470}{3690} \\approx 0.94 \\Rightarrow b \\approx 0.98$$\n\n- Step 3: Use $u_4 = a b^4 = 3690$ to find $a$:\n$$a = \\frac{3690}{b^4} = \\frac{3690}{0.98^4} = \\frac{3690}{0.9224} \\approx \\mathbf{4000}$$\n\n*Why $b^4$?* Because $u_4$ means $n = 4$, so the term is $a \\cdot b^4$, not $a \\cdot b^3$. Always match the subscript to the power.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": true}, {"question": "For the model $\\log_{10} D = 1.04 + 0.38T$, write $D$ in the form $D = ab^T$ with $a, b$ to 4 s.f. (2 steps)", "answer": "- Step 1: Raise base 10 to both sides:\n$$D = 10^{1.04 + 0.38T} = 10^{1.04} \\cdot 10^{0.38T}$$\n\n- Step 2: Rewrite $10^{0.38T}$ as $(10^{0.38})^T$:\n$$D = 10^{1.04} \\cdot (10^{0.38})^T$$\n\nCalculate: $10^{1.04} \\approx 10.96$, $10^{0.38} \\approx 2.399$\n\nSo $D \\approx \\mathbf{10.96} \\times \\mathbf{2.399}^T$.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "The temperature of an object follows $T = 10 + 8e^{-Bt}$. At $t = 45$ minutes, $T = 16^\\circ$C. Find $B$ to 3 s.f. (3 steps)", "answer": "- Step 1: Substitute the known values:\n$$16 = 10 + 8e^{-45B} \\Rightarrow 8e^{-45B} = 6 \\Rightarrow e^{-45B} = \\frac{3}{4}$$\n\n- Step 2: Take natural logs:\n$$-45B = \\ln\\left(\\frac{3}{4}\\right) = -\\ln\\left(\\frac{4}{3}\\right)$$\n\n- Step 3: Solve for $B$:\n$$B = \\frac{\\ln(4/3)}{45} \\approx \\frac{0.28768}{45} \\approx \\mathbf{0.00639} \\text{ (3 s.f.)}$$\n\n*Common mistake:* Writing $B = \\ln(3/4)/45$ without the negative sign — this gives a negative $B$. Use $\\ln(4/3)$ to keep $B$ positive.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "In the exponential decay model $T = 10 + 8e^{-Bt}$, why can the temperature never fall to $5^\\circ$C? (1 step)", "answer": "- As $t \\to \\infty$, the exponential term $e^{-Bt} \\to 0$ (since $B > 0$). Therefore:\n$$T \\to 10 + 8 \\times 0 = 10^\\circ\\text{C}$$\n\nSince $e^{-Bt} > 0$ for all finite $t$, we have $T = 10 + 8e^{-Bt} > 10$ for all $t$. The temperature approaches $10^\\circ$C asymptotically from above but can never reach or drop below $10^\\circ$C, let alone $5^\\circ$C.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "Find the turning points of $f(x) = 2e^{3\\sin x}\\cos x$ for $0 \\leq x \\leq 2\\pi$. Show the derivative leads to $3\\sin^2 x + \\sin x - 3 = 0$. (4 steps)", "answer": "- Step 1: Differentiate using the product rule. Let $u = 2e^{3\\sin x}$, $v = \\cos x$:\n$$u' = 2 \\cdot e^{3\\sin x} \\cdot 3\\cos x = 6\\cos x \\, e^{3\\sin x}$$\n$$v' = -\\sin x$$\n\n- Step 2: Apply product rule:\n$$f'(x) = u'v + uv' = 6\\cos x \\, e^{3\\sin x} \\cdot \\cos x + 2e^{3\\sin x} \\cdot (-\\sin x)$$\n$$= 2e^{3\\sin x}(3\\cos^2 x - \\sin x)$$\n\n- Step 3: Set $f'(x) = 0$. Since $2e^{3\\sin x} > 0$ always (exponential is always positive), we need:\n$$3\\cos^2 x - \\sin x = 0$$\n\n- Step 4: Use $\\cos^2 x = 1 - \\sin^2 x$:\n$$3(1 - \\sin^2 x) - \\sin x = 0$$\n$$3 - 3\\sin^2 x - \\sin x = 0$$\n$$3\\sin^2 x + \\sin x - 3 = 0$$\n\nThis is a quadratic in $\\sin x$ with $a = 3, b = 1, c = -3$.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "From the turning point equation $3\\sin^2 x + \\sin x - 3 = 0$, find the valid $\\sin x$ value, and hence find the $x$-coordinate of the turning point $Q$ (below the $x$-axis) to 3 d.p. (3 steps)", "answer": "- Step 1: Solve the quadratic:\n$$\\sin x = \\frac{-1 \\pm \\sqrt{1 + 36}}{6} = \\frac{-1 \\pm \\sqrt{37}}{6}$$\n\nTwo solutions: $\\sin x \\approx \\frac{-1 + 6.083}{6} \\approx 0.847$ and $\\sin x \\approx \\frac{-1 - 6.083}{6} \\approx -1.181$.\n\n- Step 2: Reject $\\sin x \\approx -1.181$ because $|\\sin x| \\leq 1$.\n\nSo $\\sin x \\approx 0.847$, giving $x \\approx \\arcsin(0.847) \\approx 1.012$ rad or $x \\approx \\pi - 1.012 \\approx 2.130$ rad.\n\n- Step 3: Determine which is $Q$ (below the $x$-axis). Substitute into $f(x) = 2e^{3\\sin x}\\cos x$:\n- At $x \\approx 1.012$: $\\cos x > 0$ → $f(x) > 0$ → this is $P$ (above $x$-axis).\n- At $x \\approx 2.130$: $\\cos x < 0$ → $f(x) < 0$ → this is $Q$ (below $x$-axis).\n\nSo $x_Q \\approx \\mathbf{2.130}$ (3 d.p.).", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": true}, {"question": "For the curve $y = \\frac{16}{9(3x - k)} + x - \\frac{k}{3}$ with $k > 0$, find $\\frac{dy}{dx}$ in simplest form. (2 steps)", "answer": "- Step 1: Rewrite with negative exponent:\n$$y = \\frac{16}{9}(3x - k)^{-1} + x - \\frac{k}{3}$$\n\n- Step 2: Differentiate using chain rule:\n$$\\frac{dy}{dx} = \\frac{16}{9} \\cdot (-1)(3x - k)^{-2} \\cdot 3 + 1 = 1 - \\frac{16 \\cdot 3}{9(3x - k)^2} = \\mathbf{1 - \\frac{16}{3(3x - k)^2}}$$\n\n*Key:* Remember the chain rule factor — differentiate the inside $(3x - k)$ which gives 3.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "Evaluate $\\int_1^3 \\frac{16}{9(3x - 7/3)} \\, dx$ and express the answer in the form $\\lambda \\ln 10$. Find $\\lambda$. (4 steps)", "answer": "- Step 1: Factor out the constant:\n$$I = \\frac{16}{9} \\int_1^3 \\frac{1}{3x - 7/3} \\, dx$$\n\n- Step 2: Apply the integration template $\\int \\frac{1}{ax+b} \\, dx = \\frac{1}{a} \\ln|ax+b|$ with $a = 3$:\n$$I = \\frac{16}{9} \\cdot \\frac{1}{3} [\\ln|3x - 7/3|]_1^3 = \\frac{16}{27} [\\ln|3x - 7/3|]_1^3$$\n\n- Step 3: Evaluate at the limits. Write all terms over 3:\n$$x = 3: \\quad 3(3) - 7/3 = 9 - 7/3 = 27/3 - 7/3 = 20/3$$\n$$x = 1: \\quad 3(1) - 7/3 = 3 - 7/3 = 9/3 - 7/3 = 2/3$$\n\n- Step 4: Compute:\n$$I = \\frac{16}{27} \\left( \\ln\\frac{20}{3} - \\ln\\frac{2}{3} \\right) = \\frac{16}{27} \\ln\\left(\\frac{20/3}{2/3}\\right) = \\frac{16}{27} \\ln 10$$\n\nSo $\\lambda = \\frac{16}{27}$.\n\n*Critical reminder:* Don't forget the $\\frac{1}{a}$ factor! Here $a = 3$, so divide by 3.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "For the function $y = a - |2x - b|$ with $a > b > 0$, find: (i) the coordinates of the maximum point, (ii) the $y$-intercept, (iii) the $x$-intercepts. (3 steps)", "answer": "- Step 1: Maximum point — occurs at the vertex where $2x - b = 0$, i.e., $x = b/2$. At this point, $|2x - b| = 0$, so $y = a$. Maximum = $(b/2, a)$.\n\n- Step 2: $y$-intercept at $x = 0$:\n$$y = a - |2(0) - b| = a - |-b| = a - b$$\nSo $(0, a - b)$. This is positive since $a > b$.\n\n- Step 3: $x$-intercepts where $y = 0$:\n$$a - |2x - b| = 0 \\Rightarrow |2x - b| = a$$\nSo $2x - b = \\pm a$:\n- If $2x - b = a$: $x = \\frac{a+b}{2}$ (positive intercept)\n- If $2x - b = -a$: $x = \\frac{b-a}{2}$ (negative intercept, since $a > b$)", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "The graphs $y = |x + 1|$ and $y = a - |2x - b|$ intersect at $x = -3$ and $x = 5$. Using the graph to decide branches, find $a$ and $b$. (4 steps)", "answer": "- Step 1: At $x = 5$: $y = |5 + 1| = 6$. Since $x = 5 > -1$, we're on the right branch of $|x + 1|$, so $|x + 1| = x + 1$. For $y = a - |2x - b|$, at $x = 5$ we're past the vertex (which is at $x = b/2 > 0$), so we use the right descending branch: $|2x - b| = 2x - b$.\nEquation: $6 = a - (2(5) - b) = a - 10 + b$, so $a + b = 16$. **(Eqn 1)**\n\n- Step 2: At $x = -3$: $y = |-3 + 1| = |-2| = 2$. Since $x = -3 < -1$, we're on the left branch of $|x + 1|$, so $|x + 1| = -(x + 1) = -x - 1$. Also $x = -3$ is left of the vertex, so we use the left ascending branch: $|2x - b| = -(2x - b) = b - 2x$.\nEquation: $2 = a - (b - 2(-3)) = a - b + 6$, so $a - b = 8$. **(Eqn 2)**\n\n- Step 3: Solve simultaneously:\n- Add: $2a = 24 \\Rightarrow a = 12$\n- Subtract: $2b = 8 \\Rightarrow b = 4$\n\n- Step 4: Verify $a > b > 0$: $12 > 4 > 0$ ✓", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "Show that $\\frac{3\\sin\\theta\\cos\\theta}{\\cos\\theta + \\sin\\theta} = (2 + \\sec 2\\theta)(\\cos\\theta - \\sin\\theta)$ leads to the equation $3\\sin 2\\theta - 4\\cos 2\\theta = 2$. (4 steps)", "answer": "- Step 1: Multiply both sides by $(\\cos\\theta + \\sin\\theta)$:\n$$3\\sin\\theta\\cos\\theta = (2 + \\sec 2\\theta)(\\cos\\theta - \\sin\\theta)(\\cos\\theta + \\sin\\theta)$$\n\n- Step 2: Use difference of squares on the right:\n$$(\\cos\\theta - \\sin\\theta)(\\cos\\theta + \\sin\\theta) = \\cos^2\\theta - \\sin^2\\theta = \\cos 2\\theta$$\n\nSo: $3\\sin\\theta\\cos\\theta = (2 + \\sec 2\\theta)\\cos 2\\theta = 2\\cos 2\\theta + \\sec 2\\theta \\cdot \\cos 2\\theta$\n\n- Step 3: Since $\\sec 2\\theta \\cdot \\cos 2\\theta = 1$:\n$$3\\sin\\theta\\cos\\theta = 2\\cos 2\\theta + 1$$\n\n- Step 4: Use $\\sin\\theta\\cos\\theta = \\frac{1}{2}\\sin 2\\theta$:\n$$\\frac{3}{2}\\sin 2\\theta = 2\\cos 2\\theta + 1$$\nMultiply by 2:\n$$3\\sin 2\\theta = 4\\cos 2\\theta + 2$$\nRearrange:\n$$3\\sin 2\\theta - 4\\cos 2\\theta = 2$$", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "Solve $3\\sin 2x - 4\\cos 2x = 2$ for $\\pi \\leq x \\leq \\frac{3\\pi}{2}$, giving the answer to 3 s.f. (4 steps)", "answer": "- Step 1: Convert to R-form: $3\\sin 2x - 4\\cos 2x = R\\sin(2x - \\alpha)$ where:\n$$R = \\sqrt{3^2 + (-4)^2} = \\sqrt{9 + 16} = 5$$\n$$\\tan \\alpha = \\frac{4}{3} \\Rightarrow \\alpha \\approx 0.9273 \\text{ rad}$$\n\nSo: $5\\sin(2x - 0.9273) = 2 \\Rightarrow \\sin(2x - 0.9273) = 0.4$\n\n- Step 2: Let $\\phi = 2x - 0.9273$. For $\\pi \\leq x \\leq 3\\pi/2$:\n$$\\phi \\in [\\pi - 0.9273, 3\\pi/2 - 0.9273] = [2.214, 4.356]$$Wait — more precisely:\n$$x = \\pi \\Rightarrow \\phi = 2\\pi - 0.9273 \\approx 5.356$$\n$$x = 3\\pi/2 \\Rightarrow \\phi = 3\\pi - 0.9273 \\approx 8.497$$\n\n- Step 3: Solve $\\sin \\phi = 0.4$. The principal solution is $\\phi_0 = \\arcsin(0.4) \\approx 0.4115$.\nGeneral solutions: $\\phi = 0.4115 + 2n\\pi$ or $\\phi = \\pi - 0.4115 + 2n\\pi$.\n\n- Step 4: Find which solutions lie in $[5.356, 8.497]$:\n- $n = 0$: $\\phi = 0.4115$ (too small), $\\phi = 2.730$ (too small)\n- $n = 1$: $\\phi = 0.4115 + 2\\pi \\approx 6.695$ ✓; $\\phi = 2.730 + 2\\pi \\approx 9.013$ (too big)\n\nSo $\\phi \\approx 6.695$:\n$$2x - 0.9273 = 6.695 \\Rightarrow 2x = 7.622 \\Rightarrow x \\approx 3.81 \\text{ rad}$$\n\nCheck: $\\pi \\approx 3.142$, $3\\pi/2 \\approx 4.712$, so $3.81$ is in the range. Answer: $x \\approx \\mathbf{3.81}$ (3 s.f.).", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": true}, {"question": "For $g(x) = 3 + 2\\ln x$ with domain $x \\geq 1$, find $g^{-1}(x)$ and its domain. (3 steps)", "answer": "- Step 1: Let $y = g(x) = 3 + 2\\ln x$. Swap $x$ and $y$:\n$$x = 3 + 2\\ln y$$\n\n- Step 2: Solve for $y$:\n$$x - 3 = 2\\ln y \\Rightarrow \\ln y = \\frac{x-3}{2} \\Rightarrow y = e^{(x-3)/2}$$\n\n- Step 3: So $g^{-1}(x) = e^{(x-3)/2}$.\nThe domain of $g^{-1}$ equals the range of $g$. Since $g(1) = 3 + 2\\ln 1 = 3$ and $g$ is increasing for $x \\geq 1$ (since $\\frac{d}{dx}(2\\ln x) = 2/x > 0$), the range of $g$ is $[3, \\infty)$.\n\nTherefore, domain of $g^{-1}$ is $[3, \\infty)$.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "Given $f(x) = \\frac{2x^2 - 32}{3x^2 + 7x - 20} + \\frac{8}{3x - 5}$ with $x > 2$, show that $f(x) = \\frac{2x}{3x - 5}$. (3 steps)", "answer": "- Step 1: Factor both numerators and denominators:\n$$2x^2 - 32 = 2(x^2 - 16) = 2(x-4)(x+4)$$\n$$3x^2 + 7x - 20 = (3x - 5)(x + 4)$$\n\n- Step 2: Rewrite the first fraction:\n$$\\frac{2(x-4)(x+4)}{(3x-5)(x+4)} = \\frac{2(x-4)}{3x-5}$$\n(Cancel $(x+4)$, valid since $x > 2$ so $x+4 \\neq 0$.)\n\n- Step 3: Add the second fraction:\n$$f(x) = \\frac{2(x-4)}{3x-5} + \\frac{8}{3x-5} = \\frac{2(x-4) + 8}{3x-5} = \\frac{2x - 8 + 8}{3x-5} = \\frac{2x}{3x-5}$$", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "Prove that $f(x) = \\frac{2x}{3x - 5}$ is decreasing for $x > 2$ using calculus. (2 steps)", "answer": "- Step 1: Differentiate using the quotient rule. Let $u = 2x$, $v = 3x - 5$:\n$$u' = 2, \\quad v' = 3$$\n$$f'(x) = \\frac{u'v - uv'}{v^2} = \\frac{2(3x-5) - 2x(3)}{(3x-5)^2} = \\frac{6x - 10 - 6x}{(3x-5)^2} = \\frac{-10}{(3x-5)^2}$$\n\n- Step 2: Analyze the sign. For $x > 2$, the denominator $(3x-5)^2 > 0$ (square of non-zero number). The numerator is $-10 < 0$. Therefore:\n$$f'(x) = \\frac{-10}{(3x-5)^2} < 0 \\text{ for all } x > 2$$\n\nSince $f'(x) < 0$ for the entire domain, $f$ is a decreasing function.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "Find the exact value of $a$ for which $g(f(a)) = 5$, given $g(x) = 3 + 2\\ln x$ and $f(x) = \\frac{2x}{3x - 5}$. (3 steps)", "answer": "- Step 1: First find $f(a)$:\n$$f(a) = \\frac{2a}{3a - 5}$$\n\n- Step 2: Apply $g$:\n$$g(f(a)) = 3 + 2\\ln\\left(\\frac{2a}{3a - 5}\\right) = 5$$\n\n- Step 3: Solve:\n$$2\\ln\\left(\\frac{2a}{3a - 5}\\right) = 2 \\Rightarrow \\ln\\left(\\frac{2a}{3a - 5}\\right) = 1$$\n$$\\frac{2a}{3a - 5} = e^1 = e$$\n$$2a = 3ea - 5e \\Rightarrow a(2 - 3e) = -5e \\Rightarrow a = \\frac{5e}{3e - 2}$$", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "What are the four forms of the R-formula? For each form, state the conversion and how to find $R$ and $\\alpha$. (2 steps)", "answer": "- Step 1: The four forms are:\n| Form | Conversion | $R$ | $\\alpha$ |\n| $a\\sin x + b\\cos x$ | $R\\sin(x + \\alpha)$ | $\\sqrt{a^2 + b^2}$ | $\\tan\\alpha = b/a$ |\n| $a\\sin x - b\\cos x$ | $R\\sin(x - \\alpha)$ | $\\sqrt{a^2 + b^2}$ | $\\tan\\alpha = b/a$ |\n| $a\\cos x + b\\sin x$ | $R\\cos(x - \\alpha)$ | $\\sqrt{a^2 + b^2}$ | $\\tan\\alpha = b/a$ |\n| $a\\cos x - b\\sin x$ | $R\\cos(x + \\alpha)$ | $\\sqrt{a^2 + b^2}$ | $\\tan\\alpha = b/a$ |\n\n- Step 2: In all cases, $R = \\sqrt{a^2 + b^2}$ and $\\tan\\alpha = b/a$ with $0 < \\alpha < \\frac{\\pi}{2}$. The key is matching the signs: the term after $\\sin$/$\\cos$ tells you whether it's + or - $\\alpha$.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "In iteration, what is the \"ANS button technique\" and why is it important? (1 step)", "answer": "- When using the iterative formula $x_{n+1} = g(x_n)$ on a calculator:\n1. Enter the initial value $x_1$ and press = (this stores it as ANS).\n2. Type the formula using ANS instead of re-typing the number.\n3. Press = repeatedly to generate successive approximations.\n\n*Why it matters:* Re-typing numbers introduces rounding errors at each step. Using ANS preserves the full calculator precision (typically 12-15 digits) through each iteration, giving faster and more accurate convergence.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "When simplifying $\\frac{2x^2 - 5x + 8}{x - 2}$ using polynomial division, the result is $2x - 1 + \\frac{6}{x-2}$. How do you verify that $C = 6$ is correct? (1 step)", "answer": "- Multiply both sides by the divisor $(x-2)$:\n$$(2x - 1)(x-2) + 6 = 2x^2 - 4x - x + 2 + 6 = 2x^2 - 5x + 8$$\n\nThis matches the original numerator exactly, confirming that the remainder $C = 6$ is correct. The general check is: $(\\text{quotient}) \\times (\\text{divisor}) + \\text{remainder} = \\text{numerator}$.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": true}, {"question": "For the graph transformation $y = \\frac{1}{2}|f(x)|$, how does the point $P(-4, -3)$ transform? (2 steps)", "answer": "- Step 1: First apply the modulus: $y = |f(x)|$ reflects any part below the $x$-axis above it. The $y$-coordinate $-3$ becomes $|-3| = 3$. So after this step: $(-4, 3)$.\n\n- Step 2: Then apply the factor $\\frac{1}{2}$: this multiplies the $y$-value by $\\frac{1}{2}$. So $3 \\rightarrow \\frac{1}{2} \\times 3 = 1.5$.\n\nFinal image: $(-4, 1.5)$ or $(-4, \\frac{3}{2})$.\n\n*Order matters:* Work from the innermost transformation outward — first $|f(x)|$, then the $\\frac{1}{2}$ factor.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "Why is it incorrect to say that in the exponential model $T = 10 + 8e^{-Bt}$, as $t \\to \\infty$, the temperature will eventually reach $5^\\circ$C? (1 step)", "answer": "- The exponential term $e^{-Bt}$ is always positive for any finite $t$ (since $e^{\\text{anything}} > 0$). It never becomes zero — it just gets infinitely close to zero as $t \\to \\infty$.\n\nTherefore, $T = 10 + 8 \\times (\\text{positive number}) > 10$ for all finite $t$. The temperature approaches $10^\\circ$C asymptotically but never reaches it. The horizontal asymptote is $T = 10$, not any lower value.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "In the function $f(x) = 2e^{3\\sin x}\\cos x$, why can we set $3\\cos^2 x - \\sin x = 0$ directly when finding turning points, without considering the exponential factor? (1 step)", "answer": "- The exponential function $e^{3\\sin x}$ is always positive for all real $x$ (since the exponential of any real number is positive). Specifically, $2e^{3\\sin x} > 0$ always.\n\nWhen solving $f'(x) = 0$, we have:\n$$f'(x) = 2e^{3\\sin x}(3\\cos^2 x - \\sin x) = 0$$\n\nSince $2e^{3\\sin x} > 0$ can never be zero, the only way for the product to be zero is if the other factor is zero:\n$$3\\cos^2 x - \\sin x = 0$$\n\nThis is a key principle: **if a product equals zero and one factor can never be zero, the other factor must be zero.**", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "For the transformation $y = f(2x)$, how does the point $P(-4, -3)$ transform? Explain why the $x$-coordinate is halved. (2 steps)", "answer": "- Step 1: The transformation $y = f(2x)$ replaces $x$ with $2x$. To find what happens to a point on the original graph, we solve: if $(X, Y)$ is on $y = f(2x)$, then $Y = f(2X)$. For this to equal $f(x_0)$ where $(x_0, Y)$ is on the original $y = f(x)$, we need $2X = x_0$.\n\n- Step 2: So if $P = (-4, -3)$ is on $y = f(x)$, then on $y = f(2x)$, the corresponding point has $x$-coordinate $X$ where $2X = -4$, giving $X = -2$. The $y$-coordinate stays the same (since we apply $f$ to the same value).\n\nThis is a **horizontal stretch with scale factor $\\frac{1}{2}$** — all $x$-coordinates are halved.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "When solving $\\frac{3\\sin x\\cos x}{\\cos x + \\sin x} = (2 + \\sec 2x)(\\cos x - \\sin x)$, why is it valid to multiply both sides by $(\\cos x + \\sin x)$ even when $\\cos x + \\sin x = 0$? (1 step)", "answer": "- In the original equation, the denominator $\\cos x + \\sin x$ cannot be zero (otherwise the left-hand side is undefined). So we are implicitly assuming $\\cos x + \\sin x \\neq 0$ for any valid solution.\n\nWhen we multiply by $(\\cos x + \\sin x)$, we are performing algebraic manipulation to transform the equation. However, any solutions that would make $\\cos x + \\sin x = 0$ are not valid solutions to the original equation anyway, so we don't need to worry about introducing extraneous solutions from this step.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "In the quadratic $3\\sin^2 x + \\sin x - 3 = 0$ from the turning points, one root $\\sin x = \\frac{-1 - \\sqrt{37}}{6}$ is rejected. Why? (1 step)", "answer": "- The sine function has the range $-1 \\leq \\sin x \\leq 1$ for all real $x$. Computing the rejected root:\n$$\\frac{-1 - \\sqrt{37}}{6} \\approx \\frac{-1 - 6.083}{6} \\approx \\frac{-7.083}{6} \\approx -1.181$$\n\nThis value is less than $-1$, which is impossible for $\\sin x$. Therefore, this root must be discarded as extraneous — it arose from squaring during the derivation but doesn't correspond to any actual angle $x$.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "For the modulus inequality $|2x - 5| > 6x$, what are the two cases and how do you determine the valid regions? (3 steps)", "answer": "- Step 1: The boundary is at $2x - 5 = 0$, i.e., $x = 2.5$. This divides the number line into two regions.\n\n- Step 2: Case 1 — when $2x - 5 \\geq 0$ (i.e., $x \\geq 2.5$):\n$$|2x - 5| = 2x - 5$$\nSo $2x - 5 > 6x \\Rightarrow -5 > 4x \\Rightarrow x < -1.25$\nCombined with $x \\geq 2.5$: **no solution**.\n\n- Step 3: Case 2 — when $2x - 5 < 0$ (i.e., $x < 2.5$):\n$$|2x - 5| = -(2x - 5) = 5 - 2x$$\nSo $5 - 2x > 6x \\Rightarrow 5 > 8x \\Rightarrow x < 0.625$\nCombined with $x < 2.5$: **$x < 0.625$**.\n\n*Always check each solution against its case condition.*", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}, {"question": "In the integration $\\int \\frac{16}{9(3x - 7/3)} \\, dx$, explain why we divide by 3 (the coefficient of $x$) when applying the formula. (1 step)", "answer": "- The general formula is:\n$$\\int \\frac{1}{ax + b} \\, dx = \\frac{1}{a} \\ln|ax + b| + C$$\n\nThis comes from the chain rule in reverse. Let $u = ax + b$, then $du = a \\, dx$, so:\n$$\\int \\frac{1}{ax + b} \\, dx = \\int \\frac{1}{u} \\cdot \\frac{du}{a} = \\frac{1}{a} \\int \\frac{1}{u} \\, du = \\frac{1}{a} \\ln|u| + C$$\n\nThe factor $\\frac{1}{a}$ is essential. In our integral, $a = 3$, so we multiply by $\\frac{1}{3}$ (or equivalently, divide the whole integral by 3).", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "In question Q8 of Paper 3, when finding the $x$-intercepts of $y = a - |2x - b|$, why do we get two intercepts at $\\frac{a+b}{2}$ and $\\frac{b-a}{2}$? (2 steps)", "answer": "- Step 1: Setting $y = 0$:\n$$a - |2x - b| = 0 \\Rightarrow |2x - b| = a$$\n\n- Step 2: The definition of modulus gives two cases:\n- If $2x - b = a$ (positive case): $2x = a + b \\Rightarrow x = \\frac{a+b}{2}$ (this is the positive intercept since $a > b > 0$)\n- If $2x - b = -a$ (negative case): $2x = b - a \\Rightarrow x = \\frac{b-a}{2}$ (this is negative since $b < a$)\n\nThe two intercepts are symmetric about the vertex at $x = b/2$, which lies midway between them.", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": false}, {"question": "When solving $3\\sin 2x - 4\\cos 2x = 2$ using R-formula, why must we check which solutions lie in the given range? (1 step)", "answer": "- The equation $\\sin \\phi = 0.4$ has infinitely many solutions: $\\phi = 0.4115 + 2n\\pi$ or $\\phi = \\pi - 0.4115 + 2n\\pi$ for any integer $n$.\n\nWhen a restricted domain (like $\\pi \\leq x \\leq 3\\pi/2$) is specified, only some of these infinite solutions fall within the corresponding range of $\\phi$. We must find which specific $\\phi$ values satisfy the transformed inequality and then convert back to find $x$.\n\nMissing this step leads to extraneous solutions outside the required domain.", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "For the function $g(x) = 3 + 2\\ln x$ with domain $x \\geq 1$, state the range of $g$ and explain how you found it. (2 steps)", "answer": "- Step 1: Find the minimum value. At the left endpoint $x = 1$:\n$$g(1) = 3 + 2\\ln(1) = 3 + 2(0) = 3$$\n\n- Step 2: Since $g'(x) = \\frac{2}{x} > 0$ for all $x \\geq 1$, $g$ is strictly increasing. Therefore, as $x$ increases without bound, $g(x) \\to \\infty$.\n\nHence the range of $g$ is $[3, \\infty)$.", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": false}, {"question": "In the algebraic fraction simplification $f(x) = \\frac{2(x-4)(x+4)}{(3x-5)(x+4)} + \\frac{8}{3x-5}$, why can we cancel $(x+4)$ but must be careful about the domain? (1 step)", "answer": "- We can cancel $(x+4)$ algebraically because $\\frac{(x+4)}{(x+4)} = 1$ for any $x \\neq -4$. However, the original function has restrictions:\n- The denominator $3x^2 + 7x - 20 = (3x-5)(x+4)$ cannot be zero, so $x \\neq \\frac{5}{3}$ and $x \\neq -4$.\n- Also, the problem states $x > 2$, which already excludes both $x = -4$ and $x = \\frac{5}{3}$.\n\nSince the domain is given as $x > 2$, the cancellation is valid for all $x$ in the domain, and we don't introduce any extraneous restrictions.", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}, {"question": "What is the difference between solving $\\log_{10} D = 1.04 + 0.38T$ for $D$ versus solving for $T$ when $D = 45000$? (2 steps)", "answer": "- Step 1: To find $D$ in the form $ab^T$ (the \"line → equation\" direction):\n  - Raise 10 to both sides: $D = 10^{1.04 + 0.38T} = 10^{1.04} \\cdot (10^{0.38})^T$\n  - This is the \"model building\" direction.\n\n- Step 2: To find $T$ when $D = 45000$ (the \"equation → unknown in exponent\" direction):\n  - Substitute $D = 45000$: $\\log_{10} 45000 = 1.04 + 0.38T$\n  - Then $T = \\frac{\\log_{10} 45000 - 1.04}{0.38}$\n  - This is the \"solve for the exponent\" direction — always take logs when the unknown is in the exponent.", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": true}, {"question": "For $f(x) = x^4 - 5x^2 + 4x - 7$, explain why we can divide by $x$ when rearranging to $x^3 = \\frac{5x^2 - 4x + 7}{x}$ for iteration. (1 step)", "answer": "- We are looking for a root $\\alpha$ in the interval [2, 3] (as established by the sign change theorem). Since $\\alpha \\in [2, 3]$, we know $\\alpha \\neq 0$.\n\nTherefore, dividing by $x$ is valid because we are only considering $x$ values away from zero. The iteration formula $x = \\sqrt[3]{\\frac{5x^2 - 4x + 7}{x}}$ will converge to the root in [2, 3], and at no point during the iteration will we actually hit $x = 0$.", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": false}, {"question": "In the transformation $y = 3f(x-1)$, how do you transform the point $P(-4, -3)$? Explain why we shift right first. (2 steps)", "answer": "- Step 1: The transformation $f(x-1)$ is \"replace $x$ with $x-1$\". This shifts the graph **right by 1**. To find the new $x$-coordinate: if $x_{old} = -4$ on the original graph, then on the transformed graph we need $x_{new} - 1 = -4$, so $x_{new} = -3$.\n\n- Step 2: Then the coefficient 3 multiplies the output: $-3 \\times 3 = -9$.\n\nSo the image is $(-3, -9)$.\n\n*Order:* Read the transformation from inside to outside. $f(x-1)$ applies first (shift right), then the multiplication by 3 applies (vertical stretch).", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": false}, {"question": "When finding the inverse of $g(x) = 3 + 2\\ln x$, why do we swap $x$ and $y$ after solving for $y$? (1 step)", "answer": "- By definition, if $y = g(x)$, then the inverse function $g^{-1}$ satisfies $g^{-1}(y) = x$. So we start with $x = 3 + 2\\ln y$ and solve for $y$ to express the inverse in terms of the input variable.\n\nAfter solving, we have $y = e^{(x-3)/2}$. To write this as $g^{-1}(x)$, we simply rename the dummy variable $y$ back to $g^{-1}(x)$:\n$$g^{-1}(x) = e^{(x-3)/2}$$\n\nSwapping $x$ and $y$ is the systematic way to \"solve for the original input\" and express the result as a function of the new input.", "source": "MiniMax ②", "_id": "minimax_2_47", "judge_pick": false}, {"question": "For the turning point question with $f(x) = 2e^{3\\sin x}\\cos x$, how do you determine which root of $\\sin x \\approx 0.847$ gives point $P$ (above $x$-axis) versus $Q$ (below $x$-axis)? (2 steps)", "answer": "- Step 1: The equation $\\sin x \\approx 0.847$ has two solutions in $[0, 2\\pi]$:\n- $x \\approx 1.012$ rad (first quadrant, $\\cos x > 0$)\n- $x \\approx \\pi - 1.012 \\approx 2.130$ rad (second quadrant, $\\cos x < 0$)\n\n- Step 2: Substitute each into the original function $f(x) = 2e^{3\\sin x}\\cos x$:\n- At $x \\approx 1.012$: $\\cos x > 0$, so $f(x) > 0$ → this is $P$ (above $x$-axis)\n- At $x \\approx 2.130$: $\\cos x < 0$, so $f(x) < 0$ → this is $Q$ (below $x$-axis)\n\nThe sign of $\\cos x$ in each quadrant determines whether the turning point is above or below the $x$-axis.", "source": "MiniMax ②", "_id": "minimax_2_48", "judge_pick": false}, {"question": "In the exponential decay model $T = 10 + A e^{-Bt}$, explain why we cannot find $A$ if $T(0)$ is not given. (1 step)", "answer": "- At $t = 0$, the exponential term $e^{-B \\cdot 0} = e^0 = 1$ (not 0!). So:\n$$T(0) = 10 + A \\cdot 1 = 10 + A$$\n\nIf we don't know $T(0)$, we have one equation with two unknowns ($A$ and $B$). We need both $T(0)$ and another point (like $T(45) = 16$) to solve for both parameters. With only one data point, $A$ remains undetermined.", "source": "MiniMax ②", "_id": "minimax_2_49", "judge_pick": false}, {"question": "What is the \"act with respect to the answer\" technique demonstrated in the trig identity question? (1 step)", "answer": "- In the question $\\frac{3\\sin\\theta\\cos\\theta}{\\cos\\theta + \\sin\\theta} = (2 + \\sec 2\\theta)(\\cos\\theta - \\sin\\theta)$, the target was to show it equals $3\\sin 2\\theta - 4\\cos 2\\theta = 2$.\n\nThe technique means: **look at what form the answer is in** (here, terms in $2\\theta$) and work backwards or sideways to introduce those forms:\n- Convert $\\sin\\theta\\cos\\theta \\rightarrow \\frac{1}{2}\\sin 2\\theta$\n- Convert $(\\cos\\theta + \\sin\\theta)(\\cos\\theta - \\sin\\theta) \\rightarrow \\cos^2\\theta - \\sin^2\\theta \\rightarrow \\cos 2\\theta$\n- Recognize $\\sec 2\\theta \\cdot \\cos 2\\theta = 1$\n\nThis is \"reverse engineering\" the solution from the target form.", "source": "MiniMax ②", "_id": "minimax_2_50", "judge_pick": false}, {"question": "For the graph $y = a - |2x - b|$ with $a > b > 0$, sketch the graph and explain why the maximum always occurs at $x = b/2$. (1 step)", "answer": "- The graph is an inverted V-shape (like $|2x-b|$ reflected in the $x$-axis and shifted up by $a$).\n\nInside the modulus, $2x - b = 0$ when $x = b/2$. At this point, $|2x - b| = 0$, so $y = a - 0 = a$ (the maximum).\n\nFor any $x \\neq b/2$, we have $|2x - b| > 0$, so $y = a - (\\text{positive}) < a$. The vertex is always at $(b/2, a)$ regardless of the values of $a$ and $b$ (as long as $a > b > 0$).", "source": "MiniMax ②", "_id": "minimax_2_51", "judge_pick": false}, {"question": "In the iteration process, what does it mean for the method to \"converge\" and how do you know when to stop? (2 steps)", "answer": "- Step 1: The iteration $x_{n+1} = g(x_n)$ converges if the values $x_1, x_2, x_3, \\dots$ get closer and closer to the actual root. Mathematically, this requires $|g'(\\alpha)| < 1$ at the root $\\alpha$.\n\n- Step 2: In practice, you stop when consecutive values agree to the required number of decimal places. For example, if you need the answer to 4 d.p. and you get $x_6 = 2.1472$ and $x_7 = 2.1472$, they agree to 4 d.p. — stop here. The answer is $2.1472$.", "source": "MiniMax ②", "_id": "minimax_2_52", "judge_pick": false}, {"question": "Why is it necessary to show that $f(x)$ is continuous on $[2, 3]$ when applying the sign change theorem to prove a root exists? (1 step)", "answer": "- The Intermediate Value Theorem (sign change theorem) states: *If $f$ is continuous on $[a, b]$ and $f(a) \\cdot f(b) < 0$, then there exists at least one $c \\in (a, b)$ such that $f(c) = 0$.*\n\nThe theorem **requires** continuity as one
