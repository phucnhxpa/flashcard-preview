6", "judge_pick": false}, {"question": "What is a Bernoulli trial? How does it connect to the binomial distribution? (2 steps)", "answer": "- Step 1: A Bernoulli trial is a single experiment with exactly two possible outcomes: success (probability p) and failure (probability 1-p). It's named after Jacob Bernoulli.\n- Step 2: A binomial distribution X ~ B(n, p) is simply the sum of n independent Bernoulli trials: X = X₁ + X₂ + ... + Xₙ, where each Xᵢ is a Bernoulli trial with P(success) = p. This explains why E(X) = np and Var(X) = np(1-p) — they're just the sum of n identical Bernoulli means and variances.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "A student claims that for X ~ B(10, 0.1), P(X = 0) = 0.9¹⁰ = 0.3487. Is this correct? If not, what is the correct calculation? (2 steps)", "answer": "- Step 1: The student's calculation is incorrect — they've calculated (1-p)^n but missed the binomial coefficient.\n- Step 2: The correct calculation: $\\mathrm{P}(X=0) = \\binom{10}{0} p^0 (1-p)^{10} = 1 × 1 × 0.9^{10} = 0.9^{10} ≈ 0.3487$\n\nWait, that gives the same answer! Let me recalculate... Actually, the student got lucky — for X = 0, the binomial coefficient is 1, so it happens to be correct here. But this is a common trap: for X = 1, 2, 3, etc., the binomial coefficient is critical. For example, P(X=1) = 10 × 0.1 × 0.9⁹ = 0.3874, not 0.1 × 0.9⁹.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": true}, {"question": "If X ~ B(5, p) and P(X ≥ 1) = 0.83193, find p. Then find E(X) and Var(X). (3 steps)", "answer": "- Step 1: P(X ≥ 1) = 1 - P(X = 0) = 1 - (1-p)⁵ = 0.83193\n- Step 2: So (1-p)⁵ = 1 - 0.83193 = 0.16807\n  + Taking fifth root: 1-p = 0.16807^(1/5) = 0.7\n  + Therefore p = 0.3\n- Step 3: E(X) = np = 5 × 0.3 = 1.5\n  + Var(X) = np(1-p) = 5 × 0.3 × 0.7 = 1.05", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "For X ~ B(8, 1/3), calculate P(X ≤ 1). Show how to interpret \"≤ 1\" in terms of individual probabilities. (3 steps)", "answer": "- Step 1: \"At most 1\" or \"≤ 1\" means X can be 0 or 1.\n- Step 2: So P(X ≤ 1) = P(X = 0) + P(X = 1)\n  + P(X = 0) = (2/3)⁸\n  + P(X = 1) = 8 × (1/3) × (2/3)⁷\n- Step 3: Calculating: (2/3)⁸ ≈ 0.0390, and 8 × (1/3) × (2/3)⁷ ≈ 0.1561\n  + Sum ≈ 0.1951\n\nAlternatively, use binomial tables with n = 8, p = 0.333..., x = 1 to get the cumulative probability directly.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "A quality control manager wants to set a threshold d such that the probability of stopping production (more than d defective items in sample of 50) is less than 5%. How would you find the smallest such d when p = 0.05? (3 steps)", "answer": "- Step 1: Let X ~ B(50, 0.05). We want P(X > d) < 0.05, i.e., 1 - P(X ≤ d) < 0.05, so P(X ≤ d) > 0.95\n- Step 2: We need to find the smallest d such that P(X ≤ d) > 0.95\n- Step 3: Using tables or calculator:\n  + P(X ≤ 4) = 0.9742 > 0.95\n  + P(X ≤ 3) = 0.9426 < 0.95\n  + So the smallest d is 4, meaning if more than 4 defectives are found (i.e., X ≥ 5), production stops.\n\nThis is a practical application of inverse cumulative binomial problems.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "In a binomial distribution, why does the sum of all probabilities P(X = 0) + P(X = 1) + ... + P(X = n) equal 1? (2 steps)", "answer": "- Step 1: This follows directly from the binomial theorem. Since p + (1-p) = 1:\n$$(p + (1-p))^n = 1^n = 1$$\n- Step 2: Expanding the left side using the binomial theorem:\n$$= \\sum_{r=0}^{n} \\binom{n}{r} p^r (1-p)^{n-r} = \\mathrm{P}(X=0) + \\mathrm{P}(X=1) + ... + \\mathrm{P}(X=n)$$\nThis elegant proof shows the binomial probabilities form a valid probability distribution that sums to 1.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "What's wrong with the following statement? \"A binomial distribution can model the number of times you need to roll a die until you get a six.\" Explain why this is not binomial and what distribution would be appropriate. (2 steps)", "answer": "- Step 1: The problem is that there's no fixed number of trials n. You keep rolling until a condition is met, so the number of trials is random.\n- Step 2: This is a geometric distribution problem, not binomial. The geometric distribution models the number of trials needed to get the first success. Other related distributions include the negative binomial (number of trials to get r successes) and the Poisson (for rare events over continuous intervals).\n\nThis is a common misconception that tests understanding of what \"fixed number of trials\" really means.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": true}, {"question": "A test has 10 true-or-false questions. A completely unprepared student guesses randomly. What is the probability of getting exactly 6 correct? What is the probability of passing (8 or more correct)? (3 steps)", "answer": "- Step 1: For each question, P(correct) = 0.5. With n = 10, p = 0.5, X ~ B(10, 0.5)\n- Step 2: P(exactly 6 correct) = P(X = 6) = $\\binom{10}{6}(0.5)^6(0.5)^4 = \\binom{10}{6} \\times (0.5)^{10} = 210/1024 \\approx 0.205$\n- Step 3: P(passing with 8 or more) = P(X ≥ 8) = P(X = 8) + P(X = 9) + P(X = 10)\n  + = [C(10,8) + C(10,9) + C(10,10)] × (0.5)¹⁰\n  + = [45 + 10 + 1] / 1024 = 56/1024 ≈ 0.0547\n\nGetting 8+ correct by random guessing is quite unlikely (about 5.5%).", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "Two binomial distributions have the same mean. One has n₁ = 10, p₁ = 0.5 and another has n₂ = 20, p₂ = 0.25. Which has larger variance? Calculate both variances to confirm. (3 steps)", "answer": "- Step 1: Both have the same mean: E(X) = np = 10 × 0.5 = 5 and 20 × 0.25 = 5\n- Step 2: Calculate variances:\n  + Var₁ = n₁p₁(1-p₁) = 10 × 0.5 × 0.5 = 2.5\n  + Var₂ = n₂p₂(1-p₂) = 20 × 0.25 × 0.75 = 3.75\n- Step 3: The second distribution (n=20, p=0.25) has larger variance. This makes intuitive sense: with more trials but a smaller success probability, outcomes are more variable around the same mean. Variance is maximized when p = 0.5, and p = 0.25 is closer to p = 0.5 than p = 0.5 is to itself... wait, that's wrong. Actually: p = 0.5 gives maximum variance for fixed n. Here n is different. The key is that Var = npq = mean × q, so the one with larger q (failure probability) has larger variance when means are equal.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "How would you use binomial tables to find P(2 ≤ X ≤ 7) for X ~ B(20, 0.35)? Write the formula and explain. (2 steps)", "answer": "- Step 1: The probability of a range is found using the cumulative formula:\n$$\\mathrm{P}(2 \\leq X \\leq 7) = \\mathrm{P}(X \\leq 7) - \\mathrm{P}(X \\leq 1)$$\n- Step 2: This works because P(X ≤ 7) includes all values from 0 to 7, and P(X ≤ 1) includes all values from 0 to 1. Subtracting removes values 0, 1 leaving only 2, 3, 4, 5, 6, 7.\n\nAlways use this subtraction method for ranges rather than summing individual probabilities — it's faster and less error-prone.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "A archer hits the bullseye with probability 0.6. She shoots 20 arrows. Find the probability that she hits at least 50% of her arrows (i.e., at least 10 bullseyes). (3 steps)", "answer": "- Step 1: X ~ B(20, 0.6). We want P(X ≥ 10).\n- Step 2: Since p = 0.6 > 0.5, use the complement method with cumulative:\n$$\\mathrm{P}(X \\geq 10) = 1 - \\mathrm{P}(X \\leq 9)$$\n- Step 3: Using calculator or tables (with n=20, p=0.6):\n  + P(X ≤ 9) = 0.1275 (approximately)\n  + So P(X ≥ 10) = 1 - 0.1275 = 0.8725\n\nThis high probability reflects the archer's skill — with p = 0.6, she's very likely to hit at least half her shots.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "In the context of binomial distribution, what does it mean for two events to be \"mutually exclusive\" versus \"independent\"? How do these concepts apply to binomial trials? (3 steps)", "answer": "- Step 1: Mutually exclusive (disjoint): Two events cannot happen at the same time. For binomial, \"success\" and \"failure\" are mutually exclusive outcomes for any single trial.\n- Step 2: Independent: The outcome of one trial does not affect the outcome of another. This is a key condition for binomial — each of the n trials must be independent.\n- Step 3: These are different concepts! \"Mutually exclusive\" describes outcomes within a single trial, while \"independence\" describes relationships between different trials. A binomial trial can have mutually exclusive outcomes (success/failure) AND each trial is independent of all others.\n\nUnderstanding this distinction is crucial for proper model selection.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": true}, {"question": "The probability of a switch being faulty is 0.08. In a sample of 10 switches, what is the probability of exactly 4 being faulty? Set up the calculation but don't compute. (2 steps)", "answer": "- Step 1: Let X = number of faulty switches in 10 trials. X ~ B(10, 0.08)\n- Step 2: The probability is: $$\\mathrm{P}(X=4) = \\binom{10}{4} (0.08)^4 (0.92)^6$$\n  + This equals 210 × 0.08⁴ × 0.92⁶\n  + ≈ 210 × 0.000004096 × 0.6066 ≈ 0.00052 (very small!)\n\nThe low probability reflects how unlikely it is to get 4 failures when the defect rate is only 8%.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "A genetic marker is present in 4% of the population. In a sample of 50 people, what is the probability of exactly 6 people having this marker? Explain why this probability might be small. (3 steps)", "answer": "- Step 1: X ~ B(50, 0.04). Want P(X = 6)\n- Step 2: Formula: $\\mathrm{P}(X=6) = \\binom{50}{6} (0.04)^6 (0.96)^{44}$\n- Step 3: This is small because:\n  + Having exactly 6 out of 50 with a rare trait (4%) is unlikely\n  + The expected number is only 50 × 0.04 = 2, so getting 6 is three times the mean\n  + Though not impossible, it's in the tail of the distribution", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "Traffic lights have three settings: red (48%), orange (4%), green (48%). You pass through 6 traffic lights and only proceed when green. Model the number of times you have to wait or stop. Justify your model. (3 steps)", "answer": "- Step 1: Let X = number of times you have to wait/stop (i.e., NOT green) in 6 lights.\n- Step 2: For each light: P(not green) = 0.48 + 0.04 = 0.52. Assuming independence between lights: X ~ B(6, 0.52)\n- Step 3: Justification: Fixed number of trials (6 lights), two outcomes (green = go, red/orange = stop), fixed probability (0.52), and assuming traffic lights operate independently.\n\nNote: This is technically borderline since traffic lights are often coordinated, but for a simple model we assume independence.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "When checking the appropriateness of a binomial model, what are three key questions you should ask about the situation? (3 points)", "answer": "- Step 1: Do we have a fixed number of trials n? (Is it predetermined how many times we'll repeat the experiment?)\n- Step 2: Are there exactly two possible outcomes for each trial? (If there are more than two, binomial doesn't apply directly)\n- Step 3: Is the probability of success constant? And are the trials independent? (This is often the trickiest — watch out for sampling without replacement from small populations)\n\nThese three questions form the checklist for binomial model selection.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": true}, {"question": "In the probability formula P(X=r) = nCr p^r q^(n-r), what does the nCr term represent conceptually? Why is it necessary? (2 steps)", "answer": "- Step 1: The binomial coefficient nCr (read as \"n choose r\") represents the number of different ways to arrange r successes among n trials.\n- Step 2: It's necessary because there are many different paths through the probability tree that lead to the same outcome of r successes. For example, with n=3 and r=2, you could get success on trials (1,2), (1,3), or (2,3) — three different arrangements, all giving 2 successes. Each path has probability p²q, so total probability is 3 × p²q = ³C₂ p²q.\n\nWithout this coefficient, we'd be counting only one arrangement and would get the wrong probability.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": true}, {"question": "A basketball player makes free throws with probability 0.75. In 10 attempts, what's the probability of making more heads than misses? (Hint: What does \"more heads than misses\" mean in terms of X?) (3 steps)", "answer": "- Step 1: Let X = number of successful free throws. X ~ B(10, 0.75)\n- Step 2: \"More successes than failures\" means X > n/2 = 10/2 = 5. So we need P(X > 5) = P(X ≥ 6)\n- Step 3: Since p = 0.75 > 0.5, use complement: P(X ≥ 6) = 1 - P(X ≤ 5)\n  + = 1 - 0.0000... (from tables, very small)\n  + Actually P(X ≤ 5) is extremely small when p = 0.75, so P(X ≥ 6) ≈ 1\n\nWith a 75% success rate, getting more makes than misses is virtually certain in 10 attempts.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "For X ~ B(n, p), if you know only that n > 0 and 0 < p < 1, what can you say about the relative sizes of the mean and variance? Is one always larger, or does it depend on p? (2 steps)", "answer": "- Step 1: This depends on p:\n  + When p < 0.5: mean > variance (np > np(1-p) since 1-p > p)\n  + When p = 0.5: mean = variance\n  + When p > 0.5: mean < variance (np < np(1-p) since p > 1-p)\n- Step 2: Intuition: When success is rare (p small), most outcomes are 0, so variance is small relative to the already-small mean. When success is common (p large), most outcomes are near n, so variance is small relative to the large mean. At p = 0.5, the distribution is most spread out, balancing mean and variance.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "Explain why taking a sample \"without replacement\" generally violates the binomial assumption of independent trials. Under what condition can you still use the binomial model? (2 steps)", "answer": "- Step 1: Without replacement, the composition of the remaining population changes after each draw. This changes the probability of success for subsequent draws, violating the \"fixed probability\" requirement.\n- Step 2: However, if the population is \"large\" relative to the sample (typically, sample < 5-10% of population), the change in probability is negligible, so we can approximate with a binomial model. The key word in the study material is \"large number\" — this is what allows the binomial assumption to hold approximately.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "A manufacturer claims 95% of balloons don't burst when blown up. You have 20 balloons. What is the probability that exactly 2 burst? What is the probability that none burst? (3 steps)", "answer": "- Step 1: Let X = number of balloons that burst. X ~ B(20, 0.05)\n- Step 2: P(none burst) = P(X = 0) = (0.95)²⁰ ≈ 0.3585\n- Step 3: P(exactly 2 burst) = P(X = 2) = C(20,2) × (0.05)² × (0.95)¹⁸ = 190 × 0.0025 × 0.3956 ≈ 0.188\n\nThese are useful calculations for planning parties — about 36% chance all balloons survive, about 19% chance exactly 2 burst.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "In a binomial distribution, if someone tells you \"the expected number of successes is 3\" and \"the variance is 2.1\", could these values come from a valid binomial distribution? Show how to check. (3 steps)", "answer": "- Step 1: For binomial, E(X) = np and Var(X) = np(1-p). Let E(X) = 3 and Var(X) = 2.1\n- Step 2: From E(X) = np = 3, we get n = 3/p. Substituting into variance:\n  + np(1-p) = 2.1\n  + 3(1-p) = 2.1\n  + 1-p = 0.7\n  + p = 0.3\n- Step 3: Then n = 3/0.3 = 10. Since n must be an integer, this gives n = 10, p = 0.3, which is a valid binomial. So yes, these values are consistent!\n\nGenerally, check if you can find integer n and p in [0,1] that satisfy both equations.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}, {"question": "What is the relationship between the standard deviation of a binomial distribution and its mean? How does this help you quickly estimate the spread without calculation? (2 steps)", "answer": "- Step 1: For binomial, Var = np(1-p) = mean × (1-p). So standard deviation σ = √[mean × (1-p)].\n- Step 2: Since 0 ≤ (1-p) ≤ 1, the standard deviation is always less than or equal to the square root of the mean. This gives a quick bounds: σ ≤ √(mean). For example, with mean = 16, you know σ ≤ 4. And when p = 0.5, σ = √(mean × 0.5) = mean/√2 ≈ 0.707 × mean.\n\nThis is useful for sanity checks — if your calculated standard deviation exceeds √mean, something is wrong.", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "A doctor knows that 30% of patients wait more than 30 minutes. For 12 patients, find: (a) P(none wait >30 min), (b) P(more than 2 wait >30 min). (3 steps)", "answer": "- Step 1: X ~ B(12, 0.3), where X = number waiting >30 min\n- Step 2: (a) P(X = 0) = (0.7)¹² ≈ 0.0138\n- Step 3: (b) P(X > 2) = 1 - P(X ≤ 2)\n  + = 1 - [P(0) + P(1) + P(2)]\n  + = 1 - [0.7¹² + C(12,1)(0.3)(0.7)¹¹ + C(12,2)(0.3)²(0.7)¹⁰]\n  + = 1 - [0.0138 + 0.0712 + 0.1678] ≈ 1 - 0.253 = 0.747\n\nAbout 75% of the time, more than 2 patients will be waiting over 30 minutes.", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": false}, {"question": "When the binomial parameter p is very small (e.g., p < 0.1) and n is large, what does the binomial distribution start to resemble? What is the practical benefit of this? (2 steps)", "answer": "- Step 1: When p is small and n is moderate to large, the binomial distribution B(n, p) begins to approximate a Poisson distribution with parameter λ = np.\n- Step 2: The practical benefit is that Poisson calculations can be easier for certain problems, especially when finding cumulative probabilities for the tail ends of the distribution. However, for A-level S2, you're expected to use the binomial directly or use tables/calculator — this is more of a conceptual connection to later topics.\n\nThis is a preview of the Poisson distribution covered in Chapter 3.", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "A student says that for X ~ B(100, 0.04), P(X = 4) can be found using the formula and gives the answer 0.215. Without calculating, how can you tell this answer is likely wrong? (2 steps)", "answer": "- Step 1: The expected value is E(X) = np = 100 × 0.04 = 4. This is the mean.\n- Step 2: For a binomial distribution, the probability at the mean is typically NOT the highest probability — it's actually usually the mode. But more importantly, since the mean is 4, P(X = 4) should be one of the larger probabilities. However, 0.215 means 21.5%, which would imply more than 1/5 of experiments yield exactly 4 successes. While possible, the more telling issue is that P(X = 4) would be the peak, and binomial peaks are rarely that high for typical n and p values. Actually, 0.215 is not unreasonable. Let me reconsider... the real issue is that this requires calculation to verify properly. A better quick check: since probabilities must sum to 1 and there are 101 possible values, the average probability is about 0.01. P(X=4) being 0.215 would mean it's 21.5 times the average — possible but worth verifying.\n\nActually, the correct answer is about 0.215, so the student's answer is correct! The lesson here is: trust but verify with calculations when the answer seems extreme.", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": false}, {"question": "For X ~ B(n, p), derive the relationship between the mean, variance, and the probability p. If you know the mean and variance, how can you find p? (3 steps)", "answer": "- Step 1: We have E(X) = np and Var(X) = np(1-p)\n- Step 2: Let μ = np. Then Var = μ(1-p), so 1-p = Var/μ, giving p = 1 - Var/μ\n- Step 3: This means: given mean μ and variance σ², the parameter p = 1 - (σ²/μ)\n  + For this to be valid, we need 0 ≤ p ≤ 1, which requires σ² ≤ μ\n  + This is always true for binomial since Var = np(1-p) and (1-p) ≤ 1, so Var ≤ np = μ\n\nThis gives a quick way to estimate p from observed data: p̂ ≈ 1 - (sample variance)/(sample mean).", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}, {"question": "What is the probability that in 8 fair coin tosses, you get more heads than tails? (3 steps)", "answer": "- Step 1: More heads than tails means heads > tails. With 8 tosses, \"more\" means at least 5 heads (since 4 heads = 4 tails is equal, not more).\n- Step 2: X ~ B(8, 0.5). Want P(X ≥ 5) = P(5) + P(6) + P(7) + P(8)\n- Step 3: By symmetry of binomial with p = 0.5: P(X ≥ 5) = P(X ≤ 3)\n  + P(X ≤ 3) = 0.2734 (from tables)\n  + So P(X ≥ 5) = 0.2734 as well\n\nActually, by symmetry P(X ≥ 5) = P(X ≤ 3), and since P(X ≥ 5) + P(X ≤ 3) + P(X=4) = 1, and P(X=4) = C(8,4)/256 = 70/256 = 0.2734, we get P(X ≥ 5) = (1 - 0.2734)/2 = 0.3633\n\nWith 8 fair tosses, there's about a 36.3% chance of getting more heads than tails.", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": false}, {"question": "A company produces components with 5% defects. In a sample of 50, what's the probability of fewer than 2 defects? What's the probability of more than 5 defects? (3 steps)", "answer": "- Step 1: X ~ B(50, 0.05)\n- Step 2: P(fewer than 2 defects) = P(X < 2) = P(X ≤ 1) = P(0) + P(1)\n  + = (0.95)⁵⁰ + 50(0.05)(0.95)⁴⁹\n  + ≈ 0.0769 + 0.2025 = 0.2794\n- Step 3: P(more than 5 defects) = P(X > 5) = 1 - P(X ≤ 5)\n  + From tables or calculator: P(X ≤ 5) ≈ 0.984\n  + So P(X > 5) ≈ 0.016\n\nHaving fewer than 2 defects in 50 is quite likely (~28%), but having more than 5 is quite rare (~1.6%).", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": false}, {"question": "In the study material, an example shows using the binomial distribution to model the number of patients (out of 20) who get relief from a medication, with p being the probability of relief. What assumptions would need to be checked for this to be valid? (3 steps)", "answer": "- Step 1: Fixed number of trials: 20 patients = fixed n ✓\n- Step 2: Two outcomes: Each patient either gets relief (success) or doesn't (failure) ✓\n- Step 3: Fixed probability and independence: This requires careful thought:\n  + Is p constant? This assumes patients are similar and the medication works the same way for each.\n  + Are trials independent? This assumes one patient's reaction doesn't affect another's (they're treated separately) AND that patients are not selected in a way that changes the probability (e.g., not selecting patients who already responded to treatment).\n  + These are key assumptions that must be justified in context.", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": false}, {"question": "For X ~ B(37, 0.85), explain how you would find P(25 < X ≤ 27). Write out the formula. (2 steps)", "answer": "- Step 1: This is a range probability: P(25 < X ≤ 27) = P(X ≤ 27) - P(X ≤ 25)\n- Step 2: Since p = 0.85 > 0.5, we could redefine: Let Y = 37 - X (number of failures), then Y ~ B(37, 0.15)\n  + P(25 < X ≤ 27) = P(X = 26 or 27) = P(Y = 11 or 10) = P(Y ≥ 10) - P(Y ≥ 12) = P(Y ≤ 11) - P(Y ≤ 9)\n  + Alternatively, just use calculator directly: P(X ≤ 27) - P(X ≤ 25)\n\nThe key is recognizing this as a range that requires subtraction of cumulative probabilities.", "source": "MiniMax ②", "_id": "minimax_2_47", "judge_pick": false}, {"question": "A fair dice is biased so probability of rolling a 6 is 0.3. You roll 15 times. What's the probability of rolling exactly 4 sixes? What's the probability of rolling 2 or fewer sixes? (3 steps)", "answer": "- Step 1: X ~ B(15, 0.3), X = number of sixes\n- Step 2: P(exactly 4 sixes) = C(15,4) × (0.3)⁴ × (0.7)¹¹\n  + = 1365 × 0.0081 × 0.0197 ≈ 0.218\n- Step 3: P(2 or fewer) = P(X ≤ 2) = P(0) + P(1) + P(2)\n  + Using calculator: ≈ 0.035 + 0.134 + 0.239 = 0.408\n\nSo about 21% chance of exactly 4 sixes, and about 41% chance of getting 2 or fewer.", "source": "MiniMax ②", "_id": "minimax_2_48", "judge_pick": false}], "count": 49}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "What four conditions must a situation satisfy for the number of \"successes\" to be modeled by a binomial distribution $$B(n,p)$$, and why is each condition essential? (4 steps)", "answer": "- Step 1: **Fixed number of trials $$n$$.** You must know in advance how many trials will occur. If $$n$$ varies randomly (e.g., \"flip until 4 heads\"), the possible values of $$X$$ aren't bounded at $$n$$, and the formula fails.\n- Step 2: **Exactly two outcomes per trial** (success/failure). Each trial must be dichotomous — if there are three+ distinct categories, the binomial doesn't apply unless you collapse them into a binary split.\n- Step 3: **Constant probability $$p$$ of success on every trial.** The formula $$p^r(1-p)^{n-r}$$ treats $$p$$ as a single number; varying $$p$$ invalidates the multiplication.\n- Step 4: **Independent trials.** One trial's outcome must not affect another. Dependence breaks the clean multiplication of per-trial probabilities.\n\nRemove any one of these, and the model no longer describes the process.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "Intuitively, why does the binomial distribution require trials to be *independent*? What would break in the formula $$\\binom{n}{r}p^r(1-p)^{n-r}$$ without independence? (3 steps)", "answer": "- Step 1: The factor $$p^r(1-p)^{n-r}$$ represents the probability of one specific sequence of $$r$$ successes and $$n-r$$ failures — this product form only holds because independent events multiply.\n- Step 2: If trials are dependent (e.g., sampling without replacement from a small bag), the probability of success changes based on prior outcomes. There's no longer a single $$p$$ to raise to the power $$r$$.\n- Step 3: Dependence also breaks the symmetry — different orderings of successes and failures would give different probabilities, so we couldn't just multiply by $$\\binom{n}{r}$$ to count arrangements. Independence guarantees all sequences with $$r$$ successes have *equal* probability.\n\nTakeaway: Independence = \"each trial is a clean, isolated Bernoulli event with probability $$p$$.\"", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": true}, {"question": "Why must the success probability $$p$$ be *constant* across trials for the binomial model, and give a concrete example where $$p$$ would change? (3 steps)", "answer": "- Step 1: The formula $$\\binom{n}{r}p^r(1-p)^{n-r}$$ treats $$p$$ as a single value. If $$p$$ varies between trials ($$p_1, p_2, \\ldots$$), this compact expression no longer describes the probability.\n- Step 2: Example — drawing cards from a 52-card deck *without replacement*. Initially $$P(\\text{ace}) = 4/52$$; if you draw an ace first, then $$P(\\text{ace}) = 3/51$$. Probability depends on history.\n- Step 3: The fix: if the population is very large (say, 100,000 sweets in a bag), removing one barely perturbs $$p$$, so the binomial becomes a valid *approximation*. This is the key justification whenever we see \"a large bag/sample\" in problems.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "How is the binomial distribution literally the *binomial expansion*? Illustrate for $$n=4$$ by expanding $$(p+q)^4$$ with $$q=1-p$$. (3 steps)", "answer": "- Step 1: The expansion gives $$(p+q)^4 = p^4 + 4p^3q + 6p^2q^2 + 4pq^3 + q^4$$, via the binomial theorem.\n- Step 2: Each term corresponds to a probability in the distribution of $$X$$ = number of successes in 4 trials:\n+ $$q^4 = P(X=0)$$ — all 4 failures\n+ $$4p^3q = P(X=3)$$ — 3 successes, 1 failure, with 4 possible arrangements\n+ $$6p^2q^2 = P(X=2)$$ — 2 successes, 2 failures, with 6 arrangements\n+ $$p^4 = P(X=4)$$ — all 4 successes\n- Step 3: The coefficient in each term is exactly $$\\binom{4}{r}$$, counting arrangements. Since $$(p+q)^4 = 1^4 = 1$$, all probabilities automatically sum to 1.\n\nThat's where the name *binomial* distribution comes from — it *is* the binomial expansion of $$(p+(1-p))^n$$.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "In the formula $$P(X=r) = \\binom{n}{r}p^r(1-p)^{n-r}$$, explain the meaning of each of the three factors and why they are multiplied. (3 steps)", "answer": "- Step 1: The factor $$p^r$$ is the probability of a specific arrangement of $$r$$ successes, each with probability $$p$$, multiplied together via independence.\n- Step 2: The factor $$(1-p)^{n-r}$$ is the probability of the remaining $$n-r$$ trials all being failures, again multiplied via independence.\n- Step 3: Together, $$p^r(1-p)^{n-r}$$ is the probability of **one specific sequence** of outcomes. But many different sequences have $$r$$ successes total; the factor $$\\binom{n}{r}$$ counts how many such sequences exist, and since all have the same probability, we multiply.\n\nTakeaway: \"Probability per sequence × number of sequences = total probability of event.\"", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "Why is $$\\binom{n}{r}$$ the correct combinatorial coefficient in the binomial formula? What is it actually counting? (3 steps)", "answer": "- Step 1: $$\\binom{n}{r}$$ counts the number of ways to choose *which* $$r$$ of the $$n$$ trials are the successes — equivalently, the number of distinct sequences containing exactly $$r$$ S's and $$n-r$$ F's.\n- Step 2: Each such sequence has the *same* probability $$p^r(1-p)^{n-r}$$, because multiplication is commutative — the order of factors doesn't change the product.\n- Step 3: The event \"$$X=r$$\" is the union of these $$\\binom{n}{r}$$ *mutually exclusive* sequences, so we add the probabilities — $$\\binom{n}{r}$$ copies of $$p^r(1-p)^{n-r}$$, giving the formula.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "Why do all the individual binomial probabilities sum to exactly 1? Justify algebraically. (2 steps)", "answer": "- Step 1: Sum over all possible values: $$\\sum_{r=0}^{n} \\binom{n}{r}p^r(1-p)^{n-r}$$. By the binomial theorem, this equals $$(p + (1-p))^n$$.\n- Step 2: Since $$p + (1-p) = 1$$, we get $$1^n = 1$$. The binomial probabilities are guaranteed to form a valid distribution — a direct consequence of the binomial theorem.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "In the notation $$X \\sim B(n,p)$$, what do $$n$$ and $$p$$ represent, and what are they called? (2 steps)", "answer": "- Step 1: $$n$$ is the **fixed number of trials**; it's called the *index*. It determines the range of $$X$$: the possible values are $$\\{0, 1, 2, \\ldots, n\\}$$.\n- Step 2: $$p$$ is the **probability of success on any single trial**; it's called the *parameter*. It controls the distribution's location and shape — low $$p$$ shifts mass to the left, high $$p$$ to the right, and $$p=0.5$$ produces symmetry.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "A student says: \"I'll flip a fair coin until I get 4 heads in a row, then count total flips.\" Can this be modeled as binomial? Explain. (3 steps)", "answer": "- Step 1: Check each condition: Two outcomes? Yes (H/T). Constant $$p = 0.5$$? Yes. Independent flips? Yes.\n- Step 2: But: is $$n$$ fixed? **No** — the number of flips is itself random (maybe 4, maybe 400). This violates the most fundamental binomial requirement.\n- Step 3: With random $$n$$, this is actually a *negative binomial* (or geometric, for a first success). The binomial counts \"successes in a fixed number of trials\"; this problem counts \"trials until a fixed number of successes\" — a different distribution.\n\nTakeaway: If $$n$$ is the random quantity, you're not dealing with a binomial.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "A traffic light is red 48% of the time, amber 4%, green 48%. You pass 6 independent lights. Can the number of non-green lights be modeled as binomial? (3 steps)", "answer": "- Step 1: Binomial requires exactly two outcomes. Three colors *seems* to disqualify it.\n- Step 2: But we can **collapse** outcomes: define \"success\" = \"not green\" (red or amber), with $$P(\\text{success}) = 0.48 + 0.04 = 0.52$$. Now the trial is binary.\n- Step 3: With 6 independent lights and constant $$p = 0.52$$, all binomial conditions are satisfied. So $$X = $$ \"number of non-green lights\" $$\\sim B(6, 0.52)$$.\n\nTakeaway: Multi-category problems can often be made binomial by a clever success/failure definition.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "A bag contains a *large* number of sweets in a 1:4 ratio of strawberry to apple. You pick 5 without replacement. Is the binomial model appropriate? (3 steps)", "answer": "- Step 1: Strictly speaking, without replacement means each draw changes the composition, so $$p$$ is not constant. The exact model is *hypergeometric*.\n- Step 2: However, \"large\" means the bag contains many thousands of sweets. Removing one strawberry sweet might change $$p$$ from $$0.2000$$ to $$0.1999...$$ — a negligible shift.\n- Step 3: So we **approximate** with $$X \\sim B(5, 0.2)$$ (where $$p = 1/(1+4) = 0.2$$ from the ratio). This approximation is accurate whenever the sample size is a small fraction of the population.\n\nTakeaway: \"Large population\" unlocks the binomial approximation for without-replacement sampling.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "A random process counts \"the number of roulette spins until I win for the first time.\" Why is this *not* binomial, even though each spin has fixed probability and is independent? (3 steps)", "answer": "- Step 1: The four binomial conditions include \"fixed number of trials $$n$$.\" Here, the number of spins is random — you stop when you first win.\n- Step 2: Since $$n$$ isn't predetermined, the binomial formula doesn't apply. The quantity of interest is a *waiting time*, not a success count.\n- Step 3: This is modeled by the **geometric distribution**, where $$P(\\text{first win on spin } k) = (1-p)^{k-1} p$$. The binomial and geometric are complementary views: one fixes $$n$$ and asks about successes; the other fixes the target and asks about trials.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": true}, {"question": "What is a *cumulative probability function*, and how does it differ from a probability of an individual value? (2 steps)", "answer": "- Step 1: The cumulative probability $$P(X \\leq x)$$ is the *sum* of all individual probabilities from 0 up to and including $$x$$: $$P(X=0) + P(X=1) + \\cdots + P(X=x)$$.\n- Step 2: An individual probability $$P(X = x)$$ is a single term — one \"bar\" on a histogram. Cumulative tables are practical because real questions usually ask about ranges (\"at least 5,\" \"no more than 3\") rather than exact counts.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "For a binomial random variable $$X$$, why is $$P(X < 6) = P(X \\leq 5)$$? Does this identity hold for continuous distributions too? (2 steps)", "answer": "- Step 1: The binomial is **discrete**, taking only integer values. The set of integers strictly less than 6 is $$\\{0, 1, 2, 3, 4, 5\\}$$ — identical to the set \"less than or equal to 5.\"\n- Step 2: For continuous distributions (e.g., Normal), $$P(X < 6) = P(X \\leq 6)$$ because $$P(X = 6) = 0$$ (single points have zero probability). But the discrete trick of shifting by 1 only works for integer-valued variables.\n\nRule: For discrete $$X$$, $$P(X < k) = P(X \\leq k-1)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": true}, {"question": "Translate each phrase into an inequality on $$X$$, then express as a cumulative form $$P(X \\leq \\cdot)$$ (possibly with a complement): \"greater than 5,\" \"at least 7,\" \"fewer than 10,\" \"no more than 3,\" \"at most 8.\" (5 steps)", "answer": "- Step 1: \"**Greater than 5**\": $$X > 5$$, i.e., $$X \\geq 6$$ → $$1 - P(X \\leq 5)$$.\n- Step 2: \"**At least 7**\": $$X \\geq 7$$ → $$1 - P(X \\leq 6)$$ (note the $$-1$$ in \"at least\").\n- Step 3: \"**Fewer than 10**\": $$X < 10$$, i.e., $$X \\leq 9$$ → $$P(X \\leq 9)$$.\n- Step 4: \"**No more than 3**\": $$X \\leq 3$$ → $$P(X \\leq 3)$$ directly.\n- Step 5: \"**At most 8**\": $$X \\leq 8$$ → $$P(X \\leq 8)$$ directly.\n\n**Misconception probe:** \"At least 7\" is not $$P(X \\leq 7)$$ and not $$1 - P(X \\leq 7)$$. It's $$1 - P(X \\leq 6)$$. The \"$$-1$$\" exists because \"$$\\geq 7$$\" excludes \"$$\\leq 6$$,\" and the cumulative table stops *at* its upper bound.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": true}, {"question": "How do you compute $$P(a \\leq X \\leq b)$$ using a cumulative table for integers $$a < b$$? (2 steps)", "answer": "- Step 1: Split the range: $$\\{a, a+1, \\ldots, b\\} = \\{0, 1, \\ldots, b\\} \\setminus \\{0, 1, \\ldots, a-1\\}$$. So $$P(a \\leq X \\leq b) = P(X \\leq b) - P(X \\leq a-1)$$.\n- Step 2: The \"$$-1$$\" is critical: the lower bound is *inclusive*, so subtract up to $$a-1$$ (not $$a$$), or you'll wrongly exclude $$X = a$$. For example, $$P(2 \\leq X \\leq 7) = P(X \\leq 7) - P(X \\leq 1)$$.\n\nTakeaway: Off-by-one errors are the most common binomial mistake — always check which endpoint is included.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": true}, {"question": "Standard binomial tables typically only tabulate values of $$p \\leq 0.5$$. If $$X \\sim B(10, 0.7)$$, how can you still use the table? (4 steps)", "answer": "- Step 1: Define a new variable $$Y$$ = number of *failures* = $$n - X = 10 - X$$. If \"success\" has probability 0.7, then \"failure\" has probability 0.3.\n- Step 2: $$Y \\sim B(10, 0.3)$$ — table-friendly because $$p = 0.3 < 0.5$$.\n- Step 3: Convert the question about $$X$$ into one about $$Y$$. For example, $$P(X \\leq 6) = P(10 - Y \\leq 6) = P(Y \\geq 4) = 1 - P(Y \\leq 3)$$.\n- Step 4: Look up $$P(Y \\leq 3)$$ for $$B(10, 0.3)$$. This gives the answer directly.\n\nTakeaway: When $$p > 0.5$$, reframe in terms of failures to get into table range.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "When converting between $$X$$-events and $$Y$$-events (where $$Y = n - X$$), why does \"$$X \\leq k$$\" become \"$$Y \\geq n - k$$\"? (2 steps)", "answer": "- Step 1: Start with $$X \\leq k$$. Substitute $$X = n - Y$$: $$n - Y \\leq k$$.\n- Step 2: Rearrange by adding $$Y$$ and subtracting $$k$$ from both sides: $$Y \\geq n - k$$. The inequality direction flips because we moved $$Y$$ across, effectively multiplying by $$-1$$ conceptually.\n\nSo for $$n=10, X \\leq 6$$: $$Y \\geq 4$$, which as a cumulative is $$1 - P(Y \\leq 3)$$.\n\nTakeaway: Successes and failures sum to $$n$$, so their thresholds swap ends.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": true}, {"question": "You want to find the smallest integer $$r$$ such that $$P(X \\geq r) < 0.05$$. Describe the strategy using cumulative tables, and explain why table-searching beats direct calculation. (3 steps)", "answer": "- Step 1: Rewrite the condition: $$P(X \\geq r) < 0.05 \\iff 1 - P(X \\leq r-1) < 0.05 \\iff P(X \\leq r-1) > 0.95$$.\n- Step 2: Scan the cumulative table for the given $$n, p$$ and find the smallest value of $$r-1$$ where $$P(X \\leq r-1)$$ first exceeds 0.95. Add 1 to get $$r$$.\n- Step 3: This works because $$P(X \\leq k)$$ is **monotonically increasing** in $$k$$ — once you cross the threshold, you stop. Calculating each $$P(X = r)$$ separately and summing would require many more operations and risk arithmetic slips.\n\nTakeaway: Use the table's monotonicity to search efficiently for thresholds.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "For a binomial distribution $$X \\sim B(n, p)$$, what are the formulas for the mean and variance, and what intuition does each carry? (3 steps)", "answer": "- Step 1: **Mean**: $$E(X) = np$$. If each of $$n$$ trials gives on average $$p$$ successes, totaling gives $$np$$ expected successes.\n- Step 2: **Variance**: $$\\text{Var}(X) = np(1-p)$$. The variance from one Bernoulli trial is $$p(1-p)$$; summing $$n$$ *independent* trials adds their variances.\n- Step 3: Importantly, variance is *always less than the mean* in a binomial, since $$\\text{Var}/E = 1 - p < 1$$. If your data has variance comparable to or exceeding its mean, it's probably not binomial.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "What is a *Bernoulli trial*, and why is viewing the binomial as a sum of Bernoulli trials so powerful? (3 steps)", "answer": "- Step 1: A Bernoulli trial is a single experiment with exactly two outcomes: success (value 1, probability $$p$$) or failure (value 0, probability $$1-p$$). Its distribution is the simplest nontrivial random variable.\n- Step 2: If we perform $$n$$ *independent* Bernoulli trials $$X_1, X_2, \\ldots, X_n$$ each with probability $$p$$, then $$X = X_1 + X_2 + \\cdots + X_n$$ counts total successes.\n- Step 3: This sum is exactly $$B(n, p)$$. The mean and variance formulas become *automatic* — they follow from summing Bernoulli means and variances, rather than from combinatorial juggling.\n\nTakeaway: Binomial = \"a pile of coin flips\"; its properties come directly from one flip.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "Derive the mean of a single Bernoulli trial $$X_1$$ with $$P(X_1 = 1) = p$$ and $$P(X_1 = 0) = 1-p$$. (2 steps)", "answer": "- Step 1: By definition, $$E(X_1) = \\sum_x x \\cdot P(X_1 = x) = 0 \\cdot (1-p) + 1 \\cdot p$$.\n- Step 2: This simplifies to $$E(X_1) = p$$. The expected value of a Bernoulli trial is just its success probability — a satisfying result: \"on average, each trial contributes $$p$$ successes.\"", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "Derive the variance of a single Bernoulli trial $$X_1$$. Show each step. (3 steps)", "answer": "- Step 1: Use $$\\text{Var}(X_1) = E(X_1^2) - [E(X_1)]^2$$. We know $$E(X_1) = p$$.\n- Step 2: Since $$X_1 \\in \\{0,1\\}$$, we have $$X_1^2 = X_1$$. So $$E(X_1^2) = E(X_1) = p$$.\n- Step 3: Therefore $$\\text{Var}(X_1) = p - p^2 = p(1-p)$$. This is maximized at $$p = 0.5$$, giving variance $$0.25$$ — the \"most uncertain\" Bernoulli.\n\nTakeaway: $$p(1-p)$$ is symmetric in $$p$$ and $$1-p$$, which is natural — swapping \"success/failure\" labels shouldn't change the spread.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "Using the sum-of-Bernoulli viewpoint, derive $$E(X) = np$$ for $$X \\sim B(n,p)$$. What property of expectation makes this derivation work? (3 steps)", "answer": "- Step 1: Write $$X = X_1 + X_2 + \\cdots + X_n$$ where each $$X_i$$ is Bernoulli with $$E(X_i) = p$$.\n- Step 2: **Linearity of expectation** gives $$E(X) = E(X_1) + E(X_2) + \\cdots + E(X_n)$$ — importantly, this holds *regardless of whether the $$X_i$$ are independent*.\n- Step 3: Summing $$n$$ copies of $$p$$: $$E(X) = p + p + \\cdots + p = np$$.\n\nTakeaway: Expectation is always additive; independence isn't needed for the *mean*.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "Derive $$\\text{Var}(X) = np(1-p)$$ for $$X \\sim B(n,p)$$ using the sum-of-Bernoulli view. Where exactly does the independence assumption enter? (3 steps)", "answer": "- Step 1: Write $$X = X_1 + \\cdots + X_n$$, each Bernoulli with $$\\text{Var}(X_i) = p(1-p)$$.\n- Step 2: For **independent** variables, $$\\text{Var}(X_1 + \\cdots + X_n) = \\text{Var}(X_1) + \\cdots + \\text{Var}(X_n)$$. **This step fails without independence** — dependent variables introduce covariance terms that inflate or deflate the total.\n- Step 3: Summing $$n$$ copies of $$p(1-p)$$: $$\\text{Var}(X) = np(1-p)$$.\n\nMisconception: variance is *not* linear in general; it's additive only for independent (or at least uncorrelated) variables. This is why the binomial's independence assumption matters for variance but not for mean.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "At what value of $$p$$ is the variance $$np(1-p)$$ maximized, and what does this tell you intuitively about uncertainty? (3 steps)", "answer": "- Step 1: Treat $$f(p) = p(1-p)$$ as a quadratic. Its derivative is $$f'(p) = 1 - 2p$$, zero at $$p = 0.5$$. The second derivative is negative, so this is a maximum.\n- Step 2: At $$p = 0.5$$: $$\\text{Var}(X) = n \\cdot 0.5 \\cdot 0.5 = n/4$$ (largest possible). At $$p = 0$$ or $$1$$: $$\\text{Var}(X) = 0$$ — no uncertainty, the result is deterministic.\n- Step 3: **Intuition**: $$p = 0.5$$ is the \"maximally undecided\" case, where each trial is a fair coin. As $$p$$ moves to extremes, outcomes become nearly certain, shrinking variance.\n\nTakeaway: Uncertainty (variance) peaks when outcomes are most balanced.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": false}, {"question": "For a binomial $$X \\sim B(n,p)$$, why is the variance *always* less than or equal to the mean? When would they be equal? (3 steps)", "answer": "- Step 1: Mean is $$np$$, variance is $$np(1-p)$$. Their ratio is $$\\frac{\\text{Var}(X)}{E(X)} = 1 - p$$, which is at most 1 for any valid $$p \\in [0,1]$$.\n- Step 2: So variance $$\\leq$$ mean, with equality only when $$1 - p = 1$$, i.e., $$p = 0$$ (a trivial case where both are zero anyway).\n- Step 3: This serves as a **diagnostic**: if sample data shows variance close to or exceeding the mean, a binomial model is a poor fit (\"overdispersion\"). Real binomial data should comfortably satisfy variance < mean.\n\nTakeaway: \"Variance < mean\" is a signature feature of the binomial.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "Given $$X \\sim B(n, 0.4)$$ and $$E(X) = 3.2$$, describe the reasoning to find $$n$$. (2 steps)", "answer": "- Step 1: Use $$E(X) = np$$, so $$3.2 = n \\cdot 0.4$$.\n- Step 2: Solve: $$n = 3.2 / 0.4 = 8$$. Hence $$X \\sim B(8, 0.4)$$. This shows that knowing the mean is enough to recover $$n$$ when $$p$$ is known — or equivalently, recover $$p$$ when $$n$$ is known.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "For $$X \\sim B(10, p)$$ with $$\\text{Var}(X) = 2.4$$, why are there *two* possible values of $$p$$, and what's the conceptual reason? (3 steps)", "answer": "- Step 1: Set $$np(1-p) = 2.4$$: $$10p(1-p) = 2.4$$, so $$p(1-p) = 0.24$$, giving the quadratic $$p^2 - p + 0.24 = 0$$.\n- Step 2: Solving: $$p = \\frac{1 \\pm \\sqrt{1 - 0.96}}{2} = \\frac{1 \\pm 0.2}{2}$$, so $$p = 0.6$$ or $$p = 0.4$$.\n- Step 3: **Conceptual reason**: variance depends on $$p$$ through $$p(1-p)$$, which is *symmetric around $$p = 0.5$$*. Swapping \"success\" with \"failure\" relabels $$p \\leftrightarrow 1-p$$ but doesn't change variance. Additional information (like the mean) is needed to decide which side of 0.5 applies.\n\nTakeaway: Variance tells you how \"mixed\" the distribution is, but not which category is rarer.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "You're given $$X \\sim B(n, p)$$ with $$E(X) = 4.8$$ and $$\\text{Var}(X) = 2.88$$. What's the cleanest strategy for finding $$n$$ and $$p$$? (3 steps)", "answer": "- Step 1: Divide the variance by the mean: $$\\frac{np(1-p)}{np} = 1 - p = \\frac{2.88}{4.8} = 0.6$$.\n- Step 2: So $$p = 1 - 0.6 = 0.4$$.\n- Step 3: Substitute back: $$n = E(X)/p = 4.8/0.4 = 12$$. Final answer: $$X \\sim B(12, 0.4)$$. The ratio trick $$1 - p = \\text{Var}/E$$ is the elegant shortcut — no quadratic needed.\n\nTakeaway: $$1 - p = \\text{Var}(X) / E(X)$$ is worth memorizing.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": true}, {"question": "If you know $$P(\\text{at least one success in 4 trials}) = 0.3439$$, how do you recover the per-trial probability $$p$$? (3 steps)", "answer": "- Step 1: Use the complement: $$P(X \\geq 1) = 1 - P(X = 0) = 0.3439$$, so $$P(X = 0) = 0.6561$$.\n- Step 2: For $$X \\sim B(4, p)$$: $$P(X = 0) = (1-p)^4$$. So $$(1-p)^4 = 0.6561$$.\n- Step 3: Take the fourth root: $$1 - p = (0.6561)^{1/4}$$. Recognizing $$0.6561 = 0.9^4$$: $$1 - p = 0.9$$, hence $$p = 0.1$$.\n\nTakeaway: \"At least one\" problems are best attacked via the complement — a recurring theme.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": true}, {"question": "Intuitively, why does the mean of a binomial scale linearly with $$n$$, but the standard deviation only scales with $$\\sqrt{n}$$? What does this say about accuracy as $$n$$ grows? (3 steps)", "answer": "- Step 1: Mean $$= np$$: doubling $$n$$ doubles the mean. Variance $$= np(1-p)$$: also doubles. But standard deviation $$= \\sqrt{np(1-p)}$$, which multiplies by $$\\sqrt{2}$$ when $$n$$ doubles — slower.\n- Step 2: The **relative fluctuation** (std dev / mean) is $$\\sqrt{(1-p)/(np)}$$, which *decreases* as $$n$$ grows, proportional to $$1/\\sqrt{n}$$.\n- Step 3: So larger samples give *proportionally tighter* estimates: doubling $$n$$ cuts relative uncertainty by $$\\sqrt{2}$$. This is the Law of Large Numbers — sample averages become increasingly accurate as samples grow.\n\nTakeaway: Mean scales like $$n$$, std dev scales like $$\\sqrt{n}$$ — the signature of summing independent variables.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "Conceptually, if you *double* $$n$$ in a binomial while keeping $$p$$ fixed, what happens to the expected count, the variance, and the standard deviation? (3 steps)", "answer": "- Step 1: **Mean** $$E(X) = np$$: doubles (e.g., from $$10p$$ to $$20p$$). Grows linearly in $$n$$.\n- Step 2: **Variance** $$\\text{Var}(X) = np(1-p)$$: also doubles. Scales linearly because independent variances add.\n- Step 3: **Standard deviation** $$\\sigma = \\sqrt{np(1-p)}$$: multiplied by $$\\sqrt{2} \\approx 1.41$$ — slower than the mean's doubling. So *relative* spread (coefficient of variation) shrinks.\n\nRule: mean $$\\propto n$$, variance $$\\propto n$$, std dev $$\\propto \\sqrt{n}$$ — remember for all binomial scaling questions.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": true}, {"question": "Sketch (in words) how the binomial distribution's shape changes as (a) $$n$$ increases with fixed $$p$$, and (b) $$p$$ sweeps from 0 to 1 with fixed $$n$$. (3 steps)", "answer": "- Step 1: **Increasing $$n$$ (fixed $$p$$):** the distribution widens in absolute range, but its shape becomes increasingly bell-like (approaching Normal — foreshadowing the Central Limit Theorem). Peak location shifts right because $$np$$ grows.\n- Step 2: **Small $$p$$ (fixed $$n$$):** distribution piled near 0, right-skewed (long right tail). Rare events pull mass left.\n- Step 3: **Large $$p$$ (fixed $$n$$):** mirror image — piled near $$n$$, left-skewed. At $$p = 0.5$$: perfectly symmetric about $$n/2$$. The distribution is self-dual under $$p \\leftrightarrow 1-p$$ and $$X \\leftrightarrow n - X$$.\n\nTakeaway: Large $$n$$ → Gaussian shape; $$p$$ away from 0.5 → skew.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": true}, {"question": "For a binomial with very small $$p$$ (say 0.04) and moderately large $$n$$ (say 50), why does the distribution look concentrated near zero with a thin right tail? (3 steps)", "answer": "- Step 1: Mean is $$np = 50 \\cdot 0.04 = 2$$, so most probability mass sits at small counts.\n- Step 2: $$X$$ can still reach up to 50 in principle, but those high values have probabilities that decay very fast — each extra success multiplies by roughly $$p/(1-p) \\approx 0.04$$, a tiny factor.\n- Step 3: The resulting shape is **strongly right-skewed**. This is the regime where the **Poisson approximation** kicks in: if $$p \\to 0$$ with $$np$$ held fixed, the binomial converges to a Poisson with mean $$np$$.\n\nTakeaway: Small-$$p$$ binomials are right-skewed and \"rare-event-like.\"", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": true}, {"question": "For a fair 5-sided spinner (outcomes 1–5), let $$X$$ = number of 5s obtained in 20 spins. Conceptually, how would you find the mean, standard deviation, and $$P(X < \\mu - \\sigma)$$? (4 steps)", "answer": "- Step 1: Probability of a 5 on any spin is $$0.2$$, so $$X \\sim B(20, 0.2)$$.\n- Step 2: Mean $$= np = 20 \\cdot 0.2 = 4$$. Variance $$= np(1-p) = 20 \\cdot 0.2 \\cdot 0.8 = 3.2$$. So $$\\sigma = \\sqrt{3.2} \\approx 1.79$$.\n- Step 3: The threshold $$\\mu - \\sigma \\approx 4 - 1.79 = 2.21$$. Since $$X$$ is integer-valued, $$P(X < 2.21) = P(X \\leq 2)$$.\n- Step 4: Look up $$P(X \\leq 2)$$ from the table for $$B(20, 0.2)$$. The key move: round a non-integer threshold *down* for \"$$<$$,\" giving a clean cumulative.\n\nTakeaway: Non-integer thresholds on a discrete variable always collapse to the nearest integer below (for \"$$<$$\") or at (for \"$$\\leq$$\").", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": true}, {"question": "A door-to-door salesman's success rate is 5%. How would you estimate the smallest $$n$$ of houses to visit so that $$P(\\text{at least one success}) > 0.99$$? (3 steps)", "answer": "- Step 1: Use the complement: $$P(\\text{at least one}) = 1 - P(\\text{zero}) = 1 - (0.95)^n$$.\n- Step 2: Set $$1 - 0.95^n > 0.99 \\iff 0.95^n < 0.01$$.\n- Step 3: Take logs: $$n \\log(0.95) < \\log(0.01)$$. Since $$\\log(0.95) < 0$$, the inequality flips when dividing: $$n > \\log(0.01)/\\log(0.95)$$. Numerically, this is about $$n > 90$$, so roughly 90 houses suffice.\n\nTakeaway: \"At least one\" problems are almost always easiest through the complement \"all zero.\"", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "For a spinner with $$P(\\text{red}) = 0.3$$, spun 12 times, you want the smallest $$r$$ such that $$P(X \\geq r) < 0.05$$. Describe the reasoning. (3 steps)", "answer": "- Step 1: Convert: $$P(X \\geq r) < 0.05 \\iff P(X \\leq r-1) > 0.95$$.\n- Step 2: Scan the cumulative table for $$B(12, 0.3)$$. The mean is $$np = 3.6$$, so start looking near $$r-1 = 4, 5, 6$$. The first value of $$r-1$$ where $$P(X \\leq r-1) > 0.95$$ determines the threshold.\n- Step 3: From the table (given values of $$P(X \\leq 5) \\approx 0.88$$ and $$P(X \\leq 6) \\approx 0.96$$), the first entry exceeding 0.95 is at $$r - 1 = 6$$, giving $$r = 7$$. So 7 or more reds crosses the 5% threshold.\n\nTakeaway: For \"tail probability < threshold\" problems, convert to \"cumulative > complement,\" then scan from the mean outward.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": false}, {"question": "Why is it almost always faster to compute $$P(\\text{more than 2 successes})$$ via the complement rather than direct summation? (3 steps)", "answer": "- Step 1: \"More than 2\" is $$X \\geq 3$$, which as a sum is $$P(X=3) + P(X=4) + \\cdots + P(X=n)$$ — potentially many terms.\n- Step 2: Via complement: $$P(X \\geq 3) = 1 - P(X \\leq 2) = 1 - [P(X=0) + P(X=1) + P(X=2)]$$ — just three terms (or one table lookup).\n- Step 3: The complement is especially efficient when the \"small\" side of the range has fewer terms than the \"large\" side. Cumulative tables make this even faster — one look-up replaces the sum entirely.\n\nTakeaway: Always compare the number of terms on both sides and use the complement when the small side has fewer terms.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "Explain why individual probabilities $$P(X = k)$$ and cumulative probabilities $$P(X \\leq k)$$ are conceptually different, and why the latter can be much larger. (2 steps)", "answer": "- Step 1: $$P(X = k)$$ is a single \"bar\" on the distribution — the probability of one exact value.\n- Step 2: $$P(X \\leq k) = P(X=0) + P(X=1) + \\cdots + P(X=k)$$ is the *accumulated* probability from 0 up to $$k$$. It's the area under all bars from the left up to bar $$k$$, so necessarily $$\\geq P(X=k)$$. They're only equal in the trivial case where $$P(X < k) = 0$$.\n\nTakeaway: Individual = point; cumulative = running total.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": true}, {"question": "You sample 10 residents from a large town where 30% listen to local radio. What's the implicit assumption that justifies a binomial model, and when might it fail? (3 steps)", "answer": "- Step 1: Implicit assumption: residents are **chosen independently** — one person's listening habits don't influence another's. This lets us treat each sampled person as a Bernoulli trial with $$p = 0.3$$.\n- Step 2: It would fail if the sample is *clustered* (e.g., all 10 living in the same household sharing family habits), or if there's positive social correlation among neighbors.\n- Step 3: Practically, \"random sample from a large population\" is code for \"effectively independent,\" so binomial applies. But if independence breaks, variance would be inflated (positive correlation) or deflated, invalidating $$np(1-p)$$.\n\nTakeaway: \"Large population + random sample\" is shorthand for \"independent trials.\"", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "A receptionist connects calls wrongly with probability 0.02, handling 500 calls per day. Why is the variance formula $$np(1-p)$$ approximately equal to the mean $$np$$ in this case? What does this foreshadow? (3 steps)", "answer": "- Step 1: Mean $$= 500 \\cdot 0.02 = 10$$. Variance $$= 500 \\cdot 0.02 \\cdot 0.98 = 9.8$$.\n- Step 2: The closeness happens because $$1 - p = 0.98 \\approx 1$$ when $$p$$ is very small. So $$\\text{Var}(X) = np(1-p) \\approx np = E(X)$$.\n- Step 3: This is the **Poisson limit**: when $$p$$ is small and $$n$$ is large with $$np$$ moderate, the binomial approximates the Poisson distribution, whose defining property is exactly \"mean = variance.\" This is a useful sanity check for when binomial is approximately Poisson.\n\nTakeaway: Small $$p$$ → variance ≈ mean → Poisson regime.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": true}, {"question": "An archer hits a bullseye with probability 0.6 per arrow, shooting 20 arrows. You want $$P(X \\geq 10)$$ but tables only list $$p \\leq 0.5$$. Describe the full strategy. (4 steps)", "answer": "- Step 1: $$X \\sim B(20, 0.6)$$. Since $$p = 0.6 > 0.5$$, direct table use is impossible.\n- Step 2: Define $$Y$$ = number of misses. Then $$Y \\sim B(20, 0.4)$$ — table-friendly.\n- Step 3: Convert: $$X \\geq 10 \\iff 20 - Y \\geq 10 \\iff Y \\leq 10$$.\n- Step 4: Look up $$P(Y \\leq 10)$$ for $$B(20, 0.4)$$. This gives the answer directly.\n\nTakeaway: Swapping success/failure and adjusting the inequality is the universal recipe for high-$$p$$ problems.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "Given $$P(\\text{at least one faulty in a sample of 4}) = 0.3439$$, find the mean and variance of faulty components in a day's production of 600. (4 steps)", "answer": "- Step 1: Use complement to find $$p$$: $$P(X = 0) = 1 - 0.3439 = 0.6561 = (1-p)^4$$, so $$1-p = 0.9$$, meaning $$p = 0.1$$.\n- Step 2: Define $$Y$$ = daily faulty count. With 600 independent components, $$Y \\sim B(600, 0.1)$$.\n- Step 3: Mean $$E(Y) = np = 600 \\cdot 0.1 = 60$$.\n- Step 4: Variance $$\\text{Var}(Y) = np(1-p) = 600 \\cdot 0.1 \\cdot 0.9 = 54$$. Sanity check: variance (54) < mean (60), consistent with binomial.\n\nTakeaway: Extract $$p$$ first from any given information, then apply the formulas for the full-production setting.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "You have data from 500 repeated binomial experiments with $$n=5$$. The observed mean of \"number of sixes per experiment\" is 1.008. How can you check if a binomial model fits and estimate $$p$$? (4 steps)", "answer": "- Step 1: Estimate $$\\hat{p} = \\bar{x}/n = 1.008/5 \\approx 0.2$$.\n- Step 2: Predict expected variance: $$n\\hat{p}(1-\\hat{p}) = 5 \\cdot 0.2 \\cdot 0.8 = 0.8$$. Compare this to the sample variance.\n- Step 3: Compute expected frequencies: $$500 \\cdot P(X = k)$$ for $$k = 0, \\ldots, 5$$ using $$B(5, 0.2)$$. Compare to observed counts.\n- Step 4: If expected frequencies closely match observed, and if sample variance ≈ 0.8, the binomial model fits. Large discrepancies (especially in the tails, or variance much bigger than 0.8) signal a poor fit.\n\nTakeaway: $$\\hat{p} = \\bar{x}/n$$ is the natural estimate; predicting counts and variance confirms the model.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": true}, {"question": "Why does the Law of Large Numbers feel inevitable when you think of a binomial as a sum of Bernoulli trials? (3 steps)", "answer": "- Step 1: Each Bernoulli trial contributes $$p$$ to the mean. The average $$X/n$$ has expected value $$np/n = p$$ — the true success rate.\n- Step 2: Variance of $$X/n$$ is $$\\text{Var}(X)/n^2 = p(1-p)/n$$, which *shrinks* as $$n$$ grows.\n- Step 3: So for large $$n$$, the sample proportion $$X/n$$ tightly concentrates around $$p$$ — the **Law of Large Numbers**. Intuitively: averaging many independent random variables cancels out noise, stabilizing the result.\n\nTakeaway: The key foundational insight — sample averages converge to true averages.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": true}, {"question": "A factory produces items with a 5% faulty rate. A sample of 50 is taken daily; the employee stops production if the number of faulty items exceeds some threshold $$d$$. Given the stop-rate should be under 5%, describe the strategy to find the smallest such $$d$$. (3 steps)", "answer": "- Step 1: Let $$X \\sim B(50, 0.05)$$. We want the smallest $$d$$ with $$P(X > d) < 0.05$$, equivalently $$P(X \\leq d) > 0.95$$.\n- Step 2: The mean is $$np = 2.5$$. Cumulative values like $$P(X \\leq 2)$$ will be close to the bulk; we scan upward from $$d = 2, 3, 4, \\ldots$$ until $$P(X \\leq d) > 0.95$$.\n- Step 3: Conceptually: $$d$$ must be well above the mean to put less than 5% probability in the right tail — somewhere roughly 2 standard deviations above the mean (where $$\\sigma = \\sqrt{50 \\cdot 0.05 \\cdot 0.95} \\approx 1.54$$). Expect $$d$$ in the range 5–6.\n\nTakeaway: \"Stop rate < threshold\" = cumulative-tail inequality, solved by incremental table lookup from the mean.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": false}, {"question": "Conceptually, why is the binomial distribution fully determined by just *two* parameters, and what does this imply for its flexibility as a model? (3 steps)", "answer": "- Step 1: Being a 2-parameter family means once $$n$$ and $$p$$ are fixed, every probability, the mean, the variance, and every quantile is determined. No further information is needed.\n- Step 2: This **parsimony** is powerful for inference: given data, you typically need to estimate only one unknown ($$p$$), since $$n$$ is usually set by the experimental design.\n- Step 3: But simplicity is also a **limitation**: not every 2-outcome counting process is truly binomial. If real data has variance bigger than $$np(1-p)$$ (overdispersion), richer models are needed (like the beta-binomial).\n\nTakeaway: 2-parameter simplicity is both strength (easy inference) and weakness (limited flexibility).", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": true}, {"question": "A genetic marker is present in 4% of a population. You sample $$n$$ random individuals. Which binomial assumptions require justification, and which are automatic? (4 steps)", "answer": "- Step 1: **Two outcomes**: each person has or lacks the marker — automatic.\n- Step 2: **Constant $$p$$**: 4% applies to each person only if the population is large and the sample is random. It would fail, for instance, if the sample were drawn from a subgroup known to carry the marker more often.\n- Step 3: **Independence**: assumes no genetic linkage. Sampling unrelated individuals is fine; sampling close relatives (who share DNA) breaks this.\n- Step 4: **Fixed $$n$$**: given by problem setup — automatic.\n\nSo the binomial $$B(n, 0.04)$$ is valid provided we have a random sample of unrelated people from a large population.\n\nTakeaway: The phrase \"random sample from a large population\" covers the core assumptions; always check for hidden dependencies (clusters, families, etc.).", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": true}, {"question": "Outline a full checklist for deciding whether to model a situation with a binomial distribution. (4 steps)", "answer": "- Step 1: **Check all four conditions**:\n+ Is the number of trials $$n$$ fixed in advance?\n+ Are there exactly two outcomes per trial?\n+ Is the success probability $$p$$ constant across trials?\n+ Are trials independent of each other?\n- Step 2: **Sanity-check with summary statistics**: compute sample mean and variance. For a binomial, expect mean $$\\approx np$$ and variance $$\\approx np(1-p) < np$$.\n- Step 3: **Compare expected vs. observed frequencies**: if the shape differs dramatically from a binomial's shape (e.g., bimodal, long heavy tail), the model is wrong.\n- Step 4: **Consider alternatives** when binomial fails:\n+ Random $$n$$ → geometric / negative binomial\n+ $$3+$$ outcomes → multinomial\n+ Sampling without replacement from small population → hypergeometric\n+ $$p$$ changing with previous outcomes → Markov chain / other\n\nTakeaway: The binomial model must be *justified*, not assumed. Always verify conditions and check the mean-variance consistency.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": true}, {"question": "A biased coin has $$P(\\text{head}) = 2/3$$ and is tossed 8 times. Conceptually, what would you compute for $$P(\\text{exactly 2 tails})$$ and what does each factor represent? (3 steps)", "answer": "- Step 1: Let $$X$$ = number of tails, so $$X \\sim B(8, 1/3)$$ (since $$P(\\text{tail}) = 1/3$$).\n- Step 2: $$P(X = 2) = \\binom{8}{2} (1/3)^2 (2/3)^6$$, where:\n+ $$\\binom{8}{2}$$ counts the $$28$$ possible positions for the 2 tails among 8 flips\n+ $$(1/3)^2$$ is the probability of those 2 specific tails\n+ $$(2/3)^6$$ is the probability of the other 6 positions being heads\n- Step 3: Conceptually: the mean number of tails is $$8/3 \\approx 2.67$$, so \"exactly 2\" is near the peak of the distribution and gets a moderate probability (around 0.27). Values far from the mean would have much smaller probabilities.\n\nTakeaway: The peak sits near the mean; values near the mean get the largest probabilities.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": true}, {"question": "Suppose you want the probability that the first tail appears on the 6th toss of a biased coin. Why is this *not* a binomial problem? (3 steps)", "answer": "- Step 1: The question asks \"at which trial does the first success occur?\" — the answer is a *trial number*, not a success count within a fixed number of trials.\n- Step 2: So the random quantity isn't $$X$$ = number of successes in $$n$$ trials. It's instead the *waiting time* — a different setup.\n- Step 3: This is a **geometric distribution**: $$P(\\text{first tail on trial } k) = (2/3)^{k-1} \\cdot (1/3)$$ — five heads in a row followed by a tail. The binomial and geometric are complementary: one fixes $$n$$; the other fixes the target-successes count.\n\nTakeaway: \"Trials until first success\" $$\\neq$$ \"successes in fixed trials.\" Different questions, different distributions.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": false}, {"question": "Explain conceptually why, for $$X \\sim B(48, 0.04)$$ (e.g., broken biscuits in a box), finding $$P(\\text{at least 2 broken})$$ is fastest via the complement. (3 steps)", "answer": "- Step 1: \"At least 2\" means $$X \\geq 2$$, equivalently $$1 - P(X \\leq 1) = 1 - [P(X=0) + P(X=1)]$$.\n- Step 2: That's just 2 probability evaluations vs. 47 terms for a direct sum ($$P(X=2) + P(X=3) + \\cdots + P(X=48)$$).\n- Step 3: The mean is $$np = 48 \\cdot 0.04 = 1.92$$, so \"at least 2\" is asking about mass slightly above the mean. Expect a moderate answer (somewhere in 0.4–0.5 range). The complement sidesteps the long sum.\n\nTakeaway: For \"at least $$k$$\" with small $$k$$, always go via the complement of \"at most $$k-1$$.\"", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": true}, {"question": "For $$X \\sim B(2n, 0.25)$$, describe the conceptual approach for finding the smallest $$n$$ such that $$P(X \\geq n) \\leq 0.1$$. (3 steps)", "answer": "- Step 1: Notice the mean $$E(X) = 2n \\cdot 0.25 = 0.5n$$, which is *always less than $$n$$*. So \"$$X \\geq n$$\" asks about the right tail — beyond the mean — and this tail shrinks as $$n$$ grows.\n- Step 2: Convert: $$P(X \\geq n) = 1 - P(X \\leq n - 1)$$, so we need $$P(X \\leq n-1) \\geq 0.9$$.\n- Step 3: Try $$n = 1, 2, 3, \\ldots$$ sequentially, looking up $$P(X \\leq n-1)$$ from the $$B(2n, 0.25)$$ table for each. Intuition: since $$n$$ sits $$\\sigma(X)/0.5n$$ above the mean, the condition is eventually met. Scan until the inequality first holds.\n\nTakeaway: When $$n$$ varies, you must check multiple distributions — the question mixes threshold and $$n$$ together.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": false}, {"question": "Why should you compare *expected frequencies* under a hypothesized binomial model to *observed frequencies* from real data? (2 steps)", "answer": "- Step 1: If $$X \\sim B(n, p)$$ is repeated $$N$$ times, the expected count for $$X = k$$ is $$N \\cdot \\binom{n}{k} p^k (1-p)^{n-k}$$. These are the \"theoretical\" counts.\n- Step 2: Comparing expected vs. observed frequencies reveals model fit. Close agreement supports the binomial; large discrepancies (especially in the tails) signal violations — perhaps dependence, varying $$p$$, or a different underlying distribution.\n\nTakeaway: Predicting counts and comparing to data is a direct, practical test of binomial validity.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": true}, {"question": "A driving test has 50 questions, each with 4 options. A student knows 32 answers and guesses the other 18. Conceptually, how would you find the probability she gets at least 43 total correct (passing threshold)? (3 steps)", "answer": "- Step 1: She needs at least $$43 - 32 = 11$$ correct from the 18 guesses. Each guess has probability $$1/4$$, and guesses are independent, so the number correct $$Y \\sim B(18, 0.25)$$.\n- Step 2: We want $$P(Y \\geq 11) = 1 - P(Y \\leq 10)$$.\n- Step 3: Intuitively this will be tiny — the expected number correct is $$18 \\cdot 0.25 = 4.5$$, so 11+ sits far in the right tail (several standard deviations out). Expect a very small probability, computed via table lookup of $$P(Y \\leq 10)$$.\n\nTakeaway: When the required count is far above the mean, the tail probability is tiny — the complement makes it tractable.", "source": "Opus 4.7 ①", "_id": "opus_1_55", "judge_pick": false}, {"question": "A coin is flipped 8 times with $$p = 0.5$$. The mode (most likely outcome) is at $$X = 4$$. Why is $$P(X = 4)$$ only *moderately* larger than, say, $$P(X = 3)$$ or $$P(X = 5)$$, rather than sharply peaked? (3 steps)", "answer": "- Step 1: The ratio $$\\frac{P(X=4)}{P(X=3)} = \\frac{\\binom{8}{4}}{\\binom{8}{3}} \\cdot \\frac{p}{1-p}$$. At $$p = 0.5$$, this is just $$\\frac{70}{56} = 1.25$$.\n- Step 2: So $$P(X=4)$$ is only 25% larger than $$P(X=3)$$ — the peak is not a sharp spike.\n- Step 3: Sharpness depends on how $$\\sigma$$ compares to the mean. Here $$\\sigma = \\sqrt{8 \\cdot 0.5 \\cdot 0.5} = \\sqrt{2} \\approx 1.41$$, a large fraction of the mean (4). Substantial probability lies within $$\\sigma$$ of the mode, so the distribution is broadly peaked rather than narrowly concentrated.\n\nTakeaway: When $$\\sigma/\\mu$$ is moderate, the distribution is visibly spread; when it's tiny (large $$n$$), the peak is sharper.", "source": "Opus 4.7 ①", "_id": "opus_1_56", "judge_pick": true}, {"question": "A bag contains balls in a fixed ratio, and you sample *with replacement* vs. *without replacement* from a *small* bag. Why is binomial exactly right in the first case but fails in the second? (3 steps)", "answer": "- Step 1: **With replacement**: every ball goes back before the next draw. The bag composition is restored, so $$p$$ is identical on every draw, and trials are independent. All binomial conditions are exactly met.\n- Step 2: **Without replacement (small bag)**: each draw depletes the stock. Drawing a red from 4 red + 6 blue leaves 3 red + 6 blue, shifting $$P(\\text{red})$$ from $$0.4$$ to $$0.333$$. Probability is not constant, and trials aren't independent (they share a common sample).\n- Step 3: The correct model in case 2 is the **hypergeometric distribution**. Binomial becomes a valid approximation only when the population is large enough that removing a few items barely affects $$p$$.\n\nTakeaway: Replacement $$\\iff$$ independence $$\\iff$$ binomial. Small populations break all three.", "source": "Opus 4.7 ①", "_id": "opus_1_57", "judge_pick": false}, {"question": "For a 15-plant tray where each plant has 25% chance of blue flowers, conceptually how would you find $$P(\\text{between 3 and 6 plants (inclusive) have blue flowers})$$? (3 steps)", "answer": "- Step 1: Let $$X$$ = number of blue-flowering plants, so $$X \\sim B(15, 0.25)$$. We want $$P(3 \\leq X \\leq 6)$$.\n- Step 2: Apply the range formula: $$P(3 \\leq X \\leq 6) = P(X \\leq 6) - P(X \\leq 2)$$. The lower bound is $$a = 3$$, so subtract up to $$a - 1 = 2$$.\n- Step 3: Both values can be looked up from a $$B(15, 0.25)$$ cumulative table. The mean is $$np = 3.75$$, so the range 3–6 is centered near the mode and captures a substantial chunk of the probability.\n\nTakeaway: Ranges always use \"upper cumulative minus (lower − 1) cumulative\"; the \"−1\" is the easy mistake to avoid.", "source": "Opus 4.7 ①", "_id": "opus_1_58", "judge_pick": false}, {"question": "Why does having $$\\text{Var}(X) > E(X)$$ in a data sample suggest the underlying process *isn't* truly binomial, and what might cause this \"overdispersion\"? (3 steps)", "answer": "- Step 1: For any binomial, $$\\text{Var}(X)/E(X) = 1 - p \\leq 1$$, i.e., variance is always at most equal to the mean (and usually strictly less).\n- Step 2: Observed variance *exceeding* the mean indicates the data is more spread out than binomial theory allows — a red flag.\n- Step 3: Common causes of overdispersion:\n+ **Heterogeneous $$p$$**: if $$p$$ varies between subgroups, overall variance inflates\n+ **Positive correlation between trials**: if successes cluster (e.g., contagion, family effects), variance grows\n+ **Batch effects** or omitted variables\n\nThe correct model might be a beta-binomial, a mixture, or something more complex than a single binomial.\n\nTakeaway: Overdispersion is diagnostic — it tells you the binomial's simplifying assumptions are violated.", "source": "Opus 4.7 ①", "_id": "opus_1_59", "judge_pick": false}], "count": 60}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "What four conditions must be satisfied for a random variable $$X$$ to be modelled by a binomial distribution $$B(n, p)$$, and what does each condition ensure about the structure of the problem? (4 steps)", "answer": "- Step 1: **Fixed number of trials** $$n$$. The experiment must be repeated a predetermined number of times. This is what makes the support of $$X$$ the set $$\\{0, 1, 2, \\ldots, n\\}$$ and why we can sum a finite number of probabilities. Without a fixed $$n$$, we'd have a different distribution (e.g., geometric, negative binomial).\n- Step 2: **Two possible outcomes per trial**: success and failure. Each trial is binary, which is why $$p$$ and $$1-p$$ fully describe the per-trial probability structure.\n- Step 3: **Constant probability of success** $$p$$ on every trial. This gives the \"identically distributed\" property — every trial has the same chance of success, so we can combine them with the same $$p$$.\n- Step 4: **Independent trials**. What happens on one trial doesn't affect another. This is what lets us multiply probabilities of specific sequences like $$p \\cdot p \\cdot (1-p) \\cdots$$ without correction terms.\n\nTakeaway: Together these four conditions make $$X$$ a sum of $$n$$ independent identically distributed Bernoulli trials — the essence of binomial.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": true}, {"question": "Why is it crucial that the number of trials $$n$$ is fixed *before* the experiment begins? Give an example that violates this and explain what goes wrong. (3 steps)", "answer": "- Step 1: If $$n$$ depends on the outcomes (e.g., \"keep flipping until we get 3 heads\"), then $$n$$ itself becomes a random variable rather than a parameter. The sample space of the count is no longer $$\\{0, 1, \\ldots, n\\}$$ — it's unbounded.\n- Step 2: Example: \"Flip a coin until you get 4 heads in a row, count the flips.\" Here the number of flips is not fixed; some experiments might take 4 flips, others 40. This is a geometric-type / negative binomial situation, not binomial.\n- Step 3: With a fixed $$n$$, the random variable counts successes out of $$n$$; with variable $$n$$, we're counting trials until a stopping condition, which is a fundamentally different structure.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "What does it mean for trials to be \"independent\" in a binomial context, and how would dependence between trials distort the probability formula $$\\binom{n}{r}p^r(1-p)^{n-r}$$? (3 steps)", "answer": "- Step 1: Independence means the outcome of one trial gives no information about any other trial. Formally, the probability of any specific sequence like (Success, Fail, Success) equals the product $$p \\cdot (1-p) \\cdot p$$.\n- Step 2: If trials are dependent, then the probability of a sequence is no longer the product of individual probabilities — we'd need conditional probabilities. The factor $$p^r(1-p)^{n-r}$$ is exactly the probability of one specific sequence of $$r$$ successes assuming independence.\n- Step 3: Without independence, different sequences with $$r$$ successes would have different probabilities, so the clean formula \"count × probability-per-sequence\" breaks. The combinatorial coefficient $$\\binom{n}{r}$$ counts sequences, but only makes sense when every such sequence is equally likely.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "Why must the probability of success $$p$$ remain constant across all trials, and what kind of real-world situation typically violates this? (3 steps)", "answer": "- Step 1: Constant $$p$$ means every trial is drawn from the same underlying \"coin\". This makes all the Bernoulli trials identically distributed, allowing us to use a single parameter $$p$$ for the whole experiment.\n- Step 2: Violation example: sampling without replacement from a small bag of sweets. After a strawberry sweet is removed, the proportion of strawberry sweets in the bag changes, so $$p$$ on trial 2 differs from $$p$$ on trial 1.\n- Step 3: If $$p$$ varies, the formula would need $$p_1 p_2 \\cdots p_n$$-type expressions instead of $$p^r(1-p)^{n-r}$$, and the clean power structure collapses. The distribution would become a more complex object (called a Poisson-binomial).", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": true}, {"question": "The binomial require
