<script>
const DATA={"selected": [{"question": "A genetic marker is present in 4% of a population. You sample $$n$$ random individuals. Which binomial assumptions require justification, and which are automatic? (4 steps)", "answer": "- Step 1: **Two outcomes**: each person has or lacks the marker — automatic.\n- Step 2: **Constant $$p$$**: 4% applies to each person only if the population is large and the sample is random. It would fail, for instance, if the sample were drawn from a subgroup known to carry the marker more often.\n- Step 3: **Independence**: assumes no genetic linkage. Sampling unrelated individuals is fine; sampling close relatives (who share DNA) breaks this.\n- Step 4: **Fixed $$n$$**: given by problem setup — automatic.\n\nSo the binomial $$B(n, 0.04)$$ is valid provided we have a random sample of unrelated people from a large population.\n\nTakeaway: The phrase \"random sample from a large population\" covers the core assumptions; always check for hidden dependencies (clusters, families, etc.).", "source": "Opus 4.7 ①", "_id": "opus_1_48"}, {"question": "A biased coin has $$P(\\text{head}) = 2/3$$ and is tossed 8 times. Conceptually, what would you compute for $$P(\\text{exactly 2 tails})$$ and what does each factor represent? (3 steps)", "answer": "- Step 1: Let $$X$$ = number of tails, so $$X \\sim B(8, 1/3)$$ (since $$P(\\text{tail}) = 1/3$$).\n- Step 2: $$P(X = 2) = \\binom{8}{2} (1/3)^2 (2/3)^6$$, where:\n+ $$\\binom{8}{2}$$ counts the $$28$$ possible positions for the 2 tails among 8 flips\n+ $$(1/3)^2$$ is the probability of those 2 specific tails\n+ $$(2/3)^6$$ is the probability of the other 6 positions being heads\n- Step 3: Conceptually: the mean number of tails is $$8/3 \\approx 2.67$$, so \"exactly 2\" is near the peak of the distribution and gets a moderate probability (around 0.27). Values far from the mean would have much smaller probabilities.\n\nTakeaway: The peak sits near the mean; values near the mean get the largest probabilities.", "source": "Opus 4.7 ①", "_id": "opus_1_50"}, {"question": "What is the standard deviation of $$X \\sim B(n, p)$$, and why might we prefer $$\\sigma$$ over $$\\sigma^2$$ in practice? (2 steps)", "answer": "- Step 1: $$\\sigma = \\sqrt{\\operatorname{Var}(X)} = \\sqrt{np(1-p)}$$.\n- Step 2: Standard deviation has the same units as $$X$$ itself (in this case, a dimensionless count), making it directly comparable to the mean. Variance has \"squared units\" that are harder to interpret. \"$$\\mu \\pm \\sigma$$\" gives a natural range of typical outcomes, whereas $$\\mu \\pm \\sigma^2$$ doesn't make dimensional sense.", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "Why does $$E(X_1 + X_2 + \\cdots + X_n) = E(X_1) + E(X_2) + \\cdots + E(X_n)$$ hold even WITHOUT independence, but $$\\operatorname{Var}(X_1 + \\cdots + X_n) = \\operatorname{Var}(X_1) + \\cdots + \\operatorname{Var}(X_n)$$ requires independence? (3 steps)", "answer": "- Step 1: Expectation is a linear operator, period. $$E$$ respects addition regardless of any relationship between variables, because expectation is an integral/sum, and integrals distribute over addition.\n- Step 2: Variance involves squared deviations. In general, $$\\operatorname{Var}(X + Y) = \\operatorname{Var}(X) + \\operatorname{Var}(Y) + 2\\operatorname{Cov}(X, Y)$$. The covariance term captures how $$X$$ and $$Y$$ move together.\n- Step 3: If $$X$$ and $$Y$$ are independent, $$\\operatorname{Cov}(X, Y) = 0$$, so variance becomes additive. If they're positively correlated, the sum has MORE variance than the sum of individual variances; if negatively correlated, LESS.\n\nTakeaway: Linearity of expectation is universal; additivity of variance needs independence.", "source": "Opus 4.7 ②", "_id": "opus_2_27"}, {"question": "Explain why individual probabilities $$P(X = k)$$ and cumulative probabilities $$P(X \\leq k)$$ are conceptually different, and why the latter can be much larger. (2 steps)", "answer": "- Step 1: $$P(X = k)$$ is a single \"bar\" on the distribution — the probability of one exact value.\n- Step 2: $$P(X \\leq k) = P(X=0) + P(X=1) + \\cdots + P(X=k)$$ is the *accumulated* probability from 0 up to $$k$$. It's the area under all bars from the left up to bar $$k$$, so necessarily $$\\geq P(X=k)$$. They're only equal in the trivial case where $$P(X < k) = 0$$.\n\nTakeaway: Individual = point; cumulative = running total.", "source": "Opus 4.7 ①", "_id": "opus_1_39"}, {"question": "What is a Bernoulli trial? What are the expected value (mean) and variance of a single Bernoulli trial with probability of success $$p$$? (3 steps)", "answer": "- Step 1: A Bernoulli trial is a single random experiment with exactly two possible outcomes: \"success\" (value 1) with probability $$p$$, and \"failure\" (value 0) with probability $$1-p$$.\n- Step 2: The expected value is $$E(X) = \\sum x P(X=x) = (1 \\times p) + (0 \\times (1-p)) = p$$.\n- Step 3: The variance is $$Var(X) = E(X^2) - [E(X)]^2$$. Since $$1^2 = 1$$ and $$0^2 = 0$$, $$E(X^2) = p$$. Thus, $$Var(X) = p - p^2 = p(1-p)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_9"}, {"question": "Derive the formula $$E(X) = np$$ for $$X \\sim B(n, p)$$ using the Bernoulli decomposition. (3 steps)", "answer": "- Step 1: Write $$X = X_1 + X_2 + \\cdots + X_n$$ where each $$X_i$$ is a Bernoulli trial with $$E(X_i) = p$$.\n- Step 2: By linearity of expectation: $$E(X) = E(X_1) + E(X_2) + \\cdots + E(X_n) = p + p + \\cdots + p = np$$.\n- Step 3: Intuition: If on each of $$n$$ trials you expect $$p$$ successes \"on average\", summing gives total expected successes = $$np$$. This works even though each $$X_i$$ is 0 or 1 — expectation can be a non-integer like 3.6 even when the variable itself only takes integer values.\n\nTakeaway: The mean of a binomial is just the per-trial expected contribution times the number of trials.", "source": "Opus 4.7 ②", "_id": "opus_2_28"}, {"question": "Derive $$\\operatorname{Var}(X) = np(1-p)$$ for $$X \\sim B(n, p)$$ using the Bernoulli decomposition, and explain where independence enters. (4 steps)", "answer": "- Step 1: Write $$X = X_1 + X_2 + \\cdots + X_n$$, where each $$X_i$$ is an independent Bernoulli with $$\\operatorname{Var}(X_i) = p(1-p)$$.\n- Step 2: **Because the trials are independent**, variance is additive: $$\\operatorname{Var}(X) = \\operatorname{Var}(X_1) + \\operatorname{Var}(X_2) + \\cdots + \\operatorname{Var}(X_n)$$.\n- Step 3: Each term equals $$p(1-p)$$, so summing $$n$$ of them: $$\\operatorname{Var}(X) = n \\cdot p(1-p) = np(1-p)$$.\n- Step 4: If the trials were dependent (e.g., sampling without replacement from a small bag), we'd get covariance terms and the answer would differ.\n\nTakeaway: Independence is doing the work of setting covariances to zero.", "source": "Opus 4.7 ②", "_id": "opus_2_29"}, {"question": "A student claims that for X ~ B(10, 0.1), P(X = 0) = 0.9¹⁰ = 0.3487. Is this correct? If not, what is the correct calculation? (2 steps)", "answer": "- Step 1: The student's calculation is incorrect — they've calculated (1-p)^n but missed the binomial coefficient.\n- Step 2: The correct calculation: $\\mathrm{P}(X=0) = \\binom{10}{0} p^0 (1-p)^{10} = 1 × 1 × 0.9^{10} = 0.9^{10} ≈ 0.3487$\n\nWait, that gives the same answer! Let me recalculate... Actually, the student got lucky — for X = 0, the binomial coefficient is 1, so it happens to be correct here. But this is a common trap: for X = 1, 2, 3, etc., the binomial coefficient is critical. For example, P(X=1) = 10 × 0.1 × 0.9⁹ = 0.3874, not 0.1 × 0.9⁹.", "source": "MiniMax ②", "_id": "minimax_2_18"}, {"question": "In the probability formula P(X=r) = nCr p^r q^(n-r), what does the nCr term represent conceptually? Why is it necessary? (2 steps)", "answer": "- Step 1: The binomial coefficient nCr (read as \"n choose r\") represents the number of different ways to arrange r successes among n trials.\n- Step 2: It's necessary because there are many different paths through the probability tree that lead to the same outcome of r successes. For example, with n=3 and r=2, you could get success on trials (1,2), (1,3), or (2,3) — three different arrangements, all giving 2 successes. Each path has probability p²q, so total probability is 3 × p²q = ³C₂ p²q.\n\nWithout this coefficient, we'd be counting only one arrangement and would get the wrong probability.", "source": "MiniMax ②", "_id": "minimax_2_33"}, {"question": "When checking the appropriateness of a binomial model, what are three key questions you should ask about the situation? (3 points)", "answer": "- Step 1: Do we have a fixed number of trials n? (Is it predetermined how many times we'll repeat the experiment?)\n- Step 2: Are there exactly two possible outcomes for each trial? (If there are more than two, binomial doesn't apply directly)\n- Step 3: Is the probability of success constant? And are the trials independent? (This is often the trickiest — watch out for sampling without replacement from small populations)\n\nThese three questions form the checklist for binomial model selection.", "source": "MiniMax ②", "_id": "minimax_2_32"}, {"question": "What is the difference between P(X ≤ x) and P(X < x) for a discrete binomial random variable X? (2 steps)", "answer": "- Step 1: For discrete distributions, these are NOT the same:\n  + $\\mathrm{P}(X \\leq x)$ includes all values from 0 up to and including x.\n  + $\\mathrm{P}(X < x)$ includes all values from 0 up to but NOT including x.\n- Step 2: Specifically: $\\mathrm{P}(X < x) = \\mathrm{P}(X \\leq x-1)$ for integer x.\n\nThis distinction matters critically when reading questions — \"fewer than 5\" means P(X < 5) = P(X ≤ 4), while \"at most 5\" means P(X ≤ 5).", "source": "MiniMax ②", "_id": "minimax_2_4"}, {"question": "Why does the variance of a binomial distribution, $np(1-p)$, depend on both n and p?", "answer": "- Step 1: Variance measures spread. For fixed n, spread is maximized when p=0.5 (symmetrical distribution) and minimized when p→0 or p→1 (extreme skewness). The term p(1-p) captures this curvature.\n- Step 2: For fixed p, increasing n increases variance linearly, as more trials mean more variability in total successes.\n+ Example: A coin flip (n=1, p=0.5) has variance 0.25, while 100 flips (n=100, p=0.5) has variance 25.", "source": "Qwen 3 ①", "_id": "qwen_1_3"}, {"question": "The binomial requires \"two outcomes.\" How can we still apply it to a scenario with three real-world outcomes, e.g., traffic lights being red, orange, or green? (3 steps)", "answer": "- Step 1: The two outcomes only need to be \"success\" and \"not success\" — we're free to collapse multiple outcomes into one category.\n- Step 2: For the traffic lights: if we want to count \"wait or stop\" (red OR orange), then define success = {red or orange}, with $$p = 0.48 + 0.04 = 0.52$$. Failure = green, with probability $$0.48$$.\n+ The three-way outcome is now re-framed as a two-way outcome.\n+ This works as long as the thing we care about is a yes/no question.\n- Step 3: If we needed to count red, orange, and green separately, binomial wouldn't suffice — we'd need a *multinomial* distribution. The key is that binomial is about one specific success criterion.", "source": "Opus 4.7 ②", "_id": "opus_2_4"}, {"question": "In a binomial $$X \\sim B(3, p)$$, write out the full probability distribution table in terms of $$p$$, and use it to verify $$E(X) = 3p$$ and $$\\operatorname{Var}(X) = 3p(1-p)$$. (4 steps)", "answer": "- Step 1: The probabilities are:\n\n| $$x$$ | 0 | 1 | 2 | 3 |\n|---|---|---|---|---|\n| $$P(X = x)$$ | $$(1-p)^3$$ | $$3p(1-p)^2$$ | $$3p^2(1-p)$$ | $$p^3$$ |\n\n- Step 2: $$E(X) = \\sum x \\cdot P(X = x) = 0 + 3p(1-p)^2 + 6p^2(1-p) + 3p^3 = 3p[(1-p)^2 + 2p(1-p) + p^2] = 3p[(1-p) + p]^2 = 3p$$.\n- Step 3: $$E(X^2) = 0 + 3p(1-p)^2 + 12p^2(1-p) + 9p^3$$. With algebra, this simplifies to $$3p(1 + 2p) = 3p + 6p^2$$.\n- Step 4: $$\\operatorname{Var}(X) = E(X^2) - [E(X)]^2 = 3p + 6p^2 - 9p^2 = 3p - 3p^2 = 3p(1-p)$$. ✓\n\nTakeaway: The formulas $$E(X) = np, \\operatorname{Var}(X) = np(1-p)$$ can be verified directly from the distribution table — no need to always rely on the Bernoulli sum argument.", "source": "Opus 4.7 ②", "_id": "opus_2_57"}, {"question": "If the binomial formula had no combinatorial factor — just $$p^r(1-p)^{n-r}$$ — why would the probabilities fail to sum to 1? (3 steps)", "answer": "- Step 1: Without $$\\binom{n}{r}$$, the sum would be $$\\sum_{r=0}^{n} p^r (1-p)^{n-r}$$, which is a sum of $$n+1$$ identical-looking but unequal terms.\n- Step 2: By the binomial theorem, the correct sum of $$\\binom{n}{r} p^r (1-p)^{n-r}$$ is $$(p + (1-p))^n = 1$$. Removing the $$\\binom{n}{r}$$ factor breaks this identity.\n- Step 3: Without the combinatorial weights, we'd be undercounting — each probability reflects only one specific ordering, not the total over all arrangements. The combinatorial factor is exactly what scales individual sequence probabilities to event probabilities.\n\nTakeaway: $$\\binom{n}{r}$$ is not cosmetic — it's what makes the distribution actually sum to 1.", "source": "Opus 4.7 ②", "_id": "opus_2_59"}, {"question": "Why do the probabilities $$P(X=0), P(X=1), \\ldots, P(X=n)$$ for a binomial distribution always sum to 1 — without ever computing them? (2 steps)", "answer": "- Step 1: The sum is $$\\sum_{r=0}^{n} \\binom{n}{r} p^r (1-p)^{n-r}$$, which is the binomial expansion of $$(p + (1-p))^n$$.\n- Step 2: But $$p + (1-p) = 1$$, and $$1^n = 1$$. So the sum of all probabilities is automatically 1, regardless of the specific value of $$p$$.\n\nThis is a structural guarantee, not something that needs to be checked case-by-case.", "source": "Opus 4.7 ②", "_id": "opus_2_8"}, {"question": "For a fixed $$n$$, at what value of $$p$$ is $$\\operatorname{Var}(X) = np(1-p)$$ maximized? Why is this intuitive? (3 steps)", "answer": "- Step 1: $$\\operatorname{Var}(X) = np(1-p)$$ is an inverted parabola in $$p$$, maximized when $$p = 0.5$$ with value $$\\frac{n}{4}$$.\n- Step 2: Intuitively, when $$p = 0.5$$, every trial is maximally uncertain — a fair coin flip. The sum inherits this uncertainty.\n- Step 3: When $$p$$ is close to 0 or 1, trials are nearly deterministic. Almost all successes (or almost all failures), so the count doesn't vary much. Variance goes to 0 at the extremes.\n\nTakeaway: Unpredictability peaks at \"50/50\"; certainty dampens variance.", "source": "Opus 4.7 ②", "_id": "opus_2_32"}, {"question": "A company produces 120 boxes of biscuits per day. Each biscuit has $$p = 0.04$$ of being broken, and each box has 48 biscuits. The variable of interest is the number of boxes with at least 2 broken biscuits. Why is this a *nested* binomial structure, and how do we handle it? (4 steps)", "answer": "- Step 1: First-level binomial: Within one box, $$X \\sim B(48, 0.04)$$ counts broken biscuits. Compute $$q = P(X \\geq 2) = 1 - P(X \\leq 1)$$, which becomes the \"success\" probability per box.\n- Step 2: Second-level binomial: Let $$Y$$ = number of boxes (out of 120) with at least 2 broken biscuits. Then $$Y \\sim B(120, q)$$.\n- Step 3: The key insight: the \"success\" at the box level is itself an event computed from a binomial inside each box. Compute $$q$$ first, then plug into the outer binomial.\n- Step 4: Compute $$E(Y) = 120 q$$ and $$\\operatorname{Var}(Y) = 120 q(1-q)$$. The two binomials stack cleanly because boxes are independent.\n\nTakeaway: Nested binomials are common — identify the two levels, compute the inner probability, then apply it as $$p$$ in the outer binomial.", "source": "Opus 4.7 ②", "_id": "opus_2_56"}, {"question": "Outline a full checklist for deciding whether to model a situation with a binomial distribution. (4 steps)", "answer": "- Step 1: **Check all four conditions**:\n+ Is the number of trials $$n$$ fixed in advance?\n+ Are there exactly two outcomes per trial?\n+ Is the success probability $$p$$ constant across trials?\n+ Are trials independent of each other?\n- Step 2: **Sanity-check with summary statistics**: compute sample mean and variance. For a binomial, expect mean $$\\approx np$$ and variance $$\\approx np(1-p) < np$$.\n- Step 3: **Compare expected vs. observed frequencies**: if the shape differs dramatically from a binomial's shape (e.g., bimodal, long heavy tail), the model is wrong.\n- Step 4: **Consider alternatives** when binomial fails:\n+ Random $$n$$ → geometric / negative binomial\n+ $$3+$$ outcomes → multinomial\n+ Sampling without replacement from small population → hypergeometric\n+ $$p$$ changing with previous outcomes → Markov chain / other\n\nTakeaway: The binomial model must be *justified*, not assumed. Always verify conditions and check the mean-variance consistency.", "source": "Opus 4.7 ①", "_id": "opus_1_49"}, {"question": "Intuitively, why does the binomial distribution require trials to be *independent*? What would break in the formula $$\\binom{n}{r}p^r(1-p)^{n-r}$$ without independence? (3 steps)", "answer": "- Step 1: The factor $$p^r(1-p)^{n-r}$$ represents the probability of one specific sequence of $$r$$ successes and $$n-r$$ failures — this product form only holds because independent events multiply.\n- Step 2: If trials are dependent (e.g., sampling without replacement from a small bag), the probability of success changes based on prior outcomes. There's no longer a single $$p$$ to raise to the power $$r$$.\n- Step 3: Dependence also breaks the symmetry — different orderings of successes and failures would give different probabilities, so we couldn't just multiply by $$\\binom{n}{r}$$ to count arrangements. Independence guarantees all sequences with $$r$$ successes have *equal* probability.\n\nTakeaway: Independence = \"each trial is a clean, isolated Bernoulli event with probability $$p$$.\"", "source": "Opus 4.7 ①", "_id": "opus_1_1"}, {"question": "A random process counts \"the number of roulette spins until I win for the first time.\" Why is this *not* binomial, even though each spin has fixed probability and is independent? (3 steps)", "answer": "- Step 1: The four binomial conditions include \"fixed number of trials $$n$$.\" Here, the number of spins is random — you stop when you first win.\n- Step 2: Since $$n$$ isn't predetermined, the binomial formula doesn't apply. The quantity of interest is a *waiting time*, not a success count.\n- Step 3: This is modeled by the **geometric distribution**, where $$P(\\text{first win on spin } k) = (1-p)^{k-1} p$$. The binomial and geometric are complementary views: one fixes $$n$$ and asks about successes; the other fixes the target and asks about trials.", "source": "Opus 4.7 ①", "_id": "opus_1_11"}, {"question": "Why is the binomial distribution symmetric when $ p = 0.5 $, but skewed otherwise?", "answer": "- When $ p = 0.5 $: Success and failure are equally likely, mirroring the symmetry of the binomial coefficients $ \\binom{n}{r} = \\binom{n}{n-r} $.  \n- When $ p > 0.5 $: The distribution is skewed left (more successes).  \n- When $ p < 0.5 $: The distribution is skewed right (fewer successes).  \n- **Mathematical Basis**: The term $ p^r (1-p)^{n-r} $ favors higher $ r $ for $ p > 0.5 $ and lower $ r $ for $ p < 0.5 $, creating skewness.  \n\n**Takeaway:**  \nSymmetry hinges on equal $ p $ and $ 1-p $; skewness emerges when they differ.", "source": "Qwen 3 ②", "_id": "qwen_2_8"}, {"question": "When computing $$P(X = 3)$$ for $$X \\sim B(5, p)$$, are we finding the probability of a single specific sequence like $$SSSFF$$, or the combined probability of all sequences with 3 successes? Why does this distinction matter? (3 steps)", "answer": "- Step 1: We are finding the *combined* probability of **all** sequences with exactly 3 successes. There are $$\\binom{5}{3} = 10$$ such sequences.\n- Step 2: Each individual sequence has probability $$p^3(1-p)^2$$, but the event \"$$X = 3$$\" means \"any arrangement of 3 successes,\" which combines all 10 sequences.\n- Step 3: Missing the $$\\binom{n}{r}$$ factor is the most common binomial mistake — it amounts to computing the probability of a single outcome and calling it the probability of a count. Always ask: \"am I counting arrangements, or just one arrangement?\"", "source": "Opus 4.7 ②", "_id": "opus_2_10"}, {"question": "How is the binomial distribution structurally related to the algebraic expansion of $$(p + q)^n$$ where $$q = 1 - p$$? (3 steps)", "answer": "- Step 1: The binomial theorem states $$(p+q)^n = \\sum_{r=0}^{n} \\binom{n}{r} p^r q^{n-r}$$. Each term in this expansion has the form $$\\binom{n}{r} p^r q^{n-r}$$.\n- Step 2: This is *identical* to the binomial probability formula $$P(X = r) = \\binom{n}{r} p^r (1-p)^{n-r}$$. So expanding $$(p+q)^n$$ literally generates every binomial probability as one of its terms.\n- Step 3: Since $$p + q = 1$$, we get $$(p+q)^n = 1^n = 1$$, which confirms that all the probabilities $$P(X = 0) + P(X = 1) + \\cdots + P(X = n) = 1$$ as any probability distribution must.\n\nTakeaway: The binomial distribution is literally the probabilistic interpretation of the binomial expansion — the name is not a coincidence.", "source": "Opus 4.7 ②", "_id": "opus_2_7"}, {"question": "Show that for any binomial, $$\\operatorname{Var}(X) \\leq E(X)$$, with equality only when $$p = 0$$. What can we infer if real-world data has variance much greater than its mean? (3 steps)", "answer": "- Step 1: $$\\operatorname{Var}(X) = np(1-p) = np - np^2 = E(X) - np^2$$. Since $$np^2 \\geq 0$$, we have $$\\operatorname{Var}(X) \\leq E(X)$$.\n- Step 2: Equality $$\\operatorname{Var}(X) = E(X)$$ requires $$np^2 = 0$$, i.e., $$p = 0$$ (trivially no successes) or $$n = 0$$.\n- Step 3: If observed data shows variance $$\\gg$$ mean, the data is \"overdispersed\" relative to binomial. This could mean the true process has heterogeneous $$p$$, contagion (dependence), or follows a different distribution (e.g., negative binomial, clustered data).\n\nTakeaway: Binomial data always has variance smaller than or equal to mean. Overdispersion is a diagnostic for non-binomial behaviour.", "source": "Opus 4.7 ②", "_id": "opus_2_33"}, {"question": "Standard binomial cumulative tables typically only list values of $$p$$ up to $$0.5$$. Why stop there, and how can we still use the table when $$p > 0.5$$? (3 steps)", "answer": "- Step 1: By the symmetry of success/failure, $$B(n, p)$$ and $$B(n, 1-p)$$ are related: if $$X \\sim B(n, p)$$ counts successes, then $$Y = n - X \\sim B(n, 1-p)$$ counts failures.\n- Step 2: So any question about $$X$$ with $$p > 0.5$$ can be rephrased as a question about $$Y$$ with a probability $$1-p < 0.5$$, which IS in the table.\n- Step 3: This halves the size of the table without losing information — a practical efficiency trick. Tables could include $$p > 0.5$$, but it would be redundant given this symmetry.", "source": "Opus 4.7 ②", "_id": "opus_2_17"}, {"question": "What four conditions must be satisfied for a random variable $$X$$ to be modelled by a binomial distribution $$B(n, p)$$, and what does each condition ensure about the structure of the problem? (4 steps)", "answer": "- Step 1: **Fixed number of trials** $$n$$. The experiment must be repeated a predetermined number of times. This is what makes the support of $$X$$ the set $$\\{0, 1, 2, \\ldots, n\\}$$ and why we can sum a finite number of probabilities. Without a fixed $$n$$, we'd have a different distribution (e.g., geometric, negative binomial).\n- Step 2: **Two possible outcomes per trial**: success and failure. Each trial is binary, which is why $$p$$ and $$1-p$$ fully describe the per-trial probability structure.\n- Step 3: **Constant probability of success** $$p$$ on every trial. This gives the \"identically distributed\" property — every trial has the same chance of success, so we can combine them with the same $$p$$.\n- Step 4: **Independent trials**. What happens on one trial doesn't affect another. This is what lets us multiply probabilities of specific sequences like $$p \\cdot p \\cdot (1-p) \\cdots$$ without correction terms.\n\nTakeaway: Together these four conditions make $$X$$ a sum of $$n$$ independent identically distributed Bernoulli trials — the essence of binomial.", "source": "Opus 4.7 ②", "_id": "opus_2_0"}, {"question": "Anna argues: \"In 3 coin flips the probability of exactly 2 heads is $$(1/2)^2 \\times (1/2) = 1/8$$ because each flip is independent with probability $$1/2$$.\" What's the error? (3 steps)", "answer": "- Step 1: Anna computed the probability of **one specific ordering** of 2 heads and 1 tail, e.g., HHT. This gives $$1/8$$ correctly for that sequence.\n- Step 2: The event \"exactly 2 heads\" includes all orderings: HHT, HTH, THH. Each of these has probability $$1/8$$.\n- Step 3: Correct answer: $$\\binom{3}{2} \\cdot (1/2)^2 \\cdot (1/2) = 3 \\cdot 1/8 = 3/8$$. The missing factor is the number of arrangements.\n\nTakeaway: For \"exactly $$r$$ successes\" problems, always include $$\\binom{n}{r}$$ to account for the multiplicity of orderings.", "source": "Opus 4.7 ②", "_id": "opus_2_42"}, {"question": "What's wrong with the following statement? \"A binomial distribution can model the number of times you need to roll a die until you get a six.\" Explain why this is not binomial and what distribution would be appropriate. (2 steps)", "answer": "- Step 1: The problem is that there's no fixed number of trials n. You keep rolling until a condition is met, so the number of trials is random.\n- Step 2: This is a geometric distribution problem, not binomial. The geometric distribution models the number of trials needed to get the first success. Other related distributions include the negative binomial (number of trials to get r successes) and the Poisson (for rare events over continuous intervals).\n\nThis is a common misconception that tests understanding of what \"fixed number of trials\" really means.", "source": "MiniMax ②", "_id": "minimax_2_23"}, {"question": "Why does the Law of Large Numbers feel inevitable when you think of a binomial as a sum of Bernoulli trials? (3 steps)", "answer": "- Step 1: Each Bernoulli trial contributes $$p$$ to the mean. The average $$X/n$$ has expected value $$np/n = p$$ — the true success rate.\n- Step 2: Variance of $$X/n$$ is $$\\text{Var}(X)/n^2 = p(1-p)/n$$, which *shrinks* as $$n$$ grows.\n- Step 3: So for large $$n$$, the sample proportion $$X/n$$ tightly concentrates around $$p$$ — the **Law of Large Numbers**. Intuitively: averaging many independent random variables cancels out noise, stabilizing the result.\n\nTakeaway: The key foundational insight — sample averages converge to true averages.", "source": "Opus 4.7 ①", "_id": "opus_1_45"}, {"question": "What does it mean for a binomial random variable to have a \"large number\" of items in the population when sampling without replacement? Why does this allow the binomial model to still apply? (2 steps)", "answer": "- Step 1: When sampling without replacement, the probability of success technically changes after each draw (because you're removing items). However, if the population is \"large enough,\" this change is negligible.\n- Step 2: The key insight: With a large population, removing a few items doesn't meaningfully change the proportion of successes remaining. We can treat each draw as having approximately the same probability p, satisfying the \"fixed probability\" condition for binomial. The rule of thumb is that the sample should be no more than 5-10% of the population.", "source": "MiniMax ②", "_id": "minimax_2_9"}, {"question": "In a binomial model, why is it crucial that trials are independent and the probability of success is constant? What kind of real-world scenario violates these? (3 steps)", "answer": "- Step 1: If trials are not independent, the outcome of one trial changes the probability of success for the next. For example, drawing cards without replacement from a small deck changes the composition of the deck, thus altering $$p$$ for the next draw.\n- Step 2: If $$p$$ is not constant, we cannot use a single parameter to describe the distribution; we would need a different $$p_i$$ for each trial $$i$$, which breaks the binomial formula entirely.\n- Step 3: Real-world scenarios violating these include: drawing items from a small batch without replacement (violates both independence and constant $$p$$), or a sports player whose confidence changes after a successful shot (violates independence/constant $$p$$).", "source": "GLM 5.1 ②", "_id": "glm_2_1"}, {"question": "If $$X \\sim B(10, 0.7)$$, explain how to redefine a new variable $$Y$$ so that you can compute $$P(X \\leq 6)$$ using a table that only goes up to $$p = 0.5$$. (4 steps)", "answer": "- Step 1: Define $$Y = 10 - X$$, the number of failures. Then $$Y \\sim B(10, 0.3)$$, which is in the table.\n- Step 2: Translate the event: $$X \\leq 6$$ is equivalent to $$10 - X \\geq 4$$, i.e., $$Y \\geq 4$$.\n+ Intuition: If $$X$$ successes is at most 6, then failures $$Y = 10 - X$$ is at least $$10 - 6 = 4$$.\n- Step 3: Compute $$P(Y \\geq 4) = 1 - P(Y \\leq 3)$$.\n- Step 4: Look up $$P(Y \\leq 3)$$ in the table at $$n = 10, p = 0.3$$, then subtract from 1. This gives the required probability for the original question about $$X$$.\n\nTakeaway: Flip the \"count what's rare\" perspective to use the tabulated side.", "source": "Opus 4.7 ②", "_id": "opus_2_18"}, {"question": "In a binomial with $$n = 40, p = 0.10$$, roughly how many values of $$X$$ carry most of the probability? What is the practical implication? (3 steps)", "answer": "- Step 1: Mean $$= np = 4$$. SD $$= \\sqrt{40 \\times 0.1 \\times 0.9} = \\sqrt{3.6} \\approx 1.9$$.\n- Step 2: Most probability (by the empirical \"68%-95%-99.7%\" rule, which approximately applies to near-normal binomials) lies within $$\\mu \\pm 2\\sigma \\approx 4 \\pm 3.8$$, i.e., values 0 to 8 or so.\n- Step 3: Practically: even though $$X$$ could be any value from 0 to 40, values above ~10 are vanishingly rare, and most daily outcomes will be between 1 and 7. For tail questions, tables for $$P(X \\leq 10)$$ already give essentially 1.\n\nTakeaway: The effective range of a binomial is only about $$6\\sigma$$ wide, much smaller than $$n$$ when $$p$$ is small.", "source": "Opus 4.7 ②", "_id": "opus_2_63"}, {"question": "How would you adjust a binomial problem to use tables when $ p > 0.5 $?", "answer": "- Step 1: Redefine the problem by swapping \"success\" and \"failure\". Let $ Y \\sim B(n, 1-p) $, where $ Y $ counts failures in the original problem.  \n- Step 2: Translate the original $ X $ (successes) into $ Y $: $ P(X \\leq x) = P(Y \\geq n - x) $.  \n- Step 3: Use complement rules: $ P(Y \\geq n - x) = 1 - P(Y \\leq n - x - 1) $.  \n- **Example**: For $ X \\sim B(10, 0.7) $, $ P(X \\leq 6) = P(Y \\geq 4) = 1 - P(Y \\leq 3) $, with $ Y \\sim B(10, 0.3) $.  \n\n**Takeaway:**  \nTables are often limited to $ p \\leq 0.5 $, but redefining the random variable allows their use.", "source": "Qwen 3 ②", "_id": "qwen_2_9"}, {"question": "Explain conceptually why, for $$X \\sim B(48, 0.04)$$ (e.g., broken biscuits in a box), finding $$P(\\text{at least 2 broken})$$ is fastest via the complement. (3 steps)", "answer": "- Step 1: \"At least 2\" means $$X \\geq 2$$, equivalently $$1 - P(X \\leq 1) = 1 - [P(X=0) + P(X=1)]$$.\n- Step 2: That's just 2 probability evaluations vs. 47 terms for a direct sum ($$P(X=2) + P(X=3) + \\cdots + P(X=48)$$).\n- Step 3: The mean is $$np = 48 \\cdot 0.04 = 1.92$$, so \"at least 2\" is asking about mass slightly above the mean. Expect a moderate answer (somewhere in 0.4–0.5 range). The complement sidesteps the long sum.\n\nTakeaway: For \"at least $$k$$\" with small $$k$$, always go via the complement of \"at most $$k-1$$.\"", "source": "Opus 4.7 ①", "_id": "opus_1_52"}, {"question": "How do you compute $$P(a \\leq X \\leq b)$$ using a cumulative table for integers $$a < b$$? (2 steps)", "answer": "- Step 1: Split the range: $$\\{a, a+1, \\ldots, b\\} = \\{0, 1, \\ldots, b\\} \\setminus \\{0, 1, \\ldots, a-1\\}$$. So $$P(a \\leq X \\leq b) = P(X \\leq b) - P(X \\leq a-1)$$.\n- Step 2: The \"$$-1$$\" is critical: the lower bound is *inclusive*, so subtract up to $$a-1$$ (not $$a$$), or you'll wrongly exclude $$X = a$$. For example, $$P(2 \\leq X \\leq 7) = P(X \\leq 7) - P(X \\leq 1)$$.\n\nTakeaway: Off-by-one errors are the most common binomial mistake — always check which endpoint is included.", "source": "Opus 4.7 ①", "_id": "opus_1_15"}, {"question": "Why must the probability of success $$p$$ remain constant across all trials, and what kind of real-world situation typically violates this? (3 steps)", "answer": "- Step 1: Constant $$p$$ means every trial is drawn from the same underlying \"coin\". This makes all the Bernoulli trials identically distributed, allowing us to use a single parameter $$p$$ for the whole experiment.\n- Step 2: Violation example: sampling without replacement from a small bag of sweets. After a strawberry sweet is removed, the proportion of strawberry sweets in the bag changes, so $$p$$ on trial 2 differs from $$p$$ on trial 1.\n- Step 3: If $$p$$ varies, the formula would need $$p_1 p_2 \\cdots p_n$$-type expressions instead of $$p^r(1-p)^{n-r}$$, and the clean power structure collapses. The distribution would become a more complex object (called a Poisson-binomial).", "source": "Opus 4.7 ②", "_id": "opus_2_3"}, {"question": "A receptionist connects calls wrongly with probability 0.02, handling 500 calls per day. Why is the variance formula $$np(1-p)$$ approximately equal to the mean $$np$$ in this case? What does this foreshadow? (3 steps)", "answer": "- Step 1: Mean $$= 500 \\cdot 0.02 = 10$$. Variance $$= 500 \\cdot 0.02 \\cdot 0.98 = 9.8$$.\n- Step 2: The closeness happens because $$1 - p = 0.98 \\approx 1$$ when $$p$$ is very small. So $$\\text{Var}(X) = np(1-p) \\approx np = E(X)$$.\n- Step 3: This is the **Poisson limit**: when $$p$$ is small and $$n$$ is large with $$np$$ moderate, the binomial approximates the Poisson distribution, whose defining property is exactly \"mean = variance.\" This is a useful sanity check for when binomial is approximately Poisson.\n\nTakeaway: Small $$p$$ → variance ≈ mean → Poisson regime.", "source": "Opus 4.7 ①", "_id": "opus_1_41"}, {"question": "When is it inappropriate to use the binomial distribution, even if the scenario seems to involve \"successes\" and \"failures\"?", "answer": "- **Non-independent trials**: If the probability of success changes based on prior outcomes (e.g., drawing cards without replacement from a small deck).  \n- **Variable number of trials**: If the number of trials isn’t fixed (e.g., flipping a coin until 3 heads occur).  \n- **More than two outcomes**: If each trial can result in more than two outcomes (e.g., rolling a die with outcomes 1-6).  \n- **Time-dependent probabilities**: If the success probability $ p $ isn’t constant over time (e.g., a die that becomes biased with wear).  \n\n**Takeaway:**  \nThe binomial model fails when real-world dependencies, variability, or multiple outcomes violate its strict assumptions.", "source": "Qwen 3 ②", "_id": "qwen_2_3"}, {"question": "You're given $$X \\sim B(n, p)$$ with $$E(X) = 4.8$$ and $$\\text{Var}(X) = 2.88$$. What's the cleanest strategy for finding $$n$$ and $$p$$? (3 steps)", "answer": "- Step 1: Divide the variance by the mean: $$\\frac{np(1-p)}{np} = 1 - p = \\frac{2.88}{4.8} = 0.6$$.\n- Step 2: So $$p = 1 - 0.6 = 0.4$$.\n- Step 3: Substitute back: $$n = E(X)/p = 4.8/0.4 = 12$$. Final answer: $$X \\sim B(12, 0.4)$$. The ratio trick $$1 - p = \\text{Var}/E$$ is the elegant shortcut — no quadratic needed.\n\nTakeaway: $$1 - p = \\text{Var}(X) / E(X)$$ is worth memorizing.", "source": "Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "In the context of binomial distribution, what does it mean for two events to be \"mutually exclusive\" versus \"independent\"? How do these concepts apply to binomial trials? (3 steps)", "answer": "- Step 1: Mutually exclusive (disjoint): Two events cannot happen at the same time. For binomial, \"success\" and \"failure\" are mutually exclusive outcomes for any single trial.\n- Step 2: Independent: The outcome of one trial does not affect the outcome of another. This is a key condition for binomial — each of the n trials must be independent.\n- Step 3: These are different concepts! \"Mutually exclusive\" describes outcomes within a single trial, while \"independence\" describes relationships between different trials. A binomial trial can have mutually exclusive outcomes (success/failure) AND each trial is independent of all others.\n\nUnderstanding this distinction is crucial for proper model selection.", "source": "MiniMax ②", "_id": "minimax_2_28"}, {"question": "Derive the variance $$\\operatorname{Var}(X_1) = p(1-p)$$ of a single Bernoulli trial. At what value of $$p$$ is this variance maximized? (3 steps)", "answer": "- Step 1: Use $$\\operatorname{Var}(X_1) = E(X_1^2) - [E(X_1)]^2$$. Since $$X_1 \\in \\{0, 1\\}$$, we have $$X_1^2 = X_1$$, so $$E(X_1^2) = E(X_1) = p$$.\n- Step 2: Substitute: $$\\operatorname{Var}(X_1) = p - p^2 = p(1 - p)$$.\n- Step 3: To find the maximum, note that $$p(1-p)$$ is a downward parabola in $$p$$, maximized at $$p = 0.5$$ with value $$0.25$$.\n+ At $$p = 0$$ or $$p = 1$$, the outcome is deterministic, so variance is 0.\n+ At $$p = 0.5$$, the outcome is maximally unpredictable, so variance peaks.\n\nTakeaway: Uncertainty is highest when success and failure are equally likely.", "source": "Opus 4.7 ②", "_id": "opus_2_26"}, {"question": "When converting between $$X$$-events and $$Y$$-events (where $$Y = n - X$$), why does \"$$X \\leq k$$\" become \"$$Y \\geq n - k$$\"? (2 steps)", "answer": "- Step 1: Start with $$X \\leq k$$. Substitute $$X = n - Y$$: $$n - Y \\leq k$$.\n- Step 2: Rearrange by adding $$Y$$ and subtracting $$k$$ from both sides: $$Y \\geq n - k$$. The inequality direction flips because we moved $$Y$$ across, effectively multiplying by $$-1$$ conceptually.\n\nSo for $$n=10, X \\leq 6$$: $$Y \\geq 4$$, which as a cumulative is $$1 - P(Y \\leq 3)$$.\n\nTakeaway: Successes and failures sum to $$n$$, so their thresholds swap ends.", "source": "Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "A random variable $$X \\sim B(15, 0.3)$$. Explain how you would calculate $$P(X > 10)$$, and argue whether this probability will be very close to 0 or close to 1 without doing the math. (3 steps)", "answer": "- Step 1: To calculate $$P(X > 10)$$, translate it to cumulative notation using the complement rule: $$1 - P(X \\le 10)$$.\n- Step 2: Consider the expected value. The mean is $$np = 15 \\times 0.3 = 4.5$$. The standard deviation is roughly $$\\sqrt{15 \\times 0.3 \\times 0.7} \\approx 1.77$$.\n- Step 3: The value 10 is more than 3 standard deviations above the mean ($$4.5 + 3 \\times 1.77 = 9.81$$). In a binomial distribution, outcomes this far from the mean are extremely rare. Therefore, $$P(X > 10)$$ will be very close to 0.", "source": "GLM 5.1 ③", "_id": "glm_3_25"}, {"question": "For a fair 5-sided spinner (outcomes 1–5), let $$X$$ = number of 5s obtained in 20 spins. Conceptually, how would you find the mean, standard deviation, and $$P(X < \\mu - \\sigma)$$? (4 steps)", "answer": "- Step 1: Probability of a 5 on any spin is $$0.2$$, so $$X \\sim B(20, 0.2)$$.\n- Step 2: Mean $$= np = 20 \\cdot 0.2 = 4$$. Variance $$= np(1-p) = 20 \\cdot 0.2 \\cdot 0.8 = 3.2$$. So $$\\sigma = \\sqrt{3.2} \\approx 1.79$$.\n- Step 3: The threshold $$\\mu - \\sigma \\approx 4 - 1.79 = 2.21$$. Since $$X$$ is integer-valued, $$P(X < 2.21) = P(X \\leq 2)$$.\n- Step 4: Look up $$P(X \\leq 2)$$ from the table for $$B(20, 0.2)$$. The key move: round a non-integer threshold *down* for \"$$<$$,\" giving a clean cumulative.\n\nTakeaway: Non-integer thresholds on a discrete variable always collapse to the nearest integer below (for \"$$<$$\") or at (for \"$$\\leq$$\").", "source": "Opus 4.7 ①", "_id": "opus_1_35"}, {"question": "For a binomial random variable $$X$$, why is $$P(X < 6) = P(X \\leq 5)$$? Does this identity hold for continuous distributions too? (2 steps)", "answer": "- Step 1: The binomial is **discrete**, taking only integer values. The set of integers strictly less than 6 is $$\\{0, 1, 2, 3, 4, 5\\}$$ — identical to the set \"less than or equal to 5.\"\n- Step 2: For continuous distributions (e.g., Normal), $$P(X < 6) = P(X \\leq 6)$$ because $$P(X = 6) = 0$$ (single points have zero probability). But the discrete trick of shifting by 1 only works for integer-valued variables.\n\nRule: For discrete $$X$$, $$P(X < k) = P(X \\leq k-1)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_13"}, {"question": "Conceptually, if you *double* $$n$$ in a binomial while keeping $$p$$ fixed, what happens to the expected count, the variance, and the standard deviation? (3 steps)", "answer": "- Step 1: **Mean** $$E(X) = np$$: doubles (e.g., from $$10p$$ to $$20p$$). Grows linearly in $$n$$.\n- Step 2: **Variance** $$\\text{Var}(X) = np(1-p)$$: also doubles. Scales linearly because independent variances add.\n- Step 3: **Standard deviation** $$\\sigma = \\sqrt{np(1-p)}$$: multiplied by $$\\sqrt{2} \\approx 1.41$$ — slower than the mean's doubling. So *relative* spread (coefficient of variation) shrinks.\n\nRule: mean $$\\propto n$$, variance $$\\propto n$$, std dev $$\\propto \\sqrt{n}$$ — remember for all binomial scaling questions.", "source": "Opus 4.7 ①", "_id": "opus_1_32"}, {"question": "Describe the intuition behind this problem: \"Find the smallest $$n$$ such that $$P(X \\geq n) \\leq 0.1$$ where $$X \\sim B(2n, 0.25)$$.\" What makes it tricky? (4 steps)", "answer": "- Step 1: Notice that both the number of trials ($$2n$$) and the threshold ($$n$$) depend on $$n$$ — so changing $$n$$ changes both the distribution AND the event.\n- Step 2: The mean of $$X$$ is $$2n \\times 0.25 = 0.5n$$, so \"the number of successes being at least $$n$$\" means at least twice the mean. This is asking how often $$X$$ is well above average.\n- Step 3: As $$n$$ grows, the distribution concentrates relatively more tightly near its mean $$0.5n$$, so the event $$X \\geq n$$ (which is in the upper tail) becomes rarer.\n- Step 4: Strategy: Try small $$n$$ values, compute $$P(X \\geq n) = 1 - P(X \\leq n - 1)$$ using tables at $$n_\\text{trials} = 2n$$, and find the smallest $$n$$ where this drops below 0.1.\n\nTakeaway: When the parameter appears in both $$n$$ and threshold, you can't isolate — you iterate.", "source": "Opus 4.7 ②", "_id": "opus_2_52"}, {"question": "A student models the number of red cars passing a junction in an hour as $$B(60, 0.2)$$. Critically assess the assumption of independence in this model. (3 steps)", "answer": "- Step 1: The binomial model assumes each trial (each car passing) is independent. However, traffic often travels in convoys or is influenced by traffic lights.\n- Step 2: If a red light stops traffic, the next few cars are not independent; if one stops, the others are highly likely to stop too. Also, cars from the same household (e.g., a family with two red cars) might travel together.\n- Step 3: Therefore, while the binomial model might be a useful approximation, the independence assumption is likely violated in reality due to traffic flow dynamics.", "source": "GLM 5.1 ②", "_id": "glm_2_19"}, {"question": "For a binomial with very small $$p$$ (say 0.04) and moderately large $$n$$ (say 50), why does the distribution look concentrated near zero with a thin right tail? (3 steps)", "answer": "- Step 1: Mean is $$np = 50 \\cdot 0.04 = 2$$, so most probability mass sits at small counts.\n- Step 2: $$X$$ can still reach up to 50 in principle, but those high values have probabilities that decay very fast — each extra success multiplies by roughly $$p/(1-p) \\approx 0.04$$, a tiny factor.\n- Step 3: The resulting shape is **strongly right-skewed**. This is the regime where the **Poisson approximation** kicks in: if $$p \\to 0$$ with $$np$$ held fixed, the binomial converges to a Poisson with mean $$np$$.\n\nTakeaway: Small-$$p$$ binomials are right-skewed and \"rare-event-like.\"", "source": "Opus 4.7 ①", "_id": "opus_1_34"}, {"question": "A common mistake is to write $$\\operatorname{Var}(X) = np$$ or $$\\operatorname{Var}(X) = np^2$$ for $$X \\sim B(n, p)$$. Why are both wrong, and what's the correct form plus intuition? (3 steps)", "answer": "- Step 1: Neither form captures the true structure. The correct answer is $$\\operatorname{Var}(X) = np(1-p)$$.\n- Step 2: $$np$$ is actually the *mean*, not the variance. Confusing the two forgets the role of uncertainty. $$np^2$$ misses the \"$$(1-p)$$\" factor entirely.\n- Step 3: Intuition: variance depends on *both* failure and success probabilities. At $$p = 1$$, all trials succeed (zero variance), so the formula must vanish there. $$np(1-p)$$ correctly returns 0 at $$p = 0$$ AND $$p = 1$$, whereas $$np^2$$ wouldn't.\n\nTakeaway: Variance is \"inherent uncertainty per trial × number of trials\", where per-trial uncertainty is maximized at balance.", "source": "Opus 4.7 ②", "_id": "opus_2_41"}, {"question": "Conceptually, why is the binomial distribution fully determined by just *two* parameters, and what does this imply for its flexibility as a model? (3 steps)", "answer": "- Step 1: Being a 2-parameter family means once $$n$$ and $$p$$ are fixed, every probability, the mean, the variance, and every quantile is determined. No further information is needed.\n- Step 2: This **parsimony** is powerful for inference: given data, you typically need to estimate only one unknown ($$p$$), since $$n$$ is usually set by the experimental design.\n- Step 3: But simplicity is also a **limitation**: not every 2-outcome counting process is truly binomial. If real data has variance bigger than $$np(1-p)$$ (overdispersion), richer models are needed (like the beta-binomial).\n\nTakeaway: 2-parameter simplicity is both strength (easy inference) and weakness (limited flexibility).", "source": "Opus 4.7 ①", "_id": "opus_1_47"}, {"question": "In a binomial distribution, the trials must be independent. Give a practical example where this independence condition fails, and explain how it affects the probability of success in subsequent trials. (2 steps)", "answer": "- Step 1: Independence means the outcome of one trial does not affect the probability of success in any other trial.\n- Step 2: A classic example of failure is drawing cards from a standard deck without replacement. If you draw an Ace on the first trial, the probability of drawing an Ace on the second trial decreases because there are fewer Aces left in the deck. The first trial directly affects the probability of success in the second, violating independence.", "source": "GLM 5.1 ③", "_id": "glm_3_1"}, {"question": "Consider a question where the number of successes in 15 spins is recorded, and the variance of the *data* is much larger than $$np(1-p)$$ predicted by the binomial model. What does this suggest about the modelling assumption? (3 steps)", "answer": "- Step 1: Under the binomial, theoretical variance is exactly $$np(1-p)$$. If observed variance greatly exceeds this, the data is overdispersed.\n- Step 2: Possible explanations: (a) $$p$$ is not constant across spins (e.g., the spinner is gradually wearing down, or conditions change); (b) spins are not independent (e.g., the previous outcome biases the next); (c) there are hidden sub-populations with different $$p$$'s.\n- Step 3: The binomial model may not be appropriate. We'd consider alternatives like beta-binomial (for heterogeneous $$p$$) or allow for dependence structures.\n\nTakeaway: Comparing observed to expected variance is a simple diagnostic for whether a binomial model fits.", "source": "Opus 4.7 ②", "_id": "opus_2_61"}, {"question": "You need to find the smallest value of $$r$$ such that $$P(X \\ge r) < 0.05$$. Explain the step-by-step strategy to find $$r$$ using a cumulative probability table without doing heavy calculations. (3 steps)", "answer": "- Step 1: First, rewrite the inequality $$P(X \\ge r) < 0.05$$ using the complement rule, which aligns with how cumulative tables are structured: $$1 - P(X \\le r-1) < 0.05$$, which rearranges to $$P(X \\le r-1) > 0.95$$.\n- Step 2: Look up the cumulative probabilities in the table for the given $$n$$ and $$p$$. Scan down the list of values for $$x$$.\n- Step 3: Find the first value of $$x$$ where the cumulative probability $$P(X \\le x)$$ exceeds 0.95. This value of $$x$$ corresponds to $$r-1$$. Therefore, add 1 to this $$x$$ to find the smallest value of $$r$$ that satisfies the original condition.", "source": "GLM 5.1 ③", "_id": "glm_3_12"}, {"question": "Why should you compare *expected frequencies* under a hypothesized binomial model to *observed frequencies* from real data? (2 steps)", "answer": "- Step 1: If $$X \\sim B(n, p)$$ is repeated $$N$$ times, the expected count for $$X = k$$ is $$N \\cdot \\binom{n}{k} p^k (1-p)^{n-k}$$. These are the \"theoretical\" counts.\n- Step 2: Comparing expected vs. observed frequencies reveals model fit. Close agreement supports the binomial; large discrepancies (especially in the tails) signal violations — perhaps dependence, varying $$p$$, or a different underlying distribution.\n\nTakeaway: Predicting counts and comparing to data is a direct, practical test of binomial validity.", "source": "Opus 4.7 ①", "_id": "opus_1_54"}, {"question": "A student proposes that \"since E(X) and Var(X) are both positive multiples of $$n$$, they grow at the same rate.\" Is this claim subtle but wrong? Explain. (3 steps)", "answer": "- Step 1: Both $$E(X) = np$$ and $$\\operatorname{Var}(X) = np(1-p)$$ are linear in $$n$$ with fixed $$p$$. So in that sense, yes — they grow proportionally, both $$\\propto n$$.\n- Step 2: But the *standard deviation* $$\\sigma = \\sqrt{np(1-p)}$$ grows as $$\\sqrt{n}$$, slower than $$n$$. Relative spread $$\\sigma/\\mu \\propto 1/\\sqrt{n}$$ shrinks.\n- Step 3: So while mean and variance both scale linearly, the distribution becomes *relatively* more concentrated as $$n$$ grows. The student's statement hides an important scaling insight: you need variance's square root (i.e., SD) to compare apples to apples with the mean.\n\nTakeaway: Mean and variance scale together, but SD grows slower than mean — that's why bigger samples are more precise.", "source": "Opus 4.7 ②", "_id": "opus_2_51"}, {"question": "In the binomial probability distribution table (e.g., for $$X \\sim B(5, p)$$), what is the relationship between consecutive row entries for a fixed $$p$$? Why are cumulative values monotonically non-decreasing? (3 steps)", "answer": "- Step 1: Each cumulative entry $$P(X \\leq x)$$ adds a non-negative probability $$P(X = x)$$ to the previous entry $$P(X \\leq x-1)$$. So the sequence is non-decreasing.\n- Step 2: The last row (for $$x = n$$) must equal 1, since $$X$$ cannot exceed $$n$$.\n- Step 3: The differences between consecutive cumulative entries *are* the individual probabilities: $$P(X = x) = P(X \\leq x) - P(X \\leq x - 1)$$. This lets you extract individual probabilities from a cumulative table.\n\nTakeaway: Cumulative tables implicitly contain all individual probabilities — you just subtract neighbours.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "Why is the formula $$\\binom{n}{r} p^r (1-p)^{n-r}$$ symmetric under swapping \"success\" and \"failure\"? What does this mean about distributions $$B(n, p)$$ and $$B(n, 1-p)$$? (3 steps)", "answer": "- Step 1: If we swap the meaning of success and failure, $$p$$ and $$1-p$$ swap, and \"$$r$$ successes\" becomes \"$$r$$ failures\", which equals \"$$n-r$$ new successes\".\n- Step 2: Applying this: $$P_\\text{old}(X = r) = P_\\text{new}(X = n - r)$$. The distribution is \"mirrored\" around the centre.\n- Step 3: Formally: if $$X \\sim B(n, p)$$, then $$Y = n - X \\sim B(n, 1-p)$$. This is exactly why tables only need $$p \\leq 0.5$$ — the other half is a mirror image.\n\nTakeaway: The binomial has a built-in symmetry between success and failure.", "source": "Opus 4.7 ②", "_id": "opus_2_50"}, {"question": "Sketch (in words) how the binomial distribution's shape changes as (a) $$n$$ increases with fixed $$p$$, and (b) $$p$$ sweeps from 0 to 1 with fixed $$n$$. (3 steps)", "answer": "- Step 1: **Increasing $$n$$ (fixed $$p$$):** the distribution widens in absolute range, but its shape becomes increasingly bell-like (approaching Normal — foreshadowing the Central Limit Theorem). Peak location shifts right because $$np$$ grows.\n- Step 2: **Small $$p$$ (fixed $$n$$):** distribution piled near 0, right-skewed (long right tail). Rare events pull mass left.\n- Step 3: **Large $$p$$ (fixed $$n$$):** mirror image — piled near $$n$$, left-skewed. At $$p = 0.5$$: perfectly symmetric about $$n/2$$. The distribution is self-dual under $$p \\leftrightarrow 1-p$$ and $$X \\leftrightarrow n - X$$.\n\nTakeaway: Large $$n$$ → Gaussian shape; $$p$$ away from 0.5 → skew.", "source": "Opus 4.7 ①", "_id": "opus_1_33"}, {"question": "You have data from 500 repeated binomial experiments with $$n=5$$. The observed mean of \"number of sixes per experiment\" is 1.008. How can you check if a binomial model fits and estimate $$p$$? (4 steps)", "answer": "- Step 1: Estimate $$\\hat{p} = \\bar{x}/n = 1.008/5 \\approx 0.2$$.\n- Step 2: Predict expected variance: $$n\\hat{p}(1-\\hat{p}) = 5 \\cdot 0.2 \\cdot 0.8 = 0.8$$. Compare this to the sample variance.\n- Step 3: Compute expected frequencies: $$500 \\cdot P(X = k)$$ for $$k = 0, \\ldots, 5$$ using $$B(5, 0.2)$$. Compare to observed counts.\n- Step 4: If expected frequencies closely match observed, and if sample variance ≈ 0.8, the binomial model fits. Large discrepancies (especially in the tails, or variance much bigger than 0.8) signal a poor fit.\n\nTakeaway: $$\\hat{p} = \\bar{x}/n$$ is the natural estimate; predicting counts and variance confirms the model.", "source": "Opus 4.7 ①", "_id": "opus_1_44"}, {"question": "Consider a binomial random variable $$X \\sim B(n, p)$$. Describe the behavior of the distribution in the edge cases where $$p = 0$$ and $$p = 1$$. What is the probability distribution table for each case? (2 steps)", "answer": "- Step 1: If $$p = 0$$, success is impossible. The random variable $$X$$ (number of successes) will always be 0. The distribution is entirely concentrated at $$X=0$$, so $$P(X=0) = 1$$ and all other probabilities are 0.\n- Step 2: If $$p = 1$$, success is certain. The random variable $$X$$ will always equal $$n$$ (the number of trials). The distribution is entirely concentrated at $$X=n$$, so $$P(X=n) = 1$$ and all other probabilities are 0. In both edge cases, there is absolutely no uncertainty, so the variance is 0.", "source": "GLM 5.1 ③", "_id": "glm_3_7"}, {"question": "Why does the variance of a binomial grow linearly with $$n$$ (as $$np(1-p)$$), not quadratically? (3 steps)", "answer": "- Step 1: The binomial is a sum of $$n$$ **independent** Bernoulli trials. For independent random variables, variances add.\n- Step 2: Adding $$n$$ copies of \"$$p(1-p)$$\" gives total variance $$np(1-p)$$, which grows linearly in $$n$$.\n- Step 3: Quadratic growth would appear if the trials were positively correlated — if they all moved together. But independence prevents that. In contrast, the mean $$np$$ also grows linearly in $$n$$, and so the standard deviation $$\\sigma = \\sqrt{np(1-p)}$$ grows like $$\\sqrt{n}$$ — slower than the mean.\n\nTakeaway: The \"$$\\sqrt{n}$$\" scaling of uncertainty vs \"$$n$$\" scaling of the mean is why averages become more predictable as sample sizes grow.", "source": "Opus 4.7 ②", "_id": "opus_2_31"}, {"question": "What is the meaning of the notation $$X \\sim B(n, p)$$? What do we call $$n$$ and $$p$$?", "answer": "The symbol $$\\sim$$ means \"is distributed as\". So $$X \\sim B(n, p)$$ reads: \"the random variable $$X$$ follows a binomial distribution with parameters $$n$$ and $$p$$.\" Here $$n$$ is the number of independent trials, sometimes called the **index**, and $$p$$ is the probability of success on a single trial, sometimes called the **parameter**. The pair $$(n, p)$$ fully determines the distribution — knowing them is enough to compute every probability $$P(X = r)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_9"}, {"question": "If you know $$P(\\text{at least one success in 4 trials}) = 0.3439$$, how do you recover the per-trial probability $$p$$? (3 steps)", "answer": "- Step 1: Use the complement: $$P(X \\geq 1) = 1 - P(X = 0) = 0.3439$$, so $$P(X = 0) = 0.6561$$.\n- Step 2: For $$X \\sim B(4, p)$$: $$P(X = 0) = (1-p)^4$$. So $$(1-p)^4 = 0.6561$$.\n- Step 3: Take the fourth root: $$1 - p = (0.6561)^{1/4}$$. Recognizing $$0.6561 = 0.9^4$$: $$1 - p = 0.9$$, hence $$p = 0.1$$.\n\nTakeaway: \"At least one\" problems are best attacked via the complement — a recurring theme.", "source": "Opus 4.7 ①", "_id": "opus_1_30"}, {"question": "For a random variable $$X \\sim B(10, p)$$ with $$\\operatorname{Var}(X) = 2.4$$, there are two possible values of $$p$$. Why, and what does this tell you about variance as a function of $$p$$? (3 steps)", "answer": "- Step 1: $$np(1-p) = 2.4$$ with $$n = 10$$ gives $$p(1-p) = 0.24$$. Solving: $$p^2 - p + 0.24 = 0$$, factor $$(p - 0.4)(p - 0.6) = 0$$. So $$p = 0.4$$ or $$p = 0.6$$.\n- Step 2: The two values are reflections around $$p = 0.5$$: $$p$$ and $$1 - p$$.\n- Step 3: This reflects the symmetry of variance in $$p$$ and $$1-p$$. From a variance-alone perspective, you cannot distinguish a distribution with $$p = 0.4$$ from one with $$p = 0.6$$ — they have identical spread. The mean would distinguish them (4 vs 6), but the variance alone is ambiguous.\n\nTakeaway: Variance alone is blind to the $$p \\leftrightarrow 1-p$$ symmetry.", "source": "Opus 4.7 ②", "_id": "opus_2_54"}, {"question": "A coin is flipped 8 times with $$p = 0.5$$. The mode (most likely outcome) is at $$X = 4$$. Why is $$P(X = 4)$$ only *moderately* larger than, say, $$P(X = 3)$$ or $$P(X = 5)$$, rather than sharply peaked? (3 steps)", "answer": "- Step 1: The ratio $$\\frac{P(X=4)}{P(X=3)} = \\frac{\\binom{8}{4}}{\\binom{8}{3}} \\cdot \\frac{p}{1-p}$$. At $$p = 0.5$$, this is just $$\\frac{70}{56} = 1.25$$.\n- Step 2: So $$P(X=4)$$ is only 25% larger than $$P(X=3)$$ — the peak is not a sharp spike.\n- Step 3: Sharpness depends on how $$\\sigma$$ compares to the mean. Here $$\\sigma = \\sqrt{8 \\cdot 0.5 \\cdot 0.5} = \\sqrt{2} \\approx 1.41$$, a large fraction of the mean (4). Substantial probability lies within $$\\sigma$$ of the mode, so the distribution is broadly peaked rather than narrowly concentrated.\n\nTakeaway: When $$\\sigma/\\mu$$ is moderate, the distribution is visibly spread; when it's tiny (large $$n$$), the peak is sharper.", "source": "Opus 4.7 ①", "_id": "opus_1_56"}, {"question": "Translate each phrase into an inequality on $$X$$, then express as a cumulative form $$P(X \\leq \\cdot)$$ (possibly with a complement): \"greater than 5,\" \"at least 7,\" \"fewer than 10,\" \"no more than 3,\" \"at most 8.\" (5 steps)", "answer": "- Step 1: \"**Greater than 5**\": $$X > 5$$, i.e., $$X \\geq 6$$ → $$1 - P(X \\leq 5)$$.\n- Step 2: \"**At least 7**\": $$X \\geq 7$$ → $$1 - P(X \\leq 6)$$ (note the $$-1$$ in \"at least\").\n- Step 3: \"**Fewer than 10**\": $$X < 10$$, i.e., $$X \\leq 9$$ → $$P(X \\leq 9)$$.\n- Step 4: \"**No more than 3**\": $$X \\leq 3$$ → $$P(X \\leq 3)$$ directly.\n- Step 5: \"**At most 8**\": $$X \\leq 8$$ → $$P(X \\leq 8)$$ directly.\n\n**Misconception probe:** \"At least 7\" is not $$P(X \\leq 7)$$ and not $$1 - P(X \\leq 7)$$. It's $$1 - P(X \\leq 6)$$. The \"$$-1$$\" exists because \"$$\\geq 7$$\" excludes \"$$\\leq 6$$,\" and the cumulative table stops *at* its upper bound.", "source": "Opus 4.7 ①", "_id": "opus_1_14"}, {"question": "Why is $$P(X \\geq 2)$$ not the same as $$1 - P(X \\leq 2)$$? What is the correct complement for $$P(X \\geq 2)$$? (2 steps)", "answer": "- Step 1: $$P(X \\geq 2)$$ includes the values 2, 3, 4... up to $$n$$. The complement of this set (everything else) includes the values 0 and 1.\n- Step 2: Therefore, the correct complement is $$P(X \\leq 1)$$. So $$P(X \\geq 2) = 1 - P(X \\leq 1)$$. Using $$1 - P(X \\leq 2)$$ would incorrectly exclude the probability of exactly 2.", "source": "GLM 5.1 ②", "_id": "glm_2_17"}, {"question": "Explain, using a tree diagram argument, why $$P(X = r) = \\binom{n}{r} p^r (1-p)^{n-r}$$ for a binomial $$X \\sim B(n, p)$$. (4 steps)", "answer": "- Step 1: Consider any specific sequence of outcomes with exactly $$r$$ successes and $$n-r$$ failures, e.g., $$SSFSFF\\ldots$$. By independence, this specific sequence has probability $$p \\cdot p \\cdot (1-p) \\cdot p \\cdot (1-p) \\cdot (1-p) \\cdots = p^r(1-p)^{n-r}$$.\n- Step 2: Every sequence with the same number of successes $$r$$ has the same probability $$p^r(1-p)^{n-r}$$ — the order of the $$p$$'s and $$(1-p)$$'s in the product doesn't matter.\n- Step 3: Count the number of such sequences. Choosing which $$r$$ of the $$n$$ trials are the successes gives $$\\binom{n}{r}$$ distinct orderings.\n- Step 4: Total probability of \"$$r$$ successes\" = (number of sequences) × (probability per sequence) = $$\\binom{n}{r} p^r (1-p)^{n-r}$$.\n\nTakeaway: The combination counts arrangements; the product gives probability per arrangement.", "source": "Opus 4.7 ②", "_id": "opus_2_5"}, {"question": "In a binomial distribution, does a \"success\" have to be the outcome we want? Give an example. (1 step)", "answer": "- No. The term \"success\" in binomial is arbitrary — it's just one of the two outcomes we're tracking. For example, when modelling the number of faulty switches, we might define \"success\" as finding a faulty switch (even though from a quality control perspective, finding faults is undesirable).\n+ What matters is consistency: once you define what \"success\" means, p is the probability of that outcome, and all calculations follow from that definition.", "source": "MiniMax ①", "_id": "minimax_1_29"}, {"question": "Why does binomial data typically concentrate near its mean $$np$$ rather than around the extreme values 0 or $$n$$? Give a qualitative argument based on combinatorics. (3 steps)", "answer": "- Step 1: The binomial coefficient $$\\binom{n}{r}$$ is maximized around $$r \\approx n/2$$ (or more precisely around $$r \\approx np$$). There are far more sequences with a moderate count of successes than with extreme counts.\n- Step 2: For example, with $$n = 10$$: $$\\binom{10}{0} = 1$$ (only one sequence: all failures), but $$\\binom{10}{5} = 252$$ (many arrangements of 5 successes).\n- Step 3: Probabilities of specific sequences vary with $$p$$, but the combinatorial weight pushes probability mass toward the \"centre\" — that centre happens to be near $$np$$.\n\nTakeaway: The peak of binomial PDF reflects the combinatorial abundance of \"mixed\" outcomes.", "source": "Opus 4.7 ②", "_id": "opus_2_40"}, {"question": "When is it appropriate to model with a binomial distribution versus when is it not? Give three examples — two that are binomial and two that are not. (2 steps)", "answer": "- Binomial ✓: (1) Number of red cars in 15 new cars of a make where 12% are red — fixed n, two outcomes, independent trials assumed. (2) Number of left-handed people in a random sample of 20 from a large population.\n- Not Binomial ✗: (1) Number of flips needed to get 4 heads in a row — no fixed n. (2) Number of red cars observed while driving until you see 5 red cars — again, no fixed n (negative binomial situation).\n+ The key test: Can you state the number of trials BEFORE the experiment begins? If yes, binomial may be appropriate.", "source": "MiniMax ①", "_id": "minimax_1_24"}, {"question": "Give an intuitive, non-formula argument for why the mean of $$X \\sim B(n, p)$$ should be $$np$$. (3 steps)", "answer": "- Step 1: If each trial succeeds with probability $$p$$, then \"on average\" each trial contributes $$p$$ successes (e.g., a trial with $$p = 0.3$$ is worth $$0.3$$ expected successes).\n- Step 2: With $$n$$ independent trials, total expected successes should scale linearly with the number of trials.\n- Step 3: So: expected total = (expected per trial) × (number of trials) = $$p \\cdot n = np$$.\n\nSanity check: If $$n = 10$$ coin flips with $$p = 0.5$$, you expect $$10 \\times 0.5 = 5$$ heads — matches intuition.", "source": "Opus 4.7 ②", "_id": "opus_2_30"}, {"question": "Consider the edge cases of the binomial: what does $$B(n, 0)$$ and $$B(n, 1)$$ look like? What about $$B(1, p)$$? (3 steps)", "answer": "- Step 1: $$B(n, 0)$$: zero probability of success means $$X = 0$$ always. This is a degenerate distribution concentrated at 0. Mean = 0, variance = 0.\n- Step 2: $$B(n, 1)$$: every trial succeeds, so $$X = n$$ always. Degenerate at $$n$$. Mean = $$n$$, variance = 0.\n- Step 3: $$B(1, p)$$: this is literally a single Bernoulli trial. $$X \\in \\{0, 1\\}$$ with $$P(X = 1) = p$$. Mean = $$p$$, variance = $$p(1-p)$$.\n\nTakeaway: Binomial gracefully collapses to familiar objects at the boundary — degenerate at $$p = 0, 1$$, and Bernoulli at $$n = 1$$.", "source": "Opus 4.7 ②", "_id": "opus_2_43"}, {"question": "What are the key differences between the binomial distribution and the Bernoulli distribution?", "answer": "- Step 1: A Bernoulli distribution (n=1 trial) models binary outcomes (success/failure) with $P(X=1)=p$. The binomial generalizes this to n independent Bernoulli trials.\n- Step 2: The Bernoulli has mean p and variance p(1-p), while the binomial has mean np and variance np(1-p). The binomial is the sum of n Bernoulli variables.\n+ Example: One coin flip ~ Bernoulli, 10 flips ~ Binomial.", "source": "Qwen 3 ①", "_id": "qwen_1_5"}], "models": {"glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "A situation is being modelled using the binomial distribution. What four conditions must be satisfied for this model to be appropriate? (4 steps)", "answer": "- Step 1: There must be a **fixed number of trials**, denoted as $$n$$. The experiment must have a predetermined end, rather than continuing until some condition is met.\n- Step 2: There must be exactly **two possible outcomes** for each trial, typically classified as \"success\" and \"failure\".\n- Step 3: The probability of success, $$p$$, must be **constant** for each trial. The chance of success does not change from trial to trial.\n- Step 4: The trials must be **independent**. The outcome of one trial must not affect the outcome of any subsequent trial.\n\nThese four conditions form the foundation of the binomial model; if any are violated, the model is invalid.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "In a binomial model, why is it crucial that trials are independent and the probability of success is constant? What kind of real-world scenario violates these? (3 steps)", "answer": "- Step 1: If trials are not independent, the outcome of one trial changes the probability of success for the next. For example, drawing cards without replacement from a small deck changes the composition of the deck, thus altering $$p$$ for the next draw.\n- Step 2: If $$p$$ is not constant, we cannot use a single parameter to describe the distribution; we would need a different $$p_i$$ for each trial $$i$$, which breaks the binomial formula entirely.\n- Step 3: Real-world scenarios violating these include: drawing items from a small batch without replacement (violates both independence and constant $$p$$), or a sports player whose confidence changes after a successful shot (violates independence/constant $$p$$).", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": true}, {"question": "A bag contains 10 sweets, 3 of which are strawberry. You draw 4 sweets without replacement. Can this be modelled with a binomial distribution? How does the answer change if the bag contains a \"large number\" of sweets in the same 3:7 ratio? (3 steps)", "answer": "- Step 1: With 10 sweets, drawing without replacement means the probability of drawing a strawberry sweet changes after each draw (e.g., if the first is strawberry, the probability drops from $$3/10$$ to $$2/9$$). This violates both the constant $$p$$ and independence conditions, so a binomial model is **not** appropriate.\n- Step 2: If the bag contains a \"large number\" of sweets, removing one sweet changes the probability by a negligible amount.\n- Step 3: Therefore, for a large population sampled without replacement, we can **approximate** the trials as independent with constant $$p$$, making the binomial model appropriate. This is a crucial assumption in many real-world sampling scenarios.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "The probability formula for a binomial distribution is $$P(X=r) = \\binom{n}{r} p^r (1-p)^{n-r}$$. Explain the intuitive meaning of each of the three components: $$\\binom{n}{r}$$, $$p^r$$, and $$(1-p)^{n-r}$$. (3 steps)", "answer": "- Step 1: $$p^r$$ represents the probability of getting exactly $$r$$ successes in a specific, predetermined sequence (e.g., the first $$r$$ trials are all successes).\n- Step 2: $$(1-p)^{n-r}$$ represents the probability of getting exactly $$n-r$$ failures in the remaining trials of that same specific sequence.\n- Step 3: $$\\binom{n}{r}$$ represents the **number of different sequences** (or combinations) in which those $$r$$ successes could be arranged among the $$n$$ trials. Since each sequence is mutually exclusive and equally likely, we multiply the probability of one sequence by the number of possible sequences.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "Why is the binomial distribution named after the binomial expansion? What does the sum of all probabilities $$\\sum_{r=0}^n P(X=r)$$ equal, and how does the expansion prove this? (3 steps)", "answer": "- Step 1: The probabilities of a binomial random variable $$X \\sim B(n,p)$$ are exactly the terms in the binomial expansion of $$((1-p) + p)^n$$.\n- Step 2: The expansion of $$((1-p) + p)^n$$ generates terms of the form $$\\binom{n}{r} p^r (1-p)^{n-r}$$, which directly matches the probability formula $$P(X=r)$$.\n- Step 3: Because the sum is the expansion of $$((1-p)+p)^n = 1^n = 1$$, the sum of all probabilities $$\\sum_{r=0}^n P(X=r) = 1$$. This guarantees that the probability distribution is valid (all possible outcomes sum to certainty).", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "Translate the following probability phrases into mathematical inequalities using a discrete random variable $$X$$:\na) \"at least 5\"\nb) \"no more than 3\"\nc) \"fewer than 7\"\nd) \"greater than 2\" (4 steps)", "answer": "- Step 1: \"at least 5\" means 5 or more, so it is $$X \\geq 5$$.\n- Step 2: \"no more than 3\" means 3 or less, so it is $$X \\leq 3$$.\n- Step 3: \"fewer than 7\" means strictly less than 7. Since $$X$$ is discrete (integers), this is equivalent to $$X \\leq 6$$.\n- Step 4: \"greater than 2\" means strictly more than 2. For discrete integers, this is equivalent to $$X \\geq 3$$.\n\nUnderstanding these translations is critical for setting up cumulative probability calculations correctly.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "Binomial tables typically give values for $$P(X \\leq x)$$. How would you use such a table to find:\na) $$P(X > x)$$\nb) $$P(X \\geq x)$$\nc) $$P(a < X \\leq b)$$ (3 steps)", "answer": "- Step 1: $$P(X > x)$$ is the complement of $$P(X \\leq x)$$, so calculate it as $$1 - P(X \\leq x)$$.\n- Step 2: $$P(X \\geq x)$$ is the complement of $$P(X \\leq x-1)$$ (because it includes $$x$$), so calculate it as $$1 - P(X \\leq x-1)$$.\n- Step 3: $$P(a < X \\leq b)$$ is the probability of being up to $$b$$ minus the probability of being up to and including $$a$$, so calculate it as $$P(X \\leq b) - P(X \\leq a)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "You need to find $$P(X \\leq 6)$$ for $$X \\sim B(10, 0.7)$$, but your binomial table only lists values for $$p \\leq 0.5$$. How can you redefine the random variable to solve this using the table? (3 steps)", "answer": "- Step 1: If the probability of \"success\" is $$p = 0.7$$, then the probability of \"failure\" is $$1-p = 0.3$$. We can swap our definition of what constitutes a \"success\" and a \"failure\".\n- Step 2: Define a new random variable $$Y$$ as the number of failures. Then $$Y \\sim B(10, 0.3)$$.\n- Step 3: The event \"$$X \\leq 6$$ successes\" is identical to the event \"$$Y \\geq 4$$ failures\" (since if there are 6 or fewer successes, there must be 4 or more failures). So, $$P(X \\leq 6) = P(Y \\geq 4) = 1 - P(Y \\leq 3)$$, which can be found in the table for $$p=0.3$$.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "A game requires rolling a 6 on a biased dice ($$p=0.3$$) to win a prize. In 12 rolls, you want the probability of winning to be less than 0.05. If $$X \\sim B(12, 0.3)$$, you need the smallest $$r$$ such that $$P(X \\geq r) < 0.05$$. Explain the logical steps to find $$r$$ using a cumulative table. (3 steps)", "answer": "- Step 1: Rewrite the inequality in terms of the cumulative table format. $$P(X \\geq r) < 0.05$$ is equivalent to $$1 - P(X \\leq r-1) < 0.05$$, which simplifies to $$P(X \\leq r-1) > 0.95$$.\n- Step 2: Look down the cumulative table for $$n=12, p=0.3$$ to find the first value of $$x$$ where $$P(X \\leq x)$$ exceeds 0.95.\n- Step 3: Once you find that $$x$$, set $$r-1 = x$$, meaning $$r = x+1$$. This $$r$$ is the smallest number of successes needed to win, as the chance of getting that many or more is less than 5%.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "What is a Bernoulli trial? What are the expected value (mean) and variance of a single Bernoulli trial with probability of success $$p$$? (3 steps)", "answer": "- Step 1: A Bernoulli trial is a single random experiment with exactly two possible outcomes: \"success\" (value 1) with probability $$p$$, and \"failure\" (value 0) with probability $$1-p$$.\n- Step 2: The expected value is $$E(X) = \\sum x P(X=x) = (1 \\times p) + (0 \\times (1-p)) = p$$.\n- Step 3: The variance is $$Var(X) = E(X^2) - [E(X)]^2$$. Since $$1^2 = 1$$ and $$0^2 = 0$$, $$E(X^2) = p$$. Thus, $$Var(X) = p - p^2 = p(1-p)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": true}, {"question": "A binomial random variable $$X \\sim B(n, p)$$ can be thought of as the sum of $$n$$ independent Bernoulli trials: $$X = X_1 + X_2 + \\dots + X_n$$. Using the properties $$E(A+B) = E(A) + E(B)$$ and $$Var(A+B) = Var(A) + Var(B)$$ (for independent variables), derive the mean and variance of $$X$$. (3 steps)", "answer": "- Step 1: For the mean, use the linearity of expectation: $$E(X) = E(X_1 + X_2 + \\dots + X_n) = E(X_1) + E(X_2) + \\dots + E(X_n)$$. Since each trial has mean $$p$$, this sums to $$n \\times p = np$$.\n- Step 2: For the variance, use the additive property for independent variables: $$Var(X) = Var(X_1 + X_2 + \\dots + X_n) = Var(X_1) + Var(X_2) + \\dots + Var(X_n)$$.\n- Step 3: Since each trial has variance $$p(1-p)$$, this sums to $$n \\times p(1-p) = np(1-p)$$.\n\nThis elegant derivation shows why the binomial formulas are so simple: they are just sums of identical, independent single-trial components.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "Consider the variance formula for the binomial distribution: $$Var(X) = np(1-p)$$. Why is the variance maximized when $$p = 0.5$$, and why does it approach 0 as $$p$$ approaches 0 or 1? (3 steps)", "answer": "- Step 1: Variance measures uncertainty or spread. When $$p=0.5$$, success and failure are equally likely, creating the maximum uncertainty about the outcome of each trial.\n- Step 2: As $$p \\to 0$$, the outcome is almost certainly failure (0). As $$p \\to 1$$, the outcome is almost certainly success (1). In both extreme cases, there is very little uncertainty because the outcome is highly predictable.\n- Step 3: Mathematically, the term $$p(1-p)$$ is a downward-opening parabola with roots at $$p=0$$ and $$p=1$$, and its vertex (maximum) is at $$p=0.5$$. Thus, the spread of the distribution is largest at $$p=0.5$$.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "Given a binomial distribution where the mean is 4.8 and the variance is 2.88, how can you find the values of $$n$$ and $$p$$? (3 steps)", "answer": "- Step 1: Set up the equations from the definitions: $$np = 4.8$$ and $$np(1-p) = 2.88$$.\n- Step 2: Divide the variance equation by the mean equation to eliminate $$n$$: $$\\frac{np(1-p)}{np} = \\frac{2.88}{4.8}$$, which simplifies to $$1-p = 0.6$$, so $$p = 0.4$$.\n- Step 3: Substitute $$p = 0.4$$ back into the mean equation: $$n(0.4) = 4.8$$, which gives $$n = 12$$.\n\nThis is a common exam technique: using the ratio of variance to mean to quickly isolate $$p$$.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "A company tests 4 components and finds the probability of at least one being faulty is 0.3439. If $$X \\sim B(4, p)$$ is the number of faulty components, how do you find $$p$$? (3 steps)", "answer": "- Step 1: Write the probability statement: $$P(X \\geq 1) = 0.3439$$.\n- Step 2: Use the complement to simplify: $$P(X \\geq 1) = 1 - P(X = 0)$$. So, $$1 - P(X = 0) = 0.3439$$, which means $$P(X = 0) = 1 - 0.3439 = 0.6561$$.\n- Step 3: Express $$P(X=0)$$ using the binomial formula: $$\\binom{4}{0} p^0 (1-p)^4 = (1-p)^4$$. Set $$(1-p)^4 = 0.6561$$ and take the 4th root to find $$1-p = 0.9$$, so $$p = 0.1$$.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "A fair coin is tossed 5 times. Let $$X$$ be the number of heads. What is $$P(X = 4)$$? (2 steps)", "answer": "- Step 1: Identify the parameters: $$n = 5$$ trials, $$p = 0.5$$ probabilit
