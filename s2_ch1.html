s \"two outcomes.\" How can we still apply it to a scenario with three real-world outcomes, e.g., traffic lights being red, orange, or green? (3 steps)", "answer": "- Step 1: The two outcomes only need to be \"success\" and \"not success\" — we're free to collapse multiple outcomes into one category.\n- Step 2: For the traffic lights: if we want to count \"wait or stop\" (red OR orange), then define success = {red or orange}, with $$p = 0.48 + 0.04 = 0.52$$. Failure = green, with probability $$0.48$$.\n+ The three-way outcome is now re-framed as a two-way outcome.\n+ This works as long as the thing we care about is a yes/no question.\n- Step 3: If we needed to count red, orange, and green separately, binomial wouldn't suffice — we'd need a *multinomial* distribution. The key is that binomial is about one specific success criterion.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": true}, {"question": "Explain, using a tree diagram argument, why $$P(X = r) = \\binom{n}{r} p^r (1-p)^{n-r}$$ for a binomial $$X \\sim B(n, p)$$. (4 steps)", "answer": "- Step 1: Consider any specific sequence of outcomes with exactly $$r$$ successes and $$n-r$$ failures, e.g., $$SSFSFF\\ldots$$. By independence, this specific sequence has probability $$p \\cdot p \\cdot (1-p) \\cdot p \\cdot (1-p) \\cdot (1-p) \\cdots = p^r(1-p)^{n-r}$$.\n- Step 2: Every sequence with the same number of successes $$r$$ has the same probability $$p^r(1-p)^{n-r}$$ — the order of the $$p$$'s and $$(1-p)$$'s in the product doesn't matter.\n- Step 3: Count the number of such sequences. Choosing which $$r$$ of the $$n$$ trials are the successes gives $$\\binom{n}{r}$$ distinct orderings.\n- Step 4: Total probability of \"$$r$$ successes\" = (number of sequences) × (probability per sequence) = $$\\binom{n}{r} p^r (1-p)^{n-r}$$.\n\nTakeaway: The combination counts arrangements; the product gives probability per arrangement.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": true}, {"question": "In the binomial formula $$P(X = r) = \\binom{n}{r} p^r (1-p)^{n-r}$$, what does $$\\binom{n}{r}$$ represent intuitively? What happens if we forget it? (3 steps)", "answer": "- Step 1: $$\\binom{n}{r} = \\frac{n!}{r!(n-r)!}$$ counts the number of distinct ways to arrange $$r$$ successes among $$n$$ trials — i.e., which trials were the successful ones.\n- Step 2: If we forget it, we only compute the probability of *one specific* ordering (e.g., successes on the first $$r$$ trials). This underestimates the probability of \"exactly $$r$$ successes\" by a factor of $$\\binom{n}{r}$$.\n- Step 3: Example: $$P(\\text{HHT in 3 flips of fair coin}) = \\frac{1}{8}$$, but $$P(\\text{exactly 2 heads}) = 3 \\times \\frac{1}{8} = \\frac{3}{8}$$ because the two heads can appear in positions (1,2), (1,3), or (2,3). The factor 3 is exactly $$\\binom{3}{2}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "How is the binomial distribution structurally related to the algebraic expansion of $$(p + q)^n$$ where $$q = 1 - p$$? (3 steps)", "answer": "- Step 1: The binomial theorem states $$(p+q)^n = \\sum_{r=0}^{n} \\binom{n}{r} p^r q^{n-r}$$. Each term in this expansion has the form $$\\binom{n}{r} p^r q^{n-r}$$.\n- Step 2: This is *identical* to the binomial probability formula $$P(X = r) = \\binom{n}{r} p^r (1-p)^{n-r}$$. So expanding $$(p+q)^n$$ literally generates every binomial probability as one of its terms.\n- Step 3: Since $$p + q = 1$$, we get $$(p+q)^n = 1^n = 1$$, which confirms that all the probabilities $$P(X = 0) + P(X = 1) + \\cdots + P(X = n) = 1$$ as any probability distribution must.\n\nTakeaway: The binomial distribution is literally the probabilistic interpretation of the binomial expansion — the name is not a coincidence.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": true}, {"question": "Why do the probabilities $$P(X=0), P(X=1), \\ldots, P(X=n)$$ for a binomial distribution always sum to 1 — without ever computing them? (2 steps)", "answer": "- Step 1: The sum is $$\\sum_{r=0}^{n} \\binom{n}{r} p^r (1-p)^{n-r}$$, which is the binomial expansion of $$(p + (1-p))^n$$.\n- Step 2: But $$p + (1-p) = 1$$, and $$1^n = 1$$. So the sum of all probabilities is automatically 1, regardless of the specific value of $$p$$.\n\nThis is a structural guarantee, not something that needs to be checked case-by-case.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": true}, {"question": "What is the meaning of the notation $$X \\sim B(n, p)$$? What do we call $$n$$ and $$p$$?", "answer": "The symbol $$\\sim$$ means \"is distributed as\". So $$X \\sim B(n, p)$$ reads: \"the random variable $$X$$ follows a binomial distribution with parameters $$n$$ and $$p$$.\" Here $$n$$ is the number of independent trials, sometimes called the **index**, and $$p$$ is the probability of success on a single trial, sometimes called the **parameter**. The pair $$(n, p)$$ fully determines the distribution — knowing them is enough to compute every probability $$P(X = r)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": true}, {"question": "When computing $$P(X = 3)$$ for $$X \\sim B(5, p)$$, are we finding the probability of a single specific sequence like $$SSSFF$$, or the combined probability of all sequences with 3 successes? Why does this distinction matter? (3 steps)", "answer": "- Step 1: We are finding the *combined* probability of **all** sequences with exactly 3 successes. There are $$\\binom{5}{3} = 10$$ such sequences.\n- Step 2: Each individual sequence has probability $$p^3(1-p)^2$$, but the event \"$$X = 3$$\" means \"any arrangement of 3 successes,\" which combines all 10 sequences.\n- Step 3: Missing the $$\\binom{n}{r}$$ factor is the most common binomial mistake — it amounts to computing the probability of a single outcome and calling it the probability of a count. Always ask: \"am I counting arrangements, or just one arrangement?\"", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": true}, {"question": "A garden centre sells trays of 15 plants. For a particular plant species, 25% naturally have blue flowers. Does the number of blue-flowered plants in a randomly chosen tray fit a binomial distribution? Justify each of the four conditions. (4 steps)", "answer": "- Step 1: **Fixed $$n$$**: Yes, $$n = 15$$ plants per tray.\n- Step 2: **Two outcomes**: Yes, each plant is either blue-flowered (success) or not (failure).\n- Step 3: **Constant $$p$$**: Reasonably so at $$p = 0.25$$, provided the trays are drawn from a large population of plants where the proportion doesn't meaningfully change.\n- Step 4: **Independence**: We assume plants' colours are assigned independently — a mild assumption for mass-produced plants. So $$X \\sim B(15, 0.25)$$ is appropriate.\n\nTakeaway: All four conditions are met with reasonable assumptions, so binomial is valid.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "A fair coin is flipped repeatedly until 4 heads appear in a row. The random variable of interest is the total number of flips. Why is this NOT a binomial distribution? (3 steps)", "answer": "- Step 1: The number of trials is not fixed — it depends on when the stopping condition is met. $$n$$ itself is random.\n- Step 2: The random variable we're counting is not the number of successes in a fixed experiment; it's the number of trials needed to reach a target.\n- Step 3: This fits a different family (a negative binomial / geometric-type distribution). The lesson: always check whether $$n$$ is a fixed parameter or itself a random outcome.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "When we draw sweets from a bag *without replacement*, strict independence fails (the composition of the bag changes). Under what conditions can we still justify using a binomial model? (3 steps)", "answer": "- Step 1: If the bag contains a very large number of sweets, then removing one sweet barely changes the proportion of remaining sweets. The change in $$p$$ from trial to trial is negligibly small.\n- Step 2: This is the \"large population\" approximation: when the sample size is small relative to the population, without-replacement sampling is well-approximated by with-replacement sampling (which is truly independent).\n- Step 3: Formally we'd use a hypergeometric distribution for without-replacement sampling, but it converges to the binomial as the population grows. So in practice, \"large pool + small sample\" justifies using binomial.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "For $$X \\sim B(12, 1/6)$$, describe the three conceptual pieces of the answer for $$P(X = 2)$$ without doing the final arithmetic. (3 steps)", "answer": "- Step 1: **Probability of one specific sequence with 2 successes and 10 failures**: $$(1/6)^2 \\times (5/6)^{10}$$. This is the per-arrangement probability.\n- Step 2: **Number of arrangements**: $$\\binom{12}{2}$$ ways to choose which 2 of the 12 trials are the successful ones.\n- Step 3: **Combine**: $$P(X = 2) = \\binom{12}{2} \\cdot (1/6)^2 \\cdot (5/6)^{10}$$. The result is moderate in size because although individual successes are rare ($$p = 1/6$$), there are many arrangement possibilities.\n\nTakeaway: Every binomial probability splits into \"count × per-sequence probability\".", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "Given $$X \\sim B(12, 1/6)$$, how do you express $$P(X \\leq 1)$$ as a sum, and which values of $$X$$ does it include? (2 steps)", "answer": "- Step 1: $$P(X \\leq 1) = P(X = 0) + P(X = 1)$$, since $$X$$ takes integer values and both 0 and 1 satisfy $$X \\leq 1$$.\n- Step 2: Expanded: $$P(X = 0) = (5/6)^{12}$$ (no successes) and $$P(X = 1) = \\binom{12}{1}(1/6)(5/6)^{11}$$. Since both are individually small but non-trivial, their sum is still moderate. This illustrates that cumulative probabilities combine related outcomes.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "What is a cumulative probability function $$P(X \\leq x)$$ for a discrete random variable, and why is it useful to tabulate? (3 steps)", "answer": "- Step 1: $$P(X \\leq x)$$ is the probability that $$X$$ takes any value less than or equal to $$x$$. For discrete $$X$$, it equals the sum $$P(X=0) + P(X=1) + \\cdots + P(X=x)$$.\n- Step 2: It's useful because many real questions are phrased as \"at most k\", \"fewer than k\", or \"more than k\" — all of which can be computed from cumulative values with simple arithmetic.\n- Step 3: Tabulating $$P(X \\leq x)$$ for all $$x, n, p$$ saves us from repeatedly summing individual binomial probabilities. One lookup in a table replaces many calculations.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "Standard binomial cumulative tables typically only list values of $$p$$ up to $$0.5$$. Why stop there, and how can we still use the table when $$p > 0.5$$? (3 steps)", "answer": "- Step 1: By the symmetry of success/failure, $$B(n, p)$$ and $$B(n, 1-p)$$ are related: if $$X \\sim B(n, p)$$ counts successes, then $$Y = n - X \\sim B(n, 1-p)$$ counts failures.\n- Step 2: So any question about $$X$$ with $$p > 0.5$$ can be rephrased as a question about $$Y$$ with a probability $$1-p < 0.5$$, which IS in the table.\n- Step 3: This halves the size of the table without losing information — a practical efficiency trick. Tables could include $$p > 0.5$$, but it would be redundant given this symmetry.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": true}, {"question": "If $$X \\sim B(10, 0.7)$$, explain how to redefine a new variable $$Y$$ so that you can compute $$P(X \\leq 6)$$ using a table that only goes up to $$p = 0.5$$. (4 steps)", "answer": "- Step 1: Define $$Y = 10 - X$$, the number of failures. Then $$Y \\sim B(10, 0.3)$$, which is in the table.\n- Step 2: Translate the event: $$X \\leq 6$$ is equivalent to $$10 - X \\geq 4$$, i.e., $$Y \\geq 4$$.\n+ Intuition: If $$X$$ successes is at most 6, then failures $$Y = 10 - X$$ is at least $$10 - 6 = 4$$.\n- Step 3: Compute $$P(Y \\geq 4) = 1 - P(Y \\leq 3)$$.\n- Step 4: Look up $$P(Y \\leq 3)$$ in the table at $$n = 10, p = 0.3$$, then subtract from 1. This gives the required probability for the original question about $$X$$.\n\nTakeaway: Flip the \"count what's rare\" perspective to use the tabulated side.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": true}, {"question": "Translate each of these phrases into formal probability notation and a calculation based on cumulative tables: \"greater than 5\", \"at least 7\", \"fewer than 10\", \"no more than 3\", \"at most 8\". (5 steps)", "answer": "- Step 1: **\"greater than 5\"** means $$X > 5$$, i.e., $$X \\geq 6$$. Compute as $$1 - P(X \\leq 5)$$.\n- Step 2: **\"at least 7\"** means $$X \\geq 7$$. Compute as $$1 - P(X \\leq 6)$$.\n- Step 3: **\"fewer than 10\"** means $$X < 10$$, i.e., $$X \\leq 9$$. Compute as $$P(X \\leq 9)$$.\n- Step 4: **\"no more than 3\"** means $$X \\leq 3$$. Compute directly as $$P(X \\leq 3)$$.\n- Step 5: **\"at most 8\"** means $$X \\leq 8$$. Compute directly as $$P(X \\leq 8)$$.\n\nThe key subtlety: strict inequalities (\">\", \"<\") need to be converted to $$\\leq$$ form because tables list $$\\leq$$ values, and for discrete $$X$$, $$X < k$$ becomes $$X \\leq k-1$$.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "Why is it critical to be careful about whether a phrase means \"strict less than\" vs \"less than or equal to\" when working with discrete binomial tables? (3 steps)", "answer": "- Step 1: Binomial tables list $$P(X \\leq x)$$ for integer $$x$$. If the question says \"fewer than 10\", we want $$X < 10$$, which for a discrete integer-valued $$X$$ equals $$X \\leq 9$$ — NOT $$X \\leq 10$$.\n- Step 2: Confusing $$\\leq 10$$ with $$< 10$$ includes or excludes the value 10 itself, which corresponds to the single probability $$P(X = 10)$$. This can shift the answer meaningfully, especially near the mean where probabilities are largest.\n- Step 3: Rule of thumb: always rewrite strict inequalities as non-strict inequalities with an adjusted boundary before looking up the table. \"$$X > 5$$\" becomes \"$$X \\geq 6$$\", and \"$$X < 10$$\" becomes \"$$X \\leq 9$$\".", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "Given a cumulative table that gives $$P(X \\leq m)$$, how do you compute $$P(X \\geq k)$$ for a binomial? Why the particular form? (3 steps)", "answer": "- Step 1: The total probability must be 1, so $$P(X \\geq k) = 1 - P(X < k) = 1 - P(X \\leq k-1)$$.\n- Step 2: The shift from $$k$$ to $$k-1$$ is because $$X \\geq k$$ excludes $$k-1$$ but $$X \\leq k-1$$ includes it. For integer-valued $$X$$, \"not at least $$k$$\" means \"at most $$k-1$$\".\n- Step 3: Example: $$P(X \\geq 15) = 1 - P(X \\leq 14)$$. Get $$P(X \\leq 14)$$ from the table, subtract from 1.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "For a binomial $$X$$, how do you compute $$P(2 \\leq X \\leq 7)$$ using a cumulative probability table? (3 steps)", "answer": "- Step 1: The event \"$$X$$ between 2 and 7 inclusive\" equals \"$$X \\leq 7$$\" minus \"$$X \\leq 1$$\".\n+ $$P(X \\leq 7)$$ includes all outcomes from 0 to 7.\n+ $$P(X \\leq 1)$$ includes outcomes 0 and 1.\n+ Their difference covers exactly outcomes 2, 3, 4, 5, 6, 7.\n- Step 2: Formula: $$P(2 \\leq X \\leq 7) = P(X \\leq 7) - P(X \\leq 1)$$.\n- Step 3: Subtle point: we subtract the cumulative value *just below* the lower end (since $$X = 2$$ must be included). If we mistakenly subtracted $$P(X \\leq 2)$$, we'd exclude $$X = 2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "A competition requires $$P(X \\geq r) < 0.05$$ where $$X \\sim B(12, 0.3)$$. Explain the strategy to find the smallest $$r$$ (number of reds needed to win). (4 steps)", "answer": "- Step 1: Rewrite: $$P(X \\geq r) = 1 - P(X \\leq r - 1) < 0.05$$, which means $$P(X \\leq r - 1) > 0.95$$.\n- Step 2: Scan the cumulative table for $$n = 12, p = 0.3$$ and find the smallest $$r - 1$$ with $$P(X \\leq r-1) > 0.95$$.\n+ From tables: $$P(X \\leq 5) = 0.8822$$ (too small), $$P(X \\leq 6) = 0.9614$$ (first to exceed 0.95), $$P(X \\leq 7) = 0.9905$$.\n- Step 3: So $$r - 1 = 6$$, giving $$r = 7$$. This means $$P(X \\geq 7) = 1 - 0.9614 = 0.0386 < 0.05$$ ✓.\n- Step 4: Verify: if we picked $$r = 6$$ instead, $$P(X \\geq 6) = 1 - 0.8822 = 0.1178 > 0.05$$ ✗, which would make the prize too easy.\n\nTakeaway: Threshold problems become a search through the cumulative table — always translate into \"find the first $$x$$ where $$P(X \\leq x)$$ crosses a threshold\".", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "What is a Bernoulli trial, and how is it the fundamental building block of the binomial distribution? (3 steps)", "answer": "- Step 1: A Bernoulli trial is a single experiment with exactly two outcomes — conventionally labelled \"success\" (probability $$p$$) and \"failure\" (probability $$1-p$$). The Bernoulli random variable takes value 1 for success and 0 for failure.\n- Step 2: The probability distribution has just two rows:\n\n| $$x$$ | 0 | 1 |\n|---|---|---|\n| $$P(X_1 = x)$$ | $$1-p$$ | $$p$$ |\n\n- Step 3: A binomial $$X \\sim B(n, p)$$ is the **sum of $$n$$ independent Bernoulli trials**: $$X = X_1 + X_2 + \\cdots + X_n$$. This decomposition is why binomial inherits additive properties for mean and (under independence) variance.\n\nTakeaway: Binomial = $$n$$ coin flips summed up. The Bernoulli is the atom; the binomial is the molecule.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "Derive the expected value $$E(X_1) = p$$ of a single Bernoulli trial with success probability $$p$$. (2 steps)", "answer": "- Step 1: Expected value is $$E(X_1) = \\sum_x x \\cdot P(X_1 = x)$$. For a Bernoulli, this is $$0 \\cdot (1-p) + 1 \\cdot p$$.\n- Step 2: The first term vanishes, leaving $$E(X_1) = p$$.\n\nIntuition: On a single trial, on average you get $$p$$ successes. If $$p = 0.3$$, each trial contributes $$0.3$$ to the expected count on average.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "Derive the variance $$\\operatorname{Var}(X_1) = p(1-p)$$ of a single Bernoulli trial. At what value of $$p$$ is this variance maximized? (3 steps)", "answer": "- Step 1: Use $$\\operatorname{Var}(X_1) = E(X_1^2) - [E(X_1)]^2$$. Since $$X_1 \\in \\{0, 1\\}$$, we have $$X_1^2 = X_1$$, so $$E(X_1^2) = E(X_1) = p$$.\n- Step 2: Substitute: $$\\operatorname{Var}(X_1) = p - p^2 = p(1 - p)$$.\n- Step 3: To find the maximum, note that $$p(1-p)$$ is a downward parabola in $$p$$, maximized at $$p = 0.5$$ with value $$0.25$$.\n+ At $$p = 0$$ or $$p = 1$$, the outcome is deterministic, so variance is 0.\n+ At $$p = 0.5$$, the outcome is maximally unpredictable, so variance peaks.\n\nTakeaway: Uncertainty is highest when success and failure are equally likely.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": true}, {"question": "Why does $$E(X_1 + X_2 + \\cdots + X_n) = E(X_1) + E(X_2) + \\cdots + E(X_n)$$ hold even WITHOUT independence, but $$\\operatorname{Var}(X_1 + \\cdots + X_n) = \\operatorname{Var}(X_1) + \\cdots + \\operatorname{Var}(X_n)$$ requires independence? (3 steps)", "answer": "- Step 1: Expectation is a linear operator, period. $$E$$ respects addition regardless of any relationship between variables, because expectation is an integral/sum, and integrals distribute over addition.\n- Step 2: Variance involves squared deviations. In general, $$\\operatorname{Var}(X + Y) = \\operatorname{Var}(X) + \\operatorname{Var}(Y) + 2\\operatorname{Cov}(X, Y)$$. The covariance term captures how $$X$$ and $$Y$$ move together.\n- Step 3: If $$X$$ and $$Y$$ are independent, $$\\operatorname{Cov}(X, Y) = 0$$, so variance becomes additive. If they're positively correlated, the sum has MORE variance than the sum of individual variances; if negatively correlated, LESS.\n\nTakeaway: Linearity of expectation is universal; additivity of variance needs independence.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": true}, {"question": "Derive the formula $$E(X) = np$$ for $$X \\sim B(n, p)$$ using the Bernoulli decomposition. (3 steps)", "answer": "- Step 1: Write $$X = X_1 + X_2 + \\cdots + X_n$$ where each $$X_i$$ is a Bernoulli trial with $$E(X_i) = p$$.\n- Step 2: By linearity of expectation: $$E(X) = E(X_1) + E(X_2) + \\cdots + E(X_n) = p + p + \\cdots + p = np$$.\n- Step 3: Intuition: If on each of $$n$$ trials you expect $$p$$ successes \"on average\", summing gives total expected successes = $$np$$. This works even though each $$X_i$$ is 0 or 1 — expectation can be a non-integer like 3.6 even when the variable itself only takes integer values.\n\nTakeaway: The mean of a binomial is just the per-trial expected contribution times the number of trials.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": true}, {"question": "Derive $$\\operatorname{Var}(X) = np(1-p)$$ for $$X \\sim B(n, p)$$ using the Bernoulli decomposition, and explain where independence enters. (4 steps)", "answer": "- Step 1: Write $$X = X_1 + X_2 + \\cdots + X_n$$, where each $$X_i$$ is an independent Bernoulli with $$\\operatorname{Var}(X_i) = p(1-p)$$.\n- Step 2: **Because the trials are independent**, variance is additive: $$\\operatorname{Var}(X) = \\operatorname{Var}(X_1) + \\operatorname{Var}(X_2) + \\cdots + \\operatorname{Var}(X_n)$$.\n- Step 3: Each term equals $$p(1-p)$$, so summing $$n$$ of them: $$\\operatorname{Var}(X) = n \\cdot p(1-p) = np(1-p)$$.\n- Step 4: If the trials were dependent (e.g., sampling without replacement from a small bag), we'd get covariance terms and the answer would differ.\n\nTakeaway: Independence is doing the work of setting covariances to zero.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": true}, {"question": "Give an intuitive, non-formula argument for why the mean of $$X \\sim B(n, p)$$ should be $$np$$. (3 steps)", "answer": "- Step 1: If each trial succeeds with probability $$p$$, then \"on average\" each trial contributes $$p$$ successes (e.g., a trial with $$p = 0.3$$ is worth $$0.3$$ expected successes).\n- Step 2: With $$n$$ independent trials, total expected successes should scale linearly with the number of trials.\n- Step 3: So: expected total = (expected per trial) × (number of trials) = $$p \\cdot n = np$$.\n\nSanity check: If $$n = 10$$ coin flips with $$p = 0.5$$, you expect $$10 \\times 0.5 = 5$$ heads — matches intuition.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": true}, {"question": "Why does the variance of a binomial grow linearly with $$n$$ (as $$np(1-p)$$), not quadratically? (3 steps)", "answer": "- Step 1: The binomial is a sum of $$n$$ **independent** Bernoulli trials. For independent random variables, variances add.\n- Step 2: Adding $$n$$ copies of \"$$p(1-p)$$\" gives total variance $$np(1-p)$$, which grows linearly in $$n$$.\n- Step 3: Quadratic growth would appear if the trials were positively correlated — if they all moved together. But independence prevents that. In contrast, the mean $$np$$ also grows linearly in $$n$$, and so the standard deviation $$\\sigma = \\sqrt{np(1-p)}$$ grows like $$\\sqrt{n}$$ — slower than the mean.\n\nTakeaway: The \"$$\\sqrt{n}$$\" scaling of uncertainty vs \"$$n$$\" scaling of the mean is why averages become more predictable as sample sizes grow.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": true}, {"question": "For a fixed $$n$$, at what value of $$p$$ is $$\\operatorname{Var}(X) = np(1-p)$$ maximized? Why is this intuitive? (3 steps)", "answer": "- Step 1: $$\\operatorname{Var}(X) = np(1-p)$$ is an inverted parabola in $$p$$, maximized when $$p = 0.5$$ with value $$\\frac{n}{4}$$.\n- Step 2: Intuitively, when $$p = 0.5$$, every trial is maximally uncertain — a fair coin flip. The sum inherits this uncertainty.\n- Step 3: When $$p$$ is close to 0 or 1, trials are nearly deterministic. Almost all successes (or almost all failures), so the count doesn't vary much. Variance goes to 0 at the extremes.\n\nTakeaway: Unpredictability peaks at \"50/50\"; certainty dampens variance.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": true}, {"question": "Show that for any binomial, $$\\operatorname{Var}(X) \\leq E(X)$$, with equality only when $$p = 0$$. What can we infer if real-world data has variance much greater than its mean? (3 steps)", "answer": "- Step 1: $$\\operatorname{Var}(X) = np(1-p) = np - np^2 = E(X) - np^2$$. Since $$np^2 \\geq 0$$, we have $$\\operatorname{Var}(X) \\leq E(X)$$.\n- Step 2: Equality $$\\operatorname{Var}(X) = E(X)$$ requires $$np^2 = 0$$, i.e., $$p = 0$$ (trivially no successes) or $$n = 0$$.\n- Step 3: If observed data shows variance $$\\gg$$ mean, the data is \"overdispersed\" relative to binomial. This could mean the true process has heterogeneous $$p$$, contagion (dependence), or follows a different distribution (e.g., negative binomial, clustered data).\n\nTakeaway: Binomial data always has variance smaller than or equal to mean. Overdispersion is a diagnostic for non-binomial behaviour.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": true}, {"question": "An experiment with $$n = 20$$ trials yields an observed variance of $$4.2$$ across many repetitions. How would you estimate $$p$$? (3 steps)", "answer": "- Step 1: Use the formula $$\\operatorname{Var}(X) = np(1-p)$$. Substitute: $$4.2 = 20 \\cdot p(1-p)$$, so $$p(1-p) = 0.21$$.\n- Step 2: Solve the quadratic $$p^2 - p + 0.21 = 0$$. Factor: $$(p - 0.3)(p - 0.7) = 0$$, giving $$p = 0.3$$ or $$p = 0.7$$.\n- Step 3: Two solutions arise by the symmetry of $$p(1-p)$$ in $$p$$ and $$1-p$$. Use context to decide: if the problem says $$p < 0.5$$, pick $$p = 0.3$$.\n\nTakeaway: Variance alone doesn't pin down $$p$$ uniquely; you need extra information.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "Given $$X \\sim B(n, 0.4)$$ and $$E(X) = 3.2$$, find $$n$$ and explain why this uniquely determines the distribution. (2 steps)", "answer": "- Step 1: Use $$E(X) = np$$. So $$3.2 = n \\times 0.4$$, giving $$n = 8$$.\n- Step 2: Since $$p$$ is fully specified and $$n$$ is determined from $$E(X)$$, we know $$X \\sim B(8, 0.4)$$ completely — every probability $$P(X = r)$$ can now be computed.\n\nNotice: knowing mean alone doesn't determine $$n$$ and $$p$$ separately — we needed one of them given.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "What is the standard deviation of $$X \\sim B(n, p)$$, and why might we prefer $$\\sigma$$ over $$\\sigma^2$$ in practice? (2 steps)", "answer": "- Step 1: $$\\sigma = \\sqrt{\\operatorname{Var}(X)} = \\sqrt{np(1-p)}$$.\n- Step 2: Standard deviation has the same units as $$X$$ itself (in this case, a dimensionless count), making it directly comparable to the mean. Variance has \"squared units\" that are harder to interpret. \"$$\\mu \\pm \\sigma$$\" gives a natural range of typical outcomes, whereas $$\\mu \\pm \\sigma^2$$ doesn't make dimensional sense.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "For $$X \\sim B(20, 0.2)$$ with $$\\mu = 4$$ and $$\\sigma \\approx 1.79$$, explain how to compute $$P(X < \\mu - \\sigma)$$ and why the non-integer boundary gets rounded. (3 steps)", "answer": "- Step 1: $$\\mu - \\sigma = 4 - 1.79 = 2.21$$, so we want $$P(X < 2.21)$$.\n- Step 2: Since $$X$$ only takes integer values (0, 1, 2, 3, ...), the event $$X < 2.21$$ is the same as $$X \\leq 2$$ — the values 0, 1, and 2 satisfy both inequalities.\n- Step 3: Compute $$P(X \\leq 2)$$ from a binomial cumulative table at $$n = 20, p = 0.2$$, giving approximately $$0.2061$$.\n\nTakeaway: For discrete variables, always translate fractional bounds to the nearest integer in the correct direction.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "Given $$X \\sim B(4, p)$$ and $$P(X \\geq 1) = 0.3439$$, find $$p$$. What algebraic trick simplifies the problem? (4 steps)", "answer": "- Step 1: Instead of computing $$P(X \\geq 1)$$ directly (sum of four terms), use the complement: $$P(X \\geq 1) = 1 - P(X = 0)$$.\n- Step 2: So $$1 - P(X = 0) = 0.3439$$, meaning $$P(X = 0) = 0.6561$$.\n- Step 3: $$P(X = 0) = (1-p)^4 = 0.6561$$. Take the fourth root: $$1 - p = \\sqrt[4]{0.6561} = 0.9$$.\n- Step 4: So $$p = 0.1$$.\n\nTakeaway: Whenever you see $$P(X \\geq 1)$$ or \"at least one\", convert to the complement — often only the $$P(X = 0)$$ term is easy.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "As $$n$$ grows (with fixed $$p$$), what happens to the shape of $$B(n, p)$$ and the *relative* spread $$\\sigma / \\mu$$? (3 steps)", "answer": "- Step 1: The distribution becomes increasingly bell-shaped (approaching a normal distribution by the Central Limit Theorem).\n- Step 2: The mean $$\\mu = np$$ grows linearly with $$n$$, while the standard deviation $$\\sigma = \\sqrt{np(1-p)}$$ grows as $$\\sqrt{n}$$.\n- Step 3: The relative spread $$\\sigma/\\mu = \\frac{\\sqrt{np(1-p)}}{np} = \\sqrt{\\frac{1-p}{np}}$$ **shrinks** as $$n$$ grows. In other words, large-sample outcomes become more concentrated around the mean proportionally.\n\nTakeaway: Bigger $$n$$ makes the distribution narrower relative to its mean — this is the foundation of the law of large numbers.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": false}, {"question": "Why does binomial data typically concentrate near its mean $$np$$ rather than around the extreme values 0 or $$n$$? Give a qualitative argument based on combinatorics. (3 steps)", "answer": "- Step 1: The binomial coefficient $$\\binom{n}{r}$$ is maximized around $$r \\approx n/2$$ (or more precisely around $$r \\approx np$$). There are far more sequences with a moderate count of successes than with extreme counts.\n- Step 2: For example, with $$n = 10$$: $$\\binom{10}{0} = 1$$ (only one sequence: all failures), but $$\\binom{10}{5} = 252$$ (many arrangements of 5 successes).\n- Step 3: Probabilities of specific sequences vary with $$p$$, but the combinatorial weight pushes probability mass toward the \"centre\" — that centre happens to be near $$np$$.\n\nTakeaway: The peak of binomial PDF reflects the combinatorial abundance of \"mixed\" outcomes.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": true}, {"question": "A common mistake is to write $$\\operatorname{Var}(X) = np$$ or $$\\operatorname{Var}(X) = np^2$$ for $$X \\sim B(n, p)$$. Why are both wrong, and what's the correct form plus intuition? (3 steps)", "answer": "- Step 1: Neither form captures the true structure. The correct answer is $$\\operatorname{Var}(X) = np(1-p)$$.\n- Step 2: $$np$$ is actually the *mean*, not the variance. Confusing the two forgets the role of uncertainty. $$np^2$$ misses the \"$$(1-p)$$\" factor entirely.\n- Step 3: Intuition: variance depends on *both* failure and success probabilities. At $$p = 1$$, all trials succeed (zero variance), so the formula must vanish there. $$np(1-p)$$ correctly returns 0 at $$p = 0$$ AND $$p = 1$$, whereas $$np^2$$ wouldn't.\n\nTakeaway: Variance is \"inherent uncertainty per trial × number of trials\", where per-trial uncertainty is maximized at balance.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": true}, {"question": "Anna argues: \"In 3 coin flips the probability of exactly 2 heads is $$(1/2)^2 \\times (1/2) = 1/8$$ because each flip is independent with probability $$1/2$$.\" What's the error? (3 steps)", "answer": "- Step 1: Anna computed the probability of **one specific ordering** of 2 heads and 1 tail, e.g., HHT. This gives $$1/8$$ correctly for that sequence.\n- Step 2: The event \"exactly 2 heads\" includes all orderings: HHT, HTH, THH. Each of these has probability $$1/8$$.\n- Step 3: Correct answer: $$\\binom{3}{2} \\cdot (1/2)^2 \\cdot (1/2) = 3 \\cdot 1/8 = 3/8$$. The missing factor is the number of arrangements.\n\nTakeaway: For \"exactly $$r$$ successes\" problems, always include $$\\binom{n}{r}$$ to account for the multiplicity of orderings.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": true}, {"question": "Consider the edge cases of the binomial: what does $$B(n, 0)$$ and $$B(n, 1)$$ look like? What about $$B(1, p)$$? (3 steps)", "answer": "- Step 1: $$B(n, 0)$$: zero probability of success means $$X = 0$$ always. This is a degenerate distribution concentrated at 0. Mean = 0, variance = 0.\n- Step 2: $$B(n, 1)$$: every trial succeeds, so $$X = n$$ always. Degenerate at $$n$$. Mean = $$n$$, variance = 0.\n- Step 3: $$B(1, p)$$: this is literally a single Bernoulli trial. $$X \\in \\{0, 1\\}$$ with $$P(X = 1) = p$$. Mean = $$p$$, variance = $$p(1-p)$$.\n\nTakeaway: Binomial gracefully collapses to familiar objects at the boundary — degenerate at $$p = 0, 1$$, and Bernoulli at $$n = 1$$.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": true}, {"question": "In the binomial probability distribution table (e.g., for $$X \\sim B(5, p)$$), what is the relationship between consecutive row entries for a fixed $$p$$? Why are cumulative values monotonically non-decreasing? (3 steps)", "answer": "- Step 1: Each cumulative entry $$P(X \\leq x)$$ adds a non-negative probability $$P(X = x)$$ to the previous entry $$P(X \\leq x-1)$$. So the sequence is non-decreasing.\n- Step 2: The last row (for $$x = n$$) must equal 1, since $$X$$ cannot exceed $$n$$.\n- Step 3: The differences between consecutive cumulative entries *are* the individual probabilities: $$P(X = x) = P(X \\leq x) - P(X \\leq x - 1)$$. This lets you extract individual probabilities from a cumulative table.\n\nTakeaway: Cumulative tables implicitly contain all individual probabilities — you just subtract neighbours.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": true}, {"question": "If data from 500 experiments (each rolling a dice 5 times) has total observed sixes = 400, use this to estimate $$p$$ for the biased dice. (3 steps)", "answer": "- Step 1: Total throws = $$500 \\times 5 = 2500$$. Observed successes = 400. Proportion of sixes = $$400 / 2500 = 0.16$$.\n- Step 2: Alternatively via mean: mean number of sixes per experiment = $$400/500 = 0.8$$. Using $$\\mu = np$$: $$0.8 = 5p$$, so $$p = 0.16$$.\n- Step 3: This is a natural estimator: \"what proportion of all trials succeeded?\" Both approaches give the same answer because they're essentially the same calculation.\n\nTakeaway: The relative frequency of success is the natural estimate of $$p$$ — and matches $$\\mu/n$$.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": false}, {"question": "A company produces components with $$p = 0.1$$ faulty. Over 600 components, what are the mean and variance of the number of faulty ones, and what does the standard deviation tell you about typical variation? (4 steps)", "answer": "- Step 1: $$X \\sim B(600, 0.1)$$. Mean = $$np = 600 \\times 0.1 = 60$$.\n- Step 2: Variance = $$np(1-p) = 600 \\times 0.1 \\times 0.9 = 54$$.\n- Step 3: Standard deviation = $$\\sqrt{54} \\approx 7.35$$. So typical days see around $$60 \\pm 7$$ faulty components.\n- Step 4: The relative spread is about $$7.35/60 \\approx 12\\%$$ — modest but not negligible. If the company saw a day with 80+ faulty parts, that'd be about 2.7 standard deviations above the mean: suspicious but not impossible.\n\nTakeaway: Mean and variance together let you judge \"is today's outcome weird?\"", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": false}, {"question": "Why is the binomial distribution appropriate for \"coin flips\" but not for \"time until the next earthquake\"? Identify which binomial condition fails. (3 steps)", "answer": "- Step 1: Coin flips have a fixed number of trials, two outcomes (heads/tails), constant $$p$$, and independent trials. All four binomial conditions hold.\n- Step 2: Time until next earthquake: there's no fixed number of trials — time is continuous and we're waiting for a single event. Moreover, the quantity measured (time) is continuous, not a count of successes out of $$n$$.\n- Step 3: Waiting-time problems typically use the exponential (continuous) or geometric (discrete) distribution, not binomial. The key mismatch: binomial counts successes in a fixed window; waiting-time problems measure how long until a specific event.\n\nTakeaway: Binomial is for \"count out of $$n$$\" — it's not the right tool for \"when/how long\".", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": false}, {"question": "A salesman knocks on 10 doors with $$p = 0.65$$ reply probability per door. Roughly where does the distribution of replies peak, and what would be surprising? (3 steps)", "answer": "- Step 1: $$X \\sim B(10, 0.65)$$. Mean = $$10 \\times 0.65 = 6.5$$, so the most likely outcomes are 6 or 7 replies.\n- Step 2: Standard deviation = $$\\sqrt{10 \\times 0.65 \\times 0.35} \\approx \\sqrt{2.275} \\approx 1.51$$. Typical range: about $$6.5 \\pm 1.5$$, so outcomes from 5 to 8 are not unusual.\n- Step 3: Getting all 10 replies is possible ($$(0.65)^{10} \\approx 0.0135$$), but rare — about a 1.3% chance. Getting 0 replies is vanishingly unlikely ($$(0.35)^{10} \\approx 0.00003$$).\n\nTakeaway: Use mean and spread to get a feel for where binomial outcomes live before computing.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": false}, {"question": "Suppose $$X \\sim B(n, p)$$ and you know both $$E(X) = 4.8$$ and $$\\operatorname{Var}(X) = 2.88$$. How do you recover $$n$$ and $$p$$ individually? (4 steps)", "answer": "- Step 1: Use $$E(X) = np = 4.8$$ and $$\\operatorname{Var}(X) = np(1-p) = 2.88$$.\n- Step 2: Divide variance by mean: $$\\frac{np(1-p)}{np} = 1 - p = \\frac{2.88}{4.8} = 0.6$$.\n- Step 3: So $$p = 0.4$$.\n- Step 4: Plug back: $$np = 4.8$$ gives $$n = 4.8 / 0.4 = 12$$. So $$X \\sim B(12, 0.4)$$.\n\nTakeaway: Mean and variance together fully identify a binomial. The ratio $$\\operatorname{Var}/E$$ equals $$1 - p$$ — a quick trick.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": false}, {"question": "Why is the formula $$\\binom{n}{r} p^r (1-p)^{n-r}$$ symmetric under swapping \"success\" and \"failure\"? What does this mean about distributions $$B(n, p)$$ and $$B(n, 1-p)$$? (3 steps)", "answer": "- Step 1: If we swap the meaning of success and failure, $$p$$ and $$1-p$$ swap, and \"$$r$$ successes\" becomes \"$$r$$ failures\", which equals \"$$n-r$$ new successes\".\n- Step 2: Applying this: $$P_\\text{old}(X = r) = P_\\text{new}(X = n - r)$$. The distribution is \"mirrored\" around the centre.\n- Step 3: Formally: if $$X \\sim B(n, p)$$, then $$Y = n - X \\sim B(n, 1-p)$$. This is exactly why tables only need $$p \\leq 0.5$$ — the other half is a mirror image.\n\nTakeaway: The binomial has a built-in symmetry between success and failure.", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": true}, {"question": "A student proposes that \"since E(X) and Var(X) are both positive multiples of $$n$$, they grow at the same rate.\" Is this claim subtle but wrong? Explain. (3 steps)", "answer": "- Step 1: Both $$E(X) = np$$ and $$\\operatorname{Var}(X) = np(1-p)$$ are linear in $$n$$ with fixed $$p$$. So in that sense, yes — they grow proportionally, both $$\\propto n$$.\n- Step 2: But the *standard deviation* $$\\sigma = \\sqrt{np(1-p)}$$ grows as $$\\sqrt{n}$$, slower than $$n$$. Relative spread $$\\sigma/\\mu \\propto 1/\\sqrt{n}$$ shrinks.\n- Step 3: So while mean and variance both scale linearly, the distribution becomes *relatively* more concentrated as $$n$$ grows. The student's statement hides an important scaling insight: you need variance's square root (i.e., SD) to compare apples to apples with the mean.\n\nTakeaway: Mean and variance scale together, but SD grows slower than mean — that's why bigger samples are more precise.", "source": "Opus 4.7 ②", "_id": "opus_2_51", "judge_pick": true}, {"question": "Describe the intuition behind this problem: \"Find the smallest $$n$$ such that $$P(X \\geq n) \\leq 0.1$$ where $$X \\sim B(2n, 0.25)$$.\" What makes it tricky? (4 steps)", "answer": "- Step 1: Notice that both the number of trials ($$2n$$) and the threshold ($$n$$) depend on $$n$$ — so changing $$n$$ changes both the distribution AND the event.\n- Step 2: The mean of $$X$$ is $$2n \\times 0.25 = 0.5n$$, so \"the number of successes being at least $$n$$\" means at least twice the mean. This is asking how often $$X$$ is well above average.\n- Step 3: As $$n$$ grows, the distribution concentrates relatively more tightly near its mean $$0.5n$$, so the event $$X \\geq n$$ (which is in the upper tail) becomes rarer.\n- Step 4: Strategy: Try small $$n$$ values, compute $$P(X \\geq n) = 1 - P(X \\leq n - 1)$$ using tables at $$n_\\text{trials} = 2n$$, and find the smallest $$n$$ where this drops below 0.1.\n\nTakeaway: When the parameter appears in both $$n$$ and threshold, you can't isolate — you iterate.", "source": "Opus 4.7 ②", "_id": "opus_2_52", "judge_pick": true}, {"question": "A driving test has 50 questions, four options each, one correct. Li Wei knows 32 answers correctly and guesses the rest. She needs 43 correct to pass. Model this and describe the probability she passes. (4 steps)", "answer": "- Step 1: Let $$X$$ be the number of correct answers among the 18 guessed questions. Each guess has probability $$0.25$$ of being right, and guesses are independent: $$X \\sim B(18, 0.25)$$.\n- Step 2: She already has 32 correct; she needs 43 total, so she needs $$43 - 32 = 11$$ more correct out of 18 guessed.\n- Step 3: Want $$P(X \\geq 11)$$. Compute as $$1 - P(X \\leq 10)$$ using tables or calculator at $$n = 18, p = 0.25$$.\n- Step 4: The mean of $$X$$ is $$18 \\times 0.25 = 4.5$$, so needing 11 is well above average — the probability will be very small. (Numerically $$\\approx 0.0002$$ to 4 s.f.)\n\nTakeaway: Model the uncertain part (guesses) as binomial; her known answers are deterministic. The mean gives a sanity check on \"is 11 likely?\"", "source": "Opus 4.7 ②", "_id": "opus_2_53", "judge_pick": false}, {"question": "For a random variable $$X \\sim B(10, p)$$ with $$\\operatorname{Var}(X) = 2.4$$, there are two possible values of $$p$$. Why, and what does this tell you about variance as a function of $$p$$? (3 steps)", "answer": "- Step 1: $$np(1-p) = 2.4$$ with $$n = 10$$ gives $$p(1-p) = 0.24$$. Solving: $$p^2 - p + 0.24 = 0$$, factor $$(p - 0.4)(p - 0.6) = 0$$. So $$p = 0.4$$ or $$p = 0.6$$.\n- Step 2: The two values are reflections around $$p = 0.5$$: $$p$$ and $$1 - p$$.\n- Step 3: This reflects the symmetry of variance in $$p$$ and $$1-p$$. From a variance-alone perspective, you cannot distinguish a distribution with $$p = 0.4$$ from one with $$p = 0.6$$ — they have identical spread. The mean would distinguish them (4 vs 6), but the variance alone is ambiguous.\n\nTakeaway: Variance alone is blind to the $$p \\leftrightarrow 1-p$$ symmetry.", "source": "Opus 4.7 ②", "_id": "opus_2_54", "judge_pick": true}, {"question": "Why does the phrase \"at least one\" almost always call for the complement $$1 - P(X = 0)$$? (3 steps)", "answer": "- Step 1: \"At least one\" = $$X \\geq 1$$, which spans many outcomes (1, 2, 3, ..., $$n$$). Directly summing these is tedious.\n- Step 2: The complement \"not at least one\" = \"none\" = $$X = 0$$ is a single outcome, with a simple form $$(1-p)^n$$.\n- Step 3: So $$P(X \\geq 1) = 1 - P(X = 0) = 1 - (1-p)^n$$ — a one-line calculation versus a multi-term sum.\n\nTakeaway: Whenever the complement is dramatically simpler than the direct event, use $$P(\\text{event}) = 1 - P(\\text{complement})$$.", "source": "Opus 4.7 ②", "_id": "opus_2_55", "judge_pick": false}, {"question": "A company produces 120 boxes of biscuits per day. Each biscuit has $$p = 0.04$$ of being broken, and each box has 48 biscuits. The variable of interest is the number of boxes with at least 2 broken biscuits. Why is this a *nested* binomial structure, and how do we handle it? (4 steps)", "answer": "- Step 1: First-level binomial: Within one box, $$X \\sim B(48, 0.04)$$ counts broken biscuits. Compute $$q = P(X \\geq 2) = 1 - P(X \\leq 1)$$, which becomes the \"success\" probability per box.\n- Step 2: Second-level binomial: Let $$Y$$ = number of boxes (out of 120) with at least 2 broken biscuits. Then $$Y \\sim B(120, q)$$.\n- Step 3: The key insight: the \"success\" at the box level is itself an event computed from a binomial inside each box. Compute $$q$$ first, then plug into the outer binomial.\n- Step 4: Compute $$E(Y) = 120 q$$ and $$\\operatorname{Var}(Y) = 120 q(1-q)$$. The two binomials stack cleanly because boxes are independent.\n\nTakeaway: Nested binomials are common — identify the two levels, compute the inner probability, then apply it as $$p$$ in the outer binomial.", "source": "Opus 4.7 ②", "_id": "opus_2_56", "judge_pick": true}, {"question": "In a binomial $$X \\sim B(3, p)$$, write out the full probability distribution table in terms of $$p$$, and use it to verify $$E(X) = 3p$$ and $$\\operatorname{Var}(X) = 3p(1-p)$$. (4 steps)", "answer": "- Step 1: The probabilities are:\n\n| $$x$$ | 0 | 1 | 2 | 3 |\n|---|---|---|---|---|\n| $$P(X = x)$$ | $$(1-p)^3$$ | $$3p(1-p)^2$$ | $$3p^2(1-p)$$ | $$p^3$$ |\n\n- Step 2: $$E(X) = \\sum x \\cdot P(X = x) = 0 + 3p(1-p)^2 + 6p^2(1-p) + 3p^3 = 3p[(1-p)^2 + 2p(1-p) + p^2] = 3p[(1-p) + p]^2 = 3p$$.\n- Step 3: $$E(X^2) = 0 + 3p(1-p)^2 + 12p^2(1-p) + 9p^3$$. With algebra, this simplifies to $$3p(1 + 2p) = 3p + 6p^2$$.\n- Step 4: $$\\operatorname{Var}(X) = E(X^2) - [E(X)]^2 = 3p + 6p^2 - 9p^2 = 3p - 3p^2 = 3p(1-p)$$. ✓\n\nTakeaway: The formulas $$E(X) = np, \\operatorname{Var}(X) = np(1-p)$$ can be verified directly from the distribution table — no need to always rely on the Bernoulli sum argument.", "source": "Opus 4.7 ②", "_id": "opus_2_57", "judge_pick": true}, {"question": "Consider a binomial $$X \\sim B(20, 0.15)$$. Without calculation, argue why the probability of exactly 7 being left-handed should be quite small. (3 steps)", "answer": "- Step 1: The mean is $$\\mu = 20 \\times 0.15 = 3$$, so the \"centre\" of the distribution is near 3.\n- Step 2: Standard deviation is $$\\sqrt{20 \\times 0.15 \\times 0.85} \\approx \\sqrt{2.55} \\approx 1.6$$.\n- Step 3: The value 7 is $$(7 - 3)/1.6 = 2.5$$ standard deviations above the mean — well into the tail. So $$P(X = 7)$$ is expected to be small (approximately 0.016 in this case).\n\nTakeaway: Mean and SD let you estimate whether an outcome is \"likely\" before computing exactly.", "source": "Opus 4.7 ②", "_id": "opus_2_58", "judge_pick": false}, {"question": "If the binomial formula had no combinatorial factor — just $$p^r(1-p)^{n-r}$$ — why would the probabilities fail to sum to 1? (3 steps)", "answer": "- Step 1: Without $$\\binom{n}{r}$$, the sum would be $$\\sum_{r=0}^{n} p^r (1-p)^{n-r}$$, which is a sum of $$n+1$$ identical-looking but unequal terms.\n- Step 2: By the binomial theorem, the correct sum of $$\\binom{n}{r} p^r (1-p)^{n-r}$$ is $$(p + (1-p))^n = 1$$. Removing the $$\\binom{n}{r}$$ factor breaks this identity.\n- Step 3: Without the combinatorial weights, we'd be undercounting — each probability reflects only one specific ordering, not the total over all arrangements. The combinatorial factor is exactly what scales individual sequence probabilities to event probabilities.\n\nTakeaway: $$\\binom{n}{r}$$ is not cosmetic — it's what makes the distribution actually sum to 1.", "source": "Opus 4.7 ②", "_id": "opus_2_59", "judge_pick": true}, {"question": "For $$X \\sim B(n, p)$$, as $$n$$ grows with $$np$$ held constant (so $$p \\to 0$$), what limit does the distribution approach, and what's the intuition? (3 steps)", "answer": "- Step 1: As $$n \\to \\infty$$ and $$p \\to 0$$ with $$np = \\lambda$$ constant, $$B(n, p)$$ converges to the Poisson distribution with parameter $$\\lambda$$.\n- Step 2: Intuition: each trial becomes vanishingly unlikely to succeed, but there are vastly many trials. The expected number of successes $$\\lambda$$ remains fixed, and successes become \"rare, independent events\" — the defining property of Poisson.\n- Step 3: This is why Poisson is the go-to for counting rare events (typos per page, cosmic rays per second): it's a clean limiting case of binomial when $$p$$ is small and $$n$$ is large.\n\nTakeaway: Binomial is a finite-trial model; Poisson emerges as the infinite-trial rare-event limit.", "source": "Opus 4.7 ②", "_id": "opus_2_60", "judge_pick": false}, {"question": "Consider a question where the number of successes in 15 spins is recorded, and the variance of the *data* is much larger than $$np(1-p)$$ predicted by the binomial model. What does this suggest about the modelling assumption? (3 steps)", "answer": "- Step 1: Under the binomial, theoretical variance is exactly $$np(1-p)$$. If observed variance greatly exceeds this, the data is overdispersed.\n- Step 2: Possible explanations: (a) $$p$$ is not constant across spins (e.g., the spinner is gradually wearing down, or conditions change); (b) spins are not independent (e.g., the previous outcome biases the next); (c) there are hidden sub-populations with different $$p$$'s.\n- Step 3: The binomial model may not be appropriate. We'd consider alternatives like beta-binomial (for heterogeneous $$p$$) or allow for dependence structures.\n\nTakeaway: Comparing observed to expected variance is a simple diagnostic for whether a binomial model fits.", "source": "Opus 4.7 ②", "_id": "opus_2_61", "judge_pick": true}, {"question": "For a binomial with $$p = 0.5$$, what is the relationship between $$P(X = r)$$ and $$P(X = n-r)$$? Why is this true? (3 steps)", "answer": "- Step 1: At $$p = 0.5$$: $$P(X = r) = \\binom{n}{r}(0.5)^r(0.5)^{n-r} = \\binom{n}{r}(0.5)^n$$.\n- Step 2: Similarly, $$P(X = n - r) = \\binom{n}{n-r}(0.5)^n = \\binom{n}{r}(0.5)^n$$ (since $$\\binom{n}{r} = \\binom{n}{n-r}$$).\n- Step 3: So the probabilities are equal: the distribution is symmetric about $$n/2$$. This reflects the fundamental symmetry when success and failure are equally likely.\n\nTakeaway: Only at $$p = 0.5$$ is the binomial perfectly symmetric; otherwise it's skewed toward whichever side is more probable.", "source": "Opus 4.7 ②", "_id": "opus_2_62", "judge_pick": false}, {"question": "In a binomial with $$n = 40, p = 0.10$$, roughly how many values of $$X$$ carry most of the probability? What is the practical implication? (3 steps)", "answer": "- Step 1: Mean $$= np = 4$$. SD $$= \\sqrt{40 \\times 0.1 \\times 0.9} = \\sqrt{3.6} \\approx 1.9$$.\n- Step 2: Most probability (by the empirical \"68%-95%-99.7%\" rule, which approximately applies to near-normal binomials) lies within $$\\mu \\pm 2\\sigma \\approx 4 \\pm 3.8$$, i.e., values 0 to 8 or so.\n- Step 3: Practically: even though $$X$$ could be any value from 0 to 40, values above ~10 are vanishingly rare, and most daily outcomes will be between 1 and 7. For tail questions, tables for $$P(X \\leq 10)$$ already give essentially 1.\n\nTakeaway: The effective range of a binomial is only about $$6\\sigma$$ wide, much smaller than $$n$$ when $$p$$ is small.", "source": "Opus 4.7 ②", "_id": "opus_2_63", "judge_pick": true}], "count": 64}}, "meta": {"glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 12819, "out_tokens": 12198, "reasoning_chars": 20827, "cost_eur": 0.0517, "elapsed_s": 269, "content_chars": 18216}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 12819, "out_tokens": 15477, "reasoning_chars": 28755, "cost_eur": 0.0622, "elapsed_s": 606, "content_chars": 23840}, "minimax_1": {"run": 1, "provider": "minim const SK='s2_ch1';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  fetch('/api/notion',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>r.json()).then(d=>{if(d.url){toast('Done!');window.open(d.url)}else toast('Error: '+(d.error||'?'))}).catch(e=>toast('Error: '+e.message))
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
