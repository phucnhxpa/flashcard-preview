y of success (heads). We want $$r = 4$$ successes.\n- Step 2: Apply the formula: $$P(X=4) = \\binom{5}{4} (0.5)^4 (0.5)^1 = 5 \\times 0.0625 \\times 0.5 = 0.15625$$.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "For $$X \\sim B(8, 0.25)$$, what is $$P(X \\leq 1)$$? (2 steps)", "answer": "- Step 1: Recognize that $$P(X \\leq 1) = P(X = 0) + P(X = 1)$$.\n- Step 2: Calculate the terms: $$P(X=0) = (0.75)^8 \\approx 0.100$$ and $$P(X=1) = \\binom{8}{1}(0.25)(0.75)^7 = 8(0.25)(0.133) \\approx 0.267$$. Summing them gives approximately 0.367.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "A fair six-sided dice is rolled 30 times. Let $$X$$ be the number of times a 6 is rolled. Without heavy calculation, what is the expected value (mean) and the variance of $$X$$? (2 steps)", "answer": "- Step 1: Identify the parameters: $$n = 30$$ and $$p = 1/6$$ (probability of rolling a 6).\n- Step 2: Apply the formulas: Mean $$= np = 30 \\times (1/6) = 5$$. Variance $$= np(1-p) = 30 \\times (1/6) \\times (5/6) = 5 \\times (5/6) = 25/6 \\approx 4.17$$.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "Why is $$P(X \\geq 2)$$ not the same as $$1 - P(X \\leq 2)$$? What is the correct complement for $$P(X \\geq 2)$$? (2 steps)", "answer": "- Step 1: $$P(X \\geq 2)$$ includes the values 2, 3, 4... up to $$n$$. The complement of this set (everything else) includes the values 0 and 1.\n- Step 2: Therefore, the correct complement is $$P(X \\leq 1)$$. So $$P(X \\geq 2) = 1 - P(X \\leq 1)$$. Using $$1 - P(X \\leq 2)$$ would incorrectly exclude the probability of exactly 2.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": true}, {"question": "For a discrete random variable $$X$$, explain why $$P(X < 3)$$ is the same as $$P(X \\leq 2)$$, but this logic would not hold for a continuous variable. (2 steps)", "answer": "- Step 1: A discrete random variable can only take integer values (like 0, 1, 2, 3...). The only integers strictly less than 3 are 2, 1, 0, etc. Thus, the events \"$$X < 3$$\" and \"$$X \\leq 2$$\" contain exactly the same outcomes.\n- Step 2: For a continuous variable, $$X$$ can take any value (like 2.5 or 2.99). The event \"$$X < 3$$\" includes 2.5, but \"$$X \\leq 2$$\" does not. In the binomial distribution, always convert strict inequalities like $$X < a$$ to $$X \\leq a-1$$ to use cumulative tables correctly.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "A student models the number of red cars passing a junction in an hour as $$B(60, 0.2)$$. Critically assess the assumption of independence in this model. (3 steps)", "answer": "- Step 1: The binomial model assumes each trial (each car passing) is independent. However, traffic often travels in convoys or is influenced by traffic lights.\n- Step 2: If a red light stops traffic, the next few cars are not independent; if one stops, the others are highly likely to stop too. Also, cars from the same household (e.g., a family with two red cars) might travel together.\n- Step 3: Therefore, while the binomial model might be a useful approximation, the independence assumption is likely violated in reality due to traffic flow dynamics.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": true}, {"question": "You are given $$X \\sim B(n, p)$$ and you know that $$E(X) = 10$$ and $$Var(X) = 9$$. Find $$n$$ and $$p$$, and explain what the values imply about the shape of the distribution. (3 steps)", "answer": "- Step 1: Set up equations: $$np = 10$$ and $$np(1-p) = 9$$. Divide the second by the first: $$1-p = 0.9$$, so $$p = 0.1$$.\n- Step 2: Substitute $$p$$ back: $$n(0.1) = 10$$, so $$n = 100$$.\n- Step 3: Since $$p = 0.1$$ (which is much less than 0.5), the distribution will be positively skewed (a long tail to the right). Most of the data will be clustered around the mean of 10, with very few outcomes near the maximum of 100.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}], "count": 21}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "A student wants to model the number of goals scored in a football match using a binomial distribution. State the four conditions required for a random variable to be modelled by a binomial distribution, and briefly explain why the football match scenario might violate one of them. (2 steps)", "answer": "- Step 1: The four conditions for a binomial distribution are: a fixed number of trials ($$n$$), exactly two possible outcomes for each trial (success and failure), a fixed probability of success ($$p$$), and independent trials.\n- Step 2: The football match scenario likely violates the \"fixed number of trials\" condition because the number of goal-scoring attempts in a match is not a fixed, predetermined number $$n$$. Additionally, it could violate \"independence\" if a team's probability of scoring changes based on the current score or morale.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "In a binomial distribution, the trials must be independent. Give a practical example where this independence condition fails, and explain how it affects the probability of success in subsequent trials. (2 steps)", "answer": "- Step 1: Independence means the outcome of one trial does not affect the probability of success in any other trial.\n- Step 2: A classic example of failure is drawing cards from a standard deck without replacement. If you draw an Ace on the first trial, the probability of drawing an Ace on the second trial decreases because there are fewer Aces left in the deck. The first trial directly affects the probability of success in the second, violating independence.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": true}, {"question": "A bag contains 5 red and 5 blue balls. You draw 3 balls without replacement and count the number of red balls. Explain why this is NOT a binomial distribution, focusing on which condition is violated. (2 steps)", "answer": "- Step 1: The condition violated is the \"fixed probability of success\" (which also inherently breaks the independence condition).\n- Step 2: Initially, the probability of drawing a red ball is $$\\frac{5}{10} = 0.5$$. However, if you draw a red ball and do not replace it, the probability of drawing a red ball on the second draw changes to $$\\frac{4}{9}$$. Since the probability of success changes after each draw depending on previous outcomes, it violates the constant $$p$$ requirement of the binomial model.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "When sampling without replacement from a large population (e.g., checking 20 bolts from a batch of 10,000), we often still use the binomial model. Explain the intuition behind why this is acceptable, even though the probability technically changes with each draw. (2 steps)", "answer": "- Step 1: When the population is very large, removing one item changes the composition of the population by such a tiny fraction that the probability of success remains practically constant.\n- Step 2: For example, if you have 10,000 bolts and 5% are faulty, drawing one faulty bolt changes the probability of the next being faulty from $$\\frac{500}{10000} = 0.05$$ to $$\\frac{499}{9999} \\approx 0.0499$$. This difference is negligible, so we assume the probability is constant and the draws are effectively independent, allowing us to safely use the binomial model as a very close approximation.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "The formula for binomial probability is $$P(X=r) = \\binom{n}{r} p^r (1-p)^{n-r}$$. Explain the conceptual role of the $$\\binom{n}{r}$$ term. Why must it be included rather than just multiplying $$p^r (1-p)^{n-r}$$? (2 steps)", "answer": "- Step 1: The term $$\\binom{n}{r}$$ represents the number of distinct sequences or arrangements in which exactly $$r$$ successes can occur in $$n$$ trials.\n- Step 2: If we just calculated $$p^r (1-p)^{n-r}$$, we would only be finding the probability of one specific sequence (e.g., getting all successes first, followed by all failures). Since any sequence with exactly $$r$$ successes satisfies the condition, we must multiply the probability of one single sequence by the total number of possible sequences, which is exactly $$\\binom{n}{r}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "In the binomial formula $$P(X=r) = \\binom{n}{r} p^r (1-p)^{n-r}$$, what do the terms $$p^r$$ and $$(1-p)^{n-r}$$ represent? Walk through the logic using a simple example like exactly 2 successes in 4 trials. (3 steps)", "answer": "- Step 1: The term $$p^r$$ represents the probability of getting exactly $$r$$ successes. Since each success occurs with probability $$p$$ and the trials are independent, these probabilities multiply.\n- Step 2: The term $$(1-p)^{n-r}$$ represents the probability of getting exactly $$n-r$$ failures. Since each failure occurs with probability $$1-p$$, these also multiply.\n- Step 3: For 4 trials, the specific sequence Success-Success-Failure-Failure has probability $$p \\times p \\times (1-p) \\times (1-p) = p^2(1-p)^2$$. The binomial formula multiplies this base probability for any single arrangement by the number of ways to arrange it, $$\\binom{4}{2}$$, to account for all possible orderings of 2 successes and 2 failures.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "How does the binomial probability distribution connect to the binomial expansion of $$(p + q)^n$$ where $$p + q = 1$$? Why does this connection guarantee that the sum of all binomial probabilities is 1? (2 steps)", "answer": "- Step 1: The binomial expansion of $$(p+q)^n$$ generates terms of the form $$\\binom{n}{r} p^r q^{n-r}$$. If we substitute $$q = 1-p$$, these are exactly the terms of the binomial probability distribution $$P(X=r)$$.\n- Step 2: Because $$p + q = 1$$, we know that $$(p+q)^n = 1^n = 1$$. Therefore, the sum of all the individual terms in the expansion—which are exactly the probabilities $$P(X=0) + P(X=1) + ... + P(X=n)$$—must equal 1. This mathematically guarantees that the total probability across all possible outcomes is 1.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "Consider a binomial random variable $$X \\sim B(n, p)$$. Describe the behavior of the distribution in the edge cases where $$p = 0$$ and $$p = 1$$. What is the probability distribution table for each case? (2 steps)", "answer": "- Step 1: If $$p = 0$$, success is impossible. The random variable $$X$$ (number of successes) will always be 0. The distribution is entirely concentrated at $$X=0$$, so $$P(X=0) = 1$$ and all other probabilities are 0.\n- Step 2: If $$p = 1$$, success is certain. The random variable $$X$$ will always equal $$n$$ (the number of trials). The distribution is entirely concentrated at $$X=n$$, so $$P(X=n) = 1$$ and all other probabilities are 0. In both edge cases, there is absolutely no uncertainty, so the variance is 0.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": true}, {"question": "When working with cumulative binomial probabilities, it is crucial to translate phrases into correct mathematical inequalities. How do \"at least 5\" and \"more than 5\" differ in their translation to $$P(X \\le x)$$ notation, and how do you calculate them? (3 steps)", "answer": "- Step 1: \"At least 5\" means 5 or more, which translates to $$X \\ge 5$$. To calculate this using cumulative tables (which give $$P(X \\le x)$$), you use the complement rule: $$P(X \\ge 5) = 1 - P(X \\le 4)$$.\n- Step 2: \"More than 5\" means strictly greater than 5, which translates to $$X > 5$$. To calculate this, you again use the complement rule, but you must exclude 5 as well: $$P(X > 5) = 1 - P(X \\le 5)$$.\n- Step 3: The key difference is whether the boundary value (5) is included. \"At least\" includes the boundary, so you subtract up to the value just before it ($$\\le 4$$). \"More than\" excludes the boundary, so you subtract up to and including it ($$\\le 5$$).", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "Translate the phrases \"fewer than 5 successes\" and \"at most 5 successes\" into statements involving $$P(X \\le x)$$ for a discrete random variable. Explain the key difference. (2 steps)", "answer": "- Step 1: \"Fewer than 5\" means strictly less than 5, which translates to $$X < 5$$. For a discrete variable like the binomial, this is equivalent to $$X \\le 4$$. So, you look up $$P(X \\le 4)$$.\n- Step 2: \"At most 5\" means 5 or fewer, which translates directly to $$X \\le 5$$. So, you look up $$P(X \\le 5)$$. The difference is that \"at most\" includes the value 5, while \"fewer than\" does not.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "Standard binomial tables often only list cumulative probabilities for values of $$p$$ up to 0.5. If you have $$X \\sim B(10, 0.7)$$ and want to find $$P(X \\le 4)$$, explain how to redefine the variable to use a table with $$p = 0.3$$. (3 steps)", "answer": "- Step 1: If the probability of success is 0.7, then the probability of failure is $$1 - 0.7 = 0.3$$. We can redefine \"success\" as \"failure\" to get a parameter that is in the tables.\n- Step 2: Define a new random variable $$Y$$ as the number of failures in 10 trials. Then $$Y \\sim B(10, 0.3)$$. The relationship between the variables is $$Y = 10 - X$$.\n- Step 3: To find $$P(X \\le 4)$$, this means getting 4 or fewer successes. In terms of failures, 4 or fewer successes means 6 or more failures. So, $$P(X \\le 4) = P(Y \\ge 6)$$. You can calculate this as $$1 - P(Y \\le 5)$$ using the table for $$B(10, 0.3)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "A student calculates $$P(X < 5)$$ by looking up the cumulative probability $$P(X \\le 5)$$ in the table. Explain why this is incorrect for a discrete distribution, and state the correct lookup they should perform. (2 steps)", "answer": "- Step 1: For a discrete distribution like the binomial, the random variable can only take integer values. Therefore, $$P(X < 5)$$ (which means $$X=0, 1, 2, 3, 4$$) is not the same as $$P(X \\le 5)$$ (which means $$X=0, 1, 2, 3, 4, 5$$).\n- Step 2: The correct lookup for $$P(X < 5)$$ is $$P(X \\le 4)$$, because the largest integer strictly less than 5 is 4. Looking up $$P(X \\le 5)$$ would incorrectly include the probability of getting exactly 5 successes.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "You need to find the smallest value of $$r$$ such that $$P(X \\ge r) < 0.05$$. Explain the step-by-step strategy to find $$r$$ using a cumulative probability table without doing heavy calculations. (3 steps)", "answer": "- Step 1: First, rewrite the inequality $$P(X \\ge r) < 0.05$$ using the complement rule, which aligns with how cumulative tables are structured: $$1 - P(X \\le r-1) < 0.05$$, which rearranges to $$P(X \\le r-1) > 0.95$$.\n- Step 2: Look up the cumulative probabilities in the table for the given $$n$$ and $$p$$. Scan down the list of values for $$x$$.\n- Step 3: Find the first value of $$x$$ where the cumulative probability $$P(X \\le x)$$ exceeds 0.95. This value of $$x$$ corresponds to $$r-1$$. Therefore, add 1 to this $$x$$ to find the smallest value of $$r$$ that satisfies the original condition.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": true}, {"question": "A single trial in a binomial experiment is called a Bernoulli trial. Write the probability distribution table for a Bernoulli trial with success probability $$p$$, and use it to derive the expected value $$E(X_1)$$. (2 steps)", "answer": "- Step 1: A Bernoulli trial has two outcomes: 1 (success) with probability $$p$$, and 0 (failure) with probability $$1-p$$. The distribution table is: $$P(X_1=1) = p$$ and $$P(X_1=0) = 1-p$$.\n- Step 2: The expected value is calculated as $$E(X_1) = \\sum x \\cdot P(X_1=x)$$. Substituting the values: $$E(X_1) = (0 \\times (1-p)) + (1 \\times p) = p$$. This makes intuitive sense: if the probability of success is $$p$$, you expect success to occur $$p$$ times per trial on average.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "Derive the variance of a single Bernoulli trial, $$Var(X_1)$$, using the definition of variance $$Var(X) = E(X^2) - [E(X)]^2$$ and the probability distribution of a Bernoulli trial. (3 steps)", "answer": "- Step 1: Start with the definition: $$Var(X_1) = E(X_1^2) - [E(X_1)]^2$$. We already know from the previous concept that $$E(X_1) = p$$.\n- Step 2: Calculate $$E(X_1^2)$$. Using the distribution table, $$E(X_1^2) = \\sum x^2 \\cdot P(X_1=x) = (0^2 \\times (1-p)) + (1^2 \\times p) = 0 + p = p$$.\n- Step 3: Substitute back into the variance formula: $$Var(X_1) = p - p^2 = p(1-p)$$. This shows that the spread of a single trial is maximized when $$p=0.5$$ (most uncertainty) and minimized when $$p=0$$ or $$p=1$$ (outcome is certain).", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "A binomial random variable $$X \\sim B(n, p)$$ can be thought of as the sum of $$n$$ independent Bernoulli trials: $$X = X_1 + X_2 + ... + X_n$$. Use this fact, along with the linearity of expectation, to explain why the mean of the binomial distribution is $$np$$. (2 steps)", "answer": "- Step 1: The linearity of expectation states that the expected value of a sum of random variables is the sum of their expected values, regardless of whether they are independent: $$E(X_1 + X_2 + ... + X_n) = E(X_1) + E(X_2) + ... + E(X_n)$$.\n- Step 2: Since each Bernoulli trial $$X_i$$ has an expected value of $$p$$, the sum becomes $$p + p + ... + p$$ (added $$n$$ times). Therefore, $$E(X) = np$$.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "Using the relationship $$X = X_1 + X_2 + ... + X_n$$ for independent Bernoulli trials, explain why the variance of the binomial distribution is $$np(1-p)$$. Why is the independence of the trials crucial for this derivation? (3 steps)", "answer": "- Step 1: Similar to the mean, express the binomial variable as the sum of independent Bernoulli trials: $$X = X_1 + X_2 + ... + X_n$$.\n- Step 2: The variance of a sum of *independent* variables is the sum of their variances: $$Var(X_1 + X_2 + ... + X_n) = Var(X_1) + Var(X_2) + ... + Var(X_n)$$. If the trials were not independent, covariance terms would have to be added to this formula.\n- Step 3: Since each independent Bernoulli trial has variance $$p(1-p)$$, the sum becomes $$p(1-p) + p(1-p) + ... + p(1-p)$$ (added $$n$$ times). Therefore, $$Var(X) = np(1-p)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "For a binomial distribution $$B(n, p)$$, the variance $$np(1-p)$$ is always strictly less than the mean $$np$$ (assuming $$0 < p < 1$$). Explain why this is true mathematically, and what it tells you about the spread of a binomial distribution compared to its center. (2 steps)", "answer": "- Step 1: The mean is $$\\mu = np$$. The variance is $$\\sigma^2 = np(1-p)$$. We can compare them directly by looking at the ratio $$\\frac{\\sigma^2}{\\mu}$$.\n- Step 2: $$\\frac{np(1-p)}{np} = 1-p$$. Since we are assuming $$0 < p < 1$$, the value $$1-p$$ is strictly between 0 and 1. Therefore, $$\\sigma^2 = (1-p)\\mu$$, meaning the variance is always a fraction of the mean. This tells us that as the mean increases (e.g., by increasing $$n$$), the spread also increases, but at a slower rate.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "A binomial variable $$X \\sim B(n, p)$$ has a mean of 12 and a variance of 7.2. Explain the step-by-step algebraic process to find the values of $$n$$ and $$p$$ without guessing. (3 steps)", "answer": "- Step 1: We are given two equations based on the formulas for mean and variance: $$E(X) = np = 12$$ and $$Var(X) = np(1-p) = 7.2$$.\n- Step 2: We can substitute the value of $$np$$ from the mean equation directly into the variance equation. This gives $$12(1-p) = 7.2$$.\n- Step 3: Solve for $$p$$: $$1-p = \\frac{7.2}{12} = 0.6$$, so $$p = 0.4$$. Now substitute $$p=0.4$$ back into the mean equation: $$n(0.4) = 12$$, which gives $$n = 30$$.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "A biased coin is tossed 20 times. The variance of the number of heads is found to be 4.2. Explain how to estimate the probability of getting a head, $$p$$, given that $$p < 0.5$$. (3 steps)", "answer": "- Step 1: The experiment consists of 20 tosses, so $$n = 20$$. The variance of the number of heads is given as 4.2.\n- Step 2: Use the variance formula for the binomial distribution: $$Var(X) = np(1-p)$$. Substitute the known values: $$20p(1-p) = 4.2$$.\n- Step 3: Solve the quadratic equation $$p(1-p) = 0.21$$, which simplifies to $$p^2 - p + 0.21 = 0$$. This gives two possible values for $$p$$. Since the question specifies that the coin is biased such that $$p < 0.5$$, we select the smaller root. The roots are $$p = 0.7$$ and $$p = 0.3$$, so the estimate for $$p$$ is 0.3.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "If a binomial variable $$X \\sim B(20, 0.2)$$ has mean $$\\mu$$ and standard deviation $$\\sigma$$, how would you calculate $$P(X < \\mu - \\sigma)$$? Explain the steps, paying special attention to how you handle the continuous value $$\\mu - \\sigma$$ in a discrete probability context. (3 steps)", "answer": "- Step 1: First, calculate the mean and standard deviation. The mean is $$\\mu = np = 20(0.2) = 4$$. The variance is $$np(1-p) = 20(0.2)(0.8) = 3.2$$, so the standard deviation is $$\\sigma = \\sqrt{3.2} \\approx 1.79$$.\n- Step 2: Calculate the threshold value $$\\mu - \\sigma = 4 - 1.79 = 2.21$$.\n- Step 3: Since $$X$$ is a discrete variable (it can only take integer values 0, 1, 2, 3...), the condition $$X < 2.21$$ is equivalent to $$X \\le 2$$. You would then use the cumulative binomial tables to look up $$P(X \\le 2)$$ for $$B(20, 0.2)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "A traffic light is red 48% of the time, orange 4% of the time, and green 48% of the time. You pass through 6 sets of traffic lights and want to model the number of times you have to stop or wait. Can you use a binomial distribution here? If so, define 'success' and state $$p$$. (2 steps)", "answer": "- Step 1: Yes, you can use a binomial distribution. The key is to redefine the outcomes into two categories. Instead of three outcomes (red, orange, green), define \"success\" as having to stop or wait (i.e., getting a red or orange light).\n- Step 2: The probability of \"success\" is the sum of the probabilities of red and orange: $$p = 0.48 + 0.04 = 0.52$$. The number of trials is the number of traffic lights, $$n = 6$$. The model would be $$X \\sim B(6, 0.52)$$, where $$X$$ is the number of times you have to stop or wait.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "A random variable $$X \\sim B(9, 0.2)$$. Explain how to calculate $$P(2 \\le X \\le 4)$$ using cumulative probabilities. Write out the exact expression in terms of $$P(X \\le x)$$. (2 steps)", "answer": "- Step 1: The expression $$P(2 \\le X \\le 4)$$ means the probability that $$X$$ is 2, 3, or 4. To calculate this using cumulative probabilities, you subtract the probability of getting less than 2 from the probability of getting 4 or fewer.\n- Step 2: \"4 or fewer\" is $$P(X \\le 4)$$. \"Less than 2\" means 0 or 1, which is $$P(X \\le 1)$$. So the exact expression is $$P(2 \\le X \\le 4) = P(X \\le 4) - P(X \\le 1)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "A random variable $$X \\sim B(5, p)$$ is such that $$P(X \\ge 1) = 0.83193$$. Explain the logical steps to find the value of $$p$$ from this information, starting with the complement rule. (3 steps)", "answer": "- Step 1: The phrase $$P(X \\ge 1)$$ means getting 1 or more successes. Using the complement rule, this is equal to $$1 - P(X = 0)$$, which is the probability of getting zero successes.\n- Step 2: Set up the equation: $$1 - P(X = 0) = 0.83193$$, which means $$P(X = 0) = 1 - 0.83193 = 0.16807$$.\n- Step 3: Use the binomial formula for $$P(X = 0)$$ with $$n=5$$: $$P(X=0) = \\binom{5}{0} p^0 (1-p)^5 = (1-p)^5$$. Set this equal to 0.16807: $$(1-p)^5 = 0.16807$$. Take the 5th root to find $$1-p = 0.7$$, so $$p = 0.3$$.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "A fair six-sided dice is rolled 8 times. Find the probability of getting exactly two 5s. Walk through the setup and formula substitution conceptually. (3 steps)", "answer": "- Step 1: Define the random variable. Let $$X$$ be the number of 5s in 8 rolls. This is a binomial distribution because there is a fixed number of trials ($$n=8$$), two outcomes (5 or not 5), fixed probability ($$p=1/6$$), and independent rolls. So $$X \\sim B(8, 1/6)$$.\n- Step 2: Apply the formula $$P(X=r) = \\binom{n}{r} p^r (1-p)^{n-r}$$. We want exactly 2 successes, so $$r=2$$.\n- Step 3: Substitute the values: $$P(X=2) = \\binom{8}{2} (1/6)^2 (5/6)^6$$. The combination $$\\binom{8}{2} = 28$$. The probability will be a relatively small number since getting exactly 2 out of 8 fives on a fair dice is somewhat unlikely (the expected number is $$8/6 \\approx 1.33$$).", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "A random variable $$X \\sim B(15, 0.3)$$. Explain how you would calculate $$P(X > 10)$$, and argue whether this probability will be very close to 0 or close to 1 without doing the math. (3 steps)", "answer": "- Step 1: To calculate $$P(X > 10)$$, translate it to cumulative notation using the complement rule: $$1 - P(X \\le 10)$$.\n- Step 2: Consider the expected value. The mean is $$np = 15 \\times 0.3 = 4.5$$. The standard deviation is roughly $$\\sqrt{15 \\times 0.3 \\times 0.7} \\approx 1.77$$.\n- Step 3: The value 10 is more than 3 standard deviations above the mean ($$4.5 + 3 \\times 1.77 = 9.81$$). In a binomial distribution, outcomes this far from the mean are extremely rare. Therefore, $$P(X > 10)$$ will be very close to 0.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": true}], "count": 26}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Why is the binomial distribution an appropriate model for the number of sixes rolled in 4 trials of a biased die? (3 steps)", "answer": "- Step 1: Identify the four requirements for a binomial distribution: fixed number of trials (n=4), two outcomes (success=failure), constant success probability (p), and independent trials.\n- Step 2: The die rolls satisfy all conditions: 4 fixed trials, success=rolling a six/failure=not rolling a six, constant p, and independence between rolls.\n+ Example: Flipping a coin 10 times (fixed, binary outcomes, constant p, independence) would also qualify.\n- Step 3: Contrast with non-binomial scenarios: Sampling without replacement from a small population violates independence. A varying success probability (e.g., improving skill over trials) violates the constant p requirement.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why does the formula for binomial probability include the binomial coefficient $\\binom{n}{r}$?", "answer": "The binomial coefficient $\\binom{n}{r}$ counts the number of ways to arrange r successes in n trials. For example, in 5 trials with 2 successes, the coefficient $\\binom{5}{2}=10$ accounts for sequences like SSFFF, SFSFF, etc. This ensures we sum probabilities of all outcomes with exactly r successes, not just one specific sequence.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "How do you calculate cumulative binomial probabilities using tables? (2 steps)", "answer": "- Step 1: Locate the table for the correct n and p. For example, for $X \\sim B(5, 0.3)$, find the row for x=2 and column p=0.3.\n- Step 2: Interpret phrases correctly: $P(X \\leq 2)$ is directly found in the table, while $P(X < 2) = P(X \\leq 1)$. For $P(X \\geq r)$, calculate $1 - P(X \\leq r-1)$.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Why does the variance of a binomial distribution, $np(1-p)$, depend on both n and p?", "answer": "- Step 1: Variance measures spread. For fixed n, spread is maximized when p=0.5 (symmetrical distribution) and minimized when p→0 or p→1 (extreme skewness). The term p(1-p) captures this curvature.\n- Step 2: For fixed p, increasing n increases variance linearly, as more trials mean more variability in total successes.\n+ Example: A coin flip (n=1, p=0.5) has variance 0.25, while 100 flips (n=100, p=0.5) has variance 25.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": true}, {"question": "When would you need to redefine the random variable to use binomial tables with p > 0.5?", "answer": "- Step 1: If tables only provide p ≤ 0.5, redefine success as failure. For $X \\sim B(n, p=0.7)$, define Y ~ B(n, q=0.3) where Y = n - X.\n- Step 2: Convert probabilities: $P(X \\leq k) = P(Y \\geq n - k) = 1 - P(Y \\leq n - k - 1)$.\n+ Example: $P(X \\leq 6)$ with n=10, p=0.7 becomes $1 - P(Y \\leq 3)$ where Y ~ B(10, 0.3).", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "What are the key differences between the binomial distribution and the Bernoulli distribution?", "answer": "- Step 1: A Bernoulli distribution (n=1 trial) models binary outcomes (success/failure) with $P(X=1)=p$. The binomial generalizes this to n independent Bernoulli trials.\n- Step 2: The Bernoulli has mean p and variance p(1-p), while the binomial has mean np and variance np(1-p). The binomial is the sum of n Bernoulli variables.\n+ Example: One coin flip ~ Bernoulli, 10 flips ~ Binomial.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": true}, {"question": "Why is the binomial model inappropriate for sampling without replacement from a small population?", "answer": "- Step 1: The model requires independent trials with constant p. Sampling without replacement alters the population composition, changing the success probability between trials.\n- Step 2: For example, drawing 5 cards from a deck without replacement: the probability of drawing an ace changes after each draw, violating binomial assumptions.\n+ Edge case: If the population is very large, the change in p is negligible, and binomial approximation remains valid.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "How does the binomial distribution's shape change with different p values?", "answer": "- Step 1: For p=0.5, the distribution is symmetric. For p < 0.5, it's skewed right (mode at lower values); for p > 0.5, skewed left (mode at higher values).\n- Step 2: As n increases, the distribution becomes bell-shaped (Central Limit Theorem). For small n and extreme p, the distribution remains skewed.\n+ Example: B(10, 0.1) has a long right tail, while B(10, 0.9) has a long left tail.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "Why is the expected value of a binomial distribution, $np$, intuitive?", "answer": "- Step 1: Each trial contributes p to the expected number of successes. For n trials, linearity of expectation gives $E(X) = p + p + \\dots + p = np$.\n- Step 2: For example, flipping a fair coin (p=0.5) 20 times, we expect 10 heads. If p=0.7, expect 14 successes in 20 trials.\n+ Misconception probe: Why isn't it $n/p$? Because p scales linearly with expected value, not inversely.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "How would you model the number of red traffic lights encountered on a journey through 6 sets using the binomial distribution?", "answer": "- Step 1: Define success as encountering a red light. Check assumptions: fixed n=6, binary outcomes (red/not red), constant p=0.48, independence between lights.\n- Step 2: The model would be $X \\sim B(6, 0.48)$. Violations occur if lights are synchronized (dependence) or if probabilities vary (e.g., different durations).", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}], "count": 10}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "What are the four necessary conditions for a random variable to follow a binomial distribution? (4 steps)", "answer": "- Step 1: **Fixed number of trials** – There is a predetermined number $ n $ of independent experiments (e.g., rolling a die 4 times).  \n- Step 2: **Two possible outcomes** – Each trial results in a \"success\" or a \"failure\" (e.g., rolling a 6 vs. not rolling a 6).  \n- Step 3: **Constant probability of success** – The probability $ p $ of success remains the same for each trial (e.g., the die’s bias doesn’t change).  \n- Step 4: **Independent trials** – The outcome of one trial does not affect others (e.g., each die roll is unaffected by previous results).  \n\n**Takeaway:**  \nThese conditions ensure the binomial formula $ P(X=r) = \\binom{n}{r} p^r (1-p)^{n-r} $ applies. Violating any condition invalidates the model.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Why does the binomial probability formula include the binomial coefficient $ \\binom{n}{r} $?", "answer": "The binomial coefficient $ \\binom{n}{r} $ accounts for the number of ways to arrange $ r $ successes in $ n $ trials. For example:  \n- In 3 coin flips, there are $ \\binom{3}{1} = 3 $ ways to get exactly 1 head (HTT, THT, TTH).  \n- Without this factor, the formula would only calculate the probability of one specific sequence of $ r $ successes, not **all possible sequences** that yield the same outcome.  \n- This reflects the combinatorial nature of independent trials: the total probability is the sum of probabilities for all mutually exclusive valid sequences.  \n\n**Takeaway:**  \nThe coefficient ensures the formula captures all pathways to achieving $ r $ successes, not just a single path.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "How is the binomial probability formula derived from the expansion of $ (p + q)^n $? (3 steps)", "answer": "- Step 1: Consider the binomial theorem: $ (p + q)^n = \\sum_{r=0}^n \\binom{n}{r} p^r q^{n-r} $.  \n- Step 2: Each term $ \\binom{n}{r} p^r q^{n-r} $ represents the probability of $ r $ successes (with probability $ p^r $) and $ n-r $ failures (with probability $ q^{n-r} $).  \n- Step 3: Since $ p + q = 1 $, the sum of all terms equals 1, confirming the distribution is valid. Thus, $ P(X=r) = \\binom{n}{r} p^r (1-p)^{n-r} $ (since $ q = 1-p $).  \n\n**Takeaway:**  \nThe binomial distribution is rooted in the binomial theorem, which systematically enumerates all possible outcomes of $ n $ trials.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "When is it inappropriate to use the binomial distribution, even if the scenario seems to involve \"successes\" and \"failures\"?", "answer": "- **Non-independent trials**: If the probability of success changes based on prior outcomes (e.g., drawing cards without replacement from a small deck).  \n- **Variable number of trials**: If the number of trials isn’t fixed (e.g., flipping a coin until 3 heads occur).  \n- **More than two outcomes**: If each trial can result in more than two outcomes (e.g., rolling a die with outcomes 1-6).  \n- **Time-dependent probabilities**: If the success probability $ p $ isn’t constant over time (e.g., a die that becomes biased with wear).  \n\n**Takeaway:**  \nThe binomial model fails when real-world dependencies, variability, or multiple outcomes violate its strict assumptions.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": true}, {"question": "Why can cumulative probabilities like $ P(X \\leq 3) $ be found using binomial tables?", "answer": "- Binomial tables precompute cumulative probabilities $ P(X \\leq x) $ for various $ n $ and $ p $, avoiding manual summation.  \n- They exploit the discrete nature of the distribution: $ P(X \\leq 3) = P(X=0) + P(X=1) + P(X=2) + P(X=3) $.  \n- Tables are practical for large $ n $, where calculating each term individually is laborious.  \n- For $ p > 0.5 $, tables may require redefining the problem (e.g., switching \"success\" and \"failure\" to use $ p < 0.5 $).  \n\n**Takeaway:**  \nTables simplify cumulative probability calculations by leveraging precomputed values, saving time and reducing errors.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "How do you calculate $ P(X \\geq 7) $ when $ X \\sim B(20, 0.3) $, using binomial tables?", "answer": "- Step 1: Recognize that $ P(X \\geq 7) = 1 - P(X \\leq 6) $.  \n- Step 2: Look up $ P(X \\leq 6) $ in the binomial table for $ n=20 $, $ p=0.3 $, which gives $ 0.6080 $.  \n- Step 3: Subtract from 1: $ 1 - 0.6080 = 0.3920 $.  \n- **Key Insight:** Tables only provide $ P(X \\leq x) $, so upper-tail probabilities require complement rules.  \n\n**Takeaway:**  \nAlways translate \"at least\" or \"greater than\" inequalities into $ 1 - P(X \\leq x) $ to use tables effectively.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Why does the variance of a binomial distribution $ \\operatorname{Var}(X) = np(1-p) $ depend on $ p(1-p) $? (3 steps)", "answer": "- Step 1: For a single Bernoulli trial $ X_i \\sim B(1, p) $, $ \\operatorname{Var}(X_i) = p(1-p) $.  \n- Step 2: For $ n $ independent trials, variances add: $ \\operatorname{Var}(X) = n \\cdot \\operatorname{Var}(X_i) = np(1-p) $.  \n- Step 3: The $ p(1-p) $ term reflects uncertainty: variance peaks when $ p=0.5 $ (maximum unpredictability) and decreases as $ p $ approaches 0 or 1.  \n\n**Takeaway:**  \nVariance scales linearly with $ n $ but is dampened by $ p(1-p) $, which quantifies the balance between success and failure.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "How can you estimate $ p $ for a binomial distribution if given the mean $ \\mu $ and variance $ \\sigma^2 $?", "answer": "- Step 1: Use the formulas $ \\mu = np $ and $ \\sigma^2 = np(1-p) $.  \n- Step 2: Divide the variance by the mean: $ \\frac{\\sigma^2}{\\mu} = 1 - p $.  \n- Step 3: Solve for $ p $: $ p = 1 - \\frac{\\sigma^2}{\\mu} $.  \n- Step 4: Substitute $ p $ back into $ \\mu = np $ to find $ n $.  \n\n**Example:**  \nIf $ \\mu = 60 $ and $ \\sigma^2 = 54 $, $ p = 1 - 54/60 = 0.1 $.  \n\n**Takeaway:**  \nThe relationship between mean and variance allows solving for $ p $ and $ n $ without direct observation of trials.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "Why is the binomial distribution symmetric when $ p = 0.5 $, but skewed otherwise?", "answer": "- When $ p = 0.5 $: Success and failure are equally likely, mirroring the symmetry of the binomial coefficients $ \\binom{n}{r} = \\binom{n}{n-r} $.  \n- When $ p > 0.5 $: The distribution is skewed left (more successes).  \n- When $ p < 0.5 $: The distribution is skewed right (fewer successes).  \n- **Mathematical Basis**: The term $ p^r (1-p)^{n-r} $ favors higher $ r $ for $ p > 0.5 $ and lower $ r $ for $ p < 0.5 $, creating skewness.  \n\n**Takeaway:**  \nSymmetry hinges on equal $ p $ and $ 1-p $; skewness emerges when they differ.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": true}, {"question": "How would you adjust a binomial problem to use tables when $ p > 0.5 $?", "answer": "- Step 1: Redefine the problem by swapping \"success\" and \"failure\". Let $ Y \\sim B(n, 1-p) $, where $ Y $ counts failures in the original problem.  \n- Step 2: Translate the original $ X $ (successes) into $ Y $: $ P(X \\leq x) = P(Y \\geq n - x) $.  \n- Step 3: Use complement rules: $ P(Y \\geq n - x) = 1 - P(Y \\leq n - x - 1) $.  \n- **Example**: For $ X \\sim B(10, 0.7) $, $ P(X \\leq 6) = P(Y \\geq 4) = 1 - P(Y \\leq 3) $, with $ Y \\sim B(10, 0.3) $.  \n\n**Takeaway:**  \nTables are often limited to $ p \\leq 0.5 $, but redefining the random variable allows their use.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": true}], "count": 10}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "Write down the probability mass function for a binomial distribution X ~ B(n, p), and explain what each symbol means. (2 steps)", "answer": "- Step 1: The probability of exactly r successes in n trials is:\n$$\\mathrm{P}(X=r) = \\binom{n}{r} p^r (1-p)^{n-r}$$\n- Step 2: Here, $\\binom{n}{r} = \\frac{n!}{r!(n-r)!}$ is the number of ways to choose r successes from n trials, p is the probability of success, and (1-p) is the probability of failure (sometimes written as q).\n+ The formula comes from the binomial expansion of $(p + q)^n$, where each term $\\binom{n}{r}p^r q^{n-r}$ represents the probability of r successes.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "A biased coin has probability 0.6 of landing heads. You flip it 8 times. Find P(X = 3) where X is the number of heads. (2 steps)", "answer": "- Step 1: Here n = 8, p = 0.6, and we want r = 3:\n$$\\mathrm{P}(X=3) = \\binom{8}{3} (0.6)^3 (0.4)^5 = 56 \\times 0.216 \\times 0.01024 \\approx 0.124$$\n- Step 2: The term $\\binom{8}{3} = 56$ counts the different possible arrangements of exactly 3 heads in 8 flips (e.g., HHHTTTT, THHTTTTT, etc.).\n+ Note: You can verify $\\binom{8}{3} = \\binom{8}{5}$ since choosing 3 heads is equivalent to choosing 5 tails.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "How does the binomial probability formula relate to the binomial expansion of (p + q)^n? Why is this connection meaningful? (3 steps)", "answer": "- Step 1: When we expand $(p + q)^n$ using the binomial theorem, we get:\n$$(p+q)^n = \\sum_{r=0}^{n} \\binom{n}{r} p^r q^{n-r}$$\n- Step 2: Each term in this expansion corresponds exactly to a probability in the binomial distribution — the coefficient $\\binom{n}{r}$ tells us how many ways r successes can occur, and $p^r q^{n-r}$ is the probability of any specific sequence with r successes.\n- Step 3: Since p + q = 1, the sum of all probabilities equals $(p+q)^n = 1$, which confirms the distribution is properly normalized (all probabilities sum to 1).", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "Explain why the binomial distribution is appropriate for modelling the number of left-handed people in a random sample of 20, where the population proportion of left-handers is 0.15. What are the assumptions? (3 steps)", "answer": "- Step 1: **Fixed number of trials**: We have exactly n = 20 people in our sample.\n- Step 2: **Two outcomes**: Each person is either left-handed (success) or right-handed (failure).\n- Step 3: **Fixed probability and independence**: Assuming the sample is random and the population is large, the probability of each person being left-handed remains p = 0.15, and each person's handedness is independent of others.\n+ If the sample is taken without replacement from a small population, the independence condition may be violated, and a hypergeometric distribution would be more appropriate.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "For X ~ B(12, 0.3), calculate P(X ≤ 2). Explain the steps. (2 steps)", "answer": "- Step 1: P(X ≤ 2) = P(X = 0) + P(X = 1) + P(X = 2)\n- Step 2: Using the formula or calculator:\n$$P(X=0) = (0.7)^{12} = 0.0138$$\n$$P(X=1) = \\binom{12}{1}(0.3)(0.7)^{11} = 0.0712$$\n$$P(X=2) = \\binom{12}{2}(0.3)^2(0.7)^{10} = 0.1678$$\nSo P(X ≤ 2) = 0.2528\n+ Note: \"At most 2\" and \"no more than 2\" both mean X ≤ 2.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "For X ~ B(20, 0.4), find P(X ≥ 15). Explain how to compute this using the complement. (2 steps)", "answer": "- Step 1: Since X can only take integer values, P(X ≥ 15) = 1 - P(X ≤ 14)\n- Step 2: Using tables or calculator with n = 20, p = 0.4:\n$$P(X \\leq 14) = 0.9984$$\nSo P(X ≥ 15) = 1 - 0.9984 = 0.0016\n+ Key phrases: \"at least 15\" means X ≥ 15, which equals 1 - P(X ≤ 14). The number 14 comes from 15 - 1.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "A spinner has probability 0.3 of landing on red. You spin 12 times. Find: (a) P(X ≤ 2), (b) P(X ≥ 5). (3 steps)", "answer": "- Step 1: Define X = number of reds in 12 spins, X ~ B(12, 0.3)\n- Step 2: For (a), \"no more than 2\" means X ≤ 2. From tables: P(X ≤ 2) = 0.2528\n- Step 3: For (b), \"at least 5\" means X ≥ 5 = 1 - P(X ≤ 4) = 1 - 0.7237 = 0.2763\n+ The phrase table: \"greater than 5\" → 1-P(X ≤ 5); \"fewer than 10\" → P(X ≤ 9); \"at most 8\" → P(X ≤ 8)", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "When p > 0.5 in a binomial distribution, how can you use binomial tables (which typically only show p ≤ 0.5) to find cumulative probabilities? Explain with an example. (3 steps)", "answer": "- Step 1: When p > 0.5, redefine the problem by swapping \"success\" and \"failure.\" If X ~ B(n, p) with p > 0.5, let Y ~ B(n, 1-p) where Y counts failures instead.\n- Step 2: There's a symmetry: P(X ≤ k) = P(Y ≥ n-k). For example, for X ~ B(10, 0.7), to find P(X ≤ 6):\n+ Let Y ~ B(10, 0.3), then P(X ≤ 6) = P(Y ≥ 4) = 1 - P(Y ≤ 3)\n- Step 3: From tables with p = 0.3: P(Y ≤ 3) = 0.6496, so P(X ≤ 6) = 1 - 0.6496 = 0.3504\n+ This works because if X counts successes with high p, counting failures with low p gives the same probability structure.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "Why can we treat drawing sweets from a \"large\" bag without replacement as a binomial experiment, but not from a small bag? (2 steps)", "answer": "- Step 1: The binomial distribution requires a **fixed probability of success** for each trial. In a large bag, removing sweets doesn't significantly change the proportions, so we can assume p remains constant.\n- Step 2: In a small bag, each draw changes the remaining probabilities (e.g., removing a strawberry sweet makes it less likely to pick another), violating the fixed-p condition.\n+ The key is whether the population is large enough that sampling without replacement approximates sampling with replacement. A common rule of thumb: if the sample is less than 10% of the population, the binomial approximation is reasonable.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "A factory produces components with 5% faulty rate. A sample of 50 is checked. Find: (a) P(fewer than 2 faulty), (b) P(more than 5 faulty). (2 steps)", "answer": "- Step 1: X = number of faulty components, X ~ B(50, 0.05)\n- Step 2: (a) P(X < 2) = P(X ≤ 1) = P(X = 0) + P(X = 1)\n$$= (0.95)^{50} + \\binom{50}{1}(0.05)(0.95)^{49} = 0.0769 + 0.2025 = 0.2794$$\n(b) P(X > 5) = 1 - P(X ≤ 5) = 1 - 0.9856 = 0.0144\n+ These are cumulative probability calculations using the complement for \"> 5\" type questions.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "Derive the mean E(X) = np for a binomial distribution X ~ B(n, p) using the concept of Bernoulli trials. (3 steps)", "answer": "- Step 1: A single trial (Bernoulli trial) has X₁ taking value 1 (success) with probability p, and 0 (failure) with probability q = 1-p.\n- Step 2: The expected value of one trial is: E(X₁) = 0×(1-p) + 1×p = p\n- Step 3: A binomial X = X₁ + X₂ + ... + Xₙ (sum of n independent Bernoulli trials). Using linearity of expectation:\n$$E(X) = E(X_1) + E(X_2) + ... + E(X_n) = p + p + ... + p = np$$\n+ This is an intuitive way to see that the expected number of successes is simply the number of trials multiplied by the probability of success on each trial.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "Derive the variance Var(X) = np(1-p) for a binomial distribution X ~ B(n, p). (3 steps)", "answer": "- Step 1: For a single Bernoulli trial, Var(X₁) = E(X₁²) - [E(X₁)]² = (0²×q + 1²×p) - p² = p - p² = p(1-p)\n- Step 2: Since the n trials are independent, variances add:\n$$Var(X) = Var(X_1) + Var(X_2) + ... + Var(X_n)$$\n- Step 3: Each Var(Xᵢ) = p(1-p), so:\n$$Var(X) = p(1-p) + p(1-p) + ... + p(1-p) = np(1-p)$$\n+ The variance tells us about the spread — it's maximized when p = 0.5 (most uncertain) and minimized near p = 0 or p = 1 (almost certain outcomes).", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "For X ~ B(20, 0.2), find the mean and standard deviation. Then find P(X < μ - σ). Explain the interpretation. (3 steps)", "answer": "- Step 1: Mean μ = np = 20 × 0.2 = 4\nVariance σ² = np(1-p) = 20 × 0.2 × 0.8 = 3.2\nStandard deviation σ = √3.2 = 1.789\n- Step 2: μ - σ = 4 - 1.789 = 2.211\nSince X can only be integers, P(X < 2.211) = P(X ≤ 2)\n- Step 3: P(X ≤ 2) = 0.2061 from tables\n+ This probability (about 20.6%) represents the chance of falling more than one standard deviation below the mean — consistent with roughly one-third of data being within one standard deviation of the mean in any distribution.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "The probability of at least one faulty component in a sample of 4 is 0.3439. If a factory produces 600 components per day, find the mean and variance of faulty components per day. (3 steps)", "answer": "- Step 1: Let X ~ B(4, p). P(X ≥ 1) = 0.3439 means:\n$$1 - P(X = 0) = 0.3439$$\n$$P(X = 0) = (1-p)^4 = 0.6561$$\n$$1-p = 0.9 \\Rightarrow p = 0.1$$\n- Step 2: For daily production: Y ~ B(600, 0.1)\n- Step 3: Mean = np = 600 × 0.1 = 60\nVariance = np(1-p) = 600 × 0.1 × 0.9 = 54\n+ The mean tells us to expect about 60 faulty components per day on average, with a standard deviation of √54 ≈ 7.35.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "X ~ B(n, 0.4) and E(X) = 3.2. Find n, and then find P(X = 5). (2 steps)", "answer": "- Step 1: Since E(X) = np = 3.2, and p = 0.4:\n$$n = \\frac{3.2}{0.4} = 8$$\n- Step 2: X ~ B(8, 0.4), so:\n$$P(X=5) = \\binom{8}{5}(0.4)^5(0.6)^3 = 56 \\times 0.01024 \\times 0.216 = 0.1239$$\n+ Check: The expected value being 3.2 tells us n must be 8 (since 8 × 0.4 = 3.2).", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "X ~ B(10, p) has Var(X) = 2.4. Find the two possible values of p. Explain why there are two solutions. (3 steps)", "answer": "- Step 1: Using Var(X) = np(1-p):\n$$10 \\times p \\times (1-p) = 2.4$$\n$$10p - 10p^2 = 2.4$$\n$$10p^2 - 10p + 2.4 = 0$$\n- Step 2: Dividing by 10: p² - p + 0.24 = 0\n- Step 3: Solving: p = [1 ± √(1 - 4×0.24)]/2 = [1 ± √0.04]/2 = [1 ± 0.2]/2\nSo p = 0.6 or p = 0.4\n+ There are two solutions because the variance formula p(1-p) is symmetric around p = 0.5 — p = 0.4 and p = 0.6 give the same variance (0.4×0.6 = 0.6×0.4 = 0.24).", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "X ~ B(n, p) with E(X) = 4.8 and Var(X) = 2.88. Find n and p. (3 steps)", "answer": "- Step 1: From E(X) = np = 4.8, we have p = 4.8/n\n- Step 2: From Var(X) = np(1-p) = 2.88:\nSubstitute p: n × (4.8/n) × (1 - 4.8/n) = 2.88\n$$4.8 \\times (1 - 4.8/n) = 2.88$$\n$$4.8 - 4.8 \\times 4.8/n = 2.88$$\n$$4.8 - 2.88 = 4.8 \\times 4.8/n$$\n$$1.92 = 23.04/n \\Rightarrow n = 12$$\n- Step 3: Then p = 4.8/12 = 0.4\n+ Check: Var = 12 × 0.4 × 0.6 = 2.88 ✓", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "A biased coin is tossed 20 times. In many experiments, the variance of the number of heads is 4.2. Estimate p (with p < 0.5), and find the probability of exactly 7 heads. (3 steps)", "answer": "- Step 1: For X ~ B(20, p), Var(X) = 20p(1-p) = 4.2\n$$20p - 20p^2 = 4.2$$\n$$20p^2 - 20p + 4.2 = 0$$\n$$p^2 - p + 0.21 = 0$$\n- Step 2: Solving: p = [1 ± √(1 - 0.84)]/2 = [1 ± √0.16]/2 = [1 ± 0.4]/2\nSince p < 0.5, p = (1 - 0.4)/2 = 0.3\n- Step 3: P(X = 7) = $\\binom{20}{7}(0.3)^7(0.7)^{13} = 0.164$\n+ The variance being less than the mean (4.2 < 20×0.3 = 6) is typical for binomial distributions with p < 0.5.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "In a binomial distribution, when is the variance maximized, and what is this maximum value? Explain intuitively. (2 steps)", "answer": "- Step 1: Variance = np(1-p). Treating n as fixed, this is a quadratic in p that opens downward, maximized at p = 0.5.\n- Step 2: At p = 0.5, maximum variance = n × 0.5 × 0.5 = n/4\n+ Intuitively, when p = 0.5, the outcome is most uncertain — heads and tails are equally likely, so the spread of possible results is greatest. When p approaches 0 or 1, the outcome is almost certain, so variance approaches 0.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "A company produces 120 boxes of 48 biscuits each. The probability of a biscuit being broken is 0.04. Find the mean and variance of the number of boxes containing at least 2 broken biscuits. (3 steps)", "answer": "- Step 1: First find probability that a box has at least 2 broken biscuits:\nFor one box with 48 biscuits: Y ~ B(48, 0.04)\nP(Y ≥ 2) = 1 - P(Y ≤ 1) = 1 - [P(0) + P(1)]\n= 1 - [(0.96)⁴⁸ + 48×0.04×(0.96)⁴⁷] = 1 - [0.141 + 0.281] = 0.578\n- Step 2: Let Z = number of boxes (out of 120) with at least 2 broken biscuits\nZ ~ B(120, 0.578)\n- Step 3: Mean = np = 120 × 0.578 = 69.36\nVariance = np(1-p) = 120 × 0.578 × 0.422 = 29.29\n+ This is a two-level binomial: first finding the probability of \"success\" (at least 2 broken), then treating boxes as trials.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "Explain why we cannot use a binomial distribution to model the number of flips needed to get 4 heads in a row. What distribution would be appropriate? (2 steps)", "answer": "- Step 1: The binomial requires a **fixed number of trials** n. In this scenario, we keep flipping until we get 4 heads — the number of trials is random, not fixed.\n- Step 2: This is a **negative binomial** or **geometric distribution** problem, where we're counting the number of trials needed to achieve a certain number of successes.\n+ The key distinction: binomial = \"in n trials, how many successes?\" (n fixed); negative binomial = \"how many trials to get r successes?\" (number of trials random).", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "A bag has strawberry and apple sweets in ratio 1:4. Five sweets are chosen without replacement. What assumptions are needed to use the binomial distribution, and what's the probability of at least 4 strawberry sweets? (3 steps)", "answer": "- Step 1: Assumption: The bag contains a \"large\" number of sweets, so that removing sweets doesn't significantly change the ratio. This keeps the probability of picking strawberry constant at p = 1/(1+4) = 0.2\n- Step 2: Let X = number of strawberry sweets in 5 picks. X ~ B(5, 0.2)\n- Step 3: P(X ≥ 4) = P(X = 4) + P(X = 5)\n= $\\binom{5}{4}(0.2)^4(0.8) + \\binom{5}{5}(0.2)^5$\n= 5 × 0.0016 × 0.8 + 1 × 0.00032 = 0.0064 + 0.00032 = 0.00672\n+ From tables: P(X ≥ 4) = 1 - P(X ≤ 3) = 1 - 0.9933 = 0.0067", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "Find the smallest value k such that P(X ≤ k) < 0.05 for X ~ B(50, 0.4). This represents \"the largest number of successes we can expect less than 5% of the time.\" (2 steps)", "answer": "- Step 1: We need to find the largest k where P(X ≤ k) < 0.05\n- Step 2: From binomial tables for n = 50, p = 0.4:\nP(X ≤ 13) = 0.0723 (> 0.05)\nP(X ≤ 12) = 0.0433 (< 0.05)\nSo k = 12\n+ This means: observing 12 or fewer successes happens less than 5% of the time — anything more than 12 is \"unusually high\" at the 5% significance level.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "Find the smallest number r such that P(X > r) < 0.01 for X ~ B(40, 0.1). Explain what this r represents. (2 steps)", "answer": "- Step 1: P(X > r) < 0.01 means we want P(X ≤ r) > 0.99\n- Step 2: From tables for n = 40, p = 0.1:\nP(X ≤ 8) = 0.9848\nP(X ≤ 9) = 0.9961\nSo r = 8, meaning P(X > 8) = 1 - 0.9961 = 0.0039 < 0.01\n+ This tells us: observing more than 8 successes happens less than 1% of the time — if we see more than 8, it's extremely unlikely to be due to chance.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "When is it appropriate to model with a binomial distribution versus when is it not? Give three examples — two that are binomial and two that are not. (2 steps)", "answer": "- Binomial ✓: (1) Number of red cars in 15 new cars of a make where 12% are red — fixed n, two outcomes, independent trials assumed. (2) Number of left-handed people in a random sample of 20 from a large population.\n- Not Binomial ✗: (1) Number of flips needed to get 4 heads in a row — no fixed n. (2) Number of red cars observed while driving until you see 5 red cars — again, no fixed n (negative binomial situation).\n+ The key test: Can you state the number of trials BEFORE the experiment begins? If yes, binomial may be appropriate.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": true}, {"question": "A spinner has probability p of landing on red. In 12 spins, P(X ≥ 1) = 0.83193. Find p, then find E(X) and Var(X). (3 steps)", "answer": "- Step 1: P(X ≥ 1) = 1 - P(X = 0) = 0.83193\nSo P(X = 0) = (1-p)^12 = 0.16807\n$$1-p = 0.16807^{1/12}$$\n- Step 2: Taking 12th root: 1-p ≈ 0.865, so p ≈ 0.135\nOr solving: (1-p) = 0.16807^(1/12) = 0.865, p = 0.135\n- Step 3: E(X) = np = 12 × 0.135 = 1.62\nVar(X) = np(1-p) = 12 × 0.135 × 0.865 = 1.40\n+ Check: P(X ≥ 1) = 1 - 0.865^12 = 1 - 0.168 = 0.832 ✓", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "A fair five-sided spinner (numbers 1-5) is spun 20 times. Let X = number of 5s. Find: (a) mean and variance, (b) P(X < μ - σ). (3 steps)", "answer": "- Step 1: X ~ B(20, 0.2) since p = 1/5 = 0.2\nMean μ = np = 20 × 0.2 = 4\nVariance = np(1-p) = 20 × 0.2 × 0.8 = 3.2\nσ = √3.2 = 1.789\n- Step 2: μ - σ = 4 - 1.789 = 2.211\n- Step 3: P(X < 2.211) = P(X ≤ 2) = 0.2061 from tables\n+ This is about 20.6% — less than one standard deviation below the mean occurs roughly 20% of the time for a right-skewed distribution like binomial with p < 0.5.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "A traffic light has green (48%), orange (4%), and red (48%). You pass through 6 traffic lights and only proceed on green. Let X = number of times you have to stop or wait. What model is appropriate? (2 steps)", "answer": "- Step 1: The \"success\" is getting green (proceed), probability p = 0.48. The two outcomes are \"proceed\" (green) vs. \"wait/stop\" (orange or red), so p = 0.48 for proceeding.\n- Step 2: X = number of stops/waits in 6 lights = number of \"failures\" in 6 binomial trials\nIf Y ~ B(6, 0.48) is the number of greens, then X = 6 - Y ~ B(6, 0.52)\nOr directly: X ~ B(6, 0.52), where success = \"have to stop/wait\"\n+ Note: This is still binomial because we have a fixed number of trials (6 lights) with two outcomes at each.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "In a binomial distribution, what does it mean for two outcomes to be \"mutually exclusive\" and \"collectively exhaustive\"? Why is this relevant to binomial? (2 steps)", "answer": "- Step 1: Mutually exclusive: outcomes cannot happen at the same time (you can't get both heads and tails on one flip). Collectively exhaustive: one of the outcomes must happen (every flip is either heads or tails).\n- Step 2: For binomial, each trial must have exactly two outcomes that are mutually exclusive and collectively exhaustive — success or failure, with no third option.\n+ This is why the binomial formula uses p for success and (1-p) for failure — together they account for 100% of possible outcomes.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "In a binomial distribution, does a \"success\" have to be the outcome we want? Give an example. (1 step)", "answer": "- No. The term \"success\" in binomial is arbitrary — it's just one of the two outcomes we're tracking. For example, when modelling the number of faulty switches, we might define \"success\" as finding a faulty switch (even though from a quality control perspective, finding faults is undesirable).\n+ What matters is consistency: once you define what \"success\" means, p is the probability of that outcome, and all calculations follow from that definition.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": true}, {"question": "If X ~ B(n, p), under what conditions can the binomial distribution be approximated by a normal distribution? Why might we want this approximation? (2 steps)", "answer": "- Step 1: The normal approximation is typically used when np > 5 and n(1-p) > 5 (some sources say np > 10 and n(1-p) > 10). This ensures the binomial is sufficiently symmetric and bell-shaped.\n- Step 2: The approximation is useful when n is large because calculating binomial probabilities directly becomes computationally intensive. However, for A-level S2, you generally use exact binomial calculations or tables.\n+ Note: This is a preview of Topic 3 (Approximations). The approximation becomes valuable when dealing with large n where tables aren't available.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "A student claims that for X ~ B(100, 0.04), the probability of X = 4 is given by (0.04)^4 × (0.96)^96. Explain what's wrong with this calculation. (2 steps)", "answer": "- Step 1: The student forgot the binomial coefficient $\\binom{100}{4}$. They calculated the probability of ONE specific sequence with exactly 4 successes in 100 trials.\n- Step 2: There are $\\binom{100}{4} = 3,921,225$ different ways to arrange exactly 4 successes among 100 trials. Each specific sequence has probability (0.04)⁴(0.96)⁹⁶, so we must multiply by this count.\n+ The correct answer is: $\\binom{100}{4} \\times (0.04)^4 \\times (0.96)^{96}$ ≈ 0.215", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "The probability of a switch being faulty is 0.08. In a sample of 10 switches, what's the probability of exactly 4 being faulty? Show two methods. (2 steps)", "answer": "- Method 1 (direct formula): X ~ B(10, 0.08)\nP(X = 4) = $\\binom{10}{4} (0.08)^4 (0.92)^6$ = 210 × 0.000004096 × 0.606 = 0.00052\n- Method 2 (calculator): Use binomial PDF function with n=10, p=0.08, x=4\n+ Note: This probability is very small because p = 0.08 is small — getting exactly 4 faulty out of 10 is extremely unlikely when the expected number is only 0.8.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "A medical researcher estimates that 1% of bolts produced are faulty. A sample of 20 bolts is checked. What's the probability of finding exactly 0 faulty bolts? Exactly 1? What distribution and assumptions apply? (2 steps)", "answer": "- Step 1: X ~ B(20, 0.01), assuming: fixed n=20, two outcomes (faulty/not), constant p=0.01, independent trials (large batch assumption)\n- Step 2: P(X = 0) = (0.99)²⁰ = 0.818\nP(X = 1) = $\\binom{20}{1} (0.01)(0.99)^{19}$ = 20 × 0.01 × 0.826 = 0.165\n+ With p so small, the distribution is heavily skewed right — most samples will have 0 or 1 faulty bolt.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "In a binomial experiment with n trials, if p = 0.5, what special symmetry property does the distribution have? How can you use this? (2 steps)", "answer": "- Step 1: When p = 0.5, the binomial distribution is perfectly symmetric: P(X = r) = P(X = n - r)\n- Step 2: This means tables for p = 0.5 can cover all values — for example, P(X ≤ 3) with n = 10, p = 0.5 equals P(X ≥ 7) = P(X ≤ 2) with p = 0.5.\n+ This symmetry also means mean = n/2, and the distribution is centered with maximum variance n/4.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "A test has 10 true-or-false questions. A completely unprepared student guesses randomly. Find: (a) P(all correct), (b) P(passing with 8 or more correct). (2 steps)", "answer": "- Step 1: X ~ B(10, 0.5), each question has 50% chance of being correct by guessing.\n(a) P(X = 10) = (0.5)¹⁰ = 0.0009766 ≈ 0.001\n- Step 2: (b) P(X ≥ 8) = P(X = 8) + P(X = 9) + P(X = 10)\n= $\\binom{10}{8}(0.5)^8(0.5)^2 + \\binom{10}{9}(0.5)^9(0.5) + (0.5)^{10}$\n= 45 × 0.5¹⁰ + 10 × 0.5¹⁰ + 1 × 0.5¹⁰ = 56 × 0.0009766 = 0.0547\n+ So there's about 5.5% chance of passing by guessing — quite low!", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "A biased dice has P(5) = 2/7, and other faces equally likely. The dice is thrown 8 times. Find: (a) P(first 5 on 6th throw), (b) P(exactly three 5s in 8 throws). (3 steps)", "answer": "- Step 1: First, find p = P(5) = 2/7 ≈ 0.286. Each throw is independent.\n- Step 2: (a) First 5 on 6th throw means first 5 throws are not 5, 6th is 5:\nP = (1-p)⁵ × p = (5/7)⁵ × (2/7) = 0.0441 × 0.286 = 0.0126\n- Step 3: (b) X ~ B(8, 2/7), P(X = 3) = $\\binom{8}{3} (2/7)^3 (5/7)^5$ = 56 × 0.00677 × 0.142 = 0.054\n+ Part (a) is actually a geometric distribution question, not binomial (we're asking about the trial number, not count).", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "A genetic marker is present in 4% of the population. In a sample of 50 people, what's the probability of exactly 6 people having this marker? What assumptions are needed? (2 steps)", "answer": "- Step 1: Assumptions: population is large enough that sampling can be treated as independent with constant p = 0.04 (or sample is with replacement).\n- Step 2: X ~ B(50, 0.04), P(X = 6) = $\\binom{50}{6} (0.04)^6 (0.96)^{44}$\n= 15,890,700 × 0.000000004096 × 0.161\n≈ 0.0105\n+ Even with only 4% prevalence, getting exactly 6 out of 50 is about 1% probability — relatively unlikely but not extremely rare.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "A factory makes chairs, 15% green. In a sample of 10 chairs, find: (a) P(at least 5 green), (b) P(exactly 2 green). (2 steps)", "answer": "- Step 1: X ~ B(10, 0.15)\n(a) P(X ≥ 5) = 1 - P(X ≤ 4) = 1 - 0.9896 = 0.0104\n- Step 2: (b) P(X = 2) = $\\binom{10}{2} (0.15)^2 (0.85)^8$ = 45 × 0.0225 × 0.272 = 0.276\n+ With p = 0.15, the distribution is right-skewed — most samples will have 0, 1, or 2 green chairs.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}], "count": 39}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "For a binomial distribution X ~ B(n, p), write the formula for P(X = r) and explain what each symbol represents. (2 parts)", "answer": "- Step 1: The formula is: $$\\mathrm{P}(X=r) = \\binom{n}{r} p^r (1-p)^{n-r}$$\n- Step 2: Breaking down the components:\n  + $n$ = the fixed number of trials (the \"index\")\n  + $p$ = the probability of success on each trial (the \"parameter\")\n  + $r$ = the specific number of successes we're calculating the probability for (must satisfy $0 \\leq r \\leq n$)\n  + $(1-p)$ or $q$ = probability of failure\n  + $\\binom{n}{r}$ = \"n choose r\" = $\\frac{n!}{r!(n-r)!}$, representing the number of different ways to arrange r successes among n trials\n\nThe binomial coefficient accounts for all possible arrangements of successes and failures.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "In the expansion of $(p+q)^n$, what does each term represent? How does this connect to the binomial probability formula? (3 steps)", "answer": "- Step 1: The binomial theorem states: $$(p+q)^n = \\sum_{r=0}^{n} \\binom{n}{r} p^r q^{n-r}$$\n- Step 2: When expanded, each term $\\binom{n}{r} p^r q^{n-r}$ corresponds to the probability of obtaining exactly r successes in n trials.\n- Step 3: This is because $\\binom{n}{r}$ counts the number of distinct arrangements (paths through a probability tree) that yield r successes and $(n-r)$ failures, each with probability $p^r q^{n-r}$. Since $p + q = 1$, summing all terms gives 1, confirming valid probability distribution.\n\nThis elegant connection shows why the formula works — it's literally extracting a specific term from the binomial expansion.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "A factory produces light bulbs with a 3% defect rate. A quality inspector checks 20 randomly selected bulbs. Can this be modeled as a binomial distribution? If yes, specify X ~ B(n, p). If no, explain why. (3 steps)", "answer": "- Step 1: Check the four conditions:\n  + Fixed number of trials: Yes — exactly 20 bulbs are checked (n = 20).\n  + Two outcomes: Yes — each bulb is either defective (success) or non-defective (failure).\n  + Fixed probability: Yes — assuming random sampling from a large population, p = 0.03 remains constant.\n  + Independence: Yes — each bulb's defect status is independent of others (assuming large population).\n- Step 2: Yes, this can be modeled as a binomial distribution.\n- Step 3: The model is: $X \\sim \\mathrm{B}(20, 0.03)$ where $X$ represents the number of defective bulbs in the sample.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "You are given a fair coin and told to keep flipping it until you obtain 4 heads in a row. Can the number of flips needed be modeled with a binomial distribution? Explain why or why not. (2 steps)", "answer": "- Step 1: No, this cannot be modeled with a binomial distribution.\n- Step 2: The key reason is that there is no fixed number of trials. The binomial distribution requires knowing n in advance — you stop when a condition is met, not after a predetermined number of attempts. This is an example of a negative binomial distribution, where the number of trials until r successes is variable.\n\nThis is a common misconception — binomial applies when you know n beforehand, not when you stop based on outcomes.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "What is the difference between P(X ≤ x) and P(X < x) for a discrete binomial random variable X? (2 steps)", "answer": "- Step 1: For discrete distributions, these are NOT the same:\n  + $\\mathrm{P}(X \\leq x)$ includes all values from 0 up to and including x.\n  + $\\mathrm{P}(X < x)$ includes all values from 0 up to but NOT including x.\n- Step 2: Specifically: $\\mathrm{P}(X < x) = \\mathrm{P}(X \\leq x-1)$ for integer x.\n\nThis distinction matters critically when reading questions — \"fewer than 5\" means P(X < 5) = P(X ≤ 4), while \"at most 5\" means P(X ≤ 5).", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": true}, {"question": "For X ~ B(12, 0.3), calculate P(X ≤ 2). Explain the steps and what this probability represents in context. (3 steps)", "answer": "- Step 1: Write out the probability: $\\mathrm{P}(X \\leq 2) = \\mathrm{P}(X=0) + \\mathrm{P}(X=1) + \\mathrm{P}(X=2)$\n- Step 2: Using the formula with n = 12, p = 0.3:\n  + $\\mathrm{P}(X=0) = \\binom{12}{0}(0.3)^0(0.7)^{12} = 0.7^{12}$\n  + $\\mathrm{P}(X=1) = \\binom{12}{1}(0.3)^1(0.7)^{11} = 12 \\times 0.3 \\times 0.7^{11}$\n  + $\\mathrm{P}(X=2) = \\binom{12}{2}(0.3)^2(0.7)^{10} = 66 \\times 0.09 \\times 0.7^{10}$\n- Step 3: Summing these gives approximately 0.2528 (using calculator/tables). This represents the probability of getting 0, 1, or 2 successes in 12 trials — i.e., \"at most 2 successes.\"", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "How do you calculate P(X > 5) for a binomial distribution? Write the general formula. (2 steps)", "answer": "- Step 1: Since probabilities must sum to 1, use the complement:\n$$\\mathrm{P}(X > 5) = 1 - \\mathrm{P}(X \\leq 5)$$\n- Step 2: This works because $\\mathrm{P}(X > 5)$ means X = 6, 7, 8, ..., n, which together with X = 0, 1, 2, 3, 4, 5 covers all possible outcomes. Always use the complement when working with \"greater than\" — it's usually much easier than summing many individual terms.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "A spinner has probability 0.3 of landing on red. Sarah spins 12 times. What is the probability of getting \"at least 5 reds\"? How do you interpret \"at least 5\" in terms of inequality? (3 steps)", "answer": "- Step 1: \"At least 5\" means 5 or more, so X ≥ 5.\n- Step 2: This translates to: $$\\mathrm{P}(X \\geq 5) = 1 - \\mathrm{P}(X \\leq 4)$$\n- Step 3: With X ~ B(12, 0.3): $\\mathrm{P}(X \\leq 4) = 0.7237$ (from tables), so $\\mathrm{P}(X \\geq 5) = 1 - 0.7237 = 0.2763$.\n\nUnderstanding these phrase translations is essential: \"at least\" = ≥, \"no more than\" = ≤, \"fewer than\" = <, \"more than\" = >.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "When using binomial tables with p > 0.5, what strategy can you use? Explain with an example. (3 steps)", "answer": "- Step 1: The standard binomial tables typically only cover p ≤ 0.5. For p > 0.5, redefine the random variable by swapping what counts as \"success.\"\n- Step 2: If X ~ B(n, p) with p > 0.5, let Y = n - X represent the number of failures. Then Y ~ B(n, 1-p) where (1-p) < 0.5.\n- Step 3: Example: For X ~ B(10, 0.7) finding P(X ≤ 6):\n  + Let Y = 10 - X (number of failures)\n  + Then Y ~ B(10, 0.3)\n  + P(X ≤ 6) = P(Y ≥ 4) = 1 - P(Y ≤ 3) = 1 - 0.6496 = 0.3504\n\nThis clever trick lets you use tables designed for smaller p values.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "What does it mean for a binomial random variable to have a \"large number\" of items in the population when sampling without replacement? Why does this allow the binomial model to still apply? (2 steps)", "answer": "- Step 1: When sampling without replacement, the probability of success technically changes after each draw (because you're removing items). However, if the population is \"large enough,\" this change is negligible.\n- Step 2: The key insight: With a large population, removing a few items doesn't meaningfully change the proportion of successes remaining. We can treat each draw as having approximately the same probability p, satisfying the \"fixed probability\" condition for binomial. The rule of thumb is that the sample should be no more than 5-10% of the population.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": true}, {"question": "A bag contains strawberry and apple sweets in ratio 1:4. If you select 5 sweets without replacement, what binomial model applies and why can we use it? (3 steps)", "answer": "- Step 1: Ratio 1:4 means P(strawberry) = 1/(1+4) = 0.2.\n- Step 2: Let X = number of strawberry sweets in 5 selections. X ~ B(5, 0.2).\n- Step 3: We can use this binomial model because we're told there are a \"large number\" of sweets. Even though we're sampling without replacement, the large population means the probability stays approximately constant at 0.2 for each draw. Without the \"large\" qualifier, this would NOT be binomial.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "For a binomial distribution X ~ B(n, p), derive or state the formulas for the mean E(X) and variance Var(X). Explain what these measures tell you about the distribution. (2 steps)", "answer": "- Step 1: For X ~ B(n, p):\n  + Mean (expected value): $\\mathrm{E}(X) = np$\n  + Variance: $\\mathrm{Var}(X) = np(1-p)$\n- Step 2: Interpretation:\n  + E(X) = np tells you the expected number of successes — if you repeated the experiment many times, the average number of successes would approach np.\n  + Var(X) = np(1-p) measures spread — it tells you how much the number of successes typically varies from the mean. The standard deviation is $\\sqrt{np(1-p)}$.\n\nThese formulas are essential for understanding the distribution's center and spread without calculating all probabilities.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "A fair five-sided spinner (numbered 1-5) is spun 20 times. Let X = number of 5s obtained. Find E(X) and Var(X). (3 steps)", "answer": "- Step 1: Identify n and p:\n  + Number of trials: n = 20\n  + Probability of success (getting a 5): p = 1/5 = 0.2\n- Step 2: Calculate mean: $$\\mathrm{E}(X) = np = 20 \\times 0.2 = 4$$\n  + On average, you'd expect to get 4 fives in 20 spins.\n- Step 3: Calculate variance: $$\\mathrm{Var}(X) = np(1-p) = 20 \\times 0.2 \\times 0.8 = 3.2$$\n  + Standard deviation = √3.2 ≈ 1.79\n\nThis shows typical outcomes will be around 4 ± 2 (roughly 2 to 6 fives).", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "Why is the variance of a binomial distribution maximum when p = 0.5? What does this tell you about the shape of the distribution at p = 0.5 versus p close to 0 or 1? (3 steps)", "answer": "- Step 1: Var(X) = np(1-p) = np - np². This is a quadratic in p that forms a parabola opening downward. Taking the derivative: d/dp (p - p²) = 1 - 2p = 0 gives p = 0.5.\n- Step 2: At p = 0.5, the variance is maximum, meaning outcomes are most spread out. As p moves away from 0.5 (toward 0 or 1), variance decreases.\n- Step 3: Intuition: When p = 0.5, success and failure are equally likely, so outcomes can vary widely. When p is very small (e.g., 0.01), you're almost always getting 0 successes — the distribution is concentrated near 0 with very little spread.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "X ~ B(n, p) has E(X) = 4.8 and Var(X) = 2.88. Find the values of n and p. (3 steps)", "answer": "- Step 1: Use the formulas: $\\mathrm{E}(X) = np = 4.8$ and $\\mathrm{Var}(X) = np(1-p) = 2.88$\n- Step 2: From E(X) = np = 4.8, we have n = 4.8/p\n- Step 3: Substitute into variance: $(4.8/p)(1-p) = 2.88$\n  + $4.8(1-p)/p = 2.88$\n  + $4.8/p - 4.8 = 2.88$\n  + $4.8/p = 7.68$\n  + $p = 4.8/7.68 = 0.625$\n  + Then n = 4.8/0.625 = 7.68 ≈ 8 (but must be integer, so verify)\n  + Actually n = 4.8/0.625 = 7.68 — this isn't an integer, so let's solve differently...\n  + Rearranging: np = 4.8, np(1-p) = 2.88 means 4.8(1-p) = 2.88\n  + 1-p = 2.88/4.8 = 0.6, so p = 0.4, and n = 4.8/0.4 = 12\n\nSo n = 12, p = 0.4.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "A company produces components with defect probability p. In a sample of 4 components, P(at least 1 is defective) = 0.3439. Find p. Then for 600 components produced daily, find mean and variance of defective components. (4 steps)", "answer": "- Step 1: Let X = number of defective components in 4 trials. X ~ B(4, p)\n- Step 2: P(at least 1 defective) = 1 - P(X = 0) = 1 - (1-p)⁴ = 0.3439\n  + So (1-p)⁴ = 0.6561\n  + 1-p = 0.9 (taking fourth root)\n  + p = 0.1\n- Step 3: For 600 components: Y ~ B(600, 0.1)\n- Step 4: Mean: E(Y) = np = 600 × 0.1 = 60\n  + Variance: Var(Y) = np(1-p) = 600 × 0.1 × 0.9 = 54\n\nThis type of problem requires working backwards from a probability to find p first.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "A biased coin is tossed 20 times. In many experiments, the variance of the number of heads is found to be 4.2. Estimate p (with p < 0.5). (3 steps)", "answer": "- Step 1: For X ~ B(20, p), Var(X) = np(1-p) = 20p(1-p) = 4.2\n- Step 2: Divide by 20: p(1-p) = 0.21\n  + This gives: p - p² = 0.21\n  + Rearranging: p² - p + 0.21 = 0\n- Step 3: Using quadratic formula: p = [1 ± √(1 - 4×0.21)]/2 = [1 ± √0.16]/2 = [1 ± 0.4]/2\n  + p = 0.7 or p = 0.3\n  + Since p < 0.5 (given), p = 0.3\n\nThere are two possible values for p that give the same variance — this is because p and (1-p) produce identical variances.", "source": "MiniMax ②", "_id": "minimax_2_1
