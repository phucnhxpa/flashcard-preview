 4)\\,dx$$, describe the substitution and why it works. (4 steps)", "answer": "- Step 1: Let $$u = -x$$. Then $$du = -dx$$, and when $$x = -8.5$$, $$u = 8.5$$; when $$x = 4$$, $$u = -4$$.\n- Step 2: $$3^{x/3} = 3^{-u/3}$$. So the integrand becomes $$3^{-u/3} - 4$$.\n- Step 3: Flipping limits gives: $$\\int_{-8.5}^4 (3^{x/3} - 4)\\,dx = \\int_{-4}^{8.5} (3^{-u/3} - 4)\\,du = \\left[\\int_{-4}^{8.5} 3^{-u/3}\\,du\\right] - 4 \\cdot 12.5$$.\n- Step 4: The first bracket is the known estimate minus the \"+4\" part, i.e. 69 - 50 = 19. Subtract $$4 \\cdot 12.5 = 50$$: $$19 - 50 = -31$$.\n\nKey technique: reflection about the $$y$$-axis is handled by $$u=-x$$; the Jacobian contributes a sign which cancels with flipping limits.", "source": "Opus 4.7 ②", "_id": "opus_2_111", "judge_pick": true}, {"question": "When the formula booklet has the trapezium rule, binomial expansion, arithmetic sum, geometric sum, and $$S_\\infty$$ — which of these formulas are NOT in the booklet and must be memorised?", "answer": "The formulas NOT in the booklet (must memorise):\n- Arithmetic $$n$$th term: $$u_n = a + (n-1)d$$\n- Geometric $$n$$th term: $$u_n = ar^{n-1}$$\n- Circle (standard): $$(x-a)^2 + (y-b)^2 = r^2$$\n- Circle (general): $$x^2+y^2+2gx+2fy+c=0$$ with centre $$(-g,-f)$$ and radius $$\\sqrt{g^2+f^2-c}$$\n- Pythagorean identity: $$\\sin^2\\theta + \\cos^2\\theta = 1$$\n- $$\\tan\\theta = \\sin\\theta/\\cos\\theta$$\n- Log laws (product, quotient, power)\n- Constant-to-log: $$k = \\log_a(a^k)$$\n\nIn the booklet (find quickly under time pressure):\n- Trapezium rule\n- Binomial expansion $$(a+b)^n$$ with $$\\binom{n}{r}$$\n- Arithmetic sum $$S_n = \\tfrac{n}{2}[2a+(n-1)d]$$\n- Geometric sum $$S_n = \\tfrac{a(r^n-1)}{r-1}$$\n- Sum to infinity $$S_\\infty = \\tfrac{a}{1-r}$$", "source": "Opus 4.7 ②", "_id": "opus_2_112", "judge_pick": false}, {"question": "What is the common pattern of \"formula amnesia\" across six consecutive papers, and what is the standard tutor advice?", "answer": "- Step 1: Pattern: the trapezium rule (in the booklet!) was forgotten on 4 of 6 papers. Circle equations forgotten 3 of 6. Binomial forgotten 3 of 6. The common feature: \"formula IS in the booklet, but student keeps redoing from scratch.\"\n- Step 2: Cause: failure to practice formula lookup under time pressure. Students know the formula exists in the booklet but freeze when asked to use it cold.\n- Step 3: Remedy: dedicated timed practice with the formula booklet open — don't try to memorise; practice *finding* the formula quickly (usually within 10 seconds).\n\nBonus: memorising non-booklet formulas (arithmetic $$u_n$$, geometric $$u_n$$, log laws, Pythagorean identity, circle equations) is non-negotiable; no booklet lookup is possible.", "source": "Opus 4.7 ②", "_id": "opus_2_113", "judge_pick": false}, {"question": "What is the \"off-by-one\" error pattern in sequence/series problems, and how do you prevent it?", "answer": "- Step 1: Symptom: computing $$u_k$$ as $$ar^k$$ instead of $$ar^{k-1}$$, or treating year 4 as 4 steps instead of 3 steps from year 1.\n- Step 2: Root cause: conflating \"index $$k$$\" with \"number of increments\". For a sequence starting at $$u_1$$: year $$k$$ has $$k-1$$ increments (not $$k$$).\n- Step 3: Prevention: at the start of any sequence problem, write explicitly \"year $$k$$ ↔ $$u_k$$\" or \"year $$k$$ ↔ $$n=k-1$$\" depending on convention. Test: plug in $$k=1$$ and confirm the formula reproduces the first term.\n\nExample test: if $$u_7 = 2000(1.03)^6$$, then $$u_1 = 2000(1.03)^0 = 2000$$ ✓.", "source": "Opus 4.7 ②", "_id": "opus_2_114", "judge_pick": true}, {"question": "In an exam strategy context, what are the \"first four question\" marks you \"shouldn't miss\" in IAL P2, based on tutor commentary?", "answer": "- Step 1: First four questions are typically straightforward topic-tests: factor/remainder theorem, trapezium rule, simple log, basic circle, basic binomial. Each worth 5–9 marks.\n- Step 2: Tutor quote (paraphrased): \"these four questions, actually, you shouldn't miss any marks.\" The reason: each is a standard template; formula recall + careful arithmetic is sufficient.\n- Step 3: Strategy: allocate proportional time to the first four (≈ 25% of paper time for ~30% of marks); don't rush, don't leap ahead; bank these marks securely before attacking the longer modelling/trig questions later.", "source": "Opus 4.7 ②", "_id": "opus_2_115", "judge_pick": false}, {"question": "Give a \"dumbed-down\" mental-math example testing the trapezium rule concept without a real $$y$$-table.", "answer": "- Step 1: Estimate $$\\int_0^2 f(x)\\,dx$$ where $$f(0)=1, f(1)=3, f(2)=5$$, with strip width $$h=1$$.\n- Step 2: Apply the rule: $$\\int \\approx \\tfrac{1}{2}[1 + 5 + 2(3)] = \\tfrac{1}{2}[12] = 6$$.\n- Step 3: Sanity check: the true integral of the linear fit through those three points is $$(0 \\to 2)$$-area of a trapezium with parallel sides 1 and 5: $$\\tfrac{1}{2}(1+5) \\cdot 2 = 6$$ — same!\n\nFor a linear function, the trapezium rule is exact. For curved functions, it's an approximation.", "source": "Opus 4.7 ②", "_id": "opus_2_116", "judge_pick": false}, {"question": "Give a \"dumbed-down\" example of turning a bare number into a log, used in a log equation.", "answer": "- Step 1: Suppose you need $$2 + \\log_2 x = \\log_2 20$$.\n- Step 2: Turn the 2 into a log with base 2: $$2 = \\log_2 4$$. So LHS becomes $$\\log_2 4 + \\log_2 x = \\log_2 (4x)$$.\n- Step 3: Equate arguments: $$4x = 20 \\Rightarrow x = 5$$.\n\nThis tiny example drills the \"bare number → log\" move without getting bogged down in algebra. The key template: $$k = \\log_a(a^k)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_117", "judge_pick": false}, {"question": "Give a mental-math example illustrating \"dividing an inequality by a negative flips it.\"", "answer": "- Step 1: Suppose $$-2x > 6$$ (easy numbers).\n- Step 2: Divide both sides by $$-2$$ (a negative). Mechanical rule: flip the inequality.\n- Step 3: Result: $$x < -3$$ (not $$x > -3$$). Verify: plug in $$x=-4$$: $$-2(-4) = 8 > 6$$ ✓. Plug in $$x=0$$: $$-2(0) = 0 \\not> 6$$ ✗. Confirms $$x < -3$$.\n\nIn log-inequality form: $$n\\ln(a) < b$$ with $$\\ln(a) < 0$$ divides to give $$n > b/\\ln(a)$$ — same flip.", "source": "Opus 4.7 ②", "_id": "opus_2_118", "judge_pick": true}, {"question": "Give a mini-example: prove by exhaustion that for any integer $$n$$, $$n^3 - n$$ is divisible by 6. (Hint: split by $$n \\pmod 6$$ or use parity + divisibility by 3.)", "answer": "- Step 1: Factor: $$n^3 - n = n(n-1)(n+1)$$ — three consecutive integers.\n- Step 2: Among any 3 consecutive integers, exactly one is divisible by 3 and at least one is divisible by 2. So their product is divisible by $$2 \\times 3 = 6$$.\n- Step 3: Alternatively, exhaust residues mod 6 (six cases). Both work; the factoring method is faster.\n\nLesson: exhaustion is sometimes overkill; a structural argument (product of consecutive integers) can replace it. But exhaustion is a guaranteed approach when structural insight fails.", "source": "Opus 4.7 ②", "_id": "opus_2_119", "judge_pick": false}, {"question": "Give a mental-math example of checking a trig solution with cosine symmetry.", "answer": "- Step 1: Suppose $$\\cos\\theta = 1/2$$ for $$0° \\le \\theta < 360°$$. Principal: $$\\cos^{-1}(1/2) = 60°$$.\n- Step 2: Other solution via symmetry $$\\cos(360°-\\alpha)=\\cos\\alpha$$: $$\\theta = 360° - 60° = 300°$$.\n- Step 3: Verify: $$\\cos 60° = 1/2$$ ✓. $$\\cos 300° = \\cos(-60°) = \\cos 60° = 1/2$$ ✓.\n\nBoth solutions add to $$360°$$. This symmetry is why cos has a \"$$\\pm\\alpha$$\" family rather than a \"$$180°-\\alpha$$\" family like sin.", "source": "Opus 4.7 ②", "_id": "opus_2_120", "judge_pick": false}, {"question": "Give a mini-example: find the coefficient of $$x^2$$ in $$(2-x)^4$$ using the binomial theorem.", "answer": "- Step 1: General term $$\\binom{4}{r} 2^{4-r} (-x)^r$$. For $$x^2$$, $$r=2$$.\n- Step 2: Compute: $$\\binom{4}{2} \\cdot 2^2 \\cdot (-1)^2 = 6 \\cdot 4 \\cdot 1 = 24$$.\n- Step 3: So coefficient of $$x^2$$ is $$24$$. Verify by expanding: $$(2-x)^2 = 4 - 4x + x^2$$, $$(2-x)^4 = (4-4x+x^2)^2$$ — coefficient of $$x^2$$ comes from $$4 \\cdot x^2 \\cdot 2 + (-4x)(-4x)$$... (bookkeeping gets harder; the general-term approach is cleaner).\n\nKey: $$(-x)^r$$ provides the alternating sign automatically; don't add a separate sign.", "source": "Opus 4.7 ②", "_id": "opus_2_121", "judge_pick": false}, {"question": "Give a mini-example checking $$\\log^2 x \\ne 2\\log x$$.", "answer": "- Step 1: Pick $$x = 100$$, base 10: $$\\log_{10} 100 = 2$$.\n- Step 2: Compute both: $$\\log^2 100 = (\\log 100)^2 = 4$$. Meanwhile, $$2 \\log 100 = 2 \\cdot 2 = 4$$.\n- Step 3: Same here — a coincidence at $$x=100$$. Try $$x=10$$: $$\\log 10 = 1$$. $$\\log^2 10 = 1$$, but $$2\\log 10 = 2$$. Different.\n\nLesson: the coincidence at $$x=100$$ (where $$\\log = 2$$) highlights why these feel similar; they agree for one specific value but are fundamentally different functions.", "source": "Opus 4.7 ②", "_id": "opus_2_122", "judge_pick": true}, {"question": "Give a mini-example: show $$\\log_a(A \\cdot B) = \\log_a A + \\log_a B$$, then test by computing both sides for $$A=B=10$$, base 10.", "answer": "- Step 1: Proof: let $$u = \\log_a A, v = \\log_a B$$. Then $$a^u = A, a^v = B$$, so $$a^{u+v} = AB$$. Taking $$\\log_a$$: $$u + v = \\log_a(AB)$$.\n- Step 2: Test with $$A = B = 10$$, base 10: $$\\log_{10}(10 \\cdot 10) = \\log_{10}(100) = 2$$.\n- Step 3: RHS: $$\\log_{10} 10 + \\log_{10} 10 = 1 + 1 = 2$$. Match ✓.\n\nIntuition: logs turn multiplication into addition. This is *why* logs were invented historically — to make multiplication of large numbers tractable by addition.", "source": "Opus 4.7 ②", "_id": "opus_2_123", "judge_pick": true}, {"question": "Why does the product rule $$(uv)' = u'v + uv'$$ make sense heuristically? (3 steps)", "answer": "- Step 1: Imagine $$u$$ and $$v$$ as side lengths of a rectangle; $$uv$$ is the area.\n- Step 2: A tiny increment to each side — $$u \\to u + du$$, $$v \\to v + dv$$ — grows the area by approximately $$u\\,dv + v\\,du$$ (two thin rectangles along the original sides), plus a negligible $$du \\cdot dv$$ corner.\n- Step 3: So $$d(uv) \\approx u\\,dv + v\\,du$$. Dividing by $$dx$$: $$(uv)' = u v' + u' v$$.\n\nIntuition: product-rule is literally the two marginal-area contributions when each factor changes slightly.", "source": "Opus 4.7 ②", "_id": "opus_2_124", "judge_pick": true}, {"question": "Why does the chain rule (not formally in P2 but implicit) say $$\\tfrac{d}{dx} f(g(x)) = f'(g) \\cdot g'(x)$$? (3 steps)", "answer": "- Step 1: Imagine $$g(x)$$ is a \"rescaling\" of $$x$$, and $$f$$ acts on that rescaled variable.\n- Step 2: A small change $$dx$$ produces a change $$dg = g'(x)\\,dx$$ in $$g$$. Then $$f$$ changes by $$df = f'(g)\\,dg = f'(g) g'(x)\\,dx$$.\n- Step 3: So $$\\dfrac{df}{dx} = f'(g) \\cdot g'(x)$$: rate of change of $$f$$ w.r.t. $$x$$ equals rate w.r.t. $$g$$ times rate of $$g$$ w.r.t. $$x$$.\n\nNot needed for P2 power-rule differentiation, but the *intuition* that \"derivatives compose multiplicatively\" is useful.", "source": "Opus 4.7 ②", "_id": "opus_2_125", "judge_pick": true}, {"question": "Give a mini-example of using the discriminant to check the number of real roots.", "answer": "- Step 1: Consider $$2x^2 - x + 1 = 0$$.\n- Step 2: Discriminant $$\\Delta = b^2 - 4ac = 1 - 8 = -7 < 0$$.\n- Step 3: Since $$\\Delta < 0$$, no real roots. Useful to know BEFORE attempting the quadratic formula (which would produce imaginary values).\n\nMental-math shortcut: if the \"$$b^2$$\" is small compared to \"$$4ac$$\", expect $$\\Delta < 0$$.", "source": "Opus 4.7 ②", "_id": "opus_2_126", "judge_pick": false}, {"question": "In a trig equation problem where $$\\theta$$ ranges over $$0 \\le \\theta < 360°$$ but the equation is in $$2\\theta$$, why might you miss 2 of 4 solutions if you don't widen the domain?", "answer": "- Step 1: Equation in $$2\\theta$$: solutions for $$2\\theta$$ lie in $$[0°, 720°)$$ (twice the original range).\n- Step 2: If you forget and search only in $$[0°, 360°)$$, you'll find only 2 solutions for $$2\\theta$$ — corresponding to 2 values of $$\\theta$$.\n- Step 3: The \"missed\" 2 solutions come from adding $$360°$$ to each of the first two $$2\\theta$$ values (still in the widened range), then dividing by 2 to get $$\\theta$$ values in the upper half of $$[0°, 360°)$$.\n\nSystematic fix: for equations in $$n\\theta$$, ALWAYS widen to $$[0°, 360°n)$$ first; solve for $$n\\theta$$; divide by $$n$$ to recover $$\\theta$$.", "source": "Opus 4.7 ②", "_id": "opus_2_127", "judge_pick": true}, {"question": "Given a periodic recurrence $$u_{n+1} = 2 - 3/u_n$$ with $$u_1 = 3$$, how do you set up the sum $$\\sum_{r=1}^{100} u_r$$ efficiently? (4 steps)", "answer": "- Step 1: Compute early terms: $$u_2 = 2 - 1 = \\ldots$$ (actually, let's verify with the specific recurrence). For $$u_1 = 3$$: $$u_2 = 2 - 3/3 = 1$$ — hmm, but from the study notes, $$u_2 = 2/3, u_3 = -4, u_4 = 3$$. So cycle length 3, cycle sum $$3 + 2/3 - 4 = -1/3$$.\n- Step 2: Decompose $$100 = 33 \\cdot 3 + 1$$: 33 complete cycles + 1 extra term ($$u_{100} = u_1 = 3$$ since $$100 \\equiv 1 \\pmod 3$$).\n- Step 3: Partial sum: $$33 \\times (-1/3) = -11$$ for the complete cycles.\n- Step 4: Plus the extra: $$-11 + 3 = -8$$. Total: $$\\sum_{r=1}^{100} u_r = -8$$.\n\nKey insight: for large $$N$$, decompose $$N = qk + r$$ where $$k$$ = period; sum = $$q \\times (\\text{cycle sum}) + $$ sum of first $$r$$ cycle terms.", "source": "Opus 4.7 ②", "_id": "opus_2_128", "judge_pick": false}, {"question": "Compare the approaches \"long division\" vs \"factor theorem + simultaneous equations\" for finding unknowns in a cubic, and when is each best?", "answer": "- Step 1: **Factor theorem**: when a linear factor is known or suggested (e.g., \"$$(x-c)$$ is a factor\" or \"remainder = $$R$$ on dividing by $$(x-c)$$\"), use $$f(c) = R$$ directly. One-line solution.\n- Step 2: **Long division**: when you need the full quotient polynomial (e.g., to fully factorise), or to check divisibility by a non-obvious factor. More computation, but provides the quadratic quotient.\n- Step 3: **Simultaneous equations**: combine two factor/remainder conditions to find two unknowns. E.g., \"$$(2x+1)$$ factor AND $$f(2) = -25$$\" gives two linear equations in $$a, b$$.\n\nRule of thumb: start with factor/remainder theorem; only switch to long division if you need the quotient.", "source": "Opus 4.7 ②", "_id": "opus_2_129", "judge_pick": false}, {"question": "What is the key distinction between \"find $$k$$\" using a point on the curve vs \"find $$k$$\" using a definite integral condition?", "answer": "- Step 1: **Point-on-curve**: substitute $$(x_0, y_0)$$ into the curve equation; one equation in $$k$$. Example: $$y = (x-k)^2/\\sqrt x$$, point $$(1,9)$$: $$9 = (1-k)^2 \\Rightarrow k = -2$$ or $$4$$.\n- Step 2: **Integral = target value**: evaluate the integral symbolically in $$k$$, then equate to the target numerical value (often 0 for equal-area problems). Example: $$\\int y\\,dx = 0 \\Rightarrow$$ equation in $$k$$.\n- Step 3: Don't mix them: \"Show integral = $$ak^2+bk+c$$\" is NOT \"integral = 0\"; it's matching coefficients. \"Given point on curve\" gives a single equation; \"given integral = X\" gives another.\n\nPitfall: students set integral = 0 when the problem actually wants coefficient-matching.", "source": "Opus 4.7 ②", "_id": "opus_2_130", "judge_pick": true}, {"question": "Why is the sum-to-infinity formula $$S_\\infty = a/(1-r)$$ not applicable when $$|r| \\ge 1$$? (3 steps)", "answer": "- Step 1: The derivation of $$S_\\infty$$: $$S_n = a(1-r^n)/(1-r)$$; as $$n \\to \\infty$$, $$r^n \\to 0$$ if $$|r| < 1$$, so $$S_n \\to a/(1-r)$$.\n- Step 2: If $$|r| = 1$$: $$r^n$$ oscillates between $$\\pm 1$$ or stays constant, so no limit. If $$|r| > 1$$: $$|r^n| \\to \\infty$$, so sum diverges.\n- Step 3: Geometric series converge only when each term is strictly smaller in magnitude than the last — i.e. $$|r| < 1$$. Applying the formula to $$|r| \\ge 1$$ gives a nonsensical \"value\" for a divergent sum.\n\nIntuition: infinite sum of things that don't shrink = infinity.", "source": "Opus 4.7 ②", "_id": "opus_2_131", "judge_pick": false}, {"question": "What is the expected mark-scheme format for a \"prove by exhaustion\" solution?", "answer": "- Step 1: **Setup**: state the case split explicitly (\"Every integer is of the form $$4k, 4k+1, 4k+2, 4k+3$$\").\n- Step 2: **Case work**: for each case, substitute and show the property. Write a small table or enumeration.\n- Step 3: **Conclusion**: write an explicit summary sentence (\"Hence in every case, the remainder is 2 or 3, so $$n^2+2$$ is not divisible by 4 for any integer $$n$$.\").\n\nMark allocation: typically 1 mark for setup, 1 per case (scaled by total marks), 1 mark for conclusion. Omitting the conclusion commonly loses the last mark.", "source": "Opus 4.7 ②", "_id": "opus_2_132", "judge_pick": true}, {"question": "If someone claims \"for all positive integers $$n$$, $$n^2 + n + 41$$ is prime,\" give a structured approach to testing this claim.", "answer": "- Step 1: Test small values: $$n=1$$: 43 (prime). $$n=2$$: 47 (prime). Indeed, this polynomial (Euler's) produces primes for many small $$n$$.\n- Step 2: Think structurally: when can $$n^2 + n + 41 = n(n+1) + 41$$ be composite? If $$n = 41$$: $$41 \\cdot 42 + 41 = 41(42+1) = 41 \\cdot 43$$ — NOT prime.\n- Step 3: Counter-example: $$n = 41$$. The structural insight comes from seeing when $$n$$ divides all three terms, which happens when $$n$$ is a factor of 41.\n\nLesson: counter-example hunting benefits from both brute search AND structural reasoning; try to identify algebraic patterns that force divisibility.", "source": "Opus 4.7 ②", "_id": "opus_2_133", "judge_pick": true}, {"question": "In a $$\\tan$$-general-solution problem, why does $$\\theta = \\alpha + n\\pi$$ give ALL solutions (not just half)?", "answer": "- Step 1: $$\\tan$$ has period $$\\pi$$ (not $$2\\pi$$). The graph of $$\\tan$$ repeats every $$\\pi$$ units.\n- Step 2: $$\\tan(\\theta + \\pi) = \\tan\\theta$$ identically — so every horizontal line $$y = k$$ intersects $$\\tan$$ at one point per period.\n- Step 3: Hence one family: $$\\theta = \\alpha + n\\pi$$ covers all solutions. No need for a \"$$\\pi - \\alpha$$\" or \"$$-\\alpha$$\" branch because $$\\tan$$ doesn't have the symmetries that $$\\sin$$/$$\\cos$$ do.\n\nContrast: $$\\sin$$ and $$\\cos$$ have period $$2\\pi$$ but the horizontal line $$y=k$$ crosses each period twice (at angles $$\\alpha$$ and $$\\pi - \\alpha$$ for sin; $$\\alpha$$ and $$-\\alpha$$ for cos).", "source": "Opus 4.7 ②", "_id": "opus_2_134", "judge_pick": true}, {"question": "In an exam, if you've written down the wrong formula but caught the error mid-question, what's the efficient recovery strategy?", "answer": "- Step 1: Don't erase. Cross through once with a line, annotate \"error\" or \"see below\" if helpful.\n- Step 2: Re-state the correct formula and redo from that point. You won't lose marks for the crossed-out work; you may earn partial marks for what's correct.\n- Step 3: Check the cumulative time: if redoing will cost more than the marks, move on and return if time permits. For an 8-mark question, 5 minutes of recovery is justifiable; for a 2-mark question, probably not.\n\nKey discipline: \"don't erase correct work under second-guessing pressure\" — a pattern Phuc has shown costs him marks.", "source": "Opus 4.7 ②", "_id": "opus_2_135", "judge_pick": false}, {"question": "In a trig problem \"$$\\cos x = k$$ has solutions in $$[0°, 360°)$$\", describe the sign pattern of $$k$$ across quadrants.", "answer": "- Step 1: $$\\cos x > 0$$ in quadrants 1 and 4 (right half-plane: $$x \\in (0°, 90°) \\cup (270°, 360°)$$).\n- Step 2: $$\\cos x < 0$$ in quadrants 2 and 3 (left half-plane: $$x \\in (90°, 270°)$$).\n- Step 3: So: $$\\cos x = k$$ with $$k > 0$$ has solutions $$\\alpha$$ (Q1) and $$360° - \\alpha$$ (Q4); with $$k < 0$$ has solutions $$\\alpha$$ (Q2) and $$360° - \\alpha$$ (Q3).\n\nFor $$k = -1/3$$: principal $$\\alpha = \\cos^{-1}(-1/3) \\approx 109.5°$$ (in Q2), and $$360° - 109.5° = 250.5°$$ (in Q3). Both negative-cos solutions.\n\nRule: after principal value from calculator, the other solution in $$[0°, 360°)$$ is always $$360° - \\alpha$$, regardless of sign of $$k$$.", "source": "Opus 4.7 ②", "_id": "opus_2_136", "judge_pick": true}, {"question": "For sequence sums where the formula gives a decimal that isn't an integer, and the problem asks for \"the first $$n$$ where the sum exceeds target\" — what's the order-of-operations rule?", "answer": "- Step 1: Solve $$S_n = $$ target algebraically/numerically to get $$n = n^*$$, typically a decimal.\n- Step 2: Determine the direction of the inequality: $$S_n$$ increasing in $$n$$ means \"exceed\" requires $$n > n^*$$.\n- Step 3: Since $$n$$ must be a positive integer, round $$n^*$$ UP to the next integer. Verify: $$S_{n^*+1}$$ exceeds the target; $$S_{n^*}$$ (floor) does not.\n\nCommon slip: rounding to \"nearest integer\" rather than \"up\". For strict inequality \"$$> $$\", you always need to go past the exact crossover.", "source": "Opus 4.7 ②", "_id": "opus_2_137", "judge_pick": false}, {"question": "Why does the geometric mean identity $$u_2^2 = u_1 u_3$$ characterise three consecutive GP terms?", "answer": "- Step 1: If $$u_1, u_2, u_3$$ are three consecutive GP terms with common ratio $$r$$: $$u_2 = u_1 r$$ and $$u_3 = u_1 r^2$$.\n- Step 2: Multiply: $$u_1 u_3 = u_1 \\cdot u_1 r^2 = u_1^2 r^2 = (u_1 r)^2 = u_2^2$$.\n- Step 3: So $$u_2 = \\pm\\sqrt{u_1 u_3}$$ — the geometric mean (up to sign). This is often the fastest route to find a missing middle term, or to set up an equation when three \"candidate GP terms\" are given in terms of a parameter.\n\nExample use: $$(2k-15), k, (k+4)$$ GP ⇒ $$k^2 = (2k-15)(k+4)$$, yielding the quadratic in $$k$$.", "source": "Opus 4.7 ②", "_id": "opus_2_138", "judge_pick": true}, {"question": "For an integral between a curve and a line, when can you compute \"area under line\" geometrically as a trapezium instead of integrating?", "answer": "- Step 1: Any line segment over $$[x_1, x_2]$$ defines a region below it that is a trapezium: parallel sides $$y(x_1), y(x_2)$$, width $$x_2-x_1$$.\n- Step 2: Trapezium area: $$\\tfrac{1}{2}(y_1 + y_2)(x_2 - x_1)$$. Much faster than integrating a linear function.\n- Step 3: For lines, you always have this option; the definite integral $$\\int_{x_1}^{x_2}(mx+c)\\,dx$$ reduces to the same formula.\n\nExample: line from $$(1, 9)$$ to $$(16, 36)$$: area $$= \\tfrac{1}{2}(9+36)(16-1) = \\tfrac{1}{2}(45)(15) = 337.5$$.", "source": "Opus 4.7 ②", "_id": "opus_2_139", "judge_pick": true}, {"question": "Summarise the \"recurring error patterns\" observed across Phuc's six papers and their countermeasures.", "answer": "- Step 1: **Formula amnesia (esp. in-booklet formulas)**: practice formula lookup under time pressure; open the booklet during daily revision; simulate exam timing.\n- Step 2: **Crossing out correct work**: never erase until certain; annotate \"check\" instead. Second-guessing when the algebra looks unfamiliar leads to losing secure marks.\n- Step 3: **Off-by-one in sequences**: at problem start, write \"year $$k$$ ↔ $$n = k$$\" or \"year $$k$$ ↔ $$n = k-1$$\" depending on convention. Test by plugging in $$k=1$$.\n- Step 4: **Sign errors in recurrences / division**: write substitutions explicitly step-by-step, no skipping. Double-check signs of negative / negative = positive.\n- Step 5: **Skipping log domain check**: always list domain conditions from original equation, test each candidate solution.\n\nThese five patterns recurred across papers; awareness is the first step, disciplined practice (timed, with checklist) is the fix.", "source": "Opus 4.7 ②", "_id": "opus_2_140", "judge_pick": false}, {"question": "For a trigonometry problem expressed in degrees modelling temperature, how do you handle maximum/minimum computation when $$k$$ is an unknown frequency parameter? (3 steps)", "answer": "- Step 1: **Maximum of $$a + b\\sin(\\cdot)$$**: achieved when $$\\sin = 1$$, giving $$a + b$$ (assuming $$b > 0$$). Maximum depends only on $$a, b$$, not on the argument's frequency.\n- Step 2: **Time of maximum**: set the argument equal to $$90°$$ (in degrees) or $$\\pi/2$$ (in radians). Solve for $$t$$: $$kt + \\phi = 90° \\Rightarrow t = (90° - \\phi)/k$$. Here $$k$$ must be known numerically.\n- Step 3: If $$k$$ has two candidate values from a prior part (e.g., $$k = 6.41$$ or $$17.59$$), check which value matches any additional constraints (e.g., $$0 < k < 10$$) to pick the right one.\n\nExample: if $$k = 6.41$$ and $$\\phi = 18°$$: $$t = (90-18)/6.41 \\approx 11.23$$ h, i.e. 11:14 am.", "source": "Opus 4.7 ②", "_id": "opus_2_141", "judge_pick": false}, {"question": "When solving \"show that $$5\\alpha^2 - 18\\alpha - 20 = 0$$\" from a stationary-point condition, describe the algebraic \"clearing\" workflow in detail. (4 steps)", "answer": "- Step 1: Write the derivative equal to zero: e.g., $$\\tfrac{1}{20}\\left[\\tfrac{1}{2}t^{-1/2}(20+6t-t^2) + t^{1/2}(6-2t)\\right] = 0$$.\n- Step 2: Identify the lowest-power term (here $$t^{-1/2}$$) and the coefficient to clear (here $$1/20$$). Multiply by $$40 t^{1/2}$$ to eliminate both.\n- Step 3: Track each term's transformation:\n  + $$\\tfrac{1}{2}t^{-1/2} \\cdot 40 t^{1/2} = 20$$.\n  + $$t^{1/2} \\cdot 40 t^{1/2} = 40 t$$.\n- Step 4: Combine and simplify: you get a polynomial equation in $$t$$. Rearrange to match the target form $$5t^2 - 18t - 20 = 0$$.\n\nKey discipline: multiply EVERY term (including constants) by the clearing factor; distribute carefully.", "source": "Opus 4.7 ②", "_id": "opus_2_142", "judge_pick": true}, {"question": "Explain the role of sign conventions when the problem says \"$$R_1$$ above $$x$$-axis, $$R_2$$ below $$x$$-axis,\" and how they appear in the final equation.", "answer": "- Step 1: Area of $$R_1$$ (above axis) = $$\\int y\\,dx > 0$$, since $$y > 0$$ on that interval.\n- Step 2: Area of $$R_2$$ (below axis) has $$y < 0$$. But area is always positive, so $$\\text{Area}(R_2) = -\\int y\\,dx > 0$$.\n- Step 3: \"Equal areas\" $$\\Leftrightarrow $$ $$\\int_0^a y\\,dx = -\\int_a^k y\\,dx$$, rearranging: $$\\int_0^k y\\,dx = 0$$.\n\nStructural note: the negative sign encodes \"below the axis.\" The signed integral naturally captures orientation — exploit it to simplify \"equal areas\" to \"total integral = 0.\"", "source": "Opus 4.7 ②", "_id": "opus_2_143", "judge_pick": false}, {"question": "For an exam question involving both sin and tan (e.g., $$2\\tan\\theta + 3\\sin\\theta = 0$$), why is \"factoring out $$\\sin\\theta$$\" usually the right move?", "answer": "- Step 1: $$\\tan\\theta = \\sin\\theta/\\cos\\theta$$, so every term contains $$\\sin\\theta$$ as a factor (when rewritten).\n- Step 2: Factor: $$\\sin\\theta\\left(\\dfrac{2}{\\cos\\theta} + 3\\right) = 0$$. A product is zero iff a factor is zero, giving two independent equations.\n- Step 3: Each branch yields its own solution family: $$\\sin\\theta = 0$$ gives $$\\theta = 0°, 180°, \\ldots$$; the bracket gives $$\\cos\\theta = -2/3$$, with its own family.\n\nWhy NOT multiply by $$\\cos\\theta$$ to clear: that loses the $$\\sin\\theta = 0$$ solutions when $$\\cos\\theta = 0$$ (division issue). Factoring preserves all solution branches.", "source": "Opus 4.7 ②", "_id": "opus_2_144", "judge_pick": true}, {"question": "For the IAL exam strategy, which topics consistently appear and should be practiced most heavily?", "answer": "- Step 1: **Always appears**: trapezium rule, binomial expansion, circle equations, arithmetic/geometric sequences, factor/remainder theorem, log equations, basic trig equations.\n- Step 2: **Usually appears**: proof (exhaustion / counter-example), area by integration, product rule differentiation, modelling (linear vs exponential).\n- Step 3: **Sometimes appears**: tangent to circle, periodic sequences, complex trig identities with substitution.\n\nStrategy: allocate practice time proportional to frequency × marks. Trapezium + binomial + circles + sequences typically account for 40-50% of marks combined.", "source": "Opus 4.7 ②", "_id": "opus_2_145", "judge_pick": false}, {"question": "For a cubic $$f(x) = 2x^3 + x^2 + x - 1$$ factored as $$(2x-1)(x^2+x+1)$$, why is the answer to \"how many real roots?\" equal to 1? (3 steps)", "answer": "- Step 1: The real roots of $$f$$ come from the factors. Each linear factor gives one real root; each quadratic factor gives 0, 1, or 2 depending on its discriminant.\n- Step 2: $$(2x-1) = 0 \\Rightarrow x = 1/2$$ (one real root).\n- Step 3: $$x^2+x+1$$: $$\\Delta = 1 - 4 = -3 < 0 \\Rightarrow$$ no real roots.\n\nTotal real roots: 1.\n\nStructural insight: a cubic polynomial always has at least one real root (intermediate value theorem, since cubics go from $$-\\infty$$ to $$+\\infty$$). Here, that one real root is $$x = 1/2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_146", "judge_pick": true}, {"question": "In any \"find $$k$$ from $$\\int y\\,dx = 0$$\" problem, what is the common factor-out trick that reduces computation? (3 steps)", "answer": "- Step 1: After evaluating the definite integral, you get a polynomial in $$k$$ (or equivalently $$k^n$$ for various $$n$$).\n- Step 2: Often, one factor is a monomial in $$k$$ (like $$k^{5/2}$$), which is nonzero for $$k > 0$$. Factor it out: $$k^{5/2}(\\text{linear in } k) = 0$$.\n- Step 3: Solve the bracket (linear in $$k$$) for the unique $$k$$; discard the trivial root $$k = 0$$ if irrelevant.\n\nExample: $$\\tfrac{16}{5}k^{5/2} - \\tfrac{4}{7}k^{7/2} = 0 \\Rightarrow k^{5/2}(\\tfrac{16}{5} - \\tfrac{4k}{7}) = 0 \\Rightarrow k = 28/5$$ (the other root $$k=0$$ is outside the region).", "source": "Opus 4.7 ②", "_id": "opus_2_147", "judge_pick": true}, {"question": "Explain why the \"trapezium rule IS in the formula booklet\" fact did NOT prevent four consecutive papers of formula amnesia, and what the underlying lesson is.", "answer": "- Step 1: The formula booklet exists, but flipping pages under time pressure costs 30+ seconds. If you don't know where the formula IS, you may freeze for a minute hunting.\n- Step 2: Knowing the formula exists is different from *knowing where to find it quickly*. Without a mental map of the booklet's layout, students defaults to trying to reconstruct the formula, which often fails.\n- Step 3: Lesson: during revision, PRACTICE opening the formula booklet and finding each formula in under 5 seconds. Fold the corner, annotate, memorise the page number. The booklet is an exam tool — treat it like one.\n\nBonus: for trap and binomial, memorise too; the fastest recall is no-lookup recall.", "source": "Opus 4.7 ②", "_id": "opus_2_148", "judge_pick": false}, {"question": "For a general exam strategy, list three \"silent errors\" that cost marks invisibly and are hard to catch during the exam.", "answer": "- Step 1: **Log domain violations**: finding a mathematically valid $$x$$ that makes the log argument negative. Costs marks if you don't check at the end.\n- Step 2: **Inequality flip forgotten**: dividing by a negative without flipping. Silent because the rest of the algebra looks fine; the direction is wrong.\n- Step 3: **Off-by-one in sequences**: computing $$u_k$$ as $$ar^k$$ instead of $$ar^{k-1}$$. The structure \"looks right\" but yields wrong numbers.\n\nOther silent errors: $$\\log(A+B) \\ne \\log A + \\log B$$ confusion; $$2^{x+1} \\ne (2^x)^2$$; $$\\log^2 x \\ne 2\\log x$$.\n\nCountermeasure: build a personal checklist (\"AM I CHECKING: logs, signs, indexing, domains?\") and run through it in the last 2 minutes of each question.", "source": "Opus 4.7 ②", "_id": "opus_2_149", "judge_pick": true}, {"question": "Distinguish between \"$$f$$ is a function of $$x$$\" and \"$$f$$ is a function of another variable (e.g., $$k$$)\" in integration contexts. Why does the \"$$k$$\" role affect the method?", "answer": "- Step 1: In $$\\int f(x, k)\\,dx$$, $$x$$ is the integration variable; $$k$$ is a *parameter* that remains constant during integration.\n- Step 2: After integrating, the result is a function of $$k$$ (and the limits). So $$\\int_1^{16} \\frac{(x-k)^2}{\\sqrt x}\\,dx$$ evaluates to a polynomial in $$k$$, like $$6k^2 - 84k + 2046/5$$.\n- Step 3: This expression IS the answer to the integral — you don't set it to zero, you don't solve for $$k$$. If the problem asks to \"show $$= ak^2 + bk + c$$\", identify $$a, b, c$$ by matching.\n\nConfusion trap: \"there's $$k$$ in the answer, shouldn't I solve for it?\" No — $$k$$ is a parameter, and the integral is a function of it.", "source": "Opus 4.7 ②", "_id": "opus_2_150", "judge_pick": true}, {"question": "Give a concise framework for tackling \"show that\" versus \"find\" versus \"prove\" questions.", "answer": "- Step 1: **\"Show that\" X = Y**: demonstrate an equation or identity. Start from known/given; manipulate algebraically; arrive at Y. Marks are for valid logical steps; no numerical answer needed.\n- Step 2: **\"Find\" X**: compute a specific value. Use any method; present the final answer clearly.\n- Step 3: **\"Prove\"**: demonstrate a general claim for all instances. May use deduction, exhaustion, or counter-example (for disproof). Conclusion sentence is expected.\n\nKey distinction: \"show\" expects derivation steps (method marks); \"find\" expects answer (value marks); \"prove\" expects logical rigor + conclusion.", "source": "Opus 4.7 ②", "_id": "opus_2_151", "judge_pick": true}], "count": 152}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 33508, "out_tokens": 18983, "reasoning_chars": 8066, "cost_eur": 0.0935, "elapsed_s": 186, "content_chars": 51218}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 24776, "out_tokens": 11506, "reasoning_chars": 6953, "cost_eur": 0.061, "elapsed_s": 301, "content_chars": 36740}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 33508, "out_tokens": 12417, "reasoning_chars": 15561, "cost_eur": 0.0724, "elapsed_s": 1801, "content_chars": 23301}, "kimi_1": {"run": 1, "provider": "kimi", "model": "moonshotai/kimi-k2.6", "display": "Kimi K2.6", "temperature": 0.7, "in_tokens": 31896, "out_tokens": 33513, "reasoning_chars": 62720, "cost_eur": 0.1654, "elapsed_s": 790, "content_chars": 50393}, "kimi_2": {"run": 2, "provider": "kimi", "model": "moonshotai/kimi-k2.6", "display": "Kimi K2.6", "temperature": 0.8, "in_tokens": 31897, "out_tokens": 37027, "reasoning_chars": 70494, "cost_eur": 0.1804, "elapsed_s": 775, "content_chars": 52682}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 31170, "out_tokens": 23912, "reasoning_chars": 996, "cost_eur": 0.0299, "elapsed_s": 172, "content_chars": 63266}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.8, "in_tokens": 31170, "out_tokens": 15404, "reasoning_chars": 1938, "cost_eur": 0.0213, "elapsed_s": 110, "content_chars": 38364}, "opus_2": {"run": 2, "provider": "opus", "model": "claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 49694, "out_tokens": 64768, "reasoning_chars": 0, "cost_eur": 5.1548, "elapsed_s": 817, "content_chars": 123049}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.7, "in_tokens": 34684, "out_tokens": 4264, "reasoning_chars": 3030, "cost_eur": 0.0111, "elapsed_s": 89, "content_chars": 9011}, "qwen_2": {"run": 2, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.75, "in_tokens": 34684, "out_tokens": 4281, "reasoning_chars": 5357, "cost_eur": 0.0111, "elapsed_s": 95, "content_chars": 7834}, "qwen_3": {"run": 3, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.8, "in_tokens": 34684, "out_tokens": 4355, "reasoning_chars": 5707, "cost_eur": 0.0112, "elapsed_s": 96, "content_chars": 10530}, "qwen_4": {"run": 4, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.85, "in_tokens": 34684, "out_tokens": 9114, "reasoning_chars": 4652, "cost_eur": 0.0164, "elapsed_s": 170, "content_chars": 19877}}};
const SK='p2_pp';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),3500);
  fetch('/api/notion',{method:'POST',signal:ctrl.signal,headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
