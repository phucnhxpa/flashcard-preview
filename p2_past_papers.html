 r_2| < d < r_1 + r_2$$: Intersect at 2 points\n+ $$d = |r_1 - r_2|$$: Touch internally (1 point)\n+ $$d < |r_1 - r_2|$$: One inside the other\n- Step 3: To prove \"neither touch nor intersect,\" show $$d > r_1 + r_2$$ (too far) OR $$d < |r_1 - r_2|$$ (one inside other).", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "How do you find the equation of a horizontal chord of a circle, given its length? (3 steps)", "answer": "- Step 1: A chord parallel to the $$x$$-axis has equation $$y = k$$. Substitute into the circle equation to get $$(x-a)^2 + (k-b)^2 = r^2$$.\n- Step 2: Solve for $$x$$: $$(x-a)^2 = r^2 - (k-b)^2$$, so the chord endpoints are at $$x = a \\pm \\sqrt{r^2 - (k-b)^2}$$. The chord length is $$2\\sqrt{r^2 - (k-b)^2}$$.\n- Step 3: Set this equal to the given length and solve for $$k$$. Use additional conditions (e.g., \"above $$x$$-axis\" means $$k > 0$$) to select the correct value.\n\nThe answer is just $$y = k$$—you only need the constant, not the endpoints.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": true}, {"question": "What is the relationship between the gradient of a radius and the gradient of a tangent at a point on a circle? (2 steps)", "answer": "- Step 1: The tangent at any point on a circle is perpendicular to the radius drawn to that point. If the radius has gradient $$m_r$$, the tangent has gradient $$m_t = -\\frac{1}{m_r}$$ (the negative reciprocal).\n- Step 2: Compute $$m_r = \\frac{y_P - y_C}{x_P - x_C}$$, then flip and negate for $$m_t$$. Use point-slope form with the point of tangency $$P$$.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "When solving a trig equation like $$\\sin 3\\theta = \\sqrt{3} \\cos 3\\theta$$ with $$\\theta \\in [0, \\pi)$$, how do you handle the domain? (3 steps)", "answer": "- Step 1: Divide by $$\\cos 3\\theta$$ to get $$\\tan 3\\theta = \\sqrt{3}$$.\n- Step 2: Scale the domain: $$0 \\leq \\theta < \\pi$$ becomes $$0 \\leq 3\\theta < 3\\pi$$.\n- Step 3: Find the principal value $$3\\theta = \\frac{\\pi}{3}$$, then add the period of tan ($$\\pi$$) repeatedly until you exceed the upper bound $$3\\pi$$. Divide each solution by 3.\n\nFor equations in $$n\\theta$$, always multiply the domain by $$n$$ before solving.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "What are the general solutions for $$\\sin \\theta = k$$, $$\\cos \\theta = k$$, and $$\\tan \\theta = k$$? (3 steps)", "answer": "- Step 1: $$\\sin \\theta = k \\Rightarrow \\theta = \\alpha + 2n\\pi$$ OR $$\\theta = (\\pi - \\alpha) + 2n\\pi$$, where $$\\alpha = \\sin^{-1}(k)$$ and $$n \\in \\mathbb{Z}$$.\n- Step 2: $$\\cos \\theta = k \\Rightarrow \\theta = \\pm \\alpha + 2n\\pi$$, where $$\\alpha = \\cos^{-1}(k)$$. The $$\\pm$$ symmetry is the key distinction from sine.\n- Step 3: $$\\tan \\theta = k \\Rightarrow \\theta = \\alpha + n\\pi$$. Only ONE family of solutions because tan has period $$\\pi$$ (not $$2\\pi$$).", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "When solving $$\\cos(2x) = \\frac{2}{3}$$ for $$0 < x < 360°$$, how many solutions should you expect and why? (3 steps)", "answer": "- Step 1: Scale the domain: $$0 < 2x < 720°$$. You're now finding all solutions in a $$720°$$ range.\n- Step 2: Use cosine symmetry: $$2x = \\pm \\alpha + 360°n$$. With $$\\alpha \\approx 48.2°$$, the four solutions in range are $$2x = 48.2°, 311.8°, 408.2°, 671.8°$$.\n- Step 3: Divide each by 2: $$x = 24.1°, 155.9°, 204.1°, 335.9°$$. Four solutions total.\n\nPitfall: Forgetting the $$-\\alpha$$ branch or forgetting to add $$360°n$$ gives only 2 of 4 answers.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": true}, {"question": "How do you convert a trig equation with both $$\\sin \\theta$$ and $$\\cos \\theta$$ into a single trig function? (2 steps)", "answer": "- Step 1: If the equation is of the form $$a\\sin\\theta = b\\cos\\theta$$, divide both sides by $$\\cos\\theta$$ to get $$a\\tan\\theta = b$$.\n- Step 2: If the equation has $$\\sin^2\\theta$$ and $$\\cos\\theta$$ (or vice versa), substitute $$\\sin^2\\theta = 1 - \\cos^2\\theta$$ to create a quadratic in a single trig function, then solve.\n\nChoose the substitution that eliminates the squared term.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "When a trig equation has both $$\\tan\\theta$$ and $$\\sin\\theta$$, what factoring technique should you use? (3 steps)", "answer": "- Step 1: Replace $$\\tan\\theta$$ with $$\\frac{\\sin\\theta}{\\cos\\theta}$$ to express everything in terms of sine and cosine.\n- Step 2: Factor out the common $$\\sin\\theta$$ term. For example, $$2\\tan\\theta + 3\\sin\\theta = 0$$ becomes $$\\sin\\theta\\left(\\frac{2}{\\cos\\theta} + 3\\right) = 0$$.\n- Step 3: Set each factor to zero: $$\\sin\\theta = 0$$ gives some solutions, and $$\\cos\\theta = -\\frac{2}{3}$$ gives others. Combine all valid solutions.\n\nDon't cancel $$\\sin\\theta$$—you'll lose solutions. Factor it out instead.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "What is the cosine symmetry rule for finding the second solution in $$[0°, 360°]$$? (2 steps)", "answer": "- Step 1: If $$\\cos\\alpha = k$$, the principal value is $$\\alpha = \\cos^{-1}(k)$$, which lies in $$[0°, 180°]$$.\n- Step 2: The second solution in $$[0°, 360°]$$ is always $$360° - \\alpha$$. Solutions come in pairs summing to $$360°$$.\n\nPhuc's error: using $$-\\alpha$$ (like $$-138.6°$$) instead of $$360° - \\alpha$$ (like $$221.4°$$). Both are mathematically valid angles, but only the positive equivalent is in the standard domain.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "How do you identify whether a trig model uses radians or degrees? (2 steps)", "answer": "- Step 1: Look for the degree symbol $$°$$ inside the equation. For example, $$H = 10 + 12\\sin(kt + 18)°$$ means the argument is in degrees.\n- Step 2: If there is NO degree symbol, the argument is in radians. This determines whether you use $$\\pi$$-based values or degree-based values for principal values and periods.\n\nThis is a critical distinction—using the wrong unit system produces entirely wrong answers.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": true}, {"question": "What is the maximum value of a function of the form $$H = a + b\\sin(\\cdot)$$ where $$b > 0$$, and when does it occur? (2 steps)", "answer": "- Step 1: The maximum occurs when $$\\sin(\\cdot) = 1$$, giving $$H_{\\max} = a + b$$.\n- Step 2: To find the time, set the argument equal to $$90°$$ (if in degrees) or $$\\frac{\\pi}{2}$$ (if in radians), then solve for $$t$$.\n\nSimilarly, the minimum is $$a - b$$ when $$\\sin(\\cdot) = -1$$.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "In the binomial expansion $$(a+b)^n$$, what is the general term and what are the sign pitfalls? (3 steps)", "answer": "- Step 1: The general term is $$\\binom{n}{r} a^{n-r} b^r$$, where $$r$$ starts at 0.\n- Step 2: If $$b$$ is negative (e.g., $$-\\frac{x}{6}$$), then odd values of $$r$$ produce negative terms. Track the sign carefully.\n- Step 3: If the first term $$a \\neq 1$$ (e.g., $$3 + px$$), its power decreases with each term: $$3^5, 3^4, 3^3, \\ldots$$ Don't forget to include these decreasing powers.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "When finding the coefficient of $$x^k$$ in a product like $$(A + Bx) \\cdot P(x)$$, where $$P(x)$$ is a binomial expansion, what must you consider? (3 steps)", "answer": "- Step 1: The coefficient of $$x^k$$ comes from ALL ways to get $$x^k$$ in the product.\n- Step 2: Contribution 1: $$A$$ (constant) multiplied by the $$x^k$$ term of $$P(x)$$.\n- Step 3: Contribution 2: $$Bx$$ multiplied by the $$x^{k-1}$$ term of $$P(x)$$.\nAdd both contributions for the total coefficient.\n\nPitfall: Only considering one of the two contributions gives an incomplete answer.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": false}, {"question": "A simple exercise: Find the coefficient of $$x^2$$ in $$(1 + 2x)(1 + 3x)^2$$. (3 steps)", "answer": "- Step 1: Expand $$(1 + 3x)^2 = 1 + 6x + 9x^2$$.\n- Step 2: Multiply by $$(1 + 2x)$$ and collect $$x^2$$ terms:\n+ $$1 \\times 9x^2 = 9x^2$$\n+ $$2x \\times 6x = 12x^2$$\n- Step 3: Total coefficient of $$x^2$$ is $$9 + 12 = 21$$.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "When evaluating a binomial coefficient like $$\\binom{12}{7} \\left(\\frac{3}{8}\\right)^5 \\cdot 4^7$$, what simplification strategy saves the most computation? (3 steps)", "answer": "- Step 1: Use symmetry: $$\\binom{12}{7} = \\binom{12}{5}$$, which is easier to compute.\n- Step 2: Simplify fractions BEFORE multiplying large numbers. Here, $$4^7 / (3/8)^5$$ can be partially simplified by noting $$4^7 = (8/2)^7 = 8^7 / 2^7$$, so $$4^7 \\cdot (3/8)^5$$ simplifies.\n- Step 3: In this specific case, $$\\frac{16384}{32768} = \\frac{1}{2}$$, turning a massive multiplication into a simple halving.\n\nAlways look for fraction simplification before brute-force multiplication.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": true}, {"question": "What is the formula for the $$n$$th term of an arithmetic sequence, and where is it found? (2 steps)", "answer": "- Step 1: The formula is $$u_n = a + (n-1)d$$, where $$a$$ is the first term and $$d$$ is the common difference.\n- Step 2: This is NOT in the formula booklet—you must memorize it.\n\nThis formula is essential for setting up simultaneous equations when given terms.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": false}, {"question": "What are the two formulas for the sum of an arithmetic series, and when do you use each? (2 steps)", "answer": "- Step 1: $$S_n = \\frac{n}{2}[2a + (n-1)d]$$ — use when you know $$a$$, $$d$$, and $$n$$ (IN the booklet).\n- Step 2: $$S_n = \\frac{n}{2}(a + \\ell)$$ — use when you know the first term $$a$$ and the last term $$\\ell = u_n$$ (also IN the booklet).", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "When finding the smallest integer $$n$$ such that $$S_n > X$$, what is the rounding rule? (2 steps)", "answer": "- Step 1: Set up the inequality $$S_n > X$$ and solve the corresponding quadratic equation to find the boundary value (which will be non-integer).\n- Step 2: Since the inequality is strict ($$>$$, not $$\\geq$$), you must round UP to the next integer. For example, if $$n > 34.19$$, the smallest integer is $$n = 35$$.\n\nPitfall: Rounding down gives $$n = 34$$, which does NOT satisfy the strict inequality.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": false}, {"question": "What is the formula for the $$n$$th term of a geometric sequence, and where is it found? (2 steps)", "answer": "- Step 1: The formula is $$u_n = ar^{n-1}$$, where $$a$$ is the first term and $$r$$ is the common ratio.\n- Step 2: This is NOT in the formula booklet—you must memorize it.\n\nThis is the single most frequently forgotten formula in the revision notes.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": false}, {"question": "What are the geometric sum formulas, and what is the condition for the sum to infinity? (3 steps)", "answer": "- Step 1: $$S_n = \\frac{a(1-r^n)}{1-r} = \\frac{a(r^n - 1)}{r-1}$$ (IN the booklet). Use the version with positive denominator.\n- Step 2: $$S_\\infty = \\frac{a}{1-r}$$ (IN the booklet). This only converges when $$|r| < 1$$.\n- Step 3: To find the first term for a sum to infinity question, identify $$a$$ and $$r$$ from the given sum notation. For $$\\sum_{r=1}^{\\infty} 6(0.25)^r$$, the first term is $$6 \\times 0.25 = 1.5$$.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": false}, {"question": "How do you find the common ratio $$r$$ when given two non-consecutive terms of a geometric sequence? (2 steps)", "answer": "- Step 1: Set up the ratio property: $$\\frac{u_2}{u_1} = \\frac{u_3}{u_2}$$. For terms like $$u_4 = ab^4$$ and $$u_7 = ab^7$$, divide: $$\\frac{u_7}{u_4} = b^3$$.\n- Step 2: Solve for $$b$$ by taking the cube root (or appropriate root), then back-substitute to find $$a$$.\n\nDividing eliminates the first term $$a$$ and gives you the common ratio directly.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": false}, {"question": "In modelling questions, what is the off-by-one trap with years, and how do you avoid it? (3 steps)", "answer": "- Step 1: Explicitly define the correspondence at the START of your working. For example: \"Year 1 corresponds to $$t = 0$$\" or \"Year 1 corresponds to $$n = 1$$\".\n- Step 2: If year 1 is $$t = 0$$, then year $$k$$ is $$t = k-1$$ (the $$k$$-th term). Year 12 has 11 increments from year 1.\n- Step 3: Always verify: does your answer make sense? Year 4 should be only 3 years after year 1.\n\nPhuc made this error on Paper 4 Q7, initially using $$t = 12$$ instead of $$t = 11$$.", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": false}, {"question": "When a geometric series sum must \"exceed\" a target value, what is the step-by-step method? (3 steps)", "answer": "- Step 1: Set up the inequality $$S_n > \\text{target}$$. Check unit consistency (e.g., if terms are in thousands and target is \"3 million\", the target is 3000 thousand).\n- Step 2: Isolate the $$r^n$$ term and take logs of both sides: $$n > \\frac{\\log(\\text{value})}{\\log(r)}$$.\n- Step 3: Round UP to the next integer, since $$n$$ must be a whole number of months/years and must strictly exceed the boundary.", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": false}, {"question": "What keywords distinguish a linear (arithmetic) model from an exponential (geometric) model? (2 steps)", "answer": "- Step 1: \"Increases by the same amount\" or \"same amount each year\" → Linear/Arithmetic model: $$y = mx + c$$ or $$u_n = a + (n-1)d$$.\n- Step 2: \"Increases by the same percentage\" or \"same percentage each year\" → Exponential/Geometric model: $$y = ab^t$$ or $$u_n = ar^{n-1}$$.\n\nThis distinction is critical—choosing the wrong model type gives entirely wrong answers.", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": false}, {"question": "What is the key property used to show three terms form a geometric sequence? (2 steps)", "answer": "- Step 1: For a geometric sequence, the ratio between consecutive terms is constant: $$\\frac{u_2}{u_1} = \\frac{u_3}{u_2}$$.\n- Step 2: Cross-multiply to eliminate denominators: $$u_2^2 = u_1 \\cdot u_3$$. Use this to derive the required equation when terms contain an unknown $$k$$.", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": false}, {"question": "When factoring a quadratic $$ax^2 + bx + c$$ with $$a \\neq 1$$, what is the reliable method? (3 steps)", "answer": "- Step 1: Find two numbers that multiply to $$ac$$ and add to $$b$$. For $$2x^2 + x - 15$$: $$ac = -30$$, need factors summing to 1, which are +6 and -5.\n- Step 2: Split the middle term: $$2x^2 + 6x - 5x - 15$$.\n- Step 3: Factor by grouping: $$2x(x + 3) - 5(x + 3) = (2x - 5)(x + 3)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": false}, {"question": "What is the product rule for differentiation, and when must you use it? (2 steps)", "answer": "- Step 1: The product rule is $$\\frac{d}{dx}(uv) = u'v + uv'$$, where $$u' = \\frac{du}{dx}$$ and $$v' = \\frac{dv}{dx}$$.\n- Step 2: Use it whenever the function is a product of two functions of $$x$$, such as $$\\sqrt{t}(20 + 6t - t^2)$$ or $$x^2 e^x$$. Do NOT just differentiate each part separately and multiply.", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": false}, {"question": "When differentiating $$\\sqrt{x}$$ or terms with $$x$$ in the denominator, what preliminary step is essential? (2 steps)", "answer": "- Step 1: Rewrite all roots and fractions as powers of $$x$$ before differentiating. For example, $$\\sqrt{x} = x^{1/2}$$, $$\\frac{1}{x} = x^{-1}$$, $$\\frac{1}{\\sqrt{x}} = x^{-1/2}$$.\n- Step 2: Apply the power rule: $$\\frac{d}{dx}(x^n) = nx^{n-1}$$. For $$x^{1/2}$$, this gives $$\\frac{1}{2}x^{-1/2}$$.\n\nPitfall: Trying to differentiate $$\\sqrt{x}$$ directly without rewriting leads to errors.", "source": "GLM 5.1 ①", "_id": "glm_1_46", "judge_pick": false}, {"question": "After differentiating a product and setting the derivative to zero, how do you clear negative fractional powers to simplify? (2 steps)", "answer": "- Step 1: Identify the most negative power of $$x$$ in the equation (e.g., $$x^{-1/2}$$). Multiply every term by the corresponding positive power (e.g., $$x^{1/2}$$) to eliminate it.\n- Step 2: Also multiply by any numerical denominators (like 20 or 40) to clear fractions. Track the effect on each term carefully—multiply through consistently.\n\nThis algebraic cleanup is where most errors occur. Write out each multiplication step explicitly.", "source": "GLM 5.1 ①", "_id": "glm_1_47", "judge_pick": false}, {"question": "What is the second derivative test for classifying stationary points, and what are the possible outcomes? (3 steps)", "answer": "- Step 1: Compute $$\\frac{d^2y}{dx^2}$$ and substitute the stationary point value.\n- Step 2: Interpret the sign:\n+ $$\\frac{d^2y}{dx^2} < 0$$ → local MAXIMUM\n+ $$\\frac{d^2y}{dx^2} > 0$$ → local MINIMUM\n+ $$\\frac{d^2y}{dx^2} = 0$$ → inconclusive (need another method)\n- Step 3: State the conclusion explicitly: \"Since $$\\frac{d^2H}{dt^2}\\big|_{t=\\alpha} < 0$$, $$H$$ is a maximum at $$t = \\alpha$$.\"\n\nFor \"show that\" proof questions, calculator evaluation of the second derivative is acceptable.", "source": "GLM 5.1 ①", "_id": "glm_1_48", "judge_pick": false}, {"question": "What is the key insight when two regions on opposite sides of the $$x$$-axis have equal area? (2 steps)", "answer": "- Step 1: Recognize that the signed integral over the combined region equals zero, because the positive area above the $$x$$-axis cancels the negative area below it.\n- Step 2: Set $$\\int_0^k y \\, dx = 0$$ and solve for $$k$$. This saves computing two separate integrals.\n\nThe signed integral is NOT the same as the true area. True area = $$\\left|\\int y \\, dx\\right|$$.", "source": "GLM 5.1 ①", "_id": "glm_1_49", "judge_pick": false}, {"question": "How do you find the area of a region bounded by a curve and a line? (3 steps)", "answer": "- Step 1: Find the intersection points of the curve and the line (these are your integration limits).\n- Step 2: Compute the area under each (the curve and the line) between the intersection points. For a straight line, you can often use the trapezium area formula geometrically.\n- Step 3: Subtract: Area of region = (area under upper boundary) - (area under lower boundary).", "source": "GLM 5.1 ①", "_id": "glm_1_50", "judge_pick": false}, {"question": "When integrating a fraction like $$\\frac{(x-k)^2}{\\sqrt{x}}$$, what is the essential first step? (3 steps)", "answer": "- Step 1: Expand the numerator: $$(x-k)^2 = x^2 - 2kx + k^2$$.\n- Step 2: Divide EACH TERM by $$\\sqrt{x} = x^{1/2}$$ separately: $$x^{3/2} - 2kx^{1/2} + k^2 x^{-1/2}$$.\n- Step 3: Integrate term-by-term using the power rule: $$\\frac{2}{5}x^{5/2} - \\frac{4k}{3}x^{3/2} + 2k^2 x^{1/2}$$.\n\nNever try to integrate the fraction as-is. Always split into separate power terms first.", "source": "GLM 5.1 ①", "_id": "glm_1_51", "judge_pick": false}, {"question": "When evaluating integrals at $$x = 16$$, what shortcut simplifies the computation of fractional powers? (2 steps)", "answer": "- Step 1: Recognize that $$16 = 4^2$$, so $$16^{1/2} = 4$$. Then use this to find higher powers: $$16^{3/2} = 4^3 = 64$$ and $$16^{5/2} = 4^5 = 1024$$.\n- Step 2: This avoids computing $$16^{2.5}$$ directly on a calculator, which is error-prone and doesn't give exact fractions.", "source": "GLM 5.1 ①", "_id": "glm_1_52", "judge_pick": false}, {"question": "In a \"show that the integral equals $$ak^2 + bk + c$$\" question, what is the correct approach, and what is the trap? (3 steps)", "answer": "- Step 1: Compute the definite integral fully in terms of $$k$$, evaluating at both limits and subtracting.\n- Step 2: Collect like terms in $$k^2$$, $$k$$, and constants. Match coefficients to identify $$a$$, $$b$$, and the constant.\n- Step 3: The TRAP: Do NOT set the integral equal to zero. \"Show that $$\\int = ak^2 + bk + c$$\" means evaluate and match, not solve.\n\nPhuc correctly challenged his tutor on this—the area cannot be zero; the integral just equals the given expression.", "source": "GLM 5.1 ①", "_id": "glm_1_53", "judge_pick": true}, {"question": "When a point on a curve is given (e.g., $$A(1,9)$$ lies on $$C$$), how do you use it to find an unknown constant? (2 steps)", "answer": "- Step 1: Substitute the coordinates of the point directly into the equation of the curve.\n- Step 2: Solve for the unknown. For $$y = \\frac{(x-k)^2}{\\sqrt{x}}$$ with point $$(1,9)$$: $$9 = (1-k)^2$$, giving $$k = -2$$ or $$k = 4$$. Use the given constraint (e.g., $$k > 0$$) to select the valid answer.\n\nDo NOT use the integral expression—use the curve equation directly.", "source": "GLM 5.1 ①", "_id": "glm_1_54", "judge_pick": false}, {"question": "When asked to estimate a related integral using a trapezium rule result you've already computed, what is the strategy? (2 steps)", "answer": "- Step 1: Decompose the new integrand into (the function you already estimated) ± (a simple function you can integrate exactly, usually a polynomial or constant).\n- Step 2: Add/subtract the exact integral of the simple part to your trapezium rule estimate.\n\nFor example, if you estimated $$\\int(2^x - 2x)\\,dx$$ and need $$\\int(2^x + 2x)\\,dx$$, note that $$2^x + 2x = (2^x - 2x) + 4x$$, so add $$\\int 4x\\,dx$$ to your estimate.", "source": "GLM 5.1 ①", "_id": "glm_1_55", "judge_pick": false}, {"question": "How do you use symmetry under $$u = -x$$ to evaluate $$\\int_{-b}^{a} f(-x)\\,dx$$? (2 steps)", "answer": "- Step 1: Substitute $$u = -x$$, so $$dx = -du$$ and the limits swap: $$\\int_{-b}^{a} f(-x)\\,dx = \\int_{b}^{-a} f(u)(-du) = \\int_{-a}^{b} f(u)\\,du$$.\n- Step 2: If $$f(u)$$ is the same function you already have a trapezium rule estimate for (with limits $$-a$$ to $$b$$), use that estimate directly.", "source": "GLM 5.1 ①", "_id": "glm_1_56", "judge_pick": false}, {"question": "When shifting an integral by a constant, what is the exact correction? (2 steps)", "answer": "- Step 1: $$\\int_a^b (f(x) + c)\\,dx = \\int_a^b f(x)\\,dx + c(b-a)$$.\n- Step 2: The correction is the constant times the interval length. For example, $$\\int_{-4}^{8.5} (3^{-x/3} + 4)\\,dx = \\int_{-4}^{8.5} 3^{-x/3}\\,dx + 4(8.5 - (-4)) = \\text{estimate} + 50$$.", "source": "GLM 5.1 ①", "_id": "glm_1_57", "judge_pick": false}, {"question": "What is a periodic sequence, and how do you find its order (period)? (3 steps)", "answer": "- Step 1: Write out the first several terms using the recurrence relation.\n- Step 2: Identify when the sequence returns to its starting value: $$u_{n+k} = u_n$$ for all $$n$$. The smallest such $$k$$ is the order (period).\n- Step 3: Verify the cycle repeats. For example, $$3, \\frac{2}{3}, -4, 3, \\ldots$$ has period 3 (order 3).\n\nAlways compute enough terms to confirm the cycle—don't stop early.", "source": "GLM 5.1 ①", "_id": "glm_1_58", "judge_pick": false}, {"question": "How do you compute the sum of a periodic sequence over many terms? (3 steps)", "answer": "- Step 1: Compute the sum of one complete cycle.\n- Step 2: Divide the total number of terms by the period to get (full cycles, remaining terms). For example, 100 terms with period 3: $$100 = 33 \\times 3 + 1$$.\n- Step 3: Total sum = (full cycles) × (cycle sum) + (sum of remaining terms from the start of the cycle).\n\nPitfall: The remaining terms are the FIRST terms of the cycle, not the last. For 100 terms with period 3, the remaining term is $$u_1$$ (since $$100 \\equiv 1 \\bmod 3$$).", "source": "GLM 5.1 ①", "_id": "glm_1_59", "judge_pick": false}, {"question": "When working with a recurrence relation involving unknowns, what is the correct sequence of operations? (3 steps)", "answer": "- Step 1: Build $$u_2$$ and $$u_3$$ algebraically in terms of the unknowns (e.g., $$u_2 = b - 3a$$, $$u_3 = b - ab + 3a^2$$). Do NOT substitute given relations yet.\n- Step 2: Apply the given condition (e.g., $$\\sum_{n=1}^{3} u_n = 153$$) to create an equation.\n- Step 3: NOW substitute the given relation (e.g., $$b = a + 9$$) into the combined equation. Substituting too early creates unnecessary complexity.", "source": "GLM 5.1 ①", "_id": "glm_1_60", "judge_pick": false}, {"question": "What is the most common sign error in recurrence relations, and how do you avoid it? (2 steps)", "answer": "- Step 1: When distributing $$-a$$ over a bracket like $$(b - 3a)$$, write each step: $$-a(b - 3a) = -ab + 3a^2$$. The most common error is writing $$-ab - 3a^2$$ (forgetting that $$-a \\times (-3a) = +3a^2$$).\n- Step 2: Double-check signs at every distribution step. Don't rush through the algebra.", "source": "GLM 5.1 ①", "_id": "glm_1_61", "judge_pick": false}, {"question": "When a question asks for the \"larger possible value\" of a term, what does this imply about the underlying structure? (2 steps)", "answer": "- Step 1: Recognize that \"larger (or smaller) possible value\" means there's a quadratic equation giving TWO candidate values.\n- Step 2: Compute the term for BOTH values of the unknown, then pick the larger (or smaller) as requested. For example, if $$a = 11$$ gives $$u_2 = -13$$ and $$a = -6$$ gives $$u_2 = 21$$, the larger value is 21.", "source": "GLM 5.1 ①", "_id": "glm_1_62", "judge_pick": false}, {"question": "What is the method for disproving a \"for all\" statement using a counter example? (3 steps)", "answer": "- Step 1: Identify the universal claim (e.g., \"$$n^2 + 3n + 1$$ is prime for all $$n \\in \\mathbb{N}$$\").\n- Step 2: Test values systematically until you find ONE case where the statement fails. For primality, check if the value has a factor other than 1 and itself.\n- Step 3: Present the counter example clearly: \"$$n = 6$$ gives 55 = 5 × 11, which is not prime.\"\n\nDon't give up after 2-3 tries. Counter examples sometimes require testing further values (e.g., $$7^2 + 11^2 = 170$$).", "source": "GLM 5.1 ①", "_id": "glm_1_63", "judge_pick": false}, {"question": "What is the method for proof by deduction (inequality proof)? (3 steps)", "answer": "- Step 1: Start from the given condition and expand/simplify algebraically.\n- Step 2: Factor out expressions and use known positivity to divide safely. For example, from $$3xy(y-x) > 0$$ with $$x, y > 0$$, divide by the positive quantity $$3xy$$ to get $$y - x > 0$$.\n- Step 3: Reach the required conclusion. The key principle: dividing by a positive quantity preserves the inequality direction.", "source": "GLM 5.1 ①", "_id": "glm_1_64", "judge_pick": false}, {"question": "How do you construct a counter example for a statement that was proven true only for positive values? (2 steps)", "answer": "- Step 1: Identify what condition made the proof work (e.g., \"$$3xy > 0$$\" required both $$x$$ and $$y$$ positive).\n- Step 2: Choose values that violate this condition. If the proof relied on dividing by $$3xy$$ and assuming it's positive, try one negative value so that $$3xy < 0$$, which would flip the inequality and potentially give $$y < x$$ instead of $$y > x$$.", "source": "GLM 5.1 ①", "_id": "glm_1_65", "judge_pick": false}, {"question": "What is the exponential law $$2^{x+1}$$ simplified, and what is the common trap? (2 steps)", "answer": "- Step 1: $$2^{x+1} = 2 \\cdot 2^x$$. This is a basic index law: add exponents when multiplying same base.\n- Step 2: The common trap is writing $$2^{x+1} = (2^x)^2 = 2^{2x}$$. This is WRONG. The power rule $$(a^m)^n = a^{mn}$$ doesn't apply to addition in the exponent.", "source": "GLM 5.1 ①", "_id": "glm_1_66", "judge_pick": false}, {"question": "What is the key property of $$\\log_a a$$ and $$\\log_a 1$$, and why? (2 steps)", "answer": "- Step 1: $$\\log_a a = 1$$ because $$a^1 = a$$. The logarithm asks \"what power of $$a$$ gives $$a$$?\" The answer is 1.\n- Step 2: $$\\log_a 1 = 0$$ because $$a^0 = 1$$. The logarithm asks \"what power of $$a$$ gives 1?\" The answer is 0.\n\nThese are used constantly when converting standalone constants to logarithms.", "source": "GLM 5.1 ①", "_id": "glm_1_67", "judge_pick": false}, {"question": "When sketching $$y = a^{-x} + 4$$ with $$a > 1$$, what are the key features? (3 steps)", "answer": "- Step 1: The graph of $$y = a^{-x}$$ is the reflection of $$y = a^x$$ in the $$y$$-axis. Since $$a > 1$$, $$a^x$$ is increasing, so $$a^{-x}$$ is DECREASING.\n- Step 2: The $$+4$$ shifts the entire graph up by 4 units. The $$y$$-intercept is at $$(0, a^0 + 4) = (0, 5)$$.\n- Step 3: The horizontal asymptote is $$y = 4$$ (as $$x \\to +\\infty$$, $$a^{-x} \\to 0$$, so $$y \\to 4$$). As $$x \\to -\\infty$$, $$y \\to \\infty$$.", "source": "GLM 5.1 ①", "_id": "glm_1_68", "judge_pick": false}, {"question": "When asked to \"show only one real root\" for a cubic equation, what is the required two-step method? (3 steps)", "answer": "- Step 1: Divide the cubic by the known linear factor using polynomial long division to obtain the quadratic factor.\n- Step 2: Compute the discriminant $$\\Delta = b^2 - 4ac$$ of the quadratic factor.\n- Step 3: Show $$\\Delta < 0$$, which means the quadratic has no real roots. Therefore the only real root comes from the linear factor.\n\nPhuc's instinct was to try calculator factoring—you must show the working via division and discriminant.", "source": "GLM 5.1 ①", "_id": "glm_1_69", "judge_pick": false}, {"question": "In polynomial long division, what is the most common sign error, and how do you avoid it? (2 steps)", "answer": "- Step 1: When subtracting a negative term, the result is POSITIVE. For example, subtracting $$(-6x^2)$$ gives $$+6x^2$$. Write: $$-(-6x^2) = +6x^2$$.\n- Step 2: Explicitly write the subtraction step with brackets: $$-(-6x^2 + \\ldots)$$, then distribute the negative sign carefully.", "source": "GLM 5.1 ①", "_id": "glm_1_70", "judge_pick": false}, {"question": "When a \"show that\" question gives you a root like $$x = -1$$, what is the next algebraic step? (2 steps)", "answer": "- Step 1: Since $$x = -1$$ is a root, $$(x + 1)$$ is a factor. Perform polynomial long division (or inspection) to divide it out.\n- Step 2: The quotient is a quadratic. Apply the quadratic formula to find the remaining two roots, checking for simplification.", "source": "GLM 5.1 ①", "_id": "glm_1_71", "judge_pick": false}, {"question": "What is the discriminant, and how does its sign determine the number of real roots? (3 steps)", "answer": "- Step 1: For $$ax^2 + bx + c = 0$$, the discriminant is $$\\Delta = b^2 - 4ac$$.\n- Step 2: Interpret the sign:\n+ $$\\Delta > 0$$: two distinct real roots\n+ $$\\Delta = 0$$: one repeated real root\n+ $$\\Delta < 0$$: no real roots\n- Step 3: Always explicitly state \"since $$\\Delta < 0$$, there are no real roots\" for full marks.", "source": "GLM 5.1 ①", "_id": "glm_1_72", "judge_pick": false}, {"question": "What should you do if you arrive at a correct step in a proof but feel uncertain—should you cross it out? (2 steps)", "answer": "- Step 1: NO. Do NOT cross out working unless you are certain it is wrong. Phuc has crossed out correct answers multiple times (e.g., Q5a proof, Q8i trig).\n- Step 2: If unsure, keep working forward. The crossed-out work might have been the correct path, and erasing it loses both the correct approach and potential method marks.", "source": "GLM 5.1 ①", "_id": "glm_1_73", "judge_pick": false}, {"question": "When a question asks for the \"smallest positive\" solution of a transformed trig equation like $$2\\tan(2x+40°) + 3\\sin(2x+40°) = 0$$, what is the strategy? (3 steps)", "answer": "- Step 1: Solve the base equation first (e.g., find all $$\\theta$$ values where $$\\theta = 2x + 40°$$).\n- Step 2: Arrange the $$\\theta$$ solutions in ascending order.\n- Step 3: Substitute the SMALLEST $$\\theta$$ value first to find $$x$$. If it gives $$x > 0$$, that's your answer. If not, try the next smallest.\n\nPhuc's error: used $$\\theta = 180°$$ first (getting $$x = 70°$$) instead of the smallest $$\\theta = 48.2°$$ (giving $$x = 4.1°$$).", "source": "GLM 5.1 ①", "_id": "glm_1_74", "judge_pick": true}, {"question": "A simple exercise: A geometric sequence has $$u_3 = 12$$ and $$u_5 = 48$$. Find the common ratio $$r$$. (2 steps)", "answer": "- Step 1: Use the ratio property: $$\\frac{u_5}{u_3} = r^2$$, so $$r^2 = \\frac{48}{12} = 4$$.\n- Step 2: Therefore $$r = 2$$ or $$r = -2$$. (Use context to determine sign if needed.)", "source": "GLM 5.1 ①", "_id": "glm_1_75", "judge_pick": false}, {"question": "A simple exercise: An arithmetic sequence has $$u_6 = 2$$ and $$S_{10} = -80$$. Set up the simultaneous equations. (2 steps)", "answer": "- Step 1: From $$u_6 = 2$$: $$a + 5d = 2$$.\n- Step 2: From $$S_{10} = -80$$: $$\\frac{10}{2}[2a + 9d] = -80$$, which simplifies to $$2a + 9d = -16$$.\n\nSolve these simultaneously to find $$a$$ and $$d$$.", "source": "GLM 5.1 ①", "_id": "glm_1_76", "judge_pick": false}, {"question": "A simple exercise: Solve $$\\log_3(2x) + \\log_3(x+4) = \\log_3(16)$$. (3 steps)", "answer": "- Step 1: Combine left side: $$\\log_3[2x(x+4)] = \\log_3(16)$$.\n- Step 2: Equate arguments: $$2x^2 + 8x = 16 \\Rightarrow x^2 + 4x - 8 = 0 \\Rightarrow x = \\frac{-4 \\pm \\sqrt{48}}{2}$$.\n- Step 3: Domain check: $$2x > 0$$ and $$x + 4 > 0$$, so $$x > 0$$. Only the positive root is valid.", "source": "GLM 5.1 ①", "_id": "glm_1_77", "judge_pick": false}, {"question": "A simple exercise: Prove by exhaustion that the sum of two consecutive integers is always odd. (3 steps)", "answer": "- Step 1: Let the smaller integer be $$n$$. The consecutive pair is $$(n, n+1)$$.\n- Step 2: Case 1: $$n = 2k$$ (even). Sum $$= 2k + 2k + 1 = 4k + 1$$ (odd). Case 2: $$n = 2k+1$$ (odd). Sum $$= 2k+1 + 2k+2 = 4k+3$$ (odd).\n- Step 3: Conclusion: In both cases, the sum is odd. Hence the sum of two consecutive integers is always odd.", "source": "GLM 5.1 ①", "_id": "glm_1_78", "judge_pick": false}, {"question": "When solving a \"show that\" log equation where a coefficient is in front of the log, what must you do FIRST? (3 steps)", "answer": "- Step 1: Bring the coefficient into the power using $$k\\log_a(x) = \\log_a(x^k)$$. For example, $$2\\log_4(x+3) = \\log_4(x+3)^2$$.\n- Step 2: Convert any standalone constants to logs: $$\\frac{1}{2} = \\log_4(4^{1/2}) = \\log_4 2$$.\n- Step 3: NOW combine all terms using product/quotient rules and equate arguments. You cannot drop the logs or equate arguments until every term is a single log with coefficient 1.", "source": "GLM 5.1 ①", "_id": "glm_1_79", "judge_pick": true}, {"question": "What is the conclusion sentence requirement for proof questions, and what happens without it? (2 steps)", "answer": "- Step 1: Every proof by exhaustion or counter example MUST end with an explicit conclusion sentence that references the original statement. For example: \"Hence $$n^2 + 2$$ is not divisible by 4 for any integer $$n$$.\"\n- Step 2: Without this sentence, you lose the final mark. It is compulsory, not optional.", "source": "GLM 5.1 ①", "_id": "glm_1_80", "judge_pick": false}, {"question": "What is the formula booklet strategy recommended for the exam? (2 steps)", "answer": "- Step 1: The trapezium rule, binomial expansion, and series sum formulas ARE in the booklet. Practice finding them quickly under timed conditions.\n- Step 2: Formulas NOT in the booklet that you MUST memorize include: $$u_n = a + (n-1)d$$, $$u_n = ar^{n-1}$$, circle equation, log laws, and trig identities.\n\nPhuc's dominant failure mode is \"formula amnesia\" on formulas he could simply look up.", "source": "GLM 5.1 ①", "_id": "glm_1_81", "judge_pick": false}, {"question": "What is the key distinction between $$\\int_a^b f(x)\\,dx$$ and $$\\int_b^a f(x)\\,dx$$? (2 steps)", "answer": "- Step 1: Swapping the limits of integration changes the sign: $$\\int_b^a f(x)\\,dx = -\\int_a^b f(x)\\,dx$$.\n- Step 2: This matters when using substitution and the limits reverse—always apply the negative sign.", "source": "GLM 5.1 ①", "_id": "glm_1_82", "judge_pick": false}, {"question": "When a question gives $$\\sum_{r=1}^{\\infty} 6(0.25)^r$$, how do you identify $$a$$ and $$r$$ for the sum to infinity formula? (2 steps)", "answer": "- Step 1: The sum starts at $$r=1$$, so the first term corresponds to $$r=1$$: $$a = 6(0.25)^1 = 1.5$$.\n- Step 2: The common ratio is the base of the exponential: $$r = 0.25$$. Then $$S_\\infty = \\frac{a}{1-r} = \\frac{1.5}{0.75} = 2$$.\n\nPitfall: Don't use $$a = 6$$; the first term is evaluated at $$r = 1$$, not $$r = 0$$.", "source": "GLM 5.1 ①", "_id": "glm_1_83", "judge_pick": false}, {"question": "What is the quotient law for logarithms? (2 steps)", "answer": "- Step 1: $$\\log_a\\left(\\frac{x}{y}\\right) = \\log_a x - \\log_a y$$. The log of a quotient equals the difference of the logs.\n- Step 2: This also gives $$\\log_a\\left(\\frac{1}{x}\\right) = \\log_a 1 - \\log_a x = 0 - \\log_a x = -\\log_a x$$.", "source": "GLM 5.1 ①", "_id": "glm_1_84", "judge_pick": false}], "count": 85}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "When a polynomial $$f(x)$$ is divided by $$x-c$$, what single substitution tells you the remainder, and why does this work instead of doing long division? (2 steps)", "answer": "- Step 1: The Remainder Theorem states that the remainder of $$f(x) \\div (x-c)$$ is simply $$f(c)$$. This works because if $$f(x) = (x-c) \\cdot Q(x) + R$$, then substituting $$x = c$$ makes the first term vanish: $$f(c) = 0 \\cdot Q(c) + R = R$$.\n- Step 2: This is a one-liner shortcut. Long division with unknown coefficients creates 3+ simultaneous equations — Remainder Theorem gives the answer directly from one substitution. Always check this shortcut first before attempting division.\n\nThe key insight: the factor $$x-c$$ is engineered to zero out at $$x=c$$, isolating the remainder instantly.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "What is the Factor Theorem, and how does it differ from the Remainder Theorem? (2 steps)", "answer": "- Step 1: The Factor Theorem says: $$x-c$$ is a factor of $$f(x)$$ if and only if $$f(c) = 0$$. It's a special case of the Remainder Theorem where the remainder happens to be zero.\n- Step 2: The critical distinction: Remainder Theorem gives you any remainder $$R = f(c)$$; Factor Theorem specifically tests whether that remainder is zero. If $$f(c) \\neq 0$$, then $$x-c$$ is NOT a factor — it only leaves a remainder.\n\nThink of it as: Factor Theorem = Remainder Theorem + the condition $$R = 0$$.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": true}, {"question": "When the factor is written as $$2x-1$$ (not simply $$x-c$$), how do you apply the Factor Theorem? What value do you substitute? (2 steps)", "answer": "- Step 1: Rewrite $$2x - 1 = 0$$ to find the root: $$x = \\frac{1}{2}$$. The Factor Theorem then says: $$2x-1$$ is a factor of $$f(x)$$ iff $$f\\left(\\frac{1}{2}\\right) = 0$$.\n- Step 2: General rule: for factor $$ax + b$$, set $$ax + b = 0 \\Rightarrow x = -\\frac{b}{a}$$, then test $$f\\left(-\\frac{b}{a}\\right) = 0$$. The sign matters: $$2x-1$$ gives $$x = \\frac{1}{2}$$ (positive), while $$2x+1$$ gives $$x = -\\frac{1}{2}$$ (negative).\n\nCommon pitfall: substituting $$x = 1$$ for factor $$2x - 1$$ — you must solve for the root first.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "A question asks you to \"show that $$f(x)=0$$ has only one real root\" given that one linear factor is already known. What two-step method is required? (2 steps)", "answer": "- Step 1: Divide $$f(x)$$ by the known linear factor (using polynomial long division) to obtain the quadratic factor. For example, if $$2x-3$$ is a factor of $$f(x) = 4x^3 - 8x^2 + 5x - 3$$, dividing gives $$f(x) = (2x-3)(2x^2 - x + 1)$$.\n- Step 2: Compute the discriminant of the quadratic factor: $$\\Delta = b^2 - 4ac$$. If $$\\Delta < 0$$, the quadratic has no real roots, so the only real root comes from the linear factor. Conclude: \"Since $$\\Delta < 0$$, the quadratic has no real roots, so $$f(x)=0$$ has exactly one real solution.\"\n\nYou cannot just say \"only one root\" without proving the quadratic factor has no real solutions — the discriminant step is mandatory.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "Given $$f(x) = ax^3 + 3x^2 - 8x + 2$$ and the remainder when $$f(x)$$ is divided by $$x-2$$ is 3, how would you find $$a$$? What's the one-line approach? (2 steps)", "answer": "- Step 1: By the Remainder Theorem, $$f(2) = 3$$. Substitute $$x = 2$$: $$a(8) + 3(4) - 8(2) + 2 = 8a + 12 - 16 + 2 = 8a - 2 = 3$$.\n- Step 2: Solve: $$8a = 5 \\Rightarrow a = \\frac{5}{8}$$. This is a single equation from one substitution — no long division needed, no coefficient matching with 3 unknowns.\n\nThe trap: attempting $$f(x) = (x-2)(dx^2 + bx + c) + 3$$ and matching coefficients creates three simultaneous equations. Remainder Theorem bypasses all of that.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": true}, {"question": "You have an inequality like $$\\left(\\frac{7}{8}\\right)^n < \\frac{0.5}{160}$$ with the unknown in the exponent. What is the step-by-step method to solve this, and what is the critical trap? (4 steps)", "answer": "- Step 1: Take $$\\ln$$ of both sides to bring the exponent down: $$n \\ln\\left(\\frac{7}{8}\\right) < \\ln\\left(\\frac{0.5}{160}\\right)$$.\n- Step 2: Recognize the sign: since $$\\frac{7}{8} < 1$$, $$\\ln\\left(\\frac{7}{8}\\right) < 0$$ (it's negative). The RHS $$\\ln\\left(\\frac{0.5}{160}\\right)$$ is also negative since $$\\frac{0.5}{160} < 1$$.\n- Step 3: **CRITICAL TRAP**: Dividing both sides by a negative number flips the inequality: $$n > \\frac{\\ln(0.5/160)}{\\ln(7/8)}$$ (not $$n <$$). Forgetting this flip gives $$n < 43.21$$ (wrong direction) instead of $$n > 43.21$$.\n- Step 4: For \"smallest integer $$n$$\" satisfying $$n > 43.21$$: round up to $$n = 44$$. If the inequality were $$n < 43.21$$, the largest integer would be 43 — the direction completely changes the answer.\n\nThe general rule: $$\\log(v) < 0$$ iff $$0 < v < 1$$; $$\\log(v) > 0$$ iff $$v > 1$$. Always check the sign before dividing.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": true}, {"question": "Why does dividing by $$\\ln\\left(\\frac{7}{8}\\right)$$ flip the inequality direction? What would happen if you forgot to flip? (2 steps)", "answer": "- Step 1: $$\\ln\\left(\\frac{7}{8}\\right)$$ is negative because $$\\frac{7}{8} < 1$$ and the natural log of any value between 0 and 1 is negative. Dividing an inequality by a negative reverses the direction — this is a fundamental algebra rule, not specific to logs.\n- Step 2: If you forget to flip, you get $$n < 43.21$$ and answer \"largest integer is 43\" instead of the correct \"smallest integer is 44.\" The arithmetic looks perfectly right — the sign flip is a **silent error** that produces a wrong answer with no obvious calculation mistake.\n\nThink of it this way: if $$-2x < 6$$, dividing by $$-2$$ gives $$x > -3$$, not $$x < -3$$. The same principle applies with $$\\ln$$ values.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": true}, {"question": "What is the general \"log-both-sides\" rule for solving equations with unknowns in the exponent? (2 steps)", "answer": "- Step 1: If $$a^x = b$$, take logs of both sides: $$x \\ln a = \\ln b$$, then solve: $$x = \\frac{\\ln b}{\\ln a} = \\frac{\\log b}{\\log a}$$ (any log base works; the ratio is the same).\n- Step 2: This works because $$\\ln(a^x) = x \\ln a$$ — the power law brings the exponent down as a multiplier. For inequalities, the same method applies but you must check whether $$\\ln a$$ is positive or negative before dividing.\n\nThe rule applies to any base: $$\\log_{10}$$, $$\\ln$$, $$\\log_2$$ — all give the same ratio $$x = \\frac{\\log b}{\\log a}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "What is the trapezium rule formula, and which ordinates get doubled? (3 steps)", "answer": "- Step 1: The formula is $$\\int_a^b y \\, dx \\approx \\frac{h}{2}\\left[y_0 + y_n + 2(y_1 + y_2 + \\cdots + y_{n-1})\\right]$$, where $$h = \\frac{b-a}{n}$$ is the strip width and $$n$$ is the number of strips.\n- Step 2: Only the **interior** ordinates $$y_1, y_2, \\ldots, y_{n-1}$$ are doubled. The endpoint ordinates $$y_0$$ and $$y_n$$ are added once each. This is because each interior ordinate serves as the boundary between two adjacent strips, so it contributes to both.\n- Step 3: Critical distinction: $$n$$ = number of **strips** (gaps between ordinates), NOT number of ordinates. 6 ordinates means 5 strips. Count the gaps, not the dots. Verify by checking that adjacent $$x$$-values differ by the same $$h$$.\n\nThis formula IS in the booklet — practice finding it quickly under timed conditions.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "When asked \"how can the trapezium rule estimate be made more accurate,\" what is the correct exam phrasing, and what phrasing loses the mark? (2 steps)", "answer": "- Step 1: CORRECT phrasing: \"Increase the number of strips\" or \"Use more strips\" or \"Use smaller strips.\" These all correctly describe subdividing the integration interval more finely.\n- Step 2: WRONG phrasing: \"Reduce the interval\" — the integration interval $$[a, b]$$ stays the same; you're not changing where you integrate, you're just cutting it into more pieces. Another wrong phrasing: \"reduce the rectangles\" — trapezia aren't rectangles.\n\nThe interval is fixed by the problem. What changes is the resolution within that interval — more strips means each trapezium better approximates the curve segment it covers.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "You've used the trapezium rule to estimate $$\\int_2^{3.5} (2^x - 2x) \\, dx \\approx 2.34$$, and now need to estimate $$\\int_2^{3.5} (2^x + 2x) \\, dx$$. What decomposition trick do you use? (2 steps)", "answer": "- Step 1: Split the new integrand into (what you already estimated) + (something you can integrate exactly): $$2^x + 2x = (2^x - 2x) + 4x$$. So $$\\int_2^{3.5} (2^x + 2x) \\, dx = \\int_2^{3.5} (2^x - 2x) \\, dx + \\int_2^{3.5} 4x \\, dx$$.\n- Step 2: The first integral is your trapezium estimate (2.34). The second is an exact polynomial integral: $$\\int_2^{3.5} 4x \\, dx = [2x^2]_2^{3.5} = 2(12.25) - 2(4) = 24.5 - 8 = 16.5$$. Total: $$2.34 + 16.5 = 18.84$$.\n\nAlways decompose: new integral = (already-estimated part) ± (exactly-integrable polynomial part).", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": true}, {"question": "How do you handle $$\\int_2^{3.5} (2^{x+1} - 4x) \\, dx$$ given that you've already estimated $$\\int_2^{3.5} (2^x - 2x) \\, dx \\approx 2.34$$? What is the key algebraic insight? (2 steps)", "answer": "- Step 1: Rewrite $$2^{x+1} = 2 \\cdot 2^x$$ (NOT $$2^{x^2}$$ or $$\\left(2^x\\right)^2$$). Then $$2^{x+1} - 4x = 2(2^x) - 4x = 2(2^x - 2x)$$.\n- Step 2: Factor out the 2: $$\\int_2^{3.5} 2(2^x - 2x) \\, dx = 2 \\times \\int_2^{3.5} (2^x - 2x) \\, dx = 2 \\times 2.34 = 4.68$$. No new trapezium calculation needed — just scale the existing estimate.\n\nThe trap: confusing $$2^{x+1}$$ with $$\\left(2^x\\right)^2 = 2^{2x}$$. The rule $$a^{x+1} = a \\cdot a^x$$ is a basic exponential law, not a squaring operation.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": true}, {"question": "What is proof by exhaustion, and for a claim about divisibility by $$k$$, how many residue cases must you test? (2 steps)", "answer": "- Step 1: Proof by exhaustion tests every possible case in a finite partition. You systematically check all possibilities and show the statement holds (or fails) in each one.\n- Step 2: For divisibility by $$k$$, any integer $$n$$ has one of $$k$$ forms: $$n = km, km+1, km+2, \\ldots, km+(k-1)$$ for residues $$0, 1, 2, \\ldots, k-1$$ modulo $$k$$. You must test ALL $$k$$ cases — not just even/odd (which only covers residues 0 and 1 modulo 2).\n\nFor divisibility by 4: test $$n = 4k, 4k+1, 4k+2, 4k+3$$ (four cases). Even/odd alone misses the distinction between $$4k$$ and $$4k+2$$, both even but with different residues mod 4.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "Prove by exhaustion that $$n^2 + 2$$ is not divisible by 4 for any integer $$n$$. Walk through the case structure. (3 steps)", "answer": "- Step 1: Partition all integers into four residue classes mod 4: $$n = 4k, 4k+1, 4k+2, 4k+3$$.\n- Step 2: Compute $$n^2 + 2$$ for each:\n  + $$n = 4k$$: $$16k^2 + 2$$, remainder 2 when divided by 4\n  + $$n = 4k+1$$: $$16k^2 + 8k + 3$$, remainder 3\n  + $$n = 4k+2$$: $$16k^2 + 16k + 6$$, remainder 2\n  + $$n = 4k+3$$: $$16k^2 + 24k + 11$$, remainder 3\n- Step 3: In all four cases, the remainder is 2 or 3, never 0. **Mandatory conclusion sentence**: \"In all four cases the remainder when $$n^2 + 2$$ is divided by 4 is either 2 or 3, never 0. Hence $$n^2 + 2$$ is not divisible by 4 for any integer $$n$$.\"\n\nSkipping any case (e.g., only testing even/odd) is incomplete — the exam requires all residues.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "Prove by exhaustion that $$n^2 - 2$$ is not a multiple of 4 for all natural numbers $$n$$. What is the standard partition, and what do you factor out in each case? (3 steps)", "answer": "- Step 1: For \"not a multiple of 4,\" the standard partition is even/odd (two cases): $$n = 2k$$ and $$n = 2k+1$$.\n- Step 2: Case 1 (even): $$n^2 - 2 = 4k^2 - 2 = 2(2k^2 - 1)$$. Since $$2k^2 - 1$$ is odd, this is 2 × (odd), divisible by 2 but not by 4. ✓\n  Case 2 (odd): $$n^2 - 2 = 4k^2 + 4k + 1 - 2 = 4k(k+1) - 1$$. This is exactly 1 less than a multiple of 4, so not a multiple of 4. ✓\n- Step 3: Conclusion: \"In both cases, $$n^2 - 2$$ is not divisible by 4. Hence $$n^2 - 2$$ is not a multiple of 4 for any natural number $$n$$.\"\n\nThe technique: factor out the largest power of 2 possible, then show the remaining factor is odd or the expression is $$\\pm 1$$ away from a multiple of 4.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "Why is testing only even/odd insufficient for proving things about divisibility by 4, but sufficient for divisibility by 2? (2 steps)", "answer": "- Step 1: Even/odd partitions integers into residues 0 and 1 modulo 2. This covers all possibilities for divisibility by 2 — either $$n$$ is a multiple of 2 (even) or it isn't (odd).\n- Step 2: For divisibility by 4, even numbers split further: $$n = 4k$$ (remainder 0 mod 4) and $$n = 4k+2$$ (remainder 2 mod 4) are both even but behave differently. An even number like $$n=2$$ gives $$n^2+2=6$$ (remainder 2), while $$n=4$$ gives $$n^2+2=18$$ (remainder 2) — but the internal structure differs. You need all four residues mod 4 to be exhaustive.\n\nRule: for divisibility by $$k$$, use $$k$$ residue classes. For divisibility by 2, two classes suffice. For divisibility by 4, you need four.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": true}, {"question": "What mandatory component must every proof by exhaustion include at the end, and why? (1 step)", "answer": "- Step 1: A **conclusion sentence** that explicitly states what was proven. For example: \"In all cases, [result holds], hence [statement] is true for all [domain].\" Without this, you lose the final proof mark — the examiner needs to see that you've synthesized the individual cases into a complete argument, not just listed computations.\n\nThe conclusion transforms a list of calculations into a proof. It's the \"therefore\" that connects exhaustive testing to the universal claim.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": true}, {"question": "What are the three key log laws that are NOT in the formula booklet and must be memorized? (3 steps)", "answer": "- Step 1: Product rule: $$\\log_a(xy) = \\log_a x + \\log_a y$$ — the log of a product equals the sum of the logs.\n- Step 2: Quotient rule: $$\\log_a\\left(\\frac{x}{y}\\right) = \\log_a x - \\log_a y$$ — the log of a quotient equals the difference of the logs.\n- Step 3: Power rule: $$\\log_a(x^n) = n \\log_a x$$ — the coefficient comes from the power. Also memorize: $$\\log_a a = 1$$ and $$\\log_a 1 = 0$$.\n\nThe most critical one for exam problems is the power rule — it's how you bring coefficients inside the log.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "How do you turn a standalone constant (like 3 or 4) into a logarithm so you can combine it with other log terms? (2 steps)", "answer": "- Step 1: Use the identity $$k = \\log_a(a^k)$$, which follows from $$\\log_a(a^k) = k \\log_a a = k \\cdot 1 = k$$. For example: $$3 = \\log_2(2^3) = \\log_2 8$$, or $$4 = \\log_3(3^4) = \\log_3 81$$.\n- Step 2: Once the constant is in log form, you can use the product/quotient rules to combine all terms. In $$\\log_2(2x) + 3 = \\log_2(5x+4)$$, convert: $$3 = \\log_2 8$$, so LHS becomes $$\\log_2(2x) + \\log_2 8 = \\log_2(16x)$$, and you can equate arguments.\n\nThis is essential: all terms must be in log form before you can drop the logs and equate arguments.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "What is the critical distinction between $$2\\log x$$ and $$\\log^2 x$$? Why do they produce completely different results? (2 steps)", "answer": "- Step 1: $$2\\log x = 2 \\cdot \\log x = \\log(x^2)$$ — the multiplier 2 goes into the power using the power rule. This is a coefficient being absorbed into the argument.\n- Step 2: $$\\log^2 x = (\\log x)^2 = (\\log x)(\\log x)$$ — the logarithm itself is squared. This is a completely different operation. There is no simplification rule for $$\\log^2 x$$; it stays as the square of the log value.\n\nThese are NOT interchangeable. Writing $$\\log^2 x$$ when you mean $$2\\log x$$ (or vice versa) fundamentally changes the equation and produces wrong answers.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "Why is $$\\log A + \\log B = \\log(AB)$$, NOT $$\\log(A+B)$$? What common mistake does this prevent? (2 steps)", "answer": "- Step 1: The product rule says $$\\log_a(xy) = \\log_a x + \\log_a y$$. Reversing this: $$\\log_a x + \\log_a y = \\log_a(xy)$$ — the arguments multiply, not add.\n- Step 2: The common mistake is writing $$\\log(16x) + \\log(x+1) = \\log(16x + x + 1)$$ instead of the correct $$\\log(16x \\cdot (x+1)) = \\log(16x(x+1))$$. When you remove logs by equating arguments, the LHS becomes $$16x(x+1)$$ (a product), not $$16x + (x+1)$$ (a sum).\n\nThis is one of the most frequent errors: turning a product into a sum when combining logs. The operation inside the log mirrors the operation between the logs: addition outside → multiplication inside.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": true}, {"question": "When solving a log equation, after you find algebraic solutions, what critical step must you perform before finalizing your answer? (2 steps)", "answer": "- Step 1: **Domain check**: every argument of every logarithm in the original equation must be strictly positive ($$> 0$$). For $$\\log_2(2-x)$$, need $$2-x > 0 \\Rightarrow x < 2$$; for $$\\log_2(x+10)$$, need $$x+10 > 0 \\Rightarrow x > -10$$.\n- Step 2: Check each solution against ALL domain constraints. In $$2\\log_2(2-x) = 4 + \\log_2(x+10)$$, solving gives $$x = 26$$ or $$x = -6$$. $$x = 26$$ fails $$x < 2$$ → reject. $$x = -6$$ satisfies $$-10 < -6 < 2$$ → accept. Answer: $$x = -6$$ only.\n\nSkipping this step means accepting invalid solutions where a log argument is zero or negative — undefined in real mathematics.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": true}, {"question": "When you have $$2\\log_4(x+3) + \\log_4 x$$ on one side of an equation, what must you do BEFORE equating arguments with the other side? (2 steps)", "answer": "- Step 1: Apply the power rule FIRST: $$2\\log_4(x+3) = \\log_4(x+3)^2$$. The coefficient must become a power before you can use the product rule to combine terms.\n- Step 2: Now combine: $$\\log_4(x+3)^2 + \\log_4 x = \\log_4[(x+3)^2 \\cdot x] = \\log_4[x(x^2+6x+9)]$$. Only after ALL coefficients are inside the powers and ALL terms are combined into a single log can you equate arguments.\n\nThe \"2 in front\" trap: if you try to equate arguments while the coefficient 2 is still outside the log, you get the wrong equation. The rule $$\\log_a A = B \\Rightarrow A = a^B$$ only applies when the coefficient is 1.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": true}, {"question": "Solve $$\\log_2(16x) + \\log_2(x+1) = 3 + \\log_2(x+6)$$ step-by-step, identifying the key pitfall. (5 steps)", "answer": "- Step 1: Combine LHS using product rule: $$\\log_2(16x) + \\log_2(x+1) = \\log_2[16x(x+1)]$$ — it's a PRODUCT, not a sum of arguments.\n- Step 2: Convert the constant 3: $$3 = \\log_2(2^3) = \\log_2 8$$. Combine RHS: $$\\log_2 8 + \\log_2(x+6) = \\log_2[8(x+6)]$$.\n- Step 3: Equate arguments (both sides are single logs with base 2): $$16x(x+1) = 8(x+6)$$.\n- Step 4: Expand and solve: $$16x^2 + 16x = 8x + 48 \\Rightarrow 16x^2 + 8x - 48 = 0 \\Rightarrow 2x^2 + x - 6 = 0 \\Rightarrow (2x-3)(x+2) = 0 \\Rightarrow x = \\frac{3}{2}$$ or $$x = -2$$.\n- Step 5: Domain check: all log arguments must be $$>0$$. $$x = \\frac{3}{2}$$: $$16(3/2)=24>0$$ ✓, $$5/2>0$$ ✓, $$15/2>0$$ ✓. $$x = -2$$: $$16(-2)=-32<0$$ ✗ → reject. Answer: $$x = \\frac{3}{2}$$.\n\nThe pitfall was writing $$16x + (x+1) = 3(x+6)$$ instead of $$16x(x+1) = 8(x+6)$$ — product, not sum.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": true}, {"question": "What is the standard form of a circle equation, and how do you extract the centre and radius? (2 steps)", "answer": "- Step 1: Standard form: $$(x-a)^2 + (y-b)^2 = r^2$$, where centre is $$a,b$$ and radius is $$r$$ (not $$r^2$$). This is NOT in the formula booklet — memorize it.\n- Step 2: Alternative form: $$x^2 + y^2 + 2gx + 2fy + c = 0$$ gives centre $$(-g, -f)$$ and radius $$\\sqrt{g^2 + f^2 - c}$$ (require $$g^2 + f^2 - c > 0$$ for a real circle). The signs flip: $$+2gx$$ means the $$x$$-coordinate of the centre is $$-g$$.\n\nThe sign-flip pitfall: completing the square on $$x^2 - 20x$$ gives $$x^2 - 20x + 100 - 100 = (x-10)^2 - 100$$, so the centre's $$x$$-coordinate is 10 (positive), not -10. The sign inside the bracket is opposite to what you might expect.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "Given $$x^2 + y^2 - 20x - 16y + 139 = 0$$, walk through completing the square to find the centre and radius. Where is the sign-flip trap? (3 steps)", "answer": "- Step 1: Group and complete the square for each variable: $$x^2 - 20x = (x-10)^2 - 100$$ and $$y^2 - 16y = (y-8)^2 - 64$$.\n- Step 2: Substitute back: $$x^2 - 20x + y^2 - 16y + 139 = 0$$ becomes $$- 100 - 64 + 139 + 0$$, so $$(x-10)^2 + (y-8)^2 - 100 - 64 + 139 = 0$$, giving $$(x-10)^2 + (y-8)^2 = 25$$.\n- Step 3: Centre is $$10, 8$$ and radius is $$\\sqrt{25} = 5$$. The trap: $$x^2 - 20x$$ completes to $$x-10$$^2 (centre $$x$$-coordinate is +10), not $$x+10$$^2. The sign inside the completed square is opposite to the coefficient sign: $$-20x$$ → $$(x-10)^2$$.\n\nMemorize: when completing $$x^2 + 2gx$$, you get $$x^2 + 2gx + g^2 - g^2 = (x+g)^2 - g^2$$, and the centre's $$x$$-coordinate is $$-g$$.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": true}, {"question": "What are the five conditions relating the distance $$d$$ between two circle centres to their radii $$r_1$$ and $$r_2$$, and what does each mean geometrically? (3 steps)", "answer": "- Step 1: Compute $$d$$ = distance between centres, then compare with $$r_1 + r_2$$ (sum) and $$|r_1 - r_2|$$ (difference).\n- Step 2: The five conditions:\n  + $$d > r_1 + r_2$$: circles don't touch (too far apart)\n  + $$d = r_1 + r_2$$: touch externally (one point, outside)\n  + $$|r_1 - r_2| < d < r_1 + r_2$$: intersect at 2 points\n  + $$d = |r_1 - r_2|$$: touch internally (one point, inside)\n  + $$d < |r_1 - r_2|$$: one circle inside the other, no touching\n- Step 3: To prove \"no intersection,\" show $$d > r_1 + r_2$$ (too far apart) or $$d < |r_1 - r_2|$$ (one inside the other). Compute $$d$$ exactly using the distance formula, then compare numerically.\n\nThink of it as: sum of radii is the \"maximum reach\" for touching externally; difference is the \"gap\" for touching internally. Between those values, they overlap.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": true}, {"question": "Two circles have centres $$C_1(-4,5)$$ with $$r_1 = \\sqrt{70}$$ and $$C_2(5,-8)$$ with $$r_2 = \\sqrt{52}$. How do you prove they neither touch nor intersect? (2 steps)", "answer": "- Step 1: Distance between centres: $$d = \\sqrt{(5-(-4))^2 + (-8-5)^2} = \\sqrt{9^2 + (-13)^2} = \\sqrt{81+169} = \\sqrt{250} \\approx 15.81$$.\n- Step 2: Sum of radii: $$r_1 + r_2 = \\sqrt{70} + \\sqrt{52} \\approx 8.37 + 7.21 = 15.58$$. Since $$d = 15.81 > 15.58 = r_1 + r_2$$, the circles are too far apart to even touch externally. They neither touch nor intersect.\n\nThe comparison is between $$d$$ and $$r_1 + r_2$$: if $$d$$ exceeds the sum, there's a gap between the circles.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "A circle has centre $$A(3,5)$$ and passes through $$B(8,-7)$$. A chord $$MN$$ on the circle is parallel to the $$x$$-axis, above the $$x$$-axis, with length $$4\\sqrt{22}$$. How do you find the equation of line $$MN$$? (3 steps)", "answer": "- Step 1: A chord parallel to the $$x$$-axis is a horizontal line: $$y = k$$ (constant). You only need to find $$k$$, not the endpoints.\n- Step 2: Substitute $$y = k$$ into the circle equation $$(x-3)^2 + (y-5)^2 = 169$$: $$(x-3)^2 = 169 - (k-5)^2$$. The chord length is $$2\\sqrt{169-(k-5)^2}$$ (distance between the two $$x$$-solutions).\n- Step 3: Set $$2\\sqrt{169-(k-5)^2} = 4\\sqrt{22}$$, so $$\\sqrt{169-(k-5)^2} = 2\\sqrt{22}$$, squaring: $$169-(k-5)^2 = 88$$, giving $$k-5 = \\pm 9$$, so $$k = 14$$ or $$k = -4$$. \"Above $$x$$-axis\" means $$k > 0$$, so $$k = 14$$. Equation: $$y = 14$$.\n\nOnce a chord is parallel to an axis, the answer is a single horizontal/vertical line — find the constant value.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "When an equation has both $$\\sin \\theta$$ and $$\\cos \\theta$$ (like $$\\sin 3\\theta = \\sqrt{3}\\cos 3\\theta$$), what transformation reduces it to a single trig function? (2 steps)", "answer": "- Step 1: Divide both sides by $$\\cos \\theta$$ (assuming $$\\cos \\theta \\neq 0$$, which you check separately): $$\\frac{\\sin \\theta}{\\cos \\theta} = \\tan \\theta$$. So $$\\sin 3\\theta = \\sqrt{3}\\cos 3\\theta$$ becomes $$\\tan 3\\theta = \\sqrt{3}$$.\n- Step 2: Check the case $$\\cos \\theta = 0$$ separately: if $$\\cos 3\\theta = 0$$, then $$\\sin 3\\theta = \\pm 1$$, and the original equation $$\\sin 3\\theta = \\sqrt{3}\\cos 3\\theta$$ becomes $$\\pm 1 = 0$$, which is false. So no solutions are lost by dividing.\n\nThe general principle: two trig functions → divide by one to get the other. Most commonly, divide by $$\\cos$$ to get $$\\tan$$.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "When solving a trig equation in $$n\\theta$$ (e.g., $$\\tan 3\\theta = \\sqrt{3}$$ with $$0 \\leq \\theta < \\pi$$), what must you do to the domain before finding solutions? (2 steps)", "answer": "- Step 1: Multiply the original domain by $$n$$: $$0 \\leq \\theta < \\pi$$ becomes $$0 \\leq 3\\theta < 3\\pi$$. This widens the search range because each value of $$\\theta$$ corresponds to a value of $$3\\theta$$ that's three times as large.\n- Step 2: Find ALL solutions of the trig equation within the widened domain. For $$\\tan 3\\theta = \\sqrt{3}$$: principal value $$3\\theta = \\pi/3$$, then add the period $$\\pi$$ repeatedly: $$3\\theta = \\pi/3, 4\\pi/3, 7\\pi/3$$ (all in $$[0, 3\\pi)$$). Divide each by 3: $$\\theta = \\pi/9, 4\\pi/9, 7\\pi/9$$.\n\nWithout domain scaling, you'd only find one solution instead of three. The multiplication by $$n$$ accounts for the \"faster oscillation\" of $$n\\theta$$.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": true}, {"question": "What are the periods of $$\\sin$$, $$\\cos$$, and $$\\tan$$, and how does this affect finding multiple solutions? (2 steps)", "answer": "- Step 1: $$\\sin \\theta$$ and $$\\cos \\theta$$ have period $$2\\pi$$ ($$360°$$) — they repeat every full rotation. $$\\tan \\theta$$ has period $$\\pi$$ ($$180°$$) — it repeats every half rotation because $$\\tan(\\theta + \\pi) = \\tan \\theta$$.\n- Step 2: For $$\\tan$$: add $$\\pi$$ (or $$180°$$) to get subsequent solutions — one family of solutions. For $$\\sin$$/$$\\cos$$: add $$2\\pi$$ (or $$360°$$) to get subsequent solutions within each family, but there are TWO families (symmetry pairs).\n\nThis means $$\\tan$$ gives one solution per period, while $$\\sin$$/$$\\cos$$ give two per period (the principal value and its symmetric partner).", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": true}, {"question": "What are the general solutions for $$\\sin \\theta = k$$, $$\\cos \\theta = k$$, and $$\\tan \\theta = k$$, where $$\\alpha$$ is the principal value? (3 steps)", "answer": "- Step 1: $$\\sin \\theta = k$$: two families — $$\\theta = \\alpha + 2n\\pi$$ OR $$\\theta = (\\pi - \\alpha) + 2n\\pi$$, where $$n \\in \\mathbb{Z}$$.\n- Step 2: $$\\cos \\theta = k$$: two families expressed compactly — $$\\theta = \\pm \\alpha + 2n\\pi$$, where $$n \\in \\mathbb{Z}$$. The $$\\pm$$ captures both the positive and negative angle solutions.\n- Step 3: $$\\tan \\theta = k$$: one family only — $$\\theta = \\alpha + n\\pi$$, where $$n \\in \\mathbb{Z}$$. No symmetry pair needed because $$\\tan$$ has period $$\\pi$$, not $$2\\pi$$.\n\nThese MUST be memorized. They are essential for any trig equation on an extended interval.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "If $$\\cos \\alpha = k$$ where $$\\alpha$$ is the principal value, what is the other solution in $$[0°, 360°]$$, and why? (2 steps)", "answer": "- Step 1: Cosine is symmetric about $$0°$$ and about $$360°$$: $$\\cos(-\\alpha) = \\cos(\\alpha)$$ and $$\\cos(360° - \\alpha) = \\cos(\\alpha)$$. So if $$\\alpha$$ is a solution, $$360° - \\alpha$$ is also a solution.\n- Step 2: Example: $$\\cos \\theta = -\\frac{2}{3}$$, principal value $$\\theta = \\cos^{-1}(-2/3) \\approx 131.8°$$ (2nd quadrant). The other solution is $$360° - 131.8° = 228.2°$$ (3rd quadrant). Solutions come in pairs summing to $$360°$$.\n\nThis symmetry is specific to cosine. For sine, the pair sums to $$180°$$: $$\\sin \\alpha = k$$ and $$\\sin(180° - \\alpha) = k$$.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": true}, {"question": "How do you tell whether to use radians or degrees in a trig equation? What visual cue should you look for? (2 steps)", "answer": "- Step 1: Look for the **$$°$$ symbol** inside the equation. If the equation contains $$\\sin(6k + 18)°$$, the argument is in degrees — solve in degrees. If no $$°$$ symbol appears (e.g., $$\\sin 3\\theta$$ with domain $$0 \\leq \\theta < \\pi$$), use radians.\n- Step 2: Mixing modes is fatal. If the equation uses degrees, your calculator must be in degree mode; if radians, in radian mode. The domain format also signals the mode: $$0 < \\theta < \\pi$$ means radians; $$0 < \\theta < 360°$$ means degrees.\n\nThe greenhouse model question had $$\\sin(6k+18)°$$ — the $$°$$ symbol inside the sine argument was the cue to work in degrees throughout.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": true}, {"question": "When a trig equation involves $$\\sin$$ and $$\\tan$$ together (like $$2\\tan \\theta + 3\\sin \\theta = 0$$), what factoring strategy reduces it to solvable cases? (2 steps)", "answer": "- Step 1: Replace $$\\tan \\theta = \\frac{\\sin \\theta}{\\cos \\theta}$$: $$2\\frac{\\sin \\theta}{\\cos \\theta} + 3\\sin \\theta = \\sin \\theta\\left(\\frac{2}{\\cos \\theta} + 3\\right) = 0$$.\n- Step 2: Two cases from factoring: Case 1: $$\\sin \\theta = 0$$ → solutions at $$180°, 360°$$ etc. Case 2: $$\\frac{2}{\\cos \\theta} + 3 = 0$$ → $$\\cos \\theta = -\\frac{2}{3}$$ → use inverse cosine and symmetry. Both cases must be solved; neither can be ignored.\n\nThe key insight: when both $$\\sin$$ and $$\\tan$$ appear, factor out $$\\sin \\theta$$ after converting $$\\tan$$ to $$\\sin/\\cos$$. This always splits into \"$$\\sin \\theta = 0$$\" and \"a cosine equation.\"", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "When solving $$5\\sin x \\tan x + 13 = \\cos x$$, what substitution reduces it to a quadratic in a single trig function? (3 steps)", "answer": "- Step 1: Multiply through by $$\\cos x$$ to eliminate $$\\tan x = \\sin x/\\cos x$$: $$5\\sin^2 x + 13\\cos x = \\cos^2 x$$.\n- Step 2: Use $$\\sin^2 x = 1 - \\cos^2 x$$: $$5(1-\\cos^2 x) + 13\\cos x = \\cos^2 x \\Rightarrow 5 - 5\\cos^2 x + 13\\cos x = \\cos^2 x \\Rightarrow 6\\cos^2 x - 13\\cos x - 5 = 0$$.\n- Step 3: Solve the quadratic: $$\\cos x = \\frac{13 \\pm 17}{12}$$, giving $$\\cos x = \\frac{5}{2}$$ (reject, $$|\\cos| \\leq 1$$) or $$\\cos x = -\\frac{1}{3}$$ (valid). Then $$x = \\cos^{-1}(-1/3) \\approx 1.91$$ radians (Q2, between $$\\pi/2$$ and $$\\pi$$).\n\nThe general method: quadratic in mixed trig → substitute $$\\sin^2 = 1-\\cos^2$$ (or vice versa) → single-variable quadratic → solve → reject invalid values.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": true}, {"question": "What is the binomial expansion formula, and what happens to the powers when the first term is not 1? (2 steps)", "answer": "- Step 1: The formula is $$(a+b)^n = \\sum_{r=0}^{n} \\binom{n}{r} a^{n-r} b^r$$, where $$\\binom{n}{r} = \\frac{n!}{r!(n-r)!}$$. This IS in the formula booklet.\n- Step 2: When $$a \\neq 1$$ (e.g., $$a = 3$$ in $$3+px)^5$$), the power of $$a$$ decreases with each term: $$3^5, 3^4, 3^3, 3^2, \\ldots$$ while the power of $$b = px$$ increases: $$1, p, p^2, p^3, \\ldots$$ The general term is $$\\binom{5}{r} \\cdot 3^{5-r} \\cdot (px)^r$$.\n\nThe pitfall: forgetting that when $$a \\neq 1$$, every term has a power of $$a$$ that must be computed. The coefficient is $$\\binom{n}{r} \\cdot a^{n-r} \\cdot b^r$$, not just $$\\binom{n}{r} \\cdot b^r$$.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": false}, {"question": "When expanding $$\\left(1-\\frac{x}{6}\\right)^9$$, how do you handle the sign of each term? (2 steps)", "answer": "- Step 1: Since $$b = -\\frac{x}{6}$$ (negative), odd-power terms are negative: $$\\binom{9}{1}(1)^8\\left(-\\frac{x}{6}\\right)^1 = -\\frac{3}{2}x$$ (negative), while even-power terms are positive: $$\\binom{9}{2}(1)^7\\left(-\\frac{x}{6}\\right)^2 = x^2$$ (positive).\n- Step 2: General rule: when $$b$$ is negative, $$(-1)^r$$ alternates the sign. The $$r$$th term is $$\\binom{9}{r} \\cdot \\frac{(-1)^r}{6^r} \\cdot x^r$$. For $$r=3$$: $$\\binom{9}{3} \\cdot \\frac{-1}{216} = -\\frac{84}{216} = -\\frac{7}{18}$$.\n\nThe expansion becomes: $$1 - \\frac{3}{2}x + x^2 - \\frac{7}{18}x^3 + \\ldots$$ — alternating signs because $$b < 0$$.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": true}, {"question": "To find the coefficient of $$x^3$$ in $$10x+3)\\left(1-\\frac{x}{6}\\right)^9$$, what two contributions must you include? (2 steps)", "answer": "- Step 1: The product $$A+Bx) \\cdot P(x)$$ produces $$x^k$$ from two sources: $$A \\cdot [x^k\\text{ term of }P(x)]$$ and $$Bx \\cdot [x^{k-1}\\text{ term of }P(x)]$$. For $$k=3$$: contribution from $$3 \\cdot [x^3\\text{ term}]$$ and $$10x \\cdot [x^2\\text{ term}]$$.\n- Step 2: Compute: $$3 \\times \\left(-\\frac{7}{18}\\right) + 10 \\times 1 = -\\frac{7}{6} + 10 = \\frac{60-7}{6} = \\frac{53}{6}$$.\n\nMissing either contribution is a common error. Always check: which terms of the expansion, when multiplied by which terms of the prefactor, produce the target power?", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": false}, {"question": "When expanding $$3+px)^5$$, the coefficients are $$A=243$$, $$B=405p$$, $$C=270p^2$$, $$D=90p^3$$. Given $$B = 18D$$ and $$p < 0$$, find $$p$$ and $$C$$. (3 steps)", "answer": "- Step 1: Set up the equation: $$405p = 18(90p^3) = 1620p^3$$. Divide by $$p$$ (assuming $$p \\neq 0$$): $$405 = 1620p^2 \\Rightarrow p^2 = \\frac{405}{1620} = \\frac{1}{4}$$.\n- Step 2: $$p = \\pm\\frac{1}{2}$$, but since $$p < 0$$: $$p = -\\frac{1}{2}$$.\n- Step 3: $$C = 270p^2 = 270 \\cdot \\frac{1}{4} = \\frac{135}{2} = 67.5$$.\n\nWhen you get $$p = \\pm k$$, always use the sign condition given in the question. The condition $$p < 0$$ selects the negative root.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": false}, {"question": "What simplification strategy should you use before multiplying large numbers in a binomial coefficient calculation? (2 steps)", "answer": "- Step 1: Cancel fractions BEFORE multiplying. For example, in finding the coefficient of $$x^7$$ in $$\\left(\\frac{3}{8}+4x\\right)^{12}$$: the term includes $$\\left(\\frac{3}{8}\\right)^5 \\cdot 4^7 = \\frac{243}{32768} \\cdot 16384$$.\n- Step 2: Simplify: $$\\frac{16384}{32768} = \\frac{1}{2}$$, so the product becomes $$792 \\times 243 \\times \\frac{1}{2}$$ — much easier than multiplying $$792 \\times 243 \\times 16384$$ then dividing by 32768. Also use $$\\binom{12}{7} = \\binom{12}{5}$$ for easier computation.\n\nSimplify early: cancel common factors, use symmetry of binomial coefficients, and use your calculator's fraction feature to avoid decimal slips.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": false}, {"question": "What is the arithmetic $$n$$th term formula, and is it in the formula booklet? (2 steps)", "answer": "- Step 1: The formula is $$u_n = a + (n-1)d$$, where $$a$$ is the first term and $$d$$ is the common difference. This gives the value of the $$n$$th term directly.\n- Step 2: This formula is **NOT in the formula booklet** — you must memorize it. The sum formula $$S_n = \\frac{n}{2}[2a+(n-1)d]$$ IS in the booklet, but the nth term formula is not.\n\nThis was a recurring failure point: not knowing whether formulas are in the booklet. Memorize what's NOT there.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": false}, {"question": "Given that the 6th term of an arithmetic series is 2 and $$S_{10} = -80$$, how do you set up simultaneous equations to find $$a$$ and $$d$$? (2 steps)", "answer": "- Step 1: From $$u_6 = 2$$: $$a + 5d = 2$$. (Using $$u_n = a+(n-1)d$$ with $$n=6$$: $$a+5d$$, not $$a+6d$$ — the $$(n-1)$$ is the pitfall.)\n- Step 2: From $$S_{10} = -80$$: $$\\frac{10}{2}[2a+9d] = -80 \\Rightarrow 5[2a+9d] = -80 \\Rightarrow 2a+9d = -16$$. Now solve simultaneously: multiply (1) by 2 to get $$2a+10d=4$$, subtract (2): $$d=20$$, then $$a = 2-5(20) = -98$$.\n\nThe off-by-one: $$u_6 = a + 5d$$ uses $$(n-1)=5$$, not $$n=6$$. Always write out \"$$u_n = a + (n-1)d$$\" explicitly before substituting.", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": false}, {"question": "When asked for \"the smallest $$n$$ such that $$S_n > 8000$$\" and the quadratic gives $$n \\approx 34.19$$, what is the answer and why? (2 steps)", "answer": "- Step 1: The inequality is strict: $$S_n > 8000$$, so $$n = 34$$ gives $$S_{34} < 8000$$ (not enough) and $$n = 35$$ gives $$S_{35} > 8000$$ (exceeds the threshold).\n- Step 2: Round UP from 34.19 to get $$n = 35$$. For strict inequalities with \"smallest $$n$$ exceeding,\" always round up. For \"largest $$n$$ below,\" round down.\n\nThe direction matters: \"smallest $$n$$ with $$S_n > X$$\" → round up any decimal boundary. \"Largest $$n$$ with $$S_n < X$$\" → round down.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": true}, {"question": "What is the geometric $$n$$th term formula, and is it in the formula booklet? (2 steps)", "answer": "- Step 1: The formula is $$u_n = ar^{n-1}$$, where $$a$$ is the first term and $$r$$ is the common ratio. This gives the $$n$$th term directly.\n- Step 2: This formula is **NOT in the formula booklet** — you must memorize it. The sum formulas $$S_n = \\frac{a(1-r^n)}{1-r}$$ and $$S_\\infty = \\frac{a}{1-r}$$ ARE in the booklet.\n\nThis is another formula-amnesia item. Write \"$$u_n = ar^{n-1}$$\" on your mental cheat sheet alongside $$u_n = a+(n-1)d$$.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": false}, {"question": "When given $$u_4 = 3690$$ and $$u_7 = 3470$$ for a geometric sequence, how do you find the common ratio $$b$$ and first term $$a$$? (3 steps)", "answer": "- Step 1: Write both terms using $$u_n = ab^{n-1}$$: $$u_4 = ab^3 = 3690$$ and $$u_7 = ab^6 = 3470$$.\n- Step 2: Divide to eliminate $$a$$: $$\\frac{u_7}{u_4} = \\frac{ab^6}{ab^3} = b^3 = \\frac{3470}{3690} \\approx 0.9404$$, so $$b \\approx 0.98$$.\n- Step 3: Back-substitute: $$a = \\frac{3690}{b^3} \\approx \\frac{3690}{0.94} \\approx 4000$$ (2 s.f.).\n\nDivide first to get $$r$$, then back-substitute for $$a$$. Never try to solve two exponential equations simultaneously without dividing.", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": false}, {"question": "In a geometric series problem where the first term is \"year 1\" corresponding to $$t=0$$, what is the off-by-one trap, and how do you avoid it? (2 steps)", "answer": "- Step 1: If year 1 corresponds to $$t=0$$ (the first term), then year $$k$$ corresponds to $$t = k-1$$, which is the $$k$$th term $$u_k = ar^{k-1}$$. Year 12 is $$", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": false}], "count": 48}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "When dividing a polynomial $f(x)$ by $(x-c)$, what is the Remainder Theorem shortcut, and why does it work? (2 steps)", "answer": "- Step 1: The Remainder Theorem states that the remainder of $f(x) \\div (x-c)$ is simply $$f(c)$$. Instead of performing long division, you just substitute $$x = c$$ into the polynomial.\n- Step 2: Why it works: By the division algorithm, $$f(x) = (x-c)Q(x) + R$$, where $$Q(x)$$ is the quotient and $$R$$ is the remainder. If you substitute $$x = c$$, the term $$(x-c)Q(x)$$ becomes $$0$$, leaving $$f(c) = 0 + R = R$$.\n\nAlways check for this shortcut before attempting painful long division, especially when there are unknown coefficients.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": true}, {"question": "When solving an inequality like $$\\left(\\frac{7}{8}\\right)^{n} < \\frac{0.5}{160}$$ for the smallest integer $$n$$, what is the critical trap regarding the inequality sign after taking the natural log of both sides? (3 steps)", "answer": "- Step 1: Take $$\\ln$$ of both sides to bring the exponent down: $$n \\ln\\left(\\frac{7}{8}\\right) < \\ln\\left(\\frac{0.5}{160}\\right)$$.\n- Step 2: Recognize the sign of the logarithm. Since $$\\frac{7}{8} < 1$$, its natural log is negative: $$\\ln\\left(\\frac{7}{8}\\right) < 0$$.\n- Step 3: Dividing both sides of an inequality by a negative number **flips the inequality sign**. Therefore, $$n > \\frac{\\ln(0.5/160)}{\\ln(7/8)}$$. Forgetting to flip the sign is a silent, fatal error that gives the wrong bound (e.g., \"largest integer 43\" instead of \"smallest integer 44\").\n\nRule of thumb: $$\\log(v) < 0$$ iff $$0 < v < 1$$.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": true}, {"question": "In the trapezium rule formula $$\\int_{a}^{b} y \\, dx \\approx \\frac{h}{2}\\left[y_{0}+y_{n}+2\\left(y_{1}+y_{2}+\\cdots+y_{n-1}\\right)\\right]$$, wh
