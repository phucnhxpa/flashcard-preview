)", "answer": "- Step 1: The unknown $$n$$ is in the exponent. Taking $$\\ln$$ of both sides uses the identity $$\\ln(a^n) = n\\ln a$$ to bring $$n$$ down to a linear coefficient.\n- Step 2: This gives $$n \\ln(7/8) < \\ln k$$. Because $$0 < 7/8 < 1$$, its logarithm is negative: $$\\ln(7/8) < 0$$.\n- Step 3: Dividing both sides by a negative number reverses the inequality direction. Forgetting this flip produces an incorrect bound (e.g., $$n < 43.2$$ instead of $$n > 43.2$$).", "source": "Kimi K2.6 ②", "_id": "kimi_2_11"}, {"question": "What is the exact, mark-earning phrasing required to state how the trapezium rule estimate can be made more accurate, and what common wrong phrasing must be avoided?", "answer": "The correct exam phrasing is **\"Increase the number of strips\"** or **\"Use more/smaller strips\"**.\nThe wrong phrasing to avoid is \"Reduce the interval.\" The interval $$[a, b]$$ stays the same; you are subdividing it more finely. Saying \"reduce the interval\" implies changing the limits of integration, which loses the mark.", "source": "GLM 5.1 ③", "_id": "glm_3_3"}, {"question": "For proving $$n^2-2$$ is never a multiple of 4, why does the even/odd partition suffice, and what algebraic form in each case reveals the non-divisibility? (3 steps)", "answer": "- Step 1: For even $$n=2k$$, we get $$n^2-2 = 4k^2-2 = 2(2k^2-1)$$. Since $$2k^2-1$$ is odd, the expression is $$2 \\times \\text{odd}$$, divisible by 2 but not by 4.\n- Step 2: For odd $$n=2k+1$$, we get $$n^2-2 = 4k^2+4k+1-2 = 4k(k+1)-1$$.\n- Step 3: This is exactly $$1$$ less than a multiple of 4, so it leaves remainder $$3$$. In both cases the remainder is never 0.", "source": "Kimi K2.6 ②", "_id": "kimi_2_22"}, {"question": "In a proof that $$n^2 + 2$$ leaves residue 2 or 3 mod 4, why is the residue $$(4k+2)^2 = 16k^2+16k+4$$ key to computing the residue of $$(4k+2)^2 + 2$$? (3 steps)", "answer": "- Step 1: $$16k^2 + 16k = 16k(k+1)$$ is divisible by 4 (in fact by 16). So $$16k^2+16k \\equiv 0 \\pmod 4$$.\n- Step 2: Adding the constant 4: $$16k^2+16k+4 \\equiv 0+0 = 0 \\pmod 4$$. So $$(4k+2)^2 \\equiv 0 \\pmod 4$$.\n- Step 3: Therefore $$(4k+2)^2 + 2 \\equiv 0 + 2 = 2 \\pmod 4$$. Remainder 2, not divisible by 4.\n\nIntuition: squaring \"amplifies\" multiples of 2 into multiples of 4, but adding 2 at the end \"displaces\" the result by 2 — away from 0 modulo 4.", "source": "Opus 4.7 ②", "_id": "opus_2_109"}, {"question": "Why does dividing by $$\\ln\\left(\\frac{7}{8}\\right)$$ flip the inequality direction? What would happen if you forgot to flip? (2 steps)", "answer": "- Step 1: $$\\ln\\left(\\frac{7}{8}\\right)$$ is negative because $$\\frac{7}{8} < 1$$ and the natural log of any value between 0 and 1 is negative. Dividing an inequality by a negative reverses the direction — this is a fundamental algebra rule, not specific to logs.\n- Step 2: If you forget to flip, you get $$n < 43.21$$ and answer \"largest integer is 43\" instead of the correct \"smallest integer is 44.\" The arithmetic looks perfectly right — the sign flip is a **silent error** that produces a wrong answer with no obvious calculation mistake.\n\nThink of it this way: if $$-2x < 6$$, dividing by $$-2$$ gives $$x > -3$$, not $$x < -3$$. The same principle applies with $$\\ln$$ values.", "source": "GLM 5.1 ②", "_id": "glm_2_6"}, {"question": "You have an inequality like $$\\left(\\frac{7}{8}\\right)^n < \\frac{0.5}{160}$$ with the unknown in the exponent. What is the step-by-step method to solve this, and what is the critical trap? (4 steps)", "answer": "- Step 1: Take $$\\ln$$ of both sides to bring the exponent down: $$n \\ln\\left(\\frac{7}{8}\\right) < \\ln\\left(\\frac{0.5}{160}\\right)$$.\n- Step 2: Recognize the sign: since $$\\frac{7}{8} < 1$$, $$\\ln\\left(\\frac{7}{8}\\right) < 0$$ (it's negative). The RHS $$\\ln\\left(\\frac{0.5}{160}\\right)$$ is also negative since $$\\frac{0.5}{160} < 1$$.\n- Step 3: **CRITICAL TRAP**: Dividing both sides by a negative number flips the inequality: $$n > \\frac{\\ln(0.5/160)}{\\ln(7/8)}$$ (not $$n <$$). Forgetting this flip gives $$n < 43.21$$ (wrong direction) instead of $$n > 43.21$$.\n- Step 4: For \"smallest integer $$n$$\" satisfying $$n > 43.21$$: round up to $$n = 44$$. If the inequality were $$n < 43.21$$, the largest integer would be 43 — the direction completely changes the answer.\n\nThe general rule: $$\\log(v) < 0$$ iff $$0 < v < 1$$; $$\\log(v) > 0$$ iff $$v > 1$$. Always check the sign before dividing.", "source": "GLM 5.1 ②", "_id": "glm_2_5"}, {"question": "To distinguish a maximum from a minimum at a stationary point using the second derivative test, what is the rule? (3 steps)", "answer": "- Step 1: At a stationary point $$t = \\alpha$$, compute $$\\dfrac{d^2H}{dt^2}$$ and evaluate at $$\\alpha$$.\n- Step 2: Interpret:\n  + $$\\dfrac{d^2H}{dt^2}\\bigg|_\\alpha < 0$$ → $$H$$ is concave down → local maximum.\n  + $$\\dfrac{d^2H}{dt^2}\\bigg|_\\alpha > 0$$ → $$H$$ is concave up → local minimum.\n  + $$\\dfrac{d^2H}{dt^2}\\bigg|_\\alpha = 0$$ → inconclusive; use the first-derivative sign test.\n- Step 3: Intuition: the second derivative measures curvature. Negative curvature means the curve is frowning (so $$\\alpha$$ is at the top of a hill); positive means smiling (so $$\\alpha$$ is at the bottom of a valley).", "source": "Opus 4.7 ②", "_id": "opus_2_49"}, {"question": "For an exam question involving both sin and tan (e.g., $$2\\tan\\theta + 3\\sin\\theta = 0$$), why is \"factoring out $$\\sin\\theta$$\" usually the right move?", "answer": "- Step 1: $$\\tan\\theta = \\sin\\theta/\\cos\\theta$$, so every term contains $$\\sin\\theta$$ as a factor (when rewritten).\n- Step 2: Factor: $$\\sin\\theta\\left(\\dfrac{2}{\\cos\\theta} + 3\\right) = 0$$. A product is zero iff a factor is zero, giving two independent equations.\n- Step 3: Each branch yields its own solution family: $$\\sin\\theta = 0$$ gives $$\\theta = 0°, 180°, \\ldots$$; the bracket gives $$\\cos\\theta = -2/3$$, with its own family.\n\nWhy NOT multiply by $$\\cos\\theta$$ to clear: that loses the $$\\sin\\theta = 0$$ solutions when $$\\cos\\theta = 0$$ (division issue). Factoring preserves all solution branches.", "source": "Opus 4.7 ②", "_id": "opus_2_144"}, {"question": "When expanding $$(3 + p x)^5$$ and comparing with a result like $$B = 18D$$, why is dividing both sides by $$p$$ legal (and necessary)?", "answer": "- Step 1: $$B = 405p$$, $$D = 90p^3$$. The equation $$B = 18D$$ gives $$405p = 1620 p^3$$.\n- Step 2: Dividing by $$p$$ is legal provided $$p \\ne 0$$. Since the question implies $$p$$ is nonzero (the expansion has nontrivial $$x$$-dependent terms), this is safe.\n- Step 3: After dividing: $$405 = 1620 p^2$$, so $$p^2 = 1/4$$. The equation $$p \\cdot (1620 p^2 - 405) = 0$$ has \"$$p=0$$\" as a trivial solution which we discard by context.\n\nLesson: always verify that dividing by a variable is legal by checking the problem excludes the zero case (directly or by context).", "source": "Opus 4.7 ②", "_id": "opus_2_94"}, {"question": "To disprove the statement \"$$n^2 + 3n + 1$$ is prime for all $$n \\in \\mathbb{N}$$\", what method is used, and what is a key pitfall to avoid when searching for it? (2 steps)", "answer": "- Step 1: Use a **counter example**. You only need ONE case where the statement fails to disprove a \"for all\" statement.\n- Step 2: Pitfall: Do not give up after 2-3 tries. Counter examples are often not the first value. For this expression, $$n=2,3,4,5$$ all yield primes, but $$n=6$$ gives 55 (which is $$5 \\times 11$$), disproving the statement.", "source": "GLM 5.1 ③", "_id": "glm_3_24"}, {"question": "In a circle problem with a chord parallel to the $$x$$-axis of known length, what coordinate does the chord's endpoints share, and why does that make the problem 1-dimensional?", "answer": "- Step 1: A horizontal chord has all its points at the same $$y$$-coordinate, say $$y = k$$. Both endpoints $$M$$ and $$N$$ share this $$y$$-value.\n- Step 2: Substituting $$y=k$$ into the circle equation turns it into a 1-dimensional equation in $$x$$: $$(x-a)^2 = r^2 - (k-b)^2$$.\n- Step 3: The two $$x$$-solutions are $$x = a \\pm \\sqrt{r^2 - (k-b)^2}$$, giving a chord length of $$2\\sqrt{r^2-(k-b)^2}$$. Once you know the chord length and the circle's geometry, the equation reduces to a single unknown $$k$$.\n\nGeometric reasoning: the chord, perpendicular to the vertical radius from the centre to the chord's midpoint, creates a right triangle (half-chord, vertical distance, radius) — classic Pythagoras.", "source": "Opus 4.7 ②", "_id": "opus_2_95"}, {"question": "In Paper 6 Q10, the student was confused about using the point $A(1,9)$ on the curve vs the integral being zero. Clarify the correct approach. (1 step)", "answer": "- Part (a) asks to compute the integral and show it equals $ak^2 + bk + 2046/5$. You just evaluate the integral and match coefficients. You do NOT set it equal to zero.\n- Part (b) gives a point $A(1,9)$ that lies ON the curve. Substitute to find $k$: $9 = (1-k)^2/\\sqrt{1} = (1-k)^2$.\n- These are TWO DIFFERENT pieces of information. Part (a) is about the integral value; part (b) uses a point on the curve. They're not related.\n\nThe confusion arose from mixing up \"the integral value\" (part a) with \"a point on the curve\" (part b)—they're separate conditions.", "source": "MiniMax ①", "_id": "minimax_1_98"}, {"question": "How do you convert a general circle equation $$x^2 + y^2 + 2gx + 2fy + c = 0$$ into standard form, and what is the sign trap? (3 steps)", "answer": "- Step 1: Complete the square on $$x$$ and $$y$$ separately: $$(x+g)^2 - g^2 + (y+f)^2 - f^2 + c = 0$$.\n- Step 2: Rearrange to standard form: $$(x+g)^2 + (y+f)^2 = g^2 + f^2 - c$$.\n- Step 3: Read off centre $$(-g, -f)$$ and radius $$\\sqrt{g^2 + f^2 - c}$$. The SIGN TRAP: completing the square on $$x^2 - 20x$$ gives $$(x - 10)^2$$, not $$(x + 10)^2$$. The sign inside the bracket is the OPPOSITE of the linear coefficient halved.", "source": "GLM 5.1 ①", "_id": "glm_1_18"}, {"question": "When proving by exhaustion that $$1 < x^2 - \\dfrac{xy}{4} < 15$$ for even integers $$x, y$$ with $$0 < x, y < 6$$, what is the key constraint to read carefully, and what are the finite cases? (3 steps)", "answer": "- Step 1: Read: *even* integers, AND $$0 < x, y < 6$$. So $$x, y \\in \\{2, 4\\}$$ only. Not all integers 1 through 5.\n- Step 2: All ordered pairs: $$(2,2), (2,4), (4,2), (4,4)$$ — four cases.\n- Step 3: Compute $$x^2 - xy/4$$ for each:\n  + $$(2,2)$$: $$4 - 1 = 3$$.\n  + $$(2,4)$$: $$4 - 2 = 2$$.\n  + $$(4,2)$$: $$16 - 2 = 14$$.\n  + $$(4,4)$$: $$16 - 4 = 12$$.\n\nEach value lies in $$(1, 15)$$; conclusion sentence completes the proof.\n\nTrap: skipping the \"even\" constraint and trying all integers gives 25 pairs — wasted work (and likely some will violate the inequality).", "source": "Opus 4.7 ②", "_id": "opus_2_64"}, {"question": "A population model starts at Year 1 with $$2000$$ and grows $$3\\%$$ per year. Conceptually, is Year 6 the $$6$$th term or the $$7$$th term of the geometric sequence, and what exponent should be used? (2 steps)", "answer": "- Step 1: If Year 1 is term $$1$$ with exponent $$0$$, then Year $$k$$ is term $$k$$ using exponent $$k-1$$: $$u_k=2000(1.03)^{k-1}$$.\n- Step 2: Thus Year 6 is the $$6$$th term and uses exponent $$5$$, not $$6$$. Using exponent $$6$$ is an off-by-one error.", "source": "Kimi K2.6 ①", "_id": "kimi_1_75"}, {"question": "What are the key differences between the trapezium rule, midpoint rule, and Simpson's rule for numerical integration?", "answer": "- Trapezium rule: Approximates using trapeziums (straight lines connecting points). Formula: $\\frac{h}{2}[y_0 + y_n + 2(y_1 + ... + y_{n-1})]$. Error proportional to $h^2$.\n- Midpoint rule: Uses the midpoint of each strip. Approximation: $h \\sum f(\\text{midpoint of each strip})$. Error proportional to $h^2$.\n- Simpson's rule: Uses parabolic arcs through consecutive triples of points. More accurate than both for the same number of points. Formula: $\\frac{h}{3}[y_0 + y_n + 4(y_1 + y_3 + ...) + 2(y_2 + y_4 + ...)]$. Error proportional to $h^4$.\n\nTrapezium rule is the standard one in the P2 formula booklet.", "source": "MiniMax ①", "_id": "minimax_1_45"}, {"question": "Prove by exhaustion that for all $$n \\in \\mathbb{N}$$, $$n^2 - 2$$ is not a multiple of 4. (3 steps)", "answer": "- Step 1: Every natural number is either even ($$n = 2k$$) or odd ($$n = 2k+1$$) — two cases.\n- Step 2: Case even: $$n^2 - 2 = 4k^2 - 2 = 2(2k^2 - 1)$$. Since $$2k^2-1$$ is odd, $$n^2-2$$ is $$2 \\times \\text{odd}$$, which is divisible by 2 but NOT by 4.\n- Step 3: Case odd: $$n^2 - 2 = 4k^2 + 4k + 1 - 2 = 4k(k+1) - 1$$. This is exactly 1 less than a multiple of 4, so NOT divisible by 4.\n\nConclusion: in both cases $$n^2 - 2$$ is not a multiple of 4. QED.\n\nContrast with \"not a multiple of 4\" for $$n^2 + 2$$: there you may need 4 residues mod 4, but for $$n^2 - 2$$, factoring mod 4 via parity is sufficient because the critical quantity is $$n^2 \\pmod 4$$, which only depends on parity.", "source": "Opus 4.7 ②", "_id": "opus_2_63"}, {"question": "When solving an inequality like $$\\left(\\frac{7}{8}\\right)^{n} < \\frac{0.5}{160}$$ for the smallest integer $$n$$, what is the critical trap regarding the inequality sign after taking the natural log of both sides? (3 steps)", "answer": "- Step 1: Take $$\\ln$$ of both sides to bring the exponent down: $$n \\ln\\left(\\frac{7}{8}\\right) < \\ln\\left(\\frac{0.5}{160}\\right)$$.\n- Step 2: Recognize the sign of the logarithm. Since $$\\frac{7}{8} < 1$$, its natural log is negative: $$\\ln\\left(\\frac{7}{8}\\right) < 0$$.\n- Step 3: Dividing both sides of an inequality by a negative number **flips the inequality sign**. Therefore, $$n > \\frac{\\ln(0.5/160)}{\\ln(7/8)}$$. Forgetting to flip the sign is a silent, fatal error that gives the wrong bound (e.g., \"largest integer 43\" instead of \"smallest integer 44\").\n\nRule of thumb: $$\\log(v) < 0$$ iff $$0 < v < 1$$.", "source": "GLM 5.1 ③", "_id": "glm_3_1"}, {"question": "For the curve $$y = 8x^{3/2} - 2x^{5/2}$$ with an equal-area condition between $$[0,4]$$ (above axis) and $$[4,k]$$ (below axis), derive the equation for $$k$$. (4 steps)", "answer": "- Step 1: Integrate term-by-term using the power rule $$\\int x^n dx = \\frac{x^{n+1}}{n+1}$$:\n  + $$\\int 8x^{3/2}\\,dx = \\frac{16}{5}x^{5/2}$$.\n  + $$\\int -2x^{5/2}\\,dx = -\\frac{4}{7}x^{7/2}$$.\n- Step 2: So $$\\int_0^k y\\,dx = \\frac{16}{5}k^{5/2} - \\frac{4}{7}k^{7/2} = 0$$ (the signed-area condition).\n- Step 3: Factor out $$k^{5/2}$$ (which is nonzero for $$k>0$$): $$k^{5/2}\\left(\\frac{16}{5} - \\frac{4k}{7}\\right) = 0$$.\n- Step 4: Solve the bracket: $$\\frac{16}{5} = \\frac{4k}{7} \\Rightarrow k = \\frac{16 \\cdot 7}{5 \\cdot 4} = \\frac{28}{5}$$.\n\nKey move: factoring out the highest-degree common factor turns a messy equation into a linear one.", "source": "Opus 4.7 ②", "_id": "opus_2_39"}, {"question": "When estimating $$\\int_a^b \\left(2^x + 2x\\right)\\,dx$$ given only the trapezium estimate of $$\\int_a^b \\left(2^x - 2x\\right)\\,dx = 2.34$$, what is the decomposition strategy? (3 steps)", "answer": "- Step 1: Write the new integrand as a combination of the known one plus something easy: $$2^x + 2x = (2^x - 2x) + 4x$$.\n- Step 2: Integrate term-by-term: $$\\int (2^x+2x)\\,dx = \\int(2^x-2x)\\,dx + \\int 4x\\,dx$$. Use the trapezium estimate for the first and exact integration for the polynomial piece.\n- Step 3: On $$[a,b]=[2, 3.5]$$: $$\\int_2^{3.5} 4x\\,dx = [2x^2]_2^{3.5} = 24.5 - 8 = 16.5$$. So the answer is $$2.34 + 16.5 = 18.84$$.\n\nKey insight: decompose the *integrand*, not the integral; then use trapezium for the hard part and the power rule for the polynomial part.", "source": "Opus 4.7 ②", "_id": "opus_2_32"}, {"question": "A recurrence problem gives $$\\sum_{n=1}^3 u_n = 153$$ and $$b = a + 9$$, with $$u_1=3$$, $$u_2 = b-3a$$, $$u_3 = b - ab + 3a^2$$. When should you substitute $$b = a+9$$? (3 steps)", "answer": "- Step 1: First, sum the three terms (keeping $$a, b$$ separate): $$3 + (b - 3a) + (b - ab + 3a^2) = 3 + 2b - 3a - ab + 3a^2$$. Set equal to 153.\n- Step 2: Now substitute $$b = a+9$$: $$3 + 2(a+9) - 3a - a(a+9) + 3a^2 = 153$$. Expand: $$3 + 2a + 18 - 3a - a^2 - 9a + 3a^2 = 153 \\Rightarrow 2a^2 - 10a + 21 = 153$$.\n- Step 3: Simplify: $$2a^2 - 10a - 132 = 0 \\Rightarrow a^2 - 5a - 66 = 0$$.\n\nStrategic timing: substituting $$b$$ *before* summing tangles every term; summing first isolates the algebraic simplification and makes the final substitution cleaner.", "source": "Opus 4.7 ②", "_id": "opus_2_60"}, {"question": "For a general exam strategy, list three \"silent errors\" that cost marks invisibly and are hard to catch during the exam.", "answer": "- Step 1: **Log domain violations**: finding a mathematically valid $$x$$ that makes the log argument negative. Costs marks if you don't check at the end.\n- Step 2: **Inequality flip forgotten**: dividing by a negative without flipping. Silent because the rest of the algebra looks fine; the direction is wrong.\n- Step 3: **Off-by-one in sequences**: computing $$u_k$$ as $$ar^k$$ instead of $$ar^{k-1}$$. The structure \"looks right\" but yields wrong numbers.\n\nOther silent errors: $$\\log(A+B) \\ne \\log A + \\log B$$ confusion; $$2^{x+1} \\ne (2^x)^2$$; $$\\log^2 x \\ne 2\\log x$$.\n\nCountermeasure: build a personal checklist (\"AM I CHECKING: logs, signs, indexing, domains?\") and run through it in the last 2 minutes of each question.", "source": "Opus 4.7 ②", "_id": "opus_2_149"}, {"question": "What are the two models of \"growth\" suggested by the keywords *same amount* vs *same percentage*, and what sum formula accompanies each? (2 steps)", "answer": "- Step 1: \"Same amount each year\" → linear / arithmetic. Model: $$u_n = a + (n-1)d$$. Sum: $$S_n = \\dfrac{n}{2}[2a+(n-1)d]$$.\n- Step 2: \"Same percentage each year\" → exponential / geometric. Model: $$u_n = ar^{n-1}$$ (equivalently $$y = ab^t$$). Sum: $$S_n = \\dfrac{a(r^n-1)}{r-1}$$.\n\nWhy the distinction matters: \"same amount\" adds a constant, so successive differences are constant; \"same percentage\" multiplies by a constant, so successive ratios are constant. Both describe growth but with qualitatively different long-run behaviour (linear vs exponential).", "source": "Opus 4.7 ②", "_id": "opus_2_26"}, {"question": "When you have $$2\\log_4(x+3) + \\log_4 x$$ on one side of an equation, what must you do BEFORE equating arguments with the other side? (2 steps)", "answer": "- Step 1: Apply the power rule FIRST: $$2\\log_4(x+3) = \\log_4(x+3)^2$$. The coefficient must become a power before you can use the product rule to combine terms.\n- Step 2: Now combine: $$\\log_4(x+3)^2 + \\log_4 x = \\log_4[(x+3)^2 \\cdot x] = \\log_4[x(x^2+6x+9)]$$. Only after ALL coefficients are inside the powers and ALL terms are combined into a single log can you equate arguments.\n\nThe \"2 in front\" trap: if you try to equate arguments while the coefficient 2 is still outside the log, you get the wrong equation. The rule $$\\log_a A = B \\Rightarrow A = a^B$$ only applies when the coefficient is 1.", "source": "GLM 5.1 ②", "_id": "glm_2_22"}, {"question": "What is the key insight for solving \"equal areas\" problems in integration? (1 step)", "answer": "When regions are on opposite sides of the x-axis and have EQUAL area, the TOTAL SIGNED INTEGRAL equals ZERO. Don't compute the two areas separately and add them—instead set $\\int_a^b f(x) dx = 0$ and solve. This saves significant work.", "source": "MiniMax ①", "_id": "minimax_1_67"}, {"question": "Why does the identity $$2\\log_2(2-x)=\\log_2\\bigl((2-x)^2\\bigr)$$ potentially introduce extraneous solutions, and how does the original domain restriction prevent this? (2 steps)", "answer": "- Step 1: The left side requires $$2-x>0$$ (i.e., $$x<2$$), whereas the right side only requires $$(2-x)^2>0$$, which holds for all $$x\\neq2$$. Squaring enlarges the apparent domain.\n- Step 2: Therefore any candidate solution must be checked against the original requirement $$x<2$$; values between $$2$$ and infinity that satisfy the squared equation are extraneous.", "source": "Kimi K2.6 ①", "_id": "kimi_1_71"}, {"question": "If $$(ax-b)$$ is a factor of $$f(x)$$, what root must you substitute, and why? (2 steps)", "answer": "- Step 1: Set $$ax-b=0$$, giving $$x=\\frac{b}{a}$$.\n- Step 2: By the Factor Theorem, $$f\\!\\left(\\frac{b}{a}\\right)=0$$. This generalizes the $$(x-c)$$ case because $$ax-b=a\\!\\left(x-\\frac{b}{a}\\right)$$, and the non-zero scalar $$a$$ does not affect the root.", "source": "Kimi K2.6 ①", "_id": "kimi_1_37"}, {"question": "How do you find the *smallest positive* solution of $$2\\tan(2x+40°) + 3\\sin(2x+40°) = 0$$, given the \"parent\" equation $$2\\tan\\theta + 3\\sin\\theta = 0$$ has solutions $$\\theta \\in \\{0°, 48.2°, 180°, 311.8°, 360°\\}$$? (3 steps)", "answer": "- Step 1: Substitute $$\\theta = 2x + 40°$$. For $$x > 0$$, $$\\theta > 40°$$. Any $$\\theta$$-solution less than $$40°$$ won't correspond to a positive $$x$$.\n- Step 2: The smallest $$\\theta$$-solution that exceeds $$40°$$ is $$\\theta = 48.2°$$.\n- Step 3: Solve $$2x + 40 = 48.2 \\Rightarrow x = 4.1°$$. This is the smallest positive $$x$$.\n\nCommon mistake: taking the smallest $$\\theta$$ (which might be 0 or too small for the substitution) and getting a negative $$x$$, or skipping 48.2° and using $$\\theta = 180°$$ (which gives $$x = 70°$$ — valid but not smallest).", "source": "Opus 4.7 ②", "_id": "opus_2_51"}, {"question": "In a \"show that the integral equals $$ak^2 + bk + c$$\" question, what is the correct approach, and what is the trap? (3 steps)", "answer": "- Step 1: Compute the definite integral fully in terms of $$k$$, evaluating at both limits and subtracting.\n- Step 2: Collect like terms in $$k^2$$, $$k$$, and constants. Match coefficients to identify $$a$$, $$b$$, and the constant.\n- Step 3: The TRAP: Do NOT set the integral equal to zero. \"Show that $$\\int = ak^2 + bk + c$$\" means evaluate and match, not solve.\n\nPhuc correctly challenged his tutor on this—the area cannot be zero; the integral just equals the given expression.", "source": "GLM 5.1 ①", "_id": "glm_1_53"}, {"question": "What is the difference between a \"show that\" question and a \"prove\" question in the context of integration? (1 step)", "answer": "- \"Show that\" (e.g., \"show the integral equals $ak^2 + bk + c$\"): Compute the integral fully, then match coefficients to identify the required constants. Do NOT set the integral equal to zero.\n- \"Prove\" (e.g., \"prove the areas are equal\"): Use logical deduction starting from given information to reach the conclusion.\n\nCommon error: Treating a \"show that\" as a \"prove\" and setting things equal to zero incorrectly.", "source": "MiniMax ①", "_id": "minimax_1_71"}, {"question": "What is the idea behind *proof by exhaustion*, and when is it the right tool? (3 steps)", "answer": "- Step 1: Proof by exhaustion works when a statement can be reduced to a *finite* list of cases. You check every case and if the statement holds in each, you're done.\n- Step 2: For divisibility claims modulo $$k$$, the natural partition is the residues $$0, 1, 2, \\ldots, k-1 \\pmod k$$. For instance, every integer is either $$4m, 4m+1, 4m+2,$$ or $$4m+3$$ — four cases covering all integers.\n- Step 3: For parity-based claims, the partition is usually just even/odd (two cases).\n\nKey requirement: after checking all cases, write an explicit concluding sentence — the mark scheme typically awards 1 mark for this synthesis.", "source": "Opus 4.7 ②", "_id": "opus_2_7"}, {"question": "When evaluating a binomial coefficient like $$\\binom{12}{7} \\left(\\frac{3}{8}\\right)^5 4^7$$, why is it algebraically safer to simplify powers of 2 before multiplying by 792? (2 steps)", "answer": "- Step 1: Notice that $$4^7 = (2^2)^7 = 2^{14}$$ and $$8^5 = (2^3)^5 = 2^{15}$$, so $$\\frac{4^7}{8^5} = \\frac{1}{2}$$. This reduces the massive numbers to a simple fraction early.\n- Step 2: Multiplying $$792 \\times 243 \\times \\frac{1}{2}$$ is far less error-prone than computing $$792 \\times 243 \\times 16384$$ and then dividing by $$32768$$. Simplifying first prevents calculator overflows and arithmetic slips.", "source": "Kimi K2.6 ②", "_id": "kimi_2_30"}, {"question": "In \"show that\" integral problems like $$\\int_1^{16} \\dfrac{(x-k)^2}{\\sqrt x}\\,dx = ak^2 + bk + \\tfrac{2046}{5}$$, what is the key misconception to avoid, and what is the actual method? (3 steps)", "answer": "- Step 1: Misconception: students see \"$$= $$ expression\" and set the integral to zero, trying to solve for $$k$$. That is wrong — $$k$$ is a parameter that stays as is.\n- Step 2: Correct interpretation: evaluate the integral *in terms of* $$k$$, then match coefficients on both sides to identify the integers $$a$$ and $$b$$.\n- Step 3: Method: expand $$(x-k)^2 = x^2 - 2kx + k^2$$, divide by $$\\sqrt x$$ to get $$x^{3/2} - 2kx^{1/2} + k^2 x^{-1/2}$$, integrate using the power rule, evaluate at the bounds, and collect coefficients of $$k^2$$, $$k$$, and the constant.\n\nKey principle: \"Show that\" means \"evaluate and match\" — the equation is an identity, not an equation to solve.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "When solving an inequality with the unknown in the exponent, like $$\\left(\\frac{7}{8}\\right)^n < \\frac{0.5}{160}$$, what is the step-by-step method? (4 steps)", "answer": "- Step 1: Take $$\\ln$$ (or $$\\log$$) of both sides to bring the exponent down: $$n \\ln\\left(\\frac{7}{8}\\right) < \\ln\\left(\\frac{0.5}{160}\\right)$$.\n- Step 2: Evaluate the sign of the logarithm you're dividing by. Since $$\\frac{7}{8} < 1$$, we know $$\\ln\\left(\\frac{7}{8}\\right) < 0$$.\n- Step 3: **CRITICAL TRAP** — Dividing both sides by a negative number flips the inequality: $$n > \\frac{\\ln(0.5/160)}{\\ln(7/8)}$$.\n- Step 4: Compute and round up for the smallest integer satisfying the strict inequality.\n\nForgetting to flip the sign is a silent error—arithmetic looks right but the direction is wrong.", "source": "GLM 5.1 ①", "_id": "glm_1_4"}, {"question": "After solving a logarithmic equation algebraically, what mandatory check must you perform on your answers, and why? (2 steps)", "answer": "- Step 1: You must check that each solution keeps all original log arguments strictly greater than 0. The domain of $$\\log_a(x)$$ is $$x > 0$$.\n- Step 2: If a solution like $$x = 26$$ makes an argument like $$(2-x)$$ negative (i.e., $$2-26 = -24$$), it is extraneous and must be rejected. Only $$x = -6$$ might be valid if it falls within the intersection of all log domains.", "source": "GLM 5.1 ③", "_id": "glm_3_20"}, {"question": "Give a concise framework for tackling \"show that\" versus \"find\" versus \"prove\" questions.", "answer": "- Step 1: **\"Show that\" X = Y**: demonstrate an equation or identity. Start from known/given; manipulate algebraically; arrive at Y. Marks are for valid logical steps; no numerical answer needed.\n- Step 2: **\"Find\" X**: compute a specific value. Use any method; present the final answer clearly.\n- Step 3: **\"Prove\"**: demonstrate a general claim for all instances. May use deduction, exhaustion, or counter-example (for disproof). Conclusion sentence is expected.\n\nKey distinction: \"show\" expects derivation steps (method marks); \"find\" expects answer (value marks); \"prove\" expects logical rigor + conclusion.", "source": "Opus 4.7 ②", "_id": "opus_2_151"}, {"question": "Write the two standard forms of a circle equation in the plane, and derive how each encodes the centre and radius. (3 steps)", "answer": "- Step 1: Standard (completed) form: $$(x-a)^2 + (y-b)^2 = r^2$$, with centre $$(a,b)$$ and radius $$r$$. This just says \"distance from $$(x,y)$$ to $$(a,b)$$ equals $$r$$\" — directly the Pythagorean distance formula squared.\n- Step 2: Expanded (general) form: $$x^2 + y^2 + 2gx + 2fy + c = 0$$. Completing the square: $$(x+g)^2 + (y+f)^2 = g^2 + f^2 - c$$.\n- Step 3: Comparing, the centre is $$(-g, -f)$$ and the radius is $$\\sqrt{g^2 + f^2 - c}$$. A real circle requires $$g^2 + f^2 - c > 0$$.\n\nSign trap: when the equation gives $$x^2 - 20x$$, completing the square yields $$(x-10)^2$$ (not $$(x+10)^2$$); the sign of the linear coefficient flips in the centre coordinate.", "source": "Opus 4.7 ②", "_id": "opus_2_14"}, {"question": "For $$u_{n+1} = b - au_n$$, why is it crucial to build $$u_2$$ and $$u_3$$ algebraically in terms of $$a$$ and $$b$$ before substituting a given relation like $$b = a+9$$? (2 steps)", "answer": "- Step 1: Substituting too early creates nested mixtures of $$a$$ and $$b$$ that are hard to disentangle. Keeping $$u_2 = b-3a$$ and $$u_3 = b - ab + 3a^2$$ as clean expressions preserves structure.\n- Step 2: Only after forming the sum $$u_1+u_2+u_3$$ and simplifying should you use $$b=a+9$$. This yields a single quadratic in $$a$$ cleanly, avoiding sign errors and algebraic clutter.", "source": "Kimi K2.6 ②", "_id": "kimi_2_36"}, {"question": "When dividing a polynomial $f(x)$ by $(x-c)$, what is the Remainder Theorem shortcut, and why does it work? (2 steps)", "answer": "- Step 1: The Remainder Theorem states that the remainder of $f(x) \\div (x-c)$ is simply $$f(c)$$. Instead of performing long division, you just substitute $$x = c$$ into the polynomial.\n- Step 2: Why it works: By the division algorithm, $$f(x) = (x-c)Q(x) + R$$, where $$Q(x)$$ is the quotient and $$R$$ is the remainder. If you substitute $$x = c$$, the term $$(x-c)Q(x)$$ becomes $$0$$, leaving $$f(c) = 0 + R = R$$.\n\nAlways check for this shortcut before attempting painful long division, especially when there are unknown coefficients.", "source": "GLM 5.1 ③", "_id": "glm_3_0"}, {"question": "Given $$f(x) = (x-2)(2x^2+5x+k) + 21$$, why is the remainder when $$f(x)$$ is divided by $$(x-2)$$ immediately $$21$$, even without knowing $$k$$? (2 steps)", "answer": "- Step 1: By the polynomial division structure $$f(x) = (x-2)Q(x) + R$$, the remainder must be a constant because the divisor $$(x-2)$$ is linear.\n- Step 2: Here, $$Q(x) = 2x^2+5x+k$$ and the constant term added at the end is $$R=21$$. Evaluating $$f(2)$$ makes the first bracket zero, leaving exactly $$21$$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_1"}, {"question": "How do you find the equation of a horizontal chord of a circle, given its length? (3 steps)", "answer": "- Step 1: A chord parallel to the $$x$$-axis has equation $$y = k$$. Substitute into the circle equation to get $$(x-a)^2 + (k-b)^2 = r^2$$.\n- Step 2: Solve for $$x$$: $$(x-a)^2 = r^2 - (k-b)^2$$, so the chord endpoints are at $$x = a \\pm \\sqrt{r^2 - (k-b)^2}$$. The chord length is $$2\\sqrt{r^2 - (k-b)^2}$$.\n- Step 3: Set this equal to the given length and solve for $$k$$. Use additional conditions (e.g., \"above $$x$$-axis\" means $$k > 0$$) to select the correct value.\n\nThe answer is just $$y = k$$—you only need the constant, not the endpoints.", "source": "GLM 5.1 ①", "_id": "glm_1_20"}, {"question": "In integration, what does it mean when we say the \"total signed area\" is zero? How does this relate to equal areas above and below the x-axis? (2 steps)", "answer": "- Step 1: The definite integral $\\int_a^b f(x) dx$ gives the NET (signed) area—area above the x-axis counts positive, area below counts negative.\n- Step 2: When regions above and below the x-axis have EQUAL area, the positive and negative contributions cancel out, so $\\int_a^b f(x) dx = 0$.\n\nThis is the key insight for \"equal areas\" problems: Instead of computing $|R_1| + |R_2|$, just set the total signed integral to 0 and solve. This is much simpler than computing two separate integrals.", "source": "MiniMax ①", "_id": "minimax_1_49"}, {"question": "Why does the product rule $$(uv)' = u'v + uv'$$ make sense heuristically? (3 steps)", "answer": "- Step 1: Imagine $$u$$ and $$v$$ as side lengths of a rectangle; $$uv$$ is the area.\n- Step 2: A tiny increment to each side — $$u \\to u + du$$, $$v \\to v + dv$$ — grows the area by approximately $$u\\,dv + v\\,du$$ (two thin rectangles along the original sides), plus a negligible $$du \\cdot dv$$ corner.\n- Step 3: So $$d(uv) \\approx u\\,dv + v\\,du$$. Dividing by $$dx$$: $$(uv)' = u v' + u' v$$.\n\nIntuition: product-rule is literally the two marginal-area contributions when each factor changes slightly.", "source": "Opus 4.7 ②", "_id": "opus_2_124"}, {"question": "Why must you always check the *domain* of every logarithm at the end of a log equation, even if your algebra is flawless? (3 steps)", "answer": "- Step 1: The function $$\\log_a(u)$$ is only defined for $$u > 0$$. Any solution that makes a log argument $$\\le 0$$ must be rejected — not because the algebra is wrong but because the original equation has no meaning there.\n- Step 2: Algebraic manipulations like squaring, multiplying through, or combining logs can introduce *extraneous* solutions that satisfy the transformed equation but not the original.\n- Step 3: Workflow: after solving, list every log argument from the original equation and test each candidate value. Any candidate that fails at least one is rejected.\n\nConcrete example: $$2\\log_2(2-x) = 4 + \\log_2(x+10)$$ requires $$x < 2$$ (from first log) *and* $$x > -10$$ (from second). Candidate $$x=26$$ fails $$x<2$$ even though it satisfies the polynomial equation.", "source": "Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "When solving $$\\log_2(16x) + \\log_2(x+1) = 3 + \\log_2(x+6)$$, what is the student error \"write $$16x + (x+1) = 3(x+6)$$\" doing wrong? (3 steps)", "answer": "- Step 1: The error confuses the *product* law with addition: $$\\log A + \\log B = \\log(AB)$$, NOT $$\\log(A+B)$$. So \"dropping the logs\" on the LHS gives $$16x \\cdot (x+1)$$, not $$16x + (x+1)$$.\n- Step 2: Also, the \"3\" must be converted to a log with the same base: $$3 = \\log_2 8$$, so the RHS becomes $$\\log_2[8(x+6)]$$.\n- Step 3: Correct transformation: $$16x(x+1) = 8(x+6) \\Rightarrow 16x^2 + 8x - 48 = 0 \\Rightarrow 2x^2 + x - 6 = 0$$, which factors to $$(2x-3)(x+2) = 0$$, giving $$x = 3/2$$ (keep) or $$x=-2$$ (reject by domain).\n\nThe silent-error pattern: students treat \"$$\\log + \\log$$\" like ordinary addition, but log addition is multiplication of arguments.", "source": "Opus 4.7 ②", "_id": "opus_2_57"}, {"question": "Write the binomial expansion formula from the IAL formula booklet and explain the structure of the general term.", "answer": "- Step 1: Formula: $$(a+b)^n = \\sum_{r=0}^{n} \\binom{n}{r} a^{n-r} b^r$$, where $$\\binom{n}{r} = \\dfrac{n!}{r!(n-r)!}$$.\n- Step 2: Structure of the $$r$$th term: $$\\binom{n}{r} \\cdot a^{n-r} \\cdot b^r$$. The power of $$a$$ *decreases* from $$n$$ to $$0$$; the power of $$b$$ *increases* from $$0$$ to $$n$$. Their powers always sum to $$n$$.\n- Step 3: The binomial coefficient $$\\binom{n}{r}$$ counts the number of ways to choose $$r$$ instances of $$b$$ from $$n$$ brackets — which is why odd and even values of $$r$$ are treated equally structurally.\n\nKey insight: when $$a \\ne 1$$ (e.g. $$(3+px)^5$$), do NOT forget that $$a^{n-r}$$ is a non-trivial power.", "source": "Opus 4.7 ②", "_id": "opus_2_20"}, {"question": "For an integral between a curve and a line, when can you compute \"area under line\" geometrically as a trapezium instead of integrating?", "answer": "- Step 1: Any line segment over $$[x_1, x_2]$$ defines a region below it that is a trapezium: parallel sides $$y(x_1), y(x_2)$$, width $$x_2-x_1$$.\n- Step 2: Trapezium area: $$\\tfrac{1}{2}(y_1 + y_2)(x_2 - x_1)$$. Much faster than integrating a linear function.\n- Step 3: For lines, you always have this option; the definite integral $$\\int_{x_1}^{x_2}(mx+c)\\,dx$$ reduces to the same formula.\n\nExample: line from $$(1, 9)$$ to $$(16, 36)$$: area $$= \\tfrac{1}{2}(9+36)(16-1) = \\tfrac{1}{2}(45)(15) = 337.5$$.", "source": "Opus 4.7 ②", "_id": "opus_2_139"}, {"question": "In an equation like $$2\\log_4(x+3)+\\log_4 x=\\log_4(4x+2)+\\tfrac12$$, explain why the coefficient $$2$$ must be moved into the power before dropping the logarithms. (2 steps)", "answer": "- Step 1: The rule \"if $$\\log A=\\log B$$ then $$A=B$$\" applies only when the logarithm has coefficient $$1$$. The term $$2\\log_4(x+3)$$ is not a single logarithm.\n- Step 2: First use $$n\\log x=\\log(x^n)$$ to rewrite it as $$\\log_4((x+3)^2)$$. Now both sides are sums of single logs, which can be combined and then equated.", "source": "Kimi K2.6 ①", "_id": "kimi_1_62"}, {"question": "Why is $$\\ln(v)$$ negative whenever $$0 < v < 1$$, and how does this relate to the graph of $$y = \\ln x$$? (2 steps)", "answer": "- Step 1: $$\\ln 1 = 0$$ because $$e^0 = 1$$. The function $$y = \\ln x$$ is strictly increasing for all $$x > 0$$.\n- Step 2: Therefore, for any input between $$0$$ and $$1$$, the output lies below $$\\ln 1 = 0$$, making it negative. Geometrically, the graph crosses the $$x$$-axis at $$(1,0)$$ and descends into the fourth quadrant as $$x \\to 0^+$$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_12"}, {"question": "What are the five conditions relating the distance $$d$$ between two circle centres to their radii $$r_1$$ and $$r_2$$, and what does each mean geometrically? (3 steps)", "answer": "- Step 1: Compute $$d$$ = distance between centres, then compare with $$r_1 + r_2$$ (sum) and $$|r_1 - r_2|$$ (difference).\n- Step 2: The five conditions:\n  + $$d > r_1 + r_2$$: circles don't touch (too far apart)\n  + $$d = r_1 + r_2$$: touch externally (one point, outside)\n  + $$|r_1 - r_2| < d < r_1 + r_2$$: intersect at 2 points\n  + $$d = |r_1 - r_2|$$: touch internally (one point, inside)\n  + $$d < |r_1 - r_2|$$: one circle inside the other, no touching\n- Step 3: To prove \"no intersection,\" show $$d > r_1 + r_2$$ (too far apart) or $$d < |r_1 - r_2|$$ (one inside the other). Compute $$d$$ exactly using the distance formula, then compare numerically.\n\nThink of it as: sum of radii is the \"maximum reach\" for touching externally; difference is the \"gap\" for touching internally. Between those values, they overlap.", "source": "GLM 5.1 ②", "_id": "glm_2_26"}, {"question": "When solving a \"show that\" log equation where a coefficient is in front of the log, what must you do FIRST? (3 steps)", "answer": "- Step 1: Bring the coefficient into the power using $$k\\log_a(x) = \\log_a(x^k)$$. For example, $$2\\log_4(x+3) = \\log_4(x+3)^2$$.\n- Step 2: Convert any standalone constants to logs: $$\\frac{1}{2} = \\log_4(4^{1/2}) = \\log_4 2$$.\n- Step 3: NOW combine all terms using product/quotient rules and equate arguments. You cannot drop the logs or equate arguments until every term is a single log with coefficient 1.", "source": "GLM 5.1 ①", "_id": "glm_1_79"}, {"question": "Why is the $$n$$-th term of an arithmetic sequence $$u_n = a + (n-1)d$$, and what does the $$(n-1)$$ represent physically? (2 steps)", "answer": "- Step 1: Starting from the first term $$a$$, each step adds the common difference $$d$$. To reach the $$n$$-th term, you take $$n-1$$ steps (since the first term is already at position 1).\n- Step 2: Thus $$u_n = a + (n-1)d$$. The $$-1$$ is a frequent source of off-by-one errors; forgetting it gives the $$(n+1)$$-th term instead.", "source": "Kimi K2.6 ②", "_id": "kimi_2_32"}, {"question": "What distinguishes a \"show that\" question about a cubic identity (e.g., \"show $$k$$ satisfies $$5\\alpha^2 - 18\\alpha - 20 = 0$$\") from a \"solve\" question, and what is the expected workflow?", "answer": "- Step 1: \"Show that\" means: derive the equation. Start from the problem's given condition (stationary point, factor, etc.) and use algebra to arrive at the specified equation. You don't need to solve it.\n- Step 2: \"Solve\" or \"find $$\\alpha$$ to 3 d.p.\" means: apply the equation you just derived (or were given) and produce a numerical value using the quadratic formula or calculator.\n- Step 3: Common workflow: part (a) asks \"show that\" — derive the equation, pocketing the method marks. Part (b) asks \"find $$\\alpha$$\" — plug into quadratic formula.\n\nLesson: don't waste time solving in a \"show that\" part; the marks come from the derivation.", "source": "Opus 4.7 ②", "_id": "opus_2_70"}, {"question": "In the context of a tangent-to-a-circle question, why is the gradient of the radius the \"other half\" of the tangent calculation? (3 steps)", "answer": "- Step 1: A radius goes from the centre to a point on the circle. Its gradient measures the \"outward direction\" at that point.\n- Step 2: The tangent line at that point is tangent to the curve — in 2D, a line is tangent to a circle iff it's perpendicular to the radius at the point of contact.\n- Step 3: Perpendicular gradients satisfy $$m_1 m_2 = -1$$. So $$m_{\\text{tan}} = -1/m_{\\text{rad}}$$. Computing $$m_{\\text{rad}}$$ first is the natural setup.\n\nGeometric flavour: the circle is level sets of $$(x-a)^2+(y-b)^2$$; the radius is the gradient direction of this function; the tangent is perpendicular to the gradient, which is exactly \"perpendicular to the radius.\"", "source": "Opus 4.7 ②", "_id": "opus_2_103"}, {"question": "How do you find the remainder when $$f(x)$$ is given in the form $$f(x) = (x-2)Q(x) + 21$$? (2 steps)", "answer": "- Step 1: Recognize that this is already in \"divided form\": $$f(x) = \\text{divisor} \\times \\text{quotient} + \\text{remainder}$$.\n- Step 2: Read off the remainder directly. Since $$f(2) = (2-2)Q(2) + 21 = 0 + 21$$, the remainder is 21.\n\nNo calculation needed—the structure of the equation gives you the answer.", "source": "GLM 5.1 ①", "_id": "glm_1_1"}, {"question": "When solving \"show that $$5\\alpha^2 - 18\\alpha - 20 = 0$$\" from a stationary-point condition, describe the algebraic \"clearing\" workflow in detail. (4 steps)", "answer": "- Step 1: Write the derivative equal to zero: e.g., $$\\tfrac{1}{20}\\left[\\tfrac{1}{2}t^{-1/2}(20+6t-t^2) + t^{1/2}(6-2t)\\right] = 0$$.\n- Step 2: Identify the lowest-power term (here $$t^{-1/2}$$) and the coefficient to clear (here $$1/20$$). Multiply by $$40 t^{1/2}$$ to eliminate both.\n- Step 3: Track each term's transformation:\n  + $$\\tfrac{1}{2}t^{-1/2} \\cdot 40 t^{1/2} = 20$$.\n  + $$t^{1/2} \\cdot 40 t^{1/2} = 40 t$$.\n- Step 4: Combine and simplify: you get a polynomial equation in $$t$$. Rearrange to match the target form $$5t^2 - 18t - 20 = 0$$.\n\nKey discipline: multiply EVERY term (including constants) by the clearing factor; distribute carefully.", "source": "Opus 4.7 ②", "_id": "opus_2_142"}, {"question": "Two circles have centres separated by distance $$d$$ and radii $$r_1$$ and $$r_2$$. State the inequality conditions for: no contact, external tangency, two intersection points, internal tangency, and one inside the other without touching. (5 steps)", "answer": "- Step 1: No intersection (separate): $$d>r_1+r_2$$.\n- Step 2: Touch externally: $$d=r_1+r_2$$.\n- Step 3: Intersect at two distinct points: $$|r_1-r_2|<d<r_1+r_2$$.\n- Step 4: Touch internally: $$d=|r_1-r_2|$$.\n- Step 5: One strictly inside the other without contact: $$d<|r_1-r_2|$$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_9"}, {"question": "In any \"find $$k$$ from $$\\int y\\,dx = 0$$\" problem, what is the common factor-out trick that reduces computation? (3 steps)", "answer": "- Step 1: After evaluating the definite integral, you get a polynomial in $$k$$ (or equivalently $$k^n$$ for various $$n$$).\n- Step 2: Often, one factor is a monomial in $$k$$ (like $$k^{5/2}$$), which is nonzero for $$k > 0$$. Factor it out: $$k^{5/2}(\\text{linear in } k) = 0$$.\n- Step 3: Solve the bracket (linear in $$k$$) for the unique $$k$$; discard the trivial root $$k = 0$$ if irrelevant.\n\nExample: $$\\tfrac{16}{5}k^{5/2} - \\tfrac{4}{7}k^{7/2} = 0 \\Rightarrow k^{5/2}(\\tfrac{16}{5} - \\tfrac{4k}{7}) = 0 \\Rightarrow k = 28/5$$ (the other root $$k=0$$ is outside the region).", "source": "Opus 4.7 ②", "_id": "opus_2_147"}, {"question": "After finding $$\\dfrac{dH}{dt} = 0$$, how do you clear the $$t^{-1/2}$$ term to reach a clean polynomial equation in $$t$$? (3 steps)", "answer": "- Step 1: Multiply every term of the equation by the lowest positive power that eliminates the negative exponent. Here, multiplying by $$40 t^{1/2}$$ clears both the $$1/20$$ factor (via $$\\times 40/2 = 20$$) and the $$t^{-1/2}$$ (via $$t^{-1/2}\\cdot t^{1/2} = 1$$).\n- Step 2: Each term's new power: $$t^{-1/2} \\cdot t^{1/2} \\to t^0$$ (constant term); $$t^{1/2} \\cdot t^{1/2} \\to t$$. So the equation becomes polynomial in $$t$$.\n- Step 3: Result: $$(20+6t-t^2) + 2t(6-2t) = 0 \\Rightarrow 5t^2 - 18t - 20 = 0$$.\n\nTrap: you must multiply *every* term, including constants — including the $$1/20$$ factor outside the bracket.", "source": "Opus 4.7 ②", "_id": "opus_2_48"}, {"question": "In a proof by exhaustion where variables are constrained (e.g., $$x,y$$ are even integers with $$0 < x,y < 6$$), why is the finite set small enough for exhaustion, and what pitfall arises if constraints are misread? (2 steps)", "answer": "- Step 1: The constraints limit $$x,y$$ to the set $$\\{2,4\\}$$, yielding only four pairs to check. This finite, enumerable set makes exhaustion feasible and rigorous.\n- Step 2: If you misread the constraints as \"all integers\" or \"all positive integers\", you would attempt an infinite proof by exhaustion, which is impossible. Always extract the exact permitted values first.", "source": "Kimi K2.6 ②", "_id": "kimi_2_27"}, {"question": "In the proof that $$abc$$ is always a multiple of 4 given $$c=3a+1$$ and $$a+b+c=15$$ with $$a,b,c$$ positive integers, how do constraints reduce the problem to a finite table, and what defines the valid range of $$a$$? (3 steps)", "answer": "- Step 1: Substitute $$c=3a+1$$ into $$a+b+c=15$$ to get $$b = 14-4a$$. Positivity of $$b$$ requires $$14-4a > 0$$, so $$a < 3.5$$.\n- Step 2: Since $$a$$ is a positive integer, $$a \\in \\{1,2,3\\}$$. Each value determines $$b$$ and $$c$$ uniquely, giving exactly three cases.\n- Step 3: Testing $$a=1,2,3$$ yields $$abc = 40, 84, 60$$ respectively, all multiples of 4. The constraints made exhaustion possible by bounding $$a$$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_70"}, {"question": "What is the conceptual difference between \"greatest $$n$$ such that $$a^n$$ > target\" and \"smallest $$n$$ such that $$a^n$$ < target\" when $$0 < a < 1$$?", "answer": "- Step 1: When $$0 < a < 1$$, $$a^n$$ is *decreasing* in $$n$$: as $$n$$ grows, $$a^n$$ shrinks toward 0.\n- Step 2: \"$$a^n > $$ target\": satisfied for small $$n$$, fails for large $$n$$. So \"greatest $$n$$\" = the last $$n$$ before the curve crosses below. Round DOWN any non-integer boundary.\n- Step 3: \"$$a^n < $$ target\": satisfied for large $$n$$. \"Smallest $$n$$\" = the first $$n$$ after the curve drops below. Round UP any non-integer boundary.\n\nDirection is everything: the rounding direction flips depending on whether $$a^n$$ is increasing or decreasing and which direction of inequality you want. Picture the curve first.", "source": "Opus 4.7 ②", "_id": "opus_2_101"}, {"question": "When a quadratic in a recurrence parameter gives two candidate values and the question asks for the \"larger possible value of $$u_2$$\", what is the standard workflow? (3 steps)", "answer": "- Step 1: Solve the quadratic to get both values of the unknown. E.g. $$a^2 - 5a - 66 = 0 \\Rightarrow (a-11)(a+6)=0$$ gives $$a = 11$$ or $$a = -6$$.\n- Step 2: For EACH candidate, compute the target quantity. E.g. $$u_2 = b - 3a = (a+9) - 3a = 9 - 2a$$:\n  + $$a = 11$$: $$u_2 = 9 - 22 = -13$$.\n  + $$a = -6$$: $$u_2 = 9 - (-12) = 21$$.\n- Step 3: Pick the larger (or smaller) as requested: here, $$u_2 = 21$$.\n\nDon't assume one candidate is \"obviously wrong\" — quadratics often give two valid branches, each corresponding to a meaningful value.", "source": "Opus 4.7 ②", "_id": "opus_2_61"}, {"question": "When differentiating a product like $$\\sqrt{t}\\cdot(\\text{quadratic})$$, explain the strategy for handling the $$t^{-1/2}$$ term that appears, and why multiplying through by $$\\sqrt{t}$$ clears it. (3 steps)", "answer": "- Step 1: Apply the product rule: $$(uv)'=u'v+uv'$$. With $$u=t^{1/2}$$, we get $$u'=\\frac{1}{2}t^{-1/2}$$, introducing a negative exponent.\n- Step 2: Setting the derivative to zero yields terms like $$t^{-1/2}\\cdot(\\text{poly})$$ and $$t^{1/2}\\cdot(\\text{poly})$$.\n- Step 3: Multiply every term by $$2t^{1/2}$$ to eliminate denominators and negative exponents, converting the equation into a standard polynomial.", "source": "Kimi K2.6 ①", "_id": "kimi_1_47"}, {"question": "In a geometric sequence problem with three consecutive terms $$(2k-15), k, (k+4)$$, why does the condition $$\\dfrac{u_2}{u_1} = \\dfrac{u_3}{u_2}$$ give you a quadratic in $$k$$? (3 steps)", "answer": "- Step 1: For a geometric sequence, the common ratio is constant: $$\\dfrac{k}{2k-15} = \\dfrac{k+4}{k}$$.\n- Step 2: Cross-multiply: $$k^2 = (k+4)(2k-15) = 2k^2 - 7k - 60$$.\n- Step 3: Rearrange: $$k^2 - 7k - 60 = 0$$. A quadratic emerges naturally because the constraint is between three consecutive terms, producing a product relation.\n\nAlternative characterization: the middle term of a 3-term GP is the *geometric mean* of the other two: $$u_2^2 = u_1 u_3$$.", "source": "Opus 4.7 ②", "_id": "opus_2_55"}, {"question": "When completing the square for $x^2 - 20x + 139 = 0$, why is it $(x-10)^2$, not $(x+10)^2$? (1 step)", "answer": "- Completing the square: $(x - a)^2 = x^2 - 2ax + a^2$.\n- We want the coefficient of $x$ to be $-20$, so $-2a = -20$, giving $a = 10$.\n- Therefore it's $(x - 10)^2 = x^2 - 20x + 100$.\n- The sign in the bracket is the OPPOSITE of the sign in front of the $x$ term: coefficient $-20$ → $(x - 10)^2$.\n\nCommon error: Using $(x + 10)^2$ which gives $x^2 + 20x + 100$.", "source": "MiniMax ①", "_id": "minimax_1_95"}, {"question": "In a year-1-to-year-$$k$$ sequence problem, how do you decide whether $$t=0$$ corresponds to year 1 or year 0, and what goes wrong if you mix these up? (3 steps)", "answer": "- Step 1: Always read the problem statement: does it say \"at the start of year 1\" or \"after year 1\"? The first usually means $$t=0$$ corresponds to year 1; the second might mean $$t=1$$.\n- Step 2: Test your interpretation on a given data point. If year 1 has value 2000 and the model is $$u_n = 2000 \\cdot (1.03)^{n-1}$$, check that $$n=1$$ reproduces 2000.\n- Step 3: For \"population after 6 years starting from year 1 at 2000\": year 7 is the 7th term, i.e. $$u_7 = 2000(1.03)^6$$. Off-by-one here means either $$2000(1.03)^5$$ or $$2000(1.03)^7$$ — wrong by a whole percentage year.\n\nRule of thumb: write \"year $$k$$ ↔ $$n=k$$\" explicitly at the start to anchor every subsequent computation.", "source": "Opus 4.7 ②", "_id": "opus_2_27"}, {"question": "What is the danger of crossing out written work prematurely, based on patterns in the revision notes? (3 steps)", "answer": "- Step 1: Pattern observed: Phuc has crossed out CORRECT work on multiple occasions — e.g., reaching $$3xy(-x+y) > 0$$ in a proof, or correctly computing $$\\cos^{-1}(-1/3) \\approx 1.91$$ rad.\n- Step 2: Cause: second-guessing when the algebra \"looks different\" from expected, or when a calculator value seems surprising (e.g., negative-sign fraction gives a positive cosine).\n- Step 3: Discipline: do NOT erase until you have finished and have a reason. If unsure, bracket or annotate \"check\" rather than cross out. In 'show that' questions, keep all working — even apparently redundant steps earn method marks.", "source": "Opus 4.7 ②", "_id": "opus_2_92"}, {"question": "When solving $$5\\sin x \\tan x + 13 = \\cos x$$, what substitution reduces it to a quadratic in a single trig function? (3 steps)", "answer": "- Step 1: Multiply through by $$\\cos x$$ to eliminate $$\\tan x = \\sin x/\\cos x$$: $$5\\sin^2 x + 13\\cos x = \\cos^2 x$$.\n- Step 2: Use $$\\sin^2 x = 1 - \\cos^2 x$$: $$5(1-\\cos^2 x) + 13\\cos x = \\cos^2 x \\Rightarrow 5 - 5\\cos^2 x + 13\\cos x = \\cos^2 x \\Rightarrow 6\\cos^2 x - 13\\cos x - 5 = 0$$.\n- Step 3: Solve the quadratic: $$\\cos x = \\frac{13 \\pm 17}{12}$$, giving $$\\cos x = \\frac{5}{2}$$ (reject, $$|\\cos| \\leq 1$$) or $$\\cos x = -\\frac{1}{3}$$ (valid). Then $$x = \\cos^{-1}(-1/3) \\approx 1.91$$ radians (Q2, between $$\\pi/2$$ and $$\\pi$$).\n\nThe general method: quadratic in mixed trig → substitute $$\\sin^2 = 1-\\cos^2$$ (or vice versa) → single-variable quadratic → solve → reject invalid values.", "source": "GLM 5.1 ②", "_id": "glm_2_36"}, {"question": "For a cubic $$f(x) = 2x^3 + x^2 + x - 1$$ factored as $$(2x-1)(x^2+x+1)$$, why is the answer to \"how many real roots?\" equal to 1? (3 steps)", "answer": "- Step 1: The real roots of $$f$$ come from the factors. Each linear factor gives one real root; each quadratic factor gives 0, 1, or 2 depending on its discriminant.\n- Step 2: $$(2x-1) = 0 \\Rightarrow x = 1/2$$ (one real root).\n- Step 3: $$x^2+x+1$$: $$\\Delta = 1 - 4 = -3 < 0 \\Rightarrow$$ no real roots.\n\nTotal real roots: 1.\n\nStructural insight: a cubic polynomial always has at least one real root (intermediate value theorem, since cubics go from $$-\\infty$$ to $$+\\infty$$). Here, that one real root is $$x = 1/2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_146"}, {"question": "When expanding $$\\left(1-\\frac{x}{6}\\right)^9$$, how do you handle the sign of each term? (2 steps)", "answer": "- Step 1: Since $$b = -\\frac{x}{6}$$ (negative), odd-power terms are negative: $$\\binom{9}{1}(1)^8\\left(-\\frac{x}{6}\\right)^1 = -\\frac{3}{2}x$$ (negative), while even-power terms are positive: $$\\binom{9}{2}(1)^7\\left(-\\frac{x}{6}\\right)^2 = x^2$$ (positive).\n- Step 2: General rule: when $$b$$ is negative, $$(-1)^r$$ alternates the sign. The $$r$$th term is $$\\binom{9}{r} \\cdot \\frac{(-1)^r}{6^r} \\cdot x^r$$. For $$r=3$$: $$\\binom{9}{3} \\cdot \\frac{-1}{216} = -\\frac{84}{216} = -\\frac{7}{18}$$.\n\nThe expansion becomes: $$1 - \\frac{3}{2}x + x^2 - \\frac{7}{18}x^3 + \\ldots$$ — alternating signs because $$b < 0$$.", "source": "GLM 5.1 ②", "_id": "glm_2_38"}, {"question": "For a reflection integral like $$\\int_{-8.5}^4 (3^{x/3} - 4)\\,dx$$ given a known estimate of $$\\int_{-4}^{8.5} (3^{-x/3} + 4)\\,dx$$, describe the substitution and why it works. (4 steps)", "answer": "- Step 1: Let $$u = -x$$. Then $$du = -dx$$, and when $$x = -8.5$$, $$u = 8.5$$; when $$x = 4$$, $$u = -4$$.\n- Step 2: $$3^{x/3} = 3^{-u/3}$$. So the integrand becomes $$3^{-u/3} - 4$$.\n- Step 3: Flipping limits gives: $$\\int_{-8.5}^4 (3^{x/3} - 4)\\,dx = \\int_{-4}^{8.5} (3^{-u/3} - 4)\\,du = \\left[\\int_{-4}^{8.5} 3^{-u/3}\\,du\\right] - 4 \\cdot 12.5$$.\n- Step 4: The first bracket is the known estimate minus the \"+4\" part, i.e. 69 - 50 = 19. Subtract $$4 \\cdot 12.5 = 50$$: $$19 - 50 = -31$$.\n\nKey technique: reflection about the $$y$$-axis is handled by $$u=-x$$; the Jacobian contributes a sign which cancels with flipping limits.", "source": "Opus 4.7 ②", "_id": "opus_2_111"}, {"question": "What is the \"off-by-one\" error pattern in sequence/series problems, and how do you prevent it?", "answer": "- Step 1: Symptom: computing $$u_k$$ as $$ar^k$$ instead of $$ar^{k-1}$$, or treating year 4 as 4 steps instead of 3 steps from year 1.\n- Step 2: Root cause: conflating \"index $$k$$\" with \"number of increments\". For a sequence starting at $$u_1$$: year $$k$$ has $$k-1$$ increments (not $$k$$).\n- Step 3: Prevention: at the start of any sequence problem, write explicitly \"year $$k$$ ↔ $$u_k$$\" or \"year $$k$$ ↔ $$n=k-1$$\" depending on convention. Test: plug in $$k=1$$ and confirm the formula reproduces the first term.\n\nExample test: if $$u_7 = 2000(1.03)^6$$, then $$u_1 = 2000(1.03)^0 = 2000$$ ✓.", "source": "Opus 4.7 ②", "_id": "opus_2_114"}, {"question": "Solve $$\\log_2(16x) + \\log_2(x+1) = 3 + \\log_2(x+6)$$ step-by-step, identifying the key pitfall. (5 steps)", "answer": "- Step 1: Combine LHS using product rule: $$\\log_2(16x) + \\log_2(x+1) = \\log_2[16x(x+1)]$$ — it's a PRODUCT, not a sum of arguments.\n- Step 2: Convert the constant 3: $$3 = \\log_2(2^3) = \\log_2 8$$. Combine RHS: $$\\log_2 8 + \\log_2(x+6) = \\log_2[8(x+6)]$$.\n- Step 3: Equate arguments (both sides are single logs with base 2): $$16x(x+1) = 8(x+6)$$.\n- Step 4: Expand and solve: $$16x^2 + 16x = 8x + 48 \\Rightarrow 16x^2 + 8x - 48 = 0 \\Rightarrow 2x^2 + x - 6 = 0 \\Rightarrow (2x-3)(x+2) = 0 \\Rightarrow x = \\frac{3}{2}$$ or $$x = -2$$.\n- Step 5: Domain check: all log arguments must be $$>0$$. $$x = \\frac{3}{2}$$: $$16(3/2)=24>0$$ ✓, $$5/2>0$$ ✓, $$15/2>0$$ ✓. $$x = -2$$: $$16(-2)=-32<0$$ ✗ → reject. Answer: $$x = \\frac{3}{2}$$.\n\nThe pitfall was writing $$16x + (x+1) = 3(x+6)$$ instead of $$16x(x+1) = 8(x+6)$$ — product, not sum.", "source": "GLM 5.1 ②", "_id": "glm_2_23"}, {"question": "If someone claims \"for all positive integers $$n$$, $$n^2 + n + 41$$ is prime,\" give a structured approach to testing this claim.", "answer": "- Step 1: Test small values: $$n=1$$: 43 (prime). $$n=2$$: 47 (prime). Indeed, this polynomial (Euler's) produces primes for many small $$n$$.\n- Step 2: Think structurally: when can $$n^2 + n + 41 = n(n+1) + 41$$ be composite? If $$n = 41$$: $$41 \\cdot 42 + 41 = 41(42+1) = 41 \\cdot 43$$ — NOT prime.\n- Step 3: Counter-example: $$n = 41$$. The structural insight comes from seeing when $$n$$ divides all three terms, which happens when $$n$$ is a factor of 41.\n\nLesson: counter-example hunting benefits from both brute search AND structural reasoning; try to identify algebraic patterns that force divisibility.", "source": "Opus 4.7 ②", "_id": "opus_2_133"}, {"question": "In expanding $$(1 - x/6)^9$$, why does the $$r$$th term have an alternating sign, and what is the sign of the $$x^3$$ term? (3 steps)", "answer": "- Step 1: With $$b = -x/6$$, the $$r$$th term has $$b^r = (-1)^r \\cdot (x/6)^r$$.\n- Step 2: So the sign of the $$r$$th term is $$(-1)^r$$ — negative for odd $$r$$, positive for even $$r$$.\n- Step 3: For $$x^3$$, $$r=3$$ (odd), so the coefficient is negative. Specifically: $$\\binom{9}{3} (-1/6)^3 = 84 \\cdot (-1/216) = -7/18$$.\n\nSilent error: if you lose track of the $$-$$ sign inside the bracket, every odd-power term will have the wrong sign and downstream calculations fail.", "source": "Opus 4.7 ②", "_id": "opus_2_22"}, {"question": "Why does $$\\log A+\\log B=\\log(AB)$$ and not $$\\log(A+B)$$? Provide a numerical counter-example with base $$10$$ showing that $$\\log(A+B)$$ fails. (2 steps)", "answer": "- Step 1: If $$\\log_a A=p$$ and $$\\log_a B=q$$, then $$a^p=A$$ and $$a^q=B$$. Multiplying gives $$a^{p+q}=AB$$, so $$p+q=\\log_a(AB)$$.\n- Step 2: Numerical check: $$\\log_{10}10+\\log_{10}10=1+1=2=\\log_{10}100=\\log_{10}(10\\times10)$$. But $$\\log_{10}(10+10)=\\log_{10}20\\approx1.301\\neq2$$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_13"}, {"question": "For $$\\cos x = -\\tfrac{3}{4}$$ in $$[0°, 360°]$$, why is the \"other\" solution $$360° - 138.6°$$ rather than $$-138.6°$$ even though the calculator gives $$\\cos^{-1}(-3/4) \\approx 138.6°$$?", "answer": "- Step 1: The calculator's principal value $$138.6°$$ is in $$[0°,180°]$$, already within the target domain.\n- Step 2: The symmetry of $$\\cos$$ around $$360°$$: $$\\cos(360° - \\alpha) = \\cos\\alpha$$, giving a second solution at $$360° - 138.6° = 221.4°$$.\n- Step 3: The value $$-138.6°$$ is *also* a valid solution (via $$\\cos(-\\theta)=\\cos\\theta$$), but it lies outside $$[0°, 360°]$$. Adding $$360°$$ to it gives $$221.4°$$ — the same as the reflection across $$360°$$.\n\nPractical rule: when the principal value is in $$[0°,180°]$$, the second solution in $$[0°,360°]$$ is $$360°-\\alpha$$. Cosine solutions come in pairs that sum to $$360°$$.", "source": "Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "Why does the chain rule (not formally in P2 but implicit) say $$\\tfrac{d}{dx} f(g(x)) = f'(g) \\cdot g'(x)$$? (3 steps)", "answer": "- Step 1: Imagine $$g(x)$$ is a \"rescaling\" of $$x$$, and $$f$$ acts on that rescaled variable.\n- Step 2: A small change $$dx$$ produces a change $$dg = g'(x)\\,dx$$ in $$g$$. Then $$f$$ changes by $$df = f'(g)\\,dg = f'(g) g'(x)\\,dx$$.\n- Step 3: So $$\\dfrac{df}{dx} = f'(g) \\cdot g'(x)$$: rate of change of $$f$$ w.r.t. $$x$$ equals rate w.r.t. $$g$$ times rate of $$g$$ w.r.t. $$x$$.\n\nNot needed for P2 power-rule differentiation, but the *intuition* that \"derivatives compose multiplicatively\" is useful.", "source": "Opus 4.7 ②", "_id": "opus_2_125"}, {"question": "State the condition for a geometric series to have a sum to infinity, give the formula, and explain conceptually what happens if $$|r|\\geq 1$$. (2 steps)", "answer": "- Step 1: The condition is $$|r|<1$$. The formula is $$S_\\infty=\\frac{a}{1-r}$$, which appears in the formula booklet.\n- Step 2: If $$|r|\\geq 1$$, the terms do not decay to zero; they grow or oscillate indefinitely, so the partial sums diverge and no finite total exists.", "source": "Kimi K2.6 ①", "_id": "kimi_1_42"}, {"question": "State the formulas for the $$n$$th term, finite sum, and infinite sum of a geometric sequence, and note which are in the formula booklet. (3 steps)", "answer": "- Step 1: $$n$$th term: $$u_n = ar^{n-1}$$. NOT in booklet — memorise.\n- Step 2: Finite sum: $$S_n = \\dfrac{a(1-r^n)}{1-r} = \\dfrac{a(r^n - 1)}{r - 1}$$. IS in booklet.\n- Step 3: Infinite sum (only when $$|r| < 1$$): $$S_\\infty = \\dfrac{a}{1-r}$$. IS in booklet.\n\nWhy $$|r|<1$$ for infinity: if $$|r|\\ge 1$$, the terms do not shrink to zero, so the partial sums grow unboundedly (or oscillate). The geometric series converges only when each term is strictly smaller than the last.", "source": "Opus 4.7 ②", "_id": "opus_2_24"}, {"question": "For $\\int_{-4}^{8.5} 3^{-x/3} dx$, how do you use symmetry to evaluate $\\int_{-8.5}^4 (3^{x/3} - 4) dx$? (2 steps)", "answer": "- Step 1: Use the substitution $u = -x$. Then $du = -dx$, and when $x = -8.5$, $u = 8.5$; when $x = 4$, $u = -4$.\n- Step 2: The integral becomes:\n$$\\int_{8.5}^{-4} 3^{-u/3} (-du) = \\int_{-4}^{8.5} 3^{-u/3} du = \\int_{-4}^{8.5} 3^{-x/3} dx$$\n- This is exactly the first integral we already computed. Then subtract the integral of $-4$: $\\int_{-4}^{8.5} -4 \\, dx = -4(8.5 - (-4)) = -4(12.5) = -50$.\n- So the result is: first integral estimate minus 50.\n\nThis uses the reflection property: $\\int_a^b f(-x) dx = \\int_{-b}^{-a} f(u) du$.", "source": "MiniMax ①", "_id": "minimax_1_81"}, {"question": "State the contrast table between proof by counter-example, proof by exhaustion, and proof by deduction — when is each appropriate?", "answer": "- Step 1: **Counter-example**: used to *disprove* a \"for all\" statement. Just one failing case is enough. Example: disproving \"$$n^2+3n+1$$ is prime for all $$n$$\" by showing $$n=6$$ gives composite 55.\n- Step 2: **Proof by exhaustion**: used to *prove* a statement over a *finite* set of cases. Check every case and conclude. Example: \"for all $$n \\in \\mathbb{N}, n^2+2$$ is not a multiple of 4\" by checking residues mod 4.\n- Step 3: **Proof by deduction**: used to *prove* a general statement with no finite case-split. Start from premises, apply logical/algebraic steps, reach conclusion. Example: \"if $$x,y>0$$ and $$(x-y)^3 > x^3 - y^3$$ then $$y>x$$\" by expansion + positivity.\n\nMethod choice is signalled by the question: \"disprove\" → counter-example; \"prove for all cases\" with small finite set → exhaustion; otherwise → deduction.", "source": "Opus 4.7 ②", "_id": "opus_2_87"}, {"question": "For an inequality of the form $$a^n < k$$ with $$0 < a < 1$$, why does solving give a *lower bound* on $$n$$ rather than an upper bound?", "answer": "- Step 1: When $$0 < a < 1$$, the function $$a^n$$ is *decreasing* in $$n$$: bigger $$n$$ means smaller value.\n- Step 2: So the statement \"$$a^n$$ is smaller than some tiny target\" requires $$n$$ to be *large*, not small.\n- Step 3: Algebraically, this appears as flipping the inequality when dividing by $$\\ln a < 0$$. Mechanically: the sign flip is forced because $$\\ln(a) < 0$$; conceptually: the shape of the curve demands it.\n\nTakeaway: always mentally picture whether the exponential is increasing or decreasing before trusting algebraic manipulation.", "source": "Opus 4.7 ②", "_id": "opus_2_3"}, {"question": "For $$\\sin\\theta=k$$ with principal value $$\\alpha=\\sin^{-1}(k)$$ in $$[-\\pi/2,\\pi/2]$$, explain where the second solution in $$[0,2\\pi]$$ comes from and state its value. (2 steps)", "answer": "- Step 1: Sine corresponds to the $$y$$-coordinate. The second solution is the reflection of $$\\alpha$$ across the $$y$$-axis, because $$\\sin(\\pi-\\alpha)=\\sin\\alpha$$.\n- Step 2: In degrees the second solution is $$180^\\circ-\\alpha$$; in radians it is $$\\pi-\\alpha$$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_65"}, {"question": "For the recurrence $$u_{n+1} = \\dfrac{u_n - 3}{u_n - 2}$$ with $$u_1 = 3$$, verify the sequence is periodic and find its order. (4 steps)", "answer": "- Step 1: Compute $$u_2 = \\dfrac{3-3}{3-2} = \\dfrac{0}{1} = 0$$.\n- Step 2: Compute $$u_3 = \\dfrac{0-3}{0-2} = \\dfrac{-3}{-2} = 1.5$$.\n- Step 3: Compute $$u_4 = \\dfrac{1.5 - 3}{1.5 - 2} = \\dfrac{-1.5}{-0.5} = 3$$ — back to $$u_1$$!\n- Step 4: Cycle detected: $$(3, 0, 1.5)$$ of length 3. Period/order is 3.\n\nSign-error trap: $$\\dfrac{-1.5}{-0.5} = +3$$ (negative over negative is positive). Losing a minus sign gives a non-periodic-looking result.", "source": "Opus 4.7 ②", "_id": "opus_2_43"}, {"question": "You've used the trapezium rule to estimate $$\\int_2^{3.5} (2^x - 2x) \\, dx \\approx 2.34$$, and now need to estimate $$\\int_2^{3.5} (2^x + 2x) \\, dx$$. What decomposition trick do you use? (2 steps)", "answer": "- Step 1: Split the new integrand into (what you already estimated) + (something you can integrate exactly): $$2^x + 2x = (2^x - 2x) + 4x$$. So $$\\int_2^{3.5} (2^x + 2x) \\, dx = \\int_2^{3.5} (2^x - 2x) \\, dx + \\int_2^{3.5} 4x \\, dx$$.\n- Step 2: The first integral is your trapezium estimate (2.34). The second is an exact polynomial integral: $$\\int_2^{3.5} 4x \\, dx = [2x^2]_2^{3.5} = 2(12.25) - 2(4) = 24.5 - 8 = 16.5$$. Total: $$2.34 + 16.5 = 18.84$$.\n\nAlways decompose: new integral = (already-estimated part) ± (exactly-integrable polynomial part).", "source": "GLM 5.1 ②", "_id": "glm_2_10"}, {"question": "Given $$f(x) = ax^3 + 3x^2 - 8x + 2$$ and the remainder when $$f(x)$$ is divided by $$x-2$$ is 3, how would you find $$a$$? What's the one-line approach? (2 steps)", "answer": "- Step 1: By the Remainder Theorem, $$f(2) = 3$$. Substitute $$x = 2$$: $$a(8) + 3(4) - 8(2) + 2 = 8a + 12 - 16 + 2 = 8a - 2 = 3$$.\n- Step 2: Solve: $$8a = 5 \\Rightarrow a = \\frac{5}{8}$$. This is a single equation from one substitution — no long division needed, no coefficient matching with 3 unknowns.\n\nThe trap: attempting $$f(x) = (x-2)(dx^2 + bx + c) + 3$$ and matching coefficients creates three simultaneous equations. Remainder Theorem bypasses all of that.", "source": "GLM 5.1 ②", "_id": "glm_2_4"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "When dividing $$f(x)$$ by $$(x-c)$$, what is the Remainder Theorem shortcut that avoids polynomial long division? (2 steps)", "answer": "- Step 1: State the Remainder Theorem rule: The remainder of $$f(x) \\div (x-c)$$ is simply $$f(c)$$. You substitute $$x = c$$ directly into the function.\n- Step 2: Contrast with the trap: Do NOT set up polynomial long division (especially with unknown coefficients, which creates painful simultaneous equations). The Remainder Theorem gives the answer in one substitution.\n\nThe Remainder Theorem turns a 5-minute algebra grind into a one-liner.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "How do you find the remainder when $$f(x)$$ is given in the form $$f(x) = (x-2)Q(x) + 21$$? (2 steps)", "answer": "- Step 1: Recognize that this is already in \"divided form\": $$f(x) = \\text{divisor} \\times \\text{quotient} + \\text{remainder}$$.\n- Step 2: Read off the remainder directly. Since $$f(2) = (2-2)Q(2) + 21 = 0 + 21$$, the remainder is 21.\n\nNo calculation needed—the structure of the equation gives you the answer.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": true}, {"question": "What is the Factor Theorem, and how does it differ from the Remainder Theorem? (2 steps)", "answer": "- Step 1: Factor Theorem states that $$(x-c)$$ is a factor of $$f(x)$$ if and only if $$f(c) = 0$$. This is a special case of the Remainder Theorem where the remainder is zero.\n- Step 2: The key distinction: Remainder Theorem gives you the value $$f(c) = R$$ (which could be anything). Factor Theorem tests if $$f(c) = 0$$ to confirm divisibility. If the question says \"is a factor,\" you set $$f(c) = 0$$; if it says \"find the remainder,\" you compute $$f(c)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": true}, {"question": "When $$(2x-1)$$ is given as a factor of $$f(x)$$, what value do you substitute into the Factor Theorem? (2 steps)", "answer": "- Step 1: Set the factor equal to zero: $$2x - 1 = 0 \\Rightarrow x = \\frac{1}{2}$$.\n- Step 2: Apply the Factor Theorem: $$f\\left(\\frac{1}{2}\\right) = 0$$. The root is $$x = -\\frac{b}{a}$$ for a factor $$(ax + b)$$.\n\nPitfall: Do NOT substitute $$x = 1$$ or $$x = -1$$. The root comes from setting the entire factor to zero.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "When solving an inequality with the unknown in the exponent, like $$\\left(\\frac{7}{8}\\right)^n < \\frac{0.5}{160}$$, what is the step-by-step method? (4 steps)", "answer": "- Step 1: Take $$\\ln$$ (or $$\\log$$) of both sides to bring the exponent down: $$n \\ln\\left(\\frac{7}{8}\\right) < \\ln\\left(\\frac{0.5}{160}\\right)$$.\n- Step 2: Evaluate the sign of the logarithm you're dividing by. Since $$\\frac{7}{8} < 1$$, we know $$\\ln\\left(\\frac{7}{8}\\right) < 0$$.\n- Step 3: **CRITICAL TRAP** — Dividing both sides by a negative number flips the inequality: $$n > \\frac{\\ln(0.5/160)}{\\ln(7/8)}$$.\n- Step 4: Compute and round up for the smallest integer satisfying the strict inequality.\n\nForgetting to flip the sign is a silent error—arithmetic looks right but the direction is wrong.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": true}, {"question": "Why does dividing by $$\\ln(v)$$ where $$0 < v < 1$$ flip the inequality sign? (2 steps)", "answer": "- Step 1: For any value $$v$$ between 0 and 1, the logarithm $$\\ln(v)$$ is negative. This is because $$e^0 = 1$$, and the function $$e^x$$ is increasing, so values less than 1 correspond to negative exponents.\n- Step 2: When you divide both sides of an inequality by a negative number, the direction of the inequality reverses. This is a fundamental rule of inequalities, and forgetting it produces answers that are completely backwards (e.g., \"largest integer 43\" instead of \"smallest integer 44\").", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": true}, {"question": "A simple exercise: Solve $$(0.5)^n < 0.125$$ for the smallest integer $$n$$. (3 steps)", "answer": "- Step 1: Take $$\\ln$$ of both sides: $$n \\ln(0.5) < \\ln(0.125)$$.\n- Step 2: Since $$\\ln(0.5) < 0$$, dividing flips the sign: $$n > \\frac{\\ln(0.125)}{\\ln(0.5)} = \\frac{-2.079}{-0.693} = 3$$.\n- Step 3: The inequality requires $$n > 3$$, so the smallest integer is $$n = 4$$.\n\nMental math shortcut: $$0.125 = (0.5)^3$$, so $$(0.5)^n < (0.5)^3$$ means $$n > 3$$.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "What is the Trapezium Rule formula for approximating $$\\int_a^b y \\, dx$$, and what does each variable represent? (3 steps)", "answer": "- Step 1: Write the formula (IT IS in the formula booklet): $$\\int_a^b y \\, dx \\approx \\frac{h}{2}\\left[y_0 + y_n + 2(y_1 + y_2 + \\cdots + y_{n-1})\\right]$$\n- Step 2: Define $$h = \\frac{b-a}{n}$$, where $$n$$ is the number of **strips** (not ordinates). The number of ordinates is $$n + 1$$.\n- Step 3: Identify which ordinates get doubled: Only the **interior** ordinates $$y_1, y_2, \\ldots, y_{n-1}$$ are doubled. The endpoint ordinates $$y_0$$ and $$y_n$$ are added once.\n\nCount gaps (strips), not dots (ordinates).", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "How do you identify the number of strips and the value of $$h$$ in a trapezium rule question from a table? (2 steps)", "answer": "- Step 1: Count the number of ordinates (rows in the table). The number of strips $$n$$ is one less than the number of ordinates. For example, 6 ordinates means 5 strips.\n- Step 2: Verify $$h$$ by checking the difference between adjacent $$x$$-values. It should equal $$\\frac{b-a}{n}$$. For example, from $$x=4.0$$ to $$x=5.0$$ with 6 ordinates (5 strips): $$h = \\frac{5-4}{5} = 0.2$$.\n\nAlways sanity-check: adjacent $$x$$-values must differ by exactly $$h$$.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "What is the exact exam wording required to state how the trapezium rule estimate can be made more accurate, and what wording loses the mark? (2 steps)", "answer": "- Step 1: The CORRECT phrasing is: \"Increase the number of strips\" or \"Use more strips\" or \"Use smaller strips.\"\n- Step 2: The WRONG phrasing that loses the mark is: \"Reduce the interval.\" The interval $$[a, b]$$ stays the same; you are subdividing it more finely.\n\nMemorise the exact wording—examiners are strict on this.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "What is the method for proof by exhaustion when proving a statement about divisibility by 4? (3 steps)", "answer": "- Step 1: Partition all integers into their four possible forms modulo 4: $$n = 4k$$, $$n = 4k+1$$, $$n = 4k+2$$, $$n = 4k+3$$.\n- Step 2: For each case, substitute into the expression and compute the remainder when divided by 4.\n- Step 3: Show that in ALL four cases, the expression never leaves remainder 0. Write a mandatory conclusion sentence: \"In all cases the remainder is either 2 or 3, never 0. Hence the expression is not divisible by 4 for any integer $$n$$.\"\n\nPitfall: Using even/odd (only 2 cases) is insufficient for divisibility by 4—you need all 4 residues.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": true}, {"question": "For a proof by exhaustion involving even/odd cases (e.g., \"$$n^2 - 2$$ is not a multiple of 4\"), how do you structure the argument? (3 steps)", "answer": "- Step 1: Case 1 (even): Let $$n = 2k$$. Then $$n^2 - 2 = 4k^2 - 2 = 2(2k^2 - 1)$$. Since $$2k^2 - 1$$ is odd, the expression is divisible by 2 but NOT by 4.\n- Step 2: Case 2 (odd): Let $$n = 2k + 1$$. Then $$n^2 - 2 = 4k^2 + 4k - 1 = 4k(k+1) - 1$$. This is exactly 1 less than a multiple of 4, so NOT divisible by 4.\n- Step 3: Write the conclusion: \"In both cases, $$n^2 - 2$$ is not a multiple of 4.\"\n\nFactor out the largest power of 2 possible, then show the remaining factor is odd or $$\\pm 1$$.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "When a proof by exhaustion question specifies constraints like \"$$x, y$$ are even integers with $$0 < x, y < 6$$\", what must you do before testing cases? (2 steps)", "answer": "- Step 1: List ALL values satisfying the constraint. Here, even integers strictly between 0 and 6 are $$\\{2, 4\\}$$ for both $$x$$ and $$y$$.\n- Step 2: Test ALL possible pairs: $$(2,2), (2,4), (4,2), (4,4)$$. Do not include 0 or 6 (strict inequality), and do not include odd integers.\n\nPitfall: Read constraints carefully—even vs all integers, strict vs non-strict inequality.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "What is the key log law for moving a coefficient inside a logarithm, and what is the critical distinction? (3 steps)", "answer": "- Step 1: The law is $$k \\log_a x = \\log_a(x^k)$$. The coefficient becomes a power INSIDE the log.\n- Step 2: This is fundamentally different from $$\\log_a^2 x$$, which means $$(\\log_a x)(\\log_a x)$$ — the log itself is squared, NOT the argument.\n- Step 3: You must apply this law BEFORE equating arguments or dropping logs. If the coefficient is not 1, you cannot use $$\\log_a A = B \\Rightarrow A = a^B$$.\n\n$$2\\log x = \\log(x^2)$$, but $$\\log^2 x = (\\log x)^2$$. These are NEVER the same.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": true}, {"question": "How do you convert a standalone constant into a logarithm to combine it with other log terms? (2 steps)", "answer": "- Step 1: Use the identity $$k = \\log_a(a^k)$$. For example, $$3 = \\log_2(2^3) = \\log_2 8$$, or $$4 = \\log_3(3^4) = \\log_3 81$$.\n- Step 2: Once all terms are in logarithmic form with the same base, you can combine using product/quotient rules, and then equate arguments.\n\nThis is essential for equations like $$\\log_2(2x) + 3 = \\log_2(5x+4)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "What is the product law for logarithms, and what is the most common trap? (2 steps)", "answer": "- Step 1: The law is $$\\log_a(xy) = \\log_a x + \\log_a y$$. When removing the log, the arguments MULTIPLY.\n- Step 2: The common trap is writing $$\\log A + \\log B = \\log(A + B)$$. This is WRONG. It must be $$\\log A + \\log B = \\log(AB)$$.\n\nPhuc made this exact error on Paper 6, writing $$16x + (x+1)$$ instead of $$16x(x+1)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "After solving a logarithm equation algebraically, what critical step must you always perform before finalizing your answer? (2 steps)", "answer": "- Step 1: Check that ALL original log arguments are strictly positive for each solution. The domain of $$\\log_a(f(x))$$ requires $$f(x) > 0$$.\n- Step 2: Reject any solution that makes any original log argument zero or negative. For example, if the original equation has $$\\log_2(2-x)$$, then $$x < 2$$ is required; reject $$x = 26$$.\n\nThis is where marks are silently lost—solutions that are algebraically valid but violate the log domain.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "A simple exercise: Solve $$\\log_2(x) + \\log_2(x-3) = \\log_2(10)$$. (3 steps)", "answer": "- Step 1: Combine the left side using the product rule: $$\\log_2[x(x-3)] = \\log_2(10)$$.\n- Step 2: Equate arguments: $$x(x-3) = 10 \\Rightarrow x^2 - 3x - 10 = 0 \\Rightarrow (x-5)(x+2) = 0$$, so $$x = 5$$ or $$x = -2$$.\n- Step 3: Domain check—original arguments require $$x > 0$$ and $$x - 3 > 0$$, so $$x > 3$$. Reject $$x = -2$$. Answer: $$x = 5$$.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "How do you convert a general circle equation $$x^2 + y^2 + 2gx + 2fy + c = 0$$ into standard form, and what is the sign trap? (3 steps)", "answer": "- Step 1: Complete the square on $$x$$ and $$y$$ separately: $$(x+g)^2 - g^2 + (y+f)^2 - f^2 + c = 0$$.\n- Step 2: Rearrange to standard form: $$(x+g)^2 + (y+f)^2 = g^2 + f^2 - c$$.\n- Step 3: Read off centre $$(-g, -f)$$ and radius $$\\sqrt{g^2 + f^2 - c}$$. The SIGN TRAP: completing the square on $$x^2 - 20x$$ gives $$(x - 10)^2$$, not $$(x + 10)^2$$. The sign inside the bracket is the OPPOSITE of the linear coefficient halved.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": true}, {"question": "What are the five conditions for circle intersection, and how do you determine which applies? (3 steps)", "answer": "- Step 1: Calculate the distance $$d$$ between centres, the sum of radii $$r_1 + r_2$$, and the absolute difference of radii $$|r_1 - r_2|$$.\n- Step 2: Compare $$d$$ to these two benchmarks:\n+ $$d > r_1 + r_2$$: Don't touch (too far apart)\n+ $$d = r_1 + r_2$$: Touch externally (1 point)\n+ $$|r_1 -
